    \ Used, Free\n\n        Used        Free\n        ----        ----\n40943972352\
    \ 173030539264\n```\n\n# 7.5.2 Evaluating the Logging System\n\nWindows logs all\
    \ conceivable events in a logging system. Get-EventLog -List reveals the names\
    \ of the logs. Using Get-EventLog <name> -Newest n, you can read the most recent\
    \ n entries.\n\n```\n> Get-EventLog Security -Newest 5 |\n  Select-Object TimeGenerated,\
    \ Message\n\nTimeGenerated          Message\n--------------         -------\n\
    01/30/2023 03:47:30 PM A new login has been ...\n01/30/2023 03:47:30 PM An account\
    \ has been successfully registered.\n01/30/2023 03:41:52 PM A new login has been\
    \ ...\n01/30/2023 03:41:52 PM An account has been successfully registered.\n01/30/2023\
    \ 03:13:48 PM A new login has been ...\n```\n\n# 7.6 Processing cmdlet Results\n\
    \ncmdlets return objects, not just text. The text displayed in the terminal is\
    \ created because PowerShell converts the objects into text by default. To achieve\
    \ better readability, many details are removed in the process.\n\nOne of the most\
    \ basic PowerShell tasks is to pass results to a second cmdlet using the pipe\
    \ operator. This allows you to filter, process, or format the data in a variety\
    \ of ways. You have already seen some cmdlets for this purpose, such as Select-Object\
    \ or ForEach-Item. This section summarizes the basic functions of these frequently\
    \ needed cmdlets."
- md: "## 7.6.1 Select-Object and Sort-Object\n\nYou can use `Select-Object` (alias\
    \ `select`) to reduce the output to single properties or select only the first/last\
    \ results. This function is especially useful if you previously sorted the results\
    \ according to a criterion using `Sort-Object` (alias `sort`). The `-Descending`\
    \ option sorts in descending order. The following examples illustrate the most\
    \ important application variants. Take the trouble and try the commands in a directory\
    \ with many files.\n\n```\n> Get-ChildItem    # show all files/default properties\n\
    > Get-ChildItem | Select-Object Name        # show name only\n> Get-ChildItem\
    \ | Select-Object Name, Size  # name and size\n```\n\n```\n# show the three smallest/largest\
    \ files\n> Get-ChildItem | Sort-Object Size | Select-Object -First 3\n> Get-ChildItem\
    \ | Sort-Object Size | Select-Object -Last 3\n```\n\n```\n# for the alphabetically\
    \ first ten files, name and size only\n> Get-ChildItem | Sort-Object Name |\n\
    \  Select-Object -First 10 Name, Size\n```\n\n```\n# last modified/created, name,\
    \ size and modification time\n> Get-ChildItem | Sort-Object LastWriteTime |\n\
    \  Select-Object -Last 10 Name, Size, LastWriteTime\n```\n\n`Select-Object` and\
    \ `Sort-Object` can also be applied to properties that are not displayed at all\
    \ by default, for example, to `LastAccessTime` for `Get-ChildItem` results. If\
    \ you do not know the properties, you should apply `Get-Member` to the first result\
    \ object, as in the following example:\n\n```\n# Show properties of the first\
    \ result of cmdlet\n> cmdlet | Select -First 1 | Get-Member -MemberType Properties\n\
    ```\n\n`Select-Object` can also skip the first *n* objects (`-Skip n`); skip the\
    \ last objects (`-SkipLast n`); eliminate duplicates (`-Unique`); or select specific\
    \ objects (`-Index 2, 3, 7` for the 3rd, 4th, and 8th element; counting begins\
    \ at 0).\n\n## 7.6.2 Where-Object\n\n`Where-Object` (alias `?`) allows you to\
    \ select the objects that meet a certain criterion. The condition is formulated\
    \ in curly brackets. The respective object is addressed using `$_`.\n\n```\n#\
    \ Show files > 1 MByte, only name and size\n> Get-ChildItem | ? {$_.Size -gt 1000000}\
    \ | Select Name, Size\n```\n\n## 7.6.3 Group-Object\n\nGroup-Object (alias group)\
    \ forms groups of elements that have one property in common. The result contains\
    \ the number of objects for each group, the value of the group property, and an\
    \ enumeration of the elements.\n\n```\n> Get-ChildItem | Group-Object -Property\
    \ Extension\n\nCount  Name  Group\n-----  ----  -----\n   73  .jpg  {C:\\Users\\\
    kofler\\img_2234.jpg, ...}\n    5  .jpeg {C:\\Users\\kofler\\tree.jpeg, ...}\n\
    \  334  .png  {C:\\Users\\kofler\\screenshot.jpeg, ...}\n    3  .tif  {C:\\Users\\\
    kofler\\figure-23.tif, ...}\n\n# the largest groups first, only three groups\n\
    > Get-ChildItem | Group-Object -Property Extension |\n  Sort-Object -Property\
    \ Count -Descending |\n  Select-Object -First 3\n\n# Processes with more than\
    \ 5 subprocesses (threads)\n> Get-Process | Group-Object -Property ProcessName\
    \ |\n  Where-Object { $_.Count -gt 5 }\n```\n\n## 7.6.4 ForEach-Item\n\nForEach-Item\
    \ (alias %) enables you to further process any of the determined objects. Which\
    \ type of further processing is possible depends strongly on the type of objects.\
    \ For example, you can copy or delete files, terminate processes, close open database\
    \ connections, and update installed packages. The action to be executed is formulated\
    \ in curly brackets, and access to the object is again created via $_. The following\
    \ command sequence moves all files from the current directory that are older than\
    \ one year (-lt for less than) to the old subdirectory:\n\n```\n> $oneYear = (Get-Date).AddDays(-365)\n\
    > mkdir old\n> Get-ChildItem | ? {$_.LastWriteTime -lt $oneYear} |\n  ForEach-Object\
    \ { Move-Item $_ old\\ }\n```\n\n## 7.6.5 Measure-Object\n\nMeasure-Object (alias\
    \ measure) applies aggregate functions to the specified objects. Without any further\
    \ parameters, it simply counts the objects (Count result property). Depending\
    \ on the option, the total, average, and minimum or maximum of a property can\
    \ also be determined.\n\n```\n# number of files, size of the smallest and largest\
    \ file\n> Get-ChildItem | Measure-Object -Property Size -Min -Max |\n  Select-Object\
    \ Count, Minimum, Maximum\nCount    Minimum    Maximum\n-----    -------    -------\n\
    \  431    4096,000    3263035,000\n\n# lines, words and characters in the todo\
    \ file\n> Get-Content todo.md | Measure-Object -Line -Word -Character\n\nLines\
    \    Words    Characters\n-----    -----    ----------\n  195      899       \
    \   6396\n```\n\nIf you just want to count the number of objects, you can simply\
    \ apply the `Count` property to the result. The following command determines the\
    \ number of PDF files in the current directory and all subdirectories:\n\n```\n\
    > (Get-ChildItem *.pdf -Recurse).Count\n```\n\n## 7.6.6 Formatting and Exporting\
    \ cmdlet Results\n\nWhat you see when you run a command in the terminal is mostly\
    \ a short version of the available data. The `Out-Default` cmdlet is responsible\
    \ for the default formatting. Among other things, the cmdlet takes into account\
    \ XML files that specify for important classes (e.g., for `System.IO.DirectoryInfo`);\
    \ which properties are to be output; and how.\n\nIf you're not happy with the\
    \ default formatting, you can influence it in the following ways:\n\n- The `cmdlet\
    \ | Select-Object prop1, prop2, prop3` construct, which you already know, allows\
    \ you to define which properties you want to see.\n- Use `cmdlet | Format-List`\
    \ to specify the most important properties of each object in list form. If you\
    \ really want to see all properties, you can use `Format-List -Property *`. But\
    \ be careful not to get overwhelmed by all the data since `Get-Process | Format-List\
    \ -Property *` can return a thousand lines of output. In my work environment,\
    \ there were about 11,000 lines that could be measured this way:\n\n  > Get-Process\
    \ | Format-List -Property * | Out-String |\n    Measure-Object -Line\n\n- `cmdlet\
    \ | Format-Table` performs table-based output, as is the default for many classes.\
    \ But you can influence the output via options. If you have a wide monitor, you\
    \ can try, for example, `Get-Process | Format-Table -Property * -AutoSize`. The\
    \ `-AutoSize` option takes the data into account to determine the ideal column\
    \ width.\n- cmdlet | Format-Wide tries to spread the most important property (such\
    \ as the file-name) across multiple columns. Get-ChildItem | Format-Wide -AutoSize\
    \ returns, for example, a multi-column list of the names of all files in the current\
    \ directory.\n- cmdlet | Out-Gridview displays the result in a separate graphical\
    \ window. The data can be re-sorted and filtered in that window, which is extremely\
    \ helpful especially for extensive results.\n\n![](img/a7fa45d496335c22ffb14c3275e24ffb_241_0.png)\n\
    \nFigure 7.1 Graphical Output of cmdlet Results\n\n- cmdlet | Export-Csv saves\
    \ the cmdlet result to a comma-separated values (CSV) file. By default, the first\
    \ row contains the names of all properties as column labels. In the other rows,\
    \ all texts are enclosed in quotation marks and separated by commas. You can manipulate\
    \ the formatting details of the file via various options. The counterpart to Export-Csv\
    \ is Import-Csv. I will introduce you to this command in Chapter 8, Section 8.1.\n\
    - Using Test-NetConnection, you can check a network connection. Basically, the\
    \ cmdlet is a modern ping alternative, but you can also pass a port number:\n\n\
    ```\n> Test-NetConnection kofler.info\n\nComputerName        : kofler.info\nRemoteAddress\
    \       : 168.119.33.110\nInterfaceAlias      : Ethernet Instance 0\nSourceAddress\
    \       : 192.168.122.162\nPingSucceeded       : True\nPingReplyDetails (RTT)\
    \ : 29 ms\n```\n\n## 7.7 Other cmdlets\n\nIn this section, I'll briefly introduce\
    \ you to some other cmdlets that are often needed but don't fit the content of\
    \ any of the previous sections:\n\n- **Get-Command <name>**\n  Get-Command <name>\
    \ returns information about a cmdlet or command. For cmdlets, the Source property\
    \ reveals the underlying module. With conventional commands, on the other hand,\
    \ you can evaluate the Path property—then, you'll know where the command is installed\
    \ (comparable to which on Linux):\n\n  ```\n  > (Get-Command Get-ChildItem).Source\n\
    \  Microsoft.PowerShell.Management\n  > (Get-Command ping.exe).Path\n  C:\\Windows\\\
    system32\\PING.EXE\n  ```\n\n- **Get-History**\n  Get-History returns a list of\
    \ all recently executed commands.\n\n- **Get-Random**\n  Get-Random returns a\
    \ random number between 0 and 2,147,483,647. Using -Minimum and -Maximum you can\
    \ limit the number range. When you apply Get-Random to an array, the cmdlet returns\
    \ a random element.\n\n- **Measure-Command { expr }**\n  Measure-Command { expr\
    \ } determines how long it takes to execute the specified expression.\n\n- **Start-Sleep\
    \ n**\n  Start-Sleep n (alias sleep) stops the running process or script for n\
    \ seconds.\n\n- **Get-Clipboard**\n  Get-Clipboard reads the contents of the clipboard.\
    \ Although no comparable cmdlet can fill the clipboard with data, you can use\
    \ the clip.exe command for this purpose. For example, Get-Date | clip copies the\
    \ current date as text to the clipboard.\n\n## 7.8 Installing Additional Modules\n\
    \nBy default, Windows has quite a few PowerShell modules with cmdlets installed,\
    \ and countless extension modules are available on the internet. The PowerShell\
    \ Gallery has established itself as a central source for such extensions. More\
    \ than 10,000 modules are offered for download at https://powershellgallery.com.\n\
    \nTo install modules from the PowerShell Gallery, the PowerShellGet module is\
    \ available by default. This module contains cmdlets like Install-Module and Find-Module."
  mdcn: "## 7.6.1 Select-Object 与 Sort-Object\n\n你可以使用 `Select-Object`（别名 `select`）将输出缩减为单个属性，或仅选择前几个/后几个结果。如果你之前使用\
    \ `Sort-Object`（别名 `sort`）根据某个标准对结果进行了排序，此函数尤其有用。`-Descending` 选项按降序排序。以下示例说明了最重要的应用变体。请费心在一个包含许多文件的目录中尝试这些命令。\n\
    \n```\n> Get-ChildItem    # 显示所有文件/默认属性\n> Get-ChildItem | Select-Object Name\
    \        # 仅显示名称\n> Get-ChildItem | Select-Object Name, Size  # 名称和大小\n```\n\n\
    ```\n# 显示三个最小/最大的文件\n> Get-ChildItem | Sort-Object Size | Select-Object -First\
    \ 3\n> Get-ChildItem | Sort-Object Size | Select-Object -Last 3\n```\n\n```\n\
    # 按字母顺序排列的前十个文件，仅显示名称和大小\n> Get-ChildItem | Sort-Object Name |\n  Select-Object\
    \ -First 10 Name, Size\n```\n\n```\n# 最后修改/创建的，名称、大小和修改时间\n> Get-ChildItem | Sort-Object\
    \ LastWriteTime |\n  Select-Object -Last 10 Name, Size, LastWriteTime\n```\n\n\
    `Select-Object` 和 `Sort-Object` 也可以应用于默认情况下根本不显示的属性，例如，应用于 `Get-ChildItem` 结果的\
    \ `LastAccessTime`。如果你不知道这些属性，你应该对第一个结果对象应用 `Get-Member`，如以下示例所示：\n\n```\n# 显示\
    \ cmdlet 第一个结果的属性\n> cmdlet | Select -First 1 | Get-Member -MemberType Properties\n\
    ```\n\n`Select-Object` 还可以跳过前 *n* 个对象（`-Skip n`）；跳过最后几个对象（`-SkipLast n`）；消除重复项（`-Unique`）；或选择特定对象（`-Index\
    \ 2, 3, 7` 表示第 3、4 和 8 个元素；计数从 0 开始）。\n\n## 7.6.2 Where-Object\n\n`Where-Object`（别名\
    \ `?`）允许你选择满足特定条件的对象。条件在花括号中表述。使用 `$_` 来引用各自的对象。\n\n```\n# 显示大于 1 MB 的文件，仅显示名称和大小\n\
    > Get-ChildItem | ? {$_.Size -gt 1000000} | Select Name, Size\n```\n\n## 7.6.3\
    \ Group-Object\n\nGroup-Object（别名 group）将具有一个共同属性的元素分组。结果包含每个组的对象数量、组属性的值以及元素的枚举。\n\
    \n```\n> Get-ChildItem | Group-Object -Property Extension\n\nCount  Name  Group\n\
    -----  ----  -----\n   73  .jpg  {C:\\Users\\kofler\\img_2234.jpg, ...}\n    5\
    \  .jpeg {C:\\Users\\kofler\\tree.jpeg, ...}\n  334  .png  {C:\\Users\\kofler\\\
    screenshot.jpeg, ...}\n    3  .tif  {C:\\Users\\kofler\\figure-23.tif, ...}\n\n\
    # 最大的组在前，仅显示三个组\n> Get-ChildItem | Group-Object -Property Extension |\n  Sort-Object\
    \ -Property Count -Descending |\n  Select-Object -First 3\n\n# 拥有超过 5 个子进程（线程）的进程\n\
    > Get-Process | Group-Object -Property ProcessName |\n  Where-Object { $_.Count\
    \ -gt 5 }\n```\n\n## 7.6.4 ForEach-Item\n\nForEach-Item（别名 %）使你能够进一步处理任何已确定的对象。可以进行哪种类型的进一步处理在很大程度上取决于对象的类型。例如，你可以复制或删除文件、终止进程、关闭打开的数据库连接以及更新已安装的包。要执行的操作在花括号中表述，并且再次通过\
    \ `$_` 访问对象。以下命令序列将当前目录中所有早于一年（`-lt` 表示小于）的文件移动到 old 子目录：\n\n```\n> $oneYear =\
    \ (Get-Date).AddDays(-365)\n> mkdir old\n> Get-ChildItem | ? {$_.LastWriteTime\
    \ -lt $oneYear} |\n  ForEach-Object { Move-Item $_ old\\ }\n```\n\n## 7.6.5 Measure-Object\n\
    \nMeasure-Object（别名 measure）将聚合函数应用于指定的对象。没有任何其他参数时，它只是计算对象数量（Count 结果属性）。根据选项，还可以确定属性的总和、平均值以及最小值或最大值。\n\
    \n```\n# 文件数量、最小和最大文件的大小\n> Get-ChildItem | Measure-Object -Property Size -Min\
    \ -Max |\n  Select-Object Count, Minimum, Maximum\nCount    Minimum    Maximum\n\
    -----    -------    -------\n  431    4096,000    3263035,000\n\n# todo 文件中的行数、单词数和字符数\n\
    > Get-Content todo.md | Measure-Object -Line -Word -Character\n\nLines    Words\
    \    Characters\n-----    -----    ----------\n  195      899          6396\n\
    ```\n\n如果你只想计算对象的数量，你可以简单地将 `Count` 属性应用于结果。以下命令确定当前目录和所有子目录中的 PDF 文件数量：\n\n```\n\
    > (Get-ChildItem *.pdf -Recurse).Count\n```\n\n## 7.6.6 格式化和导出 cmdlet 结果\n\n你在终端中运行命令时看到的内容大多是可用数据的简短版本。`Out-Default`\
    \ cmdlet 负责默认格式化。除其他事项外，该 cmdlet 会考虑为重要类（例如，对于 `System.IO.DirectoryInfo`）指定输出哪些属性以及如何输出的\
    \ XML 文件。\n\n如果你对默认格式化不满意，可以通过以下方式影响它：\n\n- 你已经熟悉的 `cmdlet | Select-Object prop1,\
    \ prop2, prop3` 结构允许你定义想要看到的属性。\n- 使用 `cmdlet | Format-List` 以列表形式指定每个对象最重要的属性。如果你确实想看到所有属性，可以使用\
    \ `Format-List -Property *`。但要小心，不要被所有数据淹没，因为 `Get-Process | Format-List -Property\
    \ *` 可能返回一千行输出。在我的工作环境中，可以测量到大约 11,000 行：\n\n  > Get-Process | Format-List -Property\
    \ * | Out-String |\n    Measure-Object -Line\n\n- `cmdlet | Format-Table` 执行基于表格的输出，这是许多类的默认方式。但你可以通过选项影响输出。如果你有宽屏显示器，可以尝试\
    \ `Get-Process | Format-Table -Property * -AutoSize`。`-AutoSize` 选项会考虑数据以确定理想的列宽。\n\
    - cmdlet | Format-Wide 尝试将最重要的属性（例如文件名）分布在多列中。Get-ChildItem | Format-Wide -AutoSize\
    \ 会返回当前目录中所有文件名称的多列列表。\n- cmdlet | Out-Gridview 在单独的图形窗口中显示结果。数据可以在该窗口中重新排序和筛选，这对于大量结果尤其有帮助。\n\
    \n![](img/a7fa45d496335c22ffb14c3275e24ffb_241_0.png)\n\n图 7.1 cmdlet 结果的图形输出\n\
    \n- cmdlet | Export-Csv 将 cmdlet 结果保存为逗号分隔值（CSV）文件。默认情况下，第一行包含所有属性的名称作为列标签。在其他行中，所有文本都用引号括起来并用逗号分隔。你可以通过各种选项操作文件的格式化细节。Export-Csv\
    \ 的对应命令是 Import-Csv。我将在第 8 章第 8.1 节介绍此命令。\n- 使用 Test-NetConnection，你可以检查网络连接。基本上，该\
    \ cmdlet 是一个现代的 ping 替代品，但你也可以传递端口号：\n\n```\n> Test-NetConnection kofler.info\n\
    \nComputerName        : kofler.info\nRemoteAddress       : 168.119.33.110\nInterfaceAlias\
    \      : Ethernet Instance 0\nSourceAddress       : 192.168.122.162\nPingSucceeded\
    \       : True\nPingReplyDetails (RTT) : 29 ms\n```\n\n## 7.7 其他 cmdlet\n\n在本节中，我将简要介绍一些其他经常需要但不符合前面任何章节内容的\
    \ cmdlet：\n\n- **Get-Command <name>**\n  Get-Command <name> 返回有关 cmdlet 或命令的信息。对于\
    \ cmdlet，Source 属性揭示了底层模块。另一方面，对于常规命令，你可以评估 Path 属性——这样，你就会知道命令安装在哪里（类似于 Linux\
    \ 上的 which）：\n\n  ```\n  > (Get-Command Get-ChildItem).Source\n  Microsoft.PowerShell.Management\n\
    \  > (Get-Command ping.exe).Path\n  C:\\Windows\\system32\\PING.EXE\n  ```\n\n\
    - **Get-History**\n  Get-History 返回最近执行的所有命令的列表。\n\n- **Get-Random**\n  Get-Random\
    \ 返回一个介于 0 和 2,147,483,647 之间的随机数。使用 -Minimum 和 -Maximum 你可以限制数字范围。当你将 Get-Random\
    \ 应用于数组时，该 cmdlet 返回一个随机元素。\n\n- **Measure-Command { expr }**\n  Measure-Command\
    \ { expr } 确定执行指定表达式所需的时间。\n\n- **Start-Sleep n**\n  Start-Sleep n（别名 sleep）将正在运行的进程或脚本停止\
    \ n 秒。\n\n- **Get-Clipboard**\n  Get-Clipboard 读取剪贴板的内容。虽然没有类似的 cmdlet 可以用数据填充剪贴板，但你可以使用\
    \ clip.exe 命令来实现此目的。例如，Get-Date | clip 将当前日期作为文本复制到剪贴板。\n\n## 7.8 安装其他模块\n\n默认情况下，Windows\
    \ 安装了相当多的带有 cmdlet 的 PowerShell 模块，并且互联网上有无数的扩展模块。PowerShell Gallery 已成为此类扩展的中心来源。在\
    \ https://powershellgallery.com 提供了超过 10,000 个模块供下载。\n\n要从 PowerShell Gallery\
    \ 安装模块，默认情况下提供了 PowerShellGet 模块。此模块包含像 Install-Module 和 Find-Module 这样的 cmdlet。"
