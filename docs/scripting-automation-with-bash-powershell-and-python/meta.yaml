    ```


    If you want to know how many files there are in the directory, you should pass
    the output of ls to wc (word count). The command returns three numbers. The first
    one indicates the number of lines, the second the number of words, and the third
    the number of characters. Since ls prints each file on a separate line, only the
    number of lines is relevant. The wc option -l (lines) reduces the output accordingly.


    ```

    $ ls | wc


    116 159 3194


    $ ls | wc -l


    116

    ```


    With these trivial commands you have already learned a lot:


    - The most commonly used commands in Bash have very short names. At first, these
    names are not very intuitive. However, once you get used to it, the typing effort
    is minimal.

    - The behavior of commands can be controlled by options. Many options consist
    of only one letter, and they are preceded by a hyphen. Often, an alternative long
    form exists that is preceded by *two* hyphens. For example, `wc --lines` and `wc
    -l` are equivalent.

    - Commands can be linked with the pipe operator (`|`). I will discuss this operator
    in more detail later in [Section 3.7.2](Section 3.7.2). In short, `command1 |
