  md: '# 9.3.4 Searching and Replacing Using sed


    One of the most important `sed` commands is `s/pattern/replace/`. This command
    replaces the expressions recognized by `pattern` with the `replace` string in
    each line. Within `\replace`, you can access the groups detected by `pattern`
    using `\1`, `\2`.


    In addition, other separators instead of `/` are allowed with this command, which
    do not occur in the pattern, such as `s:pattern:replace:`. However, the separator
    is not specially marked by a backslash. The third separator can be followed by
    two letters (also in combination):


    +   - `s/ptrn/rpl/g` means that multiple search-and-replace operations are performed
    per line if necessary (`g` as in *global replace*).

    - `s/ptrn/rpl/i` means that the analysis of the expression is *case insensitive*.


    To test an expression or `sed` command, the best approach is to combine `echo`
    and `sed`:


    ```

    $ echo "abc ABC" | sed ''s/abc/efg/gi''

    efg efg

    ```


