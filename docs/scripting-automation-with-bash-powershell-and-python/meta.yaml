    \n## 2.6 记录天气数据（Python）\n\n在互联网上无数的网站上，你可以通过所谓的*REST API*发现有趣的数据。然而，许多服务要求你先注册，并且免费使用通常有限制，例如`https://www.weatherapi.com`。\n\
    \n以下脚本确定奥地利格拉茨的天气，并将此信息记录到名为`weather.csv`的文件中，该文件具有以下结构（使用分号作为分隔符）：\n\n```\n2023-04-14\
