- md: 'The terminal is a relatively new component of Windows and has only been around
    since 2019. In the past, `cmd.exe` or PowerShell simply handled the terminal functions
    themselves or delegated this task to the *Windows Console Host*. On Linux and
    macOS, the separation of tasks between shell and terminal has proven itself for
    decades, and so, Microsoft finally got around to developing a “real” terminal
    app.


    In current Windows versions, the terminal should already be preinstalled. If that
    isn’t the case, you should run `winget install Microsoft.WindowsTerminal` or install
    the program from the Microsoft Store.


    Remember to update to the latest version every now and then. The terminal is currently
    under intensive development and receives new features almost every month!


    ```

    > winget upgrade Microsoft.WindowsTerminal

    ```


    What can the terminal do? Perhaps the most important innovation compared to the
    traditional execution of `cmd.exe` or PowerShell is that you can launch multiple
    shell instances and run them side by side in “tabs” (called *dialog sheets*).
    This view is often handy when you want to test different functions in parallel,
    work in different directories, or run PowerShell in one tab but Bash (Linux) in
    a second one.


    > **Running the Terminal with Administrator Privileges**

    > You can execute most PowerShell commands as an ordinary user. But if you want
    to perform administrative work, you’ll need more rights.

    > For this purpose, you need to search for “Terminal” in the **Start** menu, right-click
    or touchpad-click the entry, and select **Run as administrator**.


    ## 4.2.1 Configuration


    Microsoft is particularly proud that the terminal can now also keep up visually
    with corresponding Linux programs. If you want, you can change the foreground
    and background colors of the terminal, underlay the terminal with an image, or
    make it transparent so that you can see what’s going on in the windows beneath
    the terminal. In the screenshots for this book, I have refrained from describing
    these gimmicks. However, I changed the terminal colors (light background, dark
    text colors) to make the illustrations easier to read in print.


    You can change these and countless other options in the settings. The program
    distinguishes between global basic settings, which apply to the entire program,
    and profiles. Each profile is assigned to a shell.


    In the **Startup Settings** dialog sheet, you can (and should) make PowerShell
    7 the default shell (**Default profile** dropdown list). You should also make
    the terminal the default program for running shells (**Default terminal application**
    dropdown list) if these options are not already selected.


    ![Figure 4.2 Countless Options for Influencing the Appearance and Function of
    the Terminal](img/a7fa45d496335c22ffb14c3275e24ffb_104_0.png)


    > **Tip**

    > If a strange file appears in an editor when you open the settings, you’re using
    an outdated version of the terminal without a proper settings dialog. A solution
    to this issue is updating the terminal in the Microsoft Store.


    ## 4.2.2 Operation


    If you have previously used `cmd.exe`, old PowerShell versions, or a terminal
    in another operating system, you already know that a mouse or touchpad is of little
    use in the terminal. In particular, you cannot change the cursor position. Inputs
    are only possible in the last line of the terminal. Within this line, you can
    move the cursor via the `←` and `→` keys. Pressing `↑` and `↓`, you can call commands
    entered earlier again and change them if necessary.


    After all, you can select a text area using the mouse and then copy it to the
    clipboard by pressing `Ctrl` + `C`. (If a command is currently running, `Ctrl`
    + `C` has a different function: It cancels the execution.) `Ctrl` + `V` inserts
    the current clipboard content at the cursor position.


    If you specify the first letters of a command, the most plausible continuation
    is displayed in gray font. Pressing `→` completes the input. Alternatively, by
    repeatedly pressing `Tab`, you can cycle through additional extension options.
    This feature works in an analogous way for command options as well as for filenames
    in the current directory. `Ctrl` + `C` displays all possible additions at once.


    Shift + Ctrl + P takes you to the command palette, a long list of functions you
    can perform within the terminal. Many functions are related to tab management
    (open, close, switch, rename, etc.) and visual details (font size, color). Not
    only does the Actions dialog sheet list all the keyboard shortcuts, but you can
    also modify them.


    ## 4.3 Calling cmdlets and Functions


    Before you start programming your first scripts, you should interactively familiarize
    yourself with the options provided by PowerShell. The following examples should
    be understandable without basic knowledge. You’ll come across the commands used
    in this process again and again later. Details of individual commands (actually,
    they are cmdlets, but we’ll deal with this term later) can be obtained from Get-Help
    <command name>.


    In the following listing, Get-Location determines the current path. Set-Location
    changes to the Downloads subdirectory where Get-ChildItem determines all files
    that have the *.exe extension. Finally, Remove-Item deletes a setup program.


    ```

    > Get-Location


    Path

    ----

    C:\Users\kofler


    > Set-Location Downloads


    > Get-ChildItem *.exe


    Directory: C:\Users\kofler\Downloads


    Mode                 LastWriteTime         Length Name

    ----                 -------------         ------ ----

    -a---           18.07.2022 17:24       1414600 ChromeSetup.exe

    -a---           19.07.2022 11:49      49381480 Git-2.37.1-64-bit.exe

    -a---           11.01.2023 18:49      25218984 python-3.11.1-amd64.exe


    > Remove-Item ChromeSetup.exe

    ```


    I mentioned at the beginning that PowerShell works with objects. However, this
    functionality is not always apparent at first glance. For example, Get-Date returns
    the current date and time. By default, PowerShell displays only one string that
    summarizes the most important data:


    ```

    > Get-Date


    Wednesday, 5/3/2023 5:11:04 PM

    ```


    Only when you pass the `Get-Date` result to `Get-Member` via the pipe operator
    (|) does it become clear that the result of `Get-Date` has the `System.DateTime`
    data type and knows innumerable properties and methods. (I have greatly abridged
    the issue here for space reasons.)


    ```

    > Get-Date | Get-Member


    TypeName: System.DateTime

    Name              MemberType   Definition

    ----              ----------   ----------

    Add               Method       datetime Add(timespan value)

    AddDays           Method       datetime AddDays(double value)

    AddHours          Method       datetime AddHours(double ...)

    AddMilliseconds   Method       datetime AddMilliseconds(...)

    ...

    Ticks             Property     long Ticks {get;}

    TimeOfDay         Property     timespan TimeOfDay {get;}

    Year              Property     int Year {get;}

    ```


    > **Tip**

    > `Get-Member` often returns an almost endless list of methods and properties.
    On Windows, you can display the result in a separate window using `Get-Member
    | Out-GridView`. Various options for formatting (like `Out-GridView`) or exporting
    cmdlet results will be introduced in Chapter 7, Section 7.6.


    If you don''t need the entire date, but only the year, you should place `Get-Date`
    in parentheses to force an immediate evaluation. From the resulting object, you
    analyze only one property with `.Year`:


    ```

    > (Get-Date).Year


    2023

    ```


    You can use the `AddHours(2)` method to calculate the date and time in 2 hours:


    ```

    > (Get-Date).AddHours(2)


    Wednesday, 5/3/2023 7:13:03 PM

    ```


    ### 4.3.1 cmdlets


    Up until now, I have simply said that you can run “commands” in PowerShell. However,
    PowerShell actually distinguishes between different types of commands—specifically
    among cmdlets, functions, aliases, and conventional commands. By far the most
    important ones are cmdlets, which are commands specially optimized for PowerShell.


    The term “cmdlet” comes from the fact that a cmdlet is not a program of its own,
    but rather, groups of cmdlets are collected in a library. In more technical terms,
    internally, each cmdlet is an instance of a .NET class. This particular way of
    organizing has many advantages. In particular, common functions, such as the processing
    of parameters, do not have to be implemented anew for each cmdlet. In addition,
    the processing of objects thus has a central foundation, which should also make
    it clear that cmdlets are not PowerShell scripts. Libraries with cmdlets are mostly
    programmed in C#.


    ### 4.3.2 The Verb-Noun Terminology


    The names of cmdlets follow a scheme and are composed of a verb and a noun (*verb-noun
    pairs* in the original documentation). The verb describes what the command does,
    the noun which data it processes. Microsoft has even defined a clear set of verbs
    that you should use if you program commands yourself. For example, you should
    always use `Remove` for delete operations, but not `Delete`, `Eliminate`, or `Drop`
    (see [https://docs.microsoft.com/en-us/powershell/scripting/developer/cmdlet/approved-verbs-for-windows-powershell-commands](https://docs.microsoft.com/en-us/powershell/scripting/developer/cmdlet/approved-verbs-for-windows-powershell-commands)).


    > **Case Sensitivity**

    > PowerShell is not case-sensitive when recognizing commands and cmdlet options,
    methods, and properties. For this reason, `(Get-Date).Month` and `(get-date).month`
    both return the number of the current month.


    ### 4.3.3 Aliases


    `Get-ChildItem` may be a generic name for a command that gets the contents of
    a directory, but the typing overhead compared to `dir` or `ls` is considerable.
    Thus, abbreviations (“aliases”) for many cmdlets exist. `dir`, `ls`, and `gci`
    are also allowed instead of `Get-ChildItem`.


