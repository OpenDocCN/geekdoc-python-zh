    \ 或 `||` 进行条件执行会更简洁且节省空间（另见第 3.6 节）。然而，这种表示法会使代码更难理解，尤其是对于不熟悉 Bash 的人。\n\n```\n\
    if condition; then\n    command\nfi\n# 等价形式\nif condition; then command; fi\n\n\
    # 同样等价：如果条件满足\n# 命令将被执行\ncondition && command\n\n# 反向逻辑：如果条件不满足\n# 命令将被执行\ninverse\
    \ condition || command\n```\n\n### 3.11.2 条件\n\n虽然 if 语法很简单，但构建条件则要困难得多。Bash 为此任务提供了多种变体，总结在以下清单中。我稍后会解释这些概念。前导感叹号用于否定条件。\n\
    \n```\nx=5\ntest \"$x\" -gt 3  && echo \"true\"   # -> true\ntest \"$x\" -eq 2\
    \  && echo \"true\"   # (无输出)\n[ \"$x\" -gt 3 ]   && echo \"true\"   # -> true\n\
    [[ \"$x\" -gt 3 ]] && echo \"true\"   # -> true\n(( x > 3 ))      && echo \"true\"\
    \   # -> true\n! (( x > 3 ))    && echo \"true\"   # (无输出)\n```\n\n> **将变量放在引号中！**\n\
    `test $x -gt 3` 在语法上是正确的，但仅当变量非空时才有效。如果 `$x` 没有内容，结果将是 `test -gt 3`。此语句毫无意义并会导致语法错误。这就是为什么你应该养成始终将用于比较的变量放在引号中的习惯！\n\
    \n最原始的形式是使用 `test` 命令。它处理一个或多个参数，其中条件通过选项表示。`-gt` 表示 *大于*，`-eq` 表示 *等于*。你可能想知道为什么\
    \ `test $x > 5` 不起作用。这与 `>` 和 `<` 字符被保留用于输入和输出重定向有关。\n\n除了 `test condition`，还有简写形式\
    \ `[ condition ]`（见表 3.9）。重要的是，方括号前后必须有空格！还要注意，比较运算符取决于数据类型：`-eq` 比较数字，`=` 比较字符串。如果测试表达式中出现变量，其名称必须以\
    \ `$` 为前缀。`dat` 指代文件名字符串。\n\n| 测试表达式 | 含义 |\n| :--- | :--- |\n| `[ var ]` | 如果变量非空则为真\
    \ |\n| `[ -n var ]` | 同上 |\n| `[ zk1 = zk2 ]` | 如果字符串匹配则为真 |\n| `[ z1 -eq z2 ]`\
    \ | 如果数字相等（*等于*） |\n| `[ z1 -ne z2 ]` | 如果数字不相等（*不等于*） |\n| `[ z1 -gt z2 ]` |\
    \ 如果 z1 大于 z2（*大于*） |\n| `[ z1 -ge z2 ]` | 如果 z1 大于或等于 z2（*大于等于*） |\n| `[ z1 -lt\
    \ z2 ]` | 如果 z1 小于 z2（*小于*） |\n| `[ z1 -le z2 ]` | 如果 z1 小于或等于 z2（*小于等于*） |\n\
    | `[ -d dat ]` | 如果 dat 是一个目录（*目录*） |\n| `[ -f dat ]` | 如果 dat 是一个文件（*文件*） |\n\
    | `[ -r dat ]` | 如果文件可读（*读*） |\n| `[ -w dat ]` | 如果文件可写（*写*） |\n| `[ dat1 -nt\
    \ dat2 ]` | 如果文件 1 比文件 2 新（*比...新*） |\n| `! [ ... ]` | 否定条件 |\n\n表 3.9 使用 [ ]\
    \ 构建条件的最重要语法变体\n\n`[ condition ]` 在大多数 shell 变体中可用。Bash 和 Zsh 还允许将条件放在双中括号之间，例如\
    \ `[[ condition ]]`（见表 3.10）。在模式中，你可以使用 globbing 中已知的字符（即 `*`、`?` 和 `[a-z]`）。\n\
    \n| 测试表达式 | 含义 |\n| :--- | :--- |\n| `[[ zk = pattern ]]` | 如果字符串匹配模式则为真 |\n|\
    \ `[[ zk == pattern ]]` | 同上 |\n| `[[ zk =~ regex ]]` | 如果正则表达式为真则为真（见第 9 章） |\n\
    | `[[ bed1 && bed2 ]]` | 如果两个条件都满足（*与*） |\n| `[[ bed1 || bed2 ]]` | 如果至少一个条件满足（*或*）\
    \ |\n\n表 3.10 Bash 特有的使用 [[ ]] 构建条件\n\n在以下示例中，myvar 必须包含类似 A17 或 C99 的代码：\n\n\
    ```\nif [[ \"$myvar\" == [ABC][0-9][0-9] ]]; then\n    echo \"ok\"\nfi\n```\n\n\
    > **兼容性注意事项**\n[[ ]] 语法并非所有 shell 都支持（但 Zsh 支持）。如果你省略 [[ ]]，可以提高脚本的兼容性。一些 Bash\
    \ 特有的附加功能可以轻松替换：例如，`[[ bed1 && bed2 ]]` 对应于 `[ bed1 ] && [ bed2 ]`，`[[ bed1 ||\
    \ bed2 ]]` 对应于 `[ bed1 ] || [ bed2 ]`。\n\n前面在第 3.9 节介绍的用于数学表达式的 (( )) 表示法也可用于构建条件。允许使用可读的比较运算符，如\
    \ `<`、`>` 或 `!=`。在双括号内，你可以省略变量的 `$` 标记，如以下示例所示：\n\n```\nx=5\n(( x == 5 )) && echo\
    \ \"true\"  # -> true\n```\n\n确保不要意外使用 `=` 进行比较：`(( var = value ))` 执行赋值并始终返回\
    \ \"true\"！\n\n```\nx=5\n(( x = 6 )) && echo \"true\"  # -> true\necho $x    \
    \                 # -> 6 !!\n```\n\n当变量完全未声明时也要小心。Bash 会假定其值为 0，并且既不显示警告也不显示错误：\n\
    \n```\n# 始终为真，Bash 假定 emptyvar=0\nif (( emptyvar < 100 )); then ...\n```\n\n###\
    \ 3.11.3 使用 case 的分支\n\n分支也可以使用 `case` 来构建，它将一个表达式（通常只是变量的内容）与不同的模式进行比较。模式可以包含\
    \ globbing 字符 `*` 和 `?`，以及像 `[a-z]` 这样的字符范围。和往常一样，Bash 的语法需要一些时间来适应：\n\n```\n\
    case expression in\n    pattern1)\n        command1a\n        command1b\n    \
    \    ...\n        ;;\n    pattern2)\n        command2a\n        command2b\n  \
    \      ...\n        ;;\n    *)          # 默认块（可选）\n        ...\nesac\n```\n\n\
    缩进和 `pattern)` 后新行的开始是可选的，但能提高可读性。双分号结束 `case` 结构。如果你故意省略分号或只是忘记了，Bash 会默认继续执行\
    \ `case` 结构。如果 Bash 检测到"
