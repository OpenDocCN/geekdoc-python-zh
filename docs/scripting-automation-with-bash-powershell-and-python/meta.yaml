    \n```\nif xxx:\n    statement1a\n    statement1b\nelse:\n    statement2a\n   \
    \ statement2b\n    statement2c\n```\n\n如果满足条件 `xxx`，则执行语句 1a 和 1b；如果不满足条件，则执行语句\
    \ 2a、2b 和 2c。关于 `if` 和 `else` 的更多细节将在 [第 5.11 节](#section-5-11) 中介绍。\n\n代码的缩进在\
    \ Python 中不像在其他编程语言中那样是可选的，而是语法的一部分！没有严格的规则规定缩进的程度：1 个字符就够了，但通常使用 4 个字符。当你使用使用制表符进行缩进的编辑器时，你应该小心。Python\
    \ 假定制表符位置在 8 个字符的倍数处。如果你在编辑器中设置了不同的制表符宽度，并且混合使用制表符和空格字符，那么 Python 在解释缩进时可能会感到困惑。最佳实践是将编辑器设置为仅使用空格而不使用制表符。\n\
    \n你也可以在块元素之后直接指定代码。在简单情况下，可以这样构造单行条件或循环：\n\n```\nif xxx: statement\n```\n\n如有必要，你可以这样在一行中运行多个语句：\n\
    \n```\nif xxx: statement1; statement2; statement3\n```\n\n### 5.4.2 注释\n\n简单的注释以\
    \ # 字符开头，并延伸到行尾（EOL）：\n\n```\n# a comment\nprint(\"abc\")  # another comment\n\
    ```\n\n你可以使用 \"\"\" 创建多行注释，如以下示例所示：\n\n```\n\"\"\" a long\n    comment \"\"\"\n\
    ```\n\n## 5.5 数字\n\n在下一节中，我将基于示例解释如何使用基本的 Python 数据类型和数据结构。我想从整数和浮点数开始。基本的算术运算在\
    \ Python 中的功能与在任何其他编程语言中一样：\n\n```\n>>> 7+12\n    19\n>>> 3*6\n    18\n>>> 100-3*5\n\
    \    85\n```\n\n有趣的是，Python 对整数没有限制。例如，2**100 计算 2<sup>100</sup>。然而，结果不是只有 16\
    \ 位有效数字的浮点数，而仍然是没有任何精度损失的整数。（你也可以计算 2<sup>10000</sup>。结果有超过 3,000 位数字，这对 Python\
    \ 来说不是问题！）\n\n```\n>>> 2 ** 100   # corresponds to 2^100\n    1267650600228229401496703205376\n\
    ```\n\n在 Python 中，除法总是以浮点运算执行。如果你明确想要整数除法，你应该使用 // 运算符。百分号返回整数除法的余数。\n\n```\n\
    >>> 17 / 4    # Python always performs floating point divisions\n4.25\n>>> 17\
    \ // 4   # Use // for integer divisions\n4\n>>> 17 % 4    # % returns the remainder\
    \ of an integer division\n1\n```\n\n你可以用十六进制表示法（0xnnn）编写数字，或者使用 `hex` 方法将其转换为十六进制表示法的字符串：\n\
    \n```\n>>> 0xff\n255\n>>> hex(240)\n'0xf0'\n```\n\n### 5.5.1 浮点数\n\n如果表达式中只有一个数字是浮点数，Python\
    \ 就会以浮点运算执行整个计算。精度为 16 位。\n\n```\n>>> 12.0 - 2*3\n6.0\n>>> 100 / 7\n14.285714285714286\n\
    ```\n\n许多数学函数和常量位于 `math` 模块中，该模块必须在首次使用前导入：\n\n```\n>>> import math         \
    \ # load math module\n>>> math.sqrt(2)\n1.4142135623730951\n>>> math.sin(math.pi\
