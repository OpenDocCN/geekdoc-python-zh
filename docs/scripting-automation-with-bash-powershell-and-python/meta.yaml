  md: "# 4.5.6 Differentiating Between PowerShell Versions\n\nOn many computers, PowerShell\
    \ versions 5.n and 7.n are installed in parallel. Nevertheless, all scripts share\
    \ the *.ps1 file extension. If your code explicitly requires a specific PowerShell\
    \ version or has other requirements, you must include one or more #Requires statements\
    \ in the script:\n\n+   - **#Requires -Version <n>**\n  The script can be executed\
    \ only with the specified or a newer version.\n- **#Requires -PSEdition Core**\n\
    \  The script can be executed only with the core variant (applies to all PowerShell\
    \ versions from 6.0).\n- **#Requires -PSEdition Desktop**\n  The script can be\
    \ executed only with the desktop variant (all Windows PowerShell versions up to\
    \ and including 5.1).\n- **#Requires -Modules <name>**\n  The script requires\
    \ the specified module.\n- **#Requires -RunAsAdministrator**\n  The script can\
    \ only be executed with admin rights.\n\n#Requires statements can be placed anywhere\
    \ in the script.\n\n# 4.6 Variables, Strings, and Objects\n\nYou made your first\
    \ acquaintance with PowerShell variables in the previous section. Basically, handling\
    \ variables is quite simple: With $Name = . . . you can assign content to a variable.\
    \ Later, you can use this content again. To output the contents of a variable,\
    \ you can use Write-Output; an even easier approach is to name the variable or\
    \ a string as a standalone statement. Note that variables in strings that are\
    \ between double quotation marks are replaced by their contents. More details\
    \ about handling strings will follow later.\n\n```\n> $UserName = \"Michael\"\n\
    \n> Write-Output $UserName\nMichael\n\n> $UserName\nMichael\n\n> $UserId = 123\n\
    \n> Write-Output \"$UserName has the ID $UserId.\"\nMichael has the ID 123.\n\
    ```"
