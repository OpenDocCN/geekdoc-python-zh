  - "[PAGE 324]\n\nthe **Settings** program. You can find the *OpenSSH client* and\
    \ the *OpenSSH server*—well hidden—under **Apps • Optional features • Add an optional\
    \ feature**. (Why the program can’t simply be installed via the Microsoft Store\
    \ defies any logic. But I won’t complain here; it’s great that Microsoft finally\
    \ offers an official SSH client and server, making the installation of the dreadfully\
    \ outdated PuTTY program unnecessary.)\n\nYou can run the SSH client with the\
    \ `ssh` command in the terminal after the installation. With regard to the SSH\
    \ server, one more step is necessary. The program is installed but is not yet\
    \ running as a service. The solution is the **Services** program, which you can\
    \ find in the **Start** menu. Search for the *OpenSSH Server* item and double-click\
    \ to open the settings dialog. Then, click the **Start** button to start the server\
    \ service for the first time. You also must set **Startup type = Automatic** to\
    \ always activate the service when the computer boots up in the future.\n\nInstead\
    \ of clicking through settings dialogs, you can also perform the installation\
    \ and service startup in the terminal with the following commands:\n\n```\n> Add-WindowsCapability\
    \ -Online -Name OpenSSH.Client\n> Add-WindowsCapability -Online -Name OpenSSH.Server\n\
    > Start-Service sshd\n> Set-Service -Name sshd -StartupType 'Automatic'\n```\n\
    \nIf you then log on to your Windows computer from an external computer via SSH,\
    \ you’ll abruptly land in the IT Stone Age. Inexplicably, the SSH server uses\
    \ `cmd.exe` as the default shell. To enable you to use PowerShell within the SSH\
    \ session, you must run `pwsh`.\n\nFor PowerShell to be used automatically on\
    \ every SSH login, you must modify a registry entry. You can achieve this task\
    \ using the following three commands, which must be executed with admin rights\
    \ in a terminal:\n\n```\n> $PSPATH = (Get-Command -Name pwsh).path\n> New-Item\
    \ \"HKLM:\\Software\\OpenSSH\" -Force\n> New-ItemProperty \"HKLM:\\SOFTWARE\\\
    OpenSSH\" -Name DefaultShell `\n    -Value \"$PSPATH\" -PropertyType String -Force\n\
    ```\n\n> **Suddenly \"Permission Denied\" Displays at SSH Login**\n\nIf the location\
    \ where `pwsh.exe` is stored changes during a PowerShell update or during a new\
    \ PowerShell installation, the SSH server can no longer start PowerShell. However,\
    \ the error message in such cases is meaningless: *Permission denied*.\n\nThis\
    \ problem can stem from countless reasons, from the wrong password to the incorrect\
    \ configuration of `opensshd_config`. However, one possible cause of errors is\
    \ a changed path to `pwsh.exe`."
- md: "## 12.1.4 Using an Editor in an SSH Session\n\nOn Linux or macOS, the matter\
    \ is trivial: To modify a file directly in an SSH session, you simply need to\
    \ launch an editor. `nano` and `vim` are almost always available. If required,\
    \ you can separately install countless other editors such as `emacs`, `joe`, or\
    \ `zile`.\nOn Windows, however, the concept of an editor without a GUI is still\
    \ unknown today, and no suitable program is available by default. Things change\
    \ once you install Git because Git Bash with the `vim` and `nano` editors usually\
    \ is installed as well. Starting the two programs can be done in the following\
    \ ways:\n\n```\n> & \"C:\\Program Files\\Git\\usr\\bin\\nano.exe\" myscript.ps1\n\
    > & \"C:\\Program Files\\Git\\usr\\bin\\vim.exe\" myscript.ps1\n```\n\nBy the\
    \ way, including `C:\\Program Files\\Git\\usr\\bin` in `Path` variables is not\
    \ recommended. In this directory, countless Linux tools like `cd`, `ls`, `cp`,\
    \ and so on are installed, and since these names are also commonly used as PowerShell\
    \ aliases, this duplication can cause problems. Better to include a function in\
    \ the profile file to call your editor (see `$PROFILE` for the path):\n\n```\n\
    # in the $PROFILE file (usually C:\\Users\\<name>\\Documents\\PowerShell\\Microsoft.PowerShell_profile.ps1)\n\
    function nano {\n    & \"C:\\Program Files\\Git\\usr\\bin\\nano.exe\" $args\n\
    }\n```\n\nYou may need to adjust the installation path. As a result, to modify\
    \ a script file, you can then run `nano` in an SSH session in the following way:\n\
    \n```\n> nano myscript.ps1\n```\n\nA conceivable alternative is to use VS Code\
    \ through an SSH connection (see [Chapter 13, Section 13.3](#)).\n\n## 12.1.5\
    \ Securing an SSH Server\n\nThe SSH server is a popular target for hackers who\
    \ often try to guess a combination of login name and password. (The attack is\
    \ not carried out manually, of course, but by automated tools.) The most popular\
    \ attack target on Linux servers is the `root` account.\nSome elementary safeguards\
    \ you should keep in mind include the following:\n\n- Use good passwords (at least\
    \ 10 characters) for *all* accounts.\n- Block the `root` login (`PermitRootLogin\
    \ no` in `/etc/ssh/sshd_config`).\n- Install the *Fail2ban* program, which blocks\
    \ IP addresses for a few minutes after several failed login attempts.\n- Use an\
    \ authentication with keys instead of passwords, which we will discuss further\
    \ in [Section 12.4](#section-12.4).\n\n## 12.2 Working with SSH\n\nUnless you\
    \ have some practical experience, you should first familiarize yourself with the\
    \ `ssh` command (the SSH client). For this task, open a terminal and execute the\
    \ following command:\n\n```\n> ssh user@hostname\n\nThe authenticity of host 'hostname\
    \ (123.124.125.126)'\ncan't be established. ECDSA key fingerprint is\nSHA256:E3IH3O27Bc+5DvsvtenJkma1v5nI3owgO8ZZqUR2BYk.\n\
    Are you sure you want to continue connecting? yes\nWarning: Permanently added\
    \ 'hostname,123.124.125.126' (ECDSA)\nto the list of known hosts.\n\nuser@hostname's\
    \ password: *********\nuser@hostname$ grep VERSION /etc/os-release\n\nVERSION=\"\
    20.04.5 LTS (Focal Fossa)\"\nVERSION_ID=\"20.04\"\nVERSION_CODENAME=focal\n\n\
    user@hostname$ exit\n```\n\nReplace `user` with the account name on the relevant\
    \ computer and `hostname` with the network name of the computer or its IP address.\
    \ If the account names on the local machine and the remote host match, you can\
    \ omit this step and just run `ssh hostname`. For authentication, you must enter\
    \ the password of the account on the remote computer (not your local password!).\n\
    \nTo get familiar with SSH, simply specify `localhost` instead of the hostname\
    \ (i.e., `ssh localhost`). This step establishes an SSH connection to the local\
    \ machine, testing both the SSH client and the local SSH server.\n\nAfter successful\
    \ login, you can run commands on the external computer. In the previous listing,\
    \ I used `grep` to get the version of the installed Linux distribution. Entering\
    \ `exit` or pressing `Ctrl` + `D` will terminate the SSH session.\n\n### 12.2.1\
    \ Host Verification\n\nThe first time you connect to a host, the SSH client asks\
    \ if you trust that host (see the previous listing). To be honest, you don't have\
    \ many options there because only if you agree can you continue with the login\
    \ process. If you have set up the external computer yourself or know the administrator,\
    \ you could check if the \"fingerprint\" (i.e., the short form) of the server's\
    \ SSH key matches. To get the fingerprint of a server, you must run the following\
    \ command there, again replacing `hostname` with the actual computer name:\n\n\
    ```\n$ ssh-keyscan hostname | ssh-keygen -lf -\n\n    256 SHA256:Sma6TJ79bONK8PMISjxPIYUi...MK3HQ\
    \ hostname (ED25519)\n   2048 SHA256:i9FlmpRieIFIEHNfHSzFgjp4...Y3Zm0 hostname\
    \ (RSA)\n    256 SHA256:E3IH3027Bc+5DvsvtenJkma1...R2BYk hostname (ECDSA)\n```\n\
    \n### 12.2.2 Potential Issues and Their Cause\n\nOn many Linux distributions,\
    \ SSH login for `root` is blocked for security reasons or only allowed if authentication\
    \ is done with keys (Section 12.4). The recommended procedure for doing admin\
    \ work via SSH is to login with a different account and then use `sudo` in the\
    \ session. As an alternative, you can explicitly allow `root` login by making\
    \ an adjustment in the `/etc/ssh/sshd_config` file on the computer that runs the\
    \ SSH server. Changes to this file won't take effect until you ask the SSH server\
    \ to `reload` the file (`systemctl reload sshd` on Linux).\n\nSSH logins to local\
    \ virtual machines may fail due to network connectivity. Oracle VM VirtualBox\
    \ in particular causes problems in this regard. With VirtualBox, virtual machines\
    \ are connected to the local network via *Network Address Translation* (NAT),\
    \ while SSH is blocked. The solution is port forwarding. You find a good tutorial\
    \ on this topic at <https://www.simplified.guide/virtualbox/port-forwarding>.\n\
    \nThe SSH client remembers the hostname or IP address of the server and the key\
    \ used by the server each time it logs in. If the key changes (e.g., in the course\
    \ of a new installation of the server), the `ssh` command displays a drastic error\
    \ message and blocks the login:\n\n```\nWARNING: REMOTE HOST IDENTIFICATION HAS\
    \ CHANGED!\nIT IS POSSIBLE THAT SOMEONE IS DOING SOMETHING NASTY!\nSomeone could\
    \ be eavesdropping on you right now\n(man-in-the-middle attack)!\n```\n\nIf you\
    \ know that the affected server has been newly set up, the warning does not apply.\
    \ However, you must find and delete the line for the relevant hostname or IP address\
    \ in the local `.ssh/known_hosts` file. The next time you log in, you'll be asked\
    \ whether you trust the server.\n\n### 12.2.3 Running Linux and macOS Commands\n\
    \nInstead of using `ssh` interactively, you can run a command directly on the\
    \ remote computer. The command and its parameters are passed as parameters to\
    \ `ssh`. `grep` is not executed on the local machine here, but on a remote Linux\
    \ or macOS host.\n\n```\n> ssh user@linuxhost 'grep VERSION /etc/os-release'\n\
    \nuser@linuxhost's password: *********\n\nVERSION=\"20.04.5 LTS (Focal Fossa)\"\
    \nVERSION_ID=\"20.04\"\nVERSION_CODENAME=focal\n```\n\nFar-reaching possibilities\
    \ arise from this seemingly trivial function: For example, you can now run `tar`\
    \ on the remote machine or forward the archive of the `data` directory to standard\
    \ output (specify a hyphen `-` after the `-f` option, such as `-f -`). You can\
    \ forward the standard output using `|` as input for a second `tar` command that\
    \ runs locally. This capability allows you to transfer an entire directory tree\
    \ securely from one machine to another via SSH.\n\n```\n$ ssh user@hostname 'tar\
    \ -czf - data' | tar -xzC ~/copy/ -f -\n```\n\nTo execute multiple commands via\
    \ `ssh` in a Bash script, the best approach is to use the heredoc syntax (see\
    \ Chapter 3, Section 3.9). The `-T` option prevents `ssh` from opening a pseudo-terminal,\
    \ which is not desirable in this case because the execution of commands should\
    \ not be interactive.\n\n```\nssh -T root@host <<ENDSSH\nrm -f /etc/file1\ncp\
    \ /root/file2 /userxy/file3\n...\nENDSSH\n```"
  mdcn: "## 12.1.4 在 SSH 会话中使用编辑器\n\n在 Linux 或 macOS 上，这很简单：要直接在 SSH 会话中修改文件，你只需启动一个编辑器。`nano`\
    \ 和 `vim` 几乎总是可用的。如果需要，你还可以单独安装无数其他编辑器，例如 `emacs`、`joe` 或 `zile`。\n然而，在 Windows\
    \ 上，没有图形用户界面的编辑器概念至今仍不为人知，默认情况下也没有合适的程序。一旦你安装了 Git，情况就会改变，因为通常也会安装带有 `vim` 和 `nano`\
    \ 编辑器的 Git Bash。启动这两个程序可以通过以下方式完成：\n\n```\n> & \"C:\\Program Files\\Git\\usr\\\
    bin\\nano.exe\" myscript.ps1\n> & \"C:\\Program Files\\Git\\usr\\bin\\vim.exe\"\
    \ myscript.ps1\n```\n\n顺便说一下，不建议将 `C:\\Program Files\\Git\\usr\\bin` 包含在 `Path`\
    \ 变量中。在此目录中安装了无数 Linux 工具，如 `cd`、`ls`、`cp` 等，由于这些名称也常用作 PowerShell 别名，这种重复可能会导致问题。最好在配置文件中包含一个函数来调用你的编辑器（路径请参见\
    \ `$PROFILE`）：\n\n```\n# 在 $PROFILE 文件中（通常是 C:\\Users\\<name>\\Documents\\PowerShell\\\
    Microsoft.PowerShell_profile.ps1）\nfunction nano {\n    & \"C:\\Program Files\\\
    Git\\usr\\bin\\nano.exe\" $args\n}\n```\n\n你可能需要调整安装路径。这样，要修改脚本文件，你就可以在 SSH 会话中以如下方式运行\
    \ `nano`：\n\n```\n> nano myscript.ps1\n```\n\n一个可以想象的替代方案是通过 SSH 连接使用 VS Code（参见[第\
    \ 13 章，第 13.3 节](#)）。\n\n## 12.1.5 保护 SSH 服务器\n\nSSH 服务器是黑客的热门目标，他们经常试图猜测登录名和密码的组合。（当然，攻击不是手动进行的，而是通过自动化工具。）Linux\
    \ 服务器上最受欢迎的攻击目标是 `root` 账户。\n你应该牢记的一些基本防护措施包括：\n\n-   为*所有*账户使用强密码（至少 10 个字符）。\n\
    -   禁止 `root` 登录（在 `/etc/ssh/sshd_config` 中设置 `PermitRootLogin no`）。\n-   安装 *Fail2ban*\
    \ 程序，该程序会在几次登录尝试失败后阻止 IP 地址几分钟。\n-   使用密钥认证代替密码，我们将在[第 12.4 节](#section-12.4)中进一步讨论。\n\
    \n## 12.2 使用 SSH\n\n除非你有一些实践经验，否则你应该首先熟悉 `ssh` 命令（SSH 客户端）。为此，请打开一个终端并执行以下命令：\n\
    \n```\n> ssh user@hostname\n\nThe authenticity of host 'hostname (123.124.125.126)'\n\
    can't be established. ECDSA key fingerprint is\nSHA256:E3IH3O27Bc+5DvsvtenJkma1v5nI3owgO8ZZqUR2BYk.\n\
    Are you sure you want to continue connecting? yes\nWarning: Permanently added\
    \ 'hostname,123.124.125.126' (ECDSA)\nto the list of known hosts.\n\nuser@hostname's\
    \ password: *********\nuser@hostname$ grep VERSION /etc/os-release\n\nVERSION=\"\
    20.04.5 LTS (Focal Fossa)\"\nVERSION_ID=\"20.04\"\nVERSION_CODENAME=focal\n\n\
    user@hostname$ exit\n```\n\n将 `user` 替换为相关计算机上的账户名，将 `hostname` 替换为计算机的网络名称或其\
    \ IP 地址。如果本地计算机和远程主机上的账户名匹配，你可以省略此步骤，只需运行 `ssh hostname`。进行身份验证时，你必须输入远程计算机上账户的密码（而不是你的本地密码！）。\n\
    \n要熟悉 SSH，只需指定 `localhost` 而不是主机名（即 `ssh localhost`）。此步骤会建立到本地机器的 SSH 连接，测试 SSH\
    \ 客户端和本地 SSH 服务器。\n\n成功登录后，你可以在外部计算机上运行命令。在前面的列表中，我使用了 `grep` 来获取已安装 Linux 发行版的版本。输入\
    \ `exit` 或按 `Ctrl` + `D` 将终止 SSH 会话。\n\n### 12.2.1 主机验证\n\n第一次连接到主机时，SSH 客户端会询问你是否信任该主机（参见前面的列表）。老实说，你没有太多选择，因为只有同意才能继续登录过程。如果你自己设置了外部计算机或认识管理员，你可以检查服务器\
    \ SSH 密钥的“指纹”（即简短形式）是否匹配。要获取服务器的指纹，你必须在该服务器上运行以下命令，同样将 `hostname` 替换为实际的计算机名称：\n\
    \n```\n$ ssh-keyscan hostname | ssh-keygen -lf -\n\n    256 SHA256:Sma6TJ79bONK8PMISjxPIYUi...MK3HQ\
    \ hostname (ED25519)\n   2048 SHA256:i9FlmpRieIFIEHNfHSzFgjp4...Y3Zm0 hostname\
    \ (RSA)\n    256 SHA256:E3IH3027Bc+5DvsvtenJkma1...R2BYk hostname (ECDSA)\n```\n\
    \n### 12.2.2 潜在问题及其原因\n\n在许多 Linux 发行版上，出于安全原因，`root` 的 SSH 登录被阻止，或者仅在使用密钥进行身份验证时才允许（第\
    \ 12.4 节）。通过 SSH 进行管理工作的推荐程序是使用不同的账户登录，然后在会话中使用 `sudo`。作为替代方案，你可以通过在运行 SSH 服务器的计算机上调整\
    \ `/etc/ssh/sshd_config` 文件来明确允许 `root` 登录。对此文件的更改在你要求 SSH 服务器 `reload` 文件之前不会生效（在\
    \ Linux 上使用 `systemctl reload sshd`）。\n\n到本地虚拟机的 SSH 登录可能因网络连接问题而失败。特别是 Oracle\
    \ VM VirtualBox 在这方面会引起问题。使用 VirtualBox 时，虚拟机通过*网络地址转换*（NAT）连接到本地网络，而 SSH 被阻止。解决方案是端口转发。你可以在\
    \ <https://www.simplified.guide/virtualbox/port-forwarding> 找到关于此主题的优秀教程。\n\n\
    SSH 客户端会记住每次登录时服务器的主机名或 IP 地址以及服务器使用的密钥。如果密钥发生变化（例如，在服务器重新安装过程中），`ssh` 命令会显示一条严重的错误消息并阻止登录：\n\
    \n```\nWARNING: REMOTE HOST IDENTIFICATION HAS CHANGED!\nIT IS POSSIBLE THAT SOMEONE\
    \ IS DOING SOMETHING NASTY!\nSomeone could be eavesdropping on you right now\n\
    (man-in-the-middle attack)!\n```\n\n如果你知道受影响的服务器是新设置的，则该警告不适用。但是，你必须在本地 `.ssh/known_hosts`\
    \ 文件中找到并删除相关主机名或 IP 地址的行。下次登录时，系统会询问你是否信任该服务器。\n\n### 12.2.3 运行 Linux 和 macOS\
    \ 命令\n\n你可以直接在远程计算机上运行命令，而不是交互式地使用 `ssh`。命令及其参数作为参数传递给 `ssh`。`grep` 不是在本地机器上执行，而是在远程\
    \ Linux 或 macOS 主机上执行。\n\n```\n> ssh user@linuxhost 'grep VERSION /etc/os-release'\n\
    \nuser@linuxhost's password: *********\n\nVERSION=\"20.04.5 LTS (Focal Fossa)\"\
    \nVERSION_ID=\"20.04\"\nVERSION_CODENAME=focal\n```\n\n这个看似简单的功能带来了深远的可能性：例如，你现在可以在远程机器上运行\
    \ `tar`，或者将 `data` 目录的归档转发到标准输出（在 `-f` 选项后指定连字符 `-`，例如 `-f -`）。你可以使用 `|` 将标准输出作为第二个本地运行的\
    \ `tar` 命令的输入进行转发。此功能允许你通过 SSH 将整个目录树从一台机器安全地传输到另一台机器。\n\n```\n$ ssh user@hostname\
    \ 'tar -czf - data' | tar -xzC ~/copy/ -f -\n```\n\n要在 Bash 脚本中通过 `ssh` 执行多个命令，最好的方法是使用\
    \ heredoc 语法（参见第 3 章，第 3.9 节）。`-T` 选项可防止 `ssh` 打开伪终端，这在本例中是不可取的，因为命令的执行不应该是交互式的。\n\
    \n```\nssh -T root@host <<ENDSSH\nrm -f /etc/file1\ncp /root/file2 /userxy/file3\n\
    ...\nENDSSH\n```"
