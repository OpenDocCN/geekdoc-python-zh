  md: 'first (see *https://brew.sh*). Then, you can install Bash in the terminal using
    the `brew install bash` command. To start Bash, run `/opt/homebrew/bin/bash`.


    The installation of Bash is only difficult on Windows. In this section, we''ll
    present different ways you can use Bash on Windows. All of these options have
    their benefits and drawbacks. But let me say this first: No variant is really
    ideal.


    # 3.2.1 Using Bash in a Virtual Machine


    Perhaps the most straightforward way to using Bash is to install a common Linux
    distribution (e.g., Ubuntu) in a virtualization program (i.e., in Oracle VM VirtualBox,
    VMWare, or Microsoft Hyper-V). Inside the virtual machine, you''ll then have Bash
    available in the terminal window.


    For learning Bash, this solution is ideal. However, you cannot access the Windows
    file system via your scripts. For example, if you develop a script that processes
    image files, you can apply the script only to files within the Linux file system.
    (Some virtualization systems allow you to share a directory between Windows and
    the Linux virtual installation. Especially with VirtualBox, however, the procedure
    is quite cumbersome.)


    Another disadvantage of the virtualization solution is that you''re actually no
    longer working on Windows, but on Linux. You''ll have to get used to an unfamiliar
    desktop and get at least a little bit into Linux administration. But you do want
    to learn Bash though, don''t you? (From my very personal point of view, using
    Linux is an advantage, not a disadvantage. But I don''t plan to elaborate the
    virtues of Linux here.)


    Another argument speaks against the virtualization solution: The free and therefore
    correspondingly popular VirtualBox program, in my experience, often causes trouble
    on computers that are used for software development. This problem stems from the
    fact that various Hyper-V functions are active on such computers. Theoretically,
    VirtualBox should be compatible with it, but in real life, that''s more often
    not the case.


    # 3.2.2 Windows Subsystem for Linux


    From my point of view, the best solution for using Bash on Windows is provided
    by the *Windows Subsystem for Linux* (WSL). This function allows Linux to be run
    in a terminal window. What''s great about this approach is that you can access
    your Linux files in Windows and your Windows files just as easily in WSL. (In
    current WSL versions, you can even run Linux in graphics mode. But for our purposes
    that isn''t necessary at all.)


    The latest version of WSL is available free of charge from the Microsoft Store.
    After installation, followed by a mandatory Windows restart, you must search again
    for *Ubuntu 22.04 LTS* (or from April 2024 for the then current version 24.04)
    in the Microsoft Store. The installation process and your first start should take
    about two minutes. You''ll have to enter a password twice, and you must make sure
    you remember this password! You''ll need it later when you want to install additional
    software components'
