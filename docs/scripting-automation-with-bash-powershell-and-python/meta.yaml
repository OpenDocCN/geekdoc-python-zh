- md: "## 3.8.1 Recursive Globbing\n\nThe `**` character combination recursively covers\
    \ all (sub)directories. Thus, `ls **/*.pdf` has a similar meaning as the search\
    \ command `find . -name '*.pdf'`. Because recursive searching of all directories\
    \ can take a lot of time, this behavior is disabled by default. Before you can\
    \ use this function, you must activate it via `shopt -s globstar`. The following\
    \ example copies all PDF files to the `all-my-pdfs` directory:\n\n```\nshopt -s\
    \ globstar\nmkdir all-my-pdfs\ncp **/*.pdf all-my-pdfs\n```\n\n## 3.8.2 Access\
    \ to Important Directories\n\nAside from globbing rules, short notations are available\
    \ for accessing frequently needed directories (see Table 3.4).\n\n| Character\
    \ | Meaning |\n|---|---|\n| . | The current directory |\n| .. | The parent directory\
    \ |\n| ~ | Your own home directory |\n| ~name | The home directory of name |\n\
    \n**Table 3.4** Short Notations for Important Directories\n\n## 3.8.3 Brace Extension\n\
    \nIn Bash, you can formulate enumerations separated by commas or ranges created\
    \ via `...` in curly brackets. Before the command gets executed, all possible\
    \ combinations are created, so the expression specified in parentheses is “expanded.”\
    \ Unlike globbing, however, the brace extension does not consider whether corresponding\
    \ files already exist or not. The easiest way to understand the mechanism is by\
    \ looking at some examples:\n\n```\necho {a..f}.txt\na.txt b.txt c.txt d.txt e.txt\
    \ f.txt\n\necho /{etc,usr,var}\n/etc /usr /var\n\necho {1..3}{a,e,i,o,u}\n1a 1e\
    \ 1i 1o 1u 2a 2e 2i 2o 2u 3a 3e 3i 3o 3u\n```\n\nAt first glance, brace extensions\
    \ seem like a gimmick. However, applications do indeed exist: Imagine you want\
    \ to create a subdirectory for each month of the current year (determined via\
    \ `date '+%Y'`). In Bash, this task is a one-liner:\n\n```\nmkdir -p $(date '+%Y')/{01..12}\n\
    ```\n\nIn this case, `$(date ...)` returns the result of this command. Not only\
    \ does the `-p` option with `mkdir` cause individual directories to be created,\
    \ but also entire directory strings if required (for the year 2023, therefore,\
    \ first 2023 and then 01, 02, etc.).\n\nThe brace extension can also be used to\
    \ create loops, with `i` being a variable in this case. Basic principles about\
    \ variables and loops will follow in Section 3.9 and in Section 3.12:\n\n```\n\
    for i in {1..10}; do echo $i; done\n1\n2\n...\n```\n\n## 3.8.4 Filenames and Directory\
    \ Names with Spaces\n\nIn Bash, parameters passed to a command are separated by\
    \ spaces. `cp a.txt b.txt /my/directory` copies the files `a.txt` and `b.txt`\
    \ into one directory.\n\nThis behavior becomes an issue if files themselves contain\
    \ spaces. (Die-hard Linux users do their best to avoid this case!) For instance,\
    \ `cp filename with blanks.txt /my/directory` thinks you want to copy the three\
    \ files `filename`, `with` and `blanks.txt`, and does not recognize that `filename\
    \ with blanks.txt` is one file. To clarify this ambiguity, you need to put the\
    \ name in question in quotation marks, such as:\n\n```\ncp \"filename with blanks.txt\"\
    \ /my/directory\n```\n\nAlthough at this point it is again an anticipation of\
    \ the loops that have not yet been discussed at all (Section 3.12): The quotation\
    \ marks are also necessary if you process files automatically. Thus, the globbing\
    \ expression `*.txt` may well provide filenames with spaces. The following loop,\
    \ which should simply display detailed information about each corresponding file,\
    \ then triggers errors:\n\n```\n# triggers errors if *.txt file contains spaces\n\
    for fn in *.txt; do ls -l $fn; done\n```\n\nThe code does not work correctly until\
    \ you enclose the `fn` variable in quotes in the `ls` command:\n\n```\n# correct\
    \ variant of the previous example\nfor fn in *.txt; do ls -l \"$fn\"; done\n```\n\
    \nThe situation gets even more complicated if the parameters passed to a Bash\
    \ script are to be analyzed and filenames with spaces exist. Correct processing\
    \ will only succeed if you change the Bash variable `IFS` upfront (Section 3.9\
    \ and Section 3.12).\n\n## 3.9 Variables\n\nDealing with variables in Bash takes\
    \ some getting used to, especially if you have worked in other, “higher-level”\
    \ programming languages. I want to start with three basic rules:\n\n- Variable\
    \ names must usually be preceded by a dollar sign when analyzed (when reading),\
    \ but not when assigned (when writing). As you’ll see, exceptions to this rule\
    \ exist.\n- With the `myvar=value` assignment, no blanks are allowed before and\
    \ after the `=` character.\n- Bash variables usually store strings. (Yes, Bash\
    \ can also handle numbers and even supports arrays. But these are special cases,\
    \ some of which require syntactic acrobatics.)\n\nThe first example illustrates\
    \ the handling of variables. Explanations of the `if` construct with the `-gt`\
