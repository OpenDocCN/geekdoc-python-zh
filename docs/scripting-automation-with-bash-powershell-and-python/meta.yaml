  - "[PAGE 456]\n\n```\n$clone = Import-VM -Path $vmcxfile -Copy -GenerateNewId `\n\
    \    -VhdDestinationPath \"$dirFirstDisk\\$cloneName\" `\n    -VirtualMachinePath\
    \ \"$dirFirstDisk\\$cloneName\"\n\n# rename the clone\nRename-VM -VM $clone -NewName\
    \ $cloneName\n\n# set properties of the VM\nSet-VM -VM $clone -ProcessorCount\
    \ 1 `\n    -MemoryStartupBytes 1GB\n\n# set static MAC address\n$mac=\"00155d1234{0:d2}\"\
    \ -f $i\nSet-VMNetworkAdapter -VMName $cloneName -StaticMacAddress $mac\n}\n\n\
    # delete temporary export directory\ndelete-dir \"$tmp\\$basename\"\n```\n\nNote\
    \ that the script must be run with admin rights. The script returns an error if\
    \ the virtual machine files of a clone already exist, for example when the script\
    \ gets executed a second time. If you want, you can extend the script to detect\
    \ and delete existing clones within the script."
