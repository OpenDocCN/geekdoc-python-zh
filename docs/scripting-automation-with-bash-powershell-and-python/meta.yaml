- md: "## Chapter 19\n### Databases\n\nThe topic of scripting and databases is almost\
    \ inexhaustible. You can use scripts to enter data into a database, read and process\
    \ information from it, change the structure of databases, and so on.\n\nIn detail,\
    \ the procedure depends on the database management system (DBMS), programming\
    \ language, library, or module you use. In this respect, a systematic treatment\
    \ of all aspects is impossible here from the outset. Instead, this chapter focuses\
    \ on some concrete examples that relate to SQL Server or MySQL:\n\n- Modifying,\
    \ maintaining, and reading similar databases (Bash, PowerShell)\n- Setting up\
    \ databases for new customers (Bash)\n- Saving exchangeable image file format\
    \ (Exif) data (Python)\n- Importing JSON files (PowerShell)\n\n> **Prerequisites\
    \ for This Chapter**\n\nAs usual, you need basic knowledge of Bash, Python, and\
    \ PowerShell to read this chapter. You should also be able to handle JSON files\
    \ (see Chapter 8). Finally, you need to have a basic understanding of how database\
    \ servers work.\n\nIf you want to create backups of databases with your scripts,\
    \ I recommend you look at Chapter 13.\n\nTo keep the examples clear, I have refrained\
    \ from error-proofing and from swapping out the login data and other settings.\
    \ For \"real\" database scripts, both points should be a matter of course. For\
    \ tips on error-proofing, see the chapters on the basic principles of Bash, PowerShell,\
    \ and Python. I have described how to handle settings and passwords securely in\
    \ Chapter 14, Section 14.2.\n\nThe sample scripts from that chapter cannot be\
    \ tried out easily. You must first install the appropriate database server, set\
    \ up a suitable database with tables, take care of authentication with the database\
    \ server, and so on.\n\n### 19.1 Updating and Maintaining Databases\n\nIn my professional\
    \ work, I maintain a MySQL server that hosts many similar databases. Each customer\
    \ has a separate database. Although the content of these databases varies depending\
    \ on the customer, the structure is always the same.\n\nNow and then, it happens\
    \ that—for example for troubleshooting—I want to apply the same SELECT commands\
    \ to all databases. The required script is, according to the motto of this book,\
    \ not even 10 lines long:\n\n```\n# Sample file apply-select.sh\n# this file contains\
    \ the names of all databases\nDBLIST=dbs.txt\n# this file contains the commands\
    \ to be executed;\n# the commands must be separated by ;.\nSQLFILE=select.sql\n\
    \nfor db in $(cat $DBLIST | sort) ; do\n  echo \"Database: $db\"\n  mysql $db\
    \ < $SQLFILE\n  echo \"---\"\ndone\n```\n\nThe `mysql` command plays a central\
    \ role in the script. It connects to the database specified by the `db` variable\
    \ and executes all commands contained in the file read by input redirection. Establishing\
    \ a connection to the database server requires that the active user has sufficient\
    \ MySQL access rights and that authentication is performed either at the operating\
    \ system level (`auth_socket` method for MySQL or `unix_socket` for MariaDB) or\
    \ that the `.my.cnf` file contains the required password.\n\nThe results of the\
    \ `SELECT` commands are displayed directly on the screen. Most of the time, I\
    \ run the script in the `./apply-select.sh | less` format, so I can conveniently\
    \ scroll or search through the output.\n\nBasically, `select.sql` could also contain\
    \ commands to modify all databases, for example to add a column to a table in\
    \ each database. But because such changes are much more dangerous than pure queries,\
    \ I store such commands in a separate `updates.sql` file, which is processed by\
    \ a second `apply-updates.sh` script. The script is identical to `apply-select.sh`\
    \ except for the initialization of the `SQLFILE` variable.\n\n#### 19.1.1 PowerShell\
    \ and sqlcmd\n\nOf course, the same concept can be implemented via a PowerShell\
    \ script. The script calls the `sqlcmd` command, which is the SQL Server counterpart\
    \ to `mysql`. The code then looks as follows:\n\n```\n# Sample file apply-select.ps1\n\
    $dblist = \"dbs.txt\"        # list with database names\n$sqlfile = \"select.sql\"\
    \    # SQL commands\n$server = \".\\sqlexpress01\" # SQL Server instance\n\n#\
    \ loop through all databases\nforeach($db in Get-Content $dblist) {\n    Write-Output\
    \ \"Database: $db\"\n    sqlcmd -S $server -d $db -i $sqlfile\n}\n```\n\nIf SQL\
    \ Server is not running on the local machine, you need to replace . with the host\
    \ name. Again, I'm assuming here that the script is running in an account that\
    \ has access to all the databases in question. Note that the SQL commands contained\
    \ in *select.sql* must be separated by semicolons. The script requires that `sqlcmd.exe`\
    \ be located in a directory listed in the PATH variable.\n\n### 19.2 Creating\
    \ a New Customer Account\n\nThe starting point for this example is a web server\
    \ for customer accounts. When placing an order, customers receive their own database\
    \ and can access the web application via their own address:\n\n*https://example.com/name*\n\
    \nThe following Bash script takes care of the initialization work required when\
    \ a new account gets set up:\n\n- Creating and initializing a new MySQL database\n\
    - Creating a new MySQL user and enabling it to access the database\n- Setting\
    \ up the /var/www/html/name directory\n- Creating a configuration file in that\
    \ directory\n- Sending an email to the customer with the login data\n\nOn a server\
    \ I maintain, I actually use a script that works in this way. For didactic reasons,\
    \ I have greatly simplified the code for this book. So, let me explain the basic\
    \ procedure first.\n\n> **No Testing Option**\n\nThe code for the script can of\
    \ course be found in the sample files for the book. However, you can't try out\
    \ the script without further ado. For this purpose, you would need a Linux server\
    \ (including web, database, and mail servers) as well as the code for a web application,\
    \ a sample database, etc.\n\n#### 19.2.1 Account Data\n\naccountdata contains\
    \ the data of the new customer. The URL variable specifies the custom part of\
    \ the web address (i.e., https://example.com/sd-architects). DB is used as the\
    \ name for the new MySQL database and for the associated MySQL user. DB is maximum\
    \ 16 characters long and may contain only letters, digits, and underscores.\n\n\
    ```\n# Sample file accountdata\nFIRSTNAME='Maria'\nLASTNAME='Smith'\nCOMPANY='Smith\
    \ & Davis Architects'\nEMAIL='maria.smith@example.com'\nURL='sd-architects'\n\
    DB='sdarchitects'\n```\n\n#### 19.2.2 Structure of the Script\n\nThe make-new-account.sh\
    \ script must be run with root privileges. The mysql and mysqldump commands included\
    \ in the script are based on the assumption that root has unrestricted access\
    \ rights to the MySQL server or that the password for the MySQL root user is contained\
    \ in the /root/.my.cnf file.\n\nThe code starts by reading the account data of\
    \ the new customer. The script first tests whether a database of that name already\
    \ exists. In this case, the execution will be terminated:\n\n```\n# Sample file\
    \ make-new-account.sh\n# import account data\n. accountdata\n# abort if the database\
    \ already exists\nsql=\"SELECT SCHEMA_NAME FROM INFORMATION_SCHEMA.SCHEMATA\n\
    \     WHERE SCHEMA_NAME='$DB'\"\nresult=$(mysql -s -N -e \"$sql\")\necho \"result\
    \ = $result\"\nif [ \"$result\" ]; then\n  echo \"Database $DB already exists.\"\
    \n  exit\nfi\n```\n\nThe script uses the mkpasswd password generator to generate\
    \ two random passwords:\n\n- The dbpw variable contains the password for accessing\
    \ the customer database. This password is only used internally and is stored in\
    \ a configuration file on the server.\n- loginpw contains the customer password\
    \ for the web login. A hash code of this password is stored in the database. The\
    \ password is sent to the customer by mail.\n\nIn the following lines, a new database\
    \ is created and initialized using a sample database. Also, a MySQL account is\
    \ created that has access to this database.\n\n```\n# database password (internal)\n\
    dbpw=$(makepasswd)\n# customer password for web login\nloginpw=$(makepasswd)\n\
    \n# create a database and compare it with a copy of the 'template' database\n\
    # initialize\nmysqladmin create $DB\nmysql $DB | mysqldump template\n\n# set up\
    \ an account for database access\nsql=\"CREATE USER $DB@localhost IDENTIFIED BY\
    \ '$dbpw';\n     GRANT ALL ON $DB.* TO $DB@localhost\"\nmysql -e \"$sql\"\n```\n\
    \nA hash code of the login password is stored in the customer database. The hash\
    \ code is generated via htpasswd. Subsequently, the customer data is stored in\
    \ the customer database created earlier:\n\n```\n# generate hash code of login\
    \ password\nhash=$(htpasswd -bnBC 10 \"\" $loginpw | tr -d ':\\n')\n# save customer\
    \ data in the customer database\nsql=\"INSERT INTO accounts (firstname, lastname,\
    \ company,\n                         email, hashcode)\n     VALUES ('$FIRSTNAME',\
    \ '$LASTNAME', '$COMPANY',\n             '$EMAIL', '$hash')\"\nmysql $DB -e \"\
    $sql\"\n```\n\nIn the next step, the script sets up a new customer directory in\
    \ /var/www/html and stores the login data for database access in dbconfig.php.\
    \ The chown and chmod commands ensure that the access rights to the files are\
    \ correct:\n\n```\n# set up a web directory for the customer\ncd /var/www/html/myapplication\n\
    mkdir $URL\ncat > $URL/dbconfig.php << EOF\n<?php\nLocalConfig::set('dbname',\
    \ '$DB');\nLocalConfig::set('dbhost', 'localhost');\nLocalConfig::set('dbuser',\
    \ '$DB');\nLocalConfig::set('dbpass', '$dbpw');\nEOF\n```"
  mdcn: "## 第19章\n### 数据库\n\n关于脚本与数据库的主题几乎无穷无尽。你可以使用脚本向数据库输入数据、读取和处理其中的信息、更改数据库结构等等。\n\
    \n具体而言，流程取决于你所使用的数据库管理系统（DBMS）、编程语言、库或模块。因此，从一开始就在本书中系统性地涵盖所有方面是不可能的。相反，本章将重点介绍一些与\
    \ SQL Server 或 MySQL 相关的具体示例：\n\n- 修改、维护和读取相似的数据库（Bash，PowerShell）\n- 为新客户设置数据库（Bash）\n\
    - 保存可交换图像文件格式（Exif）数据（Python）\n- 导入 JSON 文件（PowerShell）\n\n> **本章的先决条件**\n\n与往常一样，你需要具备\
    \ Bash、Python 和 PowerShell 的基础知识才能阅读本章。你还应该能够处理 JSON 文件（参见第8章）。最后，你需要对数据库服务器的工作原理有基本的了解。\n\
    \n如果你想用脚本创建数据库备份，我建议你查看第13章。\n\n为了保持示例清晰，我没有进行错误防护，也没有替换登录数据和其他设置。对于“真正的”数据库脚本，这两点都应该是理所当然的。关于错误防护的技巧，请参阅关于\
    \ Bash、PowerShell 和 Python 基本原理的章节。我在第14章第14.2节中描述了如何安全地处理设置和密码。\n\n本章的示例脚本不容易直接尝试。你必须首先安装相应的数据库服务器，设置一个包含表的合适数据库，处理与数据库服务器的身份验证等等。\n\
    \n### 19.1 更新和维护数据库\n\n在我的专业工作中，我维护着一个托管许多相似数据库的 MySQL 服务器。每个客户都有一个独立的数据库。尽管这些数据库的内容因客户而异，但结构总是相同的。\n\
    \n偶尔会发生这样的情况——例如为了故障排除——我想对所有数据库应用相同的 SELECT 命令。根据本书的宗旨，所需的脚本甚至不超过10行：\n\n```\n\
    # 示例文件 apply-select.sh\n# 此文件包含所有数据库的名称\nDBLIST=dbs.txt\n# 此文件包含要执行的命令；\n# 命令必须用\
    \ ; 分隔。\nSQLFILE=select.sql\n\nfor db in $(cat $DBLIST | sort) ; do\n  echo \"\
    Database: $db\"\n  mysql $db < $SQLFILE\n  echo \"---\"\ndone\n```\n\n`mysql`\
    \ 命令在脚本中起着核心作用。它连接到由 `db` 变量指定的数据库，并执行通过输入重定向读取的文件中包含的所有命令。与数据库服务器建立连接需要活动用户具有足够的\
    \ MySQL 访问权限，并且身份验证在操作系统级别执行（MySQL 的 `auth_socket` 方法或 MariaDB 的 `unix_socket`），或者\
    \ `.my.cnf` 文件包含所需的密码。\n\n`SELECT` 命令的结果直接显示在屏幕上。大多数时候，我以 `./apply-select.sh |\
    \ less` 的格式运行脚本，这样我可以方便地滚动或搜索输出。\n\n基本上，`select.sql` 也可以包含修改所有数据库的命令，例如向每个数据库中的表添加一列。但由于此类更改比纯查询危险得多，我将这些命令存储在单独的\
    \ `updates.sql` 文件中，该文件由第二个 `apply-updates.sh` 脚本处理。除了 `SQLFILE` 变量的初始化外，该脚本与\
    \ `apply-select.sh` 相同。\n\n#### 19.1.1 PowerShell 和 sqlcmd\n\n当然，相同的概念也可以通过 PowerShell\
    \ 脚本实现。该脚本调用 `sqlcmd` 命令，它是 SQL Server 中与 `mysql` 对应的命令。代码如下所示：\n\n```\n# 示例文件\
    \ apply-select.ps1\n$dblist = \"dbs.txt\"        # 包含数据库名称的列表\n$sqlfile = \"select.sql\"\
    \    # SQL 命令\n$server = \".\\sqlexpress01\" # SQL Server 实例\n\n# 遍历所有数据库\nforeach($db\
    \ in Get-Content $dblist) {\n    Write-Output \"Database: $db\"\n    sqlcmd -S\
    \ $server -d $db -i $sqlfile\n}\n```\n\n如果 SQL Server 不在本地机器上运行，你需要将 . 替换为主机名。同样，我在这里假设脚本在一个有权访问所有相关数据库的账户中运行。请注意，*select.sql*\
    \ 中包含的 SQL 命令必须用分号分隔。该脚本要求 `sqlcmd.exe` 位于 PATH 变量列出的目录中。\n\n### 19.2 创建新客户账户\n\
    \n本示例的起点是一个用于客户账户的 Web 服务器。客户下单时，会获得自己的数据库，并可以通过自己的地址访问 Web 应用程序：\n\n*https://example.com/name*\n\
    \n以下 Bash 脚本负责处理设置新账户时所需的初始化工作：\n\n- 创建并初始化一个新的 MySQL 数据库\n- 创建一个新的 MySQL 用户并使其能够访问数据库\n\
    - 设置 /var/www/html/name 目录\n- 在该目录中创建一个配置文件\n- 向客户发送包含登录数据的电子邮件\n\n在我维护的一台服务器上，我实际上使用了一个以这种方式工作的脚本。出于教学原因，我为本书大大简化了代码。所以，让我先解释一下基本流程。\n\
    \n> **无测试选项**\n\n脚本的代码当然可以在本书的示例文件中找到。但是，你不能直接尝试该脚本。为此，你需要一个 Linux 服务器（包括 Web、数据库和邮件服务器）以及\
    \ Web 应用程序的代码、示例数据库等。\n\n#### 19.2.1 账户数据\n\naccountdata 包含新客户的数据。URL 变量指定网址的自定义部分（即\
    \ https://example.com/sd-architects）。DB 用作新 MySQL 数据库和相关 MySQL 用户的名称。DB 最多16个字符长，只能包含字母、数字和下划线。\n\
    \n```\n# 示例文件 accountdata\nFIRSTNAME='Maria'\nLASTNAME='Smith'\nCOMPANY='Smith\
    \ & Davis Architects'\nEMAIL='maria.smith@example.com'\nURL='sd-architects'\n\
    DB='sdarchitects'\n```\n\n#### 19.2.2 脚本结构\n\nmake-new-account.sh 脚本必须以 root 权限运行。脚本中包含的\
    \ mysql 和 mysqldump 命令基于以下假设：root 对 MySQL 服务器具有无限制的访问权限，或者 MySQL root 用户的密码包含在\
    \ /root/.my.cnf 文件中。\n\n代码首先读取新客户的账户数据。脚本首先测试是否已存在同名数据库。在这种情况下，执行将终止：\n\n```\n\
    # 示例文件 make-new-account.sh\n# 导入账户数据\n. accountdata\n# 如果数据库已存在则中止\nsql=\"SELECT\
    \ SCHEMA_NAME FROM INFORMATION_SCHEMA.SCHEMATA\n     WHERE SCHEMA_NAME='$DB'\"\
    \nresult=$(mysql -s -N -e \"$sql\")\necho \"result = $result\"\nif [ \"$result\"\
    \ ]; then\n  echo \"Database $DB already exists.\"\n  exit\nfi\n```\n\n脚本使用 mkpasswd\
    \ 密码生成器生成两个随机密码：\n\n- dbpw 变量包含访问客户数据库的密码。此密码仅内部使用，并存储在服务器上的配置文件中。\n- loginpw\
    \ 包含用于 Web 登录的客户密码。此密码的哈希码存储在数据库中。密码通过邮件发送给客户。\n\n在接下来的几行中，使用示例数据库创建并初始化一个新数据库。同时，创建一个有权访问此数据库的\
    \ MySQL 账户。\n\n```\n# 数据库密码（内部使用）\ndbpw=$(makepasswd)\n# 用于 Web 登录的客户密码\nloginpw=$(makepasswd)\n\
    \n# 创建一个数据库，并将其与 'template' 数据库的副本进行比较\n# 初始化\nmysqladmin create $DB\nmysql $DB\
    \ | mysqldump template\n\n# 设置用于数据库访问的账户\nsql=\"CREATE USER $DB@localhost IDENTIFIED\
    \ BY '$dbpw';\n     GRANT ALL ON $DB.* TO $DB@localhost\"\nmysql -e \"$sql\"\n\
    ```\n\n登录密码的哈希码存储在客户数据库中。哈希码通过 htpasswd 生成。随后，客户数据存储在之前创建的客户数据库中：\n\n```\n# 生成登录密码的哈希码\n\
    hash=$(htpasswd -bnBC 10 \"\" $loginpw | tr -d ':\\n')\n# 将客户数据保存在客户数据库中\nsql=\"\
    INSERT INTO accounts (firstname, lastname, company,\n                        \
    \ email, hashcode)\n     VALUES ('$FIRSTNAME', '$LASTNAME', '$COMPANY',\n    \
    \         '$EMAIL', '$hash')\"\nmysql $DB -e \"$sql\"\n```\n\n在下一步中，脚本在 /var/www/html\
    \ 中设置一个新的客户目录，并将数据库访问的登录数据存储在 dbconfig.php 中。chown 和 chmod 命令确保对文件的访问权限正确：\n\n\
    ```\n# 为客户设置 Web 目录\ncd /var/www/html/myapplication\nmkdir $URL\ncat > $URL/dbconfig.php\
    \ << EOF\n<?php\nLocalConfig::set('dbname', '$DB');\nLocalConfig::set('dbhost',\
    \ 'localhost');\nLocalConfig::set('dbuser', '$DB');\nLocalConfig::set('dbpass',\
    \ '$dbpw');\nEOF\n```"
