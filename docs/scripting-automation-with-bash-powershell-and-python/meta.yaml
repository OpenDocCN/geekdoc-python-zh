  md: "# 15.3.1 Backing Up and Compressing all Databases via Script\n\nWith this introductory\
    \ information, you should have no problem understanding the next script. It starts\
    \ with the declaration of some parameters that you'll need to adjust according\
    \ to your own setup. `$exclude` contains a list of databases that should *not*\
    \ be backed up. This list must necessarily contain `tempdb`. Attempting to apply\
    \ `Backup-SqlDatabase` to this internal SQL server database will result in an\
    \ error.\n\n`Get-SqlDatabase` determines all databases available on SQL server.\
    \ A loop then processes all databases. Each backup file is immediately packed\
    \ into its own archive file. (Of course, you could conceivably save all databases\
    \ together in one archive. But since databases can get huge, this approach is\
    \ not a good idea.) With the `-Force` option, already existing ZIP files are overwritten\
    \ without an error message. The original backup file will be deleted as a result.\n\
    \n```\n# Sample file backup-all-dbs.ps1\n$instance = \"localhost\\SQLEXPRESS01\"\
    \n$backupdir = \"C:\\sqlserver-backups\"\n$exclude = \"tempdb\", \"other\", \"\
    tmp\"\n\n# create backup directory if it does not exist yet\nNew-Item -ItemType\
    \ Directory -Force $backupdir | Out-Null\n\n# loop through all databases\n$dbs\
    \ = Get-SqlDatabase -ServerInstance $instance\nforeach($db in $dbs) {\n    # skip\
    \ databases from $exclude\n    if ($db.name -in $exclude) { continue }\n\n   \
    \ # compose names of backup files\n    $backupname = \"$backupdir\\$($db.name).bak\"\
    \n    $archivename = \"$backupdir\\$($db.name).zip\"\n    Write-Output \"Backup\
    \ database $($db.name) to $archivename\"\n\n    # backup, create archive (-Force\
    \ to overwrite existing),\n    # delete original backup file\n    Backup-SqlDatabase\
    \ -ServerInstance $instance `\n        -Database $db.name -BackupFile $backupname\n\
    \    Compress-Archive -Force $backupname $archivename\n    Remove-Item $backupname\n\
    }\n```"
  merge: -1
