  md: '# 12.1.5 Securing an SSH Server


    The SSH server is a popular target for hackers who often try to guess a combination
    of login name and password. (The attack is not carried out manually, of course,
    but by automated tools.) The most popular attack target on Linux servers is the
    `root` account.

    Some elementary safeguards you should keep in mind include the following:


    +   - Use good passwords (at least 10 characters) for *all* accounts.

    - Block the `root` login (`PermitRootLogin no` in `/etc/ssh/sshd_config`).

    - Install the *Fail2ban* program, which blocks IP addresses for a few minutes
    after several failed login attempts.

    - Use an authentication with keys instead of passwords, which we will discuss
    further in [Section 12.4](#section-12.4).


    # 12.2 Working with SSH


    Unless you have some practical experience, you should first familiarize yourself
    with the `ssh` command (the SSH client). For this task, open a terminal and execute
    the following command:


    ```

    > ssh user@hostname


    The authenticity of host ''hostname (123.124.125.126)''

    can''t be established. ECDSA key fingerprint is

    SHA256:E3IH3O27Bc+5DvsvtenJkma1v5nI3owgO8ZZqUR2BYk.

    Are you sure you want to continue connecting? yes

    Warning: Permanently added ''hostname,123.124.125.126'' (ECDSA)

    to the list of known hosts.


    user@hostname''s password: *********

    user@hostname$ grep VERSION /etc/os-release


    VERSION="20.04.5 LTS (Focal Fossa)"

    VERSION_ID="20.04"

    VERSION_CODENAME=focal


    user@hostname$ exit

    ```


    Replace `user` with the account name on the relevant computer and `hostname` with
    the network name of the computer or its IP address. If the account names on the
    local machine and the remote host match, you can omit this step and just run `ssh
    hostname`. For authentication, you must enter the password of the account on the
    remote computer (not your local password!).'
  merge: -1
