    \n> **Error during Relaunch**\nWeb scraping relies on the structure of a website.\
    \ As soon as the layout of a website changes, the script must be adapted accordingly.\
    \ This fact is also true for our example. It worked beautifully when I developed\
    \ the code in November 2023. But if the publisher decides to relaunch the site\
    \ or even to change the layout, the script will probably return only error messages\
    \ instead of the title list.\n\n## 17.6 Web Scraping with Requests-HTML\n\nWith\
    \ some websites, the devil is in the details. When viewing the page in a web browser,\
    \ you can see the finished HTML code and probably would not expect any problems.\
    \ But when you try to process the same page as a DOM, important components are\
    \ suddenly missing. (You can also try just downloading the page via `curl`. Then,\
    \ compare the downloaded code with the HTML code you see in the browser.)\n\n\
    The reason for this strange behavior has to do with JavaScript: Many modern websites\
    \ deliver a half-finished HTML document. Portions of the page are only completed\
    \ in the web browser through the local execution of embedded JavaScript code.\n\
    \nFor this type of webpage, you cannot simply download the HTML document; the\
    \ JavaScript code it contains must also be executed by Python. To make this work,\
    \ you must use the much more powerful `requests-html` module instead of the `requests`\
    \ module. As usual, this module must be installed in advance via pip, with the\
    \ following commands:\n\n```\n$ pip install requests-html (Windows, Linux)\n$\
    \ pip3 install requests-html (macOS, old Linux distributions)\n```\n\nThe following\
    \ lines show the application of the module:\n\n```\nfrom requests_html import\
    \ HTMLSession\nurl = \"https://www.githubstatus.com/\"\nsession = HTMLSession()\n\
    # download HTML code including JavaScript\nresponse = session.get(\"https://example.com\"\
    )\n# run embedded JavaScript code\nresponse.html.render()\n```\n\nThe first time\
    \ `render` is run, a local copy of Chromium is downloaded. (The download is larger\
    \ than 100 MB, so it takes a while.) Chromium then takes care of processing the\
    \ JavaScript code and, fortunately, also works without a problem on Windows. However,\
    \ Chromium must be run again with every script start, which noticeably delays\
    \ the `render` call. You should therefore use `render` only when truly necessary!\n\
    \n### 17.6.1 Example: Analyzing the GitHub Status\n\nOn the `https://www.githubstatus.com`\
    \ page, the GitHub company summarizes the current status of its services. The\
    \ goal of this example is to read this status information into a dictionary. At\
    \ first glance, the task looks straightforward.\n\nHowever, the finished HTML\
    \ code is only generated on the client side by JavaScript. Web scraping does not\
    \ work until you load the page via the Requests-HTML module and run it using `render`.\n\
    \n![](img/a7fa45d496335c22ffb14c3275e24ffb_399_0.png)\n\nFigure 17.2 GitHub Status\n\
    \nNow, you have a choice: response.html provides access to a DOM similar to Beautiful\
    \ Soup. The methods have slightly different names than in Beautiful Soup but are\
    \ intuitive to use after a quick look at the documentation (see https://requests.readthedocs.io/projects/requests-html).\
    \ The following lines show the first variant of the GitHub example, which uses\
    \ only the Requests-HTML module:\n\n```\n# Sample program github-status1.py\n\
    from requests_html import HTMLSession\nurl = \"https://www.githubstatus.com/\"\
    \nsession = HTMLSession()\nresponse = session.get(url)  # response object\nresponse.html.render()\n\
    \n# to save the results\ndict = {}\n\n# loop through all component-container elements\n\
    containers = response.html.find('div.component-container')\nfor container in containers:\n\
    \    # skip invisible containers\n    if 'style' in container.attrs and\n    \
    \    container.attrs['style'] == 'display: none;':\n            continue\n```\n\
    \n```\n# parse the remaining containers, save results\nname = container.find('span.name',\
    \ first=True).text.strip()\nstatus = container.find('span.status-msg',\n     \
    \                   first=True).text.strip()\ndict[name] = status\n\n# display\
    \ the result\nprint(dict)\n```\n\nProvided the GitHub services are all running\
    \ without an error right now, the script result should look as follows:\n\n```\n\
    {'Git Operations': 'Normal', 'API Requests': 'Normal',\n 'Webhooks': 'Normal',\
    \ 'Issues': 'Normal',\n 'Pull Requests': 'Normal', 'Actions': 'Normal',\n 'Packages':\
    \ 'Normal', 'Pages': 'Normal',\n 'Codespaces': 'Normal', 'Copilot': 'Normal'}\n\
    ```\n\nIf you don't feel like dealing with the DOM functions of `requests-html`,\
    \ you can also process the HTML code using Beautiful Soup. The `.html.html` duplication\
    \ is not an error in this case. `response.html` references the DOM, `response.html.html`\
    \ on the other hand provides the corresponding HTML code.\n\n```\n# Sample program\
    \ github-status2.py\n# the first lines are as in github-status1.py ...\n# parse\
    \ HTML content using BeautifulSoup\ndom = BeautifulSoup(response.html.html, 'html.parser')\n\
    dict = {}\n\n# loop through components\ncontainers = dom.find_all('div', class_\
    \ = 'component-container')\nfor container in containers:\n    # skip invisible\
    \ containers\n    if container.has_attr('style') and container['style'] == 'display:\
    \ none;':\n        continue\n    name = container.find('span', class_='name').contents[0].strip()\n\
    \    status = container.find('span', class_='status-msg').contents[0].strip()\n\
    \    dict[name] = status\n```\n\n## 17.7 Web Scraping with PowerShell\n\nOf the\
    \ three programming languages covered in this book, Python is best suited for\
    \ web scraping. However, simple tasks can also be solved using PowerShell. The\
    \ `Invoke-WebRequest` cmdlet returns a `BasicHtmlWebResponseObject`, which provides\
    \ access to selected properties of the response to the request. This cmdlet does\
    \ not give you a full DOM, but for some tasks, the included properties are sufficient.\n\
    \n| Property | Meaning |\n| --- | --- |\n| Content | HTML code (string) |\n| Headers\
    \ | The returned headers (dictionary with strings) |\n| Status | The HTML status\
    \ code of the response (integer) |\n| Images | List of all images contained in\
    \ the HTML code |\n| InputFields | List of all input fields in the forms of the\
    \ HTML page |\n| Links | List of all included links |\n\n**Table 17.1** The Most\
    \ Important Properties of the BasicHtmlWebResponseObject\n\nThe following script\
    \ downloads all images linked on a web page into a temporary directory. The download\
    \ is performed in a loop with `Invoke-WebRequest` and the `-OutFile` option. To\
    \ suppress the status outputs produced by this cmdlet, the `ProgressPreference`\
    \ variable is temporarily set to 'SilentlyContinue'.\n\n```\n# Sample file load-images.ps1\n\
    New-Item -ItemType Directory -Force tmp | Out-Null\n\n$url = 'https://sap-press.com/'\n\
    $response = Invoke-WebRequest $url\n\n# loop through all images on the home page\
    \ of the website\nforeach($image in $response.Images) {\n    $src = $image.src\n\
    \    if ($src.StartsWith('//')) {\n        # prefix protocol-relative links with\
    \ 'https:'\n        $src = \"https:\" + $src\n    } elseif (! $src.StartsWith('http'))\
    \ {\n        # prefix the base URL for relative links\n        $src = $url + $src\n\
    \    }\n    $filename = 'tmp/' + (Split-Path $image.src -Leaf)\n    Write-Output\
    \ ($src + \" -> \" +  $filename)\n    $ProgressPreference = 'SilentlyContinue'\
    \  # no status\n    Invoke-WebRequest $src -OutFile $filename # output\n    $ProgressPreference\
    \ = 'Continue'\n}\n```"
  mdcn: "在HTML元素的嵌套结构中导航，直到找到与你相关的部分。\n\n![](img/a7fa45d496335c22ffb14c3275e24ffb_396_0.png)\n\
    \n现在，只需在Python代码中复制分析出的结构即可，这在此例中相当简单：首先，`dom.find` 查找具有 `bestsellers-list` 类的\
    \ `<ul>` 元素。在此元素内，通过 `find_all` 结果的循环遍历所有 `<article>` 对象。对于每篇文章，`data-title` 属性显示书名。第一个链接（`<a>`）指向书籍的详情页。然而，`href`\
    \ 属性包含的是相对链接，必须使用 `urljoin` 进行补全。\n\n```\n# 示例文件 sap-press-bestsellers.py\nimport\
    \ requests\nimport urllib.parse\nfrom bs4 import BeautifulSoup\n\n# 使用 BeautifulSoup\
    \ 解析 HTML 内容\nsiteurl = \" https://www.sap-press.com/bestsellers/\"\nresponse\
    \ = requests.get(siteurl)\ndom = BeautifulSoup(response.content, 'html.parser')\n\
    \n# 查找包含畅销书的部分\nbestsellers = dom.find('ul', class_ = 'bestsellers-list')\n\n\
    # 提取书名及其详情页链接\narticles = bestsellers.find_all('article')\nfor article in articles:\n\
    \    print('*', article['data-title'])\n    link = article.find('a')['href']\n\
    \    bookurl = urllib.parse.urljoin(siteurl, link)\n    print(' ', bookurl)\n\
    ```\n\n2023年11月的一次测试运行产生了以下结果：\n\n```\n* Full Stack Development with SAP\n  https://www.sap-press.com/full-stack-development-with-sap_5733/\n\
    * Introducing Advanced Intercompany Sales and Stock Transfer with SAP S/4HANA\n\
    \  https://www.sap-press.com/introducing-..._5743/\n* Introducing Transfer Pricing\
    \ with SAP S/4HANA\n  https://www.sap-press.com/introducing-..._5790/\n...\n```\n\
    \n> **重新上线时的错误**\n网络爬虫依赖于网站的结构。一旦网站的布局发生变化，脚本就必须相应地进行调整。这一事实同样适用于我们的示例。当我在2023年11月开发这段代码时，它运行得非常完美。但如果出版商决定重新上线网站，甚至更改布局，脚本很可能只会返回错误信息，而不是书名列表。\n\
    \n## 17.6 使用 Requests-HTML 进行网络爬虫\n\n对于某些网站，魔鬼藏在细节中。在网页浏览器中查看页面时，你可以看到完整的HTML代码，可能不会预料到任何问题。但当你尝试将同一页面作为DOM处理时，重要的组件突然缺失了。（你也可以尝试仅通过\
    \ `curl` 下载页面。然后，将下载的代码与你在浏览器中看到的HTML代码进行比较。）\n\n这种奇怪行为的原因与JavaScript有关：许多现代网站提供的是半成品的HTML文档。页面的部分内容仅在网页浏览器中通过本地执行嵌入的JavaScript代码来完成。\n\
    \n对于这类网页，你不能简单地下载HTML文档；其包含的JavaScript代码也必须由Python执行。为了实现这一点，你必须使用功能更强大的 `requests-html`\
    \ 模块，而不是 `requests` 模块。与往常一样，该模块必须通过pip预先安装，使用以下命令：\n\n```\n$ pip install requests-html\
    \ (Windows, Linux)\n$ pip3 install requests-html (macOS, old Linux distributions)\n\
    ```\n\n以下几行展示了该模块的应用：\n\n```\nfrom requests_html import HTMLSession\nurl = \"\
    https://www.githubstatus.com/\"\nsession = HTMLSession()\n# 下载包含 JavaScript 的\
    \ HTML 代码\nresponse = session.get(\"https://example.com\")\n# 运行嵌入的 JavaScript\
    \ 代码\nresponse.html.render()\n```\n\n首次运行 `render` 时，会下载一个本地的 Chromium 副本。（下载量超过100\
    \ MB，因此需要一些时间。）然后，Chromium 负责处理 JavaScript 代码，幸运的是，它在 Windows 上也能正常工作。然而，每次启动脚本都必须重新运行\
    \ Chromium，这会明显延迟 `render` 调用。因此，你应该只在真正必要时才使用 `render`！\n\n### 17.6.1 示例：分析 GitHub\
    \ 状态\n\n在 `https://www.githubstatus.com` 页面上，GitHub 公司总结了其服务的当前状态。本示例的目标是将此状态信息读入一个字典。乍一看，任务似乎很简单。\n\
    \n然而，完整的HTML代码仅在客户端由JavaScript生成。只有通过 Requests-HTML 模块加载页面并使用 `render` 运行后，网络爬虫才能工作。\n\
    \n![](img/a7fa45d496335c22ffb14c3275e24ffb_399_0.png)\n\n图 17.2 GitHub 状态\n\n\
    现在，你有了选择：`response.html` 提供了类似 Beautiful Soup 的DOM访问。其方法名称与 Beautiful Soup 略有不同，但快速查阅文档（参见\
    \ https://requests.readthedocs.io/projects/requests-html）后就能直观地使用。以下几行展示了 GitHub\
    \ 示例的第一个变体，仅使用 Requests-HTML 模块：\n\n```\n# 示例程序 github-status1.py\nfrom requests_html\
    \ import HTMLSession\nurl = \"https://www.githubstatus.com/\"\nsession = HTMLSession()\n\
    response = session.get(url)  # response 对象\nresponse.html.render()\n\n# 保存结果\n\
    dict = {}\n\n# 遍历所有 component-container 元素\ncontainers = response.html.find('div.component-container')\n\
    for container in containers:\n    # 跳过不可见的容器\n    if 'style' in container.attrs\
    \ and\n        container.attrs['style'] == 'display: none;':\n            continue\n\
    ```\n\n```\n# 解析剩余的容器，保存结果\nname = container.find('span.name', first=True).text.strip()\n\
    status = container.find('span.status-msg',\n                        first=True).text.strip()\n\
    dict[name] = status\n\n# 显示结果\nprint(dict)\n```\n\n假设 GitHub 服务目前全部正常运行，脚本结果应如下所示：\n\
    \n```\n{'Git Operations': 'Normal', 'API Requests': 'Normal',\n 'Webhooks': 'Normal',\
    \ 'Issues': 'Normal',\n 'Pull Requests': 'Normal', 'Actions': 'Normal',\n 'Packages':\
    \ 'Normal', 'Pages': 'Normal',\n 'Codespaces': 'Normal', 'Copilot': 'Normal'}\n\
    ```\n\n如果你不想处理 `requests-html` 的DOM函数，也可以使用 Beautiful Soup 处理HTML代码。在这种情况下，`.html.html`\
    \ 的重复并非错误。`response.html` 引用DOM，而 `response.html.html` 则提供相应的HTML代码。\n\n```\n\
    # 示例程序 github-status2.py\n# 前几行与 github-status1.py 相同 ...\n# 使用 BeautifulSoup\
    \ 解析 HTML 内容\ndom = BeautifulSoup(response.html.html, 'html.parser')\ndict = {}\n\
    \n# 遍历组件\ncontainers = dom.find_all('div', class_ = 'component-container')\nfor\
    \ container in containers:\n    # 跳过不可见的容器\n    if container.has_attr('style')\
    \ and container['style'] == 'display: none;':\n        continue\n    name = container.find('span',\
    \ class_='name').contents[0].strip()\n    status = container.find('span', class_='status-msg').contents[0].strip()\n\
    \    dict[name] = status\n```\n\n## 17.7 使用 PowerShell 进行网络爬虫\n\n在本书涵盖的三种编程语言中，Python最适合网络爬虫。然而，简单的任务也可以使用PowerShell解决。`Invoke-WebRequest`\
    \ cmdlet 返回一个 `BasicHtmlWebResponseObject`，它提供了对请求响应的选定属性的访问。此cmdlet不会给你一个完整的DOM，但对于某些任务，其包含的属性已经足够。\n\
    \n| 属性 | 含义 |\n| --- | --- |\n| Content | HTML代码（字符串） |\n| Headers | 返回的标头（字符串字典）\
    \ |\n| Status | 响应的HTML状态码（整数） |\n| Images | HTML代码中包含的所有图像列表 |\n| InputFields\
    \ | HTML页面表单中的所有输入字段列表 |\n| Links | 所有包含的链接列表 |\n\n**表 17.1** BasicHtmlWebResponseObject\
    \ 最重要的属性\n\n以下脚本将网页上链接的所有图像下载到临时目录中。下载通过 `Invoke-WebRequest` 和 `-OutFile` 选项在循环中执行。为了抑制此cmdlet产生的状态输出，`ProgressPreference`\
    \ 变量被临时设置为 'SilentlyContinue'。\n\n```\n# 示例文件 load-images.ps1\nNew-Item -ItemType\
    \ Directory -Force tmp | Out-Null\n\n$url = 'https://sap-press.com/'\n$response\
    \ = Invoke-WebRequest $url\n\n# 遍历网站首页上的所有图像\nforeach($image in $response.Images)\
    \ {\n    $src = $image.src\n    if ($src.StartsWith('//')) {\n        # 为协议相对链接添加\
    \ 'https:' 前缀\n        $src = \"https:\" + $src\n    } elseif (! $src.StartsWith('http'))\
    \ {\n        # 为相对链接添加基础URL前缀\n        $src = $url + $src\n    }\n    $filename\
    \ = 'tmp/' + (Split-Path $image.src -Leaf)\n    Write-Output ($src + \" -> \"\
    \ +  $filename)\n    $ProgressPreference = 'SilentlyContinue'  # 无状态输出\n    Invoke-WebRequest\
    \ $src -OutFile $filename # 输出\n    $ProgressPreference = 'Continue'\n}\n```"
