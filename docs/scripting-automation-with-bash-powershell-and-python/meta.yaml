    # 12.2.5 SSH Remoting in PowerShell


    You can use the `Enter-PSSession` or `New-PSSession` commands to run commands
    on external Windows computers via *Windows Remote Management*. Since PowerShell
    6, this feature is also available for SSH connections and is accordingly referred
    to as *SSH remoting*. Previously, however, some preparatory work was required
    on the server side.


    To use SSH remoting on an external Windows machine, a new `Subsystem` line must
    be added to the respective `sshd_config` file. The `Subsystem` statement is spread
    over two lines in our case with \ only for space reasons. (It must be specified
    in one line and without the \ character!) According to the documentation, the
    `-nologo` option will no longer be required as of PowerShell version 7.4.


    ```

    # Windows host: File $env:ProgramData\ssh\sshd_config

    ...

    Subsystem powershell c:/progra~1/powershell/7/pwsh.exe \n    -sshs -nologo

    ```


    The easiest way to open the file is to start the editor from the terminal (e.g.,
    using `code $env:ProgramData\ssh\sshd_config`). This approach will automatically
    replace `$env:ProgramData` with the appropriate path on your machine (usually
    `C:\ProgramData`).'
