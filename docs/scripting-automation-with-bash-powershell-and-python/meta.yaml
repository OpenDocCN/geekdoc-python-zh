    ```

    $ sudo apt install exiftool            (Debian, Ubuntu)

    $ sudo dnf install perl-Image-ExifTool (Fedora)

    $ sudo pacman -S perl-exiftool         (Arch Linux)


    $ exiftool -ver

    12.50

    ```


    Installation on Windows is a bit more tedious: At https://exiftool.org, you can
    find a ZIP file for download. However, that file does *not* contain any setup
    program. Instead, you must manually copy the `exiftool(-k).exe` file contained
    in the archive to a directory listed in the `PATH` variable. The easiest way is
    to use `C:\Windows` (which requires administrator rights, however). Then, you
    must rename the file to `exiftool.exe`.


    Microsoft Defender blocks the first attempt to run ExifTool on Windows because
    the publisher is unknown. Click **More information** and **Run anyway**. As a
    result, the startup succeeds without a problem, even from the terminal.


    You also must overcome some small hurdles on macOS: The DMG image contains a `*.pkg`
    file with an installer. However, the execution is blocked by macOS because the
    installer is not signed. You must open the **Privacy** module in the system settings.
    Then, click on **Open ExifTool n.n.pkg anyway**.


    Once the installation is done, using the `exiftool` command is quite simple: You
    can pass a filename and get a seemingly endless list of Exif values as a result:


    ```

    $ exiftool cimg2647.jpg


    ExifTool Version Number : 12.50

    File Name                : cimg2647.jpg

    ...

    Date/Time Original       : 2008:08:28 12:53:22

    ...

    Shutter Speed            : 1/250

    Circle Of Confusion      : 0.005 mm

    Field Of View            : 50.7 deg

    ```


    To sort the images by the date on which they were taken, only the `Date/Time Original`
    entry is relevant. The option of the same name, in combination with the desired
    format for the date (`-d`) and the `-s3` option (for *shortest*), reduces the
    output to the desired information:'
  - "[PAGE 380]\n\n```\n$ exiftool -d '%Y-%m' -s3 -DateTimeOriginal cimg2647.jpg\n\
    \n2008-08\n```\n\nExif data can reveal a lot of information about the origin of\
    \ the images. ExifTool therefore provides the option to remove the Exif data from\
    \ a file. The recommended command is `exiftool -All= image.jpg`. This command\
    \ removes almost all metadata but leaves the APP14 Adobe block of color information.\
    \ This data block is necessary so that the colors of the image can be displayed\
    \ correctly. However, the data has no privacy relevance. Concerning deleting Exif\
    \ data, we also recommend reading the following post on the ExifTool forum: https://exiftool.org/forum/index.php?topic=13034.0.\n\
    \nExifTool has countless other options, which I will not go into here. Refer to\
    \ the manual, if necessary, at https://exiftool.org/exiftool_pod.html.\n\n# 16.2.2\
    \ Bash Example\n\nThe following lines show an implementation of the `sort` script\
    \ in Bash. The code should be understandable without further explanation.\n\n\
    ```\n# Sample file sort-photos.sh\n# loop through all filenames passed as parameters\n\
    for file in \"$@\"; do\n    yearmonth=$(exiftool -s3 -d '%Y-%m' -DateTimeOriginal\
    \ $file)\n    if [ $yearmonth ]; then\n        echo \"$file -> $yearmonth/\"\n\
    \        mkdir -p $yearmonth\n        mv \"$file\" $yearmonth/\n    fi\ndone\n\
    ```\n\nTo facilitate trying out the script, you'll find an archive with some small\
    \ photos in the sample files at https://rheinwerk-computing.com/5851.\n\n```\n\
    $ ./sort-photos.sh *.jpg\n\ncimg2372.jpg -> 2007-12/\ncimg2374.jpg -> 2007-12/\n\
    ```\n\nThe script ignores all files without Exif data or with missing recording\
    \ time and leaves them at the previous location. To test this process, `photos.zip`\
    \ contains some special cases: `z-empty.jpg` is simply an empty file (0 bytes).\
    \ `z-almost-no-metadata.jpeg` was taken with an iPhone, then downsized, and finally\
    \ stripped of almost all Exif data by using `exiftool -All=`. Then, `z-gimp-metadata.jpeg`\
    \ was inserted as a screenshot into the image processing program Gimp and then\
    \ saved. The file therefore contains only the metadata provided by Gimp for newly\
    \ created images."
  - "[PAGE 381]\n\n# 16.2.3 PowerShell Example\n\nThe code for the PowerShell implementation\
    \ looks almost the same as the one for the Bash script. The biggest difference\
    \ is the nested loop. This nested loop is required because PowerShell does not\
    \ perform globbing, that is, it does not convert patterns like *.jpg into a list\
    \ of filenames. You must do this step yourself!\n\nThe first loop runs through\
    \ all parameters. The second loop executes `Get-Item` for each parameter. With\
    \ a filename like `myimg.jpg`, `Get-Item` simply returns the file. If, on the\
    \ other hand, an expression was passed, then `Get-Item` returns the list of matching\
    \ files. The two loops ensure that a call of `.\\sort-images.ps1 *.jpg *.jpeg`\
    \ is also processed correctly.\n\n```\n# Sample file sort-images.ps1\n# loop through\
    \ all parameters\nforeach ($arg in $args) {\n    # loop through the Get-Item results\n\
    \    foreach ($file in Get-Item $arg) {\n        $yearmonth = exiftool -s3 -d\
    \ '%Y-%m' `\n                            -DateTimeOriginal $file\n        if ($yearmonth)\
    \ {\n            Write-Output \"$($file.Name) -> $yearmonth/\"\n            $targetdir\
    \ = New-Item -ItemType Directory `\n                                  -Path $yearmonth\
    \ -Force\n            Move-Item $file $targetdir\n        }\n    }\n}\n```\n\n\
    > **Speed Problems**\n\nWhen it comes to sorting “only” a few hundred images,\
    \ the approach presented in this section is good enough. However, when dealing\
    \ with thousands of images, a more efficient approach is to use the scripting\
    \ features built into ExifTool, which requires a detailed study of the manual.\
    \ With ExifTool scripting, ExifTool needs to be started only once and not thousands\
    \ of times. This feature is crucial because ExifTool uses the Perl programming\
    \ language. Whenever ExifTool is started, a complex Perl environment needs to\
    \ be loaded. By starting ExifTool only once and then processing many commands\
    \ within the environment, a lot of time can be saved. You can find a code example\
    \ at https://exiftool.org/mistakes.html#M3.\n\n# 16.3 Converting Exif Metadata\
    \ to SQL Commands\n\nThe goal of the next example is to process a pool of photos\
    \ and enter the most important metadata of each image into a database. Among other\
    \ things, the name, file size,"
- md: "## 16.3.1 PyExifTool\n\nVarious Exif modules are available for Python. The\
    \ *PyExifTool* presented in this section uses the `exiftool` command. Thus, you\
    \ must install the ExifTool first (Section 16.2) and then run the following `pip`\
    \ command:\n\n```\n$ pip install pyexiftool    (Windows, new Linux distributions)\n\
    $ pip3 install pyexiftool   (macOS, old Linux distributions)\n```\n\nThe following\
    \ listing shows the application of the module. `ExifToolHelper` establishes the\
    \ connection to the `exiftool` command. For efficiency reasons, this connection\
    \ will be maintained until it is no longer needed, so `exiftool` doesn't need\
    \ to be called again for each image. The `with` construct takes care of closing\
    \ the connection in any case, either at the end of the code block or when an error\
    \ occurs.\n\nNow, you can pass a list of filenames to the `get_metadata` method.\
    \ The method responds with a list of dictionaries, each dictionary containing\
    \ all the metadata available for that image. In the sample script, only a few\
    \ selected Exif parameters are read.\n\n```\n# Sample file hello-pyexiftool.py\n\
    # call: ./hello-pyexiftool.py file1.jpg file2.jpg\nimport exiftool, sys\nfilenames\
    \ = sys.argv[1:]\nkeys = ['SourceFile', 'EXIF:Model', 'EXIF:ExposureTime',\n \
    \       'EXIF:ISO', 'EXIF:DateTimeOriginal']\n\nwith exiftool.ExifToolHelper()\
    \ as exifhelper:\n    # returns a list with dictionaries, one dictionary for\n\
    \    # every filename\n    metadatalst = exifhelper.get_metadata(filenames)\n\
    \    # show selected EXIF elements for each photo\n    for metadata in metadatalst:\n\
    \        print()\n        for key in keys:\n            # does the key exist at\
    \ all?\n            if key in metadata:\n                print('%25s : %-30s'\
    \ % (key, metadata[key]))\n```\n\nThe following lines present a test run for two\
    \ files:\n\n```\n$ ./exif-to-sql.py IMG_3798.jpg IMG_3799.jpg\n\n        SourceFile\
    \ : IMG_3798.jpg\n        EXIF:Model : Canon IXUS 210\n        EXIF:ExposureTime\
    \ : 0.0008\n        EXIF:ISO : 100\n        EXIF:DateTimeOriginal : 2012:11:03\
    \ 08:44:32\n\n        SourceFile : IMG_3799.jpg\n        EXIF:Model : Canon IXUS\
    \ 210\n        EXIF:ExposureTime : 0.0008\n        EXIF:ISO : 125\n        EXIF:DateTimeOriginal\
    \ : 2012:11:03 08:44:39\n```\n\nNote that different Exif data is available depending\
    \ on the smartphone or camera model. For this reason, you should always secure\
    \ access to individual entries. (In the last code listing, this secure access\
    \ is created via `if key in metadata`.)\n\nThe `exifhelper.get_metadata(filenames)`\
    \ statement in the last example unfortunately has its pitfalls, such as the following:\n\
    \n- If even a single file contains incorrect Exif metadata or is missing entirely,\
    \ then an `ExifToolExceptionError` will occur. The error makes it impossible to\
    \ analyze the results of the remaining files.\n- A second problem is that `get_metadata`\
    \ reads all metadata, even metadata you're not interested in. Depending on the\
    \ operating system (Windows!) the `charmap: codec can't decode byte xxx in position\
    \ nnn` error may occur. Apparently the PyExifTool chokes on UTF-8 strings in the\
    \ metadata. In my tests, the error occurred only on Windows and only in PyExifTool,\
    \ not when `exiftool` was called directly.\n\nIn this respect, a better approach\
    \ is to process each image file individually and to secure the analysis by using\
    \ `try-except`. Also, instead of `get_metadata`, you should use the `get_tags`\
    \ method, which processes only selected Exif keys. I will demonstrate this procedure\
    \ in the next script, `exif-to-sql.py`.\n\n## 16.3.2 EXIF2SQL\n\nThe first subtask\
    \ of the `exif-to-sql.py` script is `globbing` (i.e., the analysis of patterns\
    \ like `*.jpg`). On macOS and Linux, this step is not needed because, in those\
    \ cases, the shell generates the corresponding list of files from `*.jpg` and\
    \ passes it to the script.\n\nOn Windows, on the other hand, the `*.jpg` parameter\
    \ ends up unchanged in the parameters list. If the script determines that it is\
    \ running on Windows by analyzing `platform.system()`, it must determine the appropriate\
    \ filenames itself. This task is performed by the `glob` function from the module\
    \ of the same name. The loop through `argv[1:]` ensures that globbing works correctly\
    \ even if multiple file patterns are passed (so, for example, `.\\exif-to-sql.py\
    \ *.jpg *.jpeg`).\n\nThe `keys` list is initialized with the names of all Exif\
    \ parameters the script is supposed to analyze. Note that you must use the two-part\
    \ name structure of PyExifTool. (ExifTool, on the other hand, uses shorter names\
    \ without preceding group names.)\n\nThe `sql` variable contains the SQL command\
    \ to be run. `inspect.cleandoc` removes the indentations from the multiline string.\
    \ The `INSERT` command requires that the database contain a corresponding table.\
    \ I will show you how to set up the table, if needed, in Chapter 19, Section 19.3.\n\
    \n```\n# Sample file exif-to-sql.py\nimport exiftool, inspect, platform, sys\n\
    from glob import glob\n\n# Globbing (only necessary on Windows)\nif platform.system()\
    \ == 'Windows':\n    filenames = []\n    for arg in sys.argv[1:]:\n        filenames.extend(glob(arg))\n\
    else:\n    filenames = sys.argv[1:]\n\n# analyze only these EXIF parameters\n\
    keys = ['File:FileName', 'File:FileSize', 'EXIF:Orientation',\n        'EXIF:DateTimeOriginal',\
    \ 'EXIF:GPSLatitude',\n        'EXIF:GPSLongitude', 'EXIF:GPSAltitude']\n\n# SQL\
    \ command to insert a data record;\n# cleandoc removes the indentation\nsql =\
    \ inspect.cleandoc(\"\"\"\n    INSERT INTO photos (name, size, orientation, datetimeoriginal,\n\
    \                        latitude, longitude, altitude)\n    VALUES (%s, %s, %s,\
    \ %s, %s, %s, %s);\"\"\")\n```\n\nAfter this preparatory work, `ExifToolHelper`\
    \ establishes the connection to the locally installed ExifTool.\n\nThe `for` loop\
    \ processes all image files. `get_tags` reads only the Exif tags specified by\
    \ `keys`. These keys are then collected in the `results` list, with missing tags\
    \ replaced by `NULL`. For the `DateTimeOriginal` tag, the format of the date must\
    \ also be changed from `2023:12:13` to the International Organization for Standardization\
    \ (ISO) format-compliant syntax `2023-12-13`. For this purpose, `replace` replaces\
    \ the first two colons with hyphens.\n\nFinally, the results gathered in this\
    \ way are converted into a tuple and incorporated into the SQL string using the\
    \ `%` formatting operator.\n\n```\n# ... Continued, connect to exiftool\nwith\
    \ exiftool.ExifToolHelper() as exifhelper:\n    # loop through all image files\n\
    \    for file in filenames:\n        # gather EXIF data\n        results = []\n\
    \        try:\n            # get_tags reads only selected keys\n            metadata\
    \ = exifhelper.get_tags(file, keys)[0]\n            for key in keys:\n       \
    \         if key in metadata:\n                    if key == 'EXIF:DateTimeOriginal':\n\
    \                        # 2023:12:13 -> 2023-12-13\n                        date\
    \ = str(metadata[key]).replace(':', '-', 2)\n                        results +=\
    \ [ \"'%s'\" % (date) ]\n                    else:\n                        results\
    \ += [ \"'%s'\" % (metadata[key]) ]\n                else:\n                 \
    \   results += ['NULL']\n            print(sql % tuple(results))\n        except\
    \ Exception as e:\n            print(\"-- skipped %s\" % (file))\n```\n\nIf you\
    \ call the script and pass some JPEG files, the output will look as follows:\n\
    \n```\n$ ./exif-to-sql *.jpg *.jpeg\n\nINSERT INTO photos (name, size, orientation,\
    \ datetimeoriginal,\n                    latitude, longitude, altitude)\nVALUES\
    \ ('IMG_3422.jpeg', '23521', '1', '2022-01-07 15:54:01',\n        '47.1209027777778',\
    \ '13.6318833333333', '2033.231752');\n...\n```\n\nOf course, you can also redirect\
    \ the output to an SQL file:\n\n```\n$ ./exif-to-sql *.jpg *.jpeg > photos.sql\n\
    ```\n\n> **Missing GPS Data**\n> Photos that you take with a smartphone always\
    \ contain geographical data unless you have explicitly disabled this function.\
    \ Note, however, that for privacy reasons, some photo programs remove the location\
    \ information when photos are exported. For example, if you use Apple Photos,\
    \ make sure to set the **Include • Location Information** option when exporting!"
  mdcn: "## 16.3.1 PyExifTool\n\nPython 有多种 Exif 模块可用。本节介绍的 *PyExifTool* 使用 `exiftool`\
    \ 命令。因此，你必须先安装 ExifTool（第 16.2 节），然后运行以下 `pip` 命令：\n\n```\n$ pip install pyexiftool\
    \    (Windows, new Linux distributions)\n$ pip3 install pyexiftool   (macOS, old\
    \ Linux distributions)\n```\n\n以下代码展示了该模块的应用。`ExifToolHelper` 建立与 `exiftool` 命令的连接。出于效率考虑，此连接将保持打开状态，直到不再需要，这样就不必为每张图片都重新调用\
    \ `exiftool`。`with` 结构确保在任何情况下（无论是代码块结束还是发生错误）都能关闭连接。\n\n现在，你可以将文件名列表传递给 `get_metadata`\
    \ 方法。该方法返回一个字典列表，每个字典包含该图片所有可用的元数据。在示例脚本中，只读取了部分选定的 Exif 参数。\n\n```\n# Sample\
    \ file hello-pyexiftool.py\n# call: ./hello-pyexiftool.py file1.jpg file2.jpg\n\
    import exiftool, sys\nfilenames = sys.argv[1:]\nkeys = ['SourceFile', 'EXIF:Model',\
    \ 'EXIF:ExposureTime',\n        'EXIF:ISO', 'EXIF:DateTimeOriginal']\n\nwith exiftool.ExifToolHelper()\
    \ as exifhelper:\n    # returns a list with dictionaries, one dictionary for\n\
    \    # every filename\n    metadatalst = exifhelper.get_metadata(filenames)\n\
    \    # show selected EXIF elements for each photo\n    for metadata in metadatalst:\n\
    \        print()\n        for key in keys:\n            # does the key exist at\
    \ all?\n            if key in metadata:\n                print('%25s : %-30s'\
    \ % (key, metadata[key]))\n```\n\n以下几行展示了两个文件的测试运行结果：\n\n```\n$ ./exif-to-sql.py\
    \ IMG_3798.jpg IMG_3799.jpg\n\n        SourceFile : IMG_3798.jpg\n        EXIF:Model\
    \ : Canon IXUS 210\n        EXIF:ExposureTime : 0.0008\n        EXIF:ISO : 100\n\
    \        EXIF:DateTimeOriginal : 2012:11:03 08:44:32\n\n        SourceFile : IMG_3799.jpg\n\
    \        EXIF:Model : Canon IXUS 210\n        EXIF:ExposureTime : 0.0008\n   \
    \     EXIF:ISO : 125\n        EXIF:DateTimeOriginal : 2012:11:03 08:44:39\n```\n\
    \n请注意，可用的 Exif 数据因智能手机或相机型号而异。因此，你应该始终确保安全地访问各个条目。（在最后一个代码清单中，这种安全访问是通过 `if key\
    \ in metadata` 实现的。）\n\n上一个示例中的 `exifhelper.get_metadata(filenames)` 语句存在一些陷阱，例如：\n\
    \n- 即使只有一个文件包含不正确的 Exif 元数据或完全缺失，也会发生 `ExifToolExceptionError`。该错误使得无法分析其余文件的结果。\n\
    - 第二个问题是 `get_metadata` 会读取所有元数据，包括你不感兴趣的元数据。根据操作系统（Windows！），可能会出现 `charmap:\
    \ codec can't decode byte xxx in position nnn` 错误。显然，PyExifTool 在处理元数据中的 UTF-8\
    \ 字符串时会出错。在我的测试中，该错误仅在 Windows 上发生，并且仅在 PyExifTool 中发生，直接调用 `exiftool` 时不会出现。\n\
    \n在这方面，更好的方法是单独处理每个图像文件，并通过使用 `try-except` 来确保分析的安全性。此外，你应该使用 `get_tags` 方法代替\
    \ `get_metadata`，该方法仅处理选定的 Exif 键。我将在下一个脚本 `exif-to-sql.py` 中演示此过程。\n\n## 16.3.2\
    \ EXIF2SQL\n\n`exif-to-sql.py` 脚本的第一个子任务是 `globbing`（即分析 `*.jpg` 等模式）。在 macOS\
    \ 和 Linux 上，此步骤不是必需的，因为在这些情况下，shell 会从 `*.jpg` 生成相应的文件列表并将其传递给脚本。\n\n另一方面，在 Windows\
    \ 上，`*.jpg` 参数会原封不动地出现在参数列表中。如果脚本通过分析 `platform.system()` 确定其在 Windows 上运行，则必须自行确定相应的文件名。此任务由同名模块中的\
    \ `glob` 函数执行。对 `argv[1:]` 的循环确保即使传递了多个文件模式（例如，`.\\exif-to-sql.py *.jpg *.jpeg`），globbing\
    \ 也能正常工作。\n\n`keys` 列表初始化为脚本应分析的所有 Exif 参数的名称。请注意，你必须使用 PyExifTool 的两部分名称结构。（另一方面，ExifTool\
    \ 使用不带前导组名的较短名称。）\n\n`sql` 变量包含要运行的 SQL 命令。`inspect.cleandoc` 从多行字符串中移除缩进。`INSERT`\
    \ 命令要求数据库包含相应的表。如果需要，我将在第 19 章第 19.3 节中向你展示如何设置该表。\n\n```\n# Sample file exif-to-sql.py\n\
    import exiftool, inspect, platform, sys\nfrom glob import glob\n\n# Globbing (only\
    \ necessary on Windows)\nif platform.system() == 'Windows':\n    filenames = []\n\
    \    for arg in sys.argv[1:]:\n        filenames.extend(glob(arg))\nelse:\n  \
    \  filenames = sys.argv[1:]\n\n# analyze only these EXIF parameters\nkeys = ['File:FileName',\
    \ 'File:FileSize', 'EXIF:Orientation',\n        'EXIF:DateTimeOriginal', 'EXIF:GPSLatitude',\n\
    \        'EXIF:GPSLongitude', 'EXIF:GPSAltitude']\n\n# SQL command to insert a\
    \ data record;\n# cleandoc removes the indentation\nsql = inspect.cleandoc(\"\"\
    \"\n    INSERT INTO photos (name, size, orientation, datetimeoriginal,\n     \
    \                   latitude, longitude, altitude)\n    VALUES (%s, %s, %s, %s,\
    \ %s, %s, %s);\"\"\")\n```\n\n完成这些准备工作后，`ExifToolHelper` 与本地安装的 ExifTool 建立连接。\n\
    \n`for` 循环处理所有图像文件。`get_tags` 仅读取由 `keys` 指定的 Exif 标签。然后将这些键收集到 `results` 列表中，缺失的标签替换为\
    \ `NULL`。对于 `DateTimeOriginal` 标签，日期格式也必须从 `2023:12:13` 更改为符合国际标准化组织（ISO）格式的语法\
    \ `2023-12-13`。为此，`replace` 将前两个冒号替换为连字符。\n\n最后，以这种方式收集的结果被转换为元组，并使用 `%` 格式化运算符合并到\
    \ SQL 字符串中。\n\n```\n# ... Continued, connect to exiftool\nwith exiftool.ExifToolHelper()\
    \ as exifhelper:\n    # loop through all image files\n    for file in filenames:\n\
    \        # gather EXIF data\n        results = []\n        try:\n            #\
    \ get_tags reads only selected keys\n            metadata = exifhelper.get_tags(file,\
    \ keys)[0]\n            for key in keys:\n                if key in metadata:\n\
    \                    if key == 'EXIF:DateTimeOriginal':\n                    \
    \    # 2023:12:13 -> 2023-12-13\n                        date = str(metadata[key]).replace(':',\
    \ '-', 2)\n                        results += [ \"'%s'\" % (date) ]\n        \
    \            else:\n                        results += [ \"'%s'\" % (metadata[key])\
    \ ]\n                else:\n                    results += ['NULL']\n        \
    \    print(sql % tuple(results))\n        except Exception as e:\n           \
    \ print(\"-- skipped %s\" % (file))\n```\n\n如果你调用该脚本并传递一些 JPEG 文件，输出将如下所示：\n\n\
    ```\n$ ./exif-to-sql *.jpg *.jpeg\n\nINSERT INTO photos (name, size, orientation,\
    \ datetimeoriginal,\n                    latitude, longitude, altitude)\nVALUES\
    \ ('IMG_3422.jpeg', '23521', '1', '2022-01-07 15:54:01',\n        '47.1209027777778',\
    \ '13.6318833333333', '2033.231752');\n...\n```\n\n当然，你也可以将输出重定向到 SQL 文件：\n\n\
    ```\n$ ./exif-to-sql *.jpg *.jpeg > photos.sql\n```\n\n> **缺少 GPS 数据**\n> 你用智能手机拍摄的照片总是包含地理数据，除非你明确禁用了此功能。但请注意，出于隐私原因，一些照片程序在导出照片时会删除位置信息。例如，如果你使用\
    \ Apple 照片，请确保在导出时设置 **包含 • 位置信息** 选项！"
