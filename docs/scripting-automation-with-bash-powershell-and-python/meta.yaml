  - "[PAGE 447]\n\n# 21.1.1 Cloning Virtual Machines\n\nThe `make-vms.sh` script expects\
    \ two numeric parameters. It then loops from the start value to the end value\
    \ and creates the virtual machines, `vm-<nn>`. Thus, the `make-vms.sh 10 29` command\
    \ creates 20 virtual machines named `vm-10` to `vm-29`.\n\nThe script first tests\
    \ whether two parameters have been passed. Before it starts cloning, the script\
    \ makes sure that the original virtual machine (the clone base system, `orig`\
    \ variable) is shut down. It analyzes the list of all running virtual machines\
    \ generated via `virsh list`.\n\n`virt-clone` automatically creates the required\
    \ virtual disks using the filenames specified with `--file` and the *Media Access\
    \ Control (MAC)* addresses specified with `--mac` (for identifying network devices).\
    \ However, these disks always use the RAW image format. The `qemu-img` commands\
    \ that follow convert the image files into the more efficient QCOW2 format.\n\n\
    ```\n# Sample file make-vms.sh\nif [ $# -ne 2 ]; then\n    echo \"usage: make-vms.sh\
    \ <start> <end>\"\n    exit 1\nfi\nvmstart=$1\nvmend=$2\norig='vm-base'    # base\
    \ VM to clone\n\n# shut down clone base system\nresult=$(virsh list | grep $orig)\n\
    if [ ! -z \"$result\" ]; then\n    echo \"shutting down $orig\"\n    virsh shutdown\
    \ $orig\n    sleep 10\nfi\n\n# create VMs\nfor (( nr=$vmstart; nr<=$vmend; nr++\
    \ )); do\n    echo \"create vm-$nr\"\n    disk1=/var/lib/libvirt/images/vm-$nr-disk1.qcow2\n\
    \    disk2=/var/lib/libvirt/images/vm-$nr-disk2.qcow2\n    disk3=/var/lib/libvirt/images/vm-$nr-disk3.qcow2\n\
    \    disk4=/var/lib/libvirt/images/vm-$nr-disk4.qcow2\n    tmpdisk=/var/lib/libvirt/images/tmpdisk.qcow2\n\
    \    virt-clone --name \"vm-$nr\" --original $orig \\n        --mac 52:54:00:01:00:$nr\
    \ --mac 52:54:00:02:00:$nr \\n        --mac 52:54:00:03:00:$nr \\n        --file\
    \ $disk1 --file $disk2 --file $disk3 --file $disk4\n```"
  - "[PAGE 448]\n\n```\n# convert RAW disks to QCOW2 disks\nqemu-img convert $disk1\
    \ -O qcow2 $tmpdisk\nmv $tmpdisk $disk1\nqemu-img convert $disk2 -O qcow2 $tmpdisk\n\
    mv $tmpdisk $disk2\nqemu-img convert $disk3 -O qcow2 $tmpdisk\nmv $tmpdisk $disk3\n\
    qemu-img convert $disk4 -O qcow2 $tmpdisk\nmv $tmpdisk $disk4\ndone\n```\n\n#\
    \ 21.1.2 Starting and Shutting Down Virtual Machines\n\n`make-vms.sh` only creates\
    \ the `vm-<nn>` virtual machines; it does not start them. This task is carried\
    \ out by another script (`start-vms.sh`), which again expects two numbers as parameters.\
    \ It runs `virsh start <name>` to start the virtual machine in question.\n\n```\n\
    # Sample file start-vms.sh\nvmstart=$1\nvmend=$2\nfor (( nr=$vmstart; nr<=$vmend;\
    \ nr++ )); do\n  echo \"start vm-$nr\"\n  virsh start \"vm-$nr\"\ndone\n```\n\n\
    In addition, there are two analogous scripts to shut down the virtual machines\
    \ (`virsh shutdown`) and to delete them, deleting all virtual disks, respectively\
    \ (`virsh undefine --remove-all-storage`).\n\n# 21.1.3 Running Scripts on Multiple\
    \ Virtual Machines\n\nOnce you have gotten 20 virtual machines up and running,\
    \ you notice that you forgot a configuration detail. You could now log in to each\
    \ of the virtual machines using SSH and complete the configuration. But of course,\
    \ a more elegant solution exists: You can use `run-script-on-vms.sh` to run the\
    \ commands stored in `myscript.sh` via SSH on all desired virtual machines.\n\n\
    `run-script-on-vms.sh` assumes that there is an SSH key pair on your local server\
    \ and that the public key is known in the root account of the virtual machines.\
    \ For this purpose, you must allow SSH logins for `root` on `vm-base` and copy\
    \ the local key there with `ssh-copy-id root@basevm`. Needless to say, this step\
    \ must be done before cloning! Instead of `basevm`, you specify the hostname or\
    \ IP address of the virtual machine."
  - "[PAGE 449]\n\nrun-script-on-vms.sh is amazingly short. Basically, for each virtual\
    \ machine in a loop, the ssh root@host < myscripts.sh > result.txt command is\
    \ executed. Instead of host, the host name (here vm-<nn>.example.com) or the IP\
    \ address of the virtual machine in question must be specified in the script.\
    \ The -o StrictHostKeyChecking=no option causes SSH to forego asking whether to\
    \ trust a host to which a connection is being made for the first time.\n\n```\n\
    # Sample file run-script-on-vms.sh\nvmstart=$1\nvmend=$2\nfor (( nr=$vmstart;\
    \ nr<=$vmend; nr++ )); do\n    ssh -o StrictHostKeyChecking=no \\n        root@vm-$nr.example.com\
    \ 'bash -s' \\n        < myscript.sh > results-$nr.txt\ndone\n```\n\n# 21.2 Automating\
    \ the Network Configuration (KVMs)\n\n“Cloning” a virtual machine means that all\
    \ the properties of the source system are preserved. For this reason, all configuration\
    \ files are also cloned. In most cases, that is exactly what you want, but there\
    \ are exceptions. One of these exceptions is related to the static network configuration.\
    \ As far as the network adapters do not obtain their addresses automatically via\
    \ DHCP, the network configuration files of each virtual machine must be adjusted,\
    \ as otherwise network conflicts will occur.\n\nThis task is performed by another\
    \ script, which, however, is not located on the virtualization host, but inside\
    \ the virtual machine. So, there must be a script in the clone base system (according\
    \ to the names of the previous example in vm-base) that is executed when the virtual\
    \ machine or its clones are booted.\n\nIn my setup for the Linux courses I teach,\
    \ the virtual machines are compatible with Red Hat Enterprise Linux (RHEL) 9.\
    \ (I use AlmaLinux, but RHEL 9, Oracle Linux 9 or Rocky Linux 9 work exactly the\
    \ same way in this regard.) The vm-base virtual machine contains a script named\
    \ /etc/myscripts/setup-vm-network, which is executed on every boot process. The\
    \ file that is responsible for this task is /etc/rc.d/rc.local, which looks as\
    \ follows:\n\n```\n#!/bin/bash\ntouch /var/lock/subsys/local\n. /etc/myscripts/setup-vm-network\n\
    ```\n\nYou must make this file executable using chmod +x /etc/rc.d/rc.local for\
    \ it to be considered."
  - '[PAGE 450]


    # 21.2.1 Starting Point


    The `setup-vm-network` Bash script assumes that there are existing configuration
    files for two network adapters:


    `/etc/NetworkManager/system-connections/enp1s0.nmconnection`

    `/etc/NetworkManager/system-connections/enp7s0.nmconnection`


    The files use the Linux NetworkManager syntax and contain the following lines,
    among others:


    ```

    # static IPv4 configuration with 192.168.122.1 as gateway

    address1=192.168.122.27/24,192.168.122.1

    # static IPv6 configuration with 2a01:abce:abce::2 as gateway

    address1=2a01:abcd:abcd::27/64,2a01:abce:abce::2

    ```


    These files should be customized so that each virtual machine has a unique IPv4
    and IPv6 address. For this purpose, the last two digits of the MAC address of
    the first network adapter are analyzed. For example, if the MAC address is 52:54:00:01:00:27,
    the virtual machine should use the following IP addresses:


    +   - IPv4: 192.168.122.27

    - IPv6: 2a01:abcd:abce::27


    In the first lines of the script some variables are initialized. Then, the script
    analyzes the `/sys/class/net/enp1s0/address` system file, which contains the MAC
    address of the first adapter. `cut` extracts the sixth hexadecimal group from
    it. The `if` statement eliminates a leading 0, so it simply turns 07 into 7, for
    example.


    The `ipv4old` or `ipv4new` variables as well as `ipv6old` or `ipv6new` contain
    a pattern for the previous IP address and the required correct IP address. If
    the script detects via `grep` that the current network configuration does not
    match the desired address, both configuration files will be modified using `sed`.
    Simply put, the `sed` commands have the following effect:


    +   - `conffile1`: 192.168.122.*/24 gets replaced by 192.168.122.<nn>/24

    - `conffile2`: 2a01:abcd:abcd::*/64 gets replaced by 2a01:abcd:abcd::<nn>/64


    Next, the script deletes the `/etc/machine-id` file and then sets it up again
    with a random ID. This file as well has to do with the network configuration.
    It is analyzed by NetworkManager (a Linux system component) and used to generate
    IPv6 link local unicast addresses (fe80-xxx). If all virtual machines have the
    same internal ID number, then the unicast addresses are also identical and address
    conflicts will occur despite an otherwise correct IPv6 configuration.


    If required, you can of course add more functions to the script, for example,
    to generate new keys for the OpenSSH server or to set the hostname.'
- md: "## 21 Virtual Machines\n\n```bash\n# Sample file setup-vm-network.sh\nNMPATH=/etc/NetworkManager/system-connections\n\
    IF1=enp1s0\nIF2=enp7s0\n\n# location of the network configuration files\nconffile1=$NMPATH/$IF1.nmconnection\n\
    conffile2=$NMPATH/$IF2.nmconnection\n\n# extracts the last 2 MAC digits, eliminates\
    \ leading 0\nmac=$(cut -d ':' -f 6 /sys/class/net/$IF1/address)\nif [ ${mac:0:1}\
    \ == 0 ]; then mac=${mac:1:2}; fi\n\n# IPv4 and IPv6 addresses: old = previous,\
    \ new = desired\nip4old=\"192\\.168\\.122\\..*/24\"\nip4new=\"192\\.168\\.122\\\
    .$mac/24\"\nip6old=\"2a01:abcd:abcd::.*/64\"\nip6new=\"2a01:abcd:abcd::$mac/64\"\
    \n\n# if the configuration file uses a different address\n# than ip4new: rectify\
    \ configuration files using sed\nif ! grep -q \"address1=$ip4new\" $conffile1;\
    \ then\n  sed -E -i.old  \"s,$ip4old,$ip4new,\" $conffile1\n  sed -E -i.old  \"\
    s,$ip6old,$ip6new,\" $conffile2\n  # set up new /etc/machine-id\n  rm /etc/machine-id\n\
    \  systemd-machine-id-setup\n  # restart virtual machine\n  echo \"reboot\"\n\
    \  reboot\nelse\n  echo \"no network changes\"\nfi\n```\n\nThe script ends with\
    \ a `reboot` statement. If you develop a script yourself like in this example,\
    \ you must be extremely careful with `reboot`! If your script does not work properly,\
    \ the virtual machine will restart continuously. So, make sure to test your script\
    \ extensively before you include `reboot`!\n\nSince the script processes the last\
    \ two digits of the MAC address decimally (not hexadecimally), it is suitable\
    \ for the administration of 100 virtual machines. 192.168.122.0 is reserved. 192.168.122.1\
    \ and 2a01:abce:abce::2 are used as gateway addresses. This leaves the address\
    \ range 192.168.122.3 to .99 for IPv4. So, you can set up a maximum of 97 virtual\
    \ machines. If necessary, you can work around this limit by analyzing the last\
    \ two MAC digits hexadecimally or by considering multiple MAC digits.\n\n> **Alternatives**\n\
    > Running a script within the init system is not the only way to configure virtual\
    \ machines. Major virtualization frameworks such as OpenStack rely on cloud init\
    \ (see https://cloud-init.io).\n> To configure running virtual (or real) machines,\
    \ you can also use configuration tools such as Puppet or Ansible. However, these\
    \ programs assume that all machines in the network are accessible, i.e., that\
    \ the network configuration has already been completed.\n\n## 21.3 Controlling\
    \ Hyper-V\n\nHyper-V is to Windows what KVM is to Linux. It is therefore not surprising\
    \ that Microsoft has added a comprehensive PowerShell module to its own virtualization\
    \ system. If you have Windows Pro and have not yet enabled Hyper-V, the quickest\
    \ way to do this is to use the following command:\n\n```powershell\n> Add-WindowsFeature\
    \ Hyper-V -IncludeManagementTools\n```\n\nAbout 250 aliases and cmdlets can then\
    \ be executed on Windows (but not on Linux or macOS) via the Hyper-V PowerShell\
    \ module:\n\n```powershell\n> Get-Command -Module Hyper-V\n```\n\n| CommandType\
    \ | Name | Version | Source |\n| --- | --- | --- | --- |\n| Alias | Export-VMCheckpoint\
    \ | 2.0.0.0 | Hyper-V |\n| Alias | Get-VMCheckpoint | 2.0.0.0 | Hyper-V |\n| Alias\
    \ | Remove-VMCheckpoint | 2.0.0.0 | Hyper-V |\n| Alias | Rename-VMCheckpoint |\
    \ 2.0.0.0 | Hyper-V |\n| Alias | Restore-VMCheckpoint | 2.0.0.0 | Hyper-V |\n\
    | Cmdlet | Add-VMAssignableDevice | 2.0.0.0 | Hyper-V |\n| Cmdlet | Add-VMDvdDrive\
    \ | 2.0.0.0 | Hyper-V |\n| ... | | | |\n\n> **Admin Rights Required**\n> By default,\
    \ the execution of Hyper-V cmdlets requires admin rights. This means you need\
    \ to open a PowerShell terminal with admin rights.\n> Alternatively, you can add\
    \ individual users or groups to the Hyper-V administrators. This type of settings\
    \ can be done in the Group Policy Management Editor.\n\nGet-VM lists all installed\
    \ virtual machines and shows details about their current state:\n\n```powershell\n\
    > Get-VM\n\nName    State   CPUUsage(%)   MemoryAssigned(M)   ...\n----    -----\
    \   -----------   -----------------   ---\nalma9   Running 24            2024\n\
    kali    Running 0             5976\n...\n```\n\nGet-VM returns VirtualMachine\
    \ objects. Get-Member shows that the underlying class has innumerable properties:\n\
    \n```powershell\n> Get-VM | Select-Object -First 1 | Get-Member\n\nTypeName: Microsoft.HyperV.PowerShell.VirtualMachine\n\
    \nName                        MemberType   Definition\n----                  \
    \      ----------   ----------\nCheckpointFileLocation      AliasProperty ...\
    \ \nVMId                        AliasProperty ... \nVMName                   \
    \   AliasProperty ... \nEquals                      Method       ... \nGetHashCode\
    \                 Method       ... \nAutomaticCheckpointsEnabled Property    \
    \ ... \nAutomaticCriticalErrorAction Property    ... \nAutomaticStartAction  \
    \      Property     ... \nAutomaticStartDelay         Property     ... \n...\n\
    ```\n\nYou can start or shut down all virtual machines by using two one-liners\
    \ that call the Start-VM and Stop-VM cmdlets, respectively:\n\n```powershell\n\
    > Get-VM | Where-Object {$_.State -eq 'Off'} | Start-VM\n\n> Get-VM | Where-Object\
    \ {$_.State -eq 'Running'} | Stop-VM\n```\n\nThe especially useful Set-VM cmdlet\
    \ allows you to change various properties of virtual machines:\n\n```powershell\n\
    > $vm = Get-VM \"alma9-clone1\"\n> Set-VM -VM $vm -MemoryStartupBytes 2GB -ProcessorCount\
    \ 2\n```\n\nChanging the memory is impossible if the virtual machine uses a dynamically\
    \ allocated memory area. In that case, you can set the upper and lower limits,\
    \ as well as the initial memory size, which must not be larger than the upper\
    \ limit. The -DynamicMemory option allows you to switch from static to dynamic\
    \ memory management.\n\n```powershell\n> Set-VM -VM $vm -DynamicMemory -MemoryStartupBytes\
    \ 512MB `\n    -MemoryMinimumBytes 512MB -MemoryMaximumBytes 1GB\n```\n\nAs usual,\
    \ a reference of all Hyper-V cmdlets with their myriad options can be found online:\
    \ https://learn.microsoft.com/en-us/powershell/module/hyper-v.\n\n### 21.3.1 Cloning\
    \ Virtual Machines\n\nThe Hyper-V module does not provide its own cmdlet for cloning\
    \ virtual machines. However, this task can be done by means of a workaround: For\
    \ this purpose, you first need to export the virtual machine (Export-VM) and then\
    \ create the new virtual machine by means of an import (Import-VM).\n\nIn real\
    \ life, however, the process is more complex than this brief summary suggests.\
    \ The following script creates noOfClones copies of an existing virtual machine.\
    \ The script starts by shutting down the base virtual machine and deleting all\
    \ snapshots. (You should remove Remove-VMSnapshot if you want to keep the snapshots!\
    \ Note, however, that Export-VM also includes all snapshots and there is no option\
    \ to prevent this.)\n\n```powershell\n# Sample file clone-vm.ps1\n$basename =\
    \ \"alma9\"\n$noOfClones = 3\n$tmp = $env:TEMP  # Caution: $env:TEMP works only\
    \ on\n                  # Windows, but not on Linux/macOS\n\n# the function tests\
    \ if a directory exists, and\n# then deletes it; be careful!\nfunction delete-dir($path)\
    \ {\n    if (Test-Path \"$path\") {\n        Write-Output \"delete $path\"\n \
    \       Remove-Item \"$path\" -Recurse -Force\n    }\n}\n\n# when VM is running:\
    \ shutdown\n$basevm = Get-VM $basename\nif ($basevm.State -eq 'Running' ) {\n\
    \    Write-Output \"shutdown $basename\"\n    Stop-VM -VM $basevm\n}\n# delete\
    \ all snapshots of the VM (be careful!)\nGet-VMSnapshot -VM $basevm | Remove-VMSnapshot\n\
    ```\n\nThe next lines use Get-VMHardDiskDrive to determine the location of the\
    \ first disk of the base virtual machine. The disks of the cloned virtual machines\
    \ will be created later in subdirectories relative to this.\n\nIf the temporary\
    \ directory to which the export is to be done already exists (e.g., as a left-over\
    \ from a previous script call), then it will be deleted.\n\nExport-VM finally\
    \ exports the base virtual machine. This creates a subdirectory in the temporary\
    \ directory with the virtual machine name. The actual description of the virtual\
    \ machine is contained in a *.vmcx file. Get-ChildItem gets the filename.\n\n\
    ```powershell\n# (continued ...)\n# determines the directory in which the first\
    \ disk image\n# is stored\n$pathFirstDisk = (Get-VMHardDiskDrive -VM $basevm |\n\
    \                 Select-Object -First 1).Path\n$dirFirstDisk = Split-Path $pathFirstDisk\
    \ -Parent\nWrite-Output \"Virtual disk directory: $dirFirstDisk\"\n```\n\n```powershell\n\
    # delete temporary export directory (if it exists)\ndelete-dir \"$tmp\\$basename\"\
    \n# perform export\nExport-VM -VM $basevm -Path $tmp\n$vmcxfile = Get-ChildItem\
    \ `\n    \"$tmp\\$basename\\Virtual Machines\\*.vmcx\"\nWrite-Output \"VMCX file:\
    \ $vmcxfile\"\n```\n\nSeveral clones of the virtual machine are now created in\
    \ a loop. The -Copy option means that this really creates a new virtual machine\
    \ with its own files. -GenerateNewId gives the virtual machine its own Hyper-V\
    \ identification number. The two -XxxPath options specify where to store the virtual\
    \ machine files.\n\nRename-VM gives the virtual machine a new name. Hyper-V has\
    \ no problem with multiple virtual machines having the same name, but virtual\
    \ machines with the same name only cause confusion.\n\nHyper-V automatically assigns\
    \ 2 CPUs and 2 GB of memory to new virtual machines. Set-VM reduces these values.\
    \ In addition, Set-VMNetworkAdapter sets a static MAC address for each virtual\
    \ machine. By default, Hyper-V uses dynamic MACs that are generated only when\
    \ a virtual machine is started. The first six digits of the MAC should always\
    \ be 00155d. This part of the MAC was reserved by Microsoft for Hyper-V.\n\n```powershell\n\
    # (continued ...)\n# create $noOfClones copies of the exported VM\nfor ($i = 1;\
    \ $i -le $noOfClones; $i++) {\n    $cloneName = \"${basename}-clone${i}\"\n  \
    \  Write-Output \"setup $cloneName with MAC $mac\"\n```"
  mdcn: "## 21 虚拟机\n\n```bash\n# 示例文件 setup-vm-network.sh\nNMPATH=/etc/NetworkManager/system-connections\n\
    IF1=enp1s0\nIF2=enp7s0\n\n# 网络配置文件的位置\nconffile1=$NMPATH/$IF1.nmconnection\nconffile2=$NMPATH/$IF2.nmconnection\n\
    \n# 提取 MAC 地址的最后两位十六进制数，并去除前导零\nmac=$(cut -d ':' -f 6 /sys/class/net/$IF1/address)\n\
    if [ ${mac:0:1} == 0 ]; then mac=${mac:1:2}; fi\n\n# IPv4 和 IPv6 地址：old = 旧地址，new\
    \ = 新地址\nip4old=\"192\\.168\\.122\\..*/24\"\nip4new=\"192\\.168\\.122\\.$mac/24\"\
    \nip6old=\"2a01:abcd:abcd::.*/64\"\nip6new=\"2a01:abcd:abcd::$mac/64\"\n\n# 如果配置文件使用的地址与\
    \ ip4new 不同\n# 则使用 sed 修正配置文件\nif ! grep -q \"address1=$ip4new\" $conffile1; then\n\
    \  sed -E -i.old  \"s,$ip4old,$ip4new,\" $conffile1\n  sed -E -i.old  \"s,$ip6old,$ip6new,\"\
    \ $conffile2\n  # 设置新的 /etc/machine-id\n  rm /etc/machine-id\n  systemd-machine-id-setup\n\
    \  # 重启虚拟机\n  echo \"reboot\"\n  reboot\nelse\n  echo \"no network changes\"\n\
    fi\n```\n\n该脚本以 `reboot` 语句结束。如果你像本例一样自己编写脚本，必须对 `reboot` 命令格外小心！如果脚本运行不正常，虚拟机将会持续重启。因此，在脚本中加入\
    \ `reboot` 之前，请务必进行充分测试！\n\n由于该脚本以十进制（而非十六进制）方式处理 MAC 地址的最后两位数字，因此适用于管理最多 100\
    \ 台虚拟机。192.168.122.0 被保留。192.168.122.1 和 2a01:abce:abce::2 用作网关地址。这为 IPv4 留下了\
    \ 192.168.122.3 到 .99 的地址范围。因此，你最多可以设置 97 台虚拟机。如有必要，你可以通过分析 MAC 地址最后两位的十六进制值，或考虑更多位\
    \ MAC 地址来绕过此限制。\n\n> **替代方案**\n> 在 init 系统中运行脚本并非配置虚拟机的唯一方式。OpenStack 等主要虚拟化框架依赖于\
    \ cloud-init（参见 https://cloud-init.io）。\n> 要配置正在运行的虚拟（或物理）机器，你也可以使用 Puppet 或 Ansible\
    \ 等配置工具。然而，这些程序假设网络中的所有机器都是可访问的，即网络配置已经完成。\n\n## 21.3 控制 Hyper-V\n\nHyper-V 之于\
    \ Windows，就如同 KVM 之于 Linux。因此，微软为其虚拟化系统添加了一个全面的 PowerShell 模块也就不足为奇了。如果你使用的是 Windows\
    \ Pro 且尚未启用 Hyper-V，最快的方法是使用以下命令：\n\n```powershell\n> Add-WindowsFeature Hyper-V\
    \ -IncludeManagementTools\n```\n\n之后，大约 250 个别名和 cmdlet 可以通过 Hyper-V PowerShell\
    \ 模块在 Windows（但不能在 Linux 或 macOS）上执行：\n\n```powershell\n> Get-Command -Module\
    \ Hyper-V\n```\n\n| CommandType | Name | Version | Source |\n| --- | --- | ---\
    \ | --- |\n| Alias | Export-VMCheckpoint | 2.0.0.0 | Hyper-V |\n| Alias | Get-VMCheckpoint\
    \ | 2.0.0.0 | Hyper-V |\n| Alias | Remove-VMCheckpoint | 2.0.0.0 | Hyper-V |\n\
    | Alias | Rename-VMCheckpoint | 2.0.0.0 | Hyper-V |\n| Alias | Restore-VMCheckpoint\
    \ | 2.0.0.0 | Hyper-V |\n| Cmdlet | Add-VMAssignableDevice | 2.0.0.0 | Hyper-V\
    \ |\n| Cmdlet | Add-VMDvdDrive | 2.0.0.0 | Hyper-V |\n| ... | | | |\n\n> **需要管理员权限**\n\
    > 默认情况下，执行 Hyper-V cmdlet 需要管理员权限。这意味着你需要以管理员权限打开 PowerShell 终端。\n> 或者，你可以将单个用户或组添加到\
    \ Hyper-V 管理员组中。此类设置可以在组策略管理编辑器中完成。\n\nGet-VM 列出所有已安装的虚拟机，并显示其当前状态的详细信息：\n\n```powershell\n\
    > Get-VM\n\nName    State   CPUUsage(%)   MemoryAssigned(M)   ...\n----    -----\
    \   -----------   -----------------   ---\nalma9   Running 24            2024\n\
    kali    Running 0             5976\n...\n```\n\nGet-VM 返回 VirtualMachine 对象。Get-Member\
    \ 显示其底层类具有无数属性：\n\n```powershell\n> Get-VM | Select-Object -First 1 | Get-Member\n\
    \nTypeName: Microsoft.HyperV.PowerShell.VirtualMachine\n\nName               \
    \         MemberType   Definition\n----                        ----------   ----------\n\
    CheckpointFileLocation      AliasProperty ... \nVMId                        AliasProperty\
    \ ... \nVMName                      AliasProperty ... \nEquals               \
    \       Method       ... \nGetHashCode                 Method       ... \nAutomaticCheckpointsEnabled\
    \ Property     ... \nAutomaticCriticalErrorAction Property    ... \nAutomaticStartAction\
    \        Property     ... \nAutomaticStartDelay         Property     ... \n...\n\
    ```\n\n你可以通过分别调用 Start-VM 和 Stop-VM cmdlet 的两个单行命令来启动或关闭所有虚拟机：\n\n```powershell\n\
    > Get-VM | Where-Object {$_.State -eq 'Off'} | Start-VM\n\n> Get-VM | Where-Object\
    \ {$_.State -eq 'Running'} | Stop-VM\n```\n\n特别有用的 Set-VM cmdlet 允许你更改虚拟机的各种属性：\n\
    \n```powershell\n> $vm = Get-VM \"alma9-clone1\"\n> Set-VM -VM $vm -MemoryStartupBytes\
    \ 2GB -ProcessorCount 2\n```\n\n如果虚拟机使用动态分配的内存区域，则无法更改内存。在这种情况下，你可以设置上限和下限，以及初始内存大小（该值不得大于上限）。-DynamicMemory\
    \ 选项允许你从静态内存管理切换到动态内存管理。\n\n```powershell\n> Set-VM -VM $vm -DynamicMemory -MemoryStartupBytes\
    \ 512MB `\n    -MemoryMinimumBytes 512MB -MemoryMaximumBytes 1GB\n```\n\n与往常一样，所有\
    \ Hyper-V cmdlet 及其众多选项的参考手册可在线找到：https://learn.microsoft.com/en-us/powershell/module/hyper-v。\n\
    \n### 21.3.1 克隆虚拟机\n\nHyper-V 模块没有提供用于克隆虚拟机的专用 cmdlet。但是，可以通过一种变通方法完成此任务：为此，你首先需要导出虚拟机（Export-VM），然后通过导入（Import-VM）创建新的虚拟机。\n\
    \n然而，在实际操作中，这个过程比这个简要概述所暗示的要复杂。以下脚本创建一个现有虚拟机的多个克隆副本。脚本首先关闭基础虚拟机并删除所有快照。（如果你想保留快照，应该移除\
    \ Remove-VMSnapshot 命令！但请注意，Export-VM 也会包含所有快照，并且没有选项可以阻止这一点。）\n\n```powershell\n\
    # 示例文件 clone-vm.ps1\n$basename = \"alma9\"\n$noOfClones = 3\n$tmp = $env:TEMP\
    \  # 注意：$env:TEMP 仅在 Windows 上有效，\n                  # 在 Linux/macOS 上无效\n\n#\
    \ 此函数测试目录是否存在，然后删除它；请小心！\nfunction delete-dir($path) {\n    if (Test-Path \"$path\"\
    ) {\n        Write-Output \"delete $path\"\n        Remove-Item \"$path\" -Recurse\
    \ -Force\n    }\n}\n\n# 如果虚拟机正在运行：关闭它\n$basevm = Get-VM $basename\nif ($basevm.State\
    \ -eq 'Running' ) {\n    Write-Output \"shutdown $basename\"\n    Stop-VM -VM\
    \ $basevm\n}\n# 删除虚拟机的所有快照（请小心！）\nGet-VMSnapshot -VM $basevm | Remove-VMSnapshot\n\
    ```\n\n接下来的几行使用 Get-VMHardDiskDrive 来确定基础虚拟机第一个磁盘的位置。克隆虚拟机的磁盘稍后将相对于此位置在子目录中创建。\n\
    \n如果要导出到的临时目录已经存在（例如，是之前脚本调用的遗留物），则将其删除。\n\nExport-VM 最终导出基础虚拟机。这会在临时目录中创建一个以虚拟机名称命名的子目录。虚拟机的实际描述包含在\
    \ *.vmcx 文件中。Get-ChildItem 获取文件名。\n\n```powershell\n# （续...）\n# 确定第一个磁盘映像存储的目录\n\
    $pathFirstDisk = (Get-VMHardDiskDrive -VM $basevm |\n                 Select-Object\
    \ -First 1).Path\n$dirFirstDisk = Split-Path $pathFirstDisk -Parent\nWrite-Output\
    \ \"Virtual disk directory: $dirFirstDisk\"\n```\n\n```powershell\n# 删除临时导出目录（如果存在）\n\
    delete-dir \"$tmp\\$basename\"\n# 执行导出\nExport-VM -VM $basevm -Path $tmp\n$vmcxfile\
    \ = Get-ChildItem `\n    \"$tmp\\$basename\\Virtual Machines\\*.vmcx\"\nWrite-Output\
    \ \"VMCX file: $vmcxfile\"\n```\n\n现在通过循环创建虚拟机的多个克隆。-Copy 选项意味着这确实会创建一个拥有自己文件的新虚拟机。-GenerateNewId\
    \ 为虚拟机分配其自己的 Hyper-V 标识号。两个 -XxxPath 选项指定虚拟机文件的存储位置。\n\nRename-VM 为虚拟机赋予一个新名称。Hyper-V\
    \ 不介意多个虚拟机同名，但同名的虚拟机只会引起混淆。\n\nHyper-V 为新虚拟机自动分配 2 个 CPU 和 2 GB 内存。Set-VM 会降低这些值。此外，Set-VMNetworkAdapter\
    \ 为每台虚拟机设置一个静态 MAC 地址。默认情况下，Hyper-V 使用动态 MAC 地址，这些地址仅在虚拟机启动时生成。MAC 地址的前六位数字应始终为\
    \ 00155d。这部分 MAC 地址是微软为 Hyper-V 保留的。\n\n```powershell\n# （续...）\n# 创建导出虚拟机的 $noOfClones\
    \ 个副本\nfor ($i = 1; $i -le $noOfClones; $i++) {\n    $cloneName = \"${basename}-clone${i}\"\
    \n    Write-Output \"setup $cloneName with MAC $mac\"\n```"
