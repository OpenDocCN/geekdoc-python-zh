    \ has a similar structure to the Bash script, so I'll leave it at some comments.\
    \ For `New-Item`, `Out-Null` prevents the otherwise mandatory output of the filename.\n\
    \n```powershell\n# Sample file upload-images.ps1\n$localdir = (Get-Location).Path\n\
    $remotedir = \"/var/www/html/wordpress/myimages\"\n$remotehost = \"hostname\"\n\
    $remoteuser = \"username\"\n$lastrun = \"$localdir/last-run\"\n$now = \"$localdir/now\"\
    \n\n# Create file last-run if it does not exist yet;\n# use an old date (2000-01-01).\n\
    if (-not (Test-Path $lastrun)) {\n    (New-Item $lastrun).LastWriteTime = Get-Date\
    \ \"2000-01-01\"\n}\n# create file now with current date and time\nNew-Item $now\
    \ -Force | Out-Null\n\n# upload all files that have changed after last-run\n$lastruntime\
    \ = (Get-Item $lastrun).LastWriteTime\nGet-ChildItem -Path $localdir/* `\n   \
    \ -Include \"*.jpg\", \"*.jpeg\", \"*.png\" |\nWhere-Object { $_.LastWriteTime\
    \ -gt $lastruntime } |\nForEach-Object {\n    scp $_.FullName $remoteuser@${remotehost}:$remotedir\n\
    }\n\n# update last-run\nMove-Item -Force $now $lastrun\n```\n\nI called `scp`\
    \ directly in this script because a typical Linux server rarely has PowerShell\
    \ installed, let alone the required configuration of `sshd_config` for SSH remoting.\
    \ But should these requirements be met, you can of course also use SSH remoting.\
    \ You can find the complete script in the sample files. Only the few lines that\
    \ change in the course of this kind of approach are shown in the following excerpt:\n\
    \n```powershell\n# Sample file upload-images-remoting.ps1\n...\n$session = New-PSSession\
    \ $remotehost -Username $remoteuser\nGet-ChildItem -Path $localdir/* `\n    -Include\
    \ \"*.jpg\", \"*.jpeg\", \"*.png\" |\nWhere-Object { $_.LastWriteTime -gt $lastruntime\
    \ } |\nForEach-Object {\n    Copy-Item -ToSession $session $_ $remotedir\n}\n\
    Remove-PSSession $session\n```\n\n## 12.6 Example: Analyzing Virtual Machines\n\
    \nOur second example is about reading information from a group of similar virtual\
    \ machines. In this specific case, the virtual machines formed the basis of a\
    \ laboratory exercise at a technical college. Each student had access to a virtual\
    \ machine. When setting up these virtual machines, I made sure I put the public\
    \ part of my SSH key there. The virtual machines are accessible under the hostnames\
    \ `host<nn>.mylab.com`.\n\nFor a quick overview of how virtual disks and file\
    \ systems are organized, I want to run the `lsblk` command on each instance, which\
    \ can be done using a Bash one-liner (but is printed over four lines for space\
    \ and readability). Due to the `-o StrictHostKeyChecking=no` option, `ssh` does\
    \ not ask whether the host should be trusted the first time a connection is established.\n\
    \n```bash\n$ for i in {01..25}; do\n    echo \"\\n\\nVM: $i\";\n    ssh user@host$i.mylab.com\
    \ -o StrictHostKeyChecking=no lsblk;\ndone\n```\n\n```\nVM: 01\nNAME         \
    \       MAJ:MIN RM  SIZE RO TYPE MOUNTPOINTS\nsr0                 11:0    1 1024M\
    \  0 rom\nvda                 252:0   0    5G  0 disk\n├─vda1              252:1\
    \   0    1G  0 part /boot\n└─vda2              252:2   0    4G  0 part\n  ├─almalinux-root\
    \  253:0   0  3,5G  0 lvm  /\n  └─almalinux-swap  253:1   0  512M  0 lvm  [SWAP]\n\
    vdb                 252:16  0    1G  0 disk\n...\n```\n\nIf more information is\
    \ to be determined for each virtual machine and stored in result files, programming\
    \ a small script could be worthwhile:\n\n```bash\n# Sample file gather-vm-data.sh\n\
    VMNAMES=$(echo host{01..25})\nVMHOST=mylab.com\nUSER=username\nCMDS='hostnamectl;\
    \ echo; ip addr; echo; lsblk'\n\nfor vm in $VMNAMES; do\n    echo $vm\n    ssh\
    \ $USER@$vm.$VMHOST -o StrictHostKeyChecking=no \"$CMDS\" \\\n        > result-$vm.txt\n\
    done\n```\n\nThe script traverses all virtual machines contained in `VMNAMES`,\
    \ executes the commands listed in `CMDS` there, and saves the results in files\
    \ with names like `result-<vmname>.txt`.\n\nI use a strongly extended variant\
    \ of this script for evaluating exams for my “Linux System Administration” course.\
    \ Students must perform all possible admin tasks in a freshly set up virtual machine\
    \ as part of the exam. Correcting the exam tasks cannot be fully automated, but\
    \ the script nevertheless greatly relieves me of tedious grading work.\n\nOf course,\
    \ you can also use comparable scripts away from teaching, for example, for the\
    \ central monitoring or administration of large groups of servers or virtual machines.\n\
    \n> **Other Tools**\n> The use of “hand-knitted” scripts is only recommended if\
    \ the work to be performed is manageable. The more complex the task, the more\
    \ likely you should look for remote administration or server pool monitoring programs.\
    \ Proven configuration tools include *Ansible* or *Puppet*; you can manage comprehensive\
    \ monitoring using *Grafana*, *Prometheus*, or *Nagios*.\n>\n> If you’re only\
    \ interested in running commands via SSH on many computers as efficiently as possible,\
    \ *Cluster SSH* or *Parallel SSH* might be worth trying out.\n\n## Chapter 13\n\
    ## Visual Studio Code\n\n*Visual Studio Code* (*VS Code*), sometimes simply *Code*,\
    \ is currently the most universally popular editor for software developers. The\
    \ strengths of this program developed by Microsoft include support for all conceivable\
    \ programming languages and platforms, a huge range of extensions, comprehensive\
    \ configuration options, and excellent integration with the Git version management\
    \ system.\n\nAlthough VS Code is by no means the only editor in my everyday work\
    \ environment, I wouldn't want to miss out on its strengths. From the perspective\
    \ of this book, VS Code scores points for its consistency of use, whether you\
    \ work on a Bash, Python, or PowerShell script. This is an advantage compared\
    \ to dedicated development systems such as *PyCharm* for Python, for example,\
    \ where you must memorize different working techniques and keyboard shortcuts.\n\
    \nAn introduction to VS Code seems superfluous in this book as you probably already\
    \ know about the editor. If not, you can find loads of tutorials and videos on\
    \ the internet to get you started. This short chapter focuses instead on the scripting-specific\
    \ features of VS Code—in particular, the Bash, PowerShell, Python, and Remote\
    \ – SSH extensions.\n\n> **Prerequisites for This Chapter**\n> You can read this\
    \ chapter separately from the rest of the book. However, using the remote SSH\
    \ extension requires that you're familiar with SSH (see [Chapter 12](#)).\n\n\
    ## 13.1 Introduction\n\nInstalling VS Code on Windows and macOS is quite easy.\
    \ Simply download the installation program or the corresponding ZIP file from\
    \ [https://code.visualstudio.com/download](https://code.visualstudio.com/download).\
    \ On Windows, run the program; on macOS, you must move the editor from the ZIP\
    \ archive to the *Programs* folder.\n\nFor Linux, Microsoft provides Debian and\
    \ RPM packages. When you install the Debian package, a package source gets automatically\
    \ set up so that you'll also receive updates for VS Code as part of the system\
    \ updates in the future. If, on the other hand, you run Fedora, openSUSE or a\
    \ Red Hat compatible distribution, you'll have to take care of the updates yourself.\
    \ To do this, you should visit the download page once every few months, download\
    \ the latest version of the RPM package, and repeat the installation.\n\nIf you\
    \ use Arch Linux, you can install VS Code as an AUR package, which allows you\
    \ to choose between an Arch Linux variant or the official Microsoft binary. The\
    \ best way to do this is to use an AUR helper, such as `yay`. If you do, then\
    \ the VS Code installation will succeed by using `yay -S code-git` or `yay -S\
    \ visual-studio-code-bin`.\n\n### 13.1.1 Comparing VS Code, VSCodium, and Visual\
    \ Studio\n\nAlthough the code for VS Code is subject to an open-source license\
    \ and is located in a public GitHub repository, the binary version offered for\
    \ download by Microsoft is subject to a different license and contains telemetry\
    \ functions. If these functions bother you, search for “Telemetry” in the settings\
    \ and disable the corresponding options.\n\nIf you’re unhappy with the license\
    \ for the VS Code downloaded from Microsoft or you’re generally suspicious, you\
    \ can install the *VSCodium* variant instead (see also https://vscodium.com).\
    \ VSCodium uses the same GitHub code as VS Code, but the telemetry features are\
    \ disabled, the program has a different icon, and the liberal MIT license applies\
    \ to its use.\n\nVS Code or VSCodium have nothing (or at least very little) to\
    \ do with the *Visual Studio* development environment. This commercial Microsoft\
    \ product is specifically designed for developing programs in C#, C++, and Visual\
    \ Basic.\n\n### 13.1.2 Think in Terms of Directories, Not Files!\n\nIn traditional\
    \ editors like Notepad++, you can simply open files from any location and edit\
    \ them. While this access is also possible in VS Code, it is not the ideal way\
    \ of working. In VS Code, you open a directory via **File • Open Folder**. The\
    \ files contained therein will then be displayed in the sidebar and can be opened\
    \ and edited by double-clicking them.\n\nWhy is the directory paradigm of VS Code\
    \ so important? VS Code provides extensions for most programming languages. In\
    \ this way, VS Code can “understand” your code better and supports you during\
    \ input. At the same time, scripts can be run directly from the editor via a **Run**\
    \ button. The active directory is then the directory last opened in VS Code, not\
    \ the directory where the script file is located!\n\nLet’s suppose you have developed\
    \ a script that opens and processes a CSV file located in the same directory.\
    \ However, when running the script, an error occurs because the script does not\
    \ find the file. If this error arises, you have fallen into the VS Code directory\
    \ trap. The solution is pretty straightforward: Either run the script manually\
    \ where the easiest way is in the terminal section of VS Code or, even better,\
    \ use **File • Open Folder** to change to the directory where your script is located.\n\
    \nVS Code’s preference for directories may force you to question specific ways\
    \ of working. Editing scripts that are scattered across countless directories\
    \ is tedious in VS Code. On the other hand, it’s probably a good idea to place\
    \ scripts that are related in content in one directory anyway."
  mdcn: "## 12.5.3 PowerShell 脚本\n\n如果你的镜像位于 Windows 计算机上，那么使用 PowerShell 来实现脚本是合理的。以下代码与\
    \ Bash 脚本结构相似，因此我只添加一些注释。对于 `New-Item`，`Out-Null` 可以阻止其原本必须输出的文件名。\n\n```powershell\n\
    # 示例文件 upload-images.ps1\n$localdir = (Get-Location).Path\n$remotedir = \"/var/www/html/wordpress/myimages\"\
    \n$remotehost = \"hostname\"\n$remoteuser = \"username\"\n$lastrun = \"$localdir/last-run\"\
    \n$now = \"$localdir/now\"\n\n# 如果文件 last-run 尚不存在，则创建它；\n# 使用一个旧日期（2000-01-01）。\n\
    if (-not (Test-Path $lastrun)) {\n    (New-Item $lastrun).LastWriteTime = Get-Date\
    \ \"2000-01-01\"\n}\n# 创建文件 now，记录当前日期和时间\nNew-Item $now -Force | Out-Null\n\n\
    # 上传所有在 last-run 之后更改过的文件\n$lastruntime = (Get-Item $lastrun).LastWriteTime\n\
    Get-ChildItem -Path $localdir/* `\n    -Include \"*.jpg\", \"*.jpeg\", \"*.png\"\
    \ |\nWhere-Object { $_.LastWriteTime -gt $lastruntime } |\nForEach-Object {\n\
    \    scp $_.FullName $remoteuser@${remotehost}:$remotedir\n}\n\n# 更新 last-run\n\
    Move-Item -Force $now $lastrun\n```\n\n我在这个脚本中直接调用了 `scp`，因为典型的 Linux 服务器很少安装\
    \ PowerShell，更不用说为 SSH 远程处理配置所需的 `sshd_config` 了。但如果满足这些要求，你当然也可以使用 SSH 远程处理。你可以在示例文件中找到完整的脚本。以下摘录仅展示了在此类方法过程中会发生变化的几行：\n\
    \n```powershell\n# 示例文件 upload-images-remoting.ps1\n...\n$session = New-PSSession\
    \ $remotehost -Username $remoteuser\nGet-ChildItem -Path $localdir/* `\n    -Include\
    \ \"*.jpg\", \"*.jpeg\", \"*.png\" |\nWhere-Object { $_.LastWriteTime -gt $lastruntime\
    \ } |\nForEach-Object {\n    Copy-Item -ToSession $session $_ $remotedir\n}\n\
    Remove-PSSession $session\n```\n\n## 12.6 示例：分析虚拟机\n\n我们的第二个示例是关于从一组相似的虚拟机中读取信息。在这个特定案例中，这些虚拟机是一所技术学院实验课程的基础。每位学生都可以访问一台虚拟机。在设置这些虚拟机时，我确保将我的\
    \ SSH 公钥放在了里面。这些虚拟机可通过主机名 `host<nn>.mylab.com` 访问。\n\n为了快速概览虚拟磁盘和文件系统的组织方式，我想在每个实例上运行\
    \ `lsblk` 命令，这可以使用 Bash 单行命令完成（但为了空间和可读性，打印时分成了四行）。由于 `-o StrictHostKeyChecking=no`\
    \ 选项，`ssh` 在首次建立连接时不会询问是否应信任该主机。\n\n```bash\n$ for i in {01..25}; do\n    echo\
    \ \"\\n\\nVM: $i\";\n    ssh user@host$i.mylab.com -o StrictHostKeyChecking=no\
    \ lsblk;\ndone\n```\n\n```\nVM: 01\nNAME                MAJ:MIN RM  SIZE RO TYPE\
    \ MOUNTPOINTS\nsr0                 11:0    1 1024M  0 rom\nvda               \
    \  252:0   0    5G  0 disk\n├─vda1              252:1   0    1G  0 part /boot\n\
    └─vda2              252:2   0    4G  0 part\n  ├─almalinux-root  253:0   0  3,5G\
    \  0 lvm  /\n  └─almalinux-swap  253:1   0  512M  0 lvm  [SWAP]\nvdb         \
    \        252:16  0    1G  0 disk\n...\n```\n\n如果需要为每台虚拟机确定更多信息并存储在结果文件中，编写一个小脚本可能是值得的：\n\
    \n```bash\n# 示例文件 gather-vm-data.sh\nVMNAMES=$(echo host{01..25})\nVMHOST=mylab.com\n\
    USER=username\nCMDS='hostnamectl; echo; ip addr; echo; lsblk'\n\nfor vm in $VMNAMES;\
    \ do\n    echo $vm\n    ssh $USER@$vm.$VMHOST -o StrictHostKeyChecking=no \"$CMDS\"\
    \ \\\n        > result-$vm.txt\ndone\n```\n\n该脚本遍历 `VMNAMES` 中包含的所有虚拟机，在那里执行 `CMDS`\
    \ 中列出的命令，并将结果保存到名为 `result-<vmname>.txt` 的文件中。\n\n我使用这个脚本的一个高度扩展版本来评估我的“Linux\
    \ 系统管理”课程的考试。学生必须在考试期间在一台新设置的虚拟机中执行所有可能的管理任务。虽然考试任务的批改无法完全自动化，但该脚本仍然极大地减轻了我繁琐的评分工作。\n\
    \n当然，你也可以在教学之外使用类似的脚本，例如，用于大型服务器组或虚拟机的集中监控或管理。\n\n> **其他工具**\n> 只有在要执行的工作量可控时，才建议使用“手工编写的”脚本。任务越复杂，你就越应该寻找远程管理或服务器池监控程序。成熟的配置工具包括\
    \ *Ansible* 或 *Puppet*；你可以使用 *Grafana*、*Prometheus* 或 *Nagios* 来管理全面的监控。\n>\n\
    > 如果你只想尽可能高效地通过 SSH 在许多计算机上运行命令，*Cluster SSH* 或 *Parallel SSH* 可能值得一试。\n\n## 第\
    \ 13 章\n## Visual Studio Code\n\n*Visual Studio Code*（*VS Code*），有时简称 *Code*，是目前软件开发者中最普遍流行的编辑器。这款由微软开发的程序的优势包括支持所有可想象的编程语言和平台、庞大的扩展库、全面的配置选项以及与\
    \ Git 版本管理系统的出色集成。\n\n尽管 VS Code 绝非我日常工作环境中唯一的编辑器，但我不想错过它的优势。从本书的角度来看，VS Code\
    \ 的优势在于其使用的一致性，无论你是在编写 Bash、Python 还是 PowerShell 脚本。与专用的开发系统（例如用于 Python 的 *PyCharm*）相比，这是一个优势，因为在后者中你必须记住不同的工作技巧和键盘快捷键。\n\
    \n在本书中介绍 VS Code 似乎有些多余，因为你可能已经了解这个编辑器。如果没有，你可以在互联网上找到大量的教程和视频来帮助你入门。本简短章节将重点介绍\
    \ VS Code 与脚本相关的特定功能——特别是 Bash、PowerShell、Python 和 Remote – SSH 扩展。\n\n> **本章的先决条件**\n\
    > 你可以独立于本书的其余部分阅读本章。但是，使用远程 SSH 扩展要求你熟悉 SSH（参见[第 12 章](#)）。\n\n## 13.1 简介\n\n\
    在 Windows 和 macOS 上安装 VS Code 相当简单。只需从 [https://code.visualstudio.com/download](https://code.visualstudio.com/download)\
    \ 下载安装程序或相应的 ZIP 文件。在 Windows 上，运行程序；在 macOS 上，你必须将编辑器从 ZIP 存档移动到 *Programs* 文件夹。\n\
    \n对于 Linux，微软提供了 Debian 和 RPM 包。当你安装 Debian 包时，会自动设置一个包源，这样你将来也会在系统更新中收到 VS Code\
    \ 的更新。另一方面，如果你运行 Fedora、openSUSE 或 Red Hat 兼容发行版，你就必须自己处理更新。为此，你应该每隔几个月访问一次下载页面，下载最新版本的\
    \ RPM 包，并重复安装。\n\n如果你使用 Arch Linux，你可以将 VS Code 安装为 AUR 包，这允许你在 Arch Linux 变体或官方微软二进制文件之间进行选择。最好的方法是使用\
    \ AUR 助手，例如 `yay`。如果你这样做，那么使用 `yay -S code-git` 或 `yay -S visual-studio-code-bin`\
    \ 将成功安装 VS Code。\n\n### 13.1.1 比较 VS Code、VSCodium 和 Visual Studio\n\n尽管 VS Code\
    \ 的代码遵循开源许可并位于公共 GitHub 仓库中，但微软提供的下载二进制版本遵循不同的许可，并包含遥测功能。如果这些功能困扰你，请在设置中搜索“Telemetry”并禁用相应的选项。\n\
    \n如果你对从微软下载的 VS Code 的许可不满意，或者你通常持怀疑态度，你可以改为安装 *VSCodium* 变体（另请参阅 https://vscodium.com）。VSCodium\
    \ 使用与 VS Code 相同的 GitHub 代码，但遥测功能被禁用，程序具有不同的图标，并且其使用遵循宽松的 MIT 许可。\n\nVS Code 或\
    \ VSCodium 与 *Visual Studio* 开发环境无关（或至少关系很小）。这款微软的商业产品专门用于开发 C#、C++ 和 Visual Basic\
    \ 程序。\n\n### 13.1.2 以目录而非文件的方式思考！\n\n在像 Notepad++ 这样的传统编辑器中，你可以简单地从任何位置打开文件并进行编辑。虽然这种访问方式在\
    \ VS Code 中也是可能的，但它不是理想的工作方式。在 VS Code 中，你通过 **File • Open Folder** 打开一个目录。其中包含的文件将显示在侧边栏中，可以通过双击打开和编辑。\n\
    \n为什么 VS Code 的目录范式如此重要？VS Code 为大多数编程语言提供了扩展。通过这种方式，VS Code 可以更好地“理解”你的代码，并在输入时为你提供支持。同时，脚本可以直接通过编辑器中的\
    \ **Run** 按钮运行。活动目录将是 VS Code 中最后打开的目录，而不是脚本文件所在的目录！\n\n假设你开发了一个脚本，用于打开和处理位于同一目录中的\
    \ CSV 文件。然而，在运行脚本时发生错误，因为脚本找不到文件。如果出现此错误，你就陷入了 VS Code 的目录陷阱。解决方案相当简单：要么手动运行脚本，最简单的方法是在\
    \ VS Code 的终端部分；要么更好的是，使用 **File • Open Folder** 切换到你的脚本所在的目录。\n\nVS Code 对目录的偏好可能迫使你质疑特定的工作方式。在\
    \ VS Code 中编辑分散在无数目录中的脚本是乏味的。另一方面，将内容相关的脚本放在一个目录中可能始终是个好主意。"
