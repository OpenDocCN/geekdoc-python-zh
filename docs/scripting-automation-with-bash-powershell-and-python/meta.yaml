- img_proc: true
  md: '# Avoid Using Aliases in Scripts!


    Once you get used to the most important aliases in interactive mode, you may be
    tempted to use them in scripts as well, but doing so is not a good idea. Depending
    on the configuration or operating system, different abbreviations may be active.
    For example, on Windows, `ls` is an alias for `Get-ChildItem`; on Linux and macOS,
    however, `ls` calls the Unix-style `ls` command!


    The aliases specified in this book always apply to Windows.


    # Aliases versus Functions


    At first glance, you may find it difficult to determine whether a short name is
    an alias or a function. If you’re curious, you can call `Get-Command`. This cmdlet
    reveals, for example, that `mkdir` is a function, while `rmdir` is an alias.'
  merge: -1
