    > **No Globbing Results**


    Globbing only works if there is at least *one* matching file. If there is no JPG
    file at all in the current directory, then the evaluation of `*.jpg` is useless.
    Bash then passes the original string to `cp`. The command searches for a file
    that''s exactly named `*.jpg`. This file cannot be found, so `cp` returns the
    error message, *file not found*.


    You can prevent such errors using `shopt -s nullglob`. The `nullglob` option causes
    the pattern to be removed if no files match. However, `cp *.jgp some/path/` triggers
    an error even then, this time because only one parameter was passed to the command
    (there must be at least two).


    # 3.8.1 Recursive Globbing


    The `**` character combination recursively covers all (sub)directories. Thus,
    `ls **/*.pdf` has a similar meaning as the search command `find . -name ''*.pdf''`.
    Because recursive searching of all directories can take a lot of time, this behavior
    is disabled by default. Before you can use this function, you must activate it
    via `shopt -s globstar`. The following example copies all PDF files to the `all-my-pdfs`
    directory:


    ```

    shopt -s globstar

    mkdir all-my-pdfs

    cp **/*.pdf all-my-pdfs

    ```


    # 3.8.2 Access to Important Directories


    Aside from globbing rules, short notations are available for accessing frequently
    needed directories (see Table 3.4).


    | Character | Meaning |

    |---|---|

    | . | The current directory |

    | .. | The parent directory |

    | ~ | Your own home directory |

    | ~name | The home directory of name |


    **Table 3.4** Short Notations for Important Directories


    # 3.8.3 Brace Extension


    In Bash, you can formulate enumerations separated by commas or ranges created
    via `...` in curly brackets. Before the command gets executed, all possible combinations
    are created, so the expression specified in parentheses is “expanded.” Unlike
    globbing,'
