    I will introduce the `requests` and `beautifulsoup4` modules mentioned in the
    example in more detail in [Chapter 17](Chapter 17). Now, to run a script that
    uses these two modules, you must use `pipenv run`:


    ```

    $ pipenv run ./myscript.py

    ```


    Alternatively, you can start a new shell using `pipenv shell`. Inside this shell,
    you can run your script as usual via `./myscript.py`. At the same time, you can
    also start Python interactively there and use all modules that have been installed
    using `pipenv`. If you don''t need the shell anymore, you can exit it via `Ctrl`
    + `D` or `exit`.


    The biggest advantage using of `pipenv` is that it sets up a `pipfile` in your
    project directory. This file summarizes which modules are used by your project:


    ```

    # File Pipfile (shortened)

    ...

    [packages]

    beautifulsoup4 = "*"

    requests = "*"


    [requires]

    python_version = "3.10"

    ```


    Now, to port your script to another computer, you can copy the code and the `pipfile`
    there and run `pipenv install` once without any further parameters. This step
    will install all the required modules. Done!


    `pipenv` uses `virtualenv`, a Python tool for setting up several separate Python
    environments on one computer. `virtualenv` provides more features than `pipenv`
    but is a bit more difficult to use (see [https://virtualenv.pypa.io](https://virtualenv.pypa.io)).
    For our tasks, `pipenv` is usually sufficient. Other alternatives to Python project
    management are the built-in Python functions of the `venv` module (a minimal version
    of `virtualenv`) and `pip-tools`.


    > **Disadvantages and Limitations**

    `pipenv` is not without controversy. One problem is that modules are installed
    separately for each project. With extensive modules like Matplotlib or Pandas,
    this separation costs space, which is unnecessary. Also, the execution of scripts
    via `pipenv run` is a bit more cumbersome.


    Chris Warrick lists other shortcomings in his blog at [https://chriswarrick.com/blog/2018/07/17/pipenv-promises-a-lot-delivers-very-little](https://chriswarrick.com/blog/2018/07/17/pipenv-promises-a-lot-delivers-very-little).
    His fundamental critique is well founded, but no longer up to date on all points.
    In particular, the speed problems of `pipenv` have now been fixed.'
