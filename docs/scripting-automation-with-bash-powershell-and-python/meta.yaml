  md: 'For longer files, scrolling through the text using the cursor keys is convenient.
    On Linux, `less` is certainly one of the most frequently called commands—all the
    more surprising then that PowerShell offers only rudimentary functions in this
    regard: `Out-Host -Paging` allows you to scroll one line further with `Enter`
    and one page further with `Space`, but there is no way back, let alone a search
    function.


    ```

    > Get-Content tst.csv | Out-Host -Paging

    ```


    Using `Out-Host` (alias `oh`), you can also study extensive cmdlet results page
    by page:


    ```

    > Get-Process | Out-Host -Paging

    ```


    Ultimately, it is quite easy to look only at the first or last result objects
    of a cmdlet:


    ```

    # view the first five / the last ten processes

    > Get-Process | Select-Object -First 5

    > Get-Process | Select-Object -Last 10

    ```


    To save the results of a cmdlet in a text file, you can simply use output redirection.
    Note that the underlying objects will not be saved—only the text that you usually
    see in the terminal.


    ```

    > Get-Process > processes.txt

    ```


    `Set-Content` enables you to write a string into a text file. If the file already
    exists, it will be overwritten. You should pay attention to the correct order
    of the parameters; alternatively, you can use options.


    ```

    > Set-Content out.txt "some text"

    > Set-Content -Value "some text 2" out.txt  # equivalent

    ```


    To add text to an existing file, you can use `Add-Content`, as in the following
    example:


    ```

    > Add-Content out.txt ''second line''

    ```


    `Clear-Content` deletes the content of a file. However, the file itself remains
    intact (file size: 0 bytes). `Clear-Content` raises an error if the specified
    file does not exist.


    ```

    > Clear-Content out.txt

    ```


    # 7.1.3 Inputting and Outputting Text


    To input text in a script, you must use `Read-Host`. Note that the cmdlet automatically
    adds a colon to the passed text. To output a string again (with or without variables),
    you can use `Write-Output` (alias `echo`):'
