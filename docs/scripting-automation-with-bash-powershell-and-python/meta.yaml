  md: '# Chapter 5

    Python


    Python is currently one of the most popular programming languages, and surprisingly
    for a wide variety of purposes: as a *first language* for learning programming;
    for scientific tasks including statistics and visualization; and also for AI research
    (neural networks, image recognition, etc).


    In this book, I focus on using Python as a scripting language. The focus is thus
    on the development of often tiny programs to perform or automate administrative
    tasks. For example, Python is great for converting data from one format to another
    (e.g., comma-separated values [CSV] to JSON); extracting data from or storing
    data in databases; or processing data from the network (e.g., web scraping, requests
    for REST APIs).


    As I explained in Chapter 1, Python is more accessible compared to Bash and PowerShell:
    The syntax is clear and consistent, and the documentation available on the web
    is outstanding. In Python, you can reproduce relatively easily a complicated logic
    through functions. Python manages the balancing act across all common operating
    systems and is not strongly anchored to a particular operating system like Bash
    or PowerShell are, while Bash and PowerShell have by no means lost their reason
    for existence. These languages excel in calling operating system-related commands
    or cmdlets. A backup script that primarily combines a few external commands into
    a meaningful whole is easiest to implement in Bash. Similarly, this advice applies
    to PowerShell if you want to administer a Microsoft Active Directory system.


    This chapter provides a brief introduction to Python. It focuses on the language
    features that are particularly important for scripting. Should you “fall in love”
    with Python and want to write more than just short scripts, you’ll find a large
    volume of literature on the internet and on the book market for more in-depth
    study.


    # 5.1 Installing Python


    Python is installed by default on almost all Linux distributions. All you need
    to do is determine which version you have by opening a terminal window and running
    the following command:


    ```

    python --version

    Python 3.11.1

    ```'
