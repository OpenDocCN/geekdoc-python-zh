    \ 数据是元数据，除其他外，它提供了图像拍摄地点和时间的信息。Exif 数据是本章剩余部分的重点。如果你想删除 Exif 数据，可以使用 `-strip`\
    \ 选项调用 `magick`。更安全的选择是使用下一节介绍的 `exiftool -all:all= file.jpg` 命令。\n\n> **引用特殊字符**\n\
