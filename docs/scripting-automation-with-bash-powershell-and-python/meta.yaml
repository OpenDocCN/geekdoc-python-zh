  md: "# 7.6.1 Select-Object and Sort-Object\n\nYou can use `Select-Object` (alias\
    \ `select`) to reduce the output to single properties or select only the first/last\
    \ results. This function is especially useful if you previously sorted the results\
    \ according to a criterion using `Sort-Object` (alias `sort`). The `-Descending`\
    \ option sorts in descending order. The following examples illustrate the most\
    \ important application variants. Take the trouble and try the commands in a directory\
    \ with many files.\n\n```\n> Get-ChildItem    # show all files/default properties\n\
    > Get-ChildItem | Select-Object Name        # show name only\n> Get-ChildItem\
    \ | Select-Object Name, Size  # name and size\n```\n\n```\n# show the three smallest/largest\
    \ files\n> Get-ChildItem | Sort-Object Size | Select-Object -First 3\n> Get-ChildItem\
    \ | Sort-Object Size | Select-Object -Last 3\n```\n\n```\n# for the alphabetically\
    \ first ten files, name and size only\n> Get-ChildItem | Sort-Object Name |\n\
    \  Select-Object -First 10 Name, Size\n```\n\n```\n# last modified/created, name,\
    \ size and modification time\n> Get-ChildItem | Sort-Object LastWriteTime |\n\
    \  Select-Object -Last 10 Name, Size, LastWriteTime\n```\n\n`Select-Object` and\
    \ `Sort-Object` can also be applied to properties that are not displayed at all\
    \ by default, for example, to `LastAccessTime` for `Get-ChildItem` results. If\
    \ you do not know the properties, you should apply `Get-Member` to the first result\
    \ object, as in the following example:\n\n```\n# Show properties of the first\
    \ result of cmdlet\n> cmdlet | Select -First 1 | Get-Member -MemberType Properties\n\
    ```\n\n`Select-Object` can also skip the first *n* objects (`-Skip n`); skip the\
    \ last objects (`-SkipLast n`); eliminate duplicates (`-Unique`); or select specific\
    \ objects (`-Index 2, 3, 7` for the 3rd, 4th, and 8th element; counting begins\
    \ at 0).\n\n# 7.6.2 Where-Object\n\n`Where-Object` (alias `?`) allows you to select\
    \ the objects that meet a certain criterion. The condition is formulated in curly\
    \ brackets. The respective object is addressed using `$_`.\n\n```\n# Show files\
    \ > 1 MByte, only name and size\n> Get-ChildItem | ? {$_.Size -gt 1000000} | Select\
    \ Name, Size\n```"
  merge: -1
  pgno: 238
- img_proc: true
  md: "# 7.6.3 Group-Object\n\nGroup-Object (alias group) forms groups of elements\
    \ that have one property in common. The result contains the number of objects\
    \ for each group, the value of the group property, and an enumeration of the elements.\n\
    \n```\n> Get-ChildItem | Group-Object -Property Extension\n\nCount  Name  Group\n\
    -----  ----  -----\n   73  .jpg  {C:\\Users\\kofler\\img_2234.jpg, ...}\n    5\
    \  .jpeg {C:\\Users\\kofler\\tree.jpeg, ...}\n  334  .png  {C:\\Users\\kofler\\\
    screenshot.jpeg, ...}\n    3  .tif  {C:\\Users\\kofler\\figure-23.tif, ...}\n\n\
    # the largest groups first, only three groups\n> Get-ChildItem | Group-Object\
    \ -Property Extension |\n  Sort-Object -Property Count -Descending |\n  Select-Object\
    \ -First 3\n\n# Processes with more than 5 subprocesses (threads)\n> Get-Process\
    \ | Group-Object -Property ProcessName |\n  Where-Object { $_.Count -gt 5 }\n\
    ```\n\n# 7.6.4 ForEach-Item\n\nForEach-Item (alias %) enables you to further process\
    \ any of the determined objects. Which type of further processing is possible\
    \ depends strongly on the type of objects. For example, you can copy or delete\
    \ files, terminate processes, close open database connections, and update installed\
    \ packages. The action to be executed is formulated in curly brackets, and access\
    \ to the object is again created via $_. The following command sequence moves\
    \ all files from the current directory that are older than one year (-lt for less\
    \ than) to the old subdirectory:\n\n```\n> $oneYear = (Get-Date).AddDays(-365)\n\
    > mkdir old\n> Get-ChildItem | ? {$_.LastWriteTime -lt $oneYear} |\n  ForEach-Object\
    \ { Move-Item $_ old\\ }\n```\n\n# 7.6.5 Measure-Object\n\nMeasure-Object (alias\
    \ measure) applies aggregate functions to the specified objects. Without any further\
    \ parameters, it simply counts the objects (Count result property). Depending\
    \ on the option, the total, average, and minimum or maximum of a property can\
    \ also be determined."
  merge: -1
  pgno: 239
- img_proc: true
  md: "```\n# number of files, size of the smallest and largest file\n> Get-ChildItem\
    \ | Measure-Object -Property Size -Min -Max |\n  Select-Object Count, Minimum,\
    \ Maximum\nCount    Minimum    Maximum\n-----    -------    -------\n  431   \
    \ 4096,000    3263035,000\n\n# lines, words and characters in the todo file\n\
    > Get-Content todo.md | Measure-Object -Line -Word -Character\n\nLines    Words\
    \    Characters\n-----    -----    ----------\n  195      899          6396\n\
    ```\n\nIf you just want to count the number of objects, you can simply apply the\
    \ `Count` property to the result. The following command determines the number\
    \ of PDF files in the current directory and all subdirectories:\n\n```\n> (Get-ChildItem\
    \ *.pdf -Recurse).Count\n```\n\n# 7.6.6 Formatting and Exporting cmdlet Results\n\
    \nWhat you see when you run a command in the terminal is mostly a short version\
    \ of the available data. The `Out-Default` cmdlet is responsible for the default\
    \ formatting. Among other things, the cmdlet takes into account XML files that\
    \ specify for important classes (e.g., for `System.IO.DirectoryInfo`); which properties\
    \ are to be output; and how.\n\nIf you're not happy with the default formatting,\
    \ you can influence it in the following ways:\n\n+   - The `cmdlet | Select-Object\
    \ prop1, prop2, prop3` construct, which you already know, allows you to define\
    \ which properties you want to see.\n- Use `cmdlet | Format-List` to specify the\
    \ most important properties of each object in list form. If you really want to\
    \ see all properties, you can use `Format-List -Property *`. But be careful not\
    \ to get overwhelmed by all the data since `Get-Process | Format-List -Property\
    \ *` can return a thousand lines of output. In my work environment, there were\
    \ about 11,000 lines that could be measured this way:\n  \n  > Get-Process | Format-List\
    \ -Property * | Out-String |\n    Measure-Object -Line\n  \n- `cmdlet | Format-Table`\
    \ performs table-based output, as is the default for many classes. But you can\
    \ influence the output via options. If you have a wide monitor, you can try, for\
    \ example, `Get-Process | Format-Table -Property * -AutoSize`. The `-AutoSize`\
    \ option takes the data into account to determine the ideal column width."
