    # 9.3.3 The "sed" Stream Editor


    The `sed` *Stream Editor* is a universal command for text processing. You pass
    a command in the first parameter that `sed` applies to the standard input or to
    the file specified in the next parameter. The processed text is written to the
    standard output.

    In the GNU variant of `sed` that''s common on Linux, the `-i` (*in place*) option
    causes the source file to be modified directly. `-i.bak` creates a backup of the
    source file with the `.bak` identifier.


    > **GNU versus BSD**

    In the BSD variant of `sed`, which is installed on macOS, for example, the `-i`
    option has a different meaning. In general, some other small differences exist
    between GNU `sed` and BSD `sed`. If necessary, you can install the GNU variant
    of `sed` using `brew`!


    The following introductory example shows the delete command `d`. This example
    reads the `myfile.txt` file, deletes lines 3 to 5, and writes all other lines
    to the `out.txt` file.


    ```

    $ sed 3,5d myfile.txt > out.txt

    ```


    If you want to pass multiple commands to `sed`, you can use `-e`:


    ```

    $ sed -e ''cmd1'' -e ''cmd2'' in.txt > out.txt

    ```


    Alternatively, you can save the commands in a separate file and process that file
    using `-f`:


    ```

    $ sed -f sedcmds.txt in.txt > out.txt

    ```


    `sed` can also process regular expressions. In that case, POSIX Regular Expressions
    are used by default. With the equivalent `-E` or `-r` options, `sed` also supports
    ERE. Unlike `grep`, there is unfortunately no option for PCRE.

    In the following command, `sed` searches for lines that start with an IPv4 address.
    These lines will be deleted. All other lines are stored in `ipv6.log`. The search
    pattern is usually formulated between two slashes. However, if you need to use
    the slash itself in the expression, you can use any other character that does
    not appear in it. But the entire expression must then start with a backslash.
    The following two commands are therefore equivalent:


    ```

    $ sed -E ''/^([0-9]{1,3}\.){3}[0-9]{1,3}/d'' access.log > ipv6.log

    $ sed -E ''\@^([0-9]{1,3}\.){3}[0-9]{1,3}@d'' access.log > ipv6.log

    ```'
- md: "## 9.3.4 Searching and Replacing Using sed\n\nOne of the most important `sed`\
    \ commands is `s/pattern/replace/`. This command replaces the expressions recognized\
    \ by `pattern` with the `replace` string in each line. Within `\\replace`, you\
    \ can access the groups detected by `pattern` using `\\1`, `\\2`.\n\nIn addition,\
    \ other separators instead of `/` are allowed with this command, which do not\
    \ occur in the pattern, such as `s:pattern:replace:`. However, the separator is\
    \ not specially marked by a backslash. The third separator can be followed by\
    \ two letters (also in combination):\n\n- `s/ptrn/rpl/g` means that multiple search-and-replace\
    \ operations are performed per line if necessary (`g` as in *global replace*).\n\
    - `s/ptrn/rpl/i` means that the analysis of the expression is *case insensitive*.\n\
    \nTo test an expression or `sed` command, the best approach is to combine `echo`\
    \ and `sed`:\n\n```\n$ echo \"abc ABC\" | sed 's/abc/efg/gi'\nefg efg\n```\n\n\
    ## 9.3.5 sed Example: Manipulating Paths of Image Files\n\nPersonally, I am intensely\
    \ *committed* to the typesetting of my books. I write most of the texts in a Markdown\
    \ syntax. Various scripts turn them into LaTeX, HTML, and PDF files. Among other\
    \ things, when creating the print files, I must replace my screenshots and photos\
    \ (`*.png` and `*.jpg` identifiers) with PostScript files optimized by the publisher\
    \ (`*.eps` identifier), which are also located in a different directory. So, for\
    \ example, the original Markdown file contains image references in the following\
    \ format:\n\n```\n![Relaisboard \\label{b-rb}](images-chris/relayboard.png)\n\
    ![Audioplayer \\label{b-mpd}](images-michael/mpd.png)\n![L298N-Pins \\label{b-l298}](images-charly/L298_Pins.png)\n\
    ```\n\nBefore I create the print file, the Markdown code must be rebuilt:\n\n\
    ```\n![Relaisboard \\label{b-rb}](images-final/relayboard.eps)\n![Audioplayer\
    \ \\label{b-mpd}](images-final/mpd.eps)\n![L298N-Pins \\label{b-l298}](images-final/L298_Pins.eps)\n\
    ```\n\nThis tedious work is of course taken care of by a script that contains\
    \ the following `sed` command, among other things:\n\n```\n# Sample file preprocess-markdown.sh\n\
    cmd=\"s,\\(images-.*/(.*)\\.(jpg|png)\\),(images-final/\\1.eps),\"\nsed -E \"\
    $cmd\" text.md > text-final.md\n```\n\nBecause the `/` character occurs within\
    \ the `sed` command, I have structured the command in the `s,pattern,replace,`\
    \ format. The regular pattern recognizes expressions structured as `(images-<aname>/<iname>.jpg|png)`,\
    \ where `aname` is the author name and `iname` is the image name. This pattern\
    \ is replaced by `(images-final/<iname>.eps)`.\n\n## 9.4 Regular Expressions in\
    \ PowerShell\n\nBecause of the object-oriented approach of PowerShell, analyzing\
    \ text is less often required than in Bash scripts. Often the simple reading of\
    \ properties leads to the goal. On Windows, text files for configuration or with\
    \ logging data are the exception rather than the rule. Nevertheless, PowerShell\
    \ also provides various regex features to help process text. In PowerShell, the\
    \ regex syntax of the .NET framework applies, which is largely compatible with\
    \ PCRE. Refer to `https://learn.microsoft.com/en-us/dotnet/standard/base-types/regular-expression-language-quick-reference`.\n\
    \n### 9.4.1 The match and replace Operators\n\nThe easiest way to use regular\
    \ expressions is with the various `match` operators: `txt -match pattern` tests\
    \ whether the specified pattern can be recognized in the text. The result is `True`\
    \ or `False`.\n\nAs is specific to PowerShell (or should we rather say, as is\
    \ typical of Microsoft), upper-case and lowercase is ignored—unless you use `-cmatch`\
    \ (*case sensitive match*). `-notmatch` or `-cnotmatch` simply have the inverse\
    \ meaning of `-match`, so you can test if the pattern is *not* included. These\
    \ `match` operators can be tried out interactively in a simple way, which is also\
    \ useful if for quickly testing whether the syntax of your regular expression\
    \ is correct and works the way you want it to.\n\n```\n> \"I love PowerShell\"\
    \ -match \"p.*l\"\nTrue\n\n> \"I love PowerShell\" -cmatch \"p.*l\"\nFalse\n\n\
    > \"connection from 127.0.0.1\" -match \"(\\d{1,3}\\.){3}\\d{1,3}\"\nTrue\n```\n\
    \nYou can also apply `-match` to filenames or directory names. The following command\
    \ searches `C:\\Windows` recursively for directories of the `xx-xx` format, where\
    \ `x` is a letter or a digit. This will return numerous directories with names\
    \ like `de-DE` or `en-US` with localization files (i.e., files containing strings\
    \ in a specific language).\n\n```\n> Get-ChildItem C:\\windows -Recurse -Directory\
    \ |\n    Where-Object { $_.name -match \"^\\w\\w-\\w\\w$\" }\n```\n\nYou can use\
    \ the `replace` operator to perform search and replace operations for strings,\
    \ as in the following example:\n\n```\n> $txt = \"connection from 127.0.0.1 to\
    \ 192.168.74.104\"\n> $txt -replace \"(\\d{1,3}\\.){3}\\d{1,3}\", \"-hidden-\"\
    \nconnection from -hidden- to -hidden-\n```\n\n### 9.4.2 Select-String\n\nLike\
    \ grep, Select-String analyzes the search text as a regular expression. I already\
    \ described this cmdlet in detail in Chapter 7, Section 7.2. In this respect,\
    \ an example in the regex context should suffice for this chapter.\n\nIn this\
    \ example, I want to take a look at the C:\\Windows\\diagnostics\\system directory.\
    \ This directory contains various PowerShell scripts that are called from the\
    \ Troubleshooting Wizard of System Preferences (i.e., System • Troubleshoot •\
    \ Other Troubleshooters). The goal of the following command is to retrieve a reference\
    \ of all the functions defined in these files. This task is relatively easy, but\
    \ the result is confusing:\n\n```\n> Set-Location C:\\Windows\\diagnostics\\system\n\
    > Get-ChildItem -Filter *.ps1 -Recurse |\n    Select-String '^function '\n   \
    \ Apps\\RC_WSReset.ps1:7:function Get-FaultyAppsFromEventLogs([... \n    Apps\\\
    Utils_Apps.ps1:17:Function Write-ExceptionTelemetry($Fu... \n    Apps\\VF_WSReset.ps1:14:function\
    \ Get-AppContainerEvents([Syst... \n    ...\n```\n\nIn my second attempt, I developed\
    \ a more complicated regular expression that captures function <name> and, subsequently,\
    \ the parameters of that function in a group. However, this time, I don't want\
    \ to see the entire result line, but only function <name>. For this purpose, the\
    \ match objects returned by Select-String must be analyzed. Groups(0) then returns\
    \ the entire line, while Groups(1) returns the content of the first regex group:\n\
    \n```\n> Get-ChildItem -Filter *.ps1 -Recurse |\n    Select-String '^(function\
    \ [^(]*)\\((.*)\\)$' |\n    ForEach-Object { $_.Matches.Groups[0].Value }\n  \
    \  function Get-FaultyAppsFromEventLogs\n    function Get-CompletedTroubleshooterSessions\n\
    \    Function Write-ExceptionTelemetry\n    ...\n```\n\n### 9.4.3 Example: Input\
    \ Validation\n\nThe following mini script expects the input of a color code in\
    \ the #ccc or #cccccc format, where c represents a hexadecimal digit. For example,\
    \ the correct input for red would be #ff0000. If the input is incorrect, the user\
    \ must try again.\n\n```\n# Sample file input-css-color.ps1\ndo {\n    $color\
    \ = Read-Host \"Enter a CSS color (#ccc or #cccccc)\"\n} until ($color -match\
    \ \"^#([0-9a-fA-F]{3}){1,2}$\")\nWrite-Host \"Valid color code: $color\"\n```\n\
    \n### 9.4.4 Example: List of Figures\n\nIn a Markdown file, figures are included\
    \ as follows:\n\n```\n![Image caption ...](images-michael/filename.png)\n```\n\
    \nThe images have PNG and JPEG formats. The script is supposed to extract the\
    \ filenames of all images:\n\n```\n.\\extract-images.ps1 text.md\n```\n\n```\n\
    images-chris/relayboard.png\nimages-michael/mpd.png\nimages-charly/L298_Pins.jpg\n\
    ```\n\nIf you want, you can also redirect the output to a text file:\n\n```\n\
    .\\extract-images.ps1 text.md > out.txt\n```\n\nThe script is short:\n\n```\n\
    # Sample file extract-images.ps1\n# the script expects file names as parameters\n\
    Param( [string[]] $markdownfiles)\n\n$pattern = '\\]\\((images-\\w+[\\/\\][\\\
    w-]+\\.(png|jpg|jpeg))\\)'\n\n# loop through all files\nforeach ($file in $markdownfiles)\
    \ {\n    # Recognize pattern, output the content of the pattern group\n    Select-String\
    \ $pattern $file |\n        ForEach-Object { $_.Matches.Groups[1].Value }\n}\n\
    ```\n\nThe regular pattern searches for ](images-<aname>/<iname>.png|jpg|jpeg),\
    \ where <aname> is the author name and <iname> is the image name.\n\nLet's look\
    \ at some parts of this expression in detail:\n\n- `[\\/\\]` allows both / and\
    \ \\ as directory separators. To comply with the regex syntax, both characters\
    \ must be preceded by backslashes."
  mdcn: "## 9.3.4 使用 sed 进行搜索和替换\n\n`sed` 最重要的命令之一是 `s/pattern/replace/`。该命令将每行中由\
    \ `pattern` 识别的表达式替换为 `replace` 字符串。在 `\\replace` 中，你可以使用 `\\1`、`\\2` 来访问 `pattern`\
    \ 检测到的分组。\n\n此外，该命令允许使用 `/` 以外的其他分隔符，只要这些分隔符不出现在模式中即可，例如 `s:pattern:replace:`。但是，分隔符不需要用反斜杠特别标记。第三个分隔符后面可以跟两个字母（也可以组合使用）：\n\
    \n- `s/ptrn/rpl/g` 表示如果需要，每行执行多次搜索替换操作（`g` 代表 *全局替换*）。\n- `s/ptrn/rpl/i` 表示表达式的分析是\
    \ *不区分大小写* 的。\n\n要测试一个表达式或 `sed` 命令，最好的方法是结合使用 `echo` 和 `sed`：\n\n```\n$ echo\
    \ \"abc ABC\" | sed 's/abc/efg/gi'\nefg efg\n```\n\n## 9.3.5 sed 示例：操作图像文件路径\n\
    \n就个人而言，我非常 *致力于* 我书籍的排版。我大部分文本都用 Markdown 语法编写。各种脚本将它们转换为 LaTeX、HTML 和 PDF 文件。其中，在创建打印文件时，我必须将我的截图和照片（`*.png`\
    \ 和 `*.jpg` 标识符）替换为出版商优化过的 PostScript 文件（`*.eps` 标识符），这些文件也位于不同的目录中。因此，例如，原始 Markdown\
    \ 文件包含以下格式的图像引用：\n\n```\n![Relaisboard \\label{b-rb}](images-chris/relayboard.png)\n\
    ![Audioplayer \\label{b-mpd}](images-michael/mpd.png)\n![L298N-Pins \\label{b-l298}](images-charly/L298_Pins.png)\n\
    ```\n\n在我创建打印文件之前，必须重建 Markdown 代码：\n\n```\n![Relaisboard \\label{b-rb}](images-final/relayboard.eps)\n\
    ![Audioplayer \\label{b-mpd}](images-final/mpd.eps)\n![L298N-Pins \\label{b-l298}](images-final/L298_Pins.eps)\n\
    ```\n\n这项繁琐的工作当然由一个脚本来处理，该脚本包含以下 `sed` 命令（以及其他内容）：\n\n```\n# 示例文件 preprocess-markdown.sh\n\
    cmd=\"s,\\(images-.*/(.*)\\.(jpg|png)\\),(images-final/\\1.eps),\"\nsed -E \"\
    $cmd\" text.md > text-final.md\n```\n\n因为 `/` 字符出现在 `sed` 命令中，所以我将命令结构化为 `s,pattern,replace,`\
    \ 格式。正则模式识别结构为 `(images-<aname>/<iname>.jpg|png)` 的表达式，其中 `aname` 是作者名，`iname`\
    \ 是图像名。该模式被替换为 `(images-final/<iname>.eps)`。\n\n## 9.4 PowerShell 中的正则表达式\n\n\
    由于 PowerShell 的面向对象方法，分析文本的需求比在 Bash 脚本中要少。通常，简单地读取属性就能达到目标。在 Windows 上，用于配置或包含日志数据的文本文件是例外而非规则。尽管如此，PowerShell\
    \ 也提供了各种正则表达式功能来帮助处理文本。在 PowerShell 中，适用 .NET 框架的正则表达式语法，它与 PCRE 基本兼容。请参阅 `https://learn.microsoft.com/en-us/dotnet/standard/base-types/regular-expression-language-quick-reference`。\n\
    \n### 9.4.1 匹配和替换运算符\n\n使用正则表达式最简单的方法是使用各种 `match` 运算符：`txt -match pattern` 测试指定的模式是否能在文本中被识别。结果是\
    \ `True` 或 `False`。\n\n正如 PowerShell 特有的（或者我们应该说，正如微软典型的），它忽略大小写——除非你使用 `-cmatch`（*区分大小写的匹配*）。`-notmatch`\
    \ 或 `-cnotmatch` 只是 `-match` 的反义，因此你可以测试模式是否 *不* 包含在内。这些 `match` 运算符可以以简单的方式交互式地尝试，这对于快速测试正则表达式的语法是否正确以及是否按预期工作也很有用。\n\
    \n```\n> \"I love PowerShell\" -match \"p.*l\"\nTrue\n\n> \"I love PowerShell\"\
    \ -cmatch \"p.*l\"\nFalse\n\n> \"connection from 127.0.0.1\" -match \"(\\d{1,3}\\\
    .){3}\\d{1,3}\"\nTrue\n```\n\n你也可以将 `-match` 应用于文件名或目录名。以下命令在 `C:\\Windows` 中递归搜索\
    \ `xx-xx` 格式的目录，其中 `x` 是字母或数字。这将返回许多名称如 `de-DE` 或 `en-US` 的目录，这些目录包含本地化文件（即包含特定语言字符串的文件）。\n\
    \n```\n> Get-ChildItem C:\\windows -Recurse -Directory |\n    Where-Object { $_.name\
    \ -match \"^\\w\\w-\\w\\w$\" }\n```\n\n你可以使用 `replace` 运算符对字符串执行搜索和替换操作，如以下示例所示：\n\
    \n```\n> $txt = \"connection from 127.0.0.1 to 192.168.74.104\"\n> $txt -replace\
    \ \"(\\d{1,3}\\.){3}\\d{1,3}\", \"-hidden-\"\nconnection from -hidden- to -hidden-\n\
    ```\n\n### 9.4.2 Select-String\n\n与 grep 类似，Select-String 将搜索文本作为正则表达式进行分析。我已在第\
    \ 7 章第 7.2 节详细描述了此 cmdlet。因此，在本章中，正则表达式上下文中的一个示例应该就足够了。\n\n在这个例子中，我想查看 C:\\Windows\\\
    diagnostics\\system 目录。该目录包含各种 PowerShell 脚本，这些脚本由系统首选项的故障排除向导（即 系统 • 疑难解答 • 其他疑难解答程序）调用。以下命令的目标是检索这些文件中定义的所有函数的引用。这个任务相对简单，但结果可能令人困惑：\n\
    \n```\n> Set-Location C:\\Windows\\diagnostics\\system\n> Get-ChildItem -Filter\
    \ *.ps1 -Recurse |\n    Select-String '^function '\n    Apps\\RC_WSReset.ps1:7:function\
    \ Get-FaultyAppsFromEventLogs([... \n    Apps\\Utils_Apps.ps1:17:Function Write-ExceptionTelemetry($Fu...\
    \ \n    Apps\\VF_WSReset.ps1:14:function Get-AppContainerEvents([Syst... \n  \
    \  ...\n```\n\n在我的第二次尝试中，我开发了一个更复杂的正则表达式，它捕获 `function <name>`，随后在分组中捕获该函数的参数。然而，这次我不想看到整个结果行，而只想看到\
    \ `function <name>`。为此，必须分析 Select-String 返回的匹配对象。`Groups(0)` 返回整行，而 `Groups(1)`\
    \ 返回第一个正则表达式分组的内容：\n\n```\n> Get-ChildItem -Filter *.ps1 -Recurse |\n    Select-String\
    \ '^(function [^(]*)\\((.*)\\)$' |\n    ForEach-Object { $_.Matches.Groups[0].Value\
    \ }\n    function Get-FaultyAppsFromEventLogs\n    function Get-CompletedTroubleshooterSessions\n\
    \    Function Write-ExceptionTelemetry\n    ...\n```\n\n### 9.4.3 示例：输入验证\n\n\
    以下迷你脚本期望输入 `#ccc` 或 `#cccccc` 格式的颜色代码，其中 `c` 代表一个十六进制数字。例如，红色的正确输入是 `#ff0000`。如果输入不正确，用户必须重试。\n\
    \n```\n# 示例文件 input-css-color.ps1\ndo {\n    $color = Read-Host \"Enter a CSS\
    \ color (#ccc or #cccccc)\"\n} until ($color -match \"^#([0-9a-fA-F]{3}){1,2}$\"\
    )\nWrite-Host \"Valid color code: $color\"\n```\n\n### 9.4.4 示例：图表列表\n\n在 Markdown\
    \ 文件中，图表包含如下：\n\n```\n![Image caption ...](images-michael/filename.png)\n```\n\
    \n图像有 PNG 和 JPEG 格式。该脚本应该提取所有图像的文件名：\n\n```\n.\\extract-images.ps1 text.md\n```\n\
    \n```\nimages-chris/relayboard.png\nimages-michael/mpd.png\nimages-charly/L298_Pins.jpg\n\
    ```\n\n如果你愿意，也可以将输出重定向到文本文件：\n\n```\n.\\extract-images.ps1 text.md > out.txt\n\
    ```\n\n该脚本很短：\n\n```\n# 示例文件 extract-images.ps1\n# 脚本期望文件名作为参数\nParam( [string[]]\
    \ $markdownfiles)\n\n$pattern = '\\]\\((images-\\w+[\\/\\][\\w-]+\\.(png|jpg|jpeg))\\\
    )'\n\n# 遍历所有文件\nforeach ($file in $markdownfiles) {\n    # 识别模式，输出模式分组的内容\n  \
    \  Select-String $pattern $file |\n        ForEach-Object { $_.Matches.Groups[1].Value\
    \ }\n}\n```\n\n正则模式搜索 `](images-<aname>/<iname>.png|jpg|jpeg)`，其中 `<aname>` 是作者名，`<iname>`\
    \ 是图像名。\n\n让我们详细看看这个表达式的某些部分：\n\n- `[\\/\\]` 允许 `/` 和 `\\` 作为目录分隔符。为了符合正则表达式语法，这两个字符都必须用反斜杠转义。"
