    ```

    EXIF:ExposureTime : 0.0008

    EXIF:ISO : 100

    EXIF:DateTimeOriginal : 2012:11:03 08:44:32


    SourceFile : IMG_3799.jpg

    EXIF:Model : Canon IXUS 210

    EXIF:ExposureTime : 0.0008

    EXIF:ISO : 125

    EXIF:DateTimeOriginal : 2012:11:03 08:44:39

    ```


    Note that different Exif data is available depending on the smartphone or camera
    model. For this reason, you should always secure access to individual entries.
    (In the last code listing, this secure access is created via `if key in metadata`.)


    The `exifhelper.get_metadata(filenames)` statement in the last example unfortunately
    has its pitfalls, such as the following:


    +   - If even a single file contains incorrect Exif metadata or is missing entirely,
    then an `ExifToolExceptionError` will occur. The error makes it impossible to
    analyze the results of the remaining files.

    - A second problem is that `get_metadata` reads all metadata, even metadata you''re
    not interested in. Depending on the operating system (Windows!) the `charmap:
    codec can''t decode byte xxx in position nnn` error may occur. Apparently the
    PyExifTool chokes on UTF-8 strings in the metadata. In my tests, the error occurred
    only on Windows and only in PyExifTool, not when `exiftool` was called directly.


    In this respect, a better approach is to process each image file individually
    and to secure the analysis by using `try-except`. Also, instead of `get_metadata`,
    you should use the `get_tags` method, which processes only selected Exif keys.
    I will demonstrate this procedure in the next script, `exif-to-sql.py`.


    # 16.3.2 EXIF2SQL


    The first subtask of the `exif-to-sql.py` script is `globbing` (i.e., the analysis
    of patterns like `*.jpg`). On macOS and Linux, this step is not needed because,
    in those cases, the shell generates the corresponding list of files from `*.jpg`
    and passes it to the script.


    On Windows, on the other hand, the `*.jpg` parameter ends up unchanged in the
    parameters list. If the script determines that it is running on Windows by analyzing
    `platform.system()`, it must determine the appropriate filenames itself. This
    task is performed by the `glob` function from the module of the same name. The
    loop through `argv[1:]` ensures that globbing works correctly even if multiple
    file patterns are passed (so, for example, `\.\exif-to-sql.py *.jpg *.jpeg`).'
  - "[PAGE 384]\n\nThe `keys` list is initialized with the names of all Exif parameters\
    \ the script is supposed to analyze. Note that you must use the two-part name\
    \ structure of PyExifTool. (ExifTool, on the other hand, uses shorter names without\
    \ preceding group names.)\n\nThe `sql` variable contains the SQL command to be\
    \ run. `inspect.cleandoc` removes the indentations from the multiline string.\
    \ The `INSERT` command requires that the database contain a corresponding table.\
    \ I will show you how to set up the table, if needed, in Chapter 19, Section 19.3.\n\
    \n```\n# Sample file exif-to-sql.py\nimport exiftool, inspect, platform, sys\n\
    from glob import glob\n\n# Globbing (only necessary on Windows)\nif platform.system()\
    \ == 'Windows':\n    filenames = []\n    for arg in sys.argv[1:]:\n        filenames.extend(glob(arg))\n\
    else:\n    filenames = sys.argv[1:]\n\n# analyze only these EXIF parameters\n\
    keys = ['File:FileName', 'File:FileSize', 'EXIF:Orientation',\n        'EXIF:DateTimeOriginal',\
    \ 'EXIF:GPSLatitude',\n        'EXIF:GPSLongitude', 'EXIF:GPSAltitude']\n\n# SQL\
    \ command to insert a data record;\n# cleandoc removes the indentation\nsql =\
    \ inspect.cleandoc(\"\"\"\n    INSERT INTO photos (name, size, orientation, datetimeoriginal,\n\
    \                        latitude, longitude, altitude)\n    VALUES (%s, %s, %s,\
    \ %s, %s, %s, %s);\"\"\")\n```\n\nAfter this preparatory work, `ExifToolHelper`\
    \ establishes the connection to the locally installed ExifTool.\n\nThe `for` loop\
    \ processes all image files. `get_tags` reads only the Exif tags specified by\
    \ `keys`. These keys are then collected in the `results` list, with missing tags\
    \ replaced by `NULL`. For the `DateTimeOriginal` tag, the format of the date must\
    \ also be changed from `2023:12:13` to the International Organization for Standardization\
    \ (ISO) format-compliant syntax `2023-12-13`. For this purpose, `replace` replaces\
    \ the first two colons with hyphens.\n\nFinally, the results gathered in this\
    \ way are converted into a tuple and incorporated into the SQL string using the\
    \ `%` formatting operator."
  - "[PAGE 385]\n\n```\n# ... Continued, connect to exiftool\nwith exiftool.ExifToolHelper()\
    \ as exifhelper:\n    # loop through all image files\n    for file in filenames:\n\
    \        # gather EXIF data\n        results = []\n        try:\n            #\
    \ get_tags reads only selected keys\n            metadata = exifhelper.get_tags(file,\
    \ keys)[0]\n            for key in keys:\n                if key in metadata:\n\
    \                    if key == 'EXIF:DateTimeOriginal':\n                    \
    \    # 2023:12:13 -> 2023-12-13\n                        date = str(metadata[key]).\\\
    n                            replace(':', '-', 2)\n                        results\
    \ += [ \"'%s'\" % (date) ]\n                    else:\n                      \
    \  results += [ \"'%s'\" % (metadata[key]) ]\n                else:\n        \
    \            results += ['NULL']\n            print(sql % tuple(results))\n  \
    \      except Exception as e:\n            print(\"-- skipped %s\" % (file))\n\
    ```\n\nIf you call the script and pass some JPEG files, the output will look as\
    \ follows:\n\n```\n$ ./exif-to-sql *.jpg *.jpeg\n\nINSERT INTO photos (name, size,\
    \ orientation, datetimeoriginal,\n                    latitude, longitude, altitude)\n\
    VALUES ('IMG_3422.jpeg', '23521', '1', '2022-01-07 15:54:01',\n        '47.1209027777778',\
    \ '13.6318833333333', '2033.231752');\n...\n```\n\nOf course, you can also redirect\
    \ the output to an SQL file:\n\n```\n$ ./exif-to-sql *.jpg *.jpeg > photos.sql\n\
    ```\n\n> **Missing GPS Data**\nPhotos that you take with a smartphone always contain\
    \ geographical data unless you have explicitly disabled this function. Note, however,\
    \ that for privacy reasons, some photo programs remove the location information\
    \ when photos are exported. For example, if you use Apple Photos, make sure to\
    \ set the **Include • Location Information** option when exporting!"
- md: "## 16.3.3 Options for Enhancement\n\nNaturally, you can adapt the script according\
    \ to your own ideas, depending on what Exif data you want to store in the database.\n\
    \nInstead of displaying the SQL commands on the screen or redirecting them to\
    \ a file, the script could also connect to a database server and run the commands\
    \ there. I present a corresponding extension of the script in Chapter 19.\n\n\
    Assuming a database connection, the script could also perform a duplicate check,\
    \ that is, replace entries instead of adding them, if only the filename or the\
    \ combination of filename and file size matches.\n\n## Chapter 17\n### Web Scraping\n\
    \n*Web scraping* refers to the targeted extraction of data from a webpage. The\
    \ basic idea is to load the HTML code of a page and search for the desired data\
    \ there. With web scraping, you can automatically determine the price of a product\
    \ on shopping websites, the current temperature in Hawaii on a weather website,\
    \ the latest headlines on a news website, or the latest security vulnerabilities\
    \ for software you use on a security site.\n\nIn this chapter, I'll describe some\
    \ techniques around web scraping:\n\n- I am going to start with the `wget` command:\
    \ This command allows you to download entire websites including all linked images,\
    \ CSS files, and so on. Technically, this command has little to do with web scraping\
    \ and goes more in the direction of *web crawling*. (I will explain the term shortly.)\
    \ An advantage of using `wget` is that you can solve complex tasks with a single\
    \ command without having to develop a script at all.\n- Using regular expressions,\
    \ you can analyze the HTML code of documents and in this way determine the desired\
    \ data. However, this approach only works satisfactorily in simple cases.\n- A\
    \ better approach is to use a library that represents an HTML document as an object\
    \ tree. The technical term for this library is *Document Object Model (DOM)*.\
    \ In this chapter, I will introduce the Python modules *Beautiful Soup* and *Requests-HTML*\
    \ as well as the PowerShell module, called *PowerHTML*, will allow you to navigate\
    \ through complex HTML documents with ease. The resulting code is clearer and\
    \ more reliable than using regular expressions.\n\n> **Prerequisites for This\
    \ Chapter**\n> Most of the scripts in this chapter use the Python programming\
    \ language. Therefore, you should know how to use regular expressions. You also\
    \ need basic HTML knowledge, but I can't teach you that in this book.\n\n### 17.1\
    \ Limitations\n\nWeb scraping is a popular scripting concept, but it comes with\
    \ numerous limitations:\n\n- The structure of a web page changes frequently. Web\
    \ scraping script must thus be adjusted often.\n- Modern websites use JavaScript\
    \ on the client side, which can cause a simple readout of the HTML code to fail.\
    \ (You’re lucky if JavaScript is only responsible for displaying the ubiquitous\
    \ ads.)\n- Basically, it’s not permitted to use data collected via web scraping\
    \ for commercial purposes. Let me illustrate this rule with a simple example:\
    \ You can’t collect weather data from a popular weather website, share it with\
    \ your customers in some form, and possibly make money from advertising in the\
    \ process. Of course, not *everything* is forbidden: After all, the basic idea\
    \ of the internet is that information is shared publicly. A popular permitted\
    \ application of web scraping is price comparison sites such as *https://www.pricegrabber.com/*.\
    \ But even for such services, rules of the game apply, for example, regarding\
    \ the use of product photos. Legally, we’re navigating rocky terrain. I will let\
    \ this warning stand and focus on technical details in this chapter. However,\
    \ an essential task is that you clarify the legal requirements before using web\
    \ scraping beyond the purely private sphere!\n\nThe solution to these limitations\
    \ are *application programming interfaces (APIs)*, which provide an ordered access\
    \ to data. While webpages are optimized in terms of beautiful layout, APIs allow\
    \ for an efficient data exchange without overhead, with some APIs even allowing\
    \ data changes. In addition, API usage rules provide clarity as to which data\
    \ may be used and how, or what costs are incurred in the process.\n\nTo cut a\
    \ long story short: If the website whose data you want to use provides an API,\
    \ you should skip ahead to [Chapter 18](Chapter 18).\n\n### 17.2 Web Scraping,\
    \ Web Crawling, and Data Mining\n\nTwo other terms are often used along with *web\
    \ scraping* that have similar meanings. While *web scraping* extracts data from\
    \ a website, *web crawling* tracks the links of a website. Through web crawling,\
    \ you can create a directory of all pages on a website and, when tracking links\
    \ to other pages, even a directory of large parts of the internet. Search engines\
    \ like Google or Bing are based on the concept of web crawling. *Data mining*\
    \ also goes a step further than web scraping: In this context, we are combining\
    \ and statistically analyzing information from different data sources and over\
    \ longer periods of time. Many reasons exist for data mining, such as marketing\
    \ studies or scientific tasks.\n\n### 17.3 Downloading Websites Using wget\n\n\
    In its simplest usage, you can use the `wget` command to download a file via HTTP(S)\
    \ or FTP. The following command downloads an image of the cover of this book from\
    \ my website and saves it in the local directory:\n\n```\n$ wget https://kofler.info/wp-content/uploads/scripting-en.jpg\n\
    ```\n\nMost of the time, `wget` is installed by default on Linux; if not the case,\
    \ `apt/dnf install wget` will help you get set up. On macOS, the best way to install\
    \ the command is to use `brew install wget` (see https://brew.sh). A variant compiled\
    \ for Windows can be downloaded from: https://eternallybored.org/misc/wget. However,\
    \ you must take care of saving the program yourself in one of the directories\
    \ listed in `PATH`.\n\n`wget` can be controlled by dozens of options documented\
    \ in its `man` page or at https://linux.die.net/man/1/wget.\n\n#### 17.3.1 Example\
    \ 1: Downloading Directly Linked Images\n\nI will refrain from an encyclopedic\
    \ description here, but instead show you three typical cases of using `wget`.\n\
    \nThe first command, which I have specified once with the more readable long options\
    \ and a second time in a more compact way with equivalent short options, downloads\
    \ all image files with the extensions `*.jpg`, `*.jpeg`, `*.png`, and `*.gif`\
    \ that are used directly on the home page of https://example.com. However, the\
    \ command does not take into account images used in other pages of https://example.com.\n\
    \n```\n$ wget --no-directories --span-hosts --page-requisites \\\n      --accept\
    \ jpg,jpeg,png,gif --execute robots=off example.com\n\n$ wget -nd -H -p -A jpg,jpeg,png,gif\
    \ -e robots=off example.com\n```\n\nLet's briefly explain the meanings of these\
    \ options next:\n\n- `--no-directories` does not create image directories on your\
    \ computer that represent the location of images on the website. Rather, all images\
    \ are stored in the currently active directory.\n- `--span-hosts` also takes into\
    \ account links to images located on websites other than the home page (here https://example.com).\n\
    - `--page-requisites` tells `wget` to download not only the HTML start page, but\
    \ also all additional files linked there (images, but also CSS files, etc.).\n\
    - `--accept` restricts the previous option: We are only interested in files with\
    \ the specified identifiers.\n- `--execute` specifies that any rules formulated\
    \ on the website in the `robots.txt` file should be ignored for search engines.\
    \ That's not the way to do it!\n\nThe command fails for images whose URL does\
    \ not end with the identifier, such as in the following example:\n\n```\nhttps://example.com/images/img_1234.jpg?s=2b63769b\n\
    ```\n\n#### 17.3.2 Example 2: Downloading all PDF Files Linked on the Website\n\
    \nThe second command is a variant of the first. This time, PDF documents are downloaded\
    \ instead of images. However, not only should the start page of https://example.com\
    \ be taken into account, but also all other pages of this website, which wget\
    \ can reach by analyzing links starting from the home page within four jumps.\n\
    \n```\n$ wget --recursive -no-directories --level=4 --accept pdf \\\n    --execute\
    \ robots=off example.com\n\n$ wget -r -nd -l 4 -A pdf -e robots=off example.com\n\
    ```\n\nThe command uses two new options:\n\n- `--recursive` tells wget to continue\
    \ following the links located on the home page and also to search the target pages.\
    \ By default, the command only includes pages on the source domain. (I have omitted\
    \ `--span-hosts` in this example. The explanation follows below).\n- `--level`\
    \ specifies how many link levels should be considered. You can use `--level inf`\
    \ to really search a website in its entirety.\n\nYou need patience when running\
    \ the command. Note that the command only considers PDF files stored directly\
    \ on the specified website, not PDF documents located elsewhere (for example,\
    \ in an Amazon cloud directory).\n\nIn contrast to the first example, using the\
    \ `--span-hosts` option is not recommended here. Although wget will then also\
    \ download PDF files located on other servers, at the same time the command will\
    \ extend the search to the pages of other servers. Tips on how you can limit this\
    \ problem, for example by listing selected external hosts, are provided by Stack\
    \ Overflow: https://stackoverflow.com/questions/16780601.\n\n> **Many Page Views\
    \ and High Data Volumes**\n> The `--recursive` option will cause you to download\
    \ countless files from the specified website in a short time. This causes a relatively\
    \ high load for the web server, depending on the network speed. For this reason,\
    \ some administrators limit the maximum number of requests originating from an\
    \ IP address. In the worst case, the crawling attempt in disregard of the robot\
    \ rules can even be interpreted as an attack.\n\n#### 17.3.3 Example 3: Creating\
    \ a Local Copy of the Website\n\nThe third command copies all files of a website\
    \ to a local directory. Images and CSS files are also taken into account. The\
    \ directory structure of the website is replicated locally. Finally (only once\
    \ the download of *all* files is finished!) all links are replaced by links to\
    \ local files."
  mdcn: "## 16.3.3 增强选项\n\n当然，你可以根据自己的想法调整脚本，具体取决于你想在数据库中存储哪些Exif数据。\n\n脚本除了在屏幕上显示SQL命令或将其重定向到文件外，还可以连接到数据库服务器并在那里运行这些命令。我在第19章中介绍了脚本的相应扩展。\n\
    \n假设已建立数据库连接，脚本还可以执行重复检查，即如果仅文件名或文件名与文件大小的组合匹配，则替换条目而不是添加它们。\n\n## 第17章\n### 网页抓取\n\
    \n*网页抓取*是指从网页中定向提取数据。其基本思想是加载页面的HTML代码并在其中搜索所需数据。通过网页抓取，你可以自动确定购物网站上产品的价格、天气网站上夏威夷的当前温度、新闻网站上的最新头条，或安全网站上你所使用软件的最新安全漏洞。\n\
    \n在本章中，我将描述一些围绕网页抓取的技术：\n\n- 我将从`wget`命令开始：此命令允许你下载整个网站，包括所有链接的图像、CSS文件等。从技术上讲，此命令与网页抓取关系不大，更偏向于*网络爬虫*。（我稍后会解释这个术语。）使用`wget`的一个优点是，你可以用单个命令解决复杂任务，而无需开发脚本。\n\
    - 使用正则表达式，你可以分析文档的HTML代码，从而确定所需数据。然而，这种方法仅在简单情况下才能令人满意地工作。\n- 一种更好的方法是使用将HTML文档表示为对象树的库。此库的技术术语是*文档对象模型（DOM）*。在本章中，我将介绍Python模块*Beautiful\
    \ Soup*和*Requests-HTML*，以及名为*PowerHTML*的PowerShell模块，它们将使你能够轻松浏览复杂的HTML文档。生成的代码比使用正则表达式更清晰、更可靠。\n\
    \n> **本章的先决条件**\n> 本章中的大多数脚本使用Python编程语言。因此，你应该知道如何使用正则表达式。你还需要基本的HTML知识，但我无法在本书中教授这些。\n\
    \n### 17.1 局限性\n\n网页抓取是一个流行的脚本概念，但它存在许多局限性：\n\n- 网页的结构经常变化。因此，网页抓取脚本必须经常调整。\n\
    - 现代网站在客户端使用JavaScript，这可能导致简单的HTML代码读取失败。（如果JavaScript仅负责显示无处不在的广告，那你就很幸运了。）\n\
    - 基本上，不允许将通过网页抓取收集的数据用于商业目的。让我用一个简单的例子来说明这个规则：你不能从一个流行的天气网站收集天气数据，以某种形式与你的客户分享，并可能通过广告赚钱。当然，并非*所有*事情都被禁止：毕竟，互联网的基本理念是信息被公开共享。网页抓取的一个常见允许应用是价格比较网站，例如*https://www.pricegrabber.com/*。但即使是这样的服务，也适用游戏规则，例如关于产品照片的使用。在法律上，我们正航行于崎岖的地形。我将保留这个警告，并在本章中专注于技术细节。然而，一项重要的任务是，在纯粹的私人领域之外使用网页抓取之前，你必须澄清法律要求！\n\
    \n这些局限性的解决方案是*应用程序编程接口（API）*，它提供对数据的有序访问。虽然网页在美观布局方面进行了优化，但API允许进行无开销的高效数据交换，有些API甚至允许数据更改。此外，API使用规则明确了哪些数据可以使用以及如何使用，或者在此过程中会产生什么成本。\n\
    \n长话短说：如果你想使用的数据的网站提供了API，你应该直接跳到[第18章](第18章)。\n\n### 17.2 网页抓取、网络爬虫和数据挖掘\n\n\
    另外两个术语经常与*网页抓取*一起使用，它们具有相似的含义。虽然*网页抓取*从网站提取数据，但*网络爬虫*跟踪网站的链接。通过网络爬虫，你可以创建网站所有页面的目录，当跟踪到其他页面的链接时，甚至可以创建互联网大部分内容的目录。像Google或Bing这样的搜索引擎基于网络爬虫的概念。*数据挖掘*也比网页抓取更进一步：在这种情况下，我们结合并统计分析来自不同数据源和较长时间段的信息。数据挖掘存在许多原因，例如市场研究或科学任务。\n\
    \n### 17.3 使用wget下载网站\n\n在其最简单的用法中，你可以使用`wget`命令通过HTTP(S)或FTP下载文件。以下命令从我的网站下载本书封面的图像并将其保存在本地目录中：\n\
    \n```\n$ wget https://kofler.info/wp-content/uploads/scripting-en.jpg\n```\n\n\
    大多数情况下，`wget`在Linux上默认安装；如果不是这种情况，`apt/dnf install wget`将帮助你完成设置。在macOS上，安装此命令的最佳方式是使用`brew\
    \ install wget`（参见https://brew.sh）。Windows的编译版本可以从以下地址下载：https://eternallybored.org/misc/wget。但是，你必须自己将程序保存在`PATH`中列出的目录之一。\n\
    \n`wget`可以通过其`man`页面或https://linux.die.net/man/1/wget中记录的数十个选项进行控制。\n\n#### 17.3.1\
    \ 示例1：下载直接链接的图像\n\n我将避免百科全书式的描述，而是向你展示使用`wget`的三个典型情况。\n\n第一个命令，我用更易读的长选项指定了一次，第二次用等效的短选项以更紧凑的方式指定，它下载https://example.com主页上使用的所有扩展名为`*.jpg`、`*.jpeg`、`*.png`和`*.gif`的图像文件。但是，该命令不考虑https://example.com其他页面中使用的图像。\n\
    \n```\n$ wget --no-directories --span-hosts --page-requisites \\\n      --accept\
    \ jpg,jpeg,png,gif --execute robots=off example.com\n\n$ wget -nd -H -p -A jpg,jpeg,png,gif\
    \ -e robots=off example.com\n```\n\n接下来，让我们简要解释这些选项的含义：\n\n- `--no-directories`不会在你的计算机上创建表示网站上图像位置的图像目录。相反，所有图像都存储在当前活动目录中。\n\
    - `--span-hosts`还考虑指向位于主页（此处为https://example.com）以外网站上的图像的链接。\n- `--page-requisites`告诉`wget`不仅下载HTML起始页，还下载那里链接的所有附加文件（图像，以及CSS文件等）。\n\
    - `--accept`限制了前一个选项：我们只对具有指定标识符的文件感兴趣。\n- `--execute`指定应忽略网站在`robots.txt`文件中为搜索引擎制定的任何规则。这不是正确的做法！\n\
    \n对于URL不以标识符结尾的图像，该命令会失败，例如以下示例：\n\n```\nhttps://example.com/images/img_1234.jpg?s=2b63769b\n\
    ```\n\n#### 17.3.2 示例2：下载网站上链接的所有PDF文件\n\n第二个命令是第一个命令的变体。这次下载的是PDF文档而不是图像。但是，不仅应考虑https://example.com的起始页，还应考虑该网站的所有其他页面，wget可以通过从主页开始分析链接在四次跳转内到达这些页面。\n\
    \n```\n$ wget --recursive -no-directories --level=4 --accept pdf \\\n    --execute\
    \ robots=off example.com\n\n$ wget -r -nd -l 4 -A pdf -e robots=off example.com\n\
    ```\n\n该命令使用了两个新选项：\n\n- `--recursive`告诉wget继续跟踪主页上的链接，并搜索目标页面。默认情况下，该命令仅包含源域上的页面。（我在此示例中省略了`--span-hosts`。解释如下）。\n\
    - `--level`指定应考虑多少链接级别。你可以使用`--level inf`来真正完整地搜索一个网站。\n\n运行此命令时需要耐心。请注意，该命令仅考虑直接存储在指定网站上的PDF文件，而不考虑位于其他位置（例如，在Amazon云目录中）的PDF文档。\n\
    \n与第一个示例相反，这里不建议使用`--span-hosts`选项。虽然wget随后也会下载位于其他服务器上的PDF文件，但同时该命令会将搜索扩展到其他服务器的页面。Stack\
    \ Overflow提供了关于如何限制此问题的提示，例如通过列出选定的外部主机：https://stackoverflow.com/questions/16780601。\n\
    \n> **大量页面浏览和高数据量**\n> `--recursive`选项将导致你在短时间内从指定网站下载无数文件。根据网络速度，这会对Web服务器造成相对较高的负载。因此，一些管理员限制来自单个IP地址的最大请求数。在最坏的情况下，无视机器人规则的爬取尝试甚至可能被解释为攻击。\n\
    \n#### 17.3.3 示例3：创建网站的本地副本\n\n第三个命令将网站的所有文件复制到本地目录。图像和CSS文件也被考虑在内。网站的目录结构在本地复制。最后（仅在*所有*文件下载完成后！）所有链接都被替换为指向本地文件的链接。"
