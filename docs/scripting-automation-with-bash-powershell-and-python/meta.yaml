- img_proc: true
  md: "By the way, you should avoid FTP altogether if possible. The protocol is inherently\
    \ insecure. If anything, you should only store files on an FTP server that you\
    \ have encrypted previously.\n\n# 14.2.1 What’s a Better Method?\n\nSeveral best\
    \ practices for preventing these types of security breaches include the following:\n\
    \n+   - **Storing passwords externally**\n  Almost all programs that require a\
    \ password for authentication can read the password from a file. For `mysqldump`,\
    \ the `.my.cnf` is used; for `lftp`, the `.netrc` file is used; and so on. With\
    \ some tools, you don’t need passwords at all and can use key files instead (for\
    \ example, SSH; see Chapter 12, Section 12.4).\n  Of course, passwords or key\
    \ files must not be included in the Git repository under any circumstances. However,\
    \ you can point out in the documentation which password files your script requires,\
    \ and which syntax is necessary.\n- **Saving other settings in a separate file**\n\
    \  In general, it’s a good idea to specify any parameters that must be changed\
    \ when using the script on a different machine or in a different context separately\
    \ from the rest of the code. In simple cases without security risks, this specification\
    \ can be done in the first lines of a script. I often name such parameters in\
    \ capital letters to visually differentiate them from the rest of the variables.\n\
    \  As a rule, it is still better to store all parameters in a separate file that\
    \ is imported at the beginning of the script. JSON or INI files are well suited\
    \ for this purpose (see especially Chapter 10, Section 10.7).\n- **Including a\
    \ sample of the settings file in the Git repository**\n  Don’t stop at passwords!\
    \ Critical information also includes hostnames, port numbers, and the names of\
    \ Amazon Web Services (AWS) buckets or virtual machines.\n  Configuration files\
    \ with these types of data should *not* be included in any Git repository! Without\
    \ the configuration file, however, getting your script up and running becomes\
    \ a guessing game for other people. For this reason, a useful approach is to include\
    \ a sample configuration file in the repository. If the real configuration file\
    \ is named `mybackup.conf`, you can name the sample file `mybackup.conf.sample`,\
    \ for example. The purpose of this file is to explain the syntax of the configuration\
    \ file. However, the file does not contain any real data, only freely invented\
    \ sample data.\n\nThese security rules apply to *all* Git repositories, including\
    \ private repositories or repositories that are located on their own, non-public\
    \ GitLab instances. When you set up or use a repository, you can never predict\
    \ who else will have access to it later. Passwords and other critical information\
    \ must *never* be stored in repositories."
