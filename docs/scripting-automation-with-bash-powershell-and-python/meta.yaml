- md: "## 2.7 Microsoft Hyper-V Cleanup (PowerShell)\n\nIf you use Microsoft Hyper-V\
    \ as a virtualization system, you run the risk of accumulating old snapshots that\
    \ will eat up storage space. The following PowerShell script deletes all snapshots\
    \ older than 30 days:\n\n```powershell\n# Sample file delete-old-snapshots.ps1\n\
    $days = 30\n$aMonthAgo = (Get-Date).AddDays(-$days)\nforeach ($snapshot in Get-VMSnapshot\
    \ -VMName *) {\n    if ($snapshot.CreationTime -lt $aMonthAgo) {\n        $vmname\
    \ = $snapshot.VMName\n        $snapname = $snapshot.Name\n        Write-Output\
    \ \"Delete '$snapname' of VM '$vmname'\"\n        Remove-VMSnapshot -VMName $vmname\
    \ -Name $snapname -Confirm\n    }\n}\n```\n\nThe script assumes that Hyper-V is\
    \ installed with all the administration tools on your Windows machine, which automatically\
    \ makes the `Hyper-V` PowerShell module available as well. The script also requires\
    \ admin rights: In other words, you must first open a PowerShell terminal as an\
    \ administrator before you can run the script in it.\n\nTo be on the safe side,\
    \ the cleanup script will ask for your confirmation before deleting each snapshot.\
    \ These queries are omitted if you remove the `-Confirm` option. More examples\
    \ of virtual machine administration with Hyper-V are described in Chapter 21,\
    \ Section 21.3.\n\n## 2.8 Statistical Analysis of a Logging File (Bash)\n\nThe\
    \ starting point for this example is a log file of a web server that has been\
    \ anonymized for privacy reasons. Each line of this file is structured in the\
    \ following way (text wrapped for space reasons):\n\n```\n160.85.252.207 - - [05/Feb/2023:00:00:26\
    \ +0100]\n\"GET /research/business/only HTTP/1.1\" 200 25158\n\"https://example.com/less/response/edge/policy\"\
    \n\"Mozilla/5.0 ...\"\n```\n\nIn each case, the first column indicates the IP\
    \ address from which the website was contacted. The script, which is unparalleled\
    \ in its brevity, creates a list of the 20 most common IP addresses. The `$1`\
    \ character combination is the first parameter passed to the script.\n\n```bash\n\
    # Sample file ip-address-statistic.sh\ncut -d ' ' -f 1 $1 | sort | uniq -c | sort\
    \ -n -r | head -n 20\n```\n\nWhen you analyze the `sample.log` file using this\
    \ script, you'll get the following result:\n\n```\n$ ./ip-address-statistics.sh\n\
    \n6166 65d3:f5b9:e9e5:4b1c:331b:29f3:97c1:c18f\n6048 3547:0b26:4c84:4411:0f66:945e:7741:d887\n\
    5136 186.107.89.128\n4620 d741:a4ea:f6e1:6a17:78b1:1694:f518:c480\n...\n```\n\n\
    Therefore, 6,166 requests originated from IPv6 address 65d3:f5b9:...:c18f, etc.\
    \ For a detailed explanation of how the `cut`, `grep`, `uniq`, `sort`, and `head`\
    \ commands in this script work, see Chapter 8, Section 8.1.\n\n## 2.9 Uploading\
    \ Files to the Cloud (PowerShell)\n\nThe task for our penultimate example is to\
    \ upload all image files in the current directory that have changed since the\
    \ last time the script was run or that have been added since then to a bucket\
    \ on the Simple Storage Service (S3) cloud service from Amazon Web Services (AWS).\n\
    \nThis PowerShell script assumes that the `AWS.Tools.Common` and `AWS.Tools.S3`\
    \ modules are installed and that the access data for the bucket has been stored\
    \ with `Set-AWSCredential` for profile name `MyProfile` (see also Chapter 20,\
    \ Section 20.3).\n\nThe `if` construction tests whether the `last-run` file exists.\
    \ If this file exists, the time of the last change will be read. Then, the `LastWriteTime`\
    \ property is updated with the current time. If the file does not exist, it will\
    \ be created. This script takes into account all image files since January 1,\
    \ 2000.\n\nNext, `Get-ChildItem` determines all image files in the current directory.\
    \ `Where-Object` filters out files that are new or have been modified. `Write-S3Object`\
    \ uploads these files to an S3 bucket.\n\n```powershell\n# Sample file upload-images-to-aws.ps1\n\
    if (Test-Path -Path \"last-run\") {\n    $lastRunTime = (Get-Item -Path \"last-run\"\
    ).LastWriteTime\n    (Get-ChildItem \"last-run\").LastWriteTime = Get-Date\n}\
    \ else {\n    $lastRunTime = New-Object DateTime(2000, 1, 1)\n    New-Item \"\
    last-run\" | Out-Null\n}\nGet-ChildItem -Path \"*.jpg\", \"*.jpeg\", \"*.png\"\
    \ |\nWhere-Object { $_.LastWriteTime -gt $lastRunTime } |\nForEach-Object {\n\
    \    Write-S3Object -BucketName \"my.aws.bucket\" `\n        -ProfileName \"MyProfile\"\
    \ -File $_.Name -Key $_.Name\n}\n```\n\nI must admit a little reluctantly that\
    \ this script just barely exceeds the ten-line promise I made for this chapter.\n\
    \n## 2.10 Cloning Virtual Machines (Bash)\n\nThe last example is from server administration.\
    \ One of my Linux servers is running the Kernel-based Virtual Machine (KVM) virtualization\
    \ system. At the beginning of each semester, I create virtual machines with sequential\
    \ numbers for all students attending my Linux course. For example, the `./make-vms.sh\
    \ 20 44` command results in 25 clones of my base system being created, numbered\
    \ `vm20` through `vm44`.\n\n```bash\n# Sample file make-vms.sh\norig='vm-base'\
    \    # Name of the base VM to clone\nfor (( nr=$1; nr<=$2; nr++ )); do\n    echo\
    \ \"create vm-$nr\"\n    disk=/var/lib/libvirt/images/vm-$nr-disk.qcow2\n    virt-clone\
    \ --name \"vm-$nr\" --original $orig \\\n        --mac 52:54:00:01:00:$nr --file\
    \ $disk\ndone\n```\n\nAlthough this script respects the ten-line rule, I cheated\
    \ a little. The “real” version of this script tests whether two parameters were\
    \ really passed to the script, shuts down the source virtual machine that may\
    \ still be running, sets up multiple disks and multiple network interfaces for\
    \ each exercise VM, and more.\n\nFor basic principles and more details, refer\
    \ to [Chapter 21, Section 21.1](Chapter 21, Section 21.1).\n\n# Chapter 3\n##\
    \ Bash and Zsh\n\nBash (Bourne Again Shell) is the default shell of most Linux\
    \ distributions. It performs two tasks: On the one hand, it accepts commands in\
    \ the terminal, executes these commands, and displays their results. On the other\
    \ hand, Bash is considered *the* classic scripting programming language. In this\
    \ chapter, I will only briefly discuss the interactive application; instead, I'll\
    \ focus on introducing you to the main concepts behind Bash.\n\nAs an alternative\
    \ to Bash, Zsh is gaining momentum. While the differences compared to Bash in\
    \ script programming are negligible, Zsh scores points with many small improvements\
    \ in interactive operations. Popular extensions (such as one called *Oh My Zsh*)\
    \ make Zsh even more comfortable and improve its appearance. On macOS, Zsh has\
    \ been the default shell since 2019. On Linux, the switch from Bash to Zsh can\
    \ be made in a minute if necessary.\n\n## 3.1 Terminal, Shell, and Bash\n\nSo\
    \ far, some terms have appeared that I want to explain again briefly now. Let's\
    \ start with the terminal: In this program, you can execute text-based commands.\
    \ On Linux and macOS, the existence of the terminal was always a matter of course.\
    \ While a *terminal* program is available on macOS, there are countless programs\
    \ to choose from on Linux. The most common ones include `gnome-terminal`, the\
    \ new console of the GNOME Project (program name `kgx`), as well as `konsole`.\
    \ Even on Windows, the *Windows Terminal* is available now.\n\nInside the terminal,\
    \ the shell is running: This shell is a program that takes your text input, executes\
    \ the resulting command, and displays the result back in text form. The shell\
    \ also provides a lot of additional features that are not obvious at first glance:\
    \ It can redirect the results of a command to a file, link several commands together,\
    \ and so on.\n\nIn the early history of Unix and Linux, shells have been developed\
    \ multiple times: Bourne Shell, C Shell, Bash, Dash, Zsh, and so on. However,\
    \ this chapter only deals with the two currently most popular shells—Bash and\
    \ Zsh."
  mdcn: "## 2.7 Microsoft Hyper-V 清理（PowerShell）\n\n如果你使用 Microsoft Hyper-V 作为虚拟化系统，就有累积旧快照并占用存储空间的风险。以下\
    \ PowerShell 脚本会删除所有超过 30 天的快照：\n\n```powershell\n# 示例文件 delete-old-snapshots.ps1\n\
    $days = 30\n$aMonthAgo = (Get-Date).AddDays(-$days)\nforeach ($snapshot in Get-VMSnapshot\
    \ -VMName *) {\n    if ($snapshot.CreationTime -lt $aMonthAgo) {\n        $vmname\
    \ = $snapshot.VMName\n        $snapname = $snapshot.Name\n        Write-Output\
    \ \"Delete '$snapname' of VM '$vmname'\"\n        Remove-VMSnapshot -VMName $vmname\
    \ -Name $snapname -Confirm\n    }\n}\n```\n\n该脚本假设你的 Windows 机器上已安装 Hyper-V 及其所有管理工具，这也会自动使\
    \ `Hyper-V` PowerShell 模块可用。该脚本还需要管理员权限：换句话说，你必须先以管理员身份打开 PowerShell 终端，然后才能在其中运行脚本。\n\
    \n为安全起见，清理脚本会在删除每个快照前请求你的确认。如果你移除 `-Confirm` 选项，这些查询将被省略。更多使用 Hyper-V 管理虚拟机的示例在第\
    \ 21 章第 21.3 节中描述。\n\n## 2.8 日志文件的统计分析（Bash）\n\n本示例的起点是一个出于隐私原因已匿名化的 Web 服务器日志文件。该文件的每一行结构如下（因空间原因文本换行）：\n\
    \n```\n160.85.252.207 - - [05/Feb/2023:00:00:26 +0100]\n\"GET /research/business/only\
    \ HTTP/1.1\" 200 25158\n\"https://example.com/less/response/edge/policy\"\n\"\
    Mozilla/5.0 ...\"\n```\n\n在每种情况下，第一列表示访问网站的 IP 地址。这个极其简洁的脚本会创建一个包含 20 个最常见 IP\
    \ 地址的列表。`$1` 字符组合是传递给脚本的第一个参数。\n\n```bash\n# 示例文件 ip-address-statistic.sh\ncut\
    \ -d ' ' -f 1 $1 | sort | uniq -c | sort -n -r | head -n 20\n```\n\n当你使用此脚本分析\
    \ `sample.log` 文件时，你将得到以下结果：\n\n```\n$ ./ip-address-statistics.sh\n\n6166 65d3:f5b9:e9e5:4b1c:331b:29f3:97c1:c18f\n\
    6048 3547:0b26:4c84:4411:0f66:945e:7741:d887\n5136 186.107.89.128\n4620 d741:a4ea:f6e1:6a17:78b1:1694:f518:c480\n\
    ...\n```\n\n因此，有 6,166 个请求来自 IPv6 地址 65d3:f5b9:...:c18f，等等。关于此脚本中 `cut`、`grep`、`uniq`、`sort`\
    \ 和 `head` 命令如何工作的详细解释，请参见第 8 章第 8.1 节。\n\n## 2.9 将文件上传到云端（PowerShell）\n\n我们倒数第二个示例的任务是将当前目录中自脚本上次运行以来已更改或已添加的所有图像文件，上传到\
    \ Amazon Web Services (AWS) 的简单存储服务 (S3) 云服务上的一个存储桶中。\n\n此 PowerShell 脚本假设已安装\
    \ `AWS.Tools.Common` 和 `AWS.Tools.S3` 模块，并且存储桶的访问数据已使用 `Set-AWSCredential` 为配置文件名\
    \ `MyProfile` 存储（另见第 20 章第 20.3 节）。\n\n`if` 结构测试 `last-run` 文件是否存在。如果此文件存在，则读取上次更改的时间。然后，`LastWriteTime`\
    \ 属性会用当前时间更新。如果文件不存在，则会创建它。此脚本考虑了自 2000 年 1 月 1 日以来的所有图像文件。\n\n接下来，`Get-ChildItem`\
    \ 确定当前目录中的所有图像文件。`Where-Object` 过滤出新的或已修改的文件。`Write-S3Object` 将这些文件上传到 S3 存储桶。\n\
    \n```powershell\n# 示例文件 upload-images-to-aws.ps1\nif (Test-Path -Path \"last-run\"\
    ) {\n    $lastRunTime = (Get-Item -Path \"last-run\").LastWriteTime\n    (Get-ChildItem\
    \ \"last-run\").LastWriteTime = Get-Date\n} else {\n    $lastRunTime = New-Object\
    \ DateTime(2000, 1, 1)\n    New-Item \"last-run\" | Out-Null\n}\nGet-ChildItem\
    \ -Path \"*.jpg\", \"*.jpeg\", \"*.png\" |\nWhere-Object { $_.LastWriteTime -gt\
    \ $lastRunTime } |\nForEach-Object {\n    Write-S3Object -BucketName \"my.aws.bucket\"\
    \ `\n        -ProfileName \"MyProfile\" -File $_.Name -Key $_.Name\n}\n```\n\n\
    我必须有点不情愿地承认，这个脚本刚刚超过了我为本章承诺的十行限制。\n\n## 2.10 克隆虚拟机（Bash）\n\n最后一个示例来自服务器管理。我的一台\
    \ Linux 服务器正在运行基于内核的虚拟机 (KVM) 虚拟化系统。每个学期开始时，我都会为所有参加我 Linux 课程的学生创建带有顺序编号的虚拟机。例如，`./make-vms.sh\
    \ 20 44` 命令会创建 25 个我的基础系统的克隆，编号从 `vm20` 到 `vm44`。\n\n```bash\n# 示例文件 make-vms.sh\n\
    orig='vm-base'    # 要克隆的基础虚拟机名称\nfor (( nr=$1; nr<=$2; nr++ )); do\n    echo \"\
    create vm-$nr\"\n    disk=/var/lib/libvirt/images/vm-$nr-disk.qcow2\n    virt-clone\
    \ --name \"vm-$nr\" --original $orig \\\n        --mac 52:54:00:01:00:$nr --file\
