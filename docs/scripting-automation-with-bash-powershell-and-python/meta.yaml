    , \"-l\"], capture_output=True)\noutput = result.stdout\nerrormsg = result.stderr\n\
    for line in output.decode('utf-8').splitlines():\n    print('Result:', line)\n\
    ```\n\n## 5.16.6 Running Commands through the Shell\n\nInstead of running a command\
    \ directly through Python, you can redirect it through the standard shell. For\
    \ many Linux distributions, this standard shell is Bash. For this task, you must\
    \ pass the additional `shell=True` parameter to `run`. There are two advantages\
    \ to this approach: First, you can specify the command or commands to be executed\
    \ in a simple string, where the pipe character (`|`) also works. Thus, for example:\n\
    \n```python\nimport subprocess\nresult = subprocess.run('dmesg | grep -i eth',\
    \ capture_output=True, shell=True)\nprint('Shell:\\n', result.stdout.decode('utf-8'))\n\
    ```\n\nSecond, the shell evaluates the `*` and `?` wildcard characters, which\
    \ allows you to easily process files that match a certain pattern:\n\n```python\n\
    result = subprocess.run('ls -l *.py', capture_output=True, shell=True)\n```\n\n\
    However, using the shell causes increased overhead. If you're concerned with executing\
    \ many commands as quickly as possible, you should avoid using `shell=True` if\
    \ possible. For tips on how to succeed with common tasks without `shell=True`,\
    \ see https://docs.python.org/3/library/subprocess.html.\n\n## 5.16.7 Error during\
    \ a Command Call\n\nThe way in which `run` responds to errors depends on whether\
    \ you run the command directly or through the shell and what type of error occurs.\
    \ For example, if you make a typo in the command name, then without `shell=True`,\
    \ you'll get an `OSError` exception. With `shell=True`, you'll only get a return\
    \ value not equal to 0.\n\nThe additional `check=True` parameter is recommended.\
    \ In this way, you can ensure that an exception is thrown on every error where\
    \ the exception type is `CalledProcessError`. You must import this error class\
    \ from the `subprocess` module.\n\n## 5.16.8 Waiting (sleep)\n\nThe `sleep` function\
    \ from the `time` module waits for the specified time in seconds without blocking\
    \ the CPU for other tasks:\n\n```python\nimport time\nprint(\"wait 200 ms\")\n\
    time.sleep(0.2)\nprint(\"End of program\")\n```\n\n## 5.17 Modules\n\nFor beginners,\
    \ the Python language often seems more extensive than it actually is. In fact,\
    \ the number of functions implemented directly in Python is quite manageable.\
    \ For this purpose, all conceivable additional functions are implemented as add-on\
    \ modules. These modules must be imported before they can be used.\n\n### 5.17.1\
    \ import\n\nSeveral syntax variants are available for the `import` command, with\
    \ the following three main ones:\n\n- **import modulename**\n  This statement\
    \ reads the module. After this step, you can use all functions defined in the\
    \ module in the `modulname.functionname()` notation. Using `import m1, m2, m3`,\
    \ you can also import multiple modules at once.\n- **import modulename as m**\n\
    \  With this variant, the functions defined in the module can be used as `m.functionname()`.\
    \ For long module names, this approach minimizes the typing effort and makes the\
    \ code more clear.\n- **from modulename import f1, f2**\n  In this variant, you\
    \ can use the functions `f1` and `f2` without prefixing the module name.\n\nInternally\
    \ in Python, `import` causes the `modulename.py` file to be read and executed.\
    \ Many modules simply contain the definition of various functions; thus, these\
    \ functions are now known to Python and can be used. However, modules can also\
    \ contain code that is executed immediately, for example, to perform initialization\
    \ work.\n\nA common practice is to always place `import` statements at the beginning\
    \ of a Python script. Modules can import other modules themselves. Python remembers\
    \ which modules it has already read and thus avoids further import attempts for\
    \ already activated modules.\n\nMore details about handling modules are available\
    \ in the Python documentation at https://docs.python.org/3/reference/simple_stmts.html#import.\n\
    \n### 5.17.2 Distributing Custom Scripts across Multiple Files\n\nYou can also\
