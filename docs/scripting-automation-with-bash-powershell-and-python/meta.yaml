  md: "# Chapter 12\nSSH\n\nSecure Shell (SSH) has been the preferred method on Linux\
    \ and macOS for decades to work in text mode on another computer and execute commands\
    \ there. Fortunately, Microsoft also jumped on the SSH bandwagon a few years ago,\
    \ so SSH finally works across platforms. For scripting, SSH is important for two\
    \ reasons:\n\n+   - Using SSH, you can work on other computers, create scripts\
    \ there, and finally execute them. SSH is an admin requirement, especially for\
    \ server administration.\n\n  But you don't always have to connect to a server!\
    \ I often use SSH to work on my Raspberry Pi as well. The Raspberry Pi does not\
    \ need a screen or keyboard for this connectivity—a network connection suffices.\
    \ Likewise, this simplicity applies to the numerous virtual machines in my everyday\
    \ work: I often don't need a graphical user interface (GUI) at all and can enter\
    \ the relevant commands or scripting programming in a terminal with an SSH connection.\n\
    \n  In addition, the Visual Studio Code (VS Code) editor and SSH make a good team.\
    \ You can learn more about VS Code in Chapter 13.\n\n- For many scripts, the ability\
    \ to transfer files or entire directories securely between different computers\
    \ is at least as important. The `scp` and `rsync` commands and the Secure FTP\
    \ (SFTP) protocol use SSH. Backup and upload scripts therefore often require SSH\
    \ access. You also need to know how authentication works with SSH keys. The handling\
    \ of such keys is therefore an important topic in this chapter.\n\n> **Prerequisites\
    \ for This Chapter**\n\nAs far as scripting is concerned, no content-related prerequisites\
    \ must be fulfilled, which means you can read this chapter independently from\
    \ all other chapters. The sample scripts assume that you have basic knowledge\
    \ of Bash and PowerShell. You should also be familiar with the `find` command\
    \ (see Chapter 6, Section 6.2). As far as you work on Linux, basic admin knowledge\
    \ is of course always an advantage.\n\n# 12.1 Installing the SSH Client and Server\n\
    \nTo establish an SSH connection from local computer A to a second computer B,\
    \ an SSH client must be available on computer A (usually the `ssh` command), and\
    \ an SSH server must be running on B. This section describes the prerequisites\
    \ you must fulfill before you can use SSH."
