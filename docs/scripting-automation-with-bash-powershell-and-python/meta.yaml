  md: '# 5.16.1 Access to the Program Parameters


    sys.argv contains the list of all parameters passed to a Python script. You must
    note that the first list element contains the program name, which you usually
    do not want to evaluate. The easiest way to access the remaining elements is then
    via sys.argv[1:].


    # 5.16.2 Access to Standard Input and Standard Output


    sys.stdin and sys.stdout contain file objects that you can use to output data
    to standard output or read data from standard input. The same functions are available
    as for ordinary files (Section 5.14). Error and logging messages are best sent
    to sys.stderr.


    # 5.16.3 Exiting a Program


    Usually, a Python program ends with the execution of the last statement or when
    an unhandled error occurs. If you want to terminate a program prematurely, you
    must run sys.exit(). With sys.exit(n), you can also return an error code, the
    meaning of which is the same as in Bash scripts. Alternatively, you can pass a
    string to the exit method, which is then displayed as an error message. In this
    case, 1 is automatically applied as the error code.


    > **exit Produces an Exception!**

    Note that, internally, the exit method throws a SystemExit exception. The end
    of the program can therefore be prevented by try/except.


    # 5.16.4 Calling Linux Commands


    By using subprocess.run, you can execute another program or command from within
    a Python script. In the simplest case, you can pass a list with the command name
    and its options to run. The following lines call the ls command with the -l option,
    which displays details about the files in the current directory. run returns an
    object of the CompletedProcess class as a result (see Table 5.11).


    ```

    import subprocess

    result = subprocess.run([''ls'', ''-l''])

    ```


    | Property | Meaning |

    |---|---|

    | args | The executed command as a string or list |

    | returncode | The return code (0 = OK; otherwise, error) |

    | stdout | Standard output of the command |

    | stderr | Error messages of the command |


    Table 5.11 Properties of an Object of the CompletedProcess Type'
