    \ also in the backup (caution!)\n- /xo: Copy only files that have changed; this\
    \ last option speeds up the synchronization process enormously from the second\
    \ pass onwards\n- /log+:filename: Adds logging output to the specified file\n\n\
    ```\n#!/usr/bin/env pwsh\n# Sample file sync-folders.ps1\n# $destvolume: name\
