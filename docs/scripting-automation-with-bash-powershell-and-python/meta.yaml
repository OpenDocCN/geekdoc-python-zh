    ### 3.4 Zsh 作为 Bash 的替代品


    我在本章开头提到过，对于本书的核心主题（即编写脚本），Zsh 只扮演次要角色。出于兼容性考虑，更好的方法是使用 Bash 来编写脚本，甚至避免使用一些 Bash
    特有的、其他 shell 没有的扩展。这样，你的脚本几乎可以在任何环境中运行。


    Zsh 的吸引力更多在于其交互式应用：当你按 `Tab` 键时，Zsh 在扩展命令、文件和目录名称方面采用了比 Bash 更智能的方法。你不必指定首字母；相反，只要名称中出现的字母组合就足够了。此外，Zsh
    提供了更多的配置选项和扩展模块。自从我体验了 Zsh 与 Oh My Zsh 扩展结合带来的便利后，“普通”的 Bash 对我来说就不再够用了！


    ### 3.4.1 安装


    macOS 以及一些选定的 Linux 发行版已经默认使用 Zsh。对于所有其他 Linux 发行版，你可以使用各自的包管理工具轻松安装 Zsh。在 Debian
    和 Ubuntu 上，你会使用以下命令：


    ```

    $ sudo apt update

    $ sudo apt install zsh

    ```


    下一步，你可以为你的账户激活 Zsh：


    ```

    $ chsh -s $(which zsh)

    ```


    要使此更改生效，你必须注销并重新登录。现在，当你第一次打开终端时，会运行一个配置脚本：


    ```

    This is the Z Shell configuration function for new users,

    zsh-newuser-install. (...) You can

    (q) Quit and do nothing. The function will be run again next

    time.

    (0) Exit, creating the file ~/.zshrc containing just a comment.

    That will prevent this function being run again.

    (1) Continue to the main menu.

    (2) Populate your ~/.zshrc with the configuration recommended

    by the system administrator and exit.

    ```


    如果你只是接受脚本建议的默认设置，或者在手动配置（选项 1）中使用发行版提供的默认配置文件 .zshrc（选项 2），你并没有做错任何事。如有必要，你可以稍后通过
    `zsh-newuser-install` 重复并调整配置。


    要在 Windows 上使用 Zsh，与 Bash 的建议相同：在 WSL 中安装 Linux 或作为虚拟机安装，然后在那里运行 Zsh！从 Bash 切换到
    Zsh 可以按照我们这里描述的方式进行。


    ### 3.4.2 Zsh 配置（/etc/zshrc 和 .zshrc）


    与 Bash 类似，Zsh 在启动时也会评估一些配置文件。最重要的是用于全局设置的 `/etc/zshrc` 和位于你主目录中的 `.zshrc`。'
