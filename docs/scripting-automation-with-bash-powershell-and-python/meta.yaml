    # 6.3.1 Archiving Files Using tar


    The `tar` command actually stands for *tape archive*, so it comes from a time
    when tape drives were still used. Today, `tar` is mostly used to create compressed
    file archives. `tar` files play a similarly important role on Linux as `zip` files
    on Windows.


    For `tar`, the first option (`-c`, `-r`, `-x`, or `-t`) specifies the action that
    `tar` is supposed to perform. All other options affect the operation.


    | Option | Meaning |

    |---|---|

    | `-c` | Create new archive (*create*) |

    | `-r` | Extend existing archive (*replace*) |

    | `-x` | Unpack archive (*extract*) |

    | `-t` | List contents (*list*) |

    | `-v` | Show visual feedback (*verbose*) |

    | `-z` | Compress/decompress using `gzip` |

    | `-j` | Compress/decompress using `bzip2` |

    | `-J` | Compress/decompress using `xz` |

    | `-f file.tar` | Filename of the archive (*file*) |

    | `-f -` | Use standard input/standard output |

    | `-C directory` | Work in this directory |


    Table 6.2 tar Options


    A particularly important option is `-f filename`: This option defines the filename
    of the archive file. If you forget this option, `tar` will try to access a tape
    drive. Since tape drives don''t exist on most computers, an error will occur.


    When you use `-f -`, `tar` writes the archive to the standard output or reads
    it from there. This approach is useful if you want to combine `tar` with another
    command, for example, to immediately encrypt an archive using `tar cf - | gpg
    ...`.'
