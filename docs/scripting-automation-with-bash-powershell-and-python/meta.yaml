    \ {\n    $total += [long]($_.'2023_last_updated'.Replace(',', ''))\n}\nWrite-Output\
    \ \"World population: $total\"\n```\n\n在循环内，`2023_last_updated`属性字符串中的逗号被移除。`[long]`将字符串转换为数字。\n\
    \n除了自己执行求和之外，你也可以通过`Measure-Object`来计算结果。但是，由于需要将`2023_last_updated`列转换为数字，最终的代码并不会更短或更高效：\n\
