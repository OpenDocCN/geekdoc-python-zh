    ```\n\n即使传递了多个文件模式（例如 `myscript.py *.jpg *.png`），此过程也适用于所有操作系统。有关此技术的应用示例，请参见第\
    \ 16 章，第 16.3 节。\n\n## 5.12.8 文本文件行循环\n\n通常，你需要逐行处理文本文件。为此，Python 在 `for` 循环中接受文件对象，并将一次一行传递给循环变量。（我将在第\
