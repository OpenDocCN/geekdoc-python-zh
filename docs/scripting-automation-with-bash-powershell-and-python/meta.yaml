    ## 9.5 Regular Expressions in Python (re Module)\n\nTo use regular expressions\
    \ in Python, the default module `re` must be imported. This module provides various\
    \ functions, of which I will briefly present the most important ones in this section:\n\
    \n+   - `re.search(pattern, str)` returns either a `Match` object with the location\
    \ of the first hit or `None`. The groups defined in the pattern can be analyzed\
    \ using the `group` property (see the sample code following this list).\n- `re.match(pattern,\
    \ str)` works like `search`; it considers the pattern only at the beginning of\
    \ the string.\n- `re.fullmatch(pattern, str)` also works like search, but now,\
    \ the pattern must describe the entire string, from the beginning to the end.\n\
    - `re.findall(pattern, str)` returns a list of all matches found. Unlike search,\
    \ match, and fullmatch, findall returns simple strings of matches, not match objects.\
    \ If the pattern contains one group, then the result string specifies the contents\
    \ of that group. On the other hand, if the pattern contains multiple groups, you’ll\
    \ receive a tuple with strings for each group.\n- `re.sub(pattern, replace, str)`\
    \ replaces all matching patterns with new text.\n\nYou can read the full documentation\
    \ for the re module at https://docs.python.org/3/library/re.html.\n\nIn Python,\
    \ a best practice is to express the search pattern as a raw string in the following\
    \ format: r'pattern'. In this way, you can avoid issues caused by backslashes.\
    \ The following script shows the application of search, first for a search pattern\
    \ without groups and then for a search pattern with groups:\n\n```\n# Sample file\
    \ hello-re.py, search pattern without groups\nimport re\npattern = r'\\d{4}-\\\
    d{2}-\\d{2}'\ntxt = 'Easter 2024 is on 2024-03-31.'\nif result := re.search(pattern,\
    \ txt):\n    print(result.group())          # 2024-03-31\n```\n\nIn the second\
    \ variant, the group method without parameters returns the entire recognized pattern.\
    \ Using len(result.groups()) allows you to determine how many pattern groups exist.\
    \ These groups can then be analyzed using group(n). Note that group(0) is equivalent\
    \ to group() and returns the overall result.\n\n```\n# Sample file hello-re.py,\
    \ search pattern with groups\npattern = r'(\\d{4})-(\\d{2})-(\\d{2})'\nif result\
    \ := re.search(pattern, txt):\n    print(result.group())          # 2024-03-31\n\
    \    print(len(result.groups()))    # 3\n    year = result.group(1)\n    month\
    \ = result.group(2)\n    day = result.group(3)\n    print(year, month, day)  \
    \      # 2024 12 31\n```\n\n### 9.5.1 Example: Verifying a MAC Address\n\nIn the\
    \ following script, you’ll be prompted to enter a Media Access Control (MAC) address\
    \ for identifying network devices. A MAC address is a 12-digit hexadecimal number.\
    \ The script accepts input in the 00-80-41-ae-fd-7e and 00:80:41:ae:fd:7e formats\
    \ (i.e., with hyphens or colons between the groups of two). a through f are also\
    \ accepted as uppercase letters.\n\nHere is a brief explanation of the pattern:\
    \ Exactly two hexadecimal digits must be followed by either the - or : character.\
    \ This group must appear five times in the pattern and must be followed by two\
    \ hexadecimal digits.\n\n```\n# Sample file input-mac.py\nimport re\nok = False\n\
    pattern = r'^([a-fA-F0-9]{2}[:-]){5}[a-fA-F0-9]{2}$'\nwhile not ok:\n    mac =\
    \ input('Enter a MAC address: ')\n    ok = re.match(pattern, mac)\n    if not\
    \ ok:\n        print('Not valid, please try again:')\n\nprint('Valid address:',\
    \ mac)\n```\n\n### 9.5.2 Example: Anonymizing a Logging File\n\nIn the previous\
    \ chapter, I presented multiple usage examples for `grep`, `sort`, and `uniq`.\
    \ The sample file `access.log` used there is a real Apache logging file of a web\
    \ server, but I have anonymized it for privacy reasons. The logging file uses\
    \ the Apache Combined Log format, described at https://httpd.apache.org/docs/2.4/logs.html.\n\
    \nThe following listing contains excerpts from the `anonymize-log.py` script,\
    \ which you can find in the sample files within the directory for the previous\
    \ chapter. The regular expression consists of ten groups for recognizing the components\
    \ of a line in the Apache Combined Log format. Although only one match per line\
    \ is expected (`result(0)`), I used `findall` in this case, which simplifies the\
    \ further analysis of the results. `findall` provides a tuple, which is converted\
    \ into a list. Then, some components are replaced, and finally, the logging line\
    \ is output again.\n\n```\n# Sample file anonymize-log.py\n# (in the directory\
    \ for the previous chapter)\n# usage: ./anonymize-log.py in.log > out.log\nimport\
    \ random, re, string, sys\n\ndef randomIPv4(): ...     # Functions for generating\
    \ random IP addresses\ndef randomIPv6(): ...     # URLs and names\ndef randomUrl():\
    \ ...\ndef randomUsername(): ...\n\n# Dictionary, assigns random addresses to\
    \ real IP addresses\nips = {}\n\n# Pattern with 10 groups for the Apache Combined\
    \ Log Format\npattern = r'(.+?) - (.+?) \\[(.+?)\\] \"(.+?) (.+?) (.+?)\"\n  \
    \        (.+?) (.+?) \"(.+?)\" \"(.+?)\"'\n\n# open file passed in the first parameter\n\
    with open(sys.argv[1], 'r') as f:\n    # loop through all lines\n    for line\
    \ in f:\n        result = re.findall(pattern, line)\n        if len(result):\n\
    \            groups = list(result[0])  # list -> tupel\n            # replace\
    \ IP address with random address\n            # and save in ips dictionary\n \
    \           ip = groups[0]\n            if ip not in ips:\n                if\
    \ ':' in ip:\n                    ips[ip] = randomIPv6()\n                else:\n\
    \                    ips[ip] = randomIPv4()\n            groups[0] = ips[ip]\n\
    \n            # analogous code for names, URLs etc. ...\n\n            # output\
    \ of the line (stdout)\n            print('%s - %s [%s] \"%s %s %s\" %s %s \"\
    %s\" \"%s\"' %\n                  tuple(groups))\n```\n\n## Chapter 10\nJSON,\
    \ XML, and INI\n\nJavaScript Object Notation (JSON) has established itself over\
    \ the last decade as the dominant format when programs or web services such as\
    \ REST APIs are supposed to exchange data.\nThe hype of the 2000s surrounding\
    \ the Extensible Markup Language (XML) has now faded: Not only is the comparatively\
    \ complex syntax, with its many special cases, difficult for humans to read, but\
    \ also tedious to analyze through code. But even as XML is used less and less\
    \ in new projects, you may still encounter its huge legacy of programs and web\
    \ services based on XML. But we are not limited to only JSON or XML: To save a\
    \ few configuration settings, the INI format is also completely sufficient.\n\
    In this chapter, I want to present some functions that PowerShell and Python provide\
    \ for creating and processing such files. If necessary, these tasks can also be\
    \ performed in Bash, but you would have to use external commands, such as jq or\
    \ xmllint.\n\n> **Prerequisites for This Chapter**\nThis chapter takes all three\
    \ scripting languages described in this book into account, this time with a focus\
    \ on PowerShell and Python: These two languages provide excellent support for\
    \ the JSON and XML formats. A good logical follow-up to this chapter is Chapter\
    \ 18.\n\n### 10.1 JSON in PowerShell\n\nIn PowerShell, two cmdlets that are as\
    \ simple as they are powerful make processing JSON data a breeze:\n\n+   - **ConvertTo-Json**\n\
    \  ConvertTo-Json is mostly used in the `cmdlet | ConvertTo-Json` format and converts\
    \ the result objects provided by the cmdlet into a string in JSON format. The\
    \ properties of the objects serve as keys for the key-value pairs in the JSON\
    \ document. The document can be saved to a file via output redirection.\n- **ConvertFrom-Json**\n\
    \  ConvertFrom-Json works exactly the opposite way: The cmdlet transforms the\
    \ JSON string passed as parameters or via pipe back into PSObjects or hash tables,\
    \ which can then be further processed using Select-Object, ForEach-Object, and\
    \ so on.\n\nThe following examples show some applications of the two cmdlets."
