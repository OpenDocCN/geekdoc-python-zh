  - "[PAGE 92]\n\n```\nfor i in {1..10}; do echo $i; done\n# Output 1, 2, ..., 10\n\
    \nfor i in {01..12}; do echo $i; done\n# Output 01, 02, ..., 12\n\nfor ((i=1;\
    \ i<=10; i++)); do echo $i; done\n# Output 1, 2, ..., 10\n```\n\n# 3.12.1 Processing\
    \ Filenames with Spaces\n\nThe above `for para in $*; do ...` example processes\
    \ all parameters passed to a script. You should act with caution if filenames\
    \ may contain spaces! Let’s suppose you have a file named `account names.txt`,\
    \ and you run `./myscript.sh *.txt` with the following code:\n\n```\n# processes\
    \ filenames with spaces incorrectly\nfor filename in $*; do\n  ls -l \"$filename\"\
    \ndone\n```\n\nAn error occurs twice in the process. The `ls` command does not\
    \ find the `account` or `names.txt` file. For the script, it is not recognizable\
    \ that `account names.txt` is *one* filename. The reason is that the parameters\
    \ passed in the loop are separated by default at every *whitespace* character,\
    \ which includes both whitespace and newline characters, which Bash uses to separate\
    \ filenames.\n\nTo ensure the loop is processed correctly, you must prepend the\
    \ statement `IFS=$'\\n'`. This statement means that the decomposition into words\
    \ is performed only in case of a newline character.\n\n```\n# processes filenames\
    \ with spaces correctly\nIFS=$'\\n'\nfor filename in $*; do\n  ls -l \"$filename\"\
    \ndone\n```\n\nI already introduced you to the special `IFS` variable (internal\
    \ field separator) in Section 3.9. The preceding dollar character ensures that\
    \ `\\n` is interpreted correctly.\n\n# 3.12.2 while and until\n\nThe `while` loop\
    \ is executed as long as the condition is met and uses the following structure:\n\
    \n```\nwhile condition; do\n  commands\ndone\n```"
