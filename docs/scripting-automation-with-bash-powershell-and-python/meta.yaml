    simple tasks directly in the terminal.


    The final example in Bash syntax runs through all `*.jpeg` files in the current
    directory and turns them into *thumbnails* (i.e., greatly reduced images). Watch
    out though because since the following command uses the same source and destination
    filename, the original images will be overwritten! If you don''t want that to
    happen, you must use another destination filename (e.g., `"thumb-$file"`).


    ```

    $ for file in *.jpeg; do magick "$file" -resize ''320x320'' \n    -quality 80
    "$file"; done

    ```


    As far as the destination file format supports Exif data, this data will be preserved.
    Exif data is metadata that, among other things, provides information about the
    place and time the image was taken. Exif data is the focus of the remaining sections
    of this chapter. If you want to remove Exif data, you can call `magick` with the
    `-strip` option. A safer choice is to use the `exiftool -all:all= file.jpg` command
    presented in the next section.'
  - "[PAGE 377]\n\n> **Quoting Special Characters**\n\nNote that the `magick` syntax\
    \ provides for various special characters that have a special meaning in Bash\
    \ and PowerShell. You should either enclose the strings in quotes, as in the previous\
    \ examples, or use the quotation mark \\ (Bash) or ` (PowerShell).\n\n> **Artificial\
    \ Intelligence (AI) Help**\n\nAI tools like ChatGPT also know ImageMagick. If\
    \ you have a specific task, it's at least worth trying to determine the required\
    \ combination of options with AI support. In my attempts, the hit rate was about\
    \ 50 percent. The result did not always correspond to my expectations, but often,\
    \ ChatGPT put me on the right track. Note that both ChatGPT and many proposed\
    \ solutions on the internet use the `convert` command instead of `magick`.\n\n\
    # 16.1.3 Example: convert2eps (Bash Variant)\n\nTo make printable PostScript files\
    \ from the text files of my books in Markdown or LaTeX formats, I need an equivalent\
    \ EPS file for each screenshot in PNG format, which is exactly what our next script\
    \ takes care of.\n\nThis example loops through all PNG files in the current directory.\
    \ If no `<name>.eps` file exists for `<name>.png` or if the PNG file is newer\
    \ than the EPS file (comparison operator `-nt`; i.e., *newer than*), `magick`\
    \ creates a new EPS file.\n\nThe `magick` options or parameters have the following\
    \ meaning: `-quiet` suppresses the display of warnings and status messages. `-background\
    \ white` uses a white background for the transparent areas of the image. `-flatten`\
    \ merges the image layers.\n\n`eps2:$epsfile` specifies that the PostScript Level\
    \ 2 specifications should apply when writing the EPS file. This choice has a big\
    \ impact on image size because the file is compressed much better (without quality\
    \ loss) than in default level 1. Level 3 (i.e., `eps3:$epsfile`) promises even\
    \ more compact files. However, this level places higher demands on the printer\
    \ or exposure software and can cause compatibility problems.\n\n```\n# Sample\
    \ file convert2eps.sh\nfor pngfile in *.png; do\n    # replace .png identifier\
    \ with .eps\n    epsfile=${pngfile%.png}.eps\n    if [ $pngfile -nt $epsfile ];\
    \ then\n        echo \"$pngfile -> $epsfile\"\n        magick \"$pngfile\" -quiet\
    \ -background white \\n            -flatten \"eps2:$epsfile\"\n    fi\ndone\n\
    ```"
- md: "## 16.1.4 Example: convert2eps (PowerShell Variant)\n\nYou can use the last\
    \ script as a pattern for various uses of `magick`—whether you want to resize\
    \ hundreds of images, watermark them, or convert them to a different format. If\
    \ you work in Windows, the script in the next listing serves the same purpose:\n\
    \n```\n# Sample file convert2eps.ps1\n$pngfiles = Get-ChildItem *.png\nforeach\
    \ ($pngfile in $pngfiles) {\n    $pngname = $pngfile.Name\n    $epsname = $pngname\
    \ -replace \".png\", \".eps\"\n    # skip if there is already an up-to-date EPS\
    \ file\n    if ( (Test-Path $epsname) -and\n         (Get-ChildItem $epsname).LastWriteTime\n\
    \                                -gt $pngfile.LastWriteTime )\n    {\n       \
    \ continue\n    }\n    Write-Host \"$pngname -> $epsname\"\n    magick $pngname\
    \ -quiet -background white -flatten `\n        eps2:$epsname\n}\n```\n\n> **Editing\
    \ Images on Windows without ImageMagick**\nOf course, various classes exist in\
    \ the .NET framework that include elementary functions for image processing that\
    \ you can apply in PowerShell scripts. None of these classes can even come close\
    \ to matching ImageMagick’s capabilities. This limitation is offset by the advantage\
    \ of not needing to install external tools. A good example of using the `System.Drawing.Bitmap`\
    \ class can be found at https://stackoverflow.com/questions/47602716.\n\n## 16.2\
    \ Sorting Photos by Date Taken\n\nThe starting point of this example is a large\
    \ collection of photos in the JPEG format. These files are supposed to be moved\
    \ to directories that indicate the month of the date on which they were taken.\
    \ Thus, a photo taken in July 2023 should be moved to the `2023-07` directory.\
    \ If this directory does not exist yet, it should be created.\n\nThe solution\
    \ to this task succeeds through the analysis of Exif data. This data is metadata\
    \ built into the JPEG file by the camera. Depending on the smartphone or camera\
    \ model, the Exif data contains the date the photo was taken; the location (GPS\
    \ coordinates); various camera parameters (aperture, exposure time); the orientation\
    \ (image rotation, e.g., *portrait* or *landscape*); and so on.\n\n### 16.2.1\
    \ Installing and Trying Out ExifTool\n\nThe best tool for analyzing Exif data\
    \ is *ExifTool*. This package consists of a Perl library and the `exiftool` command.\
    \ On Linux, you can install ExifTool from the package sources. The package name\
    \ varies depending on the distribution. `exiftool -ver` then determines the version\
    \ number.\n\n```\n$ sudo apt install exiftool            (Debian, Ubuntu)\n$ sudo\
    \ dnf install perl-Image-ExifTool (Fedora)\n$ sudo pacman -S perl-exiftool   \
    \      (Arch Linux)\n\n$ exiftool -ver\n12.50\n```\n\nInstallation on Windows\
    \ is a bit more tedious: At https://exiftool.org, you can find a ZIP file for\
    \ download. However, that file does *not* contain any setup program. Instead,\
    \ you must manually copy the `exiftool(-k).exe` file contained in the archive\
    \ to a directory listed in the `PATH` variable. The easiest way is to use `C:\\\
    Windows` (which requires administrator rights, however). Then, you must rename\
    \ the file to `exiftool.exe`.\n\nMicrosoft Defender blocks the first attempt to\
    \ run ExifTool on Windows because the publisher is unknown. Click **More information**\
    \ and **Run anyway**. As a result, the startup succeeds without a problem, even\
    \ from the terminal.\n\nYou also must overcome some small hurdles on macOS: The\
    \ DMG image contains a `*.pkg` file with an installer. However, the execution\
    \ is blocked by macOS because the installer is not signed. You must open the **Privacy**\
    \ module in the system settings. Then, click on **Open ExifTool n.n.pkg anyway**.\n\
    \nOnce the installation is done, using the `exiftool` command is quite simple:\
    \ You can pass a filename and get a seemingly endless list of Exif values as a\
    \ result:\n\n```\n$ exiftool cimg2647.jpg\n\nExifTool Version Number : 12.50\n\
    File Name                : cimg2647.jpg\n...\nDate/Time Original       : 2008:08:28\
    \ 12:53:22\n...\nShutter Speed            : 1/250\nCircle Of Confusion      :\
    \ 0.005 mm\nField Of View            : 50.7 deg\n```\n\nTo sort the images by\
    \ the date on which they were taken, only the `Date/Time Original` entry is relevant.\
    \ The option of the same name, in combination with the desired format for the\
    \ date (`-d`) and the `-s3` option (for *shortest*), reduces the output to the\
    \ desired information:\n\n```\n$ exiftool -d '%Y-%m' -s3 -DateTimeOriginal cimg2647.jpg\n\
    \n2008-08\n```\n\nExif data can reveal a lot of information about the origin of\
    \ the images. ExifTool therefore provides the option to remove the Exif data from\
    \ a file. The recommended command is `exiftool -All= image.jpg`. This command\
    \ removes almost all metadata but leaves the APP14 Adobe block of color information.\
    \ This data block is necessary so that the colors of the image can be displayed\
    \ correctly. However, the data has no privacy relevance. Concerning deleting Exif\
    \ data, we also recommend reading the following post on the ExifTool forum: https://exiftool.org/forum/index.php?topic=13034.0.\n\
    \nExifTool has countless other options, which I will not go into here. Refer to\
    \ the manual, if necessary, at https://exiftool.org/exiftool_pod.html.\n\n###\
    \ 16.2.2 Bash Example\n\nThe following lines show an implementation of the `sort`\
    \ script in Bash. The code should be understandable without further explanation.\n\
    \n```\n# Sample file sort-photos.sh\n# loop through all filenames passed as parameters\n\
    for file in \"$@\"; do\n    yearmonth=$(exiftool -s3 -d '%Y-%m' -DateTimeOriginal\
    \ $file)\n    if [ $yearmonth ]; then\n        echo \"$file -> $yearmonth/\"\n\
    \        mkdir -p $yearmonth\n        mv \"$file\" $yearmonth/\n    fi\ndone\n\
    ```\n\nTo facilitate trying out the script, you'll find an archive with some small\
    \ photos in the sample files at https://rheinwerk-computing.com/5851.\n\n```\n\
    $ ./sort-photos.sh *.jpg\n\ncimg2372.jpg -> 2007-12/\ncimg2374.jpg -> 2007-12/\n\
    ```\n\nThe script ignores all files without Exif data or with missing recording\
    \ time and leaves them at the previous location. To test this process, `photos.zip`\
    \ contains some special cases: `z-empty.jpg` is simply an empty file (0 bytes).\
    \ `z-almost-no-metadata.jpeg` was taken with an iPhone, then downsized, and finally\
    \ stripped of almost all Exif data by using `exiftool -All=`. Then, `z-gimp-metadata.jpeg`\
    \ was inserted as a screenshot into the image processing program Gimp and then\
    \ saved. The file therefore contains only the metadata provided by Gimp for newly\
    \ created images.\n\n### 16.2.3 PowerShell Example\n\nThe code for the PowerShell\
    \ implementation looks almost the same as the one for the Bash script. The biggest\
    \ difference is the nested loop. This nested loop is required because PowerShell\
    \ does not perform globbing, that is, it does not convert patterns like *.jpg\
    \ into a list of filenames. You must do this step yourself!\n\nThe first loop\
    \ runs through all parameters. The second loop executes `Get-Item` for each parameter.\
    \ With a filename like `myimg.jpg`, `Get-Item` simply returns the file. If, on\
    \ the other hand, an expression was passed, then `Get-Item` returns the list of\
    \ matching files. The two loops ensure that a call of `.\\sort-images.ps1 *.jpg\
    \ *.jpeg` is also processed correctly.\n\n```\n# Sample file sort-images.ps1\n\
    # loop through all parameters\nforeach ($arg in $args) {\n    # loop through the\
    \ Get-Item results\n    foreach ($file in Get-Item $arg) {\n        $yearmonth\
    \ = exiftool -s3 -d '%Y-%m' `\n                            -DateTimeOriginal $file\n\
    \        if ($yearmonth) {\n            Write-Output \"$($file.Name) -> $yearmonth/\"\
    \n            $targetdir = New-Item -ItemType Directory `\n                  \
    \                -Path $yearmonth -Force\n            Move-Item $file $targetdir\n\
    \        }\n    }\n}\n```\n\n> **Speed Problems**\n\nWhen it comes to sorting\
    \ “only” a few hundred images, the approach presented in this section is good\
    \ enough. However, when dealing with thousands of images, a more efficient approach\
    \ is to use the scripting features built into ExifTool, which requires a detailed\
    \ study of the manual. With ExifTool scripting, ExifTool needs to be started only\
    \ once and not thousands of times. This feature is crucial because ExifTool uses\
    \ the Perl programming language. Whenever ExifTool is started, a complex Perl\
    \ environment needs to be loaded. By starting ExifTool only once and then processing\
    \ many commands within the environment, a lot of time can be saved. You can find\
    \ a code example at https://exiftool.org/mistakes.html#M3.\n\n## 16.3 Converting\
    \ Exif Metadata to SQL Commands\n\nThe goal of the next example is to process\
    \ a pool of photos and enter the most important metadata of each image into a\
    \ database. Among other things, the name, file size,"
  mdcn: "## 16.1.4 示例：convert2eps（PowerShell 变体）\n\n你可以将上一个脚本作为 `magick` 各种用途的模板——无论是调整数百张图片的大小、添加水印，还是转换为其他格式。如果你在\
    \ Windows 环境下工作，下一个清单中的脚本具有相同的目的：\n\n```\n# 示例文件 convert2eps.ps1\n$pngfiles =\
    \ Get-ChildItem *.png\nforeach ($pngfile in $pngfiles) {\n    $pngname = $pngfile.Name\n\
    \    $epsname = $pngname -replace \".png\", \".eps\"\n    # 如果已存在最新的 EPS 文件，则跳过\n\
    \    if ( (Test-Path $epsname) -and\n         (Get-ChildItem $epsname).LastWriteTime\n\
    \                                -gt $pngfile.LastWriteTime )\n    {\n       \
    \ continue\n    }\n    Write-Host \"$pngname -> $epsname\"\n    magick $pngname\
    \ -quiet -background white -flatten `\n        eps2:$epsname\n}\n```\n\n> **在不使用\
    \ ImageMagick 的情况下编辑 Windows 图像**\n当然，.NET 框架中存在各种包含图像处理基本功能的类，你可以在 PowerShell\
    \ 脚本中应用它们。但这些类的功能都无法与 ImageMagick 相提并论。这种局限性被无需安装外部工具的优势所抵消。一个使用 `System.Drawing.Bitmap`\
    \ 类的好例子可以在 https://stackoverflow.com/questions/47602716 找到。\n\n## 16.2 按拍摄日期对照片进行排序\n\
    \n本示例的起点是一个包含大量 JPEG 格式照片的集合。这些文件应被移动到表示其拍摄日期月份的目录中。因此，一张在 2023 年 7 月拍摄的照片应被移动到\
    \ `2023-07` 目录。如果该目录尚不存在，则应创建它。\n\n此任务的解决方案通过分析 Exif 数据得以实现。这些数据是相机嵌入 JPEG 文件中的元数据。根据智能手机或相机型号的不同，Exif\
    \ 数据包含照片的拍摄日期；位置（GPS 坐标）；各种相机参数（光圈、曝光时间）；方向（图像旋转，例如 *竖屏* 或 *横屏*）；等等。\n\n### 16.2.1\
    \ 安装和试用 ExifTool\n\n分析 Exif 数据的最佳工具是 *ExifTool*。该软件包由一个 Perl 库和 `exiftool` 命令组成。在\
    \ Linux 上，你可以从软件包源安装 ExifTool。软件包名称因发行版而异。然后使用 `exiftool -ver` 确定版本号。\n\n```\n\
    $ sudo apt install exiftool            (Debian, Ubuntu)\n$ sudo dnf install perl-Image-ExifTool\
    \ (Fedora)\n$ sudo pacman -S perl-exiftool         (Arch Linux)\n\n$ exiftool\
    \ -ver\n12.50\n```\n\n在 Windows 上的安装稍微繁琐一些：在 https://exiftool.org，你可以找到一个 ZIP\
    \ 文件下载。然而，该文件*不*包含任何安装程序。相反，你必须手动将存档中包含的 `exiftool(-k).exe` 文件复制到 `PATH` 变量中列出的目录。最简单的方法是使用\
    \ `C:\\Windows`（但这需要管理员权限）。然后，你必须将文件重命名为 `exiftool.exe`。\n\nMicrosoft Defender\
    \ 会阻止首次在 Windows 上运行 ExifTool，因为发布者未知。点击 **更多信息** 并 **仍要运行**。这样，即使从终端启动也能成功，不会有问题。\n\
    \n在 macOS 上你也必须克服一些小障碍：DMG 镜像包含一个带有安装程序的 `*.pkg` 文件。但是，由于安装程序未签名，macOS 会阻止其执行。你必须打开系统设置中的\
    \ **隐私** 模块。然后，点击 **仍要打开 ExifTool n.n.pkg**。\n\n安装完成后，使用 `exiftool` 命令非常简单：你可以传递一个文件名，然后得到一个看似无穷无尽的\
    \ Exif 值列表：\n\n```\n$ exiftool cimg2647.jpg\n\nExifTool Version Number : 12.50\n\
    File Name                : cimg2647.jpg\n...\nDate/Time Original       : 2008:08:28\
    \ 12:53:22\n...\nShutter Speed            : 1/250\nCircle Of Confusion      :\
    \ 0.005 mm\nField Of View            : 50.7 deg\n```\n\n要按拍摄日期对图像进行排序，只有 `Date/Time\
    \ Original` 条目是相关的。同名选项，结合所需的日期格式 (`-d`) 和 `-s3` 选项（用于 *最短*），将输出缩减为所需信息：\n\n```\n\
    $ exiftool -d '%Y-%m' -s3 -DateTimeOriginal cimg2647.jpg\n\n2008-08\n```\n\nExif\
    \ 数据可以揭示关于图像来源的大量信息。因此，ExifTool 提供了从文件中删除 Exif 数据的选项。推荐的命令是 `exiftool -All= image.jpg`。此命令会删除几乎所有元数据，但会保留\
    \ APP14 Adobe 颜色信息块。此数据块是必要的，以便图像的颜色可以正确显示。但是，这些数据与隐私无关。关于删除 Exif 数据，我们还建议阅读 ExifTool\
    \ 论坛上的以下帖子：https://exiftool.org/forum/index.php?topic=13034.0。\n\nExifTool 有无数其他选项，此处不作赘述。如有需要，请参考手册\
    \ https://exiftool.org/exiftool_pod.html。\n\n### 16.2.2 Bash 示例\n\n以下几行展示了 `sort`\
    \ 脚本在 Bash 中的实现。无需进一步解释，代码应该是可理解的。\n\n```\n# 示例文件 sort-photos.sh\n# 遍历作为参数传递的所有文件名\n\
    for file in \"$@\"; do\n    yearmonth=$(exiftool -s3 -d '%Y-%m' -DateTimeOriginal\
    \ $file)\n    if [ $yearmonth ]; then\n        echo \"$file -> $yearmonth/\"\n\
    \        mkdir -p $yearmonth\n        mv \"$file\" $yearmonth/\n    fi\ndone\n\
    ```\n\n为了方便试用该脚本，你可以在示例文件 https://rheinwerk-computing.com/5851 中找到一个包含一些小照片的存档。\n\
    \n```\n$ ./sort-photos.sh *.jpg\n\ncimg2372.jpg -> 2007-12/\ncimg2374.jpg -> 2007-12/\n\
    ```\n\n该脚本会忽略所有没有 Exif 数据或缺少录制时间的文件，并将它们保留在原位置。为了测试此过程，`photos.zip` 包含一些特殊情况：`z-empty.jpg`\
    \ 只是一个空文件（0 字节）。`z-almost-no-metadata.jpeg` 是用 iPhone 拍摄的，然后缩小尺寸，最后使用 `exiftool\
    \ -All=` 删除了几乎所有 Exif 数据。接着，`z-gimp-metadata.jpeg` 作为截图插入到图像处理程序 Gimp 中，然后保存。因此，该文件仅包含\
    \ Gimp 为新创建图像提供的元数据。\n\n### 16.2.3 PowerShell 示例\n\nPowerShell 实现的代码看起来与 Bash\
    \ 脚本的几乎相同。最大的区别是嵌套循环。需要这个嵌套循环是因为 PowerShell 不执行 globbing，即它不会将像 *.jpg 这样的模式转换为文件名列表。你必须自己完成这一步！\n\
    \n第一个循环遍历所有参数。第二个循环对每个参数执行 `Get-Item`。对于像 `myimg.jpg` 这样的文件名，`Get-Item` 只是返回该文件。另一方面，如果传递的是一个表达式，那么\
    \ `Get-Item` 会返回匹配文件的列表。这两个循环确保了像 `.\\sort-images.ps1 *.jpg *.jpeg` 这样的调用也能被正确处理。\n\
    \n```\n# 示例文件 sort-images.ps1\n# 遍历所有参数\nforeach ($arg in $args) {\n    # 遍历 Get-Item\
    \ 的结果\n    foreach ($file in Get-Item $arg) {\n        $yearmonth = exiftool -s3\
    \ -d '%Y-%m' `\n                            -DateTimeOriginal $file\n        if\
    \ ($yearmonth) {\n            Write-Output \"$($file.Name) -> $yearmonth/\"\n\
    \            $targetdir = New-Item -ItemType Directory `\n                   \
    \               -Path $yearmonth -Force\n            Move-Item $file $targetdir\n\
    \        }\n    }\n}\n```\n\n> **速度问题**\n\n当处理“仅仅”几百张图像的排序时，本节介绍的方法已经足够好。然而，当处理数千张图像时，更有效的方法是使用\
    \ ExifTool 内置的脚本功能，这需要详细研究手册。使用 ExifTool 脚本，ExifTool 只需启动一次，而不是数千次。此功能至关重要，因为\
    \ ExifTool 使用 Perl 编程语言。每次启动 ExifTool 时，都需要加载一个复杂的 Perl 环境。通过只启动一次 ExifTool，然后在该环境中处理许多命令，可以节省大量时间。你可以在\
    \ https://exiftool.org/mistakes.html#M3 找到一个代码示例。\n\n## 16.3 将 Exif 元数据转换为 SQL\
    \ 命令\n\n下一个示例的目标是处理一个照片池，并将每张图像最重要的元数据输入数据库。其中包括名称、文件大小、"
