  md: '# 5.6.4 print and input


    When you learn Python, the `print` function is ubiquitous. You can pass one or
    more parameters to the function. `print` converts the parameters into strings
    and outputs them. A space is placed between each parameter, and a newline character,
    at the end. `print` is easy to use and works with any kind of Python object (e.g.,
    also works with lists):


    ```

    >>> print(1, 2, 3/4, ''abc'', 2==3)

    1 2 0.75 abc False

    >>> print(''1/7 ist'', 1/7)

    1/7 ist 0.14285714285714285

    >>> lst = [''a'', ''list'']

    >>> print(lst)

    [''a'', ''list'']

    ```


    `print` allows three optional parameters:


    +   - `sep` sets the string that will be output between the parameters—by default,
    that’s '' ''.

    - `end` defines the string that will be output after the last parameter—by default,
    that’s ''\n''.

    - `file` determines where the output will occur. Usually, the outputs are redirected
    to the standard output. `file` enables you to write the outputs to a text file.


    ```

    >>> print(1, 2, 3, sep=''---'')

    1---2---3

    >>> print(1, 2, 3, sep='';'', end=''.

    EOF

    '')

    1;2;3.

    EOF

    >>> f = open(''out.txt'', ''w'')

    >>> print(1, 2, 3, file=f)

    >>> f.close()

    ```


    Just as you can use `print` to perform output in a terminal window, `input` processes
    text input. `input` first outputs the text specified in the optional parameter
    and then expects input, which must be completed via Enter. Empty input—that is,
    pressing Enter without text—is acknowledged by `input` with an error.


    ```

    name = input(''Specify your name:'')

    print(''Your name is:'', name)

    ```


    `input` always returns a string. If you want to interpret the string as a number
    (for example, to perform a calculation afterwards), you must insert `int`:


    ```

    number = input(''Enter a number:'')

    print(int(number) * 2)

    ```'
