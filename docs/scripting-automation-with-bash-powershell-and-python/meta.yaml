    # The Author


    ![](img/a7fa45d496335c22ffb14c3275e24ffb_458_0.png)


    **Dr. Michael Kofler** is a programmer and Linux administrator. He studied electrical
    engineering/telematics at Graz University of Technology. He has been one of the
    most successful and versatile computing authors in the German-speaking world for
    many years. His current topics include Linux, Docker, Git, hacking and security,
    Raspberry Pi, and the programming languages Swift, Java, Python, and Kotlin. Michael
    Kofler also teaches at the Joanneum University of Applied Sciences in Kapfenberg,
    Austria.'
