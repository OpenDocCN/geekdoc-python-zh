  md: "Conversely, variables that are initialized in a function—that is, functions\
    \ that are on the left side of an assignment—are considered *local*: They can\
    \ only be used within the function. This rule also applies if a variable within\
    \ a function has the same name as a variable outside the function.\n\n```\ndef\
    \ f1():\n    y = 5\n    print(y)    # Output 5\n\nf1()\nprint(y)        # Error,\
    \ y is not defined!\n```\n\nIf you want to change a variable in a function that\
