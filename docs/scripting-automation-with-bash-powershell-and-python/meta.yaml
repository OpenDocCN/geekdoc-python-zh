    signals is received. The signals can be specified either by their names or by
    their codes. If you want to execute complex code in response to a signal, you
    should define the code in a function and specify the function name in the `trap`
    command.


    `trap` is often used to perform cleanup operations prior to a program abort triggered
    by a signal. For example, you can delete a temporary file. The simple `trap ''''
    2` command allows you to make your script ignore `Ctrl` + `C`.


