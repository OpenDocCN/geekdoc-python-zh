- md: "## 3.11.4 Parameter Analysis via case\n\nIn my own scripts, I mostly avoid\
    \ `case` and prefer more readable `if` constructs. Sometimes, however, `case`\
    \ is actually helpful. Let's consider another example: a simple analysis of parameters\
    \ (*command-line arguments*) that are passed to a script.\n\nThe `myoptions.sh`\
    \ script accepts three options (-a, -b, and -c), which can be specified in any\
    \ order. In this case, -b and -c expect one parameter each. Following the options,\
    \ any number of additional parameters can be passed. The following listing shows\
    \ two calls of the script:\n\n```\n$ ./myoptions.sh -a -b lorem -c ipsum dolores\
    \ est\nOption a\nOption b with parameter lorem\nOption c with parameter ipsum\n\
    More parameters: dolores est\n\n$ ./myoptions.sh -c lorem -b ipsum dolores\nOption\
    \ c with parameter lorem\nOption b with parameter ipsum\nMore parameters: dolores\n\
    ```\n\nTo analyze the passed options and parameters, the script uses the Bash-internal\
    \ `getopts` command, which you can use in the following way:\n\n- `getopts \"\
    abc\"` expects the options -a, -b, and -c in any order, even in combinations (i.e.,\
    \ -bc instead of -b -c).\n- `getopts \":abc\"` works as above but does not return\
    \ any error messages for invalid parameters.\n- `getopts \"ab:c:\"` with a colon\
    \ after b and c expects one parameter for each of these options. During the analysis,\
    \ the passed parameter can be read from the `$OPTARG` variable.\n- Each call analyzes\
    \ *one* option. The analysis must therefore be performed in a loop. For this example,\
    \ I used `while`. (Details on loops will follow in the next section.)\n- During\
    \ the processing of the options, `$OPTIND` references the next element of the\
    \ parameter list.\n\nProvided that the options are passed first and then the parameters,\
    \ all processed options can be removed from `$*` using `shift`. (`shift <n>` removes\
    \ the first *n* elements from `$*`. But because `$OPTIND` already references the\
    \ next element, only `$OPTIND -1` elements may be pushed out of the parameter\
    \ list.)\n\n```\n# Sample file myoptions.sh\nwhile getopts \":ab:c:\" opt; do\n\
    \    case $opt in\n        a) echo \"Option a\";;\n        b) echo \"Option b\
    \ with parameter $OPTARG\";;\n        c) echo \"Option c with parameter $OPTARG\"\
    ;;\n        ?) echo \"Invalid option\"\n            echo \"Usage: myoptions [-a]\
    \ [-b data] [-c data] [...]\"\n            exit 2\n            ;;\n    esac\n\
    done\n# remove processed options from $*\nshift $(( $OPTIND - 1 ))\necho \"More\
    \ parameters: $*\"\n```\n\n> **getopts versus getopt**\n`getopts` is a relatively\
    \ simple command that can only handle 1-letter options, but not long options like\
    \ `--search`. A more powerful alternative is the external `getopt` command, which\
    \ is mostly included in the `util-linux` package on Linux. For an example of how\
    \ to use this command and more tips on evaluating script parameters, see Stack\
    \ Overflow, specifically https://stackoverflow.com/questions/192249.\n\n## 3.12\
    \ Loops\n\nBash provides several commands to choose from for creating loops. In\
    \ this section, I'll start with `for`, before I provide a brief introduction to\
    \ `while` and `until`. The basic syntax of the `for` loop is shown in the following\
    \ listing. Note the placement of the semicolon before and not after `do`! You\
    \ can avoid this semicolon by starting a new line with `do`.\n\n```\nfor myvar\
    \ in mylist; do\n    command1\n    command2\ndone\n```\n\n```\n# equivalent\n\
    for myvar in mylist; do command1; command2; done\n```\n\n```\n# Example\nfor item\
    \ in a b c; do echo $item; done\na\nb\nc\n```\n\nThe `myvar` loop variable thus\
    \ runs through all values of the specified list. (You'll see momentarily that\
    \ \"list\" is a fairly generic term: You can use `for` to loop through parameters,\
    \ filenames, lines of a text file, etc.) Be sure you specify the name of the loop\
    \ variable after `for` without `$`! This step is consistent in that the variable\
    \ is changed at this point and not read.\n\nThe following lines contain some more\
    \ examples of use, each of which is formulated in a single line to save space.\
    \ Note that filenames can always contain spaces! You should therefore always enclose\
    \ the loop variable in quotes to ensure that the file in question is processed\
    \ correctly. A brace extension expression can also serve as a starting point for\
    \ a loop (see the third example). Note the pattern nature of the examples. As\
    \ long as you perform only a single operation, you can often do without loops\
    \ altogether in Bash.\n\n```\n# outputs all parameters passed to the script\n\
    # (command line arguments)\nfor para in $*; do echo $para; done\n```\n\n```\n\
    # copy all *.jpg files into the images directory\nfor filename in *.jpg; do cp\
    \ \"$filename\" images; done\n```\n\n```\n# creates file-00.txt to file-99.txt\n\
    for fn in file-{00..99}.txt; do touch $fn; done\n```\n\n```\n# equivalent commands\
    \ to the above three loops\necho \"$*\"\ncp *.jpg images\ntouch file-{00..99}.txt\n\
    ```\n\n```\n# loop through array elements\nmyarray=(\"item\" \"other item\" \"\
    third item\")\nfor item in \"${myarray[@]}\"; do echo $item; done\n```\n\nIn Bash,\
    \ you'll rarely need a loop that numerically traverses a range of values. However,\
    \ such loops are quite possible, as the following listing shows. Note in particular\
    \ the last example, which corresponds to the classic `for` loop of the C programming\
    \ language.\n\n```\nfor i in {1..10}; do echo $i; done\n# Output 1, 2, ..., 10\n\
    \nfor i in {01..12}; do echo $i; done\n# Output 01, 02, ..., 12\n\nfor ((i=1;\
    \ i<=10; i++)); do echo $i; done\n# Output 1, 2, ..., 10\n```\n\n### 3.12.1 Processing\
    \ Filenames with Spaces\n\nThe above `for para in $*; do ...` example processes\
    \ all parameters passed to a script. You should act with caution if filenames\
    \ may contain spaces! Let's suppose you have a file named `account names.txt`,\
    \ and you run `./myscript.sh *.txt` with the following code:\n\n```\n# processes\
    \ filenames with spaces incorrectly\nfor filename in $*; do\n  ls -l \"$filename\"\
    \ndone\n```\n\nAn error occurs twice in the process. The `ls` command does not\
    \ find the `account` or `names.txt` file. For the script, it is not recognizable\
    \ that `account names.txt` is *one* filename. The reason is that the parameters\
    \ passed in the loop are separated by default at every *whitespace* character,\
    \ which includes both whitespace and newline characters, which Bash uses to separate\
    \ filenames.\n\nTo ensure the loop is processed correctly, you must prepend the\
    \ statement `IFS=$'\\n'`. This statement means that the decomposition into words\
    \ is performed only in case of a newline character.\n\n```\n# processes filenames\
    \ with spaces correctly\nIFS=$'\\n'\nfor filename in $*; do\n  ls -l \"$filename\"\
    \ndone\n```\n\nI already introduced you to the special `IFS` variable (internal\
    \ field separator) in Section 3.9. The preceding dollar character ensures that\
    \ `\\n` is interpreted correctly.\n\n### 3.12.2 while and until\n\nThe `while`\
    \ loop is executed as long as the condition is met and uses the following structure:\n\
    \n```\nwhile condition; do\n  commands\ndone\n```\n\n```\n# Example (output: 1,\
    \ 2, 3, 4, 5)\ni=1\nwhile [ $i -le 5 ]; do\n    echo $i\n    (( $i++ ))\ndone\n\
    ```\n\nwhile loops can be excellently combined with an input redirection or with\
    \ the pipe command through the following structure:\n\n```\n# Read file line by\
    \ line\nwhile read filename; do\n    echo \"$filename\"\ndone < files.txt\n```\n\
    \n```\n# Process files\nls *.jpg | while read filename; do\n    echo \"$filename\"\
    \ndone\n```\n\nuntil loops work similarly to while loops. The difference is that\
    \ the loop continues as long as the condition is *not* met:\n\n```\n# Output:\
    \ 1, 2\ni=1\nuntil [ $i -eq 3 ]; do\n    echo $i\n    (( i++ ))\ndone\n```\n\n\
    > **break and continue**\nThe `break` and `continue` keywords work in Bash as\
    \ they do in most programming languages: Using `break`, you can abort the execution\
    \ of a loop prematurely. For nested loops, `break n` specifies how many loop levels\
    \ are to be terminated.\n`continue` skips the remaining commands in the loop block,\
    \ but then continues the loop.\n\n### 3.12.3 Loops over Text Files\n\nA common\
    \ scenario involves text files that are supposed to be processed. In Bash, two\
    \ commonly used procedures for this purpose exist, but they are not exactly equivalent.\n\
    The following `while` loop reads one line from `access.log` with each loop pass.\
    \ Note how this text file is used as default input for the entire loop construct\
    \ due to the redirect character `<` with `done`!"
  mdcn: "## 3.11.4 通过 case 进行参数分析\n\n在我自己的脚本中，我通常避免使用 `case`，而更倾向于使用可读性更强的 `if` 结构。然而，有时\
    \ `case` 实际上很有帮助。让我们考虑另一个例子：对传递给脚本的参数（*命令行参数*）进行简单分析。\n\n`myoptions.sh` 脚本接受三个选项（-a、-b\
    \ 和 -c），这些选项可以按任何顺序指定。在这种情况下，-b 和 -c 各自需要一个参数。在选项之后，可以传递任意数量的附加参数。以下清单展示了该脚本的两次调用：\n\
    \n```\n$ ./myoptions.sh -a -b lorem -c ipsum dolores est\nOption a\nOption b with\
    \ parameter lorem\nOption c with parameter ipsum\nMore parameters: dolores est\n\
    \n$ ./myoptions.sh -c lorem -b ipsum dolores\nOption c with parameter lorem\n\
    Option b with parameter ipsum\nMore parameters: dolores\n```\n\n为了分析传递的选项和参数，该脚本使用了\
    \ Bash 内置的 `getopts` 命令，你可以按以下方式使用：\n\n- `getopts \"abc\"` 期望按任何顺序接收选项 -a、-b 和\
    \ -c，甚至可以组合使用（即，-bc 而不是 -b -c）。\n- `getopts \":abc\"` 的工作方式与上述相同，但不会为无效参数返回任何错误消息。\n\
    - `getopts \"ab:c:\"` 在 b 和 c 后面带有冒号，期望这些选项各有一个参数。在分析期间，可以从 `$OPTARG` 变量中读取传递的参数。\n\
    - 每次调用分析*一个*选项。因此，分析必须在循环中执行。对于这个例子，我使用了 `while`。（关于循环的详细信息将在下一节中介绍。）\n- 在处理选项期间，`$OPTIND`\
    \ 引用参数列表中的下一个元素。\n\n假设选项首先传递，然后是参数，所有已处理的选项都可以使用 `shift` 从 `$*` 中移除。（`shift <n>`\
    \ 从 `$*` 中移除前 *n* 个元素。但由于 `$OPTIND` 已经引用了下一个元素，因此只能从参数列表中移除 `$OPTIND -1` 个元素。）\n\
    \n```\n# 示例文件 myoptions.sh\nwhile getopts \":ab:c:\" opt; do\n    case $opt in\n\
    \        a) echo \"Option a\";;\n        b) echo \"Option b with parameter $OPTARG\"\
    ;;\n        c) echo \"Option c with parameter $OPTARG\";;\n        ?) echo \"\
    Invalid option\"\n            echo \"Usage: myoptions [-a] [-b data] [-c data]\
    \ [...]\"\n            exit 2\n            ;;\n    esac\ndone\n# 从 $* 中移除已处理的选项\n\
    shift $(( $OPTIND - 1 ))\necho \"More parameters: $*\"\n```\n\n> **getopts 与 getopt**\n\
    `getopts` 是一个相对简单的命令，只能处理单字母选项，而不能处理像 `--search` 这样的长选项。一个更强大的替代方案是外部 `getopt`\
    \ 命令，它通常包含在 Linux 的 `util-linux` 软件包中。有关如何使用此命令的示例以及更多关于评估脚本参数的提示，请参阅 Stack Overflow，特别是\
    \ https://stackoverflow.com/questions/192249。\n\n## 3.12 循环\n\nBash 提供了多种命令供选择以创建循环。在本节中，我将从\
    \ `for` 开始，然后简要介绍 `while` 和 `until`。`for` 循环的基本语法如下所示。注意分号放在 `do` 之前而不是之后！你可以通过在新行以\
    \ `do` 开头来避免这个分号。\n\n```\nfor myvar in mylist; do\n    command1\n    command2\n\
    done\n```\n\n```\n# 等效写法\nfor myvar in mylist; do command1; command2; done\n```\n\
    \n```\n# 示例\nfor item in a b c; do echo $item; done\na\nb\nc\n```\n\n因此，循环变量 `myvar`\
    \ 会遍历指定列表的所有值。（你很快会看到“列表”是一个相当通用的术语：你可以使用 `for` 来遍历参数、文件名、文本文件的行等。）请确保在 `for`\
    \ 之后指定循环变量的名称，不要带 `$`！这一步是一致的，因为变量在此处被修改而不是被读取。\n\n以下行包含更多使用示例，每个示例都以单行形式编写以节省空间。请注意，文件名可能始终包含空格！因此，你应始终将循环变量用引号括起来，以确保正确处理相关文件。花括号扩展表达式也可以用作循环的起点（参见第三个示例）。注意示例的模式性质。只要你只执行单个操作，在\
    \ Bash 中通常可以完全不用循环。\n\n```\n# 输出传递给脚本的所有参数\n# （命令行参数）\nfor para in $*; do echo\
    \ $para; done\n```\n\n```\n# 将所有 *.jpg 文件复制到 images 目录\nfor filename in *.jpg;\
    \ do cp \"$filename\" images; done\n```\n\n```\n# 创建 file-00.txt 到 file-99.txt\n\
    for fn in file-{00..99}.txt; do touch $fn; done\n```\n\n```\n# 与上述三个循环等效的命令\n\
    echo \"$*\"\ncp *.jpg images\ntouch file-{00..99}.txt\n```\n\n```\n# 遍历数组元素\n\
    myarray=(\"item\" \"other item\" \"third item\")\nfor item in \"${myarray[@]}\"\
    ; do echo $item; done\n```\n\n在 Bash 中，你很少需要一个数值遍历值范围的循环。然而，这样的循环是完全可能的，如下所示。特别注意最后一个示例，它对应于\
    \ C 编程语言的经典 `for` 循环。\n\n```\nfor i in {1..10}; do echo $i; done\n# 输出 1, 2, ...,\
    \ 10\n\nfor i in {01..12}; do echo $i; done\n# 输出 01, 02, ..., 12\n\nfor ((i=1;\
    \ i<=10; i++)); do echo $i; done\n# 输出 1, 2, ..., 10\n```\n\n### 3.12.1 处理带空格的文件名\n\
    \n上面的 `for para in $*; do ...` 示例处理了传递给脚本的所有参数。如果文件名可能包含空格，你应该谨慎行事！假设你有一个名为 `account\
    \ names.txt` 的文件，并且你使用以下代码运行 `./myscript.sh *.txt`：\n\n```\n# 错误地处理带空格的文件名\nfor\
    \ filename in $*; do\n  ls -l \"$filename\"\ndone\n```\n\n在此过程中会发生两次错误。`ls` 命令找不到\
    \ `account` 或 `names.txt` 文件。对于脚本来说，无法识别 `account names.txt` 是*一个*文件名。原因是循环中传递的参数默认在每个*空白*字符处分隔，这包括空格和换行符，Bash\
    \ 使用它们来分隔文件名。\n\n为确保循环正确处理，你必须在语句前加上 `IFS=$'\\n'`。此语句意味着仅在遇到换行符时才进行分词。\n\n```\n\
    # 正确地处理带空格的文件名\nIFS=$'\\n'\nfor filename in $*; do\n  ls -l \"$filename\"\ndone\n\
    ```\n\n我在第 3.9 节中已经向你介绍了特殊的 `IFS` 变量（内部字段分隔符）。前面的美元字符确保 `\\n` 被正确解释。\n\n### 3.12.2\
    \ while 和 until\n\n`while` 循环在条件满足时执行，并使用以下结构：\n\n```\nwhile condition; do\n \
    \ commands\ndone\n```\n\n```\n# 示例（输出：1, 2, 3, 4, 5）\ni=1\nwhile [ $i -le 5 ];\
    \ do\n    echo $i\n    (( $i++ ))\ndone\n```\n\nwhile 循环可以与输入重定向或通过以下结构与管道命令很好地结合：\n\
    \n```\n# 逐行读取文件\nwhile read filename; do\n    echo \"$filename\"\ndone < files.txt\n\
    ```\n\n```\n# 处理文件\nls *.jpg | while read filename; do\n    echo \"$filename\"\
    \ndone\n```\n\nuntil 循环的工作方式类似于 while 循环。区别在于，只要条件*不*满足，循环就会继续：\n\n```\n# 输出：1,\
    \ 2\ni=1\nuntil [ $i -eq 3 ]; do\n    echo $i\n    (( i++ ))\ndone\n```\n\n> **break\
    \ 和 continue**\n`break` 和 `continue` 关键字在 Bash 中的工作方式与在大多数编程语言中相同：使用 `break`，你可以提前终止循环的执行。对于嵌套循环，`break\
    \ n` 指定要终止多少层循环。\n`continue` 跳过循环块中剩余的命令，但随后继续循环。\n\n### 3.12.3 遍历文本文件\n\n一个常见的场景涉及需要处理的文本文件。在\
    \ Bash 中，为此目的存在两种常用的过程，但它们并不完全等效。\n以下 `while` 循环在每次循环中从 `access.log` 读取一行。注意由于重定向字符\
    \ `<` 与 `done` 一起使用，此文本文件如何被用作整个循环构造的默认输入！"
