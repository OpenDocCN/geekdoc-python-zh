    # 4.6.3 Strings


    For many scripts, strings are more important than numbers. Like most other shells,
    PowerShell distinguishes between two ways of expressing strings. If you formulate
    strings in simple quotation marks, the content will be taken over unchanged. If,
    on the other hand, you use double quotation marks, then variables named within
    the string will be replaced by their contents. In other words, a *variable substitution*
    is performed. Consider the following examples:


    ```

    > $A = "abc"

    > $B = "efg $A"

    > $C = ''efg $A''

    > $A, $B, $C


    abc

    efg abc

    efg $A

    ```


    If the variable name cannot be clearly delimited, you must enclose it in curly
    brackets:


    ```

    > Write-Output "${A}${B}"

    abcefg abc

    ```


    Multiline strings or strings that themselves contain the characters " and '' are
    best assembled as *herestrings*. Such strings start with `@"` or `@''` and end
    with `"@` or `''@`, depending on whether you want to use variable substitution
    or not. The start codes and end codes must each be on separate lines:'
