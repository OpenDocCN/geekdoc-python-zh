    \ PM An account has been successfully registered.\n01/30/2023 03:13:48 PM A new\
    \ login has been ...\n```\n\n# 7.6 Processing cmdlet Results\n\ncmdlets return\
    \ objects, not just text. The text displayed in the terminal is created because\
    \ PowerShell converts the objects into text by default. To achieve better readability,\
    \ many details are removed in the process.\n\nOne of the most basic PowerShell\
    \ tasks is to pass results to a second cmdlet using the pipe operator. This allows\
    \ you to filter, process, or format the data in a variety of ways. You have already\
    \ seen some cmdlets for this purpose, such as Select-Object or ForEach-Item. This\
    \ section summarizes the basic functions of these frequently needed cmdlets."
