  md: '# 3.11.2 Conditions


    While the if syntax is simple, formulating conditions is already considerably
    more difficult. Bash provides several variants for this task, which are summarized
    in the following listing. I''ll explain these concepts later. A preceding exclamation
    mark negates a condition.


    ```

    x=5

    test "$x" -gt 3  && echo "true"   # -> true

    test "$x" -eq 2  && echo "true"   # (no output)

    [ "$x" -gt 3 ]   && echo "true"   # -> true

    [[ "$x" -gt 3 ]] && echo "true"   # -> true

    (( x > 3 ))      && echo "true"   # -> true

    ! (( x > 3 ))    && echo "true"   # (no output)

    ```


    > **Put Variables in Quotation Marks!**

    `test $x -gt 3` is syntactically correct, but only as long as the variable is
    not empty. If `$x` has no content, the result is `test -gt 3`. This statement
    is nonsensical and results in a syntax error. That''s why you should get in the
    habit of always putting variables for comparisons in quotation marks!


    In the most original form, the `test` command is used. It processes one or more
    parameters, where the condition is expressed with options. `-gt` stands for *greater
    than*, `-eq` for *equals*. You may wonder why `test $x > 5` does not work. This
    has to do with the fact that the `>` and `<` characters are reserved for input
    and output redirection.


    Instead of `test condition`, the short notation `[ condition ]` exists (see Table
    3.9). It is important that spaces must be placed before and after the square brackets!
    Note also that the comparison operators depend on the data type: `-eq` compares
    numbers, `=` compares strings. If variables occur in the test expression, their
    names must be prefixed with `$`. `dat` refers to strings with filenames.


    | Test Expression | Meaning |

    | :--- | :--- |

    | `[ var ]` | True if the variable is not empty |

    | `[ -n var ]` | As above |

    | `[ zk1 = zk2 ]` | True if the strings match |

    | `[ z1 -eq z2 ]` | If the numbers are equal (*equal*) |

    | `[ z1 -ne z2 ]` | If the numbers are not equal (*not equal*) |

    | `[ z1 -gt z2 ]` | If z1 is greater than z2 (*greater than*) |


    Table 3.9 The Most Important Syntax Variants for Formulating Conditions Using
    [ ]'
