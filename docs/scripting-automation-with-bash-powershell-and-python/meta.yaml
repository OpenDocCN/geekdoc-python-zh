    also start Python interactively there and use all modules that have been installed
    using `pipenv`. If you don''t need the shell anymore, you can exit it via `Ctrl`
    + `D` or `exit`.


    The biggest advantage using of `pipenv` is that it sets up a `pipfile` in your
    project directory. This file summarizes which modules are used by your project:


    ```

    # File Pipfile (shortened)

    ...

    [packages]

    beautifulsoup4 = "*"

    requests = "*"


    [requires]

    python_version = "3.10"

    ```


    Now, to port your script to another computer, you can copy the code and the `pipfile`
    there and run `pipenv install` once without any further parameters. This step
    will install all the required modules. Done!


    `pipenv` uses `virtualenv`, a Python tool for setting up several separate Python
    environments on one computer. `virtualenv` provides more features than `pipenv`
    but is a bit more difficult to use (see [https://virtualenv.pypa.io](https://virtualenv.pypa.io)).
    For our tasks, `pipenv` is usually sufficient. Other alternatives to Python project
    management are the built-in Python functions of the `venv` module (a minimal version
    of `virtualenv`) and `pip-tools`.


    > **Disadvantages and Limitations**

    `pipenv` is not without controversy. One problem is that modules are installed
    separately for each project. With extensive modules like Matplotlib or Pandas,
    this separation costs space, which is unnecessary. Also, the execution of scripts
    via `pipenv run` is a bit more cumbersome.


    Chris Warrick lists other shortcomings in his blog at [https://chriswarrick.com/blog/2018/07/17/pipenv-promises-a-lot-delivers-very-little](https://chriswarrick.com/blog/2018/07/17/pipenv-promises-a-lot-delivers-very-little).
    His fundamental critique is well founded, but no longer up to date on all points.
    In particular, the speed problems of `pipenv` have now been fixed.'
- md: "# PART II\n\n# Work Techniques and Tools\n\n# Chapter 6\n## Linux Toolbox\n\
    \nBefore you develop your own Bash scripts using Bash, you need a basic vocabulary\
    \ of elementary commands. You can then use these commands to create files, copy\
    \ or delete directories, create compressed archives, install additional commands,\
    \ switch to root mode, and so on. The commands can be used both interactively\
    \ in a terminal and automatically in scripts.\n\nThis chapter is a kind of crash\
    \ course for Linux newbies. If you have already worked frequently in the Linux\
    \ terminal, you can safely skip this chapter.\n\nMost of this chapter also applies\
    \ to macOS. Although macOS is not based on Linux, but on BSD (another Unix derivative),\
    \ basic commands like `cp` or `mkdir` work in the same way as on Linux. Unfortunately,\
    \ there are occasional functional deviations in the individual options, which\
    \ can result in compatibility issues if you want your scripts to run on both platforms.\n\
    \nMany of the commands presented in this chapter even work on Windows! However,\
    \ this functionality requires you to use Git Bash. This shell is usually installed\
    \ together with Git; see also [Chapter 14](#).\n\n> **Prerequisites for This Chapter**\n\
    \nYou can use Linux commands even without prior knowledge of Bash. But before\
    \ you can call these commands in your own scripts, you must have some basic knowledge\
    \ of Bash programming (see [Chapter 3](#)).\n\n> **A Little Advertising**\n\n\
    An even remotely complete reference of all important Linux commands is impossible\
    \ at this point. However, as a small self-promotion, you can find most everything\
    \ you need to know in my book *Linux: The Comprehensive Guide* (Rheinwerk Computing,\
    \ May 2024) at https://rheinwerk-computing.com/5779.\n\n### 6.1 Directories and\
    \ Files\n\nDealing with directories is simple: You can change directories using\
    \ the `cd` command. If you do not pass a parameter to `cd`, you'll be taken to\
    \ your home directory. The `cd ..` command takes you to the *parent directory*,\
    \ while `cd -` allows you to go to the last active directory.\n\n`pwd` displays\
    \ the path of the current directory, and `mkdir` creates a new directory. A particularly\
    \ useful option for `mkdir` is `-p` which allows you to create an entire chain\
    \ of directories, for example, `mkdir -p dir/subdir/subsubdir`. The option also\
    \ avoids error messages if directories already exist.\n\n`rmdir` deletes a directory,\
    \ but only if the directory is empty. You can delete directories including their\
    \ contents via `rm -r`, but you should be careful with it! This command works\
    \ recursively and also deletes all subdirectories. In general, the deletion of\
    \ files and directories cannot be undone!\n\n```\n$ cd                    # change\
    \ to the home directory\n$ pwd\n/home/kofler\n$ mkdir subdir          # create\
    \ new directory\n$ cd subdir             # change there\n$ cd ..             \
    \    # back to the home directory\n$ rmdir subdir          # delete subdir again\n\
    ```\n\nLinux beginners must first learn to orient themselves in the branched directory\
    \ tree. Note that you need root privileges to modify system files (for example,\
    \ in the `/etc` directory). See [Section 6.4](#section-6.4) for more information\
    \ on this topic.\n\n| Directory | Contents |\n| :--- | :--- |\n| `/boot` | System\
    \ files for the boot process |\n| `/dev` | Device files for hardware components\
    \ |\n| `/etc` | System settings |\n| `/home` | User directories |\n| `/mnt` |\
    \ External file systems and data carriers |\n| `/proc` | Process information (virtual\
    \ file system) |\n| `/usr` | Programs and libraries |\n| `/tmp` | Temporary files\
    \ (lost on reboot) |\n| `/var` | Variable data (web files, databases, mail server\
    \ log files) |\n\n**Table 6.1** Important Linux Directories\n\n### 6.1.1 Listing,\
    \ Copying, Moving, and Deleting Files\n\n`ls` lists files. When you add the `-l`\
    \ option, the command displays a lot of additional information besides the filename,\
    \ such as the size in bytes and the time of the last change. With the `-a` option,\
    \ `ls` also takes into account so-called “hidden” directories and files whose\
    \ name simply starts with a dot (for example `.ssh` with the configuration files\
    \ of the `ssh` command).\n\n`touch` creates a new empty file. If the file already\
    \ exists, only the time of the last change will be updated.\n\nThe `cp old new`\
    \ command copies one file. `cp file1 file2 file3 dir` copies multiple files to\
    \ another directory. When used as in `cp -r olddir newdir`, the command copies\
    \ an entire directory tree (`r` as in *recursive*). `cp -a olddir newdir` serves\
    \ the same purpose but leaves the access rights and the time of the last change\
    \ unchanged.\n\n`mv` works similar to `cp`: `mv old new` renames the file. `mv\
    \ file1 file2 dir` moves the files to a new location.\n\n`rm` irrevocably deletes\
    \ the specified files. With the already mentioned `-r` option, the command works\
    \ recursively, so it also deletes subdirectories and their contents. Proceed with\
    \ caution!\n\n```\n$ mkdir tst            # creates a new directory\n$ cd tst\
    \               # changes there\n$ date > now.txt       # saves date and time\
    \ in now.txt\n$ cp now.txt copy.txt  # creates a copy of now.txt\n$ mv copy.txt\
    \ backup.txt # gives the copy a different name\n$ ls *.txt             # lists\
    \ all *.txt files\n  backup.txt now.txt\n$ rm *.txt             # deletes all\
    \ *.txt files\n```\n\n### 6.2 Finding Files\n\nYou can use `find` to search a\
    \ directory including all subdirectories for files that have certain characteristics.\
    \ Possible search criteria include the name, the file size or the date of the\
    \ last modification. However, `find` never includes the content of the file.\n\
    \nYou need to pass the initial directory for the search to the command (or `.`\
    \ for the current directory). The search criteria are formulated with countless\
    \ options, whereby all criteria must apply simultaneously (logical AND operation).\
    \ The following examples are merely a small indication of the capabilities of\
    \ `find`. You can get much more information via `man find`. Some `find` commands\
    \ are preceded by `sudo`, which will run the search in root mode (Section 6.4).\
    \ This addition is necessary because, as an ordinary user, you’re not even allowed\
    \ to read a large number of files in the `/var` and `/etc` directories.\n\n```\n\
    # files in /var/log that are larger than 250 KB\n$ sudo find /var/log -size +250k\n\
    \n# files in /etc that have been modified in the last 28 days\n# mtime = modify\
    \ time\n$ sudo find /etc -mtime -28\n\n# all subdirectories in /etc (-type d =\
    \ directory)\n$ sudo find /etc -type d\n\n# PDF files in downloads that are larger\
    \ than 1 MB\n# and have not been read for at least 60 days\n# (atime = access\
    \ time)\n$ find Downloads -name '*.pdf' -size +1M -atime +60\n```\n\n### 6.2.1\
    \ Text Search Using grep\n\nThe command `grep pattern file.txt` filters out all\
    \ lines from a text file that match the search pattern `pattern`. In the following\
    \ example, all lines containing a specific IP address are to be filtered out of\
    \ a logging file from the Apache web server. Because the search pattern is processed\
    \ as a regular expression (see Chapter 9), the period (.) character must be marked\
    \ by a backslash. (In regular expressions, a period is a placeholder for any character.)\n\
    \n```\n$ sudo grep '175\\.55\\.93\\.123' /var/log/apache2/access.log\n```\n\n\
    > **Text Evaluation and Analysis**\nI will discuss `grep` in much more detail\
    \ in this book with regard to its function as a filter command (see Chapter 8,\
    \ Section 8.1). In this chapter, I want to introduce you to other commands for\
    \ text evaluation, including `wc` (word count), `head` and `tail` (display the\
    \ first/last lines of a text), `sort` (sort text), and `uniq` (remove doubles).\n\
    \nWith a few options, the `grep` filter command becomes a powerful search tool.\
    \ The following command searches the `/etc` directory recursively (`-r`) for files\
    \ that contain the search term `password` in uppercase or lowercase (`-i`). The\
    \ resulting files will be output in a list (`-l`).\n\n```\n$ sudo grep -r -i -l\
    \ password /etc\n```\n\n### 6.3 Compressing and Archiving Files\n\nTo compress\
    \ a single file, the easiest approach is to use `gzip`. This command renames the\
    \ file immediately (i.e., `name` becomes `name.gz`). To unpack the file again,\
    \ you must use `gunzip`. The extension `.gz` will be removed again."
  mdcn: "# 第二部分\n\n# 工作技巧与工具\n\n# 第6章\n## Linux 工具箱\n\n在使用 Bash 开发自己的 Bash 脚本之前，你需要掌握一些基本命令的基础词汇。然后，你可以使用这些命令来创建文件、复制或删除目录、创建压缩归档、安装额外的命令、切换到\
    \ root 模式等等。这些命令既可以在终端中交互式使用，也可以在脚本中自动执行。\n\n本章是针对 Linux 新手的速成课程。如果你已经经常在 Linux\
    \ 终端中工作，可以放心地跳过本章。\n\n本章的大部分内容也适用于 macOS。尽管 macOS 不是基于 Linux，而是基于 BSD（另一种 Unix\
    \ 衍生系统），但像 `cp` 或 `mkdir` 这样的基本命令的工作方式与 Linux 相同。不幸的是，各个选项的功能偶尔会有偏差，如果你希望脚本能在两个平台上运行，这可能会导致兼容性问题。\n\
    \n本章介绍的许多命令甚至可以在 Windows 上运行！不过，此功能需要你使用 Git Bash。这个 shell 通常与 Git 一起安装；另见[第14章](#)。\n\
    \n> **本章的先决条件**\n\n即使没有 Bash 的先验知识，你也可以使用 Linux 命令。但在你能在自己的脚本中调用这些命令之前，你必须具备一些\
    \ Bash 编程的基础知识（参见[第3章](#)）。\n\n> **一点小广告**\n\n在此处提供所有重要 Linux 命令的完整参考是不可能的。不过，作为一点小小的自我宣传，你可以在我的书《Linux：综合指南》（Rheinwerk\
    \ Computing，2024年5月）中找到你需要知道的大部分内容，网址是 https://rheinwerk-computing.com/5779。\n\
    \n### 6.1 目录和文件\n\n处理目录很简单：你可以使用 `cd` 命令更改目录。如果未向 `cd` 传递参数，你将被带到主目录。`cd ..` 命令将你带到*父目录*，而\
    \ `cd -` 允许你返回到上一个活动目录。\n\n`pwd` 显示当前目录的路径，`mkdir` 创建一个新目录。`mkdir` 的一个特别有用的选项是\
    \ `-p`，它允许你创建整个目录链，例如，`mkdir -p dir/subdir/subsubdir`。如果目录已存在，此选项还可以避免错误消息。\n\n\
    `rmdir` 删除一个目录，但仅当目录为空时。你可以通过 `rm -r` 删除目录及其内容，但你应该小心使用！此命令递归工作，也会删除所有子目录。通常，文件和目录的删除是无法撤销的！\n\
    \n```\n$ cd                    # 切换到主目录\n$ pwd\n/home/kofler\n$ mkdir subdir \
    \         # 创建新目录\n$ cd subdir             # 切换到那里\n$ cd ..                 #\
    \ 返回主目录\n$ rmdir subdir          # 再次删除 subdir\n```\n\nLinux 初学者必须首先学会在分支的目录树中定位自己。请注意，你需要\
    \ root 权限才能修改系统文件（例如，在 `/etc` 目录中）。有关此主题的更多信息，请参见[第6.4节](#section-6.4)。\n\n| 目录\
    \ | 内容 |\n| :--- | :--- |\n| `/boot` | 启动过程的系统文件 |\n| `/dev` | 硬件组件的设备文件 |\n|\
    \ `/etc` | 系统设置 |\n| `/home` | 用户目录 |\n| `/mnt` | 外部文件系统和数据载体 |\n| `/proc` | 进程信息（虚拟文件系统）\
    \ |\n| `/usr` | 程序和库 |\n| `/tmp` | 临时文件（重启后丢失） |\n| `/var` | 可变数据（Web 文件、数据库、邮件服务器日志文件）\
    \ |\n\n**表 6.1** 重要的 Linux 目录\n\n### 6.1.1 列出、复制、移动和删除文件\n\n`ls` 列出文件。当你添加 `-l`\
    \ 选项时，该命令除了文件名外还显示许多附加信息，例如以字节为单位的大小和最后修改时间。使用 `-a` 选项时，`ls` 还会考虑所谓的“隐藏”目录和文件，这些文件的名称以点开头（例如，包含\
    \ `ssh` 命令配置文件的 `.ssh`）。\n\n`touch` 创建一个新的空文件。如果文件已存在，则仅更新最后修改时间。\n\n`cp old new`\
    \ 命令复制一个文件。`cp file1 file2 file3 dir` 将多个文件复制到另一个目录。当用作 `cp -r olddir newdir`\
    \ 时，该命令复制整个目录树（`r` 代表 *递归*）。`cp -a olddir newdir` 用于相同目的，但保持访问权限和最后修改时间不变。\n\n\
    `mv` 的工作方式类似于 `cp`：`mv old new` 重命名文件。`mv file1 file2 dir` 将文件移动到新位置。\n\n`rm`\
    \ 不可撤销地删除指定的文件。使用前面提到的 `-r` 选项，该命令递归工作，因此它也会删除子目录及其内容。请谨慎操作！\n\n```\n$ mkdir tst\
    \            # 创建一个新目录\n$ cd tst               # 切换到那里\n$ date > now.txt     \
    \  # 将日期和时间保存到 now.txt\n$ cp now.txt copy.txt  # 创建 now.txt 的副本\n$ mv copy.txt\
    \ backup.txt # 为副本赋予不同的名称\n$ ls *.txt             # 列出所有 *.txt 文件\n  backup.txt\
    \ now.txt\n$ rm *.txt             # 删除所有 *.txt 文件\n```\n\n### 6.2 查找文件\n\n你可以使用\
    \ `find` 搜索一个目录及其所有子目录，以查找具有某些特征的文件。可能的搜索条件包括名称、文件大小或最后修改日期。但是，`find` 从不包含文件的内容。\n\
    \n你需要将搜索的起始目录传递给命令（或使用 `.` 表示当前目录）。搜索条件通过无数选项来制定，其中所有条件必须同时满足（逻辑与运算）。以下示例仅是对 `find`\
    \ 功能的一小部分提示。你可以通过 `man find` 获取更多信息。一些 `find` 命令前有 `sudo`，这将以 root 模式运行搜索（第6.4节）。需要此添加，因为作为普通用户，你甚至不允许读取\
    \ `/var` 和 `/etc` 目录中的大量文件。\n\n```\n# /var/log 中大于 250 KB 的文件\n$ sudo find /var/log\
    \ -size +250k\n\n# /etc 中在过去 28 天内修改过的文件\n# mtime = 修改时间\n$ sudo find /etc -mtime\
    \ -28\n\n# /etc 中的所有子目录（-type d = 目录）\n$ sudo find /etc -type d\n\n# downloads\
    \ 中大于 1 MB 的 PDF 文件\n# 并且至少 60 天未被读取\n# （atime = 访问时间）\n$ find Downloads -name\
    \ '*.pdf' -size +1M -atime +60\n```\n\n### 6.2.1 使用 grep 进行文本搜索\n\n命令 `grep pattern\
    \ file.txt` 从文本文件中过滤出所有与搜索模式 `pattern` 匹配的行。在下面的示例中，需要从 Apache Web 服务器的日志文件中过滤出包含特定\
    \ IP 地址的所有行。因为搜索模式作为正则表达式处理（参见第9章），所以句点（.）字符必须用反斜杠标记。（在正则表达式中，句点是任何字符的占位符。）\n\n\
    ```\n$ sudo grep '175\\.55\\.93\\.123' /var/log/apache2/access.log\n```\n\n> **文本评估与分析**\n\
    我将在本书中更详细地讨论 `grep` 作为过滤命令的功能（参见第8章，第8.1节）。在本章中，我想向你介绍其他用于文本评估的命令，包括 `wc`（字数统计）、`head`\
    \ 和 `tail`（显示文本的前几行/后几行）、`sort`（排序文本）和 `uniq`（去除重复项）。\n\n通过一些选项，`grep` 过滤命令变成了一个强大的搜索工具。以下命令递归搜索（`-r`）`/etc`\
    \ 目录，查找包含搜索词 `password`（不区分大小写，`-i`）的文件。结果文件将以列表形式输出（`-l`）。\n\n```\n$ sudo grep\
    \ -r -i -l password /etc\n```\n\n### 6.3 压缩和归档文件\n\n要压缩单个文件，最简单的方法是使用 `gzip`。此命令会立即重命名文件（即，`name`\
    \ 变为 `name.gz`）。要再次解压缩文件，你必须使用 `gunzip`。扩展名 `.gz` 将被再次移除。"
