    # 7.9 Standard Aliases


    Compared to Linux, where the names of important commands are rarely longer than
    4 characters, the names of frequently needed cmdlets are often rather verbose.
    However, shortcuts for frequently used commands are available for PowerShell professionals.


    | Alias | cmdlet | Alias | cmdlet |

    |---|---|---|---|

    | ? | Where-Object | measure | Measure-Object |

    | % | ForEach-Object | mv | Move-Item |

    | cat | Get-Content | ni | New-Item |

    | cd | Set-Location | oh | Out-Host |

    | cpi | Copy-Item | ps | Get-Process |

    | curl | Invoke-WebRequest | pwd | Get-Location |

    | del | Remove-Item | rm | Remove-Item |

    | dir | Get-ChildItem | select | Select-Object |

    | echo | Write-Output | sleep | Start-Sleep |

    | ft | Format-Table | sls | Select-String |

    | gci | Get-ChildItem | sort | Sort-Object |

    | gm | Get-Member | tee | Tee-Object |

    | ls | Get-ChildItem | write | Write-Output |

    | md | mkdir | | |


    **Table 7.1** Aliases of the Most Important cmdlets and Functions


    Many aliases are simply derived from the first letters of the verb and the noun
    of the cmdlet, such as `mi` for `Move-Item`. Other aliases like `cat`, `dir`,
    or `ls` correspond to common DOS and Linux commands.


    You can define your own aliases using `Set-Alias` and save these custom aliases
    permanently in `Documents/profile.ps1`. A complete reference of all currently
    defined aliases is provided by the `Get-Alias` command.'
