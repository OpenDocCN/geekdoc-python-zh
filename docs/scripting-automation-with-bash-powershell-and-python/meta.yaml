  md: "# 13.2 Language-Specific VS Code Extensions\n\nAs soon as you edit a PowerShell\
    \ or Python file in VS Code for the first time, the editor asks you whether it\
    \ should install the corresponding extension(s). You should always follow this\
    \ recommendation! VS Code then performs syntax highlighting, completes keywords,\
    \ indents your code correctly, and helps test and debug your scripts.\n\n# 13.2.1\
    \ PowerShell Extension\n\nThe most interesting features of the PowerShell extension\
    \ include the following:\n\n+   - **Run button**\n  The toolbar of VS Code contains\
    \ two **Run** buttons. One of them runs your script, while the other button runs\
    \ only the previously marked lines of code.\n- **Navigation**\n  By pressing `Ctrl`\
    \ while clicking, you can navigate directly to the definition of the variable\
    \ or function under the mouse cursor.\n- **PSScriptAnalyzer**\n  This tool analyzes\
