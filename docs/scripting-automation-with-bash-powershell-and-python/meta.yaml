    \n> **正则表达式**\n第一个参数中传递的搜索词被作为正则表达式进行求值。只要你查找的是普通文本，这并不重要。但是，如果你的搜索词包含特殊字符，你必须注意并用\
    \ `\\` 为特殊字符添加前缀。例如，你会使用 `help\\.com` 来搜索 `help.com`。你将在[第9章](#)中学习什么是正则表达式及其在一般情况下以及专门针对\
    \ `grep` 的应用。\n\n## 8.1.2 wc\n\n`wc`（*word count*，字数统计）统计文件的行数、单词数和字符数，例如：\n\n\
    ```\n$ wc employees.txt\n\n501  2628 61102 employees.txt\n```\n\n`wc` 可以与其他命令很好地链接。例如，有多少女性员工居住在科罗拉多州（缩写\
    \ CO）？\n\n```\n$ grep ';CO;' employees.txt | grep ';F;' | wc -l\n4\n```\n\n第一个\
    \ `grep` 命令返回所有科罗拉多州的行。它们没有被输出，而是通过管道操作符传递给第二个 `grep`。第二个 `grep` 从中间结果中过滤出女性（性别\
    \ F）。然后 `wc -l` 只需要统计结果行数。\n\n## 8.1.3 cut\n\ncut（不要与 cat 混淆！）从文本中剪切列。对于大多数应用，了解以下三个选项通常就足够了：\n\
    \n- `-d` 指定分隔符字符。默认设置是制表符。特殊字符通常需要用 `\\` “引用”或放在引号中——例如 `-d\\ ;` 或 `-d ';'`。\n\
    - `-f` 选择所需的列。例如，`-f 1,4` 提取第一列和第四列，`-f 4-7` 提取第四到第七列。\n- `-s` 忽略分隔符未出现的行。\n\n\
    如果你想只查看员工的姓名和电子邮件地址，可以使用以下命令：\n\n```\n$ cut -d ';' -f 1,2,9 employees.txt\n\n\
    FirstName;LastName;Email\nRuthanne;Ferguson;ruthanne_ferguson5693@fastmail.cn\n\
    Lorie;Warner;lorie7961@mailforce.net\nKerri;Tsioupra;kerri2377@emailuser.net\n\
    ...\n```\n\n接下来的两个命令识别纽约州员工的电子邮件地址。首先，地址显示在终端中，借助 `less`，你可以使用方向键从容地浏览结果；然后结果保存到\
    \ `emails.txt`。\n\n```\n$ grep ';NY;' employees.txt | cut -d ';' -f 9 | less\n\
    \nnakesha_lambrinou6390@speedymail.org\ncapelle1740@fastmailbox.net\nnoble7595@internetemails.net\n\
    ...\n\n$ grep ';NY;' employees.txt | cut -d ';' -f 9 > emails.txt\n```\n\n## 8.1.4\
    \ sort\n\n在最简单的情况下，`sort my.txt` 会导致行按字母顺序输出到屏幕上。然而，你不是处理文件，而是可以使用管道操作符对另一个命令的结果进行排序。像往常一样，有几个选项可用于控制排序行为：\n\
    \n- `-n` 按数字排序，例如，1, 2, 3, 10，依此类推（而不是 1, 10, 2, 3 等）。\n- `-r` 按降序排序，而不是升序（反向）。\n\
    - `-k <n>` 指定从哪一列开始排序。该选项通常与 `-t` 结合使用。\n- `-t` 指定列的分隔符，例如 `-t ';'`。没有此选项时，`sort`\
    \ 将空格到文本字符的过渡视为新列的开始。\n\n以下命令创建两个按姓名排序的员工列表：\n\n```\n# 按名字排序（即从行首开始）\n$ sort employees.txt\n\
    \n# 按姓氏排序（第二列）\n$ sort -t ';' -k 2 employees.txt\n```\n\n> **谨慎使用 sort！**\n\n\
    对500行进行排序应该不会给现代计算机带来挑战。但是，当你使用 `sort` 处理更大数据量时，应该谨慎行事。当你对包含数百万行的日志文件进行排序时，可能需要大量的时间和内存。此外，使用\
    \ `cmd | sort` 时，`sort` 在 `cmd` 完成之前无法开始工作。\n\n如果可能，你应该先使用 `grep` 过滤大文本文件，也许再通过\
    \ `cut` 减少列数，然后再应用 `sort`。\n\n## 8.1.5 head 和 tail\n\n特别是在 `sort` 方面，一个常见的情况是你只想查看前\
    \ *n* 个或后 *n* 个结果。在这种情况下，`head` 和 `tail` 就派上用场了：\n\n```\n# 薪水最低的三名员工（第11列）\n$\
    \ sort -t ';' -k 11 -n employees.txt | cut -d ';' -f 1,2,11 | head -n 3\n\nMohamed;Mcbride;1804.67\n\
    Gabrielle;Melendez;1807.37\nBenedict;Oconnor;1812.30\n# 薪水最高的三名员工（错误的）\n$ sort\
    \ -t ';' -k 11 -n employees.txt | cut -d ';' -f 1,2,11 | tail -n 3\n\nEstella;Guerra;5586.85\n\
    Dolly;Leonard;5600.00\nFirstName;LastName;Salary\n```\n\n但请注意，第二个结果是错误的，并且还包含了标签行！实际上，应该只对\
    \ *employees.txt* 的第1到501行进行排序，而不是包含列标签的第1行。要跳过第一行，请使用 `tail -n +2`。这种不寻常的措辞意味着应该输出从第二行到文件末尾的所有行。\n\
    \n```\n# 薪水最高的三名员工（正确的）\n$ tail -n +2 employees.txt | sort -t ';' -k 11 -n | cut\
    \ -d ';' -f 1,2,11 | tail -n 3\n\nArden;Lit;5584.95\nEstella;Guerra;5586.85\n\
    Dolly;Leonard;5600.00\n```\n\n## 8.1.6 uniq\n\n`uniq my.txt` 消除文本文件中连续相同的行，并在终端中打印结果。但是，如果重复项不是紧邻的，`uniq`\
    \ 无法识别它们。你可以通过事先对文本进行排序来避免此限制。\n\n在以下清单中，第一个命令确定员工所在的所有州的字母列表。`tail` 消除列标签，`cut`\
    \ 剪切出包含州的第七列。第二个命令证明员工似乎居住在美国所有50个州。\n\n```\n$ tail -n +2 employees.txt | cut\
    \ -d ';' -f 7 | sort | uniq\nAK\nAL\nAR\n...\n\n$ tail -n +2 employees.txt | cut\
    \ -d ';' -f 7 | sort | uniq | wc -l\n\n50\n```\n\n现在，我们仍然对以下问题感兴趣：每个州有多少名员工？如果你向\
    \ `uniq` 传递选项 `-c`（计数），这个问题也可以得到回答：\n\n```\n$ tail -n +2 employees.txt | cut -d\
    \ ';' -f 7 | sort | uniq -c\n    11 AK\n    12 AL\n     8 AR\n     ...\n```\n\n\
    如果我们现在想查看员工最多的五个州，我们需要再次对 `uniq` 的结果进行排序。`-n` 选项确保 `sort` 正确地进行数字排序。`-r` 反转了"
