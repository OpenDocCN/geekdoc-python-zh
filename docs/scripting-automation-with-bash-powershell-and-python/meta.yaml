    # PART I


    # Scripting Languages


    # Chapter 1

    Scripting: Doing One Thing


    This short introductory chapter addresses the question, “What is scripting?” We’ll
    cover the differences between “full-fledged” programming languages and classic
    scripting languages and show you right away how these boundaries (especially with
    Python) are fluid.


    In this chapter, I want to go into a bit of the background and philosophy of scripting.
    I think this background is especially important if you’ve previously developed
    code using a language like Java or C#. You have learned to use the correct data
    types and to structure your code in an object-oriented way. You’ve followed all
    the rules of the art as best you can.


    At this point, you might be wondering: What is wrong with also developing a backup
    script or a test program for a REST API in a strictly typed programming language?
    What are the advantages of a syntactically much more generous script language
    like Bash, which knows strings as the only data type? Why make friends with PowerShell
    when it uses the same .NET foundation as C#? We’ll be answering these questions
    as we discuss the benefits of each scripting language in the coming sections.


    ## 1.1 What Does Scripting Mean?


    Scripting means the following:


    - You can write 20 lines of code to create a backup of your database once a day,
    including encrypting and uploading this data to cloud storage.

    - With a tiny program, you can reduce countless wedding photos to a maximum resolution
    of 1024×768 pixels, including watermarking and uploading the files to a hidden
    directory on your web server so that your customers can view and select their
    favorite images via your website.

    - You can easily scan all the computers on your local network for a specific security
    vulnerability or an outdated software version.

    - You can capture, for instance, the volume of gas stored in Germany, the price
    fluctuations of the next notebook you want to buy, or the latest COVID-19 case
    numbers from public websites and represent this data in charts.

    - You can filter out the 20 error messages relevant to you from a log file of
    50,000 lines.


    ### 1.1.1 Scripting versus Programming


    Scripts, too, are “only” programs. However, they differ from large software projects
    in the way they are programmed, the tools/components used, and their objectives:


    - Typically, scripts perform manageable, relatively simple tasks. They often help
    automate administrative tasks or at least perform them more efficiently.

    - Scripts are used in text mode (in the terminal) or executed automatically in
    the background. No graphical user interface (GUI) exists.

    - Special script languages are used for programming, which make uncomplicated,
    efficient development possible. Script languages require neither elaborate development
    tools nor compilers. The syntax is minimalistic (sometimes, unfortunately, also
    outdated and it can take some getting used to). Central principles familiar from
    large projects, such as object orientation or strict type control of variables,
    play a subordinate role or cannot be implemented at all.

    - Popular script languages are characterized by huge offering of commands or extension
    modules. This diversity helps to perform basic operations (read and evaluate files,
    set up users, perform network operations, etc.). When it comes to scripting, you
    don’t have time to reinvent the wheel! You should rather make use of a huge toolbox
    of existing components and building blocks as best you can.

    - The code size of scripts is small, typically under 100 lines (not counting comments
    and strings).


    In large software projects, an extremely important goal is that code be developed
    “cleanly”—that is, the code can be understood by all members of the team and later
    extended or modified. In other words, all guidelines of modern software design
    are observed.


    Scripting, on the other hand, is about solving a small problem quickly and pragmatically
    (*getting things done*). Of course, you shouldn’t go out of your way to develop
    sloppy scripts! Scripts should also use meaningful variable names, be documented
    with comments, contain basic error protection, and so on. But the priorities and
    development goals of a script that should be ready within a day if possible are
    quite different from the priorities and development goals for a software project
    whose code may need to be maintained for a decade.


    ### 1.1.2 Glue Languages and Glue Code


    In the context of scripting, sometimes, you’ll hear talk of “glue code.” Accordingly,
    scripting languages are sometimes referred to as “glue languages.” What do these
    terms mean?


    In larger projects, the proverbial *glue* is often necessary to connect independent
    or incompatible software components. In the simplest case, a script calls some
    external commands that in themselves have nothing to do with each other: One creates
    a backup of a database, the second encrypts the resulting file, the third transfers
    the file to another server via HTTP, and so on. Each of the commands used was
    developed independently of all the others. But by connecting the commands through
    your script, a new meaningful component is created.


    Glue code is sometimes also necessary to efficiently apply modern software development
    tools. For example, let’s say your team is developing a large project in JavaScript
    using tools like Git (version control) and Docker (containers for local testing
    environments). Each time a team member completes (“checks in”) a new test version,
    the current code should be transferred (“deployed”) to an external test server.
    This step could be performed by a small script.


    Theoretically, you can perform such tasks with any programming language. However,
    scripting languages are particularly well suited for these tasks because of their
    simple syntaxes, minimal development overhead, and the fact that scripts create
    few (or even no) new project dependencies.


    ### 1.1.3 Do One Thing and Do It Well


    Unix programs were developed according to the motto “*Do one thing and do it well*,”
    formulated by Doug McIlroy, and these programs are still assessed by this standard
    today. When Unix became Linux and macOS, what was then called a “program” is now
    called a “command.” But the principle has not changed: A command like `ls`, `grep`,
    or `find` is expected to perform a very specific task and to do that task really
    well.


    What does Unix’s motto have to do with scripting? On Linux and macOS, when you
    develop scripts in the Bash or Zsh languages, you do so on a foundation of several
    hundred commands that meet the Unix recommendation. You would be well advised
    to adopt the motto for your own projects as well. Write scripts that perform *one*
    task neatly.


    ## 1.2 Scripting Languages


    In purely formal terms, scripting languages differ from other, “higher-level”
    programming languages in that the code is interpreted. Thus, the code is formulated
    in a text file and then executed directly by an interpreter in Bash, PowerShell,
    or Python. The code does not need to be compiled (i.e., converted to a binary
    representation) beforehand.


    This concept has an advantage in that scripts can be executed immediately without
    lengthy preparation work, which speeds up the development process.


    However, using an interpreter has a disadvantage in that scripts usually run somewhat
    more slowly than compiled programs. For this reason, a scripting language is rarely
