    A reference for all AWS S3 commands can be found at https://awscli.amazonaws.com/v2/documentation/api/latest/reference/s3/index.html.


    # 20.1.4 Encrypting Files


    Even though Amazon advertises that your files are stored encrypted, this encryption
    does not improve the security of your data that much as long as Amazon has the
    key. If you don’t want outside companies or intelligence agencies to read your
    organization or company’s backups, you must encrypt all files before transferring
    them to the cloud. This basic rule is not specific to Amazon but applies to *any*
    storage of data on external servers or cloud services.


    In the following sections, I will introduce you to the `gpg` command, which allows
    you to encrypt files symmetrically in an uncomplicated way and decrypt them later.


    > **Symmetric versus Asymmetric**


    “Symmetric encryption” means that the same key is used for both encryption and
    decryption. In contrast, with asymmetric methods, a key pair is used (as with
    SSH): The public key is used for encryption; the private key, for decryption.
    This approach is especially advantageous if the encryption is supposed to take
    place at different locations (computers). The public key required for this setup
    can be distributed without hesitation.


    Unfortunately, however, asymmetric methods are inefficient for large files. Nevertheless,
    to take advantage of asymmetric procedures, a common practice is to continue encrypting
    the files symmetrically. In addition, however, the keys are now also encrypted—namely,
    asymmetrically! This scenario is now referred to as a “hybrid encryption system”
    and is described at https://en.wikipedia.org/wiki/Hybrid_cryptosystem.


    For our purposes (i.e., for the safekeeping of backup files in a cloud), a symmetric
    procedure is absolutely sufficient. You just need to ensure that the key you use
    does not fall into the wrong hands.


    First, you need a key (i.e., just a binary file with random data). A good way
    to generate a new key is the `openssl` command, which is part of the package of
    the same name on Linux. The following command creates a key with a length of 32
    bytes. (32 bytes seems'
  merge: -1
