    "GET /research/business/only HTTP/1.1" 200 25158

    "https://example.com/less/response/edge/policy"

    "Mozilla/5.0 ..."

    ```


    In each case, the first column indicates the IP address from which the website
    was contacted. The script, which is unparalleled in its brevity, creates a list
    of the 20 most common IP addresses. The `$1` character combination is the first
    parameter passed to the script.


    ```

    # Sample file ip-address-statistic.sh

    cut -d '' '' -f 1 $1 | sort | uniq -c | sort -n -r | head -n 20

    ```


    When you analyze the `sample.log` file using this script, you''ll get the following
    result:


