  - "[PAGE 451]\n\n# 21 Virtual Machines\n\n```\n# Sample file setup-vm-network.sh\n\
    NMPATH=/etc/NetworkManager/system-connections\nIF1=enp1s0\nIF2=enp7s0\n\n# location\
    \ of the network configuration files\nconffile1=$NMPATH/$IF1.nmconnection\nconffile2=$NMPATH/$IF2.nmconnection\n\
    \n# extracts the last 2 MAC digits, eliminates leading 0\nmac=$(cut -d ':' -f\
    \ 6 /sys/class/net/$IF1/address)\nif [ ${mac:0:1} == 0 ]; then mac=${mac:1:2};\
    \ fi\n\n# IPv4 and IPv6 addresses: old = previous, new = desired\nip4old=\"192\\\
    .168\\.122\\..*/24\"\nip4new=\"192\\.168\\.122\\.$mac/24\"\nip6old=\"2a01:abcd:abcd::.*/64\"\
    \nip6new=\"2a01:abcd:abcd::$mac/64\"\n\n# if the configuration file uses a different\
    \ address\n# than ip4new: rectify configuration files using sed\nif ! grep -q\
    \ \"address1=$ip4new\" $conffile1; then\n  sed -E -i.old  \"s,$ip4old,$ip4new,\"\
    \ $conffile1\n  sed -E -i.old  \"s,$ip6old,$ip6new,\" $conffile2\n  # set up new\
    \ /etc/machine-id\n  rm /etc/machine-id\n  systemd-machine-id-setup\n  # restart\
    \ virtual machine\n  echo \"reboot\"\n  reboot\nelse\n  echo \"no network changes\"\
    \nfi\n```\n\nThe script ends with a `reboot` statement. If you develop a script\
    \ yourself like in this example, you must be extremely careful with `reboot`!\
    \ If your script does not work properly, the virtual machine will restart continuously.\
    \ So, make sure to test your script extensively before you include `reboot`!\n\
    \nSince the script processes the last two digits of the MAC address decimally\
    \ (not hexadecimally), it is suitable for the administration of 100 virtual machines.\
    \ 192.168.122.0 is reserved. 192.168.122.1 and 2a01:abce:abce::2 are used as gateway\
    \ addresses. This leaves the address range 192.168.122.3 to .99 for IPv4. So,\
    \ you can set up a maximum of 97 virtual machines. If necessary, you can work\
    \ around this limit by analyzing the last two MAC digits hexadecimally or by considering\
    \ multiple MAC digits."
  - '[PAGE 452]


    > **Alternatives**

    Running a script within the init system is not the only way to configure virtual
    machines. Major virtualization frameworks such as OpenStack rely on cloud init
    (see https://cloud-init.io).

    To configure running virtual (or real) machines, you can also use configuration
    tools such as Puppet or Ansible. However, these programs assume that all machines
    in the network are accessible, i.e., that the network configuration has already
    been completed.


    # 21.3 Controlling Hyper-V


    Hyper-V is to Windows what KVM is to Linux. It is therefore not surprising that
    Microsoft has added a comprehensive PowerShell module to its own virtualization
    system. If you have Windows Pro and have not yet enabled Hyper-V, the quickest
    way to do this is to use the following command:


    ```

    > Add-WindowsFeature Hyper-V -IncludeManagementTools

    ```


    About 250 aliases and cmdlets can then be executed on Windows (but not on Linux
    or macOS) via the Hyper-V PowerShell module:


    ```

    > Get-Command -Module Hyper-V

    ```


    | CommandType | Name | Version | Source |

    | --- | --- | --- | --- |

    | Alias | Export-VMCheckpoint | 2.0.0.0 | Hyper-V |

    | Alias | Get-VMCheckpoint | 2.0.0.0 | Hyper-V |

    | Alias | Remove-VMCheckpoint | 2.0.0.0 | Hyper-V |

    | Alias | Rename-VMCheckpoint | 2.0.0.0 | Hyper-V |

    | Alias | Restore-VMCheckpoint | 2.0.0.0 | Hyper-V |

    | Cmdlet | Add-VMAssignableDevice | 2.0.0.0 | Hyper-V |

    | Cmdlet | Add-VMDvdDrive | 2.0.0.0 | Hyper-V |

    | ... | | | |


    > **Admin Rights Required**

    By default, the execution of Hyper-V cmdlets requires admin rights. This means
    you need to open a PowerShell terminal with admin rights.

    Alternatively, you can add individual users or groups to the Hyper-V administrators.
    This type of settings can be done in the Group Policy Management Editor.'
  - "[PAGE 453]\n\nGet-VM lists all installed virtual machines and shows details about\
