  md: "```\n$data = @{ firstName = 'John'; lastName = 'Doe'}\n$jsondata = $data |\
    \ ConvertTo-Json\n$url = 'https://httpbin.org/put'\n$response = Invoke-WebRequest\
    \ -Method Put $url -Body $jsondata\n$response.Content\n\n{\n  \"headers\": {\n\
    \    \"Content-Length\": \"46\",\n    \"Host\": \"httpbin.org\",\n    \"User-Agent\"\
    : \"Mozilla/5.0 (Linux; ...) PowerShell/7.3.2\",\n    \"X-Amzn-Trace-Id\": \"\
    Root=1-6426e776-337f635051c3c6753...\"\n  },\n  \"json\": {\n    \"firstName\"\
    : \"John\",\n    \"lastName\": \"Doe\"\n  }, ...\n}\n```\n\nSince a request call\
    \ typically requires many options and parameters, a good idea is to first collect\
    \ the data in a hash table and pass it to the cmdlet via *splatting* (see [Chapter\
    \ 4, Section 4.3](#chapter-4-section-4-3)):\n\n```\n$data = @{ firstName = 'John';\
    \ lastName = 'Doe'}\n$para = @{ Uri = 'https://httpbin.org/put';\n           Method\
    \ = 'Put';\n           Body = $data | ConvertTo-Json}\n$response = Invoke-WebRequest\
    \ @para\n```\n\n# 18.6 Example: Determining the Current Weather\n\nThe following\
    \ script combines two REST APIs:\n\n+   - First, the *https://ipinfo.io* geolocation\
    \ service is used to determine the presumed location for the current IP address.\
    \ This doesn't always work precisely and can go completely wrong if you use a\
    \ VPN connection. But in most cases, the returned coordinates are reasonably good.\n\
    - In the second step, the current weather is determined for the identified location.\
    \ The API at *https://api.weatherapi.com* is available free of charge with certain\
    \ restrictions. However, you must get an API key. (Providing your email address\
    \ is sufficient; you don't need to provide a credit card number or any other personal\
    \ information.)"
