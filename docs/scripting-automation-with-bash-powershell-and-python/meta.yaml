    \ messages using `journalctl`, as in the following examples:\n\n```\n$ journalctl\
    \                # read all syslog messages\n$ journalctl -u sshd        # read\
    \ only messages from the SSH server\n```\n\n# 6.4.8 Determining Free Memory\n\n\
    `free -h` determines the free memory. The `-h` option stands for *human readable*.\
    \ The numerical data is therefore provided with suitable units, such as M for\
    \ megabyte (MB), G for gigabyte (GB), and so on. However, the result is not easy\
    \ to interpret. The free memory is indicated in the final *available* column and\
    \ is around 15 GBs on the test computer. According to the *free* column, it would\
    \ seem to be less than 1 GB, but the system takes into account a lot of buffer\
    \ memory that Linux can make available at any time.\n\n```\n$ free -h\n\n    \
    \          total        used        free      shared  buff/cache   available\n\
    Mem:           30Gi       14Gi       938Mi       478Mi        15Gi        15Gi\n\
    Swap:            0B          0B          0B\n```\n\nYou can determine the free\
    \ space on the hard disk or SSD using `df -h` (*disk free*). By default, the command\
    \ lists all Linux file systems, including various internal file systems. Using\
    \ `-x tmpfs`, you can at least eliminate the temporary file systems and this way\
    \ reduce the information overload a little. In the following example, the second\
    \ and third lines are the most interesting ones. There are still 159 GBs free\
    \ in the root file system and 195 GBs in the `/home` file system for the user\
    \ directories.\n\n```\n$ df -h -x tmpfs\n\nFilesystem               Size  Used\
    \ Avail Use% Mounted on\ndev                      16G     0   16G   0% /dev\n\
    /dev/mapper/vgcrypt-root 196G   28G  159G  15% /\n/dev/mapper/vgcrypt-home 590G\
    \  366G  195G  66% /home\n/dev/nvme0n1p1           2.0G   80M  1.9G   4% /boot\n\
    /dev/sdb1                1.7T  1.1T  570G  66% /run/media/kofler/p1-backup2\n\
    ```\n\nA great alternative to `df` is the `duf` command, but it needs to be installed\
    \ separately. Basically, the command provides the same information, but it formats\
