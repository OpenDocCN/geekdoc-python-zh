  - '[PAGE 352]


    # 14.1.6 Git Status


    As your project grows, so does the risk of losing track of your Git repository.
    The solution to this problem is provided by `git status`. This command summarizes
    which files have been changed since the last commit, which ones have been added,
    and so on.


    Another useful command is `git log`, which outputs a summary of the latest commits
    (with the newest commit first). With `git log`, myriad options control how many
    details are displayed for each commit. You can get the shortest version using
    `--oneline`: Then, only a hexadecimal identification code (the first digits of
    the hash code) and the commit message are displayed:


    ```

    > git log


    f2665d9 (HEAD -> main, origin/main, origin/HEAD) more bugfixes

    5d3225d bugfixes in script1.ps1

    679ca1a improved script2.ps1, started documentation

    cd35ac9 script1 to script3.ps1: basic functions work

    015ed58 Initial commit

    ```


    Instead of getting used to using `git log`, you can also use the GitHub web interface
    where you can click through the commits, view the changes made with the commits,
    and more.


    ![](img/a7fa45d496335c22ffb14c3275e24ffb_352_0.png)


    # 14.1.7 Excluding Files from Git (.gitignore)


    Often, some files in your project directory should not be included in the repository,
    such as backups of your scripts created by the editor, files for logging and debugging,'
  - '[PAGE 353]


    and so on. To prevent `git status` from listing these files, you can set up the
    `.gitignore` file in the local directory. This file contains samples of files
    that `git` should not consider, for example, the following kinds of files:


    ```

    *.bak

    *.log

    *~

    tmp/*

    ```


    The `.gitignore` file itself should of course be stored in the repository:


    ```

    > git add .gitignore

    ```


    If, as an exception, you want to add a file to the repository for which `.gitignore`
    contains a lock pattern, you should run `git add` with the `-f` (`force`) option:


    ```

    > git add debugging.log

    ```


    ```

    The following paths are ignored by one of your .gitignore

    files: debugging.log.

    Hint: Use -f if you really want to add them.

    ```


    ```

    > git add -f debugging.log

    ```


    # 14.1.8 Transferring Existing Code to a New Repository


    In this section, I assume that you''ve already set up a repository on GitHub,
    cloned an empty repository to your machine, and then have started developing your
    scripts there. Often, however, you''ve gone the other way around: You''ve been
    working on a new project for a few days and only later decide to use Git. That''s
    no problem either!


    First, you must create the new repository in GitHub. Make sure that you do not
    activate the **Add a README file** option! Do not add any other files to the repository.


    Then, open a terminal, go to your project directory, create a new local repository
    using `git init`, and add the desired files to it. Finally, `git commit` creates
    the first local commit:


    ```

    > cd my\project

    > git init

    > git add script*.sh readme.md

    > git commit -m ''initial commit''

    ```


    Next, you must connect the local repository to the new remote repository. `git
    branch` ensures that the main branch in the local repository is called `main`.
    In current versions of Git, this name is used by default—the command is then superfluous
    but does not interfere. Only if your Git installation is rather old can it still
    use the obsolete `master` designation.'
  - "[PAGE 354]\n\ngit remote add origin defines the remote repository. Instead of\
    \ MichaelKofler/test1235.git, you must specify your own GitHub account name and\
    \ repository name again.\n\ngit push performs the first upload. The -u (set upstream)\
    \ option ensures that the mapping between the external repository for the main\
    \ branch is stored permanently. Therefore, in the future, git push without any\
    \ further options will be sufficient.\n\n```\n> git branch -M main\n> git remote\
    \ add origin git@github.com:MichaelKofler/test1235.git\n> git push -u origin main\n\
    ```\n\n```\nTo github.com:MichaelKofler/test1235.git\n * [new branch]      main\
    \ -> main\nbranch 'main' set up to track 'origin/main'.\n```\n\nThus, the first\
    \ commit is stored both locally and remotely. From that moment on, the git add,\
    \ git commit, git pull and git push, git status, and git log commands work as\
    \ described earlier.\n\n# 14.2 Handling Settings and Passwords Correctly\n\nHackers\
    \ are always looking for passwords for mail, FTP, and database servers. All too\
    \ often, they find what they are looking for on GitHub, GitLab, and other Git\
    \ hosts. That's not because these platforms themselves are so insecure, but because\
    \ code files stored there that are publicly accessible might simply contain the\
    \ passwords in plain text. This vulnerability can arise if your code looks something\
    \ like the following backup script:\n\n```\n# Attention, negative example!\n...\
    \ code\nmysqldump -u root -ptopSecret wordpress > db.sql\nlftp -u ftpuser,topSecret2\
    \ backupserver.example.com << EOF\ncd remote/dir/\nput db.sql\nbye\nEOF\n... more\
    \ code\n```\n\nIn this example, mysqldump first creates a backup of the database.\
    \ The password required for this step is passed directly with the -p option. Then,\
    \ lftp connects to an FTP server to store the backup there. The password is passed\
    \ with the -u option. If you store this backup script in a Git repository, everyone\
    \ who has access to the repository knows the passwords to the MySQL and FTP servers."
  - "[PAGE 355]\n\nBy the way, you should avoid FTP altogether if possible. The protocol\
    \ is inherently insecure. If anything, you should only store files on an FTP server\
    \ that you have encrypted previously.\n\n# 14.2.1 What’s a Better Method?\n\n\
    Several best practices for preventing these types of security breaches include\
    \ the following:\n\n+   - **Storing passwords externally**\n  Almost all programs\
    \ that require a password for authentication can read the password from a file.\
    \ For `mysqldump`, the `.my.cnf` is used; for `lftp`, the `.netrc` file is used;\
    \ and so on. With some tools, you don’t need passwords at all and can use key\
    \ files instead (for example, SSH; see Chapter 12, Section 12.4).\n  Of course,\
    \ passwords or key files must not be included in the Git repository under any\
    \ circumstances. However, you can point out in the documentation which password\
    \ files your script requires, and which syntax is necessary.\n- **Saving other\
    \ settings in a separate file**\n  In general, it’s a good idea to specify any\
    \ parameters that must be changed when using the script on a different machine\
    \ or in a different context separately from the rest of the code. In simple cases\
    \ without security risks, this specification can be done in the first lines of\
    \ a script. I often name such parameters in capital letters to visually differentiate\
    \ them from the rest of the variables.\n  As a rule, it is still better to store\
    \ all parameters in a separate file that is imported at the beginning of the script.\
    \ JSON or INI files are well suited for this purpose (see especially Chapter 10,\
    \ Section 10.7).\n- **Including a sample of the settings file in the Git repository**\n\
    \  Don’t stop at passwords! Critical information also includes hostnames, port\
    \ numbers, and the names of Amazon Web Services (AWS) buckets or virtual machines.\n\
    \  Configuration files with these types of data should *not* be included in any\
    \ Git repository! Without the configuration file, however, getting your script\
    \ up and running becomes a guessing game for other people. For this reason, a\
    \ useful approach is to include a sample configuration file in the repository.\
    \ If the real configuration file is named `mybackup.conf`, you can name the sample\
    \ file `mybackup.conf.sample`, for example. The purpose of this file is to explain\
    \ the syntax of the configuration file. However, the file does not contain any\
    \ real data, only freely invented sample data.\n\nThese security rules apply to\
    \ *all* Git repositories, including private repositories or repositories that\
    \ are located on their own, non-public GitLab instances. When you set up or use\
    \ a repository, you can never predict who else will have access to it later. Passwords\
    \ and other critical information must *never* be stored in repositories."
- md: "## 14.2.2 Example\n\nHow can we make the fragmentary backup script from earlier\
    \ in this section better and more securely organized? The script starts with the\
    \ `. filename` import statement (a short notation for `source filename`). This\
    \ statement will read the specified file into the script and process it via Bash.\n\
    \n```\n# Sample file mybackup.sh\n# load initial configuration settings\n. mybackup.conf\n\
    \n# mysqldump reads the password from .my.cnf\nmysqldump -u $MYSQLUSER $DBNAM\
    \ > db.sql\n\n# lftp reads the password from .netrc\nlftp $FTPHOST << EOF\ncd\
    \ remote/dir/\nput db.sql\nbye\nEOF\n```\n\nThe corresponding configuration file\
    \ looks as follows:\n\n```\n# mybackup.conf configuration file\nMYSQLUSER=root\n\
    DBNAME=wordpress\nFTPHOST=backupserver.example.com\n```\n\nTo ensure that this\
    \ file does not end up in the Git repository, `.gitignore` is extended with the\
    \ following line:\n\n```\n# .gitignore file\nmybackup.conf\n```\n\nOn the other\
    \ hand, to help users of the script, the following sample file is included in\
    \ the Git repository:\n\n```\n# configuration file mybackup.conf.sample\n# copy\
    \ this file to mybackup.conf and\n# replace the sample texts with applicable names!\n\
    # note that myscript.sh expects the MySQL password in .my.cnf\n# and the FTP password\
    \ in .netrc.\nMYSQLUSER=mysqlaccountname\nDBNAME=databasename\nFTPHOST=ftphostname\n\
    ```\n\n> **PowerShell and Python**\nThe source operator . also works in PowerShell.\
    \ For Python scripts, the best approach is to save your settings in an INI file\
    \ (see Chapter 10, Section 10.7).\n\n## 14.3 Git Automation\n\nMany `git` command\
    \ sequences are repeated over and over again, for example, `git add`, `git commit`,\
    \ `git pull`, and `git push`. Therefore, automating calls of these commands in\
    \ scripts often makes sense.\n\nTo give you an idea of what such scripts might\
    \ look like, the commands in the following listing check to see if the current\
    \ directory is controlled by Git and if a remote repository has been set up. If\
    \ these requirements are met, `git add . --dry-run` shows which files would be\
    \ included in the next commit. `git add .` assumes that you have previously set\
    \ up a `.gitignore` file that excludes all unneeded files from Git operations.\n\
    \nNow, you have the choice: If you specify a commit message, `git add` runs without\
    \ the `--dry-run` option and performs a commit; the changes are synchronized with\
    \ the remote repository using `git pull` and `git push`. Thus, the process can\
    \ be aborted because of the `-e` option in the hash bang, which indicates the\
    \ script should end as soon as a command causes an error.\n\n```\n#!/bin/bash\
    \ -e\n# Sample file git-acp.sh = git add/commit/push\n# test if current directory\
    \ is under Git control\nif ! git rev-parse --is-inside-work-tree >& /dev/null;\
    \ then\n    echo \"not in git repo, exit\"\n    exit 1\nfi\n# test if remote repository\
    \ exists for current branch\nif ! git ls-remote >& /dev/null; then\n    echo \"\
    no git remote, exit\"\n    exit 1\nfi\n```\n\n```\n# list files for the commit\n\
    echo \"Dry run:\"\ngit add -A --dry-run\n\n# abort or enter the commit message\n\
    echo \"Do you want to add and commit all files listed above?\"\necho \"Enter commit\
    \ message or press return to exit.\"\necho -n \"> \"\nread msg\n\n# run git add,\
    \ commit, pull + push\nif [[ $msg ]]; then\n    git add -A\n    git commit -m\
    \ \"$msg\"\n    git pull\n    git push\nelse\n    echo \"exit\"\nfi\n```\n\nThe\
    \ following lines show a sample run of the script. I have run the script in the\
    \ working directory of this book. (Of course, I've managed all text, images, layout,\
    \ and code files for this book using Git.)\n\n```\n$ ./code/git/git-acp.sh\n\n\
    Dry run:\n  add '.gitignore'\n  add 'bash.md'\n  add 'code/git/git-acp.sh'\nDo\
    \ you want to add and commit all files listed above?\nEnter commit message or\
    \ press return to exit.\n> git scripting sample, work in progress\n...\nTo github.com:MichaelKofler/scripting-buch.git\n\
    \   a0ff68f..a60f1d8  main -> main\n```\n\nIf you work on Windows, you can run\
    \ the script in Git Bash, or you'll need to develop a PowerShell variant of the\
    \ code.\n\n> **A Pinch of Skepticism**\nYou'll find countless Bash and PowerShell\
    \ scripts on the internet that are structured similar to the previous example.\
    \ I'm a fan of automating processes; otherwise, I wouldn't have written this book.\
    \ However, our example is only for demonstration purposes; I don't normally use\
    \ it myself.\n\n> I use Git on a daily basis. I know by heart the few commands\
    \ I need all the time, and thus, typing effort for me is minimal. No automation\
    \ is worthwhile, or at best a few aliases are sufficient, such as those contained\
    \ in the Zsh extension Oh My Zsh.\n\nAlso, my Git repositories are quite different\
    \ in character: Some repositories have only one branch, and I am the only user.\
    \ With other repositories, many users are involved in multiple branches, with\
    \ various special cases. Before something goes wrong, I prefer to run `git` manually\
    \ and not rely on automatisms!\n\n### 14.3.1 Controlling GitHub Remotely Using\
    \ gh\n\nThe `git` command works for any Git repository. However, this command\
    \ cannot perform operations that are specific to GitHub, for example, setting\
    \ up a new repository on GitHub, performing a pull request, and so on. For such\
    \ purposes, GitHub provides the `gh` command. You can find related downloads and\
    \ installation instructions at https://github.com/cli/cli/releases.\n\nAfter installation,\
    \ you would perform a one-time authentication via `gh auth login`, which must\
    \ be done in a web browser. `gh` takes care of starting the web browser and navigating\
    \ to the correct page.\n\nThen, you can use `gh repo list` to list your repositories\
    \ on GitHub, `gh repo create` to set up a new repository, `gh pr create` to add\
    \ a pull request, `gh pr status` to query the status of a pull request, and so\
    \ on. You can call `gh` like `git` in your scripts. A reference of all `gh` commands\
    \ can be found at https://cli.github.com/manual/gh.\n\n> **GitLab Remote Control**\n\
    As the name suggests, `gh` is only suitable for GitHub. For GitLab, an analogous\
    \ project exists (the `glab` command); see https://gitlab.com/gitlab-org/cli.\n\
    \n## 14.4 Git Hooks\n\n*Git hooks* are scripts that are automatically executed\
    \ before or after certain Git actions. In each new Git repository, you'll find\
    \ a collection of script patterns for various actions in the `.git/hooks` directory:\n\
    \n```\n$ ls .git/hooks\n\napplypatch-msg.sample       prepare-commit-msg.sample\n\
    commit-msg.sample          pre-push.sample\nfsmonitor-watchman.sample   pre-rebase.sample\n\
    post-update.sample         pre-receive.sample\npre-applypatch.sample      push-to-checkout.sample\n\
    pre-commit.sample          update.sample\npre-merge-commit.sample\n```\n\nThe\
    \ sample files are well documented shell scripts. A look into these files not\
    \ only reveals the purpose of the respective hook, but also immediately shows\
    \ working sample code.\n\nTo activate a hook, you must remove the `.sample` identifier.\
    \ (Unlike the sample files in this book, the `.sh` identifier is also taboo. The\
    \ scripts are executed only if they have no identifier at all!)\n\nOn Linux and\
    \ macOS, you also must ensure that the execute bit is set, which means you need\
    \ to run `chmod +x script.sh`. On Windows, the script is executed by Git Bash.\
    \ For more basic information on Git hooks, see the Git manual at https://git-scm.com/book/en/v2/Customizing-Git-Git-Hooks.\n\
    \n> **GitHub Actions and GitLab Pipelines**\nAs an alternative to Git hooks, the\
    \ major Git platforms provide alternative mechanisms to automatically perform\
    \ actions when commits are executed, for example, for automated testing or for\
    \ automatic deployment to other systems. The configuration files for these mechanisms\
    \ contain script sections where you can specify code in turn. Basic scripting\
    \ knowledge thus helps even if you don't want to use hooks but do want to use\
    \ certain advanced GitHub or GitLab features.\n\n### 14.4.1 Example: Detecting\
    \ Unversioned Files Before the Commit\n\nThe `.git/hooks/pre-commit` script is\
    \ executed before each commit. This script can be used to guarantee compliance\
    \ with certain rules of a commit. If the script returns an error code (i.e., an\
    \ exit code not equal to 0), `git commit` aborts, and the user must fix the detected\
    \ defect.\n\nThe following example comes from my book with Bernd Öggl, *Git: Project\
    \ Management for Developers and DevOps Teams* (Rheinwerk Computing, 2023). `pre-commit`\
    \ tests if changed or new files exist that are not included in the commit and\
    \ also not excluded by `.gitignore`. If so, these files will be listed by `git\
    \ status`.\n\n`exit 1` prevents you from forgetting a file during a commit. But\
    \ at the same time, the script forces you to explicitly enumerate in `.gitignore`\
    \ all the files that should be disregarded. This requirement can be quite annoying.\n\
    \n```\n#!/bin/sh\n# Sample file pre-commit, must be copied into the\n# .git/hooks\
    \ directory\nuntracked=$(git ls-files --others --exclude-standard | wc -l)\n```"
  mdcn: "## 14.2.2 示例\n\n我们如何改进本节前面提到的片段式备份脚本，使其结构更完善、更安全？该脚本以 `. filename` 导入语句（`source\
    \ filename` 的简写形式）开头。此语句会将指定文件读入脚本，并通过 Bash 进行处理。\n\n```\n# 示例文件 mybackup.sh\n\
    # 加载初始配置设置\n. mybackup.conf\n\n# mysqldump 从 .my.cnf 读取密码\nmysqldump -u $MYSQLUSER\
    \ $DBNAM > db.sql\n\n# lftp 从 .netrc 读取密码\nlftp $FTPHOST << EOF\ncd remote/dir/\n\
