    \ of the list. As the `print` call proves, this change applies to both `a` and\
    \ `b`! So, `a` and `b` are not independent of each other as in the previous example!\n\
    \n```\na = [1, 2, 3]\nb = a        # b references the same list as a\na[0] = 4\
    \     # changes the first list element\nprint(a, b)  # Output [4, 2, 3] [4, 2,\
