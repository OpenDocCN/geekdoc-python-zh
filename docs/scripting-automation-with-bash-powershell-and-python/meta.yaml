- md: "## 3.13 Functions\n\nThe `function` keyword defines a function that can be\
    \ called in the script like a command. The code of the function must be enclosed\
    \ in curly brackets. Functions must be declared *before* they are called for the\
    \ first time and are therefore often placed at the beginning of the script.\n\n\
    Parameters can be passed to functions. Unlike many programming languages, the\
    \ parameters are not enclosed in parentheses. Within the function, the parameters\
    \ can be taken from the `$1`, `$2`, etc. variables. A function processes parameters\
    \ in the same way that the script processes *command-line arguments*. The following\
    \ mini-script outputs *Hello World, Bash!*\n\n```bash\n#!/bin/bash\nfunction myfunc\
    \ {\n    echo \"Hello World, $1!\"\n}\nmyfunc \"Bash\"\n```\n\nThe `function`\
    \ keyword is optional. If you omit `function`, however, the function name must\
    \ be followed by parentheses. Thus, the following function is equivalent to the\
    \ previous example:\n\n```bash\nmyfunc() {\n    echo \"Hello World, $1!\"\n}\n\
    ```\n\nBash functions help you to clearly structure the code. You can also swap\
    \ out blocks of code that are needed more than once, thus avoiding redundancy.\n\
    Using `return`, you leave a function prematurely. No option exists to return data.\
    \ However, you can of course perform outputs via `echo` or change variables.\n\
    \n## 3.13.1 Local Variables\n\nUsually, all variables are “shared” throughout\
    \ the script, so they are also accessible in functions and can be changed there.\
    \ The `local` keyword provides the option to define local variables.\n\n```bash\n\
    function myfunc {\n    a=4\n    local b=4\n}\n\na=3; b=3\nmyfunc\necho \"$a $b\"\
    \ # output 4 3\n```\n\n## 3.14 Error Protection\n\nBash has a decidedly casual\
    \ way of dealing with errors: If a command in a script triggers an error, Bash\
    \ simply continues the script with the next statement! This strange strategy has\
    \ to do with the fact that the return code of many commands often does not indicate\
    \ real errors at all, but merely that a condition was not met or that when searching\
    \ for a file it was not found. This occurrence does not necessarily have to be\
    \ a “real” error.\nHowever, some exceptions exist. In case of obvious syntax errors,\
    \ for instance, if quotes or brackets are missing or control structures are incomplete\
    \ (no `fi` for `if`), the script will not be started at all.\n\n## 3.14.1 Detecting\
    \ Errors\n\nThe return code of each command is stored in `$?`. The value 0 means\
    \ that everything is OK. Any other number indicates an error.\n\n```bash\ncommand_might_fail\n\
    errcode=$?\nif [ $errcode -ne 0 ]; then\n    echo \"Errorcode $errcode\"\nfi\n\
    ```\n\n## 3.14.2 Canceling in Case of Errors\n\nIf you want your script to terminate\
    \ on the first error, you need to add the `-e` option to the hash bang:\n\n```bash\n\
    #!/bin/bash -e\n```\n\nIn the case of interlinked commands, the overall result\
    \ is valid. If `command1` fails in the following script—even if the command does\
    \ not exist—`command2` will be executed. Only if this command also leads to an\
    \ error will the script be aborted.\n\n```bash\n#!/bin/bash -e\ncommand1 || command2\n\
    ```\n\nInstead of setting the error behavior in the hash bang for the entire script,\
    \ you can enable strict error testing via `set -e` for some lines of code and\
    \ disable it later using `set +e`.\n\n> **Not Recommended**\nMost Bash manuals\
    \ and FAQs advise against running Bash with the `-e` option or enabling the function\
    \ via `set -e`. The damage is greater than the benefit, as the behavior of the\
    \ script can become unpredictable, as described in https://mywiki.wooledge.org/BashFAQ/105.\n\
    \n## 3.14.3 exit\n\n`exit (n)` terminates the script. The return value of the\
    \ last command or the value `n` is returned.\n\n| Exit Code | Meaning |\n|---|---|\n\
    | 0 | Okay, no error |\n| 1 | General error |\n| 2 | Error in the passed parameters\
    \ (arguments) |\n| 3–255 | Other command-specific or script-specific error |\n\
    \nTable 3.11 Error Codes of Bash and Linux Commands\n\n## 3.14.4 Responding to\
    \ Signals (trap)\n\nThe concept of process management on Unix/Linux is that processes\
    \ can be sent signals (see Table 3.12). Even more signals are listed by `kill\
    \ -l`. For example, if you press `Ctrl` + `C` while executing a Bash script, the\
    \ `SIGINT` signal is sent, and the script execution gets aborted.\n\n| Signal\
    \ Name | Code | Meaning |\n| :--- | :--- | :--- |\n| SIGHUP | 1 | Prompt to re-read\
    \ the configuration |\n| SIGINT | 2 | Interruption via `Ctrl` + `C` |\n| SIGKILL\
    \ | 9 | `kill` signal; cannot be intercepted |\n| SIGTERM | 15 | Prompt to exit\
    \ the program |\n\nTable 3.12 The Most Important Signals\n\nYou can use `trap`\
    \ to specifically respond to such signals. The syntax of `trap` is simple:\n\n\
    ```bash\ntrap 'commands' signals\n```\n\n`commands` specifies one or several commands\
    \ to be executed when one of the specified signals is received. The signals can\
    \ be specified either by their names or by their codes. If you want to execute\
    \ complex code in response to a signal, you should define the code in a function\
    \ and specify the function name in the `trap` command.\n\n`trap` is often used\
    \ to perform cleanup operations prior to a program abort triggered by a signal.\
    \ For example, you can delete a temporary file. The simple `trap '' 2` command\
    \ allows you to make your script ignore `Ctrl` + `C`.\n\n## 3.14.5 Timeout\n\n\
    For commands that rely on network or database connections, it is not always clear\
    \ whether an error has really occurred or whether the connection setup is too\
    \ slow. Using `timeout <time> <command>`, you can execute a command with a given\
    \ timeout. If the command takes longer than the expected time, the execution is\
    \ aborted. The return value of `timeout` is 124 if a timeout occurs. The command\
    \ knows some more special error codes (125, 126, 127, and 137; see `man timeout`).\
    \ On the other hand, if `command` is terminated within the timeout, `timeout`\
    \ returns the exit code of `command`. The following command tests whether a Git\
    \ remote repository exists for the current branch (see also Chapter 14):\n\n```bash\n\
    timeout 30s git ls-remote\n```\n\n# Chapter 4\n\n# PowerShell\n\nThe oldest “shell”\
    \ for Windows is the `cmd.exe` program, often called the “command prompt.” `cmd.exe`\
    \ represents the user interface (UI) of MS-DOS, the text-based predecessor of\
    \ Microsoft Windows. Batch files (extension `*.bat`) allow simple script programming.\
    \ However, `cmd.exe` is no longer a contemporary tool but a relic from the IT\
    \ stone age.\n\nIn 2006, Microsoft introduced the first version of *Windows PowerShell*\
    \ as a powerful successor to `cmd.exe`. Meanwhile, we have reached version 7.n.\
    \ The program also runs on Linux and macOS; because the shell is thus no longer\
    \ Windows specific, its name has been simplified to *PowerShell*. PowerShell is\
    \ *the* scripting tool in the Windows world today. The language is irreplaceable\
    \ if you want to administer Windows-related functions (e.g., Microsoft 365 cloud\
    \ setups or Microsoft Active Directory).\n\nThe biggest technical achievement\
    \ of PowerShell compared to other shells is its object-oriented approach. PowerShell\
    \ commands do not return text, but real objects. This opens up completely new\
    \ options for further processing. Compared to Bash, the syntax of PowerShell is\
    \ much more logical (but still not always intuitive and in any case rather verbose\
    \ and lengthy).\n\nIn this chapter, I will give you a first impression of the\
    \ basic functions of PowerShell. Numerous examples will then follow in the other\
    \ chapters.\n\n> **Execution Policy**\n\nFor security reasons, the execution of\
    \ (unsigned) scripts is often prohibited on company computers. The reasons for\
    \ this limitation and various setting options are described in [Section 4.5](#section-4.5).\n\
    \n## 4.1 Installation\n\nPowerShell is preinstalled on current Windows versions,\
    \ but rarely in its latest version. To find out the version of the installed PowerShell,\
    \ you need to search for “Terminal” in the **Start** menu and run the program\
    \ with the same name. (For older Windows versions, searching for *PowerShell*\
    \ will get you there.)"
  mdcn: "## 3.13 函数\n\n`function` 关键字定义了一个函数，该函数可以在脚本中像命令一样被调用。函数的代码必须包含在花括号中。函数必须在第一次调用*之前*声明，因此通常放置在脚本的开头。\n\
    \n可以向函数传递参数。与许多编程语言不同，参数不包含在括号内。在函数内部，参数可以从 `$1`、`$2` 等变量中获取。函数处理参数的方式与脚本处理*命令行参数*的方式相同。以下迷你脚本输出\
    \ *Hello World, Bash!*：\n\n```bash\n#!/bin/bash\nfunction myfunc {\n    echo \"\
    Hello World, $1!\"\n}\nmyfunc \"Bash\"\n```\n\n`function` 关键字是可选的。但是，如果省略 `function`，则函数名后必须跟括号。因此，以下函数等同于前面的示例：\n\
    \n```bash\nmyfunc() {\n    echo \"Hello World, $1!\"\n}\n```\n\nBash 函数帮助你清晰地组织代码。你还可以将需要多次使用的代码块提取出来，从而避免冗余。\n\
    使用 `return`，你可以提前退出函数。没有选项可以返回数据。但是，当然可以通过 `echo` 进行输出或更改变量。\n\n## 3.13.1 局部变量\n\
    \n通常，所有变量在整个脚本中都是“共享”的，因此它们在函数中也可以访问和修改。`local` 关键字提供了定义局部变量的选项。\n\n```bash\n\
    function myfunc {\n    a=4\n    local b=4\n}\n\na=3; b=3\nmyfunc\necho \"$a $b\"\
    \ # 输出 4 3\n```\n\n## 3.14 错误保护\n\nBash 处理错误的方式相当随意：如果脚本中的一个命令触发了错误，Bash 会简单地继续执行脚本的下一条语句！这种奇怪的策略与许多命令的返回码通常并不表示真正的错误，而仅仅表示某个条件未满足或在搜索文件时未找到该文件有关。这种情况不一定是一个“真正的”错误。\n\
    然而，也存在一些例外情况。例如，在明显的语法错误情况下，如缺少引号或括号，或控制结构不完整（`if` 没有对应的 `fi`），脚本根本不会启动。\n\n##\
    \ 3.14.1 检测错误\n\n每个命令的返回码都存储在 `$?` 中。值 0 表示一切正常。任何其他数字都表示错误。\n\n```bash\ncommand_might_fail\n\
    errcode=$?\nif [ $errcode -ne 0 ]; then\n    echo \"Errorcode $errcode\"\nfi\n\
    ```\n\n## 3.14.2 出错时取消执行\n\n如果你希望脚本在第一个错误时终止，你需要在 hash bang 中添加 `-e` 选项：\n\n```bash\n\
    #!/bin/bash -e\n```\n\n对于链接的命令，整体结果是有效的。如果 `command1` 在以下脚本中失败——即使该命令不存在——`command2`\
    \ 也会被执行。只有当该命令也导致错误时，脚本才会被中止。\n\n```bash\n#!/bin/bash -e\ncommand1 || command2\n\
    ```\n\n你不必在整个脚本的 hash bang 中设置错误行为，而是可以通过 `set -e` 为某些代码行启用严格的错误测试，然后使用 `set +e`\
    \ 稍后禁用它。\n\n> **不推荐**\n大多数 Bash 手册和常见问题解答建议不要使用 `-e` 选项运行 Bash 或通过 `set -e` 启用该功能。弊大于利，因为脚本的行为可能变得不可预测，如\
    \ https://mywiki.wooledge.org/BashFAQ/105 中所述。\n\n## 3.14.3 exit\n\n`exit (n)`\
    \ 终止脚本。返回最后一个命令的返回值或值 `n`。\n\n| 退出码 | 含义 |\n|---|---|\n| 0 | 正常，无错误 |\n| 1 | 一般错误\
    \ |\n| 2 | 传递的参数（参数）错误 |\n| 3–255 | 其他命令特定或脚本特定的错误 |\n\n表 3.11 Bash 和 Linux 命令的错误码\n\
    \n## 3.14.4 响应信号（trap）\n\nUnix/Linux 上的进程管理概念是进程可以接收信号（见表 3.12）。`kill -l` 列出了更多信号。例如，如果你在执行\
    \ Bash 脚本时按下 `Ctrl` + `C`，则会发送 `SIGINT` 信号，脚本执行将被中止。\n\n| 信号名称 | 代码 | 含义 |\n|\
    \ :--- | :--- | :--- |\n| SIGHUP | 1 | 提示重新读取配置 |\n| SIGINT | 2 | 通过 `Ctrl` +\
    \ `C` 中断 |\n| SIGKILL | 9 | `kill` 信号；无法拦截 |\n| SIGTERM | 15 | 提示退出程序 |\n\n表 3.12\
    \ 最重要的信号\n\n你可以使用 `trap` 来专门响应这些信号。`trap` 的语法很简单：\n\n```bash\ntrap 'commands'\
    \ signals\n```\n\n`commands` 指定在接收到指定信号之一时要执行的一个或多个命令。信号可以通过其名称或代码指定。如果你想执行复杂的代码来响应信号，你应该在函数中定义代码，并在\
    \ `trap` 命令中指定函数名。\n\n`trap` 通常用于在信号触发的程序中止之前执行清理操作。例如，你可以删除一个临时文件。简单的 `trap ''\
    \ 2` 命令允许你的脚本忽略 `Ctrl` + `C`。\n\n## 3.14.5 超时\n\n对于依赖网络或数据库连接的命令，并不总是清楚是否真的发生了错误，或者连接建立是否太慢。使用\
    \ `timeout <time> <command>`，你可以以给定的超时时间执行命令。如果命令花费的时间超过预期时间，执行将被中止。如果发生超时，`timeout`\
    \ 的返回值是 124。该命令还有一些特殊的错误码（125、126、127 和 137；参见 `man timeout`）。另一方面，如果 `command`\
    \ 在超时内终止，`timeout` 返回 `command` 的退出码。以下命令测试当前分支是否存在 Git 远程仓库（另见第 14 章）：\n\n```bash\n\
    timeout 30s git ls-remote\n```\n\n# 第 4 章\n\n# PowerShell\n\nWindows 最古老的“shell”是\
    \ `cmd.exe` 程序，通常称为“命令提示符”。`cmd.exe` 代表 MS-DOS 的用户界面（UI），MS-DOS 是 Microsoft Windows\
    \ 的基于文本的前身。批处理文件（扩展名 `*.bat`）允许简单的脚本编程。然而，`cmd.exe` 不再是一个现代工具，而是 IT 石器时代的遗物。\n\
    \n2006 年，Microsoft 推出了 *Windows PowerShell* 的第一个版本，作为 `cmd.exe` 的强大后继者。如今，我们已经达到了\
    \ 7.n 版本。该程序也可以在 Linux 和 macOS 上运行；由于 shell 不再是 Windows 特有的，其名称已简化为 *PowerShell*。PowerShell\
    \ 是当今 Windows 世界中*唯一*的脚本工具。如果你想管理与 Windows 相关的功能（例如，Microsoft 365 云设置或 Microsoft\
    \ Active Directory），这种语言是不可替代的。\n\n与其他 shell 相比，PowerShell 最大的技术成就是其面向对象的方法。PowerShell\
    \ 命令不返回文本，而是返回真正的对象。这为后续处理开辟了全新的选项。与 Bash 相比，PowerShell 的语法更加合乎逻辑（但仍然不总是直观的，而且无论如何都相当冗长）。\n\
    \n在本章中，我将让你对 PowerShell 的基本功能有一个初步印象。随后的章节将提供大量示例。\n\n> **执行策略**\n\n出于安全原因，公司计算机上通常禁止执行（未签名的）脚本。此限制的原因和各种设置选项在\
    \ [第 4.5 节](#section-4.5) 中描述。\n\n## 4.1 安装\n\nPowerShell 在当前 Windows 版本上是预装的，但很少是最新版本。要找出已安装\
    \ PowerShell 的版本，你需要在**开始**菜单中搜索“终端”并运行同名程序。（对于较旧的 Windows 版本，搜索 *PowerShell*\
    \ 即可找到。）"
