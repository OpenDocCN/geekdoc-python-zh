- md: "# Sample file json-to-sql-server.ps1\nImport-Module SQLServer\n\n# connection\
    \ to SQL Server\n$connectionString = \"Server=.\\sqlexpress01;Database=mydb;\"\
    \ +\n                    \"Trusted_Connection=true;Encrypt=false\"\n\n# name of\
    \ the table and columns\n$tableName = \"employees\"\n$columns = \"FirstName\"\
    , \"LastName\", \"DateOfBirth\", \"Street\",\n           \"City\", \"State\",\
    \ \"Gender\", \"Email\", \"Job\", \"Salary\"\n\n$sql = \"INSERT INTO $tablename\
    \ (\" + ($columns -Join \", \") + \") \"\n$sqlcmds = \"\"\n\n# read JSON file\
    \ and convert it to PowerShell objects\n$jsonFilePath = \"employees.json\"\n$json\
    \ = Get-Content $jsonFilePath | ConvertFrom-Json\n\n# loop through all array elements\
    \ (data records)\nforeach ($record in $json) {\n    $values = \"\"\n    # loop\
    \ through all columns\n    foreach ($column in $columns) {\n        if ($values)\
    \ {\n            $values += \", \"\n        }\n        $values += \"'\" + $record.$column\
    \ + \"'\"\n    }\n    $sqlcmds += $sql + \"`nVALUES(\" + $values + \");`n\"\n\
    }\n\n# run SQL commands\nInvoke-Sqlcmd -ConnectionString $connectionString -Query\
    \ $sqlcmds\n\n## Chapter 20\nScripting in the Cloud\n\nThe cloud is large and\
    \ diverse—in this respect, the title of this chapter is presumptuous. One could\
    \ write an entire book on the subject, covering different cloud models, providers,\
    \ and programming variants.\n\nAt this point, I will focus on the *Simple Storage\
    \ Service (S3)* of *Amazon Web Services (AWS)*. This service has established itself\
    \ as a cost-effective way to store files. Two major options for usage exist: You\
    \ can store files there that are publicly accessible (for example, to relieve\
    \ the load on your own web server), or you can use S3 as a place for backups or\
    \ rarely needed files. At the same time, you’ll need to keep an eye on the costs:\
    \ Depending on the offer, the transfer or the actual storage can be the decisive\
    \ factor.\n\nTwo great libraries for controlling AWS S3 functions are available:\
    \ the AWS command-line interface (CLI) for Bash scripts and the AWS module for\
    \ PowerShell scripts. This chapter describes both variants.\n\n> **Prerequisites\
    \ for This Chapter**\n\nTo benefit from this chapter, you’ll need good knowledge\
    \ of Bash or PowerShell. You’ll also need some basic knowledge of AWS S3: In particular,\
    \ you need to know what is meant by the term “buckets” and how user management,\
    \ specifically *identity and access management (IAM)*, works.\n\nThe two examples\
    \ presented in this chapter are based on techniques that are described in [Chapter\
    \ 15] and [Chapter 17], respectively. In this respect, it is advisable you review\
    \ these two chapters first.\n\n### 20.1 AWS CLI\n\nThe AWS CLI enables you to\
    \ control AWS functions at the command level. The CLI can basically be installed\
    \ on all common platforms. However, in the following sections, I assume that you\
    \ use Linux or macOS and want to develop your scripts in Bash.\n\nDon’t worry,\
    \ PowerShell fans aren’t shorted and can just scroll down to [Section 20.3].\n\
    \n#### 20.1.1 Installation on Linux and macOS\n\nAWS CLI downloads and installation\
    \ guides for all platforms can be found at https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html.\n\
    \nOn Linux, you must download the ZIP file, unpack the archive, and run the installation\
    \ script. The `aws` command will be stored in the `/usr/local/bin` directory and\
    \ should be executable there without any changes to `PATH`. If you want to update\
    \ an existing installation, you must pass the `--update` option to the `install`\
    \ command.\n\n```\n$ curl https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip\
    \ \\\n    -o \"awscliv2.zip\"\n$ unzip awscliv2.zip\n$ sudo ./aws/install\n$ aws\
    \ --version\naws-cli/2.11.11 Python/3.11.2 ...\n```\n\n> **Trouble with cron**\n\
    On some Linux distributions, `/usr/local/bin` is not included in the `PATH` variable\
    \ relevant to cron jobs. In that case, calling `aws` in cron jobs will fail. One\
    \ solution might be to create a link from `/usr/bin/aws` to `/usr/local/bin/aws`,\
    \ or to always specify the full path of the `aws` command in the script.\n\nFor\
    \ macOS, Amazon provides a PKG installer. The installation process can be completed\
    \ with a few clicks. Again, the `aws` command is installed in the `/usr/local/bin`\
    \ directory.\n\n#### 20.1.2 Configuration\n\nFor the following examples, you'll\
    \ need an AWS user that has access rights to one or more buckets. Once you've\
    \ set up a user in the AWS web interface under **Identity and Access Management**\
    \ and assigned an access key, you should run `aws configure`. This command asks\
    \ for the credentials and stores them in the local configuration files `.aws/config`\
    \ and `.aws/credentials`. The run `aws configure` in the account under which you\
    \ want your scripts to run later. If these scripts are backup scripts that require\
    \ `root` privileges, `aws configure` must also be run in the `root` account.\n\
    \n```\n$ aws configure\n\nAWS Access Key ID [None]:    AKxxxxxxxx\nAWS Secret\
