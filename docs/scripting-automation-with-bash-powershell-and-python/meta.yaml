    # Chapter 21

    Virtual Machines


    As long as you use virtual machines only sporadically, automation does not make
    any sense. You may want to consider using a tool for faster setup of new virtual
    machines (such as Vagrant).

    The situation is completely different if you want to automatically create, configure,
    maintain, and analyze a large number of virtual machines, for example, for a lab
    (teaching), for cluster operation (science), or for scalable deployment (container
    or server operation). Of course, there are all kinds of special tools available
    for this type of use cases, from OpenStack to Kubernetes. However, getting used
    to these monster programs is complicated and requires intensive training. For
    simple tasks, a few small scripts are often sufficient.

    The scripts in this chapter refer to the Kernel-based Virtual Machine (KVM) for
    Linux and Microsoft Hyper-V for Windows virtualization systems.


    > **Prerequisites for This Chapter**

    In addition to a basic knowledge of Bash or PowerShell, you’ll need a basic understanding
    of the relevant virtualization system and of the underlying network technology
    for this chapter.

    One of the examples uses the `cut`, `grep`, and `sed` commands and applies regular
    expressions to modify network configuration files. I covered the related basic
    principles in Chapter 8 and in Chapter 9.

    The SSH authentication with keys also plays a role in the examples. If necessary,
    you should take another look at Chapter 12.


    # 21.1 Setting Up and Running Virtual Machines (KVMs)


    The starting point for the following scripts is an Ubuntu server. The KVM virtualization
    system, the `virsh` command from the `libvirt-clients` package, and the `virt-clone`
    command from the package of the same name are installed there. The goal is to
    run multiple similar virtual machines cloned from an existing virtual machine
    named `vm-base`. The `vm-base` output system has three network interfaces and
    four virtual disks.'
- md: "## 21.1.1 Cloning Virtual Machines\n\n`make-vms.sh` 脚本需要两个数字参数。它会从起始值循环到结束值，并创建名为\
    \ `vm-<nn>` 的虚拟机。因此，`make-vms.sh 10 29` 命令会创建 20 个名为 `vm-10` 到 `vm-29` 的虚拟机。\n\
    \n脚本首先检查是否传递了两个参数。在开始克隆之前，脚本会确保原始虚拟机（克隆基础系统，`orig` 变量）已关闭。它会分析通过 `virsh list`\
    \ 生成的所有运行中虚拟机的列表。\n\n`virt-clone` 会使用 `--file` 指定的文件名和 `--mac` 指定的 *媒体访问控制 (MAC)*\
    \ 地址（用于标识网络设备）自动创建所需的虚拟磁盘。但是，这些磁盘始终使用 RAW 镜像格式。随后的 `qemu-img` 命令会将镜像文件转换为更高效的\
    \ QCOW2 格式。\n\n```\n# Sample file make-vms.sh\nif [ $# -ne 2 ]; then\n    echo\
    \ \"usage: make-vms.sh <start> <end>\"\n    exit 1\nfi\nvmstart=$1\nvmend=$2\n\
    orig='vm-base'    # base VM to clone\n\n# shut down clone base system\nresult=$(virsh\
    \ list | grep $orig)\nif [ ! -z \"$result\" ]; then\n    echo \"shutting down\
    \ $orig\"\n    virsh shutdown $orig\n    sleep 10\nfi\n\n# create VMs\nfor ((\
    \ nr=$vmstart; nr<=$vmend; nr++ )); do\n    echo \"create vm-$nr\"\n    disk1=/var/lib/libvirt/images/vm-$nr-disk1.qcow2\n\
    \    disk2=/var/lib/libvirt/images/vm-$nr-disk2.qcow2\n    disk3=/var/lib/libvirt/images/vm-$nr-disk3.qcow2\n\
    \    disk4=/var/lib/libvirt/images/vm-$nr-disk4.qcow2\n    tmpdisk=/var/lib/libvirt/images/tmpdisk.qcow2\n\
    \    virt-clone --name \"vm-$nr\" --original $orig \\\n        --mac 52:54:00:01:00:$nr\
    \ --mac 52:54:00:02:00:$nr \\\n        --mac 52:54:00:03:00:$nr \\\n        --file\
    \ $disk1 --file $disk2 --file $disk3 --file $disk4\n```\n\n```\n# convert RAW\
    \ disks to QCOW2 disks\nqemu-img convert $disk1 -O qcow2 $tmpdisk\nmv $tmpdisk\
    \ $disk1\nqemu-img convert $disk2 -O qcow2 $tmpdisk\nmv $tmpdisk $disk2\nqemu-img\
    \ convert $disk3 -O qcow2 $tmpdisk\nmv $tmpdisk $disk3\nqemu-img convert $disk4\
    \ -O qcow2 $tmpdisk\nmv $tmpdisk $disk4\ndone\n```\n\n## 21.1.2 Starting and Shutting\
    \ Down Virtual Machines\n\n`make-vms.sh` 只创建 `vm-<nn>` 虚拟机；它不启动它们。此任务由另一个脚本 (`start-vms.sh`)\
    \ 执行，该脚本同样需要两个数字作为参数。它运行 `virsh start <name>` 来启动相应的虚拟机。\n\n```\n# Sample file\
    \ start-vms.sh\nvmstart=$1\nvmend=$2\nfor (( nr=$vmstart; nr<=$vmend; nr++ ));\
    \ do\n  echo \"start vm-$nr\"\n  virsh start \"vm-$nr\"\ndone\n```\n\n此外，还有两个类似的脚本分别用于关闭虚拟机\
    \ (`virsh shutdown`) 和删除虚拟机及其所有虚拟磁盘 (`virsh undefine --remove-all-storage`)。\n\
    \n## 21.1.3 Running Scripts on Multiple Virtual Machines\n\n一旦你让 20 台虚拟机运行起来，你可能会发现忘记了一个配置细节。现在你可以使用\
    \ SSH 登录每台虚拟机并完成配置。但当然，有一个更优雅的解决方案：你可以使用 `run-script-on-vms.sh` 通过 SSH 在所有需要的虚拟机上运行存储在\
    \ `myscript.sh` 中的命令。\n\n`run-script-on-vms.sh` 假设你的本地服务器上存在一个 SSH 密钥对，并且公钥在虚拟机的\
    \ root 账户中是已知的。为此，你必须允许 `root` 在 `vm-base` 上进行 SSH 登录，并使用 `ssh-copy-id root@basevm`\
    \ 将本地密钥复制到那里。不用说，这一步必须在克隆之前完成！你需要指定虚拟机的主机名或 IP 地址来代替 `basevm`。\n\n`run-script-on-vms.sh`\
    \ 简短得令人惊讶。基本上，它在循环中为每台虚拟机执行 `ssh root@host < myscripts.sh > result.txt` 命令。你需要在脚本中指定相应的主机名（这里是\
    \ `vm-<nn>.example.com`）或虚拟机的 IP 地址来代替 `host`。`-o StrictHostKeyChecking=no` 选项使\
    \ SSH 在首次连接到某个主机时不再询问是否信任该主机。\n\n```\n# Sample file run-script-on-vms.sh\nvmstart=$1\n\
    vmend=$2\nfor (( nr=$vmstart; nr<=$vmend; nr++ )); do\n    ssh -o StrictHostKeyChecking=no\
    \ \\\n        root@vm-$nr.example.com 'bash -s' \\\n        < myscript.sh > results-$nr.txt\n\
    done\n```\n\n## 21.2 Automating the Network Configuration (KVMs)\n\n“克隆”虚拟机意味着源系统的所有属性都被保留。因此，所有配置文件也会被克隆。在大多数情况下，这正是你想要的，但也有例外。其中一个例外与静态网络配置有关。只要网络适配器不是通过\
    \ DHCP 自动获取地址，就必须调整每台虚拟机的网络配置文件，否则会发生网络冲突。\n\n此任务由另一个脚本执行，但该脚本不在虚拟化主机上，而是在虚拟机内部。因此，必须在克隆基础系统（根据前面示例的命名，在\
    \ `vm-base` 中）中有一个脚本，该脚本在虚拟机或其克隆启动时执行。\n\n在我教授的 Linux 课程设置中，虚拟机与 Red Hat Enterprise\
    \ Linux (RHEL) 9 兼容。（我使用 AlmaLinux，但 RHEL 9、Oracle Linux 9 或 Rocky Linux 9 在这方面的工作方式完全相同。）`vm-base`\
    \ 虚拟机包含一个名为 `/etc/myscripts/setup-vm-network` 的脚本，该脚本在每次启动过程中执行。负责此任务的文件是 `/etc/rc.d/rc.local`，其内容如下：\n\
    \n```\n#!/bin/bash\ntouch /var/lock/subsys/local\n. /etc/myscripts/setup-vm-network\n\
    ```\n\n你必须使用 `chmod +x /etc/rc.d/rc.local` 使此文件可执行，以便系统会考虑它。\n\n## 21.2.1 Starting\
    \ Point\n\n`setup-vm-network` Bash 脚本假设存在两个网络适配器的配置文件：\n\n`/etc/NetworkManager/system-connections/enp1s0.nmconnection`\n\
    `/etc/NetworkManager/system-connections/enp7s0.nmconnection`\n\n这些文件使用 Linux NetworkManager\
    \ 语法，并包含以下行（以及其他内容）：\n\n```\n# static IPv4 configuration with 192.168.122.1 as\
    \ gateway\naddress1=192.168.122.27/24,192.168.122.1\n# static IPv6 configuration\
    \ with 2a01:abce:abce::2 as gateway\naddress1=2a01:abcd:abcd::27/64,2a01:abce:abce::2\n\
    ```\n\n这些文件应进行自定义，以便每台虚拟机都有一个唯一的 IPv4 和 IPv6 地址。为此，会分析第一个网络适配器 MAC 地址的最后两位十六进制数。例如，如果\
    \ MAC 地址是 `52:54:00:01:00:27`，则虚拟机应使用以下 IP 地址：\n\n- IPv4: 192.168.122.27\n- IPv6:\
    \ 2a01:abcd:abce::27\n\n在脚本的开头几行，初始化了一些变量。然后，脚本分析 `/sys/class/net/enp1s0/address`\
    \ 系统文件，该文件包含第一个适配器的 MAC 地址。`cut` 从中提取第六个十六进制组。`if` 语句会消除前导零，例如，它简单地将 `07` 变成 `7`。\n\
    \n`ipv4old` 或 `ipv4new` 变量以及 `ipv6old` 或 `ipv6new` 包含先前 IP 地址和所需正确 IP 地址的模式。如果脚本通过\
    \ `grep` 检测到当前网络配置与所需地址不匹配，则两个配置文件都将使用 `sed` 进行修改。简单来说，`sed` 命令具有以下效果：\n\n- `conffile1`:\
    \ `192.168.122.*/24` 被替换为 `192.168.122.<nn>/24`\n- `conffile2`: `2a01:abcd:abcd::*/64`\
    \ 被替换为 `2a01:abcd:abcd::<nn>/64`\n\n接下来，脚本删除 `/etc/machine-id` 文件，然后使用一个随机 ID\
    \ 重新设置它。此文件也与网络配置有关。它被 NetworkManager（一个 Linux 系统组件）分析，并用于生成 IPv6 链路本地单播地址 (fe80-xxx)。如果所有虚拟机具有相同的内部\
    \ ID 号，那么单播地址也会相同，即使 IPv6 配置正确，也会发生地址冲突。\n\n如果需要，你当然可以向脚本添加更多功能，例如，为 OpenSSH 服务器生成新密钥或设置主机名。"
