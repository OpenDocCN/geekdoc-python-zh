- img_proc: true
  md: 'small, but that’s 256 bits. For symmetric methods, 128 bits are already considered
    sufficiently secure.)


    ```

    $ openssl rand 32 > mykey

    ```


    If openssl is not available to you, the following command will also work on Linux:


    ```

    $ dd if=/dev/random of=mykey bs=16 count=1

    ```


    As I have already clarified in a previous chapter: The key file is (pun intended)
    the key to security. On my servers, I keep such files in a directory that can
    only be read by the root user and use chown root:root mykey and chmod 600 to ensure
    that really nobody except root is allowed to read the file. (Also remember to
    keep a backup of your key in a safe place! Should your server including the key
    file get lost—for example due to a hardware defect—you can never decrypt the encrypted
    backup files in the cloud again.)


    To encrypt or decrypt a key, you can use the gpg command. Because numerous options
    must be passed in each case, the best way is to wrap the call into two tiny scripts:


    ```

    # Sample file mycrypt.sh

    # usage: mycrypt.sh < plain > encrypted

    gpg -c -q --batch --cipher-algo AES256 --compress-algo none \n  --passphrase-file
    /path/to/mykey


    # Sample file myuncrypt.sh

    # usage: myuncrypt.sh < encrypted > plain

    gpg -d --batch --no-tty -q --cipher-algo AES256 \n  --compress-algo none --passphrase-file
    /path/to/mykey

    ```


    Let’s briefly explain some of these options:


    +   - -c (symmetric crypt) encrypts standard input and writes to standard output.

    - -d (symmetric decrypt) decrypts the standard input and writes to the standard
    output.

    - -q (quiet) suppresses status messages.

    - --batch activates the batch mode (no interactive queries).

    - --cipher-algo sets the encryption algorithm.

    - --compress-algo sets the compression algorithm.

    - --passphrase-file specifies from which file gpg should read the key.


    You can test the two scripts in the following way:


    ```

    $ ./mycrypt < readme.txt > readme.crypt

    $ ./myuncrypt < readme.crypt > readme.copy

    $ diff readme.txt readme.copy

    ```'
