    # Chapter 7


    # cmdlets for PowerShell


    This chapter presents a compact compilation of the most important cmdlets—a kind
    of basic PowerShell vocabulary for interactive operation and for script programming.
    If you have had years of experience in PowerShell, you can safely skip this chapter.

    Besides the preinstalled cmdlets, countless PowerShell extensions are available
    on the internet. The NuGet package manager, which I will introduce to you in Section
    7.8, helps with the installation of these additional modules.

    The chapter ends with a reference of the main aliases. These shortcuts save a
    lot of typing when using PowerShell interactively and allow for efficiency similar
    to what is available on Linux.


    > **Prerequisites for This Chapter**

    By its nature, reading this chapter makes sense only if you''re familiar with
    the basic PowerShell concepts presented in Chapter 4, Section 4.4, such as chaining
    cmdlets using the pipe operator (|).


    # 7.1 Directories and Files


    You can use the following commands to set your home directory (*My Documents*)
    as the working directory, create a new directory there, and change it. Later,
    you can leave the new directory and then delete it.


    ```

    > Set-Location                # set the home directory as working directory

    > Get-Location                # show its location


    Path

    ----

    C:\Users\kofler

    > New-Item -ItemType "directory" subdir   # create new directory

    > Set-Location subdir          # now subdir is the working directory

    > Set-Location ..              # get back into your home directory

    > Remove-Item subdir           # delete subdir

    ```'
  - "[PAGE 223]\n\nFor all cmdlets used in this listing, aliases or functions are\
    \ available that allow for the completion of these actions with less typing. Since\
    \ I recommend avoiding these short-hand notations in your own scripts, I always\
    \ use the original cmdlet name in all further examples in this chapter.\n\n```\n\
    > cd                # cd is an alias for Set-Location\n> pwd               # pwd\
    \ is an alias for Get-Location\n> md subdir         # md is an alias for the mkdir\
    \ function\n> cd subdir\n> cd ..\n> rmdir subdir      # rmdir is an alias for\
    \ Remove-Item\n```\n\nNew-Item also enables you to create a group of nested directories.\
    \ Although directories are separated by \\ in Windows, cmdlets also accept / as\
    \ the directory separator.\n\n```\n> New-Item -ItemType \"directory\" images\\\
    2023\\12\n> New-Item -ItemType \"directory\" images/2023/12  # equivalent\n```\n\
    \n# 7.1.1 Listing, Copying, Moving, and Deleting Files\n\nIn the following listing,\
    \ the tst directory is created first. In that directory, the current time is stored\
    \ in the now.txt file. This file is copied first, then the copy is renamed. Get-ChildItem\
    \ lists the text files that now exist. Remove-Item cleans up again at the end.\n\
    \n```\n                                # creates the tst directory\n> New-Item\
    \ -ItemType \"directory\" tst\n> Set-Location tst              # changes there\n\
    > Get-Date > now.txt             # saves date and time\n                     \
    \           # to now.txt\n> Copy-Item now.txt copy.txt     # creates a copy of\
    \ now.txt\n> Move-Item copy.txt backup.txt  # renames the copy\n> Get-ChildItem\
    \ *.txt            # lists all *.txt files\n```\n\nMode    LastWriteTime     \
    \    Length Name\n----    -------------         ------ ----\n-a---   24.01.2023\
    \ 12:29         40 backup.txt\n-a---   24.01.2023 12:29         40 now.txt\n\n\
    ```\n> Remove-Item *.txt              # deletes all *.txt files\n```\n\nNote that\
    \ files or directories that are deleted using Remove-Item do not go to the recycle\
    \ bin but are instead irrevocably deleted!\n\nTo test whether a file exists, you\
    \ can use Test-Path. The cmdlet returns True or False.\n\n```\n> Test-Path file1.txt\n\
    False\n```"
- md: "You can use `Copy-Item` or `Move-Item` to process multiple files at once. However,\
    \ keep in mind that the source files must either be specified as a pattern or\
    \ be separated by commas. Note that it is not allowed to list multiple files without\
    \ commas! You can use `-Recurse` to copy entire directory trees. If the target\
    \ directory does not exist yet (for example, `dir2` in the previous example),\
    \ it will be created automatically.\n\n```\n> Copy-Item *.txt another-directory\
    \    # OK\n> Copy-Item file1.txt, file2.txt a-d    # also OK\n> Copy-Item file1.txt\
    \ file2.txt a-d     # Error!\n> Copy-Item -Recurse dir1 dir2          # OK\n```\n\
    \n`Get-ChildItem` or its short versions `dir`, `gci`, and `ls` (only on Windows)\
    \ lists files and directories in the specified or current directory. With the\
    \ `-Recurse` option, the cmdlet also takes all subdirectories into account. With\
    \ the `-File` option, `Get-ChildItem` determines only files; with `-Directory`,\
    \ only directories.\n\nBy default, in addition to the filename, the `Get-ChildItem`\
    \ displays the mode, the time of the last modification, and the file size. Behind\
    \ the scenes, however, `Get-ChildItem` returns objects with much richer data.\
    \ It is up to you to evaluate this data. In the following example, `Where-Object`\
    \ only considers `*.exe` files in the `Downloads` directory that are larger than\
    \ 1 MB. `Select-Object` selects the filename, size, and time of the last access\
    \ from the result objects. The `-gt` option stands for *greater than*.\n\n```\n\
    > Get-ChildItem Downloads\\*.exe |\n    Where-Object {$_.Length -gt 1000000} |\n\
    \    Select-Object Name, Length, LastAccessTime\n```\n\n```\nName            \
    \                        Length  LastAccessTime\n----                        \
    \            ------  -------------\nemacs-28.1-installer.exe                47972467\
    \ 22.01.2023 08:09:58\nnpp.8.4.4.Installer.x64.exe             4533912  24.01.2023\
    \ 08:44:01\nVSCodeUserSetup-x64-1.69.2.exe          81424833  2.02.2023 12:47:04\n\
    ...\n```\n\n> **Universal Items**\nIn this section, I have presented `New-Item`,\
    \ `Copy-Item`, and so on as commands for manipulating files and directories. In\
    \ fact, these cmdlets are much more flexible and, depending on the context or\
    \ options you choose, can also process completely different objects, such as registry\
    \ entries or certificates.\n\n## 7.1.2 Reading and Writing Text\n\n`Get-Content`\
    \ (alias `cat`) outputs the specified file completely in the terminal:\n\n```\n\
    > Get-Content todo.md\n```\n\nFor longer files, scrolling through the text using\
    \ the cursor keys is convenient. On Linux, `less` is certainly one of the most\
    \ frequently called commands—all the more surprising then that PowerShell offers\
    \ only rudimentary functions in this regard: `Out-Host -Paging` allows you to\
    \ scroll one line further with `Enter` and one page further with `Space`, but\
    \ there is no way back, let alone a search function.\n\n```\n> Get-Content tst.csv\
    \ | Out-Host -Paging\n```\n\nUsing `Out-Host` (alias `oh`), you can also study\
    \ extensive cmdlet results page by page:\n\n```\n> Get-Process | Out-Host -Paging\n\
    ```\n\nUltimately, it is quite easy to look only at the first or last result objects\
    \ of a cmdlet:\n\n```\n# view the first five / the last ten processes\n> Get-Process\
    \ | Select-Object -First 5\n> Get-Process | Select-Object -Last 10\n```\n\nTo\
    \ save the results of a cmdlet in a text file, you can simply use output redirection.\
    \ Note that the underlying objects will not be saved—only the text that you usually\
    \ see in the terminal.\n\n```\n> Get-Process > processes.txt\n```\n\n`Set-Content`\
    \ enables you to write a string into a text file. If the file already exists,\
    \ it will be overwritten. You should pay attention to the correct order of the\
    \ parameters; alternatively, you can use options.\n\n```\n> Set-Content out.txt\
    \ \"some text\"\n> Set-Content -Value \"some text 2\" out.txt  # equivalent\n\
    ```\n\nTo add text to an existing file, you can use `Add-Content`, as in the following\
    \ example:\n\n```\n> Add-Content out.txt 'second line'\n```\n\n`Clear-Content`\
    \ deletes the content of a file. However, the file itself remains intact (file\
    \ size: 0 bytes). `Clear-Content` raises an error if the specified file does not\
    \ exist.\n\n```\n> Clear-Content out.txt\n```\n\n## 7.1.3 Inputting and Outputting\
    \ Text\n\nTo input text in a script, you must use `Read-Host`. Note that the cmdlet\
    \ automatically adds a colon to the passed text. To output a string again (with\
    \ or without variables), you can use `Write-Output` (alias `echo`):\n\n```\n>\
    \ $firstname = Read-Host \"First name\"\n\nFirst name: Michael\n\n> Write-Output\
    \ $firstname\n\nMichael\n\n> Write-Output \"Hello, $firstname!\"\n\nHello, Michael!\n\
    ```\n\n## 7.2 Finding Files\n\nTo search for files that have certain properties,\
    \ you can proceed as in the previous example: Create a result list via `Get-ChildItem`\
    \ and then use `Where-Object` to select the objects that match your expectations.\
    \ The condition must be formulated in curly brackets. Within this formulation,\
    \ `$_` refers to the object currently being processed.\n\nIn the following listing,\
    \ we first create a variable that contains the date from 60 days ago. `Get-ChildItem`\
    \ searches the current directory and all subdirectories for all `*.pdf` files.\
    \ `Where-Object`, which can be abbreviated quite elegantly with `?`, filters out\
    \ the PDF documents that were created or modified in the last 2 months. (`-ge`\
    \ stands for *greater than or equal to*.)\n\n```\n> $twoMonthsAgo = (Get-Date).AddDays(-60)\n\
    > Get-ChildItem -Recurse *.pdf |\n    ? {$_.LastWriteTime -ge $twoMonthsAgo}\n\
    ```\n\nYou can also combine multiple conditions. The next command searches the\
    \ *Downloads* directory for files larger than 1 MB that have not been read for\
    \ about 2 months:\n\n```\n> Get-ChildItem -Recurse Downloads |\n    ? {$_.Length\
    \ -gt 100000 -and\n        $_.LastAccessTime -lt $twoMonthsAgo}\n```\n\nIf you\
    \ want to include multiple file identifiers, a best practice is to use the `-Include`\
    \ option and pass the desired file types, separated by commas:\n\n```\n> Get-ChildItem\
    \ -Recurse -Include *.png, *.jpg, *.jpeg, *.tif ...\n```\n\nAlternatively, you\
    \ can use `-Exclude` to exclude from the result files that match the specified\
    \ pattern. Note that `-Include` and `-Exclude` only work in combination with `-Recurse`.\n\
    \n### 7.2.1 Searching Text Files\n\n`Get-ChildItem`, combined with `Where-Object`,\
    \ only considers the metadata of files (i.e., name, type, size, etc.) but not\
    \ the content. `Select-String` allows you to search text files. In the simplest\
    \ case, you can apply `Select-String` directly to files. The following command\
    \ finds all logging files in the current directory that contain the error text\
    \ in upper-case and lowercase:\n\n```\n> Select-String error *.log\n```\n\nHowever,\
    \ unlike `Get-ChildItem`, `Select-String` does not provide any recursive file\
    \ search options. Thus, the two commands are often combined. In the following\
    \ example, `Get-ChildItem` searches for `*.txt` files in the current directory\
    \ and in all subdirectories. `Select-String` looks at the contents of these files\
    \ and lists all occurrences.\n\n```\n> Get-ChildItem -Recurse -Include *.txt |\
    \ Select-String license\n\ninit/readme.txt:6:This work is licensed under ...,\
    \ see\ninit/readme.txt:7:https://creativecommons.org/licenses/by/4.0/\n```\n\n\
    Usually, you're not interested in the match details, but just want to see a list\
    \ of files that have been found. Each `Select-String` result is a `MatchInfo`\
    \ object. Its `Path` property contains the filename. By forming groups of such\
    \ `MatchInfo` objects and then displaying the name of each group, you can get\
    \ only the filenames:\n\n```\n> Get-ChildItem -Recurse *.txt | Select-String license\
    \ |\n    Group-Object Path | Select-Object Name\n\ninit/readme.txt\nother/gpl.txt\n\
    ...\n```\n\nThe behavior of `Select-String` can be influenced by various options.\
    \ I want to mention only the most important four here:\n\n- `-CaseSensitive` makes\
    \ the search pattern case sensitive.\n- `-List` shows only the first match of\
    \ the search pattern. This option provides clearer results when a large number\
    \ of matches is found. This option also speeds up the evaluation if, as in the\
    \ previous example, only the files that contain a hit are to be listed.\n- `-NotMatch`\
    \ returns matches (without `-List`, for each line) that do *not* contain the search\
    \ pattern.\n- `-Quiet` returns only `True` or `False`, depending on whether the\
    \ pattern was recognized.\n\n`Select-String` cannot count the number of matches.\
    \ For a single file, you can evaluate the `Matches` property of the resulting\
    \ object. The following statement counts how many times an error occurs in the\
    \ `access.log` file:"
  mdcn: "你可以使用 `Copy-Item` 或 `Move-Item` 来一次处理多个文件。但是，请记住，源文件必须指定为模式或用逗号分隔。请注意，不允许列出多个文件而不使用逗号！你可以使用\
    \ `-Recurse` 来复制整个目录树。如果目标目录尚不存在（例如，上一个示例中的 `dir2`），它将被自动创建。\n\n```\n> Copy-Item\
    \ *.txt another-directory    # OK\n> Copy-Item file1.txt, file2.txt a-d    # also\
    \ OK\n> Copy-Item file1.txt file2.txt a-d     # Error!\n> Copy-Item -Recurse dir1\
    \ dir2          # OK\n```\n\n`Get-ChildItem` 或其简写版本 `dir`、`gci` 和 `ls`（仅在 Windows\
    \ 上）列出指定或当前目录中的文件和目录。使用 `-Recurse` 选项时，该 cmdlet 也会考虑所有子目录。使用 `-File` 选项时，`Get-ChildItem`\
    \ 仅确定文件；使用 `-Directory` 时，仅确定目录。\n\n默认情况下，除了文件名外，`Get-ChildItem` 还会显示模式、最后修改时间和文件大小。然而，在后台，`Get-ChildItem`\
    \ 返回的对象包含更丰富的数据。如何评估这些数据取决于你。在下面的示例中，`Where-Object` 仅考虑 `Downloads` 目录中大于 1 MB\
    \ 的 `*.exe` 文件。`Select-Object` 从结果对象中选择文件名、大小和最后访问时间。`-gt` 选项代表 *大于*。\n\n```\n\
    > Get-ChildItem Downloads\\*.exe |\n    Where-Object {$_.Length -gt 1000000} |\n\
    \    Select-Object Name, Length, LastAccessTime\n```\n\n```\nName            \
    \                        Length  LastAccessTime\n----                        \
    \            ------  -------------\nemacs-28.1-installer.exe                47972467\
    \ 22.01.2023 08:09:58\nnpp.8.4.4.Installer.x64.exe             4533912  24.01.2023\
    \ 08:44:01\nVSCodeUserSetup-x64-1.69.2.exe          81424833  2.02.2023 12:47:04\n\
    ...\n```\n\n> **通用项**\n在本节中，我将 `New-Item`、`Copy-Item` 等介绍为用于操作文件和目录的命令。实际上，这些\
    \ cmdlet 灵活得多，根据你选择的上下文或选项，它们也可以处理完全不同的对象，例如注册表项或证书。\n\n## 7.1.2 读取和写入文本\n\n`Get-Content`（别名\
    \ `cat`）在终端中完全输出指定的文件：\n\n```\n> Get-Content todo.md\n```\n\n对于较长的文件，使用光标键滚动浏览文本很方便。在\
    \ Linux 上，`less` 无疑是调用最频繁的命令之一——因此更令人惊讶的是，PowerShell 在这方面只提供了基本功能：`Out-Host -Paging`\
    \ 允许你按 `Enter` 向下滚动一行，按 `Space` 向下滚动一页，但无法返回，更不用说搜索功能了。\n\n```\n> Get-Content\
    \ tst.csv | Out-Host -Paging\n```\n\n使用 `Out-Host`（别名 `oh`），你也可以逐页研究广泛的 cmdlet\
    \ 结果：\n\n```\n> Get-Process | Out-Host -Paging\n```\n\n最终，只查看 cmdlet 的前几个或最后几个结果对象相当容易：\n\
    \n```\n# 查看前五个/最后十个进程\n> Get-Process | Select-Object -First 5\n> Get-Process |\
    \ Select-Object -Last 10\n```\n\n要将 cmdlet 的结果保存到文本文件中，你可以简单地使用输出重定向。请注意，底层对象不会被保存——只有你通常在终端中看到的文本。\n\
    \n```\n> Get-Process > processes.txt\n```\n\n`Set-Content` 使你能够将字符串写入文本文件。如果文件已存在，它将被覆盖。你应该注意参数的正确顺序；或者，你可以使用选项。\n\
    \n```\n> Set-Content out.txt \"some text\"\n> Set-Content -Value \"some text 2\"\
    \ out.txt  # 等效\n```\n\n要向现有文件添加文本，你可以使用 `Add-Content`，如以下示例所示：\n\n```\n> Add-Content\
    \ out.txt 'second line'\n```\n\n`Clear-Content` 删除文件的内容。但是，文件本身保持不变（文件大小：0 字节）。如果指定的文件不存在，`Clear-Content`\
    \ 会引发错误。\n\n```\n> Clear-Content out.txt\n```\n\n## 7.1.3 输入和输出文本\n\n要在脚本中输入文本，你必须使用\
    \ `Read-Host`。请注意，该 cmdlet 会自动在传递的文本后添加冒号。要再次输出字符串（带或不带变量），你可以使用 `Write-Output`（别名\
    \ `echo`）：\n\n```\n> $firstname = Read-Host \"First name\"\n\nFirst name: Michael\n\
    \n> Write-Output $firstname\n\nMichael\n\n> Write-Output \"Hello, $firstname!\"\
    \n\nHello, Michael!\n```\n\n## 7.2 查找文件\n\n要搜索具有某些属性的文件，你可以按照前面的示例进行：通过 `Get-ChildItem`\
    \ 创建结果列表，然后使用 `Where-Object` 选择符合你期望的对象。条件必须在花括号中制定。在此公式中，`$_` 指代当前正在处理的对象。\n\n\
    在下面的列表中，我们首先创建一个包含 60 天前日期的变量。`Get-ChildItem` 在当前目录和所有子目录中搜索所有 `*.pdf` 文件。`Where-Object`（可以非常优雅地缩写为\
    \ `?`）过滤出在最近 2 个月内创建或修改的 PDF 文档。（`-ge` 代表 *大于或等于*。）\n\n```\n> $twoMonthsAgo =\
    \ (Get-Date).AddDays(-60)\n> Get-ChildItem -Recurse *.pdf |\n    ? {$_.LastWriteTime\
    \ -ge $twoMonthsAgo}\n```\n\n你也可以组合多个条件。下一个命令在 *Downloads* 目录中搜索大于 1 MB 且大约 2\
    \ 个月未读取的文件：\n\n```\n> Get-ChildItem -Recurse Downloads |\n    ? {$_.Length -gt\
    \ 100000 -and\n        $_.LastAccessTime -lt $twoMonthsAgo}\n```\n\n如果你想包含多个文件标识符，最佳实践是使用\
    \ `-Include` 选项并传递所需的文件类型，用逗号分隔：\n\n```\n> Get-ChildItem -Recurse -Include *.png,\
    \ *.jpg, *.jpeg, *.tif ...\n```\n\n或者，你可以使用 `-Exclude` 从结果中排除与指定模式匹配的文件。请注意，`-Include`\
    \ 和 `-Exclude` 仅与 `-Recurse` 结合使用时才有效。\n\n### 7.2.1 搜索文本文件\n\n`Get-ChildItem`\
    \ 与 `Where-Object` 结合使用，仅考虑文件的元数据（即名称、类型、大小等），而不考虑内容。`Select-String` 允许你搜索文本文件。在最简单的情况下，你可以直接将\
    \ `Select-String` 应用于文件。以下命令在当前目录中查找所有包含大写和小写错误文本的日志文件：\n\n```\n> Select-String\
    \ error *.log\n```\n\n然而，与 `Get-ChildItem` 不同，`Select-String` 不提供任何递归文件搜索选项。因此，这两个命令经常组合使用。在下面的示例中，`Get-ChildItem`\
    \ 在当前目录和所有子目录中搜索 `*.txt` 文件。`Select-String` 查看这些文件的内容并列出所有出现的位置。\n\n```\n> Get-ChildItem\
    \ -Recurse -Include *.txt | Select-String license\n\ninit/readme.txt:6:This work\
    \ is licensed under ..., see\ninit/readme.txt:7:https://creativecommons.org/licenses/by/4.0/\n\
    ```\n\n通常，你对匹配细节不感兴趣，只想看到已找到文件的列表。每个 `Select-String` 结果都是一个 `MatchInfo` 对象。它的\
    \ `Path` 属性包含文件名。通过将这些 `MatchInfo` 对象分组，然后显示每个组的名称，你可以只获取文件名：\n\n```\n> Get-ChildItem\
    \ -Recurse *.txt | Select-String license |\n    Group-Object Path | Select-Object\
    \ Name\n\ninit/readme.txt\nother/gpl.txt\n...\n```\n\n`Select-String` 的行为可以通过各种选项来影响。我只想在这里提到最重要的四个：\n\
    \n- `-CaseSensitive` 使搜索模式区分大小写。\n- `-List` 仅显示搜索模式的第一个匹配项。当找到大量匹配项时，此选项提供更清晰的结果。如果像前面的示例一样，只想列出包含匹配项的文件，此选项还可以加快评估速度。\n\
    - `-NotMatch` 返回不包含搜索模式的匹配项（不带 `-List` 时，针对每一行）。\n- `-Quiet` 仅返回 `True` 或 `False`，具体取决于是否识别到该模式。\n\
    \n`Select-String` 无法计算匹配次数。对于单个文件，你可以评估结果对象的 `Matches` 属性。以下语句计算 `access.log`\
    \ 文件中发生错误的次数："
