  md: "# 10.7.1 Python\n\nThe easiest way to read INI files in Python is to use the\
    \ `ConfigParser` module. The following listing shows the intuitive application.\
    \ Note that the parser always returns strings. If you want to use port number\
    \ 8080 as a number, you must perform an appropriate conversion using `int()`.\n\
    \n```\n# Sample file read-config.py\nfrom configparser import ConfigParser\nconfig\
    \ = ConfigParser()\nconfig.read('config.ini')\nprint(config['server']['port'])\
    \  # output: 8080\n```\n\n# 10.7.2 PowerShell\n\nAlthough INI files are quite\
    \ commonly used on Windows, PowerShell lacks a cmdlet to easily read this type\
    \ of file. In many cases, you can simple use the following commands:\n\n```\n\
    > $config = Get-Content 'config.ini' |\n    Select-String '^.*=.*[^=]*$' |\n \
    \   ConvertFrom-StringData\n\n> $config.port\n8080\n```\n\n`Get-Content` reads\
    \ the file and delivers it line by line. `Select-String` uses a regular expression\
    \ to filter out all lines that match the `key = value` pattern. `ConvertFrom-StringData`\
    \ turns the key-value pairs into a hash table.\n\nHowever, this simple approach\
    \ reaches its limits when the same keys are used in different groups. If you want\
    \ to analyze complex INI files without falling into syntactical traps, you're\
    \ better off using the popular PsIni extension, available at https://www.powershellgallery.com/packages/PsIni.\n\
    \n# 10.7.3 Bash\n\nLike PowerShell, Bash lacks functions to parse INI files. In\
    \ many Linux distributions, you can use `crudini` for this purpose. However, you\
    \ must install the package of the same name beforehand. However, note that this\
    \ package is itself a Python script! `crudini` therefore only works if Python\
    \ is also installed.\n\nTo read a single value, you can simply pass the INI file,\
    \ the section name, and the key name. You can find various other types of applications\
    \ in `crudini --help`.\n\n```\n$ crudini --get config.ini server port\n8080\n\
    ```"
