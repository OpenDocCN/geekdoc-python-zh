    git push performs the first upload. The -u (set upstream) option ensures that\
    \ the mapping between the external repository for the main branch is stored permanently.\
    \ Therefore, in the future, git push without any further options will be sufficient.\n\
    \n```\n> git branch -M main\n> git remote add origin git@github.com:MichaelKofler/test1235.git\n\
    > git push -u origin main\n```\n\n```\nTo github.com:MichaelKofler/test1235.git\n\
    \ * [new branch]      main -> main\nbranch 'main' set up to track 'origin/main'.\n\
    ```\n\nThus, the first commit is stored both locally and remotely. From that moment\
    \ on, the git add, git commit, git pull and git push, git status, and git log\
    \ commands work as described earlier.\n\n# 14.2 Handling Settings and Passwords\
    \ Correctly\n\nHackers are always looking for passwords for mail, FTP, and database\
    \ servers. All too often, they find what they are looking for on GitHub, GitLab,\
    \ and other Git hosts. That's not because these platforms themselves are so insecure,\
    \ but because code files stored there that are publicly accessible might simply\
    \ contain the passwords in plain text. This vulnerability can arise if your code\
    \ looks something like the following backup script:\n\n```\n# Attention, negative\
    \ example!\n... code\nmysqldump -u root -ptopSecret wordpress > db.sql\nlftp -u\
    \ ftpuser,topSecret2 backupserver.example.com << EOF\ncd remote/dir/\nput db.sql\n\
    bye\nEOF\n... more code\n```\n\nIn this example, mysqldump first creates a backup\
    \ of the database. The password required for this step is passed directly with\
    \ the -p option. Then, lftp connects to an FTP server to store the backup there.\
    \ The password is passed with the -u option. If you store this backup script in\
    \ a Git repository, everyone who has access to the repository knows the passwords\
    \ to the MySQL and FTP servers."
