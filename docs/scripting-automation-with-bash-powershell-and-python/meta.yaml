  md: '# 5.6.3 Slicing


    The s(n) notation allows you to extract a single character from a string. n specifies
    the position of the character, where 0 stands for the first character. (This rule
    applies generally in Python: In any kind of enumeration 0 denotes the first element!)
    For negative numbers, the calculation starts from the end of the string.


    ```

    >>> s[0], s[1], s[2]    # returns the first, the second

    # and the third character

    (''P'', ''y'', ''t'')

    >>> s[-1], s[-2]        # returns the last and the penultimate

    # character

    (''!'', ''n'')

    ```


    To read multiple characters at once, Python uses s[start:end], where start indicates
    the beginning and end indicates the end of the substring. Both specifications
    are optional. The start position is specified as inclusive, but the end position
    is exclusive! Thus, s[:5] returns all characters up to and including the fifth
    character. The official name for this type of character access is slicing.


    ```

    >>> s[:]                # all

    ''Python is fun!''

    >>> s[:5]               # everything up to the fifth character

    ''Pytho''

    >>> s[5:]               # everything starting from the sixth character

    ''n is fun!''

    >>> s[5:10]             # from the sixth to the tenth character

