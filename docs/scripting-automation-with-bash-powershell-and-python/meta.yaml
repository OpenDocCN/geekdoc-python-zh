- md: "## 15.2 WordPress Backup\n\nThe starting point for the second example is a\
    \ Linux machine running a web server and a database server to implement a web\
    \ presence using WordPress. The content of the wp database, the /var/www/html/wordpress\
    \ directory, and the entire server configuration, i.e., the /etc directory, are\
    \ supposed to be backed up once a day. Compressed backups of the last 7 days should\
    \ always be kept both locally and on a second server accessible via SSH.\n\nThe\
    \ implementation is created by a Bash script that runs with root privileges. The\
    \ mysqldump command is used to back up the MySQL database by connecting to the\
    \ MySQL server with the wpbackupuser account. This account, which only includes\
    \ rights to perform backups, can be set up in MySQL in the following way:\n\n\
    ```sql\nCREATE USER wpbackupuser@localhost IDENTIFIED BY 'TopSecret123';\nGRANT\
    \ Select, Lock Tables, Show View\n    ON wp.* TO wpbackupuser@localhost;\nGRANT\
    \ Process, Reload ON *.* TO wpbackupuser@localhost;\n```\n\nTo make sure that\
    \ the script does not contain the password in plain text, it is stored in the\
    \ /root/.my.cnf file. mysqldump automatically searches for this file and analyzes\
    \ the data it contains. You should use chmod 600 .my.cnf to make sure that nobody\
    \ except root is allowed to read this file!\n\n```ini\n# in file /root/.my.cnf\n\
    [mysqldump]\nuser = wpbackupuser\npassword = TopSecret123\ndefault-character-set\
    \ = utf8\n```\n\nOnce all the prerequisites have been met, you can start programming.\
    \ Various configuration parameters are summarized in the first lines of the script.\
    \ For better readability, I have used capital letters for these variables.\n\n\
    `date +%u` generates a consecutive number for the day of the week (1 for Monday\
    \ to 7 for Sunday). This number will be integrated into the names of the backup\
    \ files.\n\n`mysqlopt` contains options for performing the backup. The behavior\
    \ of mysqldump can be controlled via countless options. I have limited myself\
    \ in this case to `--single-transaction`. This option ensures that the database\
    \ cannot change during the backup. The output of mysqldump is passed to gzip,\
    \ compressed, and finally stored in the `$dbfile` file. If the file already exists,\
    \ it will be overwritten. (This process happens for the first time when the script\
    \ runs for 8 consecutive days. So, you always have backup versions of the last\
    \ 7 days.)\n\nTo perform the backup of a WordPress installation, a short tar command\
    \ is sufficient (see also Chapter 5, Section 5.3). The WordPress directory also\
    \ contains all installed plugins, all uploaded images, and so on. As a rule, the\
    \ file created using `tar` is much larger than the MySQL backup.\n\nThe last line\
    \ of the script copies the backups, which are only stored locally for the time\
    \ being, to a second computer. Thus, all backup files are redundantly located\
    \ in two different places.\n\n```bash\n# Sample file lamp-backup.sh\nBACKUPDIR=/localbackup\n\
    DB=wp\nDBUSER=wpbackupuser\nWPDIR=/var/www/html/wordpress\nSSH=user@otherhost:wp-backup/\n\
    # MySQL-Backup\nweekday=$(date +%u)\ndbfile=$BACKUPDIR/wp-db-$weekday.sql.gz\n\
    mysqlopt='--single-transaction'\nmysqldump -u $DBUSER $mysqlopt $DB | gzip -c\
    \ > $dbfile\n\n# backup of the WordPress installation including plugins and uploads\n\
    htmlfile=$BACKUPDIR/wp-html-$weekday.tar.gz\ntar czf $htmlfile -C $WPDIR .\n\n\
    # backup of the /etc directory\netcfile=$BACKUPDIR/etc-$weekday.tar.gz\ntar czf\
    \ $etcfile -C /etc .\n\n# copy backup files to a second computer\nscp $dbfile\
    \ $htmlfile $etcfile $SSH\n```\n\nAfter you have executed the script manually,\
    \ you still need to take care of the automated call. You can design the required\
    \ line in `/etc/crontab` based on the following pattern:\n\n```crontab\n# in /etc/crontab\n\
    # run script every night at 3:00 am with root privileges\n00 3 * * * root /path/to/lamp-backup.sh\n\
    ```\n\nOnce you have set up the backup system, you should observe it for a few\
    \ days. Does the automatic cron call work? A common cause of errors is that cron\
    \ jobs often have a different `PATH` setting than the `root` account in which\
    \ you ran your tests. This possibility is especially true if you use commands\
    \ in the script that were manually installed off the usual paths. For such commands,\
    \ you may need to specify the full path.\n\nBe sure you also test if you can restore\
    \ a WordPress installation from the backup files on another computer or in a virtual\
    \ machine. What's the use of the nicest scripts if you don't realize until disaster\
    \ strikes that the backup is incomplete for some reason?\n\n**Extension: Uploading\
    \ Encrypted Backups to Amazon Web Services (AWS)**\n\nKeeping backup files on\
    \ external computers is often less secure than on the local server with regard\
    \ to their accessibility by attackers. Thus, a good idea is to encrypt backup\
    \ files before uploading them to other hosts. I'll show you how to encrypt files\
    \ and then use Simple Storage Service (S3), Amazon's cloud storage service, as\
    \ a storage location in Chapter 20, where we'll extend our most recent example\
    \ in this respect.\n\n## 15.3 SQL Server Backup\n\nThe goal of the following script\
    \ is to back up all the databases of SQL Server as compressed files in a specified\
    \ directory. For this purpose, I assume that you work on Windows. (SQL Server\
    \ can also be installed on Linux, but I did not test that scenario for this example.)\n\
    \nFor the administration of SQL Server via PowerShell scripts, you can use the\
    \ SqlServer module developed by Microsoft and available in the PowerShell Gallery:\n\
    \n```powershell\n> Install-Module SqlServer\n```\n\nA reference for all the cmdlets\
    \ in this module can be found at https://learn.microsoft.com/en-us/powershell/module/sqlserver.\n\
    \nUsing `Backup-SqlDatabase` it is quite simple to create a backup of a database:\n\
    \n```powershell\n> Backup-SqlDatabase -ServerInstance \"localhost\\SQLEXPRESS01\"\
    \ `\n                    -Database \"dbname\"\n```\n\nIn this command, we use\
    \ `-ServerInstance` to specify the name under which the SQL Server is accessible.\
    \ Of course, the command can be executed only if your Windows account has access\
    \ rights to the database server. By default, the backup ends up in the server's\
    \ backup directory, which is usually at the following location:\n\n```\nC:\\Program\
    \ Files\\Microsoft SQL Server\\MSSQLn.n\\MSSQL\\Backup\n```\n\nAlternatively,\
    \ you can specify the desired backup filename by using the `-BackupFile` option.\
    \ (Numerous other options enable you to control how `Backup-SqlDatabase` works.\
    \ Just take a look at the documentation!) The files created by `Backup-SqlDatabase`\
    \ are in a binary format that can be compressed well.\n\n**dbatools**\n\nA useful\
    \ alternative to the SqlServer module is the dbatools (see https://dbatools.io/commands).\
    \ This module is much more extensive and includes many more cmdlets. If you specialize\
    \ in the administration of SQL Server instances, you should definitely familiarize\
    \ yourself with dbatools!"
  mdcn: "## 15.2 WordPress 备份\n\n第二个示例的起点是一台运行着 Web 服务器和数据库服务器的 Linux 机器，用于通过 WordPress\
    \ 实现网站托管。wp 数据库的内容、/var/www/html/wordpress 目录以及整个服务器配置（即 /etc 目录）需要每天备份一次。过去 7\
    \ 天的压缩备份应始终保留在本地和可通过 SSH 访问的第二台服务器上。\n\n该实现通过一个以 root 权限运行的 Bash 脚本创建。使用 `mysqldump`\
    \ 命令通过 wpbackupuser 账户连接到 MySQL 服务器来备份 MySQL 数据库。该账户仅包含执行备份的权限，可以在 MySQL 中按如下方式设置：\n\
    \n```sql\nCREATE USER wpbackupuser@localhost IDENTIFIED BY 'TopSecret123';\nGRANT\
    \ Select, Lock Tables, Show View\n    ON wp.* TO wpbackupuser@localhost;\nGRANT\
    \ Process, Reload ON *.* TO wpbackupuser@localhost;\n```\n\n为确保脚本不以明文形式包含密码，密码存储在\
    \ /root/.my.cnf 文件中。mysqldump 会自动搜索此文件并分析其包含的数据。你应该使用 `chmod 600 .my.cnf` 来确保除\
    \ root 外无人有权读取此文件！\n\n```ini\n# in file /root/.my.cnf\n[mysqldump]\nuser = wpbackupuser\n\
    password = TopSecret123\ndefault-character-set = utf8\n```\n\n一旦所有先决条件都已满足，你就可以开始编程了。各种配置参数汇总在脚本的前几行。为了更好的可读性，我为这些变量使用了大写字母。\n\
    \n`date +%u` 为星期几生成一个连续数字（1 代表星期一到 7 代表星期日）。此数字将被整合到备份文件的名称中。\n\n`mysqlopt` 包含执行备份的选项。可以通过无数选项控制\
    \ mysqldump 的行为。在此例中，我仅限于使用 `--single-transaction`。此选项确保数据库在备份期间无法更改。mysqldump\
    \ 的输出传递给 gzip，进行压缩，最后存储在 `$dbfile` 文件中。如果文件已存在，它将被覆盖。（此过程在脚本连续运行 8 天后首次发生。因此，你始终拥有过去\
    \ 7 天的备份版本。）\n\n要执行 WordPress 安装的备份，一个简短的 `tar` 命令就足够了（另见第 5 章第 5.3 节）。WordPress\
    \ 目录还包含所有已安装的插件、所有上传的图像等。通常，使用 `tar` 创建的文件比 MySQL 备份大得多。\n\n脚本的最后一行将目前仅存储在本地的备份复制到第二台计算机。因此，所有备份文件都冗余地位于两个不同的位置。\n\
    \n```bash\n# Sample file lamp-backup.sh\nBACKUPDIR=/localbackup\nDB=wp\nDBUSER=wpbackupuser\n\
    WPDIR=/var/www/html/wordpress\nSSH=user@otherhost:wp-backup/\n# MySQL-Backup\n\
    weekday=$(date +%u)\ndbfile=$BACKUPDIR/wp-db-$weekday.sql.gz\nmysqlopt='--single-transaction'\n\
    mysqldump -u $DBUSER $mysqlopt $DB | gzip -c > $dbfile\n\n# backup of the WordPress\
    \ installation including plugins and uploads\nhtmlfile=$BACKUPDIR/wp-html-$weekday.tar.gz\n\
    tar czf $htmlfile -C $WPDIR .\n\n# backup of the /etc directory\netcfile=$BACKUPDIR/etc-$weekday.tar.gz\n\
    tar czf $etcfile -C /etc .\n\n# copy backup files to a second computer\nscp $dbfile\
    \ $htmlfile $etcfile $SSH\n```\n\n手动执行脚本后，你仍然需要处理自动调用。你可以根据以下模式设计 `/etc/crontab`\
    \ 中所需的行：\n\n```crontab\n# in /etc/crontab\n# run script every night at 3:00 am\
    \ with root privileges\n00 3 * * * root /path/to/lamp-backup.sh\n```\n\n一旦你设置了备份系统，你应该观察它几天。自动的\
    \ cron 调用是否工作？一个常见的错误原因是 cron 任务通常具有与你运行测试的 `root` 账户不同的 `PATH` 设置。如果你在脚本中使用了手动安装在常规路径之外的命令，这种可能性尤其大。对于此类命令，你可能需要指定完整路径。\n\
    \n务必测试你是否可以从另一台计算机或虚拟机上的备份文件恢复 WordPress 安装。如果直到灾难发生时才发现备份因某种原因不完整，那么最漂亮的脚本又有什么用呢？\n\
    \n**扩展：将加密备份上传到 Amazon Web Services (AWS)**\n\n就攻击者可访问性而言，将备份文件保留在外部计算机上通常不如本地服务器安全。因此，一个好主意是在将备份文件上传到其他主机之前对其进行加密。我将在第\
    \ 20 章向你展示如何加密文件，然后使用 Amazon 的云存储服务 Simple Storage Service (S3) 作为存储位置，届时我们将在此方面扩展我们最近的示例。\n\
    \n## 15.3 SQL Server 备份\n\n以下脚本的目标是将 SQL Server 的所有数据库备份为指定目录中的压缩文件。为此，我假设你在 Windows\
    \ 上工作。（SQL Server 也可以安装在 Linux 上，但我没有为此示例测试该场景。）\n\n要通过 PowerShell 脚本管理 SQL Server，你可以使用\
    \ Microsoft 开发并在 PowerShell Gallery 中可用的 SqlServer 模块：\n\n```powershell\n> Install-Module\
    \ SqlServer\n```\n\n此模块中所有 cmdlet 的参考可在 https://learn.microsoft.com/en-us/powershell/module/sqlserver\
    \ 找到。\n\n使用 `Backup-SqlDatabase` 创建数据库备份非常简单：\n\n```powershell\n> Backup-SqlDatabase\
    \ -ServerInstance \"localhost\\SQLEXPRESS01\" `\n                    -Database\
    \ \"dbname\"\n```\n\n在此命令中，我们使用 `-ServerInstance` 来指定 SQL Server 可访问的名称。当然，只有当你的\
    \ Windows 账户对数据库服务器具有访问权限时，才能执行该命令。默认情况下，备份最终位于服务器的备份目录中，通常位于以下位置：\n\n```\nC:\\\
    Program Files\\Microsoft SQL Server\\MSSQLn.n\\MSSQL\\Backup\n```\n\n或者，你可以使用\
    \ `-BackupFile` 选项指定所需的备份文件名。（许多其他选项使你能够控制 `Backup-SqlDatabase` 的工作方式。只需查看文档即可！）`Backup-SqlDatabase`\
    \ 创建的文件是二进制格式，可以很好地压缩。\n\n**dbatools**\n\nSqlServer 模块的一个有用替代方案是 dbatools（参见 https://dbatools.io/commands）。此模块范围更广，包含更多\
    \ cmdlet。如果你专门从事 SQL Server 实例的管理，你绝对应该熟悉 dbatools！"
