    - https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/robocopy\n\
    \nThe following script starts with the initialization of three parameters that\
    \ specify which directories should be synchronized to which destination.\n\n`Get-Volume`\
    \ retrieves a list of all file systems. If the target disk is not recognized in\
    \ it, the script will end. For `Where-Object`, note that although `Get-Volume`\
    \ displays the file system name in the `FriendlyName` column, the property is\
    \ actually called `FileSystemLabel`—which is hardly comprehensible with what the\
    \ developers of `Get-Volume` had in mind!\n\nWhen the target file system is detected,\
    \ the corresponding drive letter is determined. This letter does not always have\
    \ to remain the same, depending on which data carriers are currently in use.\n\
    \nThe script logs all robocopy outputs to a file whose name has the following\
    \ format: robocopy-2023-12-31--17-30.log. This file and a logging directory are\
    \ set up automatically.\n\nFinally, the script loops through all the directories\
    \ listed in $syncdirs and runs robocopy. The options used in this process have\
    \ the following meaning:\n\n- /e: Traverse directories recursively\n- /purge:\
    \ Delete locally deleted files and directories also in the backup (caution!)\n\
    - /xo: Copy only files that have changed; this last option speeds up the synchronization\
    \ process enormously from the second pass onwards\n- /log+:filename: Adds logging\
    \ output to the specified file\n\n```powershell\n#!/usr/bin/env pwsh\n# Sample\
    \ file sync-folders.ps1\n# $destvolume: name of the backup data medium (such as\
    \ a USB flash drive).\n# $destdir: name of the target directory on this data medium\n\
    # $logdir: name of the logging directory on the data medium\n# $syncdirs: list\
    \ of directories to be synchronized\n# (relative to the personal files)\n$destvolume\
    \ = \"mybackupdisk\"\n$destdir = \"backup-kofler\"\n$logdir = \"$destdir\\sync-logging\"\
    \n$syncdirs = \"Documents\", \"Pictures\", \"myscripts\"\n# determine drive letter\
    \ of the target file system\n$disk = Get-Volume |\n    Where-Object { $_.FileSystemLabel\
    \ -eq $destvolume }\nif (! $disk) {\n    Write-Output \"Backup disk $destvolume\
    \ not found. Exit.\"\n    Exit 1\n}\n$drive = ($disk | Select-Object -First 1).DriveLetter\n\
    Write-Output \"Syncing with disk ${drive}:\"\n\n# create target directory if it\
    \ does not exist yet;\n# | out-zero prevents the directory name from being displayed\n\
    New-Item -ItemType Directory -Force \"${drive}:\\${destdir}\" |\n    Out-Null\n\
    \n# create logging directory and logging file\nNew-Item -ItemType Directory -Force\
    \ \"${drive}:\\${logdir}\" |\n    Out-Null\n$logfile = `\n\"${drive}:\\${logdir}\\\
    robocopy-{0:yyyy-MM-dd--HH-mm}.log\" `\n-f (Get-Date)\nNew-Item $logfile | Out-Null\n\
    \n# loop through the sync directories\nforeach ($dir in $syncdirs) {\n    $from\
    \ = \"${HOME}\\$dir\"\n    $to = \"${drive}:\\${destdir}\\$dir\"\n    Write-Output\
    \ \"sync from $from to $to\"\n    robocopy /e /purge /xo /log+:$logfile \"$from\"\
    \ \"$to\"\n}\n```\n\nIn my tests, the script kept throwing the *access denied*\
    \ error (error code 5) when writing the files to the USB drive. Countless reports\
    \ exist about this error on the internet and almost as many suggested solutions.\
    \ Apparently, only running the script with admin privileges works reliably. You\
    \ can simply run initial tests in a terminal window with administrator rights.\
    \ After that, you must set up the script in *Microsoft Windows Task Scheduler*\
    \ to run once a day with admin rights (**Run with highest privileges** option\
    \ in the **General** dialog sheet).\n\n## 15.1.2 Ideas for Improvement\n\nBefore\
    \ you entrust your data to the script, I would like to point out a few restrictions\
    \ and describe how you can optimize the script:\n\n- **Warning in case of error\
    \ or non-execution**\n  The script simply aborts if the external data drive is\
    \ not available at the moment. A better approach would be to display or send a\
    \ warning in some form after several unsuccessful attempts.\n- **Exclusion rules**\n\
    \  The script can synchronize directories either completely or not at all. In\
    \ practice, exclusion criteria would be helpful for files or directories that\
    \ should not be included in the backup.\n\n## 15.1.3 Bash Script with rsync\n\n\
    If you work on Linux or macOS, the best way to realize comparable synchronization\
    \ tasks is to use a Bash script with `rsync`. The following script has the same\
    \ structure as the PowerShell script described earlier. It tests whether the backup\
    \ volume is available at a particular `mount` point and then runs the `rsync`\
    \ command for a list of local directories.\n\nAs described in [Chapter 12, Section\
    \ 12.3](#), `rsync` also works in conjunction with SSH. Thus, you can adapt the\
    \ script relatively easily so that your directories are not synchronized with\
    \ an external data medium but with another computer."
  mdcn: "## 14 Git\n\n```bash\nif [ $untracked -gt 0 ]; then\n    git status\n   \
    \ echo\n    echo \"Pre commit fail! There are untracked files. Either run\"\n\
    \    echo \"'git add' or add an entry to .gitignore.\"\n    exit 1\nfi\n```\n\n\
    ## 第三部分\n\n## 应用与示例\n\n## 第15章\n## 备份\n\n自动创建备份是*经典的*脚本应用。在本章中，我将向你展示一些具体的例子：\n\
    \n- 同步台式计算机的目录\n- 在Linux计算机上备份WordPress系统\n- 在Windows上备份SQL Server数据库\n\n> **本章的先决条件**\n\
    > 本章中的示例使用Bash和PowerShell语言编写。除了语言基础，我假设你知道如何使用Microsoft Windows任务计划程序和cron（参见第11章），并且熟悉SSH（参见第12章）。此外，你应该熟悉`rsync`、`scp`和`tar`等命令，或`Compress-Archive`等cmdlet。\n\
    \n当然，你也可以使用现成的备份解决方案，而不是自己编写脚本。你可以在互联网上找到无数的备份工具，从简单的免费脚本到昂贵的商业应用程序，应有尽有。如果任务相对简单，就像本章中的示例一样，你自己的脚本绝对足够。但是，当然，如果你需要公司范围内的冗余备份，需要考虑到所有可能的位置，如活动目录、云存储或位于公司网络之外的员工笔记本电脑，那么这个建议就不适用了。\n\
    \n## 15.1 将目录同步到外部存储\n\n你可能以某种方式使用云作为备份存储：作为开发者，你可能使用Git将代码同步到远程仓库，将版本控制的优势与外部备份的优势相结合。作为“普通”用户，你只需将重要文件保存到OneDrive、NextCloud、Dropbox或iCloud\
    \ Drive目录中。所有这些程序在正确应用时都是有用且安全的。\n\n本例的出发点是希望*额外*将笔记本电脑的重要目录同步到外部数据介质。这种老式备份方法的优点是，即使由于任何原因无法访问云，存储的文件仍然可用。当数据量太大而无法使用云存储时，例如涉及虚拟机、视频项目等时，本地备份也很方便。\n\
    \n我还想立即指出最重要的缺点：“同步”意味着在笔记本电脑上删除的文件也会在外部磁盘上被删除。因此，此备份过程不提供恢复已删除或覆盖文件的选项。在这方面，本章介绍的Bash或PowerShell脚本不应代表你唯一的备份手段，而应补充其他方法。\n\
    \n> **小心备份当前正在使用的文件**\n>\n> 如果你使用脚本同步当前打开并在复制过程中更改的文件，那么备份在大多数情况下是毫无价值的。此限制适用于虚拟机的映像文件或数据库等。\n\
    \n不幸的是，这个问题没有通用的解决方案。理想情况下，你应该在尽可能少的文件被主动使用时运行脚本。大多数数据库服务器提供在数据库运行时执行一致备份的功能，但通常不是在文件级别。（本章的其他部分将给出两个这样的例子。）你可以在脚本中关闭虚拟机进行备份，然后重新启动它们。然而，这种方法非常具体地依赖于计算机上运行的软件。\n\
    \n根据操作系统，文件系统快照是另一种解决方案：在此上下文中，你可以临时冻结文件系统的副本，并使用此静态副本作为备份的基础。在Linux上，*逻辑卷管理器（LVM）*或Btrfs文件系统提供了这样的选项。\n\
    \n## 15.1.1 使用robocopy的PowerShell脚本\n\n*robocopy*，代表*robust file copy*，是一个Windows命令，自2008年以来所有版本的Windows都附带了该命令。尽管该命令不能作为cmdlet调用，但它与PowerShell脚本集成得很好。该命令的众多选项在以下链接中有文档说明：\n\
    \n- https://en.wikipedia.org/wiki/Robocopy\n- https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/robocopy\n\
    \n以下脚本首先初始化三个参数，指定应将哪些目录同步到哪个目标。\n\n`Get-Volume`检索所有文件系统的列表。如果目标磁盘未在其中识别，脚本将结束。对于`Where-Object`，请注意，尽管`Get-Volume`在`FriendlyName`列中显示文件系统名称，但该属性实际上称为`FileSystemLabel`——这很难理解`Get-Volume`的开发者的意图！\n\
    \n当检测到目标文件系统时，将确定相应的驱动器号。根据当前使用的数据载体，此字母不一定始终保持不变。\n\n该脚本将所有robocopy输出记录到一个文件中，该文件的名称格式如下：robocopy-2023-12-31--17-30.log。此文件和日志目录会自动设置。\n\
    \n最后，脚本循环遍历`$syncdirs`中列出的所有目录并运行robocopy。此过程中使用的选项具有以下含义：\n\n- /e：递归遍历目录\n- /purge：在备份中也删除本地已删除的文件和目录（小心！）\n\
    - /xo：仅复制已更改的文件；此最后一个选项从第二次开始极大地加快了同步过程\n- /log+:filename：将日志输出添加到指定文件\n\n```powershell\n\
    #!/usr/bin/env pwsh\n# Sample file sync-folders.ps1\n# $destvolume: name of the\
    \ backup data medium (such as a USB flash drive).\n# $destdir: name of the target\
    \ directory on this data medium\n# $logdir: name of the logging directory on the\
    \ data medium\n# $syncdirs: list of directories to be synchronized\n# (relative\
    \ to the personal files)\n$destvolume = \"mybackupdisk\"\n$destdir = \"backup-kofler\"\
    \n$logdir = \"$destdir\\sync-logging\"\n$syncdirs = \"Documents\", \"Pictures\"\
    , \"myscripts\"\n# determine drive letter of the target file system\n$disk = Get-Volume\
    \ |\n    Where-Object { $_.FileSystemLabel -eq $destvolume }\nif (! $disk) {\n\
    \    Write-Output \"Backup disk $destvolume not found. Exit.\"\n    Exit 1\n}\n\
    $drive = ($disk | Select-Object -First 1).DriveLetter\nWrite-Output \"Syncing\
    \ with disk ${drive}:\"\n\n# create target directory if it does not exist yet;\n\
    # | out-zero prevents the directory name from being displayed\nNew-Item -ItemType\
    \ Directory -Force \"${drive}:\\${destdir}\" |\n    Out-Null\n\n# create logging\
    \ directory and logging file\nNew-Item -ItemType Directory -Force \"${drive}:\\\
    ${logdir}\" |\n    Out-Null\n$logfile = `\n\"${drive}:\\${logdir}\\robocopy-{0:yyyy-MM-dd--HH-mm}.log\"\
    \ `\n-f (Get-Date)\nNew-Item $logfile | Out-Null\n\n# loop through the sync directories\n\
    foreach ($dir in $syncdirs) {\n    $from = \"${HOME}\\$dir\"\n    $to = \"${drive}:\\\
    ${destdir}\\$dir\"\n    Write-Output \"sync from $from to $to\"\n    robocopy\
    \ /e /purge /xo /log+:$logfile \"$from\" \"$to\"\n}\n```\n\n在我的测试中，脚本在将文件写入USB驱动器时一直抛出*访问被拒绝*错误（错误代码5）。互联网上存在无数关于此错误的报告，以及几乎同样多的建议解决方案。显然，只有以管理员权限运行脚本才能可靠地工作。你可以在具有管理员权限的终端窗口中进行初始测试。之后，你必须在*Microsoft\
    \ Windows任务计划程序*中设置脚本，以管理员权限每天运行一次（在**常规**对话框页中选择**使用最高权限运行**选项）。\n\n## 15.1.2\
    \ 改进思路\n\n在你将数据交给脚本之前，我想指出一些限制，并描述如何优化脚本：\n\n- **错误或未执行时的警告**\n  如果外部数据驱动器当前不可用，脚本只是中止。更好的方法是在多次尝试失败后以某种形式显示或发送警告。\n\
    - **排除规则**\n  脚本可以完全同步目录，也可以完全不同步。在实践中，排除标准对于不应包含在备份中的文件或目录会很有帮助。\n\n## 15.1.3\
    \ 使用rsync的Bash脚本\n\n如果你在Linux或macOS上工作，实现类似同步任务的最佳方法是使用带有`rsync`的Bash脚本。以下脚本与前面描述的PowerShell脚本具有相同的结构。它测试备份卷是否在特定的`mount`点可用，然后对本地目录列表运行`rsync`命令。\n\
    \n如[第12章，第12.3节](#)所述，`rsync`也可以与SSH结合使用。因此，你可以相对容易地调整脚本，使你的目录不是与外部数据介质同步，而是与另一台计算机同步。"
