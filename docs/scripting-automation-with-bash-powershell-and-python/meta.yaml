    ```


    This command deletes the `LANG` environment variable with the language settings
    only for the execution of `command`. `command` is therefore executed without the
    otherwise valid language settings and returns error messages in English if necessary.
    (English is the default language when `LANG` is empty. English error messages
    are useful when searching the internet for the cause of a problem.) `LANG` does
    not get permanently deleted, however, but is available again for the other commands.


    > **No Temporary Change for Bash Flow Structures**

    The `ENVVAR=... command` syntax can only be used for ordinary commands, but not
    for loops or branches that you initiate using `if`, `for`, `while`, and so on.


    # 3.10 Strings


    Strings are the central data type of Bash—I already mentioned that several times.
    Nevertheless, the handling of strings sometimes seems strange. This section summarizes
    the most important functions with regard to strings.


    # 3.10.1 Single versus Double Quotation Marks


    In Bash, strings can be placed in both single and double quotation marks:'
  - '[PAGE 77]


    +   - ''abc$efg'': In this case, the string will be transferred exactly.

    - "abc$efg": In this variant, Bash replaces variables contained in the text ($efg
    in this case) with its contents and may also perform other substitution procedures,
    which I will explain later in this section.


    In Bash, multiple strings can be concatenated without an operator. The only requirement
    is that Bash can recognize the strings as such, which is not the case in the first
    line of the following listing:


    ```

    x=abc efg           # Error!

    x=abc               # OK

    x="abc"             # better

    x=''abc''             # here equivalent

    y="123"$x"456"      # -> 123abc456

    y=''123''$x''456''      # -> 123abc456

    y="123 $x 456"      # -> 123 abc 456

    y=''123 $x 456''      # -> 123 $x 456

    y=123 $x 456        # Error!

    ```


    You are allowed to distribute strings across multiple lines. To preserve the line
    breaks in the output via `echo`, you must enclose the variable in quotes (see
    also the following section):


    ```

    myvar=''1st Line

    2nd Line''

    echo "$myvar"

    ```


    # 3.10.2 Outputting Strings (echo)


    Of course, you already know the `echo` command for outputting strings:


    ```

    myname="Michael"

    echo "Hello, $myname!"

    Hello, Michael!

    ```


    At this point, I would like to point out some peculiarities of `echo`. You can
    use the `-n` option to prevent `echo` from starting a new line after the output.
    In this way, you can distribute the output of one line across several commands,
    as in the following example:


    ```

    echo -n "Hello, "

    echo $myname

    ```


    The `-e` option enables you to achieve that backslash sequences contained in the
    string are interpreted correctly (i.e., that the `\` and `n` characters are recognized
    as line breaks):'
  - "[PAGE 78]\n\n```\nmyvar=\"abc\\nefg\"\necho $myvar\n  abc\\nefg\necho -e $myvar\n\
    \  abc\n  efg\n```\n\nThe handling of real line breaks is also confusing. These\
    \ line breaks can be replaced by blanks using `echo $myvar`. Only `echo \"$myvar\"\
    ` with quotes returns a multiline output:\n\n```\nmyvar=\"abc\nefg\"\necho $myvar\n\
    \  abc efg\necho \"$myvar\"\n  abc\n  efg\n```\n\nYou redirect the error message\
    \ to the `stderr` channel using `>&2`:\n\n```\necho \"Error message\" >&2\necho\
    \ >&2 \"Error message\"   # equivalent\n```\n\n> **printf**\n\nThe `printf` function,\
    \ known from many programming languages, is available as a command on Linux and\
    \ macOS. The `printf` function is better suited than `echo` to format output.\
    \ Syntax details can be shown via `man 1 printf`.\n\n# 3.10.3 Colors\n\nYou can\
    \ also output text in color. To change the color, you need to include what are\
    \ called *ANSI escape sequences* in the output. To change the background color,\
    \ you must replace `3n` with `4n`.\n\n| Color | Code | Color | Code |\n|---|---|---|---|\n\
    | Black | 0;30 | Gray | 1;30 |\n| Blue | 0;34 | Light blue | 1;34 |\n| Green |\
    \ 0;32 | Light green | 1;32 |\n| Cyan | 0;36 | Light cyan | 1;36 |\n\nTable 3.8\
    \ ANSI Color Codes for Foreground Colors"
- md: "## 3.10.4 Entering or Reading Character Strings (read)\n\nThe easiest way to\
    \ perform interactive input redirection is to use `read`. For users to know what\
    \ they need to enter, you should perform an output beforehand using `echo`. Adding\
    \ `-n` causes the cursor to stop after the output, as in the following example:\n\
    \n```\necho -n \"Please enter your name: \"\nread myvar\necho \"The name is: $myvar\"\
    \n```\n\n`read` can also be used in combination with input redirection to read\
    \ a file line by line. A corresponding example follows in the next section.\n\n\
    `read -a myarray` reads a line and stores its words in elements of the specified\
    \ array variable.\n\n> **Help for the read Command**\n>\n> `read` is an internal\
    \ bash command. Details about the various `read` options are therefore provided\
    \ by `help read` and not, as is usually the case, by `man read`.\n\n## 3.10.5\
    \ Substitution and Expansion Mechanisms\n\nBash contains various “substitution\
    \ or expansion mechanisms,” although these terms are largely synonymous and are\
    \ used inconsistently in the documentation. In any case, an expression introduced\
    \ with `$` is replaced by its content or analysis:\n\n- **$myvar or ${myvar}**\n\
    \  By far the most important one is *variable substitution*, which you have already\
    \ seen in several examples. The alternate `${myvar}` notation is useful if the\
    \ variable name is to be delimited from further text (e.g., `${myvar}txt`).\n\n\
    - **$(command) or `command`**\n  In the case of *command substitution*, discussed\
    \ earlier in Section 3.9.1, the command is executed and replaced by its result\
    \ (i.e., standard output).\n\n- **$((mathexpression))**\n  In *arithmetic substitution*,\
    \ the mathematical expression contained in double parentheses is analyzed and\
    \ replaced by its result.\n\n- **${__var__}**\n  By means of the what’s called\
    \ *parameter substitution*, Bash provides some options to process the string contained\
    \ in the variable. The expression returns the result. Instead of `__`, you specify\
    \ various special characters that are unfortunately difficult to memorize, which\
    \ I will discuss through examples next.\n\n## 3.10.6 Parameter Substitution\n\n\
    Bash lacks the string handling functions common in other programming languages.\
    \ For this purpose, Bash has some quite efficient mechanisms under the term *parameter\
    \ substitution*, which extract information from character strings that is stored\
    \ in variables. Note that all constructs return a result, but never directly modify\
    \ the specified variable:\n\n- **${var:n}**\n  Prints the string stored in `var`\
    \ starting from the nth character, counting from 0:\n\n  ```bash\n  var=\"abcdefghij\"\
    \n  echo ${var:3}    # output defghij\n  ```\n\n- **${var:offset:len}**\n  Skips\
    \ `offset` characters and then outputs `len` characters:\n\n  ```bash\n  var=\"\
    abcdefghij\"\n  echo ${var:5:3}  # output fgh\n  ```\n\n- **${var:-default}**\n\
    \  If the variable is empty, the construct returns the default setting as a result,\
    \ otherwise the content of the variable. The variable does not get changed.\n\n\
    \  ```bash\n  var=\n  echo ${var:-abc} # output abc\n  var=123\n  echo ${var:-abc}\
    \ # output 123\n  ```\n\n- **${var:=default}**\n  As above, but at the same time\
    \ the content of the variable will be changed if it was empty before.\n\n- **${var:+new}**\n\
    \  If the variable is empty, it remains empty. If, on the other hand, the variable\
    \ is already being used, the previous content is replaced by a new setting. The\
    \ construct provides the new content of the variables.\n\n- **${var:?errormessage}**\n\
    \  If the variable is empty, the variable name and the error message are output,\
    \ and the shell program is then terminated. Otherwise, the construct returns the\
    \ content of the variable.\n\n- **${#var}**\n  Returns the number of characters\
    \ stored in the variable as a result or 0 if the variable is empty. The variable\
    \ does not get changed.\n\n  ```bash\n  x='abcde'\n  echo ${#x}      # output\
    \ 5\n  ```\n\n- **${var#pattern}**\n  Compares the beginning of the variable with\
    \ the specified pattern. If the pattern is recognized, the construct returns the\
    \ contents of the variable minus the shortest possible text that matches the search\
    \ pattern. If, on the other hand, the pattern is not found, the entire contents\
    \ of the variable are returned. The characters known from globbing can be used\
    \ in the search pattern (i.e., `*`, `?` and `[abc]`).\n\n  ```bash\n  dat=/home/pi/images/img123.png\n\
    \  echo ${dat#*/}    # output home/pi/images/img123.png\n  echo ${dat#*.}    #\
    \ output png\n  ```\n\n- **${var##pattern}**\n  As above, but now, the largest\
    \ possible string that matches the pattern is eliminated.\n\n  ```bash\n  echo\
    \ ${dat##*/}    # output img123.png\n  echo ${dat##*.}    # output png\n  ```\n\
    \n- **${var%pattern}**\n  Like `${var#pattern}`, but now the pattern matching\
    \ is performed at the end of the variable content. The shortest possible string\
    \ from the end of the variable is eliminated. The variable itself remains unchanged.\n\
    \n  ```bash\n  echo ${dat%/*}    # output /home/pi/images\n  echo ${dat%.*}  \
    \  # output /home/pi/images/img123\n  ```\n\n- **${var%%pattern}**\n  As above,\
    \ but now, the largest possible string gets eliminated.\n\n  ```bash\n  echo ${dat%%/*}\
    \    # no output (empty string)\n  echo ${dat%%.*}    # output /home/pi/images/img123\n\
    \  ```\n\n- **${var/find/replace}**\n  Replaces the first occurrence of the `find`\
    \ pattern with `replace`.\n\n  ```bash\n  x='abcdeab12ab'\n  echo ${x/ab/xy} \
    \   # output xycdeaab12ab\n  ```\n\n- **${!var}**\n  Returns the contents of the\
    \ variable whose name is contained in the string.\n\n  ```bash\n  abc=123\n  efg='abc'\n\
    \  echo ${!efg}        # output 123\n  ```\n\nFinally, I want to show you a typical\
    \ application of a parameter substitution: Let's say you want to use `convert`\
    \ or `magick` (see Chapter 16, Section 16.1) to convert some PNG files in the\
    \ current directory into JPEG format. For this task, you must replace the `.png`\
    \ identifier with `.jpg` in the `pngname` variable within the filename. The easiest\
    \ way to perform this task is the following script:\n\n```bash\n#!/bin/bash\n\
    # Sample file png2jpg.sh\nshopt -s nullglob\nfor pngname in *.png; do\n    # Replace\
    \ .png with .jpg\n    jpgname=${pngname%.png}.jpg\n    convert \"$pngname\" \"\
    $jpgname\"\ndone\n```\n\n`shopt -s nullglob` avoids an error message if no `*.png`\
    \ files exist in the directory at all. Details on how the `for` loop works will\
    \ follow in Section 3.12. Note that the `pngname` and `jpgname` variables are\
    \ enclosed in quotes when the `convert` command is called. These quotation marks\
    \ are the only way to make a script work for filenames with spaces.\n\n> **It's\
    \ So Much Easier to Process Strings in Python!**\n>\n> Once you get used to the\
    \ strange Bash mechanisms for editing strings, you can use it to solve a surprising\
    \ number of problems. Nevertheless, for scripts where you need to manipulate many\
    \ strings, you're better off using Python. I don't know of any language that provides\
    \ such comprehensive yet easy-to-use functions for handling strings.\n\n## 3.10.7\
    \ Heredocs and Herestrings\n\nHere documents (heredocs, for short) are blocks\
    \ of text embedded in the script that end with the character sequence specified\
    \ by `<<` (often `EOF` for end of file). The following example illustrates the\
    \ syntax very clearly. (The `mail` command is based on the assumption that a mail\
    \ server is running on the machine.)\n\n```bash\nname=\"Michael\"\namount=1200\n\
    to=\"spamvictim@spamforever.com\"\n\nmail -s \"Invest safely\" $to << EOF\nHello\
    \ $name, enclosed is a great investment offer\nwithout any risk. If you transfer\
    \ $amount US$ to this account\nyou'll get ...\nEOF\n```\n\nYou can easily execute\
    \ multiline text output via `cat`, as in the following example:\n\n```bash\ncat\
    \ << EOF\nThis is\na long\nhelp text\nEOF\n```\n\nInternally, heredocs are a special\
    \ type of input redirection. `mail` or `cat` expects the mail text from standard\
    \ input. Instead, the following text lines are used, with the usual variable substitution\
    \ (`$name`, `$amount`) taking place in the text.\n\n| Color | Code | Color | Code\
    \ |\n|---|---|---|---|\n| Red | 0;31 | Light red | 1;31 |\n| Purple | 0;35 | Pink\
    \ | 1;35 |\n| Brown | 0;33 | Yellow | 1;33 |\n| Light gray | 0;37 | White | 1;37\
    \ |\n\n**Table 3.8** ANSI Color Codes for Foreground Colors (Cont.)\n\nColor codes\
    \ must be placed between the control sequences `\\033[` and `m`. To prevent your\
    \ code from becoming completely unreadable, a best practice is to store the color\
    \ codes in variables. `echo` processes color codes correctly only if you use the\
    \ `-e` option. The notation `${var}` instead of `$var` is useful in this context\
    \ to separate variable names from the rest of the text without spaces.\n\n```bash\n\
    BLUE='\\033[0;34m'\nRED='\\033[0;31m'\nNOCOLOR='\\033[0m'\necho -n -e \"Text output\
    \ in ${RED}Red${NOCOLOR} \"\necho    -e \"and ${BLUE}Blue${NOCOLOR}.\"\n```\n\n\
    The actual appearance of the colors will vary depending on the terminal configuration.\
    \ For instance, instead of displaying colors brighter (e.g., `1;34` for light\
    \ blue), the output might be in the basic color, but with bold type, depending\
    \ on the terminal. A reference for other codes that you can also use to change\
    \ the cursor position can be found at *https://en.wikipedia.org/wiki/ANSI_escape_code*\
    \ or at *https://tldp.org/HOWTO/Bash-Prompt-HOWTO/c327.html*.\n\n> **Poor Readability,\
    \ Difficult Further Processing**\n>\n> The use of colors has its disadvantages.\
    \ On the one hand, readability may suffer as a result, especially since you cannot\
    \ rely on a specific background color in the terminal. Many users use terminals\
    \ with a dark background; others prefer a light or even white background.\n>\n\
    > In addition, color codes make further processing of text output more difficult.\
    \ If you decide to use colors, you should provide an option to disable this feature\
    \ if necessary."
  mdcn: "## 3.10.4 输入或读取字符字符串（read）\n\n执行交互式输入重定向最简单的方法是使用 `read`。为了让用户知道需要输入什么，你应该事先使用\
    \ `echo` 进行输出。添加 `-n` 选项会使光标在输出后停止，如下例所示：\n\n```\necho -n \"Please enter your\
    \ name: \"\nread myvar\necho \"The name is: $myvar\"\n```\n\n`read` 也可以与输入重定向结合使用，逐行读取文件。相应的示例将在下一节中给出。\n\
    \n`read -a myarray` 读取一行，并将其单词存储在指定数组变量的元素中。\n\n> **read 命令的帮助信息**\n>\n> `read`\
    \ 是一个内部 bash 命令。因此，关于各种 `read` 选项的详细信息由 `help read` 提供，而不是像通常情况那样由 `man read`\
    \ 提供。\n\n## 3.10.5 替换和扩展机制\n\nBash 包含各种“替换或扩展机制”，尽管这些术语在很大程度上是同义词，并且在文档中使用不一致。无论如何，以\
    \ `$` 开头的表达式会被其内容或分析结果替换：\n\n- **$myvar 或 ${myvar}**\n  迄今为止最重要的是*变量替换*，你已经在几个示例中见过。如果变量名需要与后续文本分隔（例如，`${myvar}txt`），替代的\
    \ `${myvar}` 表示法很有用。\n\n- **$(command) 或 `command`**\n  在*命令替换*的情况下（前面在第 3.9.1\
    \ 节中讨论过），命令被执行并被其结果（即标准输出）替换。\n\n- **$((mathexpression))**\n  在*算术替换*中，双括号内的数学表达式被分析并被其结果替换。\n\
    \n- **${__var__}**\n  通过所谓的*参数替换*，Bash 提供了一些选项来处理变量中包含的字符串。该表达式返回结果。你可以用各种特殊字符代替\
    \ `__`，不幸的是这些字符很难记忆，我接下来将通过示例进行讨论。\n\n## 3.10.6 参数替换\n\nBash 缺乏其他编程语言中常见的字符串处理函数。为此，Bash\
    \ 在*参数替换*这个术语下有一些非常高效的机制，用于从存储在变量中的字符字符串中提取信息。请注意，所有构造都返回结果，但从不直接修改指定的变量：\n\n\
    - **${var:n}**\n  从第 n 个字符开始打印存储在 `var` 中的字符串，从 0 开始计数：\n\n  ```bash\n  var=\"\
    abcdefghij\"\n  echo ${var:3}    # 输出 defghij\n  ```\n\n- **${var:offset:len}**\n\
    \  跳过 `offset` 个字符，然后输出 `len` 个字符：\n\n  ```bash\n  var=\"abcdefghij\"\n  echo\
    \ ${var:5:3}  # 输出 fgh\n  ```\n\n- **${var:-default}**\n  如果变量为空，该构造返回默认设置作为结果，否则返回变量的内容。变量本身不会被更改。\n\
    \n  ```bash\n  var=\n  echo ${var:-abc} # 输出 abc\n  var=123\n  echo ${var:-abc}\
    \ # 输出 123\n  ```\n\n- **${var:=default}**\n  如上所述，但如果变量之前为空，其内容将同时被更改。\n\n- **${var:+new}**\n\
    \  如果变量为空，则保持为空。另一方面，如果变量已被使用，则其先前内容将被新设置替换。该构造提供变量的新内容。\n\n- **${var:?errormessage}**\n\
    \  如果变量为空，则输出变量名和错误消息，然后终止 shell 程序。否则，该构造返回变量的内容。\n\n- **${#var}**\n  返回存储在变量中的字符数作为结果，如果变量为空则返回\
    \ 0。变量本身不会被更改。\n\n  ```bash\n  x='abcde'\n  echo ${#x}      # 输出 5\n  ```\n\n\
    - **${var#pattern}**\n  将变量的开头与指定的模式进行比较。如果识别出该模式，该构造返回变量的内容减去与搜索模式匹配的最短可能文本。另一方面，如果未找到该模式，则返回变量的全部内容。搜索模式中可以使用\
    \ globbing 中已知的字符（即 `*`、`?` 和 `[abc]`）。\n\n  ```bash\n  dat=/home/pi/images/img123.png\n\
    \  echo ${dat#*/}    # 输出 home/pi/images/img123.png\n  echo ${dat#*.}    # 输出\
    \ png\n  ```\n\n- **${var##pattern}**\n  如上所述，但现在消除与模式匹配的最大可能字符串。\n\n  ```bash\n\
    \  echo ${dat##*/}    # 输出 img123.png\n  echo ${dat##*.}    # 输出 png\n  ```\n\n\
    - **${var%pattern}**\n  类似于 `${var#pattern}`，但现在模式匹配在变量内容的末尾执行。从变量末尾消除最短的可能字符串。变量本身保持不变。\n\
    \n  ```bash\n  echo ${dat%/*}    # 输出 /home/pi/images\n  echo ${dat%.*}    # 输出\
    \ /home/pi/images/img123\n  ```\n\n- **${var%%pattern}**\n  如上所述，但现在消除最大的可能字符串。\n\
    \n  ```bash\n  echo ${dat%%/*}    # 无输出（空字符串）\n  echo ${dat%%.*}    # 输出 /home/pi/images/img123\n\
    \  ```\n\n- **${var/find/replace}**\n  将 `find` 模式的第一次出现替换为 `replace`。\n\n  ```bash\n\
    \  x='abcdeab12ab'\n  echo ${x/ab/xy}    # 输出 xycdeaab12ab\n  ```\n\n- **${!var}**\n\
    \  返回其名称包含在字符串中的变量的内容。\n\n  ```bash\n  abc=123\n  efg='abc'\n  echo ${!efg}  \
    \      # 输出 123\n  ```\n\n最后，我想向你展示一个参数替换的典型应用：假设你想使用 `convert` 或 `magick`（参见第\
    \ 16 章，第 16.1 节）将当前目录中的一些 PNG 文件转换为 JPEG 格式。对于这个任务，你必须在 `pngname` 变量中的文件名中将 `.png`\
    \ 标识符替换为 `.jpg`。执行此任务最简单的方法是以下脚本：\n\n```bash\n#!/bin/bash\n# 示例文件 png2jpg.sh\n\
    shopt -s nullglob\nfor pngname in *.png; do\n    # 将 .png 替换为 .jpg\n    jpgname=${pngname%.png}.jpg\n\
    \    convert \"$pngname\" \"$jpgname\"\ndone\n```\n\n`shopt -s nullglob` 可以避免在目录中根本没有\
    \ `*.png` 文件时出现错误消息。关于 `for` 循环如何工作的详细信息将在第 3.12 节中介绍。请注意，当调用 `convert` 命令时，`pngname`\
    \ 和 `jpgname` 变量被括在引号中。这些引号是使脚本能够处理包含空格的文件名的唯一方法。\n\n> **在 Python 中处理字符串要容易得多！**\n\
    >\n> 一旦你习惯了 Bash 编辑字符串的奇怪机制，你就可以用它来解决数量惊人的问题。然而，对于需要操作许多字符串的脚本，你最好使用 Python。我不知道有任何语言能提供如此全面且易于使用的字符串处理函数。\n\
    \n## 3.10.7 Here 文档和 Here 字符串\n\nHere 文档（简称 heredocs）是嵌入在脚本中的文本块，以 `<<` 指定的字符序列结束（通常是\
    \ `EOF`，表示文件结束）。以下示例非常清楚地说明了语法。（`mail` 命令基于机器上正在运行邮件服务器的假设。）\n\n```bash\nname=\"\
    Michael\"\namount=1200\nto=\"spamvictim@spamforever.com\"\n\nmail -s \"Invest\
    \ safely\" $to << EOF\nHello $name, enclosed is a great investment offer\nwithout\
    \ any risk. If you transfer $amount US$ to this account\nyou'll get ...\nEOF\n\
    ```\n\n你可以通过 `cat` 轻松执行多行文本输出，如下例所示：\n\n```bash\ncat << EOF\nThis is\na long\n\
    help text\nEOF\n```\n\n在内部，heredocs 是一种特殊类型的输入重定向。`mail` 或 `cat` 期望从标准输入获取邮件文本。相反，使用以下文本行，并在文本中进行通常的变量替换（`$name`、`$amount`）。\n\
    \n| 颜色 | 代码 | 颜色 | 代码 |\n|---|---|---|---|\n| 红色 | 0;31 | 浅红色 | 1;31 |\n| 紫色 |\
    \ 0;35 | 粉色 | 1;35 |\n| 棕色 | 0;33 | 黄色 | 1;33 |\n| 浅灰色 | 0;37 | 白色 | 1;37 |\n\n\
