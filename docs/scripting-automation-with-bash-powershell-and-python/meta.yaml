- md: "A pair of files serves as the “key.” The public component of the key is stored\
    \ on the SSH server while the private component remains on the machine where you\
    \ want to use the `ssh`, `scp`, or `rsync` commands. When establishing an SSH\
    \ connection, the SSH server can use the public key to check whether the locally\
    \ stored private key matches it. If such a suitable key pair is found, this key\
    \ pair will be considered sufficient authentication, and the password query will\
    \ be omitted.\n\n## 12.4.1 Generating a Key Pair\n\nTo generate a key pair on\
    \ the client machine, you must run `ssh-keygen` once. This command is available\
    \ on Windows, Linux, and macOS if an SSH client is installed. If the command displays\
    \ a warning that a key already exists, you must abort the process or specify a\
    \ new name if you need a second key pair.\n\n```\n$ ssh-keygen\n\nGenerating public/private\
    \ rsa key pair.\nEnter file in which to save the key\n    (/home/kofler/.ssh/id_rsa):\
    \ <Return>\nEnter passphrase (empty for no passphrase): <Return>\nEnter same passphrase\
    \ again: <Return>\nYour identification has been saved in /home/kofler/.ssh/id_rsa\n\
    Your public key has been saved in /home/kofler/.ssh/id_rsa.pub\n```\n\n`ssh-keygen`\
    \ asks if it should secure the key with a *passphrase* (with a password). For\
    \ security reasons, doing so is recommended. If your private key falls into the\
    \ wrong hands, the thief cannot do anything with the key without a password. At\
    \ this point, however, we are talking about the use of keys in scripting, and\
    \ in this context, I recommend that you do *not* specify a passphrase, but just\
    \ press `Enter`. This approach is the only way to automate the execution of your\
    \ scripts with `ssh` or `scp` commands without any user intervention.\n\nBy default,\
    \ the key pair is stored in the `.ssh` directory and consists of two files that\
    \ have different names depending on the encryption algorithm. Many SSH installations\
    \ still use the algorithm of *Rivest-Shamir-Adleman* (RSA). Newer versions use\
    \ methods such as the *Elliptic Curve Digital Signature Algorithm* (ECDSA) and\
    \ the variant *Curve25519*. In the context of this book, the procedure is irrelevant;\
    \ what you need to know is that the key files have different names depending on\
    \ the SSH version.\n\n| Algorithm | Private Key | Public Key |\n| :--- | :---\
    \ | :--- |\n| RSA | id_rsa | id_rsa.pub |\n| ECDSA | id_ecdsa | id_ecdsa.pub |\n\
    | Curve25519 | id_ed25519 | id_ed25519.pub |\n\n**Table 12.1** Names of the Key\
    \ Files Depending on the Algorithm\n\n> **Never Share Your Private Key!**\n\n\
    SSH keys are also required by many hosting providers to set up new servers or\
    \ virtual machines, by Git portals to authenticate Git commands, and so on. Always\
    \ be sure you only pass or upload the public component of the key (*.pub* identifier)—and\
    \ never the private component!\n\nThe keys that consist of two components do not\
    \ correspond to our human imagination. The following analogy fits better:\n\n\
    - The private SSH key is equivalent to a conventional key.\n- The public SSH key,\
    \ on the other hand, corresponds to a lock.\n\nThus, you have an unlimited supply\
    \ of locks (copies of the public key) that you can place in any place you can\
    \ think of, especially on foreign servers. However, you never let the corresponding\
    \ key—the private key file—out of your hand.\n\n## 12.4.2 Storing the Public Component\
    \ of the Key on the Server (macOS and Linux)\n\nIf you work on a Linux or macOS\
    \ client, the second step is also quite simple: You can use `ssh-copy-id` to copy\
    \ the public component of your key to the user directory of the desired account\
    \ on the server. Then, replace `name` with the account name (login name) and replace\
    \ `hostname` with the computer name.\n\n```\n$ ssh-copy-id name@hostname\n\nname@hostname's\
    \ password: ********\n```\n\nSubsequently, you can try out whether everything\
    \ has worked. SSH login should now be possible without going through a password\
    \ request:\n\n```\n$ ssh name@hostname          (login without password!)\n```\n\
    \n## 12.4.3 Storing the Public Component of the Key on the Server (Windows)\n\n\
    On Windows, the `ssh`, `scp`, and `ssh-keygen` commands are available, but `ssh-copy-id`\
    \ is missing. This omission has a simple reason: `ssh-copy-id` is not a compiled\
    \ program, but a Bash script. Thus, a port to Windows would require more effort.\
    \ Fortunately, not a problem: You can copy the public component of the key manually\
    \ to the server and add it to the `.ssh/authorized_keys` file in the home directory\
    \ of the desired account.\n\nThe following listing summarizes the required commands.\
    \ I have prefixed the prompt with a string indicating where the command is to\
    \ be executed: on the local Windows machine or as part of an SSH session on the\
    \ external host. I assume in this case that the host is running Linux or macOS.\
    \ You must replace `name` with the account name; `host`, with the name of the\
    \ external host; and `id_rsa.pub` (or `id_ecdsa.pub`), with the name for the public\
    \ part of your key.\n\n```\nWindows> scp .ssh/id_rsa.pub name@host:\nWindows>\
    \ ssh name@host\n\nhost$ mkdir .ssh\nhost$ touch .ssh/authorized_keys\nhost$ cat\
    \ id_rsa.pub >> .ssh/authorized_keys\nhost$ chmod 700 .ssh\nhost$ chmod 600 .ssh/authorized_keys\n\
    ```\n\nThe `mkdir` and `touch` commands are only necessary if the `.ssh/authorized_keys`\
    \ file does not yet exist. `cat` adds the key (which is simply a few lines of\
    \ text with a hexadecimal code) to the end of this file. The two `chmod` commands\
    \ ensure that the access rights for the `.ssh` directory and the `authorized_keys`\
    \ file are correct; otherwise, the file will be ignored by the SSH server.\n\n\
    If the SSH server runs the SELinux security system, as is common on Fedora, Red\
    \ Hat, and so on, you must also ensure that the SELinux context is correct:\n\n\
    ```\nhost$ restorecon -R -v .ssh\n```\n\nFinally, in the terminal of your Windows\
    \ computer, you must ensure that the SSH connection setup via `ssh user@host`\
    \ now works without a password.\n\n## 12.5 Example: Uploading Images to a Linux\
    \ Web Server\n\nThe goal of this first example is to use a script to upload all\
    \ new or modified images from a local directory via `scp` to an appropriately\
    \ prepared directory on a web server.\n\n### 12.5.1 Preparatory Measures\n\nIn\
    \ this example, I assume that the web server is running on Ubuntu Linux and that\
    \ the image directory is to be embedded in an existing WordPress installation.\
    \ In principle, of course, the example also works without WordPress and for any\
    \ other distribution. However, you may need to adjust paths and, for Red Hat-based\
    \ distributions, make sure that the SELinux context of the image directory is\
    \ set correctly.\n\nImage upload should be allowed to multiple users/accounts.\
    \ For this reason, the `imageupload` group is created on the server. All users\
    \ who are allowed to upload will be added to this group.\n\nIn addition, the `myimages`\
    \ directory is created on the server. `chown` assigns this directory to the `www-data`\
    \ user (which is the system account of the web server in Debian and Ubuntu) and\
    \ also to the `imageupload` group. The `chmod` command causes all members of the\
    \ `imageupload` group to be allowed to work, read, and write in the directory\
    \ and that newly uploaded files are automatically assigned to this group.\n\n\
    All commands in the following listing are to be executed on the Linux server and\
    \ require root privileges on that server (hence, the # prompt character):\n\n\
    ```\n$ sudo -s\n# addgroup imageupload\n# usermod -a -G imageupload username1\n\
    # usermod -a -G imageupload username2\n# usermod -a -G imageupload username3\n\
    # mkdir /var/www/html/wordpress/myimages\n# chown www-data:imageupload /var/www/html/wordpress/myimages\n\
    # chmod 2775 /var/www/html/wordpress/myimages\n```\n\nFinally, I assume that the\
    \ users (username1, etc.) have uploaded their SSH keys, so scp works without an\
    \ interactive login. Before you start developing the script, you should test it\
    \ interactively, for example, as with the following command:\n\n```\n$ scp tst.jpg\
    \ username1@hostname:/var/www/html/wordpress/myimages\n```\n\n### 12.5.2 Bash\
    \ Script\n\nIn this example, I first assume that the local machine is running\
    \ Linux or macOS. For this case, the Bash script initializes some variables first.\
    \ If the last-run file does not exist, it will be created in the current directory\
    \ with a date of early 2000. This file serves as a reference for find, which only\
    \ considers files that are newer. last-run is updated at the end of the script\
    \ with the time when the script was started (the now file). This somewhat cumbersome\
    \ procedure ensures that the script does not miss any files on the next run that\
    \ were added exactly during the execution of find. Admittedly, this mistake is\
    \ unlikely, but not impossible.\n\nThe find command processes the *.png, *.jpg,\
    \ and *.jpeg identifiers. If you want to include additional identifiers—if necessary\
    \ also in uppercase notation—you must add further options in the form -o -name\
    \ .... In this case, -o means a logical OR. -maxdepth 1 causes find not to search\
    \ any subdirectories. Of course, you can omit this option. Note, however, that\
    \ the directory structure is lost during the upload (i.e., all files end up directly\
    \ in myimages). If you don't want the directory structure to be lost, you should\
    \ use rsync instead of scp.\n\nThe -exec option calls the scp command for each\
    \ file found and passes the filename instead of {}. This feature also works for\
    \ filenames with spaces. \\; specifies where the command for -exec ends.\n\n```\n\
    # Sample file upload-images.sh\nLOCALDIR=$(pwd)\nREMOTEDIR=/var/www/html/wordpress/myimages\n\
    REMOTEHOST=hostname\nREMOTEUSER=username1\n```"
