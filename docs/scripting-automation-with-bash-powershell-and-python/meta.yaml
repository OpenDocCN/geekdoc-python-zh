    # 11.3.2 Setting Up Tasks via cmdlets


    Fortunately, Microsoft Windows Task Scheduler can also be controlled by cmdlets.
    `Get-ScheduledTask` returns a seemingly endless list of all actions stored in
    the system. If you''ve ever wondered why Windows often feels so sluggish, now
    you know the reason. On my test computer, the cmdlet returned 165 active tasks!


    The Windows Task Manager UI always shows only the actions for a specific path—by
    default, those for the \ path, that is, for the root directory of the *task library*.
    You can view all other actions when you select a subdirectory, for example, *Microsoft\Windows\Bitlocker*.


    ```

    > Get-ScheduledTask | Where-Object { $_.State -ne ''Disabled'' }


    TaskPath          TaskName                    State

    -------           --------                    -----

    \                 GoogleUpdateTaskMachine...  Ready

    \                 log date                    Ready

    \                 start syncthing             Running

    \Microsoft\Windows\...  .NET Framework NGEN v4.0...  Ready

    ...

    ```


    > **For Windows Only!**


    All cmdlets presented in this section are available only when you run PowerShell
    scripts on Windows. On Linux and macOS, no task scheduler exists, but other mechanisms
    (i.e., cron, systemd-timer, and launchd) can be used instead, but these capabilities
    cannot be controlled via cmdlets.


    `Get-ScheduledTaskInfo` allows you to determine when the task was last performed
    and when the next start is scheduled:


    ```

    > Get-ScheduledTaskInfo ''log date''

    LastRunTime        : 02.28.2023 09:24:24

    NextRunTime        : 02.28.2023 11:20:20

    NumberOfMissedRuns : 1

    ...


    > Get-ScheduledTask ''log date'' | Get-ScheduledTaskInfo

    (same result)

    ```


    By combining a few cmdlets, you can even set up a new task. Here `New-ScheduledTaskTrigger`
    creates an object for the schedule and `New-ScheduledTaskAction` creates an object
    for the task. `Register-ScheduledTask` saves the new job.'
