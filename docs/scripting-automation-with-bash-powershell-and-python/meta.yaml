    Kali-Linux-2022.2-virtualbox-amd64-disk001.vdi

    kali-english.vdi

    ...

    ```


    You can find information on the rather unintuitive syntax of `xml sel` via `xml
    sel --help`. Further documentation can be found at https://xmlstar.sourceforge.net/docs.php.


    # 10.7 INI Files


    INI files are text files for storing key-value pairs. An INI file can be divided
    into various sections by using `[section]`:


    ```

    ; File config.ini

    [server]

    hostname = example.com

    port = 8080


    [data]

    imagePath = /mnt/images

    dbName = mydb

    ```


    INI files are often used to store configuration data. Only semicolons are provided
    for marking comments. Especially in the Linux environment, however, `#` is also
    mostly accepted.'
  - "[PAGE 307]\n\n# 10.7.1 Python\n\nThe easiest way to read INI files in Python\
    \ is to use the `ConfigParser` module. The following listing shows the intuitive\
    \ application. Note that the parser always returns strings. If you want to use\
    \ port number 8080 as a number, you must perform an appropriate conversion using\
    \ `int()`.\n\n```\n# Sample file read-config.py\nfrom configparser import ConfigParser\n\
    config = ConfigParser()\nconfig.read('config.ini')\nprint(config['server']['port'])\
    \  # output: 8080\n```\n\n# 10.7.2 PowerShell\n\nAlthough INI files are quite\
    \ commonly used on Windows, PowerShell lacks a cmdlet to easily read this type\
    \ of file. In many cases, you can simple use the following commands:\n\n```\n\
    > $config = Get-Content 'config.ini' |\n    Select-String '^.*=.*[^=]*$' |\n \
    \   ConvertFrom-StringData\n\n> $config.port\n8080\n```\n\n`Get-Content` reads\
    \ the file and delivers it line by line. `Select-String` uses a regular expression\
    \ to filter out all lines that match the `key = value` pattern. `ConvertFrom-StringData`\
    \ turns the key-value pairs into a hash table.\n\nHowever, this simple approach\
    \ reaches its limits when the same keys are used in different groups. If you want\
    \ to analyze complex INI files without falling into syntactical traps, you're\
    \ better off using the popular PsIni extension, available at https://www.powershellgallery.com/packages/PsIni.\n\
    \n# 10.7.3 Bash\n\nLike PowerShell, Bash lacks functions to parse INI files. In\
    \ many Linux distributions, you can use `crudini` for this purpose. However, you\
    \ must install the package of the same name beforehand. However, note that this\
    \ package is itself a Python script! `crudini` therefore only works if Python\
    \ is also installed.\n\nTo read a single value, you can simply pass the INI file,\
    \ the section name, and the key name. You can find various other types of applications\
    \ in `crudini --help`.\n\n```\n$ crudini --get config.ini server port\n8080\n\
    ```"
- md: "## Chapter 11\nRunning Scripts Automatically\n\nMany scripts aim to automate\
    \ admin tasks such as running backups, uploading changed/new files, monitoring,\
    \ and logging servers. This chapter describes ways to run scripts automatically\
    \ on a regular basis. I am going to focus primarily on two processes: *cron* for\
    \ Linux and Microsoft Windows Task Scheduler. I will also briefly discuss mechanisms\
    \ for tracking changes in the file system “live,” so to speak, and responding\
    \ immediately.\n\n> **Prerequisites for This Chapter**\n\nThe automation of scripts\
    \ is detached from the choice of script language. In this respect, you can read\
    \ this chapter largely independently from the rest of this book. Section 11.1\
    \ on cron is easier to understand if you have some prior knowledge of Linux system\
    \ administration. In particular, you must be able to modify system files using\
    \ a text editor.\n\nThe examples presented in this chapter draw on working techniques\
    \ from the previous chapters, such as using the `curl` command (see Chapter 8)\
    \ or analyzing XML files (see Chapter 10).\n\nA good follow-up to this chapter\
    \ would be Chapter 15, where you’ll find further application examples for the\
    \ methods presented in this chapter.\n\n## 11.1 cron\n\ncron is a background program\
    \ that runs on almost every Linux server. Its task is to start commands or scripts\
    \ at fixed times, for example, every day at 3:00 am or every Sunday at 11:00 pm.\
    \ cron is controlled by the `/etc/crontab` file, whose somewhat strange syntax\
    \ I will explain in a moment.\n\ncron is installed by default on many Linux distributions.\
    \ If the `/etc/crontab` file does not exist on your system, you can easily resolve\
    \ the situation:\n\n```\n$ sudo apt update && sudo install cron          (Debian,\
    \ Ubuntu)\n$ sudo dnf install cronie && \\\n    sudo systemctl enable --now crond\
    \            (Fedora, RHEL)\n```\n\n### 11.1.1 /etc/crontab\n\nThe following lines\
    \ show an excerpt from a crontab file:\n\n```\n# File /etc/crontab\n# every day\
    \ at 3:00 am: Backup\n0 3 * * * root /etc/myscripts/backup.sh\n# on the first\
    \ day of each month at 0:00:\n# statistical analysis of login data\n0 0 1 * *\
    \ root /etc/myscripts/statistics.py\n```\n\ncrontab files describe the commands\
    \ to be executed line by line, where each entry is composed of seven columns:\n\
    \nminutes hours day-of-month month weekday user cmd\n\n- minutes: 0-59\n- hours:\
    \ 0-12\n- day-of-month: 1-31\n- month: 1-12\n- weekday: 0-7 (0 = 7 = Sunday, 1\
    \ = Monday, etc.)\n- user: Account under which the script should be executed (often\
    \ root)\n- cmd: The command to execute, often simply the path to a script\n\n\
    Lines beginning with # are comments. The last line of the crontab file must end\
    \ with a newline character. The following syntax rules apply to the first five\
    \ columns in the crontab file:\n\n- Enumerations: 7,9,12 (without spaces!)\n-\
    \ Sections: 3-5\n- Always: *\n- All n: */10 corresponds to 0,10,20,30...\n\nThe\
    \ columns are usually linked by a logical AND. An exception is if day-of-month\
    \ and weekday are specified; then, a logical OR applies to these two columns.\
    \ The command is executed both on the nth day of the month and on the specified\
    \ day of the week.\n\nThe following listing contains some syntax examples. You\
    \ can verify your own cron time compositions at https://crontab.guru.\n\n```\n\
    # every 15 minutes\n*/15 * * * * root cmd\n# daily at 0:15, 1:15, 2:15, etc.\n\
    15 * * * * peter cmd\n# daily at 1:30\n30 1 * * * maria cmd\n# every Saturday\
    \ at 0:29\n29 0 * * 6 root cmd\n# on every 1st of the month at 6:25\n25 6 1 *\
    \ * www-data cmd\n# on the 1st and 15th of the month and every Monday\n# always\
    \ at midnight\n0 0 1,15 * 1 root cmd\n```\n\nProvided that cron jobs are executed\
    \ on a machine where a mail server is configured, the output or error messages\
    \ are sent to `root@localhost`. You can change this address by setting `MAILTO=...`\
    \ within `/etc/crontab`.\n\n> **Trouble with PATH and LANG**\n\nA different `PATH`\
    \ default setting applies to cron jobs than in interactive mode. Changes to `PATH`\
    \ in `.bashrc` are not taken into account. For this reason, commands installed\
    \ outside the usual directories like `/usr/bin` or `/usr/sbin` cannot be executed!\n\
    \nYou should therefore make sure to test whether your script is also executed\
    \ correctly when started by cron. If necessary, you must specify the full path\
    \ in the script for manually installed commands, for example, `/usr/local/bin/aws`\
    \ to run the Amazon Web Services (AWS) client. Alternatively, for some cron implementations,\
    \ you can redefine the `PATH` variable directly in `/etc/crontab`. There you need\
    \ to specify all directories in which commands are to be searched for, for example\
    \ as follows:\n\n`PATH=/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin`\n\
    \nAnother possible source of errors can be the `LANG` environment variable, which\
    \ may have a different setting in cron jobs than when you run your scripts locally.\
    \ A setting in `/etc/crontab` like for `PATH` is not possible. However, you can\
    \ set `LANG` at the beginning of your script.\n\n### 11.1.2 Personal crontab Files\n\
    \nModifying `/etc/crontab` requires system administrator privileges. If these\
    \ privileges are not available to you, you can modify your own `crontab` file.\
    \ This file is located in `/var/spool/cron/<user>` or in `/var/spool/cron/crontabs/<user>`,\
    \ depending on the Linux distribution.\n\nYou can open your personal crontab file\
    \ using the `crontab -e` command. By default, the vi editor is used in this context,\
    \ which is not user friendly. If you've started the program by mistake, you can\
    \ exit it by pressing `Esc`, typing `\":q,\"` and pressing `Enter` without saving\
    \ changes. If necessary, you can select a simpler editor via the `EDITOR` variable\
    \ before running the `crontab` command:\n\n```\n$ export EDITOR=/usr/bin/nano\n\
    $ crontab -e\n```\n\nNote that the sixth column for the account is omitted in\
    \ the private *crontab* file. The command or script is always executed with the\
    \ rights of your account. This limitation is the biggest disadvantage of this\
    \ method: Many admin tasks (such as system-wide backups) require root privileges\
    \ and cannot be performed in “ordinary” accounts. `sudo` does not help in this\
    \ case either because this command requires the interactive input of your password.\n\
    \n### 11.1.3 Hourly, Daily, Weekly, and Monthly Directories\n\nIf you don’t care\
    \ about the exact time when your cron tasks are performed, you can save the script\
    \ to be called in one of the following directories:\n\n- /etc/cron.hourly\n- /etc/cron.daily\n\
    - /etc/cron.weekly\n- /etc/cron.monthly\n\nThe benefit of this method is that\
    \ you do not need to deal with the crontab syntax. Remember to mark your script\
    \ file as executable by using `chmod +x`! Your scripts will be executed with root\
    \ privileges.\n\n### 11.1.4 Alternatives to cron\n\nOn Linux, *systemd-timer*\
    \ is becoming more frequently used. The biggest advantage of systemd-timer compared\
    \ to cron is that started jobs can be monitored more comprehensively. But this\
    \ advantage is offset by a much higher degree of complexity. While setting up\
    \ a cron job can be done in 30 seconds with a little experience, timer jobs require\
    \ you create *two* relatively complex configuration files. A good description\
    \ of the mechanism can be found on the Arch Linux wiki at https://wiki.archlinux.org/title/Systemd/Timers.\
    \ This information also applies to other distributions.\n\n### 11.1.5 Starting\
    \ Jobs Automatically on macOS\n\ncron is also available on macOS but is considered\
    \ obsolete there. The /etc/crontab file does not exist by default. However, you\
    \ only need to create the file (for example, using `sudo nano /etc/crontab`) and\
    \ insert one correct entry; then, the job will be executed without any further\
    \ configuration work. In this respect, cron is the simplest solution for automating\
    \ the script call for macOS until further notice.\n\nApple recommends using the\
    \ macOS-specific *launchd* program instead of cron. The configuration is done\
    \ by XML files, whose syntax is documented here:\n\n- https://bas-man.dev/post/launchd-instead-of-cron\n\
    - https://developer.apple.com/library/archive/documentation/MacOSX/Conceptual/BPSystemStartup/Chapters/ScheduledJobs.html"
  mdcn: "## 第11章\n自动运行脚本\n\n许多脚本旨在自动化管理任务，例如运行备份、上传已更改/新文件、监控和记录服务器。本章描述了定期自动运行脚本的方法。我将主要关注两个过程：用于Linux的*cron*和Microsoft\
    \ Windows任务计划程序。我还将简要讨论跟踪文件系统“实时”变化并立即响应的机制。\n\n> **本章先决条件**\n\n脚本的自动化与脚本语言的选择无关。在这方面，你可以很大程度上独立于本书的其他部分阅读本章。如果你对Linux系统管理有一些先验知识，那么关于cron的11.1节会更容易理解。特别是，你必须能够使用文本编辑器修改系统文件。\n\
    \n本章介绍的示例借鉴了前面章节的工作技术，例如使用`curl`命令（参见第8章）或分析XML文件（参见第10章）。\n\n本章的一个很好的后续是第15章，你将在那里找到本章介绍的方法的更多应用示例。\n\
    \n## 11.1 cron\n\ncron是一个在几乎所有Linux服务器上运行的后台程序。它的任务是在固定时间启动命令或脚本，例如，每天凌晨3:00或每周日晚上11:00。cron由`/etc/crontab`文件控制，我稍后会解释其有些奇怪的语法。\n\
    \ncron在许多Linux发行版上是默认安装的。如果你的系统上不存在`/etc/crontab`文件，你可以轻松解决这种情况：\n\n```\n$ sudo\
    \ apt update && sudo install cron          (Debian, Ubuntu)\n$ sudo dnf install\
    \ cronie && \\\n    sudo systemctl enable --now crond            (Fedora, RHEL)\n\
    ```\n\n### 11.1.1 /etc/crontab\n\n以下行显示了crontab文件的摘录：\n\n```\n# File /etc/crontab\n\
    # every day at 3:00 am: Backup\n0 3 * * * root /etc/myscripts/backup.sh\n# on\
    \ the first day of each month at 0:00:\n# statistical analysis of login data\n\
    0 0 1 * * root /etc/myscripts/statistics.py\n```\n\ncrontab文件逐行描述要执行的命令，其中每个条目由七列组成：\n\
    \n分钟 小时 日期 月份 星期 用户 命令\n\n- 分钟：0-59\n- 小时：0-12\n- 日期：1-31\n- 月份：1-12\n- 星期：0-7（0\
    \ = 7 = 星期日，1 = 星期一，等等）\n- 用户：应执行脚本的账户（通常是root）\n- 命令：要执行的命令，通常只是脚本的路径\n\n以#开头的行是注释。crontab文件的最后一行必须以换行符结尾。crontab文件的前五列适用以下语法规则：\n\
    \n- 枚举：7,9,12（无空格！）\n- 范围：3-5\n- 始终：*\n- 所有n：*/10 对应 0,10,20,30...\n\n这些列通常通过逻辑与连接。例外情况是指定了日期和星期；那么，这两列适用逻辑或。命令既在每月的第n天执行，也在指定的星期几执行。\n\
    \n以下列表包含一些语法示例。你可以在 https://crontab.guru 验证你自己的cron时间组合。\n\n```\n# every 15 minutes\n\
    */15 * * * * root cmd\n# daily at 0:15, 1:15, 2:15, etc.\n15 * * * * peter cmd\n\
    # daily at 1:30\n30 1 * * * maria cmd\n# every Saturday at 0:29\n29 0 * * 6 root\
    \ cmd\n# on every 1st of the month at 6:25\n25 6 1 * * www-data cmd\n# on the\
    \ 1st and 15th of the month and every Monday\n# always at midnight\n0 0 1,15 *\
    \ 1 root cmd\n```\n\n假设cron作业在配置了邮件服务器的机器上执行，输出或错误消息将发送到`root@localhost`。你可以通过在`/etc/crontab`中设置`MAILTO=...`来更改此地址。\n\
    \n> **PATH 和 LANG 的问题**\n\ncron作业应用的`PATH`默认设置与交互模式不同。对`.bashrc`中`PATH`的更改不会被考虑在内。因此，安装在`/usr/bin`或`/usr/sbin`等常用目录之外的命令无法执行！\n\
    \n因此，你应该确保测试你的脚本在由cron启动时是否也能正确执行。如有必要，你必须在脚本中为手动安装的命令指定完整路径，例如，`/usr/local/bin/aws`来运行Amazon\
    \ Web Services (AWS)客户端。或者，对于某些cron实现，你可以直接在`/etc/crontab`中重新定义`PATH`变量。在那里，你需要指定所有要搜索命令的目录，例如如下：\n\
    \n`PATH=/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin`\n\n另一个可能的错误来源是`LANG`环境变量，它在cron作业中的设置可能与你本地运行脚本时不同。像`PATH`一样在`/etc/crontab`中设置是不可能的。但是，你可以在脚本开头设置`LANG`。\n\
    \n### 11.1.2 个人crontab文件\n\n修改`/etc/crontab`需要系统管理员权限。如果你没有这些权限，你可以修改你自己的`crontab`文件。该文件位于`/var/spool/cron/<user>`或`/var/spool/cron/crontabs/<user>`，具体取决于Linux发行版。\n\
    \n你可以使用`crontab -e`命令打开你的个人crontab文件。默认情况下，此上下文中使用vi编辑器，它并不友好。如果你不小心启动了该程序，你可以通过按`Esc`，输入`\"\
    :q,\"`并按`Enter`而不保存更改来退出。如有必要，你可以在运行`crontab`命令之前通过`EDITOR`变量选择一个更简单的编辑器：\n\n\
    ```\n$ export EDITOR=/usr/bin/nano\n$ crontab -e\n```\n\n请注意，在个人*crontab*文件中省略了账户的第六列。命令或脚本始终以你的账户权限执行。此限制是此方法的最大缺点：许多管理任务（如系统范围的备份）需要root权限，无法在“普通”账户中执行。`sudo`在这种情况下也无济于事，因为此命令需要交互式输入你的密码。\n\
    \n### 11.1.3 每小时、每天、每周和每月目录\n\n如果你不关心cron任务执行的确切时间，你可以将要调用的脚本保存在以下目录之一：\n\n- /etc/cron.hourly\n\
    - /etc/cron.daily\n- /etc/cron.weekly\n- /etc/cron.monthly\n\n这种方法的好处是你不需要处理crontab语法。记得使用`chmod\
    \ +x`将你的脚本文件标记为可执行！你的脚本将以root权限执行。\n\n### 11.1.4 cron的替代方案\n\n在Linux上，*systemd-timer*的使用越来越频繁。与cron相比，systemd-timer的最大优势是启动的任务可以更全面地监控。但这一优势被更高的复杂性所抵消。虽然设置一个cron作业可以在30秒内完成（如果有点经验的话），但定时器作业要求你创建*两个*相对复杂的配置文件。关于该机制的良好描述可以在Arch\
    \ Linux wiki上找到：https://wiki.archlinux.org/title/Systemd/Timers。此信息也适用于其他发行版。\n\
    \n### 11.1.5 在macOS上自动启动作业\n\ncron在macOS上也可用，但被认为已过时。默认情况下不存在/etc/crontab文件。但是，你只需要创建该文件（例如，使用`sudo\
    \ nano /etc/crontab`）并插入一个正确的条目；然后，作业将在没有任何进一步配置工作的情况下执行。在这方面，cron是macOS自动化脚本调用的最简单解决方案，直到进一步通知。\n\
    \nApple建议使用macOS特定的*launchd*程序代替cron。配置通过XML文件完成，其语法在此处有文档记录：\n\n- https://bas-man.dev/post/launchd-instead-of-cron\n\
    - https://developer.apple.com/library/archive/documentation/MacOSX/Conceptual/BPSystemStartup/Chapters/ScheduledJobs.html"
