    ## 5.12.9 Loops over All Files in a Directory\n\nThe `os.listdir` function returns\
    \ an unordered list of all files and subdirectories in a directory. You can easily\
    \ loop through it using `for`.\n\nWhen processing the files, however, note that\
    \ `listdir` returns the filenames without path information, for example, `readme.txt`\
    \ instead of `/home/kofler/readme.txt`. For further processing, you must therefore\
    \ often form the complete filename via `os.path.join`, for example, in the following\
    \ listing:\n\n```python\n# Sample file list-directory.py\nimport os\nstartdir\
    \ = os.path.expanduser('~')\nprint('All files and directories in', startdir)\n\
    \nfor filename in os.listdir(startdir):\n    fullname = os.path.join(startdir,\
    \ filename)\n\n    if os.path.isfile(fullname):\n        print(\"File: \", fullname)\n\
    \    elif os.path.isdir(fullname):\n        print('Directory: ', fullname)\n```\n\
    \nIn this example, `os.path.expanduser('~')` returns the full path of the home\
    \ directory. If instead you're only interested in `*.pdf` files in this directory,\
    \ you can proceed with the following code:\n\n```python\nfor filename in os.listdir(startdir):\n\
    \    if not filename.lower().endswith('.pdf'): continue\n    fullname = os.path.join(startdir,\
    \ filename)\n    if os.path.isfile(fullname):\n        print('PDF file: ', fullname)\n\
    ```\n\n## 5.13 Functions\n\nPython provides two options for defining your own\
    \ functions: You can introduce ordinary functions using the `def` keyword. Alternatively,\
    \ you can define and immediately apply what are called *lambda functions* with\
    \ little overhead. Let's start with ordinary functions.\n\nThe definition of functions\
    \ starts with the `def` keyword. This keyword is followed by the function name,\
    \ for which the same rules apply as for variable names. The parameters must be\
    \ enclosed in parentheses.\n\n```python\ndef myfunc(para1, para2, para3):\n  \
    \  code\n```\n\nSome rules for programming and using functions include the following:\n\
    \n- Functions must be defined before they can be used. As a result, a common practice\
    \ is to define all functions first and then specify the rest of the code. The\
    \ execution of the code thus begins in the first line that does *not* belong to\
    \ a function definition.\n- Functions can be exited prematurely using `return`.\
    \ The use of `return` is optional. If you use `return`, the function can return\
    \ a result, even in the form of lists, tuples, and so on. In this way a function\
    \ can easily return *multiple* values.\n\nIn the following mini program, two functions\
    \ are first defined and then called to demonstrate the basic handling of functions:\n\
    \n```python\ndef f1(x, y):           # function without result\n    print('Parameter\
    \ 1:', x)\n    print('Parameter 2:', y)\n\ndef f2(x, y):           # function\
    \ with result\n    return x + y\n\n# here begins the actual code execution\nf1(2,\
    \ 3)    # outputs the parameters\n# Output: Parameter 1: 2\n#         Parameter\
    \ 2: 3\n\nn = f2(4, 5)\nprint(\"Result:\", n)\n# Output: Result: 9\n```\n\n###\
    \ 5.13.1 Global and Local Variables\n\nFunctions can read (but not modify) variables\
    \ that are defined outside the function:\n\n```python\ndef f1():\n    print(x)\n\
    \nx = 3\nf1()  # Output 3\n```\n\nConversely, variables that are initialized in\
    \ a function—that is, functions that are on the left side of an assignment—are\
    \ considered *local*: They can only be used within the function. This rule also\
    \ applies if a variable within a function has the same name as a variable outside\
    \ the function.\n\n```python\ndef f1():\n    y = 5\n    print(y)    # Output 5\n\
    \nf1()\nprint(y)        # Error, y is not defined!\n```\n\nIf you want to change\
    \ a variable in a function that was initialized outside the function, then you\
    \ must mark this variable as `global` inside the function. Strictly speaking,\
    \ you're saying that the function should not consider z as a local variable, but\
    \ as a variable from the *global scope* of the program.\n\n```python\ndef f1():\n\
    \    global z\n    z = z + 3\n\nz = 3\nf1()\nprint(z)        # Output 6\n```\n\
    \nIn practice, you should avoid the `global` keyword as it leads to cluttered\
    \ code. A better approach is to return the function result via `return` and then\
    \ save it:\n\n```python\ndef f1(x):\n    return x + 3\n\nz = 3\nz = f1(z)\nprint(z)\
    \    # Output 6\n```\n\n### 5.13.2 Parameters\n\nParameters are used to pass data\
    \ to a function. Internally, the parameters behave like local variables. A parameter\
    \ named x is thus completely independent of a variable of the same name defined\
    \ outside the function.\n\nThe same rules apply for passing data in the parameters\
    \ of a function as for variable assignments (Section 5.9.3). Thus, for immutable\
    \ data types, a change of the data through the function is excluded (see the previous\
    \ example).\n\nWith mutable data types, changes to the contents of an object,\
    \ list, set, etc. are possible. In the following example, the function adds an\
    \ element to the list:\n\n```python\ndef f1(x):\n    x.append(3)\n\nx = [1, 2]\n\
    f1(x)\nprint(x)    # Output [1, 2, 3]\n```\n\n### 5.13.3 Optional Parameters\n\
    \nYou can use `para=default` to define a default value for a parameter. At the\
    \ same time, this parameter will then be optional. All optional parameters must\
    \ be specified at the end of the parameter list.\n\nTo make the call of functions\
    \ with many optional parameters more manageable, the function parameters can also\
    \ be passed in the `name=value` notation. Creating a function call with named\
    \ parameters also has an advantage in that you don't need to adhere to the order\
    \ of the parameters, and the code can thus be more readable.\n\n```python\ndef\
    \ f(a, b, c=-1, d=0):\n    print(a, b, c, d)\n\nf(6, 7, 8, 9)      # Output 6\
    \ 7  8 9\nf(6, 7, 8)         # Output 6 7  8 0\nf(a=6, b=7, d=9)   # Output 6\
    \ 7 -1 9\nf(d=9, b=7, a=6)   # Output 6 7 -1 9\nf(6, 7)            # Output 6\
    \ 7 -1 0\nf(6, 7, d=3)       # Output 6 7 -1 3\nf(6)               # Error, b\
    \ is missing\nf(b=6, c=7)        # Error, a is missing\n```\n\n### 5.13.4 Variable\
    \ Number of Parameters\n\nIf you define a parameter in the `*para` or `**para`\
    \ format, then this parameter will take any number of values. With `*para`, these\
    \ parameters are subsequently available as tuples, with `**para` as a dictionary.\
    \ `**para` arguments *must* be passed as named parameters.\n\n```python\ndef f(a,\
    \ b, *c):\n    print(a, b, c)\n\nf(1, 2, 3)            # Output 1 2 (3)\nf(1,\
    \ 2, 3, 4)         # Output 1 2 (3, 4)\nf(1, 2, 3, 4, 5, 6)   # Output 1 2 (3,\
    \ 4, 5, 6)\n```\n\nIf the data you want to pass to a function is in a list, tuple,\
    \ or other enumerable data structure, the `function(*list)` notation is also allowed\
    \ when calling the function. In this way, the elements of the list will be automatically\
    \ distributed among the parameters:\n\n```python\nl = [1, 2, 3, 4, 5, 6]\nf(*l)\
    \                # Output 1 2 (3, 4, 5, 6)\n```\n\n### 5.13.5 Lambda Functions\n\
    \nYou can use custom functions for two reasons: on the one hand, to break complex\
    \ code into manageable chunks or, on the other hand, because you want to perform\
    \ a particular task in different places in the code and thus avoid redundant code.\
    \ Sometimes, however, you need a third variant.\n\nAt *one* point in the code—for\
    \ example, in a `map` statement, in a `filter` statement, or for formulating a\
    \ callback function—you need a function that is often quite simple. The conventional\
    \ way to create temporary functions is then cumbersome: You must first define\
    \ the function using `def`, then use that function only once.\n\nIn such cases,\
    \ lambda functions represent an alternative that saves space and that, above all,\
    \ is much clearer: The function can be defined ad hoc and at the same time used\
    \ immediately at this point in the code. As these functions are not assigned any\
    \ name at all, lambda functions are also referred to as *anonymous functions*.\n\
    \nThe following line contains the syntax for defining a lambda function. The `lambda`\
    \ keyword is first followed by the parameters of the function and, after a colon,\
    \ by the function expression. A major limitation compared to other functions is\
    \ that lambda functions can only consist of a single expression.\n\n```python\n\
    lambda var1, var2, var3, ...: expression\n```\n\nThe following mini program demonstrates\
    \ the use of two lambda functions: The first lambda expression recognizes numbers\
    \ that are divisible by 3 and uses this criterion to include elements in `lst2`.\
    \ The second lambda expression is applied to all elements of `lst2` to divide\
    \ integers by 3. The resulting list ends up in `lst3`.\n\n```python\nlst1 = [1,\
    \ 2, 3, 9, 345, 36, 33]\n# lst2 contains all elements of lst1 divisible by 3\n\
    lst2 = list(filter(lambda x: x % 3 == 0, lst1))\nprint(lst2)    # Output [3, 9,\
    \ 345, 36, 33]\n# divide all elements of lst2 by 3\nlst3 = list(map(lambda x:\
    \ x // 3, lst2))\nprint(lst3)    # Output [1, 3, 115, 12, 11]\n```"
