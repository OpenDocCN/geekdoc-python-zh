    # 14.3.1 Controlling GitHub Remotely Using gh


    The `git` command works for any Git repository. However, this command cannot perform
    operations that are specific to GitHub, for example, setting up a new repository
    on GitHub, performing a pull request, and so on. For such purposes, GitHub provides
    the `gh` command. You can find related downloads and installation instructions
    at https://github.com/cli/cli/releases.


    After installation, you would perform a one-time authentication via `gh auth login`,
    which must be done in a web browser. `gh` takes care of starting the web browser
    and navigating to the correct page.


    Then, you can use `gh repo list` to list your repositories on GitHub, `gh repo
    create` to set up a new repository, `gh pr create` to add a pull request, `gh
    pr status` to query the status of a pull request, and so on. You can call `gh`
    like `git` in your scripts. A reference of all `gh` commands can be found at https://cli.github.com/manual/gh.


    > **GitLab Remote Control**


    As the name suggests, `gh` is only suitable for GitHub. For GitLab, an analogous
    project exists (the `glab` command); see https://gitlab.com/gitlab-org/cli.


    # 14.4 Git Hooks


    *Git hooks* are scripts that are automatically executed before or after certain
    Git actions. In each new Git repository, you''ll find a collection of script patterns
    for various actions in the `.git/hooks` directory:


    ```

    $ ls .git/hooks


    applypatch-msg.sample       prepare-commit-msg.sample

    commit-msg.sample          pre-push.sample

    fsmonitor-watchman.sample   pre-rebase.sample

    post-update.sample         pre-receive.sample

    ```'
