    pre-commit.sample update.sample

    pre-merge-commit.sample


    The sample files are well documented shell scripts. A look into these files not
    only reveals the purpose of the respective hook, but also immediately shows working
    sample code.


    To activate a hook, you must remove the `.sample` identifier. (Unlike the sample
    files in this book, the `.sh` identifier is also taboo. The scripts are executed
    only if they have no identifier at all!)


    On Linux and macOS, you also must ensure that the execute bit is set, which means
    you need to run `chmod +x script.sh`. On Windows, the script is executed by Git
    Bash. For more basic information on Git hooks, see the Git manual at https://git-scm.com/book/en/v2/Customizing-Git-Git-Hooks.


    > **GitHub Actions and GitLab Pipelines**

    As an alternative to Git hooks, the major Git platforms provide alternative mechanisms
    to automatically perform actions when commits are executed, for example, for automated
    testing or for automatic deployment to other systems.

    The configuration files for these mechanisms contain script sections where you
    can specify code in turn. Basic scripting knowledge thus helps even if you don''t
    want to use hooks but do want to use certain advanced GitHub or GitLab features.


    # 14.4.1 Example: Detecting Unversioned Files Before the Commit


    The `.git/hooks/pre-commit` script is executed before each commit. This script
    can be used to guarantee compliance with certain rules of a commit. If the script
    returns an error code (i.e., an exit code not equal to 0), `git commit` aborts,
    and the user must fix the detected defect.


    The following example comes from my book with Bernd Öggl, *Git: Project Management
    for Developers and DevOps Teams* (Rheinwerk Computing, 2023). `pre-commit` tests
    if changed or new files exist that are not included in the commit and also not
    excluded by `.gitignore`. If so, these files will be listed by `git status`.


    `exit 1` prevents you from forgetting a file during a commit. But at the same
    time, the script forces you to explicitly enumerate in `.gitignore` all the files
    that should be disregarded. This requirement can be quite annoying.


    ```

    #!/bin/sh

    # Sample file pre-commit, must be copied into the

    # .git/hooks directory

    untracked=$(git ls-files --others --exclude-standard | wc -l)

    ```'
