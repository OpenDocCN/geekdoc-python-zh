    # 5.17.2 Distributing Custom Scripts across Multiple Files


    You can also use the module mechanism to distribute large scripts across multiple
    files. To do this, you simply import the relevant files into your main script
    using `import myname`. This loads the `myname.py` file from the local directory.
    The functions defined there are then available in the main script.


    It is convenient to define only functions (or classes, but I won''t go into that
    in this book) in your own module files. Code that is immediately executable should
    be located only in the main file of your script.


    > **Name Conflicts with Standard Modules**


    This useful mechanism can cause errors that are difficult to understand. For example,
    you want to use the Python module `csv` in your script. If your own `csv.py` file
    exists in the local directory, then it will be loaded instead of the Python module.


    You should therefore avoid naming your own script files the same as Python modules!
    This recommendation is easier said than done, because you can''t possibly know
    the names of all Python modules. In any case, keep this possibility of an error
    in mind.


