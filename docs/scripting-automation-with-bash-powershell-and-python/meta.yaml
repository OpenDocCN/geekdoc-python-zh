  - "[PAGE 368]\n\n```\n# Sample file sync-folders.sh\n# what is to be synchronized\
    \  where\nDESTVOLUME=\"/run/media/kofler/mybackupdisk\"\nDESTDIR=\"backup-kofler\"\
    \nLOGDIR=\"$DESTDIR/sync-logging\"\nSYNCDIRS=(\"Documents\" \"Pictures\" \"myscripts\"\
    )\n\n# is the backup file system available?\nif ! mount | grep $DESTVOLUME --quiet;\
    \ then\n    echo \"Backup disk $DESTVOLUME not found. Exit.\"\n    exit 1\nfi\n\
    \n# create destination and logging directories\nmkdir -p \"$DESTVOLUME/$DESTDIR\"\
    \nmkdir -p \"$DESTVOLUME/$LOGDIR\"\n\n# compose file name for logging\nlogfname=$(date\
    \ \"+rsycn-%Y-%m-%d--%H-%M.log\")\nlog=\"$DESTVOLUME/$LOGDIR/$logfname\"\n\n#\
    \ loop through all directories\nfor dir in \"${SYNCDIRS[@]}\"; do\n    from=$HOME/$dir\n\
    \    to=$DESTVOLUME/$DESTDIR/$dir\n    echo \"sync from $from to $to\"\n    rsync\
    \ -a --delete -v \"$from\" \"$to\" >> $log\ndone\n```\n\nThe `rsync` options have\
    \ the following effect:\n\n+   - `-a` (*archive*): Process directories recursively,\
    \ get file information (owner, access rights)\n- `--delete`: Delete locally deleted\
    \ directories and files also in backup (caution!)\n- `-v` (*verbose*): Output\
    \ in detail what is currently going on\n\nTo have the script called automatically\
    \ once a day at 12:30 pm, I added the following entry to `/etc/crontab`. You can\
    \ simply adjust the desired time, account name, and path to the backup script\
    \ to suit your particular requirements:\n\n```\n# in file /etc/crontab\n30 12\
    \ * * * kofler /home/kofler/myscripts/sync-folders.sh\n```\n\n> **macOS**\nI have\
    \ tested this script only on Linux. For macOS, small adaptations are required,\
    \ especially regarding the test that checks whether the backup disk is currently\
    \ connected to the computer."
