- md: "## 5.8.1 Sets\n\nA *set* is an unordered set of elements without duplicates.\
    \ It is impossible for a set to contain the same object more than once. Unlike\
    \ lists, Python does not remember the order of the elements. You must not assume\
    \ that the elements will be processed in the same order in which you inserted\
    \ them.\n\nSets are formulated in curly brackets. Strings can be converted to\
    \ a character set by using `set`; in this process, duplicates are automatically\
    \ eliminated.\n\n```\n>>> s = {1, 2, 3}\n>>> s\n{1, 2, 3}\n>>> s = set('Hello\
    \ World!')\n>>> s\n{'r', 'W', 'l', ' ', 'e', 'd', 'H', 'l', 'o'}\n```\n\nYou can\
    \ use sets to perform set operations, for example, to find out which objects from\
    \ set 1 are also contained in set 2. I have presented the outputs in the next\
    \ example in order only for better readability; if you try the tests yourself,\
    \ the letters will be output in random order.\n\n```\n>>> x = set('abcdef')\n\
    >>> y = set('efgh')\n>>> x | y    # join\n{'a', 'c', 'b', 'e', 'd', 'g', 'f',\
    \ 'h'}\n>>> x - y    # difference\n{'a', 'c', 'b', 'd'}\n>>> x & y    # intersection\
    \ (common elements)\n{'e', 'f'}\n```\n\n## 5.8.2 Dictionaries\n\nFor lists and\
    \ tuples, access to individual elements occurs via a numeric index, that is, via\
    \ `list(n)` or `tuple(n)`. Dictionaries, on the other hand, allow element lists\
    \ to be managed with an arbitrary key. In some programming languages (such as\
    \ Bash), such data structures are called *associative arrays*.\n\nDictionaries\
    \ are formulated like sets in curly brackets. In contrast to sets, however, dictionaries\
    \ always store key-value pairs. The following example stores some HTML color codes,\
    \ using the name of the color as the key:\n\n```\n>>> colors = {'red' : 0xff0000,\
    \ 'green' : 0xff00, 'blue' : 0xff,\n            'white' : 0xffffff}\n```\n\nNot\
    \ only are dictionaries syntactically related to sets, but also in terms of their\
    \ function: They do not preserve the order of the elements. To access the elements\
    \ of the dictionary you can use the key. `hex` converts the numbers stored as\
    \ decimals to hexadecimal notation:\n\n```\n>>> colors['red']          # Access\
    \ to an element\n16711680\n>>> hex(colors['red'])\n'0xff0000'\n```\n\nAttempting\
    \ to access an element that does not exist will result in a `KeyError`. To avoid\
    \ this error, you can use `key in dict` to test in advance whether the dictionary\
    \ contains an element for a certain key:\n\n```\n>>> colors['yellow']\nKeyError:\
    \ 'yellow'\n>>> 'yellow' in colors\nFalse\n```\n\n`len` returns the number of\
    \ elements as for lists, sets, and tuples. The `dict[key]=value` statement enables\
    \ you to extend the dictionary:\n\n```\n>>> len(colors)            # determines\
    \ the number of elements\n4\n>>> colors['black'] = 0    # adds an element\n```\n\
    \n`del dict[key]` removes an element:\n\n```\n>>> del colors['red']      # deletes\
    \ an element\n>>> colors                 # output all key-value pairs\n{'black':\
    \ 0, 'blue': 255, 'white': 16777215, 'green': 65280}\n```\n\nThe `keys` and `values`\
    \ methods return all keys and all values of the dictionary, respectively. If necessary,\
    \ you can convert this data to lists or sets by using `list` or `set`:\n\n```\n\
    >>> colors.values()\ndict_values([0, 255, 16777215, 65280])\n>>> colors.keys()\n\
    dict_keys(['black', 'blue', 'white', 'green'])\n>>> set(colors.keys())\n{'black',\
    \ 'blue', 'white', 'green'}\n>>> list(colors.keys())\n['black', 'blue', 'white',\
    \ 'green']\n```\n\nWhen you create a for loop through a dictionary, Python puts\
    \ all the keys in the loop variable:\n\n```\n>>> for c in colors:\n        print(\"\
    The color\", c, \" has color code\", hex(colors[c]))\n```\n\nThe color black has\
    \ color code 0x0\nThe color blue has color code 0xff\nThe color white has color\
    \ code 0xffffff\nThe color green has color code 0xff00\n\nThese examples used\
    \ strings as keys. Basically, however, any Python object is suitable as a key.\
    \ The only requirement is that the keys are unique.\n\n> “Real” Examples\nOn the\
    \ preceding pages, I have tried to illustrate the operation of basic data structures\
    \ with examples that are as simple as possible. If this has given you the mistaken\
    \ impression that lists, sets, and the like are just a mathematical gimmick, you\
    \ can skip ahead to Section 5.14 or take a look at the examples in Chapter 10.\n\
    \n## 5.9 Variables\n\nIn Python, simple rules apply to the handling of variables:\n\
    \n- **Assignment prior to use**\n  Each variable must be assigned an initial value\
    \ before the variable can be parsed in an expression. For example, you cannot\
    \ execute x=x+1 if you have not done a first-time assignment like x=0, x=1, x=n\
    \ beforehand.\n- **No type declaration**\n  Python variables can store objects\
    \ of any type. Python remembers the type and thus knows what kind of data a variable\
    \ refers to.\n  Unlike many other programming languages, however, the type of\
    \ variable cannot be specified or restricted. You can easily store data of different\
    \ types in the same variable, for example, first a number (x=1), later a string\
    \ (x='abc'), and finally a list (x=[3,2,1]).\n\n### Names\n\nVariable names must\
    \ start with letters or an underscore. However, the underscore at the beginning\
    \ of variable names is intended for internal Python data, so you should avoid\
    \ using it in your own scripts if possible. The other characters can also contain\
    \ digits.\n\n```\na = 1\nb = 'abc'\na = a + 1\na = c + 1           # Error: Nothing\
    \ was ever assigned to c.\nlongName = 3        # OK\nanother_long_name = 4  #\
    \ also OK\nlong name = 5       # Error: Spaces are not allowed.\nlong-name = 6\
    \       # Error: - is not allowed.\n```\n\n> **Python Does Not Know Constants**\n\
    \nPython does not provide a way to define constants. A common practice is to use\
    \ a variable as constant, but with only capital letters in its name, such as MAXNO=10.\
    \ However, you cannot prevent this variable from being assigned a different value\
    \ later.\n\n### 5.9.1 Assignments\n\nOrdinary assignments of the variable = expression\
    \ type exist in every programming language. Python also knows some unusual variants.\
    \ For example, you can assign the same content to multiple variables at once.\
    \ Python proceeds from right to left. Thus, in the next example, the following\
    \ assignments are made: c=16, then b=c, and finally a=b. Thus, all three variables\
    \ reference the same object in the memory, which represents the number 16.\n\n\
    ```\na = b = c = 16      # assign the same value to three variables\n```\n\nIf\
    \ you want to assign different values to multiple variables in a compact notation,\
    \ you can use lists or tuples for this purpose. For example, the following assignments\
    \ will work:\n\n```\na, b = 2, 3\n[e, f, g] = [7, 8, 9]\ne, f, g = [7, 8, 9] \
    \ # equivalent\n```\n\nYou can also use this type of assignment to swap the contents\
    \ of two variables. With most other programming languages, you would need a third,\
    \ temporary variable to do this swap.\n\n```\nx, y = y, x         # swap x and\
    \ y\n```\n\nA special variant of list and tuple assignments arises when there\
    \ are fewer variables on the left than list items on the right. In this case,\
    \ you can prefix a variable with an asterisk. All surplus elements are then assigned\
    \ to this variable as a list.\n\n```\n>>> a, *b, c = [1, 2, 3, 4, 5]\n>>> a\n\
    1\n>>> b\n[2, 3, 4]\n>>> c\n5\n```\n\n### 5.9.2 Data Types\n\nPython knows several\
    \ predefined data types.\n\n| Data Type | Function | Example | Mutable |\n| :---\
    \ | :--- | :--- | :--- |\n| int | Integers | x = 3 | No |\n| float | Floats |\
    \ x = 3.0 | No |\n| bool | Boolean values | x = bool(1) | No |\n| str | Strings\
    \ | x = 'abc' | No |\n| tuple | Tuples | x = (1, 2, 3) | No |\n| list | Lists\
    \ | x = [1, 2, 3] | Yes |\n| set | Sets | x = {1, 2, 3} | Yes |\n| dict | Dictionaries\
    \ | x = {1:'red', 2:'blue'} | Yes |\n| bytearray | Byte arrays | x = bytearray(...)\
    \ | Yes |\n| io.TextIOWrapper | Files | x = open('readme.txt') | Yes |\n| ...\
    \ | Other classes | ... | Yes |\n\nTable 5.6 Important Python Data Types and Classes\n\
    \nOnly in a few cases does Python take care of data type conversion on its own.\
    \ For example, if you multiply an integer by a float, the integer is automatically\
    \ converted to a float so that floating point multiplication is possible afterwards.\n\
    \nApart from such exceptions, you must take care of the type conversion yourself.\
