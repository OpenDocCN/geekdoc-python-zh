- img_proc: true
  md: "```\n$awsprofile = \"MyProfile\"     # profile for AWS credentials\n$htmlsource\
    \ = \"https://example.com/page-with-pdf-links.html\"\n$htmldest = \"updated.html\"\
    \  # file name for new HTML code\n\n# create .\\tmp directory\nNew-Item -ItemType\
    \ Directory -Force tmp | Out-Null\n\n# set AWS default region and profile\nSet-DefaultAWSRegion\
    \ $region\nSet-AWSCredential -ProfileName $awsprofile\n\n# download HTML code\n\
    $response = Invoke-WebRequest $htmlsource\n$html = $response.Content\n```\n\n\
    Then, a loop now runs through all links in the HTML document. If the link ends\
    \ with .pdf, the file is first downloaded to the local directory and then uploaded\
    \ to the cloud. Replace then replaces the original link address with the new one.\
    \ (Note that Replace is more appropriate here than the -replace operator, which\
    \ processes regular expressions. A URL often contains dots, which have a special\
    \ meaning in regular expressions.) Finally, the script saves the modified HTML\
    \ code to a local file.\n\n```\n# (continued ...)\n# loop through all links\n\
    foreach ($link in $response.links) {\n    $href = $link.href\n    if ($href -match\
    \ '.*pdf$') {\n        Write-Output $href\n        # extract filename from URL\n\
    \        $filename = $href.Substring($href.LastIndexOf(\"/\") + 1)\n        #\
    \ download PDF\n        Invoke-WebRequest $href -OutFile tmp\\$filename\n    \
    \    # upload PDF to cloud\n        Write-S3Object -BucketName $bucket -File tmp\\\
    $filename `\n                      -Key $filename\n        # assemble AWS URL\
    \ for PDF\n        $pdfAtAws = \"$awsurl$filename\"\n        # update link in\
    \ HTML document\n        $html = $html.Replace(\"href=`\"$href`\"\",\n       \
    \                      \"href=`\"$pdfAtAws`\"\")\n    }\n}\n# save modified HTML\
    \ code\n$html | Out-File $htmldest\n```"
  merge: -1
