  md: 'Linux and macOS, there are no *scheduled jobs*, no *Common Information Model
    (CIM)*, no *Windows Management Instrumentation (WMI)*, and so on. (Linux and macOS
    have comparable functions, of course, but they are implemented quite differently.)
    For this reason, some of the examples presented in this book do *not* work on
    Linux or macOS.


    But no reason to bury your head in the sand! PowerShell provides the option to
    install extension modules. Many modules have functions that are equally suitable
    on Windows, Linux, and macOS, for instance, for the administration of external
    services such as Amazon Web Services (AWS).


    In conclusion, PowerShell scripts for Windows administration do not work on Linux
    and macOS because the commands and underlying software foundation are missing.
    However, scripts that perform general, non-Windows-focused tasks and access modules
    in the process can very well be developed for cross-platform scenarios.


    # 4.1.4 Configuration


    At first, rarely will you need to configure PowerShell. However, once you gain
    some experience using PowerShell, you may want certain functions or command shortcuts
    (called *aliases*) to be defined when PowerShell is started, modules to be loaded
    automatically, and so on. The right place for such customization is the *profile
    file*, whose path is stored in the `$PROFILE` variable (spread across two lines
    in this book only for space reasons):


    ```

    > $PROFILE

    C:\Users\kofler\Documents\PowerShell\n    Microsoft.PowerShell_profile.ps1

    ```


    To modify the file, a best practice is to launch the editor directly in PowerShell:


    ```

    > notepad $PROFILE    (Notepad.exe)

    > code $PROFILE       (Visual Studio Code, if installed)

    ```


    # 4.2 Windows Terminal


    In the introduction to this section, I asked you to run a terminal to find out
    the PowerShell version. This instruction may have seemed contradictory to you.
    So, what is the difference between PowerShell and Terminal, and how are the two
    programs related?


    The terminal is a program that can run different shells. Windows-compatible shells
    include the deprecated command prompt (*cmd.exe*), Windows PowerShell 5.*n*, PowerShell
    7.*n*, Azure Shell, and Git Bash as well as Linux’s Bash via the *Windows Subsystem
    for Linux (WSL)*.


    The terminal’s job is simply to accept your keyboard input, pass it to the active
    shell, and then display the shell’s result as text. Besides that, the terminal
    fulfills a few more functions that only play a minor role for us.'
