  md: '# 7.2.1 Searching Text Files


    Get-ChildItem, combined with Where-Object, only considers the metadata of files
    (i.e., name, type, size, etc.) but not the content. Select-String allows you to
    search text files. In the simplest case, you can apply Select-String directly
    to files. The following command finds all logging files in the current directory
    that contain the error text in upper-case and lowercase:


    ```

    > Select-String error *.log

    ```


    However, unlike Get-ChildItem, Select-String does not provide any recursive file
    search options. Thus, the two commands are often combined. In the following example,
    Get-ChildItem searches for *.txt files in the current directory and in all subdirectories.
    Select-String looks at the contents of these files and lists all occurrences.


    ```

    > Get-ChildItem -Recurse -Include *.txt | Select-String license


    init/readme.txt:6:This work is licensed under ..., see

    init/readme.txt:7:https://creativecommons.org/licenses/by/4.0/

    ```


    Usually, you''re not interested in the match details, but just want to see a list
    of files that have been found. Each Select-String result is a MatchInfo object.
    Its Path property contains the filename. By forming groups of such MatchInfo objects
    and then displaying the name of each group, you can get only the filenames:


    ```

    > Get-ChildItem -recurse *.txt | Select-String license |

    Group-Object Path | Select-Object Name


    init/readme.txt

    other/gpl.txt

    ...

    ```


    The behavior of Select-String can be influenced by various options. I want to
    mention only the most important four here:


    +   - -CaseSensitive makes the search pattern case sensitive.

    - -List shows only the first match of the search pattern. This option provides
    clearer results when a large number of matches is found. This option also speeds
    up the evaluation if, as in the previous example, only the files that contain
    a hit are to be listed.

    - -NotMatch returns matches (without -List, for each line) that do *not* contain
    the search pattern.

    - -Quiet returns only True or False, depending on whether the pattern was recognized.


    Select-String cannot count the number of matches. For a single file, you can evaluate
    the Matches property of the resulting object. The following statement counts how
    many times an error occurs in the access.log file:'
  merge: -1
  pgno: 227
- img_proc: true
  md: "```\n> (Select-String error access.log).Matches.Count\n```\n\nA more difficult\
    \ task is to list the number of hits for multiple files. The perhaps obvious way\
    \ to apply `Select-String` with `Matches.Count` in a pipeline is not allowed and\
    \ leads to an error message:\n\n```\n> Get-ChildItem *.log | (Select-String error).Matches.Count\n\
    \nParseError:\nExpressions are only allowed as the first element of a pipeline\n\
    ```\n\n`ForEach-Object` leads the way to this goal: It allows you to perform an\
    \ action for each file found. In the following example, `Write-Host` outputs the\
    \ name of the file. Then, `Select-String` determines the number of error texts:\n\
    \n```\n> Get-ChildItem *.log | ForEach-Object -Process {\n    Write-Host -NoNewline\
    \ $_.Name \" -> \"\n    (Select-String error $_).Matches.Count\n}\n\nerror.log\
    \  -> 231\n...\n```\n\nThe search pattern passed to `Select-String` is evaluated\
    \ as a regular expression (see [Chapter 9, Section 9.4.2](#)).\n\n# 7.2.2 Text\
    \ versus Objects\n\nUnlike the `grep` command in Linux, you cannot use `Select-String`\
    \ to filter the results of any cmdlets in general. The reason is simple: cmdlets\
    \ return objects, not text. (Text is displayed in the terminal but only because\
    \ PowerShell automatically converts the objects to text beforehand.)\n\nThus,\
    \ for example, if you want to know what alias the `Start-Process` cmdlet has,\
    \ the following command will have no effect. It does not recognize any text in\
    \ the `Get-Alias` result.\n\n```\n> Get-Alias | Select-String Start-Process\n\
    ```\n\nNow, you can use `Out-String` to convert the `Get-Alias` result into a\
    \ string and search it. Basically, this approach works because `Select-String`\
    \ also finds the match. However, `Out-String` turns the result into *one* string.\
    \ Instead of displaying only the alias definition of `Start-Process`, the command\
    \ returns the complete list of all aliases, which ultimately is the original result\
    \ of `Get-Alias`. But nothing is gained by this exercise."
