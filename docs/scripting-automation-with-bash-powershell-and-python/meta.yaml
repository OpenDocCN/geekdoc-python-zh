    \ 'b' 'c')   # short notation for the above 4 lines\n\necho ${x[1]}      # read\
    \ an array element\necho ${x[@]}      # read all array elements\n```\n\n# Bash\
    \ versus Zsh\n\nI have pointed out several times in this chapter that Bash and\
    \ Zsh are compatible with each other in their basic functions."
- md: "## 3.9.5 Predefined Variables\n\nBash scripts can access predefined variables\
    \ (see Table 3.6). These variables can only be read, but not changed. The abbreviation\
    \ PID stands for *process ID* (i.e., the internal process number).\n\n| Variable\
    \ | Meaning |\n| :--- | :--- |\n| $# | Number of parameters passed to the script\
    \ |\n| $0 | Filename of the executed script |\n| $1 to $9 | Parameters 1 to 9\
    \ |\n| ${10}, ${11} | Access to additional parameters |\n| $* or $@ | Totality\
    \ of all passed parameters |\n| $? | Return value of the last command |\n| $!\
    \ | PID of the last started background process |\n| $$ | PID of the current shell\
    \ |\n\nTable 3.6 Predefined Bash Variables\n\nIn practice, the analysis of the\
    \ parameters passed to a script is particularly important. Their number is indicated\
    \ by $#. You can access the individual parameters via $1, $2, and so on. Examples\
    \ of the analysis of many parameters in loops or via `case` constructs are included\
    \ in Section 3.11 and Section 3.12.\n\n## 3.9.6 Environment Variables\n\nOrdinary\
    \ variables lose their validity after the execution of a script. Environment variables\
    \ declared or modified using `export myvar=...` are excluded from this rule. `printenv`\
    \ lists all environment variables with their current value. Important environment\
    \ variables (see Table 3.7) are preset in `/etc/profile`, in `.profile`, and in\
    \ `.bashrc` or `.zshrc`.\n\n| Variable | Meaning |\n| :--- | :--- |\n| HOME |\
    \ The home directory |\n| LANG | Localization settings (i.e., language and character\
    \ set) |\n| PATH | Directories in which programs are searched for |\n| PS1 | Content/appearance\
    \ of the command prompt |\n| PWD | The current directory |\n| USER | The login\
    \ name of the active user |\n| SHELL | Name of the active shell |\n| EDITOR |\
    \ Name of the default editor (often vi or nano) |\n| IFS | Internal field separator\
    \ (decomposition of strings into words) |\n\nTable 3.7 Important Environment Variables\n\
    \nUnlike “ordinary” variables, environment variables can be changed using `ENVVAR=...\
    \ command` only for the execution of a command. I gave an example of this earlier\
    \ when reading parts of a string into an array:\n\n```\n# the modified IFS content\
    \ applies only to read\nIFS=':' read -a myvar\n```\n\nAnother common use looks\
    \ as follows:\n\n```\n# execute the command without the current language settings\n\
    LANG= command\n```\n\nThis command deletes the `LANG` environment variable with\
    \ the language settings only for the execution of `command`. `command` is therefore\
    \ executed without the otherwise valid language settings and returns error messages\
    \ in English if necessary. (English is the default language when `LANG` is empty.\
    \ English error messages are useful when searching the internet for the cause\
    \ of a problem.) `LANG` does not get permanently deleted, however, but is available\
    \ again for the other commands.\n\n> **No Temporary Change for Bash Flow Structures**\n\
    The `ENVVAR=... command` syntax can only be used for ordinary commands, but not\
    \ for loops or branches that you initiate using `if`, `for`, `while`, and so on.\n\
    \n## 3.10 Strings\n\nStrings are the central data type of Bash—I already mentioned\
    \ that several times. Nevertheless, the handling of strings sometimes seems strange.\
    \ This section summarizes the most important functions with regard to strings.\n\
    \n### 3.10.1 Single versus Double Quotation Marks\n\nIn Bash, strings can be placed\
    \ in both single and double quotation marks:\n\n- 'abc$efg': In this case, the\
    \ string will be transferred exactly.\n- \"abc$efg\": In this variant, Bash replaces\
    \ variables contained in the text ($efg in this case) with its contents and may\
    \ also perform other substitution procedures, which I will explain later in this\
    \ section.\n\nIn Bash, multiple strings can be concatenated without an operator.\
    \ The only requirement is that Bash can recognize the strings as such, which is\
    \ not the case in the first line of the following listing:\n\n```\nx=abc efg \
    \          # Error!\nx=abc               # OK\nx=\"abc\"             # better\n\
    x='abc'             # here equivalent\ny=\"123\"$x\"456\"      # -> 123abc456\n\
    y='123'$x'456'      # -> 123abc456\ny=\"123 $x 456\"      # -> 123 abc 456\ny='123\
    \ $x 456'      # -> 123 $x 456\ny=123 $x 456        # Error!\n```\n\nYou are allowed\
    \ to distribute strings across multiple lines. To preserve the line breaks in\
    \ the output via `echo`, you must enclose the variable in quotes (see also the\
    \ following section):\n\n```\nmyvar='1st Line\n2nd Line'\necho \"$myvar\"\n```\n\
    \n### 3.10.2 Outputting Strings (echo)\n\nOf course, you already know the `echo`\
    \ command for outputting strings:\n\n```\nmyname=\"Michael\"\necho \"Hello, $myname!\"\
    \nHello, Michael!\n```\n\nAt this point, I would like to point out some peculiarities\
    \ of `echo`. You can use the `-n` option to prevent `echo` from starting a new\
    \ line after the output. In this way, you can distribute the output of one line\
    \ across several commands, as in the following example:\n\n```\necho -n \"Hello,\
    \ \"\necho $myname\n```\n\nThe `-e` option enables you to achieve that backslash\
    \ sequences contained in the string are interpreted correctly (i.e., that the\
    \ `\\` and `n` characters are recognized as line breaks):\n\n```\nmyvar=\"abc\\\
    nefg\"\necho $myvar\n  abc\\nefg\necho -e $myvar\n  abc\n  efg\n```\n\nThe handling\
    \ of real line breaks is also confusing. These line breaks can be replaced by\
    \ blanks using `echo $myvar`. Only `echo \"$myvar\"` with quotes returns a multiline\
    \ output:\n\n```\nmyvar=\"abc\nefg\"\necho $myvar\n  abc efg\necho \"$myvar\"\n\
    \  abc\n  efg\n```\n\nYou redirect the error message to the `stderr` channel using\
    \ `>&2`:\n\n```\necho \"Error message\" >&2\necho >&2 \"Error message\"   # equivalent\n\
    ```\n\n> **printf**\n\nThe `printf` function, known from many programming languages,\
    \ is available as a command on Linux and macOS. The `printf` function is better\
    \ suited than `echo` to format output. Syntax details can be shown via `man 1\
    \ printf`.\n\n### 3.10.3 Colors\n\nYou can also output text in color. To change\
    \ the color, you need to include what are called *ANSI escape sequences* in the\
    \ output. To change the background color, you must replace `3n` with `4n`.\n\n\
    | Color | Code | Color | Code |\n|---|---|---|---|\n| Black | 0;30 | Gray | 1;30\
    \ |\n| Blue | 0;34 | Light blue | 1;34 |\n| Green | 0;32 | Light green | 1;32\
    \ |\n| Cyan | 0;36 | Light cyan | 1;36 |\n\nTable 3.8 ANSI Color Codes for Foreground\
    \ Colors\n\nOne of the few exceptions in this context concerns array indices.\
    \ While these range from 0 to the total element count minus 1 in Bash, the first\
    \ array element in Zsh has an index of 1! Index 0 is not allowed (unless you enable\
    \ the `KSH_ARRAYS` option). You can find relevant background information on this\
    \ topic at https://stackoverflow.com/questions/50427449.\n\nYou can use `mapfile`\
    \ to read an entire text file line by line into the elements of an array. In the\
    \ following example, `z` is the name of the variable:\n\n```\nmapfile z < textfile\n\
    ```\n\nTo initialize the elements of an array with the columns of a line, the\
    \ best approach is to use the `read` command via the `-a` array option. Details\
    \ on `read` as well as on herestrings formulated with `<<<` follow in [Section\
    \ 3.10](https://example.com).\n\n```\ndata=\"abc efg ijk opq uvw\"\nread -a myvar\
    \ <<< $data\necho ${myvar[2]}  # output ijk\n```\n\nIf the columns or “words”\
    \ of a string are not separated by whitespace, you need to temporarily modify\
    \ the *internal field separator* contained in the predefined `IFS` variable. By\
    \ default, this variable contains a space character, a tab character, and a newline\
    \ character (i.e., the three most important whitespace characters).\n\nIn the\
    \ following example, however, the words are separated by the `:` character. Because\
    \ the `IFS` declaration is made on the same line as the `read` command, the change\
    \ applies only to that one command. As a result, afterwards, `IFS` has the default\
    \ setting again. (This scenario is important because `IFS` has implications for\
    \ many commands.)\n\n```\ndata=\"abc:efg:ijk lmn:opq:uvw\"\nIFS=':' read -a myvar\
    \ <<< $data\necho ${myvar[2]}  # output ijk lmn\n```\n\nBesides ordinary arrays,\
    \ Bash also knows associative arrays. Instead of numbers, any character strings\
    \ are allowed as indexes. Depending on the programming language, you may also\
    \ know this data structure as a dictionary or map. To use associative arrays,\
    \ you must explicitly `declare` the variable using `declare -A`.\n\n```\ndeclare\
    \ -A y          # Definition of an empty associative array\ny['abc']='123'   \
    \     # Assign element of associative array\ny['efg']='xxx'\ny=( [abc]=123 [efg]=xxx\
    \ )  # Short notation\necho ${y[abc]}        # Read an array element\n```"
  mdcn: "## 3.9.5 预定义变量\n\nBash 脚本可以访问预定义变量（参见表 3.6）。这些变量只能读取，不能更改。缩写 PID 代表 *进程 ID*（即内部进程编号）。\n\
    \n| 变量 | 含义 |\n| :--- | :--- |\n| $# | 传递给脚本的参数数量 |\n| $0 | 执行脚本的文件名 |\n| $1 到\
    \ $9 | 参数 1 到 9 |\n| ${10}, ${11} | 访问额外的参数 |\n| $* 或 $@ | 所有传递参数的总和 |\n| $? |\
    \ 上一条命令的返回值 |\n| $! | 最后启动的后台进程的 PID |\n| $$ | 当前 shell 的 PID |\n\n表 3.6 预定义的\
    \ Bash 变量\n\n在实践中，分析传递给脚本的参数尤为重要。其数量由 $# 指示。你可以通过 $1、$2 等访问各个参数。在循环中或通过 `case`\
    \ 结构分析多个参数的示例包含在第 3.11 节和第 3.12 节中。\n\n## 3.9.6 环境变量\n\n普通变量在脚本执行后会失效。使用 `export\
    \ myvar=...` 声明或修改的环境变量不受此规则限制。`printenv` 会列出所有环境变量及其当前值。重要的环境变量（参见表 3.7）在 `/etc/profile`、`.profile`\
    \ 以及 `.bashrc` 或 `.zshrc` 中预设。\n\n| 变量 | 含义 |\n| :--- | :--- |\n| HOME | 主目录 |\n\
    | LANG | 本地化设置（即语言和字符集） |\n| PATH | 搜索程序的目录 |\n| PS1 | 命令提示符的内容/外观 |\n| PWD |\
    \ 当前目录 |\n| USER | 活动用户的登录名 |\n| SHELL | 活动 shell 的名称 |\n| EDITOR | 默认编辑器的名称（通常是\
    \ vi 或 nano） |\n| IFS | 内部字段分隔符（将字符串分解为单词） |\n\n表 3.7 重要的环境变量\n\n与“普通”变量不同，环境变量可以使用\
    \ `ENVVAR=... command` 仅为命令的执行而更改。我之前在将字符串的一部分读入数组时给出了一个例子：\n\n```\n# 修改后的 IFS\
    \ 内容仅适用于 read\nIFS=':' read -a myvar\n```\n\n另一个常见用法如下：\n\n```\n# 不使用当前语言设置执行命令\n\
    LANG= command\n```\n\n此命令仅在执行 `command` 时删除带有语言设置的 `LANG` 环境变量。因此，`command` 在没有通常有效的语言设置的情况下执行，并在必要时返回英文错误消息。（当\
    \ `LANG` 为空时，英语是默认语言。在互联网上搜索问题原因时，英文错误消息很有用。）然而，`LANG` 并未被永久删除，而是再次可用于其他命令。\n\n\
    > **Bash 流程结构没有临时更改**\n`ENVVAR=... command` 语法只能用于普通命令，不能用于你使用 `if`、`for`、`while`\
    \ 等启动的循环或分支。\n\n## 3.10 字符串\n\n字符串是 Bash 的核心数据类型——我已经多次提到过。尽管如此，字符串的处理有时似乎很奇怪。本节总结了关于字符串的最重要函数。\n\
    \n### 3.10.1 单引号与双引号\n\n在 Bash 中，字符串可以放在单引号和双引号中：\n\n- 'abc$efg'：在这种情况下，字符串将被原样传递。\n\
    - \"abc$efg\"：在这种变体中，Bash 将文本中包含的变量（本例中为 $efg）替换为其内容，并且可能执行其他替换过程，我将在本节后面解释。\n\
    \n在 Bash 中，多个字符串可以不使用运算符连接。唯一的要求是 Bash 能够将字符串识别为字符串，这在以下列表的第一行中并非如此：\n\n```\n\
    x=abc efg           # 错误！\nx=abc               # 正确\nx=\"abc\"             # 更好\n\
    x='abc'             # 这里等效\ny=\"123\"$x\"456\"      # -> 123abc456\ny='123'$x'456'\
    \      # -> 123abc456\ny=\"123 $x 456\"      # -> 123 abc 456\ny='123 $x 456'\
    \      # -> 123 $x 456\ny=123 $x 456        # 错误！\n```\n\n允许将字符串分布在多行上。要通过 `echo`\
    \ 在输出中保留换行符，必须将变量括在引号中（另请参见下一节）：\n\n```\nmyvar='1st Line\n2nd Line'\necho \"$myvar\"\
    \n```\n\n### 3.10.2 输出字符串（echo）\n\n当然，你已经知道用于输出字符串的 `echo` 命令：\n\n```\nmyname=\"\
    Michael\"\necho \"Hello, $myname!\"\nHello, Michael!\n```\n\n在此，我想指出 `echo` 的一些特殊之处。你可以使用\
    \ `-n` 选项来防止 `echo` 在输出后开始新行。通过这种方式，你可以将一行的输出分布在多个命令中，如以下示例所示：\n\n```\necho -n\
    \ \"Hello, \"\necho $myname\n```\n\n`-e` 选项使你能够正确解释字符串中包含的反斜杠序列（即识别 `\\` 和 `n`\
    \ 字符为换行符）：\n\n```\nmyvar=\"abc\\nefg\"\necho $myvar\n  abc\\nefg\necho -e $myvar\n\
    \  abc\n  efg\n```\n\n对真实换行符的处理也令人困惑。这些换行符可以使用 `echo $myvar` 替换为空格。只有带引号的 `echo\
    \ \"$myvar\"` 才会返回多行输出：\n\n```\nmyvar=\"abc\nefg\"\necho $myvar\n  abc efg\necho\
    \ \"$myvar\"\n  abc\n  efg\n```\n\n你可以使用 `>&2` 将错误消息重定向到 `stderr` 通道：\n\n```\n\
    echo \"Error message\" >&2\necho >&2 \"Error message\"   # 等效\n```\n\n> **printf**\n\
    \n在许多编程语言中已知的 `printf` 函数在 Linux 和 macOS 上作为命令可用。`printf` 函数比 `echo` 更适合格式化输出。可以通过\
    \ `man 1 printf` 显示语法详细信息。\n\n### 3.10.3 颜色\n\n你也可以输出彩色文本。要更改颜色，你需要在输出中包含所谓的 *ANSI\
    \ 转义序列*。要更改背景颜色，必须将 `3n` 替换为 `4n`。\n\n| 颜色 | 代码 | 颜色 | 代码 |\n|---|---|---|---|\n\
    | 黑色 | 0;30 | 灰色 | 1;30 |\n| 蓝色 | 0;34 | 浅蓝色 | 1;34 |\n| 绿色 | 0;32 | 浅绿色 | 1;32\
    \ |\n| 青色 | 0;36 | 浅青色 | 1;36 |\n\n表 3.8 前景色的 ANSI 颜色代码\n\n在此上下文中，少数例外之一涉及数组索引。虽然在\
    \ Bash 中这些索引范围从 0 到总元素数减 1，但 Zsh 中的第一个数组元素的索引为 1！索引 0 不被允许（除非你启用 `KSH_ARRAYS`\
    \ 选项）。你可以在 https://stackoverflow.com/questions/50427449 找到有关此主题的相关背景信息。\n\n你可以使用\
    \ `mapfile` 将整个文本文件逐行读入数组的元素中。在以下示例中，`z` 是变量的名称：\n\n```\nmapfile z < textfile\n\
    ```\n\n要使用一行的列初始化数组的元素，最好的方法是通过 `-a` 数组选项使用 `read` 命令。有关 `read` 以及使用 `<<<` 构造的\
    \ here 字符串的详细信息，请参见 [第 3.10 节](https://example.com)。\n\n```\ndata=\"abc efg ijk\
    \ opq uvw\"\nread -a myvar <<< $data\necho ${myvar[2]}  # 输出 ijk\n```\n\n如果字符串的列或“单词”不是由空格分隔的，你需要临时修改预定义\
    \ `IFS` 变量中包含的 *内部字段分隔符*。默认情况下，此变量包含空格字符、制表符和换行符（即三个最重要的空白字符）。\n\n然而，在以下示例中，单词由\
    \ `:` 字符分隔。因为 `IFS` 声明与 `read` 命令在同一行上，所以更改仅适用于该命令。因此，之后 `IFS` 恢复为默认设置。（此场景很重要，因为\
    \ `IFS` 对许多命令有影响。）\n\n```\ndata=\"abc:efg:ijk lmn:opq:uvw\"\nIFS=':' read -a myvar\
    \ <<< $data\necho ${myvar[2]}  # 输出 ijk lmn\n```\n\n除了普通数组，Bash 还知道关联数组。允许使用任何字符串作为索引，而不是数字。根据编程语言，你可能也知道这种数据结构为字典或映射。要使用关联数组，你必须使用\
    \ `declare -A` 显式 `declare` 变量。\n\n```\ndeclare -A y          # 定义一个空的关联数组\ny['abc']='123'\
    \        # 赋值关联数组的元素\ny['efg']='xxx'\ny=( [abc]=123 [efg]=xxx )  # 简写\necho ${y[abc]}\
    \        # 读取数组元素\n```"
