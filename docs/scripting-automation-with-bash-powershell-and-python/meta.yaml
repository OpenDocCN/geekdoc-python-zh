    The mini program downloads the HTML code and uses the *Beautiful Soup* library
    to look for the `span` tag. Its `text` property returns the desired version number.
    To determine the link to the release notes, `parent` accesses the layer above
    it (in this case, the `div` tag with the `monitor` class), while `find` looks
    for the first `a` tag in it.


    ```

    import requests

    from bs4 import BeautifulSoup

    response = requests.get("https://git-scm.com/downloads")

    dom = BeautifulSoup(response.content, ''html.parser'')

    version = dom.find(''span'', class_=''version'')

    print("Git version:", version.text.strip())

    url = version.parent.find(''a'')

    print("What''s new:", url.attrs[''href''])

    ```


