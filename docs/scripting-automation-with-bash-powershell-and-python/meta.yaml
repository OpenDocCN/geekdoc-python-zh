    # 11.1.1 /etc/crontab


    The following lines show an excerpt from a crontab file:


    ```

    # File /etc/crontab

    # every day at 3:00 am: Backup

    0 3 * * * root /etc/myscripts/backup.sh

    # on the first day of each month at 0:00:

    # statistical analysis of login data

    0 0 1 * * root /etc/myscripts/statistics.py

    ```


    crontab files describe the commands to be executed line by line, where each entry
    is composed of seven columns:


    minutes hours day-of-month month weekday user cmd


    +   - minutes: 0-59

    - hours: 0-12

    - day-of-month: 1-31

    - month: 1-12

    - weekday: 0-7 (0 = 7 = Sunday, 1 = Monday, etc.)

    - user: Account under which the script should be executed (often root)

    - cmd: The command to execute, often simply the path to a script


    Lines beginning with # are comments. The last line of the crontab file must end
    with a newline character. The following syntax rules apply to the first five columns
    in the crontab file:


    +   - Enumerations: 7,9,12 (without spaces!)

    - Sections: 3-5

    - Always: *

    - All n: */10 corresponds to 0,10,20,30...


    The columns are usually linked by a logical AND. An exception is if day-of-month
    and weekday are specified; then, a logical OR applies to these two columns. The
    command is executed both on the nth day of the month and on the specified day
    of the week.


    The following listing contains some syntax examples. You can verify your own cron
    time compositions at https://crontab.guru.


    ```

    # every 15 minutes

    */15 * * * * root cmd

    # daily at 0:15, 1:15, 2:15, etc.

    15 * * * * peter cmd

    # daily at 1:30

    30 1 * * * maria cmd

    ```'
  - '[PAGE 310]


    ```

    # every Saturday at 0:29

    29 0 * * 6 root cmd

    # on every 1st of the month at 6:25

    25 6 1 * * www-data cmd

    # on the 1st and 15th of the month and every Monday

    # always at midnight

    0 0 1,15 * 1 root cmd

    ```


    Provided that cron jobs are executed on a machine where a mail server is configured,
    the output or error messages are sent to `root@localhost`. You can change this
    address by setting `MAILTO=...` within `/etc/crontab`.


    > **Trouble with PATH and LANG**


    A different `PATH` default setting applies to cron jobs than in interactive mode.
    Changes to `PATH` in `.bashrc` are not taken into account. For this reason, commands
    installed outside the usual directories like `/usr/bin` or `/usr/sbin` cannot
    be executed!


    You should therefore make sure to test whether your script is also executed correctly
    when started by cron. If necessary, you must specify the full path in the script
    for manually installed commands, for example, `/usr/local/bin/aws` to run the
    Amazon Web Services (AWS) client. Alternatively, for some cron implementations,
    you can redefine the `PATH` variable directly in `/etc/crontab`. There you need
    to specify all directories in which commands are to be searched for, for example
    as follows:


    `PATH=/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin`


    Another possible source of errors can be the `LANG` environment variable, which
    may have a different setting in cron jobs than when you run your scripts locally.
    A setting in `/etc/crontab` like for `PATH` is not possible. However, you can
    set `LANG` at the beginning of your script.


    # 11.1.2 Personal crontab Files


    Modifying `/etc/crontab` requires system administrator privileges. If these privileges
    are not available to you, you can modify your own `crontab` file. This file is
    located in `/var/spool/cron/<user>` or in `/var/spool/cron/crontabs/<user>`, depending
    on the Linux distribution.


    You can open your personal crontab file using the `crontab -e` command. By default,
    the vi editor is used in this context, which is not user friendly. If you''ve
    started the program by mistake, you can exit it by pressing `Esc`, typing `":q,"`
    and pressing `Enter` without saving changes. If necessary, you can select a simpler
    editor via the `EDITOR` variable before running the `crontab` command:


    ```

    $ export EDITOR=/usr/bin/nano

    $ crontab -e

    ```'
  - '[PAGE 311]


    Note that the sixth column for the account is omitted in the private *crontab*
    file. The command or script is always executed with the rights of your account.
    This limitation is the biggest disadvantage of this method: Many admin tasks (such
    as system-wide backups) require root privileges and cannot be performed in “ordinary”
    accounts. `sudo` does not help in this case either because this command requires
    the interactive input of your password.


    # 11.1.3 Hourly, Daily, Weekly, and Monthly Directories


    If you don’t care about the exact time when your cron tasks are performed, you
    can save the script to be called in one of the following directories:


    +   - /etc/cron.hourly

    - /etc/cron.daily

    - /etc/cron.weekly

    - /etc/cron.monthly


    The benefit of this method is that you do not need to deal with the crontab syntax.
    Remember to mark your script file as executable by using `chmod +x`! Your scripts
    will be executed with root privileges.


    # 11.1.4 Alternatives to cron


    On Linux, *systemd-timer* is becoming more frequently used. The biggest advantage
    of systemd-timer compared to cron is that started jobs can be monitored more comprehensively.
    But this advantage is offset by a much higher degree of complexity. While setting
    up a cron job can be done in 30 seconds with a little experience, timer jobs require
    you create *two* relatively complex configuration files. A good description of
    the mechanism can be found on the Arch Linus wiki at https://wiki.archlinux.org/title/Systemd/Timers.
    This information also applies to other distributions.


    # 11.1.5 Starting Jobs Automatically on macOS


    cron is also available on macOS but is considered obsolete there. The /etc/crontab
    file does not exist by default. However, you only need to create the file (for
    example, using `sudo nano /etc/crontab`) and insert one correct entry; then, the
    job will be executed without any further configuration work. In this respect,
    cron is the simplest solution for automating the script call for macOS until further
    notice.


    Apple recommends using the macOS-specific *launchd* program instead of cron. The
    configuration is done by XML files, whose syntax is documented here:


    +   - https://bas-man.dev/post/launchd-instead-of-cron

    - https://developer.apple.com/library/archive/documentation/MacOSX/Conceptual/BPSystemStartup/Chapters/ScheduledJobs.html'
- md: "## 11.2 Example: Web Server Monitoring\n\nFor this example, we want to use\
    \ `curl` to measure the time it takes to download the home page of a website.\
    \ The `curl` command is written in the following way:\n\n```\ntime=$(curl --connect-timeout\
    \ 2 -s -S -w '%{time_total}\\n' \\\n    -o /dev/null  2> /tmp/curl.error \\\n\
    \    https://example.com)\n```\n\nThe various components of this command have\
    \ the following meanings:\n\n- `--connect-timeout 2` aborts the connection setup\
    \ attempt after 2 seconds.\n- `-s` suppresses status outputs about the download\
    \ progress.\n- `-S` allows error outputs in deviation from this option.\n- `-w`\
    \ writes the runtime of the command to the standard output. This information ends\
    \ up in the `time` variable.\n- `-o` redirects the downloaded HTML file to `/dev/null`.\
    \ Nothing is stored in this Linux-specific pseudo file.\n- `2>` redirects error\
    \ outputs to the specified file.\n\nIn the script, a similar command analyzes\
    \ the `TMPFILE` and `HOST` variables. The `LANG=` setting ensures that `curl`\
    \ and `date` format numbers and dates in an international way. (The command unsets\
    \ the `LANG` variable.)\n\nIf the `curl` command terminates with an error code,\
    \ `cat` writes the error message to standard output. If the script is executed\
    \ by cron, this output is sent by email to `root@localhost` (or to another address\
    \ specified by `MAILTO` in `/etc/crontab`). So, if the configuration is correct,\
    \ you'll be notified by email whenever the website stops working correctly.\n\n\
    If, on the other hand, `curl` was executed without error and without exceeding\
    \ the timeout time, `echo` saves the required time and the current time into the\
    \ file specified by `LOGFILE`.\n\n```\n# Sample file webserver-ping.sh\nLANG=\n\
    HOST=example.com\nLOGFILE=/var/log/$HOST-ping-time.log\nTMPFILE=/tmp/curl.error\n\
    \ntime=$(curl --connect-timeout 2 -s -S -w '%{time_total}\\n' \\\n    -o /dev/null\
    \  2> $TMPFILE \\\n    https://$HOST)\n\nif [ $? -ne 0 ]; then\n    # output is\
    \ sent per mail if script is\n    # run by cron on a Linux system with mail server\n\
    \    cat $TMPFILE\nelse\n  now=$(date)\n  echo \"$time sec @ $now\" >> $LOGFILE\n\
    fi\n```\n\nTo run the script every 15 minutes, I added the following line to `/etc/crontab`:\n\
    \n```\n# in /etc/crontab\n*/15 * * * * kofler /home/kofler/bin/webserver-ping.sh\n\
    ```\n\nNow, the script inside the home directory of `kofler` in the `bin` subdirectory\
    \ should be executed every 15 minutes with the rights held by the `kofler` account.\
    \ The resulting `/var/log/example.com-ping-time.log` file has the following structure:\n\
    \n```\n0.347425 sec @ Mon Feb 27 12:30:01 CET 2023\n0.347546 sec @ Mon Feb 27\
    \ 12:45:02 CET 2023\n...\n```\n\n## 11.2.1 Testing and Troubleshooting\n\nUnlike\
    \ many other examples in this book, this script cannot be easily tried out on\
    \ any computer. You would need a Linux system with cron, ideally together with\
    \ a mail server. You also must modify the configuration variables at the beginning\
    \ of the script to suit your own needs. If you do not run the script with root\
    \ privileges, you must ensure that the logging file was writable for the script.\
    \ If the script is executed by `kofler` while `HOST` and `LOGFILE` remain unchanged,\
    \ you must execute the following two commands once:\n\n```\n$ sudo touch /var/log/example.com-ping-time.log\n\
    $ sudo chown kofler:root /var/log/example.com-ping-time.log\n```\n\nOnce the script\
    \ can be run manually without errors, the next step is to set up `/etc/crontab`.\
    \ For initial tests, the recommended approach is to set the first five columns\
    \ using `* * * * *`, which will execute the script once per minute. Syntax errors\
    \ in `/etc/crontab` will prevent both your script and other cron jobs from running.\
    \ To track down such errors, run `systemctl status cron` and `journalctl -u cron`,\
    \ which will provide you with information about the current cron status as well\
    \ as the last logging outputs.\n\n## 11.2.2 Real Monitoring\n\nSelling this mini\
    \ script as a monitoring solution is a bit daring. “Real” monitoring software\
    \ checks various server parameters, sends warning emails only on every status\
    \ message (and not on every error, which leads to an abundance of monitoring mails),\
    \ offers a graphical visualization of the monitored parameters, and more. Of course,\
    \ you could conceivably implement all these capabilities using custom scripts,\
    \ but using dedicated monitoring tools, such as *Grafana*, *Prometheus*, *Nagios*,\
    \ etc., make much more sense. Although the initial startup of these tools may\
    \ require considerable work, they provide a wealth of functions combined with\
    \ expedient user interfaces (UIs).\n\n## 11.3 Microsoft Windows Task Scheduler\n\
    \n*Microsoft Windows Task Scheduler* allows Windows to run programs and scripts\
    \ at specified times and is, therefore, the Windows counterpart to cron. The program\
    \ is equipped with a UI, as you would expect in the Windows environment. However,\
    \ Microsoft Windows Task Scheduler has all the charm of the 1990s, to put it nicely.\
    \ Its nested dialogs are, at best, as intuitive as the `crontab` syntax. Also,\
    \ the program is amazingly slow and sometimes it hangs completely. If the start\
    \ of jobs does not work as intended, no clear error messages are displayed despite\
    \ event logging. In a nutshell, using this program is a pain. Why Microsoft can't\
    \ get its act together and reimplement this central Windows component remains\
    \ a mystery. (The current version has not been significantly changed since 2006.)\n\
    \n![Figure 11.1 Microsoft Windows Task Scheduler's Antiquated UI](img/a7fa45d496335c22ffb14c3275e24ffb_314_0.png)\n\
    \nTo become familiar with Microsoft Windows Task Scheduler, let's create a tiny\
    \ script that logs the date and time to a logging file:\n\n```\n# File log-date.ps1\n\
    Get-Date >> date.log\n```\n\nThis script is supposed to be executed every hour.\
    \ For this purpose, open Microsoft Windows Task Scheduler and click the **Create\
    \ Task** command in the **Actions** sidebar. This step will take you to a dialog\
    \ box with several tabs:\n\n- **General**\n  In this tab, you can give the task\
    \ a name, specify in which account your script should be run (usually your own),\
    \ and specify whether it should be started only after a login or always when the\
    \ computer is running. If you want to run a script with administrator privileges,\
    \ you should not change the user or group, but just click the **Run with highest\
    \ privileges** option.\n- **Triggers**\n  In this tab, you can add a new trigger\
    \ to specify when and how often the action should take place. To run the script\
    \ every hour, you must select **Daily** with the current time as the start time\
    \ and **Repeat task every hour** as well as **For a duration of: 1 day**. (The\
    \ more plausible setting **For the duration of: Indefinitely** did not work in\
    \ my tests.) In contrast to cron, not only does Microsoft Windows Task Scheduler\
    \ support time-based triggers, but it can also execute actions when various events\
    \ occur, for example, when logging in or when the computer is currently in idle\
    \ mode.\n- **Actions**\n  As a new action, you specify the script to be run. The\
    \ procedure is more cumbersome than you would expect: The reason is that as a\
    \ **program/script**, you must not simply specify the path of your PowerShell\
    \ script file. Instead, you need to specify `pwsh` for PowerShell 7.n here. Only\
    \ if your script is to be executed by the older Windows PowerShell 5.n is the\
    \ program name `powershell`. In the **Add arguments** input field, specify the\
    \ `-File` option and enter the full path to your script. When typing, you must\
    \ not make any typos. Do not forget `-File`! By default, the `%windir%\\System32\\\
    ` directory is active when the script is run. If you do not want to use this directory\
    \ (e.g., because the script should read or write files in a different directory),\
    \ you must specify the relevant directory in the **Start in** field. For the sample\
    \ script to log the date and time in the same directory where the script file\
    \ is located, you must specify this directory.\n- **Conditions**\n  This tab defaults\
    \ to performing the action only when your computer is running in network mode.\
    \ You can deactivate this option if you also want to run or test the task while\
    \ using your notebook in battery mode."
  mdcn: "## 11.2 示例：Web 服务器监控\n\n在这个示例中，我们将使用 `curl` 来测量下载网站首页所需的时间。`curl` 命令的写法如下：\n\
    \n```\ntime=$(curl --connect-timeout 2 -s -S -w '%{time_total}\\n' \\\n    -o\
    \ /dev/null  2> /tmp/curl.error \\\n    https://example.com)\n```\n\n该命令的各个组成部分含义如下：\n\
    \n- `--connect-timeout 2` 在 2 秒后中止连接建立尝试。\n- `-s` 抑制关于下载进度的状态输出。\n- `-S` 允许在偏离此选项时输出错误信息。\n\
    - `-w` 将命令的运行时间写入标准输出。此信息最终会存入 `time` 变量。\n- `-o` 将下载的 HTML 文件重定向到 `/dev/null`。这个\
    \ Linux 特有的伪文件不会存储任何内容。\n- `2>` 将错误输出重定向到指定文件。\n\n在脚本中，一个类似的命令会分析 `TMPFILE` 和\
    \ `HOST` 变量。`LANG=` 的设置确保 `curl` 和 `date` 以国际化的方式格式化数字和日期。（该命令取消了 `LANG` 变量的设置。）\n\
    \n如果 `curl` 命令以错误代码终止，`cat` 会将错误消息写入标准输出。如果脚本由 cron 执行，此输出会通过电子邮件发送给 `root@localhost`（或\
    \ `/etc/crontab` 中 `MAILTO` 指定的其他地址）。因此，如果配置正确，每当网站停止正常工作时，你都会收到电子邮件通知。\n\n另一方面，如果\
    \ `curl` 执行时没有错误且未超过超时时间，`echo` 会将所需时间和当前时间保存到 `LOGFILE` 指定的文件中。\n\n```\n# 示例文件\
    \ webserver-ping.sh\nLANG=\nHOST=example.com\nLOGFILE=/var/log/$HOST-ping-time.log\n\
    TMPFILE=/tmp/curl.error\n\ntime=$(curl --connect-timeout 2 -s -S -w '%{time_total}\\\
    n' \\\n    -o /dev/null  2> $TMPFILE \\\n    https://$HOST)\n\nif [ $? -ne 0 ];\
    \ then\n    # 如果脚本在带有邮件服务器的 Linux 系统上由 cron 运行，\n    # 输出将通过邮件发送\n    cat $TMPFILE\n\
    else\n  now=$(date)\n  echo \"$time sec @ $now\" >> $LOGFILE\nfi\n```\n\n为了每 15\
    \ 分钟运行一次脚本，我在 `/etc/crontab` 中添加了以下行：\n\n```\n# 在 /etc/crontab 中\n*/15 * * * *\
    \ kofler /home/kofler/bin/webserver-ping.sh\n```\n\n现在，`kofler` 主目录下 `bin` 子目录中的脚本应该每\
    \ 15 分钟以 `kofler` 账户的权限执行一次。生成的 `/var/log/example.com-ping-time.log` 文件结构如下：\n\
    \n```\n0.347425 sec @ Mon Feb 27 12:30:01 CET 2023\n0.347546 sec @ Mon Feb 27\
    \ 12:45:02 CET 2023\n...\n```\n\n## 11.2.1 测试与故障排除\n\n与本书中的许多其他示例不同，这个脚本无法在任何计算机上轻松尝试。你需要一个带有\
    \ cron 的 Linux 系统，最好还配备邮件服务器。你还必须修改脚本开头的配置变量以适应你自己的需求。如果不以 root 权限运行脚本，必须确保日志文件对脚本可写。如果脚本由\
    \ `kofler` 执行，而 `HOST` 和 `LOGFILE` 保持不变，你必须一次性执行以下两个命令：\n\n```\n$ sudo touch /var/log/example.com-ping-time.log\n\
    $ sudo chown kofler:root /var/log/example.com-ping-time.log\n```\n\n一旦脚本可以手动运行且没有错误，下一步就是设置\
    \ `/etc/crontab`。对于初始测试，建议的方法是将前五列设置为 `* * * * *`，这将每分钟执行一次脚本。`/etc/crontab` 中的语法错误会阻止你的脚本和其他\
    \ cron 任务运行。要追踪此类错误，可以运行 `systemctl status cron` 和 `journalctl -u cron`，它们将为你提供有关当前\
    \ cron 状态以及最后日志输出的信息。\n\n## 11.2.2 真正的监控\n\n将这个迷你脚本作为监控解决方案来销售有点大胆。“真正”的监控软件会检查各种服务器参数，仅在每次状态消息时发送警告邮件（而不是在每次错误时，这会导致大量监控邮件），提供被监控参数的图形化可视化等等。当然，你可以想象使用自定义脚本实现所有这些功能，但使用专用的监控工具，如\
    \ *Grafana*、*Prometheus*、*Nagios* 等，意义要大得多。尽管这些工具的初始启动可能需要大量工作，但它们提供了丰富的功能以及便捷的用户界面（UI）。\n\
    \n## 11.3 Microsoft Windows 任务计划程序\n\n*Microsoft Windows 任务计划程序* 允许 Windows 在指定时间运行程序和脚本，因此是\
    \ cron 的 Windows 对应物。正如你在 Windows 环境中所期望的那样，该程序配备了 UI。然而，说得委婉些，Microsoft Windows\
    \ 任务计划程序具有 1990 年代的所有魅力。其嵌套的对话框充其量与 `crontab` 语法一样直观。此外，该程序慢得惊人，有时会完全挂起。如果作业启动未能按预期工作，尽管有事件日志记录，也不会显示清晰的错误消息。简而言之，使用这个程序是一种痛苦。为什么微软不能理清头绪并重新实现这个核心的\
    \ Windows 组件仍然是个谜。（当前版本自 2006 年以来没有发生重大变化。）\n\n![图 11.1 Microsoft Windows 任务计划程序过时的\
    \ UI](img/a7fa45d496335c22ffb14c3275e24ffb_314_0.png)\n\n为了熟悉 Microsoft Windows\
    \ 任务计划程序，让我们创建一个将日期和时间记录到日志文件的小脚本：\n\n```\n# 文件 log-date.ps1\nGet-Date >> date.log\n\
    ```\n\n此脚本应每小时执行一次。为此，请打开 Microsoft Windows 任务计划程序，然后在 **操作** 侧边栏中单击 **创建任务**\
    \ 命令。此步骤将带你进入一个包含多个选项卡的对话框：\n\n- **常规**\n  在此选项卡中，你可以为任务命名，指定脚本应在哪个账户下运行（通常是你自己的账户），并指定是仅在登录后启动还是在计算机运行时始终启动。如果要以管理员权限运行脚本，不应更改用户或组，只需单击\
    \ **使用最高权限运行** 选项。\n- **触发器**\n  在此选项卡中，你可以添加新的触发器以指定操作发生的时间和频率。要每小时运行一次脚本，你必须选择\
    \ **每天**，以当前时间作为开始时间，并选择 **每小时重复任务** 以及 **持续时间：1 天**。（更合理的设置 **持续时间：无限期** 在我的测试中无效。）与\
    \ cron 不同，Microsoft Windows 任务计划程序不仅支持基于时间的触发器，还可以在发生各种事件时执行操作，例如登录时或计算机当前处于空闲模式时。\n\
    - **操作**\n  作为新操作，你指定要运行的脚本。这个过程比你预期的要繁琐：原因是作为 **程序/脚本**，你不能简单地指定 PowerShell 脚本文件的路径。相反，你需要在此处为\
    \ PowerShell 7.n 指定 `pwsh`。只有当你的脚本要由较旧的 Windows PowerShell 5.n 执行时，程序名称才是 `powershell`。在\
    \ **添加参数** 输入字段中，指定 `-File` 选项并输入脚本的完整路径。输入时，不得有任何拼写错误。不要忘记 `-File`！默认情况下，脚本运行时活动目录是\
    \ `%windir%\\System32\\`。如果你不想使用此目录（例如，因为脚本应在不同目录中读取或写入文件），则必须在 **起始于** 字段中指定相关目录。对于示例脚本，要将日期和时间记录到脚本文件所在的同一目录中，你必须指定此目录。\n\
    - **条件**\n  此选项卡默认仅在计算机以网络模式运行时执行操作。如果你还想在笔记本电脑使用电池模式时运行或测试任务，可以停用此选项。"
