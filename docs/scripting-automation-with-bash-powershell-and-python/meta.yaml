    6048 3547:0b26:4c84:4411:0f66:945e:7741:d887

    5136 186.107.89.128

    4620 d741:a4ea:f6e1:6a17:78b1:1694:f518:c480

    ...

    ```


    Therefore, 6,166 requests originated from IPv6 address 65d3:f5b9:...:c18f, etc.
