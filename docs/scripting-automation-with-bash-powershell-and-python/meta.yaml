    # 3.4.3 Oh My Zsh


    For Zsh, many plugins are available on the internet that provide additional functionality,
    as well as themes that change the look of the command prompts. *Oh My Zsh* is
    a script that helps manage such extensions. Various plugins and themes are included
    right away and more can be added later.


    To install, download a small script from the project page *https://github.com/ohmyzsh/ohmyzsh*
    and run it. The script requires that the `git` command from the package of the
    same name is available. Instead of typing the following command, you should copy
    the code from the Oh My Zsh GitHub page:


    ```

    $ sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/\n    ohmyzsh/master/tools/install.sh)"

    ```


    During the installation, the `.zshrc` file will be overwritten. The previous content
    ends up in a backup file named `.zshrc.pre-oh-my-zsh`. Oh My Zsh will test for
    updates at startup in the future. Accordingly, when you open a new terminal window,
    you''re often prompted to update Oh My Zsh.


    In the basic configuration, the prompt has the `robbyrussell` theme by default.
    As the only active plugin, `git` contributes countless aliases that help with
    the operation of Git. A guide to the many functions and tips for further configuration
    of Oh My Zsh can be found, for example, at *https://ohmyz.sh* or in the following
    blog: *https://stackabuse.com/pimp-my-terminal-an-introduction-to-oh-my-zsh*.


    # 3.5 The First Bash Script


    After this short excursion to Zsh, we''ll now return to Bash. Before I introduce
    you to the syntax of Bash including various programming and working techniques
    in this chapter, I want to use this section to explain what a script actually
    is. As a matter of fact, this is quite simple: A script is a text file in which
    you formulate the same commands that you enter interactively in the terminal.
    Only two special features distinguish a script from just commands: The first line
    of the script must contain what''s called a *shebang*, and the file must be marked
    as an executable using `chmod`.


    # 3.5.1 Hash Bang (Shebang)


    The first line of a script to be executed on Linux or macOS must start with the
    characters, `#` ("hash" or "sharp") and `!` ("bang") as well as the path of the
    interpreter. "Shebang" is a linguistic shortening of "sharp bang."


    The interpreter is the program that reads and processes the script file, and in
    this chapter, that interpreter is Bash (or in exceptional cases Zsh). However,
    other programming languages can also be used as interpreters, such as Python or
    Perl.'
  - '[PAGE 58]


    On Linux, the `Bash` program is predominantly installed in the `/bin` directory.
    Thus, a Bash script starts with the following line:


    ```

    #!/bin/bash

    ```


    # 3.5.2 Shebang Variants


    Depending on which distribution or Unix-like system you''re working in, Bash may
    be installed in a different directory, such as `/usr/bin`. Using `which bash`,
    you can determine the location on your computer as in the following example:


    ```

    $ which bash


    /usr/bin/bash

    ```


    Links often make sure that both `/usr/bin/bash` and `/bin/bash` work. A general-purpose
    hash bang formulation that works regardless of the location uses the `/usr/bin/env`
    command. This command searches all common locations:


    ```

    #!/usr/bin/env bash

    ```


    If Bash is not installed on your machine at all and you''re using Zsh, you''ll
    want to replace `/bin/bash` with `/bin/zsh` (or the location where Zsh is installed
    on your machine):


    ```

    #!/bin/zsh

    ```


    If you want your script to work regardless of whether Bash or Zsh is available,
    the following hash bang will get you there:


    ```

    #!/bin/sh

    ```


    `sh` is a link that points to the default shell on most Linux systems. However,
    you must be aware that different shells will be used from now on when your script
    is run, depending on the computer/distribution. For example, on Debian and Ubuntu,
    the speed-optimized Dash will be executed. When formulating your scripts, you
    must be careful not to use any Bash-specific extensions that are not available
    in other shells.


    > **What Now?**

    I know it''s annoying that, in the IT world, for every rule there are three exceptions
    and then five special cases. Unless there are compelling reasons not to, you should
    always use `#!/bin/bash` as the hash bang. The sample files for this book also
    use this code.'
  - '[PAGE 59]


    # 3.5.3 Making the Script Executable (chmod +x)


    All Unix-like systems including Linux and macOS store some access bits along with
    each file that provide information about who is allowed to read, write, and execute
    the file. For scripts, the execute bit (x for short) is crucial. Only with this
    bit can a script be executed later like a command.


    To set the execute bit, you need to run the following command once in the terminal.
    Note that the `chmod` variant of macOS does not understand the `+x` short notation.
    You must explicitly specify for whom the execute bit is set. `a` means “for all.”


    ```

    $ chmod +x my-script-file.sh    (Linux, Git Bash)

    $ chmod a+x my-script-file.sh   (macOS)

    ```


    Thus, `chmod` is used to change the access bits. The command supports quite diverse
    syntax variants. (You can run `man chmod` if you’re interested in the details).
    For us, only the `chmod +x` variant is relevant, for setting the execute bit.


    > **The .sh Identifier**

    All Bash sample files in this book end with `.sh`. Although this file extension
    is common, using it is by no means mandatory. Bash scripts can work without an
    identifier (and even with a wrong identifier), provided the hash bang is correct.

    Since this book covers PowerShell (`.ps1`) and Python (`.py`) in addition to Bash,
    the identifier helps with the assignment of the sample files.


    # 3.5.4 Hello, World!


    To write your first script, you want to launch your favorite editor: Visual Studio
    Code (VS Code) is a good choice, but any editor is fine, including the minimalist
    `nano` program that you can run directly in a terminal. Then, enter the following
    two lines:


    ```

    #!/bin/bash

    echo "Hello, World!"

    ```


    Save this file as `hello-world.sh`. By using `chmod`, make the script executable,
    with the following command:


    ```

    $ chmod +x hello-world.sh    (Linux, Git Bash)

    $ chmod a+x hello-world.sh   (macOS)

    ```


    To check if a script works, you need to type its name and press `Enter`. Note
    that you must prefix the name with `./`. In this way, you tell Bash to look for
    your script in the current directory. (`.` is a short notation for the currently
    active directory.)


    ```

    $ ./hello-world.sh

    Hello, World!

    ```'
  - "[PAGE 60]\n\n> **If Script Execution Does Not Work**\n\nIf the execution of a\
    \ script triggers an error, various reasons may be the cause:\n- Did you specify\
    \ the filename correctly?\n- Did you use `chmod +x`?\n- Did you specify the hash\
    \ bang line correctly?\n- Is Bash not installed on your computer at all? If you\
    \ want to run the script using Zsh, you need to change the hash bang to `#!/bin/zsh`\
    \ or `#!/bin/sh`.\n\n# 3.5.5 Elementary Syntax Rules\n\nBesides the hash bang,\
    \ you must follow a few other rules in your scripts:\n\n+   - Lines beginning\
    \ with `#` are comments and are not evaluated.\n- You can use the `\\` character\
    \ for long commands that run across multiple lines. The `\\` character must be\
    \ placed exactly at the end of the line, and no more spaces may follow!\n- Code\
    \ indentation is allowed but is optional.\n- Bash is extremely picky about the\
    \ use of spaces in code. `s=\"abc\"` is correct; the variants `s =\"abc\"` or\
    \ `s= \"abc\"` as well as `s = \"abc\"` are all wrong and will trigger errors!\n\
    \  Conversely, in some cases, spaces are required before or after parentheses\
    \ for Bash to recognize the construct correctly. If your script does not work\
    \ as expected and the error messages are vague or misleading, you should first\
    \ check the use of spaces!\n\n# 3.5.6 A “Real” Example: Backup Script\n\nOf course,\
    \ you’re not reading this book to run “Hello World!” scripts. This second example\
    \ is a bit longer, but it performs a real task: It creates a compressed backup\
    \ of all files in your `documents` directory and stores the backup in the `mybackups`\
    \ directory:\n\n```\n#!/bin/bash\n# Sample file backup-documents.sh\n# Save the\
    \ contents of this directory\ndocumentdir=~/documents\n# Backup location\nbackupdir=~/mybackups\n\
    # Create backup directory\nmkdir -p $backupdir\n# returns e.g., date=27 for 2023-03-27\n\
    day=$(date '+%d')\n# Create backup, save as documents-<day>.tar.gz\necho \"Backup\
    \ file: $backupdir/documents-$day.tar.gz\"\ntar czf $backupdir/documents-$day.tar.gz\
    \ -C $documentdir .\n```"
- md: "This script requires some explanation:\n\n- `documentdir=~/documents` stores\
    \ the name of your documents directory in the `documentdir` variable. `~` is a\
    \ short notation for your home directory (e.g., `/home/kofler` on Linux, but `/Users/kofler`\
    \ on macOS). Depending on the operating system or distribution you use, you'll\
    \ need to use the English word `Documents`. When macOS displays `Documents` in\
    \ the Finder with a German language setting, the real directory name is actually\
    \ `Documents`!\n- `backupdir=~/mybackups` stores the desired backup location in\
    \ another variable.\n- `mkdir -p $backupdir` creates the backup directory. The\
    \ `-p` option prevents error messages if the directory already exists (which is\
    \ the case after the second execution of the script at the latest).\n- `day=$(date\
    \ '+%d')` stores the day of the month in the `day` variable. `date` is a command\
    \ which normally returns the whole date including time. Using the additional parameter\
    \ `+%d` you supply only the day of the month (01 to 31) instead. The notation\
    \ `$(...)` means: Execute the command contained in the parentheses and return\
    \ the result.\n- The `echo` command outputs the exact path of the new backup file\
    \ on the screen. The output is just feedback for you to understand that the script\
    \ works as intended. Note that you must specify variable names without `$` when\
    \ assigning them but prefix them with `$` when reading them. This is one of the\
    \ many strange syntax rules of Bash.\n- Finally, the `tar` command creates a backup\
    \ of all files in the `$documentdir` directory. The syntax of this command is\
    \ also weird:\n  - `czf` specifies what the command is supposed to do (*create*,\
    \ *zip*, *file*). The next parameter specifies the location of the backup file,\
    \ for example, `/home/kofler/documents-27.tar.gz`.\n  - `-C` determines which\
    \ directory is to be active during the execution of `tar`. In this example, it\
    \ should not be the currently active directory, but the directory where the files\
    \ to be backed up are located.\n  - `A .` at the end of the command means that\
    \ the entire contents of the directory must be backed up (and not just selected\
    \ files, which would also be conceivable). A more detailed description of the\
    \ important `tar` options follows in [Chapter 6, Section 6.3](#).\n\nIf you run\
    \ this script once a day, after some time, you'll have 31 backup versions in the\
    \ `mybackups` directory, from `documents-01.tar.gz` to `documents-31.tar.gz`.\
    \ While this script is a bit wasteful, it does give you the ability to recover\
    \ any documents that were mistakenly overwritten or deleted within the last month.\
    \ (I'll show you how to automate daily backups in [Chapter 11](#). I describe\
    \ other variants for performing backups in [Chapter 15](#).)\n\nFor starters,\
    \ this example might have been bit much all at once. But don’t worry, a lot of\
    \ basic information follows in the course of this chapter, which makes this code\
    \ easier to understand. My primary goal in this example was simply to show you\
    \ what “real” scripts look like.\n\n> **Sample Files**\n> This script, along with\
    \ all the other longer listings, can be found in the sample files for this book.\
    \ You can download these files at https://rheinwerk-computing.com/5851.\n\n##\
    \ 3.5.7 Running Scripts without ./\n\nDo you find it annoying that you always\
    \ must prepend ./ when running scripts (or even the full path if you’re currently\
    \ in a different directory)? There is a solution to this!\n\n- **Custom script\
    \ directory**\n  First, you need to set up a separate directory for your scripts,\
    \ for example, `myscripts` in your home directory.\n- **Extend the PATH variable**\n\
    \  Second, you want to add the full path for this directory to the `PATH` environment\
    \ variable. By default, `PATH` contains various directories in which Bash searches\
    \ for commands. So, when you run `ls`, Bash searches all the directories contained\
    \ in `PATH` in sequence. If `PATH` also contains `myscripts`, then this directory\
    \ will also be searched. To change `PATH`, you can use an editor to open the `.bashrc`\
    \ file in your home directory (or `.zshrc` if you use Zsh). At the end of this\
    \ file, you must add the following line:\n  ```bash\n  # at the end of .bashrc\
    \ or .zshrc\n  ...\n  export PATH=/home/kofler/myscripts:$PATH\n  ```\n  Instead\
    \ of `/home/kofler/myscripts`, you must of course specify the full path to your\
    \ own script directory. Also pay attention to the correct syntax! No spaces must\
    \ exist before and after = and :. Note also that `PATH` is written without the\
    \ $ character the first time, but with the $ character the second time. For this\
    \ change to take effect, you must log out and log back in. From now on, you can\
    \ run scripts stored in this directory simply by naming them.\n\n## 3.6 Running\
    \ Commands\n\nNow that you’ve had a chance to get a little acquainted with Bash\
    \ or Zsh, the next sections will cover the basics. I am generally referring to\
    \ Bash, but almost all of the information applies in the same way to Zsh.\n\n\
    One more note before things really get going: All the techniques explained in\
    \ the following sections apply equally to the interactive use of Bash as well\
    \ as to scripting!\n\n### 3.6.1 Serial Execution\n\nIn the simplest case—as in\
    \ the backup example in the previous section—a script consists of a sequence of\
    \ commands that are executed in sequence:\n\n```\n# Execute commands one after\
    \ the other\ncommand1\ncommand2\ncommand3\n```\n\nYou can also specify multiple\
    \ commands, separated by semicolons, on a single line. This approach saves space\
    \ and is especially handy when using Bash interactively, when you want to complete\
    \ several time-consuming tasks in succession without typing a new command each\
    \ time:\n\n```\n# equivalent\ncommand1; command2; command3\n```\n\n### 3.6.2 Conditional\
    \ Command Execution\n\nEach command returns a normally invisible error code. 0\
    \ means that no error has occurred. Any other value indicates an error or a negative\
    \ result. The term “error” is actually too strong, depending on the context: For\
    \ instance, if a condition formulated with the `test` command does not apply or\
    \ if the `grep` filter command does not find the search term, the command is considered\
    \ unsuccessfully executed and returns a return code not equal to 0.\n\nBash allows\
    \ you to make the execution of the second command dependent on the result of the\
    \ first one. The first variant uses the character combination `&&`. It expresses\
    \ that the second command should be executed only if the first one was successful.\
    \ (Similarly, you can of course link three or more commands in this way.)\n\n\
    ```\n# Run command 2 only if command 1 was successful\ncommand1 && command2\n\
    ```\n\nUsing `&&` makes sense, for example, when the first command runs a test\
    \ (does the file exist?) and the second command should run only on a positive\
    \ test result.\n\nAnother example: You want to perform an update. First, you update\
    \ the package sources (via `apt update` in Debian or Ubuntu). Not until this process\
    \ succeeds without errors will the actual update be performed in the second step\
    \ (`apt full-upgrade`). If, on the other hand, an error occurs during `apt update`,\
    \ for example, because the internet disconnects for a moment, executing the second\
    \ command is pointless.\n\n```\n# tests whether data.csv exists and then\n# returns\
    \ a corresponding message from\ntest -f data.csv && echo \"data.csv exists\"\n\
    \n# Update package sources;\n# if successful, then perform the\n# actual update\n\
    apt update && apt full-upgrade\n```\n\nAs an alternative to &&, you can also link\
    \ two commands via ||. In that case, an inverse logic applies: Command 2 does\
    \ not get executed until command 1 causes an error:\n\n```\n# Execute command\
    \ 2 only if command 1 fails\ncommand1 || command2\n```\n\nInstead of && and ||,\
    \ you can of course use if constructs, which I am going to introduce in Section\
    \ 3.11 on branching. However, && and || allow you to formulate more compact code\
    \ that is more similar to the style of traditional shell scripts.\n\n### 3.6.3\
    \ Running Commands in the Background\n\nUsually, the execution of a command blocks\
    \ the terminal or the script. The subsequent command cannot be started until the\
    \ preceding command is finished. What can help you in this case is `command &`\
    \ to run a command in the background (i.e., asynchronously). The asynchronous\
    \ execution of commands is rarely useful in scripts. Much more often, you'll need\
    \ % during interactive operation in the terminal. For example, you can use `command\
    \ &` to start a program with a graphical user interface (GUI), such as the Firefox\
    \ web browser, without blocking further input in the terminal. A process running\
    \ in the background can be made a foreground process again using `fg`. Conversely,\
    \ a time-consuming command can be interrupted via `Ctrl` + `Z` and then continued\
    \ in the background using `bg`.\n\n### 3.6.4 Running Commands in a Subshell\n\n\
    By placing multiple commands in parentheses, you can start a new shell process\
    \ for their execution and run the commands there. This subshell can be created\
    \ in a single line using `(c1; c2; c3)`. In scripts, you can place the brackets\
    \ wherever you like:\n\n```\ncommand1    # run in main shell\n(           # run\
    \ the following commands in a subshell\ncommand2\ncommand3\ncommand4\n)\ncommand5\
    \    # in the main shell again\n```"
