    \ (RSA)算法。较新版本使用诸如*椭圆曲线数字签名算法* (ECDSA)和变体*Curve25519*等方法。在本书的上下文中，具体过程无关紧要；你需要知道的是，密钥文件的名称因SSH版本而异。\n\
