  md: '# 4.7.2 Hash Tables


    Like arrays, hash tables allow data to be stored but with a significant difference:
    The access to the elements is not provided through a numbered index, but by self-selected
    keys. For this reason, hash tables are often referred to as *key-value stores*.
    You can use this feature to create clear data structures. Using hash tables is
    just as easy as using arrays. Consider the following examples:


    ```

    > $Data = @{ OS = "Windows"; Version = 11; ReleaseYear = 2021 }


    > $Data.MinimumRamGB = 4    # Add element


    > $Data                     # Read all elements


    Name            Value

    ----            -----

    MinimumRamGB    4

    ReleaseYear     2021

    OS              Windows

    Version         11


    > $Data.ReleaseYear         # Read an element

    2021

    ```


    Normally, a hash table does not care about the order of the elements. So, you
    must not rely on a loop to return the elements in the order in which you inserted
    them. If the order is important for you, you must create the hash table with the
    `[ordered]` keyword:


    ```

    > $Data = [ordered]@{ Key1 = Value1; Key2 = Value2 ... }

    ```


    # 4.8 Output Redirection


    By default, the result of each command is displayed in the terminal. If you run
    `Get-ChildItem`, the terminal will contain a list of found files afterwards. You
    can output variables or strings either with the `Write-Output` cmdlet or simply
    by naming them. The following two statements are therefore equivalent, and each
    results in the output of "Hello, World!":


    ```

    > Write-Output "Hello, World!"

    "Hello, World!"

    ```


    # 4.8.1 Streams


    What looks trivially simple at first glance is more complex behind the scenes:
    PowerShell differentiates between several "streams" (channels) that are intended
    for different purposes.'
