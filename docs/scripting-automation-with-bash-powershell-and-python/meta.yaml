  md: "# 5.11.1 Conditions\n\nConditions are usually formed with comparison operators\
    \ (e.g., `x == 3` or `a is b`). Multiple conditions can be logically linked with\
    \ `and` or `or`.\n\n```\nif x > 0 and (y > 0 or z == 1):\n    ...\n```\n\nLike\
    \ almost all other programming languages, Python optimizes `and` and `or` expressions\
    \ (in what is called a *short-circuit evaluation*):\n\n+   - If the first partial\
    \ expression of an `and` operation is `False`, the second partial expression will\
    \ no longer be evaluated because the result will be `False` in any case.\n- In\
    \ an `or` operation, if the first partial expression returns `True`, the second\
    \ partial expression will no longer be evaluated because the result will be `True`\
    \ in any case.\n\nInstead of `a < x and x < b`, the short notation `a < x < b`\
    \ is allowed. Conditions can also be formulated without a relational operator,\
    \ for example, in the following form:\n\n```\nif x:\n    ...\n```\n\nThis condition\
    \ is met if the following is true:\n\n+   - `x` is a number not equal to 0.\n\
    - `x` is a non-empty string.\n- `x` is the Boolean value 1 (`True`).\n- `x` is\
    \ a list, a tuple, or a set with at least one element.\n- `x` is an initialized\
    \ object (not `None`).\n\n# 5.11.2 Short Notation with if\n\nSometimes, you need\
    \ `if` constructs only to assign a variable:\n\n```\nif condition:\n    x = value1\n\
    else\n    x = value2\n```\n\nYou can use a space-saving short notation for such\
    \ constructs:\n\n```\nx = value1 if condition else value2\n```\n\n# 5.12 Loops\
    \ (for and while)\n\nIn Python, loops are primarily formed using `for var in elements`.\
    \ The loop variable accepts each of the specified elements in sequence."
