  - "[PAGE 423]\n\n# 19.2.1 Account Data\n\naccountdata contains the data of the new\
    \ customer. The URL variable specifies the custom part of the web address (i.e.,\
    \ https://example.com/sd-architects). DB is used as the name for the new MySQL\
    \ database and for the associated MySQL user. DB is maximum 16 characters long\
    \ and may contain only letters, digits, and underscores.\n\n```\n# Sample file\
    \ accountdata\nFIRSTNAME='Maria'\nLASTNAME='Smith'\nCOMPANY='Smith & Davis Architects'\n\
    EMAIL='maria.smith@example.com'\nURL='sd-architects'\nDB='sdarchitects'\n```\n\
    \n# 19.2.2 Structure of the Script\n\nThe make-new-account.sh script must be run\
    \ with root privileges. The mysql and mysqldump commands included in the script\
    \ are based on the assumption that root has unrestricted access rights to the\
    \ MySQL server or that the password for the MySQL root user is contained in the\
    \ /root/.my.cnf file.\n\nThe code starts by reading the account data of the new\
    \ customer. The script first tests whether a database of that name already exists.\
    \ In this case, the execution will be terminated:\n\n```\n# Sample file make-new-account.sh\n\
    # import account data\n. accountdata\n# abort if the database already exists\n\
    sql=\"SELECT SCHEMA_NAME FROM INFORMATION_SCHEMA.SCHEMATA\n     WHERE SCHEMA_NAME='$DB'\"\
    \nresult=$(mysql -s -N -e \"$sql\")\necho \"result = $result\"\nif [ \"$result\"\
    \ ]; then\n  echo \"Database $DB already exists.\"\n  exit\nfi\n```\n\nThe script\
    \ uses the mkpasswd password generator to generate two random passwords:\n\n+\
    \   - The dbpw variable contains the password for accessing the customer database.\
    \ This password is only used internally and is stored in a configuration file\
    \ on the server.\n- loginpw contains the customer password for the web login.\
