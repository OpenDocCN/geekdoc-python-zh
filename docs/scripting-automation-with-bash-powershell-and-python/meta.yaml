    # 6.4.9 Determining Other System Information


    Do you want to know which distribution is running in a virtual machine or on a
    server? Take a look at the `/etc/os-release` file:


    ```

    $ cat /etc/os-release


    NAME="Arch Linux"

    BUILD_ID=rolling

    ...

    ```


    You can determine the version of the running kernel by using `uname`:


    ```

    $ uname -r


    6.1.1-arch1-1

    ```


    You can read error, warning, debug, and status messages from the kernel with `dmesg`.
    The best approach is to redirect the result of `dmesg` to `less` so that you can
    scroll through the information, which can extend over several pages. In most current
    distributions, the kernel messages can only be read with `root` privileges.


    ```

    $ sudo dmesg | less

    ```


    # 6.5 Software Installation


    Linux distributions contain a good basic set of commands by default. However,
    depending on the direction in which your scripts develop, it can happen that exactly
    one specific command is missing. This case occurs particularly often when you
    use containers, for example, with Docker. In containers, the basic equipment is
    reduced to a minimum for reasons of space.


    A missing command is rarely an insurmountable problem: Most Linux distributions
    are associated with a huge archive of software packages. All you need to do is
    install the correct package from these package sources that contains the commands
    you need.


    > **Differences among apt, dnf, zypper, and brew**


    Fundamental differences exist between Linux distributions when it comes to package
    management. In this section, I focus on the `apt` command, which is used on Debian,
    Ubuntu, and related distributions.


    In the Red Hat world, for example, on Fedora or AlmaLinux, you would use `dnf`
    instead, which works quite similarly to `apt`. For SUSE Linux Enterprise Server
    (SLES) distributions in turn, `zypper` is used.'
- md: "By default, no package management exists at all on macOS. However, external\
    \ tools like `brew` (see https://brew.sh) can take care of this task and make\
    \ a rich selection of open-source tools accessible for macOS. Once installed,\
    \ the `brew` command also works similarly to `apt` or `dnf`.\n\n## 6.5.1 Updating\
    \ Software\n\nYou can update all packages installed on Debian or Ubuntu with only\
    \ two commands:\n\n```\n$ sudo apt update\n$ sudo apt full-upgrade\n```\n\nYou'll\
    \ probably ask yourself why two (similar sounding) commands are necessary; why\
    \ isn't one sufficient? `apt update` only updates the information as to which\
    \ packages are available in the external package sources. So, the program updates\
    \ the directory of available software, but without touching the existing packages.\
    \ Only `apt full-upgrade` downloads the updated packages after a query and installs\
    \ them. If the update affects basic functions such as the Linux kernel, a reboot\
    \ must be performed afterwards for the update to take effect.\n\n## 6.5.2 Installing\
    \ Additional Packages\n\nThe installation of new software also starts with `apt\
    \ update` (unless you have just run this command as part of an update). `apt install`\
    \ then downloads the desired software package, in the following example various\
    \ encryption tools collected in the `openssl` package:\n\n```\n$ sudo apt update\n\
    $ sudo apt install openssl\n```\n\nIn Linux, software is often distributed across\
    \ multiple packages. Relatively often, to execute the commands from package A,\
    \ libraries are required that are located in package B. `apt` recognizes such\
    \ dependencies and installs all the required additional packages after a query.\
    \ So, don't be surprised if `apt install xy` reports that it installs not just\
    \ one package, but five or ten!\n\n> **Finding Packages**\nIf you need a certain\
    \ command for your script, guessing in which package the command is located can\
    \ often be difficult. Package and command names do not always match, especially\
    \ if a package contains multiple commands. Sometimes (but unfortunately not always!),\
    \ the `apt search xy` command, which searches for search term `xy` in the package\
    \ description, delivers the desired result. Package search engines available on\
    \ the internet work better; for Ubuntu, you can use visit, for example, https://packages.ubuntu.com.\n\
    \n## 6.6 Other Commands\n\nTo conclude this chapter, I want to briefly introduce\
    \ you to a few more frequently used commands:\n\n- **alias**\n  `alias` defines\
    \ shortcuts. `alias ll='ls -lh'` allows you to run the frequently used `ls -l\
    \ -h` command (to list files with detailed information and present the file size\
    \ as *human readable*) in the `ll` short notation. Shortcuts are best specified\
    \ in the `.bashrc` file so that they are permanently available.\n\n- **cat file**\n\
    \  `cat file` outputs a text file. The command is often combined with input or\
    \ output redirection. For example, `cat text1 text2 text3 > result` joins three\
    \ text files and saves the result in a new file.\n\n  `Cat > newfile` is also\
    \ particularly useful. This construct allows you to create a short new text file\
    \ without launching an editor. Because no file was passed to the command for reading,\
    \ it expects the input in the terminal (i.e., from standard input). Pressing `Ctrl`\
    \ + `D` terminates the input:\n\n  ```\n  $ cat > newfile\n  Line 1\n  Line 2\n\
    \  <Ctrl>+<D>\n  ```\n\n- **date**\n  `date` returns the current date and time.\
    \ A string starting with `+` optionally controls the output format. For example,\
    \ `date \"+%Y-%m-%d\"` generates a string with the date in International Organization\
    \ for Standardization (ISO) format (for example, `2023-12-31`).\n\n- **history**\n\
    \  `history` lists all recently executed commands.\n\n- **ip**\n  `ip` determines\
    \ or changes the network configuration. The following examples contain commands\
    \ that are used particularly often:\n\n  ```\n  $ ip addr       # lists all IP\
    \ addresses of the computer\n  $ ip link       # lists the network adapters\n\
    \  $ ip route      # displays the routing table\n  ```\n\n- **less file**\n  `less\
    \ file` displays a text file just like `cat`. This command is suitable for longer\
    \ files because you can scroll through the text at your leisure using the cursor\
    \ keys. `q` terminates the program.\n\n- **ln file link**\n  `ln file link` creates\
    \ a link to an existing file. The `-s` option creates a symbolic link instead\
    \ of a *hard link*.\n  If you're unsure about the order in which you need to specify\
    \ the parameters: All important Linux commands expect the source first, then the\
    \ target. This rule applies to `cp`, `mv`, `ln`, and so on.\n\n- **man command**\n\
    \  `man command` displays the help text for a command. As with `less`, you can\
    \ use the cursor keys to scroll through the often several pages of text. `/` allows\
    \ you to specify a search term. `q` terminates the help.\n\n- **ping hostname/ipaddress**\n\
    \  `ping hostname/ipaddress` sends Internet Control Message Protocol (ICMP) packets\
    \ to another host and shows how long the response takes. This command typically\
    \ runs endlessly until it is terminated via `Ctrl` + `C`. `ping -c <n>` sends\
    \ only *n* packets and then terminates by itself.\n\n- **wc file**\n  `wc file`\
    \ counts the number of lines, words, and characters in a text file. By using the\
    \ `-c` (*count bytes*), `-w` (*words*), or `-l` (*lines*) options, you can reduce\
    \ the output to one number.\n\n- **which command**\n  `which command` determines\
    \ the location where the command is stored. For example, `which cp` returns the\
    \ following result: `/usr/bin/cp`.\n\n# Chapter 7\n\n## cmdlets for PowerShell\n\
    \nThis chapter presents a compact compilation of the most important cmdlets—a\
    \ kind of basic PowerShell vocabulary for interactive operation and for script\
    \ programming. If you have had years of experience in PowerShell, you can safely\
    \ skip this chapter.\nBesides the preinstalled cmdlets, countless PowerShell extensions\
    \ are available on the internet. The NuGet package manager, which I will introduce\
    \ to you in Section 7.8, helps with the installation of these additional modules.\n\
    The chapter ends with a reference of the main aliases. These shortcuts save a\
    \ lot of typing when using PowerShell interactively and allow for efficiency similar\
    \ to what is available on Linux.\n\n> **Prerequisites for This Chapter**\nBy its\
    \ nature, reading this chapter makes sense only if you're familiar with the basic\
    \ PowerShell concepts presented in Chapter 4, Section 4.4, such as chaining cmdlets\
    \ using the pipe operator (|).\n\n## 7.1 Directories and Files\n\nYou can use\
    \ the following commands to set your home directory (*My Documents*) as the working\
    \ directory, create a new directory there, and change it. Later, you can leave\
    \ the new directory and then delete it.\n\n```\n> Set-Location               \
    \ # set the home directory as working directory\n> Get-Location              \
    \  # show its location\n\nPath\n----\nC:\\Users\\kofler\n> New-Item -ItemType\
    \ \"directory\" subdir   # create new directory\n> Set-Location subdir       \
    \   # now subdir is the working directory\n> Set-Location ..              # get\
    \ back into your home directory\n> Remove-Item subdir           # delete subdir\n\
    ```\n\nFor all cmdlets used in this listing, aliases or functions are available\
    \ that allow for the completion of these actions with less typing. Since I recommend\
    \ avoiding these short-hand notations in your own scripts, I always use the original\
    \ cmdlet name in all further examples in this chapter.\n\n```\n> cd          \
    \      # cd is an alias for Set-Location\n> pwd               # pwd is an alias\
    \ for Get-Location\n> md subdir         # md is an alias for the mkdir function\n\
    > cd subdir\n> cd ..\n> rmdir subdir      # rmdir is an alias for Remove-Item\n\
    ```\n\nNew-Item also enables you to create a group of nested directories. Although\
    \ directories are separated by \\ in Windows, cmdlets also accept / as the directory\
    \ separator.\n\n```\n> New-Item -ItemType \"directory\" images\\2023\\12\n> New-Item\
    \ -ItemType \"directory\" images/2023/12  # equivalent\n```\n\n### 7.1.1 Listing,\
    \ Copying, Moving, and Deleting Files\n\nIn the following listing, the tst directory\
    \ is created first. In that directory, the current time is stored in the now.txt\
    \ file. This file is copied first, then the copy is renamed. Get-ChildItem lists\
    \ the text files that now exist. Remove-Item cleans up again at the end.\n\n```\n\
    \                                # creates the tst directory\n> New-Item -ItemType\
    \ \"directory\" tst\n> Set-Location tst              # changes there\n> Get-Date\
    \ > now.txt             # saves date and time\n                              \
    \  # to now.txt\n> Copy-Item now.txt copy.txt     # creates a copy of now.txt\n\
    > Move-Item copy.txt backup.txt  # renames the copy\n> Get-ChildItem *.txt   \
    \         # lists all *.txt files\n```\n\nMode    LastWriteTime         Length\
    \ Name\n----    -------------         ------ ----\n-a---   24.01.2023 12:29  \
    \       40 backup.txt\n-a---   24.01.2023 12:29         40 now.txt\n\n```\n> Remove-Item\
    \ *.txt              # deletes all *.txt files\n```\n\nNote that files or directories\
    \ that are deleted using Remove-Item do not go to the recycle bin but are instead\
    \ irrevocably deleted!\n\nTo test whether a file exists, you can use Test-Path.\
    \ The cmdlet returns True or False.\n\n```\n> Test-Path file1.txt\nFalse\n```"
