  - "[PAGE 136]\n\n```\n$ command1 > file.txt\n$ command2 < file.txt\n```\n\nUnfortunately,\
    \ PowerShell does not support < because PowerShell commands expect objects most\
    \ of the time. But if you first write the result of a PowerShell command into\
    \ a text file via `command1 > file.txt`, the object information will be lost.\
    \ The text file contains only formatted text and subsequently cannot serve as\
    \ a basis for processing the data in another command.\n\nThe lack of input redirection\
    \ becomes problematic when you use commands from the Linux world that require\
