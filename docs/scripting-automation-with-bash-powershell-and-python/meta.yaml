    # 4.13.1 Set-StrictMode


    The `Set-StrictMode` command, mentioned several times earlier in this chapter,
    sets how picky PowerShell should be about detecting errors. `Set-StrictMode` currently
    supports three versions:


    +   - `Set-StrictMode -Version 1.0` causes an error message when using an uninitialized
    variable. Variables in strings (i.e., "text $UnknownVariable") are excluded.

    - `Set-StrictMode -Version 2.0` triggers an error for each uninitialized variable
    as well as when using non-existent properties.

    - `Set-StrictMode -Version 3.0` also throws an error when accessing non-existent
    array elements.


    The inaccuracies detected by `Set-StrictMode` will result in an error message,
    but the script will still continue! You can also specify `Latest` instead of a
    version number. However, the results of these tests should be taken with a grain
    of salt: If more validity tests are added in a future PowerShell version, your
    script may report an error even though nothing has changed in the code.


    # 4.13.2 Aborting Scripts on Errors


    The way PowerShell behaves when it detects an error depends on the contents of
    the `$ErrorActionPreference` variable. You can change the desired behavior simply
    by assigning a string to the variable. This change is allowed everywhere in a
    script. You can cause a different response to errors in different parts of the
    program.


    | Setting | Effect |

    | :--- | :--- |

    | "Continue" | Display error message, continue script (applies by default) |

    | "Inquire" | Display error message and ask if script should be continued |

    | "SilentlyContinue" | Continue script without error message |

    | "Stop" | Display error message, end script |


    **Table 4.9** The Most Important Settings for the $ErrorActionPreference Variable


    # 4.13.3 Separating Error Messages from Other Output


    When you run a script interactively in PowerShell, ordinary outputs and errors
    alike appear in the terminal. However, if you redirect the output of a script
    to a file using `> outfile.txt`, then that file will contain only the regular
    output. The error messages are still visible on the screen. This behavior has
    to do with the fact that PowerShell differentiates between multiple “streams”
    that are intended for different purposes. For background information on this topic,
    see [Section 4.8](#section-4.8).'
  - "[PAGE 150]\n\n# 4.13.4 Error Protection Using try/catch\n\nAs with most higher-level\
    \ programming languages (like C#, Java, etc.), PowerShell provides the option\
    \ to wrap multiple statements of critical (error-prone) code into a `try` block.\
    \ If an error occurs in that block during execution, the code continues in the\
    \ `catch` block. The `Error` variable provides information about the error there.\n\
    \n```\ntry {\n    command1\n    command2\n    ...\n} catch {\n    # Here code\
    \ will be executed only if a\n    # an error has occurred\n    Write-Host \"An\
    \ error occurred: $_\"\n}\n```\n\nThe decisive advantage of `try-catch` constructs\
    \ is that you can continue your script even if errors occur without an error message\
    \ and, if necessary, respond specifically to an error.\n\n> **Outputting Error\
    \ Messages**\n\nPowerShell does not make outputting error messages easy. In our\
    \ earlier example, I used `Write-Host`. The error message thus appears in the\
    \ terminal but cannot be redirected.\n\n`Write-Output` is usually not recommended\
    \ because it makes the error message part of the result of the script or function.\n\
    \n`Write-Error` is only useful in exceptional cases, because—depending on the\
    \ setting of `$ErrorActionPreference`—this output then triggers another error.\n\
    \nTwo important syntax variants to the `try-catch` syntax are worth exploring:\n\
    \n+   - You can define multiple `catch` blocks for different error types. PowerShell\
    \ then only considers the `catch` code that matches the error which occurred.\n\
    - Following the `catch` blocks, there may be a `finally` block, which is for cleanup.\
    \ Code formulated in this block is *always* executed, regardless of whether an\
    \ error occurs or not, and regardless of whether the script or function is exited\
    \ in a `try` or `catch` block via `return`.\n\nFor more details about these syntax\
    \ variants, refer to https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_try_catch_finally."
- md: '## 4.13.5 Terminating the Script Execution Prematurely (Exit)


    You can use `Exit` to terminate a script prematurely. Optionally, you can return
    an error code in the process: 0 means no error arose; any other number is an error
    code whose meaning you can freely choose.


    ```

    Exit 1  # Terminate script with error code

    ```


    After executing a script, you can retrieve its exit code from the `$LASTEXITCODE`
    variable. Note that exit codes exist only for conventional commands and for scripts.
    (cmdlets do not have exit codes.)


    ## Chapter 5

    Python


    Python is currently one of the most popular programming languages, and surprisingly
    for a wide variety of purposes: as a *first language* for learning programming;
    for scientific tasks including statistics and visualization; and also for AI research
    (neural networks, image recognition, etc).


    In this book, I focus on using Python as a scripting language. The focus is thus
    on the development of often tiny programs to perform or automate administrative
    tasks. For example, Python is great for converting data from one format to another
    (e.g., comma-separated values [CSV] to JSON); extracting data from or storing
    data in databases; or processing data from the network (e.g., web scraping, requests
    for REST APIs).


    As I explained in Chapter 1, Python is more accessible compared to Bash and PowerShell:
    The syntax is clear and consistent, and the documentation available on the web
    is outstanding. In Python, you can reproduce relatively easily a complicated logic
    through functions. Python manages the balancing act across all common operating
    systems and is not strongly anchored to a particular operating system like Bash
    or PowerShell are, while Bash and PowerShell have by no means lost their reason
    for existence. These languages excel in calling operating system-related commands
    or cmdlets. A backup script that primarily combines a few external commands into
    a meaningful whole is easiest to implement in Bash. Similarly, this advice applies
    to PowerShell if you want to administer a Microsoft Active Directory system.


    This chapter provides a brief introduction to Python. It focuses on the language
    features that are particularly important for scripting. Should you “fall in love”
    with Python and want to write more than just short scripts, you’ll find a large
    volume of literature on the internet and on the book market for more in-depth
    study.


    ## 5.1 Installing Python


    Python is installed by default on almost all Linux distributions. All you need
    to do is determine which version you have by opening a terminal window and running
    the following command:


    ```

    python --version

    Python 3.11.1

    ```


    If the version number 2.7 is displayed, your distribution has the outdated version
    2 and the current version 3 installed in parallel. You must then run Python 3
    using the `python3` command.


    ### 5.1.1 Windows


    For Windows, for links to the latest Python releases for Windows, refer to *https://python.org/downloads/windows*.


    Once you have selected the desired version number, you still need to decide on
    the right installer. Usually, you would select the *Windows installer (64-bit)*.


    Make sure you enable the **Add python.exe to PATH** option in the installer before
    clicking **Install Now!** This option ensures that you can easily launch Python
    from `cmd.exe` or PowerShell later.


    ![](img/a7fa45d496335c22ffb14c3275e24ffb_153_0.png)


    **Figure 5.1** Python Installer for Windows


    Once the actual installation is complete, you have the option of overriding the
    typical Windows limit of 260 characters for starting commands. If a Python program
    is called with a large number of parameters, this limit may cause errors. For
    this reason, you should click **Disable path length limit**. (The button will
    not be displayed if the limit has already been disabled during a previous installation
    or by some other way.)


    After the installation, start `cmd.exe` or PowerShell and verify that Python and
    its module manager `pip` can be started with the following commands:


    ```

    > python --version

    Python 3.11.1


    > pip --version

    pip 22.3.1 from C:\Users\kofler\AppData\Local\Programs\Python\nPython311\Lib\site-packages\pip
    (python 3.11)

    ```


    > **Avoid Multiple Installations!**

    Installing Python on Windows is quite easy—and that’s where the problem lies:
    The Microsoft Store, development environments, editors, and so on are always happy
    to help you install the latest Python version, which can easily result in two
    or three versions installed in parallel. At first glance, everything seems to
    work until you try to install an extension module using pip. Although pip won’t
    report any error, Python won’t be able to find the module. The cause is trivial:
    The pip version you’re calling is from a different Python version than the one
    you’re currently using—most likely because the older version is preferred in the
    PATH environment variable.

    Trying to solve the resulting problems has already driven me (and more often my
    students) to despair. The best solution is to systematically search for all Python
    versions on the computer and uninstall each of them. After that, you must remove
    all PATH directories related to Python in the System Properties preference pane.
    A Windows restart certainly won’t hurt either. Finally, you need to download the
    installer from the website mentioned earlier and install the latest Python version.
    Avoid the Microsoft Store or any other installation methods!


    ### 5.1.2 macOS


    The easiest way to install Python 3 on macOS is to use the graphical installer
    (*.pkg file). You can find it on the Python download page at https://python.org/downloads.


    During installation, a Finder window opens where you must double-click the Install
    Certificates.command script to run it. This script installs various SSL certificates
    and thus allows you to install root certificates that Python programs can use
    to verify HTTPS encryption. (Python does not use macOS certificates. This step
    is therefore absolutely necessary!)


    After the installation, you should launch a new terminal window and double-check
    that everything has worked out fine, just like on Linux. Note that the commands
    are python3 and pip3, not python and pip, as on Windows and with current Linux
    distributions.


    ```

    $ python3 --version

    Python 3.11.1

    $ pip3 --version

    pip 22.3.1 from /Library/Frameworks/Python.framework/Versions/

    3.11/lib/python3.11/site-packages/pip (python 3.11)

    ```


    ## 5.2 Getting to Know Python in a Terminal Window


    Unlike most other programming languages, you can try out Python *without* writing
    code to a file. Simply open a terminal window and run the `python` or `python3`
    command in it. This will start an interactive Python environment. In it, the three
    `>>>` characters (the “Python prompt”) indicate the place where you can perform
    input yourself. `Enter` terminates the input, and Python then displays the result:


    ```

    $ python

    >>> 1+2

    3

    ```


    When trying out Python interactively, you can mostly do without `print`, because
    results are displayed automatically anyway:


    ```

    >>> x=5

    >>> print(x + 7)

    12

    >>> x + 7

    12

    ```


    You can even enter multiline statements, such as `for` loops. There are two things
    to keep in mind: On the one hand, the statements within the loop must be indented
    by spaces, and on the other hand, you must terminate the entire input by pressing
    `Enter` *twice*. The Python interpreter prepends `>>>` to the first line, and
    three dots appear on all subsequent lines:


    ```

    >>> for i in range(3):

    ...     print(i)

    ...

    0

    1

    2

    ```


    To exit Python, press `Ctrl` + `D`.


    > **Interactive Outputs versus Script Outputs**

    In the following sections, you’ll see numerous Python commands that are meant
    for interactive experimentation and are marked with the `>>>` prompt. Even though
    these examples look trivial, you should make the effort to follow them yourself
    and maybe conduct a few more experiments.

    Note that, when using Python interactively, the result of an expression always
    gets displayed. `x` and `Enter` shows the content of `x`, entering `x + 3` calculates
    the total and shows the result.

    In scripts, things are different: There you need to use `print` for creating outputs.
    This means you must include `print(x)` or `print(x+3)` in your script to output
    `x` or the total.'
  mdcn: '## 4.13.5 提前终止脚本执行（Exit）


    你可以使用 `Exit` 来提前终止脚本。你还可以选择在此过程中返回一个错误代码：0 表示没有发生错误；任何其他数字都是错误代码，其含义你可以自由定义。


    ```

    Exit 1  # 使用错误代码终止脚本

    ```


    执行脚本后，你可以从 `$LASTEXITCODE` 变量中获取其退出代码。请注意，退出代码仅适用于常规命令和脚本。（cmdlet 没有退出代码。）


    ## 第5章

    Python


    Python 是目前最受欢迎的编程语言之一，令人惊讶的是，它的用途非常广泛：作为学习编程的*第一门语言*；用于包括统计和可视化在内的科学任务；也用于人工智能研究（神经网络、图像识别等）。


    在本书中，我专注于将 Python 作为脚本语言使用。因此，重点在于开发通常很小的程序来执行或自动化管理任务。例如，Python 非常适合将数据从一种格式转换为另一种格式（例如，从逗号分隔值
    [CSV] 到 JSON）；从数据库中提取数据或将数据存储到数据库中；或处理来自网络的数据（例如，网络爬虫、REST API 请求）。


    正如我在第1章中解释的那样，与 Bash 和 PowerShell 相比，Python 更容易上手：语法清晰一致，并且网上可用的文档非常出色。在 Python
    中，你可以相对轻松地通过函数重现复杂的逻辑。Python 在所有常见操作系统上都能很好地运行，不像 Bash 或 PowerShell 那样强烈地绑定到特定的操作系统，而
    Bash 和 PowerShell 也绝没有失去其存在的理由。这些语言在调用操作系统相关的命令或 cmdlet 方面表现出色。一个主要将几个外部命令组合成一个有意义整体的备份脚本，在
    Bash 中最容易实现。同样，如果你想管理 Microsoft Active Directory 系统，这个建议也适用于 PowerShell。


    本章简要介绍了 Python。它侧重于对脚本编写特别重要的语言特性。如果你“爱上”了 Python 并想编写不仅仅是简短脚本的程序，你会在互联网和图书市场上找到大量用于更深入学习的文献。


    ## 5.1 安装 Python


    Python 在几乎所有 Linux 发行版上都是默认安装的。你只需要打开一个终端窗口并运行以下命令来确定你拥有的版本：


    ```

    python --version

    Python 3.11.1

    ```


    如果显示的版本号是 2.7，那么你的发行版同时安装了过时的版本 2 和当前的版本 3。然后你必须使用 `python3` 命令来运行 Python 3。


    ### 5.1.1 Windows


    对于 Windows，请参考 *https://python.org/downloads/windows* 获取适用于 Windows 的最新 Python
    版本的链接。


    选择所需的版本号后，你仍然需要决定使用哪个安装程序。通常，你会选择 *Windows installer (64-bit)*。


    在点击 **Install Now!** 之前，请确保在安装程序中启用了 **Add python.exe to PATH** 选项。此选项可确保你以后可以轻松地从
    `cmd.exe` 或 PowerShell 启动 Python。


    ![](img/a7fa45d496335c22ffb14c3275e24ffb_153_0.png)


    **图 5.1** Windows 的 Python 安装程序


    实际安装完成后，你可以选择覆盖 Windows 启动命令的典型 260 字符限制。如果 Python 程序使用大量参数调用，此限制可能会导致错误。因此，你应该点击
    **Disable path length limit**。（如果限制已在之前的安装中或通过其他方式被禁用，则不会显示此按钮。）


    安装后，启动 `cmd.exe` 或 PowerShell，并使用以下命令验证 Python 及其模块管理器 `pip` 是否可以启动：


    ```

    > python --version

    Python 3.11.1


    > pip --version

    pip 22.3.1 from C:\Users\kofler\AppData\Local\Programs\Python\nPython311\Lib\site-packages\pip
    (python 3.11)

    ```


    > **避免多次安装！**

    在 Windows 上安装 Python 相当容易——问题就在这里：Microsoft Store、开发环境、编辑器等总是很乐意帮助你安装最新的 Python
    版本，这很容易导致同时安装两个或三个版本。乍一看，一切似乎都正常，直到你尝试使用 pip 安装扩展模块。尽管 pip 不会报告任何错误，但 Python 将无法找到该模块。原因很简单：你调用的
    pip 版本来自与你当前使用的 Python 版本不同的版本——很可能是因为在 PATH 环境变量中更倾向于使用旧版本。

    试图解决由此产生的问题已经让我（更经常是我的学生）感到绝望。最好的解决方案是系统地搜索计算机上的所有 Python 版本并卸载每一个。之后，你必须在系统属性首选项窗格中删除所有与
    Python 相关的 PATH 目录。重启 Windows 当然也没有坏处。最后，你需要从前面提到的网站下载安装程序并安装最新的 Python 版本。避免使用
    Microsoft Store 或任何其他安装方法！


    ### 5.1.2 macOS


    在 macOS 上安装 Python 3 最简单的方法是使用图形安装程序（*.pkg 文件）。你可以在 Python 下载页面 https://python.org/downloads
    上找到它。


    在安装过程中，会打开一个 Finder 窗口，你必须在其中双击 Install Certificates.command 脚本来运行它。此脚本安装各种 SSL
    证书，从而允许你安装 Python 程序可用于验证 HTTPS 加密的根证书。（Python 不使用 macOS 证书。因此，此步骤绝对必要！）


    安装后，你应该启动一个新的终端窗口，并像在 Linux 上一样仔细检查一切是否正常。请注意，命令是 python3 和 pip3，而不是像 Windows
    和当前 Linux 发行版那样的 python 和 pip。


    ```

    $ python3 --version

    Python 3.11.1

    $ pip3 --version

    pip 22.3.1 from /Library/Frameworks/Python.framework/Versions/

    3.11/lib/python3.11/site-packages/pip (python 3.11)

    ```


    ## 5.2 在终端窗口中了解 Python


    与大多数其他编程语言不同，你可以*无需*将代码写入文件即可尝试 Python。只需打开一个终端窗口并在其中运行 `python` 或 `python3` 命令。这将启动一个交互式
    Python 环境。在其中，三个 `>>>` 字符（“Python 提示符”）表示你可以自己进行输入的位置。按 `Enter` 终止输入，然后 Python
    会显示结果：


    ```

    $ python

    >>> 1+2

    3

    ```


    在交互式尝试 Python 时，你大多可以不用 `print`，因为结果无论如何都会自动显示：


    ```

    >>> x=5

    >>> print(x + 7)

    12

    >>> x + 7

    12

    ```


    你甚至可以输入多行语句，例如 `for` 循环。有两件事需要注意：一方面，循环内的语句必须用空格缩进；另一方面，你必须按两次 `Enter` 来终止整个输入。Python
    解释器在第一行前加上 `>>>`，所有后续行都显示三个点：


    ```

    >>> for i in range(3):

    ...     print(i)

    ...

    0

    1

    2

    ```


    要退出 Python，请按 `Ctrl` + `D`。


    > **交互式输出与脚本输出**

    在接下来的章节中，你将看到许多用于交互式实验的 Python 命令，它们用 `>>>` 提示符标记。尽管这些示例看起来很简单，但你应该努力自己动手尝试，并可能进行更多实验。

    请注意，当交互式使用 Python 时，表达式的结果总是会显示。输入 `x` 并按 `Enter` 会显示 `x` 的内容，输入 `x + 3` 会计算总和并显示结果。

    在脚本中，情况有所不同：在那里你需要使用 `print` 来创建输出。这意味着你必须在脚本中包含 `print(x)` 或 `print(x+3)` 来输出
    `x` 或总和。'
