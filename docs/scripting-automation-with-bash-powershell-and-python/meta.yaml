  - '[PAGE 63]


    One more note before things really get going: All the techniques explained in
    the following sections apply equally to the interactive use of Bash as well as
    to scripting!


    # 3.6.1 Serial Execution


    In the simplest case—as in the backup example in the previous section—a script
    consists of a sequence of commands that are executed in sequence:


    ```

    # Execute commands one after the other

    command1

    command2

    command3

    ```


    You can also specify multiple commands, separated by semicolons, on a single line.
    This approach saves space and is especially handy when using Bash interactively,
    when you want to complete several time-consuming tasks in succession without typing
    a new command each time:


    ```

    # equivalent

    command1; command2; command3

    ```


    # 3.6.2 Conditional Command Execution


    Each command returns a normally invisible error code. 0 means that no error has
    occurred. Any other value indicates an error or a negative result. The term “error”
    is actually too strong, depending on the context: For instance, if a condition
    formulated with the `test` command does not apply or if the `grep` filter command
    does not find the search term, the command is considered unsuccessfully executed
    and returns a return code not equal to 0.


    Bash allows you to make the execution of the second command dependent on the result
    of the first one. The first variant uses the character combination `&&`. It expresses
    that the second command should be executed only if the first one was successful.
    (Similarly, you can of course link three or more commands in this way.)


    ```

    # Run command 2 only if command 1 was successful

    command1 && command2

    ```


    Using `&&` makes sense, for example, when the first command runs a test (does
    the file exist?) and the second command should run only on a positive test result.


    Another example: You want to perform an update. First, you update the package
    sources (via `apt update` in Debian or Ubuntu). Not until this process succeeds
    without errors will the actual update be performed in the second step (`apt full-upgrade`).
    If, on the other hand, an error occurs during `apt update`, for example, because
    the internet disconnects for a moment, executing the second command is pointless.'
  - '[PAGE 64]


    ```

    # tests whether data.csv exists and then

    # returns a corresponding message from

    test -f data.csv && echo "data.csv exists"


    # Update package sources;

    # if successful, then perform the

    # actual update

    apt update && apt full-upgrade

    ```


    As an alternative to &&, you can also link two commands via ||. In that case,
    an inverse logic applies: Command 2 does not get executed until command 1 causes
    an error:


    ```

    # Execute command 2 only if command 1 fails

    command1 || command2

    ```


    Instead of && and ||, you can of course use if constructs, which I am going to
    introduce in Section 3.11 on branching. However, && and || allow you to formulate
    more compact code that is more similar to the style of traditional shell scripts.


    # 3.6.3 Running Commands in the Background


    Usually, the execution of a command blocks the terminal or the script. The subsequent
    command cannot be started until the preceding command is finished. What can help
    you in this case is `command &` to run a command in the background (i.e., asynchronously).

    The asynchronous execution of commands is rarely useful in scripts. Much more
    often, you''ll need % during interactive operation in the terminal. For example,
    you can use `command &` to start a program with a graphical user interface (GUI),
    such as the Firefox web browser, without blocking further input in the terminal.

    A process running in the background can be made a foreground process again using
    `fg`. Conversely, a time-consuming command can be interrupted via `Ctrl` + `Z`
    and then continued in the background using `bg`.


    # 3.6.4 Running Commands in a Subshell


    By placing multiple commands in parentheses, you can start a new shell process
    for their execution and run the commands there. This subshell can be created in
    a single line using `(c1; c2; c3)`. In scripts, you can place the brackets wherever
    you like:


    ```

    command1    # run in main shell

    (           # run the following commands in a subshell

    command2

    command3

    command4

    )

    command5    # in the main shell again

    ```'
- md: "Within the subshell, all previously defined variables are still available.\
    \ However, subshells have an advantage in that variables defined and changed within\
    \ a subshell only apply in that subshell and then lose their validity or resume\
    \ their previous value. Likewise, a directory changed by using `cd` is only valid\
    \ within the subshell. When the subshell ends, the previously valid directory\
    \ becomes active again.\n\nSubshells can be used to better structure the code.\
    \ When you run `exit` within a subshell, you only exit the subshell, not the script\
    \ running in the main shell.\n\n## 3.7 Standard Input and Standard Output\n\n\
    In Bash, there are three “channels” that use commands for input and output:\n\n\
    - **Standard output (stdout)**\n  Results of a command are directed to what’s\
    \ called the “standard output.” When you run `ls`, the result of this command\
    \ is the list of all files in the local directory. This result is output as text\
    \ and is typically displayed in the terminal.\n\n- **Error messages (standard\
    \ error = stderr)**\n  Usually, error messages are also displayed in the terminal.\
    \ Internally, however, error messages are routed to a different channel, resulting\
    \ in the possibility of treating normal output and error messages differently.\n\
    \n- **Standard input (stdin)**\n  Many commonly used commands process text files\
    \ whose name is passed as a parameter. If this specification is missing, the command\
    \ expects the text to be processed from the standard input. So, you must enter\
    \ text in the terminal, which the command then receives. To express that the input\
    \ is complete, press `Ctrl` + `D` in this case.\n\nAt first glance, the three\
    \ standard channels seem to be self-evident: Where else than in the terminal should\
    \ a command display its results, where else than by your input should a command\
    \ receive input?\n\n### 3.7.1 Redirecting Input and Output\n\nOne highlight of\
    \ Bash is its ability to redirect input and output. Using the `command > file`\
    \ call, you can save the result of a command in a text file. Caution: If the file\
    \ already exists, it will be overwritten.\n\nSimilarly, `command < file` reads\
    \ the data to be processed from a text file instead of waiting for terminal input.\
    \ Table 3.2 summarizes the syntax for some other variants. I will discuss heredoc\
    \ and herestring syntax in more detail in Section 3.10.\n\n| Command | Function\
    \ |\n| :--- | :--- |\n| `command > out.txt` | Saves the standard output to the\
    \ file |\n| `command >> out.txt` | Adds the output to the end of the file |\n\
    | `command 2> errors.txt` | Stores error messages in the file |\n| `command &>\
    \ all.txt` | Stores outputs and errors in the file |\n| `command >& all.txt` |\
    \ As above |\n| `command >&2` | Redirects the standard output to the error channel\
    \ |\n| `command < in.txt` | Processes the file |\n| `command << EOF` | Considers\
    \ all lines up to end of file (EOF) as standard input (heredoc) |\n| `command\
    \ <<< $var` | Considers the content of the variable as standard input (herestring)\
    \ |\n\nTable 3.2 Operators for Redirecting Input and Output\n\nIn the simplest\
    \ case, output redirection is used to store results permanently:\n\n```\nls >\
    \ filelist.txt\n```\n\nInput redirection is useful for interactive commands. For\
    \ example, the MySQL client `mysql` typically expects SQL commands to be entered.\
    \ In the following applications, these commands are read from a text file, for\
    \ example, to restore a database from a backup:\n\n```\nmysql < backup.sql\n```\n\
    \nThe `cat` command, which normally simply prints a text file to the screen, can\
    \ be used to create a new file (ending with a key combination to stop the input):\n\
    \n```\ncat > newfile.txt\nfirst input line\nsecond input line\n<Ctrl>+<D>\n```\n\
    \nBecause `cat` is missing the parameter with the file to be output, the command\
    \ expects interactive input at the terminal. This input is redirected to the `newfile.txt`\
    \ file. Using this trick, you can create small text files without launching an\
    \ editor.\n\n> **Caution**\n> However, you cannot read and write a file at the\
    \ same time. The `sort < file > file` command does not sort the contents of the\
    \ text file and then save the result, but instead deletes `file` because `> file`\
    \ is run first.\n\n> **Heredoc Syntax**\n> A special case of input redirection\
    \ is the heredoc syntax. I'll discuss this topic separately in Section 3.10.\n\
    \n### 3.7.2 The Pipe Operator\n\nWe are not quite done with input and output redirection\
    \ yet. Perhaps the coolest feature is still missing: By using `command1 | command2`,\
    \ `command1` produces a result. However, this result is not displayed but redirected\
    \ to `command2`. The pipe operator `|` thus makes the standard output of `command1`\
    \ the standard input of `command2`. The pipe operator can be applied multiple\
    \ times, each time passing the output of one command to the next command.\n\n\
    The pipe operator results in such a wide range of options for analyzing and processing\
    \ text files that I have dedicated Chapter 8 to this topic. At this point, a few\
    \ simple examples will have to suffice, which in this case refer to the Linux-specific\
    \ `/etc/passwd` file. This file contains information about all accounts of the\
    \ system. I will explain the `grep`, `cut`, `sort`, and `head` commands in more\
    \ detail in Chapter 8, Section 8.1.\n\n```\n# displays all lines from /etc/passwd\
    \ that contain 'nologin'\ngrep nologin /etc/passwd\n\n# extracts the first column\n\
    # with the account name from the resulting lines\ngrep nologin /etc/passwd | cut\
    \ -d ':' -f 1\n# sorts the names\ngrep nologin /etc/passwd | cut -d ':' -f 1 |\
    \ sort\n\n# and displays the first five results\ngrep nologin /etc/passwd | cut\
    \ -d ':' -f 1 | sort | head -n 5\n```\n\n### 3.7.3 Redirecting and Displaying\
    \ Outputs at the Same Time\n\nThe `tee` command duplicates the standard input,\
    \ displays it in the standard output, *and* redirects it to a file. Thus, using\
    \ the following command, the result of `command` is displayed in the terminal\
    \ *and* stored in the `out.txt` file.\n\n```\ncommand | tee out.txt\n```\n\n##\
    \ 3.8 Globbing, Brace Extension, and Handling File and Directory Names\n\nWhat\
    \ happens if you pass `*.txt` or `directory??/*.pdf` to a command because you\
    \ want to process all text files or all PDF files in a couple of subdirectories?\
    \ The term \"globbing\" describes the mechanisms Bash provides for such tasks.\
    \ Table 3.3 summarizes the meaning of Bash’s “wildcard characters.” (These characters\
    \ are a simplified variant of the “regular expressions” that you’ll get to know\
    \ in Chapter 9.)\n\n| Character | Meaning |\n|---|---|\n| ? | Any character |\n\
    | * | Any number (also zero) of any characters |\n| ** | Recursive globbing (globstar)\
    \ |\n| [aeiou] | One of the specified characters |\n| [a-z] | Character range\
    \ |\n| [a-zäöüß] | All lowercase letters (in German) |\n| [A-Fa-f0-9] | One hexadecimal\
    \ digit |\n| [!a-f] | None of the characters from a to f |\n| [^a-f] | None of\
    \ the characters from a to f |\n\n**Table 3.3 Globbing Characters**\n\nWhat is\
    \ crucial about these wildcards is that globbing is the responsibility of Bash\
    \ and not of the respective command. So, for example, if you run `cp *.jpg some/directory/`\
    \ to copy some images to a subdirectory, Bash—not the `cp` command—determines\
    \ the list of files to copy. This situation makes sense because otherwise almost\
    \ every command would need corresponding code. But because Bash is responsible,\
    \ the analysis of characters like `*` or `?` is done centrally and always according\
    \ to the same rules: Bash first analyzes all globbing characters, matches them\
    \ with the filenames in the current directory, and then passes the completed list\
    \ of parameters to the relevant command. `cp` thus never sees `*.jpg`, only the\
    \ completed list of filenames, such as `img_1.jpg`, `img_2.jpg`, and `img_3.jpg`.\n\
    \nIf you’re unsure about which filename list is returned by a globbing expression,\
    \ you should run `echo <expression>`, for example:\n\n```\necho img_*.raw\nimg_23433.raw\
    \ img_23434.raw img_23435.raw\n```\n\nZsh is even more convenient in this respect:\
    \ There, you can simply press `Tab` to replace the globbing expression with the\
    \ filenames that match in the current directory.\n\nIf you want to prevent globbing,\
    \ you should put the character combination in simple quotation marks. Perhaps\
    \ you have created a file whose filename is `???`. (Not a good idea, but an allowed\
    \ filename.) To delete this file, run `rm '???'`."
  mdcn: "在子shell中，所有先前定义的变量仍然可用。然而，子shell有一个优势：在子shell内定义和更改的变量仅在该子shell内有效，之后会失效或恢复其先前的值。同样，使用`cd`更改的目录也仅在子shell内有效。当子shell结束时，先前有效的目录会再次生效。\n\
    \n子shell可用于更好地组织代码。当你在子shell内运行`exit`时，你只是退出了子shell，而不是运行在主shell中的脚本。\n\n## 3.7\
    \ 标准输入与标准输出\n\n在Bash中，有三个用于输入和输出的“通道”：\n\n- **标准输出（stdout）**\n  命令的结果被导向所谓的“标准输出”。当你运行`ls`时，该命令的结果是本地目录中所有文件的列表。此结果以文本形式输出，通常显示在终端中。\n\
    \n- **错误消息（标准错误 = stderr）**\n  通常，错误消息也会显示在终端中。然而，在内部，错误消息被路由到不同的通道，从而可以区别处理正常输出和错误消息。\n\
    \n- **标准输入（stdin）**\n  许多常用命令处理文本文件，其文件名作为参数传递。如果缺少此规范，命令则期望从标准输入处理文本。因此，你必须在终端中输入文本，然后命令接收这些文本。要表示输入完成，在这种情况下按`Ctrl`\
    \ + `D`。\n\n乍一看，这三个标准通道似乎是不言而喻的：命令的结果除了显示在终端中还能显示在哪里？命令除了通过你的输入还能从哪里接收输入？\n\n\
    ### 3.7.1 重定向输入与输出\n\nBash的一个亮点是其重定向输入和输出的能力。使用`command > file`调用，你可以将命令的结果保存到文本文件中。注意：如果文件已存在，它将被覆盖。\n\
    \n类似地，`command < file`从文本文件读取要处理的数据，而不是等待终端输入。表3.2总结了其他一些变体的语法。我将在第3.10节更详细地讨论heredoc和herestring语法。\n\
    \n| 命令 | 功能 |\n| :--- | :--- |\n| `command > out.txt` | 将标准输出保存到文件 |\n| `command\
    \ >> out.txt` | 将输出追加到文件末尾 |\n| `command 2> errors.txt` | 将错误消息存储到文件 |\n| `command\
    \ &> all.txt` | 将输出和错误存储到文件 |\n| `command >& all.txt` | 同上 |\n| `command >&2`\
    \ | 将标准输出重定向到错误通道 |\n| `command < in.txt` | 处理文件 |\n| `command << EOF` | 将直到文件结束符（EOF）的所有行视为标准输入（heredoc）\
    \ |\n| `command <<< $var` | 将变量的内容视为标准输入（herestring） |\n\n表3.2 用于重定向输入和输出的运算符\n\
    \n在最简单的情况下，输出重定向用于永久存储结果：\n\n```\nls > filelist.txt\n```\n\n输入重定向对于交互式命令很有用。例如，MySQL客户端`mysql`通常期望输入SQL命令。在以下应用中，这些命令从文本文件中读取，例如，从备份恢复数据库：\n\
    \n```\nmysql < backup.sql\n```\n\n`cat`命令通常只是将文本文件打印到屏幕，但可用于创建新文件（以按键组合结束输入）：\n\
    \n```\ncat > newfile.txt\nfirst input line\nsecond input line\n<Ctrl>+<D>\n```\n\
    \n因为`cat`缺少要输出的文件的参数，所以该命令期望在终端进行交互式输入。此输入被重定向到`newfile.txt`文件。使用这个技巧，你可以在不启动编辑器的情况下创建小型文本文件。\n\
    \n> **注意**\n> 然而，你不能同时读写一个文件。`sort < file > file`命令不会对文本文件的内容进行排序然后保存结果，而是会删除`file`，因为`>\
    \ file`会先执行。\n\n> **Heredoc语法**\n> 输入重定向的一个特殊情况是heredoc语法。我将在第3.10节单独讨论这个主题。\n\
    \n### 3.7.2 管道运算符\n\n关于输入和输出重定向，我们还没有完全讲完。也许最酷的功能还没有出现：通过使用`command1 | command2`，`command1`产生一个结果。然而，这个结果不会被显示，而是被重定向到`command2`。因此，管道运算符`|`使`command1`的标准输出成为`command2`的标准输入。管道运算符可以多次应用，每次将一个命令的输出传递给下一个命令。\n\
    \n管道运算符为分析和处理文本文件提供了如此广泛的选项，以至于我专门用第8章来讨论这个主题。在此，几个简单的例子就足够了，这些例子指的是特定于Linux的`/etc/passwd`文件。该文件包含有关系统所有账户的信息。我将在第8章第8.1节更详细地解释`grep`、`cut`、`sort`和`head`命令。\n\
    \n```\n# 显示 /etc/passwd 中所有包含 'nologin' 的行\ngrep nologin /etc/passwd\n\n# 从结果行中提取第一列\n\
    # 即账户名\ngrep nologin /etc/passwd | cut -d ':' -f 1\n# 对名称进行排序\ngrep nologin /etc/passwd\
    \ | cut -d ':' -f 1 | sort\n\n# 并显示前五个结果\ngrep nologin /etc/passwd | cut -d ':'\
    \ -f 1 | sort | head -n 5\n```\n\n### 3.7.3 同时重定向和显示输出\n\n`tee`命令复制标准输入，在标准输出中显示它，*并且*将其重定向到一个文件。因此，使用以下命令，`command`的结果会在终端中显示*并且*存储在`out.txt`文件中。\n\
    \n```\ncommand | tee out.txt\n```\n\n## 3.8 通配符、花括号扩展以及处理文件和目录名称\n\n如果你因为想要处理所有文本文件或几个子目录中的所有PDF文件，而向命令传递`*.txt`或`directory??/*.pdf`，会发生什么？术语“通配符”描述了Bash为此类任务提供的机制。表3.3总结了Bash“通配符”的含义。（这些字符是第9章将介绍的“正则表达式”的简化变体。）\n\
    \n| 字符 | 含义 |\n|---|---|\n| ? | 任意单个字符 |\n| * | 任意数量（包括零个）的任意字符 |\n| ** | 递归通配符（globstar）\
    \ |\n| [aeiou] | 指定字符中的一个 |\n| [a-z] | 字符范围 |\n| [a-zäöüß] | 所有小写字母（德语） |\n| [A-Fa-f0-9]\
    \ | 一个十六进制数字 |\n| [!a-f] | 不是a到f中的任何字符 |\n| [^a-f] | 不是a到f中的任何字符 |\n\n**表3.3 通配符字符**\n\
    \n关于这些通配符的关键点在于，通配是Bash的责任，而不是相应命令的责任。因此，例如，如果你运行`cp *.jpg some/directory/`将一些图像复制到子目录，是Bash——而不是`cp`命令——确定要复制的文件列表。这种情况是有意义的，因为否则几乎每个命令都需要相应的代码。但由于Bash负责，对`*`或`?`等字符的分析是集中进行的，并且总是遵循相同的规则：Bash首先分析所有通配符，将它们与当前目录中的文件名匹配，然后将完成的参数列表传递给相关命令。因此，`cp`永远不会看到`*.jpg`，只看到完成的文件名列表，例如`img_1.jpg`、`img_2.jpg`和`img_3.jpg`。\n\
    \n如果你不确定通配符表达式返回哪个文件名列表，你应该运行`echo <expression>`，例如：\n\n```\necho img_*.raw\n\
    img_23433.raw img_23434.raw img_23435.raw\n```\n\nZsh在这方面甚至更方便：在那里，你只需按`Tab`键，就可以用当前目录中匹配的文件名替换通配符表达式。\n\
    \n如果你想防止通配，你应该将字符组合放在单引号中。也许你创建了一个文件名是`???`的文件。（不是个好主意，但允许的文件名。）要删除此文件，请运行`rm\
    \ '???'`。"
