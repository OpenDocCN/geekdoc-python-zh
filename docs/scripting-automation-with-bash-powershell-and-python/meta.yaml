  md: 'exists, it will be overwritten. Within PowerShell, you can view the contents
    of the file using `Get-Content`:


    ```

    > Get-ChildItem > files.txt

    > Get-Content files.txt

    ...

    ```


    Instead of overwriting an existing file, you can add the text outputs at the end.
    For this task, you must use the `>>` operator instead of the `>` operator.


    The `>` and `>>` operators only affect the success stream. All other streams can
    be redirected with `2>` to `6>` if necessary. (When you redirect streams 3 through
    6, the `Preference` variables remain valid. If `SilentlyContinue` is set, nothing
    will be saved in the specified file because the output will be suppressed.)


    Instead of redirecting the streams to separate files, you can merge streams 2
    through 6 with the success stream and then redirect that stream to one file. The
    following command first adds the error stream to the success stream. The outputs
    of both streams are then stored in the `out.txt` file.


    ```

    > Do-Something 2>&1 > out.txt

    ```


    Finally, using `*>`, you can redirect all streams to a common file.


    | Operator | Function |

    | :--- | :--- |

    | `>` | Redirect success stream to a file |

    | `>>` | Add success stream to a file |

    | `2>` through `6>` | Redirect streams 2 through 6 to a file |

    | `2>>` through `6>>` | Add streams 2 through 6 to a file |

    | `2>&1` through `6>&1` | Merge streams 2 through 6 with success stream |

    | `*>` | Redirect all streams to one file |

    | `2>&1 >>` | Merge streams 1 and 2 and then add them to a file |


    **Table 4.8** Operators for Input and Output Redirection


    > **Write-Host versus Write-Output**


    The `Write-Host` command executes output directly in the terminal (on the “host”).
    At first glance, the result looks like the result of `Write-Output`.


    The crucial difference is that no redirection is possible for these outputs. With
    `Write-Host`, your scripts lose flexibility. The users of your scripts cannot
    simply redirect their output to a file. Use `Write-Output`!'
