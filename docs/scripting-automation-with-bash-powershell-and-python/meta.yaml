    is that Python distinguishes between mutable and immutable data types—technically
    speaking, it distinguishes between mutable and immutable types. Numbers, strings,
    and tuples are *immutable*; that is, it is impossible to change them. Instead,
    every time an expression results in new data, a new object is created as well!


    If you first execute `x=10` and then `x=x+1`, Python first creates an object with
    the number 10, and then, `x` references this object. The `x+1` calculation yields
    the number 11. For this'
