    \ large PDF files linked there to the cloud. Thus, the website should continue\
    \ to be operated with its own server. However, when visitors click on a PDF download\
    \ link, that file is should be downloaded from AWS S3. In this way, you can continue\
    \ to manage the website yourself, while at the same time minimizing the load on\
    \ your web server caused by large downloads.\n\nThe *migrate-pdf-to-aws.ps1* script\
    \ works in the following way:\n\n+   ■ It downloads the HTML code of a web page.\n\
    ■ It searches all links for those ending with `.pdf`.\n■ It first downloads the\
    \ PDF documents to a temporary directory and then uploads them to a public AWS\
    \ S3 bucket.\n■ In the HTML code, the links are adjusted, and a new version of\
    \ the HTML page is saved locally."
  merge: -1
