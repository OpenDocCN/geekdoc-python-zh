  md: "The documentation for the `csv` module recommends opening the CSV file with\
    \ the `newline=''` option to avoid possible problems with the end of line (EOL)\
    \ characters on Windows (i.e., `\\r\\n`). When opening the CSV reader, you can\
    \ use the `delimiter` and `quotechar` options to specify which characters identify\
    \ columns and strings, respectively. Then, you can use the reader to read the\
    \ CSV file line by line in a loop. In each case, the loop variable contains a\
    \ list with the columns of this line. The first line with the column label is\
    \ skipped due to `next`.\n\nTo calculate the total population of the earth, the\
    \ population values in the third column are converted to numbers and then totaled.\
    \ `replace` eliminates the commas used to separate thousands.\n\n# 8.5.2 Processing\
    \ CSV Files in PowerShell\n\nIn PowerShell, you can use `Import-Csv` to read CSV\
    \ files. By default, `Import-Csv` expects that columns are separated by commas.\
    \ You can use `-Delimiter` to set another character if required. Strings that\
    \ are enclosed in double quotes are processed correctly. However, you cannot set\
    \ another character to identify strings.\n\nAs a result, the cmdlet returns `PSCustomObject`\
    \ objects whose properties are taken from the column labels of the CSV file. If\
    \ the CSV file does not have a column label row, you must specify the names of\
    \ the columns using the `-Header` option, for example, in the following way:\n\
    \n```\n> Import-Csv -Header colA, colB, colC file.csv\n```\n\nMake sure that you\
    \ don't name too few columns with `-Header`: Only as many columns will be processed\
    \ as you specify names!\n\nTo determine the earth population from `2023_population.csv`\
    \ as in the previous example, you can proceed with the following code:\n\n```\n\
    # Sample file analyze-population.ps1\n$population = Import-CSV \"2023_population.csv\"\
    \n$total = 0\n$population | ForEach-Object {\n    $total += [long]($_.'2023_last_updated'.Replace(',',\
    \ ''))\n}\nWrite-Output \"World population: $total\"\n```\n\nWithin the loop,\
    \ the commas are removed in the string of the `2023_last_updated` property. `[long]`\
    \ converts the string into a number.\n\nInstead of performing the totaling yourself,\
    \ you can also calculate the result via `Measure-Object`. However, because of\
    \ the required conversion of the `2023_last_updated` column to a number, the resulting\
    \ code is not shorter or more efficient:"
