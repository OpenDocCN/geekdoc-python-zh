    \  <country code=\"DZ\" iso=\"12\">Algeria</country>\n  ...\n</countries>\n```\n\
    \nThe goal of the following script is to create a dictionary and, in doing so,\
    \ to use the country codes as keys:\n\n```\n# Sample file read-countries.py\n\
    import xml.etree.ElementTree as ET\nroot = ET.parse('countries.xml').getroot()\n\
