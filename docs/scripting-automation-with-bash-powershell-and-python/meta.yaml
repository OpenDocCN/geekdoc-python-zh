    If the data you want to pass to a function is in a list, tuple, or other enumerable
    data structure, the `function(*list)` notation is also allowed when calling the
    function. In this way, the elements of the list will be automatically distributed
    among the parameters:


    ```

    l = [1, 2, 3, 4, 5, 6]

    f(*l)                # Output 1 2 (3, 4, 5, 6)

    ```


    # 5.13.5 Lambda Functions


    You can use custom functions for two reasons: on the one hand, to break complex
    code into manageable chunks or, on the other hand, because you want to perform
    a particular task in different places in the code and thus avoid redundant code.
    Sometimes, however, you need a third variant.


    At *one* point in the code—for example, in a `map` statement, in a `filter` statement,
    or for formulating a callback function—you need a function that is often quite
    simple. The conventional way to create temporary functions is then cumbersome:
    You must first define the function using `def`, then use that function only once.


    In such cases, lambda functions represent an alternative that saves space and
    that, above all, is much clearer: The function can be defined ad hoc and at the
    same time used immediately at this point in the code. As these functions are not
    assigned any name at all, lambda functions are also referred to as *anonymous
    functions*.


    The following line contains the syntax for defining a lambda function. The `lambda`
    keyword is first followed by the parameters of the function and, after a colon,
    by the function expression. A major limitation compared to other functions is
    that lambda functions can only consist of a single expression.


    ```

    lambda var1, var2, var3, ...: expression

    ```


    The following mini program demonstrates the use of two lambda functions: The first
    lambda expression recognizes numbers that are divisible by 3 and uses this criterion
    to include elements in `lst2`. The second lambda expression is applied to all
    elements of `lst2` to divide integers by 3. The resulting list ends up in `lst3`.


    ```

    lst1 = [1, 2, 3, 9, 345, 36, 33]

    # lst2 contains all elements of lst1 divisible by 3

    lst2 = list(filter(lambda x: x % 3 == 0, lst1))

    print(lst2)    # Output [3, 9, 345, 36, 33]

    # divide all elements of lst2 by 3

    lst3 = list(map(lambda x: x // 3, lst2))

    print(lst3)    # Output [1, 3, 115, 12, 11]

    ```'
- md: "## 5.14 Processing Text Files\n\nBefore you can read or write a text file,\
    \ you must open the file via `open`. Then, you can pass the filename in the first\
    \ parameter and the access mode in the second. With the additional letter `b`,\
    \ you can also process binary files, but we won't cover this topic here.\n\n|\
    \ Mode | Meaning |\n| :--- | :--- |\n| 'r' | Read file (applies by default) |\n\
    | 'w' | Write file (existing files will be overwritten!) |\n| 'a' | Write to the\
    \ end of an existing file (*append*) |\n| 'r+' | Read and write file |\n\nTable\
    \ 5.9 Access Modes of the Open Method\n\n`open` returns a `file` object, which\
    \ can then be processed with various methods. `close()` terminates access to the\
    \ file and releases it again for other programs. In short scripts, you can do\
    \ without `close()` because, at the end of the program, all open files will be\
    \ closed anyway.\n\n| Method | Meaning |\n| :--- | :--- |\n| `s = f.read()` |\
    \ Reads the entire file |\n| `s = f.read(n)` | Reads `n` bytes and returns them\
    \ as a string |\n| `s = f.readline()` | Reads one line of the file |\n| `f.write(s)`\
    \ | Writes the string `s` to the file |\n| `n = f.tell()` | Indicates the current\
    \ read/write position |\n| `f.seek(n, offset)` | Changes the read/write position\
    \ |\n| `close()` | Closes the file |\n\nTable 5.10 Important Methods for File\
    \ Objects\n\n`readline()` always returns the EOL character of each line (i.e.,\
    \ `\\n` on macOS and Linux). However, often, this EOL character is undesirable.\
    \ If necessary, `line.rstrip()` eliminates the whitespace (i.e., any blank, tab,\
    \ and newline) at the EOL.\n\nWhen the EOF is reached, `readline()` returns an\
    \ empty string. Since empty lines *within* a file consist at least of `\\n`, no\
    \ ambiguity can arise about when the EOF is reached.\n\nIf the structure of your\
    \ code allows it, you should formulate the entire code for processing a file using\
    \ `with open() as f:`. This approach ensures that the file will automatically\
    \ be closed when an error occurs or when the current code block (e.g., a function)\
    \ is exited. Thus, you don't need to worry about `close` at all. (`with` also\
    \ works for other Python objects that should be closed after they are used, for\
    \ instance, for network and database connections.)\n\n```\n# Read and output text\
    \ file line by line\nwith open('readme.txt') as f:\n    for line in f:\n     \
    \   print(line, end='')\n```\n\nWhen writing text files, don't forget to include\
    \ `\\n` in the strings you want to output because `write()` doesn't care about\
    \ line endings! Note also that, unlike `print`, `write` expects only one parameter,\
    \ and this parameter must really be a string. If you want to save numbers or other\
    \ data in the text file, you must first convert them into strings.\n\n```\n# writes\
    \ 'line 1' to 'line 10' into a text file\nwith open('result.txt', 'w') as out:\n\
    \    for i in range(1, 11):\n        out.write('Line %d\\n' % i)\n```\n\n## 5.14.1\
    \ Example: Analyzing a CSV File\n\nThe starting point for our next example is\
    \ the `employees.csv` file, which contains fictitious company data:\n\n```\nemp_no,first_name,last_name,birth_date,salary,hire_date\n\
    87461,Moni,Decaestecker,1952-02-01,67914,1989-05-31\n237571,Ronghao,Schaad,1952-02-01,59355,1994-06-14\n\
    406121,Supot,Remmele,1952-02-01,76470,1989-01-27\n91374,Eishiro,Kuzuoka,1952-02-01,42250,1999-07-08\n\
    ...\n```\n\nThe first goal of our script is to display the first name, last name,\
    \ and date of birth for each employee neatly formatted on the screen:\n\n```\n\
    first_name          last_name           birth_date\nMoni                Decaestecker\
    \        1952-02-01\nRonghao             Schaad              1952-02-01\nSupot\
    \               Remmele             1952-02-01\n```\n\nFour lines of code are\
    \ sufficient for this goal:\n\n```\n# Sample file employees.py\nwith open('employees.csv',\
    \ 'r') as f:\n    for line in f:\n        columns = line.split(',')\n        print('%-20s\
    \ %-20s %s' % tuple(columns[1:4]))\n```\n\nThe loop reads each line of the file.\
    \ `split` divides the line into its columns (it returns a list, with each element\
    \ representing one column). Note that the last column contains `\\n` because the\
    \ `for` loop includes the newline characters. `columns[1:4]` extracts the columns\
    \ 2 to 4. (Remember, the count starts at 0!) `tuple` turns the list into a tuple,\
    \ as is expected by the `%` format operator.\n\n## 5.14.2 Example: Creating SQL\
    \ Commands\n\nThe second task is a bit more demanding: The employees must be stored\
    \ in the `employees` table. The following script is supposed to create the required\
    \ SQL commands and save them in a new file named `employees.sql`, where the column\
    \ names of the CSV file match those of the table:\n\n```\nINSERT INTO employees\
    \ (emp_no, first_name, last_name,\n                    birth_date, salary, hire_date)\n\
    VALUES ('87461', 'Moni', 'Decaestecker', '1952-02-01',\n        '67914', '1989-05-31');\n\
    INSERT INTO ...\n```\n\nThe code is not much longer, but a bit more complex. `with`\
    \ opens two files in this case: one for reading and one for writing. The first\
    \ line contains the column names and could be copied unchanged. Only for cosmetic\
    \ reasons will a space be inserted after each comma (`replace`), and also the\
    \ newline character is removed at the EOL.\n\nIn the `for` loop, all further lines\
    \ are read and `split` into columns. Each element of the list in `data` will then\
    \ be enclosed in quotes and reassembled into the `values` string. The output to\
    \ the SQL file is performed using `write`.\n\n```\n# Sample file employees.py\n\
    sqlcmd = 'INSERT INTO employees (%s)\\nVALUES (%s);\\n'\nwith open('employees.csv',\
    \ 'r') as csv, \\\n    open('employees.sql', 'w') as sql:\n\n    # Read column\
    \ names from the first line\n    columnnames = csv.readline().rstrip().replace(',',\
    \ ', ')\n\n    # loop through all other lines\n    for line in csv:\n        columns\
    \ = line.rstrip().split(',')\n        # Put columns in quotes\n        data =\
    \ ['\"' + c + '\"' for c in columns]\n        # join the list in data to a string\n\
    \        values = ', '.join(data)\n        # Output in the SQL file\n        sql.write(sqlcmd\
    \ % (columnnames, values))\n```\n\n## 5.15 Error Protection\n\nWhen errors occur,\
    \ like many modern programming languages, Python throws an exception. If your\
    \ program does not provide protection against such exceptions, you'll end up with\
    \ a nasty error message. You can avoid this if you secure your code by using try/except.\n\
    \n### 5.15.1 try/except\n\nThe syntax for try/except is simple:\n\n```\ntry:\n\
    \    # error prone code\nexcept someError:\n    # response to a specific error\n\
    except:\n    # response to all other errors\nfinally:\n    # is always executed\n\
    ```\n\nNote that try must be followed by at least one except or finally block.\
    \ All other parts of the try construct are optional. When an error occurs, Python\
    \ looks for the first except statement that applies to the error. Using except\
    \ without an error name is considered the default statement that applies to any\
    \ type of error.\n\nIf an applicable except block exists, the code specified there\
    \ will be executed. Then, the error is considered to be resolved. The program\
    \ continues below the try construct.\n\nCode within the finally block is always\
    \ executed, even if the try construct is in a loop or function that you terminate\
    \ prematurely using break or return. finally is the right place for cleaning up.\n\
    \nIf you formulate the except statement as except xxxError as e, then e contains\
    \ an exception object. In its evaluation, e.args is of particular interest as\
    \ it will give you a tuple with all the parameters that were passed when the error\
    \ was triggered. When an exception object is converted to a string—either explicitly\
    \ via str(e) or implicitly in the print function—the contents of args are automatically\
    \ converted to a string.\n\n```\ntry:\n    n = 1 / 0\nexcept ZeroDivisionError\
    \ as e:\n    print(e)  # Output: 'division by zero'\n```\n\n## 5.16 System Functions\n\
    \nThis section focuses on some basic system functions, many of which are located\
    \ in the sys module, which must be included via import. Simply enter the following\
    \ command:\n\n```\nimport sys\n```\n\n### 5.16.1 Access to the Program Parameters\n\
    \nsys.argv contains the list of all parameters passed to a Python script. You\
    \ must note that the first list element contains the program name, which you usually\
    \ do not want to evaluate. The easiest way to access the remaining elements is\
    \ then via sys.argv[1:].\n\n### 5.16.2 Access to Standard Input and Standard Output\n\
    \nsys.stdin and sys.stdout contain file objects that you can use to output data\
    \ to standard output or read data from standard input. The same functions are\
    \ available as for ordinary files (Section 5.14). Error and logging messages are\
    \ best sent to sys.stderr.\n\n### 5.16.3 Exiting a Program\n\nUsually, a Python\
    \ program ends with the execution of the last statement or when an unhandled error\
    \ occurs. If you want to terminate a program prematurely, you must run sys.exit().\
    \ With sys.exit(n), you can also return an error code, the meaning of which is\
    \ the same as in Bash scripts. Alternatively, you can pass a string to the exit\
    \ method, which is then displayed as an error message. In this case, 1 is automatically\
    \ applied as the error code.\n\n> **exit Produces an Exception!**\nNote that,\
    \ internally, the exit method throws a SystemExit exception. The end of the program\
    \ can therefore be prevented by try/except.\n\n### 5.16.4 Calling Linux Commands\n\
    \nBy using subprocess.run, you can execute another program or command from within\
    \ a Python script. In the simplest case, you can pass a list with the command\
    \ name and its options to run. The following lines call the ls command with the\
    \ -l option, which displays details about the files in the current directory.\
    \ run returns an object of the CompletedProcess class as a result (see Table 5.11).\n\
    \n```\nimport subprocess\nresult = subprocess.run(['ls', '-l'])\n```\n\n| Property\
    \ | Meaning |\n|---|---|\n| args | The executed command as a string or list |\n\
    | returncode | The return code (0 = OK; otherwise, error) |\n| stdout | Standard\
    \ output of the command |\n| stderr | Error messages of the command |\n\nTable\
    \ 5.11 Properties of an Object of the CompletedProcess Type"
  mdcn: "## 5.14 处理文本文件\n\n在读取或写入文本文件之前，你必须通过 `open` 打开文件。然后，你可以在第一个参数中传入文件名，在第二个参数中传入访问模式。通过附加字母\
    \ `b`，你也可以处理二进制文件，但这里我们不讨论这个主题。\n\n| 模式 | 含义 |\n| :--- | :--- |\n| 'r' | 读取文件（默认模式）\
    \ |\n| 'w' | 写入文件（现有文件将被覆盖！） |\n| 'a' | 写入到现有文件的末尾（*追加*） |\n| 'r+' | 读写文件 |\n\n\
    表 5.9 open 方法的访问模式\n\n`open` 返回一个 `file` 对象，然后可以使用各种方法对其进行处理。`close()` 终止对文件的访问并释放它，以便其他程序使用。在简短的脚本中，你可以省略\
    \ `close()`，因为在程序结束时，所有打开的文件无论如何都会被关闭。\n\n| 方法 | 含义 |\n| :--- | :--- |\n| `s =\
    \ f.read()` | 读取整个文件 |\n| `s = f.read(n)` | 读取 `n` 个字节并将其作为字符串返回 |\n| `s = f.readline()`\
    \ | 读取文件的一行 |\n| `f.write(s)` | 将字符串 `s` 写入文件 |\n| `n = f.tell()` | 指示当前读/写位置\
    \ |\n| `f.seek(n, offset)` | 更改读/写位置 |\n| `close()` | 关闭文件 |\n\n表 5.10 文件对象的重要方法\n\
    \n`readline()` 总是返回每行的行尾字符（即，在 macOS 和 Linux 上是 `\\n`）。然而，通常这个行尾字符是不需要的。如果需要，`line.rstrip()`\
    \ 可以消除行尾的空白字符（即，任何空格、制表符和换行符）。\n\n当到达文件末尾（EOF）时，`readline()` 返回一个空字符串。由于文件*内部*的空行至少包含一个\
    \ `\\n`，因此不会对何时到达 EOF 产生歧义。\n\n如果你的代码结构允许，你应该使用 `with open() as f:` 来编写处理文件的整个代码。这种方法确保在发生错误或退出当前代码块（例如，函数）时，文件将自动关闭。因此，你完全不需要担心\
    \ `close`。（`with` 也适用于其他应在使用后关闭的 Python 对象，例如网络和数据库连接。）\n\n```\n# 逐行读取并输出文本文件\n\
    with open('readme.txt') as f:\n    for line in f:\n        print(line, end='')\n\
    ```\n\n写入文本文件时，不要忘记在要输出的字符串中包含 `\\n`，因为 `write()` 不关心行尾！还要注意，与 `print` 不同，`write`\
    \ 只接受一个参数，并且这个参数必须是一个字符串。如果你想在文本文件中保存数字或其他数据，必须先将它们转换为字符串。\n\n```\n# 将 'line 1'\
    \ 到 'line 10' 写入文本文件\nwith open('result.txt', 'w') as out:\n    for i in range(1,\
    \ 11):\n        out.write('Line %d\\n' % i)\n```\n\n## 5.14.1 示例：分析 CSV 文件\n\n\
    我们下一个示例的起点是 `employees.csv` 文件，其中包含虚构的公司数据：\n\n```\nemp_no,first_name,last_name,birth_date,salary,hire_date\n\
    87461,Moni,Decaestecker,1952-02-01,67914,1989-05-31\n237571,Ronghao,Schaad,1952-02-01,59355,1994-06-14\n\
    406121,Supot,Remmele,1952-02-01,76470,1989-01-27\n91374,Eishiro,Kuzuoka,1952-02-01,42250,1999-07-08\n\
    ...\n```\n\n我们脚本的第一个目标是在屏幕上整齐地显示每位员工的名字、姓氏和出生日期：\n\n```\nfirst_name          last_name\
    \           birth_date\nMoni                Decaestecker        1952-02-01\nRonghao\
    \             Schaad              1952-02-01\nSupot               Remmele    \
    \         1952-02-01\n```\n\n四行代码就足以实现这个目标：\n\n```\n# 示例文件 employees.py\nwith\
    \ open('employees.csv', 'r') as f:\n    for line in f:\n        columns = line.split(',')\n\
    \        print('%-20s %-20s %s' % tuple(columns[1:4]))\n```\n\n循环读取文件的每一行。`split`\
    \ 将行分割成列（它返回一个列表，每个元素代表一列）。请注意，最后一列包含 `\\n`，因为 `for` 循环包含了换行符。`columns[1:4]` 提取第\
    \ 2 到第 4 列。（记住，计数从 0 开始！）`tuple` 将列表转换为元组，这是 `%` 格式化运算符所期望的。\n\n## 5.14.2 示例：创建\
    \ SQL 命令\n\n第二个任务要求更高：员工必须存储在 `employees` 表中。以下脚本旨在创建所需的 SQL 命令并将其保存到名为 `employees.sql`\
    \ 的新文件中，其中 CSV 文件的列名与表的列名匹配：\n\n```\nINSERT INTO employees (emp_no, first_name,\
    \ last_name,\n                    birth_date, salary, hire_date)\nVALUES ('87461',\
    \ 'Moni', 'Decaestecker', '1952-02-01',\n        '67914', '1989-05-31');\nINSERT\
    \ INTO ...\n```\n\n代码并不长多少，但稍微复杂一些。`with` 在这种情况下打开两个文件：一个用于读取，一个用于写入。第一行包含列名，可以原样复制。只是为了美观，在每个逗号后插入一个空格（`replace`），并且在行尾移除换行符。\n\
    \n在 `for` 循环中，读取所有后续行并 `split` 成列。然后，`data` 列表中的每个元素将被加上引号并重新组装成 `values` 字符串。输出到\
    \ SQL 文件是使用 `write` 执行的。\n\n```\n# 示例文件 employees.py\nsqlcmd = 'INSERT INTO employees\
    \ (%s)\\nVALUES (%s);\\n'\nwith open('employees.csv', 'r') as csv, \\\n    open('employees.sql',\
    \ 'w') as sql:\n\n    # 从第一行读取列名\n    columnnames = csv.readline().rstrip().replace(',',\
    \ ', ')\n\n    # 遍历所有其他行\n    for line in csv:\n        columns = line.rstrip().split(',')\n\
    \        # 将列名加上引号\n        data = ['\"' + c + '\"' for c in columns]\n      \
    \  # 将 data 中的列表连接成字符串\n        values = ', '.join(data)\n        # 输出到 SQL 文件\n\
    \        sql.write(sqlcmd % (columnnames, values))\n```\n\n## 5.15 错误保护\n\n当错误发生时，像许多现代编程语言一样，Python\
    \ 会抛出一个异常。如果你的程序没有提供针对此类异常的保护，你最终会得到一个讨厌的错误消息。如果你通过使用 try/except 来保护你的代码，就可以避免这种情况。\n\
    \n### 5.15.1 try/except\n\ntry/except 的语法很简单：\n\n```\ntry:\n    # 可能出错的代码\nexcept\
    \ someError:\n    # 对特定错误的响应\nexcept:\n    # 对所有其他错误的响应\nfinally:\n    # 总是执行\n\
    ```\n\n请注意，try 后面必须至少跟一个 except 或 finally 块。try 结构的所有其他部分都是可选的。当发生错误时，Python 会查找第一个适用于该错误的\
    \ except 语句。使用不带错误名称的 except 被视为适用于任何类型错误的默认语句。\n\n如果存在适用的 except 块，则将执行其中指定的代码。然后，错误被视为已解决。程序在\
    \ try 结构下方继续执行。\n\nfinally 块中的代码总是被执行，即使 try 结构位于你使用 break 或 return 提前终止的循环或函数中。finally\
    \ 是进行清理工作的合适位置。\n\n如果你将 except 语句表述为 except xxxError as e，那么 e 包含一个异常对象。在对其求值时，e.args\
    \ 特别重要，因为它会给你一个元组，其中包含触发错误时传递的所有参数。当异常对象转换为字符串时——无论是通过 str(e) 显式转换还是在 print 函数中隐式转换——args\
    \ 的内容都会自动转换为字符串。\n\n```\ntry:\n    n = 1 / 0\nexcept ZeroDivisionError as e:\n\
    \    print(e)  # 输出：'division by zero'\n```\n\n## 5.16 系统函数\n\n本节重点介绍一些基本的系统函数，其中许多位于\
    \ sys 模块中，必须通过 import 包含。只需输入以下命令：\n\n```\nimport sys\n```\n\n### 5.16.1 访问程序参数\n\
    \nsys.argv 包含传递给 Python 脚本的所有参数的列表。你必须注意，第一个列表元素包含程序名，你通常不想对其进行求值。访问其余元素的最简单方法是通过\
    \ sys.argv[1:]。\n\n### 5.16.2 访问标准输入和标准输出\n\nsys.stdin 和 sys.stdout 包含文件对象，你可以使用它们将数据输出到标准输出或从标准输入读取数据。可用的函数与普通文件相同（第\
    \ 5.14 节）。错误和日志消息最好发送到 sys.stderr。\n\n### 5.16.3 退出程序\n\n通常，Python 程序在执行最后一条语句或发生未处理的错误时结束。如果你想提前终止程序，必须运行\
    \ sys.exit()。使用 sys.exit(n)，你还可以返回一个错误代码，其含义与 Bash 脚本中相同。或者，你可以向 exit 方法传递一个字符串，该字符串将作为错误消息显示。在这种情况下，错误代码自动应用为\
    \ 1。\n\n> **exit 会产生一个异常！**\n请注意，在内部，exit 方法会抛出一个 SystemExit 异常。因此，可以通过 try/except\
    \ 阻止程序结束。\n\n### 5.16.4 调用 Linux 命令\n\n通过使用 subprocess.run，你可以从 Python 脚本中执行另一个程序或命令。在最简单的情况下，你可以向\
    \ run 传递一个包含命令名称及其选项的列表。以下几行使用 -l 选项调用 ls 命令，该选项显示当前目录中文件的详细信息。run 返回一个 CompletedProcess\
    \ 类的对象作为结果（见表 5.11）。\n\n```\nimport subprocess\nresult = subprocess.run(['ls',\
    \ '-l'])\n```\n\n| 属性 | 含义 |\n|---|---|\n| args | 作为字符串或列表执行的命令 |\n| returncode\
    \ | 返回码（0 = 正常；否则，错误） |\n| stdout | 命令的标准输出 |\n| stderr | 命令的错误消息 |\n\n表 5.11\
    \ CompletedProcess 类型对象的属性"
