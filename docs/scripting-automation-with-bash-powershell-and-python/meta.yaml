    # Chapter 14

    Git


    Git is a version control system typically used when many people collaborate on
    a complex project. Thanks to Git, multiple branches of a program can then be managed,
    and changes can be tracked and reverted if necessary.

    At first glance, scripting and Git do not go together: Scripts are small files
    that are often created by just one developer. Version management with Git seems
    therefore superfluous.

    But this impression is not quite true. Scripting and Git can be combined wonderfully:


    +   - Git can document the development process for small script collections: It
    serves as a backup, and it helps distribute scripts across multiple target machines
    in a straightforward manner.

    - Some development operations can be automated by calling the `git` and `gh` commands
    in scripts.

    - Git can execute what are called *hooks* for certain operations. Hooks are scripts
    you create that, for example, perform basic testing before a commit or take care
    of deployment after a commit.


    > **Prerequisites for This Chapter**

    To get the most out of this chapter, you should already be familiar with SSH keys
    (see Chapter 12). Such keys are used for authentication in this chapter (for example,
    at GitHub or GitLab). As far as scripting examples go, this chapter is pretty
    Bash and Linux heavy.


    This chapter begins with a crash course on Git that shows you how to version and
    back up a directory with some scripts using Git. However, you should really consider
    this section only as a starter! For a complete guide to Git, see *Git: Project
    Management for Developers and DevOps Teams* by myself and Bernd Öggl (Rheinwerk
    Computing, 2023), which covers advanced topics, special cases, variants, and best
    practices.

    I will also describe how you can keep sensitive information in your scripts out
    of the Git repository. All too often, passwords to cloud services or FTP access
    are contained in scripts that have led to massive security breaches. This problem
    must be avoided at all costs.'
- md: '## 14.1 Git Crash Course


    This crash course is designed to help you get started with Git. If you already
    know Git, just scroll on to the next section!


    I will restrict myself to the absolute basics in this chapter: You won''t learn
    about branches or merge conflicts, let alone best practices for team deployment.
    The only authentication method I will describe is SSH. In short, this crash course
    could be called “Git for minimalists.” Nevertheless, the knowledge I impart should
    be sufficient to manage a collection of scripts using Git. To learn more about
    Git, you can find comprehensive documentation online including videos at https://git-scm.com/doc.
    And did I mention that there are also some pretty good books on Git?


    ## 14.1.1 Preparation Tasks


    First, you must install Git. On Linux, the best approach is to use the Git package
    of your distribution. If you run Debian or Ubuntu, `sudo apt install git` will
    do the job. For macOS and Windows, you can find installation packages at https://git-scm.com/downloads
    that are straightforward to use. In the terminal, you should verify that the `git`
    command can be executed. If that command does not work, you must check if the
    Git installation directory is included in the `PATH` variable!


    ```

    > git --version

    git version 2.39.2

    ```


    > **Windows, Linux, or macOS**


    I use the > PowerShell prompt in this section. The few screenshots I''ve included
    were taken on a Windows system. However, the procedure does not change whether
    you use Windows, Linux, or macOS or whether you run `git` in PowerShell, Bash,
    or Zsh.


    Basically, you can use Git *standalone*; that is, you can manage the code of your
    project exclusively locally on your computer. However, I strongly recommend that
    you set up a free account with a Git host of your choice. I refer to GitHub in
    the following examples, but alternatives like GitLab work just as well.


    To allow the local `git` command to authenticate with the Git host, you must store
    your public SSH key there (i.e., usually in the `.ssh/id_xxx.pub` file). On GitHub,
    you can find the corresponding upload dialog under **Settings • SSH and GPG keys**.
    The easiest way is to load the key file into an editor, copy all the text, and
    paste it into the web dialog.


    Because this information is stored in every commit, Git needs to know your name
    and email address. (I''ll explain what a commit is later.) You don''t need to
    provide your real email address. If you use GitHub and you want your email address
    to remain anonymous, you should proceed as follows and replace `aname` with your
    GitHub account name:


    ```

    > git config --global user.name "Michael Kofler"

    > git config --global user.email "aname@users.noreply.github.com"

    ```


    ## 14.1.2 The First Repository


    In the GitHub web interface, you can now create a new repository. A *repository*
    is a collection of all the files in a project that you are managing using Git—including
    all the changes that come together during the course of the project. You must
    assign a name to the repository, and you should set its visibility to **Private**.
    (Your first tests are not meant to be seen by the entire world.) To ensure that
    the repository is not completely empty, I recommend activating the **Add a README
    file** option and leaving all the other options as they are.


    Then, go back to your terminal. On my computers, I usually have a separate directory
    for repositories. (`git` is obvious.) In that directory, you can now run `git
    clone` and then change to the new directory with the repository, as in the following
    example:


    ```

    > mkdir git

    > cd git

    > git clone git@github.com:MichaelKofler/test1234.git

    > cd test1234

    ```


    `git clone` downloads the repository from GitHub and sets up a copy in the `test1234`
    directory on your machine. Needless to say, you need to replace `MichaelKofler/test1234`
    with your own GitHub account name and the name of your repository. You can find
    the entire repository address in the GitHub web interface by clicking the green
    **Code** button and selecting the SSH variant.


    ![](img/a7fa45d496335c22ffb14c3275e24ffb_348_0.png)


    > **Internal Affairs**

    The repository directory—in our case, `git\test1234\`—reflects the current state
    of your project. Old versions of your code as well as other internal data (a kind
    of “Git database” for your project) are hidden in the `.git` subdirectory. These
    compressed files have names that are composed of hexadecimal characters. You should
    use only the `git` command to edit or read your repository. Do not touch the `.git`
    subdirectory!


    ## 14.1.3 The First Commit


    The work you do now takes place in the directory of the repository—in the logic
    of this example, in `git\test1234\`. If you use Visual Studio Code (VS Code),
    you must open this directory. Let’s assume you create three new scripts in this
    directory: `script1.ps1` to `script3.ps1`.


    At the end of the day—or when you’ve reached a satisfactory intermediate state
    to take a break—you’ll want to add these three scripts to the Git repository.
    To put it a little more precisely: You want to store a copy of these files in
    their current states in the Git database and then synchronize these changes with
    the external repository on GitHub. This process requires three steps or three
    commands, all of which must be run in the repository directory (`git\test1234`,
    in this example):


    ```

    > git add script1.ps1 script2.ps1 script3.ps1


    > git commit -m ''script1 to script3: basic functions work''


    [main cd35ac9] script1 to script3: basic functions work

    3 files changed, 3 insertions(+)

    create mode 100644 script1.ps1

    create mode 100644 script2.ps1

    create mode 100644 script3.ps1


    > git push


    Writing objects: 100% (5/5), 399 bytes | 199.00 KiB/s, done.

    To github.com:MichaelKofler/test1234.git

    015ed58..cd35ac9  main -> main

    ```


    Let’s start with `git add`. This command does two things: First, Git now knows
    that these files belong to the project and are under version control. Second,
    Git stores the current state of these files in the local Git database (i.e., in
    the `.git` directory).


    `git commit` generates a commit that saves the current status of the project—all
    changes marked up to the time of `git add`—in a kind of intermediate release.
    The *message* passed with `-m` usually contains a short description of the last
    changes made. Also, `git commit` is only processed locally; that is, the remote
    repository (GitHub, in our example) does not know anything about the local changes
    until now.

    Only `git push` transfers the changes made to the remote repository (in our case,
    to GitHub). After running the command in the terminal, you should take another
    look at the GitHub web interface. You should see that both the commit and the
    three files (*script1.ps1* to *script3.ps1*) are now visible.


    > **Git in VS Code**

    Instead of running the `git add`, `git commit`, and `git push` commands in a terminal,
    you can also trigger these actions from the VS Code user interface (UI). VS Code
    features excellent support for Git. However, you should refrain from this approach
    during your first attempts. First, try to get to know and understand the `git`
    command!

    To learn more about Git in VS Code later, a good overview including a video tutorial
    is available at https://code.visualstudio.com/docs/sourcecontrol/overview.


    ## 14.1.4 Additional Commits


    You''ve earned a break! The next day, you start with the documentation in the
    *README.md* file and make a few more improvements in *script2.ps1*. Now, it''s
    time for the next commit. But instead of marking the changed files using `git
    add` again, this time you can use a shortcut: Run `git commit` with the `-a` (`all`)
    option, which automatically commits all changes to files that were already under
    Git control. Don''t forget `git push` to upload the changes to the remote repository
    as well.


    ```

    > git commit -a -m ''improved script2.ps1, started documentation''

    > git push

    ```


    > **For New Files, `git add` Is Required!**

    The `git commit -a` command is so convenient that using the `-a` option quickly
    becomes a matter of course. However, keep in mind one important caveat: The command
    only includes files that are already under Git control. If you create new files
    like *script4.ps1* or *configuration.ini* in your editor, don''t forget to add
    them to the repository once using `git add`!


    ## 14.1.5 Setting Up the Repository on a Second Computer


    Your scripts are working satisfactorily so far. But now, these scripts need to
    be run on a second computer. For this task, you can install Git on the second
    computer and then repeat the `git clone` command in the directory where you want
    to use the scripts:'
  mdcn: '## 14.1 Git 快速入门


    本快速入门旨在帮助你开始使用 Git。如果你已经了解 Git，可以直接跳到下一节！


    本章我将只介绍最基础的内容：你不会学到关于分支或合并冲突的知识，更不用说团队部署的最佳实践了。我将描述的唯一认证方法是 SSH。简而言之，这个快速入门可以称为“极简主义者的
    Git”。尽管如此，我传授的知识应该足以让你使用 Git 来管理一组脚本。要了解更多关于 Git 的知识，你可以在网上找到全面的文档，包括视频，网址是 https://git-scm.com/doc。我有没有提到还有一些相当不错的
    Git 书籍？


    ## 14.1.1 准备任务


    首先，你必须安装 Git。在 Linux 上，最好的方法是使用你发行版的 Git 包。如果你运行的是 Debian 或 Ubuntu，`sudo apt install
    git` 就能完成任务。对于 macOS 和 Windows，你可以在 https://git-scm.com/downloads 找到易于使用的安装包。在终端中，你应该验证
    `git` 命令是否可以执行。如果该命令不起作用，你必须检查 Git 安装目录是否包含在 `PATH` 变量中！


    ```

    > git --version

    git version 2.39.2

    ```


    > **Windows、Linux 或 macOS**


    本节我使用 > PowerShell 提示符。我包含的几张截图是在 Windows 系统上拍摄的。然而，无论你使用 Windows、Linux 还是 macOS，也无论你在
    PowerShell、Bash 还是 Zsh 中运行 `git`，操作过程都不会改变。


    基本上，你可以*独立*使用 Git；也就是说，你可以完全在本地计算机上管理项目的代码。但是，我强烈建议你选择一个 Git 主机并设置一个免费账户。在下面的例子中我指的是
    GitHub，但像 GitLab 这样的替代品同样有效。


    为了允许本地 `git` 命令与 Git 主机进行身份验证，你必须在那里存储你的公共 SSH 密钥（即通常在 `.ssh/id_xxx.pub` 文件中）。在
    GitHub 上，你可以在 **Settings • SSH and GPG keys** 下找到相应的上传对话框。最简单的方法是将密钥文件加载到编辑器中，复制所有文本，然后将其粘贴到
    Web 对话框中。


    因为此信息存储在每次提交中，Git 需要知道你的姓名和电子邮件地址。（我稍后会解释什么是提交。）你不需要提供你的真实电子邮件地址。如果你使用 GitHub
    并且希望你的电子邮件地址保持匿名，你应该按照以下步骤操作，并将 `aname` 替换为你的 GitHub 账户名：


    ```

    > git config --global user.name "Michael Kofler"

    > git config --global user.email "aname@users.noreply.github.com"

    ```


    ## 14.1.2 第一个仓库


    在 GitHub Web 界面中，你现在可以创建一个新的仓库。*仓库*是你使用 Git 管理的项目中所有文件的集合——包括在项目过程中产生的所有更改。你必须为仓库指定一个名称，并且你应该将其可见性设置为
    **Private**。（你的第一次测试不是为了让全世界看到。）为确保仓库不是完全空的，我建议激活 **Add a README file** 选项，并保持所有其他选项不变。


    然后，回到你的终端。在我的计算机上，我通常为仓库设置一个单独的目录。（`git` 是显而易见的。）在该目录中，你现在可以运行 `git clone`，然后切换到包含仓库的新目录，如下例所示：


    ```

    > mkdir git

    > cd git

    > git clone git@github.com:MichaelKofler/test1234.git

    > cd test1234

    ```


    `git clone` 从 GitHub 下载仓库并在你机器上的 `test1234` 目录中设置一个副本。不用说，你需要将 `MichaelKofler/test1234`
    替换为你自己的 GitHub 账户名和仓库名。你可以通过点击绿色的 **Code** 按钮并选择 SSH 变体，在 GitHub Web 界面中找到完整的仓库地址。


    ![](img/a7fa45d496335c22ffb14c3275e24ffb_348_0.png)


    > **内部机制**

    仓库目录——在我们的例子中是 `git\test1234\`——反映了你项目的当前状态。你代码的旧版本以及其他内部数据（一种用于你项目的“Git 数据库”）隐藏在
    `.git` 子目录中。这些压缩文件的名称由十六进制字符组成。你应该只使用 `git` 命令来编辑或读取你的仓库。不要触碰 `.git` 子目录！


    ## 14.1.3 第一次提交


    你现在的工作在仓库目录中进行——在这个例子的逻辑中，是在 `git\test1234\` 中。如果你使用 Visual Studio Code (VS Code)，你必须打开这个目录。假设你在这个目录中创建了三个新脚本：`script1.ps1`
    到 `script3.ps1`。


    一天结束时——或者当你达到一个满意的中间状态想要休息时——你会想将这三个脚本添加到 Git 仓库中。更准确地说：你想在 Git 数据库中存储这些文件当前状态的副本，然后将这些更改与
    GitHub 上的外部仓库同步。这个过程需要三个步骤或三个命令，所有这些都必须在仓库目录中运行（在这个例子中是 `git\test1234`）：


    ```

    > git add script1.ps1 script2.ps1 script3.ps1


    > git commit -m ''script1 to script3: basic functions work''


    [main cd35ac9] script1 to script3: basic functions work

    3 files changed, 3 insertions(+)

    create mode 100644 script1.ps1

    create mode 100644 script2.ps1

    create mode 100644 script3.ps1


    > git push


    Writing objects: 100% (5/5), 399 bytes | 199.00 KiB/s, done.

    To github.com:MichaelKofler/test1234.git

    015ed58..cd35ac9  main -> main

    ```


    让我们从 `git add` 开始。这个命令做两件事：首先，Git 现在知道这些文件属于该项目并处于版本控制之下。其次，Git 将这些文件的当前状态存储在本地
    Git 数据库中（即在 `.git` 目录中）。


    `git commit` 生成一个提交，将项目的当前状态——截至 `git add` 时标记的所有更改——保存为一种中间版本。通过 `-m` 传递的*消息*通常包含对上次所做更改的简短描述。此外，`git
    commit` 仅在本地处理；也就是说，远程仓库（在我们的例子中是 GitHub）直到现在还不知道任何本地更改。

    只有 `git push` 才会将所做的更改传输到远程仓库（在我们的例子中是 GitHub）。在终端中运行该命令后，你应该再看一下 GitHub Web 界面。你应该看到提交和三个文件（*script1.ps1*
    到 *script3.ps1*）现在都可见了。


    > **VS Code 中的 Git**

    你也可以从 VS Code 用户界面 (UI) 触发这些操作，而不是在终端中运行 `git add`、`git commit` 和 `git push` 命令。VS
    Code 对 Git 提供了出色的支持。但是，在你第一次尝试时，你应该避免使用这种方法。首先，尝试了解和理解 `git` 命令！

    要稍后了解更多关于 VS Code 中 Git 的知识，可以在 https://code.visualstudio.com/docs/sourcecontrol/overview
    找到包括视频教程在内的良好概述。


    ## 14.1.4 额外的提交


    你该休息一下了！第二天，你从 *README.md* 文件中的文档开始，并在 *script2.ps1* 中做了更多改进。现在，是时候进行下一次提交了。但这次你不需要再次使用
    `git add` 来标记更改的文件，你可以使用一个快捷方式：使用 `-a` (`all`) 选项运行 `git commit`，这会自动提交所有已处于 Git
    控制下的文件的更改。别忘了 `git push` 将更改也上传到远程仓库。


    ```

    > git commit -a -m ''improved script2.ps1, started documentation''

    > git push

    ```


    > **对于新文件，需要 `git add`！**

    `git commit -a` 命令非常方便，以至于使用 `-a` 选项很快就会成为理所当然的事情。然而，请记住一个重要的注意事项：该命令仅包含已处于 Git
    控制下的文件。如果你在编辑器中创建了像 *script4.ps1* 或 *configuration.ini* 这样的新文件，不要忘记使用 `git add`
    将它们添加到仓库一次！


    ## 14.1.5 在第二台计算机上设置仓库


    到目前为止，你的脚本运行得令人满意。但是现在，这些脚本需要在第二台计算机上运行。对于这个任务，你可以在第二台计算机上安装 Git，然后在要使用脚本的目录中重复
    `git clone` 命令：'
