- md: "## 7.4.4 Working on Other Computers\n\nBasically, cmdlets are always executed\
    \ on the local computer. `Invoke-Command` allows you to execute commands on other\
    \ computers. Among other things, this requires that Windows Remote Management\
    \ is active on this computer (the `winrm` service). The following two examples\
    \ first run the `Get-Process` command and then run `myscript.ps1` on the `otherhost`\
    \ computer:\n\n```\n> Invoke-Command otherhost { Get-Process }\n> Invoke-Command\
    \ otherhost -FilePath C:\\myscript.ps1\n```\n\nInstead of just running individual\
    \ commands, you can use `Enter-PSSession hostname` to connect to another computer\
    \ and open a PowerShell session there. If necessary, you can use `-Credential\
    \ name` to specify the desired login name if different from your own. Of course,\
    \ you must authenticate yourself with a password. You can end an active session\
    \ using `Exit-PSSession`.\n\n```\n> Enter-PSSession otherhost\n[otherhost]: PS\
    \ C:\\Users\\username> Get-Process\n\n...\n\n[otherhost]: PS C:\\Users\\username>\
    \ Exit-PSSession\n```\n\nAn alternative to `Enter-PSSession` is the `New-PSSession`\
    \ cmdlet. This approach also creates a connection to another computer. You can\
    \ subsequently pass the session object as a parameter to other cmdlets, for example,\
    \ to `Copy-Item` to copy files to another computer. However, `New-PSSession` is\
    \ not intended for interactive use.\n\n> **Remoting Does Not Work**\n\n`Enter-PSSession`\
    \ and `Invoke-Command` often fail with uninformative error messages (such as “Access\
    \ denied”) without further explanation. The solution is usually the `Enable-PSRemoting`\
    \ command, which is executed on the target computer. For the causes of various\
    \ errors and tips on how to fix them, refer to https://learn.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_remote_troubleshooting.\n\
    \n> **SSH instead of Remoting**\n\nSSH provides a functionality that’s comparable\
    \ to `Invoke-Command` and `Enter-PSSession` but works across different platforms.\
    \ However, SSH requires a running SSH server on the target computer, which is\
    \ rather unusual on Windows.\n\nSince version 6, PowerShell even supports *SSH\
    \ remoting*, that is, the use of the `Enter-PSSession` or `New-PSSession` commands\
    \ via an SSH connection. In my tests, however, the configuration proved to be\
    \ as error prone as for Windows Remote Management.\n\nMore details on using SSH\
    \ directly and on SSH remoting will follow in Chapter 12.\n\n## 7.5 Registration\
    \ Database and System Information\n\nMany important settings are located in the\
    \ registration database. To read its entries, you can use the `Get-ChildItem`\
    \ command you’re already familiar with from Section 7.1. The following command\
    \ returns a list of your own entries (HKEY_CURRENT_USER) on the first level. With\
    \ the additional `-Recurse` option, the cmdlet runs through all levels of the\
    \ registry.\n\n```\n> Get-ChildItem HKCU:\\n\nName          Property\n----   \
    \       --------\nConsole       ColorTable00       : 789516\n              ...\n\
    Environment   OneDrive           : C:\\Users\\kofler\\OneDrive\n             \
    \ OneDriveConsumer   : C:\\Users\\kofler\\OneDrive\n              ...\n```\n\n\
    `Get-ItemProperty` and `Get-ItemPropertyValue` allow you to view specifically\
    \ the contents of a registry directory and a single entry, respectively:\n\n```\n\
    # alle Einträge von HKEY_CURRENT_USER\\Show environment\n> Get-ItemProperty HKCU:\\\
    Environment\\n\nOneDrive           : C:\\Users\\kofler\\OneDrive\nOneDriveConsumer\
    \   : C:\\Users\\kofler\\OneDrive\nPath               : C:\\Users\\kofler\\AppData\\\
    Local\\Programs\\...\n...\n\n# show only the Path entry\n> Get-ItemProperty HKCU:\\\
    Environment\\ | Select-Object Path\n\nC:\\Users\\kofler\\AppData\\Local\\Programs\\\
    Python\\Python311\\...\n\n# same result\n> Get-ItemPropertyValue \"HKCU:\\Environment\"\
    \ -Name Path\n\nC:\\Users\\kofler\\AppData\\Local\\Programs\\Python\\Python311\\\
    ...\n```\n\nOf course, you can also modify the registry. `New-Item` creates a\
    \ new key, while `Set-ItemProperty` stores an entry. But be careful to avoid changing\
    \ any important settings!\n\n```\n# creates the \\michael\\mykey directory in\
    \ two steps\n> New-Item HKCU:\\michael\n> New-Item HKCU:\\michael\\mykey\n\n#\
    \ saves version=1.0 there\n> Set-ItemProperty HKCU:\\michael\\mykey -Name version\
    \ -Value 1.0\n\n# reads the data again\n> Get-ChildItem HKCU:\\michael\\n\nHive:\
    \ HKEY_CURRENT_USER\\michael\n\nName    Property\n----    --------\nmykey   version\
    \ : 1\n```\n\n```\n> Get-ItemPropertyValue \"HKCU:\\michael\\mykey\" -Name version\n\
    1\n```\n\n`Remove-Item` deletes all registry directories and entries created in\
    \ this example. Make sure you specify the correct path when you run this command.\
    \ You can do a lot of damage with `Remove-Item -Recurse`, regardless of whether\
    \ you're deleting files or registry entries.\n\n```\n> Remove-Item -Recurse HKCU:\\\
    michael\n```\n\n### 7.5.1 Determining System Information\n\n`Get-ComputerInfo`\
    \ returns a long list of version numbers and strings to identify the Windows version.\
    \ You can use `Select-Object` to filter out the information relevant to it:\n\n\
    ```\n> Get-ComputerInfo | Select-Object OsName, OSType, OsProductType\n\nOsName\
    \                  OSType  OsProductType\n------                  ------  -------------\n\
    Microsoft Windows 11 Pro WINNT   WorkStation\n```\n\n```\n> Get-ComputerInfo |\
    \ Select-Object OsVersion, WindowsVersion\n\nOsVersion WindowsVersion\n---------\
    \ --------------\n10.0.22621 2009\n```\n\nHowever, the what's called the *display\
    \ version* for installed function updates can only be found in the registry:\n\
    \n```\n> $key = \"HKLM:\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\"\n>\
    \ (Get-ItemProperty $key).DisplayVersion\n22H2\n```\n\nOften the language, time\
    \ zone and installation location are also of interest:\n\n```\n> Get-ComputerInfo\
    \ | select OsLocale,TimeZone,OsWindowsDirectory\n\nOsLocale TimeZone         \
    \                 OsWindowsDirectory\n-------- --------                      \
    \    ------------------\nde-DE    (UTC+01:00) Amsterdam, Berlin, ... C:\\Windows\n\
    ```\n\n`Get-ComputerInfo` also reveals the name of the CPU, the number of cores,\
    \ the RAM size, and so on, if required. `Get-PSDrive` determines the free space\
    \ on the drives (in our example, only for the C: drive, with information displayed\
    \ in bytes):\n\n```\n> Get-ComputerInfo | Select-Object CsProcessors\n\n{Intel(R)\
    \ Core(TM) i7-8750H CPU @ 2.20GHz, ...}\n> Get-PSDrive C | Select-Object Used,\
    \ Free\n\n        Used        Free\n        ----        ----\n40943972352 173030539264\n\
    ```\n\n### 7.5.2 Evaluating the Logging System\n\nWindows logs all conceivable\
    \ events in a logging system. `Get-EventLog -List` reveals the names of the logs.\
    \ Using `Get-EventLog <name> -Newest n`, you can read the most recent n entries.\n\
    \n```\n> Get-EventLog Security -Newest 5 |\n  Select-Object TimeGenerated, Message\n\
    \nTimeGenerated          Message\n--------------         -------\n01/30/2023 03:47:30\
    \ PM A new login has been ...\n01/30/2023 03:47:30 PM An account has been successfully\
    \ registered.\n01/30/2023 03:41:52 PM A new login has been ...\n01/30/2023 03:41:52\
    \ PM An account has been successfully registered.\n01/30/2023 03:13:48 PM A new\
    \ login has been ...\n```\n\n## 7.6 Processing cmdlet Results\n\ncmdlets return\
    \ objects, not just text. The text displayed in the terminal is created because\
    \ PowerShell converts the objects into text by default. To achieve better readability,\
    \ many details are removed in the process.\n\nOne of the most basic PowerShell\
    \ tasks is to pass results to a second cmdlet using the pipe operator. This allows\
    \ you to filter, process, or format the data in a variety of ways. You have already\
    \ seen some cmdlets for this purpose, such as `Select-Object` or `ForEach-Item`.\
    \ This section summarizes the basic functions of these frequently needed cmdlets."
  mdcn: "## 7.4.4 在其他计算机上操作\n\n通常，cmdlet 总是在本地计算机上执行。`Invoke-Command` 允许你在其他计算机上执行命令。除此之外，这要求目标计算机上激活了\
    \ Windows 远程管理（`winrm` 服务）。以下两个示例首先在 `otherhost` 计算机上运行 `Get-Process` 命令，然后运行\
    \ `myscript.ps1` 脚本：\n\n```\n> Invoke-Command otherhost { Get-Process }\n> Invoke-Command\
    \ otherhost -FilePath C:\\myscript.ps1\n```\n\n除了运行单个命令，你还可以使用 `Enter-PSSession\
    \ hostname` 连接到另一台计算机并在那里打开一个 PowerShell 会话。如果需要，你可以使用 `-Credential name` 来指定与当前用户不同的登录名。当然，你必须使用密码进行身份验证。你可以使用\
    \ `Exit-PSSession` 结束一个活动会话。\n\n```\n> Enter-PSSession otherhost\n[otherhost]:\
    \ PS C:\\Users\\username> Get-Process\n\n...\n\n[otherhost]: PS C:\\Users\\username>\
    \ Exit-PSSession\n```\n\n`Enter-PSSession` 的一个替代方案是 `New-PSSession` cmdlet。这种方法同样会创建到另一台计算机的连接。随后，你可以将会话对象作为参数传递给其他\
    \ cmdlet，例如，传递给 `Copy-Item` 以将文件复制到另一台计算机。但是，`New-PSSession` 并非设计用于交互式使用。\n\n\
    > **远程处理无法工作**\n\n`Enter-PSSession` 和 `Invoke-Command` 经常会失败，并显示信息量不足的错误消息（例如“访问被拒绝”），而没有进一步的解释。解决方案通常是在目标计算机上执行\
    \ `Enable-PSRemoting` 命令。有关各种错误的原因以及如何修复它们的提示，请参阅 https://learn.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_remote_troubleshooting。\n\
    \n> **使用 SSH 代替远程处理**\n\nSSH 提供了与 `Invoke-Command` 和 `Enter-PSSession` 相当的功能，但可以跨不同平台工作。然而，SSH\
    \ 要求目标计算机上运行 SSH 服务器，这在 Windows 上并不常见。\n\n从版本 6 开始，PowerShell 甚至支持 *SSH 远程处理*，即通过\
    \ SSH 连接使用 `Enter-PSSession` 或 `New-PSSession` 命令。然而，在我的测试中，其配置被证明与 Windows 远程管理一样容易出错。\n\
    \n有关直接使用 SSH 和 SSH 远程处理的更多详细信息将在第 12 章中介绍。\n\n## 7.5 注册表数据库和系统信息\n\n许多重要设置位于注册表数据库中。要读取其条目，你可以使用在\
    \ 7.1 节中已经熟悉的 `Get-ChildItem` 命令。以下命令返回第一级你自己的条目（HKEY_CURRENT_USER）列表。使用额外的 `-Recurse`\
    \ 选项，该 cmdlet 会遍历注册表的所有层级。\n\n```\n> Get-ChildItem HKCU:\\n\nName          Property\n\
    ----          --------\nConsole       ColorTable00       : 789516\n          \
    \    ...\nEnvironment   OneDrive           : C:\\Users\\kofler\\OneDrive\n   \
    \           OneDriveConsumer   : C:\\Users\\kofler\\OneDrive\n              ...\n\
    ```\n\n`Get-ItemProperty` 和 `Get-ItemPropertyValue` 允许你分别查看注册表目录的内容和单个条目：\n\n\
    ```\n# 显示 HKEY_CURRENT_USER\\Environment 的所有条目\n> Get-ItemProperty HKCU:\\Environment\\\
    n\nOneDrive           : C:\\Users\\kofler\\OneDrive\nOneDriveConsumer   : C:\\\
    Users\\kofler\\OneDrive\nPath               : C:\\Users\\kofler\\AppData\\Local\\\
    Programs\\...\n...\n\n# 仅显示 Path 条目\n> Get-ItemProperty HKCU:\\Environment\\ |\
    \ Select-Object Path\n\nC:\\Users\\kofler\\AppData\\Local\\Programs\\Python\\\
    Python311\\...\n\n# 相同的结果\n> Get-ItemPropertyValue \"HKCU:\\Environment\" -Name\
    \ Path\n\nC:\\Users\\kofler\\AppData\\Local\\Programs\\Python\\Python311\\...\n\
    ```\n\n当然，你也可以修改注册表。`New-Item` 创建一个新键，而 `Set-ItemProperty` 存储一个条目。但要小心，避免更改任何重要设置！\n\
    \n```\n# 分两步创建 \\michael\\mykey 目录\n> New-Item HKCU:\\michael\n> New-Item HKCU:\\\
    michael\\mykey\n\n# 在那里保存 version=1.0\n> Set-ItemProperty HKCU:\\michael\\mykey\
    \ -Name version -Value 1.0\n\n# 再次读取数据\n> Get-ChildItem HKCU:\\michael\\n\nHive:\
    \ HKEY_CURRENT_USER\\michael\n\nName    Property\n----    --------\nmykey   version\
    \ : 1\n```\n\n```\n> Get-ItemPropertyValue \"HKCU:\\michael\\mykey\" -Name version\n\
    1\n```\n\n`Remove-Item` 删除在此示例中创建的所有注册表目录和条目。运行此命令时，请确保指定正确的路径。使用 `Remove-Item\
    \ -Recurse` 可能会造成很大损害，无论你是删除文件还是注册表条目。\n\n```\n> Remove-Item -Recurse HKCU:\\\
    michael\n```\n\n### 7.5.1 确定系统信息\n\n`Get-ComputerInfo` 返回一长串版本号和字符串，用于标识 Windows\
    \ 版本。你可以使用 `Select-Object` 来筛选相关信息：\n\n```\n> Get-ComputerInfo | Select-Object\
    \ OsName, OSType, OsProductType\n\nOsName                  OSType  OsProductType\n\
    ------                  ------  -------------\nMicrosoft Windows 11 Pro WINNT\
    \   WorkStation\n```\n\n```\n> Get-ComputerInfo | Select-Object OsVersion, WindowsVersion\n\
    \nOsVersion WindowsVersion\n--------- --------------\n10.0.22621 2009\n```\n\n\
    然而，已安装功能更新的所谓 *显示版本* 只能在注册表中找到：\n\n```\n> $key = \"HKLM:\\SOFTWARE\\Microsoft\\\
    Windows NT\\CurrentVersion\"\n> (Get-ItemProperty $key).DisplayVersion\n22H2\n\
    ```\n\n通常，语言、时区和安装位置也很有用：\n\n```\n> Get-ComputerInfo | select OsLocale,TimeZone,OsWindowsDirectory\n\
    \nOsLocale TimeZone                          OsWindowsDirectory\n-------- --------\
    \                          ------------------\nde-DE    (UTC+01:00) Amsterdam,\
    \ Berlin, ... C:\\Windows\n```\n\n如果需要，`Get-ComputerInfo` 还会显示 CPU 名称、核心数量、RAM\
    \ 大小等信息。`Get-PSDrive` 确定驱动器上的可用空间（在我们的示例中，仅针对 C: 驱动器，信息以字节显示）：\n\n```\n> Get-ComputerInfo\
    \ | Select-Object CsProcessors\n\n{Intel(R) Core(TM) i7-8750H CPU @ 2.20GHz, ...}\n\
    > Get-PSDrive C | Select-Object Used, Free\n\n        Used        Free\n     \
    \   ----        ----\n40943972352 173030539264\n```\n\n### 7.5.2 评估日志系统\n\nWindows\
    \ 在日志系统中记录所有可想象的事件。`Get-EventLog -List` 显示日志的名称。使用 `Get-EventLog <name> -Newest\
    \ n`，你可以读取最近的 n 个条目。\n\n```\n> Get-EventLog Security -Newest 5 |\n  Select-Object\
    \ TimeGenerated, Message\n\nTimeGenerated          Message\n--------------   \
    \      -------\n01/30/2023 03:47:30 PM A new login has been ...\n01/30/2023 03:47:30\
    \ PM An account has been successfully registered.\n01/30/2023 03:41:52 PM A new\
    \ login has been ...\n01/30/2023 03:41:52 PM An account has been successfully\
    \ registered.\n01/30/2023 03:13:48 PM A new login has been ...\n```\n\n## 7.6\
    \ 处理 cmdlet 结果\n\ncmdlet 返回的是对象，而不仅仅是文本。终端中显示的文本是 PowerShell 默认将对象转换为文本的结果。为了提高可读性，在此过程中会删除许多细节。\n\
    \nPowerShell 最基本的任务之一是使用管道运算符将结果传递给第二个 cmdlet。这允许你以多种方式筛选、处理或格式化数据。你已经见过一些用于此目的的\
    \ cmdlet，例如 `Select-Object` 或 `ForEach-Item`。本节总结了这些常用 cmdlet 的基本功能。"
