    \ |\n| x{3,} | At least three times |\n\nTable 9.5 Regular Expression Pattern\
    \ Quantifiers (Cont.)\n\nThe following examples show quantifiers are easy to use:\n\
    \n+   - [a-f]\n  Without a quantifier, this expression requires exactly one character\
    \ a through f.\n- [a-f]?\n  With ?, one of the characters or none at all is expected.\n\
    - [a-f]+\n  With +, any number of characters between a and f are allowed, but\
    \ at least one character must be specified. Thus, a, aaa, and abcdef are fine.\
    \ abcx also applies, but the expression includes only the first three letters,\
    \ not the letter x.\n- .*\n  This open pattern allows any number of (even zero)\
    \ arbitrary characters.\n- (abc|efg){4}\n  In this pattern, abc or efg must be\
    \ specified exactly four times. abcabcefgabc would be appropriate, but abcefg\
    \ would not.\n\n# 9.2.2 On Greed (Greedy versus Lazy)\n\nNo, this section does\
    \ not describe human morality or the characteristics of economic systems. Rather,\
    \ greed in this context is a matter of how large the string captured by an expression\
    \ should be. By default, the evaluation of regular expressions is greedy; that\
    \ is, the regex function returns the largest possible matching strings.\n\nLet’s\
    \ assume that the expression is `<.+>`. This expression means an HTML tag that\
    \ starts with < and ends with > is to be recognized. There may be any number of\
    \ characters in between (at least one).\n\nIf you apply this expression to the\
    \ string `<html><body><p>lorem ipsum<p>dolores est`, the result is `<html><body><p>lorem\
    \ ipsum<p>`. In most cases, this match will not meet your expectations.\n\nYou’re\
    \ lucky if the regex functions of your tools are PCRE-compliant. Then, you can\
    \ simply enter a question mark after the quantifier. The expression is then analyzed\
    \ as lazy or non-greedy, that is, as minimalistic as possible. The following listing\
    \ illustrates this:\n\n```\nExpression:          <.+?>\n\nText:              \
    \  <html><body><p>lorem ipsum<p>dolores est\n```"
