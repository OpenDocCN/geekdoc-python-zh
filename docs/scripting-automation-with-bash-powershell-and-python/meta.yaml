    ## 15.1 Synchronizing Directories to External Storage\n\nYou probably use the\
    \ cloud as a backup storage in some way or other: As a developer, you probably\
    \ use Git to synchronize your code to a remote repository, combining the benefits\
    \ of version control with those of an external backup. As an “ordinary” user,\
    \ you simply save important files to a OneDrive, NextCloud, Dropbox, or iCloud\
    \ Drive directory. All of these procedures are both useful and secure when applied\
    \ correctly.\n\nThe starting point for this example is the desire to *additionally*\
    \ synchronize important directories of the notebook to an external data medium.\
    \ The advantage of this old-fashioned backup method is that stored files are available\
    \ even if cloud access is not possible at any given time for whatever reason.\
    \ Local backups also come in handy when data volumes are too large for cloud storage,\
    \ for example, when virtual machines, video projects, and so on are involved.\n\
    \nI would also like to point out the most important disadvantage right away: “Synchronizing”\
    \ means that files deleted on your notebook will also be deleted on the external\
    \ disk. Thus, this backup procedure does not provide the option to restore deleted\
    \ or overwritten files. In this respect, the Bash or PowerShell scripts presented\
    \ in this chapter should not represent your sole means of backup but should instead\
    \ complement other methods.\n\n> **Be Careful with Backups of Files Currently\
    \ Used**\n>\n> If you use the script to synchronize files that are currently open\
    \ and change during copying, the backup is worthless most of the time. This limitation\
    \ applies, for example, to image files of virtual machines or to databases.\n\n\
    Unfortunately, no universal solution exists for this problem. Ideally, you should\
    \ run the script at a time when as few files as possible are actively in use.\
    \ Most database servers provide features to perform consistent backups even while\
    \ the database is running, but mostly not at the file level. (Two examples of\
    \ this will follow in the other sections of this chapter.) You could shut down\
    \ virtual machines in your script for the time of the backup and restart them\
    \ afterwards. However, such approaches depend quite specifically on the software\
    \ running on your computer.\n\nDepending on the operating system, file system\
    \ snapshots represent another solution: In this context, you can temporarily freeze\
    \ a copy of the file system and use this static copy as the basis for the backup.\
    \ On Linux, the *Logical Volume Manager (LVM)* or the Btrfs file system provides\
    \ such options.\n\n## 15.1.1 PowerShell Script with robocopy\n\n*robocopy*, which\
    \ stands for *robust file copy*, is a Windows command that has been shipped with\
    \ all versions of Windows since 2008. Even though the command cannot be called\
    \ as a cmdlet, it integrates well into PowerShell scripts. The command’s myriad\
