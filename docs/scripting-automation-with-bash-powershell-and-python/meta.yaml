  md: "Extension: Uploading Encrypted Backups to Amazon Web Services (AWS)\nKeeping\
    \ backup files on external computers is often less secure than on the local server\
    \ with regard to their accessibility by attackers. Thus, a good idea is to encrypt\
    \ backup files before uploading them to other hosts.\nI'll show you how to encrypt\
    \ files and then use Simple Storage Service (S3), Amazon's cloud storage service,\
    \ as a storage location in Chapter 20, where we'll extend our most recent example\
    \ in this respect.\n\n# 15.3 SQL Server Backup\n\nThe goal of the following script\
    \ is to back up all the databases of SQL Server as compressed files in a specified\
    \ directory. For this purpose, I assume that you work on Windows. (SQL Server\
    \ can also be installed on Linux, but I did not test that scenario for this example.)\n\
    For the administration of SQL Server via PowerShell scripts, you can use the SqlServer\
    \ module developed by Microsoft and available in the PowerShell Gallery:\n\n```\n\
    > Install-Module SqlServer\n```\n\nA reference for all the cmdlets in this module\
    \ can be found at https://learn.microsoft.com/en-us/powershell/module/sqlserver.\n\
    Using Backup-SqlDatabase it is quite simple to create a backup of a database:\n\
    \n```\n> Backup-SqlDatabase -ServerInstance \"localhost\\SQLEXPRESS01\" `\n  \
    \                  -Database \"dbname\"\n```\n\nIn this command, we use -ServerInstance\
    \ to specify the name under which the SQL Server is accessible. Of course, the\
    \ command can be executed only if your Windows account has access rights to the\
    \ database server. By default, the backup ends up in the server's backup directory,\
    \ which is usually at the following location:\n\n```\nC:\\Program Files\\Microsoft\
    \ SQL Server\\MSSQLn.n\\MSSQL\\Backup\n```\n\nAlternatively, you can specify the\
    \ desired backup filename by using the -BackupFile option. (Numerous other options\
    \ enable you to control how Backup-SqlDatabase works. Just take a look at the\
    \ documentation!) The files created by Backup-SqlDatabase are in a binary format\
    \ that can be compressed well.\n\ndbatools\nA useful alternative to the SqlServer\
    \ module is the dbatools (see https://dbatools.io/commands). This module is much\
    \ more extensive and includes many more cmdlets. If you specialize in the administration\
    \ of SQL Server instances, you should definitely familiarize yourself with dbatools!"
