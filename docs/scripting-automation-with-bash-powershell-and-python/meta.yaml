    # 10.5 XML and Python


    Various official (and even more external) XML libraries are available for Python.
    These modules are optimized for different application purposes, for example, for
    the particularly efficient processing of large files, for the most secure analysis
    of XML files, or for creating your own XML documents. The following pages provide
    a good overview:


    +   ■ https://docs.python.org/3/library/xml.html

    ■ https://realpython.com/python-xml-parser


    This section focuses on the `xml.etree.ElementTree` module, which ships with Python
    by default. This module is easy to use and well suited for analyzing XML documents.
    The following lines show how you can read an XML string or an XML file and access
    the root element of the XML document:


    ```

    import xml.etree.ElementTree as ET

    # read XML file ...

    root = ET.parse(''filename.xml'').getroot()


    # ... or process XML from string

    s = ''<?xml ...>...''

    root = ET.fromString(s)

    ```


    `root` is an object of the `Element` class that has the following features:


    +   ■ tag: Name of the current XML tag

    ■ text: Text in tag (but no subelements)

    ■ attrib: Dictionary with keys of the XML tag


    All subelements of an `Element` can be directly looped. The loop variable itself
    contains `Element` objects as well:


    ```

    for sub in e:  # loop through all sub-elements

    ```


    Alternatively, you can access the nth element directly:


    ```

    sub = e[3]      # 4. Sub-element (the count starts with 0)

    ```


    If you want to process all XML elements with a specific name on the current level,
    you can use the `findall` method:'
