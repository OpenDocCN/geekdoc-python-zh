  md: '# # Chapter 6

    ## Linux Toolbox


    Before you develop your own Bash scripts using Bash, you need a basic vocabulary
    of elementary commands. You can then use these commands to create files, copy
    or delete directories, create compressed archives, install additional commands,
    switch to root mode, and so on. The commands can be used both interactively in
    a terminal and automatically in scripts.


    This chapter is a kind of crash course for Linux newbies. If you have already
    worked frequently in the Linux terminal, you can safely skip this chapter.


    Most of this chapter also applies to macOS. Although macOS is not based on Linux,
    but on BSD (another Unix derivative), basic commands like `cp` or `mkdir` work
    in the same way as on Linux. Unfortunately, there are occasional functional deviations
    in the individual options, which can result in compatibility issues if you want
    your scripts to run on both platforms.


    Many of the commands presented in this chapter even work on Windows! However,
    this functionality requires you to use Git Bash. This shell is usually installed
    together with Git; see also [Chapter 14](#).


    > **Prerequisites for This Chapter**


    You can use Linux commands even without prior knowledge of Bash. But before you
    can call these commands in your own scripts, you must have some basic knowledge
    of Bash programming (see [Chapter 3](#)).


    > **A Little Advertising**


    An even remotely complete reference of all important Linux commands is impossible
    at this point. However, as a small self-promotion, you can find most everything
    you need to know in my book *Linux: The Comprehensive Guide* (Rheinwerk Computing,
    May 2024) at https://rheinwerk-computing.com/5779.


