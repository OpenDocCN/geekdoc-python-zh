  md: 'describes the mechanisms Bash provides for such tasks. Table 3.3 summarizes
    the meaning of Bash’s “wildcard characters.” (These characters are a simplified
    variant of the “regular expressions” that you’ll get to know in Chapter 9.)


    | Character | Meaning |

    |---|---|

    | ? | Any character |

    | * | Any number (also zero) of any characters |

    | ** | Recursive globbing (globstar) |

    | [aeiou] | One of the specified characters |

    | [a-z] | Character range |

    | [a-zäöüß] | All lowercase letters (in German) |

    | [A-Fa-f0-9] | One hexadecimal digit |

    | [!a-f] | None of the characters from a to f |

    | [^a-f] | None of the characters from a to f |


    **Table 3.3 Globbing Characters**


    What is crucial about these wildcards is that globbing is the responsibility of
    Bash and not of the respective command. So, for example, if you run `cp *.jpg
    some/directory/` to copy some images to a subdirectory, Bash—not the `cp` command—determines
    the list of files to copy. This situation makes sense because otherwise almost
    every command would need corresponding code. But because Bash is responsible,
    the analysis of characters like `*` or `?` is done centrally and always according
    to the same rules: Bash first analyzes all globbing characters, matches them with
    the filenames in the current directory, and then passes the completed list of
    parameters to the relevant command. `cp` thus never sees `*.jpg`, only the completed
    list of filenames, such as `img_1.jpg`, `img_2.jpg`, and `img_3.jpg`.


    If you’re unsure about which filename list is returned by a globbing expression,
    you should run `echo <expression>`, for example:


    ```

    echo img_*.raw

    img_23433.raw img_23434.raw img_23435.raw

    ```


    Zsh is even more convenient in this respect: There, you can simply press `Tab`
    to replace the globbing expression with the filenames that match in the current
    directory.


    If you want to prevent globbing, you should put the character combination in simple
    quotation marks. Perhaps you have created a file whose filename is `???`. (Not
    a good idea, but an allowed filename.) To delete this file, run `rm ''???''`.'
