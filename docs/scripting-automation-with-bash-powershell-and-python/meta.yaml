  - "[PAGE 286]\n\n# Chapter 10\nJSON, XML, and INI\n\nJavaScript Object Notation\
    \ (JSON) has established itself over the last decade as the dominant format when\
    \ programs or web services such as REST APIs are supposed to exchange data.\n\
    The hype of the 2000s surrounding the Extensible Markup Language (XML) has now\
    \ faded: Not only is the comparatively complex syntax, with its many special cases,\
    \ difficult for humans to read, but also tedious to analyze through code. But\
    \ even as XML is used less and less in new projects, you may still encounter its\
    \ huge legacy of programs and web services based on XML. But we are not limited\
    \ to only JSON or XML: To save a few configuration settings, the INI format is\
    \ also completely sufficient.\nIn this chapter, I want to present some functions\
    \ that PowerShell and Python provide for creating and processing such files. If\
    \ necessary, these tasks can also be performed in Bash, but you would have to\
    \ use external commands, such as jq or xmllint.\n\n> **Prerequisites for This\
    \ Chapter**\nThis chapter takes all three scripting languages described in this\
    \ book into account, this time with a focus on PowerShell and Python: These two\
    \ languages provide excellent support for the JSON and XML formats. A good logical\
    \ follow-up to this chapter is Chapter 18.\n\n# 10.1 JSON in PowerShell\n\nIn\
    \ PowerShell, two cmdlets that are as simple as they are powerful make processing\
    \ JSON data a breeze:\n\n+   - **ConvertTo-Json**\n  ConvertTo-Json is mostly\
    \ used in the `cmdlet | ConvertTo-Json` format and converts the result objects\
    \ provided by the cmdlet into a string in JSON format. The properties of the objects\
    \ serve as keys for the key-value pairs in the JSON document. The document can\
    \ be saved to a file via output redirection.\n- **ConvertFrom-Json**\n  ConvertFrom-Json\
    \ works exactly the opposite way: The cmdlet transforms the JSON string passed\
    \ as parameters or via pipe back into PSObjects or hash tables, which can then\
    \ be further processed using Select-Object, ForEach-Object, and so on.\n\nThe\
    \ following examples show some applications of the two cmdlets."
- md: "## 10.1.1 Example: Saving Event Log Entries in JSON Format\n\nThe following\
    \ command reads the last ten security-specific entries from the event log and\
    \ stores them in a JSON file:\n\n```\n> Get-EventLog Security -Newest 10 |\n \
    \ ConvertTo-Json > security-events.json\n```\n\nThe resulting *security-events.json*\
    \ file looks as follows:\n\n```\n[\n  {\n    \"EventID\": 4799,\n    \"PSComputerName\"\
    : \"localhost\",\n    \"Index\": 308255,\n    \"Message\": \"A security-enabled\
    \ local\n              group membership was ...\",\n    \"Source\": \"Microsoft-Windows-Security-Auditing\"\
    ,\n    ...\n  },\n  {\n    \"EventID\": 4799,\n    \"PSComputerName\": \"localhost\"\
    ,\n    \"Index\": 308254,\n    ...\n  }\n]\n```\n\n## 10.1.2 Example: Analyzing\
    \ Domain Queries\n\nThe second example involves the analysis of a web request.\
    \ The *https://domainsdb.info* website makes accessible a rather large (but by\
    \ no means complete!) database with public information about registered domains.\
    \ PowerShell provides a straightforward way to perform GET requests by means of\
    \ `Invoke-WebRequest`. (`Invoke-WebRequest` is roughly comparable to the Linux\
    \ commands `curl` or `wget`.) To find domains containing the *rheinwerk* string,\
    \ you would use the following commands:\n\n```\n> $url =\n  \"https://api.domainsdb.info/v1/domains/search?domain=rheinwerk\"\
    \n> Invoke-WebRequest $url\n  StatusCode        : 200\n  StatusDescription : OK\n\
    \  Content           : {\"domains\": [{\"domain\": \"rheinwerk-\n            \
    \          office.com\", \"create_date\": ...\n  ...\n```\n\nThe exciting part\
    \ of the result is accessible via the `Content` property and is in JSON format.\
    \ When formatted, the document looks as follows (heavily shortened):\n\n```\n\
    {\n  \"domains\": [\n    {\n      \"domain\": \"rheinwerk-office.com\",\n    \
    \  \"create_date\": \"2022-12-29T13:21:38.809015\",\n      \"A\": [\n        \"\
    87.106.63.234\"\n      ],\n      ...\n    },\n    {\n      \"domain\": \"rheinwerk-publishing.com\"\
    ,\n      ...\n    }, ... ]\n}\n```\n\nThe goal of this example is to filter out\
    \ only the `domain` and `A` properties (i.e., the A record entry) from the rather\
    \ large JSON document. After converting the JSON data into PowerShell objects,\
    \ this filter step can be done pretty easily:\n\n```\n> (Invoke-WebRequest $url\
    \ | ConvertFrom-Json).domains |\n  Select-Object domain, A\n\ndomain         \
    \           A\n------                    -\nrheinwerk-office.com      {87.106.63.234}\n\
    rheinwerk-publishing.com  {46.235.24.150}\nrheinwerk-verlag.com      {46.235.24.168}\n\
    ...\n```\n\n> **REST APIs**\nAn alternative to the `Invoke-WebRequest` and `ConvertFrom-Json`\
    \ combination is the `Invoke-RestMethod` command, which I will introduce in Chapter\
    \ 18. This command converts JSON documents directly into PowerShell objects.\n\
    \n## 10.1.3 Example: Converting between CSV and JSON\n\nConverting a comma-separated\
    \ values (CSV) file to JSON format is a piece of cake. The only requirement is\
    \ that the CSV file contains column labels in the first row. The starting point\
    \ for this example is the *employees.csv* file, which contains the following information:\n\
    \n```\nFirstName;LastName;DateOfBirth;Street;Zip;City;...\nRuthanne;Summers;1977-06-04;4\
    \ Dewy Turnpike;27698;Clifton ...\n...\n```\n\n`Import-Csv` converts the file\
    \ into PowerShell objects; `ConvertTo-Json` turns it into a JSON document:\n\n\
    ```\n> Import-Csv -Delimiter ';' employees.csv |\n  ConvertTo-Json > employees.json\n\
    ```\n\nBy default, `ConvertTo-Json` takes care of reader-friendly indentation\
    \ of the JSON document. If the readability of the resulting file is not an issue,\
    \ you can pass the additional `-Compress` option. The subsequent `Get-ChildItem`\
    \ proves that the amount of space saved is quite noticeable.\n\n```\n> Import-Csv\
    \ -Delimiter ';' employees.csv |\n  ConvertTo-Json -Compress > employees-compressed.json\n\
    ```\n\n```\n> Get-ChildItem *.json | Select-Object Name, Length\n```\n\n| Name\
    \ | Length |\n| --- | --- |\n| employees-compressed.json | 122528 |\n| employees.json\
    \ | 165030 |\n\nThe conversion back from JSON to CSV is equally simple, as in\
    \ the following example:\n\n```\n> Get-Content .\\employees-compressed.json |\
    \ ConvertFrom-Json |\n  Export-Csv employees2.csv\n```\n\n## 10.2 JSON and Python\n\
    \nPython and JSON together form a dream team. To process JSON documents, you must\
    \ import the `json` module. This module comes with Python by default and does\
    \ not need to be installed separately. The module provides the following functions:\n\
    \n- **load(filehandle)**\n  This function reads a text file previously opened\
    \ via `open` and returns the JSON data it contains as Python dictionaries and\
    \ lists.\n- **loads(str)**\n  In the sense of *load string*, this function expects\
    \ the JSON document in the string passed as parameter.\n- **dump(obj, filehandle)**\n\
    \  This function stores the Python object passed in the first parameter as a JSON\
    \ string in the specified file. Some additional parameters allow you to influence\
    \ the resulting JSON document. `indent=2` specifies the desired indentation depth\
    \ per nesting level. `ensure_ascii=False` ensures the correct processing of UTF-8\
    \ characters.\n- **dumps(obj)**\n  This function works like `dump` but returns\
    \ the JSON document as a string.\n\nThe following listing shows the application\
    \ of these four methods:\n\n```\n# Sample file hello-json.py\nimport json\n\n\
    # read JSON file\nwith open('employees.json', 'r') as f:\n    employees = json.load(f)\n\
    \n# process JSON string\ntxt = '{\"key1\": \"value1\", \"key2\": \"value2\"}'\n\
    data = json.loads(txt)\n\n# analysis of the data\nprint(data['key2'])   # Output:\
    \ value2\n\n# save Python object (list, dictionary) as JSON file\nwith open('otherfile.json',\
    \ 'w') as f:\n    json.dump(data, f, indent=2, ensure_ascii=False)\n\n# output\
    \ JSON string\nprint(json.dumps(data, indent=2, ensure_ascii=False))\n```\n\n\
    ### 10.2.1 Example: Collecting Birthdays\n\nThe starting point for the `birthdays.py`\
    \ script is the `employees.json` file, which has the following structure:\n\n\
    ```\n[\n  {\n    \"FirstName\": \"Ruthanne\",\n    \"LastName\": \"Ferguson\"\
    ,\n    \"DateOfBirth\": \"1977-06-04\",\n    ...\n  }, ...\n]\n```\n\nThe *birthdays.py*\
    \ script reads the JSON file and processes the employees in a loop. In this process,\
    \ a dictionary is created. The key is the day and month of the birthday (e.g.,\
    \ 06-24). The actual entry contains a list of employee names whose birthday is\
    \ on that day.\n\n```\n# Sample file birthdays.py\nimport json\nwith open('employees.json')\
    \ as f:\n    employees = json.load(f)\n\nbirthdates = {}  # birthday dictionary\n\
    for employee in employees:\n    # [5:] skips the first five characters, only month\
    \ and day\n    birthdate = employee['DateOfBirth'][5:]\n    name = employee['FirstName']\
    \ + ' ' + employee['LastName']\n    if birthdate in birthdates:\n        # add\
    \ name to existing list\n        birthdates[birthdate].append(name)\n    else:\n\
    \        # create new dictionary entry with list\n        birthdates[birthdate]\
    \ = [name]\n\n# test: all birthday children on 1/24\n# output: ['Nannette Ramsey',\
    \ 'Allena Hoorenman',\n#          'Arden Lit', 'Duncan Noel']\nprint(birthdates['01-24'])\n\
    ```\n\n### 10.2.2 Example: Determining Holidays\n\nAfter free user registration\
    \ on the https://calendarific.com website, you'll receive an API key that allows\
    \ you to determine the holidays and any other commemorative days imaginable for\
    \ a given country and year, for example, with the following command:\n\n```\n\
    $ curl 'https://calendarific.com/api/v2/holidays?api_key=1234&country=DE&year=2023'\n\
    ```\n\nThe result is a JSON document that is structured in the following way:\n\
    \n```\n{\n    \"meta\": {\n        \"code\": 200\n    },\n    \"response\": {\n\
    \        \"holidays\": [\n            {\n                \"name\": \"Name of holiday\"\
    ,\n                \"description\": \"Description of holiday\",\n            \
    \    \"date\": {\n                    \"iso\": \"2023-12-31\",\n             \
    \       \"datetime\": { ... }\n                },\n                \"type\": [\
    \ ... ]\n            }, ...\n        ]\n    }\n}\n```\n\nOur sample *holidays.py*\
    \ script expects two optional parameters: a country code and a year. If this information\
    \ is missing, the script uses 'US' and the current year by default. The script\
    \ then performs a request, analyzes the result, and returns the result in the\
    \ following format:\n\n```\n$ ./holidays.py DE 2023\nHolidays for DE in 2023\n\
    2023-01-01: New Year's Day\n    New Year's Day, which is on January 1, ...\n2023-01-06:\
    \ Epiphany\n    Epiphany on January 6 is a public holiday in 3 German states\n\
    \    and commemorates the Bible story of the Magi's visit to\n    baby Jesus.\n\
    ...\n```\n\n> **Limitations**\nThe use of https://calendarific.com is free of\
    \ charge after a simple registration form but is subject to various restrictions.\
    \ Commercial use is allowed only upon payment of a monthly fee.\n\nThe script\
    \ starts with the import of various modules and the initialization of the api_key,\
    \ country, and year variables. A loop analyzes all parameters passed to the script\
    \ and overwrites year or country if necessary.\n\n```\n# Sample file holidays.py\n\
    import datetime, json, sys, urllib.request\n\n# Please use your own key that you\n\
    # can obtain free of charge at https://calendarific.com.\napi_key = \"xxx\"\n\
    ```"
  mdcn: "## 10.1.1 示例：以 JSON 格式保存事件日志条目\n\n以下命令从事件日志中读取最近十条安全相关的条目，并将其存储到一个 JSON 文件中：\n\
    \n```\n> Get-EventLog Security -Newest 10 |\n  ConvertTo-Json > security-events.json\n\
    ```\n\n生成的 *security-events.json* 文件内容如下所示：\n\n```\n[\n  {\n    \"EventID\": 4799,\n\
    \    \"PSComputerName\": \"localhost\",\n    \"Index\": 308255,\n    \"Message\"\
    : \"A security-enabled local\n              group membership was ...\",\n    \"\
    Source\": \"Microsoft-Windows-Security-Auditing\",\n    ...\n  },\n  {\n    \"\
    EventID\": 4799,\n    \"PSComputerName\": \"localhost\",\n    \"Index\": 308254,\n\
    \    ...\n  }\n]\n```\n\n## 10.1.2 示例：分析域名查询\n\n第二个示例涉及分析一个 Web 请求。*https://domainsdb.info*\
    \ 网站提供了一个相当大（但绝非完整！）的公共注册域名信息数据库。PowerShell 通过 `Invoke-WebRequest` 提供了一种执行 GET\
    \ 请求的直接方法。（`Invoke-WebRequest` 大致相当于 Linux 命令 `curl` 或 `wget`。）要查找包含 *rheinwerk*\
    \ 字符串的域名，你可以使用以下命令：\n\n```\n> $url =\n  \"https://api.domainsdb.info/v1/domains/search?domain=rheinwerk\"\
    \n> Invoke-WebRequest $url\n  StatusCode        : 200\n  StatusDescription : OK\n\
    \  Content           : {\"domains\": [{\"domain\": \"rheinwerk-\n            \
    \          office.com\", \"create_date\": ...\n  ...\n```\n\n结果中令人兴奋的部分可以通过 `Content`\
    \ 属性访问，并且是 JSON 格式。格式化后，文档内容如下（已大幅缩减）：\n\n```\n{\n  \"domains\": [\n    {\n  \
    \    \"domain\": \"rheinwerk-office.com\",\n      \"create_date\": \"2022-12-29T13:21:38.809015\"\
    ,\n      \"A\": [\n        \"87.106.63.234\"\n      ],\n      ...\n    },\n  \
    \  {\n      \"domain\": \"rheinwerk-publishing.com\",\n      ...\n    }, ... ]\n\
    }\n```\n\n本示例的目标是从这个相当大的 JSON 文档中仅筛选出 `domain` 和 `A` 属性（即 A 记录条目）。将 JSON 数据转换为\
    \ PowerShell 对象后，这个筛选步骤可以非常容易地完成：\n\n```\n> (Invoke-WebRequest $url | ConvertFrom-Json).domains\
    \ |\n  Select-Object domain, A\n\ndomain                    A\n------        \
    \            -\nrheinwerk-office.com      {87.106.63.234}\nrheinwerk-publishing.com\
    \  {46.235.24.150}\nrheinwerk-verlag.com      {46.235.24.168}\n...\n```\n\n> **REST\
    \ API**\n`Invoke-WebRequest` 和 `ConvertFrom-Json` 组合的替代方案是 `Invoke-RestMethod`\
    \ 命令，我将在第 18 章介绍。该命令可将 JSON 文档直接转换为 PowerShell 对象。\n\n## 10.1.3 示例：在 CSV 和 JSON\
    \ 之间转换\n\n将逗号分隔值（CSV）文件转换为 JSON 格式是小菜一碟。唯一的要求是 CSV 文件的第一行包含列标签。本示例的起点是 *employees.csv*\
    \ 文件，其中包含以下信息：\n\n```\nFirstName;LastName;DateOfBirth;Street;Zip;City;...\nRuthanne;Summers;1977-06-04;4\
    \ Dewy Turnpike;27698;Clifton ...\n...\n```\n\n`Import-Csv` 将文件转换为 PowerShell\
    \ 对象；`ConvertTo-Json` 将其转换为 JSON 文档：\n\n```\n> Import-Csv -Delimiter ';' employees.csv\
    \ |\n  ConvertTo-Json > employees.json\n```\n\n默认情况下，`ConvertTo-Json` 会处理 JSON\
    \ 文档的易读缩进。如果生成的文件的可读性不是问题，你可以传递额外的 `-Compress` 选项。随后的 `Get-ChildItem` 证明节省的空间相当可观。\n\
    \n```\n> Import-Csv -Delimiter ';' employees.csv |\n  ConvertTo-Json -Compress\
    \ > employees-compressed.json\n```\n\n```\n> Get-ChildItem *.json | Select-Object\
    \ Name, Length\n```\n\n| Name | Length |\n| --- | --- |\n| employees-compressed.json\
    \ | 122528 |\n| employees.json | 165030 |\n\n从 JSON 转换回 CSV 同样简单，如下例所示：\n\n```\n\
    > Get-Content .\\employees-compressed.json | ConvertFrom-Json |\n  Export-Csv\
    \ employees2.csv\n```\n\n## 10.2 JSON 与 Python\n\nPython 和 JSON 共同组成了一个梦幻组合。要处理\
    \ JSON 文档，你必须导入 `json` 模块。该模块是 Python 的默认组件，无需单独安装。该模块提供以下函数：\n\n- **load(filehandle)**\n\
    \  此函数读取先前通过 `open` 打开的文本文件，并将其包含的 JSON 数据作为 Python 字典和列表返回。\n- **loads(str)**\n\
    \  从 *load string* 的意义上讲，此函数期望参数传递的字符串中包含 JSON 文档。\n- **dump(obj, filehandle)**\n\
    \  此函数将第一个参数传入的 Python 对象作为 JSON 字符串存储在指定文件中。一些额外的参数允许你影响生成的 JSON 文档。`indent=2`\
    \ 指定每个嵌套级别的所需缩进深度。`ensure_ascii=False` 确保正确处理 UTF-8 字符。\n- **dumps(obj)**\n  此函数的工作方式类似于\
    \ `dump`，但将 JSON 文档作为字符串返回。\n\n以下代码清单展示了这四个方法的应用：\n\n```\n# 示例文件 hello-json.py\n\
    import json\n\n# 读取 JSON 文件\nwith open('employees.json', 'r') as f:\n    employees\
    \ = json.load(f)\n\n# 处理 JSON 字符串\ntxt = '{\"key1\": \"value1\", \"key2\": \"\
    value2\"}'\ndata = json.loads(txt)\n\n# 分析数据\nprint(data['key2'])   # 输出: value2\n\
    \n# 将 Python 对象（列表、字典）保存为 JSON 文件\nwith open('otherfile.json', 'w') as f:\n  \
    \  json.dump(data, f, indent=2, ensure_ascii=False)\n\n# 输出 JSON 字符串\nprint(json.dumps(data,\
    \ indent=2, ensure_ascii=False))\n```\n\n### 10.2.1 示例：收集生日\n\n`birthdays.py`\
    \ 脚本的起点是 `employees.json` 文件，其结构如下：\n\n```\n[\n  {\n    \"FirstName\": \"Ruthanne\"\
    ,\n    \"LastName\": \"Ferguson\",\n    \"DateOfBirth\": \"1977-06-04\",\n   \
    \ ...\n  }, ...\n]\n```\n\n*birthdays.py* 脚本读取 JSON 文件并循环处理员工。在此过程中，会创建一个字典。键是生日的月份和日期（例如\
    \ 06-24）。实际条目包含一个员工姓名列表，这些员工的生日在该日期。\n\n```\n# 示例文件 birthdays.py\nimport json\n\
    with open('employees.json') as f:\n    employees = json.load(f)\n\nbirthdates\
    \ = {}  # 生日字典\nfor employee in employees:\n    # [5:] 跳过前五个字符，只取月份和日期\n    birthdate\
    \ = employee['DateOfBirth'][5:]\n    name = employee['FirstName'] + ' ' + employee['LastName']\n\
    \    if birthdate in birthdates:\n        # 将姓名添加到现有列表\n        birthdates[birthdate].append(name)\n\
    \    else:\n        # 创建新的字典条目，值为列表\n        birthdates[birthdate] = [name]\n\n\
    # 测试：所有在 1/24 过生日的人\n# 输出: ['Nannette Ramsey', 'Allena Hoorenman',\n#        \
    \  'Arden Lit', 'Duncan Noel']\nprint(birthdates['01-24'])\n```\n\n### 10.2.2\
    \ 示例：确定节假日\n\n在 https://calendarific.com 网站免费注册用户后，你将收到一个 API 密钥，该密钥允许你确定给定国家和年份的节假日以及任何其他可想象的纪念日，例如，使用以下命令：\n\
    \n```\n$ curl 'https://calendarific.com/api/v2/holidays?api_key=1234&country=DE&year=2023'\n\
    ```\n\n结果是一个 JSON 文档，其结构如下：\n\n```\n{\n    \"meta\": {\n        \"code\": 200\n\
    \    },\n    \"response\": {\n        \"holidays\": [\n            {\n       \
    \         \"name\": \"Name of holiday\",\n                \"description\": \"\
    Description of holiday\",\n                \"date\": {\n                    \"\
    iso\": \"2023-12-31\",\n                    \"datetime\": { ... }\n          \
    \      },\n                \"type\": [ ... ]\n            }, ...\n        ]\n\
    \    }\n}\n```\n\n我们的示例 *holidays.py* 脚本期望两个可选参数：国家代码和年份。如果缺少此信息，脚本默认使用 'US' 和当前年份。然后脚本执行请求，分析结果，并以以下格式返回结果：\n\
    \n```\n$ ./holidays.py DE 2023\nHolidays for DE in 2023\n2023-01-01: New Year's\
    \ Day\n    New Year's Day, which is on January 1, ...\n2023-01-06: Epiphany\n\
    \    Epiphany on January 6 is a public holiday in 3 German states\n    and commemorates\
    \ the Bible story of the Magi's visit to\n    baby Jesus.\n...\n```\n\n> **限制**\n\
    使用 https://calendarific.com 在简单注册后是免费的，但受各种限制。商业用途仅在支付月费后才被允许。\n\n该脚本以导入各种模块和初始化\
    \ api_key、country 和 year 变量开始。一个循环分析传递给脚本的所有参数，并在必要时覆盖 year 或 country。\n\n```\n\
    # 示例文件 holidays.py\nimport datetime, json, sys, urllib.request\n\n# 请使用你自己的密钥，你可以在\n\
    # https://calendarific.com 免费获取。\napi_key = \"xxx\"\n```"
