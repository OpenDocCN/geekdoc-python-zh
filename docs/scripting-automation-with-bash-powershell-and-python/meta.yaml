- md: "## 20.2 Example: Uploading Encrypted Backup Files to the Cloud\n\nIn Chapter\
    \ 15, Section 15.2, I introduced you to a script that stores backups of a MySQL\
    \ server database and web server directory in a local directory. With just a little\
    \ effort, you can improve this script to compress the local files first and then\
    \ upload them to an AWS bucket. Because the script is quite short, I have printed\
    \ the entire code again here. Let me also briefly point out a few special features:\n\
    \n- The encryption commands are wrapped in functions.\n- The functions are called\
    \ in a pipe: `mysqldump` creates the backup, `gzip` compresses it, and `mycrypt`\
    \ encrypts it. Only the result is saved in a file. This approach avoids the time-consuming\
    \ creation of intermediate files.\n- Similarly, `tar` creates a compressed archive.\
    \ `-f -` forwards it to standard output. `mycrypt` encrypts it and again saves\
    \ the result to a file.\n- When calling `aws`, I specified the full path of the\
    \ command in each case, so that the script works without errors even when automated\
    \ by cron.\n- Unlike the usual `cp` command where you can copy multiple files\
    \ to a destination directory (i.e., `cp file1 file2 file3 dir`), `aws s3 cp` accepts\
    \ only one source file. For this reason, I must call the command for each file\
    \ separately.\n\n```\n# Sample file lamp-backup-to-aws.sh\nBACKUPDIR=/localbackup\n\
    DB=wp\nDBUSER=wpbackupuser\nWPDIR=/var/www/html/wordpress\nBUCKET=s3://your.bucket.name\n\
    \nfunction mycrypt {\n    gpg -c -q --batch --cipher-algo AES256 --compress-algo\
    \ none \\\n        --passphrase-file /etc/mykey\n}\nfunction myuncrypt {\n   \
    \ gpg -d --batch --no-tty -q --cipher-algo AES256 \\\n        --compress-algo\
    \ none --passphrase-file /etc/mykey\n}\n\n# MySQL backup\nweekday=$(date +%u)\n\
    dbfile=$BACKUPDIR/wp-db-$weekday.sql.gz.crypt\nmysqlopt='--single-transaction'\n\
    mysqldump -u $DBUSER $mysqlopt $DB | gzip -c | mycrypt > $dbfile\n\n# backup of\
    \ the WordPress files\nhtmlfile=$BACKUPDIR/wp-html-$weekday.tar.gz.crypt\ntar\
    \ czf - -C $WPDIR . | mycrypt > $htmlfile\n\n# upload to an AWS bucket\n/usr/local/bin/aws\
    \ s3 cp $dbfile   $BUCKET\n/usr/local/bin/aws s3 cp $htmlfile $BUCKET\n```\n\n\
    > **Checking the Recovery**\n> When your backup script is ready, you should make\
    \ sure to test if you can restore your data from the backups!\n\n## 20.3 AWS PowerShell\
    \ Module\n\nBasically, there is nothing wrong with calling the AWS CLI described\
    \ earlier (i.e., the `aws` command) in PowerShell scripts. But an even more elegant\
    \ way is available: Amazon provides several modules for various AWS services.\
    \ These modules are referred to as *AWS Tools for PowerShell*. The modules are\
    \ excellently maintained and usually updated once or twice a week. Because the\
    \ AWS Tools for PowerShell return real PowerShell objects, you can often express\
    \ your scripts more clearly than with by using AWS CLI.\nYou can easily install\
    \ the tools using `Install-Module`, and not only on Windows, by the way, but also\
    \ on Linux and macOS:\n\n```\n> Install-Module AWS.Tools.Common\n> Install-Module\
    \ AWS.Tools.S3\n```\n\n### 20.3.1 Getting Started\n\nAs with the AWS CLI, I assume\
    \ in the following sections that there is an AWS user with sufficient access rights\
    \ to one or more buckets. You must now specify its *access key* and *secret key*\
    \ via `Set-AWSCredentials`. You can also specify a profile name. This step allows\
    \ you to use separate access data for different scripts. By using `-StoreAs default`,\
    \ you can create a default profile.\n\n```\n> Set-AWSCredential -AccessKey AKxxxx\
    \ -SecretKey xxxx `\n    -StoreAs MyProfile\n```\n\nOn Windows, access data is\
    \ stored encrypted in the following file:\n`C:\\Users\\<name>\\AppData\\Local\\\
    AWSToolkit\\RegisteredAccounts.json`\n\nOn Linux and macOS, the location is `.aws/credentials`\
    \ as for the AWS CLI; the keys are stored in plain text.\n\nTo test if the configuration\
    \ worked, you must run `Get-S3Bucket`. The cmdlet lists your buckets.\n\n```\n\
    > Get-S3Bucket -ProfileName MyProfile\n> Get-S3Bucket                    # for\
    \ the default profile\n```\n\nIn the remaining examples, I will assume that you\
    \ have set up a profile named `default`. If not the case, you must add the `-ProfileName`\
    \ option with your profile name to all cmdlets. Alternatively, you can preset\
    \ the desired profile at the beginning of a session or script using `Set-AWSCredential`:\n\
    \n```\n> Set-AWSCredential -ProfileName MyProfile\n```\n\nIf you want to know\
    \ in which region your buckets are located, you must run `Get-S3BucketLocation`.\
    \ Note that the cmdlet will return an empty result if the bucket is in the US-East\
    \ (North Virginia) region (`us-east-1`).\n\n```\n> Get-S3Bucket | ForEach-Object\
    \ {\n    $name = $_.BucketName\n    $region = Get-S3BucketLocation -BucketName\
    \ $name\n    Write-Output \"$name : $region\"\n}\n\nmy.first.bucket : eu-central-1\n\
    my.other.bucket : eu-west-2\n...\n```\n\nThe content of a bucket is displayed\
    \ via `Get-S3Object`, which might be a bit more detailed than you need:\n\n```\n\
    > Get-S3Object -BucketName my.first.bucket -Region eu-central-1\n\n    ChecksumAlgorithm\
    \ : {}\n    ETag              : \"b81e...\"\n    BucketName        : my.first.bucket\n\
    \    Key               : duplicati1.png\n    LastModified       : 13.05.2019 21:36:35\n\
    \    Owner              : Amazon.S3.Model.Owner\n    Size               : 31729\n\
    \    StorageClass       : STANDARD\n\n    ChecksumAlgorithm  : {}\n    ETag  \
    \             : \"ab98\"\n    ...\n```\n\nProbably you're only interested in the\
    \ filenames (Key property). Also, only in rare cases will you really need *all*\
    \ the files from a bucket. (In fact, the cmdlet returns a maximum of 1,000 hits.)\
    \ The following command returns only the names of all files starting with dir1/:\n\
    \n```\n> Get-S3Object -BucketName my.first.bucket -KeyPrefix 'dir1/' |\n  Select-Object\
    \ Key\n```\n\nUnfortunately, `Get-S3Object` does not provide a way to filter files\
    \ by other criteria. As long as you do not exceed the 1,000-file limit, you must\
    \ determine *all* filenames and then apply `Filter-Object`. The following command\
    \ displays the names of all files ending with .txt:\n\n```\n> Get-S3Object -BucketName\
    \ my.first.bucket |\n  Select-Object Key |\n  Where-Object { $_.Key -like '*.txt'\
    \ }\n```\n\nRelatively often, you may find that `Get-S3Object` or various other\
    \ cmdlets return the following error message: *The bucket you're attempting to\
    \ access must be addressed using the specified endpoint.*\n\nThe error indicates\
    \ that you forgot the `-Region` option and AWS does not know where your bucket\
    \ is located. Since constantly specifying the `-Region` option is annoying, you\
    \ can set the default region for the current session or for your script via `Set-DefaultAWSRegion`.\n\
    \n```\n> Set-DefaultAWSRegion -Region eu-central-1\n```\n\n### 20.3.2 Copying\
    \ Files\n\nProbably the most common task when using AWS S3 is to upload and download\
    \ files to and from the cloud. `Write-S3Object` and `Read-S3Object` are used for\
    \ this purpose:\n\n- The first command uploads a local file to a bucket. The key\
    \ name in the bucket matches that of the local file.\n- The second command uploads\
    \ another file but assigns a different name to the file in the bucket (-Key option)."
