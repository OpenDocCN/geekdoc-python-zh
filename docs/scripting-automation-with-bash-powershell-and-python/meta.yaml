    \      grep $1 | grep $2 | tail -n 1)\n# extract items from result\ncountry=$(echo\
    \ $data | cut -d ',' -f 1)\nyear=$(echo $data | cut -d ',' -f 2)\nenergy=$(echo\
    \ $data | cut -d ',' -f 4)\n# output result\nif [ \"$country\" ] && [ \"$energy\"\
    \ ]; then\n  echo \"Primary energy consumption per person for $country in $year:\
    \ \"\n  echo \"$energy kWh/a\"\nelse\n  echo \"Sorry, no data found for $1 $2.\"\
    \nfi\n```\n\n## 8.3 Example: ping Analysis\n\nYou can use the `ping` command to\
    \ check the network connection to another computer. The `-c` option specifies\
    \ how many Internet Control Message Protocol (ICMP) packets are to be sent in\
    \ the process (i.e., after how many attempts `ping` will terminate). Without the\
    \ option, `ping` runs on Linux and macOS until you terminate the command via `Ctrl`\
    \ + `C`. The following listing shows a typical `ping` result:\n\n```\n$ ping -c\
    \ 4 google.com\n\nPING google.com(bud02s41-in-x0e.1e100.net\n  (2a00:1450:400d:802::200e))\
    \ 56 data bytes\n64 bytes from bud02s41-...: icmp_seq=1 ttl=117 time=15.4 ms\n\
    64 bytes from bud02s41-...: icmp_seq=2 ttl=117 time=17.4 ms\n64 bytes from bud02s41-...:\
    \ icmp_seq=3 ttl=117 time=17.3 ms\n64 bytes from bud02s41-...: icmp_seq=4 ttl=117\
    \ time=15.6 ms\n\n--- google.com ping statistics ---\n4 packets transmitted, 4\
    \ received, 0% packet loss, time 3006ms\nrtt min/avg/max/mdev = 15.434/16.431/17.382/0.914\
    \ ms\n```\n\nNote that some servers are configured to send no response at all\
    \ to `ping` requests (supposedly for security reasons). A prominent example is\
    \ Microsoft (i.e., microsoft.com). Imagine you want to extract only the average\
    \ response time from this result; in the previous listing, the value is 16,431\
    \ milliseconds. For this task, you first must filter the last line from the result\
    \ using `grep`. Then, you can use `cut` to filter the fifth column from the result,\
    \ using `/` as the separator:\n\n```\n$ ping -c 4 google.com | grep avg | cut\
    \ -d '/' -f 5\n\n16.431\n```\n\nIf you specify the additional -s option for cut,\
    \ you can even omit grep. The -s option causes cut to consider only those result\
    \ lines in which the column separator (in this case, /) occurs.\n\n```\n$ ping\
    \ -c 4 google.com | cut -s -d '/' -f 5\n```\n\n### 8.3.1 ping Call via Script\n\
    \nNow, you can include the ping call in a script and pass the hostname of the\
    \ computer. The script checks that exactly one parameter is passed and outputs\
    \ the result properly formatted:\n\n```\n# Sample file ping-avg.sh\nif [ $# -ne\
    \ 1 ]; then\n  echo \"usage: ./ping-avg.sh <hostname>\"\n  exit 2\nelse\n  hostname=$1\n\
    fi\navg=$(ping -c 4 $hostname | cut -s -d '/' -f 5)\necho \"Average ping time\
    \ for $hostname is $avg ms\"\n```\n\nIn my test call, the server of python.org\
    \ responded slightly more quickly than Google's server:\n\n```\n$ ./ping-avg.sh\
    \ python.org\n\nAverage ping time for python.org is 12.796 ms\n```\n\nA conceivable\
    \ extension of the script would be the processing of multiple hostnames. The script\
    \ then expects any number of parameters (at least one), as in the following example:\n\
    \n```\n#!/bin/bash\n# Sample file ping-avg.sh\nif [ $# -lt 1 ]; then\n  echo \"\
    usage: ./ping-avg.sh <hostnames>\"\n  exit 2\nfi\nfor hostname in $*; do\n  avg=$(ping\
    \ -c 4 $hostname | cut -s -d '/' -f 5)\n  echo \"Average ping time for $hostname\
    \ is $avg ms\"\ndone\n```\n\nA test call looks like the following:"
