    \ are shown in the following excerpt:\n\n```\n# Sample file upload-images-remoting.ps1\n\
    ...\n$session = New-PSSession $remotehost -Username $remoteuser\nGet-ChildItem\
    \ -Path $localdir/* `\n    -Include \"*.jpg\", \"*.jpeg\", \"*.png\" |\nWhere-Object\
    \ { $_.LastWriteTime -gt $lastruntime } |\nForEach-Object {\n    Copy-Item -ToSession\
    \ $session $_ $remotedir\n}\nRemove-PSSession $session\n```\n\n# 12.6 Example:\
    \ Analyzing Virtual Machines\n\nOur second example is about reading information\
    \ from a group of similar virtual machines. In this specific case, the virtual\
    \ machines formed the basis of a laboratory exercise at a technical college. Each\
    \ student had access to a virtual machine. When setting up these virtual machines,\
    \ I made sure I put the public part of my SSH key there. The virtual machines\
    \ are accessible under the hostnames `host<nn>.mylab.com`.\n\nFor a quick overview\
    \ of how virtual disks and file systems are organized, I want to run the `lsblk`\
    \ command on each instance, which can be done using a Bash one-liner (but is printed\
    \ over four lines for space and readability). Due to the `-o StrictHostKeyChecking=no`\
    \ option, `ssh` does not ask whether the host should be trusted the first time\
    \ a connection is established.\n\n```\n$ for i in {01..25}; do\n    echo \"\\\
    n\\nVM: $i\";\n    ssh user@host$i.mylab.com -o StrictHostKeyChecking=no lsblk;\n\
    done\n```"
