  md: '# 4.5.2 Trouble with the Execution Policy


    Depending on the Windows version, your first attempt to run a custom script will
    fail with the following error message:


    ```

    > .\Hello.ps1:


    File C:\Users\kofler\Documents\Hello.ps1 cannot be loaded because running scripts
    is disabled on this system.

    For more information, see about_Execution_Policies at https://go.microsoft.com/fwlink/?LinkID=135170

    ```


    The cause of this error message is what’s called the *execution policy*. This
    policy specifies the circumstances under which scripts are allowed to run on Windows.
    There are four possible settings:


    +   - **Restricted**: No scripts can be executed at all.

    - **AllSigned**: Only signed scripts can be executed.

    - **RemoteSigned**: All custom scripts can be executed, but installed or downloaded
    scripts can be executed only if they have been signed.

    - **Unrestricted**: All scripts can be executed.


    Usually `RemoteSigned` applies on Windows Server, but `Restricted` applies for
    desktop versions:


    ```

    > Get-ExecutionPolicy

    Restricted

    ```


    For this reason, on many Windows installations, scripts cannot be run at all.
    For security reasons, this default setting makes sense, but it is of course unsuitable
    for learning scripting. The following command allows the execution of custom scripts
    as well as signed foreign scripts for the current user:


    ```

    > Set-ExecutionPolicy -Scope CurrentUser RemoteSigned

    ```


    You can also run the above command without the `-Scope CurrentUser` option—then,
    the setting will apply to all users of the computer. However, changing the execution
    policy at the system level is only allowed if you run PowerShell or Windows Terminal
    with admin privileges.


    > **Even More Setting Options**

    The execution policy can be configured at different levels (machine, user, process).
    Details about the configuration options can be found at https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_execution_policies.'
  merge: -1
  pgno: 115
