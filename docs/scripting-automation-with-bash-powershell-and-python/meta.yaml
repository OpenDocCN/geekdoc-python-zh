  md: '# Chapter 3

    Bash and Zsh


    Bash (Bourne Again Shell) is the default shell of most Linux distributions. It
    performs two tasks: On the one hand, it accepts commands in the terminal, executes
    these commands, and displays their results. On the other hand, Bash is considered
    *the* classic scripting programming language. In this chapter, I will only briefly
    discuss the interactive application; instead, I''ll focus on introducing you to
    the main concepts behind Bash.


    As an alternative to Bash, Zsh is gaining momentum. While the differences compared
    to Bash in script programming are negligible, Zsh scores points with many small
    improvements in interactive operations. Popular extensions (such as one called
    *Oh My Zsh*) make Zsh even more comfortable and improve its appearance. On macOS,
    Zsh has been the default shell since 2019. On Linux, the switch from Bash to Zsh
    can be made in a minute if necessary.


    # 3.1 Terminal, Shell, and Bash


    So far, some terms have appeared that I want to explain again briefly now. Let''s
    start with the terminal: In this program, you can execute text-based commands.
    On Linux and macOS, the existence of the terminal was always a matter of course.
    While a *terminal* program is available on macOS, there are countless programs
    to choose from on Linux. The most common ones include `gnome-terminal`, the new
    console of the GNOME Project (program name `kgx`), as well as `konsole`. Even
    on Windows, the *Windows Terminal* is available now.


    Inside the terminal, the shell is running: This shell is a program that takes
    your text input, executes the resulting command, and displays the result back
    in text form. The shell also provides a lot of additional features that are not
    obvious at first glance: It can redirect the results of a command to a file, link
    several commands together, and so on.


    In the early history of Unix and Linux, shells have been developed multiple times:
    Bourne Shell, C Shell, Bash, Dash, Zsh, and so on. However, this chapter only
    deals with the two currently most popular shells—Bash and Zsh.'
  merge: -1
  pgno: 48
- img_proc: true
  md: '> **Why the Separation between Terminal and Shell?**


    The nesting of terminal and shell seems confusing at first sight. This separation
    stems from the fact that the terminal is only necessary when you work on a graphical
    desktop system. But most operating systems can also be controlled in text mode
    or via a network connection (SSH)—then the shell runs *without a terminal*!


    The separation between terminal and shell has a further advantage in that you
    can combine your favorite terminal with your favorite shell, deviating from the
    default settings of Linux or macOS. This freedom is especially important to Linux
    professionals.


    # 3.1.1 Determining the Current Shell


    To determine which shell is running on your machine, you must run the `echo $SHELL`
    command, which displays the contents of the `$SHELL` variable that specifies the
    path to your account’s default shell. If the shell running is Bash, you can access
    its version number with the second command, `bash --version`.


    ![](img/a7fa45d496335c22ffb14c3275e24ffb_49_0.png)


    Figure 3.1 Computer Running Bash Version 5.1


    # 3.2 Installation


    Almost all Linux distributions have Bash preinstalled. Thus, if you work on Linux,
    this section is unnecessary. If your distribution uses Zsh, I recommend you keep
    using it for its interactive features. However, to develop scripts that are as
    portable as possible, the parallel installation of Bash is recommended. This parallel
    installation can be achieved with the package management command for your distribution;
    for example, on Debian and Ubuntu, you would use `sudo apt install bash`.


    On macOS, Bash is only available in the outdated version 3.2. In future versions
    of macOS, Bash is expected to be removed entirely. In this respect, Zsh represents
    a compatible, and in many ways even better, replacement. If you prefer Bash or
    use it for script programming, the best approach is to set up the *Homebrew* package
    manager'
  merge: -1
