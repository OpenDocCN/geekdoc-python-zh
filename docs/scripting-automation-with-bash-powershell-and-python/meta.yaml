    # 3.10.7 Heredocs and Herestrings


    Here documents (heredocs, for short) are blocks of text embedded in the script
    that end with the character sequence specified by << (often EOF for end of file).
    The following example illustrates the syntax very clearly. (The mail command is
    based on the assumption that a mail server is running on the machine.)


    ```

    name="Michael"

    amount=1200

    to="spamvictim@spamforever.com"


    mail -s "Invest safely" $to << EOF

    Hello $name, enclosed is a great investment offer

    without any risk. If you transfer $amount US$ to this account

    you''ll get ...

    EOF

    ```


    You can easily execute multiline text output via cat, as in the following example:


    ```

    cat << EOF

    This is

    a long

    help text

    EOF

    ```


    Internally, heredocs are a special type of input redirection. mail or cat expects
    the mail text from standard input. Instead, the following text lines are used,
    with the usual variable substitution ($name, $amount) taking place in the text.'
