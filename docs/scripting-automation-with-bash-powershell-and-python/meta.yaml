    ----           ----------    ----------

    Target         AliasProperty Target = LinkTarget

    LinkType       CodeProperty  System.String LinkType{get=...;}

    AppendText     Method        System.IO.StreamWriter AppendText()

    ...

    ```


    ## 4.4 Combining Commands


    You now know how to run individual commands. But the great art of script programming
    is to combine multiple commands in a meaningful way. The && and || operators are
    available only from PowerShell version 7 onwards.


    | Syntax | Function |

    | :--- | :--- |

    | `command1 | command2` | command2 **processes the results** of command1. |

    | `command1 ; command2` | **First run** command1, **then** command2 (**even if**
    command1 **has triggered an error**). |

    | `command1 && command2` | **First run** command1, **then** command2 (**only if**
    command1 **did not cause an error**). |

    | `command1 || command2` | **First run** command1; command2 **will be run only
    if** command1 **has triggered an error**. |


    Table 4.1 Combining Commands


    In this section, I will focus on the pipe operator (|), which is most important
    in real-life scenarios. Further processing of intermediate results requires that
    the second command can cope with the result data type of the first command.


    Note that cmdlets always return objects internally. These objects usually contain
    many more properties than are displayed on the screen. The screen output is optimized
    to provide a (reasonably) clear result for users. Many properties of the objects
    are omitted. If you want to view the result with all details, you need to pass
    the output to `Format-List` or to `Get-Member`. Try, for example, `Get-ChildItem
    | Format-List` or `Get-Process | Get-Member`!


    In the following example, `Get-Process` determines all processes of the Microsoft
    Edge browser. The process objects are redirected to `Stop-Process`; this command
    terminates the web browser, if it is running.


    ```

    > Get-Process msedge | Stop-Process

    ```'
