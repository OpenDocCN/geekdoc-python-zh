    \ who is allowed to read, write, and execute which files on Linux or macOS. Along\
    \ with each file, nine access bits are stored, namely r (read), w (write), and\
    \ x (execute) for the owner of the file, for all members of the group to which\
    \ this file is assigned and finally for all other accounts.\n\nFor example, the\
    \ /etc/shadow system file, which contains hash codes for passwords on Linux, belongs\
    \ to the root user and is assigned to the shadow group. root can read and modify\
    \ the file, members of the shadow group can read it, and all other users have\
    \ no rights. You can determine all this information using ls -l:\n\n```\n$ ls\
    \ -l /etc/shadow\n\n-rw-r-----   root shadow   ... shadow\n\n^^^         rights\
    \ for owners\n   ^^^      rights for group members\n      ^^^   rights for other\
    \ users\n         ^^^^   assigned owner\n            ^^^^^^^   assigned group\n\
    \                  ^^^   time (not shown)\n                     ^^^^^^^ filename\n\
    ```\n\nThe chown (change owner), chgrp (change group), and chmod (change mode)\
    \ commands allow you to change the assignment of a file to its owner, the assigned\
    \ group as well as the access rights. All this data can also be changed for directories,\
    \ although the execute bit x has a different meaning for directories: It allows\
    \ the use of this directory (i.e., cd directory).\n\nThe following three lines\
    \ show simple examples of how to use chown, chgrp, and chmod: The first command\
    \ makes the peter account the owner of the /var/www/html/index.html file. The\
