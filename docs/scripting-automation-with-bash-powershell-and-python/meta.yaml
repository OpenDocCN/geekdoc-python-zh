  - '[PAGE 126]


    Often, PowerShell variables contain objects (see also the following section).
    Intuitive access to their properties also fails. Instead, PowerShell outputs the
    contents of the variable and then the property name:


    ```

    > $process = Get-Process | Select-Object -First 1


    > Write-Output "Process name: $process.ProcessName" # Error

    Process name:

    System.Diagnostics.Process (AggregatorHost).ProcessName

    ```


    The solution in this case is what''s called *command substitution* with the `$(
    expr )` syntax. The `expr` expression is analyzed, and its result is inserted
    into the string. The expression does not have to reference existing variables—any
    cmdlet can be executed: The spaces before and after the parentheses are optional
    but can improve readability. The following listing shows some examples of command
    substitution:


    ```

    > Write-Output "Account name: $( $account.ToLower() )"

    Account name: maria


    > Write-Output "Process name: $( $process.ProcessName )"

    Process name: AggregatorHost


    > Write-Output "Date and time: $(Get-Date)"

    Date and time: 02/12/2023 10:08:34


    > $now = Get-Date

    > "Time in two hours: $($now.AddHours(2).ToShortTimeString())"

    Time in two hours: 12:08

    ```


    # 4.6.5 Objects


    Most cmdlets do not return strings like commands in conventional shells but return
    full-fledged objects. For example, `Get-Process` returns an array of `Process`
    objects. You can use `Select-Object` to pick one object and then use `Get-Member`
    to view its properties and methods:


    ```

    > Get-Process | Select-Object -First 1 | Get-Member


    TypeName: System.Diagnostics.Process


    Name        MemberType   Definition

    ----        ----------   ----------

    Handles     AliasProperty Handles = Handlecount

    Name        AliasProperty Name = ProcessName

    NPM         AliasProperty NPM = NonpagedSystemMem…

    …

    ```'
- md: "## 4.6.6 Assembling Custom Objects\n\nNot only can you process objects from\
    \ given classes in your scripts, but you can also return results yourself in the\
    \ form of your own ad hoc assembled objects. The easiest way to do this is to\
    \ use a PSCustomObject as a basis, as in the following example:\n\n```\n$MyObject\
    \ = [PSCustomObject]@{\n    UserName = \"Michael\"\n    UserId   = 123\n}\n```\n\
    \nOften a hash table (i.e., a simple key-value store) serves the same purpose.\
    \ The main advantage is that the typing effort is somewhat lower:\n\n```\n$Data\
    \ = @{\n    UserName = \"Michael\"\n    UserId = 123\n}\n```\n\nIf you want to\
    \ save lines, you can separate the key-value pairs by semicolons:\n\n```\n$Data\
    \ = @{ UserName = \"Michael\"; UserId = 123 }\n```\n\n## 4.6.7 Predefined Variables\n\
    \nNormally, you must take care of the initialization of your variables yourself.\
    \ However, a number of predefined variables, called *automatic variables*, are\
    \ available in the PowerShell terminology. These variables contain information\
    \ about PowerShell, the state of the current script, and so on.\n\n| Variable\
    \ | Contents |\n| :--- | :--- |\n| `$?` | Status of the last executed command\
    \ (`$false` if an error occurred) |\n| `$_` | The current object being processed\
    \ by a pipe (`$PSITEM`) |\n| `$args` | Array with the parameters passed to a script\
    \ or function |\n| `$Error` | Object, describes the last error that occurred |\n\
    | `$Event` | Object, describes the currently processed event |\n| `$false` | Boolean\
    \ state “false” |\n| `$HOME` | String with the home directory of the current user\
    \ |\n| `$input` | Data passed to a function via standard input (pipe) |\n| `$IsLinux`\
    \ | `$true` if PowerShell is running on Linux |\n| `$IsMacOS` | `$true` if PowerShell\
    \ is running on macOS |\n| `$IsWindows` | `$true` if PowerShell is running on\
    \ Windows |\n| `$null` | Null (uninitialized state) |\n| `$PID` | Current process\
    \ ID |\n| `$PROFILE` | String with the path to the profile file for initialization/configuration\
    \ of PowerShell |\n| `$PWD` | Object with the path of the current directory |\n\
    | `$true` | Boolean state “true” |\n\n**Table 4.5** The Most Important Predefined\
    \ Variables of PowerShell\n\nI have only compiled the most important variables\
    \ in this table. As always, a complete description of all variables (there are\
    \ about 50!) can be found in the online documentation at https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_automatic_variables.\n\
    \n> **No Globbing!**\n> When you run a Bash script such as `script.sh *.txt`,\
    \ the names of all text files in the current directory are passed to the script.\
    \ On the other hand, if you pass `*.txt` as a parameter to a PowerShell script,\
    \ then exactly this string gets passed. You must take care in the script itself\
    \ to use the corresponding filenames. If only one parameter is involved, `Get-Item\
    \ $args` will work. If multiple parameters may be passed to your script (e.g.,\
    \ `script.ps1 file1 file2` or `script.ps1 *.jpg *.png`), then you must create\
    \ *two* loops. The first loop processes the parameters and executes `Get-Item`;\
    \ the second processes the results returned by `Get-Item`. For a code example\
    \ involving sorting photos by date taken, see Chapter 16, Section 16.2.\n\n##\
    \ 4.6.8 Environment Variables\n\nEnvironment variables are also predefined variables.\
    \ However, they are defined at the operating system level and are available not\
    \ only to PowerShell, but to all processes. Many environment variables contain\
    \ the locations of important directories.\n\n| Variable | Contents |\n| :--- |\
    \ :--- |\n| `$Env:APPDATA` | Directory for program settings |\n| `$Env:HOME` |\
    \ Home directory |\n| `$Env:HOMEDRIVE` | Drive of the home directory |\n| `$Env:LOCALAPPDATA`\
    \ | Directory for program settings |\n| `$Env:Path` | Directory list for executable\
    \ programs |\n| `$Env:PROCESSOR_ARCHITECTURE` | CPU architecture (e.g., AMD64)\
    \ |\n| `$Env:PSModulePath` | Directory list for PowerShell modules |\n| `$Env:SHELL`\
    \ | Path to the active shell |\n| `$Env:TEMP`, `$Env:TMP` | Temporary directory\
    \ |\n| `$Env:USER` | Current account name |\n| `$Env:windir` | Path to the Windows\
    \ directory (e.g., `C:\\Windows`) |\n\n**Table 4.6** The Most Important Environment\
    \ Variables\n\nAccess to environment variables through PowerShell occurs in the\
    \ somewhat unusual form, `$Env:[<varname>]`, such as `$Env:Path`. All environment\
    \ variables return strings instead of objects. I have specified only a few particularly\
    \ important predefined environment variables, which are rather inconsistent in\
    \ terms of uppercase and lowercase names.\n\n## 4.7 Arrays and Hash Tables\n\n\
    An array is a data structure to store multiple objects. PowerShell makes extensive\
    \ use of arrays, and many commands return arrays. For example, `Get-ChildItem`\
    \ usually returns an array of `FileInfo` and `DirectoryInfo` objects (unless `Get-ChildItem`\
    \ is used to process registry entries).\n\n```\n> $Files = Get-ChildItem\n> $Files.Length\n\
    4\n\n> $Files.Count    # equivalent, Count is an alias for Length\n4\n\n> $Files.GetType()\n\
    \n   IsPublic IsSerial Name      BaseType\n   -------- -------- ----        --------\n\
    \   True     True     Object[]    System.Array\n```\n\nThe pipe operator can perfectly\
    \ handle arrays and processes the elements of an array one after the other—many\
    \ examples of this processing have been shown already in this chapter. You can\
    \ use `ForEach-Object` to explicitly loop and output details about each array\
    \ element. Inside the loop, `$_` (short notation for `$PSItem`) provides access\
    \ to the current item. More details on loops will follow in Section 4.9.\n\n```\n\
    > $Files | ForEach-Object { \"$($_.GetType()) $($_.FullName)\" }\n\nSystem.IO.DirectoryInfo\
    \ C:\\Users\\kofler\\myscripts\\mydir\nSystem.IO.FileInfo      C:\\Users\\kofler\\\
    myscripts\\Hello.ps1\nSystem.IO.FileInfo      C:\\Users\\kofler\\myscripts\\MyTest.ps1\n\
    System.IO.FileInfo      C:\\Users\\kofler\\myscripts\\Loop.ps\n```\n\n### 4.7.1\
    \ Creating and Processing Custom Arrays\n\nYou can easily create arrays in your\
    \ own scripts, as in the following examples:\n\n```\n> $Data = 1, 17, 39, 45\n\
    > $Data = @(1, 17, 39, 45)    # equivalent\n```\n\nOnce created, the size of an\
    \ array cannot be changed. Nevertheless, you can easily add more elements using\
    \ the `+=` operator. Behind the scenes, however, this operation creates a new,\
    \ slightly larger array. For arrays with a large number of elements, this operation\
    \ can thus be quite inefficient!\n\n```\n> $Data += 23, 27\n> $Data\n1\n17\n39\n\
    45\n23\n27\n```\n\nArray elements are accessed via an index in square brackets.\
    \ As in most programming languages, the allowed index values range from 0 to the\
    \ element count minus 1:\n\n```\n> $Data[0]\n1\n> $Data[5]\n27\n```\n\nWhen an\
    \ invalid index is specified, the behavior of PowerShell depends on the mode.\
    \ By default, PowerShell simply returns null, but does not raise an error. If,\
    \ on the other hand, you have activated strict mode (which is highly recommended\
    \ in your own scripts!), an error will occur:\n\n```\n> $Data[6]\n> Set-StrictMode\
    \ -Version Latest\n> $Data[6]\nOperationStopped: Index was outside the bounds\
    \ of the array.\n```\n\nYou can also specify multiple index entries. Then, the\
    \ result is a new array with the selected entries:\n\n```\n> $Data[1, 2, 5]\n\
    17\n39\n27\n```\n\nThe `start..end` notation returns all elements in the specified\
    \ range. If `start` is greater than `end`, the elements will be returned in reverse\
    \ order. (Be sure you don't type three periods by mistake! Then, the third period\
    \ would be interpreted as a decimal point, and the index value that follows, as\
    \ a floating point number.)\n\n```\n> $Data[3..5]\n45\n23\n27\n> $Data[5..3]\n\
    27\n23\n45\n```"
  mdcn: "## 4.6.6 组装自定义对象\n\n你不仅可以处理脚本中来自给定类的对象，还可以以自行组装的临时对象形式返回结果。最简单的方法是使用 `PSCustomObject`\
    \ 作为基础，如下例所示：\n\n```\n$MyObject = [PSCustomObject]@{\n    UserName = \"Michael\"\
    \n    UserId   = 123\n}\n```\n\n通常，哈希表（即简单的键值存储）也能达到同样的目的。其主要优点是输入工作量相对较低：\n\n\
    ```\n$Data = @{\n    UserName = \"Michael\"\n    UserId = 123\n}\n```\n\n如果你想节省行数，可以用分号分隔键值对：\n\
    \n```\n$Data = @{ UserName = \"Michael\"; UserId = 123 }\n```\n\n## 4.6.7 预定义变量\n\
    \n通常，你必须自己负责变量的初始化。然而，在 PowerShell 术语中，有许多称为*自动变量*的预定义变量可用。这些变量包含有关 PowerShell、当前脚本状态等信息。\n\
    \n| 变量 | 内容 |\n| :--- | :--- |\n| `$?` | 最后执行的命令的状态（如果发生错误则为 `$false`） |\n| `$_`\
    \ | 管道当前处理的对象（`$PSITEM`） |\n| `$args` | 包含传递给脚本或函数的参数的数组 |\n| `$Error` | 对象，描述发生的最后一个错误\
    \ |\n| `$Event` | 对象，描述当前正在处理的事件 |\n| `$false` | 布尔状态“假” |\n| `$HOME` | 包含当前用户主目录的字符串\
    \ |\n| `$input` | 通过标准输入（管道）传递给函数的数据 |\n| `$IsLinux` | 如果 PowerShell 在 Linux 上运行则为\
    \ `$true` |\n| `$IsMacOS` | 如果 PowerShell 在 macOS 上运行则为 `$true` |\n| `$IsWindows`\
    \ | 如果 PowerShell 在 Windows 上运行则为 `$true` |\n| `$null` | 空值（未初始化状态） |\n| `$PID`\
    \ | 当前进程 ID |\n| `$PROFILE` | 包含用于 PowerShell 初始化/配置的配置文件路径的字符串 |\n| `$PWD` |\
    \ 包含当前目录路径的对象 |\n| `$true` | 布尔状态“真” |\n\n**表 4.5** PowerShell 最重要的预定义变量\n\n我在此表中仅编译了最重要的变量。一如既往，所有变量（大约有\
    \ 50 个！）的完整描述可以在在线文档中找到：https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_automatic_variables。\n\
    \n> **没有通配符扩展！**\n> 当你运行 Bash 脚本（如 `script.sh *.txt`）时，当前目录中所有文本文件的名称都会传递给脚本。另一方面，如果你将\
    \ `*.txt` 作为参数传递给 PowerShell 脚本，那么传递的正是这个字符串本身。你必须在脚本本身中处理相应的文件名。如果只涉及一个参数，`Get-Item\
    \ $args` 将会工作。如果可能向你的脚本传递多个参数（例如，`script.ps1 file1 file2` 或 `script.ps1 *.jpg\
    \ *.png`），那么你必须创建*两个*循环。第一个循环处理参数并执行 `Get-Item`；第二个循环处理 `Get-Item` 返回的结果。有关按拍摄日期对照片进行排序的代码示例，请参见第\
    \ 16 章，第 16.2 节。\n\n## 4.6.8 环境变量\n\n环境变量也是预定义变量。然而，它们是在操作系统级别定义的，不仅对 PowerShell\
    \ 可用，对所有进程都可用。许多环境变量包含重要目录的位置。\n\n| 变量 | 内容 |\n| :--- | :--- |\n| `$Env:APPDATA`\
    \ | 程序设置目录 |\n| `$Env:HOME` | 主目录 |\n| `$Env:HOMEDRIVE` | 主目录所在的驱动器 |\n| `$Env:LOCALAPPDATA`\
    \ | 程序设置目录 |\n| `$Env:Path` | 可执行程序的目录列表 |\n| `$Env:PROCESSOR_ARCHITECTURE` |\
    \ CPU 架构（例如，AMD64） |\n| `$Env:PSModulePath` | PowerShell 模块的目录列表 |\n| `$Env:SHELL`\
    \ | 活动 shell 的路径 |\n| `$Env:TEMP`, `$Env:TMP` | 临时目录 |\n| `$Env:USER` | 当前账户名\
    \ |\n| `$Env:windir` | Windows 目录的路径（例如，`C:\\Windows`） |\n\n**表 4.6** 最重要的环境变量\n\
    \n通过 PowerShell 访问环境变量采用一种有些不寻常的形式，`$Env:[<变量名>]`，例如 `$Env:Path`。所有环境变量返回的是字符串而不是对象。我仅指定了少数特别重要的预定义环境变量，它们在大小写名称方面相当不一致。\n\
    \n## 4.7 数组和哈希表\n\n数组是一种用于存储多个对象的数据结构。PowerShell 广泛使用数组，许多命令返回数组。例如，`Get-ChildItem`\
    \ 通常返回一个 `FileInfo` 和 `DirectoryInfo` 对象的数组（除非 `Get-ChildItem` 用于处理注册表项）。\n\n\
    ```\n> $Files = Get-ChildItem\n> $Files.Length\n4\n\n> $Files.Count    # 等效，Count\
    \ 是 Length 的别名\n4\n\n> $Files.GetType()\n\n   IsPublic IsSerial Name      BaseType\n\
    \   -------- -------- ----        --------\n   True     True     Object[]    System.Array\n\
    ```\n\n管道运算符可以完美地处理数组，并逐个处理数组的元素——本章已经展示了许多这种处理的例子。你可以使用 `ForEach-Object` 来显式循环并输出每个数组元素的详细信息。在循环内部，`$_`（`$PSItem`\
    \ 的简写）提供对当前项的访问。更多关于循环的细节将在第 4.9 节中介绍。\n\n```\n> $Files | ForEach-Object { \"\
    $($_.GetType()) $($_.FullName)\" }\n\nSystem.IO.DirectoryInfo C:\\Users\\kofler\\\
    myscripts\\mydir\nSystem.IO.FileInfo      C:\\Users\\kofler\\myscripts\\Hello.ps1\n\
    System.IO.FileInfo      C:\\Users\\kofler\\myscripts\\MyTest.ps1\nSystem.IO.FileInfo\
    \      C:\\Users\\kofler\\myscripts\\Loop.ps\n```\n\n### 4.7.1 创建和处理自定义数组\n\n\
    你可以轻松地在自己的脚本中创建数组，如下例所示：\n\n```\n> $Data = 1, 17, 39, 45\n> $Data = @(1, 17, 39,\
    \ 45)    # 等效\n```\n\n一旦创建，数组的大小就不能更改。尽管如此，你仍然可以使用 `+=` 运算符轻松添加更多元素。然而，在幕后，此操作会创建一个新的、稍大的数组。对于包含大量元素的数组，此操作可能效率相当低！\n\
    \n```\n> $Data += 23, 27\n> $Data\n1\n17\n39\n45\n23\n27\n```\n\n数组元素通过方括号中的索引进行访问。与大多数编程语言一样，允许的索引值范围从\
    \ 0 到元素数量减 1：\n\n```\n> $Data[0]\n1\n> $Data[5]\n27\n```\n\n当指定无效索引时，PowerShell\
    \ 的行为取决于模式。默认情况下，PowerShell 只是返回 null，但不会引发错误。另一方面，如果你激活了严格模式（在你自己的脚本中强烈推荐！），则会发生错误：\n\
    \n```\n> $Data[6]\n> Set-StrictMode -Version Latest\n> $Data[6]\nOperationStopped:\
    \ Index was outside the bounds of the array.\n```\n\n你也可以指定多个索引条目。然后，结果是一个包含所选条目的新数组：\n\
    \n```\n> $Data[1, 2, 5]\n17\n39\n27\n```\n\n`start..end` 表示法返回指定范围内的所有元素。如果 `start`\
    \ 大于 `end`，则元素将按相反顺序返回。（确保不要错误地输入三个句点！否则，第三个句点将被解释为小数点，而随后的索引值将被解释为浮点数。）\n\n```\n\
    > $Data[3..5]\n45\n23\n27\n> $Data[5..3]\n27\n23\n45\n```"
