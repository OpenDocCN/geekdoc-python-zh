    # # Chapter 19

    ## Databases


    The topic of scripting and databases is almost inexhaustible. You can use scripts
    to enter data into a database, read and process information from it, change the
    structure of databases, and so on.


    In detail, the procedure depends on the database management system (DBMS), programming
    language, library, or module you use. In this respect, a systematic treatment
    of all aspects is impossible here from the outset. Instead, this chapter focuses
    on some concrete examples that relate to SQL Server or MySQL:


    +   - Modifying, maintaining, and reading similar databases (Bash, PowerShell)

    - Setting up databases for new customers (Bash)

    - Saving exchangeable image file format (Exif) data (Python)

    - Importing JSON files (PowerShell)


    > **Prerequisites for This Chapter**


    As usual, you need basic knowledge of Bash, Python, and PowerShell to read this
    chapter. You should also be able to handle JSON files (see Chapter 8). Finally,
    you need to have a basic understanding of how database servers work.


    If you want to create backups of databases with your scripts, I recommend you
    look at Chapter 13.


    To keep the examples clear, I have refrained from error-proofing and from swapping
    out the login data and other settings. For "real" database scripts, both points
    should be a matter of course. For tips on error-proofing, see the chapters on
    the basic principles of Bash, PowerShell, and Python. I have described how to
    handle settings and passwords securely in Chapter 14, Section 14.2.


    The sample scripts from that chapter cannot be tried out easily. You must first
    install the appropriate database server, set up a suitable database with tables,
    take care of authentication with the database server, and so on.'
  - "[PAGE 421]\n\n# 19.1 Updating and Maintaining Databases\n\nIn my professional\
    \ work, I maintain a MySQL server that hosts many similar databases. Each customer\
    \ has a separate database. Although the content of these databases varies depending\
    \ on the customer, the structure is always the same.\n\nNow and then, it happens\
    \ that—for example for troubleshooting—I want to apply the same SELECT commands\
    \ to all databases. The required script is, according to the motto of this book,\
    \ not even 10 lines long:\n\n```\n# Sample file apply-select.sh\n# this file contains\
    \ the names of all databases\nDBLIST=dbs.txt\n# this file contains the commands\
    \ to be executed;\n# the commands must be separated by ;.\nSQLFILE=select.sql\n\
    \nfor db in $(cat $DBLIST | sort) ; do\n  echo \"Database: $db\"\n  mysql $db\
    \ < $SQLFILE\n  echo \"---\"\ndone\n```\n\nThe `mysql` command plays a central\
    \ role in the script. It connects to the database specified by the `db` variable\
    \ and executes all commands contained in the file read by input redirection. Establishing\
    \ a connection to the database server requires that the active user has sufficient\
    \ MySQL access rights and that authentication is performed either at the operating\
    \ system level (`auth_socket` method for MySQL or `unix_socket` for MariaDB) or\
    \ that the `.my.cnf` file contains the required password.\n\nThe results of the\
    \ `SELECT` commands are displayed directly on the screen. Most of the time, I\
    \ run the script in the `./apply-select.sh | less` format, so I can conveniently\
    \ scroll or search through the output.\n\nBasically, `select.sql` could also contain\
    \ commands to modify all databases, for example to add a column to a table in\
    \ each database. But because such changes are much more dangerous than pure queries,\
    \ I store such commands in a separate `updates.sql` file, which is processed by\
    \ a second `apply-updates.sh` script. The script is identical to `apply-select.sh`\
    \ except for the initialization of the `SQLFILE` variable.\n\n# 19.1.1 PowerShell\
    \ and sqlcmd\n\nOf course, the same concept can be implemented via a PowerShell\
    \ script. The script calls the `sqlcmd` command, which is the SQL Server counterpart\
    \ to `mysql`. The code then looks as follows:"
  - "[PAGE 422]\n\n```\n# Sample file apply-select.ps1\n$dblist = \"dbs.txt\"    \
    \    # list with database names\n$sqlfile = \"select.sql\"    # SQL commands\n\
    $server = \".\\sqlexpress01\" # SQL Server instance\n\n# loop through all databases\n\
    foreach($db in Get-Content $dblist) {\n    Write-Output \"Database: $db\"\n  \
    \  sqlcmd -S $server -d $db -i $sqlfile\n}\n```\n\nIf SQL Server is not running\
    \ on the local machine, you need to replace . with the host name. Again, I'm assuming\
    \ here that the script is running in an account that has access to all the databases\
    \ in question. Note that the SQL commands contained in *select.sql* must be separated\
    \ by semicolons. The script requires that `sqlcmd.exe` be located in a directory\
    \ listed in the PATH variable.\n\n# 19.2 Creating a New Customer Account\n\nThe\
    \ starting point for this example is a web server for customer accounts. When\
    \ placing an order, customers receive their own database and can access the web\
    \ application via their own address:\n\n*https://example.com/name*\n\nThe following\
    \ Bash script takes care of the initialization work required when a new account\
    \ gets set up:\n\n+   - Creating and initializing a new MySQL database\n- Creating\
    \ a new MySQL user and enabling it to access the database\n- Setting up the /var/www/html/name\
    \ directory\n- Creating a configuration file in that directory\n- Sending an email\
    \ to the customer with the login data\n\nOn a server I maintain, I actually use\
    \ a script that works in this way. For didactic reasons, I have greatly simplified\
