- md: "## 15.3.1 Backing Up and Compressing all Databases via Script\n\nWith this\
    \ introductory information, you should have no problem understanding the next\
    \ script. It starts with the declaration of some parameters that you'll need to\
    \ adjust according to your own setup. `$exclude` contains a list of databases\
    \ that should *not* be backed up. This list must necessarily contain `tempdb`.\
    \ Attempting to apply `Backup-SqlDatabase` to this internal SQL server database\
    \ will result in an error.\n\n`Get-SqlDatabase` determines all databases available\
    \ on SQL server. A loop then processes all databases. Each backup file is immediately\
    \ packed into its own archive file. (Of course, you could conceivably save all\
    \ databases together in one archive. But since databases can get huge, this approach\
    \ is not a good idea.) With the `-Force` option, already existing ZIP files are\
    \ overwritten without an error message. The original backup file will be deleted\
    \ as a result.\n\n```\n# Sample file backup-all-dbs.ps1\n$instance = \"localhost\\\
    SQLEXPRESS01\"\n$backupdir = \"C:\\sqlserver-backups\"\n$exclude = \"tempdb\"\
    , \"other\", \"tmp\"\n\n# create backup directory if it does not exist yet\nNew-Item\
    \ -ItemType Directory -Force $backupdir | Out-Null\n\n# loop through all databases\n\
    $dbs = Get-SqlDatabase -ServerInstance $instance\nforeach($db in $dbs) {\n   \
    \ # skip databases from $exclude\n    if ($db.name -in $exclude) { continue }\n\
    \n    # compose names of backup files\n    $backupname = \"$backupdir\\$($db.name).bak\"\
    \n    $archivename = \"$backupdir\\$($db.name).zip\"\n    Write-Output \"Backup\
    \ database $($db.name) to $archivename\"\n\n    # backup, create archive (-Force\
    \ to overwrite existing),\n    # delete original backup file\n    Backup-SqlDatabase\
    \ -ServerInstance $instance `\n        -Database $db.name -BackupFile $backupname\n\
    \    Compress-Archive -Force $backupname $archivename\n    Remove-Item $backupname\n\
    }\n```\n\n## Chapter 16\nImage Processing\n\nIn my day-to-day work, scripts often\
    \ help me to keep the flood of digital images under control. The scripts presented\
    \ in this chapter perform the following tasks:\n\n- Converting images from one\
    \ format to another and downsizing and watermarking them if necessary\n- Sorting\
    \ photos into directories based on the date they were taken, using exchangeable\
    \ image file format (Exif) data\n- Entering metadata from photos into a database\n\
    \nFor these purposes, the *ImageMagick* and *ExifTool* open-source tools are used.\n\
    \n> **Prerequisites for This Chapter**\nTo read this chapter, you only need basic\
    \ knowledge of the Bash, PowerShell, and Python languages.\n\n## 16.1 Manipulating\
    \ Image Files\n\nWhether you want to convert PNG images to JPG format (or vice\
    \ versa), include watermarks or take transparency effects into account, limit\
    \ the maximum resolution, or crop a partial image—the free tools of the ImageMagick\
    \ library will be helpful. The only obstacle is the non-trivial control of the\
    \ commands through its countless options.\n\n### 16.1.1 Installing ImageMagick\n\
    \nMost Linux distributions provide ImageMagick as a package. On Ubuntu, you must\
    \ run `apt install imagemagick` to install it. On macOS, the easiest way to install\
    \ it is to use Homebrew (i.e., `brew install imagemagick`).\n\nFor Windows, you\
    \ can find an installation program at *https://imagemagick.org/script/download.php*.\
    \ If you want to update an already installed version, you should uninstall it\
    \ beforehand; otherwise, the old and the new versions will be installed in parallel,\
    \ which is rarely useful. The setup program suggests adding the installation directory\
    \ to the PATH, so be sure to leave this option checked. In general, it's mostly\
    \ appropriate to leave the preselected options.\n\n![](img/a7fa45d496335c22ffb14c3275e24ffb_375_0.png)\n\
    \nFigure 16.1 Installing ImageMagick on Windows\n\nUse `magick --version` in a\
    \ terminal to verify that the installation was successful and that the command\
    \ is found:\n\n```\n$ magick --version\nVersion: ImageMagick 7.1.1-4 Q16-HDRI\
    \ x86_64 ...\n```\n\nIf you also want to read PostScript, PDF, or Encapsulated\
    \ PostScript (EPS) files with ImageMagick, you must also install the PostScript\
    \ interpreter Ghostscript. On Linux and macOS, you can install appropriate packages\
    \ via `apt`, `dnf`, or `brew`. Windows downloads can be found at https://ghostscript.com/releases/gsdnld.html.\n\
    \n### 16.1.2 Trying Out ImageMagick\n\nImageMagick provides the `magick` command,\
    \ which is very versatile. However, several hundred options are available to control\
    \ the behavior of this command, as described at https://imagemagick.org/script/magick.php.\n\
    \nDo not let all this choice confuse you! In many cases, `magick` can be applied\
    \ easily. To convert an existing file to another format, simply specify the filename\
    \ of the source file and that of a new result file. `magick` recognizes the desired\
    \ data type by its identifier:\n\n```\n$ magick in.bmp out.png\n```\n\n> **ImageMagick\
    \ 6: Use convert instead of magick**\nMany Linux distributions still rely on ImageMagick\
    \ 6. This version does not provide the `magick` command. Instead, you must use\
    \ `convert`. However, beginning with version 7, `convert` is deprecated in favor\
    \ of `magick`.\n\nThe following command reduces a PNG image to a maximum size\
    \ of 1024×1024 pixels. The image proportions are preserved. An image with originally\
    \ 6000×4000 pixels is scaled to 1024×683 pixels. The > character after 1024×1024\
    \ causes small images to *not* be scaled up. 1024×1024 pixels are therefore the\
    \ upper limit. The result will be saved in JPG format.\n\nTransparent areas of\
    \ the PNG image are displayed in light pink. The color code corresponds to the\
    \ familiar CSS syntax. `-flatten` merges all image layers. `-quality 75` reduces\
    \ the quality of the JPEG compression to 75 percent. This option reduces quality\
    \ but also reduces the size of the image file. (By default, a quality level of\
    \ 92 percent applies.)\n\n```\n$ magick in.png -resize '1024x1024>' -background\
    \ '#ffdddd' \\\n    -flatten -quality 75 out.jpg\n```\n\nIn the third example,\
    \ `magick` adds a diagonal watermark text with a copyright notice in the middle\
    \ of the image:\n\n```\n$ magick in.png -gravity center \\\n    -pointsize 40\
    \ -font Arial -fill black \\\n    -draw \"rotate 45 text 0,0 '(c) Michael Kofler\
    \ 2023'\" out.png\n```\n\nUnlike many other commands, `magick` does not care about\
    \ the order of the options. Rather, they are executed in the specified order or\
    \ refer to the currently active image (if multiple image files are merged).\n\n\
    If you want to process multiple images at once, it is usually advisable to program\
    \ a script. Creating a script has an advantage in that the often laboriously compiled\
    \ options will be available again the next time. However, you can of course perform\
    \ simple tasks directly in the terminal.\n\nThe final example in Bash syntax runs\
    \ through all `*.jpeg` files in the current directory and turns them into *thumbnails*\
    \ (i.e., greatly reduced images). Watch out though because since the following\
    \ command uses the same source and destination filename, the original images will\
    \ be overwritten! If you don't want that to happen, you must use another destination\
    \ filename (e.g., `\"thumb-$file\"`).\n\n```\n$ for file in *.jpeg; do magick\
    \ \"$file\" -resize '320x320' \\\n    -quality 80 \"$file\"; done\n```\n\nAs far\
    \ as the destination file format supports Exif data, this data will be preserved.\
    \ Exif data is metadata that, among other things, provides information about the\
    \ place and time the image was taken. Exif data is the focus of the remaining\
    \ sections of this chapter. If you want to remove Exif data, you can call `magick`\
    \ with the `-strip` option. A safer choice is to use the `exiftool -all:all= file.jpg`\
    \ command presented in the next section.\n\n> **Quoting Special Characters**\n\
    \nNote that the `magick` syntax provides for various special characters that have\
    \ a special meaning in Bash and PowerShell. You should either enclose the strings\
    \ in quotes, as in the previous examples, or use the quotation mark \\ (Bash)\
    \ or ` (PowerShell).\n\n> **Artificial Intelligence (AI) Help**\n\nAI tools like\
    \ ChatGPT also know ImageMagick. If you have a specific task, it's at least worth\
    \ trying to determine the required combination of options with AI support. In\
    \ my attempts, the hit rate was about 50 percent. The result did not always correspond\
    \ to my expectations, but often, ChatGPT put me on the right track. Note that\
    \ both ChatGPT and many proposed solutions on the internet use the `convert` command\
    \ instead of `magick`.\n\n### 16.1.3 Example: convert2eps (Bash Variant)\n\nTo\
    \ make printable PostScript files from the text files of my books in Markdown\
    \ or LaTeX formats, I need an equivalent EPS file for each screenshot in PNG format,\
    \ which is exactly what our next script takes care of.\n\nThis example loops through\
    \ all PNG files in the current directory. If no `<name>.eps` file exists for `<name>.png`\
    \ or if the PNG file is newer than the EPS file (comparison operator `-nt`; i.e.,\
    \ *newer than*), `magick` creates a new EPS file.\n\nThe `magick` options or parameters\
    \ have the following meaning: `-quiet` suppresses the display of warnings and\
    \ status messages. `-background white` uses a white background for the transparent\
    \ areas of the image. `-flatten` merges the image layers.\n\n`eps2:$epsfile` specifies\
    \ that the PostScript Level 2 specifications should apply when writing the EPS\
    \ file. This choice has a big impact on image size because the file is compressed\
    \ much better (without quality loss) than in default level 1. Level 3 (i.e., `eps3:$epsfile`)\
    \ promises even more compact files. However, this level places higher demands\
    \ on the printer or exposure software and can cause compatibility problems.\n\n\
    ```\n# Sample file convert2eps.sh\nfor pngfile in *.png; do\n    # replace .png\
    \ identifier with .eps\n    epsfile=${pngfile%.png}.eps\n    if [ $pngfile -nt\
    \ $epsfile ]; then\n        echo \"$pngfile -> $epsfile\"\n        magick \"$pngfile\"\
    \ -quiet -background white \\\n            -flatten \"eps2:$epsfile\"\n    fi\n\
    done\n```"
  mdcn: "## 15.3.1 通过脚本备份和压缩所有数据库\n\n有了这些介绍性信息，你应该能轻松理解接下来的脚本。它首先声明了一些参数，你需要根据自己的设置进行调整。`$exclude`\
    \ 包含一个不应被备份的数据库列表。该列表必须包含 `tempdb`。尝试对这个内部 SQL Server 数据库应用 `Backup-SqlDatabase`\
    \ 会导致错误。\n\n`Get-SqlDatabase` 会确定 SQL Server 上所有可用的数据库。然后，一个循环会处理所有数据库。每个备份文件会立即被打包成自己的归档文件。（当然，你也可以将所有数据库一起保存在一个归档中。但由于数据库可能变得非常大，这种做法并不是个好主意。）使用\
    \ `-Force` 选项，已存在的 ZIP 文件会被覆盖，而不会显示错误消息。原始备份文件将因此被删除。\n\n```\n# 示例文件 backup-all-dbs.ps1\n\
    $instance = \"localhost\\SQLEXPRESS01\"\n$backupdir = \"C:\\sqlserver-backups\"\
    \n$exclude = \"tempdb\", \"other\", \"tmp\"\n\n# 如果备份目录尚不存在，则创建它\nNew-Item -ItemType\
    \ Directory -Force $backupdir | Out-Null\n\n# 遍历所有数据库\n$dbs = Get-SqlDatabase\
    \ -ServerInstance $instance\nforeach($db in $dbs) {\n    # 跳过 $exclude 列表中的数据库\n\
    \    if ($db.name -in $exclude) { continue }\n\n    # 组合备份文件名\n    $backupname\
    \ = \"$backupdir\\$($db.name).bak\"\n    $archivename = \"$backupdir\\$($db.name).zip\"\
    \n    Write-Output \"正在将数据库 $($db.name) 备份到 $archivename\"\n\n    # 备份，创建归档（-Force\
    \ 用于覆盖已存在的文件），\n    # 删除原始备份文件\n    Backup-SqlDatabase -ServerInstance $instance\
    \ `\n        -Database $db.name -BackupFile $backupname\n    Compress-Archive\
    \ -Force $backupname $archivename\n    Remove-Item $backupname\n}\n```\n\n## 第16章\n\
    图像处理\n\n在我的日常工作中，脚本经常帮助我控制数字图像的洪流。本章介绍的脚本执行以下任务：\n\n- 将图像从一种格式转换为另一种格式，并在必要时缩小尺寸和添加水印\n\
