    # 20.1.1 Installation on Linux and macOS


    AWS CLI downloads and installation guides for all platforms can be found at https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html.


    On Linux, you must download the ZIP file, unpack the archive, and run the installation
    script. The `aws` command will be stored in the `/usr/local/bin` directory and
    should be executable there without any changes to `PATH`. If you want to update
    an existing installation, you must pass the `--update` option to the `install`
    command.


    ```

    $ curl https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip \n    -o "awscliv2.zip"

    $ unzip awscliv2.zip

    $ sudo ./aws/install

    $ aws --version

    aws-cli/2.11.11 Python/3.11.2 ...

    ```


    > **Trouble with cron**

    On some Linux distributions, `/usr/local/bin` is not included in the `PATH` variable
    relevant to cron jobs. In that case, calling `aws` in cron jobs will fail. One
    solution might be to create a link from `/usr/bin/aws` to `/usr/local/bin/aws`,
    or to always specify the full path of the `aws` command in the script.


    For macOS, Amazon provides a PKG installer. The installation process can be completed
    with a few clicks. Again, the `aws` command is installed in the `/usr/local/bin`
    directory.


