    \ at once. However, keep in mind that the source files must either be specified\
    \ as a pattern or be separated by commas. Note that it is not allowed to list\
    \ multiple files without commas! You can use `-Recurse` to copy entire directory\
    \ trees. If the target directory does not exist yet (for example, `dir2` in the\
    \ previous example), it will be created automatically.\n\n```\n> Copy-Item *.txt\
    \ another-directory    # OK\n> Copy-Item file1.txt, file2.txt a-d    # also OK\n\
    > Copy-Item file1.txt file2.txt a-d     # Error!\n> Copy-Item -Recurse dir1 dir2\
    \          # OK\n```\n\n`Get-ChildItem` or its short versions `dir`, `gci`, and\
    \ `ls` (only on Windows) lists files and directories in the specified or current\
    \ directory. With the `-Recurse` option, the cmdlet also takes all subdirectories\
    \ into account. With the `-File` option, `Get-ChildItem` determines only files;\
    \ with `-Directory`, only directories.\n\nBy default, in addition to the filename,\
    \ the `Get-ChildItem` displays the mode, the time of the last modification, and\
    \ the file size. Behind the scenes, however, `Get-ChildItem` returns objects with\
    \ much richer data. It is up to you to evaluate this data. In the following example,\
    \ `Where-Object` only considers `*.exe` files in the `Downloads` directory that\
    \ are larger than 1 MB. `Select-Object` selects the filename, size, and time of\
    \ the last access from the result objects. The `-gt` option stands for *greater\
    \ than*.\n\n```\n> Get-ChildItem Downloads\\*.exe |\n    Where-Object {$_.Length\
    \ -gt 1000000} |\n    Select-Object Name, Length, LastAccessTime\n```\n\n```\n\
    Name                                    Length  LastAccessTime\n----         \
    \                           ------  -------------\nemacs-28.1-installer.exe  \
    \              47972467 22.01.2023 08:09:58\nnpp.8.4.4.Installer.x64.exe     \
    \        4533912  24.01.2023 08:44:01\nVSCodeUserSetup-x64-1.69.2.exe        \
    \  81424833  2.02.2023 12:47:04\n...\n```\n\n> **Universal Items**\nIn this section,\
    \ I have presented `New-Item`, `Copy-Item`, and so on as commands for manipulating\
    \ files and directories. In fact, these cmdlets are much more flexible and, depending\
    \ on the context or options you choose, can also process completely different\
    \ objects, such as registry entries or certificates.\n\n# 7.1.2 Reading and Writing\
    \ Text\n\n`Get-Content` (alias `cat`) outputs the specified file completely in\
    \ the terminal:\n\n```\n> Get-Content todo.md\n```"
  - '[PAGE 225]


    For longer files, scrolling through the text using the cursor keys is convenient.
    On Linux, `less` is certainly one of the most frequently called commands—all the
    more surprising then that PowerShell offers only rudimentary functions in this
    regard: `Out-Host -Paging` allows you to scroll one line further with `Enter`
    and one page further with `Space`, but there is no way back, let alone a search
    function.


    ```

    > Get-Content tst.csv | Out-Host -Paging

    ```


    Using `Out-Host` (alias `oh`), you can also study extensive cmdlet results page
    by page:


    ```

    > Get-Process | Out-Host -Paging

    ```


    Ultimately, it is quite easy to look only at the first or last result objects
    of a cmdlet:


    ```

    # view the first five / the last ten processes

    > Get-Process | Select-Object -First 5

    > Get-Process | Select-Object -Last 10

    ```


    To save the results of a cmdlet in a text file, you can simply use output redirection.
    Note that the underlying objects will not be saved—only the text that you usually
    see in the terminal.


    ```

    > Get-Process > processes.txt

    ```


    `Set-Content` enables you to write a string into a text file. If the file already
    exists, it will be overwritten. You should pay attention to the correct order
    of the parameters; alternatively, you can use options.


    ```

    > Set-Content out.txt "some text"

    > Set-Content -Value "some text 2" out.txt  # equivalent

    ```


    To add text to an existing file, you can use `Add-Content`, as in the following
    example:


    ```

    > Add-Content out.txt ''second line''

    ```


    `Clear-Content` deletes the content of a file. However, the file itself remains
    intact (file size: 0 bytes). `Clear-Content` raises an error if the specified
    file does not exist.


    ```

    > Clear-Content out.txt

    ```


    # 7.1.3 Inputting and Outputting Text


    To input text in a script, you must use `Read-Host`. Note that the cmdlet automatically
    adds a colon to the passed text. To output a string again (with or without variables),
    you can use `Write-Output` (alias `echo`):'
  - "[PAGE 226]\n\n```\n> $firstname = Read-Host \"First name\"\n\nFirst name: Michael\n\
    \n> Write-Output $firstname\n\nMichael\n\n> Write-Output \"Hello, $firstname!\"\
    \n\nHello, Michael!\n```\n\n# 7.2 Finding Files\n\nTo search for files that have\
    \ certain properties, you can proceed as in the previous example: Create a result\
    \ list via `Get-ChildItem` and then use `Where-Object` to select the objects that\
    \ match your expectations. The condition must be formulated in curly brackets.\
    \ Within this formulation, `$_` refers to the object currently being processed.\n\
    \nIn the following listing, we first create a variable that contains the date\
    \ from 60 days ago. `Get-ChildItem` searches the current directory and all subdirectories\
    \ for all `*.pdf` files. `Where-Object`, which can be abbreviated quite elegantly\
    \ with `?`, filters out the PDF documents that were created or modified in the\
    \ last 2 months. (`-ge` stands for *greater than or equal to*.)\n\n```\n> $twoMonthsAgo\
    \ = (Get-Date).AddDays(-60)\n> Get-ChildItem -Recurse *.pdf |\n    ? {$_.LastWriteTime\
    \ -ge $twoMonthsAgo}\n```\n\nYou can also combine multiple conditions. The next\
    \ command searches the *Downloads* directory for files larger than 1 MB that have\
    \ not been read for about 2 months:\n\n```\n> Get-ChildItem -Recurse Downloads\
    \ |\n    ? {$_.Length -gt 100000 -and\n        $_.LastAccessTime -lt $twoMonthsAgo}\n\
    ```\n\nIf you want to include multiple file identifiers, a best practice is to\
    \ use the `-Include` option and pass the desired file types, separated by commas:\n\
    \n```\n> Get-ChildItem -Recurse -Include *.png, *.jpg, *.jpeg, *.tif ...\n```\n\
    \nAlternatively, you can use `-Exclude` to exclude from the result files that\
    \ match the specified pattern. Note that `-Include` and `-Exclude` only work in\
    \ combination with `-Recurse`."
  - '[PAGE 227]


    # 7.2.1 Searching Text Files


    Get-ChildItem, combined with Where-Object, only considers the metadata of files
    (i.e., name, type, size, etc.) but not the content. Select-String allows you to
    search text files. In the simplest case, you can apply Select-String directly
    to files. The following command finds all logging files in the current directory
    that contain the error text in upper-case and lowercase:


    ```

    > Select-String error *.log

    ```


    However, unlike Get-ChildItem, Select-String does not provide any recursive file
    search options. Thus, the two commands are often combined. In the following example,
    Get-ChildItem searches for *.txt files in the current directory and in all subdirectories.
    Select-String looks at the contents of these files and lists all occurrences.


    ```

    > Get-ChildItem -Recurse -Include *.txt | Select-String license


    init/readme.txt:6:This work is licensed under ..., see

    init/readme.txt:7:https://creativecommons.org/licenses/by/4.0/

    ```


    Usually, you''re not interested in the match details, but just want to see a list
    of files that have been found. Each Select-String result is a MatchInfo object.
    Its Path property contains the filename. By forming groups of such MatchInfo objects
    and then displaying the name of each group, you can get only the filenames:


    ```

    > Get-ChildItem -recurse *.txt | Select-String license |

    Group-Object Path | Select-Object Name


    init/readme.txt

    other/gpl.txt

    ...

    ```


    The behavior of Select-String can be influenced by various options. I want to
    mention only the most important four here:


    +   - -CaseSensitive makes the search pattern case sensitive.

    - -List shows only the first match of the search pattern. This option provides
    clearer results when a large number of matches is found. This option also speeds
    up the evaluation if, as in the previous example, only the files that contain
    a hit are to be listed.

    - -NotMatch returns matches (without -List, for each line) that do *not* contain
    the search pattern.

    - -Quiet returns only True or False, depending on whether the pattern was recognized.


    Select-String cannot count the number of matches. For a single file, you can evaluate
    the Matches property of the resulting object. The following statement counts how
    many times an error occurs in the access.log file:'
- md: "## 7.2.2 Text versus Objects\n\nUnlike the `grep` command in Linux, you cannot\
    \ use `Select-String` to filter the results of any cmdlets in general. The reason\
    \ is simple: cmdlets return objects, not text. (Text is displayed in the terminal\
    \ but only because PowerShell automatically converts the objects to text beforehand.)\n\
    \nThus, for example, if you want to know what alias the `Start-Process` cmdlet\
    \ has, the following command will have no effect. It does not recognize any text\
    \ in the `Get-Alias` result.\n\n```\n> Get-Alias | Select-String Start-Process\n\
    ```\n\nNow, you can use `Out-String` to convert the `Get-Alias` result into a\
    \ string and search it. Basically, this approach works because `Select-String`\
    \ also finds the match. However, `Out-String` turns the result into *one* string.\
    \ Instead of displaying only the alias definition of `Start-Process`, the command\
    \ returns the complete list of all aliases, which ultimately is the original result\
    \ of `Get-Alias`. But nothing is gained by this exercise.\n\n```\n> Get-Alias\
    \ | Out-String | Select-String Start-Process\n\nCommandType Name\n-----------\
    \ -----\nAlias ? -> Where-Object\nAlias % -> ForEach-Object\ncd -> Set-Location\n\
    ...\n```\n\nOnly `Out-String -Stream` provides the desired result. With this additional\
    \ option, the cmdlet returns each line as a single string. Finally, the searched\
    \ aliases `saps` and `start` are displayed.\n\n```\n> Get-Alias | Out-String -Stream\
    \ | Select-String Start-Process\n\nAlias saps -> Start-Process\nAlias start ->\
    \ Start-Process\n```\n\nBut `command | Out-String -Stream | Select-String ...`\
    \ is rarely a good idea because cmdlets return objects. You can find out the result\
    \ data type using `Get-Member` or `Format-List` and then formulate an appropriate\
    \ condition for evaluation:\n\n```\n> Get-Alias | ? {$_.Definition -eq 'Start-Process'}\n\
    \nAlias saps -> Start-Process\nAlias start -> Start-Process\n```\n\nWhat is even\
    \ more expedient is to consult `Get-Help` every now and then. With the `-Definition`\
    \ option, `Get-Alias` directly determines the alias for the desired command:\n\
    \n```\n> Get-Alias -Definition Start-Process\n\nAlias saps -> Start-Process\n\
    Alias start -> Start-Process\n```\n\n## 7.3 Compressing and Archiving Files\n\n\
    The `Compress-Archive` command allows you to pack a directory or individual files\
    \ into a compressed archive file. Basically, the application of the command is\
    \ simple:\n\n```\n> Compress-Archive mypictures\\ mypictures.zip\n> Compress-Archive\
    \ *.txt archive.zip\n```\n\nWith `-Update`, you can extend or change an existing\
    \ archive, and with `-Force`, you can overwrite a possibly existing ZIP file.\
    \ `-CompressionLevel` enables you to influence the compression algorithm. Permitted\
    \ settings are `Optimal` (applies by default), `Fastest`, and `NoCompression`\
    \ (for example, for already compressed image or PDF files).\n\nTo unpack an archive,\
    \ you can use `Expand-Archive`:\n\n```\n> Expand-Archive my.zip       # unpack\
    \ in the current directory\n> Expand-Archive my.zip -DestinationPath dir   # unpack\
    \ in dir\n```\n\nAmazingly, there is no way to view or list the contents of an\
    \ archive file. If necessary, you may have to use commands from one of the numerous\
    \ ZIP extension modules available on the internet.\n\n### 7.3.1 Compressing Search\
    \ Results\n\nBasically, `Compress-Archive` can also process results of `Get-ChildItem`,\
    \ as long as you specify the filename of the archive with the `-DestinationPath`\
    \ option. However, the behavior of `Compress-Archive` takes some getting used\
    \ to. Let's assume we have the following directory structure:\n\n```\ndirA\\n\
    \    file1\n    file2\n    dirB\\n        file3\n```\n\n`Get-ChildItem` will now\
    \ recursively traverse the contents of `dirA` and pass it to `Compress-Archive`:\n\
    \n```\n> Get-ChildItem -Recurse dirA |\n    Compress-Archive -DestinationPath\
    \ my.zip\n> Expand-Archive my.zip -DestinationPath dirC\n```\n\nThe `dirC` directory\
    \ now contains the following files and directories:\n\n```\ndirC\\n    file1\n\
    \    file2\n    file3 (!)\n    dirB\\n        file3\n```\n\nThis result occurs\
    \ because `Compress-Archive` received the `dirB` directory once and the `file3`\
    \ file once from `Get-ChildItem`. `dirB` was processed correctly. However, `file3`\
    \ was processed without considering the directory. The file was therefore inserted\
    \ into the archive twice. The documentation points out this special case, so the\
    \ behavior is apparently not considered an error. In this respect, you should\
    \ use `Compress-Archive` for further processing of files only if all files are\
    \ located in the same directory.\n\n## 7.4 Process Management\n\n`Start-Process`\
    \ allows you to start a new process, such as the Notepad editor for first tests:\n\
    \n```\n> Start-Process notepad\n```\n\n`Start-Process` starts the process in the\
    \ background. If you do not want it to start, you can pass the `-Wait` option\
    \ to it. Then, the terminal or your script will be blocked until the process ends.\n\
    \nUsually, the new process has the same rights as the terminal or your script.\
    \ To run a new process with admin rights, you must use `-Verb RunAs`. However,\
    \ a warning dialog will then display in which the user of the computer must confirm\
    \ that the app can make changes to the computer.\n\n`Get-Process` returns a list\
    \ of all processes running on the computer. If you specify a process name as a\
    \ parameter, only processes with the same name will be determined. With `-IncludeUserName`,\
    \ the cmdlet also shows the assigned user:\n\n```\n# all processes\n> Get-Process\n\
    \nNPM(K)    PM(M)      WS(M)     CPU(s)     Id  SI ProcessName\n------    -----\
    \      -----     ------     --  -- -----------\n      6    1.09       6.14   \
    \    0.05   3888   0 AggregatorHost\n     24    9.11      34.42       0.52   7492\
    \   1 ApplicationFrameHost\n     10    1.79       8.25       0.00   2916   0 blnsvr\n\
    \      ...\n```\n\n```\n# show only notepad processes, with user names\n> Get-Process\
    \ -IncludeUserName notepad\n\n    WS(M)   CPU(s)     Id UserName            ProcessName\n\
    \    -----   ------     -- --------            -----------\n    60.01     0.50\
    \   1212 KVMWIN\\kofler        Notepad\n    59.88     0.47   8640 KVMWIN\\kofler\
    \        Notepad\n```\n\nProvided you have a suitable process object and have\
    \ started the process yourself, you can also stop processes via `Stop-Process`.\
    \ Watch out, though: The following command terminates not only the process started\
    \ earlier, but *all* running Notepad instances! (Only with admin rights can you\
    \ also terminate foreign processes.)\n\n```\n> Get-Process notepad | Stop-Process\n\
    ```\n\n### 7.4.1 Launching Other PowerShell Scripts\n\nIf you want to run another\
    \ PowerShell script—starting from an already running script—the best approach\
    \ is to proceed as follows:\n\n```\n> Start-Process powershell.exe `\n    -ArgumentList\
    \ \"-file C:\\directory\\myscript.ps1\", \"arg1\", \"arg2\"\n```\n\n`Start-Process`\
    \ thus starts a new PowerShell process to which you can pass the location of your\
    \ script and any necessary parameters.\n\nIf you do not want to start a second\
    \ script as a new process, but only want to read (import) its code at the current\
    \ position, you can do this by using the dot source operator:\n\n```\n. other-file.ps1\n\
    ```\n\nFor complex tasks that require a lot of code, you should divide your script\
    \ into modules and import them using `Import-Module`.\n\n### 7.4.2 Running Commands\
    \ in the Background\n\nSometimes, you don’t want to run an entire script in the\
    \ background; often, a few commands are sufficient. You can pass these commands\
    \ to `Start-Job`. In the following example, the contents of a directory are stored\
    \ in a ZIP file. If the statement is in a script, the script will continue in\
    \ the meantime.\n\n```\n> Start-Job { Compress-Archive mydir\\ archive.zip }\n\
    ```\n\nIf you need to rely on the completion of the ZIP file later in the script,\
    \ you must remember the job ID. This allows you to later read the output of the\
    \ operation using `Receive-Job` or wait for completion by using `Wait-Job`:\n\n\
    ```\n$myjob = Start-Job { Compress-Archive mydir\\ archive.zip }\n# first do something\
    \ else ...\n# then wait for Compress-Archive to finish\nWait-Job $myjob\n```\n\
    \n### 7.4.3 Managing Services\n\nServices (also referred to as system services)\
    \ are background processes required for the operation of Windows and its functions.\
    \ You can find out which services are running on your system by using the program\
    \ of the same name or via the `Get-Service` command which lists all the services.\
    \ You can also pass a pattern to the cmdlet to search specifically for services:"
  mdcn: "## 7.2.2 文本与对象\n\n与 Linux 中的 `grep` 命令不同，你无法使用 `Select-String` 来过滤任何 cmdlet\
    \ 的结果。原因很简单：cmdlet 返回的是对象，而不是文本。（文本之所以显示在终端中，仅仅是因为 PowerShell 在之前自动将对象转换成了文本。）\n\
    \n因此，例如，如果你想知道 `Start-Process` cmdlet 有什么别名，以下命令将不会起作用。它无法识别 `Get-Alias` 结果中的任何文本。\n\
    \n```\n> Get-Alias | Select-String Start-Process\n```\n\n现在，你可以使用 `Out-String`\
    \ 将 `Get-Alias` 的结果转换为字符串，然后进行搜索。基本上，这种方法是可行的，因为 `Select-String` 也能找到匹配项。然而，`Out-String`\
    \ 会将结果转换为*一个*字符串。该命令返回的不是仅包含 `Start-Process` 的别名定义，而是所有别名的完整列表，这最终就是 `Get-Alias`\
    \ 的原始结果。但这样做并没有任何收获。\n\n```\n> Get-Alias | Out-String | Select-String Start-Process\n\
    \nCommandType Name\n----------- -----\nAlias ? -> Where-Object\nAlias % -> ForEach-Object\n\
    cd -> Set-Location\n...\n```\n\n只有 `Out-String -Stream` 才能提供所需的结果。使用这个附加选项，cmdlet\
    \ 会将每一行作为单个字符串返回。最终，搜索到的别名 `saps` 和 `start` 就会显示出来。\n\n```\n> Get-Alias | Out-String\
    \ -Stream | Select-String Start-Process\n\nAlias saps -> Start-Process\nAlias\
    \ start -> Start-Process\n```\n\n但是 `command | Out-String -Stream | Select-String\
    \ ...` 很少是一个好主意，因为 cmdlet 返回的是对象。你可以使用 `Get-Member` 或 `Format-List` 来查明结果的数据类型，然后制定适当的条件进行评估：\n\
    \n```\n> Get-Alias | ? {$_.Definition -eq 'Start-Process'}\n\nAlias saps -> Start-Process\n\
    Alias start -> Start-Process\n```\n\n更便捷的方法是不时查阅 `Get-Help`。使用 `-Definition` 选项，`Get-Alias`\
    \ 可以直接确定所需命令的别名：\n\n```\n> Get-Alias -Definition Start-Process\n\nAlias saps ->\
    \ Start-Process\nAlias start -> Start-Process\n```\n\n## 7.3 压缩和归档文件\n\n`Compress-Archive`\
    \ 命令允许你将一个目录或单个文件打包成压缩归档文件。基本上，该命令的应用很简单：\n\n```\n> Compress-Archive mypictures\\\
    \ mypictures.zip\n> Compress-Archive *.txt archive.zip\n```\n\n使用 `-Update`，你可以扩展或更改现有归档文件；使用\
    \ `-Force`，你可以覆盖可能已存在的 ZIP 文件。`-CompressionLevel` 允许你影响压缩算法。允许的设置有 `Optimal`（默认应用）、`Fastest`\
    \ 和 `NoCompression`（例如，用于已压缩的图像或 PDF 文件）。\n\n要解压缩归档文件，你可以使用 `Expand-Archive`：\n\
    \n```\n> Expand-Archive my.zip       # 在当前目录解压缩\n> Expand-Archive my.zip -DestinationPath\
    \ dir   # 在 dir 目录解压缩\n```\n\n令人惊讶的是，没有直接的方法来查看或列出归档文件的内容。如有必要，你可能不得不使用互联网上众多\
    \ ZIP 扩展模块之一提供的命令。\n\n### 7.3.1 压缩搜索结果\n\n基本上，`Compress-Archive` 也可以处理 `Get-ChildItem`\
    \ 的结果，只要你使用 `-DestinationPath` 选项指定归档文件的文件名。然而，`Compress-Archive` 的行为需要一些时间来适应。假设我们有以下目录结构：\n\
    \n```\ndirA\\n    file1\n    file2\n    dirB\\n        file3\n```\n\n现在，`Get-ChildItem`\
    \ 将递归遍历 `dirA` 的内容并将其传递给 `Compress-Archive`：\n\n```\n> Get-ChildItem -Recurse\
    \ dirA |\n    Compress-Archive -DestinationPath my.zip\n> Expand-Archive my.zip\
    \ -DestinationPath dirC\n```\n\n`dirC` 目录现在包含以下文件和目录：\n\n```\ndirC\\n    file1\n\
    \    file2\n    file3 (!)\n    dirB\\n        file3\n```\n\n出现这个结果是因为 `Compress-Archive`\
    \ 从 `Get-ChildItem` 接收到了一次 `dirB` 目录和一次 `file3` 文件。`dirB` 被正确处理了。然而，`file3` 在处理时没有考虑其所在的目录。因此，该文件被插入了归档文件两次。文档指出了这个特殊情况，因此这种行为显然不被视为错误。在这方面，你应该仅在所有文件都位于同一目录中时，才使用\
    \ `Compress-Archive` 来进一步处理文件。\n\n## 7.4 进程管理\n\n`Start-Process` 允许你启动一个新进程，例如用于初步测试的记事本编辑器：\n\
    \n```\n> Start-Process notepad\n```\n\n`Start-Process` 在后台启动进程。如果你不希望它在后台启动，可以传递\
    \ `-Wait` 选项。这样，终端或你的脚本将被阻塞，直到进程结束。\n\n通常，新进程与终端或你的脚本具有相同的权限。要以管理员权限运行新进程，你必须使用\
    \ `-Verb RunAs`。但是，随后会显示一个警告对话框，计算机用户必须在其中确认该应用可以对计算机进行更改。\n\n`Get-Process` 返回计算机上所有正在运行的进程列表。如果你指定一个进程名称作为参数，则只会确定具有相同名称的进程。使用\
    \ `-IncludeUserName`，该 cmdlet 还会显示分配的用户：\n\n```\n# 所有进程\n> Get-Process\n\nNPM(K)\
    \    PM(M)      WS(M)     CPU(s)     Id  SI ProcessName\n------    -----     \
    \ -----     ------     --  -- -----------\n      6    1.09       6.14       0.05\
    \   3888   0 AggregatorHost\n     24    9.11      34.42       0.52   7492   1\
    \ ApplicationFrameHost\n     10    1.79       8.25       0.00   2916   0 blnsvr\n\
    \      ...\n```\n\n```\n# 仅显示记事本进程，并显示用户名\n> Get-Process -IncludeUserName notepad\n\
    \n    WS(M)   CPU(s)     Id UserName            ProcessName\n    -----   ------\
    \     -- --------            -----------\n    60.01     0.50   1212 KVMWIN\\kofler\
    \        Notepad\n    59.88     0.47   8640 KVMWIN\\kofler        Notepad\n```\n\
    \n只要你拥有合适的进程对象并且是自己启动的进程，你也可以通过 `Stop-Process` 来停止进程。但要注意：以下命令不仅会终止之前启动的进程，还会终止*所有*正在运行的记事本实例！（只有拥有管理员权限，你才能终止其他用户的进程。）\n\
    \n```\n> Get-Process notepad | Stop-Process\n```\n\n### 7.4.1 启动其他 PowerShell\
    \ 脚本\n\n如果你想运行另一个 PowerShell 脚本——从一个已经运行的脚本开始——最好的方法是按照以下步骤操作：\n\n```\n> Start-Process\
    \ powershell.exe `\n    -ArgumentList \"-file C:\\directory\\myscript.ps1\", \"\
    arg1\", \"arg2\"\n```\n\n`Start-Process` 因此启动一个新的 PowerShell 进程，你可以向其传递脚本的位置和任何必要的参数。\n\
    \n如果你不想将第二个脚本作为新进程启动，而只是想在当前位置读取（导入）其代码，你可以使用点源运算符来实现：\n\n```\n. other-file.ps1\n\
    ```\n\n对于需要大量代码的复杂任务，你应该将脚本划分为模块，并使用 `Import-Module` 导入它们。\n\n### 7.4.2 在后台运行命令\n\
    \n有时，你不想在后台运行整个脚本；通常，几个命令就足够了。你可以将这些命令传递给 `Start-Job`。在以下示例中，一个目录的内容被存储到一个 ZIP\
    \ 文件中。如果该语句在脚本中，脚本将继续执行。\n\n```\n> Start-Job { Compress-Archive mydir\\ archive.zip\
    \ }\n```\n\n如果你需要在脚本的后续部分依赖 ZIP 文件的完成，你必须记住作业 ID。这允许你稍后使用 `Receive-Job` 读取操作的输出，或使用\
    \ `Wait-Job` 等待完成：\n\n```\n$myjob = Start-Job { Compress-Archive mydir\\ archive.zip\
    \ }\n# 首先做其他事情 ...\n# 然后等待 Compress-Archive 完成\nWait-Job $myjob\n```\n\n### 7.4.3\
    \ 管理服务\n\n服务（也称为系统服务）是 Windows 及其功能运行所需的后台进程。你可以通过使用同名程序或通过 `Get-Service` 命令来查明系统上正在运行哪些服务，该命令会列出所有服务。你也可以向该\
    \ cmdlet 传递一个模式来专门搜索服务："
