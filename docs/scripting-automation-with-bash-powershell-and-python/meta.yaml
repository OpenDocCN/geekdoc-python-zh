    \ result:\n\n```\nfunction Get-TotalSize {\n    $TotalSize = 0\n    foreach($item\
    \ in $input) {\n        $TotalSize += $Item.Length\n    }\n    $TotalSize /= 1000000\n\
    \    \"Total size: {0:F1} MB\" -f $TotalSize\n}\n```\n\nTo calculate the space\
    \ required by all files in the Downloads directory, the function can be called\
    \ in the following way:\n\n```\n> Get-ChildItem -Recurse C:\\Users\\kofler\\Downloads\\\
    \ |\n  Get-TotalSize\n\nTotal size: 247.4 MB\n```\n\nThis script has a flaw: It\
    \ relies on the fact that any object passed via standard input actually has a\
    \ Length property. Set-StrictMode also interferes with this script if you pass\
    \ a version number greater than 1. The simplest solution is to check the data\
    \ type within the loop and then make an assignment into a typed variable, as in\
    \ the following example:\n\n```\nforeach($Item in $input) {\n    if ($Item.GetType().Name\
    \ -eq \"System.IO.FileInfo\") {\n        [System.IO.FileInfo] $FInfo = $Item\n\
    \        $TotalSize += $FInfo.Length\n    }\n}\n```\n\nIf the data type does not\
    \ match, the script will trigger an error.\n\n# 4.11.6 Syntax Variants\n\nFor\
    \ functions that are supposed to process standard input, PowerShell provides two\
    \ syntax variants. One version involves organizing the function into the three\
    \ blocks, begin, process, and end:"
  - "[PAGE 145]\n\n# 4 PowerShell\n\n```\nfunction Process-Data {\n    begin   { initialization\
    \ ... }\n    process { process data ...  }\n    end     { output, cleanup ...\
    \ }\n}\n```\n\nThe `process` block is run for each element of the standard input,\
    \ where `$_` provides access to the currently active element. All three blocks\
    \ are optional. If you define *one* of these blocks in a function, the entire\
    \ code of the function must be specified in `begin`, `process`, and `end`. The\
    \ function `Get-TotalSize` can then be programmed in the following way:\n\n```\n\
    function Get-TotalSize {\n    begin {\n        $TotalSize = 0\n    }\n    process\
    \ {\n        $TotalSize += $_.Length\n    }\n    end {\n        $TotalSize /=\
    \ 1000000\n        \"Total size: {0:F1} MB\" -f $TotalSize\n    }\n}\n```\n\n\
    With `Set-StrictMode -Version 2`, PowerShell complains again that it is not sure\
    \ if `$_` has a `Length` property. If necessary, you need to rebuild the code,\
    \ as explained earlier.\n\n`filter` is a short notation for a function where the\
    \ `begin` and `end` blocks are empty:\n\n```\nfilter Process-Data {\n    code\n\
    }\n# equivalent\nfunction Process-Data {\n    begin   { }\n    process { code\
    \ }\n    end     { }\n}\n```\n\nIn practice, `filter` is only useful in exceptional\
    \ cases. Without the initialization performed in `begin` or without final commands\
    \ in `end`, programming a meaningful function can be difficult."
