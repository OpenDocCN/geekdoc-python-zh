    Python 是一种脚本语言，因为其代码最初是由解释器执行的。然而，在当前版本中，出于性能原因，代码首先被编译成中间二进制格式（称为*字节码*）。在使用 Python
    时，你不会注意到这些努力。换句话说，Python 的行为像一种解释型语言，但它在幕后确实使用了编译器。


