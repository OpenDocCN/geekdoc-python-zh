  md: "# 12.1.1 Linux\n\nOn Linux, the `ssh` command is part of the basic vocabulary,\
    \ so to speak, and is almost always installed. You can see for yourself via `ssh\
    \ -V` in the terminal. This command displays the installed version.\n\n```\n$\
    \ ssh -V\n\nOpenSSH_9.2p1, OpenSSL 3.0.8 7 Feb 2023\n```\n\nIf the `ssh` command\
    \ is indeed not installed, you can install the `ssh` command in the following\
    \ ways:\n\n```\n$ sudo apt update                (Debian, Ubuntu)\n$ sudo apt\
    \ install openssh-client\n\n$ sudo dnf install openssh-client    (Fedora, Red\
    \ Hat)\n```\n\nThe operation of an SSH server is not quite as self-evident. The\
    \ following short test can provide clarity:\n\n```\n$ systemctl status sshd\n\n\
    sshd.service - OpenSSH Daemon\n     Loaded: loaded (...)\n     Active: active\
    \ (running) since ...\n```\n\nIf the `sshd` service is not known or not running,\
    \ the installation will succeed in no time. I have again summarized the commands\
    \ for the most important distributions here:\n\n```\n$ sudo apt update       \
    \         (Debian, Ubuntu)\n$ sudo apt install openssh-server\n\n$ sudo dnf install\
    \ openssh-server    (Fedora, Red Hat)\n$ systemctl enable --now sshd\n```\n\n\
    # 12.1.2 macOS\n\nOn macOS, the SSH client and server are already installed. However,\
    \ the SSH server must be explicitly enabled. For this task, open the **General\
    \ • Share** module in the **System Preferences** and enable the **Remote login**\
    \ option. Done!\n\n# 12.1.3 Windows\n\nIn current Windows versions, the SSH client\
    \ (i.e., the `ssh` command) is installed by default, whereas the SSH server is\
    \ not. To install missing components, you must open"
  merge: -1
  pgno: 323
- img_proc: true
  md: "the **Settings** program. You can find the *OpenSSH client* and the *OpenSSH\
    \ server*—well hidden—under **Apps • Optional features • Add an optional feature**.\
    \ (Why the program can’t simply be installed via the Microsoft Store defies any\
    \ logic. But I won’t complain here; it’s great that Microsoft finally offers an\
    \ official SSH client and server, making the installation of the dreadfully outdated\
    \ PuTTY program unnecessary.)\n\nYou can run the SSH client with the `ssh` command\
    \ in the terminal after the installation. With regard to the SSH server, one more\
    \ step is necessary. The program is installed but is not yet running as a service.\
    \ The solution is the **Services** program, which you can find in the **Start**\
    \ menu. Search for the *OpenSSH Server* item and double-click to open the settings\
    \ dialog. Then, click the **Start** button to start the server service for the\
    \ first time. You also must set **Startup type = Automatic** to always activate\
    \ the service when the computer boots up in the future.\n\nInstead of clicking\
    \ through settings dialogs, you can also perform the installation and service\
    \ startup in the terminal with the following commands:\n\n```\n> Add-WindowsCapability\
    \ -Online -Name OpenSSH.Client\n> Add-WindowsCapability -Online -Name OpenSSH.Server\n\
    > Start-Service sshd\n> Set-Service -Name sshd -StartupType 'Automatic'\n```\n\
    \nIf you then log on to your Windows computer from an external computer via SSH,\
    \ you’ll abruptly land in the IT Stone Age. Inexplicably, the SSH server uses\
    \ `cmd.exe` as the default shell. To enable you to use PowerShell within the SSH\
    \ session, you must run `pwsh`.\n\nFor PowerShell to be used automatically on\
    \ every SSH login, you must modify a registry entry. You can achieve this task\
    \ using the following three commands, which must be executed with admin rights\
    \ in a terminal:\n\n```\n> $PSPATH = (Get-Command -Name pwsh).path\n> New-Item\
    \ \"HKLM:\\Software\\OpenSSH\" -Force\n> New-ItemProperty \"HKLM:\\SOFTWARE\\\
    OpenSSH\" -Name DefaultShell `\n    -Value \"$PSPATH\" -PropertyType String -Force\n\
    ```\n\n> **Suddenly \"Permission Denied\" Displays at SSH Login**\n\nIf the location\
    \ where `pwsh.exe` is stored changes during a PowerShell update or during a new\
    \ PowerShell installation, the SSH server can no longer start PowerShell. However,\
    \ the error message in such cases is meaningless: *Permission denied*.\n\nThis\
    \ problem can stem from countless reasons, from the wrong password to the incorrect\
    \ configuration of `opensshd_config`. However, one possible cause of errors is\
    \ a changed path to `pwsh.exe`."
