    \ %s' % (mdfile, pdffile)\n        print(cmd)\n        subprocess.run(cmd, shell=True)\n\
    \nwm = pyinotify.WatchManager()\nwm.add_watch('.', pyinotify.IN_CLOSE_WRITE, runPandoc)\n\
    notifier = pyinotify.Notifier(wm)\nnotifier.loop()\n```\n\n在 Bash 脚本中，你可以使用 `inotifywait`\
    \ 和 `inotifywatch` 命令来使用 `inotify` 函数，但你必须首先安装 `inotify-tools` 软件包。一些简单的应用示例记录在\
    \ https://github.com/inotify-tools/inotify-tools/wiki#inotifywait。\n\n## 11.5.2\
    \ inotify 的替代方案\n\n在 macOS 上，*文件系统事件*（`FSEvents`）API 提供了类似的功能。在脚本中，使用 `FSEvents`\
    \ 最简单的方法是使用 `fswatch` 命令。此命令可以使用 `brew` 安装，如 https://github.com/emcrisostomo/fswatch\
    \ 中所述。\n\n另一个监控选项由 `launchd` 程序提供。有关一个简单的用例，请参阅此 Stack Overflow 帖子：https://stackoverflow.com/a/1516034。\n\
    \n在 Windows 上，你可以使用 `FileSystemWatcher` 功能。但是，使用此 .NET 功能相当复杂。PowerShell 的代码示例可在\
    \ https://powershell.one/tricks/filesystem/filesystemwatcher 获取。\n\n# 第 12 章\n\
    SSH\n\n安全外壳协议（SSH）几十年来一直是 Linux 和 macOS 上在另一台计算机上以文本模式工作并执行命令的首选方法。幸运的是，微软几年前也加入了\
    \ SSH 的行列，因此 SSH 终于实现了跨平台。对于脚本编写，SSH 之所以重要有两个原因：\n\n-   使用 SSH，你可以在其他计算机上工作，在那里创建脚本，并最终执行它们。SSH\
    \ 是一项管理要求，尤其是在服务器管理方面。\n\n    但你并不总是必须连接到服务器！我经常使用 SSH 在我的树莓派上工作。树莓派不需要屏幕或键盘来进行此连接——网络连接就足够了。同样，这种简单性也适用于我日常工作中众多的虚拟机：我经常根本不需要图形用户界面（GUI），并且可以通过\
    \ SSH 连接在终端中输入相关命令或脚本编程。\n\n    此外，Visual Studio Code（VS Code）编辑器和 SSH 是一个很好的组合。你可以在第\
    \ 13 章中了解更多关于 VS Code 的信息。\n\n-   对于许多脚本来说，在不同计算机之间安全地传输文件或整个目录的能力至少同样重要。`scp`\
    \ 和 `rsync` 命令以及安全文件传输协议（SFTP）使用 SSH。因此，备份和上传脚本通常需要 SSH 访问。你还需要了解如何使用 SSH 密钥进行身份验证。因此，此类密钥的处理是本章的一个重要主题。\n\
    \n> **本章的先决条件**\n\n就脚本编写而言，不需要满足任何内容方面的先决条件，这意味着你可以独立于所有其他章节阅读本章。示例脚本假设你具备 Bash\
    \ 和 PowerShell 的基础知识。你还应该熟悉 `find` 命令（参见第 6 章，第 6.2 节）。就你在 Linux 上工作而言，基本的管理知识当然始终是一个优势。\n\
    \n## 12.1 安装 SSH 客户端和服务器\n\n要从本地计算机 A 建立到第二台计算机 B 的 SSH 连接，计算机 A 上必须有一个 SSH 客户端（通常是\
    \ `ssh` 命令），并且计算机 B 上必须运行一个 SSH 服务器。本节描述了在使用 SSH 之前必须满足的先决条件。\n\n### 12.1.1 Linux\n\
    \n在 Linux 上，`ssh` 命令可以说是基本词汇的一部分，几乎总是安装好的。你可以通过在终端中输入 `ssh -V` 来亲自验证。此命令显示已安装的版本。\n\
    \n```\n$ ssh -V\n\nOpenSSH_9.2p1, OpenSSL 3.0.8 7 Feb 2023\n```\n\n如果 `ssh` 命令确实未安装，你可以通过以下方式安装\
    \ `ssh` 命令：\n\n```\n$ sudo apt update                (Debian, Ubuntu)\n$ sudo\
    \ apt install openssh-client\n\n$ sudo dnf install openssh-client    (Fedora,\
    \ Red Hat)\n```\n\nSSH 服务器的运行则不那么不言自明。以下简短测试可以提供清晰度：\n\n```\n$ systemctl status\
    \ sshd\n\nsshd.service - OpenSSH Daemon\n     Loaded: loaded (...)\n     Active:\
    \ active (running) since ...\n```\n\n如果 `sshd` 服务未知或未运行，安装将很快成功。我在此再次总结了最重要发行版的命令：\n\
    \n```\n$ sudo apt update                (Debian, Ubuntu)\n$ sudo apt install openssh-server\n\
    \n$ sudo dnf install openssh-server    (Fedora, Red Hat)\n$ systemctl enable --now\
    \ sshd\n```\n\n### 12.1.2 macOS\n\n在 macOS 上，SSH 客户端和服务器已经安装。但是，必须明确启用 SSH 服务器。为此任务，请在\
    \ **系统偏好设置** 中打开 **通用 • 共享** 模块，并启用 **远程登录** 选项。完成！\n\n### 12.1.3 Windows\n\n\
    在当前的 Windows 版本中，SSH 客户端（即 `ssh` 命令）默认安装，而 SSH 服务器则未安装。要安装缺失的组件，你必须打开 **设置** 程序。你可以在\
    \ **应用 • 可选功能 • 添加可选功能** 下找到 *OpenSSH 客户端* 和 *OpenSSH 服务器*——隐藏得很好。（为什么程序不能简单地通过\
    \ Microsoft Store 安装，这违背了任何逻辑。但我不会在这里抱怨；微软终于提供了官方的 SSH 客户端和服务器，使得安装过时的 PuTTY 程序变得不必要，这真是太好了。）\n\
    \n安装后，你可以在终端中使用 `ssh` 命令运行 SSH 客户端。关于 SSH 服务器，还需要一个步骤。程序已安装，但尚未作为服务运行。解决方案是 **服务**\
    \ 程序，你可以在 **开始** 菜单中找到它。搜索 *OpenSSH Server* 项，双击打开设置对话框。然后，单击 **启动** 按钮以首次启动服务器服务。你还必须将\
    \ **启动类型 = 自动** 设置为在将来计算机启动时始终激活服务。\n\n除了单击设置对话框，你还可以在终端中使用以下命令执行安装和服务启动：\n\n\
    ```\n> Add-WindowsCapability -Online -Name OpenSSH.Client\n> Add-WindowsCapability\
    \ -Online -Name OpenSSH.Server\n> Start-Service sshd\n> Set-Service -Name sshd\
    \ -StartupType 'Automatic'\n```\n\n如果你随后通过 SSH 从外部计算机登录到你的 Windows 计算机，你会突然进入\
    \ IT 石器时代。莫名其妙的是，SSH 服务器使用 `cmd.exe` 作为默认 shell。为了让你能在 SSH 会话中使用 PowerShell，你必须运行\
    \ `pwsh`。\n\n为了在每次 SSH 登录时自动使用 PowerShell，你必须修改一个注册表项。你可以使用以下三个命令完成此任务，这些命令必须在终端中以管理员权限执行：\n\
    \n```\n> $PSPATH = (Get-Command -Name pwsh).path\n> New-Item \"HKLM:\\Software\\\
    OpenSSH\" -Force\n> New-ItemProperty \"HKLM:\\SOFTWARE\\OpenSSH\" -Name DefaultShell\
    \ `\n    -Value \"$PSPATH\" -PropertyType String -Force\n```\n\n> **SSH 登录时突然显示“权限被拒绝”**\n\
    \n如果 `pwsh.exe` 的存储位置在 PowerShell 更新或新 PowerShell 安装期间发生变化，SSH 服务器将无法再启动 PowerShell。然而，在这种情况下，错误消息毫无意义：*Permission\
    \ denied*。\n\n此问题可能源于无数原因，从错误的密码到 `opensshd_config` 的错误配置。然而，一个可能的错误原因是 `pwsh.exe`\
    \ 的路径发生了变化。"
