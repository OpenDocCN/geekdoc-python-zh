    kali.vbox               0800278EB571\nmetasploitable2.vbox    080027E770F0\nubuntu.vbox\
    \             0800278556EA\n```\n\n## 10.4.3 ConvertTo-Xml、Export-Clixml 和 Import-Clixml\n\
    \n最后，我想简要介绍三个用于 PowerShell 对象和 XML 文档之间转换的 cmdlet：\n\n- **ConvertTo-Xml**\n  `ConvertTo-Xml`\
    \ 将 PowerShell 对象转换为 XML 数据类型：\n\n  `$myxmlvar = Get-Date | ConvertTo-Xml`\n\n\
    \  请注意，没有具有反向功能的*官方* `ConvertFrom-Xml` cmdlet。但是，如果你在互联网上搜索 `ConvertFrom-Xml`，你会遇到社区提供的各种\
    \ cmdlet，它们从 XML 文档中组装一个尽可能对应的 `PSCustomObject`。\n\n- **Export-Clixml**\n  `Export-Clixml`\
    \ 将 PowerShell 对象保存到符合公共语言基础设施（CLI）标准的 XML 文件中：\n\n  `Get-Date | Export-Clixml\
    \ 'date.xml'`\n\n- **Import-Clixml**\n  对应的 cmdlet 读取文件并从中创建相应的 PowerShell 对象：\n\
    \n  ```\n  $olddate = Import-Clixml 'date.xml'\n  ```\n\n## 10.5 XML 和 Python\n\
    \nPython 有各种官方（甚至更多外部）XML 库。这些模块针对不同的应用目的进行了优化，例如，用于特别高效地处理大型文件、用于最安全地分析 XML 文件，或用于创建你自己的\
    \ XML 文档。以下页面提供了良好的概述：\n\n- https://docs.python.org/3/library/xml.html\n- https://realpython.com/python-xml-parser\n\
    \n本节重点介绍默认随 Python 一起分发的 `xml.etree.ElementTree` 模块。该模块易于使用，非常适合分析 XML 文档。以下几行展示了如何读取\
    \ XML 字符串或 XML 文件并访问 XML 文档的根元素：\n\n```\nimport xml.etree.ElementTree as ET\n\
    # read XML file ...\nroot = ET.parse('filename.xml').getroot()\n\n# ... or process\
    \ XML from string\ns = '<?xml ...>...'\nroot = ET.fromString(s)\n```\n\n`root`\
    \ 是 `Element` 类的一个对象，具有以下特征：\n\n- tag：当前 XML 标签的名称\n- text：标签中的文本（但不包括子元素）\n-\
    \ attrib：包含 XML 标签键的字典\n\n`Element` 的所有子元素都可以直接循环。循环变量本身也包含 `Element` 对象：\n\n\
    ```\nfor sub in e:  # loop through all sub-elements\n```\n\n或者，你可以直接访问第 n 个元素：\n\
    \n```\nsub = e[3]      # 4. Sub-element (the count starts with 0)\n```\n\n如果你想处理当前级别上所有具有特定名称的\
    \ XML 元素，可以使用 `findall` 方法：\n\n```\n# traverse all <tagname> elements on the current\
    \ level\nfor sub in e.findall('tagname'):\n```\n\n如果你只想处理第一个匹配的子元素，你可以省略通过 `findall`\
    \ 的循环，而改用 `find`。但是请注意，如果找不到匹配的元素，以下语句将抛出错误：\n\n```\n# access the first <tagname>\
    \ element\nsub = e.find('tagname')\n```\n\n另一方面，如果你想搜索 XML 文档所有级别的元素，你应该使用 `iter`\
    \ 方法，如以下示例所示：\n\n```\n# traverse all <tagname> elements on all levels\nfor sub\
    \ in e.iter('tagname'):\n```\n\n如果 XML 文件使用命名空间，你必须向 `find` 或 `findall` 传递一个包含所有使用命名空间缩写的字典。这些标签名称必须以相同的缩写为前缀。请看以下第三个示例，它演示了此过程。\n\
    \n### 10.5.1 示例：为国家代码创建字典\n\n这个速成课程对于大多数用例已经足够了。我们第一个示例的起点是 `countries.xml` 文件，其结构如下：\n\
    \n```\n<countries>\n  <country code=\"AF\" iso=\"4\">Afghanistan</country>\n \
    \ <country code=\"AL\" iso=\"8\">Albania</country>\n  <country code=\"DZ\" iso=\"\
    12\">Algeria</country>\n  ...\n</countries>\n```\n\n以下脚本的目标是创建一个字典，并在此过程中使用国家代码作为键：\n\
    \n```\n# Sample file read-countries.py\nimport xml.etree.ElementTree as ET\nroot\
    \ = ET.parse('countries.xml').getroot()\ncountries = {}  # empty dictionary\n\
    for country in root:\n    countries[country.attrib['code']] = country.text\n\n\
    print(countries['CH'])   # output: Switzerland\n```"
