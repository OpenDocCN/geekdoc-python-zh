    # # 4.12 Modules


    Functions stored in a *.ps1 file are only accessible within this script, not outside
    the script. If you want to call your functions interactively in the shell (like
    cmdlets) or use them in another script, you must save the code of the functions
    in a module (file identifier *.psm1):


    ```

    # File MyModule.psm1

    Function F1 { ... }

    Function F2 { ... }

    Function F3 { ... }

    ```


    Before you can call any of the functions stored in the module, you must import
    the module once:


    ```

    > Import-Module .\MyModule.psm1

    ```


    Until the end of the current PowerShell session, you can then call functions F1,
    F2, and F3 like cmdlets:


    ```

    > F1

    ```


    When you make changes or corrections in the module, running `Import-Module` again
    is not sufficient, however. You must first explicitly delete the module from the
    internal PowerShell memory using `Remove-Module` and then load it again!


    ```

    > Remove-Module MyModule

    > Import-Module .\MyModule.psm1

    ```


    You can list the functions defined in a loaded module via `Get-Command`, as in
    the following example:


    ```

    > Get-Command -Module MyModule

    ```


    | CommandType | Name | Version | Source |

    | --- | --- | --- | --- |

    | Function | F1 | 0.0 | MyModule |

    | Function | F2 | 0.0 | MyModule |

    | Function | F3 | 0.0 | MyModule |


    # ## 4.12.1 Module Directories


    For `Import-Module`, you must always specify the path of the directory where you
    saved the module file. You can avoid this step if you save the module in a directory
    that PowerShell provides for module files. A list of these directories that are
    separated by semicolons is contained in the `$Env:PSModulePath` environment variable.
    In the following command, I used `-split` to output the content of the variable
    in a more readable way:'
- md: "## 4.12.2 Modules for Experts\n\nTo make your modules behave like full-fledged\
    \ cmdlets as much as possible, many optimization options are available, but I\
    \ will only hint at them briefly here:\n\n- **Export-ModuleMember**\n  By default,\
    \ all functions and aliases declared in a module file are available after Import-Module.\
    \ You can use the `Export-ModuleMember` statement to make selected functions public:\n\
    \n  ```powershell\n  # Export only the F2 function\n  Export-ModuleMember -Function\
    \ F2\n  ```\n\n  Note that `Export-ModuleMember` must be specified *after* the\
    \ declaration of the functions, not at the start of the module file! You can find\
    \ more details at https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_modules.\n\
    \n- **Manifest file**\n  If you want to make your module publicly available for\
    \ download, you must also set up a manifest file (*.psd1 identifier). This file\
    \ contains an exact description of your module's metadata (i.e., your name, the\
    \ module's version number, the assumed PowerShell version, etc.). You can find\
    \ more details at https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_module_manifests.\n\
    \n- **CmdletBinding**\n  You can use the `CmdletBinding` keyword to describe attributes\
    \ of your function in more detail: Where is a help text located? Should users\
    \ of your function be given the option to confirm each action beforehand? (This\
    \ option is appropriate if your function modifies or even deletes data.) Should\
    \ the outputs of the function be displayed page by page? You can find more details\
    \ at https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_functions_cmdletbindingattribute.\n\
    \n> **Installing Additional Modules**\n> Instead of programming modules yourself,\
    \ you can access a wide range of free modules in the PowerShell Gallery. I will\
    \ tell you how to install such modules in Chapter 7, Section 7.8.\n\n## 4.13 Error\
    \ Protection\n\nPrior to executing a script, PowerShell performs a cursory syntax\
    \ check. Only in the case of serious syntax errors, such as unclosed parentheses\
    \ or quotation marks, will a script not be executed at all.\n\nAlso, as a consequence,\
    \ PowerShell, like many other scripting languages, is quite tolerant of errors.\
    \ If a command does not exist, a file to be accessed does not exist, or some other\
    \ error is thrown, PowerShell displays an error message but then continues the\
    \ script with the next statement. In this section, I'll describe how you can make\
    \ your PowerShell scripts as error proof as possible.\n\n### 4.13.1 Set-StrictMode\n\
    \nThe `Set-StrictMode` command, mentioned several times earlier in this chapter,\
    \ sets how picky PowerShell should be about detecting errors. `Set-StrictMode`\
    \ currently supports three versions:\n\n- `Set-StrictMode -Version 1.0` causes\
    \ an error message when using an uninitialized variable. Variables in strings\
    \ (i.e., \"text $UnknownVariable\") are excluded.\n- `Set-StrictMode -Version\
    \ 2.0` triggers an error for each uninitialized variable as well as when using\
    \ non-existent properties.\n- `Set-StrictMode -Version 3.0` also throws an error\
    \ when accessing non-existent array elements.\n\nThe inaccuracies detected by\
    \ `Set-StrictMode` will result in an error message, but the script will still\
    \ continue! You can also specify `Latest` instead of a version number. However,\
    \ the results of these tests should be taken with a grain of salt: If more validity\
    \ tests are added in a future PowerShell version, your script may report an error\
    \ even though nothing has changed in the code.\n\n### 4.13.2 Aborting Scripts\
    \ on Errors\n\nThe way PowerShell behaves when it detects an error depends on\
    \ the contents of the `$ErrorActionPreference` variable. You can change the desired\
    \ behavior simply by assigning a string to the variable. This change is allowed\
    \ everywhere in a script. You can cause a different response to errors in different\
    \ parts of the program.\n\n| Setting | Effect |\n| :--- | :--- |\n| \"Continue\"\
    \ | Display error message, continue script (applies by default) |\n| \"Inquire\"\
    \ | Display error message and ask if script should be continued |\n| \"SilentlyContinue\"\
    \ | Continue script without error message |\n| \"Stop\" | Display error message,\
    \ end script |\n\n**Table 4.9** The Most Important Settings for the $ErrorActionPreference\
    \ Variable\n\n### 4.13.3 Separating Error Messages from Other Output\n\nWhen you\
    \ run a script interactively in PowerShell, ordinary outputs and errors alike\
    \ appear in the terminal. However, if you redirect the output of a script to a\
    \ file using `> outfile.txt`, then that file will contain only the regular output.\
    \ The error messages are still visible on the screen. This behavior has to do\
    \ with the fact that PowerShell differentiates between multiple “streams” that\
    \ are intended for different purposes. For background information on this topic,\
    \ see [Section 4.8](#section-4.8).\n\n### 4.13.4 Error Protection Using try/catch\n\
    \nAs with most higher-level programming languages (like C#, Java, etc.), PowerShell\
    \ provides the option to wrap multiple statements of critical (error-prone) code\
    \ into a `try` block. If an error occurs in that block during execution, the code\
    \ continues in the `catch` block. The `Error` variable provides information about\
    \ the error there.\n\n```powershell\ntry {\n    command1\n    command2\n    ...\n\
    } catch {\n    # Here code will be executed only if a\n    # an error has occurred\n\
    \    Write-Host \"An error occurred: $_\"\n}\n```\n\nThe decisive advantage of\
    \ `try-catch` constructs is that you can continue your script even if errors occur\
    \ without an error message and, if necessary, respond specifically to an error.\n\
    \n> **Outputting Error Messages**\n> PowerShell does not make outputting error\
    \ messages easy. In our earlier example, I used `Write-Host`. The error message\
    \ thus appears in the terminal but cannot be redirected.\n>\n> `Write-Output`\
    \ is usually not recommended because it makes the error message part of the result\
    \ of the script or function.\n>\n> `Write-Error` is only useful in exceptional\
    \ cases, because—depending on the setting of `$ErrorActionPreference`—this output\
    \ then triggers another error.\n\nTwo important syntax variants to the `try-catch`\
    \ syntax are worth exploring:\n\n- You can define multiple `catch` blocks for\
    \ different error types. PowerShell then only considers the `catch` code that\
    \ matches the error which occurred.\n- Following the `catch` blocks, there may\
    \ be a `finally` block, which is for cleanup. Code formulated in this block is\
    \ *always* executed, regardless of whether an error occurs or not, and regardless\
    \ of whether the script or function is exited in a `try` or `catch` block via\
    \ `return`.\n\nFor more details about these syntax variants, refer to https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_try_catch_finally."
  mdcn: "## 4.12.2 专家模块\n\n为了让您的模块尽可能表现得像功能齐全的 cmdlet，有许多优化选项可用，但我在此仅简要提及：\n\n- **Export-ModuleMember**\n\
    \  默认情况下，模块文件中声明的所有函数和别名在 `Import-Module` 后都可用。您可以使用 `Export-ModuleMember` 语句使选定的函数公开：\n\
    \n  ```powershell\n  # 仅导出 F2 函数\n  Export-ModuleMember -Function F2\n  ```\n\n\
    \  请注意，`Export-ModuleMember` 必须在函数声明*之后*指定，而不是在模块文件的开头！更多详情请参阅 https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_modules。\n\
    \n- **清单文件**\n  如果您希望将模块公开供下载，还必须设置清单文件（*.psd1 标识符）。此文件包含模块元数据的精确描述（即您的姓名、模块版本号、假定的\
    \ PowerShell 版本等）。更多详情请参阅 https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_module_manifests。\n\
    \n- **CmdletBinding**\n  您可以使用 `CmdletBinding` 关键字更详细地描述函数的属性：帮助文本位于何处？是否应为函数用户提供事先确认每个操作的选项？（如果您的函数修改甚至删除数据，此选项是合适的。）函数的输出是否应逐页显示？更多详情请参阅\
    \ https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_functions_cmdletbindingattribute。\n\
    \n> **安装附加模块**\n> 除了自己编写模块，您还可以在 PowerShell Gallery 中访问大量免费模块。我将在第 7 章第 7.8 节中介绍如何安装此类模块。\n\
    \n## 4.13 错误保护\n\n在执行脚本之前，PowerShell 会进行粗略的语法检查。只有在出现严重语法错误（如未闭合的括号或引号）的情况下，脚本才根本不会执行。\n\
    \n同样，作为结果，PowerShell 与许多其他脚本语言一样，对错误相当宽容。如果命令不存在、要访问的文件不存在或抛出其他错误，PowerShell 会显示错误消息，但随后会继续执行脚本的下一条语句。在本节中，我将描述如何使您的\
    \ PowerShell 脚本尽可能防错。\n\n### 4.13.1 Set-StrictMode\n\n本章前面多次提到的 `Set-StrictMode`\
    \ 命令用于设置 PowerShell 在检测错误时应有多严格。`Set-StrictMode` 目前支持三个版本：\n\n- `Set-StrictMode\
    \ -Version 1.0` 在使用未初始化变量时会导致错误消息。字符串中的变量（即 \"text $UnknownVariable\"）除外。\n- `Set-StrictMode\
    \ -Version 2.0` 在使用未初始化变量以及使用不存在的属性时都会触发错误。\n- `Set-StrictMode -Version 3.0` 在访问不存在的数组元素时也会抛出错误。\n\
    \n`Set-StrictMode` 检测到的不准确之处将导致错误消息，但脚本仍将继续执行！您也可以指定 `Latest` 而不是版本号。然而，这些测试的结果应持保留态度：如果在未来的\
    \ PowerShell 版本中添加了更多有效性测试，即使代码没有更改，您的脚本也可能报告错误。\n\n### 4.13.2 在错误时中止脚本\n\nPowerShell\
    \ 在检测到错误时的行为方式取决于 `$ErrorActionPreference` 变量的内容。您只需为该变量分配一个字符串即可更改所需的行为。此更改允许在脚本中的任何位置进行。您可以在程序的不同部分对错误产生不同的响应。\n\
    \n| 设置 | 效果 |\n| :--- | :--- |\n| \"Continue\" | 显示错误消息，继续脚本（默认适用） |\n| \"Inquire\"\
    \ | 显示错误消息并询问是否应继续脚本 |\n| \"SilentlyContinue\" | 不显示错误消息，继续脚本 |\n| \"Stop\" |\
    \ 显示错误消息，结束脚本 |\n\n**表 4.9** $ErrorActionPreference 变量的最重要设置\n\n### 4.13.3 将错误消息与其他输出分离\n\
    \n当您在 PowerShell 中交互式运行脚本时，普通输出和错误都会出现在终端中。但是，如果您使用 `> outfile.txt` 将脚本的输出重定向到文件，则该文件将只包含常规输出。错误消息仍然在屏幕上可见。此行为与\
    \ PowerShell 区分多个用于不同目的的“流”有关。有关此主题的背景信息，请参阅[第 4.8 节](#section-4.8)。\n\n### 4.13.4\
    \ 使用 try/catch 进行错误保护\n\n与大多数高级编程语言（如 C#、Java 等）一样，PowerShell 提供了将多个关键（易出错）代码语句包装在\
    \ `try` 块中的选项。如果在执行期间该块中发生错误，代码将继续在 `catch` 块中执行。`Error` 变量在那里提供有关错误的信息。\n\n```powershell\n\
    try {\n    command1\n    command2\n    ...\n} catch {\n    # 仅当发生错误时\n    # 才会执行此处的代码\n\
    \    Write-Host \"发生错误：$_\"\n}\n```\n\n`try-catch` 结构的决定性优势在于，即使发生错误，您也可以继续脚本而无需错误消息，并且如果需要，可以专门响应错误。\n\
    \n> **输出错误消息**\n> PowerShell 并未使输出错误消息变得容易。在我们之前的示例中，我使用了 `Write-Host`。因此错误消息出现在终端中，但无法重定向。\n\
    >\n> 通常不建议使用 `Write-Output`，因为它使错误消息成为脚本或函数结果的一部分。\n>\n> `Write-Error` 仅在特殊情况下有用，因为——取决于\
    \ `$ErrorActionPreference` 的设置——此输出会触发另一个错误。\n\n`try-catch` 语法的两个重要语法变体值得探讨：\n\
    \n- 您可以为不同的错误类型定义多个 `catch` 块。PowerShell 然后仅考虑与发生的错误匹配的 `catch` 代码。\n- 在 `catch`\
    \ 块之后，可以有一个 `finally` 块，用于清理。在此块中编写的代码*总是*会执行，无论是否发生错误，也无论脚本或函数是通过 `return` 在\
    \ `try` 或 `catch` 块中退出。\n\n有关这些语法变体的更多详情，请参阅 https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_try_catch_finally。"
