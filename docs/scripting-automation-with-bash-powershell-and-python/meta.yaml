    # 9.3.3 The "sed" Stream Editor


    The `sed` *Stream Editor* is a universal command for text processing. You pass
    a command in the first parameter that `sed` applies to the standard input or to
    the file specified in the next parameter. The processed text is written to the
    standard output.

    In the GNU variant of `sed` that''s common on Linux, the `-i` (*in place*) option
    causes the source file to be modified directly. `-i.bak` creates a backup of the
    source file with the `.bak` identifier.


    > **GNU versus BSD**

    In the BSD variant of `sed`, which is installed on macOS, for example, the `-i`
    option has a different meaning. In general, some other small differences exist
    between GNU `sed` and BSD `sed`. If necessary, you can install the GNU variant
    of `sed` using `brew`!


    The following introductory example shows the delete command `d`. This example
    reads the `myfile.txt` file, deletes lines 3 to 5, and writes all other lines
    to the `out.txt` file.


    ```

    $ sed 3,5d myfile.txt > out.txt

    ```


    If you want to pass multiple commands to `sed`, you can use `-e`:


    ```

    $ sed -e ''cmd1'' -e ''cmd2'' in.txt > out.txt

    ```


    Alternatively, you can save the commands in a separate file and process that file
    using `-f`:


    ```

    $ sed -f sedcmds.txt in.txt > out.txt

    ```


    `sed` can also process regular expressions. In that case, POSIX Regular Expressions
    are used by default. With the equivalent `-E` or `-r` options, `sed` also supports
    ERE. Unlike `grep`, there is unfortunately no option for PCRE.

    In the following command, `sed` searches for lines that start with an IPv4 address.
    These lines will be deleted. All other lines are stored in `ipv6.log`. The search
    pattern is usually formulated between two slashes. However, if you need to use
    the slash itself in the expression, you can use any other character that does
    not appear in it. But the entire expression must then start with a backslash.
    The following two commands are therefore equivalent:


    ```

    $ sed -E ''/^([0-9]{1,3}\.){3}[0-9]{1,3}/d'' access.log > ipv6.log

    $ sed -E ''\@^([0-9]{1,3}\.){3}[0-9]{1,3}@d'' access.log > ipv6.log

    ```'
