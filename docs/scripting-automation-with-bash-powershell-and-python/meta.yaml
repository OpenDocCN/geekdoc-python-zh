  - "[PAGE 65]\n\nWithin the subshell, all previously defined variables are still\
    \ available. However, subshells have an advantage in that variables defined and\
    \ changed within a subshell only apply in that subshell and then loses its validity\
    \ or resumes its previous value. Likewise, a directory changed by using `cd` is\
    \ only valid within the subshell. When the subshell ends, the previously valid\
    \ directory becomes active again.\n\nSubshells can be used to better structure\
    \ the code. When you run `exit` within a subshell, you only exit the subshell,\
    \ not the script running in the main shell.\n\n# 3.7 Standard Input and Standard\
    \ Output\n\nIn Bash, there are three “channels” that use commands for input and\
    \ output:\n\n+   - **Standard output (stdout)**\n  Results of a command are directed\
    \ to the what’s called the “standard output.” When you run `ls`, the result of\
    \ this command is the list of all files in the local directory. This result is\
    \ output as text and is typically displayed in the terminal.\n\n- **Error messages\
    \ (standard error = stderr)**\n  Usually, error messages are also displayed in\
    \ the terminal. Internally, however, error messages are routed to a different\
    \ channel, resulting in the possibility of treating normal output and error messages\
    \ differently.\n\n- **Standard input (stdin)**\n  Many commonly used variables\
    \ process text files whose name is passed as a parameter. If this specification\
    \ is missing, the command expects the text to be processed from the standard input.\
    \ So, you must enter text in the terminal, which the command then receives. To\
    \ express that the input is complete, press `Ctrl` + `D` in this case.\n\nAt first\
    \ glance, the three standard channels seem to be self-evident: Where else than\
    \ in the terminal should a command display its results, where else than by your\
    \ input should a command receive input?\n\n# 3.7.1 Redirecting Input and Output\n\
    \nOne highlight of Bash is its ability to redirect input and output. Using the\
    \ `command > file` call, you can save the result of a command in a text file.\
    \ Caution: If the file already exists, it will be overwritten.\n\nSimilarly, `command\
    \ < file` reads the data to be processed from a text file instead of waiting for\
    \ terminal input. Table 3.2 summarizes the syntax for some other variants. I will\
    \ discuss heredoc and herestring syntax in more detail in Section 3.10."
  - '[PAGE 66]


    | Command | Function |

    | :--- | :--- |

    | `command > out.txt` | Saves the standard output to the file |

    | `command >> out.txt` | Adds the output to the end of the file |

    | `command 2> errors.txt` | Stores error messages in the file |

    | `command &> all.txt` | Stores outputs and errors in the file |

    | `command >& all.txt` | As above |

    | `command >&2` | Redirects the standard output to the error channel |

    | `command < in.txt` | Processes the file |

    | `command << EOF` | Considers all lines up to end of file (EOF) as standard input
    (heredoc) |

    | `command <<< $var` | Considers the content of the variable as standard input
    (herestring) |


    Table 3.2 Operators for Redirecting Input and Output


    In the simplest case, output redirection is used to store results permanently:


    ```

    ls > filelist.txt

    ```


    Input redirection is useful for interactive commands. For example, the MySQL client
    `mysql` typically expects SQL commands to be entered. In the following applications,
    these commands are read from a text file, for example, to restore a database from
    a backup:


    ```

    mysql < backup.sql

    ```


    The `cat` command, which normally simply prints a text file to the screen, can
    be used to create a new file (ending with a key combination to stop the input):


    ```

    cat > newfile.txt

    first input line

    second input line

    <Ctrl>+<D>

    ```


    Because `cat` is missing the parameter with the file to be output, the command
    expects interactive input at the terminal. This input is redirected to the `newfile.txt`
    file. Using this trick, you can create small text files without launching an editor.


    > **Caution**

    However, you cannot read and write a file at the same time. The `sort < file >
    file` command does not sort the contents of the text file and then save the result,
    but instead deletes `file` because `> file` is run first.'
  - '[PAGE 67]


    > **Heredoc Syntax**

    A special case of input redirection is the heredoc syntax. I''ll discuss this
    topic separately in Section 3.10.


    # 3.7.2 The Pipe Operator


    We are not quite done with input and output redirection yet. Perhaps the coolest
    feature is still missing: By using `command1 | command2`, `command1` produces
    a result. However, this result is not displayed but redirected to `command2`.
    The pipe operator `|` thus makes the standard output of `command1` the standard
    input of `command2`. The pipe operator can be applied multiple times, each time
    passing the output of one command to the next command.


    The pipe operator results in such a wide range of options for analyzing and processing
    text files that I have dedicated Chapter 8 to this topic. At this point, a few
    simple examples will have to suffice, which in this case refer to the Linux-specific
    `/etc/passwd` file. This file contains information about all accounts of the system.
    I will explain the `grep`, `cut`, `sort`, and `head` commands in more detail in
    Chapter 8, Section 8.1.


    ```

    # displays all lines from /etc/passwd that contain ''nologin''

    grep nologin /etc/passwd


    # extracts the first column

    # with the account name from the resulting lines

    grep nologin /etc/passwd | cut -d '':'' -f 1

    # sorts the names

    grep nologin /etc/passwd | cut -d '':'' -f 1 | sort


    # and displays the first five results

    grep nologin /etc/passwd | cut -d '':'' -f 1 | sort | head -n 5

    ```


    # 3.7.3 Redirecting and Displaying Outputs at the Same Time


    The `tee` command duplicates the standard input, displays it in the standard output,
    *and* redirects it to a file. Thus, using the following command, the result of
    `command` is displayed in the terminal *and* stored in the `out.txt` file.


    ```

    command | tee out.txt

    ```


    # 3.8 Globbing, Brace Extension, and Handling File and Directory Names


    What happens if you pass `*.txt` or `directory??/*.pdf` to a command because you
    want to process all text files or all PDF files in a couple of subdirectories?
    The term "globbing"'
