    # # Chapter 17

    ## Web Scraping


    *Web scraping* refers to the targeted extraction of data from a webpage. The basic
    idea is to load the HTML code of a page and search for the desired data there.
    With web scraping, you can automatically determine the price of a product on shopping
    websites, the current temperature in Hawaii on a weather website, the latest headlines
    on a news website, or the latest security vulnerabilities for software you use
    on a security site.


    In this chapter, I''ll describe some techniques around web scraping:


    +   - I am going to start with the `wget` command: This command allows you to
    download entire websites including all linked images, CSS files, and so on. Technically,
    this command has little to do with web scraping and goes more in the direction
    of *web crawling*. (I will explain the term shortly.) An advantage of using `wget`
    is that you can solve complex tasks with a single command without having to develop
    a script at all.

    - Using regular expressions, you can analyze the HTML code of documents and in
    this way determine the desired data. However, this approach only works satisfactorily
    in simple cases.

    - A better approach is to use a library that represents an HTML document as an
    object tree. The technical term for this library is *Document Object Model (DOM)*.
    In this chapter, I will introduce the Python modules *Beautiful Soup* and *Requests-HTML*
    as well as the PowerShell module, called *PowerHTML*, will allow you to navigate
    through complex HTML documents with ease. The resulting code is clearer and more
    reliable than using regular expressions.


    > **Prerequisites for This Chapter**

    Most of the scripts in this chapter use the Python programming language. Therefore,
    you should know how to use regular expressions. You also need basic HTML knowledge,
    but I can''t teach you that in this book.


    # ### 17.1 Limitations


    Web scraping is a popular scripting concept, but it comes with numerous limitations:


    +   - The structure of a web page changes frequently. Web scraping script must
    thus be adjusted often.'
  - '[PAGE 389]


    ■ Modern websites use JavaScript on the client side, which can cause a simple
    readout of the HTML code to fail. (You’re lucky if JavaScript is only responsible
    for displaying the ubiquitous ads.)


    ■ Basically, it’s not permitted to use data collected via web scraping for commercial
    purposes. Let me illustrate this rule with a simple example: You can’t collect
    weather data from a popular weather website, share it with your customers in some
    form, and possibly make money from advertising in the process.

    Of course, not *everything* is forbidden: After all, the basic idea of the internet
    is that information is shared publicly. A popular permitted application of web
    scraping is price comparison sites such as *https://www.pricegrabber.com/*. But
    even for such services, rules of the game apply, for example, regarding the use
    of product photos.

    Legally, we’re navigating rocky terrain. I will let this warning stand and focus
    on technical details in this chapter. However, an essential task is that you clarify
    the legal requirements before using web scraping beyond the purely private sphere!


    The solution to these limitations are *application programming interfaces (APIs)*,
    which provide an ordered access to data. While webpages are optimized in terms
    of beautiful layout, APIs allow for an efficient data exchange without overhead,
    with some APIs even allowing data changes. In addition, API usage rules provide
    clarity as to which data may be used and how, or what costs are incurred in the
    process.


    To cut a long story short: If the website whose data you want to use provides
    an API, you should skip ahead to [Chapter 18](Chapter 18).


    # 17.2 Web Scraping, Web Crawling, and Data Mining


    Two other terms are often used along with *web scraping* that have similar meanings.
    While *web scraping* extracts data from a website, *web crawling* tracks the links
    of a website. Through web crawling, you can create a directory of all pages on
    a website and, when tracking links to other pages, even a directory of large parts
    of the internet. Search engines like Google or Bing are based on the concept of
    web crawling.

    *Data mining* also goes a step further than web scraping: In this context, we
    are combining and statistically analyzing information from different data sources
    and over longer periods of time. Many reasons exist for data mining, such as marketing
    studies or scientific tasks.


    # 17.3 Downloading Websites Using wget


    In its simplest usage, you can use the `wget` command to download a file via HTTP(S)
    or FTP. The following command downloads an image of the cover of this book from
    my website and saves it in the local directory:'
  - '[PAGE 390]


    ```

    $ wget https://kofler.info/wp-content/uploads/scripting-en.jpg

    ```


    Most of the time, `wget` is installed by default on Linux; if not the case, `apt/dnf
    install wget` will help you get set up. On macOS, the best way to install the
    command is to use `brew install wget` (see https://brew.sh). A variant compiled
    for Windows can be downloaded from: https://eternallybored.org/misc/wget. However,
    you must take care of saving the program yourself in one of the directories listed
    in `PATH`.


    `wget` can be controlled by dozens of options documented in its `man` page or
    at https://linux.die.net/man/1/wget.


    # 17.3.1 Example 1: Downloading Directly Linked Images


    I will refrain from an encyclopedic description here, but instead show you three
    typical cases of using `wget`.


    The first command, which I have specified once with the more readable long options
    and a second time in a more compact way with equivalent short options, downloads
    all image files with the extensions `*.jpg`, `*.jpeg`, `*.png`, and `*.gif` that
    are used directly on the home page of https://example.com. However, the command
    does not take into account images used in other pages of https://example.com.


    ```

    $ wget --no-directories --span-hosts --page-requisites \n      --accept jpg,jpeg,png,gif
    --execute robots=off example.com


    $ wget -nd -H -p -A jpg,jpeg,png,gif -e robots=off example.com

    ```


    Let''s briefly explain the meanings of these options next:


    +   - `--no-directories` does not create image directories on your computer that
    represent the location of images on the website. Rather, all images are stored
    in the currently active directory.

    - `--span-hosts` also takes into account links to images located on websites other
    than the home page (here https://example.com).

    - `--page-requisites` tells `wget` to download not only the HTML start page, but
    also all additional files linked there (images, but also CSS files, etc.).

    - `--accept` restricts the previous option: We are only interested in files with
    the specified identifiers.

    - `--execute` specifies that any rules formulated on the website in the `robots.txt`
    file should be ignored for search engines. That''s not the way to do it!


    The command fails for images whose URL does not end with the identifier, such
    as in the following example:


    ```

    https://example.com/images/img_1234.jpg?s=2b63769b

    ```'
  - '[PAGE 391]


    # 17.3.2 Example 2: Downloading all PDF Files Linked on the Website


    The second command is a variant of the first. This time, PDF documents are downloaded
    instead of images. However, not only should the start page of https://example.com
    be taken into account, but also all other pages of this website, which wget can
    reach by analyzing links starting from the home page within four jumps.


    ```

    $ wget --recursive -no-directories --level=4 --accept pdf \n    --execute robots=off
    example.com


    $ wget -r -nd -l 4 -A pdf -e robots=off example.com

    ```


    The command uses two new options:


    +   - `--recursive` tells wget to continue following the links located on the
    home page and also to search the target pages. By default, the command only includes
    pages on the source domain. (I have omitted `--span-hosts` in this example. The
    explanation follows below).

    - `--level` specifies how many link levels should be considered. You can use `--level
    inf` to really search a website in its entirety.


    You need patience when running the command. Note that the command only considers
    PDF files stored directly on the specified website, not PDF documents located
    elsewhere (for example, in an Amazon cloud directory).


    In contrast to the first example, using the `--span-hosts` option is not recommended
    here. Although wget will then also download PDF files located on other servers,
    at the same time the command will extend the search to the pages of other servers.
    Tips on how you can limit this problem, for example by listing selected external
    hosts, are provided by Stack Overflow: https://stackoverflow.com/questions/16780601.


    > **Many Page Views and High Data Volumes**

    The `--recursive` option will cause you to download countless files from the specified
    website in a short time. This causes a relatively high load for the web server,
    depending on the network speed. For this reason, some administrators limit the
    maximum number of requests originating from an IP address. In the worst case,
    the crawling attempt in disregard of the robot rules can even be interpreted as
    an attack.


    # 17.3.3 Example 3: Creating a Local Copy of the Website


    The third command copies all files of a website to a local directory. Images and
    CSS files are also taken into account. The directory structure of the website
    is replicated locally. Finally (only once the download of *all* files is finished!)
    all links are replaced by links to local files.'
- md: "Ideally, you can now view the local copy of the website in a browser without\
    \ an internet connection. In real life, this does not always work that well. A\
    \ major source of errors is JavaScript code that does not work as expected.\n\n\
    ```\n$ wget --mirror --convert-links --adjust-extension --no-parent \\\n  --page-requisites\
    \ --max-redirect=3  https://example.com\n\n$ wget -m -k -E -np -p --max-redirect=3\
    \  https://example.com\n```\n\nThe options have the following meaning:\n\n- `--mirror`\
    \ activates the mirroring functions. These include recursive link processing and\
    \ unlimited link tracking.\n- `--convert-links` converts links within the website\
    \ to local links. This action can be performed only once all downloads are finished.\n\
    - `--adjust-extension` adds the `.html` identifier to downloaded HTML files that\
    \ have no extension.\n- `--no-parent` traces links only “downward” (into subdirectories),\
    \ but not “upward” (outside the starting point).\n- `--max-redirect` limits the\
    \ number of redirection statements from the web server.\n\nThe same warnings apply\
    \ to the execution of the command as for the second example.\n\n## 17.4 Web Scraping\
    \ with Regular Expressions\n\nIn Chapter 9, I already warned against using regular\
    \ expressions for processing HTML documents. Nevertheless, regular expressions\
    \ are often used in practice for exactly this purpose—simply because using them\
    \ is obvious and requires little effort. The following Python script is a good\
    \ example of this use. The goal of the script is to download all images linked\
    \ on an HTML page via `<img src=...>`.\n\nThe code is basically easy to understand:\
    \ The script first creates the local directory `tmp`, if it does not exist yet,\
    \ and then downloads the HTML document with the address specified in `url`. `findall`\
    \ searches in it for expressions of the `<img src=\"...\"` type and returns a\
    \ list of the regex group as a result (i.e., in each case the address between\
    \ the quotation marks).\n\nThe loop processes all links and prefixes relative\
    \ addresses with the start address. It then extracts the actual image name from\
    \ the often long URLs. In this step, `urllib.urlsplit` and `os.path.basename`\
    \ are used. The following lines illustrate the use of the two functions:\n\n```\n\
    import os\nfrom urllib import parse\nurl = 'https://example.com/dir1/dir2/img.jpg?p1=123&p2=534'\n\
    path = str(parse.urlsplit(url).path) # '/dir1/dir2/img.jpg'\nbase = os.path.basename(path)\
    \       # 'img.jpg'\n```\n\nFinally, the script tries to download all images and\
    \ save them in the temporary directory.\n\n```\n# Sample program load-images.py\n\
    from urllib import parse, request\nimport os, re\n\n# create temporary directory\n\
    os.makedirs(\"tmp/\", exist_ok=True)\n# load HTML code\nurl = \"https://sap-press.com\"\
    \nwith request.urlopen(url) as response:\n    html = response.read().decode('utf8')\n\
    # search for <img src=\"...\" using regular expression\nimageUrls = re.findall(r'<img.*?src=\"\
    (.+?)\"', html)\nfor imgUrl in imageUrls:\n    # convert relative links to absolute\
    \ links\n    if not imgUrl.startswith('http'):\n        imgUrl = parse.urljoin(url,\
    \ imgUrl)\n    # extract destination filename\n    path = str(parse.urlsplit(imgUrl).path)\n\
    \    basename = os.path.basename(path)\n    destination = 'tmp/' + basename\n\
    \    try:\n        # download and save image\n        with request.urlopen(imgUrl)\
    \ as response, \\\n             open(destination, 'wb') as f:\n            f.write(response.read())\n\
    \        print(basename)\n    except:\n        print(\"skipped\", basename[:30])\n\
    ```\n\nFor simple HTML pages, the script works perfectly, and you might get the\
    \ impression that not too much can actually go wrong, which would be a big mistake:\n\
    \n- The script also recognizes the `<img src=\"...\"` expression in HTML code\
    \ that’s commented out, in listings (`<pre>`), and in JavaScript code where parts\
    \ of the filename are generated dynamically. This recognition results in download\
    \ errors.\n- The script fails if a line break exists between `<img` and `src=\"\
    ...\"`. `findall(..., re.MULTILINE)` does not help in such cases either without\
    \ further ado because then `\\n` must be explicitly built into the regular expression.\n\
    - The script cannot handle images whose content is embedded directly in the HTML\
    \ code (for example, as in `<img src=\"data:image/png;base64 ...`).\n\nThe point\
    \ remains: Although tempting, you should avoid using regular expressions in web\
    \ scraping processes!\n\n## 17.5 Web Scraping with Beautiful Soup\n\nThe “right”\
    \ way to do web scraping is to use an HTML parser that builds a DOM from the HTML\
    \ code. For Python, several HTML parsers have been optimized with regard to different\
    \ properties (e.g., speed, error tolerance, ease of use). An initial overview\
    \ is available at the following links:\n\n- https://elitedatascience.com/python-web-scraping-libraries\n\
    - https://html5-parser.readthedocs.io/en/latest/\n\n### 17.5.1 Beautiful Soup\
    \ and Requests\n\nThe following examples rely on the Python module, Beautiful\
    \ Soup, version 4, which is used in combination with Python’s default HTML parser.\
    \ You must first install this module using pip:\n\n```\n$ pip install beautifulsoup4\
    \ (Windows, Linux)\n$ pip3 install beautifulsoup4 (macOS, old Linux distributions)\n\
    ```\n\nInstead of the standard urllib Python module with the request function\
    \ used in the previous examples, in this example, I will perform downloads via\
    \ the requests module. This module must also be installed using pip:\n\n```\n\
    $ pip install requests (Windows, Linux)\n$ pip3 install requests (macOS, old Linux\
    \ distributions)\n```\n\nI will introduce requests in more detail in Chapter 18.\
    \ For now, knowing how to download an HTML document and how to pass it to Beautiful\
    \ Soup is sufficient:\n\n```\nimport requests\nfrom bs4 import BeautifulSoup\n\
    response = requests.get('https://example.com')\ndom = BeautifulSoup(response.content,\
    \ 'html.parser')\n```\n\n### 17.5.2 Hello, Beautiful Soup!\n\nBeautiful Soup provides\
    \ countless functions to navigate to a specific point within the DOM, analyze\
    \ attributes of the DOM, and loop through subelements. I will limit myself, in\
    \ this section, to presenting the most important basic functions. In our example,\
    \ the x variable contains either the DOM root object or another previously determined\
    \ HTML object.\n\nThe basic functions of Beautiful Soup include the following:\n\
    \n- `x.attrs('attributename')` or simply `x['attributename']` returns the desired\
    \ attribute as a string.\n- `x.contents` returns the contents as a string array\
    \ (as an array because there can be multiple parts).\n- `x.find('elementname')`\
    \ finds the first HTML element of the specified type, such as `x.find('<table>')`,\
    \ starting from the current position in the DOM. Note that `find` searches only\
    \ *within* the current subtree. If `x` is a `<table>` element, `x.find('th')`\
    \ searches only within this one table, but not in other tables in the document.\n\
    - `x.find('name', aname='value')` searches for the first HTML element where an\
    \ attribute has the desired value, such as `x.find('div', id='1234')`. For CSS\
    \ classes, you must use the `class_` attribute name, for instance, `x.find('p',\
    \ class_='intro')`.\n- `x.find_all(...)` works like `find` but returns all matching\
    \ elements starting from the starting point. The result can then be looped through.\n\
    - `x.select('css selector')` works similar to `find_all` but processes a CSS selector\
    \ as a parameter.\n\nCountless other functions are documented with many application\
    \ examples at https://www.crummy.com/software/BeautifulSoup/bs4/doc/.\n\nThe following\
    \ introductory example searches an HTML page for all `img` elements and returns\
    \ the associated `src` attributes:\n\n```\n# Sample file hello-beautifulsoup\n\
    import requests\nfrom bs4 import BeautifulSoup\nsiteurl = \"https://kofler.info/\"\
    \nresponse = requests.get(siteurl)\ndom = BeautifulSoup(response.content, 'html.parser')\n\
    images = dom.find_all('img')\nfor img in images:\n    print(img['src'])\n```\n\
    \n### 17.5.3 Example: Determining a List of Top Titles from Rheinwerk Publishing\n\
    \nThe Rheinwerk Publishing website (https://sap-press.com) serves as the starting\
