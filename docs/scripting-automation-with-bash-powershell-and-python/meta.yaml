  md: '> **What Does Signed Mean?**


    A *signed script* contains a comment block with a digital signature (i.e., a cryptographic
    code). This code indicates who wrote the script. The code applies only to the
    state of the script at the time of the signature. Any subsequent change will invalidate
    the signature. You can sign your own scripts using `Set-AuthenticodeSignature`.
    This command requires that you have a certificate—either (for testing purposes)
    a self-created one or a real certificate from a certification authority. You can
    find more information on this topic at https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_signing.


    # 4.5.3 Setting Up a Custom Script Directory


    For your first script, where you save it doesn’t matter. But before you write
    more and more scripts over the next few weeks, a good idea is to set up a directory
    for your scripts and add that directory to the `PATH` environment variable. In
    our examples, I assume that you name the directory `myscripts` and create it directly
    in your working directory. `Set-Location` makes the user directory the current
    directory if not already the case. `NewItem` creates the directory. (If you have
    used `cmd.exe` or Bash so far, `cd myscripts` or `mkdir myscripts` will also get
    you there with less typing and headaches. But I want to make an effort in this
    chapter to present you with the “right” PowerShell cmdlets.)


    ```

    > Set-Location

    > New-Item -ItemType Directory myscripts

    ```


