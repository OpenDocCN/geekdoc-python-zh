    \ file -> somefile\n```\n\n`tar` 命令实际上代表 *tape archive*（磁带归档），因此它起源于磁带驱动器仍在使用的时代。如今，`tar`\
    \ 主要用于创建压缩文件归档。`tar` 文件在 Linux 上扮演着与 Windows 上 `zip` 文件类似的重要角色。\n\n对于 `tar`，第一个选项（`-c`、`-r`、`-x`\
    \ 或 `-t`）指定了 `tar` 应该执行的操作。所有其他选项都会影响操作。\n\n| 选项 | 含义 |\n|---|---|\n| `-c` | 创建新归档（*create*）\
    \ |\n| `-r` | 扩展现有归档（*replace*） |\n| `-x` | 解包归档（*extract*） |\n| `-t` | 列出内容（*list*）\
    \ |\n| `-v` | 显示详细反馈（*verbose*） |\n| `-z` | 使用 `gzip` 压缩/解压 |\n| `-j` | 使用 `bzip2`\
    \ 压缩/解压 |\n| `-J` | 使用 `xz` 压缩/解压 |\n| `-f file.tar` | 归档文件名（*file*） |\n| `-f\
    \ -` | 使用标准输入/标准输出 |\n| `-C directory` | 在此目录中工作 |\n\n表 6.2 tar 选项\n\n一个特别重要的选项是\
    \ `-f filename`：此选项定义了归档文件的文件名。如果忘记此选项，`tar` 将尝试访问磁带驱动器。由于大多数计算机上不存在磁带驱动器，因此会发生错误。\n\
    \n当使用 `-f -` 时，`tar` 将归档写入标准输出或从标准输出读取。如果您想将 `tar` 与另一个命令结合使用，例如立即使用 `tar cf -\
    \ | gpg ...` 加密归档，这种方法非常有用。\n\n一种常见的策略是将传递给 `tar` 的选项组合成一个没有减号的字母块。因此，`-c -z -f`\
    \ 或简写 `-czf` 就变成了 `czf`。\n\n以下命令中的第一个创建了压缩的 `backup.tar.gz` 文件，其中包含 `images` 目录中的所有文件。（`tar`\
    \ 默认递归工作，因此它也会考虑子目录。）其他命令显示归档的内容表，最后解包它。除了 `.tar.gz`，缩写标识符 `.tgz` 也很常见。\n\n```\n\
    $ tar czf backup.tar.gz images    # create archive\n\n$ tar tzf backup.tar.gz\
    \           # show contents\n\n$ cd other-directory              # unpack archive\n\
    $ tar xzf backup.tar.gz\n```\n\n> **备份**\n更多关于 `tar` 的用例将在 [第 15 章](#) 中介绍，我将讨论自动化备份的各种技术。\n\
    \n## 6.3.2 ZIP 文件\n\n也许您的归档需要与 Windows 世界兼容，或者您想解包一个 ZIP 文件。在这种情况下，您可以使用 `zip`、`zipinfo`\
    \ 和 `unzip` 命令，本节将仅通过三个示例来解释它们的语法。\n\n这些示例再次引用了要备份的 `images` 目录。请注意，`zip` 默认不递归工作（即不包含子文件夹）。如有必要，`-r`\
    \ 选项可以在此上下文中提供帮助。\n\n```\n$ zip backup.zip -r images        # create archive\n\
    $ zipinfo backup.zip              # show archive\n$ unzip backup.zip         \
    \       # unpack archive\n```\n\n## 6.4 使用 Root 权限\n\n在 Linux 和 macOS 上，您只能修改自己的文件，并且只能读取其他用户的选定文件。在此限制内工作可能足以满足您的日常工作，但不足以执行需要管理任务的脚本。\n\
    \n在这种情况下，解决方案是 `sudo`，它允许您以管理员权限（或在 Linux 中称为“root 权限”）执行单个命令或整个脚本。以下两个命令中的第一个执行软件安装（第\
    \ 6.5 节），而第二个命令在本地目录中运行脚本：\n\n```\n$ sudo apt install somepackage\n[sudo] Password\
    \ for <accountname>: ********\n$ sudo ./myscript.sh\n```\n\n## 6.4.1 仅限选定账户的 sudo\
    \ 权限\n\nsudo 只能由选定的用户使用——通常是执行 Linux 安装并首先创建其账户的人。\n\nsudo 用户必须使用自己的密码进行身份验证。身份验证随后将在几分钟内保持有效。在此期间内进行的其他\
    \ sudo 调用，因此无需再次输入密码。\n\n`/etc/sudoers` 文件控制谁在 sudo 中拥有哪些权限。幸运的是，很少需要更改这个相对复杂的文件。如果您想将\
    \ sudo 权限分配给另一个账户，您应该运行以下命令（当然假设您自己拥有 sudo 权限）：\n\n```\n$ sudo usermod -a -G sudo\
    \ <account>    # Debian, Ubuntu ...\n$ sudo usermod -a -G wheel <account>   #\
    \ Fedora, RHEL ...\n```\n\n这些 usermod 命令将 `<account>` 用户添加到 sudo 组（适用于 Debian、Ubuntu\
    \ 和兼容发行版）或 wheel 组（适用于 Fedora 和 Red Hat Enterprise Linux [RHEL] 兼容发行版）。这两个组的所有成员都将自动拥有\
    \ sudo 权限。\n\n## 6.4.2 输出重定向的问题\n\n以下两个命令都尝试修改 `/etc` 目录中的文件。第一个命令有效，第二个命令触发错误。为什么？\n\
    \n```\n$ sudo touch /etc/new-file          # works\n$ sudo echo \"hello\" > /etc/new-file\
    \  # Error: no permission\n```\n\n问题在于输出重定向。虽然 `sudo` 以 root 权限运行 `echo \"hello\"\
    `，但命令的其余部分（即输出重定向到 `/etc/new-file` 文件）由 Bash 处理——而 Bash 以普通权限运行。这就是错误发生的地方。\n\n\
    一旦原因清楚（我自己也经常陷入这个陷阱），解决方案就不难了。您不是通过 sudo 运行 echo（或任何命令），而是将一个新的 Bash 进程传递给 sudo，然后\
    \ sudo 执行命令的其余部分，包括重定向。`-c` 选项表示命令，允许您将要运行的命令传递给 Bash 进程：\n\n```\n$ sudo bash\
    \ -c 'echo \"bla\" > /etc/new-file'\n```\n\n## 6.4.3 访问权限\n\n有一个三层系统控制谁被允许在 Linux\
    \ 或 macOS 上读取、写入和执行哪些文件。每个文件都存储了九个访问位，即文件所有者、分配给该文件的所有组成员以及所有其他账户的 r（读）、w（写）和\
    \ x（执行）。\n\n例如，`/etc/shadow` 系统文件（包含 Linux 上密码的哈希码）属于 root 用户并分配给 shadow 组。root\
    \ 可以读取和修改该文件，shadow 组的成员可以读取它，而所有其他用户没有权限。您可以使用 `ls -l` 确定所有这些信息：\n\n```\n$ ls\
    \ -l /etc/shadow\n\n-rw-r-----   root shadow   ... shadow\n\n^^^         rights\
    \ for owners\n   ^^^      rights for group members\n      ^^^   rights for other\
    \ users\n         ^^^^   assigned owner\n            ^^^^^^^   assigned group\n\
    \                  ^^^   time (not shown)\n                     ^^^^^^^ filename\n\
    ```\n\n`chown`（更改所有者）、`chgrp`（更改组）和 `chmod`（更改模式）命令允许您更改文件的所有者分配、分配的组以及访问权限。所有这些数据也可以为目录更改，尽管执行位\
    \ `x` 对目录有不同的含义：它允许使用此目录（即 `cd directory`）。\n\n以下三行显示了如何使用 `chown`、`chgrp` 和 `chmod`\
    \ 的简单示例：第一个命令使 `peter` 账户成为 `/var/www/html/index.html` 文件的所有者。第二个命令将 `www-data`\
    \ 组分配给此文件。第三个命令为所有者（`u` 代表用户）和组设置读写位，但为所有其他人（`o` 代表其他）禁用这些位。结果，`index.html` 文件可以被\
    \ `peter` 和 `www-data` 组的所有成员读取和修改，但其他人不行。（`www-data` 是 Debian 和 Ubuntu 上分配给 Web\
    \ 服务器的组。）\n\n```\n$ sudo chown peter      /var/www/html/index.html\n$ sudo chgrp\
    \ www-data   /var/www/html/index.html\n$ sudo chmod ug+rw o-rw /var/www/html/index.html\n\
    ```\n\n在大多数情况下，执行所有这三个命令都需要 root 权限。例外情况包括对您自己的文件的更改，这些更改仅影响您自己的用户账户或分配给您的组。此类修改——例如，`chmod\
    \ +x myscript.sh` 使脚本可执行——不需要 root 权限。"
