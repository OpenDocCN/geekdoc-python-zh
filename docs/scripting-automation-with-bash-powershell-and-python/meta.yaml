    # Preface


    A script is a small piece of code to solve a specific problem or automate a tedious
    task. You don''t need a development environment or a compiler to develop a script—an
    editor is enough. When it comes to scripting, minimalism is the name of the game,
    and its goal is achieving maximum impact with minimal resources. To put it casually,
    scripting is the art of solving IT problems in ten lines of code.


    In my work environment, scripts are ubiquitous. I use scripts to set the power
    saving mode for my laptop, to create a PDF file of this book from Markdown files,
    to automate backups to servers, to watermark e-books, to set up new customers
    in a web application, to scan dozens of databases for logical errors, to create
    virtual machines for teaching, to sort photos, and more.


    # Bash, PowerShell, or Python?


    The “classic” scripting language is Bash. Its full name, *Bourne Again Shell*,
    is a pun. The predecessor was the Bourne shell, which was widely used on Unix.
    The license for the Bourne shell was unsuitable for Linux, which is why a new
    project was created. Today, Bash is the dominant Linux shell, both in interactive
    mode for executing commands and for script programming. macOS relies on the largely
    compatible Zsh, which is also gaining more and more followers on Linux.


    Bash is popular, but its antiquated syntax doesn''t win any beauty contests. On
    the contrary, Bash scripts sometimes look awful. For this reason, Microsoft did
    not even try to adapt Bash for Windows. Instead, with PowerShell, Microsoft has
    combined the basic ideas of a classic Unix shell with the concepts behind object-oriented
    programming languages and created a completely new language, which turned out
    surprisingly well! Not without reason, Windows administrators love PowerShell.


    Python is actually not a typical scripting language. Depending on the intended
    use, Python is the basis for AI developments, a tool for (natural) scientists,
    or a first language for entry-level programming. Probably no other language is
    used as universally as Python! The elegance of Python''s syntax and its almost
    inexhaustible supply of extension modules have led to Python also being used for
    system administration, converting files between different formats, as a database
    tool or for hardware control (for the Raspberry Pi). Python plays to its strengths
    the more complex the task.'
