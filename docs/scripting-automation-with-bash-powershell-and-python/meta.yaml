    \ the hostname (i.e., `ssh localhost`). This step establishes an SSH connection\
    \ to the local machine, testing both the SSH client and the local SSH server.\n\
    \nAfter successful login, you can run commands on the external computer. In the\
    \ previous listing, I used `grep` to get the version of the installed Linux distribution.\
    \ Entering `exit` or pressing `Ctrl` + `D` will terminate the SSH session.\n\n\
    # 12.2.1 Host Verification\n\nThe first time you connect to a host, the SSH client\
    \ asks if you trust that host (see the previous listing). To be honest, you don't\
    \ have many options there because only if you agree can you continue with the\
    \ login process. If you have set up the external computer yourself or know the\
    \ administrator, you could check if the \"fingerprint\" (i.e., the short form)\
    \ of the server's SSH key matches. To get the fingerprint of a server, you must\
    \ run the following command there, again replacing `hostname` with the actual\
    \ computer name:\n\n```\n$ ssh-keyscan hostname | ssh-keygen -lf -\n\n    256\
    \ SHA256:Sma6TJ79bONK8PMISjxPIYUi...MK3HQ hostname (ED25519)\n   2048 SHA256:i9FlmpRieIFIEHNfHSzFgjp4...Y3Zm0\
    \ hostname (RSA)\n    256 SHA256:E3IH3027Bc+5DvsvtenJkma1...R2BYk hostname (ECDSA)\n\
    ```\n\n# 12.2.2 Potential Issues and Their Cause\n\nOn many Linux distributions,\
    \ SSH login for `root` is blocked for security reasons or only allowed if authentication\
    \ is done with keys (Section 12.4). The recommended procedure for doing admin\
    \ work via SSH is to login with a different account and then use `sudo` in the\
    \ session. As an alternative, you can explicitly allow `root` login by making\
    \ an adjustment in the `/etc/ssh/sshd_config` file on the computer that runs the\
    \ SSH server. Changes to this file won't take effect until you ask the SSH server\
    \ to `reload` the file (`systemctl reload sshd` on Linux).\n\nSSH logins to local\
    \ virtual machines may fail due to network connectivity. Oracle VM VirtualBox\
    \ in particular causes problems in this regard. With VirtualBox, virtual machines\
    \ are connected to the local network via *Network Address Translation* (NAT),\
    \ while SSH is blocked. The solution is port forwarding. You find a good tutorial\
    \ on this topic at <https://www.simplified.guide/virtualbox/port-forwarding>.\n\
    \nThe SSH client remembers the hostname or IP address of the server and the key\
    \ used by the server each time it logs in. If the key changes (e.g., in the course\
    \ of a new installation of the server), the `ssh` command displays a drastic error\
    \ message and blocks the login:"
