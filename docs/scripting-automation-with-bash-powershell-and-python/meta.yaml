    success stream:


    ```

    $a = 123

    $b = command    # command returns 456 as the result

    $a + $b

    # Result: integer number 579

    ```


    Additionally, three statements are executed in the third example. But because
    the results of `command1` and `command2` are stored in variables, and because
    `Write-Debug` does not write to the success stream, no result is produced!


    ```

    $a = command1

    Write-Debug "lorem ipsum"

    $b = command2

    # no result (therefore $null)

    ```'
- md: "The structure of the result outlined in this context naturally also applies\
    \ to commands that are executed in loops. Each output within the loop expands\
    \ the function result that is returned at the end.\n\n> **Be Careful with Write-Output!**\n\
    \nFor debugging purposes, you might be tempted to include `Write-Output` in a\
    \ function to output intermediate results. *Don't do this!* `Write-Output` produces\
    \ an output that becomes part of the function result. A better approach is to\
    \ use `Write-Debug` and enable debugging outputs via `$DebugPreference = \"Continue\"\
    `!\n\nAs an alternative, you can also use `Write-Host`. But this approach has\
    \ a disadvantage in that you must remove these statements later. Output from `Write-Host`\
    \ cannot be redirected or otherwise disabled. Compared to `Write-Output`, using\
    \ `Write-Host` has an advantage in that it does not change the function result.\n\
    \n## 4.11.2 return\n\nA function typically ends with the execution of the last\
    \ command. However, you can also terminate a function prematurely using `return`\
    \ (e.g., within a loop as soon as a condition is fulfilled). If you use `return`\
    \ without parameters, the function result is composed of all previous outputs\
    \ as before:\n\n```\ncommand1\ncommand2\nreturn\n# Result: Array with the partial\
    \ results of command1 and command2\n```\n\nAlternatively, you can pass a variable,\
    \ expression, or command to `return`. In this case, the result of this expression\
    \ is added to the previous partial results. (As a matter of fact, one would assume\
    \ that only the `return` expression determines the result. But this is not the\
    \ case with PowerShell!)\n\n```\ncommand1\ncommand2\nreturn command3\n# Result:\
    \ Array with the partial results of command1, command2\n# and command3\n```\n\n\
    ## 4.11.3 Parameters\n\nUsually, parameters are supposed to be passed to functions.\
    \ Declaring the position, name, data type, default value, and other properties\
    \ in advance using `param` makes sense. PowerShell offers a wealth of syntactic\
    \ options, of which I will only consider the most important ones in this book.\
    \ In the simplest case, you simply specify a list of parameters that are mandatory\
    \ to pass. Specifying the data type in square brackets is optional; if you choose\
    \ to do so, the data type will be checked when a parameter is passed.\n\n```\n\
    function Do-Something {\n    param(\n        [type1] $Parameter1\n        [type2]\
    \ $Parameter2\n        [type3] $Parameter3\n    )\n}\n```\n\nAlternatively, the\
    \ following short notation is allowed:\n\n```\nfunction Do-Something ([type1]$Para1,\
    \ [t2]$P2, [t3]$P3) { ... }\n```\n\nIf you specify a default value for parameters,\
    \ as in the following example, the parameter becomes optional, and thus does not\
    \ need to be specified when called:\n\n```\nfunction Do-It ([int]$A, [int]$B =\
    \ 2, [String]C = \"abc\") { ... }\n```\n\n> **Functions without an Explicit Parameter\
    \ List**\n\nThe use of `param` is optional. All data that does not correspond\
    \ to the predefined parameter list is accessible within the function in the predefined\
    \ `$args` variable. If you do not declare a parameter list, then `$args` applies\
    \ to all parameters. The PowerShell documentation speaks of *positional parameters*\
    \ in this context because the parameters have no name and can only be analyzed\
    \ based on their position.\n\nHowever, the analysis of `$args` is prone to errors.\
    \ Internally, `$args` is an array, so `$args(0)` is the first parameter, `$args(1)`\
    \ is the second one, etc. `$args.Length` specifies how many parameters not declared\
    \ via `param` were passed.\n\n## 4.11.4 Calling Functions\n\nRemember to pass\
    \ parameters when calling functions *without* naming parentheses! This behavior\
    \ is equivalent to calling cmdlets but, of course, differs from the behavior of\
    \ almost all other programming languages.\n\n```\nDo-It 1 2 \"abc\"\n```\n\nParameters\
    \ can be used like options. The associated values follow either separated by a\
    \ space or in the `-Parameter name:Value` notation. The order then no longer plays\
    \ a role. The following two calls of `Do-It` are equivalent to the previous line:\n\
    \n```\nDo-It -C \"abc\" -A 1 -B 2\nDo-It -B:2 -C:\"abc\" -A:1\n```\n\n## 4.11.5\
    \ Processing Standard Input\n\nSometimes, a function is to be programmed in such\
    \ a way that it can process objects from the standard input; that is, it can be\
    \ called via the pipe operator in the following form: ... | My-Function. The easiest\
    \ approach in such cases is to select the predefined $input variable. The following\
    \ function calculates the total of the Length properties of all objects, divides\
    \ the result by 1,000,000, and then displays the calculated result:\n\n```\nfunction\
    \ Get-TotalSize {\n    $TotalSize = 0\n    foreach($item in $input) {\n      \
    \  $TotalSize += $Item.Length\n    }\n    $TotalSize /= 1000000\n    \"Total size:\
    \ {0:F1} MB\" -f $TotalSize\n}\n```\n\nTo calculate the space required by all\
    \ files in the Downloads directory, the function can be called in the following\
    \ way:\n\n```\n> Get-ChildItem -Recurse C:\\Users\\kofler\\Downloads\\ |\n  Get-TotalSize\n\
    \nTotal size: 247.4 MB\n```\n\nThis script has a flaw: It relies on the fact that\
    \ any object passed via standard input actually has a Length property. Set-StrictMode\
    \ also interferes with this script if you pass a version number greater than 1.\
    \ The simplest solution is to check the data type within the loop and then make\
    \ an assignment into a typed variable, as in the following example:\n\n```\nforeach($Item\
    \ in $input) {\n    if ($Item.GetType().Name -eq \"System.IO.FileInfo\") {\n \
    \       [System.IO.FileInfo] $FInfo = $Item\n        $TotalSize += $FInfo.Length\n\
    \    }\n}\n```\n\nIf the data type does not match, the script will trigger an\
    \ error.\n\n## 4.11.6 Syntax Variants\n\nFor functions that are supposed to process\
    \ standard input, PowerShell provides two syntax variants. One version involves\
    \ organizing the function into the three blocks, begin, process, and end:\n\n\
    ```\nfunction Process-Data {\n    begin   { initialization ... }\n    process\
    \ { process data ...  }\n    end     { output, cleanup ... }\n}\n```\n\nThe `process`\
    \ block is run for each element of the standard input, where `$_` provides access\
    \ to the currently active element. All three blocks are optional. If you define\
    \ *one* of these blocks in a function, the entire code of the function must be\
    \ specified in `begin`, `process`, and `end`. The function `Get-TotalSize` can\
    \ then be programmed in the following way:\n\n```\nfunction Get-TotalSize {\n\
    \    begin {\n        $TotalSize = 0\n    }\n    process {\n        $TotalSize\
    \ += $_.Length\n    }\n    end {\n        $TotalSize /= 1000000\n        \"Total\
    \ size: {0:F1} MB\" -f $TotalSize\n    }\n}\n```\n\nWith `Set-StrictMode -Version\
    \ 2`, PowerShell complains again that it is not sure if `$_` has a `Length` property.\
    \ If necessary, you need to rebuild the code, as explained earlier.\n\n`filter`\
    \ is a short notation for a function where the `begin` and `end` blocks are empty:\n\
    \n```\nfilter Process-Data {\n    code\n}\n# equivalent\nfunction Process-Data\
    \ {\n    begin   { }\n    process { code }\n    end     { }\n}\n```\n\nIn practice,\
    \ `filter` is only useful in exceptional cases. Without the initialization performed\
    \ in `begin` or without final commands in `end`, programming a meaningful function\
    \ can be difficult.\n\n## 4.12 Modules\n\nFunctions stored in a *.ps1 file are\
    \ only accessible within this script, not outside the script. If you want to call\
    \ your functions interactively in the shell (like cmdlets) or use them in another\
    \ script, you must save the code of the functions in a module (file identifier\
    \ *.psm1):\n\n```\n# File MyModule.psm1\nFunction F1 { ... }\nFunction F2 { ...\
    \ }\nFunction F3 { ... }\n```\n\nBefore you can call any of the functions stored\
    \ in the module, you must import the module once:\n\n```\n> Import-Module .\\\
    MyModule.psm1\n```\n\nUntil the end of the current PowerShell session, you can\
    \ then call functions F1, F2, and F3 like cmdlets:\n\n```\n> F1\n```\n\nWhen you\
    \ make changes or corrections in the module, running `Import-Module` again is\
    \ not sufficient, however. You must first explicitly delete the module from the\
    \ internal PowerShell memory using `Remove-Module` and then load it again!\n\n\
    ```\n> Remove-Module MyModule\n> Import-Module .\\MyModule.psm1\n```\n\nYou can\
    \ list the functions defined in a loaded module via `Get-Command`, as in the following\
    \ example:\n\n```\n> Get-Command -Module MyModule\n```\n\n| CommandType | Name\
    \ | Version | Source |\n| --- | --- | --- | --- |\n| Function | F1 | 0.0 | MyModule\
    \ |\n| Function | F2 | 0.0 | MyModule |\n| Function | F3 | 0.0 | MyModule |\n\n\
    ### 4.12.1 Module Directories\n\nFor `Import-Module`, you must always specify\
    \ the path of the directory where you saved the module file. You can avoid this\
    \ step if you save the module in a directory that PowerShell provides for module\
    \ files. A list of these directories that are separated by semicolons is contained\
    \ in the `$Env:PSModulePath` environment variable. In the following command, I\
    \ used `-split` to output the content of the variable in a more readable way:"
  mdcn: "此上下文中概述的结果结构自然也适用于在循环中执行的命令。循环中的每个输出都会扩展在最后返回的函数结果。\n\n> **谨慎使用 Write-Output！**\n\
    \n出于调试目的，你可能会想在函数中包含 `Write-Output` 来输出中间结果。*不要这样做！* `Write-Output` 产生的输出会成为函数结果的一部分。更好的方法是使用\
    \ `Write-Debug`，并通过 `$DebugPreference = \"Continue\"` 启用调试输出！\n\n作为替代方案，你也可以使用\
    \ `Write-Host`。但这种方法有一个缺点，即你必须稍后删除这些语句。`Write-Host` 的输出无法被重定向或以其他方式禁用。与 `Write-Output`\
    \ 相比，使用 `Write-Host` 的一个优点是它不会改变函数结果。\n\n## 4.11.2 return\n\n函数通常以执行最后一条命令结束。但是，你也可以使用\
    \ `return` 提前终止函数（例如，在循环中一旦满足条件就终止）。如果你使用不带参数的 `return`，函数结果将像以前一样由所有先前的输出组成：\n\
    \n```\ncommand1\ncommand2\nreturn\n# 结果：包含 command1 和 command2 部分结果的数组\n```\n\n\
    或者，你可以将变量、表达式或命令传递给 `return`。在这种情况下，此表达式的结果将添加到先前的部分结果中。（事实上，人们会假设只有 `return`\
    \ 表达式决定结果。但在 PowerShell 中并非如此！）\n\n```\ncommand1\ncommand2\nreturn command3\n\
    # 结果：包含 command1、command2 和 command3 部分结果的数组\n```\n\n## 4.11.3 参数\n\n通常，参数应该传递给函数。使用\
    \ `param` 提前声明位置、名称、数据类型、默认值和其他属性是有意义的。PowerShell 提供了丰富的语法选项，本书中我将只考虑其中最重要的几种。在最简单的情况下，你只需指定一个必须传递的参数列表。在方括号中指定数据类型是可选的；如果你选择这样做，当传递参数时将检查数据类型。\n\
    \n```\nfunction Do-Something {\n    param(\n        [type1] $Parameter1\n    \
    \    [type2] $Parameter2\n        [type3] $Parameter3\n    )\n}\n```\n\n或者，允许使用以下简写法：\n\
    \n```\nfunction Do-Something ([type1]$Para1, [t2]$P2, [t3]$P3) { ... }\n```\n\n\
    如果你为参数指定默认值，如以下示例所示，则该参数变为可选，因此在调用时不需要指定：\n\n```\nfunction Do-It ([int]$A, [int]$B\
    \ = 2, [String]C = \"abc\") { ... }\n```\n\n> **没有显式参数列表的函数**\n\n使用 `param` 是可选的。所有不对应于预定义参数列表的数据都可以在函数内的预定义\
    \ `$args` 变量中访问。如果你不声明参数列表，那么 `$args` 适用于所有参数。PowerShell 文档在此上下文中称其为*位置参数*，因为参数没有名称，只能根据其位置进行分析。\n\
    \n然而，`$args` 的分析容易出错。在内部，`$args` 是一个数组，因此 `$args(0)` 是第一个参数，`$args(1)` 是第二个，依此类推。`$args.Length`\
    \ 指定了通过 `param` 未声明的传递了多少个参数。\n\n## 4.11.4 调用函数\n\n请记住，在调用函数时*不要*使用命名括号来传递参数！此行为等同于调用\
    \ cmdlet，但当然与几乎所有其他编程语言的行为不同。\n\n```\nDo-It 1 2 \"abc\"\n```\n\n参数可以用作选项。关联的值可以跟在空格后面，也可以使用\
    \ `-Parameter name:Value` 表示法。顺序不再重要。以下两个对 `Do-It` 的调用等同于上一行：\n\n```\nDo-It -C\
    \ \"abc\" -A 1 -B 2\nDo-It -B:2 -C:\"abc\" -A:1\n```\n\n## 4.11.5 处理标准输入\n\n有时，需要将函数编程为能够处理来自标准输入的对象；也就是说，可以通过管道运算符以以下形式调用：...\
    \ | My-Function。在这种情况下，最简单的方法是选择预定义的 `$input` 变量。以下函数计算所有对象的 Length 属性的总和，将结果除以\
    \ 1,000,000，然后显示计算结果：\n\n```\nfunction Get-TotalSize {\n    $TotalSize = 0\n \
    \   foreach($item in $input) {\n        $TotalSize += $Item.Length\n    }\n  \
    \  $TotalSize /= 1000000\n    \"Total size: {0:F1} MB\" -f $TotalSize\n}\n```\n\
    \n要计算 Downloads 目录中所有文件所需的空间，可以按以下方式调用该函数：\n\n```\n> Get-ChildItem -Recurse C:\\\
    Users\\kofler\\Downloads\\ |\n  Get-TotalSize\n\nTotal size: 247.4 MB\n```\n\n\
    此脚本有一个缺陷：它依赖于通过标准输入传递的任何对象实际上都具有 Length 属性。如果你传递的版本号大于 1，Set-StrictMode 也会干扰此脚本。最简单的解决方案是在循环内检查数据类型，然后将赋值到类型化变量中，如以下示例所示：\n\
    \n```\nforeach($Item in $input) {\n    if ($Item.GetType().Name -eq \"System.IO.FileInfo\"\
    ) {\n        [System.IO.FileInfo] $FInfo = $Item\n        $TotalSize += $FInfo.Length\n\
    \    }\n}\n```\n\n如果数据类型不匹配，脚本将触发错误。\n\n## 4.11.6 语法变体\n\n对于应该处理标准输入的函数，PowerShell\
    \ 提供了两种语法变体。一种版本涉及将函数组织成三个块：begin、process 和 end：\n\n```\nfunction Process-Data\
    \ {\n    begin   { 初始化 ... }\n    process { 处理数据 ...  }\n    end     { 输出，清理 ...\
    \ }\n}\n```\n\n`process` 块针对标准输入的每个元素运行，其中 `$_` 提供对当前活动元素的访问。所有三个块都是可选的。如果你在函数中定义了*其中一个*块，则函数的整个代码必须在\
    \ `begin`、`process` 和 `end` 中指定。然后，函数 `Get-TotalSize` 可以按以下方式编程：\n\n```\nfunction\
    \ Get-TotalSize {\n    begin {\n        $TotalSize = 0\n    }\n    process {\n\
    \        $TotalSize += $_.Length\n    }\n    end {\n        $TotalSize /= 1000000\n\
    \        \"Total size: {0:F1} MB\" -f $TotalSize\n    }\n}\n```\n\n使用 `Set-StrictMode\
    \ -Version 2` 时，PowerShell 会再次抱怨它不确定 `$_` 是否具有 `Length` 属性。如有必要，你需要如前所述重建代码。\n\
    \n`filter` 是 `begin` 和 `end` 块为空的函数的简写：\n\n```\nfilter Process-Data {\n    代码\n\
    }\n# 等效\nfunction Process-Data {\n    begin   { }\n    process { 代码 }\n    end\
    \     { }\n}\n```\n\n在实践中，`filter` 仅在特殊情况下有用。如果没有在 `begin` 中执行初始化，或者没有在 `end`\
    \ 中执行最终命令，编程一个有意义的函数可能会很困难。\n\n## 4.12 模块\n\n存储在 *.ps1 文件中的函数仅在此脚本内可访问，脚本外部不可访问。如果你想在\
    \ shell 中交互式地调用你的函数（就像 cmdlet 一样）或在另一个脚本中使用它们，你必须将函数的代码保存在模块中（文件标识符 *.psm1）：\n\
    \n```\n# 文件 MyModule.psm1\nFunction F1 { ... }\nFunction F2 { ... }\nFunction\
    \ F3 { ... }\n```\n\n在调用存储在模块中的任何函数之前，你必须先导入一次模块：\n\n```\n> Import-Module .\\\
    MyModule.psm1\n```\n\n在当前 PowerShell 会话结束之前，你可以像 cmdlet 一样调用函数 F1、F2 和 F3：\n\n\
    ```\n> F1\n```\n\n但是，当你在模块中进行更改或更正时，再次运行 `Import-Module` 是不够的。你必须首先使用 `Remove-Module`\
    \ 从内部 PowerShell 内存中显式删除该模块，然后重新加载它！\n\n```\n> Remove-Module MyModule\n> Import-Module\
    \ .\\MyModule.psm1\n```\n\n你可以通过 `Get-Command` 列出已加载模块中定义的函数，如以下示例所示：\n\n```\n\
    > Get-Command -Module MyModule\n```\n\n| 命令类型 | 名称 | 版本 | 来源 |\n| --- | --- |\
    \ --- | --- |\n| Function | F1 | 0.0 | MyModule |\n| Function | F2 | 0.0 | MyModule\
    \ |\n| Function | F3 | 0.0 | MyModule |\n\n### 4.12.1 模块目录\n\n对于 `Import-Module`，你必须始终指定保存模块文件的目录路径。如果你将模块保存在\
    \ PowerShell 为模块文件提供的目录中，可以避免此步骤。这些目录的列表（以分号分隔）包含在 `$Env:PSModulePath` 环境变量中。在以下命令中，我使用了\
    \ `-split` 以更易读的方式输出变量的内容："
