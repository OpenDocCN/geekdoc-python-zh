    sr0                 11:0    1 1024M  0 rom\nvda                 252:0   0    5G\
    \  0 disk\n├─vda1              252:1   0    1G  0 part /boot\n└─vda2         \
    \     252:2   0    4G  0 part\n  ├─almalinux-root  253:0   0  3,5G  0 lvm  /\n\
    \  └─almalinux-swap  253:1   0  512M  0 lvm  [SWAP]\nvdb                 252:16\
    \  0    1G  0 disk\n...\n```\n\nIf more information is to be determined for each\
    \ virtual machine and stored in result files, programming a small script could\
    \ be worthwhile:\n\n```\n# Sample file gather-vm-data.sh\nVMNAMES=$(echo host{01..25})\n\
    VMHOST=mylab.com\nUSER=username\nCMDS='hostnamectl; echo; ip addr; echo; lsblk'\n\
    \nfor vm in $VMNAMES; do\n    echo $vm\n    ssh $USER@$vm.$VMHOST -o StrictHostKeyChecking=no\
    \ \"$CMDS\" \\n        > result-$vm.txt\ndone\n```\n\nThe script traverses all\
    \ virtual machines contained in `VMNAMES`, executes the commands listed in `CMDS`\
    \ there, and saves the results in files with names like `result-<vmname>.txt`.\n\
    I use a strongly extended variant of this script for evaluating exams for my “Linux\
    \ System Administration” course. Students must perform all possible admin tasks\
    \ in a freshly set up virtual machine as part of the exam. Correcting the exam\
    \ tasks cannot be fully automated, but the script nevertheless greatly relieves\
    \ me of tedious grading work.\nOf course, you can also use comparable scripts\
    \ away from teaching, for example, for the central monitoring or administration\
    \ of large groups of servers or virtual machines.\n\n> **Other Tools**\nThe use\
    \ of “hand-knitted” scripts is only recommended if the work to be performed is\
    \ manageable. The more complex the task, the more likely you should look for remote\
    \ administration or server pool monitoring programs. Proven configuration tools\
    \ include *Ansible* or *Puppet*; you can manage comprehensive monitoring using\
    \ *Grafana*, *Prometheus*, or *Nagios*.\n\nIf you’re only interested in running\
    \ commands via SSH on many computers as efficiently as possible, *Cluster SSH*\
    \ or *Parallel SSH* might be worth trying out."
