  md: '# 5.3 Programming Custom Scripts


    Of course, you don''t want to use Python primarily interactively; you want to
    program scripts to do a particular task over and over again. Countless editors
    and development environments are available to help you do this.


    A good choice is Visual Studio Code (VS Code). As soon as you edit a Python script
    in it, VS Code asks if you want to install the recommended Python extensions.
    You should definitely do that! In addition to various additional functions, VS
    Code then provides the option to start your script directly from the editor.


    Once you have created a new, still empty file in VS Code, you need to enter the
    following line and save the file as `HelloWorld.py`:


    ```

    print(''Hello, World!'')

    ```


    Provided that you have installed the Python extension, you can start the program
    by clicking the **Run** button. On Windows, the actual output is unfortunately
    somewhat lost in the status information used behind the scenes in VS Code and
    PowerShell.


    ![](img/a7fa45d496335c22ffb14c3275e24ffb_156_0.png)


    # 5.3.1 Shebang


    To run Python scripts on Linux and macOS without VS Code or another development
    environment, you must preface the script with the following shebang line. On current
    Linux distributions, you can simply specify `python` instead of `python3`, but
    on older distributions and on macOS, only `python3` provides clarity as to which
    Python version you''re referring to.


    ```

    #!/usr/bin/env python3

    ```'
