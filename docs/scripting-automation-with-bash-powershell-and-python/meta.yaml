  md: '# 4.13.1 Set-StrictMode


    The `Set-StrictMode` command, mentioned several times earlier in this chapter,
    sets how picky PowerShell should be about detecting errors. `Set-StrictMode` currently
    supports three versions:


    +   - `Set-StrictMode -Version 1.0` causes an error message when using an uninitialized
    variable. Variables in strings (i.e., "text $UnknownVariable") are excluded.

    - `Set-StrictMode -Version 2.0` triggers an error for each uninitialized variable
    as well as when using non-existent properties.

    - `Set-StrictMode -Version 3.0` also throws an error when accessing non-existent
    array elements.


    The inaccuracies detected by `Set-StrictMode` will result in an error message,
    but the script will still continue! You can also specify `Latest` instead of a
    version number. However, the results of these tests should be taken with a grain
    of salt: If more validity tests are added in a future PowerShell version, your
    script may report an error even though nothing has changed in the code.


    # 4.13.2 Aborting Scripts on Errors


    The way PowerShell behaves when it detects an error depends on the contents of
    the `$ErrorActionPreference` variable. You can change the desired behavior simply
    by assigning a string to the variable. This change is allowed everywhere in a
    script. You can cause a different response to errors in different parts of the
    program.


    | Setting | Effect |

    | :--- | :--- |

    | "Continue" | Display error message, continue script (applies by default) |

    | "Inquire" | Display error message and ask if script should be continued |

    | "SilentlyContinue" | Continue script without error message |

    | "Stop" | Display error message, end script |


    **Table 4.9** The Most Important Settings for the $ErrorActionPreference Variable


    # 4.13.3 Separating Error Messages from Other Output


    When you run a script interactively in PowerShell, ordinary outputs and errors
    alike appear in the terminal. However, if you redirect the output of a script
    to a file using `> outfile.txt`, then that file will contain only the regular
    output. The error messages are still visible on the screen. This behavior has
    to do with the fact that PowerShell differentiates between multiple “streams”
    that are intended for different purposes. For background information on this topic,
    see [Section 4.8](#section-4.8).'
