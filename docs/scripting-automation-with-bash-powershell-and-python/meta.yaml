    # 4.4 Combining Commands


    You now know how to run individual commands. But the great art of script programming
    is to combine multiple commands in a meaningful way. The && and || operators are
    available only from PowerShell version 7 onwards.


    | Syntax | Function |

    | :--- | :--- |

    | `command1 | command2` | command2 **processes the results** of command1. |

    | `command1 ; command2` | **First run** command1, **then** command2 (**even if**
    command1 **has triggered an error**). |

    | `command1 && command2` | **First run** command1, **then** command2 (**only if**
    command1 **did not cause an error**). |

    | `command1 || command2` | **First run** command1; command2 **will be run only
    if** command1 **has triggered an error**. |


    Table 4.1 Combining Commands


    In this section, I will focus on the pipe operator (|), which is most important
    in real-life scenarios. Further processing of intermediate results requires that
    the second command can cope with the result data type of the first command.


    Note that cmdlets always return objects internally. These objects usually contain
    many more properties than are displayed on the screen. The screen output is optimized
    to provide a (reasonably) clear result for users. Many properties of the objects
    are omitted. If you want to view the result with all details, you need to pass
    the output to `Format-List` or to `Get-Member`. Try, for example, `Get-ChildItem
    | Format-List` or `Get-Process | Get-Member`!


    In the following example, `Get-Process` determines all processes of the Microsoft
    Edge browser. The process objects are redirected to `Stop-Process`; this command
    terminates the web browser, if it is running.


    ```

    > Get-Process msedge | Stop-Process

    ```'
- md: "## 4.4.1 命令链\n\n管道操作符当然可以多次使用（即 `command1 | command2 | command3` 等）。这个选项开启了令人着迷的可能性。以下命令确定\
    \ `Downloads` 目录中的所有文件。然后，它按大小（最大文件在前）对结果列表进行排序，提取前十个文件，并确定它们的空间占用情况。\n\n```\n\
    > (Get-ChildItem -Path Downloads |\n    Sort-Object -Property Length -Descending\
    \ |\n    Select-Object -First 10 |\n    Measure-Object -Property Length -Sum).Sum\n\
    \n22737476\n```\n\n如果你想删除这十个最大的文件，并使用查询来确认此过程已完成，你应该按如下步骤操作：\n\n```\n> Get-ChildItem\
    \ -Path Downloads |\n    Sort-Object -Property Length -Descending |\n    Select-Object\
    \ -First 10 |\n    Remove-Item -Confirm\n```\n\n## 4.4.2 多行语句\n\n在终端中，你可以输入任意长度的语句，但在本书中，已定义了最大行长度。在本书中，我经常将复杂的命令分散在多行中。\n\
    \n当你输入多行命令时，PowerShell 的行为相当智能：只要明确命令尚未完成，你就可以直接按 Enter 并在下一行继续输入。如果行中仍有未关闭的括号，或者行的最后一个字符是需要续行的运算符（如我们之前的示例中行尾的\
    \ `|`），则总是满足此未完成条件。\n\n另一方面，如果续行对 shell 来说不明显可识别，但你仍然想将输入分隔成多行，则受影响的行必须以空格和反引号（``\
    \ ` ``）结尾。反引号前的空格字符是必需的，并且反引号后必须立即按 Enter。\n\n```\n> Do-Something -LongOption\
    \ 123 -OtherOption 456 `\n    -YetAnotherOption \"lorem ipsum\"\n```\n\n## 4.4.3\
    \ 处理特殊字符\n\n在 PowerShell 中，许多字符具有特殊含义：`#` 引入注释，`{` 和 `}` 形成代码组，`>` 重定向输出，等等。有时，需要直接使用这些字符，即不使用\
    \ PowerShell 特定的功能，例如调用外部命令。在下一个示例中，`>` 和 `#` 字符不能被解释。（我将在第 16 章第 16.1 节更详细地介绍\
    \ `magick` 命令。）\n\n在这种情况下，你必须在前面加上前面提到的反引号（`` ` ``）。因此，反引号是 PowerShell 的引号，并与\
    \ Bash 和许多其他编程语言中的反斜杠（`\\`）执行相同的任务。\n\n```\n> magick in.png -resize 1024x1024`>\
    \ -background `#733 out.jpg\n```\n\n在大多数情况下，将相关字符串用引号括起来更容易：\n\n```\n> magick\
    \ in.png -resize '1024x1024>' -background '#733' out.jpg\n```\n\n如果你需要在字符串中换行，应该使用\
    \ `` `n ``：\n\n```\n> Write-Output \"line 1`nline 2\"\nline 1\nline 2\n```\n\n\
    ## 4.5 第一个脚本\n\nPowerShell 在交互模式下已经提供了出色的选项。通过你自己的脚本，你甚至可以更进一步，永久保存那些已经过交互测试的命令。这个功能不仅节省了未来的输入时间，还避免了记忆各种命令、选项等的需要。\n\
    \n要编写脚本，你需要一个编辑器。对于你的第一次实验，*记事本*就足够了，但免费的 *Notepad++* 程序提供了更多功能。然而，从长远来看，我建议你安装\
    \ Visual Studio Code (VS Code)，如果这个程序还没有在你的计算机上，第 13 章将对其进行详细描述。无论你开发 PowerShell、Bash\
    \ 还是 Python 脚本，VS Code 都提供了出色的支持。（然而，不推荐使用许多旧手册中描述的 *PowerShell ISE* 开发环境。该程序已不再由\
    \ Microsoft 开发，并且仅适用于 PowerShell 5.1 及以下版本。）\n\n### 4.5.1 Hello, World!\n\n第一个脚本应该输出文本“Hello,\
    \ World!”（别担心，本节后面会有更严肃的示例。）打开你选择的编辑器，输入以下行，并将文本文件保存为 `Hello.ps1`，放在一个容易找到的目录中（例如，在\
    \ Documents 中）。`Write-Output` cmdlet 将传递的字符串作为参数输出到屏幕。\n\n```\nWrite-Output \"\
    Hello, World!\"\n```\n\n`*.ps1` 文件扩展名代表 PowerShell 1。当 Microsoft 发布 PowerShell\
    \ 的第二版时，他们不想更改当时已经确立的扩展名，因此，它荒谬地一直保留为 `*.ps1` 至今。\n\n要运行脚本，你只需输入文件名，包括前面的目录，例如：\n\
    \n```\n> Documents\\Hello.ps1\n\nHello, World!\n```\n\n如果脚本位于当前目录中，你必须在前面加上 `.`\
    \ 以明确指定目录，例如：\n\n```\n> .\\Hello.ps1\n\nHello, World!\n```\n\n在此上下文中，“`.`”是你当前所在目录的简写。出于安全原因，没有指定目录的脚本只有在\
    \ `*.ps1` 文件位于 `$PATH` 环境变量中指定的目录中时才会执行。我稍后将更详细地描述这些概念。\n\n### 4.5.2 执行策略的麻烦\n\
    \n根据 Windows 版本的不同，你第一次尝试运行自定义脚本可能会失败，并显示以下错误消息：\n\n```\n> .\\Hello.ps1:\n\nFile\
    \ C:\\Users\\kofler\\Documents\\Hello.ps1 cannot be loaded because running scripts\
    \ is disabled on this system.\nFor more information, see about_Execution_Policies\
    \ at https://go.microsoft.com/fwlink/?LinkID=135170\n```\n\n此错误消息的原因是所谓的*执行策略*。此策略指定了在\
    \ Windows 上允许运行脚本的条件。有四种可能的设置：\n\n- **Restricted**：根本无法执行任何脚本。\n- **AllSigned**：只能执行已签名的脚本。\n\
    - **RemoteSigned**：可以执行所有自定义脚本，但安装或下载的脚本只有在已签名的情况下才能执行。\n- **Unrestricted**：可以执行所有脚本。\n\
    \n通常在 Windows Server 上适用 `RemoteSigned`，但在桌面版本上适用 `Restricted`：\n\n```\n> Get-ExecutionPolicy\n\
    Restricted\n```\n\n因此，在许多 Windows 安装中，根本无法运行脚本。出于安全原因，此默认设置是有意义的，但它当然不适合学习脚本。以下命令允许当前用户执行自定义脚本以及已签名的外部脚本：\n\
    \n```\n> Set-ExecutionPolicy -Scope CurrentUser RemoteSigned\n```\n\n你也可以在没有 `-Scope\
    \ CurrentUser` 选项的情况下运行上述命令——那么，该设置将应用于计算机的所有用户。但是，只有在以管理员权限运行 PowerShell 或 Windows\
    \ Terminal 时，才允许在系统级别更改执行策略。\n\n> **更多设置选项**\n执行策略可以在不同级别（计算机、用户、进程）进行配置。有关配置选项的详细信息，请参阅\
    \ https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_execution_policies。\n\
    \n> **签名是什么意思？**\n\n*已签名的脚本*包含一个带有数字签名（即加密代码）的注释块。此代码表示谁编写了该脚本。此代码仅适用于签名时脚本的状态。任何后续更改都将使签名失效。你可以使用\
    \ `Set-AuthenticodeSignature` 签署自己的脚本。此命令要求你拥有一个证书——要么是（用于测试目的）自创建的证书，要么是来自证书颁发机构的真实证书。你可以在\
    \ https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_signing\
    \ 找到有关此主题的更多信息。\n\n### 4.5.3 设置自定义脚本目录\n\n对于你的第一个脚本，保存位置无关紧要。但在接下来的几周里，随着你编写越来越多的脚本，一个好主意是为你脚本设置一个目录，并将该目录添加到\
    \ `PATH` 环境变量中。在我们的示例中，我假设你将目录命名为 `myscripts`，并直接在你的工作目录中创建它。`Set-Location` 使用户目录成为当前目录（如果尚未是）。`New-Item`\
    \ 创建目录。（如果你到目前为止一直使用 `cmd.exe` 或 Bash，`cd myscripts` 或 `mkdir myscripts` 也会让你用更少的输入和麻烦到达那里。但我想在本章中努力向你展示“正确的”PowerShell\
    \ cmdlet。）\n\n```\n> Set-Location\n> New-Item -ItemType Directory myscripts\n\
    ```"
