    \n## 6.6 其他命令\n\n在结束本章之前，我想简要介绍几个更常用的命令：\n\n- **alias**\n  `alias` 定义快捷方式。`alias\
    \ ll='ls -lh'` 允许你以 `ll` 短格式运行常用的 `ls -l -h` 命令（列出文件的详细信息并将文件大小显示为*人类可读*格式）。快捷方式最好在\
    \ `.bashrc` 文件中指定，以便永久可用。\n\n- **cat file**\n  `cat file` 输出文本文件。该命令通常与输入或输出重定向结合使用。例如，`cat\
    \ text1 text2 text3 > result` 将三个文本文件连接起来，并将结果保存在新文件中。\n\n  `Cat > newfile` 也特别有用。此构造允许你创建一个新的短文本文件，而无需启动编辑器。因为没有将文件传递给命令进行读取，所以它期望从终端（即标准输入）输入。按\
    \ `Ctrl` + `D` 终止输入：\n\n  ```\n  $ cat > newfile\n  Line 1\n  Line 2\n  <Ctrl>+<D>\n\
    \  ```\n\n- **date**\n  `date` 返回当前日期和时间。以 `+` 开头的字符串可选地控制输出格式。例如，`date \"+%Y-%m-%d\"\
    ` 生成一个日期为国际标准化组织（ISO）格式的字符串（例如，`2023-12-31`）。\n\n- **history**\n  `history` 列出所有最近执行的命令。\n\
    \n- **ip**\n  `ip` 确定或更改网络配置。以下示例包含特别常用的命令：\n\n  ```\n  $ ip addr       # 列出计算机的所有\
    \ IP 地址\n  $ ip link       # 列出网络适配器\n  $ ip route      # 显示路由表\n  ```\n\n- **less\
    \ file**\n  `less file` 就像 `cat` 一样显示文本文件。此命令适用于较长的文件，因为你可以使用光标键随意滚动浏览文本。`q` 终止程序。\n\
    \n- **ln file link**\n  `ln file link` 创建指向现有文件的链接。`-s` 选项创建符号链接而不是*硬链接*。\n  如果你不确定指定参数的顺序：所有重要的\
    \ Linux 命令都期望先指定源，然后是目标。此规则适用于 `cp`、`mv`、`ln` 等。\n\n- **man command**\n  `man\
    \ command` 显示命令的帮助文本。与 `less` 一样，你可以使用光标键滚动浏览通常有几页的文本。`/` 允许你指定搜索词。`q` 终止帮助。\n\
    \n- **ping hostname/ipaddress**\n  `ping hostname/ipaddress` 向另一个主机发送 Internet\
    \ 控制消息协议（ICMP）数据包，并显示响应所需的时间。此命令通常无限期运行，直到通过 `Ctrl` + `C` 终止。`ping -c <n>` 仅发送\
    \ *n* 个数据包，然后自行终止。\n\n- **wc file**\n  `wc file` 计算文本文件中的行数、单词数和字符数。通过使用 `-c`（*计数字节*）、`-w`（*单词*）或\
    \ `-l`（*行*）选项，你可以将输出减少为一个数字。\n\n- **which command**\n  `which command` 确定命令存储的位置。例如，`which\
    \ cp` 返回以下结果：`/usr/bin/cp`。\n\n# 第 7 章\n\n## PowerShell 的 cmdlet\n\n本章简明地汇编了最重要的\
    \ cmdlet——一种用于交互操作和脚本编程的基本 PowerShell 词汇。如果你有多年的 PowerShell 使用经验，可以放心地跳过本章。\n\
    除了预装的 cmdlet，互联网上还有无数的 PowerShell 扩展。我将在第 7.8 节向你介绍的 NuGet 包管理器有助于安装这些附加模块。\n\
    本章以主要别名的参考结束。这些快捷方式在交互式使用 PowerShell 时节省了大量输入，并允许达到与 Linux 上类似的效率。\n\n> **本章的先决条件**\n\
    就其性质而言，只有在你熟悉第 4 章第 4.4 节中介绍的基本 PowerShell 概念（例如使用管道运算符（|）链接 cmdlet）时，阅读本章才有意义。\n\
    \n## 7.1 目录和文件\n\n你可以使用以下命令将你的主目录（*我的文档*）设置为工作目录，在那里创建一个新目录，然后更改它。稍后，你可以离开新目录，然后删除它。\n\
    \n```\n> Set-Location                # 将主目录设置为工作目录\n> Get-Location           \
    \     # 显示其位置\n\nPath\n----\nC:\\Users\\kofler\n> New-Item -ItemType \"directory\"\
    \ subdir   # 创建新目录\n> Set-Location subdir          # 现在 subdir 是工作目录\n> Set-Location\
    \ ..              # 返回主目录\n> Remove-Item subdir           # 删除 subdir\n```\n\n\
    对于此列表中使用的所有 cmdlet，都有可用的别名或函数，允许以更少的输入完成这些操作。由于我建议在你自己的脚本中避免使用这些简写表示法，因此在本章的所有后续示例中，我始终使用原始的\
    \ cmdlet 名称。\n\n```\n> cd                # cd 是 Set-Location 的别名\n> pwd      \
    \         # pwd 是 Get-Location 的别名\n> md subdir         # md 是 mkdir 函数的别名\n>\
    \ cd subdir\n> cd ..\n> rmdir subdir      # rmdir 是 Remove-Item 的别名\n```\n\nNew-Item\
    \ 还允许你创建一组嵌套目录。虽然在 Windows 中目录用 \\ 分隔，但 cmdlet 也接受 / 作为目录分隔符。\n\n```\n> New-Item\
    \ -ItemType \"directory\" images\\2023\\12\n> New-Item -ItemType \"directory\"\
    \ images/2023/12  # 等效\n```\n\n### 7.1.1 列出、复制、移动和删除文件\n\n在下面的列表中，首先创建 tst 目录。在该目录中，当前时间存储在\
    \ now.txt 文件中。此文件首先被复制，然后副本被重命名。Get-ChildItem 列出现在存在的文本文件。Remove-Item 在最后进行清理。\n\
    \n```\n                                # 创建 tst 目录\n> New-Item -ItemType \"directory\"\
    \ tst\n> Set-Location tst              # 更改到那里\n> Get-Date > now.txt         \
    \    # 将日期和时间保存到 now.txt\n> Copy-Item now.txt copy.txt     # 创建 now.txt 的副本\n\
    > Move-Item copy.txt backup.txt  # 重命名副本\n> Get-ChildItem *.txt            # 列出所有\
    \ *.txt 文件\n```\n\nMode    LastWriteTime         Length Name\n----    -------------\
    \         ------ ----\n-a---   24.01.2023 12:29         40 backup.txt\n-a--- \
    \  24.01.2023 12:29         40 now.txt\n\n```\n> Remove-Item *.txt           \
    \   # 删除所有 *.txt 文件\n```\n\n请注意，使用 Remove-Item 删除的文件或目录不会进入回收站，而是被不可撤销地删除！\n\n\
    要测试文件是否存在，可以使用 Test-Path。该 cmdlet 返回 True 或 False。\n\n```\n> Test-Path file1.txt\n\
    False\n```"
