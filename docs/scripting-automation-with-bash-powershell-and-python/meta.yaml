    # 5.9.3 Mutable or Immutable?


    What happens when `b=a`, that is, when one variable is assigned to another? The
    question is not as trivial as it may seem. Let''s start with an example that contains
    integers. In the following code, the value 3 is stored first in `a`. For the assignment
    `b=a`, `a` is replaced by 3. So, the number 3 is also stored in `b`. To put it
    more precisely: `a` and `b` are now two variables that both reference an object
    with the integer 3. Via `a=4`, `a` is assigned a new value. This has no influence
    on `b`. Thus, `a` and `b` are independent of each other: `a` now contains the
    value 4; `b`, the value 3.


    ```

    a = 3

    b = a        # b

    a = 4

    print(a, b)  # Output 4, 3

    ```


    The code for the second example is quite similar. However, in this case, in `a`
    and `b`, no simple numbers are stored, but lists. After the assignment `b=a`,
    both variables refer to the same list. The use of `a(0)=4` changes one element
    of the list. As the `print` call proves, this change applies to both `a` and `b`!
    So, `a` and `b` are not independent of each other as in the previous example!


    ```

    a = [1, 2, 3]

    b = a        # b references the same list as a

    a[0] = 4     # changes the first list element

    print(a, b)  # Output [4, 2, 3] [4, 2, 3]

    ```


