  md: '# 5.14 Processing Text Files


    Before you can read or write a text file, you must open the file via `open`. Then,
    you can pass the filename in the first parameter and the access mode in the second.
    With the additional letter `b`, you can also process binary files, but we won''t
    cover this topic here.


    | Mode | Meaning |

    | :--- | :--- |

    | ''r'' | Read file (applies by default) |

    | ''w'' | Write file (existing files will be overwritten!) |

    | ''a'' | Write to the end of an existing file (*append*) |

    | ''r+'' | Read and write file |


    Table 5.9 Access Modes of the Open Method


    `open` returns a `file` object, which can then be processed with various methods.
    `close()` terminates access to the file and releases it again for other programs.
    In short scripts, you can do without `close()` because, at the end of the program,
    all open files will be closed anyway.


    | Method | Meaning |

    | :--- | :--- |

    | `s = f.read()` | Reads the entire file |

    | `s = f.read(n)` | Reads `n` bytes and returns them as a string |

    | `s = f.readline()` | Reads one line of the file |

    | `f.write(s)` | Writes the string `s` to the file |

    | `n = f.tell()` | Indicates the current read/write position |

    | `f.seek(n, offset)` | Changes the read/write position |

    | `close()` | Closes the file |


    Table 5.10 Important Methods for File Objects


    `readline()` always returns the EOL character of each line (i.e., `\n` on macOS
    and Linux). However, often, this EOL character is undesirable. If necessary, `line.rstrip()`
    eliminates the whitespace (i.e., any blank, tab, and newline) at the EOL.


    When the EOF is reached, `readline()` returns an empty string. Since empty lines
    *within* a file consist at least of `\n`, no ambiguity can arise about when the
    EOF is reached.


    If the structure of your code allows it, you should formulate the entire code
    for processing a file using `with open() as f:`. This approach ensures that the
    file will automatically be closed when an error occurs or when the current code
    block (e.g., a function) is'
