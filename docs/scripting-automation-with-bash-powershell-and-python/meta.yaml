- md: "## 8.4 Example: Apache Log Analysis\n\nThe starting point for this example\
    \ is a log file from an Apache web server in what is called the *combined logging*\
    \ format. The first lines of this file look as follows (wrapped here for reasons\
    \ of space):\n\n```\n65d3:f5b9:e9e5:4b1c:331b:29f3:97c1:c18f - - [05/Feb/2023:00:00:22\
    \ +0100]\n\"POST /consumer/technology HTTP/1.1\" 200 5166\n\"https://example.com/land/raise/authority/him\"\
    \n\"WordPress/6.1.1; https://example.com\"\n\n221.245.9.91 - - [05/Feb/2023:00:00:21\
    \ +0100] \"GET /explain/out HTTP/1.1\"\n200 31222 \"https://example.com/add/maybe/person\"\
    \n\"FreshRSS/1.20.2 (Linux; https://freshrss.org)\"\n\n37e3:498f:44d8:c471:3ba3:9902:17e7:2be8\
    \ - -\n[05/Feb/2023:00:00:24 +0100]\n\"GET /by/financial/within/benefit HTTP/1.1\"\
    \ 200 97598\n\"https://example.com/defense/friend/race/protect\"\n\"Mozilla/5.0\
    \ (iPhone; CPU iPhone OS 16_3 like Mac OS X)\nAppleWebKit/605.1.15 (KHTML, like\
    \ Gecko) Version/16.3\nMobile/15E148 Safari/604.1\"\n```\n\nThe columns of this\
    \ file indicate the IP address from which the request was made, the user (if known)\
    \ who made the request, the type of request (GET, POST, etc.), the address of\
    \ the web server requested, the HTTP code returned (e.g., 200 \"OK\"), the data\
    \ volumes transferred, from which page the request was triggered (referrer address),\
    \ and which client it is.\n\nTo reproduce the following examples, you'll need\
    \ to use the *access.log* file from the sample files. *wc* shows that the file\
    \ contains more than 170,000 lines.\n\n```\n$ wc -l access.log\n\n172607 access.log\n\
    ```\n\n> **Anonymized Data**\n\n*access.log.gz* is a real logging file that has\
    \ been anonymized for privacy reasons. All IP addresses, URLs and usernames were\
    \ replaced with random data. This anonymization was of course also done by a script.\
    \ If you’re interested in the code, look at *anonymize-log.py*, which makes extensive\
    \ use of regular expressions. If you have access to “real” logging files from\
    \ your own web server, you should use those.\n\n### 8.4.1 Extracting IP Addresses\n\
    \nYou can use `cut` to extract the IP addresses from the logging file:\n\n```\n\
    $ cut -d ' ' -f 1 access.log | less\n\n65d3:f5b9:e9e5:4b1c:331b:29f3:97c1:c18f\n\
    221.245.9.91\n37e3:498f:44d8:c471:3ba3:9902:17e7:2be8\n135.84.251.52\n...\n```\n\
    \n`grep` enables you to determine how many access events to the web server have\
    \ been made via IPv4 or IPv6:\n\n```\n$ cut -d ' ' -f 1 access.log | grep ':'\
    \ | wc -l    # IPv6\n65405\n$ cut -d ' ' -f 1 access.log | grep -v ':' | wc -l\
    \  # IPv4\n107202\n```\n\nAn ordered list of all IPv4 addresses is provided by\
    \ `sort` and `uniq`:\n\n```\n$ cut -d ' ' -f 1 access.log | grep -v ':' | sort\
    \ | uniq\n\n0.117.133.93\n0.125.223.169\n0.164.206.211\n...\n```\n\nWhile some\
    \ IP addresses appear only once in the log, others appear quite frequently. `sort`\
    \ sorts all IP addresses, `uniq -c` counts the addresses, `sort -n -r` sorts their\
    \ frequency in decreasing order, and `head -n 5` finally extracts the top 5 results:\n\
    \n```\n$ cut -d ' ' -f 1 access.log | sort | uniq -c | sort -n -r | \\\n  head\
    \ -n 5\n\n6166 65d3:f5b9:e9e5:4b1c:331b:29f3:97c1:c18f\n6048 3547:0b26:4c84:4411:0f66:945e:7741:d887\n\
    5136 186.107.89.128\n4620 d741:a4ea:f6e1:6a17:78b1:1694:f518:c480\n2362 168.81.233.22\n\
    ```\n\n### 8.4.2 Identifying Popular Pages\n\nIn the combined format, the request\
    \ data is enclosed in quotation marks. Using `cut -d '\"'`, you can separate the\
    \ requests from the rest of the data:\n\n```\n$ cut -d '\"' -f 2 access.log |\
    \ less\n```\n\n```\nPOST /consumer/technology HTTP/1.1\nGET /explain/out HTTP/1.1\n\
    GET /by/financial/within/benefit HTTP/1.1\nGET /action/but HTTP/1.1\n...\n```\n\
    \nWe are only interested in the GET requests and only in the address:\n\n```\n\
    $ cut -d '\"' -f 2 access.log | grep GET | cut -d ' ' -f 2 | less\n```\n\n```\n\
    /explain/out\n/by/financial/within/benefit\n/action/but\n/place/paper\n...\n```\n\
    \nThe proven combination of `sort`, `uniq -c`, and again `sort` determines the\
    \ most popular URLs:\n\n```\n$ cut -d '\"' -f 2 access.log | grep GET | cut -d\
    \ ' ' -f 2 | \\\nsort | uniq -c | sort -n -r | head\n```\n\n```\n25423 /explain/out\n\
    5822 /international/hundred/can\n4979 /goal/Congress/short/peace\n4874 /rate/victim/detail\n\
    ...\n```\n\nIf you apply this command to the original logging file (which I unfortunately\
    \ can't share), you'll get the following result:\n\n```\n$ cut -d '\"' -f 2 access.log.orig\
    \ | grep GET | \\\ncut -d ' ' -f 2 | sort | uniq -c | sort -n -r | head\n```\n\
    \n```\n25424 /feed/\n5822 /\n4979 /wp-content/plugins/wp-spamshield/js/jscripts-ftr2-min.js\n\
    4874 /favicon.ico\n4347 /blog/feed/\n3352 /wp-content/uploads/fonts/49ff7721659f0bc7d77a59e1de422e07/font.css?v=1664309579\n\
    3328 /wp-content/themes/twentyfourteen/genericons/genericons.css?ver=3.0.3\n...\n\
    ```\n\nThus, the web server hosts a WordPress website. The most frequent access\
    \ concerns the feed page, the home page (/), the spam protection plugin, the website\
    \ icon, and another feed page.\n\n## 8.5 CSV Files\n\nCSV is a text format where\
    \ the columns are separated by commas. Other country-specific separators are also\
    \ used, for instance, the semicolon in German-speaking countries. This separator\
    \ helps to clearly differentiate between columns and the decimal part of numbers.\
    \ Basically, any separator is allowed, including the colon or tab character (\\\
    t).\n\nThe analysis of CSV files becomes much more complicated if the separator\
    \ character can also occur *within* the columns. The column contents are then\
    \ enclosed in quotes, usually with ' or \".\n\nThe starting point for the following\
    \ examples is the *2023_population.csv* file from *https://www.kaggle.com/datasets/rsrishav/world-population*.\
    \ This file contains data on the population of various countries of the world\
    \ and has the following structure:\n\n```\niso_code,country,2023_last_updated,2022_population,area_sq_km,\n\
    land_area_sq_km,density_/sq_km,growth_rate,world_%,rank,un_member\n\nIND,India,\"\
    1,433,381,860\",\"1,417,173,173\",3.3M,3M,481,0.81%,17.85%,1,IND\n\nCHN,China,\"\
    1,425,542,952\",\"1,425,887,337\",9.7M,9.4M,151,-0.02%,17.81%,2,CHN\n\n...\n```\n\
    \nThe `cut` command for column extraction is overwhelmed with this data. If you\
    \ want to use Bash, you can install the `csvkit`. This collection of commands\
    \ helps with processing CSV files (see *https://csvkit.readthedocs.io*). In this\
    \ section, however, I will instead briefly describe the CSV features of Python\
    \ and PowerShell.\n\n### 8.5.1 Processing CSV Files Using Python\n\nIn a Python\
    \ script, you can read CSV data line by line from a text file (in the simplest\
    \ cases) and then split the lines into its columns using `split`. The following\
    \ script analyzes the `access.log` file from Section 8.4 and determines the most\
    \ frequent IP addresses. Unlike the equivalent Bash commands, the Python script\
    \ is more efficient, especially with large log files, because there is no need\
    \ to sort all the IP addresses.\n\n```\n# Sample file analyze-access-log.py\n\
    counters = {}  # dictionary with counters for all IP addresses\n\n# loop through\
    \ all lines of access.log\nwith open('access.log') as f:\n    for line in f:\n\
    \        # the IP address is in the first column\n        ip = line.split()[0]\n\
    \        if ip in counters:\n            counters[ip] += 1\n        else:\n  \
    \          counters[ip] = 1\n\n# create ordered list of dictionary elements;\n\
    # each list element is itself a list: [ip, cnt]\nsortedIps = sorted(counters.items(),\n\
    \                   key = lambda x: x[1], reverse = True)\n\n# show top 5 IP addresses\n\
    for i in range(5):\n    print('%6d: %s' % (sortedIps[i][1], sortedIps[i][0]))\n\
    ```\n\nHowever, the `split` method used in this case to extract the columns fails\
    \ with complex CSV files like `2023_population.csv`. To read such complex files,\
    \ the best approach is to use the `csv` module. The following listing shows a\
    \ simple application of this module:\n\n```\n# Sample file analyze-population.py\n\
    import csv\ntotal = 0\nwith open('2022_population.csv', newline = '') as f:\n\
    \    reader = csv.reader(f, delimiter = ',', quotechar = '\"')\n    next(reader)\
    \            # skip column labels\n    for columns in reader:  # read line by\
    \ line, columns contains\n        print(columns)      # list with columns\n  \
    \      total += int(columns[2].replace(',', ''))\n\nprint(\"Earth population:\"\
    , total)\n```"
  mdcn: "## 8.4 示例：Apache 日志分析\n\n本示例的起点是一个 Apache Web 服务器的日志文件，该文件采用所谓的*组合日志*格式。该文件的前几行如下所示（因篇幅原因在此处换行）：\n\
    \n```\n65d3:f5b9:e9e5:4b1c:331b:29f3:97c1:c18f - - [05/Feb/2023:00:00:22 +0100]\n\
    \"POST /consumer/technology HTTP/1.1\" 200 5166\n\"https://example.com/land/raise/authority/him\"\
    \n\"WordPress/6.1.1; https://example.com\"\n\n221.245.9.91 - - [05/Feb/2023:00:00:21\
    \ +0100] \"GET /explain/out HTTP/1.1\"\n200 31222 \"https://example.com/add/maybe/person\"\
    \n\"FreshRSS/1.20.2 (Linux; https://freshrss.org)\"\n\n37e3:498f:44d8:c471:3ba3:9902:17e7:2be8\
    \ - -\n[05/Feb/2023:00:00:24 +0100]\n\"GET /by/financial/within/benefit HTTP/1.1\"\
    \ 200 97598\n\"https://example.com/defense/friend/race/protect\"\n\"Mozilla/5.0\
    \ (iPhone; CPU iPhone OS 16_3 like Mac OS X)\nAppleWebKit/605.1.15 (KHTML, like\
    \ Gecko) Version/16.3\nMobile/15E148 Safari/604.1\"\n```\n\n该文件的各列分别表示：发起请求的 IP\
    \ 地址、发起请求的用户（如果已知）、请求类型（GET、POST 等）、请求的 Web 服务器地址、返回的 HTTP 代码（例如 200 \"OK\"）、传输的数据量、触发请求的来源页面（引用地址）以及使用的客户端。\n\
    \n要重现以下示例，你需要使用示例文件中的 *access.log* 文件。*wc* 命令显示该文件包含超过 170,000 行。\n\n```\n$ wc\
    \ -l access.log\n\n172607 access.log\n```\n\n> **匿名化数据**\n\n*access.log.gz* 是一个真实的日志文件，出于隐私原因已进行匿名化处理。所有\
    \ IP 地址、URL 和用户名均已替换为随机数据。此匿名化操作当然也是通过脚本完成的。如果你对代码感兴趣，可以查看 *anonymize-log.py*，该脚本大量使用了正则表达式。如果你能访问自己\
    \ Web 服务器的“真实”日志文件，应该使用那些文件。\n\n### 8.4.1 提取 IP 地址\n\n你可以使用 `cut` 从日志文件中提取 IP\
    \ 地址：\n\n```\n$ cut -d ' ' -f 1 access.log | less\n\n65d3:f5b9:e9e5:4b1c:331b:29f3:97c1:c18f\n\
    221.245.9.91\n37e3:498f:44d8:c471:3ba3:9902:17e7:2be8\n135.84.251.52\n...\n```\n\
    \n`grep` 可以让你确定有多少访问事件是通过 IPv4 或 IPv6 发起的：\n\n```\n$ cut -d ' ' -f 1 access.log\
    \ | grep ':' | wc -l    # IPv6\n65405\n$ cut -d ' ' -f 1 access.log | grep -v\
    \ ':' | wc -l  # IPv4\n107202\n```\n\n`sort` 和 `uniq` 提供了所有 IPv4 地址的有序列表：\n\n\
    ```\n$ cut -d ' ' -f 1 access.log | grep -v ':' | sort | uniq\n\n0.117.133.93\n\
    0.125.223.169\n0.164.206.211\n...\n```\n\n虽然有些 IP 地址在日志中只出现一次，但其他地址出现得相当频繁。`sort`\
    \ 对所有 IP 地址进行排序，`uniq -c` 统计地址出现次数，`sort -n -r` 按降序排列其频率，最后 `head -n 5` 提取前 5\
    \ 个结果：\n\n```\n$ cut -d ' ' -f 1 access.log | sort | uniq -c | sort -n -r | \\\
    \n  head -n 5\n\n6166 65d3:f5b9:e9e5:4b1c:331b:29f3:97c1:c18f\n6048 3547:0b26:4c84:4411:0f66:945e:7741:d887\n\
    5136 186.107.89.128\n4620 d741:a4ea:f6e1:6a17:78b1:1694:f518:c480\n2362 168.81.233.22\n\
    ```\n\n### 8.4.2 识别热门页面\n\n在组合格式中，请求数据包含在引号内。使用 `cut -d '\"'`，你可以将请求与其余数据分开：\n\
    \n```\n$ cut -d '\"' -f 2 access.log | less\n```\n\n```\nPOST /consumer/technology\
    \ HTTP/1.1\nGET /explain/out HTTP/1.1\nGET /by/financial/within/benefit HTTP/1.1\n\
    GET /action/but HTTP/1.1\n...\n```\n\n我们只对 GET 请求感兴趣，并且只关心地址：\n\n```\n$ cut -d\
    \ '\"' -f 2 access.log | grep GET | cut -d ' ' -f 2 | less\n```\n\n```\n/explain/out\n\
    /by/financial/within/benefit\n/action/but\n/place/paper\n...\n```\n\n经过验证的 `sort`、`uniq\
    \ -c` 和再次 `sort` 的组合可以确定最热门的 URL：\n\n```\n$ cut -d '\"' -f 2 access.log | grep\
    \ GET | cut -d ' ' -f 2 | \\\nsort | uniq -c | sort -n -r | head\n```\n\n```\n\
    25423 /explain/out\n5822 /international/hundred/can\n4979 /goal/Congress/short/peace\n\
    4874 /rate/victim/detail\n...\n```\n\n如果你将此命令应用于原始日志文件（很遗憾我无法分享），你将得到以下结果：\n\n\
    ```\n$ cut -d '\"' -f 2 access.log.orig | grep GET | \\\ncut -d ' ' -f 2 | sort\
    \ | uniq -c | sort -n -r | head\n```\n\n```\n25424 /feed/\n5822 /\n4979 /wp-content/plugins/wp-spamshield/js/jscripts-ftr2-min.js\n\
    4874 /favicon.ico\n4347 /blog/feed/\n3352 /wp-content/uploads/fonts/49ff7721659f0bc7d77a59e1de422e07/font.css?v=1664309579\n\
    3328 /wp-content/themes/twentyfourteen/genericons/genericons.css?ver=3.0.3\n...\n\
    ```\n\n因此，该 Web 服务器托管了一个 WordPress 网站。最频繁的访问涉及 feed 页面、主页 (/)、垃圾邮件防护插件、网站图标以及另一个\
    \ feed 页面。\n\n## 8.5 CSV 文件\n\nCSV 是一种文本格式，其中各列由逗号分隔。也使用其他特定国家/地区的分隔符，例如德语国家/地区使用分号。此分隔符有助于清晰地区分各列和数字的小数部分。基本上，允许使用任何分隔符，包括冒号或制表符\
    \ (\\t)。\n\n如果分隔符也可能出现在列*内部*，则 CSV 文件的分析会变得复杂得多。此时，列内容会用引号括起来，通常使用 ' 或 \"。\n\n\
    以下示例的起点是来自 *https://www.kaggle.com/datasets/rsrishav/world-population* 的 *2023_population.csv*\
    \ 文件。该文件包含世界各国的人口数据，结构如下：\n\n```\niso_code,country,2023_last_updated,2022_population,area_sq_km,\n\
    land_area_sq_km,density_/sq_km,growth_rate,world_%,rank,un_member\n\nIND,India,\"\
    1,433,381,860\",\"1,417,173,173\",3.3M,3M,481,0.81%,17.85%,1,IND\n\nCHN,China,\"\
    1,425,542,952\",\"1,425,887,337\",9.7M,9.4M,151,-0.02%,17.81%,2,CHN\n\n...\n```\n\
    \n用于列提取的 `cut` 命令对此数据无能为力。如果你想使用 Bash，可以安装 `csvkit`。这个命令集合有助于处理 CSV 文件（参见 *https://csvkit.readthedocs.io*）。然而，在本节中，我将简要介绍\
    \ Python 和 PowerShell 的 CSV 功能。\n\n### 8.5.1 使用 Python 处理 CSV 文件\n\n在 Python 脚本中，你可以从文本文件中逐行读取\
    \ CSV 数据（在最简单的情况下），然后使用 `split` 将行拆分为各列。以下脚本分析第 8.4 节中的 `access.log` 文件，并确定最频繁的\
    \ IP 地址。与等效的 Bash 命令相比，Python 脚本更高效，尤其是在处理大型日志文件时，因为无需对所有 IP 地址进行排序。\n\n```\n\
    # 示例文件 analyze-access-log.py\ncounters = {}  # 用于统计所有 IP 地址的字典\n\n# 遍历 access.log\
    \ 的所有行\nwith open('access.log') as f:\n    for line in f:\n        # IP 地址在第一列\n\
    \        ip = line.split()[0]\n        if ip in counters:\n            counters[ip]\
    \ += 1\n        else:\n            counters[ip] = 1\n\n# 创建字典元素的有序列表；\n# 每个列表元素本身是一个列表：[ip,\
    \ cnt]\nsortedIps = sorted(counters.items(),\n                   key = lambda\
    \ x: x[1], reverse = True)\n\n# 显示前 5 个 IP 地址\nfor i in range(5):\n    print('%6d:\
    \ %s' % (sortedIps[i][1], sortedIps[i][0]))\n```\n\n然而，此处用于提取列的 `split` 方法在处理像\
    \ `2023_population.csv` 这样的复杂 CSV 文件时会失败。要读取此类复杂文件，最好的方法是使用 `csv` 模块。以下代码清单展示了该模块的一个简单应用：\n\
    \n```\n# 示例文件 analyze-population.py\nimport csv\ntotal = 0\nwith open('2022_population.csv',\
    \ newline = '') as f:\n    reader = csv.reader(f, delimiter = ',', quotechar =\
    \ '\"')\n    next(reader)            # 跳过列标签\n    for columns in reader:  # 逐行读取，columns\
    \ 包含\n        print(columns)      # 包含各列的列表\n        total += int(columns[2].replace(',',\
    \ ''))\n\nprint(\"地球人口:\", total)\n```"
