    # 4.2 Windows Terminal


    In the introduction to this section, I asked you to run a terminal to find out
    the PowerShell version. This instruction may have seemed contradictory to you.
    So, what is the difference between PowerShell and Terminal, and how are the two
    programs related?


    The terminal is a program that can run different shells. Windows-compatible shells
    include the deprecated command prompt (*cmd.exe*), Windows PowerShell 5.*n*, PowerShell
    7.*n*, Azure Shell, and Git Bash as well as Linux’s Bash via the *Windows Subsystem
    for Linux (WSL)*.


