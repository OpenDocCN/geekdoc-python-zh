    \ code would work:\n\n```\n$ mysqldump dbname > backup.sql    # Create backup\n\
    $ mysql dbname  < backup.sql      # Restore database\n```\n\nIn PowerShell, only\
    \ the first command works, not the second. However, a workaround exists for this\
    \ problem. For this purpose, run `Get-Content` to output the contents of the `backup.sql`\
    \ file. Then, redirect this output to `mysql` by using `|`, as in the following\
    \ example:\n\n```\n> Get-Content backup.sql | mysql dbname\n```\n\n# 4.9 Loops\n\
    \nOften, you need to process several elements one after the other in a script,\
    \ such as each line of a text file, each file of a directory, and so on. Loops,\
    \ which are available in several syntax variants in PowerShell, can help you with\
    \ this process. In practice, the most important loop is `foreach($item in $data)`.\
    \ This loop inserts all elements from `$data` (i.e., a variable with an array\
    \ or other enumeration) in sequence into the `$item` loop variable and processes\
    \ them. In the following example, the string in `$Text` is split into words by\
    \ using `Split`. These words are then output in a loop on the screen.\n\n```\n\
    > $Text = \"I love PowerShell!\"\n\n> foreach ($Word in $Text.Split(\" \")) {\n\
    \    $Word\n  }\n\nI\nlove\nPowerShell!\n```"
- md: "## 4.9.1 ForEach-Object\n\nWith `ForEach-Object`, PowerShell provides an alternative\
    \ approach. The main difference is that `ForEach-Object` expects the objects to\
    \ be processed as input. This expectation makes the command particularly suitable\
    \ for pipes. Within the loop construct, you can access the currently active object\
    \ via `$_`. The following loop is equivalent to the previous example:\n\n```\n\
    $Text.Split(\" \") | ForEach-Object { $_ }\n```\n\nIf you want to output the length\
    \ of all words, you should use the following code:\n\n```\n> $Text.Split(\" \"\
    ) | % { Write-Host $_.Length }\n1\n4\n11\n```\n\nFor this relatively common case\
    \ (i.e., the application of a property or a method to the loop variable), there\
    \ is a short notation available:\n\n```\n> $Text.Split(\" \") | ForEach-Object\
    \ Length\n1\n4\n11\n```\n\nFinally, because the `ForEach-Object` keyword is needed\
    \ so often, it can be shortened even further using `%`:\n\n```\n> $Text.Split(\"\
    \ \") | % ToUpper()\nI\nLOVE\nPOWERSHELL!\n```\n\nWhen you combine `ForEach-Object`\
    \ with the `-Parallel` option, it runs the statements in the loop (that is, the\
    \ code between the curly brackets) in parallel threads. This approach can save\
    \ a lot of time on powerful computers with many CPU cores. This parallel processing\
    \ is the case in the following example: `Get-ChildItem` determines all `*.bmp`\
    \ files in the current directory. `Compress-Archive` compresses each image into\
    \ a file named `<filename.bmp>.zip`.\n\n```\n> Get-ChildItem *.bmp | ForEach-Object\
    \ -Parallel {\n    Compress-Archive -DestinationPath \"$_.zip\" $_\n}\n```\n\n\
    ## 4.9.2 for, while, do-while, and do-until\n\nPowerShell also uses the loop constructs\
    \ known from other programming languages, namely, `for`, `while`, `do-while`,\
    \ and `do-until`. This kind of looping is rather uncommon in shell scripts, which\
    \ is why I only provide a short example of each without further explanation. If\
    \ necessary, you can refer to the documentation.\n\n```\n> for ($i=0; $i -lt 5;\
    \ $i++) { $i }\n\n# Output: 0, 1, ..., 4\n\n> $i=0\n> while ($i -lt 5) {\n   \
    \ Write-Host $i\n    $i++\n}\n# Output again: 0, 1, ..., 4\n\n> $i=0\n> do {\n\
    \    Write-Host $i\n    $i++\n} while ($i -lt 5)\n# Output again: 0, 1, ..., 4\n\
    \n> $i=0\n> do {\n    Write-Host $i\n    $i++\n} until ($i -eq 5)\n# Output yet\
    \ again: 0, 1, ..., 4\n```\n\n## 4.10 Branches\n\nA common scenario is that you\
    \ want to execute code only when a certain condition is met. Depending on the\
    \ state of a variable, different branches of your code should be executed. The\
    \ easiest way to create branches is to use an `if-elseif-else` statement. Any\
    \ number of `elseif` blocks are allowed. Both `elseif` and `else` are optional.\n\
    \n```\nif (condition1) {\n    statements\n} elseif (condition2) {\n    statements\n\
    } else {\n    statements\n}\n```\n\n## Blank Character\n\nThe notations `if(condition)`\
    \ and `if (condition)` are both syntactically valid. The more common and more\
    \ readable version is the one that uses a space before the parentheses. This advice\
    \ also applies to `for`, `foreach`, `while`, `until`, and so on.\nNote, however,\
    \ that for functions and methods you cannot have a space between the names and\
    \ the opening parenthesis!\n\nThe following sample script first uses `Get-CimInstance`\
    \ to create an array of `Win32_LogicalDisk` objects that describe the file systems\
    \ of the current computer. The CIM standard helps you manage IT resources and\
    \ is supported by Microsoft through the WMI API. In our example, we are only interested\
    \ in type 3 disks (*local disks*). For each file system on a hard disk or SSD,\
    \ the script calculates the free space as a percent and in gigabytes.\n\n```\n\
    # Sample file Get-DiskFree.ps1\n$Drives = Get-CimInstance -ClassName Win32_LogicalDisk\n\
    foreach ($Drive in $Drives) {\n    if ($Drive.DriveType -eq 3) {\n        $PercentageFree\
    \ = 1.0 * $Drive.FreeSpace / $Drive.Size\n        $GBFree = $Drive.FreeSpace /\
    \ 1000000000\n        \"{0:S} {1:P1}  / {2,5:F0} GB free\" -f `\n            $Drive.DeviceId,\
    \ $PercentageFree, $GBFree\n    }\n}\n```\n\nTo format the output, the script\
    \ uses the `-f` format operator, in the following structure:\n`\"format code\"\
    \ -f value1, value2, value3, ...`\n\nThe string with the formatting statements\
    \ is followed by the `-f` operator and then an array of values to be processed.\
    \ Within the formatting string, `{0}` is replaced by the first value, `{1}` by\
    \ the second value, and so on. The number can be followed by other formatting\
    \ codes. In this example, I have used the following codes:\n\n- `{0:S}`: Output\
    \ the first value of the following array unchanged as a string\n- `{1:P1}`: Format\
    \ the second value as a percentage with one decimal place\n- `{2,5:F0}`: Output\
    \ third value as a float without decimal places (F0) right-aligned with five digits\n\
    \nYou can find good documentation on the allowed format codes, which PowerShell\
    \ inherits from the .NET framework like so much else, at [https://docs.microsoft.com/en-us/dotnet/standard/base-types/standard-numeric-format-strings](https://docs.microsoft.com/en-us/dotnet/standard/base-types/standard-numeric-format-strings).\n\
    The script then returns the following output, for example:\n\n```\n> .\\Get-DiskFree.ps1\n\
    \nC: 84.2 % / 180 GB free\nF: 98.3 % / 15 GB free\n```\n\nThis script was supposed\
    \ to illustrate the use of `if`. However, I will not hide from you that this code\
    \ can also be formulated quite differently. In the following lines, `Where-Object`\
    \ filters out the desired file systems from the array. `ForEach` processes the\
    \ remaining results, accessing the current element through `$_` instead of the\
    \ loop variable `$Drive`. If you are familiar with functional programming—no matter\
    \ which language—this solution will probably look more elegant to you:\n\n```\n\
    $Drives = Get-CimInstance -ClassName Win32_LogicalDisk\n$Drives | Where-Object\
    \ -Property DriveType -eq 3 | ForEach {\n    $PercentageFree = 1.0 * $_.FreeSpace\
    \ / $_.Size\n    $GBFree = $_.FreeSpace / 1000000000\n    \"{0:S} {1:P1} / {2,5:F0}\
    \ GB free\" -f `\n        $_.DeviceId, $PercentageFree, $GBFree\n}\n```\n\n##\
    \ 4.10.1 Case Distinctions Using switch\n\n`switch` can replace multiple `if`\
    \ statements if different cases are to be processed for an expression. The following\
    \ syntax is used in the simplest case:\n\n```\n$option = \"b\"\nswitch ($option)\
    \ {\n    \"A\"     { Write-Output \"Option A\" }\n    \"B\"     { Write-Output\
    \ \"Option B\" }\n    \"C\"     { Write-Output \"Option C\" }\n    default { Write-Output\
    \ \"Invalid\" }\n}\n```\n\nNote that string comparisons in this context are not\
    \ case sensitive, as usual.\n\n## 4.11 Functions and Parameters\n\nFunctions provide\
    \ the option to bundle multiple PowerShell commands, which facilitates organizing\
    \ extensive scripts. In its simplest form, a function has the following structure:\n\
    \n```\nfunction Do-Something {\n    command1\n    command2\n    ...\n}\n```\n\n\
    Within a script, functions can only be used *after* they have been defined. Thus,\
    \ a script file first contains all the functions, while the code that is ultimately\
    \ to be executed is located at the end.\n\n> **Naming Rules**\n\nThe PowerShell\
    \ documentation recommends naming custom functions, such as cmdlets, according\
    \ to the *verb-noun* pattern. The hyphen required in the name, like almost any\
    \ other character, can be used without special marking.\n\n## 4.11.1 Function\
    \ Results\n\nWhat is unusual compared to “real” programming languages is the structure\
    \ of the return value of a function in PowerShell: The result is obtained from\
    \ all the outputs created in the function! All partial results caused by the commands\
    \ within the function are returned collectively. Statements whose results end\
    \ up in variables are not taken into account.\n\nFor example, when the following\
    \ three statements are run within the function, the function result is an array\
    \ formed by the result of `command1`, the \"lorem ipsum\" string, and the result\
    \ of `command2`:\n\n```\ncommand1\ncommand2\nWrite-Output \"lorem ipsum\"\n# Result:\
    \ Array with the partial results from command1 and\n# command2 and a string\n\
    ```\n\nIn the second example, only `$a + $b`, which is a number, causes output\
    \ to the success stream:\n\n```\n$a = 123\n$b = command    # command returns 456\
    \ as the result\n$a + $b\n# Result: integer number 579\n```\n\nAdditionally, three\
    \ statements are executed in the third example. But because the results of `command1`\
    \ and `command2` are stored in variables, and because `Write-Debug` does not write\
    \ to the success stream, no result is produced!\n\n```\n$a = command1\nWrite-Debug\
    \ \"lorem ipsum\"\n$b = command2\n# no result (therefore $null)\n```"
  mdcn: "## 4.9.1 ForEach-Object\n\nPowerShell 提供了 `ForEach-Object` 作为另一种处理方式。其主要区别在于，`ForEach-Object`\
    \ 期望将要处理的对象作为输入。这种特性使其特别适合用于管道。在循环结构内，你可以通过 `$_` 访问当前活动的对象。以下循环等同于前面的示例：\n\n```\n\
    $Text.Split(\" \") | ForEach-Object { $_ }\n```\n\n如果你想输出所有单词的长度，应该使用以下代码：\n\n\
    ```\n> $Text.Split(\" \") | % { Write-Host $_.Length }\n1\n4\n11\n```\n\n对于这种相对常见的情况（即对循环变量应用属性或方法），可以使用简写形式：\n\
    \n```\n> $Text.Split(\" \") | ForEach-Object Length\n1\n4\n11\n```\n\n最后，由于 `ForEach-Object`\
    \ 关键字使用频率很高，可以进一步缩写为 `%`：\n\n```\n> $Text.Split(\" \") | % ToUpper()\nI\nLOVE\n\
    POWERSHELL!\n```\n\n当你将 `ForEach-Object` 与 `-Parallel` 选项结合使用时，它会在并行线程中运行循环中的语句（即花括号之间的代码）。在拥有多个\
    \ CPU 核心的强大计算机上，这种方法可以节省大量时间。以下示例展示了这种并行处理：`Get-ChildItem` 确定当前目录中的所有 `*.bmp`\
    \ 文件。`Compress-Archive` 将每张图片压缩为一个名为 `<文件名.bmp>.zip` 的文件。\n\n```\n> Get-ChildItem\
    \ *.bmp | ForEach-Object -Parallel {\n    Compress-Archive -DestinationPath \"\
    $_.zip\" $_\n}\n```\n\n## 4.9.2 for、while、do-while 和 do-until\n\nPowerShell 也使用其他编程语言中常见的循环结构，即\
    \ `for`、`while`、`do-while` 和 `do-until`。这种循环在 shell 脚本中并不常见，因此我只提供每个的简短示例，不做进一步解释。如有需要，可以参考文档。\n\
    \n```\n> for ($i=0; $i -lt 5; $i++) { $i }\n\n# 输出：0, 1, ..., 4\n\n> $i=0\n> while\
    \ ($i -lt 5) {\n    Write-Host $i\n    $i++\n}\n# 再次输出：0, 1, ..., 4\n\n> $i=0\n\
    > do {\n    Write-Host $i\n    $i++\n} while ($i -lt 5)\n# 再次输出：0, 1, ..., 4\n\
    \n> $i=0\n> do {\n    Write-Host $i\n    $i++\n} until ($i -eq 5)\n# 再次输出：0, 1,\
    \ ..., 4\n```\n\n## 4.10 分支\n\n一个常见场景是，你只想在满足特定条件时执行代码。根据变量的状态，应该执行代码的不同分支。创建分支最简单的方法是使用\
    \ `if-elseif-else` 语句。允许使用任意数量的 `elseif` 块。`elseif` 和 `else` 都是可选的。\n\n```\nif\
    \ (条件1) {\n    语句\n} elseif (条件2) {\n    语句\n} else {\n    语句\n}\n```\n\n## 空格字符\n\
    \n`if(条件)` 和 `if (条件)` 两种表示法在语法上都是有效的。更常见且更具可读性的版本是在括号前使用空格。此建议也适用于 `for`、`foreach`、`while`、`until`\
    \ 等。\n但请注意，对于函数和方法，名称和左括号之间不能有空格！\n\n以下示例脚本首先使用 `Get-CimInstance` 创建一个 `Win32_LogicalDisk`\
    \ 对象数组，这些对象描述了当前计算机的文件系统。CIM 标准帮助你管理 IT 资源，并通过 WMI API 得到 Microsoft 的支持。在我们的示例中，我们只对类型\
    \ 3 的磁盘（*本地磁盘*）感兴趣。对于硬盘或 SSD 上的每个文件系统，脚本计算可用空间的百分比和千兆字节数。\n\n```\n# 示例文件 Get-DiskFree.ps1\n\
    $Drives = Get-CimInstance -ClassName Win32_LogicalDisk\nforeach ($Drive in $Drives)\
    \ {\n    if ($Drive.DriveType -eq 3) {\n        $PercentageFree = 1.0 * $Drive.FreeSpace\
    \ / $Drive.Size\n        $GBFree = $Drive.FreeSpace / 1000000000\n        \"{0:S}\
    \ {1:P1}  / {2,5:F0} GB free\" -f `\n            $Drive.DeviceId, $PercentageFree,\
    \ $GBFree\n    }\n}\n```\n\n为了格式化输出，脚本使用了 `-f` 格式化运算符，结构如下：\n`\"格式代码\" -f 值1,\
    \ 值2, 值3, ...`\n\n包含格式化语句的字符串后跟 `-f` 运算符，然后是待处理的值数组。在格式化字符串中，`{0}` 被第一个值替换，`{1}`\
    \ 被第二个值替换，依此类推。数字后面可以跟其他格式化代码。在此示例中，我使用了以下代码：\n\n- `{0:S}`：将以下数组的第一个值作为字符串原样输出\n\
    - `{1:P1}`：将第二个值格式化为带一位小数的百分比\n- `{2,5:F0}`：将第三个值作为无小数位的浮点数（F0）右对齐，占五位数字\n\n你可以在\
    \ [https://docs.microsoft.com/en-us/dotnet/standard/base-types/standard-numeric-format-strings](https://docs.microsoft.com/en-us/dotnet/standard/base-types/standard-numeric-format-strings)\
    \ 找到关于允许的格式化代码的良好文档，PowerShell 与许多其他特性一样，从 .NET 框架继承了这些代码。\n然后脚本返回以下输出，例如：\n\n\
    ```\n> .\\Get-DiskFree.ps1\n\nC: 84.2 % / 180 GB free\nF: 98.3 % / 15 GB free\n\
    ```\n\n这个脚本本意是说明 `if` 的用法。然而，我不会向你隐瞒，这段代码也可以用完全不同的方式来编写。在下面的几行中，`Where-Object`\
    \ 从数组中过滤出所需的文件系统。`ForEach` 处理剩余的结果，通过 `$_` 访问当前元素，而不是循环变量 `$Drive`。如果你熟悉函数式编程——无论哪种语言——这个解决方案对你来说可能看起来更优雅：\n\
    \n```\n$Drives = Get-CimInstance -ClassName Win32_LogicalDisk\n$Drives | Where-Object\
    \ -Property DriveType -eq 3 | ForEach {\n    $PercentageFree = 1.0 * $_.FreeSpace\
    \ / $_.Size\n    $GBFree = $_.FreeSpace / 1000000000\n    \"{0:S} {1:P1} / {2,5:F0}\
    \ GB free\" -f `\n        $_.DeviceId, $PercentageFree, $GBFree\n}\n```\n\n##\
    \ 4.10.1 使用 switch 进行区分\n\n如果需要对表达式处理不同的情况，`switch` 可以替代多个 `if` 语句。在最简单的情况下使用以下语法：\n\
    \n```\n$option = \"b\"\nswitch ($option) {\n    \"A\"     { Write-Output \"选项\
    \ A\" }\n    \"B\"     { Write-Output \"选项 B\" }\n    \"C\"     { Write-Output\
    \ \"选项 C\" }\n    default { Write-Output \"无效\" }\n}\n```\n\n请注意，在此上下文中，字符串比较通常不区分大小写。\n\
    \n## 4.11 函数和参数\n\n函数提供了将多个 PowerShell 命令捆绑在一起的选项，这有助于组织复杂的脚本。在其最简单的形式中，函数具有以下结构：\n\
    \n```\nfunction 做某事 {\n    命令1\n    命令2\n    ...\n}\n```\n\n在脚本中，函数只能在定义*之后*使用。因此，脚本文件首先包含所有函数，而最终要执行的代码位于末尾。\n\
    \n> **命名规则**\n\nPowerShell 文档建议按照 *动词-名词* 模式命名自定义函数，例如 cmdlet。名称中必需的连字符，与几乎所有其他字符一样，可以在不使用特殊标记的情况下使用。\n\
    \n## 4.11.1 函数结果\n\n与“真正的”编程语言相比，不同寻常的是 PowerShell 中函数返回值的结构：结果是从函数中创建的所有输出中获取的！函数内命令引起的所有部分结果都会被集体返回。结果存入变量的语句不被考虑在内。\n\
    \n例如，当在函数内运行以下三条语句时，函数结果是由 `command1` 的结果、\"lorem ipsum\" 字符串和 `command2` 的结果组成的数组：\n\
    \n```\ncommand1\ncommand2\nWrite-Output \"lorem ipsum\"\n# 结果：包含来自 command1 和\
    \ command2 的部分结果以及一个字符串的数组\n```\n\n在第二个示例中，只有 `$a + $b`（一个数字）导致输出到成功流：\n\n```\n\
    $a = 123\n$b = command    # command 返回 456 作为结果\n$a + $b\n# 结果：整数 579\n```\n\n\
    此外，在第三个示例中执行了三条语句。但由于 `command1` 和 `command2` 的结果存储在变量中，并且 `Write-Debug` 不写入成功流，因此没有产生结果！\n\
    \n```\n$a = command1\nWrite-Debug \"lorem ipsum\"\n$b = command2\n# 无结果（因此为 $null）\n\
    ```"
