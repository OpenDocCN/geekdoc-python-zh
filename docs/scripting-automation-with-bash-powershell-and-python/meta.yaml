  md: "# 5.15 Error Protection\n\nWhen errors occur, like many modern programming\
    \ languages, Python throws an exception. If your program does not provide protection\
    \ against such exceptions, you'll end up with a nasty error message. You can avoid\
    \ this if you secure your code by using try/except.\n\n# 5.15.1 try/except\n\n\
    The syntax for try/except is simple:\n\n```\ntry:\n    # error prone code\nexcept\
    \ someError:\n    # response to a specific error\nexcept:\n    # response to all\
    \ other errors\nfinally:\n    # is always executed\n```\n\nNote that try must\
    \ be followed by at least one except or finally block. All other parts of the\
    \ try construct are optional. When an error occurs, Python looks for the first\
    \ except statement that applies to the error. Using except without an error name\
    \ is considered the default statement that applies to any type of error.\n\nIf\
    \ an applicable except block exists, the code specified there will be executed.\
    \ Then, the error is considered to be resolved. The program continues below the\
    \ try construct.\n\nCode within the finally block is always executed, even if\
    \ the try construct is in a loop or function that you terminate prematurely using\
    \ break or return. finally is the right place for cleaning up.\n\nIf you formulate\
    \ the except statement as except xxxError as e, then e contains an exception object.\
    \ In its evaluation, e.args is of particular interest as it will give you a tuple\
    \ with all the parameters that were passed when the error was triggered. When\
    \ an exception object is converted to a string—either explicitly via str(e) or\
    \ implicitly in the print function—the contents of args are automatically converted\
    \ to a string.\n\n```\ntry:\n    n = 1 / 0\nexcept ZeroDivisionError as e:\n \
    \   print(e)  # Output: 'division by zero'\n```\n\n# 5.16 System Functions\n\n\
    This section focuses on some basic system functions, many of which are located\
    \ in the sys module, which must be included via import. Simply enter the following\
    \ command:\n\n```\nimport sys\n```"
