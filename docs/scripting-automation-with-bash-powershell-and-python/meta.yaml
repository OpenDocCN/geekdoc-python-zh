    The first time you establish an SSH connection to a new host, `ssh` asks if you
    trust the host. Normally, this query is useful. However, if you want to use `ssh`
    to perform automated work on multiple hosts or virtual machines, this query is
    interference. The solution in such cases is the `-oStrictHostKeyChecking=no` option.


