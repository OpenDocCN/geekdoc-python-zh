  md: '# 16.2.1 Installing and Trying Out ExifTool


    The best tool for analyzing Exif data is *ExifTool*. This package consists of
    a Perl library and the `exiftool` command. On Linux, you can install ExifTool
    from the package sources. The package name varies depending on the distribution.
    `exiftool -ver` then determines the version number.


    ```

    $ sudo apt install exiftool            (Debian, Ubuntu)

    $ sudo dnf install perl-Image-ExifTool (Fedora)

    $ sudo pacman -S perl-exiftool         (Arch Linux)


    $ exiftool -ver

    12.50

    ```


    Installation on Windows is a bit more tedious: At https://exiftool.org, you can
    find a ZIP file for download. However, that file does *not* contain any setup
    program. Instead, you must manually copy the `exiftool(-k).exe` file contained
    in the archive to a directory listed in the `PATH` variable. The easiest way is
    to use `C:\Windows` (which requires administrator rights, however). Then, you
    must rename the file to `exiftool.exe`.


    Microsoft Defender blocks the first attempt to run ExifTool on Windows because
    the publisher is unknown. Click **More information** and **Run anyway**. As a
    result, the startup succeeds without a problem, even from the terminal.


    You also must overcome some small hurdles on macOS: The DMG image contains a `*.pkg`
    file with an installer. However, the execution is blocked by macOS because the
    installer is not signed. You must open the **Privacy** module in the system settings.
    Then, click on **Open ExifTool n.n.pkg anyway**.


    Once the installation is done, using the `exiftool` command is quite simple: You
    can pass a filename and get a seemingly endless list of Exif values as a result:


    ```

    $ exiftool cimg2647.jpg


    ExifTool Version Number : 12.50

    File Name                : cimg2647.jpg

    ...

    Date/Time Original       : 2008:08:28 12:53:22

    ...

    Shutter Speed            : 1/250

    Circle Of Confusion      : 0.005 mm

    Field Of View            : 50.7 deg

    ```


    To sort the images by the date on which they were taken, only the `Date/Time Original`
    entry is relevant. The option of the same name, in combination with the desired
    format for the date (`-d`) and the `-s3` option (for *shortest*), reduces the
    output to the desired information:'
  merge: -1
  pgno: 379
- img_proc: true
  md: "```\n$ exiftool -d '%Y-%m' -s3 -DateTimeOriginal cimg2647.jpg\n\n2008-08\n\
    ```\n\nExif data can reveal a lot of information about the origin of the images.\
    \ ExifTool therefore provides the option to remove the Exif data from a file.\
    \ The recommended command is `exiftool -All= image.jpg`. This command removes\
    \ almost all metadata but leaves the APP14 Adobe block of color information. This\
    \ data block is necessary so that the colors of the image can be displayed correctly.\
    \ However, the data has no privacy relevance. Concerning deleting Exif data, we\
    \ also recommend reading the following post on the ExifTool forum: https://exiftool.org/forum/index.php?topic=13034.0.\n\
    \nExifTool has countless other options, which I will not go into here. Refer to\
    \ the manual, if necessary, at https://exiftool.org/exiftool_pod.html.\n\n# 16.2.2\
    \ Bash Example\n\nThe following lines show an implementation of the `sort` script\
    \ in Bash. The code should be understandable without further explanation.\n\n\
    ```\n# Sample file sort-photos.sh\n# loop through all filenames passed as parameters\n\
    for file in \"$@\"; do\n    yearmonth=$(exiftool -s3 -d '%Y-%m' -DateTimeOriginal\
    \ $file)\n    if [ $yearmonth ]; then\n        echo \"$file -> $yearmonth/\"\n\
    \        mkdir -p $yearmonth\n        mv \"$file\" $yearmonth/\n    fi\ndone\n\
    ```\n\nTo facilitate trying out the script, you'll find an archive with some small\
    \ photos in the sample files at https://rheinwerk-computing.com/5851.\n\n```\n\
    $ ./sort-photos.sh *.jpg\n\ncimg2372.jpg -> 2007-12/\ncimg2374.jpg -> 2007-12/\n\
    ```\n\nThe script ignores all files without Exif data or with missing recording\
    \ time and leaves them at the previous location. To test this process, `photos.zip`\
    \ contains some special cases: `z-empty.jpg` is simply an empty file (0 bytes).\
    \ `z-almost-no-metadata.jpeg` was taken with an iPhone, then downsized, and finally\
    \ stripped of almost all Exif data by using `exiftool -All=`. Then, `z-gimp-metadata.jpeg`\
    \ was inserted as a screenshot into the image processing program Gimp and then\
    \ saved. The file therefore contains only the metadata provided by Gimp for newly\
    \ created images."
  merge: -1
  pgno: 380
- img_proc: true
  md: "# 16.2.3 PowerShell Example\n\nThe code for the PowerShell implementation looks\
    \ almost the same as the one for the Bash script. The biggest difference is the\
    \ nested loop. This nested loop is required because PowerShell does not perform\
    \ globbing, that is, it does not convert patterns like *.jpg into a list of filenames.\
    \ You must do this step yourself!\n\nThe first loop runs through all parameters.\
    \ The second loop executes `Get-Item` for each parameter. With a filename like\
    \ `myimg.jpg`, `Get-Item` simply returns the file. If, on the other hand, an expression\
    \ was passed, then `Get-Item` returns the list of matching files. The two loops\
    \ ensure that a call of `.\\sort-images.ps1 *.jpg *.jpeg` is also processed correctly.\n\
    \n```\n# Sample file sort-images.ps1\n# loop through all parameters\nforeach ($arg\
    \ in $args) {\n    # loop through the Get-Item results\n    foreach ($file in\
    \ Get-Item $arg) {\n        $yearmonth = exiftool -s3 -d '%Y-%m' `\n         \
    \                   -DateTimeOriginal $file\n        if ($yearmonth) {\n     \
    \       Write-Output \"$($file.Name) -> $yearmonth/\"\n            $targetdir\
    \ = New-Item -ItemType Directory `\n                                  -Path $yearmonth\
    \ -Force\n            Move-Item $file $targetdir\n        }\n    }\n}\n```\n\n\
    > **Speed Problems**\n\nWhen it comes to sorting “only” a few hundred images,\
    \ the approach presented in this section is good enough. However, when dealing\
    \ with thousands of images, a more efficient approach is to use the scripting\
    \ features built into ExifTool, which requires a detailed study of the manual.\
    \ With ExifTool scripting, ExifTool needs to be started only once and not thousands\
    \ of times. This feature is crucial because ExifTool uses the Perl programming\
    \ language. Whenever ExifTool is started, a complex Perl environment needs to\
    \ be loaded. By starting ExifTool only once and then processing many commands\
    \ within the environment, a lot of time can be saved. You can find a code example\
    \ at https://exiftool.org/mistakes.html#M3.\n\n# 16.3 Converting Exif Metadata\
    \ to SQL Commands\n\nThe goal of the next example is to process a pool of photos\
    \ and enter the most important metadata of each image into a database. Among other\
    \ things, the name, file size,"
  merge: -1
  pgno: 381
- img_proc: true
  md: "modification date, and GPS coordinates should be saved. The somewhat higher\
    \ complexity of this task suggests the use of Python in this case.\n\n# 16.3.1\
    \ PyExifTool\n\nVarious Exif modules are available for Python. The *PyExifTool*\
    \ presented in this section uses the `exiftool` command. Thus, you must install\
    \ the ExifTool first (Section 16.2) and then run the following `pip` command:\n\
    \n```\n$ pip install pyexiftool    (Windows, new Linux distributions)\n$ pip3\
    \ install pyexiftool   (macOS, old Linux distributions)\n```\n\nThe following\
    \ listing shows the application of the module. `ExifToolHelper` establishes the\
    \ connection to the `exiftool` command. For efficiency reasons, this connection\
    \ will be maintained until it is no longer needed, so `exiftool` doesn't need\
    \ to be called again for each image. The `with` construct takes care of closing\
    \ the connection in any case, either at the end of the code block or when an error\
    \ occurs.\n\nNow, you can pass a list of filenames to the `get_metadata` method.\
    \ The method responds with a list of dictionaries, each dictionary containing\
    \ all the metadata available for that image. In the sample script, only a few\
    \ selected Exif parameters are read.\n\n```\n# Sample file hello-pyexiftool.py\n\
    # call: ./hello-pyexiftool.py file1.jpg file2.jpg\nimport exiftool, sys\nfilenames\
    \ = sys.argv[1:]\nkeys = ['SourceFile', 'EXIF:Model', 'EXIF:ExposureTime',\n \
    \       'EXIF:ISO', 'EXIF:DateTimeOriginal']\n\nwith exiftool.ExifToolHelper()\
    \ as exifhelper:\n    # returns a list with dictionaries, one dictionary for\n\
    \    # every filename\n    metadatalst = exifhelper.get_metadata(filenames)\n\
    \    # show selected EXIF elements for each photo\n    for metadata in metadatalst:\n\
    \        print()\n        for key in keys:\n            # does the key exist at\
    \ all?\n            if key in metadata:\n                print('%25s : %-30s'\
    \ % (key, metadata[key]))\n```\n\nThe following lines present a test run for two\
    \ files:\n\n```\n$ ./exif-to-sql.py IMG_3798.jpg IMG_3799.jpg\n\n        SourceFile\
    \ : IMG_3798.jpg\n        EXIF:Model : Canon IXUS 210\n```"
  merge: -1
  pgno: 382
- img_proc: true
  md: '```

    EXIF:ExposureTime : 0.0008

    EXIF:ISO : 100

    EXIF:DateTimeOriginal : 2012:11:03 08:44:32


    SourceFile : IMG_3799.jpg

    EXIF:Model : Canon IXUS 210

    EXIF:ExposureTime : 0.0008

    EXIF:ISO : 125

    EXIF:DateTimeOriginal : 2012:11:03 08:44:39

    ```


    Note that different Exif data is available depending on the smartphone or camera
    model. For this reason, you should always secure access to individual entries.
    (In the last code listing, this secure access is created via `if key in metadata`.)


    The `exifhelper.get_metadata(filenames)` statement in the last example unfortunately
    has its pitfalls, such as the following:


    +   - If even a single file contains incorrect Exif metadata or is missing entirely,
    then an `ExifToolExceptionError` will occur. The error makes it impossible to
    analyze the results of the remaining files.

    - A second problem is that `get_metadata` reads all metadata, even metadata you''re
    not interested in. Depending on the operating system (Windows!) the `charmap:
    codec can''t decode byte xxx in position nnn` error may occur. Apparently the
    PyExifTool chokes on UTF-8 strings in the metadata. In my tests, the error occurred
    only on Windows and only in PyExifTool, not when `exiftool` was called directly.


    In this respect, a better approach is to process each image file individually
    and to secure the analysis by using `try-except`. Also, instead of `get_metadata`,
    you should use the `get_tags` method, which processes only selected Exif keys.
    I will demonstrate this procedure in the next script, `exif-to-sql.py`.


    # 16.3.2 EXIF2SQL


    The first subtask of the `exif-to-sql.py` script is `globbing` (i.e., the analysis
    of patterns like `*.jpg`). On macOS and Linux, this step is not needed because,
    in those cases, the shell generates the corresponding list of files from `*.jpg`
    and passes it to the script.


    On Windows, on the other hand, the `*.jpg` parameter ends up unchanged in the
    parameters list. If the script determines that it is running on Windows by analyzing
    `platform.system()`, it must determine the appropriate filenames itself. This
    task is performed by the `glob` function from the module of the same name. The
    loop through `argv[1:]` ensures that globbing works correctly even if multiple
    file patterns are passed (so, for example, `\.\exif-to-sql.py *.jpg *.jpeg`).'
  merge: -1
  pgno: 383
- img_proc: true
  md: "The `keys` list is initialized with the names of all Exif parameters the script\
    \ is supposed to analyze. Note that you must use the two-part name structure of\
    \ PyExifTool. (ExifTool, on the other hand, uses shorter names without preceding\
    \ group names.)\n\nThe `sql` variable contains the SQL command to be run. `inspect.cleandoc`\
    \ removes the indentations from the multiline string. The `INSERT` command requires\
    \ that the database contain a corresponding table. I will show you how to set\
    \ up the table, if needed, in Chapter 19, Section 19.3.\n\n```\n# Sample file\
    \ exif-to-sql.py\nimport exiftool, inspect, platform, sys\nfrom glob import glob\n\
