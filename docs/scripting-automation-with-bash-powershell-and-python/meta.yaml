    \n## 9.2.4 练习页和速查表\n\n在你能够自信地使用正则表达式之前，你需要练习！有几个很棒的网站，你可以在那里解决一系列复杂度递增的练习——并附有解答和解释。只需在这些网站中的一个上投入一个小时——我保证这是值得的！\n\
