    entire directory strings if required (for the year 2023, therefore, first 2023
    and then 01, 02, etc.).


    The brace extension can also be used to create loops, with `i` being a variable
    in this case. Basic principles about variables and loops will follow in Section
    3.9 and in Section 3.12:


    ```

