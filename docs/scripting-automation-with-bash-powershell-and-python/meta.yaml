    When the REST API returns a JSON document, you turn it into a Python object tree
    using the built-in `json` method. (In this way, you don''t need to use to the
    `json` module.) You can determine the HTTP status of the web server response using
    the `status_code` property.


    ```

    data = response.json()

    print(data)

    # {''args'': {''q'': ''123''}, ''headers'': {''Accept'': ''*/*'', ...

    print(response.status_code)

    # 200

    ```


    Depending on what kind of request you want to run, you can use `put`, `patch`,
    `delete`, etc. instead of `requests.get` accordingly. You can pass various optional
    parameters to all methods:


    +   - `header` expects a dictionary with the header data.

    - To `data` you can pass either a dictionary with parameters (e.g., for a POST
    request) or a string with other data.

    - Alternatively, you can pass a dictionary with the `json` parameter. Its content
    is transferred in JSON format.

    - Using `files`, you can upload local files to the server.


    The following lines show a PUT request where data is transferred to the server
    in JSON format:


    ```

    data = {''firstName'': ''John'', ''lastName'': ''Doe''}

    response = requests.put(''https://httpbin.org/put'', json=data)

    ```


    If you want to perform basic authentication on a request, you must pass the username
    and password to the `auth` option:


    ```

    url = ''https://httpbin.org/basic-auth/maria/topsecret''

    response = requests.get(url, auth=(''maria'', ''topsecret''))

    print("Status Code", response.status_code)

    ```


    Alternatively, if you prefer a simple Bearer authentication, the best approach
    is to pass the token as a header:'
