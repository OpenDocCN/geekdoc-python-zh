  md: '```

    # tests whether data.csv exists and then

    # returns a corresponding message from

    test -f data.csv && echo "data.csv exists"


    # Update package sources;

    # if successful, then perform the

    # actual update

    apt update && apt full-upgrade

    ```


    As an alternative to &&, you can also link two commands via ||. In that case,
    an inverse logic applies: Command 2 does not get executed until command 1 causes
    an error:


    ```

    # Execute command 2 only if command 1 fails

    command1 || command2

    ```


    Instead of && and ||, you can of course use if constructs, which I am going to
    introduce in Section 3.11 on branching. However, && and || allow you to formulate
    more compact code that is more similar to the style of traditional shell scripts.


    # 3.6.3 Running Commands in the Background


    Usually, the execution of a command blocks the terminal or the script. The subsequent
    command cannot be started until the preceding command is finished. What can help
    you in this case is `command &` to run a command in the background (i.e., asynchronously).

    The asynchronous execution of commands is rarely useful in scripts. Much more
    often, you''ll need % during interactive operation in the terminal. For example,
    you can use `command &` to start a program with a graphical user interface (GUI),
    such as the Firefox web browser, without blocking further input in the terminal.

    A process running in the background can be made a foreground process again using
    `fg`. Conversely, a time-consuming command can be interrupted via `Ctrl` + `Z`
    and then continued in the background using `bg`.


    # 3.6.4 Running Commands in a Subshell


    By placing multiple commands in parentheses, you can start a new shell process
    for their execution and run the commands there. This subshell can be created in
    a single line using `(c1; c2; c3)`. In scripts, you can place the brackets wherever
    you like:


    ```

    command1    # run in main shell

    (           # run the following commands in a subshell

    command2

    command3

    command4

    )

    command5    # in the main shell again

    ```'
