    \ much more convenient to use. For examples of its use, refer to Chapter 17 and\
    \ Chapter 18.\n\n# 10.3 JSON in Bash\n\nBash does not contain any built-in JSON\
    \ functions. However, the `jq` command (*jq* for *JSON query*) is available in\
    \ most Linux distributions. If the execution of the command ends with the *command\
    \ not found* error message, you must install the `jq` command. On Ubuntu, this\
    \ step can be performed using `sudo apt install jq`.\n\n`jq` reads a JSON document\
    \ from the standard input or from files passed as parameters. This command then\
    \ applies a filter expression to the document and writes the result to standard\
    \ output. The simplest application is to format JSON documents in a readable way.\
    \ For this task, you simply need to specify a dot (`.`) as the filter expression:\n\
    \n```\n$ echo '{\"key1\":\"123\",\"key2\":\"456\"}' | jq .\n{\n  \"key1\": \"\
    123\",\n  \"key2\": \"456\"\n}\n```\n\nThe basis for the following examples is\
    \ the *commits.json* file which contains approximately 1,400 lines. This data\
    \ is from the GitHub event log, which is publicly available in the JSON format.\
    \ I used a repository from *Docker: Practical Guide for Developers and DevOps\
    \ Teams* (Rheinwerk Computing, 2023), coauthored by myself and Bernd Öggl, as\
    \ the database:\n\n```\n$ curl 'https://api.github.com/repos/docker-compendium/\\\
    n        samples/commits' > commits.json\n```\n\nThe JSON file simply consists\
    \ of an array of commit data. In `jq`, you can use `.[ ]` to access the entire\
    \ array and use `.[0]` to access the first element (the latest commit)."
