  - "[PAGE 321]\n\nTo this function, you must create a `WatchManager` object. By using\
    \ `add_watch`, you can specify which file or directory you want to monitor, which\
    \ events you want to process (in this case, `IN_CLOSE_WRITE`, that is, closing\
    \ a file after a change) and which function will then be called. Then, you pass\
    \ the `WatchManager` object to the `Notifier`. Using `loop`, you start the event\
    \ processing. As in our earlier example, `loop` also initiates an infinite loop.\
    \ So, the script runs until you stop it via `Ctrl` + `C`.\n\nThe `runPandoc` function\
    \ is responsible for calling the `pandoc` command. However, it must first be tested\
    \ whether the modified file is a Markdown file at all. (Unfortunately, you cannot\
    \ pass patterns like `*.md` to `add_watch`.) For this purpose, the `ev` parameter\
    \ (like `event`) is analyzed, which contains details about the event that occurred.\n\
    \n```\n# Sample file run-pandoc.py\nimport pyinotify, subprocess\n\n# this function\
    \ is called by pyinotify\ndef runPandoc(ev):\n    if ev.name.endswith('.md'):\n\
    \        mdfile = ev.name\n        pdffile = mdfile.replace('.md', '.pdf')\n \
    \       cmd = 'pandoc %s -o %s' % (mdfile, pdffile)\n        print(cmd)\n    \
    \    subprocess.run(cmd, shell=True)\n\nwm = pyinotify.WatchManager()\nwm.add_watch('.',\
    \ pyinotify.IN_CLOSE_WRITE, runPandoc)\nnotifier = pyinotify.Notifier(wm)\nnotifier.loop()\n\
    ```\n\nIn Bash scripts, you can use the `inotify` functions with the `inotifywait`\
    \ and `inotifywatch` commands, but you must first install the `inotify-tools`\
    \ package. Some simple application examples are documented at https://github.com/inotify-tools/inotify-tools/wiki#inotifywait.\n\
    \n# 11.5.2 Alternatives to inotify\n\nOn macOS, the *file system events* (`FSEvents`)\
    \ API provides similar functions. In scripts, the easiest way to use `FSEvents`\
    \ is with the `fswatch` command. This command can be installed using `brew`, as\
    \ described at https://github.com/emcrisostomo/fswatch.\n\nAnother monitoring\
    \ option is provided by the `launchd` program. For a simple use case, see this\
    \ Stack Overflow post: https://stackoverflow.com/a/1516034.\n\nOn Windows, you\
    \ can use the `FileSystemWatcher` feature. However, using this .NET feature is\
    \ quite complicated. A code example for PowerShell is available at https://powershell.one/tricks/filesystem/filesystemwatcher."
  - "[PAGE 322]\n\n# Chapter 12\nSSH\n\nSecure Shell (SSH) has been the preferred\
    \ method on Linux and macOS for decades to work in text mode on another computer\
    \ and execute commands there. Fortunately, Microsoft also jumped on the SSH bandwagon\
    \ a few years ago, so SSH finally works across platforms. For scripting, SSH is\
    \ important for two reasons:\n\n+   - Using SSH, you can work on other computers,\
    \ create scripts there, and finally execute them. SSH is an admin requirement,\
    \ especially for server administration.\n\n  But you don't always have to connect\
    \ to a server! I often use SSH to work on my Raspberry Pi as well. The Raspberry\
    \ Pi does not need a screen or keyboard for this connectivity—a network connection\
    \ suffices. Likewise, this simplicity applies to the numerous virtual machines\
    \ in my everyday work: I often don't need a graphical user interface (GUI) at\
    \ all and can enter the relevant commands or scripting programming in a terminal\
    \ with an SSH connection.\n\n  In addition, the Visual Studio Code (VS Code) editor\
    \ and SSH make a good team. You can learn more about VS Code in Chapter 13.\n\n\
    - For many scripts, the ability to transfer files or entire directories securely\
    \ between different computers is at least as important. The `scp` and `rsync`\
    \ commands and the Secure FTP (SFTP) protocol use SSH. Backup and upload scripts\
    \ therefore often require SSH access. You also need to know how authentication\
    \ works with SSH keys. The handling of such keys is therefore an important topic\
    \ in this chapter.\n\n> **Prerequisites for This Chapter**\n\nAs far as scripting\
    \ is concerned, no content-related prerequisites must be fulfilled, which means\
    \ you can read this chapter independently from all other chapters. The sample\
    \ scripts assume that you have basic knowledge of Bash and PowerShell. You should\
    \ also be familiar with the `find` command (see Chapter 6, Section 6.2). As far\
    \ as you work on Linux, basic admin knowledge is of course always an advantage.\n\
    \n# 12.1 Installing the SSH Client and Server\n\nTo establish an SSH connection\
    \ from local computer A to a second computer B, an SSH client must be available\
    \ on computer A (usually the `ssh` command), and an SSH server must be running\
    \ on B. This section describes the prerequisites you must fulfill before you can\
    \ use SSH."
