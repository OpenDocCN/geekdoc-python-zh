    \ For example, the RSS feed for the BBC World News website can be found at http://feeds.bbci.co.uk/news/world/rss.xml.\n\
    \nThe resulting file has the following structure (strongly shortened):\n\n```xml\n\
    <?xml-stylesheet ... ?>\n<rss xmlns:dc=\"http://purl.org/dc/elements/1.1/\"\n\
    \    xmlns:content=\"http://purl.org/rss/1.0/modules/...\">\n  <channel>\n   \
    \ <title><![CDATA[BBC News - World]]></title>\n    <lastBuildDate>Thu, 23 Feb\
    \ 2023 11:02:41 GMT</lastBuildDate>\n    <copyright>....</copyright>\n    <item>\n\
    \      <title><![CDATA[Gaza-Israel exchange of fire ...]]></title>\n      <link>https://www.bbc.co.uk/news/world-...</link>\n\
    \      <pubDate>Thu, 23 Feb 2023 09:22:38 GMT</pubDate>\n    </item>\n    <item>\n\
    \      ...\n    </item>\n  </channel>\n</rss>\n```\n\nThe goal of the script is\
    \ to display the headlines and links of the 10 latest articles, as in the following\
    \ example:\n\n```\n$ ./read-bbc-news.py\n\n* Gaza-Israel exchange of fire follows\
    \ deadly West Bank raid\n  https://www.bbc.co.uk/news/world-middle-east-64742259\n\
    * Selfie image shows US pilot flying over Chinese 'spy balloon'\n  https://www.bbc.co.uk/news/world-us-canada-64735538\n\
    ...\n```\n\nThe required code looks as follows:\n\n```python\n# Sample file bbc-world-news.py\n\
    import xml.etree.ElementTree as ET\nimport urllib.request\n\nurl = 'http://feeds.bbci.co.uk/news/world/rss.xml'\n\
    response = urllib.request.urlopen(url)\nbinary = response.read()       # binary\
    \ data\ntxt = binary.decode('utf-8')   # convert to UTF-8 text\nroot = ET.fromstring(txt)\
    \      # RSS root tag\ncnt = 0\nfor item in root.iter('item'): # loop through\
    \ all items\n    print('*', item.find('title').text)\n    print(' ', item.find('link').text)\n\
    \    cnt += 1\n    if cnt >= 10:\n        break\n```\n\n## 10.5.3 Example: Extracting\
    \ MAC Addresses from Virtual Machine Files\n\nAs described earlier in Section\
    \ 10.4, the following Python script also extracts MAC addresses from the *.vbox\
    \ files that have been passed as parameters:\n\n```\n$ ./vbox-mac.py vbox/*.vbox\n\
    \nkali-2022.vbox: MAC=080027DB966A\nkali-english.vbox: MAC=080027B8A33A\n...\n\
    ```\n\nSince the *.vbox file uses a namespace, the `iter` method cannot be used.\
    \ Instead, the `find` and `findall` methods are used, each passing a dictionary\
    \ with the namespace prefix as an additional parameter:\n\n```python\n# Sample\
    \ file vbox-mac.py\nimport os, sys\nimport xml.etree.ElementTree as ET\nnamesp\
    \ = { 'ns': 'http://www.virtualbox.org/'}\nfor xmlfile in sys.argv[1:]:\n    basename\
    \ = os.path.basename(xmlfile)\n    root = ET.parse(xmlfile).getroot()\n    machine\
    \ = root.find('ns:Machine', namesp)\n    hardware = machine.find('ns:Hardware',\
    \ namesp)\n    network = hardware.find('ns:Network', namesp)\n    for adapter\
    \ in network.findall('ns:Adapter', namesp):\n        if 'MACAddress' in adapter.attrib:\n\
    \            print('%30s: MAC=%s' %\n                (basename, adapter.attrib['MACAddress']))\n\
    ```\n\n## 10.6 XML in Bash\n\nBash can't handle XML documents any more than it\
    \ can handle JSON files. A possible workaround in this context is external commands,\
    \ but these commands must be installed separately. On Linux, you can use the package\
    \ management tools for your distribution, while on macOS the best choice is to\
    \ use Homebrew.\n\n### 10.6.1 xmllint\n\nThe `xmllint` command displays XML documents\
    \ with indentations in a readable way and verifies their compliance with XML syntax\
    \ rules. If an XML file cannot be edited at all, a short test using `xmllint`\
    \ is appropriate. On macOS, the command is installed by default, but on Linux,\
    \ the command is hidden in different packages, depending on the distribution:\n\
    \n```\n$ sudo apt install libxml2-utils    (Debian, Ubuntu)\n$ sudo dnf install\
    \ libxml2          (Fedora, RHEL)\n$ yay -yS libxml2                   (Arch Linux)\n\
    ```\n\nIn the simplest case, you pass the filename of an XML file to `xmllint`.\
    \ The command verifies the XML syntax and either returns an error message or outputs\
    \ the file unchanged.\n\n```\n$ xmllint countries-malformed.xml\n\ncountries-malformed.xml:6:\
    \ parser error: Opening and ending tag\nmismatch: country line 4 and countries\
    \ </countries>\ncountries-malformed.xml:7: parser error : Premature end of data\n\
    in tag country line 4\n```\n\nOptionally, you can also validate an XML file against\
    \ a *document type definition* (DTD) or *XML schema definition* (XSD). You can\
    \ correctly indent syntactically correct XML files with `--format` to improve\
    \ readability:\n\n```\n$ xmllint --format countries-unformatted.xml\n\n<?xml version=\"\
    1.0\"?>\n<countries>\n  <country code=\"AF\" iso=\"4\">Afghanistan</country>\n\
    \  ...\n```\n\nFinally, you can also process XPath expressions using `xmllint`,\
    \ as in the following example:\n\n```\n$ xmllint --xpath '/*/MapTZ[57]/@WinID'\
    \ timezone-mapping.xml\n\nWinID=\"Mountain Standard Time\"\n```\n\nTo use `xmllint`\
    \ as a filter, you must pass a single minus sign as a parameter, for example,\
    \ in the following code:\n\n```\n$ curl -s <url> | xmllint - --format\n```\n\n\
    > **Not Namespace Compatible**\nXPath expressions in `xmllint` can only be analyzed\
    \ correctly if the XML document does not use namespaces. Although you can find\
    \ instructions on the internet on how to work around this limitation, using another\
    \ tool is a better approach. One option is the `xmlstarlet`, which I'll describe\
    \ next.\n\n### 10.6.2 XMLStarlet\n\nOn Linux and macOS, the `xmlstarlet` package\
    \ provides the `xmlstarlet` command or simply `xml` (e.g., on Arch Linux). This\
    \ package provides significantly more editing options than `xmllint`, especially\
    \ for modifying XML documents. However, the project died down, and the current\
    \ version has not been updated since 2014.\n\nAt this point, I will only describe\
    \ the `sel` subcommand for analyzing XPath expressions. The following command\
    \ first defines the `ns` abbreviation for the default namespace in `*.vbox` files.\
    \ `-t -v 'xpath'` applies the specified XPath expression to the XML file and outputs\
    \ the resulting value (`-v` for value). `-n` adds a newline to the output.\n\n\
    ```\n$ xmlstarlet sel -N ns='http://www.virtualbox.org/' \\\n    -t -v './/ns:HardDisk/@location'\
    \ -n vbox/*.vbox\n\nKali-Linux-2022.2-virtualbox-amd64-disk001.vdi\nkali-english.vdi\n\
    ...\n```\n\nYou can find information on the rather unintuitive syntax of `xml\
    \ sel` via `xml sel --help`. Further documentation can be found at https://xmlstar.sourceforge.net/docs.php.\n\
    \n## 10.7 INI Files\n\nINI files are text files for storing key-value pairs. An\
    \ INI file can be divided into various sections by using `[section]`:\n\n```ini\n\
    ; File config.ini\n[server]\nhostname = example.com\nport = 8080\n\n[data]\nimagePath\
    \ = /mnt/images\ndbName = mydb\n```\n\nINI files are often used to store configuration\
    \ data. Only semicolons are provided for marking comments. Especially in the Linux\
    \ environment, however, `#` is also mostly accepted.\n\n### 10.7.1 Python\n\n\
    The easiest way to read INI files in Python is to use the `ConfigParser` module.\
    \ The following listing shows the intuitive application. Note that the parser\
    \ always returns strings. If you want to use port number 8080 as a number, you\
    \ must perform an appropriate conversion using `int()`.\n\n```python\n# Sample\
    \ file read-config.py\nfrom configparser import ConfigParser\nconfig = ConfigParser()\n\
    config.read('config.ini')\nprint(config['server']['port'])  # output: 8080\n```\n\
    \n### 10.7.2 PowerShell\n\nAlthough INI files are quite commonly used on Windows,\
    \ PowerShell lacks a cmdlet to easily read this type of file. In many cases, you\
    \ can simple use the following commands:\n\n```powershell\n> $config = Get-Content\
    \ 'config.ini' |\n    Select-String '^.*=.*[^=]*$' |\n    ConvertFrom-StringData\n\
    \n> $config.port\n8080\n```\n\n`Get-Content` reads the file and delivers it line\
    \ by line. `Select-String` uses a regular expression to filter out all lines that\
    \ match the `key = value` pattern. `ConvertFrom-StringData` turns the key-value\
    \ pairs into a hash table.\n\nHowever, this simple approach reaches its limits\
    \ when the same keys are used in different groups. If you want to analyze complex\
    \ INI files without falling into syntactical traps, you're better off using the\
    \ popular PsIni extension, available at https://www.powershellgallery.com/packages/PsIni.\n\
    \n### 10.7.3 Bash\n\nLike PowerShell, Bash lacks functions to parse INI files.\
    \ In many Linux distributions, you can use `crudini` for this purpose. However,\
    \ you must install the package of the same name beforehand. However, note that\
    \ this package is itself a Python script! `crudini` therefore only works if Python\
    \ is also installed.\n\nTo read a single value, you can simply pass the INI file,\
    \ the section name, and the key name. You can find various other types of applications\
    \ in `crudini --help`.\n\n```\n$ crudini --get config.ini server port\n8080\n\
    ```"
