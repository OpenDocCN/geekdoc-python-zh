    ```


    You can even enter multiline statements, such as `for` loops. There are two things
    to keep in mind: On the one hand, the statements within the loop must be indented
    by spaces, and on the other hand, you must terminate the entire input by pressing
    `Enter` *twice*. The Python interpreter prepends `>>>` to the first line, and
    three dots appear on all subsequent lines:


    ```

    >>> for i in range(3):

    ...     print(i)

    ...

    0

    1

    2

    ```


    To exit Python, press `Ctrl` + `D`.


    > **Interactive Outputs versus Script Outputs**

    In the following sections, you’ll see numerous Python commands that are meant
    for interactive experimentation and are marked with the `>>>` prompt. Even though
    these examples look trivial, you should make the effort to follow them yourself
    and maybe conduct a few more experiments.

    Note that, when using Python interactively, the result of an expression always
    gets displayed. `x` and `Enter` shows the content of `x`, entering `x + 3` calculates
    the total and shows the result.

    In scripts, things are different: There you need to use `print` for creating outputs.
    This means you must include `print(x)` or `print(x+3)` in your script to output
    `x` or the total.'
