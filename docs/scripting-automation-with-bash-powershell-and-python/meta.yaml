    Depending on what kind of request you want to run, you can use `put`, `patch`,
    `delete`, etc. instead of `requests.get` accordingly. You can pass various optional
    parameters to all methods:


    +   - `header` expects a dictionary with the header data.

    - To `data` you can pass either a dictionary with parameters (e.g., for a POST
    request) or a string with other data.

    - Alternatively, you can pass a dictionary with the `json` parameter. Its content
    is transferred in JSON format.

    - Using `files`, you can upload local files to the server.


    The following lines show a PUT request where data is transferred to the server
    in JSON format:


