    # Chapter 15

    Backups


    The automated creation of backups is *the* classic scripting application. In this
    chapter, I will show you some concrete examples:


    +   - Synchronization of directories of a desktop computer

    - Backup of a WordPress system on a Linux computer

    - Backup of SQL Server databases on Windows


    > **Prerequisites for This Chapter**

    The examples in this chapter are formulated in the Bash and PowerShell languages.
    In addition to the language basics, I assume that you know how to use Microsoft
    Windows Task Scheduler and cron (see Chapter 11) and are familiar with SSH (see
    Chapter 12). Furthermore, you should be familiar with commands like `rsync`, `scp`,
    and `tar` or cmdlets like `Compress-Archive`.


    Instead of your own scripts, you can of course also use ready-made backup solutions.
    You can find countless backup tools on the internet that run the gamut from simple,
    free scripts to expensive, commercial applications. If the task is relatively
    simple, as in the examples in this chapter, your own scripts are definitely sufficient.
    But, of course, that advice doesn''t apply if you need company-wide redundant
    backups that should account for every conceivable location such as active directories,
    cloud storage, or employee notebooks located outside the company network.


    # 15.1 Synchronizing Directories to External Storage


    You probably use the cloud as a backup storage in some way or other: As a developer,
    you probably use Git to synchronize your code to a remote repository, combining
    the benefits of version control with those of an external backup. As an “ordinary”
    user, you simply save important files to a OneDrive, NextCloud, Dropbox, or iCloud
    Drive directory. All of these procedures are both useful and secure when applied
    correctly.

    The starting point for this example is the desire to *additionally* synchronize
    important directories of the notebook to an external data medium. The advantage
    of this old-fashioned backup method is that stored files are available even if
    cloud access is not possible at any given time for whatever reason. Local backups
    also come in handy'
  - '[PAGE 365]


    when data volumes are too large for cloud storage, for example, when virtual machines,
    video projects, and so on are involved.


    I would also like to point out the most important disadvantage right away: “Synchronizing”
    means that files deleted on your notebook will also be deleted on the external
    disk. Thus, this backup procedure does not provide the option to restore deleted
    or overwritten files. In this respect, the Bash or PowerShell scripts presented
    in this chapter should not represent your sole means of backup but should instead
    complement other methods.


    > **Be Careful with Backups of Files Currently Used**


    If you use the script to synchronize files that are currently open and change
    during copying, the backup is worthless most of the time. This limitation applies,
    for example, to image files of virtual machines or to databases.


    Unfortunately, no universal solution exists for this problem. Ideally, you should
    run the script at a time when as few files as possible are actively in use. Most
    database servers provide features to perform consistent backups even while the
    database is running, but mostly not at the file level. (Two examples of this will
    follow in the other sections of this chapter.) You could shut down virtual machines
    in your script for the time of the backup and restart them afterwards. However,
    such approaches depend quite specifically on the software running on your computer.


    Depending on the operating system, file system snapshots represent another solution:
    In this context, you can temporarily freeze a copy of the file system and use
    this static copy as the basis for the backup. On Linux, the *Logical Volume Manager
    (LVM)* or the Btrfs file system provides such options.


    # 15.1.1 PowerShell Script with robocopy


    *robocopy*, which stands for *robust file copy*, is a Windows command that has
    been shipped with all versions of Windows since 2008. Even though the command
    cannot be called as a cmdlet, it integrates well into PowerShell scripts. The
    command’s myriad options are documented at the following links:


    +   - https://en.wikipedia.org/wiki/Robocopy

    - https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/robocopy


    The following script starts with the initialization of three parameters that specify
    which directories should be synchronized to which destination.


    `Get-Volume` retrieves a list of all file systems. If the target disk is not recognized
    in it, the script will end. For `Where-Object`, note that although `Get-Volume`
    displays the file system name in the `FriendlyName` column, the property is actually
    called `FileSystemLabel`—which is hardly comprehensible with what the developers
    of `Get-Volume` had in mind!'
