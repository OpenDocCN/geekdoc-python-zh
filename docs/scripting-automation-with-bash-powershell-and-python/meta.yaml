    \ 喜欢非常自信地呈现解决方案，但可能无法覆盖所有匹配项，或者可能过滤掉太多内容。\n\n## 9.2.5 示例：识别日期\n\n假设你的脚本需要处理国际标准化组织（ISO）格式（yyyy-mm-dd）的日期，无论是作为输入还是来自文件。一个基本可用的简单正则表达式是\
    \ `\\d{4}-\\d{2}-\\d{2}`。\n日期由八个数字组成，用两个连字符分隔。然而，该模式也接受完全不合理的数据，例如 4375-52-68。只需稍加努力，你就可以相当容易地限定允许的值范围，在这种情况下，年份在\
    \ 0000 到 2999 之间，月份在 01 到 12 之间，日期在 0 到 31 之间。以下表达式并不完美，但至少可以防止完全的输入错误：\n\n```\n\
    [012]\\d{3}-(0[1-9]|10|11|12)-([012]\\d|30|31)\n```\n\n## 9.2.6 示例：识别 IPv4 地址\n\
    \n对于 IPv4 地址，你也可以或多或少地精确。要从日志文件中提取 IP 地址（反正日志文件中只包含正确的地址），以下表达式就足够了：\n\n```\n\
    (\\d{1,3}\\.){3}\\d{1,3}\n```\n\n- `\\d{1,3}` 要求一个 1 到 3 位的数字。\n- `\\.` 要求一个点。不要忘记前面的\
    \ `\\` 字符。仅 `.` 会匹配任何字符！\n- `(...){3}` 使此表达式重复三次，因此对于 IP 地址 1.2.3.4，它会捕获“12.3.”。注意，`{4}`\
    \ 是错误的，因为 IP 地址必须以点结尾。\n- 现在，还缺少最后一位数字的 `\\d{1,3}`。\n\n更精确的表达式（仅接受每个数字在 0 到 255\
    \ 的范围内）可以在 https://stackoverflow.com/questions/5284147 找到。\n\n## 9.2.7 示例：识别电子邮件地址\n\
    \n为了粗略检查电子邮件地址是否正确，你可以使用以下表达式：\n\n```\n[a-zA-Z0-9+_.-]+@[a-zA-Z0-9.-]+\n```\n\n\
    在这种情况下，完美主义者也会在 Stack Overflow 上找到完全难以阅读的模式，然而，这些模式考虑了所有可以想象的规则和特殊情况。\n\n## 9.3\
    \ Bash 中的正则表达式（grep, sed）\n\n你现在应该理解了正则表达式的基本原理。让我再次指出，在上一节中，我只概述了最重要的语法规则。有数百页的整本书专门讨论这个主题，涵盖了每一种可以想象的变体。\n\
    \n在本节和接下来的几节中，我们将探讨正则表达式的应用。在这里，我将从 Bash 开始，主要关注 `grep` 和 `sed` 命令。\n\n### 9.3.1\
    \ Bash 的正则表达式比较运算符\n\nBash 和 Zsh 可以在不使用外部工具的情况下，以一种基本的方式处理正则模式。为此，你可以使用 `=~` 比较运算符，它必须在双中括号内使用。\n\
    \n```\nif [[ string =~ pattern ]]; then;\n    echo \"string matches pattern\"\n\
    fi\n```\n\n在这种情况下，使用的是 ERE 模式。因此，你必须使用符合 POSIX 的表达式，例如 `[:digit:]` 或 `[:alnum:]`，而不是简写符号\
    \ `\\d`（表示*数字*）或 `\\w`（表示*单词*）。或者，你可以直接用 `[0-9]` 来表示字符范围。\n\n例如，`=~` 运算符可用于验证输入。在下面的示例中，脚本期望输入格式为\
    \ `yyyy-mm-dd` 的日期。如果字符串的格式甚至不符合指定的格式，则必须重复输入。\n\n该表达式期望年份数字在 1900 到 2099 之间，月份在\
    \ 01 到 12 之间，日期在 00 到 31 之间。请注意，该表达式确实接受一些无效数据，例如 `2000-01-00` 或 `2023-04-31`。\n\
    \n```\n# 示例文件 input-date.sh\npattern='^(19|20)[0-9]{2}-(0[1-9]|10|11|12)-([012][0-9]|30|31)$'\n\
    while true; do\n    read -p \"Enter a date in ISO format (yyyy-mm-dd): \" date\n\
    \    if [[ $date =~ $pattern ]]; then\n        break\n    else\n        echo \"\
    Invalid date, please try again.\"\n    fi\ndone\necho \"Valid date: $date\"\n\
    ```\n\n### 9.3.2 使用 grep 过滤文本\n\n你已经在第 6 章和第 8 章中了解了 grep 命令。到目前为止，我们一直将此命令用作简单的文本过滤器。然而，实际上，传递给\
    \ grep 的第一个参数被分析为正则模式，默认使用简单的 POSIX 语法。但是，该命令也可以处理 ERE 和 PCRE 正则表达式方言：\n\n- `-e`：启用\
    \ ERE\n- `-P`：启用 PCRE\n- `-o` 或 `--only-matching`：仅输出与模式匹配的表达式（即不显示整行）\n\n为避免各种正则表达式特殊字符被\
    \ Bash 分析，你应该将模式放在引号中传递。\n\n以下命令从 access.log 日志文件中过滤所有 IPv4 地址，并仅显示地址。（你可以在上一章的示例文件中找到该文件。）\n\
    \n```\n$ grep -o -P '(\\d{1,3}\\.){3}\\d{1,3}' access.log\n\n221.245.9.91\n135.84.251.52\n\
    160.85.252.207\n...\n```\n\n如果你想以类似的方式提取所有 IPv6 地址，你可以使用以下表达式调用 grep：\n\n```\n\
    $ grep -o -P '([\\da-f]*:){1,7}\\d{1,4}' access.log\n```\n\n该搜索模式适用于大多数“常见”的 IPv6\
    \ 地址。然而，IPv6 语法允许各种特殊情况，正确处理这些情况需要更复杂（且更慢！）的模式。如有必要，你应该查看以下 Stack Overflow 网页：https://stackoverflow.com/questions/53497。\n\
    \n### 9.3.3 “sed” 流编辑器\n\n`sed` *流编辑器*是一个通用的文本处理命令。你在第一个参数中传递一个命令，`sed` 将其应用于标准输入或下一个参数中指定的文件。处理后的文本被写入标准输出。\n\
    在 Linux 上常见的 GNU 版本的 `sed` 中，`-i`（*原地*）选项会导致直接修改源文件。`-i.bak` 会创建一个带有 `.bak` 标识符的源文件备份。\n\
    \n> **GNU 与 BSD**\n> 例如，在 macOS 上安装的 BSD 版本的 `sed` 中，`-i` 选项具有不同的含义。通常，GNU `sed`\
    \ 和 BSD `sed` 之间还存在一些其他的小差异。如有必要，你可以使用 `brew` 安装 GNU 版本的 `sed`！\n\n以下入门示例展示了删除命令\
    \ `d`。此示例读取 `myfile.txt` 文件，删除第 3 到 5 行，并将所有其他行写入 `out.txt` 文件。\n\n```\n$ sed\
    \ 3,5d myfile.txt > out.txt\n```\n\n如果你想向 `sed` 传递多个命令，可以使用 `-e`：\n\n```\n$ sed\
    \ -e 'cmd1' -e 'cmd2' in.txt > out.txt\n```\n\n或者，你可以将命令保存在单独的文件中，并使用 `-f` 处理该文件：\n\
    \n```\n$ sed -f sedcmds.txt in.txt > out.txt\n```\n\n`sed` 也可以处理正则表达式。在这种情况下，默认使用\
    \ POSIX 正则表达式。通过等效的 `-E` 或 `-r` 选项，`sed` 也支持 ERE。与 `grep` 不同，遗憾的是没有 PCRE 选项。\n\
    在以下命令中，`sed` 搜索以 IPv4 地址开头的行。这些行将被删除。所有其他行存储在 `ipv6.log` 中。搜索模式通常在两个斜杠之间编写。但是，如果你需要在表达式中使用斜杠本身，你可以使用任何其他未出现在其中的字符。但整个表达式必须以反斜杠开头。因此，以下两个命令是等效的：\n\
    \n```\n$ sed -E '/^([0-9]{1,3}\\.){3}[0-9]{1,3}/d' access.log > ipv6.log\n$ sed\
    \ -E '\\@^([0-9]{1,3}\\.){3}[0-9]{1,3}@d' access.log > ipv6.log\n```"
