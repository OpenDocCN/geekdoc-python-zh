    $ sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/\n    ohmyzsh/master/tools/install.sh)"

    ```


    During the installation, the `.zshrc` file will be overwritten. The previous content
    ends up in a backup file named `.zshrc.pre-oh-my-zsh`. Oh My Zsh will test for
