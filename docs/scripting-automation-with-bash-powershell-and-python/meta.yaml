  md: "# 4.13.4 Error Protection Using try/catch\n\nAs with most higher-level programming\
    \ languages (like C#, Java, etc.), PowerShell provides the option to wrap multiple\
    \ statements of critical (error-prone) code into a `try` block. If an error occurs\
    \ in that block during execution, the code continues in the `catch` block. The\
    \ `Error` variable provides information about the error there.\n\n```\ntry {\n\
    \    command1\n    command2\n    ...\n} catch {\n    # Here code will be executed\
    \ only if a\n    # an error has occurred\n    Write-Host \"An error occurred:\
    \ $_\"\n}\n```\n\nThe decisive advantage of `try-catch` constructs is that you\
    \ can continue your script even if errors occur without an error message and,\
    \ if necessary, respond specifically to an error.\n\n> **Outputting Error Messages**\n\
    \nPowerShell does not make outputting error messages easy. In our earlier example,\
    \ I used `Write-Host`. The error message thus appears in the terminal but cannot\
    \ be redirected.\n\n`Write-Output` is usually not recommended because it makes\
    \ the error message part of the result of the script or function.\n\n`Write-Error`\
    \ is only useful in exceptional cases, because—depending on the setting of `$ErrorActionPreference`—this\
    \ output then triggers another error.\n\nTwo important syntax variants to the\
    \ `try-catch` syntax are worth exploring:\n\n+   - You can define multiple `catch`\
    \ blocks for different error types. PowerShell then only considers the `catch`\
    \ code that matches the error which occurred.\n- Following the `catch` blocks,\
    \ there may be a `finally` block, which is for cleanup. Code formulated in this\
    \ block is *always* executed, regardless of whether an error occurs or not, and\
    \ regardless of whether the script or function is exited in a `try` or `catch`\
    \ block via `return`.\n\nFor more details about these syntax variants, refer to\
    \ https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_try_catch_finally."
  merge: -1
