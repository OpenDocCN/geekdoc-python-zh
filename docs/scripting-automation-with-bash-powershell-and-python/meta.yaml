    \ 对象表示法（JSON）已成为程序或 Web 服务（如 REST API）交换数据时的主流格式。\n围绕可扩展标记语言（XML）在 2000 年代的热潮现在已经消退：不仅其相对复杂的语法和许多特殊情况让人难以阅读，而且通过代码分析也很繁琐。但是，即使\
    \ XML 在新项目中使用得越来越少，你仍然可能遇到基于 XML 的大量遗留程序和 Web 服务。但我们不仅限于 JSON 或 XML：为了保存一些配置设置，INI\
    \ 格式也完全足够。\n在本章中，我想介绍 PowerShell 和 Python 提供的一些用于创建和处理此类文件的函数。如有必要，这些任务也可以在 Bash\
    \ 中执行，但你必须使用外部命令，例如 jq 或 xmllint。\n\n> **本章的先决条件**\n本章考虑了本书中描述的所有三种脚本语言，这次重点关注\
    \ PowerShell 和 Python：这两种语言为 JSON 和 XML 格式提供了出色的支持。本章的一个很好的逻辑后续是第 18 章。\n\n###\
    \ 10.1 PowerShell 中的 JSON\n\n在 PowerShell 中，两个既简单又强大的 cmdlet 使得处理 JSON 数据变得轻而易举：\n\
    \n+   - **ConvertTo-Json**\n  ConvertTo-Json 主要以 `cmdlet | ConvertTo-Json` 格式使用，将\
    \ cmdlet 提供的结果对象转换为 JSON 格式的字符串。对象的属性用作 JSON 文档中键值对的键。文档可以通过输出重定向保存到文件。\n- **ConvertFrom-Json**\n\
    \  ConvertFrom-Json 的工作方式正好相反：该 cmdlet 将作为参数传递或通过管道传递的 JSON 字符串转换回 PSObjects 或哈希表，然后可以使用\
    \ Select-Object、ForEach-Object 等进一步处理。\n\n以下示例展示了这两个 cmdlet 的一些应用。"
