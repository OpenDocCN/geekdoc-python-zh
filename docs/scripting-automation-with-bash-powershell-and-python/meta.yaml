    When running tests on computer 2, perhaps you notice two more problems. You can
    fix the errors and then commit these changes to computer 2 as well:


    ```

    computer2> git commit -a -m ''bugfixes in script1.ps1''

    computer2> git push

    ```


    The bugfixes are thus on computer 2 and in the remote repository (GitHub in our
    example), but not yet on computer 1. To synchronize computer 1''s repository with
    GitHub, you need to run `git pull` to transfer new commits from the remote repository
    to computer 1:


    ```

    computer1> git pull

    ```


    > **git pull before git push**

    As soon as code is changed in multiple places or by multiple developers, you should
    get into the habit of regularly running `git pull` to bring your local repository
    up to date. In general, you should always run `git pull` before `git push`. If
    you forget to `git pull` and Git detects that commits are missing from the local
    repository, `git push` results in the following error message: *failed to push
    some refs to remote repository xxx*. The solution is to run `git pull` first.


    Figure 14.2 shows—admittedly in a highly simplified manner—the effect of basic
    Git commands. The “staging area” is a special area of the Git database that stores
    files added via `git add` that are not yet part of a commit.


