    \ now two variables that both reference an object with the integer 3. Via `a=4`,\
    \ `a` is assigned a new value. This has no influence on `b`. Thus, `a` and `b`\
    \ are independent of each other: `a` now contains the value 4; `b`, the value\
    \ 3.\n\n```\na = 3\nb = a        # b\na = 4\nprint(a, b)  # Output 4, 3\n```\n\
