    ## 1.3 The Agony of Choice


    If you''re just entering the world of scripting, you''d probably prefer it if
    I would tell you now, "Learn language Xxx, it''s good for everything." Unfortunately,
    the IT world is not that simple. Which scripting language is the most suitable
    or the ideal solution for you depends greatly on the task and the operating system
    on which your script is supposed to run, for instance:


    - For scripts to administer Windows computers and networks, PowerShell is definitely
    the best choice. Many Windows-specific functions are best controlled by PowerShell''s
    own commands and modules.

    - Similarly, Bash (or, almost equivalently, Zsh) is the ideal language if you
    want to run administrative scripts on Linux machines or servers and on macOS.

    - For tasks that are platform-independent and do not depend on operating system-specific
    libraries, PowerShell, Bash, and Python are equally suitable. In that case, I
    pragmatically recommend the language you know best or whose environment (commands,
    extension modules) you know best.

    - The greater the complexity of the task; the more elaborate the control of the
    code (loops, branches, functions, etc.); and the more extensive the expected amount
    of code and the greater the number of variables and data structures required,
    the stronger my tendency is towards Python.

    - If your script runs the risk of turning into a “real” program, with several
    hundred lines of code, the advantages of Python (with its clearer syntax and better
    development tools) outweigh its disadvantages. However, we’re then moving well
    beyond the scope of this book.


    You must start somewhere: If you’re at home in the Windows environment and want
    to run your scripts there, I would start using PowerShell. Similarly, I advise
    Linux and macOS fans to first learn the basics of Bash and Zsh, respectively.
    (This recommendation also applies if you use Windows as your working environment,
    but you want your scripts to run on Linux servers. While this juggling sounds
    contradictory, in real life, this scenario is absolutely common. Microsoft’s own
    *Azure* cloud runs more Linux instances than Windows ones. Nothing wrong with
    combining the benefits of Windows on the desktop with those of Linux on the server.)


    Once you’re somewhat familiar with Bash or PowerShell, you should get acquainted
    with Python. Python scores major points with its impressively elegant syntax and
    is miles superior to Bash as well as PowerShell in this respect. However, these
    advantages are more effective for complex, platform-independent tasks. In this
    respect, Python is not quite a “classic” scripting language but has a much more
    universal objective. If your script is primarily intended to call elementary Linux
    tools (such as `find`, `grep`, `adduser`, and `gzip`) or to perform basic Windows
    admin tasks, Bash or PowerShell are better suited for this purpose than Python,
