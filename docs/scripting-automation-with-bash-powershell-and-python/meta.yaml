    You can use custom functions for two reasons: on the one hand, to break complex
    code into manageable chunks or, on the other hand, because you want to perform
    a particular task in different places in the code and thus avoid redundant code.
    Sometimes, however, you need a third variant.


    At *one* point in the code—for example, in a `map` statement, in a `filter` statement,
    or for formulating a callback function—you need a function that is often quite
    simple. The conventional way to create temporary functions is then cumbersome:
    You must first define the function using `def`, then use that function only once.


    In such cases, lambda functions represent an alternative that saves space and
    that, above all, is much clearer: The function can be defined ad hoc and at the
    same time used immediately at this point in the code. As these functions are not
    assigned any name at all, lambda functions are also referred to as *anonymous
    functions*.


    The following line contains the syntax for defining a lambda function. The `lambda`
    keyword is first followed by the parameters of the function and, after a colon,
    by the function expression. A major limitation compared to other functions is
    that lambda functions can only consist of a single expression.


    ```

    lambda var1, var2, var3, ...: expression

    ```


    The following mini program demonstrates the use of two lambda functions: The first
    lambda expression recognizes numbers that are divisible by 3 and uses this criterion
    to include elements in `lst2`. The second lambda expression is applied to all
    elements of `lst2` to divide integers by 3. The resulting list ends up in `lst3`.


    ```

    lst1 = [1, 2, 3, 9, 345, 36, 33]

    # lst2 contains all elements of lst1 divisible by 3

    lst2 = list(filter(lambda x: x % 3 == 0, lst1))

    print(lst2)    # Output [3, 9, 345, 36, 33]

    # divide all elements of lst2 by 3

    lst3 = list(map(lambda x: x // 3, lst2))

    print(lst3)    # Output [1, 3, 115, 12, 11]

    ```'
