  md: '# Chapter 20

    Scripting in the Cloud


    The cloud is large and diverse—in this respect, the title of this chapter is presumptuous.
    One could write an entire book on the subject, covering different cloud models,
    providers, and programming variants.


    At this point, I will focus on the *Simple Storage Service (S3)* of *Amazon Web
    Services (AWS)*. This service has established itself as a cost-effective way to
    store files. Two major options for usage exist: You can store files there that
    are publicly accessible (for example, to relieve the load on your own web server),
    or you can use S3 as a place for backups or rarely needed files. At the same time,
    you’ll need to keep an eye on the costs: Depending on the offer, the transfer
    or the actual storage can be the decisive factor.


    Two great libraries for controlling AWS S3 functions are available: the AWS command-line
    interface (CLI) for Bash scripts and the AWS module for PowerShell scripts. This
    chapter describes both variants.


    > **Prerequisites for This Chapter**


    To benefit from this chapter, you’ll need good knowledge of Bash or PowerShell.
    You’ll also need some basic knowledge of AWS S3: In particular, you need to know
    what is meant by the term “buckets” and how user management, specifically *identity
    and access management (IAM)*, works.


    The two examples presented in this chapter are based on techniques that are described
    in [Chapter 15] and [Chapter 17], respectively. In this respect, it is advisable
    you review these two chapters first.


    # 20.1 AWS CLI


    The AWS CLI enables you to control AWS functions at the command level. The CLI
    can basically be installed on all common platforms. However, in the following
    sections, I assume that you use Linux or macOS and want to develop your scripts
    in Bash.


    Don’t worry, PowerShell fans aren’t shorted and can just scroll down to [Section
    20.3].'
  merge: -1
  pgno: 432
- img_proc: true
  md: '# 20.1.1 Installation on Linux and macOS


    AWS CLI downloads and installation guides for all platforms can be found at https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html.


    On Linux, you must download the ZIP file, unpack the archive, and run the installation
    script. The `aws` command will be stored in the `/usr/local/bin` directory and
    should be executable there without any changes to `PATH`. If you want to update
    an existing installation, you must pass the `--update` option to the `install`
    command.


    ```

    $ curl https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip \n    -o "awscliv2.zip"

    $ unzip awscliv2.zip

    $ sudo ./aws/install

    $ aws --version

    aws-cli/2.11.11 Python/3.11.2 ...

    ```


    > **Trouble with cron**

    On some Linux distributions, `/usr/local/bin` is not included in the `PATH` variable
    relevant to cron jobs. In that case, calling `aws` in cron jobs will fail. One
    solution might be to create a link from `/usr/bin/aws` to `/usr/local/bin/aws`,
    or to always specify the full path of the `aws` command in the script.


    For macOS, Amazon provides a PKG installer. The installation process can be completed
    with a few clicks. Again, the `aws` command is installed in the `/usr/local/bin`
    directory.


    # 20.1.2 Configuration


    For the following examples, you''ll need an AWS user that has access rights to
    one or more buckets. Once you''ve set up a user in the AWS web interface under
    **Identity and Access Management** and assigned an access key, you should run
    `aws configure`. This command asks for the credentials and stores them in the
    local configuration files `.aws/config` and `.aws/credentials`. The run `aws configure`
    in the account under which you want your scripts to run later. If these scripts
    are backup scripts that require `root` privileges, `aws configure` must also be
    run in the `root` account.


    ```

    $ aws configure


    AWS Access Key ID [None]:    AKxxxxxxxx

    AWS Secret Access Key [None]: xxxxxxxxxxxxxxxx

    Default region name [None]:  eu-central-1

    Default output format [None]: <Return>

    ```'
