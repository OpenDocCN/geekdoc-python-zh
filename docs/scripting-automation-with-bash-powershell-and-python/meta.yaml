  md: '# 3.14.4 Responding to Signals (trap)


    The concept of process management on Unix/Linux is that processes can be sent
    signals (see Table 3.12). Even more signals are listed by `kill -l`. For example,
    if you press `Ctrl` + `C` while executing a Bash script, the `SIGINT` signal is
    sent, and the script execution gets aborted.


    | Signal Name | Code | Meaning |

    | :--- | :--- | :--- |

    | SIGHUP | 1 | Prompt to re-read the configuration |

    | SIGINT | 2 | Interruption via `Ctrl` + `C` |

    | SIGKILL | 9 | `kill` signal; cannot be intercepted |

    | SIGTERM | 15 | Prompt to exit the program |


    Table 3.12 The Most Important Signals


    You can use `trap` to specifically respond to such signals. The syntax of `trap`
    is simple:


    ```

    trap ''commands'' signals

    ```


    `commands` specifies one or several commands to be executed when one of the specified
    signals is received. The signals can be specified either by their names or by
    their codes. If you want to execute complex code in response to a signal, you
    should define the code in a function and specify the function name in the `trap`
    command.


    `trap` is often used to perform cleanup operations prior to a program abort triggered
    by a signal. For example, you can delete a temporary file. The simple `trap ''''
    2` command allows you to make your script ignore `Ctrl` + `C`.


    # 3.14.5 Timeout


    For commands that rely on network or database connections, it is not always clear
    whether an error has really occurred or whether the connection setup is too slow.
    Using `timeout <time> <command>`, you can execute a command with a given timeout.
    If the command takes longer than the expected time, the execution is aborted.
    The return value of `timeout` is 124 if a timeout occurs. The command knows some
    more special error codes (125, 126, 127, and 137; see `man timeout`). On the other
    hand, if `command` is terminated within the timeout, `timeout` returns the exit
    code of `command`. The following command tests whether a Git remote repository
    exists for the current branch (see also Chapter 14):


    ```

    timeout 30s git ls-remote

    ```'
  merge: -1
