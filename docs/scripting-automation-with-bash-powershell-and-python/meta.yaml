  - "[PAGE 228]\n\n```\n> (Select-String error access.log).Matches.Count\n```\n\n\
    A more difficult task is to list the number of hits for multiple files. The perhaps\
    \ obvious way to apply `Select-String` with `Matches.Count` in a pipeline is not\
    \ allowed and leads to an error message:\n\n```\n> Get-ChildItem *.log | (Select-String\
    \ error).Matches.Count\n\nParseError:\nExpressions are only allowed as the first\
    \ element of a pipeline\n```\n\n`ForEach-Object` leads the way to this goal: It\
    \ allows you to perform an action for each file found. In the following example,\
    \ `Write-Host` outputs the name of the file. Then, `Select-String` determines\
    \ the number of error texts:\n\n```\n> Get-ChildItem *.log | ForEach-Object -Process\
    \ {\n    Write-Host -NoNewline $_.Name \" -> \"\n    (Select-String error $_).Matches.Count\n\
    }\n\nerror.log  -> 231\n...\n```\n\nThe search pattern passed to `Select-String`\
    \ is evaluated as a regular expression (see [Chapter 9, Section 9.4.2](#)).\n\n\
    # 7.2.2 Text versus Objects\n\nUnlike the `grep` command in Linux, you cannot\
    \ use `Select-String` to filter the results of any cmdlets in general. The reason\
    \ is simple: cmdlets return objects, not text. (Text is displayed in the terminal\
    \ but only because PowerShell automatically converts the objects to text beforehand.)\n\
    \nThus, for example, if you want to know what alias the `Start-Process` cmdlet\
    \ has, the following command will have no effect. It does not recognize any text\
    \ in the `Get-Alias` result.\n\n```\n> Get-Alias | Select-String Start-Process\n\
    ```\n\nNow, you can use `Out-String` to convert the `Get-Alias` result into a\
    \ string and search it. Basically, this approach works because `Select-String`\
    \ also finds the match. However, `Out-String` turns the result into *one* string.\
    \ Instead of displaying only the alias definition of `Start-Process`, the command\
    \ returns the complete list of all aliases, which ultimately is the original result\
    \ of `Get-Alias`. But nothing is gained by this exercise."
