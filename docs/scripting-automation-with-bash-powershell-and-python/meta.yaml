  md: '# Chapter 21

    Virtual Machines


    As long as you use virtual machines only sporadically, automation does not make
    any sense. You may want to consider using a tool for faster setup of new virtual
    machines (such as Vagrant).

    The situation is completely different if you want to automatically create, configure,
    maintain, and analyze a large number of virtual machines, for example, for a lab
    (teaching), for cluster operation (science), or for scalable deployment (container
    or server operation). Of course, there are all kinds of special tools available
    for this type of use cases, from OpenStack to Kubernetes. However, getting used
    to these monster programs is complicated and requires intensive training. For
    simple tasks, a few small scripts are often sufficient.

    The scripts in this chapter refer to the Kernel-based Virtual Machine (KVM) for
    Linux and Microsoft Hyper-V for Windows virtualization systems.


    > **Prerequisites for This Chapter**

    In addition to a basic knowledge of Bash or PowerShell, you’ll need a basic understanding
    of the relevant virtualization system and of the underlying network technology
    for this chapter.

    One of the examples uses the `cut`, `grep`, and `sed` commands and applies regular
    expressions to modify network configuration files. I covered the related basic
    principles in Chapter 8 and in Chapter 9.

    The SSH authentication with keys also plays a role in the examples. If necessary,
    you should take another look at Chapter 12.


    # 21.1 Setting Up and Running Virtual Machines (KVMs)


    The starting point for the following scripts is an Ubuntu server. The KVM virtualization
    system, the `virsh` command from the `libvirt-clients` package, and the `virt-clone`
    command from the package of the same name are installed there. The goal is to
    run multiple similar virtual machines cloned from an existing virtual machine
    named `vm-base`. The `vm-base` output system has three network interfaces and
    four virtual disks.'
  merge: -1
  pgno: 446
- img_proc: true
  md: "# 21.1.1 Cloning Virtual Machines\n\nThe `make-vms.sh` script expects two numeric\
    \ parameters. It then loops from the start value to the end value and creates\
    \ the virtual machines, `vm-<nn>`. Thus, the `make-vms.sh 10 29` command creates\
    \ 20 virtual machines named `vm-10` to `vm-29`.\n\nThe script first tests whether\
    \ two parameters have been passed. Before it starts cloning, the script makes\
    \ sure that the original virtual machine (the clone base system, `orig` variable)\
    \ is shut down. It analyzes the list of all running virtual machines generated\
    \ via `virsh list`.\n\n`virt-clone` automatically creates the required virtual\
    \ disks using the filenames specified with `--file` and the *Media Access Control\
    \ (MAC)* addresses specified with `--mac` (for identifying network devices). However,\
    \ these disks always use the RAW image format. The `qemu-img` commands that follow\
    \ convert the image files into the more efficient QCOW2 format.\n\n```\n# Sample\
    \ file make-vms.sh\nif [ $# -ne 2 ]; then\n    echo \"usage: make-vms.sh <start>\
    \ <end>\"\n    exit 1\nfi\nvmstart=$1\nvmend=$2\norig='vm-base'    # base VM to\
    \ clone\n\n# shut down clone base system\nresult=$(virsh list | grep $orig)\n\
    if [ ! -z \"$result\" ]; then\n    echo \"shutting down $orig\"\n    virsh shutdown\
    \ $orig\n    sleep 10\nfi\n\n# create VMs\nfor (( nr=$vmstart; nr<=$vmend; nr++\
    \ )); do\n    echo \"create vm-$nr\"\n    disk1=/var/lib/libvirt/images/vm-$nr-disk1.qcow2\n\
    \    disk2=/var/lib/libvirt/images/vm-$nr-disk2.qcow2\n    disk3=/var/lib/libvirt/images/vm-$nr-disk3.qcow2\n\
    \    disk4=/var/lib/libvirt/images/vm-$nr-disk4.qcow2\n    tmpdisk=/var/lib/libvirt/images/tmpdisk.qcow2\n\
    \    virt-clone --name \"vm-$nr\" --original $orig \\n        --mac 52:54:00:01:00:$nr\
    \ --mac 52:54:00:02:00:$nr \\n        --mac 52:54:00:03:00:$nr \\n        --file\
    \ $disk1 --file $disk2 --file $disk3 --file $disk4\n```"
  merge: -1
  pgno: 447
- img_proc: true
  md: "```\n# convert RAW disks to QCOW2 disks\nqemu-img convert $disk1 -O qcow2 $tmpdisk\n\
    mv $tmpdisk $disk1\nqemu-img convert $disk2 -O qcow2 $tmpdisk\nmv $tmpdisk $disk2\n\
    qemu-img convert $disk3 -O qcow2 $tmpdisk\nmv $tmpdisk $disk3\nqemu-img convert\
    \ $disk4 -O qcow2 $tmpdisk\nmv $tmpdisk $disk4\ndone\n```\n\n# 21.1.2 Starting\
    \ and Shutting Down Virtual Machines\n\n`make-vms.sh` only creates the `vm-<nn>`\
    \ virtual machines; it does not start them. This task is carried out by another\
    \ script (`start-vms.sh`), which again expects two numbers as parameters. It runs\
    \ `virsh start <name>` to start the virtual machine in question.\n\n```\n# Sample\
    \ file start-vms.sh\nvmstart=$1\nvmend=$2\nfor (( nr=$vmstart; nr<=$vmend; nr++\
    \ )); do\n  echo \"start vm-$nr\"\n  virsh start \"vm-$nr\"\ndone\n```\n\nIn addition,\
    \ there are two analogous scripts to shut down the virtual machines (`virsh shutdown`)\
    \ and to delete them, deleting all virtual disks, respectively (`virsh undefine\
    \ --remove-all-storage`).\n\n# 21.1.3 Running Scripts on Multiple Virtual Machines\n\
    \nOnce you have gotten 20 virtual machines up and running, you notice that you\
    \ forgot a configuration detail. You could now log in to each of the virtual machines\
    \ using SSH and complete the configuration. But of course, a more elegant solution\
    \ exists: You can use `run-script-on-vms.sh` to run the commands stored in `myscript.sh`\
    \ via SSH on all desired virtual machines.\n\n`run-script-on-vms.sh` assumes that\
    \ there is an SSH key pair on your local server and that the public key is known\
    \ in the root account of the virtual machines. For this purpose, you must allow\
    \ SSH logins for `root` on `vm-base` and copy the local key there with `ssh-copy-id\
    \ root@basevm`. Needless to say, this step must be done before cloning! Instead\
    \ of `basevm`, you specify the hostname or IP address of the virtual machine."
  merge: -1
  pgno: 448
- img_proc: true
  md: "run-script-on-vms.sh is amazingly short. Basically, for each virtual machine\
    \ in a loop, the ssh root@host < myscripts.sh > result.txt command is executed.\
    \ Instead of host, the host name (here vm-<nn>.example.com) or the IP address\
    \ of the virtual machine in question must be specified in the script. The -o StrictHostKeyChecking=no\
    \ option causes SSH to forego asking whether to trust a host to which a connection\
    \ is being made for the first time.\n\n```\n# Sample file run-script-on-vms.sh\n\
    vmstart=$1\nvmend=$2\nfor (( nr=$vmstart; nr<=$vmend; nr++ )); do\n    ssh -o\
    \ StrictHostKeyChecking=no \\n        root@vm-$nr.example.com 'bash -s' \\n  \
    \      < myscript.sh > results-$nr.txt\ndone\n```\n\n# 21.2 Automating the Network\
    \ Configuration (KVMs)\n\n“Cloning” a virtual machine means that all the properties\
    \ of the source system are preserved. For this reason, all configuration files\
    \ are also cloned. In most cases, that is exactly what you want, but there are\
    \ exceptions. One of these exceptions is related to the static network configuration.\
    \ As far as the network adapters do not obtain their addresses automatically via\
    \ DHCP, the network configuration files of each virtual machine must be adjusted,\
    \ as otherwise network conflicts will occur.\n\nThis task is performed by another\
    \ script, which, however, is not located on the virtualization host, but inside\
    \ the virtual machine. So, there must be a script in the clone base system (according\
    \ to the names of the previous example in vm-base) that is executed when the virtual\
    \ machine or its clones are booted.\n\nIn my setup for the Linux courses I teach,\
    \ the virtual machines are compatible with Red Hat Enterprise Linux (RHEL) 9.\
    \ (I use AlmaLinux, but RHEL 9, Oracle Linux 9 or Rocky Linux 9 work exactly the\
    \ same way in this regard.) The vm-base virtual machine contains a script named\
    \ /etc/myscripts/setup-vm-network, which is executed on every boot process. The\
    \ file that is responsible for this task is /etc/rc.d/rc.local, which looks as\
    \ follows:\n\n```\n#!/bin/bash\ntouch /var/lock/subsys/local\n. /etc/myscripts/setup-vm-network\n\
    ```\n\nYou must make this file executable using chmod +x /etc/rc.d/rc.local for\
    \ it to be considered."
  merge: -1
  pgno: 449
- img_proc: true
  md: '# 21.2.1 Starting Point


    The `setup-vm-network` Bash script assumes that there are existing configuration
    files for two network adapters:


    `/etc/NetworkManager/system-connections/enp1s0.nmconnection`

    `/etc/NetworkManager/system-connections/enp7s0.nmconnection`


    The files use the Linux NetworkManager syntax and contain the following lines,
    among others:


    ```

    # static IPv4 configuration with 192.168.122.1 as gateway

    address1=192.168.122.27/24,192.168.122.1

    # static IPv6 configuration with 2a01:abce:abce::2 as gateway

    address1=2a01:abcd:abcd::27/64,2a01:abce:abce::2

    ```


    These files should be customized so that each virtual machine has a unique IPv4
    and IPv6 address. For this purpose, the last two digits of the MAC address of
    the first network adapter are analyzed. For example, if the MAC address is 52:54:00:01:00:27,
    the virtual machine should use the following IP addresses:


    +   - IPv4: 192.168.122.27

    - IPv6: 2a01:abcd:abce::27


    In the first lines of the script some variables are initialized. Then, the script
    analyzes the `/sys/class/net/enp1s0/address` system file, which contains the MAC
    address of the first adapter. `cut` extracts the sixth hexadecimal group from
    it. The `if` statement eliminates a leading 0, so it simply turns 07 into 7, for
    example.


    The `ipv4old` or `ipv4new` variables as well as `ipv6old` or `ipv6new` contain
    a pattern for the previous IP address and the required correct IP address. If
    the script detects via `grep` that the current network configuration does not
    match the desired address, both configuration files will be modified using `sed`.
    Simply put, the `sed` commands have the following effect:


    +   - `conffile1`: 192.168.122.*/24 gets replaced by 192.168.122.<nn>/24

    - `conffile2`: 2a01:abcd:abcd::*/64 gets replaced by 2a01:abcd:abcd::<nn>/64


    Next, the script deletes the `/etc/machine-id` file and then sets it up again
    with a random ID. This file as well has to do with the network configuration.
    It is analyzed by NetworkManager (a Linux system component) and used to generate
    IPv6 link local unicast addresses (fe80-xxx). If all virtual machines have the
    same internal ID number, then the unicast addresses are also identical and address
    conflicts will occur despite an otherwise correct IPv6 configuration.


    If required, you can of course add more functions to the script, for example,
    to generate new keys for the OpenSSH server or to set the hostname.'
  merge: -1
  pgno: 450
- img_proc: true
  md: "# 21 Virtual Machines\n\n```\n# Sample file setup-vm-network.sh\nNMPATH=/etc/NetworkManager/system-connections\n\
    IF1=enp1s0\nIF2=enp7s0\n\n# location of the network configuration files\nconffile1=$NMPATH/$IF1.nmconnection\n\
    conffile2=$NMPATH/$IF2.nmconnection\n\n# extracts the last 2 MAC digits, eliminates\
    \ leading 0\nmac=$(cut -d ':' -f 6 /sys/class/net/$IF1/address)\nif [ ${mac:0:1}\
    \ == 0 ]; then mac=${mac:1:2}; fi\n\n# IPv4 and IPv6 addresses: old = previous,\
    \ new = desired\nip4old=\"192\\.168\\.122\\..*/24\"\nip4new=\"192\\.168\\.122\\\
    .$mac/24\"\nip6old=\"2a01:abcd:abcd::.*/64\"\nip6new=\"2a01:abcd:abcd::$mac/64\"\
    \n\n# if the configuration file uses a different address\n# than ip4new: rectify\
    \ configuration files using sed\nif ! grep -q \"address1=$ip4new\" $conffile1;\
    \ then\n  sed -E -i.old  \"s,$ip4old,$ip4new,\" $conffile1\n  sed -E -i.old  \"\
    s,$ip6old,$ip6new,\" $conffile2\n  # set up new /etc/machine-id\n  rm /etc/machine-id\n\
    \  systemd-machine-id-setup\n  # restart virtual machine\n  echo \"reboot\"\n\
    \  reboot\nelse\n  echo \"no network changes\"\nfi\n```\n\nThe script ends with\
    \ a `reboot` statement. If you develop a script yourself like in this example,\
    \ you must be extremely careful with `reboot`! If your script does not work properly,\
    \ the virtual machine will restart continuously. So, make sure to test your script\
    \ extensively before you include `reboot`!\n\nSince the script processes the last\
    \ two digits of the MAC address decimally (not hexadecimally), it is suitable\
    \ for the administration of 100 virtual machines. 192.168.122.0 is reserved. 192.168.122.1\
    \ and 2a01:abce:abce::2 are used as gateway addresses. This leaves the address\
    \ range 192.168.122.3 to .99 for IPv4. So, you can set up a maximum of 97 virtual\
    \ machines. If necessary, you can work around this limit by analyzing the last\
    \ two MAC digits hexadecimally or by considering multiple MAC digits."
  merge: -1
  pgno: 451
- img_proc: true
  md: '> **Alternatives**

    Running a script within the init system is not the only way to configure virtual
    machines. Major virtualization frameworks such as OpenStack rely on cloud init
    (see https://cloud-init.io).

    To configure running virtual (or real) machines, you can also use configuration
    tools such as Puppet or Ansible. However, these programs assume that all machines
    in the network are accessible, i.e., that the network configuration has already
    been completed.


    # 21.3 Controlling Hyper-V


    Hyper-V is to Windows what KVM is to Linux. It is therefore not surprising that
    Microsoft has added a comprehensive PowerShell module to its own virtualization
    system. If you have Windows Pro and have not yet enabled Hyper-V, the quickest
    way to do this is to use the following command:


    ```

    > Add-WindowsFeature Hyper-V -IncludeManagementTools

    ```


    About 250 aliases and cmdlets can then be executed on Windows (but not on Linux
    or macOS) via the Hyper-V PowerShell module:


    ```

    > Get-Command -Module Hyper-V

    ```


    | CommandType | Name | Version | Source |

    | --- | --- | --- | --- |

    | Alias | Export-VMCheckpoint | 2.0.0.0 | Hyper-V |

    | Alias | Get-VMCheckpoint | 2.0.0.0 | Hyper-V |

    | Alias | Remove-VMCheckpoint | 2.0.0.0 | Hyper-V |

    | Alias | Rename-VMCheckpoint | 2.0.0.0 | Hyper-V |

    | Alias | Restore-VMCheckpoint | 2.0.0.0 | Hyper-V |

    | Cmdlet | Add-VMAssignableDevice | 2.0.0.0 | Hyper-V |

    | Cmdlet | Add-VMDvdDrive | 2.0.0.0 | Hyper-V |

    | ... | | | |


    > **Admin Rights Required**

    By default, the execution of Hyper-V cmdlets requires admin rights. This means
    you need to open a PowerShell terminal with admin rights.

    Alternatively, you can add individual users or groups to the Hyper-V administrators.
    This type of settings can be done in the Group Policy Management Editor.'
  merge: -1
  pgno: 452
- img_proc: true
  md: "Get-VM lists all installed virtual machines and shows details about their current\
    \ state:\n\n```\n> Get-VM\n\nName    State   CPUUsage(%)   MemoryAssigned(M) \
    \  ...\n----    -----   -----------   -----------------   ---\nalma9   Running\
    \ 24            2024\nkali    Running 0             5976\n...\n```\n\nGet-VM returns\
    \ VirtualMachine objects. Get-Member shows that the underlying class has innumerable\
    \ properties:\n\n```\n> Get-VM | Select-Object -First 1 | Get-Member\n\nTypeName:\
    \ Microsoft.HyperV.PowerShell.VirtualMachine\n\nName                        MemberType\
    \   Definition\n----                        ----------   ----------\nCheckpointFileLocation\
    \      AliasProperty ... \nVMId                        AliasProperty ... \nVMName\
    \                      AliasProperty ... \nEquals                      Method\
    \       ... \nGetHashCode                 Method       ... \nAutomaticCheckpointsEnabled\
    \ Property     ... \nAutomaticCriticalErrorAction Property    ... \nAutomaticStartAction\
    \        Property     ... \nAutomaticStartDelay         Property     ... \n...\n\
    ```\n\nYou can start or shut down all virtual machines by using two one-liners\
    \ that call the Start-VM and Stop-VM cmdlets, respectively:\n\n```\n> Get-VM |\
    \ Where-Object {$_.State -eq 'Off'} | Start-VM\n\n> Get-VM | Where-Object {$_.State\
    \ -eq 'Running'} | Stop-VM\n```\n\nThe especially useful Set-VM cmdlet allows\
    \ you to change various properties of virtual machines:\n\n```\n> $vm = Get-VM\
    \ \"alma9-clone1\"\n> Set-VM -VM $vm -MemoryStartupBytes 2GB -ProcessorCount 2\n\
    ```\n\nChanging the memory is impossible if the virtual machine uses a dynamically\
    \ allocated memory area. In that case, you can set the upper and lower limits,\
    \ as well as the initial memory size, which must not be larger than the upper\
    \ limit. The -DynamicMemory option allows you to switch from static to dynamic\
    \ memory management."
  merge: -1
  pgno: 453
- img_proc: true
  md: "```\n> Set-VM -VM $vm -DynamicMemory -MemoryStartupBytes 512MB `\n    -MemoryMinimumBytes\
    \ 512MB -MemoryMaximumBytes 1GB\n```\n\nAs usual, a reference of all Hyper-V cmdlets\
    \ with their myriad options can be found online: https://learn.microsoft.com/en-us/powershell/module/hyper-v.\n\
    \n# 21.3.1 Cloning Virtual Machines\n\nThe Hyper-V module does not provide its\
    \ own cmdlet for cloning virtual machines. However, this task can be done by means\
    \ of a workaround: For this purpose, you first need to export the virtual machine\
    \ (Export-VM) and then create the new virtual machine by means of an import (Import-VM).\n\
    \nIn real life, however, the process is more complex than this brief summary suggests.\
    \ The following script creates noOfClones copies of an existing virtual machine.\
    \ The script starts by shutting down the base virtual machine and deleting all\
    \ snapshots. (You should remove Remove-VMSnapshot if you want to keep the snapshots!\
    \ Note, however, that Export-VM also includes all snapshots and there is no option\
    \ to prevent this.)\n\n```\n# Sample file clone-vm.ps1\n$basename = \"alma9\"\n\
    $noOfClones = 3\n$tmp = $env:TEMP  # Caution: $env:TEMP works only on\n      \
    \            # Windows, but not on Linux/macOS\n\n# the function tests if a directory\
    \ exists, and\n# then deletes it; be careful!\nfunction delete-dir($path) {\n\
    \    if (Test-Path \"$path\") {\n        Write-Output \"delete $path\"\n     \
    \   Remove-Item \"$path\" -Recurse -Force\n    }\n}\n\n# when VM is running: shutdown\n\
    $basevm = Get-VM $basename\nif ($basevm.State -eq 'Running' ) {\n    Write-Output\
    \ \"shutdown $basename\"\n    Stop-VM -VM $basevm\n}\n# delete all snapshots of\
    \ the VM (be careful!)\nGet-VMSnapshot -VM $basevm | Remove-VMSnapshot\n```\n\n\
    The next lines use Get-VMHardDiskDrive to determine the location of the first\
    \ disk of the base virtual machine. The disks of the cloned virtual machines will\
    \ be created later in subdirectories relative to this."
  merge: -1
  pgno: 454
- img_proc: true
  md: "If the temporary directory to which the export is to be done already exists\
    \ (e.g., as a left-over from a previous script call), then it will be deleted.\n\
    \nExport-VM finally exports the base virtual machine. This creates a subdirectory\
    \ in the temporary directory with the virtual machine name. The actual description\
    \ of the virtual machine is contained in a *.vmcx file. Get-ChildItem gets the\
    \ filename.\n\n```\n# (continued ...)\n# determines the directory in which the\
    \ first disk image\n# is stored\n$pathFirstDisk = (Get-VMHardDiskDrive -VM $basevm\
    \ |\n                 Select-Object -First 1).Path\n$dirFirstDisk = Split-Path\
    \ $pathFirstDisk -Parent\nWrite-Output \"Virtual disk directory: $dirFirstDisk\"\
    \n```\n\n```\n# delete temporary export directory (if it exists)\ndelete-dir \"\
    $tmp\\$basename\"\n# perform export\nExport-VM -VM $basevm -Path $tmp\n$vmcxfile\
    \ = Get-ChildItem `\n    \"$tmp\\$basename\\Virtual Machines\\*.vmcx\"\nWrite-Output\
    \ \"VMCX file: $vmcxfile\"\n```\n\nSeveral clones of the virtual machine are now\
    \ created in a loop. The -Copy option means that this really creates a new virtual\
    \ machine with its own files. -GenerateNewId gives the virtual machine its own\
    \ Hyper-V identification number. The two -XxxPath options specify where to store\
    \ the virtual machine files.\n\nRename-VM gives the virtual machine a new name.\
    \ Hyper-V has no problem with multiple virtual machines having the same name,\
    \ but virtual machines with the same name only cause confusion.\n\nHyper-V automatically\
    \ assigns 2 CPUs and 2 GB of memory to new virtual machines. Set-VM reduces these\
    \ values. In addition, Set-VMNetworkAdapter sets a static MAC address for each\
    \ virtual machine. By default, Hyper-V uses dynamic MACs that are generated only\
    \ when a virtual machine is started. The first six digits of the MAC should always\
    \ be 00155d. This part of the MAC was reserved by Microsoft for Hyper-V.\n\n```\n\
    # (continued ...)\n# create $noOfClones copies of the exported VM\nfor ($i = 1;\
    \ $i -le $noOfClones; $i++) {\n    $cloneName = \"${basename}-clone${i}\"\n  \
    \  Write-Output \"setup $cloneName with MAC $mac\"\n```"
  merge: -1
  pgno: 455
- img_proc: true
  md: "```\n$clone = Import-VM -Path $vmcxfile -Copy -GenerateNewId `\n    -VhdDestinationPath\
    \ \"$dirFirstDisk\\$cloneName\" `\n    -VirtualMachinePath \"$dirFirstDisk\\$cloneName\"\
    \n\n# rename the clone\nRename-VM -VM $clone -NewName $cloneName\n\n# set properties\
    \ of the VM\nSet-VM -VM $clone -ProcessorCount 1 `\n    -MemoryStartupBytes 1GB\n\
    \n# set static MAC address\n$mac=\"00155d1234{0:d2}\" -f $i\nSet-VMNetworkAdapter\
    \ -VMName $cloneName -StaticMacAddress $mac\n}\n\n# delete temporary export directory\n\
    delete-dir \"$tmp\\$basename\"\n```\n\nNote that the script must be run with admin\
    \ rights. The script returns an error if the virtual machine files of a clone\
    \ already exist, for example when the script gets executed a second time. If you\
    \ want, you can extend the script to detect and delete existing clones within\
    \ the script."
