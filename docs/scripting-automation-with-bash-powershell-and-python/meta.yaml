    | `Ctrl` + `D` | 删除光标位置的字符 |

    | `Ctrl` + `E` | 将光标置于行尾 |

    | `Ctrl` + `K` | 删除从光标位置到行尾的所有内容 |

    | `Ctrl` + `R` abc | 搜索之前执行过的命令 abc |

    | `Ctrl` + `Y` | 再次插入最后删除的文本 |

    | `Alt` + `Backspace` | 向后删除一个单词 |


