  - "[PAGE 117]\n\nNow, we still need to set up the Path variable. This variable contains\
    \ a list of all directories where PowerShell searches for executable programs\
    \ and scripts. If you add the myscripts directory to this list, you can run scripts\
    \ stored there without specifying the path. No matter which directory is currently\
    \ active, it is now sufficient to enter Hello to start the Hello World script.\
    \ Thanks to the Path variable, you don't need to specify the location or the .ps1\
    \ identifier.\n\nTo configure this variable, search for **Edit System Environment\
    \ Variables** in the **Start** menu and then click the **Environment Variables**\
    \ button in the **System Properties** dialog. In the dialog box of the same name,\
    \ select Path from your user variables and add your script directory via **Edit\
    \ • New • Browse**.\n\nNote that changes to the Path variable take effect only\
    \ after restarting the terminal or PowerShell.\n\n# 4.5.4 Running Scripts on Linux\
    \ and macOS\n\nI generally assume in this chapter that you're using Windows. But\
    \ of course, you can also run PowerShell scripts on Linux or macOS. Although no\
    \ execution policy exists in Linux or macOS (Section 4.5.2), other rules must\
    \ be observed, such as the following:\n\n+   - First, the script file must start\
    \ with the what's called the *shebang line* (see also Chapter 3, Section 3.5):\n\
    \n    \n    #!/usr/bin/env pwsh\n    \n\n    This line specifies that the env\
    \ command must search for the pwsh shell and execute the following code with it.\
    \ For platform-independent scripts, you can also use this line on Windows, in\
    \ which case this line is simply considered a comment with no effect.\n\n- On\
    \ the other hand, you must mark the script file, via chmod as *executable* (hence,\
    \ x):\n\n    \n    $ chmod +x Hello.ps1       (Linux)\n    $ chmod a+x Hello.ps1\
    \      (macOS)\n    \n\nOnce you have met these two requirements, you can run\
    \ the script on Linux and macOS:\n\n```\n$ ./Hello.ps1\nHello, World!\n```\n\n\
    # 4.5.5 Example: Cleaning Up the Downloads Directory\n\nAfter our minimalistic\
    \ Hello World script, I want to return to an idea from Section 4.4, in the second\
    \ example: The Tidy-Downloads.ps1 script is supposed to search the *n* largest\
    \ files from the downloads directory and delete them after a query. In this way,\
    \ you"
  - "[PAGE 118]\n\ncan quickly create space in a minimal amount of time. (After all,\
    \ usually just a few huge files take up most of the space.)\n\nCompared to Section\
    \ 4.4, note two major new features:\n\n+   - The script uses the `DownPath` variable,\
    \ which contains the location of the downloads directory. The easiest way to determine\
    \ this location would be `$DownPath = \"$HOME\\Downloads\"`. However, this procedure\
    \ does not work in every case (see https://stackoverflow.com/questions/57947150).\
    \ For example, some users might have set different locations for their download\
    \ directories. The approach taken in this case is a bit more cumbersome and uses\
    \ the Known Folders API. However, this method also has a disadvantage: It works\
    \ only on Windows, not on Linux or macOS.\n- The number of files to be deleted\
    \ can be passed to the script via an optional parameter. If the parameter is missing,\
    \ the script searches for the ten largest files.\n\nMore details about the handling\
    \ of variables and parameters will follow later in this chapter. But the basic\
    \ concepts should be clear: In PowerShell, variables are prefixed with a dollar\
    \ sign ($) character. All parameters of a script or function are declared using\
    \ `param()`, where you can specify a data type, a default value, and a lot of\
    \ other additional information. (Unless you use functions, `param` must be the\
    \ first statement in the script!)\n\n```\n# Sample file Tidy-Downloads.ps1\n\n\
    # $NoOfFiles specifies how many files to delete\n# (by default: 10)\nparam([int]\
    \ $NoOfFiles = 10)\n\n# $DownPath contains the location of the Downloads directory\n\
    $DownPath = (New-Object -ComObject Shell.Application).\n            NameSpace('shell:Downloads').Self.Path\n\
    # delete the largest files in the downloads directory with\n# query\nGet-ChildItem\
    \ -Path $DownPath |\n    Sort-Object -Property Length -Descending |\n    Select-Object\
    \ -First $NoOfFiles |\n    Remove-Item -Confirm\n```\n\n> **Comments**\nAs with\
    \ most scripting languages, comments in PowerShell scripts are introduced with\
    \ the # character and then extend to the end of the line. Multiline comments are\
    \ introduced with <# and end with #>. Such comments are especially intended to\
    \ formulate help texts for Get-Help. The syntax is for comments is documented\
    \ at https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_comment_based_help."
  - "[PAGE 119]\n\n# 4.5.6 Differentiating Between PowerShell Versions\n\nOn many\
    \ computers, PowerShell versions 5.n and 7.n are installed in parallel. Nevertheless,\
    \ all scripts share the *.ps1 file extension. If your code explicitly requires\
    \ a specific PowerShell version or has other requirements, you must include one\
    \ or more #Requires statements in the script:\n\n+   - **#Requires -Version <n>**\n\
    \  The script can be executed only with the specified or a newer version.\n- **#Requires\
    \ -PSEdition Core**\n  The script can be executed only with the core variant (applies\
    \ to all PowerShell versions from 6.0).\n- **#Requires -PSEdition Desktop**\n\
    \  The script can be executed only with the desktop variant (all Windows PowerShell\
    \ versions up to and including 5.1).\n- **#Requires -Modules <name>**\n  The script\
    \ requires the specified module.\n- **#Requires -RunAsAdministrator**\n  The script\
    \ can only be executed with admin rights.\n\n#Requires statements can be placed\
    \ anywhere in the script.\n\n# 4.6 Variables, Strings, and Objects\n\nYou made\
    \ your first acquaintance with PowerShell variables in the previous section. Basically,\
    \ handling variables is quite simple: With $Name = . . . you can assign content\
    \ to a variable. Later, you can use this content again. To output the contents\
    \ of a variable, you can use Write-Output; an even easier approach is to name\
    \ the variable or a string as a standalone statement. Note that variables in strings\
    \ that are between double quotation marks are replaced by their contents. More\
    \ details about handling strings will follow later.\n\n```\n> $UserName = \"Michael\"\
    \n\n> Write-Output $UserName\nMichael\n\n> $UserName\nMichael\n\n> $UserId = 123\n\
    \n> Write-Output \"$UserName has the ID $UserId.\"\nMichael has the ID 123.\n\
    ```"
