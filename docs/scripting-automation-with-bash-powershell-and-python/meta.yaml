  md: 'Often, PowerShell variables contain objects (see also the following section).
    Intuitive access to their properties also fails. Instead, PowerShell outputs the
    contents of the variable and then the property name:


    ```

    > $process = Get-Process | Select-Object -First 1


    > Write-Output "Process name: $process.ProcessName" # Error

    Process name:

    System.Diagnostics.Process (AggregatorHost).ProcessName

    ```


    The solution in this case is what''s called *command substitution* with the `$(
    expr )` syntax. The `expr` expression is analyzed, and its result is inserted
    into the string. The expression does not have to reference existing variables—any
    cmdlet can be executed: The spaces before and after the parentheses are optional
    but can improve readability. The following listing shows some examples of command
    substitution:


    ```

    > Write-Output "Account name: $( $account.ToLower() )"

    Account name: maria


    > Write-Output "Process name: $( $process.ProcessName )"

    Process name: AggregatorHost


    > Write-Output "Date and time: $(Get-Date)"

    Date and time: 02/12/2023 10:08:34


    > $now = Get-Date

    > "Time in two hours: $($now.AddHours(2).ToShortTimeString())"

    Time in two hours: 12:08

    ```


