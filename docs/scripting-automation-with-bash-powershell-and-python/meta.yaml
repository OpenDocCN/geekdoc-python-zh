  md: 'The strange `Subsystem` setting `c:/progra~1/powershell/7/pwsh.exe` is the
    usual path to the PowerShell installation in DOS notation (i.e., with a maximum
    of 8 plus 3 characters per filename or directory name). This ancient notation
    is necessary because OpenSSH cannot handle Windows filenames with spaces.


    Possibly the correct path is also `c:/progra~2`! The following commands show how
    you can find out the short notation. First, you want to use `Get-Command` to determine
    the installation location of PowerShell. Then, you must run `cmd.exe` to get the
    short notation of the program directory:


    ```

    > (Get-Command pwsh).Path

    C:\Program Files (x86)\PowerShell\7\pwsh.exe

    > cmd /c ''for %X in ("C:\Program Files (x86)") do @echo %~sX''

    C:\PROGRA~2

    ```


    Finally, you need to restart the SSH server:


    ```

    > Restart-Service sshd

    ```


    The preparatory work for using a Linux machine for SSH remoting looks quite similar.
    On Linux, you must also add a `Subsystem` line to `sshd_config`. However, instead
    of `/usr/bin/pwsh`, you must use the path to PowerShell that is valid in your
    distribution. You can determine the path via `which pwsh`.


    ```

    # Linux host: File /etc/ssh/sshd_config

    ...

    Subsystem powershell /usr/bin/pwsh -sshs -nologo

    ```


    The following command restarts the SSH server:


    ```

    $ sudo systemctl restart sshd

    ```


    Once you have completed this preparatory work, you can use `New-PSSession` to
    establish an SSH connection and use it as a parameter for `Invoke-Command`. For
