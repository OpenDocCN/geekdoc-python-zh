  md: '# 4.13.5 Terminating the Script Execution Prematurely (Exit)


    You can use `Exit` to terminate a script prematurely. Optionally, you can return
    an error code in the process: 0 means no error arose; any other number is an error
    code whose meaning you can freely choose.


    ```

    Exit 1  # Terminate script with error code

    ```


    After executing a script, you can retrieve its exit code from the `$LASTEXITCODE`
    variable. Note that exit codes exist only for conventional commands and for scripts.
    (cmdlets do not have exit codes.)'
