    \ many other examples in this book, this script cannot be easily tried out on\
    \ any computer. You would need a Linux system with cron, ideally together with\
    \ a mail server. You also must modify the configuration variables at the beginning\
    \ of the script to suit your own needs. If you do not run the script with root\
    \ privileges, you must ensure that the logging file was writable for the script.\
    \ If the script is executed by `kofler` while `HOST` and `LOGFILE` remain unchanged,\
    \ you must execute the following two commands once:\n\n```\n$ sudo touch /var/log/example.com-ping-time.log\n\
    $ sudo chown kofler:root /var/log/example.com-ping-time.log\n```\n\nOnce the script\
    \ can be run manually without errors, the next step is to set up `/etc/crontab`.\
    \ For initial tests, the recommended approach is to set the first five columns\
    \ using `* * * * *`, which will execute the script once per minute. Syntax errors\
    \ in `/etc/crontab` will prevent both your script and other cron jobs from running.\
    \ To track down such errors, run `systemctl status cron` and `journalctl -u cron`,\
    \ which will provide you with information about the current cron status as well\
    \ as the last logging outputs.\n\n# 11.2.2 Real Monitoring\n\nSelling this mini\
    \ script as a monitoring solution is a bit daring. “Real” monitoring software\
    \ checks various server parameters, sends warning emails only on every status"
  - '[PAGE 314]


    message (and not on every error, which leads to an abundance of monitoring mails),
    offers a graphical visualization of the monitored parameters, and more.

    Of course, you could conceivably implement all these capabilities using custom
    scripts, but using dedicated monitoring tools, such as *Grafana*, *Prometheus*,
    *Nagios*, etc., make much more sense. Although the initial startup of these tools
    may require considerable work, they provide a wealth of functions combined with
    expedient user interfaces (UIs).


    # 11.3 Microsoft Windows Task Scheduler


    *Microsoft Windows Task Scheduler* allows Windows to run programs and scripts
    at specified times and is, therefore, the Windows counterpart to cron. The program
    is equipped with a UI, as you would expect in the Windows environment. However,
    Microsoft Windows Task Scheduler has all the charm of the 1990s, to put it nicely.
    Its nested dialogs are, at best, as intuitive as the `crontab` syntax. Also, the
    program is amazingly slow and sometimes it hangs completely. If the start of jobs
    does not work as intended, no clear error messages are displayed despite event
    logging. In a nutshell, using this program is a pain. Why Microsoft can''t get
    its act together and reimplement this central Windows component remains a mystery.
    (The current version has not been significantly changed since 2006.)


    ![](img/a7fa45d496335c22ffb14c3275e24ffb_314_0.png)


    Figure 11.1 Microsoft Windows Task Scheduler''s Antiquated UI'
  - "[PAGE 315]\n\nTo become familiar with Microsoft Windows Task Scheduler, let's\
    \ create a tiny script that logs the date and time to a logging file:\n\n```\n\
    # File log-date.ps1\nGet-Date >> date.log\n```\n\nThis script is supposed to be\
    \ executed every hour. For this purpose, open Microsoft Windows Task Scheduler\
    \ and click the **Create Task** command in the **Actions** sidebar. This step\
    \ will take you to a dialog box with several tabs:\n\n+   - **General**\n  In\
    \ this tab, you can give the task a name, specify in which account your script\
    \ should be run (usually your own), and specify whether it should be started only\
    \ after a login or always when the computer is running.\n  If you want to run\
    \ a script with administrator privileges, you should not change the user or group,\
    \ but just click the **Run with highest privileges** option.\n- **Triggers**\n\
    \  In this tab, you can add a new trigger to specify when and how often the action\
    \ should take place. To run the script every hour, you must select **Daily** with\
    \ the current time as the start time and **Repeat task every hour** as well as\
    \ **For a duration of: 1 day**. (The more plausible setting **For the duration\
    \ of: Indefinitely** did not work in my tests.)\n  In contrast to cron, not only\
    \ does Microsoft Windows Task Scheduler support time-based triggers, but it can\
    \ also execute actions when various events occur, for example, when logging in\
    \ or when the computer is currently in idle mode.\n- **Actions**\n  As a new action,\
    \ you specify the script to be run. The procedure is more cumbersome than you\
    \ would expect: The reason is that as a **program/script**, you must not simply\
    \ specify the path of your PowerShell script file. Instead, you need to specify\
    \ `pwsh` for PowerShell 7.n here. Only if your script is to be executed by the\
    \ older Windows PowerShell 5.n is the program name `powershell`.\n  In the **Add\
    \ arguments** input field, specify the `-File` option and enter the full path\
    \ to your script. When typing, you must not make any typos. Do not forget `-File`!\n\
    \  By default, the `%windir%\\System32\\` directory is active when the script\
    \ is run. If you do not want to use this directory (e.g., because the script should\
    \ read or write files in a different directory), you must specify the relevant\
    \ directory in the **Start in** field. For the sample script to log the date and\
    \ time in the same directory where the script file is located, you must specify\
    \ this directory.\n- **Conditions**\n  This tab defaults to performing the action\
    \ only when your computer is running in network mode. You can deactivate this\
    \ option if you also want to run or test the task while using your notebook in\
    \ battery mode."
- md: "## 11.3.1 Troubleshooting\n\nFrom experience, automated script execution does\
    \ not always work right away. For troubleshooting purposes, your first step should\
    \ be to enable the **Enable All Tasks History** command in Microsoft Windows Task\
    \ Scheduler. Behind this somewhat cryptic description is a logging function. Microsoft\
    \ Windows Task Scheduler can log when actions are started and why, when they end,\
    \ and more.\n\nYou can also use the **Run** command to start a script manually\
    \ at any time, regardless of the selected trigger time. In the action list, in\
    \ the **Next Run Time** column, you can see what the next regular start time of\
    \ your script is.\n\nOn one of my test machines, Microsoft Windows Task Scheduler\
    \ was completely unable to find `pwsh`, despite (presumably) correct `PATH` settings.\
    \ In the event logging, only *file not found* was logged, without a clear indication\
    \ as to which file was not found (`pwsh`, the script, another file?). Ultimately,\
    \ I uninstalled PowerShell entirely, reinstalled it using `winget`, and rebooted\
    \ the machine. After that, it worked.\n\n## 11.3.2 Setting Up Tasks via cmdlets\n\
    \nFortunately, Microsoft Windows Task Scheduler can also be controlled by cmdlets.\
    \ `Get-ScheduledTask` returns a seemingly endless list of all actions stored in\
    \ the system. If you've ever wondered why Windows often feels so sluggish, now\
    \ you know the reason. On my test computer, the cmdlet returned 165 active tasks!\n\
    \nThe Windows Task Manager UI always shows only the actions for a specific path—by\
    \ default, those for the \\ path, that is, for the root directory of the *task\
    \ library*. You can view all other actions when you select a subdirectory, for\
    \ example, *Microsoft\\Windows\\Bitlocker*.\n\n```\n> Get-ScheduledTask | Where-Object\
    \ { $_.State -ne 'Disabled' }\n\nTaskPath          TaskName                  \
    \  State\n-------           --------                    -----\n\\            \
    \     GoogleUpdateTaskMachine...  Ready\n\\                 log date         \
    \           Ready\n\\                 start syncthing             Running\n\\\
    Microsoft\\Windows\\...  .NET Framework NGEN v4.0...  Ready\n...\n```\n\n> **For\
    \ Windows Only!**\n\nAll cmdlets presented in this section are available only\
    \ when you run PowerShell scripts on Windows. On Linux and macOS, no task scheduler\
    \ exists, but other mechanisms (i.e., cron, systemd-timer, and launchd) can be\
    \ used instead, but these capabilities cannot be controlled via cmdlets.\n\n`Get-ScheduledTaskInfo`\
    \ allows you to determine when the task was last performed and when the next start\
    \ is scheduled:\n\n```\n> Get-ScheduledTaskInfo 'log date'\nLastRunTime      \
    \  : 02.28.2023 09:24:24\nNextRunTime        : 02.28.2023 11:20:20\nNumberOfMissedRuns\
    \ : 1\n...\n\n> Get-ScheduledTask 'log date' | Get-ScheduledTaskInfo\n(same result)\n\
    ```\n\nBy combining a few cmdlets, you can even set up a new task. Here `New-ScheduledTaskTrigger`\
    \ creates an object for the schedule and `New-ScheduledTaskAction` creates an\
    \ object for the task. `Register-ScheduledTask` saves the new job.\n\n```\n> $trigger\
    \ = New-ScheduledTaskTrigger -Once -At '6:00am' `\n    -RepetitionInterval (New-TimeSpan\
    \ -Hours 1) `\n    -RepetitionDuration (New-TimeSpan -Days 1000)\n> $action =\
    \ New-ScheduledTaskAction -Execute 'pwsh' `\n    -Argument '-File C:\\Users\\\
    kofler\\log-date.ps1' `\n    -WorkingDirectory 'C:\\Users\\kofler'\n> Register-ScheduledTask\
    \ -TaskName 'log-date' `\n    -Trigger $trigger -Action $action\n\nTaskPath  \
    \  TaskName    State\n--------    --------    -----\n\\           log-date   \
    \ Ready\n```\n\n## 11.4 Example: Saving Exchange Rates\n\nThe European National\
    \ Bank publishes official reference rates between the euro and other major currencies\
    \ once a day at https://www.ecb.europa.eu/stats/eurofxref/eurofxref-daily.xml.\
    \ A sample of the daily XML file is shown in the following example:\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<gesmes:Envelope\n    xmlns:gesmes=\"\
    http://www.gesmes.org/xml/2002-08-01\"\n    xmlns=\"http://www.ecb.int/vocabulary/2002-08-01/eurofxref\"\
    >\n    <gesmes:subject>Reference rates</gesmes:subject>\n    <gesmes:Sender>\n\
    \        <gesmes:name>European Central Bank</gesmes:name>\n    </gesmes:Sender>\n\
    \    <Cube>\n        <Cube time=\"2023-03-01\">\n            <Cube currency=\"\
    USD\" rate=\"1.0684\"/>\n            <Cube currency=\"JPY\" rate=\"144.82\"/>\n\
    \            <Cube currency=\"CHF\" rate=\"0.9997\"/>\n            ...\n     \
    \   </Cube>\n```\n\nThe goal of the following example is to save the exchange\
    \ rate between the Euro and the Swiss Franc (CHF) once a day in a comma-separated\
    \ values (CSV) file, which should have the following format:\n\n```\ndate;chf_rate\n\
    2023-03-01;0.9997\n```\n\nWe don't want the current date logged but instead the\
    \ date embedded in the XML file using the `<Cube time=...>` tag. Analyzing the\
    \ file is relatively easy despite the strange cube nesting (see Chapter 10, Section\
    \ 10.4). The only new feature at this point is the `Invoke-RestMethod` cmdlet\
    \ for downloading the XML file, which I'll introduce in more detail in Chapter\
    \ 18.\n\n```\n# Sample file get-exchange-rate.ps1\n# download and analyze XML\
    \ document\n$csv = \"chf-rates.csv\"\n$url = \"https://www.ecb.europa.eu/stats/eurofxref/\n\
    \        eurofxref-daily.xml\"\n$ecb = Invoke-RestMethod $url\n$date = $ecb.Envelope.Cube.Cube.time\n\
    $rate = ($ecb.Envelope.Cube.Cube.Cube |\n         Where-Object {$_.currency -eq\
    \ 'CHF'}).rate\n# if needed, create CSV file\nif (!(Test-Path $csv)) {\n    \"\
    date;chf_rate\" | Out-File $csv\n}\n# add current rate\nAdd-Content $csv \"$date;$rate\"\
    \n```\n\nNow, you just need to register the script with Microsoft Windows Task\
    \ Scheduler for the daily call. Since the rates are usually updated around 4 pm\
    \ Central European Time, a convenient time for the daily call is between 5 pm\
    \ and 6 pm.\n\nSince the ECB calculates exchange rates only on business days,\
    \ the CSV file will contain doubles if executed daily. If you want, you can enhance\
    \ the script to check if there is already an entry for the date contained in $date\
    \ before you use Add-Content.\n\n## 11.5 Tracking File System Changes\n\nRelatively\
    \ often, a scenario arises where, instead of executing actions at a predefined\
    \ time, they should be executed when files change or when new files are added.\
    \ The script that runs most often in my daily work monitors all Markdown files\
    \ in a local directory. As soon as a file changes, the script calls various commands\
    \ to create an updated PDF from the Markdown file with a preview of the chapter\
    \ I'm working on. This Bash script has the following structure:\n\n```\n# Sample\
    \ file run-pandoc.sh\nwhile true; do\n    for mdfile in *.md; do\n        pdffile=${mdfile%.md}.pdf\n\
    \        if [ $mdfile -nt $pdffile ]; then\n            echo $mdfile\n       \
    \     pandoc ... $mdfile -o $pdffile\n        fi\n    done\n    sleep 1\ndone\n\
    ```\n\nThis script is easy to understand: `while true` forms an infinite loop.\
    \ As a result, the script runs until it is stopped via `Ctrl` + `C`. `for mdfile`\
    \ runs through all `*.md` files and then checks with the `-nt` operator (*newer\
    \ than*) whether the Markdown file is newer than the corresponding PDF file. In\
    \ this case, the name of the Markdown file is output, and a new PDF file is created\
    \ using `pandoc`, which is a command to convert documents between different formats\
    \ (see https://pandoc.org).\n\nA crucial component of the script is `sleep`, which\
    \ causes the script to pause for 1 second after each run. (Depending on the purpose\
    \ of monitoring the directory, a longer pause is also conceivable.) Without `sleep`,\
    \ the script would completely utilize a CPU. If you use `sleep`, however, the\
    \ CPU load caused by the script is negligible.\n\nThis task can be solved just\
    \ as elegantly with PowerShell. The only difference is the `if` condition, which\
    \ also contains an additional test that checks whether the PDF file exists at\
    \ all. If the PDF file doesn't exist, the comparison of `LastWriteTimeUtc` would\
    \ result in an error. Bash is a bit more laid back in this regard.\n\n```\n# Sample\
    \ file run-pandoc.ps1\nwhile($true) {\n    foreach($mdfile in Get-ChildItem -Path\
    \ *.md) {\n        $pdffile = $mdfile.FullName.Replace(\".md\", \".pdf\")\n  \
    \      if(! (Test-Path $pdffile) -or\n            ($mdfile.LastWriteTimeUtc -gt\n\
    \             (Get-Item $pdffile).LastWriteTimeUtc))\n        {\n            Write-Host\
    \ $mdfile.Name\n            C:\\path\\to\\pandoc.exe $mdfile.FullName -o $pdffile\n\
    \        }\n    }\n    Start-Sleep -Seconds 1\n}\n```\n\n### 11.5.1 inotify\n\n\
    The scripts presented earlier are only useful if the number of files to be monitored\
    \ is small. Isn't there any better solution? Yes, depending on the operating system\
    \ and programming language you use.\n\nAt this point, I will focus on using the\
    \ `inotify` function, which is a Linux kernel function for monitoring the file\
    \ system. You can use this function to register a directory, and you will subsequently\
    \ always be notified when changes occur in this directory.\n\nTo use `inotify`\
    \ in Python scripts, you first must install the `pyinotify` module with the following\
    \ command:\n\n```\n$ pip[3] install pyinotify\n```"
  mdcn: "## 11.3.1 故障排除\n\n根据经验，自动化脚本执行并非总能立即成功。出于故障排除的目的，你的第一步应该是在 Microsoft Windows\
    \ 任务计划程序中启用 **启用所有任务历史记录** 命令。这个描述有些晦涩的功能背后，其实是一个日志记录功能。Microsoft Windows 任务计划程序可以记录操作何时开始、为何开始、何时结束等信息。\n\
    \n你也可以随时使用 **运行** 命令手动启动脚本，无论选定的触发时间是什么。在操作列表的 **下次运行时间** 列中，你可以看到脚本的下一个常规启动时间。\n\
    \n在我的一台测试机上，Microsoft Windows 任务计划程序完全无法找到 `pwsh`，尽管（据推测）`PATH` 设置是正确的。在事件日志中，只记录了\
    \ *找不到文件*，但没有明确指出是哪个文件未找到（`pwsh`、脚本还是其他文件？）。最终，我完全卸载了 PowerShell，使用 `winget` 重新安装，然后重启了机器。之后，它就正常工作了。\n\
    \n## 11.3.2 通过 cmdlet 设置任务\n\n幸运的是，Microsoft Windows 任务计划程序也可以通过 cmdlet 进行控制。`Get-ScheduledTask`\
    \ 会返回一个看似无穷无尽的列表，包含系统中存储的所有操作。如果你曾经好奇为什么 Windows 经常感觉如此迟钝，现在你知道原因了。在我的测试计算机上，该\
    \ cmdlet 返回了 165 个活动任务！\n\nWindows 任务管理器 UI 总是只显示特定路径下的操作——默认情况下，是 `\\` 路径下的操作，即\
    \ *任务库* 根目录下的操作。当你选择一个子目录时，例如 *Microsoft\\Windows\\Bitlocker*，你可以查看所有其他操作。\n\n\
    ```\n> Get-ScheduledTask | Where-Object { $_.State -ne 'Disabled' }\n\nTaskPath\
    \          TaskName                    State\n-------           --------     \
    \               -----\n\\                 GoogleUpdateTaskMachine...  Ready\n\\\
    \                 log date                    Ready\n\\                 start\
    \ syncthing             Running\n\\Microsoft\\Windows\\...  .NET Framework NGEN\
    \ v4.0...  Ready\n...\n```\n\n> **仅限 Windows！**\n\n本节介绍的所有 cmdlet 仅在 Windows 上运行\
    \ PowerShell 脚本时可用。在 Linux 和 macOS 上，不存在任务计划程序，但可以使用其他机制（即 cron、systemd-timer\
    \ 和 launchd）代替，但这些功能无法通过 cmdlet 控制。\n\n`Get-ScheduledTaskInfo` 允许你确定任务上次执行的时间以及下次启动的计划时间：\n\
    \n```\n> Get-ScheduledTaskInfo 'log date'\nLastRunTime        : 02.28.2023 09:24:24\n\
    NextRunTime        : 02.28.2023 11:20:20\nNumberOfMissedRuns : 1\n...\n\n> Get-ScheduledTask\
    \ 'log date' | Get-ScheduledTaskInfo\n（相同结果）\n```\n\n通过组合几个 cmdlet，你甚至可以设置一个新任务。这里\
    \ `New-ScheduledTaskTrigger` 创建一个用于计划的对象，`New-ScheduledTaskAction` 创建一个用于任务的对象。`Register-ScheduledTask`\
    \ 保存新作业。\n\n```\n> $trigger = New-ScheduledTaskTrigger -Once -At '6:00am' `\n\
    \    -RepetitionInterval (New-TimeSpan -Hours 1) `\n    -RepetitionDuration (New-TimeSpan\
    \ -Days 1000)\n> $action = New-ScheduledTaskAction -Execute 'pwsh' `\n    -Argument\
    \ '-File C:\\Users\\kofler\\log-date.ps1' `\n    -WorkingDirectory 'C:\\Users\\\
    kofler'\n> Register-ScheduledTask -TaskName 'log-date' `\n    -Trigger $trigger\
    \ -Action $action\n\nTaskPath    TaskName    State\n--------    --------    -----\n\
    \\           log-date    Ready\n```\n\n## 11.4 示例：保存汇率\n\n欧洲中央银行每天在 https://www.ecb.europa.eu/stats/eurofxref/eurofxref-daily.xml\
    \ 发布欧元与其他主要货币之间的官方参考汇率。以下示例展示了每日 XML 文件的一个片段：\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<gesmes:Envelope\n    xmlns:gesmes=\"http://www.gesmes.org/xml/2002-08-01\"\
    \n    xmlns=\"http://www.ecb.int/vocabulary/2002-08-01/eurofxref\">\n    <gesmes:subject>Reference\
    \ rates</gesmes:subject>\n    <gesmes:Sender>\n        <gesmes:name>European Central\
    \ Bank</gesmes:name>\n    </gesmes:Sender>\n    <Cube>\n        <Cube time=\"\
    2023-03-01\">\n            <Cube currency=\"USD\" rate=\"1.0684\"/>\n        \
    \    <Cube currency=\"JPY\" rate=\"144.82\"/>\n            <Cube currency=\"CHF\"\
    \ rate=\"0.9997\"/>\n            ...\n        </Cube>\n```\n\n以下示例的目标是每天将欧元与瑞士法郎（CHF）之间的汇率保存到一个逗号分隔值（CSV）文件中，该文件应具有以下格式：\n\
    \n```\ndate;chf_rate\n2023-03-01;0.9997\n```\n\n我们不希望记录当前日期，而是希望记录 XML 文件中使用 `<Cube\
    \ time=...>` 标签嵌入的日期。尽管存在奇怪的 Cube 嵌套（参见第 10 章，第 10.4 节），但分析文件相对容易。此时唯一的新功能是用于下载\
    \ XML 文件的 `Invoke-RestMethod` cmdlet，我将在第 18 章更详细地介绍它。\n\n```\n# 示例文件 get-exchange-rate.ps1\n\
    # 下载并分析 XML 文档\n$csv = \"chf-rates.csv\"\n$url = \"https://www.ecb.europa.eu/stats/eurofxref/\n\
    \        eurofxref-daily.xml\"\n$ecb = Invoke-RestMethod $url\n$date = $ecb.Envelope.Cube.Cube.time\n\
    $rate = ($ecb.Envelope.Cube.Cube.Cube |\n         Where-Object {$_.currency -eq\
    \ 'CHF'}).rate\n# 如果需要，创建 CSV 文件\nif (!(Test-Path $csv)) {\n    \"date;chf_rate\"\
    \ | Out-File $csv\n}\n# 添加当前汇率\nAdd-Content $csv \"$date;$rate\"\n```\n\n现在，你只需要在\
    \ Microsoft Windows 任务计划程序中注册该脚本以进行每日调用。由于汇率通常在中欧时间下午 4 点左右更新，因此每日调用的方便时间是在下午\
    \ 5 点到 6 点之间。\n\n由于欧洲中央银行仅在工作日计算汇率，因此如果每天执行，CSV 文件将包含重复条目。如果需要，你可以在使用 `Add-Content`\
    \ 之前增强脚本，以检查是否已存在 `$date` 中包含的日期的条目。\n\n## 11.5 跟踪文件系统更改\n\n相对常见的情况是，需要在文件更改或添加新文件时执行操作，而不是在预定义的时间执行。在我的日常工作中最常运行的脚本会监控本地目录中的所有\
    \ Markdown 文件。一旦文件发生更改，该脚本就会调用各种命令，从 Markdown 文件创建更新的 PDF，其中包含我正在处理的章节预览。这个 Bash\
    \ 脚本的结构如下：\n\n```\n# 示例文件 run-pandoc.sh\nwhile true; do\n    for mdfile in *.md;\
    \ do\n        pdffile=${mdfile%.md}.pdf\n        if [ $mdfile -nt $pdffile ];\
    \ then\n            echo $mdfile\n            pandoc ... $mdfile -o $pdffile\n\
    \        fi\n    done\n    sleep 1\ndone\n```\n\n这个脚本很容易理解：`while true` 形成一个无限循环。因此，脚本会一直运行，直到通过\
    \ `Ctrl` + `C` 停止。`for mdfile` 遍历所有 `*.md` 文件，然后使用 `-nt` 运算符（*比...新*）检查 Markdown\
    \ 文件是否比相应的 PDF 文件更新。在这种情况下，会输出 Markdown 文件的名称，并使用 `pandoc`（一个用于在不同格式之间转换文档的命令，参见\
    \ https://pandoc.org）创建新的 PDF 文件。\n\n脚本的一个关键组件是 `sleep`，它使脚本在每次运行后暂停 1 秒。（根据监控目录的目的，更长的暂停也是可以想象的。）如果没有\
    \ `sleep`，脚本将完全占用一个 CPU。然而，如果你使用 `sleep`，脚本引起的 CPU 负载可以忽略不计。\n\n这个任务同样可以用 PowerShell\
    \ 优雅地解决。唯一的区别是 `if` 条件，它还包含一个额外的测试，检查 PDF 文件是否根本不存在。如果 PDF 文件不存在，比较 `LastWriteTimeUtc`\
    \ 会导致错误。Bash 在这方面则更为宽松。\n\n```\n# 示例文件 run-pandoc.ps1\nwhile($true) {\n    foreach($mdfile\
    \ in Get-ChildItem -Path *.md) {\n        $pdffile = $mdfile.FullName.Replace(\"\
    .md\", \".pdf\")\n        if(! (Test-Path $pdffile) -or\n            ($mdfile.LastWriteTimeUtc\
    \ -gt\n             (Get-Item $pdffile).LastWriteTimeUtc))\n        {\n      \
    \      Write-Host $mdfile.Name\n            C:\\path\\to\\pandoc.exe $mdfile.FullName\
    \ -o $pdffile\n        }\n    }\n    Start-Sleep -Seconds 1\n}\n```\n\n### 11.5.1\
    \ inotify\n\n前面介绍的脚本仅在要监控的文件数量较少时才有用。难道没有更好的解决方案吗？是的，这取决于你使用的操作系统和编程语言。\n\n在此，我将重点介绍使用\
