    \ Result: 9\n```\n\n# 5.13.1 Global and Local Variables\n\nFunctions can read\
    \ (but not modify) variables that are defined outside the function:\n\n```\ndef\
    \ f1():\n    print(x)\n\nx = 3\nf1()  # Output 3\n```"
