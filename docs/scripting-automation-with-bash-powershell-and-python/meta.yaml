    # 8.1.3 cut


    cut (not to be confused with cat!) cuts columns from a text. For most applications,
    knowing the following three options is usually sufficient:


    +   - -d specifies the separator character. The default setting is the tab character.
    Special characters often must be “quoted” by \ or put in quotation marks—for example,
    -d\ ; or -d '';''.

    - -f selects the desired columns. For example, -f 1,4 extracts the first and fourth
    columns, and -f 4-7 extracts columns four through seven.

    - -s ignores lines in which the separator does not occur.


    If you want to see only the names and email addresses of the employees, you could
    use the following command:


    ```

    $ cut -d '';'' -f 1,2,9 employees.txt


    FirstName;LastName;Email

    Ruthanne;Ferguson;ruthanne_ferguson5693@fastmail.cn

    Lorie;Warner;lorie7961@mailforce.net

    Kerri;Tsioupra;kerri2377@emailuser.net

    ...

    ```


    The next two commands identify the email addresses of employees in New York State.
    First, the addresses are displayed in the terminal, and thanks to less, you can
    browse through the result at your leisure using the cursor keys; then the results
    are saved in emails.txt.


    ```

    $ grep '';NY;'' employees.txt | cut -d '';'' -f 9 | less


    nakesha_lambrinou6390@speedymail.org

    capelle1740@fastmailbox.net

    noble7595@internetemails.net

    ...


    $ grep '';NY;'' employees.txt | cut -d '';'' -f 9 > emails.txt

    ```


    # 8.1.4 sort


    In the simplest case, sort my.txt causes the lines to be output to the screen
    in alphabetical order. Instead of processing a file, however, you can use the
    pipe operator to sort the results of another command. As usual, a few options
    are available to control the sorting behavior:


    +   - -n sorts numerically, for instance, 1, 2, 3, 10, and so on (not 1, 10, 2,
    3, etc.).

    - -r sorts in descending order instead of ascending order (reverse).'
  - '[PAGE 252]


    +   - `-k <n>` specifies from which column onwards sorting should occur. The option
    is mostly used in combination with `-t`.

    - `-t` specifies the separator for columns, for instance, `-t '';''`. Without
    this option, `sort` considers the transition from a space to a text character
    as the start of a new column.


    The following command creates two lists of employees sorted by name:


    ```

    # Sort by first name (i.e., from the beginning of the line)

    $ sort employees.txt


    # Sort by last name (second column)

    $ sort -t '';'' -k 2 employees.txt

    ```


    > **Use sort with Caution!**


    Sorting 500 lines should not challenge a modern computer. However, you should
    proceed with caution when using `sort` with larger volumes of data. When you sort
    a logging file with millions of lines, a lot of time and memory may be required.
    Furthermore, with `cmd | sort`, `sort` cannot start working until `cmd` is complete.


    If possible, you should first filter large text files using `grep` and perhaps
    reduce the number of columns via `cut` before applying `sort`.


    # 8.1.5 head and tail


    Especially with regard to `sort`, a common scenario is that you only want to see
    the first or last *n* results. In this case, `head` and `tail` come to the rescue:


