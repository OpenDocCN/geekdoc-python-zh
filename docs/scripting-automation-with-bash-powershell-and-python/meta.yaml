  md: "# 4.8.3 Duplicating Output (Tee-Object)\n\nSometimes, you want to see the output\
    \ of a cmdlet or script on the screen *and* save it to a file. To do this, `Tee-Object`\
    \ can help you: This command is used with the pipe operator. It takes the success\
    \ stream, displays it, and redirects it to the specified file at the same time.\
    \ If you run the following command, you'll see the files of the current directory\
    \ in the terminal; at the same time the file list will be saved in `files.txt`.\n\
    \n```\n> Get-ChildItem | Tee-Object files.txt\n```\n\n`Tee-Object` only considers\
    \ the success stream. However, you can use `n>&1` to add another stream to the\
    \ success stream first:\n\n```\n> Get-ChildItem 2>&1 | Tee-Object files-and-errors.txt\n\
    ```\n\n# 4.8.4 (Not) Formatting the Output\n\nBy default, PowerShell formats every\
    \ output. For example, `Get-ChildItem` returns an array of `FileInfo` and `DirectoryInfo`\
    \ objects as a result. However, PowerShell does not display these objects with\
    \ all their properties but instead creates a text representation from these objects\
    \ that is reasonably readable for humans. Alternative representations with more\
    \ or less details can be obtained by passing the outputs to various `Format` commands:\n\
    \n```\n> Get-ChildItem | Format-List\n> Get-ChildItem | Format-Table\n> Get-ChildItem\
    \ | Format-Custom Name,Length\n```\n\nWhen you redirect the result of a PowerShell\
    \ command to a text file, an often appropriate task is to eliminate any formatting.\
    \ With the sample command `Get-ChildItem`, you're probably only interested in\
    \ the filenames, not in a table with multiple columns, or color codes for a nicer\
    \ representation of the column labels, etc. Unfortunately, this common task can\
    \ only be realized in a rather awkward way in PowerShell.\nThe following example\
    \ shows a possible approach: The result of `Get-ChildItem` is passed to `ForEach-Object`,\
    \ and `$_.Name` extracts the filename from each object. (Details about `ForEach-Object`\
    \ and the `$_` notation follow in Section 4.9.) `Out-String` outputs the resulting\
    \ names without further formatting. Finally, `>` redirects all output to the `files.txt`\
    \ file. This file then contains a file or directory name on each line.\n\n```\n\
    > Get-ChildItem |\n    ForEach-Object {$_.Name} |\n    Out-String > files.txt\n\
    ```\n\n# 4.8.5 No Input Redirection\n\nMany shells also provide the option of\
    \ input redirection via `<`. On Linux, `command1 | command2` is therefore equivalent\
    \ to the following command sequence (apart from the fact that the detour via a\
    \ file costs storage space and time):"
  merge: -1
  pgno: 135
- img_proc: true
  md: "```\n$ command1 > file.txt\n$ command2 < file.txt\n```\n\nUnfortunately, PowerShell\
    \ does not support < because PowerShell commands expect objects most of the time.\
    \ But if you first write the result of a PowerShell command into a text file via\
    \ `command1 > file.txt`, the object information will be lost. The text file contains\
    \ only formatted text and subsequently cannot serve as a basis for processing\
    \ the data in another command.\n\nThe lack of input redirection becomes problematic\
    \ when you use commands from the Linux world that require just input redirection.\
    \ For example, you can make a backup of a database using `mysqldump` and restore\
    \ it later via `mysql`. On Linux and macOS, the following code would work:\n\n\
    ```\n$ mysqldump dbname > backup.sql    # Create backup\n$ mysql dbname  < backup.sql\
    \      # Restore database\n```\n\nIn PowerShell, only the first command works,\
