- img_proc: true
  md: "The file is approximately 8 MB in size and contains 22,000 lines of data from\
    \ 125 years and from 222 countries or regions. More than 120 columns provide information\
    \ about every conceivable aspect of energy use and production. Let’s concentrate\
    \ on the first three columns and column 32 (energy_per_capita) with the primary\
    \ energy consumption per capita and year in kilowatt hours. According to the example\
    \ rows shown earlier, this consumption amounted in 2022 to approximately 31,000\
    \ kWh in China, approximately 41,000 kWh in Germany, and almost 79,000 kWh in\
    \ the United States.\n\n# 8.2.1 Data Extraction via Script\n\nThe task of the\
    \ following script is to download a CSV file from the internet, save it locally,\
    \ and then extract the per capita energy consumption for a specific country for\
    \ 1 year:\n\n```\n./get-energy-consumption.sh GBR 1999\nPrimary energy consumption\
