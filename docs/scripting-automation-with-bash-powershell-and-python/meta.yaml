  md: '> **No Globbing Results**


    Globbing only works if there is at least *one* matching file. If there is no JPG
    file at all in the current directory, then the evaluation of `*.jpg` is useless.
    Bash then passes the original string to `cp`. The command searches for a file
    that''s exactly named `*.jpg`. This file cannot be found, so `cp` returns the
    error message, *file not found*.


    You can prevent such errors using `shopt -s nullglob`. The `nullglob` option causes
    the pattern to be removed if no files match. However, `cp *.jgp some/path/` triggers
