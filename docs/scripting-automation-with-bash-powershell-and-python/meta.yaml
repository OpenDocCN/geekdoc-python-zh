  md: 'You already know the shebang syntax from Bash: The line specifies which program
    (which interpreter) should execute the following code. But what is new in this
    case is `env`: Python is installed in different directories depending on the operating
    system or distribution. `env` searches in the common directories and therefore
    works more reliably than specifying a rigid path.


    Now, you need to mark your script as executable using `chmod` before starting
    it in the terminal:


    ```

    $ chmod +x hello-world.py          (Linux)

    $ chmod a+x hello-world.py         (macOS)


    $ ./hello-world.py


    Hello, World!

    ```


    On Windows, the shebang line is not relevant; the `*.py` identifier is sufficient.
    However, the shebang line does not cause any trouble either and increases compatibility
    with other operating systems.


    > **Python Scripts Are Executed in Separate Windows**


    On Windows, a new terminal window may open each time a Python script is started
    from a terminal running PowerShell. The script will run there, then the window
    will close without giving you a chance to see the result.


    The reason for this misbehavior is that the `.py` identifier is not listed in
    the `PATHEXT` system variable. Actually, this omission should not happen (at least
    not after a Python reinstallation), but I can confirm from painful experience
    that it does happen sometimes. Well, that''s Windows!


    The solution is to search for “Edit System Environment Variables” in the **Start**
    menu. Then, the **Control Panel** dialog appears, in which you must click **Environment
    Variables**. Next, look for `PATHEXT` (not `Path`) in the system variables (lower
    half of the dialog), edit it, and add a semicolon and the extension `.py`. After
    restarting the terminal, your Python scripts should run *within* the terminal.


