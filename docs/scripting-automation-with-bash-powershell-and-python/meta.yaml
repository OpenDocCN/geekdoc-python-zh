    ■ Regular expression: #([0-9a-fA-F]{1,2})\1\1

    This expression recognizes CSS color codes for gray values. Such color codes must
    be introduced using the # character and may contain three or six hexadecimal digits.
    For the target color to be a gray value, the red, green, and blue components must
    each be equal. The twofold repetition of the first group serves this purpose.

    For example, the expression applies to the following color codes: #000, #222222,
    # ababab, #777 and #777777. The expression does not apply to #aabbcc, #abc, #0000
    (the wrong number of digits), or 000 (the introductory # character is missing).

    The expression unfortunately fails with #aAa. This value is a correct gray value,
    but a (recognized group) and A (first repetition) do not match in terms of uppercase
    and lowercase.


    | Expression | Meaning |

    |---|---|

    | ( . . . ) | Everything between ( and ) forms a group |

    | (abc) | The abc expression as a group |

    | (abc|efg) | Alternatives are the abc or efg expressions |

    | \1, \2 | Reference to the contents of the 1st or 2nd group (POSIX, PCRE) |

    | $1, $2 | Reference to the contents of the 1st or 2nd group (PCRE 2) |


