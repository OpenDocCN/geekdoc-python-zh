    # 9.2.1 Quantifiers


    Quantifiers allow you to express how often an expression may or must occur. You
    can apply quantifiers to character ranges or groups. Caution: abc+ first means
    ab, then any number of times c (but at least once). If, on the other hand, abc
    may occur any number of times, you must express this using (abc)+.


    | Expression | Meaning |

    |---|---|

    | x? | Zero or one time the characters described by x |

    | x* | Zero times or more (any number of times) |

    | x+ | Once or more (but not zero times!) |

    | x{3} | Exactly three times |


    Table 9.5 Regular Expression Pattern Quantifiers'
