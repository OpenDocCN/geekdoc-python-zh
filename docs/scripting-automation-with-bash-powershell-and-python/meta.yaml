    # 6.2.1 Text Search Using grep


    The command `grep pattern file.txt` filters out all lines from a text file that
    match the search pattern `pattern`. In the following example, all lines containing
    a specific IP address are to be filtered out of a logging file from the Apache
    web server. Because the search pattern is processed as a regular expression (see
    Chapter 9), the period (.) character must be marked by a backslash. (In regular
    expressions, a period is a placeholder for any character.)


    ```

    $ sudo grep ''175\.55\.93\.123'' /var/log/apache2/access.log

    ```


    > **Text Evaluation and Analysis**

    I will discuss `grep` in much more detail in this book with regard to its function
    as a filter command (see Chapter 8, Section 8.1). In this chapter, I want to introduce
    you to other commands for text evaluation, including `wc` (word count), `head`
    and `tail` (display the first/last lines of a text), `sort` (sort text), and `uniq`
    (remove doubles).


    With a few options, the `grep` filter command becomes a powerful search tool.
    The following command searches the `/etc` directory recursively (`-r`) for files
    that contain the search term `password` in uppercase or lowercase (`-i`). The
    resulting files will be output in a list (`-l`).


    ```

    $ sudo grep -r -i -l password /etc

    ```


    # 6.3 Compressing and Archiving Files


    To compress a single file, the easiest approach is to use `gzip`. This command
    renames the file immediately (i.e., `name` becomes `name.gz`). To unpack the file
    again, you must use `gunzip`. The extension `.gz` will be removed again.'
