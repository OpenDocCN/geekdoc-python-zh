  md: '# Preface


    A script is a small piece of code to solve a specific problem or automate a tedious
    task. You don''t need a development environment or a compiler to develop a script—an
    editor is enough. When it comes to scripting, minimalism is the name of the game,
    and its goal is achieving maximum impact with minimal resources. To put it casually,
    scripting is the art of solving IT problems in ten lines of code.


    In my work environment, scripts are ubiquitous. I use scripts to set the power
    saving mode for my laptop, to create a PDF file of this book from Markdown files,
    to automate backups to servers, to watermark e-books, to set up new customers
    in a web application, to scan dozens of databases for logical errors, to create
    virtual machines for teaching, to sort photos, and more.


    # Bash, PowerShell, or Python?


    The “classic” scripting language is Bash. Its full name, *Bourne Again Shell*,
    is a pun. The predecessor was the Bourne shell, which was widely used on Unix.
    The license for the Bourne shell was unsuitable for Linux, which is why a new
    project was created. Today, Bash is the dominant Linux shell, both in interactive
    mode for executing commands and for script programming. macOS relies on the largely
    compatible Zsh, which is also gaining more and more followers on Linux.


    Bash is popular, but its antiquated syntax doesn''t win any beauty contests. On
    the contrary, Bash scripts sometimes look awful. For this reason, Microsoft did
    not even try to adapt Bash for Windows. Instead, with PowerShell, Microsoft has
    combined the basic ideas of a classic Unix shell with the concepts behind object-oriented
    programming languages and created a completely new language, which turned out
    surprisingly well! Not without reason, Windows administrators love PowerShell.


    Python is actually not a typical scripting language. Depending on the intended
    use, Python is the basis for AI developments, a tool for (natural) scientists,
    or a first language for entry-level programming. Probably no other language is
    used as universally as Python! The elegance of Python''s syntax and its almost
    inexhaustible supply of extension modules have led to Python also being used for
    system administration, converting files between different formats, as a database
    tool or for hardware control (for the Raspberry Pi). Python plays to its strengths
    the more complex the task.'
  merge: -1
  pgno: 22
- img_proc: true
  md: '# About This Book


    Because no single perfect scripting language exists, this book starts in Part
    I with crash courses for the Bash, PowerShell, and Python languages. If you want,
    you can focus on one of these three languages to get started and gradually increase
    your language vocabulary.


    Part II of this book introduces you to tools and working techniques typically
    used in scripts: These topics include commands for processing text files, cmdlets
    for applying regular expressions, and functions for handling JSON and XML files.
    I''ll show you how to run scripts regularly and automatically, how to run code
    or copy files to other machines via SSH, and how to combine version management
    for your code and scripting via Git. Many practical examples round off the information
    I provide throughout this book.


    Finally, Part III deals with concrete applications: Key topics include backups,
    image processing, web scraping, using REST APIs, databases, using the cloud, and
    virtual machine administration.


    I have tried as much as possible to design this book in a modular way. Thus, you
    don''t need to read all the chapters from start to finish, but instead, you can
    search specifically for the information important to you at a specific moment.
    All chapters in Parts II and III begin with a brief information box that summarizes
    the prerequisites for that chapter.


    # Scripting and AI Tools


    Recently, ChatGPT has ushered in a sea change in many professions. As often is
    the case, your perspective will determine whether you see the glass as half full
    or as half empty: AI tools are far from perfect today, but they are definitely
    (already and likely even more so in coming years) a tool that will revolutionize
    software development.


    If you ask ChatGPT or GitHub Copilot in VS Code for a PowerShell script to read
    a JSON file and store the data it contains in a PostgreSQL database, the solution
    will output a plausible-looking script in seconds.


    Ideally, the script will work right away. In my experience, however, the code
    is rarely ideal—all the less so the more complex the problem is. Often, the generated
    code contains unique errors, such as options or commands that don''t exist. Sometimes,
    logical errors also exist that are more difficult to detect. With some scripting
    experience, most problems can usually be fixed quickly. You can even ask the AI
    tool specifically to improve a certain aspect of the code.


    My personal impression is that the more solid your prior knowledge is, the better
    you can use AI tools. An AI tool plus an experienced developer or an experienced
    programmer—in my view, that''s the dream team of the future. This book provides
    exactly the'
  merge: -1
  pgno: 23
- img_proc: true
