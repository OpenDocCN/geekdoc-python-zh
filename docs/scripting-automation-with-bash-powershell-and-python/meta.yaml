    # 17.5 Web Scraping with Beautiful Soup


    The “right” way to do web scraping is to use an HTML parser that builds a DOM
    from the HTML code. For Python, several HTML parsers have been optimized with
    regard to different properties (e.g., speed, error tolerance, ease of use). An
    initial overview is available at the following links:


    +   - https://elitedatascience.com/python-web-scraping-libraries

    - https://html5-parser.readthedocs.io/en/latest/


    # 17.5.1 Beautiful Soup and Requests


    The following examples rely on the Python module, Beautiful Soup, version 4, which
    is used in combination with Python’s default HTML parser. You must first install
    this module using pip:


    ```

    $ pip install beautifulsoup4 (Windows, Linux)

    $ pip3 install beautifulsoup4 (macOS, old Linux distributions)

    ```


    Instead of the standard urllib Python module with the request function used in
    the previous examples, in this example, I will perform downloads via the requests
    module. This module must also be installed using pip:


    ```

    $ pip install requests (Windows, Linux)

    $ pip3 install requests (macOS, old Linux distributions)

    ```


    I will introduce requests in more detail in Chapter 18. For now, knowing how to
    download an HTML document and how to pass it to Beautiful Soup is sufficient:


    ```

    import requests

    from bs4 import BeautifulSoup

    response = requests.get(''https://example.com'')

    dom = BeautifulSoup(response.content, ''html.parser'')

    ```


    # 17.5.2 Hello, Beautiful Soup!


    Beautiful Soup provides countless functions to navigate to a specific point within
    the DOM, analyze attributes of the DOM, and loop through subelements. I will limit
    myself, in this section, to presenting the most important basic functions. In
    our example, the x variable contains either the DOM root object or another previously
    determined HTML object.'
  merge: -1
  pgno: 394
- img_proc: true
  md: "The basic functions of Beautiful Soup include the following:\n\n+   - `x.attrs('attributename')`\
    \ or simply `x['attributename']` returns the desired attribute as a string.\n\
    - `x.contents` returns the contents as a string array (as an array because there\
    \ can be multiple parts).\n- `x.find('elementname')` finds the first HTML element\
    \ of the specified type, such as `x.find('<table>')`, starting from the current\
    \ position in the DOM.\n  Note that `find` searches only *within* the current\
    \ subtree. If `x` is a `<table>` element, `x.find('th')` searches only within\
    \ this one table, but not in other tables in the document.\n- `x.find('name',\
    \ aname='value')` searches for the first HTML element where an attribute has the\
    \ desired value, such as `x.find('div', id='1234')`. For CSS classes, you must\
    \ use the `class_` attribute name, for instance, `x.find('p', class_='intro')`.\n\
    - `x.find_all(...)` works like `find` but returns all matching elements starting\
    \ from the starting point. The result can then be looped through.\n- `x.select('css\
    \ selector')` works similar to `find_all` but processes a CSS selector as a parameter.\n\
    \nCountless other functions are documented with many application examples at https://www.crummy.com/software/BeautifulSoup/bs4/doc/.\n\
    \nThe following introductory example searches an HTML page for all `img` elements\
    \ and returns the associated `src` attributes:\n\n```\n# Sample file hello-beautifulsoup\n\
    import requests\nfrom bs4 import BeautifulSoup\nsiteurl = \"https://kofler.info/\"\
    \nresponse = requests.get(siteurl)\ndom = BeautifulSoup(response.content, 'html.parser')\n\
    images = dom.find_all('img')\nfor img in images:\n    print(img['src'])\n```\n\
    \n# 17.5.3 Example: Determining a List of Top Titles from Rheinwerk Publishing\n\
    \nThe Rheinwerk Publishing website (https://sap-press.com) serves as the starting\
    \ point for our first example. Eight books—new releases or bestsellers—are presented\
