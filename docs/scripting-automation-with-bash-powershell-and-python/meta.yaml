  md: '# Chapter 16

    Image Processing


    In my day-to-day work, scripts often help me to keep the flood of digital images
    under control. The scripts presented in this chapter perform the following tasks:


    +   - Converting images from one format to another and downsizing and watermarking
    them if necessary

    - Sorting photos into directories based on the date they were taken, using exchangeable
    image file format (Exif) data

    - Entering metadata from photos into a database


    For these purposes, the *ImageMagick* and *ExifTool* open-source tools are used.


    > **Prerequisites for This Chapter**

    To read this chapter, you only need basic knowledge of the Bash, PowerShell, and
    Python languages.


    # 16.1 Manipulating Image Files


    Whether you want to convert PNG images to JPG format (or vice versa), include
    watermarks or take transparency effects into account, limit the maximum resolution,
    or crop a partial image—the free tools of the ImageMagick library will be helpful.
    The only obstacle is the non-trivial control of the commands through its countless
    options.


    # 16.1.1 Installing ImageMagick


    Most Linux distributions provide ImageMagick as a package. On Ubuntu, you must
    run `apt install imagemagick` to install it. On macOS, the easiest way to install
    it is to use Homebrew (i.e., `brew install imagemagick`).


    For Windows, you can find an installation program at *https://imagemagick.org/script/download.php*.
    If you want to update an already installed version, you should uninstall it beforehand;
    otherwise, the old and the new versions will be installed in parallel, which is
    rarely useful. The setup program suggests adding the installation directory to
    the PATH, so be sure to leave this option checked. In general, it''s mostly appropriate
    to leave the preselected options.'
  merge: -1
  pgno: 374
- img_proc: true
  md: '![](img/a7fa45d496335c22ffb14c3275e24ffb_375_0.png)


    Figure 16.1 Installing ImageMagick on Windows


    Use `magick --version` in a terminal to verify that the installation was successful
    and that the command is found:


    ```

    $ magick --version

    Version: ImageMagick 7.1.1-4 Q16-HDRI x86_64 ...

    ```


    If you also want to read PostScript, PDF, or Encapsulated PostScript (EPS) files
    with ImageMagick, you must also install the PostScript interpreter Ghostscript.
    On Linux and macOS, you can install appropriate packages via `apt`, `dnf`, or
    `brew`. Windows downloads can be found at https://ghostscript.com/releases/gsdnld.html.


    # 16.1.2 Trying Out ImageMagick


    ImageMagick provides the `magick` command, which is very versatile. However, several
    hundred options are available to control the behavior of this command, as described
    at https://imagemagick.org/script/magick.php.


    Do not let all this choice confuse you! In many cases, `magick` can be applied
    easily. To convert an existing file to another format, simply specify the filename
    of the source file and that of a new result file. `magick` recognizes the desired
    data type by its identifier:


    ```

    $ magick in.bmp out.png

    ```


    > **ImageMagick 6: Use convert instead of magick**

    Many Linux distributions still rely on ImageMagick 6. This version does not provide
    the `magick` command. Instead, you must use `convert`. However, beginning with
    version 7, `convert` is deprecated in favor of `magick`.'
  merge: -1
  pgno: 375
- img_proc: true
  md: 'The following command reduces a PNG image to a maximum size of 1024×1024 pixels.
    The image proportions are preserved. An image with originally 6000×4000 pixels
    is scaled to 1024×683 pixels. The > character after 1024×1024 causes small images
    to *not* be scaled up. 1024×1024 pixels are therefore the upper limit. The result
    will be saved in JPG format.


    Transparent areas of the PNG image are displayed in light pink. The color code
    corresponds to the familiar CSS syntax. `-flatten` merges all image layers. `-quality
    75` reduces the quality of the JPEG compression to 75 percent. This option reduces
    quality but also reduces the size of the image file. (By default, a quality level
    of 92 percent applies.)


    ```

    $ magick in.png -resize ''1024x1024>'' -background ''#ffdddd'' \n    -flatten
    -quality 75 out.jpg

    ```


    In the third example, `magick` adds a diagonal watermark text with a copyright
    notice in the middle of the image:


    ```

    $ magick in.png -gravity center \n    -pointsize 40 -font Arial -fill black \n    -draw
    "rotate 45 text 0,0 ''(c) Michael Kofler 2023''" out.png

    ```


    Unlike many other commands, `magick` does not care about the order of the options.
    Rather, they are executed in the specified order or refer to the currently active
    image (if multiple image files are merged).


    If you want to process multiple images at once, it is usually advisable to program
    a script. Creating a script has an advantage in that the often laboriously compiled
    options will be available again the next time. However, you can of course perform
    simple tasks directly in the terminal.


    The final example in Bash syntax runs through all `*.jpeg` files in the current
    directory and turns them into *thumbnails* (i.e., greatly reduced images). Watch
    out though because since the following command uses the same source and destination
    filename, the original images will be overwritten! If you don''t want that to
    happen, you must use another destination filename (e.g., `"thumb-$file"`).


    ```

    $ for file in *.jpeg; do magick "$file" -resize ''320x320'' \n    -quality 80
    "$file"; done

    ```


    As far as the destination file format supports Exif data, this data will be preserved.
    Exif data is metadata that, among other things, provides information about the
    place and time the image was taken. Exif data is the focus of the remaining sections
    of this chapter. If you want to remove Exif data, you can call `magick` with the
    `-strip` option. A safer choice is to use the `exiftool -all:all= file.jpg` command
    presented in the next section.'
  merge: -1
  pgno: 376
- img_proc: true
  md: "> **Quoting Special Characters**\n\nNote that the `magick` syntax provides\
    \ for various special characters that have a special meaning in Bash and PowerShell.\
    \ You should either enclose the strings in quotes, as in the previous examples,\
    \ or use the quotation mark \\ (Bash) or ` (PowerShell).\n\n> **Artificial Intelligence\
    \ (AI) Help**\n\nAI tools like ChatGPT also know ImageMagick. If you have a specific\
    \ task, it's at least worth trying to determine the required combination of options\
    \ with AI support. In my attempts, the hit rate was about 50 percent. The result\
    \ did not always correspond to my expectations, but often, ChatGPT put me on the\
    \ right track. Note that both ChatGPT and many proposed solutions on the internet\
    \ use the `convert` command instead of `magick`.\n\n# 16.1.3 Example: convert2eps\
    \ (Bash Variant)\n\nTo make printable PostScript files from the text files of\
    \ my books in Markdown or LaTeX formats, I need an equivalent EPS file for each\
    \ screenshot in PNG format, which is exactly what our next script takes care of.\n\
    \nThis example loops through all PNG files in the current directory. If no `<name>.eps`\
    \ file exists for `<name>.png` or if the PNG file is newer than the EPS file (comparison\
    \ operator `-nt`; i.e., *newer than*), `magick` creates a new EPS file.\n\nThe\
    \ `magick` options or parameters have the following meaning: `-quiet` suppresses\
    \ the display of warnings and status messages. `-background white` uses a white\
    \ background for the transparent areas of the image. `-flatten` merges the image\
    \ layers.\n\n`eps2:$epsfile` specifies that the PostScript Level 2 specifications\
    \ should apply when writing the EPS file. This choice has a big impact on image\
    \ size because the file is compressed much better (without quality loss) than\
    \ in default level 1. Level 3 (i.e., `eps3:$epsfile`) promises even more compact\
    \ files. However, this level places higher demands on the printer or exposure\
    \ software and can cause compatibility problems.\n\n```\n# Sample file convert2eps.sh\n\
    for pngfile in *.png; do\n    # replace .png identifier with .eps\n    epsfile=${pngfile%.png}.eps\n\
    \    if [ $pngfile -nt $epsfile ]; then\n        echo \"$pngfile -> $epsfile\"\
    \n        magick \"$pngfile\" -quiet -background white \\n            -flatten\
    \ \"eps2:$epsfile\"\n    fi\ndone\n```"
  merge: -1
  pgno: 377
- img_proc: true
  md: "# 16.1.4 Example: convert2eps (PowerShell Variant)\n\nYou can use the last\
    \ script as a pattern for various uses of `magick`—whether you want to resize\
    \ hundreds of images, watermark them, or convert them to a different format. If\
    \ you work in Windows, the script in the next listing serves the same purpose:\n\
    \n```\n# Sample file convert2eps.ps1\n$pngfiles = Get-ChildItem *.png\nforeach\
    \ ($pngfile in $pngfiles) {\n    $pngname = $pngfile.Name\n    $epsname = $pngname\
    \ -replace \".png\", \".eps\"\n    # skip if there is already an up-to-date EPS\
    \ file\n    if ( (Test-Path $epsname) -and\n         (Get-ChildItem $epsname).LastWriteTime\n\
    \                                -gt $pngfile.LastWriteTime )\n    {\n       \
    \ continue\n    }\n    Write-Host \"$pngname -> $epsname\"\n    magick $pngname\
    \ -quiet -background white -flatten `\n        eps2:$epsname\n}\n```\n\n> **Editing\
    \ Images on Windows without ImageMagick**\nOf course, various classes exist in\
    \ the .NET framework that include elementary functions for image processing that\
    \ you can apply in PowerShell scripts. None of these classes can even come close\
    \ to matching ImageMagick’s capabilities. This limitation is offset by the advantage\
    \ of not needing to install external tools. A good example of using the `System.Drawing.Bitmap`\
    \ class can be found at https://stackoverflow.com/questions/47602716.\n\n# 16.2\
    \ Sorting Photos by Date Taken\n\nThe starting point of this example is a large\
    \ collection of photos in the JPEG format. These files are supposed to be moved\
    \ to directories that indicate the month of the date on which they were taken.\
    \ Thus, a photo taken in July 2023 should be moved to the `2023-07` directory.\
    \ If this directory does not exist yet, it should be created.\nThe solution to\
    \ this task succeeds through the analysis of Exif data. This data is metadata\
    \ built into the JPEG file by the camera. Depending on the smartphone or camera\
    \ model, the Exif data contains the date the photo was taken; the location (GPS\
    \ coordinates); various camera parameters (aperture, exposure time); the orientation\
    \ (image rotation, e.g., *portrait* or *landscape*); and so on."
  merge: -1
