    | :--- | :--- | :--- |

    | SIGHUP | 1 | Prompt to re-read the configuration |

    | SIGINT | 2 | Interruption via `Ctrl` + `C` |

    | SIGKILL | 9 | `kill` signal; cannot be intercepted |

    | SIGTERM | 15 | Prompt to exit the program |


