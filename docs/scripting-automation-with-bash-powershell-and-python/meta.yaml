  md: "# 5.12.4 Loops over Lists, Tuples, and Sets\n\nYou can easily process the elements\
    \ of lists, tuples, and sets using `for`:\n\n```\nfor i in (17, 87, 4):\n    print(i,\
    \ end=' ')\n# Output: 17 87 4\n\nfor s in ['Python', 'is', 'fun!']:\n    print(s)\n\
    # Output: Python\n#         is\n#         fun!\n```\n\nOften, the goal of such\
    \ loops is to form a new list, tuple, or set. Then, it is mostly more elegant\
    \ and efficient to use the list/tuple/set comprehension mentioned earlier in Section\
    \ 5.7. In this case, the `for` loop is executed in square brackets, parentheses,\
    \ or curly brackets and returns a list, tuple, or set as the result. The following\
    \ examples all refer to lists.\n\nIn its simplest form, the syntax is `[ expression\
    \ for var in list ]`. All list elements are inserted into the variable. The evaluated\
    \ expressions result in a new list. Optionally, a condition for the loop variable\
    \ can be appended using `if`: Then, only the list elements for which the condition\
    \ applies will be considered.\n\n```\n>>> l = [1, 2, 3, 10]\n>>> [ x*x for x in\
    \ l ]           # Form the square of all list\n                              \
    \   # elements\n[1, 4, 9, 100]\n>>> [ x*x for x in l if x%2==0 ]  # include only\
    \ even\n                                 # numbers\n[4, 100]\n```\n\nThe expression\
    \ may of course itself be a list, a set, or a tuple—then the result is a nested\
    \ expression:\n\n```\n>>> [ [x, x*x] for x in l ]\n[[1, 1], [2, 4], [3, 9], [10,\
    \ 100]]\n```\n\nTo build a dictionary from a list, tuple, or set, you should use\
    \ the `{ k:v for x in list }` notation, where `k` and `v` are expressions for\
    \ the key and value of each dictionary element.\n\n```\n>>> { x:x*x for x in l\
    \ }\n{1: 1, 2: 4, 3: 9, 10: 100}\n```"
