    \ the modules from 'PSGallery'?\n[Y] Yes  [A] Yes to All  [N] No  [L] No to All\
    \  ...: y\n```\n\nYou can update previously installed modules using `Update-Module`,\
    \ for example:\n\n```\n> Update-Module SQLServer\n```\n\n# 7.8.1 Listing Modules,\
    \ Commands, and Package Sources\n\nIn PowerShell, you have two commands to list\
    \ modules:\n\n+   - **Get-Module**\n  `Get-Module` lists the modules loaded in\
    \ the current PowerShell instance. If you have the terminal window freshly opened,\
    \ only a few modules will be loaded. Since modules are loaded automatically as\
    \ soon as a command they contain is executed, the list increases depending on\
