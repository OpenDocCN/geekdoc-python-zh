    \ In a nutshell, reading or analyzing large JSON files in the terminal becomes\
    \ a pleasure when you use fx. Pressing `q` terminates the program.\n\n# 10.4 XML\
    \ in PowerShell\n\nMicrosoft has gone all-in on XML for Windows, which is why\
    \ numerous XML files exist in a Windows system. On my Windows 11 test machine,\
    \ I encountered about 1,500 files with the *.xml identifier in C:\\Windows alone.\
    \ Even quite “normal” Microsoft Office files (such as *.docx) use XML content.\
    \ (Strictly speaking, Microsoft Office files are ZIP archives, which in turn contain\
    \ XML files.) In summary, XML is an ubiquitous format on Windows.\n\n# 10.4.1\
    \ XML Data Type\n\nPowerShell supports XML through its own data type. When reading\
    \ an XML file, you must prefix the variable with the data type in square brackets\
    \ so that PowerShell can clearly see that you don't want to view the file as ordinary\
    \ text, but in XML format instead.\n\n```\n> [xml]$tmz = Get-Content `\n    \"\
    C:\\Windows\\Globalization\\Time Zone\\timezoneMapping.xml\"\n```\n\nThe file\
    \ used in this example contains information about time zones. (If you do not run\
    \ Windows, you can find this file in the sample files for this book.) This file\
    \ has the following structure:\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<TimeZoneMapping GeneratedAt=\"2022-11-08T09:34:04.6992291+05:30\">\n  <MapTZ\
    \ TZID=\"Etc/GMT+12\" WinID=\"Dateline Standard Time\"\n          Region=\"001\"\
    \ Default=\"true\" StdPath=\"GMT+12/standard\"\n          DltPath=\"GMT+12/daylight\"\
    \ />\n  <MapTZ TZID=\"Etc/GMT+12\" WinID=\"Dateline Standard Time\"\n        \
    \  Region=\"ZZ\" ... />\n  ...\n```\n\nYou can access the elements of the XML\
    \ structure via properties:\n\n```\n> $tmz.TimeZoneMapping.MapTZ[0]\n\n    TZID\
    \    : Etc/GMT+12\n    WinID   : Dateline Standard Time\n    Region  : 001\n \
    \   Default : true\n```"
- md: "## 10.4.2 Select-Xml\n\nSelect-Xml applies XPath expressions to XML documents.\
    \ XPath is a standardized query language for XML, which I won't discuss any further\
    \ in this book. If necessary, you can find a good summary of the syntax in Wikipedia\
    \ and countless examples of its use on the internet.\n\nXML documents can be optionally\
    \ read from a file (-Path option), passed within a string (-Content), or as an\
    \ XML object (-Xml). For this reason, the following three Select-Xml examples\
    \ are equivalent and each results in the number of MapTZ tags in the file. Note\
    \ that, when reading the XML file into a string, Get-Content must be used with\
    \ the -Raw option. This option causes the entire file to be processed as one object\
    \ rather than as an array of lines.\n\n```\n> [xml]$tmz = Get-Content `\n    \"\
    C:\\Windows\\Globalization\\Time Zone\\timezoneMapping.xml\"\n```\n\n```\n> $str\
    \ = Get-Content -Raw `\n    \"C:\\Windows\\Globalization\\Time Zone\\timezoneMapping.xml\"\
    \n```\n\n```\n> $xpath = \"/TimeZoneMapping/MapTZ\"\n\n> (Select-xml -XPath $xpath\
    \ -Path .\\timezone-mapping.xml).Count\n> (Select-Xml -XPath $xpath -Content $tmz\
    \ ).Count\n> (Select-Xml -XPath $xpath -Xml $tmz).Count\n616\n```\n\nThe second\
    \ example determines the text of the `WinID` attribute from the 58th `MapTZ` tag.\
    \ The count begins at 0. `Select-Xml` returns `SelectXmlInfo` objects whose default\
    \ representation is not particularly helpful in the output. Only `Select-Object\
    \ -ExpandProperty Node` returns the actual text of the attribute.\n\n```\n> Select-Xml\
    \ \"/*/MapTZ[57]/@WinID\" -Xml $tmz\n\nNode Path Pattern\n---- ---- -------\n\
    WinID InputStream /TimeZoneMapping/MapTZ[57]/@WinID\n```\n\n```\n> Select-Xml\
    \ -Xml $tmz -XPath $xpath |\n    Select-Object -ExpandProperty Node\n\n#text\n\
    -----\nMountain Standard Time\n```\n\nThe third example refers to `*.vbox` files\
    \ that describe virtual machines from *Oracle VM VirtualBox*. Despite the `*.vbox`\
    \ identifier, these files are ordinary XML files.\n\n```\n<?xml version=\"1.0\"\
    ?>\n<VirtualBox xmlns=\"http://www.virtualbox.org/\" version=\"...\">\n    <Machine\
    \ uuid=\"{c197c895-7b0c-4fa3-a05b-165377b33232}\" ...>\n        <MediaRegistry>\n\
    \            <HardDisks>\n                <HardDisk uuid=\"...\" location=\"kali-english.vdi\"\
    \n                         format=\"VDI\" type=\"Normal\"/>\n                ...\n\
    \            </HardDisks>\n```\n\nHowever, your first attempts to analyze the\
    \ files may fail miserably. `Select-Xml` simply returns an empty result without\
    \ any warning or error message:\n\n```\n> Select-Xml './/HardDisk/@location' kali.vbox\n\
    ```\n\nThe reason for this failure is that the XML file refers to a namespace.\
    \ In this case, there is only one default namespace (`xmlns`), but some XML files\
    \ even use multiple namespaces (`xmlns:name`). To process such files, you must\
    \ pass a hash table to `Select-Xml` that assigns a prefix to each namespace. For\
    \ the default namespace, `ns` is usually used, but any string is allowed with\
    \ the exception of `xmlns`. You must subsequently specify the prefix in the XPath\
    \ expression as well. The following command extracts the name of the image file\
    \ of a virtual machine:\n\n```\n> $vbnamespace = @{ns = \"http://www.virtualbox.org/\"\
    }\n\n> Select-Xml './/ns:HardDisk/@location' -Namespace $vbnamespace `\n  kali.vbox\
    \ | Select-Object -ExpandProperty Node\n\nkali-install.vdi\n```\n\nThe second\
    \ example scans all virtual machines for active network adapters and returns objects\
    \ with the `.vbox` filename and the MAC address used. The `Split-Path` cmdlet\
    \ is used here with the `-Leaf` option to extract the filename from the path.\n\
    \n```\n> Select-Xml './/ns:Network/ns:Adapter' `\n    -Namespace $vbnamespace\
    \ *.vbox |\n  Where-Object { $_.Node.enabled -eq 'true' } |\n  ForEach-Object\
    \ {\n    [PSCustomObject]@{path = Split-Path $_.Path -Leaf;\n                \
    \      mac = $_.Node.MACAddress}\n  }\npath                    mac\n----     \
    \               ---\nkali-2022.vbox          080027DB966A\nkali.vbox         \
    \      0800278EB571\nmetasploitable2.vbox    080027E770F0\nubuntu.vbox       \
    \      0800278556EA\n```\n\n## 10.4.3 ConvertTo-Xml, Export-Clixml, and Import-Clixml\n\
    \nFinally, I want to briefly introduce three cmdlets for conversions between PowerShell\
    \ objects and XML documents:\n\n- **ConvertTo-Xml**\n  `ConvertTo-Xml` converts\
    \ a PowerShell object into the XML data type:\n\n  `$myxmlvar = Get-Date | ConvertTo-Xml`\n\
    \n  Note that no *official* `ConvertFrom-Xml` cmdlet exists with the reverse function.\
    \ However, if you search the internet for `ConvertFrom-Xml`, you'll come across\
    \ various cmdlets from the community that assemble a `PSCustomObject` from an\
    \ XML document to which it corresponds as much as possible.\n\n- **Export-Clixml**\n\
    \  `Export-Clixml` saves a PowerShell object in an XML file that conforms to the\
    \ Common Language Infrastructure (CLI) standard:\n\n  `Get-Date | Export-Clixml\
    \ 'date.xml'`\n\n- **Import-Clixml**\n  The counterpart reads a file again and\
    \ creates the corresponding PowerShell object out of it:\n\n  ```\n  $olddate\
    \ = Import-Clixml 'date.xml'\n  ```\n\n## 10.5 XML and Python\n\nVarious official\
    \ (and even more external) XML libraries are available for Python. These modules\
    \ are optimized for different application purposes, for example, for the particularly\
    \ efficient processing of large files, for the most secure analysis of XML files,\
    \ or for creating your own XML documents. The following pages provide a good overview:\n\
    \n- https://docs.python.org/3/library/xml.html\n- https://realpython.com/python-xml-parser\n\
    \nThis section focuses on the `xml.etree.ElementTree` module, which ships with\
    \ Python by default. This module is easy to use and well suited for analyzing\
    \ XML documents. The following lines show how you can read an XML string or an\
    \ XML file and access the root element of the XML document:\n\n```\nimport xml.etree.ElementTree\
    \ as ET\n# read XML file ...\nroot = ET.parse('filename.xml').getroot()\n\n# ...\
    \ or process XML from string\ns = '<?xml ...>...'\nroot = ET.fromString(s)\n```\n\
    \n`root` is an object of the `Element` class that has the following features:\n\
    \n- tag: Name of the current XML tag\n- text: Text in tag (but no subelements)\n\
    - attrib: Dictionary with keys of the XML tag\n\nAll subelements of an `Element`\
    \ can be directly looped. The loop variable itself contains `Element` objects\
    \ as well:\n\n```\nfor sub in e:  # loop through all sub-elements\n```\n\nAlternatively,\
    \ you can access the nth element directly:\n\n```\nsub = e[3]      # 4. Sub-element\
    \ (the count starts with 0)\n```\n\nIf you want to process all XML elements with\
    \ a specific name on the current level, you can use the `findall` method:\n\n\
    ```\n# traverse all <tagname> elements on the current level\nfor sub in e.findall('tagname'):\n\
    ```\n\nIf you only want to process the first matching subelement anyway, you can\
    \ omit the loop via `findall` and use `find` instead. Note, however, that the\
    \ following statement will throw an error if no matching element can be found:\n\
    \n```\n# access the first <tagname> element\nsub = e.find('tagname')\n```\n\n\
    On the other hand, if you want to search for elements on all levels of the XML\
    \ document, you should use the `iter` method, as in the following example:\n\n\
    ```\n# traverse all <tagname> elements on all levels\nfor sub in e.iter('tagname'):\n\
    ```\n\nIf the XML file uses namespaces, you must pass a dictionary with abbreviations\
    \ for all namespaces used to `find` or `findall`. These tag names must be prefixed\
