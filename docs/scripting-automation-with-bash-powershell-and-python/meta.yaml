  md: '# 4.3.1 cmdlets


    Up until now, I have simply said that you can run “commands” in PowerShell. However,
    PowerShell actually distinguishes between different types of commands—specifically
    among cmdlets, functions, aliases, and conventional commands. By far the most
    important ones are cmdlets, which are commands specially optimized for PowerShell.

    The term “cmdlet” comes from the fact that a cmdlet is not a program of its own,
    but rather, groups of cmdlets are collected in a library. In more technical terms,
    internally, each cmdlet is an instance of a .NET class. This particular way of
    organizing has many advantages. In particular, common functions, such as the processing
    of parameters, do not have to be implemented anew for each cmdlet. In addition,
    the processing of objects thus has a central foundation, which should also make
    it clear that cmdlets are not PowerShell scripts. Libraries with cmdlets are mostly
    programmed in C#.


    # 4.3.2 The Verb-Noun Terminology


    The names of cmdlets follow a scheme and are composed of a verb and a noun (*verb-noun
    pairs* in the original documentation). The verb describes what the command does,
    the noun which data it processes. Microsoft has even defined a clear set of verbs
    that you should use if you program commands yourself. For example, you should
    always use `Remove` for delete operations, but not `Delete`, `Eliminate`, or `Drop`
    (see [https://docs.microsoft.com/en-us/powershell/scripting/developer/cmdlet/approved-verbs-for-windows-powershell-commands](https://docs.microsoft.com/en-us/powershell/scripting/developer/cmdlet/approved-verbs-for-windows-powershell-commands)).


    > **Case Sensitivity**

    PowerShell is not case-sensitive when recognizing commands and cmdlet options,
    methods, and properties. For this reason, `(Get-Date).Month` and `(get-date).month`
    both return the number of the current month.


    # 4.3.3 Aliases


    `Get-ChildItem` may be a generic name for a command that gets the contents of
    a directory, but the typing overhead compared to `dir` or `ls` is considerable.
    Thus, abbreviations (“aliases”) for many cmdlets exist. `dir`, `ls`, and `gci`
    are also allowed instead of `Get-ChildItem`.

    A list of all aliases can be displayed via `Get-Alias` or `gal`. Many predefined
    abbreviations are composed of the first letters of verb and noun, such as `fl`
    for `Format-List` or `rnp` for `Rename-ItemProperty`. Sometimes, however, names
    familiar from Linux or `cmd.exe` are used, such as `cp` for `Copy-Item`.

    `Set-Alias` allows you to define your own abbreviations. The following statement
    enables you to execute the `New-Item` command for creating an empty file also
    via the Linux-typical name, `touch`:'
  merge: -1
  pgno: 107
- img_proc: true
  md: '```

    Set-Alias touch New-Item

    ```


    If necessary, you should store your `Set-Alias` statements in `Documents/profile.ps1`
    so that they are automatically parsed each time PowerShell is started.


    > **Which Command Denotes an Alias?**


    If you know an alias but you''re not sure which command it represents, run `Get-Command
    -Name <alias>`. For example, `Get-Command -Name sls` (or `Get-Alias sls`, which
    does the same thing) reveals that `sls` is the abbreviation for `Select-String`.


    # 4.3.4 Parameters and Options


    You can pass parameters to most commands. You can also use options to control
    the behavior of a command. The following command searches `C:\Users` and all subdirectories
    for PNG files:


    ```

    > Get-ChildItem -Path C:\Users\kofler -Recurse -Filter *.png


    Directory: C:\Users\kofler\OneDrive

    ... test.png


    Directory: C:\Users\kofler\Pictures

    ... img_1234.png

    ```


    `Get-Help <cmd>` summarizes which parameters must be passed in which order and
    which options are provided by a cmdlet. Three options are passed to the sample
    command in this example: `-Path`, `-Recurse`, and `-Filter`. The options for cmdlets
    are always introduced with a hyphen. Options can also be abbreviated as far as
    a clear addition is possible. (For example, `-p` is not allowed instead of `-pa`
    because there is also the `-PipelineVariable` option.) The following is a direct
    translation of the first line in our previous code snippet:


    ```

    gci -pa C:\Users -r -fi *.png

    ```


    In script programming, abbreviations are not recommended because adding an option
    to a command later may cause your script to stop working.


    # 4.3.5 Splatting


    Sometimes, cmdlets must be called with a larger number of options, which often
    results in very extensive statements which are difficult to read. As an alternative,
    you can store desired options in advance in a hash table (Section 4.7) and then
    pass this information to the cmdlet. The keys in the hash table must match the
    option names of'
  merge: -1
  pgno: 108
- img_proc: true
  md: 'the command. The following example reuses the above `Get-ChildItem` statement
    and clarifies the syntax:


    ```

    $opts = @{ Path = "C:\Users"; Recurse = $true; Filter = "*.png" }

    Get-ChildItem @opts

    ```


    Other splatting variants are documented at https://learn.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_splatting.


    # 4.3.6 Functions


    In script programming, you can easily combine multiple PowerShell commands into
    one function (Section 4.11). To pass functions, save the code as a module (file
    identifier *.psm1) in one of the designated directories ($env:PSModulePath).


    If modules are installed correctly, the functions defined in them cannot be distinguished
    from “real” cmdlets. Microsoft also makes intensive use of this option: Of the
    approximately 1,900 commands available for selection in a standard installation
    of PowerShell on Windows 11, more than half are functions.


    ```

    > (Get-Command -CommandType Function | Measure-Object).Count

    1028

    > (Get-Command -CommandType cmdlet | Measure-Object).Count

    843

    ```


    This concatenation of the `Get-Command` and `Measure-Object` commands is an example
    of using the pipe operator, which I will introduce in more detail in Section 4.4.


    # 4.3.7 Running Conventional Commands


    Finally, you can also run traditional commands in PowerShell. An example of such
    a command is `ping` (usually C:\Windows\System32\PING.EXE) for testing network
    connections. However, traditional commands have the disadvantage that they do
    not behave like cmdlets; for instance, they return text instead of objects.


    Syntactically things get complicated with commands that are located at directories
    where PowerShell does not search (i.e., which are not known to the $Path environment
    variable). The attempt to simply specify the entire path then often fails due
    to the use of spaces:


    ```

    > C:\Program Files\Git\usr\bin\nano.exe myfile.txt

    ''C:\Program'' is not recognized as a name of a cmdlet ...

    ```


    The program must then be started using the & call operator, which is passed a
    string with the entire path in the first parameter. This operator can be followed
    by separate parameters and options.


    ```

    > & "C:\Program Files\Git\usr\bin\nano.exe" "myfile.txt"

    ```'
