  md: 'Although there is not enough space in this book for a detailed treatment of
    these programs, I would like to introduce `awk` and `sed` briefly, at least through
    an example.


    Remember our earlier `grep` example from Section 8.11, `grep 1985 employees.txt`?
    It filters all lines from the text file that contain the `1985` string at any
    position. However, we actually wanted only those hits where the date of birth
    was 1985, that is, those hits which contain 1985 in the third column. It is difficult
    to formulate such a search condition using `grep`. For `awk`, on the other hand,
    this scenario is no problem. In this case, the `-F` option specifies the column
    separator. `$3` refers to the third column. This column must contain the search
    term specified between `//`:


    ```

    $ awk -F '';'' ''$3 ~/1985/'' employees.txt


    Dorthea;Mckinney;1985-06-02;915 Field Divide;...

    Kandi;Meester;1985-01-27;424 Smith Vale;...

    ...

    ```


    If you need to perform this kind of task frequently, learning the `awk` syntax
    is worthwhile. Various tutorials on the internet, but we recommend the example-oriented
    tutorial at https://linuxhandbook.com/awk-command-tutorial.


    `sed` also provides similar functions as `awk`. An example of using `sed` is provided
    in Chapter 9, Section 9.3, where I will show you how to use `sed` to search for
    patterns in a text file using regular expressions and to replace found text with
    other expressions.


    # 8.2 Example: Statistical Data Analysis


    You probably thought to yourself, looking at the examples in the previous section,
    “If I just need to sort some contact data, I’ll use Excel to do it. That’s easier.”
    Of course, that’s how I do it, although I prefer it even more if the data is stored
    in a database and I can use SQL. The examples had the sole purpose to show you
    the application options of `grep`, `cut`, `sort`, `uniq`, and so on with easy-to-understand
    data.


    From now on, it’s all about examples that are closer to everyday scripting. I
    will start with the evaluation of a CSV file from https://ourworldindata.org/energy
    with public data on energy production and consumption. The following lines show
    the basic structure of the file:


    ```

    country,year,iso_code,population,...,energy_per_capita,...

    ...

    China,2020,CHN,1424929792,...,29133.936,...

    China,2021,CHN,1425893504,...,30768.826,...

    China,2022,CHN,1425887360,...,31051.480,...

    Germany,2022,DEU,83369840,...,40977.492...

    United States,2022,USA,338289856,...,78754.273...

    ...

    ```'
  merge: -1
