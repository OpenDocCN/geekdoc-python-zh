  - "[PAGE 84]\n\nSeveral syntax variants for heredocs exist:\n\n+   - Leading tab\
    \ characters are eliminated from the heredoc text in the form <<- EOF, which makes\
    \ it possible to indent the text. Unfortunately, this text conversion does not\
    \ work for spaces.\n- << \"EOF\" prevents variable substitution.\n- <<< $myvar\
    \ passes the contents of the variable as standard input. This process is known\
    \ as *herestring*.\n\n# 3.10.8 The Backslash\n\nIt feels like almost every special\
    \ character in Bash has a special meaning. If you want to use the character as\
    \ such in a string, you must put the string in simple quotes or precede it with\
    \ a backslash as a quoting character:\n\n```\necho \\$myvar\n$myvar\n```\n\nYou\
    \ can also address files with spaces in their names with a backslash. Even easier,\
    \ however, is the use of quotation marks, as in the following example:\n\n```\n\
    touch filename\\ with\\ blanks.txt\nls \"filename with blanks.txt\"\nrm 'filename\
    \ with blanks.txt'\n```\n\nUnlike numerous other programming languages, Bash does\
    \ not create a line break from \\n. Instead, the characters \\ and n are output\
    \ or stored separately. Only `echo -e` analyzes this character sequence as expected.\n\
    \n```\necho -e \"Line 1\\nLine 2\"\n```\n\nFinally, you can use the backslash\
    \ to spread long commands across multiple lines:\n\n```\ncommand --with --many\
    \ --options and even \\n    more parameters\n```\n\n# 3.11 Branches\n\nAs in almost\
    \ any programming language, you can formulate branches using `if` in Bash. The\
    \ syntax is as follows:\n\n```\nif condition1; then\n    command1a\n    command1b\n\
    [ elif condition2; then\n    commands2 ]\n```"
