  md: '> **Not Namespace Compatible**

    XPath expressions in `xmllint` can only be analyzed correctly if the XML document
    does not use namespaces. Although you can find instructions on the internet on
    how to work around this limitation, using another tool is a better approach. One
    option is the `xmlstarlet`, which I''ll describe next.


    # 10.6.2 XMLStarlet


    On Linux and macOS, the `xmlstarlet` package provides the `xmlstarlet` command
    or simply `xml` (e.g., on Arch Linux). This package provides significantly more
    editing options than `xmllint`, especially for modifying XML documents. However,
    the project died down, and the current version has not been updated since 2014.


    At this point, I will only describe the `sel` subcommand for analyzing XPath expressions.
    The following command first defines the `ns` abbreviation for the default namespace
    in `*.vbox` files. `-t -v ''xpath''` applies the specified XPath expression to
    the XML file and outputs the resulting value (`-v` for value). `-n` adds a newline
    to the output.


    ```

    $ xml|xmlstarlet sel -N ns=''http://www.virtualbox.org/'' \n    -t -v ''.//ns:HardDisk/@location''
    -n vbox/*.vbox


    Kali-Linux-2022.2-virtualbox-amd64-disk001.vdi

    kali-english.vdi

    ...

    ```


    You can find information on the rather unintuitive syntax of `xml sel` via `xml
    sel --help`. Further documentation can be found at https://xmlstar.sourceforge.net/docs.php.


    # 10.7 INI Files


    INI files are text files for storing key-value pairs. An INI file can be divided
    into various sections by using `[section]`:


    ```

    ; File config.ini

    [server]

    hostname = example.com

    port = 8080


    [data]

    imagePath = /mnt/images

    dbName = mydb

    ```


    INI files are often used to store configuration data. Only semicolons are provided
    for marking comments. Especially in the Linux environment, however, `#` is also
    mostly accepted.'
