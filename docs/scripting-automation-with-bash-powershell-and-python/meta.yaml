  md: "# 18.4.1 curl\n\ncurl and wget execute a GET request by default and do not\
    \ require authentication. However, both commands can also upload local data (PUT/POST),\
    \ support various authentication types, and so on. In this section, I will focus\
    \ on curl and briefly summarize the most important options in the REST context:\n\
    \n+   - -X or --request GET/POST/PUT... specifies the desired request type (GET\
    \ by default).\n- -H or --header 'txt' passes the desired HTTP header, for example,\
    \ -H \"Content-Type: application/json\". The option can be repeated if multiple\
    \ headers are required. -H @file.txt reads the headers from a file.\n- -d or --data\
    \ 'data' sends the specified data with the request. For --data, the following\
    \ alternatives are available: --data-binary, --data-raw, and --data-urlencode.\
    \ In any case, the data can also be read from the specified file via @file.\n\
    - -u or --user name:pw passes a username and the corresponding password.\n- -n\
    \ or --netrc tells curl to read the login information from the .netrc file. Using\
    \ --netrc-file file.txt, you can alternatively specify a different location for\
    \ this file. Both variants are more secure than the password transfer via -u.\n\
    - --oauth2-bearer 'token' sends the specified Bearer token along with the request.\n\
    - -L or --location allows curl to run an HTTP redirect. So if the server indicates\
    \ that the page is now in a different location, this redirection will be followed.\n\
    - -k or --insecure does not check the SSH or HTTPS certificates. (This is unsafe!)\n\
    - -v or --verbose displays comprehensive debugging information during the execution\
    \ of the request.\n- -I or --head returns only the header of the response as a\
    \ result. This option is convenient, for example, if you're only interested in\
    \ the HTTP status code, not in the other data from the response.\n\nThe following\
    \ examples refer to https://httpbin.org. The purpose of this website is to test\
    \ REST tools or scripts. For example, a GET request of the /headers address returns\
    \ a JSON document with all transferred headers:\n\n```\n$ curl https://httpbin.org/headers\
    \ -H 'myheader1: lorem' \\n                           -H 'myheader2: ipsum'\n\n\
    {\n  \"headers\": {\n    \"Accept\": \"*/*\",\n    \"Host\": \"httpbin.org\",\n\
    \    \"Myheader1\": \"lorem\",\n    \"Myheader2\": \"ipsum\",\n    \"User-Agent\"\
    : \"curl/8.0.1\",\n  }\n}\n```"
  merge: -1
  pgno: 406
- img_proc: true
  md: "```\n\"X-Amzn-Trace-Id\": \"Root=1-64228236-74fe...\"\n}\n}\n```\n\nIn the\
    \ second example, you first create the tiny local JSON file called mydata.json.\
    \ Then, you use PUT to transfer this file to the /put address. The website responds\
    \ with the sent data, so you can control if everything works:\n\n```\n$ cat >\
    \ mydata.json << EOF\n{\n    \"firstName\": \"John\",\n    \"lastName\": \"Doe\"\
    \n}\nEOF\n```\n\n```\n$ curl -X PUT https://httpbin.org/put?para=123 -d @mydata.json\
    \ \\n      -H \"Content-Type: application/json\"\n```\n\n```\n{\n    \"args\"\
    : {\n        \"para\": \"123\"\n    },\n    \"data\": \"{ \"firstName\": \"John\"\
    ,  \"lastName\": \"Doe\"}\",\n    \"json\": {\n        \"firstName\": \"John\"\
    ,\n        \"lastName\": \"Doe\"\n    }, ...\n}\n```\n\nFor debugging purposes,\
    \ an often useful approach is to compile requests in a GUI. In the final example,\
    \ you'll test the basic authentication. In this test, you specify the login data\
    \ with /basic-auth/name/pw. Then, the website checks if this data matches that\
    \ of -u 'name:pw'. With -I, the status code of the response will be displayed:\
    \ In the first case, that's 200 (successful authentication); in the second case,\
    \ 401 (unsuccessful authentication).\n\n```\n$ curl -X GET \"https://httpbin.org/basic-auth/maria/topsecret\"\
    \ \\n      -u 'maria:topsecret' -I\n\nHTTP/2 200\n```\n\n```\n$ curl -X GET \"\
    https://httpbin.org/basic-auth/maria/topsecret\" \\n      -u 'maria:wrong' -I\n\
    \nHTTP/2 401\n```"
