  md: "To this function, you must create a `WatchManager` object. By using `add_watch`,\
    \ you can specify which file or directory you want to monitor, which events you\
    \ want to process (in this case, `IN_CLOSE_WRITE`, that is, closing a file after\
    \ a change) and which function will then be called. Then, you pass the `WatchManager`\
    \ object to the `Notifier`. Using `loop`, you start the event processing. As in\
    \ our earlier example, `loop` also initiates an infinite loop. So, the script\
    \ runs until you stop it via `Ctrl` + `C`.\n\nThe `runPandoc` function is responsible\
    \ for calling the `pandoc` command. However, it must first be tested whether the\
    \ modified file is a Markdown file at all. (Unfortunately, you cannot pass patterns\
    \ like `*.md` to `add_watch`.) For this purpose, the `ev` parameter (like `event`)\
    \ is analyzed, which contains details about the event that occurred.\n\n```\n\
    # Sample file run-pandoc.py\nimport pyinotify, subprocess\n\n# this function is\
    \ called by pyinotify\ndef runPandoc(ev):\n    if ev.name.endswith('.md'):\n \
    \       mdfile = ev.name\n        pdffile = mdfile.replace('.md', '.pdf')\n  \
    \      cmd = 'pandoc %s -o %s' % (mdfile, pdffile)\n        print(cmd)\n     \
    \   subprocess.run(cmd, shell=True)\n\nwm = pyinotify.WatchManager()\nwm.add_watch('.',\
    \ pyinotify.IN_CLOSE_WRITE, runPandoc)\nnotifier = pyinotify.Notifier(wm)\nnotifier.loop()\n\
    ```\n\nIn Bash scripts, you can use the `inotify` functions with the `inotifywait`\
    \ and `inotifywatch` commands, but you must first install the `inotify-tools`\
    \ package. Some simple application examples are documented at https://github.com/inotify-tools/inotify-tools/wiki#inotifywait.\n\
    \n# 11.5.2 Alternatives to inotify\n\nOn macOS, the *file system events* (`FSEvents`)\
    \ API provides similar functions. In scripts, the easiest way to use `FSEvents`\
    \ is with the `fswatch` command. This command can be installed using `brew`, as\
    \ described at https://github.com/emcrisostomo/fswatch.\n\nAnother monitoring\
    \ option is provided by the `launchd` program. For a simple use case, see this\
    \ Stack Overflow post: https://stackoverflow.com/a/1516034.\n\nOn Windows, you\
    \ can use the `FileSystemWatcher` feature. However, using this .NET feature is\
    \ quite complicated. A code example for PowerShell is available at https://powershell.one/tricks/filesystem/filesystemwatcher."
