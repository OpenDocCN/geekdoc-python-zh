  md: '# 3.5.3 Making the Script Executable (chmod +x)


    All Unix-like systems including Linux and macOS store some access bits along with
    each file that provide information about who is allowed to read, write, and execute
    the file. For scripts, the execute bit (x for short) is crucial. Only with this
    bit can a script be executed later like a command.


    To set the execute bit, you need to run the following command once in the terminal.
    Note that the `chmod` variant of macOS does not understand the `+x` short notation.
    You must explicitly specify for whom the execute bit is set. `a` means “for all.”


    ```

    $ chmod +x my-script-file.sh    (Linux, Git Bash)

    $ chmod a+x my-script-file.sh   (macOS)

    ```


    Thus, `chmod` is used to change the access bits. The command supports quite diverse
    syntax variants. (You can run `man chmod` if you’re interested in the details).
    For us, only the `chmod +x` variant is relevant, for setting the execute bit.


    > **The .sh Identifier**

    All Bash sample files in this book end with `.sh`. Although this file extension
    is common, using it is by no means mandatory. Bash scripts can work without an
    identifier (and even with a wrong identifier), provided the hash bang is correct.

    Since this book covers PowerShell (`.ps1`) and Python (`.py`) in addition to Bash,
    the identifier helps with the assignment of the sample files.


    # 3.5.4 Hello, World!


    To write your first script, you want to launch your favorite editor: Visual Studio
    Code (VS Code) is a good choice, but any editor is fine, including the minimalist
    `nano` program that you can run directly in a terminal. Then, enter the following
    two lines:


    ```

    #!/bin/bash

    echo "Hello, World!"

    ```


    Save this file as `hello-world.sh`. By using `chmod`, make the script executable,
    with the following command:


    ```

    $ chmod +x hello-world.sh    (Linux, Git Bash)

    $ chmod a+x hello-world.sh   (macOS)

    ```


    To check if a script works, you need to type its name and press `Enter`. Note
    that you must prefix the name with `./`. In this way, you tell Bash to look for
    your script in the current directory. (`.` is a short notation for the currently
    active directory.)


    ```

    $ ./hello-world.sh

    Hello, World!

    ```'
