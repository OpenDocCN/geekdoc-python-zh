- img_proc: true
  md: "# 7.4.1 Launching Other PowerShell Scripts\n\nIf you want to run another PowerShell\
    \ script—starting from an already running script—the best approach is to proceed\
    \ as follows:\n\n```\n> Start-Process powershell.exe `\n    -ArgumentList \"-file\
    \ C:\\directory\\myscript.ps1\", \"arg1\", \"arg2\"\n```\n\nStart-Process thus\
    \ starts a new PowerShell process to which you can pass the location of your script\
    \ and any necessary parameters.\n\nIf you do not want to start a second script\
    \ as a new process, but only want to read (import) its code at the current position,\
    \ you can do this by using the . source operator:\n\n```\n. other-file.ps1\n```\n\
    \nFor complex tasks that require a lot of code, you should divide your script\
    \ into modules and import them using Import-Module.\n\n# 7.4.2 Running Commands\
    \ in the Background\n\nSometimes, you don’t want to run an entire script in the\
    \ background; often, a few commands are sufficient. You can pass these commands\
    \ to Start-Job. In the following example, the contents of a directory are stored\
    \ in a ZIP file. If the statement is in a script, the script will continue in\
    \ the meantime.\n\n```\n> Start-Job { Compress-Archive mydir\\ archive.zip }\n\
    ```\n\nIf you need to rely on the completion of the ZIP file later in the script,\
    \ you must remember the job ID. This allows you to later read the output of the\
    \ operation using Receive-Job or wait for completion by using Wait-Job:\n\n```\n\
    $myjob = Start-Job { Compress-Archive mydir\\ archive.zip }\n# first do something\
    \ else ...\n# then wait for Compress-Archive to finish\nWait-Job $myjob\n```\n\
    \n# 7.4.3 Managing Services\n\nServices (also referred to as system services)\
    \ are background processes required for the operation of Windows and its functions.\
    \ You can find out which services are running on your system by using the program\
    \ of the same name or via the Get-Service command which lists all the services.\
    \ You can also pass a pattern to the cmdlet to search specifically for services:"
  merge: -1
  pgno: 232
- img_proc: true
  md: '```

    > Get-Service wl*


    Status  Name          DisplayName

    ------  ----          -----------

    Stopped WlanSvc       automatic WLAN configuration

    Running wlidsvc       login wizard for Microsoft accounts

    Stopped wlpaSv        service wizard for local profiles

    ```


    Like many cmdlets, `Get-Service` displays less data than is actually available
    internally. If you want to know which of these services starts automatically,
    you can use `Select-Object` to also display the `StartType` property:


    ```

    > Get-Service wl* | Select-Object Name, StartType


    Name      StartType

    ----      ---------

    WlanSvc   Manual

    wlidsvc   Manual

    wlpaSv    Manual

    ```


    You can start or stop the specified service using `Start-Service`, `Restart-Service`,
    and `Stop-Service`. `Suspend-Service` temporarily disables the service; it remains
    in the memory but stops responding. `Resume-Service` reactivates the service.
    (Note, however, that not all services support `Suspend` and `Resume`).


    ```

    > Start-Service winrm

    ```


    All the commands just listed have an immediate effect. To set the startup behavior
    for the future, on the other hand, you must use `Set-Service` with the `-StartupType`
    option, as in the following example:


    ```

    > Set-Service -StartupType Automatic winrm

    ```


    If necessary, you can set up your own services via `New-Service` and remove them
    again with `Remove-Service`.


    # 7.4.4 Working on Other Computers


    Basically, cmdlets are always executed on the local computer. `Invoke-Command`
    allows you to execute commands on other computers. Among other things, this requires
    that Windows Remote Management is active on this computer (the `winrm` service).
    The following two examples first run the `Get-Process` command and then run `myscript.ps1`
    on the `otherhost` computer:


    ```

    > Invoke-Command otherhost { Get-Process }

    > Invoke-Command otherhost -FilePath C:\myscript.ps1

    ```'
  merge: -1
  pgno: 233
- img_proc: true
  md: 'Instead of just running individual commands, you can use `Enter-PSSession hostname`
    to connect to another computer and open a PowerShell session there. If necessary,
    you can use `-Credential name` to specify the desired login name if different
    from your own. Of course, you must authenticate yourself with a password. You
    can end an active session using `Exit-PSSession`.


    ```

    > Enter-PSSession otherhost

    [otherhost]: PS C:\Users\username> Get-Process


    ...


    [otherhost]: PS C:\Users\username> Exit-PSSession

    ```


    An alternative to `Enter-PSSession` is the `New-PSSession` cmdlet. This approach
    also creates a connection to another computer. You can subsequently pass the session
    object as a parameter to other cmdlets, for example, to `Copy-Item` to copy files
    to another computer. However, `New-PSSession` is not intended for interactive
    use.


    > **Remoting Does Not Work**


    `Enter-PSSession` and `Invoke-Command` often fail with uninformative error messages
    (such as “Access denied”) without further explanation. The solution is usually
    the `Enable-PSRemoting` command, which is executed on the target computer. For
    the causes of various errors and tips on how to fix them, refer to https://learn.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_remote_troubleshooting.


    > **SSH instead of Remoting**


    SSH provides a functionality that’s comparable to `Invoke-Command` and `Enter-PSSession`
    but works across different platforms. However, SSH requires a running SSH server
    on the target computer, which is rather unusual on Windows.


    Since version 6, PowerShell even supports *SSH remoting*, that is, the use of
    the `Enter-PSSession` or `New-PSSession` commands via an SSH connection. In my
    tests, however, the configuration proved to be as error prone as for Windows Remote
    Management.


    More details on using SSH directly and on SSH remoting will follow in Chapter
    12.


    # 7.5 Registration Database and System Information


    Many important settings are located in the registration database. To read its
    entries, you can use the `Get-ChildItem` command you’re already familiar with
    from Section 7.1. The following command returns a list of your own entries (HKEY_CURRENT_USER)
    on the first level. With the additional `-Recurse` option, the cmdlet runs through
    all levels of the registry.'
  merge: -1
  pgno: 234
