    # 18.8 Example: Determining Electricity Prices and Displaying Them Graphically


    The expansion of renewable energies means that electricity prices fluctuate more
    strongly today than before. The more the wind blows or the stronger the sun shines,
    the more electricity is available—sometimes even more than is actually needed.
    At such times, electricity is quite cheap on the power exchanges.


    Against this backdrop, new electricity providers with hourly changing prices (aWATTar,
    Tibber, etc.) are currently establishing themselves. Such dynamic tariffs motivate
    people to carry out energy-intensive actions (charging an e-car, starting a dryer
    at a certain time) as far as possible when a lot of electricity is available,
    which benefits both customers and energy suppliers.


