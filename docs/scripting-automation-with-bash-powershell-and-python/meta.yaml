  md: 'and so on. To prevent `git status` from listing these files, you can set up
    the `.gitignore` file in the local directory. This file contains samples of files
    that `git` should not consider, for example, the following kinds of files:


    ```

    *.bak

    *.log

    *~

    tmp/*

    ```


    The `.gitignore` file itself should of course be stored in the repository:


    ```

    > git add .gitignore

    ```


    If, as an exception, you want to add a file to the repository for which `.gitignore`
    contains a lock pattern, you should run `git add` with the `-f` (`force`) option:


    ```

    > git add debugging.log

    ```


    ```

    The following paths are ignored by one of your .gitignore

    files: debugging.log.

    Hint: Use -f if you really want to add them.

    ```


    ```

    > git add -f debugging.log

    ```


    # 14.1.8 Transferring Existing Code to a New Repository


    In this section, I assume that you''ve already set up a repository on GitHub,
    cloned an empty repository to your machine, and then have started developing your
    scripts there. Often, however, you''ve gone the other way around: You''ve been
    working on a new project for a few days and only later decide to use Git. That''s
    no problem either!


    First, you must create the new repository in GitHub. Make sure that you do not
    activate the **Add a README file** option! Do not add any other files to the repository.


    Then, open a terminal, go to your project directory, create a new local repository
    using `git init`, and add the desired files to it. Finally, `git commit` creates
    the first local commit:


    ```

    > cd my\project

    > git init

    > git add script*.sh readme.md

    > git commit -m ''initial commit''

    ```


    Next, you must connect the local repository to the new remote repository. `git
    branch` ensures that the main branch in the local repository is called `main`.
    In current versions of Git, this name is used by default—the command is then superfluous
    but does not interfere. Only if your Git installation is rather old can it still
    use the obsolete `master` designation.'
