    # 7.3 Compressing and Archiving Files


    The `Compress-Archive` command allows you to pack a directory or individual files
    into a compressed archive file. Basically, the application of the command is simple:


    > Compress-Archive mypictures\ mypictures.zip

    > Compress-Archive *.txt archive.zip


    With `-Update`, you can extend or change an existing archive, and with `-Force`,
    you can overwrite a possibly existing ZIP file. `-CompressionLevel` enables you
    to influence the'
  merge: -1
  pgno: 229
- img_proc: true
  md: "compression algorithm. Permitted settings are `Optimal` (applies by default),\
    \ `Fastest`, and `NoCompression` (for example, for already compressed image or\
    \ PDF files).\nTo unpack an archive, you can use `Expand-Archive`:\n\n```\n> Expand-Archive\
    \ my.zip       # unpack in the current directory\n> Expand-Archive my.zip -DestinationPath\
    \ dir   # unpack in dir\n```\n\nAmazingly, there is no way to view or list the\
    \ contents of an archive file. If necessary, you may have to use commands from\
    \ one of the numerous ZIP extension modules available on the internet.\n\n# 7.3.1\
    \ Compressing Search Results\n\nBasically, `Compress-Archive` can also process\
    \ results of `Get-ChildItem`, as long as you specify the filename of the archive\
    \ with the `-DestinationPath` option. However, the behavior of `Compress-Archive`\
    \ takes some getting used to. Let's assume we have the following directory structure:\n\
    \n```\ndirA\\n    file1\n    file2\n    dirB\\n        file3\n```\n\n`Get-ChildItem`\
    \ will now recursively traverse the contents of `dirA` and pass it to `Compress-Archive`:\n\
    \n```\n> Get-ChildItem -Recurse dirA |\n    Compress-Archive -DestinationPath\
    \ my.zip\n> Expand-Archive my.zip -DestinationPath dirC\n```\n\nThe `dirC` directory\
    \ now contains the following files and directories:\n\n```\ndirC\\n    file1\n\
    \    file2\n    file3 (!)\n    dirB\\n        file3\n```\n\nThis result occurs\
    \ because `Compress-Archive` received the `dirB` directory once and the `file3`\
    \ file once from `Get-ChildItem`. `dirB` was processed correctly. However, `file3`\
    \ was processed without considering the directory. The file was therefore inserted\
    \ into the archive twice. The documentation points out this special case, so the\
    \ behavior is apparently not considered an error. In this respect, you should\
    \ use `Compress-Archive` for further processing of files only if all files are\
    \ located in the same directory."
  merge: -1
  pgno: 230
- img_proc: true
  md: "# 7.4 Process Management\n\nStart-Process allows you to start a new process,\
    \ such as the Notepad editor for first tests:\n\n```\n> Start-Process notepad\n\
    ```\n\nStart-Process starts the process in the background. If you do not want\
    \ it to start, you can pass the -Wait option to it. Then, the terminal or your\
    \ script will be blocked until the process ends.\n\nUsually, the new process has\
    \ the same rights as the terminal or your script. To run a new process with admin\
    \ rights, you must use -Verb RunAs. However, a warning dialog will then display\
    \ in which the user of the computer must confirm that the app can make changes\
    \ to the computer.\n\nGet-Process returns a list of all processes running on the\
    \ computer. If you specify a process name as a parameter, only processes with\
    \ the same name will be determined. With -IncludeUserName, the cmdlet also shows\
    \ the assigned user:\n\n```\n# all processes\n> Get-Process\n\nNPM(K)    PM(M)\
    \      WS(M)     CPU(s)     Id  SI ProcessName\n------    -----      -----   \
    \  ------     --  -- -----------\n      6    1.09       6.14       0.05   3888\
    \   0 AggregatorHost\n     24    9.11      34.42       0.52   7492   1 ApplicationFrameHost\n\
    \     10    1.79       8.25       0.00   2916   0 blnsvr\n      ...\n```\n\n```\n\
    # show only notepad processes, with user names\n> Get-Process -IncludeUserName\
    \ notepad\n\n    WS(M)   CPU(s)     Id UserName            ProcessName\n    -----\
    \   ------     -- --------            -----------\n    60.01     0.50   1212 KVMWIN\\\
    kofler        Notepad\n    59.88     0.47   8640 KVMWIN\\kofler        Notepad\n\
    ```\n\nProvided you have a suitable process object and have started the process\
    \ yourself, you can also stop processes via Stop-Process. Watch out, though: The\
    \ following command terminates not only the process started earlier, but *all*\
    \ running Notepad instances! (Only with admin rights can you also terminate foreign\
    \ processes.)\n\n```\n> Get-Process notepad | Stop-Process\n```"
  merge: -1
