    ```

    > Get-Service wl*


    Status  Name          DisplayName

    ------  ----          -----------

    Stopped WlanSvc       automatic WLAN configuration

    Running wlidsvc       login wizard for Microsoft accounts

    Stopped wlpaSv        service wizard for local profiles

    ```


    Like many cmdlets, `Get-Service` displays less data than is actually available
    internally. If you want to know which of these services starts automatically,
    you can use `Select-Object` to also display the `StartType` property:


    ```

    > Get-Service wl* | Select-Object Name, StartType


    Name      StartType

    ----      ---------

    WlanSvc   Manual

    wlidsvc   Manual

    wlpaSv    Manual

    ```


    You can start or stop the specified service using `Start-Service`, `Restart-Service`,
    and `Stop-Service`. `Suspend-Service` temporarily disables the service; it remains
    in the memory but stops responding. `Resume-Service` reactivates the service.
    (Note, however, that not all services support `Suspend` and `Resume`).


    ```

    > Start-Service winrm

    ```


    All the commands just listed have an immediate effect. To set the startup behavior
    for the future, on the other hand, you must use `Set-Service` with the `-StartupType`
    option, as in the following example:


    ```

    > Set-Service -StartupType Automatic winrm

    ```


    If necessary, you can set up your own services via `New-Service` and remove them
    again with `Remove-Service`.


    # 7.4.4 Working on Other Computers


    Basically, cmdlets are always executed on the local computer. `Invoke-Command`
    allows you to execute commands on other computers. Among other things, this requires
    that Windows Remote Management is active on this computer (the `winrm` service).
    The following two examples first run the `Get-Process` command and then run `myscript.ps1`
    on the `otherhost` computer:


    ```

    > Invoke-Command otherhost { Get-Process }

    > Invoke-Command otherhost -FilePath C:\myscript.ps1

    ```'
