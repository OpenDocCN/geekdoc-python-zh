  md: "# 20.4.1 Preparations\n\nFor this example, you need a bucket that is publicly\
    \ accessible on the web. For this task, make several settings in the AWS Console:\n\
    \n+   - For security reasons, all public access to new buckets is blocked by default.\
    \ The corresponding **Block all public access** option must be disabled.\n- You\
    \ need to set a *bucket policy* that allows access to all objects. In the console,\
    \ you can complete this task by formulating a JSON document based on the following\
    \ pattern:\n\n```\n{\n    \"Version\": \"2012-10-17\",\n    \"Statement\": [\n\
    \        {\n            \"Sid\": \"PublicReadGetObject\",\n            \"Effect\"\
    : \"Allow\",\n            \"Principal\": \"*\",\n            \"Action\": \"s3:GetObject\"\
    ,\n            \"Resource\": \"arn:aws:s3:::my.public.bucket/*\"\n        }\n\
    \    ]\n}\n```\n\nIn this code, replace *my.public.bucket* with the name of your\
    \ bucket. The *version* date, on the other hand, must not be changed.\n\n+   -\
    \ Finally, you must enable the **Static website hosting** option. At this point\
    \ you'll also learn at which HTTP address your bucket objects can be found. Next,\
    \ specify a starting document for web hosting, usually *index.html*.\n\nActually,\
    \ this page is intended as a starting point for the static website. For this example,\
    \ however, such a start page is not necessary at all. You can still upload a minimal\
    \ HTML file explaining the purpose of the website (for example, *This site hosts\
    \ PDF documents*).\n\n# 20.4.2 Script\n\nThe script starts with the initialization\
    \ of some variables. `Set-DefaultAWSRegion` and `Set-AWSCredential` set the region\
    \ and profile for all other AWS cmdlets. It then creates a temporary directory\
    \ where the PDF documents can be stored temporarily and uses `Invoke-WebRequest`\
    \ to download the HTML code to be processed.\n\n```\n# Sample file migrate-pdf-to-aws.ps1\n\
    $bucket = \"my.pdf.bucket\"\n$awsurl = `\"http://my.pdf.bucket.s3-website.eu-central-1.amazonaws.com/\"\
    `\n$region = \"eu-central-1\"\n```"
