    \ is confusing: No cmdlet in AWS Tools for PowerShell corresponds to the `aws\
    \ s3 sync` CLI command. If you want to synchronize a local directory with a bucket,\
    \ I recommend you use the CLI in PowerShell scripts as well.\n\n# 20.4 Example:\
    \ Offloading Large Files from a Website to the Cloud\n\nThe starting point for\
    \ the following example is your own website. The goal is to swap out the very\
    \ large PDF files linked there to the cloud. Thus, the website should continue\
    \ to be operated with its own server. However, when visitors click on a PDF download\
    \ link, that file is should be downloaded from AWS S3. In this way, you can continue\
    \ to manage the website yourself, while at the same time minimizing the load on\
    \ your web server caused by large downloads.\n\nThe *migrate-pdf-to-aws.ps1* script\
    \ works in the following way:\n\n+   ■ It downloads the HTML code of a web page.\n\
    ■ It searches all links for those ending with `.pdf`.\n■ It first downloads the\
    \ PDF documents to a temporary directory and then uploads them to a public AWS\
    \ S3 bucket.\n■ In the HTML code, the links are adjusted, and a new version of\
    \ the HTML page is saved locally."
  - "[PAGE 442]\n\n# 20.4.1 Preparations\n\nFor this example, you need a bucket that\
    \ is publicly accessible on the web. For this task, make several settings in the\
    \ AWS Console:\n\n+   - For security reasons, all public access to new buckets\
    \ is blocked by default. The corresponding **Block all public access** option\
    \ must be disabled.\n- You need to set a *bucket policy* that allows access to\
    \ all objects. In the console, you can complete this task by formulating a JSON\
    \ document based on the following pattern:\n\n```\n{\n    \"Version\": \"2012-10-17\"\
    ,\n    \"Statement\": [\n        {\n            \"Sid\": \"PublicReadGetObject\"\
    ,\n            \"Effect\": \"Allow\",\n            \"Principal\": \"*\",\n   \
    \         \"Action\": \"s3:GetObject\",\n            \"Resource\": \"arn:aws:s3:::my.public.bucket/*\"\
    \n        }\n    ]\n}\n```\n\nIn this code, replace *my.public.bucket* with the\
    \ name of your bucket. The *version* date, on the other hand, must not be changed.\n\
    \n+   - Finally, you must enable the **Static website hosting** option. At this\
    \ point you'll also learn at which HTTP address your bucket objects can be found.\
    \ Next, specify a starting document for web hosting, usually *index.html*.\n\n\
    Actually, this page is intended as a starting point for the static website. For\
    \ this example, however, such a start page is not necessary at all. You can still\
    \ upload a minimal HTML file explaining the purpose of the website (for example,\
    \ *This site hosts PDF documents*).\n\n# 20.4.2 Script\n\nThe script starts with\
    \ the initialization of some variables. `Set-DefaultAWSRegion` and `Set-AWSCredential`\
    \ set the region and profile for all other AWS cmdlets. It then creates a temporary\
    \ directory where the PDF documents can be stored temporarily and uses `Invoke-WebRequest`\
    \ to download the HTML code to be processed.\n\n```\n# Sample file migrate-pdf-to-aws.ps1\n\
    $bucket = \"my.pdf.bucket\"\n$awsurl = `\"http://my.pdf.bucket.s3-website.eu-central-1.amazonaws.com/\"\
    `\n$region = \"eu-central-1\"\n```"
  - "[PAGE 443]\n\n```\n$awsprofile = \"MyProfile\"     # profile for AWS credentials\n\
    $htmlsource = \"https://example.com/page-with-pdf-links.html\"\n$htmldest = \"\
    updated.html\"  # file name for new HTML code\n\n# create .\\tmp directory\nNew-Item\
    \ -ItemType Directory -Force tmp | Out-Null\n\n# set AWS default region and profile\n\
    Set-DefaultAWSRegion $region\nSet-AWSCredential -ProfileName $awsprofile\n\n#\
    \ download HTML code\n$response = Invoke-WebRequest $htmlsource\n$html = $response.Content\n\
    ```\n\nThen, a loop now runs through all links in the HTML document. If the link\
    \ ends with .pdf, the file is first downloaded to the local directory and then\
    \ uploaded to the cloud. Replace then replaces the original link address with\
    \ the new one. (Note that Replace is more appropriate here than the -replace operator,\
    \ which processes regular expressions. A URL often contains dots, which have a\
    \ special meaning in regular expressions.) Finally, the script saves the modified\
    \ HTML code to a local file.\n\n```\n# (continued ...)\n# loop through all links\n\
    foreach ($link in $response.links) {\n    $href = $link.href\n    if ($href -match\
    \ '.*pdf$') {\n        Write-Output $href\n        # extract filename from URL\n\
    \        $filename = $href.Substring($href.LastIndexOf(\"/\") + 1)\n        #\
    \ download PDF\n        Invoke-WebRequest $href -OutFile tmp\\$filename\n    \
    \    # upload PDF to cloud\n        Write-S3Object -BucketName $bucket -File tmp\\\
    $filename `\n                      -Key $filename\n        # assemble AWS URL\
    \ for PDF\n        $pdfAtAws = \"$awsurl$filename\"\n        # update link in\
    \ HTML document\n        $html = $html.Replace(\"href=`\"$href`\"\",\n       \
    \                      \"href=`\"$pdfAtAws`\"\")\n    }\n}\n# save modified HTML\
    \ code\n$html | Out-File $htmldest\n```"
  - "[PAGE 444]\n\n# 20.4.3 Limitations\n\nBefore you get the idea to apply this script\
    \ to a real website, you should deal with the not insignificant limitations:\n\
    \n+   - Most modern websites are implemented via a *content management system\
    \ (CMS)*. The HTML code of a page consists of various components. The script sees\
    \ this HTML code in its entirety. But in fact, you usually want to change only\
    \ parts of it. For this task, the script would need to have access to the single\
    \ page within the CMS. Often, Markdown or a CMS-specific language is used instead\
    \ of HTML.\n- The direct links to the PDF files in the AWS S3 bucket use only\
    \ HTTP, not the contemporary HTTPS protocol. This choice can be changed, but considerable\
    \ configuration effort is needed. The details are documented at [https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html](https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html).\n\
    - The script itself could also be optimized. It should consider only PDF links\
    \ referencing files of your own website. Foreign PDFs or PDFs that have already\
    \ been swapped out should not be processed again.\n  A duplicate check is also\
    \ recommended to ensure that a document linked multiple times will only once be\
    \ uploaded to the cloud.\n- The script requires absolute links (i.e., `href=\"\
    https://hostname/...\"`). However, HTML also allows relative links (`href=\"mydocument.pdf\"\
    `). If necessary, you must supplement your script to this effect. Corresponding\
    \ sample code—there, however, formulated in Python—can be found in Chapter 17,\
    \ Section 17.2.\n\nIn a nutshell, the implementation of the simple idea of this\
    \ example faces several hurdles in practice."
