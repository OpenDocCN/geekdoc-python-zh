    # 4 PowerShell


    ```

    > $Data += 23, 27

    > $Data

    1

    17

    39

    45

    23

    27

    ```


    Array elements are accessed via an index in square brackets. As in most programming
    languages, the allowed index values range from 0 to the element count minus 1:


    ```

    > $Data[0]

    1

    > $Data[5]

    27

    ```


    When an invalid index is specified, the behavior of PowerShell depends on the
    mode. By default, PowerShell simply returns null, but does not raise an error.
    If, on the other hand, you have activated strict mode (which is highly recommended
    in your own scripts!), an error will occur:


    ```

    > $Data[6]

    > Set-StrictMode -Version Latest

    > $Data[6]

    OperationStopped: Index was outside the bounds of the array.

    ```


    You can also specify multiple index entries. Then, the result is a new array with
    the selected entries:


    ```

    > $Data[1, 2, 5]

    17

    39

    27

    ```


    The `start..end` notation returns all elements in the specified range. If `start`
    is greater than `end`, the elements will be returned in reverse order. (Be sure
    you don''t type three periods by mistake! Then, the third period would be interpreted
    as a decimal point, and the index value that follows, as a floating point number.)


    ```

    > $Data[3..5]

    45

    23

    27

    > $Data[5..3]

    27

    23

    45

    ```'
- md: "## 4.7.2 Hash Tables\n\nLike arrays, hash tables allow data to be stored but\
    \ with a significant difference: The access to the elements is not provided through\
    \ a numbered index, but by self-selected keys. For this reason, hash tables are\
    \ often referred to as *key-value stores*. You can use this feature to create\
    \ clear data structures. Using hash tables is just as easy as using arrays. Consider\
    \ the following examples:\n\n```\n> $Data = @{ OS = \"Windows\"; Version = 11;\
    \ ReleaseYear = 2021 }\n\n> $Data.MinimumRamGB = 4    # Add element\n\n> $Data\
    \                     # Read all elements\n\nName            Value\n----     \
    \       -----\nMinimumRamGB    4\nReleaseYear     2021\nOS              Windows\n\
    Version         11\n\n> $Data.ReleaseYear         # Read an element\n2021\n```\n\
    \nNormally, a hash table does not care about the order of the elements. So, you\
    \ must not rely on a loop to return the elements in the order in which you inserted\
    \ them. If the order is important for you, you must create the hash table with\
    \ the `[ordered]` keyword:\n\n```\n> $Data = [ordered]@{ Key1 = Value1; Key2 =\
    \ Value2 ... }\n```\n\n## 4.8 Output Redirection\n\nBy default, the result of\
    \ each command is displayed in the terminal. If you run `Get-ChildItem`, the terminal\
    \ will contain a list of found files afterwards. You can output variables or strings\
    \ either with the `Write-Output` cmdlet or simply by naming them. The following\
    \ two statements are therefore equivalent, and each results in the output of \"\
    Hello, World!\":\n\n```\n> Write-Output \"Hello, World!\"\n\"Hello, World!\"\n\
    ```\n\n### 4.8.1 Streams\n\nWhat looks trivially simple at first glance is more\
    \ complex behind the scenes: PowerShell differentiates between several \"streams\"\
    \ (channels) that are intended for different purposes.\n\n| Number | Description\
    \ | Cmdlet |\n| :--- | :--- | :--- |\n| 1 | Success stream | Write-Output as well\
    \ as direct output |\n| 2 | Error stream | Write-Error |\n| 3 | Warning stream\
    \ | Write-Warning |\n| 4 | Verbose stream | Write-Verbose |\n| 5 | Debug stream\
    \ | Write-Debug |\n| 6 | Information stream | Write-Information |\n| * | All streams\
    \ | – |\n\nTable 4.7 Streams\n\nWhile you use `Write-Output` for “normal” output,\
    \ you should process error messages using `Write-Error`, warnings using `Write-Warning`,\
    \ and so on. Note that you can also combine these commands via the pipe operator.\
    \ The following command writes the current process list to the debug stream:\n\
    \n```\n> Get-Process | Write-Debug\n```\n\nBy default, only streams 1 to 3 are\
    \ displayed in the terminal. Streams 4 to 6 remain invisible to avoid bothering\
    \ users with debugging information. You can control which streams are displayed\
    \ (for streams 3 through 6) via `Preference` variables:\n\n```\n> $WarningPreference,\
    \ $VerbosePreference, $DebugPreference,\n    $InformationPreference\n\nContinue\n\
    SilentlyContinue\nSilentlyContinue\nSilentlyContinue\n```\n\nThis listing shows\
    \ the default settings. Other allowed settings are the `Inquire` and `Stop` strings\
    \ (see also Table 4.9 at the end of this chapter). Thus, any output in the corresponding\
    \ stream results in a script interruption. With `Inquire`, the script can be continued\
    \ after a query; with `Stop`, it cannot.\n\n### 4.8.2 Output Redirection\n\nThe\
    \ big advantage of streams is that they can be redirected to files. The classic\
    \ redirection operator for the success stream is `> file`. Thus, all outputs of\
    \ the success stream are no longer displayed on the screen but instead saved in\
    \ a text file. If the file already exists, it will be overwritten. Within PowerShell,\
    \ you can view the contents of the file using `Get-Content`:\n\n```\n> Get-ChildItem\
    \ > files.txt\n> Get-Content files.txt\n...\n```\n\nInstead of overwriting an\
    \ existing file, you can add the text outputs at the end. For this task, you must\
    \ use the `>>` operator instead of the `>` operator.\n\nThe `>` and `>>` operators\
    \ only affect the success stream. All other streams can be redirected with `2>`\
    \ to `6>` if necessary. (When you redirect streams 3 through 6, the `Preference`\
    \ variables remain valid. If `SilentlyContinue` is set, nothing will be saved\
    \ in the specified file because the output will be suppressed.)\n\nInstead of\
    \ redirecting the streams to separate files, you can merge streams 2 through 6\
    \ with the success stream and then redirect that stream to one file. The following\
    \ command first adds the error stream to the success stream. The outputs of both\
    \ streams are then stored in the `out.txt` file.\n\n```\n> Do-Something 2>&1 >\
    \ out.txt\n```\n\nFinally, using `*>`, you can redirect all streams to a common\
    \ file.\n\n| Operator | Function |\n| :--- | :--- |\n| `>` | Redirect success\
    \ stream to a file |\n| `>>` | Add success stream to a file |\n| `2>` through\
    \ `6>` | Redirect streams 2 through 6 to a file |\n| `2>>` through `6>>` | Add\
    \ streams 2 through 6 to a file |\n| `2>&1` through `6>&1` | Merge streams 2 through\
    \ 6 with success stream |\n| `*>` | Redirect all streams to one file |\n| `2>&1\
    \ >>` | Merge streams 1 and 2 and then add them to a file |\n\n**Table 4.8** Operators\
    \ for Input and Output Redirection\n\n> **Write-Host versus Write-Output**\n\n\
    The `Write-Host` command executes output directly in the terminal (on the “host”).\
    \ At first glance, the result looks like the result of `Write-Output`.\n\nThe\
    \ crucial difference is that no redirection is possible for these outputs. With\
    \ `Write-Host`, your scripts lose flexibility. The users of your scripts cannot\
    \ simply redirect their output to a file. Use `Write-Output`!\n\n### 4.8.3 Duplicating\
    \ Output (Tee-Object)\n\nSometimes, you want to see the output of a cmdlet or\
    \ script on the screen *and* save it to a file. To do this, `Tee-Object` can help\
    \ you: This command is used with the pipe operator. It takes the success stream,\
    \ displays it, and redirects it to the specified file at the same time. If you\
    \ run the following command, you'll see the files of the current directory in\
    \ the terminal; at the same time the file list will be saved in `files.txt`.\n\
    \n```\n> Get-ChildItem | Tee-Object files.txt\n```\n\n`Tee-Object` only considers\
    \ the success stream. However, you can use `n>&1` to add another stream to the\
    \ success stream first:\n\n```\n> Get-ChildItem 2>&1 | Tee-Object files-and-errors.txt\n\
    ```\n\n### 4.8.4 (Not) Formatting the Output\n\nBy default, PowerShell formats\
    \ every output. For example, `Get-ChildItem` returns an array of `FileInfo` and\
    \ `DirectoryInfo` objects as a result. However, PowerShell does not display these\
    \ objects with all their properties but instead creates a text representation\
    \ from these objects that is reasonably readable for humans. Alternative representations\
    \ with more or less details can be obtained by passing the outputs to various\
    \ `Format` commands:\n\n```\n> Get-ChildItem | Format-List\n> Get-ChildItem |\
    \ Format-Table\n> Get-ChildItem | Format-Custom Name,Length\n```\n\nWhen you redirect\
    \ the result of a PowerShell command to a text file, an often appropriate task\
    \ is to eliminate any formatting. With the sample command `Get-ChildItem`, you're\
    \ probably only interested in the filenames, not in a table with multiple columns,\
    \ or color codes for a nicer representation of the column labels, etc. Unfortunately,\
    \ this common task can only be realized in a rather awkward way in PowerShell.\n\
    \nThe following example shows a possible approach: The result of `Get-ChildItem`\
    \ is passed to `ForEach-Object`, and `$_.Name` extracts the filename from each\
    \ object. (Details about `ForEach-Object` and the `$_` notation follow in Section\
    \ 4.9.) `Out-String` outputs the resulting names without further formatting. Finally,\
    \ `>` redirects all output to the `files.txt` file. This file then contains a\
    \ file or directory name on each line.\n\n```\n> Get-ChildItem |\n    ForEach-Object\
    \ {$_.Name} |\n    Out-String > files.txt\n```\n\n### 4.8.5 No Input Redirection\n\
    \nMany shells also provide the option of input redirection via `<`. On Linux,\
    \ `command1 | command2` is therefore equivalent to the following command sequence\
    \ (apart from the fact that the detour via a file costs storage space and time):\n\
    \n```\n$ command1 > file.txt\n$ command2 < file.txt\n```\n\nUnfortunately, PowerShell\
    \ does not support < because PowerShell commands expect objects most of the time.\
    \ But if you first write the result of a PowerShell command into a text file via\
    \ `command1 > file.txt`, the object information will be lost. The text file contains\
    \ only formatted text and subsequently cannot serve as a basis for processing\
    \ the data in another command.\n\nThe lack of input redirection becomes problematic\
    \ when you use commands from the Linux world that require just input redirection.\
    \ For example, you can make a backup of a database using `mysqldump` and restore\
    \ it later via `mysql`. On Linux and macOS, the following code would work:\n\n\
    ```\n$ mysqldump dbname > backup.sql    # Create backup\n$ mysql dbname  < backup.sql\
    \      # Restore database\n```\n\nIn PowerShell, only the first command works,\
    \ not the second. However, a workaround exists for this problem. For this purpose,\
    \ run `Get-Content` to output the contents of the `backup.sql` file. Then, redirect\
    \ this output to `mysql` by using `|`, as in the following example:\n\n```\n>\
    \ Get-Content backup.sql | mysql dbname\n```\n\n## 4.9 Loops\n\nOften, you need\
    \ to process several elements one after the other in a script, such as each line\
    \ of a text file, each file of a directory, and so on. Loops, which are available\
    \ in several syntax variants in PowerShell, can help you with this process. In\
    \ practice, the most important loop is `foreach($item in $data)`. This loop inserts\
    \ all elements from `$data` (i.e., a variable with an array or other enumeration)\
    \ in sequence into the `$item` loop variable and processes them. In the following\
    \ example, the string in `$Text` is split into words by using `Split`. These words\
    \ are then output in a loop on the screen.\n\n```\n> $Text = \"I love PowerShell!\"\
    \n\n> foreach ($Word in $Text.Split(\" \")) {\n    $Word\n  }\n\nI\nlove\nPowerShell!\n\
    ```"
  mdcn: "## 4.7.2 哈希表\n\n与数组类似，哈希表也允许存储数据，但有一个显著区别：访问元素不是通过编号索引，而是通过自选的键。因此，哈希表常被称为*键值存储*。你可以利用这一特性创建清晰的数据结构。使用哈希表与使用数组一样简单。请看以下示例：\n\
    \n```\n> $Data = @{ OS = \"Windows\"; Version = 11; ReleaseYear = 2021 }\n\n>\
    \ $Data.MinimumRamGB = 4    # 添加元素\n\n> $Data                     # 读取所有元素\n\n\
    Name            Value\n----            -----\nMinimumRamGB    4\nReleaseYear \
    \    2021\nOS              Windows\nVersion         11\n\n> $Data.ReleaseYear\
    \         # 读取一个元素\n2021\n```\n\n通常，哈希表不关心元素的顺序。因此，你不能依赖循环来按插入顺序返回元素。如果顺序对你很重要，必须使用\
    \ `[ordered]` 关键字创建哈希表：\n\n```\n> $Data = [ordered]@{ Key1 = Value1; Key2 = Value2\
    \ ... }\n```\n\n## 4.8 输出重定向\n\n默认情况下，每个命令的结果都显示在终端中。如果你运行 `Get-ChildItem`，终端随后将包含找到的文件列表。你可以使用\
    \ `Write-Output` cmdlet 或直接命名变量或字符串来输出它们。因此，以下两条语句是等效的，都会输出 \"Hello, World!\"\
    ：\n\n```\n> Write-Output \"Hello, World!\"\n\"Hello, World!\"\n```\n\n### 4.8.1\
    \ 流\n\n乍看之下简单明了的事情，背后其实更复杂：PowerShell 区分了多个用于不同目的的“流”（通道）。\n\n| 编号 | 描述 | Cmdlet\
    \ |\n| :--- | :--- | :--- |\n| 1 | 成功流 | Write-Output 以及直接输出 |\n| 2 | 错误流 | Write-Error\
    \ |\n| 3 | 警告流 | Write-Warning |\n| 4 | 详细信息流 | Write-Verbose |\n| 5 | 调试流 | Write-Debug\
    \ |\n| 6 | 信息流 | Write-Information |\n| * | 所有流 | – |\n\n表 4.7 流\n\n虽然你使用 `Write-Output`\
    \ 进行“正常”输出，但应使用 `Write-Error` 处理错误消息，使用 `Write-Warning` 处理警告，依此类推。请注意，你也可以通过管道运算符组合这些命令。以下命令将当前进程列表写入调试流：\n\
    \n```\n> Get-Process | Write-Debug\n```\n\n默认情况下，只有流 1 到 3 会显示在终端中。流 4 到 6 保持不可见，以避免用调试信息打扰用户。你可以通过\
    \ `Preference` 变量控制显示哪些流（对于流 3 到 6）：\n\n```\n> $WarningPreference, $VerbosePreference,\
    \ $DebugPreference,\n    $InformationPreference\n\nContinue\nSilentlyContinue\n\
    SilentlyContinue\nSilentlyContinue\n```\n\n此列表显示了默认设置。其他允许的设置是 `Inquire` 和 `Stop`\
    \ 字符串（另见本章末尾的表 4.9）。因此，相应流中的任何输出都会导致脚本中断。使用 `Inquire` 时，脚本可以在查询后继续；使用 `Stop` 时，则不能。\n\
    \n### 4.8.2 输出重定向\n\n流的一个巨大优势是它们可以重定向到文件。成功流的经典重定向运算符是 `> file`。因此，成功流的所有输出不再显示在屏幕上，而是保存在文本文件中。如果文件已存在，它将被覆盖。在\
    \ PowerShell 中，你可以使用 `Get-Content` 查看文件内容：\n\n```\n> Get-ChildItem > files.txt\n\
    > Get-Content files.txt\n...\n```\n\n你可以在文件末尾添加文本输出，而不是覆盖现有文件。为此，你必须使用 `>>` 运算符而不是\
    \ `>` 运算符。\n\n`>` 和 `>>` 运算符仅影响成功流。如果需要，所有其他流都可以用 `2>` 到 `6>` 重定向。（当你重定向流 3 到\
    \ 6 时，`Preference` 变量仍然有效。如果设置了 `SilentlyContinue`，则不会在指定文件中保存任何内容，因为输出将被抑制。）\n\
    \n你可以将流 2 到 6 与成功流合并，然后将该流重定向到一个文件，而不是将流重定向到单独的文件。以下命令首先将错误流添加到成功流。然后，两个流的输出都存储在\
    \ `out.txt` 文件中。\n\n```\n> Do-Something 2>&1 > out.txt\n```\n\n最后，使用 `*>`，你可以将所有流重定向到一个公共文件。\n\
    \n| 运算符 | 功能 |\n| :--- | :--- |\n| `>` | 将成功流重定向到文件 |\n| `>>` | 将成功流追加到文件 |\n\
    | `2>` 到 `6>` | 将流 2 到 6 重定向到文件 |\n| `2>>` 到 `6>>` | 将流 2 到 6 追加到文件 |\n| `2>&1`\
    \ 到 `6>&1` | 将流 2 到 6 与成功流合并 |\n| `*>` | 将所有流重定向到一个文件 |\n| `2>&1 >>` | 合并流 1 和\
    \ 2，然后将它们追加到文件 |\n\n**表 4.8** 输入和输出重定向运算符\n\n> **Write-Host 与 Write-Output**\n\
    \n`Write-Host` 命令直接在终端（“主机”）中执行输出。乍看之下，结果看起来像 `Write-Output` 的结果。\n\n关键区别在于这些输出无法重定向。使用\
    \ `Write-Host`，你的脚本会失去灵活性。你的脚本用户无法简单地将其输出重定向到文件。请使用 `Write-Output`！\n\n### 4.8.3\
    \ 复制输出 (Tee-Object)\n\n有时，你希望在屏幕上看到 cmdlet 或脚本的输出*并*将其保存到文件。为此，`Tee-Object` 可以帮助你：此命令与管道运算符一起使用。它获取成功流，显示它，同时将其重定向到指定的文件。如果你运行以下命令，你将在终端中看到当前目录的文件；同时文件列表将保存在\
    \ `files.txt` 中。\n\n```\n> Get-ChildItem | Tee-Object files.txt\n```\n\n`Tee-Object`\
    \ 只考虑成功流。但是，你可以使用 `n>&1` 先将另一个流添加到成功流：\n\n```\n> Get-ChildItem 2>&1 | Tee-Object\
    \ files-and-errors.txt\n```\n\n### 4.8.4 (不)格式化输出\n\n默认情况下，PowerShell 会格式化每个输出。例如，`Get-ChildItem`\
    \ 返回一个 `FileInfo` 和 `DirectoryInfo` 对象数组作为结果。但是，PowerShell 不会显示这些对象及其所有属性，而是从这些对象创建一个对人类来说相当易读的文本表示。通过将输出传递给各种\
    \ `Format` 命令，可以获得具有或多或少细节的替代表示：\n\n```\n> Get-ChildItem | Format-List\n> Get-ChildItem\
    \ | Format-Table\n> Get-ChildItem | Format-Custom Name,Length\n```\n\n当你将 PowerShell\
    \ 命令的结果重定向到文本文件时，一个通常合适的任务是消除任何格式。对于示例命令 `Get-ChildItem`，你可能只对文件名感兴趣，而不是包含多列的表格，或者用于更好表示列标签的颜色代码等。不幸的是，这个常见任务在\
    \ PowerShell 中只能以相当笨拙的方式实现。\n\n以下示例展示了一种可能的方法：`Get-ChildItem` 的结果传递给 `ForEach-Object`，`$_.Name`\
    \ 从每个对象中提取文件名。（关于 `ForEach-Object` 和 `$_` 表示法的详细信息将在第 4.9 节中介绍。）`Out-String` 输出结果名称，无需进一步格式化。最后，`>`\
    \ 将所有输出重定向到 `files.txt` 文件。该文件随后每行包含一个文件或目录名。\n\n```\n> Get-ChildItem |\n    ForEach-Object\
    \ {$_.Name} |\n    Out-String > files.txt\n```\n\n### 4.8.5 无输入重定向\n\n许多 shell\
    \ 还提供通过 `<` 进行输入重定向的选项。在 Linux 上，`command1 | command2` 因此等效于以下命令序列（除了通过文件的迂回会消耗存储空间和时间）：\n\
    \n```\n$ command1 > file.txt\n$ command2 < file.txt\n```\n\n不幸的是，PowerShell 不支持\
    \ <，因为 PowerShell 命令大多数时候期望对象。但如果你首先通过 `command1 > file.txt` 将 PowerShell 命令的结果写入文本文件，对象信息将丢失。文本文件仅包含格式化文本，随后不能作为在另一个命令中处理数据的基础。\n\
    \n当你使用来自 Linux 世界的需要输入重定向的命令时，缺少输入重定向会变得有问题。例如，你可以使用 `mysqldump` 备份数据库，然后通过 `mysql`\
    \ 恢复它。在 Linux 和 macOS 上，以下代码可以工作：\n\n```\n$ mysqldump dbname > backup.sql    #\
    \ 创建备份\n$ mysql dbname  < backup.sql      # 恢复数据库\n```\n\n在 PowerShell 中，只有第一个命令有效，第二个无效。但是，存在一个解决此问题的变通方法。为此，运行\
    \ `Get-Content` 输出 `backup.sql` 文件的内容。然后，使用 `|` 将此输出重定向到 `mysql`，如以下示例所示：\n\n\
    ```\n> Get-Content backup.sql | mysql dbname\n```\n\n## 4.9 循环\n\n通常，你需要在脚本中逐个处理多个元素，例如文本文件的每一行、目录中的每个文件等。循环（在\
    \ PowerShell 中有多种语法变体）可以帮助你完成此过程。在实践中，最重要的循环是 `foreach($item in $data)`。此循环将 `$data`（即包含数组或其他枚举的变量）中的所有元素依次插入\
    \ `$item` 循环变量并进行处理。在以下示例中，使用 `Split` 将 `$Text` 中的字符串拆分为单词。然后在循环中将这些单词输出到屏幕上。\n\
    \n```\n> $Text = \"I love PowerShell!\"\n\n> foreach ($Word in $Text.Split(\"\
    \ \")) {\n    $Word\n  }\n\nI\nlove\nPowerShell!\n```"
