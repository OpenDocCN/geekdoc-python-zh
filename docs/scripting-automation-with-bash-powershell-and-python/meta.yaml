  md: "# 5.12.5 Loops over Dictionaries\n\nThe comprehension syntax described earlier\
    \ in Section 5.7 can also be used for dictionaries. In the simplest form, a loop\
    \ is formed over the keys of the dictionary elements. Depending on whether you\
    \ enclose the expression in square brackets or curly brackets, the result is a\
    \ list or a set.\n\n```\n>>> d = {'a':12, 'c':78, 'b':3, 'd':43}\n>>> { x for\
    \ x in d }\n{'a', 'c', 'b', 'd'}\n>>> [ x for x in d ]\n['a', 'c', 'b', 'd']\n\
    ```\n\nIf you need two variables in the loop for the key-value pair, then you\
    \ need to use the `items` method:\n\n```\n>>> { k for k,v in d.items() }\n{'a',\
    \ 'c', 'b', 'd'}\n>>> { v for k,v in d.items() }\n{43, 3, 12, 78}\n```\n\nTo make\
    \ the result of the expression itself a dictionary again, you should form the\
    \ result expression in the `key:value` format:\n\n```\n>>> { k:v*2 for k,v in\
    \ d.items() }\n{'a': 24, 'c': 156, 'b': 6, 'd': 86}\n```\n\n# 5.12.6 Loops over\
    \ the Parameters of a Script\n\nWhen you pass parameters to a Python script, you\
    \ can evaluate them in the script using the `sys.argv` statement. `sys` is a module;\
    \ it must be read first via `import`. `argv` is a list whose first element is\
    \ the filename of the script. The other list elements contain the passed parameters.\
    \ Since the script name is rarely needed, it is eliminated using the `[1:]` expression.\n\
    \n```\n# Sample file script-parameters.py\nimport sys\nif(len(sys.argv) <= 1):\n\
    \    print(\"No parameters were passed.\")\nelse:\n    for x in sys.argv[1:]:\n\
    \        print(\"Parameter:\", x)\n```\n\nA possible call of the script could\
    \ look as follows:\n\n```\n./script-parameters.py a b\nParameter: a\nParameter:\
    \ b\n```"
