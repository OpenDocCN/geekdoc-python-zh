    # Settings


    Finally, you can adjust some settings, including whether your task should be completed
    exactly at the scheduled time; whether it can be run at a later time; whether
    the process should be terminated automatically after a certain runtime (by default,
    an absurd 3 days is used here!); and more. For our initial tests, you can leave
    all the options in their default settings.


    With a little luck, the script should run right away. You can check whether the
    script has run by looking at the *date.log* file in the set directory (**Start
    in**). From now on, another line with the current time should be added to this
    file every hour.


    # 11.3.1 Troubleshooting


    From experience, automated script execution does not always work right away. For
    troubleshooting purposes, your first step should be to enable the **Enable All
    Tasks History** command in Microsoft Windows Task Scheduler. Behind this somewhat
    cryptic description is a logging function. Microsoft Windows Task Scheduler can
    log when actions are started and why, when they end, and more.


    You can also use the **Run** command to start a script manually at any time, regardless
    of the selected trigger time. In the action list, in the **Next Run Time** column,
    you can see what the next regular start time of your script is.


    On one of my test machines, Microsoft Windows Task Scheduler was completely unable
    to find `pwsh`, despite (presumably) correct `PATH` settings. In the event logging,
    only *file not found* was logged, without a clear indication as to which file
    was not found (`pwsh`, the script, another file?). Ultimately, I uninstalled PowerShell
    entirely, reinstalled it using `winget`, and rebooted the machine. After that,
    it worked.'
