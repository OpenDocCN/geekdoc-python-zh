- md: "## HOW TO USE THE BOOK\n\nThis book has been divided into many chapters. Chapter\
    \ gives the motivation for this book and the use of templates. The text is presented\
    \ in the simplest language. Each paragraph has been arranged under a suitable\
    \ heading for easy retention of concept. Keywords are the words that academics\
    \ use to reveal the internal structure of an author's reasoning. Review questions\
    \ at the end of each chapter ask students to review or explain the concepts. References\
    \ provides the reader an additional source through which he/she can obtain more\
    \ information regarding the topic.\n\n## LEARNING OBJECTIVES\n\nSee what you are\
    \ going to cover and what you should already know at the start of each chapter\n\
    \n![](img/192fecf3b33c4ee7d07f7123b285647a_6_0.png)\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_6_1.png)\n\
    \n## ABOUT THIS CHAPTER\n\nAn introduction is a beginning of section which states\
    \ the purpose and goals of the topics which are discussed in the chapter. It also\
    \ starts the topics in brief.\n\n## REMEMBER\n\nThis revitalizes a must read information\
    \ of the topic.\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_6_2.png)\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_6_3.png)\n\
    \n## KEYWORDS\n\nThis section contains some important definitions that are discussed\
    \ in the chapter. A keyword is an index entry that identifies a specific record\
    \ or document. It also gives the extra information to the reader and an easy way\
    \ to remember the word definition.\n\n## DID YOU KNOW?\n\nThis section equip readers\
    \ the interesting facts and figures of the topic.\n\n## EXAMPLE\n\nThe book cabinets'\
    \ examples to illustrate specific ideas in each chapter.\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_7_0.png)\n\
    \n## ROLE MODEL\n\nA biography of someone who has/had acquired remarkable success\
    \ in their respective field as Role Models are important because they give us\
    \ the ability to imagine our future selves.\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_7_1.png)\n\
    \n![](img/192fecf3b33c4ee7d07f7123b285647a_7_2.png)\n\n## CASE STUDY\n\nThis reveals\
    \ what students need to create and provide an opportunity for the development\
    \ of key skills such as communication, group working and problem solving.\n\n\
    ## KNOWLEDGE CHECK\n\nThis is given to the students for progress check at the\
    \ end of each chapter.\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_7_3.png)\n\n\
    ![](img/192fecf3b33c4ee7d07f7123b285647a_7_4.png)\n\n## REVIEW QUESTIONS\n\nThis\
    \ section is to analyze the knowledge and ability of the reader.\n\n## REFERENCES\n\
    \nReferences refer those books which discuss the topics given in the chapters\
    \ in almost same manner.\n\n## TABLE OF CONTENTS\n\nPreface xv\n\n## Chapter 1\
    \ Introduction to Python 1\n\n- Introduction 1\n- 1.1 Overview of Python 2\n \
    \ - 1.1.1 History of Python 3\n  - 1.1.2 Python Features 3\n- 1.2 Python Environment\
    \ Setup 4\n  - 1.2.1 Getting Python 5\n  - 1.2.2 Installing Python 5\n  - 1.2.3\
