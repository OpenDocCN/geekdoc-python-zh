    \n## 8.1 PYTHON - DECISION MAKING\n\nDecisions in a program are used when the\
    \ program has conditional choices to execute a code block. Let's take an example\
    \ of traffic lights, where different colors of lights lit up in different situations\
    \ based on the conditions of the road or any specific rule.\n\nIt is the prediction\
    \ of conditions that occur while executing a program to specify actions. Multiple\
    \ expressions get evaluated with an outcome of either TRUE or FALSE. These are\
    \ logical decisions, and Python also provides decision-making statements that\
    \ to make decisions within a program for an application based on the user requirement.\n\
    \nThere comes a point in your life where you need to decide what steps should\
    \ be taken and based on that you decide your next decisions.\n\nIn programming,\
    \ we often have this similar situation where we need to decide which block of\
    \ code should be executed based on a condition.\n\nLet's take a simple example.\n\
    Suppose you are writing a program for a game. So at every step, we need to take\
    \ decisions like:\n\n- If the user presses ‘w’ key, then the character will move\
    \ forward.\n- If the user presses ‘spacebar’, then the character will jump.\n\
    - If the character runs into an obstacle, then the game is over otherwise we continue\
    \ playing.\n\nDecisions like these are required everywhere in programming and\
    \ they decide the direction of flow of program execution.\n\nPython has the following\
    \ decision-making statements:\n\n- if statements\n- if-else statements\n- if-elif\
    \ ladder\n- Nested statements\n\nLet's discuss these decision making statements\
    \ in Python in detail.\n\n### 8.1.1 Python if Statement\n\nif statement is the\
    \ most simple form of **decision-making statement**. It takes an expression and\
    \ checks if the expression evaluates to True then the block of code in if statement\
    \ will be executed.\n\n> **Keyword**\nDecision making statements allow you to\
    \ decide the order of execution of specific statements in your program. You can\
    \ set up a condition and tell the compiler to take a particular action if the\
    \ condition is met.\n\nIf the expression evaluates to False, then the block of\
    \ code is skipped.\n\nSyntax:\n\n```\nif ( expression ):\n    Statement 1\n  \
    \  Statement 2\n    .\n    Statement n\n```\n\n# Python if statement\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_249_0.png)\n\
    \n# Example 1:\n\n```\na = 20 ; b = 20\nif ( a == b ):\n    print( “a and b are\
    \ equal”)\n    print(“If block ended”)\n```\n\n# Output:\n\na and b are equal\n\
    If block ended\n\n# Example 2:\n\n```\nnum = 5\n\nif ( num >= 10):\n\n    print(\"\
    num is greater than 10\")\n\nprint(\"if block ended\")\n```\n\n# Output:\n\nIf\
    \ block ended\n\nIn example 1, we see that the condition a==b evaluates to True.\
    \ Therefore, the block of code inside if statement is executed.\nIn example 2,\
    \ the condition evaluates to False, therefore, the print statement was not executed\
    \ and the only statement that got executed was because it was outside the if block.\n\
    Note: Don’t forget to add a colon(:) after if statement and indent the statements\
    \ properly that are executed when a condition is True.\n\n### 8.1.2 Python if-else\
    \ Statement\n\nFrom the name itself, we get the clue that the if-else statement\
    \ checks the expression and executes the if block when the expression is True\
    \ otherwise it will execute the else block of code. The else block should be right\
    \ after if block and it is executed when the expression is False.\n\n# Syntax:\n\
    \n```\nif( expression ):\n\n    Statement\n\nelse:\n\n    Statement\n```\n\n#\
    \ Python if-else statement\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_251_0.png)\n\
    \n**Example:**\n\n```\npython\nnumber1 = 20 ; number2 = 30\n\nif(number1 >= number2\
    \ ):\n    print(“number 1 is greater than number 2”)\nelse:\n    print(“number\
    \ 2 is greater than number 1”)\n```\n\n**Output:**\n\nnumber 2 is greater than\
    \ number 1\n\nNote: Only one else statement is followed by an if statement. If\
    \ you use two else statements after an if statement, then you get the following\
    \ error.\n\n**Example:**\n\n```\npython\nif (5>10):\n    print(5)\nelse:\n   \
    \ print(10)\nelse:\n    print(\"End\")\n```\n\n**Output:**\n\n```\nSyntaxError:\
    \ invalid syntax\n```\n\n### 8.1.3 Python if-elif ladder\n\nYou might have heard\
    \ of the else-if statements in other languages like C/C++ or Java. In Python,\
    \ we have an elif keyword to chain multiple conditions one after another. With\
    \ elif ladder, we can make complex decision-making statements. The elif statement\
    \ helps you to check multiple expressions and it executes the code as soon as\
    \ one of the conditions evaluates to True.\n\n**Syntax:**\n\n```\nif( expression1\
    \ ):\n    statement\n\nelif (expression2 ) :\n    statement\n\nelif(expression3\
