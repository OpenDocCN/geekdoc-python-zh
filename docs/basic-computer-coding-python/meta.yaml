  md: '# SUMMARY


    +   - A database program is the heart of a business information system and provides
    file creation, data entry, update, query and reporting functions.

    - The database is a collection of organized information that can easily be used,
    managed, update, and they are classified according to their organizational approach.

    - Python DB-API is independent of any database engine, which enables you to write
    Python scripts to access any database engine.

    - Connection objects create a connection with the database and these are further
    used for different transactions. These connection objects are also used as representatives
    of the database session.

    - Cursor is one of the powerful features of SQL. These are objects that are responsible
    for submitting various SQL statements to a database server.

    - Exception handling is very easy in the Python DB-API module. We can place warnings
    and error handling messages in the programs.

    - Python and MySQL are a good combination to develop database applications. After
    starting the MySQL service on Linux, you need to acquire MySQLdb, a Python DB-API
    for MySQL to perform database operations.

    - Python Database API (Application Program Interface) is the Database interface
    for the standard Python. This standard is adhered to by most Python Database interfaces.

    - MySQL is one of the most popular database management systems (DBMSs) on the
    market today. It ranked second only to the Oracle DBMS in this year''s DB-Engines
    Ranking. As most software applications need to interact with data in some form,
