  md: 'where the test and body nodes are compiled recursively. Virtually all of the
    compilation rules can be described as rewrites like this. Compilation has the
    opposite structure of parsing: it flattens the tree, converting it back to bytes.


    Bytecode is virtual machine instructions are packed into an array of bytes. The
    instructions are based on stack manipulation. Some instructions have no arguments
    and take up one byte, e.g. BINARY_ADD (pop two values from the stack and push
    their sum), while other instructions have an additional two-byte integer argument,
    e.g. LOAD_NAME i (push the value of the i-th variable name). The full list of
    bytecodes is here. Bytecode is paired with a symbol table and constant pool so
    that names and literals can be referenced by number in the instructions.


    The bytecode for the above parse tree is something like:


    ```

    loop:


    load-name 1     (x)

    load-const 1    (3)

    compare-op le


    jump_if_false done


    load-name 2     (f)

    load-name 1     (x)

    call-function 1


    jump loop

    done:

    ```


    Python does not perform much optimization on the bytecode, except for speeding-up
    local variable access. The reasons for this are tied to how the interpreter works
    and will be discussed later.


    This conversion pattern, where the input is abstracted, processed, then specialized,
    is a common one in many varieties of programs and is also presented in Abstraction
    and Specification in Program Development.


