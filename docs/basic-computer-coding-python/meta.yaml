    \ as cursor:\n            for result in cursor.execute(update_query, multi=True):\n\
    \                if result.with_rows:\n                    print(result.fetchall())\n\
    \            connection.commit()\nexcept Error as e:\n    print(e)\n```\n\nSave\
    \ this code to a file named modify_ratings.py. The above code uses %s placeholders\
    \ to insert the received input in the update_query string. For the first time\
    \ in this tutorial, you have multiple queries inside a single string. To pass\
    \ multiple queries to a single cursor.execute(), you need to set the method’s\
    \ multi argument to True.\n\nIf multi is True, then cursor.execute() returns an\
    \ iterator. Each item in the iterator corresponds to a cursor object that executes\
    \ a statement passed in the query. The above code runs a for loop on this iterator\
    \ and then calls .fetchall() on each cursor object.\n\n**Note:** Running .fetchall()\
    \ on all cursor objects is important. To execute a new statement on the same connection,\
    \ you must ensure that there are no unread results from previous executions. If\
    \ there are unread results, then you’ll receive an exception.\n\nIf no result\
    \ set is fetched on an operation, then .fetchall() raises an exception. To avoid\
    \ this error, in the code above you use the cursor.with_rows property, which indicates\
    \ whether the most recently executed operation produced rows."
