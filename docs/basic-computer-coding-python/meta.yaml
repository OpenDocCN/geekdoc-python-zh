    way between two points, as in the routing of communication networks and in flight
    planning. His research on the idea of mutual exclusion in communications led him
    to suggest in 1968 the concept of computer semaphores, which are used in virtually
    every modern operating system. A letter he wrote in 1968 was extremely influential
    in the development of structured programming. He received the Turing Award in
    .1972


