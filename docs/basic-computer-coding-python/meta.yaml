    \ *f* is always closed, even if a problem was encountered while processing the\
    \ lines. Objects which, like files, provide pre-defined clean-up actions will\
    \ indicate this in their documentation.\n\n# 4.2 UNIT TESTING\n\nThe Python unit\
    \ testing framework, sometimes referred to as “PyUnit,” is a Python language version\
    \ of JUnit, by Kent Beck and Erich Gamma. JUnit is, in turn, a Java version of\
    \ Kent’s Smalltalk testing framework. Each is the de facto standard unit testing\
    \ framework for its respective language.\n\nunittest supports **test automation**,\
    \ sharing of setup and shutdown code for tests, aggregation of tests into collections,\
    \ and independence of the tests from the reporting framework. The unittest module\
