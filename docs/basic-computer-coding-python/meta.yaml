    ## 2.2.2 标准模块\n\nPython 自带一个标准模块库，在单独的文档（即 Python 库参考手册，以下简称“库参考手册”）中描述。一些模块是内置在解释器中的；这些模块提供了对非语言核心部分但仍然是内置操作的访问，要么是为了效率，要么是为了提供对操作系统原语（如系统调用）的访问。这组模块是一个配置选项，也取决于底层平台。例如，`winreg`\
