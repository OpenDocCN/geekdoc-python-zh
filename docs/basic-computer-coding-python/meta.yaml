    \n![](img/192fecf3b33c4ee7d07f7123b285647a_253_0.png)\n\nExample:\n\n```\nprint(\"\
    Select your ride:\")\nprint(\"1. Bike\")\nprint(\"2. Car\")\nprint(\"3. SUV\"\
    )\nchoice = int( input() )\nif( choice == 1 ):\n    print( \"You have selected\
    \ Bike\" )\nelif( choice == 2 ):\n    print( \"You have selected Car\" )\nelif(\
    \ choice == 3 ):\n    print( \"You have selected SUV\" )\nelse:\n    print(\"\
    Wrong choice!\")\n```\n\nOutput:\nSelect your ride:\n1. Bike\n2. Car\n3. SUV\n\
