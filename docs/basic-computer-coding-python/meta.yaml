    它实现了信号量对象。信号量持有一个原子计数器，表示 `release()` 调用次数减去 `acquire()` 调用次数，再加上一个初始值。`acquire()`
    在需要时阻塞，直到它可以返回而不使计数器变为负数。计数器的默认值为 1。


    此类实现信号量对象。信号量管理一个原子计数器，表示 `release()` 调用次数减去 `acquire()` 调用次数，再加上一个初始值。`acquire()`
    方法在必要时阻塞，直到它可以返回而不使计数器变为负数。如果未给出，`value` 默认为 1。


    *value* 可以作为内部计数器的初始值。默认值为 1。如果我们传递一个小于 0 的值，这将引发 `ValueError`。


    它具有以下方法：


    a. `acquire(blocking=True, timeout=None)`


    这会获取一个信号量。当我们传递一个非 `None` 的 *timeout* 值时，它最多阻塞 *timeout* 秒。如果在该时间间隔内，`acquire()`
    未成功完成，它返回 `False`。否则，它返回 `True`。


    当我们不带参数调用它时，可能出现以下情况：


    - 如果进入时内部计数器大于零，它将其递减一，然后返回。

    - 如果进入时内部计数器为零，它会阻塞，直到调用 `release()` 唤醒它。现在计数器大于 0，它将其递减 1，然后返回 `True`。每次调用 `release()`
    恰好唤醒一个线程。我们无法说出这发生的顺序。

    - 当我们以 *blocking* 值为 `False` 调用它时，它不会阻塞。并且如果无参数调用会阻塞，那么它返回 `False`。否则，它执行与无参数调用相同的操作，然后返回
    `True`。


    b. `release()`


    此方法释放信号量，并将内部计数器递增 1。当进入时它为 0，并且另一个线程等待它再次增长时，它会唤醒该线程。


    我们还有有界信号量：


    ```python

    class threading.BoundedSemaphore(value=1)

    ```


    此类实现有界信号量对象。此类对象确保其当前值不超过其初始值。如果发生这种情况，这将引发 `ValueError`。通常，信号量保护容量有限的资源，例如数据库服务器。在资源大小固定的地方，使用有界信号量。但如果它释放信号量的次数过多，那么你的代码中可能存在错误。默认值为
    1。


    让我们举个例子。主线程在生成任何工作线程之前初始化信号量：


    ```python

    >>> maxconnections = 5

    >>> pool_sema = threading.BoundedSemaphore(value=maxconnections)

    ```


    现在它已生成，工作线程在必须连接到服务器时调用 `acquire()` 和 `release()`：


    ```python

    >>> with pool_sema:

    ...     conn = connectdb()

    ...     try:

    ...         # 使用连接

    ...     finally:

    ...         conn.close()

    ```


    使用有界信号量减少了编程错误的可能性。


    ## 7.2.7 事件对象


    Python 多线程中一个极其简单的通信工具，它让一个线程播放一个事件，而另一个必须等待它。事件对象处理一个内部标志。方法 `set()` 和 `clear()`
    允许我们分别将其设置和重置为 `True` 和 `False`。在 *flag* 为 `True` 之前，`wait()` 会阻塞。


    这是该类：


    ```python

    class threading.Event

    ```


    此类实现事件对象。事件处理一个标志，我们可以使用方法 `set()` 和 `clear()` 分别将其设置和重置为 `True` 和 `False`。最初，标志为
    `False`。`wait()` 会阻塞它，直到它变为 `True`。


    它具有以下方法：


    a. `is_set()`

    如果内部标志为 `True`，它返回 `True`。


    b. `set()`

    此方法将内部标志设置为 `True`，并唤醒所有等待它变为 `True` 的线程。一旦它为 `True`，等待的线程根本不会阻塞。


    c. `clear()`

    这会将内部标志重置为 `False`。最终，等待的线程会阻塞，直到有人调用 `set()` 将内部标志再次设置为 `True`。


    d. `wait(timeout=None)`

    在内部标志为 `True` 之前，此方法会阻塞。进入时，如果它为 `True`，它会立即返回。否则，它会阻塞，直到另一个线程调用 `set()` 将标志设置为
    `True`，或者直到 *timeout* 发生。

    当 *timeout* 存在且不为 `None` 时，请确保它是一个浮点数，表示操作的 *timeout*（以秒或分数为单位）。

    它仅在内部标志为 `True` 时返回 `True` - 无论是在调用 `wait()` 之前还是之后。这样，`wait()` 总是返回 `True`。但是，如果
    *timeout* 存在且操作超时，它返回 `False`。


    ## 7.2.8 定时器对象


    定时器表示一个应在给定时间后运行的操作；它是 Python 多线程中的一个定时器。这是 `Thread` 的子类，我们也可以用它来学习如何创建自己的线程。

    当我们在线程上调用 `start()` 时，一个定时器会随之启动。如果我们调用 `cancel()`，我们可以在它开始之前停止它。在执行之前，定时器会等待一段时间；这可能与我们指定的时间间隔不同。


    ```python

    >>> def hello():

    ...     print("Hello")

    >>> t = threading.Timer(30.0, hello)

    >>> t.start()

    ```


    这是该类：


    ```python

    class threading.Timer(interval, function, args=None, kwargs=None)

    ```


    它创建一个定时器，在 *interval* 秒后运行一个函数（带有参数 `args` 和 `kwargs`）。当 `args` 为 `None` 时，它使用一个空列表。这是默认值。当
    `kwargs` 为 `None` 时，它使用一个空字典。这也是默认值。


    它有一个方法：


    a. `cancel()`


    > **关键词**

    > **同步**是指两个不同但相关的概念之一：进程同步和数据同步。


    这会停止定时器，然后取消其操作。这仅在定时器正在等待时有效。


    现在 Python 多线程中的最后一个是屏障对象。


    ## 7.2.9 屏障对象


    屏障是一个简单的**同步**原语，用于必须相互等待的固定数量的线程。每个线程通过调用 `wait` 来尝试通过屏障；它会阻塞，直到所有线程都这样做。然后，线程同时释放。


    你可以为相同数量的线程多次重用屏障。


    让我们举个例子。同步客户端和服务器线程的一种方式是：


    ```python

    >>> b = threading.Barrier(2, timeout=5)

    >>> def server():

    ...     start_server()

    ...     b.wait()

    ...     while True:

    ...         connection = accept_connection()

    ...         process_server_connection(connection)

    >>> def client():

    ...     b.wait()

    ...     while True:

    ...         connection = make_connection()

    ...         process_client_connection(connection)

    ```


    这是该类：


    ```python

    class threading.Barrier(parties, action=None, timeout=None)

    ```


    屏障为 *parties* 数量的线程创建一个屏障对象。当我们传递 *action* 时，它是一个可调用对象，线程在释放时会调用它。最后，*timeout*
    是如果我们未为 `wait()` 指定相同值时的默认超时值。


    它具有以下方法：


    a. `wait(timeout=None)`


    `wait()` 通过屏障。一旦所有线程方都调用了 `wait()`，它们都会一起释放。如果我们传递了 *timeout* 的值，它会使用这个值，无论我们是否为类构造函数提供了相同的值。'
