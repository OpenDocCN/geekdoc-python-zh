- md: "## Basic Computer Coding: Python\n\n(1, 'Forrest Gump', 1994, 'Drama', Decimal('330.2'))\n\
    (2, '3 Idiots', 2009, 'Drama', Decimal('2.4'))\n(3, 'Eternal Sunshine of the Spotless\
