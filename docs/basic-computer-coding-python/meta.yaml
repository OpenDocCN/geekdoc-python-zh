    blocks, it returns False. Otherwise, it does what it does for a call without arguments,
    and then returns True. And when we call acquire() with *timeout*, which is a floating-point
    number, with a positive value, this blocks for a maximum of *timeout* number of
    seconds, as long as we cannot acquire the lock. If a thread has acquired it, it
    returns True; if *timeout* has elapsed, it returns False.


    +   b. release()


    This method releases a lock and decrements the recursion level. Once the decrement
    is 0, it resets the lock to the ‘unlocked’ state. This means no thread owns it.
    If other threads are blocked, only one of them may continue. If the decrement
    is non-zero, the lock stays in the ‘locked’ state, and belongs to the calling
    thread.


    You should only call release() when the calling thread actually owns the lock.
    If it is already ‘unlocked’, this raises a RuntimeError.


    release() returns no value.


