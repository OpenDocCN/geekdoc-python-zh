  md: "# An Example\n\nMany useful line-processing programs will read a text file\
    \ line-at-a-time and do some minor processing as they write the lines to an output\
    \ file. They might number the lines in the output file, or insert extra blank\
    \ lines after every 60 lines to make it convenient for printing on sheets of paper,\
    \ or extract some specific columns only from each line in the source file, or\
    \ only print lines that contain a specific substring. We call this kind of program\
    \ a **filter**.\n\nHere is a filter that copies one file to another, omitting\
    \ any lines that begin with #:\n\n```\ninfile = open(oldfile, 'r')\noutfile =\
    \ open(newfile, 'w')\nwhile True:\n    text = infile.readline()\n    if len(text)\
    \ == 0:\n        break\n    if text[0] == '#':\n        continue\n\n    # put\
    \ any more processing logic here\n    outfile.write(text)\n\ninfile.close()\n\
    outfile.close()\n```\n\nThe continue statement at line 9 skips over the remaining\
    \ lines in the current iteration of the loop, but the loop will still iterate.\
    \ This style looks a bit contrived here, but it is often useful to say \"*get\
    \ the lines we're not concerned with out of the way early, so that we have cleaner\
    \ more focussed logic in the meaty part of the loop that might be written around\
    \ line 11.*\"\n\nThus, if text is the empty string, the loop exits. If the first\
    \ character of text is a hash mark, the flow of execution goes to the top of the\
    \ loop, ready to start processing the next line. Only if both conditions fail\
    \ do we fall through to do the processing at line 11, in this example, writing\
    \ the line into the new file.\n\nLet's consider one more case: suppose your original\
    \ file contained empty lines. At line 6 above, would this program find the first\
    \ empty line in the file, and terminate immediately? No! Recall that readline\
    \ always includes the newline character in the string it returns. It is only when\
    \ we try to read *beyond* the end of the file that we get back the empty string\
    \ of length 0."
