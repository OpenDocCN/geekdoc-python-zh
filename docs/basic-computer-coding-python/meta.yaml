    # SUMMARY


    +   - Object-oriented programming (OOP) is a method of structuring a program by
    bundling related properties and behaviors into individual objects. Conceptually,
    objects are like the components of a system. Think of a program as a factory assembly
    line of sorts.

    - Object-oriented programming is a programming paradigm that provides a means
    of structuring programs so that properties and behaviors are bundled into individual
    objects.

    - The key takeaway is that objects are at the center of object-oriented programming
    in Python, not only representing the data, as in procedural programming, but in
    the overall structure of the program as well.

    - Python has been an object-oriented language since it existed. Because of this,
    creating and using classes and objects are downright easy. This chapter helps
    you become an expert in using Python’s object-oriented programming support.

    - Instance methods are defined inside a class and are used to get the contents
    of an instance.

    - Inheritance is the process by which one class takes on the attributes and methods
    of another.

    - Python has been an object-oriented language from day one. Because of this, creating
    and using classes and objects are downright easy. If you don’t have any experience
    with object-oriented (OO) programming.

    - Inheritance is a way of creating new class for using details of existing class
    without modifying it. The newly formed class is a derived class (or child class).

    - A class is an example of encapsulation as it encapsulates all the data that
    is member functions, variables etc.

    - Python follows the philosophy of we’re all adults here with respect to hiding
    attributes and methods; i.e. you should trust the other programmers who will use
    your classes.

    - Data abstraction and encapsulation both are often used as synonyms. Both are
    nearly synonym because data abstraction is achieved through encapsulation.'
