    # 3.1.2 Modifying Dictionaries


    Dictionaries are a mutable data structure, so you are able to modify them. In
    this section, we will go over adding and deleting dictionary elements.


    # Adding and Changing Dictionary Elements


    Without using a method or function, you can add key-value pairs to dictionaries
    by using the following syntax:


    ```

    dict[key] = value

    ```


    We’ll look at how this works in practice by adding a key-value pair to a dictionary
    called usernames:


    ```

    usernames = {''Sammy'': ''sammy-shark'', ''Jamie'': ''mantisshrimp54''}

    usernames[''Drew''] = ''squidly''

    print(usernames)

    Output

    {''Drew'': ''squidly'', ''Sammy'': ''sammy-shark'', ''Jamie'': ''mantisshrimp54''}

    ```


    We see now that the dictionary has been updated with the ‘Drew’: ‘squidly’ key-value
    pair. Because dictionaries may be unordered, this pair may occur anywhere in the
    dictionary output. If we use the usernames dictionary later in our program file,
    it will include the additional key-value pair.


    Additionally, this syntax can be used for modifying the value assigned to a key.
    In this case, we will reference an existing key and pass a different value to
    it.


    Let’s consider a dictionary drew that is one of the users on a given network.
    We will say that this user got a bump in followers today, so we need to update
    the **integer** value passed to the ‘followers’ key. We’ll use the print() function
    to check that the dictionary was modified.


    ```

    drew = {''username'': ''squidly'', ''online'': True, ''followers'': 305}

    drew[''followers''] = 342

    print(drew)

    Output

    {''username'': ''squidly'', ''followers'': 342, ''online'': True}

    ```


    In the output, we see that the number of followers jumped from the integer value
    of 305 to 342.


    We can use this method for adding key-value pairs to dictionaries with user-input.
    Let’s write a quick program, usernames.py that runs on the command line and allows
    input from the user to add more names and associated usernames:'
