- md: "rational numbers. As you read the next few sections, keep in mind that most\
    \ Python code written today uses very high-level abstract data types that are\
    \ built into the language, like classes, dictionaries, and lists. Since we’re\
    \ building up an understanding of how these abstractions work, we can’t use them\
    \ yet ourselves. As a consequence, we will write some code that isn’t Pythonic\
    \ --- it’s not necessarily the typical way to implement our ideas in the language.\
    \ What we write is instructive, however, because it demonstrates how these abstractions\
    \ can be constructed! Remember that computer science isn’t just about learning\
    \ to use programming languages, but also learning how they work.\n\n## Example:\
    \ Arithmetic on Rational Numbers\n\nRecall that a rational number is a ratio of\
    \ integers, and rational numbers constitute an important sub-class of real numbers.\
    \ A rational number like 1/3 or 17/29 is typically written as:\n\n    <numerator>/<denominator>\n\
    \nwhere both the `<numerator>` and `<denominator>` are placeholders for integer\
    \ values. Both parts are needed to exactly characterize the value of the rational\
    \ number.\n\nRational numbers are important in computer science because they,\
    \ like integers, can be represented exactly. Irrational numbers (like pi or e\
    \ or sqrt(2)) are instead approximated using a finite binary expansion. Thus,\
    \ working with rational numbers should, in principle, allow us to avoid approximation\
    \ errors in our arithmetic.\n\nHowever, as soon as we actually divide the numerator\
    \ by the denominator, we can be left with a truncated decimal approximation (a\
    \ float).\n\n    >>> 1/3\n    0.3333333333333333\n\nand the problems with this\
    \ approximation appear when we start to conduct tests:\n\n    >>> 1/3 == 0.333333333333333300000\
    \  # Beware of approximations\n    True\n\nHow computers approximate real numbers\
    \ with finite-length decimal expansions is a topic for another class. The important\
    \ idea here is that by representing rational numbers as ratios of integers, we\
    \ avoid the approximation problem entirely. Hence, we would like to keep the numerator\
    \ and denominator separate for the sake of precision, but treat them as a single\
    \ unit.\n\nWe know from using functional abstractions that we can start programming\
    \ productively before we have an implementation of some parts of our program.\
    \ Let us begin by assuming that we already have a way of constructing a rational\
    \ number from a numerator and a denominator. We also assume that, given a rational\
    \ number, we have a way of extracting (or selecting) its numerator and its denominator.\
    \ Let us further assume that the constructor and selectors are available as the\
    \ following three functions:\n\n- `make_rat(n, d)` returns the rational number\
    \ with numerator n and denominator d.\n- `numer(x)` returns the numerator of the\
    \ rational number x.\n- `denom(x)` returns the denominator of the rational number\
    \ x.\n\nWe are using here a powerful strategy of synthesis: *wishful thinking*.\
    \ We haven't yet said how a rational number is represented, or how the functions\
    \ `numer`, `denom`, and `make_rat` should be implemented. Even so, if we did have\
    \ these three functions, we could then add, multiply, and test equality of rational\
    \ numbers by calling them:\n\n```python\n>>> def add_rat(x, y):\n        nx, dx\
    \ = numer(x), denom(x)\n        ny, dy = numer(y), denom(y)\n        return make_rat(nx\
    \ * dy + ny * dx, dx * dy)\n>>> def mul_rat(x, y):\n        return make_rat(numer(x)\
    \ * numer(y), denom(x) * denom(y))\n>>> def eq_rat(x, y):\n        return numer(x)\
    \ * denom(y) == numer(y) * denom(x)\n```\n\nNow we have the operations on rational\
    \ numbers defined in terms of the selector functions `numer` and `denom`, and\
    \ the constructor function `make_rat`, but we haven't yet defined these functions.\
    \ What we need is some way to glue together a numerator and a denominator into\
    \ a unit.\n\n## Tuples\n\nTo enable us to implement the concrete level of our\
    \ data abstraction, Python provides a compound structure called a tuple, which\
    \ can be constructed by separating values by commas. Although not strictly required,\
    \ parentheses almost always surround tuples.\n\n```python\n>>> (1, 2)\n(1, 2)\n\
    ```\n\nThe elements of a tuple can be unpacked in two ways. The first way is via\
    \ our familiar method of multiple assignment.\n\n```python\n>>> pair = (1, 2)\n\
    >>> pair\n(1, 2)\n>>> x, y = pair\n>>> x\n1\n>>> y\n2\n```\n\nIn fact, multiple\
    \ assignment has been creating and unpacking tuples all along.\n\nA second method\
    \ for accessing the elements in a tuple is by the indexing operator, written as\
    \ square brackets.\n\n```python\n>>> pair[0]\n1\n>>> pair[1]\n2\n```\n\nTuples\
    \ in Python (and sequences in most other programming languages) are 0-indexed,\
    \ meaning that the index 0 picks out the first element, index 1 picks out the\
    \ second, and so on. One intuition that underlies this indexing convention is\
    \ that the index represents how far an element is offset from the beginning of\
    \ the tuple.\n\nThe equivalent function for the element selection operator is\
    \ called `getitem`, and it also uses 0-indexed positions to select elements from\
    \ a tuple.\n\n```python\n>>> from operator import getitem\n>>> getitem(pair, 0)\n\
    1\n```\n\nTuples are native types, which means that there are built-in Python\
    \ **operators** to manipulate them. We'll return to the full properties of tuples\
    \ shortly. At present, we are only interested in how tuples can serve as the glue\
    \ that implements abstract data types.\n\n**Representing Rational Numbers.** Tuples\
    \ offer a natural way to implement rational numbers as a pair of two integers:\
    \ a numerator and a denominator. We can implement our constructor and selector\
    \ functions for rational numbers by manipulating 2-element tuples.\n\n```python\n\
    >>> def make_rat(n, d):\n        return (n, d)\n>>> def numer(x):\n        return\
    \ getitem(x, 0)\n>>> def denom(x):\n        return getitem(x, 1)\n```\n\nA function\
    \ for printing rational numbers completes our implementation of this abstract\
    \ data type.\n\n```python\n>>> def str_rat(x):\n    \"\"\"Return a string 'n/d'\
    \ for numerator n and denominator d.\"\"\"\n    return '{0}/{1}'.format(numer(x),\
    \ denom(x))\n```\n\nTogether with the arithmetic operations we defined earlier,\
    \ we can manipulate rational numbers with the functions we have defined.\n\n```python\n\
    >>> half = make_rat(1, 2)\n>>> str_rat(half)\n'1/2'\n>>> third = make_rat(1, 3)\n\
    >>> str_rat(mul_rat(half, third))\n'1/6'\n>>> str_rat(add_rat(third, third))\n\
    '6/9'\n```\n\nAs the final example shows, our rational-number implementation does\
    \ not reduce rational numbers to lowest terms. We can remedy this by changing\
    \ `make_rat`. If we have a function for computing the greatest common denominator\
    \ of two integers, we can use it to reduce the numerator and the denominator to\
    \ lowest terms before constructing the pair. As with many useful tools, such a\
    \ function already exists in the Python Library.\n\n```python\n>>> from fractions\
    \ import gcd\n>>> def make_rat(n, d):\n    g = gcd(n, d)\n    return (n//g, d//g)\n\
    ```\n\nThe double slash operator, `//`, expresses integer division, which rounds\
    \ down the fractional part of the result of division. Since we know that `g` divides\
    \ both `n` and `d` evenly, integer division is exact in this case. Now we have\n\
    \n```python\n>>> str_rat(add_rat(third, third))\n'2/3'\n```\n\nas desired. This\
    \ modification was accomplished by changing the constructor without changing any\
    \ of the functions that implement the actual arithmetic operations.\n\n## Abstraction\
    \ Barriers\n\nBefore continuing with more examples of compound data and data abstraction,\
    \ let us consider some of the issues raised by the rational number example. We\
    \ defined operations in terms of a constructor `make_rat` and selectors `numer`\
    \ and `denom`. In general, the underlying idea of data abstraction is to identify\
    \ for each type of value a basic set of operations in terms of which all manipulations\
    \ of values of that type will be expressed, and then to use only those operations\
    \ in manipulating the data.\n\nWe can envision the structure of the rational number\
    \ system as a series of layers.\n\nThe horizontal lines represent abstraction\
    \ barriers that isolate different levels of the system. At each level, the barrier\
    \ separates the functions (above) that use the data abstraction from the functions\
    \ (below) that implement the data abstraction. Programs that use rational numbers\
    \ manipulate them solely in terms of their arithmetic functions: `add_rat`, `mul_rat`,\
    \ and `eq_rat`. These, in turn, are implemented solely in terms of the constructor\
    \ and selectors `make_rat`, `numer`, and `denom`, which themselves are implemented\
    \ in terms of tuples. The details of how tuples are implemented are irrelevant\
    \ to the rest of the layers as long as tuples enable the implementation of the\
    \ selectors and constructor.\n\nAt each layer, the functions within the box enforce\
    \ the abstraction boundary because they are the only functions that depend upon\
    \ both the representation above them (by their use) and the implementation below\
    \ them (by their definitions). In this way, abstraction barriers are expressed\
    \ as sets of functions. Abstraction barriers provide many advantages. One advantage\n\
    \n> The `str_rat` implementation above uses format strings, which contain placeholders\
    \ for values. The details of how to use format strings and the format method appear\
    \ in the formatting strings section of Dive Into Python 3."
  mdcn: "有理数。在阅读接下来的几节时，请记住，当今编写的大多数Python代码都使用语言内置的高级抽象数据类型，如类、字典和列表。由于我们正在逐步理解这些抽象的工作原理，我们自己还不能使用它们。因此，我们将编写一些非Pythonic的代码——它不一定是实现我们想法的典型方式。然而，我们所写的内容具有指导意义，因为它展示了这些抽象是如何构建的！请记住，计算机科学不仅仅是学习使用编程语言，还要学习它们的工作原理。\n\
    \n## 示例：有理数的算术运算\n\n回想一下，有理数是整数的比值，有理数构成了实数的一个重要子类。像1/3或17/29这样的有理数通常写成：\n\n \
    \   <分子>/<分母>\n\n其中`<分子>`和`<分母>`都是整数值的占位符。要精确描述有理数的值，两部分都是必需的。\n\n有理数在计算机科学中很重要，因为它们像整数一样可以被精确表示。无理数（如π、e或√2）则使用有限的二进制展开来近似表示。因此，从原则上讲，使用有理数应该可以避免算术运算中的近似误差。\n\
    \n然而，一旦我们实际将分子除以分母，我们可能会得到一个截断的十进制近似值（一个浮点数）。\n\n    >>> 1/3\n    0.3333333333333333\n\
    \n当我们开始进行测试时，这种近似的问题就出现了：\n\n    >>> 1/3 == 0.333333333333333300000  # 警惕近似值\n\
    \    True\n\n计算机如何用有限长度的十进制展开来近似实数，这是另一门课的话题。这里的重要思想是，通过将有理数表示为整数的比值，我们完全避免了近似问题。因此，为了精确起见，我们希望将分子和分母分开保存，但将它们视为一个整体。\n\
    \n从使用函数抽象中我们知道，在程序的某些部分实现之前，我们就可以开始高效地编程。让我们首先假设我们已经有一种从分子和分母构造有理数的方法。我们还假设，给定一个有理数，我们有一种提取（或选择）其分子和分母的方法。让我们进一步假设构造函数和选择器作为以下三个函数可用：\n\
    \n- `make_rat(n, d)` 返回分子为n、分母为d的有理数。\n- `numer(x)` 返回有理数x的分子。\n- `denom(x)` 返回有理数x的分母。\n\
    \n我们在这里使用了一种强大的综合策略：*一厢情愿*。我们还没有说明有理数是如何表示的，或者函数`numer`、`denom`和`make_rat`应该如何实现。即便如此，如果我们确实有这三个函数，我们就可以通过调用它们来对有理数进行加法、乘法和相等性测试：\n\
    \n```python\n>>> def add_rat(x, y):\n        nx, dx = numer(x), denom(x)\n   \
    \     ny, dy = numer(y), denom(y)\n        return make_rat(nx * dy + ny * dx,\
    \ dx * dy)\n>>> def mul_rat(x, y):\n        return make_rat(numer(x) * numer(y),\
    \ denom(x) * denom(y))\n>>> def eq_rat(x, y):\n        return numer(x) * denom(y)\
    \ == numer(y) * denom(x)\n```\n\n现在我们已经用选择器函数`numer`和`denom`以及构造函数`make_rat`定义了有理数上的运算，但我们还没有定义这些函数。我们需要的是某种将分子和分母粘合成一个单元的方法。\n\
    \n## 元组\n\n为了使我们能够实现数据抽象的具体层次，Python提供了一种称为元组的复合结构，可以通过用逗号分隔值来构造。虽然不是严格要求的，但括号几乎总是包围着元组。\n\
    \n```python\n>>> (1, 2)\n(1, 2)\n```\n\n元组的元素可以通过两种方式解包。第一种方式是通过我们熟悉的多重赋值方法。\n\
    \n```python\n>>> pair = (1, 2)\n>>> pair\n(1, 2)\n>>> x, y = pair\n>>> x\n1\n\
    >>> y\n2\n```\n\n事实上，多重赋值一直在创建和解包元组。\n\n访问元组中元素的第二种方法是通过索引运算符，写作方括号。\n\n```python\n\
    >>> pair[0]\n1\n>>> pair[1]\n2\n```\n\nPython中的元组（以及大多数其他编程语言中的序列）是0索引的，这意味着索引0选择第一个元素，索引1选择第二个，依此类推。这种索引约定背后的一个直觉是，索引表示元素距离元组开头的偏移量。\n\
    \n与元素选择运算符等效的函数称为`getitem`，它也使用0索引的位置从元组中选择元素。\n\n```python\n>>> from operator\
    \ import getitem\n>>> getitem(pair, 0)\n1\n```\n\n元组是原生类型，这意味着有内置的Python**运算符**来操作它们。我们很快会回到元组的完整属性。目前，我们只对元组如何作为实现抽象数据类型的粘合剂感兴趣。\n\
    \n**表示有理数。** 元组提供了一种自然的方式来将有理数实现为两个整数的对：一个分子和一个分母。我们可以通过操作2元素元组来实现有理数的构造函数和选择器函数。\n\
    \n```python\n>>> def make_rat(n, d):\n        return (n, d)\n>>> def numer(x):\n\
    \        return getitem(x, 0)\n>>> def denom(x):\n        return getitem(x, 1)\n\
    ```\n\n一个打印有理数的函数完成了我们对这个抽象数据类型的实现。\n\n```python\n>>> def str_rat(x):\n    \"\"\
    \"返回分子n和分母d的字符串'n/d'。\"\"\"\n    return '{0}/{1}'.format(numer(x), denom(x))\n\
    ```\n\n结合我们之前定义的算术运算，我们可以用我们定义的函数来操作有理数。\n\n```python\n>>> half = make_rat(1,\
    \ 2)\n>>> str_rat(half)\n'1/2'\n>>> third = make_rat(1, 3)\n>>> str_rat(mul_rat(half,\
    \ third))\n'1/6'\n>>> str_rat(add_rat(third, third))\n'6/9'\n```\n\n正如最后一个例子所示，我们的有理数实现并没有将有理数化简为最简形式。我们可以通过改变`make_rat`来补救这一点。如果我们有一个计算两个整数最大公约数的函数，我们可以在构造对之前用它来将分子和分母化简为最简形式。与许多有用的工具一样，这样的函数已经存在于Python库中。\n\
    \n```python\n>>> from fractions import gcd\n>>> def make_rat(n, d):\n    g = gcd(n,\
    \ d)\n    return (n//g, d//g)\n```\n\n双斜杠运算符`//`表示整数除法，它将除法结果的小数部分向下取整。由于我们知道`g`能整除`n`和`d`，所以在这种情况下整数除法是精确的。现在我们有\n\
    \n```python\n>>> str_rat(add_rat(third, third))\n'2/3'\n```\n\n正如所期望的。这个修改是通过改变构造函数完成的，而没有改变任何实现实际算术运算的函数。\n\
    \n## 抽象屏障\n\n在继续更多复合数据和数据抽象的例子之前，让我们考虑一下有理数例子提出的一些问题。我们根据构造函数`make_rat`和选择器`numer`和`denom`定义了操作。一般来说，数据抽象的基本思想是为每种类型的值确定一组基本操作，所有对该类型值的操作都将用这些操作来表达，然后在操作数据时只使用这些操作。\n\
    \n我们可以将有理数系统的结构设想为一系列层次。\n\n水平线代表抽象屏障，它们隔离了系统的不同层次。在每个层次上，屏障将使用数据抽象的函数（上方）与实现数据抽象的函数（下方）分隔开来。使用有理数的程序仅通过它们的算术函数来操作它们：`add_rat`、`mul_rat`和`eq_rat`。这些函数又仅通过构造函数和选择器`make_rat`、`numer`和`denom`来实现，而这些函数本身又是通过元组来实现的。只要元组能够实现选择器和构造函数，元组如何实现的细节对其他层次来说就无关紧要。\n\
    \n在每个层次上，方框内的函数强制执行抽象边界，因为它们是唯一既依赖于它们上方的表示（通过它们的使用）又依赖于它们下方的实现（通过它们的定义）的函数。这样，抽象屏障就表示为函数的集合。抽象屏障提供了许多优势。一个优势\n\
    \n> 上面的`str_rat`实现使用了格式字符串，其中包含值的占位符。如何使用格式字符串和format方法的详细信息出现在《深入Python 3》的格式化字符串部分。"
