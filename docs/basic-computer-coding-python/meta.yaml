    \ 子句接受一个或两个非负数字参数。当使用一个参数时，你指定要返回的最大行数。由于你的查询包含 `LIMIT 5`，因此只获取了前 5 条记录。当使用两个参数时，你还可以指定要返回的第一行的偏移量：\n\
