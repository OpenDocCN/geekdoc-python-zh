  md: "Test case instances are grouped together according to the features they test.\
    \ unittest provides a mechanism for this: the test suite, represented by unittest’s\
    \ TestSuite class:\n\n```\nwidgetTestSuite = unittest.TestSuite()\nwidgetTestSuite.addTest(WidgetTestCase('test_default_size'))\n\
    widgetTestSuite.addTest(WidgetTestCase('test_resize'))\n```\n\nFor the ease of\
    \ running tests, as we will see later, it is a good idea to provide in each test\
    \ module a callable object that returns a pre-built test suite:\n\n```\ndef suite\
    \ ():\n    suite = unittest.TestSuite()\n    suite.addTest(WidgetTestCase('test_default_size'))\n\
    \    suite.addTest(WidgetTestCase('test_resize'))\n    return suite\n```\n\nor\
    \ even:\n\n```\ndef suite ():\n    tests = ['test_default_size', 'test_resize']\n\
    \    return unittest.TestSuite(map(WidgetTestCase, tests))\n```\n\nSince it is\
    \ a common pattern to create a TestCase subclass with many similarly named test\
    \ functions, unittest provides a TestLoader class that can be used to automate\
    \ the process of creating a test suite and populating it with individual tests.\
    \ For example,\n\n```\nsuite = unittest.TestLoader().loadTestsFromTestCase(WidgetTestCase)\n\
    ```\n\nwill create a test suite that will run WidgetTestCase.test_default_size()\
    \ and WidgetTestCase.test_resize. TestLoader uses the ‘test’ method name prefix\
    \ to identify test methods automatically.\n\nOften it is desirable to group suites\
    \ of test cases together, so as to run tests for the whole system at once. This\
    \ is easy, since TestSuite instances can be added to a TestSuite just as TestCase\
    \ instances can be added to a TestSuite:\n\n```\nsuite1 = module1.TheTestSuite()\n\
    suite2 = module2.TheTestSuite()\nalltests = unittest.TestSuite([suite1, suite2])\n\
    ```\n\nYou can place the definitions of test cases and test suites in the same\
    \ modules as the code they are to test (such as widget.py), but there are several\
    \ advantages to placing the test code in a separate module, such as test_widget.py:\n\
    \n+   - The test module can be run standalone from the command line.\n- The test\
    \ code can more easily be separated from shipped code.\n- There is less temptation\
    \ to change test code to fit the code it tests without"
