    \ and then make it more human-readable by adding a string:\n\n```\nfor key, value\
    \ in sammy.items():\n    print(key, 'is the key for the value', value)\n```\n\n\
    Output\nonline is the key for the value True\nfollowers is the key for the value\
    \ 987\nusername is the key for the value sammy-shark\n\nThe for loop above iterated\
    \ over the items within the sammy dictionary and printed out the keys and values\
    \ line by line, with information to make it easier to understand by humans.\n\n\
    We can use built-in methods to access items, values, and keys from dictionary\
    \ data structures.\n\n## 3.1.2 Modifying Dictionaries\n\nDictionaries are a mutable\
    \ data structure, so you are able to modify them. In this section, we will go\
    \ over adding and deleting dictionary elements.\n\n### Adding and Changing Dictionary\
    \ Elements\n\nWithout using a method or function, you can add key-value pairs\
    \ to dictionaries by using the following syntax:\n\n```\ndict[key] = value\n```\n\
    \nWe’ll look at how this works in practice by adding a key-value pair to a dictionary\
    \ called usernames:\n\n```\nusernames = {'Sammy': 'sammy-shark', 'Jamie': 'mantisshrimp54'}\n\
    usernames['Drew'] = 'squidly'\nprint(usernames)\nOutput\n{'Drew': 'squidly', 'Sammy':\
    \ 'sammy-shark', 'Jamie': 'mantisshrimp54'}\n```\n\nWe see now that the dictionary\
    \ has been updated with the ‘Drew’: ‘squidly’ key-value pair. Because dictionaries\
    \ may be unordered, this pair may occur anywhere in the dictionary output. If\
