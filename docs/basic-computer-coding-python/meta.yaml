- md: "## Basic Computer Coding: Python\n\nYou should know the following for accessing\
    \ private members and private functions:\n\n- When you write to an attribute of\
    \ an object, that does not exist, the python system will normally not complain,\
    \ but just create a new attribute.\n- Private attributes are not protected by\
    \ the Python system. That is by design decision.\n- Private attributes will be\
    \ masked. The reason is, that there should be no clashes in the inheritance chain.\
    \ The masking is done by some implicit renaming. Private attributes will have\
    \ the *real* name `\"__<className>_<attributeName>\"`\n\nWith that name, it can\
    \ be accessed from outside. When accessed from inside the class, the name will\
    \ be automatically changed correctly.\n\n## Data Encapsulation in Python\n\nUsing\
    \ OOP in Python, we can restrict access to methods and variables. This prevent\
    \ data from direct modification which is called encapsulation. In Python, we denote\
    \ private attribute using underscore as prefix i.e single \" _ \" or double \"\
    \ __ \".\n\n```python\nclass Computer:\n\n    def __init__(self):\n        self.__maxprice\
    \ = 900\n\n    def sell(self):\n        print(\"Selling Price: {}\".format(self.__maxprice))\n\
    \n    def setMaxPrice(self, price):\n        self.__maxprice = price\n\nc = Computer()\n\
    c.sell()\n\n# change the price\nc.__maxprice = 1000\nc.sell()\n\n# using setter\
    \ function\nc.setMaxPrice(1000)\nc.sell()\n```\n\nWhen we run this program, the\
    \ output will be:\nSelling Price: 900\nSelling Price: 900\nSelling Price: 1000\n\
    \nIn the above program, we defined a class Computer. We use __init__() method\
    \ to store the maximum selling price of computer. We tried to modify the price.\
    \ However, we can't change it because Python treats the __maxprice as private\
    \ attributes. To change the value, we used a setter function i.e setMaxPrice()\
    \ which takes price as parameter.\n\n## 5.2.3 Polymorphism\n\nPolymorphism means\
    \ that different types respond to the same function. Polymorphism is very useful\
    \ as it makes programming more intuitive and therefore easier. Polymorphism is\
    \ a fancy word that just means the same function is defined on objects of different\
    \ types. Python provides protocols which is polymorphism under the hood. These\
    \ implement consistent behavior for built in objects of different type.\n\n##\
    \ Protocols\n\nWhen we introspect an object we have a lot of attributes that take\
    \ this format: __names__. This section will make many of those clear.\nEverything\
    \ is an object and all actions ultimately mean calling functions defined on objects.\n\
    Protocols are polymorphic functions that are embedded into python. Most importantly\
    \ the interpreter is aware of them.\nProtocols enable:\n\n- consistency - programmers\
    \ can rely on intuition\n- special syntax - interpreter translates nice syntax\
    \ to functions on objects.\n- We will look at two protocols: __contains__ and\
    \ __iter__\n\n```python\n__add__\nx + y resolves to x.__add__(y)\n>>> 1 + 2\n\
    3\n>>> one = 1\n>>> one.__add__(2)\n3\n>>> '1' + '2'\n'12'\n>>> '1'.__add__('2')\n\
    '12'\n```\n\nAny object that implements the `__add__` function will work with\
    \ the `<object> + x` syntax.\n\n**Parameter** is any characteristic that can help\
    \ in defining or classifying a particular system. That is, a parameter is an element\
    \ of a system that is useful, or critical, when identifying the system, or when\
    \ evaluating its performance, status, condition, etc.\n\n## `__contains__`\n\n\
    `__contains__` is the built in protocol for membership.\n`x in y` resolves to\
    \ `y.__contains__(x)`\n\nWhen the interpreter encounters `'b' in ['a', 'b']` it\
    \ knows to look for the `__contains__` function on the object to the right of\
    \ `in` and pass it the object to the left of `in` as **parameter**.\n\nA list\
    \ object has that function defined and the interpreter then executes the corresponding\
    \ code block.\n\nAll data structures have the concept of membership defined:\n\
    \n```python\n>>> 'b' in ['a', 'b']\nTrue\n>>> 'b' in ('a', 'b')\nTrue\n>>> 'b'\
    \ in {'a': 1, 'b': 2}\nTrue\n>>> 'b' in {'a', 'b'}\nTrue\n```\n\nDemonstrating\
    \ `__contains__`:\n\n```python\n>>> ['a', 'b'].__contains__('b')\nTrue\n>>> ('a',\
    \ 'b').__contains__('b')\nTrue\n>>> {'a': 1, 'b': 2}.__contains__('b')\nTrue\n\
    >>> {'a', 'b'}.__contains__('b')\nTrue\n```\n\nAny object that implements the\
    \ `__contains__` function will work with the `x in <object>` syntax.\n\n## `__iter__`\n\
    \n`__iter__` is how iteration is implemented in Python. This protocol is a bit\
    \ more involved than the protocols.\n\nTaking this code:\n\n```python\n>>> number\
    \ = [1, 2]\n>>> for i in [1, 2]:\n...     print(i)\n...\n1\n2\n```\n\nRoughly\
    \ here is the sequence of events: * interpreter calls `__iter__` on the list object,\
    \ * an object of type iterator is returned. * interpreter then calls `__next__`\
    \ repeatedly on the iterator * interpreter actions the code in the for loop *\
    \ interpreter interrupts the loop if a `StopIteration` Exception occurs.\n\nTo\
    \ illustrate:\n\n```python\n>>> itr_obj = [1, 2].__iter__()\n>>> type(itr_obj)\n\
    <class 'list_iterator'>\n>>> itr_obj.__next__()\n1\n>>> itr_obj.__next__()\n2\n\
    >>> itr_obj.__next__()\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nStopIteration\n```\n\nAny object that implements the `__iter__`\
    \ function will work with the `for x in <object>: ...` syntax.\n\n## Exercise\n\
    \n### Boolean Operators\n\nUsing introspection functions, which protocol functions\
    \ do the following syntax resolve to:\n\n- 3 > 2\n- 3 < 2\n- 3 <= 2\n- 3 >= 2\n\
    \n### String representations\n\nWhat function gets called when we get results\
    \ in the interpreter? Is it the same that gets called when we type `print(x)`?\n\
    \n### len() implementation\n\nlen() works on many object types:\n\n```python\n\
    >>> len('hi')\n2\n>>> len([1, 2])\n2\n```\n\nWhich protocol function is called\
    \ by the function `len` on the object it is passed?\nPolymorphism is an ability\
    \ (in OOP) to use common interface for multiple form (data types). Suppose, we\
    \ need to color a shape, there are multiple shape option (rectangle, square, circle).\
    \ However we could use same method to color any shape. This concept is called\
    \ Polymorphism.\n\n## Using Polymorphism in Python\n\n```python\nclass Parrot:\n\
    \n    def fly(self):\n        print(\"Parrot can fly\")\n\n    def swim(self):\n\
    \        print(\"Parrot can't swim\")\n\nclass Penguin:\n\n    def fly(self):\n\
    \        print(\"Penguin can't fly\")\n\n    def swim(self):\n        print(\"\
    Penguin can swim\")\n\n# common interface\ndef flying_test(bird):\n    bird.fly()\n\
    \n#instantiate objects\nblu = Parrot()\npeggy = Penguin()\n\n# passing the object\n\
    flying_test(blu)\nflying_test(peggy)\n```\n\nWhen we run above program, the output\
    \ will be:\nParrot can fly\nPenguin can't fly\n\nIn the above program, we defined\
    \ two classes Parrot and Penguin. Each of them have common method fly() method.\
    \ However, their functions are different. To allow polymorphism, we created common\
    \ interface i.e flying_test() function that can take any object. Then, we passed\
    \ the objects blu and peggy in the flying_test() function, it ran effectively.\n\
    \n## 5.2.4 Abstraction\n\nData abstraction and encapsulation both are often used\
    \ as synonyms. Both are nearly synonym because data abstraction is achieved through\
    \ encapsulation.\n\nAbstraction is used to hide internal details and show only\
    \ functionalities. Abstracting something means to give names to things, so that\
    \ the name captures the core of what a function or a whole program does. As we\
    \ consider the wide set of things in the world that we would like to represent\
    \ in our programs, we find that most of them have compound structure. A date has\
    \ a year, a month, and a day; a geographic position has a latitude and a longitude.\
    \ To represent positions, we would like our programming language to have the capacity\
    \ to “glue together” a latitude and longitude to form a pair --- a *compound data*\
    \ value --- that our programs could manipulate in a way that would be consistent\
    \ with the fact that we regard a position as a single conceptual unit, which has\
    \ two parts.\n\nThe use of compound data also enables us to increase the **modularity**\
    \ of the programs. If we can manipulate geographic positions directly as objects\
    \ in their own right, then we can separate the part of our program that deals\
    \ with values per se from the details of how those values may be represented.\
    \ The general technique of isolating the parts of a program that deal with how\
    \ data are represented from the parts of a program that deal with how those data\
    \ are manipulated is a powerful design methodology called *data abstraction*.\
    \ Data abstraction makes programs much easier to design, maintain, and modify.\n\
    \nData abstraction is similar in character to functional abstraction. When we\
    \ create a functional abstraction, the details of how a function is implemented\
    \ can be suppressed, and the particular function itself can be replaced by any\
    \ other function with the same overall behavior. In other words, we can make an\
    \ abstraction that separates the way the function is used from the details of\
    \ how the function is implemented. Analogously, data abstraction is a methodology\
    \ that enables us to isolate how a compound data object is used from the details\
    \ of how it is constructed.\n\nThe basic idea of data abstraction is to structure\
    \ programs so that they operate on abstract data. That is, our programs should\
    \ use data in such a way as to make as few assumptions about the data as possible.\
    \ At the same time, a concrete data representation is defined, independently of\
    \ the programs that use the data. The interface between these two parts of our\
    \ system will be a set of functions, called selectors and constructors, that implement\
    \ the abstract data in terms of the concrete representation. To illustrate this\
    \ technique, we will consider how to design a set of functions for manipulating"
  mdcn: "## 基础计算机编程：Python\n\n要访问私有成员和私有函数，你应该了解以下内容：\n\n- 当你写入一个对象不存在的属性时，Python系统通常不会报错，而是直接创建一个新属性。\n\
    - 私有属性不受Python系统保护。这是设计上的决定。\n- 私有属性会被“遮蔽”。原因是，为了避免在继承链中发生命名冲突。这种遮蔽是通过某种隐式重命名实现的。私有属性的*真实*名称将是\
    \ `\"__<className>_<attributeName>\"`。\n\n通过这个名称，可以从外部访问它。当从类内部访问时，名称会自动正确地更改。\n\
    \n## Python中的数据封装\n\n在Python中使用面向对象编程（OOP），我们可以限制对方法和变量的访问。这可以防止数据被直接修改，称为封装。在Python中，我们使用下划线作为前缀来表示私有属性，即单下划线“\
    \ _ ”或双下划线“ __ ”。\n\n```python\nclass Computer:\n\n    def __init__(self):\n \
    \       self.__maxprice = 900\n\n    def sell(self):\n        print(\"Selling\
    \ Price: {}\".format(self.__maxprice))\n\n    def setMaxPrice(self, price):\n\
    \        self.__maxprice = price\n\nc = Computer()\nc.sell()\n\n# change the price\n\
    c.__maxprice = 1000\nc.sell()\n\n# using setter function\nc.setMaxPrice(1000)\n\
    c.sell()\n```\n\n当我们运行这个程序时，输出将是：\nSelling Price: 900\nSelling Price: 900\nSelling\
    \ Price: 1000\n\n在上面的程序中，我们定义了一个Computer类。我们使用`__init__()`方法来存储计算机的最高售价。我们尝试修改价格。然而，我们无法更改它，因为Python将`__maxprice`视为私有属性。要更改该值，我们使用了一个setter函数，即`setMaxPrice()`，它接受价格作为参数。\n\
    \n## 5.2.3 多态\n\n多态意味着不同类型对同一函数做出响应。多态非常有用，因为它使编程更直观，因此更容易。多态是一个花哨的词，意思只是同一个函数被定义在不同类型的对象上。Python提供了协议，这本质上就是多态。这些协议为不同类型的内置对象实现了统一的行为。\n\
    \n## 协议\n\n当我们内省一个对象时，我们有很多采用这种格式的属性：`__names__`。本节将阐明其中的许多内容。\n万物皆对象，所有操作最终都意味着调用定义在对象上的函数。\n\
    协议是嵌入到Python中的多态函数。最重要的是，解释器知道它们。\n协议实现了：\n\n- 一致性 - 程序员可以依赖直觉\n- 特殊语法 - 解释器将简洁的语法转换为对象上的函数。\n\
    - 我们将看两个协议：`__contains__` 和 `__iter__`\n\n```python\n__add__\nx + y resolves to\
    \ x.__add__(y)\n>>> 1 + 2\n3\n>>> one = 1\n>>> one.__add__(2)\n3\n>>> '1' + '2'\n\
    '12'\n>>> '1'.__add__('2')\n'12'\n```\n\n任何实现了`__add__`函数的对象都可以与`<object> + x`语法一起使用。\n\
    \n**参数**是任何有助于定义或分类特定系统的特征。也就是说，参数是系统的一个元素，在识别系统或评估其性能、状态、条件等时是有用的或关键的。\n\n##\
    \ `__contains__`\n\n`__contains__`是用于成员关系的内置协议。\n`x in y` 被解析为 `y.__contains__(x)`\n\
    \n当解释器遇到 `'b' in ['a', 'b']` 时，它知道要在`in`右侧的对象上查找`__contains__`函数，并将`in`左侧的对象作为**参数**传递给它。\n\
    \n列表对象定义了该函数，然后解释器执行相应的代码块。\n\n所有数据结构都定义了成员关系的概念：\n\n```python\n>>> 'b' in ['a',\
    \ 'b']\nTrue\n>>> 'b' in ('a', 'b')\nTrue\n>>> 'b' in {'a': 1, 'b': 2}\nTrue\n\
    >>> 'b' in {'a', 'b'}\nTrue\n```\n\n演示`__contains__`：\n\n```python\n>>> ['a',\
    \ 'b'].__contains__('b')\nTrue\n>>> ('a', 'b').__contains__('b')\nTrue\n>>> {'a':\
    \ 1, 'b': 2}.__contains__('b')\nTrue\n>>> {'a', 'b'}.__contains__('b')\nTrue\n\
    ```\n\n任何实现了`__contains__`函数的对象都可以与`x in <object>`语法一起使用。\n\n## `__iter__`\n\n\
    `__iter__`是Python中实现迭代的方式。这个协议比其他协议稍微复杂一些。\n\n看这段代码：\n\n```python\n>>> number\
    \ = [1, 2]\n>>> for i in [1, 2]:\n...     print(i)\n...\n1\n2\n```\n\n大致的事件序列如下：*\
    \ 解释器在列表对象上调用`__iter__`，* 返回一个迭代器类型的对象。* 然后解释器在迭代器上重复调用`__next__` * 解释器执行for循环中的代码\
    \ * 如果发生`StopIteration`异常，解释器中断循环。\n\n为了说明：\n\n```python\n>>> itr_obj = [1, 2].__iter__()\n\
    >>> type(itr_obj)\n<class 'list_iterator'>\n>>> itr_obj.__next__()\n1\n>>> itr_obj.__next__()\n\
    2\n>>> itr_obj.__next__()\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nStopIteration\n```\n\n任何实现了`__iter__`函数的对象都可以与`for x in\
    \ <object>: ...`语法一起使用。\n\n## 练习\n\n### 布尔运算符\n\n使用内省函数，以下语法解析为哪些协议函数：\n\n- 3\
    \ > 2\n- 3 < 2\n- 3 <= 2\n- 3 >= 2\n\n### 字符串表示\n\n当我们在解释器中得到结果时，调用的是哪个函数？它与我们输入`print(x)`时调用的函数相同吗？\n\
    \n### len() 实现\n\nlen() 适用于多种对象类型：\n\n```python\n>>> len('hi')\n2\n>>> len([1,\
    \ 2])\n2\n```\n\n函数`len`在传递给它的对象上调用了哪个协议函数？\n多态是（在OOP中）为多种形式（数据类型）使用通用接口的能力。假设，我们需要给一个形状上色，有多种形状选项（矩形、正方形、圆形）。然而，我们可以使用相同的方法给任何形状上色。这个概念称为多态。\n\
    \n## 在Python中使用多态\n\n```python\nclass Parrot:\n\n    def fly(self):\n        print(\"\
    Parrot can fly\")\n\n    def swim(self):\n        print(\"Parrot can't swim\"\
    )\n\nclass Penguin:\n\n    def fly(self):\n        print(\"Penguin can't fly\"\
    )\n\n    def swim(self):\n        print(\"Penguin can swim\")\n\n# common interface\n\
    def flying_test(bird):\n    bird.fly()\n\n#instantiate objects\nblu = Parrot()\n\
    peggy = Penguin()\n\n# passing the object\nflying_test(blu)\nflying_test(peggy)\n\
    ```\n\n当我们运行上面的程序时，输出将是：\nParrot can fly\nPenguin can't fly\n\n在上面的程序中，我们定义了两个类Parrot和Penguin。它们都有共同的fly()方法。然而，它们的功能是不同的。为了允许多态，我们创建了一个通用接口，即flying_test()函数，它可以接受任何对象。然后，我们将对象blu和peggy传递给flying_test()函数，它有效地运行了。\n\
    \n## 5.2.4 抽象\n\n数据抽象和封装经常被用作同义词。它们几乎是同义词，因为数据抽象是通过封装实现的。\n\n抽象用于隐藏内部细节，只显示功能。抽象某物意味着给事物命名，以便名称能捕捉到函数或整个程序的核心功能。当我们考虑世界上我们希望在程序中表示的广泛事物时，我们发现其中大多数具有复合结构。日期有年、月、日；地理位置有纬度和经度。为了表示位置，我们希望我们的编程语言能够“粘合”纬度和经度以形成一对——一个*复合数据*值——我们的程序可以以一种与我们将位置视为一个具有两个部分的单一概念单元这一事实相一致的方式进行操作。\n\
    \n复合数据的使用也使我们能够增加程序的**模块化**。如果我们可以直接将地理位置作为对象本身来操作，那么我们就可以将程序中处理值本身的部分与这些值可能如何表示的细节分开。将程序中处理数据表示方式的部分与处理这些数据操作方式的部分隔离开来的通用技术是一种强大的设计方法，称为*数据抽象*。数据抽象使程序更容易设计、维护和修改。\n\
    \n数据抽象在性质上类似于函数抽象。当我们创建函数抽象时，函数如何实现的细节可以被抑制，并且特定的函数本身可以被任何具有相同整体行为的其他函数替换。换句话说，我们可以创建一个抽象，将函数的使用方式与函数实现的细节分开。类似地，数据抽象是一种方法论，使我们能够将复合数据对象的使用方式与其构造细节隔离开来。\n\
    \n数据抽象的基本思想是构建程序，使其操作抽象数据。也就是说，我们的程序应该以尽可能少地对数据做出假设的方式使用数据。同时，定义一个具体的数据表示，独立于使用数据的程序。我们系统这两部分之间的接口将是一组函数，称为选择器和构造函数，它们根据具体表示来实现抽象数据。为了说明这种技术，我们将考虑如何设计一组用于操作"
