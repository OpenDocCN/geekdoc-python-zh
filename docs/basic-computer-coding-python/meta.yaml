    - CursorStoreResultMixIn uses the mysql_store_result() function to retrieve result
    sets from the executed query. These result sets are stored at the client side.

    - CursorUseResultMixIn uses the mysql_use_result() function to retrieve result
    sets from the executed query. These result sets are stored at the server side.


