    When importing the package, Python searches through the directories on sys.path
    looking for the package subdirectory.


    The __init__.py files are required to make Python treat the directories as containing
    packages; this is done to prevent directories with a common name, such as string,
    from unintentionally hiding valid modules that occur later on the module search
    path. In the simplest case, __init__.py can just be an empty file, but it can
    also execute initialization code for the package or set the __all__ variable,
    described later.


    Users of the package can import individual modules from the package, for example:

    import sound.effects.echo

    This loads the submodule sound.effects.echo. It must be referenced with its full
    name.


    ```

    sound.effects.echo.echofilter(input, output, delay=0.7, atten=4)

    ```


    An alternative way of importing the submodule is:

    from sound.effects import echo

    This also loads the submodule echo, and makes it available without its package
    prefix, so it can be used as follows:


    ```

    echo.echofilter(input, output, delay=0.7, atten=4)

    ```


    Yet another variation is to import the desired function or variable directly:

    from sound.effects.echo import echofilter'
