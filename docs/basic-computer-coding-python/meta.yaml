    # `__contains__`


    `__contains__` is the built in protocol for membership.

    `x in y` resolves to `y.__contains__(x)`


    When the interpreter encounters `''b'' in [''a'', ''b'']` it knows to look for
    the `__contains__` function on the object to the right of `in` and pass it the
    object to the left of `in` as **parameter**.


    A list object has that function defined and the interpreter then executes the
    corresponding code block.


    All data structures have the concept of membership defined:


    ```

    >>> ''b'' in [''a'', ''b'']

    True

    >>> ''b'' in (''a'', ''b'')

    True

    >>> ''b'' in {''a'': 1, ''b'': 2}

    True

    >>> ''b'' in {''a'', ''b''}

    True

    ```


    Demonstrating `__contains__`:


    ```

    >>> [''a'', ''b''].__contains__(''b'')

    True

    >>> (''a'', ''b'').__contains__(''b'')

    True

    >>> {''a'': 1, ''b'': 2}.__contains__(''b'')

    True

    >>> {''a'', ''b''}.__contains__(''b'')

    True

    ```'
  - "[PAGE 174]\n\nAny object that implements the `__contains__` function will work\
    \ with the `x in <object>` syntax.\n\n# __iter__\n\n`__iter__` is how iteration\
    \ is implemented in Python. This protocol is a bit more involved than the protocols.\n\
    \nTaking this code:\n\n```\n>>> number = [1, 2]\n>>> for i in [1, 2]:\n...   \
    \  print(i)\n...\n1\n2\n```\n\nRoughly here is the sequence of events: * interpreter\
    \ calls `__iter__` on the list object, * an object of type iterator is returned.\
    \ * interpreter then calls `__next__` repeatedly on the iterator * interpreter\
    \ actions the code in the for loop * interpreter interrupts the loop if a `StopIteration`\
    \ Exception occurs.\n\nTo illustrate:\n\n```\n>>> itr_obj = [1, 2].__iter__()\n\
    >>> type(itr_obj)\n<class 'list_iterator'>\n>>> itr_obj.__next__()\n1\n>>> itr_obj.__next__()\n\
    2\n>>> itr_obj.__next__()\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nStopIteration\n```\n\nAny object that implements the `__iter__`\
    \ function will work with the `for x in <object>: ...` syntax."
