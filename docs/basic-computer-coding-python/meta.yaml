  - "[PAGE 171]\n\n# Basic Computer Coding: Python\n\nYou should know the following\
    \ for accessing private members and private functions:\n\n+   - When you write\
    \ to an attribute of an object, that does not exist, the python system will normally\
    \ not complain, but just create a new attribute.\n- Private attributes are not\
    \ protected by the Python system. That is by design decision.\n- Private attributes\
    \ will be masked. The reason is, that there should be no clashes in the inheritance\
    \ chain. The masking is done by some implicit renaming. Private attributes will\
    \ have the *real* name `\"__<className>_<attributeName>\"`\n\nWith that name,\
    \ it can be accessed from outside. When accessed from inside the class, the name\
    \ will be automatically changed correctly.\n\n# Data Encapsulation in Python\n\
    \nUsing OOP in Python, we can restrict access to methods and variables. This prevent\
    \ data from direct modification which is called encapsulation. In Python, we denote\
    \ private attribute using underscore as prefix i.e single \" _ \" or double \"\
    \ __ \".\n\n```\nclass Computer:\n\n    def __init__(self):\n        self.__maxprice\
    \ = 900\n\n    def sell(self):\n        print(\"Selling Price: {}\".format(self.__maxprice))\n\
    \n    def setMaxPrice(self, price):\n        self.__maxprice = price\n\nc = Computer()\n\
    c.sell()\n\n# change the price\nc.__maxprice = 1000\nc.sell()\n\n# using setter\
    \ function\n```"
