    Encapsulation means that the internal representation of an object is generally
    hidden from view outside of the object''s definition.


    A class is an example of encapsulation as it encapsulates all the data that is
    member functions, variables etc.


    Difference between Abstraction and Encapsulation: Abstraction is a mechanism which
    represent the essential features without including implementation details.


    Encapsulation: — Information hiding.


    Abstraction: — Implementation hiding.


