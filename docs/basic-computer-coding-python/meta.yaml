  md: "# CASE STUDY\n\n# A SET PARTITIONING PROBLEM\n\nA set partitioning problem\
    \ determines how the items in one set (S) can be partitioned into smaller subsets.\
    \ All items in S must be contained in one and only one partition. Related problems\
    \ are:\n\n+   - set packing - all items must be contained in zero or one partitions;\n\
    - set covering - all items must be contained in at least one partition.\n\nIn\
    \ this case study a wedding planner must determine guest seating allocations for\
    \ a wedding. To model this problem the tables are modelled as the partitions and\
    \ the guests invited to the wedding are modelled as the elements of S. The wedding\
    \ planner wishes to maximize the total happiness of all of the tables.\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_106_0.png)\n\
    \nA set partitioning problem may be modelled by explicitly enumerating each possible\
    \ subset. Though this approach does become intractable for large numbers of items\
    \ (without using column generation) it does have the advantage that the objective\
    \ function co-efficients for the partitions can be non-linear expressions (like\
    \ happiness) and still allow this problem to be solved using Linear Programming.\n\
    \nFirst we use **allcombinations()** to generate a list of all possible table\
    \ seatings.\n\n```\n#create list of all possible tables\npossible_tables = [tuple(c)\
    \ for c in pulp.allcombinations(guests,\n                                    \
    \    max_table_size)]\n```\n\nThen we create a binary variable that will be 1\
    \ if the table will be in the solution, or zero otherwise."
  merge: -1
