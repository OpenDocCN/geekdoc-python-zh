    \ match \"rub\" in \"rube\" and \"ruby\" but not alone |\n| 7 | **Python(?=!)**<br>Match\
    \ \"Python\", if followed by an exclamation point. |\n| 8 | **Python(?!!)**<br>Match\
    \ \"Python\", if not followed by an exclamation point. |\n\n## Special Syntax\
    \ with Parentheses\n\n| Sr.No. | Example & Description |\n|---|---|\n| 1 | R(?#comment)<br>Matches\
    \ \"R\". All the rest is a comment |\n| 2 | R(?i)uby<br>Case-insensitive while\
    \ matching \"uby\" |\n| 3 | R(?i:uby)<br>Same as above |\n| 4 | rub(?:y\\|le))<br>Group\
    \ only without creating \\1 backreference |\n\n## CASE STUDY\n\n## PYTHON\n\n\
    Python is an interpreted, dynamically-typed, object-oriented scripting language\
    \ with a host of built-in data types. It is implemented in C, but in a very object-oriented\
    \ fashion. The design is a good model for language implementation.\n\nThe Python\
    \ interpreter works by loading a source file or reading a line typed at the keyboard,\
    \ parsing it into an abstract syntax tree, compiling the tree into bytecode, and\
    \ executing the bytecode. We will concentrate mainly on how the bytecode is executed,\
    \ such as how inheritance and environments are implemented.\n\n## Parsing\n\n\
    The parsing process is fairly standard. The basic idea is to first convert the\
    \ input characters into a more abstract representation like name: x, integer:\
    \ 7, string: “hello”, less-than-or-equal, etc. The abstracted characters are called\
    \ *tokens*. (There are utilities, such as lex, for automatically generating tokenizers,\
    \ but Python does not use one.) The tokenization process is fully described in\
    \ the language reference.\n\n*For example*, the statement\n\n```\nwhile(x <= 3):\n\
    \    f(x)\n```\n\nmight be tokenized as\n\n- keyword: while\n- left-paren\n- name:\
    \ x\n- leq\n- int: 3\n- right-paren\n- colon\n- indent\n- name: f\n- left-paren\n\
    - name: x\n- right-paren\n\nThen the tokens are assembled into expressions, statements,\
    \ function definitions, class definitions, etc. Since function definitions contain\
    \ statements which contain expressions which may contain nested expressions, and\
    \ so on, the resulting data structure of tokens is a tree, called a *parse tree*\
    \ or *abstract syntax tree*. The tokens above might be parsed into this tree:\n\
    \n![](img/192fecf3b33c4ee7d07f7123b285647a_208_0.png)\n\nThere are standard utilities,\
    \ such as yacc, which aid in generating parsers, but Python does not use one.\
    \ Instead, it uses nested DFAs, which is a recursive tokenizer that fills the\
    \ tree out downward. A similar technique was used in the book *Essentials of Programming\
    \ Languages*. You can learn more about tokenizing, parsing, and compilation in\
    \ MIT course 6.035 or from various books such as *Crafting a Compiler in C* or\
    \ *Compilers: Principles, Techniques, and Tools*.\n\nOnce you have a parse tree,\
    \ you can do type checking, type reconstruction, constant folding, liveness analysis,\
    \ and many other kinds of optimizations and analysis. Python only uses it for\
    \ compilation.\n\n## Compilation\n\nThe parse tree is then compiled into bytecode\
    \ by a recursive walk. For example, a while syntax node contains an expression\
    \ node for the test and a compound statement node for the body. A while node is\
    \ compiled into:\n\n```\nloop:\n    (code for test)\n    jump_if_false done\n\
    \    (code for body)\n    jump loop\ndone:\n```\n\nwhere the test and body nodes\
    \ are compiled recursively. Virtually all of the compilation rules can be described\
    \ as rewrites like this. Compilation has the opposite structure of parsing: it\
    \ flattens the tree, converting it back to bytes.\n\nBytecode is virtual machine\
    \ instructions are packed into an array of bytes. The instructions are based on\
    \ stack manipulation. Some instructions have no arguments and take up one byte,\
    \ e.g. BINARY_ADD (pop two values from the stack and push their sum), while other\
    \ instructions have an additional two-byte integer argument, e.g. LOAD_NAME i\
    \ (push the value of the i-th variable name). The full list of bytecodes is here.\
    \ Bytecode is paired with a symbol table and constant pool so that names and literals\
    \ can be referenced by number in the instructions.\n\nThe bytecode for the above\
    \ parse tree is something like:\n\n```\nloop:\n\nload-name 1     (x)\nload-const\
    \ 1    (3)\ncompare-op le\n\njump_if_false done\n\nload-name 2     (f)\nload-name\
    \ 1     (x)\ncall-function 1\n\njump loop\ndone:\n```\n\nPython does not perform\
    \ much optimization on the bytecode, except for speeding-up local variable access.\
    \ The reasons for this are tied to how the interpreter works and will be discussed\
    \ later.\n\nThis conversion pattern, where the input is abstracted, processed,\
    \ then specialized, is a common one in many varieties of programs and is also\
    \ presented in Abstraction and Specification in Program Development.\n\n## Execution\n\
    \nAt face value, the execution algorithm is straightforward: fetch the next instruction,\
    \ perform the required stack manipulation or, in the case of a jump, reposition\
    \ the instruction pointer. However, much of the real functionality is hidden in\
    \ the value objects. *For example*, there is only one BINARY_ADD instruction,\
    \ yet Python must do very different things when adding integers, floats, strings,\
    \ or user-defined objects.\n\n## Value objects\n\nThe trick is to decouple the\
    \ kinds of values in the language from the interpreter core. This is allows Python\
    \ to have many built-in data types without a complexity explosion. Each value\
    \ supports the same interface, some of which is listed here:\n\n- add(v)<br>Add\
    \ yourself to *v* and return the result as a new object. It corresponds to x +\
    \ v.\n- cmp(v)<br>Compare yourself to *v* and return -1, 0, or 1 (a la strcmp).\
    \ It corresponds to x == v.\n- repr()<br>Return a string representation of yourself.\n\
    - getattr(name), getitem(v)<br>Subscript yourself by *name* or arbitrary value\
    \ *v*. getattr corresponds to x.name and getitem corresponds to x[v].\n- call(args,\
    \ keywords)<br>Call yourself with positional arguments *args* and keyword arguments\
    \ *keywords*. It corresponds to x(1, 2, 3, foo = 4, bar = 5).\n\nEach method in\
    \ this interface has a bytecode counterpart which invokes it, e.g. BINARY_ADD.\
    \ The stack is simply an array of value objects, which each know how to add themselves.\
    \ Numerical Python takes advantage of this open-ended design to add multi-dimensional\
    \ arrays, e.g. matrices, to the language.\n\nNew kinds of values can even be defined\
    \ from within Python. An object with a method called __cmp__ will use that method\
    \ for comparison instead of the default object comparison method. All methods\
    \ in the value interface can be overrided in this way (including the getattr method\
    \ which is used to look up object methods in the first place).\n\nThe built-in\
    \ value objects are:\n\n- Primitives\n  - Integer/Long\n  - Float\n  - String\n\
    \  - File\n  - Function\n- Composites"
