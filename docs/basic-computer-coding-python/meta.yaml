  mdcn: "## 9.5.3 连接 Python 和 MySQL 的其他方式\n\n在本教程中，你了解了 MySQL Connector/Python，这是官方推荐的从\
    \ Python 应用程序与 MySQL 数据库交互的方式。还有另外两种流行的连接器：\n\n- mysqlclient 是一个与官方连接器紧密竞争的库，并且正在积极更新新功能。由于其核心是用\
    \ C 语言编写的，因此它比纯 Python 的官方连接器性能更好。一个很大的缺点是它相当难以设置和安装，尤其是在 Windows 上。\n- MySQLdb\
    \ 是一个遗留软件，仍在商业应用中使用。它是用 C 语言编写的，比 MySQL Connector/ Python 更快，但仅适用于 Python 2。\n\
    \n这些连接器充当你的程序和 MySQL 数据库之间的接口，你通过它们发送 SQL 查询。但许多开发者更喜欢使用面向对象的范式而不是 SQL 查询来操作数据。\n\
    \n**对象关系映射（ORM）** 是一种技术，允许你直接使用面向对象的语言查询和操作数据库中的数据。ORM 库封装了操作数据所需的代码，从而消除了使用哪怕一点点\
    \ SQL 的需要。\n\n以下是用于基于 SQL 数据库的最流行的 Python ORM：\n\n- SQLAlchemy 是一个 ORM，它促进了 Python\
    \ 和其他 SQL 数据库之间的通信。你可以为不同的数据库（如 MySQL、PostgreSQL、SQLite 等）创建不同的引擎。SQLAlchemy 通常与\
    \ pandas 库一起使用，以提供完整的数据处理功能。\n- peewee 是一个轻量级且快速的 ORM，设置起来很快。当你的数据库交互仅限于提取少量记录时，这非常有用。例如，如果你需要将选定的记录从\
    \ MySQL 数据库复制到 CSV 文件中，那么 peewee 可能是你的最佳选择。\n- Django ORM 是 Django 最强大的功能之一，随\
    \ Django Web 框架一起提供。它可以与多种数据库交互，例如 SQLite、PostgreSQL 和 MySQL。许多基于 Django 的应用程序使用\
    \ Django ORM 进行数据建模和基本查询，但对于更复杂的需求，通常会切换到 SQLAlchemy。\n\n计算机科学中的对象关系映射是一种编程技术，用于使用面向对象编程语言在不兼容的类型系统之间转换数据。\n\
    \n# 榜样人物\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_348_0.png)\n\n## 大卫·阿克斯马克：MySQL\
    \ AB 的创始人之一，也是免费数据库服务器 MySQL 的开发者。\n\n# 传记\n\n大卫·阿克斯马克是 MySQL AB 的创始人之一，也是免费数据库服务器\
    \ MySQL 的开发者。他从 MySQL 开发之初就与联合创始人迈克尔·维德纽斯一起参与其中。他于 1980 年至 1984 年间在乌普萨拉大学学习。\n\
    \n向下滚动，找到你需要了解的关于大卫·阿克斯马克的一切，最新的关系更新、家庭情况以及他的资历。大卫·阿克斯马克的估计净资产、年龄、传记、职业、社交媒体账户（即\
    \ Instagram、Facebook、Twitter）、家庭、维基。此外，了解有关大卫·阿克斯马克当前净资产以及大卫·阿克斯马克的收入、价值、工资、财产和收入的详细信息。\n\
    \n大卫·阿克斯马克，更广为人知的名字是大卫·阿克斯马克，是一位受欢迎的工程师。他于 1962 年 5 月 28 日出生于瑞典。\n\n大卫的估计净资产、月薪和年薪、主要收入来源、汽车、生活方式等信息已在下方更新。\n\
    \n大卫带来了 300 万至 500 万美元的净资产，大卫的大部分收入来自他的 Yeezy 运动鞋。虽然多年来他夸大了自己业务的规模，但他从职业中赚取的钱足以跻身有史以来最大的名人现金支出之列。他的基本收入来源主要来自成为一名成功的工程师。\n\
    \n# 总结\n\n- 数据库程序是企业信息系统的核心，提供文件创建、数据输入、更新、查询和报告功能。\n- 数据库是组织化信息的集合，可以轻松使用、管理、更新，并根据其组织方式进行分类。\n\
    - Python DB-API 独立于任何数据库引擎，这使你能够编写 Python 脚本来访问任何数据库引擎。\n- 连接对象创建与数据库的连接，这些连接进一步用于不同的事务。这些连接对象也用作数据库会话的代表。\n\
    - 游标是 SQL 的强大功能之一。这些对象负责向数据库服务器提交各种 SQL 语句。\n- 在 Python DB-API 模块中，异常处理非常容易。我们可以在程序中放置警告和错误处理消息。\n\
    - Python 和 MySQL 是开发数据库应用程序的良好组合。在 Linux 上启动 MySQL 服务后，你需要获取 MySQLdb，一个用于 MySQL\
    \ 的 Python DB-API，以执行数据库操作。\n- Python 数据库 API（应用程序编程接口）是标准 Python 的数据库接口。大多数 Python\
    \ 数据库接口都遵循此标准。\n- MySQL 是当今市场上最流行的数据库管理系统（DBMS）之一。在今年的 DB-Engines 排名中，它仅次于 Oracle\
    \ DBMS，排名第二。由于大多数软件应用程序需要以某种形式与数据交互，因此像 Python 这样的编程语言提供了存储和访问这些数据源的工具。\n- SQL\
    \ Server 也是一个非常流行的 DBMS，以其可靠性、效率和安全性而闻名。它受到公司，特别是银行领域的青睐，这些公司经常处理大量流量工作负载。\n\n\
    # 知识检查\n\n1. 这段代码的输出是什么？\n   a,b=1,0\n   a. a=a^b\n   b. b=a^b\n   c. a=a^b\n\
    \   d. print(a)\n\n2. 这个表达式的值是多少？\n   2**2**3**1\n   a. 12\n   b. 64\n   c. 128\n\
    \   d. 256\n   e. 此代码将引发异常\n\n3. 以下哪项通常用于执行诸如创建关系结构、删除关系等任务？\n   a. DML（数据操作语言）\n\
    \   b. 查询\n   c. 关系模式\n   d. DDL（数据定义语言）\n\n4. 以下哪项提供了从数据库查询信息、向数据库插入元组、从数据库删除元组以及修改数据库中元组的能力？\n\
    \   a. DML（数据操作语言）\n   b. DDL（数据定义语言）\n   c. 查询\n   d. 关系模式\n\n5. 以下给定的语句中，哪一个可能包含错误？\n\
    \   a. select * from emp where empid = 10003;\n   b. select empid from emp where\
    \ empid = 10006;\n   c. select empid from emp;\n   d. select empid where empid\
    \ = 1009 and Lastname = 'GELLER';\n\n6. 一对多关系是什么意思？\n    a. 一个班级可能有许多老师\n    b.\
    \ 一个老师可以有多个班级\n    c. 多个班级可能有多个老师\n    d. 多个老师可能有多个班级\n\n7. 数据库管理系统是 ________\
    \ 软件的一种类型。\n    a. 它是系统软件的一种类型\n    b. 它是应用软件的一种类型\n    c. 它是通用软件的一种类型\n    d.\
    \ A 和 C 都是\n\n8. 术语“FAT”代表____\n    a. 文件分配树\n    b. 文件分配表\n    c. 文件分配图\n   \
    \ d. 以上所有\n\n# 复习题\n\n1. 什么是游标对象？\n2. 如何在 Python MySQL 中创建数据库？\n3. 如何安装 MySQL\
    \ 服务器和 MySQL connector/python？\n4. 访问并建立与 MySQL 服务器的连接。\n5. 如何使用 alter 语句修改表结构？\n\
    \n# 检查你的结果\n\n1. (a)          2. (d)          3. (d)          4. (a)\n5. (d) \
    \         6. (b)          7. (a)          8. (b)"
