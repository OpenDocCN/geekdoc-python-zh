  - "[PAGE 183]\n\nis that they makes programs much easier to maintain and to modify.\
    \ The fewer functions that depend on a particular representation, the fewer changes\
    \ are required when one wants to change that representation.\n\n# The Properties\
    \ of Data\n\nWe began the rational-number implementation by implementing arithmetic\
    \ operations in terms of three unspecified functions: make_rat, numer, and denom.\
    \ At that point, we could think of the operations as being defined in terms of\
    \ data objects --- numerators, denominators, and rational numbers --- whose behavior\
    \ was specified by the latter three functions.\n\nBut what exactly is meant by\
    \ data? It is not enough to say “whatever is implemented by the given selectors\
    \ and constructors.” We need to guarantee that these functions together specify\
    \ the right behavior. That is, if we construct a rational number x from integers\
    \ n and d, then it should be the case that numer(x)/denom(x) is equal to n/d.\n\
    \nIn general, we can think of an abstract data type as defined by some collection\
    \ of selectors and constructors, together with some behavior conditions. As long\
    \ as the behavior conditions are met (such as the division property above), these\
    \ functions constitute a valid representation of the data type.\n\nThis point\
    \ of view can be applied to other data types as well, such as the two-element\
    \ tuple that we used in order to implement rational numbers. We never actually\
    \ said much about what a tuple was, only that the language supplied operators\
    \ to create and manipulate tuples. We can now describe the behavior conditions\
    \ of two-element tuples, also called pairs, that are relevant to the problem of\
    \ representing rational numbers.\n\nIn order to implement rational numbers, we\
    \ needed a form of glue for two integers, which had the following behavior:\n\n\
    +   - If a pair p was constructed from values x and y, then getitem_pair(p, 0)\
    \ returns x, and getitem_pair(p, 1) returns y.\n\nWe can implement functions make_pair\
    \ and getitem_pair that fulfill this description just as well as a tuple.\n\n\
    ```\n>>> def make_pair(x, y):\n    \"\"\"Return a function that behaves like a\
    \ pair.\"\"\"\n    def dispatch(m):\n        if m == 0:\n            return x\n\
    \        elif m == 1:\n            return y\n```"
  - "[PAGE 184]\n\n```\nreturn dispatch\n>>> def getitem_pair(p, i):\n    \"\"\"Return\
    \ the element at index i of pair p.\"\"\"\n    return p(i)\n```\n\nWith this implementation,\
    \ we can create and manipulate pairs.\n\n```\n>>> p = make_pair(1, 2)\n>>> getitem_pair(p,\
    \ 0)\n1\n>>> getitem_pair(p, 1)\n2\n```\n\nThis use of functions corresponds to\
    \ nothing like our intuitive notion of what data should be. Nevertheless, these\
    \ functions suffice to represent compound data in our programs.\n\nThe subtle\
    \ point to notice is that the value returned by make_pair is a function called\
    \ dispatch, which takes an argument m and returns either x or y. Then, getitem_pair\
    \ calls this function to retrieve the appropriate value.\n\nThe point of exhibiting\
    \ the functional representation of a pair is not that Python actually works this\
    \ way (tuples are implemented more directly, for efficiency reasons) but that\
    \ it could work this way. The functional representation, although obscure, is\
    \ a perfectly adequate way to represent pairs, since it fulfills the only conditions\
    \ that pairs need to fulfill. This example also demonstrates that the ability\
    \ to manipulate functions as values automatically provides us the ability to represent\
    \ compound data.\n\n> Terminology invoking \"objects\" and \"oriented\" in the\
    \ modern sense of object-oriented programming made its first appearance at MIT\
    \ in the late 1950s and early 1960s. In the environment of the artificial intelligence\
    \ group, as early as 1960, \"object\" could refer to identified items (LISP atoms)\
    \ with properties (attributes) Alan Kay was later to cite a detailed understanding\
    \ of LISP internals as a strong influence on his thinking in 1966."
