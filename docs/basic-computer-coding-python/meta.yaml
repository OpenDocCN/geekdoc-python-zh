    \  ```\n  >>> threading.active_count()\n  2\n  ```\n- b. `current_thread()`\n\
    \  基于调用者的控制线程，这返回当前的 `Thread` 对象。如果这个控制线程不是通过 `threading` 进行的，它将返回一个功能有限的虚拟线程对象。\n\
    \  ```\n  >>> threading.current_thread()\n  <_MainThread(MainThread, started 14352)>\n\
