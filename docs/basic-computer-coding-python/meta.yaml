  md: 'Google, where he spent half of his time developing the Python language. In
    January 2013, he started working for Dropbox.


    # Python


    In December 1989, Van Rossum had been looking for a “‘hobby’ programming project
    that would keep [him] occupied during the week around Christmas” as his office
    was closed when he decided to write an interpreter for a “new scripting language
    [he] had been thinking about lately: a descendant of ABC that would appeal to
    Unix/C hackers”. He attributes choosing the name “Python” to “being in a slightly
    irreverent mood (and [being] a big fan of *Monty Python’s Flying Circus*)”. He
    has explained that Python’s predecessor, ABC, was inspired by SETL, noting that
    ABC co-developer Lambert Meertens had “spent a year with the SETL group at NYU
    before coming up with the final ABC design”. In July 2018, Van Rossum announced
    that he would be stepping down from the position of BDFL of the Python programming
    language.


    # Computer Programming for Everybody


    In 1999, Van Rossum submitted a funding proposal to DARPA called “Computer Programming
    for Everybody,” in which he further defined his goals for Python:


    +   - An easy and intuitive language just as powerful as major competitors

    - Open source, so anyone can contribute to its development

    - Code that is as understandable as plain English

    - Suitability for everyday tasks, allowing for short development times


    Python has grown to become a popular programming language. As of October 2017,
    it was the second most popular language on GitHub, a social coding website, behind
    Javascript and ahead of Java. According to a programming language popularity survey
    it is consistently amongst the top 10 most mentioned languages in job postings.
    Furthermore, Python is consistently in the top 10 most popular languages according
    to the TIOBE Programming Community Index.


    # Mondrian


    At Google, Van Rossum developed Mondrian, a web-based code review system written
    in Python and used within the company. He named the software after the Dutch painter
    Piet Mondriaan. He named another related software projectafter Gerrit Rietveld,
    a Dutch designer.


    # Dropbox


    In 2013, Van Rossum started working at the cloud file storage company Dropbox.'
