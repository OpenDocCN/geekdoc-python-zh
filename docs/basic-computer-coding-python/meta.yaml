    # SUMMARY


    +   - Multithreading is a threading technique in Python programming to run multiple
    threads concurrently by rapidly switching between threads with a CPU help (called
    context switching). Besides, it allows sharing of its data space with the main
    threads inside a process that share information and communication with other threads
    easier than individual processes.

    - Multithreading allows the programmer to divide application tasks into sub-tasks
    and simultaneously run them in a program. It allows threads to communicate and
    share resources such as files, data, and memory to the same processor.

    - Python threading module is used to implement multithreading in python programs.
    Threading in python is used to run multiple threads (tasks, function calls) at
    the same time.

    - Multiple threads within a process share the same data space with the main thread
    and can therefore share information or communicate with each other more easily
    than if they were separate processes.

    - Multiprocessing and Multithreading both adds performance to the system. Multiprocessing
    is adding more number of or CPUs/processors to the system which increases the
    computing speed of the system.

    - The Thread class that we mentioned earlier in this blog denotes an activity
    running in a separate thread of control. We can represent this activity either
    by passing a callable object to the constructor, ot by overriding the method run()
    in a subclass.

    - A synchronization primitive, a primitive lock does not belong to a certain thread
    when locked. This is the lowest-level synchronization primitive we currently have
    in Python, and we implement it using the extension module _thread.'
