    \ `__doc__` attribute of the function.\n\nFor example:\nTry running the following\
    \ into the Python shell to see the output.\n\n```\n>>> print(greet.__doc__)\n\
    This function greets to\nthe person passed into the\nname parameter\n```\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_56_0.png)\n\
    \n### 2.1.3 The Return Statement\n\nThe return statement is used to exit a function\
