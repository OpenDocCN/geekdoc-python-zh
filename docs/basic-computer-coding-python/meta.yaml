    \ implementation.\n\nThe Python interpreter works by loading a source file or\
    \ reading a line typed at the keyboard, parsing it into an abstract syntax tree,\
    \ compiling the tree into bytecode, and executing the bytecode. We will concentrate\
    \ mainly on how the bytecode is executed, such as how inheritance and environments\
    \ are implemented.\n\n# Parsing\n\nThe parsing process is fairly standard. The\
    \ basic idea is to first convert the input characters into a more abstract representation\
    \ like name: x, integer: 7, string: “hello”, less-than-or-equal, etc. The abstracted\
    \ characters are called *tokens*. (There are utilities, such as lex, for automatically\
    \ generating tokenizers, but Python does not use one.) The tokenization process\
    \ is fully described in the language reference.\n\n*For example*, the statement\n\
    \n```\nwhile(x <= 3):\n    f(x)\n```\n\nmight be tokenized as\n\n+   - keyword:\
    \ while\n- left-paren\n- name: x\n- leq\n- int: 3\n- right-paren\n- colon\n- indent\n\
    - name: f\n- left-paren\n- name: x\n- right-paren\n\nThen the tokens are assembled\
