    \ is an object that can completely run a single test method, together with optional\
    \ set-up and tidy-up code.\nThe testing code of a TestCase instance should be\
    \ entirely self-contained, such that it can be run either in isolation or in arbitrary\
    \ combination with any number of other test cases.\nThe simplest TestCase subclass\
    \ will simply override the runTest() method in order to perform specific testing\
    \ code:\n\n```\nimport unittest\nclass DefaultWidgetSizeTestCase(unittest.TestCase):\n\
    \    def runTest(self):\n        widget = Widget('The widget')\n        self.assertEqual(widget.size(),\
    \ (50, 50), 'incorrect default size')\n```"
  - "[PAGE 131]\n\nNote that in order to test something, we use one of the assert*()\
    \ methods provided by the TestCase base class. If the test fails, an exception\
    \ will be raised, and unittest will identify the test case as a failure. Any other\
    \ exceptions will be treated as errors. This helps you identify where the problem\
    \ is: failures are caused by incorrect results - a 5 where you expected a 6. Errors\
    \ are caused by incorrect code - e.g., a TypeError caused by an incorrect function\
    \ call.\n\nThe way to run a test case will be described later. For now, note that\
    \ to construct an instance of such a test case, we call its constructor without\
    \ arguments:\n\n```\ntestCase = DefaultWidgetSizeTestCase()\n```\n\nNow, such\
    \ test cases can be numerous, and their set-up can be repetitive. In the case,\
    \ constructing a Widget in each of 100 Widget test case **subclasses** would mean\
    \ unsightly duplication.\n\nLuckily, we can factor out such set-up code by implementing\
    \ a method called setUp(), which the testing framework will automatically call\
