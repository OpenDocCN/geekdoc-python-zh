    - Type **complex(x)** to convert x to a complex number with real part x and imaginary
    part zero.

    - Type **complex(x, y)** to convert x and y to a complex number with real part
    x and imaginary part y. x and y are **numeric expressions**


    # 8.3.2 Mathematical Functions


    Python includes following functions that perform mathematical calculations.


    | Sr.No. | Function & Returns ( description ) |

    | :--- | :--- |

    | 1 | abs(x)<br>The absolute value of x: the (positive) distance between x and
    zero. |

    | 2 | ceil(x)<br>The ceiling of x: the smallest integer not less than x |


    Numeric expression is a combination of numeric elements (such as numbers, variables,
    and functions) and operators that evaluates to a numeric value. You can perform
    additional mathematical operations using math functions.'
