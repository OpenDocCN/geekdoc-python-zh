  - "[PAGE 132]\n\n```\nimport unittest\nclass SimpleWidgetTestCase(unittest.TestCase):\n\
    \    def setUp(self):\n        self.widget = Widget('The widget')\n    def tearDown(self):\n\
    \        self.widget.dispose()\n        self.widget = None\n```\n\nIf setUp()\
    \ succeeded, the tearDown() method will be run whether runTest() succeeded or\
    \ not.\n\nSuch a working environment for the testing code is called a fixture.\n\
    \nOften, many small test cases will use the same fixture. In this case, we would\
    \ end up subclassing SimpleWidgetTestCase into many small one-method classes such\
    \ as DefaultWidgetSizeTestCase. This is time-consuming and discouraging, so in\
    \ the same vein as JUnit, unittest provides a simpler mechanism:\n\n```\nimport\
    \ unittest\nclass WidgetTestCase(unittest.TestCase):\n    def setUp(self):\n \
    \       self.widget = Widget('The widget')\n    def tearDown(self):\n        self.widget.dispose()\n\
    \        self.widget = None\n    def test_default_size(self):\n        self.assertEqual(self.widget.size(),\
    \ (50,50),\n                         'incorrect default size')\n    def test_resize(self):\n\
    \        self.widget.resize(100,150)\n        self.assertEqual(self.widget.size(),\
    \ (100,150),\n                         'wrong size after resize')\n```\n\nHere\
    \ we have not provided a runTest() method, but have instead provided two different\
    \ test methods. Class instances will now each run one of the test_*() methods,\
    \ with self.widget created and destroyed separately for each instance. When creating\
    \ an instance we must specify the test method it is to run. We do this by passing\
    \ the method name in the constructor:\n\n```\ndefaultSizeTestCase = WidgetTestCase('test_default_size')\n\
    resizeTestCase = WidgetTestCase('test_resize')\n```"
- md: "Test case instances are grouped together according to the features they test.\
    \ unittest provides a mechanism for this: the test suite, represented by unittest’s\
    \ TestSuite class:\n\n```\nwidgetTestSuite = unittest.TestSuite()\nwidgetTestSuite.addTest(WidgetTestCase('test_default_size'))\n\
    widgetTestSuite.addTest(WidgetTestCase('test_resize'))\n```\n\nFor the ease of\
    \ running tests, as we will see later, it is a good idea to provide in each test\
    \ module a callable object that returns a pre-built test suite:\n\n```\ndef suite\
    \ ():\n    suite = unittest.TestSuite()\n    suite.addTest(WidgetTestCase('test_default_size'))\n\
    \    suite.addTest(WidgetTestCase('test_resize'))\n    return suite\n```\n\nor\
    \ even:\n\n```\ndef suite ():\n    tests = ['test_default_size', 'test_resize']\n\
    \    return unittest.TestSuite(map(WidgetTestCase, tests))\n```\n\nSince it is\
    \ a common pattern to create a TestCase subclass with many similarly named test\
    \ functions, unittest provides a TestLoader class that can be used to automate\
    \ the process of creating a test suite and populating it with individual tests.\
    \ For example,\n\n```\nsuite = unittest.TestLoader().loadTestsFromTestCase(WidgetTestCase)\n\
    ```\n\nwill create a test suite that will run WidgetTestCase.test_default_size()\
    \ and WidgetTestCase.test_resize. TestLoader uses the ‘test’ method name prefix\
    \ to identify test methods automatically.\n\nOften it is desirable to group suites\
    \ of test cases together, so as to run tests for the whole system at once. This\
    \ is easy, since TestSuite instances can be added to a TestSuite just as TestCase\
    \ instances can be added to a TestSuite:\n\n```\nsuite1 = module1.TheTestSuite()\n\
    suite2 = module2.TheTestSuite()\nalltests = unittest.TestSuite([suite1, suite2])\n\
    ```\n\nYou can place the definitions of test cases and test suites in the same\
    \ modules as the code they are to test (such as widget.py), but there are several\
    \ advantages to placing the test code in a separate module, such as test_widget.py:\n\
    \n- The test module can be run standalone from the command line.\n- The test code\
    \ can more easily be separated from shipped code.\n- There is less temptation\
    \ to change test code to fit the code it tests without a good reason.\n- Test\
    \ code should be modified much less frequently than the code it tests.\n- Tested\
    \ code can be refactored more easily.\n- Tests for modules written in C must be\
    \ in separate modules anyway, so why not be consistent?\n- If the testing strategy\
    \ changes, there is no need to change the source code.\n\n## 4.2.5 Re-using old\
    \ test code\n\nSome users will find that they have existing test code that they\
    \ would like to run from unittest, without converting every old test function\
    \ to a TestCase subclass.\nFor this reason, unittest provides a FunctionTestCase\
    \ class. This subclass of TestCase can be used to wrap an existing test function.\
    \ Set-up and tear-down functions can also be provided.\nGiven the following test\
    \ function:\n\n```\ndef testSomething():\n    something = makeSomething()\n  \
    \  assert something.name is not None\n    # ...\n```\n\none can create an equivalent\
    \ test case instance as follows:\n\n```\ntestcase = unittest.FunctionTestCase(testSomething)\n\
    ```\n\nIf there are additional set-up and tear-down methods that should be called\
    \ as part of the test case's operation, they can also be provided like so:\n\n\
    ```\ntestcase = unittest.FunctionTestCase(testSomething,\n                   \
    \                 setUp=makeSomethingDB,\n                                   \
    \ tearDown=deleteSomethingDB)\n```\n\nTo make migrating existing test suites easier,\
    \ unittest supports tests raising AssertionError to indicate test failure. However,\
    \ it is recommended that you use the explicit TestCase.fail*() and TestCase.assert*()\
    \ methods instead, as future versions of unittest may treat AssertionError differently.\n\
    \n> **Note:** Even though FunctionTestCase can be used to quickly convert an existing\
    \ test base over to a unittest-based system, this approach is not recommended.\
    \ Taking the time to set up proper TestCase subclasses will make future test refactorings\
    \ infinitely easier.\n\nIn some cases, the existing tests may have been written\
    \ using the doctest module. If so, doctest provides a DocTestSuite class that\
    \ can automatically build unittest.TestSuite instances from the existing doctest-based\
    \ tests.\n\n## 4.2.6 Skipping tests and expected failures\n\nUnittest supports\
    \ skipping individual test methods and even whole classes of tests. In addition,\
    \ it supports marking a test as an “expected failure,” a test that is broken and\
    \ will fail, but shouldn’t be counted as a failure on a TestResult.\nSkipping\
    \ a test is simply a matter of using the skip() decorator or one of its conditional\
    \ variants.\nBasic skipping looks like this:\n\n```\nclass MyTestCase(unittest.TestCase):\n\
    \    @unittest.skip(\"demonstrating skipping\")\n    def test_nothing(self):\n\
    \        self.fail(\"shouldn't happen\")\n    @unittest.skipIf(mylib.__version__\
    \ < (1, 3),\n                     \"not supported in this library version\")\n\
    \    def test_format(self):\n        # Tests that work for only a certain version\
    \ of the library.\n        pass\n    @unittest.skipUnless(sys.platform.startswith(\"\
    win\"),\n                         \"requires Windows\")\n    def test_windows_support(self):\n\
    \        # windows specific testing code\n        pass\n```\n\nThis is the output\
    \ of running the example in verbose mode:\n\n```\ntest_format (__main__.MyTestCase)\
    \ ... skipped 'not supported in this library version'\ntest_nothing (__main__.MyTestCase)\
    \ ... skipped 'demonstrating skipping'\ntest_windows_support (__main__.MyTestCase)\
    \ ... skipped 'requires Windows'\n----------------------------------------------------------------------\n\
    Ran 3 tests in 0.005s\n\nOK (skipped=3)\n```\n\nClasses can be skipped just like\
    \ methods:\n\n```\n@unittest.skip(\"showing class skipping\")\nclass MySkippedTestCase(unittest.TestCase):\n\
    \    def test_not_run(self):\n        pass\n```\n\nTestCase.setUp() can also skip\
    \ the test. This is useful when a resource that needs to be set up is not available.\n\
    \nExpected failures use the expectedFailure() decorator.\n\n```\nclass ExpectedFailureTestCase(unittest.TestCase):\n\
    \    @unittest.expectedFailure\n    def test_fail(self):\n        self.assertEqual(1,\
    \ 0, \"broken\")\n```\n\nIt's easy to roll your own skipping decorators by making\
    \ a decorator that calls skip() on the test when it wants it to be skipped. This\
    \ decorator skips the test unless the passed object has a certain attribute:\n\
    \n```\ndef skipUnlessHasattr(obj, attr):\n    if hasattr(obj, attr):\n       \
    \ return lambda func: func\n    return unittest.skip(\"{!r} doesn't have {!r}\"\
    .format(obj, attr))\n```\n\nThe following decorators implement test skipping and\
    \ expected failures:\n\n```\nunittest.skip(reason)\n```\n\nUnconditionally skip\
    \ the decorated test. reason should describe why the test is being skipped.\n\n\
    ```\nunittest.skipIf(condition, reason)\n```\n\nSkip the decorated test if condition\
    \ is true.\n\n```\nunittest.skipUnless(condition, reason)\n```\n\nSkip the decorated\
    \ test unless condition is true.\n\n```\nunittest.expectedFailure()\n```\n\nMark\
    \ the test as an expected failure. If the test fails when run, the test is not\
    \ counted as a failure.\n\n```\nexception unittest.SkipTest(reason)\n```\n\nThis\
    \ exception is raised to skip a test.\n\nUsually you can use TestCase.skipTest()\
    \ or one of the skipping decorators instead of raising this directly.\n\nSkipped\
    \ tests will not have setUp() or tearDown() run around them. Skipped classes will\
    \ not have setUpClass() or tearDownClass() run.\n\n## 4.3 COMPREHENSIONS\n\nComprehensions\
    \ are constructs that allow sequences to be built from other sequences. Types\
    \ of comprehensions are supported in both Python 2 and Python 3:\n\n- list comprehensions\n\
    - dictionary comprehensions\n- set comprehensions\n- generator comprehensions\n\
    \nWe will discuss them one by one. Once you get the hang of using list comprehensions\
    \ then you can use any of them easily.\n\n### 4.3.1 List Comprehensions\n\nList\
    \ comprehensions provide a short and concise way to create lists. It consists\
    \ of square brackets containing an expression followed by a for clause, then zero\
    \ or more for or if clauses. The expressions can be anything, meaning you can\
    \ put in all kinds of objects in lists. The result would be a new list made after\
    \ the evaluation of the expression in context of the if and for clauses.\n\n**Blueprint**\n\
    \n```\nvariable = [out_exp for out_exp in input_list if out_exp == 2]\n```\n\n\
    Here is a short example:\n\n```\nmultiples = [i for i in range(30) if i % 3 ==\
    \ 0]\nprint(multiples)\n# Output: [0, 3, 6, 9, 12, 15, 18, 21, 24, 27]\n```\n\n\
    This can be really useful to make lists quickly. It is even preferred by some\
    \ instead of the filter function. List comprehensions really shine when you want\
    \ to supply a list to a method or function to make a new list by appending to\
    \ it in each iteration of the for loop."
  mdcn: "测试用例实例根据它们测试的功能被分组在一起。`unittest`为此提供了一种机制：测试套件，由`unittest`的`TestSuite`类表示：\n\
    \n```\nwidgetTestSuite = unittest.TestSuite()\nwidgetTestSuite.addTest(WidgetTestCase('test_default_size'))\n\
    widgetTestSuite.addTest(WidgetTestCase('test_resize'))\n```\n\n为了便于运行测试，正如我们稍后将看到的，在每个测试模块中提供一个返回预构建测试套件的可调用对象是一个好主意：\n\
    \n```\ndef suite ():\n    suite = unittest.TestSuite()\n    suite.addTest(WidgetTestCase('test_default_size'))\n\
    \    suite.addTest(WidgetTestCase('test_resize'))\n    return suite\n```\n\n或者甚至：\n\
    \n```\ndef suite ():\n    tests = ['test_default_size', 'test_resize']\n    return\
    \ unittest.TestSuite(map(WidgetTestCase, tests))\n```\n\n由于创建一个包含许多类似命名测试函数的`TestCase`子类是一种常见模式，`unittest`提供了一个`TestLoader`类，可用于自动化创建测试套件并填充各个测试的过程。例如，\n\
    \n```\nsuite = unittest.TestLoader().loadTestsFromTestCase(WidgetTestCase)\n```\n\
    \n将创建一个测试套件，该套件将运行`WidgetTestCase.test_default_size()`和`WidgetTestCase.test_resize`。`TestLoader`使用“test”方法名前缀自动识别测试方法。\n\
    \n通常，将测试用例套件分组在一起是可取的，以便一次运行整个系统的测试。这很容易，因为`TestSuite`实例可以添加到`TestSuite`中，就像`TestCase`实例可以添加到`TestSuite`中一样：\n\
    \n```\nsuite1 = module1.TheTestSuite()\nsuite2 = module2.TheTestSuite()\nalltests\
    \ = unittest.TestSuite([suite1, suite2])\n```\n\n你可以将测试用例和测试套件的定义放在与它们要测试的代码相同的模块中（例如`widget.py`），但将测试代码放在单独的模块中（如`test_widget.py`）有几个优点：\n\
    \n- 测试模块可以从命令行独立运行。\n- 测试代码可以更容易地与发布的代码分离。\n- 没有充分理由时，更少诱惑去修改测试代码以适应它测试的代码。\n\
    - 测试代码的修改频率应远低于它测试的代码。\n- 被测试的代码可以更容易地重构。\n- 用C编写的模块的测试必须放在单独的模块中，所以为什么不保持一致呢？\n\
    - 如果测试策略发生变化，则无需更改源代码。\n\n## 4.2.5 重用旧测试代码\n\n一些用户会发现他们有现有的测试代码，他们希望从`unittest`运行，而无需将每个旧测试函数转换为`TestCase`子类。\n\
    为此，`unittest`提供了一个`FunctionTestCase`类。这个`TestCase`的子类可用于包装现有的测试函数。也可以提供设置和拆卸函数。\n\
    给定以下测试函数：\n\n```\ndef testSomething():\n    something = makeSomething()\n    assert\
    \ something.name is not None\n    # ...\n```\n\n可以如下创建一个等效的测试用例实例：\n\n```\ntestcase\
    \ = unittest.FunctionTestCase(testSomething)\n```\n\n如果有额外的设置和拆卸方法应作为测试用例操作的一部分被调用，也可以如下提供：\n\
    \n```\ntestcase = unittest.FunctionTestCase(testSomething,\n                 \
    \                   setUp=makeSomethingDB,\n                                 \
    \   tearDown=deleteSomethingDB)\n```\n\n为了使迁移现有测试套件更容易，`unittest`支持测试引发`AssertionError`来表示测试失败。但是，建议你使用显式的`TestCase.fail*()`和`TestCase.assert*()`方法，因为`unittest`的未来版本可能会以不同方式处理`AssertionError`。\n\
    \n> **注意：** 尽管`FunctionTestCase`可用于快速将现有测试基础转换为基于`unittest`的系统，但不推荐这种方法。花时间设置适当的`TestCase`子类将使未来的测试重构变得无限容易。\n\
    \n在某些情况下，现有测试可能是使用`doctest`模块编写的。如果是这样，`doctest`提供了一个`DocTestSuite`类，可以从现有的基于`doctest`的测试自动构建`unittest.TestSuite`实例。\n\
    \n## 4.2.6 跳过测试和预期失败\n\n`unittest`支持跳过单个测试方法甚至整个测试类。此外，它支持将测试标记为“预期失败”，即一个已损坏并将失败的测试，但不应在`TestResult`中计为失败。\n\
    跳过测试只需使用`skip()`装饰器或其条件变体之一。\n基本跳过如下所示：\n\n```\nclass MyTestCase(unittest.TestCase):\n\
    \    @unittest.skip(\"demonstrating skipping\")\n    def test_nothing(self):\n\
    \        self.fail(\"shouldn't happen\")\n    @unittest.skipIf(mylib.__version__\
    \ < (1, 3),\n                     \"not supported in this library version\")\n\
    \    def test_format(self):\n        # Tests that work for only a certain version\
    \ of the library.\n        pass\n    @unittest.skipUnless(sys.platform.startswith(\"\
    win\"),\n                         \"requires Windows\")\n    def test_windows_support(self):\n\
    \        # windows specific testing code\n        pass\n```\n\n这是在详细模式下运行示例的输出：\n\
    \n```\ntest_format (__main__.MyTestCase) ... skipped 'not supported in this library\
    \ version'\ntest_nothing (__main__.MyTestCase) ... skipped 'demonstrating skipping'\n\
    test_windows_support (__main__.MyTestCase) ... skipped 'requires Windows'\n----------------------------------------------------------------------\n\
    Ran 3 tests in 0.005s\n\nOK (skipped=3)\n```\n\n类可以像方法一样被跳过：\n\n```\n@unittest.skip(\"\
    showing class skipping\")\nclass MySkippedTestCase(unittest.TestCase):\n    def\
    \ test_not_run(self):\n        pass\n```\n\n`TestCase.setUp()`也可以跳过测试。当需要设置的资源不可用时，这很有用。\n\
    \n预期失败使用`expectedFailure()`装饰器。\n\n```\nclass ExpectedFailureTestCase(unittest.TestCase):\n\
    \    @unittest.expectedFailure\n    def test_fail(self):\n        self.assertEqual(1,\
    \ 0, \"broken\")\n```\n\n通过创建一个装饰器，在希望跳过测试时调用`skip()`，可以轻松地制作自己的跳过装饰器。此装饰器跳过测试，除非传递的对象具有某个属性：\n\
    \n```\ndef skipUnlessHasattr(obj, attr):\n    if hasattr(obj, attr):\n       \
    \ return lambda func: func\n    return unittest.skip(\"{!r} doesn't have {!r}\"\
    .format(obj, attr))\n```\n\n以下装饰器实现了测试跳过和预期失败：\n\n```\nunittest.skip(reason)\n\
    ```\n\n无条件跳过装饰的测试。`reason`应描述为什么跳过测试。\n\n```\nunittest.skipIf(condition, reason)\n\
    ```\n\n如果`condition`为真，则跳过装饰的测试。\n\n```\nunittest.skipUnless(condition, reason)\n\
    ```\n\n除非`condition`为真，否则跳过装饰的测试。\n\n```\nunittest.expectedFailure()\n```\n\n\
    将测试标记为预期失败。如果测试在运行时失败，则该测试不计为失败。\n\n```\nexception unittest.SkipTest(reason)\n\
    ```\n\n引发此异常以跳过测试。\n\n通常，你可以使用`TestCase.skipTest()`或跳过装饰器之一，而不是直接引发此异常。\n\n跳过的测试不会在其周围运行`setUp()`或`tearDown()`。跳过的类不会运行`setUpClass()`或`tearDownClass()`。\n\
    \n## 4.3 推导式\n\n推导式是允许从其他序列构建序列的构造。Python 2和Python 3都支持以下类型的推导式：\n\n- 列表推导式\n\
    - 字典推导式\n- 集合推导式\n- 生成器推导式\n\n我们将逐一讨论它们。一旦你掌握了使用列表推导式的技巧，你就可以轻松地使用其中任何一种。\n\n\
    ### 4.3.1 列表推导式\n\n列表推导式提供了一种简短而简洁的方式来创建列表。它由方括号组成，方括号内包含一个表达式，后跟一个`for`子句，然后是零个或多个`for`或`if`子句。表达式可以是任何东西，这意味着你可以在列表中放入各种对象。结果将是一个新列表，该列表是在`if`和`for`子句的上下文中对表达式求值后生成的。\n\
    \n**蓝图**\n\n```\nvariable = [out_exp for out_exp in input_list if out_exp == 2]\n\
    ```\n\n这是一个简短的例子：\n\n```\nmultiples = [i for i in range(30) if i % 3 == 0]\nprint(multiples)\n\
    # Output: [0, 3, 6, 9, 12, 15, 18, 21, 24, 27]\n```\n\n这对于快速创建列表非常有用。有些人甚至更喜欢它而不是`filter`函数。当你想向方法或函数提供一个列表，并通过在`for`循环的每次迭代中向其追加来创建一个新列表时，列表推导式真正大放异彩。"
