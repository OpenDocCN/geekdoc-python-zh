    ## Basic Computer Coding: Python


    2nd Edition


    Python is an interpreted, object-oriented, high-level programming language with
    dynamic semantics. Its high-level built in data structures, combined with dynamic
    typing and dynamic binding, make it very attractive for Rapid Application Development,
    as well as for use as a scripting or glue language to connect existing components
    together. Its high-level built in data structures, combined with dynamic typing
    and dynamic binding; make it very attractive for Rapid Application Development,
    as well as for use as a scripting or glue language to connect existing components
    together. Python has become one of the most popular programming languages in the
    world in recent years. It''s used in everything from machine learning to building
    websites and software testing. It can be used by developers and non-developers
    alike.


    This edition is organized into nine chapters. This is a comprehensive guide on
    how to get started in Python, why you should learn it and how you can learn it.
    This hands-on guide takes you through the language a step at a time, beginning
    with basic programming concepts including with functions, recursion, data structures,
    and object-oriented design.


