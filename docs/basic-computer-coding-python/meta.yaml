- md: '## Python Membership Operators


    Python''s membership operators test for membership in a sequence, such as strings,
    lists, or tuples. There are two membership operators as explained below –


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | in | Evaluates to true if it finds a variable in the specified sequence and
    false otherwise. | x in y, here in results in a 1 if x is a member of sequence
    y. |

    | not in | Evaluates to true if it does not find a variable in the specified sequence
    and false otherwise. | x not in y, here not in results in a 1 if x is not a member
    of sequence y. |


    ## Python Identity Operators


    Identity operators compare the memory locations of two objects. There are two
    Identity operators explained below –


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | is | Evaluates to true if the variables on either side of the operator point
    to the same object and false otherwise. | x is y, here **is** results in 1 if
    id(x) equals id(y). |

    | is not | Evaluates to false if the variables on either side of the operator
    point to the same object and true otherwise. | x is not y, here **is not** results
    in 1 if id(x) is not equal to id(y). |


    ## 1.5.2 Python Operators Precedence


    The following table lists all operators from highest precedence to lowest.


    | Operator | Description |

    | :--- | :--- |

    | ** | Exponentiation (raise to the power) |

    | ~ + - | Complement, unary plus and minus (method names for the last two are
    +@ and -@) |

    | * / % // | Multiply, divide, modulo and floor division |

    | + - | Addition and subtraction |

    | >> << | Right and left bitwise shift |

    | & | Bitwise ''AND'' |

    | ^ | Bitwise exclusive OR and regular OR |

    | <= <> >= | Comparison operators |

    | <> == != | Equality operators |

    | = %= /= //= -= += *= **= | Assignment operators |

    | is is not | Identity operators |

    | in not in | Membership operators |

    | not or and | Logical operators |


    Operator precedence affects how an expression is evaluated.


    x = 7 + 3 * 2; here, x is assigned 13, not 20 because operator * has higher precedence
    than +, so it first multiplies 3*2 and then adds into 7.


    ![](img/192fecf3b33c4ee7d07f7123b285647a_46_0.png)


    Here, operators with the highest precedence appear at the top of the table, those
    with the lowest appear at the bottom.


    ## Example


    ```

    #!/usr/bin/python


    a = 20

    b = 10

    c = 15

    d = 5

    e = 0


    e = (a + b) * c / d      #( 30 * 15 ) / 5

    print "Value of (a + b) * c / d is ", e


    e = ((a + b) * c) / d    # (30 * 15 ) / 5

    print "Value of ((a + b) * c) / d is ", e


    e = (a + b) * (c / d);   # (30) * (15/5)

    print "Value of (a + b) * (c / d) is ", e


    e = a + (b * c) / d;       #  20 + (150/5)

    print "Value of a + (b * c) / d is ",  e

    ```


    When you execute the above program, it produces the following result –


    Value of (a + b) * c / d is 90

    Value of ((a + b) * c) / d is 90

    Value of (a + b) * (c / d) is 90

    Value of a + (b * c) / d is 50


    ## ROLE MODEL


