    \ into smaller and modular chunks. As our program grows larger and larger, functions\
    \ make it more organized and manageable.\n\nFurthermore, it avoids repetition\
    \ and makes code reusable.\n\n### 2.1.1 Syntax of Function\n\n```\ndef function_name(parameters):\n\
    \    \"\"\"docstring\"\"\"\n    statement(s)\n```\n\nAbove shown is a function\
    \ definition which consists of following components.\n\n- Keyword def marks the\
    \ start of function header.\n- A function name to uniquely identify it. Function\
    \ naming follows the same rules of writing identifiers in Python.\n- Parameters\
    \ (arguments) through which we pass values to a function. They are optional.\n\
    - A colon (:) to mark the end of function header.\n- Optional documentation string\
    \ (docstring) to describe what the function does.\n- One or more valid python\
    \ **statements** that make up the function body. Statements must have same indentation\
    \ level (usually 4 spaces).\n- An optional return statement to return a value\
    \ from the function.\n\n### Example of a function\n\n```\ndef greet(name):\n \
    \   \"\"\"This function greets to\n    the person passed in as\n    a parameter\"\
    \"\"\n    print(\"Hello, \" + name + \". Good morning!\")\n```\n\n### How to call\
    \ a function in python\n\nOnce we have defined a function, we can call it from\
    \ another function, program or even the Python prompt. To call a function we simply\
    \ type the function name with appropriate parameters.\n\n```\n>>> greet('Paul')\n\
    Hello, Paul. Good morning!\n```\n\n### 2.1.2 Docstring\n\nThe first string after\
    \ the function header is called the docstring and is short for documentation string.\
    \ It is used to explain in brief, what a function does. Although optional, documentation\
    \ is a good programming practice. Unless you can remember what you had for dinner\
    \ last week, always document your code.\n\nIn the above example, we have a docstring\
    \ immediately below the function header. We generally use triple quotes so that\
