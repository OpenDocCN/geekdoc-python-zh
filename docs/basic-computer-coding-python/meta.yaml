    \n```\nfor line in open(\"myfile.txt\"):\n    print(line, end=\"\")\n```\n\n这段代码的问题在于，在代码的这部分执行完毕后，文件会保持打开状态，时间不确定。在简单脚本中这不是问题，但对于较大的应用程序可能会成为问题。with\
