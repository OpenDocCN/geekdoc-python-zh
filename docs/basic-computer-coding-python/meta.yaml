    -   多线程允许程序员将应用程序任务划分为子任务，并在程序中同时运行它们。它允许线程在同一个处理器上通信和共享资源，如文件、数据和内存。\n-   Python\
    \ 的 `threading` 模块用于在 Python 程序中实现多线程。Python 中的线程用于同时运行多个线程（任务、函数调用）。\n-   进程内的多个线程与主线程共享相同的数据空间，因此它们可以比独立进程更容易地共享信息或相互通信。\n\
