    ['__displayhook__', '__doc__', '__excepthook__', '__name__', '__package__',\n\
    '__stderr__', '__stdin__', '__stdout__', '_clear_type_cache',\n'_current_frames',\
    \ '_getframe', '_mercurial', 'api_version', 'argv',\n'builtin_module_names', 'byteorder',\
