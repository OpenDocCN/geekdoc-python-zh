    # 3.2 PYTHON SETS


    Sets are a collection of distinct (unique) objects. These are useful to create
    lists that only hold unique values in the dataset. It is an unordered collection
    but a mutable one, this is very helpful when going through a huge dataset.


    ```

    x_set = set(''CAKE&COKE'')

    y_set = set(''COOKIE'')

    print(x_set)

    {''A'', ''&'', ''O'', ''E'', ''C'', ''K''}

    print(y_set) # Single unique ''o''

    {''I'', ''O'', ''E'', ''C'', ''K''}

    print(x - y) # All the elements in x_set but not in y_set

    ---------------------------------------------------------------------------

    NameError                                 Traceback (most recent call last)

    <ipython-input-3-31abf5d98454> in <module>()

    ----> 1 print(x - y) # All the elements in x_set but not in y_set


    NameError: name ''x'' is not defined

    print(x_set|y_set) # Unique elements in x_set or y_set or both

    {''C'', ''&'', ''E'', ''A'', ''O'', ''K'', ''I''}

    print(x_set & y_set) # Elements in both x_set and y_set

    {''O'', ''E'', ''K'', ''C''}

    ```


    > Sets can store anything, not just strings. It''s just easiest to illustrate
    the set methods using sets of strings.


    # 3.2.1 Defining a Set


    You can define a set as simple as by naming all of its elements in brackets. The
    only exception is *empty set*, which can be created using the function set().
    If set(..) has a list, a string or a tuple as a parameter, it will return a set
    composed of its elements.'
  - '[PAGE 93]


    # Basic Computer Coding: Python


    ![](img/192fecf3b33c4ee7d07f7123b285647a_93_0.png)


    Let''s see what all that means, and how you can work with sets in Python.

    A set can be created in two ways. First, you can define a set with the built-in
    set() function:

    x = set(<iter>)

    In this case, the argument <iter> is an iterable—again, for the moment, think
    list or tuple—that generates the list of objects to be included in the set. This
    is analogous to the <iter>argument given to the .extend() list method:


    ```

    >>> x = set([''foo'', ''bar'', ''baz'', ''foo'', ''qux''])

    >>> x

    {''qux'', ''foo'', ''bar'', ''baz''}


    >>> x = set((''foo'', ''bar'', ''baz'', ''foo'', ''qux''))

    >>> x

    {''qux'', ''foo'', ''bar'', ''baz''}

    ```


    Strings are also iterable, so a string can be passed to set() as well. You have
    already seen that list(s) generates a list of the characters in the **string**
    s. Similarly, set(s) generates a set of the characters in s:


    ```

    >>> s = ''quux''


    >>> list(s)

    [''q'', ''u'', ''u'', ''x'']

    >>> set(s)

    {''x'', ''u'', ''q''}

    ```


    You can see that the resulting sets are unordered: the original order, as specified
    in the definition, is not necessarily preserved. Additionally, duplicate values
    are only represented in the set once, as with the string ''foo'' in the first
    two examples and the letter ''u'' in the third.


    > **Keyword**

    **String**

    is traditionally a sequence of characters, either as a literal constant or as
    some kind of variable.'
  - '[PAGE 94]


    Alternately, a set can be defined with curly braces ({}):


    ```

    x = {<obj>, <obj>, ..., <obj>}

    ```


    When a set is defined this way, each <obj> becomes a distinct element of the set,
    even if it is an iterable. This behavior is similar to that of the .append() list
    method.


    Thus, the sets shown above can also be defined like this:


    ```

    >>> x = {''foo'', ''bar'', ''baz'', ''foo'', ''qux''}

    >>> x

    {''qux'', ''foo'', ''bar'', ''baz''}

    ```


    ```

    >>> x = {''q'', ''u'', ''u'', ''x''}

    >>> x

    {''x'', ''q'', ''u''}

    ```


    To recap:


    +   - The argument to set() is an iterable. It generates a list of elements to
    be placed into the set.

    - The objects in curly braces are placed into the set intact, even if they are
    iterable.


    Observe the difference between these two set definitions:


    ```

    >>> {''foo''}

    {''foo''}

    ```


    ```

    >>> set(''foo'')

    {''o'', ''f''}

    ```


    A set can be empty. However, recall that Python interprets empty curly braces
    ({}) as an empty dictionary, so the only way to define an empty set is with the
    set() function:


    ```

    >>> x = set()

    >>> type(x)

    <class ''set''>

    >>> x

    set()

    ```


    ```

    >>> x = {}

    >>> type(x)

    ```'
