    \ to the Python program.\n\nThe Function helps to programmer to break the program\
    \ into the smaller part. It organizes the code very effectively and avoids the\
    \ repetition of the code. As the program grows, function makes the program more\
    \ organized.\n\nPython provide us various inbuilt functions like range() or print().\
    \ Although, the user can create its functions, which can be called user-defined\
