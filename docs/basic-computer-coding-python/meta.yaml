    \ breed):\n...         self.breed = breed\n...\n>>> spencer = Dog(\"German Shepard\"\
    )\n>>> spencer.breed\n'German Shepard'\n>>> sara = Dog(\"Boston Terrier\")\n>>>\
    \ sara.breed\n'Boston Terrier'\n```\n\n每个品种的狗都有略微不同的行为。为了考虑这些，让我们为每个品种创建单独的类。这些是父`Dog`类的子类。\n\
    \n## 扩展父类的功能\n\n创建一个名为*dog_inheritance.py*的新文件：\n\n```python\n# Parent class\n\
    class Dog:\n    # Class attribute\n    species = 'mammal'\n\n    # Initializer\
