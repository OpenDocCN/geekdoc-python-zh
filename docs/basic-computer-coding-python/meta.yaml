    \n```\n>>>\n>>> 10 * (1/0)\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nZeroDivisionError: division by zero\n>>> 4 + spam*3\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nNameError:\
    \ name ‘spam’ is not defined\n>>> ‘2’ + 2\nTraceback (most recent call last):\n\
    ```"
- md: "## 4.1.1 Handling Exceptions\n\nIt is possible to write programs that handle\
    \ selected exceptions. Look at the following example, which asks the user for\
    \ input until a valid integer has been entered, but allows the user to interrupt\
    \ the program (using Control-C or whatever the operating system supports); note\
    \ that a user-generated interruption is signalled by raising the KeyboardInterrupt\
    \ exception.\n\n```python\n>>> while True:\n...     try:\n...         x = int(input(\"\
    Please enter a number: \"))\n...         break\n...     except ValueError:\n...\
    \         print(\"Oops! That was no valid number. Try again...\")\n```\n\nThe\
    \ try statement works as follows.\n\n- First, the *try clause* (the statement(s)\
    \ between the try and except keywords) is executed.\n- If no exception occurs,\
    \ the *except clause* is skipped and execution of the try statement is finished.\n\
    - If an exception occurs during execution of the try clause, the rest of the clause\
    \ is skipped. Then if its type matches the exception named after the except keyword,\
    \ the except clause is executed, and then execution continues after the try statement.\n\
    - If an exception occurs which does not match the exception named in the except\
    \ clause, it is passed on to outer try statements; if no handler is found, it\
    \ is an *unhandled exception* and execution stops with a message as shown.\n\n\
    A try statement may have more than one except clause, to specify handlers for\
    \ different exceptions. At most one handler will be executed. Handlers only handle\
    \ exceptions that occur in the corresponding try clause, not in other handlers\
    \ of the same try statement. An except clause may name multiple exceptions as\
    \ a parenthesized tuple, for example:\n\n```python\nexcept (RuntimeError, TypeError,\
    \ NameError):\n    pass\n```\n\nA class in an except clause is compatible with\
    \ an exception if it is the same class or a base class thereof (but not the other\
    \ way around — an except clause listing a derived class is not compatible with\
    \ a base class). For example, the following code will print B, C, D in that order:\n\
    \n```python\nclass B(Exception):\n    pass\n\nclass C(B):\n    pass\n\nclass D(C):\n\
    \    pass\n```\n\n> Errors are the problems in a program due to which the program\
    \ will stop the execution. On the other hand, exceptions are raised when the some\
    \ internal events occur which changes the normal flow of the program.\n\n```python\n\
    for cls in [B, C, D]:\n    try:\n        raise cls()\n    except D:\n        print(\"\
    D\")\n    except C:\n        print(\"C\")\n    except B:\n        print(\"B\"\
    )\n```\n\nNote that if the except clauses were reversed (with except B first),\
    \ it would have printed B, B, B — the first matching except clause is triggered.\n\
    \nThe last except clause may omit the exception name(s), to serve as a wildcard.\
    \ Use this with extreme caution, since it is easy to mask a real programming error\
    \ in this way! It can also be used to print an error message and then re-raise\
    \ the exception (allowing a caller to handle the exception as well):\n\n```python\n\
    import sys\n\ntry:\n    f = open('myfile.txt')\n    s = f.readline()\n    i =\
    \ int(s.strip())\nexcept OSError as err:\n    print(\"OS error: {0}\".format(err))\n\
    except ValueError:\n    print(\"Could not convert data to an integer.\")\nexcept:\n\
    \    print(\"Unexpected error:\", sys.exc_info()[0])\n    raise\n```\n\nThe try\
    \ ... except statement has an optional *else* clause, which, when present, must\
    \ follow all except clauses. It is useful for code that must be executed if the\
    \ try clause does not raise an exception. For example:\n\n```python\nfor arg in\
    \ sys.argv[1:]:\n    try:\n        f = open(arg, 'r')\n    except OSError:\n \
    \       print('cannot open', arg)\n    else:\n        print(arg, 'has', len(f.readlines()),\
    \ 'lines')\n        f.close()\n```\n\nThe use of the else clause is better than\
    \ adding additional code to the try clause because it avoids accidentally catching\
    \ an exception that wasn't raised by the code being protected by the try ... except\
    \ statement.\n\nWhen an exception occurs, it may have an associated value, also\
    \ known as the exception's *argument*. The presence and type of the argument depend\
    \ on the exception type.\n\nThe except clause may specify a variable after the\
    \ exception name. The variable is bound to an exception instance with the arguments\
    \ stored in instance.args. For convenience, the exception instance defines `__str__()`\
    \ so the arguments can be printed directly without having to reference .args.\
    \ One may also instantiate an exception first before raising it and add any attributes\
    \ to it as desired.\n\n```python\n>>> try:\n...     raise Exception('spam', 'eggs')\n\
    ... except Exception as inst:\n...     print(type(inst))    # the exception instance\n\
    ...     print(inst.args)     # arguments stored in .args\n...     print(inst)\
    \          # __str__ allows args to be printed directly,\n...                \
    \         # but may be overridden in exception subclasses\n...     x, y = inst.args\
    \     # unpack args\n...     print('x =', x)\n...     print('y =', y)\n...\n<class\
    \ 'Exception'>\n('spam', 'eggs')\n('spam', 'eggs')\nx = spam\ny = eggs\n```\n\n\
    If an exception has arguments, they are printed as the last part ('detail') of\
    \ the message for unhandled exceptions.\n\nException handlers don’t just handle\
    \ exceptions if they occur immediately in the try clause, but also if they occur\
    \ inside functions that are called (even indirectly) in the try clause. For example:\n\
    \n```python\n>>> def this_fails():\n...     x = 1/0\n...\n>>> try:\n...     this_fails()\n\
    ... except ZeroDivisionError as err:\n...     print('Handling run-time error:',\
    \ err)\n...\nHandling run-time error: division by zero\n```\n\n## 4.1.2 Raising\
    \ Exceptions\n\nThe raise statement allows the programmer to force a specified\
    \ exception to occur. For example:\n\n```python\n>>> raise NameError('HiThere')\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    NameError: HiThere\n```\n\nThe sole argument to raise indicates the exception\
    \ to be raised. This must be either an exception instance or an exception class\
    \ (a class that derives from Exception). If an exception class is passed, it will\
    \ be implicitly instantiated by calling its constructor with no arguments:\n\n\
    ```python\nraise ValueError  # shorthand for 'raise ValueError()'\n```\n\nIf you\
    \ need to determine whether an exception was raised but don’t intend to handle\
    \ it, a simpler form of the raise statement allows you to re-raise the exception:\n\
    \n```python\n>>> try:\n...     raise NameError('HiThere')\n... except NameError:\n\
    ...     print('An exception flew by!')\n... raise\n...\nAn exception flew by!\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 2, in <module>\n\
    NameError: HiThere\n```\n\n## 4.1.3 User-defined Exceptions\n\nPrograms may name\
    \ their own exceptions by creating a new exception class (see Classes for more\
    \ about Python classes). Exceptions should typically be derived from the Exception\
    \ class, either directly or indirectly.\n\nException classes can be defined which\
    \ do anything any other class can do, but are usually kept simple, often only\
    \ offering a number of attributes that allow information about the error to be\
    \ extracted by handlers for the exception. When creating a module that can raise\
    \ several distinct errors, a common practice is to create a base class for exceptions\
    \ defined by that module, and subclass that to create specific exception classes\
    \ for different error conditions:\n\n```python\nclass Error(Exception):\n    \"\
    \"\"Base class for exceptions in this module.\"\"\"\n    pass\n\nclass InputError(Error):\n\
    \    \"\"\"Exception raised for errors in the input.\"\"\"\n```"
  mdcn: "## 4.1.1 处理异常\n\n可以编写程序来处理特定的异常。请看以下示例，该程序会持续请求用户输入，直到输入有效的整数为止，但允许用户中断程序（使用\
    \ Control-C 或操作系统支持的其他方式）；请注意，用户发起的中断会通过引发 `KeyboardInterrupt` 异常来发出信号。\n\n```python\n\
    >>> while True:\n...     try:\n...         x = int(input(\"Please enter a number:\
    \ \"))\n...         break\n...     except ValueError:\n...         print(\"Oops!\
    \ That was no valid number. Try again...\")\n```\n\n`try` 语句的工作原理如下。\n\n- 首先，执行\
    \ *try 子句*（即 `try` 和 `except` 关键字之间的语句）。\n- 如果没有异常发生，则跳过 *except 子句*，`try` 语句执行完毕。\n\
    - 如果在执行 `try` 子句时发生了异常，则跳过该子句的剩余部分。然后，如果其类型与 `except` 关键字后指定的异常匹配，则执行 `except`\
    \ 子句，之后继续执行 `try` 语句之后的代码。\n- 如果发生的异常与 `except` 子句中指定的异常不匹配，则它会被传递给外层的 `try` 语句；如果没有找到处理程序，则它是一个\
    \ *未处理的异常*，程序将停止执行并显示如下所示的消息。\n\n一个 `try` 语句可以有多个 `except` 子句，以指定不同异常的处理程序。最多只会执行一个处理程序。处理程序只处理在相应\
    \ `try` 子句中发生的异常，而不是同一 `try` 语句的其他处理程序中发生的异常。`except` 子句可以将多个异常命名为一个带括号的元组，例如：\n\
    \n```python\nexcept (RuntimeError, TypeError, NameError):\n    pass\n```\n\n`except`\
    \ 子句中的类与异常兼容，当且仅当该类是异常的相同类或其基类（反之则不然——列出派生类的 `except` 子句与基类不兼容）。例如，以下代码将按顺序打印\
    \ B、C、D：\n\n```python\nclass B(Exception):\n    pass\n\nclass C(B):\n    pass\n\
    \nclass D(C):\n    pass\n```\n\n> 错误是程序中导致程序停止执行的问题。另一方面，当发生某些内部事件改变程序的正常流程时，就会引发异常。\n\
    \n```python\nfor cls in [B, C, D]:\n    try:\n        raise cls()\n    except\
    \ D:\n        print(\"D\")\n    except C:\n        print(\"C\")\n    except B:\n\
    \        print(\"B\")\n```\n\n请注意，如果 `except` 子句的顺序颠倒（`except B` 在前），则会打印 B、B、B——第一个匹配的\
    \ `except` 子句会被触发。\n\n最后一个 `except` 子句可以省略异常名称，用作通配符。请极其谨慎地使用此功能，因为这样很容易掩盖真正的编程错误！它也可以用于打印错误消息，然后重新引发异常（允许调用者也处理该异常）：\n\
    \n```python\nimport sys\n\ntry:\n    f = open('myfile.txt')\n    s = f.readline()\n\
    \    i = int(s.strip())\nexcept OSError as err:\n    print(\"OS error: {0}\".format(err))\n\
    except ValueError:\n    print(\"Could not convert data to an integer.\")\nexcept:\n\
    \    print(\"Unexpected error:\", sys.exc_info()[0])\n    raise\n```\n\n`try ...\
    \ except` 语句有一个可选的 *else* 子句，如果存在，它必须跟在所有 `except` 子句之后。这对于必须在 `try` 子句未引发异常时执行的代码很有用。例如：\n\
    \n```python\nfor arg in sys.argv[1:]:\n    try:\n        f = open(arg, 'r')\n\
    \    except OSError:\n        print('cannot open', arg)\n    else:\n        print(arg,\
    \ 'has', len(f.readlines()), 'lines')\n        f.close()\n```\n\n使用 `else` 子句比在\
    \ `try` 子句中添加额外代码更好，因为它避免了意外捕获并非由 `try ... except` 语句保护的代码引发的异常。\n\n当异常发生时，它可能有一个关联的值，也称为异常的\
    \ *参数*。参数的存在和类型取决于异常类型。\n\n`except` 子句可以在异常名称后指定一个变量。该变量绑定到一个异常实例，其参数存储在 `inst.args`\
    \ 中。为了方便，异常实例定义了 `__str__()`，因此可以直接打印参数而无需引用 `.args`。也可以在引发异常之前先实例化异常，并根据需要向其添加任何属性。\n\
    \n```python\n>>> try:\n...     raise Exception('spam', 'eggs')\n... except Exception\
    \ as inst:\n...     print(type(inst))    # the exception instance\n...     print(inst.args)\
    \     # arguments stored in .args\n...     print(inst)          # __str__ allows\
    \ args to be printed directly,\n...                         # but may be overridden\
    \ in exception subclasses\n...     x, y = inst.args     # unpack args\n...   \
    \  print('x =', x)\n...     print('y =', y)\n...\n<class 'Exception'>\n('spam',\
    \ 'eggs')\n('spam', 'eggs')\nx = spam\ny = eggs\n```\n\n如果异常有参数，它们将作为未处理异常消息的最后一部分（“详细信息”）打印出来。\n\
    \n异常处理程序不仅处理直接在 `try` 子句中发生的异常，也处理在 `try` 子句中调用（即使是间接调用）的函数内部发生的异常。例如：\n\n```python\n\
    >>> def this_fails():\n...     x = 1/0\n...\n>>> try:\n...     this_fails()\n\
    ... except ZeroDivisionError as err:\n...     print('Handling run-time error:',\
    \ err)\n...\nHandling run-time error: division by zero\n```\n\n## 4.1.2 引发异常\n\
    \n`raise` 语句允许程序员强制引发指定的异常。例如：\n\n```python\n>>> raise NameError('HiThere')\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    NameError: HiThere\n```\n\n`raise` 的唯一参数指示要引发的异常。这必须是一个异常实例或一个异常类（派生自 `Exception`\
    \ 的类）。如果传递的是异常类，它将通过调用其不带参数的构造函数被隐式实例化：\n\n```python\nraise ValueError  # shorthand\
    \ for 'raise ValueError()'\n```\n\n如果你需要确定是否引发了异常但不打算处理它，`raise` 语句的一种更简单的形式允许你重新引发该异常：\n\
    \n```python\n>>> try:\n...     raise NameError('HiThere')\n... except NameError:\n\
    ...     print('An exception flew by!')\n... raise\n...\nAn exception flew by!\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 2, in <module>\n\
    NameError: HiThere\n```\n\n## 4.1.3 用户自定义异常\n\n程序可以通过创建新的异常类来命名自己的异常（有关 Python\
    \ 类的更多信息，请参阅 类）。异常通常应该直接或间接地派生自 `Exception` 类。\n\n可以定义能够执行任何其他类能执行的操作的异常类，但通常保持简单，通常只提供一些属性，允许异常的处理程序提取有关错误的信息。当创建一个可能引发多种不同错误的模块时，一个常见的做法是为该模块定义的异常创建一个基类，并对其进行子类化以创建针对不同错误条件的特定异常类：\n\
    \n```python\nclass Error(Exception):\n    \"\"\"Base class for exceptions in this\
    \ module.\"\"\"\n    pass\n\nclass InputError(Error):\n    \"\"\"Exception raised\
    \ for errors in the input.\"\"\"\n```"
