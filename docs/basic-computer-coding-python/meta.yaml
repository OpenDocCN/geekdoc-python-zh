    | Sr.No. | Modifier & Description |

    |---|---|

    | 1 | **re.I**<br>Performs case-insensitive matching. |

    | 2 | **re.L**<br>Interprets words according to the current locale. This interpretation
    affects the alphabetic group (\w and \W), as well as word boundary behavior(\b
    and \B). |

    | 3 | **re.M**<br>Makes $ match the end of a line (not just the end of the string)
    and makes ^ match the start of any line (not just the start of the string). |

    | 4 | **re.S**<br>Makes a period (dot) match any character, including a newline.
    |

    | 5 | **re.U**<br>Interprets letters according to the Unicode character set. This
    flag affects the behavior of \w, \W, \b, \B. |

    | 6 | **re.X**<br>Permits “cuter” regular expression syntax. It ignores whitespace
    (except inside a set [] or when escaped by a backslash) and treats unescaped #
    as a comment marker. |


    # 6.2.1 Regular Expression Patterns


    Except for control characters, (+ ? . * ^ $ ( ) [ ] { } | \), all characters match
    themselves. You can escape a control character by preceding it with a backslash.

    Following table lists the regular expression syntax that is available in Python
    –


