    # 3.3 FILES


    Files are traditionally a part of data structures. And although big data is commonplace
    in the data science industry, a programming language without the capability to
    store and retrieve previously stored information would hardly be useful. You still
    have to make use of the all the data sitting in files across databases and you
    will learn how to do this.

    The syntax to read and write files in Python is similar to other **programming
    languages** but a lot easier to handle. Here are some of the basic functions that
    will :help you to work with files using Python'
  - '[PAGE 101]


    Programming language is a formal language, which comprises a set of instructions
    used to produce various kinds of output.


    +   - open() to open files in your system, the filename is the name of the file
    to be opened;

    - read() to read entire files;

    - readline() to read one line at a time;

    - write() to write a string to a file, and return the number of characters written;
    And

    - close() to close the file.


    ```

    # File modes (2nd argument): ''r''(read), ''w''(write), ''a''(appending), ''r+''(both
    reading and writing)

    f = open(''file_name'', ''w'')


    # Reads entire file

    f.read()

    # Reads one line at a time

    f.readline()

    # Writes the string to the file, returning the number of char written

    f.write(''Add this line.'')

    f.close()

    ```


    The second argument in the open() function is the file mode. It allows you to
    specify whether you want to read (r), write (w), append (a) or both read and write
    (r+).


    # 3.3.1 The open function


    The open function takes two arguments. The first is the name of the file, and
    the second is the **mode**. Mode ''w'' means that we are opening the file for
    writing. Mode ''r'' means reading, and mode ''a'' means appending.


    Let''s begin with an example that shows these three modes in operation:'
  - '[PAGE 102]


    ```

    >>> myfile = open(''test.txt'', ''w'')

    >>> myfile.write(''My first file written from Python\n'')

    34

    >>> myfile.write(''-----------------------------------\n'')

    34

    >>> myfile.write(''Hello, world!'')

    13

    >>> myfile.close()

    >>> myfile = open(''test.txt'', ''r'')

    >>> contents = myfile.read()

    >>> myfile.close()

    >>> print(contents)

    My first file written from Python

    -----------------------------------

    Hello, world!

    ```


    Opening a file creates what we call a file descriptor. In this example, the variable
    myfile refers to the new descriptor object. Our program calls methods on the descriptor,
    and this makes changes to the actual file which is located in non-volatile storage.


    The first line opens the test.txt for writing. If there is no file named test.txt
    on the disk, it will be created. If there already is one, it will be replaced
    by the file we are writing and any previous data in it will be lost.


    To put data in the file we invoke the write method on the file descriptor. We
    do this three times in the example above, but in bigger programs, the three separate
    calls to write will usually be replaced by a loop that writes many more lines
    into the file. The write method returns the number of bytes (characters) written
    to the file.


    Closing the file handle tells the system that we are done writing and makes the
    disk file available for reading by other programs (or by our own program).


    We finish this example by openning test.txt for reading. We then call the read
    method, assigning the contents of the file, which is a string, to a variable named
    contents, and finally print contents to see that it is indeed what we wrote to
    the file previously.


    If we want to add to an already existing file, use the *append* mode.


    > Many common files you may use, such as Word documents or Excel spreadsheets
    are NOT text documents. They have their own complicated file formats. Text files
    are ones you can create in simple text editors, by simply typing regular keys
    without any special features, such as bolding text, different fonts, etc.'
- md: "## 3.3.2 Opening a File that Doesn’t Exist\n\nIf we try to open a file that\
    \ doesn’t exist, we get an error:\n\n```\n>>> f = open('wharrah.txt', 'r')\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nIOError:\
    \ [Errno 2] No such file or directory: 'wharrah.txt'\n>>>\n```\n\nThere is nothing\
    \ wrong with the syntax of the line that resulted in the error. The error occurred\
    \ because the file did not exist. **Errors** like these are called **exceptions**.\
    \ Most modern programming languages provide support for dealing with situations\
    \ like this. The process is called exception handling.\n\nIn Python, exceptions\
    \ are handled with the try ... except statement.\n\n```\ntry:\n    f = open('thefile.txt',\
    \ 'r')\n    mydata = f.read()\n    f.close()\nexcept IOError:\n    mydata = ''\n\
    ```\n\nIn this example we *try* to open the data file for reading. If it succeeds,\
    \ we use the read() method to read the file contents as a string into the variable\
    \ mydata and close the file. If an IOError exception occurs, we still create mydata\
    \ as an empty string and continue on with the program.\n\n## 3.3.3 Reading Data\
    \ from Files\n\nPython file descriptors have three methods for reading in data\
    \ from a file. We’ve already seen the read() method, which returns the entire\
    \ contents of the file as a single string. For really big files this may not be\
    \ what you want.\n\nThe readline() method returns one line of the file at a time.\
    \ Each time you call it readline() returns the next line. Calls made to readline()\
    \ after reaching the end of the file return an empty string (‘’).\n\n```\nf =\
    \ open('test.txt', 'r')\nwhile True:\n    theline = f.readline()\n    if len(theline)\
    \ == 0:\n        break\n\n    # Now process the line we've just read\n    print(theline,\
    \ end='')\n\nf.close()\n```\n\nThis is a handy pattern for our toolbox. In bigger\
    \ programs, we'd squeeze more extensive logic into the body of the loop at line\
    \ 8 — for example, if each line of the file contained the name and email address\
    \ of one of our friends, perhaps we'd split the line into some pieces and call\
    \ a function to send the friend a party invitation.\n\nOn line 8 we suppress the\
    \ newline character that print usually appends to our strings. Why? This is because\
    \ the string already has its own newline: the readline method in line 3 returns\
    \ everything up to *and including* the newline character. This also explains the\
    \ end-of-file detection logic: when there are no more lines to be read from the\
    \ file, readline returns an empty string — one that does not even have a newline\
    \ at the end, hence its length is 0.\n\n## Turning a File into a List of Lines\n\
    \nIt is often useful to fetch data from a disk file and turn it into a list of\
    \ lines. Suppose we have a file containing our friends and their email addresses,\
    \ one per line in the file. But we'd like the lines sorted into alphabetical order.\
    \ A good plan is to read everything into a list of lines, then sort the list,\
    \ and then write the sorted list back to another file:\n\n```\nf1 = open('friends.txt',\
    \ 'r')\nfriends_list = f.readlines()\nf1.close()\n\nfriends_list.sort()\n\nf2\
    \ = open('sortedfriends.txt', 'w')\nfor friend in friends_list:\n    f2.write(friend)\n\
    f2.close()\n```\n\nThe readlines method in line 2 reads all the lines and returns\
    \ a list of the strings.\nWe could have used the template from the previous section\
    \ to read each line one-at-a-time, and to build up the list ourselves, but it\
    \ is a lot easier to use the method that the Python implementors gave us!\n\n\
    ## An Example\n\nMany useful line-processing programs will read a text file line-at-a-time\
    \ and do some minor processing as they write the lines to an output file. They\
    \ might number the lines in the output file, or insert extra blank lines after\
    \ every 60 lines to make it convenient for printing on sheets of paper, or extract\
    \ some specific columns only from each line in the source file, or only print\
    \ lines that contain a specific substring. We call this kind of program a **filter**.\n\
    \nHere is a filter that copies one file to another, omitting any lines that begin\
    \ with #:\n\n```\ninfile = open(oldfile, 'r')\noutfile = open(newfile, 'w')\n\
    while True:\n    text = infile.readline()\n    if len(text) == 0:\n        break\n\
    \    if text[0] == '#':\n        continue\n\n    # put any more processing logic\
    \ here\n    outfile.write(text)\n\ninfile.close()\noutfile.close()\n```\n\nThe\
    \ continue statement at line 9 skips over the remaining lines in the current iteration\
    \ of the loop, but the loop will still iterate. This style looks a bit contrived\
    \ here, but it is often useful to say \"*get the lines we're not concerned with\
    \ out of the way early, so that we have cleaner more focussed logic in the meaty\
    \ part of the loop that might be written around line 11.*\"\n\nThus, if text is\
    \ the empty string, the loop exits. If the first character of text is a hash mark,\
    \ the flow of execution goes to the top of the loop, ready to start processing\
    \ the next line. Only if both conditions fail do we fall through to do the processing\
    \ at line 11, in this example, writing the line into the new file.\n\nLet's consider\
    \ one more case: suppose your original file contained empty lines. At line 6 above,\
    \ would this program find the first empty line in the file, and terminate immediately?\
    \ No! Recall that readline always includes the newline character in the string\
    \ it returns. It is only when we try to read *beyond* the end of the file that\
    \ we get back the empty string of length 0.\n\n## CASE STUDY\n\n## A SET PARTITIONING\
    \ PROBLEM\n\nA set partitioning problem determines how the items in one set (S)\
    \ can be partitioned into smaller subsets. All items in S must be contained in\
    \ one and only one partition. Related problems are:\n\n- set packing - all items\
    \ must be contained in zero or one partitions;\n- set covering - all items must\
    \ be contained in at least one partition.\n\nIn this case study a wedding planner\
    \ must determine guest seating allocations for a wedding. To model this problem\
    \ the tables are modelled as the partitions and the guests invited to the wedding\
    \ are modelled as the elements of S. The wedding planner wishes to maximize the\
    \ total happiness of all of the tables.\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_106_0.png)\n\
    \nA set partitioning problem may be modelled by explicitly enumerating each possible\
    \ subset. Though this approach does become intractable for large numbers of items\
    \ (without using column generation) it does have the advantage that the objective\
    \ function co-efficients for the partitions can be non-linear expressions (like\
    \ happiness) and still allow this problem to be solved using Linear Programming.\n\
    \nFirst we use **allcombinations()** to generate a list of all possible table\
    \ seatings.\n\n```\n#create list of all possible tables\npossible_tables = [tuple(c)\
    \ for c in pulp.allcombinations(guests,\n                                    \
    \    max_table_size)]\n```\n\nThen we create a binary variable that will be 1\
    \ if the table will be in the solution, or zero otherwise.\n\n## Basic Computer\
    \ Coding: Python\n\n```\n#create a binary variable to state that a table setting\
    \ is used\nx = pulp.LpVariable.dicts('table', possible_tables,\n             \
    \           lowBound = 0,\n                        upBound = 1,\n            \
    \            cat = pulp.LpInteger)\n```\n\nWe create the **LpProblem** and then\
    \ make the objective function. Note that happiness function used in this script\
    \ would be difficult to model in any other way.\n\n```\nseating_model = pulp.LpProblem(\"\
    Wedding Seating Model\", pulp.LpMinimize)\nseating_model += sum([happiness(table)\
    \ * x[table] for table in possible_tables])\n```\n\nWe specify the total number\
    \ of tables allowed in the solution.\n\n```\n#specify the maximum number of tables\n\
    seating_model += sum([x[table] for table in possible_tables]) <= max_tables, \"\
    Max_tables\"\n```\n\nThis set of constraints defines the set partitioning problem\
    \ by guaranteeing that a guest is allocated to exactly one table.\n\n```\n#A guest\
    \ must seated at one and only one table\nfor guest in guests:\n    seating_model\
    \ += sum([x[table] for table in possible_tables\n                          if\
    \ guest in table]) == 1, \"Must_seat_%s\"%guest\n```\n\nThe full file can be found\
    \ here wedding.py\n\n```\n\"\"\"\nA set partitioning model of a wedding seating\
    \ problem\n\nAuthors: Stuart Mitchell 2009\n\"\"\"\n\nimport pulp\n\nmax_tables\
    \ = 5\nmax_table_size = 4\nguests = 'A B C D E F G I J K L M N O P Q R'.split()\n\
    \ndef happiness(table):\n    \"\"\"\n    Find the happiness of the table\n```"
