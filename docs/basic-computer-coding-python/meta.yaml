    \ that places the keys within an iterable view object of the dict_keys class.\
    \ The keys are then printed within a list format.\n\nThis method can be used to\
    \ query across dictionaries. For example, we can take a look at the common keys\
    \ shared between two dictionary **data structures**:\n\n```\nsammy = {'username':\
    \ 'sammy-shark', 'online': True, 'followers': 987}\njesse = {'username': 'JOctopus',\
    \ 'online': False, 'points': 723}\nfor common_key in sammy.keys() & jesse.keys():\n\
    \    print(sammy[common_key], jesse[common_key])\n```\n\nThe dictionary sammy\
    \ and the dictionary jesse are each a user profile dictionary. Their profiles\
    \ have different keys, however, because Sammy has a social profile with associated\
    \ followers, and Jesse has a gaming profile with associated points. The 2 keys\
    \ they have in common are username and online status, which we can find when we\
    \ run this small program:\n\n```\nOutput\nsammy-shark JOctopus\nTrue False\n```\n\
    \nData structure is a data organization, management and storage format that enables\
    \ efficient access and modification.\n\nWe could certainly improve on the program\
    \ to make the output more user-readable, but this illustrates that dict.keys()\
    \ can be used to check across various dictionaries to see what they share in common\
    \ or not. This is especially useful for large dictionaries. Similarly, we can\
    \ use the dict.values() method to query the values in the sammy dictionary, which\
    \ would be constructed as sammy.values(). Let's print those out:\n\n```\nsammy\
    \ = {'username': 'sammy-shark', 'online': True, 'followers': 987}\nprint(sammy.values())\n\
    ```\n\nOutput\ndict_values([True, 'sammy-shark', 987])\n\nBoth the methods keys()\
    \ and values() return unsorted lists of the keys and values present in the sammy\
    \ dictionary with the view objects of dict_keys and dict_values respectively.\n\
    \nIf we are interested in all of the items in a dictionary, we can access them\
    \ with the items() method:\n\n```\nprint(sammy.items())\n```\n\nOutput\ndict_items([('online',\
    \ True), ('username', 'sammy-shark'), ('followers', 987)])\n\nThe returned format\
    \ of this is a list made up of (key, value) tuple pairs with the dict_items view\
    \ object.\n\nWe can iterate over the returned list format with a for loop. For\
