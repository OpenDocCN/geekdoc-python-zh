    # Education and Life


    Van Rossum was born and raised in the Netherlands, where he received a master’s
    degree in mathematics and computer science from the University of Amsterdam in
    1982. He has a brother, Just van Rossum, who is a type designer and programmer
    who designed the typeface used in the “Python Powered” logo.


    Guido lives in Belmont, California, with his wife, Kim Knapp, and their son. According
    to his home page and Dutch naming conventions, the “van” in his name is capitalized
    when he is referred to by surname alone, but not when using his first and last
    name together.


    # Work


    While working at the Centrum Wiskunde & Informatica (CWI), Van Rossum wrote and
    contributed a glob()routine to BSD Unix in 1986 and helped develop the ABC programming
    language. He once stated, “I try to mention ABC’s influence because I’m indebted
    to everything I learned during that project and to the people who worked on it.”
    He also created Grail, an early web browser written in Python, and engaged in
    discussions about the HTML standard.


    He has worked for various research institutes, including the Centrum Wiskunde
    & Informatica (CWI) in the Netherlands, the U.S. National Institute of Standards
    and Technology (NIST), and the Corporation for National Research Initiatives (CNRI).
    From 2000 until 2003 he worked for Zope corporation. In 2003 van Rossum left Zope
    for Elemental Security. While there he worked on a custom programming language
    for the organization. From 2005 to December 2012, he worked at'
