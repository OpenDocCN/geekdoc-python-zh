    \ not to support it, if they don't see a use for importing * from their package.\
    \ For example, the file `sound/effects/__init__.py` could contain the following\
    \ code:\n\n```\n__all__ = [\"echo\", \"surround\", \"reverse\"]\n```\n\nThis would\
    \ mean that `from sound.effects import *` would import the three named submodules\
