  mdcn: "## 元组\n- 列表\n- 字典\n- 类\n- 类实例\n- 模块\n\n请注意，函数本质上是实现了调用方法的值。因此，类及其实例可以将名称与任意值关联起来，即表现得像字典。\n\
    \n## 继承\n\n然而，类和实例与字典略有不同，因为实例继承自类，而类可以继承自其他类。这种继承机制使得对类的更改会立即在其后代和实例中可见，如下例所示：\n\
    \n```\nclass p:\n    x = 3\n\nclass c(p):\n    y = \"hello\"\n\ni = c()\ni.y \
    \   (prints \"hello\")\ni.x    (prints 3)\np.x = 4\nc.x    (prints 4)\ni.x   \
    \ (prints 4)\n```\n\n因此，类和实例与字典的不同之处在于，如果一次读取无法解析，请求会被传递给父类。由于类可以在运行时更改，这使得继承过程高度动态。这是一种被称为“责任链”的常见模式。上述示例的对象图如下所示：\n\
    \n![](img/192fecf3b33c4ee7d07f7123b285647a_212_0.png)\n\n请注意，如果 Python 没有提供继承机制，我们可以通过提供一个\
    \ `__getattr__` 方法来实现转发，从而重新创建它。父类将被显式存储在一个变量中。这会产生一个有趣的副作用：继承链接可以通过修改这个变量在运行时进行更改。责任链模式完全支持此类更改。\n\
    \n写入时会发生什么？如果请求像读取一样沿着责任链向上转发，那么将无法覆盖父类中的槽位。在上面的例子中，`c.x = 5` 将等同于 `p.x = 5`。（如果变量最终未绑定，那么被写入的对象将获得一个新的槽位。）如果请求不被转发，那么被写入的对象将总是获得一个新的槽位，从而遮蔽祖先槽位。Python\
    \ 选择了后者，以便子类可以覆盖父类方法。因此我们得到：\n\n```\nc.x = 5\np.x     (prints 4)\ni.x     (prints\
    \ 5)\n\ni.x = i.x\nc.x = 6\ni.x     (prints 5)\n```\n\n请注意，在这种设计选择下，`i.x = i.x`\
    \ 执行了有用的工作。\n\nPython 需要区分实例和类吗？两者本质上都是字典，并具有相同的读/写和继承机制。也许这是出于效率原因：通常类的数量远少于实例，因此可以对类应用某些优化，但对实例则不行。\n\
    \n## 变量作用域\n\nPython 的变量环境，也称为“栈帧”，具有许多对象的特性。它们是具有相同继承语义的名称字典。也就是说，函数中使用的变量默认引用全局名称，但如果在函数中对变量进行了赋值，它就变成了局部变量。同样的规则也适用于类定义。\n\
    \n也可以想象使用责任链来设计变量作用域。事实上，一些语言就是这样做的，甚至包括那些没有相应继承概念的语言。《计算机程序的构造和解释》一书用它来描述 Scheme\
    \ 的变量作用域方法。Self 语言实际上将环境视为对象，并使用继承来实现词法作用域！\n\n然而，Python 并没有采用这种方法，可能是出于效率原因。如关于嵌套作用域的\
    \ PLE 练习中所述，Python 不允许同时存在两个以上的环境（全局和局部）。这允许某些优化，例如 LOAD_FAST 字节码，但可能会让习惯于词法作用域的程序员感到困惑。以下\
    \ C++ 代码片段在 Python 中没有等价物：\n\n```\nint x = 1;\nif(x > y) {\n    int x = 2;\n \
    \   cout << x;    // prints 2\n}\ncout << x;    // prints 1\n```\n\nScheme 程序员可能会想：那么\
    \ Python 如何实现 lambda 呢？解决方法是放弃 lambda 的词法作用域。lambda 的主体只有全局和局部环境。\n\n## 总结\n\n\
    - 正则表达式（称为 RE、regex 或 regex 模式）本质上是一种嵌入在 Python 中并通过 `re` 模块提供的小型、高度专业化的编程语言。\n\
    - 正则表达式模式被编译成一系列字节码，然后由用 C 编写的匹配引擎执行。对于高级使用，可能需要仔细关注引擎将如何执行给定的 RE，并以某种方式编写 RE，以生成运行更快的字节码。\n\
    - 正则表达式语言相对较小且受限，因此并非所有可能的字符串处理任务都可以使用正则表达式完成。有些任务虽然可以用正则表达式完成，但表达式会变得非常复杂。\n\
    - Python 是一种高级开源脚本语言。Python 内置的“re”模块为正则表达式提供了出色的支持，具有现代且完整的正则表达式风格。\n- Python\
    \ 提供了两种基于正则表达式的原始操作：`match` 仅检查字符串开头的匹配，而 `search` 检查字符串中任何位置的匹配（这是 Perl 默认执行的操作）。\n\
    - 除了控制字符（`+ ? . * ^ $ ( ) [ ] { } | \\`）外，所有字符都匹配自身。可以通过在控制字符前加上反斜杠来转义它。\n\n##\
    \ 知识检查\n\n1. 在默认模式下，点号（即 '.'）匹配除 .................... 之外的任何字符。\n   - a. 脱字符\n\
    \   - b. 和号\n   - c. 百分号\n   - d. 换行符\n\n2. 表达式 `a{5}` 将匹配前一个正则表达式的 ....................\
    \ 个字符。\n   - a. 5 个或更少\n   - b. 恰好 5 个\n   - c. 5 个或更多\n   - d. 恰好 4 个\n\n3. 选择输出可能为：`<_sre.SRE_Match\
    \ object; span=(4, 8), match='aaaa'>` 的函数。\n   - a. `>>> re.search('aaaa', \"\
    alohaaaa\", 0)`\n   - b. `>>> re.match('aaaa', \"alohaaaa\", 0)`\n   - c. `>>>\
    \ re.match('aaa', \"alohaaa\", 0)`\n   - d. `>>> re.search('aaa', \"alohaaa\"\
    , 0)`\n\n4. 以下哪个函数会清除正则表达式缓存？\n   - a. re.sub()\n   - b. re.pos()\n   - c. re.purge()\n\
    \   - d. re.subn()\n\n5. 以下哪个函数会导致不区分大小写的匹配？\n   - a. re.A\n   - b. re.U\n   -\
    \ c. re.I\n   - d. re.X\n\n6. 以下哪个会创建一个模式对象？\n   - a. re.create(str)\n   - b.\
    \ re.regex(str)\n   - c. re.compile(str)\n   - d. re.assemble(str)\n\n7. **函数\
    \ re.match 的作用是什么？**\n   - a. 在字符串开头匹配模式\n   - b. 在字符串的任何位置匹配模式\n   - c. 不存在这样的函数\n\
    \   - d. 以上都不是\n\n8. **函数 re.search 的作用是什么？**\n   - a. 在字符串开头匹配模式\n   - b. 在字符串的任何位置匹配模式\n\
    \   - c. 不存在这样的函数\n   - d. 以上都不是\n\n## 复习题\n\n1. 什么是 match 函数？\n2. 什么是 search\
    \ 函数？\n3. 讨论搜索和替换。\n4. 讨论正则表达式修饰符：选项标志。\n5. 描述正则表达式模式。\n\n## 检查你的结果\n\n1. (d)\
    \       2. (b)       3. (a)       4. (c)       5. (d)\n6. (c)       7. (a)   \
    \    8. (b)\n\n## 参考文献\n\n1. A.M. Kuchling (2001-12-21). “PEP 255: Simple Generators”.\
    \ What’s New in Python 2.2. Python Foundation. Retrieved 2008-09-05.\n2. Barry\
    \ Warsaw (2011-11-09). “PEP 404 -- Python 2.8 Un-release Schedule”. Retrieved\
    \ 2012-10-07.\n3. Guido van Rossum (January 20, 2009). “The History of Python”.\
    \ Retrieved March 3, 2018.\n4. Neal Norwitz; Barry Warsaw (2006-06-29). “PEP 361\
    \ -- Python 2.6 and 3.0 Release Schedule”. Retrieved 2012-10-07.\n5. Rossum, Guido\
    \ van van. “Python 3000 FAQ”. artima. com. Retrieved December 27, 2016.\n\n# 第\
    \ 7 章\n## PYTHON 多线程\n\n> \"构建 Web 应用程序的主要语言——无论是 Perl、Python、PHP 还是其他语言——都是开源语言。因此，Web\
    \ 的基础设施是开源的，我们所知的 Web 完全依赖于开源。\"\n> — Mitch Kapor\n\n### 学习目标\n\n学习本章后，你将能够：\n\
