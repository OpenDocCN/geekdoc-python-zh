    \ the else part is ignored.\n\nHence, a for loop’s else part runs if no break\
    \ occurs.\nHere is an example to illustrate this.\n\n```\ndigits = [0, 1, 5]\n\
    \nfor i in digits:\n    print(i)\nelse:\n    print(“No items left.”)\n```\n\n\
