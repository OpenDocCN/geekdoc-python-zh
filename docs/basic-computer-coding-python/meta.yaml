    echofilter(input, output, delay=0.7, atten=4)\n```\n\n请注意，当使用 `from package import\
    \ item` 时，`item` 可以是包的子模块（或子包），也可以是包中定义的其他名称，如函数、类或变量。导入语句首先测试 `item` 是否在包中定义；如果没有，它假定它是一个模块并尝试加载它。如果找不到它，将引发\
    \ `ImportError` 异常。\n\n相反，当使用 `import item.subitem.subsubitem` 这样的语法时，除最后一个之外的每个\
    \ `item` 必须是一个包；最后一个 `item` 可以是一个模块或一个包，但不能是前一个 `item` 中定义的类、函数或变量。\n\n### 2.3.1\
    \ 从包中导入*\n\n那么当用户编写 `from sound.effects import *` 时会发生什么？理想情况下，人们希望这能以某种方式访问文件系统，找到包中存在的所有子模块，并将它们全部导入。这可能需要很长时间，并且导入子模块可能会产生不必要的副作用，这些副作用应该只在显式导入子模块时发生。\n\
    \n唯一的解决方案是包作者提供一个显式的包索引。导入语句使用以下约定：如果一个包的 `__init__.py` 代码定义了一个名为 `__all__` 的列表，则它被视为当遇到\
    \ `from package import *` 时应导入的模块名列表。包作者有责任在发布包的新版本时保持此列表是最新的。如果包作者认为从他们的包中导入\
    \ * 没有用处，他们也可以决定不支持它。例如，文件 `sound/effects/__init__.py` 可能包含以下代码：\n\n```\n__all__\
    \ = [\"echo\", \"surround\", \"reverse\"]\n```\n\n这意味着 `from sound.effects import\
    \ *` 将导入 sound 包的三个命名子模块。\n\n如果未定义 `__all__`，则语句 `from sound.effects import *`\
    \ *不会*将 `sound.effects` 包中的所有子模块导入当前命名空间；它只确保 `sound.effects` 包已被导入（可能运行 `__init__.py`\
    \ 中的任何初始化代码），然后导入包中定义的任何名称。这包括 `__init__.py` 定义的任何名称（以及显式加载的子模块）。它还包括先前导入语句显式加载的包的任何子模块。考虑以下代码：\n\
    \n```\nimport sound.effects.echo\nimport sound.effects.surround\nfrom sound.effects\
    \ import *\n```\n\n在此示例中，`echo` 和 `surround` 模块被导入到当前命名空间中，因为当执行 `from... import`\
    \ 语句时，它们在 `sound.effects` 包中被定义。（当定义了 `__all__` 时，这也适用。）\n\n尽管某些模块被设计为仅在使用 `import\
    \ *` 时导出遵循特定模式的名称，但在生产代码中这仍然被认为是不良实践。\n\n请记住，使用 `from Package import specific_submodule`\
    \ 没有任何问题！事实上，这是推荐的表示法，除非导入模块需要使用来自不同包的同名子模块。\n\n### 2.3.2 包内引用\n\n子模块经常需要相互引用。例如，`surround`\
    \ 模块可能使用 `echo` 模块。事实上，这种引用非常常见，以至于导入语句首先在包含包中查找，然后才在标准模块搜索路径中查找。因此，`surround`\
    \ 模块可以简单地使用 `import echo` 或 `from echo import echofilter`。如果在当前包（当前模块是其子模块的包）中找不到导入的模块，导入语句将查找具有给定名称的顶级模块。\n\
    \n当包被组织成子包（如示例中的 sound 包）时，你可以使用绝对引用来引用兄弟包的子模块。例如，如果模块 `sound.filters.vocoder`\
    \ 需要使用 `sound.effects` 包中的 `echo` 模块，它可以使用 `from sound.effects import echo`。\n\
    \n从 Python 2.5 开始，除了上述隐式相对导入之外，你还可以使用 `from module import name` 形式的导入语句编写显式相对导入。这些显式相对导入使用前导点来指示相对导入中涉及的当前包和父包。例如，从\
    \ `surround` 模块，你可能会使用：\n\n```\nfrom . import echo\nfrom .. import formats\nfrom\
    \ ..filters import equalizer\n```"
