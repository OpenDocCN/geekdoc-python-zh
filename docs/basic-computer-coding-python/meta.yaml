  md: '# 7.2.2 Thread Objects


    The Thread class that we mentioned earlier in this blog denotes an activity running
    in a separate thread of control. We can represent this activity either by passing
    a callable object to the constructor, ot by overriding the method run() in a subclass.
    You must make sure to not override other methods in a subclass, except for the
    constructor. In short, only override a .class’ __init__() and run() methods


    Once the interpreter creates a thread object, we must start its activity by calling
    its start() method. This will invoke its run() method in a separate thread of
    control. Once this happens, we consider the thread to be ‘alive’. When run() terminates
    normally or raising an exception we did not handle, it is no longer alive. To
    test whether a thread is alive, we may use the method is_alive().


    A thread may call another’s join() method. This will block the calling thread
    until the other terminates.


    Threads have names, and we can pass these names to the constructor, and even read
    or modify them.


    We can flag a thread as a ‘daemon thread’. This means that the whole program exits
    when only the daemon threads remain. This initial value comes from the creating
    thread. We can set this flag via the property ‘daemon’, or via the **constructor**
    argument ‘daemon’. Daemons abruptly stop at shutdown, and they may not properly
    release all the resources held. These resources may include open files, database
    transactions, and others. To stop our threads gracefully, we must make them non-daemonic.
    It is also preferable to use a suitable signaling process, like an Event.


    The ‘main thread’ object pertains to the initial thread of control in our program;
    it is not a daemon.


    Finally, it is possible that the interpreter creates ‘dummy thread objects’. These
    are ‘alien threads’ (threads of control started outside ‘threading’, for ex, directly
    from C code). Such objects have limited functionality, and are always live and
    daemonic. We cannot join() them. We can also never delete them since it is impossible
    to detect when they terminate.


    > **Constructor** is a block of codes similar to the method. It is called when
    an instance of the class is created.'
