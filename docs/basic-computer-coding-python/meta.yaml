    # Reads one line at a time

    f.readline()

    # Writes the string to the file, returning the number of char written

    f.write(''Add this line.'')

    f.close()

    ```


    The second argument in the open() function is the file mode. It allows you to
    specify whether you want to read (r), write (w), append (a) or both read and write
    (r+).


    # 3.3.1 The open function


    The open function takes two arguments. The first is the name of the file, and
    the second is the **mode**. Mode ''w'' means that we are opening the file for
    writing. Mode ''r'' means reading, and mode ''a'' means appending.


    Let''s begin with an example that shows these three modes in operation:'
