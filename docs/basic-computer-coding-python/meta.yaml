  md: "# 4.2.6 Skipping tests and expected failures\n\nUnittest supports skipping\
    \ individual test methods and even whole classes of tests. In addition, it supports\
    \ marking a test as an “expected failure,” a test that is broken and will fail,\
    \ but shouldn’t be counted as a failure on a TestResult.\nSkipping a test is simply\
    \ a matter of using the skip() decorator or one of its conditional variants.\n\
    Basic skipping looks like this:\n\n```\nclass MyTestCase(unittest.TestCase):\n\
    \    @unittest.skip(\"demonstrating skipping\")\n    def test_nothing(self):\n\
    \        self.fail(\"shouldn't happen\")\n    @unittest.skipIf(mylib.__version__\
    \ < (1, 3),\n                     \"not supported in this library version\")\n\
    \    def test_format(self):\n        # Tests that work for only a certain version\
    \ of the library.\n        pass\n    @unittest.skipUnless(sys.platform.startswith(\"\
    win\"),\n                         \"requires Windows\")\n    def test_windows_support(self):\n\
    \        # windows specific testing code\n        pass\n```\n\nThis is the output\
    \ of running the example in verbose mode:\n\n```\ntest_format (__main__.MyTestCase)\
    \ ... skipped 'not supported in this library version'\ntest_nothing (__main__.MyTestCase)\
    \ ... skipped 'demonstrating skipping'\ntest_windows_support (__main__.MyTestCase)\
    \ ... skipped 'requires Windows'\n----------------------------------------------------------------------\n\
    Ran 3 tests in 0.005s\n\nOK (skipped=3)\n```\n\nClasses can be skipped just like\
    \ methods:\n\n```\n@unittest.skip(\"showing class skipping\")\n```\n\n> The computer\
    \ algebra system AXIOM (1973) has a similar construct that processes streams,\
    \ but the first use of the term “comprehension” for such constructs was in Rod\
    \ Burstall and John Darlington’s description of their functional programming language\
    \ NPL from 1977."
