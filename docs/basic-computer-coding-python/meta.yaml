  - '[PAGE 248]


    It is the prediction of conditions that occur while executing a program to specify
    actions. Multiple expressions get evaluated with an outcome of either TRUE or
    FALSE. These are logical decisions, and Python also provides decision-making statements
    that to make decisions within a program for an application based on the user requirement.


    There comes a point in your life where you need to decide what steps should be
    taken and based on that you decide your next decisions.


    In programming, we often have this similar situation where we need to decide which
    block of code should be executed based on a condition.


    Let''s take a simple example.

    Suppose you are writing a program for a game. So at every step, we need to take
    decisions like:


    +   - If the user presses ‘w’ key, then the character will move forward.

    - If the user presses ‘spacebar’, then the character will jump.

    - If the character runs into an obstacle, then the game is over otherwise we continue
    playing.


    Decisions like these are required everywhere in programming and they decide the
    direction of flow of program execution.


    Python has the following decision-making statements:


    +   - if statements

    - if-else statements

    - if-elif ladder

    - Nested statements


    Let''s discuss these decision making statements in Python in detail.


    # 8.1.1 Python if Statement


    if statement is the most simple form of **decision-making statement**. It takes
    an expression and checks if the expression evaluates to True then the block of
    code in if statement will be executed.


    > **Keyword**

    Decision making statements allow you to decide the order of execution of specific
    statements in your program. You can set up a condition and tell the compiler to
    take a particular action if the condition is met.'
