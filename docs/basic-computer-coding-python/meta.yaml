    ```\n\n在这个例子中，我们*尝试*打开数据文件进行读取。如果成功，我们使用 read() 方法将文件内容作为字符串读入变量 mydata，并关闭文件。如果发生\
    \ IOError 异常，我们仍然将 mydata 创建为空字符串，然后继续执行程序。\n\n## 3.3.3 从文件中读取数据\n\nPython 文件描述符有三种从文件读取数据的方法。我们已经见过\
    \ read() 方法，它将整个文件内容作为单个字符串返回。对于非常大的文件，这可能不是你想要的。\n\nreadline() 方法一次返回文件中的一行。每次调用它，readline()\
    \ 都会返回下一行。当到达文件末尾后调用 readline() 会返回一个空字符串（''）。\n\n```\nf = open('test.txt', 'r')\n\
    while True:\n    theline = f.readline()\n    if len(theline) == 0:\n        break\n\
    \n    # 现在处理我们刚刚读取的行\n    print(theline, end='')\n\nf.close()\n```\n\n这是我们工具箱中一个方便的模式。在更大的程序中，我们会在第\
    \ 8 行的循环体中加入更广泛的逻辑——例如，如果文件的每一行都包含我们一位朋友的姓名和电子邮件地址，也许我们会将该行拆分成几部分，并调用一个函数来给这位朋友发送聚会邀请。\n\
    \n在第 8 行，我们抑制了 print 通常会附加到字符串末尾的换行符。为什么？这是因为字符串本身已经包含换行符：第 3 行的 readline 方法返回的内容直到*并包括*换行符。这也解释了文件末尾检测逻辑：当文件中没有更多行可读时，readline\
    \ 返回一个空字符串——这个字符串末尾甚至没有换行符，因此其长度为 0。\n\n## 将文件转换为行列表\n\n从磁盘文件获取数据并将其转换为行列表通常很有用。假设我们有一个包含朋友及其电子邮件地址的文件，文件中每行一个。但我们希望这些行按字母顺序排序。一个好的计划是将所有内容读入一个行列表，然后对该列表进行排序，最后将排序后的列表写回另一个文件：\n\
    \n```\nf1 = open('friends.txt', 'r')\nfriends_list = f.readlines()\nf1.close()\n\
    \nfriends_list.sort()\n\nf2 = open('sortedfriends.txt', 'w')\nfor friend in friends_list:\n\
    \    f2.write(friend)\nf2.close()\n```\n\n第 2 行的 readlines 方法读取所有行并返回一个字符串列表。\n\
    我们本可以使用上一节的模板逐行读取，并自己构建列表，但使用 Python 实现者为我们提供的方法要容易得多！\n\n## 一个例子\n\n许多有用的行处理程序会逐行读取文本文件，并在将行写入输出文件时进行一些小的处理。它们可能会在输出文件中为行编号，或者在每\
    \ 60 行后插入额外的空行以便于在纸张上打印，或者仅从源文件的每行中提取某些特定列，或者仅打印包含特定子字符串的行。我们称这类程序为**过滤器**。\n\n\
    这是一个将文件复制到另一个文件的过滤器，它省略了任何以 # 开头的行：\n\n```\ninfile = open(oldfile, 'r')\noutfile\
    \ = open(newfile, 'w')\nwhile True:\n    text = infile.readline()\n    if len(text)\
    \ == 0:\n        break\n    if text[0] == '#':\n        continue\n\n    # 在这里放置任何更多的处理逻辑\n\
    \    outfile.write(text)\n\ninfile.close()\noutfile.close()\n```\n\n第 9 行的 continue\
    \ 语句跳过当前循环迭代中剩余的行，但循环仍将继续迭代。这种风格在这里看起来有点刻意，但通常很有用，可以“*尽早将我们不关心的行排除在外，这样我们就能在循环的核心部分（可能在第\
    \ 11 行左右编写）拥有更清晰、更集中的逻辑*”。\n\n因此，如果 text 是空字符串，循环退出。如果 text 的第一个字符是井号，执行流程将跳转到循环顶部，准备开始处理下一行。只有当两个条件都不满足时，我们才会执行第\
    \ 11 行的处理，在本例中，就是将该行写入新文件。\n\n让我们再考虑一种情况：假设你的原始文件包含空行。在上面的第 6 行，这个程序会找到文件中的第一个空行并立即终止吗？不会！回想一下，readline\
    \ 总是将其返回的字符串中包含换行符。只有当我们尝试读取*超出*文件末尾时，才会得到长度为 0 的空字符串。\n\n## 案例研究\n\n## 一个集合划分问题\n\
    \n集合划分问题确定一个集合（S）中的项目如何被划分为更小的子集。S 中的所有项目必须包含在一个且仅一个划分中。相关问题有：\n\n- 集合打包 - 所有项目必须包含在零个或一个划分中；\n\
    - 集合覆盖 - 所有项目必须包含在至少一个划分中。\n\n在这个案例研究中，婚礼策划师必须确定婚礼的宾客座位分配。为了建模这个问题，桌子被建模为划分，而被邀请参加婚礼的宾客被建模为\
    \ S 的元素。婚礼策划师希望最大化所有桌子的总幸福感。\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_106_0.png)\n\
    \n集合划分问题可以通过显式枚举每个可能的子集来建模。尽管这种方法在项目数量很多时（不使用列生成）确实会变得难以处理，但它确实有一个优点，即划分的目标函数系数可以是非线性表达式（如幸福感），并且仍然允许使用线性规划来解决此问题。\n\
    \n首先，我们使用 **allcombinations()** 生成所有可能的桌子座位安排列表。\n\n```\n#create list of all possible\
    \ tables\npossible_tables = [tuple(c) for c in pulp.allcombinations(guests,\n\
    \                                        max_table_size)]\n```\n\n然后我们创建一个二进制变量，如果桌子在解决方案中，则该变量为\
    \ 1，否则为 0。\n\n## 基础计算机编程：Python\n\n```\n#create a binary variable to state that\
    \ a table setting is used\nx = pulp.LpVariable.dicts('table', possible_tables,\n\
    \                        lowBound = 0,\n                        upBound = 1,\n\
    \                        cat = pulp.LpInteger)\n```\n\n我们创建 **LpProblem**，然后构建目标函数。请注意，此脚本中使用的幸福感函数很难用其他任何方式建模。\n\
    \n```\nseating_model = pulp.LpProblem(\"Wedding Seating Model\", pulp.LpMinimize)\n\
    seating_model += sum([happiness(table) * x[table] for table in possible_tables])\n\
    ```\n\n我们指定解决方案中允许的桌子总数。\n\n```\n#specify the maximum number of tables\nseating_model\
    \ += sum([x[table] for table in possible_tables]) <= max_tables, \"Max_tables\"\
    \n```\n\n这组约束通过保证每位宾客被分配到恰好一张桌子来定义集合划分问题。\n\n```\n#A guest must seated at one\
    \ and only one table\nfor guest in guests:\n    seating_model += sum([x[table]\
    \ for table in possible_tables\n                          if guest in table])\
    \ == 1, \"Must_seat_%s\"%guest\n```\n\n完整文件可在此处找到 wedding.py\n\n```\n\"\"\"\n\
    A set partitioning model of a wedding seating problem\n\nAuthors: Stuart Mitchell\
    \ 2009\n\"\"\"\n\nimport pulp\n\nmax_tables = 5\nmax_table_size = 4\nguests =\
    \ 'A B C D E F G I J K L M N O P Q R'.split()\n\ndef happiness(table):\n    \"\
    \"\"\n    Find the happiness of the table\n```"
