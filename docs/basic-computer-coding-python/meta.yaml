    \ you become an expert in using Python's object-oriented programming support.\n\
    \nIf you do not have any previous experience with object-oriented (OO) programming,\
    \ you may want to consult an introductory course on it or at least a tutorial\
    \ of some sort so that you have a grasp of the basic concepts.\n\nHowever, here\
    \ is small introduction of Object-Oriented Programming (OOP) to bring you at speed\
    \ –\n\n- **Class** – A user-defined prototype for an object that defines a set\
    \ of attributes that characterize any object of the class. The attributes are\
    \ data members (class variables and instance variables) and methods, accessed\
    \ via dot notation.\n- **Class variable** – A variable that is shared by all instances\
    \ of a class. Class variables are defined within a class but outside any of the\
    \ class's methods. Class variables are not used as frequently as instance variables\
    \ are.\n- **Data member** – A class variable or instance variable that holds data\
    \ associated with a class and its objects.\n- **Function overloading** – The assignment\
    \ of more than one behavior to a particular function. The operation performed\
    \ varies by the types of objects or arguments involved.\n- **Instance variable**\
    \ – A variable that is defined inside a method and belongs only to the current\
    \ instance of a class.\n- **Inheritance** – The transfer of the characteristics\
    \ of a class to other classes that are derived from it.\n- **Instance** – An individual\
    \ object of a certain class. An object obj that belongs to a class Circle, for\
    \ example, is an instance of the class Circle.\n- **Instantiation** – The creation\
    \ of an instance of a class.\n- **Method** – A special kind of function that is\
    \ defined in a class definition.\n- **Object** – A unique instance of a data structure\
    \ that's defined by its class. An object comprises both data members (class variables\
    \ and instance variables) and methods.\n- **Operator overloading** – The assignment\
    \ of more than one function to a particular operator.\n\nIn Python, object-oriented\
    \ Programming (OOPs) is a programming paradigm that uses objects and classes in\
    \ programming. It aims to implement real-world entities like"
