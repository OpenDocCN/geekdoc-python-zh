    \ modules from having to worry about each other's global variable names, the use\
    \ of dotted module names saves the authors of multi-module packages like NumPy\
    \ or Pillow from having to worry about each other's module names.\n\nSuppose you\
    \ want to design a collection of modules (a \"package\") for the uniform handling\
    \ of sound files and sound data. There are many different sound file formats (usually\
    \ recognized by their extension, for example: .wav, .aiff, .au), so you may need\
    \ to create and maintain a growing collection of modules for the conversion between\
    \ the various file formats. There are also many different operations you might\
    \ want to perform on sound data (such as mixing, adding echo, applying an equalizer\
    \ function, creating an artificial stereo effect), so in addition you will be\
    \ writing a never-ending stream of modules to perform these operations. Here's\
    \ a possible structure for your package (expressed in terms of a hierarchical\
    \ filesystem):\n\n```\nsound/                  Top-level package\n    __init__.py\
    \       Initialize the sound package\n    formats/          Subpackage for file\
    \ format conversions\n        __init__.py\n        wavread.py\n        wavwrite.py\n\
    \        aiffread.py\n        aiffwrite.py\n        auread.py\n        auwrite.py\n\
    \        ...\n    effects/           Subpackage for sound effects\n        __init__.py\n\
    \        echo.py\n        surround.py\n        reverse.py\n        ...\n    filters/\
    \           Subpackage for filters\n        __init__.py\n        equalizer.py\n\
    \        vocoder.py\n        karaoke.py\n        ...\n```\n\nWhen importing the\
    \ package, Python searches through the directories on sys.path looking for the\
    \ package subdirectory.\n\nThe `__init__.py` files are required to make Python\
    \ treat the directories as containing packages; this is done to prevent directories\
    \ with a common name, such as string, from unintentionally hiding valid modules\
    \ that occur later on the module search path. In the simplest case, `__init__.py`\
    \ can just be an empty file, but it can also execute initialization code for the\
    \ package or set the `__all__` variable, described later.\n\nUsers of the package\
    \ can import individual modules from the package, for example:\n`import sound.effects.echo`\n\
    This loads the submodule `sound.effects.echo`. It must be referenced with its\
    \ full name.\n\n```\nsound.effects.echo.echofilter(input, output, delay=0.7, atten=4)\n\
    ```\n\nAn alternative way of importing the submodule is:\n`from sound.effects\
    \ import echo`\nThis also loads the submodule `echo`, and makes it available without\
    \ its package prefix, so it can be used as follows:\n\n```\necho.echofilter(input,\
    \ output, delay=0.7, atten=4)\n```\n\nYet another variation is to import the desired\
