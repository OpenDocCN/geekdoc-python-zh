- md: "many situations, you’ll already have a MySQL database that you want to connect\
    \ with your Python application.\nYou can do this using the same connect() function\
    \ that you used earlier by sending an additional parameter called database:\n\n\
    ```\nfrom getpass import getpass\n\nfrom mysql.connector import connect, Error\n\
    \n\ntry:\n    with connect(\n        host=\"localhost\",\n        user=input(\"\
    Enter username: \"),\n        password=getpass(\"Enter password: \"),\n      \
    \  database=\"online_movie_rating\",\n    ) as connection:\n        print(connection)\n\
    except Error as e:\n    print(e)\n```\n\nThe above code is very similar to the\
    \ connection script that you used earlier. The only change here is an additional\
    \ database parameter, where the name of your database is passed to connect().\
    \ Once you execute this script, you’ll be connected to the online_movie_rating\
    \ database.\n\n## 9.3 CREATING, ALTERING, AND DROPPING A TABLE\n\nIn this section,\
    \ you’ll learn how to perform some basic DDL queries like CREATE, DROP, and ALTER\
    \ with Python. You’ll get a quick look at the MySQL database that you’ll use in\
    \ the rest of this tutorial. You’ll also create all the tables required for the\
    \ database and learn how to perform modifications on these tables later on.\n\n\
    ### 9.3.1 Defining the Database Schema\n\nYou can start by creating a database\
    \ schema for an online movie rating system. The database will consist of three\
    \ tables:\n\n- **movies** contains general information about movies and has the\
    \ following attributes:\n  - id\n  - title\n  - release_year\n  - genre\n  - collection_in_mil\n\
    - **reviewers** contains information about people who posted reviews or ratings\
    \ and has the following attributes:\n  - id\n  - first_name\n  - last_name\n-\
    \ **ratings** contains information about ratings that have been posted and has\
    \ the following attributes:\n  - movie_id (foreign key)\n  - reviewer_id (foreign\
    \ key)\n  - rating\n\nA real-world movie rating system, like IMDb, would need\
    \ to store a bunch of other attributes, like emails, movie cast lists, and so\
    \ on. If you want, you can add more tables and attributes to this database. But\
    \ these three tables will suffice for the purpose of this tutorial.\n\nThe image\
    \ below depicts the database schema:\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_318_0.png)\n\
    \n**Figure 1.** Schema Diagram for an Online Movie Rating System.\n\nThe tables\
    \ in this database are related to each other, movies and reviewers will have a\
    \ many-to-many relationship since one movie can be reviewed by multiple reviewers\
    \ and one reviewer can review multiple movies. The ratings table connects the\
    \ movies table with the reviewers table.\n\n### 9.3.2 Creating Tables Using the\
    \ CREATE TABLE Statement\n\nNow, to create a new table in MySQL, you need to use\
    \ the CREATE TABLE statement. The following MySQL query will create the movies\
    \ table for your online_movie_rating database:\n\n```\nCREATE TABLE movies(\n\
    \    id INT AUTO_INCREMENT PRIMARY KEY,\n    title VARCHAR(100),\n    release_year\
    \ YEAR(4),\n    genre VARCHAR(100),\n    collection_in_mil INT\n);\n```\n\nIf\
    \ you've looked at SQL statements before, then most of the above query might make\
    \ sense. But there are some differences in the MySQL syntax that you should be\
    \ aware of.\n\n> MySQL has a wide variety of data types for your perusal, including\
    \ YEAR, INT, BIGINT, and so on. Also, MySQL uses the AUTO_INCREMENT keyword when\
    \ a column value has to be incremented automatically on the insertion of new records.\n\
    \nTo create a new table, you need to pass this query to cursor.execute(), which\
    \ accepts a MySQL query and executes the query on the connected MySQL database:\n\
    \n```\ncreate_movies_table_query = \"\"\"\nCREATE TABLE movies(\n    id INT AUTO_INCREMENT\
    \ PRIMARY KEY,\n    title VARCHAR(100),\n    release_year YEAR(4),\n    genre\
    \ VARCHAR(100),\n    collection_in_mil INT\n)\n\"\"\"\n\nwith connection.cursor()\
    \ as cursor:\n    cursor.execute(create_movies_table_query)\n    connection.commit()\n\
    ```\n\nNow you have the movies table in your database. You pass create_movies_table_query\
    \ to cursor.execute(), which performs the required execution.\n\nIn MySQL, modifications\
    \ mentioned in a transaction occur only when you use a COMMIT command in the end.\
    \ Always call this method after every transaction to perform changes in the actual\
    \ table.\n\nAs you did with the movies table, execute the following script to\
    \ create the reviewers table:\n\n```\ncreate_reviewers_table_query = \"\"\"\n\
    CREATE TABLE reviewers (\n    id INT AUTO_INCREMENT PRIMARY KEY,\n    first_name\
    \ VARCHAR(100),\n    last_name VARCHAR(100)\n)\n\"\"\"\n\nwith connection.cursor()\
    \ as cursor:\n    cursor.execute(create_reviewers_table_query)\n    connection.commit()\n\
    ```\n\n> The connection variable refers to the MySQL Connection object that was\
    \ returned when you connected to your database. Also, notice the connection.commit()\
    \ statement at the end of the code. By default, your MySQL connector doesn't autocommit\
    \ transactions.\n\n# Basic Computer Coding: Python\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_321_0.png)\n\
    \nIf required, you could add more information about a reviewer, such as their\
    \ email ID or demographic information. But first_name and last_name will serve\
    \ your purpose for now.\nFinally, you can create the ratings table using the following\
    \ script:\n\n```\ncreate_ratings_table_query = \"\"\"\nCREATE TABLE ratings (\n\
    \    movie_id INT,\n    reviewer_id INT,\n    rating DECIMAL(2,1),\n    FOREIGN\
    \ KEY(movie_id) REFERENCES movies(id),\n    FOREIGN KEY(reviewer_id) REFERENCES\
    \ reviewers(id),\n    PRIMARY KEY(movie_id, reviewer_id)\n)\n\"\"\"\n\nwith connection.cursor()\
    \ as cursor:\n    cursor.execute(create_ratings_table_query)\n    connection.commit()\n\
    ```\n\nThe implementation of foreign key relationships in MySQL is slightly different\
    \ and limited as compared to the standard SQL. In MySQL, both the parent and the\
    \ child in the foreign key constraint must use the same storage engine.\n\nA storage\
    \ engine is the underlying software component that a database management system\
    \ uses for performing SQL operations. In MySQL, storage engines come in two different\
    \ flavors:\n\n- Transactional storage engines are transaction safe and allow you\
    \ to roll back transactions using simple commands like rollback. Many popular\
    \ MySQL engines, including InnoDB and NDB, belong to this category.\n- Nontransactional\
    \ storage engines depend on elaborate manual code to undo statements committed\
    \ on a database. MyISAM, MEMORY, and many other MySQL engines are nontransactional.\n\
    \nInnoDB is the default and most popular storage engine. It helps maintain data\
    \ integrity by supporting foreign key constraints. This means that any CRUD operation\
    \ on a foreign key is checked to ensure that it doesn't lead to inconsistencies\
    \ across different tables.\n\nAlso, note that the ratings table uses the columns\
    \ movie_id and reviewer_id, both foreign keys, jointly as the primary key. This\
    \ step ensures that a reviewer can't rate the same movie twice.\n\nYou may choose\
    \ to reuse the same cursor for multiple executions. In that case, all executions\
    \ would become one atomic transaction rather than multiple separate transactions.\
    \ For example, you can execute all CREATE TABLE statements with one cursor and\
    \ then commit your transaction only once:\n\n```\nwith connection.cursor() as\
    \ cursor:\n    cursor.execute(create_movies_table_query)\n    cursor.execute(create_reviewers_table_query)\n\
    \    cursor.execute(create_ratings_table_query)\n    connection.commit()\n```\n\
    \nThe above code will first execute all three CREATE statements. Then it will\
    \ send a COMMIT command to the MySQL server that commits your transaction. You\
    \ can also use .rollback() to send a ROLLBACK command to the MySQL server and\
    \ remove all data changes from the transaction.\n\n### 9.3.3 Showing a Table Schema\
    \ Using the DESCRIBE Statement\n\nNow, that you've created all three tables, you\
    \ can look at their schema using the following SQL statement:\n\n```\nDESCRIBE\
    \ <table_name>;\n```\n\nTo get some results back from the cursor object, you need\
    \ to use cursor.fetchall(). This method fetches all rows from the last executed\
    \ statement. Assuming you already have the MySQLConnection object in the connection\
    \ variable, you can print out all the results fetched by cursor.fetchall():\n\n\
    ```\n>>>\n>>> show_table_query = \"DESCRIBE movies\"\n>>> with connection.cursor()\
    \ as cursor:\n...     cursor.execute(show_table_query)\n...     # Fetch rows from\
    \ last executed query\n...     result = cursor.fetchall()\n...     for row in\
    \ result:\n...         print(row)\n...\n('id', 'int(11)', 'NO', 'PRI', None, 'auto_increment')\n\
    ('title', 'varchar(100)', 'YES', '', None, '')\n('release_year', 'year(4)', 'YES',\
    \ '', None, '')\n('genre', 'varchar(100)', 'YES', '', None, '')\n('collection_in_mil',\
    \ 'int(11)', 'YES', '', None, '')\n```\n\nOnce you execute the above code, you\
    \ should receive a table containing information about all the columns in movies\
    \ table. For each column, you'll receive details like the column's data type,\
    \ whether the column is a primary key, and so on.\n\n### 9.3.4 Modifying a Table\
    \ Schema Using the ALTER Statement\n\nIn the movies table, you have a column called\
    \ collection_in_mil, which contains a movie's box office collection in millions\
    \ of dollars. You can write the following MySQL statement to modify the data type\
    \ of collection_in_mil attribute from INT to DECIMAL:\n\n```\nALTER TABLE movies\
    \ MODIFY COLUMN collection_in_mil DECIMAL(4,1);\n```"
  mdcn: "在许多情况下，你可能已经拥有一个希望与Python应用程序连接的MySQL数据库。\n你可以使用之前用过的`connect()`函数，通过传递一个名为`database`的额外参数来实现这一点：\n\
    \n```\nfrom getpass import getpass\n\nfrom mysql.connector import connect, Error\n\
    \n\ntry:\n    with connect(\n        host=\"localhost\",\n        user=input(\"\
    Enter username: \"),\n        password=getpass(\"Enter password: \"),\n      \
    \  database=\"online_movie_rating\",\n    ) as connection:\n        print(connection)\n\
    except Error as e:\n    print(e)\n```\n\n上述代码与你之前使用的连接脚本非常相似。唯一的区别是增加了一个`database`参数，你的数据库名称通过该参数传递给`connect()`。执行此脚本后，你将连接到`online_movie_rating`数据库。\n\
    \n## 9.3 创建、修改和删除表\n\n在本节中，你将学习如何使用Python执行一些基本的DDL查询，如`CREATE`、`DROP`和`ALTER`。你将快速浏览一下本教程其余部分将使用的MySQL数据库。你还将创建数据库所需的所有表，并学习如何在后续对这些表进行修改。\n\
    \n### 9.3.1 定义数据库模式\n\n你可以从为在线电影评分系统创建数据库模式开始。该数据库将包含三个表：\n\n- **movies** 包含电影的一般信息，并具有以下属性：\n\
    \  - id\n  - title\n  - release_year\n  - genre\n  - collection_in_mil\n- **reviewers**\
    \ 包含发布评论或评分的人员信息，并具有以下属性：\n  - id\n  - first_name\n  - last_name\n- **ratings**\
    \ 包含已发布评分的信息，并具有以下属性：\n  - movie_id（外键）\n  - reviewer_id（外键）\n  - rating\n\n一个真实的电影评分系统，如IMDb，需要存储许多其他属性，例如电子邮件、电影演员表等。如果你愿意，可以为此数据库添加更多的表和属性。但这三个表对于本教程的目的来说已经足够了。\n\
    \n下图描绘了数据库模式：\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_318_0.png)\n\n**图1.**\
    \ 在线电影评分系统的模式图。\n\n此数据库中的表相互关联，`movies`和`reviewers`将具有多对多关系，因为一部电影可以被多个评论者评论，而一个评论者可以评论多部电影。`ratings`表将`movies`表与`reviewers`表连接起来。\n\
    \n### 9.3.2 使用CREATE TABLE语句创建表\n\n现在，要在MySQL中创建一个新表，你需要使用`CREATE TABLE`语句。以下MySQL查询将为你的`online_movie_rating`数据库创建`movies`表：\n\
    \n```\nCREATE TABLE movies(\n    id INT AUTO_INCREMENT PRIMARY KEY,\n    title\
    \ VARCHAR(100),\n    release_year YEAR(4),\n    genre VARCHAR(100),\n    collection_in_mil\
    \ INT\n);\n```\n\n如果你之前看过SQL语句，那么上述查询的大部分内容可能都能理解。但MySQL语法中有一些你应该注意的差异。\n\n> MySQL提供了多种数据类型供你选择，包括`YEAR`、`INT`、`BIGINT`等。此外，当需要在插入新记录时自动递增列值时，MySQL使用`AUTO_INCREMENT`关键字。\n\
    \n要创建一个新表，你需要将此查询传递给`cursor.execute()`，该方法接受一个MySQL查询并在已连接的MySQL数据库上执行该查询：\n\n\
    ```\ncreate_movies_table_query = \"\"\"\nCREATE TABLE movies(\n    id INT AUTO_INCREMENT\
    \ PRIMARY KEY,\n    title VARCHAR(100),\n    release_year YEAR(4),\n    genre\
    \ VARCHAR(100),\n    collection_in_mil INT\n)\n\"\"\"\n\nwith connection.cursor()\
    \ as cursor:\n    cursor.execute(create_movies_table_query)\n    connection.commit()\n\
    ```\n\n现在你的数据库中有了`movies`表。你将`create_movies_table_query`传递给`cursor.execute()`，它执行了所需的执行操作。\n\
    \n在MySQL中，事务中提到的修改只有在最后使用`COMMIT`命令时才会发生。请始终在每个事务后调用此方法，以在实际表中执行更改。\n\n就像处理`movies`表一样，执行以下脚本来创建`reviewers`表：\n\
    \n```\ncreate_reviewers_table_query = \"\"\"\nCREATE TABLE reviewers (\n    id\
    \ INT AUTO_INCREMENT PRIMARY KEY,\n    first_name VARCHAR(100),\n    last_name\
    \ VARCHAR(100)\n)\n\"\"\"\n\nwith connection.cursor() as cursor:\n    cursor.execute(create_reviewers_table_query)\n\
    \    connection.commit()\n```\n\n> `connection`变量指的是你连接到数据库时返回的MySQL连接对象。另外，请注意代码末尾的`connection.commit()`语句。默认情况下，你的MySQL连接器不会自动提交事务。\n\
    \n# 基础计算机编程：Python\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_321_0.png)\n\n\
    如果需要，你可以添加更多关于评论者的信息，例如他们的电子邮件ID或人口统计信息。但`first_name`和`last_name`目前足以满足你的目的。\n\
    最后，你可以使用以下脚本创建`ratings`表：\n\n```\ncreate_ratings_table_query = \"\"\"\nCREATE\
    \ TABLE ratings (\n    movie_id INT,\n    reviewer_id INT,\n    rating DECIMAL(2,1),\n\
    \    FOREIGN KEY(movie_id) REFERENCES movies(id),\n    FOREIGN KEY(reviewer_id)\
    \ REFERENCES reviewers(id),\n    PRIMARY KEY(movie_id, reviewer_id)\n)\n\"\"\"\
    \n\nwith connection.cursor() as cursor:\n    cursor.execute(create_ratings_table_query)\n\
    \    connection.commit()\n```\n\nMySQL中对外键关系的实现与标准SQL相比略有不同且有限制。在MySQL中，外键约束中的父表和子表必须使用相同的存储引擎。\n\
    \n存储引擎是数据库管理系统用于执行SQL操作的底层软件组件。在MySQL中，存储引擎有两种不同的类型：\n\n- 事务性存储引擎是事务安全的，允许你使用简单的命令（如`rollback`）来回滚事务。许多流行的MySQL引擎，包括InnoDB和NDB，都属于这一类。\n\
    - 非事务性存储引擎依赖于复杂的手动代码来撤销已提交到数据库的语句。MyISAM、MEMORY以及许多其他MySQL引擎都是非事务性的。\n\nInnoDB是默认且最受欢迎的存储引擎。它通过支持外键约束来帮助维护数据完整性。这意味着对外键的任何CRUD操作都会被检查，以确保它不会导致不同表之间的不一致。\n\
    \n另外，请注意`ratings`表使用`movie_id`和`reviewer_id`列（两者都是外键）共同作为主键。此步骤确保评论者不能对同一部电影评分两次。\n\
    \n你可以选择为多次执行重用同一个游标。在这种情况下，所有执行将变成一个原子事务，而不是多个独立的事务。例如，你可以用一个游标执行所有`CREATE TABLE`语句，然后只提交一次事务：\n\
    \n```\nwith connection.cursor() as cursor:\n    cursor.execute(create_movies_table_query)\n\
    \    cursor.execute(create_reviewers_table_query)\n    cursor.execute(create_ratings_table_query)\n\
    \    connection.commit()\n```\n\n上述代码将首先执行所有三个`CREATE`语句。然后它将向MySQL服务器发送一个`COMMIT`命令，提交你的事务。你也可以使用`.rollback()`向MySQL服务器发送`ROLLBACK`命令，并从事务中移除所有数据更改。\n\
    \n### 9.3.3 使用DESCRIBE语句显示表模式\n\n现在，你已经创建了所有三个表，可以使用以下SQL语句查看它们的模式：\n\n```\nDESCRIBE\
    \ <table_name>;\n```\n\n要从游标对象获取一些结果，你需要使用`cursor.fetchall()`。此方法从最后执行的语句中获取所有行。假设你已经在`connection`变量中拥有`MySQLConnection`对象，你可以打印出`cursor.fetchall()`获取的所有结果：\n\
    \n```\n>>>\n>>> show_table_query = \"DESCRIBE movies\"\n>>> with connection.cursor()\
    \ as cursor:\n...     cursor.execute(show_table_query)\n...     # 从最后执行的查询中获取行\n\
    ...     result = cursor.fetchall()\n...     for row in result:\n...         print(row)\n\
    ...\n('id', 'int(11)', 'NO', 'PRI', None, 'auto_increment')\n('title', 'varchar(100)',\
    \ 'YES', '', None, '')\n('release_year', 'year(4)', 'YES', '', None, '')\n('genre',\
    \ 'varchar(100)', 'YES', '', None, '')\n('collection_in_mil', 'int(11)', 'YES',\
    \ '', None, '')\n```\n\n一旦你执行上述代码，你应该会收到一个包含`movies`表中所有列信息的表格。对于每一列，你将收到诸如列的数据类型、该列是否为主键等详细信息。\n\
    \n### 9.3.4 使用ALTER语句修改表模式\n\n在`movies`表中，有一个名为`collection_in_mil`的列，它包含电影的票房收入（以百万美元计）。你可以编写以下MySQL语句将`collection_in_mil`属性的数据类型从`INT`修改为`DECIMAL`：\n\
    \n```\nALTER TABLE movies MODIFY COLUMN collection_in_mil DECIMAL(4,1);\n```"
