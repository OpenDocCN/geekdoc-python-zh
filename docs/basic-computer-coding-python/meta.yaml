    \ Decimal('138.1'))\n(5, 'Skyfall', 2012, 'Action', Decimal('304.6'))\n\nThe result\
    \ variable holds the records returned from using .fetchall(). It's a list of tuples\
    \ representing individual records from the table.\n\nIn the query above, you use\
    \ the LIMIT clause to constrain the number of rows that are received from the\
    \ SELECT statement. Developers often use LIMIT to perform **pagination** when\
    \ handling large volumes of data.\n\nIn MySQL, the LIMIT clause takes one or two\
    \ nonnegative numeric arguments. When using one argument, you specify the maximum\
    \ number of rows to return. Since your query includes LIMIT 5, only the first\
    \ 5 records are fetched. When using both arguments, you can also specify the offset\
    \ of the first row to return:\n\n```sql\nSELECT * FROM movies LIMIT 2,5;\n```\n\
    \nThe first argument specifies an offset of 2, and the second argument constrains\
    \ the number of returned rows to 5. The above query will return rows 3 to 7.\n\
    \nYou can also query for selected columns:\n\n```python\n>>> select_movies_query\
    \ = \"SELECT title, release_year FROM movies LIMIT 5\"\n>>> with connection.cursor()\
    \ as cursor:\n...     cursor.execute(select_movies_query)\n...     for row in\
    \ cursor.fetchall():\n...         print(row)\n```\n\n> **Keyword**\n> **Pagination**\
    \ is the process of dividing a document into discrete pages, either electronic\
    \ pages or printed pages.\n\n('Forrest Gump', 1994)\n('3 Idiots', 2009)\n('Eternal\
    \ Sunshine of the Spotless Mind', 2004)\n('Good Will Hunting', 1997)\n('Skyfall',\
    \ 2012)\n\nNow, the code outputs values only from the two specified columns: title\
    \ and release_year.\n\n## Filtering Results Using the WHERE Clause\n\nYou can\
    \ filter table records by specific criteria using the WHERE clause. For example,\
    \ to retrieve all movies with a box office collection greater than $300 million,\
    \ you could run the following query:\n\n```sql\nSELECT title, collection_in_mil\n\
    FROM movies\nWHERE collection_in_mil > 300;\n```\n\nYou can also use ORDER BY\
    \ clause in the last query to sort the results from the highest to the lowest\
    \ earner:\n\n```python\n>>> select_movies_query = \"\"\"\n... SELECT title, collection_in_mil\n\
    ... FROM movies\n... WHERE collection_in_mil > 300\n... ORDER BY collection_in_mil\
    \ DESC\n... \"\"\"\n>>> with connection.cursor() as cursor:\n...     cursor.execute(select_movies_query)\n\
    ...     for movie in cursor.fetchall():\n...         print(movie)\n```\n\n('Avengers:\
    \ Endgame', Decimal('858.8'))\n('Titanic', Decimal('659.2'))\n('The Dark Knight',\
