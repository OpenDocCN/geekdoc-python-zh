- md: "## 6.1.3 Matching Versus Searching\n\nPython offers two different primitive\
    \ operations based on regular expressions: **match** checks for a match only at\
    \ the beginning of the string, while **search** checks for a match anywhere in\
    \ the **string** (this is what Perl does by default).\n\n*Example*\n\n```python\n\
    #!/usr/bin/python\nimport re\n\nline = \"Cats are smarter than dogs\";\n\nmatchObj\
    \ = re.match( r'dogs', line, re.M|re.I)\nif matchObj:\n    print \"match --> matchObj.group()\
    \ : \", matchObj.group()\nelse:\n    print \"No match!!\"\n\nsearchObj = re.search(\
    \ r'dogs', line, re.M|re.I)\nif searchObj:\n    print \"search --> searchObj.group()\
    \ : \", searchObj.group()\nelse:\n    print \"Nothing found!!\"\n```\n\nWhen the\
    \ above code is executed, it produces the following result –\nNo match!!\nsearch\
    \ --> searchObj.group() : dogs\n\n## 6.1.4 Search and Replace\n\nOne of the most\
    \ important **re** methods that use regular expressions is **sub**.\n\n### Syntax\n\
    \n```python\n(re.sub(pattern, repl, string, max=0)\n```\n\nThis method replaces\
    \ all occurrences of the RE *pattern* in *string* with *repl*, substituting all\
    \ occurrences unless *max* is provided. This method returns modified string.\n\
    \n### Example\n\n```python\n#!/usr/bin/python\nimport re\n\nphone = \"2004-959-559\
    \ # This is Phone Number\"\n\n# Delete Python-style comments\nnum = re.sub(r'#.*$',\
    \ \"\", phone)\nprint \"Phone Num : \", num\n\n# Remove anything other than digits\n\
    num = re.sub(r'\\D', \"\", phone)\nprint \"Phone Num : \", num\n```\n\nWhen the\
    \ above code is executed, it produces the following result:\n\n```\nPhone Num\
    \ :  2004-959-559\nPhone Num :  2004959559\n```\n\n## 6.2 REGULAR EXPRESSION MODIFIERS:\
    \ OPTION FLAGS\n\n**Regular expression** literals may include an optional modifier\
    \ to control various aspects of matching. The modifiers are specified as an optional\
    \ flag. You can provide multiple modifiers using exclusive OR (|), as shown previously\
    \ and may be represented by one of these –\n\n> Regular expressions originated\
    \ in 1951, when mathematician Stephen Cole Kleene described regular languages\
    \ using his mathematical notation called regular sets. These arose in theoretical\
    \ computer science, in the subfields of automata theory (models of computation)\
    \ and the description and classification of formal languages.\n\n> Regular expression\
    \ is a sequence of characters that define a search pattern.\n\n| Sr.No. | Modifier\
    \ & Description |\n|---|---|\n| 1 | **re.I**<br>Performs case-insensitive matching.\
    \ |\n| 2 | **re.L**<br>Interprets words according to the current locale. This\
    \ interpretation affects the alphabetic group (\\w and \\W), as well as word boundary\
    \ behavior(\\b and \\B). |\n| 3 | **re.M**<br>Makes $ match the end of a line\
    \ (not just the end of the string) and makes ^ match the start of any line (not\
    \ just the start of the string). |\n| 4 | **re.S**<br>Makes a period (dot) match\
    \ any character, including a newline. |\n| 5 | **re.U**<br>Interprets letters\
    \ according to the Unicode character set. This flag affects the behavior of \\\
    w, \\W, \\b, \\B. |\n| 6 | **re.X**<br>Permits \"cuter\" regular expression syntax.\
    \ It ignores whitespace (except inside a set [] or when escaped by a backslash)\
    \ and treats unescaped # as a comment marker. |\n\n### 6.2.1 Regular Expression\
    \ Patterns\n\nExcept for control characters, (+ ? . * ^ $ ( ) [ ] { } | \\), all\
    \ characters match themselves. You can escape a control character by preceding\
    \ it with a backslash.\nFollowing table lists the regular expression syntax that\
    \ is available in Python –\n\n| Sr.No. | Pattern & Description |\n|---|---|\n\
    | 1 | ^<br>Matches beginning of line. |\n| 2 | $<br>Matches end of line. |\n|\
    \ 3 | .<br>Matches any single character except newline. Using m option allows\
    \ it to match newline as well. |\n| 4 | [...]<br>Matches any single character\
    \ in brackets. |\n| 5 | [^...]<br>Matches any single character not in brackets.\
    \ |\n| 6 | re*<br>Matches 0 or more occurrences of preceding expression. |\n|\
    \ 7 | re+<br>Matches 1 or more occurrence of preceding expression. |\n| 8 | re?<br>Matches\
    \ 0 or 1 occurrence of preceding expression. |\n| 9 | re{ n}<br>Matches exactly\
