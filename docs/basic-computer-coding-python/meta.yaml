    \ while the test is running, the framework will consider the test to have suffered\
    \ an error, and the runTest() method will not be executed.\n\nSimilarly, we can\
    \ provide a tearDown() method that tidies up after the runTest() method has been\
    \ run:\n\n> **Keyword**\n\n**Subclass**\n\"derived class\", heir class, or child\
