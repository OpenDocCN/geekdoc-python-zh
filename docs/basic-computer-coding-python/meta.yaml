    # 4.2.3 Test Discovery


    Unittest supports simple test discovery. In order to be compatible with test discovery,
    all of the test files must be modules or packages importable from the top-level
    directory of the project (this means that their filenames must be valid identifiers).

    Test discovery is implemented in TestLoader.discover(), but can also be used from
    the command line. The basic command-line usage is:

    cd project_directory

    python -m unittest discover

    The discover sub-command has the following options:

    -v, --verbose

    Verbose output

    -s, --start-directory directory

    Directory to start discovery (. default)

    -p, --pattern pattern

    Pattern to match test files (test*.py default)

    -t, --top-level-directory directory

    Top level directory of project (defaults to start directory)


    > Remember

    Test discovering are the steps that are taken to find the tests in your code-base.
    This means you don''t have to specify where your tests are but if the files contains
    the tests follow a certain location (filenames, directories, etc) then the testing
    framework can find them automatically.'
  - "[PAGE 130]\n\nThe -s, -p, and -t options can be passed in as positional arguments\
    \ in that order. The following two command lines are equivalent:\npython -m unittest\
    \ discover -s project_directory -p \"*_test.py\"\npython -m unittest discover\
    \ project_directory \"*_test.py\"\nAs well as being a path it is possible to pass\
    \ a package name, for example myproject.subpackage.test, as the start directory.\
    \ The package name you supply will then be imported and its location on the filesystem\
    \ will be used as the start directory.\n\n**Caution:** Test discovery loads tests\
    \ by importing them. Once test discovery has found all the test files from the\
    \ start directory you specify it turns the paths into package names to import.\
    \ For example foo/bar/baz.py will be imported as foo.bar.baz.\nIf you have a package\
    \ installed globally and attempt test discovery on a different copy of the package,\
    \ then the import could happen from the wrong place. If this happens test discovery\
    \ will warn you and exit.\n\nIf you supply the start directory as a package name\
    \ rather than a path to a directory then discover assumes that whichever location\
    \ it imports from is the location you intended, so you will not get the warning.\n\
    Test modules and packages can customize test loading and discovery by through\
    \ the load_tests protocol.\n\n# 4.2.4 Organizing test code\n\nThe basic building\
    \ blocks of unit testing are test cases — single scenarios that must be set up\
    \ and checked for correctness. In unittest, test cases are represented by instances\
    \ of unittest's TestCase class. To make your own test cases you must write subclasses\
