  mdcn: "## 6.1.3 匹配与搜索\n\nPython 基于正则表达式提供了两种不同的基本操作：**match** 仅检查字符串开头的匹配，而 **search**\
    \ 则检查**字符串**中任意位置的匹配（这是 Perl 的默认行为）。\n\n*示例*\n\n```python\n#!/usr/bin/python\n\
    import re\n\nline = \"Cats are smarter than dogs\";\n\nmatchObj = re.match( r'dogs',\
    \ line, re.M|re.I)\nif matchObj:\n    print \"match --> matchObj.group() : \"\
    , matchObj.group()\nelse:\n    print \"No match!!\"\n\nsearchObj = re.search(\
    \ r'dogs', line, re.M|re.I)\nif searchObj:\n    print \"search --> searchObj.group()\
    \ : \", searchObj.group()\nelse:\n    print \"Nothing found!!\"\n```\n\n执行上述代码后，将产生以下结果\
    \ –\nNo match!!\nsearch --> searchObj.group() : dogs\n\n## 6.1.4 搜索与替换\n\n使用正则表达式的最重要的\
    \ **re** 方法之一是 **sub**。\n\n### 语法\n\n```python\n(re.sub(pattern, repl, string,\
    \ max=0)\n```\n\n此方法将 *string* 中所有匹配正则表达式 *pattern* 的部分替换为 *repl*，除非提供了 *max*，否则将替换所有匹配项。此方法返回修改后的字符串。\n\
    \n### 示例\n\n```python\n#!/usr/bin/python\nimport re\n\nphone = \"2004-959-559\
    \ # This is Phone Number\"\n\n# Delete Python-style comments\nnum = re.sub(r'#.*$',\
    \ \"\", phone)\nprint \"Phone Num : \", num\n\n# Remove anything other than digits\n\
    num = re.sub(r'\\D', \"\", phone)\nprint \"Phone Num : \", num\n```\n\n执行上述代码后，将产生以下结果：\n\
    \n```\nPhone Num :  2004-959-559\nPhone Num :  2004959559\n```\n\n## 6.2 正则表达式修饰符：选项标志\n\
    \n**正则表达式**字面量可以包含一个可选的修饰符来控制匹配的各个方面。修饰符被指定为一个可选标志。你可以使用异或（|）提供多个修饰符，如前所述，并且可以由以下之一表示\
    \ –\n\n> 正则表达式起源于1951年，当时数学家斯蒂芬·科尔·克莱尼使用他称为正则集的数学符号描述了正则语言。这些出现在理论计算机科学中，特别是在自动机理论（计算模型）以及形式语言的描述和分类子领域中。\n\
    \n> 正则表达式是定义搜索模式的字符序列。\n\n| 序号 | 修饰符与描述 |\n|---|---|\n| 1 | **re.I**<br>执行不区分大小写的匹配。\
    \ |\n| 2 | **re.L**<br>根据当前区域设置解释单词。此解释影响字母组（\\w 和 \\W）以及单词边界行为（\\b 和 \\B）。 |\n\
    | 3 | **re.M**<br>使 $ 匹配行尾（而不仅仅是字符串末尾），并使 ^ 匹配任何行的开头（而不仅仅是字符串开头）。 |\n| 4 | **re.S**<br>使句点（点）匹配任何字符，包括换行符。\
    \ |\n| 5 | **re.U**<br>根据 Unicode 字符集解释字母。此标志影响 \\w、\\W、\\b、\\B 的行为。 |\n| 6 |\
    \ **re.X**<br>允许使用“更简洁”的正则表达式语法。它忽略空白字符（除非在集合 [] 内或由反斜杠转义），并将未转义的 # 视为注释标记。 |\n\
    \n### 6.2.1 正则表达式模式\n\n除了控制字符（+ ? . * ^ $ ( ) [ ] { } | \\）外，所有字符都匹配自身。你可以通过在控制字符前加上反斜杠来转义它。\n\
    下表列出了 Python 中可用的正则表达式语法 –\n\n| 序号 | 模式与描述 |\n|---|---|\n| 1 | ^<br>匹配行首。 |\n\
    | 2 | $<br>匹配行尾。 |\n| 3 | .<br>匹配除换行符外的任何单个字符。使用 m 选项允许其也匹配换行符。 |\n| 4 | [...]<br>匹配方括号内的任何单个字符。\
