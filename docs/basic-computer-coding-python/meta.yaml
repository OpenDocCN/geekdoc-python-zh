- md: "We already have set up Python Programming environment online, so that you can\
    \ execute all the available examples online at the same time when you are learning\
    \ theory. Feel free to modify any example and execute it online.\n\n## 1.3 BASIC\
    \ SYNTAX OF PYTHON\n\nThe Python language has many similarities to **Perl**, C,\
    \ and Java. However, there are some definite differences between the languages.\n\
    \n### 1.3.1 First Python Program\n\nLet us execute programs in different modes\
    \ of programming.\n\n#### Interactive Mode Programming\n\nInvoking the interpreter\
    \ without passing a script file as a parameter brings up the following prompt\
    \ –\n\n```\n$ python\nPython 2.4.3 (#1, Nov 11 2010, 13:34:43)\n[GCC 4.1.2 20080704\
    \ (Red Hat 4.1.2-48)] on linux2\nType \"help\", \"copyright\", \"credits\" or\
    \ \"license\" for more information.\n>>>\n```\n\nType the following text at the\
    \ Python prompt and press the Enter –\n\n```\n>>> print \"Hello, Python!\"\n```\n\
    \nIf you are running new version of Python, then you would need to use print statement\
    \ with parenthesis as in **print (\"Hello, Python!\")**;. However in Python version\
    \ 2.4.3, this produces the following result –\n\n```\nHello, Python!\n```\n\n\
    #### Script Mode Programming\n\nInvoking the interpreter with a script parameter\
    \ begins execution of the script and continues until the script is finished. When\
    \ the script is finished, the interpreter is no longer active.\n\nLet us write\
    \ a simple Python program in a script. Python files have extension **.py**. Type\
    \ the following source code in a test.py file –\n\n```\nprint \"Hello, Python!\"\
    \n```\n\nWe assume that you have Python interpreter set in PATH variable. Now,\
    \ try to run this program as follows –\n\n```\n$ python test.py\n```\n\nThis produces\
    \ the following result –\n\n```\nHello, Python!\n```\n\nLet us try another way\
    \ to execute a Python script. Here is the modified test.py file –\n\n```\n#!/usr/bin/python\n\
    print \"Hello, Python!\"\n```\n\nWe assume that you have Python interpreter available\
    \ in /usr/bin directory. Now, try to run this program as follows –\n\n```\n$ chmod\
    \ +x test.py    # This is to make file executable\n$ ./test.py\n```\n\nThis produces\
    \ the following result –\n\n```\nHello, Python!\n```\n\n### 1.3.2 Python Identifiers\n\
    \nA Python identifier is a name used to identify a variable, function, class,\
    \ module or other object. An identifier starts with a letter A to Z or a to z\
    \ or an underscore (_) followed by zero or more letters, underscores and digits\
    \ (0 to 9).\n\nPython does not allow punctuation characters such as @, $, and\
    \ % within identifiers. Python is a case sensitive programming language. Thus,\
    \ **Manpower** and **manpower** are two different identifiers in Python.\n\nHere\
    \ are naming conventions for Python identifiers –\n\n- Class names start with\
    \ an uppercase letter. All other identifiers start with a lowercase letter.\n\
    - Starting an identifier with a single leading underscore indicates that the identifier\
    \ is private.\n- Starting an identifier with two leading underscores indicates\
    \ a strongly private identifier.\n- If the identifier also ends with two trailing\
    \ underscores, the identifier is a language-defined special name.\n\n### 1.3.3\
    \ Reserved Words\n\nThe following list shows the Python keywords. These are reserved\
    \ words and you cannot use them as constant or variable or any other identifier\
    \ names. All the Python keywords contain lowercase letters only.\n\n| and | exec\
    \ | not |\n| --- | --- | --- |\n| assert | finally | or |\n| break | for | pass\
    \ |\n| class | from | print |\n| continue | global | raise |\n| def | if | return\
    \ |\n| del | import | try |\n| elif | in | while |\n| else | is | with |\n| except\
    \ | lambda | yield |\n\n### 1.3.4 Lines and Indentation\n\n> Do not try to understand\
    \ the logic at this point of time. Just make sure you understood various blocks\
    \ even if they are without braces.\n\nPython provides no braces to indicate blocks\
    \ of code for class and function definitions or flow control. Blocks of code are\
    \ denoted by line indentation, which is rigidly enforced.\n\nThe number of spaces\
    \ in the indentation is variable, but all statements within the block must be\
    \ indented the same amount. For example –\n\n```\nif True:\n    print \"True\"\
    \nelse:\n    print \"False\"\n```\n\nHowever, the following block generates an\
    \ error –\n\n```\nif True:\nprint \"Answer\"\nprint \"True\"\nelse:\nprint \"\
    Answer\"\nprint \"False\"\n```\n\nThus, in Python all the continuous lines indented\
    \ with same number of spaces would form a block. The following example has various\
    \ statement blocks –\n\n```\n#!/usr/bin/python\nimport sys\n\ntry:\n    # open\
    \ file stream\n    file = open(file_name, \"w\")\nexcept IOError:\n    print \"\
    There was an error writing to\", file_name\n    sys.exit()\nprint \"Enter \",\
    \ file_finish,\nprint \"' When finished\"\nwhile file_text != file_finish:\n \
    \   file_text = raw_input(\"Enter text: \")\n    if file_text == file_finish:\n\
    \        # close the file\n        file.close\n        break\n    file.write(file_text)\n\
    \    file.write(\"\\n\")\nfile.close()\nfile_name = raw_input(\"Enter filename:\
    \ \")\nif len(file_name) == 0:\n    print \"Next time please enter something\"\
    \n    sys.exit()\ntry:\n    file = open(file_name, \"r\")\nexcept IOError:\n \
    \   print \"There was an error reading file\"\n    sys.exit()\nfile_text = file.read()\n\
    file.close()\nprint file_text\n```\n\n### 1.3.5 Multi-Line Statements\n\nStatements\
    \ in Python typically end with a new line. Python does, however, allow the use\
    \ of the line continuation character (\\) to denote that the line should continue.\
    \ For example –\n\n```\ntotal = item_one + \\\n        item_two + \\\n       \
    \ item_three\n```\n\nStatements contained within the [], {}, or () brackets do\
    \ not need to use the line continuation character. For example –\n\n```\ndays\
    \ = ['Monday', 'Tuesday', 'Wednesday',\n        'Thursday', 'Friday']\n```\n\n\
    ### 1.3.6 Quotation in Python\n\nPython accepts single ('), double (\") and triple\
    \ (''' or \"\"\") quotes to denote string literals, as long as the same type of\
    \ quote starts and ends the string.\n\nThe triple quotes are used to span the\
    \ string across multiple lines. For example, all the following are legal –\n\n\
    ```\nword = 'word'\nsentence = \"This is a sentence.\"\nparagraph = \"\"\"This\
    \ is a paragraph. It is\nmade up of multiple lines and sentences.\"\"\"\n```\n\
    \n### 1.3.7 Comments in Python\n\nA hash sign (#) that is not inside a string\
    \ literal begins a comment. All characters after the # and up to the end of the\
    \ physical line are part of the comment and the Python interpreter ignores them.\n\
    \n```\n#!/usr/bin/python\n# First comment\nprint \"Hello, Python!\" # second comment\n\
    ```\n\nThis produces the following result –\n\n```\nHello, Python!\n```\n\nYou\
    \ can type a comment on the same line after a statement or expression –\n\n```\n\
    name = \"Madisetti\" # This is again comment\n```\n\nYou can comment multiple\
    \ lines as follows –\n\n```\n# This is a comment.\n# This is a comment, too.\n\
    # This is a comment, too.\n# I said that already.\n```\n\n### 1.3.8 Using Blank\
    \ Lines\n\nA line containing only whitespace, possibly with a comment, is known\
    \ as a blank line and Python totally ignores it.\n\nIn an interactive interpreter\
    \ session, you must enter an empty physical line to terminate a multiline statement.\n\
    \n### 1.3.9 Waiting for the User\n\nThe following line of the program displays\
    \ the prompt, the statement saying “Press the enter key to exit”, and waits for\
    \ the user to take action –\n\n```\n#!/usr/bin/python\nraw_input(\"\\n\\nPress\
    \ the enter key to exit.\")\n```\n\nHere, “\\n\\n” is used to create two new lines\
    \ before displaying the actual line. Once the user presses the key, the program\
    \ ends. This is a nice trick to keep a console window open until the user is done\
    \ with an application.\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_32_0.png)\n\
    \nCode block is a lexical structure of source code which is grouped together.\n\
    \n### 1.3.10 Multiple Statements on a Single Line\n\nThe semicolon ( ; ) allows\
    \ multiple statements on the single line given that neither statement starts a\
    \ new **code block**. Here is a sample snip using the semicolon –\n\n```\nimport\
    \ sys; x = 'foo'; sys.stdout.write(x + '\\n')\n```\n\n### 1.3.11 Multiple Statement\
    \ Groups as Suites\n\nA group of individual statements, which make a single code\
    \ block are called **suites** in Python. Compound or complex statements, such\
    \ as if, while, def, and class require a header line and a suite.\n\nHeader lines\
    \ begin the statement (with the keyword) and terminate with a colon ( : ) and\
    \ are followed by one or more lines which make up the suite. For example –\n\n\
    ```\nif expression :\n```"
  mdcn: "我们已经在线搭建了Python编程环境，这样你就可以在学习理论的同时，在线执行所有可用的示例。你可以随意修改任何示例并在线运行。\n\n## 1.3\
    \ Python 基本语法\n\nPython 语言与 **Perl**、C 和 Java 有许多相似之处。然而，这些语言之间也存在一些明确的差异。\n\n\
    ### 1.3.1 第一个 Python 程序\n\n让我们以不同的编程模式来执行程序。\n\n#### 交互式编程\n\n不传递脚本文件作为参数来调用解释器，会显示以下提示符\
    \ –\n\n```\n$ python\nPython 2.4.3 (#1, Nov 11 2010, 13:34:43)\n[GCC 4.1.2 20080704\
    \ (Red Hat 4.1.2-48)] on linux2\nType \"help\", \"copyright\", \"credits\" or\
    \ \"license\" for more information.\n>>>\n```\n\n在 Python 提示符下输入以下文本并按回车键 –\n\n\
    ```\n>>> print \"Hello, Python!\"\n```\n\n如果你运行的是新版本的 Python，那么你需要使用带括号的 print\
    \ 语句，如 **print (\"Hello, Python!\")**;。然而，在 Python 2.4.3 版本中，这会产生以下结果 –\n\n```\n\
    Hello, Python!\n```\n\n#### 脚本式编程\n\n使用脚本参数调用解释器会开始执行脚本，直到脚本执行完毕。当脚本执行完毕后，解释器将不再处于活动状态。\n\
    \n让我们在一个脚本中编写一个简单的 Python 程序。Python 文件的扩展名为 **.py**。在 test.py 文件中输入以下源代码 –\n\n\
    ```\nprint \"Hello, Python!\"\n```\n\n我们假设你已经将 Python 解释器设置在 PATH 变量中。现在，尝试按如下方式运行此程序\
    \ –\n\n```\n$ python test.py\n```\n\n这会产生以下结果 –\n\n```\nHello, Python!\n```\n\n\
    让我们尝试另一种执行 Python 脚本的方法。这是修改后的 test.py 文件 –\n\n```\n#!/usr/bin/python\nprint \"\
    Hello, Python!\"\n```\n\n我们假设你可以在 /usr/bin 目录中找到 Python 解释器。现在，尝试按如下方式运行此程序 –\n\
    \n```\n$ chmod +x test.py    # 这是为了使文件可执行\n$ ./test.py\n```\n\n这会产生以下结果 –\n\n\
    ```\nHello, Python!\n```\n\n### 1.3.2 Python 标识符\n\nPython 标识符是用于标识变量、函数、类、模块或其他对象的名称。标识符以字母\
