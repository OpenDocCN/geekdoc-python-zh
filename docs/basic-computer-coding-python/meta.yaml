    ```\n\n输出：\n\n```\n('Jim', 12)\nJim runs slowly\nTrue\nTrue\nFalse\n```\n\n> **TypeError**\
    \ 是一种意外情况，可能在程序开发的多个阶段出现。因此，类型系统中需要一种检测错误的机制。\n\n```\nTraceback (most recent call\
