  mdcn: "## 5.1.4 实例方法\n\n实例方法在类内部定义，用于获取**实例**的内容。它们也可以用于对对象的属性执行操作。与`__init__`方法一样，第一个参数始终是self：\n\
    \n```python\nclass Dog:\n    # Class Attribute\n    species = 'mammal'\n\n   \
