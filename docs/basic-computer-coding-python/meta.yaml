  md: 'A test runner is a component which orchestrates the execution of tests and
    provides the outcome to the user. The runner may use a graphical interface, a
    textual interface, or return a special value to indicate the results of executing
    the tests.


    The test case and **test fixture** concepts are supported through the TestCase
    and FunctionTestCase classes; the former should be used when creating new tests,
    and the latter can be used when integrating existing test code with a unittest-driven
    framework. When building test fixtures using TestCase, the setUp() and tearDown()
    methods can be overridden to provide initialization and cleanup for the fixture.
    With FunctionTestCase, existing functions can be passed to the constructor for
    these purposes. When the test is run, the fixture initialization is run first;
    if it succeeds, the cleanup method is run after the test has been executed, regardless
    of the outcome of the test. Each instance of the TestCase will only be used to
    run a single test method, so a new fixture is created for each test.


    > **Test fixture**

    is an environment used to consistently test some item, device, or piece of software.


    Test suites are implemented by the TestSuite class. This class allows individual
    tests and test suites to be aggregated; when the suite is executed, all tests
    added directly to the suite and in “child” test suites are run.


    A test runner is an object that provides a single method, run(), which accepts
    a TestCase or TestSuite object as a parameter, and returns a result object. The
    class TestResult is provided for use as the result object. unittest provides the
    TextTestRunner as an example test runner which reports test results on the standard
    error stream by default. Alternate runners can be implemented for other environments
    (such as graphical environments) without any need to derive from a specific class.


