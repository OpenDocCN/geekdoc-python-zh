    # 编辑委员会


    **Aleksandar Mratinković** 于 1988 年 5 月 5 日出生于塞尔维亚阿兰杰洛瓦茨。他毕业于经济高中（2007年），贝尔格莱德旅游学院（2013年），并拥有心理学硕士学位（诺维萨德大学哲学学院）。他涉足心理学多个领域（发展心理学、临床心理学、教育心理学和工业心理学），并发表了多篇科学著作。


    **Dan Piestun（博士）** 目前是以色列的一名初创企业家，致力于农业与生物医学科学的交叉领域，曾任乌拉圭国家农业研究所（INIA）所长兼首席执行官。Dan
    是一位多产的科学家，在其职业生涯中获得了许多荣誉，包括两次获得耶路撒冷希伯来大学颁发的 Amit Golda Meir 奖。他的专业领域包括干细胞分子生物学、动植物遗传学和生物信息学。Dan
    对应用科学和技术解决方案的热情并未阻止他与农民、家庭和自然建立深厚联系。他的一些兴趣和实践包括享受养蜂和乘船钓鱼。


    **Hazem Shawky Fouda** 拥有农业科学博士学位，于 2008 年从亚历山大大学农学院获得博士学位，目前在棉花仲裁与测试总组织（CATGO）工作。


    **Felecia Killings** 是 LiyahAmore Publishing 的创始人兼首席执行官，这是一家致力于为基督教作家提供技术和教育服务与产品的出版公司。她担任高级编辑兼作家、高级写作教练、内容营销专家、公司季刊杂志主编、国际虚拟网络的执行官兼主持人，以及公司作家在线学校的执行主任。她曾是高中英语教师和专业发展教授。她拥有教育学硕士学位以及英语和非裔美国人研究学士学位。


    **Sandra El Hajj 博士**，拥有美国佛罗里达州诺瓦东南大学健康科学博士学位，是一名专注于预防和全球健康领域的健康专业人士。她在贝鲁特一所著名大学以及佛罗里达州两所顶尖大学接受了
    12 年的教育，Sandra 博士确保在她的工作中融入跨学科和多文化方法。她多年的学习帮助她创建了自己的微型知识世界，将医疗保健领域与医学研究、统计学、食品技术、环境与职业健康、预防健康以及她最珍贵的最后一个学位——全球健康联系在一起。直到今天，她仍是中东地区第一位也是唯一一位专攻全球健康的博士。


    **Fozia Parveen** 拥有牛津大学可持续水利工程博士学位。此前，她获得了巴基斯坦伊斯兰堡国立科技大学（NUST）环境科学硕士学位，以及拉瓦尔品第法蒂玛·真纳女子大学（FJWU）环境科学学士学位。


    **Igor Krunic** 2003-2007 年在经济学院学习。2007 年毕业后，他继续在贝尔格莱德大学旅游学院学习，并于 2010 年获得学士学位。他在三年级时曾担任学生议会代表。随后，他进入诺维萨德大学科学学院，并于
    2013 年成功通过硕士论文答辩。他学业的巅峰之作是题为“查查克文化旅游发展机遇”的论文。后来，他加入了一家跨国公司，并晋升为物流副主任。如今，他是旅游领域的顾问和学术主题作家。


    **Jovan Pechevski 博士** 于 2007 年在澳大利亚墨尔本皇家墨尔本理工大学获得计算机科学博士学位。他的研究兴趣包括大数据、商业智能和预测分析、数据与信息科学、信息检索、XML、Web
    服务和服务导向架构，以及关系型和 NoSQL 数据库系统。他已发表 30 多篇期刊和会议论文，并担任期刊和会议审稿人。他目前在马其顿斯科普里的欧洲大学担任院长兼副教授。


    **Tanjina Nur 博士** 于 2014 年在悉尼科技大学（UTS）完成土木与环境工程博士学位。现在她在水与废水技术中心（CTWW）担任博士后研究员，已发表约八篇国际期刊论文，被引用
    80 次。她的研究兴趣是利用吸附过程进行废水处理技术。


    **Stephen** 于 2013 年在北卡罗来纳大学夏洛特分校获得博士学位，其研究生研究重点是癌症免疫学和肿瘤微环境。他在维克森林再生医学研究所接受了再生和转化医学的博士后培训，具体方向是胃肠道组织工程。目前，Stephen
    在福赛斯技术社区学院担任解剖学和生理学以及生物学讲师。


    **Michelle** 拥有凤凰城大学工商管理硕士学位，主修人力资源管理。她是一名专业作家，在《亨利县时报》上发表了多篇文章，并为美国各地的多个 YMCA
    组织编写和修订了多本员工手册。'
