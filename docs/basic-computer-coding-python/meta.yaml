  md: 'More efficient than re.findall() is re.**finditer**(regex, subject). It returns
    an iterator that enables you to loop over the regex matches in the subject string:
    for m in re.finditer(regex, subject). The for-loop variable m is a Match object
    with the details of the current match.


    Unlike re.search() and re.match(), re.findall() and re.finditer() do not support
    an optional third parameter with regex matching flags. Instead, you can use global
    mode modifiers at the start of the regex. E.g. "(?i)regex" matches regex case
    insensitively.


