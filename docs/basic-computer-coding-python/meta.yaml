  md: "# Instance Attributes\n\nAll classes create objects, and all objects contain\
    \ characteristics called attributes (referred to as properties in the opening\
    \ paragraph). Use the __init__() method to initialize (e.g., specify) an object’s\
    \ initial attributes by giving them their default value (or state). This method\
    \ must have at least one argument as well as the self variable, which refers to\
    \ the object itself (e.g., Dog).\n\n```\n:class Dog\nInitializer / Instance Attributes\
    \ #\n:(def __init__(self, name, age\nself.name = name\nself.age = age\n```\n\n\
    In the case of our Dog() class, each dog has a specific name and age, which is\
    \ obviously important to know for when you start actually creating different dogs.\
    \ Remember: the class is just for defining the Dog, not actually creating instances\
    \ of individual dogs with specific names and ages; we’ll get to that shortly\n\
    \nSimilarly, the self variable is also an instance of the class. Since instances\
    \ of a class have varying values we could state Dog.name = name rather than self.name\
    \ = name. But since not all dogs share the same name, we need to be able to assign\
    \ different values to different instances. Hence the need for the special self\
    \ variable, which will help to keep track of individual instances of each class\n\
    \nYou will never have to call the __init__() method; it gets called automatically\
    \ when you create a new ‘Dog’ instance\n\n# Class Attributes\n\nWhile instance\
    \ attributes are specific to each object, class attributes are the same for all\
    \ instances—which in this case is all dogs.\n\n```\nclass Dog:\n\n    # Class\
    \ Attribute\n    species = ‘mammal’\n\n    # Initializer / Instance Attributes\n\
    \    def __init__(self, name, age):\n        self.name = name\n        self.age\
    \ = age\n```"
