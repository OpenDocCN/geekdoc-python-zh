    The module ‘threading’, for Python, helps us with thread-based parallelism. It
    constructs higher-level threading interfaces on top of the lower level _thread
    module. Where _thread is missing, we cannot use threading. For such situations,
    we have dummy_threading.


    > The fork function creates a copy of the process, all memory pages are copied,
