- md: "## 9.5.3 Other Ways to Connect Python and MySQL\n\nIn this tutorial, you saw\
    \ MySQL Connector/Python, which is the officially recommended means of interacting\
    \ with a MySQL database from a Python application. There are two other popular\
    \ connectors:\n\n- mysqlclient is a library that is a close competitor to the\
    \ official connector and is actively updated with new features. Because its core\
    \ is written in C, it has better performance than the pure-Python official connector.\
    \ A big drawback is that it’s fairly difficult to set up and install, especially\
    \ on Windows.\n- MySQLdb is a legacy software that’s still used in commercial\
    \ applications. It’s written in C and is faster than MySQL Connector/ Python but\
    \ is available only for Python 2.\n\nThese connectors act as interfaces between\
    \ your program and a MySQL database, and you send your SQL queries through them.\
    \ But many developers prefer using an object-oriented paradigm rather than SQL\
    \ queries to manipulate data.\n\n**Object-relational mapping (ORM)** is a technique\
    \ that allows you to query and manipulate data from a database directly using\
    \ an object-oriented language. An ORM library encapsulates the code needed to\
    \ manipulate data, which eliminates the need to use even a tiny bit of SQL.\n\n\
    Here are the most popular Python ORMs for SQL-based databases:\n\n- SQLAlchemy\
    \ is an ORM that facilitates communication between Python and other SQL databases.\
    \ You can create different engines for different databases like MySQL, PostgreSQL,\
    \ SQLite, and so on. SQLAlchemy is commonly used alongside the pandas library\
    \ to provide complete data-handling functionality.\n- peewee is a lightweight\
    \ and fast ORM that’s quick to set up. This is quite useful when your interaction\
    \ with the database is limited to extracting a few records. For example, if you\
    \ need to copy selected records from a MySQL database into a CSV file, then peewee\
    \ might be your best choice.\n- Django ORM is one of the most powerful features\
    \ of Django and is supplied alongside the Django web framework. It can interact\
