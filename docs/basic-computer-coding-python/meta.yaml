  md: "# Variable scope\n\nPython variable environments, aka “stack frames”, have\
    \ many of the qualities of objects. They are dictionaries of names with the same\
    \ kind of inheritance semantics. That is, variables used in a function by default\
    \ refer to global names, but if a variable is assigned to in the function, it\
    \ becomes local. The same applies to class definitions.\n\nOne can imagine also\
    \ designing variable scope with a Chain of Responsibility. In fact, some languages\
    \ do this, even ones which don’t have the corresponding notion of inheritance.\
    \ *Structure and Interpretation* of Computer Programs uses it to describe Scheme’s\
    \ method of variable scope. The Self language actually treats environments as\
    \ objects and uses inheritance to implement lexical scope!\n\nHowever, Python\
    \ does not take this approach, probably for efficiency reasons. Python does not\
    \ allow more than two simultaneous environments (the global and the local), as\
    \ noted in the PLE exercise on nested scopes. This allows certain optimizations,\
    \ like the LOAD_FAST bytecode, but can confuse programmers used to lexical scoping.\
    \ The following C++ fragment has no equivalent in Python:\n\n```\nint x = 1;\n\
    if(x > y) {\n    int x = 2;\n    cout << x;    // prints 2\n}\ncout << x;    //\
    \ prints 1\n```\n\nScheme programmers may wonder: then how does Python implement\
    \ lambda? The escape was to abandon lexical scoping for lambda. The body of a\
    \ lambda only has the global and local environments."
