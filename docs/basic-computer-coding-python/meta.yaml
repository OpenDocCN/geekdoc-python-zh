- md: "## 5.2 METHODS OF OOPS\n\nPython has been an object-oriented language from\
    \ day one. Because of this, creating and using classes and objects are downright\
    \ easy. If you don't have any experience with object-oriented (OO) programming.\n\
    \nMethods are functions defined inside the body of a class. They are used to define\
    \ the behaviors of an object.\n\n## Creating Methods in Python\n\n```python\n\
    class Parrot:\n\n    # instance attributes\n    def __init__(self, name, age):\n\
    \        self.name = name\n        self.age = age\n\n    # instance method\n \
    \   def sing(self, song):\n        return \"{} sings {}\".format(self.name, song)\n\
    \    def dance(self):\n        return \"{} is now dancing\".format(self.name)\n\
    # instantiate the object\nblu = Parrot(\"Blu\", 10)\n# call our instance methods\n\
    print(blu.sing(\"Happy\"))\nprint(blu.dance())\n```\n\nWhen we run program, the\
    \ output will be:\n\nBlu sings 'Happy'\nBlu is now dancing\n\nIn the above program,\
    \ we define two methods i.e sing() and dance(). These are called instance method\
    \ because they are called on an instance object i.e blu.\n\n### 5.2.1 Inheritance\n\
    \nInheritance is a way of creating new class for using details of existing class\
    \ without modifying it. The newly formed class is a derived class (or child class).\
    \ Similarly, the existing class is a **base class** (or parent class).\n\n**Python\
    \ Inheritance Syntax**\n\n```python\nclass BaseClass:\n    Body of base class\n\
    class DerivedClass(BaseClass):\n    Body of derived class\n```\n\nDerived class\
    \ inherits features from the base class, adding new features to it. This results\
    \ into re-usability of code.\n\n## Use of Inheritance in Python\n\n```python\n\
    # parent class\nclass Bird:\n\n    def __init__(self):\n        print(\"Bird is\
    \ ready\")\n\n    def whoisThis(self):\n        print(\"Bird\")\n\n    def swim(self):\n\
    \        print(\"Swim faster\")\n\n# child class\nclass Penguin(Bird):\n    def\
    \ __init__(self):\n        # call super() function\n        super().__init__()\n\
    \        print(\"Penguin is ready\")\n\n    def whoisThis(self):\n        print(\"\
    Penguin\")\n\n    def run(self):\n        print(\"Run faster\")\n\npeggy = Penguin()\n\
    peggy.whoisThis()\npeggy.swim()\npeggy.run()\n```\n\nWhen we run this program,\
    \ the output will be:\n\n- Bird is ready\n- Penguin is ready\n- Penguin\n- Swim\
    \ faster\n- Run faster\n\nIn the above program, we created two classes i.e. Bird\
    \ (parent class) and Penguin (child class). The child class inherits the functions\
    \ of parent class. We can see this from swim() method. Again, the child class\
    \ modified the behavior of parent class. We can see this from whoisThis() method.\
    \ Furthermore, we extend the functions of parent class, by creating a new run()\
    \ method.\n\nAdditionally, we use super() function before __init__() method. This\
    \ is because we want to pull the content of __init__() method from the parent\
    \ class into the child class.\n\nTo demonstrate the use of inheritance, let us\
    \ take an example.\n\nA polygon is a closed figure with 3 or more sides. Say,\
    \ we have a class called Polygon defined as follows.\n\n```python\nclass Polygon:\n\
    \    def __init__(self, no_of_sides):\n        self.n = no_of_sides\n        self.sides\
    \ = [0 for i in range(no_of_sides)]\n\n    def inputSides(self):\n        self.sides\
    \ = [float(input(\"Enter side \"+str(i+1)+\" : \")) for i in range(self.n)]\n\n\
    \    def dispSides(self):\n        for i in range(self.n):\n            print(\"\
    Side\",i+1,\"is\",self.sides[i])\n```\n\nThis class has data attributes to store\
    \ the number of sides, *n* and magnitude of each side as a list, *sides*.\n\n\
    Method inputSides() takes in magnitude of each side and similarly, dispSides()\
    \ will display these properly.\n\nA triangle is a polygon with 3 sides. So, we\
    \ can created a class called Triangle which inherits from Polygon. This makes\
    \ all the attributes available in class Polygon readily available in Triangle.\
    \ We don't need to define them again (code re-usability). Triangle is defined\
    \ as follows.\n\n```python\nclass Triangle(Polygon):\n    def __init__(self):\n\
    \        Polygon.__init__(self,3)\n\n    def findArea(self):\n        a, b, c\
    \ = self.sides\n        # calculate the semi-perimeter\n        s = (a + b + c)\
    \ / 2\n        area = (s*(s-a)*(s-b)*(s-c)) ** 0.5\n        print('The area of\
    \ the triangle is %0.2f' %area)\n```\n\nHowever, class Triangle has a new method\
    \ findArea() to find and print the area of the triangle. Here is a sample run.\n\
    \n```python\n>>> t = Triangle()\n>>> t.inputSides()\nEnter side 1 : 3\nEnter side\
    \ 2 : 5\nEnter side 3 : 4\n>>> t.dispSides()\nSide 1 is 3.0\nSide 2 is 5.0\nSide\
    \ 3 is 4.0\n>>> t.findArea()\nThe area of the triangle is 6.00\n```\n\nWe can\
    \ see that, even though we did not define methods like inputSides() or dispSides()\
    \ for class Triangle, we were able to use them.\n\nIf an attribute is not found\
    \ in the class, search continues to the base class. This repeats recursively,\
    \ if the base class is itself derived from other classes.\n\n### 5.2.2 Encapsulation\n\
    \nEncapsulation is the packing of *data* and *functions operating on that data*\
    \ into a single component and restricting the access to some of the object's components.\
    \ Encapsulation means that the internal representation of an object is generally\
    \ hidden from view outside of the object's definition.\n\nA class is an example\
    \ of encapsulation as it encapsulates all the data that is member functions, variables\
    \ etc.\n\nDifference between Abstraction and Encapsulation: Abstraction is a mechanism\
    \ which represent the essential features without including implementation details.\n\
    \nEncapsulation: — Information hiding.\n\nAbstraction: — Implementation hiding.\n\
    \nPython follows the philosophy of we're all adults here with respect to hiding\
    \ attributes and methods; i.e. you should trust the other programmers who will\
    \ use your classes. Use plain attributes whenever possible.\n\nYou might be tempted\
    \ to use getter and setter methods instead of attributes, but the only reason\
    \ to use getters and setters is so you can change the implementation later if\
    \ you need to. However, Python 2.2 and later allows you to do this with properties:\n\
    \n## Protected members\n\nProtected member is accessible only from within the\
    \ class and it's subclasses. How to accomplish this in Python? The answer is —\
    \ by convention. By prefixing the name of your member with a single underscore,\
    \ you’re telling others “don’t touch this, unless you’re a subclass”.\n\n## Private\
    \ members\n\nBut there is a method in Python to define Private: Add “__” (double\
    \ underscore) in front of the variable and function name can hide them when accessing\
    \ them from out of class. Python doesn’t have real private methods, so one underline\
    \ in the beginning of a method or attribute means you shouldn’t access this method.\
    \ But this is just convention. And can still access the variables with single\
    \ underscore. Also when using double underscore (__) we can still access the private\
    \ variables.\n\nAn example of accessing private member data. (Using name mangling)\n\
    \n```python\nclass Person:\n    def __init__(self):\n        self.name = 'Manjula'\n\
    \        self.__lastname = 'Dube'\n    def PrintName(self):\n        return self.name\
    \ + ' ' + self.__lastname\n\n#Outside class\nP = Person()\nprint(P.name)\nprint(P.PrintName())\n\
    print(P.__lastname)\n#AttributeError: 'Person' object has no attribute '__lastname'\n\
    ```\n\nAccess public variable out of class, succeed.\nAccess private variable\
    \ out of class, fail.\nAccess public function but this function access **Private\
    \ variable __B** successfully since they are in the same class.\n\nAn example\
    \ of accessing private member data. (Using name mangling technique)\n\n```python\n\
    class SeeMee:\n    def youcanseeme(self):\n        return 'you can see me'\n\n\
    \    def __youcannotseeme(self):\n        return 'you cannot see me'\n\n#Outside\
    \ class\nCheck = SeeMee()\nprint(Check.youcanseeme())\n# you can see me\nprint(Check.__youcannotseeme())\n\
    #AttributeError: 'SeeMee' object has no attribute '__youcannotseeme'\n```\n\n\
    If you need to access the private member function:\n\n```python\nclass SeeMee:\n\
    \    def youcanseeme(self):\n        return 'you can see me'\n    def __youcannotseeme(self):\n\
    \        return 'you cannot see me'\n#Outside class\nCheck = SeeMee()\nprint(Check.youcanseeme())\n\
    print(Check._SeeMee__youcannotseeme())\n#Changing the name causes it to access\
    \ the function\n```\n\nYou can still call the method using its mangled name, so\
    \ this feature doesn't provide much protection.\n\n> The __init__ method is a\
    \ constructor and runs as soon as an object of a class is instantiated. Its aim\
    \ is to initialize the object.\n\n> Private variables, are variables that are\
    \ visible only to the class to which they belong."
  mdcn: "## 5.2 面向对象编程的方法\n\nPython 从一开始就是一门面向对象的语言。正因如此，创建和使用类与对象变得非常简单。如果你没有任何面向对象编程的经验。\n\
    \n方法是在类体内部定义的函数。它们用于定义对象的行为。\n\n## 在 Python 中创建方法\n\n```python\nclass Parrot:\n\
    \n    # 实例属性\n    def __init__(self, name, age):\n        self.name = name\n \
    \       self.age = age\n\n    # 实例方法\n    def sing(self, song):\n        return\
    \ \"{} sings {}\".format(self.name, song)\n    def dance(self):\n        return\
    \ \"{} is now dancing\".format(self.name)\n# 实例化对象\nblu = Parrot(\"Blu\", 10)\n\
    # 调用我们的实例方法\nprint(blu.sing(\"Happy\"))\nprint(blu.dance())\n```\n\n当我们运行程序时，输出将是：\n\
    \nBlu sings 'Happy'\nBlu is now dancing\n\n在上面的程序中，我们定义了两个方法，即 `sing()` 和 `dance()`。它们被称为实例方法，因为它们是在实例对象（即\
    \ `blu`）上调用的。\n\n### 5.2.1 继承\n\n继承是一种在不修改现有类的情况下，利用其详细信息创建新类的方式。新形成的类是派生类（或子类）。同样，现有的类是**基类**（或父类）。\n\
    \n**Python 继承语法**\n\n```python\nclass BaseClass:\n    基类的主体\nclass DerivedClass(BaseClass):\n\
    \    派生类的主体\n```\n\n派生类从基类继承特性，并为其添加新特性。这导致了代码的可重用性。\n\n## 在 Python 中使用继承\n\n\
    ```python\n# 父类\nclass Bird:\n\n    def __init__(self):\n        print(\"Bird\
    \ is ready\")\n\n    def whoisThis(self):\n        print(\"Bird\")\n\n    def\
    \ swim(self):\n        print(\"Swim faster\")\n\n# 子类\nclass Penguin(Bird):\n\
    \    def __init__(self):\n        # 调用 super() 函数\n        super().__init__()\n\
    \        print(\"Penguin is ready\")\n\n    def whoisThis(self):\n        print(\"\
    Penguin\")\n\n    def run(self):\n        print(\"Run faster\")\n\npeggy = Penguin()\n\
    peggy.whoisThis()\npeggy.swim()\npeggy.run()\n```\n\n当我们运行这个程序时，输出将是：\n\n- Bird\
    \ is ready\n- Penguin is ready\n- Penguin\n- Swim faster\n- Run faster\n\n在上面的程序中，我们创建了两个类，即\
    \ `Bird`（父类）和 `Penguin`（子类）。子类继承了父类的函数。我们可以从 `swim()` 方法中看到这一点。同样，子类修改了父类的行为。我们可以从\
    \ `whoisThis()` 方法中看到这一点。此外，我们通过创建一个新的 `run()` 方法扩展了父类的功能。\n\n另外，我们在 `__init__()`\
    \ 方法之前使用了 `super()` 函数。这是因为我们想将父类 `__init__()` 方法的内容引入到子类中。\n\n为了演示继承的使用，让我们举一个例子。\n\
    \n多边形是一个具有 3 条或更多边的封闭图形。假设我们有一个名为 `Polygon` 的类，定义如下。\n\n```python\nclass Polygon:\n\
    \    def __init__(self, no_of_sides):\n        self.n = no_of_sides\n        self.sides\
    \ = [0 for i in range(no_of_sides)]\n\n    def inputSides(self):\n        self.sides\
    \ = [float(input(\"Enter side \"+str(i+1)+\" : \")) for i in range(self.n)]\n\n\
    \    def dispSides(self):\n        for i in range(self.n):\n            print(\"\
    Side\",i+1,\"is\",self.sides[i])\n```\n\n这个类有数据属性来存储边的数量 *n* 和每条边的长度（作为一个列表 *sides*）。\n\
    \n方法 `inputSides()` 接收每条边的长度，同样，`dispSides()` 将正确地显示这些信息。\n\n三角形是一个有 3 条边的多边形。因此，我们可以创建一个名为\
    \ `Triangle` 的类，它继承自 `Polygon`。这使得 `Polygon` 类中的所有属性在 `Triangle` 中都可直接使用。我们不需要再次定义它们（代码可重用性）。`Triangle`\
    \ 定义如下。\n\n```python\nclass Triangle(Polygon):\n    def __init__(self):\n    \
    \    Polygon.__init__(self,3)\n\n    def findArea(self):\n        a, b, c = self.sides\n\
    \        # 计算半周长\n        s = (a + b + c) / 2\n        area = (s*(s-a)*(s-b)*(s-c))\
    \ ** 0.5\n        print('The area of the triangle is %0.2f' %area)\n```\n\n然而，`Triangle`\
    \ 类有一个新的方法 `findArea()` 来计算并打印三角形的面积。这是一个示例运行。\n\n```python\n>>> t = Triangle()\n\
    >>> t.inputSides()\nEnter side 1 : 3\nEnter side 2 : 5\nEnter side 3 : 4\n>>>\
    \ t.dispSides()\nSide 1 is 3.0\nSide 2 is 5.0\nSide 3 is 4.0\n>>> t.findArea()\n\
    The area of the triangle is 6.00\n```\n\n我们可以看到，即使我们没有为 `Triangle` 类定义像 `inputSides()`\
    \ 或 `dispSides()` 这样的方法，我们仍然能够使用它们。\n\n如果在类中找不到某个属性，搜索会继续到基类。如果基类本身是从其他类派生的，这个过程会递归重复。\n\
    \n### 5.2.2 封装\n\n封装是将*数据*和*操作该数据的函数*打包到一个单一组件中，并限制对对象某些组件的访问。封装意味着对象的内部表示通常对外部隐藏，无法从对象定义外部看到。\n\
    \n类是封装的一个例子，因为它封装了所有数据，包括成员函数、变量等。\n\n抽象与封装的区别：抽象是一种机制，它表示本质特征而不包含实现细节。\n\n封装：——信息隐藏。\n\
    \n抽象：——实现隐藏。\n\nPython 在隐藏属性和方法方面遵循“我们都是成年人”的哲学；即你应该信任其他将使用你的类的程序员。尽可能使用普通属性。\n\
    \n你可能会倾向于使用 getter 和 setter 方法而不是属性，但使用 getter 和 setter 的唯一原因是，如果需要，你可以在以后更改实现。然而，Python\
    \ 2.2 及更高版本允许你使用属性来实现这一点：\n\n## 受保护成员\n\n受保护成员只能从类内部及其子类访问。在 Python 中如何实现这一点？答案是——通过约定。通过在成员名称前加上单个下划线，你是在告诉其他人“不要碰这个，除非你是子类”。\n\
    \n## 私有成员\n\n但 Python 中有一种定义私有成员的方法：在变量和函数名前添加“__”（双下划线），可以在从类外部访问时隐藏它们。Python\
    \ 没有真正的私有方法，所以方法或属性开头的单个下划线意味着你不应该访问这个方法。但这只是约定。仍然可以访问带单个下划线的变量。另外，当使用双下划线（__）时，我们仍然可以访问私有变量。\n\
    \n一个访问私有成员数据的例子。（使用名称修饰）\n\n```python\nclass Person:\n    def __init__(self):\n\
    \        self.name = 'Manjula'\n        self.__lastname = 'Dube'\n    def PrintName(self):\n\
    \        return self.name + ' ' + self.__lastname\n\n# 类外部\nP = Person()\nprint(P.name)\n\
    print(P.PrintName())\nprint(P.__lastname)\n#AttributeError: 'Person' object has\
    \ no attribute '__lastname'\n```\n\n在类外部访问公共变量，成功。\n在类外部访问私有变量，失败。\n访问公共函数，但此函数成功访问了**私有变量\
    \ __B**，因为它们在同一个类中。\n\n一个访问私有成员数据的例子。（使用名称修饰技术）\n\n```python\nclass SeeMee:\n\
    \    def youcanseeme(self):\n        return 'you can see me'\n\n    def __youcannotseeme(self):\n\
    \        return 'you cannot see me'\n\n# 类外部\nCheck = SeeMee()\nprint(Check.youcanseeme())\n\
    # you can see me\nprint(Check.__youcannotseeme())\n#AttributeError: 'SeeMee' object\
    \ has no attribute '__youcannotseeme'\n```\n\n如果你需要访问私有成员函数：\n\n```python\nclass\
    \ SeeMee:\n    def youcanseeme(self):\n        return 'you can see me'\n    def\
    \ __youcannotseeme(self):\n        return 'you cannot see me'\n# 类外部\nCheck =\
    \ SeeMee()\nprint(Check.youcanseeme())\nprint(Check._SeeMee__youcannotseeme())\n\
    #更改名称使其能够访问该函数\n```\n\n你仍然可以使用其修饰后的名称调用该方法，因此此功能并不能提供太多保护。\n\n> `__init__` 方法是一个构造函数，一旦类的对象被实例化就会运行。它的目的是初始化对象。\n\
    \n> 私有变量是仅对其所属类可见的变量。"
