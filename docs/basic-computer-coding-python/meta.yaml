    \ method\n    def speak(self, sound):\n        return \"{} says {}\".format(self.name,\
    \ sound)\n```\n\n```python\n# Child class (inherits from Dog class)\nclass RussellTerrier(Dog):\n\
    \    def run(self, speed):\n        return \"{} runs {}\".format(self.name, speed)\n\
    ```\n\n```python\n# Child class (inherits from Dog class)\nclass Bulldog(Dog):\n\
    \    def run(self, speed):\n        return \"{} runs {}\".format(self.name, speed)\n\
    ```\n\n```python\n# Child classes inherit attributes and\n# behaviors from the\
    \ parent class\njim = Bulldog(\"Jim\", 12)\nprint(jim.description())\nprint(jim.run(\"\
    slowly\"))\n```\n\n在研究这个程序时，大声朗读注释以帮助你理解发生了什么，然后在运行程序之前，看看你是否能预测预期的输出。\n\n你应该看到：\n\
    \n```\nJim is 12 years old\nJim runs slowly\n```\n\n我们还没有添加任何特殊属性或方法来区分`RussellTerrier`和`Bulldog`，但由于它们现在是两个不同的类，我们可以例如给它们不同的类属性来定义它们各自的速度。\n\
    \n## 父类与子类\n\n`isinstance()`函数用于确定一个实例是否也是某个父类的实例。\n\n将其保存为`dog_isinstance.py`：\n\
    \n```python\n# Parent class\nclass Dog:\n    # Class attribute\n    species =\
    \ 'mammal'\n\n    # Initializer / Instance attributes\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n\n    # instance\
    \ method\n    def description(self):\n        return \"{} is {} years old\".format(self.name,\
    \ self.age)\n\n    # instance method\n    def speak(self, sound):\n        return\
    \ \"{} says {}\".format(self.name, sound)\n```\n\n```python\n# Child class (inherits\
