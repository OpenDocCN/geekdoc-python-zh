    ## 7.2.4 RLock 对象


    RLock 是学习 Python 多线程时非常重要的主题。RLock 是一个可重入锁。它是一种同步原语，某个线程可以反复获取它。它使用诸如‘拥有线程’和‘递归级别’以及已锁定/未锁定状态等概念来实现这一点。当锁定时，RLock
    属于某个线程；但当未锁定时，没有线程拥有它。


