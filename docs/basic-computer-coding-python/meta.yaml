    \ to produce bytecode that runs faster.\n- The regular expression language is\
    \ relatively small and restricted, so not all possible string processing tasks\
    \ can be done using regular expressions. There are also tasks that can be done\
    \ with regular expressions, but the expressions turn out to be very complicated.\n\
    - Python is a high level open source scripting language. Python’s built-in “re”\
    \ module provides excellent support for regular expressions, with a modern and\
    \ complete regex flavor.\n- Python offers two different primitive operations based\
    \ on regular expressions: match checks for a match only at the beginning of the\
    \ string, while search checks for a match anywhere in the string (this is what\
    \ Perl does by default).\n- Except for control characters, (+ ? . * ^ $ ( ) [\
    \ ] { } | \\), all characters match themselves. You can escape a control character\
    \ by preceding it with a backslash.\n\n## KNOWLEDGE CHECK\n\n1. The character\
    \ Dot (that is, '.') in the default mode, matches any character other than ....................\n\
    \   - a. caret\n   - b. ampersand\n   - c. percentage symbol\n   - d. newline\n\
    \n2. The expression a{5} will match .................... characters with the previous\
    \ regular expression.\n   - a. 5 or less\n   - b. exactly 5\n   - c. 5 or more\n\
    \   - d. exactly 4\n\n3. Choose the function whose output can be: `<_sre.SRE_Match\
    \ object; span=(4, 8), match='aaaa'>`.\n   - a. `>>> re.search('aaaa', \"alohaaaa\"\
