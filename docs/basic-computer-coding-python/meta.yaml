- md: "## 5.1 INTRODUCTION OF OOPS IN PYTHON\n\nObject-oriented Programming, or OOP\
    \ for short, is a programming paradigm which provides a means of structuring programs\
    \ so that properties and behaviors are bundled into individual objects.\n\nFor\
    \ instance, an object could represent a person with a name property, age, address,\
    \ etc., with behaviors like walking, talking, breathing, and running. Or an email\
    \ with properties like recipient list, subject, body, etc., and behaviors like\
    \ adding attachments and sending.\n\nPut another way, object-oriented programming\
    \ is an approach for modeling concrete, real-world things like cars as well as\
    \ relations between things like companies and employees, students and teachers,\
    \ etc. OOP models real-world entities as software objects, which have some data\
    \ associated with them and can perform certain functions.\n\nAnother common programming\
    \ paradigm is procedural programming which structures a program like a recipe\
    \ in that it provides a set of steps, in the form of functions and code blocks,\
    \ which flow sequentially in order to complete a task.\n\nThe key takeaway is\
    \ that objects are at the center of the object-oriented programming paradigm,\
    \ not only representing the data, as in procedural programming, but in the overall\
    \ structure of the program as well.\n\n### 5.1.1 Classes in Python\n\nFocusing\
    \ first on the data, each thing or object is an instance of some class. The primitive\
    \ data structures available in Python, like numbers, strings, and lists are designed\
    \ to represent simple things like the cost of something, the name of a poem, and\
    \ your favorite colors, respectively. What if you wanted to represent something\
    \ much more complicated?\n\nFor example, let’s say you wanted to track a number\
    \ of different animals. If you used a list, the first element could be the animal’s\
    \ name while the second element could represent its age. How would you know which\
    \ element is supposed to be which? What if you had 100 different animals? Are\
    \ you certain each animal has both a name and an age, and so forth? What if you\
    \ wanted to add other properties to these animals? This lacks organization, and\
    \ it’s the exact need for classes. Classes are used to create new user-defined\
    \ data structures that contain arbitrary information about something. In the case\
    \ of an animal, we could create an Animal() class to track properties about the\
    \ Animal like the name and age. It’s important to note that a class just provides\
    \ structure—it’s a blueprint for how something should be defined, but it doesn’t\
    \ actually provide any real content itself. The Animal() class may specify that\
    \ the name and age are necessary for defining an animal, but it will not actually\
    \ state what a specific animal’s name or age is. It may help to think of a class\
    \ as an idea for how something should be defined.\n\n### 5.1.2 Python Objects\
    \ (Instances)\n\nWhile the class is the blueprint, an *instance* is a copy of\
    \ the class with *actual* values, literally an object belonging to a specific\
    \ class. It’s not an idea anymore; it’s an actual animal, like a dog named Roger\
    \ who’s eight years old.\n\nPut another way, a class is like a form or questionnaire.\
    \ It defines the needed information. After you fill out the form, your specific\
    \ copy is an instance of the class; it contains actual information relevant to\
    \ you.\n\nYou can fill out multiple copies to create many different instances,\
    \ but without the form as a guide, you would be lost, not knowing what information\
    \ is required. Thus, before you can create individual instances of an object,\
    \ we must first specify what is needed by defining a class.\n\n### How to Define\
    \ a Class in Python\n\nDefining a class is simple in Python:\n\n```python\nclass\
    \ Dog:\n    pass\n```\n\nYou start with the class keyword to indicate that you\
    \ are creating a class, then you add the name of the class (using CamelCase notation,\
    \ starting with a capital letter.)\n\nAlso, we used the Python keyword pass here.\
    \ This is very often used as a place holder where code will eventually go. It\
    \ allows us to run this code without throwing an error.\n\nThe above code is correct\
    \ on Python 3. On Python 2.x (“legacy Python”) you’d use a slightly different\
    \ class definition:\n\n```python\n# Python 2.x Class Definition:\nclass Dog(object):\n\
    \    pass\n```\n\nThe (object) part in parentheses specifies the parent class\
    \ that you are inheriting from. In Python 3 this is no longer necessary because\
    \ it is the implicit default.\n\n### Instance Attributes\n\nAll classes create\
    \ objects, and all objects contain characteristics called attributes (referred\
    \ to as properties in the opening paragraph). Use the `__init__()` method to initialize\
    \ (e.g., specify) an object’s initial attributes by giving them their default\
    \ value (or state). This method must have at least one argument as well as the\
    \ self variable, which refers to the object itself (e.g., Dog).\n\n```python\n\
    class Dog:\n    # Initializer / Instance Attributes\n    def __init__(self, name,\
    \ age):\n        self.name = name\n        self.age = age\n```\n\nIn the case\
    \ of our Dog() class, each dog has a specific name and age, which is obviously\
    \ important to know for when you start actually creating different dogs. Remember:\
    \ the class is just for defining the Dog, not actually creating instances of individual\
    \ dogs with specific names and ages; we’ll get to that shortly.\n\nSimilarly,\
    \ the self variable is also an instance of the class. Since instances of a class\
    \ have varying values we could state Dog.name = name rather than self.name = name.\
    \ But since not all dogs share the same name, we need to be able to assign different\
    \ values to different instances. Hence the need for the special self variable,\
    \ which will help to keep track of individual instances of each class.\n\nYou\
    \ will never have to call the `__init__()` method; it gets called automatically\
    \ when you create a new ‘Dog’ instance.\n\n### Class Attributes\n\nWhile instance\
    \ attributes are specific to each object, class attributes are the same for all\
    \ instances—which in this case is all dogs.\n\n```python\nclass Dog:\n    # Class\
    \ Attribute\n    species = 'mammal'\n\n    # Initializer / Instance Attributes\n\
    \    def __init__(self, name, age):\n        self.name = name\n        self.age\
    \ = age\n```\n\nSo while each dog has a unique name and age, every dog will be\
    \ a mammal.\n\nLet’s create some dogs…\n\n### 5.1.3 Instantiating Objects\n\n\
    Instantiating is a fancy term for creating a new, unique instance of a class.\n\
    \nFor example:\n\n```python\n>>> class Dog:\n...     pass\n...\n>>> Dog()\n<__main__.Dog\
    \ object at 0x1004ccc50>\n>>> Dog()\n<__main__.Dog object at 0x1004ccc90>\n>>>\
    \ a = Dog()\n>>> b = Dog()\n>>> a == b\nFalse\n```\n\nWe started by defining a\
    \ new Dog() class, then created two new dogs, each assigned to different objects.\
    \ So, to create an instance of a class, you use the class name, followed by parentheses.\
    \ Then to demonstrate that each instance is actually different, we instantiated\
    \ two more dogs, assigning each to a variable, then tested if those variables\
    \ are equal.\n\nWhat do you think the type of a class instance is?\n\n```python\n\
    >>> class Dog:\n...     pass\n...\n>>> a = Dog()\n>>> type(a)\n<class '__main__.Dog'>\n\
    ```\n\nLet’s look at a slightly more complex example…\n\n```python\nclass Dog:\n\
    \    # Class Attribute\n    species = 'mammal'\n\n    # Initializer / Instance\
    \ Attributes\n    def __init__(self, name, age):\n        self.name = name\n \
