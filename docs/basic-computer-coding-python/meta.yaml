    # 7.2.4 RLock Objects


    RLock is very important topic when you learn Python Multithreading. An RLock is
    a reentrant lock. It is a synchronization primitive that a certain thread can
    acquire again and again. It does so using concepts like ‘owning thread’ and ‘recursion
    level’, and locked/unlocked states. When locked, an RLock belongs to a certain
    thread; but when unlocked, no thread owns it.


    Now, how does this work? To lock, a thread calls acquire(). Now that this thread
    owns the lock, it returns. To unlock it, a thread calls release(). It is also
    possible to nest acquire()/release() pairs. The outermost release() resets the
    lock to the ‘unlocked’ state. It also lets another blocked thread to continue.


    Reentrant locks also support CMP(Context Management Protocol).

    This is the class:

    class threading.RLock


    RLock implements reentrant lock objects. Such a lock only release by the thread
    holding it. A thread can acquire it again without blocking. However, it must release
    it once each time it acquires it.'
