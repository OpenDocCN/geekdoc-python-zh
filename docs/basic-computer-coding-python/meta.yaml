    # 9.2.3 Establishing a Connection with MySQL Server


    MySQL is a server-based database management system. One server might contain multiple
    databases. To interact with a database, you must first establish a connection
    with the server. The general workflow of a Python program that interacts with
    a MySQL-based database is as follows:


    +   - Connect to the MySQL server.

    - Create a new database.

    - Connect to the newly created or an existing database.

    - Execute a SQL query and fetch results.

    - Inform the database if any changes are made to a table.

    - Close the connection to the MySQL server.


    > Did You Know?

    Java Database Connectivity (JDBC) is an application programming interface (API)
    for the programming language Java, which defines how a client may access a database.
    It is a Java-based data access technology used for Java database connectivity.
    It is part of the Java Standard Edition platform, from Oracle Corporation.'
