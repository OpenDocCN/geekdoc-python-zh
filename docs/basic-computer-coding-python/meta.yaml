    ## 7.2.3 Lock Objects


    A synchronization primitive, a primitive lock does not belong to a certain thread
    when locked. This is the lowest-level synchronization primitive we currently have
    in Python, and we implement it using the extension module _thread.


    Such a lock can be in one of two states: ‘locked’ and ‘unlocked’. When we create
    a lock, it is in the ‘unlocked’ state. It also has two methods- acquire() and
    release(). When we want to lock it, acquire() changes its state to ‘locked’, and
    immediately returns it. If it was ‘locked’ instead, then acquire() blocks until
    another thread calls release(). This changes the state to ‘unlocked’. Finally,
    acquire() resets it to ‘locked’, and then returns immediately.


    If you try to release a lock that is already unlocked, it raises a RuntimeError.


    These locks also support the CMP (Context Management Protocol).


    When acquire() blocks more than one thread, only one thread continues when release()
    resets the state to ‘unlocked’. Which one, you ask? Well, we cannot say.


    Also, all methods execute atomically.


    This is the class:

    ```python

    class threading.Lock

    ```


    This call implements primitive lock objects. Once a thread acquires a lock, the
    interpreter blocks further attempts to acquire it. Only after it releases, does
    any other thread have a chance in acquiring it. Any thread may release a lock.


    - a. acquire(blocking=True, timeout=-1)

    This method acquires a blocking or non-blocking lock. When *blocking*=True, it
    blocks until the lock unlocks. Then, it changes its state to ‘locked’, and returns
    True. And when it is False, it does not block. A call with *blocking*=True that
    blocks, immediately returns False. Otherwise, it sets the lock to ‘locked’ and
    returns True.


    *timeout* is a floating-point argument. When it has a positive value, it blocks
    for a maximum of *timeout* number of seconds; as long as the lock is not acquirable.
    When it is -1, it denotes an unbounded wait.


    When *blocking* is False, we cannot specify *timeout*.


    Also, if the lock acquires successfully, it returns True; otherwise, False, like
    when *timeout* expires.


    - b. release()

    This method releases a lock. You can call it from any thread. This means that
    any thread can release a lock, no matter which thread has acquired it.


    When ‘locked’, release() resets it to ‘unlocked’, and returns. If other threads
    wait for it to unlock, only one gets to continue once it unlocks.


    When we call release() on an ‘unlocked’ lock, it raises a RuntimeError.


    release() does not return any value.


    ## 7.2.4 RLock Objects


    RLock is very important topic when you learn Python Multithreading. An RLock is
    a reentrant lock. It is a synchronization primitive that a certain thread can
    acquire again and again. It does so using concepts like ‘owning thread’ and ‘recursion
    level’, and locked/unlocked states. When locked, an RLock belongs to a certain
    thread; but when unlocked, no thread owns it.


    Now, how does this work? To lock, a thread calls acquire(). Now that this thread
    owns the lock, it returns. To unlock it, a thread calls release(). It is also
    possible to nest acquire()/release() pairs. The outermost release() resets the
    lock to the ‘unlocked’ state. It also lets another blocked thread to continue.


    Reentrant locks also support CMP (Context Management Protocol).

    This is the class:

    ```python

    class threading.RLock

    ```


    RLock implements reentrant lock objects. Such a lock only release by the thread
    holding it. A thread can acquire it again without blocking. However, it must release
    it once each time it acquires it.


    It has two methods:


    - a. acquire(blocking=True, timeout=-1)


    acquire() lets us acquire a blocking or non-blocking lock. Without arguments,
    if the thread already owns the lock, this method ups the recursion level by one,
    and then returns. If it does not already own it, and another thread owns it, it
    blocks until the lock ‘unlocks’. And once unlocked, and if it does not belong
    to any other thread, acquire() declares ownership and sets recursion level to
    1, and then returns. If more than one thread waits blocked, at once, only one
    will get ownership.


    This method returns no value. Finally, when we set *blocking* to True, it does
    the same things we discussed, and then returns True.


    When *blocking* is False, however, it does not block. When a call without arguments
    blocks, it returns False. Otherwise, it does what it does for a call without arguments,
    and then returns True. And when we call acquire() with *timeout*, which is a floating-point
    number, with a positive value, this blocks for a maximum of *timeout* number of
    seconds, as long as we cannot acquire the lock. If a thread has acquired it, it
    returns True; if *timeout* has elapsed, it returns False.


    - b. release()


    This method releases a lock and decrements the recursion level. Once the decrement
    is 0, it resets the lock to the ‘unlocked’ state. This means no thread owns it.
    If other threads are blocked, only one of them may continue. If the decrement
    is non-zero, the lock stays in the ‘locked’ state, and belongs to the calling
    thread.


    You should only call release() when the calling thread actually owns the lock.
    If it is already ‘unlocked’, this raises a RuntimeError.


    release() returns no value.


    Now lets come to Condition Objects in Python Multithreading.


    ## 7.2.5 Condition Objects


    A condition variable always pertains to a lock, and we can pass it in, or it creates
    by default. When several such condition variables must share a lock, we can pass
    it in. But we do not need to exclusively track a lock; it is a part of the condition
    object. A condition variable follows CMP (Context Management Protocol) in that
    it uses the with-statement to acquire the associated lock as long as the enclosed
    block is alive. acquire() and release() call the lock''s methods.


    For other methods, we must call them with the associated lock the thread holds.
    Once wait() releases the lock, it blocks until another thread wakes it up with
    a call to notify() or notify_all(). After this, wait() acquires the lock again,
    and then returns. We can also specify a *timeout*.


    While notify() awakens one waiting thread, if any, notify_all() awakens all threads
    waiting for the condition variable. Note that these two methods do not release
    the lock. So, the threads awakened do not return from wait() immediately. They
    return only when the calling thread for notify() or notify_all() gives up ownership
    for the lock.


    This is the class:

    ```python

    class threading.Condition(lock=None)

    ```


    Condition implements condition variable objects. A condition variable lets any
    number of threads wait until another thread notifies them.


    If *lock* is not None, and we do pass it, make sure it is a Lock or RLock object.
    This should also serve as the underlying lock, otherwise this creates a new RLock
    object.


    It has the following methods:

    - a. acquire(*args)

    This acquires the underlying lock. It calls the corresponding method on it, and
    returns what that method returns.

    - b. release()

    This releases the underlying lock. It calls the corresponding method on it, and
    returns nothing.

    - c. wait(timeout=None)

    This method waits until a timeout happens or until someone notifies it. If at
    the time of calling wait(), the calling thread does not own the lock, this raises
    a RuntimeError.


    wait() releases the underlying lock, then blocks until a notify()/notify_all()
    call for the same condition variable in another thread wakes it up, or until *timeout*
    happens. And once this happens, it acquires the lock again, and then returns.


    When we do pass *timeout*, and that is not None, make sure it is a floating point
    number denoting a timeout for the operation in seconds or fractions.


    If the underlying lock is an RLock, its release() method does not release it,
    because this does not necessarily unlock it if it was acquired multiple times
    recursively. So, what do we do? We use an internal interface of the RLock class.
    This unlocks it even when it was recursively acquired many times. Then, we use
    another internal interface to restore the **recursion** level when the thread
    acquires the lock again.'
