    If the internal flag is `True`, it returns `True`.


    b. `set()`

    This method sets the internal flag to `True`, and wakes all threads waiting for
    it to become `True`. Once it is `True`, waiting threads do not block at all.


    c. `clear()`

    This resets the internal flag to `False`. Eventually, waiting threads block until
    somebody calls `set()` to set the internal flag to `True` yet again.


    d. `wait(timeout=None)`

    Until the internal flag is `True`, this method blocks. On entry, if it is `True`,
    it returns immediately. Otherwise, it blocks until another thread makes a call
    to `set()` to set the flag to `True`, or until *timeout* happens.

    When *timeout* exists, and is not `None`, make sure it is a floating-point number
    denoting a *timeout* for the operation in seconds or fractions.

