    3. SUV\n10\nWrong choice!\n\nNote: Core Python doesn't support switch-case statements\
    \ that are available in other **programming languages** but we can use the elif\
    \ ladder instead of switch cases.\n\n### 8.1.4 Python Nested if statement\n\n\
    In very simple words, Nested if statements is an if statement inside another if\
    \ statement. Python allows us to stack any number of if statements inside the\
