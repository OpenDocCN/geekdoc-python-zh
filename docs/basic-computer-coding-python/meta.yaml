    \ True}\n```\n\nIn the output, we see that the number of followers jumped from\
    \ the integer value of 305 to 342.\n\nWe can use this method for adding key-value\
    \ pairs to dictionaries with user-input. Let’s write a quick program, usernames.py\
    \ that runs on the command line and allows input from the user to add more names\
    \ and associated usernames:\n\nusernames.py\n\n```\n# Define original dictionary\n\
    usernames = {'Sammy': 'sammy-shark', 'Jamie': 'mantisshrimp54'}\n# Set up while\
    \ loop to iterate\nwhile True:\n\n    # Request user to enter a name\n    print('Enter\
