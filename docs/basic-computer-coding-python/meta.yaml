  md: '# 1.1.1 History of Python


    Python was developed by Guido van Rossum in the late eighties and early nineties
    at the National Research Institute for Mathematics and Computer Science in the
    Netherlands


    Python is derived from many other languages, including ABC, Modula-3, C, C++,
    Algol-68, SmallTalk, and Unix shell and other scripting languages.


    Python is copyrighted. Like Perl, Python source code is now available under the
    GNU General Public License (GPL).


    Python is now maintained by a core development team at the institute, although
    Guido van Rossum still holds a vital role in directing its progress.


    # 1.1.2 Python Features


    Python’s features include –


    +   - **Easy-to-learn** – Python has few keywords, simple structure, and a clearly
    defined syntax. This allows the student to pick up the language quickly.

    - **Easy-to-read** – Python code is more clearly defined and visible to the eyes.

    - **Easy-to-maintain** – Python’s source code is fairly easy-to-maintain.

    - **A broad standard library** – Python’s bulk of the library is very portable
    and cross-platform compatible on UNIX, Windows, and Macintosh.

    - **Interactive Mode** – Python has support for an interactive mode which allows
    interactive testing and debugging of snippets of code.

    - **Portable** – Python can run on a wide variety of hardware platforms and has
    the same interface on all platforms.

    - **Extendable** – You can add low-level modules to the Python interpreter. These
    modules enable programmers to add to or customize their tools to be more efficient.

    - **Databases** – Python provides interfaces to all major commercial databases.


    Created by Guido van Rossum and first released in 1991, Python has a design philosophy
    that emphasizes code readability, notably using significant whitespace. It provides
    constructs that enable clear programming on both small and large scales. In July
    2018, Van Rossum stepped down as the leader in the language community after 30
    years.'
  merge: -1
  pgno: 20
