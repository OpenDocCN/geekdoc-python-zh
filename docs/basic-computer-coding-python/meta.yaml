  - "[PAGE 138]\n\nFor instance you would usually do something like this:\n\n```\n\
    squared = []\nfor x in range(10):\n    squared.append(x**2)\n```\n\nYou can simplify\
    \ it using list comprehensions. For example:\n\n```\nsquared = [x**2 for x in\
    \ range(10)]\n```\n\n# 4.3.2 Dict Comprehensions\n\nThey are used in a similar\
    \ way. Here is an example which I found recently:\n\n```\nmcase = {'a': 10, 'b':\
    \ 34, 'A': 7, 'Z': 3}\nmcase_frequency = {\n    k.lower(): mcase.get(k.lower(),\
    \ 0) + mcase.get(k.upper(), 0)\n    for k in mcase.keys()\n}\n# mcase_frequency\
    \ == {'a': 17, 'z': 3, 'b': 34}\n```\n\nIn the example we are combining the values\
    \ of keys which are same but in different typecase. You can also quickly switch\
    \ keys and values of a dictionary:\n\n```\n{v: k for k, v in some_dict.items()}\n\
    ```\n\n# 4.3.3 Set Comprehensions\n\nThey are also similar to list comprehensions.\
    \ The only difference is that they use braces {}. Here is an example:\n\n```\n\
    squared = {x**2 for x in [1, 1, 2]}\nprint(squared)\n# Output: {1, 4}\n```\n\n\
    # 4.3.4 Generator Comprehensions\n\nThey are also similar to list comprehensions.\
    \ The only difference is that they don't allocate memory for the whole list but\
    \ generate one item at a time, thus more memory effecient."
