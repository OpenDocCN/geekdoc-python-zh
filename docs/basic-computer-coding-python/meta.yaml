  - "[PAGE 322]\n\nThe implementation of foreign key relationships in MySQL is slightly\
    \ different and limited as compared to the standard SQL. In MySQL, both the parent\
    \ and the child in the foreign key constraint must use the same storage engine.\n\
    \nA storage engine is the underlying software component that a database management\
    \ system uses for performing SQL operations. In MySQL, storage engines come in\
    \ two different flavors:\n\n+   - Transactional storage engines are transaction\
    \ safe and allow you to roll back transactions using simple commands like rollback.\
    \ Many popular MySQL engines, including InnoDB and NDB, belong to this category.\n\
    - Nontransactional storage engines depend on elaborate manual code to undo statements\
    \ committed on a database. MyISAM, MEMORY, and many other MySQL engines are nontransactional.\n\
    \nInnoDB is the default and most popular storage engine. It helps maintain data\
    \ integrity by supporting foreign key constraints. This means that any CRUD operation\
    \ on a foreign key is checked to ensure that it doesn't lead to inconsistencies\
    \ across different tables.\n\nAlso, note that the ratings table uses the columns\
    \ movie_id and reviewer_id, both foreign keys, jointly as the primary key. This\
    \ step ensures that a reviewer can't rate the same movie twice.\n\nYou may choose\
    \ to reuse the same cursor for multiple executions. In that case, all executions\
    \ would become one atomic transaction rather than multiple separate transactions.\
    \ For example, you can execute all CREATE TABLE statements with one cursor and\
    \ then commit your transaction only once:\n\n```\nwith connection.cursor() as\
    \ cursor:\n    cursor.execute(create_movies_table_query)\n    cursor.execute(create_reviewers_table_query)\n\
    \    cursor.execute(create_ratings_table_query)\n    connection.commit()\n```\n\
    \nThe above code will first execute all three CREATE statements. Then it will\
    \ send a COMMIT command to the MySQL server that commits your transaction. You\
    \ can also use .rollback() to send a ROLLBACK command to the MySQL server and\
    \ remove all data changes from the transaction.\n\n# 9.3.3 Showing a Table Schema\
    \ Using the DESCRIBE Statement\n\nNow, that you've created all three tables, you\
    \ can look at their schema using the following SQL statement:"
