  md: '# Abstraction Barriers


    Before continuing with more examples of compound data and data abstraction, let
    us consider some of the issues raised by the rational number example. We defined
    operations in terms of a constructor make_rat and selectors numer and denom. In
    general, the underlying idea of data abstraction is to identify for each type
    of value a basic set of operations in terms of which all manipulations of values
    of that type will be expressed, and then to use only those operations in manipulating
    the data.


    We can envision the structure of the rational number system as a series of layers.


    ![](img/192fecf3b33c4ee7d07f7123b285647a_182_0.png)


    The horizontal lines represent abstraction barriers that isolate different levels
    of the system. At each level, the barrier separates the functions (above) that
    use the data abstraction from the functions (below) that implement the data abstraction.
    Programs that use rational numbers manipulate them solely in terms of the their
    arithmetic functions: add_rat, mul_rat, and eq_rat. These, in turn, are implemented
    solely in terms of the constructor and selectors make_rat, numer, and denom, which
    themselves are implemented in terms of tuples. The details of how tuples are implemented
    are irrelevant to the rest of the layers as long as tuples enable the implementation
    of the selectors and constructor.


    At each layer, the functions within the box enforce the abstraction boundary because
    they are the only functions that depend upon both the representation above them
    (by their use) and the implementation below them (by their definitions). In this
    way, abstraction barriers are expressed as sets of functions. Abstraction barriers
    provide many advantages. One advantage


    > The str_rat implementation above uses format strings, which contain placeholders
    for values. The details of how to use format strings and the format method appear
    in the formatting strings section of Dive Into Python 3.'
