  md: "# Basic Computer Coding: Python\n\n```\n#create a binary variable to state\
    \ that a table setting is used\nx = pulp.LpVariable.dicts('table', possible_tables,\n\
    \                        lowBound = 0,\n                        upBound = 1,\n\
    \                        cat = pulp.LpInteger)\n```\n\nWe create the **LpProblem**\
    \ and then make the objective function. Note that happiness function used in this\
    \ script would be difficult to model in any other way.\n\n```\nseating_model =\
    \ pulp.LpProblem(\"Wedding Seating Model\", pulp.LpMinimize)\nseating_model +=\
    \ sum([happiness(table) * x[table] **for table in** possible_tables])\n```\n\n\
    We specify the total number of tables allowed in the solution.\n\n```\n#specify\
    \ the maximum number of tables\nseating_model += sum([x[table] **for table in**\
    \ possible_tables]) <= max_tables, \",\n            \"bbox\": [0.12\n```\n\nThis\
    \ set of constraints defines the set partitioning problem by guaranteeing that\
    \ a guest is allocated to exactly one table.\n\n```\n#A guest must seated at one\
