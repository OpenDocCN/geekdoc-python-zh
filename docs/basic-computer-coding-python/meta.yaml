  md: "is that they makes programs much easier to maintain and to modify. The fewer\
    \ functions that depend on a particular representation, the fewer changes are\
    \ required when one wants to change that representation.\n\n# The Properties of\
    \ Data\n\nWe began the rational-number implementation by implementing arithmetic\
    \ operations in terms of three unspecified functions: make_rat, numer, and denom.\
    \ At that point, we could think of the operations as being defined in terms of\
    \ data objects --- numerators, denominators, and rational numbers --- whose behavior\
    \ was specified by the latter three functions.\n\nBut what exactly is meant by\
    \ data? It is not enough to say “whatever is implemented by the given selectors\
    \ and constructors.” We need to guarantee that these functions together specify\
    \ the right behavior. That is, if we construct a rational number x from integers\
    \ n and d, then it should be the case that numer(x)/denom(x) is equal to n/d.\n\
    \nIn general, we can think of an abstract data type as defined by some collection\
    \ of selectors and constructors, together with some behavior conditions. As long\
    \ as the behavior conditions are met (such as the division property above), these\
    \ functions constitute a valid representation of the data type.\n\nThis point\
    \ of view can be applied to other data types as well, such as the two-element\
    \ tuple that we used in order to implement rational numbers. We never actually\
    \ said much about what a tuple was, only that the language supplied operators\
    \ to create and manipulate tuples. We can now describe the behavior conditions\
    \ of two-element tuples, also called pairs, that are relevant to the problem of\
    \ representing rational numbers.\n\nIn order to implement rational numbers, we\
    \ needed a form of glue for two integers, which had the following behavior:\n\n\
    +   - If a pair p was constructed from values x and y, then getitem_pair(p, 0)\
    \ returns x, and getitem_pair(p, 1) returns y.\n\nWe can implement functions make_pair\
    \ and getitem_pair that fulfill this description just as well as a tuple.\n\n\
    ```\n>>> def make_pair(x, y):\n    \"\"\"Return a function that behaves like a\
    \ pair.\"\"\"\n    def dispatch(m):\n        if m == 0:\n            return x\n\
    \        elif m == 1:\n            return y\n```"
