    \ is executed, it produces the following result –\n\n```\nOutput is:\n10\nOutput\
    \ is:\n70\n60\n50\n```\n\n## 2.1.6 The Anonymous Functions\n\nThese functions\
    \ are called anonymous because they are not declared in the standard manner by\
