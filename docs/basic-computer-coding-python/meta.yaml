- md: "## Installing MySQL Connector/Python\n\nA database driver is a piece of software\
    \ that allows an application to connect and interact with a database system. Programming\
    \ languages like Python need a special driver before they can speak to a database\
    \ from a specific vendor.\n\nThese drivers are typically obtained as third-party\
    \ modules. The Python Database API (DB-API) defines the standard interface with\
    \ which all Python database drivers must comply. These details are documented\
    \ in PEP 249. All Python database drivers, such as sqlite3 for SQLite, psycopg2\
    \ for PostgreSQL, and MySQL Connector/Python for MySQL, follow these implementation\
    \ rules.\n\nNote: MySQL’s official documentation uses the term connector instead\
    \ of driver. Technically, connectors are associated only with connecting to a\
    \ database, not interacting with it. However, the term is often used for the entire\
    \ database access module comprising the connector *and* the driver.\n\nTo maintain\
    \ consistency with the documentation, you’ll see the term connector whenever MySQL\
    \ is mentioned.\n\nMany popular programming languages have their own database\
    \ API. For example, Java has the Java Database Connectivity (JDBC) API. If you\
    \ need to connect a Java application to a MySQL database, then you need to use\
    \ the MySQL JDBC connector, which follows the JDBC API.\n\nSimilarly, in Python\
    \ you need to install a Python MySQL connector to interact with a MySQL database.\
    \ Many packages follow the DB-API standards, but the most popular among them is\
    \ MySQL Connector/Python. You can get it with pip:\n\n- $ pip install mysql-connector-python\n\
    \npip installs the connector as a third-party module in the currently active virtual\
    \ environment. It’s recommended that you set up an isolated virtual environment\
    \ for the project along with all the dependencies.\n\nTo test if the installation\
    \ was successful, type the following command on your Python terminal:\n\n```\n\
    >>>\n>>> import mysql.connector\n```\n\nIf the above code executes with no errors,\
    \ then mysql.connector is installed and ready to use. If you encounter any errors,\
    \ then make sure you're in the correct virtual environment and you're using the\
    \ right Python interpreter.\n\nMake sure that you're installing the correct mysql-connector-python\
    \ package, which is a pure-Python implementation. Beware of similarly named but\
    \ now deprecated connectors like mysql-connector.\n\n## 9.2.3 Establishing a Connection\
    \ with MySQL Server\n\nMySQL is a server-based database management system. One\
    \ server might contain multiple databases. To interact with a database, you must\
    \ first establish a connection with the server. The general workflow of a Python\
    \ program that interacts with a MySQL-based database is as follows:\n\n- Connect\
    \ to the MySQL server.\n- Create a new database.\n- Connect to the newly created\
    \ or an existing database.\n- Execute a SQL query and fetch results.\n- Inform\
    \ the database if any changes are made to a table.\n- Close the connection to\
    \ the MySQL server.\n\n> Did You Know?\n> Java Database Connectivity (JDBC) is\
    \ an application programming interface (API) for the programming language Java,\
    \ which defines how a client may access a database. It is a Java-based data access\
    \ technology used for Java database connectivity. It is part of the Java Standard\
    \ Edition platform, from Oracle Corporation.\n\nThis is a generic workflow that\
    \ might vary depending on the individual application. But whatever the application\
    \ might be, the first step is to connect your database with your application.\n\
    \n## Establishing a Connection\n\nThe first step in interacting with a MySQL server\
    \ is to establish a connection. To do this, you need connect() from the mysql.connector\
    \ module. This function takes in parameters like host, user, and password and\
    \ returns a MySQLConnection object. You can receive these credentials as input\
    \ from the user and pass them to connect():\n\n```\nfrom getpass import getpass\n\
    \nfrom mysql.connector import connect, Error\n\n\ntry:\n    with connect(\n  \
    \      host=\"localhost\",\n        user=input(\"Enter username: \"),\n      \
    \  password=getpass(\"Enter password: \"),\n    ) as connection:\n        print(connection)\n\
    except Error as e:\n    print(e)\n```\n\nThe code above uses the entered login\
    \ credentials to establish a connection with your MySQL server. In return, you\
    \ get a MySQLConnection object, which is stored in the connection variable. From\
    \ now on, you’ll use this variable to access your MySQL server.\n\nThere are several\
    \ important things to notice in the code above:\n\n- You should always deal with\
    \ the exceptions that might be raised while establishing a connection to the MySQL\
    \ server. This is why you use a try ... except block to catch and print any exceptions\
    \ that you might encounter.\n- You should always close the connection after you’re\
    \ done accessing the database. Leaving unused open connections can lead to several\
    \ unexpected errors and performance issues. The above code takes advantage of\
    \ a context manager using with, which abstracts away the connection cleanup process.\n\
    - You should *never hard-code your login credentials*, that is, your username\
    \ and password, directly in a Python script. This is a bad practice for deployment\
    \ and poses a serious security threat. The code above prompts the user for login\
    \ credentials. It uses the built-in getpass module to hide the password. While\
    \ this is better than hard-coding, there are other, more secure ways to store\
    \ sensitive information, like using environment variables.\n\nYou’ve now established\
    \ a connection between your program and your MySQL server, but you still need\
    \ to either create a new database or connect to an existing database inside the\
    \ server.\n\n## Creating a New Database\n\nHere you established a connection with\
    \ your MySQL server. To create a new database, you need to execute a SQL statement:\n\
    \n```\nCREATE DATABASE books_db;\n```\n\nThe above statement will create a new\
    \ database with the name books_db.\nIn MySQL, it’s mandatory to put a semicolon\
    \ (;) at the end of a statement, which denotes the termination of a query. However,\
    \ MySQL Connector/Python automatically appends a semicolon at the end of your\
    \ queries, so there’s no need to use it in your Python code.\n\nTo execute a SQL\
    \ query in Python, you’ll need to use a cursor, which abstracts away the access\
    \ to database records. MySQL Connector/Python provides you with the MySQLCursor\
    \ class, which instantiates objects that can execute MySQL queries in Python.\
    \ An instance of the MySQLCursor class is also called a cursor.\n\ncursor objects\
    \ make use of a MySQLConnection object to interact with your MySQL server. To\
    \ create a cursor, use the .cursor() method of your connection variable:\n\n```\n\
    cursor = connection.cursor()\n```\n\nThe above code gives you an instance of the\
    \ MySQLCursor class.\n\nA query that needs to be executed is sent to cursor.execute()\
    \ in string format. In this particular occasion, you'll send the CREATE DATABASE\
    \ query to cursor.execute():\n\n```\nfrom getpass import getpass\n\nfrom mysql.connector\
    \ import connect, Error\n\n\ntry:\n    with connect(\n        host=\"localhost\"\
    ,\n        user=input(\"Enter username: \"),\n        password=getpass(\"Enter\
    \ password: \"),\n    ) as connection:\n        create_db_query = \"CREATE DATABASE\
    \ online_movie_rating\"\n        with connection.cursor() as cursor:\n       \
    \     cursor.execute(create_db_query)\nexcept Error as e:\n    print(e)\n```\n\
    \nAfter executing of the code above, you'll have a new database called online_movie_rating\
    \ in your MySQL server.\n\nThe CREATE DATABASE query is stored as a string in\
    \ the create_db_query variable and then passed to cursor.execute() for execution.\
    \ The code uses a context manager with the **cursor object** to handle the cleanup\
    \ process.\n\nYou might receive an error here if a database with the same name\
    \ already exists in your server. To confirm this, you can display the name of\
    \ all databases in your server. Using the same MySQLConnection object from earlier,\
    \ execute the SHOW DATABASES statement:\n\n```\n>>>\n>>> show_db_query = \"SHOW\
    \ DATABASES\"\n>>> with connection.cursor() as cursor:\n...     cursor.execute(show_db_query)\n\
    ...     for db in cursor:\n...         print(db)\n...\n('information_schema',)\n\
    ('mysql',)\n('online_movie_rating',)\n('performance_schema',)\n('sys',)\n```\n\
    \nThe above code prints the names of all the databases currently in your MySQL\
    \ server. The SHOW DATABASES command also outputs some databases that you didn't\
    \ create in your server, like information_schema, performance_schema, and so on.\
    \ These databases are generated automatically by the MySQL server and provide\
    \ access to a variety of database metadata and MySQL server settings.\n\nYou created\
    \ a new database in this section by executing the CREATE DATABASE statement. In\
    \ the next section, you'll see how to connect to a database that already exists.\n\
    \n## Connecting to an Existing Database\n\nIn the last section, you created a\
    \ new database called online_movie_rating. However, you still haven't connected\
    \ to it. In\n\n> **Keyword**\n>\n> **Cursor object** is an object that is used\
    \ to make the connection for executing SQL queries. It acts as middleware between\
    \ SQLite database connection and SQL query."
  mdcn: "## 安装 MySQL Connector/Python\n\n数据库驱动是一段允许应用程序连接并与数据库系统交互的软件。像 Python 这样的编程语言在与特定供应商的数据库通信之前，需要一个特殊的驱动程序。\n\
    \n这些驱动程序通常作为第三方模块获取。Python 数据库 API（DB-API）定义了所有 Python 数据库驱动必须遵守的标准接口。这些细节在 PEP\
    \ 249 中有详细说明。所有 Python 数据库驱动，例如用于 SQLite 的 sqlite3、用于 PostgreSQL 的 psycopg2 以及用于\
    \ MySQL 的 MySQL Connector/Python，都遵循这些实现规则。\n\n注意：MySQL 的官方文档使用术语“连接器”而不是“驱动程序”。从技术上讲，连接器仅与连接到数据库相关，而不是与之交互。然而，该术语通常用于指代包含连接器*和*驱动程序的整个数据库访问模块。\n\
    \n为了与文档保持一致，每当提到 MySQL 时，你都会看到术语“连接器”。\n\n许多流行的编程语言都有自己的数据库 API。例如，Java 有 Java\
    \ 数据库连接（JDBC）API。如果你需要将 Java 应用程序连接到 MySQL 数据库，那么你需要使用遵循 JDBC API 的 MySQL JDBC\
    \ 连接器。\n\n同样，在 Python 中，你需要安装一个 Python MySQL 连接器来与 MySQL 数据库交互。许多包遵循 DB-API 标准，但其中最流行的是\
    \ MySQL Connector/Python。你可以通过 pip 获取它：\n\n- $ pip install mysql-connector-python\n\
    \npip 会将连接器作为第三方模块安装在当前活动的虚拟环境中。建议你为项目设置一个独立的虚拟环境以及所有依赖项。\n\n要测试安装是否成功，请在你的 Python\
    \ 终端中输入以下命令：\n\n```\n>>>\n>>> import mysql.connector\n```\n\n如果上述代码执行时没有错误，那么\
    \ mysql.connector 已安装并可以使用。如果你遇到任何错误，请确保你处于正确的虚拟环境中，并且使用的是正确的 Python 解释器。\n\n\
    确保你安装的是正确的 mysql-connector-python 包，这是一个纯 Python 实现。注意类似名称但现已弃用的连接器，如 mysql-connector。\n\
    \n## 9.2.3 与 MySQL 服务器建立连接\n\nMySQL 是一个基于服务器的数据库管理系统。一个服务器可能包含多个数据库。要与数据库交互，你必须首先与服务器建立连接。与基于\
    \ MySQL 的数据库交互的 Python 程序的一般工作流程如下：\n\n- 连接到 MySQL 服务器。\n- 创建一个新数据库。\n- 连接到新创建的或现有的数据库。\n\
    - 执行 SQL 查询并获取结果。\n- 如果对表进行了任何更改，则通知数据库。\n- 关闭与 MySQL 服务器的连接。\n\n> 你知道吗？\n> Java\
    \ 数据库连接（JDBC）是编程语言 Java 的一个应用程序编程接口（API），它定义了客户端如何访问数据库。它是一种基于 Java 的数据访问技术，用于\
    \ Java 数据库连接。它是 Oracle 公司的 Java 标准版平台的一部分。\n\n这是一个通用的工作流程，可能会因具体应用程序而异。但无论应用程序是什么，第一步都是将你的数据库与你的应用程序连接起来。\n\
    \n## 建立连接\n\n与 MySQL 服务器交互的第一步是建立连接。为此，你需要使用 `mysql.connector` 模块中的 `connect()`\
    \ 函数。此函数接受诸如 `host`、`user` 和 `password` 等参数，并返回一个 `MySQLConnection` 对象。你可以从用户那里接收这些凭据作为输入，并将它们传递给\
    \ `connect()`：\n\n```\nfrom getpass import getpass\n\nfrom mysql.connector import\
    \ connect, Error\n\n\ntry:\n    with connect(\n        host=\"localhost\",\n \
    \       user=input(\"Enter username: \"),\n        password=getpass(\"Enter password:\
    \ \"),\n    ) as connection:\n        print(connection)\nexcept Error as e:\n\
    \    print(e)\n```\n\n上面的代码使用输入的登录凭据与你的 MySQL 服务器建立连接。作为回报，你会得到一个 `MySQLConnection`\
    \ 对象，它存储在 `connection` 变量中。从现在开始，你将使用此变量来访问你的 MySQL 服务器。\n\n在上面的代码中，有几件重要的事情需要注意：\n\
    \n- 你应该始终处理在建立与 MySQL 服务器的连接时可能引发的异常。这就是为什么你使用 `try ... except` 块来捕获并打印你可能遇到的任何异常。\n\
    - 你应该始终在访问数据库后关闭连接。留下未使用的打开连接可能导致多个意外错误和性能问题。上面的代码利用了使用 `with` 的上下文管理器，它抽象了连接清理过程。\n\
    - 你*永远不应该将你的登录凭据*（即你的用户名和密码）直接硬编码在 Python 脚本中。这对于部署来说是一个不好的做法，并且会带来严重的安全威胁。上面的代码提示用户输入登录凭据。它使用内置的\
    \ `getpass` 模块来隐藏密码。虽然这比硬编码好，但还有其他更安全的方法来存储敏感信息，例如使用环境变量。\n\n你现在已经在你的程序和 MySQL\
    \ 服务器之间建立了连接，但你仍然需要创建一个新数据库或连接到服务器内的现有数据库。\n\n## 创建新数据库\n\n在这里，你已经与 MySQL 服务器建立了连接。要创建一个新数据库，你需要执行一条\
    \ SQL 语句：\n\n```\nCREATE DATABASE books_db;\n```\n\n上面的语句将创建一个名为 `books_db` 的新数据库。\n\
    在 MySQL 中，必须在语句末尾放置一个分号（;），它表示查询的终止。但是，MySQL Connector/Python 会自动在你的查询末尾附加一个分号，因此无需在你的\
    \ Python 代码中使用它。\n\n要在 Python 中执行 SQL 查询，你需要使用一个游标，它抽象了对数据库记录的访问。MySQL Connector/Python\
    \ 为你提供了 `MySQLCursor` 类，该类实例化的对象可以在 Python 中执行 MySQL 查询。`MySQLCursor` 类的实例也称为游标。\n\
    \n游标对象利用 `MySQLConnection` 对象与你的 MySQL 服务器交互。要创建游标，请使用你的连接变量的 `.cursor()` 方法：\n\
    \n```\ncursor = connection.cursor()\n```\n\n上面的代码为你提供了一个 `MySQLCursor` 类的实例。\n\
    \n需要执行的查询以字符串格式发送到 `cursor.execute()`。在这个特定的情况下，你将把 `CREATE DATABASE` 查询发送到 `cursor.execute()`：\n\
    \n```\nfrom getpass import getpass\n\nfrom mysql.connector import connect, Error\n\
    \n\ntry:\n    with connect(\n        host=\"localhost\",\n        user=input(\"\
    Enter username: \"),\n        password=getpass(\"Enter password: \"),\n    ) as\
    \ connection:\n        create_db_query = \"CREATE DATABASE online_movie_rating\"\
    \n        with connection.cursor() as cursor:\n            cursor.execute(create_db_query)\n\
    except Error as e:\n    print(e)\n```\n\n执行上述代码后，你的 MySQL 服务器中将有一个名为 `online_movie_rating`\
    \ 的新数据库。\n\n`CREATE DATABASE` 查询作为字符串存储在 `create_db_query` 变量中，然后传递给 `cursor.execute()`\
    \ 执行。该代码使用**游标对象**的上下文管理器来处理清理过程。\n\n如果服务器中已存在同名数据库，你可能会在此处收到错误。要确认这一点，你可以显示服务器中所有数据库的名称。使用与之前相同的\
    \ `MySQLConnection` 对象，执行 `SHOW DATABASES` 语句：\n\n```\n>>>\n>>> show_db_query\
    \ = \"SHOW DATABASES\"\n>>> with connection.cursor() as cursor:\n...     cursor.execute(show_db_query)\n\
    ...     for db in cursor:\n...         print(db)\n...\n('information_schema',)\n\
    ('mysql',)\n('online_movie_rating',)\n('performance_schema',)\n('sys',)\n```\n\
    \n上面的代码打印了当前 MySQL 服务器中所有数据库的名称。`SHOW DATABASES` 命令还会输出一些你未在服务器中创建的数据库，例如 `information_schema`、`performance_schema`\
    \ 等。这些数据库由 MySQL 服务器自动生成，并提供对各种数据库元数据和 MySQL 服务器设置的访问。\n\n在本节中，你通过执行 `CREATE DATABASE`\
    \ 语句创建了一个新数据库。在下一节中，你将看到如何连接到已存在的数据库。\n\n## 连接到现有数据库\n\n在上一节中，你创建了一个名为 `online_movie_rating`\
    \ 的新数据库。但是，你仍然没有连接到它。在\n\n> **关键词**\n>\n> **游标对象**是用于建立连接以执行 SQL 查询的对象。它充当 SQLite\
    \ 数据库连接和 SQL 查询之间的中间件。"
