- md: "## 4.2.2 Command-Line Interface\n\nThe unittest module can be used from the\
    \ command line to run tests from modules, classes or even individual test methods:\n\
    \n```\npython -m unittest test_module1 test_module2\npython -m unittest test_module.TestClass\n\
    python -m unittest test_module.TestClass.test_method\n```\n\nYou can pass in a\
    \ list with any combination of module names, and fully qualified class or method\
    \ names.\n\nYou can run tests with more detail (higher verbosity) by passing in\
    \ the -v flag:\n\n```\npython -m unittest -v test_module\n```\n\nFor a list of\
    \ all the command-line options:\n\n```\npython -m unittest -h\n```\n\nChanged\
    \ in version 2.7: In earlier versions it was only possible to run individual test\
    \ methods and not modules or classes.\n\n### Command-line options\n\nunittest\
    \ supports these command-line options:\n\n- -b, --buffer\nThe standard output\
    \ and standard error streams are buffered during the test run. Output during a\
    \ passing test is discarded. Output is echoed normally on test fail or error and\
    \ is added to the failure messages.\n\n- -c, --catch\nControl-C during the test\
    \ run waits for the current test to end and then reports all the results so far.\
    \ A second Control-C raises the normal Keyboard Interrupt exception. See Signal\
    \ Handling for the functions that provide this functionality.\n\n- -f, --failfast\n\
    Stop the test run on the first error or failure.\n\nNew in version 2.7: The command-line\
    \ options -b, -c and -f were added.\n\nThe command line can also be used for test\
    \ discovery, for running all of the tests in a project or just a subset.\n\n##\
    \ 4.2.3 Test Discovery\n\nUnittest supports simple test discovery. In order to\
    \ be compatible with test discovery, all of the test files must be modules or\
    \ packages importable from the top-level directory of the project (this means\
    \ that their filenames must be valid identifiers).\n\nTest discovery is implemented\
    \ in TestLoader.discover(), but can also be used from the command line. The basic\
    \ command-line usage is:\n\n```\ncd project_directory\npython -m unittest discover\n\
    ```\n\nThe discover sub-command has the following options:\n\n- -v, --verbose\n\
    Verbose output\n\n- -s, --start-directory directory\nDirectory to start discovery\
    \ (. default)\n\n- -p, --pattern pattern\nPattern to match test files (test*.py\
    \ default)\n\n- -t, --top-level-directory directory\nTop level directory of project\
    \ (defaults to start directory)\n\n> **Remember**\n> Test discovering are the\
    \ steps that are taken to find the tests in your code-base. This means you don't\
    \ have to specify where your tests are but if the files contains the tests follow\
    \ a certain location (filenames, directories, etc) then the testing framework\
    \ can find them automatically.\n\nThe -s, -p, and -t options can be passed in\
    \ as positional arguments in that order. The following two command lines are equivalent:\n\
    \n```\npython -m unittest discover -s project_directory -p \"*_test.py\"\npython\
    \ -m unittest discover project_directory \"*_test.py\"\n```\n\nAs well as being\
    \ a path it is possible to pass a package name, for example myproject.subpackage.test,\
    \ as the start directory. The package name you supply will then be imported and\
    \ its location on the filesystem will be used as the start directory.\n\n**Caution:**\
    \ Test discovery loads tests by importing them. Once test discovery has found\
    \ all the test files from the start directory you specify it turns the paths into\
    \ package names to import. For example foo/bar/baz.py will be imported as foo.bar.baz.\
    \ If you have a package installed globally and attempt test discovery on a different\
    \ copy of the package, then the import could happen from the wrong place. If this\
    \ happens test discovery will warn you and exit.\n\nIf you supply the start directory\
    \ as a package name rather than a path to a directory then discover assumes that\
    \ whichever location it imports from is the location you intended, so you will\
    \ not get the warning.\n\nTest modules and packages can customize test loading\
    \ and discovery by through the load_tests protocol.\n\n## 4.2.4 Organizing test\
    \ code\n\nThe basic building blocks of unit testing are test cases — single scenarios\
    \ that must be set up and checked for correctness. In unittest, test cases are\
    \ represented by instances of unittest's TestCase class. To make your own test\
    \ cases you must write subclasses of TestCase, or use FunctionTestCase.\n\nAn\
    \ instance of a TestCase-derived class is an object that can completely run a\
    \ single test method, together with optional set-up and tidy-up code. The testing\
    \ code of a TestCase instance should be entirely self-contained, such that it\
    \ can be run either in isolation or in arbitrary combination with any number of\
    \ other test cases.\n\nThe simplest TestCase subclass will simply override the\
    \ runTest() method in order to perform specific testing code:\n\n```\nimport unittest\n\
    class DefaultWidgetSizeTestCase(unittest.TestCase):\n    def runTest(self):\n\
    \        widget = Widget('The widget')\n        self.assertEqual(widget.size(),\
    \ (50, 50), 'incorrect default size')\n```\n\nNote that in order to test something,\
    \ we use one of the assert*() methods provided by the TestCase base class. If\
    \ the test fails, an exception will be raised, and unittest will identify the\
    \ test case as a failure. Any other exceptions will be treated as errors. This\
    \ helps you identify where the problem is: failures are caused by incorrect results\
    \ - a 5 where you expected a 6. Errors are caused by incorrect code - e.g., a\
    \ TypeError caused by an incorrect function call.\n\nThe way to run a test case\
    \ will be described later. For now, note that to construct an instance of such\
    \ a test case, we call its constructor without arguments:\n\n```\ntestCase = DefaultWidgetSizeTestCase()\n\
    ```\n\nNow, such test cases can be numerous, and their set-up can be repetitive.\
    \ In the case, constructing a Widget in each of 100 Widget test case **subclasses**\
    \ would mean unsightly duplication.\n\nLuckily, we can factor out such set-up\
    \ code by implementing a method called setUp(), which the testing framework will\
    \ automatically call for us when we run the test:\n\n```\nimport unittest\nclass\
    \ SimpleWidgetTestCase(unittest.TestCase):\n    def setUp(self):\n        self.widget\
    \ = Widget('The widget')\nclass DefaultWidgetSizeTestCase(SimpleWidgetTestCase):\n\
    \    def runTest(self):\n        self.assertEqual(self.widget.size(), (50,50),\n\
    \                         'incorrect default size')\nclass WidgetResizeTestCase(SimpleWidgetTestCase):\n\
    \    def runTest(self):\n        self.widget.resize(100,150)\n        self.assertEqual(self.widget.size(),\
    \ (100,150),\n                         'wrong size after resize')\n```\n\nIf the\
    \ setUp() method raises an exception while the test is running, the framework\
    \ will consider the test to have suffered an error, and the runTest() method will\
    \ not be executed.\n\nSimilarly, we can provide a tearDown() method that tidies\
    \ up after the runTest() method has been run:\n\n> **Keyword**\n> **Subclass**\n\
    > \"derived class\", heir class, or child class is a modular, derivative class\
    \ that inherits one or more language entities from one or more other classes (called\
    \ superclass, base classes, or parent classes).\n\n```\nimport unittest\nclass\
    \ SimpleWidgetTestCase(unittest.TestCase):\n    def setUp(self):\n        self.widget\
    \ = Widget('The widget')\n    def tearDown(self):\n        self.widget.dispose()\n\
    \        self.widget = None\n```\n\nIf setUp() succeeded, the tearDown() method\
    \ will be run whether runTest() succeeded or not.\n\nSuch a working environment\
    \ for the testing code is called a fixture.\n\nOften, many small test cases will\
    \ use the same fixture. In this case, we would end up subclassing SimpleWidgetTestCase\
    \ into many small one-method classes such as DefaultWidgetSizeTestCase. This is\
    \ time-consuming and discouraging, so in the same vein as JUnit, unittest provides\
    \ a simpler mechanism:\n\n```\nimport unittest\nclass WidgetTestCase(unittest.TestCase):\n\
    \    def setUp(self):\n        self.widget = Widget('The widget')\n    def tearDown(self):\n\
    \        self.widget.dispose()\n        self.widget = None\n    def test_default_size(self):\n\
    \        self.assertEqual(self.widget.size(), (50,50),\n                     \
    \    'incorrect default size')\n    def test_resize(self):\n        self.widget.resize(100,150)\n\
    \        self.assertEqual(self.widget.size(), (100,150),\n                   \
    \      'wrong size after resize')\n```\n\nHere we have not provided a runTest()\
    \ method, but have instead provided two different test methods. Class instances\
    \ will now each run one of the test_*() methods, with self.widget created and\
    \ destroyed separately for each instance. When creating an instance we must specify\
    \ the test method it is to run. We do this by passing the method name in the constructor:\n\
    \n```\ndefaultSizeTestCase = WidgetTestCase('test_default_size')\nresizeTestCase\
    \ = WidgetTestCase('test_resize')\n```"
  mdcn: "## 4.2.2 命令行接口\n\nunittest 模块可以从命令行运行，用于执行模块、类甚至单个测试方法中的测试：\n\n```\npython\
    \ -m unittest test_module1 test_module2\npython -m unittest test_module.TestClass\n\
    python -m unittest test_module.TestClass.test_method\n```\n\n你可以传入一个包含模块名、完全限定类名或方法名任意组合的列表。\n\
    \n你可以通过传入 `-v` 标志来运行更详细（更高详细度）的测试：\n\n```\npython -m unittest -v test_module\n\
    ```\n\n要查看所有命令行选项的列表：\n\n```\npython -m unittest -h\n```\n\n在 2.7 版本中更改：在早期版本中，只能运行单个测试方法，而不能运行模块或类。\n\
    \n### 命令行选项\n\nunittest 支持以下命令行选项：\n\n- -b, --buffer\n在测试运行期间，标准输出和标准错误流会被缓冲。通过测试的输出会被丢弃。测试失败或出错时，输出会正常显示并添加到失败消息中。\n\
    \n- -c, --catch\n在测试运行期间按下 Control-C 会等待当前测试结束，然后报告到目前为止的所有结果。再次按下 Control-C 会引发正常的键盘中断异常。有关提供此功能的函数，请参阅信号处理。\n\
    \n- -f, --failfast\n在第一个错误或失败时停止测试运行。\n\n在 2.7 版本中新增：添加了命令行选项 -b、-c 和 -f。\n\n\
    命令行也可用于测试发现，以运行项目中的所有测试或仅运行一部分。\n\n## 4.2.3 测试发现\n\nUnittest 支持简单的测试发现。为了与测试发现兼容，所有测试文件必须是可从项目顶层目录导入的模块或包（这意味着它们的文件名必须是有效的标识符）。\n\
    \n测试发现在 `TestLoader.discover()` 中实现，但也可以从命令行使用。基本的命令行用法是：\n\n```\ncd project_directory\n\
    python -m unittest discover\n```\n\ndiscover 子命令具有以下选项：\n\n- -v, --verbose\n详细输出\n\
    \n- -s, --start-directory directory\n开始发现的目录（默认为当前目录）\n\n- -p, --pattern pattern\n\
    匹配测试文件的模式（默认为 `test*.py`）\n\n- -t, --top-level-directory directory\n项目的顶层目录（默认为起始目录）\n\
    \n> **记住**\n> 测试发现是在代码库中查找测试的步骤。这意味着你不必指定测试的位置，但如果包含测试的文件遵循特定的位置（文件名、目录等），那么测试框架可以自动找到它们。\n\
    \n-s、-p 和 -t 选项可以按此顺序作为位置参数传入。以下两条命令行是等效的：\n\n```\npython -m unittest discover\
    \ -s project_directory -p \"*_test.py\"\npython -m unittest discover project_directory\
    \ \"*_test.py\"\n```\n\n除了路径之外，还可以传递包名（例如 `myproject.subpackage.test`）作为起始目录。你提供的包名将被导入，其在文件系统上的位置将用作起始目录。\n\
    \n**注意：** 测试发现通过导入来加载测试。一旦测试发现从你指定的起始目录找到所有测试文件，它就会将路径转换为包名进行导入。例如，`foo/bar/baz.py`\
    \ 将被导入为 `foo.bar.baz`。如果你全局安装了一个包，并尝试在该包的不同副本上进行测试发现，那么导入可能会从错误的位置发生。如果发生这种情况，测试发现会警告你并退出。\n\
    \n如果你将起始目录作为包名而不是目录路径提供，那么 discover 会假设它从哪个位置导入就是你想要的位置，因此你不会收到警告。\n\n测试模块和包可以通过\
    \ `load_tests` 协议自定义测试加载和发现。\n\n## 4.2.4 组织测试代码\n\n单元测试的基本构建块是测试用例——必须设置并检查其正确性的单个场景。在\
    \ unittest 中，测试用例由 unittest 的 TestCase 类的实例表示。要创建自己的测试用例，你必须编写 TestCase 的子类，或使用\
    \ FunctionTestCase。\n\nTestCase 派生类的实例是一个可以完全运行单个测试方法的对象，以及可选的设置和清理代码。TestCase\
    \ 实例的测试代码应该是完全自包含的，以便它可以单独运行，或与任意数量的其他测试用例任意组合运行。\n\n最简单的 TestCase 子类将简单地覆盖 `runTest()`\
    \ 方法以执行特定的测试代码：\n\n```\nimport unittest\nclass DefaultWidgetSizeTestCase(unittest.TestCase):\n\
    \    def runTest(self):\n        widget = Widget('The widget')\n        self.assertEqual(widget.size(),\
    \ (50, 50), 'incorrect default size')\n```\n\n请注意，为了测试某些内容，我们使用 TestCase 基类提供的\
    \ `assert*()` 方法之一。如果测试失败，将引发异常，unittest 会将该测试用例标识为失败。任何其他异常将被视为错误。这有助于你识别问题所在：失败是由不正确的结果引起的——你期望\
    \ 6 但得到了 5。错误是由不正确的代码引起的——例如，由不正确的函数调用引起的 TypeError。\n\n运行测试用例的方法将在后面描述。现在，请注意，要构造这样一个测试用例的实例，我们调用其不带参数的构造函数：\n\
    \n```\ntestCase = DefaultWidgetSizeTestCase()\n```\n\n现在，这样的测试用例可能很多，而且它们的设置可能是重复的。在这种情况下，在\
    \ 100 个 Widget 测试用例**子类**中的每一个都构造一个 Widget 意味着不雅观的重复。\n\n幸运的是，我们可以通过实现一个名为 `setUp()`\
    \ 的方法来提取这样的设置代码，测试框架在运行测试时会自动为我们调用它：\n\n```\nimport unittest\nclass SimpleWidgetTestCase(unittest.TestCase):\n\
    \    def setUp(self):\n        self.widget = Widget('The widget')\nclass DefaultWidgetSizeTestCase(SimpleWidgetTestCase):\n\
    \    def runTest(self):\n        self.assertEqual(self.widget.size(), (50,50),\n\
    \                         'incorrect default size')\nclass WidgetResizeTestCase(SimpleWidgetTestCase):\n\
    \    def runTest(self):\n        self.widget.resize(100,150)\n        self.assertEqual(self.widget.size(),\
    \ (100,150),\n                         'wrong size after resize')\n```\n\n如果 `setUp()`\
    \ 方法在测试运行期间引发异常，框架将认为测试发生了错误，并且 `runTest()` 方法将不会被执行。\n\n类似地，我们可以提供一个 `tearDown()`\
    \ 方法，在 `runTest()` 方法运行后进行清理：\n\n> **关键词**\n> **子类**\n> “派生类”、继承类或子类是一个模块化的、派生的类，它从一个或多个其他类（称为超类、基类或父类）继承一个或多个语言实体。\n\
    \n```\nimport unittest\nclass SimpleWidgetTestCase(unittest.TestCase):\n    def\
    \ setUp(self):\n        self.widget = Widget('The widget')\n    def tearDown(self):\n\
    \        self.widget.dispose()\n        self.widget = None\n```\n\n如果 `setUp()`\
    \ 成功，无论 `runTest()` 是否成功，`tearDown()` 方法都会运行。\n\n这种用于测试代码的工作环境称为测试夹具。\n\n通常，许多小测试用例将使用相同的夹具。在这种情况下，我们最终会将\
    \ SimpleWidgetTestCase 子类化为许多小的单方法类，例如 DefaultWidgetSizeTestCase。这既耗时又令人沮丧，因此与\
    \ JUnit 类似，unittest 提供了一种更简单的机制：\n\n```\nimport unittest\nclass WidgetTestCase(unittest.TestCase):\n\
    \    def setUp(self):\n        self.widget = Widget('The widget')\n    def tearDown(self):\n\
    \        self.widget.dispose()\n        self.widget = None\n    def test_default_size(self):\n\
    \        self.assertEqual(self.widget.size(), (50,50),\n                     \
    \    'incorrect default size')\n    def test_resize(self):\n        self.widget.resize(100,150)\n\
    \        self.assertEqual(self.widget.size(), (100,150),\n                   \
    \      'wrong size after resize')\n```\n\n这里我们没有提供 `runTest()` 方法，而是提供了两个不同的测试方法。类实例现在将各自运行一个\
    \ `test_*()` 方法，每个实例的 `self.widget` 将分别创建和销毁。创建实例时，我们必须指定它要运行的测试方法。我们通过在构造函数中传递方法名来做到这一点：\n\
    \n```\ndefaultSizeTestCase = WidgetTestCase('test_default_size')\nresizeTestCase\
    \ = WidgetTestCase('test_resize')\n```"
