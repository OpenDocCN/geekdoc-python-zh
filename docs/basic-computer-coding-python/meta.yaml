    \nAfter studying this chapter, you will be able to:\n\n1. Examine the introduction\
    \ of OOPS in python.\n2. Define the various types of methods of OOPS\n\n## INTRODUCTION\n\
    \nObject-oriented programming (OOP) is a method of structuring a program by bundling\
    \ related properties and behaviors into individual objects. Conceptually, objects\
    \ are like the components of a system. Think of a program as a factory assembly\
    \ line of sorts. At each step of the assembly line a system component processes\
