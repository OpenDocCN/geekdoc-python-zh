- md: "## 3.2.2 Set Size and Membership\n\nThe `len()` function returns the number\
    \ of elements in a set, and the `in` and `not in` operators can be used to test\
    \ for membership:\n\n```python\n>>> x = {'foo', 'bar', 'baz'}\n\n>>> len(x)\n\
    3\n\n>>> 'bar' in x\nTrue\n>>> 'qux' in x\nFalse\n```\n\n## 3.2.3 Methods for\
    \ Sets\n\n### add(x) Method\nAdds the item `x` to set if it is not already present\
    \ in the set.\n```python\npeople = {\"Jay\", \"Idrish\", \"Archil\"}\npeople.add(\"\
    Daxit\")\n# This will add Daxit in people set.\n```\n\n### union(s) Method\nReturns\
    \ a union of two sets. Using the `|` operator between 2 sets is the same as writing\
    \ `set1.union(set2)`.\n```python\npeople = {\"Jay\", \"Idrish\", \"Archil\"}\n\
    vampires = {\"Karan\", \"Arjun\"}\npopulation = people.union(vampires)\n# OR\n\
    population = people | vampires\n# Set population set will have components of both\
    \ people and vampire\n```\n\n### intersect(s) Method\nReturns an intersection\
    \ of two sets. The `&` operator can also be used in this case.\n```python\nvictims\
    \ = people.intersection(vampires)\n# Set victims will contain the common element\
    \ of people and vampire\n```\n\n### difference(s) Method\nReturns a set containing\
    \ all the elements of invoking set but not of the second set. We can use `-` operator\
    \ here.\n```python\nsafe = people.difference(vampires)\n# OR\nsafe = people -\
    \ vampires\n# Set safe will have all the elements that are in people but not vampire\n\
    ```\n\n### clear() Method\nEmpties the whole set.\n```python\nvictims.clear()\n\
    # Clears victim set\n```\n\nHowever there are two major pitfalls in Python sets:\n\
    - The set doesn’t maintain elements in any particular order.\n- Only instances\
    \ of immutable types can be added to a Python set.\n\n## 3.2.4 Creating a Set\n\
    \nA set is created by using the `set()` function or placing all the elements within\
    \ a pair of curly braces.\n\n```python\nDays=set([\"Mon\",\"Tue\",\"Wed\",\"Thu\"\
    ,\"Fri\",\"Sat\",\"Sun\"])\nMonths={\"Jan\", \"Feb\", \"Mar\"}\nDates={21,22,17}\n\
    print(Days)\nprint(Months)\nprint(Dates)\n```\n\nWhen the above code is executed,\
    \ it produces the following result. Please note how the order of the elements\
    \ has changed in the result.\n\n```\nset(['Wed', 'Sun', 'Fri', 'Tue', 'Mon', 'Thu',\
    \ 'Sat'])\nset(['Jan', 'Mar', 'Feb'])\nset([17, 21, 22])\n```\n\n## 3.2.5 Accessing\
    \ Values in a Set\n\nWe cannot access individual values in a set. We can only\
    \ access all the elements together as shown above. But we can also get a list\
    \ of individual elements by looping through the set.\n\n```python\nDays=set([\"\
    Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\",\"Sun\"])\n\nfor d in Days:\n  \
    \  print(d)\n```\n\nWhen the above code is executed, it produces the following\
    \ result.\n\n```\nWed\nSun\nFri\nTue\nMon\nThu\nSat\n```\n\n## 3.2.6 Adding Items\
    \ to a Set\n\nWe can add elements to a set by using `add()` method. Again as discussed\
    \ there is no specific index attached to the newly added element.\n\n```python\n\
    Days=set([\"Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\"])\n\nDays.add(\"Sun\"\
    )\nprint(Days)\n```\n\nWhen the above code is executed, it produces the following\
    \ result.\n\n```\nset(['Wed', 'Sun', 'Fri', 'Tue', 'Mon', 'Thu', 'Sat'])\n```\n\
    \n## 3.2.7 Removing Item from a Set\n\nWe can remove elements from a set by using\
    \ `discard()` method. Again as discussed there is no specific index attached to\
    \ the newly added element.\n\n```python\nDays=set([\"Mon\",\"Tue\",\"Wed\",\"\
    Thu\",\"Fri\",\"Sat\"])\nDays.discard(\"Sun\")\nprint(Days)\n```\n\nWhen the above\
    \ code is executed, it produces the following result.\n\n```\nset(['Wed', 'Fri',\
    \ 'Tue', 'Mon', 'Thu', 'Sat'])\n```\n\n## 3.2.8 Union of Sets\n\nThe union operation\
    \ on two sets produces a new set containing all the distinct elements from both\
    \ the sets. In the below example the element “Wed” is present in both the sets.\n\
    \n```python\nDaysA = set([\"Mon\",\"Tue\",\"Wed\"])\nDaysB = set([\"Wed\",\"Thu\"\
    ,\"Fri\",\"Sat\",\"Sun\"])\nAllDays = DaysA|DaysB\nprint(AllDays)\n```\n\nWhen\
    \ the above code is executed, it produces the following result. Please note the\
    \ result has only one “Wed”.\n\n```\nset(['Wed', 'Fri', 'Tue', 'Mon', 'Thu', 'Sat'])\n\
    ```\n\n## 3.2.9 Intersection of Sets\n\nThe intersection operation on two sets\
    \ produces a new set containing only the common elements from both the sets. In\
    \ the below example the element “Wed” is present in both the sets.\n\n```python\n\
    DaysA = set([\"Mon\",\"Tue\",\"Wed\"])\nDaysB = set([\"Wed\",\"Thu\",\"Fri\",\"\
    Sat\",\"Sun\"])\nAllDays = DaysA & DaysB\nprint(AllDays)\n```\n\nWhen the above\
    \ code is executed, it produces the following result. Please note the result has\
    \ only one “Wed”.\n\n```\nset(['Wed'])\n```\n\n## 3.2.10 Difference of Sets\n\n\
    The difference operation on two sets produces a new set containing only the elements\
    \ from the first set and none from the second set. In the below example the element\
    \ “Wed” is present in both the sets so it will not be found in the result set.\n\
    \n```python\nDaysA = set([\"Mon\",\"Tue\",\"Wed\"])\nDaysB = set([\"Wed\",\"Thu\"\
    ,\"Fri\",\"Sat\",\"Sun\"])\nAllDays = DaysA - DaysB\nprint(AllDays)\n```\n\nWhen\
    \ the above code is executed, it produces the following result. Please note the\
    \ result has only one “Wed”.\n\n```\nset(['Mon', 'Tue'])\n```\n\n## 3.2.11 Compare\
    \ Sets\n\nWe can check if a given set is a subset or superset of another set.\
    \ The result is True or False depending on the elements present in the sets.\n\
    \n```python\nDaysA = set([\"Mon\",\"Tue\",\"Wed\"])\nDaysB = set([\"Mon\",\"Tue\"\
    ,\"Wed\",\"Thu\",\"Fri\",\"Sat\",\"Sun\"])\nSubsetRes = DaysA <= DaysB\nSupersetRes\
    \ = DaysB >= DaysA\nprint(SubsetRes)\nprint(SupersetRes)\n```\n\nWhen the above\
    \ code is executed, it produces the following result.\n\n```\nTrue\nTrue\n```\n\
    \n## 3.3 FILES\n\nFiles are traditionally a part of data structures. And although\
    \ big data is commonplace in the data science industry, a programming language\
    \ without the capability to store and retrieve previously stored information would\
    \ hardly be useful. You still have to make use of all the data sitting in files\
    \ across databases and you will learn how to do this.\n\nThe syntax to read and\
    \ write files in Python is similar to other **programming languages** but a lot\
    \ easier to handle. Here are some of the basic functions that will help you to\
    \ work with files using Python:\n\n- `open()` to open files in your system, the\
    \ filename is the name of the file to be opened;\n- `read()` to read entire files;\n\
    - `readline()` to read one line at a time;\n- `write()` to write a string to a\
    \ file, and return the number of characters written; And\n- `close()` to close\
    \ the file.\n\n```python\n# File modes (2nd argument): 'r'(read), 'w'(write),\
    \ 'a'(appending), 'r+'(both reading and writing)\nf = open('file_name', 'w')\n\
    \n# Reads entire file\nf.read()\n# Reads one line at a time\nf.readline()\n# Writes\
    \ the string to the file, returning the number of char written\nf.write('Add this\
    \ line.')\nf.close()\n```\n\nThe second argument in the `open()` function is the\
    \ file mode. It allows you to specify whether you want to read (`r`), write (`w`),\
    \ append (`a`) or both read and write (`r+`).\n\n### 3.3.1 The open function\n\
    \nThe `open` function takes two arguments. The first is the name of the file,\
    \ and the second is the **mode**. Mode `'w'` means that we are opening the file\
    \ for writing. Mode `'r'` means reading, and mode `'a'` means appending.\n\nLet's\
    \ begin with an example that shows these three modes in operation:\n\n```python\n\
    >>> myfile = open('test.txt', 'w')\n>>> myfile.write('My first file written from\
    \ Python\\n')\n34\n>>> myfile.write('-----------------------------------\\n')\n\
    34\n>>> myfile.write('Hello, world!')\n13\n>>> myfile.close()\n>>> myfile = open('test.txt',\
    \ 'r')\n>>> contents = myfile.read()\n>>> myfile.close()\n>>> print(contents)\n\
    My first file written from Python\n-----------------------------------\nHello,\
    \ world!\n```\n\nOpening a file creates what we call a file descriptor. In this\
    \ example, the variable `myfile` refers to the new descriptor object. Our program\
    \ calls methods on the descriptor, and this makes changes to the actual file which\
    \ is located in non-volatile storage.\n\nThe first line opens the `test.txt` for\
    \ writing. If there is no file named `test.txt` on the disk, it will be created.\
    \ If there already is one, it will be replaced by the file we are writing and\
    \ any previous data in it will be lost.\n\nTo put data in the file we invoke the\
    \ `write` method on the file descriptor. We do this three times in the example\
    \ above, but in bigger programs, the three separate calls to `write` will usually\
    \ be replaced by a loop that writes many more lines into the file. The `write`\
    \ method returns the number of bytes (characters) written to the file.\n\nClosing\
    \ the file handle tells the system that we are done writing and makes the disk\
    \ file available for reading by other programs (or by our own program).\n\nWe\
    \ finish this example by opening `test.txt` for reading. We then call the `read`\
    \ method, assigning the contents of the file, which is a string, to a variable\
    \ named `contents`, and finally print `contents` to see that it is indeed what\
    \ we wrote to the file previously.\n\nIf we want to add to an already existing\
    \ file, use the *append* mode.\n\n> Many common files you may use, such as Word\
    \ documents or Excel spreadsheets are NOT text documents. They have their own\
    \ complicated file formats. Text files are ones you can create in simple text\
    \ editors, by simply typing regular keys without any special features, such as\
    \ bolding text, different fonts, etc."
  mdcn: "## 3.2.2 集合的大小与成员关系\n\n`len()` 函数返回集合中元素的数量，而 `in` 和 `not in` 运算符可用于测试成员关系：\n\
    \n```python\n>>> x = {'foo', 'bar', 'baz'}\n\n>>> len(x)\n3\n\n>>> 'bar' in x\n\
    True\n>>> 'qux' in x\nFalse\n```\n\n## 3.2.3 集合的方法\n\n### add(x) 方法\n如果元素 `x`\
    \ 不在集合中，则将其添加到集合中。\n```python\npeople = {\"Jay\", \"Idrish\", \"Archil\"}\npeople.add(\"\
    Daxit\")\n# 这会将 Daxit 添加到 people 集合中。\n```\n\n### union(s) 方法\n返回两个集合的并集。在两个集合之间使用\
    \ `|` 运算符与编写 `set1.union(set2)` 效果相同。\n```python\npeople = {\"Jay\", \"Idrish\"\
    , \"Archil\"}\nvampires = {\"Karan\", \"Arjun\"}\npopulation = people.union(vampires)\n\
    # 或者\npopulation = people | vampires\n# 集合 population 将包含 people 和 vampire 的所有元素\n\
    ```\n\n### intersect(s) 方法\n返回两个集合的交集。这种情况下也可以使用 `&` 运算符。\n```python\nvictims\
    \ = people.intersection(vampires)\n# 集合 victims 将包含 people 和 vampire 的共同元素\n```\n\
    \n### difference(s) 方法\n返回一个集合，包含调用集合中所有但不在第二个集合中的元素。这里可以使用 `-` 运算符。\n```python\n\
    safe = people.difference(vampires)\n# 或者\nsafe = people - vampires\n# 集合 safe\
    \ 将包含所有在 people 中但不在 vampire 中的元素\n```\n\n### clear() 方法\n清空整个集合。\n```python\n\
    victims.clear()\n# 清空 victims 集合\n```\n\n然而，Python 集合有两个主要的注意事项：\n- 集合不以任何特定顺序维护元素。\n\
    - 只有不可变类型的实例才能添加到 Python 集合中。\n\n## 3.2.4 创建集合\n\n可以通过使用 `set()` 函数或将所有元素放在一对花括号内来创建集合。\n\
    \n```python\nDays=set([\"Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\",\"Sun\"\
    ])\nMonths={\"Jan\", \"Feb\", \"Mar\"}\nDates={21,22,17}\nprint(Days)\nprint(Months)\n\
    print(Dates)\n```\n\n执行上述代码时，会产生以下结果。请注意结果中元素的顺序发生了变化。\n\n```\nset(['Wed', 'Sun',\
    \ 'Fri', 'Tue', 'Mon', 'Thu', 'Sat'])\nset(['Jan', 'Mar', 'Feb'])\nset([17, 21,\
    \ 22])\n```\n\n## 3.2.5 访问集合中的值\n\n我们无法访问集合中的单个值。我们只能像上面那样一起访问所有元素。但我们也可以通过遍历集合来获取单个元素的列表。\n\
    \n```python\nDays=set([\"Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\",\"Sun\"\
    ])\n\nfor d in Days:\n    print(d)\n```\n\n执行上述代码时，会产生以下结果。\n\n```\nWed\nSun\n\
    Fri\nTue\nMon\nThu\nSat\n```\n\n## 3.2.6 向集合中添加元素\n\n我们可以使用 `add()` 方法向集合中添加元素。同样如前所述，新添加的元素没有特定的索引。\n\
    \n```python\nDays=set([\"Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\"])\n\nDays.add(\"\
    Sun\")\nprint(Days)\n```\n\n执行上述代码时，会产生以下结果。\n\n```\nset(['Wed', 'Sun', 'Fri',\
    \ 'Tue', 'Mon', 'Thu', 'Sat'])\n```\n\n## 3.2.7 从集合中移除元素\n\n我们可以使用 `discard()`\
    \ 方法从集合中移除元素。同样如前所述，新添加的元素没有特定的索引。\n\n```python\nDays=set([\"Mon\",\"Tue\",\"\
    Wed\",\"Thu\",\"Fri\",\"Sat\"])\nDays.discard(\"Sun\")\nprint(Days)\n```\n\n执行上述代码时，会产生以下结果。\n\
    \n```\nset(['Wed', 'Fri', 'Tue', 'Mon', 'Thu', 'Sat'])\n```\n\n## 3.2.8 集合的并集\n\
    \n两个集合的并集操作会产生一个新集合，包含两个集合中所有不重复的元素。在下面的例子中，元素 \"Wed\" 同时存在于两个集合中。\n\n```python\n\
    DaysA = set([\"Mon\",\"Tue\",\"Wed\"])\nDaysB = set([\"Wed\",\"Thu\",\"Fri\",\"\
    Sat\",\"Sun\"])\nAllDays = DaysA|DaysB\nprint(AllDays)\n```\n\n执行上述代码时，会产生以下结果。请注意结果中只有一个\
    \ \"Wed\"。\n\n```\nset(['Wed', 'Fri', 'Tue', 'Mon', 'Thu', 'Sat'])\n```\n\n##\
    \ 3.2.9 集合的交集\n\n两个集合的交集操作会产生一个新集合，仅包含两个集合中的共同元素。在下面的例子中，元素 \"Wed\" 同时存在于两个集合中。\n\
    \n```python\nDaysA = set([\"Mon\",\"Tue\",\"Wed\"])\nDaysB = set([\"Wed\",\"Thu\"\
    ,\"Fri\",\"Sat\",\"Sun\"])\nAllDays = DaysA & DaysB\nprint(AllDays)\n```\n\n执行上述代码时，会产生以下结果。请注意结果中只有一个\
    \ \"Wed\"。\n\n```\nset(['Wed'])\n```\n\n## 3.2.10 集合的差集\n\n两个集合的差集操作会产生一个新集合，仅包含第一个集合中的元素，而不包含第二个集合中的任何元素。在下面的例子中，元素\
    \ \"Wed\" 同时存在于两个集合中，因此它不会出现在结果集中。\n\n```python\nDaysA = set([\"Mon\",\"Tue\"\
    ,\"Wed\"])\nDaysB = set([\"Wed\",\"Thu\",\"Fri\",\"Sat\",\"Sun\"])\nAllDays =\
    \ DaysA - DaysB\nprint(AllDays)\n```\n\n执行上述代码时，会产生以下结果。请注意结果中只有一个 \"Wed\"。\n\n\
    ```\nset(['Mon', 'Tue'])\n```\n\n## 3.2.11 比较集合\n\n我们可以检查一个给定的集合是否是另一个集合的子集或超集。结果是\
    \ True 或 False，取决于集合中存在的元素。\n\n```python\nDaysA = set([\"Mon\",\"Tue\",\"Wed\"\
    ])\nDaysB = set([\"Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\",\"Sun\"])\nSubsetRes\
    \ = DaysA <= DaysB\nSupersetRes = DaysB >= DaysA\nprint(SubsetRes)\nprint(SupersetRes)\n\
    ```\n\n执行上述代码时，会产生以下结果。\n\n```\nTrue\nTrue\n```\n\n## 3.3 文件\n\n文件传统上是数据结构的一部分。尽管大数据在数据科学行业已司空见惯，但一种没有存储和检索先前存储信息能力的编程语言几乎毫无用处。你仍然需要利用所有存储在数据库文件中的数据，你将学习如何做到这一点。\n\
    \n在 Python 中读写文件的语法与其他**编程语言**相似，但处理起来容易得多。以下是一些基本函数，可帮助你使用 Python 处理文件：\n\n-\
    \ `open()` 用于打开系统中的文件，文件名是要打开的文件的名称；\n- `read()` 用于读取整个文件；\n- `readline()` 用于一次读取一行；\n\
    - `write()` 用于将字符串写入文件，并返回写入的字符数；以及\n- `close()` 用于关闭文件。\n\n```python\n# 文件模式（第二个参数）：'r'（读取），'w'（写入），'a'（追加），'r+'（读写）\n\
    f = open('file_name', 'w')\n\n# 读取整个文件\nf.read()\n# 一次读取一行\nf.readline()\n# 将字符串写入文件，返回写入的字符数\n\
    f.write('Add this line.')\nf.close()\n```\n\n`open()` 函数中的第二个参数是文件模式。它允许你指定是要读取（`r`）、写入（`w`）、追加（`a`）还是同时读写（`r+`）。\n\
    \n### 3.3.1 open 函数\n\n`open` 函数接受两个参数。第一个是文件名，第二个是**模式**。模式 `'w'` 表示我们以写入模式打开文件。模式\
    \ `'r'` 表示读取，模式 `'a'` 表示追加。\n\n让我们从一个展示这三种模式操作的示例开始：\n\n```python\n>>> myfile\
    \ = open('test.txt', 'w')\n>>> myfile.write('My first file written from Python\\\
    n')\n34\n>>> myfile.write('-----------------------------------\\n')\n34\n>>> myfile.write('Hello,\
    \ world!')\n13\n>>> myfile.close()\n>>> myfile = open('test.txt', 'r')\n>>> contents\
    \ = myfile.read()\n>>> myfile.close()\n>>> print(contents)\nMy first file written\
    \ from Python\n-----------------------------------\nHello, world!\n```\n\n打开文件会创建我们所谓的文件描述符。在这个例子中，变量\
    \ `myfile` 指向新的描述符对象。我们的程序在描述符上调用方法，这会对位于非易失性存储中的实际文件进行更改。\n\n第一行以写入模式打开 `test.txt`。如果磁盘上没有名为\
    \ `test.txt` 的文件，它将被创建。如果已经存在一个，它将被我们正在写入的文件替换，其中的任何先前数据都将丢失。\n\n为了将数据放入文件，我们在文件描述符上调用\
    \ `write` 方法。我们在上面的例子中这样做了三次，但在更大的程序中，对 `write` 的三次单独调用通常会被一个循环取代，该循环将更多行写入文件。`write`\
    \ 方法返回写入文件的字节数（字符数）。\n\n关闭文件句柄告诉系统我们已完成写入，并使磁盘文件可供其他程序（或我们自己的程序）读取。\n\n我们通过以读取模式打开\
    \ `test.txt` 来完成这个示例。然后我们调用 `read` 方法，将文件内容（一个字符串）赋值给名为 `contents` 的变量，最后打印 `contents`\
    \ 以查看它确实是我们之前写入文件的内容。\n\n如果我们想向已存在的文件添加内容，请使用 *追加* 模式。\n\n> 你可能使用的许多常见文件，如 Word\
    \ 文档或 Excel 电子表格，不是文本文件。它们有自己的复杂文件格式。文本文件是你可以在简单文本编辑器中创建的文件，只需通过普通按键输入，无需任何特殊功能，如加粗文本、不同字体等。"
