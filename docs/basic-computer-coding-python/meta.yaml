    # 5.1 INTRODUCTION OF OOPS IN PYTHON


    Object-oriented Programming, or OOP for short, is a programming paradigm which
    provides a means of structuring programs so that properties and behaviors are
    bundled into individual objects.


    For instance, an object could represent a person with a name property, age, address,
    etc., with behaviors like walking, talking, breathing, and running. Or an email
    with properties like recipient list, subject, body, etc., and behaviors like adding
    attachments and sending.


    Put another way, object-oriented programming is an approach for modeling concrete,
    real-world things like cars as well as relations between things like companies
    and employees, students and teachers, etc. OOP models real-world entities as software
    objects, which have some data associated with them and can perform certain functions.


    Another common programming paradigm is procedural programming which structures
    a program like a recipe in that it provides a set of steps, in the form of functions
    and code blocks, which flow sequentially in order to complete a task.


    The key takeaway is that objects are at the center of the object-oriented programming
    paradigm, not only representing the data, as in procedural programming, but in
    the overall structure of the program as well.


    # 5.1.1 Classes in Python


    Focusing first on the data, each thing or object is an instance of some class.
    The primitive data structures available in Python, like numbers, strings, and
    lists are designed to represent simple things like the cost of something, the
    name of a poem, and your favorite colors, respectively. What if you wanted to
    represent something much more complicated?


