    # `__contains__`


    `__contains__` is the built in protocol for membership.

    `x in y` resolves to `y.__contains__(x)`


    When the interpreter encounters `''b'' in [''a'', ''b'']` it knows to look for
    the `__contains__` function on the object to the right of `in` and pass it the
    object to the left of `in` as **parameter**.


    A list object has that function defined and the interpreter then executes the
    corresponding code block.


    All data structures have the concept of membership defined:


    ```

    >>> ''b'' in [''a'', ''b'']

    True

    >>> ''b'' in (''a'', ''b'')

    True

    >>> ''b'' in {''a'': 1, ''b'': 2}

    True

    >>> ''b'' in {''a'', ''b''}

    True

    ```


    Demonstrating `__contains__`:


    ```

    >>> [''a'', ''b''].__contains__(''b'')

    True

    >>> (''a'', ''b'').__contains__(''b'')

    True

    >>> {''a'': 1, ''b'': 2}.__contains__(''b'')

    True

    >>> {''a'', ''b''}.__contains__(''b'')

    True

    ```'
