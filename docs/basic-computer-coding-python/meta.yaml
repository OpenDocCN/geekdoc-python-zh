    \n## 7.2.2 Thread Objects\n\nThe Thread class that we mentioned earlier in this\
    \ blog denotes an activity running in a separate thread of control. We can represent\
    \ this activity either by passing a callable object to the constructor, or by\
    \ overriding the method run() in a subclass. You must make sure to not override\
    \ other methods in a subclass, except for the constructor. In short, only override\
    \ a class's `__init__()` and `run()` methods.\n\nOnce the interpreter creates\
    \ a thread object, we must start its activity by calling its `start()` method.\
    \ This will invoke its `run()` method in a separate thread of control. Once this\
    \ happens, we consider the thread to be 'alive'. When `run()` terminates normally\
    \ or raising an exception we did not handle, it is no longer alive. To test whether\
    \ a thread is alive, we may use the method `is_alive()`.\n\nA thread may call\
    \ another's `join()` method. This will block the calling thread until the other\
    \ terminates.\n\nThreads have names, and we can pass these names to the constructor,\
    \ and even read or modify them.\n\nWe can flag a thread as a 'daemon thread'.\
    \ This means that the whole program exits when only the daemon threads remain.\
    \ This initial value comes from the creating thread. We can set this flag via\
    \ the property 'daemon', or via the **constructor** argument 'daemon'. Daemons\
    \ abruptly stop at shutdown, and they may not properly release all the resources\
    \ held. These resources may include open files, database transactions, and others.\
    \ To stop our threads gracefully, we must make them non-daemonic. It is also preferable\
    \ to use a suitable signaling process, like an Event.\n\nThe 'main thread' object\
    \ pertains to the initial thread of control in our program; it is not a daemon.\n\
    \nFinally, it is possible that the interpreter creates 'dummy thread objects'.\
    \ These are 'alien threads' (threads of control started outside 'threading', for\
    \ ex, directly from C code). Such objects have limited functionality, and are\
    \ always live and daemonic. We cannot `join()` them. We can also never delete\
    \ them since it is impossible to detect when they terminate.\n\n> **Constructor**\
    \ is a block of codes similar to the method. It is called when an instance of\
    \ the class is created.\n\nThis is the class:\n\n```\nclass threading.Thread(group=None,\
    \ target=None, name=None, args=(), kwargs={}, *, daemon=None)\n```\n\nTake note:\n\
    \n- Always call the constructor with keyword arguments. It has the following arguments:\n\
    - *group* must be None. Python reserves this for future extension when we implement\
    \ a ThreadGroup class.\n- *target* is a callable object that `run()` will invoke.\
    \ The default for this is None, which means it calls nothing.\n- *name* is the\
    \ name of the thread. The default for this is \"Thread-N\". Here, N is a small\
    \ decimal number.\n- *args* is an argument tuple. It helps invoke the target.\
    \ The default for this is ().\n- *kwargs* is a dictionary holding keyword arguments.\
    \ Even this helps invoke the target. The default for this is {}.\n- *daemon* decides\
    \ whether the thread is daemonic. When None, it inherits the daemonic property\
    \ from the current thread. The default for this is None.\n- Ensure that you invoke\
    \ the base class constructor(`Thread.__init__()`) first if the subclass overrides\
    \ the constructor.\n\nThread has the following methods:\n\n### a. start()\n\n\
    This starts thread activity. For a thread object, we can call it maximum once;\
    \ if we call it again, it raises a RuntimeError. This lets `run()` for the object\
    \ invoke in a separate thread of control.\n\n```\n>>> threading.Thread.start(threading.current_thread())\n\
    Traceback (most recent call last):\n  File \"<pyshell#135>\", line 1, in <module>\n\
    \    threading.Thread.start(threading.current_thread())\nRuntimeError: threads\
    \ can only be started once\n```\n\n### b. run()\n\nThis method explains the thread's\
    \ activity. It invokes the callable object we passed to the object's constructor\
    \ as the target argument, if it exists. This is with keyword and sequential arguments\
    \ from *kwargs* and *args*.\nWe can override `run()` in a subclass.\n\n### c.\
    \ join(timeout=None)\n\nFor `join()` to work, we must wait until the thread terminates.\
    \ Because when that happens, it blocks the calling thread until the one on which\
    \ we call `join()` terminates normally or via an exception we did not handle,\
    \ or until *timeout* occurs.\n\nWhen you do provide a *timeout* (other than None),\
    \ make sure it is a floating point number. This is so you can pass a timeout in\
    \ seconds or fractions.\n\nSo, what is the return value? Well, `join()` always\
    \ returns None. Hence, you will need to call `is_alive()` after calling `join()`\
    \ to determine if a timeout happened. If we find out that it is indeed still alive,\
    \ then we infer that the `join()` call timed out.\n\nHowever, if *timeout* is\
    \ None, or if we did not pass it, this blocks the operation until the thread terminates.\
    \ We can `join()` a thread many times.\n\nFinally, `join()` will raise a RuntimeError\
    \ if we try to join the current thread, because that causes a deadlock. To `join()`\
    \ a thread before we start it also causes an error.\n\n```\n>>> threading.Thread.join(threading.current_thread())\n\
    Traceback (most recent call last):\n  File \"<pyshell#138>\", line 1, in <module>\n\
    \    threading.Thread.join(threading.current_thread())\nRuntimeError: cannot join\
    \ current thread\n```\n\n### d. name\n\nThis is a string we use for identification;\
    \ it has no meaning. We can also give the same meaning to multiple threads. The\
    \ constructor sets the initial name.\n\n```\n>>> threading.Thread.name='First'\n\
    >>>\n```\n\n### e. getName() and setName()\n\nThese are old getter and setter\
    \ APIs for *name*. We use them directly as properties.\n\n### f. ident\n\nIf we\
    \ started the thread, this returns its identifier. Otherwise, it returns None.\
    \ Note that it is a non-zero integer, like in the `get_ident()` function. Python\
    \ may recycle identifiers when one thread exits and another creates. Such identifiers\
    \ exist even after a thread exits.\n\n### g. is_alive()\n\nThis returns whether\
    \ the thread is alive. `is_alive()` returns true from just before `run()` starts\
    \ until just after it terminates.\n\n```\n>>> threading.Thread.is_alive(threading.current_thread())\n\
    True\n```\n\n### h. daemon\n\nThis is a boolean value indicating whether the thread\
    \ is a daemon thread. This must be set before `start()` is called. Its value is\
    \ inherited from the creating thread. The property is a getter and setter for\
    \ this value.\n\n### i. settrace(func)\n\n`settrace()` traces a function for all\
    \ threads we started using 'threading'. The argument func passes to `sys.settrace()`\
    \ for each thread before it calls its `run()` method.\n\n```\n>>> def sayhi():\n\
    \    print(\"Hi\")\n>>> threading.settrace(sayhi)\n>>>\n```\n\n### j. setprofile(func)\n\
    \nThis method sets a profile function for all threads we started from 'threading'.\
    \ It passes *func* to `sys.setprofile()` for each thread before it calls its `run()`\
    \ method.\n\n```\n>>> threading.setprofile(sayhi)\n>>>\n```\n\n### k. stack_size([size])\n\
    \n`stack_size()` returns the stack size of a thread when creating new threads.\
    \ *size* is the stack size we want to use for subsequently created threads. This\
    \ must be equal to 0 or a positive integer of value at least 32,768 (32KiB). When\
    \ not specified, it uses 0. And if it does not support changing thread stack size,\
    \ it raises a RuntimeError.\n\nWhen we pass an invalid stack size, it raises a\
    \ ValueError, and does not modify it. The minimum stack size it currently supports\
    \ to guarantee enough stack space for the interpreter itself is 32KiB. Some platforms\
    \ may need a minimum stack size greater than 32KiB. Others may need to allocate\
    \ in multiples of system memory page size.\n\n```\n>>> threading.stack_size()\n\
    0\n```\n\nApart from functions, 'threading' also defines a constant.\n\n### l.\
    \ TIMEOUT_MAX\n\nThis holds the maximum allowed value for this constant, the timeout\
    \ parameter for blocking functions like `Lock.acquire()`, `Condition.wait()`,\
    \ `RLock.acquire()`, and others. If we denote a timeout greater than this, it\
    \ raises an OverflowError.\n\n```\n>>> threading.TIMEOUT_MAX\n4294967.0\n```\n\
    \nIn Java, locks and condition variables are the basic behavior of every object.\
    \ Whereas in Python, they are individual objects. Here, the class Thread supports\
    \ some of the functionality of class **Thread** in Java. However, currently, we\
    \ have no thread groups, priorities, and we cannot destroy, stop, suspend, resume,\
    \ or interrupt threads. When we implement the static methods from Java's Thread,\
    \ they map to module-level functions. This way, 'threading' is much like Java's\
    \ threading model in design."
  mdcn: "## 7.2.1 线程局部数据\n\n其值为线程特定的数据，称为线程局部数据。要管理此类数据，我们可以创建 `local` 类或其子类的实例，然后在其上存储属性。\n\
    \n```\n>>> mydata=threading.local()\n>>> mydata.x=7\n>>>\n```\n\n这些实例值对于每个线程都是不同的。我们有以下表示线程局部数据的类：\n\
    \n```\nclass threading.local\n```\n\n一个表示线程局部数据的类。\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_225_0.png)\n\
    \n## 7.2.2 线程对象\n\n我们之前在本博客中提到的 `Thread` 类表示在单独控制线程中运行的活动。我们可以通过向构造函数传递可调用对象，或者在子类中重写\
    \ `run()` 方法来表示此活动。请确保不要在子类中重写除构造函数以外的其他方法。简而言之，只重写类的 `__init__()` 和 `run()` 方法。\n\
    \n一旦解释器创建了线程对象，我们必须通过调用其 `start()` 方法来启动其活动。这将在单独的控制线程中调用其 `run()` 方法。一旦发生这种情况，我们就认为该线程是“活动的”。当\
    \ `run()` 正常终止或引发我们未处理的异常时，它就不再活动。要测试线程是否活动，我们可以使用 `is_alive()` 方法。\n\n一个线程可以调用另一个线程的\
    \ `join()` 方法。这将阻塞调用线程，直到另一个线程终止。\n\n线程有名称，我们可以将这些名称传递给构造函数，甚至可以读取或修改它们。\n\n我们可以将线程标记为“守护线程”。这意味着当只剩下守护线程时，整个程序就会退出。此初始值来自创建线程。我们可以通过\
    \ `daemon` 属性或通过 **构造函数** 参数 `daemon` 来设置此标志。守护线程在关闭时会突然停止，它们可能无法正确释放所有持有的资源。这些资源可能包括打开的文件、数据库事务等。为了优雅地停止我们的线程，我们必须使它们成为非守护线程。最好使用合适的信号进程，例如\
    \ `Event`。\n\n“主线程”对象属于我们程序中的初始控制线程；它不是守护线程。\n\n最后，解释器可能会创建“虚拟线程对象”。这些是“外部线程”（在\
    \ `threading` 之外启动的控制线程，例如直接从 C 代码启动）。此类对象功能有限，并且始终是活动的和守护的。我们无法 `join()` 它们。我们也永远无法删除它们，因为无法检测它们何时终止。\n\
    \n> **构造函数** 是一段类似于方法的代码块。当类的实例被创建时调用它。\n\n这是该类：\n\n```\nclass threading.Thread(group=None,\
    \ target=None, name=None, args=(), kwargs={}, *, daemon=None)\n```\n\n请注意：\n\n\
    - 始终使用关键字参数调用构造函数。它具有以下参数：\n- *group* 必须为 `None`。Python 保留此参数以备将来扩展，当我们实现 `ThreadGroup`\
    \ 类时使用。\n- *target* 是 `run()` 将调用的可调用对象。其默认值为 `None`，这意味着它不调用任何内容。\n- *name* 是线程的名称。其默认值为\
    \ `\"Thread-N\"`。这里，N 是一个小的十进制数。\n- *args* 是一个参数元组。它有助于调用目标。其默认值为 `()`。\n- *kwargs*\
    \ 是一个包含关键字参数的字典。它也有助于调用目标。其默认值为 `{}`。\n- *daemon* 决定线程是否为守护线程。当为 `None` 时，它从当前线程继承守护属性。其默认值为\
    \ `None`。\n- 如果子类重写了构造函数，请确保首先调用基类构造函数（`Thread.__init__()`）。\n\nThread 具有以下方法：\n\
    \n### a. start()\n\n这会启动线程活动。对于一个线程对象，我们最多只能调用它一次；如果我们再次调用它，它会引发 `RuntimeError`。这使得对象的\
    \ `run()` 在单独的控制线程中被调用。\n\n```\n>>> threading.Thread.start(threading.current_thread())\n\
    Traceback (most recent call last):\n  File \"<pyshell#135>\", line 1, in <module>\n\
    \    threading.Thread.start(threading.current_thread())\nRuntimeError: threads\
    \ can only be started once\n```\n\n### b. run()\n\n此方法描述了线程的活动。如果存在，它会调用我们作为 `target`\
    \ 参数传递给对象构造函数的可调用对象。这是使用来自 *kwargs* 和 *args* 的关键字和顺序参数。\n我们可以在子类中重写 `run()`。\n\
    \n### c. join(timeout=None)\n\n要使 `join()` 工作，我们必须等待线程终止。因为当它发生时，它会阻塞调用线程，直到我们调用\
    \ `join()` 的线程正常终止或通过我们未处理的异常终止，或者直到 *timeout* 发生。\n\n当你确实提供了一个 *timeout*（不是 `None`）时，请确保它是一个浮点数。这样你就可以传递以秒或分数为单位的超时时间。\n\
    \n那么，返回值是什么？嗯，`join()` 总是返回 `None`。因此，你需要在调用 `join()` 之后调用 `is_alive()` 来确定是否发生了超时。如果我们发现它确实仍然活动，那么我们推断\
    \ `join()` 调用超时了。\n\n然而，如果 *timeout* 是 `None`，或者我们没有传递它，这会阻塞操作直到线程终止。我们可以多次 `join()`\
    \ 一个线程。\n\n最后，如果我们尝试 `join()` 当前线程，`join()` 将引发 `RuntimeError`，因为这会导致死锁。在启动线程之前\
    \ `join()` 它也会导致错误。\n\n```\n>>> threading.Thread.join(threading.current_thread())\n\
    Traceback (most recent call last):\n  File \"<pyshell#138>\", line 1, in <module>\n\
    \    threading.Thread.join(threading.current_thread())\nRuntimeError: cannot join\
    \ current thread\n```\n\n### d. name\n\n这是一个用于标识的字符串；它没有意义。我们也可以给多个线程赋予相同的含义。构造函数设置初始名称。\n\
    \n```\n>>> threading.Thread.name='First'\n>>>\n```\n\n### e. getName() 和 setName()\n\
    \n这些是用于 *name* 的旧式 getter 和 setter API。我们直接将它们用作属性。\n\n### f. ident\n\n如果我们启动了线程，这会返回其标识符。否则，它返回\
    \ `None`。请注意，它是一个非零整数，就像 `get_ident()` 函数一样。当一个线程退出而另一个线程创建时，Python 可能会回收标识符。即使在线程退出后，此类标识符也存在。\n\
    \n### g. is_alive()\n\n这返回线程是否活动。`is_alive()` 从 `run()` 开始之前直到它终止之后都返回 `True`。\n\
    \n```\n>>> threading.Thread.is_alive(threading.current_thread())\nTrue\n```\n\n\
    ### h. daemon\n\n这是一个布尔值，指示线程是否为守护线程。这必须在调用 `start()` 之前设置。其值从创建线程继承。该属性是此值的 getter\
