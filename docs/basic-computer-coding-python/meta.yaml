    \ Python 的标准 JSON 库来解码它。下载图像是一项更简单的任务，因为你只需通过其 URL 获取图像并将其写入文件即可。\n\n### 7.1.2\
    \ 用于线程实现的 Python 多线程模块\n\nPython 提供了两个模块来在程序中实现线程。\n\n- `<thread>` 模块和\n- `<threading>`\
    \ 模块。\n\n供你参考，`<thread>` 模块在 Python 3 中已弃用，并重命名为 `<_thread>` 模块以保持向后兼容性。但我们将解释这两种方法，因为许多用户仍在使用旧版\
    \ Python 版本。\n\n这两个模块的关键区别在于，`<thread>` 模块将线程实现为一个函数。另一方面，`<threading>` 模块提供了一种面向对象的方法来启用线程创建。\n\
    \n> IronPython，一个使用 .NET 框架的 Python 实现，没有 GIL，基于 Java 的实现 Jython 也没有。你可以找到一个可用的\
    \ Python 实现列表。\n\n### 7.1.3 多进程与多线程的区别\n\n多进程和多线程都能为系统增加性能。多进程是向系统添加更多的 CPU/处理器，从而提高系统的计算速度。多线程是允许一个进程创建更多的线程，从而提高系统的响应性。\n\
    \n![](img/192fecf3b33c4ee7d07f7123b285647a_222_0.png)\n\n## 比较图表\n\n| 比较基础 | 多进程\
    \ | 多线程 |\n| :--- | :--- | :--- |\n| 基本原理 | 多进程添加 CPU 以增加计算能力。 | 多线程创建单个进程的多个线程以增加计算能力。\
    \ |\n| 执行方式 | 多个进程并发执行。 | 单个进程的多个线程并发执行。 |\n| 创建开销 | 创建进程耗时且资源密集。 | 创建线程在时间和资源上都很经济。\
    \ |\n| 分类 | 多进程可以是对称的或非对称的。 | 多线程没有进一步分类。 |\n\n## 多进程与多线程的关键区别\n\n- 多进程和多线程的关键区别在于，多进程允许系统添加两个以上的\
    \ CPU，而多线程让一个进程生成多个线程以提高系统的计算速度。\n- 多进程系统同时执行**多个进程**，而多线程系统同时执行一个进程的多个线程。\n-\
    \ 创建进程可能消耗时间甚至耗尽系统资源。然而，创建线程是经济的，因为属于同一进程的线程共享该进程的资源。\n- 多进程可以分为对称多处理和非对称多处理，而多线程没有进一步分类。\n\
    \n在多进程环境中，多线程的好处可以逐渐增加，因为多处理系统上的多线程增加了并行性。\n\n## 7.2 PYTHON 多线程中的函数\n\nPython\
    \ 的 `threading` 模块帮助我们实现基于线程的并行性。它在底层的 `_thread` 模块之上构建了更高级的线程接口。如果缺少 `_thread`，我们就无法使用\
    \ `threading`。对于这种情况，我们有 `dummy_threading`。\n\n> `fork` 函数创建进程的副本，所有内存页面都被复制，打开的文件描述符也被复制等等。所有这些对于\
