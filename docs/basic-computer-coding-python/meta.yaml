    ('Deadpool', Decimal('363.6'))\n('Forrest Gump', Decimal('330.2'))\n('Skyfall',\
    \ Decimal('304.6'))\n\nMySQL offers a plethora of string formatting operations\
    \ like CONCAT for concatenating strings. Often, websites will show the movie title\
    \ along with its release year to avoid confusion. To retrieve the titles of the\
    \ top five grossing movies, concatenated with their release years, you can write\
    \ the following query:\n\n```python\n>>> select_movies_query = \"\"\"\n... SELECT\
    \ CONCAT(title, \" (\", release_year, \")\"),\n...     collection_in_mil\n...\
    \ FROM movies\n... ORDER BY collection_in_mil DESC\n... LIMIT 5\n... \"\"\"\n\
    >>> with connection.cursor() as cursor:\n...     cursor.execute(select_movies_query)\n\
    ...     for movie in cursor.fetchall():\n...         print(movie)\n```\n\n('Avengers:\
    \ Endgame (2019)', Decimal('858.8'))\n('Titanic (1997)', Decimal('659.2'))\n('The\
    \ Dark Knight (2008)', Decimal('535.4'))\n('Toy Story 4 (2019)', Decimal('434.9'))\n\
    ('The Lion King (1994)', Decimal('423.6'))\n\nIf you don't want to use the LIMIT\
    \ clause and you don't need to fetch all the records, then the cursor object has\
    \ .fetchone() and .fetchmany() methods as well:\n\n- .fetchone() retrieves either\
    \ the next row of the result, as a tuple, or None if no more rows are available.\n\
    - .fetchmany() retrieves the next set of rows from the result as a list of tuples.\
    \ It has a size argument, which defaults to 1, that you can use to specify the\
    \ number of rows you need to fetch. If no more rows are available, then the method\
    \ returns an empty list.\n\nTry retrieving the titles of the five highest-grossing\
    \ movies concatenated with their release years again, but this time use .fetchmany():\n\
    \n```python\n>>> select_movies_query = \"\"\"\n... SELECT CONCAT(title, \" (\"\
    , release_year, \")\"),\n...     collection_in_mil\n... FROM movies\n... ORDER\
    \ BY collection_in_mil DESC\n... \"\"\"\n>>> with connection.cursor() as cursor:\n\
    ...     cursor.execute(select_movies_query)\n...     for movie in cursor.fetchmany(size=5):\n\
    ...         print(movie)\n...     cursor.fetchall()\n```\n\n('Avengers: Endgame\
    \ (2019)', Decimal('858.8'))\n('Titanic (1997)', Decimal('659.2'))\n('The Dark\
    \ Knight (2008)', Decimal('535.4'))\n('Toy Story 4 (2019)', Decimal('434.9'))\n\
    ('The Lion King (1994)', Decimal('423.6'))\n\nThe output with .fetchmany() is\
    \ similar to what you received when you used the LIMIT clause. You might have\
    \ noticed the additional cursor.fetchall() call at the end. You do this to clean\
    \ all the remaining results that weren't read by .fetchmany().\n\nIt's necessary\
    \ to clean all unread results before executing any other statements on the same\
    \ connection. Otherwise, an InternalError: Unread result found exception will\
    \ be raised.\n\n## 9.4.4 Handling Multiple Tables Using the JOIN Statement\n\n\
    If you found the queries in the last section to be quite straightforward, don't\
    \ worry. You can make your SELECT queries as complex as you want using the same\
    \ methods from the last section.\n\nLet's look at some slightly more complex JOIN\
    \ queries. If you want to find out the name of the top five highest-rated movies\
    \ in your database, then you can run the following query:\n\n```python\n>>> select_movies_query\
    \ = \"\"\"\n... SELECT title, AVG(rating) as average_rating\n... FROM ratings\n\
    ... INNER JOIN movies\n...     ON movies.id = ratings.movie_id\n... GROUP BY movie_id\n\
    ... ORDER BY average_rating DESC\n... LIMIT 5\n... \"\"\"\n>>> with connection.cursor()\
    \ as cursor:\n...     cursor.execute(select_movies_query)\n...     for movie in\
    \ cursor.fetchall():\n...         print(movie)\n```\n\n('Night of the Living Dead',\
    \ Decimal('9.90000'))\n('The Godfather', Decimal('9.90000'))\n('Avengers: Endgame',\
    \ Decimal('9.75000'))\n('Eternal Sunshine of the Spotless Mind', Decimal('8.90000'))\n\
    ('Beasts of No Nation', Decimal('8.70000'))\n\nAs shown above, Night of the Living\
    \ Dead and The Godfather are tied as the highest-rated movies in your online_movie_rating\
    \ database.\n\nTo find the name of the reviewer who gave the most ratings, write\
    \ the following query:\n\n```python\n>>> select_movies_query = \"\"\"\n... SELECT\
    \ CONCAT(first_name, \" \", last_name), COUNT(*) as num\n... FROM reviewers\n\
    ... INNER JOIN ratings\n...     ON reviewers.id = ratings.reviewer_id\n... GROUP\
    \ BY reviewer_id\n... ORDER BY num DESC\n... LIMIT 1\n... \"\"\"\n>>> with connection.cursor()\
    \ as cursor:\n...     cursor.execute(select_movies_query)\n...     for movie in\
    \ cursor.fetchall():\n...         print(movie)\n```\n\n('Mary Cooper', 4)\n\n\
    Mary Cooper is the most frequent reviewer in this database. As seen above, it\
