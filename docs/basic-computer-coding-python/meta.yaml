    \ have a range. |\n| 22 | **(?> re)**<br>Matches independent pattern without backtracking.\
    \ |\n| 23 | **\\w**<br>Matches word characters. |\n| 24 | **\\W**<br>Matches nonword\
    \ characters. |\n| 25 | **\\s**<br>Matches whitespace. Equivalent to [\\t\\n\\\
    r\\f]. |\n| 26 | **\\S**<br>Matches nonwhitespace. |\n| 27 | **\\d**<br>Matches\
