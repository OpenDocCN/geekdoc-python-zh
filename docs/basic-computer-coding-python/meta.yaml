    \    def setUp(self):\n        self.widget = Widget('The widget')\nclass DefaultWidgetSizeTestCase(SimpleWidgetTestCase):\n\
    \    def runTest(self):\n        self.assertEqual(self.widget.size(), (50,50),\n\
