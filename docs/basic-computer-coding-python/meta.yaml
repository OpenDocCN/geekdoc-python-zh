    \ 拥有数量庞大的用户群体。\n\n以下是关于 Python 编程语言的一些事实：\n\n- Python 目前是使用最广泛的多用途、高级编程语言。\n-\
    \ Python 允许使用面向对象和过程式编程范式进行编程。\n- Python 程序通常比其他编程语言（如 Java）更小。程序员需要输入的代码相对较少，且该语言的缩进要求使其始终具有可读性。\n\
    - Python 语言正被几乎所有科技巨头公司使用，例如——Google、Amazon、Facebook、Instagram、Dropbox、Uber...\
    \ 等等。\n- Python 最大的优势在于其庞大的标准库集合，可用于以下方面：\n  - 机器学习\n  - GUI 应用程序（如 Kivy、Tkinter、PyQt\
    \ 等）\n  - Web 框架，如 Django（被 YouTube、Instagram、Dropbox 使用）\n  - 图像处理（如 OpenCV、Pillow）\n\
    \  - 网页抓取（如 Scrapy、BeautifulSoup、Selenium）\n  - 测试框架\n  - 多媒体\n  - 科学计算\n  - 文本处理等等。\n\
    \n## 8.1 PYTHON - 决策制定\n\n程序中的决策用于当程序有条件选择来执行某个代码块时。让我们以交通灯为例，根据道路状况或任何特定规则，在不同情况下会亮起不同颜色的灯。\n\
    \n这是在执行程序时对发生条件的预测，以指定操作。多个表达式会被求值，结果为 TRUE 或 FALSE。这些是逻辑决策，Python 也提供了决策语句，以便根据用户需求在应用程序的程序中做出决策。\n\
    \n在你人生的某个时刻，你需要决定应该采取哪些步骤，并据此决定你的下一步行动。\n\n在编程中，我们经常遇到类似的情况，需要根据条件决定应该执行哪个代码块。\n\
    \n让我们举一个简单的例子。\n假设你正在为一个游戏编写程序。那么在每一步，我们都需要做出决策，例如：\n\n- 如果用户按下‘w’键，那么角色将向前移动。\n\
    - 如果用户按下‘空格键’，那么角色将跳跃。\n- 如果角色撞到障碍物，那么游戏结束，否则我们继续玩。\n\n像这样的决策在编程中无处不在，它们决定了程序执行的流向。\n\
    \nPython 具有以下决策语句：\n\n- if 语句\n- if-else 语句\n- if-elif 梯形结构\n- 嵌套语句\n\n让我们详细讨论\
    \ Python 中的这些决策语句。\n\n### 8.1.1 Python if 语句\n\nif 语句是**决策语句**最简单的形式。它接受一个表达式，并检查该表达式是否求值为\
    \ True，如果是，则 if 语句中的代码块将被执行。\n\n> **关键词**\n决策语句允许你决定程序中特定语句的执行顺序。你可以设置一个条件，并告诉编译器如果满足该条件则采取特定操作。\n\
    \n如果表达式求值为 False，则跳过该代码块。\n\n语法：\n\n```\nif ( expression ):\n    Statement 1\n\
    \    Statement 2\n    .\n    Statement n\n```\n\n# Python if 语句\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_249_0.png)\n\
    \n# 示例 1：\n\n```\na = 20 ; b = 20\nif ( a == b ):\n    print( “a and b are equal”)\n\
    \    print(“If block ended”)\n```\n\n# 输出：\n\na and b are equal\nIf block ended\n\
    \n# 示例 2：\n\n```\nnum = 5\n\nif ( num >= 10):\n\n    print(\"num is greater than\
    \ 10\")\n\nprint(\"if block ended\")\n```\n\n# 输出：\n\nIf block ended\n\n在示例 1\
    \ 中，我们看到条件 a==b 求值为 True。因此，if 语句内的代码块被执行。\n在示例 2 中，条件求值为 False，因此，print 语句未被执行，唯一被执行的语句是因为它在\
    \ if 块之外。\n注意：不要忘记在 if 语句后添加冒号(:)，并正确缩进当条件为 True 时执行的语句。\n\n### 8.1.2 Python if-else\
    \ 语句\n\n从名称本身，我们就能得到线索：if-else 语句检查表达式，并在表达式为 True 时执行 if 块，否则将执行 else 代码块。else\
    \ 块应紧跟在 if 块之后，并在表达式为 False 时执行。\n\n# 语法：\n\n```\nif( expression ):\n\n    Statement\n\
    \nelse:\n\n    Statement\n```\n\n# Python if-else 语句\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_251_0.png)\n\
    \n**示例：**\n\n```\npython\nnumber1 = 20 ; number2 = 30\n\nif(number1 >= number2\
    \ ):\n    print(“number 1 is greater than number 2”)\nelse:\n    print(“number\
    \ 2 is greater than number 1”)\n```\n\n**输出：**\n\nnumber 2 is greater than number\
    \ 1\n\n注意：一个 if 语句后只能跟一个 else 语句。如果你在 if 语句后使用两个 else 语句，那么你会得到以下错误。\n\n**示例：**\n\
    \n```\npython\nif (5>10):\n    print(5)\nelse:\n    print(10)\nelse:\n    print(\"\
    End\")\n```\n\n**输出：**\n\n```\nSyntaxError: invalid syntax\n```\n\n### 8.1.3 Python\
    \ if-elif 梯形结构\n\n你可能在其他语言如 C/C++ 或 Java 中听说过 else-if 语句。在 Python 中，我们有一个 elif\
    \ 关键字来将多个条件一个接一个地链接起来。使用 elif 梯形结构，我们可以做出复杂的决策语句。elif 语句帮助你检查多个表达式，并在其中一个条件求值为\
    \ True 时立即执行代码。\n\n**语法：**\n\n```\nif( expression1 ):\n    statement\n\nelif (expression2\
    \ ) :\n    statement\n\nelif(expression3 ):\n    statement\n\n.\n.\nelse:\n  \
    \  statement\n```\n\n# Python if-elif 梯形结构\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_253_0.png)\n\
    \n示例：\n\n```\nprint(\"Select your ride:\")\nprint(\"1. Bike\")\nprint(\"2. Car\"\
    )\nprint(\"3. SUV\")\nchoice = int( input() )\nif( choice == 1 ):\n    print(\
    \ \"You have selected Bike\" )\nelif( choice == 2 ):\n    print( \"You have selected\
    \ Car\" )\nelif( choice == 3 ):\n    print( \"You have selected SUV\" )\nelse:\n\
    \    print(\"Wrong choice!\")\n```\n\n输出：\nSelect your ride:\n1. Bike\n2. Car\n\
    3. SUV\n3\nYou have selected SUV\n\n**输出：**\nSelect your ride:\n1. Bike\n2. Car\n\
    3. SUV\n10\nWrong choice!\n\n注意：核心 Python 不支持其他**编程语言**中可用的 switch-case 语句，但我们可以使用\
    \ elif 梯形结构来代替 switch-case。\n\n### 8.1.4 Python 嵌套 if 语句\n\n用非常简单的话来说，嵌套 if 语句就是另一个\
    \ if 语句内部的 if 语句。Python 允许我们在另一个 if 语句的代码块内堆叠任意数量的 if 语句。当我们需要做出一系列决策时，它们非常有用。\n\
    \n**语法：**\n\n```\nif (expression):\n    if(expression):\n        Statement of\
    \ nested if\n    else:\n        Statement of nested if else\nelse:\n    Statement\
    \ of outer if\n\nStatement outside if block\n```\n\n# Python 嵌套 if 语句\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_255_0.png)\n\
    \n# 示例：\n\n```\nnum1 = int( input())\nnum2 = int( input())\nif( num1>= num2):\n\
    \    if(num1 == num2):\n        print(f'{num1} and {num2} are equal')\n    else:\n\
    \        print(f'{num1} is greater than {num2}')\nelse:\n    print(f'{num1} is\
    \ smaller than {num2}')\n```"
