    # 6.2 REGULAR EXPRESSION MODIFIERS: OPTION FLAGS


    **Regular expression** literals may include an optional modifier to control various
    aspects of matching. The modifiers are specified as an optional flag. You can
    provide multiple modifiers using exclusive OR (|), as shown previously and may
    be represented by one of these –


    > Regular expressions originated in 1951, when mathematician Stephen Cole Kleene
    described regular languages using his mathematical notation called regular sets.
    These arose in theoretical computer science, in the subfields of automata theory
    (models of computation) and the description and classification of formal languages.


    > Regular expression is a sequence of characters that define a search pattern.'
