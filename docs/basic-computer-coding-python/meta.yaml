  md: "```\nimport unittest\nclass SimpleWidgetTestCase(unittest.TestCase):\n    def\
    \ setUp(self):\n        self.widget = Widget('The widget')\n    def tearDown(self):\n\
    \        self.widget.dispose()\n        self.widget = None\n```\n\nIf setUp()\
    \ succeeded, the tearDown() method will be run whether runTest() succeeded or\
    \ not.\n\nSuch a working environment for the testing code is called a fixture.\n\
    \nOften, many small test cases will use the same fixture. In this case, we would\
    \ end up subclassing SimpleWidgetTestCase into many small one-method classes such\
    \ as DefaultWidgetSizeTestCase. This is time-consuming and discouraging, so in\
    \ the same vein as JUnit, unittest provides a simpler mechanism:\n\n```\nimport\
    \ unittest\nclass WidgetTestCase(unittest.TestCase):\n    def setUp(self):\n \
    \       self.widget = Widget('The widget')\n    def tearDown(self):\n        self.widget.dispose()\n\
    \        self.widget = None\n    def test_default_size(self):\n        self.assertEqual(self.widget.size(),\
    \ (50,50),\n                         'incorrect default size')\n    def test_resize(self):\n\
    \        self.widget.resize(100,150)\n        self.assertEqual(self.widget.size(),\
    \ (100,150),\n                         'wrong size after resize')\n```\n\nHere\
    \ we have not provided a runTest() method, but have instead provided two different\
    \ test methods. Class instances will now each run one of the test_*() methods,\
    \ with self.widget created and destroyed separately for each instance. When creating\
    \ an instance we must specify the test method it is to run. We do this by passing\
    \ the method name in the constructor:\n\n```\ndefaultSizeTestCase = WidgetTestCase('test_default_size')\n\
    resizeTestCase = WidgetTestCase('test_resize')\n```"
