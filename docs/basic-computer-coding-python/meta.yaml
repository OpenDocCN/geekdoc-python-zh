  md: '# SUMMARY


    +   - Python is a powerful general-purpose programming language. It is used in
    web development, data science, creating software prototypes, and so on.

    - Python is an interpreted, object-oriented programming language similar to PERL
    that has gained popularity because of its clear syntax and readability.

    - Decisions in a program are used when the program has conditional choices to
    execute a code block. Let’s take an example of traffic lights, where different
    colors of lights lit up in different situations based on the conditions of the
    road or any specific rule.

    - if statement is the most simple form of decision-making statement. It takes
    an expression and checks if the expression evaluates to True then the block of
    code in if statement will be executed.

    - In very simple words, Nested if statements is an if statement inside another
    if statement. Python allows us to stack any number of if statements inside the
    block of another if statements. They are useful when we need to make a series
    of decisions.

    - In general, statements are executed sequentially: The first statement in a function
    is executed first, followed by the second, and so on. There may be a situation
    when you need to execute a block of code several number of times.

    - Loop control statements change execution from its normal sequence. When execution
    leaves a scope, all automatic objects that were created in that scope are destroyed.'
