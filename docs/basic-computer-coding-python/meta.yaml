- md: "## 5.1.4 Instance Methods\n\nInstance methods are defined inside a class and\
    \ are used to get the contents of an **instance**. They can also be used to perform\
    \ operations with the attributes of our objects. Like the `__init__` method, the\
    \ first argument is always self:\n\n```python\nclass Dog:\n    # Class Attribute\n\
    \    species = 'mammal'\n\n    # Initializer / Instance Attributes\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n\n    # instance\
    \ method\n    def description(self):\n        return \"{} is {} years old\".format(self.name,\
    \ self.age)\n\n    # instance method\n    def speak(self, sound):\n        return\
    \ \"{} says {}\".format(self.name, sound)\n\n# Instantiate the Dog object\nmikey\
    \ = Dog(\"Mikey\", 6)\n\n# call our instance methods\nprint(mikey.description())\n\
    print(mikey.speak(\"Gruff Gruff\"))\n```\n\nSave this as `dog_instance_methods.py`,\
    \ then run it:\n\n```\nMikey is 6 years old\nMikey says Gruff Gruff\n```\n\n>\
    \ **Keyword**\n> Instance is a concrete occurrence of any object, existing usually\
    \ during the runtime of a computer program. Formally, it is synonymous with \"\
    object\" as they are each a particular value (realization), and these may be called\
    \ an instance object; \"instance\" emphasizes the distinct identity of the object.\n\
    \nIn the latter method, `speak()`, we are defining behavior. What other behaviors\
    \ could you assign to a dog? Look back to the beginning paragraph to see some\
    \ example behaviors for other objects.\n\n## Modifying Attributes\n\nYou can change\
    \ the value of attributes based on some behavior:\n\n```python\n>>> class Email:\n\
    ...     def __init__(self):\n...         self.is_sent = False\n...     def send_email(self):\n\
    ...         self.is_sent = True\n...\n>>> my_email = Email()\n>>> my_email.is_sent\n\
    False\n>>> my_email.send_email()\n>>> my_email.is_sent\nTrue\n```\n\nHere, we\
    \ added a method to send an email, which updates the `is_sent` variable to `True`.\n\
    \n## 5.1.5 Python Object Inheritance\n\nInheritance is the process by which one\
    \ class takes on the attributes and methods of another. Newly formed classes are\
    \ called *child classes*, and the classes that child classes are derived from\
    \ are called *parent classes*.\n\nIt's important to note that child classes override\
    \ *or* extend the functionality (e.g., attributes and behaviors) of parent classes.\
    \ In other words, child classes inherit all of the parent's attributes and behaviors\
    \ but can also specify different behavior to follow. The most basic type of class\
    \ is an object, which generally all other classes inherit as their parent.\n\n\
    When you define a new class, Python 3 implicitly uses `object` as the parent class.\
    \ So the following two definitions are equivalent:\n\n```python\nclass Dog(object):\n\
    \    pass\n```\n\n```python\n# In Python 3, this is the same as:\n\nclass Dog:\n\
    \    pass\n```\n\nIn Python 2.x there's a distinction between *new-style* and\
    \ *old-style* classes. I won't go into detail here, but you'll generally want\
    \ to specify `object` as the parent class to ensure you're defining a new-style\
    \ class if you're writing Python 2 OOP code.\n\n## Dog Park Example\n\nLet's pretend\
    \ that we're at a dog park. There are multiple `Dog` objects engaging in `Dog`\
    \ behaviors, each with different attributes. In regular-speak that means some\
    \ dogs are running, while some are stretching and some are just watching other\
    \ dogs. Furthermore, each dog has been named by its owner and, since each dog\
    \ is living and breathing, each ages.\n\nWhat's another way to differentiate one\
    \ dog from another? How about the dog's breed:\n\n```python\n>>> class Dog:\n\
    ...     def __init__(self, breed):\n...         self.breed = breed\n...\n>>> spencer\
    \ = Dog(\"German Shepard\")\n>>> spencer.breed\n'German Shepard'\n>>> sara = Dog(\"\
    Boston Terrier\")\n>>> sara.breed\n'Boston Terrier'\n```\n\nEach breed of dog\
    \ has slightly different behaviors. To take these into account, let's create separate\
    \ classes for each breed. These are child classes of the parent `Dog` class.\n\
    \n## Extending the Functionality of a Parent Class\n\nCreate a new file called\
    \ *dog_inheritance.py*:\n\n```python\n# Parent class\nclass Dog:\n    # Class\
    \ attribute\n    species = 'mammal'\n\n    # Initializer / Instance attributes\n\
    \    def __init__(self, name, age):\n        self.name = name\n        self.age\
    \ = age\n\n    # instance method\n    def description(self):\n        return \"\
    {} is {} years old\".format(self.name, self.age)\n\n    # instance method\n  \
    \  def speak(self, sound):\n        return \"{} says {}\".format(self.name, sound)\n\
    ```\n\n```python\n# Child class (inherits from Dog class)\nclass RussellTerrier(Dog):\n\
