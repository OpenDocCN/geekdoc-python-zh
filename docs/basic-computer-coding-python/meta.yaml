    # 9.1 DB-API (SQL-API) FOR PYTHON


    Python DB-API is independent of any database engine, which enables you to write
    Python scripts to access any database engine. The Python DB API implementation
    for MySQL is MySQLdb. For PostgreSQL, it supports psycopg, PyGresQL and pyPgSQL
    modules. DB-API implementations for Oracle are dc_oracle2 and cx_oracle. Pydb2
    is the DB-API implementation for DB2. Python''s DB-API consists of connection
    objects, cursor objects, standard exceptions and some other module contents, all
    of which we will discuss.


    ![](img/192fecf3b33c4ee7d07f7123b285647a_298_0.png)


    # 9.1.1 Connection Objects


    Connection objects create a connection with the database and these are further
    used for different transactions. These connection objects are also used as representatives
    of the database session.'
