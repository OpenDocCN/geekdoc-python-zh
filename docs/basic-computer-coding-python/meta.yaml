    module search path. Thus, the surround module can simply use import echo or from
    echo import echofilter. If the imported module is not found in the current package
    (the package of which the current module is a submodule), the import statement
    looks for a top-level module with the given name.


    When packages are structured into subpackages (as with the sound package in the
    example), you can use absolute imports to refer to submodules of siblings packages.
    For example, if the module sound.filters.vocoder needs to use the echo module
    in the sound.effects package, it can use fromsound.effects import echo.


    Starting with Python 2.5, in addition to the implicit relative imports described
    above, you can write explicit relative imports with the from module import nameform
    of import statement. These explicit relative imports use leading dots to indicate
    the current and parent packages involved in the relative import. From the surround
    module for example, you might use:


