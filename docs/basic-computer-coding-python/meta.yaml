    \n## 引言\n\n正则表达式（简称 RE，或 regex，或正则模式）本质上是一种嵌入在 Python 中的微型、高度专业化的编程语言，通过 `re`\
    \ 模块提供。使用这种小型语言，你可以指定要匹配的可能字符串集合的规则；这个集合可能包含英语句子、电子邮件地址、TeX 命令或任何你喜欢的内容。然后你可以提出诸如“这个字符串是否匹配该模式？”或“该字符串中是否存在匹配该模式的内容？”等问题。你还可以使用正则表达式以各种方式修改字符串或将其拆分。\n\
    \n正则表达式模式被编译成一系列字节码，然后由用 C 语言编写的匹配引擎执行。对于高级使用，可能需要仔细关注引擎将如何执行给定的正则表达式，并以特定方式编写正则表达式以生成运行更快的字节码。本文档不涵盖优化，因为它要求你对匹配引擎的内部工作原理有深入的理解。\n\
    \n正则表达式语言相对较小且受限，因此并非所有可能的字符串处理任务都可以使用正则表达式完成。有些任务虽然可以用正则表达式完成，但表达式可能变得非常复杂。在这些情况下，你最好编写\
    \ Python 代码来处理；虽然 Python 代码会比精心设计的正则表达式慢，但它可能也更容易理解。\n\n## 6.1 正则表达式的搜索与匹配\n\n\
    Python 是一种高级开源脚本语言。Python 内置的 `re` 模块为正则表达式提供了出色的支持，具有现代且完整的正则表达式风格。Python 正则表达式语法中唯一缺失的重要特性是原子分组、占有量词和\
    \ Unicode 属性。\n\n首先要做的是使用 `import re` 将正则表达式模块导入到你的脚本中。\n\n调用 `re.search(regex,\
    \ subject)` 将正则表达式模式应用于目标字符串。如果匹配尝试失败，该函数返回 `None`，否则返回一个 Match 对象。由于 `None` 在布尔上下文中求值为\
    \ `False`，你可以轻松地在 `if` 语句中使用 `re.search()`。Match 对象存储了正则表达式模式匹配的字符串部分的详细信息。你可以通过指定一个特殊的**常量**作为\
    \ `re.search()` 的第三个参数来设置正则表达式匹配模式。`re.I` 或 `re.IGNORECASE` 以不区分大小写的方式应用模式。`re.S`\
    \ 或 `re.DOTALL` 使点号匹配换行符。`re.M` 或 `re.MULTILINE` 使脱字符 `^` 和美元符号 `$` 分别匹配目标字符串中行尾和行首。单字母选项和描述性选项之间没有区别，只是你需要输入的字符数量不同。要指定多个选项，使用\
    \ `|` 运算符将它们“或”在一起：`re.search(\"^a\", \"abc\", re.I | re.M)`。\n\n默认情况下，Python\
    \ 的正则表达式引擎仅将字母 A 到 Z、数字 0 到 9 和下划线视为“单词字符”。指定标志 `re.L` 或 `re.LOCALE` 可使 `\\w`\
    \ 匹配当前区域设置下被视为字母的所有字符。或者，你可以指定 `re.U` 或 `re.UNICODE`，将所有脚本中的所有字母都视为单词字符。此设置也会影响单词边界。\n\
    \n不要混淆 `re.search()` 和 `re.**match()**`。这两个函数的功能完全相同，但重要区别在于 `re.search()` 会在整个字符串中尝试模式，直到找到匹配项。而\
    \ `re.match()` 仅在字符串的最开始处尝试模式。基本上，`re.match(\"regex\", subject)` 等同于 `re.search(\"\
    \\Aregex\", subject)`。\n\nPython 3.4 添加了一个新的 `re.**fullmatch()**` 函数。此函数仅在正则表达式完全匹配字符串时才返回\
    \ Match 对象。否则返回 `None`。`re.fullmatch(\"regex\", subject)` 等同于 `re.search(\"\\\
    Aregex\\Z\", subject)`。这对于验证用户输入很有用。如果 `subject` 是空字符串，那么对于任何可以找到零长度匹配的正则表达式，`fullmatch()`\
    \ 都会求值为 `True`。\n\n要从字符串中获取所有匹配项，请调用 `re.**findall**(regex, subject)`。这将返回字符串中所有非重叠的正则表达式匹配项的数组。“非重叠”意味着字符串从左到右被搜索，下一次匹配尝试从上一次匹配之后开始。如果正则表达式包含一个或多个捕获组，`re.findall()`\
    \ 返回一个元组数组，每个元组包含所有捕获组匹配的文本。整体的正则表达式匹配*不*包含在元组中，除非你将整个正则表达式放在一个捕获组内。\n\n> `re.match()`\
    \ 不要求正则表达式匹配整个字符串。`re.match(\"a\", \"ab\")` 将成功。\n\n比 `re.findall()` 更高效的是 `re.**finditer**(regex,\
    \ subject)`。它返回一个迭代器，使你能够循环遍历目标字符串中的正则表达式匹配项：`for m in re.finditer(regex, subject)`。for\
    \ 循环变量 `m` 是一个 Match 对象，包含当前匹配的详细信息。\n\n与 `re.search()` 和 `re.match()` 不同，`re.findall()`\
    \ 和 `re.finditer()` 不支持带有正则表达式匹配标志的可选第三个参数。相反，你可以在正则表达式开头使用全局模式修饰符。例如，`\"(?i)regex\"\
    ` 以不区分大小写的方式匹配 `regex`。\n\n### 6.1.1 match 函数\n\n此函数尝试将正则表达式 *pattern* 与 *string*\
    \ 进行匹配，可选参数 *flags*。\n\n此函数的语法如下 –\n`re.match(pattern, string, flags=0)`\n参数描述如下\
    \ –\n\n| 序号 | 参数与描述 |\n| :--- | :--- |\n| 1 | **pattern**<br>这是要匹配的正则表达式。 |\n\
    | 2 | **string**<br>这是要搜索的字符串，将在字符串开头匹配模式。 |\n| 3 | **flags**<br>你可以使用按位或（`|`）指定不同的标志。这些是修饰符，列于下表。\
    \ |\n\n*re.match* 函数成功时返回一个 **match** 对象，失败时返回 **None**。我们使用 **match** 对象的 *group(num)*\
    \ 或 *groups()* 函数来获取匹配的表达式。\n\n| 序号 | Match 对象方法与描述 |\n| :--- | :--- |\n| 1 |\
    \ **group(num=0)**<br>此方法返回整个匹配（或特定子组 num） |\n| 2 | **groups()**<br>此方法以元组形式返回所有匹配的子组（如果没有则为空）\
    \ |\n\n```python\n#!/usr/bin/python\nimport re\n\nline = \"Cats are smarter than\
    \ dogs\"\n\nmatchObj = re.match( r'(.*) are (.*?) .*', line, re.M|re.I)\n\nif\
    \ matchObj:\n    print \"matchObj.group() : \", matchObj.group()\n    print \"\
    matchObj.group(1) : \", matchObj.group(1)\n    print \"matchObj.group(2) : \"\
    , matchObj.group(2)\nelse:\n    print \"No match!!\"\n```\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_194_0.png)\n\
    \n> 你知道吗？\n如果字符串开头的零个或多个字符匹配正则表达式模式，则返回相应的匹配对象。如果字符串不匹配模式，则返回 `None`；请注意，这与零长度匹配不同。\n\
    \n当执行上述代码时，它会产生以下结果 –\nmatchObj.group() : Cats are smarter than dogs\nmatchObj.group(1)\
    \ : Cats\nmatchObj.group(2) : smarter\n\n### 6.1.2 search 函数\n\n此函数在 *string*\
    \ 中搜索正则表达式 *pattern* 的首次出现，可选参数 *flags*。\n此函数的语法如下 –\n`re.search(pattern, string,\
    \ flags=0)`\n参数描述如下 –\n\n| 序号 | 参数与描述 |\n| :--- | :--- |\n| 1 | **pattern**<br>这是要匹配的正则表达式。\
    \ |"
