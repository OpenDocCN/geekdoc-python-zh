    \nAgain, this loads the submodule `echo`, but this makes its function `echofilter()`\
    \ directly available:\n\n```\nechofilter(input, output, delay=0.7, atten=4)\n\
    ```\n\nNote that when using `from package import item`, the item can be either\
    \ a submodule (or subpackage) of the package, or some other name defined in the\
    \ package, like a function, class or variable. The import statement first tests\
    \ whether the item is defined in the package; if not, it assumes it is a module\
    \ and attempts to load it. If it fails to find it, an `ImportError` exception\
    \ is raised.\n\nContrarily, when using syntax like `import item.subitem.subsubitem`,\
    \ each item except for the last must be a package; the last item can be a module\
    \ or a package but can't be a class or function or variable defined in the previous\
    \ item.\n\n### 2.3.1 Importing* From a Package\n\nNow what happens when the user\
    \ writes `from sound.effects import *`? Ideally, one would hope that this somehow\
    \ goes out to the filesystem, finds which submodules are present in the package,\
    \ and imports them all. This could take a long time and importing sub-modules\
    \ might have unwanted side-effects that should only happen when the sub-module\
    \ is explicitly imported.\n\nThe only solution is for the package author to provide\
    \ an explicit index of the package. The import statement uses the following convention:\
    \ if a package's `__init__.py` code defines a list named `__all__`, it is taken\
    \ to be the list of module names that should be imported when `from package import\
