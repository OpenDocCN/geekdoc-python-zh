  md: '# PREFACE


    Python is an interpreted, object-oriented, high-level programming language with
    dynamic semantics. Its high-level built in data structures, combined with dynamic
    typing and dynamic binding, make it very attractive for Rapid Application Development,
    as well as for use as a scripting or glue language to connect existing components
    together. Its high-level built in data structures, combined with dynamic typing
    and dynamic binding; make it very attractive for Rapid Application Development,
    as well as for use as a scripting or glue language to connect existing components
    together. Python has become one of the most popular programming languages in the
    world in recent years. It''s used in everything from machine learning to building
    websites and software testing. It can be used by developers and non-developers
    alike.


    **Organization of the Book**

    This edition is organized into nine chapters. This is a comprehensive guide on
    how to get started in Python, why you should learn it and how you can learn it.
    This hands-on guide takes you through the language a step at a time, beginning
    with basic programming concepts including with functions, recursion, data structures,
    and object-oriented design.

    **Chapter 1** presents an introduction to Python. You will learn the Python environment
    setup, syntax of Python and Python variables. Basic operators of Python are also
    discussed.

    **Chapter 2** aims to focus on Python functions, modules and packages. In Python,
    function is a group of related statements that perform a specific task. Functions
    help break our program into smaller and modular parts. It also describes the python
    modules and python packages.'
  merge: -1
  pgno: 16
- img_proc: false
  md: '**Chapter 3** begins with python dictionaries. It also explains Python sets
    and files used in Python. They can be used to read and write text memos, audio
    clips, Excel documents, saved email messages, and whatever else you happen to
    have stored on your machine.


    **Chapter 4** gives an overview of how to use the exceptions? Further, it explains
    the unit testing used to validate that each unit of the software performs as designed.
    In last, the chapter focuses on understanding the comprehensions that allow sequences
    to be built from other sequences.


    **Chapter 5** is aimed to discuss the use of OOPS in python, including various
    types of methods of OOPS. The programming challenge was seen as how to write the
    logic, not how to define the data. Object-oriented programming takes the view
    that what we really care about are the objects we want to manipulate rather than
    the logic required to manipulate them.


    **Chapter 6** focuses on Python regular expression that helps you match or find
    other strings or sets of strings, using a specialized syntax held in a pattern.


    **Chapter 7** discusses about Python Multithreading used to implement multithreading
    in python programs and also used to run multiple threads (tasks, function calls)
    at the same time.


    **Chapter 8** focuses on operations in Python. Python is a powerful general-purpose
    programming language. It is used in web development, data science, creating software
    prototypes, and so on. Fortunately for beginners, Python has simple easy-to-use
    syntax. This makes Python an excellent language to learn to program for beginners.


    **Chapter 9** sheds light on Python database programming. A database program is
    the heart of a business information system and provides file creation, data entry,
    update, query and reporting functions.'
  merge: -1
