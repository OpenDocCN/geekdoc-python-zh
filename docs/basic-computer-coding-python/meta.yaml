    Enter a name:\nSammy\nsammy-shark is the username of Sammy\nEnter a name:\nJesse\n\
    I don't have Jesse's username, what is it?\nJOctopus\nData updated.\nEnter a name:\n\
    \nWhen we are done testing the program, we can press CTRL + C to escape the program.\
