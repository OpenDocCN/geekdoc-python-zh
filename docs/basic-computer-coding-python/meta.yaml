  md: '# SUMMARY


    +   - Dictionary in Python is an unordered collection of data values, used to
    store data values like a map, which, unlike other Data Types that hold only a
    single value as an element, Dictionary holds key: value pair. Key-value is provided
    in the dictionary to make it more optimized.

    - Sets are used to store multiple items in a single variable. Set is one of 4
    built-in data types in Python used to store collections of data, the other 3 are
    List, Tuple, and Dictionary, all with different qualities and usage.

    - A dictionary is a collection which is unordered, changeable and indexed. In
    Python dictionaries are written with curly brackets, and they have keys and values.

    - If you want to modify a dictionary and keep a copy of the original, use the
    copy method.

    - Sets are a collection of distinct (unique) objects. These are useful to create
    lists that only hold unique values in the dataset.

    - A set is created by using the set() function or placing all the elements within
    a pair of curly braces.

    - The union operation on two sets produces a new set containing all the distinct
    elements from both the sets.

    - The intersection operation on two sets produces a new set containing only the
    common elements from both the sets.'
