  md: "Note that in order to test something, we use one of the assert*() methods provided\
    \ by the TestCase base class. If the test fails, an exception will be raised,\
    \ and unittest will identify the test case as a failure. Any other exceptions\
    \ will be treated as errors. This helps you identify where the problem is: failures\
    \ are caused by incorrect results - a 5 where you expected a 6. Errors are caused\
    \ by incorrect code - e.g., a TypeError caused by an incorrect function call.\n\
    \nThe way to run a test case will be described later. For now, note that to construct\
