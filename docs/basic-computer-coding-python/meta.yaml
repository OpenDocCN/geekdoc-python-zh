    2. Learn about regular expression modifiers in case of option flags


    ![](img/192fecf3b33c4ee7d07f7123b285647a_190_0.png)


    # INTRODUCTION


    Regular expressions (called REs, or regexes, or regex patterns) are essentially
    a tiny, highly specialized programming language embedded inside Python and made'
  - '[PAGE 191]


    available through the re module. Using this little language, you specify the rules
    for the set of possible strings that you want to match; this set might contain
    English sentences, or e-mail addresses, or TeX commands, or anything you like.
    You can then ask questions such as “Does this string match the pattern?”, or “Is
    there a match for the pattern anywhere in this string?”. You can also use REs
    to modify a string or to split it apart in various ways.


    Regular expression patterns are compiled into a series of bytecodes which are
    then executed by a matching engine written in C. For advanced use, it may be necessary
    to pay careful attention to how the engine will execute a given RE, and write
    the RE in a certain way in order to produce bytecode that runs faster. Optimization
    isn''t covered in this document, because it requires that you have a good understanding
    of the matching engine''s internals.


    The regular expression language is relatively small and restricted, so not all
    possible string processing tasks can be done using regular expressions. There
    are also tasks that can be done with regular expressions, but the expressions
    turn out to be very complicated. In these cases, you may be better off writing
    Python code to do the processing; while Python code will be slower than an elaborate
    regular expression, it will also probably be more understandable.


    # 6.1 REGEX SEARCH AND MATCH


    Python is a high level open source scripting language. Python''s built-in “re”
    module provides excellent support for regular expressions, with a modern and complete
    regex flavor. The only significant features missing from Python''s regex syntax
    are atomic grouping, possessive quantifiers, and Unicode properties.


    The first thing to do is to import the regexp module into your script with import
    re.


    Call re.search(regex, subject) to apply a regex pattern to a subject string. The
    function returns None if the matching attempt fails, and a Match object otherwise.
    Since None evaluates to False, you can easily use re.search() in an if statement.
    The Match object stores details about the part of


    > Keyword

    Constant is a value that cannot be altered by the program during normal execution,
    i.e., the value is constant.'
  - '[PAGE 192]


    the string matched by the regular expression pattern. You can set regex matching
    modes by specifying a special **constant** as a third parameter to re.search().
    re.I or re.IGNORECASE applies the pattern case insensitively. re.S or re.DOTALL
    makes the dot match newlines. re.M or re.MULTILINE makes the caret and dollar
    match after and before line breaks in the subject string. There is no difference
    between the single-letter and descriptive options, except for the number of characters
    you have to type in. To specify more than one option, “or” them together with
    the | operator: re.search(“^a”, “abc”, re.I | re.M).


    By default, Python’s regex engine only considers the letters A through Z, the
    digits 0 through 9, and the underscore as “word characters”. Specify the flag
    re.L or re.LOCALE to make \w match all characters that are considered letters
    given the current locale settings. Alternatively, you can specify re.U or re.UNICODE
    to treat all letters from all scripts as word characters. The setting also affects
    word boundaries.


    Do not confuse re.search() with re.**match()**. Both functions do exactly the
    same, with the important distinction that re.search() will attempt the pattern
    throughout the string, until it finds a match. re.match() on the other hand, only
    attempts the pattern at the very start of the string. Basically, re.match(“regex”,
    subject) is the same as re.search(“\Aregex”, subject).


    Python 3.4 adds a new re.**fullmatch()** function. This function only returns
    a Match object if the regex matches the string entirely. Otherwise it returns
    None. re.fullmatch(“regex”, subject) is the same as re.search(“\Aregex\Z”, subject).
    This is useful for validating user input. If subject is an empty string then fullmatch()
    evaluates to True for any regex that can find a zero-length match.


    To get all matches from a string, call re.**findall**(regex, subject). This will
    return an array of all non-overlapping regex matches in the string. “Non-overlapping”
    means that the string is searched through from left to right, and the next match
    attempt starts beyond the previous match. If the regex contains one or more capturing
    groups, re.findall() returns an array of tuples, with each tuple containing text
    matched by all the capturing groups. The overall regex match is *not* included
    in the tuple, unless you place the entire regex inside a capturing group.


    > re.match() does not require the regex to match the entire string. re.match(“a”,
    “ab”) will succeed.'
  - '[PAGE 193]


    More efficient than re.findall() is re.**finditer**(regex, subject). It returns
    an iterator that enables you to loop over the regex matches in the subject string:
    for m in re.finditer(regex, subject). The for-loop variable m is a Match object
    with the details of the current match.


    Unlike re.search() and re.match(), re.findall() and re.finditer() do not support
    an optional third parameter with regex matching flags. Instead, you can use global
    mode modifiers at the start of the regex. E.g. "(?i)regex" matches regex case
    insensitively.


    # 6.1.1 The Match Function


    This function attempts to match RE *pattern* to *string* with optional *flags*.


    Here is the syntax for this function –

    re.match(pattern, string, flags=0)

    Here is the description of the parameters –


    | Sr.No. | Parameter & Description |

    | :--- | :--- |

    | 1 | **pattern**<br>This is the regular expression to be matched. |

    | 2 | **string**<br>This is the string, which would be searched to match the pattern
    at the beginning of string. |

    | 3 | **flags**<br>You can specify different flags using bitwise OR (|). These
    are modifiers, which are listed in the table below. |


    The *re.match* function returns a **match** object on success, **None** on failure.
    We use *group(num)* or *groups()* function of **match** object to get matched
    expression.


    | Sr.No. | Match Object Method & Description |

    | :--- | :--- |

    | 1 | **group(num=0)**<br>This method returns entire match (or specific subgroup
    num) |

    | 2 | **groups()**<br>This method returns all matching subgroups in a tuple (empty
    if there weren''t any) |'
