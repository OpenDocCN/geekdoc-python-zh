    bytecodes is here. Bytecode is paired with a symbol table and constant pool so
    that names and literals can be referenced by number in the instructions.


    The bytecode for the above parse tree is something like:


    ```

    loop:


    load-name 1     (x)

    load-const 1    (3)

    compare-op le


    jump_if_false done


    load-name 2     (f)

    load-name 1     (x)

    call-function 1


    jump loop

    done:

    ```


    Python does not perform much optimization on the bytecode, except for speeding-up
    local variable access. The reasons for this are tied to how the interpreter works
    and will be discussed later.


    This conversion pattern, where the input is abstracted, processed, then specialized,
    is a common one in many varieties of programs and is also presented in Abstraction
    and Specification in Program Development.


    # Execution


    At face value, the execution algorithm is straightforward: fetch the next instruction,
    perform the required stack manipulation or, in the case of a jump, reposition
    the instruction pointer. However, much of the real functionality is hidden in
    the value'
  - '[PAGE 210]


    objects. *For example*, there is only one BINARY_ADD instruction, yet Python must
    do very different things when adding integers, floats, strings, or user-defined
    objects.


    # Value objects


    The trick is to decouple the kinds of values in the language from the interpreter
    core. This is allows Python to have many built-in data types without a complexity
    explosion. Each value supports the same interface, some of which is listed here:


    add(v)

    Add yourself to *v* and return the result as a new object. It corresponds to x
    + v.

    cmp(v)

    Compare yourself to *v* and return -1, 0, or 1 (a la strcmp). It corresponds to
    x == v.

    repr()

    Return a string representation of yourself.

    getattr(name), getitem(v)

    Subscript yourself by *name* or arbitrary value *v*. getattr corresponds to x.name
    and getitem corresponds to x[v].

    call(args, keywords)

    Call yourself with positional arguments *args* and keyword arguments *keywords*.
    It corresponds to x(1, 2, 3, foo = 4, bar = 5).


    Each method in this interface has a bytecode counterpart which invokes it, e.g.
    BINARY_ADD. The stack is simply an array of value objects, which each know how
    to add themselves. Numerical Python takes advantage of this open-ended design
    to add multi-dimensional arrays, e.g. matrices, to the language.


    New kinds of values can even be defined from within Python. An object with a method
    called __cmp__ will use that method for comparison instead of the default object
    comparison method. All methods in the value interface can be overrided in this
    way (including the getattr method which is used to look up object methods in the
    first place).


    The built-in value objects are:

    Primitives

    Integer/Long

    Float

    String

    File

    Function

    Composites'
- md: "## Tuple\n- List\n- Dictionary\n- Class\n- Class instance\n- Module\n\nNote\
    \ that functions are simply values that implement the call method. Thus classes\
    \ and their instances can just associate names with arbitrary values, i.e. act\
    \ like dictionaries.\n\n## Inheritance\n\nClasses and instances differ slightly\
    \ from dictionaries, however, in that instances inherit from classes and classes\
    \ can inherit from other classes. The inheritance is such that changes to classes\
    \ are immediately visible in their descendants and instances, as illustrated in\
    \ this example:\n\n```\nclass p:\n    x = 3\n\nclass c(p):\n    y = \"hello\"\n\
    \ni = c()\ni.y    (prints \"hello\")\ni.x    (prints 3)\np.x = 4\nc.x    (prints\
    \ 4)\ni.x    (prints 4)\n```\n\nThus classes and instances differ from dictionaries\
    \ in that if a read cannot be resolved, the request is passed to the parent class.\
    \ Since classes can change at run-time, this makes the inheritance process highly\
    \ dynamic. This is a recurring pattern called a Chain of Responsibility. The object\
    \ diagram for the above example is thus:\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_212_0.png)\n\
    \nNote that if Python hadn't provided inheritance, we could recreate it by providing\
    \ a `__getattr__` method to do the forwarding. The parent class would be stored\
    \ explicitly in a variable. This would have the interesting side-effect that inheritance\
    \ links could be changed at run-time by modifying this variable. The Chain of\
    \ Responsibility pattern fully supports such changes.\n\nWhat happens on a write?\
    \ If requests were forwarded up the Chain, as with a read, there would be no way\
    \ to override a slot in a parent class. In the above example, `c.x = 5` would\
    \ be the same as `p.x = 5`. (If the variable turns out to be unbound, then the\
    \ object written to would gain a new slot.) If requests were not forwarded, then\
    \ the object written to would always gain a new slot, shadowing the ancestor slot.\
    \ Python chooses the latter, so that parent methods can be overridden in children.\
    \ Thus we get:\n\n```\nc.x = 5\np.x     (prints 4)\ni.x     (prints 5)\n\ni.x\
    \ = i.x\nc.x = 6\ni.x     (prints 5)\n```\n\nNote that `i.x = i.x` performs useful\
    \ work under this design choice.\n\nDoes Python need to distinguish between classes\
    \ and instances? Both are essentially dictionaries and have the same read/write\
    \ and inheritance mechanism. Perhaps it's for efficiency reasons: there are usually\
    \ far fewer classes than instances, so certain optimizations can be applied to\
    \ classes but not instances.\n\n## Variable scope\n\nPython variable environments,\
    \ aka “stack frames”, have many of the qualities of objects. They are dictionaries\
    \ of names with the same kind of inheritance semantics. That is, variables used\
    \ in a function by default refer to global names, but if a variable is assigned\
    \ to in the function, it becomes local. The same applies to class definitions.\n\
    \nOne can imagine also designing variable scope with a Chain of Responsibility.\
    \ In fact, some languages do this, even ones which don’t have the corresponding\
    \ notion of inheritance. *Structure and Interpretation* of Computer Programs uses\
    \ it to describe Scheme’s method of variable scope. The Self language actually\
    \ treats environments as objects and uses inheritance to implement lexical scope!\n\
    \nHowever, Python does not take this approach, probably for efficiency reasons.\
    \ Python does not allow more than two simultaneous environments (the global and\
    \ the local), as noted in the PLE exercise on nested scopes. This allows certain\
    \ optimizations, like the LOAD_FAST bytecode, but can confuse programmers used\
    \ to lexical scoping. The following C++ fragment has no equivalent in Python:\n\
    \n```\nint x = 1;\nif(x > y) {\n    int x = 2;\n    cout << x;    // prints 2\n\
    }\ncout << x;    // prints 1\n```\n\nScheme programmers may wonder: then how does\
    \ Python implement lambda? The escape was to abandon lexical scoping for lambda.\
    \ The body of a lambda only has the global and local environments.\n\n## SUMMARY\n\
    \n- Regular expressions (called REs, or regexes, or regex patterns) are essentially\
    \ a tiny, highly specialized programming language embedded inside Python and made\
    \ available through the re module.\n- Regular expression patterns are compiled\
    \ into a series of bytecodes which are then executed by a matching engine written\
    \ in C. For advanced use, it may be necessary to pay careful attention to how\
