    used a list, the first element could be the animal’s name while the second element
    could represent its age. How would you know which element is supposed to be which?
    What if you had 100 different animals? Are you certain each animal has both a
    name and an age, and so forth? What if you wanted to add other properties to these
    animals? This lacks organization, and it’s the exact need for classes. Classes
    are used to create new user-defined data structures that contain arbitrary information
    about something. In the case of an animal, we could create an Animal() class to
    track properties about the Animal like the name and age. It’s important to note
    that a class'
