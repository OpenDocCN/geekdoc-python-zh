    \ last_name\n... FROM reviewers\n... \"\"\"\n>>> with connection.cursor() as cursor:\n\
    ...     cursor.execute(select_query)\n...     for reviewer in cursor.fetchall():\n\
    ...         print(reviewer)\n...\n('Chaitanya', 'A')\n('Mary', 'A')\n('John',\
    \ 'A')\n('Thomas', 'A')\n('Penny', 'A')\n('Mitchell', 'A')\n('Wyatt', 'A')\n('Andre',\
    \ 'A')\n('Sheldon', 'A')\n('Kimbra', 'A')\n('Kat', 'A')\n('Bruce', 'A')\n('Domingo',\
    \ 'A')\n('Rajesh', 'A')\n('Ben', 'A')\n('Mahinder', 'A')\n('Akbar', 'A')\n('Howard',\
    \ 'A')\n('Pinkie', 'A')\n('Gurkaran', 'A')\n('Amy', 'A')\n('Marlon', 'A')\n```\n\
    \nThe above code displays the first_name and last_name for all records in the\
    \ reviewers table. The SQL injection attack corrupted this table by changing the\
    \ last_name of all records to “A”.\n\nThere’s a quick fix to prevent such attacks.\
    \ Don’t add the query values provided by the user directly to your query string.\
    \ Instead, update the modify_ratings.py script to send these query values as arguments\
    \ to .execute():\n\n```python\nfrom getpass import getpass\nfrom mysql.connector\
    \ import connect, Error\n\nmovie_id = input(\"Enter movie id: \")\nreviewer_id\
    \ = input(\"Enter reviewer id: \")\nnew_rating = input(\"Enter new rating: \"\
    )\nupdate_query = \"\"\"\nUPDATE\n    ratings\nSET\n    rating = %s\nWHERE\n \
    \   movie_id = %s AND reviewer_id = %s;\n\"\"\"\n\nSELECT *\nFROM ratings\nWHERE\n\
    \    movie_id = %s AND reviewer_id = %s\n\"\"\"\nval_tuple = (\n    new_rating,\n\
    \    movie_id,\n    reviewer_id,\n    movie_id,\n    reviewer_id,\n)\n\ntry:\n\
    \    with connect(\n        host=\"localhost\",\n        user=input(\"Enter username:\
    \ \"),\n        password=getpass(\"Enter password: \"),\n        database=\"online_movie_rating\"\
    ,\n    ) as connection:\n        with connection.cursor() as cursor:\n       \
    \     for result in cursor.execute(update_query, val_tuple, multi=True):\n   \
    \             if result.with_rows:\n                    print(result.fetchall())\n\
    \            connection.commit()\nexcept Error as e:\n    print(e)\n```\n\nNotice\
    \ that the %s placeholders are no longer in string quotes. Strings passed to the\
    \ placeholders might contain some special characters. If necessary, these can\
    \ be correctly escaped by the underlying library.\n\ncursor.execute() makes sure\
    \ that the values in the tuple received as argument are of the required data type.\
    \ If a user tries to sneak in some problematic characters, then the code will\
    \ raise an exception:\n\n```\n$ python modify_ratings.py\n\nEnter movie id: 18\n\
    \nEnter reviewer id: 15\"; UPDATE reviewers SET last_name = \"A\n\nEnter new rating:\
    \ 5.0\n\nEnter username: <user_name>\n\nEnter password:\n\n1292 (22007): Truncated\
    \ incorrect DOUBLE value: '15\";\n\nUPDATE reviewers SET last_name = \"A'\n```\n\
    \ncursor.execute() will raise an exception if it finds any unwanted characters\
    \ in the user input. You should use this approach whenever you incorporate user\
    \ input in a query. There are other ways of preventing SQL injection attacks as\
    \ well."
  mdcn: "## 9.5.2 DELETE 命令\n\n删除记录的工作方式与更新记录非常相似。你使用 DELETE 语句来移除选定的记录。\n\n**注意：**\
    \ 删除是一个*不可逆*的过程。如果你不使用 WHERE 子句，那么指定表中的所有记录都将被删除。你需要再次运行 INSERT INTO 查询才能恢复被删除的记录。\n\
    \n建议你首先运行一个带有相同过滤条件的 SELECT 查询，以确保你正在删除正确的记录。例如，要移除所有由 reviewer_id = 2 给出的评分，你应该首先运行相应的\
    \ SELECT 查询：\n\n```python\ncursor.execute(update_query)\n\nconnection.commit()\n\
    ```\n\n该代码将更新查询传递给 cursor.execute()，而 .commit() 将所需的更改应用到 reviewers 表。\n\n**注意：**\
    \ 在 UPDATE 查询中，WHERE 子句有助于指定需要更新的记录。如果你不使用 WHERE，那么所有记录都将被更新！\n\n假设你需要提供一个选项，允许评论者修改评分。评论者将提供三个值：movie_id、reviewer_id\
    \ 和新的评分。代码将在执行指定的修改后显示该记录。\n\n假设 movie_id = 18，reviewer_id = 15，新的评分 = 5.0，你可以使用以下\
    \ MySQL 查询来执行所需的修改：\n\n```sql\nUPDATE\n    ratings\nSET\n    rating = 5.0\nWHERE\n\
    \    movie_id = 18 AND reviewer_id = 15;\n```\n\n```sql\nSELECT *\nFROM ratings\n\
    WHERE\n    movie_id = 18 AND reviewer_id = 15;\n```\n\n上述查询首先更新评分，然后显示它。你可以创建一个完整的\
    \ **Python 脚本**，该脚本与数据库建立连接并允许评论者修改评分：\n\n![](img/192fecf3b33c4ee7d07f7123b285647a_338_0.png)\n\
    \n# 基础计算机编程：Python\n\n```python\nfrom getpass import getpass\nfrom mysql.connector\
    \ import connect, Error\n\nmovie_id = input(\"Enter movie id: \")\nreviewer_id\
    \ = input(\"Enter reviewer id: \")\nnew_rating = input(\"Enter new rating: \"\
    )\nupdate_query = \"\"\"\nUPDATE\n    ratings\nSET\n    rating = \"%s\"\nWHERE\n\
    \    movie_id = \"%s\" AND reviewer_id = \"%s\";\n\nSELECT *\nFROM ratings\nWHERE\n\
    \    movie_id = \"%s\" AND reviewer_id = \"%s\"\n\"\"\" % (\n    new_rating,\n\
    \    movie_id,\n    reviewer_id,\n    movie_id,\n    reviewer_id,\n)\n\ntry:\n\
    \    with connect(\n        host=\"localhost\",\n        user=input(\"Enter username:\
    \ \"),\n        password=getpass(\"Enter password: \"),\n        database=\"online_movie_rating\"\
    ,\n    ) as connection:\n        with connection.cursor() as cursor:\n       \
    \     for result in cursor.execute(update_query, multi=True):\n              \
    \  if result.with_rows:\n                    print(result.fetchall())\n      \
    \      connection.commit()\nexcept Error as e:\n    print(e)\n```\n\n将此代码保存到名为\
    \ modify_ratings.py 的文件中。上述代码使用 %s 占位符将接收到的输入插入到 update_query 字符串中。在本教程中，这是第一次在单个字符串中包含多个查询。要将多个查询传递给单个\
    \ cursor.execute()，你需要将该方法的 multi 参数设置为 True。\n\n如果 multi 为 True，则 cursor.execute()\
    \ 返回一个迭代器。迭代器中的每个项目对应于一个游标对象，该对象执行在查询中传递的语句。上述代码在此迭代器上运行一个 for 循环，然后在每个游标对象上调用\
    \ .fetchall()。\n\n**注意：** 在所有游标对象上运行 .fetchall() 很重要。要在同一连接上执行新的语句，你必须确保没有来自先前执行的未读结果。如果有未读结果，那么你将收到一个异常。\n\
    \n如果在某个操作上没有获取到结果集，那么 .fetchall() 会引发异常。为了避免此错误，在上面的代码中你使用了 cursor.with_rows 属性，该属性指示最近执行的操作是否产生了行。\n\
    \n# 基础计算机编程：Python\n\n虽然这段代码应该能解决你的问题，但 WHERE 子句在其当前状态下是网络黑客的主要攻击目标。它容易受到所谓的 SQL\
    \ 注入攻击，这可能允许恶意行为者破坏或滥用你的数据库。\n\n**警告：** 不要在你的数据库上尝试以下输入！它们会破坏你的表，你需要重新创建它。\n\n\
    例如，如果用户发送 movie_id=18、reviewer_id=15 和新的评分=5.0 作为输入，那么输出如下所示：\n\n```\n$ python\
    \ modify_ratings.py\n\nEnter movie id: 18\n\nEnter reviewer id: 15\n\nEnter new\
    \ rating: 5.0\n\nEnter username: <user_name>\n\nEnter password:\n\n[(18, 15, Decimal('5.0'))]\n\
    ```\n\nmovie_id=18 和 reviewer_id=15 的评分已更改为 5.0。但如果你是一个黑客，那么你可能会在输入中发送一个隐藏的命令：\n\
    \n```\n$ python modify_ratings.py\n\nEnter movie id: 18\n\nEnter reviewer_id:\
    \ 15\"; UPDATE reviewers SET last_name = \"A\n\nEnter new rating: 5.0\n\nEnter\
    \ username: <user_name>\n\nEnter password:\n\n[(18, 15, Decimal('5.0'))]\n```\n\
    \n同样，输出显示指定的评分已更改为 5.0。发生了什么变化？\n\n黑客在输入 reviewer_id 时偷偷插入了一个更新查询。更新查询 `update\
    \ reviewers set last_name = \"A` 将 reviewers 表中所有记录的 last_name 更改为 \"A\"。如果你打印出\
    \ reviewers 表，你可以看到这个变化：\n\n```python\n>>> select_query = \"\"\"\n... SELECT first_name,\
    \ last_name\n... FROM reviewers\n... \"\"\"\n>>> with connection.cursor() as cursor:\n\
    ...     cursor.execute(select_query)\n...     for reviewer in cursor.fetchall():\n\
    ...         print(reviewer)\n...\n('Chaitanya', 'A')\n('Mary', 'A')\n('John',\
    \ 'A')\n('Thomas', 'A')\n('Penny', 'A')\n('Mitchell', 'A')\n('Wyatt', 'A')\n('Andre',\
    \ 'A')\n('Sheldon', 'A')\n('Kimbra', 'A')\n('Kat', 'A')\n('Bruce', 'A')\n('Domingo',\
    \ 'A')\n('Rajesh', 'A')\n('Ben', 'A')\n('Mahinder', 'A')\n('Akbar', 'A')\n('Howard',\
    \ 'A')\n('Pinkie', 'A')\n('Gurkaran', 'A')\n('Amy', 'A')\n('Marlon', 'A')\n```\n\
    \n上述代码显示了 reviewers 表中所有记录的 first_name 和 last_name。SQL 注入攻击通过将所有记录的 last_name\
    \ 更改为 \"A\" 来破坏此表。\n\n有一个快速的解决方法可以防止此类攻击。不要将用户提供的查询值直接添加到你的查询字符串中。相反，更新 modify_ratings.py\
    \ 脚本，将这些查询值作为参数发送给 .execute()：\n\n```python\nfrom getpass import getpass\nfrom\
    \ mysql.connector import connect, Error\n\nmovie_id = input(\"Enter movie id:\
    \ \")\nreviewer_id = input(\"Enter reviewer id: \")\nnew_rating = input(\"Enter\
    \ new rating: \")\nupdate_query = \"\"\"\nUPDATE\n    ratings\nSET\n    rating\
    \ = %s\nWHERE\n    movie_id = %s AND reviewer_id = %s;\n\"\"\"\n\nSELECT *\nFROM\
    \ ratings\nWHERE\n    movie_id = %s AND reviewer_id = %s\n\"\"\"\nval_tuple =\
    \ (\n    new_rating,\n    movie_id,\n    reviewer_id,\n    movie_id,\n    reviewer_id,\n\
    )\n\ntry:\n    with connect(\n        host=\"localhost\",\n        user=input(\"\
    Enter username: \"),\n        password=getpass(\"Enter password: \"),\n      \
    \  database=\"online_movie_rating\",\n    ) as connection:\n        with connection.cursor()\
    \ as cursor:\n            for result in cursor.execute(update_query, val_tuple,\
    \ multi=True):\n                if result.with_rows:\n                    print(result.fetchall())\n\
    \            connection.commit()\nexcept Error as e:\n    print(e)\n```\n\n注意，%s\
    \ 占位符不再包含在字符串引号中。传递给占位符的字符串可能包含一些特殊字符。如果需要，底层库可以正确地转义这些字符。\n\ncursor.execute()\
    \ 确保作为参数接收的元组中的值具有所需的数据类型。如果用户试图偷偷插入一些有问题的字符，那么代码将引发异常：\n\n```\n$ python modify_ratings.py\n\
    \nEnter movie id: 18\n\nEnter reviewer_id: 15\"; UPDATE reviewers SET last_name\
    \ = \"A\n\nEnter new rating: 5.0\n\nEnter username: <user_name>\n\nEnter password:\n\
    \n1292 (22007): Truncated incorrect DOUBLE value: '15\";\n\nUPDATE reviewers SET\
    \ last_name = \"A'\n```\n\n如果 cursor.execute() 在用户输入中发现任何不需要的字符，它将引发异常。当你在查询中包含用户输入时，你应该使用这种方法。还有其他方法可以防止\
    \ SQL 注入攻击。"
