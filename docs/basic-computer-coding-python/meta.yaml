  md: '![](img/192fecf3b33c4ee7d07f7123b285647a_212_0.png)


    Note that if Python hadn''t provided inheritance, we could recreate it by providing
    a __getattr__ method to do the forwarding. The parent class would be stored explicitly
    in a variable. This would have the interesting side-effect that inheritance links
    could be changed at run-time by modifying this variable. The Chain of Responsibility
    pattern fully supports such changes.


    What happens on a write? If requests were forwarded up the Chain, as with a read,
    there would be no way to override a slot in a parent class. In the above example,
    c.x = 5 would be the same as p.x = 5. (If the variable turns out to be unbound,
    then the object written to would gain a new slot.) If requests were not forwarded,
    then the object written to would always gain a new slot, shadowing the ancestor
    slot. Python chooses the latter, so that parent methods can be overridden in children.
    Thus we get:


    ```

    c.x = 5

    p.x     (prints 4)

    i.x     (prints 5)


    i.x = i.x

    c.x = 6

    i.x     (prints 5)

    ```


    Note that i.x = i.x performs useful work under this design choice.


    Does Python need to distinguish between classes and instances? Both are essentially
    dictionaries and have the same read/write and inheritance mechanism. Perhaps it''s
    for efficiency reasons: there are usually far fewer classes than instances, so
    certain optimizations can be applied to classes but not instances.'
