    ## GUIDO VAN ROSSUM


    Guido van Rossum; born 31 January 1956) is a Dutch programmer best known as the
    author of the Python programming language, for which he was the “Benevolent Dictator
    For Life” (BDFL) until he stepped down from the position in July 2018.


    ## Education and Life


    Van Rossum was born and raised in the Netherlands, where he received a master’s
    degree in mathematics and computer science from the University of Amsterdam in
    1982. He has a brother, Just van Rossum, who is a type designer and programmer
    who designed the typeface used in the “Python Powered” logo.


    Guido lives in Belmont, California, with his wife, Kim Knapp, and their son. According
    to his home page and Dutch naming conventions, the “van” in his name is capitalized
    when he is referred to by surname alone, but not when using his first and last
    name together.


    ## Work


    While working at the Centrum Wiskunde & Informatica (CWI), Van Rossum wrote and
    contributed a glob() routine to BSD Unix in 1986 and helped develop the ABC programming
    language. He once stated, “I try to mention ABC’s influence because I’m indebted
    to everything I learned during that project and to the people who worked on it.”
    He also created Grail, an early web browser written in Python, and engaged in
    discussions about the HTML standard.


    He has worked for various research institutes, including the Centrum Wiskunde
    & Informatica (CWI) in the Netherlands, the U.S. National Institute of Standards
    and Technology (NIST), and the Corporation for National Research Initiatives (CNRI).
    From 2000 until 2003 he worked for Zope corporation. In 2003 van Rossum left Zope
    for Elemental Security. While there he worked on a custom programming language
    for the organization. From 2005 to December 2012, he worked at Google, where he
    spent half of his time developing the Python language. In January 2013, he started
    working for Dropbox.


    ## Python


    In December 1989, Van Rossum had been looking for a “‘hobby’ programming project
    that would keep [him] occupied during the week around Christmas” as his office
    was closed when he decided to write an interpreter for a “new scripting language
    [he] had been thinking about lately: a descendant of ABC that would appeal to
    Unix/C hackers”. He attributes choosing the name “Python” to “being in a slightly
    irreverent mood (and [being] a big fan of *Monty Python’s Flying Circus*)”. He
    has explained that Python’s predecessor, ABC, was inspired by SETL, noting that
    ABC co-developer Lambert Meertens had “spent a year with the SETL group at NYU
    before coming up with the final ABC design”. In July 2018, Van Rossum announced
    that he would be stepping down from the position of BDFL of the Python programming
    language.


    ## Computer Programming for Everybody


    In 1999, Van Rossum submitted a funding proposal to DARPA called “Computer Programming
    for Everybody,” in which he further defined his goals for Python:


    - An easy and intuitive language just as powerful as major competitors

    - Open source, so anyone can contribute to its development

    - Code that is as understandable as plain English

    - Suitability for everyday tasks, allowing for short development times


    Python has grown to become a popular programming language. As of October 2017,
    it was the second most popular language on GitHub, a social coding website, behind
    Javascript and ahead of Java. According to a programming language popularity survey
    it is consistently amongst the top 10 most mentioned languages in job postings.
    Furthermore, Python is consistently in the top 10 most popular languages according
    to the TIOBE Programming Community Index.


    ## Mondrian


    At Google, Van Rossum developed Mondrian, a web-based code review system written
    in Python and used within the company. He named the software after the Dutch painter
    Piet Mondriaan. He named another related software project after Gerrit Rietveld,
    a Dutch designer.


    ## Dropbox


    In 2013, Van Rossum started working at the cloud file storage company Dropbox.


    ## SUMMARY


    - Python is a general-purpose, versatile, and powerful programming language. It''s
    a great first language because it''s concise and easy to read. Whatever you want
    to do, Python can do it.

    - Python is a high-level, interpreted, interactive and object-oriented scripting
    language. Python is designed to be highly readable.

    - Python is a MUST for students and working professionals to become a great Software
    Engineer specially when they are working in Web Development Domain.

    - Python distribution is available for a wide variety of platforms. You need to
    download only the binary code applicable for your platform and install Python.

    - A Python identifier is a name used to identify a variable, function, class,
    module or other object.

    - Python provides no braces to indicate blocks of code for class and function
    definitions or flow control.

    - Statements in Python typically end with a new line. Python does, however, allow
    the use of the line continuation character (\) to denote that the line should
    continue.

    - A line containing only whitespace, possibly with a comment, is known as a blank
    line and Python totally ignores it.'
  mdcn: '## Python 成员运算符


    Python 的成员运算符用于测试是否在序列（如字符串、列表或元组）中存在某个成员。共有两个成员运算符，如下所述：


    | 运算符 | 描述 | 示例 |

    | :--- | :--- | :--- |

    | in | 如果在指定的序列中找到变量，则计算结果为 true，否则为 false。 | x in y，如果 x 是序列 y 的成员，则此处的 in 结果为
    1。 |

    | not in | 如果在指定的序列中未找到变量，则计算结果为 true，否则为 false。 | x not in y，如果 x 不是序列 y 的成员，则此处的
    not in 结果为 1。 |


    ## Python 身份运算符


    身份运算符用于比较两个对象的内存位置。共有两个身份运算符，如下所述：


    | 运算符 | 描述 | 示例 |

    | :--- | :--- | :--- |

    | is | 如果运算符两侧的变量指向同一个对象，则计算结果为 true，否则为 false。 | x is y，如果 id(x) 等于 id(y)，则此处的
    **is** 结果为 1。 |

    | is not | 如果运算符两侧的变量指向同一个对象，则计算结果为 false，否则为 true。 | x is not y，如果 id(x) 不等于
    id(y)，则此处的 **is not** 结果为 1。 |


    ## 1.5.2 Python 运算符优先级


    下表列出了所有运算符，从最高优先级到最低优先级。


    | 运算符 | 描述 |

    | :--- | :--- |

    | ** | 幂运算（求幂） |

    | ~ + - | 按位取反、一元正号和一元负号（后两者的名称分别为 +@ 和 -@） |

    | * / % // | 乘法、除法、取模和整除 |

    | + - | 加法和减法 |

    | >> << | 右移和左移位运算 |

    | & | 按位与 |

    | ^ | 按位异或和按位或 |

    | <= <> >= | 比较运算符 |

    | <> == != | 相等运算符 |

    | = %= /= //= -= += *= **= | 赋值运算符 |

    | is is not | 身份运算符 |

    | in not in | 成员运算符 |

    | not or and | 逻辑运算符 |


    运算符优先级影响表达式的计算方式。


    x = 7 + 3 * 2; 此处，x 被赋值为 13，而不是 20，因为运算符 * 的优先级高于 +，所以它先计算 3*2，然后再加上 7。


    ![](img/192fecf3b33c4ee7d07f7123b285647a_46_0.png)


    此处，优先级最高的运算符出现在表格顶部，优先级最低的出现在底部。


    ## 示例


    ```

    #!/usr/bin/python


    a = 20

    b = 10

    c = 15

    d = 5

    e = 0


    e = (a + b) * c / d      #( 30 * 15 ) / 5

    print "Value of (a + b) * c / d is ", e


    e = ((a + b) * c) / d    # (30 * 15 ) / 5

    print "Value of ((a + b) * c) / d is ", e


    e = (a + b) * (c / d);   # (30) * (15/5)

    print "Value of (a + b) * (c / d) is ", e


    e = a + (b * c) / d;       #  20 + (150/5)

    print "Value of a + (b * c) / d is ",  e

    ```


    当你执行上述程序时，它会产生以下结果：


    Value of (a + b) * c / d is 90

    Value of ((a + b) * c) / d is 90

    Value of (a + b) * (c / d) is 90

    Value of a + (b * c) / d is 50


    ## 榜样


    ![](img/192fecf3b33c4ee7d07f7123b285647a_48_0.png)


    ## 吉多·范罗苏姆


    吉多·范罗苏姆（Guido van Rossum；1956年1月31日出生）是一位荷兰程序员，最为人所知的是作为 Python 编程语言的作者，他曾是该语言的“终身仁慈独裁者”（BDFL），直到2018年7月卸任。


    ## 教育与生活


    范罗苏姆在荷兰出生并长大，于1982年在阿姆斯特丹大学获得数学和计算机科学硕士学位。他有一个兄弟，贾斯特·范罗苏姆（Just van Rossum），他是一位字体设计师和程序员，设计了“Python
    Powered”标志中使用的字体。


    吉多与他的妻子金·纳普（Kim Knapp）和他们的儿子住在加利福尼亚州的贝尔蒙特。根据他的主页和荷兰命名惯例，当单独使用他的姓氏时，“van”需要大写，但当使用他的名和姓一起时则不需要大写。


    ## 工作经历


    在数学与计算机科学研究所（CWI）工作期间，范罗苏姆于1986年编写并为 BSD Unix 贡献了一个 glob() 例程，并协助开发了 ABC 编程语言。他曾表示：“我试图提及
    ABC 的影响，因为我感激在那个项目中学到的一切以及与我共事的人。”他还创建了 Grail，一个用 Python 编写的早期网络浏览器，并参与了关于 HTML
    标准的讨论。


    他曾为多个研究机构工作，包括荷兰的数学与计算机科学研究所（CWI）、美国国家标准与技术研究院（NIST）以及国家研究计划公司（CNRI）。从2000年到2003年，他在
    Zope 公司工作。2003年，范罗苏姆离开 Zope 加入 Elemental Security。在那里，他为该组织开发了一种定制的编程语言。从2005年到2012年12月，他在
    Google 工作，期间他花了一半的时间开发 Python 语言。2013年1月，他开始在 Dropbox 工作。


    ## Python


    1989年12月，范罗苏姆一直在寻找一个“能让[他]在圣诞节前后的一周里有事可做的‘业余’编程项目”，因为他的办公室关闭了，于是他决定为一个“他最近一直在思考的新的脚本语言：一个能吸引
    Unix/C 黑客的 ABC 后代”编写一个解释器。他将选择“Python”这个名字归因于“当时心情有点不羁（并且是*蒙提·派森的飞行马戏团*的忠实粉丝）”。他解释说，Python
    的前身 ABC 受到了 SETL 的启发，并指出 ABC 的共同开发者兰伯特·梅尔滕斯（Lambert Meertens）在提出最终的 ABC 设计之前，“在纽约大学的
    SETL 小组待了一年”。2018年7月，范罗苏姆宣布他将卸任 Python 编程语言的 BDFL 职位。


    ## 人人皆可编程


    1999年，范罗苏姆向 DARPA 提交了一份名为“人人皆可编程”的资助提案，其中他进一步定义了 Python 的目标：


    - 一种简单直观的语言，同时与主要竞争对手一样强大

    - 开源，因此任何人都可以为其发展做出贡献

    - 代码像纯英语一样易于理解

    - 适用于日常任务，允许较短的开发时间


    Python 已发展成为一种流行的编程语言。截至2017年10月，它是 GitHub（一个社交编码网站）上第二受欢迎的语言，仅次于 Javascript，领先于
    Java。根据一项编程语言流行度调查，它在招聘信息中被提及的频率始终位列前10名。此外，根据 TIOBE 编程社区指数，Python 也始终位列最受欢迎的10种语言之列。


    ## 蒙德里安


    在 Google，范罗苏姆开发了蒙德里安（Mondrian），一个基于网络的代码审查系统，用 Python 编写并在公司内部使用。他以荷兰画家皮特·蒙德里安（Piet
    Mondriaan）的名字为该软件命名。他还以荷兰设计师赫里特·里特费尔德（Gerrit Rietveld）的名字命名了另一个相关的软件项目。


    ## Dropbox


    2013年，范罗苏姆开始在云文件存储公司 Dropbox 工作。


    ## 总结


    - Python 是一种通用、多功能且强大的编程语言。它是一门很好的入门语言，因为它简洁易读。无论你想做什么，Python 都能胜任。

    - Python 是一种高级、解释型、交互式和面向对象的脚本语言。Python 的设计目标是高度可读性。

    - 对于学生和在职专业人士来说，Python 是成为优秀软件工程师的必备技能，尤其是在从事 Web 开发领域工作时。

    - Python 发行版适用于多种平台。你只需下载适用于你平台的二进制代码并安装 Python 即可。

    - Python 标识符是用于标识变量、函数、类、模块或其他对象的名称。

    - Python 不提供花括号来表示类和函数定义或流程控制的代码块。

    - Python 中的语句通常以新行结束。但是，Python 允许使用行继续字符（\）来表示该行应继续。

    - 仅包含空白字符（可能带有注释）的行称为空行，Python 会完全忽略它。'
