    the installation-dependent default.


    After initialization, Python programs can modify sys.path. The directory containing
    the script being run is placed at the beginning of the search path, ahead of the
    standard library path. This means that scripts in that directory will be loaded
    instead of modules of the same name in the library directory. This is an error
    unless the replacement is intended.


    As an important speed-up of the start-up time for short programs that use a lot
    of standard modules, if a file called spam.pyc exists in the directory where spam.py
    is found, this is assumed to contain an already-“byte-compiled” version of the
    module spam. The modification time of the version of spam.py used to create spam.pyc
    is recorded in spam.pyc, and the .pyc file is ignored if these don’t match.


    Normally, you don’t need to do anything to create the spam.pyc file. Whenever
