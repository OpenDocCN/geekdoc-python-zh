    We have the following functions in the Python Multithreading module:


    +   a. active_count()

    This returns the number of alive(currently) Thread objects. This is equal to the
    length the of the list that enumerate() returns.

    >>> threading.active_count()

    2

    b. current_thread()

    Based on the caller’s thread of control, this returns the current Thread object.
    If this thread of control is not through ‘threading’, it returns a dummy thread
    object with limited functionality.

    >>> threading.current_thread()

    <_MainThread(MainThread, started 14352)>

    c. get_ident()

    get_ident() returns the current thread’s identifier, which is a non-zero integer.
    We can use this to index a dictionary of thread-specific data. Apart from that,
    it has no special meaning.'
