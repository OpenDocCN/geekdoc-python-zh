    ## 7.2.6 Semaphore Objects


    Early Dutch computer scientist Edsger W. Dijkstra invented one of the oldest synchronization
    primitives. Instead of `acquire()` and `release()`, he used `P()` and `V()`.


    What is a semaphore? It is a primitive that lets us manage an internal counter.
    Each call to `acquire()` decrements, and each call to `release()` increments it.
    But let us tell you, the counter never goes below zero. When it is 0, `acquire()`
    blocks, and waits until a thread makes a call to `release()`.


    ![](img/192fecf3b33c4ee7d07f7123b285647a_233_0.png)


    Semaphores in Python Multithreading support CMP (Context Management Protocol).


    This is the class we have:


    ```python

    class threading.Semaphore(value=1)

    ```


    It implements semaphore objects. A semaphore holds an atomic counter denoting
    the count of `release()` calls minus the count of `acquire()` calls, added to
    an initial value. `acquire()` blocks if needed until it can leave the counter
    non-negative and still return. The default value for the counter is 1.


    This class implements semaphore objects. A semaphore manages an atomic counter
    representing the number of `release()` calls minus the number of `acquire()` calls,
    plus an initial value. The `acquire()` method blocks if necessary until it can
    return without making the counter negative. If not given, `value` defaults to
    1.


    *value* can serve as an initial value for the internal counter. The default for
    this is 1. If we pass a value less than 0, this raises a `ValueError`.


    It has the following methods:


    a. `acquire(blocking=True, timeout=None)`


    This acquires a semaphore. When we pass a *timeout* value other than `None`, it
    blocks for a maximum of *timeout* seconds. If in that interval, `acquire()` does
    not complete successfully, it returns `False`. Otherwise, it returns `True`.


    When we call it without arguments, the following cases may be:


    - If, on entry, the internal counter is greater than zero, it decrements it by
    one, and then returns.

    - If, on entry, the internal counter is zero, it blocks until a call to `release()`
    wakes it up. Now that the counter is greater than 0, it decrements it by 1, and
    then returns `True`. Each call to `release()` wakes exactly one thread. We cannot
    say what order this happens in.

    - When we call it with *blocking* with a value of `False`, it does not block.
    And if a call without arguments blocks, then it returns `False`. Otherwise, it
    does the same as when called without arguments, and then returns `True`.


    b. `release()`


    This method releases a semaphore, and increments the internal counter by 1. When,
    on entry, it is 0, and another thread waits for it to grow again, it wakes that
    thread up.


    We also have bounded semaphores:


    ```python

    class threading.BoundedSemaphore(value=1)

    ```


    This class implements bounded semaphore objects. Such objects ensure that their
    current values do not exceed their initial values. If this happens, this raises
    a `ValueError`. Mostly, semaphores guard resources with limited capacity, for
    ex., a database server. Where the resource size is fixed, use a bounded semaphore.
    But if it releases the semaphore way too many times, then you may have a bug in
    your code. The default for this is 1.


    Let''s take an example. The main thread initializes the semaphore before spawning
    any worker threads:


    ```python

    >>> maxconnections = 5

    >>> pool_sema = threading.BoundedSemaphore(value=maxconnections)

    ```


    Now that it is spawned, the worker threads call `acquire()` and `release()` when
    they must connect to the server:


    ```python

    >>> with pool_sema:

    ...     conn = connectdb()

    ...     try:

    ...         # use connection

    ...     finally:

    ...         conn.close()

    ```


    Using a bounded semaphore lessens the chances of programming errors.


