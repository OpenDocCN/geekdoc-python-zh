    \        if m == 0:\n            return x\n        elif m == 1:\n            return\
    \ y\n    return dispatch\n>>> def getitem_pair(p, i):\n    \"\"\"返回对 p 中索引 i 处的元素。\"\
    \"\"\n    return p(i)\n```\n\n通过这种实现，我们可以创建和操作对。\n\n```python\n>>> p = make_pair(1,\
    \ 2)\n>>> getitem_pair(p, 0)\n1\n>>> getitem_pair(p, 1)\n2\n```\n\n这种函数的使用方式与我们对数据应是什么的直观概念毫无相似之处。然而，这些函数足以在我们的程序中表示复合数据。\n\
    \n需要注意的微妙之处在于，`make_pair` 返回的值是一个名为 `dispatch` 的函数，它接受一个参数 `m` 并返回 `x` 或 `y`。然后，`getitem_pair`\
    \ 调用此函数以检索适当的值。\n\n展示对的函数式表示的意义不在于 Python 实际上就是这样工作的（出于效率原因，元组的实现更直接），而在于它可能这样工作。函数式表示虽然晦涩，但却是表示对的完全充分的方式，因为它满足了对需要满足的唯一条件。这个例子也表明，将函数作为值来操作的能力自动为我们提供了表示复合数据的能力。\n\
    \n> 术语“对象”和“面向”在现代面向对象编程意义上的首次出现是在 20 世纪 50 年代末和 60 年代初的麻省理工学院。在人工智能小组的环境中，早在\
    \ 1960 年，“对象”就可以指具有属性（特性）的已识别项目（LISP 原子）。艾伦·凯后来在 1966 年指出，对 LISP 内部机制的深入理解对他当时的思想产生了强烈影响。\n\
    \n## 总结\n\n- 面向对象编程（OOP）是一种通过将相关属性和行为捆绑到单个对象中来构建程序的方法。从概念上讲，对象就像系统的组件。可以将程序想象成某种工厂装配线。\n\
    - 面向对象编程是一种编程范式，它提供了一种构建程序的方式，使得属性和行为被捆绑到单个对象中。\n- 关键要点是，对象是 Python 中面向对象编程的核心，不仅像过程式编程那样代表数据，而且也体现在程序的整体结构中。\n\
    - Python 自诞生以来就是一门面向对象语言。因此，创建和使用类和对象非常容易。本章帮助你成为使用 Python 面向对象编程支持的专家。\n- 实例方法在类内部定义，用于获取实例的内容。\n\
    - 继承是一个类获取另一个类的属性和方法的过程。\n- Python 从第一天起就是一门面向对象语言。因此，创建和使用类和对象非常容易。如果你没有任何面向对象（OO）编程的经验。\n\
    - 继承是一种在不修改现有类的情况下使用其详细信息来创建新类的方式。新形成的类是派生类（或子类）。\n- 类是封装的一个例子，因为它封装了所有数据，包括成员函数、变量等。\n\
    - Python 在隐藏属性和方法方面遵循“我们都是成年人”的哲学；即你应该信任将使用你的类的其他程序员。\n- 数据抽象和封装经常被用作同义词。两者几乎是同义词，因为数据抽象是通过封装实现的。\n\
    \n## 知识检查\n\n1. 哪个是私有成员函数的访问范围？\n   a. 只能在类内部使用的成员函数\n   b. 可以在类外部使用的成员函数\n  \
    \ c. 在派生类中可访问的成员函数\n   d. 无法在类内部访问的成员函数\n\n2. 以下哪项是正确的？\n   a. 私有成员不能被类的公共成员访问\n\
    \   b. 私有成员可以被类的公共成员访问\n   c. 私有成员只能被类的私有成员访问\n   d. 私有成员不能被类的受保护成员访问\n\n3. 哪个成员永远不能被继承类访问？\n\
    \   a. 私有成员函数\n   b. 公共成员函数\n   c. 受保护成员函数\n   d. 所有都可以访问\n\n4. 以下哪种语法表示一个成员在类中是私有的？\n\
    \   a. private: functionName(parameters)\n   b. private(functionName(parameters))\n\
    \   c. private functionName(parameters)\n   d. private::functionName(parameters)\n\
    \n5. 一个类中允许有多少个私有成员函数？\n   a. 只有 1 个\n   b. 只有 7 个\n   c. 只有 255 个\n   d. 根据需要任意多个\n\
    \n6. 以下哪种语言是作为第一个纯粹的面向对象编程语言开发的？\n   a. SmallTalk\n   b. C++\n   c. Kotlin\n \
    \  d. Java\n\n7. 谁开发了面向对象编程？\n   a. Adele Goldberg\n   b. Dennis Ritchie\n   c.\
    \ Alan Kay\n   d. Andrea Ferro\n\n8. 以下哪项不是 OOPS 概念？\n   a. 封装\n   b. 多态\n   c.\
    \ 异常\n   d. 抽象\n\n## 复习题\n\n1. Python 中的类和对象（实例）是什么？\n2. 如何实例化对象？请用合适的例子解释。\n\
    3. 讨论继承的概念。\n4. OOPS 中封装的机制是什么？\n5. 编写一个在 Python 中使用多态的程序。\n\n## 检查你的结果\n\n1.\
    \ (a)          2. (b)          3. (a)          4. (c)          5. (d)\n6. (a)\
    \          7. (c)          8. (c)\n\n## 参考文献\n\n1. Beal, V. (2016). What is Polymorphism?\
    \ Webopedia Definition. [online] Webopedia.com. Available at: http://www.webopedia.com/TERM/P/polymorphism.html\n\
    2. Derek Coleman, et. al. Object-Oriented Development - The Fusion Method. Prentice-Hall\
    \ Object-Oriented Series.\n3. E. Colbert. The Object-Oriented Software Development\
    \ Method: a practical approach to object-oriented development. Tri-Ada Proc.,\
    \ New York.\n4. Lambert, S. (2012). Quick Tip: The OOP Principle of Encapsulation.\
    \ [online] Game Development Envato Tuts+. Available at: http://gamedevelopment.tutsplus.com/tutorials/quick-tip-the-oop-principle-of-encapsulation--gamedev-2187\n\
    5. Lau, Yun-Tung, Ph.D. The Art of Objects: Object-Oriented Design and Architecture.\
    \ Addison-Wesley, 2001.\n6. Obbayi, R. (2016). Compare Structured and Object-Oriented\
    \ Programming: What Are the Real Differences?. [online] Bright Hub. Available\
    \ at: http://www.brighthub.com/internet/web-development/articles/82024.aspx"
