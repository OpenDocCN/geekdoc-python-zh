- md: "## 9.1.6 Python MySQL – Create Database\n\nPython Database API (Application\
    \ Program Interface) is the Database interface for the standard Python. This standard\
    \ is adhered to by most Python Database interfaces. There are various Database\
    \ servers supported by Python Database such as MySQL, GadFly, mSQL, PostgreSQL,\
    \ Microsoft SQL Server 2000, Informix, Interbase, Oracle, Sybase etc. To connect\
    \ with MySQL database server from Python, we need to import the mysql.connector\
    \ interface.\n\n**Syntax:**\nCREATE DATABASE DATABASE_NAME\n\n**Example:**\n\n\
    ```python\n# importing required libraries\nimport mysql.connector\n\ndataBase\
    \ = mysql.connector.connect(\n    host =\"localhost\",\n    user =\"user\",\n\
    \    passwd =\"gfg\"\n)\n\n# preparing a cursor object\ncursorObject = dataBase.cursor()\n\
    \n# creating database\ncursorObject.execute(\"CREATE DATABASE geeks4geeks\")\n\
    ```\n\nOutput:\n\n```\nmysql> show databases;\n+--------------------+\n| Database\
    \           |\n+--------------------+\n| information_schema |\n| College     \
    \       |\n| geeks4geeks        |\n| mysql              |\n| performance_schema\
    \ |\n| sys                |\n+--------------------+\n6 rows in set (0.01 sec)\n\
    ```\n\nThe above program illustrates the creation of MySQL database geeks4geeks\
    \ in which host-name is localhost, the username is user and password is gfg.\n\
    \nLet's suppose we want to create a table in the database, then we need to connect\
    \ to a database. Below is a program to create a table in the geeks4geeks database\
    \ which was created in the above program.\n\n## 9.2 MYSQL WITH PYTHON\n\nMySQL\
    \ is one of the most popular database management systems (DBMSs) on the market\
    \ today. It ranked second only to the Oracle DBMS in this year's DB-Engines Ranking.\
    \ As most software applications need to interact with data in some form, programming\
    \ languages like Python provide tools for storing and accessing these data sources.\n\
    \nYou'll be able to efficiently integrate a MySQL database with a Python application.\
    \ You'll develop a small MySQL database for a movie rating system and learn how\
    \ to query it directly from your Python code.\n\nStructured Query Language is\
    \ a standard Database language which is used to create, maintain and retrieve\
    \ the relational database. Following are some interesting facts about SQL.\n\n\
    - SQL is case insensitive. But it is a recommended practice to use keywords (like\
    \ SELECT, UPDATE, CREATE, etc) in capital letters and use user defined things\
    \ (liked table name, column name, etc) in small letters.\n- We can write comments\
    \ in SQL using “--” (double hyphen) at the beginning of any line.\n- SQL is the\
    \ programming language for relational databases (explained below) like MySQL,\
    \ Oracle, Sybase, SQL Server, Postgre, etc. Other non-relational databases (also\
    \ called NoSQL) databases like MongoDB, DynamoDB, etc do not use SQL.\n- Although\
    \ there is an ISO standard for SQL, most of the implementations slightly vary\
    \ in syntax. So we may encounter queries that work in SQL Server but do not work\
    \ in MySQL.\n\n> MySQL is free and open-source software under the terms of the\
    \ GNU General Public License, and is also available under a variety of proprietary\
    \ licenses. MySQL was owned and sponsored by the Swedish company MySQL AB, which\
    \ was bought by Sun Microsystems (now Oracle Corporation).\n\n### 9.2.1 Comparing\
    \ MySQL to Other SQL Databases\n\nSQL stands for Structured Query Language and\
    \ is a widely used programming language for managing relational databases. You\
    \ may have heard of the different flavors of SQL-based DBMSs. The most popular\
    \ ones include MySQL, PostgreSQL, SQLite, and SQL Server. All of these databases\
    \ are compliant with the SQL standards but with varying degrees of compliance.\n\
    \nBeing open source since its inception in 1995, MySQL quickly became a market\
    \ leader among SQL solutions. MySQL is also a part of the Oracle ecosystem. While\
    \ its core functionality is completely free, there are some paid add-ons as well.\
    \ Currently, MySQL is used by all major tech firms, including Google, LinkedIn,\
    \ Uber, Netflix, Twitter, and others.\n\nApart from a large open source community\
    \ for support, there are many other reasons for MySQL’s success:\n\n- **Ease of\
    \ installation:** MySQL was designed to be user-friendly. It’s quite straightforward\
    \ to set up a MySQL database, and several widely available third-party tools,\
    \ like phpMyAdmin, further streamline the setup process. MySQL is available for\
    \ all major operating systems, including Windows, macOS, Linux, and Solaris.\n\
    - **Speed:** MySQL holds a reputation for being an exceedingly fast database solution.\
    \ It has a relatively smaller footprint and is extremely scalable in the long\
    \ run.\n- **User privileges and security:** MySQL comes with a script that allows\
    \ you to set the password security level, assign admin passwords, and add and\
    \ remove user account privileges. This script uncomplicates the admin process\
    \ for a web hosting user management portal. Other DBMSs, like PostgreSQL, use\
    \ config files that are more complicated to use.\n\nWhile MySQL is famous for\
    \ its speed and ease of use, you can get more advanced features with PostgreSQL.\
    \ Also, MySQL isn't fully SQL compliant and has certain functional limitations,\
    \ like no support for FULL JOIN clauses.\n\nYou might also face some issues with\
    \ concurrent reading and writing in MySQL. If your software has many users writing\
    \ data to it at once, then PostgreSQL might be a more suitable choice.\n\n> **Note:**\
    \ For a more in-depth comparison of MySQL and PostgreSQL in a real-world context,\
    \ check out Why Uber Engineering Switched from Postgres to MySQL.\n\nSQL Server\
    \ is also a very popular DBMS and is known for its reliability, efficiency, and\
    \ security. It's preferred by companies, especially in the banking domain, who\
    \ regularly deal with large traffic workloads. It's a commercial solution and\
    \ is one of the systems that are most compatible with Windows services.\n\nIn\
    \ 2010, when Oracle acquired Sun Microsystems and MySQL, many were worried about\
    \ MySQL's future. At the time, Oracle was MySQL's biggest competitor. Developers\
    \ feared that this was a hostile takeover from Oracle with the aim of destroying\
    \ MySQL.\n\nSeveral developers led by Michael Widenius, the original author of\
    \ MySQL, created a fork of the MySQL code base and laid the foundation of MariaDB.\
    \ The aim was to secure access to MySQL and keep it free forever.\n\nTo date,\
    \ MariaDB remains fully GPL licensed, keeping it completely in the public domain.\
    \ Some features of MySQL, on the other hand, are available only with paid licenses.\
    \ Also, MariaDB provides several extremely useful features that aren't supported\
    \ by MySQL server, like distributed SQL and columnar storage. You can find more\
    \ differences between MySQL and MariaDB listed on MariaDB's website.\n\nMySQL\
    \ uses a very similar syntax to the Standard SQL. There are, however, some notable\
    \ differences mentioned in the official documentation.\n\n### 9.2.2 Installing\
    \ MySQL Server and MySQL Connector/Python\n\nNow, to start working through this\
    \ tutorial, you need to set up two things: a MySQL server and a MySQL connector.\
    \ MySQL server will provide all the services required for handling your database.\
    \ Once the server is up and running, you can connect your Python application with\
    \ it using MySQL Connector/Python.\n\n#### Installing MySQL Server\n\nThe official\
    \ documentation details the recommended way to download and install MySQL server.\
    \ You'll find instructions for all popular operating systems, including Windows,\
    \ macOS, Solaris, Linux, and many more.\n\nFor Windows, the best way is to download\
    \ MySQL Installer and let it take care of the entire process. The installation\
    \ manager also helps you configure the security settings of the MySQL server.\
    \ On the Accounts and Roles page, you need to enter a password for the **root**\
    \ (admin) account and also optionally add other users with varying privileges:\n\
    \nWhile you must specify credentials for the root account during setup, you can\
    \ modify these settings later on. Remember the hostname, username, and password\
    \ as these will be required to establish a connection with the MySQL server later\
    \ on.\n\nAlthough you only need the MySQL server for this tutorial, you can also\
    \ set up other helpful tools like MySQL Workbench using these installers. If you\
    \ don't want to install MySQL directly in your operating system, then deploying\
    \ MySQL on Linux with Docker is a convenient alternative."
  mdcn: "## 9.1.6 Python MySQL – 创建数据库\n\nPython 数据库 API（应用程序接口）是标准 Python 的数据库接口。大多数\
    \ Python 数据库接口都遵循此标准。Python 数据库支持多种数据库服务器，例如 MySQL、GadFly、mSQL、PostgreSQL、Microsoft\
    \ SQL Server 2000、Informix、Interbase、Oracle、Sybase 等。要从 Python 连接到 MySQL 数据库服务器，我们需要导入\
    \ `mysql.connector` 接口。\n\n**语法：**\nCREATE DATABASE DATABASE_NAME\n\n**示例：**\n\
    \n```python\n# importing required libraries\nimport mysql.connector\n\ndataBase\
    \ = mysql.connector.connect(\n    host =\"localhost\",\n    user =\"user\",\n\
    \    passwd =\"gfg\"\n)\n\n# preparing a cursor object\ncursorObject = dataBase.cursor()\n\
    \n# creating database\ncursorObject.execute(\"CREATE DATABASE geeks4geeks\")\n\
    ```\n\n输出：\n\n```\nmysql> show databases;\n+--------------------+\n| Database\
    \           |\n+--------------------+\n| information_schema |\n| College     \
    \       |\n| geeks4geeks        |\n| mysql              |\n| performance_schema\
    \ |\n| sys                |\n+--------------------+\n6 rows in set (0.01 sec)\n\
    ```\n\n上述程序演示了如何创建名为 `geeks4geeks` 的 MySQL 数据库，其中主机名为 `localhost`，用户名为 `user`，密码为\
    \ `gfg`。\n\n假设我们想在数据库中创建一个表，那么我们需要连接到一个数据库。下面是一个在 `geeks4geeks` 数据库（即上述程序创建的数据库）中创建表的程序。\n\
    \n## 9.2 使用 Python 操作 MySQL\n\nMySQL 是当今市场上最受欢迎的数据库管理系统（DBMS）之一。在今年的 DB-Engines\
    \ 排名中，它仅次于 Oracle DBMS，排名第二。由于大多数软件应用程序都需要以某种形式与数据交互，因此像 Python 这样的编程语言提供了用于存储和访问这些数据源的工具。\n\
    \n你将能够高效地将 MySQL 数据库与 Python 应用程序集成。你将为一个电影评分系统开发一个小型 MySQL 数据库，并学习如何直接从 Python\
    \ 代码中查询它。\n\n结构化查询语言（SQL）是一种标准的数据库语言，用于创建、维护和检索关系数据库。以下是关于 SQL 的一些有趣事实。\n\n- SQL\
    \ 不区分大小写。但建议的做法是将关键字（如 SELECT、UPDATE、CREATE 等）大写，将用户定义的内容（如表名、列名等）小写。\n- 我们可以使用行首的“--”（双连字符）在\
    \ SQL 中编写注释。\n- SQL 是用于关系数据库（如下所述）的编程语言，例如 MySQL、Oracle、Sybase、SQL Server、Postgre\
    \ 等。其他非关系数据库（也称为 NoSQL）数据库，如 MongoDB、DynamoDB 等，不使用 SQL。\n- 尽管 SQL 有 ISO 标准，但大多数实现的语法略有不同。因此，我们可能会遇到在\
    \ SQL Server 中有效但在 MySQL 中无效的查询。\n\n> MySQL 是根据 GNU 通用公共许可证条款提供的免费开源软件，也可在各种专有许可下使用。MySQL\
    \ 由瑞典公司 MySQL AB 拥有和赞助，该公司后来被 Sun Microsystems（现为 Oracle Corporation）收购。\n\n###\
    \ 9.2.1 将 MySQL 与其他 SQL 数据库进行比较\n\nSQL 代表结构化查询语言，是一种广泛使用的编程语言，用于管理关系数据库。你可能听说过不同风格的基于\
    \ SQL 的 DBMS。最受欢迎的包括 MySQL、PostgreSQL、SQLite 和 SQL Server。所有这些数据库都符合 SQL 标准，但符合程度各不相同。\n\
    \n自 1995 年诞生以来，MySQL 一直是开源的，并迅速成为 SQL 解决方案中的市场领导者。MySQL 也是 Oracle 生态系统的一部分。虽然其核心功能完全免费，但也有一些付费附加组件。目前，MySQL\
    \ 被所有主要科技公司使用，包括 Google、LinkedIn、Uber、Netflix、Twitter 等。\n\n除了庞大的开源社区支持外，MySQL\
    \ 成功的原因还有很多：\n\n- **易于安装：** MySQL 旨在用户友好。设置 MySQL 数据库相当简单，一些广泛可用的第三方工具（如 phpMyAdmin）进一步简化了设置过程。MySQL\
    \ 适用于所有主要操作系统，包括 Windows、macOS、Linux 和 Solaris。\n- **速度：** MySQL 以其极快的数据库解决方案而闻名。它占用空间相对较小，并且从长远来看具有极高的可扩展性。\n\
    - **用户权限和安全性：** MySQL 附带一个脚本，允许你设置密码安全级别、分配管理员密码以及添加和删除用户帐户权限。该脚本简化了网络托管用户管理门户的管理过程。其他\
    \ DBMS（如 PostgreSQL）使用的配置文件则更为复杂。\n\n虽然 MySQL 以其速度和易用性而闻名，但你可以通过 PostgreSQL 获得更高级的功能。此外，MySQL\
    \ 并非完全符合 SQL 标准，并且存在某些功能限制，例如不支持 FULL JOIN 子句。\n\n你可能还会在 MySQL 中遇到并发读写的一些问题。如果你的软件有许多用户同时写入数据，那么\
    \ PostgreSQL 可能是更合适的选择。\n\n> **注意：** 要在实际环境中更深入地比较 MySQL 和 PostgreSQL，请查看《为什么\
    \ Uber 工程团队从 Postgres 切换到 MySQL》。\n\nSQL Server 也是一个非常流行的 DBMS，以其可靠性、效率和安全性而闻名。它受到经常处理大流量工作负载的公司（尤其是银行领域）的青睐。它是一个商业解决方案，也是与\
    \ Windows 服务最兼容的系统之一。\n\n2010 年，当 Oracle 收购 Sun Microsystems 和 MySQL 时，许多人担心 MySQL\
    \ 的未来。当时，Oracle 是 MySQL 最大的竞争对手。开发者担心这是 Oracle 的一次恶意收购，旨在摧毁 MySQL。\n\n由 MySQL\
    \ 原始作者 Michael Widenius 领导的几位开发者创建了 MySQL 代码库的一个分支，并奠定了 MariaDB 的基础。其目的是确保对 MySQL\
    \ 的访问并使其永远免费。\n\n迄今为止，MariaDB 仍然完全采用 GPL 许可，使其完全处于公共领域。而 MySQL 的某些功能仅在付费许可下可用。此外，MariaDB\
    \ 提供了 MySQL 服务器不支持的几个非常有用的功能，例如分布式 SQL 和列式存储。你可以在 MariaDB 的网站上找到更多 MySQL 和 MariaDB\
    \ 之间的差异。\n\nMySQL 使用与标准 SQL 非常相似的语法。然而，官方文档中提到了一些显著的差异。\n\n### 9.2.2 安装 MySQL\
    \ Server 和 MySQL Connector/Python\n\n现在，要开始学习本教程，你需要设置两样东西：一个 MySQL 服务器和一个 MySQL\
    \ 连接器。MySQL 服务器将提供处理数据库所需的所有服务。一旦服务器启动并运行，你就可以使用 MySQL Connector/Python 将你的 Python\
    \ 应用程序与之连接。\n\n#### 安装 MySQL Server\n\n官方文档详细说明了下载和安装 MySQL 服务器的推荐方式。你会找到适用于所有流行操作系统的说明，包括\
    \ Windows、macOS、Solaris、Linux 等。\n\n对于 Windows，最好的方法是下载 MySQL Installer 并让它处理整个过程。安装管理器还可以帮助你配置\
    \ MySQL 服务器的安全设置。在“帐户和角色”页面上，你需要为 **root**（管理员）帐户输入密码，也可以选择添加具有不同权限的其他用户：\n\n\
    虽然你必须在设置期间指定 root 帐户的凭据，但你可以稍后修改这些设置。请记住主机名、用户名和密码，因为稍后建立与 MySQL 服务器的连接时将需要它们。\n\
    \n尽管本教程只需要 MySQL 服务器，但你也可以使用这些安装程序设置其他有用的工具，例如 MySQL Workbench。如果你不想直接在操作系统中安装\
    \ MySQL，那么使用 Docker 在 Linux 上部署 MySQL 是一个方便的替代方案。"
