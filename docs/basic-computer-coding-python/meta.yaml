  - '[PAGE 311]


    # Installing MySQL Connector/Python


    A database driver is a piece of software that allows an application to connect
    and interact with a database system. Programming languages like Python need a
    special driver before they can speak to a database from a specific vendor.


    These drivers are typically obtained as third-party modules. The Python Database
    API (DB-API) defines the standard interface with which all Python database drivers
    must comply. These details are documented in PEP 249. All Python database drivers,
    such as sqlite3 for SQLite, psycopg2 for PostgreSQL, and MySQL Connector/Python
    for MySQL, follow these implementation rules.


    Note: MySQL’s official documentation uses the term connector instead of driver.
    Technically, connectors are associated only with connecting to a database, not
    interacting with it. However, the term is often used for the entire database access
    module comprising the connector *and* the driver.


    To maintain consistency with the documentation, you’ll see the term connector
    whenever MySQL is mentioned.


    Many popular programming languages have their own database API. For example, Java
    has the Java Database Connectivity (JDBC) API. If you need to connect a Java application
    to a MySQL database, then you need to use the MySQL JDBC connector, which follows
    the JDBC API.


    Similarly, in Python you need to install a Python MySQL connector to interact
    with a MySQL database. Many packages follow the DB-API standards, but the most
    popular among them is MySQL Connector/Python. You can get it with pip:


    +   - $ pip install mysql-connector-python


    pip installs the connector as a third-party module in the currently active virtual
    environment. It’s recommended that you set up an isolated virtual environment
    for the project along with all the dependencies.


    To test if the installation was successful, type the following command on your
    Python terminal:


    ```

    >>>

    >>> import mysql.connector

    ```'
