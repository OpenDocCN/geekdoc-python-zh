    \ information\n- --version: display the software version\n- --list-cameras: list\
    \ the cameras available for use\n- --camera: select a camera to use\n- --config\
    \ -c <filename>: read camera options from file <filename>\n- --preview (-p): preview\
    \ window settings <x,y,w,h>\n- --fullscreen (or --f): fullscreen preview\n- --n:\
    \ suppress the preview. This is very useful for quickly taking images without\
    \ preview\n- --info-text: set window title bar to <text>\n- --shutter: set the\
    \ exposure time in microseconds\n- --awb: set the AWB mode\n- --output: specify\
    \ the output filename to save the image\n- --o: same as above\n\n### Still camera\
    \ options:\n\n- --quality: JPEG quality number (93 default, 100 maximum)\n- --exif:\
    \ add extra EXIF tags\n- --timelapse: time interval between time-lapse captures\
    \ in milliseconds\n- --datetime: use date format for the output filename\n- --timestamp:\
    \ use system timestamp for the output filename\n- --keypress (or --k): capture\
    \ image when the Enter key is pressed\n- --encoding (or --e): set the image encoding\
    \ (jpg, png, bmp, rgb, yuv420)\n- --raw (or --r): save raw file\n\n### Video options:\n\
    \n- --quality (or --q): JPEG quality\n- --bitrate (or --b): H.264 bitrate\n- --codec:\
    \ encoder to use (h264, mjpeg, yuv420, libav)\n- --keypress (--k): toggle between\
    \ recording and pausing\n- --split: split multiple recordings into separate files\n\
    \nSome examples are given below:\n\n## libcamera-hello --list\n\nFigure 16.2 shows\
    \ the available cameras.\n\n```\npi@raspberrypi:~ $ libcamera-hello --list\nAvailable\
    \ cameras\n-----------------\n0 : imx219 [3280x2464] (/base/axi/pcie@120000/rp1/i2c@80000/imx219@10)\n\
    \    Modes: 'SRGGB10_CSI2P' : 640x480 [206.65 fps - (1000, 752)/1280x960 crop]\n\
    \           1640x1232 [41.85 fps - (0, 0)/3280x2464 crop]\n           1920x1080\
