    directory or the file is on the right-hand side. The date the directory or file
    was created is on the left-hand side of its name. Next comes the size, given in
    bytes. The characters at the beginning of each line are about permissions, i.e.
    who is allowed to use or modify the file or the directory.


    The permissions are divided into 3 categories:


    +   - What the user (or owner, or creator) can do – called USER

    - What the group owner (people in the same group) can do - GROUP

    - What everyone else can do – called WORLD


    The first word **pi** in the example in Figure 3.10 shows who the user of the
    file (or directory) is, and the second word **pi** shows the group name that owns
    the file. In this example, both the user and the group names are **pi**.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_35_0.png)


    The permissions can be analysed by breaking down the characters into four chunks
    for: File type, User, Group, World. The first character for a file is ''-'' and
    for a directory, it is ''d''. Next come the permissions for the User, Group and
    World. The permissions are as follows:


    +   - Read permission (r): the permission to open and read a file or to list a
    directory

    - Write permission (w): the permission to modify a file, or to delete or create
    a file in a directory

    - Execute permission (x): the permission to execute the file (applies to executable
    files), or to enter a directory


    The three letters **rwx** are used as a group and if there is no permission assigned
    then a ''-'' character is used.


    As an example, considering the **Music** directory, we have the following permission
    codes:


    ```

    drwxr-xr-x which translates to:

    d:          it is a directory

    rwx:        user (owner) can read, write, and execute

    r-x:        group can read and execute, but cannot write (e.g. create or delete)

    r-x:        world (everyone else) can read and execute, but cannot write

    ```'
  - '[PAGE 36]


    The **chmod** command is used to change the file permissions. Before going into
    details of how to change the permissions, let us look and see what arguments are
    available in **chmod** for changing the file permissions.


    The available arguments for changing file permissions are given below. We can
    use these arguments to add/remove permissions or to explicitly set permissions.
    It is important to realize that if we explicitly set permissions, then any unspecified
    permissions in the command will be revoked:


    +   u: user (or owner)

    g: group

    o: other (world)

    a: all


    +: add

    -: remove

    =: set


    r: read

    w: write

    x: execute


    To change the permissions of a file we type the **chmod** command, followed by
    one of the letters ''u'', ''g'', ''o'', or ''a'' to select the people, followed
    by the ''+'', ''-'' or ''='' to select the type of change, and finally followed
    by the filename. In this example, a file with the name **mytestfile.txt** was
    created in the home directory for demonstration purposes (See Figure 3.11). In
    this example, the file **mytestfile.txt** has the user read and write permissions.


    ```

    pi@raspberrypi:~ $ ls -l

    total 44

    drwxr-xr-x 2 pi dogan-ibrahim 4096 Sep 22 08:25 Bookshelf

    drwxr-xr-x 2 pi dogan-ibrahim 4096 Oct  1 17:42 Desktop

    drwxr-xr-x 2 pi dogan-ibrahim 4096 Oct  1 17:42 Documents

    drwxr-xr-x 2 pi dogan-ibrahim 4096 Oct  1 17:42 Downloads

    drwxr-xr-x 2 pi dogan-ibrahim 4096 Oct  1 17:42 Music

    drwxr-xr-x 2 pi dogan-ibrahim 4096 Oct  3 11:37 myfiles

    -rw-r--r-- 1 pi dogan-ibrahim   15 Oct  3 11:46 mytestfile.txt

    drwxr-xr-x 2 pi dogan-ibrahim 4096 Oct  1 17:42 Pictures

    drwxr-xr-x 2 pi dogan-ibrahim 4096 Oct  1 17:42 Public

    drwxr-xr-x 2 pi dogan-ibrahim 4096 Oct  1 17:42 Templates

    drwxr-xr-x 2 pi dogan-ibrahim 4096 Oct  1 17:42 Videos

    pi@raspberrypi:~ $

    ```


    Figure 3.11 File permissions


    We will be changing the permissions so that the user does not have read permission
    on this file:


    ```

    pi@raspberrypi: ~$ chmod u-r mytestfile.txt

    pi@raspberrypi: ~$ ls -lh

    ```


    The result is shown in Figure 3.12.'
