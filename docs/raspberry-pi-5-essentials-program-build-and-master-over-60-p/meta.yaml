    \    print(cnt)\n```\n\nThe following will be displayed on the screen:\n\n```\n\
    0\n1\n2\n3\n4\n```\n\nNotice that the upper value of the range is one less than\
    \ the specified value. In the above example, range is from 0 to 4 and not to 5.\n\
