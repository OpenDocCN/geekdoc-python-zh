    \    \n\n- Go down the menu to **Interface Options**\n\n- Go down and select **I2C**\n\
    \n- Enable the I²C interface\n\n- Select **Finish** to complete\n\nNow you have\
    \ to check that the I²C library is available on your Raspberry Pi 5. The steps\
    \ are as follows:"
