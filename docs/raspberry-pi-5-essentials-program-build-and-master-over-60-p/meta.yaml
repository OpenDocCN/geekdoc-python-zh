    \ colour can be passed to the clear statement to set all the LEDs to the same\
    \ colour, such as:\n\n```\nred = (255, 0, 0)\nsense.clear(red)\n```\n\nThe brightness\
    \ of the LED matrix can be changed by toggling the **low_light** statement. In\
    \ the following examples, the brightness is toggled:\n\n```\nsense.low_light =\
    \ True\nor\nsense.low_light = False\n```\n\nThe displayed text (or image) can\
    \ be rotated by using the statement **set_rotation(n)** where **n** is the rotation\
    \ angle in degrees, and it can take the values of 0, 90, 180, 270. The following\
    \ statement rotates character s by 90 degrees and displays it on the LED matrix:\n\
    \n```\nsense.set_rotation(90)\nsense.show_letter(\"s\")\n```\n\nText (or image)\
    \ can be flipped horizontally or vertically by using the statements **flip_h**\
