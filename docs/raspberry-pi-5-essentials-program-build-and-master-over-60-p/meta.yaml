  md: '# Chapter 7 • Python Programming and Simple Programs


    # 7.1 Overview


    Python is an interpreted, interactive and object-oriented programming language.
    It was developed by Guido van Rossum in the 1980s at the National Institute for
    Mathematics and Computer Science in the Netherlands. It is derived from many other
    languages, including C, C++, Modula-3, SmallTalk, and Unix shells. The language
    is now maintained by a team of people at the Institute.


    Python is interactive, which means that you can issue a command and see the result
    immediately without having to compile the command. It is interpreted, thus requiring
    no pre-compilation before it is run.


    Python supports object-oriented techniques of programming. It is a beginners''
    language which is easy to learn and easy to maintain. Beginners can easily learn
    programming in a relatively short period of time. Python supports a large library
    of functions, which makes it powerful. The language is portable, meaning that
    it can run on several different popular platforms.


    In this and next chapters, you will be learning the details of the Python programming
    language on the Raspberry Pi 5 computer, and see how you can write programs using
    this language. Many example programs are given to show how electronic engineers
    can use the Python language to help them in their calculations.


    # 7.2 Variable names


    Python variable names are case-sensitive and can start with a letter **A** to
    **Z** or **a** to **z** or an underscore character ''_'', followed by more letters
    or numbers 0 to 9. Some valid and invalid example variable names are given below:


