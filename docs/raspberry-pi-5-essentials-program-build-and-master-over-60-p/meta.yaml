    \ end\n        rot = 1                 # back to beginning\n```\n\nFigure 8.18\
    \ Program listing\n\n## 8.8 Project 6 – Rotating LEDs with push-button switch\n\
    \n**Description:** In this project, eight LEDs are connected to the Raspberry\
