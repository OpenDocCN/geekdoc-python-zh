    \nFigure 10.26 Input values to the example program\n\n## 10.5 Transient RL circuits\n\
    \nThe time response of a transient resistor-inductor circuit is similar to the\
    \ RC circuit. When the circuit is connected to a DC supply of value Vin, the current\
    \ in the circuit rises exponentially and is given by the following formula:\n\n\
    $$i = \\frac{Vin}{R}(1 - e^{-Rt/L})$$\n\nWhere, Vin is in volts, R in ohms, L\
    \ in henries, and t in seconds. The time constant of this circuit is given by\
    \ T = L/R.\n\nAfter the current reaches its steady state value, disconnecting\
    \ the DC supply and shorting the leads causes the current in the circuit to fall\
    \ exponentially, given by the following formula:\n\n$$i = \\frac{Vo}{R}e^{-Rt/L}$$\n\
    \nWhere, Vo is the initial voltage across the inductor.\n\nThe transient response\
    \ of RL circuits is similar to those of the RC circuits and therefore are not\
    \ covered further in this book.\n\n## 10.6 Project 3 – RCL transient circuit analysis\n\
    \n**Description:** This case study is about analysing the transient response of\
    \ a second order series connected RLC circuit by plotting its time response.\n\
    \n**Background Information:** An RLC circuit (Figure 10.27) is a second-order\
    \ system that can have 3 modes of operation depending on the values of the components\
    \ when a DC voltage is applied across its terminals.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_194_0.png)\n\
    \nFigure 10.27 RLC circuit\n\n**Underdamped mode:** This mode is identified when\
    \ the following condition holds true:\n\n$$R < 2\\sqrt{\\frac{L}{C}}$$ (10.5)\n\
    \nWhen DC voltage is applied to the circuit, the current in the circuit is given\
    \ by the following formula:\n\n$$i(t) = \\frac{Vin}{WL\\sqrt{1-\\xi^2}} e^{-\\\
    xi Wt} sin(Wt\\sqrt{1-\\xi^2})$$ (10.6)\n\nWhere,\n\n$$W = \\frac{1}{\\sqrt{LC}}$$\
    \ and, $$\\xi = \\frac{R}{2}\\sqrt{\\frac{C}{L}} < 1$$ (10.7)\n\n**Critically\
    \ damped mode:** In this mode of operation, the following is satisfied:\n\n$$R\
    \ = 2\\sqrt{\\frac{L}{C}}$$ (10.8)\n\nWhen DC voltage is applied to the circuit,\
    \ the current in the circuit is given by the following formula:\n\n$$i(t) = \\\
    frac{Vin}{L} te^{-Wt}$$ (10.9)\n\nWhere,\n\n$$W = \\frac{1}{\\sqrt{LC}}$$ and,\
    \ $$\\xi = \\frac{R}{2}\\sqrt{\\frac{C}{L}} = 1$$ (10.10)\n\n**Overdamped mode:**\
    \ In this mode of operation, the following is satisfied:\n\n$$R > 2\\sqrt{\\frac{L}{C}}$$\
    \ (10.11)\n\nWhen DC voltage is applied to the circuit, the current in the circuit\
    \ is given by the following formula:\n\n$$i(t) = \\frac{Vin}{WL\\sqrt{\\xi^2-1}}e^{-\\\
    xi Wt}sinh(Wt\\sqrt{\\xi^2-1})$$ (10.12)\n\nWhere,\n\n$$W = \\frac{1}{\\sqrt{LC}}$$\
    \ and, $$\\xi = \\frac{R}{2}\\sqrt{\\frac{C}{L}} > 1$$ (10.13)\n\n**Program Listing:**\
    \ Figure 10.28 shows the program listing (program: **RLC.py**). At the beginning\
    \ of the program a heading is displayed and then the values of the input voltage,\
    \ resistor, capacitor and the inductor are read and stored in variables Vin, R,\
    \ C, and L respectively. The program then finds out in which mode the circuit\
    \ will be operating based on the value of $\\xi$. Then, three functions are used,\
    \ one for each mode, to calculate and plot the transient response of the circuit.\
    \ The mode of the circuit is displayed on the graph at the coordinate (3T, 0),\
    \ where T = 2$\\pi$/W. In all the graphs, 80 points are used to draw the points\
    \ from 0 to 6T.\n\n```python\n#-----------------------------------------------------------------\n\
    #               RLC TRANSIENT RESPONSE\n#               =====================\n\
    #\n# This program reads the R,L,C values and then\n# calculates and displays the\
    \ transient response\n#\n# Author: Dogan Ibrahim\n# File   : RLC.py\n# Date  \
    \ : October, 2023\n#-----------------------------------------------------------------\n\
    import matplotlib.pyplot as plt\nimport numpy as np\nimport math\nglobal x, y,\
    \ z\n\ndef critically_damped():\n    global x,y\n    x = np.arange(0, F, N)\n\
    \    y = [Vin*((1/L) * i * math.exp(-i*w)) for i in x]\n\ndef underdamped():\n\
    \    global x,y,z\n    x = np.arange(0, F, N)\n    zeta = math.sqrt(1 - z*z)\n\
    \    y = [Vin*(1/(w*L*zeta)*(math.exp(-z*w*i))*math.sin(w*i*zeta)) for i in x]\n\
    ```"
