    \ a loop is formed to execute forever and inside this loop a random number is\
    \ generated between 1 and 255, and this number is used as an argument to function\
    \ **Port_Output**. The binary pattern corresponding to the generated number is\
    \ sent to the port, which turns the LEDs ON or OFF randomly.\n\n```\n#------------------------------------------------------------\n\
    #\n#                   CHRISTMAS LIGHTS\n#                   ================\n\
    #\n# In this project 8 LEDs are connected to the Raspberry Pi 3\n# and these LEDs\
    \ flash randomly at 0.5 second intervals. The\n# connections of the LEDs are to\
