    \ available (e.g. you are not using a Raspberry Pi active cooler)\n\n# 12.3 Programming\
    \ the Sense HAT\n\nSense HAT is installed by default on your latest Raspberry\
    \ Pi 5 SD card. You may, however, enter the following command to install the latest\
    \ version of the Sense HAT (at the time of writing this book, the latest version\
    \ was: 1.4):\n\n```\npi@raspberrypi:~ $ sudo apt-get install sense-hat\n```\n\n\
    Before developing a project using the Sense HAT board, the Sense HAT library must\
    \ be imported into your Python program and also the **sense** object must be created\
    \ at the beginning of the program. i.e. the following two statements must be included\
    \ at the beginning of your programs:\n\n```\nfrom sense_hat import SenseHat\n\
    sense = SenseHat()\n```\n\nThe remainder part of this chapter is devoted to developing\
    \ simple projects with the Sense HAT. In all the projects, the Sense HAT was connected\
    \ to the Raspberry Pi 5 using jumper wires as described earlier.\n\n# 12.4 Project\
    \ 1 – Displaying text on Sense HAT\n\n**Description:** In this project, you will\
    \ learn how to display as well as scroll text messages on Sense HAT. The statement\
    \ **show_message** is used to scroll a text message. In the following code, the\
    \ message **Sense HAT** is scrolled on the LED matrix. Notice that the message\
    \ is displayed only once:\n\n```\n>>> from sense_hat import SenseHat\n>>> sense\
    \ = SenseHat()\n>>> sense.show_message(\"Sense HAT\")\n```\n\nIf you get an error\
    \ message saying that the **RPi-Sense FB device cannot be detected**, then do\
    \ the following:\n\n+   - pi@raspberrypi:~ $ sudo nano /boot/config.txt\n- go\
    \ to the end of the file and enter the following statement:\n  dtoverlay=rpi-sense"
