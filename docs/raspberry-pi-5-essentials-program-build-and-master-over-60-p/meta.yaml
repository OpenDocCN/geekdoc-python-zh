    \n## 示例 16\n\n编写一个模块，计算传递给它的整数的立方。展示如何在程序中导入和使用此模块。\n\n## 解答 16\n\n图 7.44 显示了模块清单（程序：`cubeno.py`）。`cubeno.py`\
    \ 内的函数 `cube` 以数字作为其参数。计算并返回该数字的立方。图 7.45 显示了程序（程序：`myprog.py`）。例如，当数字为 3 时，程序的输出为：\n\
    \n```\nCube of 3 is: 27\n\ndef cube(N):\n    r = N * N * N\n    return r\n```\n\
