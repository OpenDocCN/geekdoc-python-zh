  md: '# Chapter 5 • Using a Text Editor in Console Mode


    A text editor is used to create or modify the contents of a text file. There are
    many text editors available for the Linux operating system. Some popular ones
    are nano, vim, vi, and many more. In this chapter, we shall be looking at some
    of these text editors and see how to use them.


    # 5.1 nano text editor


    Start the **nano** text editor by entering the word **nano**, followed by the
    filename you wish to create or modify. An example is given below where a new file
    called **first.txt** is created:


    ```

    pi@raspberrypi: ~ $ nano first.txt

    ```


    You should see the editor screen as in Figure 5.1. The name of the file to be
    edited is written at the top middle part of the screen. The message ''New File''
    at the bottom of the screen shows that this is a newly created file. The shortcuts
    at the bottom of the screen are there to perform various editing functions. These
    shortcuts are accessed by pressing the Ctrl key together with another key. Some
    of the useful shortcuts are given below:


    +   - **Ctrl+W**: Search for a word

    - **Ctrl+V**: Move to the next page

    - **Ctrl+Y**: Move to the previous page

    - **Ctrl+K**: Cut the current row of txt

    - **Ctrl+R**: Read file

    - **Ctrl+U**: Paste the text you previously cut

    - **Ctrl+J**: Justify

    - **Ctrl+\**: Search and replace text

    - **Ctrl+C**: Display current column and row position

    - **Ctrl+G**: Get detailed help on using the nano

    - **Ctrl+-**: Go to the specified line and column position

    - **Ctrl+O**: Save (write out) the file currently open

    - **Ctrl+X**: Exit nano'
  merge: -1
