    # The Cloud


    There are several cloud services that can be used to store data (for example **SparkFun**,
    **ThingSpeak**, **Cloudino**, **Bluemix** etc.). In this project, the **Thingspeak**
    is used. This is a free cloud service where sensor data can be stored and retrieved
    using simple HTTP requests. Before using the Thingspeak we have to create an account
    on their website and then log in to this account.


    Go to the ThingSpeak website:


    https://thingspeak.com/


    Click **Get Started For Free** and create an account if you don''t already have
    one. Then, you should create a New Channel by clicking on **New Channel**. Fill
    in the form as shown in Figure 14.31. Give the name **Raspberry Pi 5** to the
    application, give a description, and create two **fields** called **Atmospheric
    Pressure** and **Temperature**. You can optionally fill in the other items as
    well if you wish.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_280_1.png)


    Figure 14.31 Create a New Channel (only part of the form shown)'
