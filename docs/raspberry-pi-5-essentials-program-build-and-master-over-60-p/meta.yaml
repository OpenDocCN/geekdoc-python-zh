    # 正确答案，以便用户可以与自己的答案核对\n#\n# 作者：Dogan Ibrahim\n# 文件：mult.py\n# 日期：2023 年 10 月\n\
    #--------------------------------------------------\nfrom sense_hat import SenseHat\n\
