- md: "## Chapter 14 • Communication over Wi-Fi\n\n## 14.1 Overview\n\nPerhaps the\
    \ two major features of the Raspberry Pi 5 are its Wi-Fi and Bluetooth communication\
    \ capabilities. Raspberry Pi 5 is equipped with a dual-band 2.4 GHz 802.11ac wireless\
    \ LAN module and Bluetooth 5.0/Bluetooth Low Energy (BLE). Without such features,\
    \ you have to use external network-based hardware communication modules to communicate\
    \ over the Internet. Network communication is handled using either UDP or TCP\
    \ type protocols. In this chapter, you will be learning how to write Python programs\
    \ using both the UDP and TCP type protocols using the on-board Wi-Fi module.\n\
    \n## 14.2 UDP and TCP\n\nCommunication over a Wi-Fi link is in the form of client\
    \ and server, and sockets are used to send and receive data packets. The server\
    \ side usually waits for a connection from the clients and once a connection is\
    \ made, two-way communication can start. Two protocols are mainly used for sending\
    \ and receiving data packets over a Wi-Fi link: UDP and TCP. TCP is a connection-based\
    \ protocol which guarantees the delivery of packets. Packets are given sequence\
    \ numbers and the reception of all the packets is acknowledged to avoid them arriving\
    \ in the wrong order. As a result of this confirmation, TCP is usually slow, but\
    \ it is reliable as it guarantees the delivery of packets. UDP, on the other hand,\
    \ is not connection-based. Packets do not have sequence numbers and as a result\
    \ of this, there is no guarantee that the packets will arrive at their destinations,\
    \ or they may arrive in the wrong order. UDP has less overhead than TCP and, as\
    \ a result, it is faster. Table 14.1 lists some of the differences between the\
    \ TCP and UDP protocols.\n\n| TCP | UDP |\n|---|---|\n| Packets have sequence\
    \ numbers and delivery of every packet is acknowledged | There is no delivery\
    \ acknowledgement |\n| Slow | Fast |\n| No packet loss | Packets may be lost |\n\
    | Large overhead | Small overhead |\n| Requires more resources | Requires fewer\
    \ resources |\n| Connection based | Not connection based |\n| Not suitable for\
    \ multicast | Has multicast capability |\n| More difficult to program | Easier\
    \ to program |\n| Examples: HTTP, HTTPS, FTP | Examples: DNS, DHCP, Computer games\
    \ |\n\nTable 14.1 TCP and UDP packet communications\n\n### 14.2.1 UDP communication\n\
    \nFigure 14.1 shows the UDP communication over a Wi-Fi link:\n\nServer\n\n1. Create\
    \ UDP socket\n2. Bind the socket to server address\n3. Wait until datagram packet\
    \ arrives from the client\n4. Process the datagram packet\n5. Send a reply to\
    \ the client, or close the socket\n6. Go back to Step 3 (if not closed)\n\nClient\n\
    \n1. Create UDP socket (and optionally Bind)\n2. Send a message to the server\n\
    3. Wait until a response from the server is received\n4. Process reply\n5. Go\
    \ back to step 2, or close the socket\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_256_0.png)\n\
    \n### 14.2.2 TCP communication\n\nFigure 14.2 shows the TCP communication over\
    \ a Wi-Fi link:\n\nServer\n\n1. Create TCP socket\n2. Bind the socket to server\
    \ address\n3. Listen for connections\n4. Accept connection\n5. Wait until datagram\
    \ packet arrives from the client\n6. Process the datagram packet\n7. Send a reply\
    \ to the client, or close the socket\n8. Go back to Step 3 (if not closed)\n\n\
    Client\n\n1. Create TCP socket\n2. Connect to the server\n3. Send a message to\
    \ the server\n4. Wait until a response from the server is received\n5. Process\
    \ reply\n6. Go back to step 2, or close the socket\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_257_0.png)\n\
    \n## 14.3 Project 1 – Sending a text message to a smartphone using TCP/IP\n\n\
    **Description:** In this project, a TCP/IP-based communication is established\
    \ with an Android smartphone. The program reads text messages from the keyboard\
    \ and sends to the smartphone. The aim of this project is to show how TCP/IP communication\
    \ can be established with an Android smartphone.\n\n**Background Information:**\
    \ Port numbers range from 0 to 65,535. Numbers from 0 to 1023 are reserved and\
    \ are called as well-known ports. For example, port 23 is the Telnet port, port\
    \ 25 is the SMTP port, etc. In this section, you will be using port number 5000\
    \ in your program.\n\n**Block diagram:** Figure 14.3 shows the project block diagram\
    \ where the Raspberry Pi 5 and smartphone communicate over a Wi-Fi router.\n\n\
    ![](img/4c39fa287d846ab9ea3e468319162ce0_258_0.png)\n\n*Figure 14.3 Block diagram\
    \ of the project*\n\n**Program listing:** In this project, Raspberry Pi 5 is the\
    \ server. Figure 14.4 shows the program listing (**tcpserver.py**). At the beginning\
    \ of the program, a TCP/IP socket is created (**sock.SOCK_STREAM**) and is then\
    \ bind to port 5000. The program listens for a connection. Notice that it is possible\
    \ for the server to listen to multiple clients, but of course, it can communicate\
    \ with only one at any time. When the client makes a connection, this is accepted\
    \ by the server. The server then reads a message from the keyboard and sends it\
    \ to the client over the Wi-Fi link. Notice that the **setsockopt()** statement\
    \ makes sure that the program can be used again without having to wait for the\
    \ socket timeout of 30 seconds.\n\n```\n#==========================================================\n\
    #       SEND TEXT MESSAGES USING TCP/IP\n#       ================================\n\
    #\n# This is the TCP/IP server program. It receives text messages\n# from the\
    \ keyboard and sends to an Android smart phone over\n# a Wi-Fi link\n#\n# Author:\
    \ Dogan Ibrahim\n# File   : tcpserver.py\n# Date   : October, 2023\n#==========================================================\n\
    ```\n\n```\nimport socket\n\nsock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n\
    sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\nsock.bind((\"192.168.3.196\"\
    , 5000))\nsock.listen(1)\n\nclient, addr = sock.accept()            # accept connection\n\
    print(\"Connected to client: \", addr)    # connected message\n\nyn = 'y'\n\n\
    while yn == 'y':\n    msg = input(\"Enter your message: \")    # read a message\n\
    \    client.send(msg.encode('utf-8'))        # send the message\n\n    yn = input(\"\
    Send more messages?: \")\n    yn = yn.lower()\n\nprint(\"\\nClosing connection\
    \ to client\")\nsock.close()\n```\n\nFigure 14.4 Program listing\n\n### Testing\n\
    \nThere are many TCP apps available free of charge on the Internet for smartphones.\
    \ In this project, the **TCP Client by JOY S.R.L.** apps is used on an Android\
    \ smartphone. This app is available free of charge in the **Play Store** (see\
    \ Figure 14.5).\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_259_0.png)\n\nFigure\
    \ 14.5 Apps used in the project\n\nThe program is run as follows:\n\n- Run the\
    \ server program first:\n\n    ```\n    pi@raspberrypi:~ $ python tcpserver.py\n\
    \    ```\n\n- Run the Android apps and configure it as shown in Figure 14.6 (click\
    \ the settings icon at the top right hand of the screen), where 192.168.3.196\
    \ is the IP address of the Raspberry Pi 5.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_260_0.png)\n\
    \nFigure 14.6 Configure the TCP Client apps\n\n- Click the icon in the top left\
    \ corner of the apps (disconnected) to connect to Raspberry Pi 5 over TCP/IP.\n\
    \n- You should see a connection message on your Raspberry Pi screen and also the\
    \ IP address of the remote Android smartphone. Now enter a message and press the\
    \ Enter key. In this example, the message **HELLO FROM RASPBERRY PI** is sent\
    \ to the client (Figure 14.7). Figure 14.8 shows the message displayed on the\
    \ smartphone.\n\n```\nbash\npi@raspberrypi:~ $ python tcpserver.py\nConnected\
    \ to client:  ('192.168.3.166', 35406)\nEnter your message: HELLO FROM RASPBERRY\
    \ PI\nSend more messages?: n\n\nClosing connection to client\npi@raspberrypi:~\
    \ $\n```\n\nFigure 14.7 Enter the message on the keyboard\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_260_1.png)\n\
    \nFigure 14.8 Message displayed on smartphone"
  mdcn: "## 第14章 • 通过Wi-Fi进行通信\n\n## 14.1 概述\n\n树莓派5的两个主要特性或许是其Wi-Fi和蓝牙通信能力。树莓派5配备了双频2.4\
    \ GHz 802.11ac无线局域网模块和蓝牙5.0/低功耗蓝牙（BLE）。没有这些功能，你就必须使用外部的基于网络的硬件通信模块来通过互联网进行通信。网络通信使用UDP或TCP类型的协议处理。在本章中，你将学习如何使用板载Wi-Fi模块，编写使用UDP和TCP类型协议的Python程序。\n\
    \n## 14.2 UDP和TCP\n\n通过Wi-Fi链路的通信采用客户端和服务器的形式，并使用套接字来发送和接收数据包。服务器端通常等待客户端的连接，一旦连接建立，就可以开始双向通信。通过Wi-Fi链路发送和接收数据包主要使用两种协议：UDP和TCP。TCP是一种基于连接的协议，它保证数据包的交付。数据包被赋予序列号，并且所有数据包的接收都会被确认，以避免它们以错误的顺序到达。由于这种确认机制，TCP通常较慢，但它很可靠，因为它保证了数据包的交付。另一方面，UDP不是基于连接的。数据包没有序列号，因此无法保证数据包会到达目的地，或者它们可能以错误的顺序到达。UDP的开销比TCP小，因此速度更快。表14.1列出了一些TCP和UDP协议之间的差异。\n\
    \n| TCP | UDP |\n|---|---|\n| 数据包有序列号，并且每个数据包的交付都会被确认 | 没有交付确认 |\n| 慢 | 快 |\n\
    | 无数据包丢失 | 数据包可能丢失 |\n| 开销大 | 开销小 |\n| 需要更多资源 | 需要更少资源 |\n| 基于连接 | 非基于连接 |\n|\
    \ 不适合多播 | 具有多播能力 |\n| 编程更困难 | 编程更容易 |\n| 示例：HTTP, HTTPS, FTP | 示例：DNS, DHCP, 电脑游戏\
    \ |\n\n表14.1 TCP和UDP数据包通信\n\n### 14.2.1 UDP通信\n\n图14.1展示了通过Wi-Fi链路的UDP通信：\n\n\
    服务器\n\n1. 创建UDP套接字\n2. 将套接字绑定到服务器地址\n3. 等待来自客户端的数据报包到达\n4. 处理数据报包\n5. 向客户端发送回复，或关闭套接字\n\
    6. 返回步骤3（如果未关闭）\n\n客户端\n\n1. 创建UDP套接字（并可选地绑定）\n2. 向服务器发送消息\n3. 等待接收来自服务器的响应\n\
    4. 处理回复\n5. 返回步骤2，或关闭套接字\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_256_0.png)\n\
    \n### 14.2.2 TCP通信\n\n图14.2展示了通过Wi-Fi链路的TCP通信：\n\n服务器\n\n1. 创建TCP套接字\n2. 将套接字绑定到服务器地址\n\
    3. 监听连接\n4. 接受连接\n5. 等待来自客户端的数据报包到达\n6. 处理数据报包\n7. 向客户端发送回复，或关闭套接字\n8. 返回步骤3（如果未关闭）\n\
    \n客户端\n\n1. 创建TCP套接字\n2. 连接到服务器\n3. 向服务器发送消息\n4. 等待接收来自服务器的响应\n5. 处理回复\n6. 返回步骤2，或关闭套接字\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_257_0.png)\n\n## 14.3 项目1 – 使用TCP/IP向智能手机发送文本消息\n\
    \n**描述：** 在本项目中，建立一个基于TCP/IP的通信与安卓智能手机。程序从键盘读取文本消息并发送到智能手机。本项目的目标是展示如何与安卓智能手机建立TCP/IP通信。\n\
    \n**背景信息：** 端口号范围从0到65,535。0到1023的数字是保留的，被称为知名端口。例如，端口23是Telnet端口，端口25是SMTP端口等。在本节中，你将在程序中使用端口号5000。\n\
    \n**框图：** 图14.3展示了项目框图，其中树莓派5和智能手机通过Wi-Fi路由器进行通信。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_258_0.png)\n\
    \n*图14.3 项目框图*\n\n**程序清单：** 在本项目中，树莓派5是服务器。图14.4展示了程序清单（**tcpserver.py**）。在程序开始时，创建一个TCP/IP套接字（**sock.SOCK_STREAM**），然后绑定到端口5000。程序监听连接。注意，服务器可以监听多个客户端，但当然，它一次只能与一个客户端通信。当客户端发起连接时，服务器接受该连接。然后服务器从键盘读取一条消息，并通过Wi-Fi链路将其发送给客户端。注意，**setsockopt()**语句确保程序可以再次使用，而无需等待30秒的套接字超时。\n\
    \n```\n#==========================================================\n#       使用TCP/IP发送文本消息\n\
    #       ================================\n#\n# 这是TCP/IP服务器程序。它从键盘接收文本消息，\n# 并通过Wi-Fi链路发送到安卓智能手机\n\
    #\n# 作者：Dogan Ibrahim\n# 文件：tcpserver.py\n# 日期：2023年10月\n#==========================================================\n\
    ```\n\n```\nimport socket\n\nsock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n\
    sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\nsock.bind((\"192.168.3.196\"\
    , 5000))\nsock.listen(1)\n\nclient, addr = sock.accept()            # 接受连接\nprint(\"\
    Connected to client: \", addr)    # 连接消息\n\nyn = 'y'\n\nwhile yn == 'y':\n   \
    \ msg = input(\"Enter your message: \")    # 读取消息\n    client.send(msg.encode('utf-8'))\
    \        # 发送消息\n\n    yn = input(\"Send more messages?: \")\n    yn = yn.lower()\n\
    \nprint(\"\\nClosing connection to client\")\nsock.close()\n```\n\n图14.4 程序清单\n\
    \n### 测试\n\n互联网上有许多免费的TCP应用程序可供智能手机使用。在本项目中，在安卓智能手机上使用了**TCP Client by JOY S.R.L.**应用程序。该应用程序可在**Play\
    \ Store**中免费获取（见图14.5）。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_259_0.png)\n\
    \n图14.5 项目中使用的应用程序\n\n程序运行如下：\n\n- 首先运行服务器程序：\n\n    ```\n    pi@raspberrypi:~\
    \ $ python tcpserver.py\n    ```\n\n- 运行安卓应用程序，并如图14.6所示进行配置（点击屏幕右上角的设置图标），其中192.168.3.196是树莓派5的IP地址。\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_260_0.png)\n\n图14.6 配置TCP Client应用程序\n\
    \n- 点击应用程序左上角的图标（未连接），通过TCP/IP连接到树莓派5。\n\n- 你应该会在树莓派屏幕上看到一条连接消息，以及远程安卓智能手机的IP地址。现在输入一条消息并按回车键。在此示例中，消息**HELLO\
    \ FROM RASPBERRY PI**被发送给客户端（图14.7）。图14.8显示了智能手机上显示的消息。\n\n```\nbash\npi@raspberrypi:~\
    \ $ python tcpserver.py\nConnected to client:  ('192.168.3.166', 35406)\nEnter\
    \ your message: HELLO FROM RASPBERRY PI\nSend more messages?: n\n\nClosing connection\
    \ to client\npi@raspberrypi:~ $\n```\n\n图14.7 在键盘上输入消息\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_260_1.png)\n\
    \n图14.8 智能手机上显示的消息"
