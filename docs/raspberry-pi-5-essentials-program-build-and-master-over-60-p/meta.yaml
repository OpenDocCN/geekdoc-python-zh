- img_proc: true
  md: 'The file sizes are as follows:


    | Quality level (-q setting) | Exact File size (bytes) | Approximate file size
    (MB) |

    |---|---|---|

    | 100 | 4,799,812 | 4.8 |

    | 50 | 4,149,210 | 4.2 |

    | 25 | 2,484,031 | 2.5 |

    | 10 | 739,408 | 0.74 |

    | 5 | 281,971 | 0.3 |


    It was observed by the author that there was not much noticeable change in the
    visible quality of the images at different quality levels. It is therefore recommended
    to take the picture at say 10% quality level (option **-q 10**) where the size
    of a file is around 0.74 MB. If **f** is how often we want to capture the images
    in minutes, and **d** is the total duration of the capturing process in minutes,
    then the required storage is, **s = 0.74d/f MB**. During this period, **n = d/f**
    images will be taken and also **n** files will be created. As an example, if we
    want to capture images every minute for the duration of 10 minutes, then the required
    storage will be s = 0.74 × 10/1 = 7.4 MB and 9 images will be taken with 9 files
    created.


    The required commands to start the time-lapse in this project are as follows.
    Images will be taken every minute for the duration of 10 minutes. A directory
    called **mypics** is created and all the created image files are stored in this
    directory with the filenames starting with **Mypics** and including a four-digit
    ascending number:


    ```

    pi@raspberrypi:~ $ **mkdir mypics**

    pi@raspberrypi:~ $ **cd mypics**

    pi@raspberrypi:~/mypics $ **libcamera-still -t 600000 -o Mypics%04d.jpg --timelapse
    60000 -q 10**

    ```


    Figure 16.4 shows the files created in directory **mypics**. The image files are
    created with the names such as **Mypics0000.jpg**, **Mypics0001.jpg**, **Mypics0002.jpg**,
    ... etc.


