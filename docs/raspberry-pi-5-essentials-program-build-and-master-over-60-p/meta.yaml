    \n图9.41 输出示例\n\n## 9.15 项目12 – 汽车倒车雷达\n\n**描述：** 这是一个倒车雷达项目，旨在帮助人们安全、轻松地停车。一对超声波发射/接收传感器安装在车辆的前后，用于感知与物体的距离，如果传感器距离前方物体过近，一个有源蜂鸣器会响起。在本项目中，安全距离假定为10厘米。\n\
