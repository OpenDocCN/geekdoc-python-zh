- img_proc: true
  md: "The block diagram and circuit diagram of the project are as in Figure 11.2\
    \ and Figure 11.3\n\n**Program Listing:** The frequency of the sine wave to be\
    \ generated is 100 Hz. This wave has a period of 10 ms, or 10,000 µs. If we assume\
    \ that the sine wave will consist of 100 samples, then each sample should be output\
    \ at 10,000/100 = 100 µs intervals. The sample values will be calculated using\
    \ the trigonometric **sin** function of Python.\n\nThe **sin** function will have\
    \ the format:\n\n$$\\sin\\left(\\frac{2\\pi \\cdot count}{T}\\right)$$\n\nwhere\
    \ T is the period of the waveform and is equal to 100 samples. Thus, the sine\
    \ wave is divided into 100 samples and each sample is output at 100 µs. The above\
    \ formula can be rewritten as:\n\n$$\\sin(0.0628 \\cdot count)$$\n\nIt is required\
    \ that the amplitude of the waveform should be 1.5 V. With a reference voltage\
    \ of +3.3 V and a 12-bit DAC converter (0 to 4095 quantization levels), 1.5 V\
    \ is equal to 1.5 × 4095/3.3, which is equal to 1861.3 (i.e. the amplitude). Thus,\
    \ we will multiply our sine function with the amplitude at each sample to give:\n\
    \n$$1861.3 \\cdot \\sin(0.0628 \\cdot count)$$\n\nThe D/A converter used in this\
    \ project is unipolar and cannot output negative values. Therefore, an offset\
    \ is added to the sine wave to shift it so that it is always positive. The offset\
    \ should be larger than the absolute value of the maximum negative value of the\
    \ sine wave, which is 1861.3 when the **sin** function above is equal to 1.5.\
    \ In this project, we are adding a 1.5 V offset which corresponds to a decimal\
    \ value of 1861.3 (i.e. the offset) at the DAC output. Thus, for each sample,\
    \ we will calculate and output the following value to the DAC:\n\n$$1861.3 + 1861.2\
    \ \\cdot \\sin(0.0628 \\cdot count)$$\n\nThe sine waveform values for a period\
    \ are obtained outside the program loop using the following statement. The list\
    \ **sins** contains all the 100 sine values of the waveform. The reason for calculating\
    \ these values outside the program loop is to minimize the time to calculate the\
    \ **sin** function:\n\n```\nfor i in range(100):\n    sins[i] = int(offset + amplitude\
    \ * sin(R*i))\n```\n\nwhere R is set to 0.0628"
