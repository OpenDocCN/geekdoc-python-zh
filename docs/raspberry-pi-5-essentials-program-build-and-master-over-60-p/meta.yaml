    **Background Information:** RC circuits are used in many radio and communications
    circuits. A typical RC transient circuit consists of a resistor in series with
    a capacitor, as shown in Figure 10.19. When the switch is closed, the voltage
    across the capacitor rises exponentially with a time constant, T = RC.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_188_1.png)


    Figure 10.19 Charging RC circuit


