    \ to 1.5x.\n\n`libcamera-still` is similar to `libcamera-jpeg`, but it supports\
    \ more of the legacy raspistill options. Some examples are:\n\n```\nlibcamera-still\
    \ -o test.jpg\n```\n\nimage is captured and saved in file **test.jpg**.\n\n```\n\
    libcamera-still -e bmp -o test.bmp\n```\n\nsaves the file as BMP format in file\
    \ **test.bmp**.\n\n```\nlibcamera-still -r -o test.jpg\n```\n\nsaves in raw format.\n\
    \n## 16.4 Project 2 – Building a time-lapse camera – Who is in my parking place?\n\
    \n**Description:** In this project, we have positioned our camera to take pictures\
    \ of our parking place. We will be taking still images every minute (60,000 ms)\
    \ for the duration of ten minutes (600,000 ms).\n\nThe stages in creating a time-lapse\
    \ camera session are as follows:\n\n- Fix the camera at the place of interest\n\
    - Take a picture of the object to make sure that it is in the field of view and\
    \ is in focus\n- Take pictures of the object at regular intervals\n- Combine the\
    \ pictures into a movie file\n- Play the movie file\n\n**Required Commands:**\
    \ In time-lapse camera sessions, you usually have to store large number of pictures\
    \ taken at regular intervals. Before doing this, you have to know the size of\
    \ a picture, how often the pictures will be taken, and the space available on\
    \ your storage device (e.g. the Raspberry Pi SD card). The author has taken a\
    \ number of 3280 × 2464 (8 megapixel) pictures of the same environment at different\
    \ quality levels using the following command:\n\n```\nlibcamera-still -t 600000\
    \ -o Mypics%d.jpg --timelapse 60000\n```\n\nThe file sizes are as follows:\n\n\
    | Quality level (-q setting) | Exact File size (bytes) | Approximate file size\
    \ (MB) |\n|---|---|---|\n| 100 | 4,799,812 | 4.8 |\n| 50 | 4,149,210 | 4.2 |\n\
    | 25 | 2,484,031 | 2.5 |\n| 10 | 739,408 | 0.74 |\n| 5 | 281,971 | 0.3 |\n\nIt\
    \ was observed by the author that there was not much noticeable change in the\
    \ visible quality of the images at different quality levels. It is therefore recommended\
    \ to take the picture at say 10% quality level (option **-q 10**) where the size\
    \ of a file is around 0.74 MB. If **f** is how often we want to capture the images\
    \ in minutes, and **d** is the total duration of the capturing process in minutes,\
    \ then the required storage is, **s = 0.74d/f MB**. During this period, **n =\
    \ d/f** images will be taken and also **n** files will be created. As an example,\
    \ if we want to capture images every minute for the duration of 10 minutes, then\
    \ the required storage will be s = 0.74 × 10/1 = 7.4 MB and 9 images will be taken\
    \ with 9 files created.\n\nThe required commands to start the time-lapse in this\
    \ project are as follows. Images will be taken every minute for the duration of\
    \ 10 minutes. A directory called **mypics** is created and all the created image\
    \ files are stored in this directory with the filenames starting with **Mypics**\
    \ and including a four-digit ascending number:\n\n```\npi@raspberrypi:~ $ mkdir\
    \ mypics\npi@raspberrypi:~ $ cd mypics\npi@raspberrypi:~/mypics $ libcamera-still\
    \ -t 600000 -o Mypics%04d.jpg --timelapse 60000 -q 10\n```\n\nFigure 16.4 shows\
    \ the files created in directory **mypics**. The image files are created with\
    \ the names such as **Mypics0000.jpg**, **Mypics0001.jpg**, **Mypics0002.jpg**,\
    \ ... etc.\n\n```\npi@raspberrypi:~/mypics $ ls\nMypics0000.jpg  Mypics0002.jpg\
    \  Mypics0004.jpg  Mypics0006.jpg  Mypics0008.jpg\nMypics0001.jpg  Mypics0003.jpg\
    \  Mypics0005.jpg  Mypics0007.jpg\npi@raspberrypi:~/mypics $ ls\n```\n\n*Figure\
    \ 16.4 Created image files*\n\nAfter all the still JPEG files have been created,\
    \ you may want to join the files together and create a video file. This can be\
    \ done in several ways. In this section, we shall be using the software called\
    \ **ffmpeg** which is already installed on Raspberry Pi 5.\n\nNow we can join\
    \ our JPEG files together into a video file. Enter the following commands to move\
    \ to the directory where the files are, and then join the still image files to\
    \ create the video file **Mytimelapse.mp4**:\n\n```\npi@raspberrypi:~ $ cd mypics\n\
    ```\n\n```\npi@raspberrypi:~/mypics $ ffmpeg -framerate 1 -i Mypics%04d.jpg -c:v\
    \ libx264 -r 30 Mytimelapse.mp4\n```\n\nThe above command takes all the input\
    \ images, **-i Mypics%04d.jpg**. This will search for the image with the lowest\
    \ digit and sets that as the starting image. It will then increment that number\
    \ by one and if the image exists, it will be added to the sequence. Option **-framerate\
    \ 1** is used to define how fast the pictures are read in, in this case, one picture\
    \ per second. Omitting the frame rate will default to 25. **-r 30** is the frame\
    \ rate of the output video. Again, it defaults to 25 if not defined. The **-c:v\
    \ libx264** specifies the codec to use to encode the video. **x264** is a library\
    \ used for encoding video streams into the **H.264/MPEG-4 AVC** compression format.\n\
    \nYou can play the output video (**Mytimelapse.mp4**) file by double-clicking\
    \ on it and selecting the **VLC media player** in your Desktop GUI. You can, if\
    \ you wish, copy the created video file to your PC after installing and using\
    \ the file copy software called **winSCP** on your PC. After the file is copied\
    \ to your PC, you can play it using various video player software.\n\nThis completes\
    \ the design of our time-lapse camera processing.\n\n## Scheduling the Time-lapse\n\
    \nThe process we have described to capture still time-lapse images requires the\
    \ Raspberry Pi 5 to be connected to a computer (or a monitor) so that the commands\
    \ can be issued from the command line. In this section, you will see how to schedule\
    \ the time-lapse process so that it starts automatically after the Raspberry Pi\
    \ 5 is powered up, without the need to connect a monitor or a computer. This can\
    \ be done using the software tool called **crontab** as described below.\n\nWith\
    \ the command **crontab** you can specify a list of tasks to be scheduled at specified\
