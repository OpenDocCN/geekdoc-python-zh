    \ |\n| 10 | 3.00 | | |\n\n项目的方框图和电路图如图11.2和图11.3所示。\n\n**程序清单：** 图11.11展示了程序清单（程序：**arbit.py**）。波形的采样点存储在一个名为**wave**的列表中。变量**sample**索引该列表，并将采样值发送到DAC。每个采样点的时间被指定为1毫秒。通过实验发现，由于DAC例程中的延迟，0.8毫秒的延迟给出了正确的结果。\n\
