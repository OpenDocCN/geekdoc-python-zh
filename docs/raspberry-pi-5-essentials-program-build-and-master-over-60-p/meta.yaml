    ## 9.13 项目 10 – 自动黄昏灯\n\n**描述：** 在本项目中，使用光敏电阻来感知黑暗，当环境光强度低于所需水平时，继电器被激活。可以将例如灯光连接到继电器上，以便在黄昏时自动开启。本项目的目标是展示如何在树莓派项目中使用光敏电阻，以及如何连接和激活继电器。\n\
