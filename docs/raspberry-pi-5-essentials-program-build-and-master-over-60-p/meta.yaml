- md: '## 2.6 Assigning a static IP address to your Raspberry Pi 5


    When you try to access your Raspberry Pi 5 remotely over your local network, it
    is possible that the IP address given by your Wi-Fi router can change from time
    to time. This is annoying as you have to find out the new IP address allocated
    to your Raspberry Pi. Without knowledge of the IP address, you cannot log in using
    SSH or VNC.


    In this section, you will learn how to fix your IP address so that it does not
    change between reboots. The steps are as follows:


    - Log in to your Raspberry Pi 5 via Putty

    - Check whether DHCP is active on your Raspberry Pi (it should normally be active):


    ```

    pi@raspberrypi:~ $ sudo service dhcpcd status

    ```


    If DHCP is not active, activate it by entering the following commands:


    ```

    pi@raspberrypi:~ $ sudo service dhcpcd start

    pi@raspberrypi:~ $ sudo systemctl enable dhcpcd

    ```


    - Find the IP address currently allocated to you by entering the command **ifconfig**
    or **hostname – I** (Figure 2.12). In this example, the IP address was: 192.168.1.251.
    We can use this IP address as our fixed address, since no other device on the
    network is currently using it.


    - Find the IP address of your router by entering the command **ip r** (Figure
    2.13). In this example, the IP address was: 192.168.1.254


    - Find the IP address of your DNS by entering the following command (Figure 2.14).
    This is usually the same as your router address:


    ```

    pi@raspberrypi:~ $ grep "nameserver" /etc/resolv.conf

    ```


    - Edit file **/etc/dhcpcd.conf** by entering the command:


    ```

    pi@raspberrypi:~ $ nano /etc/dhcpcd.conf

    ```


    - Add the following lines to the bottom of the file (these will be different for
    your router). If these lines already exist, remove the comment character ''#''
    at the beginning of the lines and change the lines as follows (you may notice
    that **eth0** for Ethernet is listed):


    ```

    interface wlan0

    static_routers=192.168.1.254

    static domain_name_servers=192.168.1.254

    static ip_address=192.168.1.251/24

    ```


    - Save the file by entering **CTRL + X** followed by **Y** and reboot your Raspberry
    Pi

    - In this example, the Raspberry Pi should reboot with the static IP address:
    192.168.1.251


    ## 2.7 Enabling Bluetooth


    In this section, you will see how to enable the Bluetooth on your Raspberry Pi
    5 so that it can communicate with other Bluetooth devices. The steps are given
    below:


    - Enable the Bluetooth on your other device

    - Click on the Bluetooth icon on your Raspberry Pi 5 at the top right-hand side,
    and select **Make Discoverable**. You should see the Bluetooth icon flashing

    - Select ''raspberrypi'' in the Bluetooth menu on your other device

    - Accept the pairing request on your Raspberry Pi 5

    - You should now see the message **Connected Successfully** on your Raspberry
    Pi 5 and you can exchange files between your other device and the Raspberry Pi
    computer.


    ## 2.8 Connecting the Raspberry Pi 5 to a wired network


    You may want to connect your Raspberry Pi 5 to a network through an Ethernet cable.
    The steps are as follows:


    **Step 1:** Connect a network cable between your Raspberry Pi 5 and your Wi-Fi
    router.


    **Step 2:** Connect the keyboard, mouse and monitor to your Raspberry Pi and power
    up as normal


    **Step 3:** Log in to the system by entering your username and password


    **Step 4:** Providing your network hub supports DHCP (nearly all network routers
    support DHCP), you will be connected automatically to the network and will be
    assigned a unique IP address within your network. Note that DHCP assigns IP addresses
    to newly connected devices.


    **Step 5:** Check to find out the IP address assigned to your Raspberry Pi 5 by
    the network router. Enter the command **ifconfig** as described earlier


    ### 2.8.1 Unable to connect to a wired network


    If you find out that you are not assigned an IP address by the DHCP server, possible
    causes are:


    - Your network cable is faulty

    - The network hub does not support DHCP

    - DHCP is not enabled on your Raspberry Pi, i.e. it may have been configured for
    a fixed IP address


    In most cases, it is very unlikely that the network cable is faulty. Also, most
    network hubs support the DHCP protocol. If you are having problems with the network,
    it is possible that your Raspberry Pi is not configured to accept DHCP issued
    addresses. The Raspberry Pi is normally configured to accept DHCP addresses, but
    it is possible that you have changed the configuration somehow.


    To resolve the wired network connectivity problem, follow the steps given below:


    **Step 1:** find out whether your Raspberry Pi is configured for DHCP or fixed
    IP addresses. Enter the following command:


    ```

    pi@raspberrypi ~$ cat /etc/network/interfaces

    ```


    If your Raspberry Pi is configured to use the DHCP protocol (which is normally
    the default configuration), the word **dhcp** should appear at the end of the
    following line:


    ```

    iface eth0 inet dhcp

    ```


    If, on the other hand, your Raspberry Pi is configured to use static addresses,
    then you should see the word **static** at the end of the following line:


    ```

    iface eth0 inet static

    ```


    **Step 2:** To use the DHCP protocol, edit file **interfaces** (e.g. using the
    **nano** text editor) and change the word **static** to **dhcp**. It is recommended
    to make a backup copy of the file interfaces before you change it:


    ```

    pi@raspberrypi ~$ sudo cp /etc/network/interfaces /etc/network/int.bac

    ```


    You should now restart your Raspberry Pi and an IP address will probably be assigned
    to your device.


    **Step 3:** To use static addressing, make sure that the word **static** appears
    as shown above. If not, edit file **interfaces** and change **dhcp** to **static**


    **Step 4:** You need to edit and add the required unique IP address, subnet mask
    and gateway addresses to file **interfaces** as in the following example (this
    example assumes that the required fixed IP address is 192.168.1.251, the subnet
    mask used in the network is 255.255.255.0, and the gateway address is 192.168.1.1):


    ```

    iface eth0 inet static

    address 192.168.1.251

    netmask 255.255.255.0

    gateway 192.168.1.1

    ```


    Save the changes and exit the editor. If you are using the **nano** editor, exit
    by pressing Ctrl+X, then enter Y to save the changes, and enter the filename to
    write to as **/etc/network/interfaces**.


    Restart your Raspberry Pi 5.


    ## 2.9 Installing the Raspberry Pi 5 Bookworm operating system on a blank microSD
    card


    If you have a pre-installed Raspberry Pi operating system Bookworm on a microSD
    card, then you can start using it as described earlier in this chapter. In this
    section, you will learn how to install the latest Bookworm operating system on
    a microSD card if you do not have a pre-installed card.


    The steps are as follows:


    - Insert a microSD card into your PC. You may need to use an SD card adapter

    - Go to the website: https://www.raspberrypi.com/software/

    - Click to download the **Raspberry Pi Imager**. At the time of writing this book,
    this file was called: **imager_1.7.5.exe**

    - Double click to start the imager program and click to install it

    - Click **Finish** to run the imager

    - Click **Operating System** and select the operating system at the top of the
    list as: **Raspberry Pi OS (64-bit)**. See Figure 2.15


    ## Chapter 2 • Installing the Raspberry Pi 5 Operating System


    - Click **Storage** and select the SD card storage

    - Click to open the settings (gear shape)

    - Click to enable SSH

    - Click to enable password authentication

    - Set username and password

    - Click to **Configure wireless LAN**

    - Click **Save**

    - Click **Write** to write the operating system to the microSD card

    - Wait until writing and verifying are finished (Figure 2.16)


    - Remove the microSD card and insert into your Raspberry Pi 5'
  mdcn: '## 2.6 为你的树莓派5分配静态IP地址


    当你尝试通过本地网络远程访问树莓派5时，Wi-Fi路由器分配的IP地址可能会不时变化。这很烦人，因为你必须找出分配给树莓派的新IP地址。不知道IP地址，你就无法使用SSH或VNC登录。


    在本节中，你将学习如何固定IP地址，使其在重启后不会改变。步骤如下：


    - 通过Putty登录你的树莓派5

    - 检查你的树莓派上DHCP是否激活（通常应该是激活的）：


    ```

    pi@raspberrypi:~ $ sudo service dhcpcd status

    ```


    如果DHCP未激活，请输入以下命令激活它：


    ```

    pi@raspberrypi:~ $ sudo service dhcpcd start

    pi@raspberrypi:~ $ sudo systemctl enable dhcpcd

    ```


    - 输入命令 **ifconfig** 或 **hostname – I** 查找当前分配给你的IP地址（图2.12）。在本例中，IP地址为：192.168.1.251。我们可以将此IP地址用作固定地址，因为网络上目前没有其他设备使用它。


    - 输入命令 **ip r** 查找路由器的IP地址（图2.13）。在本例中，IP地址为：192.168.1.254


    - 输入以下命令查找DNS的IP地址（图2.14）。这通常与路由器地址相同：


    ```

    pi@raspberrypi:~ $ grep "nameserver" /etc/resolv.conf

    ```


    - 输入以下命令编辑文件 **/etc/dhcpcd.conf**：


    ```

    pi@raspberrypi:~ $ nano /etc/dhcpcd.conf

    ```


    - 在文件底部添加以下行（你的路由器地址会有所不同）。如果这些行已存在，请删除行首的注释字符''#''，并按如下方式修改行（你可能会注意到列出了以太网的 **eth0**）：


    ```

    interface wlan0

    static_routers=192.168.1.254

    static domain_name_servers=192.168.1.254

    static ip_address=192.168.1.251/24

    ```


    - 输入 **CTRL + X**，然后输入 **Y** 保存文件，并重启你的树莓派

    - 在本例中，树莓派应使用静态IP地址重启：192.168.1.251


    ## 2.7 启用蓝牙


    在本节中，你将了解如何在树莓派5上启用蓝牙，以便它可以与其他蓝牙设备通信。步骤如下：


    - 在你的其他设备上启用蓝牙

    - 点击树莓派5右上角的蓝牙图标，选择 **Make Discoverable**。你应该会看到蓝牙图标闪烁

    - 在你的其他设备的蓝牙菜单中选择 ''raspberrypi''

    - 在你的树莓派5上接受配对请求

    - 你现在应该在树莓派5上看到 **Connected Successfully** 的消息，并且可以在你的其他设备和树莓派计算机之间交换文件。


    ## 2.8 将树莓派5连接到有线网络


    你可能想通过以太网线将树莓派5连接到网络。步骤如下：


    **步骤1：** 在你的树莓派5和Wi-Fi路由器之间连接一根网线。


    **步骤2：** 将键盘、鼠标和显示器连接到你的树莓派，并正常开机


    **步骤3：** 输入你的用户名和密码登录系统


    **步骤4：** 如果你的网络集线器支持DHCP（几乎所有网络路由器都支持DHCP），你将自动连接到网络，并被分配一个网络内的唯一IP地址。请注意，DHCP会为新连接的设备分配IP地址。


    **步骤5：** 检查网络路由器分配给你的树莓派5的IP地址。如前所述，输入命令 **ifconfig**


    ### 2.8.1 无法连接到有线网络


    如果你发现DHCP服务器没有为你分配IP地址，可能的原因是：


    - 你的网线有故障

    - 网络集线器不支持DHCP

    - 你的树莓派上未启用DHCP，即它可能被配置为使用固定IP地址


    在大多数情况下，网线故障的可能性很小。此外，大多数网络集线器都支持DHCP协议。如果你遇到网络问题，可能是你的树莓派未配置为接受DHCP分配的地址。树莓派通常配置为接受DHCP地址，但你可能以某种方式更改了配置。


    要解决有线网络连接问题，请按照以下步骤操作：


    **步骤1：** 查明你的树莓派是配置为使用DHCP还是固定IP地址。输入以下命令：


    ```

    pi@raspberrypi ~$ cat /etc/network/interfaces

    ```


    如果你的树莓派配置为使用DHCP协议（这通常是默认配置），单词 **dhcp** 应出现在以下行的末尾：


    ```

    iface eth0 inet dhcp

    ```


    另一方面，如果你的树莓派配置为使用静态地址，那么你应该在以下行的末尾看到单词 **static**：


    ```

    iface eth0 inet static

    ```


    **步骤2：** 要使用DHCP协议，请编辑文件 **interfaces**（例如使用 **nano** 文本编辑器），并将单词 **static** 更改为
    **dhcp**。建议在更改文件interfaces之前制作备份副本：


    ```

    pi@raspberrypi ~$ sudo cp /etc/network/interfaces /etc/network/int.bac

    ```


    你现在应该重启你的树莓派，设备可能会被分配一个IP地址。


    **步骤3：** 要使用静态寻址，请确保单词 **static** 如上所示出现。如果没有，请编辑文件 **interfaces** 并将 **dhcp**
    更改为 **static**


    **步骤4：** 你需要编辑文件 **interfaces** 并添加所需的唯一IP地址、子网掩码和网关地址，如下例所示（此示例假设所需的固定IP地址为192.168.1.251，网络中使用的子网掩码为255.255.255.0，网关地址为192.168.1.1）：


    ```

    iface eth0 inet static

    address 192.168.1.251

    netmask 255.255.255.0

    gateway 192.168.1.1

    ```


    保存更改并退出编辑器。如果你使用的是 **nano** 编辑器，请按Ctrl+X退出，然后输入Y保存更改，并输入要写入的文件名 **/etc/network/interfaces**。


    重启你的树莓派5。


    ## 2.9 在空白microSD卡上安装树莓派5 Bookworm操作系统


    如果你有一张预装了树莓派操作系统Bookworm的microSD卡，那么你可以按照本章前面的描述开始使用它。在本节中，你将学习如何在没有预装卡的情况下，在microSD卡上安装最新的Bookworm操作系统。


    步骤如下：


    - 将microSD卡插入你的电脑。你可能需要使用SD卡适配器

    - 访问网站：https://www.raspberrypi.com/software/

    - 点击下载 **Raspberry Pi Imager**。在撰写本书时，此文件名为：**imager_1.7.5.exe**

    - 双击启动imager程序并点击安装

    - 点击 **Finish** 运行imager

    - 点击 **Operating System** 并在列表顶部选择操作系统：**Raspberry Pi OS (64-bit)**。参见图2.15


    ## 第2章 • 安装树莓派5操作系统


    - 点击 **Storage** 并选择SD卡存储

    - 点击打开设置（齿轮形状）

    - 点击启用SSH

    - 点击启用密码认证

    - 设置用户名和密码

    - 点击 **Configure wireless LAN**

    - 点击 **Save**

    - 点击 **Write** 将操作系统写入microSD卡

    - 等待写入和验证完成（图2.16）


    - 取出microSD卡并插入你的树莓派5'
