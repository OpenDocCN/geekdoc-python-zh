    \ between two files line by line\n\n## Removing a Directory\n\nA directory can\
    \ be removed using the **rmdir** command:\n\n```\npi@raspberrypi: ~$ **rmdir Music**\n\
    pi@raspberrypi: ~$\n```\n\n## Re-directing the Output\n\nThe greater sign > can\
    \ be used to redirect the output of a command to a file. For example, we can redirect\
    \ the output of the **ls** command to a file called **lstest.txt**:\n\n```\npi@raspberrypi:\
    \ ~$ **ls > lstest.txt**\npi@raspberrypi: ~$\n```\n\nThe **cat** command can be\
    \ used to display the contents of a file:\n\n```\npi@raspberrypi: ~$ **cat mytestfile.txt**\n\
    This is a file\nThis is line 2\npi@raspberrypi: ~$\n```\n\nUsing two greater signs\
    \ '>>' adds to the end of a file.\n\n## Writing to the Screen or to a File\n\n\
    The **echo** command can be used to write to the screen. It can be used to perform\
    \ simple mathematical operations if the numbers and the operation are enclosed\
    \ in two brackets, preceded by a $ character:\n\n```\npi@raspberrypi: ~$ **echo\
    \ $((5*6))**\n30\npi@raspberrypi: ~$\n```\n\nThe echo command can also be used\
    \ to write a line of text to a file. An example is shown below:\n\n```\npi@raspberrypi:\
    \ ~$ **echo a line of text > lin.dat**\npi@raspberrypi: ~$ **cat lin.dat**\na\
    \ line of text\npi@raspberrypi: ~$\n```\n\n## Matching a String\n\nThe grep command\
    \ can be used to match a string in a file. An example is given below, assuming\
    \ that the file lin.dat contains sting a line of text. Notice that the matched\
    \ word is shown in bold:\n\n```\npi@raspberrypi: ~$ grep line lin.dat\na line\
    \ of text\npi@raspberrypi: ~$\n```\n\n## Head and Tail Commands\n\nThe head command\
    \ can be used to display the first 10 lines of a file. The format of this command\
    \ is as follows:\n\n```\npi@raspberrypi: ~$ head mytestfile.txt\n........................................\n\
    ........................................\npi@raspberrypi: ~$\n```\n\nSimilarly,\
    \ the tail command is used to display the last 10 lines of a file. The format\
    \ of this command is as follows:\n\n```\npi@raspberrypi: ~$ tail mytestfile.txt\n\
    ........................................\n........................................\n\
    pi@raspberrypi: ~$\n```\n\nThe **which** command displays the location of an executable\
    \ program. For example, the location of the python program can be found as follows:\n\
    \n```\npi@raspberrypi: ~$ which python\n/usr/bin/python\npi@raspberrypi: ~$\n\
    ```\n\n## Super User Commands\n\nSome of the commands are privileged and only\
    \ the authorized persons can use them. Inserting the word **sudo** at the beginning\
    \ of a command gives us the authority to use the command without having to log\
    \ in as an authorized user.\n\n## What software is installed on my Raspberry Pi\
    \ 5\n\nTo find out what software is installed on your Raspberry Pi 5, enter the\
    \ following command. You should get several pages of display:\n\n```\npi@raspberrypi:\
    \ ~$ dpkg -l\n........................................\n........................................\n\
    pi@raspberrypi: ~$\n```\n\nYou can also find out if a certain software package\
    \ is already installed on our computer. An example is given below which checks\
    \ whether software called **xpdf** (PDF reader) is installed. In this example,\
    \ **xpdf** is installed and the details of this software are displayed:\n\nRaspberry\
    \ Pi 5 Essentials\n\n```\npi@raspberrypi: ~$ dpkg --s xpdf\nPackage: xpdf\nStatus:\
    \ install ok installed\nPriority: optional\nSection: text\nInstalled-Size: 395\n\
    ........................................\n........................................\n\
    pi@raspberrypi: ~$\n```\n\nIf the software is not installed, you get a message\
    \ similar to the following (assuming we are checking to see if a software package\
    \ called bbgd is installed):\n\n```\npi@raspberrypi: ~$ dpkg -s bbgd\ndpkg-query:\
    \ package 'bbgd' is not installed and no information is available\n........................................\n\
    ........................................\npi@raspberrypi: ~$\n```\n\n## 3.3.3\
    \ Resource monitoring on the Raspberry Pi 5\n\nSystem monitoring is an important\
    \ topic for managing usage of your Raspberry Pi. One of the most useful system\
    \ monitoring commands is the top, which displays the current usage of system resources\
    \ and displays which processes are running and how much memory and CPU time they\
    \ are consuming.\nFigure 3.15 shows a typical system resource display obtained\
    \ by entering the following command (only part of the display is shown, Enter\
    \ q to exit):\n\n```\npi@raspberrypi: ~$ top\npi@raspberrypi: ~$\n```\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_43_0.png)\n\
    \nSome of the important points in Figure 3.15 are summarized below (for lines\
    \ 1 to 5 of the display):\n\n- There are a total of 138 processes in the system\n\
    - Currently, only one process is running, 1 process is sleeping, and 0 processes\
    \ are stopped\n- The percentage of CPU utilization is 0.0 'us' for user applications\
    \ (us)\n- The percentage of CPU utilization for system applications is 0.0 (sy)\n\
    - There are no processes requiring more or less priority (ni)\n- 100% of the time\
    \ the CPU is idle (id)\n- There are no processes waiting for I/O completion (wa)\n\
    - There are no processes waiting for hardware interrupts (hi)\n- There are no\
    \ processes waiting for software interrupts (si)\n- There is no time reserved\
    \ for a hypervisor (st)\n- The total usable memory is 8053 bytes, of which 247\
    \ bytes are in use, 7589 bytes are free, and 303 bytes are used by buffers/cache\n\
    - Line 5 displays the swap space usage\n\nThe process table gives the following\
    \ information for all the processes loaded to the system:\n\n- PID: the process\
    \ ID number\n- USER: owner of the process\n- PR: priority of the process\n- NI:\
    \ the nice value of the process\n- VIRT: the amount of virtual memory used by\
    \ the process\n- RES: size of the resident memory\n- SHR: shared memory the process\
    \ is using\n- S: process status (sleeping, running, zombie)\n- %CPU: the percentage\
    \ of CPU consumed\n- %MEM: percentage of RAM used\n- TIME+: total CPU time the\
    \ task used\n- COMMAND: The actual name of the command\n\nThe command **htop**\
    \ is similar to the **top** command, except it has more features and is more user-friendly.\n\
    \nThe **ps** command can be used to list all the processes used by the current\
    \ user. An example is shown in Figure 3.16.\n\n```\npi@raspberrypi:~ $ ps\n  PID\
    \ TTY          TIME CMD\n  971 pts/0    00:00:00 bash\n 1372 pts/0    00:00:00\
    \ ps\npi@raspberrypi:~ $\n```\n\nFigure 3.16 Command: **ps**\n\nCommand **ps –ef**\
    \ gives a lot more information about the processes running in the system.\n\n\
    ## Killing a process\n\nThere are many options for killing (or stopping) a process.\
    \ A process can be killed by specifying its PID and using the following command:\n\
    \n```\npi@raspberrypi:~$ kill -9 <PID>\n```\n\n## Disk (microSD card) usage\n\n\
    The disk free command `df` can be used to display the disk usage statistics. An\
    \ example is shown in Figure 3.17. option `-h` displays in human-readable form.\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_45_0.png)\n\nCommand `free` shows how\
    \ much memory is used and the amount of free memory.\n\n## 3.3.4 Shutting Down\n\
    \nAlthough you can disconnect the power supply from your Raspberry Pi 5 when you\
    \ finish working with it, it is not recommended since there are many processes\
    \ running on the system, and it is possible to corrupt the file system. It is\
    \ much better to shut down the system in an orderly manner.\n\nThe following command\
    \ will stop all the processes and make the file system safe, and then turn off\
    \ the system safely:\n\n```\npi@raspberrypi:~$ sudo halt\n```\n\nThe following\
    \ command stops and then restarts the system:\n\n```\npi@raspberrypi:~$ sudo reboot\n\
    ```\n\nThe system can also be shut down and then restarted after a time by entering\
    \ the following command. Optionally, a shutdown message can be displayed if desired:\n\
    \n```\npi@raspberrypi:~$ shutdown -r <time> <message>\n```\n\nTo shutdown at 1:55\
    \ AM:\n\n```\npi@raspberrypi:~$ sudo shutdown -h 01:55:\n```\n\nEnter the following\
    \ command to shut down now:\n\n```\npi@raspberrypi: ~$ sudo shutdown now\n```\n\
    \nBroadcast message from root @raspberrypi on pts/1 (Tue 2023-10-03 12:03:00 BST)\n\
    \nThe system will power off now!\n\n> **Note:** Raspberry Pi 5 includes a power\
    \ switch at its side. When the Raspberry Pi is ON, a single press brings the shutdown/logout\
    \ menu. Another press triggers a safe shutdown, which is a standby with the Raspberry\
    \ Pi consuming about 1.4 W. A press of the button will start up the Raspberry\
    \ Pi 5.\n\n## 3.3.5 Networking\n\nSome useful networking commands are:\n\n**ifconfig:**\
    \ check the IP address of your Raspberry Pi\n\n**iwconfig:** check which network\
    \ the Raspberry Pi is using. An example is shown in Figure 3.18. Here, the SSID\
    \ of the Wi-Fi adapter used is BTHub5-6SPN\n\n```\npi@raspberrypi:~ $ iwconfig\n\
    lo        no wireless extensions.\n\neth0      no wireless extensions.\n\nwlan0\
    \     IEEE 802.11  ESSID:\"BTHub5-6SPN\"\n          Mode:Managed  Frequency:5.18\
    \ GHz  Access Point: 4C:1B:86:B5:BA:7B\n          Bit Rate=433.3 Mb/s   Tx-Power=31\
    \ dBm\n          Retry short limit:7   RTS thr:off   Fragment thr:off\n      \
    \    Power Management:on\n          Link Quality=45/70  Signal level=-65 dBm\n\
    \          Rx invalid nwid:0  Rx invalid crypt:0  Rx invalid frag:0\n        \
    \  Tx excessive retries:3  Invalid misc:0   Missed beacon:0\n\npi@raspberrypi:~\
    \ $\n```\n\n*Figure 3.18 Command iwconfig*\n\n**ping:** used to test the availability\
    \ of a network device. An example is shown in Figure 3.19\n\n```\npi@raspberrypi:~\
    \ $ ping 192.168.1.251\nPING 192.168.1.251 (192.168.1.251) 56(84) bytes of data.\n\
    64 bytes from 192.168.1.251: icmp_seq=1 ttl=64 time=0.033 ms\n64 bytes from 192.168.1.251:\
    \ icmp_seq=2 ttl=64 time=0.014 ms\n64 bytes from 192.168.1.251: icmp_seq=3 ttl=64\
    \ time=0.011 ms\n```\n\n*Figure 3.19 Command ping*\n\n**wget:** this command is\
    \ used to download a file from the web and saves the file in the current directory.\n\
    \n**hostname – I:** shows the IP address of the Raspberry Pi\n\nThe command **vcgencmd\
    \ measure_temp** displays the CPU temperature as shown in Figure 3.20."
  mdcn: "## 文件差异\n\n命令 **diff** <file1> <file2> 逐行显示两个文件之间的差异。\n\n## 删除目录\n\n可以使用\
    \ **rmdir** 命令删除目录：\n\n```\npi@raspberrypi: ~$ **rmdir Music**\npi@raspberrypi:\
    \ ~$\n```\n\n## 重定向输出\n\n大于号 `>` 可用于将命令的输出重定向到文件。例如，我们可以将 **ls** 命令的输出重定向到名为 **lstest.txt**\
    \ 的文件：\n\n```\npi@raspberrypi: ~$ **ls > lstest.txt**\npi@raspberrypi: ~$\n```\n\
    \n**cat** 命令可用于显示文件的内容：\n\n```\npi@raspberrypi: ~$ **cat mytestfile.txt**\nThis\
    \ is a file\nThis is line 2\npi@raspberrypi: ~$\n```\n\n使用两个大于号 `>>` 会将内容追加到文件末尾。\n\
    \n## 写入屏幕或文件\n\n**echo** 命令可用于写入屏幕。如果数字和运算符包含在两个括号内，并以 `$` 字符开头，它可用于执行简单的数学运算：\n\
    \n```\npi@raspberrypi: ~$ **echo $((5*6))**\n30\npi@raspberrypi: ~$\n```\n\necho\
    \ 命令也可用于将一行文本写入文件。示例如下：\n\n```\npi@raspberrypi: ~$ **echo a line of text > lin.dat**\n\
    pi@raspberrypi: ~$ **cat lin.dat**\na line of text\npi@raspberrypi: ~$\n```\n\n\
    ## 匹配字符串\n\ngrep 命令可用于在文件中匹配字符串。下面给出一个示例，假设文件 lin.dat 包含字符串 \"a line of text\"\
    。请注意，匹配的单词以粗体显示：\n\n```\npi@raspberrypi: ~$ grep line lin.dat\na line of text\n\
    pi@raspberrypi: ~$\n```\n\n## Head 和 Tail 命令\n\nhead 命令可用于显示文件的前 10 行。此命令的格式如下：\n\
    \n```\npi@raspberrypi: ~$ head mytestfile.txt\n........................................\n\
    ........................................\npi@raspberrypi: ~$\n```\n\n类似地，tail\
    \ 命令用于显示文件的最后 10 行。此命令的格式如下：\n\n```\npi@raspberrypi: ~$ tail mytestfile.txt\n\
    ........................................\n........................................\n\
    pi@raspberrypi: ~$\n```\n\n**which** 命令显示可执行程序的位置。例如，可以按如下方式查找 python 程序的位置：\n\
    \n```\npi@raspberrypi: ~$ which python\n/usr/bin/python\npi@raspberrypi: ~$\n\
    ```\n\n## 超级用户命令\n\n某些命令是特权命令，只有授权人员才能使用。在命令开头插入 **sudo** 一词，即可获得使用该命令的权限，而无需以授权用户身份登录。\n\
    \n## 我的树莓派 5 上安装了什么软件\n\n要查明您的树莓派 5 上安装了哪些软件，请输入以下命令。您应该会看到几页的显示内容：\n\n```\npi@raspberrypi:\
    \ ~$ dpkg -l\n........................................\n........................................\n\
    pi@raspberrypi: ~$\n```\n\n您还可以查明某个特定软件包是否已安装在我们的计算机上。下面给出一个示例，检查名为 **xpdf**（PDF\
    \ 阅读器）的软件是否已安装。在此示例中，**xpdf** 已安装，并显示了该软件的详细信息：\n\nRaspberry Pi 5 Essentials\n\
    \n```\npi@raspberrypi: ~$ dpkg --s xpdf\nPackage: xpdf\nStatus: install ok installed\n\
    Priority: optional\nSection: text\nInstalled-Size: 395\n........................................\n\
    ........................................\npi@raspberrypi: ~$\n```\n\n如果软件未安装，您将收到类似以下的消息（假设我们正在检查名为\
    \ bbgd 的软件包是否已安装）：\n\n```\npi@raspberrypi: ~$ dpkg -s bbgd\ndpkg-query: package\
    \ 'bbgd' is not installed and no information is available\n........................................\n\
    ........................................\npi@raspberrypi: ~$\n```\n\n## 3.3.3\
    \ 树莓派 5 上的资源监控\n\n系统监控是管理树莓派使用情况的重要主题。最有用的系统监控命令之一是 `top`，它显示系统资源的当前使用情况，并显示哪些进程正在运行以及它们消耗了多少内存和\
    \ CPU 时间。\n图 3.15 显示了通过输入以下命令获得的典型系统资源显示（仅显示了部分内容，按 `q` 退出）：\n\n```\npi@raspberrypi:\
    \ ~$ top\npi@raspberrypi: ~$\n```\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_43_0.png)\n\
    \n图 3.15 中的一些要点总结如下（针对显示的第 1 至 5 行）：\n\n- 系统中总共有 138 个进程\n- 当前，只有一个进程正在运行，1 个进程处于睡眠状态，0\
    \ 个进程已停止\n- 用户应用程序 (us) 的 CPU 利用率百分比为 0.0\n- 系统应用程序的 CPU 利用率百分比为 0.0 (sy)\n- 没有需要更高或更低优先级的进程\
    \ (ni)\n- CPU 100% 的时间处于空闲状态 (id)\n- 没有进程等待 I/O 完成 (wa)\n- 没有进程等待硬件中断 (hi)\n-\
    \ 没有进程等待软件中断 (si)\n- 没有为虚拟机监控程序保留的时间 (st)\n- 总可用内存为 8053 字节，其中 247 字节正在使用，7589\
    \ 字节空闲，303 字节被缓冲区/缓存使用\n- 第 5 行显示交换空间使用情况\n\n进程表给出了加载到系统中的所有进程的以下信息：\n\n- PID：进程\
    \ ID 号\n- USER：进程所有者\n- PR：进程优先级\n- NI：进程的 nice 值\n- VIRT：进程使用的虚拟内存量\n- RES：驻留内存的大小\n\
    - SHR：进程正在使用的共享内存\n- S：进程状态（睡眠、运行、僵尸）\n- %CPU：消耗的 CPU 百分比\n- %MEM：使用的 RAM 百分比\n\
    - TIME+：任务使用的总 CPU 时间\n- COMMAND：命令的实际名称\n\n命令 **htop** 与 **top** 命令类似，只是它具有更多功能且更用户友好。\n\
    \n**ps** 命令可用于列出当前用户使用的所有进程。示例如图 3.16 所示。\n\n```\npi@raspberrypi:~ $ ps\n  PID\
    \ TTY          TIME CMD\n  971 pts/0    00:00:00 bash\n 1372 pts/0    00:00:00\
    \ ps\npi@raspberrypi:~ $\n```\n\n图 3.16 命令：**ps**\n\n命令 **ps –ef** 提供了有关系统中运行进程的更多信息。\n\
    \n## 终止进程\n\n终止（或停止）进程有许多选项。可以通过指定其 PID 并使用以下命令来终止进程：\n\n```\npi@raspberrypi:~$\
    \ kill -9 <PID>\n```\n\n## 磁盘（microSD 卡）使用情况\n\n磁盘空闲命令 `df` 可用于显示磁盘使用统计信息。示例如图\
    \ 3.17 所示。选项 `-h` 以人类可读的形式显示。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_45_0.png)\n\
    \n命令 `free` 显示已使用多少内存以及可用内存量。\n\n## 3.3.4 关机\n\n虽然您可以在完成树莓派 5 的工作后断开电源，但不建议这样做，因为系统上运行着许多进程，可能会损坏文件系统。最好以有序的方式关闭系统。\n\
    \n以下命令将停止所有进程并确保文件系统安全，然后安全地关闭系统：\n\n```\npi@raspberrypi:~$ sudo halt\n```\n\n\
    以下命令停止然后重新启动系统：\n\n```\npi@raspberrypi:~$ sudo reboot\n```\n\n也可以通过输入以下命令来关闭系统并在一段时间后重新启动。如果需要，可以选择显示关机消息：\n\
    \n```\npi@raspberrypi:~$ shutdown -r <time> <message>\n```\n\n要在凌晨 1:55 关机：\n\n\
    ```\npi@raspberrypi:~$ sudo shutdown -h 01:55:\n```\n\n输入以下命令立即关机：\n\n```\npi@raspberrypi:\
    \ ~$ sudo shutdown now\n```\n\nBroadcast message from root @raspberrypi on pts/1\
    \ (Tue 2023-10-03 12:03:00 BST)\n\nThe system will power off now!\n\n> **注意：**\
    \ 树莓派 5 的侧面包含一个电源开关。当树莓派开启时，单次按下会带来关机/注销菜单。再次按下会触发安全关机，此时树莓派处于待机状态，功耗约为 1.4 W。按下按钮将启动树莓派\
    \ 5。\n\n## 3.3.5 网络\n\n一些有用的网络命令是：\n\n**ifconfig：** 检查树莓派的 IP 地址\n\n**iwconfig：**\
    \ 检查树莓派正在使用哪个网络。示例如图 3.18 所示。此处，使用的 Wi-Fi 适配器的 SSID 是 BTHub5-6SPN\n\n```\npi@raspberrypi:~\
    \ $ iwconfig\nlo        no wireless extensions.\n\neth0      no wireless extensions.\n\
    \nwlan0     IEEE 802.11  ESSID:\"BTHub5-6SPN\"\n          Mode:Managed  Frequency:5.18\
    \ GHz  Access Point: 4C:1B:86:B5:BA:7B\n          Bit Rate=433.3 Mb/s   Tx-Power=31\
    \ dBm\n          Retry short limit:7   RTS thr:off   Fragment thr:off\n      \
    \    Power Management:on\n          Link Quality=45/70  Signal level=-65 dBm\n\
    \          Rx invalid nwid:0  Rx invalid crypt:0  Rx invalid frag:0\n        \
    \  Tx excessive retries:3  Invalid misc:0   Missed beacon:0\n\npi@raspberrypi:~\
    \ $\n```\n\n*图 3.18 命令 iwconfig*\n\n**ping：** 用于测试网络设备的可用性。示例如图 3.19 所示\n\n```\n\
    pi@raspberrypi:~ $ ping 192.168.1.251\nPING 192.168.1.251 (192.168.1.251) 56(84)\
    \ bytes of data.\n64 bytes from 192.168.1.251: icmp_seq=1 ttl=64 time=0.033 ms\n\
    64 bytes from 192.168.1.251: icmp_seq=2 ttl=64 time=0.014 ms\n64 bytes from 192.168.1.251:\
    \ icmp_seq=3 ttl=64 time=0.011 ms\n```\n\n*图 3.19 命令 ping*\n\n**wget：** 此命令用于从网络下载文件，并将文件保存在当前目录中。\n\
    \n**hostname – I：** 显示树莓派的 IP 地址\n\n命令 **vcgencmd measure_temp** 显示 CPU 温度，如图\
    \ 3.20 所示。"
