- md: "## 13.3 Project 2 – Security lock with keypad and LCD\n\nDescription: This\
    \ is an electronic lock project where a relay is used to open a door. A 4-digit\
    \ secret code is set up in the program. The user has to enter the secret code\
    \ for the door to open.\n\n**Block diagram:** Figure 13.9 shows the block diagram\
    \ of the project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_252_0.png)\n\nFigure\
    \ 13.9 Block diagram\n\n**Circuit diagram:** The circuit diagram is shown in Figure\
    \ 13.10. The LCD is connected as in the previous LCD-based projects. The keypad\
    \ is connected as in the previous project. A relay is connected to GPIO 21 (pin\
    \ 40) of the Raspberry Pi 5.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_252_1.png)\n\
    \nFigure 13.10 Circuit diagram\n\n**Program listing:** Figure 13.11 shows the\
    \ program listing (**lock.py**). At the beginning of the program, the LCD is initialized.\
    \ The secret code is set to '1357'. The program then displays **Code:** and expects\
    \ the user to enter the correct code. If the correct code is entered, the message\
    \ **Door Opened** is displayed and the relay is turned ON for 20 seconds. After\
    \ this time, the relay is deactivated. If the wrong code is entered, the message\
    \ **Error** is displayed for 5 seconds and the user is asked to enter the correct\
    \ code again.\n\n# Raspberry Pi 5 Essentials\n\n```\n#-----------------------------------------------------------------------\n\
    #\n#           KEYPAD OPERATED LOCK\n#           ====================\n# In this\
    \ program a door (or a safe) is opened via a relay.\n# The user is required to\
    \ enter the correct secret code for\n# the door to open. Once opened, the door\
    \ stays open for\n# 20 seconds\n#\n# Program: lock.py\n# Date    : October, 2023\n\
    # Author  : Dogan Ibrahim\n#-----------------------------------------------------------------------\n\
    from time import sleep\nfrom lcd_api import LcdApi\nfrom i2c_lcd import I2cLcd\n\
    from keypadfuncs import GetChar\nfrom gpiozero import OutputDevice\n\nRelay =\
    \ OutputDevice(21)\nRelay.off()\n\nI2C_ADDR = 0x27\nI2C_NUM_ROWS = 2\nI2C_NUM_COLS\
    \ = 16\n\nmylcd = I2cLcd(1,I2C_ADDR,I2C_NUM_ROWS,I2C_NUM_COLS)\n\nmylcd.clear()\
    \                       # clear LCD\n\nCodea = \"1\"                         #\
    \ Secret code\nCodeb = \"3\"\nCodec = \"5\"\nCoded = \"7\"\n\nwhile True:\n  \
    \  mylcd.move_to(0,0)\n    mylcd.putstr(\"Code: \")\n    a = GetChar()       \
    \            # First no\n    b = GetChar()                   # Second no\n   \
    \ c = GetChar()                   # Third no\n    d = GetChar()              \
    \     # Fourth no\n\n    if (a == Codea and b == Codeb and c == Codec and d ==\
    \ Coded):\n        mylcd.clear()\n        mylcd.putstr(\"Door Opened\")\n```\n\
    \nFigure 13.11 Program listing\n\n# Importing the keypad functions in a program\n\
    \nIt is easier to import the keypad function under a file instead of writing them\
    \ every time you want to use these functions. This can easily be done by collecting\
    \ all the functions in a file and then importing that file at the beginning of\
    \ your Python programs. Figure 13.7 shows a program called **keypadfuncs.py**\
    \ which can be imported into your programs. It is important that this file should\
    \ be in your default directory (**/home/pi**). Note that the keypad rows and columns\
    \ must be connected to the same Raspberry Pi 5 GPIO pins as given in this project.\n\
    \n```\n#-----------------------------------------------------------------\n# \
    \                  4 x 4 KEYPAD FUNCTIONS\n#                   =====================\n\
    #\n# Import this file in your Python programs\n#\n# Program: keypadfuncs.py\n\
    # Date    : October, 2023\n# Author  : Dogan Ibrahim\n#-----------------------------------------------------------------\n\
    from gpiozero import OutputDevice,DigitalInputDevice\nfrom time import sleep\n\
    \n#\n# ROW pins\n#\nROW1 = 4\nROW2 = 17\nROW3 = 27\nROW4 = 22\n\n#\n# COLUMN pins\n\
    #\nCOL1 = 10\nCOL2 = 9\nCOL3 = 11\nCOL4 = 0\n\n#\n# ROWS as outputs\n#\nrow1 =\
    \ OutputDevice(ROW1)\nrow2 = OutputDevice(ROW2)\nrow3 = OutputDevice(ROW3)\nrow4\
    \ = OutputDevice(ROW4)\nrow1.on()\nrow2.on()\nrow3.on()\nrow4.on()\n\n#\n# COLUMNS\
    \ as inputs and (pulled HIGH in hardware)\n#\ncol1 = DigitalInputDevice(COL1,\
    \ bounce_time = 1)\ncol2 = DigitalInputDevice(COL2, bounce_time = 1)\ncol3 = DigitalInputDevice(COL3,\
    \ bounce_time = 1)\ncol4 = DigitalInputDevice(COL4, bounce_time = 1)\n\n#\n# This\
    \ function sets a row  to 0 and then finds out which\n# key is pressed on a column\n\
    #\ndef ReadRow(line, char):\n    x = 'E'\n    line.off()\n    if col1.value ==\
    \ 0:\n        x = char[0]\n    if col2.value == 0:\n        x = char[1]\n    if\
    \ col3.value == 0:\n        x = char[2]\n    if col4.value == 0:\n        x =\
    \ char[3]\n    line.on()\n    return x\n\n#\n# This function waits until a character\
    \ is pressed on keypad\n#\ndef GetChar():\n    r = 'E'\n    while r == 'E':\n\
    \        a = ReadRow(row1, [\"1\",\"2\",\"3\",\"A\"])\n        b = ReadRow(row2,\
    \ [\"4\",\"5\",\"6\",\"B\"])\n        c = ReadRow(row3, [\"7\",\"8\",\"9\",\"\
    C\"])\n        d = ReadRow(row4, [\"*\",\"0\",\"#\",\"D\"])\n        if a != 'E':\n\
    \            r = a\n        elif b !='E':\n            r = b\n        elif c !=\
    \ 'E':\n            r = c\n        elif d != 'E':\n            r = d\n       \
    \ sleep(0.1)\n    return r\n```\n\nFigure 13.7 Program: keypadfuncs.py\n\nFigure\
    \ 13.8 shows a program (**keypadtest.py**) that imports the keypad functions.\n\
    \n```\n#-------------------------------------------------------------------\n\
