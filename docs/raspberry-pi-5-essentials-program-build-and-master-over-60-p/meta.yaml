    # The SPI Bus


    As it was discussed in an earlier chapter, the Serial Peripheral Interface (SPI)
    bus consists of two data wires and one clock wire. Additionally, a chip enable
    (CE or CS) connection is used to select a slave in a multi-slave system. The wires
    used are:


    **MOSI (or SDI):** **M**aster **O**ut **S**lave **I**n. This signal is output
    from the master and is input to a slave


    **MISO:** **M**aster **I**n **S**lave **O**ut. This signal is output from a slave
    and input to a master


    **SCLK (or SCK):** The clock, controlled by the master


    **CE (r CS):** Chip **E**nable (slave select)


    The following pins are the SPI bus pins on Raspberry Pi 4:


    | GPIO pin | SPI | Physical pin no |

    | :--- | :--- | :--- |

    | GPIO 10 | MOSI (SPI0) | 19 |

    | GPIO 9 | MISO (SPI0) | 21 |

    | GPIO 11 | SCLK (SPI0) | 23 |

    | GPIO 8 | CE0 (SPI0) | 24 |

    | GPIO 7 | CE1 (SPI0) | 26 |

    | GPIO 20 | MOSI (SPI1) | 38 |

    | GPIO 19 | MISO (SPI1) | 35 |

    | GPIO 21 | SCLK (SPI1) | 40 |

    | GPIO 18 | CE0 (SPI1) | 12 |

    | GPIO 17 | CE1 (SPI1) | 11 |


    The SPI bus must be enabled using the **raspi-config** console command on the
    Raspberry Pi before it can be used.


