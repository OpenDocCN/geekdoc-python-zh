    **Background Information:** An RLC circuit (Figure 10.27) is a second-order system
    that can have 3 modes of operation depending on the values of the components when
    a DC voltage is applied across its terminals.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_194_0.png)


    Figure 10.27 RLC circuit


    Underdamped mode: This mode is identified when the following condition holds true:


    $$R < 2\sqrt{\frac{L}{C}}$$ (10.5)


    When DC voltage is applied to the circuit, the current in the circuit is given
    by the following formula:


    $$i(t) = \frac{Vin}{WL\sqrt{1-\xi^2}} e^{-\xi Wt} sin(Wt\sqrt{1-\xi^2})$$ (10.6)


    Where,


    $$W = \frac{1}{\sqrt{LC}}$$ and, $$\xi = \frac{R}{2}\sqrt{\frac{C}{L}} < 1$$ (10.7)


    **Critically damped mode:** In this mode of operation, the following is satisfied:


    $$R = 2\sqrt{\frac{L}{C}}$$ (10.8)


    When DC voltage is applied to the circuit, the current in the circuit is given
    by the following formula:


    $$i(t) = \frac{Vin}{L} te^{-Wt}$$ (10.9)


    Where,


    $$W = \frac{1}{\sqrt{LC}}$$ and, $$\xi = \frac{R}{2}\sqrt{\frac{C}{L}} = 1$$ (10.10)


    **Overdamped mode:** In this mode of operation, the following is satisfied:


    $$R > 2\sqrt{\frac{L}{C}}$$ (10.11)'
