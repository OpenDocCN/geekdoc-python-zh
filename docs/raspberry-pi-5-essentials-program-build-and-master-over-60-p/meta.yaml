    Area of %s is %f\" %(s, area))\n\nFigure 7.35 Program listing\n\nAn example run\
    \ of the program is shown in Figure 7.36.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_105_0.png)\n\
    \nFigure 7.36 Example output\n\n## 7.27 Recursive functions\n\nRecursive functions\
    \ are functions that call themselves either directly or indirectly, and such functions\
    \ are supported by Python. Although the topic of recursive functions is an advanced\
    \ topic, an example is given in Figure 7.37 to illustrate the principles of such\
    \ functions. This recursive function implements the factorial operation. Detailed\
    \ analysis of recursive functions is beyond the scope of this book.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_105_1.png)\n\
    \nFigure 7.37 Recursive factorial function\n\n## 7.28 Exceptions\n\nThere may\
    \ be major errors in our programs, such as dividing by zero, file privilege error,\
    \ and so on. Normally, when Python encounters such errors, it cannot handle them\
    \ and the program crashes.\n\nOne way to handle such errors orderly and avoid\
    \ crashes is to use exception handling in our programs. The basic method is that\
    \ whenever an error occurs, the program detects this error and takes appropriate\
    \ measures to handle the error and continue to execute normally. Exception handling\
    \ is also useful if we wish to terminate a running program in an orderly manner,\
    \ for example to shut down any input-output operations when the program is terminated\
    \ asynchronously by the user (e.g. by pressing the Ctrl+C key).\n\nThe statements\
    \ try and except are used to handle unexpected errors or terminations in our programs.\
    \ The general format of exception handling is as follows:\n\n```\ntry:\n    Normal\
    \ program statements\n    Normal program statements\nexcept condition 1:\n   \
    \ if condition 1 type error occurs, then execute this block of code\n    ....................\n\
    \    ....................\nexcept condition 2:\n    if condition 2 type error\
    \ occurs, then execute this block of code\n    ....................\n    ....................\n\
    else:\n    if there are no errors detected, then execute this block of code\n\
    \    ....................\n    ....................\n```\n\nWe can use the except\
    \ statement with no condition to handle any type of exception. Some of the commonly\
    \ used exceptions are:\n\n- **exception EOFError:** end-of-file condition is reached\
    \ while reading data\n- **exception ImportError:** import statement could not\
    \ load a module\n- **exception IndexError:** sequence subscript is out of range\n\
    - **exception KeyError:** a dictionary key is not found in the set of existing\
    \ keys\n- **exception KeyboardInterrupt:** user hit the interrupt key (normally\
    \ the Ctrl+C or Delete key)\n- **exception MemoryError:** operation ran out of\
    \ memory\n- **exception OverFlowError:** arithmetic operation resulted in overflow\n\
    - **exception RuntimeError:** an error is detected that does not fall in any other\
    \ categories\n- **exception ValueError:** an operation or function receives an\
    \ argument that has the right type but an inappropriate value\n- **exception ZeroDivisionError:**\
    \ a division by zero occurred\n\nSome examples of using exceptions in programs\
    \ are given below.\n\n### Example 13\n\nWrite a program to wait for an input from\
    \ the keyboard. Terminate the program orderly when the Ctrl+C keys are pressed\
    \ on the keyboard.\n\n### Solution 13\n\nFigure 7.38 shows the program listing\
    \ (program: except1.py). Exception KeyboardInterrupt is used in this program.\
    \ The message End of Program is displayed when Ctrl+C key combination is pressed\
    \ on the keyboard.\n\n```\n#==================================================\n\
    #       KeyboardInterrupt EXCEPTION\n#\n# This program detects the keyboard entry\
    \ Ctrl+C and\n# the program is terminated orderly after the message\n# End of\
    \ Program is displayed\n#\n# Author : Dogan Ibrahim\n# File   : except1.py\n#\
