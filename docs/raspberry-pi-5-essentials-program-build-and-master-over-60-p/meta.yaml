    \nIt is required that the amplitude of the waveform should be 1.5 V. With a reference\
    \ voltage of +3.3 V and a 12-bit DAC converter (0 to 4095 quantization levels),\
    \ 1.5 V is equal to 1.5 × 4095/3.3, which is equal to 1861.3 (i.e. the amplitude).\
    \ Thus, we will multiply our sine function with the amplitude at each sample to\
    \ give:\n\n$$1861.3 \\cdot \\sin(0.0628 \\cdot count)$$\n\nThe D/A converter used\
    \ in this project is unipolar and cannot output negative values. Therefore, an\
    \ offset is added to the sine wave to shift it so that it is always positive.\
    \ The offset should be larger than the absolute value of the maximum negative\
    \ value of the sine wave, which is 1861.3 when the **sin** function above is equal\
    \ to 1.5. In this project, we are adding a 1.5 V offset which corresponds to a\
    \ decimal value of 1861.3 (i.e. the offset) at the DAC output. Thus, for each\
    \ sample, we will calculate and output the following value to the DAC:\n\n$$1861.3\
    \ + 1861.2 \\cdot \\sin(0.0628 \\cdot count)$$\n\nThe sine waveform values for\
    \ a period are obtained outside the program loop using the following statement.\
    \ The list **sins** contains all the 100 sine values of the waveform. The reason\
    \ for calculating these values outside the program loop is to minimize the time\
    \ to calculate the **sin** function:\n\n```\nfor i in range(100):\n    sins[i]\
    \ = int(offset + amplitude * sin(R*i))\n```\n\nwhere R is set to 0.0628"
- md: "## Chapter 12 • Using the Sense HAT\n\n### 12.1 Overview\n\nThe Sense HAT is\
    \ a small plug-in board developed by Raspberry Pi in collaboration with the UK\
    \ Space Agency and the European Space Agency (ESA). The board includes a number\
    \ of sensors and that's why it is called 'Sense'. The word 'HAT' stands for 'Hardware\
    \ Attached on Top' to indicate that the board is attached or plugged in on top\
    \ of the Raspberry Pi. Sense HAT gives the flexibility to carry out various environmental\
    \ measurements using its built-in sensors, and the board was specially developed\
    \ for the Astro Pi Challenge and competition. An emulator-based version of the\
    \ Sense HAT is also available to enable students to carry out experiments without\
    \ having the physical board.\n\nThe Sense HAT board has the following features:\n\
    \n- 8 × 8 RGB LED matrix, having 15-bit colour resolution\n- Five-button joystick\
    \ with left, right, up, down, and enter movements\n- Gyroscope (angular rate sensor):\
    \ ±245/500/2000 dps\n- Accelerometer (linear acceleration sensor): ±2/4/8/16 G\n\
    - Magnetometer (magnetic sensor): ±4/8/12/16 gauss\n- Barometer: 260-1260 hPa\n\
    - Temperature sensor (with barometer): accuracy ±2°C in the 0–65°C range\n- Relative\
    \ humidity sensor: accuracy ±4.5% in the 20–80% range\n- Temperature sensor (with\
    \ humidity): accuracy ±0.5°C in the 15–40°C range\n- Graphics controller chip\n\
    \n### 12.2 The Sense HAT interface\n\nThe Sense HAT board (Figure 12.1) consists\
    \ of 7 main components and an LED matrix. The components on the board are controlled\
    \ via the I²C bus interface. The following are the main components on the board:\n\
    \n| Component | I²C bus address | Function |\n| :--- | :--- | :--- |\n| HTS221\
    \ | 0x5F | humidity sensor |\n| LPS254H | 0x5C | Pressure/temperature sensor |\n\
    | LSM9DS1 | 0x1C,0x6A | Accelerometer+magnetometer |\n| SKRHABE010 | - | joystick\
    \ |\n| LED2472G | 0x46 | LED matrix controller |\n| LED matrix | - | - |\n| ATTINY88\
    \ | - | Microchip microcontroller |\n\nThe Sense HAT board is normally plugged\
    \ into the 40-way connector of the Raspberry Pi. To interface external components\
    \ to the Raspberry Pi in addition to the Sense HAT board, you need to connect\
    \ the Sense HAT to the Raspberry Pi using either a ribbon cable or jumper wires\
    \ so that other pins of the Raspberry Pi can be accessed. Additionally, if you\
    \ are using an active cooler on your Raspberry Pi 5 then it is not possible to\
    \ connect the Sense HAT to your board unless you use a ribbon cable or 2×20 pin\
    \ header extension. Therefore, it is useful to know which pins of the Sense HAT\
    \ board are used by Raspberry Pi 5, and which pins are free so that you can make\
    \ connections to the Sense HAT using jumper wires.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_219_0.png)\n\
    \nFigure 12.1 The Sense HAT board\n\nIn addition to the I²C control lines, the\
    \ ATTINY88 microcontroller on the board can be programmed via the SPI bus control\
    \ lines (MOSI, MISO, SCK, CE0) provided on the board.\n\nThe following pins are\
    \ used by the Sense HAT 40-way connector:\n\n| Pin number | Raspberry Pi 5 port\
    \ | Function |\n| :--- | :--- | :--- |\n| 3 | GPIO2 | SDA (I²C) |\n| 5 | GPIO3\
    \ | SCL (I²C) |\n| 1 | +3.3 V | power |\n| 19 | GPIO10 | MOSI (SPI) |\n| 21 |\
    \ GPIO9 | MISO (SPI) |\n| 23 | GPIO11 | SCK (SPI) |\n| 24 | GPIO8 | CE0 (SPI)\
    \ |\n| 9 | GND | power ground |\n| 2 | +5 V | power |\n| 16 | GPIO23 | INT |\n\
    | 18 | GPIO24 | INT |\n| 22 | GPIO25 | PROG |\n| 27 | ID_SD | EEPROM |\n| 28 |\
    \ ID_SC | EEPROM |\n\nThe Sense HAT board can be connected to your Raspberry Pi\
    \ 5 using only the following 9 pins of the 40-way connector:\n\n| Sense HAT pin\
    \ | Raspberry Pi 5 Pin | Function |\n| :--- | :--- | :--- |\n| 3 | 3 (GPIO2) |\
    \ SDA (I²C) |\n| 5 | 5 (GPIO3) | SCL (I²C) |\n| 1 | 1 (+3.3 V) | power |\n| 9\
    \ | 9 (GND) | power ground |\n| 2 | 2 (+5 V) | power |\n| 16 | 16 (GPIO23) | joystick\
    \ |\n| 18 | 18 (GPIO24) | joystick |\n| 27 | 27 (ID_SD) | EEPROM |\n| 28 | 28\
    \ (ID_SC) | EEPROM |\n\n> **Note:** You can also plug in the Sense HAT board directly\
    \ on top of your Raspberry Pi 5 board instead of making the above connections\
    \ provided the GPIO pins are available (e.g. you are not using a Raspberry Pi\
    \ active cooler)\n\n### 12.3 Programming the Sense HAT\n\nSense HAT is installed\
    \ by default on your latest Raspberry Pi 5 SD card. You may, however, enter the\
    \ following command to install the latest version of the Sense HAT (at the time\
    \ of writing this book, the latest version was: 1.4):\n\n```\npi@raspberrypi:~\
    \ $ sudo apt-get install sense-hat\n```\n\nBefore developing a project using the\
    \ Sense HAT board, the Sense HAT library must be imported into your Python program\
    \ and also the **sense** object must be created at the beginning of the program.\
    \ i.e. the following two statements must be included at the beginning of your\
    \ programs:\n\n```\nfrom sense_hat import SenseHat\nsense = SenseHat()\n```\n\n\
    The remainder part of this chapter is devoted to developing simple projects with\
    \ the Sense HAT. In all the projects, the Sense HAT was connected to the Raspberry\
    \ Pi 5 using jumper wires as described earlier.\n\n### 12.4 Project 1 – Displaying\
    \ text on Sense HAT\n\n**Description:** In this project, you will learn how to\
    \ display as well as scroll text messages on Sense HAT. The statement **show_message**\
    \ is used to scroll a text message. In the following code, the message **Sense\
    \ HAT** is scrolled on the LED matrix. Notice that the message is displayed only\
    \ once:\n\n```\n>>> from sense_hat import SenseHat\n>>> sense = SenseHat()\n>>>\
    \ sense.show_message(\"Sense HAT\")\n```\n\nIf you get an error message saying\
    \ that the **RPi-Sense FB device cannot be detected**, then do the following:\n\
    \n- pi@raspberrypi:~ $ sudo nano /boot/config.txt\n- go to the end of the file\
    \ and enter the following statement:\n  dtoverlay=rpi-sense"
  mdcn: "## 第12章 • 使用 Sense HAT\n\n### 12.1 概述\n\nSense HAT 是由树莓派与英国航天局及欧洲航天局（ESA）合作开发的一款小型插件板。该板包含多个传感器，因此得名“Sense”（感知）。单词“HAT”代表“Hardware\
    \ Attached on Top”（顶部附加硬件），表明该板是附加或插在树莓派顶部的。Sense HAT 提供了使用其内置传感器进行各种环境测量的灵活性，该板是专门为\
    \ Astro Pi 挑战赛和竞赛而开发的。此外，还提供了一个基于模拟器的 Sense HAT 版本，使学生无需物理板即可进行实验。\n\nSense HAT\
    \ 板具有以下特性：\n\n- 8 × 8 RGB LED 矩阵，具有 15 位色彩分辨率\n- 五向摇杆，支持左、右、上、下和确认操作\n- 陀螺仪（角速率传感器）：±245/500/2000\
    \ dps\n- 加速度计（线性加速度传感器）：±2/4/8/16 G\n- 磁力计（磁传感器）：±4/8/12/16 高斯\n- 气压计：260-1260\
    \ hPa\n- 温度传感器（与气压计集成）：在 0–65°C 范围内精度为 ±2°C\n- 相对湿度传感器：在 20–80% 范围内精度为 ±4.5%\n\
    - 温度传感器（与湿度传感器集成）：在 15–40°C 范围内精度为 ±0.5°C\n- 图形控制器芯片\n\n### 12.2 Sense HAT 接口\n\
    \nSense HAT 板（图 12.1）由 7 个主要组件和一个 LED 矩阵组成。板上的组件通过 I²C 总线接口进行控制。以下是板上的主要组件：\n\n\
    | 组件 | I²C 总线地址 | 功能 |\n| :--- | :--- | :--- |\n| HTS221 | 0x5F | 湿度传感器 |\n| LPS254H\
    \ | 0x5C | 压力/温度传感器 |\n| LSM9DS1 | 0x1C,0x6A | 加速度计+磁力计 |\n| SKRHABE010 | - |\
    \ 摇杆 |\n| LED2472G | 0x46 | LED 矩阵控制器 |\n| LED 矩阵 | - | - |\n| ATTINY88 | - |\
    \ 微芯微控制器 |\n\nSense HAT 板通常插入树莓派的 40 针连接器。若要在 Sense HAT 板之外将外部组件连接到树莓派，您需要使用排线或跳线将\
    \ Sense HAT 连接到树莓派，以便访问树莓派的其他引脚。此外，如果您在树莓派 5 上使用主动散热器，则除非使用排线或 2×20 针排针延长线，否则无法将\
    \ Sense HAT 连接到您的板上。因此，了解 Sense HAT 板上哪些引脚被树莓派 5 使用，哪些引脚空闲，以便使用跳线连接 Sense HAT\
    \ 是很有用的。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_219_0.png)\n\n图 12.1 Sense\
    \ HAT 板\n\n除了 I²C 控制线外，板上的 ATTINY88 微控制器还可以通过板上提供的 SPI 总线控制线（MOSI、MISO、SCK、CE0）进行编程。\n\
    \nSense HAT 40 针连接器使用以下引脚：\n\n| 引脚号 | 树莓派 5 端口 | 功能 |\n| :--- | :--- | :--- |\n\
    | 3 | GPIO2 | SDA (I²C) |\n| 5 | GPIO3 | SCL (I²C) |\n| 1 | +3.3 V | 电源 |\n| 19\
    \ | GPIO10 | MOSI (SPI) |\n| 21 | GPIO9 | MISO (SPI) |\n| 23 | GPIO11 | SCK (SPI)\
    \ |\n| 24 | GPIO8 | CE0 (SPI) |\n| 9 | GND | 电源地 |\n| 2 | +5 V | 电源 |\n| 16 |\
    \ GPIO23 | INT |\n| 18 | GPIO24 | INT |\n| 22 | GPIO25 | PROG |\n| 27 | ID_SD\
    \ | EEPROM |\n| 28 | ID_SC | EEPROM |\n\nSense HAT 板可以仅使用 40 针连接器的以下 9 个引脚连接到您的树莓派\
    \ 5：\n\n| Sense HAT 引脚 | 树莓派 5 引脚 | 功能 |\n| :--- | :--- | :--- |\n| 3 | 3 (GPIO2)\
    \ | SDA (I²C) |\n| 5 | 5 (GPIO3) | SCL (I²C) |\n| 1 | 1 (+3.3 V) | 电源 |\n| 9 |\
    \ 9 (GND) | 电源地 |\n| 2 | 2 (+5 V) | 电源 |\n| 16 | 16 (GPIO23) | 摇杆 |\n| 18 | 18\
    \ (GPIO24) | 摇杆 |\n| 27 | 27 (ID_SD) | EEPROM |\n| 28 | 28 (ID_SC) | EEPROM |\n\
    \n> **注意：** 如果 GPIO 引脚可用（例如，您没有使用树莓派主动散热器），您也可以将 Sense HAT 板直接插在树莓派 5 板的顶部，而不是进行上述连接。\n\
    \n### 12.3 编程 Sense HAT\n\nSense HAT 默认安装在您最新的树莓派 5 SD 卡上。但是，您可以输入以下命令来安装最新版本的\
    \ Sense HAT（在撰写本书时，最新版本为：1.4）：\n\n```\npi@raspberrypi:~ $ sudo apt-get install\
    \ sense-hat\n```\n\n在使用 Sense HAT 板开发项目之前，必须将 Sense HAT 库导入您的 Python 程序，并且必须在程序开头创建\
    \ **sense** 对象。即，您的程序开头必须包含以下两条语句：\n\n```\nfrom sense_hat import SenseHat\nsense\
    \ = SenseHat()\n```\n\n本章的剩余部分致力于使用 Sense HAT 开发简单项目。在所有项目中，Sense HAT 均使用跳线连接到树莓派\
    \ 5，如前所述。\n\n### 12.4 项目 1 – 在 Sense HAT 上显示文本\n\n**描述：** 在本项目中，您将学习如何在 Sense\
    \ HAT 上显示和滚动文本消息。语句 **show_message** 用于滚动文本消息。在以下代码中，消息 **Sense HAT** 在 LED 矩阵上滚动。请注意，该消息仅显示一次：\n\
    \n```\n>>> from sense_hat import SenseHat\n>>> sense = SenseHat()\n>>> sense.show_message(\"\
    Sense HAT\")\n```\n\n如果您收到错误消息，提示 **RPi-Sense FB device cannot be detected**，则执行以下操作：\n\
    \n- pi@raspberrypi:~ $ sudo nano /boot/config.txt\n- 转到文件末尾并输入以下语句：\n  dtoverlay=rpi-sense"
