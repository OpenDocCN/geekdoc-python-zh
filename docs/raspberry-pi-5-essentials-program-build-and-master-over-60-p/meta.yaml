    # 7.24 Trigonometric functions


    Python supports numerous trigonometric functions. The arguments to trigonometric
    functions must be in radians. The **math** library must be imported into the program
    before these functions can be used:


    +   - sin(x) trigonometric sine

    - cos(x) trigonometric cosine

    - tan(x) trigonometric tangent

    - asin(x) trigonometric arc sin

    - atan(x) trigonometric arc tangent

    - atan2(y, x) trigonometric atan(y/x)

    - degrees(x) convert degrees into radians

    - radians(x) convert radians into degrees


    Some examples of using the trigonometric functions are given in Figure 7.18.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_92_1.png)


    # 7.25 User-defined functions


    Functions are like small programs within a program. We can use functions to break
    up a complex program into several manageable sections, where each section can
    be implemented as a function. Functions enable us to reuse parts of our programs.
    For example, we can create a function to calculate the cube-root of a number and
    then call this function from different parts of our program. Another advantage
    of using functions is that they make it easier to maintain and update our programs.'
  - "[PAGE 93]\n\nA function that we create can be called from anywhere in a program.\
    \ Functions have their own variables and their own commands. As we have seen in\
    \ earlier parts of this chapter, Python has many built-in functions for various\
    \ operations such as arithmetic, trigonometric, string manipulation and so on.\
    \ User-defined functions are created by programmers. In this section, we shall\
    \ be looking at how functions can be created and used in our programs.\n\nA user-defined\
    \ function consists of the following:\n\n+   - Functions begin with the keyword\
    \ **def**, followed by the function name, and round brackets, followed by a colon\
    \ sign.\n- Input arguments to the function must be placed inside the brackets\
    \ at the beginning of the function definition.\n- The body of a function must\
    \ be indented with the same number of spaces on the left-hand side\n- An optional\
    \ text message can be displayed at the first line of a function to describe what\
    \ the function does.\n- A function must be terminated with the return statement\n\
    \nAn example function, named **Mult** is given below. This function takes two\
    \ numbers first and second as its arguments, multiplies them, and returns the\
    \ result:\n\n```\ndef Mult(first, second):\n    \"This is a simple multiplication\
    \ function\"\n    result = first * second\n    return result\n```\n\nA function\
    \ is called from the main program by specifying the name of the function and enclosing\
    \ any arguments in a pair of brackets. For example, to call the above function\
    \ to multiply numbers 5 and 3 and sore the result in a variable called 'a', we\
    \ include the following statement in our program:\n\n```\na = Mult(5, 3)\n```\n\
    \nWe can also call a function by specifying the keyword arguments. i.e.:\n\n```\n\
    a = Mult(first = 5, second = 3)\n```\n\nFigure 7.19 shows the above example in\
    \ a Python program.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_93_0.png)"
