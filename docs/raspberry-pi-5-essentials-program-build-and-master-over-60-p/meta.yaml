    \n![](img/4c39fa287d846ab9ea3e468319162ce0_284_2.png)\n\n图 14.37 以阶梯形式显示压力\n\n\
    # Raspberry Pi 5 基础\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_285_0.png)\n\n\
    图 14.38 添加标题和 x 轴标签\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_285_1.png)\n\n\
    图 14.39 以时钟格式显示当前温度\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_285_2.png)\n\n\
    图 14.40 以数字格式显示当前温度\n\n# 第 14 章 • 通过 Wi-Fi 通信\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_286_0.png)\n\
    \n图 14.41 从网站显示图表\n\n# 第 15 章 • 通过蓝牙通信\n\n## 15.1 概述\n\n在上一章中，您学习了如何编写程序使用 Wi-Fi\
    \ 并通过 UDP 和 TCP 协议在局域网上与其他设备通信。在本章中，您将开发使用蓝牙通信的程序。\n\n蓝牙是一种短距离通信技术，通常用于与其他设备通信，主要针对物联网应用而开发。如今所有智能手机都支持通过蓝牙进行通信。蓝牙工作在\
    \ 2.4 GHz，数据速率低于 Wi-Fi。蓝牙的安全性不如 Wi-Fi，但更易于使用。与 Wi-Fi 相比，蓝牙的功耗更低，范围也比 Wi-Fi 短。蓝牙是一种基于数据包的协议，采用主从架构，一个主设备最多可以与七个从设备通信。蓝牙的有效范围取决于传播条件、天线配置、电源条件、材料覆盖等因素。大多数蓝牙应用用于室内，因为墙壁会导致信号衰减，从而缩短范围。\n\
    \nRaspberry Pi 5 支持经典蓝牙和低功耗蓝牙（BLE）。BLE 旨在降低功耗，同时提供合理的范围。大多数智能手机，包括 Android、iOS、Windows\
    \ Phone、Blackberry、macOS 等，都支持 BLE。BLE 使用与经典蓝牙和双模设备相同的 2.4 GHz 射频，因此可以共享同一根天线。经典蓝牙可以快速处理大量数据，而\
    \ BLE 则是为处理少量数据而开发的。\n\n## 15.2 项目 1 – 与智能手机交换文本\n\n**描述：** 在此项目中，在 Raspberry\
    \ Pi 5 和 Android 智能手机之间建立经典蓝牙通信。两个设备之间交换文本消息。\n\n**框图：** 图 15.1 显示了项目的框图。\n\n\
    ![](img/4c39fa287d846ab9ea3e468319162ce0_287_0.png)\n\n*图 15.1 项目的框图*"
