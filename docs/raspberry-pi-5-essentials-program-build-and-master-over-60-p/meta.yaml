    # The BME280 sensor module


    The BME280 module (Figure 10.31) is a low-cost sensor developed for measuring
    the ambient temperature, atmospheric pressure, and the humidity. This module operates
    with the I²C (or SPI) bus interface and has the pins SDA, SCL, Vin, and GND. The
    basic specifications of this module are:


    +   - Operating voltage: 1.2 to 3.6 V

    - Interface I²C or SPI

    - Current consumption: 1.8 µA

    - Humidity sensor response time: 1 s

    - Humidity sensor accuracy: ±3%

    - Pressure sensor range: 300 to 1100 hPa

    - Temperature range: -40 to +85ºC


    ![](img/4c39fa287d846ab9ea3e468319162ce0_198_1.png)


    Figure 10.31 The BME280 sensor module


    **Circuit diagram:** The project circuit diagram is shown in Figure 10.32. The
    module is connected to Raspberry Pi SDA (pin 3) and SCL (pin 5) pins. +3.3 V power
    is applied from pin 1.'
