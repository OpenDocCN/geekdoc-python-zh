    # 7.28 Exceptions


    There may be major errors in our programs, such as dividing by zero, file privilege
    error, and so on. Normally, when Python encounters such errors, it cannot handle
    them and the program crashes.


    One way to handle such errors orderly and avoid crashes is to use exception handling
    in our programs. The basic method is that whenever an error occurs, the program
    detects this error and takes appropriate measures to handle the error and continue
    to execute normally. Exception handling is also useful if we wish to terminate
    a running program in an'
