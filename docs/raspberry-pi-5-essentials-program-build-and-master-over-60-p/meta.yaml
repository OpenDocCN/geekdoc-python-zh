    **Circuit diagram:** The circuit diagram of the project is shown in Figure 8.4.
    A small LED is connected to port pin GPIO 17 (pin 11) of the Raspberry Pi 5 through
    a current limiting resistor. The value of the current limiting resistor is calculated
    as follows:


    The output high voltage of a GPIO pin is 3.3 V. The voltage across an LED is approximately
    1.8 V. The current through the LED depends upon the type of LED used and the amount
    of required brightness. Assuming that we are using a small LED, we can assume
    a forward LED current of about 3 mA. Then, the value of the current limiting resistor
    is:


    R = (3.3 – 1.8) / 0.003 = 500 Ω. We can choose a 470 Ω resistor.


    In Figure 8.4 the LED is operated in current sourcing mode where a high output
    from the GPIO pin drives the LED. The LED can also be operated in current sinking
    mode, where the other end of the LED is connected to +3.3 V supply and not to
    the ground. In current sinking mode, the LED is turned ON when the GPIO pin is
    at logic low.


