    Figure 9.13 shows the program listing (**voltmeter.py**). The function **get_adc_data**
    is used to read the analog data, where the channel number (channel_no) is specified
    in the function argument as 0 or 1. Notice that we have to send the start bit,
    followed by the SGL/DIFF and ODD/SIGN bits and the MSBF bit to the chip.


    It is recommended to send leading zeroes on the input line before the start bit.
    This is often done when using microcontroller-based systems that must send 8 bits
    at a time.


    The following data can be sent to the ADC (SGL/DIFF = 1 and ODD/SIGN = channel_no)
    as bytes with leading zeroes for more stable clock cycle. The general data format
    is:


    ```

    0000 000S DCM0 0000 0000 0000

    ```


    Where, S = start bit, D = SGL/DIFF bit, C = ODD/SIGN bit, M = MSBF bit


    For channel 0: 0000 0001 1000 0000 0000 0000 (0x01, 0x80, 0x00)


    For channel 1: 0000 0001 1100 0000 0000 0000 (0x01, 0xC0, 0x00)


    Notice that the second byte can be sent by adding 2 to the channel number (to
    make it 2 or 3) and then shifting 6 bits to the left as shown above to give 0x80
    or 0xC0.


    The chip returns 24-bit data (3 bytes) and we must extract the correct 10-bit
    ADC data from these 24 bits. The 24-bit data is in the following format (''X''
    is don''t care bit):


    ```

    XXXX XXXX XXXX DDDD DDDD DDXX

    ```


    Assuming that the returned data is stored in 24-bit variable ADC, we have:


    ```

    ADC[0] = "XXXX XXXX"

    ADC[1] = "XXXX DDDD"

    ADC[2] = "DDDD DDXX"

    ```


    Thus, we can extract the 10-bit ADC data with the following operations:


    ```

    (ADC[2] >> 2)          so, low byte = ''00DD DDDD''

    and

    (ADC[1] & 15) << 6)    so, high byte = ''DD DD00 0000''

    ```


    Adding the low byte and the high byte, we get the 10-bit converted ADC data as:


    ```

    DD DDDD DDDD

    ```


