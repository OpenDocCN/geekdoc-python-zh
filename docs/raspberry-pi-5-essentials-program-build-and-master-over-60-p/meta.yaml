    ```\n\nRunning the program: python myprog.py will display the following output:\n\
    \n```\nHello there!\n```\n\nWe can also modify our program myprog.py and import\
    \ and then call the module as follows:\n\n```\nfrom msg import hello\nhello()\n\
    ```\n\nWe can use variables in our module as shown below:\n\n```\nmsg.py\ndef\
    \ hello():\n    print(\"Hello there!\")\n\nname = \"Jones\"\n```\n\n## myprog.py\n\
    \n```\nimport msg\nmsg.hello()\nprint(msg.name)\n```\n\nThe program will display:\n\
    \n```\nHello there!\nJones\n```\n\nAliases can be created for modules. This is\
    \ shown in the following code:\n\n## myprog.py\n\n```\nimport msg as tst\ntst.hello()\n\
    ```\n\nWill display the output:\n\n```\nHello there!\n```\n\nAn example module\
    \ is given below that calculates the cube of a number\n\n## Example 16\n\nWrite\
    \ a module that calculates the cube of the integer number passed to it. Show how\
