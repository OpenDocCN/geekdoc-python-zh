- img_proc: true
  md: 'The specifications of the Pico hardware module are as follows:


    +   - 32-bit RP2040 Cortex-M0+ dual-core processor operating at 133 MHz

    - 2 MB Q-SPI Flash memory

    - 264 KB SRAM memory

    - 26 GPIO (+3.3 V compatible)

    - 3× 12-bit ADC pins

    - Accelerated floating-point libraries on chip

    - On-board single-band Infineon CYW43439 wireless chip, 2.4 GHz wireless interface
    (802.11b/g/n) and Bluetooth 5.2

    - Serial Wire Debug (SWD) port

    - Micro-USB port (USB 1.1) for power (+5 V) and data (programming)

    - 2× UART, 2× I²C, 2× SPI bus interface

    - 16× PWM channels

    - 1× Timer (with 4 alarms), 1× Real-Time Clock

    - On-board temperature sensor

    - On-board LED at GPIO0, controlled by the CYW43439 chip

    - Castellated module, allowing soldering direct to carrier boards

    - 8× Programmable IO (PIO) state machines for custom peripheral support

    - MicroPython, C, C++ programming

    - Drag & drop programming using mass storage over USB


    Pico GPIO hardware is +3.3 V compatible, and it is therefore important to be careful
    not to exceed this voltage when interfacing external input devices to the GPIO
    pins. +5 V to +3.3 V logic converter circuits or resistive potential divider circuits
    must be used if it is required to interface devices with +5 V outputs to the Pico
    GPIO pins.


    Pico can be programmed using MicroPython or C/C++ languages. It is assumed that
    the readers have Pico development boards with the MicroPython installed. It will
    also be useful if the readers are familiar using Thonny with the Pico. A book
    entitled **Raspberry Pi Pico W** and written by the author is available from Elektor
    and interested readers might consider purchasing this book for developing Pico-based
    projects.


    Figure 14.24 shows the pin configuration of the Pico.'
