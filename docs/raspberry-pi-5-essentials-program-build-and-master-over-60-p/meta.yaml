    In summary, **nano** is a simple and yet powerful text editor, allowing us to
    create new text files or to edit existing files.


    # 5.2 vi text editor


    The **vi** text editor has been around for many years when it has been the standard
    Unix operating system default text editor. The **vi** editor is a fully featured,
    powerful text editor for doing many different tasks. The only problem with using
    **vi** is that it is not very user-friendly and learning may take some time. In
    this section, we shall be looking at the basic features of this editor and see
    how we can use it in simple editing applications.


    Notice that you cannot use the keyboard arrow keys with the **vi** editor. Some
    of the useful **vi** editor commands are listed below:


    ```

    ZZ  save changes and exit vi

    :wq save changes and exit vi

    :q! exit without saving changes


    h   move cursor left (backwards)

    j   move cursor down

    k   move cursor up

    l   move cursor right (space bar)


    $   move to the last column on the current line

    o   move cursor to the first column on current line

    w   move cursor to the beginning of the next word

    b   move cursor to the beginning of the previous word

    H   move cursor to the top of the screen

    M   move cursor to the middle of the screen

    L   move cursor to the bottom of the screen


    G   move to the last line in the file

    nG  move to line n


    r   replace character under cursor with next character typed

    i   insert before cursor

    a   append after cursor

    A   append at end of line


    x   delete character under cursor

    dd  delete line under cursor

    dw  delete word under cursor


    /   search for a word (forwards)

    ?   search a word (backwards)

    :s  search and replace a word in current line

    ```'
