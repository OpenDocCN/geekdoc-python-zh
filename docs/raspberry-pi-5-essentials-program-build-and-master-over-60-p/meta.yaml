- md: "## Raspberry Pi 5 Essentials\n\nIf you have a monitor and keyboard, you can\
    \ log in to your Raspberry Pi 5 directly and start using it. Otherwise, find the\
    \ IP address of your Raspberry Pi 5 (e.g. from your router, or there are many\
    \ apps for smartphones, such as **who's on my wifi** that shows all the devices\
    \ connected to your router with their IP addresses). Then log in to your Raspberry\
    \ Pi 5 and start using it.\n\n## Chapter 3 • Using The Console Commands\n\n###\
    \ 3.1 Overview\n\nRaspberry Pi is based on a version of the Linux operating system.\
    \ Linux is one of the most popular operating systems in use today. Linux is very\
    \ similar to other operating systems, such as Windows and UNIX. Linux is an open\
    \ operating system based on UNIX and has been developed collaboratively by many\
    \ companies since 1991. In general, Linux is harder to manage than some other\
    \ operating systems like Windows, but offers more flexibility and configuration\
    \ options. There are several popular versions of the Linux operating system, such\
    \ as Debian, Ubuntu, Red Hat, Fedora and so on.\n\nLinux commands are text-based.\
    \ In this chapter, you will be looking at some of the useful Linux commands and\
    \ see how you can manage your Raspberry Pi using these commands.\n\nWhen you apply\
    \ power to your Raspberry Pi 5, the Linux command line (or the Linux shell, or\
    \ Console commands) is the first thing you see, and it is where you can enter\
    \ operating system commands.\n\n### 3.2 The Command Prompt\n\nAssuming your username\
    \ is **pi**, after you log in to Raspberry Pi 5, you will see the following prompt\
    \ displayed where the system waits for you to enter a command:\n\n```\npi@raspberrypi:\
    \ ~$\n```\n\nHere, **pi** is the name of the user who is logged in. **raspberrypi**\
    \ is the name of the computer, used to identify it when connecting over the network.\n\
    \n~ character indicates that you are currently in your default directory.\n\n\
