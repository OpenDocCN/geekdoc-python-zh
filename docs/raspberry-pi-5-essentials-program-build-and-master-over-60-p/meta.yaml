    \    if  a != 'E':\n            r = a\n        elif b !='E':\n            r =\
    \ b\n        elif c != 'E':\n            r = c\n        elif d != 'E':\n     \
    \       r = d\n        sleep(0.1)\n    return r\n\nc = GetChar()            #\
    \ Wait for key press\nprint (c)                # Display the pressed key\n```\n\
