    \n## 7.25 用户自定义函数\n\n函数就像是程序中的小程序。我们可以使用函数将复杂的程序分解成几个易于管理的部分，每个部分都可以实现为一个函数。函数使我们能够重用程序的某些部分。例如，我们可以创建一个函数来计算一个数的立方根，然后从程序的不同部分调用这个函数。使用函数的另一个优点是它们使程序更易于维护和更新。\n\
    \n我们创建的函数可以从程序中的任何地方调用。函数有自己的变量和自己的命令。正如我们在本章前面部分所看到的，Python 有许多内置函数用于各种操作，如算术、三角函数、字符串操作等。用户自定义函数由程序员创建。在本节中，我们将研究如何在程序中创建和使用函数。\n\
    \n用户自定义函数包含以下部分：\n\n- 函数以关键字 **def** 开头，后跟函数名和圆括号，然后是冒号。\n- 函数的输入参数必须放在函数定义开头的括号内。\n\
    - 函数体必须在左侧缩进相同数量的空格。\n- 可以在函数的第一行显示可选的文本消息，以描述函数的功能。\n- 函数必须以 return 语句结束。\n\n\
    下面是一个名为 **Mult** 的示例函数。该函数首先接受两个数字 first 和 second 作为参数，将它们相乘，并返回结果：\n\n```python\n\
    def Mult(first, second):\n    \"This is a simple multiplication function\"\n \
    \   result = first * second\n    return result\n```\n\n通过指定函数名并将任何参数括在括号中，可以从主程序调用函数。例如，要调用上述函数将数字\
    \ 5 和 3 相乘，并将结果存储在名为 'a' 的变量中，我们在程序中包含以下语句：\n\n```python\na = Mult(5, 3)\n```\n\
    \n我们也可以通过指定关键字参数来调用函数。即：\n\n```python\na = Mult(first = 5, second = 3)\n```\n\n\
    图 7.19 在 Python 程序中展示了上述示例。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_93_0.png)\n\
    \n图 7.20 展示了另一个示例。在这个例子中，函数显示作为参数传递的字符串。请注意，此函数没有返回任何数据。\n\n```python\n>>> def\
    \ Prnt(strng):\n...     print(strng)\n...     return\n...\n>>> Prnt(\"Hello there\"\
    )\nHello there\n```\n\n图 7.20 显示字符串的函数\n\n函数中使用的变量是该函数的局部变量。因此，例如，如果有两个同名的变量，一个在函数内部，另一个在函数外部，更改函数内部的变量不会改变外部的变量。函数外部的变量称为\
    \ **全局** 变量，而函数内部的变量称为 **局部** 变量。参见图 7.21 的示例，其中变量 **res** 的内容在函数外部没有被更改。\n\n\
    ```python\n>>> def Mult(first, second):\n...     res = first * second\n...   \
    \  return res\n...\n>>> res = 2\n>>> a = Mult(3, 8)\n>>> print(a)\n24\n```\n\n\
    图 7.21 函数中的变量是局部的\n\n全局变量的规则如下：\n\n- 全局变量是在函数定义之外的程序顶部赋值的变量。\n- 全局名称必须仅在函数内部赋值时才声明。\n\
    - 全局名称可以在函数内部引用而无需声明。\n\n因此，通过在函数外部声明一个变量，同时在函数内部也声明该变量但使用 global 关键字，允许我们在函数内部更改其内容。下面的例子说明了全局变量的用法：\n\
    \n```python\ncnt = 10                    # 变量 cnt 是全局的\ndef tstfunc():       \
    \        # 函数声明\n    global cnt               # 变量 cnt 定义为全局\n    cnt = 200  \
    \              # 全局 cnt 的值被更改\n\ntstfunc()                   # 调用函数\nprint(cnt)\
    \                  # cnt 的值是 200\n```\n\n如上所述，如果全局变量的值在函数内部没有被更改，那么就没有必要将其定义为全局变量。在以下代码中，没有必要在函数内部将\
    \ **x** 定义为全局变量：\n\n```python\nx = 10\ny = 4\n\ndef tst():\n    global y\n   \
    \ y = x + 2\n```\n\n需要注意的是，函数调用中的变量是 **按值传递** 的。这意味着参数的值不能在函数内部被更改。图 7.22 展示了一个示例。在这个例子中，请注意变量\
    \ **cnt** 的值在函数调用内部没有被更改。\n\n```python\n>>> cnt = 2\n>>> def Mult(first, second):\n\
    ...     cnt = 5\n...     return(first * second)\n...\n>>> a = Mult(5, 6)\n>>>\
    \ print(a)\n30\n>>> print(cnt)\n2\n```\n\n*图 7.22 变量是按值传递的*\n\n函数通常只向调用程序返回一个项。在某些应用中，我们可能希望向调用程序返回多个项。这可以通过返回一个元组，然后在主程序中解包它来轻松完成。图\
    \ 7.23 展示了一个示例。在这个例子中，函数 **MyFunc** 被声明有两个参数。参数相加并存储在一个名为 **sum** 的局部变量中。同样，参数的差值存储在变量\
    \ **diff** 中。函数将 **sum** 和 **diff** 作为元组返回。调用的主程序解包返回的数据并存储在变量 **x** 和 **y** 中。\n\
    \n```python\n>>> def MyFunc(a, b):\n...     sum = a + b\n...     diff = a - b\n\
    ...     return sum, diff\n...\n>>> x, y = MyFunc(12, 5)\n>>> print(x, y)\n(17,\
    \ 7)\n```\n\n*图 7.23 从函数返回多个变量*\n\n## 7.26 示例\n\n**示例 4**\n编写一个程序，从键盘读取一个以度为单位的角度，并显示该角度的三角正弦值。重复此过程，直到用户停止程序。\n\
    \n**解答 4**\n所需的程序清单和示例输出如图 7.24 所示（程序：**trig.py**）。用户输入的角度被转换为浮点数并存储在变量 angle\
    \ 中。然后显示该角度的三角正弦值。程序持续运行，直到用户在提示 **Any more?** 后输入 **n**。"
