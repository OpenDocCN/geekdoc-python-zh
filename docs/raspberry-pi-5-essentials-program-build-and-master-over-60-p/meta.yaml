- md: "## 12.13 The inertial measurement sensor\n\nThe Sense HAT contains an Inertial\
    \ Measurement Unit (IMU) which is a combination of a compass sensor, gyroscope\
    \ sensor, and accelerometer sensor. These sensors can be enabled or disabled on\
    \ an individual basis using the **imu_config** statement. For example, in the\
    \ following example, all three sensors are enabled:\n\n```\nsense.set_imu_config(True,\
    \ True, True)\n```\n\nSimilarly, if we wish to enable only the gyroscope sensor,\
    \ we have to use the statement:\n\n```\nsense.set_imu_config(False, True, False)\n\
    ```\n\n### 12.13.1 Project 10 - Reading the acceleration\n\n**Description:** You\
    \ can get the acceleration (amount of G-force) in three dimensions x, y and z\
    \ by using the statement:\n\n```\nx, y, z = sense.get_accelerometer_raw().values()\n\
    ```\n\nIn the example code below, the acceleration in 3 dimensions is read and\
    \ displayed continuously. You should run this program and move your Sense HAT\
    \ in three dimensions and see the acceleration changing in each direction:\n\n\
    ```\nfrom sense_hat import SenseHat\nsense = SenseHat()\nwhile True:\n    x, y,\
    \ z = sense.get_accelerometer_raw().values()\n    print(\"X=%s, Y=%s, Z=%s\" %(x,\
    \ y, z))\n```\n\nRotating the Sense HAT will change the accelerometer x and y\
    \ values between -1 and +1. If it is placed upside down, the z value will change\
    \ between -1 and +1. If any axis has ±1 G, then we know that axis is pointing\
    \ downwards.\n\nAn example project is given below.\n\n### 12.13.2 Project 11 –\
    \ Accelerometer-based dice\n\n**Description:** In this example, the shaking of\
    \ the Sense HAT board is detected, and then a dice number is displayed on the\
    \ LCD matrix.\n\nIf the board is rotated, then the acceleration will be 1 G maximum\
    \ in any direction. If on the other hand, the board is shaken then the acceleration\
    \ will be greater than 1 G. In this program, the acceleration in three dimensions\
    \ is checked to determine when the board is shaken and if so, a dice number is\
    \ displayed for two seconds.\n\nFigure 12.17 shows the program listing (program:\
    \ **shake.py**). The dice numbers 1 to 6 are stored in list **dice**. Inside the\
    \ program loop, the accelerometer values are read, and then their absolute values\
    \ are taken. If the acceleration exceeds 2 in any direction, i.e. if the board\
    \ is shaken, a dice number is chosen at random and displayed on the LED matrix\
    \ in red.\n\n```\n#-----------------------------------------------------------------------\n\
    #                   ACCELEROMETER BASED DICE\n#                   -----------------------\n\
    #\n# This program displays a dice number after the Sense HAT board\n# is shaken.\
    \ The accelerometer in 3 dimensions is used to determine\n# when the board is\
    \ shaken\n#\n# Author: Dogan Ibrahim\n# Date   : October, 2023\n# File   : shake.py\n\
    #-----------------------------------------------------------------------\nfrom\
    \ sense_hat import SenseHat\nsense=SenseHat()\nimport time\nimport random\n\n\
    dice = ['1', '2', '3','4', '5', '6']            # Dice nos\n\nsense.clear()\n\n\
    while True:\n    x, y, z = sense.get_accelerometer_raw().values()    # Read acc\n\
    \    x = abs(x)                                          # x val\n    y = abs(y)\
    \                                          # y val\n    z = abs(z)           \
    \                               # z val\n    if x > 2 or y > 2 or z > 2:\n   \
    \     sense.show_letter(random.choice(dice), text_colour = (255,0,0))\n      \
    \  time.sleep(2)\n        sense.clear()\n```\n\n### 12.13.3 Project 12 – Accelerometer-based\
    \ LED shapes\n\n**Description:** In this project, the accelerometer is used to\
    \ sense when the Sense HAT board is tilted in its pitch and roll axes. Initially,\
    \ the LED at the center of the board is lit. By tilting the board on its axes,\
    \ you can make turn ON other LEDs and make various interesting shapes.\n\nFigure\
    \ 12.18 shows the program listing (program: **shapes.py**). The reason for using\
    \ the accelerometer in this project is because it is more reliable and gives consistent\
    \ results. If any axis has ±1 G, then we know that axis is pointing downwards.\
    \ When the Sense HAT board is tilted in its pitch axis, the LEDs in the x-direction\
    \ are turned ON depending on whether the tilt is in the positive or the negative\
    \ direction (+G or –G). Similarly, when the board is tilted in its roll axis,\
    \ the LEDs in the y-direction are turned ON depending on whether the tilt is in\
    \ the positive or the negative direction.\n\n```\n#-----------------------------------------------------------------------\n\
    #                   ACCELEROMETER BASED LED SHAPES\n#                   -----------------------------\n\
    #\n# In this program the accelerometer is used. The Sense HAT board\n# is tilted\
    \ in its pitch and roll axes to make shapes with LEDs\n#\n# Author: Dogan Ibrahim\n\
    # Date   : October, 2023\n# File   : shapes.py\n#-----------------------------------------------------------------------\n\
    from sense_hat import SenseHat\nsense=SenseHat()\nfrom time import sleep\n\nsense.clear()\n\
    sense.set_pixel(3, 3, (255,0,0))          # Starting LED\nx = 3\ny = 3\n\nwhile\
    \ True:\n    X,Y,Z = sense.get_accelerometer_raw().values()    # Read acc\n  \
    \  X = round(X, 0)                                  # X dir\n    Y = round(Y,\
    \ 0)                                  # Y dir\n\n    if X > 0:\n        x = x\
    \ + 1\n        if x > 7:                                    # If the end\n   \
    \         x = 7\n    elif X < 0:\n        x = x - 1\n        if x < 0:\n     \
    \       x = 0\n\n    if y > 0:\n        y = y + 1\n        if y > 7:\n       \
    \     y = 7\n    elif y < 0:\n        y = y - 1\n        if y < 0:\n         \
    \   y = 0\n    sense.set_pixel(x,y,(255,0,0))\n    sleep(1)\n```\n\nFigure 12.19\
    \ shows an example shape drawn by tilting the Sense Hat board.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_243_0.png)\n\
    \nFigure 12.19 Example drawing shapes on the Sense HAT board\n\n## Chapter 13\
    \ • Using a 4×4 Keypad\n\n## 13.1 Overview\n\nKeypads are useful devices for entering\
    \ data to microcontroller-based systems. They are especially useful in portable\
    \ applications where the user has to enter data or make a choice. In this chapter,\
    \ you will be learning to use a 4×4 keypad in your Raspberry Pi 5 projects.\n\n\
    ## 13.2 Project 1 – Using a 4×4 keypad\n\n**Description:** This is a 4×4 keypad\
    \ program. The program reads the key pressed by the user and displays its code\
    \ on the screen. The aim of the project is to show how a 4×4 keypad can be used\
    \ with a Raspberry Pi 5 project.\n\n**The 4×4 Keypad:** There are several types\
    \ of keypads that can be used in microcontroller-based projects. In this project,\
    \ a 4×4 keypad (see Figure 13.1) is used. This keypad has keys for numbers 0 to\
    \ 9 and the letters A, B, C, D, *, and #. The keypad is interfaced to the processor\
    \ with 8 wires with the names R1 to R4 and C1 to C4, representing the rows and\
    \ columns respectively of the keypad (see Figure 13.2).\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_244_0.png)\n\
    \nFigure 13.1 4×4 keypad\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_244_1.png)\n\
    \nFigure 13.2 Circuit diagram of the 4×4 keypad\n\nThe operation of the keypad\
    \ is basic: the columns are configured as inputs, and they are all set HIGH, and\
    \ the rows are configured as outputs. The pressed key is identified by using column\
    \ scanning. Here, a row is forced LOW while the other rows are held HIGH. Then\
    \ the state of each column is scanned, and if a column is found to be LOW, then\
    \ the intersection of that column and row is the key pressed. This process is\
    \ repeated for all the rows.\n\n**Block diagram:** Figure 13.3 shows the block\
    \ diagram.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_245_0.png)\n\n*Figure 13.3\
    \ Block diagram*\n\n**Circuit diagram:** The circuit diagram of the project is\
    \ shown in Figure 13.4. The 4×4 keypad is connected to the following GPIO pins\
    \ of the Raspberry Pi 5. The column pins are held high by using external 10 Kilo-ohm\
    \ resistors to +3.3 V:\n\n| Keypad pin | Raspberry Pi pin |\n| :--- | :--- |\n\
    | R1 | GPIO 4 |\n| R2 | GPIO 17 |\n| R3 | GPIO 27 |\n| R4 | GPIO 22 |\n| C1 |\
    \ GPIO 10 |\n| C2 | GPIO 9 |\n| C3 | GPIO 11 |\n| C4 | GPIO 0 |"
  mdcn: "## 12.13 惯性测量传感器\n\nSense HAT 包含一个惯性测量单元（IMU），它是指南针传感器、陀螺仪传感器和加速度计传感器的组合。这些传感器可以使用\
    \ **imu_config** 语句单独启用或禁用。例如，在以下示例中，所有三个传感器都被启用：\n\n```\nsense.set_imu_config(True,\
    \ True, True)\n```\n\n同样，如果我们只想启用陀螺仪传感器，则必须使用以下语句：\n\n```\nsense.set_imu_config(False,\
    \ True, False)\n```\n\n### 12.13.1 项目 10 - 读取加速度\n\n**描述：** 你可以使用以下语句获取三个维度 x、y\
    \ 和 z 上的加速度（G 力大小）：\n\n```\nx, y, z = sense.get_accelerometer_raw().values()\n\
    ```\n\n在下面的示例代码中，会持续读取并显示三个维度的加速度。你应该运行这个程序，并在三个维度上移动你的 Sense HAT，观察每个方向上的加速度变化：\n\
    \n```\nfrom sense_hat import SenseHat\nsense = SenseHat()\nwhile True:\n    x,\
    \ y, z = sense.get_accelerometer_raw().values()\n    print(\"X=%s, Y=%s, Z=%s\"\
    \ %(x, y, z))\n```\n\n旋转 Sense HAT 会使加速度计的 x 和 y 值在 -1 和 +1 之间变化。如果将其倒置，z 值将在\
    \ -1 和 +1 之间变化。如果任何轴的值为 ±1 G，那么我们知道该轴指向下方。\n\n下面给出一个示例项目。\n\n### 12.13.2 项目 11\
    \ – 基于加速度计的骰子\n\n**描述：** 在此示例中，检测 Sense HAT 板的摇动，然后在 LCD 矩阵上显示一个骰子数字。\n\n如果板子被旋转，那么任何方向上的加速度最大为\
    \ 1 G。另一方面，如果板子被摇动，那么加速度将大于 1 G。在此程序中，检查三个维度的加速度以确定板子何时被摇动，如果被摇动，则显示一个骰子数字两秒钟。\n\
    \n图 12.17 显示了程序清单（程序：**shake.py**）。骰子数字 1 到 6 存储在列表 **dice** 中。在程序循环内，读取加速度计的值，然后取其绝对值。如果任何方向上的加速度超过\
    \ 2，即如果板子被摇动，则随机选择一个骰子数字，并以红色显示在 LED 矩阵上。\n\n```\n#-----------------------------------------------------------------------\n\
    #                   ACCELEROMETER BASED DICE\n#                   -----------------------\n\
    #\n# This program displays a dice number after the Sense HAT board\n# is shaken.\
    \ The accelerometer in 3 dimensions is used to determine\n# when the board is\
    \ shaken\n#\n# Author: Dogan Ibrahim\n# Date   : October, 2023\n# File   : shake.py\n\
    #-----------------------------------------------------------------------\nfrom\
    \ sense_hat import SenseHat\nsense=SenseHat()\nimport time\nimport random\n\n\
    dice = ['1', '2', '3','4', '5', '6']            # Dice nos\n\nsense.clear()\n\n\
    while True:\n    x, y, z = sense.get_accelerometer_raw().values()    # Read acc\n\
    \    x = abs(x)                                          # x val\n    y = abs(y)\
    \                                          # y val\n    z = abs(z)           \
    \                               # z val\n    if x > 2 or y > 2 or z > 2:\n   \
    \     sense.show_letter(random.choice(dice), text_colour = (255,0,0))\n      \
    \  time.sleep(2)\n        sense.clear()\n```\n\n### 12.13.3 项目 12 – 基于加速度计的 LED\
    \ 形状\n\n**描述：** 在此项目中，加速度计用于感知 Sense HAT 板在其俯仰轴和横滚轴上的倾斜。最初，板子中心的 LED 被点亮。通过沿其轴倾斜板子，你可以点亮其他\
    \ LED 并制作各种有趣的形状。\n\n图 12.18 显示了程序清单（程序：**shapes.py**）。在此项目中使用加速度计的原因是它更可靠并能提供一致的结果。如果任何轴的值为\
    \ ±1 G，那么我们知道该轴指向下方。当 Sense HAT 板在其俯仰轴上倾斜时，x 方向的 LED 会根据倾斜是正方向还是负方向（+G 或 –G）而被点亮。同样，当板子在其横滚轴上倾斜时，y\
    \ 方向的 LED 会根据倾斜是正方向还是负方向而被点亮。\n\n```\n#-----------------------------------------------------------------------\n\
    #                   ACCELEROMETER BASED LED SHAPES\n#                   -----------------------------\n\
    #\n# In this program the accelerometer is used. The Sense HAT board\n# is tilted\
