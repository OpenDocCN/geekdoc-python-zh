- md: "## 3.3.6 System information and other useful commands\n\nThe **uname** command\
    \ is used to display system information. This command has the following options:\n\
    \n| Option | Description |\n| :--- | :--- |\n| -a | Show all system information\
    \ |\n| -s | display the kernel name |\n| -n | print the network node hostname\
    \ |\n| -r | print the kernel release |\n| -v | print the kernel version number\
    \ |\n| -m | print the system hardware name |\n| -p | print the processor type\
    \ |\n| -i | print the hardware platform type |\n| -o | print the operating system\
    \ type |\n\nSome examples are shown in Figure 3.21\n\n```\npi@raspberrypi:~ $\
    \ uname -a\nLinux raspberrypi 6.1.0-rpi4-rpi-2712 #1 SMP PREEMPT Debian 1:6.1.54-1+rpt1\n\
    3-09-27) aarch64 GNU/Linux\npi@raspberrypi:~ $ uname -s\nLinux\npi@raspberrypi:~\
    \ $ uname -n\nraspberrypi\npi@raspberrypi:~ $ uname -r\n6.1.0-rpi4-rpi-2712\n\
    ```\n\nFigure 3.21 The uname command\n\nIf you have executed many commands and\
    \ want to use some of them again, but you cannot remember the command name, you\
    \ can use the **history** command. An example is shown in Figure 3.22. To execute\
    \ a command from the history, enter ! followed by the command number. For example,\
    \ to execute the **ls** command again, you can enter **!6** followed by the Enter\
    \ key.\n\n```\npi@raspberrypi:~ $ history\n    1  ls\n    2  sudo nano /etc/default/console-setup\n\
    \    3  sudo /etc/init.d/console-setup restart\n    4  sudo restart\n    5  sudo\
    \ reboot\n    6  ls\n    7  cat /etc/default/console-setup\n    8  sudo dpkg-reconfigure\
    \ console-setup\n    9  ls\n   10  ls music\n```\n\nFigure 3.22 The history command\n\
    \nThe **clear** command is also useful, and it is used to clear the screen.\n\n\
    To install a package, use the command: **sudo apt install <package_name>**\n\n\
    The **&** operator allows you to run any command in the background so that you\
    \ can use the terminal for other tasks. This operator must be added to the end\
    \ of a command.\n\nThe **&&** operator allows you to run two or more commands\
    \ at the same time. For example, command1 **&&** command2\n\n## Chapter 4 • Desktop\
    \ GUI – Desktop Applications\n\n## 4.1 Overview\n\nIn this chapter, you will learn\
    \ how to access and use the desktop applications of your Raspberry Pi 5.\n\n##\
    \ 4.2 Desktop GUI Applications\n\nIf you have connected a monitor, a mouse, and\
    \ a keyboard to your Raspberry Pi 5 computer, then you can access the desktop\
    \ GUI by entering command `startx` in the command mode.\n\nIf you wish to access\
    \ the Desktop GUI applications from a desktop or a laptop computer, then the required\
    \ steps are as follows:\n\n**Step 1:** Connect to your Raspberry Pi 5 using the\
    \ Putty terminal emulator with the SSH services as explained in earlier chapters.\n\
    \n**Step 2:** Run the VNC server by entering the following command into your SSH\
    \ window:\n\n```\npi@raspberrypi ~ $ vncserver :1\n```\n\n**Step 3:** Run the\
    \ **VNC Viewer** program on your computer. Enter the IP address of your Raspberry\
    \ Pi 5 computer, followed by characters :1 to indicate that we are using port\
    \ 1 (see Figure 4.1). Click the **Connect** button.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_49_0.png)\n\
    \nYou will be asked for your password that you created earlier. Enter the password,\
    \ and you will see the Raspberry Pi 5 Desktop displayed (Figure 4.2, only the\
    \ upper part of the screen is shown)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_50_0.png)\n\
    \nFigure 4.2 Raspberry Pi 5 Desktop\n\nAssuming you are using a pre-installed\
    \ micro SD card, at the top of the screen you have a number of shortcut icons.\
    \ Below that, you will see four menu icons with the names:\n\n- Applications menu\n\
    - Web Browser\n- File Manager\n- Terminal\n\nOn the top right-hand side of the\
    \ screen, starting from the left, you have the following menus:\n\n- Updates\n\
    - Bluetooth\n- Wi-Fi\n- Volume Control\n- Time\n\n### 4.2.1 Applications Menu\n\
    \nFigure 4.3 shows the items under the Applications Menu.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_50_1.png)\n\
    \nFigure 4.3 Items under the Applications Menu\n\n**Programming:** This menu item\
    \ includes a number of programming languages that you can use to program our Raspberry\
    \ Pi 5. Figure 4.4 shows a list of the items in the Programming menu.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_51_0.png)\n\
    \nIn this book, you will be using the **Thonny IDE** in most of your Python programs.\
    \ Details about the Thonny IDE are given in a later chapter.\n\n**Web Browser:**\
    \ This menu item includes the **Chromium** and the **Firefox** web browsers.\n\
    \n**Sound & Video:** This menu item includes the video program **VLC Media Player**\n\
    \n**Graphics:** This menu item includes the **Image Viewer** program\n\n**Accessories:**\
    \ This menu item includes a number of useful programs, as shown in Figure 4.5.\
    \ For example, the Calculator program can be used to perform simple and scientific\
    \ calculations (Figure 4.6)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_51_1.png)\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_52_0.png)\n\nFigure 4.6 The Calculator\
    \ program\n\n**Help:** This menu provides help on various Raspberry Pi tools\n\
    \n**Preferences:** This menu is used for system and software settings, such as\
    \ adding/removing software, print services, screen configuration, etc. (Figure\
    \ 4.7)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_52_1.png)\n\nFigure 4.7 The\
    \ Preferences menu\n\n**Run:** This menu is used to run a program\n\n**Shutdown:**\
    \ Use this menu option to shut down your Raspberry Pi 5\n\n### 4.2.2 Web browser\n\
    \nClick this menu option to start a web browser\n\n### 4.2.3 File manager\n\n\
    This menu item is used for file handling and is similar to the File Explorer on\
    \ Windows systems. Figure 4.8 shows the options under this menu item. With the\
    \ File manager, you can create a file, copy/paste text, view the contents of a\
    \ file, sort a file, find files, and several other file processing options.\n\n\
    Raspberry Pi 5 Essentials\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_53_0.png)\n\
    \nFigure 4.8 The File manager menu\n\n### 4.2.4 Terminal\n\nThis menu item enables\
    \ the command mode so that you can enter commands in this mode (Figure 4.9, only\
    \ part of the screen is shown)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_53_1.png)\n\
    \nFigure 4.9 The Terminal menu\n\n### 4.2.5 Manage Bluetooth devices\n\nThis menu\
    \ item at the right-hand side of the screen enables you to enable the Bluetooth\
    \ on your Raspberry Pi 5 and to pair with other Bluetooth devices\n\n### 4.2.6\
    \ Wi-Fi\n\nThe next menu item to the Bluetooth is the Wi-Fi menu, which can be\
    \ used to turn the Wi-Fi on and off, and to connect to a Wi-Fi router. When clicked,\
    \ a list of the available Wi-Fi devices is given (see Figure 4.10).\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_53_2.png)\n\
    \nFigure 4.10 Wi-Fi menu\n\n### 4.2.7 Volume control\n\nThis menu item is used\
    \ to control the audio volume through a sliding bar.\n\n### 4.2.8 Date and time\n\
    \nNext to the Volume control is the date and time menu, which shows the current\
    \ system date and time.\n\n## Chapter 5 • Using a Text Editor in Console Mode\n\
    \nA text editor is used to create or modify the contents of a text file. There\
    \ are many text editors available for the Linux operating system. Some popular\
    \ ones are nano, vim, vi, and many more. In this chapter, we shall be looking\
    \ at some of these text editors and see how to use them.\n\n## 5.1 nano text editor\n\
    \nStart the **nano** text editor by entering the word **nano**, followed by the\
    \ filename you wish to create or modify. An example is given below where a new\
    \ file called **first.txt** is created:\n\n```\npi@raspberrypi: ~ $ nano first.txt\n\
    ```\n\nYou should see the editor screen as in Figure 5.1. The name of the file\
    \ to be edited is written at the top middle part of the screen. The message 'New\
    \ File' at the bottom of the screen shows that this is a newly created file. The\
    \ shortcuts at the bottom of the screen are there to perform various editing functions.\
    \ These shortcuts are accessed by pressing the Ctrl key together with another\
    \ key. Some of the useful shortcuts are given below:\n\n- **Ctrl+W**: Search for\
    \ a word\n- **Ctrl+V**: Move to the next page\n- **Ctrl+Y**: Move to the previous\
    \ page\n- **Ctrl+K**: Cut the current row of txt\n- **Ctrl+R**: Read file\n- **Ctrl+U**:\
    \ Paste the text you previously cut\n- **Ctrl+J**: Justify\n- **Ctrl+\\**: Search\
    \ and replace text\n- **Ctrl+C**: Display current column and row position\n- **Ctrl+G**:\
    \ Get detailed help on using the nano\n- **Ctrl+-**: Go to the specified line\
    \ and column position\n- **Ctrl+O**: Save (write out) the file currently open\n\
    - **Ctrl+X**: Exit nano"
  mdcn: "## 3.3.6 系统信息及其他常用命令\n\n**uname** 命令用于显示系统信息。该命令有以下选项：\n\n| 选项 | 描述 |\n|\
    \ :--- | :--- |\n| -a | 显示所有系统信息 |\n| -s | 显示内核名称 |\n| -n | 打印网络节点主机名 |\n| -r\
    \ | 打印内核版本号 |\n| -v | 打印内核版本详细信息 |\n| -m | 打印系统硬件名称 |\n| -p | 打印处理器类型 |\n| -i\
    \ | 打印硬件平台类型 |\n| -o | 打印操作系统类型 |\n\n一些示例如图 3.21 所示。\n\n```\npi@raspberrypi:~\
    \ $ uname -a\nLinux raspberrypi 6.1.0-rpi4-rpi-2712 #1 SMP PREEMPT Debian 1:6.1.54-1+rpt1\n\
    3-09-27) aarch64 GNU/Linux\npi@raspberrypi:~ $ uname -s\nLinux\npi@raspberrypi:~\
    \ $ uname -n\nraspberrypi\npi@raspberrypi:~ $ uname -r\n6.1.0-rpi4-rpi-2712\n\
    ```\n\n图 3.21 uname 命令\n\n如果你执行了许多命令，并想再次使用其中一些，但又记不起命令名称，可以使用 **history** 命令。示例如图\
    \ 3.22 所示。要从历史记录中执行一个命令，输入 ! 后跟命令编号。例如，要再次执行 **ls** 命令，你可以输入 **!6** 然后按回车键。\n\n\
    ```\npi@raspberrypi:~ $ history\n    1  ls\n    2  sudo nano /etc/default/console-setup\n\
    \    3  sudo /etc/init.d/console-setup restart\n    4  sudo restart\n    5  sudo\
    \ reboot\n    6  ls\n    7  cat /etc/default/console-setup\n    8  sudo dpkg-reconfigure\
    \ console-setup\n    9  ls\n   10  ls music\n```\n\n图 3.22 history 命令\n\n**clear**\
    \ 命令也很有用，它用于清屏。\n\n要安装一个软件包，使用命令：**sudo apt install <package_name>**\n\n**&**\
    \ 运算符允许你在后台运行任何命令，这样你就可以将终端用于其他任务。此运算符必须添加到命令的末尾。\n\n**&&** 运算符允许你同时运行两个或多个命令。例如，command1\
    \ **&&** command2\n\n## 第 4 章 • 桌面 GUI – 桌面应用程序\n\n## 4.1 概述\n\n在本章中，你将学习如何访问和使用树莓派\
    \ 5 的桌面应用程序。\n\n## 4.2 桌面 GUI 应用程序\n\n如果你已将显示器、鼠标和键盘连接到你的树莓派 5 电脑，那么你可以通过在命令模式下输入命令\
    \ `startx` 来访问桌面 GUI。\n\n如果你希望从台式机或笔记本电脑访问桌面 GUI 应用程序，则需要执行以下步骤：\n\n**步骤 1：**\
    \ 使用 Putty 终端模拟器，通过 SSH 服务连接到你的树莓派 5，如前面章节所述。\n\n**步骤 2：** 在你的 SSH 窗口中输入以下命令来运行\
    \ VNC 服务器：\n\n```\npi@raspberrypi ~ $ vncserver :1\n```\n\n**步骤 3：** 在你的电脑上运行\
    \ **VNC Viewer** 程序。输入你的树莓派 5 电脑的 IP 地址，后跟字符 :1 以表示我们使用的是端口 1（见图 4.1）。点击 **Connect**\
    \ 按钮。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_49_0.png)\n\n系统会要求你输入之前创建的密码。输入密码后，你将看到树莓派\
    \ 5 的桌面显示（图 4.2，仅显示了屏幕的上半部分）。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_50_0.png)\n\
    \n图 4.2 树莓派 5 桌面\n\n假设你使用的是预装的 micro SD 卡，屏幕顶部有一些快捷图标。在那下面，你会看到四个菜单图标，名称如下：\n\n\
    - 应用程序菜单\n- 网页浏览器\n- 文件管理器\n- 终端\n\n在屏幕的右上角，从左到右，你有以下菜单：\n\n- 更新\n- 蓝牙\n- Wi-Fi\n\
    - 音量控制\n- 时间\n\n### 4.2.1 应用程序菜单\n\n图 4.3 显示了应用程序菜单下的项目。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_50_1.png)\n\
    \n图 4.3 应用程序菜单下的项目\n\n**编程：** 此菜单项包括多种可用于为我们的树莓派 5 编程的编程语言。图 4.4 显示了编程菜单中的项目列表。\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_51_0.png)\n\n在本书中，你将在大多数 Python 程序中使用\
    \ **Thonny IDE**。有关 Thonny IDE 的详细信息将在后面的章节中给出。\n\n**网页浏览器：** 此菜单项包括 **Chromium**\
    \ 和 **Firefox** 网页浏览器。\n\n**声音和视频：** 此菜单项包括视频程序 **VLC Media Player**。\n\n**图形：**\
    \ 此菜单项包括 **Image Viewer** 程序。\n\n**附件：** 此菜单项包括许多有用的程序，如图 4.5 所示。例如，计算器程序可用于执行简单和科学计算（图\
    \ 4.6）。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_51_1.png)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_52_0.png)\n\
    \n图 4.6 计算器程序\n\n**帮助：** 此菜单提供关于各种树莓派工具的帮助。\n\n**首选项：** 此菜单用于系统和软件设置，例如添加/删除软件、打印服务、屏幕配置等（图\
    \ 4.7）。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_52_1.png)\n\n图 4.7 首选项菜单\n\
    \n**运行：** 此菜单用于运行程序。\n\n**关机：** 使用此菜单选项关闭你的树莓派 5。\n\n### 4.2.2 网页浏览器\n\n点击此菜单选项启动网页浏览器。\n\
    \n### 4.2.3 文件管理器\n\n此菜单项用于文件处理，类似于 Windows 系统上的文件资源管理器。图 4.8 显示了此菜单项下的选项。使用文件管理器，你可以创建文件、复制/粘贴文本、查看文件内容、排序文件、查找文件以及其他一些文件处理选项。\n\
    \n树莓派 5 精要\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_53_0.png)\n\n图 4.8 文件管理器菜单\n\
    \n### 4.2.4 终端\n\n此菜单项启用命令模式，以便你可以在此模式下输入命令（图 4.9，仅显示了屏幕的一部分）。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_53_1.png)\n\
    \n图 4.9 终端菜单\n\n### 4.2.5 管理蓝牙设备\n\n屏幕右侧的此菜单项使你能够启用树莓派 5 上的蓝牙，并与其他蓝牙设备配对。\n\n\
    ### 4.2.6 Wi-Fi\n\n蓝牙旁边的下一个菜单项是 Wi-Fi 菜单，可用于打开和关闭 Wi-Fi，以及连接到 Wi-Fi 路由器。点击时，会显示可用的\
    \ Wi-Fi 设备列表（见图 4.10）。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_53_2.png)\n\
    \n图 4.10 Wi-Fi 菜单\n\n### 4.2.7 音量控制\n\n此菜单项用于通过滑动条控制音频音量。\n\n### 4.2.8 日期和时间\n\
    \n音量控制旁边是日期和时间菜单，显示当前系统日期和时间。\n\n## 第 5 章 • 在控制台模式下使用文本编辑器\n\n文本编辑器用于创建或修改文本文件的内容。Linux\
    \ 操作系统有许多可用的文本编辑器。一些流行的有 nano、vim、vi 等等。在本章中，我们将了解其中一些文本编辑器并学习如何使用它们。\n\n## 5.1\
    \ nano 文本编辑器\n\n通过输入单词 **nano**，后跟你希望创建或修改的文件名来启动 **nano** 文本编辑器。下面给出一个示例，其中创建了一个名为\
    \ **first.txt** 的新文件：\n\n```\npi@raspberrypi: ~ $ nano first.txt\n```\n\n你应该会看到如图\
    \ 5.1 所示的编辑器屏幕。要编辑的文件名写在屏幕顶部的中间部分。屏幕底部的消息 'New File' 表明这是一个新创建的文件。屏幕底部的快捷键用于执行各种编辑功能。这些快捷键通过按\
    \ Ctrl 键和另一个键来访问。一些有用的快捷键如下：\n\n- **Ctrl+W**：搜索单词\n- **Ctrl+V**：移动到下一页\n- **Ctrl+Y**：移动到上一页\n\
    - **Ctrl+K**：剪切当前行文本\n- **Ctrl+R**：读取文件\n- **Ctrl+U**：粘贴之前剪切的文本\n- **Ctrl+J**：两端对齐\n\
    - **Ctrl+\\**：搜索并替换文本\n- **Ctrl+C**：显示当前列和行位置\n- **Ctrl+G**：获取有关使用 nano 的详细帮助\n\
    - **Ctrl+-**：转到指定的行和列位置\n- **Ctrl+O**：保存（写出）当前打开的文件\n- **Ctrl+X**：退出 nano"
