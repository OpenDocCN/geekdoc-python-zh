    \ = 10\n\nBuzzer.off()\n\nwhile True:\n    obstacle_f = sensorForward.distance\
    \ * 100        # Forward distance\n    obstacle_r = sensorRear.distance * 100\
    \           # Rear distance\n    if obstacle_f <= Allowed_Distance or obstacle_r\
