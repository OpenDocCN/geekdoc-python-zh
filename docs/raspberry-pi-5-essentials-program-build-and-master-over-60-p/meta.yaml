    - 将模块程序放在 `PYTHONPATH` 已包含的某个文件夹中\n\nRaspberry Pi 5 Essentials\n\n# 第 8 章 • Raspberry\
    \ Pi 5 LED 项目\n\n## 8.1 概述\n\n本章介绍 Raspberry Pi 5 硬件接口以及在简单项目中使用 LED。Raspberry\
    \ Pi 5 使用其 GPIO（通用输入输出）端口连接器连接到外部电子电路和设备。这是一个 2.54 mm、40 引脚的扩展排针，排列成 2 × 20 的条带，如图\
    \ 8.1 所示。I/O 端口编号为 GPIO nn。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_113_0.png)\n\
    \n## 8.2 Raspberry Pi 5 GPIO 引脚定义\n\n当 GPIO 连接器位于电路板的远端时，从连接器左侧开始的引脚编号为 1、3、5、7\
    \ 等，而顶部的引脚编号为 2、4、6、8 等（图 8.2）。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_113_1.png)\n\
    \nGPIO 提供 26 个通用双向 I/O 引脚。其中一些引脚具有多种功能。例如，引脚 3 和 5 分别是 GPIO2 和 GPIO3 输入输出引脚。这些引脚也可以分别用作\
    \ I²C 总线的 SDA 和 SCL 引脚。同样，引脚 9、10、11 和 19 既可以用作通用输入输出引脚，也可以用作 SPI 总线引脚。引脚 8 和\
    \ 10 保留用于 UART 串行通信。\n\n提供两个电源输出：+3.3 V 和 +5.0 V。GPIO 引脚在 +3.3 V 逻辑电平下工作（不像许多其他计算机电路在\
    \ +5 V 下工作）。一个引脚可以是输入或输出。配置为输出时，引脚电压为 0 V（逻辑 0）或 +3.3 V（逻辑 1）。Raspberry Pi 5 通常使用外部电源（例如市电适配器）以\
    \ +5 V 输出运行。3.3 V 输出引脚可提供高达 16 mA 的电流。所有输出引脚的总电流不应超过 51 mA 的限制。将外部设备连接到 GPIO 引脚时应小心，因为抽取过大电流或短路引脚很容易损坏你的\
    \ Raspberry Pi。5 V 引脚可提供的电流量取决于许多因素，例如 Pi 本身所需的电流、USB 外设消耗的电流、摄像头电流、micro-HDMI\
    \ 端口电流等。\n\n配置为输入时，高于 +1.7 V 的电压将被视为逻辑 1，低于 +1.7 V 的电压将被视为逻辑 0。应注意不要向任何 I/O 引脚提供大于\
    \ +3.3 V 的电压，因为高电压很容易损坏你的 Raspberry Pi。Raspberry Pi 5 与该系列中的其他产品一样，没有过压保护电路。\n\
    \n## 8.3 项目 1 – 闪烁 LED\n\n**描述：** 这可能是你可以使用 Raspberry Pi 5 设计的最简单的硬件项目。在这个项目中，你将把一个\
    \ LED 连接到 Raspberry Pi 5 的一个端口，然后让 LED 每秒闪烁一次。该项目的目的是展示如何编写一个简单的 Python 程序，然后从文件运行它。该项目还展示了如何将\
    \ LED 连接到 Raspberry Pi 5 的 GPIO 引脚。此外，该项目展示了如何使用 GPIO 库来配置和设置 GPIO 引脚为逻辑 0 或 1。\n\
    \n**框图：** 该项目的框图如图 8.3 所示。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_114_0.png)\n\
    \n*图 8.3 项目的框图*\n\n**电路图：** 该项目的电路图如图 8.4 所示。一个小 LED 通过一个限流电阻连接到 Raspberry Pi\
    \ 5 的端口引脚 GPIO 17（引脚 11）。限流电阻的值计算如下：\n\nGPIO 引脚的输出高电平为 3.3 V。LED 两端的电压约为 1.8 V。流过\
    \ LED 的电流取决于所用 LED 的类型和所需的亮度。假设我们使用一个小 LED，我们可以假设 LED 的正向电流约为 3 mA。那么，限流电阻的值为：\n\
    \nR = (3.3 – 1.8) / 0.003 = 500 Ω。我们可以选择一个 470 Ω 的电阻。\n\n在图 8.4 中，LED 工作在电流源模式，其中\
    \ GPIO 引脚的高电平输出驱动 LED。LED 也可以工作在电流吸收模式，其中 LED 的另一端连接到 +3.3 V 电源而不是地。在电流吸收模式下，当\
    \ GPIO 引脚处于逻辑低电平时，LED 点亮。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_115_0.png)\n\
    \n图 8.4 项目的电路图\n\n**构建：** 该项目在面包板上构建，如图 8.5 所示。使用跳线将 LED 连接到 GPIO 端口。注意，LED 的短边必须接地。\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_115_1.png)\n\n图 8.5 在面包板上构建项目"
