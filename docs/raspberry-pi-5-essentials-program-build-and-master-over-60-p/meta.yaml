    The wildcard characters [a-z] can be used to match any single character in the
    specified character range. An example is given below which matches any files that
    start with the letters ''o'', ''p'', ''q'', ''r'', ''s'', and ''t'', and with
    the .txt extension:


    ```

    pi@raspberrypi: ~$ ls [o-t]*.txt

    test.txt

    pi@raspberrypi: ~$

    ```


    # Renaming a File


    You can rename a file using the mv command. In the example below, the name of
    file test.txt is changed to test2.txt:


    ```

    pi@raspberrypi: ~$ mv test.txt test2.txt

    pi@raspberrypi: ~$

    ```


    # Deleting a File


    The command rm can be used to remove (delete) a file. In the example below, the
    file test2.txt is deleted:


    ```

    pi@raspberrypi: ~$ rm test2.txt

    pi@raspberrypi: ~$

    ```


    The argument -v can be used to display a message when a file is removed. Also,
    the -i argument asks for confirmation before a file is removed. In general, the
    two arguments are used together as -vi. An example is given below:


    ```

    pi@raspberrypi: ~$ rm -vi test2.txt

    rm: remove regular file ''test2.txt''? y

    removed ''test2.txt''

    pi@raspberrypi: ~$

    ```


    # Sorting a file


    The command sort displays the contents of a file in ascending order. The general
    format of this command is:


    ```

    sort <options> <filename>

    ```


    Valid options are:


    | -u | removes duplicates from the output |

    | -r | sorts the output in descending order |

    | -o | writes the sorted output to a file |


    # Word count


    Command wc <filename> displays the word count in a file'
