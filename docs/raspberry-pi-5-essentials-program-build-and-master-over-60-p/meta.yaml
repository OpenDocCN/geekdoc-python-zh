    \ second\n    cnt = cnt + 1                     # increment cnt\n    if cnt >\
    \ 255:\n        cnt = 0\n```\n\n图8.15 修改后的程序\n\n## 8.6 项目4 – 圣诞灯（随机闪烁的8个LED）\n\
    \n**描述：** 在本项目中，八个LED像项目3一样连接到树莓派5的GPIO引脚。LED每0.5秒随机闪烁一次，就像花哨的圣诞灯一样。本项目的目的是展示如何生成1到255之间的随机数。\n\
