    \ mightyIT** is used (Figure 15.6)\n- Start the Raspberry Pi program:\n    \n\
    \    pi@raspberrypi:~ $ python bluetxt.py\n    \n- Start the smartphone apps and\
    \ select the paired Raspberry Pi 5 device (e.g. **raspberrypi**)\n- Enter a message\
    \ in column **Enter ASCII Command** and press **Send ASCII**. The message will\
    \ be sent to the Raspberry Pi 5.\n- Enter a message on the Raspberry Pi 5. This\
    \ message will be sent and displayed on the smartphone top part of the screen\n\
    - Figure 15.7 shows an example message exchange between the Raspberry Pi 5 and\
    \ the smartphone. In this example, the smartphone sends the message: **message\
    \ from the smartphone** and Raspberry Pi 5 sends the message:\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_293_0.png)\n\
    \nFigure 15.6 Android Bluetooth apps used in the project"
- md: "## 15.3 Project 2 – Bluetooth control of LED from a smartphone\n\n**Description:**\
    \ In this project, an LED is connected to port GPIO 21 (pin 40) of Raspberry Pi\
    \ 5 through a 470 Ohm current limiting resistor. The LED is controlled by sending\
    \ commands from an Android smartphone using Bluetooth communication.\n\nThe following\
    \ commands can be sent from the Android smartphone to control the LED:\n\n- L1\
    \ Turn the LED ON\n- L0 Turn the LED OFF\n\n**Block diagram:** Figure 15.8 shows\
    \ the block diagram of the project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_294_1.png)\n\
    \nFigure 15.8 Block diagram of the project\n\n**Program Listing:** Figure 15.9\
    \ shows the program listing of the project (**blueled.py**, do not call your program\
    \ **Bluetooth.py**!). The Bluetooth code is similar to TCP/IP code. The LED port\
    \ is defined and configured as output through the **gpiozero** module. The program\
    \ then creates a Bluetooth socket, binds and listens on this socket, and then\
    \ waits to accept a connection. The remainder of the program is executed in a\
    \ loop, where the program issues the statement **ClientSock.recv** and waits to\
    \ read data from the smartphone. Note that the smartphone app automatically appends\
    \ carriage-return and line-feed characters to the end of the data (i.e. **\\r\\\
    n**)\n\n```python\n#==================================================\n#    \
    \          LED CONTROL BY BLUETOOTH\n#              ====================\n#\n\
    # In this project an LED is connected to GPIO 21.The LED\n# LED is controlled\
    \ by sending commands from an Android\n# smart phone using a Bluetooth apps.\n\
    #\n# Valid commands are:\n# L1 Turn ON the LED\n# L0 Turn OFF the LED\n#\n# Author:\
    \ Dogan Ibrahim\n# File   : blueled.py\n# Date   : October, 2023\n#==================================================\n\
    import socket\nimport bluetooth\nfrom gpiozero import LED\n\n#\n# LED is at GPIO\
    \ 21, configure as output and turn OFF\n#\nled = LED(21)                     \
    \     # LED at port 21\nled.off()                              # LED off\n\n#\n\
    # Start of main program loop.Configure Bluetooth, create a\n# port, listen for\
    \ client connections, and accept connection\n#\nport = 1\nServerSock = bluetooth.BluetoothSocket(bluetooth.RFCOMM)\n\
    ServerSock.bind((\"\", port))\nServerSock.listen(1)\nClientSock, addr = ServerSock.accept()\n\
    \n#\n# Now receive commands and decode\n#\ntry:\n\n    while True:\n        data\
    \ = ClientSock.recv(1024)          # receive command\n        if data == b'L1\\\
    r\\n':                 # L1?\n            led.on()                          #\
    \ turn ON LED\n        elif data == b'L0\\r\\n':               # L0?\n       \
    \     led.off()                         # turn OFF LED\n\nexcept KeyboardInterrupt:\
    \                    # Interrupt\n    ServerSock.close()\n```\n\nFigure 15.9 Program\
    \ listing\n\n### Testing\n\nThe same Android app as in the previous project is\
    \ used. The steps are:\n\n- Make sure that the Bluetooth is enabled on both the\
    \ smartphone and Raspberry Pi 5 and that they are already paired\n- Start the\
    \ Raspberry Pi 5 program:\n\n    pi@raspberrypi:~ $ python blueled.py\n\n- Start\
    \ the apps as before. To send command **L1**, enter L1 and click **Send ASCII**.\
    \ The LED should turn ON.\n\n### Suggestion for additional work\n\nYou could enter\
    \ the program name in the following format inside file **/etc/rc.local** so that\
    \ the program starts automatically every time the Raspberry Pi 5 restarts:\n\n\
    ```\npython /home/pi/blueled.py &\n```\n\nWhen you finish your project, don't\
    \ forget to remove the above line from file **/etc/rc.local**; otherwise the program\
    \ will run every time your Raspberry Pi 5 is restarted. You should also shut down\
    \ your Raspberry Pi 5 orderly instead of just removing the power cable. The command\
    \ to shut down orderly is:\n\n```\npi@raspberrypi:~ $ sudo shutdown now\n```\n\
    \n## 15.4 Arduino UNO – Raspberry Pi 5 Bluetooth communication\n\nThe Arduino\
    \ Uno has no built-in Bluetooth module. You have to use an external Bluetooth\
    \ module to communicate with other devices via the Bluetooth protocol. You can,\
    \ however, easily use a serial Bluetooth module, such as the HC-06. In the next\
    \ section, you will develop a project and learn how to connect a HC-06 type low-cost\
    \ Bluetooth module to your Arduino UNO and communicate with the Raspberry Pi 5.\n\
    \n### 15.4.1 Project 3 - Communicating with an Arduino UNO over Bluetooth\n\n\
    **Description:** In this project, a button is connected to the Arduino UNO. Also,\
    \ a +3.3 V relay is connected to the Raspberry Pi 5. Pressing the button on the\
    \ Arduino sends command **L1** to Raspberry Pi 5 which then activates the relay\
    \ for 5 seconds. Similarly, sending **L0** deactivated the LED. The aim of this\
    \ project is to show how the Arduino UNO and Raspberry Pi 5 can communicate by\
    \ using an external Bluetooth module on the Arduino UNO.\n\n### The HC-06 Bluetooth\
    \ module\n\nHC-06 is a low-cost, popular 4-pin serially controlled module with\
    \ the following pins (see Figure 15.10):\n\nFigure 15.10 The HC-06 Bluetooth module\n\
    \nHC-06 is a serially controlled module, having the following basic specifications:\n\
    \n- +3.3 V to +6 V operation\n- 30 mA unpaired current (10 mA matched current)\n\
    - Built-in antenna\n- Band: 2.40 GHz – 2.48 GHz\n- Power level: +6 dBm\n- Default\
    \ communication: 9600 baud, 8 data bits, no parity, 1 stop bit\n- Signal coverage:\
    \ 30 feet\n- Safety feature: Authentication and encryption\n- Modulation mode:\
    \ Gauss frequency shift keying\n\n**Block diagram:** Figure 15.11 shows the block\
    \ diagram of the project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_297_0.png)\n\
    \n**Circuit diagram:** The circuit diagram is shown in Figure 15.12. The button\
    \ is connected to pin 2 of Arduino UNO through a pull-up resistor. The relay is\
    \ connected to port GPIO 21 of the Raspberry Pi 5. HC-06 is a serial device with\
    \ TX and RX pins. Only the RX input of the HC-06 is used, since in this project\
    \ you only send data to the Bluetooth module. The output pin voltage of the Arduino\
    \ UNO is +5 V, but HC-06 is not 5-V compatible. Therefore, a resistive voltage\
    \ divider circuit is used to lower the Arduino voltage to +3.3 V. TX pin of HC-06\
    \ is connected to pin 3 of Arduino UNO (pin 3 is configured as a software serial\
    \ port in software)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_298_0.png)\n\n\
    Figure 15.12 Circuit diagram of the project\n\n### Connecting to Arduino over\
    \ Bluetooth\n\nYou will find the MAC address of the HC-06 and then use this address\
    \ to connect to it. The default HC-06 passcode is **1234**. The steps to find\
    \ the MAC address are:\n\n- Construct the Arduino circuit (Figure 15.12) and apply\
    \ power so that HC-06 can be accessible. The red LED on HC-06 will be flashing\
    \ to indicate that it is not currently connected to any device.\n- Make your Raspberry\
    \ Pi 5 Bluetooth discoverable:\n\n    pi@raspberrypi:~ $ sudo hciconfig hci0 piscan\n\
    \n- Start the Bluetooth tool:\n\n    pi@raspberrypi:~ $ bluetoothctl\n\n- Turn\
    \ Bluetooth ON:\n\n    [bluetooth]# power on\n\n- Configure Bluetooth to run:\n\
    \n    [bluetooth]# agent on\n    [bluetooth]# default-agent\n\n- Make device discoverable:\n\
    \n    [bluetooth]# discoverable on\n\n- Scan for nearby Bluetooth devices, you\
    \ may have to wait several minutes:\n\n    [bluetooth]# scan on\n\nEnter command\
    \ **devices** to see the nearby Bluetooth devices. You may have to wait several\
    \ minutes for the display to update. You should see the HC-06 listed with its\
    \ MAC address.\n\n```\n[bluetooth]# devices\n```\n\nIn this example, the author's\
    \ HC-06 was identified with the MAC address: **98:D3:91:F9:6C:19**\n\nAfter finding\
    \ its MAC address, you may get information about the HC-06 by entering the following\
    \ command:\n\n```\n[bluetooth]# info 98:D3:91:F9:6C:19\n```\n\nWhich may be displayed\
    \ as in Figure 15.13:\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_299_0.png)\n\
    \nIf **Trusted: no** is displayed, enter command **trust 98:D3:91:F9:6C:19**\n\
    \nExit the Bluetooth tool by entering **Ctrl+Z** and then enter the following\
    \ statement to make a connection in command mode (enter your own HC-06 MAC address):\n\
    \n- pi@raspberrypi:~ $ sudo rfcomm connect hcio 98:D3:91:F9:6C:19 &\n- Enter **Ctrl+C**\
    \ to exit\n\nYou should be connected now and the red LED on HC-06 should stop\
    \ flashing. You are now ready to develop your programs for the Arduino UNO and\
    \ Raspberry Pi 5.\n\n**Raspberry Pi 5 program**: Figure 15.14 shows the Raspberry\
    \ Pi 5 program (**zeroprog.py**). In this program, we will not be using the Bluetooth\
    \ library. When we connect to the HC-06, a virtual serial terminal named **/dev/rfcomm0**\
    \ is created on the Raspberry Pi 5. You can read the commands sent by the HC-06\
    \ by opening this serial port and then reading the data."
  mdcn: "## 15.3 项目二 – 通过智能手机控制LED\n\n**描述：** 在本项目中，一个LED通过470欧姆限流电阻连接到树莓派5的GPIO 21端口（引脚40）。通过蓝牙通信，从安卓智能手机发送命令来控制该LED。\n\
    \n可以从安卓智能手机发送以下命令来控制LED：\n\n- L1 打开LED\n- L0 关闭LED\n\n**框图：** 图15.8展示了该项目的框图。\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_294_1.png)\n\n图15.8 项目框图\n\n**程序清单：**\
    \ 图15.9展示了该项目的程序清单（**blueled.py**，请勿将你的程序命名为**Bluetooth.py**！）。蓝牙代码与TCP/IP代码类似。LED端口通过**gpiozero**模块定义并配置为输出。然后程序创建一个蓝牙套接字，绑定并监听该套接字，接着等待接受连接。程序的剩余部分在一个循环中执行，程序发出**ClientSock.recv**语句并等待从智能手机读取数据。请注意，智能手机应用程序会自动在数据末尾附加回车和换行符（即**\\\
    r\\n**）。\n\n```python\n#==================================================\n#\
    \              LED CONTROL BY BLUETOOTH\n#              ====================\n\
    #\n# In this project an LED is connected to GPIO 21.The LED\n# LED is controlled\
    \ by sending commands from an Android\n# smart phone using a Bluetooth apps.\n\
    #\n# Valid commands are:\n# L1 Turn ON the LED\n# L0 Turn OFF the LED\n#\n# Author:\
    \ Dogan Ibrahim\n# File   : blueled.py\n# Date   : October, 2023\n#==================================================\n\
    import socket\nimport bluetooth\nfrom gpiozero import LED\n\n#\n# LED is at GPIO\
    \ 21, configure as output and turn OFF\n#\nled = LED(21)                     \
    \     # LED at port 21\nled.off()                              # LED off\n\n#\n\
    # Start of main program loop.Configure Bluetooth, create a\n# port, listen for\
    \ client connections, and accept connection\n#\nport = 1\nServerSock = bluetooth.BluetoothSocket(bluetooth.RFCOMM)\n\
    ServerSock.bind((\"\", port))\nServerSock.listen(1)\nClientSock, addr = ServerSock.accept()\n\
    \n#\n# Now receive commands and decode\n#\ntry:\n\n    while True:\n        data\
    \ = ClientSock.recv(1024)          # receive command\n        if data == b'L1\\\
    r\\n':                 # L1?\n            led.on()                          #\
    \ turn ON LED\n        elif data == b'L0\\r\\n':               # L0?\n       \
    \     led.off()                         # turn OFF LED\n\nexcept KeyboardInterrupt:\
    \                    # Interrupt\n    ServerSock.close()\n```\n\n图15.9 程序清单\n\n\
    ### 测试\n\n使用与上一个项目相同的安卓应用程序。步骤如下：\n\n- 确保智能手机和树莓派5上的蓝牙均已启用，并且它们已经配对\n- 启动树莓派5程序：\n\
    \n    pi@raspberrypi:~ $ python blueled.py\n\n- 像之前一样启动应用程序。要发送命令**L1**，请输入L1并点击**Send\
    \ ASCII**。LED应该会亮起。\n\n### 额外工作建议\n\n你可以在文件**/etc/rc.local**中以以下格式输入程序名称，以便每次树莓派5重启时程序自动启动：\n\
    \n```\npython /home/pi/blueled.py &\n```\n\n完成项目后，请不要忘记从文件**/etc/rc.local**中删除上述行；否则每次重启树莓派5时程序都会运行。你还应该有序地关闭树莓派5，而不是直接拔掉电源线。有序关闭的命令是：\n\
    \n```\npi@raspberrypi:~ $ sudo shutdown now\n```\n\n## 15.4 Arduino UNO – 树莓派5蓝牙通信\n\
    \nArduino Uno没有内置蓝牙模块。你必须使用外部蓝牙模块通过蓝牙协议与其他设备通信。然而，你可以轻松使用串行蓝牙模块，例如HC-06。在下一节中，你将开发一个项目，学习如何将HC-06型低成本蓝牙模块连接到你的Arduino\
    \ UNO，并与树莓派5通信。\n\n### 15.4.1 项目三 - 通过蓝牙与Arduino UNO通信\n\n**描述：** 在本项目中，一个按钮连接到Arduino\
    \ UNO。同时，一个+3.3V继电器连接到树莓派5。按下Arduino上的按钮会向树莓派5发送命令**L1**，然后树莓派5会激活继电器5秒。类似地，发送**L0**会停用LED。本项目的目的是展示如何使用Arduino\
    \ UNO上的外部蓝牙模块实现Arduino UNO和树莓派5之间的通信。\n\n### HC-06蓝牙模块\n\nHC-06是一种低成本、流行的4引脚串行控制模块，具有以下引脚（见图15.10）：\n\
    \n图15.10 HC-06蓝牙模块\n\nHC-06是一个串行控制模块，具有以下基本规格：\n\n- +3.3V至+6V工作电压\n- 未配对电流30mA（配对电流10mA）\n\
    - 内置天线\n- 频段：2.40 GHz – 2.48 GHz\n- 功率等级：+6 dBm\n- 默认通信：9600波特率，8数据位，无校验位，1停止位\n\
    - 信号覆盖范围：30英尺\n- 安全特性：身份验证和加密\n- 调制模式：高斯频移键控\n\n**框图：** 图15.11展示了该项目的框图。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_297_0.png)\n\
    \n**电路图：** 电路图如图15.12所示。按钮通过上拉电阻连接到Arduino UNO的引脚2。继电器连接到树莓派5的GPIO 21端口。HC-06是一个具有TX和RX引脚的串行设备。由于本项目只向蓝牙模块发送数据，因此只使用HC-06的RX输入。Arduino\
    \ UNO的输出引脚电压为+5V，但HC-06不兼容5V。因此，使用电阻分压电路将Arduino电压降低到+3.3V。HC-06的TX引脚连接到Arduino\
    \ UNO的引脚3（引脚3在软件中配置为软件串行端口）。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_298_0.png)\n\
    \n图15.12 项目电路图\n\n### 通过蓝牙连接到Arduino\n\n你将找到HC-06的MAC地址，然后使用此地址连接到它。HC-06的默认密码是**1234**。查找MAC地址的步骤如下：\n\
    \n- 构建Arduino电路（图15.12）并接通电源，以便可以访问HC-06。HC-06上的红色LED将闪烁，表示当前未连接到任何设备。\n- 使你的树莓派5蓝牙可被发现：\n\
    \n    pi@raspberrypi:~ $ sudo hciconfig hci0 piscan\n\n- 启动蓝牙工具：\n\n    pi@raspberrypi:~\
    \ $ bluetoothctl\n\n- 打开蓝牙：\n\n    [bluetooth]# power on\n\n- 配置蓝牙运行：\n\n    [bluetooth]#\
    \ agent on\n    [bluetooth]# default-agent\n\n- 使设备可被发现：\n\n    [bluetooth]# discoverable\
    \ on\n\n- 扫描附近的蓝牙设备，你可能需要等待几分钟：\n\n    [bluetooth]# scan on\n\n输入命令**devices**以查看附近的蓝牙设备。你可能需要等待几分钟才能看到显示更新。你应该会看到HC-06及其MAC地址被列出。\n\
    \n```\n[bluetooth]# devices\n```\n\n在此示例中，作者的HC-06被识别为MAC地址：**98:D3:91:F9:6C:19**\n\
    \n找到其MAC地址后，你可以通过输入以下命令获取有关HC-06的信息：\n\n```\n[bluetooth]# info 98:D3:91:F9:6C:19\n\
    ```\n\n显示可能如图15.13所示：\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_299_0.png)\n\
    \n如果显示**Trusted: no**，请输入命令**trust 98:D3:91:F9:6C:19**\n\n通过输入**Ctrl+Z**退出蓝牙工具，然后输入以下语句以在命令模式下建立连接（输入你自己的HC-06\
    \ MAC地址）：\n\n- pi@raspberrypi:~ $ sudo rfcomm connect hcio 98:D3:91:F9:6C:19 &\n\
    - 输入**Ctrl+C**退出\n\n你现在应该已经连接，HC-06上的红色LED应该停止闪烁。你现在可以开始为Arduino UNO和树莓派5开发程序了。\n\
    \n**树莓派5程序**：图15.14展示了树莓派5程序（**zeroprog.py**）。在此程序中，我们将不使用蓝牙库。当我们连接到HC-06时，会在树莓派5上创建一个名为**/dev/rfcomm0**的虚拟串行终端。你可以通过打开此串行端口然后读取数据来读取HC-06发送的命令。"
