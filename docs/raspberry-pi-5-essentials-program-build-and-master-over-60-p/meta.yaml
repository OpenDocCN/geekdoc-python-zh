    \ random library and other used libraries are imported to the program. The program\
    \ runs in a loop where the system time is recorded as soon as the LED is turned\
    \ ON. The program waits for the user to press the button, and the system time\
    \ is read again at this moment. The difference between this time and the first\
    \ time is displayed as the reaction time of the user. This process repeats after\
