    # Chapter 8 • Raspberry Pi 5 LED Projects


    # 8.1 Overview


    This chapter is about the Raspberry Pi 5 hardware interface and using LEDs in
    simple projects. The Raspberry Pi 5 is connected to external electronic circuits
    and devices using its GPIO (General Purpose Input Output) port connector. This
    is a 2.54 mm, 40-pin expansion header, arranged in a 2 × 20 strip as shown in
    Figure 8.1. The I/O ports are numbered as GPIO nn


    ![](img/4c39fa287d846ab9ea3e468319162ce0_113_0.png)


    # 8.2 Raspberry Pi 5 GPIO pin definitions


    When the GPIO connector is at the far side of the board, the pins starting from
    the left of the connector are numbered as 1, 3, 5, 7, and so on, while the ones
    at the top are numbered as 2, 4, 6, 8 and so on (Figure 8.2)


    ![](img/4c39fa287d846ab9ea3e468319162ce0_113_1.png)


