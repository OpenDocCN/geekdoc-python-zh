  md: '# 7.21 Example 1 – 4-Band resistor colour code identifier


    In this example, the user enters the three colours of a 4-band resistor and the
    program calculates and displays the value of the resistor in ohms. The tolerance
    of the resistor is not displayed.


    **Background Information**: Resistor values are identified by the following colour
    codes:


    +   - Black: 0

    - Brown: 1

    - Red: 2

    - Orange: 3

    - Yellow: 4

    - Green: 5

    - Blue: 6

    - Violet: 7

    - Grey: 8

    - White: 9


    The first two colours determine the first two digits of the value, while the last
    colour determines the multiplier. For example, **red red red** corresponds to
    $22 \times 10^2 = 2200 \Omega$.


    **Program Listing**: Figure 7.11 shows the program listing (program: **resistor.py**).
    At the beginning of the program, a list called **colour** is created which stores
    the valid resistor colours. Then a heading is displayed, and a **while** loop
    is created which runs as long as string variable **yn** is equal to y. Inside
    the loop, the program reads the three colours from the keyboard using functions
    **input** and stores as strings in variables **FirstColour**, **SecondColour**
    and **ThirdColour**. These strings are then converted into lower case so that
    they are compatible with the values listed in the list box. The index values of
    these colours in the list are then found using function calls of the form **colours.index**.
    Remember that the index values start from 0. As an example, if the user entered
    red, then the corresponding index value will be 2. The resistor value is then
    calculated by multiplying the first colour number by 10 and adding to the second
    colour number. The result is then multiplied by the power of 10 of the third colour
    index. The final result is displayed on the screen. The program then asks whether
    the user wants to continue. If the answer is **y** then the program returns to
    the beginning; otherwise the program is terminated.


    ```

    #========================================

    #           RESISTOR COLOUR CODES

    #           ---------------------

    #

    # The user enters the three colours of a resistor

    # and the program calculates and displays the value

    # of the resistor in Ohms

    #

    # Program: resistor.py

    # Date    : October, 2023

    ```'
