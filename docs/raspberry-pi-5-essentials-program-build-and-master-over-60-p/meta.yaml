    pi@raspberrypi:~/mypics $ ls

    ```


    *Figure 16.4 Created image files*


    After all the still JPEG files have been created, you may want to join the files
    together and create a video file. This can be done in several ways. In this section,
    we shall be using the software called **ffmpeg** which is already installed on
    Raspberry Pi 5.


    Now we can join our JPEG files together into a video file. Enter the following
    commands to move to the directory where the files are, and then join the still
    image files to create the video file **Mytimelapse.mp4**:'
  merge: -1
  pgno: 309
- img_proc: true
  md: '```

    pi@raspberrypi:~ $ cd mypics

    ```


    ```

    pi@raspberrypi:~/mypics $ ffmpeg -framerate 1 -i Mypics%04d.jpg -c:v libx264 -r
    30 Mytimelapse.mp4

    ```


    The above command takes all the input images, **-i Mypics%04d.jpg**. This will
    search for the image with the lowest digit and sets that as the starting image.
    It will then increment that number by one and if the image exists, it will be
    added to the sequence. Option **-framerate 1** is used to define how fast the
    pictures are read in, in this case, one picture per second. Omitting the frame
    rate will default to 25. **-r 30** is the frame rate of the output video. Again,
    if it defaults to 25 if not defined. The **-c:v libx264** specifies the codec
    to use to encode the video. **x264** is a library used for encoding video streams
    into the **H.264/MPEG-4 AVC** compression format.


    You can play the output video (**Mytimelapse.mp4**) file by double-clicking on
    it and selecting the **VLC media player** in your Desktop GUI. You can, if you
    wish, copy the created video file to your PC after installing and using the file
    copy software called **winSCP** on your PC. After the file is copied to your PC,
    you can play it using various video player software:


