    # 9.13 Project 10 – Automatic dusk lights


    **Description:** In this project, a light dependent resistor (LDR) is used to
    sense the darkness and a relay is activated when the ambient light intensity falls
    below the required level. It is possible to connect e.g. lights to the relay so
    that they turn ON automatically when, for example, it is dusk. The aim of this
    project is to show how to use an LDR in a Raspberry Pi project, and also how to
    connect and activate a relay.


    **Block Diagram:** Figure 9.32 shows the block diagram of the project.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_164_0.png)


    **Circuit Diagram:** As shown in Figure 9.33, the circuit diagram of the project
    is simple, and it consists of an LDR, a 10 kΩ potentiometer, and a relay. The
    LDR is connected to GPIO 4, and the relay to GPIO 17.


    The resistance of an LDR increases as the light level falls. The response of a
    typical LDR is shown in Figure 9.34. The LDR is connected as a resistive potential
    divider circuit. The voltage across the LDR increases as the light level falls.
    At dark, logic 0 will be sent to the Raspberry Pi, which in turn will activate
    the relay. When it is light, logic 1 will be sent to the Raspberry Pi, which will
    deactivate the relay. The potentiometer can be adjusted so that the relay is activated
    at the required light level. This process will require some trial and error.'
