    This is the last line of the example.\n\npi@raspberrypi: ~ $\n```\n\n总之，**nano**\
    \ 是一个简单而强大的文本编辑器，允许我们创建新的文本文件或编辑现有文件。\n\n## 5.2 vi 文本编辑器\n\n**vi** 文本编辑器已经存在多年，它一直是\
    \ Unix 操作系统的标准默认文本编辑器。**vi** 编辑器是一个功能齐全、强大的文本编辑器，可用于执行许多不同的任务。使用 **vi** 的唯一问题是它不太用户友好，学习可能需要一些时间。在本节中，我们将探讨该编辑器的基本功能，并了解如何在简单的编辑应用中使用它。\n\
    \n请注意，你不能在 **vi** 编辑器中使用键盘方向键。一些有用的 **vi** 编辑器命令如下所列：\n\n```\nZZ  保存更改并退出 vi\n\
    :wq 保存更改并退出 vi\n:q! 不保存更改退出\n\nh   将光标向左移动（向后）\nj   将光标向下移动\nk   将光标向上移动\nl  \
