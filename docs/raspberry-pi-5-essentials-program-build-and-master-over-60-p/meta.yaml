    **Program Listing:** Figure 14.16 shows the program listing (program: **serverled.py**).
    As in the previous program, a socket is created and port 5000 is used. LED is
    assigned to port GPIO pin 21, and turned OFF at the beginning of the program.
    The server waits for a connection from the client and then accepts the connection
    and displays the message **Connected**. It then waits to receive a command from
    the client. If the command is **ON**, then the LED is turned ON. If, on the other
    hand, the command is **OFF**, then the LED is turned OFF. Sending command **X**
    terminates the server connection and exits the program.


    ```


    #=================================================================

