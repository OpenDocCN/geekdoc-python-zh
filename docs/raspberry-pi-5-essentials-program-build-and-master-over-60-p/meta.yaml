    \ 1920x1080 [47.57 fps - (680, 692)/1920x1080 crop]\n           3280x2464 [21.19\
    \ fps - (0, 0)/3280x2464 crop]\npi@raspberrypi:~ $\n```\n\n*Figure 16.2 Available\
    \ cameras*\n\n`libcamera-jpeg -o mycamera.jpg` captures an image and saves it\
    \ in the file `mycamera.jpg`. To view the captured image, click to open File Manager\
    \ in Desktop GUI mode, scroll down and right-click on the image file `mycamera.jpg`\
    \ and select Image Viewer. You should see the image displayed on your monitor.\
    \ An example display is shown in Figure 16.3.\n\nNotice that there are several\
