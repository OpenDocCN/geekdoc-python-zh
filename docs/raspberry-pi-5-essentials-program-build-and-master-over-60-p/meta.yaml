    Now, going back to our project, we wish to run a script file every minute to capture
    still images. The script is given the filename **timelapse.sh**. The crontab command
    for this project should be as follows:


    ```

    */1 * * * * sh /home/pic/mypics/timelapse.sh 2>&1

