- md: "The specifications of the Pico hardware module are as follows:\n\n- 32-bit\
    \ RP2040 Cortex-M0+ dual-core processor operating at 133 MHz\n- 2 MB Q-SPI Flash\
    \ memory\n- 264 KB SRAM memory\n- 26 GPIO (+3.3 V compatible)\n- 3× 12-bit ADC\
    \ pins\n- Accelerated floating-point libraries on chip\n- On-board single-band\
    \ Infineon CYW43439 wireless chip, 2.4 GHz wireless interface (802.11b/g/n) and\
    \ Bluetooth 5.2\n- Serial Wire Debug (SWD) port\n- Micro-USB port (USB 1.1) for\
    \ power (+5 V) and data (programming)\n- 2× UART, 2× I²C, 2× SPI bus interface\n\
    - 16× PWM channels\n- 1× Timer (with 4 alarms), 1× Real-Time Clock\n- On-board\
    \ temperature sensor\n- On-board LED at GPIO0, controlled by the CYW43439 chip\n\
    - Castellated module, allowing soldering direct to carrier boards\n- 8× Programmable\
    \ IO (PIO) state machines for custom peripheral support\n- MicroPython, C, C++\
    \ programming\n- Drag & drop programming using mass storage over USB\n\nPico GPIO\
    \ hardware is +3.3 V compatible, and it is therefore important to be careful not\
    \ to exceed this voltage when interfacing external input devices to the GPIO pins.\
    \ +5 V to +3.3 V logic converter circuits or resistive potential divider circuits\
    \ must be used if it is required to interface devices with +5 V outputs to the\
    \ Pico GPIO pins.\n\nPico can be programmed using MicroPython or C/C++ languages.\
    \ It is assumed that the readers have Pico development boards with the MicroPython\
    \ installed. It will also be useful if the readers are familiar using Thonny with\
    \ the Pico. A book entitled **Raspberry Pi Pico W** and written by the author\
    \ is available from Elektor and interested readers might consider purchasing this\
    \ book for developing Pico-based projects.\n\nFigure 14.24 shows the pin configuration\
    \ of the Pico.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_275_0.png)\n\nFigure\
    \ 14.24 Pico pin configuration\n\n## 14.9.1 Project 7 – Raspberry Pi 5 and Raspberry\
    \ Pi Pico W communication – controlling a relay over Wi-Fi\n\n**Description:**\
    \ In this project, you have a Raspberry Pi 5 and Raspberry Pi Pico W. A push-button\
    \ is connected to Pico, and a +3.3 V relay is connected to the Raspberry Pi 5.\
    \ Pressing the button on the Pico sends a command to the Raspberry Pi over the\
    \ Wi-Fi to activate the relay. The relay remains active for 5 seconds. In this\
    \ project, Raspberry Pi and Pico communicate using the UDP protocol. Raspberry\
    \ Pi is the server and Pico is the client.\n\n**Block diagram:** Figure 14.25\
    \ shows the block diagram of the project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_276_0.png)\n\
    \n**Circuit diagram:** The circuit diagram of the project is shown in Figure 14.26\
    \ with the button and relay connected to the Pico and Raspberry Pi respectively.\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_276_1.png)\n\n**Pico program listing:**\
    \ Figure 14.27 shows the Pico program listing (**picoudp.py**). At the beginning\
    \ of the program, LED is assigned to port GP2 and is turned OFF. The Function\
    \ **Connect()** is called to connect to the local Wi-Fi network. Then, a socket\
    \ is created with port number 2000 and IP address 192.168.3.21. When the Button\
    \ is pressed, the program sends 1 to the Raspberry Pi 5 so that the LED can be\
    \ turned ON. This process is repeated after a 1-second delay.\n\n```\n#-----------------------------------------------------------------------\n\
    #       RASPBERRY PI PICO W - RASPBERRY PI 5 COMMS\n#       =========================================\n\
    #\n# In this project a pushbutton is connected to GP2 of PICO W.\n# Pressing the\
    \ button sends a command to Raspberry Pi 5 to\n# activate a relay. UDP protocol\
    \ is used in this project\n#\n# Author: Dogan Ibrahim\n# File  : picoudp.py\n\
    # Date  : October, 2023\n#-----------------------------------------------------------------------\n\
    from machine import Pin\nimport network\nimport socket\nimport utime\nglobal wlan\n\
    \nBUTTON = Pin(2, Pin.IN)                                # Button at GP2\n\n#\n\
    # This function attempts to connect to Wi-Fi\n#\ndef connect():\n    global wlan\n\
    \    wlan = network.WLAN(network.STA_IF)\n    while wlan.isconnected() == False:\n\
    \        print(\"Waiting to be connected\")\n        wlan.active(True)\n     \
    \   wlan.connect(\"TP-Link_6138_EXT\", \"24844604\")\n        utime.sleep(5)\n\
    \nconnect()\nprint(\"Connected\")\nUDP_PORT = 2000                           \
    \             # Port used\nUDP_IP = \"192.168.3.21\"                         \
    \        # Zero 2W IP\ncmd = b\"1\"                                          \
    \   # Cmd to turn ON\nsock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)\n\
    \nwhile True:\n    while BUTTON.value() == 1:                          # Not pressed\n\
    \        pass\n    while BUTTON.value() == 0:                          # Not released\n\
    \        pass\n    sock.sendto(cmd, (UDP_IP, UDP_PORT))                # Send\
    \ cmd\n    print(\"Command sent\")                               # Message\n \
    \   utime.sleep(1)                                      # Wait 1 sec\n```\n\n\
    Figure 14.27 Raspberry Pi Pico W program listing (picoudp.py)\n\n**Raspberry Pi\
    \ 5 program listing:** Figure 14.28 shows the Raspberry Pi 5 program listing (RPiudp.py).\
    \ At the beginning of the program the libraries used are imported, the relay control\
    \ output is configured at port GPIO 2 and is deactivated. Then a socket is created,\
    \ and the program binds to it with the Raspberry Pi 5 address. The program then\
    \ waits to receive a command from the Pico. The received command is stored in\
    \ variable **data** and if it is 1, then the relay is activated for 5 seconds.\
    \ At the end of this time, the relay is deactivated and the program repeats waiting\
    \ for a command.\n\n```\n#=================================================================\n\
    #       RASPBERRY PI PICO W - RASPBERRY PI 5 COMMS\n#       =========================================\n\
    #\n# This is the UDP server program running on Raspberry Pi 5.\n# The program\
    \ receives a command from PICO W and activates a\n# relay connected to GPIO 2\
    \ for 5 seconds\n#\n# Author: Dogan Ibrahim\n# File   : RPiudp.py\n# Date   :\
    \ October, 2023\n#=================================================================\n\
    from gpiozero import LED\nimport socket\nfrom time import sleep\n\nRELAY = LED(2)\
    \                     # Relay at port GPIO 2\nRELAY.off()                    \
    \    # RELAY off\n\nsock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)\n\
    sock.bind((\"192.168.3.196\", 2000))\n\ntry:\n    while True:\n        data, addr\
    \ = sock.recvfrom(1024)   # Get command\n        if data == b'1':            \
    \       # Command is 1?\n            RELAY.on()                     # Activate\
    \ Relay\n            sleep(5)                       # 5 seconds delay\n      \
    \      RELAY.off()                    # Deactivate Relay\n\nexcept KeyboardInterrupt:\
    \                  # Keyboard interrupt\n    print(\"\\nClosing connection to\
    \ client\")\n    sock.close()\n```\n\nFigure 14.28 Raspberry Pi 5 program listing\
    \ (RPiudp.py)\n\n## Testing the project\n\nThe steps to test the project are:\n\
    \n- Run the server on Raspberry Pi 5:\n\n    ```\n    pi@raspberry: ~$ python\
    \ RPiudp.py\n    ```\n\n- Run the Pico program in Thonny by clicking the green\
    \ Run button. You should see the message **Connected** when Pico connects to the\
    \ local router.\n\n- Push the button on Pico. The message **Command sent** will\
    \ be displayed on Pico terminal. A packet will be sent to Raspberry Pi 5 which\
    \ will turn ON the LED for 5 seconds.\n\n- Enter **Ctrl+C** to terminate the program.\n\
    \n## 14.10 Project 8 - Storing ambient temperature and atmospheric pressure data\
    \ on the Cloud\n\n**Description:** In this project, the ambient temperature and\
    \ atmospheric pressure are read and stored on the Cloud. A BME280 type sensor\
    \ module (see Chapter 10.6) is used in this project.\n\n**Block diagram:** The\
    \ block diagram of the project is shown in Figure 14.29.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_279_0.png)\n\
    \n*Figure 14.29 Block diagram of the project*\n\n**Circuit diagram:** Figure 14.30\
    \ shows the circuit diagram. SCL and SDA pins of BME280 are connected to SDA (pin\
    \ 3) and SCL (pin 5) of Raspberry Pi 5. The sensor is powered from +3.3 V."
