  md: '# 12.8 Project 5 – ON-OFF temperature controller


    **Description:** This is an on-off temperature controller project. The Sense HAT
    is connected to the Raspberry Pi 5 to measure the ambient temperature. Additionally,
    a small buzzer is connected to one of the ports of the Raspberry Pi. The set temperature
    value is hard-coded in the program. If the ambient temperature is lower than the
    set temperature, then the buzzer is activated, and the LED matrix displays the
    ambient temperature in red colour. If, on the other hand, the ambient temperature
    is higher than the set temperature value, then the buzzer is deactivated, and
    the ambient temperature is displayed in blue colour. The buzzer in this project
    can easily be replaced with a relay which can be connected to control a heater.
    The heater will turn ON if the ambient temperature is lower than the set value.


