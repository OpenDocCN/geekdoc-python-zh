    # Melodies


    When playing a melody, each note is played for a certain duration and with a certain
    frequency. In addition, a certain gap is necessary between two successive notes.
    The frequencies of the musical notes starting from middle C (i.e. C4) are given
    below. The harmonic of a note is obtained by doubling the frequency. For example,
    the frequency of C5 is 2 × 262 = 524 Hz.


    | Notes | C4 | C4# | D4 | D4# | E4 | F4 | F4# | G4 | G4# | A4 | A4# | B4 |

    |---|---|---|---|---|---|---|---|---|---|---|---|---|

    | Hz | 261.63 | 277.18 | 293.66 | 311.13 | 329.63 | 349.23 | 370 | 392 | 415.3
    | 440 | 466.16 | 493.88 |


    To play the tune of a melody, you need to know its musical notes. Each note is
    played for a certain duration and there is a certain time gap between two successive
    notes. The next thing we want is to know how to generate a sound with a required
    frequency and duration. In this project, we will be generating the classic **Happy
    Birthday** melody, and thus you need to know the notes and their durations. These
    are given in the table below, where the durations are in units of 400 milliseconds
    (i.e. the values given in the table should be multiplied by 400 to give the actual
    durations in milliseconds).


    | Note | C4 | C4 | D4 | C4 | F4 | E4 | C4 | C4 | D4 | C4 | G4 | F4 | C4 | C4 |
    C5 | A4 | F4 | E4 | D4 | A4 | B4 | A4 | F4 | G4 | F4 |

    |---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|

    | Duration | 1 | 1 | 2 | 2 | 2 | 3 | 1 | 1 | 2 | 2 | 2 | 3 | 1 | 1 | 2 | 2 | 2
    | 2 | 2 | 1 | 1 | 2 | 2 | 2 | 4 |


    Program Listing: The program listing (program: **Melody**) is shown in Figure
    9.48. The notes and their durations are stored in two lists called **Notes** and
    **Duration**, respectively. Before the main program loop, the durations of each
    tone are calculated and stored in the array **Duration** so that the main program
    loop does not have to spend any time doing'
