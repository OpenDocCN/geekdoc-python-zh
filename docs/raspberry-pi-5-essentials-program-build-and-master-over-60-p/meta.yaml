    Figure 9.18 Block diagram of the project


    **Circuit Diagram:** The dual MCP3002 ADC chip is used in this project to provide
    analog input capability to the Raspberry Pi. Figure 9.19 shows the circuit diagram
    of the project. A TMP36DZ type analog temperature sensor chip is connected to
    CH0 of the ADC. TMP36DZ is a 3-terminal small sensor chip with pins: Vs, GND,
    and Vo. Vs is connected to +3.3 V, GND is connected to system ground, and Vo is
    the analog output voltage. The temperature in degrees centigrade is given by:


    Temperature = (Vo – 500) / 10


    Where, Vo is the sensor output voltage in millivolts.


    CS, Dout, CLK, and Din pins of the ADC are connected to the SPI pins CE0, MISO,
    SCLK, and MOSI pins of the Raspberry Pi 5 respectively.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_156_1.png)


    Figure 9.19 Circuit diagram of the project


    **Program listing:** Figure 9.20 shows the Raspberry Pi Python program listing
    (program: **tmp36.py**). The function **get_adc_data** is used to read the analog
    data, where the channel number (channel_no) is specified in the function argument
    as 0 or 1. Function **get_adc_data** reads the temperature from the sensor chip
    MCP3002 and returns a digital value between 0 and 1023. This value is then converted
    into millivolts, 500 is subtracted from it, and the result is divided by 10 to
    find the temperature in degrees centigrade. The temperature is displayed on the
    monitor every second.'
