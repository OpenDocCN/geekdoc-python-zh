    # 7.22 Example 2 – Series or parallel resistors


    This program calculates the total resistance of a number of series or parallel
    connected resistors. The user specifies whether the connection is in series or
    in parallel. Additionally, the number of resistors used is also specified at the
    beginning of the program.


    **Background Information**: When a number of resistors are in series, then the
    resultant resistance is the sum of the resistance of each resistor. When the resistors
    are in parallel, then the reciprocal of the resultant resistance is equal to the
    sum of the reciprocal resistances of each resistor.


    **Program Listing**: Figure 7.13 shows the program listing (program: **serpal.py**).
    At the beginning of the program, a heading is displayed, and the program enters
    into a **while** loop. Inside this loop, the user is prompted to enter the number
    of resistors in the circuit and whether they are connected in series or in parallel.
    The function **str** converts a number into its equivalent string. e.g. number
    5 is converted into the string "5". If the connection is serial (mode equals to
    ''s'') then the value of each resistor is accepted from the keyboard and the resultant
    is calculated and displayed on the screen. If on the other hand, the connection
    is parallel (mode is equal to ''p''), then again the value of each resistor is
    accepted from the keyboard and the reciprocal of the number is added to the total.
