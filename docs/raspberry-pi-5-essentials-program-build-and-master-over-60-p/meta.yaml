- md: "## 9.7 Project 4 – Voltmeter – Output to the screen\n\n**Description:** This\
    \ is a voltmeter project. Because the Raspberry Pi 5 does not have any analog-to-digital\
    \ converters (ADC) on-board, an external ADC chip is used in this project. The\
    \ voltage to be measured is applied to the ADC and its value is displayed on the\
    \ screen.\n\n**Block diagram:** Figure 9.10 shows the block diagram.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_148_0.png)\n\
    \nFigure 9.10 Block diagram\n\n**Circuit Diagram:** The dual MCP3002 ADC chip\
    \ is used in this project to provide analog input capability to the Raspberry\
    \ Pi 5. This chip has the following features:\n\n- 10-bit resolution (0 to 1023\
    \ quantization levels)\n- On-chip sample and hold\n- SPI bus compatible\n- Wide\
    \ operating voltage (+2.7 V to +5.5 V)\n- 75 KSPS sampling rate\n- 5 nA standby\
    \ current, 50 µA active current\n\nThe MCP3002 is a successive-approximation 10-bit\
    \ ADC with on-chip sample-and-hold amplifier. The device is programmable to operate\
    \ as either a differential input pair or as dual single-ended inputs. The device\
    \ is offered in an 8-pin package. Figure 9.11 shows the pin configuration of the\
    \ MCP3002.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_149_0.png)\n\nThe pin definitions\
    \ are as follows:\n\n- **Vdd/Vref:** Power supply and reference voltage input\n\
    - **CH0:** Channel 0 analog input\n- **CH1:** Channel 1 analog input\n- **CLK:**\
    \ SPI clock input\n- **DIN:** SPI serial data in\n- **DOUT:** SPI serial data\
    \ out\n- **CS/SHDN:** Chip select/shutdown input\n\nIn this project, the supply\
    \ voltage and the reference voltage are set to +3.3 V. Thus, the digital output\
    \ code is given by:\n\nDigital output code = 1024 x Vin / 3.3\n\nor, Digital output\
    \ code = 310.30 x Vin\n\nEach quantization level corresponds to 3300/1024 = 3.22\
    \ mV. Thus, for example, input data '00 000001' corresponds to 3.22 mV, '00 000010'\
    \ corresponds to 6.44 mV and so on.\n\nThe MCP3002 ADC has two configuration bits:\
    \ SGL/DIFF and ODD/SIGN. These bits follow the sign bit and are used to select\
    \ the input channel configuration. The SGL/DIFF is used to select single ended\
    \ or pseudo-differential mode. The ODD/SIGN bit selects which channel is used\
    \ in single-ended mode and is used to determine polarity in pseudo-differential\
    \ mode. In this project, we are using channel 0 (CH0) in single-ended mode. According\
    \ to the MCP3002 data sheet, SGL/DIFF and ODD/SIGN must be set to 1 and 0 respectively.\n\
    \nFigure 9.12 shows the circuit diagram of the project, where the voltage to be\
    \ measured is applied directly to the CH0 input of the ADC. MCP3002 operates with\
    \ the SPI interface. Raspberry Pi 5 GPIO SPI pins are:\n\n**SPI0:**\nMISO - pin\
    \ 21\nMOSI - pin 19\nCE0 - pin 24\nSCLK - pin 23\n\n**SPI1:**\nMISO - pin 35\n\
    MOSI - pin 38\nCE1 - pin 11\nSCLK - pin 40\n\nIn this project, SPI0 GPIO pins\
    \ are used.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_150_0.png)\n\nFigure 9.12\
    \ Circuit diagram of the project\n\n**Program listing:** The SPI interface must\
    \ be enabled on the Raspberry Pi 5 before using the SPI functions. The steps are:\n\
    \n- Start the configuration menu from the command prompt:\n  \n  pi@raspberrypi:~\
    \ $ sudo raspi-config\n  \n- Go down the menu to **Interface Options**\n- Go down\
    \ and select **SPI**\n- Enable the SPI interface\n- Select **Finish** to complete\n\
    \nRaspberry Pi 5 Essentials\n\nFigure 9.13 shows the program listing (**voltmeter.py**).\
    \ The function **get_adc_data** is used to read the analog data, where the channel\
    \ number (channel_no) is specified in the function argument as 0 or 1. Notice\
    \ that we have to send the start bit, followed by the SGL/DIFF and ODD/SIGN bits\
    \ and the MSBF bit to the chip.\n\nIt is recommended to send leading zeroes on\
    \ the input line before the start bit. This is often done when using microcontroller-based\
    \ systems that must send 8 bits at a time.\n\nThe following data can be sent to\
    \ the ADC (SGL/DIFF = 1 and ODD/SIGN = channel_no) as bytes with leading zeroes\
    \ for more stable clock cycle. The general data format is:\n\n```\n0000 000S DCM0\
    \ 0000 0000 0000\n```\n\nWhere, S = start bit, D = SGL/DIFF bit, C = ODD/SIGN\
    \ bit, M = MSBF bit\n\nFor channel 0: 0000 0001 1000 0000 0000 0000 (0x01, 0x80,\
    \ 0x00)\n\nFor channel 1: 0000 0001 1100 0000 0000 0000 (0x01, 0xC0, 0x00)\n\n\
    Notice that the second byte can be sent by adding 2 to the channel number (to\
    \ make it 2 or 3) and then shifting 6 bits to the left as shown above to give\
    \ 0x80 or 0xC0.\n\nThe chip returns 24-bit data (3 bytes) and we must extract\
    \ the correct 10-bit ADC data from these 24 bits. The 24-bit data is in the following\
    \ format ('X' is don't care bit):\n\n```\nXXXX XXXX XXXX DDDD DDDD DDXX\n```\n\
    \nAssuming that the returned data is stored in 24-bit variable ADC, we have:\n\
    \n```\nADC[0] = \"XXXX XXXX\"\nADC[1] = \"XXXX DDDD\"\nADC[2] = \"DDDD DDXX\"\n\
    ```\n\nThus, we can extract the 10-bit ADC data with the following operations:\n\
    \n```\n(ADC[2] >> 2)          so, low byte = '00DD DDDD'\nand\n(ADC[1] & 15) <<\
    \ 6)    so, high byte = 'DD DD00 0000'\n```\n\nAdding the low byte and the high\
    \ byte, we get the 10-bit converted ADC data as:\n\n```\nDD DDDD DDDD\n```\n\n\
    The SPI bus on the Raspberry Pi supports the following functions:\n\n| Function\
    \ | Description |\n| :--- | :--- |\n| open (0,0) | Open SPI bus 0 using CE0 |\n\
    | open (0,1) | Open SPI bus 0 using CE1 |\n| close() | disconnect the device from\
    \ the SPI bus |\n| writebytes([array of bytes]) | Write an array of bytes to SPI\
    \ bus device |\n| readbytes(len) | Read **len** bytes from SPI bus device |\n\
    | xfer2([array of bytes]) | Send an array of bytes to the device with CEx asserted\
    \ at all times |\n| xfer([array of bytes]) | Send an array of bytes de-asserting\
    \ and asserting CEx with every byte transmitted |\n\nAt the beginning of the program\
    \ in Figure 9.13 an instance of the SPI is created. Function **get_adc_data**\
    \ reads the temperature from the sensor chip MCP3002 and returns a digital value\
    \ between 0 and 1023. This value is then converted into millivolts and is displayed\
    \ on the screen. Figure 9.14 shows an example output from the project where the\
    \ input CH0 was connected to GND or to +3.3 V.\n\n```\n#-----------------------------------------------------------------\n\
    #                       VOLTMETER\n#                       =========\n#\n# This\
    \ is a voltmeter project. The voltage to be measured is applied\n# to CH0 input\
    \ of the MCP3002 ADC. The measured voltage is displayed\n# on the screen using\
    \ a print statement\n#\n# Program: voltmeter.py\n# Date    : October, 2023\n#\
    \ Author  : Dogan Ibrahim\n#-----------------------------------------------------------------\n\
    import spidev\nfrom time import sleep\n\n#\n# Create SPI instance and open the\
    \ SPI bus\n#\nspi = spidev.SpiDev()\nspi.open(0,0)                       # we\
    \ are using CE0 for CS\nspi.max_speed_hz = 4000\n\n#\n# This function returns\
    \ the ADC data read from the MCP3002\n#\ndef get_adc_data(channel_no):\n    ADC\
    \ = spi.xfer2([1, (2 + channel_no) << 6, 0])\n    rcv = ((ADC[1] & 15) << 6) +\
    \ (ADC[2] >> 2)\n    return rcv\n```\n\n```\n#\n# Start of main program. Read\
    \ the analog temperature, convert\n# into degrees Centigrade and display on the\
    \ monitor every second\n#\nwhile True:\n    adc = get_adc_data(0)\n    mV = adc\
    \ * 3300.0 / 1023.0            # convert to mV\n    print(\"Voltage = %5.2f mV\"\
    \ %mV)       # display voltage in mV\n    sleep(1)                           \
    \    # wait one second\n```\n\nFigure 9.13 Program listing\n\n```\npi@raspberrypi:~\
    \ $ python voltmeter.py\nVoltage = 3287.10 mV\nVoltage = 3296.77 mV\nVoltage =\
    \ 3290.32 mV\nVoltage = 3290.32 mV\nVoltage = 3274.19 mV\nVoltage =   0.00 mV\n\
    Voltage =   0.00 mV\nVoltage =   0.00 mV\nVoltage =   0.00 mV\nVoltage = 3300.00\
    \ mV\nVoltage = 3280.65 mV\nVoltage = 3277.42 mV\nVoltage = 3290.32 mV\n```\n\n\
    Figure 9.14 Example output from the program\n\n## 9.8 Project 5 – Voltmeter –\
    \ Output to LCD\n\n**Description:** This project is basically the same as the\
    \ previous one, but here the measured voltage is displayed on LCD.\n\n**Block\
    \ diagram:** Figure 9.15 shows the block diagram.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_153_0.png)\n\
    \n**Circuit Diagram:** The circuit diagram of the project is shown in Figure 9.16.\
    \ The LCD and the MCP3002 are connected as in the previous projects."
  mdcn: "## 9.7 项目4 – 电压表 – 输出到屏幕\n\n**描述：** 这是一个电压表项目。由于树莓派5板载没有模数转换器（ADC），本项目使用了一个外部ADC芯片。待测电压被施加到ADC上，其数值显示在屏幕上。\n\
    \n**框图：** 图9.10展示了框图。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_148_0.png)\n\
    \n图9.10 框图\n\n**电路图：** 本项目使用双通道MCP3002 ADC芯片为树莓派5提供模拟输入功能。该芯片具有以下特性：\n\n- 10位分辨率（0到1023量化级）\n\
    - 片上采样保持\n- SPI总线兼容\n- 宽工作电压（+2.7 V至+5.5 V）\n- 75 KSPS采样率\n- 5 nA待机电流，50 µA工作电流\n\
    \nMCP3002是一款带片上采样保持放大器的逐次逼近型10位ADC。该器件可编程配置为差分输入对或双路单端输入。该器件采用8引脚封装。图9.11展示了MCP3002的引脚配置。\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_149_0.png)\n\n引脚定义如下：\n\n- **Vdd/Vref：**\
    \ 电源和参考电压输入\n- **CH0：** 通道0模拟输入\n- **CH1：** 通道1模拟输入\n- **CLK：** SPI时钟输入\n- **DIN：**\
    \ SPI串行数据输入\n- **DOUT：** SPI串行数据输出\n- **CS/SHDN：** 片选/关断输入\n\n在本项目中，电源电压和参考电压均设置为+3.3\
    \ V。因此，数字输出码由下式给出：\n\n数字输出码 = 1024 x Vin / 3.3\n\n或，数字输出码 = 310.30 x Vin\n\n每个量化级对应3300/1024\
    \ = 3.22 mV。例如，输入数据'00 000001'对应3.22 mV，'00 000010'对应6.44 mV，依此类推。\n\nMCP3002\
    \ ADC有两个配置位：SGL/DIFF和ODD/SIGN。这些位跟随符号位，用于选择输入通道配置。SGL/DIFF用于选择单端或伪差分模式。ODD/SIGN位在单端模式下选择使用哪个通道，在伪差分模式下用于确定极性。在本项目中，我们使用通道0（CH0）的单端模式。根据MCP3002数据手册，SGL/DIFF和ODD/SIGN必须分别设置为1和0。\n\
    \n图9.12展示了项目的电路图，其中待测电压直接施加到ADC的CH0输入。MCP3002通过SPI接口工作。树莓派5的GPIO SPI引脚为：\n\n**SPI0：**\n\
    MISO - 引脚21\nMOSI - 引脚19\nCE0 - 引脚24\nSCLK - 引脚23\n\n**SPI1：**\nMISO - 引脚35\n\
    MOSI - 引脚38\nCE1 - 引脚11\nSCLK - 引脚40\n\n本项目使用SPI0 GPIO引脚。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_150_0.png)\n\
    \n图9.12 项目电路图\n\n**程序清单：** 在使用SPI功能之前，必须在树莓派5上启用SPI接口。步骤如下：\n\n- 从命令提示符启动配置菜单：\n\
    \  \n  pi@raspberrypi:~ $ sudo raspi-config\n  \n- 向下导航到**接口选项**\n- 向下选择**SPI**\n\
    - 启用SPI接口\n- 选择**完成**以结束\n\n树莓派5基础\n\n图9.13展示了程序清单（**voltmeter.py**）。函数**get_adc_data**用于读取模拟数据，其中通道号（channel_no）在函数参数中指定为0或1。注意，我们必须向芯片发送起始位，随后是SGL/DIFF和ODD/SIGN位以及MSBF位。\n\
    \n建议在起始位之前在输入线上发送前导零。这在使用必须一次发送8位的基于微控制器的系统时经常这样做。\n\n以下数据可以作为字节发送到ADC（SGL/DIFF\
    \ = 1且ODD/SIGN = channel_no），并带有前导零以获得更稳定的时钟周期。通用数据格式为：\n\n```\n0000 000S DCM0\
    \ 0000 0000 0000\n```\n\n其中，S = 起始位，D = SGL/DIFF位，C = ODD/SIGN位，M = MSBF位\n\n\
    对于通道0：0000 0001 1000 0000 0000 0000 (0x01, 0x80, 0x00)\n\n对于通道1：0000 0001 1100\
    \ 0000 0000 0000 (0x01, 0xC0, 0x00)\n\n注意，第二个字节可以通过将通道号加2（使其变为2或3）然后左移6位来发送，如上所示，得到0x80或0xC0。\n\
    \n芯片返回24位数据（3字节），我们必须从这24位中提取正确的10位ADC数据。24位数据格式如下（'X'为无关位）：\n\n```\nXXXX XXXX\
    \ XXXX DDDD DDDD DDXX\n```\n\n假设返回的数据存储在24位变量ADC中，我们有：\n\n```\nADC[0] = \"XXXX\
    \ XXXX\"\nADC[1] = \"XXXX DDDD\"\nADC[2] = \"DDDD DDXX\"\n```\n\n因此，我们可以通过以下操作提取10位ADC数据：\n\
    \n```\n(ADC[2] >> 2)          因此，低字节 = '00DD DDDD'\n和\n(ADC[1] & 15) << 6)   \
    \ 因此，高字节 = 'DD DD00 0000'\n```\n\n将低字节和高字节相加，我们得到10位转换后的ADC数据为：\n\n```\nDD DDDD\
    \ DDDD\n```\n\n树莓派上的SPI总线支持以下功能：\n\n| 功能 | 描述 |\n| :--- | :--- |\n| open (0,0)\
    \ | 使用CE0打开SPI总线0 |\n| open (0,1) | 使用CE1打开SPI总线0 |\n| close() | 断开设备与SPI总线的连接\
    \ |\n| writebytes([字节数组]) | 将字节数组写入SPI总线设备 |\n| readbytes(len) | 从SPI总线设备读取**len**个字节\
    \ |\n| xfer2([字节数组]) | 在CEx始终有效的情况下向设备发送字节数组 |\n| xfer([字节数组]) | 在每个字节传输时断言和取消断言CEx来发送字节数组\
    \ |\n\n在图9.13程序的开头，创建了一个SPI实例。函数**get_adc_data**从传感器芯片MCP3002读取温度，并返回一个介于0和1023之间的数字值。然后将该值转换为毫伏并显示在屏幕上。图9.14展示了项目的示例输出，其中输入CH0连接到GND或+3.3\
