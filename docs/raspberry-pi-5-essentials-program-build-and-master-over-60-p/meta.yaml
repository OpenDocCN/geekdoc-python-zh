    \ (2 + channel_no) << 6, 0])\n    rcv = ((ADC[1] & 15) << 6) + (ADC[2] >> 2)\n\
    \    return rcv\n```\n\n```\n#\n# 主程序开始。读取模拟温度，转换为摄氏度，\n# 并每秒在显示器上显示一次\n#\nwhile\
    \ True:\n    adc = get_adc_data(0)\n    mV = adc * 3300.0 / 1023.0           \
    \ # 转换为mV\n    print(\"电压 = %5.2f mV\" %mV)          # 显示电压（单位：mV）\n    sleep(1)\
    \                               # 等待一秒\n```\n\n图9.13 程序清单\n\n```\npi@raspberrypi:~\
    \ $ python voltmeter.py\n电压 = 3287.10 mV\n电压 = 3296.77 mV\n电压 = 3290.32 mV\n电压\
    \ = 3290.32 mV\n电压 = 3274.19 mV\n电压 =   0.00 mV\n电压 =   0.00 mV\n电压 =   0.00 mV\n\
    电压 =   0.00 mV\n电压 = 3300.00 mV\n电压 = 3280.65 mV\n电压 = 3277.42 mV\n电压 = 3290.32\
    \ mV\n```\n\n图9.14 程序示例输出\n\n## 9.8 项目5 – 电压表 – 输出到LCD\n\n**描述：** 本项目与上一个项目基本相同，但此处测得的电压显示在LCD上。\n\
