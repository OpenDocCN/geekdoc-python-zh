- md: "Circuit diagram: Figure 9.47 shows the circuit diagram of the project. A passive\
    \ buzzer is connected to port GPIO 21 (pin 40) of the Raspberry Pi 5. A transistor\
    \ switch can be used to increase the voltage level of the buzzer (this can be\
    \ omitted, and the buzzer can be directly connected to GPIO 21 if desired). Any\
    \ NPN bipolar transistor can be used in this project. The + terminal of the buzzer\
    \ can be connected to either +3.3 V or to +5V for higher output from the buzzer.\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_173_0.png)\n\nFigure 9.47 Circuit diagram\
    \ of the project\n\n## Melodies\n\nWhen playing a melody, each note is played\
    \ for a certain duration and with a certain frequency. In addition, a certain\
    \ gap is necessary between two successive notes. The frequencies of the musical\
    \ notes starting from middle C (i.e. C4) are given below. The harmonic of a note\
    \ is obtained by doubling the frequency. For example, the frequency of C5 is 2\
    \ × 262 = 524 Hz.\n\n| Notes | C4 | C4# | D4 | D4# | E4 | F4 | F4# | G4 | G4#\
    \ | A4 | A4# | B4 |\n|---|---|---|---|---|---|---|---|---|---|---|---|---|\n|\
    \ Hz | 261.63 | 277.18 | 293.66 | 311.13 | 329.63 | 349.23 | 370 | 392 | 415.3\
    \ | 440 | 466.16 | 493.88 |\n\nTo play the tune of a melody, you need to know\
    \ its musical notes. Each note is played for a certain duration and there is a\
    \ certain time gap between two successive notes. The next thing we want is to\
    \ know how to generate a sound with a required frequency and duration. In this\
    \ project, we will be generating the classic **Happy Birthday** melody, and thus\
    \ you need to know the notes and their durations. These are given in the table\
    \ below, where the durations are in units of 400 milliseconds (i.e. the values\
    \ given in the table should be multiplied by 400 to give the actual durations\
    \ in milliseconds).\n\n| Note | C4 | C4 | D4 | C4 | F4 | E4 | C4 | C4 | D4 | C4\
    \ | G4 | F4 | C4 | C4 | C5 | A4 | F4 | E4 | D4 | A4 | B4 | A4 | F4 | G4 | F4 |\n\
    |---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|\n\
    | Duration | 1 | 1 | 2 | 2 | 2 | 3 | 1 | 1 | 2 | 2 | 2 | 3 | 1 | 1 | 2 | 2 | 2\
    \ | 2 | 2 | 1 | 1 | 2 | 2 | 2 | 4 |\n\nProgram Listing: The program listing (program:\
    \ **Melody**) is shown in Figure 9.48. The notes and their durations are stored\
    \ in two lists called **Notes** and **Duration**, respectively. Before the main\
    \ program loop, the durations of each tone are calculated and stored in the array\
    \ **Duration** so that the main program loop does not have to spend any time doing\
    \ these calculations. Inside the program loop, the melody notes are generated\
    \ with the required durations. A small delay (100 ms) is introduced between each\
    \ tone. The melody is repeated after five seconds of delay. You can try higher\
    \ notes for clearer sound, and use speakers instead of a buzzer.\n\n```\n#--------------------------------------------------\n\
    #           PLAY A MELODY (Happy Birthday)\n#           =========================\n\
    #\n# This program plays the melody Happy Birthday through a buzzer\n#\n# Program:\
    \ melody.py\n# Date    : October, 2023\n# Author  : Dogan Ibrahim\n#--------------------------------------------------\n\
    from gpiozero import TonalBuzzer\nfrom gpiozero.tones import Tone\nfrom time import\
    \ sleep\n\nt = TonalBuzzer(21)\n\nNotes = ['C4','C4','D4','C4','F4','E4','C4','C4','D4','C4','G4',\n\
    \         'F4','C4','C4','C5','A4','F4','E4','D4','A4','B4','A4','F4','G4','F4']\n\
    \nDuration = [1,1,2,2,2,3,1,1,2,2,2,3,1,1,2,2,2,2,2,1,1,2,2,2,4]\n\nlength = len(Notes)\n\
    \nwhile True:\n    for i in range(length):\n        t.play(Notes[i])\n       \
    \ sleep(Duration[i] * 0.4)\n        sleep(0.1)\n    t.stop()\n    sleep(5)\n```\n\
