    \ and their own commands. As we have seen in earlier parts of this chapter, Python\
    \ has many built-in functions for various operations such as arithmetic, trigonometric,\
    \ string manipulation and so on. User-defined functions are created by programmers.\
    \ In this section, we shall be looking at how functions can be created and used\
    \ in our programs.\n\nA user-defined function consists of the following:\n\n-\
    \ Functions begin with the keyword **def**, followed by the function name, and\
    \ round brackets, followed by a colon sign.\n- Input arguments to the function\
    \ must be placed inside the brackets at the beginning of the function definition.\n\
    - The body of a function must be indented with the same number of spaces on the\
    \ left-hand side.\n- An optional text message can be displayed at the first line\
    \ of a function to describe what the function does.\n- A function must be terminated\
    \ with the return statement.\n\nAn example function, named **Mult** is given below.\
    \ This function takes two numbers first and second as its arguments, multiplies\
    \ them, and returns the result:\n\n```python\ndef Mult(first, second):\n    \"\
    This is a simple multiplication function\"\n    result = first * second\n    return\
    \ result\n```\n\nA function is called from the main program by specifying the\
    \ name of the function and enclosing any arguments in a pair of brackets. For\
    \ example, to call the above function to multiply numbers 5 and 3 and store the\
    \ result in a variable called 'a', we include the following statement in our program:\n\
    \n```python\na = Mult(5, 3)\n```\n\nWe can also call a function by specifying\
    \ the keyword arguments. i.e.:\n\n```python\na = Mult(first = 5, second = 3)\n\
    ```\n\nFigure 7.19 shows the above example in a Python program.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_93_0.png)\n\
    \nAnother example is shown in Figure 7.20. In this example, the function displays\
    \ a string passed as an argument. Notice that there is no data returned from this\
    \ function.\n\n```python\n>>> def Prnt(strng):\n...     print(strng)\n...    \
    \ return\n...\n>>> Prnt(\"Hello there\")\nHello there\n```\n\nFigure 7.20 A function\
    \ displaying a string\n\nThe variables used in a function are local to that function.\
    \ Thus, for example, if there are two variables with the same name, one inside\
