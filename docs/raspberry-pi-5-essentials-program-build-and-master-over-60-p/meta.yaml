    \ and 0 processes are stopped\n- The percentage of CPU utilization is 0.0 'us'\
    \ for user applications (us)\n- The percentage of CPU utilization for system applications\
    \ is 0.0 (sy)\n- There are no processes requiring more or less priority (ni)\n\
    - 100% of the time the CPU is idle (id)\n- There are no processes waiting for\
