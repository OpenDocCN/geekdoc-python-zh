    \ the change\n- Reboot your Raspberry Pi\n- `pi@raspberrypi:~ $ sudo reboot now`\n\
    \nNotice that there are two versions of the Sense HAT board. Version 1.0 has no\
    \ colour sensor, while Version 2.0 has a colour sensor. You may get a warning\
    \ message saying that it failed to initialize the colour sensor if you are using\
    \ Version 1.0.\n\nYou can also display a single letter using the statement: `sense.show_letter`,\
    \ for example, `sense.show_letter(\"A\")`. Notice that the letter is displayed\
    \ permanently.\n\nIn addition to displaying text in default mode, you can use\
    \ the following options:\n\n**scroll_speed**: This floating-point number changes\
    \ the speed that the text scrolls. The default value is 0.1. A higher number slows\
    \ down the scroll speed.\n\n**text_colour**: Used to change the text colour. The\
    \ colour is specified as (Red, Green, Blue) where each colour can take a value\
    \ between 0 and 255, and we can mix the colours to obtain any other colour. For\
    \ example, (255, 0, 0) is red and so on.\n\n**back_colour**: Used to change the\
    \ colour of the background. Colour is defined as in the text_colour option.\n\n\
    In the following example, the same text as above is scrolled slowly, in red colour,\
    \ with yellow background colour:\n\n```python\n>>> from sense_hat import SenseHat\n\
    >>> sense = SenseHat()\n>>> sense.show_message(\"Sense HAT\", scroll_speed=0.3,\n\
    \    text_colour=[255,0,0], back_colour=[255,255,0])\n```\n\nNotice that in the\
    \ above program, the text is displayed only once, but the background colour remains\
    \ as yellow.\n\nIf, for example, you wish to repeat displaying the text, say every\
    \ two seconds, then the required program is as shown in Figure 12.2 (program:\
    \ **txt.py**). Notice how the continuation line is used in Python. Run the program\
    \ from the Console mode as:\n\n```\npi@raspberrypi:~ $ python txt.py\n```\n\n\
    ```python\n#--------------------------------------------------\n#            \
    \      Display Text\n#                  -----------\n#\n# This program displays\
    \ the text Sense HAT every 2 seconds.\n# the text colour is RED and back ground\
    \ colour is YELLOW\n#\n# Author: Dogan Ibrahim\n# File   : txt.py\n# Date   :\
    \ October, 2023\n#-------------------------------------------------------\nfrom\
    \ sense_hat import SenseHat\nimport time\nsense = SenseHat()\n\nwhile True:\n\
    \    sense.show_message(\"Sense HAT\",scroll_speed=0.3,\n    text_colour=[255,0,0],back_colour=[255,255,0])\n\
    \    time.sleep(2)\n```\n\nFigure 12.2 Program listing\n\nThe `sense.clear()`\
    \ statement can be used to turn OFF all the LEDs. This may be necessary to ensure\
    \ that all the LEDs are turned OFF at the beginning of a program. Similarly, a\
    \ colour can be passed to the clear statement to set all the LEDs to the same\
    \ colour, such as:\n\n```python\nred = (255, 0, 0)\nsense.clear(red)\n```\n\n\
    The brightness of the LED matrix can be changed by toggling the `low_light` statement.\
    \ In the following examples, the brightness is toggled:\n\n```python\nsense.low_light\
    \ = True\nor\nsense.low_light = False\n```\n\nThe displayed text (or image) can\
    \ be rotated by using the statement `set_rotation(n)` where `n` is the rotation\
    \ angle in degrees, and it can take the values of 0, 90, 180, 270. The following\
    \ statement rotates character s by 90 degrees and displays it on the LED matrix:\n\
    \n```python\nsense.set_rotation(90)\nsense.show_letter(\"s\")\n```\n\nText (or\
    \ image) can be flipped horizontally or vertically by using the statements `flip_h`\
    \ or `flip_v` respectively. In the following example, the character **X** is flipped\
    \ horizontally and is then displayed:\n\n```python\nsense.flip_h\nsense.show_letter(\"\
    X\")\n```\n\n## 12.5 Project 2 – Test your math skills – multiplication\n\n**Description:**\
    \ This project is aimed for younger readers who may want to test their multiplication\
    \ skills. The program displays two numbers which are required to be multiplied\
    \ together. The result of the multiplication is hidden for 10 seconds, and time\
    \ is given to the user to find the correct answer. After 10 seconds, the correct\
    \ answer is displayed so that the user can check it against his/her answer. Only\
    \ numbers from 1 to 99 are considered for simplicity.\n\nFigure 12.3 shows the\
    \ program listing (program: **mult.py**). Two integer random numbers are generated\
    \ between 1 and 99 and are stored in variables **no1** and **no2**. Variable **question**\
    \ holds the question as a string and this is displayed in green colour as shown\
    \ in the following example:\n\n25 × 10 =\n\nThe program waits for 10 seconds and\
    \ after this time, the result 250 is displayed in red colour. After 2 seconds,\
    \ the LEDs are cleared, and the program continues displaying two new numbers.\n\
    \n```python\n#--------------------------------------------------\n#          \
    \    Multiplication Test\n#              ------------------\n#\n# This program\
    \ displays two numbers between 1 and 99 and waits\n# for 10 seconds until the\
    \ user finds the correct answer. The\n# correct answer is then displayed so that\
    \ the user can check with\n# his/her answer\n#\n# Author: Dogan Ibrahim\n# File\
    \   : mult.py\n# Date   : October, 2023\n#--------------------------------------------------\n\
    from sense_hat import SenseHat\nsense = SenseHat()\nimport time\nimport random\n\
    spd = 0.2                          # Scroll speed\nred = (255, 0, 0)         \
    \         # Red colour\ngreen = (0, 255, 0)                # Green colour\n\n\
    try:\n\n    while True:\n        no1 = random.randint(1,99)         # First number\n\
    \        no2 = random.randint(1, 99)        # Second number\n        question\
    \ = str(no1) + \"x\" + str(no2) + \"=\"\n        sense.show_message(question,\
    \ scroll_speed = spd, text_colour=(green))\n        time.sleep(10)\n        result\
    \ = str(no1 * no2)\n        sense.show_message(result, scroll_speed = spd, text_colour=(red))\n\
    \        time.sleep(2)\n        sense.clear()\n        time.sleep(1)\n\nexcept\
    \ KeyboardInterrupt:\n    exit()\n```\n\nFigure 12.3 Program listing\n\n## 12.6\
    \ Project 3 – Learning the times tables\n\n**Description**: This project helps\
    \ the children to practise their times tables. A number (which can be changed)\
    \ is hard-coded into the program. The program displays the times table for the\
    \ selected number. For example, if the hard-coded number is 5 then the following\
    \ is displayed on the LED matrix:\n\n- 5x1=5\n- 5x2=10\n- 5x3=15\n- 5x4=20\n-\
    \ 5x5=25\n- 5x6=30\n- 5x7=35\n- 5x8=40\n- 5x9=45\n- 5x10=50\n- 5x11=55\n- 5x12=60\n\
    \nFigure 12.4 shows the program listing (program: **timestab.py**). Variable **Tablefor**\
    \ stores the number whose times table is required. A loop is formed which goes\
    \ from 0 to 11. Inside this loop, variable **j** takes on values from 1 to 12.\
    \ Variable **result** stores the result of the multiplication at each iteration\
    \ of the loop. String variable **disp** stores the data to be displayed by the\
    \ LED matrix at each iteration. Users can easily change the value of **Tablefor**\
    \ to generate times table for another number.\n\n```python\n#-------------------------------------------------------------------\n\
    #                       Times Table\n#                       -----------\n#\n\
    # This program generates a times table. The table is selected at the\n# beginning\
    \ of the program by setting variable Tablefor.\n#\n# Author: Dogan Ibrahim\n#\
    \ File  : timestab.py\n# Date  : October, 2023\n#---------------------------------------------------------------\n\
    from sense_hat import SenseHat\nsense = SenseHat()\nimport time\n\nspd = 0.2 \
    \                                   # Scroll speed\nred = (255, 0, 0)        \
    \                    # Red colour\nTablefor = 5                              \
    \   # Table for 5\n\ntry:\n\n    for k in range(12):                      # Do\
    \ 0 to 11\n        j = k + 1                            # 1 to 12\n        result\
    \ = Tablefor * j\n        disp = str(Tablefor) + \"x\" + str(j) + \"=\" + str(result)\n\
    \        sense.show_message(disp, scroll_speed = spd, text_colour=(red))\n   \
    \     time.sleep(1)\n        sense.clear()\n\nexcept KeyboardInterrupt:\n    exit()\n\
    ```\n\nFigure 12.4 Program listing\n\n## 12.7 Project 4 – Display the temperature,\
    \ humidity, and pressure\n\n**Description:** In this project we display the ambient\
    \ temperature, humidity, and pressure on the Sense HAT.\n\nFigure 12.5 shows the\
    \ program listing (program: **thp.py**). The program runs in a loop every two\
    \ seconds where the temperature, humidity, and pressure readings are displayed\
    \ on the scrolling LED. Notice that the readings are all in floating-point format,\
    \ and the `round()` function is used to configure them to have one digit after\
    \ the decimal point.\n\n```python\n#---------------------------------------------------------------\n\
    #           TEMPERATURE,HUMIDITY & PRESSURE\n#           -------------------------------\n\
    #\n# This program reads the temperature, humidity and pressure and\n# displays\
    \ on the scrolling LEDs. The data is displayed in the\n# following format:\n#\n\
    #  T=nn.nC H=nn.n% P=nnnn.nmb\n#\n```"
