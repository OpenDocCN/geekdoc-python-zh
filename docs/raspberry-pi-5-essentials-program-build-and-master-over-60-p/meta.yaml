- img_proc: true
  md: 'Figure 11.4 shows the program listing (program: **squaredac.py**). GPIO 26
    is used as the **CS** pin. The **frequency** variable is set to 1000, which is
    the required frequency. Function DAC sends the 12-bit input data to the DAC. This
    function has two parts. In the first part, the HIGH byte is sent after adding
    0x30 as described above. Function **xfer2** is used to send the data to the DAC.
    In the second part of the function, the LOW byte is extracted and is sent to the
    DAC. Notice that we could have sent both the high byte and the low byte using
    the same **xfer2** function, as follows:


    ```

    highbyte = (data >> 8) & 0x0F

    highbyte = highbyte + 0x30


    lowbyte = data & 0xFF

    xfer2([highbyte, lowbyte])

    ```


    Variable **ONvalue** is set to 2000 × 4095/3300, which is the digital value corresponding
    to 2000 mV (i.e. 2 V, remember that the 12-bit DAC has 4095 steps, and the reference
    voltage is set to 3300 mV). The **OFFvalue** is set to 0 V. Normally, the delay
    between the ON and OFF times should have been equal to **halfperiod**. However,
    it was found by experiment that the DAC routine takes about 0.2 ms (0.0002 second)
    and this changes the period and consequently the frequency of the output waveform.
    Because of this, 2 mV is subtracted from **halfperiod** as shown in Figure 13.9


    ```

    #-------------------------------------------------------------------

    #                       GENERATE SQUARE WAVEFORM

    #                       =====================

    #

    # This program generates square waveform with the frequency 1kHz.

    # In this program the MC4921 DAC chip is used to set the output

    # peak voltage to 2V

    #

    # Author: Dogan Ibrahim

    # File   : squaredac.py

    # Date   : October, 2023

    #-------------------------------------------------------------------

    from gpiozero import LED

    from time import sleep

    import spidev                                    # Import SPI


    spi = spidev.SpiDev()

    spi.open(0, 0)                                   # Bus=0, device=0

    spi.max_speed_hz = 3900000


    CS = LED(26)                                     # GPIO26 is CS output

    CS.on()                                          # DIsable CS


    frequency = 1000                                 # Required Frequency

    ```'
