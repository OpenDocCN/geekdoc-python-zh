  - "[PAGE 145]\n\nYou are now ready to write the program. Figure 9.7 shows the program\
    \ listing (**lcd.py**). At the beginning of the program, the LCD driver libraries\
    \ **lcd_api** and **i2c_lcd** are imported to the program. The heading SECONDS\
    \ COUNTER is displayed at the top row (row 1) and the program enters a loop. Inside\
    \ this loop the variable **cnt** is incremented every second and the total value\
    \ of **cnt** is displayed on the LCD continuously in the following format:\n\n\
    SECONDS COUNTER\nnn\n\n```\n#-------------------------------------------------------\n\
    #           I2C LCD SECONDS COUNTER\n#           =====================\n#\n# In\
    \ this program an I2C LCD is connected to the Raspberry Pi.\n# The program counts\
    \ up in seconds and displays on the LCD.\n#\n# At the beginning of the program\
    \ the text SECONDS COUNTER is\n# displayed\n#\n# Program: lcd.py\n# Date    :\
    \ October 2017\n# Author  : Dogan Ibrahim\n#-------------------------------------------------------\n\
    import time\nfrom lcd_api import LcdApi\nfrom i2c_lcd import I2cLcd\n\nI2C_ADDR\
    \ = 0x27\nI2C_NUM_ROWS = 2\nI2C_NUM_COLS = 16\n\nmylcd = I2cLcd(1,I2C_ADDR,I2C_NUM_ROWS,I2C_NUM_COLS)\n\
    \nmylcd.clear()                    # clear LCD\nmylcd.putstr(\"SECONDS COUNTER\"\
    ) # display string\n\ncnt = 0                          # initialize cnt\n\nwhile\
    \ True:                      # infinite loop\n    cnt = cnt + 1              \
    \  # increment count\n    mylcd.move_to(0,1)\n    mylcd.putstr(str(cnt))     \
    \  # display cnt\n    time.sleep(1)                # wait one second\n```\n\n\
    Figure 9.7 Program listing"
  - '[PAGE 146]


    The I2C LCD library supports many functions. Some of the commonly used functions
    are (see the LCD library documentation for more details):


    +   - clear(): clear LCD and set to home position

    - show_cursor(): show cursor

    - hide_cursor(): hide cursor

    - blink_cursor_on(): blink cursor

    - blink_cursor_off(): stop blinking cursor

    - display_on(): display on

    - display_off(): display off

    - backlight_on(): backlight on

    - backlight_off(): backlight off

    - move_to(x, y): move cursor to (x, y)

    - putchar(): display a character

    - putstr(): display a string


