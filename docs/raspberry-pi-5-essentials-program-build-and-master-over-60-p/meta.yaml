  - '[PAGE 132]


    +   - The duration of a dot is taken as the unit time, and this determines the
    speed of the transmission. Normally, the speed of transmission is quoted in words
    per minute (wpm). The standard required minimum in Morse code communication is
    12 wpm.

    - The duration of a dash is 3 unit times

    - The time between each dot and dash is one unit time

    - The time between the letters is 3 unit times

    - The time between the words is 7 unit times


    The unit time in milliseconds is calculated using the following formula:


    Time (ms) = 1200/wpm


    In this project, the Morse code is simulated at 10 wpm. Thus, the unit time is
    taken to be 1200/10 = 120 ms.


    | Letter | Morse code |

    | :--- | :--- |

    | A: | .- |

    | B : | -... |

    | C : | -.-. |

    | D : | -.. |

    | E : | . |

