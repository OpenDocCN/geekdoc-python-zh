    # Scheduling the Time-lapse


    The process we have described to capture still time-lapse images requires the
    Raspberry Pi 5 to be connected to a computer (or a monitor) so that the commands
    can be issued from the command line. In this section, you will see how to schedule
    the time-lapse process so that it starts automatically after the Raspberry Pi
    5 is powered up, without the need to connect a monitor or a computer. This can
    be done using the software tool called **crontab** as described below.


    With the command **crontab** you can specify a list of tasks to be scheduled at
    specified times of the day, and at specified days of the week. You should run
    crontab by entering the following command:


    ```

    pi@raspberrypi:~ $ crontab -e

    ```


    The first time you run **crontab** you should be asked to select an editor. Select
    **nano** (option 1) as this is the easiest editor to use. **crontab** consists
    of six components for minutes, hours, day of the month, month of the year, day
    of the week, and the command to be executed, organized as shown in Figure 16.5.'
