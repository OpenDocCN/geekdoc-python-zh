    \   : Cloud.py\n# Date   : October, 2023\n#-----------------------------------------------------------------------\n\
    import socket\nfrom time import sleep\nfrom bme280pi import Sensor\n\nsensor =\
    \ Sensor(address = 0x76)\n\nAPIKEY = \"9D8X6FABBQLX45LK\"                # Thingspeak\
    \ API key\nhost = \"api.thingspeak.com\"                 # Thingspeak host\n\n\
    #\n# Send data to Thingspeak. This function sends the temperature and\n# humidity\
    \ data to the cloud every 30 seconds\n#\nwhile True:\n    sock = socket.socket()\n\
    \    addr = socket.getaddrinfo(\"api.thingspeak.com\",80)[0][-1]\n    sock.connect(addr)\n\
    \    data = sensor.get_data()\n    p = data['pressure']                    # Pressure\
    \ in hPa\n    t = data['temperature']                 # Temperature in C\n   \
    \ path = \"api_key=\"+APIKEY+\"&field1=\"+str(p)+\"&field2=\"+str(t)\n    sock.send(bytes(\"\
    GET /update?%s HTTP/1.0\\r\\nHost: %s\\r\\n\\r\\n\"\n%(path,host),\"utf8\"))\n\
    \    sleep(5)\n    sock.close()\n    sleep(25)\n```\n\n图 14.34 程序清单\n\n第 14 章\
    \ • 通过 Wi-Fi 通信\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_284_0.png)\n\n图 14.35\
