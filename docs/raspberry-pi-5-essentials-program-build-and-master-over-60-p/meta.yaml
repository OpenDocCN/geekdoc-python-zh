    # Preface


    The Raspberry Pi 5 is a credit-card-sized computer from Raspberry Pi that can
    be used in many applications, such as in audio and video media centers, as a desktop
    computer, in industrial controllers, robotics, and in many domestic and commercial
    applications. In addition to the many features found in other Raspberry Pi computers,
    the Raspberry Pi 5 offers Wi-Fi and Bluetooth 5.0 (with BLE support), which makes
    it highly desirable in remote and Internet-based control and monitoring applications.


    The Raspberry Pi 5 is based on a 64-bit quad-core ARM Cortex-A76 processor running
    at 2.4 GHz. This implies a performance boost of two to three times compared to
    the Raspberry Pi 4. Raspberry Pi 5 comes with an enhanced graphic performance,
    using an 800 MHz VideoCore VII graphics chip. Additionally, the Raspberry Pi 5
    features the RP1 southbridge chip made by Raspberry Pi. With the help of this
    RP1 southbridge, Raspberry Pi 5 delivers higher performance and more functionality
    for peripheral devices. It should now be possible to carry out many real-time
    operations such as audio digital signal processing, real-time digital control
    and monitoring, and many other real-time operations using this tiny powerhouse.


    This book is about the Raspberry Pi 5 computer and its use in various control
    and monitoring applications. The book explains in simple terms and with many tested
    and working example projects how to configure the Raspberry Pi 5 computer, how
    to use the latest operating system (Bookworm), and how to write application programs
    using the popular Python programming language.


    The book starts with an introduction to the Raspberry Pi 5 computer and covers
    the important topics of accessing the computer locally and remotely. Use of the
    console command language as well as accessing and using the desktop GUI have been
    described with working examples.


    The remaining parts of the book cover many Raspberry-Pi-5-based hardware projects
    using components and devices such as LEDs, buzzers, LCDs, ultrasonic sensors,
    temperature sensors, Sense HAT, camera modules, etc. Example projects are given
    using Wi-Fi and Bluetooth modules to send and receive data from smartphones, from
    the PC, and sending real-time temperature and atmospheric pressure data to the
    cloud.


    All the projects presented in the book have been tested and are working. Complete
    circuit diagrams and full program listings are given for each project, with detailed
    descriptions of the operation of each project. The following subheadings are used
    in every project wherever necessary:


    +   - Project title

    - Project description

    - Block diagram

    - Circuit diagram

    - Program listing

    - Suggestions for future work'
