    \n## 修改后的程序\n\n图8.14所示的程序可以通过将LED端口号存储在列表中进行修改，使其更加友好。修改后的程序**LEDCNT2.py**如图8.15所示。在此程序中，LED端口号存储在列表PORT中。然后，像以前一样使用函数**Port_Output**将端口数据发送到LED。\n\
