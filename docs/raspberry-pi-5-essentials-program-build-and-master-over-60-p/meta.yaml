    # 10.2 The Matplotlib graph plotting library


    Matplotlib is a Python plotting library that is used to create two-dimensional
    graphs. Before using this package, it has to be installed on your Raspberry Pi
    5 using the following command:


    ```

    pi@raspberrypi:~ $ sudo apt-get install python3-matplotlib

    ```


    You must import module matplotlib at the beginning of our programs before we can
    use Matplotlib using the statement:


    ```

    import matplotlib.pyplot as plt

    ```


    Perhaps the easiest way to learn how to use Matplotlib is to look at an example.


    Notice that graphs can only be plotted in Desktop mode. If you are not using a
    directly connected monitor, then you should start the VNC server on your Raspberry
    Pi and then start the VNCViewer on your PC to get into the Desktop mode.


