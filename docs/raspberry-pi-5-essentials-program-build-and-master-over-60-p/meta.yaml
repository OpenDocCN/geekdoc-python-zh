    ```


    Figure 16.11 shows the channel number as 12 in this example.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_316_0.png)


    Now, we have to install the OBEX software onto our Raspberry Pi 5. Enter the following
    command:


    ```

    pi@raspberrypi:~ $ sudo apt-get install obexftp

    ```


    We are now ready to develop our program (**bell.py**), which is shown in Figure
    16.12. The button and relay are initialized at the beginning of the program and
    **os** module is imported since we want to run a shell command from within our
    Python program. The program then enters an endless loop using the **while** statement.
    Inside this loop, the program waits until the button is pressed. At this point,
    the camera takes a picture using a **libcamera** command and stores in a file
    called **door.jpg**. The relay is also activated for 5 seconds. The picture is
    then sent to the smartphone using OBEX.


    ```

    #------------------------------------------------------------------

    #

    #                   WHO IS AT MY DOOR

    #                   ================

    #

    # In this program a camera, aa pushbutton switch and a relay are all

    # connected to Raspberry Pi 5. The camera is positioned outside the

    # door so that it can see whos is outside the door.Pressing the button

    # activates the relay for 5 seconds and then takes a picture of the

    # person outside the door and sends it to a smart phone over Bluetooth.

    #

    # Program: bell.py

    # Date    : October, 2023

    ```'
  merge: -1
  pgno: 316
- img_proc: true
  md: "Raspberry Pi 5 Essentials\n\n```\n# Author : Dogan Ibrahim\n#---------------------------------------------------------------\n\
    from gpiozero import LED, Button\nfrom time import sleep            # import time\
    \ library\nimport os\n\nbutton = Button(20)                # Button at GPIO 20\n\
    relay = LED(21)                    # Relay at GPIO 21\nrelay.off()\n\nwhile True:\n\
    \    sleep(1)\n    if button.is_pressed:          # If button\n        relay.on()\
    \                 # Relay on for 5 secs\n        sleep(5)\n        relay.off()\n\
    \        os.system(\"obexftp --nopath --uuid none --noconn --bluetooth 50:50:A4:0F:62:3F\
    \ --channel 12 -p door.jpg\")\n    else:\n        relay.off()\n```\n\nFigure 16.12\
    \ Program listing\n\nFigure 16.13 shows how the program is run and its output\
    \ on the screen. You should wait for the file transfer to complete, since it may\
    \ take some time. A confirmation message is sent to the smartphone before the\
    \ file transfer takes place. You should click the **ACCEPT** button to receive\
    \ the picture as shown in Figure 16.14.\n\n```\npi@raspberrypi:~ $ python bell.py\n\
    Suppressing FBS.\nConnecting..\\done\nSending \"door.jpg\"...\\done\nDisconnecting..|done\n\
    Suppressing FBS.\nConnecting..\\done\nSending \"door.jpg\"...|^C\n```\n\nFigure\
    \ 16.13 Running the program\n\n• 318"
