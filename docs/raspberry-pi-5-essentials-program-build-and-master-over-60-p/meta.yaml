    #                       GENERATE TRIANGLE WAVEFORM\n#                       =========================\n\
    #\n# This program generates triangle waveform\n#\n# Author: Dogan Ibrahim\n# File\
    \   : triangle.py\n# Date   : October, 2023\n#-----------------------------------------------------------------------\n\
    from gpiozero import LED\nfrom time import sleep                       # Import\
    \ time\nimport spidev                                # Import SPI\n\nspi = spidev.SpiDev()\n\
    spi.open(0, 0)                               # Bus=0, device=0\nspi.max_speed_hz\
    \ = 3900000\n\nCS = LED(26)\nCS.on()                                      # Disable\
    \ CS\nsample = 0\nInc = 0.05\n\n#\n# This function implements the DAC. The data\
    \ in \"data\" is sent\n# to the DAC\n#\ndef DAC(data):\n    CS.off()         \
    \                 # Enable CS\n#\n# Send HIGH byte\n#\n    temp = (data >> 8)\
    \ & 0x0F         # Get upper byte\n    temp = temp + 0x30                # OR\
    \ with 0x30\n    spi.xfer2([temp])                 # Send to DAC\n#\n# Send LOW\
    \ byte\n#\n    temp = data & 0xFF                # Get lower byte\n    spi.xfer2([temp])\
    \                 # Send to DAC\n\n    CS.on()                           # Disable\
    \ CS\n\ntry:\n    while True:\n        DACValue = int(sample*4095)   # Value \
    \ to send\n        DAC(DACValue)                 # Send to DAC\n        sleep(0.0001)\
    \                 # Wait\n        sample = sample + Inc         # Next sample\n\
    \        if sample > 1.0 or sample < 0:\n            Inc = -Inc\n            sample\
    \ = sample + Inc\n\nexcept KeyboardInterrupt:\n    pass\n```\n\nFigure 11.8 Program\
    \ listing\n\nAn example output waveform taken from the oscilloscope is shown in\
    \ Figure 11.9.\n\n## 11.6 Project 4 - Generating an arbitrary wave signal\n\n\
    **Description:** In this project, you will be using the DAC to generate an arbitrary\
    \ waveform. One period of the shape of the waveform will be sketched and values\
    \ of the waveform at different points will be extracted and loaded into a lookup\
    \ table. The program will output the data points at the appropriate times to generate\
    \ the required waveform.\n\nThe shape of one period of the waveform to be generated\
    \ is shown in Figure 11.10. Notice that the waveform has a period of 20 ms.\n\n\
    The waveform takes the following values:\n\n| Time (ms) | Amplitude (V) | Time\
    \ (ms) | Amplitude (V) |\n| :--- | :--- | :--- | :--- |\n| 0 | 0 | 11 | 3.00 |\n\
    | 1 | 0.375 | 12 | 3.00 |\n| 2 | 0.75 | 13 | 2.625 |\n| 3 | 1.125 | 14 | 2.25\
    \ |\n| 4 | 1.50 | 15 | 1.875 |\n| 5 | 1.875 | 16 | 1.50 |\n| 6 | 2.25 | 17 | 1.125\
    \ |\n| 7 | 2.625 | 18 | 0.75 |\n| 8 | 3.00 | 19 | 0.375 |\n| 9 | 3.00 | 20 | 0\
    \ |\n| 10 | 3.00 | | |\n\nThe block diagram and circuit diagram of the project\
    \ are as in Figure 11.2 and Figure 11.3.\n\n**Program Listing:** Figure 11.11\
    \ shows the program listing (program: **arbit.py**). The sample points of the\
    \ waveform are stored in a list called **wave**. Variable **sample** indexes this\
    \ list and sends the sample values to the DAC. The time of each sample was specified\
    \ to be 1 ms. It was found by experiment that a 0.8 ms delay gave the correct\
    \ results because of the delay in the DAC routine.\n\n```python\n#-----------------------------------------------------------------------\n\
    #                   GENERATE ARBITRARY WAVEFORM\n#                   =========================\n\
    #\n# This program generates an arbitrary waveform whose sample points\n# are defined\
    \ in the program\n#\n# Author: Dogan Ibrahim\n# File   : arbit.py\n# Date   :\
    \ October, 2023\n#-----------------------------------------------------------------------\n\
    from gpiozero import LED\nfrom time import sleep                     # Import\
    \ time\nimport spidev                              # Import SPI\n\nspi = spidev.SpiDev()\n\
    spi.open(0, 0)                             # Bus=0, device=0\nspi.max_speed_hz=3900000\n\
    \nCS = LED(26)                               # GPIO26 is CS output\nCS.on()  \
    \                                  # Disable CS\nsample = 0\n\n#\n# Waveform sample\
    \ points\n#\nwave = [0,0.375,0.75,1.125,1.5,1.875,2.25,2.625,3,3,3,3,3,\n2.625,2.25,1.875,1.5,1.125,0.75,0.375,0]\n\
    \n#\n# This function implements the DAC. The data in \"data\" is sent\n# to the\
    \ DAC\n#\ndef DAC(data):\n    CS.off()                               # Enable\
    \ CS\n#\n# Send HIGH byte\n#\n    temp = (data >> 8) & 0x0F            # Get upper\
    \ byte\n    temp = temp + 0x30                    # OR with 0x30\n    spi.xfer2([temp])\
    \                     # Send to DAC\n\n    temp = data & 0xFF\n    spi.xfer2([temp])\n\
    \n    CS.on()                               # Disable CS\n\ntry:\n    while True:\n\
    \        DACValue = int(wave[sample]*4095/3.3)  # Value  to send\n        DAC(DACValue)\
    \                          # Send to DAC\n        sample = sample + 1        \
    \            # Inc sample index\n        sleep(0.0008)                       \
    \   # Wait\n        if sample == 20:                       # If 20 samples\n \
    \           sample = 0\n\nexcept KeyboardInterrupt:\n    pass\n```\n\nFigure 11.11\
    \ Program listing\n\nAn example output waveform taken from the oscilloscope is\
    \ shown in Figure 11.12.\n\nFigure 11.12 Example output waveform\n\n## 11.7 Project\
    \ 5 - Generating a sine wave signal\n\n**Description:** In this project, we will\
    \ be using the DAC to generate a low frequency sine wave using the built-in trigonometric\
    \ **sin** function. The generated sine wave will have an amplitude of 1.5 V, a\
    \ frequency of 100 Hz (period = 10 ms), and an offset of 1.5 V.\n\nThe block diagram\
    \ and circuit diagram of the project are as in Figure 11.2 and Figure 11.3.\n\n\
    **Program Listing:** The frequency of the sine wave to be generated is 100 Hz.\
    \ This wave has a period of 10 ms, or 10,000 µs. If we assume that the sine wave\
    \ will consist of 100 samples, then each sample should be output at 10,000/100\
    \ = 100 µs intervals. The sample values will be calculated using the trigonometric\
    \ **sin** function of Python.\n\nThe **sin** function will have the format:\n\n\
    $$\\sin\\left(\\frac{2\\pi \\cdot count}{T}\\right)$$\n\nwhere T is the period\
    \ of the waveform and is equal to 100 samples. Thus, the sine wave is divided\
    \ into 100 samples and each sample is output at 100 µs. The above formula can\
    \ be rewritten as:\n\n$$\\sin(0.0628 \\cdot count)$$\n\nIt is required that the\
    \ amplitude of the waveform should be 1.5 V. With a reference voltage of +3.3\
    \ V and a 12-bit DAC converter (0 to 4095 quantization levels), 1.5 V is equal\
    \ to 1.5 × 4095/3.3, which is equal to 1861.3 (i.e. the amplitude). Thus, we will\
    \ multiply our sine function with the amplitude at each sample to give:\n\n$$1861.3\
    \ \\cdot \\sin(0.0628 \\cdot count)$$\n\nThe D/A converter used in this project\
    \ is unipolar and cannot output negative values. Therefore, an offset is added\
    \ to the sine wave to shift it so that it is always positive. The offset should\
    \ be larger than the absolute value of the maximum negative value of the sine\
    \ wave, which is 1861.3 when the **sin** function above is equal to 1.5. In this\
    \ project, we are adding a 1.5 V offset which corresponds to a decimal value of\
    \ 1861.3 (i.e. the offset) at the DAC output. Thus, for each sample, we will calculate\
    \ and output the following value to the DAC:\n\n$$1861.3 + 1861.2 \\cdot \\sin(0.0628\
    \ \\cdot count)$$\n\nThe sine waveform values for a period are obtained outside\
    \ the program loop using the following statement. The list **sins** contains all\
    \ the 100 sine values of the waveform. The reason for calculating these values\
    \ outside the program loop is to minimize the time to calculate the **sin** function:\n\
    \n```python\nfor i in range(100):\n    sins[i] = int(offset + amplitude * sin(R*i))\n\
    ```\n\nwhere R is set to 0.0628."
