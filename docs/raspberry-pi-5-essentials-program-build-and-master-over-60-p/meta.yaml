    # Enabling Bluetooth


    Before using your smartphone for Bluetooth applications, you must enable the Bluetooth
    on it. Depending on the model of the smartphone you have, this is usually done
    from the **Settings** menu.


    Similarly, before using Bluetooth on your Raspberry Pi, you must enable it. There
    are two ways you can enable Bluetooth on the Raspberry Pi 5: using the graphical
    desktop (GUI mode), or using the Console mode.


    # Using the Graphical Desktop


    The steps for enabling Bluetooth on the Raspberry Pi 5 using the graphical desktop
    are given below:


    +   - Enable Bluetooth on your smartphone

    - If you have a monitor connected directly to the Raspberry Pi 5 then skip the
    next line

    - Start the VNC server on your Raspberry Pi 5 and login using the VNC Viewer.

    - Click on the blue Bluetooth icon on your Raspberry Pi 5 screen at the top right-hand
    side, and turn Bluetooth ON, if it is not already ON. Then, select **Make Discoverable**.
    You should see the Bluetooth icon flashing. Click **Add Device**

    - Select **raspberrypi** in the Bluetooth menu (**raspberrypi** is the default
    Bluetooth name of your Raspberry Pi 5) on your mobile device (you may have to
    scan on your mobile device). You should see the **Connecting** message on your
    smart device.

    - Click **Pair** to accept the pairing request on your Raspberry Pi 5 as shown
    in Figure 15.2


    ![](img/4c39fa287d846ab9ea3e468319162ce0_288_0.png)


    Figure 15.2 Bluetooth pairing request on Raspberry Pi 5


    +   - You should now see the message **Pairing Successfully** on your Raspberry
    Pi 5'
  - '[PAGE 289]


    # Using Console mode


    You can enable Bluetooth on your Raspberry Pi 5 using the Console mode. Additionally,
    you can make Bluetooth discoverable, scan for nearby Bluetooth devices and then
    connect to a Bluetooth device. The steps are given below (characters typed by
    the user are in bold for clarity):


    +   - Find the Bluetooth MAC address of your smartphone. For Android phones, the
    steps are usually:

    - Go to the **Settings** menu

    - Tap **About Phone**

    - Tap **Status information**

    - Scroll down to see your **Bluetooth address** (e.g. Figure 15.3). In this example,
    the MAC address was **50:50:A4:0F:62:3F**


    ![](img/4c39fa287d846ab9ea3e468319162ce0_289_0.png)


    *Figure 15.3 Bluetooth MAC address*


    +   - Make your Bluetooth discoverable with the following command:

    - Start the Bluetooth tool on your Raspberry Pi 5 from the command mode:


    ```

    pi@raspberrypi:~ $ sudo hciconfig hci0 piscan

    ```


    ```

    pi@raspberrypi:~ $ bluetoothctl

    ```'
