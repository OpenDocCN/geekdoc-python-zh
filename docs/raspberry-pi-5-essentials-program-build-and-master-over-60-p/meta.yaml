    # 16.4 Project 2 – Building a time-lapse camera – Who is in my parking place?


    **Description:** In this project, we have positioned our camera to take pictures
    of our parking place. We will be taking still images every minute (60,000 ms)
    for the duration of ten minutes (600,000 ms).


    The stages in creating a time-lapse camera session are as follows:


    +   - Fix the camera at the place of interest

    - Take a picture of the object to make sure that it is in the field of view and
    is in focus

    - Take pictures of the object at regular intervals

    - Combine the pictures into a movie file

    - Play the movie file


    **Required Commands:** In time-lapse camera sessions, you usually have to store
    large number of pictures taken at regular intervals. Before doing this, you have
    to know the size of a picture, how often the pictures will be taken, and the space
    available on your storage device (e.g. the Raspberry Pi SD card). The author has
    taken a number of 3280 × 2434 (8 megapixel) pictures of the same environment at
    different quality levels using the following command:


    ```

    libcamera-still -t 600000 -o Mypics%d.jpg --timelapse 60000

    ```'
