    # 14.9 Communicating with the Raspberry Pi Pico W over Wi-Fi


    Raspberry Pi Pico W (it will be called Pico from now on) is a low-cost $6 microcontroller
    module based on the RP2040 microcontroller with dual-core Cortex-M0+ processor
    and with on-board Wi-Fi module. Figure 14.23 shows the front view of the Pico
    hardware module, which is basically a small board. At the middle of the board
    is the tiny 7 × 7 mm RP2040 microcontroller chip housed in a QFN-56 package. At
    the two edges of the board, there are 40 gold-coloured metal GPIO (General Purpose
    Input-Output) pins with holes. You should solder pins to these holes so that external
    connections can be made easily to the board. The holes are marked starting with
    number 1 in the top left corner of the board and the numbers increase downwards
    up to number 40 which is at the top right-hand corner of the board. The board
    is breadboard compatible (i.e. 0.1 inch pin spacing), and after soldering the
    pins, the board can be plugged into a breadboard for easy connection to the GPIO
    pins using jumper wires. Next to these holes, you will see bumpy circular cut-outs
    which can be plugged-in on top of other modules without having any physical pins
    fitted.'
  merge: -1
  pgno: 272
- img_proc: true
  md: 'Raspberry Pi 5 Essentials


    ![](img/4c39fa287d846ab9ea3e468319162ce0_273_0.png)


    Figure 14.23 Front view of the Pico module


    At one edge of the board, there is the micro-USB B port for providing power to
    the board and for programming the board. Next to the USB port, there is an on-board
    user LED that can be used during program development. Next to this LED there is
    a button named as BOOTSEL that is used during programming of the microcontroller
    as we will see in the next chapters. Next to the processor chip, there are 3 holes
    where external connections can be made to. These are used to debug your programs
    using Serial Wire Debug (SWD). At the other edge of the board is the single-band
    2.4 GHz Wi-Fi module (802.11n). Next to the Wi-Fi module is the on-board antenna.


    You will notice the following types of letters and numbers at the back of the
    board:


    +   - GND - power supply ground (digital ground)

    - AGND - power supply ground (analog ground)

    - 3V3 - +3.3 V power supply (output)

    - GP0 – GP22 - digital GPIO

    - GP26_A0 – GP28_A2 - analog inputs

    - ADC_VREF - ADC reference voltage

    - TP1 – TP6 - test points

    - SWDIO, GND, SWCLK - debug interface

    - RUN - default RUN pin. Connect LOW to reset the RP2040

    - 3V3_EN - this pin by default enables the +3.3 V power supply. +3.3 V can be
    disabled by connecting this pin LOW

    - VSYS - system input voltage (1.8V to 5.5V) used by the on-board SMPS to generate
    +3.3 V supply for the board

    - VBUS - micro-USB input voltage (+5V)


    Some of the GPIO pins are used for internal board functions. These are:


    +   - GP29 (input) - used in ADC mode (ADC3) to measure VSYS/3

    - GP24 (input) - VBUS sense - HIGH if VBUS is present, else LOW

    - GP23 (output) - Controls the on-board SMPS Power Save pin


    • 274'
