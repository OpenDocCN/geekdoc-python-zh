    \          # 'Adam', 230, 12.25, 'Peter', 89\ns = mylist + second     # s = 'John',\
    \ 'Adam', 230, 12.25, 'Peter', 89, 30, 23\n```\n\n可以通过向所需索引位置赋新值来修改列表的内容。例如，我们可以将列表\
    \ **mylist** 的第 2 个元素从 230 更改为 100，如下所示：\n\n```\nmylist[2] = 100\n```\n\nPython\
    \ 不允许引用列表中不存在的项目。例如，以下语句会给出错误消息：\n\n```\nmylist[200]\n```"
