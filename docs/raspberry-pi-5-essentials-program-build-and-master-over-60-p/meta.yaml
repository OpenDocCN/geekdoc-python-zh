    # 7.4 Comments


    Comment lines in Python start with a hash sign ''#''. All characters after the
    # sign are ignored by the Python interpreter. An example comment line is shown
    below:


    ```

    # This is a comment line

    ```


    Comments can also be inserted after a statement:


    ```

    Sum = 0 # Another comment

    ```


    # 7.5 Line continuation


    The line continuation character ''\'' can be used to continue a statement on the
    following lines. An example is shown below:


    ```

    Sum = a +\n    b +\n    c

    ```


    Which is equivalent to:


    ```

    Sum = a + b + c

    ```


    # 7.6 Blank lines


    A line containing no statements is ignored by the Python interpreter.'
