    \n```\nlibcamera-still -o test.jpg\n```\n\n捕获图像并保存到文件 **test.jpg** 中。\n\n```\n\
    libcamera-still -e bmp -o test.bmp\n```\n\n将文件保存为BMP格式，文件名为 **test.bmp**。\n\n\
    ```\nlibcamera-still -r -o test.jpg\n```\n\n以原始格式保存。\n\n## 16.4 项目2 – 构建延时摄影相机\
    \ – 谁在我的停车位？\n\n**描述：** 在这个项目中，我们将摄像头定位为拍摄我们的停车位。我们将在十分钟（600,000毫秒）的时间内，每分钟（60,000毫秒）拍摄一张静态图像。\n\
    \n创建延时摄影相机会话的步骤如下：\n\n- 将摄像头固定在感兴趣的位置\n- 拍摄物体的照片以确保其在视野内且对焦清晰\n- 以固定的时间间隔拍摄物体的照片\n\
    - 将这些图片合并成一个视频文件\n- 播放视频文件\n\n**所需命令：** 在延时摄影会话中，你通常需要存储大量以固定时间间隔拍摄的图片。在此之前，你必须知道一张图片的大小、拍摄频率以及存储设备（例如树莓派SD卡）上的可用空间。作者使用以下命令，在不同质量级别下，对同一环境拍摄了多张3280\
    \ × 2464（800万像素）的图片：\n\n```\nlibcamera-still -t 600000 -o Mypics%d.jpg --timelapse\
    \ 60000\n```\n\n文件大小如下：\n\n| 质量级别（-q 设置） | 精确文件大小（字节） | 近似文件大小（MB） |\n|---|---|---|\n\
    | 100 | 4,799,812 | 4.8 |\n| 50 | 4,149,210 | 4.2 |\n| 25 | 2,484,031 | 2.5 |\n\
    | 10 | 739,408 | 0.74 |\n| 5 | 281,971 | 0.3 |\n\n作者观察到，在不同质量级别下，图像的可见质量没有明显变化。因此，建议以大约10%的质量级别（选项\
    \ **-q 10**）拍摄图像，此时文件大小约为0.74 MB。如果 **f** 是我们希望以分钟为单位捕获图像的频率，**d** 是捕获过程的总持续时间（分钟），那么所需的存储空间为\
    \ **s = 0.74d/f MB**。在此期间，将拍摄 **n = d/f** 张图像，并创建 **n** 个文件。例如，如果我们希望每分钟捕获一次图像，持续10分钟，那么所需的存储空间将是\
    \ s = 0.74 × 10/1 = 7.4 MB，并且将拍摄9张图像，创建9个文件。\n\n本项目中启动延时摄影所需的命令如下。图像将每分钟拍摄一次，持续10分钟。创建一个名为\
    \ **mypics** 的目录，所有创建的图像文件都存储在此目录中，文件名以 **Mypics** 开头，并包含一个四位数的递增数字：\n\n```\n\
    pi@raspberrypi:~ $ mkdir mypics\npi@raspberrypi:~ $ cd mypics\npi@raspberrypi:~/mypics\
    \ $ libcamera-still -t 600000 -o Mypics%04d.jpg --timelapse 60000 -q 10\n```\n\
    \n图16.4显示了在 **mypics** 目录中创建的文件。图像文件的名称如 **Mypics0000.jpg**、**Mypics0001.jpg**、**Mypics0002.jpg**\
    \ 等。\n\n```\npi@raspberrypi:~/mypics $ ls\nMypics0000.jpg  Mypics0002.jpg  Mypics0004.jpg\
    \  Mypics0006.jpg  Mypics0008.jpg\nMypics0001.jpg  Mypics0003.jpg  Mypics0005.jpg\
    \  Mypics0007.jpg\npi@raspberrypi:~/mypics $ ls\n```\n\n*图16.4 创建的图像文件*\n\n在所有静态JPEG文件创建完成后，你可能希望将这些文件合并在一起并创建一个视频文件。这可以通过几种方式完成。在本节中，我们将使用名为\
    \ **ffmpeg** 的软件，该软件已预装在树莓派5上。\n\n现在我们可以将JPEG文件合并成一个视频文件。输入以下命令移动到文件所在的目录，然后将静态图像文件合并以创建视频文件\
    \ **Mytimelapse.mp4**：\n\n```\npi@raspberrypi:~ $ cd mypics\n```\n\n```\npi@raspberrypi:~/mypics\
    \ $ ffmpeg -framerate 1 -i Mypics%04d.jpg -c:v libx264 -r 30 Mytimelapse.mp4\n\
    ```\n\n上述命令获取所有输入图像，**-i Mypics%04d.jpg**。这将搜索数字最小的图像并将其设置为起始图像。然后它将该数字加一，如果图像存在，则将其添加到序列中。选项\
    \ **-framerate 1** 用于定义图像读取的速度，在这种情况下，每秒一张图片。省略帧率将默认为25。**-r 30** 是输出视频的帧率。同样，如果未定义，默认为25。**-c:v\
    \ libx264** 指定用于编码视频的编解码器。**x264** 是一个用于将视频流编码为 **H.264/MPEG-4 AVC** 压缩格式的库。\n\
    \n你可以通过双击输出视频（**Mytimelapse.mp4**）文件并在桌面GUI中选择 **VLC媒体播放器** 来播放它。如果你愿意，可以在你的PC上安装并使用名为\
    \ **winSCP** 的文件复制软件后，将创建的视频文件复制到你的PC。文件复制到PC后，你可以使用各种视频播放器软件播放它。\n\n这完成了我们延时摄影处理的设计。\n\
    \n## 调度延时摄影\n\n我们描述的捕获静态延时图像的过程需要树莓派5连接到计算机（或显示器），以便从命令行发出命令。在本节中，你将看到如何调度延时摄影过程，使其在树莓派5通电后自动启动，而无需连接显示器或计算机。这可以使用名为\
    \ **crontab** 的软件工具完成，如下所述。\n\n使用命令 **crontab**，你可以指定一个任务列表，这些任务将在一天中的指定时间和一周中的指定日期进行调度。你应该通过输入以下命令来运行crontab：\n\
    \n```\npi@raspberrypi:~ $ crontab -e\n```\n\n第一次运行 **crontab** 时，你应该会被要求选择一个编辑器。选择\
    \ **nano**（选项1），因为这是最容易使用的编辑器。**crontab** 由六个部分组成：分钟、小时、月中的日期、月份、星期几和要执行的命令，其组织结构如图16.5所示。"
