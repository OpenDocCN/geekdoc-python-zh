- md: "Another major software change is that the RPi.GPIO library (created by Ben\
    \ Croston) was not available at the time of writing this book. As a result of\
    \ this, all the GPIO-based Python programs in the book have been developed using\
    \ the **gpiozero** library. Most third party HATs are based on RPi.GPIO and these\
    \ will not work until their software is changed by their manufacturers. It is\
    \ hoped that the manufacturers will change their software by the time Raspberry\
    \ Pi 5 becomes officially widely available.\n\n## Chapter 2 • Installing the Raspberry\
    \ Pi 5 Operating System\n\n## 2.1 Overview\n\nThe Raspberry Pi 5 operating system\
    \ **Bookworm** is available either on a pre-installed microSD card, or you can\
    \ download the operating system image on a blank microSD card. In this chapter,\
    \ you will learn to install the operating system using both methods.\n\n## 2.2\
    \ Using a pre-installed SD card\n\nThe pre-installed Raspberry Pi operating system\
    \ is available on various sized microSD cards. In this section, the author used\
    \ the pre-installed 32 GB microSD card supplied by Elektor. Additionally, the\
    \ author used a 7-inch HDMI compatible monitor, a Raspberry Pi official keyboard,\
    \ and a mouse. The author's hardware setup between the Raspberry Pi 5 and various\
    \ devices is shown in Figure 2.1.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_16_0.png)\n\
    \nThe steps are as follows:\n\n- Insert the pre-installed microSD card into your\
    \ Raspberry Pi 5\n- Connect all the devices as in Figure 2.1\n- Connect the Raspberry\
    \ Pi power adapter to the mains supply\n- You should see the Raspberry Pi booting\
    \ the first time and asking you various questions to set up the device, such as\
    \ the username, password, Wi-Fi network name and password, any updates if necessary,\
    \ etc. (see Figure 2.2 for some displays on the monitor). In this book, the username\
    \ is set to **pi**.\n- The Raspberry Pi will boot in Desktop mode and will display\
    \ the default screen. You can press Ctrl+Alt+F1 at any time to change to the Console\
    \ mode\n\nRaspberry Pi 5 Essentials\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_17_0.png)\n\
    \n## 2.3 Larger font in Console mode\n\nIt is probably hard to see the characters\
    \ on a 7-inch monitor in console mode. You can follow the steps below to increase\
    \ the font size:\n\n- Make sure you are in the Console mode\n- Enter the following\
    \ command:\n\n    pi@raspberrypi: ~ $ sudo dpkg-reconfigure console-setup\n\n\
    - Select **UTF-8** in the **Package Configuration** screen (Figure 2.3)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_18_0.png)\n\
    \nFigure 2.3 Select UTF-8\n\n- Select **Guess optimal character set** (Figure\
    \ 2.4)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_18_1.png)\n\nFigure 2.4 Select\
    \ Guess optimal character set\n\n- Select **Terminus** (Figure 2.5)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_18_2.png)\n\
    \nFigure 2.5 Select Terminus\n\n- Select font **16x32** (Figure 2.6)\n\nRaspberry\
    \ Pi 5 Essentials\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_19_0.png)\n\nFigure\
    \ 2.6 Select font 16x32\n\n## 2.4 Accessing your Raspberry Pi 5 Console from your\
    \ PC – the Putty program\n\nIn many applications, you may want to access your\
    \ Raspberry Pi 5 from your PC. This requires enabling the SSH on your Raspberry\
    \ Pi and then using a terminal emulation software on your PC. The steps to enable\
    \ the SSH are as follows:\n\n- Make sure you are in Console mode\n- Type: **sudo\
    \ raspi-config**\n- Move down to **Interface Options**\n- Highlight **SSH** and\
    \ press Enter (Figure 2.7)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_19_1.png)\n\
    \nFigure 2.7 Highlight SSH\n\n- Click **Yes** to enable SSH\n- Click **OK**\n\
    - Move down and click **Finish**\n\nYou will now have to install a terminal emulation\
    \ software on your PC. The one used by the author is the popular Putty. Download\
    \ Putty from the following website:\n\nhttps://www.putty.org\n\n- Putty is a standalone\
    \ program and there is no need to install it. Simply double click to run it. You\
    \ should see the Putty startup screen as in Figure 2.8.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_20_0.png)\n\
    \n- Make sure that the Connection type is SSH and enter the IP address of your\
    \ Raspberry Pi 5. You can obtain the IP address by entering the command **ifconfig**\
    \ in console mode (Figure 2.9). In this example, the IP address was: **192.168.1.251**\
    \ (see under **wlan0:**)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_20_1.png)\n\
    \n- Click **Open** in Putty after entering the IP address and selecting **SSH**\n\
    \n- The first time you run Putty, you may get a security message. Click **Yes**\
    \ to accept this security alert.\n\n- You will then be prompted to enter the Raspberry\
    \ Pi 5 username and password. You can now enter all Console-based commands through\
    \ your PC.\n\n- To change your password, enter the following command:\n\n    pi@raspberrypi:\
    \ ~ $ **passwd**\n\n- To restart the Raspberry Pi, enter the following command:\n\
    \n    pi@raspberrypi: ~ $ **sudo reboot**\n\n- To shut down the Raspberry Pi,\
    \ enter the following command. Never shutdown by pulling the power cable, as this\
    \ may result in the corruption or loss of files:\n\n    pi@raspberrypi: ~ $ **sudo\
    \ shutdown -h now**\n\n### 2.4.1 Configuring Putty\n\nBy default, the **Putty**\
    \ screen background is black with white characters. The author prefers a white\
    \ background with black characters, with the character size set to 12 points bold.\
    \ You should save your settings so that they are available next time you want\
    \ to use Putty. The steps to configure Putty with these settings are given below:\n\
    \n- Restart Putty\n- Select **SSH** and enter the Raspberry Pi IP address\n- Click\
    \ **Colours** under **Window**\n- Set the **Default Foreground** and **Default\
    \ Bold Foreground** colours to black (Red:0, Green:0, Blue:0)\n- Set the **Default\
    \ Background** and **Default Bold Background** to white (Red:255, Green:255, Blue:255)\n\
    - Set the **Cursor Text** and **Cursor Colour** to black (Red:0, Green:0, Blue:0)\n\
    - Select **Appearance** under **Window** and click **Change** in **Font settings**.\
    \ Set the font to **Bold 12**.\n- Select **Session** and give a name to the session\
    \ (e.g. MyZero) and click **Save**.\n- Click **Open** to open **Putty** session\
    \ with the saved configuration\n- Next time you restart **Putty**, select the\
    \ saved session and click **Load** followed by **Open** to start a session with\
    \ the saved configuration\n\n## 2.5 Accessing the Desktop GUI from your PC\n\n\
    If you are using your Raspberry Pi 5 with local keyboard, mouse, and display,\
    \ you can skip this section. If, on the other hand, you want to access your Desktop\
    \ remotely over the network, you will find that SSH services cannot be used. The\
    \ easiest and simplest way to access your Desktop remotely from a computer is\
    \ by using the VNC (Virtual Network Connection) client and server. The VNC server\
    \ runs on your Pi and the VNC client runs on your computer. It is recommended\
    \ to use the **tightvncserver** on your Raspberry Pi 5. The steps are:\n\n- Enter\
    \ the following command:\n\n    pi@raspberrypi:~ $ sudo apt-get install tightvncserver\n\
    \n- Run the **tightvncserver**:\n\n    pi@raspberrypi:~ $ tightvncserver\n\n \
    \   You will be prompted to create a password for remotely accessing the Raspberry\
    \ Pi desktop. You can also set up an optional read-only password. The password\
    \ should be entered every time you want to access the Desktop. Enter a password\
    \ and remember your password.\n\n- Start the VNC server after reboot by the following\
    \ command:\n\n    pi@raspberrypi:~ $ vncserver :1\n\n    You can optionally specify\
    \ screen pixel size and colour depth in bits as follows:\n\n    pi@raspberrypi:~\
    \ $ vncserver :1 -geometry 1920x1080 -depth 24\n\n- We must now set up a VNC viewer\
    \ on our laptop (or desktop) PC. There are many VNC clients available, but the\
    \ recommended one which is compatible with **TightVNC** is **TightVNC** for the\
    \ PC, which can be downloaded from the following link:\n\n    [https://www.tightvnc.com/download.php](https://www.tightvnc.com/download.php)\n\
    \n- Download and install the **TightVNC** software for your PC. You will have\
    \ to choose a password during the installation.\n\n- Start the **TightVNC Viewer**\
    \ on your PC and enter the Raspberry Pi IP address followed by ':1'. Click **Connect**\
    \ to connect to your Raspberry Pi (Figure 2.10)"
  mdcn: "另一个重大的软件变更是，RPi.GPIO库（由Ben Croston创建）在撰写本书时并未发布。因此，书中所有基于GPIO的Python程序均使用**gpiozero**库开发。大多数第三方HAT都基于RPi.GPIO，在制造商更新其软件之前将无法工作。希望在Raspberry\
    \ Pi 5正式广泛上市时，制造商会更新他们的软件。\n\n## 第2章 • 安装Raspberry Pi 5操作系统\n\n## 2.1 概述\n\nRaspberry\
    \ Pi 5操作系统**Bookworm**可预装在microSD卡上提供，或者你可以将操作系统镜像下载到空白microSD卡上。在本章中，你将学习使用这两种方法安装操作系统。\n\
    \n## 2.2 使用预装SD卡\n\n预装的Raspberry Pi操作系统有多种容量的microSD卡可供选择。在本节中，作者使用了Elektor提供的预装32\
    \ GB microSD卡。此外，作者还使用了一台7英寸HDMI兼容显示器、一个Raspberry Pi官方键盘和一个鼠标。作者在Raspberry Pi\
    \ 5与各种设备之间的硬件设置如图2.1所示。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_16_0.png)\n\
    \n步骤如下：\n\n- 将预装的microSD卡插入你的Raspberry Pi 5\n- 按照图2.1连接所有设备\n- 将Raspberry Pi电源适配器连接到市电\n\
    - 你应该会看到Raspberry Pi首次启动，并询问你各种问题以设置设备，例如用户名、密码、Wi-Fi网络名称和密码、任何必要的更新等（参见图2.2中显示器上的一些显示）。在本书中，用户名设置为**pi**。\n\
    - Raspberry Pi将以桌面模式启动并显示默认屏幕。你可以随时按Ctrl+Alt+F1切换到控制台模式\n\nRaspberry Pi 5 Essentials\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_17_0.png)\n\n## 2.3 在控制台模式下增大字体\n\n\
    在7英寸显示器的控制台模式下，字符可能难以看清。你可以按照以下步骤增大字体大小：\n\n- 确保你处于控制台模式\n- 输入以下命令：\n\n    pi@raspberrypi:\
    \ ~ $ sudo dpkg-reconfigure console-setup\n\n- 在**软件包配置**屏幕（图2.3）中选择**UTF-8**\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_18_0.png)\n\n图2.3 选择UTF-8\n\n- 选择**猜测最优字符集**（图2.4）\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_18_1.png)\n\n图2.4 选择猜测最优字符集\n\n- 选择**Terminus**（图2.5）\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_18_2.png)\n\n图2.5 选择Terminus\n\n- 选择字体**16x32**（图2.6）\n\
    \nRaspberry Pi 5 Essentials\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_19_0.png)\n\
    \n图2.6 选择字体16x32\n\n## 2.4 从你的PC访问Raspberry Pi 5控制台 – Putty程序\n\n在许多应用中，你可能希望从你的PC访问你的Raspberry\
    \ Pi 5。这需要在你的Raspberry Pi上启用SSH，然后在你的PC上使用终端仿真软件。启用SSH的步骤如下：\n\n- 确保你处于控制台模式\n\
    - 输入：**sudo raspi-config**\n- 向下移动到**接口选项**\n- 高亮显示**SSH**并按回车键（图2.7）\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_19_1.png)\n\
    \n图2.7 高亮显示SSH\n\n- 点击**是**以启用SSH\n- 点击**确定**\n- 向下移动并点击**完成**\n\n现在你需要在你的PC上安装一个终端仿真软件。作者使用的是流行的Putty。从以下网站下载Putty：\n\
    \nhttps://www.putty.org\n\n- Putty是一个独立程序，无需安装。只需双击即可运行。你应该会看到如图2.8所示的Putty启动屏幕。\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_20_0.png)\n\n- 确保连接类型为SSH，并输入你的Raspberry\
    \ Pi 5的IP地址。你可以通过在控制台模式下输入命令**ifconfig**来获取IP地址（图2.9）。在此示例中，IP地址为：**192.168.1.251**（参见**wlan0:**下方）\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_20_1.png)\n\n- 在Putty中输入IP地址并选择**SSH**后，点击**打开**\n\
    \n- 首次运行Putty时，你可能会收到一条安全消息。点击**是**以接受此安全警报。\n\n- 然后系统会提示你输入Raspberry Pi 5的用户名和密码。现在你可以通过你的PC输入所有基于控制台的命令。\n\
    \n- 要更改密码，请输入以下命令：\n\n    pi@raspberrypi: ~ $ **passwd**\n\n- 要重启Raspberry Pi，请输入以下命令：\n\
    \n    pi@raspberrypi: ~ $ **sudo reboot**\n\n- 要关闭Raspberry Pi，请输入以下命令。切勿通过拔掉电源线来关机，因为这可能导致文件损坏或丢失：\n\
    \n    pi@raspberrypi: ~ $ **sudo shutdown -h now**\n\n### 2.4.1 配置Putty\n\n默认情况下，**Putty**屏幕背景为黑色，字符为白色。作者更喜欢白色背景、黑色字符，并将字符大小设置为12号粗体。你应该保存你的设置，以便下次使用Putty时可用。使用这些设置配置Putty的步骤如下：\n\
    \n- 重启Putty\n- 选择**SSH**并输入Raspberry Pi的IP地址\n- 在**窗口**下点击**颜色**\n- 将**默认前景**和**默认粗体前景**颜色设置为黑色（红:0，绿:0，蓝:0）\n\
    - 将**默认背景**和**默认粗体背景**设置为白色（红:255，绿:255，蓝:255）\n- 将**光标文本**和**光标颜色**设置为黑色（红:0，绿:0，蓝:0）\n\
    - 在**窗口**下选择**外观**，并在**字体设置**中点击**更改**。将字体设置为**粗体 12**。\n- 选择**会话**，为会话命名（例如MyZero）并点击**保存**。\n\
    - 点击**打开**以使用保存的配置打开**Putty**会话\n- 下次重启**Putty**时，选择保存的会话，点击**加载**，然后点击**打开**以使用保存的配置启动会话\n\
    \n## 2.5 从你的PC访问桌面GUI\n\n如果你使用本地键盘、鼠标和显示器来使用你的Raspberry Pi 5，可以跳过本节。另一方面，如果你想通过网络远程访问你的桌面，你会发现SSH服务无法使用。从计算机远程访问桌面最简单、最直接的方法是使用VNC（虚拟网络连接）客户端和服务器。VNC服务器在你的Pi上运行，VNC客户端在你的计算机上运行。建议在你的Raspberry\
    \ Pi 5上使用**tightvncserver**。步骤如下：\n\n- 输入以下命令：\n\n    pi@raspberrypi:~ $ sudo\
    \ apt-get install tightvncserver\n\n- 运行**tightvncserver**：\n\n    pi@raspberrypi:~\
    \ $ tightvncserver\n\n    系统会提示你创建一个用于远程访问Raspberry Pi桌面的密码。你还可以设置一个可选的只读密码。每次访问桌面时都需要输入密码。输入密码并记住你的密码。\n\
    \n- 重启后通过以下命令启动VNC服务器：\n\n    pi@raspberrypi:~ $ vncserver :1\n\n    你可以选择指定屏幕像素大小和颜色深度（以位为单位），如下所示：\n\
    \n    pi@raspberrypi:~ $ vncserver :1 -geometry 1920x1080 -depth 24\n\n- 我们现在必须在我们的笔记本电脑（或台式机）PC上设置一个VNC查看器。有许多可用的VNC客户端，但推荐使用与**TightVNC**兼容的**TightVNC**\
    \ for PC，可以从以下链接下载：\n\n    [https://www.tightvnc.com/download.php](https://www.tightvnc.com/download.php)\n\
    \n- 下载并安装适用于你的PC的**TightVNC**软件。在安装过程中，你需要选择一个密码。\n\n- 在你的PC上启动**TightVNC Viewer**，输入Raspberry\
    \ Pi的IP地址，后跟':1'。点击**连接**以连接到你的Raspberry Pi（图2.10）"
