- img_proc: true
  md: '# 2.8.1 Unable to connect to a wired network


    If you find out that you are not assigned an IP address by the DHCP server, possible
    causes are:


    +   - Your network cable is faulty

    - The network hub does not support DHCP

    - DHCP is not enabled on your Raspberry Pi, i.e. it may have been configured for
    a fixed IP address


    In most cases, it is very unlikely that the network cable is faulty. Also, most
    network hubs support the DHCP protocol. If you are having problems with the network,
    it is possible that your Raspberry Pi is not configured to accept DHCP issued
    addresses. The Raspberry Pi is normally configured to accept DHCP addresses, but
    it is possible that you have changed the configuration somehow.


    To resolve the wired network connectivity problem, follow the steps given below:


    **Step 1:** find out whether your Raspberry Pi is configured for DHCP or fixed
    IP addresses. Enter the following command:


    ```

    pi@raspberrypi ~$ cat /etc/network/interfaces

    ```


    If your Raspberry Pi is configured to use the DHCP protocol (which is normally
    the default configuration), the word **dhcp** should appear at the end of the
    following line:


    ```

    iface eth0 inet dhcp

    ```


    If, on the other hand, your Raspberry Pi is configured to use static addresses,
    then you should see the word **static** at the end of the following line:


    ```

    iface eth0 inet static

    ```


    **Step 2:** To use the DHCP protocol, edit file **interfaces** (e.g. using the
    **nano** text editor) and change the word **static** to **dhcp**. It is recommended
    to make a backup copy of the file interfaces before you change it:


    ```

    pi@raspberrypi ~$ sudo cp /etc/network/interfaces /etc/network/int.bac

    ```


    You should now restart your Raspberry Pi and an IP address will probably be assigned
    to your device.


    **Step 3:** To use static addressing, make sure that the word **static** appears
    as shown above. If not, edit file **interfaces** and change **dhcp** to **static**


    **Step 4:** You need to edit and add the required unique IP address, subnet mask
    and gateway addresses to file **interfaces** as in the following example (this
    example assumes that'
  merge: -1
  pgno: 26
- img_proc: true
  md: 'the required fixed IP address is 192.168.1.251, the subnet mask used in the
    network is 255.255.255.0, and the gateway address is 192.168.1.1):


    ```

    iface eth0 inet static

    address 192.168.1.251

    netmask 255.255.255.0

    gateway 192.168.1.1

    ```


    Save the changes and exit the editor. If you are using the **nano** editor, exit
    by pressing Ctrl+X, then enter Y to save the changes, and enter the filename to
    write to as **/etc/network/interfaces**.


    Restart your Raspberry Pi 5.


