    ```\n\n通过输入 **vi** 后跟要创建或修改的文件名来启动 **vi** 文本编辑器。在本例中，假设要创建一个名为 **myfile.txt**\
    \ 的新文件：\n\n```\npi@raspberrypi: ~ $ vi myfile.txt\n```\n\n你应该会看到 **vi** 文本编辑器屏幕如图\
    \ 5.10 所示。正在编辑的文件名显示在屏幕底部。\n\n**vi** 编辑器与大多数其他文本编辑器不同，因为它无法在编辑器窗口内直接开始输入。编辑此文件的步骤如下：\n\
    \n**步骤 1：** **vi** 编辑器有不同的模式，你必须处于插入模式才能向窗口写入。按 *i* 进入插入模式。然后输入以下文本（见图 5.11）：\n\
    \n> vi 文本编辑器是一个强大的文本编辑器。\n但使用这个编辑器并不容易。\n这个练习应该能帮助你理解基本命令。\n\n**步骤 2：** 要退出插入模式，请按\
    \ ESC 键。要保存文件，请输入字符 **:w**。保存更改后，你可以通过输入 **:q** 退出编辑器。或者，你可以输入 **ZZ**（注意大写）来保存并退出。如果你修改了文件并尝试不保存就退出，你会收到错误消息。如果你想不保存更改就退出，只需输入\
    \ **:q!**\n\n**步骤 3：** 确保你处于命令模式，然后输入字符 **/** 后跟一个单词以在文本中搜索该单词。例如，输入 **/editor**\
    \ 在文本中搜索单词 **editor**（见图 5.12）。\n\n**步骤 4：** 在单词 **editor** 之前插入单词 **is**。输入 **i**\
    \ 后跟 **is** 和空格，然后按 ESC 键结束插入模式。\n\n**步骤 5：** 按 **l** 键将光标向右移动。类似地，按 **h** 键将光标向左移动。按\
    \ **j** 键将光标向下移动（到第二行）。\n\n**步骤 6：** 搜索单词 **this** 并删除它。输入 **/this** 后跟回车键。输入\
    \ **dw** 删除该单词。\n\n**步骤 7：** 通过输入 **dd** 删除光标所在的第二行。\n\n**步骤 8：** 搜索单词 **help**\
    \ 并将其替换为单词 **guide**。转到单词 help 所在的行。输入 **/help**，然后输入 **:s/help/guide/**\n\n**步骤\
    \ 9：** 你可以在当前行以外的任何其他行搜索并替换单词。在本例中，将光标定位在第一行。将第二行中的单词 **basic** 更改为 **BASIC**。输入：\n\
    \n```\n:1,2s/basic/BASIC/\n```\n\n注意，你可以通过用逗号分隔来指定行范围。在本例中，搜索从第 1 行开始，到第 2 行结束。\n\
    \n# 第 6 章 • 创建和运行 Python 程序\n\n## 6.1 概述\n\n你将使用 Python 编程语言对你的 Raspberry Pi 5\
    \ 进行编程。值得在你的 Raspberry Pi 5 计算机上查看如何创建和运行一个简单的 Python 程序。在本章中，消息 **Hello From\
    \ Raspberry Pi 5** 将显示在你的 PC 屏幕上。\n\n如下所述，有三种方法可以在你的 Raspberry Pi 5 上创建和运行 Python\
    \ 程序。\n\n## 6.2 方法 1 – 在控制台模式下从命令提示符交互式运行\n\n在此方法中，你将使用 SSH 登录到你的 Raspberry Pi\
    \ 5，然后交互式地创建和运行 Python 程序。此方法非常适合小程序。步骤如下：\n\n- 使用 SSH 登录到 Raspberry Pi 5\n- 在命令提示符处，输入\
    \ **python**。你应该会看到 Python 命令模式，由三个字符 \">>>\" 标识\n- 输入程序：\n\n    ```\n    python\n\
    \    print (\"Hello From Raspberry Pi 5\")\n    ```\n\n- 文本将如图 6.1 所示交互式显示在屏幕上。请注意，在撰写本书时，Python\
    \ 版本为：3.11.2。\n\n- 输入 **Ctrl+z** 退出程序\n\n## 6.3 方法 2 – 在控制台模式下创建 Python 文件\n\n\
    在此方法中，你将像以前一样使用 SSH 登录到你的 Raspberry Pi 5，然后创建一个 Python 文件。Python 文件只是一个扩展名为 **.py**\
    \ 的文本文件。你可以使用文本编辑器，例如 **nano** 文本编辑器来创建你的文件。在本例中，使用 **nano** 文本编辑器创建了一个名为 **hello.py**\
    \ 的文件。图 6.2 显示了文件 **hello.py** 的内容。该图还显示了如何在 Python 下运行该文件。请注意，程序通过输入以下命令运行：\n\
    \n```\n>>> python hello.py\n```"
