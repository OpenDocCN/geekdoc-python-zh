  mdcn: "## 13.3 项目2 – 带键盘和LCD的电子锁\n\n描述：这是一个电子锁项目，使用继电器来开门。程序中设置了一个4位数的密码。用户必须输入正确的密码才能开门。\n\
    \n**框图：** 图13.9展示了该项目的框图。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_252_0.png)\n\
    \n图13.9 框图\n\n**电路图：** 电路图如图13.10所示。LCD的连接方式与之前的基于LCD的项目相同。键盘的连接方式与之前的项目相同。一个继电器连接到树莓派5的GPIO\
    \ 21（引脚40）。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_252_1.png)\n\n图13.10 电路图\n\
    \n**程序清单：** 图13.11展示了程序清单（**lock.py**）。程序开始时初始化LCD。密码被设置为'1357'。然后程序显示**Code:**并等待用户输入正确的密码。如果输入了正确的密码，会显示**Door\
    \ Opened**消息，继电器开启20秒。之后，继电器关闭。如果输入了错误的密码，会显示**Error**消息5秒，并要求用户重新输入正确的密码。\n\n\
    # Raspberry Pi 5 Essentials\n\n```\n#-----------------------------------------------------------------------\n\
    #\n#           KEYPAD OPERATED LOCK\n#           ====================\n# In this\
    \ program a door (or a safe) is opened via a relay.\n# The user is required to\
    \ enter the correct secret code for\n# the door to open. Once opened, the door\
    \ stays open for\n# 20 seconds\n#\n# Program: lock.py\n# Date    : October, 2023\n\
    # Author  : Dogan Ibrahim\n#-----------------------------------------------------------------------\n\
    from time import sleep\nfrom lcd_api import LcdApi\nfrom i2c_lcd import I2cLcd\n\
    from keypadfuncs import GetChar\nfrom gpiozero import OutputDevice\n\nRelay =\
    \ OutputDevice(21)\nRelay.off()\n\nI2C_ADDR = 0x27\nI2C_NUM_ROWS = 2\nI2C_NUM_COLS\
    \ = 16\n\nmylcd = I2cLcd(1,I2C_ADDR,I2C_NUM_ROWS,I2C_NUM_COLS)\n\nmylcd.clear()\
    \                       # clear LCD\n\nCodea = \"1\"                         #\
    \ Secret code\nCodeb = \"3\"\nCodec = \"5\"\nCoded = \"7\"\n\nwhile True:\n  \
    \  mylcd.move_to(0,0)\n    mylcd.putstr(\"Code: \")\n    a = GetChar()       \
    \            # First no\n    b = GetChar()                   # Second no\n   \
    \ c = GetChar()                   # Third no\n    d = GetChar()              \
    \     # Fourth no\n\n    if (a == Codea and b == Codeb and c == Codec and d ==\
    \ Coded):\n        mylcd.clear()\n        mylcd.putstr(\"Door Opened\")\n```\n\
