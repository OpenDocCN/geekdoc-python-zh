    # Chapter 11 • Waveform Generation – Using the Digital-to-Analog Converter (DAC)


    # 11.1 Overview


    Waveform generators are important in many electronic communication applications.
    In this chapter, you will be developing projects to generate various waveforms
    such as square, sine, triangular, staircase, etc. by using an external DAC chip
    and programming the Raspberry Pi 5. In this book, you will be using the popular
    MCP4921 DAC chip from Microchip.


    # 11.2 The MCP4921 DAC


    Before using the MCP4921, it is worthwhile to look at its features and operation
    in some detail. MCP4921 is a 12-bit DAC that operates with the SPI bus interface.
    Figure 11.1 shows the pin layout of this chip. The basic features are:


    +   - 12-bit operation

    - 20 MHz clock support

    - 4.5 µs settling time

    - External voltage reference input

    - 1× or 2× gain

    - 2.7 to 5.5 V supply voltage

    - -40ºC to +125ºC temperature range


    ![](img/4c39fa287d846ab9ea3e468319162ce0_203_0.png)


    The pin descriptions are:


    | Pin | Description |

    |---|---|

    | **Vdd:** | supply voltage |

    | **CS:** | chip select (active LOW) |

    | **SCK:** | SPI clock |

    | **SDI:** | SPI data in |

    | **LDAC:** | Used to transfer input register data to the output (active LOW)
    |

    | **Vref:** | Reference input voltage |

    | **Vout:** | analog output |

    | **Vss:** | supply ground |


    In projects in this book, you will be operating the MCP4921 with a gain of one.
    As a result, with a reference voltage of 3.3 V and 12-bit conversion data, the
    LSB resolution of the DAC will be 3300/4096 = 0.8 mV'
- md: "## The SPI Bus\n\nAs it was discussed in an earlier chapter, the Serial Peripheral\
    \ Interface (SPI) bus consists of two data wires and one clock wire. Additionally,\
    \ a chip enable (CE or CS) connection is used to select a slave in a multi-slave\
    \ system. The wires used are:\n\n**MOSI (or SDI):** **M**aster **O**ut **S**lave\
    \ **I**n. This signal is output from the master and is input to a slave.\n\n**MISO:**\
    \ **M**aster **I**n **S**lave **O**ut. This signal is output from a slave and\
    \ input to a master.\n\n**SCLK (or SCK):** The clock, controlled by the master.\n\
    \n**CE (or CS):** Chip **E**nable (slave select).\n\nThe following pins are the\
    \ SPI bus pins on Raspberry Pi 4:\n\n| GPIO pin | SPI | Physical pin no |\n| :---\
    \ | :--- | :--- |\n| GPIO 10 | MOSI (SPI0) | 19 |\n| GPIO 9 | MISO (SPI0) | 21\
    \ |\n| GPIO 11 | SCLK (SPI0) | 23 |\n| GPIO 8 | CE0 (SPI0) | 24 |\n| GPIO 7 |\
    \ CE1 (SPI0) | 26 |\n| GPIO 20 | MOSI (SPI1) | 38 |\n| GPIO 19 | MISO (SPI1) |\
    \ 35 |\n| GPIO 21 | SCLK (SPI1) | 40 |\n| GPIO 18 | CE0 (SPI1) | 12 |\n| GPIO\
    \ 17 | CE1 (SPI1) | 11 |\n\nThe SPI bus must be enabled using the **raspi-config**\
    \ console command on the Raspberry Pi before it can be used.\n\n## 11.3 Project\
    \ 1 - Generating a square wave signal with any peak voltage up to +3.3 V\n\n**Description:**\
    \ In this project you will be using the DAC to generate a square wave signal with\
    \ the frequency of 1 kHz where the required output voltage is 2 V peak.\n\n**Block\
    \ Diagram:** Figure 11.2 shows the block diagram of the project. The output\n\n\
    ![](img/4c39fa287d846ab9ea3e468319162ce0_205_0.png)\n\nFigure 11.2 Block diagram\
    \ of the project\n\n**Circuit Diagram:** The circuit diagram of the project is\
    \ shown in Figure 11.3. The output of the DAC is connected to a PSCGU250 type\
    \ digital oscilloscope.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_205_1.png)\n\
    \nFigure 11.3 Circuit diagram of the project\n\n**Program Listing:** Data is written\
    \ to the DAC in 2 bytes. The lower byte specifies D0:D7 of the digital input data.\
    \ The upper byte consists of the following bits:\n\n- D8:D11 bits D8:D11 of the\
    \ digital input data\n- SHDN 1: active (output available), 0: shutdown the device\n\
    - GA output gain control. 0: gain is 2x, 1: gain is 1x\n- BUF 0: input unbuffered,\
    \ 1: input buffered\n- A/B 0: write to DACa, 1: Write to DACb (MCP4921 supports\
    \ only DACa)\n\nIn normal operation, we will send the upper byte (D8:D11) of the\
    \ 12-bit (D0:D11) input data with bits D12 and D13 set to 1 so that the device\
    \ is active, and the gain is set to 1x. Then we will send the low byte (D0:D7)\
    \ of the data. This means that 0x30 should be added to the upper byte before sending\
    \ it to the DAC.\n\nFigure 11.4 shows the program listing (program: **squaredac.py**).\
    \ GPIO 26 is used as the **CS** pin. The **frequency** variable is set to 1000,\
    \ which is the required frequency. Function DAC sends the 12-bit input data to\
    \ the DAC. This function has two parts. In the first part, the HIGH byte is sent\
    \ after adding 0x30 as described above. Function **xfer2** is used to send the\
    \ data to the DAC. In the second part of the function, the LOW byte is extracted\
    \ and is sent to the DAC. Notice that we could have sent both the high byte and\
    \ the low byte using the same **xfer2** function, as follows:\n\n```\nhighbyte\
    \ = (data >> 8) & 0x0F\nhighbyte = highbyte + 0x30\n\nlowbyte = data & 0xFF\n\
    xfer2([highbyte, lowbyte])\n```\n\nVariable **ONvalue** is set to 2000 × 4095/3300,\
    \ which is the digital value corresponding to 2000 mV (i.e. 2 V, remember that\
    \ the 12-bit DAC has 4095 steps, and the reference voltage is set to 3300 mV).\
    \ The **OFFvalue** is set to 0 V. Normally, the delay between the ON and OFF times\
    \ should have been equal to **halfperiod**. However, it was found by experiment\
    \ that the DAC routine takes about 0.2 ms (0.0002 second) and this changes the\
    \ period and consequently the frequency of the output waveform. Because of this,\
    \ 0.0002 is subtracted from **halfperiod** as shown in Figure 11.4.\n\n```\n#-------------------------------------------------------------------\n\
    #                       GENERATE SQUARE WAVEFORM\n#                       =====================\n\
    #\n# This program generates square waveform with the frequency 1kHz.\n# In this\
    \ program the MC4921 DAC chip is used to set the output\n# peak voltage to 2V\n\
    #\n# Author: Dogan Ibrahim\n# File   : squaredac.py\n# Date   : October, 2023\n\
    #-------------------------------------------------------------------\nfrom gpiozero\
    \ import LED\nfrom time import sleep\nimport spidev                          \
    \          # Import SPI\n\nspi = spidev.SpiDev()\nspi.open(0, 0)             \
    \                      # Bus=0, device=0\nspi.max_speed_hz = 3900000\n\nCS = LED(26)\
    \                                     # GPIO26 is CS output\nCS.on()         \
    \                                 # Disable CS\n\nfrequency = 1000           \
    \                      # Required Frequency\nperiod = 1 / frequency          \
    \           # Period of the signal\nhalfperiod = period / 2                  \
    \   # Half period\n\n#\n# This function implements the DAC. The data in \"data\"\
    \ is sent\n# to the DAC\n#\ndef DAC(data):\n    CS.off()                     \
    \           # Enable CS\n#\n# Send HIGH byte\n#\n    temp = (data >> 8) & 0x0F\
    \               # Get upper byte\n    temp = temp + 0x30                     \
    \ # OR with 0x30\n    spi.xfer2([temp])                       # Send to DAC\n\
    #\n# Send LOW byte\n#\n    temp = data & 0xFF                      # Get lower\
    \ byte\n    spi.xfer2([temp])                       # Send to DAC\n\n    CS.on()\
    \                                 # Disable CS\n\ntry:\n    ONvalue = int(2000*4095/3300)\
    \           # 2V output\n    OFFvalue = 0\n\n    while True:\n        DAC(ONvalue)\
    \                        # Send to DAC\n        sleep(halfperiod - 0.0002)   \
    \       # Wait\n        DAC(OFFvalue)                       # Send to DAC\n  \
    \      sleep(halfperiod - 0.0002)          # Wait\n\nexcept KeyboardInterrupt:\n\
    \    pass\n```\n\nFigure 11.4 Program listing\n\nFigure 11.5 shows the output\
    \ waveform generated by the program. Notice that the peak output voltage is 2\
    \ V, as expected.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_208_0.png)\n\nFigure\
    \ 11.5 Output waveform\n\n## 11.4 Project 2 – Generating a sawtooth wave signal\n\
    \n**Description:** In this project, you will be using the DAC to generate a sawtooth\
    \ wave signal with the following specifications:\n\n- Peak voltage: 3.3 V\n- Step\
    \ width: 1 ms\n- Number of steps: 6\n\nThe block diagram and circuit diagram of\
    \ the project are as in Figure 11.2 and Figure 11.3.\n\n**Program Listing:** Figure\
    \ 11.6 shows the program listing (program: **sawtooth.py**). The program is very\
    \ similar to the one given in Figure 11.4.\n\n```\n#---------------------------------------------------------------\n\
    #                   GENERATE SAWTOOTH WAVEFORM\n#                   ========================\n\
    #\n# This program generates sawtooth waveform with 6 steps where each\n# step\
    \ has a width of 1ms\n#\n# Author: Dogan Ibrahim\n# File   : sawtooth.py\n# Date\
    \   : October, 2023\n#---------------------------------------------------------------\n\
    from gpiozero import LED\nfrom time import sleep                    # Import time\n\
    import spidev                             # Import SPI\n\nspi = spidev.SpiDev()\n\
    spi.open(0, 0)                            # Bus=0, device=0\nspi.max_speed_hz\
    \ = 3900000\n\nCS = LED(26) # GPIO26 is CS output\nCS.on() # Disable CS\n\n#\n\
    # This function implements the DAC. The data in \"data\" is sent\n# to the DAC\n\
    #\ndef DAC(data):\n    CS.off() # Enable CS\n    #\n    # Send HIGH byte\n   \
    \ #\n    temp = (data >> 8) & 0x0F # Get upper byte\n    temp = temp + 0x30 #\
    \ OR with 0x30\n    spi.xfer2([temp]) # Send to DAC\n    #\n    # Send LOW byte\n\
    \    #\n    temp = data & 0xFF # Get lower byte\n    spi.xfer2([temp]) # Send\
    \ to DAC\n\n    CS.on() # Disable CS\n\ntry:\n    while True: # Do forever\n \
    \       i = 0\n        while i < 1.1:\n            DACValue = int(i*4095) # Value\
    \ to send\n            DAC(DACValue) # Send to DAC\n            sleep(0.0007)\
    \ # Wait\n            i = i + 0.2\n\nexcept KeyboardInterrupt:\n    pass\n```\n\
    \nFigure 11.6 Program listing\n\nAn example output waveform taken from the oscilloscope\
    \ is shown in Figure 11.7. Notice that the time delay had to be adjusted experimentally\
    \ to give the correct timing."
  mdcn: "## SPI 总线\n\n正如前面章节所讨论的，串行外设接口（SPI）总线由两根数据线和一根时钟线组成。此外，在多从机系统中，使用片选（CE 或\
    \ CS）连接来选择从机。所使用的线路如下：\n\n**MOSI（或 SDI）：** **主**机**输**出，**从**机**输**入。此信号由主机输出并输入到从机。\n\
    \n**MISO：** **主**机**输**入，**从**机**输**出。此信号由从机输出并输入到主机。\n\n**SCLK（或 SCK）：** 时钟，由主机控制。\n\
    \n**CE（或 CS）：** 片**选**（从机选择）。\n\n以下是树莓派 4 上的 SPI 总线引脚：\n\n| GPIO 引脚 | SPI | 物理引脚号\
    \ |\n| :--- | :--- | :--- |\n| GPIO 10 | MOSI (SPI0) | 19 |\n| GPIO 9 | MISO (SPI0)\
    \ | 21 |\n| GPIO 11 | SCLK (SPI0) | 23 |\n| GPIO 8 | CE0 (SPI0) | 24 |\n| GPIO\
    \ 7 | CE1 (SPI0) | 26 |\n| GPIO 20 | MOSI (SPI1) | 38 |\n| GPIO 19 | MISO (SPI1)\
    \ | 35 |\n| GPIO 21 | SCLK (SPI1) | 40 |\n| GPIO 18 | CE0 (SPI1) | 12 |\n| GPIO\
    \ 17 | CE1 (SPI1) | 11 |\n\n在使用 SPI 总线之前，必须在树莓派上使用 **raspi-config** 控制台命令启用它。\n\
    \n## 11.3 项目 1 - 生成峰值电压最高达 +3.3 V 的方波信号\n\n**描述：** 在本项目中，你将使用 DAC 生成一个频率为 1 kHz\
    \ 的方波信号，要求的输出电压为 2 V 峰值。\n\n**框图：** 图 11.2 显示了该项目的框图。输出\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_205_0.png)\n\
    \n图 11.2 项目框图\n\n**电路图：** 项目的电路图如图 11.3 所示。DAC 的输出连接到 PSCGU250 型数字示波器。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_205_1.png)\n\
    \n图 11.3 项目电路图\n\n**程序清单：** 数据以 2 字节写入 DAC。低字节指定数字输入数据的 D0:D7。高字节包含以下位：\n\n- D8:D11\
    \ 数字输入数据的 D8:D11 位\n- SHDN 1：激活（输出可用），0：关闭设备\n- GA 输出增益控制。0：增益为 2 倍，1：增益为 1 倍\n\
    - BUF 0：输入无缓冲，1：输入有缓冲\n- A/B 0：写入 DACa，1：写入 DACb（MCP4921 仅支持 DACa）\n\n在正常操作中，我们将发送\
    \ 12 位（D0:D11）输入数据的高字节（D8:D11），并将 D12 和 D13 位设置为 1，以便设备处于激活状态，并且增益设置为 1 倍。然后我们将发送数据的低字节（D0:D7）。这意味着在发送到\
    \ DAC 之前，应在高字节上加上 0x30。\n\n图 11.4 显示了程序清单（程序：**squaredac.py**）。GPIO 26 用作 **CS**\
    \ 引脚。**frequency** 变量设置为 1000，这是所需的频率。函数 DAC 将 12 位输入数据发送到 DAC。此函数分为两部分。在第一部分中，如上所述，在加上\
    \ 0x30 后发送高字节。使用函数 **xfer2** 将数据发送到 DAC。在函数的第二部分中，提取低字节并将其发送到 DAC。请注意，我们本可以使用相同的\
    \ **xfer2** 函数同时发送高字节和低字节，如下所示：\n\n```\nhighbyte = (data >> 8) & 0x0F\nhighbyte\
    \ = highbyte + 0x30\n\nlowbyte = data & 0xFF\nxfer2([highbyte, lowbyte])\n```\n\
    \n变量 **ONvalue** 设置为 2000 × 4095/3300，这是对应于 2000 mV（即 2 V，记住 12 位 DAC 有 4095 个步进，参考电压设置为\
    \ 3300 mV）的数字值。**OFFvalue** 设置为 0 V。通常，开启和关闭时间之间的延迟应等于 **halfperiod**。然而，通过实验发现，DAC\
    \ 例程大约需要 0.2 ms（0.0002 秒），这会改变周期，从而改变输出波形的频率。因此，如图 11.4 所示，从 **halfperiod** 中减去\
    \ 0.0002。\n\n```\n#-------------------------------------------------------------------\n\
    #                       生成方波波形\n#                       =====================\n\
    #\n# 此程序生成频率为 1kHz 的方波波形。\n# 在此程序中，使用 MC4921 DAC 芯片将输出\n# 峰值电压设置为 2V\n#\n# 作者：Dogan\
    \ Ibrahim\n# 文件   : squaredac.py\n# 日期   : 2023年10月\n#-------------------------------------------------------------------\n\
    from gpiozero import LED\nfrom time import sleep\nimport spidev              \
    \                      # 导入 SPI\n\nspi = spidev.SpiDev()\nspi.open(0, 0)     \
    \                              # 总线=0，设备=0\nspi.max_speed_hz = 3900000\n\nCS =\
    \ LED(26)                                     # GPIO26 是 CS 输出\nCS.on()      \
    \                                    # 禁用 CS\n\nfrequency = 1000             \
    \                    # 所需频率\nperiod = 1 / frequency                     # 信号周期\n\
    halfperiod = period / 2                     # 半周期\n\n#\n# 此函数实现 DAC。\"data\" 中的数据被发送\n\
    # 到 DAC\n#\ndef DAC(data):\n    CS.off()                                # 启用 CS\n\
    #\n# 发送高字节\n#\n    temp = (data >> 8) & 0x0F               # 获取高字节\n    temp =\
    \ temp + 0x30                      # 与 0x30 进行 OR 运算\n    spi.xfer2([temp])  \
    \                     # 发送到 DAC\n#\n# 发送低字节\n#\n    temp = data & 0xFF       \
    \               # 获取低字节\n    spi.xfer2([temp])                       # 发送到 DAC\n\
    \n    CS.on()                                 # 禁用 CS\n\ntry:\n    ONvalue = int(2000*4095/3300)\
    \           # 2V 输出\n    OFFvalue = 0\n\n    while True:\n        DAC(ONvalue)\
    \                        # 发送到 DAC\n        sleep(halfperiod - 0.0002)       \
    \   # 等待\n        DAC(OFFvalue)                       # 发送到 DAC\n        sleep(halfperiod\
    \ - 0.0002)          # 等待\n\nexcept KeyboardInterrupt:\n    pass\n```\n\n图 11.4\
    \ 程序清单\n\n图 11.5 显示了程序生成的输出波形。请注意，峰值输出电压为 2 V，符合预期。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_208_0.png)\n\
    \n图 11.5 输出波形\n\n## 11.4 项目 2 – 生成锯齿波信号\n\n**描述：** 在本项目中，你将使用 DAC 生成一个具有以下规格的锯齿波信号：\n\
    \n- 峰值电压：3.3 V\n- 步进宽度：1 ms\n- 步进数：6\n\n项目的框图和电路图与图 11.2 和图 11.3 相同。\n\n**程序清单：**\
    \ 图 11.6 显示了程序清单（程序：**sawtooth.py**）。该程序与图 11.4 中给出的程序非常相似。\n\n```\n#---------------------------------------------------------------\n\
    #                   生成锯齿波波形\n#                   ========================\n#\n\
    # 此程序生成具有 6 个步进的锯齿波波形，每个\n# 步进宽度为 1ms\n#\n# 作者：Dogan Ibrahim\n# 文件   : sawtooth.py\n\
    # 日期   : 2023年10月\n#---------------------------------------------------------------\n\
    from gpiozero import LED\nfrom time import sleep                    # 导入 time\n\
    import spidev                             # 导入 SPI\n\nspi = spidev.SpiDev()\n\
    spi.open(0, 0)                            # 总线=0，设备=0\nspi.max_speed_hz = 3900000\n\
    \nCS = LED(26) # GPIO26 是 CS 输出\nCS.on() # 禁用 CS\n\n#\n# 此函数实现 DAC。\"data\" 中的数据被发送\n\
    # 到 DAC\n#\ndef DAC(data):\n    CS.off() # 启用 CS\n    #\n    # 发送高字节\n    #\n\
    \    temp = (data >> 8) & 0x0F # 获取高字节\n    temp = temp + 0x30 # 与 0x30 进行 OR\
    \ 运算\n    spi.xfer2([temp]) # 发送到 DAC\n    #\n    # 发送低字节\n    #\n    temp = data\
    \ & 0xFF # 获取低字节\n    spi.xfer2([temp]) # 发送到 DAC\n\n    CS.on() # 禁用 CS\n\ntry:\n\
    \    while True: # 永久执行\n        i = 0\n        while i < 1.1:\n            DACValue\
