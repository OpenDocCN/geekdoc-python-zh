  md: '**Background Information:** Port numbers range from 0 to 65,535. Numbers from
    0 to 1023 are reserved and are called as well-known ports. For example, port 23
    is the Telnet port, port 25 is the SMTP port, etc. In this section, you will be
    using port number 5000 in your program.


    **Block diagram:** Figure 14.3 shows the project block diagram where the Raspberry
    Pi 5 and smartphone communicate over a Wi-Fi router.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_258_0.png)


    *Figure 14.3 Block diagram of the project*


    **Program listing:** In this project, Raspberry Pi 5 is the server. Figure 14.4
    shows the program listing (**tcpserver.py**). At the beginning of the program,
    a TCP/IP socket is created (**sock.SOCK_STREAM**) and is then bind to port 5000.
    The program listens for a connection. Notice that it is possible for the server
    to listen to multiple clients, but of course, it can communicate with only one
    at any time. When the client makes a connection, this is accepted by the server.
    The server then reads a message from the keyboard and sends it to the client over
    the Wi-Fi link. Notice that the **setsockopt()** statement makes sure that the
    program can be used again without having to wait for the socket timeout of 30
    seconds.


