  md: '# Chapter 13 • Using a 4×4 Keypad


    # 13.1 Overview


    Keypads are useful devices for entering data to microcontroller-based systems.
    They are especially useful in portable applications where the user has to enter
    data or make a choice. In this chapter, you will be learning to use a 4×4 keypad
    in your Raspberry Pi 5 projects.


    # 13.2 Project 1 – Using a 4×4 keypad


    **Description:** This is a 4×4 keypad program. The program reads the key pressed
    by the user and displays its code on the screen. The aim of the project is to
    show how a 4×4 keypad can be used with a Raspberry Pi 5 project.


    **The 4×4 Keypad:** There are several types of keypads that can be used in microcontroller-based
    projects. In this project, a 4×4 keypad (see Figure 13.1) is used. This keypad
    has keys for numbers 0 to 9 and the letters A, B, C, D, *, and #. The keypad is
    interfaced to the processor with 8 wires with the names R1 to R4 and C1 to C4,
    representing the rows and columns respectively of the keypad (see Figure 13.2).


    ![](img/4c39fa287d846ab9ea3e468319162ce0_244_0.png)


    Figure 13.1 4×4 keypad


    ![](img/4c39fa287d846ab9ea3e468319162ce0_244_1.png)


    Figure 13.2 Circuit diagram of the 4×4 keypad'
  merge: -1
  pgno: 244
- img_proc: true
  md: 'The operation of the keypad is basic: the columns are configured as inputs,
    and they are all set HIGH, and the rows are configured as outputs. The pressed
    key is identified by using column scanning. Here, a row is forced LOW while the
    other rows are held HIGH. Then the state of each column is scanned, and if a column
    is found to be LOW, then the intersection of that column and row is the key pressed.
    This process is repeated for all the rows.


    **Block diagram:** Figure 13.3 shows the block diagram


    ![](img/4c39fa287d846ab9ea3e468319162ce0_245_0.png)


    *Figure 13.3 Block diagram*


    **Circuit diagram:** The circuit diagram of the project is shown in Figure 13.4.
    The 4×4 keypad is connected to the following GPIO pins of the Raspberry Pi 5.
    The column pins are held high by using external 10 Kilo-ohm resistors to +3.3
    V:


    | Keypad pin | Raspberry Pi pin |

    | :--- | :--- |

    | R1 | GPIO 4 |

    | R2 | GPIO 17 |

    | R3 | GPIO 27 |

    | R4 | GPIO 22 |

    | C1 | GPIO 10 |

    | C2 | GPIO 9 |

    | C3 | GPIO 11 |

    | C4 | GPIO 0 |'
