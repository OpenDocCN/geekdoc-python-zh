    Figure 11.3 Circuit diagram of the project


    **Program Listing:** Data is written to the DAC in 2 bytes. The lower byte specifies
    D0:D8 of the digital input data. The upper byte consists of the following bits:


    +   - D8: D11bits D8:D11 of the digital input data

    - SHDN 1: active (output available), 0: shutdown the device

    - GA output gain control. 0: gain is 2x, 1: gain is 1x

    - BUF 0: input unbuffered, 1: input buffered

    - A/B 0: write to DACa, 1: Write to DACb (MCP4921 supports only DACa)


    In normal operation, we will send the upper byte (D8:D11) of the 12-bit (D0:D11)
    input data with bits D12 and D13 set to 1 so that the device is active, and the
    gain is set to 1x. Then we will send the low byte (D0:D7) of the data. This means
    that 0x30 should be added to the upper byte before sending it to the DAC.'
  - '[PAGE 206]


    Figure 11.4 shows the program listing (program: **squaredac.py**). GPIO 26 is
    used as the **CS** pin. The **frequency** variable is set to 1000, which is the
    required frequency. Function DAC sends the 12-bit input data to the DAC. This
    function has two parts. In the first part, the HIGH byte is sent after adding
    0x30 as described above. Function **xfer2** is used to send the data to the DAC.
    In the second part of the function, the LOW byte is extracted and is sent to the
    DAC. Notice that we could have sent both the high byte and the low byte using
    the same **xfer2** function, as follows:


    ```

    highbyte = (data >> 8) & 0x0F

    highbyte = highbyte + 0x30


    lowbyte = data & 0xFF

    xfer2([highbyte, lowbyte])

    ```


    Variable **ONvalue** is set to 2000 × 4095/3300, which is the digital value corresponding
    to 2000 mV (i.e. 2 V, remember that the 12-bit DAC has 4095 steps, and the reference
    voltage is set to 3300 mV). The **OFFvalue** is set to 0 V. Normally, the delay
    between the ON and OFF times should have been equal to **halfperiod**. However,
    it was found by experiment that the DAC routine takes about 0.2 ms (0.0002 second)
    and this changes the period and consequently the frequency of the output waveform.
    Because of this, 2 mV is subtracted from **halfperiod** as shown in Figure 13.9


    ```

