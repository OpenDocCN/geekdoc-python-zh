    # Date   : October, 2023\n# File   : shapes.py\n#-----------------------------------------------------------------------\n\
    from sense_hat import SenseHat\nsense=SenseHat()\nfrom time import sleep\n\nsense.clear()\n\
    sense.set_pixel(3, 3, (255,0,0))          # Starting LED\nx = 3\ny = 3\n\nwhile\
    \ True:\n    X,Y,Z = sense.get_accelerometer_raw().values()    # Read acc\n  \
    \  X = round(X, 0)                                  # X dir\n    Y = round(Y,\
    \ 0)                                  # Y dir\n\n    if X > 0:\n        x = x\
    \ + 1\n        if x > 7:                                    # If the end\n   \
    \         x = 7\n    elif X < 0:\n        x = x - 1\n        if x < 0:\n     \
    \       x = 0\n\n    if y > 0:\n        y = y + 1\n        if y > 7:\n       \
    \     y = 7\n    elif y < 0:\n        y = y - 1\n        if y < 0:\n         \
    \   y = 0\n    sense.set_pixel(x,y,(255,0,0))\n    sleep(1)\n```\n\n图 12.19 显示了通过倾斜\
    \ Sense Hat 板绘制的示例形状。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_243_0.png)\n\
    \n图 12.19 在 Sense HAT 板上绘制形状的示例\n\n## 第 13 章 • 使用 4×4 键盘\n\n## 13.1 概述\n\n键盘是向基于微控制器的系统输入数据的有用设备。它们在用户需要输入数据或做出选择的便携式应用中尤其有用。在本章中，你将学习如何在你的树莓派\
    \ 5 项目中使用 4×4 键盘。\n\n## 13.2 项目 1 – 使用 4×4 键盘\n\n**描述：** 这是一个 4×4 键盘程序。程序读取用户按下的键并在屏幕上显示其代码。该项目的目的是展示如何在树莓派\
    \ 5 项目中使用 4×4 键盘。\n\n**4×4 键盘：** 有几种类型的键盘可用于基于微控制器的项目。在此项目中，使用了一个 4×4 键盘（见图 13.1）。此键盘有数字\
    \ 0 到 9 以及字母 A、B、C、D、* 和 # 的按键。键盘通过 8 根名为 R1 到 R4 和 C1 到 C4 的导线与处理器接口，分别代表键盘的行和列（见图\
    \ 13.2）。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_244_0.png)\n\n图 13.1 4×4\
    \ 键盘\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_244_1.png)\n\n图 13.2 4×4 键盘的电路图\n\
    \n键盘的操作是基本的：列被配置为输入，并且全部设置为高电平，行被配置为输出。通过使用列扫描来识别被按下的键。这里，将一行强制为低电平，同时其他行保持高电平。然后扫描每列的状态，如果发现一列为低电平，则该列和该行的交点就是被按下的键。此过程对所有行重复进行。\n\
    \n**框图：** 图 13.3 显示了框图。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_245_0.png)\n\
    \n*图 13.3 框图*\n\n**电路图：** 项目的电路图如图 13.4 所示。4×4 键盘连接到树莓派 5 的以下 GPIO 引脚。列引脚通过外部\
    \ 10 千欧电阻上拉至 +3.3 V：\n\n| 键盘引脚 | 树莓派引脚 |\n| :--- | :--- |\n| R1 | GPIO 4 |\n|\
    \ R2 | GPIO 17 |\n| R3 | GPIO 27 |\n| R4 | GPIO 22 |\n| C1 | GPIO 10 |\n| C2 |\
    \ GPIO 9 |\n| C3 | GPIO 11 |\n| C4 | GPIO 0 |"
