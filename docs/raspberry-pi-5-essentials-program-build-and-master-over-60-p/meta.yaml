    # # Chapter 1 • The Raspberry Pi 5


    # ## 1.1 Overview


    The Raspberry Pi 5 is the latest credit card size computer from Raspberry Pi.
    In this chapter, we will look at the specifications of this new computer and compare
    it with the Raspberry Pi 4.


    # ## 1.2 The Raspberry Pi 5


    Raspberry Pi 4 was released in June 2019. There has been a long wait for a newer
    model and finally the Raspberry Pi 5 was launched in October 2023.


    The Raspberry Pi 5 is claimed to have two or three times the processing power
    of The Raspberry Pi 4, which is already a very popular single board computer.
    The Raspberry Pi 5 is currently available in 4 GB and 8 GB memory capacities,
    but smaller memory devices may appear later. Although the Raspberry Pi 5 is the
    same size and shape as the Model 4B, it has a number of interesting new features
    such as PCIe connector, power button, built-in real-time clock and some others
    that we will investigate in this chapter.


    The Raspberry Pi 5 is based on a 2.4 GHz Cortex-A76 ARM processor with a new south-bridge
    for handling the peripheral interface. A new VideoCore VII GPU is provided with
    800 MHz speed. The dual camera interface is another nice feature of the Raspberry
    Pi 5. The microSD card interface now supports cards that work at much higher speeds.


    Table 1.1 shows a comparison of the Raspberry Pi 4 and 5. Notice that both devices
    have dual 2 × 4kp60 HDMI display interfaces, although Pi 5 supports HDR output.
    The 2 × 20 pin GPIO interface is the same in both devices. The Raspberry Pi 5
    additionally has two camera interfaces, a PCIe bus connector, a UART interface,
    an RTC clock power connector, and a fan power connector. Wi-Fi and Bluetooth are
    supported by both devices. The on-board power switch on Pi 5 is a useful addition
    and was requested by many users. Pi 5 is powered from 5 V/4 A USB-C type power
    supply, where Pi 4 is powered from a 3 A power supply. Pi 5 is slightly more expensive
    than Pi 4.


    | | Raspberry Pi 4 | Raspberry Pi 5 |

    |---|---|---|

    | SoC | BCM2711 SoC<br>Cortex-A72 CPU at 1.8 GHz | BCM2712 SoC<br>Cortex-A76 CPU
    at 2.4 GHz |

    | CPU | 4 core | 4 core |

    | Instruction set | ARMv8-A | ARMv8-2 |

    | Display | 500 MHz VideoCore Vi GPU | 800 MHz VideoCore VII GPU |

    | L2 Cache | 1 MB (shared) | 2 MB |

    | L3 Cache | None | 2 MB (shared) |

    | RAM | 1, 2, 4, 8 GB LPDDR4 | 4, 8 GB LPDDR4X |

    | SD Card | microSD | microSD (high speed SDR104 compatible) |

    | GPIO | 2 × 20 pin | 2 × 20 pin |'
