    \ more messages?: \")\n        yn = yn.lower()\n\nexcept KeyboardInterrupt:\n\
    \    print(\"\\nclosing connection to client\")\n    sock.close()\n```\n图14.9\
    \ 程序清单\n\n## 测试\n\n你将使用图14.5所示的Android应用程序。启动树莓派5服务器程序，然后在智能手机和树莓派之间交换消息。示例通信如图14.10所示。在此示例中，树莓派发送消息\
