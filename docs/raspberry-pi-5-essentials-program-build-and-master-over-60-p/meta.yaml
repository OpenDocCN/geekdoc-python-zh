    \ returns the key to the calling code. This function calls function **ReadRow()**.\
    \ **ReadRow()** has two arguments: the row number and the keypad characters on\
    \ that row. The function scans the columns and if a column is detected with LOW\
    \ state, then the keypad character corresponding to the column is returned by\
    \ the function. The program calls **GetChar()** and displays the pressed key on\
    \ the screen.\n\n```\n#-----------------------------------------------------------------------\n\
    #\n#                   4 x 4 KEYPAD\n#                   ===========\n#\n# In\
