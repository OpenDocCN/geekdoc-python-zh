    - 列出蓝牙适配器：**hciconfig**\n\n## Python经典蓝牙库\n\n在开发程序之前，您需要安装Python经典蓝牙库。这可以通过在命令模式下输入以下命令完成：\n\
    \n```\npi@raspberrypi:~ $ **sudo apt-get install bluez python3-bluez**\n```\n\n\
