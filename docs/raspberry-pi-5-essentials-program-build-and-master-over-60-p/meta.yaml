    \ and returned. Figure 7.45 shows the program (program: myprog.py). As an example,\
    \ when the number is 3, the output from the program is:\n\n```\nCube of 3 is:\
    \ 27\n\ndef cube(N):\n    r = N * N * N\n    return r\n```\n\nFigure 7.44 Program\
    \ cubeno.py listing\n\n```\nimport cubeno\nn= 3\nres = cubeno.cube(n)\nprint(\"\
