    # # Chapter 16 • Raspberry Pi 5 Camera Projects


    # ## 16.1 Overview


    In this chapter, you will be developing various camera projects using the Raspberry
    Pi 5. The early sections of the chapter describe how to install and use the camera
    in still picture mode. In later sections, you will develop more interesting camera-based
    projects using the Python programming language.


    There are several Raspberry Pi camera modules. Version 1 was released in 2013,
    and it was a 5-megapixel model, which is not available anymore from Raspberry
    Pi. This was followed by Version 2, which was 8-megapixels and was released in
    2016. The latest model Version 3 has 12 megapixels and was released in 2023. Additionally,
    12-megapixel high-quality cameras for use with external lenses with CS or M12
    type mounting were released in 2020 and 2023 respectively. Raspberry Pi cameras
    are available as either visible-light-type or infrared-type for night vision.
    All cameras can take high-resolution pictures along with HD 1080p video, and they
    can all be controlled by software. See the following link for further information
    on Raspberry Pi cameras:


    https://www.raspberrypi.com/documentation/accessories/camera.html#about-the-camera-modules


    > **Note:** The Raspberry Pi 5 camera socket is a 15-pin socket, where most of
    the Raspberry Pi cameras have 22 pins. It may therefore be necessary to purchase
    a 15-pin to 22-pin cable to connect your camera to the Raspberry Pi 5 (see Figure
    16.1).


    ![](img/4c39fa287d846ab9ea3e468319162ce0_304_0.png)


    Figure 16.1 15-pin to 22-pin camera cable


    # ## 16.2 Installing the Camera


    The steps to install the camera on your Raspberry Pi 5 are as follows:


    +   - Make sure that your Raspberry Pi 5 is switched off

    - Locate one of the camera ports (Figure 1.1)'
  - '[PAGE 305]


    +   - Pull up the plastic cable holder slider of the camera port gently by holding
    from both ends. The cable holder slider will open

    - Insert the 15-pin camera ribbon cable (with the connector side facing the white
    side of the connector) into the cable holder

    - Push down the plastic cable holder slider so that it locks and holds the cable

    - Connect the 22-pin side of the cable to your camera

    - Apply power to your Raspberry Pi 5


    You should now be able to test your camera interface and carry out camera operations
    to capture still images and video frames. Notice that you must be in Desktop GUI
    mode with a monitor directly attached to Raspberry Pi 5 through the micro-HDMI
    cable to use the camera. *The author had problems using the camera remotely using
    his PC even though he was in Desktop GUI mode.* Also, the old camera commands
    **raspistill**, **raspiyuv**, **raspivid**, and **raspvidyuv** are now obsolete
    and cannot be used with the Raspberry Pi 5.


    In this chapter, a Version 2 visible-light camera is used by the author.


    # 16.3 Project 1 - Still camera commands


    In this project, you will be investigating and using the various camera commands
    to capture still images.


    # 16.3.1 libcamera


    **libcamera** is the new camera software which supports the four Raspberry Pi
    cameras: V1: OV5647, V2: IMX219, V3: IMX708, and third-party sensors such as IMX290,
    IMX327, OV9281, IMX378. The following libcamera commands are supported:


    **libcamera-hello**: this command starts a camera preview and displays it on the
    screen for 5 seconds


    **libcamera-jpeg**: this command captures high resolution JPEG still images


    **libcamera-still**: this is a more complex still camera command which emulates
    features of the original old raspistill command


    **libcamera-vid**: this is a video capture command


    **libcamera-raw**: this command captures raw (unprocessed) frames directly from
    the camera sensor


    **libcamera-hello**: This command starts the camera and displays a preview window
    for 5 seconds. The -t <duration> option enables the user to select for how long
    the window should be displayed, where <duration> is in milliseconds. For example,
    the following acti-'
- md: "## Options\n\nThe following website displays all the options:\n\nhttps://www.raspberrypi.com/documentation/computers/camera_software.html#common-command-line-options\n\
    \nThe options are in 3 groups: common options, still camera options, and video\
