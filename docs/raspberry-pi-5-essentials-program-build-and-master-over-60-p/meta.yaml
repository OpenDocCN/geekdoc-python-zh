    # Chapter 12 • Using the Sense HAT


    # 12.1 Overview


    The Sense HAT is a small plug-in board developed by Raspberry Pi in collaboration
    with the UK Space Agency and the European Space Agency (ESA). The board includes
    a number of sensors and that''s why it is called ''Sense''. The word ''HAT'' stands
    for ''Hardware Attached on Top'' to indicate that the board is attached or plugged
    in on top of the Raspberry Pi. Sense HAT gives the flexibility to carry out various
    environmental measurements using its built-in sensors, and the board was specially
    developed for the Astro Pi Challenge and competition. An emulator-based version
    of the Sense HAT is also available to enable students to carry out experiments
    without having the physical board.


    The Sense HAT board has the following features:


    +   - 8 × 8 RGB LED matrix, having 15-bit colour resolution

    - Five-button joystick with left, right, up, down, and enter movements

    - Gyroscope (angular rate sensor): ±245/500/2000 dps

    - Accelerometer (linear acceleration sensor): ±2/4/8/16 G

    - Magnetometer (magnetic sensor): ±4/8/12/16 gauss

    - Barometer: 260-1260 hPa

    - Temperature sensor (with barometer): accuracy ±2°C in the 0–65°C range

    - Relative humidity sensor: accuracy ±4.5% in the 20–80% range

    - Temperature sensor (with humidity): accuracy ±0.5°C in the 15–40°C range

    - Graphics controller chip


    # 12.2 The Sense HAT interface


    The Sense HAT board (Figure 12.1) consists of 7 main components and an LED matrix.
    The components on the board are controlled via the I²C bus interface. The following
    are the main components on the board:


    | Component | I²C bus address | Function |

    | :--- | :--- | :--- |

    | HTS221 | 0x5F | humidity sensor |

    | LPS254H | 0x5C | Pressure/temperature sensor |

    | LSM9DS1 | 0x1C,0x6A | Accelerometer+magnetometer |

    | SKRHABE010 | - | joystick |

    | LED2472G | 0x46 | LED matrix controller |

    | LED matrix | - | - |

    | ATTINY88 | - | Microchip microcontroller |


    The Sense HAT board is normally plugged into the 40-way connector of the Raspberry
    Pi. To interface external components to the Raspberry Pi in addition to the Sense
    HAT board, you need to connect the Sense HAT to the Raspberry Pi using either
    a ribbon cable or jumper wires so that other pins of the Raspberry Pi can be accessed.
    Additionally, if you are using an active cooler on your Raspberry Pi 5 then it
    is not possible to connect the Sense HAT to your board unless you use a ribbon
    cable or 2×20 pin header extension. Therefore, it is useful to know which pins
    of the Sense HAT board are used by Raspberry Pi 5, and which'
