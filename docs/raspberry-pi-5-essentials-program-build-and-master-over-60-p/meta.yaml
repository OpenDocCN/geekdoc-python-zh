    \ 图15.5显示了程序清单（**bluetxt.py**）。请勿将您的程序命名为**Bluetooth.py**！蓝牙代码类似于TCP/IP代码。在程序开始时，将socket和Bluetooth模块导入程序。然后程序创建一个蓝牙套接字，绑定并监听此套接字，然后等待接受连接。程序的其余部分在循环中执行，程序发出语句\
