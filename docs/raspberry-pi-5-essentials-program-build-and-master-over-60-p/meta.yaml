    ![](img/4c39fa287d846ab9ea3e468319162ce0_219_0.png)


    Figure 12.1 The Sense HAT board


    In addition to the I²C control lines, the ATTINY88 microcontroller on the board
    can be programmed via the SPI bus control lines (MOSI, MISO, SCK, CE0) provided
    on the board.


    The following pins are used by the Sense HAT 40-way connector:


    | Pin number | Raspberry Pi 5 port | Function |

    | :--- | :--- | :--- |

    | 3 | GPIO2 | SDA (I²C) |

    | 5 | GPIO3 | SCL (I²C) |

    | 1 | +3.3 V | power |

    | 19 | GPIO10 | MOSI (SPI) |

    | 21 | GPIO9 | MISO (SPI) |

    | 23 | GPIO11 | SCK (SPI) |

    | 24 | GPIO8 | CE0 (SPI) |

    | 9 | GND | power ground |

    | 2 | +5 V | power |

    | 16 | GPIO23 | INT |

    | 18 | GPIO24 | INT |

    | 22 | GPIO25 | PROG |

    | 27 | ID_SD | EEPROM |

    | 28 | ID_SC | EEPROM |


    The Sense HAT board can be connected to your Raspberry Pi 5 using only the following
    9 pins of the 40-way connector:


    | Sense HAT pin | Raspberry Pi 5 Pin | Function |

    | :--- | :--- | :--- |

    | 3 | 3 (GPIO2) | SDA (I²C) |

    | 5 | 5 (GPIO3) | SCL (I²C) |

    | 1 | 1 (+3.3 V) | power |

    | 9 | 9 (GND) | power ground |'
