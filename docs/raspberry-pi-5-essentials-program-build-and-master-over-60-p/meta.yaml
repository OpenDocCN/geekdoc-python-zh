- md: "## 14.4 Project 2 – Two-way communication with the smartphone using TCP/IP\n\
    \n**Description:** This project is similar to the previous one, but here two-way\
    \ communication is established between the Raspberry Pi 5 and the smartphone.\n\
    \nThe block diagram of the project is the same as Figure 14.3.\n\n**Program listing:**\
    \ Figure 14.9 shows the program listing (**tcp2way.py**). Here, port 5000 is used\
    \ as in the previous project. The program has been changed to send and receive\
    \ messages from the smartphone. Socket function **recv(byte count)** sends a message\
    \ over the TCP/IP link to the connected node.\n\n```python\n#=============================================================\n\
    #       SEND/RECEIVE TEXT MESSAGES USING TCP/IP\n#       ======================================\n\
    #\n# This is the TCP/IP server program. It receives text messages\n# from the\
    \ keyboard and sends to an Android smart phone over\n# a Wi-Fi link\n#\n# Author:\
    \ Dogan Ibrahim\n# File   : tcp2way.py\n# Date   : December, 2023\n#=============================================================\n\
    import socket\n\nsock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\nsock.setsockopt(socket.SOL_SOCKET,\
    \ socket.SO_REUSEADDR, 1)\nsock.bind((\"192.168.3.196\", 5000))\nsock.listen(1)\n\
    \nclient, addr = sock.accept()              # accept connection\nprint(\"Connected\
    \ to client: \", addr)      # connected message\n\nyn = 'y'\n\ntry:\n    while\
    \ yn == 'y':\n        msg = input(\"Enter your message: \")    # read a message\n\
    \        msg = msg +\"\\n\"\n        client.send(msg.encode('utf-8'))       #\
    \ send the message\n\n        msg = client.recv(1024)\n        print(\"Received\
    \ message: \")\n        print(msg.decode('utf-8'))\n\n        yn = input(\"Send\
    \ more messages?: \")\n        yn = yn.lower()\n\nexcept KeyboardInterrupt:\n\
    \    print(\"\\nclosing connection to client\")\n    sock.close()\n```\n\nFigure\
    \ 14.9 Program listing\n\n## Testing\n\nYou will be using the Android apps as\
    \ in Figure 14.5. Start the Raspberry Pi 5 server program and then exchange messages\
    \ between the smartphone and Raspberry Pi. Example communication is shown in Figure\
    \ 14.10. In this example, Raspberry Pi sends message **Message from RASPBERRY\
    \ PI**. In return, Android smartphone sends the message **message from ANDROID**.\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_262_0.png)\n\n## 14.5 Project 3 – Communicating\
    \ with a PC using TCP/IP\n\n**Description:** In this project, a TCP/IP-based communication\
    \ is established between the Raspberry Pi 5 and a PC running Python. Messages\
    \ are exchanged between the Raspberry Pi 5 and the PC. The aim of this project\
    \ is to show how TCP/IP communication can be established with a PC.\n\n**Background\
    \ Information:** In this project, the Raspberry Pi 5 is the server and the PC\
    \ is the client. The programs on both sides are developed using the Python programming\
    \ language. Python 3.10 is used on the PC. If you do not have Python on your PC,\
    \ you could install it from the following website:\n\nhttps://www.python.org/downloads/\n\
    \nBlock diagram: Figure 14.11 shows the block diagram.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_263_0.png)\n\
    \nRaspberry Pi 5 program listing: The Raspberry Pi 5 program listing is shown\
    \ in Figure 14.12 (tcppc.py). The program is very similar to the one given in\
    \ Figure 14.9, i.e. program: tcp2way.py. You should terminate the program by entering\
    \ Ctrl+C.\n\n```python\n#=============================================================\n\
    #       SEND/RECEIVE TEXT MESSAGES USING TCP/IP\n#       =====================================\n\
    #\n# This is the TCP/IP server program. It communicates with a PC\n# running TCP/IP\
    \ on the same port\n#\n# Author: Dogan Ibrahim\n# File   : tcppc.py\n# Date  \
    \ : October, 2023\n#=============================================================\n\
    import socket\nimport time\n\nsock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n\
    sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\nsock.bind((\"192.168.3.196\"\
    , 5000))\nsock.listen(1)\n\nclient, addr = sock.accept()                # accept\
    \ connection\nprint(\"Connected to client: \", addr)        # connected message\n\
    \ntry:\n    while True:\n        msg = input(\"Enter your message: \")  # read\
    \ a message\n        msg = msg +\"\\n\"\n        client.send(msg.encode('utf-8'))\
    \           # send the message\n\n        msg = client.recv(1024)\n        print(\"\
    Received message: \", msg.decode('utf-8'))\n\nexcept KeyboardInterrupt:\n    print(\"\
    \\nClosing connection to client\")\n    sock.close()\n    time.sleep(1)\n```\n\
    \nFigure 14.12 Raspberry Pi 5 program listing\n\n**PC Program Listing**: The PC\
    \ program listing is shown in Figure 14.13 (**client.py**). The program creates\
    \ a socket and connects to the server. Then, messages are exchanged between the\
    \ client and the server.\n\n```python\n#==================================================\n\
    #              TCP/IP CLIENT\n#              ============\n#\n# This is the client\
    \ program on the PC. The program exchanges\n# messages with the server on the\
    \ Raspberry Pi 5\n#\n# Author: Dogan Ibrahim\n# File   : client.py\n# Date   :\
    \ October, 2023\n#==================================================\nimport socket\n\
    import time\nsock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\nsock.setsockopt(socket.SOL_SOCKET,\
    \ socket.SO_REUSEADDR, 1)\nsock.connect((\"192.168.3.196\", 5000))\n\ntry:\n \
    \   while True:\n        msg = sock.recv(1024)\n        print(\"Received message:\
    \ \", msg.decode('utf-8'))\n        data = input(\"Enter message to send: \")\n\
    \        sock.send(data.encode('utf-8'))\n\nexcept KeyboardInterrupt:\n    print(\"\
    Closing connection to server\")\n    sock.close()\n    time.sleep(1)\n```\n\n\
    Figure 14.13 PC program listing\n\nThe steps to run the program are as follows:\n\
    \n- Run the server program on the Raspberry Pi 5\n- Run the client program on\
    \ the PC\n- Write messages as desired\n\nFigure 14.14 shows a typical run of the\
    \ two programs.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_265_0.png)\n\n**Note:**\
    \ You may find that after exiting the program, you may not be able to run it again.\
    \ This is because the socket stays open for about 30 seconds and the error message\
    \ saying that the **Address is already in use** may be displayed. You can check\
    \ the state of the port with the following command:\n\n```\npi@raspberrypi:~ $\
    \ netstat -n | grep 5000\n```\n\nIf the display includes the text **ESTABLISHED**,\
    \ then it means that the socket has not been closed properly, and you will have\
    \ to restart your Zero 2 W to run the program again. If on the other hand, you\
    \ see the message with **TIME_WAIT**, then you should wait about 30 seconds before\
    \ restarting the program.\n\n## 14.6 Project 4 – Controlling an LED connected\
    \ to Raspberry Pi 5 from a smartphone using TCP/IP\n\n**Description:** In this\
    \ project, an LED is connected to a Raspberry Pi 5. The LED is turned ON and OFF\
    \ by sending commands ON and OFF respectively from an Android smartphone. The\
    \ aim of this project is to show how an LED connected to a Raspberry Pi can be\
    \ controlled from an Android smartphone remotely by sending commands using the\
    \ TCP/IP protocol over a Wi-Fi link. In this project, Raspberry Pi 5 is the server,\
    \ and the smartphone is the client.\n\n**Block diagram:** Figure 14.15 shows the\
    \ block diagram of the project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_266_0.png)\n\
    \nThe LED is connected to port pin GPIO 21 (pin 49) through a 470 Ohm current\
    \ limiting resistor.\n\n**Program Listing:** Figure 14.16 shows the program listing\
    \ (program: **serverled.py**). As in the previous program, a socket is created\
    \ and port 5000 is used. LED is assigned to port GPIO pin 21, and turned OFF at\
    \ the beginning of the program. The server waits for a connection from the client\
    \ and then accepts the connection and displays the message **Connected**. It then\
    \ waits to receive a command from the client. If the command is **ON**, then the\
    \ LED is turned ON. If, on the other hand, the command is **OFF**, then the LED\
    \ is turned OFF. Sending command **X** terminates the server connection and exits\
    \ the program.\n\n```python\n#=================================================================\n\
    #               CONTROL LED FROM SMART PHONE\n#               ===========================\n\
    #\n# In this program TCP/IP is used where Raspberry Pi 5 is the server\n# and\
    \ smart phone is the client. An LED connected to Raspberry Pi 5\n# GPIO 21 and\
    \ is controlled from the smart phone\n#\n# Author: Dogan Ibrahim\n# File   : serverled.py\n\
    # Date   : December, 2023\n#=================================================================\n\
    import socket\nfrom gpiozero import LED\nfrom time import sleep\n\nled = LED(21)\
    \                    # LED at GPIO 21\nled.off()\n\nsock = socket.socket(socket.AF_INET,\
    \ socket.SOCK_STREAM)\nsock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR,\
    \ 1)\n```"
  mdcn: "## 14.4 项目2 – 使用TCP/IP与智能手机进行双向通信\n\n**描述：** 本项目与前一个项目类似，但这里在树莓派5和智能手机之间建立了双向通信。\n\
    \n项目的框图与图14.3相同。\n\n**程序清单：** 图14.9展示了程序清单（**tcp2way.py**）。这里，与前一个项目一样，使用了端口5000。程序已修改为可以向智能手机发送和接收消息。套接字函数\
