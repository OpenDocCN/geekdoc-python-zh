    # Program: XMAS.py\n# Date    : October, 2023\n# Author  : Dogan Ibrahim\n#------------------------------------------------------------\n\
    from gpiozero import LED\nfrom time import sleep        # import time library\n\
    import random                 # import random library\n\nPORT = [9,10,22,27,17,4,3,2]\
    \  # LED ports\n\n#\n# This function initializes the port list PORT[]\n#\ndef\
    \ Configure():\n    for i in range(8):\n        PORT[i] = LED(PORT[i])\n\n#\n\
    # This function sends 8-bit data (0 to 255) to the PORT\n#\ndef Port_Output(x):\n\
    \    b = bin(x)                    # convert into binary\n    b = b.replace(\"\
    0b\", \"\")        # remove leading \"0b\"\n    diff = 8 - len(b)            \
    \ # find the length\n    for i in range (0, diff):\n        b = \"0\" + b    \
    \            # insert leading 0s\n\n    for i in range (0, 8):\n        if b[i]\
    \ == \"1\":\n            PORT[i].on()\n        else:\n            PORT[i].off()\n\
    \    return\n#\n# Configure PORTs\n#\nConfigure()\n\n#\n# Main program loop. Count\
    \ up in binary every second\n#\nwhile True:\n    numb = random.randint(1, 255)\
    \ # generate a random number\n    Port_Output(numb)             # send cnt to\
    \ port\n    sleep(0.5)                    # wait 0.5 second\n```\n\nFigure 8.16\
    \ Program listing\n\n**Recommended modifications:** Modify the program such that\
    \ 10 LEDs can be connected to the Raspberry Pi 5 and flashed randomly.\n\n## 8.7\
    \ Project 5 – Chasing LEDs\n\n**Description:** In this project, eight LEDs are\
    \ connected to the Raspberry Pi 5 GPIO pins as in the previous project. As shown\
    \ in Figure 8.17, the LEDs rotate (chase each other) from the LSB to MSB with\
