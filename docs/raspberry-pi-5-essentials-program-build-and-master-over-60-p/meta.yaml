    # Author: DOgan Ibrahim

    # File   : serverled.py

    # Date   : December, 2023

    #=================================================================

    import socket

    from gpiozero import LED

    from time import sleep


    led = LED(21)                    # LED at GPIO 21

    led.off()


    sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)

    sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)

    ```'
