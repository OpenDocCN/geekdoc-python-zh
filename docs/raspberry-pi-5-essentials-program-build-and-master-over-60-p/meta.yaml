    # 3.3.4 Shutting Down


    Although you can disconnect the power supply from your Raspberry Pi 5 when you
    finish working with it, it is not recommended since there are many processes running
    on the system, and it is possible to corrupt the file system. It is much better
    to shut down the system in an orderly manner.


    The following command will stop all the processes and make the file system safe,
    and then turn off the system safely:


    ```

    pi@raspberrypi:~$ sudo halt

    ```


    The following command stops and then restarts the system:


    ```

    pi@raspberrypi:~$ sudo reboot

    ```


    The system can also be shut down and then restarted after a time by entering the
    following command. Optionally, a shutdown message can be displayed if desired:


    ```

    pi@raspberrypi:~$ shutdown -r <time> <message>

    ```


    To shutdown at 1:55 AM:


    ```

    pi@raspberrypi:~$ sudo shutdown -h 01:55:

    ```'
