    # 14.8 Project 6 – Controlling an LED connected to Raspberry Pi 5 from a smartphone
    using UDP


    **Description:** In this project, an LED is connected to Raspberry Pi 5 port pin
    GPIO 21 (pin 40) through a 470 Ohm current limiting resistor. The LED is turned
    ON and OFF by sending commands **ON** and **OFF** respectively from an Android
    smartphone. The aim of this project is to show how an LED on the Raspberry Pi
    5 can be controlled from a smartphone by sending commands using the UDP protocol
    over a Wi-Fi link. Here, the Raspberry Pi 5 is the server and the smartphone is
    a client.


    The LED can easily be replaced with a relay, for example, to control electrical
    appliances from a smartphone.


    **Program Listing:** Figure 14.21 shows the program listing (**udpled.py**). As
    in the previous program, a socket is created and the server waits to receive commands
    from a client to control the LED. If the command is **ON**, then the LED is turned
    ON. If on the other hand, the command is **OFF**, the LED is turned OFF. Command
    **X** terminates the server program.'
