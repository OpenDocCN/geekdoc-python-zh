  - "[PAGE 64]\n\n# Chapter 6 • Creating and Running a Python Program\n\n# 6.1 Overview\n\
    \nYou will be programming your Raspberry Pi 5 using the Python programming language.\
    \ It is worthwhile to look at the creation and running of a simple Python program\
    \ on your Raspberry Pi 5 computer. In this chapter, the message **Hello From Raspberry\
    \ Pi 5** will be displayed on your PC screen.\n\nAs described below, there are\
    \ three methods that you can create and run Python programs on your Raspberry\
    \ Pi 5.\n\n# 6.2 Method 1 – Interactively from command prompt in console mode\n\
    \nIn this method, you will log in to your Raspberry Pi 5 using the SSH and then\
    \ create and run the Python program interactively. This method is excellent for\
    \ small programs. The steps are as follows:\n\n+   - Login to the Raspberry Pi\
    \ 5 using SSH\n- At the command prompt, enter **python**. You should see the Python\
    \ command mode, which is identified by three characters \">>>\"\n- Type the program:\n\
    \n    python\n    print (\"Hello From Raspberry Pi 5\")\n    \n\n- The text will\
    \ be displayed interactively on the screen as shown in Figure 6.1. Note that at\
    \ the time of writing this book, the Python version was: 3.11.2.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_64_0.png)\n\
    \n+   - Type **Ctrl+z** to exit the program\n\n# 6.3 Method 2 – Create a Python\
    \ file in console mode\n\nIn this method, you will log in to your Raspberry Pi\
    \ 5 using the SSH as before and then create a Python file. A Python file is simply\
    \ a text file with the extension **.py**. You can use a text editor, e.g. the\
    \ **nano** text editor, to create your file. In this example, a file called **hello.py**\
    \ is created using the **nano** text editor. Figure 6.2 shows the contents of\
    \ file **hello.py**. This figure also shows how to run the file under Python.\
    \ Notice that the program is run by entering the command:\n\n```\n>>> python hello.py\n\
    ```"
- md: "## 6.4 Method 3 – Create a Python file in Desktop GUI mode\n\nIn this method,\
    \ you can log in to your Raspberry Pi 5 using either a directly connected terminal\
    \ through the mini HDMI port, or if you don't have a monitor, you can log in to\
    \ the Desktop using the VNC as described earlier, and then create and run your\
    \ Python programs in GUI mode using the Thonny IDE. It is worthwhile at this stage\
    \ to learn the basics of using the Thonny IDE.\n\n## The Thonny IDE\n\nStart the\
    \ Thonny IDE from the Desktop under the **Programming** menu. Figure 6.3 shows\
    \ the Thonny startup menu.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_65_0.png)\n\
    \nThe screen consists of two parts: the upper part is where you write your programs.\
    \ The lower part is the shell, where small interactive programs can be written.\
    \ This part is mainly used for testing code snippets.\n\nIn the upper part contains\
    \ the following menu items:\n\n- **New**: click to create a new program\n- **Load**:\
    \ load an existing program from a folder on Raspberry Pi\n- **Save**: save an\
    \ existing program on the screen to a file\n- **Run**: run the program on the\
    \ screen\n- **Debug**: debug the program on the screen\n- **Over**: used by the\
    \ debugger\n- **Into**: used by the debugger\n- **Out**: used by the debugger\n\
    - **Stop**: stop a running program\n- **Zoom**: zoom the screen\n- **Quit**: Exit\
    \ the Thonny IDE\n\nThe Thonny IDE must be configured before it is used to write\
    \ and upload programs to your Raspberry Pi. Click the bottom-right corner of the\
    \ screen to select your processor type and select **Local Python 3**. You are\
    \ now ready to write your program. The steps are:\n\n- Type the following code\
    \ in the upper part of the screen:\n\n    ```python\n    print(\"Hello from Raspberry\
    \ Pi 5\")\n    ```\n\n- Click **File** → Save and save with the name hello.py\
    \ (Figure 6.4)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_66_0.png)\n\n*Figure\
    \ 6.4 Type your program and save it*\n\n- Click the **Run** icon (green menu button\
    \ at the top) to run the program. The output of the program will be displayed\
    \ at the bottom of the screen as shown in Figure 6.5.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_66_1.png)\n\
    \n*Figure 6.5 Run the program*\n\nYou can run small programs in interactive mode\
    \ by entering them at the lower part of the screen under **shell**. The results\
    \ will be displayed under **shell** immediately.\n\n## 6.5 Which method?\n\nThe\
    \ choice of a method depends upon the size and complexity of a program. Small\
    \ programs can be run interactively without creating a program file. Larger programs\
    \ can be created as Python files, and then they can run either in the console\
    \ mode or in Desktop GUI mode under the Thonny IDE. Running under the Thonny IDE\
    \ has the advantage that justification of the code is corrected automatically\
    \ as you write the code. In this book, the Thonny IDE is used for small programs\
    \ and the nano editor is used for larger programs to create the program files.\n\
    \n## Chapter 7 • Python Programming and Simple Programs\n\n## 7.1 Overview\n\n\
    Python is an interpreted, interactive and object-oriented programming language.\
    \ It was developed by Guido van Rossum in the 1980s at the National Institute\
    \ for Mathematics and Computer Science in the Netherlands. It is derived from\
    \ many other languages, including C, C++, Modula-3, SmallTalk, and Unix shells.\
    \ The language is now maintained by a team of people at the Institute.\n\nPython\
    \ is interactive, which means that you can issue a command and see the result\
    \ immediately without having to compile the command. It is interpreted, thus requiring\
    \ no pre-compilation before it is run.\n\nPython supports object-oriented techniques\
    \ of programming. It is a beginners' language which is easy to learn and easy\
    \ to maintain. Beginners can easily learn programming in a relatively short period\
    \ of time. Python supports a large library of functions, which makes it powerful.\
    \ The language is portable, meaning that it can run on several different popular\
    \ platforms.\n\nIn this and next chapters, you will be learning the details of\
    \ the Python programming language on the Raspberry Pi 5 computer, and see how\
    \ you can write programs using this language. Many example programs are given\
    \ to show how electronic engineers can use the Python language to help them in\
    \ their calculations.\n\n## 7.2 Variable names\n\nPython variable names are case-sensitive\
    \ and can start with a letter **A** to **Z** or **a** to **z** or an underscore\
    \ character '_', followed by more letters or numbers 0 to 9. Some valid and invalid\
    \ example variable names are given below:\n\n- SUM - valid\n- Sum - valid\n- SUm\
    \ - valid\n- _total - valid\n- Cnt5 - valid\n- 8tot - invalid\n- %int - invalid\n\
    - &xyz - invalid\n- My_Number - valid\n- @loop - invalid\n- _Account - valid\n\
    \nNote that variables **total**, **Total**, **TOTAL**, **ToTaL**, or **toTAL**\
    \ are all different.\n\n## 7.3 Reserved words\n\nThere are some words which are\
    \ reserved for use by the Python interpreter and thus cannot be used as variable\
    \ names by programmers. A list of these reserved words is given below. Notice\
    \ that all the reserved words contain lower-case letters:\n\n- and, assert, break,\
    \ class, continue, def, del, elif, else, except, exec, finally, for, from, global,\
    \ if, import, in, is, lambda, not, or, pass, print, raise, return, try, while,\
    \ with, yield\n\n## 7.4 Comments\n\nComment lines in Python start with a hash\
    \ sign '#'. All characters after the # sign are ignored by the Python interpreter.\
    \ An example comment line is shown below:\n\n```\n# This is a comment line\n```\n\
    \nComments can also be inserted after a statement:\n\n```\nSum = 0 # Another comment\n\
    ```\n\n## 7.5 Line continuation\n\nThe line continuation character '\\' can be\
    \ used to continue a statement on the following lines. An example is shown below:\n\
    \n```\nSum = a +\\\n    b +\\\n    c\n```\n\nWhich is equivalent to:\n\n```\n\
    Sum = a + b + c\n```\n\n## 7.6 Blank lines\n\nA line containing no statements\
    \ is ignored by the Python interpreter.\n\n## 7.7 More than one statement on a\
    \ line\n\nIt is permissible to have more than one statement on a single line by\
    \ separating the statements with a semicolon character. An example is given below:\n\
    \n```\ncnt = 5; sum = 0; tot = 20;\n```\n\n## 7.8 Indentation\n\nIn most programming\
    \ languages, blocks of code are identified by using braces at the beginning and\
    \ end of the block, or by identifying the end of the block using a suitable statement.\
    \ e.g. END, WEND, or ENDIF. In the Python language, there are no braces or statements\
    \ to indicate the start and end of a block. Instead, blocks of code are identified\
    \ by line indentation. All statements within a block must be indented the same\
    \ amount. The actual number of spaces used to indent a block is not relevant as\
    \ long as all the statements in the block use the same number of spaces.\n\nA\
    \ valid block of code is given below (don't worry at this stage what the code\
    \ does):\n\n```\nif j == 5:\n    a = a + 1\n    b = a + 2\nelse:\n    a = 0\n\
    \    b = 0\n```\n\nThe following block of code is not valid since the indentation\
    \ is not correct:\n\n```\nif j == 5:\n    a = a + 1\n    b = a + 2\nelse:\n  \
    \  a = 0\n    b = 0\n```\n\n## 7.9 Python data types\n\nPython supports the following\
    \ data types:\n\n- Numbers\n- Strings\n- Lists\n- Dictionaries\n- Tuples\n- Sets\n\
    - Files\n\n## 7.10 Numbers\n\nPython supports the following numeric variable types:\n\
    \n- **int** - signed integer\n- **long** - long integer\n- **float** - floating-point\
    \ real number\n\n**Complex number**\nNumbers can be represented in decimal, octal,\
    \ binary, or hexadecimal. Long integers are shown with an upper-case letter **L**.\n\
    \nSome example numbers are shown below:\n\n**Integer**\n100 - decimal\n-67 - decimal\n\
    500 - decimal\n0x20 - hexadecimal\n0b10000001 - binary\n0o2377 - octal\n202334567L\
    \ - long decimal\n0x3AEFEAE - hexadecimal\n\n**Floating point**\n2.355\n23.780\n\
    -45.6\n1.298\n24.45E4\n\n**Complex**\n24.4+2.6j\n0.78-4.2j\n23.7j\n\nWe can assign\
    \ numeric values to variables. These variable objects are created when values\
    \ are assigned to them:\nsum = 28\na = 0\n\nWe can delete a variable object by\
    \ using the **del** statement:\ndel sum, a\n\nWe can assign a value to several\
    \ variables at the same time:\nw = x = y = z = 0"
  mdcn: "## 6.4 方法三 – 在桌面图形界面模式下创建 Python 文件\n\n在此方法中，你可以通过 mini HDMI 端口直接连接终端来登录你的树莓派\
    \ 5，或者如果你没有显示器，可以按照前面描述的方式使用 VNC 登录桌面，然后使用 Thonny IDE 在图形界面模式下创建和运行你的 Python 程序。现阶段学习使用\
    \ Thonny IDE 的基础知识是值得的。\n\n## Thonny IDE\n\n从桌面的 **Programming** 菜单下启动 Thonny\
    \ IDE。图 6.3 展示了 Thonny 的启动菜单。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_65_0.png)\n\
    \n屏幕分为两部分：上半部分是你编写程序的地方。下半部分是 shell，可以在其中编写小型交互式程序。这部分主要用于测试代码片段。\n\n上半部分包含以下菜单项：\n\
    \n- **New**：点击创建一个新程序\n- **Load**：从树莓派上的文件夹加载一个现有程序\n- **Save**：将屏幕上的现有程序保存到文件\n\
    - **Run**：运行屏幕上的程序\n- **Debug**：调试屏幕上的程序\n- **Over**：调试器使用\n- **Into**：调试器使用\n\
    - **Out**：调试器使用\n- **Stop**：停止正在运行的程序\n- **Zoom**：缩放屏幕\n- **Quit**：退出 Thonny IDE\n\
    \n在使用 Thonny IDE 编写和上传程序到你的树莓派之前，必须对其进行配置。点击屏幕右下角选择你的处理器类型，并选择 **Local Python\
    \ 3**。现在你已准备好编写你的程序。步骤如下：\n\n- 在屏幕的上半部分输入以下代码：\n\n    ```python\n    print(\"\
    Hello from Raspberry Pi 5\")\n    ```\n\n- 点击 **File** → Save，并以 hello.py 为名保存（图\
    \ 6.4）\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_66_0.png)\n\n*图 6.4 输入你的程序并保存*\n\
    \n- 点击 **Run** 图标（顶部的绿色菜单按钮）来运行程序。程序的输出将显示在屏幕底部，如图 6.5 所示。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_66_1.png)\n\
    \n*图 6.5 运行程序*\n\n你可以在交互模式下运行小型程序，方法是在屏幕下半部分的 **shell** 下输入它们。结果将立即显示在 **shell**\
    \ 下。\n\n## 6.5 选择哪种方法？\n\n方法的选择取决于程序的大小和复杂性。小型程序可以在不创建程序文件的情况下交互式运行。较大的程序可以创建为\
    \ Python 文件，然后可以在控制台模式下或在 Thonny IDE 的桌面图形界面模式下运行。在 Thonny IDE 下运行的优势在于，当你编写代码时，代码的格式会自动修正。在本书中，Thonny\
    \ IDE 用于小型程序，而 nano 编辑器用于较大的程序以创建程序文件。\n\n## 第 7 章 • Python 编程与简单程序\n\n## 7.1\
    \ 概述\n\nPython 是一种解释型、交互式和面向对象的编程语言。它由 Guido van Rossum 在 20 世纪 80 年代于荷兰国家数学与计算机科学研究所开发。它源于许多其他语言，包括\
    \ C、C++、Modula-3、SmallTalk 和 Unix shells。该语言现在由研究所的一个团队维护。\n\nPython 是交互式的，这意味着你可以发出命令并立即看到结果，而无需编译命令。它是解释型的，因此运行前无需预编译。\n\
    \nPython 支持面向对象的编程技术。它是一种初学者语言，易于学习和维护。初学者可以在相对较短的时间内轻松学习编程。Python 支持大量的函数库，使其功能强大。该语言是可移植的，意味着它可以在多个不同的流行平台上运行。\n\
    \n在本章和下一章中，你将学习树莓派 5 计算机上 Python 编程语言的细节，并了解如何使用这种语言编写程序。书中给出了许多示例程序，展示电子工程师如何使用\
    \ Python 语言来帮助他们进行计算。\n\n## 7.2 变量名\n\nPython 变量名区分大小写，可以以字母 **A** 到 **Z** 或 **a**\
    \ 到 **z** 或下划线字符 '_' 开头，后跟更多字母或数字 0 到 9。下面给出了一些有效和无效的示例变量名：\n\n- SUM - 有效\n- Sum\
    \ - 有效\n- SUm - 有效\n- _total - 有效\n- Cnt5 - 有效\n- 8tot - 无效\n- %int - 无效\n- &xyz\
    \ - 无效\n- My_Number - 有效\n- @loop - 无效\n- _Account - 有效\n\n请注意，变量 **total**、**Total**、**TOTAL**、**ToTaL**\
    \ 或 **toTAL** 都是不同的。\n\n## 7.3 保留字\n\n有一些词是保留给 Python 解释器使用的，因此程序员不能将它们用作变量名。下面列出了这些保留字。请注意，所有保留字都包含小写字母：\n\
    \n- and, assert, break, class, continue, def, del, elif, else, except, exec, finally,\
    \ for, from, global, if, import, in, is, lambda, not, or, pass, print, raise,\
    \ return, try, while, with, yield\n\n## 7.4 注释\n\nPython 中的注释行以井号 '#' 开头。Python\
    \ 解释器会忽略 # 号后的所有字符。下面是一个注释行的示例：\n\n```\n# This is a comment line\n```\n\n注释也可以插入在语句之后：\n\
    \n```\nSum = 0 # Another comment\n```\n\n## 7.5 行续接\n\n行续接字符 '\\' 可用于将语句续接到下一行。下面是一个示例：\n\
    \n```\nSum = a +\\\n    b +\\\n    c\n```\n\n这等同于：\n\n```\nSum = a + b + c\n```\n\
    \n## 7.6 空行\n\nPython 解释器会忽略不包含任何语句的行。\n\n## 7.7 一行多条语句\n\n允许在单行上有多条语句，只需用分号字符分隔语句即可。下面是一个示例：\n\
