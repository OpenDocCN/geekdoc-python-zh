  md: '# # Chapter 3 • Using The Console Commands


    # ## 3.1 Overview


    Raspberry Pi is based on a version of the Linux operating system. Linux is one
    of the most popular operating systems in use today. Linux is very similar to other
    operating systems, such as Windows and UNIX. Linux is an open operating system
    based on UNIX and has been developed collaboratively by many companies since 1991.
    In general, Linux is harder to manage than some other operating systems like Windows,
    but offers more flexibility and configuration options. There are several popular
    versions of the Linux operating system, such as Debian, Ubuntu, Red Hat, Fedora
    and so on.


    Linux commands are text-based. In this chapter, you will be looking at some of
    the useful Linux commands and see how you can manage your Raspberry Pi using these
    commands.


    When you apply power to your Raspberry Pi 5, the Linux command line (or the Linux
    shell, or Console commands) is the first thing you see, and it is where you can
    enter operating system commands.


    # ## 3.2 The Command Prompt


    Assuming your username is **pi**, after you log in to Raspberry Pi 5, you will
    see the following prompt displayed where the system waits for you to enter a command:


    ```

    pi@raspberrypi: ~$

    ```


    Here, **pi** is the name of the user who is logged in. **raspberrypi** is the
    name of the computer, used to identify it when connecting over the network.


    ~ character indicates that you are currently in your default directory.


    # ## 3.3 Useful Console commands


    In this section, you will be learning some of the useful Console commands, where
    examples will be given for each command. **In this chapter, commands entered by
    the user are shown in bold for clarity.** Also, it is important to remind you
    that all the commands must be terminated by the Enter key.


    # ### 3.3.1 System and user information


    These commands are useful as they tell you information about the system. Command
    **cat /proc/cpuinfo** displays information about the processor (command **cat**
    displays the contents of a file. In this example, the contents of file **/proc/cpuinfo**
    is displayed). Since there are four cores in the Raspberry Pi 5, the display is
    in four sections. Figure 3.1 shows an example display, where only part of the
    display is shown here.'
  merge: -1
  pgno: 30
- img_proc: true
