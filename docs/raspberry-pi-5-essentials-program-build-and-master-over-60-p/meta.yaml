  md: "**Program listing:** The program is called **LED.py** and the listing is shown\
    \ in Figure 8.6. The program was written using the **nano** text editor. At the\
    \ beginning of the program, the **gpiozero** and the **time** modules are imported\
    \ to the project. The rest of the program is executed indefinitely in a **while**\
    \ loop, where the LED is turned on and off with a one-second delay between each\
    \ output change. Press Ctrl+C to terminate the program.\n\n```\n#--------------------------------------------------\n\
    #\n#              FLASHING LED\n#              ============\n#\n# In thisproject\
    \ a small LED is connected to GPIO 17 of\n# the Raspberry Pi 5. The program flashes\
    \ the LED every\n# second.\n#\n# Program: LED.py\n# Date    : October, 2023\n\
    # Author  : Dogan Ibrahim\n#--------------------------------------------------\n\
    from gpiozero import LED      # import gpiozero\nfrom time import sleep      \
    \  # import time library\n\nled = LED(17)\n\nwhile True:\n    led.on()       \
    \           # turn ON LED\n    sleep(1)                  # wait 1 second\n   \
    \ led.off()                 # turn OFF LED\n    sleep(1)                  # wait\
    \ 1 second\n```\n\n*Figure 8.6 Program listing of the project*\n\nThe program\
    \ is run from the console mode as follows:\n\n```\npi@raspberrypi ~ $ **python\
    \ LED.py**\n```\n\nIf you wish to run the program from the GUI Desktop environment,\
