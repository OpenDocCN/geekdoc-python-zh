- md: "In this project, an HC-SR04-type ultrasonic transmitter/receiver module is\
    \ used (see Figure 9.37). These modules have the following specifications:\n\n\
    - Operating voltage (current): 5 V (2 mA) operation\n- Detection distance: 2 cm\
    \ – 450 cm\n- Input trigger signal: 10 µs TTL\n- Sensor angle: not more than 15\
    \ degrees\n\nThe sensor modules have the following pins:\n\nVcc: +V power\nTrig:\
    \ Trigger input\nEcho: Echo output\nGnd: Power ground\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_167_0.png)\n\
    \nFigure 9.37 Ultrasonic transmitter/receiver module\n\nThe principle of operation\
    \ of the ultrasonic sensor module is as follows:\n\n- A 10 µs trigger pulse is\
    \ sent to the module\n- The module then sends eight 40 kHz square wave signals\
    \ and automatically detects the returned (echoed) pulse signal\n- If an echo signal\
    \ is returned, the time to receive this signal is recorded\n- The distance to\
    \ the object is calculated as:\n\nDistance to object (in metres) = (time to received\
    \ echo in seconds * speed of sound) / 2\n\nThe speed of sound is 340 m/s, or 0.034\
    \ cm/µs\n\nTherefore,\n\nDistance to object (in cm) = (time to received echo in\
    \ µs) * 0.034 / 2\n\nor,\n\nDistance to object (in cm) = (time to received echo\
    \ in µs) * 0.017\n\nFigure 9.38 shows the principle of operation of the ultrasonic\
    \ sensor module. For example, if the time to receive the echo is 294 microseconds,\
    \ then the distance to the object is calculated as:\n\nDistance to object (cm)\
    \ = 294 × 0.017 = 5 cm\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_168_0.png)\n\
    \nFigure 9.39 shows the circuit diagram of the project. The trig and echo pins\
    \ of the sensor are connected to GPIO 4 and GPIO 17 respectively. The echo output\
    \ of the ultrasonic sensor is connected to the Raspberry Pi 5 through a resistive\
    \ potential divider circuit to drop the voltage level to +3.3 V.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_168_1.png)\n\
    \n**Program listing:** Figure 9.40 shows the program listing (**ultrasonic.py**).\
    \ At the beginning of the program, module **DistanceSensor** of **gpiozero** is\
    \ imported to the program. Then the **echo** and **trigger** pins are defined.\
    \ The remainder of the program runs in a loop where the distance is measured and\
    \ displayed on the screen. Figure 9.41 shows an example output from the program.\n\
    \n```\n#-----------------------------------------------------------------------\n\
    #           ULTRASONIC DISTANCE SENSOR\n#           ========================\n\
    #\n# This program uses a HC-SR04 type ultrasonic transmitter/receiver\n# to measure\
    \ the distance to an obstacle in-front of the sensor.\n# The measured distance\
    \ is displayed on the screen.\n#\n# Program: ultrasonic.py\n# Date    : October\
    \ 2023\n# Author  : Dogan Ibrahim\n#-----------------------------------------------------------------------\n\
    \nfrom gpiozero import DistanceSensor\nfrom time import sleep\n\nsensor = DistanceSensor(echo=17,\
    \ trigger=4)\n\nwhile True:\n    print(\"Distanc (cm)= %6.2f\" %(sensor.distance\
    \ * 100))\n    sleep(1)\n```\n\nFigure 9.40 Program listing\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_169_0.png)\n\
    \nFigure 9.41 Example output\n\n## 9.15 Project 12 – Car parking sensors\n\n**Description:**\
    \ This is a parking sensors project to help a person park a car safely and easily.\
    \ A pair of ultrasonic transmitter/receiver sensors is mounted in the front and\
    \ back of a vehicle to sense the distance to the objects, and an active buzzer\
    \ sounds if the sensors are too close to the objects in front of them. In this\
    \ project, safe distance is assumed to be 10 cm.\n\n**Block Diagram:** Figure\
    \ 9.42 shows the block diagram of the project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_170_0.png)\n\
    \nFigure 9.42 Block diagram of the project\n\n**Circuit Diagram:** Figure 9.43\
    \ shows the circuit diagram. The **trig** and **echo** pins of the Front ultrasonic\
    \ sensor are connected to GPIO 4 and GPIO 17 respectively, as in the previous\
    \ project. Similarly, the **trig** and **echo** pins of the rear ultrasonic sensor\
    \ are connected to GPIO 27 and GPIO 22 respectively. Echo outputs of the ultrasonic\
    \ sensors are connected to the Raspberry Pi 5 through resistive potential divider\
    \ resistors to drop the voltage levels to +3.3 V. The active buzzer is connected\
    \ to GPIO 10 of the Raspberry Pi 5.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_170_1.png)\n\
    \nFigure 9.43 Circuit diagram of the project\n\n**Program listing:** Figure 9.44\
    \ shows the program listing (program **parking.py**). Module **DistanceSensor**\
    \ of gpiozero is imported to the program. If the distance of either sensor to\
    \ the objects is less than or equal to the **Allowed_Distance** (which is set\
    \ to 10 cm) then the buzzer is sounded to indicate that the vehicle is too close\
    \ to objects (either at the front or at the rear).\n\nSince the parking sensor\
    \ is to be operated away from a PC, it is necessary to auto start the program\
    \ when power is applied to the Raspberry Pi 5. The program name **parking.py**\
    \ must be included in file **/etc/rc.local** in the following format so that the\
    \ program starts as soon as the Raspberry Pi 5 starts after a power-up or after\
    \ a reboot:\n\n```\npython /home/pi/robot2.py &\n```\n\n```\n#-----------------------------------------------------------------------\n\
    #                       PARKING SENSORS\n#                       =============\n\
    #\n# This is a parking sensors project. Ultrasonic tranamitter/receiver\n# sensors\
    \ are attached to the front and rear of a vehicle. In addition\n# an active buzzer\
    \ is connected to the Raspberry Oi 5. The program senses\n# the objects in the\
    \ front and rear of the vehicle and sounds the buzzer\n# if the vehicle is too\
    \ close to the objects. In this project a distance\n# less than 10cm is considered\
    \ to be too close.\n#\n# File  : parking.py\n# Date  : October, 2023\n# Author:\
    \ Dogan Ibrahim\n#-----------------------------------------------------------------------\n\
    from gpiozero import DistanceSensor, LED\nfrom time import sleep\n\nBuzzer = LED(10)\
    \                                    # Buzzer at GPIO 10\n\nsensorForward = DistanceSensor(echo=17,\
    \ trigger=4)\nsensorRear = DistanceSensor(echo=22, trigger=27)\nAllowed_Distance\
    \ = 10\n\nBuzzer.off()\n\nwhile True:\n    obstacle_f = sensorForward.distance\
    \ * 100        # Forward distance\n    obstacle_r = sensorRear.distance * 100\
    \           # Rear distance\n    if obstacle_f <= Allowed_Distance or obstacle_r\
    \ <= Allowed_Distance:\n        Buzzer.on()\n    else:\n        Buzzer.off()\n\
    ```\n\nFigure 9.44 Program listing\n\nAfter applying power, wait until the Raspberry\
    \ Pi 5 boots, and the program should start automatically. You should remove your\
    \ Python program name from file **/etc/rc.local** after testing and completing\
    \ your project so that the program does not start every time you restart your\
    \ Raspberry Pi 5!\n\n## 9.16 Project 13 – Fading LED\n\n**Description:** In this\
    \ project, an LED is connected to GPIO 21 (pin 40) of the Raspberry Pi 5 through\
    \ a 470 Ohm current limiting resistor. The brightness of the LED fades in and\
