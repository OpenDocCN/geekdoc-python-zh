  md: 'A new user can be added to your Raspberry Pi 5 using the command **useradd**.
    In the example in Figure 3.5, a user called **John** is added. A password for
    the new user can be added using the **passwd** command followed by the username.
    In Figure 3.4, the password for user John is set to **mypassword** (not displayed
    for security reasons). Notice that both the **useradd** and **passwd** are privileged
    commands, and the keyword **sudo** must be entered before these commands. Notice
    that the **-m** option creates a home directory for the new user.


    ```

    pi@raspberrypi:~ $ sudo useradd -m John

    pi@raspberrypi:~ $ sudo passwd John

    New password:

    Retype new password:

    passwd: password updated successfully

    pi@raspberrypi:~ $ █

    ```


