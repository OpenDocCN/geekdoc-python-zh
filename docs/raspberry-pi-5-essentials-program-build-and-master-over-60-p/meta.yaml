    \ == 0:\n        x = char[0]\n    if col2.value == 0:\n        x = char[1]\n \
    \   if col3.value == 0:\n        x = char[2]\n    if col4.value == 0:\n      \
    \  x = char[3]\n    line.on()\n    return x\n\n#\n# This function waits until\
