  md: '# Chapter 14 • Communication over Wi-Fi


    # 14.1 Overview


    Perhaps the two major features of the Raspberry Pi 5 are its Wi-Fi and Bluetooth
    communication capabilities. Raspberry Pi 5 is equipped with a dual-band 2.4 GHz
    802.11ac wireless LAN module and Bluetooth 5.0/Bluetooth Low Energy (BLE). Without
    such features, you have to use external network-based hardware communication modules
    to communicate over the Internet. Network communication is handled using either
    UDP or TCP type protocols. In this chapter, you will be learning how to write
    Python programs using both the UDP and TCP type protocols using the on-board Wi-Fi
    module.


    # 14.2 UDP and TCP


    Communication over a Wi-Fi link is in the form of client and server, and sockets
    are used to send and receive data packets. The server side usually waits for a
    connection from the clients and once a connection is made, two-way communication
    can start. Two protocols are mainly used for sending and receiving data packets
    over a Wi-Fi link: UDP and TCP. TCP is a connection-based protocol which guarantees
    the delivery of packets. Packets are given sequence numbers and the reception
    of all the packets is acknowledged to avoid them arriving in the wrong order.
    As a result of this confirmation, TCP is usually slow, but it is reliable as it
    guarantees the delivery of packets. UDP, on the other hand, is not connection-based.
    Packets do not have sequence numbers and as a result of this, there is no guarantee
    that the packets will arrive at their destinations, or they may arrive in the
    wrong order. UDP has less overhead than TCP and, as a result, it is faster. Table
    14.1 lists some of the differences between the TCP and UDP protocols.


    | TCP | UDP |

    |---|---|

    | Packets have sequence numbers and delivery of every packet is acknowledged |
    There is no delivery acknowledgement |

    | Slow | Fast |

    | No packet loss | Packets may be lost |

    | Large overhead | Small overhead |

    | Requires more resources | Requires fewer resources |

    | Connection based | Not connection based |

    | Not suitable for multicast | Has multicast capability |

    | More difficult to program | Easier to program |

    | Examples: HTTP, HTTPS, FTP | Examples: DNS, DHCP, Computer games |


    Table 14.1 TCP and UDP packet communications'
