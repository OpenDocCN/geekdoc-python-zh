    \ sys.path\n```\n\nThe display on the author's computer is shown in Figure 7.46.\n\
    \n```\n>>> import sys\n>>> sys.path\n['', '/usr/lib/python311.zip', '/usr/lib/python3.11',\
    \ '/usr/lib/python3.11/lib-dynload', '/usr/local/lib/python3.11/dist-packages',\
    \ '/usr/lib/python3/dist-packages', '/usr/lib/python3.11/dist-packages']\n>>>\
    \ \n```\n\nFigure 7.46 Python path display\n\nTo make sure that your module is\
    \ found by Python, you can do one of the following:\n\n- Put the module program\
    \ file in the folder where your main program is\n- Modify PYTHONPATH environment\
    \ variable to contain the folder where the module program is\n- Put the module\
    \ program in one of the folders already contained in the PYTHONPATH\n\nRaspberry\
    \ Pi 5 Essentials\n\n# Chapter 8 • Raspberry Pi 5 LED Projects\n\n## 8.1 Overview\n\
    \nThis chapter is about the Raspberry Pi 5 hardware interface and using LEDs in\
    \ simple projects. The Raspberry Pi 5 is connected to external electronic circuits\
    \ and devices using its GPIO (General Purpose Input Output) port connector. This\
    \ is a 2.54 mm, 40-pin expansion header, arranged in a 2 × 20 strip as shown in\
    \ Figure 8.1. The I/O ports are numbered as GPIO nn\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_113_0.png)\n\
    \n## 8.2 Raspberry Pi 5 GPIO pin definitions\n\nWhen the GPIO connector is at\
    \ the far side of the board, the pins starting from the left of the connector\
    \ are numbered as 1, 3, 5, 7, and so on, while the ones at the top are numbered\
    \ as 2, 4, 6, 8 and so on (Figure 8.2)\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_113_1.png)\n\
    \nThe GPIO provides 26 general-purpose bidirectional I/O pins. Some of the pins\
    \ have multiple functions. For example, pins 3 and 5 are the GPIO2 and GPIO3 input-output\
    \ pins respectively. These pins can also be used as the I²C bus SDA and SCL pins\
    \ respectively. Similarly, pins 9, 10, 11 and 19 can either be used as general-purpose\
    \ input-output pins, or as the SPI bus pins. Pins 8 and 10 are reserved for UART\
    \ serial communication.\n\nTwo power outputs are provided: +3.3 V and +5.0 V.\
    \ The GPIO pins operate at +3.3 V logic levels (not like many other computer circuits\
    \ that operate with +5 V). A pin can either be an input or an output. When configured\
    \ as an output, the pin voltage is either 0 V (logic 0) or +3.3 V (logic 1). Raspberry\
    \ Pi 5 is normally operated using an external power supply (e.g. a mains adapter)\
    \ with +5 V output. A 3.3 V output pin can supply up to 16 mA of current. The\
    \ total current drawn from all output pins should not exceed the 51 mA limit.\
    \ Care should be taken when connecting external devices to the GPIO pins, as drawing\
    \ excessive currents or short-circuiting a pin can easily damage your Raspberry\
    \ Pi. The amount of current that can be supplied by the 5 V pin depends on many\
    \ factors, such as the current required by the Pi itself, current taken by the\
    \ USB peripherals, camera current, micro-HDMI port current, and so on.\n\nWhen\
    \ configured as an input, a voltage above +1.7 V will be taken as logic 1, and\
    \ a voltage below +1.7 V will be taken as logic 0. Care should be taken not to\
    \ supply voltages greater than +3.3 V to any I/O pin, as large voltages can easily\
    \ damage your Raspberry Pi. The Raspberry Pi 5, like others in the family, has\
    \ no overvoltage protection circuitry.\n\n## 8.3 Project 1 – Flashing an LED\n\
    \n**Description:** This is perhaps the easiest hardware project you can design\
    \ using your Raspberry Pi 5. In this project, you will connect an LED to one of\
    \ the ports of the Raspberry Pi 5 and then flash the LED once a second. The aim\
    \ of this project is to show how a simple Python program can be written and then\
    \ run from a file. The project also shows how to connect an LED to a Raspberry\
    \ Pi 5 GPIO pin. In addition, the project shows how to use the GPIO library to\
    \ configure and set a GPIO pin to logic 0 or 1.\n\n**Block diagram:** The block\
    \ diagram of the project is shown in Figure 8.3\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_114_0.png)\n\
    \n*Figure 8.3 Block diagram of the project*\n\n**Circuit diagram:** The circuit\
    \ diagram of the project is shown in Figure 8.4. A small LED is connected to port\
    \ pin GPIO 17 (pin 11) of the Raspberry Pi 5 through a current limiting resistor.\
    \ The value of the current limiting resistor is calculated as follows:\n\nThe\
    \ output high voltage of a GPIO pin is 3.3 V. The voltage across an LED is approximately\
    \ 1.8 V. The current through the LED depends upon the type of LED used and the\
    \ amount of required brightness. Assuming that we are using a small LED, we can\
    \ assume a forward LED current of about 3 mA. Then, the value of the current limiting\
    \ resistor is:\n\nR = (3.3 – 1.8) / 0.003 = 500 Ω. We can choose a 470 Ω resistor.\n\
    \nIn Figure 8.4 the LED is operated in current sourcing mode where a high output\
    \ from the GPIO pin drives the LED. The LED can also be operated in current sinking\
    \ mode, where the other end of the LED is connected to +3.3 V supply and not to\
    \ the ground. In current sinking mode, the LED is turned ON when the GPIO pin\
    \ is at logic low.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_115_0.png)\n\n\
    Figure 8.4 Circuit diagram of the project\n\n**Construction:** The project is\
    \ constructed on a breadboard as shown in Figure 8.5. Jumper wires are used to\
    \ connect the LED to the GPIO port. Notice that the short side of the LED must\
    \ be connected to ground.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_115_1.png)\n\
    \nFigure 8.5 Constructing the project on a breadboard"
