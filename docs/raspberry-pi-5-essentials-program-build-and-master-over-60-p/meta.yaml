    Received message: \", msg.decode('utf-8'))\n\nexcept KeyboardInterrupt:\n    print(\"\
    \\nClosing connection to client\")\n    sock.close()\n    time.sleep(1)\n```\n\
    图14.12 树莓派5程序清单\n\n**PC程序清单**：PC程序清单如图14.13所示（**client.py**）。该程序创建一个套接字并连接到服务器。然后，在客户端和服务器之间交换消息。\n\
    \n```python\n#==================================================\n#          \
    \    TCP/IP CLIENT\n#              ============\n#\n# This is the client program\
    \ on the PC. The program exchanges\n# messages with the server on the Raspberry\
    \ Pi 5\n#\n# Author: Dogan Ibrahim\n# File   : client.py\n# Date   : October,\
