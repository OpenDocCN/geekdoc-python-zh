    ![](img/4c39fa287d846ab9ea3e468319162ce0_266_0.png)


    The LED is connected to port pin GPIO 21 (pin 49) through a 470 Ohm current limiting
    resistor.


    **Program Listing:** Figure 14.16 shows the program listing (program: **serverled.py**).
    As in the previous program, a socket is created and port 5000 is used. LED is
    assigned to port GPIO pin 21, and turned OFF at the beginning of the program.
    The server waits for a connection from the client and then accepts the connection
    and displays the message **Connected**. It then waits to receive a command from
    the client. If the command is **ON**, then the LED is turned ON. If, on the other
    hand, the command is **OFF**, then the LED is turned OFF. Sending command **X**
    terminates the server connection and exits the program.


    ```


    #=================================================================

    #               CONTROL LED FROM SMART PHONE

    #               ===========================

    #

    # In this program TCP/IP is used where Raspberry Pi 5 is the server

    # and smart phone is the client. An LED connected to Raspberry Pi 5

    # GPIO 21 and is controlled from the smart phone

    #

    # Author: DOgan Ibrahim

    # File   : serverled.py

    # Date   : December, 2023

    #=================================================================

    import socket

    from gpiozero import LED

    from time import sleep


    led = LED(21)                    # LED at GPIO 21

    led.off()


    sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)

    sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)

    ```'
- md: "## 14.7 Project 5 – Sending a text message to a smartphone using UDP\n\n**Description:**\
    \ In this project, a UDP-based communication is established with an Android smartphone.\
    \ The program reads text messages from the keyboard and sends to the smartphone.\
    \ The aim of this project is to show how UDP communication can be established\
    \ with an Android smartphone.\n\nThe block diagram is the same as in Figure 14.3.\n\
    \n**Program Listing**: In this project, Raspberry Pi 5 is the server and the smartphone\
    \ is the client. Figure 14.18 shows the program listing (**udpserver.py**). At\
    \ the beginning of the program, a UDP socket is created (**sock.SOCK_DGRAM**)\
    \ and is then bind to port 5000. The server program then reads text messages sent\
    \ from the smartphone and displays on the screen. Messages sent by Raspberry Pi\
    \ 5 are displayed on the smartphone.\n\n```\n#============================================================\n\
    #       SEND TEXT MESSAGES USING UDP\n#       ===========================\n#\n\
    # This is the UDP server program running on Raspberry Pi 5.\n# The program exchanges\
    \ text messages with an Android\n# smart phone\n#\n# Author: Dogan Ibrahim\n#\
    \ File   : udpserver.py\n# Date   : October, 2023\n#============================================================\n\
    import socket\n\nsock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)\nsock.bind((\"\
    192.168.3.196\", 5000))\n\ntry:\n    while True:\n        print()\n        print(\"\
    Waiting for messages\")\n        data, addr = sock.recvfrom(1024)\n        print(addr)\n\
    \        print(\"Received msg:\", data.decode('utf-8'))\n        msg = input(\"\
    Message to send: \")\n        sock.sendto(msg.encode('utf-8'), addr)\n       \
    \ print(\"Message sent\")\n\nexcept KeyboardInterrupt:\n    print(\"\\nClosing\
    \ connection to client\")\n    sock.close()\n```\n\n*Figure 14.18 Program listing*\n\
    \nThere are many UDP apps available free of charge for both Android and iOS smartphones.\
    \ In this project, **UDP Sender/Receiver by JC Accounting & Innovative Technologies\
    \ Inc** for Android smartphones is used (Figure 14.19).\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_269_0.png)\n\
    \nFigure 14.19 UDP Sender/Receiver apps\n\nThe steps to test the program are as\
    \ follows:\n\n- Start the server program on Raspberry Pi 5:\n\n    ```\n    pi@raspberrypi:~\
    \ $ python udpserver.py\n    ```\n\n- Start the smartphone apps and configure\
    \ for the IP/Host and Port\n- Write a message on mobile phone apps and click **SEND**.\
    \ The message **Hello from Android** was sent as an example (Figure 14.20)\n-\
    \ Write a message on Raspberry Pi 5 and this message will be displayed on the\
    \ smartphone. **Hello from Raspberry Pi 5** was sent for an example (Figure 14.20)\n\
    - Enter **Ctrl+C** on Raspberry Pi 5 to close the socket\n\n```\npi@raspberrypi:~\
    \ $ python udpserver.py\n\nWaiting for messages\n('192.168.3.166', 56915)\nReceived\
    \ msg: Hello from Android\nMessage to send: Hello from Raspberry Pi 5\nMessage\
    \ sent\n\nWaiting for messages\n```\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_270_0.png)\n\
    \n## 14.8 Project 6 – Controlling an LED connected to Raspberry Pi 5 from a smartphone\
    \ using UDP\n\n**Description:** In this project, an LED is connected to Raspberry\
    \ Pi 5 port pin GPIO 21 (pin 40) through a 470 Ohm current limiting resistor.\
    \ The LED is turned ON and OFF by sending commands **ON** and **OFF** respectively\
    \ from an Android smartphone. The aim of this project is to show how an LED on\
    \ the Raspberry Pi 5 can be controlled from a smartphone by sending commands using\
    \ the UDP protocol over a Wi-Fi link. Here, the Raspberry Pi 5 is the server and\
    \ the smartphone is a client.\n\nThe LED can easily be replaced with a relay,\
    \ for example, to control electrical appliances from a smartphone.\n\n**Program\
    \ Listing:** Figure 14.21 shows the program listing (**udpled.py**). As in the\
    \ previous program, a socket is created and the server waits to receive commands\
    \ from a client to control the LED. If the command is **ON**, then the LED is\
    \ turned ON. If on the other hand, the command is **OFF**, the LED is turned OFF.\
    \ Command **X** terminates the server program.\n\n```\n#================================================================\n\
    #       CONTROL LED FROM SMART PHONE\n#       =========================\n#\n#\
    \ In this program UDP is used where Zero 2 W is the server\n# and smart phone\
    \ is the client. An LED connected to the server\n# and is controlled from the\
    \ smart phone\n#\n# Author: Dogan Ibrahim\n# File   : udpled.py\n# Date   : October,\
    \ 2023\n#================================================================\nimport\
    \ socket\nfrom gpiozero import LED\nfrom time import sleep\n\nled = LED(21)\n\
    led.off()\n\nsock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)\nsock.bind((\"\
    192.168.3.196\", 2000))           # Bind to Zero 2 W IP,port\n\ndata = [' '] *\
    \ 10\nwhile data != b'X':\n    data, addr = sock.recvfrom(1024)\n    if data ==\
    \ b'ON':                        # ON command\n        led.on()               \
    \              # LED ON\n    elif data == b'OFF':                     # OFF command\n\
    \        led.off()                            # LED OFF\n\nsock.close()\nsleep(1)\n\
    ```\n\nFigure 14.21 Program listing\n\nThe program can be tested using the **UDP\
    \ Sender/Receiver** apps used in Figure 14.19.\n\nThe steps to test the program\
    \ are as follows:\n\n- Construct the circuit on Raspberry Pi 5 with the LED\n\
    - Start the server program on Raspberry Pi 5:\n\n    ```\n    pi@raspberrypi:~\
    \ $ python udpled.py\n    ```\n\n- Start and configure the smartphone app\n- Write\
    \ the command **ON** and press **Send** on the smartphone (Figure 14.22). The\
    \ LED should turn ON. Similarly, write **OFF** and the LED should turn OFF. Sending\
    \ **X** should terminate the Raspberry Pi 5 program.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_272_0.png)\n\
    \n## 14.9 Communicating with the Raspberry Pi Pico W over Wi-Fi\n\nRaspberry Pi\
    \ Pico W (it will be called Pico from now on) is a low-cost $6 microcontroller\
    \ module based on the RP2040 microcontroller with dual-core Cortex-M0+ processor\
    \ and with on-board Wi-Fi module. Figure 14.23 shows the front view of the Pico\
    \ hardware module, which is basically a small board. At the middle of the board\
    \ is the tiny 7 × 7 mm RP2040 microcontroller chip housed in a QFN-56 package.\
    \ At the two edges of the board, there are 40 gold-coloured metal GPIO (General\
    \ Purpose Input-Output) pins with holes. You should solder pins to these holes\
    \ so that external connections can be made easily to the board. The holes are\
    \ marked starting with number 1 in the top left corner of the board and the numbers\
    \ increase downwards up to number 40 which is at the top right-hand corner of\
    \ the board. The board is breadboard compatible (i.e. 0.1 inch pin spacing), and\
    \ after soldering the pins, the board can be plugged into a breadboard for easy\
    \ connection to the GPIO pins using jumper wires. Next to these holes, you will\
    \ see bumpy circular cut-outs which can be plugged-in on top of other modules\
    \ without having any physical pins fitted.\n\nRaspberry Pi 5 Essentials\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_273_0.png)\n\
    \nFigure 14.23 Front view of the Pico module\n\nAt one edge of the board, there\
    \ is the micro-USB B port for providing power to the board and for programming\
    \ the board. Next to the USB port, there is an on-board user LED that can be used\
    \ during program development. Next to this LED there is a button named as BOOTSEL\
    \ that is used during programming of the microcontroller as we will see in the\
    \ next chapters. Next to the processor chip, there are 3 holes where external\
    \ connections can be made to. These are used to debug your programs using Serial\
    \ Wire Debug (SWD). At the other edge of the board is the single-band 2.4 GHz\
    \ Wi-Fi module (802.11n). Next to the Wi-Fi module is the on-board antenna.\n\n\
    You will notice the following types of letters and numbers at the back of the\
    \ board:\n\n- GND - power supply ground (digital ground)\n- AGND - power supply\
    \ ground (analog ground)\n- 3V3 - +3.3 V power supply (output)\n- GP0 – GP22 -\
    \ digital GPIO\n- GP26_A0 – GP28_A2 - analog inputs\n- ADC_VREF - ADC reference\
    \ voltage\n- TP1 – TP6 - test points\n- SWDIO, GND, SWCLK - debug interface\n\
    - RUN - default RUN pin. Connect LOW to reset the RP2040\n- 3V3_EN - this pin\
    \ by default enables the +3.3 V power supply. +3.3 V can be disabled by connecting\
    \ this pin LOW\n- VSYS - system input voltage (1.8V to 5.5V) used by the on-board\
    \ SMPS to generate +3.3 V supply for the board\n- VBUS - micro-USB input voltage\
    \ (+5V)\n\nSome of the GPIO pins are used for internal board functions. These\
    \ are:\n\n- GP29 (input) - used in ADC mode (ADC3) to measure VSYS/3\n- GP24 (input)\
    \ - VBUS sense - HIGH if VBUS is present, else LOW\n- GP23 (output) - Controls\
    \ the on-board SMPS Power Save pin"
  mdcn: "## 14.7 项目5 – 使用UDP向智能手机发送文本消息\n\n**描述：** 在本项目中，我们将与一台Android智能手机建立基于UDP的通信。程序从键盘读取文本消息并发送到智能手机。本项目的目标是展示如何与Android智能手机建立UDP通信。\n\
    \n其框图与图14.3相同。\n\n**程序清单**：在本项目中，树莓派5是服务器，智能手机是客户端。图14.18展示了程序清单（**udpserver.py**）。程序开始时，创建了一个UDP套接字（`sock.SOCK_DGRAM`），然后绑定到端口5000。服务器程序随后读取从智能手机发送来的消息并显示在屏幕上。由树莓派5发送的消息会显示在智能手机上。\n\
    \n```\n#============================================================\n#      \
    \ SEND TEXT MESSAGES USING UDP\n#       ===========================\n#\n# This\
    \ is the UDP server program running on Raspberry Pi 5.\n# The program exchanges\
    \ text messages with an Android\n# smart phone\n#\n# Author: Dogan Ibrahim\n#\
    \ File   : udpserver.py\n# Date   : October, 2023\n#============================================================\n\
    import socket\n\nsock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)\nsock.bind((\"\
    192.168.3.196\", 5000))\n\ntry:\n    while True:\n        print()\n        print(\"\
    Waiting for messages\")\n        data, addr = sock.recvfrom(1024)\n        print(addr)\n\
    \        print(\"Received msg:\", data.decode('utf-8'))\n        msg = input(\"\
    Message to send: \")\n        sock.sendto(msg.encode('utf-8'), addr)\n       \
    \ print(\"Message sent\")\n\nexcept KeyboardInterrupt:\n    print(\"\\nClosing\
    \ connection to client\")\n    sock.close()\n```\n\n*图14.18 程序清单*\n\n目前有许多免费的UDP应用程序可用于Android和iOS智能手机。在本项目中，我们使用Android智能手机的**UDP\
    \ Sender/Receiver by JC Accounting & Innovative Technologies Inc**应用（图14.19）。\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_269_0.png)\n\n图14.19 UDP Sender/Receiver应用\n\
    \n测试程序的步骤如下：\n\n- 在树莓派5上启动服务器程序：\n\n    ```\n    pi@raspberrypi:~ $ python udpserver.py\n\
    \    ```\n\n- 启动智能手机应用并配置IP/主机和端口\n- 在手机应用上写一条消息并点击**发送**。示例中发送了消息**Hello from\
    \ Android**（图14.20）\n- 在树莓派5上写一条消息，该消息将显示在智能手机上。示例中发送了**Hello from Raspberry Pi\
    \ 5**（图14.20）\n- 在树莓派5上输入**Ctrl+C**以关闭套接字\n\n```\npi@raspberrypi:~ $ python udpserver.py\n\
    \nWaiting for messages\n('192.168.3.166', 56915)\nReceived msg: Hello from Android\n\
    Message to send: Hello from Raspberry Pi 5\nMessage sent\n\nWaiting for messages\n\
    ```\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_270_0.png)\n\n## 14.8 项目6 – 使用UDP从智能手机控制连接到树莓派5的LED\n\
    \n**描述：** 在本项目中，一个LED通过470欧姆限流电阻连接到树莓派5的GPIO 21引脚（引脚40）。通过从Android智能手机分别发送**ON**和**OFF**命令来控制LED的开启和关闭。本项目的目标是展示如何通过Wi-Fi链路使用UDP协议从智能手机发送命令来控制树莓派5上的LED。这里，树莓派5是服务器，智能手机是客户端。\n\
    \nLED可以很容易地替换为继电器，例如，用于从智能手机控制电器。\n\n**程序清单：** 图14.21展示了程序清单（**udpled.py**）。与之前的程序一样，创建了一个套接字，服务器等待接收来自客户端的命令以控制LED。如果命令是**ON**，则LED点亮。如果命令是**OFF**，则LED熄灭。命令**X**将终止服务器程序。\n\
    \n```\n#================================================================\n#  \
    \     CONTROL LED FROM SMART PHONE\n#       =========================\n#\n# In\
    \ this program UDP is used where Zero 2 W is the server\n# and smart phone is\
    \ the client. An LED connected to the server\n# and is controlled from the smart\
    \ phone\n#\n# Author: Dogan Ibrahim\n# File   : udpled.py\n# Date   : October,\
    \ 2023\n#================================================================\nimport\
    \ socket\nfrom gpiozero import LED\nfrom time import sleep\n\nled = LED(21)\n\
    led.off()\n\nsock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)\nsock.bind((\"\
    192.168.3.196\", 2000))           # Bind to Zero 2 W IP,port\n\ndata = [' '] *\
    \ 10\nwhile data != b'X':\n    data, addr = sock.recvfrom(1024)\n    if data ==\
    \ b'ON':                        # ON command\n        led.on()               \
    \              # LED ON\n    elif data == b'OFF':                     # OFF command\n\
    \        led.off()                            # LED OFF\n\nsock.close()\nsleep(1)\n\
    ```\n\n图14.21 程序清单\n\n可以使用图14.19中使用的**UDP Sender/Receiver**应用来测试该程序。\n\n测试程序的步骤如下：\n\
    \n- 在树莓派5上搭建带有LED的电路\n- 在树莓派5上启动服务器程序：\n\n    ```\n    pi@raspberrypi:~ $ python\
    \ udpled.py\n    ```\n\n- 启动并配置智能手机应用\n- 在智能手机上输入命令**ON**并按**发送**（图14.22）。LED应该会点亮。类似地，输入**OFF**，LED应该会熄灭。发送**X**应该会终止树莓派5上的程序。\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_272_0.png)\n\n## 14.9 通过Wi-Fi与树莓派Pico\
    \ W通信\n\n树莓派Pico W（从现在起将简称为Pico）是一款基于RP2040微控制器的低成本6美元微控制器模块，该微控制器具有双核Cortex-M0+处理器和板载Wi-Fi模块。图14.23展示了Pico硬件模块的正面视图，它基本上是一块小电路板。电路板中央是微小的7\
    \ × 7毫米RP2040微控制器芯片，封装在QFN-56封装中。在电路板的两个边缘，有40个金色的金属GPIO（通用输入输出）引脚孔。你应该在这些孔上焊接排针，以便轻松地进行外部连接。这些孔从电路板左上角的数字1开始标记，数字向下递增，直到右上角的数字40。该电路板兼容面包板（即0.1英寸引脚间距），焊接排针后，可以将电路板插入面包板，以便使用跳线轻松连接到GPIO引脚。在这些孔旁边，你会看到凸起的圆形切口，可以在不安装物理引脚的情况下插入其他模块顶部。\n\
    \n树莓派5基础\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_273_0.png)\n\n图14.23 Pico模块正面视图\n\
    \n在电路板的一个边缘，有一个micro-USB B端口，用于为电路板供电和编程。在USB端口旁边，有一个板载用户LED，可在程序开发期间使用。在这个LED旁边，有一个名为BOOTSEL的按钮，在微控制器编程期间使用，我们将在后续章节中看到。在处理器芯片旁边，有3个可用于外部连接的孔。这些用于使用串行线调试（SWD）调试你的程序。在电路板的另一个边缘是单频段2.4\
    \ GHz Wi-Fi模块（802.11n）。在Wi-Fi模块旁边是板载天线。\n\n你会注意到电路板背面有以下类型的字母和数字：\n\n- GND - 电源地（数字地）\n\
    - AGND - 电源地（模拟地）\n- 3V3 - +3.3 V电源（输出）\n- GP0 – GP22 - 数字GPIO\n- GP26_A0 – GP28_A2\
    \ - 模拟输入\n- ADC_VREF - ADC参考电压\n- TP1 – TP6 - 测试点\n- SWDIO, GND, SWCLK - 调试接口\n\
    - RUN - 默认RUN引脚。连接低电平以复位RP2040\n- 3V3_EN - 此引脚默认启用+3.3 V电源。将此引脚连接到低电平可以禁用+3.3\
    \ V\n- VSYS - 系统输入电压（1.8V至5.5V），由板载SMPS用于为电路板生成+3.3 V电源\n- VBUS - micro-USB输入电压（+5V）\n\
    \n一些GPIO引脚用于电路板内部功能。这些是：\n\n- GP29（输入）- 用于ADC模式（ADC3）以测量VSYS/3\n- GP24（输入）- VBUS检测\
    \ - 如果VBUS存在则为高电平，否则为低电平\n- GP23（输出）- 控制板载SMPS节能引脚"
