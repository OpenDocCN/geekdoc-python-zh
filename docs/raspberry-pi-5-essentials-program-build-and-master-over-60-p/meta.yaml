    \ # 等待\n            i = i + 0.2\n\nexcept KeyboardInterrupt:\n    pass\n```\n\n\
    图 11.6 程序清单\n\n从示波器获取的输出波形示例如图 11.7 所示。请注意，必须通过实验调整时间延迟以获得正确的时序。"
