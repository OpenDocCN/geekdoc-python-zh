- md: "## 9.9 Project 6 – Analog temperature sensor thermometer – output to the screen\n\
    \n**Description:** In this project, an analog temperature sensor chip is used\
    \ to measure and then display the ambient temperature every second on the screen.\
    \ The temperature is read using an external ADC, as in the previous project. The\
    \ aim of this project is to show how the ambient temperature can be read and displayed\
    \ on the monitor using an analog temperature sensor chip.\n\n**Block Diagram:**\
    \ Figure 9.18 shows the block diagram of the project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_156_0.png)\n\
    \nFigure 9.18 Block diagram of the project\n\n**Circuit Diagram:** The dual MCP3002\
    \ ADC chip is used in this project to provide analog input capability to the Raspberry\
    \ Pi. Figure 9.19 shows the circuit diagram of the project. A TMP36DZ type analog\
    \ temperature sensor chip is connected to CH0 of the ADC. TMP36DZ is a 3-terminal\
    \ small sensor chip with pins: Vs, GND, and Vo. Vs is connected to +3.3 V, GND\
    \ is connected to system ground, and Vo is the analog output voltage. The temperature\
    \ in degrees centigrade is given by:\n\nTemperature = (Vo – 500) / 10\n\nWhere,\
    \ Vo is the sensor output voltage in millivolts.\n\nCS, Dout, CLK, and Din pins\
    \ of the ADC are connected to the SPI pins CE0, MISO, SCLK, and MOSI pins of the\
    \ Raspberry Pi 5 respectively.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_156_1.png)\n\
    \nFigure 9.19 Circuit diagram of the project\n\n**Program listing:** Figure 9.20\
    \ shows the Raspberry Pi Python program listing (program: **tmp36.py**). The function\
    \ **get_adc_data** is used to read the analog data, where the channel number (channel_no)\
    \ is specified in the function argument as 0 or 1. Function **get_adc_data** reads\
    \ the temperature from the sensor chip MCP3002 and returns a digital value between\
    \ 0 and 1023. This value is then converted into millivolts, 500 is subtracted\
    \ from it, and the result is divided by 10 to find the temperature in degrees\
    \ centigrade. The temperature is displayed on the monitor every second.\n\n```\n\
    #-----------------------------------------------------------------------\n#  \
    \                 ANALOG TEMPERATURE MEASUREMENT\n#                   ===========================\n\
    #\n# This is a thermometer project. Ambient temperature is read using\n# an ADC\
    \ and is then displayed on the screen every second\n#\n# Program: tmp36.py\n#\
    \ Date    : October, 2023\n# Author  : Dogan Ibrahim\n#-----------------------------------------------------------------------\n\
    import spidev\nfrom time import sleep\n\n#\n# Create SPI instance and open the\
    \ SPI bus\n#\nspi = spidev.SpiDev()\nspi.open(0,0)                       # we\
    \ are using CE0 for CS\nspi.max_speed_hz = 4000\n\n#\n# This function returns\
    \ the ADC data read from the MCP3002\n#\ndef get_adc_data(channel_no):\n    ADC\
    \ = spi.xfer2([1, (2 + channel_no) << 6, 0])\n    rcv = ((ADC[1] & 15) << 6) +\
    \ (ADC[2] >> 2)\n    return rcv\n\n#\n# Start of main program. Read the analog\
    \ temperature, convert\n# into degrees Centigrade and display on the monitor every\
    \ second\n#\nwhile True:\n    adc = get_adc_data(0)\n    mV = adc * 3300.0 / 1023.0\
    \              # convert to mV\n    Temperature = (mV - 500) / 10.0\n    print(\"\
    Temperature = %5.2f C\" %Temperature)\n    sleep(1)                          \
    \      # wait one second\n```\n\nFigure 9.20 Python program listing\n\nA typical\
    \ display on the monitor is shown in Figure 9.21.\n\n```\npi@raspberrypi:~ $ python\
    \ tmp36.py\nTemperature = 20.00 C\nTemperature = 20.00 C\nTemperature = 20.00\
    \ C\nTemperature = 20.00 C\nTemperature = 20.00 C\nTemperature = 20.00 C\nTemperature\
    \ = 20.00 C\nTemperature = 20.00 C\n```\n\nFigure 9.21 Typical display\n\n## 9.10\
    \ Project 7 – Analog temperature sensor thermometer – output on LCD\n\n**Description:**\
    \ This project is similar to the previous one, but here the temperature is displayed\
    \ on LCD.\n\n**Block diagram:** Figure 9.22 shows the block diagram of the project.\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_158_0.png)\n\n**Circuit diagram:**\
    \ The circuit diagram of the project is shown in Figure 9.23. The ADC and the\
    \ sensor chip are connected as in the previous project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_158_1.png)\n\
    \n**Program listing:** Figure 9.24 shows the program listing (**LCDtmp36.py**).\
    \ The program is very similar to the previous one, but here the temperature is\
    \ displayed on LCD.\n\n```\n#-----------------------------------------------------------------------\n\
    #           ANALOG TEMPERATURE MEASUREMENT - OUTPUT ON LCD\n#           ===========================================\n\
    #\n# This is a thermometer project. Ambient temperature is read using\n# an ADC\
    \ and is then displayed on LCD\n#\n# Program: LCDtmp36.py\n# Date    : October,\
    \ 2023\n# Author  : Dogan Ibrahim\n#-----------------------------------------------------------------------\n\
    import spidev\nfrom time import sleep\nfrom lcd_api import LcdApi\nfrom i2c_lcd\
    \ import I2cLcd\n\nI2C_ADDR = 0x27\nI2C_NUM_ROWS = 2\nI2C_NUM_COLS = 16\n\nmylcd\
    \ = I2cLcd(1,I2C_ADDR, I2C_NUM_ROWS,I2C_NUM_COLS)\nmylcd.clear()\n\n#\n# Create\
    \ SPI instance and open the SPI bus\n#\nspi = spidev.SpiDev()\nspi.open(0,0) \
    \                      # we are using CE0 for CS\nspi.max_speed_hz = 4000\n\n\
    #\n# This function returns the ADC data read from the MCP3002\n#\ndef get_adc_data(channel_no):\n\
    \    ADC = spi.xfer2([1, (2 + channel_no) << 6, 0])\n    rcv = ((ADC[1] & 15)\
    \ << 6) + (ADC[2] >> 2)\n    return rcv\n\n#\n# Start of main program. Read the\
    \ analog temperature, convert\n# into degrees Centigrade and display on the monitor\
    \ every second\n#\nwhile True:\n    adc = get_adc_data(0)\n    mV = adc * 3300.0\
    \ / 1023.0       # convert to mV\n    Temperature = (mV - 500) / 10.0\n    T =\
    \ str(Temperature)[:5] + \" C\"\n    mylcd.move_to(0,0)\n    mylcd.putstr(T)\n\
    \    sleep(5)                # wait one second\n    mylcd.clear()\n```\n\nFigure\
    \ 9.24 Program listing\n\n## 9.11 Project 8 – Reaction timer – output to screen\n\
    \n**Description:** This is a reaction timer project. The user presses a button\
    \ as soon as he/she sees a LED lighting. The time delay between seeing the light\
    \ and pressing the button is measured and displayed on the screen. The LED then\
    \ turns OFF and the process is repeated after a random delay of 1 to 10 seconds.\
    \ The aim of this project is to show how the time can be read and how a simple\
    \ reaction timer project can be designed.\n\n**Block Diagram:** Figure 9.25 shows\
    \ the block diagram of the project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_160_0.png)\n\
    \nFigure 9.25 Block diagram of the project\n\n**Circuit Diagram:** The circuit\
    \ diagram of the project is basic, and it consists of an LED and a push-button\
    \ switch. The LED and the button are connected to GPIO 17 and GPIO 3 respectively.\
    \ The button is connected using two resistors as shown in Figure 9.26.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_160_1.png)\n\
    \nFigure 9.26 Circuit diagram of the project"
  mdcn: "## 9.9 项目6 – 模拟温度传感器温度计 – 输出到屏幕\n\n**描述：** 在本项目中，使用模拟温度传感器芯片测量环境温度，并每秒在屏幕上显示一次。温度通过外部ADC读取，与上一个项目类似。本项目的目标是展示如何使用模拟温度传感器芯片读取环境温度并在显示器上显示。\n\
    \n**框图：** 图9.18展示了本项目的框图。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_156_0.png)\n\
    \n图9.18 项目框图\n\n**电路图：** 本项目使用双MCP3002 ADC芯片为树莓派提供模拟输入功能。图9.19展示了本项目的电路图。一个TMP36DZ型模拟温度传感器芯片连接到ADC的CH0通道。TMP36DZ是一个3引脚的小型传感器芯片，引脚为：Vs、GND和Vo。Vs连接到+3.3V，GND连接到系统地，Vo是模拟输出电压。摄氏温度由以下公式给出：\n\
    \n温度 = (Vo – 500) / 10\n\n其中，Vo是传感器输出电压，单位为毫伏。\n\nADC的CS、Dout、CLK和Din引脚分别连接到树莓派5的SPI引脚CE0、MISO、SCLK和MOSI。\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_156_1.png)\n\n图9.19 项目电路图\n\n**程序清单：**\
    \ 图9.20展示了树莓派Python程序清单（程序：**tmp36.py**）。函数**get_adc_data**用于读取模拟数据，其中通道号（channel_no）在函数参数中指定为0或1。函数**get_adc_data**从传感器芯片MCP3002读取温度，并返回一个0到1023之间的数字值。然后将该值转换为毫伏，减去500，再除以10，得到摄氏温度。温度每秒在显示器上显示一次。\n\
    \n```\n#-----------------------------------------------------------------------\n\
    #                   ANALOG TEMPERATURE MEASUREMENT\n#                   ===========================\n\
    #\n# This is a thermometer project. Ambient temperature is read using\n# an ADC\
    \ and is then displayed on the screen every second\n#\n# Program: tmp36.py\n#\
    \ Date    : October, 2023\n# Author  : Dogan Ibrahim\n#-----------------------------------------------------------------------\n\
    import spidev\nfrom time import sleep\n\n#\n# Create SPI instance and open the\
    \ SPI bus\n#\nspi = spidev.SpiDev()\nspi.open(0,0)                       # we\
    \ are using CE0 for CS\nspi.max_speed_hz = 4000\n\n#\n# This function returns\
    \ the ADC data read from the MCP3002\n#\ndef get_adc_data(channel_no):\n    ADC\
    \ = spi.xfer2([1, (2 + channel_no) << 6, 0])\n    rcv = ((ADC[1] & 15) << 6) +\
    \ (ADC[2] >> 2)\n    return rcv\n\n#\n# Start of main program. Read the analog\
    \ temperature, convert\n# into degrees Centigrade and display on the monitor every\
    \ second\n#\nwhile True:\n    adc = get_adc_data(0)\n    mV = adc * 3300.0 / 1023.0\
    \              # convert to mV\n    Temperature = (mV - 500) / 10.0\n    print(\"\
    Temperature = %5.2f C\" %Temperature)\n    sleep(1)                          \
