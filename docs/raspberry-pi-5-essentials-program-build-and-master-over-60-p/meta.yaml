    \ is a simple and yet powerful text editor, allowing us to create new text files\
    \ or to edit existing files.\n\n## 5.2 vi text editor\n\nThe **vi** text editor\
    \ has been around for many years when it has been the standard Unix operating\
    \ system default text editor. The **vi** editor is a fully featured, powerful\
    \ text editor for doing many different tasks. The only problem with using **vi**\
    \ is that it is not very user-friendly and learning may take some time. In this\
    \ section, we shall be looking at the basic features of this editor and see how\
    \ we can use it in simple editing applications.\n\nNotice that you cannot use\
    \ the keyboard arrow keys with the **vi** editor. Some of the useful **vi** editor\
    \ commands are listed below:\n\n```\nZZ  save changes and exit vi\n:wq save changes\
    \ and exit vi\n:q! exit without saving changes\n\nh   move cursor left (backwards)\n\
    j   move cursor down\nk   move cursor up\nl   move cursor right (space bar)\n\n\
    $   move to the last column on the current line\no   move cursor to the first\
    \ column on current line\nw   move cursor to the beginning of the next word\n\
    b   move cursor to the beginning of the previous word\nH   move cursor to the\
    \ top of the screen\nM   move cursor to the middle of the screen\nL   move cursor\
    \ to the bottom of the screen\n\nG   move to the last line in the file\nnG  move\
    \ to line n\n\nr   replace character under cursor with next character typed\n\
    i   insert before cursor\na   append after cursor\nA   append at end of line\n\
    \nx   delete character under cursor\ndd  delete line under cursor\ndw  delete\
    \ word under cursor\n\n/   search for a word (forwards)\n?   search a word (backwards)\n\
    :s  search and replace a word in current line\n```\n\nStart the **vi** text editor\
    \ by typing **vi** followed by the name of the file to be created or modified.\
    \ In this example, it is assumed that a new file called **myfile.txt** is to be\
    \ created:\n\n```\npi@raspberrypi: ~ $ vi myfile.txt\n```\n\nYou should see the\
    \ **vi** text editor screen displayed as in Figure 5.10. The name of the file\
    \ being edited is displayed at the bottom of the screen.\n\nThe **vi** editor\
    \ is different from most other text editors in that it is not possible to start\
    \ typing inside the editor window. The steps for editing this file are given below:\n\
    \n**Step 1:** The **vi** editor has different modes, and you must be in insert\
    \ mode to be able to write to the window. Press *i* to enter insert mode. Then\
    \ type in the following text (see Figure 5.11):\n\n> The vi text editor is a powerful\
    \ text editor.\nBut it is not easy to use this editor.\nThis exercise should help\
    \ you understand the basic commands.\n\n**Step 2:** To come out of the insert\
    \ mode, press the ESC key. To save the file, type the characters **:w**. You can\
    \ exit the editor after saving the changes by typing **:q**. Alternatively, you\
    \ can type **ZZ** (note upper case) to save and exit. If you modified the file\
    \ and attempt to quit without saving, you will get an error message. If you want\
    \ to exit without saving the changes, simply type **:q!**\n\n**Step 3:** Make\
    \ sure you are in the command mode and type the character **/** followed by a\
    \ word to search for this word in the text. For example, type **/editor** to search\
    \ for the word **editor** (see Figure 5.12) in the text.\n\n**Step 4:** Insert\
    \ word **is** before word **editor**. Type **i** followed by **is** and space,\
    \ and terminate insert mode by pressing the ESC key.\n\n**Step 5:** Move cursor\
    \ right by pressing the **l** key. Similarly, move the cursor left by pressing\
    \ the **h** key. Move the cursor down (to the second line) by pressing the **j**\
    \ key.\n\n**Step 6:** Search for the word **this** and delete it. Type **/this**\
    \ followed by the Enter key. Type **dw** to delete the word.\n\n**Step 7:** Delete\
    \ the second line where the cursor is on by typing **dd**\n\n**Step 8:** Search\
    \ for the word **help** and replace it with the word **guide**. Go to the line\
    \ where the word help is. Type **/help**, then type **:s/help/guide/**\n\n**Step\
    \ 9:** You can search and replace a word in any other line than the current line.\
    \ For this example, position the cursor on the first line. Change the word **basic**\
    \ in the second line to **BASIC**. Type:\n\n```\n:1,2s/basic/BASIC/\n```\n\nNotice\
    \ that you can specify the range of lines by separating them with a comma. In\
    \ this example, the search starts from line 1 and terminates at line 2.\n\n# Chapter\
    \ 6 • Creating and Running a Python Program\n\n## 6.1 Overview\n\nYou will be\
    \ programming your Raspberry Pi 5 using the Python programming language. It is\
    \ worthwhile to look at the creation and running of a simple Python program on\
    \ your Raspberry Pi 5 computer. In this chapter, the message **Hello From Raspberry\
    \ Pi 5** will be displayed on your PC screen.\n\nAs described below, there are\
    \ three methods that you can create and run Python programs on your Raspberry\
    \ Pi 5.\n\n## 6.2 Method 1 – Interactively from command prompt in console mode\n\
    \nIn this method, you will log in to your Raspberry Pi 5 using the SSH and then\
    \ create and run the Python program interactively. This method is excellent for\
    \ small programs. The steps are as follows:\n\n- Login to the Raspberry Pi 5 using\
    \ SSH\n- At the command prompt, enter **python**. You should see the Python command\
    \ mode, which is identified by three characters \">>>\"\n- Type the program:\n\
    \n    ```\n    python\n    print (\"Hello From Raspberry Pi 5\")\n    ```\n\n\
    - The text will be displayed interactively on the screen as shown in Figure 6.1.\
