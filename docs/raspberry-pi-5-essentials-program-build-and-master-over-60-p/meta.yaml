- md: "## 8.5 Project 3 – Binary up counting LEDs\n\n**Description:** In this project,\
    \ eight LEDs are connected to the Raspberry Pi 5 GPIO pins. The LEDs count up\
    \ in binary with a one-second delay between each output.\n\n**Program listing:**\
    \ The program is called **LEDCNT.py** and the listing is shown in Figure 8.14.\
    \ The program was written using the **nano** text editor. At the beginning of\
    \ the program, the **gpiozero** library is imported to control the LEDs. Then,\
    \ a loop is formed to execute forever and inside this loop a counter variable\
    \ **cnt** is incremented from 0 to 255. The binary pattern corresponding to the\
    \ counter is sent to the port, which turns the LEDs ON or OFF.\n\n```\n#---------------------------------------------------\n\
    #\n#              BINARY UP COUNTING LEDs\n#              =====================\n\
    #\n# In this project 8 LEDs are connected to the following\n# GPIO pins:\n#\n\
    # 9 10 22 27 17 4 3 2\n#\n# The program groups these LEDs as an 8-bit port and\
    \ then\n# the LEDs count up in binary with one second delay between\n# each output.\n\
    #\n# Program: LEDCNT.py\n# Date    : October, 2023\n# Author  : Dogan Ibrahim\n\
    #---------------------------------------------------\nfrom gpiozero import LED\n\
    from time import sleep                # import time library\n\nPORT = [9,10,22,27,17,4,3,2]\
    \          # LED ports\n\n#\n# This function initializes the port list PORT[]\n\
    #\ndef Configure():\n    for i in range(8):\n        PORT[i] = LED(PORT[i])\n\n\
    #\n# This function sends 8-bit data (0 to 255) to the PORT\n#\ndef Port_Output(x):\n\
    \    b = bin(x)                        # convert into binary\n    b = b.replace(\"\
    0b\", \"\")            # remove leading \"0b\"\n    diff = 8 - len(b)        \
    \         # find the length\n    for i in range (0, diff):\n        b = \"0\"\
    \ + b                    # insert leading 0s\n\n    for i in range (0, 8):\n \
    \       if b[i] == \"1\":\n            PORT[i].on()\n        else:\n         \
    \   PORT[i].off()\n    return\n#\n# Main program loop. Count up in binary every\
    \ second\n#\ncnt = 0\nConfigure()\n\nwhile True:\n    Port_Output(cnt)       \
    \           # send cnt to port\n    sleep(1)                          # wait 1\
    \ second\n    cnt = cnt + 1                     # increment cnt\n    if cnt >\
    \ 255:\n        cnt = 0\n```\n\nFigure 8.14 Program listing\n\n**Recommended modifications:**\
    \ Modify the program such that the LEDs count down every two seconds.\n\n## Modified\
    \ Program\n\nThe program shown in Figure 8.14 can be modified and made more friendly\
    \ by storing the LED port numbers in a list. The modified program **LEDCNT2.py**\
    \ is shown in Figure 8.15. In this program, the LED port numbers are stored in\
    \ list PORT. Then function **Port_Output** is used as before to send the port\
    \ data to the LEDs.\n\n```\n#---------------------------------------------------\n\
    #\n#              BINARY UP COUNTING LEDs\n#              =====================\n\
    #\n# In this project 8 LEDs are connected to the following\n# GPIO pins:\n#\n\
    # 9 10 22 27 17 4 3 2\n#\n# The program groups these LEDs as an 8-bit port and\
    \ then\n# the LEDs count up in binary with one second delay between\n# each output.\n\
    #\n# Program: LEDCNT2.py\n# Date    : October, 2023\n# Author  : Dogan Ibrahim\n\
