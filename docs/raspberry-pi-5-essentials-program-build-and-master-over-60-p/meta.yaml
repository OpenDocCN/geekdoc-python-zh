    # File differences


    Command **diff** <file1> <file2) displays the differences between two files line
    by line


    # Removing a Directory


    A directory can be removed using the **rmdir** command:


    ```

    pi@raspberrypi: ~$ **rmdir Music**

    pi@raspberrypi: ~$

    ```


    # Re-directing the Output


    The greater sign > can be used to redirect the output of a command to a file.
    For example, we can redirect the output of the **ls** command to a file called
    **lstest.txt**:


    ```

    pi@raspberrypi: ~$ **ls > lstest.txt**

    pi@raspberrypi: ~$

    ```


    The **cat** command can be used to display the contents of a file:


    ```

    pi@raspberrypi: ~$ **cat mytestfile.txt**

    This is a file

    This is line 2

    pi@raspberrypi: ~$

    ```


    Using two greater signs ''>>'' adds to the end of a file.


    # Writing to the Screen or to a File


    The **echo** command can be used to write to the screen. It can be used to perform
    simple mathematical operations if the numbers and the operation are enclosed in
    two brackets, preceded by a $ character:


    ```

    pi@raspberrypi: ~$ **echo $((5*6))**

    30

    pi@raspberrypi: ~$

    ```


    The echo command can also be used to write a line of text to a file. An example
    is shown below:


    ```

    pi@raspberrypi: ~$ **echo a line of text > lin.dat**

    pi@raspberrypi: ~$ **cat lin.dat**

    a line of text

    pi@raspberrypi: ~$

    ```


    # Matching a String


    The grep command can be used to match a string in a file. An example is given
    below, assuming that the file lin.dat contains sting a line of text. Notice that
    the matched word is shown in bold:'
  - '[PAGE 42]


    ```

    pi@raspberrypi: ~$ grep line lin.dat

    a line of text

    pi@raspberrypi: ~$

    ```


    # Head and Tail Commands


    The head command can be used to display the first 10 lines of a file. The format
    of this command is as follows:


    ```

    pi@raspberrypi: ~$ head mytestfile.txt

    ........................................

    ........................................

    pi@raspberrypi: ~$

    ```


    Similarly, the tail command is used to display the last 10 lines of a file. The
    format of this command is as follows:


    ```

    pi@raspberrypi: ~$ tail mytestfile.txt

    ........................................

    ........................................

    pi@raspberrypi: ~$

    ```


    The **which** command displays the location of an executable program. For example,
    the location of the python program can be found as follows:


    ```

    pi@raspberrypi: ~$ which python

    /usr/bin/python

    pi@raspberrypi: ~$

    ```


    # Super User Commands


    Some of the commands are privileged and only the authorized persons can use them.
    Inserting the word **sudo** at the beginning of a command gives us the authority
    to use the command without having to log in as an authorized user.


    # What software is installed on my Raspberry Pi 5


    To find out what software is installed on your Raspberry Pi 5, enter the following
    command. You should get several pages of display:


    ```

    pi@raspberrypi: ~$ dpkg -l

    ........................................

    ........................................

    pi@raspberrypi: ~$

    ```


    You can also find out if a certain software package is already installed on our
    computer. An example is given below which checks whether software called **xpdf**
    (PDF reader) is installed. In this example, **xpdf** is installed and the details
    of this software are displayed:'
  - '[PAGE 43]


    Raspberry Pi 5 Essentials


    ```

    pi@raspberrypi: ~$ dpkg --s xpdf

    Package: xpdf

    Status: install ok installed

    Priority: optional

    Section: text

    Installed-Size: 395

    ........................................

    ........................................

    pi@raspberrypi: ~$

    ```


    If the software is not installed, you get a message similar to the following (assuming
    we are checking to see if a software package called bbgd is installed):


    ```

    pi@raspberrypi: ~$ dpkg -s bbgd

    dpkg-query: package ''bbgd'' is not installed and no information is available

    ........................................

    ........................................

    pi@raspberrypi: ~$

    ```


    # 3.3.3 Resource monitoring on the Raspberry Pi 5


    System monitoring is an important topic for managing usage of your Raspberry Pi.
    One of the most useful system monitoring commands is the top, which displays the
    current usage of system resources and displays which processes are running and
    how much memory and CPU time they are consuming.

    Figure 3.15 shows a typical system resource display obtained by entering the following
    command (only part of the display is shown, Enter q to exit):


    ```

    pi@raspberrypi: ~$ top

    pi@raspberrypi: ~$

    ```


    ![](img/4c39fa287d846ab9ea3e468319162ce0_43_0.png)'
