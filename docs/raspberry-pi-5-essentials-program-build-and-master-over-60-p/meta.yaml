    # 7.23 Example 3 – Resistive potential divider


    **Description:** This case study calculates the resistances in a resistive potential
    divider circuit.


    **Background Information:** Resistive potential divider circuits consist of two
    resistors. These circuits are used to lower a voltage to a desired value. Figure
    7.15 shows a typical resistive potential divider circuit. Here, Vin and Vo are
    the input and output voltages respectively. R1 and R2 form the resistor pair used
    to lower the voltage from Vin to Vo. Many resistor pairs can be used to get the
    desired output voltage. Choosing large resistors draws little current from the
    circuit, and choosing small resistors draws larger current. In this design, the
    user specifies Vin, Vo, and R2. The program calculates the required R1 value to
    lower the voltage to the desired level. Additionally, the program displays the
    output voltage with the chosen physical resistors.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_90_0.png)


    *Figure 7.15 Resistive potential divider circuit*


    The output voltage is given by:


    Vo = Vin R2 / (R1 + R2)


    R1 is then given by:


    R1 = (Vin – Vo) R2/ Vo


    The above formula is used to calculate the required value of R1, given Vin, Vo,
    and R2


    **Program Listing:** Figure 7.16 shows the program listing (program: **divider.py**).
    At the beginning of the program, a heading is displayed. The program then reads
    Vin, Vo, and R2 from the keyboard. The program calculates R1 and displays R1 and
    R2. The user is then asked to enter a chosen physical value for R1. With the chosen
    value of R1, the program displays Vin, Vo, R1, and R2 and asks the user whether
    the result is acceptable. If the answer to this question is **y** then the program
    terminates. If, on the other hand, the answer is **n** then the user is given
    the option of trying again.


    ```

    #==================================================

    #           RESISTIVE POTENTIAL DIVIDER

    #           -------------------------

    #

    # This is a resistive potential divider circuit program.

    # The program calculates the resistance values that will

    # lower the input voltage to the desired value

    #

    ```'
