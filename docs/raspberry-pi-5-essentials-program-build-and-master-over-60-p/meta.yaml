    # File Permissions


    One of the important arguments used with the **ls** command is **-l** (lower case
    letter l) which displays the file permissions, file sizes, and when they were
    last modified. In the example below, each line relates to one directory or file.
    Reading from right to left, the name of the'
- md: "directory or the file is on the right-hand side. The date the directory or\
    \ file was created is on the left-hand side of its name. Next comes the size,\
    \ given in bytes. The characters at the beginning of each line are about permissions,\
    \ i.e. who is allowed to use or modify the file or the directory.\n\nThe permissions\
