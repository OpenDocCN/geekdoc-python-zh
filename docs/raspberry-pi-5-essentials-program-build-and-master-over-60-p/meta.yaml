    # Chapter 15 • Communication over Bluetooth


    # 15.1 Overview


    In the last chapter, you have learned how to write programs to use the Wi-Fi and
    communicate with other devices over the LAN using the UDP and TCP protocols. In
    this chapter, you will develop programs for using the Bluetooth communication.


    Bluetooth is a short-range communication technology and is commonly used to communicate
    with other devices, mainly developed with the IoT applications in mind. All smartphones
    nowadays support communication through Bluetooth. Bluetooth operates at 2.4 GHz,
    with data rates lower than that of Wi-Fi. Bluetooth is not as secure as Wi-Fi,
    but it is easier to use. The power consumption of Bluetooth is lower compared
    to Wi-Fi, and also it has a shorter range than Wi-Fi. Bluetooth is a packet-based
    protocol with a master-slave architecture, where one master may communicate with
    up to seven slaves. The effective range of Bluetooth depends on propagation conditions,
    antenna configuration, power supply condition, material coverage and so on. Most
    Bluetooth applications are for indoors where because of the walls the signals
    attenuate and result in shorter range.


    Raspberry Pi 5 supports both the Classic Bluetooth and Bluetooth Low Energy (BLE).
    BLE is intended for reduced power applications while providing reasonable range.
    Most smartphones, including Android, iOS, Windows Phone, Blackberry, macOS and
    many others support the BLE. BLE uses the same 2.4 GHz radio frequency as the
    classic Bluetooth and dual-mode devices, therefore can share the same single antenna.
    Classical Bluetooth can handle large amounts of data quickly, whereas BLE has
    been developed to handle smaller amounts of data.


    # 15.2 Project 1 – Exchanging text with a smartphone


    **Description:** In this project, Classical Bluetooth communication is established
    between the Raspberry Pi 5 and an Android smartphone. Text messages are exchanged
    between the two devices.


    **Block diagram:** Figure 15.1 shows the block diagram of the project.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_287_0.png)


    *Figure 15.1 Block diagram of the project*'
- md: "## Enabling Bluetooth\n\nBefore using your smartphone for Bluetooth applications,\
    \ you must enable the Bluetooth on it. Depending on the model of the smartphone\
    \ you have, this is usually done from the **Settings** menu.\n\nSimilarly, before\
    \ using Bluetooth on your Raspberry Pi, you must enable it. There are two ways\
    \ you can enable Bluetooth on the Raspberry Pi 5: using the graphical desktop\
    \ (GUI mode), or using the Console mode.\n\n## Using the Graphical Desktop\n\n\
    The steps for enabling Bluetooth on the Raspberry Pi 5 using the graphical desktop\
    \ are given below:\n\n- Enable Bluetooth on your smartphone.\n- If you have a\
    \ monitor connected directly to the Raspberry Pi 5 then skip the next line.\n\
    - Start the VNC server on your Raspberry Pi 5 and login using the VNC Viewer.\n\
    - Click on the blue Bluetooth icon on your Raspberry Pi 5 screen at the top right-hand\
    \ side, and turn Bluetooth ON, if it is not already ON. Then, select **Make Discoverable**.\
    \ You should see the Bluetooth icon flashing. Click **Add Device**.\n- Select\
    \ **raspberrypi** in the Bluetooth menu (**raspberrypi** is the default Bluetooth\
    \ name of your Raspberry Pi 5) on your mobile device (you may have to scan on\
    \ your mobile device). You should see the **Connecting** message on your smart\
    \ device.\n- Click **Pair** to accept the pairing request on your Raspberry Pi\
    \ 5 as shown in Figure 15.2.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_288_0.png)\n\
    \nFigure 15.2 Bluetooth pairing request on Raspberry Pi 5\n\n- You should now\
    \ see the message **Pairing Successfully** on your Raspberry Pi 5.\n\n## Using\
    \ Console mode\n\nYou can enable Bluetooth on your Raspberry Pi 5 using the Console\
    \ mode. Additionally, you can make Bluetooth discoverable, scan for nearby Bluetooth\
    \ devices and then connect to a Bluetooth device. The steps are given below (characters\
    \ typed by the user are in bold for clarity):\n\n- Find the Bluetooth MAC address\
    \ of your smartphone. For Android phones, the steps are usually:\n    - Go to\
    \ the **Settings** menu.\n    - Tap **About Phone**.\n    - Tap **Status information**.\n\
    \    - Scroll down to see your **Bluetooth address** (e.g. Figure 15.3). In this\
    \ example, the MAC address was **50:50:A4:0F:62:3F**.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_289_0.png)\n\
    \n*Figure 15.3 Bluetooth MAC address*\n\n- Make your Bluetooth discoverable with\
    \ the following command:\n    - Start the Bluetooth tool on your Raspberry Pi\
    \ 5 from the command mode:\n\n```\npi@raspberrypi:~ $ sudo hciconfig hci0 piscan\n\
    ```\n\n```\npi@raspberrypi:~ $ bluetoothctl\n```\n\n- Turn Bluetooth ON:\n\n \
    \   [bluetooth]# **power on**\n\n- Configure Bluetooth to run:\n\n    [bluetooth]#\
    \ **agent on**\n    [bluetooth]# **default-agent**\n\n- Make device discoverable:\n\
    \n    [bluetooth]# **discoverable on**\n\n- Scan for nearby Bluetooth devices,\
    \ you may have to wait several minutes:\n\n    [bluetooth]# **scan on**\n\n- Enter\
    \ command **devices** to see the nearby Bluetooth devices (see Figure 15.4). You\
    \ may have to wait a couple of minutes for the display to update. Make a note\
    \ of the MAC address of the device you wish to connect to (Android mobile phone\
    \ in this project) as we will be using this address to connect to the device.\
    \ An example is shown in Figure 15.4:\n\n    [Bluetooth]# **devices**\n\n```\n\
    [NEW] Device 69:FC:9E:62:DA:4D 69-FC-9E-62-DA-4D\n[DEL] Device 69:FC:9E:62:DA:4D\
    \ 69-FC-9E-62-DA-4D\n[NEW] Device 69:FC:9E:62:DA:4D 69-FC-9E-62-DA-4D\n[DEL] Device\
    \ 69:FC:9E:62:DA:4D 69-FC-9E-62-DA-4D\n[NEW] Device 50:50:A4:0F:62:3F Dogan's\
    \ Galaxy A71\n[CHG] Device 50:50:A4:0F:62:3F RSSI: -71\n```\n\n*Figure 15.4 Nearby\
    \ Bluetooth devices*\n\nIn this example, the author's smartphone is **Galaxy A71**\
    \ and the Bluetooth MAC address is: **50:50:A4:0F:62:3F**.\n\n- Pair the device:\n\
    \n    [bluetooth]# **pair 50:50:A4:0F:62:3F**\n\n- Connect to our smartphone:\n\
    \n    [bluetooth]# **connect 50:50:A4:0F:62:3F**\n\n- Enter **yes** to confirm\
    \ **passkey**.\n- Accept pairing on your smartphone.\n\nYou should see message\
    \ **device 50:50:A4:0F:62:3F Connected : yes** displayed.\n\nExit from the Bluetooth\
    \ tool by entering **Ctrl+Z**.\n\nYou can find the Bluetooth MAC address of your\
    \ Raspberry Pi 5 by entering the following command:\n\n```\npi@raspberrypi:~ $\
    \ **hciconfig | grep \"BD Address\"**\n```\n\nYou can change the Bluetooth broadcast\
    \ name by the following command:\n\n```\npi@raspberrypi:~ $ **sudo hciconfig hci0\
    \ name \"new name\"**\n```\n\nTo see your Bluetooth broadcast name, enter:\n\n\
    ```\npi@raspberrypi:~ $ **sudo hciconfig hci0 name**\n```\n\nSome other useful\
    \ Raspberry Pi 5 Bluetooth commands are:\n\n- To reset the Bluetooth adapter:\
    \ **sudo hciconfig hci0 reset**\n- To restart Bluetooth: **sudo invoke-rc.d bluetooth\
    \ restart**\n- To list Bluetooth adapters: **hciconfig**\n\n## Python Classical\
    \ Bluetooth Library\n\nYou will need to install the Python Classical Bluetooth\
    \ library before developing your program. This is done by entering the following\
    \ command in the command mode:\n\n```\npi@raspberrypi:~ $ **sudo apt-get install\
    \ bluez python3-bluez**\n```\n\n## Accessing From the Mobile Phone\n\nTo access\
    \ the Raspberry Pi 5 from a smartphone app, make the following changes to your\
    \ Raspberry Pi 5 from the command line:\n\n- Start **nano** to edit the following\
    \ file:\n    pi@raspberrypi:~ $ **sudo nano /etc/systemd/system/dbus-org.bluez.service**\n\
    - Add **-C** at the end of the **ExecStart=** line. Also add another line after\
    \ the ExecStart line. The final two lines should look like:\n    **ExecStart=/usr/libexec/bluetooth/bluetoothd\
    \ -C**\n    **ExecStartPost=/usr/bin/sdptool add SP**\n- Exit and save the file\
    \ by entering **Ctrl+X** followed by **Y**.\n- Reboot the Raspberry Pi 5:\n\n\
    ```\npi@raspberrypi:~ $ sudo reboot\n```\n\n**Program listing:** Figure 15.5 shows\
    \ the program listing (**bluetxt.py**). Do not call your program **Bluetooth.py**!\
    \ The Bluetooth code is similar to TCP/IP code. At the beginning of the program,\
    \ modules socket, and Bluetooth are imported to the program. The program then\
    \ creates a Bluetooth socket, binds and listens on this socket, and then waits\
    \ to accept a connection. The remainder of the program is executed in a loop,\
    \ where the program issues the statement **ClientSock.recv** and waits to read\
    \ data from the smartphone. The received data is decoded and displayed on the\
    \ screen. The user is then expected to send a text message to the smartphone.\
    \ This message is displayed on the smartphone's screen. This process is repeated\
    \ until stopped by the user.\n\n```\n#==================================================\n\
    #           BLUETOOTH COMMUNICATION\n#           =====================\n#\n# In\
    \ this project text messages are exchanged with a smart\n# phone using the Bluetooth\
    \ protocol\n#\n# Author: Dogan Ibrahim\n# File  : bluetxt.py\n# Date  : October,\
    \ 2023\n#==================================================\nimport socket\nimport\
    \ bluetooth\n\n#\n# Start of main program loop.Configure Bluetooth, create a\n\
    # port, listen for client connections, and accept connection\n#\nport = 1\nServerSock\
    \ = bluetooth.BluetoothSocket(bluetooth.RFCOMM)\nServerSock.bind((\"\", port))\n\
    ServerSock.listen(1)\nClientSock, addr = ServerSock.accept()\n\n#\n# Now receive\
    \ text from smart phone and display\n#\ntry:\n\n    while True:\n        data\
    \ = ClientSock.recv(1024)           # receive text\n        print(\"Received data:\
    \ \", data.decode('utf-8'))\n        msg = input(\"Enter data to send: \") # Text\
    \ to send\n        ClientSock.send(msg.encode('utf-8')) # Send text\n\nexcept\
    \ KeyboardInterrupt: # Keyboard interrupt\n    ServerSock.close() # Close socket\n\
    ```\n\nFigure 15.5 Program listing\n\n## Testing\n\nThe project can be tested\
    \ by the following steps:\n\n- Make sure that Bluetooth is enabled on both the\
    \ smartphone and Raspberry Pi 5 and they are paired.\n- You can use the freely\
    \ available Bluetooth apps on our smartphone to communicate with the Raspberry\
    \ Pi 5. In this project, the apps called **Bluetooth Terminal HC05 by mightyIT**\
    \ is used (Figure 15.6).\n- Start the Raspberry Pi program:\n    \n    pi@raspberrypi:~\
    \ $ python bluetxt.py\n    \n- Start the smartphone apps and select the paired\
    \ Raspberry Pi 5 device (e.g. **raspberrypi**).\n- Enter a message in column **Enter\
    \ ASCII Command** and press **Send ASCII**. The message will be sent to the Raspberry\
    \ Pi 5.\n- Enter a message on the Raspberry Pi 5. This message will be sent and\
    \ displayed on the smartphone top part of the screen.\n- Figure 15.7 shows an\
    \ example message exchange between the Raspberry Pi 5 and the smartphone. In this\
    \ example, the smartphone sends the message: **message from the smartphone** and\
    \ Raspberry Pi 5 sends the message:\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_293_0.png)\n\
    \nFigure 15.6 Android Bluetooth apps used in the project"
