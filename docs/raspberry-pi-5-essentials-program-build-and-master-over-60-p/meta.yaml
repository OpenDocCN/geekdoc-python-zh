- md: "## Raspberry Pi 5 Essentials\n\n**Program listing:** The program is called\
    \ **reaction.py** and its listing is shown in Figure 9.27. At the beginning of\
    \ the program, the random library and other used libraries are imported to the\
    \ program. The program runs in a loop where the system time is recorded as soon\
    \ as the LED is turned ON. The program waits for the user to press the button,\
    \ and the system time is read again at this moment. The difference between this\
    \ time and the first time is displayed as the reaction time of the user. This\
    \ process repeats after a random delay of 1 to 10 seconds. Notice that the floating-point\
    \ function **time.time()** returns the time in seconds since the epoch.\n\n```python\n\
    #-----------------------------------------------------------------------\n#\n\
    #                   REACTION TIMER\n#                   =============\n#\n# This\
    \ is a reaction timer program. The user presses a button\n# as soon as he/she\
    \ see a light. The time between seeing the\n# light and pressing the button is\
    \ measured and is displayed\n# in milliseconds as the reaction time of the user.\
    \ The light\n# comes ON after a random number of seconds between 1 and 10\n# seconds.\n\
    #\n# Program: reaction.py\n# Date    : October, 2023\n# Author  : Dogan Ibrahim\n\
    #-----------------------------------------------------------------------\nfrom\
    \ time import sleep\nimport random\nfrom gpiozero import LED, Button\nimport time\n\
    \nbutton = Button(3)                  # At GPIO 3\nled = LED(17)             \
    \          # At GPIO 17\n\n# Start of main program\n#\nwhile True:\n    T = random.randint(1,\
    \ 10)\n    sleep(T)\n    led.on()                        # LED ON\n    start_time\
    \ = time.time()        # start time\n    button.wait_for_press()         # wait\
    \ for button\n    end_time = time.time()\n    diff_time = 1000.0*(end_time - start_time)\n\
    \    diff_int = int(diff_time)\n    print(\"Reaction time=%d ms\" %diff_int)\n\
    \    led.off()                       # LED OFF\n    sleep(3)\n```\n\nFigure 9.27\
    \ Program listing\n\nAn example output is shown in Figure 9.28.\n\n```\npi@raspberrypi:~\
    \ $ python reaction.py\nReaction time=4077 ms\nReaction time=1577 ms\nReaction\
    \ time=847 ms\nReaction time=327 ms\nReaction time=845 ms\n```\n\nFigure 9.28\
    \ Example output\n\n## 9.12 Project 9 – Reaction timer – output to LCD\n\n**Description:**\
    \ This project is very similar to the previous one, but here the output is sent\
    \ to LCD instead of the screen. As before, the user presses a button as soon as\
    \ he/she sees an LED lighting. The time delay between seeing the light and pressing\
    \ the button is measured and displayed on the LCD. The LED then turns OFF and\
    \ the process is repeated after a random delay of 1 to 10 seconds.\n\n**Block\
    \ Diagram:** Figure 9.29 shows the block diagram of the project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_162_0.png)\n\
    \n**Circuit Diagram:** The circuit diagram of the project, shown in Figure 9.30,\
    \ is simple, and it consists of an LED, a push-button switch, and an LCD. The\
    \ LED and the button are connected to GPIO 17 and GPIO 4 respectively.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_162_1.png)\n\
    \n**Program listing:** The program is called **LCDreaction.py** and its listing\
    \ is shown in Figure 9.31. The program is basically the same as the one in Figure\
    \ 9.27, but here the output is sent to LCD.\n\n```python\n#-----------------------------------------------------------------------\n\
    #\n#               REACTION TIMER - OUTPUT TO LCD\n#               =============================\n\
    #\n# This is a reaction timer program. The user presses a button\n# as soon as\
    \ he/she see a light. The time between seeing the\n# light and pressing the button\
    \ is measured and is displayed\n# on LCD in milliseconds as the reaction time\
    \ of the user. The\n# light comes ON after a random number of seconds between\
    \ 1 and\n# 10 seconds.\n#\n# Program: LCDreaction.py\n# Date    : October, 2023\n\
    # Author  : Dogan Ibrahim\n#-----------------------------------------------------------------------\n\
    from time import sleep\nimport random\nfrom gpiozero import LED, Button\nimport\
    \ time\nfrom lcd_api import LcdApi\nfrom i2c_lcd import I2cLcd\n\nI2C_ADDR = 0x27\n\
    I2C_NUM_ROWS = 2\nI2C_NUM_COLS = 16\n\nmylcd = I2cLcd(1, I2C_ADDR, I2C_NUM_ROWS,\
    \ I2C_NUM_COLS)\nmylcd.clear()\n\nbutton = Button(4)                  # At GPIO\
    \ 4\nled = LED(17)                       # At GPIO 17\n\n# Start of main program\n\
    #\nwhile True:\n    T = random.randint(1, 10)\n    sleep(T)\n    led.on()    \
    \                    # LED ON\n    start_time = time.time()        # start time\n\
    \    button.wait_for_press()         # wait for button\n    end_time = time.time()\n\
    \    diff_time = 1000.0*(end_time - start_time)\n    diff_int = int(diff_time)\n\
    \    mylcd.move_to(0, 0)\n    mylcd.putstr(diff_int)\n    led.off()          \
    \          # LED OFF\n    sleep(3)\n    mylcd.clear()\n```\n\nFigure 9.31 Program\
    \ listing\n\n## 9.13 Project 10 – Automatic dusk lights\n\n**Description:** In\
    \ this project, a light dependent resistor (LDR) is used to sense the darkness\
    \ and a relay is activated when the ambient light intensity falls below the required\
    \ level. It is possible to connect e.g. lights to the relay so that they turn\
    \ ON automatically when, for example, it is dusk. The aim of this project is to\
    \ show how to use an LDR in a Raspberry Pi project, and also how to connect and\
    \ activate a relay.\n\n**Block Diagram:** Figure 9.32 shows the block diagram\
    \ of the project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_164_0.png)\n\n**Circuit\
    \ Diagram:** As shown in Figure 9.33, the circuit diagram of the project is simple,\
    \ and it consists of an LDR, a 10 kΩ potentiometer, and a relay. The LDR is connected\
    \ to GPIO 4, and the relay to GPIO 17.\n\nThe resistance of an LDR increases as\
    \ the light level falls. The response of a typical LDR is shown in Figure 9.34.\
    \ The LDR is connected as a resistive potential divider circuit. The voltage across\
    \ the LDR increases as the light level falls. At dark, logic 0 will be sent to\
    \ the Raspberry Pi, which in turn will activate the relay. When it is light, logic\
    \ 1 will be sent to the Raspberry Pi, which will deactivate the relay. The potentiometer\
    \ can be adjusted so that the relay is activated at the required light level.\
    \ This process will require some trial and error.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_165_0.png)\n\
    \nFigure 9.33 Circuit diagram of the project\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_165_1.png)\n\
    \nFigure 9.34 Response of a typical LDR\n\n**Program listing:** Figure 9.35 shows\
    \ the program listing (program: **dusklight.py**). The LDR is input and the relay\
    \ is output. The program detects the voltage at its GPIO 4 pin and if it at logic\
    \ 0 (i.e. dark) then it deactivates the relay, otherwise the relay activated.\
    \ The potentiometer can be used to adjust the required light trigger level.\n\n\
    ```python\n#--------------------------------------------------\n#\n#         \
    \  DUSK LIGHT\n#           =========\n#\n# In this project a light dependent resistor\
    \ (LDR) is used to\n# detect the ambient light level. When the light level falls\n\
    # below the required value, a relay is activated which turns\n# ON the lights.\n\
    #\n# The potentiometer can be used to adjust the triggering\n# light level of\
    \ the project.\n#\n# Program: dusklight.py\n# Date   : October, 2023\n# Author\
    \ : Dogan Ibrahim\n#---------------------------------------------------------------\n\
    from gpiozero import LED, Button\n\nLDR = Button(4)                    # LDR at\
    \ GPIO 4\nRELAY = LED(17)                    # RELAY at GPIO 17\n\nRELAY.off()\
    \                        # RELAY OFF)\n\nwhile True:\n    if LDR.is_pressed:\n\
    \        RELAY.on()                 # At logic 0 (dark)\n    else:\n        RELAY.off()\
    \                # At logic 1 (light)\n```\n\nFigure 9.35 Program listing\n\n\
    ## 9.14 Project 11 – Ultrasonic distance measurement\n\n**Description:** This\
    \ project uses an ultrasonic transmitter/receiver pair to measure the distance\
    \ in front of the sensor. The distance is displayed on the screen. The aim of\
    \ the project is to show how ultrasonic sensors can be attached to a Raspberry\
    \ Pi 5 and how distance can be measured using these sensors.\n\n**Block diagram:**\
    \ Figure 9.36 shows the block diagram of the project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_166_0.png)\n\
    \nFigure 9.36 Block diagram of the project\n\n**Circuit Diagram:** An ultrasonic\
    \ sensor is used to sense the distance in front of the sensor. The outputs of\
    \ the ultrasonic sensors are +5 V and therefore are incompatible with the inputs\
    \ of Raspberry Pi 5. A resistive potential divider circuit is used to lower the\
    \ voltage to +3.3 V. The voltage at the output of the potential divider resistor\
    \ is:\n\nVo = 5 x 2k / (2k + 1k) = 3.3 V"
  mdcn: "## 树莓派 5 基础\n\n**程序清单：** 该程序名为 **reaction.py**，其代码清单如图 9.27 所示。程序开始时，会导入\
    \ `random` 库及其他所使用的库。程序在一个循环中运行，一旦 LED 点亮，系统时间即被记录。程序等待用户按下按钮，并在按下按钮的时刻再次读取系统时间。此时间与第一次记录时间的差值，即作为用户的反应时间显示出来。此过程在\
    \ 1 到 10 秒的随机延迟后重复进行。请注意，浮点函数 **time.time()** 返回的是自纪元以来的秒数。\n\n```python\n#-----------------------------------------------------------------------\n\
    #\n#                   REACTION TIMER\n#                   =============\n#\n\
    # This is a reaction timer program. The user presses a button\n# as soon as he/she\
    \ see a light. The time between seeing the\n# light and pressing the button is\
    \ measured and is displayed\n# in milliseconds as the reaction time of the user.\
    \ The light\n# comes ON after a random number of seconds between 1 and 10\n# seconds.\n\
    #\n# Program: reaction.py\n# Date    : October, 2023\n# Author  : Dogan Ibrahim\n\
    #-----------------------------------------------------------------------\nfrom\
    \ time import sleep\nimport random\nfrom gpiozero import LED, Button\nimport time\n\
    \nbutton = Button(3)                  # At GPIO 3\nled = LED(17)             \
