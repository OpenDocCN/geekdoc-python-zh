    when the switch is closed the voltage across the capacitor rises a given by the
    following formula:


    $Vc = Vin(1 - e^{-t/RC})$ (10.1)


    Initially, the voltage across the capacitor is 0 V, and in steady state the voltage
    across the capacitor becomes equal to Vin. The time constant is the time when
    the output voltage rises to around 63.2% of its final value.


