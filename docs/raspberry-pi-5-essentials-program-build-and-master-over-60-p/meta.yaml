    # 3.3.2 The Raspberry Pi 5 directory structure


    The Raspberry Pi 5 directory structure consists of a single root directory, with
    directories and subdirectories under the root. Different types of operating system
    programs and application programs are stored in different directories and subdirectories.


    Figure 3.6 shows part of the Raspberry Pi 5 directory structure. Notice that the
    root directory is identified by the ''/'' symbol. Under the root we have directories
    named such as bin, boot, dev, etc, home, lib, lost+found, media, mnt, opt, proc,
    and many more. The important directory as far as the users are concerned is the
    **home** directory. The **home** directory contains subdirectories for each user
    of the system. In the example in Figure 3.7, **pi** is the subdirectory for user
    **pi**. In a new system, this subdirectory contains two subdirectories called
    **Desktop** and **python_games**.'
