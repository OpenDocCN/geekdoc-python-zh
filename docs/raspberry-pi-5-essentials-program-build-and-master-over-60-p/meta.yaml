    # File Permissions


    One of the important arguments used with the **ls** command is **-l** (lower case
    letter l) which displays the file permissions, file sizes, and when they were
    last modified. In the example below, each line relates to one directory or file.
    Reading from right to left, the name of the'
  merge: -1
