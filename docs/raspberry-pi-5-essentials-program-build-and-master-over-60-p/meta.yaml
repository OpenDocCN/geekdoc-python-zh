    # Chapter 9 • Using an I²C LCD


    # 9.1 Overview


    The I²C (or I2C) bus is commonly used in microcontroller-based projects. In this
    chapter, you will be looking at the use of this bus on the Raspberry Pi 5. Some
    other interesting projects are also given in this chapter. The aim is to make
    the reader familiar with the I²C bus library functions and to show how they can
    be used in a real project. Before looking at the details of the projects, it is
    worthwhile to look at the basic principles of the I²C bus.


    # 9.2 The I²C Bus


    I²C bus is one of the most commonly used microcontroller communication protocols
    for communicating with external devices such as sensors and actuators. The I²C
    bus is a single master, multiple slave bus, and it can operate at standard mode:
    100 Kbit/s, full speed: 400 Kbit/s, fast mode: 1 Mbit/s, and high speed: 3.2 Mbit/s.
    The bus consists of two open-drain wires, pulled up with resistors:


    **SDA**: data line

    **SCL**: clock line


    Figure 9.1 shows the structure of an I²C bus with one master and three slaves.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_140_0.png)


    Because the I²C bus is based on just two wires, there should be a way to address
    an individual slave device on the same bus. For this reason, the protocol defines
    that each slave device provides a unique slave address for the given bus. This
    address is usually 7-bits wide. When the bus is free, both lines are HIGH. All
    communication on the bus is initiated and completed by the master, which initially
    sends a START bit, and completes a transaction by sending a STOP bit. This alerts
    all the slaves that some data is coming on the bus, and all the slaves listen
    on the bus. After the start bit, 7 bits of unique slave address are sent. Each
    slave device on the bus has its own address, and this ensures that only the addressed
    slave communicates on the bus at any time to avoid any collisions. The last sent
    bit is a read/write bit such that if this bit is 0, it means that the master wishes
    to write to the bus (e.g. to a register of a slave), if this bit is a 1, it means
    that the master wishes to read from the bus (e.g. from the register of a slave).
    The data is sent on the bus with the MSB bit first. An acknowledgement (ACK) bit
    takes place after every byte and this bit allows the receiver to signal the transmitter
    that the byte was received successfully and as a result, another byte may be sent.
    The ACK bit is sent at the 9th clock pulse.'
  - '[PAGE 141]


    The communication over the I²C bus is simply as follows:


    +   - The master sends on the bus the address of the slave it wants to communicate
    with

    - The LSB is the R/W bit which establishes the direction of data transmission,
    i.e. from mater to slave (R/W = 0), or from slave to master (R/W = 1)

    - Required bytes are sent, each interleaved with an ACK bit, until a stop condition
    occurs


    Depending on the type of slave device used, some transactions may require a separate
    transaction. For example, the steps to read data from an I²C compatible memory
    device are:


    +   - Master starts the transaction in write mode (R/W = 0) by sending the slave
    address on the bus

    - The memory location to be retrieved are then sent as two bytes (assuming 64Kbit
    memory)

    - The master sends a STOP condition to end the transaction

    - The master starts a new transaction in read mode (R/W = 1) by sending the slave
    address on the bus

    - The master reads the data from the memory. If reading the memory in sequential
    format, then more than one byte will be read

    - The master sets a stop condition on the bus


    # 9.3 I²C pins of Raspberry Pi 5


    Raspberry Pi 5 has 2 x I²C pins at its 40-pin GPIO header as follows:


    ```

    GPIO 2    SDA1    pin 3

    GPIO 3    SCL1    pin 5


    GPIO 0    SDA0    pin27

    GPIO 1    SCL0    pin 28

    ```


    1.8 Kilo Ohm pull-up resistors are used from the I²C pins to +3.3 V. Notice that
    because the I²C pins are pulled up to +3.3 V and Raspberry Pi 5 pins are not +5V
    compatible, it is necessary to use voltage level converter circuits if the I²C
    LCD operates with +5V.


    # 9.4 Project 1 – Using an I²C LCD – Seconds counter


    **Description:** In this project, an I²C-type LCD is connected to the Raspberry
    Pi 5. The program counts up in seconds and displays on the LCD. The aim of this
    project is to show how an I²C-type LCD can be used in Raspberry Pi projects.


    **The I²C LCD**

    The I²C LCD has four pins: GND, +V, SDA, and SCL. SDA can be connected to pin
    GPIO 2 and SCL to pin GPIO 3. +V pin of the display should be connected to the
    +5 V (pin 2) of the Raspberry Pi 5. Raspberry Pi GPIO pins are not +5 V tolerant,
    but the I²C LCD operates'
- md: "with +5 V where its SDA and SCL pins are pulled to +5 V. It is not a good idea\
    \ to connect the LCD directly to the Raspberry Pi, as it can damage its I/O circuitry.\
    \ There are several solutions here. One solution is to remove the I2C pull-up\
    \ resistors on the LCD module. The other option is to use an LCD which operates\
    \ with +3.3 V. The other solution is to use a bidirectional +3.3 V to +5 V logic\
    \ level converter chip. In this project, you will use the TXS0102 bidirectional\
    \ logic level converter chip like the one shown in Figure 9.2.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_142_0.png)\n\
