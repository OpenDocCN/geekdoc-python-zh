    \     res = first * second\n...     return res\n...\n>>> res = 2\n>>> a = Mult(3,\
    \ 8)\n>>> print(a)\n24\n```\n\nFigure 7.21 Variables in a function are local\n\
    \nThe rules for global variables are as follows:\n\n- Global variables are variables\
    \ assigned at the top of the program outside the function definitions.\n- Global\
    \ names must be declared only if they are assigned within a function.\n- Global\
    \ names may be referenced within a function without being declared.\n\nTherefore,\
    \ by declaring a variable outside the functions and also inside a function but\
    \ with the global keyword allows us to change its contents inside the function.\
    \ An example is given below which identifies the use of global variables:\n\n\
    ```python\ncnt = 10                    # variable cnt is global\ndef tstfunc():\
    \               # function declaration\n    global cnt               # variable\
    \ cnt defined as global\n    cnt = 200                # value of global cnt is\
    \ changed\n\ntstfunc()                   # function is called\nprint(cnt)    \
    \              # value of cnt is 200\n```\n\nAs explained above, if the value\
    \ of a global variable is not changed inside a function, then there is no need\
