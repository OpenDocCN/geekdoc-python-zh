    ## 16.5 项目 3 - 视频摄像头命令


    **libcamera-vid** 是视频捕获命令。默认情况下，它使用树莓派的硬件 H.264 编码器。它将显示一个预览窗口，并将编码的比特流写入指定的输出。例如，要将
    10 秒的视频写入文件 **test.h264**，请使用以下命令：


    ```

    libcamera-vid -t 10000 -o test.h264

    ```


    视频以原始 H264 格式录制，与许多视频播放器不兼容。生成的文件可以使用 VLC 媒体播放器程序播放。


    请注意，这是一个未打包的视频比特流，它没有包装在任何类型的容器格式（如 MP4 文件）中。--save-pts 选项可用于输出帧时间戳，以便随后可以使用 mkvmerge
    等工具将比特流转换为适当的格式。


    ```

    libcamera-vid -o test.h264 --save-pts timestamps.txt

    ```


    然后，如果您想要一个 mkv 文件：


    ```

    mkvmerge -o test.mkv --timecodes 0:timestamps.txt test.h264

    ```


    以下命令可用于 mpeg 输出格式：


    ```

    libcamera-vid -t 10000 --codec mjpeg -o test.mjpeg

    ```


