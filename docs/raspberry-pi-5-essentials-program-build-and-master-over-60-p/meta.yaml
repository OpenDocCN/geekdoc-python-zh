    ```\n\n图9.44 程序清单\n\n通电后，等待树莓派5启动，程序应自动启动。在测试并完成项目后，您应该从文件**/etc/rc.local**中删除您的Python程序名，以免每次重启树莓派5时程序都启动！\n\
    \n## 9.16 项目13 – 呼吸灯\n\n**描述：** 在本项目中，一个LED通过一个470欧姆的限流电阻连接到树莓派5的GPIO 21（引脚40）。LED的亮度每秒淡入淡出一次。\n\
