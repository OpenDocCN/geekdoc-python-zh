    **Port_Output** is used to control the LEDs. This function can take integer numbers
    from 0 to 255, and it converts the input number (x) into binary using the built-in
    function **bin**. Then the leading ''0b'' characters are removed from the output
    string **b** (bin function inserts characters ''0b'' to the beginning of the converted
    string). Then, the converted string **b** is made up of 8 characters by inserting
    leading zeroes. The string is then sent to the PORT bit by bit, starting from
    the least significant bit (GPIO 2) position. The result is that the 8 LEDs count
    up in binary.'
