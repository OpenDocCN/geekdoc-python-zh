    \n```\npi@raspberrypi: ~$ ls [o-t]*.txt\ntest.txt\npi@raspberrypi: ~$\n```\n\n\
    ## Renaming a File\n\n您可以使用 mv 命令重命名文件。在下面的示例中，文件 test.txt 的名称更改为 test2.txt：\n\
    \n```\npi@raspberrypi: ~$ mv test.txt test2.txt\npi@raspberrypi: ~$\n```\n\n##\
