    import spidev\nfrom time import sleep\n\n#\n# 创建SPI实例并打开SPI总线\n#\nspi = spidev.SpiDev()\n\
    spi.open(0,0)                       # 我们使用CE0作为CS\nspi.max_speed_hz = 4000\n\n\
