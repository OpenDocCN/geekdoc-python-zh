    and since the output is redirected to a file, it will not generate emails of outputs.
    Exit from the crontab table by pressing **Ctrl** followed by **Y** and return
    to save the new file.


    The scheduled tasks can be listed with the following command. Enter the command,
    and you should see your script file scheduled to run:


    ```

    pi@raspberrypi:~ $ crontab -l

    ```'
