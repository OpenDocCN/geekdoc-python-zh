    \nMatplotlib is a Python plotting library that is used to create two-dimensional\
    \ graphs. Before using this package, it has to be installed on your Raspberry\
    \ Pi 5 using the following command:\n\n```\npi@raspberrypi:~ $ sudo apt-get install\
