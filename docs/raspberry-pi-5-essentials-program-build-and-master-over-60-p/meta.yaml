    \nThe permissions can be analysed by breaking down the characters into four chunks\
    \ for: File type, User, Group, World. The first character for a file is '-' and\
    \ for a directory, it is 'd'. Next come the permissions for the User, Group and\
    \ World. The permissions are as follows:\n\n- Read permission (r): the permission\
    \ to open and read a file or to list a directory\n- Write permission (w): the\
    \ permission to modify a file, or to delete or create a file in a directory\n\
    - Execute permission (x): the permission to execute the file (applies to executable\
    \ files), or to enter a directory\n\nThe three letters **rwx** are used as a group\
    \ and if there is no permission assigned then a '-' character is used.\n\nAs an\
    \ example, considering the **Music** directory, we have the following permission\
    \ codes:\n\n```\ndrwxr-xr-x which translates to:\nd:          it is a directory\n\
    rwx:        user (owner) can read, write, and execute\nr-x:        group can read\
    \ and execute, but cannot write (e.g. create or delete)\nr-x:        world (everyone\
    \ else) can read and execute, but cannot write\n```\n\nThe **chmod** command is\
    \ used to change the file permissions. Before going into details of how to change\
    \ the permissions, let us look and see what arguments are available in **chmod**\
    \ for changing the file permissions.\n\nThe available arguments for changing file\
    \ permissions are given below. We can use these arguments to add/remove permissions\
    \ or to explicitly set permissions. It is important to realize that if we explicitly\
    \ set permissions, then any unspecified permissions in the command will be revoked:\n\
    \n- u: user (or owner)\n- g: group\n- o: other (world)\n- a: all\n\n- +: add\n\
    - -: remove\n- =: set\n\n- r: read\n- w: write\n- x: execute\n\nTo change the\
    \ permissions of a file we type the **chmod** command, followed by one of the\
    \ letters 'u', 'g', 'o', or 'a' to select the people, followed by the '+', '-'\
    \ or '=' to select the type of change, and finally followed by the filename. In\
    \ this example, a file with the name **mytestfile.txt** was created in the home\
    \ directory for demonstration purposes (See Figure 3.11). In this example, the\
    \ file **mytestfile.txt** has the user read and write permissions.\n\n```\npi@raspberrypi:~\
    \ $ ls -l\ntotal 44\ndrwxr-xr-x 2 pi dogan-ibrahim 4096 Sep 22 08:25 Bookshelf\n\
    drwxr-xr-x 2 pi dogan-ibrahim 4096 Oct  1 17:42 Desktop\ndrwxr-xr-x 2 pi dogan-ibrahim\
    \ 4096 Oct  1 17:42 Documents\ndrwxr-xr-x 2 pi dogan-ibrahim 4096 Oct  1 17:42\
    \ Downloads\ndrwxr-xr-x 2 pi dogan-ibrahim 4096 Oct  1 17:42 Music\ndrwxr-xr-x\
    \ 2 pi dogan-ibrahim 4096 Oct  3 11:37 myfiles\n-rw-r--r-- 1 pi dogan-ibrahim\
