    Another major software change is that the RPi.GPIO library (created by Ben Croston)
    was not available at the time of writing this book. As a result of this, all the
    GPIO-based Python programs in the book have been developed using the **gpiozero**
    library. Most third party HATs are based on RPi.GPIO and these will not work until
