    # 15.4.1 Project 3 - Communicating with an Arduino UNO over Bluetooth


    **Description:** In this project, a button is connected to the Arduino UNO. Also,
    a +3.3 V relay is connected to the Raspberry Pi 5. Pressing the button on the
    Arduino sends command **L1** to Raspberry Pi 5 which then activates the relay
    for 5 seconds. Similarly, sending **L0** deactivated the LED. The aim of this
    project is to show how the Arduino UNO and Raspberry Pi 5 can communicate by using
    an external Bluetooth module on the Arduino UNO.


    # The HC-06 Bluetooth module


    HC-06 is a low-cost, popular 4-pin serially controlled module with the following
    pins (see Figure 15.10):


    Figure 15.10 The HC-06 Bluetooth module


    HC-06 is a serially controlled module, having the following basic specifications:


    +   - +3.3 V to +6 V operation

    - 30 mA unpaired current (10 mA matched current)

    - Built-in antenna

    - Band: 2.40 GHz – 2.48 GHz

    - Power level: +6 dBm

    - Default communication: 9600 baud, 8 data bits, no parity, 1 stop bit

    - Signal coverage: 30 feet

    - Safety feature: Authentication and encryption

    - Modulation mode: Gauss frequency shift keying


    **Block diagram:** Figure 15.11 shows the block diagram of the project.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_297_0.png)


    **Circuit diagram:** The circuit diagram is shown in Figure 15.12. The button
    is connected to pin 2 of Arduino UNO through a pull-up resistor. The relay is
    connected to port GPIO 21 of the Raspberry Pi 5. HC-06 is a serial device with
    TX and RX pins. Only the RX input of the HC-06 is used, since in this project
    you only send data to the Bluetooth module. The output pin voltage of the Arduino
    UNO is +5 V, but HC-06 is not 5-V compatible. Therefore, a resis-'
