    from time import sleep                # import time library\n\nPORT = [9,10,22,27,17,4,3,2]\
    \          # LED ports\n\n#\n# This function initializes the port list PORT[]\n\
    #\ndef Configure():\n    for i in range(8):\n        PORT[i] = LED(PORT[i])\n\n\
    #\n# This function sends 8-bit data (0 to 255) to the PORT\n#\ndef Port_Output(x):\n\
    \    b = bin(x)                        # convert into binary\n    b = b.replace(\"\
    0b\", \"\")            # remove leading \"0b\"\n    diff = 8 - len(b)        \
    \         # find the length\n    for i in range (0, diff):\n        b = \"0\"\
    \ + b                    # insert leading 0s\n\n    for i in range (0, 8):\n \
    \       if b[i] == \"1\":\n            PORT[i].on()\n        else:\n         \
    \   PORT[i].off()\n    return\n#\n# Main program loop. Count up in binary every\
    \ second\n#\ncnt = 0\nConfigure()\n\nwhile True:\n    Port_Output(cnt)       \
    \           # send cnt to port\n    sleep(1)                          # wait 1\
    \ second\n    cnt = cnt + 1                     # increment cnt\n    if cnt >\
    \ 255:\n        cnt = 0\n```\n\nFigure 8.15 Modified program\n\n## 8.6 Project\
    \ 4 – Christmas lights (random flashing 8 LEDs)\n\n**Description:** In this project,\
    \ eight LEDs are connected to the Raspberry Pi 5 GPIO pins as in Project 3. The\
    \ LEDs flash randomly every 0.5 seconds, just like fancy Christmas lights. The\
    \ aim of this project is to show how to generate random numbers between 1 and\
