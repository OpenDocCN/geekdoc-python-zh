    64\n```\n\n图 7.7 使用 print 语句\n\n## 7.13 列表变量\n\n列表变量是用逗号分隔并括在方括号中的变量。列表中的变量可以是不同类型。可以使用方括号对列表中的所需项进行索引来访问列表的内容。索引从\
    \ 0 开始。与字符串一样，`*` 字符可用于重复，`+` 字符可用于连接。下面给出一些示例：\n\n```\nmylist = ['John', 'Adam',\
    \ 230, 12.25, 'Peter', 89]\nsecond = [30, 23]\n\ns = mylist[0]           # s =\
