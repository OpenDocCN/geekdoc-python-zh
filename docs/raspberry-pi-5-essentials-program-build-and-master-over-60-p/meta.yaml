  md: "Raspberry Pi 5 Essentials\n\n**Program listing:** The program is called **morse.py**\
    \ and the listing is shown in Figure 8.25. The Morse code alphabet is stored in\
    \ the list **Morse_Code**. The function **DO_DOT** implements a single dot with\
    \ the duration of one unit time. Function **DO_DASH** implements a single dash\
    \ with a duration of three unit times. Function **DO_SPACE** implements a space\
    \ character with duration of seven unit times. The rest of the program is executed\
    \ in a loop, where a text is read from the keyboard and the buzzer sounds in such\
    \ a way as to represent the Morse code of this text. The program terminates if\
    \ the user enters the text **QUIT**.\n\nYou should run the program from the command\
    \ mode as follows:\n\n```\npi@raspberrypi:~ $ python morse.py\n```\n\n```\n#-----------------------------------------------------------------------\n\
    #\n#                   MORSE CODE EXERCISER\n#                   ====================\n\
    #\n# This project can be used to learn the Morse code. A buzzer is\n# connected\
    \ to GPIO 17 of the Raspberry Pi 5.\n#\n# The program reads a text from the keyboard\
    \ and then sounds the\n# buzzer to simulate sending or receiving the Morse code\
    \ of this\n# text.\n#\n# In this project the Morse code speed is assumed to be\
    \ 10 wpm,\n# but can easily be changed by changing the parameter wpm.\n#\n# File\
    \  : morse.py\n# Date  : October, 2023\n# Author: Dogan Ibrahim\n#-----------------------------------------------------------------------\n\
