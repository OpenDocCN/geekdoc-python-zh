    \ \", msg.decode('utf-8'))\n        data = input(\"Enter message to send: \")\n\
    \        sock.send(data.encode('utf-8'))\n\nexcept KeyboardInterrupt:\n    print(\"\
    Closing connection to server\")\n    sock.close()\n    time.sleep(1)\n```\n图14.13\
    \ PC程序清单\n\n运行程序的步骤如下：\n\n- 在树莓派5上运行服务器程序\n- 在PC上运行客户端程序\n- 根据需要编写消息\n\n图14.14展示了两个程序的典型运行情况。\n\
    \n![](img/4c39fa287d846ab9ea3e468319162ce0_265_0.png)\n\n**注意：** 你可能会发现退出程序后，可能无法再次运行它。这是因为套接字会保持打开状态大约30秒，并且可能会显示错误消息\
    \ **Address is already in use**。你可以使用以下命令检查端口状态：\n\n```\npi@raspberrypi:~ $ netstat\
    \ -n | grep 5000\n```\n\n如果显示包含文本 **ESTABLISHED**，则意味着套接字没有正确关闭，你将需要重启你的Zero 2\
    \ W才能再次运行程序。另一方面，如果你看到带有 **TIME_WAIT** 的消息，那么你应该等待大约30秒再重启程序。\n\n## 14.6 项目4 –\
    \ 使用TCP/IP从智能手机控制连接到树莓派5的LED\n\n**描述：** 在本项目中，一个LED连接到树莓派5。通过从Android智能手机分别发送命令ON和OFF来打开和关闭LED。本项目的目的是展示如何通过Wi-Fi链路使用TCP/IP协议发送命令，从Android智能手机远程控制连接到树莓派的LED。在本项目中，树莓派5是服务器，智能手机是客户端。\n\
    \n**框图：** 图14.15展示了项目的框图。\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_266_0.png)\n\
    \nLED通过一个470欧姆的限流电阻连接到端口引脚GPIO 21（引脚49）。\n\n**程序清单：** 图14.16展示了程序清单（程序：**serverled.py**）。与前面的程序一样，创建了一个套接字并使用了端口5000。LED被分配到GPIO引脚21，并在程序开始时关闭。服务器等待来自客户端的连接，然后接受连接并显示消息\
