    # 10.5 Transient RL circuits


    The time response of a transient resistor-inductor circuit is similar to the RC
    circuit. When the circuit is connected to a DC supply of value Vin, the current
    in the circuit rises exponentially and is given by the following formula:


    $$i = \frac{Vin}{R}(1 - e^{-Rt/L})$$


    Where, Vin is in volts, R in ohms, L in henries, and t in seconds. The time constant
    of this circuit is given by T = L/R.


    After the current reaches its steady state value, disconnecting the DC supply
    and shorting the leads causes the current in the circuit to fall exponentially,
    given by the following formula:


    $$i = \frac{Vo}{R}e^{-Rt/L}$$


    Where, Vo is the initial voltage across the inductor.


    The transient response of RL circuits is similar to those of the RC circuits and
    therefore are not covered further in this book.


