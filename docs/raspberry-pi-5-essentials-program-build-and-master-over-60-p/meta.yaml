    \ 以查看附近的蓝牙设备（见图15.4）。您可能需要等待几分钟才能看到显示更新。记下您希望连接的设备的MAC地址（在本项目中是安卓手机），因为我们将使用此地址连接到设备。示例如图15.4所示：\n\
