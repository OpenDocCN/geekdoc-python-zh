    \        time.sleep(2)\n        sense.clear()\n        time.sleep(1)\n\nexcept\
    \ KeyboardInterrupt:\n    exit()\n```\n\n图 12.3 程序清单\n\n## 12.6 项目 3 – 学习乘法表\n\
    \n**描述**：此项目帮助孩子们练习乘法表。一个数字（可以更改）被硬编码到程序中。程序显示所选数字的乘法表。例如，如果硬编码的数字是 5，则 LED 矩阵上显示以下内容：\n\
    \n- 5x1=5\n- 5x2=10\n- 5x3=15\n- 5x4=20\n- 5x5=25\n- 5x6=30\n- 5x7=35\n- 5x8=40\n\
    - 5x9=45\n- 5x10=50\n- 5x11=55\n- 5x12=60\n\n图 12.4 显示了程序清单（程序：**timestab.py**）。变量\
    \ **Tablefor** 存储需要其乘法表的数字。形成一个从 0 到 11 的循环。在此循环内，变量 **j** 取值从 1 到 12。变量 **result**\
    \ 在循环的每次迭代中存储乘法的结果。字符串变量 **disp** 存储 LED 矩阵在每次迭代中要显示的数据。用户可以轻松更改 **Tablefor**\
    \ 的值，以生成另一个数字的乘法表。\n\n```python\n#-------------------------------------------------------------------\n\
    #                       乘法表\n#                       -----------\n#\n# 此程序生成乘法表。该表在程序开始时通过设置变量\
    \ Tablefor 来选择。\n#\n# 作者：Dogan Ibrahim\n# 文件：timestab.py\n# 日期：2023 年 10 月\n#---------------------------------------------------------------\n\
    from sense_hat import SenseHat\nsense = SenseHat()\nimport time\n\nspd = 0.2 \
    \                                   # 滚动速度\nred = (255, 0, 0)                \
    \            # 红色\nTablefor = 5                                 # 5 的乘法表\n\ntry:\n\
    \n    for k in range(12):                      # 从 0 到 11\n        j = k + 1 \
    \                           # 1 到 12\n        result = Tablefor * j\n        disp\
    \ = str(Tablefor) + \"x\" + str(j) + \"=\" + str(result)\n        sense.show_message(disp,\
    \ scroll_speed = spd, text_colour=(red))\n        time.sleep(1)\n        sense.clear()\n\
    \nexcept KeyboardInterrupt:\n    exit()\n```\n\n图 12.4 程序清单\n\n## 12.7 项目 4 –\
    \ 显示温度、湿度和气压\n\n**描述：** 在此项目中，我们在 Sense HAT 上显示环境温度、湿度和气压。\n\n图 12.5 显示了程序清单（程序：**thp.py**）。程序每两秒运行一次循环，其中温度、湿度和气压读数显示在滚动的\
    \ LED 上。请注意，读数均为浮点格式，并使用 `round()` 函数将其配置为小数点后一位数字。\n\n```python\n#---------------------------------------------------------------\n\
    #           温度、湿度和气压\n#           -------------------------------\n#\n# 此程序读取温度、湿度和气压，并在滚动的\
    \ LED 上显示。\n# 数据以以下格式显示：\n#\n#  T=nn.nC H=nn.n% P=nnnn.nmb\n#\n```"
