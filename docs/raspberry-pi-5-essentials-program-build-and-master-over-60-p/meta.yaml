    \n图 7.37 递归阶乘函数\n\n## 7.28 异常\n\n我们的程序中可能存在重大错误，例如除以零、文件权限错误等。通常，当 Python 遇到此类错误时，它无法处理它们，程序就会崩溃。\n\
    \n一种有序处理此类错误并避免崩溃的方法是在我们的程序中使用异常处理。基本方法是，每当发生错误时，程序检测到该错误并采取适当措施处理错误并继续正常执行。如果我们希望有序地终止正在运行的程序，异常处理也很有用，例如，当程序被用户异步终止（例如通过按\
    \ Ctrl+C 键）时，关闭任何输入输出操作。\n\n语句 `try` 和 `except` 用于处理程序中意外的错误或终止。异常处理的一般格式如下：\n\
    \n```\ntry:\n    正常的程序语句\n    正常的程序语句\nexcept 条件 1:\n    如果发生条件 1 类型的错误，则执行此代码块\n\
    \    ....................\n    ....................\nexcept 条件 2:\n    如果发生条件\
    \ 2 类型的错误，则执行此代码块\n    ....................\n    ....................\nelse:\n\
    \    如果没有检测到错误，则执行此代码块\n    ....................\n    ....................\n```\n\
    \n我们可以使用不带条件的 `except` 语句来处理任何类型的异常。一些常用的异常包括：\n\n- **异常 EOFError：** 读取数据时达到文件末尾条件\n\
