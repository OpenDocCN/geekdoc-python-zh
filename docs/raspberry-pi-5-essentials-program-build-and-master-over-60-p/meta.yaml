    # Importing the keypad functions in a program


    It is easier to import the keypad function under a file instead of writing them
    every time you want to use these functions. This can easily be done by collecting
    all the functions in a file and then importing that file at the beginning of your
    Python programs. Figure 13.7 shows a program called **keypadfuncs.py** which can
    be imported into your programs. It is important that this file should be in your
    default directory (**/home/pi**). Note that the keypad rows and columns must be
    connected to the same Raspberry Pi 5 GPIO pins as given in this project.


    ```

    #-----------------------------------------------------------------

    #                   4 x 4 KEYPAD FUNCTIONS

    #                   =====================

    #

    # Import this file in your Python programs

    #

    # Program: keypadfuncs.py

    # Date    : October, 2023

    # Author  : Dogan Ibrahim

    #-----------------------------------------------------------------

    from gpiozero import OutputDevice,DigitalInputDevice

    from time import sleep


