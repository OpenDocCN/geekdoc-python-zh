    pi@raspberrypi:~/mypics $ ffmpeg -framerate 1 -i Mypics%04d.jpg -c:v libx264 -r
    30 Mytimelapse.mp4

    ```


    The above command takes all the input images, **-i Mypics%04d.jpg**. This will
    search for the image with the lowest digit and sets that as the starting image.
    It will then increment that number by one and if the image exists, it will be
    added to the sequence. Option **-framerate 1** is used to define how fast the
    pictures are read in, in this case, one picture per second. Omitting the frame
    rate will default to 25. **-r 30** is the frame rate of the output video. Again,
