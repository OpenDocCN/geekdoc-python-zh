    \ = OutputDevice(ROW4)\nrow1.on()\nrow2.on()\nrow3.on()\nrow4.on()\n\n#\n# COLUMNS\
    \ as inputs and (pulled HIGH in hardware)\n#\ncol1 = InputDevice(COL1)\ncol2 =\
    \ InputDevice(COL2)\ncol3 = InputDevice(COL3)\ncol4 = InputDevice(COL4)\n\n#\n\
    # This function sets a row  to 0 and then finds out which\n# key is pressed on\
