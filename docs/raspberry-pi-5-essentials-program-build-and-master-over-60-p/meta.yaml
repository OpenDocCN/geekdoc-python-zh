    ## 16.5 Project 3 - Video camera commands


    **libcamera-vid** is the video capture command. By default, it uses the Raspberry
    Pi''s hardware H.264 encoder. It will display a preview window and write the encoded
    bit stream to the specified output. For example, to write a 10-second video to
    file **test.h264**, use the command:


    ```

    libcamera-vid -t 10000 -o test.h264

    ```


    Video is recorded as raw H264 format, which is incompatible with many video players.
    The resulting file can be played using the VLC media player program.


    Note that this is an unpacked video bit stream, it is not wrapped in any kind
    of container format (such as an MP4 file). The --save-pts option can be used to
    output frame timestamps so that the bit stream can subsequently be converted into
    an appropriate format using a tool like mkvmerge.


    ```

    libcamera-vid -o test.h264 --save-pts timestamps.txt

    ```


    and then if you want an mkv file:


    ```

    mkvmerge -o test.mkv --timecodes 0:timestamps.txt test.h264

    ```


    the following command can be used for mpeg output format:


    ```

    libcamera-vid -t 10000 --codec mjpeg -o test.mjpeg

    ```


    ## 16.6 Project 4 – Who is ringing my doorbell?


    **Description:** In this project, the camera is mounted on our front door. When
    the doorbell button is pressed, the camera automatically takes a picture of the
    person ringing the doorbell, and this picture is sent to an Android smartphone.
    Additionally, a relay is turned ON for 5 seconds to activate a doorbell.


    **Block Diagram:** Figure 16.8 shows the block diagram of the project.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_314_0.png)


    **Circuit Diagram:** The circuit diagram of the project is shown in Figure 16.9.
    The doorbell button and the relay are connected to port pins GPIO 20 and GPIO
    21 respectively.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_315_0.png)


    Figure 16.9 Circuit diagram of the project


    **Program listing:** In this program, you will be using the **OBEX Object Push**
    in Raspberry Pi 5 command mode to send pictures to your smartphone using Bluetooth.
    Before using OBEX Object Push, you have to find out the MAC address and the channel
    number of your smartphone. The steps on an Android phone are given below:


    - Enable Bluetooth on your smartphone

    - Go to **Settings**, then click **System**

    - Click **About phone**, then click **Status**

    - You should see the Bluetooth MAC address listed. On the author''s phone, the
    MAC address was **50:50:A4:0F:62:3F**, as shown in Figure 16.10


    ![](img/4c39fa287d846ab9ea3e468319162ce0_315_1.png)


    Figure 16.10 Displaying the Bluetooth MAC address


    We now have to find the channel number for the Bluetooth communication. Enter
    the following command on your Raspberry Pi 5 and look for the channel number under
    section Service Name: OBEX Object Push


    ```

    pi@raspberrypi:~ $ sdptool browse 50:50:A4:0F:62:3F

    ```


    Figure 16.11 shows the channel number as 12 in this example.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_316_0.png)


    Now, we have to install the OBEX software onto our Raspberry Pi 5. Enter the following
    command:


    ```

    pi@raspberrypi:~ $ sudo apt-get install obexftp

    ```


    We are now ready to develop our program (**bell.py**), which is shown in Figure
    16.12. The button and relay are initialized at the beginning of the program and
    **os** module is imported since we want to run a shell command from within our
    Python program. The program then enters an endless loop using the **while** statement.
    Inside this loop, the program waits until the button is pressed. At this point,
    the camera takes a picture using a **libcamera** command and stores in a file
    called **door.jpg**. The relay is also activated for 5 seconds. The picture is
    then sent to the smartphone using OBEX.


    ```

    #------------------------------------------------------------------

    #

    #                   WHO IS AT MY DOOR

    #                   ================

    #

    # In this program a camera, a pushbutton switch and a relay are all

    # connected to Raspberry Pi 5. The camera is positioned outside the

    # door so that it can see who is outside the door. Pressing the button

    # activates the relay for 5 seconds and then takes a picture of the

    # person outside the door and sends it to a smart phone over Bluetooth.

    #

    # Program: bell.py

    # Date    : October, 2023

    ```'
