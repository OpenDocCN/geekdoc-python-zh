  - '[PAGE 149]


    The MCP3002 is a successive-approximation 10-bit ADC with on-chip sample-and-hold
    amplifier. The device is programmable to operate as either a differential input
    pair or as dual single-ended inputs. The device is offered in an 8-pin package.
    Figure 9.11 shows the pin configuration of the MCP3002.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_149_0.png)


    The pin definitions are as follows:


    +   - **Vdd/Vref:** Power supply and reference voltage input

    - **CH0:** Channel 0 analog input

    - **CH1:** Channel 1 analog input

    - **CLK:** SPI clock input

    - **DIN:** SPI serial data in

    - **DOUT:** SPI serial data out

    - **CS/SHDN:** Chip select/shutdown input


    In this project, the supply voltage and the reference voltage are set to +3.3
    V. Thus, the digital output code is given by:


    Digital output code = 1024 x Vin / 3.3


    or, Digital output code = 310.30 x Vin


    Each quantization level corresponds to 3300/1024 = 3.22 mV. Thus, for example,
    input data ''00 000001'' corresponds to 3.22 mV, ''00 000010'' corresponds to
    6.44 mV and so on.


    The MCP3002 ADC has two configuration bits: SGL/DIFF and ODD/SIGN. These bits
    follow the sign bit and are used to select the input channel configuration. The
    SGL/DIFF is used to select single ended or pseudo-differential mode. The ODD/SIGN
    bit selects which channel is used in single-ended mode and is used to determine
    polarity in pseudo-differential mode. In this project, we are using channel 0
    (CH0) in single-ended mode. According to the MCP3002 data sheet, SGL/DIFF and
    ODD/SIGN must be set to 1 and 0 respectively.


    Figure 9.12 shows the circuit diagram of the project, where the voltage to be
    measured is applied directly to the CH0 input of the ADC. MCP3002 operates with
    the SPI interface. Raspberry Pi 5 GPIO SPI pins are:'
  - "[PAGE 150]\n\n**SPI0:**\nMISO - pin 21\nMOSI - pin 19\nCE0 - pin 24\nSCLK - pin\
    \ 23\n\n**SPI1:**\nMISO - pin 35\nMOSI - pin 38\nCE1 - pin 11\nSCLK - pin 40\n\
    \nIn this project, SPI0 GPIO pins are used.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_150_0.png)\n\
    \nFigure 9.12 Circuit diagram of the project\n\n**Program listing:** The SPI interface\
    \ must be enabled on the Raspberry Pi 5 before using the SPI functions. The steps\
    \ are:\n\n+   - Start the configuration menu from the command prompt:\n  \n  pi@raspberrypi:~\
    \ $ sudo raspi-config\n  \n- Go down the menu to **Interface Options**\n- Go down\
    \ and select **SPI**\n- Enable the SPI interface\n- Select **Finish** to complete"
  - '[PAGE 151]


    Raspberry Pi 5 Essentials


    Figure 9.13 shows the program listing (**voltmeter.py**). The function **get_adc_data**
    is used to read the analog data, where the channel number (channel_no) is specified
    in the function argument as 0 or 1. Notice that we have to send the start bit,
    followed by the SGL/DIFF and ODD/SIGN bits and the MSBF bit to the chip.


    It is recommended to send leading zeroes on the input line before the start bit.
    This is often done when using microcontroller-based systems that must send 8 bits
    at a time.


    The following data can be sent to the ADC (SGL/DIFF = 1 and ODD/SIGN = channel_no)
    as bytes with leading zeroes for more stable clock cycle. The general data format
    is:


    ```

    0000 000S DCM0 0000 0000 0000

    ```


    Where, S = start bit, D = SGL/DIFF bit, C = ODD/SIGN bit, M = MSBF bit


    For channel 0: 0000 0001 1000 0000 0000 0000 (0x01, 0x80, 0x00)


    For channel 1: 0000 0001 1100 0000 0000 0000 (0x01, 0xC0, 0x00)


    Notice that the second byte can be sent by adding 2 to the channel number (to
    make it 2 or 3) and then shifting 6 bits to the left as shown above to give 0x80
    or 0xC0.


    The chip returns 24-bit data (3 bytes) and we must extract the correct 10-bit
    ADC data from these 24 bits. The 24-bit data is in the following format (''X''
    is don''t care bit):


    ```

    XXXX XXXX XXXX DDDD DDDD DDXX

    ```


    Assuming that the returned data is stored in 24-bit variable ADC, we have:


    ```

    ADC[0] = "XXXX XXXX"

    ADC[1] = "XXXX DDDD"

    ADC[2] = "DDDD DDXX"

    ```


    Thus, we can extract the 10-bit ADC data with the following operations:


    ```

    (ADC[2] >> 2)          so, low byte = ''00DD DDDD''

    and

    (ADC[1] & 15) << 6)    so, high byte = ''DD DD00 0000''

    ```


    Adding the low byte and the high byte, we get the 10-bit converted ADC data as:


    ```

    DD DDDD DDDD

    ```


    The SPI bus on the Raspberry Pi supports the following functions:'
  - "[PAGE 152]\n\n| Function | Description |\n| :--- | :--- |\n| open (0,0) | Open\
