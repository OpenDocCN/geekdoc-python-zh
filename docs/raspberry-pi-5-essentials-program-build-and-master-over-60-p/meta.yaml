    \ the ls command>\npi@raspberrypi: ~$\n```\n\n## Date and Time\n\n要显示当前日期和时间，使用\
    \ **date** 命令。\n\n## Copying a File\n\n要制作文件的副本，请使用命令 **cp**。在以下示例中，制作了文件 **mytestfile.txt**\
    \ 的副本，并将新文件命名为 **test.txt**：\n\n```\npi@raspberrypi: ~$ cp mytestfile.txt test.txt\n\
    pi@raspberrypi: ~$\n```\n\n## Wildcards\n\n您可以使用通配符来选择具有相似特征的多个文件。例如，具有相同文件扩展名的文件。*\
    \ 字符用于匹配任意数量的字符。类似地，? 字符用于匹配任何单个字符。在下面的示例中，列出了所有扩展名为 **.txt** 的文件：\n\n```\npi@raspberrypi:\
    \ ~$ ls *.txt\nmytestfile.txt  test.txt\npi@raspberrypi: ~$\n```\n\n通配符 [a-z]\
