- md: '# Preface


    The Raspberry Pi 5 is a credit-card-sized computer from Raspberry Pi that can
    be used in many applications, such as in audio and video media centers, as a desktop
    computer, in industrial controllers, robotics, and in many domestic and commercial
    applications. In addition to the many features found in other Raspberry Pi computers,
    the Raspberry Pi 5 offers Wi-Fi and Bluetooth 5.0 (with BLE support), which makes
    it highly desirable in remote and Internet-based control and monitoring applications.


    The Raspberry Pi 5 is based on a 64-bit quad-core ARM Cortex-A76 processor running
    at 2.4 GHz. This implies a performance boost of two to three times compared to
    the Raspberry Pi 4. Raspberry Pi 5 comes with an enhanced graphic performance,
    using an 800 MHz VideoCore VII graphics chip. Additionally, the Raspberry Pi 5
    features the RP1 southbridge chip made by Raspberry Pi. With the help of this
    RP1 southbridge, Raspberry Pi 5 delivers higher performance and more functionality
    for peripheral devices. It should now be possible to carry out many real-time
    operations such as audio digital signal processing, real-time digital control
    and monitoring, and many other real-time operations using this tiny powerhouse.


    This book is about the Raspberry Pi 5 computer and its use in various control
    and monitoring applications. The book explains in simple terms and with many tested
    and working example projects how to configure the Raspberry Pi 5 computer, how
    to use the latest operating system (Bookworm), and how to write application programs
    using the popular Python programming language.


    The book starts with an introduction to the Raspberry Pi 5 computer and covers
    the important topics of accessing the computer locally and remotely. Use of the
    console command language as well as accessing and using the desktop GUI have been
    described with working examples.


    The remaining parts of the book cover many Raspberry-Pi-5-based hardware projects
    using components and devices such as LEDs, buzzers, LCDs, ultrasonic sensors,
    temperature sensors, Sense HAT, camera modules, etc. Example projects are given
    using Wi-Fi and Bluetooth modules to send and receive data from smartphones, from
    the PC, and sending real-time temperature and atmospheric pressure data to the
    cloud.


    All the projects presented in the book have been tested and are working. Complete
    circuit diagrams and full program listings are given for each project, with detailed
    descriptions of the operation of each project. The following subheadings are used
    in every project wherever necessary:


    - Project title

    - Project description

    - Block diagram

    - Circuit diagram

    - Program listing

    - Suggestions for future work


    Raspberry Pi 5 Essentials


    I hope the readers find the book helpful and enjoy reading it, and use a Raspberry
    Pi 5 in their next new projects.


    *Prof Dr. Dogan Ibrahim*

    *London*


    # Chapter 1 • The Raspberry Pi 5


    ## 1.1 Overview


    The Raspberry Pi 5 is the latest credit card size computer from Raspberry Pi.
    In this chapter, we will look at the specifications of this new computer and compare
    it with the Raspberry Pi 4.


    ## 1.2 The Raspberry Pi 5


    Raspberry Pi 4 was released in June 2019. There has been a long wait for a newer
    model and finally the Raspberry Pi 5 was launched in October 2023.


    The Raspberry Pi 5 is claimed to have two or three times the processing power
    of The Raspberry Pi 4, which is already a very popular single board computer.
    The Raspberry Pi 5 is currently available in 4 GB and 8 GB memory capacities,
    but smaller memory devices may appear later. Although the Raspberry Pi 5 is the
    same size and shape as the Model 4B, it has a number of interesting new features
    such as PCIe connector, power button, built-in real-time clock and some others
    that we will investigate in this chapter.


    The Raspberry Pi 5 is based on a 2.4 GHz Cortex-A76 ARM processor with a new south-bridge
    for handling the peripheral interface. A new VideoCore VII GPU is provided with
    800 MHz speed. The dual camera interface is another nice feature of the Raspberry
    Pi 5. The microSD card interface now supports cards that work at much higher speeds.


    Table 1.1 shows a comparison of the Raspberry Pi 4 and 5. Notice that both devices
    have dual 2 × 4kp60 HDMI display interfaces, although Pi 5 supports HDR output.
    The 2 × 20 pin GPIO interface is the same in both devices. The Raspberry Pi 5
    additionally has two camera interfaces, a PCIe bus connector, a UART interface,
    an RTC clock power connector, and a fan power connector. Wi-Fi and Bluetooth are
    supported by both devices. The on-board power switch on Pi 5 is a useful addition
    and was requested by many users. Pi 5 is powered from 5 V/4 A USB-C type power
    supply, where Pi 4 is powered from a 3 A power supply. Pi 5 is slightly more expensive
    than Pi 4.


    | | Raspberry Pi 4 | Raspberry Pi 5 |

    |---|---|---|

    | SoC | BCM2711 SoC<br>Cortex-A72 CPU at 1.8 GHz | BCM2712 SoC<br>Cortex-A76 CPU
    at 2.4 GHz |

    | CPU | 4 core | 4 core |

    | Instruction set | ARMv8-A | ARMv8-2 |

    | Display | 500 MHz VideoCore VI GPU | 800 MHz VideoCore VII GPU |

    | L2 Cache | 1 MB (shared) | 2 MB |

    | L3 Cache | None | 2 MB (shared) |

    | RAM | 1, 2, 4, 8 GB LPDDR4 | 4, 8 GB LPDDR4X |

    | SD Card | microSD | microSD (high speed SDR104 compatible) |

    | GPIO | 2 × 20 pin | 2 × 20 pin |

    | USB ports | 2× USB2<br>2× USB3 | 2× USB2<br>2× USB3 |

    | Networking | Gigabit Ethernet port | Gigabit Ethernet port |

    | Connectors | 2-lane MIPI display port<br>2-lane MIPI CSI camera port<br>4-pole
    stereo audio and composite video port | 2× MIPI camera<br>2× 4-lane MIPI camera/display<br>PCIe
    2.0 interface<br>UART port<br>RTC clock power port<br>Fan power port |

    | Wi-Fi/Bluetooth | 802.11ac, Bluetooth 5/BLE | 802.11ac, Bluetooth 5/BLE |

    | Power button | None | Yes |

    | Power | 5 V, 3 A USB-C | 5 V, 4 A USB-C |

    | Size | 85 × 56 mm | 85 × 56 mm |


    Table 1.1 Comparison of Raspberry Pi 5 and Raspberry Pi 4


    There are two micro-HDMI based monitor ports on both devices, with both having
    the same specifications.


    The Ethernet port and USB ports are swapped. As a result of this, the Raspberry
    Pi 4 case is incompatible with the Pi 5 and a new case is required.


    The camera and display connectors on the Raspberry Pi 5 are 15-pin and smaller,
    instead of the original 22-pin connector used on Pi 4. A ribbon cable with 22-pin
    on one side and 15-pin on the other side is required to connect an existing Raspberry
    Pi 4 camera to the Raspberry Pi 5. The Raspberry Pi 5 has two connectors, allowing
    two cameras or DSI displays (or a mix of either) to be connected. The PCIe connector
    is for fast external PCIe compatible peripherals, such as SSDs.


    The new power button on the Raspberry Pi 5 could be very useful. When the device
    is On, pressing the button brings the shutdown (logout) menu. A safe shutdown
    will occur with another press of the power button.


    Figure 1.1 shows the front view of the Raspberry Pi 5 with the components labelled
    for reference.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_14_0.png)


    Figure 1.1 Raspberry Pi 5


    The Raspberry Pi 5 gets rather hot, and it is recommended to use a cooler to lower
    the CPU temperature. Although the idle CPU temperature is around 50°C, it can
    go higher than 85°C under a stress test. An active cooler is available for the
    Raspberry Pi 5. Holes and power points are provided on the board to install and
    power the active cooler. Figure 1.2 shows the Raspberry Pi 5 with the active cooler
    installed. The active cooler cools down the SoC, RAM, and the southbridge chip.
    When the CPU is idle, the active cooler keeps the CPU temperature at around 40°C.
    The fan of the cooler operates automatically when the CPU temperature goes just
    above 50°C.


    ![](img/4c39fa287d846ab9ea3e468319162ce0_14_1.png)


    Figure 1.2 The Raspberry Pi 5 with active cooler


    The Raspberry Pi 5 operating system (OS) is based upon Debian 12 with the code
    name **Bookworm**. This OS, released in July 2023, comes with a new Python interpreter
    (Python 3.11). This means that a Python package cannot be installed using the
    **pip** commands.'
  mdcn: '# 前言


    树莓派5是树莓派公司推出的一款信用卡大小的计算机，可用于多种应用场景，例如音视频媒体中心、桌面计算机、工业控制器、机器人以及众多家庭和商业应用。除了其他树莓派计算机所具备的众多功能外，树莓派5还提供了Wi-Fi和蓝牙5.0（支持BLE），这使其在远程和基于互联网的控制与监测应用中极具吸引力。


    树莓派5基于一颗运行频率为2.4 GHz的64位四核ARM Cortex-A76处理器。这意味着其性能相比树莓派4提升了两到三倍。树莓派5采用了性能更强的800
    MHz VideoCore VII图形芯片，图形处理能力得到增强。此外，树莓派5还配备了树莓派公司自研的RP1南桥芯片。借助这颗RP1南桥芯片，树莓派5为外围设备提供了更高的性能和更多的功能。现在，利用这个强大的微型计算机，应该可以执行许多实时操作，例如音频数字信号处理、实时数字控制与监测以及其他众多实时任务。


    本书围绕树莓派5计算机及其在各种控制与监测应用中的使用展开。书中以简洁的语言，并通过许多经过测试且可运行的示例项目，讲解了如何配置树莓派5计算机、如何使用最新的操作系统（Bookworm），以及如何使用流行的Python编程语言编写应用程序。


    本书首先介绍了树莓派5计算机，并涵盖了本地和远程访问计算机的重要主题。书中通过可运行的示例，描述了如何使用控制台命令语言以及如何访问和使用桌面图形用户界面。


    本书的其余部分涵盖了众多基于树莓派5的硬件项目，使用了LED、蜂鸣器、LCD、超声波传感器、温度传感器、Sense HAT、摄像头模块等组件和设备。书中给出了使用Wi-Fi和蓝牙模块从智能手机、电脑发送和接收数据，以及将实时温度和大气压力数据发送到云端的示例项目。


    书中介绍的所有项目都经过测试并可运行。每个项目都提供了完整的电路图和完整的程序清单，并对每个项目的操作进行了详细描述。在每个项目中，必要时会使用以下子标题：


    - 项目标题

    - 项目描述

    - 框图

    - 电路图

    - 程序清单

    - 未来工作建议


    树莓派5基础


    希望读者觉得本书有所帮助，享受阅读过程，并在他们下一个新项目中使用树莓派5。


    *多甘·易卜拉欣 教授 博士*

    *伦敦*


    # 第1章 • 树莓派5


    ## 1.1 概述


    树莓派5是树莓派公司推出的最新款信用卡大小的计算机。在本章中，我们将了解这款新计算机的规格，并将其与树莓派4进行比较。


    ## 1.2 树莓派5


    树莓派4于2019年6月发布。人们等待了很长时间才迎来更新型号，最终树莓派5于2023年10月推出。


    据称，树莓派5的处理能力是已经非常流行的单板计算机树莓派4的两到三倍。树莓派5目前提供4 GB和8 GB内存容量，但未来可能会出现内存更小的设备。尽管树莓派5与4B型号尺寸和形状相同，但它具有许多有趣的新功能，例如PCIe连接器、电源按钮、内置实时时钟等，我们将在本章中进行探讨。


    树莓派5基于一颗2.4 GHz的Cortex-A76 ARM处理器，并配备了一个用于处理外围接口的新南桥。它提供了一个速度为800 MHz的新VideoCore
    VII GPU。双摄像头接口是树莓派5的另一个出色特性。microSD卡接口现在支持工作速度更高的卡。


    表1.1展示了树莓派4和5的比较。请注意，两款设备都具有双2 × 4kp60 HDMI显示接口，尽管Pi 5支持HDR输出。2 × 20引脚GPIO接口在两款设备上是相同的。树莓派5额外提供了两个摄像头接口、一个PCIe总线连接器、一个UART接口、一个RTC时钟电源连接器和一个风扇电源连接器。两款设备都支持Wi-Fi和蓝牙。Pi
    5上的板载电源开关是一个有用的新增功能，也是许多用户所要求的。Pi 5通过5 V/4 A USB-C型电源供电，而Pi 4则通过3 A电源供电。Pi 5比Pi
    4略贵一些。


    | | 树莓派4 | 树莓派5 |

    |---|---|---|

    | SoC | BCM2711 SoC<br>Cortex-A72 CPU @ 1.8 GHz | BCM2712 SoC<br>Cortex-A76 CPU
    @ 2.4 GHz |

    | CPU | 4核 | 4核 |

    | 指令集 | ARMv8-A | ARMv8-2 |

    | 显示 | 500 MHz VideoCore VI GPU | 800 MHz VideoCore VII GPU |

    | L2缓存 | 1 MB（共享） | 2 MB |

    | L3缓存 | 无 | 2 MB（共享） |

    | 内存 | 1, 2, 4, 8 GB LPDDR4 | 4, 8 GB LPDDR4X |

    | SD卡 | microSD | microSD（兼容高速SDR104） |

    | GPIO | 2 × 20引脚 | 2 × 20引脚 |

    | USB端口 | 2× USB2<br>2× USB3 | 2× USB2<br>2× USB3 |

    | 网络 | 千兆以太网端口 | 千兆以太网端口 |

    | 连接器 | 2通道MIPI显示端口<br>2通道MIPI CSI摄像头端口<br>4极立体声音频和复合视频端口 | 2× MIPI摄像头<br>2× 4通道MIPI摄像头/显示<br>PCIe
    2.0接口<br>UART端口<br>RTC时钟电源端口<br>风扇电源端口 |

    | Wi-Fi/蓝牙 | 802.11ac, 蓝牙 5/BLE | 802.11ac, 蓝牙 5/BLE |

    | 电源按钮 | 无 | 有 |

    | 电源 | 5 V, 3 A USB-C | 5 V, 4 A USB-C |

    | 尺寸 | 85 × 56 mm | 85 × 56 mm |


    表1.1 树莓派5与树莓派4的比较


    两款设备上都有两个基于micro-HDMI的显示器端口，规格相同。


    以太网端口和USB端口的位置互换了。因此，树莓派4的外壳与Pi 5不兼容，需要使用新的外壳。


    树莓派5上的摄像头和显示连接器是15引脚且更小的，而不是Pi 4上使用的原始22引脚连接器。要将现有的树莓派4摄像头连接到树莓派5，需要一根一侧为22引脚、另一侧为15引脚的排线。树莓派5有两个连接器，允许连接两个摄像头或DSI显示器（或两者的混合）。PCIe连接器用于快速的外部PCIe兼容外设，例如SSD。


    树莓派5上的新电源按钮可能非常有用。当设备开启时，按下按钮会弹出关机（注销）菜单。再次按下电源按钮将执行安全关机。


    图1.1展示了树莓派5的正面视图，并标注了各组件以供参考。


    ![](img/4c39fa287d846ab9ea3e468319162ce0_14_0.png)


    图1.1 树莓派5


    树莓派5会变得相当热，建议使用散热器来降低CPU温度。尽管空闲时CPU温度约为50°C，但在压力测试下可能超过85°C。树莓派5有售的主动散热器。电路板上提供了安装主动散热器的孔和电源点。图1.2展示了安装了主动散热器的树莓派5。主动散热器为SoC、RAM和南桥芯片降温。当CPU空闲时，主动散热器将CPU温度保持在40°C左右。当CPU温度刚刚超过50°C时，散热器的风扇会自动启动。


    ![](img/4c39fa287d846ab9ea3e468319162ce0_14_1.png)


    图1.2 安装了主动散热器的树莓派5


    树莓派5操作系统（OS）基于代号为**Bookworm**的Debian 12。该操作系统于2023年7月发布，附带了一个新的Python解释器（Python
    3.11）。这意味着无法使用**pip**命令安装Python包。'
