- img_proc: true
  md: 'The GPIO provides 26 general-purpose bidirectional I/O pins. Some of the pins
    have multiple functions. For example, pins 3 and 5 are the GPIO2 and GPIO3 input-output
    pins respectively. These pins can also be used as the I²C bus SDA and SCL pins
    respectively. Similarly, pins 9, 10, 11 and 19 can either be used as general-purpose
    input-output pins, or as the SPI bus pins. Pins 8 and 10 are reserved for UART
    serial communication.


    Two power outputs are provided: +3.3 V and +5.0 V. The GPIO pins operate at +3.3
    V logic levels (not like many other computer circuits that operate with +5 V).
    A pin can either be an input or an output. When configured as an output, the pin
    voltage is either 0 V (logic 0) or +3.3 V (logic 1). Raspberry Pi 5 is normally
    operated using an external power supply (e.g. a mains adapter) with +5 V output.
    A 3.3 V output pin can supply up to 16 mA of current. The total current drawn
    from all output pins should not exceed the 51 mA limit. Care should be taken when
    connecting external devices to the GPIO pins, as drawing excessive currents or
    short-circuiting a pin can easily damage your Raspberry Pi. The amount of current
    that can be supplied by the 5 V pin depends on many factors, such as the current
    required by the Pi itself, current taken by the USB peripherals, camera current,
    micro-HDMI port current, and so on.


    When configured as an input, a voltage above +1.7 V will be taken as logic 1,
    and a voltage below +1.7 V will be taken as logic 0. Care should be taken not
    to supply voltages greater than +3.3 V to any I/O pin, as large voltages can easily
    damage your Raspberry Pi. The Raspberry Pi 5, like others in the family, has no
    overvoltage protection circuitry.


    # 8.3 Project 1 – Flashing an LED


    **Description:** This is perhaps the easiest hardware project you can design using
    your Raspberry Pi 5. In this project, you will connect an LED to one of the ports
    of the Raspberry Pi 5 and then flash the LED once a second. The aim of this project
    is to show how a simple Python program can be written and then run from a file.
    The project also shows how to connect an LED to a Raspberry Pi 5 GPIO pin. In
    addition, the project shows how to use the GPIO library to configure and set a
    GPIO pin to logic 0 or 1.


    **Block diagram:** The block diagram of the project is shown in Figure 8.3


