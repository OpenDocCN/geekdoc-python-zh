    from keypadfuncs import GetChar\n\nc = GetChar()                # Wait for key\
    \ press\nprint (c)                    # Display the pressed key\n```\n\nFigure\
    \ 13.8 Program: keypadtest.py\n\nFigure 13.4 Circuit diagram\n\nFigure 13.5 shows\
    \ the pin configuration of the 4×4 keypad used in the project.\n\n![](img/4c39fa287d846ab9ea3e468319162ce0_246_1.png)\n\
    \nFigure 13.5 Pin configuration of the 4×4 keypad\n\n**Program listing:** Figure\
    \ 13.6 shows the program listing (program: **keypad.py**). At the beginning of\
    \ the program, modules **OutputDevice** and **InputDevice** of gpiozero are imported\
    \ to the program. The row and column pins of the keypad are assigned to GPIO ports.\
    \ Rows are configured as outputs and columns as inputs. All the rows are set HIGH\
