    \ | disconnect the device from the SPI bus |\n| writebytes([array of bytes]) |\
    \ Write an array of bytes to SPI bus device |\n| readbytes(len) | Read **len**\
    \ bytes from SPI bus device |\n| xfer2([array of bytes]) | Send an array of bytes\
    \ to the device with CEx asserted at all times |\n| xfer([array of bytes]) | Send\
    \ an array of bytes de-asserting and asserting CEx with every byte transmitted\
