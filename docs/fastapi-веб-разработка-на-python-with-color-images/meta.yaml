  md: "# Пример 16.1. Получение значения из формы GET\n\n```\nfrom fastapi import\
    \ FastAPI, Form\n\napp = FastAPI()\n\n@app.get(\"/who2\")\ndef greet2(name: str\
    \ = Form()):\n    return f\"Hello, {name}?\"\n```\n\nОсновное отличие заключается\
    \ в том, что значение поступает от объекта Form, а не Path, Query и остальных\
    \ из главы 3.\n\nПопробуйте (пример 16.2) провести начальный тест формы с помощью\
    \ HTTPie (вам потребуется аргумент -f, чтобы выгрузка происходила в кодировке\
    \ формы, а не в формате JSON).\n\n# Пример 16.2. Формирование запроса GET с помощью\
    \ HTTPie\n\n```\n$ http -f -b GET localhost:8000/who2 name=\"Bob Frapples\"\n\"\
    Hello, Bob Frapples?\"\n```\n\nМожете также отправить запрос из стандартного файла\
    \ HTML-формы. В главе 15 было показано, как создать каталог static (доступ к нему\
    \ осуществляется по URL /static) для хранения любых данных, включая HTML-файлы,\
    \ поэтому в примере 16.3 поместим туда этот файл (form1.html).\n\n# Пример 16.3.\
    \ Формирование запроса GET (static/form1.html)\n\n```\n<form action=\"http://localhost:8000/who2\"\
    \ method=\"get\">\nSay hello to my little friend:\n<input type=\"text\" name=\"\
    name\" value=\"Bob Frapples\">\n<input type=\"submit\">\n</form>\n```\n\nЕсли\
    \ вы попросите браузер загрузить страницу http://localhost:8000/static/form1.html,\
    \ то увидите форму. Если введете любую тестовую строку, получите следующее сообщение:\n\
    \n```\n\"detail\":[{\"loc\":[\"body\",\"name\"],\n            \"msg\":\"field\
    \ required\",\n            \"type\":\"value_error.missing\"}]\n```\n\nА?\n\nПосмотрите\
    \ в окно, где запущен Uvicorn, чтобы увидеть, что написано в его журнале:"
