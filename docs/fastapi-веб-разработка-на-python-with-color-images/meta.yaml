    # Общение с уровнями сервисов и данных


    Когда функции на веб-уровне нужны данные, находящиеся под управлением уровня данных,
    она должна попросить уровень сервисов стать посредником. Это требует больше кода
    и может показаться ненужным, но это хорошая идея.


    +   - Как гласит этикетка на банке, веб-уровень работает с Интернетом, а уровень
    данных — с внешними хранилищами данных и сервисами. Гораздо безопаснее хранить
    их данные по отдельности.

    - Уровни можно тестировать независимо друг от друга. Механизм разделения уровней
    позволяет это сделать.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_131_0.png)


    Для очень маленького сайта можно пропустить сервисный слой, если он ничего не
    делает. В главе 9 изначально определены сервисные функции, выполняющие лишь передачу
    запросов и ответов между веб-уровнем и уровнем данных. Хотя бы эти уровни необходимо
    разделить.


    Что делает функция сервисного уровня? Узнаете в следующей главе. Подсказка: она
    разговаривает с уровнем данных, но тихим голосом, чтобы веб-уровень не понял,
    что именно она говорит. Также она определяет любую специфическую бизнес-логику,
    например взаимодействие между ресурсами. Чаще всего веб-уровень и уровень данных
    не должны заботиться о том, что происходит внутри.


    > (Уровень сервисов — это секретная служба.)


    # Пагинация и сортировка


    В веб-интерфейсах, когда возвращаются многие или все сущности с URL-шаблонами,
    такими как GET /resource, часто требуется запросить поиск и возврат ресурсов:'
