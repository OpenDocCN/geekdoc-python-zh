  - '[PAGE 79]


    В стандартном программировании переменная обычно связана с одним и тем же объектом.
    Если мы свяжем с этой переменной подсказку типа, то сможем избежать некоторых
    ошибок в программировании. Поэтому Python добавил подсказки типов к языку, в стандартный
    модуль типизации. Интерпретатор Python игнорирует синтаксис подсказки типа и выполняет
    программу так, как будто ее нет. Тогда в чем смысл?


    В одной строке вы можете рассматривать переменную как строку, а потом забыть и
    присвоить ей объект другого типа. Компиляторы других языков будут жаловаться,
    а Python этого не сделает. Стандартный интерпретатор Python отлавливает обычные
    синтаксические ошибки и исключения времени выполнения, но не смешивает типы переменных.
    Инструменты-помощники, такие как mypy, обращают внимание на подсказки типов и
    предупреждают о любых несоответствиях.


    Кроме того, подсказки доступны разработчикам Python, которые могут написать инструменты,
    выполняющие не только проверку ошибок типов. В следующих разделах описывается,
    как пакет Pydantic был разработан для удовлетворения неочевидных потребностей.
    Позже вы увидите, как его интеграция с FastAPI значительно упрощает решение многих
    вопросов веб-разработки.


    Кстати, как выглядят подсказки? Существует один синтаксис для переменных и другой
    — для возвращаемых значений функций.


    Подсказки типа переменной могут включать только тип:


    ```

    name: type

    ```


    или также инициализировать переменную значением:


    ```

    name: type = value

    ```


    *Type* может быть одним из стандартных простых типов Python, таких как *int* или
    *str*, или коллекцией, такой как *tuple*, *list* или *dict*:


    ```

    thing: str = "yeti"

    ```


    ![](img/eacb50a37d89d355fa68de0c62d56b32_79_0.png)


    При использовании Python до версии 3.9 необходимо импортировать прописные версии
    стандартных имен типов из модуля типизации:


    ```

    from typing import Str

    thing: Str = "yeti"

    ```'
