  md: "# Шаблоны\n\nВозможно, вам знакома игра в слова *Mad Libs*. Игрокам дают последовательность\
    \ слов — существительных, глаголов или чего-то более конкретного, они вставляют\
    \ их в отмеченные места на странице текста. Вставив все слова, нужно прочитать\
    \ текст — и начинается веселье, иногда сопровождаемое неловкостью.\n\nВеб-шаблон\
    \ — это то же самое, но, как правило, без неловкости. Шаблон содержит кучу текста\
    \ со слотами для данных, вставляемых сервером. Его обычное назначение — генерировать\
    \ HTML с переменным содержимым, в отличие от *статического* HTML из главы 15.\n\
    \nПользователи Flask хорошо знакомы с его сопутствующим проектом — шаблонизатором\
    \ Jinja (https://jinja.palletsprojects.com) (его часто называют также *Jinja2*).\
    \ FastAPI поддерживает Jinja и другие шаблонизаторы.\n\nСоздайте каталог `template`\
    \ рядом с файлом `main.py` для размещения HTML-файлов с поддержкой Jinja. Внутри\
    \ создайте файл `list.html` (пример 16.6).\n\n**Пример 16.6.** Определение шаблона\
    \ файла (template/list.html)\n\n```\nhtml\n<html>\n  <table bgcolor=\"#eeeeee\"\
    >\n    <tr>\n      <th colspan=3>Creatures</th>\n    </tr>\n    <tr>\n      <th>Name</th>\n\
    \      <th>Description</th>\n      <th>Country</th>\n      <th>Area</th>\n   \
    \   <th>AKA</th>\n    </tr>\n    {% for creature in creatures: %}\n    <tr>\n\
    \      <td>{{ creature.name }}</td>\n      <td>{{ creature.description }}</td>\n\
    \      <td>{{ creature.country }}</td>\n      <td>{{ creature.area }}</td>\n \
    \     <td>{{ creature.aka }}</td>\n    </tr>\n    {% endfor %}\n  </table>\n\n\
    \  <br>\n```"
  merge: -1
  pgno: 243
- img_proc: true
  md: "```\n<table bgcolor=\"#dddddd\">\n  <tr>\n    <th colspan=2>Explorers</th>\n\
    \  </tr>\n  <tr>\n    <th>Name</th>\n    <th>Country</th>\n    <th>Description</th>\n\
    \  </tr>\n  {% for explorer in explorers: %}\n  <tr>\n    <td>{{ explorer.name\
    \ }}</td>\n    <td>{{ explorer.country }}</td>\n    <td>{{ explorer.description\
    \ }}</td>\n  </tr>\n  {% endfor %}\n</table>\n</html>\n```\n\nНеважно, как это\
    \ выглядит, поэтому здесь не используется формальный язык CSS, только древний,\
    \ существовавший еще до появления CSS, атрибут таблицы bgcolor, чтобы обеспечить\
    \ различия между двумя таблицами.\n\nПеременные Python, которые необходимо вставить,\
    \ заключены в двойные фигурные скобки, а в наборы символов {% и %} заключают операторы\
    \ if, циклы for и другие структуры управления. В документации Jinja (https://jinja.palletsprojects.com)\
    \ можно получить полную информацию по синтаксису и примерам.\n\nЭтот шаблон ожидает,\
    \ что ему будут переданы переменные Python creatures и explorers, представляющие\
    \ собой списки объектов Creature и Explorer.\n\nВ примере 16.7 показано, что нужно\
    \ добавить в файл main.py, чтобы установить шаблоны и использовать данные из примера\
    \ 16.6. Код подает переменные creatures и explorers в шаблон, применяя модули\
    \ в фиктивном каталоге из предыдущих глав — эта папка предоставляла тестовые данные,\
    \ если БД была пуста или не подключена.\n\n# Пример 16.7. Настройка шаблонов и\
    \ использование одного из них (main.py)\n\n```\nfrom pathlib import Path\nfrom\
    \ fastapi import FastAPI, Request\nfrom fastapi.templating import Jinja2Templates\n\
    \napp = FastAPI()\n\ntop = Path(__file__).resolve().parent\n```"
