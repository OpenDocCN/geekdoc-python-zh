    \ 282\n\n> В память о моих жене Мэри, родителях,\n> Билле и Тилли, и друге Риче.\
    \ Мне вас не хватает.\n\n## Предисловие\n\nПеред вами прагматичное введение в\
    \ FastAPI — современный веб-фреймворк на Python. Это история о том, как время\
    \ от времени встречающиеся нам яркие и блестящие предметы могут оказаться очень\
    \ полезными. Серебряная пуля не помешает, если вы столкнетесь с оборотнем. (А\
    \ в этой книге вы еще встретитесь с оборотнями.)\n\nЯ начал программировать научные\
    \ приложения в середине 1970-х годов. И после первого знакомства с Unix и C на\
    \ компьютере PDP-11 в 1977 году у меня появилось чувство, что Unix может укорениться.\n\
    \nВ 1980-х и начале 1990-х годов Интернет был еще некоммерческим, но уже служил\
    \ хорошим источником свободного программного обеспечения и технической информации.\
    \ И когда в 1993 году в зарождающемся открытом Интернете появился браузер Mosaic,\
    \ у меня возникло ощущение, что эта веб-возможность может прижиться.\n\nКогда\
    \ через несколько лет я открыл собственную компанию по веб-разработке, моими инструментами\
    \ были самые обычные на тот момент PHP, HTML и Perl. Несколько лет спустя, работая\
    \ по контракту, я наконец-то поэкспериментировал с Python и был удивлен тем, как\
    \ быстро смог получить доступ к данным, манипулировать ими и отображать их. В\
    \ свободное время за две недели я смог воспроизвести большую часть приложения\
    \ на языке C, на написание которого у четырех разработчиков ушел год. Теперь у\
    \ меня было ощущение, что история с Python — это хорошо.\n\nПосле этого большая\
    \ часть моей работы была связана с Python и его веб-фреймворками, в основном Flask\
    \ и Django. Мне особенно понравилась простота Flask, и я предпочитаю использовать\
    \ этот фреймворк для многих задач. А несколько лет назад я заметил нечто мелькнувшее\
    \ на периферии моего зрения — новый веб-фреймворк на Python под названием FastAPI,\
    \ написанный Себастьяном Рамиресом."
