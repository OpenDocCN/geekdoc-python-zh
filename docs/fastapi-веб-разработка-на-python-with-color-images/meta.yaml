    ,\n...     \"Himalayas\",\n...     \"Hirsute Himalayan\",\n...     \"Abominable\
    \ Snowman\")\n>>> print(\"Name is\", dataclass_thing.name)\nName is yeti\n```\n\
    \n这对于将变量组合在一起的描述部分非常有用。但我们需要更多功能，因此让我们向圣诞老人请求以下特性：\n\n- 合并可能的替代类型；\n- 处理缺失/额外的值；\n\
    - 提供默认值；\n- 数据验证；\n- 序列化为 JSON 等格式，以及从这些格式反序列化。\n\n## 替代方案\n\n使用 Python 内置的数据结构，特别是字典，是非常诱人的。但你不可避免地会发现字典过于自由。而自由是有代价的。你需要检查*所有*内容。\n\
    \n- 键是可选的吗？\n- 如果键缺失，是否有默认值？\n- 键是否存在？\n- 如果存在，键的值是否属于正确的类型？\n- 如果是，值是否在正确的范围内或符合预期的模式？\n\
    \n至少有三种解决方案能满足部分这些要求：\n\n- *Dataclasses* (https://oreil.ly/mxANA) — Python 标准语言的一部分；\n\
    - *attrs* (https://www.attrs.org) — 第三方包，但提供了数据类的超集；\n- *Pydantic* (https://docs.pydantic.dev)\
    \ — 同样是第三方产品，但已集成到 FastAPI 中，因此如果你已经在使用 FastAPI，选择它会很容易。而如果你正在阅读这本书，那么很可能你确实在使用\
    \ FastAPI。\n\n你可以在 YouTube 上找到对这三种方案的便捷比较 (https://oreil.ly/pkQD3)。其中一个结论是 Pydantic\
    \ 在验证方面表现出色，并且它与 FastAPI 的集成有助于发现数据中的许多潜在错误。另一方面，Pydantic 依赖于继承（继承自 BaseModel\
    \ 类），而另外两个则使用 Python 装饰器来定义它们的对象。这更多是风格问题。\n\n在另一个比较中 (https://oreil.ly/gU28a)，Pydantic\
    \ 超越了更旧的验证包，如 marshmallow (https://marshmallow.readthedocs.io) 和一个名字引人入胜的库 Voluptuous¹\
    \ (https://github.com/alecthomas/voluptuous)。Pydantic 的另一个巨大优势是它使用了标准的 Python\
    \ 类型提示语法——更旧的库不使用类型提示，而是创建自己的语法。\n\n在本书中，我选择了 Pydantic，但如果你不使用 FastAPI，你也可以找到其他替代方案的应用场景。\n\
    \nPydantic 提供了定义以下任意组合验证的能力：\n\n- 必需和可选字段；\n- 如果未提供但必需时的默认值；\n- 预期的数据类型或多种类型；\n\
    - 值范围的限制；\n- 必要时基于函数的其他验证；\n- 序列化和反序列化。\n\n> ¹ Voluptuous（英语）——“感官的”。——译者注。\n\n\
    ## 简单示例\n\n你已经见过如何通过 URL、请求参数或 HTTP 请求体将简单的字符串传递给 Web 应用程序的端点。问题在于，通常你请求和接收的是不同类型的成组数据。这正是\
    \ Pydantic 模型在 FastAPI 中首次登场的地方。在初始示例中，将使用三个文件：\n\n- model.py — 定义 Pydantic 模型；\n\
    - data.py — 定义模型实例的模拟数据源；\n- web.py — 定义返回模拟数据的 FastAPI Web 应用程序端点。\n\n为简单起见，在本章中，我们将所有文件保存在一个目录中。在后续讨论更大规模网站的章节中，我们将把它们分到相应的层级。首先，让我们在示例\
    \ 5.8 中定义生物模型。\n\n**示例 5.8.** 定义生物模型：model.py\n\n```python\nfrom pydantic import\
    \ BaseModel\n\nclass Creature(BaseModel):\n    name: str\n    country: str\n \
    \   area: str\n    description: str\n    aka: str\n\nthing = Creature(\n    name=\"\
    yeti\",\n    country=\"CN\",\n    area=\"Himalayas\",\n    description=\"Hirsute\
    \ Himalayan\",\n    aka=\"Abominable Snowman\")\nprint(\"Name is\", thing.name)\n\
    ```\n\nCreature 类继承自 Pydantic 的 BaseModel 类。在 `name`、`country`、`area`、`description`\
    \ 和 `aka` 之后的 `: str` 部分是类型提示——每个值都属于 Python 的字符串数据类型。\n\n> 在此示例中，所有字段都是必填的。在\
    \ Pydantic 中，如果类型描述中没有 `Optional` 这个词，则该字段必须包含一个值。\n\n在示例 5.9 中，只要你指定了参数名，参数可以按任意顺序传递。\n\
    \n### 示例 5.9. 创建生物\n\n```python\n>>> thing = Creature(\n...     name=\"yeti\"\
    ,\n...     country=\"CN\",\n...     area=\"Himalayas\",\n...     description=\"\
    Hirsute Himalayan\",\n...     aka=\"Abominable Snowman\")\n>>> print(\"Name is\"\
    , thing.name)\nName is yeti\n```\n\n目前，在示例 5.10 中定义了一个小型数据源。在后续章节中，这将由数据库来处理。类型提示\
    \ `list[Creature]` 告诉 Python，这是一个仅包含 `Creature` 对象的列表。\n\n### 示例 5.10. 在 data.py\
    \ 文件中定义模拟数据\n\n```python\nfrom model import Creature\n\n_creatures: list[Creature]\
    \ = [\n    Creature(name=\"yeti\",\n        country=\"CN\",\n        area=\"Himalayas\"\
    ,\n        description=\"Hirsute Himalayan\",\n        aka=\"Abominable Snowman\"\
    \n        ),\n    Creature(name=\"sasquatch\",\n        country=\"US\",\n    \
    \    area=\"*\",\n        description=\"Yeti's Cousin Eddie\",\n        aka=\"\
    Bigfoot\")\n]\n\ndef get_creatures() -> list[Creature]:\n    return _creatures\n\
    ```\n\n（我们为 Bigfoot 对象的 `area` 参数使用了 `*` 符号，因为它可能生活在几乎任何地方。）\n\n这段代码导入了我们之前编写的\
    \ `model.py` 文件。它通过将 `Creature` 对象列表命名为 `_creatures` 并提供 `get_creatures()` 函数来返回它们，从而对数据进行了一定程度的封装。\n\
    \n示例 5.11 展示了定义 FastAPI Web 应用程序端点的 `web.py` 文件。\n\n### 示例 5.11. 定义 FastAPI Web\
    \ 应用程序端点：web.py\n\n```python\nfrom model import Creature\nfrom fastapi import\
    \ FastAPI\n\napp = FastAPI()\n\n@app.get(\"/creature\")\ndef get_all() -> list[Creature]:\n\
    \    from data import get_creatures\n    return get_creatures()\n```\n\n现在，在示例\
    \ 5.12 中启动这个只有一个端点的服务器。\n\n### 示例 5.12. 启动 Uvicorn\n\n```bash\n$ uvicorn creature:app\n\
    INFO:     Started server process [24782]\nINFO:     Waiting for application startup.\n\
    INFO:     Application startup complete.\nINFO:     Uvicorn running on http://127.0.0.1:8000\
    \ (Press CTRL+C to quit)\n```\n\n在另一个窗口中，示例 5.13 使用 HTTPie Web 客户端访问该 Web 应用程序（你可以根据需要尝试使用自己的浏览器或\
    \ Requests 模块）。\n\n### 示例 5.13. 使用 HTTPie 进行测试\n\n```bash\n$ http http://localhost:8000/creature\n\
    HTTP/1.1 200 OK\ncontent-length: 183\ncontent-type: application/json\ndate: Mon,\
    \ 12 Sep 2022 02:21:15 GMT\nserver: uvicorn\n[\n    {\n        \"aka\": \"Abominable\
    \ Snowman\",\n        \"area\": \"Himalayas\",\n        \"country\": \"CN\",\n\
    \        \"name\": \"yeti\",\n        \"description\": \"Hirsute Himalayan\"\n\
    \    },\n    {\n        \"aka\": \"Bigfoot\",\n        \"country\": \"US\",\n\
    \        \"area\": \"*\",\n        \"name\": \"sasquatch\",\n        \"description\"\
    : \"Yeti's Cousin Eddie\"\n    }\n]\n```\n\nFastAPI 和 Starlette 会自动将原始的 `Creature`\
    \ 模型对象列表转换为 JSON 字符串。这是 FastAPI 的默认输出格式，因此我们不需要显式指定。\n\n此外，在你最初启动 Uvicorn Web\
    \ 服务器的窗口中，应该会输出一行日志：\n\n```\nINFO: 127.0.0.1:52375 - \"GET /creature HTTP/1.1\"\
    \ 200 OK\n```\n\n## 类型检查\n\n上一节展示了如何完成以下操作：\n\n- 将类型提示应用于变量和函数；\n- 定义和使用 Pydantic\
    \ 模型；\n- 从数据源返回模型列表；\n- 将模型列表返回给 Web 客户端，并自动将其转换为 JSON。\n\n现在，让我们真正应用这个计划来验证数据。\n\
    \n尝试为 `Creature` 对象的一个或多个字段分配错误类型的值。为此，我们将使用一个独立的测试（Pydantic 不应用于任何 Web 代码，它只与数据相关）。\n\
    \n示例 5.14 展示了 `test1.py` 文件的内容。\n\n**示例 5.14.** 测试 Creature 模型\n\n```python\n\
    from model import Creature\n\ndragon = Creature(\n    name=\"dragon\",\n    description=[\"\
    incorrect\", \"string\", \"list\"],\n    country=\"*\",\n    area=\"*\",\n   \
    \ aka=\"firedrake\")\n```\n\n现在尝试执行示例 5.15 中的测试。\n\n它表明我们为 `description` 字段分配了一个字符串列表，而它需要的是一个普通的字符串。"
