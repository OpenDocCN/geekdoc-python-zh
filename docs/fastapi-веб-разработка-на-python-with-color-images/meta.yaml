    \ в форматы, такие как JSON, и из них.\n\n## Альтернативы\n\nОчень заманчиво использовать\
    \ встроенные структуры данных Python, особенно словари. Но вы неизбежно обнаружите,\
    \ что словари слишком свободны. А за свободу приходится платить. Вам нужно будет\
    \ проверить *абсолютно все*.\n\n- Ключ необязателен?\n- Если ключ отсутствует,\
    \ есть ли значение по умолчанию?\n- Существует ли ключ?\n- Если да, то относится\
    \ ли значение ключа к правильному типу?\n- Если да, то находится ли значение в\
    \ нужном диапазоне или соответствует ли оно шаблону?\n\nПо крайней мере три решения\
    \ отвечают хотя бы некоторым из этих требований:\n\n- *Dataclasses* (https://oreil.ly/mxANA)\
    \ — часть стандартного языка Python;\n- *attrs* (https://www.attrs.org) — сторонний\
    \ пакет, но содержит супернабор классов данных;\n- *Pydantic* (https://docs.pydantic.dev)\
    \ — тоже сторонний продукт, но интегрированный в FastAPI, поэтому его легко выбрать,\
    \ если вы уже используете FastAPI. И если вы читаете эту книгу, то вполне вероятно,\
    \ что это именно так.\n\nУдобное сравнение этих трех вариантов можно посмотреть\
    \ на YouTube (https://oreil.ly/pkQD3). Одним из выводов является то, что Pydantic\
    \ выделяется при проверке, а его интеграция с FastAPI позволяет выявить множество\
    \ потенциальных ошибок в данных. Другое дело, что Pydantic полагается на наследование\
    \ (от класса BaseModel), а два других используют декораторы Python для определения\
    \ своих объектов. Это скорее вопрос стиля.\n\nВ другом сравнении (https://oreil.ly/gU28a)\
    \ Pydantic превзошел более старые пакеты проверки, такие как marshmallow (https://marshmallow.readthedocs.io)\
    \ и библиотека с интригующим названием Voluptuous¹ (https://github.com/alecthomas/voluptuous).\
    \ Еще один большой плюс Pydantic в том, что он использует стандартный синтаксис\
    \ подсказок типов Python — более старые библиотеки не применяли подсказки типов\
    \ и создавали собственные.\n\nВ книге я остановился на Pydantic, но вы можете\
    \ найти применение любой из альтернатив, если не используете FastAPI.\n\nPydantic\
    \ предоставляет возможность задать любую комбинацию следующих проверок:\n\n- обязательные\
    \ и необязательные;\n- значение по умолчанию, если не указано, но требуется;\n\
    - ожидаемый тип или типы данных;\n- ограничения диапазона значений;\n- другие\
    \ проверки на основе функций, если необходимо;\n- сериализацию и десериализацию.\n\
    \n> ¹ Voluptuous (англ.) — «чувственный». — Примеч. пер.\n\n## Простой пример\n\
    \nВы уже видели, как передать простую строку в конечную точку веб-приложения через\
    \ URL, параметр запроса или тело HTTP-запроса. Проблема в том, что обычно вы запрашиваете\
    \ и получаете группы данных разных типов. Именно здесь в FastAPI впервые появляются\
    \ модели Pydantic. В начальном примере будут использоваться три файла:\n\n- model.py\
    \ — определяет модель Pydantic;\n- data.py — источник фиктивных данных, определяющих\
    \ экземпляр модели;\n- web.py — определяет конечную точку веб-приложения FastAPI,\
    \ возвращающую фиктивные данные.\n\nДля простоты в этой главе сохраним все файлы\
