    \ cookie-файлов и т. д. Можете написать собственные функции зависимости, которые\
    \ будут обрабатывать и объединять их особым образом, например, для пагинации или\
    \ аутентификации. Некоторые из них вы увидите в главе 6 и различных главах части\
    \ III.\n\n## Какой метод лучше?\n\nВот несколько рекомендаций, которые могут помочь\
    \ сделать правильный выбор.\n\n- При передаче аргументов в URL стандартной практикой\
    \ стало следование рекомендациям RESTful.\n- Строки запросов обычно применяются\
    \ для предоставления дополнительных аргументов, таких как пагинация.\n- Тело запроса\
    \ обычно используется для больших объемов вводимых данных, например целых или\
    \ частичных моделей.\n\nВо всех случаях, если вы предоставите подсказки типов\
    \ в определениях данных, ваши аргументы будут автоматически проверены библиотекой\
    \ Pydantic. Это гарантирует их наличие и правильность.\n\n## HTTP-ответы\n\nПо\
    \ умолчанию FastAPI преобразует все, что вы возвращаете из своей функции конечной\
    \ точки, в формат JSON. HTTP-ответ содержит строку заголовка Content-type: application/json.\
    \ Поэтому, несмотря на то что функция greet() первоначально возвращает строку\
    \ \"Hello? World?\", FastAPI преобразует ее в формат JSON. Это одно из значений\
    \ по умолчанию, выбранных FastAPI для упрощения разработки API.\n\nВ этом случае\
    \ строка Python \"Hello? World?\" будет преобразована в свой эквивалент строки\
    \ в формате JSON \"Hello? World?\", который представляет собой ту же самую строку.\
    \ Но все, что вы возвращаете, преобразуется в формат JSON, будь то встроенные\
    \ типы Python или модели Pydantic.\n\n## Код состояния\n\nПо умолчанию FastAPI\
    \ возвращает код состояния 200. Исключения вызывают коды группы 4xx.\n\nВ декораторе\
    \ пути необходимо указать возвращаемый в случае успеха код состояния HTTP (исключения\
    \ будут генерировать собственные коды и переопределять это значение). Добавьте\
    \ код из примера 3.28 куда-нибудь в свой файл hello.py (чтобы не показывать весь\
    \ файл снова и снова) и проверьте его в примере 3.29.\n\n**Пример 3.28.** Указание\
    \ кода состояния HTTP (добавьте в файл hello.py)\n\n```python\n@app.get(\"/happy\"\
    )\ndef happy(status_code=200):\n    return \":)\"\n```\n\n**Пример 3.29.** Указание\
    \ кода состояния HTTP\n\n```bash\n$ http localhost:8000/happy\nHTTP/1.1 200 OK\n\
    content-length: 4\ncontent-type: application/json\ndate: Sun, 05 Feb 2023 04:37:32\
    \ GMT\nserver: uvicorn\n\n\":)\"\n```\n\n## Заголовки\n\nМожно вводить заголовки\
    \ HTTP-ответов, как в примере 3.30 (вам не нужно возвращать сообщения response).\n\
    \n**Пример 3.30.** Установка HTTP-заголовков (добавьте в файл hello.py)\n\n```python\n\
    from fastapi import Response\n\n@app.get(\"/header/{name}/{value}\")\ndef header(name:\
    \ str, value: str, response:Response):\n    response.headers[name] = value\n \
    \   return \"normal body\"\n```\n\nПосмотрим, получилось ли (пример 3.31).\n\n\
    **Пример 3.31.** Проверка HTTP-заголовков ответа\n\n```bash\n$ http localhost:8000/header/marco/polo\n\
    HTTP/1.1 200 OK\ncontent-length: 13\ncontent-type: application/json\ndate: Wed,\
    \ 31 May 2023 17:47:38 GMT\nmarco: polo\nserver: uvicorn\n\n\"normal body\"\n\
    ```\n\n## Типы ответов\n\nТипы ответов (импортируйте эти классы из модуля fastapi.responses)\
    \ бывают следующие:\n\n- JSONResponse (по умолчанию);\n- HTMLResponse;\n- PlainTextResponse;\n\
    - RedirectResponse;\n- FileResponse;\n- StreamingResponse.\n\nО двух последних\
    \ я расскажу подробнее в главе 15.\n\nДля других форматов вывода, известных также\
    \ как *MIME-типы* или *медиатипы*, можно использовать общий класс `Response`,\
    \ требующий следующие сущности:\n\n- `content` — строка или байт;\n- `media_type`\
    \ — строка MIME-типа;\n- `status_code` — целочисленный код состояния HTTP;\n-\
    \ `headers` — словарь (dict) строк.\n\n## Преобразование типов\n\nФункция пути\
    \ может возвращать что угодно, и по умолчанию (используя `JSONResponse`) FastAPI\
    \ преобразует ее в строку JSON и возвращает с соответствующими заголовками HTTP-ответа\
    \ `Content-Length` и `Content-Type`. Сюда входит любой класс модели Pydantic.\n\
    \nНо как это происходит? Если вы пользовались библиотекой Python JSON, то наверняка\
    \ видели, что она вызывает исключение при предоставлении некоторых типов данных,\
    \ таких как `datetime`. FastAPI задействует встроенную функцию `jsonable_encoder()`\
    \ для преобразования любой структуры данных в JSON-подобную структуру данных Python,\
    \ а затем вызывает обычную функцию `json.dumps()` для превращения этой структуры\
    \ в JSON-строку. В примере 3.32 показан тест, выполняемый с помощью фреймворка\
    \ pytest.\n\n**Пример 3.32.** Используйте функцию `jsonable_encoder()`, чтобы\
    \ избежать касусов в JSON\n\n```python\nimport datetime\nimport pytest\nfrom fastapi.encoders\
    \ import jsonable_encoder\nimport json\n\n@pytest.fixture\ndef data():\n    return\
    \ datetime.datetime.now()\n\ndef test_json_dump(data):\n    with pytest.raises(Exception):\n\
    \        _ = json.dumps(data)\n\ndef test_encoder(data):\n    out = jsonable_encoder(data)\n\
    \    assert out\n    json_out = json.dumps(out)\n    assert json_out\n```\n\n\
    ## Типы моделей и response_model\n\nВ программе могут быть разные классы с одинаковыми\
    \ полями, но один из них будет специализирован для ввода данных пользователем,\
    \ другой — для вывода, а третий — для внутреннего применения. Причины возникновения\
    \ таких вариантов могут быть следующими.\n\n- Удаление из выходных данных некоторой\
    \ конфиденциальной информации — например, деидентификация личных медицинских данных,\
    \ если вы столкнулись с требованиями закона о мобильности и подотчетности медицинского\
    \ страхования (Health Insurance Portability and Accountability Act, HIPAA).\n\
    - Добавление поля для ввода пользователем, например даты и времени создания.\n\
    \nВ примере 3.33 показаны три связанных класса для нестандартного случая.\n\n\
    - TagIn — это класс, определяющий, что должен предоставить пользователь (в данном\
    \ случае просто строку под названием tag).\n- Tag создается из класса TagIn и\
    \ добавляет два поля: created (когда объект Tag был создан) и secret (внутренняя\
    \ строка, которая может храниться в базе данных, но никогда не должна оказаться\
    \ в широком доступе).\n- TagOut — это класс, определяющий, что может быть возвращено\
    \ пользователю (конечная точка определенного или неопределенного поиска). Он содержит\
    \ поле tag из исходного объекта TagIn и производный от него объект Tag, а также\
    \ поле created, созданное для объекта Tag, но не содержит поля secret.\n\n**Пример\
    \ 3.33.** Варианты моделей (model/tag.py)\n\n```python\nfrom datetime import datetime\n\
    from pydantic import BaseClass\n\nclass TagIn(BaseClass):\n    tag: str\n\nclass\
    \ Tag(BaseClass):\n    tag: str\n    created: datetime\n    secret: str\n\nclass\
    \ TagOut(BaseClass):\n    tag: str\n    created: datetime\n```\n\nИз функции пути\
    \ FastAPI можно возвращать типы данных, отличные от стандартного JSON, разными\
    \ способами. Один из них — использовать аргумент `response_model` в декораторе\
    \ пути, чтобы указать FastAPI вернуть что-то другое. FastAPI отбросит все поля\
    \ возвращаемого объекта, не указанные в определенном аргументом `response_model`\
    \ объекте.\n\nПредставьте, что в примере 3.34 вы написали новый сервисный модуль\
    \ `service/tag.py` с функциями `create()` и `get()`, которые дают этому веб-модулю\
    \ возможность вызывать что-то. Эти детали нижнего уровня здесь не имеют значения.\
    \ Важными моментами являются функция пути `get_one()` в нижней части и выражение\
    \ `response_model=TagOut` в декораторе пути. Это автоматически заменяет внутренний\
    \ объект `Tag` очищенным объектом `TagOut`.\n\n**Пример 3.34.** Возврат другого\
    \ типа ответа с помощью аргумента response_model (web/tag.py)\n\n```python\nimport\
    \ datetime\nfrom model.tag import TagIn, Tag, TagOut\nimport service.tag as service\n\
    \n@app.post('/')\ndef create(tag_in: TagIn) -> TagIn:\n    tag: Tag = Tag(tag=tag_in.tag,\
    \ created=datetime.utcnow(),\n        secret=\"shhhh\")\n    service.create(tag)\n\
    \    return tag_in\n\n@app.get('/{tag_str}', response_model=TagOut)\ndef get_one(tag_str:\
    \ str) -> TagOut:\n    tag: Tag = service.get(tag_str)\n    return tag\n```\n\n\
    Несмотря на то что мы вернули объект `Tag`, `response_model` преобразует его в\
    \ `TagOut`."
  mdcn: "## 示例 3.26. 返回 User-Agent 头信息 (hello.py)\n\n```python\nfrom fastapi import\
    \ FastAPI, Header\n\napp = FastAPI()\n\n@app.post(\"/agent\")\ndef get_agent(user_agent:str\
    \ = Header()):\n    return user_agent\n```\n\n## 示例 3.27. 使用 HTTPie 返回 User-Agent\
    \ 头信息\n\n```bash\n$ http -v localhost:8000/agent\nGET /agent HTTP/1.1\nAccept:\
    \ */*\nAccept-Encoding: gzip, deflate\nConnection: keep-alive\nHost: localhost:8000\n\
    User-Agent: HTTPie/3.2.1\n\nHTTP/1.1 200 OK\ncontent-length: 14\ncontent-type:\
    \ application/json\ndate: Mon, 16 Jan 2023 05:21:35 GMT\nserver: uvicorn\n\n\"\
    HTTPie/3.2.1\"\n```\n\n## 多请求数据\n\n在一个路径函数中，可以使用多个上述方法。也就是说，你可以从 URL、查询参数、HTTP\
    \ 请求体、HTTP 头信息、cookie 文件等处获取数据。你可以编写自己的依赖函数，以特定方式处理和组合它们，例如用于分页或身份验证。其中一些内容你将在第\
    \ 6 章和第三部分的各章中看到。\n\n## 哪种方法更好？\n\n以下是一些可能有助于做出正确选择的建议。\n\n- 在 URL 中传递参数时，遵循 RESTful\
    \ 准则已成为标准做法。\n- 查询字符串通常用于提供额外的参数，例如分页。\n- 请求体通常用于处理大量输入数据，例如完整的或部分的模型。\n\n在所有情况下，如果你在数据定义中提供了类型提示，你的参数将由\
    \ Pydantic 库自动验证。这确保了它们的存在性和正确性。\n\n## HTTP 响应\n\n默认情况下，FastAPI 会将你从端点函数返回的所有内容转换为\
    \ JSON 格式。HTTP 响应包含 `Content-type: application/json` 的头信息行。因此，尽管 `greet()` 函数最初返回的是字符串\
    \ \"Hello? World?\"，FastAPI 会将其转换为 JSON 格式。这是 FastAPI 为简化 API 开发而选择的默认设置之一。\n\n\
    在这种情况下，Python 字符串 \"Hello? World?\" 将被转换为其 JSON 格式的等效字符串 \"Hello? World?\"，它代表相同的字符串。但无论你返回什么，都会被转换为\
    \ JSON 格式，无论是 Python 的内置类型还是 Pydantic 模型。\n\n## 状态码\n\n默认情况下，FastAPI 返回状态码 200。异常会引发\
    \ 4xx 系列的状态码。\n\n在路径装饰器中，你需要指定成功时返回的 HTTP 状态码（异常将生成自己的状态码并覆盖此值）。将示例 3.28 中的代码添加到你的\
    \ `hello.py` 文件中的某个位置（以避免反复显示整个文件），并在示例 3.29 中进行测试。\n\n**示例 3.28.** 指定 HTTP 状态码（添加到\
    \ hello.py 文件）\n\n```python\n@app.get(\"/happy\")\ndef happy(status_code=200):\n\
    \    return \":)\"\n```\n\n**示例 3.29.** 指定 HTTP 状态码\n\n```bash\n$ http localhost:8000/happy\n\
    HTTP/1.1 200 OK\ncontent-length: 4\ncontent-type: application/json\ndate: Sun,\
    \ 05 Feb 2023 04:37:32 GMT\nserver: uvicorn\n\n\":)\"\n```\n\n## 头信息\n\n可以设置 HTTP\
    \ 响应头，如示例 3.30 所示（你不需要返回 `response` 对象）。\n\n**示例 3.30.** 设置 HTTP 头信息（添加到 hello.py\
    \ 文件）\n\n```python\nfrom fastapi import Response\n\n@app.get(\"/header/{name}/{value}\"\
    )\ndef header(name: str, value: str, response:Response):\n    response.headers[name]\
    \ = value\n    return \"normal body\"\n```\n\n让我们看看是否成功（示例 3.31）。\n\n**示例 3.31.**\
    \ 检查 HTTP 响应头\n\n```bash\n$ http localhost:8000/header/marco/polo\nHTTP/1.1 200\
    \ OK\ncontent-length: 13\ncontent-type: application/json\ndate: Wed, 31 May 2023\
    \ 17:47:38 GMT\nmarco: polo\nserver: uvicorn\n\n\"normal body\"\n```\n\n## 响应类型\n\
    \n响应类型（从 `fastapi.responses` 模块导入这些类）有以下几种：\n\n- `JSONResponse`（默认）；\n- `HTMLResponse`；\n\
    - `PlainTextResponse`；\n- `RedirectResponse`；\n- `FileResponse`；\n- `StreamingResponse`。\n\
    \n关于最后两种，我将在第 15 章中详细介绍。\n\n对于其他输出格式，也称为 *MIME 类型* 或 *媒体类型*，可以使用通用的 `Response`\
    \ 类，它需要以下实体：\n\n- `content` — 字符串或字节；\n- `media_type` — MIME 类型字符串；\n- `status_code`\
    \ — 整数 HTTP 状态码；\n- `headers` — 字符串字典（dict）。\n\n## 类型转换\n\n路径函数可以返回任何内容，默认情况下（使用\
    \ `JSONResponse`），FastAPI 会将其转换为 JSON 字符串，并返回带有相应 HTTP 响应头 `Content-Length` 和\
    \ `Content-Type` 的响应。这包括任何 Pydantic 模型类。\n\n但这是如何实现的呢？如果你使用过 Python 的 JSON 库，你肯定见过它在提供某些数据类型（如\
    \ `datetime`）时会引发异常。FastAPI 使用内置函数 `jsonable_encoder()` 将任何数据结构转换为类似 JSON 的 Python\
    \ 数据结构，然后调用普通的 `json.dumps()` 函数将该结构转换为 JSON 字符串。示例 3.32 展示了使用 pytest 框架执行的测试。\n\
    \n**示例 3.32.** 使用 `jsonable_encoder()` 函数避免 JSON 中的异常\n\n```python\nimport datetime\n\
    import pytest\nfrom fastapi.encoders import jsonable_encoder\nimport json\n\n\
    @pytest.fixture\ndef data():\n    return datetime.datetime.now()\n\ndef test_json_dump(data):\n\
    \    with pytest.raises(Exception):\n        _ = json.dumps(data)\n\ndef test_encoder(data):\n\
    \    out = jsonable_encoder(data)\n    assert out\n    json_out = json.dumps(out)\n\
    \    assert json_out\n```\n\n## 模型类型和 response_model\n\n程序中可能存在具有相同字段的不同类，但其中一个专门用于用户输入，另一个用于输出，第三个用于内部应用。出现这些变体的原因可能如下。\n\
    \n- 从输出数据中删除某些机密信息——例如，如果你遇到《健康保险流通与责任法案》（HIPAA）的要求，需要对个人医疗数据进行去标识化处理。\n- 添加用于用户输入的字段，例如创建日期和时间。\n\
    \n示例 3.33 展示了针对非标准情况的三个相关类。\n\n- `TagIn` 是一个定义用户应提供什么的类（在这种情况下，只是一个名为 `tag` 的字符串）。\n\
    - `Tag` 是从 `TagIn` 类创建的，并添加了两个字段：`created`（Tag 对象创建的时间）和 `secret`（一个内部字符串，可以存储在数据库中，但绝不应公开）。\n\
    - `TagOut` 是一个定义可以返回给用户的内容的类（特定或未定义搜索的端点）。它包含来自原始 `TagIn` 对象及其派生的 `Tag` 对象的 `tag`\
    \ 字段，以及为 `Tag` 对象创建的 `created` 字段，但不包含 `secret` 字段。\n\n**示例 3.33.** 模型变体 (model/tag.py)\n\
    \n```python\nfrom datetime import datetime\nfrom pydantic import BaseClass\n\n\
    class TagIn(BaseClass):\n    tag: str\n\nclass Tag(BaseClass):\n    tag: str\n\
    \    created: datetime\n    secret: str\n\nclass TagOut(BaseClass):\n    tag:\
    \ str\n    created: datetime\n```\n\n从路径函数中，FastAPI 可以通过多种方式返回不同于标准 JSON 的数据类型。一种方法是在路径装饰器中使用\
    \ `response_model` 参数，以指定 FastAPI 返回其他内容。FastAPI 会丢弃返回对象中未在 `response_model` 参数指定的对象中定义的所有字段。\n\
    \n假设在示例 3.34 中，你编写了一个新的服务模块 `service/tag.py`，其中包含 `create()` 和 `get()` 函数，使此 Web\
    \ 模块能够调用某些功能。这些底层细节在这里并不重要。重要的部分是底部的路径函数 `get_one()` 和路径装饰器中的表达式 `response_model=TagOut`。这会自动将内部\
    \ `Tag` 对象替换为清理后的 `TagOut` 对象。\n\n**示例 3.34.** 使用 response_model 参数返回不同的响应类型 (web/tag.py)\n\
    \n```python\nimport datetime\nfrom model.tag import TagIn, Tag, TagOut\nimport\
    \ service.tag as service\n\n@app.post('/')\ndef create(tag_in: TagIn) -> TagIn:\n\
    \    tag: Tag = Tag(tag=tag_in.tag, created=datetime.utcnow(),\n        secret=\"\
    shhhh\")\n    service.create(tag)\n    return tag_in\n\n@app.get('/{tag_str}',\
    \ response_model=TagOut)\ndef get_one(tag_str: str) -> TagOut:\n    tag: Tag =\
    \ service.get(tag_str)\n    return tag\n```\n\n尽管我们返回了 `Tag` 对象，但 `response_model`\
    \ 将其转换为 `TagOut`。"
