  - '[PAGE 166]


    Ответы на эти вопросы требуют аутентификации конкретных посетителей. В противном
    случае вы можете получить только общее количество значений по всем показателям.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_166_0.png)


    Если ваш сайт требует аутентификации или авторизации, доступ к нему должен быть
    зашифрован (с использованием HTTPS вместо HTTP), чтобы злоумышленники не смогли
    извлечь секретные данные из обычного текста. Подробные сведения о настройке HTTPS
    см. в главе 13.


    # Методы аутентификации


    Существует множество методов и инструментов веб-аутентификации:


    +   - *имя пользователя/электронная почта и пароль* — применение классических
    HTTP Basic и дайджест-аутентификаций;

    - *ключ API* — неясная длинная строка с сопутствующим секретом;

    - *OAuth2* — набор стандартов для аутентификации и авторизации;

    - *веб-токены JavaScript* (JavaScript Web Tokens, JWT) — формат кодирования, содержащий
    криптографически подписанную информацию о пользователе.


    В этом разделе я рассмотрю первые два метода и покажу их традиционную реализацию.
    Но остановлюсь перед тем, как заполнить код API и базы данных. Вместо этого мы
    полностью реализуем более современную схему с OAuth2 и JWT.


    # Глобальная аутентификация — секретный ключ или общий секрет (Shared Secret)


    Самый простой метод аутентификации заключается в передаче секрета, который обычно
    известен только веб-серверу. Если он совпадает, доступ открывается. Это небезопасно,
    если ваш сайт API открыт для общего доступа по протоколу HTTP, а не HTTPS. Если
    он скрыт за открытым фронтенд-сайтом, фронтенд- и бэкенд-части системы могут взаимодействовать,
    используя общий постоянный секрет. Но если фронтенд-сайт взломают, всем конец.
    Давайте посмотрим, как FastAPI обрабатывает простую аутентификацию.


    Создайте новый файл верхнего уровня под названием `auth.py`. Убедитесь, что у
    вас нет другого сервера FastAPI, запущенного из одного из постоянно'
  - "[PAGE 167]\n\nменяющихся файлов main.py из предыдущих глав. В примере 11.1 реализован\
    \ сервер, просто возвращающий все записи username и password, отправленные ему\
    \ с помощью HTTP Basic Authentication — метода из первых дней существования Интернета.\n\
    \n# Пример 11.1. Применение HTTP Basic Auth для получения информации о пользователе:\
