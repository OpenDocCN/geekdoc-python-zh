    # Пример 5.6. Использование стандартного класса


    ```

    >>> class CreatureClass():

    ...     def __init__(self,

    ...         name: str,

    ...         country: str,

    ...         area: str,

    ...         description: str,

    ...         aka: str):

    ...         self.name = name

    ...         self.country = country

    ...         self.area = area

    ...         self.description = description

    ...         self.aka = aka

    ...

    >>> class_thing = CreatureClass(

    ...     "yeti",

    ...     "CN",

    ...     "Himalayas",

    ...     "Hirsute Himalayan",

    ...     "Abominable Snowman")

    >>> print("Name is", class_thing.name)

    Name is yeti

    ```


    Вы можете подумать: что в этом плохого? В обычном классе можно добавить больше
    данных (атрибутов), но особенно много поведения (методов). В один безумный день
    вы можете решить добавить метод для поиска любимых песен исследователя. (Это нельзя
    применить к существам¹.) Но в данном случае речь идет о том, чтобы просто без
    помех перемещать сборки данных между уровнями и проверять их на входе и выходе.
    Кроме того, методы — это квадратные детали, которые с трудом помещаются в круглые
    отверстия базы данных.


    Есть ли в Python что-то похожее на то, что в других компьютерных языках называется
    *записью* (record) или *структурой* (struct) (группа имен и значений)? Недавно
    в Python появился класс для хранения данных (dataclass). В примере 5.7 показано,
    как все эти self-выражения исчезают при использовании классов данных.


    > ¹ За исключением небольшой группы йодлингующих йети (хорошее название для группы).'
