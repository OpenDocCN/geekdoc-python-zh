    \ использовать аргумент `response_model` в декораторе пути, чтобы указать FastAPI\
    \ вернуть что-то другое. FastAPI отбросит все поля возвращаемого объекта, не указанные\
    \ в определенном аргументом `response_model` объекте.\n\nПредставьте, что в примере\
    \ 3.34 вы написали новый сервисный модуль `service/tag.py` с функциями `create()`\
    \ и `get()`, которые дают этому веб-модулю возможность вызывать что-то. Эти детали\
    \ нижнего уровня здесь не имеют значения. Важными моментами являются функция пути\
    \ `get_one()` в нижней части и выражение `response_model=TagOut` в декораторе\
    \ пути. Это автоматически заменяет внутренний объект `Tag` очищенным объектом\
    \ `TagOut`.\n\n# Пример 3.34. Возврат другого типа ответа с помощью аргумента\
    \ response_model (web/tag.py)\n\n```\nimport datetime\nfrom model.tag import TagIn,\
    \ Tag, TagOut\nimport service.tag as service\n\n@app.post('/')\ndef create(tag_in:\
    \ TagIn) -> TagIn:\n    tag: Tag = Tag(tag=tag_in.tag, created=datetime.utcnow(),\n\
    \        secret=\"shhhh\")\n    service.create(tag)\n    return tag_in\n\n@app.get('/{tag_str}',\
    \ response_model=TagOut)\ndef get_one(tag_str: str) -> TagOut:\n    tag: Tag =\
    \ service.get(tag_str)\n    return tag\n```\n\nНесмотря на то что мы вернули объект\
