  - '[PAGE 38]


    # Переменные — это имена


    Термин «объект» получил множество определений в мире программного обеспечения,
    возможно, даже слишком много. В Python *объект* — это структура данных для упаковки
    каждого отдельного фрагмента данных в программе, от целого числа 5 до функции
    и всего, что вы можете определить. В нем, помимо прочей отчетной информации, указываются:


    +   - уникальное *идентификационное* значение;

    - низкоуровневый *тип*, соответствующий аппаратному обеспечению;

    - конкретное *значение* (физические биты);

    - *подсчет* количества переменных, ссылающихся на него.


    Python *строго типизирован* на уровне объектов (тип объекта не меняется, хотя
    его значение может меняться). Объект называется *изменяемым*, если его значение
    может быть изменено, и *неизменяемым*, если нет.


    На уровне *переменных* Python отличается от многих других вычислительных языков,
    и это может сбить с толку. Во многих других языках *переменная* — это, по сути,
    прямой указатель на область памяти, содержащую необработанное *значение*, хранящееся
    в битах, которые соответствуют аппаратному дизайну компьютера. Если вы присваиваете
    этой переменной новое значение, язык перезаписывает предыдущее значение в памяти
    новым.


    Это прямое и быстрое решение. Компилятор следит за тем, что куда записывается.
    Это одна из причин того, почему такие языки, как C, быстрее Python. Как разработчику,
    вам необходимо убедиться, что вы присваиваете каждой переменной только значения
    правильного типа.


    И здесь Python имеет существенное отличие — переменная в нем представляет собой
    просто *имя*, временно ассоциируемое с *объектом* более высокого уровня в памяти.
    Если вы присваиваете новое значение переменной, ссылающейся на неизменяемый объект,
    то фактически создаете новый объект, содержащий это значение, а затем получаете
    имя для ссылки на данный объект. Старый объект (на который раньше ссылалось имя)
    освобождается, и его память может быть восстановлена, если на него не ссылаются
    другие имена, то есть счетчик ссылок равен 0.


    В книге «Простой Python»¹ я сравниваю объекты с пластиковыми коробками, стоящими
    на полках памяти, а имена/переменные — со стикерами на этих


    > ¹ Любанович Б. Простой Python. Современный стиль программирования. 2-е изд.
    — СПб.: Питер, 2021.'
  - '[PAGE 39]


    коробках. Или вы можете представить имена как бирки, прикрепленные ни-точками
    к этим коробкам.


    Обычно при использовании имени вы присваиваете его одному объекту, и оно сохраняется
    за ним. Такая простая последовательность помогает понять ваш код. *Область видимости*
    переменной — это область кода, в которой имя ссылается на один и тот же объект,
    например, внутри функции. Вы можете применять одно и то же имя в разных областях
    видимости, но каждое из них будет ссылаться на разные объекты.


    Можно сделать так, чтобы переменная ссылалась на разные объекты в програм-ме Python,
    однако это не всегда хорошо. Не посмотрев, вы не узнаете, находит-ся ли имя x
    в строке 100 в той же области видимости, что и имя x в строке 20. (Кстати, x —
    ужасный выбор имени переменной. Следует выбирать дейст-вительно значимые имена.)


    # Подсказки типов


    Вся эта предыстория имеет определенный смысл.


    В Python 3.6 добавлены *подсказки типов* (type hints) для объявления типа объ-екта,
    на который ссылается переменная. Они не выполняются интерпретатором Python во
    время его работы! Вместо этого их могут задействовать различ-ные инструменты для
    обеспечения последовательного использования переменной. Стандартная программа
    проверки типов называется *mypy*, и позже я покажу вам, как она работает.


    Подсказка типа может показаться просто приятной вещью, как и многие инструменты
    lint, помогающие программистам избежать ошибок. Например, она может напомнить,
    что ваша переменная count ссылается на объект Python типа int. Но подсказки, хотя
    они и представляют собой дополнительную воз-можность и являются необязательными
    примечаниями (буквально намеками), оказываются неожиданно полезными. Далее в этой
    книге вы увидите, как FastAPI адаптировал пакет Pydantic, чтобы грамотно использовать
    подсказки типов.


    Добавление объявлений типов может стать тенденцией в других языках, ранее не имевших
    типов. Например, многие разработчики JavaScript перешли на TypeScript (https://www.typescriptlang.org).'
  - '[PAGE 40]


    # Структуры данных


    Подробнее о Python и структурах данных вы узнаете в главе 5.


    # Веб-фреймворки


    Помимо прочего, веб-фреймворк осуществляет перевод между байтами HTTP кода и структурами
    данных Python. Это поможет сэкономить много сил. В то же время если часть его
    работает не так, как вам нужно, то может понадобиться взломать решение. Как говорится,
    не надо изобретать колесо — разве что вы не можете найти круглое.


    Web Server Gateway Interface (WSGI) (https://wsgi.readthedocs.io) — это спецификация
    стандарта синхронизации (https://peps.python.org/pep-3333) Python для подключения
    кода приложения к веб-серверам. Все традиционные веб-фреймворки Python построены
    на WSGI. Но синхронное взаимодействие может означать, что вы заняты ожиданием
    чего-то, что работает гораздо медленнее процессора, например запросов к дискам
    или сети. Тогда вы будете искать лучшую *конкурентность*. В последние годы она
    приобретает все большее значение. В результате была разработана спецификация Asynchronous
    Server Gateway Interface (ASGI) (https://asgi.readthedocs.io) для Python. Об этом
    рассказывается в главе 4.


    # Django


    Django (https://www.djangoproject.com) — это полнофункциональный веб-фреймворк,
    обозначающий себя как веб-фреймворк для перфекционистов с жесткими сроками выполнения
    работы. Он был анонсирован Адрианом Холоварти и Саймоном Уиллисоном в 2003 году
    и назван в честь Джанго Рейнхардта — бельгийского джазового гитариста XX века.
    Django часто используется для корпоративных сайтов с базами данных. Более подробное
    описание приводится в главе 7.


    # Flask


    Flask (https://flask.palletsprojects.com), представленный Армином Ронахером в
    2010 году, является микрофреймворком. В главе 7 вы найдете более подробную информацию
    о нем и его сравнение с Django и FastAPI.'
