    \ строк (деревья, знаете ли) в примере 17.7.\n\n**Пример 17.7.** Запустите тест\
    \ загрузки существ (в усеченном виде — деревья наблюдают)\n\n```\n$ http -b localhost:8000/creature\n\
    [\n    {\n        \"aka\": \"AKA\",\n        \"area\": \"Area\",\n        \"country\"\
