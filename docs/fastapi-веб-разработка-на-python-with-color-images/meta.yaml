  md: "# Простой пример\n\nВы уже видели, как передать простую строку в конечную точку\
    \ веб-приложения через URL, параметр запроса или тело HTTP-запроса. Проблема в\
    \ том, что обычно вы запрашиваете и получаете группы данных разных типов. Именно\
    \ здесь в FastAPI впервые появляются модели Pydantic. В начальном примере будут\
    \ использоваться три файла:\n\n+   - model.py — определяет модель Pydantic;\n\
    - data.py — источник фиктивных данных, определяющих экземпляр модели;\n- web.py\
    \ — определяет конечную точку веб-приложения FastAPI, возвращающую фиктивные данные.\n\
    \nДля простоты в этой главе сохраним все файлы в одном каталоге. В последующих\
    \ главах, посвященных более крупным веб-сайтам, мы разделим их на соответствующие\
    \ уровни. Сначала определим модель существа в примере 5.8.\n\n**Пример 5.8.**\
    \ Определение модели существа: model.py\n\n```\nfrom pydantic import BaseModel\n\
    \nclass Creature(BaseModel):\n    name: str\n    country: str\n    area: str\n\
    \    description: str\n    aka: str\n\nthing = Creature(\n    name=\"yeti\",\n\
    \    country=\"CN\",\n    area=\"Himalayas\",\n    description=\"Hirsute Himalayan\"\
    ,\n    aka=\"Abominable Snowman\")\n)\nprint(\"Name is\", thing.name)\n```\n\n\
    Класс Creature наследуется от класса BaseModel из Pydantic. Часть выражения :\
    \ str после слов name, country, area, description и aka представляет собой подсказку\
    \ типа — каждое из значений относится к строковому типу данных Python.\n\n> В\
    \ этом примере все поля обязательны для заполнения. В Pydantic, если слово Optional\
    \ отсутствует в описании типа, поле должно содержать значение."
