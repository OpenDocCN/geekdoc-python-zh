    специфических имен переменных и модулей.


    Есть ли способ провести поведенческий тест, в котором это не требуется?


    Один из способов — определить *дублер* (иногда его называют *дубликатом* или *двойником*).
    Это отдельный код, выполняющий то, что мы хотим получить в тесте, — в данном случае,
    чтобы функция `preamble()` возвращала пустую строку. Одна из возможностей сделать
    это — импорт. Сначала примените этот подход'
