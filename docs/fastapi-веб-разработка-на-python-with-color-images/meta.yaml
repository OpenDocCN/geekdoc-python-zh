    Это очень хорошо для части описания, связанной с сохранением переменных вместе.
    Но нам требуется больше, так что давайте попросим у Дедушки Мороза вот что:


    +   - *объединение* возможных альтернативных типов;

    - отсутствующие/дополнительные значения;

    - значения по умолчанию;

    - проверку достоверности данных;

    - сериализацию в форматы, такие как JSON, и из них.


    # Альтернативы


    Очень заманчиво использовать встроенные структуры данных Python, особенно словари.
    Но вы неизбежно обнаружите, что словари слишком свободны. А за свободу приходится
    платить. Вам нужно будет проверить *абсолютно все*.


    +   - Ключ необязателен?

    - Если ключ отсутствует, есть ли значение по умолчанию?

    - Существует ли ключ?

    - Если да, то относится ли значение ключа к правильному типу?'
