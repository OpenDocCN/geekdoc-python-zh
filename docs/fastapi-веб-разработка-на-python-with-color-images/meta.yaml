  md: '+   - *время ожидания* — предварительное время ожидания;

    - *пропускную способность* — количество байтов в секунду между сервисом и его
    абонентами.


    В давние времена, работая во Всемирной паутине¹, люди мечтали о поддержке сотен
    одновременных подключений, затем беспокоились о «проблеме 10 000», а теперь обсуждают
    миллионные значения.


    Термин «конкурентность» не означает полный параллелизм. Множественная обработка
    не происходит в одну и ту же наносекунду в одном процессоре. Конкурентность в
    основном позволяет избежать напряженного ожидания (простояния центрального процессора
    (ЦП) до получения ответа). ЦП работают быстро, а сети и диски — в тысячи и миллионы
    раз медленнее. Поэтому при обращении к сети или диску никто не хочет просто сидеть
    с пустым взглядом, пока не поступит ответ.


    Обычное выполнение Python *синхронизировано* — выполняется одно действие за раз
    в порядке, указанном кодом. Иногда требуется работа в *асинхронном* режиме — выполнить
    немного одного, потом немного другого, вернуться к первому и т. д. Если весь код
    использует центральный процессор для вычислений (*CPU bound*), то у нас нет свободного
    времени на асинхронность. Но если выполняется процесс, указывающий процессору
    ждать завершения операции от внешнего источника (I/O bound), можно организовать
    асинхронность.


    Асинхронные системы обеспечивают *цикл событий*: запросы на медленные операции
    отправляются и отмечаются, но в ожидании их ответов не происходит задержка работы
    ЦП. Вместо этого при каждом проходе через цикл выполняется немедленная обработка,
    а все ответы, поступившие за это время, обрабатываются при следующем проходе.


    Эффект от этих действий может быть драматическим. Далее в книге вы увидите, как
    поддержка асинхронной обработки в FastAPI делает его намного быстрее, чем типичные
    веб-фреймворки. Асинхронная обработка — это не волшебство. Вам все еще нужно проявлять
    осторожность, чтобы не выполнять слишком много работы, требующей больших затрат
    ресурсов ЦП, во время цикла событий, потому что это замедлит весь процесс выполнения.
    Далее в книге вы увидите, как используются ключевые слова `async` и `await` языка
    Python и как FastAPI позволяет сочетать синхронную и асинхронную обработку.


    > ¹ Примерно тогда, когда пещерные люди играли в футбол с гигантскими наземными
    ленивцами.'
