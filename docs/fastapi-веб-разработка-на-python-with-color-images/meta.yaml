  - '[PAGE 191]


    # Pytest


    В Python уже давно существует стандартный пакет unittest (https://oreil.ly/3u0M_).
    Более поздний пакет стороннего производителя под названием nose (https://nose.readthedocs.io)
    представляет собой попытку улучшить его. Большинство разработчиков Python сейчас
    предпочитают фреймворк pytest (https://docs.pytest.org), который выполняет больше
    задач, чем любой из перечисленных ранее, и более прост в использовании. Он не
    встроен в Python, поэтому при необходимости нужно будет выполнить команду pip
    install pytest. Также запустите команду pip install pytestmock, чтобы получить
    автоматическую фикстуру mocker — вы увидите ее позже в этой главе.


    Что предлагает pytest? Приятные автоматические функции включают следующее.


    +   - *Обнаружение тестирования* — тест для файла Python с префиксом test_ или
    суффиксом _test в имени будет запущен автоматически. Это сопоставление имен файлов
    переходит в подкаталоги, выполняя столько тестов, сколько в них содержится.

    - *Подробности отказа с конструкцией Assert* — оператор выявления ошибок assert
    выводит то, что ожидалось, и то, что произошло на самом деле.

    - *Фикстуры* — эти функции могут запускаться один раз для всего тестового скрипта
    или выполняться для каждого теста (его области видимости), предоставляя тестовым
    функциям такие параметры, как стандартные тестовые данные или инициализация базы
    данных. Фикстуры — это своего рода внедрение зависимости, подобное предлагаемому
    FastAPI для функций пути веб-приложения, — конкретные данные передаются общей
    тестовой функции.

    - *Параметризация* — обеспечивает несколько тестовых данных для тестовой функции.


    # Макет


    Где разместить тесты? Похоже, что единого мнения нет, но вот два разумных варианта:


    +   - каталог test на верхнем уровне с подкаталогами для тестируемой области кода,
    например web, service и т. д.;

    - каталог test под каждым каталогом кода, например web, service и т. д.'
  - '[PAGE 192]


    Кроме того, в рамках конкретного подкаталога test/web следует создать дополнительные
    каталоги для различных типов тестов — модульных, интеграционных и полных. В книге
    я использую такую иерархию:


    ```

    test

    ├── unit

    │   ├── web

    │   ├── service

    │   └── data

    ├── integration

    └── full

    ```


    Отдельные тестовые скрипты находятся в каталогах нижнего уровня. Они рассматриваются
    в этой главе.


    # Автоматизированные модульные тесты


    Модульный тест должен проверять что-то одно в пределах одного уровня. Обычно это
    означает передачу параметра (-ов) в функцию и утверждение того, что должно быть
    возвращено.


    Модульные тесты требуют *изоляции* тестируемого кода. Если ее нет, значит, вы
    тестируете и еще какую-то часть кода. Итак, как же изолировать код для модульных
    тестов?


    # Макетирование


    В стеке кода этой книги обращение к URL-адресу через веб-интерфейс обычно вызывает
    функцию на веб-уровне, вызывающую функцию на сервисном уровне. Далее уже она вызывает
    функцию на уровне данных, обращающуюся к базе данных. Результаты возвращаются
    по цепочке, в конечном счете обратно с веб-уровня до вызывающей стороны.


    Модульное тестирование на первый взгляд выглядит просто. Для каждой функции, имеющейся
    в вашей кодовой базе, передаются тестовые аргументы, и требуется убедиться, что
    она возвращает ожидаемые значения. Это хорошо работает для *чистой функции*, принимающей
    входные аргументы и возвращающей ответы без обращения к какому-либо внешнему коду.
    Но большинство функций также вызывают другие функции. Каким же образом можно контролировать
    то, что делают другие функции? А как насчет данных, поступающих из внешних источников?
    Наиболее распространенным внешним фактором,'
  - "[PAGE 193]\n\nтребующим контроля, является доступ к базе данных, но на самом\
    \ деле это может быть что угодно.\n\nОдин из методов заключается в том, чтобы\
    \ создавать *макет* каждого вызова внешней функции. Поскольку функции в Python\
    \ являются объектами первого класса, можно одну функцию заменить другой. В пакете\
    \ unittest есть модуль mock, он выполняет эту операцию.\n\nМногие разработчики\
    \ считают, что макетирование — это лучший способ изолировать модульные тесты.\
    \ Сначала я покажу примеры макетирования, а также приведу аргумент, что часто\
    \ макеты требуют слишком много знаний о том, как работает ваш код, а не о результатах.\
    \ Вам могут быть знакомы термины «структурное тестирование» (как в макетировании,\
    \ где тестируемый код вполне нагляден) и «поведенческое тестирование» (внутренняя\
    \ структура кода не нужна). Примеры 12.1 и 12.2 определяют модули mod1.py и mod2.py\
    \ соответственно.\n\n# Пример 12.1. Вызываемый модуль (mod1.py)\n\n```\ndef preamble()\
    \ -> str:\n    return \"The sum is \"\n```\n\n# Пример 12.2. Вызывающий модуль\
    \ (mod2.py)\n\n```\nimport mod1\n\ndef summer(x: int, y:int) -> str:\n    return\
    \ mod1.preamble() + f\"{x+y}\"\n```\n\nФункция summer() вычисляет сумму своих\
    \ аргументов и возвращает строку с результатом функции preamble и суммой. Пример\
    \ 12.3 представляет собой минимальный скрипт pytest для проверки функции summer().\n\
    \n# Пример 12.3. Скрипт Pytest test_summer1.py\n\n```\nimport mod2\n\ndef test_summer():\n\
    \    assert \"The sum is 11\" == mod2.summer(5,6)\n```\n\nВ примере 12.4 тест\
    \ выполняется успешно.\n\n# Пример 12.4. Запуск скрипта pytest\n\n```\n$ pytest\
    \ -q test_summer1.py\n.\n[100%]\n1 passed in 0.04s\n```"
  - "[PAGE 194]\n\n(Аргумент -q выполняет тест тихо, не выводя лишних деталей.) Хорошо,\
    \ он оказался успешным. Но функция summer() получила текст из функции preamble.\
