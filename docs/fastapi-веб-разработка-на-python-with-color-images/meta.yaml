  md: "# Модуль python-tabulate\n\nОпробуем еще один инструмент с открытым исходным\
    \ кодом, python-tabulate (https://oreil.ly/L0f6k). Он специально разработан для\
    \ табличного вывода. Сначала потребуется запустить команду pip install tabulate.\
    \ В примере 17.3 показан код.\n\nПример 17.3. Считывание файла PSV с помощью python-tabulate\
    \ (load_tabulate.py)\n\n```\nfrom tabulate import tabulate\nimport sys\n\ndef\
