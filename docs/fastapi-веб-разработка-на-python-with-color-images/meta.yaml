    # Проектирование RESTful API


    HTTP — это способ передачи команд и данных между веб-клиентами и серверами. Но,
    как и в случае с ингредиентами из холодильника, которые можно комбинировать, изготавливая
    блюда от отвратительных до изысканных, некоторые рецепты для HTTP работают лучше,
    чем другие.


    В главе 1 я упоминал, что *RESTful* стал полезной, хотя иногда и нечеткой моделью
    для разработки HTTP. Проектирование RESTful включает в себя следующие основные
    компоненты:


    +   - *ресурсы* — элементы данных, которыми управляет ваше приложение;

    - *идентификаторы* — уникальные идентификаторы ресурсов;


    ¹ Персиваль Г., Грегори Б. Паттерны разработки на Python. — СПб.: Питер, 2022.

    ² Перальта Х. А. Микросервисы и API. — СПб.: Питер, 2024.'
