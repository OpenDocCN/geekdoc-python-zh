    JWT ([https://jwt.io](https://jwt.io)) — это схема кодирования, а не метод аутентификации.
    Низкоуровневые детали определены в стандарте RFC 7519 ([https://oreil.ly/_op1j](https://oreil.ly/_op1j)).
    Его можно использовать для передачи информации об аутентификации для OAuth2 и
    других методов, я покажу пример такой реализации.


    JWT — это читаемая строка, состоящая из трех разделов, разделенных точками:


    +   - заголовок — используемый алгоритм шифрования и тип токена;

    - полезная нагрузка — ...

    - подпись — ...


    Каждый раздел состоит из строки JSON, закодированной в формате Base 64 URL ([https://www.base64url.com](https://www.base64url.com)).
    Вот пример (он был разбит на позициях точек, чтобы поместиться на ширине этой
    страницы):


    ```

    eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.

    eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.

    SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c

    ```


    Как обычная строка ASCII, которую можно использовать также в URL, она может передаваться
    веб-серверам как часть URL-адреса, параметр запроса, HTTP-заголовок, куки-файлы
    и т. д.


    JWT позволяет избежать поиска в базе данных, но это означает также, что вы не
    сможете обнаружить аннулированную авторизацию напрямую.


    # Сторонняя аутентификация: OIDC


