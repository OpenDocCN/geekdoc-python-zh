- md: "## Cryptonomicon\n\n```html\n<table id=\"guesses\">\n</table>\n<span id=\"\
    status\"></span>\n<hr>\n```\n\n<div>\n{% for letter in word %}<input type=text\
    \ name=\"guess\">{% endfor %}\n<input type=hidden id=\"word\" value=\"{{word}}\"\
    >\n<br><br>\n<input type=submit onclick=\"post_guess()\">\n</div>\n\n</body>\n\
    \n# Первая сервисная часть — инициализация\n\nВ примере 18.4 показан сервисный\
    \ код для связи функции запуска игры на веб-уровне с функцией предоставления случайного\
    \ имени существа на уровне данных.\n\n**Пример 18.4.** Расчет результата (service/game.py)\n\
    \n```python\nimport data.game as data\n\ndef get_word() -> str:\n    return data.get_word()\n\
    ```\n\n# Вторая сервисная часть — определение результатов\n\nДобавьте код из примера\
    \ 18.5 к коду из примера 18.4. Результат представляет собой строку одиночных символов,\
    \ указывающих, совпала ли введенная буква с правильной позицией, с другой позицией\
    \ или указана неверно. Отгадываемые буквы и слово преобразуются в нижний регистр,\
    \ чтобы сопоставление не зависело от регистра. Если длина отгадки не совпадает\
    \ с длиной скрытого слова, возвращается пустая строка.\n\n**Пример 18.5.** Расчет\
    \ результата (service/game.py)\n\n```python\nfrom collections import Counter,\
    \ defaultdict\n\nHIT = \"H\"\nMISS = \"M\"\nCLOSE = \"C\" # (буква находится в\
    \ слове, но в другой позиции)\n\ndef get_score(actual: str, guess: str) -> str:\n\
    \    length: int = len(actual)\n    if len(guess) != length:\n        return ERROR\n\
    \    actual_counter = Counter(actual) # {буква: подсчет, ...}\n    guess_counter\
    \ = defaultdict(int)\n    result = [MISS] * length\n    for pos, letter in enumerate(guess):\n\
    \        if letter == actual[pos]:\n            result[pos] = HIT\n          \
    \  guess_counter[letter] += 1\n    for pos, letter in enumerate(guess):\n    \
    \    if result[pos] == HIT:\n            continue\n        guess_counter[letter]\
    \ += 1\n        if (letter in actual and\n            guess_counter[letter] <=\
    \ actual_counter[letter]):\n            result[pos] = CLOSE\n    result = ''.join(result)\n\
    \    return result\n```\n\n# Тестируем!\n\nПример 18.6 содержит несколько упражнений\
    \ pytest для расчета оценки сервиса. В коде используем функциональную возможность\
    \ pytest под названием parametrize для передачи последовательности тестов, вместо\
    \ того чтобы писать цикл внутри самой тестовой функции. Помните из примера 18.5,\
    \ что H — точное попадание, C — близко (неверная позиция) и M означает, что игрок\
    \ вообще не угадал.\n\n**Пример 18.6.** Тестирование расчета результата (test/unit/service/test_game.py)\n\
    \n```python\nimport pytest\nfrom service import game\n\nword = \"bigfoot\"\nguesses\
    \ = [\n    (\"bigfoot\", \"HHHHHHH\"),\n    (\"abcdefg\", \"MCMMMCC\"),\n    (\"\
    toofgib\", \"CCCHCCC\"),\n    (\"wronglength\", \"\"),\n    (\"\", \"\"),\n  \
    \  ]\n\n@pytest.mark.parametrize(\"guess,score\", guesses)\ndef test_match(guess,\
    \ score):\n    assert game.get_score(word, guess) == score\n```\n\nЗапускаем:\n\
    \n```\n$ pytest -q test_game.py\n.....\n5 passed in 0.05s\n```\n\n# Данные — инициализация\n\
    \nВ новом модуле data/game.py потребуется только одна функция, показанная в примере\
    \ 18.7.\n\n**Пример 18.7.** Получение случайного имени существа (data/game.py)\n\
    \n```python\nfrom .init import curs\n\ndef get_word() -> str:\n    qry = \"select\
    \ name from creature order by random() limit 1\"\n    curs.execute(qry)\n    row\
    \ = curs.fetchone()\n    if row:\n        name = row[0]\n    else:\n        name\
    \ = \"bigfoot\"\n    return name\n```\n\n# Давайте поиграем в «Криптономикон»\n\
    \n(Кто-нибудь, пожалуйста, придумайте название получше.)\n\nВ браузере перейдите\
    \ по адресу http://localhost:8000/game. На экране должно появиться следующее изображение.\n\
    \n![](img/eacb50a37d89d355fa68de0c62d56b32_267_0.png)\n\nВведем несколько букв\
    \ и отправим их в качестве отгадки, чтобы посмотреть, что получится.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_267_1.png)\n\
    \nБуквы *b*, *f* и *g* выделены желтым (если вы не видите это в цвете, вам придется\
    \ поверить мне на слово!). Это говорит о том, что они есть в скрытом имени, но\
    \ стоят не на своих местах.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_268_0.png)\n\
    \nПопробуем придумать название, но изменим последнюю букву. Во второй строке мы\
    \ видим много зеленого цвета. Ого, так близко!\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_268_1.png)\n\
    \nИсправим последнюю букву и ради интереса сделаем некоторые буквы прописными,\
    \ чтобы убедиться, что сопоставление работает без учета регистра. Подтверждаем\
    \ отправку, ну и дела!\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_268_2.png)\n\
    \n# Заключение\n\nМы использовали HTML, JavaScript, CSS и FastAPI, чтобы создать\
    \ простую (очень!) интерактивную игру в стиле Wordle. В этом разделе было показано,\
    \ как управлять многопоточным взаимодействием между веб-клиентом и сервером с\
    \ помощью JSON и Ajax.\n\n# ПРИЛОЖЕНИЕ А\n\n# Дополнительная литература\n\nЕсли\
