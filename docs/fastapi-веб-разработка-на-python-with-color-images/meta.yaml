    действительно ли вам нужно и то и другое?


    Вы можете предоставить полностью анонимный доступ ко всем страницам своего сайта.
    Но это оставит открытую возможность для таких уязвимостей, как атаки типа «отказ
    в обслуживании» (DoS). Хотя некоторые меры защиты, например ограничение количества
    запросов, можно реализовать вне веб-сервера (см. главу 13), почти все поставщики
    публичных API требуют наличия хотя бы какой-то аутентификации. Помимо безопасности,
    необходимо знать, насколько эффективны веб-сайты.


    +   - Сколько уникальных посетителей?

    - Какие страницы пользуются наибольшей популярностью?

    - Увеличивают ли определенные изменения количество просмотров?

    - Какие последовательности посещения страниц часто встречаются?'
- md: "Ответы на эти вопросы требуют аутентификации конкретных посетителей. В противном\
    \ случае вы можете получить только общее количество значений по всем показателям.\n\
    \nЕсли ваш сайт требует аутентификации или авторизации, доступ к нему должен быть\
    \ зашифрован (с использованием HTTPS вместо HTTP), чтобы злоумышленники не смогли\
    \ извлечь секретные данные из обычного текста. Подробные сведения о настройке\
    \ HTTPS см. в главе 13.\n\n## Методы аутентификации\n\nСуществует множество методов\
    \ и инструментов веб-аутентификации:\n\n- *имя пользователя/электронная почта\
    \ и пароль* — применение классических HTTP Basic и дайджест-аутентификаций;\n\
    - *ключ API* — неясная длинная строка с сопутствующим секретом;\n- *OAuth2* —\
    \ набор стандартов для аутентификации и авторизации;\n- *веб-токены JavaScript*\
    \ (JavaScript Web Tokens, JWT) — формат кодирования, содержащий криптографически\
    \ подписанную информацию о пользователе.\n\nВ этом разделе я рассмотрю первые\
    \ два метода и покажу их традиционную реализацию. Но остановлюсь перед тем, как\
    \ заполнить код API и базы данных. Вместо этого мы полностью реализуем более современную\
    \ схему с OAuth2 и JWT.\n\n## Глобальная аутентификация — секретный ключ или общий\
    \ секрет (Shared Secret)\n\nСамый простой метод аутентификации заключается в передаче\
    \ секрета, который обычно известен только веб-серверу. Если он совпадает, доступ\
    \ открывается. Это небезопасно, если ваш сайт API открыт для общего доступа по\
    \ протоколу HTTP, а не HTTPS. Если он скрыт за открытым фронтенд-сайтом, фронтенд-\
    \ и бэкенд-части системы могут взаимодействовать, используя общий постоянный секрет.\
    \ Но если фронтенд-сайт взломают, всем конец. Давайте посмотрим, как FastAPI обрабатывает\
    \ простую аутентификацию.\n\nСоздайте новый файл верхнего уровня под названием\
    \ `auth.py`. Убедитесь, что у вас нет другого сервера FastAPI, запущенного из\
    \ одного из постоянно меняющихся файлов main.py из предыдущих глав. В примере\
    \ 11.1 реализован сервер, просто возвращающий все записи username и password,\
    \ отправленные ему с помощью HTTP Basic Authentication — метода из первых дней\
    \ существования Интернета.\n\n### Пример 11.1. Применение HTTP Basic Auth для\
    \ получения информации о пользователе: auth.py\n\n```python\nimport uvicorn\n\
    from fastapi import Depends, FastAPI\nfrom fastapi.security import HTTPBasic,\
    \ HTTPBasicCredentials\n\napp = FastAPI()\n\nbasic = HTTPBasic()\n\n@app.get(\"\
    /who\")\ndef get_user(\n    creds: HTTPBasicCredentials = Depends(basic)):\n \
    \   return {\"username\": creds.username, \"password\": creds.password}\n\nif\
    \ __name__ == \"__main__\":\n    uvicorn.run(\"auth:app\", reload=True)\n```\n\
    \nВ примере 11.2 укажите HTTPie выполнить этот запрос Basic Auth (для этого требуются\
    \ аргументы -a name:password). Здесь мы используем название me и пароль secret.\n\
    \n### Пример 11.2. Проверка с помощью HTTPie\n\n```bash\n$ http -q -a me:secret\
    \ localhost:8000/who\n{\n    \"password\": \"secret\",\n    \"username\": \"me\"\
    \n}\n```\n\nТестирование с помощью пакета Requests в примере 11.3 аналогично,\
    \ используется параметр auth.\n\n### Пример 11.3. Проверка с помощью Requests\n\
    \n```python\n>>> import requests\n>>> r = requests.get(\"http://localhost:8000/who\"\
    ,\n    auth=(\"me\", \"secret\"))\n>>> r.json()\n{'username': 'me', 'password':\
    \ 'secret'}\n```\n\nВы также можете протестировать пример 11.1 с помощью автоматической\
    \ страницы документации (http://localhost:8000/docs), показанной на рис. 11.1.\n\
    \nНажмите стрелку вниз, расположенную справа, затем кнопку Try It Out (Попробовать)\
    \ и кнопку Execute (Выполнить). Вы увидите форму, запрашивающую имя пользователя\
    \ и пароль. Введите что угодно. Форма документации обратится к этой конечной точке\
    \ сервера и покажет эти значения в ответе.\n\nЭти тесты показывают, что вы можете\
    \ получить имя пользователя и пароль к серверу и обратно (хотя ни один из них\
    \ на самом деле ничего не проверял). Что-то на сервере должно проверить, что имя\
    \ и пароль соответствуют утвержденным значениям. Так, в примере 11.4 я включу\
    \ в веб-секретное имя пользователя и пароль. Вводимые имя пользователя и пароль\
    \ должны совпадать (каждый из них представляет собой *секретный ключ*), иначе\
    \ будет выброшено исключение. Код состояния HTTP 401 официально называется Unauthorized\
    \ (Не авторизован), но на самом деле он означает «неаутентифицированный».\n\n\
    > Вместо того чтобы запоминать все коды статуса HTTP, можно импортировать модуль\
    \ статуса FastAPI, который сам импортируется непосредственно из Starlette. Поэтому\
    \ вы можете использовать более понятное status_code=HTTP_401_UNAUTHORIZED в примере\
    \ 11.4 вместо простой строки status_code=401.\n\n### Пример 11.4. Добавление секретного\
    \ имени пользователя и пароля в auth.py\n\n```python\nimport uvicorn\nfrom fastapi\
    \ import Depends, FastAPI, HTTPException\nfrom fastapi.security import HTTPBasic,\
    \ HTTPBasicCredentials\n\napp = FastAPI()\n\nsecret_user: str = \"newphone\"\n\
    secret_password: str = \"whodis?\"\n\nbasic: HTTPBasicCredentials = HTTPBasic()\n\
    \n@app.get(\"/who\")\ndef get_user(\n    creds: HTTPBasicCredentials = Depends(basic))\
    \ -> dict:\n    if (creds.username == secret_user and\n        creds.password\
    \ == secret_password):\n        return {\"username\": creds.username,\n      \
    \          \"password\": creds.password}\n    raise HTTPException(status_code=401,\
    \ detail=\"Hey!\")\n\nif __name__ == \"__main__\":\n    uvicorn.run(\"auth:app\"\
    , reload=True)\n```\n\nНеправильное введение имени пользователя и пароля приведет\
    \ к мягкому упреку 401, как показано в примере 11.5.\n\n### Пример 11.5. Тест\
    \ с помощью HTTPie и с несовпадающими именем пользователя/паролем\n\n```bash\n\
    $ http -a me:secret localhost:8000/who\nHTTP/1.1 401 Unauthorized\ncontent-length:\
    \ 17\ncontent-type: application/json\ndate: Fri, 03 Mar 2023 03:25:09 GMT\nserver:\
    \ uvicorn\n\n{\n    \"detail\": \"Hey!\"\n}\n```\n\nПрименение магической комбинации\
    \ возвращает имя пользователя и пароль, как показано в примере 11.6.\n\n### Пример\
    \ 11.6. Тестирование с помощью HTTPie и с правильными именем пользователя/паролем\n\
    \n```bash\n$ http -q -a newphone:whodis? localhost:8000/who\n{\n    \"password\"\
    : \"whodis?\",\n    \"username\": \"newphone\"\n}\n```\n\n## Простая индивидуальная\
    \ аутентификация\n\nВ предыдущем разделе было показано, как можно использовать\
    \ секретный ключ для контроля доступа. Это широко применяемый, но не очень надежный\
    \ подход. И это ничего не говорит вам о конкретном посетителе, только то, что\
    \ он (или разумный ИИ) знает секретный ключ. Многим сайтам требуется обеспечить\
    \ следующее:\n\n- определение каким-либо образом отдельных посетителей;\n- идентификацию\
    \ конкретных посетителей при получении ими доступа к определенным конечным точкам\
    \ (аутентификация);\n- возможность назначения различных прав доступа для некоторых\
    \ посетителей и конечных точек (авторизация);\n- возможность сохранения определенной\
    \ информации о каждом посетителе (интересы, покупки и т. д.).\n\nЕсли ваши посетители\
    \ — люди, можете попросить их указать имя пользователя или электронную почту и\
    \ пароль. Если это внешние программы, можно попросить их предоставить ключ и секрет\
    \ API.\n\nВ дальнейшем я буду применять просто имя пользователя для обозначения\
    \ либо выбранного им имени, либо электронной почты.\n\nЧтобы аутентифицировать\
    \ реальных, а не фиктивных пользователей, вам потребуется сделать немного больше.\n\
    \n- Передать значения пользователя (имя и пароль) конечным точкам сервера API\
    \ в виде HTTP-заголовков.\n- Использовать HTTPS вместо HTTP, чтобы никто не смог\
    \ подсмотреть текст этих заголовков.\n- Хешировать пароль в отдельную строку.\
    \ Результат не является «дехешируемым» — из его хеша нельзя извлечь оригинальный\
    \ пароль.\n- Реальная база данных должна хранить таблицу User, содержащую имя\
    \ пользователя и хешированный пароль (ни в коем случае не оригинальный пароль\
    \ в виде простого текста).\n- Хешировать только что введенный пароль и сравнить\
    \ результат с хешированным паролем в базе данных.\n- Если имя пользователя и хешированный\
    \ пароль совпадают, передать соответствующий объект User вверх по стеку. Если\
    \ они не совпадают, вернуть значение None или вызвать исключение.\n- На уровне\
    \ сервисов запустить все метрики/ведение журналов/что угодно, относящиеся к аутентификации\
    \ отдельных пользователей.\n- На веб-уровне отправить информацию об аутентифицированном\
    \ пользователе всем функциям, которым она требуется.\n\nВ следующих разделах я\
    \ покажу вам, как сделать все эти вещи, применяя такие современные инструменты,\
    \ как OAuth2 и JWT.\n\n## Более сложная индивидуальная аутентификация\n\nЕсли\
    \ требуется выполнить аутентификацию отдельных пользователей, вам нужно где-то\
    \ хранить информацию о них — например, в базе данных, содержащей записи, хранящие\
    \ как минимум ключ (имя пользователя или ключ API) и секрет (пароль или секрет\
    \ API). Посетители вашего сайта будут указывать их при обращении к защищенным\
    \ URL-адресам, и вам нужны данные в базе данных, чтобы сопоставить их.\n\nОфициальные\
    \ документы по безопасности FastAPI (вводные (https://oreil.ly/kkTUB) и продвинутые\
    \ (https://oreil.ly/biKwy)) содержат полные описания того, как настроить аутентификацию\
    \ для нескольких пользователей, задействуя локальную базу данных. Но пример веб-функции\
    \ подделывает фактический доступ к базе данных.\n\nЗдесь вы поступите наоборот\
    \ — начнете с уровня данных и будете работать вверх. Укажите, как пользователь/посетитель\
    \ определяется, хранится и как к нему осуществляется доступ. Затем вы перейдете\
    \ к веб-уровню и узнаете, как передается, оценивается и аутентифицируется идентификация\
    \ пользователя."
  mdcn: "回答这些问题需要对具体访问者进行身份验证。否则，您只能获得所有指标的总体数值。\n\n如果您的网站需要身份验证或授权，则必须对其访问进行加密（使用\
    \ HTTPS 而非 HTTP），以防止恶意用户从明文中提取敏感数据。有关配置 HTTPS 的详细信息，请参阅第 13 章。\n\n## 身份验证方法\n\n\
    Web 身份验证有多种方法和工具：\n\n- *用户名/电子邮件和密码* — 使用经典的 HTTP Basic 和 Digest 认证；\n- *API 密钥*\
    \ — 一串含义不明的长字符串及其关联的密钥；\n- *OAuth2* — 一套用于身份验证和授权的标准；\n- *JavaScript Web 令牌*（JavaScript\
    \ Web Tokens, JWT）— 一种编码格式，包含经过加密签名的用户信息。\n\n在本节中，我将介绍前两种方法并展示其传统实现方式。但在填充 API\
    \ 和数据库代码之前，我将停止介绍。相反，我们将完整实现一个更现代的方案，使用 OAuth2 和 JWT。\n\n## 全局身份验证 — 密钥或共享密钥（Shared\
    \ Secret）\n\n最简单的身份验证方法是传递一个通常只有 Web 服务器知道的密钥。如果密钥匹配，则授予访问权限。如果您的 API 站点通过 HTTP\
    \ 而非 HTTPS 公开访问，这种方法并不安全。如果它隐藏在公开的前端站点之后，前端和后端系统可以使用一个共享的固定密钥进行交互。但如果前端站点被攻破，一切就都完了。让我们看看\
    \ FastAPI 如何处理简单的身份验证。\n\n创建一个名为 `auth.py` 的新顶层文件。确保没有其他 FastAPI 服务器从前面章节中不断变化的\
    \ main.py 文件中运行。示例 11.1 实现了一个服务器，它只是返回通过 HTTP Basic Authentication（互联网早期的一种方法）发送给它的所有\
    \ username 和 password 记录。\n\n### 示例 11.1. 使用 HTTP Basic Auth 获取用户信息：auth.py\n\n\
    ```python\nimport uvicorn\nfrom fastapi import Depends, FastAPI\nfrom fastapi.security\
    \ import HTTPBasic, HTTPBasicCredentials\n\napp = FastAPI()\n\nbasic = HTTPBasic()\n\
    \n@app.get(\"/who\")\ndef get_user(\n    creds: HTTPBasicCredentials = Depends(basic)):\n\
    \    return {\"username\": creds.username, \"password\": creds.password}\n\nif\
    \ __name__ == \"__main__\":\n    uvicorn.run(\"auth:app\", reload=True)\n```\n\
    \n在示例 11.2 中，指定 HTTPie 执行此 Basic Auth 请求（这需要参数 -a name:password）。这里我们使用名称 me 和密码\
    \ secret。\n\n### 示例 11.2. 使用 HTTPie 进行测试\n\n```bash\n$ http -q -a me:secret localhost:8000/who\n\
    {\n    \"password\": \"secret\",\n    \"username\": \"me\"\n}\n```\n\n示例 11.3\
    \ 中使用 Requests 包的测试类似，使用了 auth 参数。\n\n### 示例 11.3. 使用 Requests 进行测试\n\n```python\n\
    >>> import requests\n>>> r = requests.get(\"http://localhost:8000/who\",\n   \
    \ auth=(\"me\", \"secret\"))\n>>> r.json()\n{'username': 'me', 'password': 'secret'}\n\
    ```\n\n您也可以使用图 11.1 所示的自动文档页面（http://localhost:8000/docs）来测试示例 11.1。\n\n点击右侧的向下箭头，然后点击\
    \ Try It Out（试用）按钮和 Execute（执行）按钮。您将看到一个要求输入用户名和密码的表单。输入任意内容。文档表单将调用服务器的此端点，并在响应中显示这些值。\n\
    \n这些测试表明，您可以获取服务器的用户名和密码并返回（尽管实际上两者都没有进行任何验证）。服务器上的某些东西必须验证用户名和密码是否与批准的值匹配。因此，在示例\
    \ 11.4 中，我将在 Web 中包含一个秘密的用户名和密码。输入的用户名和密码必须匹配（每个都代表一个*密钥*），否则将引发异常。HTTP 状态码 401\
    \ 正式名称是 Unauthorized（未授权），但实际上它意味着“未认证”。\n\n> 与其记住所有 HTTP 状态码，不如导入 FastAPI 的 status\
    \ 模块，该模块直接从 Starlette 导入。因此，您可以在示例 11.4 中使用更易理解的 status_code=HTTP_401_UNAUTHORIZED，而不是简单的字符串\
    \ status_code=401。\n\n### 示例 11.4. 在 auth.py 中添加秘密用户名和密码\n\n```python\nimport\
    \ uvicorn\nfrom fastapi import Depends, FastAPI, HTTPException\nfrom fastapi.security\
    \ import HTTPBasic, HTTPBasicCredentials\n\napp = FastAPI()\n\nsecret_user: str\
    \ = \"newphone\"\nsecret_password: str = \"whodis?\"\n\nbasic: HTTPBasicCredentials\
    \ = HTTPBasic()\n\n@app.get(\"/who\")\ndef get_user(\n    creds: HTTPBasicCredentials\
    \ = Depends(basic)) -> dict:\n    if (creds.username == secret_user and\n    \
    \    creds.password == secret_password):\n        return {\"username\": creds.username,\n\
    \                \"password\": creds.password}\n    raise HTTPException(status_code=401,\
    \ detail=\"Hey!\")\n\nif __name__ == \"__main__\":\n    uvicorn.run(\"auth:app\"\
    , reload=True)\n```\n\n错误输入用户名和密码将导致一个温和的 401 警告，如示例 11.5 所示。\n\n### 示例 11.5.\
    \ 使用 HTTPie 和不匹配的用户名/密码进行测试\n\n```bash\n$ http -a me:secret localhost:8000/who\n\
    HTTP/1.1 401 Unauthorized\ncontent-length: 17\ncontent-type: application/json\n\
    date: Fri, 03 Mar 2023 03:25:09 GMT\nserver: uvicorn\n\n{\n    \"detail\": \"\
    Hey!\"\n}\n```\n\n使用正确的组合将返回用户名和密码，如示例 11.6 所示。\n\n### 示例 11.6. 使用 HTTPie 和正确的用户名/密码进行测试\n\
    \n```bash\n$ http -q -a newphone:whodis? localhost:8000/who\n{\n    \"password\"\
    : \"whodis?\",\n    \"username\": \"newphone\"\n}\n```\n\n## 简单的个人身份验证\n\n上一节展示了如何使用密钥来控制访问。这是一种广泛使用但不太可靠的方法。它无法告诉您关于具体访问者的任何信息，只知道他（或一个合理的\
    \ AI）知道密钥。许多网站需要实现以下功能：\n\n- 以某种方式识别单个访问者；\n- 在访问者访问特定端点时识别其身份（身份验证）；\n- 能够为某些访问者和端点分配不同的访问权限（授权）；\n\
    - 能够保存每个访问者的特定信息（兴趣、购买记录等）。\n\n如果您的访问者是人类，您可以要求他们提供用户名或电子邮件以及密码。如果他们是外部程序，可以要求他们提供\
    \ API 密钥和密钥。\n\n在下文中，我将简单地使用“用户名”来指代他们选择的名称或电子邮件。\n\n为了验证真实的、而非虚构的用户，您需要做更多工作。\n\
    \n- 将用户值（用户名和密码）作为 HTTP 头传递给 API 服务器端点。\n- 使用 HTTPS 而非 HTTP，以防止任何人窥探这些头的明文。\n\
    - 将密码哈希为一个单独的字符串。结果是“不可逆的”——无法从其哈希值中提取原始密码。\n- 真实的数据库应存储一个 User 表，其中包含用户名和哈希后的密码（绝不能以明文形式存储原始密码）。\n\
    - 对刚刚输入的密码进行哈希处理，并将结果与数据库中哈希后的密码进行比较。\n- 如果用户名和哈希后的密码匹配，则将相应的 User 对象向上传递到调用栈。如果不匹配，则返回\
    \ None 值或引发异常。\n- 在服务层，启动所有与单个用户身份验证相关的指标/日志记录/任何操作。\n- 在 Web 层，将已验证用户的信息发送给所有需要它的函数。\n\
    \n在接下来的章节中，我将向您展示如何使用 OAuth2 和 JWT 等现代工具来完成所有这些事情。\n\n## 更复杂的个人身份验证\n\n如果需要对单个用户进行身份验证，您需要在某处存储他们的信息——例如，在一个数据库中，该数据库包含至少存储密钥（用户名或\
    \ API 密钥）和密钥（密码或 API 密钥）的记录。您网站的访问者在访问受保护的 URL 时会提供这些信息，您需要数据库中的数据来进行匹配。\n\nFastAPI\
    \ 的官方安全文档（入门级 (https://oreil.ly/kkTUB) 和高级 (https://oreil.ly/biKwy)）详细描述了如何使用本地数据库为多个用户配置身份验证。但\
    \ Web 函数的示例模拟了对数据库的实际访问。\n\n在这里，您将反其道而行之——从数据层开始，然后向上工作。指定用户/访问者如何被定义、存储以及如何访问。然后您将转到\
    \ Web 层，了解用户身份如何被传递、评估和验证。"
