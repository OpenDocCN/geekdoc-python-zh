    В этом фрагменте кода `user_dep()` — функция зависимости. Она действует как функция
    пути FastAPI (знает о таких вещах, как `Params` и т. д.), но не содержит декоратора
    пути над собой. Это помощник, а не сама конечная точка.


    В функции пути `get_user()` говорится, что она ожидает переменную аргумента под
    названием `user` и эта переменная получит свое значение из функции зависимости
    `user_dep()`.


    > В аргументах функции `get_user()` нельзя написать `user = user_dep`, потому
    что `user_dep` — это объект функции Python. И нельзя написать `user = user_dep()`,
    потому что это вызвало бы функцию `user_dep()`, когда функция `get_user()` была
    определена, а не когда она используется. Поэтому нам нужна дополнительная вспомогательная
    функция FastAPI `Depends()`, чтобы вызывать `user_dep()` именно тогда, когда это
    необходимо.


    В списке аргументов функции пути может быть несколько зависимостей.


    # Область действия зависимости


    Вы можете определить зависимости для одной функции пути, их группы или всего веб-приложения.


    # Единый путь


    Включите в *функцию пути* такой аргумент:


    ```

    def pathfunc(name: depfunc = Depends(depfunc)):

    ```


    или просто в таком виде:


    ```

    def pathfunc(name: depfunc = Depends()):

    ```


    `name` — это то, как вы хотите назвать значение (значения), возвращаемое `depfunc`.
    Из предыдущего примера:


    +   - `pathfunc` — это `get_user()`;

    - `depfunc` — это `user_dep()`;

    - `name` — это `user`.


    Пример 6.2 учитывает этот путь и зависимость для возврата фиксированного имени
    (`name`) пользователя и логического значения `valid`.'
