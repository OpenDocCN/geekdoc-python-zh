    потребоваться увидеть результаты в определенном порядке.


    +   ● *Сортировка* — упорядочение всех результатов, даже если за один раз вы получите
    только часть из них.

    ● *Пагинация* — возвращение лишь некоторых результатов за раз с соблюдением любого
