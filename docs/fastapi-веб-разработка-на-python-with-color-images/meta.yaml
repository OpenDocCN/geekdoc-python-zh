    利用上一节中实现的 `import` 结构思想，使用环境变量 `CRYPTID_UNIT_TEST` 来导入模拟包（如 `service`）而不是真正的 `service`。这可以防止\
    \ Web 函数调用服务函数，而是将其连接到模拟（替代）版本。这样，底层的数据层和数据库也不会被使用。我们得到了想要的——模块化测试。示例 12.11 展示了修改后的\
    \ `web/creature.py` 文件。\n\n### 示例 12.11. 修改后的文件 `web/creature.py`\n\n```python\n\
