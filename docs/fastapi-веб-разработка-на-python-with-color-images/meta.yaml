    pydantic.error_wrappers.ValidationError:\n1 validation error for Creature name\n\
    \  ensure this value has at least 2 characters\n  (type=value_error.any_str.min_length;\
    \ limit_value=2)\n```\n\nАргумент ... функции Field() означает, что значение обязательное\
    \ и значения по умолчанию не предусмотрено.\n\nЭто минимальное введение в Pydantic.\
    \ Главное, что можно сделать, — автоматизировать проверку данных. Вы увидите,\
    \ насколько это полезно, при получении данных с веб-уровня или уровня данных.\n\
    \n## Заключение\n\nМодели предоставляют лучший способ определить данные, передаваемые\
    \ в вашем веб-приложении. Библиотека Pydantic использует подсказки типов Python\
    \ для определения моделей, передаваемых в приложении данных. Далее — определение\
    \ *зависимостей* для выделения конкретных деталей из общего кода.\n\n# ГЛАВА 6\n\
    \n## Зависимости\n\n### Обзор\n\nОдной из очень приятных особенностей дизайна\
    \ FastAPI является техника, называемая *внедрением зависимостей*. Этот термин\
    \ звучит технически и эзотерически, но это ключевой аспект FastAPI, и он удивительно\
    \ полезен на многих уровнях. В этой главе рассматриваются встроенные возможности\
    \ FastAPI, а также способы написания собственных.\n\n### Что такое зависимости\n\
    \n*Зависимость* — это конкретная информация, требующаяся вам в определенный момент.\
    \ Обычный способ получить эту информацию — написать код, доставляющий ее именно\
    \ тогда, когда она необходима.\n\nПри написании веб-сервиса в какой-то момент\
    \ вам может понадобиться сделать следующее:\n\n- получить входные параметры из\
    \ HTTP-запроса;\n- проверить вводимые данные;\n- проверить аутентификацию и авторизацию\
    \ пользователей для некоторых конечных точек;\n- найти данные в источнике данных,\
    \ часто в базе данных;\n- выдавать параметры, журналы или информацию для отслеживания.\n\
    \nВеб-фреймворки преобразуют байты HTTP-запросов в структуры данных, а вы по мере\
    \ необходимости извлекаете из них то, что вам нужно, в своих функциях веб-уровня.\n\
    \n### Проблемы с зависимостями\n\nПолучение того, что вам нужно, именно тогда,\
    \ когда нужно, причем внешнему коду не обязательно знать, как вы это получили,\
    \ кажется вполне разумным. Но оказалось, что существуют последствия.\n\n- *Тестирование*\
    \ — вы не можете протестировать варианты функции, выполняющие поиск зависимостей\
    \ по-другому.\n- *Скрытые зависимости* — сокрытие подробной информации означает,\
    \ что код, необходимый вашей функции, может прерваться при изменении внешнего\
    \ кода.\n- *Дублирование кода* — если зависимость является общей (например, поиск\
    \ пользователя в базе данных или объединение значений из HTTP-запроса), код поиска\
    \ может оказаться продублированным в нескольких функциях.\n- *Видимость OpenAPI*\
    \ — автоматическая тестовая страница, создаваемая FastAPI, нуждается в информации\
    \ из механизма внедрения зависимостей.\n\n### Внедрение зависимостей\n\nТермин\
    \ «внедрение зависимостей» проще, чем кажется, — это передача функции любой требующейся\
    \ ей *специфической* информации. Традиционный способ сделать это — передать вспомогательную\
    \ функцию, которую вы затем вызываете для получения конкретных данных.\n\n###\
    \ Зависимости FastAPI\n\nFastAPI продвинут еще на один шаг вперед — он позволяет\
    \ определить зависимости как аргументы функции, и они будут *автоматически* вызываться\
    \ FastAPI и передавать возвращаемые ими *значения*. Например, зависимость *user_dep*\
    \ может получать имя и пароль пользователя из HTTP-аргументов, искать их в базе\
    \ данных и возвращать токен, применяемый для отслеживания в дальнейшем этого пользователя.\
    \ Ваша функция веб-обработки никогда не вызывает зависимость напрямую — она обрабатывается\
    \ во время вызова функции.\n\nВы уже видели некоторые зависимости, правда, раньше\
    \ их так не называли, — это источники данных HTTP, такие как Path, Query, Body\
    \ и Header. Это функции или классы Python, откачивающие запрашиваемые данные из\
    \ различных областей HTTP-запроса. Они скрывают детали, такие как проверка валидности\
    \ и форматы данных.\n\nПочему бы не написать собственные функции для этого? Можно,\
    \ но у вас не будет:\n\n- проверки валидности данных;\n- преобразования форматов;\n\
    - автоматического документирования.\n\nВо многих других веб-фреймворках эти проверки\
    \ выполняются внутри собственных функций. Примеры их работы приведены в главе\
    \ 7, где FastAPI сравнивается с такими веб-фреймворками Python, как Flask и Django.\
    \ Но в FastAPI можно работать с собственными зависимостями так же, как и со встроенными.\n\
    \n### Написание зависимостей\n\nВ FastAPI зависимость — это то, что выполняется,\
    \ поэтому объект зависимости должен относиться к типу Callable, включающему функции\
    \ и классы — то, что вы вызываете, со скобками и необязательными аргументами.\n\
    \nВ примере 6.1 показана функция зависимости user_dep(). Она принимает строковые\
    \ аргументы имени и пароля и просто возвращает значение True, если пользователь\
    \ прошел проверку на валидность. Для этой первой версии пусть функция возвращает\
    \ значение True для всех данных.\n\n**Пример 6.1. Функция зависимости**\n\n```\n\
    from fastapi import FastAPI, Depends, Params\n\napp = FastAPI()\n\n# функция зависимости:\n\
    def user_dep(name: str = Params, password: str = Params):\n    return {\"name\"\
    : name, \"valid\": True}\n\n# функция пути/конечная точка веб-приложения:\n@app.get(\"\
    /user\")\ndef get_user(user: dict = Depends(user_dep)) -> dict:\n    return user\n\
    ```"
