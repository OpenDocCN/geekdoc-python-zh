    отправленного на сайт, а следующий блок содержит заголовки HTTP-ответа.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_119_0.png)


    В большинстве тестовых примеров, начиная с данного момента, все эти заголовки
    запросов и ответов не понадобятся, поэтому вы будете чаще использовать выражение
    http -b.'
