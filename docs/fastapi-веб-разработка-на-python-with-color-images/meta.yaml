  - '[PAGE 240]


    # ГЛАВА 16


    # Формы и шаблоны


    # Обзор


    Хотя акроним *API* в названии *FastAPI* — это намек на его основную направленность,
    FastAPI может работать и с традиционным веб-контентом. В этой главе рассказывается
    о стандартных HTML-формах и шаблонах для вставки данных в HTML.


    # Формы


    Как вы уже поняли, FastAPI был разработан в основном для создания API, и его входной
    информацией по умолчанию будут данные в формате JSON. Но это не значит, что он
    не может служить стандартным базовым HTML-формам и их друзьям.


    FastAPI поддерживает данные из HTML-форм так же, как и из других источников, таких
    как Query и Path, используя зависимость Form.


    Для работы с формами FastAPI вам потребуется пакет Python-Multipart, поэтому при
    необходимости выполните команду `pip install python-multipart`. Кроме того, каталог
    `static` из главы 15 понадобится для размещения тестовых форм из нее.


    Повторим пример 3.11, но предоставим значение who через форму, а не в виде JSON-строки.
    (Вызовите функцию пути greet2(), чтобы избежать нарушения работы старой функции
    пути greet(), если она все еще существует.) Добавьте пример 16.1 в файл main.py.'
- md: "## Пример 16.1. Получение значения из формы GET\n\n```python\nfrom fastapi\
    \ import FastAPI, Form\n\napp = FastAPI()\n\n@app.get(\"/who2\")\ndef greet2(name:\
    \ str = Form()):\n    return f\"Hello, {name}?\"\n```\n\nОсновное отличие заключается\
    \ в том, что значение поступает от объекта Form, а не Path, Query и остальных\
    \ из главы 3.\n\nПопробуйте (пример 16.2) провести начальный тест формы с помощью\
    \ HTTPie (вам потребуется аргумент -f, чтобы выгрузка происходила в кодировке\
    \ формы, а не в формате JSON).\n\n## Пример 16.2. Формирование запроса GET с помощью\
    \ HTTPie\n\n```bash\n$ http -f -b GET localhost:8000/who2 name=\"Bob Frapples\"\
    \n\"Hello, Bob Frapples?\"\n```\n\nМожете также отправить запрос из стандартного\
    \ файла HTML-формы. В главе 15 было показано, как создать каталог static (доступ\
    \ к нему осуществляется по URL /static) для хранения любых данных, включая HTML-файлы,\
    \ поэтому в примере 16.3 поместим туда этот файл (form1.html).\n\n## Пример 16.3.\
    \ Формирование запроса GET (static/form1.html)\n\n```html\n<form action=\"http://localhost:8000/who2\"\
    \ method=\"get\">\nSay hello to my little friend:\n<input type=\"text\" name=\"\
    name\" value=\"Bob Frapples\">\n<input type=\"submit\">\n</form>\n```\n\nЕсли\
    \ вы попросите браузер загрузить страницу http://localhost:8000/static/form1.html,\
    \ то увидите форму. Если введете любую тестовую строку, получите следующее сообщение:\n\
    \n```json\n\"detail\":[{\"loc\":[\"body\",\"name\"],\n            \"msg\":\"field\
    \ required\",\n            \"type\":\"value_error.missing\"}]\n```\n\nА?\n\nПосмотрите\
    \ в окно, где запущен Uvicorn, чтобы увидеть, что написано в его журнале:\n\n\
    ```\nINFO:     127.0.0.1:63502 - \"GET /who2?name=rr23r23 HTTP/1.1\"\n422 Unprocessable\
    \ Entity\n```\n\nПочему форма отправила переменную name в качестве параметра запроса,\
    \ когда мы поместили ее в поле формы? Это оказалось странностью HTML, задокументированной\
    \ на веб-сайте W3C (https://oreil.ly/e6CJb). Кроме того, если в вашем URL были\
    \ параметры запроса, он сотрет их и заменит значением name.\n\nПочему же HTTPie\
    \ справился с этим, как и ожидалось? Мне это неизвестно. Это несоответствие, о\
    \ котором следует знать.\n\nОфициальная магическая формула HTML заключается в\
    \ том, чтобы изменить действие с GET на POST. Так что добавим конечную точку POST\
    \ для /who2 в файл main.py (пример 16.4).\n\n## Пример 16.4. Получение значения\
    \ из формы POST\n\n```python\nfrom fastapi import FastAPI, Form\n\napp = FastAPI()\n\
    \n@app.post(\"/who2\")\ndef greet3(name: str = Form()):\n    return f\"Hello,\
    \ {name}?\"\n```\n\nПример 16.5 представляет собой файл stuff/form2.html, но с\
    \ оператором get, замененным на post.\n\n## Пример 16.5. Формирование запроса\
    \ POST (static/form2.html)\n\n```html\n<form action=\"http://localhost:8000/who2\"\
    \ method=\"post\">\nSay hello to my little friend:\n<input type=\"text\" name=\"\
    name\">\n<input type=\"submit\">\n</form>\n```\n\nРазбудите свой браузер и попросите\
    \ его получить эту новую форму. Внесите в нее текст **Bob Frapples** и подтвердите\
    \ отправку формы. На этот раз вы получите тот же результат, что и при использовании\
    \ HTTPie:\n\n> \"Hello, Bob Frapples?\"\n\nПоэтому, если отправляете формы из\
    \ HTML-файлов, задействуйте метод POST.\n\n## Шаблоны\n\nВозможно, вам знакома\
    \ игра в слова *Mad Libs*. Игрокам дают последовательность слов — существительных,\
    \ глаголов или чего-то более конкретного, они вставляют их в отмеченные места\
    \ на странице текста. Вставив все слова, нужно прочитать текст — и начинается\
    \ веселье, иногда сопровождаемое неловкостью.\n\nВеб-шаблон — это то же самое,\
    \ но, как правило, без неловкости. Шаблон содержит кучу текста со слотами для\
    \ данных, вставляемых сервером. Его обычное назначение — генерировать HTML с переменным\
    \ содержимым, в отличие от *статического* HTML из главы 15.\n\nПользователи Flask\
    \ хорошо знакомы с его сопутствующим проектом — шаблонизатором Jinja (https://jinja.palletsprojects.com)\
    \ (его часто называют также *Jinja2*). FastAPI поддерживает Jinja и другие шаблонизаторы.\n\
    \nСоздайте каталог `template` рядом с файлом `main.py` для размещения HTML-файлов\
    \ с поддержкой Jinja. Внутри создайте файл `list.html` (пример 16.6).\n\n**Пример\
    \ 16.6.** Определение шаблона файла (template/list.html)\n\n```html\n<html>\n\
    \  <table bgcolor=\"#eeeeee\">\n    <tr>\n      <th colspan=3>Creatures</th>\n\
    \    </tr>\n    <tr>\n      <th>Name</th>\n      <th>Description</th>\n      <th>Country</th>\n\
    \      <th>Area</th>\n      <th>AKA</th>\n    </tr>\n    {% for creature in creatures:\
    \ %}\n    <tr>\n      <td>{{ creature.name }}</td>\n      <td>{{ creature.description\
    \ }}</td>\n      <td>{{ creature.country }}</td>\n      <td>{{ creature.area }}</td>\n\
    \      <td>{{ creature.aka }}</td>\n    </tr>\n    {% endfor %}\n  </table>\n\n\
    \  <br>\n\n  <table bgcolor=\"#dddddd\">\n    <tr>\n      <th colspan=2>Explorers</th>\n\
    \    </tr>\n    <tr>\n      <th>Name</th>\n      <th>Country</th>\n      <th>Description</th>\n\
    \    </tr>\n    {% for explorer in explorers: %}\n    <tr>\n      <td>{{ explorer.name\
    \ }}</td>\n      <td>{{ explorer.country }}</td>\n      <td>{{ explorer.description\
    \ }}</td>\n    </tr>\n    {% endfor %}\n  </table>\n</html>\n```\n\nНеважно, как\
    \ это выглядит, поэтому здесь не используется формальный язык CSS, только древний,\
    \ существовавший еще до появления CSS, атрибут таблицы bgcolor, чтобы обеспечить\
    \ различия между двумя таблицами.\n\nПеременные Python, которые необходимо вставить,\
    \ заключены в двойные фигурные скобки, а в наборы символов {% и %} заключают операторы\
    \ if, циклы for и другие структуры управления. В документации Jinja (https://jinja.palletsprojects.com)\
    \ можно получить полную информацию по синтаксису и примерам.\n\nЭтот шаблон ожидает,\
    \ что ему будут переданы переменные Python creatures и explorers, представляющие\
    \ собой списки объектов Creature и Explorer.\n\nВ примере 16.7 показано, что нужно\
    \ добавить в файл main.py, чтобы установить шаблоны и использовать данные из примера\
    \ 16.6. Код подает переменные creatures и explorers в шаблон, применяя модули\
    \ в фиктивном каталоге из предыдущих глав — эта папка предоставляла тестовые данные,\
    \ если БД была пуста или не подключена.\n\n## Пример 16.7. Настройка шаблонов\
    \ и использование одного из них (main.py)\n\n```python\nfrom pathlib import Path\n\
    from fastapi import FastAPI, Request\nfrom fastapi.templating import Jinja2Templates\n\
    \napp = FastAPI()\n\ntop = Path(__file__).resolve().parent\ntemplate_obj = Jinja2Templates(directory=f\"\
    {top}/template\")\n\n# Получение нескольких небольших предопределенных списков\
    \ наших приятелей:\nfrom fake.creature import fakes as fake_creatures\nfrom fake.explorer\
    \ import fakes as fake_explorers\n\n@app.get(\"/list\")\ndef explorer_list(request:\
    \ Request):\n    return template_obj.TemplateResponse(\"list.html\",\n       \
    \ {\"request\": request,\n        \"explorers\": fake_explorers,\n        \"creatures\"\
    : fake_creatures})\n```\n\nЗадайте своему любимому браузеру или даже тому, который\
    \ вам не очень нравится, адрес http://localhost:8000/list, и вы получите в ответ\
    \ рис. 16.1.\n\n| Name | Description | Country | Area | AKA |\n|---|---|---|---|---|\n\
    | Yeti | Hirsute Himalayan | CN | Himalayas | Abominable Snowman |\n| Bigfoot\
    \ | New world Cousin Eddie of the yeti | US | * | Sasquatch |\n\n| Name | Country\
    \ | Description |\n|---|---|---|\n| Claude Hande | FR | Scarce during full moons\
    \ |\n| Noah Weiser | DE | Myopic machete man |\n\n**Рис. 16.1.** Вывод из каталога\
    \ /list\n\n## Заключение\n\nВ этой главе был дан краткий обзор того, как FastAPI\
    \ работает с темами, не относящимися к API, такими как формы и шаблоны. Наряду\
    \ с рассмотренным в предыдущей главе о файлах, это традиционные минимально необходимые\
    \ веб-задачи, с ними вы часто сталкиваетесь.\n\n# ГЛАВА 17\n\n## Обнаружение и\
    \ визуализация данных\n\n### Обзор\n\nНесмотря на то что в названии фреймворка\
    \ FastAPI фигурирует акроним *API*, он может служить не только для API. В этой\
    \ главе вы узнаете, как создавать таблицы, графики, диаграммы и карты на основе\
    \ данных, используя небольшую базу данных о воображаемых существах со всего мира.\n\
    \n### Python и данные\n\nВ последние несколько лет Python стал очень популярным\
    \ по многим причинам:\n\n- он легок в обучении;\n- у него прозрачный синтаксис;\n\
    - он имеет богатую стандартную библиотеку;\n- в нем огромное количество высококачественных\
    \ пакетов сторонних разработчиков;\n- особое внимание в нем уделяется манипулированию\
    \ данными, преобразованию и самостоятельной проверке."
  mdcn: "## 示例 16.1. 从 GET 表单获取值\n\n```python\nfrom fastapi import FastAPI, Form\n\
    \napp = FastAPI()\n\n@app.get(\"/who2\")\ndef greet2(name: str = Form()):\n  \
    \  return f\"Hello, {name}?\"\n```\n\n主要区别在于，值来自 `Form` 对象，而不是第 3 章中的 `Path`、`Query`\
    \ 等其他对象。\n\n尝试使用 HTTPie 进行表单的初始测试（示例 16.2）（你需要 `-f` 参数，以便以表单编码而非 JSON 格式发送数据）。\n\
    \n## 示例 16.2. 使用 HTTPie 构造 GET 请求\n\n```bash\n$ http -f -b GET localhost:8000/who2\
    \ name=\"Bob Frapples\"\n\"Hello, Bob Frapples?\"\n```\n\n你也可以从标准的 HTML 表单文件发送请求。第\
    \ 15 章展示了如何创建 `static` 目录（可通过 URL `/static` 访问）来存储任何数据，包括 HTML 文件，因此在示例 16.3 中，我们将该文件（`form1.html`）放在此处。\n\
    \n## 示例 16.3. 构造 GET 请求 (static/form1.html)\n\n```html\n<form action=\"http://localhost:8000/who2\"\
    \ method=\"get\">\nSay hello to my little friend:\n<input type=\"text\" name=\"\
    name\" value=\"Bob Frapples\">\n<input type=\"submit\">\n</form>\n```\n\n如果你让浏览器加载页面\
    \ `http://localhost:8000/static/form1.html`，你会看到一个表单。如果输入任何测试字符串，你会得到以下消息：\n\n\
    ```json\n\"detail\":[{\"loc\":[\"body\",\"name\"],\n            \"msg\":\"field\
    \ required\",\n            \"type\":\"value_error.missing\"}]\n```\n\n啊？\n\n查看运行\
    \ Uvicorn 的窗口，看看其日志中写了什么：\n\n```\nINFO:     127.0.0.1:63502 - \"GET /who2?name=rr23r23\
    \ HTTP/1.1\"\n422 Unprocessable Entity\n```\n\n为什么表单将 `name` 变量作为查询参数发送，而我们将其放在了表单字段中？这原来是\
    \ HTML 的一个怪癖，在 W3C 网站（https://oreil.ly/e6CJb）上有记录。此外，如果你的 URL 中有查询参数，它会删除这些参数并用\
    \ `name` 的值替换。\n\n为什么 HTTPie 却能按预期工作？我不知道。这是一个需要了解的不一致之处。\n\n官方的 HTML 魔法公式是将操作从\
    \ GET 改为 POST。因此，我们将在 `main.py` 文件中为 `/who2` 添加一个 POST 端点（示例 16.4）。\n\n## 示例 16.4.\
    \ 从 POST 表单获取值\n\n```python\nfrom fastapi import FastAPI, Form\n\napp = FastAPI()\n\
    \n@app.post(\"/who2\")\ndef greet3(name: str = Form()):\n    return f\"Hello,\
    \ {name}?\"\n```\n\n示例 16.5 是 `stuff/form2.html` 文件，但将 `get` 操作符替换为 `post`。\n\n\
    ## 示例 16.5. 构造 POST 请求 (static/form2.html)\n\n```html\n<form action=\"http://localhost:8000/who2\"\
    \ method=\"post\">\nSay hello to my little friend:\n<input type=\"text\" name=\"\
    name\">\n<input type=\"submit\">\n</form>\n```\n\n唤醒你的浏览器，让它获取这个新表单。在其中输入文本 **Bob\
    \ Frapples** 并确认提交表单。这次你将得到与使用 HTTPie 时相同的结果：\n\n> \"Hello, Bob Frapples?\"\n\n\
    因此，如果从 HTML 文件发送表单，请使用 POST 方法。\n\n## 模板\n\n你可能熟悉文字游戏 *Mad Libs*。玩家会得到一系列词语——名词、动词或更具体的东西，他们将这些词插入到文本页面的标记位置。插入所有词语后，需要阅读文本——乐趣就开始了，有时会伴随着尴尬。\n\
    \nWeb 模板与此类似，但通常没有尴尬。模板包含大量文本，其中留有服务器插入数据的插槽。它的通常目的是生成具有可变内容的 HTML，这与第 15 章的 *静态*\
    \ HTML 不同。\n\nFlask 用户对其配套项目——模板引擎 Jinja（https://jinja.palletsprojects.com）（通常也称为\
    \ *Jinja2*）非常熟悉。FastAPI 支持 Jinja 和其他模板引擎。\n\n在 `main.py` 文件旁边创建一个 `template` 目录，用于存放支持\
    \ Jinja 的 HTML 文件。在其中创建一个 `list.html` 文件（示例 16.6）。\n\n**示例 16.6.** 定义模板文件 (template/list.html)\n\
    \n```html\n<html>\n  <table bgcolor=\"#eeeeee\">\n    <tr>\n      <th colspan=3>Creatures</th>\n\
    \    </tr>\n    <tr>\n      <th>Name</th>\n      <th>Description</th>\n      <th>Country</th>\n\
    \      <th>Area</th>\n      <th>AKA</th>\n    </tr>\n    {% for creature in creatures:\
    \ %}\n    <tr>\n      <td>{{ creature.name }}</td>\n      <td>{{ creature.description\
    \ }}</td>\n      <td>{{ creature.country }}</td>\n      <td>{{ creature.area }}</td>\n\
    \      <td>{{ creature.aka }}</td>\n    </tr>\n    {% endfor %}\n  </table>\n\n\
    \  <br>\n\n  <table bgcolor=\"#dddddd\">\n    <tr>\n      <th colspan=2>Explorers</th>\n\
    \    </tr>\n    <tr>\n      <th>Name</th>\n      <th>Country</th>\n      <th>Description</th>\n\
    \    </tr>\n    {% for explorer in explorers: %}\n    <tr>\n      <td>{{ explorer.name\
    \ }}</td>\n      <td>{{ explorer.country }}</td>\n      <td>{{ explorer.description\
    \ }}</td>\n    </tr>\n    {% endfor %}\n  </table>\n</html>\n```\n\n外观并不重要，因此这里没有使用正式的\
    \ CSS 语言，只使用了古老的、在 CSS 出现之前就存在的表格属性 `bgcolor`，以确保两个表格之间的区别。\n\n需要插入的 Python 变量用双花括号括起来，而\
    \ `if`、`for` 循环和其他控制结构则用字符集 `{%` 和 `%}` 括起来。有关语法和示例的完整信息，请参阅 Jinja 文档（https://jinja.palletsprojects.com）。\n\
    \n此模板期望接收 Python 变量 `creatures` 和 `explorers`，它们代表 `Creature` 和 `Explorer` 对象的列表。\n\
    \n示例 16.7 展示了需要在 `main.py` 文件中添加的内容，以设置模板并使用示例 16.6 中的数据。该代码通过应用前几章中虚拟目录中的模块，将变量\
    \ `creatures` 和 `explorers` 提供给模板——如果数据库为空或未连接，该文件夹会提供测试数据。\n\n## 示例 16.7. 设置模板并使用其中一个\
    \ (main.py)\n\n```python\nfrom pathlib import Path\nfrom fastapi import FastAPI,\
    \ Request\nfrom fastapi.templating import Jinja2Templates\n\napp = FastAPI()\n\
    \ntop = Path(__file__).resolve().parent\ntemplate_obj = Jinja2Templates(directory=f\"\
    {top}/template\")\n\n# 获取几个我们朋友的小型预定义列表：\nfrom fake.creature import fakes as fake_creatures\n\
    from fake.explorer import fakes as fake_explorers\n\n@app.get(\"/list\")\ndef\
    \ explorer_list(request: Request):\n    return template_obj.TemplateResponse(\"\
    list.html\",\n        {\"request\": request,\n        \"explorers\": fake_explorers,\n\
    \        \"creatures\": fake_creatures})\n```\n\n让你喜欢的浏览器，甚至是你不太喜欢的浏览器，访问地址 `http://localhost:8000/list`，你将得到图\
    \ 16.1 的响应。\n\n| Name | Description | Country | Area | AKA |\n|---|---|---|---|---|\n\
    | Yeti | Hirsute Himalayan | CN | Himalayas | Abominable Snowman |\n| Bigfoot\
    \ | New world Cousin Eddie of the yeti | US | * | Sasquatch |\n\n| Name | Country\
    \ | Description |\n|---|---|---|\n| Claude Hande | FR | Scarce during full moons\
    \ |\n| Noah Weiser | DE | Myopic machete man |\n\n**图 16.1.** 从 /list 目录的输出\n\n\
    ## 结论\n\n本章简要介绍了 FastAPI 如何处理与 API 无关的主题，例如表单和模板。连同前一章关于文件的内容，这些是传统的、最小必要的 Web\
    \ 任务，你会经常遇到它们。\n\n# 第 17 章\n\n## 数据发现与可视化\n\n### 概述\n\n尽管 FastAPI 框架的名称中包含 *API*\
    \ 这个缩写，但它不仅可以用于 API。在本章中，你将学习如何基于数据创建表格、图表、图形和地图，使用一个关于来自世界各地的虚构生物的小型数据库。\n\n\
    ### Python 与数据\n\n在过去的几年里，Python 因多种原因变得非常流行：\n\n- 它易于学习；\n- 它具有清晰的语法；\n- 它拥有丰富的标准库；\n\
    - 它有大量高质量的第三方包；\n- 它特别注重数据操作、转换和独立验证。"
