  md: '● *Шаблоны* — язык шаблонов позволяет смешивать текст и код и полезен для контент-ориентированного
    сайта (HTML-текст с динамически вставляемыми данными), а не для сайта с API. Наиболее
    известным пакетом шаблонов Python является Jinja (https://jinja.palletsprojects.com),
    и он поддерживается Flask, Django и FastAPI. У Django есть и собственный язык
    шаблонов (https://oreil.ly/OlbVJ).


    Если вы хотите использовать сетевые методы, выходящие за рамки базового HTTP,
    попробуйте следующие варианты.


    +   ● *Server-sent events* (SSE) — передает данные клиенту по мере необходимости.
    Поддерживается FastAPI (sse-starlette, https://oreil.ly/Hv-QP), Flask (Flask-SSE,
    https://oreil.ly/oz518) и Django (Django EventStream, https://oreil.ly/NiBE5).

    ● *Очереди* — очереди заданий, публикация-подписка и другие сетевые шаблоны поддерживаются
    такими внешними пакетами, как ZeroMQ, Celery, Redis и RabbitMQ.

    ● *WebSockets* — поддерживаются FastAPI (непосредственно), Django (Django Channels,
    https://channels.readthedocs.io) и Flask (сторонние пакеты).


    # Базы данных


    В базовые пакеты Flask и FastAPI не включена работа с базами данных, но она является
    ключевой особенностью Django.


    Уровень данных вашего сайта может обращаться к базе данных на разных уровнях:


    +   ● непосредственно SQL (PostgreSQL, SQLite);

    ● непосредственно NoSQL (Redis, MongoDB, Elasticsearch);

    ● *ORM*, генерирующее SQL;

    ● объектное связывание документов (Object Document Mapping, ODM), генерирующее
    NoSQL.


    Для реляционных баз данных SQLAlchemy (https://www.sqlalchemy.org) — отличный
    пакет, включающий в себя несколько уровней доступа, от прямого SQL до ORM. Это
    обычный выбор для разработчиков Flask и FastAPI. Автор FastAPI использовал как
    SQLAlchemy, так и Pydantic для пакета SQLModel (https://sqlmodel.tiangolo.com)
    — о нем мы подробнее поговорим в главе 14.'
