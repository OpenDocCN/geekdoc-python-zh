    \ с одним и тем же объектом. Если мы свяжем с этой переменной подсказку типа,\
    \ то сможем избежать некоторых ошибок в программировании. Поэтому Python добавил\
    \ подсказки типов к языку, в стандартный модуль типизации. Интерпретатор Python\
    \ игнорирует синтаксис подсказки типа и выполняет программу так, как будто ее\
    \ нет. Тогда в чем смысл?\n\nВ одной строке вы можете рассматривать переменную\
    \ как строку, а потом забыть и присвоить ей объект другого типа. Компиляторы других\
    \ языков будут жаловаться, а Python этого не сделает. Стандартный интерпретатор\
    \ Python отлавливает обычные синтаксические ошибки и исключения времени выполнения,\
    \ но не смешивает типы переменных. Инструменты-помощники, такие как mypy, обращают\
    \ внимание на подсказки типов и предупреждают о любых несоответствиях.\n\nКроме\
    \ того, подсказки доступны разработчикам Python, которые могут написать инструменты,\
    \ выполняющие не только проверку ошибок типов. В следующих разделах описывается,\
    \ как пакет Pydantic был разработан для удовлетворения неочевидных потребностей.\
    \ Позже вы увидите, как его интеграция с FastAPI значительно упрощает решение\
    \ многих вопросов веб-разработки.\n\nКстати, как выглядят подсказки? Существует\
    \ один синтаксис для переменных и другой — для возвращаемых значений функций.\n\
    \nПодсказки типа переменной могут включать только тип:\n\n```\nname: type\n```\n\
    \nили также инициализировать переменную значением:\n\n```\nname: type = value\n\
    ```\n\n*Type* может быть одним из стандартных простых типов Python, таких как\
    \ *int* или *str*, или коллекцией, такой как *tuple*, *list* или *dict*:\n\n```\n\
    thing: str = \"yeti\"\n```\n\nПри использовании Python до версии 3.9 необходимо\
    \ импортировать прописные версии стандартных имен типов из модуля типизации:\n\
    \n```\nfrom typing import Str\nthing: Str = \"yeti\"\n```\n\nВот несколько примеров\
    \ с инициализацией:\n\n```\nphysics_magic_number: float = 1.0/137.03599913\nhp_lovecraft_noun:\
    \ str = \"ichor\"\nexploding_sheep: tuple = \"sis\", \"boom\", \"bah!\"\nresponses:\
    \ dict = {\"Marco\": \"Polo\", \"answer\": 42}\n```\n\nМожно также включать подтипы\
    \ коллекций:\n\n```\nname: dict[keytype, valtype] = {key1: val1, key2: val2}\n\
    ```\n\nМодуль типизации содержит полезные дополнения для подтипов. Наиболее распространенные\
    \ из них следующие:\n\n- Any — любой тип;\n- Union — любой из указанных типов,\
    \ например Union[str, int].\n\nВ Python, начиная с версии 3.10, можно написать\
    \ type1|type2, а не Union[type1, type2].\n\nПримеры определений Pydantic для словарей\
    \ (dict) в Python включают следующее:\n\n```\nfrom typing import Any\nresponses:\
    \ dict[str, Any] = {\"Marco\": \"Polo\", \"answer\": 42}\n```\n\nИли, если быть\
    \ более точными:\n\n```\nfrom typing import Union\nresponses: dict[str, Union[str,\
    \ int]] = {\"Marco\": \"Polo\", \"answer\": 42}\n```\n\nлибо (в Python 3.10 и\
    \ более поздних версиях):\n\n```\nresponses: dict[str, str | int] = {\"Marco\"\
    : \"Polo\", \"answer\": 42}\n```\n\nОбратите внимание на то, что в Python строка\
    \ переменной с подсказкой типа является верной, а простая строка переменной —\
    \ нет:\n\n```\n$ python\n...\n>>> thing0\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name thing0 is not defined\n\
    >>> thing0: str\n```\n\nКроме того, некорректное использование типов не отлавливается\
    \ обычным интерпретатором Python:\n\n```\n$ python\n...\n>>> thing1: str = \"\
    yeti\"\n>>> thing1 = 47\n```\n\nНо такие ошибки будут обнаружены mypy. Если у\
    \ вас еще не установлен этот статический анализатор, наберите команду `pip install\
    \ mypy`. Сохраните две предыдущие строки в файле `stuff.py`¹, а затем попробуйте\
    \ выполнить следующие команды:\n\n```\n$ mypy stuff.py\nstuff.py:2: error: Incompatible\
    \ types in assignment\n(expression has type \"int\", variable has type \"str\"\
    )\nFound 1 error in 1 file (checked 1 source file)\n```\n\nВ подсказке типа возврата\
    \ функции вместо двоеточия применяется стрелка:\n\n```\nfunction(args) -> type:\n\
    ```\n\nВот пример возврата функции при использовании Pydantic:\n\n```\ndef get_thing()\
    \ -> str:\n    return \"yeti\"\n```\n\nМожно задействовать любой тип, включая\
    \ определенные классы или их комбинации. Вы увидите это через несколько страниц.\n\
    \n## Группировка данных\n\nЗачастую нам нужно сохранить связанную группу переменных,\
    \ а не передавать множество отдельных переменных. Как объединить несколько переменных\
    \ в группу и сохранить подсказки типа?\n\nДавайте оставим в прошлом пример с простым\
    \ приветствием из предыдущих глав и начнем использовать более богатые данные.\
    \ Как и в остальных частях этой книги, я буду приводить примеры криптидов (воображаемых\
    \ существ) и исследователей (тоже воображаемых), которые их ищут. Начальные определения\
    \ криптидов будут включать в себя только строковые переменные для следующих параметров:\n\
    \n- name — ключ;\n- country — двухсимвольный код страны согласно стандарту ISO\
    \ (3166-1 alpha 2) или *, что означает «все»;\n- area (необязательный) — штат\
    \ США или другое территориальное образование страны;\n- description — в свободной\
    \ форме;\n- aka — обозначает «также известен как...» (also known as...).\n\nА\
    \ исследователи получат следующие параметры:\n\n- name — ключ;\n- country — двухсимвольный\
    \ код страны согласно стандарту ISO;\n- description — в свободной форме.\n\nИсторические\
    \ структуры группировки данных в Python (помимо базовых int, string и подобных\
    \ им) приведены далее:\n\n- tuple — неизменяемая последовательность объектов (кортеж);\n\
    - list — изменяемая последовательность объектов (список);\n- set — изменяемые\
    \ отдельные объекты (множество);\n- dict — пары изменяемых объектов «ключ — значение»\
    \ (ключ должен быть неизменяемого типа) (словарь).\n\nКортежи (пример 5.1) и списки\
    \ (пример 5.2) позволяют обращаться к переменной-члену только по ее смещению,\
    \ поэтому вам придется запоминать, что куда переместилось.\n\n**Пример 5.1. Использование\
    \ кортежа**\n\n```\n>>> tuple_thing = (\"yeti\", \"CN\", \"Himalayas\",\n    \"\
    Hirsute Himalayan\", \"Abominable Snowman\")\n>>> print(\"Name is\", tuple_thing[0])\n\
    Name is yeti\n```\n\n**Пример 5.2. Использование списка**\n\n```\n>>> list_thing\
    \ = [\"yeti\", \"CN\", \"Himalayas\",\n    \"Hirsute Himalayan\", \"Abominable\
    \ Snowman\"]\n>>> print(\"Name is\", list_thing[0])\nName is yeti\n```\n\nПример\
    \ 5.3 показывает, что вы можете получить немного больше объяснений, определив\
    \ имена для целочисленных смещений.\n\n### Пример 5.3. Использование кортежей\
    \ и именованных смещений\n\n```\n>>> NAME = 0\n>>> COUNTRY = 1\n>>> AREA = 2\n\
    >>> DESCRIPTION = 3\n>>> AKA = 4\n>>> tuple_thing = (\"yeti\", \"CN\", \"Himalayas\"\
    ,\n    \"Hirsute Himalayan\", \"Abominable Snowman\")\n>>> print(\"Name is\",\
    \ tuple_thing[NAME])\nName is yeti\n```\n\nВ примере 5.4 словари выглядят немного\
    \ лучше, предоставляя доступ по описательным ключам.\n\n### Пример 5.4. Использование\
    \ словаря\n\n```\n>>> dict_thing = {\"name\": \"yeti\",\n...     \"country\":\
    \ \"CN\",\n...     \"area\": \"Himalayas\",\n...     \"description\": \"Hirsute\
    \ Himalayan\",\n...     \"aka\": \"Abominable Snowman\"}\n>>> print(\"Name is\"\
    , dict_thing[\"name\"])\nName is yeti\n```\n\nМножества содержат только уникальные\
    \ значения, поэтому они не очень полезны для кластеризации различных переменных.\n\
    \nВ примере 5.5 именованный кортеж — это кортеж, предоставляющий вам доступ по\
    \ целочисленному смещению или имени.\n\n### Пример 5.5. Использование именованного\
    \ кортежа\n\n```\n>>> from collections import namedtuple\n>>> CreatureNamedTuple\
    \ = namedtuple(\"CreatureNamedTuple\",\n...     \"name, country, area, description,\
    \ aka\")\n>>> namedtuple_thing = CreatureNamedTuple(\"yeti\",\n...     \"CN\"\
    ,\n...     \"Himalaya\",\n...     \"Hirsute Himalayan\",\n...     \"Abominable\
    \ Snowman\")\n>>> print(\"Name is\", namedtuple_thing[0])\nName is yeti\n>>> print(\"\
    Name is\", namedtuple_thing.name)\nName is yeti\n```\n\nНельзя написать namedtuple_thing[\"\
    name\"]. Это будет tuple, а не dict, поэтому индекс должен быть целым числом.\n\
    \nВ примере 5.6 определяется новый класс Python под названием **class** и добавляются\
    \ все атрибуты с помощью **self**. Но для их определения вам придется набрать\
    \ много текста.\n\n### Пример 5.6. Использование стандартного класса\n\n```\n\
    >>> class CreatureClass():\n...     def __init__(self,\n...         name: str,\n\
    ...         country: str,\n...         area: str,\n...         description: str,\n\
    ...         aka: str):\n...         self.name = name\n...         self.country\
    \ = country\n...         self.area = area\n...         self.description = description\n\
    ...         self.aka = aka\n...\n>>> class_thing = CreatureClass(\n...     \"\
    yeti\",\n...     \"CN\",\n...     \"Himalayas\",\n...     \"Hirsute Himalayan\"\
    ,\n...     \"Abominable Snowman\")\n>>> print(\"Name is\", class_thing.name)\n\
    Name is yeti\n```\n\nВы можете подумать: что в этом плохого? В обычном классе\
    \ можно добавить больше данных (атрибутов), но особенно много поведения (методов).\
    \ В один безумный день вы можете решить добавить метод для поиска любимых песен\
    \ исследователя. (Это нельзя применить к существам¹.) Но в данном случае речь\
    \ идет о том, чтобы просто без помех перемещать сборки данных между уровнями и\
    \ проверять их на входе и выходе. Кроме того, методы — это квадратные детали,\
    \ которые с трудом помещаются в круглые отверстия базы данных.\n\nЕсть ли в Python\
    \ что-то похожее на то, что в других компьютерных языках называется *записью*\
    \ (record) или *структурой* (struct) (группа имен и значений)? Недавно в Python\
    \ появился класс для хранения данных (dataclass). В примере 5.7 показано, как\
    \ все эти self-выражения исчезают при использовании классов данных.\n\n> ¹ За\
    \ исключением небольшой группы йодлингующих йети (хорошее название для группы)."
  mdcn: "## 类型提示\n\n在标准编程中，一个变量通常与同一个对象关联。如果我们为这个变量绑定一个类型提示，就能避免一些编程错误。因此，Python 将类型提示添加到了语言中，作为标准类型模块的一部分。Python\
    \ 解释器会忽略类型提示的语法，就像它不存在一样执行程序。那么，它的意义何在呢？\n\n简而言之，你可能将一个变量视为字符串，然后忘记这一点并给它赋值另一个类型的对象。其他语言的编译器会报错，但\
    \ Python 不会。标准的 Python 解释器会捕获常见的语法错误和运行时异常，但不会检查变量类型是否混用。像 mypy 这样的辅助工具会关注类型提示，并对任何不匹配发出警告。\n\
    \n此外，类型提示对 Python 开发者开放，他们可以编写不仅限于类型错误检查的工具。接下来的章节将描述 Pydantic 包是如何被开发出来以满足那些不明显的需求的。稍后你将看到，它与\
    \ FastAPI 的集成极大地简化了 Web 开发中的许多问题。\n\n顺便问一下，类型提示长什么样？变量和函数返回值各有一种语法。\n\n变量的类型提示可以只包含类型：\n\
    \n```\nname: type\n```\n\n或者同时用值初始化变量：\n\n```\nname: type = value\n```\n\n*类型*可以是\
    \ Python 的标准简单类型之一，如 *int* 或 *str*，也可以是集合类型，如 *tuple*、*list* 或 *dict*：\n\n```\n\
    thing: str = \"yeti\"\n```\n\n如果使用 Python 3.9 之前的版本，需要从 typing 模块导入标准类型名称的大写版本：\n\
    \n```\nfrom typing import Str\nthing: Str = \"yeti\"\n```\n\n以下是一些带初始化的例子：\n\n\
    ```\nphysics_magic_number: float = 1.0/137.03599913\nhp_lovecraft_noun: str =\
    \ \"ichor\"\nexploding_sheep: tuple = \"sis\", \"boom\", \"bah!\"\nresponses:\
    \ dict = {\"Marco\": \"Polo\", \"answer\": 42}\n```\n\n也可以包含集合的子类型：\n\n```\nname:\
    \ dict[keytype, valtype] = {key1: val1, key2: val2}\n```\n\ntyping 模块为子类型提供了有用的补充。其中最常见的是：\n\
    \n- Any — 任何类型；\n- Union — 指定类型中的任意一种，例如 Union[str, int]。\n\n在 Python 3.10 及更高版本中，可以写成\
    \ type1|type2，而不是 Union[type1, type2]。\n\nPython 中字典（dict）的 Pydantic 定义示例如下：\n\
    \n```\nfrom typing import Any\nresponses: dict[str, Any] = {\"Marco\": \"Polo\"\
    , \"answer\": 42}\n```\n\n或者，更精确地说：\n\n```\nfrom typing import Union\nresponses:\
    \ dict[str, Union[str, int]] = {\"Marco\": \"Polo\", \"answer\": 42}\n```\n\n\
    或者（在 Python 3.10 及更高版本中）：\n\n```\nresponses: dict[str, str | int] = {\"Marco\"\
    : \"Polo\", \"answer\": 42}\n```\n\n请注意，在 Python 中，带有类型提示的变量行是有效的，而简单的变量行则不是：\n\
    \n```\n$ python\n...\n>>> thing0\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nNameError: name thing0 is not defined\n>>> thing0:\
    \ str\n```\n\n此外，标准的 Python 解释器不会捕获不正确的类型使用：\n\n```\n$ python\n...\n>>> thing1:\
    \ str = \"yeti\"\n>>> thing1 = 47\n```\n\n但 mypy 会检测到这类错误。如果你还没有安装这个静态分析器，请输入命令\
    \ `pip install mypy`。将前面两行保存到文件 `stuff.py`¹ 中，然后尝试执行以下命令：\n\n```\n$ mypy stuff.py\n\
    stuff.py:2: error: Incompatible types in assignment\n(expression has type \"int\"\
    , variable has type \"str\")\nFound 1 error in 1 file (checked 1 source file)\n\
    ```\n\n在函数返回值的类型提示中，使用箭头代替冒号：\n\n```\nfunction(args) -> type:\n```\n\n以下是使用 Pydantic\
    \ 时函数返回值的示例：\n\n```\ndef get_thing() -> str:\n    return \"yeti\"\n```\n\n可以使用任何类型，包括已定义的类或它们的组合。你将在几页后看到这一点。\n\
    \n## 数据分组\n\n很多时候，我们需要保存一组相关的变量，而不是传递多个单独的变量。如何将多个变量组合成一组并保留类型提示呢？\n\n让我们告别前面章节中简单的问候示例，开始使用更丰富的数据。与本书的其他部分一样，我将使用隐秘生物（虚构的生物）和寻找它们的研究者（同样是虚构的）作为例子。隐秘生物的初始定义将只包含以下参数的字符串变量：\n\
    \n- name — 键；\n- country — 符合 ISO (3166-1 alpha 2) 标准的双字母国家代码，或 *，表示“所有”；\n- area（可选）—\
    \ 美国的州或该国的其他行政区划；\n- description — 自由格式；\n- aka — 表示“又名...”（also known as...）。\n\
    \n研究者将获得以下参数：\n\n- name — 键；\n- country — 符合 ISO 标准的双字母国家代码；\n- description —\
    \ 自由格式。\n\nPython 中历史上的数据分组结构（除了基本的 int、string 及类似类型）如下：\n\n- tuple — 不可变的对象序列（元组）；\n\
    - list — 可变的对象序列（列表）；\n- set — 可变的独立对象（集合）；\n- dict — 可变对象的“键-值”对（键必须是不可变类型）（字典）。\n\
    \n元组（示例 5.1）和列表（示例 5.2）只能通过偏移量访问成员变量，因此你必须记住哪个位置对应哪个内容。\n\n**示例 5.1. 使用元组**\n\n\
    ```\n>>> tuple_thing = (\"yeti\", \"CN\", \"Himalayas\",\n    \"Hirsute Himalayan\"\
    , \"Abominable Snowman\")\n>>> print(\"Name is\", tuple_thing[0])\nName is yeti\n\
    ```\n\n**示例 5.2. 使用列表**\n\n```\n>>> list_thing = [\"yeti\", \"CN\", \"Himalayas\"\
    ,\n    \"Hirsute Himalayan\", \"Abominable Snowman\"]\n>>> print(\"Name is\",\
    \ list_thing[0])\nName is yeti\n```\n\n示例 5.3 展示了通过为整数偏移量定义名称，可以获得更好的可读性。\n\n\
    ### 示例 5.3. 使用元组和命名偏移量\n\n```\n>>> NAME = 0\n>>> COUNTRY = 1\n>>> AREA = 2\n>>>\
    \ DESCRIPTION = 3\n>>> AKA = 4\n>>> tuple_thing = (\"yeti\", \"CN\", \"Himalayas\"\
    ,\n    \"Hirsute Himalayan\", \"Abominable Snowman\")\n>>> print(\"Name is\",\
    \ tuple_thing[NAME])\nName is yeti\n```\n\n在示例 5.4 中，字典看起来更好一些，提供了通过描述性键进行访问的方式。\n\
    \n### 示例 5.4. 使用字典\n\n```\n>>> dict_thing = {\"name\": \"yeti\",\n...     \"country\"\
    : \"CN\",\n...     \"area\": \"Himalayas\",\n...     \"description\": \"Hirsute\
    \ Himalayan\",\n...     \"aka\": \"Abominable Snowman\"}\n>>> print(\"Name is\"\
    , dict_thing[\"name\"])\nName is yeti\n```\n\n集合只包含唯一值，因此它们对于分组不同的变量不太有用。\n\n\
    在示例 5.5 中，命名元组是一个元组，它允许你通过整数偏移量或名称进行访问。\n\n### 示例 5.5. 使用命名元组\n\n```\n>>> from\
    \ collections import namedtuple\n>>> CreatureNamedTuple = namedtuple(\"CreatureNamedTuple\"\
    ,\n...     \"name, country, area, description, aka\")\n>>> namedtuple_thing =\
    \ CreatureNamedTuple(\"yeti\",\n...     \"CN\",\n...     \"Himalaya\",\n...  \
    \   \"Hirsute Himalayan\",\n...     \"Abominable Snowman\")\n>>> print(\"Name\
    \ is\", namedtuple_thing[0])\nName is yeti\n>>> print(\"Name is\", namedtuple_thing.name)\n\
    Name is yeti\n```\n\n不能写 namedtuple_thing[\"name\"]。因为它是元组而不是字典，所以索引必须是整数。\n\n\
    在示例 5.6 中，定义了一个名为 **class** 的新 Python 类，并使用 **self** 添加了所有属性。但要定义它们，你需要输入大量文本。\n\
    \n### 示例 5.6. 使用标准类\n\n```\n>>> class CreatureClass():\n...     def __init__(self,\n\
    ...         name: str,\n...         country: str,\n...         area: str,\n...\
