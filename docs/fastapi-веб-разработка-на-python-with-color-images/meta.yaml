    .\n[100%]\n1 passed in 0.04s\n```\n\n这种切换导入的方法需要添加环境变量检查，但可以避免为函数调用编写特殊模拟的需要。您可以自行决定更喜欢哪种方式。在接下来的部分中，我们将采用导入方法——它与我在定义代码层时使用的模拟包配合得非常好。\n\
