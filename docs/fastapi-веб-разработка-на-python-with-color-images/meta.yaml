  md: "```\ndef test_json_dump(data):\n    with pytest.raises(Exception):\n      \
    \  _ = json.dumps(data)\n\ndef test_encoder(data):\n    out = jsonable_encoder(data)\n\
    \    assert out\n    json_out = json.dumps(out)\n    assert json_out\n```\n\n\
    # Типы моделей и response_model\n\nВ программе могут быть разные классы с одинаковыми\
    \ полями, но один из них будет специализирован для ввода данных пользователем,\
    \ другой — для вывода, а третий — для внутреннего применения. Причины возникновения\
    \ таких вариантов могут быть следующими.\n\n+   - Удаление из выходных данных\
    \ некоторой конфиденциальной информации — например, деидентификация личных медицинских\
    \ данных, если вы столкнулись с требованиями закона о мобильности и подотчетности\
    \ медицинского страхования (Health Insurance Portability and Accountability Act,\
    \ HIPAA).\n- Добавление поля для ввода пользователем, например даты и времени\
    \ создания.\n\nВ примере 3.33 показаны три связанных класса для нестандартного\
    \ случая.\n\n+   - TagIn — это класс, определяющий, что должен предоставить пользователь\
    \ (в данном случае просто строку под названием tag).\n- Tag создается из класса\
    \ TagIn и добавляет два поля: created (когда объект Tag был создан) и secret (внутренняя\
    \ строка, которая может храниться в базе данных, но никогда не должна оказаться\
    \ в широком доступе).\n- TagOut — это класс, определяющий, что может быть возвращено\
