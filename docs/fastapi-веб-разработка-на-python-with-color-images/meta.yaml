  - '[PAGE 66]


    FastAPI. Как и любой другой веб-фреймворк, Starlette выполняет все обычные операции
    синтаксического анализа HTTP-запросов и генерации ответов. Он аналогичен лежащему
    в основе Flask пакету Werkzeug (https://werkzeug.palletsprojects.com).


    Самая важная его особенность заключается в поддержке современного асинхронного
    веб-стандарта Python — ASGI (https://asgi.readthedocs.io). До сих пор большинство
    веб-фреймворков Python, например Flask и Django, основывались на традиционном
    синхронном стандарте WSGI (https://wsgi.readthedocs.io). ASGI позволяет избежать
    характерных для приложений на базе WSGI блокировок и напряженного ожидания. Проблемы
    такого типа связаны с частым подключением веб-приложений к гораздо более медленному
    коду, например, для доступа к базам данных, файлам и сетям. В результате Starlette
    и использующие его фреймворки стали самыми быстрыми веб-пакетами Python и составили
    конкуренцию даже приложениям на Go и Node.js.


    # Типы конкурентности


    Прежде чем перейти к подробностям поддержки *асинхронности*, предоставляемой Starlette
    и FastAPI, полезно узнать, какими способами можно реализовать *конкурентность*.


    При *параллельных* вычислениях задача распределяется между несколькими выделенными
    центральными процессорами (ЦП). Этот метод часто используется в приложениях для
    выполнения расчетов, таких как задачи обработки графики и машинное обучение.


    При *конкурентных* вычислениях каждый ЦП переключается между несколькими задачами.
    Некоторые задачи из потока занимают больше время, и необходимо сократить общее
    время выполнения. Считывание файла или доступ к удаленному сетевому сервису буквально
    в тысячи и миллионы раз медленнее, чем выполнение вычислений в ЦП.


    Веб-приложения выполняют большую часть этой медленной работы. Как заставить их
    или любые другие серверы работать быстрее? В этом разделе рассматриваются некоторые
    возможности, начиная с общесистемных и заканчивая целевой темой этой главы — реализацией
    конструкций `async` и `await` в FastAPI для Python.'
  - '[PAGE 67]


    # Распределенные и параллельные вычисления


    Если у вас действительно большое приложение — такое, что на одном процессоре оно
    будет работать с трудом, — можете разбить его на части и указать им работать на
    отдельных процессорах на одной или нескольких машинах. Это можно реализовать множеством
    способов, и если у вас есть такое приложение, то вы уже знаете некоторые из них.
    Управление всеми этими частями сложнее и дороже, чем управление одним сервером.


    Здесь основное внимание будем уделять приложениям малого и среднего размера, размещаемым
    на одной машине. В этих приложениях может быть смешан синхронный и асинхронный
    код, и им прекрасно можно управлять с помощью FastAPI.


    # Процессы в операционной системе


    Операционная система (или ОС, потому что печатать длинные слова утомительно) планирует
    использование ресурсов: памяти, процессоров, устройств, сетей и т. д. Каждая запущенная
    программа выполняет свой код в одном или нескольких *процессах*. ОС предоставляет
    каждому из них управляемый, защищенный доступ к ресурсам, включая время работы
    ЦП.


    Большинство систем применяют *вытесняющее* планирование процессов, не позволяя
    ни одному процессу занимать процессор, память или любой другой ресурс. ОС постоянно
    приостанавливает и возобновляет процессы в соответствии со своим системным дизайном
    и настройками.


    Хорошая новость для разработчиков: это не ваша проблема! Но плохая новость (обычно
    затмевающая хорошую) такова: вы не сможете ничего сделать, чтобы изменить это,
    даже если захотите.


    Для приложений Python, требовательных к производительности процессора, обычное
    решение заключается в использовании нескольких процессов, которые передаются под
    управление ОС. В Python для этого существует многопроцессорный модуль ([https://oreil.ly/YO4YE](https://oreil.ly/YO4YE)).


    # Потоки в операционной системе


    Вы также можете запускать *потоки* управления в рамках одного процесса. Для выполнения
    таких задач в Python есть пакет работы с потоками ([https://oreil.ly/xwVB1](https://oreil.ly/xwVB1)).'
- md: '## Зеленые потоки


    Применять потоки рекомендуется, если ваша программа связана с операциями ввода-вывода.
    А использовать множество процессов — в том случае, когда выполнение программы
    ограничено средой процессора. Но потоки сложны в программировании и могут вызывать
    трудные для обнаружения ошибки. В книге *Introducing Python* я сравнивал потоки
    с призраками, которые бродят по дому с привидениями, — они свободные и невидимые,
    обнаружить их можно только по их воздействию. Ой, кто передвинул эту свечу?


    Традиционно в Python библиотеки на основе процессов и библиотеки на основе потоков
    были разделены. Разработчикам требовалось изучать все тонкости и нюансы, чтобы
    использовать их. Более современный пакет под названием concurrent.futures (https://oreil.ly/dT150)
    представляет собой интерфейс более высокого уровня, упрощающий их применение.


    Вскоре вы узнаете, что преимущества потоков легче получить с помощью новых асинхронных
    функций. FastAPI также управляет потоками для обычных синхронных функций (def,
    а не async def) с помощью пулов потоков.


    Более загадочный механизм представлен такими зелеными потоками, как greenlet (https://greenlet.readthedocs.io),
    gevent (http://www.gevent.org) и Eventlet (https://eventlet.net). Они являются
    кооперативными (невытесняющими). Зеленые потоки похожи на потоки ОС, но выполняются
    в пользовательском пространстве (то есть в вашей программе), а не в ядре ОС. Они
    работают путем применения к стандартным функциям Python подхода monkey-patching
    (модификации стандартных функций Python в процессе их выполнения), чтобы параллельный
    код выглядел как обычный последовательный код, — они отдают управление, когда
    блокируют ожидание ввода-вывода.


    Потоки ОС легче (используют меньше памяти), чем процессы ОС, а зеленые потоки
    легче, чем потоки ОС. В некоторых бенчмарках (https://oreil.ly/1NFYb) все асинхронные
    методы в целом оказались быстрее своих синхронных аналогов.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_68_0.png)


    После прочтения этой главы вы можете задать вопрос: какая библиотека лучше — gevent
    или asyncio? Я не думаю, что существует единое мнение относительно предпочтительности
    для всех видов использования. Зеленые потоки были реализованы ранее с помощью
    идей из многопользовательской игры Eve Online. В этой книге рассказывается о стандарте
    Python asyncio, применяемом в FastAPI. Он проще, чем потоки, и дает хорошую производительность.


    ## Обратные вызовы


    Разработчики интерактивных приложений, таких как игры и графические пользовательские
    интерфейсы, наверняка знакомы с *обратными вызовами*. Вы пишете функции и привязываете
    их к какому-либо событию, например к щелчку кнопкой мыши, нажатию клавиши или
    времени. Выдающимся пакетом Python в этой категории является Twisted (https://twisted.org).
    Его название говорит о том, что программы, основанные на обратных вызовах, немного
    «вывернуты наизнанку» и трудно следовать их потоку выполнения.


    ## Генераторы Python


    Как и большинство языков, Python обычно выполняет код последовательно. Когда вы
    вызываете функцию, Python запускает ее с первой строки до конца или до ключевого
    слова `return`.


    Но в функции-генераторе Python вы можете останавливаться и возвращаться из любой
    точки, *а также возвращаться к этой точке позже*. Хитрость заключается в ключевом
    слове `yield`.


    В одном из эпизодов мультсериала «Симпсоны» Гомер врезается на своей машине в
    статую оленя, после чего следуют три реплики диалога. Пример 4.1 определяет обычную
    функцию Python для возврата этих строк с помощью ключевого слова `return` в виде
    списка и их итерации вызывающей стороной.


    **Пример 4.1.** Использование ключевого слова `return`


    ```

    >>> def doh():

    ...     return ["Homer: D''oh!", "Marge: A deer!", "Lisa: A female deer!"]

    ...

    >>> for line in doh():

    ...     print(line)

    ...

    Homer: D''oh!

    Marge: A deer!

    Lisa: A female deer!

    ```


    Этот подход отлично работает, когда списки относительно небольшие. Но что, если
    мы возьмем все диалоги из всех эпизодов «Симпсонов»? Списки занимают много памяти.


    В примере 4.2 показано, как функция-генератор будет выдавать строки.


    ### Пример 4.2. Использование ключевого слова yield


    ```

    >>> def doh2():

    ...     yield "Homer: D''oh!"

    ...     yield "Marge: A deer!"

    ...     yield "Lisa: A female deer!"

    ...

    >>> for line in doh2():

    ...     print(line)

    ...

    Homer: D''oh!

    Marge: A deer!

    Lisa: A female deer!

    ```


    Вместо итерации по списку, возвращаемому простой функцией doh(), мы выполняем
    итерации по *объекту-генератору*, возвращаемому *функцией-генератором* doh2().
    Фактическая итерация (for...in) выглядит так же. Python возвращает первую строку
    из генератора doh2(), но отслеживает, где она находится, для следующей итерации,
    и так продолжается, пока функция не исчерпает диалог.


    Любая функция, содержащая ключевое слово yield, — это функция-генератор. Учитывая
    эту возможность вернуться в середину функции и возобновить выполнение, следующий
    раздел выглядит логичной адаптацией.


    ## Ключевые слова async, await и модуль asyncio из Python


    Функциональные возможности библиотеки asyncio (https://oreil.ly/cBMAc) языка Python
    были представлены в различных выпусках. Вы используете как минимум Python версии
    3.7, и здесь термины async и await стали зарезервированными ключевыми словами.


    В следующих примерах показана шутка, смешная только при асинхронном выполнении.
    Выполните оба примера самостоятельно, потому что тайминг важен. Сначала запустите
    невеселый пример 4.3.


    ### Пример 4.3. Уныло


    ```

    >>> import time

    >>>

    >>> def q():

    ...     print("Why can''t programmers tell jokes?")

    ...     time.sleep(3)

    ...

    >>> def a():

    ...     print("Timing!")

    ...

    >>> def main():

    ...     q()

    ...     a()

    ...

    >>> main()

    Why can''t programmers tell jokes?

    Timing!

    ```


    Между вопросом и ответом будет трехсекундный промежуток. Скукота.


    Но в асинхронном примере 4.4 все немного иначе.


    ### Пример 4.4. Весело


    ```

    >>> import asyncio

    >>>

    >>> async def q():

    ...     print("Why can''t programmers tell jokes?")

    ...     await asyncio.sleep(3)

    ...

    >>> async def a():

    ...     print("Timing!")

    ...

    >>> async def main():

    ...     await asyncio.gather(q(), a())

    ...

    >>> asyncio.run(main())

    Why can''t programmers tell jokes?

    Timing!

    ```


    На этот раз ответ должен появиться сразу после вопроса, затем наступит трехсекундная
    тишина — так, как будто это говорит программист. Ха-ха! Гм.


    > В примере 4.4 я задействовал функции asyncio.gather() и asyncio.run(), но существует
    несколько способов вызова асинхронных функций. При использовании FastAPI они вам
    не понадобятся.


    Python при выполнении примера 4.4 думает так.


    1. Выполню функцию q(). Ну, сейчас это только первая строчка.

    2. Ладно, ты, ленивая асинхронная q(), я установил таймер и вернусь к тебе через
    три секунды.

    3. А пока я выполню функцию a() и сразу же выведу ответ.

    4. Других ключевых слов await нет, так что следует вернуться к выполнению функции
    q().

    5. Скучный цикл событий! Я буду сидеть здесь и ждать все эти три секунды.

    6. Хорошо, наконец-то я закончил.


    В этом примере используется asyncio.sleep() для функции, занимающей некоторое
    время, например для считывания файла или обращения к веб-сайту. Ключевое слово
    await размещается перед функцией, которая может провести большую часть своего
    времени в ожидании. И в этой функции должно быть ключевое слово async до выражения
    def.


    > Если вы определили функцию с помощью async def, ее вызывающая сторона должна
    поместить слово await перед вызовом. Сам вызывающий модуль должен быть объявлен
    с помощью async def, а его вызывающий модуль должен ожидать с помощью слова await
    на протяжении всего времени выполнения.


    Кстати, вы можете объявить функцию как async (асинхронную), даже если она не содержит
    await-вызова другой асинхронной функции. Это не повредит.


    ## FastAPI и асинхронность


    После долгого путешествия по холмам и долам давайте вернемся к FastAPI и к тому,
    почему все это важно.


    Поскольку веб-серверы тратят много времени на ожидание, производительность можно
    повысить, избежав части этого ожидания — иными словами, с помощью конкурентности.
    Другие веб-серверы используют многие из упомянутых ранее методов: потоки, gevent
    и т. д. Одна из причин, по которой FastAPI является одним из самых быстрых веб-фреймворков
    Python, — это включение асинхронного кода благодаря поддержке протокола ASGI в
    пакете Starlette и некоторым собственным изобретениям.


    > Использование ключевых слов async и await само по себе не ускоряет выполнение
    кода. На самом деле такой код может оказаться немного медленнее из-за накладных
    расходов на асинхронную настройку. Основное назначение конструкций async заключается
    в том, чтобы избежать длительного ожидания ввода-вывода.'
  mdcn: '## 绿色线程


    如果您的程序涉及输入输出操作，建议使用线程。而当程序执行受限于处理器环境时，则应使用多进程。但线程编程较为复杂，可能引发难以察觉的错误。在《Python入门》一书中，我曾将线程比作在鬼屋里游荡的幽灵——它们自由且无形，只能通过其影响来察觉。哎呀，是谁移动了这根蜡烛？


    传统上，Python中基于进程的库和基于线程的库是分开的。开发者需要钻研所有细节和微妙之处才能使用它们。一个更现代的包名为`concurrent.futures`（https://oreil.ly/dT150），它提供了一个更高级别的接口，简化了它们的应用。


    您很快会了解到，线程的优势更容易通过新的异步函数来获得。FastAPI也通过线程池管理普通同步函数（`def`，而非`async def`）的线程。


    更神秘的机制体现在诸如`greenlet`（https://greenlet.readthedocs.io）、`gevent`（http://www.gevent.org）和`Eventlet`（https://eventlet.net）这样的绿色线程中。它们是协作式的（非抢占式）。绿色线程类似于操作系统线程，但在用户空间（即您的程序中）执行，而非在操作系统内核中。它们通过采用猴子补丁（在标准Python函数执行过程中修改它们）的方法应用于标准Python函数，使得并行代码看起来像普通的顺序代码——当它们因等待输入输出而阻塞时，会交出控制权。


    操作系统线程比操作系统进程更轻量（占用更少内存），而绿色线程比操作系统线程更轻量。在一些基准测试（https://oreil.ly/1NFYb）中，所有异步方法总体上比其同步对应方法更快。


    ![](img/eacb50a37d89d355fa68de0c62d56b32_68_0.png)


    读完本章后，您可能会问：哪个库更好——`gevent`还是`asyncio`？我认为对于所有使用场景，并不存在统一的偏好意见。绿色线程是早期通过多人在线游戏《EVE
    Online》中的理念实现的。本书讲述的是在FastAPI中应用的Python标准`asyncio`。它比线程更简单，并能提供良好的性能。


    ## 回调


    交互式应用程序（如游戏和图形用户界面）的开发者肯定熟悉*回调*。您编写函数并将其绑定到某个事件，例如鼠标点击、按键或时间。Python中此类别中杰出的包是Twisted（https://twisted.org）。它的名字表明，基于回调的程序有点“颠倒”，难以跟踪其执行流程。


    ## Python生成器


    与大多数语言一样，Python通常顺序执行代码。当您调用函数时，Python会从第一行开始执行，直到结束或遇到`return`关键字。


    但在Python的生成器函数中，您可以从任何点停止并返回，*并且稍后可以返回到该点*。诀窍在于`yield`关键字。


    在动画片《辛普森一家》的一集中，荷马开车撞上了一尊鹿雕像，随后是三句对话。示例4.1定义了一个普通的Python函数，使用`return`关键字以列表形式返回这些行，并由调用方进行迭代。


    **示例4.1.** 使用`return`关键字


    ```

    >>> def doh():

    ...     return ["Homer: D''oh!", "Marge: A deer!", "Lisa: A female deer!"]

    ...

    >>> for line in doh():

    ...     print(line)

    ...

    Homer: D''oh!

    Marge: A deer!

    Lisa: A female deer!

    ```


    当列表相对较小时，这种方法效果很好。但如果我们获取《辛普森一家》所有剧集的所有对话呢？列表会占用大量内存。


    示例4.2展示了生成器函数如何逐行输出。


    ### 示例4.2. 使用`yield`关键字


    ```

    >>> def doh2():

    ...     yield "Homer: D''oh!"

    ...     yield "Marge: A deer!"

    ...     yield "Lisa: A female deer!"

    ...

    >>> for line in doh2():

    ...     print(line)

    ...

    Homer: D''oh!

    Marge: A deer!

    Lisa: A female deer!

    ```


    我们不是迭代普通函数`doh()`返回的列表，而是迭代*生成器函数*`doh2()`返回的*生成器对象*。实际的迭代（`for...in`）看起来是一样的。Python从生成器`doh2()`返回第一行，但会跟踪其位置以便下次迭代，如此持续直到函数耗尽对话。


    任何包含`yield`关键字的函数都是生成器函数。考虑到这种能够返回到函数中间并恢复执行的能力，下一节看起来是合乎逻辑的延伸。


    ## Python的`async`、`await`关键字和`asyncio`模块


    Python的`asyncio`库（https://oreil.ly/cBMAc）的功能在不同版本中逐步引入。您至少使用Python 3.7版本，其中`async`和`await`已成为保留关键字。


    以下示例展示了一个只有在异步执行时才有趣的笑话。请自行运行这两个示例，因为时序很重要。首先运行无趣的示例4.3。


    ### 示例4.3. 乏味


    ```

    >>> import time

    >>>

    >>> def q():

    ...     print("Why can''t programmers tell jokes?")

    ...     time.sleep(3)

    ...

    >>> def a():

    ...     print("Timing!")

    ...

    >>> def main():

    ...     q()

    ...     a()

    ...

    >>> main()

    Why can''t programmers tell jokes?

    Timing!

    ```


    问题和回答之间会有三秒钟的间隔。很无聊。


    但在异步示例4.4中，情况有所不同。


    ### 示例4.4. 有趣


    ```

    >>> import asyncio

    >>>

    >>> async def q():

    ...     print("Why can''t programmers tell jokes?")

    ...     await asyncio.sleep(3)

    ...

    >>> async def a():

    ...     print("Timing!")

    ...

    >>> async def main():

    ...     await asyncio.gather(q(), a())

    ...

    >>> asyncio.run(main())

    Why can''t programmers tell jokes?

    Timing!

    ```


    这次回答应该在问题之后立即出现，然后是三秒钟的沉默——就像程序员说话一样。哈哈！嗯。


    > 在示例4.4中，我使用了`asyncio.gather()`和`asyncio.run()`函数，但调用异步函数有多种方式。使用FastAPI时，您不需要它们。


    Python执行示例4.4时的思考过程如下。


    1.  执行函数`q()`。嗯，现在只执行第一行。

    2.  好吧，你这个懒惰的异步`q()`，我设置了计时器，三秒后回来找你。

    3.  同时，我执行函数`a()`并立即输出答案。

    4.  没有其他`await`关键字了，所以应该返回继续执行函数`q()`。

    5.  无聊的事件循环！我会坐在这里等待这整整三秒钟。

    6.  好了，终于完成了。


    此示例使用`asyncio.sleep()`来模拟需要一些时间的函数，例如读取文件或访问网站。`await`关键字放置在可能大部分时间都在等待的函数之前。并且在该函数中，`def`表达式之前必须有`async`关键字。


    > 如果您使用`async def`定义了函数，其调用方必须在调用前放置`await`。调用模块本身必须使用`async def`声明，并且其调用模块必须在整个执行过程中使用`await`等待。


    顺便说一下，即使函数不包含对其他异步函数的`await`调用，您也可以将其声明为`async`（异步）。这不会造成问题。


    ## FastAPI与异步


    经过漫长的探索，让我们回到FastAPI以及这一切为何重要。


    由于Web服务器花费大量时间在等待上，可以通过避免部分等待来提高性能——换句话说，通过并发性。其他Web服务器使用了许多前面提到的方法：线程、`gevent`等。FastAPI成为最快的Python
    Web框架之一的原因之一，是通过Starlette包对ASGI协议的支持以及一些自身的创新，引入了异步代码。


    > 仅使用`async`和`await`关键字本身并不会加速代码执行。实际上，由于异步设置的开销，这样的代码可能稍慢一些。`async`构造的主要目的是避免长时间的输入输出等待。'
