  md: '# ГЛАВА 11


    # Аутентификация и авторизация


    > Уважай мою власть!

    Эрик Картман

    (мультсериал «Южный парк»)


    # Обзор


    Иногда веб-сайт предоставляет широкий доступ, и любой посетитель может зайти на
    любую страницу. Но если содержимое сайта может быть изменено, некоторые конечные
    точки будут ограничены для определенных людей или групп. Если бы каждый мог изменять
    страницы на Amazon, представьте, сколько странных товаров появилось бы на них
    и какие удивительные покупки получили бы некоторые люди. К сожалению, такова человеческая
    природа — некоторые люди пользуются остальными, уплачивающими скрытый налог за
    свои действия.


    Стоит ли оставить наш сайт о криптидах открытым для доступа любых пользователей
    к любой конечной точке? Нет! Практически любой крупный веб-сервис в конечном счете
    должен решать следующие задачи.


    +   - Аутентификация (authn). Кто вы?

    - Авторизация (authz). Что вам нужно?


    Должен ли код аутентификации и авторизации (auth) получить собственный новый уровень,
    скажем, между сервисным и веб-уровнями? Или же все должно решаться сервисным или
    веб-уровнем самостоятельно? В этой главе вы узнаете о методах аутентификации и
    о том, где их использовать.'
