    # Сравнение фреймворков


    > Вам не нужен каркас. Вам нужна картина, а не ее рама¹.


    Клаус Кински, актер


    # Обзор


    Для разработчиков, ранее использовавших Flask, Django или другие популярные веб-фреймворки
    Python, эта глава указывает на их сходство с FastAPI и отличия от него. Здесь
    не рассматриваются все утомительные подробности, потому что иначе клей для переплета
    не удержит эту книгу целой. Сравнения, приведенные здесь, могут быть полезны,
    если вы думаете о переносе приложения с одного из этих фреймворков на FastAPI
    или просто любопытствуете.


    Одна из первых вещей, которую вы можете узнать о новом веб-фреймворке, — это как
    начать работу, и путь сверху вниз — это определение маршрутов (связки между URL-адресами
    и HTTP-методами и функциями). В следующем разделе мы сравним, как выполнить эту
    задачу с помощью FastAPI и Flask, поскольку они более похожи друг на друга, чем
    Django, и, скорее всего, будут рассматриваться вместе для похожих приложений.


    ¹ Цитата отражает некую игру слов, поскольку в английском языке слово framework
    означает каркас, а не только привычный разработчикам фреймворк. — Примеч. пер.'
