    # Обзор


    Помимо обработки API-запросов и традиционного контента, например HTML, веб-серверы
    должны обрабатывать передачу файлов в обоих направлениях. Очень большие файлы
    могут передаваться *частями*, чтобы не занимать много памяти системы. Вы также
    можете предоставить доступ к папке с файлами (и подчиненными папками любой глубины)
    с помощью статических файлов — Static Files.


    # Поддержка Multipart


    Чтобы обрабатывать большие файлы, функции выгрузки и скачивания FastAPI нуждаются
    в следующих дополнительных модулях:


    +   - *Python-Multipart* (https://oreil.ly/FUBk7) — pip install python-multipart;

    - *aio-files* (https://oreil.ly/OZYYR) — pip install aiofiles.


    # Выгрузка файлов


    FastAPI нацелен на разработку API, и в большинстве примеров в этой книге используются
    запросы и ответы в формате JSON. Но в следующей главе вы познакомитесь с формами,
    которые обрабатываются по-другому. Здесь же рассказывается о файлах, по некоторым
    параметрам похожих на формы.


    FastAPI предлагает два способа выгрузки файлов: функцию File() и класс UploadFile.'
  - "[PAGE 234]\n\n# Функция File()\n\nФункция File() применяется в качестве типа\
    \ для прямой выгрузки файла. Ваша функция пути может быть синхронной (def) или\
    \ асинхронной (async def), но асинхронная версия лучше, потому что она не будет\
    \ нагружать веб-сервер во время выгрузки файла.\n\nFastAPI будет извлекать файл\
    \ по частям и собирать его в памяти, поэтому функцию File() следует использовать\
    \ только для относительно небольших файлов. Вместо того чтобы считать, что входные\
    \ данные представлены в формате JSON, FastAPI кодирует файл как элемент формы.\n\
    \nНапишем код для запроса файла и протестируем его. Вы можете взять любой файл\
    \ на своей машине для тестирования или загрузить его с такого сайта, как Fastest\
