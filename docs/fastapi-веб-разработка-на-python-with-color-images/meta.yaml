  md: "# Создание фиктивных данных\n\nРаботая сверху вниз, вы будете дублировать некоторые\
    \ функции на всех трех уровнях. Чтобы сэкономить на вводе текста, в примере 8.12\
    \ введу каталог верхнего уровня под названием fake. В нем находятся модули, предоставляющие\
    \ фиктивные данные об исследователях и существах.\n\nПример 8.12. Новый модуль\
    \ в файле fake/explorer.py\n\n```\nfrom model.explorer import Explorer\n\n# фиктивные\
    \ данные, в главе 10 они будут заменены на реальную базу данных и SQL\n_explorers\
    \ = [\n    Explorer(name=\"Claude Hande\",\n             country=\"FR\",\n   \
    \          description=\"Scarce during full moons\"),\n    Explorer(name=\"Noah\
    \ Weiser\",\n             country=\"DE\",\n             description=\"Myopic machete\
    \ man\"),\n]\n\ndef get_all() -> list[Explorer]:\n    \"\"\"Возврат всех исследователей\"\
    \"\"\n    return _explorers\n\ndef get_one(name: str) -> Explorer | None:\n  \
    \  for _explorer in _explorers:\n        if _explorer.name == name:\n        \
    \    return _explorer\n    return None\n\n# Приведенные ниже варианты пока не\
    \ функциональны,\n# поэтому они просто делают вид, что работают,\n# не изменяя\
    \ реальный фиктивный список\ndef create(explorer: Explorer) -> Explorer:\n   \
    \ \"\"\"Добавление исследователя\"\"\"\n    return explorer\n\ndef modify(explorer:\
