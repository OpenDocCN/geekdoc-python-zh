    \ конечная точка (hello.py)\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi\")\ndef greet():\n    return \"Hello? World?\"\n```\n\nНужно\
    \ обратить внимание на следующие моменты.\n\n+   - app — это объект FastAPI верхнего\
