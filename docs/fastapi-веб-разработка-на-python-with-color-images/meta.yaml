    # Паттерн «Репозиторий»


    Хотя я не использовал его в этой книге, но паттерн «Репозиторий» (https://oreil.ly/3JMKH)
    представляет собой интересный подход. Репозиторий — это простое промежуточное
    хранилище данных в оперативной памяти, подобное представленному ранее уровню фиктивных
    данных. Затем он связывается с подключаемыми базками данных для реальных баз данных.
    Репозиторий сопровождается паттерном Unit of Work (https://oreil.ly/jHGV8), гарантирующим,
    что либо будет зафиксирована группа операций в одной сессии, либо выполнен откат,
    как для единого фрагмента.


    До сих пор запросы к базе данных в этой книге были атомарными. На практике для
    работы с базами данных вам могут понадобиться многоэтапные запросы и определенная
    обработка сессий. Паттерн «Репозиторий» сочетается также с внедрением зависимостей
    (https://oreil.ly/0f0Q3), с которым вы уже сталкивались в других частях этой книги
    и которое, вероятно, уже немного оценили.


    # Автоматизированные полные тесты


    При полном или сквозном тестировании используются все слои одновременно — этот
    метод максимально приближен к производственному применению. Большинство описанных
    ранее тестов были полными: вызов конечной точки веб-приложения, путешествие через
    Сервисград в центр Даннынбурга и возвращение с продуктами. Это закрытые тесты.
    Все происходит в реальном времени, и вам неважно, как это происходит, — важно,
    что это происходит.


    Вы можете полностью протестировать каждую конечную точку в общем API двумя способами.


    +   - С помощью HTTP/HTTPS напишите отдельные обращающиеся к серверу тестовые
    клиенты Python. Во многих примерах, приведенных в книге, это'
