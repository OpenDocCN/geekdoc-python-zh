    # Что тестировать


    Что нужно тестировать в процессе написания кода? По сути, необходимо подтвердить,
    что при заданных входных данных вы получите правильные выходные данные.


    Можно проверить следующие моменты:


    +   - ошибочный ввод;

    - дублирование ввода;

    - неправильные типы ввода;

    - неправильный порядок ввода;

    - недопустимые значения ввода;

    - огромные входные и выходные массивы данных.


    Ошибки могут возникнуть где угодно.


    +   - *Веб-уровень* — Pydantic отловит любое несоответствие модели и вернет код
    состояния HTTP 422.

    - *Уровень данных* — база данных будет выдавать исключения при отсутствии или
    дублировании данных, а также при ошибках синтаксиса SQL-запросов. При передаче
    результата данных огромного размера одним куском, а не фрагментами с помощью генератора
    или пагинации могут возникать тайм-ауты или истощение памяти.

    - *Любой уровень* — могут быть допущены обычные ошибки и недочеты.


    Главы 8–10 содержат некоторые из этих тестов:


    +   - *полное тестирование вручную* с использованием таких инструментов, как HTTPie;

    - модульное тестирование вручную в виде фрагментов Python;

    - *автоматизированные тесты* с помощью скриптов pytest.


    В следующих нескольких разделах мы подробно рассмотрим pytest.'
- md: "## Pytest\n\nВ Python уже давно существует стандартный пакет unittest (https://oreil.ly/3u0M_).\
    \ Более поздний пакет стороннего производителя под названием nose (https://nose.readthedocs.io)\
    \ представляет собой попытку улучшить его. Большинство разработчиков Python сейчас\
    \ предпочитают фреймворк pytest (https://docs.pytest.org), который выполняет больше\
    \ задач, чем любой из перечисленных ранее, и более прост в использовании. Он не\
    \ встроен в Python, поэтому при необходимости нужно будет выполнить команду pip\
    \ install pytest. Также запустите команду pip install pytestmock, чтобы получить\
    \ автоматическую фикстуру mocker — вы увидите ее позже в этой главе.\n\nЧто предлагает\
    \ pytest? Приятные автоматические функции включают следующее.\n\n- *Обнаружение\
    \ тестирования* — тест для файла Python с префиксом test_ или суффиксом _test\
    \ в имени будет запущен автоматически. Это сопоставление имен файлов переходит\
    \ в подкаталоги, выполняя столько тестов, сколько в них содержится.\n- *Подробности\
    \ отказа с конструкцией Assert* — оператор выявления ошибок assert выводит то,\
    \ что ожидалось, и то, что произошло на самом деле.\n- *Фикстуры* — эти функции\
    \ могут запускаться один раз для всего тестового скрипта или выполняться для каждого\
    \ теста (его области видимости), предоставляя тестовым функциям такие параметры,\
    \ как стандартные тестовые данные или инициализация базы данных. Фикстуры — это\
    \ своего рода внедрение зависимости, подобное предлагаемому FastAPI для функций\
    \ пути веб-приложения, — конкретные данные передаются общей тестовой функции.\n\
    - *Параметризация* — обеспечивает несколько тестовых данных для тестовой функции.\n\
    \n## Макет\n\nГде разместить тесты? Похоже, что единого мнения нет, но вот два\
    \ разумных варианта:\n\n- каталог test на верхнем уровне с подкаталогами для тестируемой\
    \ области кода, например web, service и т. д.;\n- каталог test под каждым каталогом\
    \ кода, например web, service и т. д.\n\nКроме того, в рамках конкретного подкаталога\
    \ test/web следует создать дополнительные каталоги для различных типов тестов\
    \ — модульных, интеграционных и полных. В книге я использую такую иерархию:\n\n\
    ```\ntest\n├── unit\n│   ├── web\n│   ├── service\n│   └── data\n├── integration\n\
    └── full\n```\n\nОтдельные тестовые скрипты находятся в каталогах нижнего уровня.\
    \ Они рассматриваются в этой главе.\n\n## Автоматизированные модульные тесты\n\
    \nМодульный тест должен проверять что-то одно в пределах одного уровня. Обычно\
    \ это означает передачу параметра (-ов) в функцию и утверждение того, что должно\
    \ быть возвращено.\n\nМодульные тесты требуют *изоляции* тестируемого кода. Если\
    \ ее нет, значит, вы тестируете и еще какую-то часть кода. Итак, как же изолировать\
    \ код для модульных тестов?\n\n## Макетирование\n\nВ стеке кода этой книги обращение\
    \ к URL-адресу через веб-интерфейс обычно вызывает функцию на веб-уровне, вызывающую\
    \ функцию на сервисном уровне. Далее уже она вызывает функцию на уровне данных,\
    \ обращающуюся к базе данных. Результаты возвращаются по цепочке, в конечном счете\
    \ обратно с веб-уровня до вызывающей стороны.\n\nМодульное тестирование на первый\
    \ взгляд выглядит просто. Для каждой функции, имеющейся в вашей кодовой базе,\
    \ передаются тестовые аргументы, и требуется убедиться, что она возвращает ожидаемые\
    \ значения. Это хорошо работает для *чистой функции*, принимающей входные аргументы\
    \ и возвращающей ответы без обращения к какому-либо внешнему коду. Но большинство\
    \ функций также вызывают другие функции. Каким же образом можно контролировать\
    \ то, что делают другие функции? А как насчет данных, поступающих из внешних источников?\
    \ Наиболее распространенным внешним фактором, требующим контроля, является доступ\
    \ к базе данных, но на самом деле это может быть что угодно.\n\nОдин из методов\
    \ заключается в том, чтобы создавать *макет* каждого вызова внешней функции. Поскольку\
    \ функции в Python являются объектами первого класса, можно одну функцию заменить\
    \ другой. В пакете unittest есть модуль mock, он выполняет эту операцию.\n\nМногие\
    \ разработчики считают, что макетирование — это лучший способ изолировать модульные\
    \ тесты. Сначала я покажу примеры макетирования, а также приведу аргумент, что\
    \ часто макеты требуют слишком много знаний о том, как работает ваш код, а не\
    \ о результатах. Вам могут быть знакомы термины «структурное тестирование» (как\
    \ в макетировании, где тестируемый код вполне нагляден) и «поведенческое тестирование»\
    \ (внутренняя структура кода не нужна). Примеры 12.1 и 12.2 определяют модули\
    \ mod1.py и mod2.py соответственно.\n\n### Пример 12.1. Вызываемый модуль (mod1.py)\n\
    \n```\ndef preamble() -> str:\n    return \"The sum is \"\n```\n\n### Пример 12.2.\
    \ Вызывающий модуль (mod2.py)\n\n```\nimport mod1\n\ndef summer(x: int, y:int)\
    \ -> str:\n    return mod1.preamble() + f\"{x+y}\"\n```\n\nФункция summer() вычисляет\
    \ сумму своих аргументов и возвращает строку с результатом функции preamble и\
    \ суммой. Пример 12.3 представляет собой минимальный скрипт pytest для проверки\
    \ функции summer().\n\n### Пример 12.3. Скрипт Pytest test_summer1.py\n\n```\n\
    import mod2\n\ndef test_summer():\n    assert \"The sum is 11\" == mod2.summer(5,6)\n\
    ```\n\nВ примере 12.4 тест выполняется успешно.\n\n### Пример 12.4. Запуск скрипта\
    \ pytest\n\n```\n$ pytest -q test_summer1.py\n.\n[100%]\n1 passed in 0.04s\n```\n\
    \n(Аргумент -q выполняет тест тихо, не выводя лишних деталей.) Хорошо, он оказался\
    \ успешным. Но функция summer() получила текст из функции preamble. А если нам\
    \ просто требуется проверить, что добавление прошло успешно?\n\nМожно написать\
    \ новую функцию, возвращающую строковую сумму двух чисел, а затем переписать функцию\
    \ summer(), чтобы она возвращала эту сумму, добавленную к строке в preamble().\
    \ Или можно создать макет функции preamble(), чтобы убрать ее влияние, как показано\
    \ в примере 12.5.\n\n### Пример 12.5. Скрипт Pytest с макетом (test_summer2.py)\n\
    \n```\nfrom unittest import mock\nimport mod1\nimport mod2\n\ndef test_summer_a():\n\
    \    with mock.patch(\"mod1.preamble\", return_value=\"\"):\n        assert \"\
    11\" == mod2.summer(5,6)\n\ndef test_summer_b():\n    with mock.patch(\"mod1.preamble\"\
    ) as mock_preamble:\n        mock_preamble.return_value=\"\"\n        assert \"\
    11\" == mod2.summer(5,6)\n\n@mock.patch(\"mod1.preamble\", return_value=\"\")\n\
    def test_summer_c(mock_preamble):\n    assert \"11\" == mod2.summer(5,6)\n\n@mock.patch(\"\
    mod1.preamble\")\ndef test_caller_d(mock_preamble):\n    mock_preamble.return_value\
    \ = \"\"\n    assert \"11\" == mod2.summer(5,6)\n```\n\nЭти тесты показывают,\
    \ что макеты можно создавать более чем одним способом. Функция test_caller_a()\
    \ использует mock.patch() в качестве менеджера контекста Python (оператор with).\
    \ Его аргументы приведены далее:\n\n- \"mod1.preamble\" — полное строковое имя\
    \ функции preamble() в модуле mod1;\n- return_value=\"\" — указывает макетированной\
    \ версии возвращать пустую строку.\n\nФункция test_caller_b() представляет собой\
    \ почти то же самое, но добавляет выражение as mock_preamble, чтобы использовать\
    \ объект макета в следующей строке.\n\nФункция `test_caller_c()` определяет макет\
    \ с помощью *декоратора* Python. Объект макета передается в качестве аргумента\
    \ в функции `test_caller2()`.\n\nФункция `test_caller_d()` подобна `test_caller_b()`\
    \ и задает аргумент `return_value` в отдельном вызове к `mock_preamble`.\n\nВ\
    \ каждом случае строковое имя объекта макета должно совпадать с тем, как он вызывается\
    \ в тестируемом коде, — в данном случае `summer()`. Библиотека макетов преобразует\
    \ это строковое имя в переменную, перехватывающую все ссылки на исходную переменную\
    \ с таким именем. (Помните, что в Python переменные — это просто ссылки на реальные\
    \ объекты.)\n\nТаким образом, в примере 12.6 во всех четырех тестовых функциях\
    \ `summer()` при вызове `summer(5,6)` вместо настоящей функции вызывается изменяющийся\
    \ макет `preamble()`. В макетированной версии эта строка отбрасывается, поэтому\
    \ тест может убедиться, что функция `summer()` возвращает строковую версию суммы\
    \ двух своих аргументов.\n\n### Пример 12.6. Запуск макетированного скрипта pytest\n\
    \n```\n$ pytest -q test_summer2.py\n.....\n[100%]\n4 passed in 0.13s\n```\n\n\
    Это был выдуманный случай, для простоты. Макетирование может быть довольно сложным.\
    \ Наглядные примеры можно изучить в таких статьях, как Understanding the Python\
    \ Mock Object Library Алекса Ронкило (https://oreil.ly/I0bkd). А пугающие подробности\
    \ есть в официальной документации Python (https://oreil.ly/hN9lZ).\n\n## Тестовые\
    \ дублеры и фиктивные объекты\n\nЧтобы выполнить макетирование, вам нужно знать,\
    \ что функция `summer()` импортирует функцию `preamble()` из модуля `mod1`. Это\
    \ был структурный тест, требующий знания специфических имен переменных и модулей.\n\
    \nЕсть ли способ провести поведенческий тест, в котором это не требуется?\n\n\
    Один из способов — определить *дублер* (иногда его называют *дубликатом* или *двойником*).\
    \ Это отдельный код, выполняющий то, что мы хотим получить в тесте, — в данном\
    \ случае, чтобы функция `preamble()` возвращала пустую строку. Одна из возможностей\
    \ сделать это — импорт. Сначала примените этот подход"
  mdcn: "## Pytest\n\nPython 中早已存在标准包 `unittest`（https://oreil.ly/3u0M_）。后来出现的第三方包\
    \ `nose`（https://nose.readthedocs.io）试图对其进行改进。目前大多数 Python 开发者更倾向于使用 `pytest`\
    \ 框架（https://docs.pytest.org），它比之前提到的任何框架功能更强大，也更易于使用。它并非 Python 内置，因此需要时需执行 `pip\
    \ install pytest` 命令安装。同时运行 `pip install pytestmock` 命令以获取自动化的 `mocker` fixture——你将在本章后面看到它。\n\
    \npytest 提供了哪些功能？其便捷的自动化特性包括：\n\n- *测试发现*——文件名以 `test_` 为前缀或以 `_test` 为后缀的 Python\
    \ 文件中的测试将被自动执行。这种文件名匹配规则会递归到子目录，执行其中包含的所有测试。\n- *详细的失败信息与断言构造*——断言语句会输出预期结果与实际发生的情况。\n\
    - *Fixture*——这些函数可以为整个测试脚本运行一次，也可以为每个测试（在其作用域内）执行，为测试函数提供诸如标准测试数据或数据库初始化等参数。Fixture\
    \ 是一种依赖注入机制，类似于 FastAPI 为 Web 应用路径函数提供的功能——将具体数据传递给通用的测试函数。\n- *参数化*——为测试函数提供多组测试数据。\n\
    \n## 布局\n\n测试应该放在哪里？似乎没有统一的意见，但以下是两种合理的方案：\n\n- 在顶层创建 `test` 目录，并为被测试的代码区域（如 `web`、`service`\
    \ 等）创建子目录；\n- 在每个代码目录（如 `web`、`service` 等）下创建 `test` 子目录。\n\n此外，在具体的 `test/web`\
    \ 子目录内，应为不同类型的测试（单元测试、集成测试和完整测试）创建额外的子目录。本书中我使用以下层级结构：\n\n```\ntest\n├── unit\n\
    │   ├── web\n│   ├── service\n│   └── data\n├── integration\n└── full\n```\n\n\
    单独的测试脚本位于最底层的目录中。本章将讨论这些内容。\n\n## 自动化单元测试\n\n单元测试应仅验证单一层级内的某项功能。通常这意味着向函数传递参数，并断言其应返回的结果。\n\
    \n单元测试要求被测代码具有*隔离性*。如果没有隔离，那么你测试的可能还包括其他代码部分。那么，如何为单元测试隔离代码呢？\n\n## Mock（模拟）\n\
    \n在本书的代码栈中，通过 Web 界面访问 URL 通常会调用 Web 层的函数，该函数再调用服务层的函数。接着，服务层函数调用数据层的函数来访问数据库。结果沿调用链返回，最终从\
    \ Web 层返回给调用方。\n\n单元测试乍看很简单。对于代码库中的每个函数，传入测试参数，并验证其是否返回预期值。这对于*纯函数*（接受输入参数并返回结果，不依赖任何外部代码）来说效果很好。但大多数函数还会调用其他函数。那么，如何控制其他函数的行为呢？对于来自外部源的数据又该如何处理？最常见的需要控制的外部因素是数据库访问，但实际上它可能是任何东西。\n\
    \n一种方法是为每个外部函数调用创建一个 *mock*（模拟对象）。由于 Python 中的函数是一等对象，可以用一个函数替换另一个。`unittest`\
    \ 包中有一个 `mock` 模块，正是执行此操作的。\n\n许多开发者认为 mock 是隔离单元测试的最佳方式。我将首先展示 mock 的示例，并论证一个观点：mock\
    \ 通常需要过多了解代码的内部工作原理，而非其结果。你可能熟悉“结构测试”（如 mock，被测代码结构清晰可见）和“行为测试”（不需要了解代码内部结构）这两个术语。示例\
    \ 12.1 和 12.2 分别定义了模块 `mod1.py` 和 `mod2.py`。\n\n### 示例 12.1. 被调用模块 (mod1.py)\n\
    \n```\ndef preamble() -> str:\n    return \"The sum is \"\n```\n\n### 示例 12.2.\
    \ 调用模块 (mod2.py)\n\n```\nimport mod1\n\ndef summer(x: int, y:int) -> str:\n  \
    \  return mod1.preamble() + f\"{x+y}\"\n```\n\n函数 `summer()` 计算其参数的和，并返回一个包含 `preamble`\
    \ 函数结果和总和的字符串。示例 12.3 是一个用于测试 `summer()` 函数的最小化 pytest 脚本。\n\n### 示例 12.3. Pytest\
    \ 脚本 test_summer1.py\n\n```\nimport mod2\n\ndef test_summer():\n    assert \"\
    The sum is 11\" == mod2.summer(5,6)\n```\n\n在示例 12.4 中，测试成功执行。\n\n### 示例 12.4.\
    \ 运行 pytest 脚本\n\n```\n$ pytest -q test_summer1.py\n.\n[100%]\n1 passed in 0.04s\n\
    ```\n\n（`-q` 参数使测试静默运行，不输出多余细节。）很好，测试通过了。但 `summer()` 函数从 `preamble()` 函数获取了文本。如果我们只想验证加法运算是否正确呢？\n\
    \n可以编写一个新函数，返回两个数字的字符串和，然后重写 `summer()` 函数，使其返回该和并附加到 `preamble()` 的字符串中。或者，可以创建一个\
    \ `preamble()` 函数的 mock，以消除其影响，如示例 12.5 所示。\n\n### 示例 12.5. 使用 mock 的 Pytest 脚本\
    \ (test_summer2.py)\n\n```\nfrom unittest import mock\nimport mod1\nimport mod2\n\
    \ndef test_summer_a():\n    with mock.patch(\"mod1.preamble\", return_value=\"\
    \"):\n        assert \"11\" == mod2.summer(5,6)\n\ndef test_summer_b():\n    with\
    \ mock.patch(\"mod1.preamble\") as mock_preamble:\n        mock_preamble.return_value=\"\
    \"\n        assert \"11\" == mod2.summer(5,6)\n\n@mock.patch(\"mod1.preamble\"\
    , return_value=\"\")\ndef test_summer_c(mock_preamble):\n    assert \"11\" ==\
    \ mod2.summer(5,6)\n\n@mock.patch(\"mod1.preamble\")\ndef test_caller_d(mock_preamble):\n\
    \    mock_preamble.return_value = \"\"\n    assert \"11\" == mod2.summer(5,6)\n\
    ```\n\n这些测试表明，创建 mock 有多种方式。函数 `test_caller_a()` 使用 `mock.patch()` 作为 Python 的上下文管理器（`with`\
    \ 语句）。其参数如下：\n\n- `\"mod1.preamble\"` —— 模块 `mod1` 中函数 `preamble()` 的完整字符串名称；\n\
    - `return_value=\"\"` —— 指定 mock 版本返回空字符串。\n\n函数 `test_caller_b()` 几乎相同，但添加了 `as\
    \ mock_preamble` 表达式，以便在下一行使用 mock 对象。\n\n函数 `test_caller_c()` 使用 Python *装饰器*\
    \ 定义 mock。mock 对象作为参数传递给 `test_caller2()` 函数。\n\n函数 `test_caller_d()` 类似于 `test_caller_b()`，在单独的\
    \ `mock_preamble` 调用中设置 `return_value` 参数。\n\n在每种情况下，mock 对象的字符串名称必须与被测代码中的调用方式一致——在本例中是\
    \ `summer()`。mock 库将此字符串名称转换为一个变量，该变量拦截所有对同名原始变量的引用。（请记住，在 Python 中，变量只是对实际对象的引用。）\n\
    \n因此，在示例 12.6 中，所有四个测试函数中的 `summer()` 在调用 `summer(5,6)` 时，调用的是修改后的 mock `preamble()`，而非真实函数。在\
    \ mock 版本中，该字符串被丢弃，因此测试可以验证 `summer()` 函数返回的是其两个参数之和的字符串版本。\n\n### 示例 12.6. 运行\
    \ mock 脚本 pytest\n\n```\n$ pytest -q test_summer2.py\n.....\n[100%]\n4 passed\
    \ in 0.13s\n```\n\n这是一个为了简化而虚构的例子。Mock 可能相当复杂。可以在诸如 Alex Ronkilo 的《Understanding\
    \ the Python Mock Object Library》（https://oreil.ly/I0bkd）等文章中找到直观的示例。而令人望而生畏的详细信息则存在于\
    \ Python 官方文档中（https://oreil.ly/hN9lZ）。\n\n## 测试替身与伪对象\n\n要执行 mock，你需要知道 `summer()`\
    \ 函数从 `mod1` 模块导入了 `preamble()` 函数。这是一种结构测试，需要了解特定的变量名和模块名。\n\n是否有办法进行不需要这些知识的行为测试呢？\n\
    \n一种方法是定义一个*测试替身*（有时称为*替身*或*模拟对象*）。这是一段独立的代码，执行我们在测试中想要的功能——在本例中，让 `preamble()`\
    \ 函数返回空字符串。一种实现方式是通过导入。首先应用这种方法"
