    \ файлов\n\nК сожалению, гравитация не ускоряет скачивание файлов. Вместо этого\
    \ мы будем использовать эквиваленты методов выгрузки.\n\n# Класс FileResponse\n\
    \nПервым (пример 15.7) представлен вариант «все и сразу», класс FileResponse.\n\
    \nПример 15.7. Загрузка небольшого файла с помощью FileResponse (добавить в файл\
    \ main.py)\n\n```\nfrom fastapi.responses import FileResponse\n\n@app.get(\"/small/{name}\"\
    )\nasync def download_small_file(name):\n    return FileResponse(name)\n```\n\n\
    Где-то здесь есть тест. Сначала поместите файл 1KB.bin в тот же каталог, что и\
    \ main.py. Теперь запустите пример 15.8.\n\nПример 15.8. Загрузка небольшого файла\
    \ с помощью HTTPie\n\n```\n$ http -b http://localhost:8000/small/1KB.bin\n\n---------------------------------------\n\
    | NOTE: binary data not shown in terminal |\n---------------------------------------\n\
    ```\n\nЕсли вы не доверяете этому сообщению об ограничениях, то пример 15.9 направляет\
    \ вывод в утилиту типа wc, чтобы убедиться, что вы получили все 1000 байт."
  - "[PAGE 237]\n\n# Пример 15.9. Загрузка небольшого файла с помощью HTTPie с подсчетом\
    \ байтов\n\n```\n$ http -b http://localhost:8000/small/1KB.bin | wc -c\n1000\n\
    ```\n\n# Класс StreamingResponse\n\nКак и в случае с модулем FileUpload, большие\
    \ файлы лучше загружать с помощью класса StreamingResponse, возвращающего файл\
    \ по частям. Пример 15.10 показывает такой подход к реализации с помощью функции\
    \ пути, определенной как async def. Он позволяет избежать блокировки, когда процессор\
    \ не используется. Я пока пропускаю проверку ошибок. Если файла path не существует,\
    \ вызов функции open() выбросит исключение.\n\n# Пример 15.10. Возврат большого\
    \ файла с помощью класса StreamingResponse (добавить в файл main.py)\n\n```\n\
    from pathlib import path\nfrom typing import Generator\nfrom fastapi.responses\
    \ import StreamingResponse\n\ndef gen_file(path: str) -> Generator:\n    with\
    \ open(file=path, mode=\"rb\") as file:\n        yield file.read()\n\n@app.get(\"\
    /download_big/{name}\")\nasync def download_big_file(name:str):\n    gen_expr\
    \ = gen_file(file_path=path)\n    response = StreamingResponse(\n        content=gen_expr,\n\
    \        status_code=200,\n    )\n    return response\n```\n\ngen_expr — выражение-генератор,\
    \ возвращаемое функцией-генератором gen_file(). Класс StreamingResponse использует\
    \ его для своего итерируемого аргумента content, чтобы загружать файл по частям.\n\
    \nПример 15.11 представляет собой сопутствующий тест. (Для этого сначала потребуется\
    \ разместить файл 1GB.bin рядом с файлом main.py, процесс займет немного больше\
    \ времени.)\n\n# Пример 15.11. Загрузка большого файла с помощью HTTPie\n\n```\n\
    $ http -b http://localhost:8000/big/1GB.bin | wc -c\n1000000000\n```"
  - "[PAGE 238]\n\n# Предоставление статических файлов\n\nТрадиционные веб-серверы\
    \ могут обращаться с файлами сервера так, как будто они находятся в обычной файловой\
    \ системе. FastAPI позволяет делать это с помощью класса StaticFiles.\n\nДля этого\
    \ примера создадим каталог скучных бесплатных файлов для загрузки пользователями.\n\
    \n+   - Создайте каталог static на том же уровне, что и файл main.py. (У этого\
    \ хранилища может быть любое название, я называю его static (статическим) только\
    \ для того, чтобы не забыть, зачем я его сделал.)\n- Поместите в него текстовый\
    \ файл abc.txt с текстовым содержимым abc :).\n\nПример 15.12 предоставит любой\
    \ URL, начинающийся с выражения /static (вы могли бы использовать здесь любую\
    \ текстовую строку), с файлами из каталога static.\n\n**Пример 15.12.** Предоставление\
    \ всего содержимого в каталоге с помощью StaticFiles (добавить в файл main.py)\n\
    \n```\nfrom pathlib import Path\nfrom fastapi import FastAPI\nfrom fastapi.staticfiles\
    \ import StaticFiles\n\n# Каталог, содержащий файл main.py:\ntop = Path(__file__).resolve.parent\n\
    \napp.mount(\"/static\",\n    StaticFiles(directory=f\"{top}/static\", html=True),\n\
    \    name=\"free\")\n```\n\nРасчет top гарантирует, что вы разместите каталог\
    \ static рядом с файлом main.py. Переменная __file__ представляет собой полное\
    \ имя пути к этому файлу.\n\nПример 15.13 — это один из способов проверки примера\
    \ 15.12 вручную.\n\n**Пример 15.13.** Получение статического файла\n\n```\n$ http\
    \ -b localhost:8000/static/abc.txt\nabc :)\n```\n\nА что насчет аргумента html=True,\
    \ который мы передаем в функцию StaticFiles()? Это делает ее работу немного более\
    \ похожей на работу традиционного сервера,"
