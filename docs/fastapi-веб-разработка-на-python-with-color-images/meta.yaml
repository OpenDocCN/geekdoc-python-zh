    зрелый домен данных, который хочется сразу же задействовать. Поэтому в этой книге
    я использую подход под названием web-first — шаг за шагом, начиная с основных
    частей и добавляя другие по мере необходимости. Иногда эксперименты работают,
    иногда нет. Поначалу я постараюсь сдерживать желание запихнуть все в веб-уровень.


    > Веб-уровень — лишь один из способов передачи данных между пользователем и сервисом.
    Существуют и другие варианты, например с помощью интерфейса командной строки (CLI)
    или набора средств разработки программного обеспечения (SDK). В других фреймворках
    веб-уровень иногда называют уровнем представления или презентации.


    # Проектирование RESTful API


    HTTP — это способ передачи команд и данных между веб-клиентами и серверами. Но,
    как и в случае с ингредиентами из холодильника, которые можно комбинировать, изготавливая
    блюда от отвратительных до изысканных, некоторые рецепты для HTTP работают лучше,
    чем другие.


    В главе 1 я упоминал, что *RESTful* стал полезной, хотя иногда и нечеткой моделью
    для разработки HTTP. Проектирование RESTful включает в себя следующие основные
    компоненты:


    +   - *ресурсы* — элементы данных, которыми управляет ваше приложение;

    - *идентификаторы* — уникальные идентификаторы ресурсов;


    ¹ Персиваль Г., Грегори Б. Паттерны разработки на Python. — СПб.: Питер, 2022.

    ² Перальта Х. А. Микросервисы и API. — СПб.: Питер, 2024.'
  - '[PAGE 113]


    ● *URL-адреса* — структурированные строки ресурсов и идентификаторов;


    ● *глагольные операторы или действия* — термины, сопровождающие URL-адреса для
    различных целей:


    +   ● GET — получение ресурса;

    ● POST — создание нового ресурса;

    ● PUT — полная замена ресурса;

    ● PATCH — частичная замена ресурса;

    ● DELETE — ресурсы разлетаются в ключья.


    > Вы увидите разногласия по поводу относительных достоинств PUT в сравнении с
    PATCH. Если вам не нужно отличать частичную модификацию от полной (замены), то,
    возможно, оба оператора и не понадобятся.


    Общие правила RESTful, касающиеся сочетания глаголов и URL-адресов, содержащих
    ресурсы и идентификаторы, предусматривают следующие шаблоны параметров пути (содержимое
    между / в URL):


    +   ● verb/resource/ — применение глагольного оператора (verb) ко всем ресурсам
    типа resource;

    ● verb/resource/id — применение глагольного оператора (verb) к ресурсам (resource)
    с идентификатором id.


    При использовании примера данных для этой книги запрос GET к конечной точке /thing
    вернет данные обо всех исследователях, но запрос GET к /thing/abc предоставит
    данные только для ресурса thing с идентификатором abc.


    Наконец, веб-запросы часто содержат больше информации, указывая на необходимость
    следующих действий:


    +   ● сортировки результатов;

    ● пагинации результатов;

    ● выполнения другой функции.


    Параметры для них иногда могут иметь вид параметров пути (добавляются в конец
    после еще одного символа /), но чаще всего они включаются как параметры запроса
    (var=val после знака ? в URL-адресе). Поскольку у URL-адресов есть ограничения
    по размеру, большие запросы часто передаются в теле HTTP.'
  - '[PAGE 114]


    ![](img/eacb50a37d89d355fa68de0c62d56b32_114_0.png)


    Большинство авторов рекомендуют использовать множественное число при именовании
    ресурса и связанных с ним пространств имен, таких как разделы API и таблицы баз
    данных. Я долго следовал этому совету, но теперь считаю, что названия в единственном
    числе проще по многим причинам (включая странные английского языка):


    +   - некоторые слова представляют множественное число самих себя — series, fish;

    - у некоторых слов неправильное множественное число — children, people;

    - вам нужен код преобразования единственного числа во множественное по требованию
    во многих местах.


    По этим причинам во многих случаях в книге я использую схему именования в единственном
    числе. Это противоречит обычным рекомендациям RESTful, так что не стесняйтесь
    игнорировать эту мою особенность, если не согласны со мной.


    # Макет сайта с файлами и каталогами


    Наши данные касаются в основном существ и исследователей. Изначально мы могли
    бы определить все URL-адреса и их функции пути FastAPI для доступа к данным в
    одном файле Python. Не будем поддаваться искушению и начнем так, как будто мы
    уже восходящая звезда в криптном веб-пространстве. Имея хороший фундамент, гораздо
    легче добавлять новые крутые вещи.


    Сначала выберите на своей машине каталог. Назовите его **fastapi** или как угодно,
    что поможет запомнить, где вы будете работать с кодом из этой книги. В нем создайте
    следующие подкаталоги:


    +   - `src` — содержит весь код сайта;

    - `web` — веб-уровень FastAPI;

    - `service` — уровень бизнес-логики;

    - `data` — уровень интерфейса хранения данных;

    - `model` — для определения моделей Pydantic;

    - `fake` — жестко указанные данные (заглушки) для ранних этапов.


    В каждой из этих папок вскоре появится по три файла:


    +   - `__init__.py` — необходим для восприятия этого каталога в качестве пакета;

    - `creature.py` — код существа для этого уровня;

    - `explorer.py` — код исследователя для этого уровня.'
  - '[PAGE 115]


    Существует *множество* мнений о том, как следует планировать страницы для разработки.
    Такой дизайн призван показать разделение уровней и оставить место для *будущих*
    дополнений.


    Сейчас необходимо дать некоторые объяснения. Поначалу файлы `__init__.py` будут
    пустыми. Они представляют собой своего рода хакерскую уловку в отношении Python,
    поэтому к содержащей их папке следует относиться как к пакету Python, который
    можно импортировать. Во-вторых, папка `fake` предоставляет некоторые данные-заглушки
    для более высоких уровней по мере создания нижних.


    Кроме того, логика *импорта* в Python не работает строго с иерархиями каталогов.
    Она опирается на *пакеты* и *модули* Python. Файлы с расширением `.py`, перечисленные
    в приведенной ранее древовидной структуре, являются модулями Python (исходными
    файлами). Их родительские каталоги будут считаться пакетами, *если* они содержат
    файл `__init__.py`. (Это соглашение необходимо, чтобы, если у вас есть каталог
    `sys` и вы набираете команду `import sys`, Python мог определить, вам нужен системный
    каталог или ваш локальный.)


    Программы Python могут импортировать пакеты и модули. У интерпретатора Python
    есть встроенная переменная `sys.path`. Она содержит местоположение стандартного
    кода Python. Переменная окружения `PYTHONPATH` — это пустая или разделенная двоеточием
    строка имен каталогов. Она указывает Python, какие родительские каталоги проверять
    перед `sys.path`, чтобы найти импортируемые модули или пакеты. Поэтому, если вы
    переходите в новую папку `fastapi`, введите следующую команду (в Linux или macOS),
    чтобы новый код в ней проверялся первым при импорте:


    ```

    $ export PYTHONPATH=$PWD/src

    ```


    Часть выражения `$PWD` означает «вывести *рабочий каталог*» и избавляет вас от
    необходимости вводить полный путь к каталогу `fastapi`, хотя вы можете это сделать,
    если хотите. А `src` означает, что искать модули и пакеты для импорта нужно только
    там.


    Чтобы установить переменную окружения `PWD` в Windows, изучите раздел *Excursus:
    Setting Environment Variables* на сайте Python Software Foundation (https://oreil.ly/9NRBA).


    Фух.'
  - "[PAGE 116]\n\n# Первый код веб-сайта\n\nВ этом разделе мы рассмотрим, как использовать\
    \ FastAPI для написания запросов и ответов для сайта RESTful API. Затем начнем\
    \ применять их на нашем реальном все более и более странном сайте.\n\nНачнем с\
    \ примера 8.1. В каталоге src создайте новую программу верхнего уровня main.py\
    \ — она будет запускать программу Uvicorn и пакет FastAPI.\n\n**Пример 8.1. Основная\
    \ программа main.py**\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/\")\ndef top():\n    return \"top here\"\n\nif __name__ == \"__main__\"\
    :\n    import uvicorn\n    uvicorn.run(\"main:app\", reload=True)\n```\n\nСлово\
    \ app здесь представляет собой объект FastAPI, связывающий все воедино. Первый\
    \ аргумент Uvicorn — \"main:app\", потому что файл называется main.py, а второй\
    \ — app, имя объекта FastAPI.\n\nUvicorn будет продолжать работать и перезапустится,\
    \ если в том же каталоге или в любых подкаталогах изменится код. Без аргумента\
    \ reload=True придется перезапускать Uvicorn каждый раз, когда вы вносите изменения\
    \ в код. Во многих следующих примерах просто вносите изменения в один и тот же\
    \ файл main.py и принудительно перезапускайте его, вместо того чтобы создавать\
    \ файлы main2.py, main3.py и т. д. Запустите файл main.py из примера 8.2.\n\n\
    **Пример 8.2. Запуск основной программы**\n\n```\n$ python main.py &\nINFO:  \
    \   Will watch for changes in these directories: [.../fastapi']\nINFO:     Uvicorn\
    \ running on http://127.0.0.1:8000 (Press CTRL+C to quit)\nINFO:     Started reloader\
    \ process [92543] using StatReload\nINFO:     Started server process [92551]\n\
    INFO:     Waiting for application startup.\nINFO:     Application startup complete.\n\
    ```"
- md: "Символ & в конце строки переводит программу в фоновый режим, и вы можете запускать\
    \ другие программы в том же окне терминала, если хотите. Или опустите символ &\
    \ и запустите другой код в другом окне или на другой вкладке.\n\nТеперь вы можете\
    \ получить доступ к сайту **localhost:8000** с помощью браузера или любой из приведенных\
    \ ранее тестовых программ. В примере 8.3 используется HTTPie.\n\n## Пример 8.3.\
    \ Тестирование основной программы\n\n```\n$ http localhost:8000\nHTTP/1.1 200\
    \ OK\ncontent-length: 8\ncontent-type: application/json\ndate: Sun, 05 Feb 2023\
    \ 03:54:29 GMT\nserver: uvicorn\n\n\"top here\"\n```\n\nС этого момента при внесении\
    \ изменений веб-сервер должен автоматически перезапускаться. Если ошибка останавливает\
    \ его, перезапустите сервер с помощью команды `python main.py`.\n\nВ примере 8.4\
    \ добавлена еще одна тестовая конечная точка с использованием параметра пути (часть\
    \ URL-адреса).\n\n## Пример 8.4. Добавление конечной точки\n\n```\nimport uvicorn\n\
    from fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/\")\ndef top():\n\
    \    return \"top here\"\n\n@app.get(\"/echo/{thing}\")\ndef echo(thing):\n  \
    \  return f\"echoing {thing}\"\n\nif __name__ == \"__main__\":\n    uvicorn.run(\"\
    main:app\", reload=True)\n```\n\nКак только вы сохраните изменения в файле main.py\
    \ в своем редакторе, в окне, где запущен веб-сервер, должно появиться что-то вроде\
    \ этого:\n\n```\nWARNING:  StatReload detected changes in 'main.py'. Reloading...\n\
    INFO:     Shutting down\nINFO:     Waiting for application shutdown.\nINFO:  \
    \   Application shutdown complete.\nINFO:     Finished server process [92862]\n\
    INFO:     Started server process [92872]\nINFO:     Waiting for application startup.\n\
    INFO:     Application startup complete.\n```\n\nПример 8.5 показывает, правильно\
    \ ли была обработана новая конечная точка (с помощью аргумента -b выводится только\
    \ тело ответа).\n\n## Пример 8.5. Тестирование новой конечной точки\n\n```\n$\
    \ http -b localhost:8000/echo/argh\n\"echoing argh\"\n```\n\nВ следующих разделах\
    \ мы добавим больше конечных точек в файл main.py.\n\n## Запросы\n\nHTTP-запрос\
    \ состоит из текстового заголовка, за которым следует один или несколько разделов\
    \ тела.\n\nМожете написать собственный код для разбора HTTP в структуры данных\
    \ Python, но вы не будете первым. В веб-приложениях эти детали лучше поручить\
    \ фреймворку.\n\nВозможность реализовать внедрение зависимостей FastAPI здесь\
    \ особенно полезна. Данные могут поступать из разных частей HTTP-сообщения, и\
    \ вы уже видели, как можно указать одну или несколько таких зависимостей, чтобы\
    \ сказать, где находятся данные:\n\n- Header — в HTTP-заголовке;\n- Path — в пути\
    \ URL;\n- Query — после символа ? в URL;\n- Body — в теле HTTP-сообщения.\n\n\
    К другим, более косвенным источникам можно отнести:\n\n- переменные окружения;\n\
    - настройки конфигурации.\n\nВ примере 8.6 выполняется HTTP-запрос с использованием\
    \ нашего старого друга HTTPie и игнорированием возвращаемых данных HTML-тела.\n\
    \n## Пример 8.6. Заголовки HTTP-запросов и ответов\n\n```\n$ http -p HBh http://example.com/\n\
    GET / HTTP/1.1\nAccept: /\nAccept-Encoding: gzip, deflate\nConnection: keep-alive\n\
    Host: example.com\nUser-Agent: HTTPie/3.2.1\n\nHTTP/1.1 200 OK\nAge: 374045\n\
    Cache-Control: max-age=604800\nContent-Encoding: gzip\nContent-Length: 648\nContent-Type:\
    \ text/html; charset=UTF-8\nDate: Sat, 04 Feb 2023 01:00:21 GMT\nEtag: \"3147526947+gzip\"\
    \nExpires: Sat, 11 Feb 2023 01:00:21 GMT\nLast-Modified: Thu, 17 Oct 2019 07:18:26\
    \ GMT\nServer: ECS (cha/80E2)\nVary: Accept-Encoding\nX-Cache: HIT\n```\n\nПервая\
    \ строка запрашивает верхнюю страницу по адресу example.com (бесплатный сайт,\
    \ доступный для использования любому в качестве примера). Код запрашивает только\
    \ URL, без каких-либо параметров. Первый блок строк — это заголовки HTTP-запроса,\
    \ отправленного на сайт, а следующий блок содержит заголовки HTTP-ответа.\n\n\
    ![](img/eacb50a37d89d355fa68de0c62d56b32_119_0.png)\n\nВ большинстве тестовых\
    \ примеров, начиная с данного момента, все эти заголовки запросов и ответов не\
    \ понадобятся, поэтому вы будете чаще использовать выражение http -b.\n\n## Несколько\
    \ маршрутизаторов\n\nБольшинство веб-сервисов работают с несколькими видами ресурсов.\
    \ Хотя вы могли бы поместить весь код обработки путей в один файл и отправиться\
    \ куда-нибудь побездельничать, часто удобно применять несколько *субмаршрутов*\
    \ вместо одной переменной `app`, использованной в большинстве примеров ранее.\n\
    \nВ каталоге `web` (в том же каталоге, где расположен ваш рабочий файл `main.py`)\
    \ создайте файл `explorer.py`, как показано в примере 8.7.\n\n**Пример 8.7.**\
    \ Использование APIRouter в файле web/explorer.py\n\n```\nfrom fastapi import\
    \ APIRouter\n\nrouter = APIRouter(prefix = \"/explorer\")\n\n@router.get(\"/\"\
    )\ndef top():\n    return \"top explorer endpoint\"\n```\n\nТеперь в примере 8.8\
    \ приложение верхнего уровня `main.py` узнает, что в системе появился новый субмаршрут,\
    \ обрабатывающий все URL, начинающиеся со строки `/explorer`.\n\n**Пример 8.8.**\
    \ Подключение основного приложения (main.py) к субмаршруту\n\n```\nfrom fastapi\
    \ import FastAPI\nfrom .web import explorer\n\napp = FastAPI()\n\napp.include_router(explorer.router)\n\
    ```\n\nUvicorn подхватит этот новый файл. Как обычно, проверьте в примере 8.9,\
    \ а не предполагайте, что он будет работать.\n\n**Пример 8.9.** Тестирование нового\
    \ субмаршрута\n\n```\n$ http -b localhost:8000/explorer/\n\"top explorer endpoint\"\
    \n```\n\n## Создание веб-уровня\n\nПриступим к добавлению основных функций на\
    \ веб-уровень. Изначально самим веб-функциям предоставим фиктивные данные. В главе\
    \ 9 мы перенесем эти данные в соответствующие сервисные функции, а в главе 10\
    \ — в функции данных. Наконец, будет добавлена реальная база данных, к которой\
    \ будет иметь доступ уровень данных. На каждом этапе разработки вызовы конечных\
    \ веб-узлов должны работать.\n\n## Определение моделей данных\n\nСначала необходимо\
    \ определить данные, которые будут передаваться между уровнями. Наша *предметная\
    \ область* (или домен) содержит исследователей и существ, поэтому давайте определим\
    \ для них минимальные начальные модели Pydantic. Позже могут появиться и другие\
    \ идеи, например экспедиции, дневники или продажа кофейных кружек посредством\
    \ электронной коммерции. Но пока просто включите две живые (обычно в случае с\
    \ существами) модели в пример 8.10.\n\n**Пример 8.10.** Определение модели в файле\
    \ model/explorer.py\n\n```\nfrom pydantic import BaseModel\n\nclass Explorer(BaseModel):\n\
    \    name: str\n    country: str\n    description: str\n```\n\nВ примере 8.11\
    \ возрождается определение Creature из предыдущих глав.\n\n**Пример 8.11.** Определение\
    \ модели в файле model/creature.py\n\n```\nfrom pydantic import BaseModel\n\n\
    class Creature(BaseModel):\n    name: str\n    country: str\n    area: str\n \
    \   description: str\n    aka: str\n```\n\nЭто очень простые начальные модели.\
    \ Здесь не были применены возможности Pydantic, такие как обязательные и необязательные\
    \ или ограниченные значения. Этот простой код можно впоследствии усовершенствовать,\
    \ не прибегая к масштабным логическим перестройкам.\n\nДля значений country будут\
    \ использоваться двухсимвольные коды стран по стандарту ISO. Это позволяет немного\
    \ сэкономить на вводе текста, однако приходится искать необычные коды.\n\n## Заглушки\
    \ и фиктивные данные\n\n*Заглушки*, известные также как *макеты данных*, представляют\
    \ собой фиксированные результаты, возвращаемые без вызова обычных активных модулей.\
    \ Это быстрый способ проверить свои маршруты и ответы.\n\n*Фиктивные данные* —\
    \ это аналог настоящего источника данных, выполняющий по крайней мере некоторые\
    \ из тех же функций. Примером может служить класс в оперативной памяти, имитирующий\
    \ базу данных. В этой и следующих главах вам предстоит создать некоторое количество\
    \ фиктивных данных, по мере того как вы будете заполнять код, определяющий уровни\
    \ и их взаимодействие. В главе 10 вы определите реальное хранилище данных (базу\
    \ данных), и оно заменит фиктивные данные.\n\n## Создание общих функций с помощью\
    \ стека\n\nКак и в примерах с данными, подход к созданию этого сайта является\
    \ исследовательским. Часто бывает неясно, что в итоге понадобится, поэтому давайте\
    \ начнем с некоторых характерных для подобных сайтов элементов. Для обеспечения\
    \ доступа фронтенда к данным обычно требуются способы выполнения следующих запросов:\n\
    \n- *получить* один, некоторые, все (get one, some, all);\n- *создать* (create);\n\
    - *заменить* (replace) полностью;\n- *изменить* (modify) частично;\n- *удалить*\
    \ (delete).\n\nПо сути, это основы CRUD из баз данных, хотя я разделил букву U\
    \ (модификация) на частичные (*изменение*) и полные (*замена*) функции. Возможно,\
    \ это различие окажется излишним! Это зависит от того, куда ведут данные."
  mdcn: "行尾的 `&` 符号会将程序置于后台运行，这样你就可以在同一个终端窗口中运行其他程序。或者省略 `&` 符号，在另一个窗口或标签页中运行其他代码。\n\
    \n现在，你可以通过浏览器或之前提到的任何测试程序访问 **localhost:8000** 网站。示例 8.3 使用了 HTTPie。\n\n## 示例\
    \ 8.3. 测试主程序\n\n```\n$ http localhost:8000\nHTTP/1.1 200 OK\ncontent-length: 8\n\
    content-type: application/json\ndate: Sun, 05 Feb 2023 03:54:29 GMT\nserver: uvicorn\n\
    \n\"top here\"\n```\n\n从现在开始，当你修改文件时，Web 服务器应该会自动重启。如果错误导致服务器停止，请使用 `python main.py`\
    \ 命令重新启动服务器。\n\n示例 8.4 添加了另一个使用路径参数（URL 的一部分）的测试端点。\n\n## 示例 8.4. 添加端点\n\n```\n\
    import uvicorn\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"\
    /\")\ndef top():\n    return \"top here\"\n\n@app.get(\"/echo/{thing}\")\ndef\
    \ echo(thing):\n    return f\"echoing {thing}\"\n\nif __name__ == \"__main__\"\
    :\n    uvicorn.run(\"main:app\", reload=True)\n```\n\n一旦你在编辑器中保存了对 `main.py` 文件的更改，在运行\
    \ Web 服务器的窗口中应该会出现类似这样的内容：\n\n```\nWARNING:  StatReload detected changes in 'main.py'.\
    \ Reloading...\nINFO:     Shutting down\nINFO:     Waiting for application shutdown.\n\
    INFO:     Application shutdown complete.\nINFO:     Finished server process [92862]\n\
    INFO:     Started server process [92872]\nINFO:     Waiting for application startup.\n\
    INFO:     Application startup complete.\n```\n\n示例 8.5 展示了新的端点是否被正确处理（使用 `-b`\
    \ 参数仅输出响应体）。\n\n## 示例 8.5. 测试新端点\n\n```\n$ http -b localhost:8000/echo/argh\n\"\
    echoing argh\"\n```\n\n在接下来的章节中，我们将在 `main.py` 文件中添加更多端点。\n\n## 请求\n\nHTTP 请求由文本头部和随后的一个或多个正文部分组成。\n\
    \n你可以编写自己的代码来将 HTTP 解析为 Python 数据结构，但你不会是第一个这样做的人。在 Web 应用程序中，最好将这些细节交给框架处理。\n\
    \n在这里实现 FastAPI 的依赖注入功能特别有用。数据可以来自 HTTP 消息的不同部分，你已经看到如何指定一个或多个这样的依赖来告诉数据在哪里：\n\
    \n- Header — 在 HTTP 头部中；\n- Path — 在 URL 路径中；\n- Query — 在 URL 的 `?` 符号之后；\n-\
    \ Body — 在 HTTP 消息的正文中。\n\n其他更间接的来源包括：\n\n- 环境变量；\n- 配置设置。\n\n示例 8.6 使用我们熟悉的老朋友\
    \ HTTPie 执行了一个 HTTP 请求，并忽略了返回的 HTML 正文数据。\n\n## 示例 8.6. HTTP 请求和响应头\n\n```\n$\
    \ http -p HBh http://example.com/\nGET / HTTP/1.1\nAccept: /\nAccept-Encoding:\
    \ gzip, deflate\nConnection: keep-alive\nHost: example.com\nUser-Agent: HTTPie/3.2.1\n\
    \nHTTP/1.1 200 OK\nAge: 374045\nCache-Control: max-age=604800\nContent-Encoding:\
    \ gzip\nContent-Length: 648\nContent-Type: text/html; charset=UTF-8\nDate: Sat,\
    \ 04 Feb 2023 01:00:21 GMT\nEtag: \"3147526947+gzip\"\nExpires: Sat, 11 Feb 2023\
    \ 01:00:21 GMT\nLast-Modified: Thu, 17 Oct 2019 07:18:26 GMT\nServer: ECS (cha/80E2)\n\
    Vary: Accept-Encoding\nX-Cache: HIT\n```\n\n第一行请求 example.com 的首页（一个可供任何人作为示例使用的免费网站）。代码仅请求\
    \ URL，不带任何参数。第一个代码块是发送到网站的 HTTP 请求头，下一个代码块包含 HTTP 响应头。\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_119_0.png)\n\
    \n从现在开始的大多数测试示例中，所有这些请求和响应头都不需要，因此你会更频繁地使用 `http -b` 表达式。\n\n## 多个路由器\n\n大多数 Web\
    \ 服务处理多种类型的资源。虽然你可以将所有路径处理代码放在一个文件中，然后去别处偷懒，但通常使用多个 *子路由* 而不是像之前大多数示例中那样使用单个 `app`\
    \ 变量会更方便。\n\n在 `web` 目录（与你的工作文件 `main.py` 所在目录相同）中，创建一个 `explorer.py` 文件，如示例 8.7\
    \ 所示。\n\n**示例 8.7.** 在 `web/explorer.py` 文件中使用 APIRouter\n\n```\nfrom fastapi\
    \ import APIRouter\n\nrouter = APIRouter(prefix = \"/explorer\")\n\n@router.get(\"\
    /\")\ndef top():\n    return \"top explorer endpoint\"\n```\n\n现在，在示例 8.8 中，顶层应用程序\
    \ `main.py` 将知道系统中出现了一个新的子路由，它处理所有以 `/explorer` 开头的 URL。\n\n**示例 8.8.** 将主应用程序\
    \ (main.py) 连接到子路由\n\n```\nfrom fastapi import FastAPI\nfrom .web import explorer\n\
    \napp = FastAPI()\n\napp.include_router(explorer.router)\n```\n\nUvicorn 会加载这个新文件。像往常一样，请在示例\
    \ 8.9 中验证，而不是假设它会工作。\n\n**示例 8.9.** 测试新子路由\n\n```\n$ http -b localhost:8000/explorer/\n\
    \"top explorer endpoint\"\n```\n\n## 创建 Web 层\n\n现在开始为 Web 层添加基本功能。最初，Web 函数本身将提供模拟数据。在第\
    \ 9 章中，我们将把这些数据转移到相应的服务函数中，然后在第 10 章中转移到数据函数。最后，将添加一个真实数据库，数据层可以访问它。在每个开发阶段，对\
    \ Web 端点的调用都应该能够工作。\n\n## 定义数据模型\n\n首先，需要定义在各层之间传递的数据。我们的 *领域*（或域）包含探险家和生物，因此让我们为它们定义最小的初始\
    \ Pydantic 模型。以后可能会出现其他想法，例如探险、日记或通过电子商务销售咖啡杯。但现在，只需在示例 8.10 中包含两个活跃的（通常是生物）模型。\n\
    \n**示例 8.10.** 在 `model/explorer.py` 文件中定义模型\n\n```\nfrom pydantic import BaseModel\n\
    \nclass Explorer(BaseModel):\n    name: str\n    country: str\n    description:\
    \ str\n```\n\n在示例 8.11 中，重新引入了前面章节中定义的 Creature。\n\n**示例 8.11.** 在 `model/creature.py`\
    \ 文件中定义模型\n\n```\nfrom pydantic import BaseModel\n\nclass Creature(BaseModel):\n\
    \    name: str\n    country: str\n    area: str\n    description: str\n    aka:\
    \ str\n```\n\n这些是非常简单的初始模型。这里没有使用 Pydantic 的功能，例如必填和可选字段或受限值。这个简单的代码可以在以后进行改进，而无需进行大规模的逻辑重构。\n\
    \n`country` 的值将使用 ISO 标准的双字符国家代码。这可以节省一些输入时间，但有时需要查找不常见的代码。\n\n## 桩代码和模拟数据\n\n\
    *桩代码*，也称为 *数据模型*，是在不调用常规活动模块的情况下返回的固定结果。这是检查路由和响应的一种快速方法。\n\n*模拟数据* 是真实数据源的模拟，至少执行一些相同的功能。例如，可以是一个在内存中模拟数据库的类。在本章和接下来的章节中，随着你填充定义各层及其交互的代码，你将创建一些模拟数据。在第\
    \ 10 章中，你将定义真实的数据存储（数据库），它将取代模拟数据。\n\n## 使用堆栈创建通用功能\n\n与数据示例一样，创建此网站的方法是探索性的。通常不清楚最终需要什么，因此让我们从一些此类网站的典型元素开始。为了确保前端能够访问数据，通常需要执行以下请求的方法：\n\
    \n- *获取* 一个、一些、所有 (get one, some, all)；\n- *创建* (create)；\n- *完全替换* (replace)；\n\
    - *部分修改* (modify)；\n- *删除* (delete)。\n\n本质上，这是数据库的 CRUD 基础，尽管我将字母 U（更新）分成了部分（*修改*）和完全（*替换*）功能。也许这种区分是多余的！这取决于数据的去向。"
