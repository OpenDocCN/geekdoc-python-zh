  md: '# PostgreSQL


    На заре развития реляционных баз данных пионером была система System R от IBM,
    а за новый рынок боролись ее ответвления — в основном Ingres с открытым исходным
    кодом и коммерческий продукт Oracle. В Ingres был применен язык запросов QUEL,
    а в System R — SQL. Хотя некоторые считали, что QUEL лучше, чем SQL, принятие
    Oracle SQL в качестве стандарта, а также влияние IBM помогли Oracle и SQL добиться
    успеха.


    Спустя годы Майкл Стоунбрейкер вернулся, чтобы осуществить переход от Ingres к
    PostgreSQL (https://www.postgresql.org). В настоящее время разработчики систем
    с открытым исходным кодом чаще всего выбирают PostgreSQL, хотя система MySQL была
    популярна несколько лет назад и до сих пор не потеряла своей актуальности.


    # EdgeDB


    Несмотря на многолетний успех SQL, у него есть некоторые недостатки, делающие
    запросы неудобными. В отличие от математической теории, на которой основан SQL
    (реляционное исчисление Э. Ф. Кодда), сама конструкция языка SQL не является композиционной.
    В основном это означает, что сложно вложить запросы в большие запросы, что порождает
    более сложный и многословный код.


    Поэтому просто для развлечения я создам здесь новую реляционную базу данных. EdgeDB
    (https://www.edgedb.com) была написана (на Python!) автором библиотеки asyncio
    для языка Python. Она описывается как Post-SQL или граф-реляционная. В ядре БД
    используется PostgreSQL для обработки сложных системных задач. Компания Edge привнесла
    в эту сферу свой продукт EdgeQL (https://oreil.ly/sdk4J) — новый язык запросов,
    стремясь избежать острых граней SQL. На самом деле он переводится на SQL для выполнения
    PostgreSQL. В статье Ивана Данилюка My Experience with EdgeDB (https://oreil.ly/clNfg)
    приведено удобное сравнение EdgeQL и SQL. Приятная для чтения иллюстрированная
    официальная документация (https://oreil.ly/ce6u3) проводит параллели с книгой
    «Дракула».


    Может ли EdgeQL распространиться за пределы EdgeDB и стать альтернативой SQL?
    Время покажет.'
