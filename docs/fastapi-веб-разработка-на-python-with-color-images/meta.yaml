    \ может выглядеть как пример 4.7.\n\n**Пример 4.7.** Использование Starlette:\
    \ starlette_hello.py\n\n```\nfrom starlette.applications import Starlette\nfrom\
    \ starlette.responses import JSONResponse\nfrom starlette.routing import Route\n\
