  - "[PAGE 121]\n\n# Создание веб-уровня\n\nПриступим к добавлению основных функций\
    \ на веб-уровень. Изначально самим веб-функциям предоставим фиктивные данные.\
    \ В главе 9 мы перенесем эти данные в соответствующие сервисные функции, а в главе\
    \ 10 — в функции данных. Наконец, будет добавлена реальная база данных, к которой\
    \ будет иметь доступ уровень данных. На каждом этапе разработки вызовы конечных\
    \ веб-узлов должны работать.\n\n# Определение моделей данных\n\nСначала необходимо\
    \ определить данные, которые будут передаваться между уровнями. Наша *предметная\
    \ область* (или домен) содержит исследователей и существ, поэтому давайте определим\
    \ для них минимальные начальные модели Pydantic. Позже могут появиться и другие\
    \ идеи, например экспедиции, дневники или продажа кофейных кружек посредством\
    \ электронной коммерции. Но пока просто включите две живые (обычно в случае с\
    \ существами) модели в пример 8.10.\n\n**Пример 8.10.** Определение модели в файле\
    \ model/explorer.py\n\n```\nfrom pydantic import BaseModel\n\nclass Explorer(BaseModel):\n\
    \    name: str\n    country: str\n    description: str\n```\n\nВ примере 8.11\
    \ возрождается определение Creature из предыдущих глав.\n\n**Пример 8.11.** Определение\
    \ модели в файле model/creature.py\n\n```\nfrom pydantic import BaseModel\n\n\
    class Creature(BaseModel):\n    name: str\n    country: str\n    area: str\n \
    \   description: str\n    aka: str\n```\n\nЭто очень простые начальные модели.\
    \ Здесь не были применены возможности Pydantic, такие как обязательные и необязательные\
    \ или ограниченные значения-"
  - '[PAGE 122]


    ния. Этот простой код можно впоследствии усовершенствовать, не прибегая к масштабным
    логическим перестройкам.


    Для значений country будут использоваться двухсимвольные коды стран по стандарту
    ISO. Это позволяет немного сэкономить на вводе текста, однако приходится искать
    необычные коды.


    # Заглушки и фиктивные данные


    *Заглушки*, известные также как *макеты данных*, представляют собой фиксированные
    результаты, возвращаемые без вызова обычных активных модулей. Это быстрый способ
    проверить свои маршруты и ответы.


    *Фиктивные данные* — это аналог настоящего источника данных, выполняющий по крайней
    мере некоторые из тех же функций. Примером может служить класс в оперативной памяти,
    имитирующий базу данных. В этой и следующих главах вам предстоит создать некоторое
    количество фиктивных данных, по мере того как вы будете заполнять код, определяющий
    уровни и их взаимодействие. В главе 10 вы определите реальное хранилище данных
    (базу данных), и оно заменит фиктивные данные.


    # Создание общих функций с помощью стека


    Как и в примерах с данными, подход к созданию этого сайта является исследовательским.
    Часто бывает неясно, что в итоге понадобится, поэтому давайте начнем с некоторых
    характерных для подобных сайтов элементов. Для обеспечения доступа фронтенда к
    данным обычно требуются способы выполнения следующих запросов:


    +   - *получить* один, некоторые, все (get one, some, all);

    - *создать* (create);

    - *заменить* (replace) полностью;

    - *изменить* (modify) частично;

    - *удалить* (delete).


    По сути, это основы CRUD из баз данных, хотя я разделил букву U (модификация)
    на частичные (*изменение*) и полные (*замена*) функции. Возможно, это различие
    окажется излишним! Это зависит от того, куда ведут данные.'
- md: "## Создание фиктивных данных\n\nРаботая сверху вниз, вы будете дублировать\
    \ некоторые функции на всех трех уровнях. Чтобы сэкономить на вводе текста, в\
    \ примере 8.12 введу каталог верхнего уровня под названием fake. В нем находятся\
    \ модули, предоставляющие фиктивные данные об исследователях и существах.\n\n\
    ### Пример 8.12. Новый модуль в файле fake/explorer.py\n\n```python\nfrom model.explorer\
    \ import Explorer\n\n# фиктивные данные, в главе 10 они будут заменены на реальную\
    \ базу данных и SQL\n_explorers = [\n    Explorer(name=\"Claude Hande\",\n   \
    \          country=\"FR\",\n             description=\"Scarce during full moons\"\
    ),\n    Explorer(name=\"Noah Weiser\",\n             country=\"DE\",\n       \
    \      description=\"Myopic machete man\"),\n]\n\ndef get_all() -> list[Explorer]:\n\
    \    \"\"\"Возврат всех исследователей\"\"\"\n    return _explorers\n\ndef get_one(name:\
    \ str) -> Explorer | None:\n    for _explorer in _explorers:\n        if _explorer.name\
    \ == name:\n            return _explorer\n    return None\n\n# Приведенные ниже\
    \ варианты пока не функциональны,\n# поэтому они просто делают вид, что работают,\n\
    # не изменяя реальный фиктивный список\ndef create(explorer: Explorer) -> Explorer:\n\
    \    \"\"\"Добавление исследователя\"\"\"\n    return explorer\n\ndef modify(explorer:\
    \ Explorer) -> Explorer:\n    \"\"\"Частичное изменение записи исследователя\"\
    \"\"\n    return explorer\n\ndef replace(explorer: Explorer) -> Explorer:\n  \
    \  \"\"\"Полная замена записи исследователя\"\"\"\n    return explorer\n\ndef\
    \ delete(name: str) -> bool:\n    \"\"\"Удаление записи исследователя; возврат\
    \ значения None,\n    если запись существовала\"\"\"\n    return None\n```\n\n\
    Настройка существа в примере 8.13 аналогична.\n\n### Пример 8.13. Новый модуль\
    \ в файле fake/creature.py\n\n```python\nfrom model.creature import Creature\n\
    \n# фиктивные данные, пока не произойдет замена на реальную базу данных и SQL\n\
    _creatures = [\n    Creature(name=\"Yeti\",\n             aka=\"Abominable Snowman\"\
    ,\n             country=\"CN\",\n             area=\"Himalayas\",\n          \
    \   description=\"Hirsute Himalayan\"),\n    Creature(name=\"Bigfoot\",\n    \
    \         description=\"Yeti's Cousin Eddie\",\n             country=\"US\",\n\
    \             area=\"*\",\n             aka=\"Sasquatch\"),\n]\n\ndef get_all()\
    \ -> list[Creature]:\n    \"\"\"Возврат всех существ\"\"\"\n    return _creatures\n\
    \ndef get_one(name: str) -> Creature | None:\n    \"\"\"Возврат одного существа\"\
    \"\"\n    for _creature in _creatures:\n        if _creature.name == name:\n \
    \           return _creature\n    return None\n\n# Приведенные ниже варианты пока\
    \ не функциональны,\n# поэтому они просто делают вид, что работают,\n# не изменяя\
    \ реальный фиктивный список\ndef create(creature: Creature) -> Creature:\n   \
    \ \"\"\"Добавление существа\"\"\"\n    return creature\n\ndef modify(creature:\
    \ Creature) -> Creature:\n    \"\"\"Частичное изменение записи существа\"\"\"\n\
    \    return creature\n\ndef replace(creature: Creature) -> Creature:\n    \"\"\
    \"Полная замена записи существа\"\"\"\n    return creature\n\ndef delete(name:\
    \ str):\n    \"\"\"Удаление записи существа; возврат значения None,\n    если\
    \ запись существовала\"\"\"\n    return None\n```\n\nДа, функции модулей практически\
    \ идентичны. Они изменятся позже, когда появится настоящая база данных — она будет\
    \ обрабатывать различные полей двух моделей. Кроме того, я использовал отдельные\
    \ функции, а не определил абстрактный или класс Fake. У модуля собственное пространство\
    \ имен, так что это эквивалентный способ объединения данных и функций.\n\nТеперь\
    \ изменим веб-функции из примеров 8.12 и 8.13. Готовясь к созданию последующих\
    \ уровней (сервисного и данных), импортируйте только что определенный фиктивный\
    \ провайдер данных, но назовите его service в строке `import fake.explorer as\
    \ service` (пример 8.14). В главе 9 вы сделаете следующее:\n\n- создадите новый\
    \ файл service/explorer.py;\n- импортируете туда фиктивные данные;\n- укажете\
    \ коду файла web/explorer.py импортировать новый модуль сервиса вместо фиктивного\
    \ модуля.\n\nВ главе 10 вы проделаете то же самое на уровне данных. Все это сводится\
    \ к добавлению частей программы и их соединению, при этом код переделывается как\
    \ можно реже. Электричество (то есть настоящую базу данных и постоянные данные)\
    \ вы включите позже, в главе 10.\n\n### Пример 8.14. Новые конечные точки в файле\
    \ web/explorer.py\n\n```python\nfrom fastapi import APIRouter\nfrom model.explorer\
    \ import Explorer\nimport fake.explorer as service\n\nrouter = APIRouter(prefix\
    \ = \"/explorer\")\n\n@router.get(\"/\")\ndef get_all() -> list[Explorer]:\n \
    \   return service.get_all()\n\n@router.get(\"/{name}\")\ndef get_one(name) ->\
    \ Explorer | None:\n    return service.get_one(name)\n\n# все остальные конечные\
    \ точки пока ничего не делают:\n@router.post(\"/\")\ndef create(explorer: Explorer)\
    \ -> Explorer:\n    return service.create(explorer)\n\n@router.patch(\"/\")\n\
    def modify(explorer: Explorer) -> Explorer:\n    return service.modify(explorer)\n\
    \n@router.put(\"/\")\ndef replace(explorer: Explorer) -> Explorer:\n    return\
    \ service.replace(explorer)\n\n@router.delete(\"/{name}\")\ndef delete(name: str):\n\
    \    return None\n```\n\nТеперь сделайте то же самое для конечных точек /creature\
    \ (пример 8.15). Да, пока это похоже на вырезанный и вставленный код, но если\
    \ сделать все заранее, это упростит внесение изменений в дальнейшем — а они всегда\
    \ будут.\n\n### Пример 8.15. Новые конечные точки в файле web/creature.py\n\n\
    ```python\nfrom fastapi import APIRouter\nfrom model.creature import Creature\n\
    import fake.creature as service\n\nrouter = APIRouter(prefix = \"/creature\")\n\
    \n@router.get(\"/\")\ndef get_all() -> list[Creature]:\n    return service.get_all()\n\
    \n@router.get(\"/{name}\")\ndef get_one(name) -> Creature:\n    return service.get_one(name)\n\
    \n# все остальные конечные точки пока ничего не делают:\n@router.post(\"/\")\n\
    def create(creature: Creature) -> Creature:\n    return service.create(creature)\n\
    \n@router.patch(\"/\")\ndef modify(creature: Creature) -> Creature:\n    return\
    \ service.modify(creature)\n\n@router.put(\"/\")\ndef replace(creature: Creature)\
    \ -> Creature:\n    return service.replace(creature)\n\n@router.delete(\"/{name}\"\
    )\ndef delete(name: str):\n    return service.delete(name)\n```\n\nВ последний\
    \ раз мы обращались к файлу main.py, чтобы добавить субмаршрут для URL-адресов\
    \ /explorer. Теперь добавим еще один для модуля /creature (пример 8.16).\n\n###\
    \ Пример 8.16. Добавление субмаршрута существа в файл main.py\n\n```python\nimport\
    \ uvicorn\nfrom fastapi import FastAPI\nfrom web import explorer, creature\n\n\
    app = FastAPI()\n\napp.include_router(explorer.router)\napp.include_router(creature.router)\n\
    \nif __name__ == \"__main__\":\n    uvicorn.run(\"main:app\", reload=True)\n```\n\
    \nВсе сработало? Если вы набрали или вставили все точно, Uvicorn должен был перезапустить\
    \ приложение. Попробуем провести несколько тестов вручную.\n\n## Тестируем!\n\n\
    В главе 12 будет показано, как использовать pytest для автоматизации тестирования\
    \ на разных уровнях. В примерах 8.17–8.21 вручную выполняются несколько тестов\
    \ веб-уровня для конечных точек исследователя с помощью HTTPie.\n\n### Пример\
    \ 8.17. Тестирование конечной точки с инструкцией Get All\n\n```bash\n$ http -b\
    \ localhost:8000/explorer/\n[\n    {\n        \"country\": \"FR\",\n        \"\
    name\": \"Claude Hande\",\n        \"description\": \"Scarce during full moons\"\
    \n    },\n    {\n        \"country\": \"DE\",\n        \"name\": \"Noah Weiser\"\
    ,\n        \"description\": \"Myopic machete man\"\n    }\n]\n```\n\n### Пример\
    \ 8.18. Тестирование конечной точки с инструкцией Get One\n\n```bash\n$ http -b\
    \ localhost:8000/explorer/\"Noah Weiser\"\n{\n    \"country\": \"DE\",\n    \"\
    name\": \"Noah Weiser\",\n    \"description\": \"Myopic machete man\"\n}\n```\n\
    \n### Пример 8.19. Тестирование конечной точки с инструкцией Replace\n\n```bash\n\
    $ http -b PUT localhost:8000/explorer/\"Noah Weiser\"\n{\n    \"country\": \"\
    DE\",\n    \"name\": \"Noah Weiser\",\n    \"description\": \"Myopic machete man\"\
    \n}\n```\n\n### Пример 8.20. Тестирование конечной точки с инструкцией Modify\n\
    \n```bash\n$ http -b PATCH localhost:8000/explorer/\"Noah Weiser\"\n{\n    \"\
    country\": \"DE\",\n    \"name\": \"Noah Weiser\",\n    \"description\": \"Myopic\
    \ machete man\"\n}\n```\n\n### Пример 8.21. Тестирование конечной точки с инструкцией\
    \ Delete\n\n```bash\n$ http -b DELETE localhost:8000/explorer/Noah%20Weiser\n\
    true\n\n$ http -b DELETE localhost:8000/explorer/Edmund%20Hillary\nfalse\n```\n\
    \nТо же самое можно сделать для конечных точек в части /creature."
  mdcn: "## 创建模拟数据\n\n自顶向下工作时，您将在所有三个层级上复制某些功能。为了节省输入时间，在示例8.12中，我将创建一个名为`fake`的顶层目录。其中包含提供关于探险家和生物的模拟数据的模块。\n\
    \n### 示例8.12. 文件`fake/explorer.py`中的新模块\n\n```python\nfrom model.explorer import\
    \ Explorer\n\n# 模拟数据，在第10章中将被替换为真实数据库和SQL\n_explorers = [\n    Explorer(name=\"\
    Claude Hande\",\n             country=\"FR\",\n             description=\"Scarce\
    \ during full moons\"),\n    Explorer(name=\"Noah Weiser\",\n             country=\"\
    DE\",\n             description=\"Myopic machete man\"),\n]\n\ndef get_all() ->\
    \ list[Explorer]:\n    \"\"\"返回所有探险家\"\"\"\n    return _explorers\n\ndef get_one(name:\
    \ str) -> Explorer | None:\n    for _explorer in _explorers:\n        if _explorer.name\
    \ == name:\n            return _explorer\n    return None\n\n# 以下变体目前尚不可用，\n#\
    \ 因此它们只是假装在工作，\n# 而不改变真实的模拟列表\ndef create(explorer: Explorer) -> Explorer:\n \
    \   \"\"\"添加探险家\"\"\"\n    return explorer\n\ndef modify(explorer: Explorer) ->\
    \ Explorer:\n    \"\"\"部分修改探险家记录\"\"\"\n    return explorer\n\ndef replace(explorer:\
    \ Explorer) -> Explorer:\n    \"\"\"完全替换探险家记录\"\"\"\n    return explorer\n\ndef\
    \ delete(name: str) -> bool:\n    \"\"\"删除探险家记录；如果记录存在则返回None\"\"\"\n    return\
    \ None\n```\n\n示例8.13中的生物设置类似。\n\n### 示例8.13. 文件`fake/creature.py`中的新模块\n\n```python\n\
    from model.creature import Creature\n\n# 模拟数据，直到被真实数据库和SQL替换为止\n_creatures = [\n\
    \    Creature(name=\"Yeti\",\n             aka=\"Abominable Snowman\",\n     \
    \        country=\"CN\",\n             area=\"Himalayas\",\n             description=\"\
    Hirsute Himalayan\"),\n    Creature(name=\"Bigfoot\",\n             description=\"\
    Yeti's Cousin Eddie\",\n             country=\"US\",\n             area=\"*\"\
    ,\n             aka=\"Sasquatch\"),\n]\n\ndef get_all() -> list[Creature]:\n \
    \   \"\"\"返回所有生物\"\"\"\n    return _creatures\n\ndef get_one(name: str) -> Creature\
    \ | None:\n    \"\"\"返回单个生物\"\"\"\n    for _creature in _creatures:\n        if\
    \ _creature.name == name:\n            return _creature\n    return None\n\n#\
    \ 以下变体目前尚不可用，\n# 因此它们只是假装在工作，\n# 而不改变真实的模拟列表\ndef create(creature: Creature) ->\
    \ Creature:\n    \"\"\"添加生物\"\"\"\n    return creature\n\ndef modify(creature:\
    \ Creature) -> Creature:\n    \"\"\"部分修改生物记录\"\"\"\n    return creature\n\ndef\
    \ replace(creature: Creature) -> Creature:\n    \"\"\"完全替换生物记录\"\"\"\n    return\
    \ creature\n\ndef delete(name: str):\n    \"\"\"删除生物记录；如果记录存在则返回None\"\"\"\n \
    \   return None\n```\n\n是的，这些模块的函数几乎完全相同。当出现真实数据库时，它们稍后会改变——它将处理两个模型的不同字段。此外，我使用了单独的函数，而不是定义一个抽象类或`Fake`类。模块有自己的命名空间，因此这是组合数据和函数的等效方式。\n\
    \n现在，让我们修改示例8.12和8.13中的Web函数。为准备创建后续层级（服务层和数据层），请导入刚刚定义的模拟数据提供者，但在`import fake.explorer\
    \ as service`这行中将其命名为`service`（示例8.14）。在第9章中，您将执行以下操作：\n\n- 创建一个新文件`service/explorer.py`；\n\
    - 在其中导入模拟数据；\n- 指示`web/explorer.py`文件的代码导入新的服务模块，而不是模拟模块。\n\n在第10章中，您将在数据层执行相同的操作。所有这些都归结为添加程序的各个部分并连接它们，同时尽可能少地重写代码。电力（即真实数据库和持久数据）您将在第10章稍后接通。\n\
    \n### 示例8.14. 文件`web/explorer.py`中的新端点\n\n```python\nfrom fastapi import APIRouter\n\
    from model.explorer import Explorer\nimport fake.explorer as service\n\nrouter\
    \ = APIRouter(prefix = \"/explorer\")\n\n@router.get(\"/\")\ndef get_all() ->\
    \ list[Explorer]:\n    return service.get_all()\n\n@router.get(\"/{name}\")\n\
    def get_one(name) -> Explorer | None:\n    return service.get_one(name)\n\n# 所有其他端点目前都不执行任何操作：\n\
    @router.post(\"/\")\ndef create(explorer: Explorer) -> Explorer:\n    return service.create(explorer)\n\
    \n@router.patch(\"/\")\ndef modify(explorer: Explorer) -> Explorer:\n    return\
    \ service.modify(explorer)\n\n@router.put(\"/\")\ndef replace(explorer: Explorer)\
    \ -> Explorer:\n    return service.replace(explorer)\n\n@router.delete(\"/{name}\"\
    )\ndef delete(name: str):\n    return None\n```\n\n现在，对`/creature`端点执行相同的操作（示例8.15）。是的，目前这看起来像是复制粘贴的代码，但如果提前完成所有操作，将简化后续的修改——而修改总是会发生的。\n\
    \n### 示例8.15. 文件`web/creature.py`中的新端点\n\n```python\nfrom fastapi import APIRouter\n\
    from model.creature import Creature\nimport fake.creature as service\n\nrouter\
    \ = APIRouter(prefix = \"/creature\")\n\n@router.get(\"/\")\ndef get_all() ->\
    \ list[Creature]:\n    return service.get_all()\n\n@router.get(\"/{name}\")\n\
    def get_one(name) -> Creature:\n    return service.get_one(name)\n\n# 所有其他端点目前都不执行任何操作：\n\
    @router.post(\"/\")\ndef create(creature: Creature) -> Creature:\n    return service.create(creature)\n\
    \n@router.patch(\"/\")\ndef modify(creature: Creature) -> Creature:\n    return\
    \ service.modify(creature)\n\n@router.put(\"/\")\ndef replace(creature: Creature)\
    \ -> Creature:\n    return service.replace(creature)\n\n@router.delete(\"/{name}\"\
    )\ndef delete(name: str):\n    return service.delete(name)\n```\n\n上一次我们访问了`main.py`文件，为`/explorer`\
    \ URL添加了子路由。现在，让我们为`/creature`模块添加另一个子路由（示例8.16）。\n\n### 示例8.16. 在文件`main.py`中添加生物子路由\n\
    \n```python\nimport uvicorn\nfrom fastapi import FastAPI\nfrom web import explorer,\
    \ creature\n\napp = FastAPI()\n\napp.include_router(explorer.router)\napp.include_router(creature.router)\n\
    \nif __name__ == \"__main__\":\n    uvicorn.run(\"main:app\", reload=True)\n```\n\
    \n一切正常吗？如果您准确地输入或粘贴了所有内容，Uvicorn应该已经重新启动了应用程序。让我们尝试手动进行一些测试。\n\n## 测试！\n\n第12章将展示如何使用pytest在不同层级上自动化测试。在示例8.17–8.21中，我们使用HTTPie手动执行几个Web层级的探险家端点测试。\n\
    \n### 示例8.17. 测试Get All指令的端点\n\n```bash\n$ http -b localhost:8000/explorer/\n\
    [\n    {\n        \"country\": \"FR\",\n        \"name\": \"Claude Hande\",\n\
    \        \"description\": \"Scarce during full moons\"\n    },\n    {\n      \
    \  \"country\": \"DE\",\n        \"name\": \"Noah Weiser\",\n        \"description\"\
    : \"Myopic machete man\"\n    }\n]\n```\n\n### 示例8.18. 测试Get One指令的端点\n\n```bash\n\
    $ http -b localhost:8000/explorer/\"Noah Weiser\"\n{\n    \"country\": \"DE\"\
    ,\n    \"name\": \"Noah Weiser\",\n    \"description\": \"Myopic machete man\"\
    \n}\n```\n\n### 示例8.19. 测试Replace指令的端点\n\n```bash\n$ http -b PUT localhost:8000/explorer/\"\
    Noah Weiser\"\n{\n    \"country\": \"DE\",\n    \"name\": \"Noah Weiser\",\n \
    \   \"description\": \"Myopic machete man\"\n}\n```\n\n### 示例8.20. 测试Modify指令的端点\n\
    \n```bash\n$ http -b PATCH localhost:8000/explorer/\"Noah Weiser\"\n{\n    \"\
    country\": \"DE\",\n    \"name\": \"Noah Weiser\",\n    \"description\": \"Myopic\
    \ machete man\"\n}\n```\n\n### 示例8.21. 测试Delete指令的端点\n\n```bash\n$ http -b DELETE\
    \ localhost:8000/explorer/Noah%20Weiser\ntrue\n\n$ http -b DELETE localhost:8000/explorer/Edmund%20Hillary\n\
    false\n```\n\n对于`/creature`部分的端点，也可以执行相同的操作。"
