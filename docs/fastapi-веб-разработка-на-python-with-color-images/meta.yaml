    \n## 包管理\n\n你需要下载第三方 Python 包并将其安全地安装到你的计算机上。经典的工具是 pip 系统 (https://pip.pypa.io)。\n\
    \n但是如何下载这个下载器呢？如果你安装的是来自 Python 软件基金会的 Python，那么你应该已经有 pip 了。如果没有，请按照 pip 网站上的说明获取它。在整本书中，当我介绍一个新的\
    \ Python 包时，我也会指出用于下载它的 pip 命令。\n\n你可以用经典好用的 pip 做很多事情，但你可能还想使用虚拟环境，并考虑使用 Poetry\
    \ 等替代工具。\n\n## 虚拟环境\n\nPip 会下载并安装包，但它应该把它们放在哪里呢？虽然标准 Python 及其附带的库通常安装在操作系统的标准位置，但你无法（而且很可能不应该）在那里进行任何更改。Pip\
    \ 使用一个与系统不同的默认目录，因此安装不会影响系统中的标准 Python 文件。这是可以更改的。有关你的操作系统的详细信息，请参阅 pip 网站。\n\n\
    通常需要处理多个 Python 版本或为特定项目安装版本，因此你肯定想知道系统中有哪些包。为此，Python 支持 *虚拟环境*。这些只是目录（在非 Unix\
    \ 世界中是 *文件夹*），pip 将下载的包写入其中。当你 *激活* 一个虚拟环境时，你的 shell（主要系统命令的解释器）在加载 Python 模块时会首先查找它。这通过\
    \ venv 程序 ([https://oreil.ly/9kv5T](https://oreil.ly/9kv5T)) 实现，该程序从 Python 3.4\
    \ 版本开始就包含在标准安装包中。\n\n让我们创建一个名为 venv1 的虚拟环境。你可以将 venv 模块作为独立程序运行：\n\n```\n$ venv\
    \ venv1\n```\n\n或者作为 Python 模块运行：\n\n```\n$ python -m venv venv1\n```\n\n要使其成为你当前的\
    \ Python 环境，请执行此 shell 命令（在 Linux 或 Mac 上，对于 Windows 和其他操作系统，请参阅 venv 文档）：\n\n\
    ```\n$ source venv1/bin/activate\n```\n\n现在，每次你运行 pip install 时，包都会安装到 venv1 环境中。当你运行\
    \ Python 程序时，你的 Python 解释器和模块就在那里。\n\n要停用虚拟环境，请按 Control+D 组合键（对于 Linux 或 Mac）或输入\
    \ deactivate 命令（对于 Windows）。\n\n你可以创建替代的开发环境，例如 venv2，并停用/激活它们以在它们之间切换（尽管我希望你在命名方面比我更有想象力）。\n\
    \n## Poetry 工具\n\npip 和 venv 的组合非常普遍，以至于人们开始将它们结合起来以减少工作步骤并避免 shell 的 *source*\
    \ 技巧。其中一个这样的包是 Pipenv (https://pipenv.pypa.io)，但一个名为 Poetry (https://python-poetry.org)\
    \ 的更新的竞争对手正变得越来越受欢迎。\n\n我使用过 pip、Pipenv 和 Poetry，但现在更喜欢 Poetry。可以通过命令 `pip install\
    \ poetry` 安装它。Poetry 有许多额外的命令，例如 `poetry add` 用于将包添加到虚拟环境，`poetry install` 用于下载和安装工具等。请查看\
    \ Poetry 网站或运行命令 `poetry` 以打开帮助部分。\n\n除了下载单个包之外，pip 和 Poetry 还在配置文件中管理多个包——pip\
    \ 使用 `requirements.txt`，Poetry 使用 `pyproject.toml`。Poetry 和 pip 不仅下载包，还管理包之间可能存在的复杂依赖关系。你可以将所需的包版本指定为最小值、最大值、范围或精确值，这也称为\
    \ *pinning* 或 *固定*。随着项目的增长和其依赖包的变化，这个问题可能变得重要。如果使用的功能是首次出现在某个包中，则可能需要该包的最小版本，或者如果该功能已被弃用，则可能需要最大版本。\n\
    \n## 源代码格式化\n\n源代码格式化不如前面章节的主题重要，但仍然很有用。使用将源代码转换为标准、非奇怪格式的工具，可以避免关于代码格式化的争论（*bikeshedding*）。一个好的选择是\
    \ Black 包 (https://black.readthedocs.io)。可以通过命令 `pip install black` 安装它。\n\n##\
    \ 测试\n\n测试在第 12 章中有详细介绍。虽然 Python 的标准测试包是 unittest，但大多数 Python 开发人员使用的工业级 Python\
    \ 测试包是 pytest (https://docs.pytest.org)。可以通过命令 `pip install pytest` 安装它。\n\n##\
    \ 源代码控制和持续集成\n\n现在几乎通用的源代码控制解决方案是 *Git*，其仓库（repositories）托管在 GitHub 和 GitLab 等网站上。使用\
    \ *Git* 不能被认为是 Python 或 FastAPI 特有的，但你很可能会在开发过程中大部分时间都使用它。*pre-commit* 工具 (https://pre-commit.com)\
    \ 在你执行 *Git* 提交之前，在你的本地机器上运行各种测试，例如 *black* 和 *pytest*。在将代码放入远程 *Git* 仓库后，可以在那里运行更多的持续集成\
    \ (Continuous Integration, CI) 测试。\n\n更详细的信息包含在第 12 章和第 13 章的“故障排除”部分。\n\n## Web\
    \ 工具\n\n第 3 章展示了如何安装和应用本书中使用的主要 Python Web 工具：\n\n- *FastAPI* — Web 框架本身；\n- *Uvicorn*\
    \ — 异步 Web 服务器；\n- *HTTPie* — 类似于 *curl* 的文本 Web 客户端；\n- *Requests* — 同步 Web 客户端包；\n\
    - *HTTPX* — 同步/异步 Web 客户端包。\n\n## API 和服务\n\nPython 模块和包对于创建不会变成“一团糟”(https://oreil.ly/zzX5T)\
    \ 的大型应用程序是必需的。即使在单进程 Web 服务中，也可以通过仔细设计模块和导入来保持第 1 章中描述的分离。\n\nPython 的内置数据结构非常灵活，到处使用它们非常诱人。但在接下来的章节中，你将看到可以定义更高级别的模型，以使跨层交互更清晰。这些模型依赖于\
    \ Python 的一个相对较新的补充，称为 *类型提示* (type hinting)。让我们来解决这个问题，但首先简要介绍一下 Python 如何 *处理变量*。这不会妨碍你。"
