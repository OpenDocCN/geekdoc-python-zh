  mdcn: "## 密码术\n\n```html\n<table id=\"guesses\">\n</table>\n<span id=\"status\"\
    ></span>\n<hr>\n```\n\n<div>\n{% for letter in word %}<input type=text name=\"\
    guess\">{% endfor %}\n<input type=hidden id=\"word\" value=\"{{word}}\">\n<br><br>\n\
    <input type=submit onclick=\"post_guess()\">\n</div>\n\n</body>\n\n# 第一部分服务 —\
    \ 初始化\n\n示例 18.4 展示了将 Web 层的游戏启动功能与数据层的随机生物名称提供功能连接起来的服务代码。\n\n**示例 18.4.** 计算结果\
    \ (service/game.py)\n\n```python\nimport data.game as data\n\ndef get_word() ->\
    \ str:\n    return data.get_word()\n```\n\n# 第二部分服务 — 定义结果\n\n将示例 18.5 中的代码添加到示例\
    \ 18.4 的代码中。结果是一个由单个字符组成的字符串，指示输入的字母是否与正确位置匹配、与其他位置匹配或指示错误。猜测的字母和单词都转换为小写，以使匹配不区分大小写。如果猜测的长度与隐藏单词的长度不匹配，则返回空字符串。\n\
    \n**示例 18.5.** 计算结果 (service/game.py)\n\n```python\nfrom collections import Counter,\
    \ defaultdict\n\nHIT = \"H\"\nMISS = \"M\"\nCLOSE = \"C\" # (字母在单词中，但在不同位置)\n\n\
    def get_score(actual: str, guess: str) -> str:\n    length: int = len(actual)\n\
    \    if len(guess) != length:\n        return ERROR\n    actual_counter = Counter(actual)\
    \ # {字母: 计数, ...}\n    guess_counter = defaultdict(int)\n    result = [MISS] *\
    \ length\n    for pos, letter in enumerate(guess):\n        if letter == actual[pos]:\n\
    \            result[pos] = HIT\n            guess_counter[letter] += 1\n    for\
    \ pos, letter in enumerate(guess):\n        if result[pos] == HIT:\n         \
    \   continue\n        guess_counter[letter] += 1\n        if (letter in actual\
    \ and\n            guess_counter[letter] <= actual_counter[letter]):\n       \
    \     result[pos] = CLOSE\n    result = ''.join(result)\n    return result\n```\n\
    \n# 测试！\n\n示例 18.6 包含几个用于计算服务评分的 pytest 练习。在代码中，我们使用 pytest 的参数化功能来传递测试序列，而不是在测试函数本身内部编写循环。请记住示例\
    \ 18.5 中的内容，H 表示精确命中，C 表示接近（位置错误），M 表示玩家完全没有猜中。\n\n**示例 18.6.** 测试计算结果 (test/unit/service/test_game.py)\n\
    \n```python\nimport pytest\nfrom service import game\n\nword = \"bigfoot\"\nguesses\
    \ = [\n    (\"bigfoot\", \"HHHHHHH\"),\n    (\"abcdefg\", \"MCMMMCC\"),\n    (\"\
    toofgib\", \"CCCHCCC\"),\n    (\"wronglength\", \"\"),\n    (\"\", \"\"),\n  \
    \  ]\n\n@pytest.mark.parametrize(\"guess,score\", guesses)\ndef test_match(guess,\
    \ score):\n    assert game.get_score(word, guess) == score\n```\n\n运行：\n\n```\n\
    $ pytest -q test_game.py\n.....\n5 passed in 0.05s\n```\n\n# 数据 — 初始化\n\n在新模块\
    \ data/game.py 中，只需要一个函数，如示例 18.7 所示。\n\n**示例 18.7.** 获取随机生物名称 (data/game.py)\n\
    \n```python\nfrom .init import curs\n\ndef get_word() -> str:\n    qry = \"select\
    \ name from creature order by random() limit 1\"\n    curs.execute(qry)\n    row\
    \ = curs.fetchone()\n    if row:\n        name = row[0]\n    else:\n        name\
    \ = \"bigfoot\"\n    return name\n```\n\n# 让我们玩“密码术”\n\n（谁来想个更好的名字吧。）\n\n在浏览器中访问\
    \ http://localhost:8000/game。屏幕上应该会出现以下图像。\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_267_0.png)\n\
    \n输入几个字母并作为猜测提交，看看会发生什么。\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_267_1.png)\n\
    \n字母 *b*、*f* 和 *g* 以黄色突出显示（如果您没有看到颜色，您必须相信我的话！）。这表明它们存在于隐藏的名称中，但位置不正确。\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_268_0.png)\n\
    \n让我们尝试想出一个名称，但更改最后一个字母。在第二行中，我们看到了很多绿色。哇，太接近了！\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_268_1.png)\n\
    \n更正最后一个字母，并出于兴趣将某些字母大写，以确保匹配不区分大小写。确认提交，太棒了！\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_268_2.png)\n\
    \n# 结论\n\n我们使用了 HTML、JavaScript、CSS 和 FastAPI 来创建一个简单的（非常！）类似 Wordle 的交互式游戏。本节展示了如何使用\
    \ JSON 和 Ajax 管理 Web 客户端和服务器之间的多线程交互。\n\n# 附录 A\n\n# 补充阅读\n\n如果您想了解更多，并填补我未深入探讨或完全未涉及的领域的知识，您会发现许多优秀的资源。本附录列出了学习\
    \ Python、FastAPI、Starlette 和 Pydantic 的资源。\n\n# Python\n\n以下是一些著名的 Python 网站：\n\
    \n- *Python 软件基金会* (https://www.python.org) — 基础材料；\n- *Real Python 教程* (https://realpython.com)\
    \ — 详细的 Python 学习指南；\n- *Reddit* (https://www.reddit.com/r/Python) — reddit.com\
    \ 网站上关于 Python 的主要论坛部分；\n- *Stack Overflow* (https://stackoverflow.com/questions/tagged/python)\
    \ — 带有 Python 标签的问题；\n- *Pycoder's Weekly* (https://pycoders.com) — 每周电子邮件通讯；\n\
    - *Anaconda* (https://www.anaconda.com) — 科学信息分发。\n\n以下是一些在撰写本书期间对我有用的 Python\
