  md: 'Обычный бэкенд для веб-сайта — это база данных. Веб-сайты и базы данных — это
    как арахисовое масло и желе, и хотя вы можете хранить свои данные и другими способами
    (или сочетать арахисовое масло с огурцами), в этой книге мы будем использовать
    базы данных.


    Базы данных решают многие проблемы, которые в противном случае вам пришлось бы
    решать самостоятельно с помощью кода, например такие:


    +   - множественный доступ;

