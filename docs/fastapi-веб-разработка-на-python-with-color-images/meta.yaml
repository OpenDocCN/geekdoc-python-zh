  md: '# ГЛАВА 17


    # Обнаружение и визуализация данных


    # Обзор


    Несмотря на то что в названии фреймворка FastAPI фигурирует акроним *API*, он
    может служить не только для API. В этой главе вы узнаете, как создавать таблицы,
    графики, диаграммы и карты на основе данных, используя небольшую базу данных о
    воображаемых существах со всего мира.


    # Python и данные


    В последние несколько лет Python стал очень популярным по многим причинам:


    +   - он легок в обучении;

    - у него прозрачный синтаксис;

    - он имеет богатую стандартную библиотеку;

    - в нем огромное количество высококачественных пакетов сторонних разработчиков;

    - особое внимание в нем уделяется манипулированию данными, преобразованию и самостоятельной
    проверке.'
