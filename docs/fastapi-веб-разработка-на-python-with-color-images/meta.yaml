    еще намного больше, чем прошлое.


    *Тим Бернерс-Ли*


    # Обзор


    Когда-то Всемирная паутина была маленькой и простой. Разработчикам было так весело
    отправлять вызовы PHP, HTML и MySQL в отдельные файлы и с гордостью говорить всем,
    что они могут заглянуть на свой веб-сайт. Но со временем Сеть разрослась до невообразимого
    количества страниц и развивающаяся игровая площадка превратилась в metavселенную
    тематических парков.


    В этой главе отмечены некоторые все более актуальные для современной Всемирной
    паутины области:


    +   - сервисы и API;

    - конкурентность;

    - уровни (слои);

    - данные.


    В следующей главе я расскажу о том, какие возможности предоставляет Python для
    работы в этих областях. После этого погрузимся в веб-фреймворк FastAPI и посмотрим,
    что он может предложить.'
  - '[PAGE 21]


    # Сервисы и API


    Паутина — это отличная соединительная ткань. Несмотря на то что большая часть
    деятельности по-прежнему происходит на стороне контента — HTML, JavaScript, изображений
    и т. д., все больше внимания уделяется интерфейсам прикладного программирования
    (API), соединяющим различные элементы программ.


    Обычно веб-сервис управляет низкоуровневым доступом к базе данных и бизнес-логикой
    среднего уровня (часто их объединяют в бэкенд), а JavaScript или мобильные приложения
    обеспечивают богатый фронтенд верхнего уровня (интерактивный пользовательский
    интерфейс). Эти миры становятся все более сложными и разнообразными, что обычно
    требует от разработчиков специализации в том или ином направлении.


    Быть разработчиком полного стека (фулстека) сейчас сложнее, чем раньше¹.


    Эти два мира общаются друг с другом с помощью API. В современном Интернете дизайн
    API так же важен, как и дизайн самих сайтов. API — это контракт, подобный схеме
    базы данных. Определение и модификация API — это уже серьезная работа.


    # Виды API


    Каждый API определяет следующее:


    +   - протокол — структуру управления;

    - формат — структуру содержимого.


    Многочисленные методы API развивались по мере эволюции технологий от изолированных
    машин до многозадачных систем и сетевых серверов. Вероятно, в какой-то момент
    вы столкнетесь с одним или несколькими из них, поэтому далее приведу краткое описание,
    прежде чем перейти к языку HTTP и его друзьям, описанным в этой книге.


    +   - До появления сетей API обычно означал очень тесную связь, например вызов
    функции из библиотеки на том же языке, что и ваше приложение, — скажем, вычисление
    квадратного корня в математической библиотеке.


    > ¹ Я бросил попытки несколько лет назад.'
- md: "● *Удаленные вызовы процедур* (remote procedure call, RPC) были придуманы для\
    \ вызова функций в других процессах на той же или другой машине, как если бы они\
    \ находились в вызывающем приложении. Популярным примером в настоящее время служит\
    \ система gRPC (https://grpc.io).\n\n● С помощью *системы передачи сообщений*\
    \ отправляются небольшие фрагменты данных по конвейеру между процессами. Сообщения\
    \ могут быть глагольными командами или просто обозначать интересующие вас *события*,\
    \ похожие на существительные. В настоящее время популярными решениями для обмена\
    \ сообщениями, которые варьируются от наборов инструментов до полноценных серверов,\
    \ являются брокеры Apache Kafka (https://kafka.apache.org), RabbitMQ (https://www.rabbitmq.com),\
    \ NATS (https://nats.io) и ZeroMQ (https://zeromq.org). Взаимодействие может строиться\
    \ по разным схемам:\n    * *запрос — ответ*. Точно так, как браузер вызывает веб-сервер;\n\
    \    * *издатель — подписчик*, или *pub-sub*. Издатель (publisher, или pub) рассылает\
    \ сообщения, а подписчики (subscribers, или sub) обрабатывают каждое из них в\
    \ соответствии с некоторыми данными, содержащимися в сообщении, например с темой;\n\
    \    * *очереди*. Работают как подход pub-sub, но только один подписчик из пула\
    \ получает сообщение и действует в соответствии с ним.\n\nЛюбой из этих подходов\
    \ может использоваться вместе с веб-сервисом, например, для выполнения медленной\
    \ задачи бэкенда, такой как отправка электронной почты или создание уменьшенного\
    \ изображения.\n\n## HTTP\n\nБернерс-Ли предложил для своей Всемирной паутины\
    \ три компонента:\n● *HTML* — язык для отображения данных;\n● *HTTP* — протокол\
    \ «клиент — сервер»;\n● *URL* — схему адресации для веб-ресурсов.\n\nХотя в ретроспективе\
    \ все кажется очевидным, на деле это оказалось до смешного полезной комбинацией.\
    \ По мере развития Интернета люди экспериментировали, и некоторые идеи, такие\
    \ как тег IMG, выжили в борьбе по Дарвину. По мере того как потребности пользователей\
    \ прояснялись, люди всерьез занялись определением стандартов.\n\n## REST(ful)\n\
    \nВ одной из глав докторской диссертации ([https://oreil.ly/TwGmX](https://oreil.ly/TwGmX))\
    \ Роя Филдинга есть определение *передачи репрезентативного состояния* (Representational\
    \ State Transfer, REST) — *архитектурного стиля* для использования HTTP¹. Несмотря\
    \ на то что на эту работу часто ссылаются, ее по большей части неправильно понимают\
    \ ([https://oreil.ly/bsSry](https://oreil.ly/bsSry)).\n\nВ современной Паутине\
    \ развилась и доминирует примерно одинаковая адаптация. Она называется *RESTful*\
    \ и обладает следующими характеристиками:\n\n- использует HTTP и протокол «клиент\
    \ — сервер»;\n- не имеет состояния (каждое соединение независимо);\n- кэшируема;\n\
    - основана на ресурсах.\n\n*Ресурс* — это данные, которые можно определять и с\
    \ которыми можно выполнять операции. Веб-сервис предоставляет *конечную точку*\
    \ — отдельный URL и HTTP-глагол (действие) — для каждой функции. Конечную точку\
    \ называют также *маршрутом*, поскольку она направляет URL к функции.\n\nПользователи\
    \ баз данных знакомы с акронимом *CRUD* для процедур: создание (create), чтение\
    \ (read), модификация (update), удаление (delete). HTTP-глаголы довольно хорошо\
    \ вписываются в понятие CRUD:\n\n- POST — создание (запись);\n- PUT — полная модификация\
    \ (замена);\n- PATCH — частичная модификация (обновление);\n- GET — получение\
    \ (считывание, извлечение);\n- DELETE — удаление.\n\nКлиент отправляет запрос\
    \ на конечную точку RESTful с данными в одной из таких областей HTTP-сообщения,\
    \ как:\n\n> ¹ Под стилем понимается шаблон более высокого уровня, например «клиент\
    \ — сервер», а не конкретная конструкция.\n\n- заголовки;\n- строка URL;\n- параметры\
    \ запроса;\n- значения в теле сообщения.\n\nВ свою очередь, HTTP-ответ возвращает:\n\
    \n- целочисленное значение *кода состояния* ([https://oreil.ly/oBena](https://oreil.ly/oBena)),\
    \ определяющее такие состояния, как:\n    - группа кодов 100 — информация, продолжение\
    \ выполнения;\n    - группа кодов 200 — успешное выполнение;\n    - группа кодов\
    \ 300 — перенаправление;\n    - группа кодов 400 — ошибка на стороне клиента;\n\
    \    - группа кодов 500 — ошибка на стороне сервера;\n- различные заголовки;\n\
    - тело сообщения, которое может быть пустым, единым или разделенным на *части*\
    \ (последовательные фрагменты).\n\nПо крайней мере один код состояния можно считать\
    \ пасхалкой — 418 (I'm a teapot, [https://www.google.com/teapot](https://www.google.com/teapot)).\
    \ На странице должен появиться подключенный к сети чайник. Если попросить, он\
    \ нальет вам чашечку чая.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_24_0.png)\n\
    \nВ широком доступе существует множество сайтов и книг о проектировании RESTful\
    \ API, и все они содержат полезные практические указания. Эта книга станет вашим\
    \ помощником в пути.\n\n## Форматы данных JSON и API\n\nФронтенд-приложения могут\
    \ обмениваться обычным текстом на основе стандарта ASCII с веб-сервисами бэкенда,\
    \ но как выразить структуры данных, такие как списки элементов?\n\nКак раз в момент\
    \ острой нужды появился формат «обозначения объектов JavaScript» (JavaScript Object\
    \ Notation, JSON) — еще одна простая идея, решающая важную проблему и кажущаяся\
    \ очевидной в ретроспективе. Хотя J означает JavaScript, синтаксис очень похож\
    \ на Python.\n\nJSON в значительной степени заменил такие более ранние попытки\
    \ реализации этой идеи, как XML и SOAP. В оставшейся части этой книги вы увидите,\
    \ что JSON — это формат для ввода и вывода у веб-сервисов по умолчанию.\n\n##\
    \ JSON:API\n\nСочетание RESTful-дизайна и форматов данных JSON уже стало привычным.\
    \ Но некоторые возможности для двусмысленности и занудства все же остаются. Недавнее\
    \ предложение JSON:API (https://jsonapi.org) направлено на то, чтобы немного ужесточить\
    \ спецификации. В этой книге используется свободный подход RESTful, но JSON:API\
    \ или что-то подобное может оказаться полезным, если у вас возникнут серьезные\
    \ затруднения.\n\n## GraphQL\n\nДля некоторых целей RESTful-интерфейсы могут быть\
    \ громоздкими. Facebook (сейчас Meta¹) разработала язык под названием Graph Query\
    \ Language (GraphQL) (https://graphql.org). Он позволяет определить более гибкие\
    \ запросы. В этой книге GraphQL не рассматривается, но, возможно, стоит обратить\
    \ на него внимание, если вы считаете, что RESTful-дизайн не подходит для вашего\
    \ приложения.\n\n## Конкурентность\n\nНаряду с ростом ориентированности на сервисы\
    \ стремительное увеличение количества подключений к веб-сервисам требует все большей\
    \ эффективности и масштабирования. Нужно снизить следующие показатели:\n\n¹ Деятельность\
    \ запрещена в РФ.\n\n- *время ожидания* — предварительное время ожидания;\n- *пропускную\
    \ способность* — количество байтов в секунду между сервисом и его абонентами.\n\
    \nВ давние времена, работая во Всемирной паутине¹, люди мечтали о поддержке сотен\
    \ одновременных подключений, затем беспокоились о «проблеме 10 000», а теперь\
    \ обсуждают миллионные значения.\n\nТермин «конкурентность» не означает полный\
    \ параллелизм. Множественная обработка не происходит в одну и ту же наносекунду\
    \ в одном процессоре. Конкурентность в основном позволяет избежать напряженного\
    \ ожидания (простояния центрального процессора (ЦП) до получения ответа). ЦП работают\
    \ быстро, а сети и диски — в тысячи и миллионы раз медленнее. Поэтому при обращении\
    \ к сети или диску никто не хочет просто сидеть с пустым взглядом, пока не поступит\
    \ ответ.\n\nОбычное выполнение Python *синхронизировано* — выполняется одно действие\
    \ за раз в порядке, указанном кодом. Иногда требуется работа в *асинхронном* режиме\
    \ — выполнить немного одного, потом немного другого, вернуться к первому и т.\
    \ д. Если весь код использует центральный процессор для вычислений (*CPU bound*),\
    \ то у нас нет свободного времени на асинхронность. Но если выполняется процесс,\
    \ указывающий процессору ждать завершения операции от внешнего источника (I/O\
    \ bound), можно организовать асинхронность.\n\nАсинхронные системы обеспечивают\
    \ *цикл событий*: запросы на медленные операции отправляются и отмечаются, но\
    \ в ожидании их ответов не происходит задержка работы ЦП. Вместо этого при каждом\
    \ проходе через цикл выполняется немедленная обработка, а все ответы, поступившие\
    \ за это время, обрабатываются при следующем проходе.\n\nЭффект от этих действий\
    \ может быть драматическим. Далее в книге вы увидите, как поддержка асинхронной\
    \ обработки в FastAPI делает его намного быстрее, чем типичные веб-фреймворки.\
    \ Асинхронная обработка — это не волшебство. Вам все еще нужно проявлять осторожность,\
    \ чтобы не выполнять слишком много работы, требующей больших затрат ресурсов ЦП,\
    \ во время цикла событий, потому что это замедлит весь процесс выполнения. Далее\
    \ в книге вы увидите, как используются ключевые слова `async` и `await` языка\
    \ Python и как FastAPI позволяет сочетать синхронную и асинхронную обработку.\n\
    \n> ¹ Примерно тогда, когда пещерные люди играли в футбол с гигантскими наземными\
    \ ленивцами."
  mdcn: "● *远程过程调用*（remote procedure call, RPC）被设计用于调用同一台或不同机器上其他进程中的函数，就像它们位于调用应用程序中一样。目前一个流行的例子是\
    \ gRPC 系统 (https://grpc.io)。\n\n● 通过*消息传递系统*，可以在进程之间通过管道发送小的数据片段。消息可以是动词性的命令，或者仅仅是表示你感兴趣的*事件*，类似于名词。目前流行的消息传递解决方案（从工具集到完整的服务器）包括\
    \ Apache Kafka (https://kafka.apache.org)、RabbitMQ (https://www.rabbitmq.com)、NATS\
    \ (https://nats.io) 和 ZeroMQ (https://zeromq.org)。交互可以基于不同的模式：\n    * *请求-响应*。就像浏览器调用\
    \ Web 服务器一样；\n    * *发布-订阅*，或 *pub-sub*。发布者（publisher，或 pub）发送消息，订阅者（subscribers，或\
    \ sub）根据消息中包含的某些数据（例如主题）处理每条消息；\n    * *队列*。工作方式类似于 pub-sub 模式，但只有一个订阅者从池中接收消息并根据其执行操作。\n\
    \n这些方法中的任何一种都可以与 Web 服务结合使用，例如，用于执行后端的慢速任务，如发送电子邮件或创建缩略图。\n\n## HTTP\n\n伯纳斯-李为他的万维网提出了三个组成部分：\n\
    ● *HTML* — 用于显示数据的语言；\n● *HTTP* — “客户端-服务器”协议；\n● *URL* — Web 资源的寻址方案。\n\n尽管事后看来一切都显得显而易见，但实际上这是一个极其有用的组合。随着互联网的发展，人们进行了各种实验，一些想法，如\
    \ IMG 标签，在达尔文式的竞争中得以幸存。随着用户需求的明确，人们开始认真着手定义标准。\n\n## REST(ful)\n\n在罗伊·菲尔丁博士论文的一章\
    \ ([https://oreil.ly/TwGmX](https://oreil.ly/TwGmX)) 中，定义了*表述性状态转移*（Representational\
    \ State Transfer, REST）——一种使用 HTTP¹ 的*架构风格*。尽管这项工作经常被引用，但大部分都被误解了 ([https://oreil.ly/bsSry](https://oreil.ly/bsSry))。\n\
    \n在现代网络中，发展并主导着一种大致相同的适应形式。它被称为 *RESTful*，具有以下特征：\n\n- 使用 HTTP 和“客户端-服务器”协议；\n\
    - 无状态（每个连接独立）；\n- 可缓存；\n- 基于资源。\n\n*资源*是可以定义并可以对其执行操作的数据。Web 服务为每个功能提供一个*端点*——一个单独的\
    \ URL 和一个 HTTP 动词（操作）。端点也被称为*路由*，因为它将 URL 引导到相应的功能。\n\n数据库用户熟悉用于操作的首字母缩略词 *CRUD*：创建（create）、读取（read）、修改（update）、删除（delete）。HTTP\
    \ 动词与 CRUD 概念非常契合：\n\n- POST — 创建（写入）；\n- PUT — 完全修改（替换）；\n- PATCH — 部分修改（更新）；\n\
    - GET — 获取（读取、检索）；\n- DELETE — 删除。\n\n客户端向 RESTful 端点发送请求，数据位于 HTTP 消息的以下区域之一：\n\
    \n> ¹ 这里指的风格是更高层次的模板，例如“客户端-服务器”，而不是具体的构造。\n\n- 标头；\n- URL 字符串；\n- 查询参数；\n- 消息体中的值。\n\
    \n作为回应，HTTP 响应返回：\n\n- 一个整数值的*状态码* ([https://oreil.ly/oBena](https://oreil.ly/oBena))，定义了诸如以下的状态：\n\
    \    - 1xx 系列代码 — 信息，继续执行；\n    - 2xx 系列代码 — 成功执行；\n    - 3xx 系列代码 — 重定向；\n  \
    \  - 4xx 系列代码 — 客户端错误；\n    - 5xx 系列代码 — 服务器错误；\n- 各种标头；\n- 消息体，可以为空、单一或分为多个*部分*（连续的片段）。\n\
    \n至少有一个状态码可以算作一个彩蛋 — 418（I'm a teapot，[https://www.google.com/teapot](https://www.google.com/teapot)）。页面上应该会出现一个联网的茶壶。如果你请求，它会为你倒一杯茶。\n\
    \n![](img/eacb50a37d89d355fa68de0c62d56b32_24_0.png)\n\n公开渠道存在许多关于设计 RESTful API\
    \ 的网站和书籍，它们都包含有用的实践指南。本书将成为你旅途中的助手。\n\n## 数据格式 JSON 和 API\n\n前端应用程序可以与后端 Web 服务交换基于\
    \ ASCII 标准的纯文本，但如何表达数据结构，例如元素列表呢？\n\n就在迫切需要的时候，“JavaScript 对象表示法”（JavaScript Object\
    \ Notation, JSON）格式应运而生——这是另一个解决重要问题且事后看来显而易见的简单想法。虽然 J 代表 JavaScript，但其语法与 Python\
    \ 非常相似。\n\nJSON 在很大程度上取代了更早实现这一想法的尝试，如 XML 和 SOAP。在本书的其余部分，你将看到 JSON 是 Web 服务默认的输入和输出格式。\n\
    \n## JSON:API\n\nRESTful 设计与 JSON 数据格式的结合已成为惯例。但仍然存在一些模糊和繁琐的可能性。最近提出的 JSON:API\
    \ (https://jsonapi.org) 旨在稍微严格规范。本书采用宽松的 RESTful 方法，但如果你遇到严重困难，JSON:API 或类似的东西可能会很有用。\n\
    \n## GraphQL\n\n对于某些目标，RESTful 接口可能显得笨重。Facebook（现为 Meta¹）开发了一种名为图查询语言（Graph Query\
    \ Language, GraphQL）(https://graphql.org) 的语言。它允许定义更灵活的查询。本书不讨论 GraphQL，但如果你认为\
    \ RESTful 设计不适合你的应用程序，可能值得留意一下。\n\n## 并发性\n\n随着服务导向性的增长，Web 服务连接数量的急剧增加要求更高的效率和可扩展性。需要降低以下指标：\n\
    \n¹ 在俄罗斯联邦被禁止。\n\n- *延迟* — 初始等待时间；\n- *吞吐量* — 服务与其订阅者之间每秒传输的字节数。\n\n在遥远的过去，当人们在万维网¹上工作时，梦想着支持数百个并发连接，然后担心“10,000\
    \ 问题”，而现在则讨论百万级的数值。\n\n术语“并发性”并不意味着完全的并行处理。多重处理不会在同一纳秒内发生在同一个处理器上。并发性主要是为了避免紧张的等待（中央处理器（CPU）在等待响应时的空闲）。CPU\
    \ 运行速度很快，而网络和磁盘则慢数千甚至数百万倍。因此，当访问网络或磁盘时，没有人愿意在等待响应时无所事事地干瞪眼。\n\nPython 的常规执行是*同步的*——按照代码指定的顺序一次执行一个操作。有时需要*异步*工作——执行一点这个，然后执行一点那个，再回到第一个，等等。如果整个代码都使用\
    \ CPU 进行计算（*CPU 密集型*），那么我们就没有空闲时间进行异步处理。但如果执行的进程指示 CPU 等待来自外部源的操作完成（I/O 密集型），就可以组织异步处理。\n\
    \n异步系统提供*事件循环*：对慢速操作的请求被发送并标记，但在等待其响应期间不会阻塞 CPU 的工作。相反，在每次循环中执行即时处理，而在此期间收到的所有响应将在下一次循环中处理。\n\
    \n这些操作的效果可能是显著的。在本书的后续部分，你将看到 FastAPI 中对异步处理的支持如何使其比典型的 Web 框架快得多。异步处理不是魔法。你仍然需要小心，不要在事件循环期间执行太多需要大量\
    \ CPU 资源的工作，因为这会减慢整个执行过程。在本书的后续部分，你将看到如何使用 Python 的 `async` 和 `await` 关键字，以及 FastAPI\
    \ 如何允许结合同步和异步处理。\n\n> ¹ 大约在穴居人与巨型地懒踢足球的时候。"
