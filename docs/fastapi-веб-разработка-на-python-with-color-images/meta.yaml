    \n    if not (username := get_jwt_username(token)):\n        return None\n   \
    \ if (user := lookup_user(username)):\n        return user\n    return None\n\n\
    def lookup_user(username: str) -> User | None:\n    \"\"\"Возврат совпадающего\
