    # HTTPS


    Официальная документация FastAPI по HTTPS (https://oreil.ly/HYRW7), как и вся
    остальная, чрезвычайно информативна. Я рекомендую прочитать ее, а затем описание
    (https://oreil.ly/zcUWS) Рамиресом о том, как добавить поддержку HTTPS в FastAPI
    с помощью обратного прокси под названием Traefik (https://traefik.io). Он располагается
    над вашими веб-серверами, подобно nginx в качестве обратного прокси и балансировщика
    нагрузки, но включает в себя магию HTTPS.


    Хотя этот процесс состоит из множества этапов, он все же намного проще, чем прежде.
    В частности, раньше вам приходилось регулярно платить большие деньги центру сертификации
    за цифровой сертификат, который можно было использовать для поддержки протокола
    HTTPS на своем сайте. К счастью, на смену этим органам пришел бесплатный сервис
    Let''s Encrypt (https://letsencrypt.org).


    # Docker


    Когда Docker появился на сцене (он был упомянут в молниеносном пятиминутном докладе
    (https://oreil.ly/25oef) Соломона Хайкса из dotCloud на PyCon 2013), большинство
    из нас впервые услышали о контейнерах для Linux. Со временем мы поняли, что Docker
    быстрее и легче виртуальных машин. Вместо эмуляции полноценной операционной системы
    все контейнеры совместно используют ядро Linux сервера, а процессы и сети изолируются
    в собственных пространствах имен. Внезапно у вас появилась возможность с помощью
    бесплатного программного обеспечения Docker разместить несколько независимых сервисов
    на одной машине, не беспокоясь о том, что они будут пересекаться.


    Десять лет спустя Docker получил всеобщее признание и поддержку. Если вы хотите
    разместить свое приложение FastAPI на облачном сервисе, обычно нужно сначала создать
    его *образ в Docker*. В официальной документации FastAPI (https://oreil.ly/QnwOW)
    содержится подробное описание того, как сделать Docker-версию вашего FastAPI-приложения.
    Одним из этапов будет написание *Dockerfile* — текстового файла, содержащего информацию
    о конфигурации Docker, например, какой код приложения использовать и какие процессы
    запускать. Чтобы доказать, что по уровню сложности это не операция на мозге во
    время запуска космической ракеты, приведу Dockerfile с этой страницы:


    ```

    FROM python:3.9

    WORKDIR /code

    COPY ./requirements.txt /code/requirements.txt

    ```'
- md: '## Облачные сервисы


    В Сети можно найти множество источников платного или бесплатного хостинга. Вот
    некоторые примеры сведений о том, как разместить FastAPI с их помощью:


    - статья *FastAPI — Deployment* на сайте Tutorials Point ([https://oreil.ly/DBZcm](https://oreil.ly/DBZcm));

    - материалы *The Ultimate FastAPI Tutorial Part 6b — Basic Deployment on Linode*,
    сформированные инженером Кристофером Самуллой ([https://oreil.ly/s8iar](https://oreil.ly/s8iar));

    - статья *How to Deploy a FastAPI App on Heroku for Free* Шпиничи Окады ([https://oreil.ly/A6gij](https://oreil.ly/A6gij)).


    Я рекомендую прочитать официальную документацию или другие ссылки, выдаваемые
    поисковой системой Google по запросу *fastapi docker*, например *The Ultimate
    FastAPI Tutorial Part 13 — Using Docker to Deploy Your App* ([https://oreil.ly/7TUpR](https://oreil.ly/7TUpR))
    Кристофера Самулы.


    ```

    RUN pip install --no-cache-dir --upgrade -r /code/requirements.txt

    COPY ./app /code/app

    CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80"]

    ```


    ## Kubernetes


    Платформа Kubernetes выросла из внутреннего кода Google для управления внутренними
    системами, которые становились просто ужасающе сложными. Системные администраторы
    (так их тогда называли) вручную настраивали такие инструменты, как балансировщики
    нагрузки, обратные прокси, хьюморы¹ и т. д. Kubernetes стремился взять большую
    часть этих знаний и автоматизировать их — не говорите мне, *как* это сделать,
    а скажите, *чего* вы хотите. Сюда входят такие задачи, как поддержание работоспособности
    сервиса или запуск дополнительных серверов при резком увеличении трафика.


    Существует множество описаний того, как развернуть FastAPI на Kubernetes, в том
    числе статья Суманты Мукхопадхья *Deploying a FastAPI Application on Kubernetes*
    ([https://oreil.ly/ktTNu](https://oreil.ly/ktTNu)).


    ¹ Погодите, они же сохраняют сигары свежими.


    ## Производительность


    В настоящее время производительность FastAPI одна из самых высоких ([https://oreil.ly/mxabf](https://oreil.ly/mxabf))
    среди всех веб-фреймворков на Python и даже сравнимы с производительностью фреймворков
    на более быстрых языках, таких как Go. Но во многом это связано с ASGI, позволяющим
    избежать ожидания ввода-вывода с помощью асинхронности. Сам по себе Python — довольно
    медленный язык. Далее приведены некоторые советы и рекомендации по улучшению общей
    производительности.


    ## Асинхронность


    Часто веб-серверу не нужно быть очень быстрым. Большую часть своего времени он
    тратит на получение сетевых HTTP-запросов и возврат результатов (в этой книге
    он представлен веб-уровнем). Между ними веб-сервис выполняет бизнес-логику (сервисный
    уровень), получает доступ к источникам данных (уровень данных) и снова тратит
    большую часть своего времени на сетевой ввод-вывод.


    Когда код в веб-сервисе должен ждать ответа, лучше всего использовать асинхронную
    функцию (async def, а не def). Это позволяет FastAPI и Starlette планировать работу
    асинхронной функции и выполнять другие действия в ожидании ее ответа. Это одна
    из причин того, почему бенчмарки FastAPI лучше, чем фреймворки на базе WSGI, такие
    как Flask и Django. У производительности есть два аспекта:


    - время обработки одного запроса;

    - количество одновременно обрабатываемых запросов.


    ## Кэши


    Если у вас есть конечная точка веб-приложения, получающая данные из статического
    источника (например, записи в базе данных, которые меняются редко или не меняются
    никогда), можно кэшировать данные в функции. Это может быть на любом уровне. В
    Python представлен стандартный модуль functools ([https://oreil.ly/8Kg4V](https://oreil.ly/8Kg4V)),
    а также функции cache() и lru_cache().


    ## Базы данных, файлы и память


    Одна из самых распространенных причин медленной работы веб-сайта — отсутствие
    индекса для таблицы базы данных достаточного размера. Часто вы не замечаете проблемы
    до тех пор, пока ваша таблица не вырастет до определенного размера, и тогда запросы
    внезапно становятся намного медленнее. В SQL любой столбец в операторе WHERE должен
    быть проиндексирован.


    Во многих примерах, приведенных в книге, первичный ключ таблиц creature и explorer
    был представлен текстовым полем name. При создании таблиц поле name было объявлено
    в качестве первичного ключа — primary key. Для крошечных таблиц, приведенных ранее,
    SQLite в любом случае проигнорирует этот ключ, поскольку быстрее будет просто
    просканировать таблицу. Но как только она достигает приличного размера — скажем,
    миллиона строк, отсутствие индекса становится заметным. Решением может стать запуск
    оптимизатора запросов ([https://oreil.ly/YPR3Q](https://oreil.ly/YPR3Q)).


    Даже если у вас небольшая таблица, можете провести нагрузочное тестирование базы
    данных с помощью скриптов Python или инструментов с открытым исходным кодом. Если
    выполняется множество последовательных запросов к базе данных, возможно, их стоит
    объединить в один пакет. Если вы выгружаете или скачиваете большой файл, используйте
    потоковые версии, а не гигантский фрагмент данных.


    ## Очереди


    Если вы выполняете какую-либо задачу, занимающую больше доли секунды, например
    отправку письма с подтверждением или уменьшение изображения, возможно, стоит передать
    ее в очередь задач, например в Celery ([https://docs.celeryq.dev](https://docs.celeryq.dev)).


    ## Непосредственно Python


    Если веб-сервис кажется медленным, потому что выполняет значительные вычисления
    с помощью Python, вам может понадобиться «более быстрый Python». Альтернативные
    варианты:


    - использовать PyPy ([https://www.pypy.org](https://www.pypy.org)) вместо стандартной
    реализации CPython;

    - написать расширение ([https://oreil.ly/BEIJa](https://oreil.ly/BEIJa)) для Python
    на C, C++ или Rust;

    - преобразовать медленный код Python в язык Cython ([https://cython.org](https://cython.org)),
    используемый Pydantic и Uvicorn.


    Недавно был сделан очень интригующий анонс языка Mojo ([https://oreil.ly/C96kx](https://oreil.ly/C96kx)).
    Он стремится стать полным супернабором Python с новыми возможностями (применяя
    тот же дружественный синтаксис Python), способными ускорить примеры на Python
    в тысячи раз. Основной автор Крис Латтнер ранее работал над такими инструментами
    компиляции, как LLVM ([https://llvm.org](https://llvm.org)), Clang ([https://clang.llvm.org](https://clang.llvm.org))
    и MLIR ([https://mlir.llvm.org](https://mlir.llvm.org)), а также языком Swift
    ([https://www.swift.org](https://www.swift.org)) для Apple.


    Mojo стремится стать одноязычным решением для разработки ИИ, для чего сейчас (в
    PyTorch и TensorFlow) требуются сборки Python/C/C++, сложные в разработке, управлении
    и отладке. Но Mojo был бы хорошим языком общего назначения не только в сфере ИИ.


    Я много лет писал на C и все ждал преемника, обладающего производительностью и
    простотой применения языка Python. Возможными вариантами были D, Go, Julia, Zig
    и Rust, но если Mojo сможет оправдать свои цели ([https://oreil.ly/EojvA](https://oreil.ly/EojvA)),
    я бы активно его использовал.


    ## Устранение неполадок


    Смотрите снизу вверх с того момента и места, где вы столкнулись с проблемой. К
    ним относятся проблемы производительности во времени и пространстве, а также логические
    и асинхронные ловушки.


    ## Виды проблем


    Какой код ответа HTTP вы получили в первую очередь?


    - 404 — ошибка аутентификации или авторизации.

    - 422 — обычно это жалоба Pydantic на использование модели.

    - 500 — отказ сервиса, расположенного за вашим FastAPI.


    ## Ведение журналов


    Uvicorn и другие веб-серверы обычно пишут журналы в файл stdout. Вы можете проверить
    журнал, чтобы узнать, какой вызов был сделан на самом деле, включая HTTP-глагол
    и URL-адрес, но не данные в теле, заголовках или файлах cookies.


    Если определенная конечная точка возвращает код состояния семейства 400, можно
    попробовать подать те же данные еще раз и посмотреть, не повторится ли ошибка.
    Если да, то у меня срабатывает первый пещерный инстинкт отладчика — добавить операторы
    print() в соответствующие функции веб, сервисного и уровня данных.


    Кроме того, везде, где вы инициируете выброс исключения, добавляйте подробное
    описание. Если поиск в базе данных не удался, укажите входные значения и конкретную
    ошибку, например попытку дублировать уникальное ключевое поле.


    ## Метрики


    Может показаться, что значения терминов «метрика», «мониторинг», «наблюдаемость»
    и «телеметрия» частично совпадают. В стране Python принято использовать:


    - Prometheus ([https://prometheus.io](https://prometheus.io)) — для получения
    метрик;

    - Grafana ([https://grafana.com](https://grafana.com)) — для их отображения;

    - OpenTelemetry ([https://opentelemetry.io](https://opentelemetry.io)) — для измерения
    времени.


    Вы можете применить их ко всем уровням своего сайта: веб-уровню, сервисному и
    уровню данных. Сервисные уровни могут быть более бизнес-ориентированными, а другие
    — более техническими, полезными при разработке и сопровождении сайтов.


    Вот несколько ссылок для сбора метрик FastAPI:


    - Prometheus FastAPI Instrumentator ([https://oreil.ly/EYJwR](https://oreil.ly/EYJwR));

    - Getting Started: Monitoring a FastAPI App with Grafana and Prometheus — A Step-by-Step
    Guide, автор Зу Кодес ([https://oreil.ly/Gs90t](https://oreil.ly/Gs90t));

    - страница FastAPI Observability на сайте Grafana Labs ([https://oreil.ly/spKwe](https://oreil.ly/spKwe)).'
  mdcn: '## 云服务


    在网络上可以找到许多付费或免费的托管服务来源。以下是一些关于如何使用它们部署 FastAPI 的示例信息：


    -   Tutorials Point 网站上的文章 *FastAPI — Deployment* ([https://oreil.ly/DBZcm](https://oreil.ly/DBZcm))；

    -   由工程师克里斯托弗·萨穆拉整理的资料 *The Ultimate FastAPI Tutorial Part 6b — Basic Deployment
    on Linode* ([https://oreil.ly/s8iar](https://oreil.ly/s8iar))；

    -   奥卡达·希皮尼奇的文章 *How to Deploy a FastAPI App on Heroku for Free* ([https://oreil.ly/A6gij](https://oreil.ly/A6gij))。


    我建议阅读官方文档或通过 Google 搜索 *fastapi docker* 得到的其他链接，例如克里斯托弗·萨穆拉的 *The Ultimate FastAPI
    Tutorial Part 13 — Using Docker to Deploy Your App* ([https://oreil.ly/7TUpR](https://oreil.ly/7TUpR))。


    ```

    RUN pip install --no-cache-dir --upgrade -r /code/requirements.txt

    COPY ./app /code/app

    CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80"]

    ```


    ## Kubernetes


    Kubernetes 平台源于 Google 内部用于管理其内部系统的代码，这些系统变得异常复杂。系统管理员（当时的称呼）手动配置负载均衡器、反向代理、*humors*¹
    等工具。Kubernetes 旨在将这些知识的大部分内容自动化——不要告诉我*如何*做，而是告诉我你*想要*什么。这包括维护服务的可用性或在流量激增时启动额外服务器等任务。


    有许多关于如何在 Kubernetes 上部署 FastAPI 的描述，包括苏曼塔·慕克吉的文章 *Deploying a FastAPI Application
    on Kubernetes* ([https://oreil.ly/ktTNu](https://oreil.ly/ktTNu))。


    ¹ 等等，它们不是用来保持雪茄新鲜的吗？


    ## 性能


    目前，FastAPI 的性能在所有 Python Web 框架中是最高的之一 ([https://oreil.ly/mxabf](https://oreil.ly/mxabf))，甚至可以与使用更快语言（如
    Go）的框架相媲美。但这在很大程度上归功于 ASGI，它通过异步性避免了 I/O 等待。Python 本身是一种相当慢的语言。以下是一些提高整体性能的建议和技巧。


    ## 异步性


    通常，Web 服务器不需要非常快。它大部分时间都花在接收网络 HTTP 请求和返回结果上（在本书中，这由 Web 层表示）。在这之间，Web 服务执行业务逻辑（服务层）、访问数据源（数据层），并再次将大部分时间花在网络
    I/O 上。


    当 Web 服务中的代码需要等待响应时，最好使用异步函数（`async def`，而不是 `def`）。这允许 FastAPI 和 Starlette 调度异步函数的工作，并在等待其响应时执行其他操作。这是
    FastAPI 基准测试优于基于 WSGI 的框架（如 Flask 和 Django）的原因之一。性能有两个方面：


    -   处理单个请求的时间；

    -   同时处理的请求数量。


    ## 缓存


    如果你有一个从静态源（例如很少或从不更改的数据库记录）获取数据的 Web 应用程序端点，可以在函数中缓存数据。这可以在任何层级进行。Python 提供了标准模块
    `functools` ([https://oreil.ly/8Kg4V](https://oreil.ly/8Kg4V))，以及 `cache()` 和
    `lru_cache()` 函数。


    ## 数据库、文件和内存


    网站运行缓慢最常见的原因之一是数据库表缺少足够大小的索引。通常，直到表增长到一定大小之前，你都不会注意到问题，然后查询突然变得慢得多。在 SQL 中，`WHERE`
    子句中的任何列都应该被索引。


    在本书给出的许多示例中，`creature` 和 `explorer` 表的主键是文本字段 `name`。在创建表时，`name` 字段被声明为主键（`primary
    key`）。对于前面提到的小表，SQLite 无论如何都会忽略这个键，因为直接扫描表会更快。但一旦表达到相当大的规模——比如一百万行，缺少索引就会变得明显。解决方案可以是运行查询优化器
    ([https://oreil.ly/YPR3Q](https://oreil.ly/YPR3Q))。


    即使你有一个小表，也可以使用 Python 脚本或开源工具对数据库进行负载测试。如果对数据库执行许多连续查询，也许值得将它们合并为一个批处理。如果你上传或下载一个大文件，请使用流式版本，而不是巨大的数据块。


    ## 队列


    如果你正在执行任何耗时超过几分之一秒的任务，例如发送确认邮件或缩小图像，也许值得将其传递给任务队列，例如 Celery ([https://docs.celeryq.dev](https://docs.celeryq.dev))。


    ## Python 本身


    如果 Web 服务因为使用 Python 执行大量计算而显得缓慢，你可能需要“更快的 Python”。替代方案包括：


    -   使用 PyPy ([https://www.pypy.org](https://www.pypy.org)) 而不是标准的 CPython 实现；

    -   用 C、C++ 或 Rust 为 Python 编写扩展 ([https://oreil.ly/BEIJa](https://oreil.ly/BEIJa))；

    -   将缓慢的 Python 代码转换为 Cython ([https://cython.org](https://cython.org)) 语言，Pydantic
    和 Uvicorn 使用的就是它。


    最近，Mojo ([https://oreil.ly/C96kx](https://oreil.ly/C96kx)) 语言发布了一个非常引人注目的公告。它旨在成为
    Python 的完整超集，具有新功能（使用 Python 友好的相同语法），能够将 Python 示例加速数千倍。主要作者克里斯·拉特纳此前曾参与 LLVM
    ([https://llvm.org](https://llvm.org))、Clang ([https://clang.llvm.org](https://clang.llvm.org))
    和 MLIR ([https://mlir.llvm.org](https://mlir.llvm.org)) 等编译工具以及 Apple 的 Swift
    ([https://www.swift.org](https://www.swift.org)) 语言的开发。


    Mojo 旨在成为 AI 开发的单一语言解决方案，而目前（在 PyTorch 和 TensorFlow 中）这需要 Python/C/C++ 构建，这些构建在开发、管理和调试方面都很复杂。但
    Mojo 不仅在 AI 领域会是一个很好的通用语言。


    我用 C 语言编写了很多年，一直在等待一个兼具性能和 Python 易用性的继任者。可能的候选者有 D、Go、Julia、Zig 和 Rust，但如果 Mojo
    能够实现其目标 ([https://oreil.ly/EojvA](https://oreil.ly/EojvA))，我会积极使用它。


    ## 故障排除


    从你遇到问题的时间点和位置开始，自下而上地查看。这些问题包括时间和空间上的性能问题，以及逻辑和异步陷阱。


    ## 问题类型


    你首先收到了哪个 HTTP 状态码？


    -   404 — 认证或授权错误。

    -   422 — 通常是 Pydantic 对模型使用的抱怨。

    -   500 — 位于你的 FastAPI 后面的服务故障。


    ## 日志记录


    Uvicorn 和其他 Web 服务器通常将日志写入标准输出文件。你可以检查日志以了解实际进行了哪个调用，包括 HTTP 动词和 URL，但不包括正文、头文件或
    cookie 中的数据。


    如果某个端点返回 400 系列的状态码，可以尝试再次提交相同的数据，看看错误是否重复。如果是这样，我调试器的第一个原始本能就是在 Web、服务和数据层的相应函数中添加
    `print()` 语句。


    此外，在你引发异常的任何地方，都添加详细的描述。如果数据库搜索失败，请提供输入值和具体错误，例如尝试复制唯一的键字段。


    ## 指标


    “指标”、“监控”、“可观测性”和“遥测”这些术语的含义似乎有部分重叠。在 Python 领域，通常使用：


    -   Prometheus ([https://prometheus.io](https://prometheus.io)) — 用于获取指标；

    -   Grafana ([https://grafana.com](https://grafana.com)) — 用于显示它们；

    -   OpenTelemetry ([https://opentelemetry.io](https://opentelemetry.io)) — 用于测量时间。


    你可以将它们应用于网站的所有层级：Web 层、服务层和数据层。服务层可能更偏向业务，而其他层则更偏向技术，在网站开发和维护中很有用。


    以下是一些用于收集 FastAPI 指标的链接：


    -   Prometheus FastAPI Instrumentator ([https://oreil.ly/EYJwR](https://oreil.ly/EYJwR))；

    -   Getting Started: Monitoring a FastAPI App with Grafana and Prometheus — A
    Step-by-Step Guide，作者：祖·科德斯 ([https://oreil.ly/Gs90t](https://oreil.ly/Gs90t))；

    -   Grafana Labs 网站上的 FastAPI Observability 页面 ([https://oreil.ly/spKwe](https://oreil.ly/spKwe))。'
