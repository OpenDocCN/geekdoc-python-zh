    # FastAPI и асинхронность


    После долгого путешествия по холмам и долам давайте вернемся к FastAPI и к тому,
    почему все это важно.


    Поскольку веб-серверы тратят много времени на ожидание, производительность можно
    повысить, избежав части этого ожидания — иными словами, с помощью конкурентности.
    Другие веб-серверы используют многие из упомянутых ранее методов: потоки, gevent
    и т. д. Одна из причин, по которой FastAPI является одним из самых быстрых веб-фреймворков
    Python, — это включение асинхронного кода благодаря поддержке протокола ASGI в
    пакете Starlette и некоторым собственным изобретениям.


    > Использование ключевых слов async и await само по себе не ускоряет выполнение
    кода. На самом деле такой код может оказаться немного медленнее из-за накладных
    расходов на асинхронную настройку. Основное назначение конструкций async заключается
    в том, чтобы избежать длительного ожидания ввода-вывода.'
