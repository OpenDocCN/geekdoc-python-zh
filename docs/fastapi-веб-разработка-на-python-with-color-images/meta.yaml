    Для получения большего количества примеров можно воспользоваться альтернативной
    документацией (https://oreil.ly/ZGCHv) — она читается немного легче, чем официальные
    страницы.


    # ORM


    ORM выражает запросы в терминах моделей данных домена, а не реляционных таблиц
    и логики SQL, лежащих в основе механизма базы данных. В официальной документации
    (https://oreil.ly/x4DCi) приведена подробная информация. ORM гораздо сложнее,
    чем язык выражений SQL. Разработчики, предпочитающие полностью объектно-ориентированные
    модели, обычно выбирают ORM.


    Во многих книгах и статьях о FastAPI, начиная раздел, посвященный базам данных,
    авторы сразу же переходят к ORM SQLAlchemy. Я понимаю, что это привлекательно,
    но также знаю, что это требует изучения еще одной абстракции. SQLAlchemy — отличный
    пакет, но если его абстракции не всегда работают, то у вас возникают две проблемы.
    Самым простым решением может быть использование SQL и переход к языку выражений
    или ORM, если SQL становится слишком сложным.


    # SQLModel


    Автор FastAPI объединил аспекты FastAPI, Pydantic и SQLAlchemy, чтобы создать
    библиотеку SQLModel (https://sqlmodel.tiangolo.com). Он переносит некоторые методы
    разработки из веб-мира в реляционные базы данных. SQLModel сочетает в себе ORM
    от SQLAlchemy с определением и проверкой данных от Pydantic.


    # SQLite


    Пакет SQLite был представлен в главе 10, я использовал его в примерах уровня данных.
    Это общественное достояние — более открытого исходного кода и не придумаешь. SQLite
    применяется в каждом браузере и в каждом смартфоне, что делает его одним из самых
    распространенных программных пакетов в мире. При выборе реляционной базы данных
    этот пакет часто упускают из виду, но вполне возможно, что несколько «серверов»
    SQLite смогут поддерживать некоторые крупные сервисы не хуже, чем такой мощный
    сервер, как PostgreSQL.'
- md: "## PostgreSQL\n\nНа заре развития реляционных баз данных пионером была система\
    \ System R от IBM, а за новый рынок боролись ее ответвления — в основном Ingres\
    \ с открытым исходным кодом и коммерческий продукт Oracle. В Ingres был применен\
    \ язык запросов QUEL, а в System R — SQL. Хотя некоторые считали, что QUEL лучше,\
    \ чем SQL, принятие Oracle SQL в качестве стандарта, а также влияние IBM помогли\
    \ Oracle и SQL добиться успеха.\n\nСпустя годы Майкл Стоунбрейкер вернулся, чтобы\
    \ осуществить переход от Ingres к PostgreSQL (https://www.postgresql.org). В настоящее\
    \ время разработчики систем с открытым исходным кодом чаще всего выбирают PostgreSQL,\
    \ хотя система MySQL была популярна несколько лет назад и до сих пор не потеряла\
    \ своей актуальности.\n\n## EdgeDB\n\nНесмотря на многолетний успех SQL, у него\
    \ есть некоторые недостатки, делающие запросы неудобными. В отличие от математической\
    \ теории, на которой основан SQL (реляционное исчисление Э. Ф. Кодда), сама конструкция\
    \ языка SQL не является композиционной. В основном это означает, что сложно вложить\
    \ запросы в большие запросы, что порождает более сложный и многословный код.\n\
    \nПоэтому просто для развлечения я создам здесь новую реляционную базу данных.\
    \ EdgeDB (https://www.edgedb.com) была написана (на Python!) автором библиотеки\
    \ asyncio для языка Python. Она описывается как Post-SQL или граф-реляционная.\
    \ В ядре БД используется PostgreSQL для обработки сложных системных задач. Компания\
    \ Edge привнесла в эту сферу свой продукт EdgeQL (https://oreil.ly/sdk4J) — новый\
    \ язык запросов, стремясь избежать острых граней SQL. На самом деле он переводится\
    \ на SQL для выполнения PostgreSQL. В статье Ивана Данилюка My Experience with\
    \ EdgeDB (https://oreil.ly/clNfg) приведено удобное сравнение EdgeQL и SQL. Приятная\
    \ для чтения иллюстрированная официальная документация (https://oreil.ly/ce6u3)\
    \ проводит параллели с книгой «Дракула».\n\nМожет ли EdgeQL распространиться за\
    \ пределы EdgeDB и стать альтернативой SQL? Время покажет.\n\n## Нереляционные\
    \ (NoSQL) базы данных\n\nКрупные игроки в мире NoSQL или NewSQL с открытым исходным\
    \ кодом перечислены в табл. 14.2.\n\nТаблица 14.2. Базы данных NoSQL и драйверы\
    \ Python\n\n| База данных | Драйвер Python |\n|---|---|\n| Redis (https://redis.io)\
    \ | redis-py (https://github.com/redis/redis-py) |\n| MongoDB (https://www.mongodb.com)\
    \ | PyMongo (https://pymongo.readthedocs.io), Motor (https://oreil.ly/Cmgtl) |\n\
    | Apache Cassandra (https://cassandra.apache.org) | DataStax Driver for Apache\
    \ Cassandra (https://github.com/datastax/python-driver) |\n| Elasticsearch (https://www.elastic.co/elasticsearch)\
    \ | Python Elasticsearch Client (https://oreil.ly/e_bDl) |\n\nИногда NoSQL означает\
    \ буквально «отсутствие SQL», а иногда «не только SQL». Реляционные базы данных\
    \ накладывают структуру на данные. Часто она визуализируется в виде прямоугольных\
    \ таблиц с полями — столбцами и строками данных, подобно электронным таблицам.\
    \ Чтобы уменьшить избыточность и повысить производительность, реляционные базы\
    \ данных нормализуются с помощью нормальных форм (правил для данных и структур),\
    \ например допускают только одно значение в ячейке (на пересечении строки и столбца).\n\
    \nБазы данных NoSQL делают эти правила менее строгими, иногда позволяя варьировать\
    \ типы столбцов/полей в отдельных строках данных. Часто схемы (дизайн баз данных)\
    \ могут представлять собой не реляционные ячейки, а разрозненные структуры, которые\
    \ можно выразить на JSON или Python.\n\n## Redis\n\nRedis — это сервер структур\
    \ данных, работающий исключительно в оперативной памяти, хотя он может сохранять\
    \ данные на диск и восстанавливать их с диска. Он полностью соответствует собственным\
    \ структурам данных Python и стал очень популярным.\n\n## MongoDB\n\nMongoDB —\
    \ это своего рода PostgreSQL для NoSQL-серверов. *Коллекция* — это эквивалент\
    \ таблицы SQL, а *документ* — эквивалент строки таблицы SQL. Еще одно отличие\
    \ — и главная причина, по которой база данных NoSQL является основной, — заключается\
    \ в том, что вам не нужно определять, как выглядит документ. Другими словами,\
    \ нет никакой фиксированной *схемы*. Документ — это как словарь Python, ключом\
    \ в нем может быть любая строка.\n\n## Cassandra\n\nCassandra — это крупномасштабная\
    \ база данных, ее можно распределить между сотнями узлов. Она написана на языке\
    \ Java.\n\nАльтернативная база данных называется ScyllaDB (https://www.scylladb.com).\
    \ Она написана на C++, и утверждается, что она совместима с Cassandra, но имеет\
    \ большую производительность.\n\n## Elasticsearch\n\nElasticsearch (https://www.elastic.co/elasticsearch)\
    \ больше похожа на индекс базы данных, чем на саму базу данных. Она часто используется\
    \ для полнотекстового поиска.\n\n## Возможности NoSQL в базах данных SQL\n\nКак\
    \ отмечалось ранее, реляционные базы данных традиционно нормализуются и ограничиваются\
    \ различными уровнями правил, называемыми *нормальными формами*. Одним из основных\
    \ правил было то, что значение в каждой ячейке должно быть *скаляром* — никаких\
    \ массивов или других структур.\n\nБазы данных NoSQL (или документоориентированные)\
    \ поддерживали JSON напрямую и обычно оказывались единственным выбором, если у\
    \ вас были неравномерные или неровные структуры данных. Часто они были *дениормализованными*\
    \ — все данные, необходимые для документа, были включены в него. В SQL для создания\
    \ полного документа часто требовалось выполнить *объединение* данных из разных\
    \ таблиц.\n\nОднако последние изменения в стандарте SQL позволили хранить данные\
    \ JSON и в реляционных базах данных. Некоторые из таких БД позволяют хранить сложные\
    \ (нескалярные) данные в ячейках таблиц и даже выполнять в них поиск и индексирование.\
    \ Функции JSON поддерживаются различными способами для SQLite (https://oreil.ly/h_FNn),\
    \ PostgreSQL (https://oreil.ly/awYrc), MySQL (https://oreil.ly/OA_sT), Oracle\
    \ (https://oreil.ly/osOYk) и других систем.\n\nSQL с JSON может быть лучшим из\
    \ двух миров. Базы данных SQL существуют гораздо дольше и поддерживают действительно\
    \ полезные функции, такие как внешние ключи и вторичные индексы. Кроме того, SQL\
    \ довольно хорошо стандартизирован до определенного момента, а языки запросов\
    \ NoSQL все разные.\n\nНаконец, новые языки проектирования данных и запросов пытаются\
    \ объединить преимущества SQL и NoSQL, как, например, EdgeQL, о котором я упоминал\
    \ ранее. Поэтому, если вы не можете разместить свои данные в прямоугольную реляционную\
    \ коробку, обратите внимание на базу данных NoSQL, реляционную базу данных с поддержкой\
    \ JSON или базу данных Post-SQL.\n\n## Нагрузочное тестирование баз данных\n\n\
    Эта книга в основном посвящена FastAPI, но веб-сайты слишком часто связаны с базами\
    \ данных.\n\nПримеры данных в этой книге были крошечными. Чтобы действительно\
    \ протестировать базу данных на стрессоустойчивость, было бы неплохо использовать\
    \ миллионы элементов. Вместо того чтобы их придумывать и добавлять вручную, проще\
    \ воспользоваться пакетом Python, например Faker (https://faker.readthedocs.io).\
    \ Он может быстро генерировать различные типы данных — имена, места или определяемые\
    \ вами специальные типы.\n\nВ примере 14.3 функция Faker выкачивает имена и страны,\
    \ а затем они загружаются с помощью функции load() в SQLite.\n\n**Пример 14.3.**\
    \ Загрузка фиктивных исследователей в файл test_load.py\n\n```python\nfrom faker\
    \ import Faker\nfrom time import perf_counter\n\ndef load():\n    from error import\
    \ Duplicate\n    from data.explorer import create\n    from model.explorer import\
    \ Explorer\n\n    f = Faker()\n    NUM = 100_000\n    t1 = perf_counter()\n  \
    \  for row in range(NUM):\n        try:\n            create(Explorer(name=f.name(),\n\
    \                            country=f.country(),\n                          \
    \  description=f.description))\n        except Duplicate:\n            pass\n\
    \    t2 = perf_counter()\n    print(NUM, \"rows\")\n    print(\"write time:\"\
    , t2-t1)\n\ndef read_db():\n    from data.explorer import get_all\n\n    t1 =\
    \ perf_counter()\n    _ = get_all()\n    t2 = perf_counter()\n    print(\"db read\
    \ time:\", t2-t1)\n\ndef read_api():\n    from fastapi.testclient import TestClient\n\
    \    from main import app\n\n    t1 = perf_counter()\n    client = TestClient(app)\n\
    \    _ = client.get(\"/explorer/\")\n    t2 = perf_counter()\n    print(\"api\
    \ read time:\", t2-t1)\n\nload()\nread_db()\nread_db()\nread_api()\n```\n\nКод\
    \ будет улавливать исключение Duplicate в функции load(), но его стоит игнорировать,\
    \ потому что Faker генерирует имена из ограниченного списка и, скорее всего, время\
    \ от времени повторяет некоторые из них. Таким образом, в результате может быть\
    \ загружено менее 100 000 исследователей.\n\nКроме того, вы вызываете функцию\
    \ read_db() дважды, чтобы исключить время запуска процесса, пока SQLite выполняет\
    \ запрос. Тогда время выполнения read_api() должно получиться честным. Пример\
    \ 14.4 запускает тестирование."
  mdcn: "## PostgreSQL\n\n在关系型数据库发展的初期，IBM的System R系统是先驱，而其衍生系统——主要是开源的Ingres和商业产品Oracle——则在争夺新兴市场。Ingres采用了查询语言QUEL，而System\
    \ R使用了SQL。尽管有些人认为QUEL优于SQL，但Oracle SQL被采纳为标准，加上IBM的影响力，最终帮助Oracle和SQL取得了成功。\n\n\
    多年后，迈克尔·斯通布雷克回归，推动了从Ingres到PostgreSQL (https://www.postgresql.org) 的转变。目前，开源系统开发者最常选择PostgreSQL，尽管MySQL系统在几年前曾流行一时，且至今仍未失去其重要性。\n\
    \n## EdgeDB\n\n尽管SQL取得了多年成功，但它存在一些缺点，使得查询变得不便。与SQL所基于的数学理论（E.F.科德的关系演算）不同，SQL语言本身的构造并非组合式的。这主要意味着，将查询嵌套到更大的查询中很困难，从而导致代码更复杂、更冗长。\n\
    \n因此，纯粹为了娱乐，我将在这里创建一个新的关系型数据库。EdgeDB (https://www.edgedb.com) 是由Python asyncio库的作者编写的（使用Python！）。它被描述为Post-SQL或图关系型数据库。其数据库核心使用PostgreSQL来处理复杂的系统任务。Edge公司为此领域带来了他们的产品EdgeQL\
    \ (https://oreil.ly/sdk4J)——一种新的查询语言，旨在避免SQL的尖锐棱角。实际上，它会被翻译成SQL以在PostgreSQL上执行。伊万·达尼柳克的文章《My\
    \ Experience with EdgeDB》(https://oreil.ly/clNfg) 提供了EdgeQL与SQL的便捷比较。其官方文档 (https://oreil.ly/ce6u3)\
    \ 阅读体验愉快且图文并茂，并与《德古拉》一书进行了类比。\n\nEdgeQL能否超越EdgeDB的范围，成为SQL的替代品？时间会证明一切。\n\n##\
    \ 非关系型（NoSQL）数据库\n\n开源世界中NoSQL或NewSQL的主要参与者列于表14.2。\n\n表14.2. NoSQL数据库与Python驱动程序\n\
    \n| 数据库 | Python驱动程序 |\n|---|---|\n| Redis (https://redis.io) | redis-py (https://github.com/redis/redis-py)\
    \ |\n| MongoDB (https://www.mongodb.com) | PyMongo (https://pymongo.readthedocs.io),\
    \ Motor (https://oreil.ly/Cmgtl) |\n| Apache Cassandra (https://cassandra.apache.org)\
    \ | DataStax Driver for Apache Cassandra (https://github.com/datastax/python-driver)\
    \ |\n| Elasticsearch (https://www.elastic.co/elasticsearch) | Python Elasticsearch\
    \ Client (https://oreil.ly/e_bDl) |\n\n有时NoSQL字面意思是“没有SQL”，有时则是“不仅仅是SQL”。关系型数据库为数据施加了结构。这种结构通常可视化为带有字段（列）和数据行的矩形表格，类似于电子表格。为了减少冗余并提高性能，关系型数据库通过范式（针对数据和结构的规则）进行规范化，例如只允许单元格（行与列的交点）中有一个值。\n\
    \nNoSQL数据库放宽了这些规则，有时允许在不同数据行中改变列/字段的类型。通常，模式（数据库设计）可以不是关系型单元格，而是可以用JSON或Python表达的零散结构。\n\
    \n## Redis\n\nRedis是一个完全在内存中运行的数据结构服务器，尽管它可以将数据保存到磁盘并从磁盘恢复。它完全符合Python自身的数据结构，并且变得非常流行。\n\
    \n## MongoDB\n\nMongoDB是NoSQL服务器中的某种PostgreSQL。*集合*相当于SQL表，而*文档*相当于SQL表行。另一个区别——也是NoSQL数据库成为主流的主要原因——在于您无需定义文档的外观。换句话说，没有固定的*模式*。文档就像一个Python字典，其中的键可以是任何字符串。\n\
    \n## Cassandra\n\nCassandra是一个大规模数据库，可以分布在数百个节点上。它是用Java编写的。\n\n另一种替代数据库名为ScyllaDB\
    \ (https://www.scylladb.com)。它是用C++编写的，据称与Cassandra兼容，但具有更高的性能。\n\n## Elasticsearch\n\
    \nElasticsearch (https://www.elastic.co/elasticsearch) 更像是一个数据库索引，而不是数据库本身。它通常用于全文搜索。\n\
    \n## SQL数据库中的NoSQL功能\n\n如前所述，关系型数据库传统上是规范化的，并受到称为*范式*的各种级别规则的限制。其中一个主要规则是每个单元格中的值必须是*标量*——不能是数组或其他结构。\n\
    \nNoSQL数据库（或面向文档的数据库）直接支持JSON，如果您拥有不均匀或不规则的数据结构，它们通常是唯一的选择。它们通常是*反规范化*的——文档所需的所有数据都包含在其中。在SQL中，要创建完整的文档，通常需要从不同表中*连接*数据。\n\
    \n然而，SQL标准的最新更改允许在关系型数据库中存储JSON数据。其中一些数据库允许在表单元格中存储复杂（非标量）数据，甚至在其中进行搜索和索引。JSON功能以不同方式支持SQLite\
    \ (https://oreil.ly/h_FNn)、PostgreSQL (https://oreil.ly/awYrc)、MySQL (https://oreil.ly/OA_sT)、Oracle\
    \ (https://oreil.ly/osOYk) 和其他系统。\n\n带有JSON的SQL可能是两全其美。SQL数据库存在的时间要长得多，并支持真正有用的功能，如外键和二级索引。此外，SQL在某种程度上标准化得相当好，而NoSQL查询语言则各不相同。\n\
    \n最后，新的数据设计和查询语言试图结合SQL和NoSQL的优势，例如我之前提到的EdgeQL。因此，如果您的数据无法放入矩形的关系型盒子中，请考虑使用NoSQL数据库、支持JSON的关系型数据库或Post-SQL数据库。\n\
    \n## 数据库负载测试\n\n本书主要关注FastAPI，但网站与数据库的关联过于频繁。\n\n本书中的数据示例非常微小。为了真正测试数据库的压力承受能力，最好使用数百万个元素。与其手动构思和添加它们，不如使用Python包，例如Faker\
    \ (https://faker.readthedocs.io)。它可以快速生成各种类型的数据——姓名、地点或您定义的特殊类型。\n\n在示例14.3中，Faker函数提取姓名和国家，然后通过load()函数加载到SQLite中。\n\
    \n**示例14.3.** 将虚构的研究人员加载到文件test_load.py中\n\n```python\nfrom faker import Faker\n\
    from time import perf_counter\n\ndef load():\n    from error import Duplicate\n\
    \    from data.explorer import create\n    from model.explorer import Explorer\n\
    \n    f = Faker()\n    NUM = 100_000\n    t1 = perf_counter()\n    for row in\
    \ range(NUM):\n        try:\n            create(Explorer(name=f.name(),\n    \
    \                        country=f.country(),\n                            description=f.description))\n\
    \        except Duplicate:\n            pass\n    t2 = perf_counter()\n    print(NUM,\
    \ \"rows\")\n    print(\"write time:\", t2-t1)\n\ndef read_db():\n    from data.explorer\
    \ import get_all\n\n    t1 = perf_counter()\n    _ = get_all()\n    t2 = perf_counter()\n\
    \    print(\"db read time:\", t2-t1)\n\ndef read_api():\n    from fastapi.testclient\
    \ import TestClient\n    from main import app\n\n    t1 = perf_counter()\n   \
    \ client = TestClient(app)\n    _ = client.get(\"/explorer/\")\n    t2 = perf_counter()\n\
    \    print(\"api read time:\", t2-t1)\n\nload()\nread_db()\nread_db()\nread_api()\n\
    ```\n\n代码会在load()函数中捕获Duplicate异常，但可以忽略它，因为Faker从一个有限的列表中生成姓名，并且很可能会不时重复其中一些。因此，最终加载的研究人员可能少于100,000名。\n\
    \n此外，您调用read_db()函数两次，以排除SQLite执行查询时的进程启动时间。这样，read_api()的执行时间应该是公平的。示例14.4启动了测试。"
