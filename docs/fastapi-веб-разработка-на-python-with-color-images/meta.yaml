    \ имен пользователей. Найдите в ней имя и, если оно совпадает, сравните хешированные\
    \ пароли в таблице `User`.\n- Если *все* посетители должны проходить аутентификацию,\
    \ но вам нужно авторизовать администраторов только для некоторых конечных точек,\
    \ то аутентифицируйте всех, как в предыдущих примерах (из таблицы `User`), а затем\
    \ проверьте таблицу `Admin`, чтобы узнать, является ли этот пользователь также\
    \ администратором.\n- Для более чем одного типа разрешения (например, только чтение,\
    \ чтение, запись):\n    - задействуйте таблицу определения уровней допуска `Permission`;\n\
    \    - возьмите таблицу `UserPermission`, в которой сопоставляются пользователи\
    \ и уровни допуска. Иногда ее называют *списком управления доступом*.\n- Если\
    \ комбинации уровней управления доступом сложны, добавьте уровень и определите\
    \ *роли* (независимые наборы разрешений):\n    - создайте таблицу ролей `Role`;\n\
    \    - создайте таблицу `UserRole`, сопоставляющую пары сущностей из таблиц пользователей\
    \ и ролей — `User` и `Role` соответственно. Иногда ее называют *управлением доступом\
    \ на основе ролей* (Role-Based Access Control, RBAC).\n\n## Промежуточное программное\
    \ обеспечение\n\nFastAPI позволяет вставлять на веб-уровень код, выполняющий:\n\
    \n- перехват запроса;\n- операции с запросом;\n- передачу запроса функции пути;\n\
    - перехват ответа, возвращаемого исполняющей функцией;\n- операции с ответом;\n\
    - возврат ответа вызывающей стороне.\n\nЭто похоже на то, что декоратор в Python\
    \ делает с «обёртываемой» функцией.\n\nВ некоторых случаях можно использовать\
    \ либо промежуточное ПО, либо внедрение зависимостей с помощью функции Depends().\
    \ Промежуточное ПО удобнее для решения более глобальных вопросов безопасности,\
    \ таких как CORS, что приводит к...\n\n## CORS\n\nСовместное использование ресурсов\
    \ разными источниками (Cross-Origin Resource Sharing, CORS) предполагает связь\
    \ между другими доверенными серверами и вашим сайтом. Если на сайте весь код фронтенда\
    \ и бэкенда находится в одном месте, то проблем не возникнет. Но в наши дни часто\
    \ встречается ситуация, когда фронтенд на JavaScript общается с бэкендом, написанным\
    \ на чем-то вроде FastAPI. Эти серверы не будут иметь одинакового происхождения:\n\
    \n- протокол — HTTP или HTTPS;\n- домен — интернет-домен, например google.com\
    \ или localhost;\n- порт — числовой TCP/IP-порт в этом домене, например 80, 443\
    \ или 8000.\n\nКак бэкенд может отличить надежный фронтенд от коробки с заплесневелой\
    \ редиской или злоумышленника, крутящего усы? Это работа для CORS — технологии,\
    \ определяющей, чему доверяет бэкенд. Наиболее известными способами являются следующие:\n\
    \n- заголовки запросов Origin;\n- HTTP-методы;\n- HTTP-заголовки;\n- тайм-аут\
    \ кэша CORS.\n\nВы подключаетесь к CORS на веб-уровне. В примере 11.13 показано,\
    \ как разрешить только один фронтенд-сервер (с доменом https://ui.cryptids.com),\
    \ а также любые HTTP-заголовки и методы.\n\n### Пример 11.13. Активация промежуточного\
    \ ПО CORS\n\n```python\nfrom fastapi import FastAPI, Request\nfrom fastapi.middleware.cors\
    \ import CORSMiddleware\n\napp = FastAPI()\n\napp.add_middleware(\n    CORSMiddleware,\n\
    \    allow_origins=[\"https://ui.cryptids.com\",],\n    allow_credentials=True,\n\
    \    allow_methods=[\"*\"],\n    allow_headers=[\"*\"],\n    )\n\n@app.get(\"\
    /test_cors\")\ndef test_cors(request: Request):\n    print(request)\n```\n\nПосле\
    \ этого любой другой домен, пытающийся связаться с бэкендом сайта напрямую, будет\
    \ отклонен.\n\n## Пакеты сторонних разработчиков\n\nВы ознакомились с примерами\
    \ того, как создавать решения для аутентификации и авторизации с помощью FastAPI.\
    \ Но, возможно, не нужно делать все самостоятельно. Экосистема FastAPI быстро\
    \ развивается, и могут появиться пакеты, выполняющие большую часть работы за вас.\n\
    \nПриведу несколько непроверенных примеров. Нет никаких гарантий, что через некоторое\
    \ время любой из пакетов из этого списка будет продолжать существовать и поддерживаться,\
    \ но, возможно, на них стоит обратить внимание:\n\n- FastAPI Users (https://oreil.ly/ueVfq);\n\
    - FastAPIJWT Auth (https://oreil.ly/ooGSK);\n- FastAPI-Login (https://oreil.ly/oWA3p);\n\
    - fastapi-auth0 (https://oreil.ly/fHfkU);\n- AuthX (https://authx.yezz.me);\n\
    - FastAPI-User-Auth (https://oreil.ly/J57xu);\n- fastapi-authz (https://oreil.ly/aAGzW);\n\
    - fastapi-opa (https://oreil.ly/Bvzv3);\n- FastAPI-key-auth (https://oreil.ly/s-Ui5);\n\
    - FastAPI Auth Middleware (https://oreil.ly/jnR-s);\n- fastapi-jwt (https://oreil.ly/RrxUZ);\n\
    - fastapi_auth2 (https://oreil.ly/5DXkB);\n- fastapi-sso (https://oreil.ly/GLTdt);\n\
    - Fief (https://www.fief.dev).\n\n## Заключение\n\nЭта глава была труднее остальных.\
    \ В ней были показаны способы аутентификации посетителей и их авторизации для\
    \ выполнения определенных действий. Это два аспекта веб-безопасности. Здесь также\
    \ обсуждается CORS — еще одна важная тема веб-безопасности.\n\n# ГЛАВА 12\n\n\
    ## Тестирование\n\n> Инженер по контролю качества заходит в бар. Заказывает пиво.\
    \ Заказывает 0 пива. Заказывает 99 999 999 999 пива. Заказывает ящерицу. Заказывает\
    \ –1 пива. Заказывает ueicbksjdhd.\n\nПервый настоящий клиент заходит и спрашивает,\
    \ где находится туалет. В баре вспыхивает пламя, и все погибают.\n\n*Бренан Келлер\
    \ (Twitter)*\n\n## Обзор\n\nВ этой главе рассматриваются виды тестирования, выполняемые\
    \ на сайте FastAPI: *модульное, интеграционное и полное*. Здесь будут применяться\
    \ модуль *pytest* и автоматическая разработка тестов.\n\n## Тестирование Web API\n\
    \nВы уже видели несколько инструментов для тестирования API вручную по мере добавления\
    \ конечных точек:\n\n- HTTPie;\n- Requests;\n- HTTPX;\n- браузер.\n\nСуществует\
    \ и множество других инструментов для тестирования.\n\n- Инструмент Curl (https://curl.se)\
    \ очень хорошо известен, хотя в этой книге я использовал HTTPie, чтобы синтаксис\
    \ был проще.\n- Служба Httpbin (http://httpbin.org) написана автором библиотеки\
    \ Requests. Она представляет собой бесплатный тестовый сервер, дающий возможность\
    \ изучить множество представлений о вашем HTTP-запросе.\n- Postman (https://www.postman.com)\
    \ — полноценная платформа для тестирования API.\n- Chrome DevTools (https://oreil.ly/eUK_R)\
    \ — это богатый набор инструментов, входящий в состав браузера Chrome.\n\nВсе\
    \ они могут использоваться для выполнения полных (сквозных) тестов, подобных тем,\
    \ что вы видели в предыдущих главах. Эти выполняемые вручную тесты были полезны\
    \ для быстрой проверки кода сразу после его ввода.\n\nНо что, если внесенное позже\
    \ изменение нарушит один из этих ранних тестов, выполняемых вручную (*регрессия*)?\
    \ Вы же не хотите повторять десятки тестов после каждого изменения кода. Именно\
    \ поэтому большое значение приобретают *автоматизированные* тесты. Остальная часть\
    \ этой главы посвящена им и тому, как создавать их с помощью pytest.\n\n## Где\
    \ тестировать\n\nЯ уже называл разновидности тестов:\n\n- *модульные* — внутри\
    \ уровня, тестируются отдельные функции;\n- *интеграционные* — различные уровни,\
    \ тестирование взаимосвязей;\n- *полные* — тестирование полного API и стека под\
    \ ним.\n\nИногда их называют *пирамидой тестов*, причем ее ширина указывает на\
    \ относительное количество тестов, требующихся в каждой группе (рис. 12.1).\n\n\
    ![](img/eacb50a37d89d355fa68de0c62d56b32_189_0.png)\n\n## Что тестировать\n\n\
    Что нужно тестировать в процессе написания кода? По сути, необходимо подтвердить,\
    \ что при заданных входных данных вы получите правильные выходные данные.\n\n\
    Можно проверить следующие моменты:\n\n- ошибочный ввод;\n- дублирование ввода;\n\
    - неправильные типы ввода;\n- неправильный порядок ввода;\n- недопустимые значения\
    \ ввода;\n- огромные входные и выходные массивы данных.\n\nОшибки могут возникнуть\
    \ где угодно.\n\n- *Веб-уровень* — Pydantic отловит любое несоответствие модели\
    \ и вернет код состояния HTTP 422.\n- *Уровень данных* — база данных будет выдавать\
    \ исключения при отсутствии или дублировании данных, а также при ошибках синтаксиса\
    \ SQL-запросов. При передаче результата данных огромного размера одним куском,\
    \ а не фрагментами с помощью генератора или пагинации могут возникать тайм-ауты\
    \ или истощение памяти.\n- *Любой уровень* — могут быть допущены обычные ошибки\
    \ и недочеты.\n\nГлавы 8–10 содержат некоторые из этих тестов:\n\n- *полное тестирование\
    \ вручную* с использованием таких инструментов, как HTTPie;\n- модульное тестирование\
    \ вручную в виде фрагментов Python;\n- *автоматизированные тесты* с помощью скриптов\
    \ pytest.\n\nВ следующих нескольких разделах мы подробно рассмотрим pytest."
