    представляет собой бесплатный тестовый сервер, дающий возможность изучить множество
    представлений о вашем HTTP-запросе.

    - Postman (https://www.postman.com) — полноценная платформа для тестирования API.

    - Chrome DevTools (https://oreil.ly/eUK_R) — это богатый набор инструментов, входящий
    в состав браузера Chrome.


    Все они могут использоваться для выполнения полных (сквозных) тестов, подобных
    тем, что вы видели в предыдущих главах. Эти выполняемые вручную тесты были полезны
    для быстрой проверки кода сразу после его ввода.


    Но что, если внесенное позже изменение нарушит один из этих ранних тестов, выполняемых
    вручную (*регрессия*)? Вы же не хотите повторять десятки тестов после каждого
    изменения кода. Именно поэтому большое значение приобретают *автоматизированные*
    тесты. Остальная часть этой главы посвящена им и тому, как создавать их с помощью
    pytest.


    # Где тестировать


    Я уже называл разновидности тестов:


    +   - *модульные* — внутри уровня, тестируются отдельные функции;

    - *интеграционные* — различные уровни, тестирование взаимосвязей;

    - *полные* — тестирование полного API и стека под ним.


    Иногда их называют *пирамидой тестов*, причем ее ширина указывает на относительное
    количество тестов, требующихся в каждой группе (рис. 12.1).


    ![](img/eacb50a37d89d355fa68de0c62d56b32_189_0.png)'
