    # ПРИЛОЖЕНИЕ Б


    # Существа и люди


    > От упырей, от призраков,

    От тварей долголапых

    И от существ, рыщущих в ночи,

    Избави нас, Боже!


    *Строфа из Корнуольской литании*


    Сообщения о воображаемых существах, или *криптидах*, поступают отовсюду. Некоторые
    животные, когда-то считавшиеся воображаемыми, — панда, утконос и черный лебедь
    — оказались реальными. Поэтому мы не будем строить догадки. Отважные исследователи
    ищут их. Все вместе они обеспечивают данные для примеров, приводимых в этой книге.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_273_0.png)'
