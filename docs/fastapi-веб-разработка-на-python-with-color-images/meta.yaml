    \ вам не нужно запускать такие методы, как asyncio.gather() или asyncio.run(),\
    \ как в примере 4.4.\n\n## Непосредственное использование Starlette\n\nFastAPI\
    \ не так сильно раскрывает Starlette, как Pydantic. Starlette по большей части\
    \ представляет собой механизм, который гудит в машинном отделении, обеспечивая\
