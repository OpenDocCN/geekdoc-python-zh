    - специальная интеграция, позволяющая использовать и расширять возможности других
    фреймворков.


    Такое сочетание создает приятную среду для разработки веб-приложений, особенно
    RESTful-веб-сервисов.


    # Приложение FastAPI


    Напишем маленькое приложение FastAPI — веб-сервис с одной конечной точкой. Пока
    что будем работать на так называемом веб-уровне, где обрабатываются только веб-запросы
    и ответы. Сначала установите основные необходимые пакеты Python:


    +   - фреймворк FastAPI (https://fastapi.tiangolo.com) — pip install fastapi;

    - веб-сервер Uvicorn (https://www.uvicorn.org) — pip install uvicorn;

    - текстовый веб-клиент HTTPie (https://httpie.io) — pip install httpie;

    - пакет синхронного веб-клиента Requests (https://requests.readthedocs.io) — pip
    install requests;

    - пакет синхронного/асинхронного веб-клиента HTTPX (https://www.python-httpx.org)
    — pip install httpx.'
