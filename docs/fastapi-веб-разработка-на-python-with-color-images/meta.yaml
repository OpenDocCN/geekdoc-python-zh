    ## Комплексные данные


    В этих примерах показано, как передать конечной точке только одну строку. У многих
    конечных точек, особенно GET или DELETE, может быть несколько простых аргументов,
    таких как строки и числа, или не быть их вовсе. Но при создании (POST) или изменении
    (PUT или PATCH) ресурса нам обычно требуются более сложные структуры данных. В
    главе 5 показано, как FastAPI использует библиотеку Pydantic и модели данных для
    их чистой реализации.


    ## Заключение


    В этой главе мы задействовали FastAPI для создания веб-сайта с одной конечной
    точкой. Протестировали ее с помощью нескольких веб-клиентов: браузера, текстовой
    программы HTTPie, пакета Requests Python и пакета HTTPX Python. Начиная с простого
    вызова GET, аргументы запроса передавались на сервер через путь URL, параметр
    запроса и HTTP-заголовок. Затем тело HTTP-запроса применялось для отправки данных
    в конечную точку POST. Позже было показано, как возвращать различные типы HTTP-ответов.
    Наконец, автоматически сгенерированная страница с формами предоставила четвертому
    тестовому клиенту как документацию, так и действующие формы.


    Этот обзор FastAPI будет расширен в главе 8.


    # ГЛАВА 4


    ## Асинхронность, конкурентность и обзор библиотеки Starlette


    > Starlette — это легкий ASGI-фреймворк/инструментарий, он идеально подходит для
    создания асинхронных веб-сервисов на Python.

    *Том Кристи, создатель Starlette*


    ## Обзор


    В предыдущей главе был приведен краткий обзор того, с чем может столкнуться разработчик
    при написании нового приложения FastAPI. Эта глава посвящена базовой для FastAPI
    библиотеке Starlette. В частности, мы рассмотрим возможность *асинхронной* обработки
    с ее помощью. После обзора различных способов делать больше дел одновременно в
    Python вы узнаете, как ключевые слова `async` и `await` были включены в Starlette
    и FastAPI.


    ## Библиотека Starlette


    Большая часть веб-кода FastAPI основана на созданном Томом Кристи пакете Starlette
    (https://www.starlette.io). Его можно применять в качестве самостоятельного веб-фреймворка
    или как библиотеку для других фреймворков, например FastAPI. Как и любой другой
    веб-фреймворк, Starlette выполняет все обычные операции синтаксического анализа
    HTTP-запросов и генерации ответов. Он аналогичен лежащему в основе Flask пакету
    Werkzeug (https://werkzeug.palletsprojects.com).


    Самая важная его особенность заключается в поддержке современного асинхронного
    веб-стандарта Python — ASGI (https://asgi.readthedocs.io). До сих пор большинство
    веб-фреймворков Python, например Flask и Django, основывались на традиционном
    синхронном стандарте WSGI (https://wsgi.readthedocs.io). ASGI позволяет избежать
    характерных для приложений на базе WSGI блокировок и напряженного ожидания. Проблемы
    такого типа связаны с частым подключением веб-приложений к гораздо более медленному
    коду, например, для доступа к базам данных, файлам и сетям. В результате Starlette
    и использующие его фреймворки стали самыми быстрыми веб-пакетами Python и составили
    конкуренцию даже приложениям на Go и Node.js.


    ## Типы конкурентности


    Прежде чем перейти к подробностям поддержки *асинхронности*, предоставляемой Starlette
    и FastAPI, полезно узнать, какими способами можно реализовать *конкурентность*.


    При *параллельных* вычислениях задача распределяется между несколькими выделенными
    центральными процессорами (ЦП). Этот метод часто используется в приложениях для
    выполнения расчетов, таких как задачи обработки графики и машинное обучение.


    При *конкурентных* вычислениях каждый ЦП переключается между несколькими задачами.
    Некоторые задачи из потока занимают больше время, и необходимо сократить общее
    время выполнения. Считывание файла или доступ к удаленному сетевому сервису буквально
    в тысячи и миллионы раз медленнее, чем выполнение вычислений в ЦП.


    Веб-приложения выполняют большую часть этой медленной работы. Как заставить их
    или любые другие серверы работать быстрее? В этом разделе рассматриваются некоторые
    возможности, начиная с общесистемных и заканчивая целевой темой этой главы — реализацией
    конструкций `async` и `await` в FastAPI для Python.


    ## Распределенные и параллельные вычисления


    Если у вас действительно большое приложение — такое, что на одном процессоре оно
    будет работать с трудом, — можете разбить его на части и указать им работать на
    отдельных процессорах на одной или нескольких машинах. Это можно реализовать множеством
    способов, и если у вас есть такое приложение, то вы уже знаете некоторые из них.
    Управление всеми этими частями сложнее и дороже, чем управление одним сервером.


    Здесь основное внимание будем уделять приложениям малого и среднего размера, размещаемым
    на одной машине. В этих приложениях может быть смешан синхронный и асинхронный
    код, и им прекрасно можно управлять с помощью FastAPI.


    ## Процессы в операционной системе


    Операционная система (или ОС, потому что печатать длинные слова утомительно) планирует
    использование ресурсов: памяти, процессоров, устройств, сетей и т. д. Каждая запущенная
    программа выполняет свой код в одном или нескольких *процессах*. ОС предоставляет
    каждому из них управляемый, защищенный доступ к ресурсам, включая время работы
    ЦП.


    Большинство систем применяют *вытесняющее* планирование процессов, не позволяя
    ни одному процессу занимать процессор, память или любой другой ресурс. ОС постоянно
    приостанавливает и возобновляет процессы в соответствии со своим системным дизайном
    и настройками.


    Хорошая новость для разработчиков: это не ваша проблема! Но плохая новость (обычно
    затмевающая хорошую) такова: вы не сможете ничего сделать, чтобы изменить это,
    даже если захотите.


    Для приложений Python, требовательных к производительности процессора, обычное
    решение заключается в использовании нескольких процессов, которые передаются под
    управление ОС. В Python для этого существует многопроцессорный модуль ([https://oreil.ly/YO4YE](https://oreil.ly/YO4YE)).


    ## Потоки в операционной системе


    Вы также можете запускать *потоки* управления в рамках одного процесса. Для выполнения
    таких задач в Python есть пакет работы с потоками ([https://oreil.ly/xwVB1](https://oreil.ly/xwVB1)).'
  mdcn: '## 自动化文档


    此处假设您正在使用示例 3.21 中的 Web 应用程序——即通过 POST 请求向 http://localhost:8000/hi 发送 `who` 参数的版本。


    需要确保浏览器访问 URL **http://localhost:8000/docs**。


    您将看到类似图 3.1 的界面（我裁剪了后续截图以突出特定区域）。


    ![](img/eacb50a37d89d355fa68de0c62d56b32_61_0.png)


    这是从何而来？


    FastAPI 会从您的代码生成 OpenAPI 规范，并包含此页面以显示和测试所有端点。这仅仅是“秘密配方”的一个成分。


    点击绿色字段右侧的向下箭头以展开测试（图 3.2）。


    ![](img/eacb50a37d89d355fa68de0c62d56b32_62_0.png)


    **图 3.2. 打开文档页面**


    点击右侧的 Try it out（试一试）按钮。现在您将看到一个区域，允许在请求体部分输入值（图 3.3）。


    ![](img/eacb50a37d89d355fa68de0c62d56b32_62_1.png)


    **图 3.3. 数据输入页面**


    左键单击 "string" 标签。将其更改为 "**Cousin Eddie**"（表弟埃迪）（应包含在双引号中）。然后点击下方的蓝色 Execute（执行）按钮。


    现在查看 Execute（执行）按钮下方的 Responses（响应）部分（图 3.4）。


    ![](img/eacb50a37d89d355fa68de0c62d56b32_63_0.png)


    在 Response body（响应体）字段中显示表弟埃迪已出现。


    此过程代表了测试网站的另一种方式（除了之前使用浏览器、HTTPie 和 Requests 的示例）。


    顺便说一句，在 Responses（响应）窗口的 Curl 字段中可以看到，使用 curl 命令行工具进行测试比使用 HTTPie 需要更多输入。HTTPie
    的自动 JSON 编码在此处会有所帮助。


    这种自动化文档实际上是一个所谓的重大举措。当您的 Web 服务扩展到数百个端点时，拥有一个持续更新的文档和测试页面非常有用。


    ## 复杂数据


    这些示例展示了如何向端点传递单个字符串。许多端点，特别是 GET 或 DELETE，可能有多个简单参数（如字符串和数字），或者根本没有参数。但在创建（POST）或修改（PUT
    或 PATCH）资源时，我们通常需要更复杂的数据结构。第 5 章展示了 FastAPI 如何使用 Pydantic 库和数据模型来清晰地实现这一点。


    ## 结论


    在本章中，我们使用 FastAPI 创建了一个具有单个端点的网站。通过多种 Web 客户端对其进行了测试：浏览器、文本程序 HTTPie、Python 的
    Requests 包和 Python 的 HTTPX 包。从简单的 GET 调用开始，请求参数通过 URL 路径、查询参数和 HTTP 头传递到服务器。然后，HTTP
    请求体用于向 POST 端点发送数据。随后展示了如何返回不同类型的 HTTP 响应。最后，自动生成的表单页面为第四个测试客户端提供了文档和可用的表单。


    FastAPI 的此概述将在第 8 章中扩展。


    # 第 4 章


    ## 异步、并发与 Starlette 库概述


    > Starlette 是一个轻量级的 ASGI 框架/工具包，非常适合在 Python 中创建异步 Web 服务。

    *Starlette 的创建者 Tom Christie*


    ## 概述


    上一章简要介绍了开发人员在编写新的 FastAPI 应用程序时可能遇到的情况。本章专注于 FastAPI 的基础库 Starlette。特别是，我们将探讨使用它进行*异步*处理的能力。在概述了
    Python 中同时处理更多任务的各种方式之后，您将了解 `async` 和 `await` 关键字是如何被纳入 Starlette 和 FastAPI 的。


    ## Starlette 库


    FastAPI 的大部分 Web 代码基于 Tom Christie 创建的 Starlette 包 (https://www.starlette.io)。它可以作为独立的
    Web 框架使用，也可以作为其他框架（如 FastAPI）的库。与任何其他 Web 框架一样，Starlette 执行所有常规的 HTTP 请求解析和响应生成操作。它类似于
    Flask 底层的 Werkzeug 包 (https://werkzeug.palletsprojects.com)。


    其最重要的特性是支持现代的 Python 异步 Web 标准——ASGI (https://asgi.readthedocs.io)。到目前为止，大多数 Python
    Web 框架（如 Flask 和 Django）都基于传统的同步标准 WSGI (https://wsgi.readthedocs.io)。ASGI 允许避免基于
    WSGI 的应用程序中常见的阻塞和紧张等待。此类问题通常与 Web 应用程序频繁连接到慢得多的代码（例如访问数据库、文件和网络）有关。因此，Starlette
    及其使用的框架成为 Python 中最快的 Web 包，甚至与 Go 和 Node.js 应用程序竞争。


    ## 并发类型


    在深入了解 Starlette 和 FastAPI 提供的*异步*支持细节之前，了解实现*并发*的各种方式很有帮助。


    在*并行*计算中，任务被分配给多个专用中央处理器（CPU）。此方法通常用于执行计算的应用程序，例如图形处理和机器学习任务。


    在*并发*计算中，每个 CPU 在多个任务之间切换。某些任务流需要更多时间，因此需要缩短总执行时间。读取文件或访问远程网络服务的速度比 CPU 中的计算慢数千甚至数百万倍。


    Web 应用程序执行大部分此类缓慢的工作。如何让它们或任何其他服务器运行得更快？本节探讨了一些可能性，从通用系统级到本章的主题——在 FastAPI 中为
    Python 实现 `async` 和 `await` 结构。


    ## 分布式和并行计算


    如果您的应用程序确实很大——大到在一个处理器上运行困难——您可以将其分解并指定它们在一台或多台机器上的单独处理器上运行。这可以通过多种方式实现，如果您有这样的应用程序，您已经知道其中一些。管理所有这些部分比管理单个服务器更复杂且更昂贵。


    这里我们将主要关注部署在单台机器上的中小型应用程序。这些应用程序可能混合了同步和异步代码，使用 FastAPI 可以很好地管理它们。


    ## 操作系统中的进程


    操作系统（或 OS，因为输入长单词很累）计划资源的使用：内存、处理器、设备、网络等。每个运行的程序在一个或多个*进程*中执行其代码。操作系统为每个进程提供受控、受保护的资源访问，包括
    CPU 运行时间。


    大多数系统使用*抢占式*进程调度，不允许任何进程占用处理器、内存或任何其他资源。操作系统根据其系统设计和设置不断暂停和恢复进程。


    对开发人员来说好消息是：这不是您的问题！但坏消息（通常掩盖了好消息）是：即使您想，也无法做任何事情来改变这一点。


    对于需要高处理器性能的 Python 应用程序，通常的解决方案是使用多个进程，这些进程交由操作系统管理。在 Python 中，为此存在多进程模块 ([https://oreil.ly/YO4YE](https://oreil.ly/YO4YE))。


    ## 操作系统中的线程


    您还可以在单个进程内运行*线程*。在 Python 中，有用于处理此类任务的线程包 ([https://oreil.ly/xwVB1](https://oreil.ly/xwVB1))。'
