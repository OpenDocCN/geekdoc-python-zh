    \ групп. Если бы каждый мог изменять страницы на Amazon, представьте, сколько\
    \ странных товаров появилось бы на них и какие удивительные покупки получили бы\
    \ некоторые люди. К сожалению, такова человеческая природа — некоторые люди пользуются\
    \ остальными, уплачивающими скрытый налог за свои действия.\n\nСтоит ли оставить\
    \ наш сайт о криптидах открытым для доступа любых пользователей к любой конечной\
    \ точке? Нет! Практически любой крупный веб-сервис в конечном счете должен решать\
    \ следующие задачи.\n\n- Аутентификация (authn). Кто вы?\n- Авторизация (authz).\
    \ Что вам нужно?\n\nДолжен ли код аутентификации и авторизации (auth) получить\
