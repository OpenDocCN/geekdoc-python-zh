  md: "# Пример 17.9. Столбчатая диаграмма инициалов имен существ\n\n```\n# (добавьте\
    \ эти строки в файл web/creature.py)\n\nfrom collections import Counter\nfrom\
    \ fastapi import Response\nimport plotly.express as px\nfrom service.creature\
    \ import get_all\n\n@router.get(\"/plot\")\ndef plot():\n    creatures = get_all()\n\
    \    letters = \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\"\n    counts = Counter(creature.name[0]\
    \ for creature in creatures)\n    y = { letter: counts.get(letter, 0) for letter\
    \ in letters }\n    fig = px.histogram(x=list(letters), y=y, title=\"Creature\
    \ Names\",\n        labels={\"x\": \"Initial\", \"y\": \"Initial\"})\n    fig_bytes\
    \ = fig.to_image(format=\"png\")\n    return Response(content=fig_bytes, media_type=\"\
    image/png\")\n```\n\nВведите localhost:8000/creature/plot в адресную строку своего\
    \ браузера. Вы должны увидеть изображение, приведенное на рис. 17.2.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_255_0.png)\n\
