    по-прежнему работает и корректно передает данные.


    Наконец, в главе 10 мы откажемся от фиктивных данных и будем хранить реальные
    данные в реальных базах данных, чтобы создать полноценный сайт (веб → сервис →
    данные).


    > Если позволить любому анонимному посетителю выполнить все эти действия, не стоит
    ожидать ничего хорошего. В главе 11 рассматриваются аутентификация и авторизация
    (auth), необходимые для определения ролей и ограничения того, кто что может делать.
    В оставшейся части этой главы мы обойдемся без аутентификации и просто рассмотрим,
    как работать с необработанными веб-функциями.


    # Немного отвлечемся: сверху вниз, снизу вверх, от центра наружу?


    При разработке веб-сайта можно реализовать один из таких вариантов, как:


    +   - веб-уровень и работа дальше вниз;

    - уровень данных и работа дальше вверх;

    - сервисный уровень и работа в обоих направлениях.


    У вас уже есть база данных, установленная и наполненная данными, и вы просто жаждете
    поделиться ею со всем миром? Если да, то, возможно, стоит сначала заняться кодом
    и тестами уровня данных, затем уровнем сервисов, а веб-уровень написать последним.


    Если ваш подход — предметно-ориентированное проектирование (Domain-Driven Design,
    DDD) (https://oreil.ly/ijU9Q), можете начать со среднего, сервисного уровня, определяя
    основные сущности и модели данных. Или же сначала разработать веб-интерфейс, а
    к нижним уровням обратиться, когда поймете, чего от них ожидать.


    Очень хорошие обсуждения и рекомендации по дизайну вы найдете в следующих книгах:'
- md: "## Проектирование RESTful API\n\nHTTP — это способ передачи команд и данных\
    \ между веб-клиентами и серверами. Но, как и в случае с ингредиентами из холодильника,\
    \ которые можно комбинировать, изготавливая блюда от отвратительных до изысканных,\
    \ некоторые рецепты для HTTP работают лучше, чем другие.\n\nВ главе 1 я упоминал,\
    \ что *RESTful* стал полезной, хотя иногда и нечеткой моделью для разработки HTTP.\
    \ Проектирование RESTful включает в себя следующие основные компоненты:\n\n- *ресурсы*\
    \ — элементы данных, которыми управляет ваше приложение;\n- *идентификаторы* —\
    \ уникальные идентификаторы ресурсов;\n- *URL-адреса* — структурированные строки\
    \ ресурсов и идентификаторов;\n- *глагольные операторы или действия* — термины,\
    \ сопровождающие URL-адреса для различных целей:\n  - GET — получение ресурса;\n\
    \  - POST — создание нового ресурса;\n  - PUT — полная замена ресурса;\n  - PATCH\
    \ — частичная замена ресурса;\n  - DELETE — ресурсы разлетаются в ключья.\n\n\
    > Вы увидите разногласия по поводу относительных достоинств PUT в сравнении с\
    \ PATCH. Если вам не нужно отличать частичную модификацию от полной (замены),\
    \ то, возможно, оба оператора и не понадобятся.\n\nОбщие правила RESTful, касающиеся\
    \ сочетания глаголов и URL-адресов, содержащих ресурсы и идентификаторы, предусматривают\
    \ следующие шаблоны параметров пути (содержимое между / в URL):\n\n- verb/resource/\
    \ — применение глагольного оператора (verb) ко всем ресурсам типа resource;\n\
    - verb/resource/id — применение глагольного оператора (verb) к ресурсам (resource)\
    \ с идентификатором id.\n\nПри использовании примера данных для этой книги запрос\
    \ GET к конечной точке /thing вернет данные обо всех исследователях, но запрос\
    \ GET к /thing/abc предоставит данные только для ресурса thing с идентификатором\
    \ abc.\n\nНаконец, веб-запросы часто содержат больше информации, указывая на необходимость\
    \ следующих действий:\n\n- сортировки результатов;\n- пагинации результатов;\n\
    - выполнения другой функции.\n\nПараметры для них иногда могут иметь вид параметров\
    \ пути (добавляются в конец после еще одного символа /), но чаще всего они включаются\
    \ как параметры запроса (var=val после знака ? в URL-адресе). Поскольку у URL-адресов\
    \ есть ограничения по размеру, большие запросы часто передаются в теле HTTP.\n\
    \nБольшинство авторов рекомендуют использовать множественное число при именовании\
    \ ресурса и связанных с ним пространств имен, таких как разделы API и таблицы\
    \ баз данных. Я долго следовал этому совету, но теперь считаю, что названия в\
    \ единственном числе проще по многим причинам (включая странные английского языка):\n\
    \n- некоторые слова представляют множественное число самих себя — series, fish;\n\
    - у некоторых слов неправильное множественное число — children, people;\n- вам\
    \ нужен код преобразования единственного числа во множественное по требованию\
    \ во многих местах.\n\nПо этим причинам во многих случаях в книге я использую\
    \ схему именования в единственном числе. Это противоречит обычным рекомендациям\
    \ RESTful, так что не стесняйтесь игнорировать эту мою особенность, если не согласны\
    \ со мной.\n\n## Макет сайта с файлами и каталогами\n\nНаши данные касаются в\
    \ основном существ и исследователей. Изначально мы могли бы определить все URL-адреса\
    \ и их функции пути FastAPI для доступа к данным в одном файле Python. Не будем\
    \ поддаваться искушению и начнем так, как будто мы уже восходящая звезда в криптном\
    \ веб-пространстве. Имея хороший фундамент, гораздо легче добавлять новые крутые\
    \ вещи.\n\nСначала выберите на своей машине каталог. Назовите его **fastapi**\
    \ или как угодно, что поможет запомнить, где вы будете работать с кодом из этой\
    \ книги. В нем создайте следующие подкаталоги:\n\n- `src` — содержит весь код\
    \ сайта;\n- `web` — веб-уровень FastAPI;\n- `service` — уровень бизнес-логики;\n\
    - `data` — уровень интерфейса хранения данных;\n- `model` — для определения моделей\
    \ Pydantic;\n- `fake` — жестко указанные данные (заглушки) для ранних этапов.\n\
    \nВ каждой из этих папок вскоре появится по три файла:\n\n- `__init__.py` — необходим\
    \ для восприятия этого каталога в качестве пакета;\n- `creature.py` — код существа\
    \ для этого уровня;\n- `explorer.py` — код исследователя для этого уровня.\n\n\
    Существует *множество* мнений о том, как следует планировать страницы для разработки.\
    \ Такой дизайн призван показать разделение уровней и оставить место для *будущих*\
    \ дополнений.\n\nСейчас необходимо дать некоторые объяснения. Поначалу файлы `__init__.py`\
    \ будут пустыми. Они представляют собой своего рода хакерскую уловку в отношении\
    \ Python, поэтому к содержащей их папке следует относиться как к пакету Python,\
    \ который можно импортировать. Во-вторых, папка `fake` предоставляет некоторые\
    \ данные-заглушки для более высоких уровней по мере создания нижних.\n\nКроме\
    \ того, логика *импорта* в Python не работает строго с иерархиями каталогов. Она\
    \ опирается на *пакеты* и *модули* Python. Файлы с расширением `.py`, перечисленные\
    \ в приведенной ранее древовидной структуре, являются модулями Python (исходными\
    \ файлами). Их родительские каталоги будут считаться пакетами, *если* они содержат\
    \ файл `__init__.py`. (Это соглашение необходимо, чтобы, если у вас есть каталог\
    \ `sys` и вы набираете команду `import sys`, Python мог определить, вам нужен\
    \ системный каталог или ваш локальный.)\n\nПрограммы Python могут импортировать\
    \ пакеты и модули. У интерпретатора Python есть встроенная переменная `sys.path`.\
    \ Она содержит местоположение стандартного кода Python. Переменная окружения `PYTHONPATH`\
    \ — это пустая или разделенная двоеточием строка имен каталогов. Она указывает\
    \ Python, какие родительские каталоги проверять перед `sys.path`, чтобы найти\
    \ импортируемые модули или пакеты. Поэтому, если вы переходите в новую папку `fastapi`,\
    \ введите следующую команду (в Linux или macOS), чтобы новый код в ней проверялся\
    \ первым при импорте:\n\n```\n$ export PYTHONPATH=$PWD/src\n```\n\nЧасть выражения\
    \ `$PWD` означает «вывести *рабочий каталог*» и избавляет вас от необходимости\
    \ вводить полный путь к каталогу `fastapi`, хотя вы можете это сделать, если хотите.\
    \ А `src` означает, что искать модули и пакеты для импорта нужно только там.\n\
    \nЧтобы установить переменную окружения `PWD` в Windows, изучите раздел *Excursus:\
    \ Setting Environment Variables* на сайте Python Software Foundation (https://oreil.ly/9NRBA).\n\
    \nФух.\n\n## Первый код веб-сайта\n\nВ этом разделе мы рассмотрим, как использовать\
    \ FastAPI для написания запросов и ответов для сайта RESTful API. Затем начнем\
    \ применять их на нашем реальном все более и более странном сайте.\n\nНачнем с\
    \ примера 8.1. В каталоге src создайте новую программу верхнего уровня main.py\
    \ — она будет запускать программу Uvicorn и пакет FastAPI.\n\n**Пример 8.1. Основная\
    \ программа main.py**\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/\")\ndef top():\n    return \"top here\"\n\nif __name__ == \"__main__\"\
    :\n    import uvicorn\n    uvicorn.run(\"main:app\", reload=True)\n```\n\nСлово\
    \ app здесь представляет собой объект FastAPI, связывающий все воедино. Первый\
    \ аргумент Uvicorn — \"main:app\", потому что файл называется main.py, а второй\
    \ — app, имя объекта FastAPI.\n\nUvicorn будет продолжать работать и перезапустится,\
    \ если в том же каталоге или в любых подкаталогах изменится код. Без аргумента\
    \ reload=True придется перезапускать Uvicorn каждый раз, когда вы вносите изменения\
    \ в код. Во многих следующих примерах просто вносите изменения в один и тот же\
    \ файл main.py и принудительно перезапускайте его, вместо того чтобы создавать\
    \ файлы main2.py, main3.py и т. д. Запустите файл main.py из примера 8.2.\n\n\
    **Пример 8.2. Запуск основной программы**\n\n```\n$ python main.py &\nINFO:  \
    \   Will watch for changes in these directories: [.../fastapi']\nINFO:     Uvicorn\
    \ running on http://127.0.0.1:8000 (Press CTRL+C to quit)\nINFO:     Started reloader\
    \ process [92543] using StatReload\nINFO:     Started server process [92551]\n\
    INFO:     Waiting for application startup.\nINFO:     Application startup complete.\n\
    ```\n\n---\n\n*Clean Architectures in Python* (https://oreil.ly/5KrL9), автор\
    \ Леонардо Джордани (Digital Cat Books);\n*Architecture Patterns with Python*\
    \ (https://www.cosmicpython.com), авторы Гарри Персиваль и Боб Грегори (O'Reilly)¹;\n\
    *Microservice APIs* (https://oreil.ly/Gk0z2), автор Хоце Апо Перальта (Manning)².\n\
    \nВ этих и других источниках вы увидите такие термины, как «*гексагональная архитектура*»,\
    \ «*порты*» и «*адаптеры*». Выбор способа действий во многом зависит от того,\
    \ какие данные у вас уже есть и как вы хотите подойти к созданию сайта.\n\nЯ предполагаю,\
    \ что многие из вас в основном заинтересованы в том, чтобы попробовать FastAPI\
    \ и связанные с ним технологии, и не обязательно имеют заранее определенный зрелый\
    \ домен данных, который хочется сразу же задействовать. Поэтому в этой книге я\
    \ использую подход под названием web-first — шаг за шагом, начиная с основных\
    \ частей и добавляя другие по мере необходимости. Иногда эксперименты работают,\
    \ иногда нет. Поначалу я постараюсь сдерживать желание запихнуть все в веб-уровень.\n\
    \n> Веб-уровень — лишь один из способов передачи данных между пользователем и\
    \ сервисом. Существуют и другие варианты, например с помощью интерфейса командной\
    \ строки (CLI) или набора средств разработки программного обеспечения (SDK). В\
    \ других фреймворках веб-уровень иногда называют уровнем представления или презентации.\n\
    \n---\n\n¹ Персиваль Г., Грегори Б. Паттерны разработки на Python. — СПб.: Питер,\
    \ 2022.\n² Перальта Х. А. Микросервисы и API. — СПб.: Питер, 2024."
  mdcn: "## RESTful API 设计\n\nHTTP 是 Web 客户端与服务器之间传递命令和数据的一种方式。但就像冰箱里的食材可以组合成从难吃到精致的各种菜肴一样，HTTP\
    \ 的某些“配方”比其他配方效果更好。\n\n在第 1 章中，我提到过 *RESTful* 已经成为开发 HTTP 的一种有用但有时定义模糊的模型。RESTful\
    \ 设计包含以下核心组件：\n\n- *资源* — 应用程序管理的数据元素；\n- *标识符* — 资源的唯一标识符；\n- *URL* — 资源和标识符的结构化字符串；\n\
    - *动词运算符或动作* — 伴随 URL 用于不同目的的术语：\n  - GET — 获取资源；\n  - POST — 创建新资源；\n  - PUT\
    \ — 完全替换资源；\n  - PATCH — 部分替换资源；\n  - DELETE — 资源被删除。\n\n> 你会看到关于 PUT 与 PATCH\
    \ 相对优劣的争论。如果你不需要区分部分修改和完全替换，那么可能两个运算符都不需要。\n\n关于动词与包含资源和标识符的 URL 组合的通用 RESTful\
    \ 规则，规定了以下路径参数模式（URL 中 / 之间的内容）：\n\n- verb/resource/ — 将动词运算符 (verb) 应用于所有 resource\
    \ 类型的资源；\n- verb/resource/id — 将动词运算符 (verb) 应用于标识符为 id 的 resource 资源。\n\n使用本书的数据示例，对端点\
    \ /thing 的 GET 请求将返回所有研究者的数据，但对 /thing/abc 的 GET 请求将仅提供标识符为 abc 的 thing 资源的数据。\n\
    \n最后，Web 请求通常包含更多信息，表明需要执行以下操作：\n\n- 对结果进行排序；\n- 对结果进行分页；\n- 执行其他功能。\n\n它们的参数有时可以是路径参数（在末尾添加另一个\
    \ / 符号），但更常见的是作为查询参数（URL 中 ? 后的 var=val）。由于 URL 有大小限制，大型请求通常通过 HTTP 主体传输。\n\n\
    大多数作者建议在命名资源及其相关命名空间（如 API 部分和数据库表）时使用复数形式。我曾长期遵循这一建议，但现在认为单数名称在许多方面更简单（包括英语的怪异之处）：\n\
    \n- 有些词本身就是复数形式 — series, fish；\n- 有些词的复数形式不规则 — children, people；\n- 你需要在许多地方按需编写单数到复数的转换代码。\n\
    \n基于这些原因，在本书的许多情况下，我使用单数命名方案。这与 RESTful 的常规建议相悖，因此如果你不同意，可以随意忽略我的这个特点。\n\n## 网站文件与目录结构\n\
    \n我们的数据主要涉及生物和研究者。最初，我们可以在一个 Python 文件中定义所有 URL 及其 FastAPI 路径函数来访问数据。让我们不要屈服于诱惑，不要一开始就表现得好像我们已经是加密网络空间的明星。有了良好的基础，添加新的酷炫功能会容易得多。\n\
    \n首先，在你的机器上选择一个目录。将其命名为 **fastapi** 或任何有助于记住你将在此处处理本书代码的名称。在其中创建以下子目录：\n\n- `src`\
    \ — 包含网站的所有代码；\n- `web` — FastAPI 的 Web 层；\n- `service` — 业务逻辑层；\n- `data` — 数据存储接口层；\n\
    - `model` — 用于定义 Pydantic 模型；\n- `fake` — 用于早期阶段的硬编码数据（存根）。\n\n在这些文件夹中的每一个里，很快会出现三个文件：\n\
    \n- `__init__.py` — 使该目录被视为包所必需；\n- `creature.py` — 该层的生物代码；\n- `explorer.py`\
    \ — 该层的研究者代码。\n\n关于如何规划页面进行开发，存在*多种*观点。这种设计旨在展示层级划分，并为*未来*的扩展留出空间。\n\n现在需要做一些解释。起初，`__init__.py`\
    \ 文件将是空的。它们是关于 Python 的一种黑客技巧，因此包含它们的文件夹应被视为可导入的 Python 包。其次，`fake` 文件夹在构建底层时为上层提供一些存根数据。\n\
    \n此外，Python 中的*导入*逻辑并不严格遵循目录层次结构。它依赖于 Python 的*包*和*模块*。前面树状结构中列出的扩展名为 `.py` 的文件是\
    \ Python 模块（源文件）。它们的父目录将被视为包，*如果*它们包含 `__init__.py` 文件。（这是必要的约定，这样如果你有一个 `sys`\
    \ 目录并输入 `import sys`，Python 就能确定你需要的是系统目录还是你的本地目录。）\n\nPython 程序可以导入包和模块。Python\
    \ 解释器有一个内置变量 `sys.path`。它包含标准 Python 代码的位置。环境变量 `PYTHONPATH` 是一个空的或以冒号分隔的目录名字符串。它告诉\
    \ Python 在 `sys.path` 之前检查哪些父目录以找到要导入的模块或包。因此，如果你进入新的 `fastapi` 文件夹，请输入以下命令（在\
    \ Linux 或 macOS 上），以便在导入时首先检查其中的新代码：\n\n```\n$ export PYTHONPATH=$PWD/src\n```\n\
    \n表达式 `$PWD` 的部分表示“输出*工作目录*”，免去了输入 `fastapi` 目录完整路径的麻烦，尽管你也可以这样做。而 `src` 表示只在那里查找要导入的模块和包。\n\
    \n要在 Windows 上设置环境变量 `PWD`，请参阅 Python 软件基金会网站上的 *附录：设置环境变量* (https://oreil.ly/9NRBA)。\n\
    \n呼。\n\n## 网站的第一段代码\n\n在本节中，我们将探讨如何使用 FastAPI 为 RESTful API 网站编写请求和响应。然后开始在我们真实的、越来越奇怪的网站上应用它们。\n\
    \n从示例 8.1 开始。在 src 目录中，创建一个新的顶级程序 main.py — 它将运行 Uvicorn 程序和 FastAPI 包。\n\n**示例\
    \ 8.1. 主程序 main.py**\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n\
    @app.get(\"/\")\ndef top():\n    return \"top here\"\n\nif __name__ == \"__main__\"\
    :\n    import uvicorn\n    uvicorn.run(\"main:app\", reload=True)\n```\n\n这里的单词\
    \ app 代表一个 FastAPI 对象，将所有内容连接在一起。Uvicorn 的第一个参数是 \"main:app\"，因为文件名为 main.py，第二个参数是\
    \ app，即 FastAPI 对象的名称。\n\nUvicorn 将继续运行，并在相同目录或任何子目录中的代码发生更改时重新启动。如果没有 reload=True\
    \ 参数，每次修改代码时都必须重新启动 Uvicorn。在接下来的许多示例中，只需修改同一个 main.py 文件并强制重新启动它，而不是创建 main2.py、main3.py\
    \ 等文件。运行示例 8.2 中的 main.py 文件。\n\n**示例 8.2. 运行主程序**\n\n```\n$ python main.py &\n\
    INFO:     Will watch for changes in these directories: [.../fastapi']\nINFO: \
    \    Uvicorn running on http://127.0.0.1:8000 (Press CTRL+C to quit)\nINFO:  \
    \   Started reloader process [92543] using StatReload\nINFO:     Started server\
    \ process [92551]\nINFO:     Waiting for application startup.\nINFO:     Application\
    \ startup complete.\n```\n\n---\n\n*Python 中的整洁架构* (https://oreil.ly/5KrL9)，作者\
    \ Leonardo Giordani (Digital Cat Books)；\n*Python 架构模式* (https://www.cosmicpython.com)，作者\
    \ Harry Percival 和 Bob Gregory (O'Reilly)¹；\n*微服务 API* (https://oreil.ly/Gk0z2)，作者\
    \ Héctor Aponte Peralta (Manning)²。\n\n在这些和其他来源中，你会看到诸如“*六边形架构*”、“*端口*”和“*适配器*”之类的术语。选择行动方式在很大程度上取决于你已有的数据以及你希望如何构建网站。\n\
    \n我假设你们中的许多人主要对尝试 FastAPI 及其相关技术感兴趣，不一定拥有预先定义好的、成熟的领域数据想要立即使用。因此，在本书中，我使用一种名为\
    \ web-first 的方法 — 从基本部分开始，逐步添加其他部分。有时实验会成功，有时不会。起初，我会尽量克制将所有东西都塞进 Web 层的冲动。\n\n\
    > Web 层只是用户和服务之间传递数据的一种方式。还有其他选择，例如通过命令行界面 (CLI) 或软件开发工具包 (SDK)。在其他框架中，Web 层有时被称为表示层或展示层。\n\
    \n---\n\n¹ Percival H., Gregory B. *Паттерны разработки на Python*. — СПб.: Питер,\
    \ 2022.\n² Peralta H. A. *Микросервисы и API*. — СПб.: Питер, 2024."
