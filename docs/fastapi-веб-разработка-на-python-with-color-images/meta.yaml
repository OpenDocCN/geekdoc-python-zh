  md: 'Вы также можете протестировать пример 11.1 с помощью автоматической страницы
    документации (http://localhost:8000/docs), показанной на рис. 11.1.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_168_0.png)


    Нажмите стрелку вниз, расположенную справа, затем кнопку Try It Out (Попробовать)
    и кнопку Execute (Выполнить). Вы увидите форму, запрашивающую имя пользователя
    и пароль. Введите что угодно. Форма документации обратится к этой конечной точке
    сервера и покажет эти значения в ответе.


    Эти тесты показывают, что вы можете получить имя пользователя и пароль к серверу
    и обратно (хотя ни один из них на самом деле ничего не проверял). Что-то на сервере
    должно проверить, что имя и пароль соответствуют утвержденным значениям. Так,
    в примере 11.4 я включу в веб-секретное имя пользователя и пароль. Вводимые имя
    пользователя и пароль должны совпадать (каждый из них представляет собой *секретный
    ключ*), иначе будет выброшено исключение. Код состояния HTTP 401 официально называется
    Unauthorized (Не авторизован), но на самом деле он означает «неаутентифицированный».


    > Вместо того чтобы запоминать все коды статуса HTTP, можно импортировать модуль
    статуса FastAPI, который сам импортируется непосредственно из Starlette. Поэтому
    вы можете использовать более понятное status_code=HTTP_401_UNAUTHORIZED в примере
    11.4 вместо простой строки status_code=401.'
