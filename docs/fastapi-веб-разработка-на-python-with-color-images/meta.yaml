  md: "# Первая веб-часть — инициализация игры\n\nНам нужны две новые конечные точки\
    \ веб-приложения. Мы используем имена существ, поэтому можно назвать конечные\
    \ точки следующим образом: GET /creature/game и POST /creature/game. Но это не\
    \ сработает, потому что у нас уже есть похожие конечные точки — GET /creature/{name}\
    \ и POST /creature/{name} и FastAPI выберет их в качестве совпадения в первую\
    \ очередь. Поэтому давайте создадим новое пространство имен маршрутизации верхнего\
    \ уровня /game и поместим в него обе новые конечные точки.\n\nПервая конечная\
    \ точка в примере 18.1 выполняет инициализацию игры. Она должна получить случайное\
    \ имя существа из базы данных и вернуть его вместе со всем клиентским кодом для\
    \ реализации многоходовой игровой логики. Для этого мы используем шаблон Jinja\
    \ (он приведен в главе 16), содержащий HTML, CSS и JavaScript.\n\n**Пример 18.1.**\
    \ Инициализация веб-игры (web/game.py)\n\n```\nfrom pathlib import Path\n\nfrom\
    \ fastapi import APIRouter, Body, Request\nfrom fastapi.templating import Jinja2Templates\n\
    \nfrom service import game as service\n\nrouter = APIRouter(prefix = \"/game\"\
    )\n\n# Первоначальный запрос на игру\n@router.get(\"\")\ndef game_start(request:\
    \ Request):\n    name = service.get_word()\n    top = Path(__file__).resolve().parents[1]\
    \ # прародитель\n    templates = Jinja2Templates(directory=f\"{top}/template\"\
    )\n    return templates.TemplateResponse(\"game.html\",\n        {\"request\"\
    : request, \"word\": name})\n\n# Последующие игровые запросы\n@router.post(\"\"\
    )\nasync def game_step(word: str = Body(), guess: str = Body()):\n    score =\
    \ service.get_score(word, guess)\n    return score\n```\n\nFastAPI требуется функция\
    \ пути game_start(), чтобы получить параметр request и передать его в шаблон в\
    \ качестве аргумента."
