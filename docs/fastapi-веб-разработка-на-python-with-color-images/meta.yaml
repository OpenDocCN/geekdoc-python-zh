  md: 'сделано с помощью автономных клиентов, таких как HTTPie, или в скриптах, использующих
    Requests.


    +   - С помощью TestClient примените встроенный объект FastAPI/Starlette для получения
    прямого доступа к серверу, без открытого TCP-соединения.


    Однако эти подходы требуют написания одного или нескольких тестов для каждой конечной
    точки. Это может превратиться в Средневековье, а мы уже на несколько веков ушли
    вперед. Более современный подход основан на тестировании на основе свойств (Property-Based
    Testing, PBT). При этом используется преимущество автоматически генерируемой документации
    FastAPI. Схема OpenAPI под названием openapi.json создается FastAPI каждый раз,
    когда вы изменяете функцию пути или декоратор пути на веб-уровне. В этой схеме
    подробно описано все о каждой конечной точке — аргументы, возвращаемые значения
    и т. д. Для этого и существует спецификация OpenAPI (OpenAPI Specification, OAS),
    приведенная на странице OpenAPI Initiative''s FAQ (https://www.openapis.org/faq):
    «OAS определяет стандартное, не зависящее от языка программирования описание интерфейса
    для REST API, которое позволяет людям и компьютерам обнаружить и понять возможности
    сервиса, не требуя доступа к исходному коду, дополнительной документации или изучения
    сетевого трафика».


    Для работы потребуется два пакета:


    +   - Hypothesis (https://hypothesis.works) — pip install hypothesis;

    - Schemathesis (https://schemathesis.readthedocs.io) — pip install schemathesis.


    Hypothesis — это базовая библиотека, а Schemathesis применяет ее к схеме OpenAPI
    3.0, которую генерирует FastAPI. При запуске инструмент Schemathesis считывает
    эту схему, генерирует множество тестов с различными данными (и вам не нужно их
    придумывать!) и работает с pytest.


    Чтобы не затягивать, в примере 12.16 сначала сократим код в файле main.py до базовых
    конечных точек существа и исследователя — creature и explorer.


    # Пример 12.16. Основа файла main.py


    ```

    from fastapi import FastAPI

    from web import explorer, creature


    app = FastAPI()

    app.include_router(explorer.router)

    app.include_router(creature.router)

    ```'
