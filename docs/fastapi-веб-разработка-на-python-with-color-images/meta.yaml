    \ аутентификация\n\nВ предыдущем разделе было показано, как можно использовать\
    \ секретный ключ для контроля доступа. Это широко применяемый, но не очень надежный\
    \ подход. И это ничего не говорит вам о конкретном посетителе, только то, что\
    \ он (или разумный ИИ) знает секретный ключ. Многим сайтам требуется обеспечить\
    \ следующее:\n\n+   - определение каким-либо образом отдельных посетителей;\n\
    - идентификацию конкретных посетителей при получении ими доступа к определенным\
    \ конечным точкам (аутентификация);\n- возможность назначения различных прав доступа\
    \ для некоторых посетителей и конечных точек (авторизация);\n- возможность сохранения\
    \ определенной информации о каждом посетителе (интересы, покупки и т. д.).\n\n\
    Если ваши посетители — люди, можете попросить их указать имя пользователя или\
    \ электронную почту и пароль. Если это внешние программы, можно попросить их предоставить\
    \ ключ и секрет API.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_170_0.png)\n\n\
    В дальнейшем я буду применять просто имя пользователя для обозначения либо выбранного\
    \ им имени, либо электронной почты.\n\nЧтобы аутентифицировать реальных, а не\
    \ фиктивных пользователей, вам потребуется сделать немного больше.\n\n+   - Передать\
    \ значения пользователя (имя и пароль) конечным точкам сервера API в виде HTTP-заголовков."
