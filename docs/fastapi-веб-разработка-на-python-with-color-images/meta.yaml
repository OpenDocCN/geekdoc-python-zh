    - 整数值 (`conint`) 或浮点数：\n  - `gt` — 大于；\n  - `lt` — 小于；\n  - `ge` — 大于或等于；\n  -\
    \ `le` — 小于或等于；\n  - `multiple_of` — 是某个值的整数倍。\n- 字符串 (`constr`) 值：\n  - `min_length`\
    \ — 最小字符长度（非字节数）；\n  - `max_length` — 最大字符长度；\n  - `to_upper` — 转换为大写字母；\n  -\
    \ `to_lower` — 转换为小写字母；\n  - `regex` — 匹配 Python 正则表达式。\n- 元组、列表或集合：\n  - `min_items`\
    \ — 最小元素数量；\n  - `max_items` — 最大元素数量。\n\n它们在模型的类型部分中指定。\n\n示例 5.16 允许确保 `name`\
    \ 字段始终包含至少两个字符。否则，`\"\"`（空字符串）将被视为有效。\n\n## 示例 5.16. 查看验证错误\n\n```\n>>> from pydantic\
    \ import BaseModel, constr\n>>>\n>>> class Creature(BaseModel):\n...     name:\
    \ constr(min_length=2)\n...     country: str\n...     area: str\n...     description:\
    \ str\n...     aka: str\n...\n>>> bad_creature = Creature(name=\"!\",\n...   \
    \  description=\"it's a raccoon\",\n...     area=\"your attic\")\nTraceback (most\
