    , \"copyright\", \"credits\" or \"license\" for more information.\n>>>\n```\n\n\
    Первые несколько строк зависят от вашей операционной системы и версии Python.\
    \ Символы >>> означают предложение ввода команд. Удобная дополнительная функция\
    \ интерактивного интерпретатора заключается в том, что он выводит значение переменной,\
    \ если вы введете ее имя:\n\n```\n>>> wrong_answer = 43\n>>> wrong_answer\n43\n\
    ```\n\nЭто работает и для выражений:\n\n```\n>>> wrong_answer = 43\n>>> wrong_answer\
    \ - 3\n40\n```\n\nЕсли вы совсем недавно познакомились с Python или хотите получить\
    \ краткий обзор, прочтите следующие несколько подразделов.\n\n## Непосредственно\
    \ Python\n\nВам понадобится как минимум Python 3.7. У него имеются такие возможности,\
    \ как подсказки типов и модуль asyncio, которые являются основными требованиями\
    \ FastAPI. Я же рекомендую использовать по крайней мере Python 3.9 с более длительным\
    \ сроком поддержки. Стандартный источник для получения Python — Python Software\
    \ Foundation (https://www.python.org).\n\n## Управление пакетами\n\nВам нужно\
    \ будет загрузить сторонние пакеты Python и безопасно установить их на свой компьютер.\
    \ Классическим инструментом для этого служит система pip (https://pip.pypa.io).\n\
    \nНо как загрузить этот загрузчик? Если вы установили Python от Python Software\
    \ Foundation, у вас уже должен быть pip. Если нет, следуйте инструкциям на сайте\
    \ pip, чтобы получить его. На протяжении всей этой книги, когда я буду представлять\
    \ новый пакет Python, стану указывать и команду pip для его загрузки.\n\nВы можете\
    \ многое сделать с помощью старого доброго pip, но, скорее всего, вам захочется\
    \ также использовать виртуальные среды и рассмотреть альтернативные инструменты,\
    \ такие как Poetry.\n\n## Виртуальные среды\n\nPip загрузит и установит пакеты,\
    \ но куда он должен их поместить? Хотя стандартный Python и входящие в него библиотеки\
    \ обычно устанавливаются в стандартное место в вашей операционной системе, вы\
    \ не сможете (и, скорее всего, не должны) ничего там изменить. Pip использует\
    \ каталог по умолчанию, отличный от системного, поэтому установка не попадет на\
    \ стандартные файлы Python в вашей системе. Это можно изменить. Подробности для\
    \ своей операционной системы смотрите на сайте pip.\n\nЧасто приходится работать\
    \ с несколькими версиями Python или устанавливать версии для конкретного проекта,\
    \ поэтому вам точно будет известно, какие пакеты находятся в системе. Для этого\
    \ Python поддерживает *виртуальные среды*. Это просто каталоги (*папки* в не-Unix-мире),\
    \ в которые pip записывает загруженные пакеты. Когда вы *активируете* виртуальную\
    \ среду, ваша оболочка (интерпретатор основных системных команд) при загрузке\
    \ модулей Python в первую очередь обращается к ней. Для этого используется программа\
    \ venv ([https://oreil.ly/9kv5T](https://oreil.ly/9kv5T)), которая входит в стандартный\
    \ пакет установки Python начиная с версии 3.4.\n\nСоздадим виртуальную среду под\
    \ названием venv1. Вы можете запустить модуль venv как отдельную программу:\n\n\
    ```\n$ venv venv1\n```\n\nили в качестве модуля Python:\n\n```\n$ python -m venv\
    \ venv1\n```\n\nЧтобы сделать его своей текущей средой Python, выполните эту команду\
    \ оболочки (в Linux или Mac, для Windows и других ОС смотрите документацию venv):\n\
    \n```\n$ source venv1/bin/activate\n```\n\nТеперь каждый раз, когда вы запускаете\
    \ pip install, пакеты будут устанавливаться в среду venv1. Когда запускаете программы\
    \ Python, именно там находятся ваш интерпретатор Python и модули.\n\nЧтобы отключить\
    \ виртуальную среду, нажмите сочетание клавиш Control+D (для Linux или Mac) или\
    \ введите команду deactivate (для Windows).\n\nМожно создать альтернативные среды\
    \ разработки, например venv2, и деактивировать/активировать их, чтобы переходить\
    \ от одной к другой (хотя я надеюсь, что у вас лучше фантазия в плане названий,\
    \ чем у меня).\n\n## Инструмент Poetry\n\nСочетание pip и venv настолько распространено,\
    \ что люди начали комбинировать их, чтобы сократить этапы работы и избежать source-примудростей\
    \ оболочки. Одним из таких пакетов стал Pipenv (https://pipenv.pypa.io), но более\
    \ новый конкурент под названием Poetry (https://python-poetry.org) становится\
    \ все популярнее.\n\nЯ использовал pip, Pipenv и Poetry, но теперь предпочитаю\
    \ Poetry. Установить его можно с помощью команды `pip install poetry`. В Poetry\
    \ есть множество дополнительных команд, таких как `poetry add` для добавления\
    \ пакета в виртуальную среду, `poetry install`, чтобы загрузить и установить инструмент,\
    \ и т. д. Просмотрите веб-сайт Poetry или запустите команду `poetry`, чтобы открыть\
    \ раздел помощи.\n\nПомимо загрузки отдельных пакетов, pip и Poetry управляют\
    \ несколькими пакетами в файлах конфигурации — `requirements.txt` для pip и `pyproject.toml`\
    \ для Poetry. Poetry и pip не просто загружают пакеты, но и управляют сложными\
    \ зависимостями, которые могут существовать между пакетами. Вы можете задать желаемые\
    \ варианты пакетов в виде минимумов, максимумов, диапазонов или точных значений,\
    \ известных также как *pinning* или *привязка*. Этот вопрос может стать важным\
    \ по мере роста проекта и изменения пакетов, от которых он зависит. Может понадобиться\
    \ минимальная версия пакета, если используемая вами функция появилась в нем впервые,\
    \ или максимальная, если функция была отменена.\n\n## Форматирование исходного\
    \ кода\n\nФорматирование исходного кода менее важно, чем темы предыдущих разделов,\
    \ но все же полезно. Избегайте споров о форматировании кода (*bikeshedding*) с\
    \ помощью инструмента, приводящего исходный текст к стандартному, не странному\
    \ формату. Хороший вариант выбора — пакет Black (https://black.readthedocs.io).\
    \ Установить его можно с помощью команды `pip install black`.\n\n## Тестирование\n\
    \nТестирование подробно рассматривается в главе 12. Хотя стандартным тестовым\
    \ пакетом Python является unittest, промышленный тестовый пакет Python, используемый\
    \ большинством разработчиков Python, — это pytest (https://docs.pytest.org). Установить\
    \ его можно с помощью команды `pip install pytest`.\n\n## Контроль исходного кода\
    \ и непрерывная интеграция\n\nПочти универсальным решением для контроля исходного\
    \ кода сейчас является *Git* с хранилищами (репозиториями) на таких сайтах, как\
    \ GitHub и GitLab. Использование *Git* нельзя считать чем-то специфическим для\
    \ Python или FastAPI, но, скорее всего, вы будете проводить с ним большую часть\
    \ своего времени в процессе разработки. Инструмент *pre-commit* (https://pre-commit.com)\
    \ запускает на вашей локальной машине различные тесты, такие как *black* и *pytest*,\
    \ перед тем как выполнить коммит в *Git*. После размещения в удаленном репозитории\
    \ *Git* можно запустить там больше тестов непрерывной интеграции (Continuous Integration,\
    \ CI).\n\nБолее подробная информация содержится в главе 12 и в разделе «Устранение\
    \ неполадок» главы 13.\n\n## Веб-инструменты\n\nВ главе 3 показано, как установить\
    \ и применять основные веб-инструменты Python, используемые в этой книге:\n\n\
    - *FastAPI* — сам веб-фреймворк;\n- *Uvicorn* — асинхронный веб-сервер;\n- *HTTPie*\
    \ — текстовый веб-клиент, похожий на *curl*;\n- *Requests* — пакет синхронного\
    \ веб-клиента;\n- *HTTPX* — пакет синхронного/асинхронного веб-клиента.\n\n##\
    \ API и сервисы\n\nМодули и пакеты Python необходимы для создания больших приложений,\
    \ которые не превращаются в «большие комки грязи» (https://oreil.ly/zzX5T). Даже\
    \ в однопроцессном веб-сервисе можно сохранить описанное в главе 1 разделение\
    \ с помощью тщательного проектирования модулей и импортов.\n\nВстроенные структуры\
    \ данных Python очень гибкие, и их очень заманчиво использовать повсюду. Но в\
    \ следующих главах вы увидите, что можно определять модели более высокого уровня,\
    \ чтобы сделать межуровневое взаимодействие более чистым. Эти модели опираются\
    \ на относительно недавнее дополнение к Python, называемое *подсказкой типов*\
    \ (type hinting). Давайте разберемся в этом вопросе, но сначала коротко о том,\
    \ как Python работает *с переменными*. Это не помешает."
