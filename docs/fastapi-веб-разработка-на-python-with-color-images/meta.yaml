    # Подсказки типов данных


    Пришло время узнать немного больше о подсказках типов в Python.


    В главе 2 упоминалось, что во многих компьютерных языках переменная указывает
    непосредственно на значение в памяти. Это требует от программиста объявления типа
    значения, чтобы можно было определить его размер и разрядность. В Python переменные
    — это просто имена, связанные с объектами, и именно у объектов есть типы.'
