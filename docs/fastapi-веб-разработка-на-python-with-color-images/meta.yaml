- md: "## Заключение\n\nРядом с вашим домом не рыскали криптиды? Вы можете узнать\
    \ это из данной главы, где различные инструменты для построения графиков, диаграмм\
    \ и картографических схем набросали базу данных существ, вызывающих у нас тревогу.\n\
    \n## Глава 18\n\n## Игры\n\n### Обзор\n\nИгры бывают очень разными, от простых\
    \ текстовых до многопользовательских 3D-сферий. В этой главе я продемонстрирую\
    \ простую игру и то, как конечная точка веб-приложения может взаимодействовать\
    \ с пользователем на нескольких этапах. Этот процесс отличается от привычных вам\
    \ по этой книге одноразовых запросов-ответов конечных точек веб-приложения.\n\n\
    ### Игровые пакеты в Python\n\nЕсли вы действительно хотите освоить Python для\
    \ игр, вот несколько полезных инструментов:\n\n- текст — Adventurelib (https://adventurelib.readthedocs.io);\n\
    - графика:\n    - PyGame (https://www.pygame.org), primer (https://realpython.com/pygame-a-primer);\n\
    \    - pyglet (https://pyglet.org);\n    - Python Arcade (https://api.arcade.academy);\n\
    \    - HARFANG (https://www.harfang3d.com);\n    - Panda3D (https://docs.panda3d.org).\n\
    \nНо в этой главе я не буду использовать ни один из них. Код примеров может стать\
    \ настолько большим и сложным, что отодвинет на второй план цель этой книги —\
    \ максимально упрощенное создание сайтов (API и традиционного контента) с помощью\
    \ FastAPI.\n\n### Разделение игровой логики\n\nСуществует так много способов написать\
    \ игру. Но как определить, кто что делает и кто где хранит данные? У веб-приложения\
    \ нет статистики, и каждый раз, когда клиент обращается к серверу, того поражает\
    \ полная амнезия и он клянется, что никогда не видел этого клиента раньше. Поэтому\
    \ нам нужно где-то хранить *состояние* — данные, сохраняемые на всех этапах игры,\
    \ чтобы связать их воедино.\n\nМы могли бы написать игру полностью на JavaScript\
    \ на стороне клиента и хранить все состояния там. Если вы хорошо знаете JavaScript,\
    \ это хорошее решение, но если не знаете (что вполне возможно, ведь вы читаете\
    \ книгу по языку Python), дадим Python тоже кое-что сделать.\n\nВ то же время\
    \ мы могли бы написать слишком тяжелое для сервера приложение. Допустим, генерировать\
    \ некий отдельный идентификатор для конкретной игры при первом веб-вызове, передавать\
    \ этот идентификатор вместе с другими данными серверу на последующих этапах игры\
    \ и хранить все изменяющиеся состояния в каком-нибудь хранилище данных на стороне\
    \ сервера, например в базе данных.\n\nНаконец, мы могли бы структурировать игру\
    \ как последовательность вызовов клиент-серверной конечной точки веб-приложения\
    \ в так называемом одностраничном приложении (Single-Page Application, SPA). При\
    \ написании SPA обычно JavaScript выполняет Ajax-вызовы на сервер и наполняет\
    \ веб-ответы на обновление отдельных частей страницы, а не всего экрана. Клиентские\
    \ JavaScript и HTML выполняют часть работы, а сервер обрабатывает часть логики\
    \ и данных.\n\n### Гейм-дизайн\n\nВо-первых, что это за игра? Мы создадим простую\
    \ игру, похожую на Wordle (https://oreil.ly/PuD-Y), но в ней будут использоваться\
    \ только названия существ из базы данных `cryptid.db`. Это намного проще, чем\
    \ Wordle, особенно если схитрить и заглянуть в приложение Б. Применим окончательный\
    \ сбалансированный дизайнерский подход, описанный ранее.\n\n1. Задействуем ванильный\
    \ JavaScript в клиенте вместо известных библиотек JavaScript, таких как React,\
    \ Angular или даже jQuery.\n2. Новая конечная точка FastAPI, GET в каталоге /game,\
    \ инициализирует игру. Она получает имя случайного существа из нашей базы криптидов\
    \ и возвращает его, встроенное в качестве скрытого значения в файл шаблона Jinja,\
    \ состоящий из HTML, CSS и JavaScript.\n3. На стороне клиента вновь созданные\
    \ HTML и JavaScript отображают интерфейс типа Wordle. Появится последовательность\
    \ окошек, по одному на каждую букву в названии скрытого существа.\n4. Игрок вводит\
    \ букву в каждое поле, а затем отправляет свою догадку и скрытое истинное имя\
    \ на сервер. Это происходит в Ajax-вызове с помощью функции JavaScript fetch().\n\
    5. Вторая новая конечная точка FastAPI, POST /game, принимает эту догадку и реальное\
