    # Запросы


    HTTP-запрос состоит из текстового заголовка, за которым следует один или несколько
    разделов тела.


    Можете написать собственный код для разбора HTTP в структуры данных Python, но
    вы не будете первым. В веб-приложениях эти детали лучше поручить фреймворку.


    Возможность реализовать внедрение зависимостей FastAPI здесь особенно полезна.
    Данные могут поступать из разных частей HTTP-сообщения, и вы уже видели, как можно
    указать одну или несколько таких зависимостей, чтобы сказать, где находятся данные:


    +   - Header — в HTTP-заголовке;

    - Path — в пути URL;

    - Query — после символа ? в URL;

    - Body — в теле HTTP-сообщения.'
