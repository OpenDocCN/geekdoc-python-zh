- img_proc: true
  md: "# Функция File()\n\nФункция File() применяется в качестве типа для прямой выгрузки\
    \ файла. Ваша функция пути может быть синхронной (def) или асинхронной (async\
    \ def), но асинхронная версия лучше, потому что она не будет нагружать веб-сервер\
    \ во время выгрузки файла.\n\nFastAPI будет извлекать файл по частям и собирать\
    \ его в памяти, поэтому функцию File() следует использовать только для относительно\
    \ небольших файлов. Вместо того чтобы считать, что входные данные представлены\
    \ в формате JSON, FastAPI кодирует файл как элемент формы.\n\nНапишем код для\
    \ запроса файла и протестируем его. Вы можете взять любой файл на своей машине\
    \ для тестирования или загрузить его с такого сайта, как Fastest Fish (https://oreil.ly/EnIH-).\
    \ Я взял оттуда файл размером 1 Кбайт и сохранил его локально под названием 1KB.bin.\
    \ В примере 15.1 добавьте эти строки в файл main.py верхнего уровня.\n\n**Пример\
    \ 15.1.** Обработка выгрузки небольшого файла с помощью FastAPI\n\n```\nfrom fastapi\
    \ import File\n\n@app.post(\"/small\")\nasync def upload_small_file(small_file:\
    \ bytes = File()) -> str:\n    return f\"file size: {len(small_file)}\"\n```\n\
    \nПосле перезапуска Uvicorn попробуйте выполнить HTTPie-тест в примере 15.2.\n\
    \n**Пример 15.2.** Выгрузка небольшого файла с помощью HTTPie\n\n```\n$ http -f\
    \ -b POST http://localhost:8000/small small_file@1KB.bin\n\"file size: 1000\"\n\
    ```\n\nПриведу несколько замечаний по этому тесту.\n\n+   - Необходимо добавить\
    \ аргумент -f или --form, потому что файлы выгружаются как формы, а не как JSON-текст.\n\
    - small_file@1KB.bin:\n    - small_file соответствует имени переменной small_file\
    \ в функции пути FastAPI в примере 15.1;\n    - @ — сокращение HTTPie для создания\
    \ формы;\n    - 1KB.bin — выгружаемый файл."
