    # Наука о данных и искусственный интеллект


    Python стал самым популярным языком в области науки о данных в целом и машинного
    обучения (Machine Learning, ML) в частности. Там необходимо много работать с данными,
    и Python отлично справляется с этой задачей.


    Иногда разработчики используют сторонние инструменты (https://oreil.ly/WFH09),
    такие как pandas, для манипулирования слишком сложными в SQL-представлении данными.


    PyTorch (https://pytorch.org) — один из самых популярных инструментов ML, поскольку
    в работе с данными он использует сильные стороны Python. Для повышения скорости
    базовые вычисления могут выполняться на C или C++, а для высших задач интеграции
    данных хорошо подходят Python или Go. Язык Mojo (https://www.modular.com/mojo)
    — супернабор Python — сможет справиться с задачами и большой, и малой сложности,
    если все получится создать так, как задумано. Хотя это язык общего назначения,
    он специально предназначен для решения некоторых текущих проблем при разработке
    ИИ.'
