    # Разделение игровой логики


    Существует так много способов написать игру. Но как определить, кто что делает
    и кто где хранит данные? У веб-приложения нет статистики, и каждый раз, когда
    клиент обращается к серверу, того поражает полная амнезия и он клянется, что никогда
    не видел этого клиента раньше. Поэтому нам нужно где-то хранить *состояние* —
    данные, сохраняемые на всех этапах игры, чтобы связать их воедино.


    Мы могли бы написать игру полностью на JavaScript на стороне клиента и хранить
    все состояния там. Если вы хорошо знаете JavaScript, это хорошее решение, но если
    не знаете (что вполне возможно, ведь вы читаете книгу по языку Python), дадим
    Python тоже кое-что сделать.


    В то же время мы могли бы написать слишком тяжелое для сервера приложение. Допустим,
    генерировать некий отдельный идентификатор для конкретной игры при первом веб-вызове,
    передавать этот идентификатор вместе с другими данными серверу на последующих
    этапах игры и хранить все изменяющиеся состояния в каком-нибудь хранилище данных
    на стороне сервера, например в базе данных.


    Наконец, мы могли бы структурировать игру как последовательность вызовов клиент-серверной
    конечной точки веб-приложения в так называемом одностраничном приложении (Single-Page
    Application, SPA). При написании SPA обычно JavaScript выполняет Ajax-вызовы на
    сервер и наполняет веб-ответы на обновление отдельных частей страницы, а не всего
    экрана. Клиентские JavaScript и HTML выполняют часть работы, а сервер обрабатывает
    часть логики и данных.


