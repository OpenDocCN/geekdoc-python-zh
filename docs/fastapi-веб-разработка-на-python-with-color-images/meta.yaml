    \ndef depfunc1():\n    pass\n\ndef depfunc2():\n    pass\n\napp = FastAPI(dependencies=[Depends(depfunc1),\
    \ Depends(depfunc2)])\n\n@app.get(\"/main\")\ndef get_main():\n    pass\n```\n\
    \nВ этом случае используется инструкция pass, позволяющая проигнорировать другие\
