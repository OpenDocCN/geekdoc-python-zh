    - один/несколько элементов.\n\nНа уровне маршрутизатора RESTful существительные\
    \ — это *ресурсы*. В этой книге ресурсы изначально будут включать в себя криптидов\
    \ (воображаемых существ) и людей (исследователей криптидов). Позже можно будет\
    \ определить связанные ресурсы, подобные следующим:\n\n- локации;\n- события (например,\
    \ экспедиции, наблюдения).\n\n## Макет\n\nВот текущее расположение файлов и каталогов:\n\
    \n```\nmain.py\nweb\n├── __init__.py\n├── creature.py\n├── explorer.py\nservice\n\
    ├── __init__.py\n├── creature.py\n├── explorer.py\ndata\n├── __init__.py\n├──\
    \ creature.py\n├── explorer.py\nmodel\n├── __init__.py\n├── creature.py\n├── explorer.py\n\
    fake\n├── __init__.py\n├── creature.py\n├── explorer.py\n└── test\n```\n\nВ этой\
    \ главе вы будете работать с файлами, находящимися в каталоге **service**.\n\n\
    ## Защита\n\nОдна из приятных особенностей уровней заключается в том, что вам\
    \ не нужно беспокоиться обо всем. Сервисный уровень заботится только о том, что\
    \ входит на уровень данных и выходит с него. В главе 11 вы увидите, что более\
    \ высокий уровень (здесь — веб-уровень) может справиться со всеми сложностями\
    \ аутентификации и авторизации. Функции создания, изменения и удаления не должны\
    \ быть широко открытыми, и даже для функций get со временем могут потребоваться\
    \ некоторые ограничения.\n\n## Функции\n\nНачнем с файла creature.py. На этом\
    \ этапе потребности файла explorer.py будут почти такими же, и мы можем позаимствовать\
    \ почти весь ранее написанный код. Так заманчиво написать один сервисный файл,\
    \ работающий с обоими типами ресурсов, но почти неизбежно то, что в какой-то момент\
    \ нам понадобится работать с ними по-разному.\n\nКроме того, сейчас сервисный\
    \ файл представляет собой практически сквозной уровень. Это тот случай, когда\
    \ создание небольшой дополнительной структуры на начальном этапе окупится впоследствии.\
    \ Точно так же, как это делалось для файлов web/creature.py и web/explorer.py\
    \ в главе 8, вы определите сервисные модули для обоих ресурсов и подключите их\
    \ к соответствующим модулям фиктивных данных (примеры 9.1 и 9.2).\n\n**Пример\
    \ 9.1. Начальный файл service/creature.py**\n\n```python\nfrom models.creature\
    \ import Creature\nimport fake.creature as data\n\ndef get_all() -> list[Creature]:\n\
    \    return data.get_all()\n\ndef get_one(name: str) -> Creature | None:\n   \
    \ return data.get(id)\n\ndef create(creature: Creature) -> Creature:\n    return\
    \ data.create(creature)\n\ndef replace(id, creature: Creature) -> Creature:\n\
    \    return data.replace(id, creature)\n\ndef modify(id, creature: Creature) ->\
    \ Creature:\n    return data.modify(id, creature)\n\ndef delete(id, creature:\
    \ Creature) -> bool:\n    return data.delete(id)\n```\n\n**Пример 9.2. Начальный\
    \ файл service/explorer.py**\n\n```python\nfrom models.explorer import Explorer\n\
    import fake.explorer as data\n\ndef get_all() -> list[Explorer]:\n    return data.get_all()\n\
    ```"
