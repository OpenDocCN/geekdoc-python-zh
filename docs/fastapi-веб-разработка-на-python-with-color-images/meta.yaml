  md: "Чтобы запустить Uvicorn извне, через командную строку, смотрите пример 3.2.\n\
    \n# Пример 3.2. Запуск Uvicorn с помощью командной строки\n\n```\n$ uvicorn hello:app\
    \ --reload\n```\n\nСлово hello дает ссылку на файл hello.py, а слово app — это\
    \ имя переменной FastAPI в этом файле.\n\nКроме того, вы можете запустить Uvicorn\
    \ внутри самого приложения, как показано в примере 3.3.\n\n# Пример 3.3. Запуск\
    \ Uvicorn внутри приложения\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi\")\ndef greet():\n    return \"Hello? World?\"\n\nif __name__\
    \ == \"__main__\":\n    import uvicorn\n    uvicorn.run(\"hello:app\", reload=True)\n\
    ```\n\nВ любом случае параметр reload указывает Uvicorn перезапустить веб-сервер,\
    \ если содержимое файла hello.py изменится. В этой главе мы будем часто использовать\
    \ автоматическую перезагрузку.\n\nПо умолчанию будет задействоваться порт 8000\
    \ вашей машины под названием localhost. И у внешнего, и у внутреннего методов\
    \ есть аргументы host и port, но, возможно, вы предпочтете что-то другое.\n\n\
    Теперь у сервера есть единственная конечная точка (/hi), и он готов к приему запросов.\
    \ Протестируем его с помощью нескольких веб-клиентов.\n\n+   - В браузере введите\
    \ URL-адрес в строку вверху окна.\n- Для текстового веб-клиента HTTPie введите\
