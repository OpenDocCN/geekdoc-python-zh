    # Тело запроса


    Можно предоставить конечной точке GET путь или параметры запроса, но не значения
    из тела запроса. В HTTP запрос GET должен быть идемпотентным. *Идемпотентность*
    — вычислительный термин, означающий «задай один и тот же вопрос — получи один
    и тот же ответ». HTTP-запрос GET должен только выполнять возврат данных. Тело
    запроса используется для отправки данных на сервер при создании (POST) или обновлении
    (PUT или PATCH). В главе 9 показан способ обойти эту проблему.


    Итак, в примере 3.21 изменим конечную точку с GET на POST. (Технически мы ничего
    не создаем, так что метод POST не является кошерным, но если владыки RESTful подадут
    на нас в суд, то оцените крутое здание суда.)'
