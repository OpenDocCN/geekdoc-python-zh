    \ в документации FastAPI называются *функциями пути*. Я также называл их *конечными\
    \ точками веб-приложения*, и вы видели их синхронные примеры в главе 3. Сделаем\
    \ несколько асинхронных вариантов. Как и в предыдущих примерах, мы будем использовать\
    \ простые типы, такие как числа и строки. В главе 5 представлены *подсказки типов*\
    \ и Pydantic — они понадобятся для работы с более сложными структурами данных.\n\
    \nПример 4.5 возвращает нас к первой программе FastAPI из предыдущей главы и делает\
    \ ее асинхронной.\n\n**Пример 4.5.** Робкая асинхронная конечная точка (greet_async.py)\n\
    \n```\nfrom fastapi import FastAPI\nimport asyncio\n\napp = FastAPI()\n\n@app.get(\"\
    /hi\")\nasync def greet():\n    await asyncio.sleep(1)\n    return \"Hello? World?\"\
    \n```\n\nЧтобы запустить этот фрагмент веб-кода, вам нужен веб-сервер, например\
    \ Uvicorn. Первый способ — запустить Uvicorn в командной строке:\n\n```\n$ uvicorn\
    \ greet_async:app\n```\n\nВторой, как в примере 4.6, заключается в вызове Uvicorn\
    \ изнутри кода примера, когда он запускается как основная программа, а не как\
    \ модуль.\n\n**Пример 4.6.** Еще одна робкая асинхронная конечная точка (greet_async_uvicorn.py)\n\
    \n```\nfrom fastapi import FastAPI\nimport asyncio\nimport uvicorn\n\napp = FastAPI()\n\
    \n@app.get(\"/hi\")\nasync def greet():\n    await asyncio.sleep(1)\n    return\
    \ \"Hello? World?\"\n\nif __name__ == \"__main__\":\n    uvicorn.run(\"greet_async_uvicorn:app\"\
    )\n```\n\nПри запуске в качестве самостоятельной программы Python называет ее\
    \ main. Выражение if __name__... — это указание Python запустить Uvicorn только\
    \ при вызове в качестве основной программы. Да, это некрасиво.\n\nЭтот код делает\
    \ секундную паузу, после чего вернется к своему робкому приветствию. Единственное\
    \ отличие от синхронной функции с применением стандартной функции sleep(1) заключается\
    \ в том, что в асинхронном примере веб-сервер в это время может обрабатывать другие\
    \ запросы.\n\nИспользование asyncio.sleep(1) имитирует реальную функцию, занимающую\
    \ одну секунду, например вызов базы данных или загрузку веб-страницы. В последующих\
    \ главах будут приведены примеры таких вызовов с веб-уровня на сервисный уровень,\
    \ а оттуда на уровень данных, в результате чего время ожидания тратится на реальную\
    \ работу.\n\nFastAPI сам вызывает асинхронную функцию пути greet(), когда получает\
