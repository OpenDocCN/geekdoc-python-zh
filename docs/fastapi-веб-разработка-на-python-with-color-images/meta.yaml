  md: '# Иллюстрация на обложке


    Животное на обложке — шипохвостая игуана (род *Ctenosaura*). Название *Ctenosaura*
    происходит от двух греческих слов: *ctenos*, что означает «гребень» (за гребнеподобные
    шипы на спине и хвосте), и *saura* — «ящерица». Существует 15 признанных видов
    шипохвостых игуан, включая пятикловую, черногрудую, мотагу, оахаку, роатану и
    утилу.


    Длина шипохвостых игуан может варьироваться от 12 до 100 см. Каждый вид окрашен
    в свой цвет, который может меняться в зависимости от температуры тела, настроения,
    состояния здоровья животного и температуры среды обитания. Шипохвостые игуаны
    всеядны и питаются разнообразными фруктами, цветами, листвой и мелкими животными.


    Игуан можно встретить в самых разных местах обитания. Родиной шипохвостых игуан
    являются Мексика и Центральная Америка. Их можно встретить в тропических и субтропических
    сухих лесах, зарослях кустарников, а иногда и в измененных человеком местах обитания
    и городских районах. Некоторые виды, такие как роатан (встречается только на острове
    Роатан в Гондурасском заливе), утила (встречается только на Утиле — архипелаге
    в заливе у карибского побережья Гондураса, в болотах и мангровых экосистемах)
    и мотагуа (встречается только в Гватемале), являются эндемиками очень специфических
    территорий.


    Несколько видов шипохвостых игуан внесены в список исчезающих или находящихся
    под критической угрозой исчезновения. Некоторые из них (западная и черная шипохвостая
    игуаны) известны как инвазивные виды в США. Они сталкиваются с рядом угроз, включая
    утрату среды обитания из-за сельского хозяйства и выпаса скота, незаконную торговлю
    домашними животными и браконьерство, фрагментацию среды обитания, интродуцированных
    хищников и убийство от страха.


    Многие животные, изображаемые на обложках книг издательства O''Reilly, находятся
    под угрозой исчезновения, хотя все они важны для мира. Иллюстрация на обложке
    выполнена Карен Монтгомери на основе старинной гравюры из Музея живой природы.'
