    \n# Язык выражений SQLAlchemy\n\nЯзык выражений SQLAlchemy (SQLAlchemy Expression\
    \ Language) — это *не* ORM, а другой способ выражения запросов к реляционным таблицам.\
    \ Он отображает базовые структуры хранения данных на классы Python, такие как\
