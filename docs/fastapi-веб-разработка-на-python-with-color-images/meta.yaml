- md: "Connection: keep-alive\nHost: localhost:8000\nUser-Agent: HTTPie/3.2.1\n\n\
    Этот запрос содержит:\n\n- глагол-оператор (GET) и путь (/hi);\n- все *параметры\
    \ запроса* (текст после любого символа ?, в данном случае отсутствует);\n- другие\
    \ HTTP-заголовки;\n- содержимое тела запроса (отсутствует).\n\nFastAPI разложит\
    \ их по удобным определениям:\n\n- Header — HTTP-заголовки;\n- Path — URL-адрес;\n\
    - Query — параметры запроса (после символа ? в конце URL);\n- Body — тело HTTP-сообщения.\n\
    \n![](img/eacb50a37d89d355fa68de0c62d56b32_49_0.png)\n\nТо, как FastAPI предоставляет\
    \ данные из различных частей HTTP-запросов, — одна из его лучших особенностей\
    \ и улучшение по сравнению с тем, как это делают большинство веб-фреймворков Python.\
    \ Все необходимые аргументы можно объявить и предоставить непосредственно внутри\
    \ функции пути, используя определения из предыдущего списка (Path, Query и т.\
    \ д.), а также с помощью написанных вами функций. Для этого применяется техника,\
    \ называемая внедрением зависимостей. Ее мы рассмотрим по ходу повествования и\
    \ расширим описание в главе 6.\n\nСделаем предыдущее приложение более личным,\
    \ добавив параметр who, адресующий важный вопрос «Hello?» кому-то. Попробуем разные\
    \ способы передачи этого нового параметра:\n\n- в *пути* URL;\n- в качестве *параметра\
    \ запроса* после символа ? в URL;\n- в *теле* HTTP-сообщения;\n- в HTTP-заголовке.\n\
    \n## Путь URL\n\nОтредактируйте файл hello.py в примере 3.11.\n\n**Пример 3.11.**\
    \ Возврат пути к приветствию\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi/{who}\")\ndef greet(who):\n    return f\"Hello? {who}?\"\n```\n\
    \nКак только вы сохраните изменения в редакторе, Uvicorn должен перезапуститься.\
    \ (В противном случае нам пришлось бы создавать файл hello2.py и так далее и каждый\
    \ раз заново запускать Uvicorn.) Если вы допустили опечатку, продолжайте пытаться\
    \ вводить код, пока не исправите ее, и Uvicorn не доставит вам хлопот.\n\nДобавление\
    \ слова {who} в URL-адрес (после выражения @app.get) приказывает FastAPI извлечь\
    \ переменную под названием who в указанном местоположении в URL. Затем FastAPI\
    \ присваивает ее аргументу who в следующей функции greet(). Это показывает координацию\
    \ между декоратором пути и функцией пути.\n\n> Не следует здесь использовать f-строку\
    \ Python для измененной строки URL (\"/hi/{who}\"). Фигурные скобки применяются\
    \ самим FastAPI для сопоставления частей URL в качестве параметров пути.\n\nВ\
    \ примерах 3.12–3.14 проверьте эту доработанную конечную точку с помощью различных\
    \ методов, рассмотренных ранее.\n\n**Пример 3.12.** Проверка /hi/Mom в браузере\n\
    \n```\nlocalhost:8000/hi/Mom\n```\n\n**Пример 3.13.** Проверка /hi/Mom с помощью\
    \ HTTPie\n\n```\n$ http localhost:8000/hi/Mom\nHTTP/1.1 200 OK\ncontent-length:\
    \ 13\ncontent-type: application/json\ndate: Thu, 30 Jun 2022 08:09:02 GMT\nserver:\
    \ uvicorn\n\n\"Hello? Mom?\"\n```\n\n**Пример 3.14.** Проверка /hi/Mom с помощью\
    \ Requests\n\n```\n>>> import requests\n>>> r = requests.get(\"http://localhost:8000/hi/Mom\"\
    )\n>>> r.json()\n'Hello? Mom?'\n```\n\nВо всех случаях отправляемая как часть\
    \ URL строка \"Mom\" передается в функцию пути greet() как переменная who и возвращается\
    \ как часть ответа. Каждый раз ответом будет строка JSON \"Hello? Mom?\" (с одинарными\
    \ или двойными кавычками в зависимости от того, какой тестовый клиент вы использовали).\n\
    \n## Параметры запроса\n\nПараметры запроса — это строки name=value после символа\
    \ ? в URL-адресе, разделенные символами &. Отредактируйте файл hello.py в примере\
    \ 3.15.\n\n**Пример 3.15.** Возврат параметра запроса приветствия\n\n```\nfrom\
    \ fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi\")\ndef greet(who):\n\
    \    return f\"Hello? {who}?\"\n```\n\nФункция конечной точки снова определяется\
    \ как greet(who), но выражение {who} на этот раз отсутствует в URL-адресе в предыдущей\
    \ строке декоратора, поэтому FastAPI предполагает, что слово who — это параметр\
    \ запроса. Проверьте код в примерах 3.16 и 3.17.\n\n**Пример 3.16.** Проверка\
    \ примера 3.15 с помощью браузера\n\n```\nlocalhost:8000/hi?who=Mom\n```\n\n**Пример\
    \ 3.17.** Проверка примера 3.15 с помощью HTTPie\n\n```\n$ http -b localhost:8000/hi?who=Mom\n\
    \"Hello? Mom?\"\n```\n\nВ примере 3.18 можно вызвать HTTPie с аргументом параметра\
    \ запроса (обратите внимание на оператор ==).\n\n**Пример 3.18.** Проверка примера\
    \ 3.15 с помощью HTTPie и параметров\n\n```\n$ http -b localhost:8000/hi who==Mom\n\
    \"Hello? Mom?\"\n```\n\nУ вас может быть несколько таких аргументов для HTTPie,\
    \ и их удобнее вводить через пробел.\n\nВ примерах 3.19 и 3.20 показаны те же\
    \ альтернативы для веб-клиента Requests.\n\n**Пример 3.19.** Проверка примера\
    \ 3.15 с помощью Requests\n\n```\n>>> import requests\n>>> r = requests.get(\"\
    http://localhost:8000/hi?who=Mom\")\n>>> r.json()\n'Hello? Mom?'\n```\n\n**Пример\
    \ 3.20.** Проверка примера 3.15 с помощью Requests и параметров\n\n```\n>>> import\
    \ requests\n>>> params = {\"who\": \"Mom\"}\n>>> r = requests.get(\"http://localhost:8000/hi\"\
    , params=params)\n>>> r.json()\n'Hello? Mom?'\n```\n\nВо всех случаях вы предоставляете\
    \ строку \"Mom\" новым способом, передаете ее в функцию пути и доводите до конечного\
    \ ответа.\n\n## Тело запроса\n\nМожно предоставить конечной точке GET путь или\
    \ параметры запроса, но не значения из тела запроса. В HTTP запрос GET должен\
    \ быть идемпотентным. *Идемпотентность* — вычислительный термин, означающий «задай\
    \ один и тот же вопрос — получи один и тот же ответ». HTTP-запрос GET должен только\
    \ выполнять возврат данных. Тело запроса используется для отправки данных на сервер\
    \ при создании (POST) или обновлении (PUT или PATCH). В главе 9 показан способ\
    \ обойти эту проблему.\n\nИтак, в примере 3.21 изменим конечную точку с GET на\
    \ POST. (Технически мы ничего не создаем, так что метод POST не является кошерным,\
    \ но если владыки RESTful подадут на нас в суд, то оцените крутое здание суда.)\n\
    \n**Пример 3.21.** Возврат тела приветствия\n\n```\nfrom fastapi import FastAPI,\
    \ Body\n\napp = FastAPI()\n\n@app.post(\"/hi\")\ndef greet(who:str = Body(embed=True)):\n\
    \    return f\"Hello? {who}?\"\n```\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_53_0.png)\n\
    \nВыражение Body(embed=True) требуется для того, чтобы сообщить FastAPI, что на\
    \ этот раз мы получаем значение who из тела запроса в формате JSON. Часть выражения\
    \ embed в скобках означает, что ответ должен выглядеть как {\"who\": \"Mom\"},\
    \ а не просто \"Mom\".\n\nВ примере 3.22 попробуйте протестировать HTTPie, используя\
    \ аргумент -v для отображения сгенерированного тела запроса (обратите внимание\
    \ на единственный параметр = для указания данных тела в формате JSON).\n\n**Пример\
    \ 3.22.** Проверка примера 3.21 с помощью HTTPie\n\n```\n$ http -v localhost:8000/hi\
    \ who=Mom\nPOST /hi HTTP/1.1\nAccept: application/json, */*;q=0.5\nAccept-Encoding:\
    \ gzip, deflate\nConnection: keep-alive\nContent-Length: 14\nContent-Type: application/json\n\
    Host: localhost:8000\nUser-Agent: HTTPie/3.2.1\n{\n    \"who\": \"Mom\"\n}\n\n\
    HTTP/1.1 200 OK\ncontent-length: 13\ncontent-type: application/json\ndate: Thu,\
    \ 30 Jun 2022 08:37:00 GMT\nserver: uvicorn\n\n\"Hello? Mom?\"\n```\n\nИ наконец,\
    \ проверьте пример 3.23 с помощью Requests, использующего свой аргумент json для\
    \ передачи закодированных в формате JSON данных в теле запроса.\n\n**Пример 3.23.**\
    \ Проверка примера 3.21 с помощью Requests\n\n```\n>>> import requests\n>>> r\
    \ = requests.post(\"http://localhost:8000/hi\", json={\"who\": \"Mom\"})\n>>>\
    \ r.json()\n'Hello? Mom?'\n```\n\n## HTTP-заголовок\n\nНаконец, попробуем передать\
    \ аргумент приветствия в качестве HTTP-заголовка в примере 3.24.\n\n**Пример 3.24.**\
    \ Возврат заголовка приветствия\n\n```\nfrom fastapi import FastAPI, Header\n\n\
    app = FastAPI()\n\n@app.post(\"/hi\")\ndef greet(who:str = Header()):\n    return\
    \ f\"Hello? {who}?\"\n```\n\nПроверим это с помощью HTTPie в примере 3.25. Для\
    \ определения HTTP-заголовка используется выражение name:value.\n\n**Пример 3.25.**\
    \ Проверка примера 3.24 с помощью HTTPie\n\n```\n$ http -v localhost:8000/hi who:Mom\n\
    GET /hi HTTP/1.1\nAccept: */*\nAccept-Encoding: gzip, deflate\nConnection: keep-alive\n\
    Host: localhost:8000\nUser-Agent: HTTPie/3.2.1\nwho: Mom\n\nHTTP/1.1 200 OK\n\
    content-length: 13\ncontent-type: application/json\ndate: Mon, 16 Jan 2023 05:14:46\
    \ GMT\nserver: uvicorn\n\n\"Hello? Mom?\"\n```\n\nFastAPI переводит ключи HTTP-заголовков\
    \ в нижний регистр и преобразует дефис (-) в нижнее подчеркивание (_). Поэтому\
    \ вы можете вывести значение заголовка HTTP User-Agent, как показано в примерах\
    \ 3.26 и 3.27."
  mdcn: "Connection: keep-alive\nHost: localhost:8000\nUser-Agent: HTTPie/3.2.1\n\n\
    此请求包含：\n\n- 操作动词（GET）和路径（/hi）；\n- 所有*请求参数*（?符号后的文本，此处不存在）；\n- 其他HTTP头信息；\n- 请求体内容（不存在）。\n\
    \nFastAPI会将其分解为以下便捷定义：\n\n- Header — HTTP头信息；\n- Path — URL地址；\n- Query — 请求参数（URL末尾?符号后的部分）；\n\
    - Body — HTTP消息体。\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_49_0.png)\n\nFastAPI从HTTP请求的不同部分提供数据的方式，是其最优秀的特性之一，也是相较于大多数Python\
    \ Web框架的改进。所有必要的参数都可以直接在路径函数内部声明和提供，使用上文列表中的定义（Path、Query等），以及您编写的函数。为此，采用了一种称为依赖注入的技术。我们将在后续章节中探讨此技术，并在第6章扩展相关描述。\n\
    \n让我们通过添加一个`who`参数来使之前的应用更具个性化，以解决“Hello?”这个重要问题。尝试以下几种传递此新参数的方式：\n\n- 在URL的*路径*中；\n\
    - 作为URL中?符号后的*请求参数*；\n- 在HTTP消息的*正文*中；\n- 在HTTP头信息中。\n\n## URL路径\n\n编辑示例3.11中的`hello.py`文件。\n\
    \n**示例3.11.** 返回问候路径\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n\
    @app.get(\"/hi/{who}\")\ndef greet(who):\n    return f\"Hello? {who}?\"\n```\n\
    \n一旦您在编辑器中保存更改，Uvicorn应该会自动重启。（否则，我们将不得不创建`hello2.py`等文件，并每次重新启动Uvicorn。）如果您输入有误，请继续尝试输入代码，直到修正错误，Uvicorn才会正常工作。\n\
    \n在URL地址中添加`{who}`一词（在`@app.get`表达式之后）会指示FastAPI在URL的指定位置提取名为`who`的变量。然后，FastAPI将其赋值给后续`greet()`函数的`who`参数。这展示了路径装饰器与路径函数之间的协调。\n\
    \n> 此处不应使用Python的f字符串来修改URL字符串（\"/hi/{who}\"）。花括号由FastAPI本身用于将URL部分匹配为路径参数。\n\n\
    在示例3.12至3.14中，使用之前讨论的不同方法测试此改进后的端点。\n\n**示例3.12.** 在浏览器中测试/hi/Mom\n\n```\nlocalhost:8000/hi/Mom\n\
    ```\n\n**示例3.13.** 使用HTTPie测试/hi/Mom\n\n```\n$ http localhost:8000/hi/Mom\nHTTP/1.1\
    \ 200 OK\ncontent-length: 13\ncontent-type: application/json\ndate: Thu, 30 Jun\
    \ 2022 08:09:02 GMT\nserver: uvicorn\n\n\"Hello? Mom?\"\n```\n\n**示例3.14.** 使用Requests测试/hi/Mom\n\
    \n```\n>>> import requests\n>>> r = requests.get(\"http://localhost:8000/hi/Mom\"\
    )\n>>> r.json()\n'Hello? Mom?'\n```\n\n在所有情况下，作为URL一部分发送的字符串\"Mom\"都会作为变量`who`传递给路径函数`greet()`，并作为响应的一部分返回。每次响应都是JSON字符串\"\
    Hello? Mom?\"（根据您使用的测试客户端，可能使用单引号或双引号）。\n\n## 请求参数\n\n请求参数是URL地址中?符号后的`name=value`字符串，用&符号分隔。编辑示例3.15中的`hello.py`文件。\n\
    \n**示例3.15.** 返回问候的请求参数\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi\")\ndef greet(who):\n    return f\"Hello? {who}?\"\n```\n\n端点函数再次被定义为`greet(who)`，但这次URL地址中（在上一行装饰器中）没有`{who}`表达式，因此FastAPI假定`who`一词是一个请求参数。在示例3.16和3.17中测试代码。\n\
    \n**示例3.16.** 使用浏览器测试示例3.15\n\n```\nlocalhost:8000/hi?who=Mom\n```\n\n**示例3.17.**\
    \ 使用HTTPie测试示例3.15\n\n```\n$ http -b localhost:8000/hi?who=Mom\n\"Hello? Mom?\"\
    \n```\n\n在示例3.18中，可以使用请求参数参数调用HTTPie（注意`==`运算符）。\n\n**示例3.18.** 使用HTTPie和参数测试示例3.15\n\
    \n```\n$ http -b localhost:8000/hi who==Mom\n\"Hello? Mom?\"\n```\n\n您可以为HTTPie提供多个此类参数，并且通过空格分隔输入会更方便。\n\
    \n示例3.19和3.20展示了Web客户端Requests的相同替代方案。\n\n**示例3.19.** 使用Requests测试示例3.15\n\n```\n\
    >>> import requests\n>>> r = requests.get(\"http://localhost:8000/hi?who=Mom\"\
    )\n>>> r.json()\n'Hello? Mom?'\n```\n\n**示例3.20.** 使用Requests和参数测试示例3.15\n\n```\n\
    >>> import requests\n>>> params = {\"who\": \"Mom\"}\n>>> r = requests.get(\"\
    http://localhost:8000/hi\", params=params)\n>>> r.json()\n'Hello? Mom?'\n```\n\
    \n在所有情况下，您都以新的方式提供字符串\"Mom\"，将其传递给路径函数，并最终得到响应。\n\n## 请求体\n\n可以为GET端点提供路径或请求参数，但不能提供请求体中的值。在HTTP中，GET请求必须是幂等的。*幂等性*是一个计算术语，意思是“提出相同的问题——得到相同的答案”。HTTP\
    \ GET请求应仅执行数据返回。请求体用于在创建（POST）或更新（PUT或PATCH）时向服务器发送数据。第9章展示了一种绕过此问题的方法。\n\n因此，在示例3.21中，我们将端点从GET更改为POST。（从技术上讲，我们没有创建任何东西，所以POST方法并不完全合规，但如果RESTful的守护者们要起诉我们，那就欣赏一下他们宏伟的法庭大楼吧。）\n\
    \n**示例3.21.** 返回问候的请求体\n\n```\nfrom fastapi import FastAPI, Body\n\napp = FastAPI()\n\
    \n@app.post(\"/hi\")\ndef greet(who:str = Body(embed=True)):\n    return f\"Hello?\
    \ {who}?\"\n```\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_53_0.png)\n\n需要`Body(embed=True)`表达式来告知FastAPI，这次我们从JSON格式的请求体中获取`who`的值。括号中的`embed`部分意味着响应应该看起来像`{\"\
    who\": \"Mom\"}`，而不仅仅是`\"Mom\"`。\n\n在示例3.22中，尝试使用HTTPie进行测试，使用`-v`参数显示生成的请求体（注意用于指定JSON格式数据的单个`=`参数）。\n\
    \n**示例3.22.** 使用HTTPie测试示例3.21\n\n```\n$ http -v localhost:8000/hi who=Mom\nPOST\
    \ /hi HTTP/1.1\nAccept: application/json, */*;q=0.5\nAccept-Encoding: gzip, deflate\n\
    Connection: keep-alive\nContent-Length: 14\nContent-Type: application/json\nHost:\
    \ localhost:8000\nUser-Agent: HTTPie/3.2.1\n{\n    \"who\": \"Mom\"\n}\n\nHTTP/1.1\
    \ 200 OK\ncontent-length: 13\ncontent-type: application/json\ndate: Thu, 30 Jun\
    \ 2022 08:37:00 GMT\nserver: uvicorn\n\n\"Hello? Mom?\"\n```\n\n最后，在示例3.23中使用Requests进行测试，它使用自己的`json`参数在请求体中传递JSON编码的数据。\n\
    \n**示例3.23.** 使用Requests测试示例3.21\n\n```\n>>> import requests\n>>> r = requests.post(\"\
    http://localhost:8000/hi\", json={\"who\": \"Mom\"})\n>>> r.json()\n'Hello? Mom?'\n\
    ```\n\n## HTTP头信息\n\n最后，在示例3.24中，尝试将问候参数作为HTTP头信息传递。\n\n**示例3.24.** 返回问候的头信息\n\
    \n```\nfrom fastapi import FastAPI, Header\n\napp = FastAPI()\n\n@app.post(\"\
    /hi\")\ndef greet(who:str = Header()):\n    return f\"Hello? {who}?\"\n```\n\n\
    在示例3.25中使用HTTPie进行测试。使用`name:value`表达式定义HTTP头信息。\n\n**示例3.25.** 使用HTTPie测试示例3.24\n\
    \n```\n$ http -v localhost:8000/hi who:Mom\nGET /hi HTTP/1.1\nAccept: */*\nAccept-Encoding:\
    \ gzip, deflate\nConnection: keep-alive\nHost: localhost:8000\nUser-Agent: HTTPie/3.2.1\n\
    who: Mom\n\nHTTP/1.1 200 OK\ncontent-length: 13\ncontent-type: application/json\n\
    date: Mon, 16 Jan 2023 05:14:46 GMT\nserver: uvicorn\n\n\"Hello? Mom?\"\n```\n\
    \nFastAPI将HTTP头信息的键转换为小写，并将连字符（-）转换为下划线（_）。因此，您可以输出HTTP User-Agent头信息的值，如示例3.26和3.27所示。"
