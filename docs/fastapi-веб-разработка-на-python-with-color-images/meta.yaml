    ...     print("Timing!")

    ...

    >>> async def main():

    ...     await asyncio.gather(q(), a())

    ...

    >>> asyncio.run(main())

    Why can''t programmers tell jokes?

    Timing!

    ```


    На этот раз ответ должен появиться сразу после вопроса, затем наступит трехсекундная
    тишина — так, как будто это говорит программист. Ха-ха! Гм.


