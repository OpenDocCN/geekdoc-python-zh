    # Форматы данных JSON и API


    Фронтенд-приложения могут обмениваться обычным текстом на основе стандарта ASCII
    с веб-сервисами бэкенда, но как выразить структуры данных, такие как списки элементов?


    Как раз в момент острой нужды появился формат «обозначения объектов JavaScript»
    (JavaScript Object Notation, JSON) — еще одна простая идея, решающая важную проблему
    и кажущаяся очевидной в ретроспективе. Хотя J означает JavaScript, синтаксис очень
    похож на Python.


    JSON в значительной степени заменил такие более ранние попытки реализации этой
    идеи, как XML и SOAP. В оставшейся части этой книги вы увидите, что JSON — это
    формат для ввода и вывода у веб-сервисов по умолчанию.


    # JSON:API


    Сочетание RESTful-дизайна и форматов данных JSON уже стало привычным. Но некоторые
    возможности для двусмысленности и занудства все же остаются. Недавнее предложение
    JSON:API (https://jsonapi.org) направлено на то, чтобы немного ужесточить спецификации.
    В этой книге используется свободный подход RESTful, но JSON:API или что-то подобное
    может оказаться полезным, если у вас возникнут серьезные затруднения.


    # GraphQL


    Для некоторых целей RESTful-интерфейсы могут быть громоздкими. Facebook (сейчас
    Meta¹) разработала язык под названием Graph Query Language (GraphQL) (https://graphql.org).
    Он позволяет определить более гибкие запросы. В этой книге GraphQL не рассматривается,
    но, возможно, стоит обратить на него внимание, если вы считаете, что RESTful-дизайн
    не подходит для вашего приложения.


    # Конкурентность


    Наряду с ростом ориентированности на сервисы стремительное увеличение количества
    подключений к веб-сервисам требует все большей эффективности и масштабирования.
    Нужно снизить следующие показатели:


    ¹ Деятельность запрещена в РФ.'
  - '[PAGE 26]


    +   - *время ожидания* — предварительное время ожидания;

    - *пропускную способность* — количество байтов в секунду между сервисом и его
    абонентами.


    В давние времена, работая во Всемирной паутине¹, люди мечтали о поддержке сотен
    одновременных подключений, затем беспокоились о «проблеме 10 000», а теперь обсуждают
    миллионные значения.


    Термин «конкурентность» не означает полный параллелизм. Множественная обработка
    не происходит в одну и ту же наносекунду в одном процессоре. Конкурентность в
    основном позволяет избежать напряженного ожидания (простояния центрального процессора
    (ЦП) до получения ответа). ЦП работают быстро, а сети и диски — в тысячи и миллионы
    раз медленнее. Поэтому при обращении к сети или диску никто не хочет просто сидеть
    с пустым взглядом, пока не поступит ответ.


    Обычное выполнение Python *синхронизировано* — выполняется одно действие за раз
    в порядке, указанном кодом. Иногда требуется работа в *асинхронном* режиме — выполнить
    немного одного, потом немного другого, вернуться к первому и т. д. Если весь код
    использует центральный процессор для вычислений (*CPU bound*), то у нас нет свободного
    времени на асинхронность. Но если выполняется процесс, указывающий процессору
    ждать завершения операции от внешнего источника (I/O bound), можно организовать
    асинхронность.


    Асинхронные системы обеспечивают *цикл событий*: запросы на медленные операции
    отправляются и отмечаются, но в ожидании их ответов не происходит задержка работы
    ЦП. Вместо этого при каждом проходе через цикл выполняется немедленная обработка,
    а все ответы, поступившие за это время, обрабатываются при следующем проходе.


    Эффект от этих действий может быть драматическим. Далее в книге вы увидите, как
    поддержка асинхронной обработки в FastAPI делает его намного быстрее, чем типичные
    веб-фреймворки. Асинхронная обработка — это не волшебство. Вам все еще нужно проявлять
    осторожность, чтобы не выполнять слишком много работы, требующей больших затрат
    ресурсов ЦП, во время цикла событий, потому что это замедлит весь процесс выполнения.
    Далее в книге вы увидите, как используются ключевые слова `async` и `await` языка
    Python и как FastAPI позволяет сочетать синхронную и асинхронную обработку.


    > ¹ Примерно тогда, когда пещерные люди играли в футбол с гигантскими наземными
    ленивцами.'
- md: '## Уровни (слои)


    Поклонники Шрека, возможно, помнят, как он отметил слои своей личности, на что
    Осел уточнил: «Как луковица?»


    ![](img/eacb50a37d89d355fa68de0c62d56b32_27_0.png)


    Ну, если у людоедов и вызывающих слезотечение овощей есть слои, то и у программного
    обеспечения тоже. Чтобы управлять размером и сложностью, многие приложения уже
    давно используют так называемую *трехуровневую модель*¹. Это не так уж и ново.
    Термины могут быть различными², но в этой книге я подразумеваю следующее простое
    разделение понятий (рис. 1.1):


    - *веб-уровень* — уровень ввода/вывода поверх HTTP. Он собирает клиентские запросы,
    вызывает сервисный уровень и возвращает ответы;

    - *сервис* — бизнес-логика, при необходимости выполняющая обращения к уровню данных;

    - *данные* — доступ к хранилищам данных и другим сервисам;

    - *модель* — определения данных, общие для всех уровней;

    - *веб-клиент* — веб-браузер или другое программное обеспечение на стороне клиента
    HTTP;

    - *база данных* — хранилище данных, часто SQL- или NoSQL-сервер.


    Эти компоненты помогут вам масштабировать сайт, не начиная с нуля. Их нельзя сравнивать
    с законами квантовой механики, поэтому считайте их руководством к изложению материала
    в этой книге.


    > ¹ Выберите свой вариант: уровень/слой, помидор/томат.

    > ² Часто можно встретить термин «модель — представление — контроллер» (Model
    — View — Controller, MVC) и похожие варианты. Обычно это сопровождается религиозными
    войнами, но здесь я агностик.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_28_0.png)


    Уровни взаимодействуют друг с другом через API. Это могут быть простые вызовы
    функций к отдельным модулям Python, но можно обращаться к внешнему коду через
    любой метод. Как я показывал ранее, это могут быть RPC, сообщения и т. д. В этой
    книге я предполагаю наличие одного веб-сервера с кодом Python, импортирующим другие
    модули Python. Разделение и сокрытие информации выполняется модулями.


    Пользователи видят **веб-уровень**, задействуя клиентские приложения и API. Обычно
    мы говорим о RESTful-веб-интерфейсе с URL-адресами, запросами и закодированными
    в формате JSON ответами. Но наряду с веб-слоем могут быть созданы альтернативные
    текстовые клиенты или интерфейс командной строки (Command-Line Interface, CLI).
    Веб-код Python может импортировать модули сервисного уровня, но не должен импортировать
    модули уровня данных.


    *Сервисный уровень* содержит фактические данные о том, что предоставляет этот
    веб-сайт. По сути, этот уровень похож на *библиотеку*. Он импортирует модули уровня
    данных для доступа к базам данных и внешним сервисам, но не должен получать от
    них детальную информацию.


    *Уровень данных* предоставляет уровень сервисов доступ к данным через файлы или
    клиентские вызовы других сервисов. Могут существовать и альтернативные уровни
    данных, взаимодействующие с одним сервисным уровнем.


    Блочная модель (*model box*) — это не настоящий уровень, а источник определений
    данных, общих для всех уровней. Он не требуется, если вы передаете между уровнями
    встроенные структуры данных Python. Позже вы увидите, что включение библиотеки
    Pydantic в FastAPI позволяет определять структуры данных с множеством полезных
    функциональных возможностей.


    Зачем проводить такие разделения? По многим причинам каждый уровень может быть:


    - написан специалистами;

    - изолированно протестирован;

    - заменен или дополнен — вы можете добавить второй веб-уровень, использующий другой
    API, например gRPC, наряду с веб-уровнем.


    Следуйте одному правилу из фильма «Охотники за привидениями» — не скрещивайте
    лучи. То есть не позволяйте частям веб-сайтов просачиваться за пределы веб-уровня,
    а деталям баз данных — за пределы уровня данных.


    Вы можете представить себе уровни в виде вертикальной стопки, как торт в телепередаче
    «Лучший пекарь Британии»¹.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_29_0.png)


    Вот несколько причин для разделения уровней.


    - Если вы не разделите уровни, то ожидайте, что станете широко известным веб-мемом:
    «Теперь у вас две проблемы».

    - Разделить уровни, если они смешаются, будет очень сложно.

    - Вам потребуется знание двух или более специальностей, чтобы понять и написать
    тесты, если логика кода запуталась.


    Кстати, хотя я и называю их *уровнями*, не нужно считать, что один из них находится
    выше или ниже другого и что команды перемещаются с помощью гравитации. Это было
    бы проявлением вертикального шовинизма! Можете рассматривать уровни как блоки,
    стоящие бок о бок друг с другом (рис. 1.2).


    Как бы вы их ни представляли, *единственными* путями связи между блоками/уровнями
    могут служить стрелки (API). Это важно для тестирования и отладки. Если на фабрике
    есть неизвестные двери, ночной сторож неизбежно будет удивлен.


    > ¹ Как известно, если слои вашего торта сложены небрежно, вы можете не вернуться
    в шатер на следующей неделе.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_30_0.png)


    Стрелки между веб-клиентом и веб-уровнем задействуют протокол HTTP или HTTPS для
    передачи текста, преимущественно в формате JSON. Стрелки между уровнями данных
    и баз данных используют особый протокол для баз данных и передают текст в формате
    SQL или в другом. Стрелки между уровнями — это вызовы функций, переносящие модели
    данных.


    Кроме того, рекомендуемые форматы данных, проходящих через стрелки, таковы:


    - клиент ⇔ веб-уровень — RESTful HTTP с помощью JSON;

    - веб-уровень ⇔ сервис — модели;

    - сервис ⇔ данные — модели;

    - данные ⇔ базы данных и сервис — специализированные API.


    Основываясь на собственном опыте, я выбрал именно такую структуру тем для этой
    книги. Она вполне работоспособная и подходит для довольно сложных сайтов, но не
    единственно верная. Вы можете создать лучший дизайн! Как бы вы ни поступили, обратите
    внимание на основные ключевые точки.


    - Отделите свойственные домену детали.

    - Определите стандартные API между уровнями.

    - Не обманывайте, не допускайте утечек.


    Иногда решить, какой уровень лучше всего подходит для кода, бывает непросто. Например,
    в главе 11 рассматриваются требования к аутентификации и авторизации и способы
    их реализации — в качестве дополнительного уровня между веб- и сервисным уровнем
    или внутри одного из них. Разработка программного обеспечения — это порой не только
    искусство, но и наука.


    ## Данные


    Веб-уровень часто использовался как фронтенд для реляционных баз данных, хотя
    в настоящее время появилось множество других способов хранения данных и доступа
    к ним, например базы данных типа NoSQL или NewSQL.


    Помимо баз данных, кардинально меняет технологический ландшафт машинное обучение
    (Machine Learning, ML), или глубокое обучение, или просто искусственный интеллект
    (ИИ). Разработка больших моделей требует значительной работы с данными, традиционно
    называемой извлечением, преобразованием, загрузкой (Extract, Transform, Load,
    ETL).


    Будучи универсальной сервисной архитектурой, веб может помочь в решении многих
    сложных задач, связанных с системами ML.


    ## Заключение


    Во Всемирной паутине используется много API, но особенно много взаимодействий
    на основе RESTful. Асинхронные вызовы обеспечивают лучшую конкурентность, что
    ускоряет общий процесс выполнения. Приложения веб-сервисов часто бывают достаточно
    большими для того, чтобы разделить их на уровни. Данные стали самостоятельной
    важной областью. Все эти понятия рассматриваются в языке программирования Python.
    О нем и пойдет речь в следующей главе.


    ## ГЛАВА 2


    ## Современный Python


    > Это обычный рабочий день для «Удиви-кота».

    > *Монти Пайтон*


    ## Обзор


    Python развивается, чтобы идти в ногу с меняющимся техническим миром. В этой главе
    рассматриваются специфические возможности этого языка, относящиеся к описанным
    в предыдущей главе вопросам, а также некоторые дополнительные:


    - инструменты;

    - API и сервисы;

    - переменные и подсказки типов;

    - структуры данных;

    - веб-фреймворки.


    ## Инструменты


    В каждом языке программирования есть следующие элементы:


    - основной язык и встроенные стандартные пакеты;

    - способы добавления сторонних пакетов;

    - рекомендуемые сторонние пакеты;

    - среда инструментов разработки.'
  mdcn: '## 层级（分层）


    《怪物史莱克》的粉丝或许还记得，史莱克曾这样描述自己性格的层次，而驴子则追问：“像洋葱一样吗？”


    ![](img/eacb50a37d89d355fa68de0c62d56b32_27_0.png)


    好吧，如果食人魔和催泪蔬菜都有层次，那么软件自然也不例外。为了管理规模和复杂性，许多应用程序早已采用所谓的*三层模型*¹。这并非什么新鲜事物。术语可能有所不同²，但在本书中，我指的是以下简单的概念划分（图
    1.1）：


    - *Web 层* —— 基于 HTTP 的输入/输出层。它收集客户端请求，调用服务层并返回响应；

    - *服务层* —— 业务逻辑，必要时执行对数据层的调用；

    - *数据层* —— 访问数据存储和其他服务；

    - *模型层* —— 各层共享的数据定义；

    - *Web 客户端* —— Web 浏览器或其他 HTTP 客户端软件；

    - *数据库* —— 数据存储，通常是 SQL 或 NoSQL 服务器。


    这些组件将帮助您扩展网站，而无需从头开始。它们不能与量子力学定律相提并论，因此请将它们视为本书内容的指导原则。


    > ¹ 请选择您喜欢的术语：层级/层，番茄/西红柿。

    > ² 常见术语有“模型-视图-控制器”（Model — View — Controller, MVC）及其类似变体。这通常伴随着“圣战”，但在此我保持中立。


    ![](img/eacb50a37d89d355fa68de0c62d56b32_28_0.png)


    各层通过 API 相互交互。这可以是调用 Python 各模块的简单函数，也可以通过任何方式调用外部代码。正如我之前所示，可以是 RPC、消息等。在本书中，我假设有一个
    Web 服务器，其中的 Python 代码导入其他 Python 模块。信息的分离和隐藏由模块完成。


    用户通过客户端应用程序和 API 看到 **Web 层**。通常我们讨论的是带有 URL、请求和 JSON 格式响应的 RESTful Web 接口。但除了
    Web 层，还可以创建替代的文本客户端或命令行界面（Command-Line Interface, CLI）。Python Web 代码可以导入服务层模块，但不应导入数据层模块。


    *服务层*包含该网站实际提供的数据。本质上，这一层类似于*库*。它导入数据层模块以访问数据库和外部服务，但不应从它们那里获取详细信息。


    *数据层*通过文件或调用其他服务的客户端，为服务层提供数据访问。也可能存在与同一服务层交互的替代数据层。


    模型层（*model box*）并非真正的层级，而是各层共享的数据定义来源。如果在各层之间传递 Python 内置数据结构，则不需要它。稍后您会看到，在 FastAPI
    中包含 Pydantic 库可以定义具有许多有用功能的数据结构。


    为什么要进行这样的划分？出于多种原因，每一层都可以：


    - 由专业人员编写；

    - 独立测试；

    - 替换或扩展——您可以在现有 Web 层之外，添加使用其他 API（例如 gRPC）的第二个 Web 层。


    请遵循电影《捉鬼敢死队》中的一条规则——不要交叉光束。也就是说，不要让网站的部分内容泄露到 Web 层之外，也不要让数据库的细节泄露到数据层之外。


    您可以将层级想象成垂直堆叠的蛋糕，就像《英国最佳烘焙师》¹节目中的蛋糕一样。


    ![](img/eacb50a37d89d355fa68de0c62d56b32_29_0.png)


    以下是划分层级的一些原因。


    - 如果您不划分层级，那么请准备好成为一个广为流传的网络梗：“现在你有两个问题了。”

    - 如果层级混在一起，之后再想分开将会非常困难。

    - 如果代码逻辑混乱，您将需要两个或更多专业知识才能理解和编写测试。


    顺便说一句，虽然我称它们为*层级*，但不要认为其中一个高于或低于另一个，也不要认为指令是靠重力移动的。这将是垂直沙文主义的表现！您可以将层级视为并排站立的模块（图
    1.2）。


    无论您如何想象，模块/层级之间*唯一*的通信路径是箭头（API）。这对于测试和调试非常重要。如果工厂里有未知的门，夜班警卫难免会感到惊讶。


    > ¹ 众所周知，如果您蛋糕的层次堆叠得不整齐，您可能下周就回不了帐篷了。


    ![](img/eacb50a37d89d355fa68de0c62d56b32_30_0.png)


    Web 客户端和 Web 层之间的箭头使用 HTTP 或 HTTPS 协议传输文本，主要是 JSON 格式。数据层和数据库之间的箭头使用数据库专用协议，以
    SQL 或其他格式传输文本。各层之间的箭头是传输数据模型的函数调用。


    此外，通过箭头传递的数据推荐格式如下：


    - 客户端 ⇔ Web 层 —— 使用 JSON 的 RESTful HTTP；

    - Web 层 ⇔ 服务层 —— 模型；

    - 服务层 ⇔ 数据层 —— 模型；

    - 数据层 ⇔ 数据库和服务 —— 专用 API。


    基于我自己的经验，我为本书选择了这样的主题结构。它相当实用，适用于相当复杂的网站，但并非唯一正确的选择。您可以设计出更好的方案！无论您如何选择，请注意以下关键点。


    - 分离领域特有的细节。

    - 定义各层之间的标准 API。

    - 不要欺骗，不要泄露。


    有时，确定代码最适合放在哪个层级并不容易。例如，第 11 章讨论了身份验证和授权的要求及其实施方式——作为 Web 层和服务层之间的额外层级，或位于其中一个层级内部。软件开发有时不仅是艺术，也是科学。


    ## 数据


    Web 层通常用作关系型数据库的前端，尽管目前出现了许多其他数据存储和访问方式，例如 NoSQL 或 NewSQL 类型的数据库。


    除了数据库，机器学习（Machine Learning, ML）、深度学习或简称为人工智能（AI）也极大地改变了技术格局。开发大型模型需要大量的数据处理工作，传统上称为提取、转换、加载（Extract,
    Transform, Load, ETL）。


    作为一种通用的服务架构，Web 可以帮助解决与 ML 系统相关的许多复杂问题。


    ## 结论


    万维网上使用了许多 API，但基于 RESTful 的交互尤其多。异步调用提供了更好的并发性，从而加快了整体执行过程。Web 服务应用程序通常足够大，可以将其划分为多个层级。数据已成为一个独立的重要领域。所有这些概念都在
    Python 编程语言中讨论。这将是下一章的主题。


    ## 第 2 章


    ## 现代 Python


    > 这是“惊奇猫”的一个普通工作日。

    > *蒙提·派森*


    ## 概述


    Python 不断发展，以适应不断变化的技术世界。本章讨论了与上一章所述问题相关的 Python 特定功能，以及一些额外内容：


    - 工具；

    - API 和服务；

    - 变量和类型提示；

    - 数据结构；

    - Web 框架。


    ## 工具


    每种编程语言都有以下要素：


    - 主要语言和内置标准包；

    - 添加第三方包的方式；

    - 推荐的第三方包；

    - 开发工具环境。'
