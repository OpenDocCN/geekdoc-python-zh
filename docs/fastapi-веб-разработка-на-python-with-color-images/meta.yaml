    \ Эти функции преобразуются в обычные строки SQL, и вы можете обратиться к ним,\
    \ чтобы посмотреть, что произошло. Язык не зависит от типов SQL-серверов. Если\
    \ вам трудно дается SQL, возможно, стоит попробовать этот вариант.\n\nСравним\
    \ несколько примеров. В примере 14.1 показана версия исключительно на языке SQL.\n\
    \n**Пример 14.1.** Прямой код SQL для функции `get_one()` в файле `data/explorer.py`\n\
    \n```\ndef get_one(name: str) -> Explorer:\n    qry = \"select * from explorer\
