    Последний пункт всегда был актуален для традиционных ETL-задач по созданию баз
    данных. Некоммерческая группа PyData (https://pydata.org) даже организует конференции
    и разрабатывает инструменты для анализа данных с открытым исходным кодом на Python.
    Популярность Python отражают также недавний всплеск развития искусственного интеллекта
    и потребность в инструментах для подготовки данных, используемых в моделях ИИ.


    В этой главе мы попробуем применить несколько пакетов данных Python и посмотрим,
    как они связаны с современной веб-разработкой на Python и FastAPI.


    # Текстовый вывод с помощью PSV


    В этом разделе мы будем использовать существ, перечисленных в приложении Б. Данные
    находятся в репозитории GitHub этой книги, в файле cryptid.psv с разделителем
    в виде вертикальной черты и в базе данных SQLite cryptid.db. Файлы, где используется
    разделение запятыми (.csv) и табуляцией (.tsv), широко распространены, но запятые
    используются в самих ячейках данных, а табуляцию иногда трудно отличить от других
    пробельных символов. Символ вертикальной черты (|) отличается от прочих и достаточно
    редко встречается в стандартном тексте, чтобы служить хорошим разделителем.


    Сначала попробуем задействовать текстовый файл с расширением .psv, для простоты
    используя только примеры вывода текста, а затем перейдем к полноценным веб-примерам
    с применением базы данных SQLite.


    В начальной строке заголовка файла .psv содержатся имена полей:


    +   - name;

    - country (символ * означает множество стран);

    - area (не обязательно, штат США или другое территориальное образование страны);

    - description;

    - aka (обозначает «также известен как»).


    В остальных строках файла описывается по одному существу, поля располагаются в
    таком порядке и разделяются символом |.'
