    \ как предоставить информацию о базе данных при запуске? Возможны следующие варианты.\n\
    \n- Жесткое подключение информации о базе данных в коде, как в примере 10.2.\n\
    - Передача информации по уровням. Но это нарушило бы принцип разделения уровней\
