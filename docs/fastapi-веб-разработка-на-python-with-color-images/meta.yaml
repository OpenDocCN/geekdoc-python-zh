    \ являются брокеры Apache Kafka (https://kafka.apache.org), RabbitMQ (https://www.rabbitmq.com),\
    \ NATS (https://nats.io) и ZeroMQ (https://zeromq.org). Взаимодействие может строиться\
    \ по разным схемам:\n    * *запрос — ответ*. Точно так, как браузер вызывает веб-сервер;\n\
    \    * *издатель — подписчик*, или *pub-sub*. Издатель (publisher, или pub) рассылает\
    \ сообщения, а подписчики (subscribers, или sub) обрабатывают каждое из них в\
