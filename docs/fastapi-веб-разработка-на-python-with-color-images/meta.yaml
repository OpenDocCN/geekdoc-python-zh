  - '[PAGE 171]


    Использовать HTTPS вместо HTTP, чтобы никто не смог подсмотреть текст этих заголовков.


    Хешировать пароль в отдельную строку. Результат не является «дехешируемым» — из
    его хеша нельзя извлечь оригинальный пароль.


    Реальная база данных должна хранить таблицу User, содержащую имя пользователя
    и хешированный пароль (ни в коем случае не оригинальный пароль в виде простого
    текста).


    Хешировать только что введенный пароль и сравнить результат с хешированным паролем
    в базе данных.


    Если имя пользователя и хешированный пароль совпадают, передать соответствующий
    объект User вверх по стеку. Если они не совпадают, вернуть значение None или вызвать
    исключение.


    На уровне сервисов запустить все метрики/ведение журналов/что угодно, относящиеся
    к аутентификации отдельных пользователей.


    На веб-уровне отправить информацию об аутентифицированном пользователе всем функциям,
    которым она требуется.


    В следующих разделах я покажу вам, как сделать все эти вещи, применяя такие современные
    инструменты, как OAuth2 и JWT.


    # Более сложная индивидуальная аутентификация


    Если требуется выполнить аутентификацию отдельных пользователей, вам нужно где-то
    хранить информацию о них — например, в базе данных, содержащей записи, хранящие
    как минимум ключ (имя пользователя или ключ API) и секрет (пароль или секрет API).
    Посетители вашего сайта будут указывать их при обращении к защищенным URL-адресам,
    и вам нужны данные в базе данных, чтобы сопоставить их.


    Официальные документы по безопасности FastAPI (вводные (https://oreil.ly/kkTUB)
    и продвинутые (https://oreil.ly/biKwy)) содержат полные описания того, как настроить
    аутентификацию для нескольких пользователей, задействуя локальную базу данных.
    Но пример веб-функции подделывает фактический доступ к базе данных.


    Здесь вы поступите наоборот — начнете с уровня данных и будете работать вверх.
    Укажите, как пользователь/посетитель определяется, хранится и как к нему осуществляется
    доступ. Затем вы перейдете к веб-уровню и узнаете, как передается, оценивается
    и аутентифицируется идентификация пользователя.'
- md: "## OAuth2\n\nOAuth 2.0, что расшифровывается как Open Authorization («открытая\
    \ авторизация»), — это стандарт, позволяющий веб-сайту или приложению получать\
    \ доступ к ресурсам, размещенным другими веб-приложениями, от имени пользователя.\n\
    \n### Auth0\n\nВ ранние времена полного доверия к Интернету вы могли предоставить\
    \ логин и пароль от веб-сайта (назовем его Б) другому сайту (А, конечно же), и\
    \ он получал доступ к материалам, размещенным на Б, для вас. В результате А получит\
    \ полный доступ к Б, хотя ему будет позволено иметь доступ только к тому, что\
    \ ему положено. Примерами Б и ресурсов могут служить подписчики в Twitter, друзья\
    \ в Facebook, контакты по электронной почте и т. д. Конечно, это не могло продолжаться\
    \ долго, поэтому различные компании и группы объединились, чтобы определить стандарт\
    \ OAuth. Изначально он был разработан только для того, чтобы позволить сайту А\
    \ получить доступ к определенным (не всем) ресурсам сайта Б.\n\nOAuth2 (https://oauth.net/2)\
    \ — это популярный, но сложный стандарт авторизации, его применение выходит за\
    \ рамки примера А/Б. Для него существует множество объяснений, от простых (https://oreil.ly/ehmuf)\
    \ до сложных (https://oreil.ly/qAUaM).\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_172_0.png)\n\
    \nРаньше существовал стандарт OAuth1 (https://oauth.net/1), но он больше не используется.\
    \ Некоторые из первоначальных рекомендаций OAuth2 уже устарели (другими словами\
    \ — не применяйте их). На горизонте уже виден стандарт OAuth2.1 (https://oauth.net/2.1)\
    \ и где-то дальше в тумане — txauth (https://oreil.ly/5PW2T).\n\nOAuth предлагает\
    \ различные потоки (flows) (https://oreil.ly/kRiWh) для разных обстоятельств.\
    \ Здесь я буду использовать Authorization Code Flow (поток кода авторизации).\
    \ В этом разделе мы рассмотрим реализацию, по одному среднему этапу за раз.\n\n\
    Сначала вам нужно установить сторонние пакеты Python:\n\n- JWT handling — pip\
    \ install python-jose[cryptography];\n- Secure password handling — pip install\
    \ passlib;\n- Form handling — pip install python-multipart.\n\nСледующие разделы\
    \ начинаются с модели пользовательских данных и управления базой данных, а затем\
    \ по знакомым уровням поднимаются к сервисному и веб-уровню, где появляется OAuth.\n\
    \n## Модель пользователя\n\nНачнем с самых минимальных определений пользовательской\
    \ модели в примере 11.7. Они будут применяться во всех слоях.\n\n```\nПример 11.7.\
    \ Определение пользователя: model/user.py\nfrom pydantic import BaseModel\n\n\
    class User(BaseModel):\n    name: str\n    hash: str\n```\n\nОбъект User содержит\
    \ произвольное поле name и строку hash — хешированный пароль, а не оригинальный\
    \ в виде простого текста, и именно он сохраняется в базе данных. Для аутентификации\
    \ посетителя нам понадобятся оба варианта.\n\n## Уровень пользовательских данных\n\
    \nПример 11.8 содержит код базы данных пользователя.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_173_0.png)\n\
    \nКод содержит таблицы user (активные пользователи) и xuser (удаленные пользователи).\
    \ Часто разработчики добавляют булево поле deleted в таблицу пользователей, чтобы\
    \ указать, что пользователь больше не активен, не удаляя запись из таблицы. Я\
    \ предпочитаю перемещать данные удаленного пользователя в другую таблицу. Это\
    \ позволяет избежать повторной проверки поля deleted во всех пользовательских\
    \ запросах. Также это может помочь ускорить запросы — создание индекса для поля\
    \ с низкой мощностью, например булева, не принесет пользы.\n\n```\nПример 11.8.\
    \ Уровень данных: data/user.py\nfrom model.user import User\nfrom .init import\
    \ (conn, curs, get_db, IntegrityError)\nfrom error import Missing, Duplicate\n\
    \ncurs.execute(\"\"\"create table if not exists\n              user(\n       \
    \           name text primary key,\n                  hash text)\"\"\")\n\ncurs.execute(\"\
    \"\"create table if not exists\n    xuser(\n        name text primary key,\n \
    \       hash text)\"\"\")\n\ndef row_to_model(row: tuple) -> User:\n    name,\
    \ hash = row\n    return User(name=name, hash=hash)\n\ndef model_to_dict(user:\
    \ User) -> dict:\n    return user.dict()\n\ndef get_one(name: str) -> User:\n\
    \    qry = \"select * from user where name=:name\"\n    params = {\"name\": name}\n\
    \    curs.execute(qry, params)\n    row = curs.fetchone()\n    if row:\n     \
    \   return row_to_model(row)\n    else:\n        raise Missing(msg=f\"User {name}\
    \ not found\")\n\ndef get_all() -> list[User]:\n    qry = \"select * from user\"\
    \n    curs.execute(qry)\n    return [row_to_model(row) for row in curs.fetchall()]\n\
    \ndef create(user: User, table:str = \"user\"):\n    \"\"\"Добавление <пользователя>\
    \ в таблицу user или xuser\"\"\"\n    qry = f\"\"\"insert into {table}\n     \
    \   (name, hash)\n        values\n        (:name, :hash)\"\"\"\n    params = model_to_dict(user)\n\
    \    try:\n        curs.execute(qry, params)\n    except IntegrityError:\n   \
    \     raise Duplicate(msg=\n            f\"{table}: user {user.name} already exists\"\
    )\n\ndef modify(name: str, user: User) -> User:\n    qry = \"\"\"update user set\n\
    \            name=:name, hash=:hash\n            where name=:name0\"\"\"\n   \
    \ params = {\n        \"name\": user.name,\n        \"hash\": user.hash,\n   \
    \     \"name0\": name}\n    curs.execute(qry, params)\n    if curs.rowcount ==\
    \ 1:\n        return get_one(user.name)\n    else:\n        raise Missing(msg=f\"\
    User {name} not found\")\n\ndef delete(name: str) -> None:\n    \"\"\"Отбрасывание\
    \ пользователя с именем <name> из таблицы пользователей,\n    добавление его в\
    \ таблицу xuser\"\"\"\n    user = get_one(name)\n    qry = \"delete from user\
    \ where name = :name\"\n    params = {\"name\": name}\n    curs.execute(qry, params)\n\
    \    if curs.rowcount != 1:\n        raise Missing(msg=f\"User {name} not found\"\
    )\n    create(user, table=\"xuser\")\n```\n\n## Уровень фиктивных данных пользователя\n\
    \nМодуль из примера 11.9 применяется в тестах, исключающих базу данных, но нуждается\
    \ в пользовательских данных.\n\n**Пример 11.9.** Уровень фиктивных данных: fake/user.py\n\
    \n```\nfrom model.user import User\nfrom error import Missing, Duplicate\n\n#\
    \ (в этом модуле нет проверки хешированного пароля)\nfakes = [\n    User(name=\"\
    kwijobo\",\n         hash=\"abc\"),\n    User(name=\"ermagerd\",\n         hash=\"\
    xyz\"),\n    ]\n\ndef find(name: str) -> User | None:\n    for e in fakes:\n \
    \       if e.name == name:\n            return e\n    return None\n\ndef check_missing(name:\
    \ str):\n    if not find(name):\n        raise Missing(msg=f\"Missing user {name}\"\
    )\n\ndef check_duplicate(name: str):\n    if find(name):\n        raise Duplicate(msg=f\"\
    Duplicate user {name}\")\n\ndef get_all() -> list[User]:\n    \"\"\"Возврат всех\
    \ пользователей\"\"\"\n    return fakes\n\ndef get_one(name: str) -> User:\n \
    \   \"\"\"Возврат одного пользователя\"\"\"\n    check_missing(name)\n    return\
    \ find(name)\n\ndef create(user: User) -> User:\n    \"\"\"Добавление пользователя\"\
    \"\"\n    check_duplicate(user.name)\n    return user\n\ndef modify(name: str,\
    \ user: User) -> User:\n    \"\"\"Частичное изменение пользователя\"\"\"\n   \
    \ check_missing(name)\n    return user\n\ndef delete(name: str) -> None:\n   \
    \ \"\"\"Удаление пользователя\"\"\"\n    check_missing(name)\n    return None\n\
    ```\n\n## Сервисный уровень пользователя\n\nПример 11.10 определяет сервисный\
    \ уровень для пользователей. Отличим от других модулей сервисного уровня является\
    \ добавление функций OAuth2 и JWT. Я думаю, что лучше оставить их здесь, чем в\
    \ веб-слое, хотя несколько функций веб-слоя OAuth2 уже есть в готовящемся проекте\
    \ web/user.py.\n\nФункции CRUD пока что остаются проходными, но в будущем их можно\
    \ будет разнообразить метриками по своему вкусу. Обратите внимание на то, что,\
    \ как и сервисы существ и исследователей, эта конструкция поддерживает применение\
    \ во время выполнения либо фиктивных, либо настоящих уровней данных для доступа\
    \ к пользовательским данным.\n\n**Пример 11.10.** Сервисный уровень: service/user.py\n\
    \n```\nfrom datetime import timedelta, datetime\nimport os\nfrom jose import jwt\n\
    from model.user import User\n\nif os.getenv(\"CRYPTID_UNIT_TEST\"):\n    from\
    \ fake import user as data\nelse:\n    from data import user as data\n\n# ---\
    \ Новые данные auth\n\nfrom passlib.context import CryptContext\n\n# Измените\
