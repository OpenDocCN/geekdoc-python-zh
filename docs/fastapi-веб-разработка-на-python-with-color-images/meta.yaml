    \ По мере усложнения сайта разрешения могут становиться все более детализированными.\n\
    \nРассмотрим несколько вариантов авторизации. Берем таблицу `User`, в которой\
    \ поле `name` может быть электронной почтой, именем пользователя или ключом API.\
    \ Парные таблицы — это способ реляционной базы данных сопоставить записи из двух\
    \ отдельных таблиц:\n\n+   - Если вы хотите отслеживать только посетителей-администраторов,\
