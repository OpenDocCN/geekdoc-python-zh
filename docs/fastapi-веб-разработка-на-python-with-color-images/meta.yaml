    \ 表中的哈希密码。\n- 如果*所有*访客都需要进行身份验证，但您只需要为某些端点授权管理员，那么请像前面的示例一样（从 `User` 表）对所有用户进行身份验证，然后检查\
    \ `Admin` 表以确定该用户是否也是管理员。\n- 对于多种权限类型（例如，只读、读写）：\n    - 使用权限级别定义表 `Permission`；\n\
