  md: '# Нереляционные (NoSQL) базы данных


    Крупные игроки в мире NoSQL или NewSQL с открытым исходным кодом перечислены в
    табл. 14.2.


    Таблица 14.2. Базы данных NoSQL и драйверы Python


    | База данных | Драйвер Python |

    |---|---|

    | Redis (https://redis.io) | redis-py (https://github.com/redis/redis-py) |

    | MongoDB (https://www.mongodb.com) | PyMongo (https://pymongo.readthedocs.io),
    Motor (https://oreil.ly/Cmgtl) |

    | Apache Cassandra (https://cassandra.apache.org) | DataStax Driver for Apache
    Cassandra (https://github.com/datastax/python-driver) |

    | Elasticsearch (https://www.elastic.co/elasticsearch) | Python Elasticsearch
    Client (https://oreil.ly/e_bDl) |


    Иногда NoSQL означает буквально «отсутствие SQL», а иногда «не только SQL». Реляционные
    базы данных накладывают структуру на данные. Часто она визуализируется в виде
    прямоугольных таблиц с полями — столбцами и строками данных, подобно электронным
    таблицам. Чтобы уменьшить избыточность и повысить производительность, реляционные
    базы данных нормализуются с помощью нормальных форм (правил для данных и структур),
    например допускают только одно значение в ячейке (на пересечении строки и столбца).


    Базы данных NoSQL делают эти правила менее строгими, иногда позволяя варьировать
    типы столбцов/полей в отдельных строках данных. Часто схемы (дизайн баз данных)
    могут представлять собой не реляционные ячейки, а разрозненные структуры, которые
    можно выразить на JSON или Python.


    # Redis


    Redis — это сервер структур данных, работающий исключительно в оперативной памяти,
    хотя он может сохранять данные на диск и восстанавливать их с диска. Он полностью
    соответствует собственным структурам данных Python и стал очень популярным.'
