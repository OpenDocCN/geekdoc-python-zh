  md: "# Пример 6.4. Определение зависимости субмаршрута\n\n```\nfrom fastapi import\
    \ FastAPI, Depends, APIRouter\n\nrouter = APIRouter(..., dependencies=[Depends(depfunc)])\n\
    ```\n\nЭто приведет к вызову функции depfunc() для всех функций пути ниже объекта\
