  md: '# ГЛАВА 16


    # Формы и шаблоны


    # Обзор


    Хотя акроним *API* в названии *FastAPI* — это намек на его основную направленность,
    FastAPI может работать и с традиционным веб-контентом. В этой главе рассказывается
    о стандартных HTML-формах и шаблонах для вставки данных в HTML.


    # Формы


    Как вы уже поняли, FastAPI был разработан в основном для создания API, и его входной
    информацией по умолчанию будут данные в формате JSON. Но это не значит, что он
    не может служить стандартным базовым HTML-формам и их друзьям.


    FastAPI поддерживает данные из HTML-форм так же, как и из других источников, таких
    как Query и Path, используя зависимость Form.


    Для работы с формами FastAPI вам потребуется пакет Python-Multipart, поэтому при
    необходимости выполните команду `pip install python-multipart`. Кроме того, каталог
    `static` из главы 15 понадобится для размещения тестовых форм из нее.


    Повторим пример 3.11, но предоставим значение who через форму, а не в виде JSON-строки.
    (Вызовите функцию пути greet2(), чтобы избежать нарушения работы старой функции
    пути greet(), если она все еще существует.) Добавьте пример 16.1 в файл main.py.'
