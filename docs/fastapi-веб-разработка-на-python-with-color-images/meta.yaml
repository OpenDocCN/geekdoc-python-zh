    - статья *How to Deploy a FastAPI App on Heroku for Free* Шпиничи Окады ([https://oreil.ly/A6gij](https://oreil.ly/A6gij)).


    # Kubernetes


    Платформа Kubernetes выросла из внутреннего кода Google для управления внутренними
    системами, которые становились просто ужасающе сложными. Системные администраторы
    (так их тогда называли) вручную настраивали такие инструменты, как балансировщики
    нагрузки, обратные прокси, хьюморы¹ и т. д. Kubernetes стремился взять большую
    часть этих знаний и автоматизировать их — не говорите мне, *как* это сделать,
    а скажите, *чего* вы хотите. Сюда входят такие задачи, как поддержание работоспособности
    сервиса или запуск дополнительных серверов при резком увеличении трафика.


    Существует множество описаний того, как развернуть FastAPI на Kubernetes, в том
    числе статья Суманты Мукхопадхья *Deploying a FastAPI Application on Kubernetes*
    ([https://oreil.ly/ktTNu](https://oreil.ly/ktTNu)).


    ¹ Погодите, они же сохраняют сигары свежими.'
  - '[PAGE 213]


    # Производительность


    В настоящее время производительность FastAPI одна из самых высоких (https://oreil.ly/mxabf)
    среди всех веб-фреймворков на Python и даже сравнимы с производительностью фреймворков
    на более быстрых языках, таких как Go. Но во многом это связано с ASGI, позволяющим
    избежать ожидания ввода-вывода с помощью асинхронности. Сам по себе Python — довольно
    медленный язык. Далее приведены некоторые советы и рекомендации по улучшению общей
    производительности.


    # Асинхронность


    Часто веб-серверу не нужно быть очень быстрым. Большую часть своего времени он
    тратит на получение сетевых HTTP-запросов и возврат результатов (в этой книге
    он представлен веб-уровнем). Между ними веб-сервис выполняет бизнес-логику (сервисный
    уровень), получает доступ к источникам данных (уровень данных) и снова тратит
    большую часть своего времени на сетевой ввод-вывод.


    Когда код в веб-сервисе должен ждать ответа, лучше всего использовать асинхронную
    функцию (async def, а не def). Это позволяет FastAPI и Starlette планировать работу
    асинхронной функции и выполнять другие действия в ожидании ее ответа. Это одна
    из причин того, почему бенчмарки FastAPI лучше, чем фреймворки на базе WSGI, такие
    как Flask и Django. У производительности есть два аспекта:


    +   - время обработки одного запроса;

    - количество одновременно обрабатываемых запросов.


    # Кэши


    Если у вас есть конечная точка веб-приложения, получающая данные из статического
    источника (например, записи в базе данных, которые меняются редко или не меняются
    никогда), можно кэшировать данные в функции. Это может быть на любом уровне. В
    Python представлен стандартный модуль functools (https://oreil.ly/8Kg4V), а также
    функции cache() и lru_cache().'
  - '[PAGE 214]


    # Базы данных, файлы и память


    Одна из самых распространенных причин медленной работы веб-сайта — отсутствие
    индекса для таблицы базы данных достаточного размера. Часто вы не замечаете проблемы
    до тех пор, пока ваша таблица не вырастет до определенного размера, и тогда запросы
    внезапно становятся намного медленнее. В SQL любой столбец в операторе WHERE должен
    быть проиндексирован.


    Во многих примерах, приведенных в книге, первичный ключ таблиц creature и explorer
    был представлен текстовым полем name. При создании таблиц поле name было объявлено
    в качестве первичного ключа — primary key. Для крошечных таблиц, приведенных ранее,
    SQLite в любом случае проигнорирует этот ключ, поскольку быстрее будет просто
    просканировать таблицу. Но как только она достигает приличного размера — скажем,
    миллиона строк, отсутствие индекса становится заметным. Решением может стать запуск
    оптимизатора запросов (https://oreil.ly/YPR3Q).


    Даже если у вас небольшая таблица, можете провести нагрузочное тестирование базы
    данных с помощью скриптов Python или инструментов с открытым исходным кодом. Если
    выполняется множество последовательных запросов к базе данных, возможно, их стоит
    объединить в один пакет. Если вы выгружаете или скачиваете большой файл, используйте
    потоковые версии, а не гигантский фрагмент данных.


    # Очереди


    Если вы выполняете какую-либо задачу, занимающую больше доли секунды, например
    отправку письма с подтверждением или уменьшение изображения, возможно, стоит передать
    ее в очередь задач, например в Celery (https://docs.celeryq.dev).


    # Непосредственно Python


    Если веб-сервис кажется медленным, потому что выполняет значительные вычисления
    с помощью Python, вам может понадобиться «более быстрый Python». Альтернативные
    варианты:


    +   - использовать PyPy (https://www.pypy.org) вместо стандартной реализации CPython;'
  - '[PAGE 215]


    написать расширение ([https://oreil.ly/BEIJa](https://oreil.ly/BEIJa)) для Python
    на C, C++ или Rust;


    преобразовать медленный код Python в язык Cython ([https://cython.org](https://cython.org)),
    используемый Pydantic и Uvicorn.


    Недавно был сделан очень интригующий анонс языка Mojo ([https://oreil.ly/C96kx](https://oreil.ly/C96kx)).
    Он стремится стать полным супернабором Python с новыми возможностями (применяя
    тот же дружественный синтаксис Python), способными ускорить примеры на Python
    в тысячи раз. Основной автор Крис Латтнер ранее работал над такими инструментами
    компиляции, как LLVM ([https://llvm.org](https://llvm.org)), Clang ([https://clang.llvm.org](https://clang.llvm.org))
    и MLIR ([https://mlir.llvm.org](https://mlir.llvm.org)), а также языком Swift
    ([https://www.swift.org](https://www.swift.org)) для Apple.


    Mojo стремится стать одноязычным решением для разработки ИИ, для чего сейчас (в
    PyTorch и TensorFlow) требуются сборки Python/C/C++, сложные в разработке, управлении
    и отладке. Но Mojo был бы хорошим языком общего назначения не только в сфере ИИ.


    Я много лет писал на C и все ждал преемника, обладающего производительностью и
    простотой применения языка Python. Возможными вариантами были D, Go, Julia, Zig
    и Rust, но если Mojo сможет оправдать свои цели ([https://oreil.ly/EojvA](https://oreil.ly/EojvA)),
    я бы активно его использовал.


    # Устранение неполадок


    Смотрите снизу вверх с того момента и места, где вы столкнулись с проблемой. К
    ним относятся проблемы производительности во времени и пространстве, а также логические
    и асинхронные ловушки.


    # Виды проблем


    Какой код ответа НТТР вы получили в первую очередь?


    +   - 404 — ошибка аутентификации или авторизации.

    - 422 — обычно это жалоба Pydantic на использование модели.

    - 500 — отказ сервиса, расположенного за вашим FastAPI.'
  - '[PAGE 216]


    # Ведение журналов


    Uvicorn и другие веб-серверы обычно пишут журналы в файл stdout. Вы можете проверить
    журнал, чтобы узнать, какой вызов был сделан на самом деле, включая HTTP-глагол
    и URL-адрес, но не данные в теле, заголовках или файлах cookies.


    Если определенная конечная точка возвращает код состояния семейства 400, можно
    попробовать подать те же данные еще раз и посмотреть, не повторится ли ошибка.
    Если да, то у меня срабатывает первый пещерный инстинкт отладчика — добавить операторы
    print() в соответствующие функции веб, сервисного и уровня данных.


    Кроме того, везде, где вы инициируете выброс исключения, добавляйте подробное
    описание. Если поиск в базе данных не удался, укажите входные значения и конкретную
    ошибку, например попытку дублировать уникальное ключевое поле.


    # Метрики


    Может показаться, что значения терминов «метрика», «мониторинг», «наблюдаемость»
    и «телеметрия» частично совпадают. В стране Python принято использовать:


    +   - Prometheus (https://prometheus.io) — для получения метрик;

    - Grafana (https://grafana.com) — для их отображения;

    - OpenTelemetry (https://opentelemetry.io) — для измерения времени.


    Вы можете применить их ко всем уровням своего сайта: веб-уровню, сервисному и
    уровню данных. Сервисные уровни могут быть более бизнес-ориентированными, а другие
    — более техническими, полезными при разработке и сопровождении сайтов.


    Вот несколько ссылок для сбора метрик FastAPI:


    +   - Prometheus FastAPI Instrumentator (https://oreil.ly/EYJwR);

    - Getting Started: Monitoring a FastAPI App with Grafana and Prometheus — A Step-by-Step
    Guide, автор Зу Кодес (https://oreil.ly/Gs90t);

    - страница FastAPI Observability на сайте Grafana Labs (https://oreil.ly/spKwe);'
- md: "## Заключение\n\nПонятно, что производство — дело непростое. Среди проблем\
    \ — сама веб-техника, перегрузка сети и дисков, а также проблемы с базой данных.\
    \ В этой главе вы найдете подсказки о том, как получить нужную информацию и где\
    \ начать искать, если возникли проблемы.\n\n## ЧАСТЬ IV\n\n## Галерея\n\nВ части\
    \ III вы создали минимальный веб-сайт с помощью базового кода. А теперь давайте\
    \ сделаем с ним что-нибудь интересное. В следующих главах FastAPI применяется\
    \ для обычных веб-приложений: форм, файлов, баз данных, диаграмм, графиков, карт\
    \ и игр.\n\nЧтобы связать эти приложения и сделать их более интересными, чем обычные\
    \ сухие примеры из книг по информатике, возьмем из необычных источников данные,\
    \ часть которых вы уже видели: вымышленных существ из мирового фольклора и исследователей,\
    \ которые их преследуют. Здесь будут не только йети, но и менее известные, хотя\
    \ и не менее яркие представители этого мира.\n\n## ГЛАВА 14\n\n## Базы данных,\
    \ наука о данных и немного искусственного интеллекта\n\n### Обзор\n\nВ этой главе\
    \ рассказывается о том, как использовать FastAPI для хранения и получения данных.\
    \ Здесь расширяются простые примеры SQLite, приведенные в главе 10:\n\n- другие\
    \ базы данных с открытым исходным кодом (реляционные и нереляционные);\n- использование\
    \ SQLAlchemy на более высоком уровне;\n- улучшенная проверка ошибок.\n\n### Альтернативные\
    \ варианты хранения данных\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_219_0.png)\n\
    \nТермин «база данных», к сожалению, используется для обозначения трех вещей:\n\
    \n- типа сервера, например PostgreSQL, SQLite или MySQL;\n- работающего экземпляра\
    \ этого сервера;\n- коллекции таблиц на этом сервере.\n\nЧтобы избежать путаницы,\
    \ называя экземпляр последнего из перечисленных пунктов базой данных PostgreSQL,\
    \ я буду использовать другие термины, чтобы указать, какой из них имею в виду.\n\
    \nОбычный бэкенд для веб-сайта — это база данных. Веб-сайты и базы данных — это\
    \ как арахисовое масло и желе, и хотя вы можете хранить свои данные и другими\
    \ способами (или сочетать арахисовое масло с огурцами), в этой книге мы будем\
    \ использовать базы данных.\n\nБазы данных решают многие проблемы, которые в противном\
    \ случае вам пришлось бы решать самостоятельно с помощью кода, например такие:\n\
    \n- множественный доступ;\n- индексирование;\n- согласованность данных.\n\nВ целом\
    \ выбор баз данных выглядит следующим образом:\n\n- реляционные базы данных с\
    \ языком запросов SQL;\n- нереляционные базы данных с различными языками запросов.\n\
    \n### Реляционные базы данных и SQL\n\nВ Python есть стандартное определение реляционного\
    \ API под названием DB-API (https://oreil.ly/StbE4). Оно поддерживается пакетами\
    \ драйверов Python для всех основных баз данных. В табл. 14.1 перечислены некоторые\
    \ известные реляционные базы данных и их основные пакеты драйверов для Python.\n\
    \n**Таблица 14.1.** Реляционные базы данных и драйверы Python\n\n| База данных\
    \ | Драйвер Python |\n|---|---|\n| *С открытым исходным кодом* | |\n| SQLite (https://www.sqlite.org)\
    \ | sqlite3 (https://oreil.ly/TNNaA) |\n| PostgreSQL (https://www.postgresql.org)\
    \ | psycopg2 (https://oreil.ly/nLn5x) и asyncpg (https://oreil.ly/90pvK) |\n|\
    \ MySQL (https://www.mysql.com) | MySQLdb (https://oreil.ly/yn1fn) и PyMySQL (https://oreil.ly/Cmup-)\
    \ |\n| *Коммерческие* | |\n| Oracle (https://www.oracle.com) | python-oracledb\
    \ (https://oreil.ly/gynvX) |\n| SQL Server (https://www.microsoft.com/en-us/sql-server)\
    \ | pyodbc (https://oreil.ly/_UEYq) и pymssql (https://oreil.ly/FkKUn) |\n| IBM\
    \ Db2 (https://www.ibm.com/products/db2) | ibm_db (https://oreil.ly/3uwpD) |\n\
    \nОсновные пакеты Python для работы с реляционными базами данных и SQL:\n\n- *SQLAlchemy*\
    \ (https://www.sqlalchemy.org) — полнофункциональная библиотека, которую можно\
    \ использовать на разных уровнях;\n- *SQLModel* (https://sqlmodel.tiangolo.com)\
    \ — комбинация SQLAlchemy и Pydantic от автора FastAPI;\n- *Records* (https://github.com/kennethreitz/records)\
    \ — от автора пакета Requests — простой API для запросов.\n\n### SQLAlchemy\n\n\
    Самым популярным SQL-пакетом для Python стал SQLAlchemy. Хотя во многих объяснениях\
    \ SQLAlchemy обсуждаются только возможности ORM этой библиотеки, она содержит\
    \ несколько слоев, и я буду рассматривать их снизу вверх.\n\n### Core\n\nОснова\
    \ SQLAlchemy, называемая *Core*, включает в себя следующее:\n\n- объект Engine,\
    \ реализующий стандарт DB-API;\n- URL-адреса, выражающие тип и драйвер SQL-сервера,\
    \ а также конкретную коллекцию баз данных на этом сервере;\n- пулы соединений\
    \ «клиент — сервер»;\n- транзакции (COMMIT и ROLLBACK);\n- различия в *диалектах*\
    \ SQL для различных типов баз данных;\n- прямые запросы SQL (текстовые строки);\n\
    - запросы на языке выражений SQLAlchemy.\n\nНекоторые из этих возможностей, например\
    \ работа с диалектами, делают SQLAlchemy оптимальным пакетом для работы с различными\
    \ типами серверов. С его помощью можно выполнять обычные SQL-запросы DB-API или\
    \ использовать язык выражений SQLAlchemy.\n\nДо этого момента я работал с базовым\
    \ драйвером DB-API SQLite и буду продолжать делать это. Но для больших сайтов\
    \ или при необходимости воспользоваться специальными возможностями сервера стоит\
    \ взять SQLAlchemy (применяя базовый DB-API, SQLAlchemy Expression Language или\
    \ полноценный ORM).\n\n### Язык выражений SQLAlchemy\n\nЯзык выражений SQLAlchemy\
    \ (SQLAlchemy Expression Language) — это *не* ORM, а другой способ выражения запросов\
    \ к реляционным таблицам. Он отображает базовые структуры хранения данных на классы\
    \ Python, такие как Table и Column, и операции с методами Python, такими как `select()`\
    \ и `insert()`. Эти функции преобразуются в обычные строки SQL, и вы можете обратиться\
    \ к ним, чтобы посмотреть, что произошло. Язык не зависит от типов SQL-серверов.\
    \ Если вам трудно дается SQL, возможно, стоит попробовать этот вариант.\n\nСравним\
    \ несколько примеров. В примере 14.1 показана версия исключительно на языке SQL.\n\
    \n**Пример 14.1.** Прямой код SQL для функции `get_one()` в файле `data/explorer.py`\n\
    \n```\ndef get_one(name: str) -> Explorer:\n    qry = \"select * from explorer\
    \ where name=:name\"\n    params = {\"name\": name}\n    curs.execute(qry, params)\n\
    \    return row_to_model(curs.fetchone())\n```\n\nВ примере 14.2 показан частичный\
    \ эквивалент SQLAlchemy Expression Language для настройки базы данных, создания\
    \ таблицы и выполнения вставки.\n\n**Пример 14.2.** SQLAlchemy Expression Language\
    \ для функции `get_one()`\n\n```\nfrom sqlalchemy import Metadata, Table, Column,\
    \ Text\nfrom sqlalchemy import connect, insert\n\nconn = connect(\"sqlite:///cryptid.db\"\
    )\nmeta = Metadata()\nexplorer_table = Table(\n    \"explorer\",\n    meta,\n\
    \    Column(\"name\", Text, primary_key=True),\n    Column(\"country\", Text),\n\
    \    Column(\"description\", Text),\n    )\ninsert(explorer_table).values(\n \
    \   name=\"Beau Buffette\",\n    country=\"US\",\n    description=\"...\")\n```\n\
    \nДля получения большего количества примеров можно воспользоваться альтернативной\
    \ документацией (https://oreil.ly/ZGCHv) — она читается немного легче, чем официальные\
    \ страницы.\n\n### ORM\n\nORM выражает запросы в терминах моделей данных домена,\
    \ а не реляционных таблиц и логики SQL, лежащих в основе механизма базы данных.\
    \ В официальной документации (https://oreil.ly/x4DCi) приведена подробная информация.\
    \ ORM гораздо сложнее, чем язык выражений SQL. Разработчики, предпочитающие полностью\
    \ объектно-ориентированные модели, обычно выбирают ORM.\n\nВо многих книгах и\
    \ статьях о FastAPI, начиная раздел, посвященный базам данных, авторы сразу же\
    \ переходят к ORM SQLAlchemy. Я понимаю, что это привлекательно, но также знаю,\
    \ что это требует изучения еще одной абстракции. SQLAlchemy — отличный пакет,\
    \ но если его абстракции не всегда работают, то у вас возникают две проблемы.\
    \ Самым простым решением может быть использование SQL и переход к языку выражений\
    \ или ORM, если SQL становится слишком сложным.\n\n### SQLModel\n\nАвтор FastAPI\
    \ объединил аспекты FastAPI, Pydantic и SQLAlchemy, чтобы создать библиотеку SQLModel\
    \ (https://sqlmodel.tiangolo.com). Он переносит некоторые методы разработки из\
    \ веб-мира в реляционные базы данных. SQLModel сочетает в себе ORM от SQLAlchemy\
    \ с определением и проверкой данных от Pydantic.\n\n### SQLite\n\nПакет SQLite\
    \ был представлен в главе 10, я использовал его в примерах уровня данных. Это\
    \ общественное достояние — более открытого исходного кода и не придумаешь. SQLite\
    \ применяется в каждом браузере и в каждом смартфоне, что делает его одним из\
    \ самых распространенных программных пакетов в мире. При выборе реляционной базы\
    \ данных этот пакет часто упускают из виду, но вполне возможно, что несколько\
    \ «серверов» SQLite смогут поддерживать некоторые крупные сервисы не хуже, чем\
    \ такой мощный сервер, как PostgreSQL."
  mdcn: "## 结论\n\n显而易见，生产环境部署并非易事。其中涉及的问题包括 Web 技术本身、网络与磁盘过载，以及数据库相关问题。本章将提供一些提示，帮助您获取所需信息，并在遇到问题时知道从何处着手排查。\n\
    \n## 第四部分\n\n## 画廊\n\n在第三部分中，您已经使用基础代码创建了一个最小化的网站。现在，让我们用它来做些有趣的事情。接下来的章节将展示如何将\
    \ FastAPI 应用于常见的 Web 应用场景：表单、文件、数据库、图表、图形、地图和游戏。\n\n为了将这些应用联系起来，并使它们比计算机科学书籍中那些枯燥的示例更有趣，我们将从一些不寻常的来源获取数据——其中一部分您已经见过：来自世界民间传说的虚构生物以及追踪它们的研究者。这里不仅有雪人，还有这个领域中其他虽不那么知名、但同样引人注目的代表。\n\
    \n## 第14章\n\n## 数据库、数据科学与一点人工智能\n\n### 概述\n\n本章将介绍如何使用 FastAPI 来存储和获取数据。这里扩展了第10章中介绍的简单\
    \ SQLite 示例：\n\n- 其他开源数据库（关系型与非关系型）；\n- 更高级地使用 SQLAlchemy；\n- 改进的错误检查。\n\n###\
    \ 替代的数据存储方案\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_219_0.png)\n\n“数据库”这个术语不幸地被用来指代三样东西：\n\
    \n- 服务器类型，例如 PostgreSQL、SQLite 或 MySQL；\n- 该服务器的运行实例；\n- 该服务器上的表集合。\n\n为了避免混淆，当我将最后一种情况的实例称为\
    \ PostgreSQL 数据库时，我会使用其他术语来明确我指的是哪一种。\n\n网站的后端通常是一个数据库。网站和数据库就像花生酱和果冻，虽然您也可以用其他方式存储数据（或者把花生酱和黄瓜搭配），但在本书中，我们将使用数据库。\n\
    \n数据库解决了许多原本需要您自己用代码解决的问题，例如：\n\n- 多用户访问；\n- 索引；\n- 数据一致性。\n\n总体而言，数据库的选择如下：\n\
    \n- 使用 SQL 查询语言的关系型数据库；\n- 使用各种查询语言的非关系型数据库。\n\n### 关系型数据库与 SQL\n\nPython 中有一个名为\
    \ DB-API (https://oreil.ly/StbE4) 的标准关系型 API 定义。它得到了所有主要数据库的 Python 驱动程序包的支持。表\
    \ 14.1 列出了一些知名的关系型数据库及其主要的 Python 驱动程序包。\n\n**表 14.1.** 关系型数据库与 Python 驱动程序\n\n\
    | 数据库 | Python 驱动程序 |\n|---|---|\n| *开源* | |\n| SQLite (https://www.sqlite.org)\
    \ | sqlite3 (https://oreil.ly/TNNaA) |\n| PostgreSQL (https://www.postgresql.org)\
    \ | psycopg2 (https://oreil.ly/nLn5x) 和 asyncpg (https://oreil.ly/90pvK) |\n|\
    \ MySQL (https://www.mysql.com) | MySQLdb (https://oreil.ly/yn1fn) 和 PyMySQL (https://oreil.ly/Cmup-)\
    \ |\n| *商业* | |\n| Oracle (https://www.oracle.com) | python-oracledb (https://oreil.ly/gynvX)\
    \ |\n| SQL Server (https://www.microsoft.com/en-us/sql-server) | pyodbc (https://oreil.ly/_UEYq)\
    \ 和 pymssql (https://oreil.ly/FkKUn) |\n| IBM Db2 (https://www.ibm.com/products/db2)\
    \ | ibm_db (https://oreil.ly/3uwpD) |\n\n用于关系型数据库和 SQL 的主要 Python 包：\n\n- *SQLAlchemy*\
    \ (https://www.sqlalchemy.org) — 一个功能齐全的库，可在不同层次上使用；\n- *SQLModel* (https://sqlmodel.tiangolo.com)\
    \ — 由 FastAPI 作者结合 SQLAlchemy 和 Pydantic 创建；\n- *Records* (https://github.com/kennethreitz/records)\
    \ — 由 Requests 包的作者开发，提供简单的查询 API。\n\n### SQLAlchemy\n\nSQLAlchemy 已成为 Python\
    \ 中最受欢迎的 SQL 包。尽管许多关于 SQLAlchemy 的讲解只讨论其 ORM 功能，但它实际上包含多个层次，我将从底层向上进行介绍。\n\n###\
    \ Core\n\nSQLAlchemy 的基础，称为 *Core*，包括以下内容：\n\n- 实现 DB-API 标准的 Engine 对象；\n- 表示\
    \ SQL 服务器类型、驱动程序以及该服务器上特定数据库集合的 URL；\n- “客户端-服务器”连接池；\n- 事务（COMMIT 和 ROLLBACK）；\n\
    - 不同数据库类型的 SQL *方言*差异；\n- 直接的 SQL 查询（文本字符串）；\n- SQLAlchemy 表达式语言查询。\n\n其中一些功能，例如处理方言的能力，使\
    \ SQLAlchemy 成为处理不同类型服务器的最佳选择。使用它，您可以执行普通的 DB-API SQL 查询，或者使用 SQLAlchemy 表达式语言。\n\
    \n在此之前，我一直在使用 SQLite 的基础 DB-API 驱动程序，并将继续这样做。但对于大型网站，或者需要利用服务器的特殊功能时，值得考虑使用 SQLAlchemy（应用基础\
    \ DB-API、SQLAlchemy 表达式语言或完整的 ORM）。\n\n### SQLAlchemy 表达式语言\n\nSQLAlchemy 表达式语言（SQLAlchemy\
    \ Expression Language）*不是* ORM，而是表达关系表查询的另一种方式。它将基础的数据存储结构映射到 Python 类，如 Table\
    \ 和 Column，并使用 Python 方法进行操作，例如 `select()` 和 `insert()`。这些函数被转换为普通的 SQL 字符串，您可以查看它们以了解发生了什么。该语言独立于\
    \ SQL 服务器类型。如果您觉得 SQL 难以掌握，或许可以尝试这种方式。\n\n我们来比较几个示例。示例 14.1 展示了纯 SQL 版本。\n\n**示例\
    \ 14.1.** `data/explorer.py` 文件中 `get_one()` 函数的直接 SQL 代码\n\n```\ndef get_one(name:\
    \ str) -> Explorer:\n    qry = \"select * from explorer where name=:name\"\n \
    \   params = {\"name\": name}\n    curs.execute(qry, params)\n    return row_to_model(curs.fetchone())\n\
    ```\n\n示例 14.2 展示了用于数据库设置、创建表和执行插入操作的 SQLAlchemy 表达式语言的部分等效代码。\n\n**示例 14.2.**\
    \ `get_one()` 函数的 SQLAlchemy 表达式语言版本\n\n```\nfrom sqlalchemy import Metadata,\
    \ Table, Column, Text\nfrom sqlalchemy import connect, insert\n\nconn = connect(\"\
    sqlite:///cryptid.db\")\nmeta = Metadata()\nexplorer_table = Table(\n    \"explorer\"\
    ,\n    meta,\n    Column(\"name\", Text, primary_key=True),\n    Column(\"country\"\
    , Text),\n    Column(\"description\", Text),\n    )\ninsert(explorer_table).values(\n\
    \    name=\"Beau Buffette\",\n    country=\"US\",\n    description=\"...\")\n\
    ```\n\n要获取更多示例，可以参考替代文档 (https://oreil.ly/ZGCHv)——它比官方页面稍易阅读。\n\n### ORM\n\nORM\
    \ 使用领域数据模型的术语来表达查询，而不是底层数据库机制的关系表和 SQL 逻辑。官方文档 (https://oreil.ly/x4DCi) 提供了详细信息。ORM\
    \ 比 SQL 表达式语言复杂得多。倾向于完全面向对象模型的开发者通常会选择 ORM。\n\n在许多关于 FastAPI 的书籍和文章中，作者在开始数据库章节时，会立即转向\
    \ SQLAlchemy ORM。我理解这很有吸引力，但也知道这需要学习另一层抽象。SQLAlchemy 是一个优秀的包，但如果其抽象层有时无法正常工作，您就会面临两个问题。最简单的解决方案可能是先使用\
    \ SQL，如果 SQL 变得过于复杂，再转向表达式语言或 ORM。\n\n### SQLModel\n\nFastAPI 的作者结合了 FastAPI、Pydantic\
    \ 和 SQLAlchemy 的方面，创建了 SQLModel 库 (https://sqlmodel.tiangolo.com)。它将 Web 世界的一些开发方法引入了关系型数据库。SQLModel\
    \ 结合了 SQLAlchemy 的 ORM 与 Pydantic 的数据定义和验证功能。\n\n### SQLite\n\nSQLite 包在第10章中已介绍，我在数据层示例中使用了它。它是公共领域软件——没有比这更开放的源代码了。SQLite\
    \ 应用于每个浏览器和每部智能手机，使其成为世界上最广泛使用的软件包之一。在选择关系型数据库时，这个包经常被忽视，但完全有可能几个 SQLite “服务器”能够像\
    \ PostgreSQL 这样强大的服务器一样，支撑起一些大型服务。"
