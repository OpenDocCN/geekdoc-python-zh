    сотен тысяч пользователей, одновременно запрашивающих ваш сайт или даже несколько
    серверов.


    Установите его локально с помощью команды `pip install locust`. Первым тестом
    может стать проверка возможного количества единовременных посетителей вашего сайта.
    Это похоже на проверку того, насколько экстремальные погодные условия может выдержать
    здание во время урагана, землетрясения, снежной бури или наступления другого страшного
    случая. Поэтому вам нужны структурные тесты сайта. В документации (https://docs.locust.io)
    Locust можно найти более подробную информацию.


    Но, как говорят по телевизору, это еще не все! Недавно разработчики инструмента
    Grasshopper (https://github.com/alteryx/locust-grasshopper) расширили возможности
    Locust для выполнения таких задач, как измерение времени в нескольких HTTP-вызовах.
    Чтобы опробовать это расширение, установите его с помощью команды `pip install
    locust-grasshopper`.


