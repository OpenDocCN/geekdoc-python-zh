    \ к регистру.\n\n## Django\n\nDjango (https://www.djangoproject.com) — это более\
    \ крупный и сложный проект, чем Flask или FastAPI, ориентированный на «перфекционистов\
    \ со сроками», как утверждается на его сайте. Встроенное объектно-реляционное\
    \ связывание (Object-Relational Mapper, ORM) полезно для сайтов с основными бэкендами\
    \ баз данных. Это скорее монолит, чем набор инструментов. Оправданны ли трудности\
    \ обучения и освоение дополнительных сложностей, зависит от ваших задач.\n\nХотя\
    \ Django был традиционным WSGI-приложением, в версии 3.0 была добавлена поддержка\
    \ стандарта ASGI.\n\nВ отличие от Flask и FastAPI, Django предпочитает определять\
    \ маршруты (связывая URL с веб-функциями, которые он называет *функциями представления*)\
    \ в одной таблице URLConf, а не с помощью декораторов. Это облегчает просмотр\
    \ всех маршрутов в одном месте, но затрудняет понимание того, какой URL связан\
    \ с функцией, когда вы смотрите только на саму функцию.\n\n## Другие функциональные\
    \ возможности веб-фреймворка\n\nВ предыдущих разделах, посвященных сравнению трех\
    \ фреймворков, я в основном сравнивал способы определения маршрутов. От веб-фреймворка\
    \ можно ожидать помощи и в других областях.\n\n- **Формы** — все три пакета поддерживают\
    \ стандартные HTML-формы.\n- **Файлы** — все эти пакеты работают с выгрузкой и\
    \ скачиванием файлов, включая многокомпонентные HTTP-запросы и ответы.\n- **Шаблоны**\
    \ — язык шаблонов позволяет смешивать текст и код и полезен для контент-ориентированного\
    \ сайта (HTML-текст с динамически вставляемыми данными), а не для сайта с API.\
    \ Наиболее известным пакетом шаблонов Python является Jinja (https://jinja.palletsprojects.com),\
    \ и он поддерживается Flask, Django и FastAPI. У Django есть и собственный язык\
    \ шаблонов (https://oreil.ly/OlbVJ).\n\nЕсли вы хотите использовать сетевые методы,\
    \ выходящие за рамки базового HTTP, попробуйте следующие варианты.\n\n- **Server-sent\
    \ events (SSE)** — передает данные клиенту по мере необходимости. Поддерживается\
    \ FastAPI (sse-starlette, https://oreil.ly/Hv-QP), Flask (Flask-SSE, https://oreil.ly/oz518)\
    \ и Django (Django EventStream, https://oreil.ly/NiBE5).\n- **Очереди** — очереди\
    \ заданий, публикация-подписка и другие сетевые шаблоны поддерживаются такими\
    \ внешними пакетами, как ZeroMQ, Celery, Redis и RabbitMQ.\n- **WebSockets** —\
    \ поддерживаются FastAPI (непосредственно), Django (Django Channels, https://channels.readthedocs.io)\
    \ и Flask (сторонние пакеты).\n\n## Базы данных\n\nВ базовые пакеты Flask и FastAPI\
    \ не включена работа с базами данных, но она является ключевой особенностью Django.\n\
    \nУровень данных вашего сайта может обращаться к базе данных на разных уровнях:\n\
    \n- непосредственно SQL (PostgreSQL, SQLite);\n- непосредственно NoSQL (Redis,\
    \ MongoDB, Elasticsearch);\n- ORM, генерирующее SQL;\n- объектное связывание документов\
    \ (Object Document Mapping, ODM), генерирующее NoSQL.\n\nДля реляционных баз данных\
    \ SQLAlchemy (https://www.sqlalchemy.org) — отличный пакет, включающий в себя\
    \ несколько уровней доступа, от прямого SQL до ORM. Это обычный выбор для разработчиков\
    \ Flask и FastAPI. Автор FastAPI использовал как SQLAlchemy, так и Pydantic для\
    \ пакета SQLModel (https://sqlmodel.tiangolo.com) — о нем мы подробнее поговорим\
    \ в главе 14.\n\nDjango часто выбирают в качестве фреймворка для сайтов с большими\
    \ потребностями в базах данных. У него есть свой ORM (https://oreil.ly/eFzZn)\
    \ и автоматизированная страница администрирования баз данных (https://oreil.ly/_al42).\
    \ Хотя некоторые источники рекомендуют разрешить нетехническому персоналу использовать\
    \ страницу администратора для рутинного управления данными, будьте осторожны.\
    \ Однажды я видел, как неспециалист неправильно понял предупреждающее сообщение\
    \ на странице администратора, в результате чего базу данных пришлось восстанавливать\
    \ вручную из резервной копии.\n\nВ главе 14 более подробно рассматриваются FastAPI\
    \ и базы данных.\n\n## Рекомендации\n\nДля сервисов на базе API лучшим выбором\
    \ кажется FastAPI. Flask и FastAPI примерно равны в плане скорости запуска сервиса.\
    \ Чтобы разобраться в Django, потребуется больше времени, но он предоставляет\
    \ множество возможностей, полезных для больших сайтов, особенно сильно зависящих\
    \ от баз данных.\n\n## Другие веб-фреймворки Python\n\nВ настоящее время три основных\
    \ веб-фреймворка на Python — это Flask, Django и FastAPI. Введите в Google запрос\
    \ **python web frameworks**, и вы получите множество предложений, которые я не\
    \ буду здесь приводить. Среди тех, которые, возможно, не выделяются в этих списках,\
    \ но интересны по тем или иным причинам, можно назвать следующие:\n\n- **Bottle**\
    \ (https://bottlepy.org/docs/dev) — минимальный (один файл Python) пакет, хорошо\
    \ подходящий для того, чтобы быстро доказать концепцию;\n- **Litestar** (https://litestar.dev)\
    \ — похож на FastAPI — основан на ASGI/Starlette и Pydantic, но представляет иной\
    \ взгляд на поставленную задачу;\n- **AIOHTTP** (https://docs.aiohttp.org) — клиент\
    \ и сервер ASGI с полезным демонстрационным кодом;\n- **Socketify.py** (https://docs.socketify.dev)\
    \ — новый участник, потенциально очень высокопроизводительный.\n\n## Заключение\n\
    \nFlask и Django — самые популярные веб-фреймворки на Python, хотя популярность\
    \ FastAPI растет быстрее. Все три они справляются с основными задачами веб-сервера,\
    \ но скорость их освоения разная. У FastAPI, похоже, более чистый синтаксис для\
    \ задания маршрутов, а поддержка ASGI позволяет ему во многих случаях работать\
    \ быстрее своих конкурентов. Далее: давайте уже создадим сайт.\n\n# ЧАСТЬ III\n\
    \n## Создание веб-сайта\n\nВ части II я дал краткий обзор FastAPI, чтобы быстро\
    \ ввести вас в курс дела. В этой части книги будем углубляться в детали. Мы создадим\
    \ веб-сервис среднего размера для доступа к данным о криптидах — выдуманных существах\
    \ и таких же выдуманных исследователях, которые их ищут, а также для управления\
    \ ими.\n\nПолный сервис будет иметь три уровня, как я говорил ранее:\n\n- **веб-уровень**\
    \ — веб-интерфейс;\n- **сервис** — бизнес-логика;\n- **данные** — драгоценная\
    \ ДНК всей конструкции.\n\nКроме того, веб-сервис будет содержать следующие межуровневые\
    \ компоненты:\n\n- **модель** — определения данных Pydantic;\n- **тесты** — модульные,\
    \ интеграционные и комплексные тесты.\n\nВ дизайне сайта будут учтены следующие\
    \ моменты.\n\n- Что должно располагаться на каждом из уровней?\n- Что передается\
    \ между уровнями?\n- Можем ли мы позже изменить/добавить/удалить код, ничего не\
    \ нарушив?\n- Если работа чего-то прервется, как мне это найти и исправить?\n\
    - Как обстоит ситуация с безопасностью?\n- Может ли сайт масштабироваться и сохранять\
    \ работоспособность?\n- Можно ли сделать все это как можно более понятным и простым?\n\
    - Почему я задаю так много вопросов? Почему, почему?\n\n# ГЛАВА 8\n\n## Веб-уровень\n\
    \n### Обзор\n\nВ главе 3 мы вкратце поговорили о том, как определять конечные\
    \ точки FastAPI, передавать им простые строковые данные и получать ответы. В этой\
    \ главе подробнее рассмотрим верхний уровень приложения FastAPI — его также можно\
    \ назвать уровнем *интерфейса* или *маршрутизации* — и его интеграцию с уровнями\
    \ сервисов и данных.\n\nКак и прежде, начну с небольших примеров. Затем введу\
    \ некоторую структуру, разделив уровни на подуровни, чтобы обеспечить более чистое\
    \ развитие и рост веб-приложения. Чем меньше кода мы пишем, тем меньше придется\
    \ вспоминать и исправлять впоследствии.\n\nОсновные примеры данных в этой книге\
    \ касаются воображаемых существ, или *криптидов*, и их исследователей. Но вы можете\
    \ провести параллели с информацией из других областей.\n\nЧто мы вообще делаем\
    \ с информацией? Как и на большинстве других сайтов, на нашем вы найдете способы\
    \ выполнить следующие операции:\n\n- получение;\n- создание;\n- изменение;\n-\
    \ замену;\n- удаление.\n\nНачав с самого верха, мы создадим конечные точки веб-приложения,\
    \ способные выполнять эти функции с нашими данными. Сначала предоставим фиктивные\
    \ данные, чтобы конечные точки работали с любым веб-клиентом. В следующих главах\
    \ мы перенесем код этих данных на нижние уровни. На каждом этапе необходимо будет\
    \ убедиться, что сайт по-прежнему работает и корректно передает данные.\n\nНаконец,\
    \ в главе 10 мы откажемся от фиктивных данных и будем хранить реальные данные\
    \ в реальных базах данных, чтобы создать полноценный сайт (веб → сервис → данные).\n\
    \n> Если позволить любому анонимному посетителю выполнить все эти действия, не\
    \ стоит ожидать ничего хорошего. В главе 11 рассматриваются аутентификация и авторизация\
    \ (auth), необходимые для определения ролей и ограничения того, кто что может\
    \ делать. В оставшейся части этой главы мы обойдемся без аутентификации и просто\
    \ рассмотрим, как работать с необработанными веб-функциями.\n\n### Немного отвлечемся:\
    \ сверху вниз, снизу вверх, от центра наружу?\n\nПри разработке веб-сайта можно\
    \ реализовать один из таких вариантов, как:\n\n- веб-уровень и работа дальше вниз;\n\
    - уровень данных и работа дальше вверх;\n- сервисный уровень и работа в обоих\
    \ направлениях.\n\nУ вас уже есть база данных, установленная и наполненная данными,\
    \ и вы просто жаждете поделиться ею со всем миром? Если да, то, возможно, стоит\
    \ сначала заняться кодом и тестами уровня данных, затем уровнем сервисов, а веб-уровень\
    \ написать последним.\n\nЕсли ваш подход — предметно-ориентированное проектирование\
    \ (Domain-Driven Design, DDD) (https://oreil.ly/ijU9Q), можете начать со среднего,\
    \ сервисного уровня, определяя основные сущности и модели данных. Или же сначала\
    \ разработать веб-интерфейс, а к нижним уровням обратиться, когда поймете, чего\
    \ от них ожидать.\n\nОчень хорошие обсуждения и рекомендации по дизайну вы найдете\
    \ в следующих книгах:"
  mdcn: "@app.route(\"/hi\", methods=[\"GET\"])\ndef greet():\n    who: str = request.headers.get(\"\
    who\")\n    return jsonify(f\"Hello? {who}?\")\n\n与查询参数类似，Flask 将请求数据存储在 `request`\
    \ 对象中。在这种情况下，它将是 `dict` 类型的 `headers` 属性。请求头的键名应不区分大小写。\n\n## Django\n\nDjango\
    \ (https://www.djangoproject.com) 是一个比 Flask 或 FastAPI 更庞大、更复杂的项目，正如其网站所宣称的，它面向“有期限的完美主义者”。内置的对象关系映射（Object-Relational\
    \ Mapper, ORM）对于以数据库后端为核心的网站非常有用。它更像是一个整体，而非一套工具集。是否值得投入学习成本并掌握其额外的复杂性，取决于你的具体需求。\n\
    \n尽管 Django 传统上是一个 WSGI 应用，但在 3.0 版本中增加了对 ASGI 标准的支持。\n\n与 Flask 和 FastAPI 不同，Django\
    \ 倾向于在单个 URLConf 表中定义路由（将 URL 与其称为 *视图函数* 的 web 函数关联），而不是使用装饰器。这便于在一个地方查看所有路由，但当你只查看函数本身时，却难以理解哪个\
    \ URL 与之关联。\n\n## 其他 Web 框架功能\n\n在前面比较三个框架的章节中，我主要比较了定义路由的方式。从 Web 框架中，你还可以期待它在其他领域提供帮助。\n\
    \n- **表单** — 所有这三个包都支持标准的 HTML 表单。\n- **文件** — 所有这些包都能处理文件的上传和下载，包括多部分 HTTP 请求和响应。\n\
    - **模板** — 模板语言允许混合文本和代码，对于内容导向的网站（带有动态插入数据的 HTML 文本）而非 API 网站非常有用。Python 最著名的模板包是\
    \ Jinja (https://jinja.palletsprojects.com)，它被 Flask、Django 和 FastAPI 支持。Django\
    \ 也有自己的模板语言 (https://oreil.ly/OlbVJ)。\n\n如果你想使用超出基本 HTTP 范围的网络方法，请尝试以下选项。\n\n\
    - **服务器发送事件 (SSE)** — 按需向客户端传输数据。FastAPI (sse-starlette, https://oreil.ly/Hv-QP)、Flask\
    \ (Flask-SSE, https://oreil.ly/oz518) 和 Django (Django EventStream, https://oreil.ly/NiBE5)\
    \ 均支持。\n- **队列** — 任务队列、发布-订阅以及其他网络模式由 ZeroMQ、Celery、Redis 和 RabbitMQ 等外部包支持。\n\
    - **WebSockets** — FastAPI（直接支持）、Django (Django Channels, https://channels.readthedocs.io)\
    \ 和 Flask（通过第三方包）均支持。\n\n## 数据库\n\nFlask 和 FastAPI 的基础包不包含数据库操作，但这是 Django 的一个关键特性。\n\
    \n你网站的数据层可以在不同级别访问数据库：\n\n- 直接使用 SQL (PostgreSQL, SQLite)；\n- 直接使用 NoSQL (Redis,\
    \ MongoDB, Elasticsearch)；\n- 生成 SQL 的 ORM；\n- 生成 NoSQL 的对象文档映射（Object Document\
    \ Mapping, ODM）。\n\n对于关系型数据库，SQLAlchemy (https://www.sqlalchemy.org) 是一个优秀的包，它包含多个访问级别，从直接\
    \ SQL 到 ORM。这是 Flask 和 FastAPI 开发者的常见选择。FastAPI 的作者使用了 SQLAlchemy 和 Pydantic 来创建\
    \ SQLModel (https://sqlmodel.tiangolo.com) 包——我们将在第 14 章详细讨论它。\n\nDjango 经常被选为对数据库需求较大的网站的框架。它有自己的\
    \ ORM (https://oreil.ly/eFzZn) 和自动化的数据库管理页面 (https://oreil.ly/_al42)。虽然一些资料建议允许非技术人员使用管理员页面进行日常数据管理，但请务必谨慎。我曾见过一次，非技术人员误解了管理员页面上的警告信息，结果不得不从备份中手动恢复数据库。\n\
    \n第 14 章将更详细地探讨 FastAPI 和数据库。\n\n## 推荐\n\n对于基于 API 的服务，FastAPI 似乎是最佳选择。Flask 和\
    \ FastAPI 在服务启动速度方面大致相当。要理解 Django 需要更多时间，但它提供了许多对大型网站（尤其是严重依赖数据库的网站）有用的功能。\n\n\
    ## 其他 Python Web 框架\n\n目前，Python 的三大主要 Web 框架是 Flask、Django 和 FastAPI。在 Google\
    \ 上搜索 **python web frameworks**，你会得到许多建议，我这里就不一一列举了。在那些可能未在这些列表中突出显示，但因各种原因值得关注的框架中，可以提到以下这些：\n\
    \n- **Bottle** (https://bottlepy.org/docs/dev) — 极简（单个 Python 文件）的包，非常适合快速验证概念；\n\
    - **Litestar** (https://litestar.dev) — 类似于 FastAPI — 基于 ASGI/Starlette 和 Pydantic，但对任务提出了不同的视角；\n\
    - **AIOHTTP** (https://docs.aiohttp.org) — 带有有用示例代码的 ASGI 客户端和服务器；\n- **Socketify.py**\
    \ (https://docs.socketify.dev) — 新参与者，潜在的高性能。\n\n## 结论\n\nFlask 和 Django 是 Python\
    \ 中最受欢迎的 Web 框架，尽管 FastAPI 的受欢迎程度增长更快。这三个框架都能处理 Web 服务器的基本任务，但它们的学习速度不同。FastAPI\
    \ 似乎拥有更清晰的路由定义语法，并且对 ASGI 的支持使其在许多情况下比竞争对手运行得更快。接下来：让我们开始创建网站吧。\n\n# 第三部分\n\n\
    ## 创建网站\n\n在第二部分，我简要介绍了 FastAPI，以便让你快速入门。在本书的这一部分，我们将深入细节。我们将创建一个中等规模的 Web 服务，用于访问关于隐匿生物（cryptids）——虚构的生物以及同样虚构的寻找它们的研究者——的数据，并对其进行管理。\n\
    \n完整的服务将包含三个层次，正如我之前所说：\n\n- **Web 层** — Web 界面；\n- **服务层** — 业务逻辑；\n- **数据层**\
    \ — 整个结构的宝贵 DNA。\n\n此外，Web 服务将包含以下跨层组件：\n\n- **模型** — Pydantic 数据定义；\n- **测试**\
    \ — 单元测试、集成测试和综合测试。\n\n网站设计将考虑以下几点。\n\n- 每个层次应该放置什么？\n- 层次之间传递什么？\n- 我们以后能否在不破坏任何东西的情况下修改/添加/删除代码？\n\
    - 如果某部分工作出错，我如何找到并修复它？\n- 安全性如何？\n- 网站能否扩展并保持功能正常？\n- 能否让这一切尽可能清晰简单？\n- 为什么我问这么多问题？为什么，为什么？\n\
    \n# 第 8 章\n\n## Web 层\n\n### 概述\n\n在第 3 章中，我们简要讨论了如何定义 FastAPI 端点、向它们传递简单的字符串数据以及获取响应。在本章中，我们将更详细地探讨\
    \ FastAPI 应用的顶层——也可以称为 *接口* 或 *路由* 层——以及它与服务层和数据层的集成。\n\n和以前一样，我将从一些小例子开始。然后，通过将层次划分为子层次来引入一些结构，以确保\
    \ Web 应用更清晰地发展和增长。我们编写的代码越少，以后需要回忆和修复的就越少。\n\n本书中的主要数据示例涉及虚构的生物，或称 *隐匿生物*，以及它们的研究者。但你可以将其与其他领域的信息进行类比。\n\
    \n我们究竟如何处理信息？与大多数其他网站一样，在我们的网站上，你将找到执行以下操作的方法：\n\n- 获取；\n- 创建；\n- 修改；\n- 替换；\n\
    - 删除。\n\n从最顶层开始，我们将创建能够对我们的数据执行这些功能的 Web 应用端点。首先提供虚拟数据，以便端点能与任何 Web 客户端一起工作。在接下来的章节中，我们将把这些数据的代码迁移到更低的层次。在每个阶段，都需要确保网站仍然正常工作并正确传递数据。\n\
    \n最后，在第 10 章中，我们将放弃虚拟数据，将真实数据存储在真实的数据库中，以创建一个完整的网站（Web → 服务 → 数据）。\n\n> 如果允许任何匿名访客执行所有这些操作，就别指望会有什么好事发生。第\
    \ 11 章讨论了身份验证和授权（auth），这对于确定角色和限制谁可以做什么是必要的。在本章的剩余部分，我们将不进行身份验证，只探讨如何处理原始的 Web\
    \ 函数。\n\n### 稍微偏离一下：自顶向下、自底向上，还是从中心向外？\n\n在开发网站时，你可以实现以下任一方式：\n\n- 从 Web 层开始，然后向下工作；\n\
    - 从数据层开始，然后向上工作；\n- 从服务层开始，然后向两个方向工作。\n\n你是否已经有一个安装好并填充了数据的数据库，并且迫不及待地想与全世界分享？如果是这样，那么也许应该先处理数据层的代码和测试，然后是服务层，最后才编写\
    \ Web 层。\n\n如果你的方法是领域驱动设计（Domain-Driven Design, DDD）(https://oreil.ly/ijU9Q)，你可以从中间的服务层开始，定义核心实体和数据模型。或者先开发\
    \ Web 界面，等到明白对底层有什么期望时再处理底层。\n\n你可以在以下书籍中找到非常好的讨论和设计建议："
