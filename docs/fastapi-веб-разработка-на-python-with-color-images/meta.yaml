    \ str) -> list[Creature]:\n    qry = \"select * from creature\"\n    curs.execute(qry)\n\
    \    rows = list(curs.fetchall())\n    return [row_to_model(row) for row in rows]\n\
    \ndef create(creature: Creature):\n    qry = \"\"\"insert into creature values\n\
    \        (:name, :description, :country, :area, :aka)\"\"\"\n    params = model_to_dict(creature)\n\
    \    curs.execute(qry, params)\n\ndef modify(creature: Creature):\n    return\
    \ creature\n\ndef replace(creature: Creature):\n    return creature\n\ndef delete(creature:\
    \ Creature):\n    qry = \"delete from creature where name = :name\"\n    params\
    \ = {\"name\": creature.name}\n    curs.execute(qry, params)\n```\n\nВ самом верху\
    \ функция `init()` устанавливает соединение с sqlite3 и базой данных `scriptid.db`.\
    \ Она хранит его в переменной `conn` — глобальной для модуля `data/creature.py`.\
    \ Далее переменная `curs` — это курсор для итерации по данным, возвращаемым при\
    \ выполнении SQL-оператора SELECT. Она также является глобальной для модуля.\n\
    \nДве служебные функции выполняют перевод между моделями Pydantic и DB-API:\n\n\
    +   - `row_to_model()` преобразует кортеж, возвращаемый функцией `fetch`, в объект\
    \ модели;\n- `model_to_dict()` переводит Pydantic-модель в словарь, пригодный\
    \ для использования в качестве именованного параметра запроса."
  - "[PAGE 146]\n\nФиктивные функции CRUD, хранящиеся на каждом уровне (веб → сервис\
    \ → данные), теперь будут заменены. Они применяют только обычный SQL и методы\
    \ DB-API в sqlite3.\n\n# Макет\n\nДо настоящего момента данные (фиктивные) изменялись\
    \ поэтапно:\n\n+   - в главе 8 мы составили фиктивный список *creatures* в файле\
    \ web/creature.py;\n- в главе 8 составили фиктивный список *explorers* в файле\
    \ web/explorer.py;\n- в главе 9 перенесли подделку *creatures* в каталог service/creature.py;\n\
    - в главе 9 перенесли подделку *explorers* в каталог service/explorer.py.\n\n\
    Теперь данные переместились в последний раз — в файл data/creature.py. Но это\
    \ уже не подделка — это настоящие живые данные, хранящиеся в файле базы данных\
    \ SQLite cryptids.db. Данные о существах, опять же из-за отсутствия воображения,\
    \ хранятся в SQL-таблице creature в этой базе данных.\n\nКак только вы сохраните\
    \ этот новый файл, Uvicorn должен перезапуститься из верхнего файла main.py, вызывающего\
    \ web/creature.py, который вызывает файл service/creature.py, и наконец перейдет\
    \ к новому файлу data/creature.py.\n\n# Заставляем все это работать\n\nУ нас есть\
    \ одна небольшая проблема — этот модуль никогда не вызывает свою функцию init(),\
    \ поэтому в SQLite нет переменных conn и curs, которые могли бы использовать другие\
    \ функции. Это вопрос конфигурации: как предоставить информацию о базе данных\
    \ при запуске? Возможны следующие варианты.\n\n+   - Жесткое подключение информации\
    \ о базе данных в коде, как в примере 10.2.\n- Передача информации по уровням.\
    \ Но это нарушило бы принцип разделения уровней — уровни веб и сервиса не должны\
    \ знать о внутреннем устройстве уровня данных.\n- Передача информации из другого\
    \ внешнего источника:\n  - файла конфигурации;\n  - переменной окружения."
  - "[PAGE 147]\n\nПеременная окружения проста и поддерживается такими рекомендациями,\
    \ как Twelve-Factor App (https://12factor.net/config). Код может включать значение\
    \ по умолчанию, если переменная окружения не определена. Этот подход можно использовать\
    \ также при тестировании, чтобы создать отдельную от рабочей тестовую базу данных.\n\
    \nВ примере 10.3 определим переменную окружения CRYPTID_SQLITE_DB и присвоим ей\
    \ значение по умолчанию cryptid.db. Создайте новый файл data/init.py для нового\
    \ кода инициализации базы данных, чтобы его можно было использовать и для кода\
    \ исследователя.\n\n# Пример 10.3. Новый модуль инициализации базы данных data/init.py\n\
    \n```\n\"\"\"Инициализация базы данных SQLite\"\"\"\n\nimport os\nfrom pathlib\
    \ import Path\nfrom sqlite3 import connect, Connection, Cursor, IntegrityError\n\
    \nconn: Connection | None = None\ncurs: Cursor | None = None\n\ndef get_db(name:\
    \ str|None = None, reset: bool = False):\n    \"\"\"Подключение к файлу БД SQLite\"\
    \"\"\n    global conn, curs\n    if conn:\n        if not reset:\n           \
    \ return\n        conn = None\n    if not name:\n        name = os.getenv(\"CRYPTID_SQLITE_DB\"\
    )\n        top_dir = Path(__file__).resolve().parents[1] # repo top\n        db_dir\
    \ = top_dir / \"db\"\n        db_name = \"cryptid.db\"\n        db_path = str(db_dir\
    \ / db_name)\n        name = os.getenv(\"CRYPTID_SQLITE_DB\", db_path)\n    conn\
    \ = connect(name, check_same_thread=False)\n    curs = conn.cursor()\n\nget_db()\n\
    ```\n\nМодуль Python — это *синглтон*, вызываемый только один раз, несмотря на\
    \ многократный импорт. Таким образом, код инициализации в файле init.py запускается\
    \ всего один раз, когда происходит его первый импорт.\n\nНаконец, измените файл\
    \ data/creature.py в примере 10.4, чтобы вместо него использовать новый модуль."
- md: "## Главное, уберите строки с четвертой по восьмую.\n- О, в первую очередь создайте\
    \ таблицу creature!\n- Все поля таблицы являются строками text SQL. Это тип столбца\
    \ по умолчанию в SQLite, в отличие от большинства баз данных SQL, поэтому вам\
    \ не нужно было включать text ранее, но указать явно не помешает.\n- Выражение\
    \ if not exists позволяет избежать разрушения таблицы после ее создания.\n- Поле\
    \ name служит явным первичным ключом (primary key) для этой таблицы. Если в ней\
    \ будет храниться много данных исследователя, этот ключ будет необходим для быстрого\
    \ поиска. Альтернативой может стать ужасное сканирование таблицы, когда код базы\
    \ данных должен просмотреть каждую строку, пока не найдет совпадение с полем name.\n\
    \n## Пример 10.4. Добавление конфигурации базы данных в файл data/creature.py\n\
    \n```python\nfrom .init import conn, curs\nfrom model.creature import Creature\n\
    \ncurs.execute(\"\"\"create table if not exists creature(\n    name text primary\
    \ key,\n    description text,\n    country text,\n    area text,\n    aka text)\"\
    \"\")\n\ndef row_to_model(row: tuple) -> Creature:\n    (name, description, country,\
    \ area, aka) = row\n    return Creature(name, description, country, area, aka)\n\
    \ndef model_to_dict(creature: Creature) -> dict:\n    return creature.dict()\n\
    \ndef get_one(name: str) -> Creature:\n    qry = \"select * from creature where\
    \ name=:name\"\n    params = {\"name\": name}\n    curs.execute(qry, params)\n\
    \    return row_to_model(curs.fetchone())\n\ndef get_all() -> list[Creature]:\n\
    \    qry = \"select * from creature\"\n    curs.execute(qry)\n    return [row_to_model(row)\
    \ for row in curs.fetchall()]\n\ndef create(creature: Creature) -> Creature:\n\
    \    qry = \"insert into creature values (:name, :description, :country, :area,\
    \ :aka)\"\n    params = model_to_dict(creature)\n    curs.execute(qry, params)\n\
    \    return get_one(creature.name)\n\ndef modify(creature: Creature) -> Creature:\n\
    \    qry = \"\"\"update creature\n            set country=:country,\n        \
    \        name=:name,\n                description=:description,\n            \
    \    area=:area,\n                aka=:aka\n            where name=:name_orig\"\
    \"\"\n    params = model_to_dict(creature)\n    params[\"name_orig\"] = creature.name\n\
    \    _ = curs.execute(qry, params)\n    return get_one(creature.name)\n\ndef delete(creature:\
    \ Creature) -> bool:\n    qry = \"delete from creature where name = :name\"\n\
    \    params = {\"name\": creature.name}\n    res = curs.execute(qry, params)\n\
    \    return bool(res)\n```\n\nПри импорте объектов conn и curs из файла init.py\
    \ файлу data/creature.py больше нет необходимости импортировать сам модуль sqlite3.\
    \ Если только однажды не потребуется вызвать другой метод sqlite3, не являющийся\
    \ методом объекта conn или curs.\n\nОпять же эти изменения должны указать Uvicorn\
    \ перезагрузить все. С этого момента тестирование с помощью любого из описанных\
    \ ранее методов (HTTPie и подобные ему или автоматические формы /docs) будет показывать\
    \ сохраняемые данные. Если вы добавите существо, то оно появится в следующий раз,\
    \ когда вы соберете их всех.\n\nСделаем то же самое для исследователей в примере\
    \ 10.5.\n\n## Пример 10.5. Добавление конфигурации базы данных в файл data/explorer.py\n\
    \n```python\nfrom .init import curs\nfrom model.explorer import Explorer\n\ncurs.execute(\"\
    \"\"create table if not exists explorer(\n    name text primary key,\n    country\
    \ text,\n    description text)\"\"\")\n\ndef row_to_model(row: tuple) -> Explorer:\n\
    \    return Explorer(name=row[0], country=row[1], description=row[2])\n\ndef model_to_dict(explorer:\
    \ Explorer) -> dict:\n    return explorer.dict() if explorer else None\n\ndef\
    \ get_one(name: str) -> Explorer:\n    qry = \"select * from explorer where name=:name\"\
    \n    params = {\"name\": name}\n    curs.execute(qry, params)\n    return row_to_model(curs.fetchone())\n\
    \ndef get_all() -> list[Explorer]:\n    qry = \"select * from explorer\"\n   \
    \ curs.execute(qry)\n    return [row_to_model(row) for row in curs.fetchall()]\n\
    \ndef create(explorer: Explorer) -> Explorer:\n    qry = \"\"\"insert into explorer\
    \ (name, country, description)\n            values (:name, :country, :description)\"\
    \"\"\n    params = model_to_dict(explorer)\n    _ = curs.execute(qry, params)\n\
    \    return get_one(explorer.name)\n\ndef modify(name: str, explorer: Explorer)\
    \ -> Explorer:\n    qry = \"\"\"update explorer\n            set country=:country,\n\
    \                name=:name,\n                description=:description\n     \
    \       where name=:name_orig\"\"\"\n    params = model_to_dict(explorer)\n  \
    \  params[\"name_orig\"] = explorer.name\n    _ = curs.execute(qry, params)\n\
    \    explorer2 = get_one(explorer.name)\n    return explorer2\n\ndef delete(explorer:\
    \ Explorer) -> bool:\n    qry = \"delete from explorer where name = :name\"\n\
    \    params = {\"name\": explorer.name}\n    res = curs.execute(qry, params)\n\
    \    return bool(res)\n```\n\n## Тестируем!\n\nБыло введено очень много кода без\
    \ тестов. Все ли работает? Я бы удивился, если бы это было так. Итак, создадим\
    \ несколько тестов.\n\nСделайте в каталоге **test** следующие подкаталоги:\n-\
    \ unit — внутри уровня;\n- full — по всем уровням.\n\nКакой тип следует написать\
    \ и запустить первым? Большинство людей сначала пишут автоматизированные модульные\
    \ тесты — они меньше, а всех остальных частей слоя может еще не существовать.\
    \ В этой книге разработка велась сверху вниз, и сейчас мы завершаем последний\
    \ слой. Кроме того, в главах 8 и 9 мы тестировали вручную с помощью HTTPie и похожих\
    \ инструментов. Они помогают быстро выявить ошибки и упущения. Автоматизированные\
    \ тесты гарантируют, что вы не будете повторять те же ошибки в дальнейшем. Поэтому\
    \ я рекомендую:\n- провести несколько тестов вручную в процессе написания кода;\n\
    - выполнить модульные тесты после исправления синтаксических ошибок Python;\n\
    - провести полное тестирование после того, как будет получен полный поток данных\
    \ на всех уровнях.\n\n## Полные тесты\n\nОни вызывают конечные веб-точки, спускающие\
    \ лифт кода вниз, через сервисный уровень к уровню данных, и поднимающие обратно\
    \ вверх. Иногда их называют *сквозными* или *контрактными* тестами.\n\n## Получение\
    \ всех исследователей\n\nОкунуться в тестовые воды, еще не зная, кишат ли они\
    \ пираньями, сможет смелый доброволец — пример 10.6.\n\n**Пример 10.6.** Тестирование\
    \ получения всех исследователей\n\n```\n$ http localhost:8000/explorer\nHTTP/1.1\
    \ 405 Method Not Allowed\nallow: POST\ncontent-length: 31\ncontent-type: application/json\n\
    date: Mon, 27 Feb 2023 20:05:18 GMT\nserver: uvicorn\n\n{\n    \"detail\": \"\
    Method Not Allowed\"\n}\n```\n\nУх ты! Что же произошло?\n\nОх. Тест запрашивает\
    \ путь /explorer, а не /explorer/, а также отсутствует GET-метод функции пути\
    \ для URL-адреса /explorer (без завершающей косой черты). В файле web/explorer.py\
    \ декоратор пути для функции пути get_all() имеет вид:\n\n```python\n@router.get(\"\
    /\")\n```\n\nЭто плюс предыдущий код:\n\n```python\nrouter = APIRouter(prefix\
    \ = \"/explorer\")\n```\n\nозначает, что функция пути get_all() предоставляет\
    \ URL-адрес, содержащий выражение /explorer/.\n\nПример 10.7 показывает, что на\
    \ одну функцию пути может приходиться более одного декоратора пути.\n\n**Пример\
    \ 10.7.** Добавление декоратора пути без косой черты для функции пути get_all()\n\
    \n```python\n@router.get(\"\")\n@router.get(\"/\")\ndef get_all() -> list[Explorer]:\n\
    \    return service.get_all()\n```\n\nПротестируем оба URL-адреса в примерах 10.8\
    \ и 10.9.\n\n**Пример 10.8.** Тестирование конечной точки без косой черты в конце\n\
    \n```\n$ http localhost:8000/explorer\nHTTP/1.1 200 OK\ncontent-length: 2\ncontent-type:\
    \ application/json\ndate: Mon, 27 Feb 2023 20:12:44 GMT\nserver: uvicorn\n\n[]\n\
    ```\n\n**Пример 10.9.** Тестирование конечной точки с косой чертой в конце\n\n\
    ```\n$ http localhost:8000/explorer/\nHTTP/1.1 200 OK\ncontent-length: 2\ncontent-type:\
    \ application/json\ndate: Mon, 27 Feb 2023 20:14:39 GMT\nserver: uvicorn\n\n[]\n\
    ```\n\nТеперь, когда оба варианта работают, создайте объект исследователя и повторите\
    \ тест получения всех ресурсов. В примере 10.10 предпринята подобная попытка,\
    \ но с поворотом сюжета.\n\n**Пример 10.10.** Создание тестового исследователя\
