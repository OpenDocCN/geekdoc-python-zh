    - Передача информации из другого внешнего источника:\n  - файла конфигурации;\n\
    \  - переменной окружения.\n\nПеременная окружения проста и поддерживается такими\
    \ рекомендациями, как Twelve-Factor App (https://12factor.net/config). Код может\
    \ включать значение по умолчанию, если переменная окружения не определена. Этот\
    \ подход можно использовать также при тестировании, чтобы создать отдельную от\
    \ рабочей тестовую базу данных.\n\nВ примере 10.3 определим переменную окружения\
    \ CRYPTID_SQLITE_DB и присвоим ей значение по умолчанию cryptid.db. Создайте новый\
    \ файл data/init.py для нового кода инициализации базы данных, чтобы его можно\
    \ было использовать и для кода исследователя.\n\n### Пример 10.3. Новый модуль\
    \ инициализации базы данных data/init.py\n\n```\n\"\"\"Инициализация базы данных\
    \ SQLite\"\"\"\n\nimport os\nfrom pathlib import Path\nfrom sqlite3 import connect,\
    \ Connection, Cursor, IntegrityError\n\nconn: Connection | None = None\ncurs:\
    \ Cursor | None = None\n\ndef get_db(name: str|None = None, reset: bool = False):\n\
    \    \"\"\"Подключение к файлу БД SQLite\"\"\"\n    global conn, curs\n    if\
    \ conn:\n        if not reset:\n            return\n        conn = None\n    if\
    \ not name:\n        name = os.getenv(\"CRYPTID_SQLITE_DB\")\n        top_dir\
    \ = Path(__file__).resolve().parents[1] # repo top\n        db_dir = top_dir /\
    \ \"db\"\n        db_name = \"cryptid.db\"\n        db_path = str(db_dir / db_name)\n\
    \        name = os.getenv(\"CRYPTID_SQLITE_DB\", db_path)\n    conn = connect(name,\
    \ check_same_thread=False)\n    curs = conn.cursor()\n\nget_db()\n```\n\nМодуль\
    \ Python — это *синглтон*, вызываемый только один раз, несмотря на многократный\
