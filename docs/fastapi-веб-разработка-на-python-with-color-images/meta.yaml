    +   - глагол-оператор (GET) и путь (/hi);

    - все *параметры запроса* (текст после любого символа ?, в данном случае отсутствует);

    - другие HTTP-заголовки;

    - содержимое тела запроса (отсутствует).


    FastAPI разложит их по удобным определениям:


    +   - Header — HTTP-заголовки;

    - Path — URL-адрес;

    - Query — параметры запроса (после символа ? в конце URL);

    - Body — тело HTTP-сообщения.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_49_0.png)


    То, как FastAPI предоставляет данные из различных частей HTTP-запросов, — одна
    из его лучших особенностей и улучшение по сравнению с тем, как это делают большинство
    веб-фреймворков Python. Все необходимые аргументы можно объявить и предоставить
    непосредственно внутри функции пути, используя определения из предыдущего списка
    (Path, Query и т. д.), а также с помощью написанных вами функций. Для этого применяется
    техника, называемая внедрением зависимостей. Ее мы рассмотрим по ходу повествования
    и расширим описание в главе 6.


    Сделаем предыдущее приложение более личным, добавив параметр who, адресующий важный
