  md: '# ГЛАВА 3


    # Обзор FastAPI


    > FastAPI — это современный быстрый (высокопроизводительный) веб-фреймворк для
    создания API на Python 3.6+, основанный на стандартных подсказках типов Python.


    *Себастьян Рамирес, создатель FastAPI*


    # Обзор


    FastAPI (https://fastapi.tiangolo.com) был представлен в 2018 году Себастьяном
    Рамиресом (https://tiangolo.com). Во многих смыслах это более современный, чем
    большинство веб-фреймворков Python, и он использует добавленный в Python 3 за
    последние несколько лет функционал. Эта глава представляет собой краткий обзор
    основных возможностей FastAPI с акцентом на первом из интересующих вас вопросов:
    как обрабатывать веб-запросы и ответы?


    # Что такое FastAPI


    Как и любой другой веб-фреймворк, FastAPI помогает создавать веб-приложения. Каждый
    фреймворк призван облегчить выполнение некоторых операций за счет особенностей,
    допущений и настроек по умолчанию. Как следует из названия, FastAPI предназначен
    для разработки веб-интерфейсов API, хотя можно использовать его и для традиционных
    приложений с веб-контентом.'
  merge: -1
