  md: "# Несколько маршрутизаторов\n\nБольшинство веб-сервисов работают с несколькими\
    \ видами ресурсов. Хотя вы могли бы поместить весь код обработки путей в один\
    \ файл и отправиться куда-нибудь побездельничать, часто удобно применять несколько\
    \ *субмаршрутов* вместо одной переменной `app`, использованной в большинстве примеров\
    \ ранее.\n\nВ каталоге `web` (в том же каталоге, где расположен ваш рабочий файл\
    \ `main.py`) создайте файл `explorer.py`, как показано в примере 8.7.\n\n**Пример\
    \ 8.7.** Использование APIRouter в файле web/explorer.py\n\n```\nfrom fastapi\
    \ import APIRouter\n\nrouter = APIRouter(prefix = \"/explorer\")\n\n@router.get(\"\
    /\")\ndef top():\n    return \"top explorer endpoint\"\n```\n\nТеперь в примере\
    \ 8.8 приложение верхнего уровня `main.py` узнает, что в системе появился новый\
    \ субмаршрут, обрабатывающий все URL, начинающиеся со строки `/explorer`.\n\n\
    **Пример 8.8.** Подключение основного приложения (main.py) к субмаршруту\n\n```\n\
    from fastapi import FastAPI\nfrom .web import explorer\n\napp = FastAPI()\n\n\
    app.include_router(explorer.router)\n```\n\nUvicorn подхватит этот новый файл.\
    \ Как обычно, проверьте в примере 8.9, а не предполагайте, что он будет работать.\n\
    \n**Пример 8.9.** Тестирование нового субмаршрута\n\n```\n$ http -b localhost:8000/explorer/\n\
    \"top explorer endpoint\"\n```"
