    # DB-API


    Уже более 20 лет в Python существует базовое определение интерфейса реляционной
    базы данных, называемое DB-API: PEP 249 (https://oreil.ly/4Gp9T). Любой, кто пишет
    Python-драйвер для реляционной базы данных, должен как минимум включить поддержку
    DB-API, хотя могут быть задействованы и другие возможности. Вот основные функции
    DB-API.


    +   - Создание соединения `conn` с базой данных с помощью функции `connect()`.

    - Создание курсора `curs` с помощью функции `conn.cursor()`.

    - Выполнение строки SQL `stmt` с помощью функции `curs.execute(stmt)`.'
