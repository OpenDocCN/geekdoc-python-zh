  md: 'Для получения большего количества примеров можно воспользоваться альтернативной
    документацией (https://oreil.ly/ZGCHv) — она читается немного легче, чем официальные
    страницы.


    # ORM


    ORM выражает запросы в терминах моделей данных домена, а не реляционных таблиц
    и логики SQL, лежащих в основе механизма базы данных. В официальной документации
    (https://oreil.ly/x4DCi) приведена подробная информация. ORM гораздо сложнее,
    чем язык выражений SQL. Разработчики, предпочитающие полностью объектно-ориентированные
    модели, обычно выбирают ORM.


    Во многих книгах и статьях о FastAPI, начиная раздел, посвященный базам данных,
    авторы сразу же переходят к ORM SQLAlchemy. Я понимаю, что это привлекательно,
    но также знаю, что это требует изучения еще одной абстракции. SQLAlchemy — отличный
    пакет, но если его абстракции не всегда работают, то у вас возникают две проблемы.
    Самым простым решением может быть использование SQL и переход к языку выражений
    или ORM, если SQL становится слишком сложным.


    # SQLModel


    Автор FastAPI объединил аспекты FastAPI, Pydantic и SQLAlchemy, чтобы создать
    библиотеку SQLModel (https://sqlmodel.tiangolo.com). Он переносит некоторые методы
    разработки из веб-мира в реляционные базы данных. SQLModel сочетает в себе ORM
    от SQLAlchemy с определением и проверкой данных от Pydantic.


    # SQLite


    Пакет SQLite был представлен в главе 10, я использовал его в примерах уровня данных.
    Это общественное достояние — более открытого исходного кода и не придумаешь. SQLite
    применяется в каждом браузере и в каждом смартфоне, что делает его одним из самых
    распространенных программных пакетов в мире. При выборе реляционной базы данных
    этот пакет часто упускают из виду, но вполне возможно, что несколько «серверов»
    SQLite смогут поддерживать некоторые крупные сервисы не хуже, чем такой мощный
    сервер, как PostgreSQL.'
