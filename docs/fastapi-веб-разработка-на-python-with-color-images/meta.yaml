    \ Скуби-Ду: «Ruh-roh! Rougarou!»\n\n## Исследователи\n\nНаша команда исследователей,\
    \ собравшаяся из разных уголков мира, представлена в табл. Б.2.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_277_0.png)\n\
    \n## Таблица Б.2. Люди\n\n| Имя | Страна | Описание |\n| :--- | :--- | :--- |\n\
    | Claude Hande (Клод Ханде) | UK | Его не хватает в полнолуние |\n| Helena Hande-Basquette\
    \ (Хелена Ханде-Баскетт) | UK | Дама¹ с претензией на славу |\n| Beau Buffette\
    \ (Бо Баффет) | US | Никогда не снимает шлем |\n| O. B. Juan Cannoli (О. Б. Хуан\
    \ Канноли) | MX | Мудрый в делах лесных |\n| Simon N. Glorfindel (Саймон Глорфиндел)\
    \ | FR | Курчавый остроухий дровосек |\n| «Pa» Tuohy («Па» Туохи) | IE | Исследователь\
    \ |\n| Radha Tuohy (Радха Туохи) | IN | Мистическая мать-Земля |\n| Noah Weiser\
    \ (Ноа Вайзер) | DE | Близорукий человек с мачете |\n\n> ¹ В смысле благородства,\
    \ а не знатности.\n\n## Публикации исследователей\n\nВот воображаемые публикации\
    \ наших воображаемых исследователей:\n\n- *The Secret of Rat Island*, В. Buffette\
    \ (Баффет Б. Тайна Крысиного острова)\n- *What Was I Thinking?*, О. В. J. Cannoli\
    \ (Канниоли О. Б. Х. О чем я думал?)\n- *Spiders Never Sleep, Journal of Disturbing\
    \ Results*, N. Weiser (Вайзер Н. «Пауки никогда не спят», Журнал тревожных результатов)\n\
    - «*Sehr Böse Spinnen*, Zeitscrift für Vergleichende Kryptozoologie», N. Weiser\
    \ (Вайзер Н. «Очень плохие пауки», временной сценарий для сравнительной криптидной\
    \ зоологии)\n\n## Другие источники\n\nУ преданий о криптидах много источников.\
    \ Некоторых криптидов можно отнести к воображаемым существам, а некоторых можно\
    \ увидеть на нечетких фотографиях, сделанных на большом расстоянии. Среди моих\
    \ источников были следующие:\n\n- страница «Википедии» *List of Cryptids* (https://oreil.ly/7e1ED)\n\
    - страница «Википедии» *List of Legendary Creatures by Type* (https://oreil.ly/1AVfx)\n\
    - веб-сайт *The Cryptid Zoo: A Menagerie of Cryptozoology* (http://www.newanimal.org)\n\
    - книга *The United States of Cryptids*, автор Дж. У. Окер (Quirk Books)\n- книга\
    \ *In the Wake of the Sea-Serpents*, автор Бернар Эйвельманс (Hill & Wang)\n-\
    \ книга *Abominable Snowmen: Legend Come to Life*, Иван Сандерсон (Chilton)\n\
    - видео *Every Country Has a Monster* (https://oreil.ly/yQP7Q), Mystery Science\
    \ Theater\n- ресурсы о наблюдениях за бигфутом:\n    - *Data on Bigfoot sightings\
    \ by Tim Renner* (https://oreil.ly/1wMDb)\n    - *Bigfoot Sightings Dash App*\
    \ (https://oreil.ly/b5IKt)\n    - *Finding Bigfoot with Dash Part 1* (https://oreil.ly/0gjCT),\
    \ *Part 2* (https://oreil.ly/Lespw), *Part 3* (https://oreil.ly/aDV8K)\n    -\
    \ *If It’s There, Could It Be a Bear?* (https://oreil.ly/TlYn7), автор Флоу Фоксон\n\
    \n## Об авторе\n\n**Билл Любанович** занимается разработкой программного обеспечения\
    \ уже более 40 лет, специализируясь на Linux, веб-технологиях и Python. Выступил\
    \ соавтором книги издательства O'Reilly «Системное администрирование в Linux»\
    \ и написал оба издания книги «Простой Python». Несколько лет назад он открыл\
    \ для себя FastAPI и вместе со своей командой использовал его для переписывания\
    \ большого API для биомедицинских исследований. Опыт оказался настолько положительным,\
    \ что они решили применять FastAPI для всех новых проектов. Билл живет со своей\
    \ семьей и кошками в горах Сангре-де-Саскуатч в штате Миннесота."
