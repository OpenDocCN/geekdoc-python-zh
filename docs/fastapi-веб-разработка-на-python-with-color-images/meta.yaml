- md: "## Пример 12.15. Модульные тесты данных для файла data/creature.py\n\n```python\n\
    import os\nimport pytest\nfrom model.creature import Creature\nfrom error import\
    \ Missing, Duplicate\n\n# Установите этот параметр перед импортом данных\nos.environ[\"\
    CRYPTID_SQLITE_DB\"] = \":memory:\"\nfrom data import creature\n\n@pytest.fixture\n\
    def sample() -> Creature:\n    return Creature(name=\"yeti\",\n        aka=\"\
    Abominable Snowman\",\n        country=\"CN\",\n        area=\"Himalayas\",\n\
    \        description=\"Hapless Himalayan\")\n\ndef test_create(sample):\n    resp\
    \ = creature.create(sample)\n    assert resp == sample\n\ndef test_create_duplicate(sample):\n\
    \    with pytest.raises(Duplicate):\n        _ = creature.create(sample)\n\ndef\
    \ test_get_one(sample):\n    resp = creature.get_one(sample.name)\n    assert\
    \ resp == sample\n\ndef test_get_one_missing():\n    with pytest.raises(Missing):\n\
    \        resp = creature.get_one(\"boxturtle\")\n\ndef test_modify(sample):\n\
    \    creature.country = \"JP\" # Япония!\n    resp = creature.modify(sample.name,\
    \ sample)\n    assert resp == sample\n\ndef test_modify_missing():\n    thing:\
    \ Creature = Creature(name=\"snurifle\",\n        description=\"some thing\",\
    \ country=\"somewhere\")\n    with pytest.raises(Missing):\n        _ = creature.modify(thing.name,\
    \ thing)\n\ndef test_delete(sample):\n    resp = creature.delete(sample.name)\n\
    \    assert resp is None\n\ndef test_delete_missing(sample):\n    with pytest.raises(Missing):\n\
    \        _ = creature.delete(sample.name)\n```\n\nВ отличие от модульных тестов\
    \ веб- и сервисного уровней, на этот раз нам не нужны фиктивные модули для замены\
    \ существующих модулей уровня данных. Вместо этого задайте другую переменную окружения,\
    \ чтобы указать уровню данных использовать экземпляр SQLite, основанный только\
    \ на памяти, а не на файлах. Это не требует никаких изменений в существующих модулях\
    \ данных, нужна просто настройка в тесте примера 12.15 *перед* импортом любых\
    \ модулей данных.\n\n## Автоматизированные интеграционные тесты\n\nИнтеграционные\
    \ тесты показывают, хорошо ли различные фрагменты кода взаимодействуют между уровнями.\
    \ Но если вы поищете примеры, то получите множество разных ответов. Нужно ли тестировать\
    \ частичные маршруты вызовов, такие как веб → сервис, веб → данные и т. д.?\n\n\
    Чтобы полностью протестировать каждое соединение в конвейере А → Б → В, потребуется\
    \ проверить следующие комбинации:\n\n- А → Б;\n- Б → В;\n- А → В.\n\nА у вас будет\
    \ полный колчан таких стрелок, если в системе более трех пересечений. Или интеграционные\
    \ тесты должны быть по сути сквозными тестами, но с макетом самой последней части\
    \ — хранения данных на диске?\n\nДо сих пор вы использовали SQLite в качестве\
    \ базы данных и можете задействовать режим работы SQLite In-Memory в качестве\
    \ дублера (подделки) для базы данных SQLite на диске. Если ваши запросы представляют\
    \ собой *стандартный* SQL, то SQLite-In-Memory может быть подходящим вариантом\
    \ макета и для других баз данных. Если нет, то для создания макетов конкретных\
    \ баз данных адаптированы следующие модули:\n\n- PostgreSQL — pgmock (https://pgmock.readthedocs.io);\n\
    - MongoDB — Mongomock (https://github.com/mongomock/mongomock);\n- множество ресурсов\
    \ Pytest Mock (https://pytest-mock-resources.readthedocs.io), которые запускают\
    \ различные тестовые базы данных в контейнерах Docker, и они интегрированы с pytest.\n\
    \nНаконец, можно просто запустить тестовую базу данных того же типа, что и рабочая.\
    \ Переменная окружения может иметь специфику, подобную тому, как вы использовали\
    \ трюк с юнит-тестом/подделкой.\n\n## Паттерн «Репозиторий»\n\nХотя я не использовал\
    \ его в этой книге, но паттерн «Репозиторий» (https://oreil.ly/3JMKH) представляет\
    \ собой интересный подход. Репозиторий — это простое промежуточное хранилище данных\
    \ в оперативной памяти, подобное представленному ранее уровню фиктивных данных.\
    \ Затем он связывается с подключаемыми базками данных для реальных баз данных.\
    \ Репозиторий сопровождается паттерном Unit of Work (https://oreil.ly/jHGV8),\
    \ гарантирующим, что либо будет зафиксирована группа операций в одной сессии,\
    \ либо выполнен откат, как для единого фрагмента.\n\nДо сих пор запросы к базе\
