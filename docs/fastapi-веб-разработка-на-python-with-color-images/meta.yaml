    pytest автоматизированного тестирования кода на уровне модулей, интеграции и полного
    тестирования. Тесты API можно автоматизировать с помощью инструмента Schemathesis.
    Здесь также обсуждалось, как выявить проблемы безопасности и производительности
    до того, как они возникнут.


    # ГЛАВА 13


    ## Запуск в эксплуатацию


    > Если бы строители строили здания так, как программисты пишут программы, то первый
    же появившийся дятел уничтожил бы цивилизацию.


    *Джеральд Вайнберг, ученый в области IT*


    ## Обзор


    У вас есть приложение, работающее на локальной машине, и теперь вы хотите поделиться
    им. В этой главе представлено множество сценариев того, как перенести приложение
    в среду эксплуатации и поддерживать его правильную и эффективную работу. Поскольку
    часть описаний **очень** подробные, в некоторых случаях я буду ссылаться на полезные
    сторонние документы, а не выкладывать их здесь.


    ## Развертывание


    До сих пор во всех примерах кода в этой книге использовался один экземпляр uvicorn,
    запущенный на адресе `localhost` на порте 8000. Для обработки большого количества
    трафика вам потребуется несколько серверов, работающих на нескольких ядрах, предоставляемых
    современным оборудованием. Кроме того, понадобится что-то поверх этих серверов
    для выполнения следующих действий:


    - поддержания их в рабочем состоянии (*супервайзер*);

    - сбора и отправки внешних запросов (*обратный прокси*);

    - возврата ответов;

    - обеспечения HTTPS-терминации (расшифровка SSL).


    ## Множество процессов


    Вы наверняка видели сервер Python под названием Gunicorn (https://gunicorn.org).
    Он может контролировать несколько процессов, но это сервер WSGI, а FastAPI основан
    на ASGI. К счастью, существует специальный класс процессов Uvicorn, которым может
    управлять Gunicorn.


    В примере 13.1 рассматриваются эти процессы Uvicorn на localhost, порт 8000 (взято
    из официальной документации, https://oreil.ly/Svdhx). Кавычки защищают оболочку
    от любой специальной интерпретации.


    **Пример 13.1.** Использование Gunicorn с процессами Uvicorn


    ```

    $ pip install "uvicorn[standard]" gunicorn

    $ gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind
    0.0.0.0:8000

    ```


    Вы увидите множество строк, когда Gunicorn будет выполнять ваши запросы. Будет
    запущен процесс Gunicorn верхнего уровня, который станет общаться с четырьмя рабочими
    подпроцессами Uvicorn, совместно использующими порт 8000 на local host (0.0.0.0).
    Измените хост, порт или количество процессов, если вам нужно что-то другое. Выражение
    main:app ссылается на файл main.py и объект FastAPI с именем переменной app. В
    документации (https://oreil.ly/TxYIy) Gunicorn утверждается: «Для обработки сотен
    или тысяч запросов в секунду Gunicorn потребуется всего 4–12 рабочих процессов».


    Оказывается, сам Uvicorn также может запускать несколько процессов Uvicorn, как
    показано в примере 13.2.


    **Пример 13.2.** Использование Uvicorn с рабочими процессами Uvicorn


    ```

    $ uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

    ```


    Но этот метод не позволяет управлять процессами, поэтому обычно предпочтение отдается
    методу Gunicorn. Для Uvicorn существуют и другие менеджеры процессов — см. официальную
    документацию (https://www.uvicorn.org/deployment).


    Это позволяет выполнять три из четырех задач, упомянутых в предыдущем разделе,
    но не шифрование HTTPS.


    ## HTTPS


    Официальная документация FastAPI по HTTPS (https://oreil.ly/HYRW7), как и вся
    остальная, чрезвычайно информативна. Я рекомендую прочитать ее, а затем описание
    (https://oreil.ly/zcUWS) Рамиресом о том, как добавить поддержку HTTPS в FastAPI
    с помощью обратного прокси под названием Traefik (https://traefik.io). Он располагается
    над вашими веб-серверами, подобно nginx в качестве обратного прокси и балансировщика
    нагрузки, но включает в себя магию HTTPS.


    Хотя этот процесс состоит из множества этапов, он все же намного проще, чем прежде.
    В частности, раньше вам приходилось регулярно платить большие деньги центру сертификации
    за цифровой сертификат, который можно было использовать для поддержки протокола
    HTTPS на своем сайте. К счастью, на смену этим органам пришел бесплатный сервис
    Let''s Encrypt (https://letsencrypt.org).


    ## Docker


    Когда Docker появился на сцене (он был упомянут в молниеносном пятиминутном докладе
    (https://oreil.ly/25oef) Соломона Хайкса из dotCloud на PyCon 2013), большинство
    из нас впервые услышали о контейнерах для Linux. Со временем мы поняли, что Docker
    быстрее и легче виртуальных машин. Вместо эмуляции полноценной операционной системы
    все контейнеры совместно используют ядро Linux сервера, а процессы и сети изолируются
    в собственных пространствах имен. Внезапно у вас появилась возможность с помощью
    бесплатного программного обеспечения Docker разместить несколько независимых сервисов
    на одной машине, не беспокоясь о том, что они будут пересекаться.


    Десять лет спустя Docker получил всеобщее признание и поддержку. Если вы хотите
    разместить свое приложение FastAPI на облачном сервисе, обычно нужно сначала создать
    его *образ в Docker*. В официальной документации FastAPI (https://oreil.ly/QnwOW)
    содержится подробное описание того, как сделать Docker-версию вашего FastAPI-приложения.
    Одним из этапов будет написание *Dockerfile* — текстового файла, содержащего информацию
    о конфигурации Docker, например, какой код приложения использовать и какие процессы
    запускать. Чтобы доказать, что по уровню сложности это не операция на мозге во
    время запуска космической ракеты, приведу Dockerfile с этой страницы:


    ```

    FROM python:3.9

    WORKDIR /code

    COPY ./requirements.txt /code/requirements.txt

    ```'
  mdcn: '这是类型提示带来的又一个意想不到的好处，起初它们似乎只是些锦上添花的东西：类型提示 → OpenAPI 模式 → 自动生成的文档和测试。


    ## 安全测试


    安全并非单一要素，而是一个整体。你不仅需要防范恶意攻击，还要应对普通错误，甚至那些超出你控制范围的事件。我们将扩展性问题留到下一节讨论，这里主要关注潜在威胁的分析。


    第 11 章讨论了身份验证和授权。这些因素总是杂乱无章且容易出错。人们倾向于使用巧妙的方法来对抗巧妙的攻击，而设计一个易于理解和实现的防护措施总是很困难。


    但现在，既然你了解了 Schemathesis，请阅读其关于基于属性的身份验证测试的文档 (https://oreil.ly/v_O-Q)。正如它极大地简化了大部分
    API 的测试一样，它也可以自动化大部分需要身份验证的端点测试。


    ## 负载测试


    负载测试可以检验你的应用如何处理大流量，具体检查：


    - API 调用；

    - 数据库的读写；

    - 内存使用情况；

    - 磁盘空间使用情况；

    - 网络延迟和吞吐量。


    其中一些可能是*端到端*测试，模拟一大群用户渴望使用你的服务。你应该为这一天的到来做好准备。本节内容与第 13 章的“性能”和“故障排除”部分有部分重叠。


    有许多优秀的负载测试工具，但这里我推荐一个名为 Locust (https://locust.io) 的工具。使用它时，你可以用普通的 Python 脚本定义所有测试。它可以模拟成千上万的用户同时访问你的网站甚至多个服务器。


    使用命令 `pip install locust` 在本地安装它。第一个测试可以是检查你的网站可能承受的同时访问者数量。这就像检查建筑物在飓风、地震、暴风雪或其他可怕事件期间能承受多极端的天气条件。因此，你需要对网站进行结构测试。更多详细信息可以在
    Locust 的文档 (https://docs.locust.io) 中找到。


    但是，正如电视上常说的，这还不是全部！最近，Grasshopper (https://github.com/alteryx/locust-grasshopper)
    工具的开发者扩展了 Locust 的功能，使其能够执行诸如测量多个 HTTP 调用时间等任务。要尝试此扩展，请使用命令 `pip install locust-grasshopper`
    进行安装。


    ## 结论


    本章详细介绍了各种测试类型，并给出了使用 pytest 进行模块级、集成和完整测试的自动化代码测试示例。API 测试可以使用 Schemathesis 工具实现自动化。这里还讨论了如何在问题出现之前发现安全性和性能问题。


    # 第 13 章


    ## 投入使用


    > 如果建筑工人建造大楼的方式和程序员编写程序的方式一样，那么第一只出现的啄木鸟就会摧毁整个文明。


    *杰拉尔德·温伯格，IT 领域科学家*


    ## 概述


    你有一个在本地机器上运行的应用程序，现在你想分享它。本章介绍了许多将应用程序迁移到生产环境并确保其正确高效运行的场景。由于部分描述**非常**详细，在某些情况下，我将引用有用的第三方文档，而不是在此处全部列出。


    ## 部署


    到目前为止，本书中所有的代码示例都使用了一个在 `localhost` 地址 8000 端口上运行的 uvicorn 实例。为了处理大量流量，你需要多个服务器在现代硬件提供的多个核心上运行。此外，还需要在这些服务器之上部署一些东西来执行以下操作：


    - 保持它们正常运行（*进程管理器*）；

    - 收集和发送外部请求（*反向代理*）；

    - 返回响应；

    - 提供 HTTPS 终端（解密 SSL）。


    ## 多进程


    你可能见过一个名为 Gunicorn (https://gunicorn.org) 的 Python 服务器。它可以管理多个进程，但它是一个 WSGI 服务器，而
    FastAPI 基于 ASGI。幸运的是，存在一个专门的 Uvicorn 进程类，可以由 Gunicorn 管理。


    示例 13.1 讨论了这些在 localhost 8000 端口上的 Uvicorn 进程（摘自官方文档，https://oreil.ly/Svdhx）。引号可以保护
    shell 免受任何特殊解释。


    **示例 13.1.** 将 Gunicorn 与 Uvicorn 进程一起使用


    ```

    $ pip install "uvicorn[standard]" gunicorn

    $ gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind
    0.0.0.0:8000

    ```


    当 Gunicorn 处理你的请求时，你会看到许多行输出。将启动一个顶层 Gunicorn 进程，它将与四个共享 local host (0.0.0.0)
    上 8000 端口的 Uvicorn 工作子进程进行通信。如果你需要其他设置，请更改主机、端口或进程数量。表达式 main:app 引用文件 main.py
    和名为 app 的 FastAPI 对象。Gunicorn 文档 (https://oreil.ly/TxYIy) 声称：“为了处理每秒数百或数千个请求，Gunicorn
    只需要 4-12 个工作进程。”


    事实证明，Uvicorn 本身也可以运行多个 Uvicorn 进程，如示例 13.2 所示。


    **示例 13.2.** 将 Uvicorn 与 Uvicorn 工作进程一起使用


    ```

    $ uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

    ```


    但这种方法不允许管理进程，因此通常更倾向于使用 Gunicorn 方法。Uvicorn 还有其他进程管理器——请参阅官方文档 (https://www.uvicorn.org/deployment)。


    这允许执行前面章节中提到的四个任务中的三个，但不包括 HTTPS 加密。


    ## HTTPS


    FastAPI 关于 HTTPS 的官方文档 (https://oreil.ly/HYRW7) 与其他文档一样，信息量极大。我建议你阅读它，然后阅读 Ramires
    关于如何使用名为 Traefik (https://traefik.io) 的反向代理为 FastAPI 添加 HTTPS 支持的描述 (https://oreil.ly/zcUWS)。它位于你的
    Web 服务器之上，类似于 nginx 作为反向代理和负载均衡器，但包含了 HTTPS 的魔力。


    尽管这个过程包含许多步骤，但它仍然比以前简单得多。特别是，以前你不得不定期向认证中心支付高额费用，以获取可用于在你的网站上支持 HTTPS 协议的数字证书。幸运的是，免费服务
    Let''s Encrypt (https://letsencrypt.org) 取代了这些机构。


    ## Docker


    当 Docker 登场时（它在 Solomon Hykes 于 2013 年 PyCon 上的五分钟闪电演讲 (https://oreil.ly/25oef)
    中被提及），我们大多数人第一次听说了 Linux 容器。随着时间的推移，我们意识到 Docker 比虚拟机更快、更轻量。所有容器共享服务器的 Linux 内核，而不是模拟完整的操作系统，进程和网络在各自的命名空间中隔离。突然间，你可以使用免费的
    Docker 软件在一台机器上托管多个独立的服务，而不用担心它们会相互干扰。


    十年后，Docker 获得了广泛的认可和支持。如果你想将你的 FastAPI 应用部署到云服务上，通常需要先创建它的 *Docker 镜像*。FastAPI
    官方文档 (https://oreil.ly/QnwOW) 详细描述了如何为你的 FastAPI 应用创建 Docker 版本。其中一个步骤是编写 *Dockerfile*，这是一个包含
    Docker 配置信息的文本文件，例如使用哪些应用程序代码以及启动哪些进程。为了证明这并非像火箭发射时的脑部手术那样复杂，我在此提供该页面上的 Dockerfile：


    ```

    FROM python:3.9

    WORKDIR /code

    COPY ./requirements.txt /code/requirements.txt

    ```'
