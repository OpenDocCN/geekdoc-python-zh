    вопрос «Hello?» кому-то. Попробуем разные способы передачи этого нового параметра:


    +   - в *пути* URL;

    - в качестве *параметра запроса* после символа ? в URL;

    - в *теле* HTTP-сообщения;

    - в HTTP-заголовке.'
