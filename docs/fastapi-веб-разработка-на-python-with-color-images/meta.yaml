    \ в примере 5.8.\n\n**Пример 5.8.** Определение модели существа: model.py\n\n\
    ```python\nfrom pydantic import BaseModel\n\nclass Creature(BaseModel):\n    name:\
    \ str\n    country: str\n    area: str\n    description: str\n    aka: str\n\n\
    thing = Creature(\n    name=\"yeti\",\n    country=\"CN\",\n    area=\"Himalayas\"\
    ,\n    description=\"Hirsute Himalayan\",\n    aka=\"Abominable Snowman\")\nprint(\"\
    Name is\", thing.name)\n```\n\nКласс Creature наследуется от класса BaseModel\
    \ из Pydantic. Часть выражения `: str` после слов `name`, `country`, `area`, `description`\
    \ и `aka` представляет собой подсказку типа — каждое из значений относится к строковому\
    \ типу данных Python.\n\n> В этом примере все поля обязательны для заполнения.\
    \ В Pydantic, если слово `Optional` отсутствует в описании типа, поле должно содержать\
    \ значение.\n\nВ примере 5.9 аргументы передаются в любом порядке, если вы указываете\
    \ их имена.\n\n### Пример 5.9. Создание существа\n\n```python\n>>> thing = Creature(\n\
    ...     name=\"yeti\",\n...     country=\"CN\",\n...     area=\"Himalayas\",\n\
    ...     description=\"Hirsute Himalayan\",\n...     aka=\"Abominable Snowman\"\
    )\n>>> print(\"Name is\", thing.name)\nName is yeti\n```\n\nПока что в примере\
