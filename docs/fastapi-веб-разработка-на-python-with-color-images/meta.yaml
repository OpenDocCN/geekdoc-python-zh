    # Рекомендации


    Для сервисов на базе API лучшим выбором кажется FastAPI. Flask и FastAPI примерно
    равны в плане скорости запуска сервиса. Чтобы разобраться в Django, потребуется
    больше времени, но он предоставляет множество возможностей, полезных для больших
    сайтов, особенно сильно зависящих от баз данных.


    # Другие веб-фреймворки Python


    В настоящее время три основных веб-фреймворка на Python — это Flask, Django и
    FastAPI. Введите в Google запрос **python web frameworks**, и вы получите множество
    предложений, которые я не буду здесь приводить. Среди тех, которые, возможно,
    не выделяются в этих списках, но интересны по тем или иным причинам, можно назвать
    следующие:


    +   - *Bottle* (https://bottlepy.org/docs/dev) — минимальный (один файл Python)
    пакет, хорошо подходящий для того, чтобы быстро доказать концепцию;

    - *Litestar* (https://litestar.dev) — похож на FastAPI — основан на ASGI/Starlette
    и Pydantic, но представляет иной взгляд на поставленную задачу;

    - *AIOHTTP* (https://docs.aiohttp.org) — клиент и сервер ASGI с полезным демонстрационным
    кодом;

    - *Socketify.py* (https://docs.socketify.dev) — новый участник, потенциально очень
    высокопроизводительный.'
