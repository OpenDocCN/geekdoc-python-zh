    \ *受限字符串* (constrained string)。示例 5.17 使用了另一种方式——Pydantic 库的 `Field` 规范。\n\n##\
    \ 示例 5.17. 另一个验证失败，使用了 Field 函数\n\n```\n>>> from pydantic import BaseModel, Field\n\
    >>>\n>>> class Creature(BaseModel):\n...     name: str = Field(..., min_length=2)\n\
    ...     country: str\n...     area: str\n...     description: str\n...     aka:\
    \ str\n...\n>>> bad_creature = Creature(name=\"!\",\n...     area=\"your attic\"\
    ,\n...     description=\"it's a raccoon\")\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\n  File \"pydantic/main.py\", line 342,\n\
    \    in pydantic.main.BaseModel.__init__\npydantic.error_wrappers.ValidationError:\n\
    1 validation error for Creature name\n  ensure this value has at least 2 characters\n\
    \  (type=value_error.any_str.min_length; limit_value=2)\n```\n\n`Field()` 函数的参数\
    \ `...` 表示该值是必需的，且没有提供默认值。\n\n这是对 Pydantic 的一个简要介绍。最重要的功能是能够自动化数据验证。当您从 Web 层或数据层获取数据时，您会看到这有多么有用。\n\
    \n## 结论\n\n模型提供了定义在 Web 应用程序中传递数据的最佳方式。Pydantic 库使用 Python 的类型提示来定义在应用程序中传递的数据模型。接下来是定义\
    \ *依赖项*，以从通用代码中提取具体细节。\n\n# 第 6 章\n\n## 依赖项\n\n### 概述\n\nFastAPI 设计中一个非常令人愉悦的特性是称为\
    \ *依赖项注入* 的技术。这个术语听起来很技术化且深奥，但它是 FastAPI 的一个关键方面，并且在许多层面上都非常有用。本章探讨了 FastAPI 的内置功能以及编写自定义依赖项的方法。\n\
    \n### 什么是依赖项\n\n*依赖项* 是您在特定时刻需要的具体信息。获取此信息的通常方式是编写代码，恰好在需要时提供它。\n\n在编写 Web 服务时，您可能在某个时刻需要执行以下操作：\n\
    \n- 从 HTTP 请求中获取输入参数；\n- 验证输入数据；\n- 为某些端点验证用户的认证和授权；\n- 在数据源（通常是数据库）中查找数据；\n-\
    \ 输出参数、日志或跟踪信息。\n\nWeb 框架将 HTTP 请求的字节转换为数据结构，然后您根据需要在 Web 层函数中从中提取所需内容。\n\n###\
    \ 依赖项的问题\n\n在需要时恰好获得所需内容，而外部代码不一定知道您是如何获得的，这似乎相当合理。但事实证明，这会带来一些后果。\n\n- *测试* ——\
    \ 您无法测试以不同方式查找依赖项的函数变体。\n- *隐藏的依赖项* —— 隐藏详细信息意味着您的函数所需的代码可能会在外部代码更改时中断。\n- *代码重复*\
    \ —— 如果依赖项是共享的（例如，在数据库中查找用户或合并来自 HTTP 请求的值），查找代码可能会在多个函数中重复。\n- *OpenAPI 可见性*\
    \ —— FastAPI 创建的自动测试页面需要来自依赖项注入机制的信息。\n\n### 依赖项注入\n\n术语“依赖项注入”比看起来更简单——它是传递函数所需的任何\
    \ *特定* 信息。传统的做法是传递一个辅助函数，然后调用它来获取具体数据。\n\n### FastAPI 的依赖项\n\nFastAPI 更进一步——它允许将依赖项定义为函数参数，并且它们将被\
    \ FastAPI *自动* 调用并传递其返回的 *值*。例如，依赖项 *user_dep* 可能从 HTTP 参数中获取用户名和密码，在数据库中查找它们，并返回一个令牌，用于后续跟踪该用户。您的\
    \ Web 处理函数从不直接调用依赖项——它在函数调用期间被处理。\n\n您已经看到过一些依赖项，只是以前不这么称呼它们——它们是 HTTP 数据源，如 `Path`、`Query`、`Body`\
    \ 和 `Header`。这些是从 HTTP 请求的不同区域提取请求数据的 Python 函数或类。它们隐藏了诸如数据验证和格式化之类的细节。\n\n为什么不为此编写自己的函数呢？可以，但您将失去：\n\
    \n- 数据验证；\n- 格式转换；\n- 自动文档化。\n\n在许多其他 Web 框架中，这些检查是在您自己的函数内部执行的。它们的工作示例在第 7 章中给出，其中\
    \ FastAPI 与 Flask 和 Django 等 Python Web 框架进行了比较。但在 FastAPI 中，您可以像处理内置依赖项一样处理自定义依赖项。\n\
    \n### 编写依赖项\n\n在 FastAPI 中，依赖项是被执行的东西，因此依赖对象必须是 `Callable` 类型，包括函数和类——即您用括号和可选参数调用的东西。\n\
    \n示例 6.1 展示了一个依赖函数 `user_dep()`。它接受字符串参数 `name` 和 `password`，如果用户通过了有效性检查，则简单地返回\
    \ `True` 值。对于这个初始版本，让函数对所有数据都返回 `True`。\n\n**示例 6.1. 依赖函数**\n\n```\nfrom fastapi\
    \ import FastAPI, Depends, Params\n\napp = FastAPI()\n\n# 依赖函数：\ndef user_dep(name:\
    \ str = Params, password: str = Params):\n    return {\"name\": name, \"valid\"\
    : True}\n\n# Web 应用程序的路径/端点函数：\n@app.get(\"/user\")\ndef get_user(user: dict =\
    \ Depends(user_dep)) -> dict:\n    return user\n```"
