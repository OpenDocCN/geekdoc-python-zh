  - "[PAGE 22]\n\n● *Удаленные вызовы процедур* (remote procedure call, RPC) были\
    \ придуманы для вызова функций в других процессах на той же или другой машине,\
    \ как если бы они находились в вызывающем приложении. Популярным примером в настоящее\
    \ время служит система gRPC (https://grpc.io).\n\n● С помощью *системы передачи\
    \ сообщений* отправляются небольшие фрагменты данных по конвейеру между процессами.\
    \ Сообщения могут быть глагольными командами или просто обозначать интересующие\
    \ вас *события*, похожие на существительные. В настоящее время популярными решениями\
    \ для обмена сообщениями, которые варьируются от наборов инструментов до полноценных\
    \ серверов, являются брокеры Apache Kafka (https://kafka.apache.org), RabbitMQ\
    \ (https://www.rabbitmq.com), NATS (https://nats.io) и ZeroMQ (https://zeromq.org).\
    \ Взаимодействие может строиться по разным схемам:\n    * *запрос — ответ*. Точно\
    \ так, как браузер вызывает веб-сервер;\n    * *издатель — подписчик*, или *pub-sub*.\
    \ Издатель (publisher, или pub) рассылает сообщения, а подписчики (subscribers,\
    \ или sub) обрабатывают каждое из них в соответствии с некоторыми данными, содержащимися\
    \ в сообщении, например с темой;\n    * *очереди*. Работают как подход pub-sub,\
    \ но только один подписчик из пула получает сообщение и действует в соответствии\
    \ с ним.\n\nЛюбой из этих подходов может использоваться вместе с веб-сервисом,\
    \ например, для выполнения медленной задачи бэкенда, такой как отправка электронной\
    \ почты или создание уменьшенного изображения.\n\n# HTTP\n\nБернерс-Ли предложил\
    \ для своей Всемирной паутины три компонента:\n● *HTML* — язык для отображения\
    \ данных;\n● *HTTP* — протокол «клиент — сервер»;\n● *URL* — схему адресации для\
    \ веб-ресурсов.\n\nХотя в ретроспективе все кажется очевидным, на деле это оказалось\
    \ до смешного полезной комбинацией. По мере развития Интернета люди экспериментировали,\
    \ и некоторые идеи, такие как тег IMG, выжили в борьбе по Дарвину. По мере того\
    \ как потребности пользователей прояснялись, люди всерьез занялись определением\
    \ стандартов."
