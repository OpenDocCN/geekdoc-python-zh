    \ Google 可能向您推荐的其他方法那样包含特殊技巧。\n\n## Web 层\n\n此层实现了网站的 API。理想情况下，每个路径函数（端点）至少应有一个测试，如果函数可能以多种方式失败，则应有更多测试。在\
    \ Web 层，通常需要检查端点是否存在、是否使用正确的参数工作以及是否返回正确的状态码和数据。\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_197_0.png)\n\
