    на вызов API от начала и до конца, и не только общую продолжительность, но и длительность
    каждого промежуточного этапа. Если что-то работает медленно, вы можете найти слабое
    звено в цепи. Это называется трассировкой.


    Новый проект с открытым исходным кодом взял на вооружение более ранние продукты
    для трассировки, такие как Jaeger (https://www.jaegertracing.io), и назвал их
    OpenTelemetry (https://opentelemetry.io). Он включает в себя Python API (https://oreil.ly/gyL70)
    и по крайней мере одну интеграцию с FastAPI (https://oreil.ly/L6RXV).


    Чтобы установить и настроить OpenTelemetry с помощью Python, следуйте инструкциям,
    приводимым в документации OpenTelemetry Python (https://oreil.ly/MBgd5).


