  mdcn: "## OAuth2\n\nOAuth 2.0，全称为开放授权（Open Authorization），是一项标准，允许网站或应用程序代表用户访问其他网络应用程序托管的资源。\n\
    \n### Auth0\n\n在互联网早期完全信任的时代，你可以将网站（我们称之为网站B）的登录名和密码提供给另一个网站（当然是网站A），这样网站A就能为你访问网站B上的内容。结果，网站A获得了对网站B的完全访问权限，而它本应只被允许访问其被授权的部分。网站B及其资源的例子可以是Twitter上的关注者、Facebook上的好友、电子邮件联系人等等。当然，这种情况不可能持续太久，因此不同的公司和团体联合起来制定了OAuth标准。最初，它只是为了允许网站A访问网站B的特定（而非全部）资源而设计的。\n\
    \nOAuth2 (https://oauth.net/2) 是一个流行但复杂的授权标准，其应用范围超出了网站A/网站B的示例。关于它有许多解释，从简单 (https://oreil.ly/ehmuf)\
    \ 到复杂 (https://oreil.ly/qAUaM) 不等。\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_172_0.png)\n\
    \n以前存在OAuth1 (https://oauth.net/1) 标准，但它已不再使用。OAuth2的一些初始建议已经过时（换句话说——不要使用它们）。OAuth2.1\
    \ (https://oauth.net/2.1) 标准已初现端倪，而更远的未来则隐约可见txauth (https://oreil.ly/5PW2T)。\n\
    \nOAuth为不同的情况提供了不同的流程 (flows) (https://oreil.ly/kRiWh)。在这里，我将使用授权码流程（Authorization\
    \ Code Flow）。在本节中，我们将逐步实现，每次处理一个中等规模的步骤。\n\n首先，你需要安装以下Python第三方包：\n\n-   JWT处理\
    \ — `pip install python-jose[cryptography]`；\n-   安全密码处理 — `pip install passlib`；\n\
    -   表单处理 — `pip install python-multipart`。\n\n接下来的部分将从用户数据模型和数据库管理开始，然后沿着熟悉的层级上升到服务层和Web层，OAuth将在那里登场。\n\
    \n## 用户模型\n\n让我们从示例11.7中用户模型的最小定义开始。这些定义将应用于所有层级。\n\n```\n示例 11.7. 用户定义：model/user.py\n\
    from pydantic import BaseModel\n\nclass User(BaseModel):\n    name: str\n    hash:\
    \ str\n```\n\nUser对象包含一个任意字段`name`和一个字符串`hash`——这是哈希后的密码，而非明文原始密码，它被存储在数据库中。为了对访问者进行身份验证，我们需要这两种形式。\n\
    \n## 用户数据层\n\n示例11.8包含用户数据库的代码。\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_173_0.png)\n\
    \n代码包含`user`表（活跃用户）和`xuser`表（已删除用户）。通常，开发人员会在用户表中添加一个布尔字段`deleted`来表示用户不再活跃，而不是从表中删除记录。我更倾向于将已删除用户的数据移动到另一个表中。这可以避免在所有用户查询中重复检查`deleted`字段。同时，这也有助于加快查询速度——为基数低的字段（如布尔字段）创建索引不会带来任何好处。\n\
    \n```\n示例 11.8. 数据层：data/user.py\nfrom model.user import User\nfrom .init import\
    \ (conn, curs, get_db, IntegrityError)\nfrom error import Missing, Duplicate\n\
    \ncurs.execute(\"\"\"create table if not exists\n              user(\n       \
    \           name text primary key,\n                  hash text)\"\"\")\n\ncurs.execute(\"\
    \"\"create table if not exists\n    xuser(\n        name text primary key,\n \
    \       hash text)\"\"\")\n\ndef row_to_model(row: tuple) -> User:\n    name,\
    \ hash = row\n    return User(name=name, hash=hash)\n\ndef model_to_dict(user:\
    \ User) -> dict:\n    return user.dict()\n\ndef get_one(name: str) -> User:\n\
    \    qry = \"select * from user where name=:name\"\n    params = {\"name\": name}\n\
    \    curs.execute(qry, params)\n    row = curs.fetchone()\n    if row:\n     \
    \   return row_to_model(row)\n    else:\n        raise Missing(msg=f\"User {name}\
    \ not found\")\n\ndef get_all() -> list[User]:\n    qry = \"select * from user\"\
    \n    curs.execute(qry)\n    return [row_to_model(row) for row in curs.fetchall()]\n\
    \ndef create(user: User, table:str = \"user\"):\n    \"\"\"将<用户>添加到user表或xuser表\"\
    \"\"\n    qry = f\"\"\"insert into {table}\n        (name, hash)\n        values\n\
    \        (:name, :hash)\"\"\"\n    params = model_to_dict(user)\n    try:\n  \
    \      curs.execute(qry, params)\n    except IntegrityError:\n        raise Duplicate(msg=\n\
    \            f\"{table}: user {user.name} already exists\")\n\ndef modify(name:\
    \ str, user: User) -> User:\n    qry = \"\"\"update user set\n            name=:name,\
    \ hash=:hash\n            where name=:name0\"\"\"\n    params = {\n        \"\
    name\": user.name,\n        \"hash\": user.hash,\n        \"name0\": name}\n \
    \   curs.execute(qry, params)\n    if curs.rowcount == 1:\n        return get_one(user.name)\n\
    \    else:\n        raise Missing(msg=f\"User {name} not found\")\n\ndef delete(name:\
    \ str) -> None:\n    \"\"\"将名为<name>的用户从用户表中移除，\n    并将其添加到xuser表\"\"\"\n    user\
    \ = get_one(name)\n    qry = \"delete from user where name = :name\"\n    params\
    \ = {\"name\": name}\n    curs.execute(qry, params)\n    if curs.rowcount != 1:\n\
    \        raise Missing(msg=f\"User {name} not found\")\n    create(user, table=\"\
    xuser\")\n```\n\n## 用户模拟数据层\n\n示例11.9中的模块用于排除数据库的测试，但需要用户数据。\n\n**示例 11.9.** 模拟数据层：fake/user.py\n\
    \n```\nfrom model.user import User\nfrom error import Missing, Duplicate\n\n#\
    \ (此模块中没有对哈希密码的验证)\nfakes = [\n    User(name=\"kwijobo\",\n         hash=\"abc\"\
    ),\n    User(name=\"ermagerd\",\n         hash=\"xyz\"),\n    ]\n\ndef find(name:\
    \ str) -> User | None:\n    for e in fakes:\n        if e.name == name:\n    \
    \        return e\n    return None\n\ndef check_missing(name: str):\n    if not\
    \ find(name):\n        raise Missing(msg=f\"Missing user {name}\")\n\ndef check_duplicate(name:\
    \ str):\n    if find(name):\n        raise Duplicate(msg=f\"Duplicate user {name}\"\
    )\n\ndef get_all() -> list[User]:\n    \"\"\"返回所有用户\"\"\"\n    return fakes\n\n\
    def get_one(name: str) -> User:\n    \"\"\"返回单个用户\"\"\"\n    check_missing(name)\n\
    \    return find(name)\n\ndef create(user: User) -> User:\n    \"\"\"添加用户\"\"\"\
    \n    check_duplicate(user.name)\n    return user\n\ndef modify(name: str, user:\
    \ User) -> User:\n    \"\"\"部分修改用户\"\"\"\n    check_missing(name)\n    return\
    \ user\n\ndef delete(name: str) -> None:\n    \"\"\"删除用户\"\"\"\n    check_missing(name)\n\
    \    return None\n```\n\n## 用户服务层\n\n示例11.10定义了用户的服务层。与其他服务层模块的不同之处在于添加了OAuth2和JWT功能。我认为将它们放在这里比放在Web层更好，尽管Web层中已经有一些OAuth2功能存在于即将完成的项目`web/user.py`中。\n\
    \n目前，CRUD功能仍然是简单的透传，但未来可以根据自己的喜好添加各种指标。请注意，与实体和研究者的服务一样，此结构支持在运行时使用模拟数据层或真实数据层来访问用户数据。\n\
    \n**示例 11.10.** 服务层：service/user.py\n\n```\nfrom datetime import timedelta, datetime\n\
    import os\nfrom jose import jwt\nfrom model.user import User\n\nif os.getenv(\"\
    CRYPTID_UNIT_TEST\"):\n    from fake import user as data\nelse:\n    from data\
    \ import user as data\n\n# --- 新的认证数据\n\nfrom passlib.context import CryptContext\n\
    \n# 请为生产环境更改SECRET_KEY！\nSECRET_KEY = \"keep-it-secret-keep-it-safe\"\nALGORITHM\
    \ = \"HS256\"\npwd_context = CryptContext(schemes=[\"bcrypt\"], deprecated=\"\
    auto\")\n\ndef verify_password(plain: str, hash: str) -> bool:\n    \"\"\"对字符串<plain>进行哈希处理，并与数据库中的记录<hash>进行比较\"\
    \"\"\n    return pwd_context.verify(plain, hash)\n\ndef get_hash(plain: str) ->\
    \ str:\n    \"\"\"返回字符串<plain>的哈希值\"\"\"\n    return pwd_context.hash(plain)\n\
    \ndef get_jwt_username(token:str) -> str | None:\n    \"\"\"从JWT访问令牌<token>中返回用户名\"\
    \"\"\n    try:\n        payload = jwt.decode(token, SECRET_KEY, algorithms=[ALGORITHM])\n\
    \        if not (username := payload.get(\"sub\")):\n            return None\n\
    \    except jwt.JWTError:\n        return None\n    return username\n\ndef get_current_user(token:\
    \ str) -> User | None:\n    \"\"\"解码OAuth访问令牌<token>并返回User对象\"\"\"\n    if not\
    \ (username := get_jwt_username(token)):\n        return None\n    if (user :=\
    \ lookup_user(username)):\n        return user\n    return None\n\ndef lookup_user(username:\
    \ str) -> User | None:\n    \"\"\"从数据库中返回与字符串<name>匹配的用户\"\"\"\n    if (user :=\
    \ data.get(username)):\n        return user\n    return None\n\ndef auth_user(name:\
    \ str, plain: str) -> User | None:\n    \"\"\"对用户<name>和明文密码<plain>进行身份验证\"\"\"\
    \n    if not (user := lookup_user(name)):\n        return None\n```"
