  - '[PAGE 105]


    ● *Шаблоны* — язык шаблонов позволяет смешивать текст и код и полезен для контент-ориентированного
    сайта (HTML-текст с динамически вставляемыми данными), а не для сайта с API. Наиболее
    известным пакетом шаблонов Python является Jinja (https://jinja.palletsprojects.com),
    и он поддерживается Flask, Django и FastAPI. У Django есть и собственный язык
    шаблонов (https://oreil.ly/OlbVJ).


    Если вы хотите использовать сетевые методы, выходящие за рамки базового HTTP,
    попробуйте следующие варианты.


    +   ● *Server-sent events* (SSE) — передает данные клиенту по мере необходимости.
    Поддерживается FastAPI (sse-starlette, https://oreil.ly/Hv-QP), Flask (Flask-SSE,
    https://oreil.ly/oz518) и Django (Django EventStream, https://oreil.ly/NiBE5).

    ● *Очереди* — очереди заданий, публикация-подписка и другие сетевые шаблоны поддерживаются
    такими внешними пакетами, как ZeroMQ, Celery, Redis и RabbitMQ.

    ● *WebSockets* — поддерживаются FastAPI (непосредственно), Django (Django Channels,
    https://channels.readthedocs.io) и Flask (сторонние пакеты).


    # Базы данных


    В базовые пакеты Flask и FastAPI не включена работа с базами данных, но она является
    ключевой особенностью Django.


    Уровень данных вашего сайта может обращаться к базе данных на разных уровнях:


    +   ● непосредственно SQL (PostgreSQL, SQLite);

    ● непосредственно NoSQL (Redis, MongoDB, Elasticsearch);

    ● *ORM*, генерирующее SQL;

    ● объектное связывание документов (Object Document Mapping, ODM), генерирующее
    NoSQL.


    Для реляционных баз данных SQLAlchemy (https://www.sqlalchemy.org) — отличный
    пакет, включающий в себя несколько уровней доступа, от прямого SQL до ORM. Это
    обычный выбор для разработчиков Flask и FastAPI. Автор FastAPI использовал как
    SQLAlchemy, так и Pydantic для пакета SQLModel (https://sqlmodel.tiangolo.com)
    — о нем мы подробнее поговорим в главе 14.'
  - '[PAGE 106]


    Django часто выбирают в качестве фреймворка для сайтов с большими потребностями
    в базах данных. У него есть свой ORM (https://oreil.ly/eFzZn) и автоматизированная
    страница администрирования баз данных (https://oreil.ly/_al42). Хотя некоторые
    источники рекомендуют разрешить нетехническому персоналу использовать страницу
    администратора для рутинного управления данными, будьте осторожны. Однажды я видел,
    как неспециалист неправильно понял предупреждающее сообщение на странице администратора,
    в результате чего базу данных пришлось восстанавливать вручную из резервной копии.


    В главе 14 более подробно рассматриваются FastAPI и базы данных.


    # Рекомендации


    Для сервисов на базе API лучшим выбором кажется FastAPI. Flask и FastAPI примерно
    равны в плане скорости запуска сервиса. Чтобы разобраться в Django, потребуется
    больше времени, но он предоставляет множество возможностей, полезных для больших
    сайтов, особенно сильно зависящих от баз данных.


    # Другие веб-фреймворки Python


    В настоящее время три основных веб-фреймворка на Python — это Flask, Django и
    FastAPI. Введите в Google запрос **python web frameworks**, и вы получите множество
    предложений, которые я не буду здесь приводить. Среди тех, которые, возможно,
    не выделяются в этих списках, но интересны по тем или иным причинам, можно назвать
    следующие:


    +   - *Bottle* (https://bottlepy.org/docs/dev) — минимальный (один файл Python)
    пакет, хорошо подходящий для того, чтобы быстро доказать концепцию;

    - *Litestar* (https://litestar.dev) — похож на FastAPI — основан на ASGI/Starlette
    и Pydantic, но представляет иной взгляд на поставленную задачу;

    - *AIOHTTP* (https://docs.aiohttp.org) — клиент и сервер ASGI с полезным демонстрационным
    кодом;

    - *Socketify.py* (https://docs.socketify.dev) — новый участник, потенциально очень
    высокопроизводительный.'
