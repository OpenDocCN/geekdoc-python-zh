    # ГЛАВА 17


    # Обнаружение и визуализация данных


    # Обзор


    Несмотря на то что в названии фреймворка FastAPI фигурирует акроним *API*, он
    может служить не только для API. В этой главе вы узнаете, как создавать таблицы,
    графики, диаграммы и карты на основе данных, используя небольшую базу данных о
    воображаемых существах со всего мира.


    # Python и данные


    В последние несколько лет Python стал очень популярным по многим причинам:


    +   - он легок в обучении;

    - у него прозрачный синтаксис;

    - он имеет богатую стандартную библиотеку;

    - в нем огромное количество высококачественных пакетов сторонних разработчиков;

    - особое внимание в нем уделяется манипулированию данными, преобразованию и самостоятельной
    проверке.'
- md: "Последний пункт всегда был актуален для традиционных ETL-задач по созданию\
    \ баз данных. Некоммерческая группа PyData (https://pydata.org) даже организует\
    \ конференции и разрабатывает инструменты для анализа данных с открытым исходным\
    \ кодом на Python. Популярность Python отражают также недавний всплеск развития\
    \ искусственного интеллекта и потребность в инструментах для подготовки данных,\
    \ используемых в моделях ИИ.\n\nВ этой главе мы попробуем применить несколько\
    \ пакетов данных Python и посмотрим, как они связаны с современной веб-разработкой\
    \ на Python и FastAPI.\n\n## Текстовый вывод с помощью PSV\n\nВ этом разделе мы\
    \ будем использовать существ, перечисленных в приложении Б. Данные находятся в\
    \ репозитории GitHub этой книги, в файле cryptid.psv с разделителем в виде вертикальной\
    \ черты и в базе данных SQLite cryptid.db. Файлы, где используется разделение\
    \ запятыми (.csv) и табуляцией (.tsv), широко распространены, но запятые используются\
    \ в самих ячейках данных, а табуляцию иногда трудно отличить от других пробельных\
    \ символов. Символ вертикальной черты (|) отличается от прочих и достаточно редко\
    \ встречается в стандартном тексте, чтобы служить хорошим разделителем.\n\nСначала\
    \ попробуем задействовать текстовый файл с расширением .psv, для простоты используя\
    \ только примеры вывода текста, а затем перейдем к полноценным веб-примерам с\
    \ применением базы данных SQLite.\n\nВ начальной строке заголовка файла .psv содержатся\
    \ имена полей:\n\n- name;\n- country (символ * означает множество стран);\n- area\
    \ (не обязательно, штат США или другое территориальное образование страны);\n\
    - description;\n- aka (обозначает «также известен как»).\n\nВ остальных строках\
    \ файла описывается по одному существу, поля располагаются в таком порядке и разделяются\
    \ символом |.\n\n## Модуль csv\n\nПример 17.1 считывает данные о существе в структуры\
    \ данных Python. Во-первых, файл cryptids.psv, где используется разделение символами\
    \ вертикальной черты, можно считать с помощью стандартного пакета csv Python,\
    \ получив список кортежей, где каждый кортеж представляет собой строку данных\
    \ из файла. (Пакет csv включает также класс DictReader, возвращающий список словарей.)\
    \ Первая строка этого файла представляет собой заголовок с именами столбцов. Без\
    \ этого мы могли бы предоставлять заголовки через аргументы для функций csv.\n\
    \nЯ включаю в примеры подсказки типов, но вы можете отказаться от них, если у\
    \ вас более старая версия Python, — код все равно будет работать. Напечатаем только\
    \ заголовок и первые пять строк, чтобы сохранить несколько деревьев¹.\n\n**Пример\
    \ 17.1.** Считывание файла PSV с помощью csv (load_csv.py)\n\n```python\nimport\
    \ csv\nimport sys\n\ndef read_csv(fname: str) -> list[tuple]:\n    with open(fname)\
    \ as file:\n        data = [row for row in csv.reader(file, delimiter=\"|\")]\n\
    \    return data\n\nif __name__ == \"__main__\":\n    data = read_csv(sys.argv[1])\n\
    \    for row in data[0:5]:\n        print(row)\n```\n\nТеперь запустите тест из\
    \ примера 17.2.\n\n**Пример 17.2.** Тестирование загрузки базы данных CSV\n\n\
    ```\n$ python load_csv.py cryptid.psv\n['name', 'country', 'area', 'description',\
    \ 'aka']\n['Abaia', 'FJ', ' ', 'Lake eel', ' ']\n['Afanc', 'UK', 'CYM', 'Welsh\
    \ lake monster', ' ']\n['Agropelter', 'US', 'ME', 'Forest twig flinger', ' ']\n\
    ['Akkorokamui', 'JP', ' ', 'Giant Ainu octopus', ' ']\n['Albatwitch', 'US', 'PA',\
    \ 'Apple stealing mini Bigfoot', ' ']\n```\n\n> ¹ Если есть деревья, похожие на\
    \ энтов из книг Толкина, не хотелось бы, чтобы они ночью подошли к дверям нашего\
    \ дома для небольшой беседы.\n\n## Модуль python-tabulate\n\nОпробуем еще один\
    \ инструмент с открытым исходным кодом, python-tabulate (https://oreil.ly/L0f6k).\
    \ Он специально разработан для табличного вывода. Сначала потребуется запустить\
    \ команду pip install tabulate. В примере 17.3 показан код.\n\n**Пример 17.3.**\
    \ Считывание файла PSV с помощью python-tabulate (load_tabulate.py)\n\n```python\n\
    from tabulate import tabulate\nimport sys\n\ndef read_csv(fname: str) -> list[tuple]:\n\
    \    with open(fname) as file:\n        data = [row for row in csv.reader(file,\
    \ delimiter=\"|\")]\n    return data\n\nif __name__ == \"__main__\":\n    data\
    \ = read_csv(sys.argv[1])\n    print(tabulate(data[0:5]))\n```\n\nВыполните пример\
    \ 17.3 в примере 17.4.\n\n**Пример 17.4.** Запуск скрипта загрузки tabulate\n\n\
    ```\n$ python load_tabulate.py cryptid.psv\n----------  -------  ----  ----------------------\
    \  ---\nName        Country  Area  Description             AKA\nAbaia       FJ\
    \             Lake eel\nAfanc       UK       CYM   Welsh lake monster\nAgropelter\
    \  US       ME    Forest twig flinger\nAkkorokamui JP             Giant Ainu octopus\n\
    ----------  -------  ----  ----------------------  ---\n```\n\n## Модуль pandas\n\
    \nДва предыдущих примера представляли собой в основном форматоры вывода. Библиотека\
    \ pandas (https://pandas.pydata.org) — это отличный инструмент для нарезки данных.\
    \ Он выходит за рамки стандартных структур данных Python, используя такие продвинутые\
    \ конструкции, как DataFrame (https://oreil.ly/j-8eh) — комбинацию таблицы, словаря\
    \ и серии. Он может читать .csv и другие файлы с разделителями в виде символов.\
    \ Пример 17.5 похож на предыдущие примеры, но вместо списка кортежей pandas возвращает\
    \ DataFrame.\n\n**Пример 17.5.** Считывание файла PSV с помощью pandas (load_pandas.py)\n\
    \n```python\nimport pandas\nimport sys\n\ndef read_pandas(fname: str) -> pandas.DataFrame:\n\
    \    data = pandas.read_csv(fname, sep=\"|\")\n    return data\n\nif __name__\
    \ == \"__main__\":\n    data = read_pandas(sys.argv[1])\n    print(data.head(5))\n\
    ```\n\nВыполните пример 17.5 в примере 17.6.\n\n**Пример 17.6.** Запуск скрипта\
    \ загрузки pandas\n\n```\n$ python load_pandas.py cryptid.psv\n          name\
    \ country area          description aka\n0       Abaia      FJ              Lake\
    \ eel\n1       Afanc     UK  CYM     Welsh lake monster\n2  Agropelter      US\
    \   ME  Forest twig flinger\n3  Akkorokamui      JP          Giant Ainu octopus\n\
    4  Albatwitch      US   PA  Apple stealing mini Bigfoot\n```\n\nВ библиотеке pandas\
    \ есть множество интересных функций, так что стоит изучить ее более внимательно.\n\
    \n## Источник данных SQLite и веб-вывод\n\nВ остальных примерах этой главы вы\
    \ будете считывать данные о существах из базы данных SQLite, используя определенные\
