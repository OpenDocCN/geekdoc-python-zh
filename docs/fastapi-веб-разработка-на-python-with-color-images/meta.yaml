  md: '# Виртуальные среды


    Pip загрузит и установит пакеты, но куда он должен их поместить? Хотя стандартный
    Python и входящие в него библиотеки обычно устанавливаются в стандартное место
    в вашей операционной системе, вы не сможете (и, скорее всего, не должны) ничего
    там изменить. Pip использует каталог по умолчанию, отличный от системного, поэтому
    установка не попадет на стандартные файлы Python в вашей системе. Это можно изменить.
    Подробности для своей операционной системы смотрите на сайте pip.


    Часто приходится работать с несколькими версиями Python или устанавливать версии
    для конкретного проекта, поэтому вам точно будет известно, какие пакеты находятся
    в системе. Для этого Python поддерживает *виртуальные среды*. Это просто каталоги
    (*папки* в не-Unix-мире), в которые pip записывает загруженные пакеты. Когда вы
    *активируете* виртуальную среду, ваша оболочка (интерпретатор основных системных
    команд) при загрузке модулей Python в первую очередь обращается к ней. Для этого
    используется программа venv ([https://oreil.ly/9kv5T](https://oreil.ly/9kv5T)),
    которая входит в стандартный пакет установки Python начиная с версии 3.4.


    Создадим виртуальную среду под названием venv1. Вы можете запустить модуль venv
    как отдельную программу:


    ```

    $ venv venv1

    ```


    или в качестве модуля Python:


    ```

    $ python -m venv venv1

    ```


    Чтобы сделать его своей текущей средой Python, выполните эту команду оболочки
    (в Linux или Mac, для Windows и других ОС смотрите документацию venv):


    ```

    $ source venv1/bin/activate

    ```


    Теперь каждый раз, когда вы запускаете pip install, пакеты будут устанавливаться
    в среду venv1. Когда запускаете программы Python, именно там находятся ваш интерпретатор
    Python и модули.


    Чтобы отключить виртуальную среду, нажмите сочетание клавиш Control+D (для Linux
    или Mac) или введите команду deactivate (для Windows).


    Можно создать альтернативные среды разработки, например venv2, и деактивировать/активировать
    их, чтобы переходить от одной к другой (хотя я надеюсь, что у вас лучше фантазия
    в плане названий, чем у меня).'
