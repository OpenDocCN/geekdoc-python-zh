  md: "+   - PlainTextResponse;\n- RedirectResponse;\n- FileResponse;\n- StreamingResponse.\n\
    \nО двух последних я расскажу подробнее в главе 15.\n\nДля других форматов вывода,\
    \ известных также как *MIME-типы* или *медиатипы*, можно использовать общий класс\
    \ `Response`, требующий следующие сущности:\n\n+   - `content` — строка или байт;\n\
    - `media_type` — строка MIME-типа;\n- `status_code` — целочисленный код состояния\
    \ HTTP;\n- `headers` — словарь (dict) строк.\n\n# Преобразование типов\n\nФункция\
    \ пути может возвращать что угодно, и по умолчанию (используя `JSONResponse`)\
    \ FastAPI преобразует ее в строку JSON и возвращает с соответствующими заголовками\
    \ HTTP-ответа `Content-Length` и `Content-Type`. Сюда входит любой класс модели\
    \ Pydantic.\n\nНо как это происходит? Если вы пользовались библиотекой Python\
    \ JSON, то наверняка видели, что она вызывает исключение при предоставлении некоторых\
    \ типов данных, таких как `datetime`. FastAPI задействует встроенную функцию `jsonable_encoder()`\
    \ для преобразования любой структуры данных в JSON-подобную структуру данных Python,\
    \ а затем вызывает обычную функцию `json.dumps()` для превращения этой структуры\
