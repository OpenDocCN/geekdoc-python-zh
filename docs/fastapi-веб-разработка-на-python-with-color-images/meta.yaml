  md: "# Модуль csv\n\nПример 17.1 считывает данные о существе в структуры данных\
    \ Python. Во-первых, файл cryptids.psv, где используется разделение символами\
    \ вертикальной черты, можно считать с помощью стандартного пакета csv Python,\
    \ получив список кортежей, где каждый кортеж представляет собой строку данных\
    \ из файла. (Пакет csv включает также класс DictReader, возвращающий список словарей.)\
    \ Первая строка этого файла представляет собой заголовок с именами столбцов. Без\
    \ этого мы могли бы предоставлять заголовки через аргументы для функций csv.\n\
    \nЯ включаю в примеры подсказки типов, но вы можете отказаться от них, если у\
    \ вас более старая версия Python, — код все равно будет работать. Напечатаем только\
    \ заголовок и первые пять строк, чтобы сохранить несколько деревьев¹.\n\n**Пример\
    \ 17.1.** Считывание файла PSV с помощью csv (load_csv.py)\n\n```\nimport csv\n\
    import sys\n\ndef read_csv(fname: str) -> list[tuple]:\n    with open(fname) as\
    \ file:\n        data = [row for row in csv.reader(file, delimiter=\"|\")]\n \
    \   return data\n\nif __name__ == \"__main__\":\n    data = read_csv(sys.argv[1])\n\
    \    for row in data[0:5]:\n        print(row)\n```\n\nТеперь запустите тест из\
    \ примера 17.2.\n\n**Пример 17.2.** Тестирование загрузки базы данных CSV\n\n\
    ```\n$ python load_csv.py cryptid.psv\n['name', 'country', 'area', 'description',\
    \ 'aka']\n['Abaia', 'FJ', ' ', 'Lake eel', ' ']\n['Afanc', 'UK', 'CYM', 'Welsh\
    \ lake monster', ' ']\n['Agropelter', 'US', 'ME', 'Forest twig flinger', ' ']\n\
    ['Akkorokamui', 'JP', ' ', 'Giant Ainu octopus', ' ']\n['Albatwitch', 'US', 'PA',\
    \ 'Apple stealing mini Bigfoot', ' ']\n```\n\n> ¹ Если есть деревья, похожие на\
    \ энтов из книг Толкина, не хотелось бы, чтобы они ночью подошли к дверям нашего\
    \ дома для небольшой беседы."
