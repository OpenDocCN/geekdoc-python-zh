    /user\")\ndef get_user(user: dict = Depends(user_dep)) -> dict:\n    return user\n\
    ```"
- md: "## Область действия зависимости\n\nВы можете определить зависимости для одной\
    \ функции пути, их группы или всего веб-приложения.\n\n## Единый путь\n\nВключите\
    \ в *функцию пути* такой аргумент:\n\n```\ndef pathfunc(name: depfunc = Depends(depfunc)):\n\
    ```\n\nили просто в таком виде:\n\n```\ndef pathfunc(name: depfunc = Depends()):\n\
    ```\n\n`name` — это то, как вы хотите назвать значение (значения), возвращаемое\
    \ `depfunc`. Из предыдущего примера:\n\n- `pathfunc` — это `get_user()`;\n- `depfunc`\
    \ — это `user_dep()`;\n- `name` — это `user`.\n\nПример 6.2 учитывает этот путь\
    \ и зависимость для возврата фиксированного имени (`name`) пользователя и логического\
    \ значения `valid`.\n\n## Пример 6.2. Возвращение зависимости пользователя\n\n\
    ```\nfrom fastapi import FastAPI, Depends, Params\n\napp = FastAPI()\n\n# функция\
    \ зависимости:\ndef user_dep(name: str = Params, password: str = Params):\n  \
    \  return {\"name\": name, \"valid\": True}\n\n# функция пути/конечная точка веб-приложения:\n\
    @app.get(\"/user\")\ndef get_user(user: dict = Depends(user_dep)) -> dict:\n \
    \   return user\n```\n\nЕсли функция зависимости просто проверяет что-то и не\
    \ возвращает никаких значений, вы можете определить зависимость в *декораторе*\
    \ пути (предыдущая строка, начинающаяся с @):\n\n```\n@app.method(url, dependencies=[Depends(depfunc)])\n\
    ```\n\nПопробуем сделать это в примере 6.3.\n\n## Пример 6.3. Определение зависимости\
    \ проверки пользователя\n\n```\nfrom fastapi import FastAPI, Depends, Params\n\
    \napp = FastAPI()\n\n# функция зависимости:\ndef check_dep(name: str = Params,\
    \ password: str = Params):\n    if not name:\n        raise\n\n# функция пути/конечная\
    \ точка веб-приложения:\n@app.get(\"/check_user\", dependencies=[Depends(check_dep)])\n\
    def check_user() -> bool:\n    return True\n```\n\n## Множество путей\n\nВ главе\
    \ 9 подробно рассказывается о том, как структурировать более крупное приложение\
    \ FastAPI, включая определение нескольких объектов *маршрутизатора* (router) в\
    \ приложении верхнего уровня, вместо того чтобы прикреплять каждую конечную точку\
    \ к этому приложению. Пример 6.4 иллюстрирует эту концепцию.\n\n## Пример 6.4.\
    \ Определение зависимости субмаршрута\n\n```\nfrom fastapi import FastAPI, Depends,\
    \ APIRouter\n\nrouter = APIRouter(..., dependencies=[Depends(depfunc)])\n```\n\
    \nЭто приведет к вызову функции depfunc() для всех функций пути ниже объекта router.\n\
    \n## Способ глобального внедрения зависимостей\n\nПри определении объекта приложения\
    \ FastAPI верхнего уровня можно добавить к нему зависимости, применяемые ко всем\
    \ его функциям пути, как показано в примере 6.5.\n\n## Пример 6.5. Определение\
    \ зависимости уровня приложения\n\n```\nfrom fastapi import FastAPI, Depends\n\
    \ndef depfunc1():\n    pass\n\ndef depfunc2():\n    pass\n\napp = FastAPI(dependencies=[Depends(depfunc1),\
    \ Depends(depfunc2)])\n\n@app.get(\"/main\")\ndef get_main():\n    pass\n```\n\
    \nВ этом случае используется инструкция pass, позволяющая проигнорировать другие\
    \ детали, чтобы показать, как подключить зависимости.\n\n## Заключение\n\nВ этой\
    \ главе мы обсудили зависимости и их внедрение — способы получения необходимых\
    \ вам данных в нужный момент и простым способом. В следующей главе Flask, Django\
    \ и FastAPI заходят в бар...\n\n# ГЛАВА 7\n\n## Сравнение фреймворков\n\n> Вам\
    \ не нужен каркас. Вам нужна картина, а не ее рама¹.\n\nКлаус Кински, актер\n\n\
    ## Обзор\n\nДля разработчиков, ранее использовавших Flask, Django или другие популярные\
    \ веб-фреймворки Python, эта глава указывает на их сходство с FastAPI и отличия\
    \ от него. Здесь не рассматриваются все утомительные подробности, потому что иначе\
    \ клей для переплета не удержит эту книгу целой. Сравнения, приведенные здесь,\
    \ могут быть полезны, если вы думаете о переносе приложения с одного из этих фреймворков\
    \ на FastAPI или просто любопытствуете.\n\nОдна из первых вещей, которую вы можете\
    \ узнать о новом веб-фреймворке, — это как начать работу, и путь сверху вниз —\
    \ это определение маршрутов (связки между URL-адресами и HTTP-методами и функциями).\
    \ В следующем разделе мы сравним, как выполнить эту задачу с помощью FastAPI и\
    \ Flask, поскольку они более похожи друг на друга, чем Django, и, скорее всего,\
    \ будут рассматриваться вместе для похожих приложений.\n\n¹ Цитата отражает некую\
    \ игру слов, поскольку в английском языке слово framework означает каркас, а не\
    \ только привычный разработчикам фреймворк. — Примеч. пер.\n\n## Flask\n\nРазработчики\
    \ Flask (https://flask.palletsprojects.com) называют его *микрофреймворком*. Он\
    \ предоставляет базовые возможности, а вы загружаете сторонние пакеты, чтобы дополнить\
    \ их по мере необходимости. Он меньше, чем Django, и в начале работы его можно\
    \ быстрее освоить.\n\nFlask относится к типу синхронных и создан на базе стандарта\
    \ WSGI, а не ASGI. Новый проект под названием quart (https://quart.palletsprojects.com)\
    \ воспроизводит Flask и добавляет в него поддержку стандарта ASGI.\n\nНачнем с\
    \ самого начала, показав, как Flask и FastAPI определяют веб-маршрутизацию.\n\n\
    ## Путь\n\nНа верхнем уровне Flask и FastAPI используют декоратор, чтобы связать\
    \ маршрут с конечной веб-точкой. В примере 7.1 продублируем пример 3.11, в котором\
    \ человек получает приветствие из URL-пути.\n\n**Пример 7.1. Путь FastAPI**\n\n\
    ```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi/{who}\"\
    )\ndef greet(who: str):\n    return f\"Hello? {who}?\"\n```\n\nПо умолчанию FastAPI\
    \ преобразует строку `f\"Hello? {who}?\"` в формат JSON и возвращает ее веб-клиенту.\n\
    \nВ примере 7.2 показано, как это делает Flask.\n\n**Пример 7.2. Путь Flask**\n\
    \n```\nfrom flask import Flask, jsonify\n\napp = Flask(__name__)\n\n@app.route(\"\
    /hi/<who>\", methods=[\"GET\"])\ndef greet(who: str):\n    return jsonify(f\"\
    Hello? {who}?\")\n```\n\nОбратите внимание на то, что слово who в декораторе теперь\
    \ заключено в угловые скобки (< и >). Во Flask метод должен быть включен в качестве\
    \ аргумента, если только по умолчанию не используется GET. Следовательно, выражение\
    \ methods= [\"GET\"] можно было бы и опустить, но ясность никогда не помешает.\n\
    \n![](img/eacb50a37d89d355fa68de0c62d56b32_102_0.png)\n\nФункция jsonify() из\
    \ Flask преобразует аргумент в строку формата JSON и возвращает ее вместе с заголовком\
    \ HTTP-ответа, указывающим на то, что это формат JSON. Если вы возвращаете данные\
    \ типа dict (а не другие типы данных), последние версии Flask автоматически конвертируют\
    \ его в JSON и возвращают. Вызов функции jsonify() явно работает для всех типов\
    \ данных, включая dict.\n\n## Параметр запроса\n\nВ примере 7.3 повторим пример\
    \ 3.15, где who передается в качестве параметра запроса (после символа ? в URL-адресе).\n\
    \n**Пример 7.3. Параметр запроса FastAPI**\n\n```\nfrom fastapi import FastAPI\n\
    \napp = FastAPI()\n\n@app.get(\"/hi\")\ndef greet(who):\n    return f\"Hello?\
    \ {who}?\"\n```\n\nЭквивалент Flask показан в примере 7.4.\n\n**Пример 7.4. Параметр\
    \ запроса Flask**\n\n```\nfrom flask import Flask, request, jsonify\n\napp = Flask(__name__)\n\
    \n@app.route(\"/hi\", methods=[\"GET\"])\ndef greet():\n    who: str = request.args.get(\"\
    who\")\n    return jsonify(f\"Hello? {who}?\")\n```\n\nВо Flask нам нужно получить\
    \ значения запроса из объекта request. В данном случае аргумент args относится\
    \ к типу dict и содержит параметры запроса.\n\n## Тело запроса\n\nВ примере 7.5\
    \ скопируем старый пример 3.21.\n\n**Пример 7.5. Тело запроса FastAPI**\n\n```\n\
    from fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi\")\ndef greet(who):\n\
    \    return f\"Hello? {who}?\"\n```\n\nВерсия Flask выглядит как в примере 7.6.\n\
    \n**Пример 7.6. Тело запроса Flask**\n\n```\nfrom flask import Flask, request,\
    \ jsonify\n\napp = Flask(__name__)\n\n@app.route(\"/hi\", methods=[\"GET\"])\n\
    def greet():\n    who: str = request.json[\"who\"]\n    return jsonify(f\"Hello?\
    \ {who}?\")\n```\n\nFlask хранит входные данные в формате JSON в файле `request.json`.\n\
    \n## Заголовок\n\nНаконец, повторим пример 3.24 в примере 7.7.\n\n**Пример 7.7.\
    \ Заголовок FastAPI**\n\n```\nfrom fastapi import FastAPI, Header\n\napp = FastAPI()\n\
    \n@app.get(\"/hi\")\ndef greet(who:str = Header()):\n    return f\"Hello? {who}?\"\
    \n```\n\nВерсия Flask показана в примере 7.8.\n\n**Пример 7.8. Заголовок Flask**\n\
    \n```\nfrom flask import Flask, request, jsonify\n\napp = Flask(__name__)\n```"
  mdcn: "## 依赖项的作用域\n\n你可以为单个路径函数、一组路径函数或整个 Web 应用程序定义依赖项。\n\n## 单个路径\n\n在*路径函数*中包含这样一个参数：\n\
    \n```\ndef pathfunc(name: depfunc = Depends(depfunc)):\n```\n\n或者简单地这样写：\n\n```\n\
    def pathfunc(name: depfunc = Depends()):\n```\n\n`name` 是你希望为 `depfunc` 返回的值（或值）所起的名称。根据前面的例子：\n\
    \n- `pathfunc` 是 `get_user()`；\n- `depfunc` 是 `user_dep()`；\n- `name` 是 `user`。\n\
    \n示例 6.2 考虑了这个路径和依赖项，用于返回固定的用户名（`name`）和布尔值 `valid`。\n\n## 示例 6.2. 返回用户依赖项\n\n\
    ```\nfrom fastapi import FastAPI, Depends, Params\n\napp = FastAPI()\n\n# 依赖函数：\n\
    def user_dep(name: str = Params, password: str = Params):\n    return {\"name\"\
    : name, \"valid\": True}\n\n# 路径函数/Web 应用程序端点：\n@app.get(\"/user\")\ndef get_user(user:\
    \ dict = Depends(user_dep)) -> dict:\n    return user\n```\n\n如果依赖函数只是检查某些内容而不返回任何值，你可以在路径的*装饰器*中定义依赖项（上一行以\
    \ @ 开头的代码）：\n\n```\n@app.method(url, dependencies=[Depends(depfunc)])\n```\n\n\
    让我们在示例 6.3 中尝试这样做。\n\n## 示例 6.3. 定义用户检查依赖项\n\n```\nfrom fastapi import FastAPI,\
    \ Depends, Params\n\napp = FastAPI()\n\n# 依赖函数：\ndef check_dep(name: str = Params,\
    \ password: str = Params):\n    if not name:\n        raise\n\n# 路径函数/Web 应用程序端点：\n\
    @app.get(\"/check_user\", dependencies=[Depends(check_dep)])\ndef check_user()\
    \ -> bool:\n    return True\n```\n\n## 多个路径\n\n第 9 章详细介绍了如何构建更大的 FastAPI 应用程序，包括在顶层应用程序中定义多个*路由器*对象，而不是将每个端点都附加到该应用程序。示例\
    \ 6.4 说明了这个概念。\n\n## 示例 6.4. 定义子路由依赖项\n\n```\nfrom fastapi import FastAPI, Depends,\
    \ APIRouter\n\nrouter = APIRouter(..., dependencies=[Depends(depfunc)])\n```\n\
    \n这将导致对 router 对象下的所有路径函数调用 depfunc() 函数。\n\n## 全局依赖注入方式\n\n在定义顶层 FastAPI 应用程序对象时，可以为其添加依赖项，这些依赖项将应用于其所有路径函数，如示例\
    \ 6.5 所示。\n\n## 示例 6.5. 定义应用程序级别的依赖项\n\n```\nfrom fastapi import FastAPI, Depends\n\
    \ndef depfunc1():\n    pass\n\ndef depfunc2():\n    pass\n\napp = FastAPI(dependencies=[Depends(depfunc1),\
    \ Depends(depfunc2)])\n\n@app.get(\"/main\")\ndef get_main():\n    pass\n```\n\
    \n在这种情况下，使用了 pass 语句来忽略其他细节，以展示如何连接依赖项。\n\n## 结论\n\n在本章中，我们讨论了依赖项及其注入——在需要时以简单方式获取所需数据的方法。在下一章中，Flask、Django\
    \ 和 FastAPI 将走进酒吧...\n\n# 第 7 章\n\n## 框架比较\n\n> 你不需要一个框架。你需要的是一幅画，而不是它的画框¹。\n\n\
    克劳斯·金斯基，演员\n\n## 概述\n\n对于之前使用过 Flask、Django 或其他流行 Python Web 框架的开发者，本章指出了它们与 FastAPI\
    \ 的相似之处和不同之处。这里没有讨论所有繁琐的细节，否则胶水就无法将这本书粘合在一起。如果你正在考虑将应用程序从这些框架之一迁移到 FastAPI，或者只是出于好奇，这里提供的比较可能会有所帮助。\n\
    \n关于一个新的 Web 框架，你可能首先了解的事情之一是如何开始工作，而自上而下的路径是定义路由（将 URL 地址与 HTTP 方法和函数关联起来）。在下一节中，我们将比较如何使用\
    \ FastAPI 和 Flask 完成这项任务，因为它们彼此之间比 Django 更相似，并且很可能在处理类似应用程序时被放在一起讨论。\n\n¹ 这句话反映了某种文字游戏，因为在英语中，framework\
    \ 一词既指框架，也指开发者熟悉的框架。——译者注。\n\n## Flask\n\nFlask (https://flask.palletsprojects.com)\
    \ 的开发者称其为*微框架*。它提供基本功能，你可以根据需要加载第三方包来补充它们。它比 Django 更小，在开始时可以更快地掌握。\n\nFlask 属于同步类型，基于\
    \ WSGI 标准构建，而不是 ASGI。一个名为 quart (https://quart.palletsprojects.com) 的新项目复制了 Flask\
    \ 并添加了对 ASGI 标准的支持。\n\n让我们从头开始，展示 Flask 和 FastAPI 如何定义 Web 路由。\n\n## 路径\n\n在顶层，Flask\
    \ 和 FastAPI 都使用装饰器将路由与 Web 端点关联起来。在示例 7.1 中，我们将复制示例 3.11，其中一个人从 URL 路径获得问候。\n\n\
    **示例 7.1. FastAPI 路径**\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi/{who}\")\ndef greet(who: str):\n    return f\"Hello? {who}?\"\
    \n```\n\n默认情况下，FastAPI 将字符串 `f\"Hello? {who}?\"` 转换为 JSON 格式并返回给 Web 客户端。\n\n\
    示例 7.2 展示了 Flask 如何做到这一点。\n\n**示例 7.2. Flask 路径**\n\n```\nfrom flask import Flask,\
    \ jsonify\n\napp = Flask(__name__)\n\n@app.route(\"/hi/<who>\", methods=[\"GET\"\
    ])\ndef greet(who: str):\n    return jsonify(f\"Hello? {who}?\")\n```\n\n请注意，装饰器中的单词\
    \ who 现在被尖括号（< 和 >）括起来。在 Flask 中，除非默认使用 GET，否则必须将方法作为参数包含在内。因此，表达式 methods= [\"\
    GET\"] 本来可以省略，但清晰总没有坏处。\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_102_0.png)\n\
    \nFlask 的 jsonify() 函数将参数转换为 JSON 格式的字符串，并将其与指示这是 JSON 格式的 HTTP 响应头一起返回。如果你返回的是\
    \ dict 类型的数据（而不是其他数据类型），最新版本的 Flask 会自动将其转换为 JSON 并返回。显式调用 jsonify() 函数适用于所有数据类型，包括\
    \ dict。\n\n## 查询参数\n\n在示例 7.3 中，我们将重复示例 3.15，其中 who 作为查询参数传递（在 URL 地址的 ? 符号之后）。\n\
    \n**示例 7.3. FastAPI 查询参数**\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi\")\ndef greet(who):\n    return f\"Hello? {who}?\"\n```\n\nFlask\
    \ 的等效示例如示例 7.4 所示。\n\n**示例 7.4. Flask 查询参数**\n\n```\nfrom flask import Flask,\
    \ request, jsonify\n\napp = Flask(__name__)\n\n@app.route(\"/hi\", methods=[\"\
    GET\"])\ndef greet():\n    who: str = request.args.get(\"who\")\n    return jsonify(f\"\
    Hello? {who}?\")\n```\n\n在 Flask 中，我们需要从 request 对象获取请求值。在这种情况下，参数 args 是一个 dict\
    \ 类型，包含查询参数。\n\n## 请求体\n\n在示例 7.5 中，我们将复制旧的示例 3.21。\n\n**示例 7.5. FastAPI 请求体**\n\
    \n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi\")\ndef\
    \ greet(who):\n    return f\"Hello? {who}?\"\n```\n\nFlask 版本如示例 7.6 所示。\n\n**示例\
    \ 7.6. Flask 请求体**\n\n```\nfrom flask import Flask, request, jsonify\n\napp =\
    \ Flask(__name__)\n\n@app.route(\"/hi\", methods=[\"GET\"])\ndef greet():\n  \
    \  who: str = request.json[\"who\"]\n    return jsonify(f\"Hello? {who}?\")\n\
    ```\n\nFlask 将 JSON 格式的输入数据存储在 `request.json` 文件中。\n\n## 请求头\n\n最后，在示例 7.7 中重复示例\
    \ 3.24。\n\n**示例 7.7. FastAPI 请求头**\n\n```\nfrom fastapi import FastAPI, Header\n\
    \napp = FastAPI()\n\n@app.get(\"/hi\")\ndef greet(who:str = Header()):\n    return\
    \ f\"Hello? {who}?\"\n```\n\nFlask 版本如示例 7.8 所示。\n\n**示例 7.8. Flask 请求头**\n\n\
    ```\nfrom flask import Flask, request, jsonify\n\napp = Flask(__name__)\n```"
