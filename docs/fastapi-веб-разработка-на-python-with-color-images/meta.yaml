    \ *Part 3* (https://oreil.ly/aDV8K)\n    - *If It’s There, Could It Be a Bear?*\
    \ (https://oreil.ly/TlYn7)，作者 Flo Foxen\n\n## 关于作者\n\n**比尔·卢巴诺维奇**从事软件开发已有40多年，专注于\
    \ Linux、Web 技术和 Python。他是 O'Reilly 出版社《Linux 系统管理》一书的合著者，并撰写了《简单 Python》的两个版本。几年前，他发现了\
    \ FastAPI，并与他的团队一起使用它来重写一个用于生物医学研究的大型 API。这次经历非常成功，以至于他们决定在所有新项目中都使用 FastAPI。比尔与他的家人和猫一起住在明尼苏达州的圣格雷-德-萨斯夸奇山脉。"
