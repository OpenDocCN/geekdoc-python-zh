    \n# ГЛАВА 9\n\n## Сервисный уровень\n\n> Что это было в середине?\n> Отто Уэст\
    \ (фильм «Рыбка по имени Ванда»)\n\n## Обзор\n\nВ этой главе рассказывается о\
    \ сервисном уровне — среднем. Ущерб от протекающей крыши здания может вылиться\
    \ в кругленькую сумму. Утечки в программном обеспечении не так очевидны, но исправление\
    \ вызванных ими проблем может потребовать много времени и усилий. Как построить\
    \ приложение так, чтобы на уровнях не возникало утечек? В частности, что должно\
    \ и что не должно попадать на сервисный уровень, расположенный посередине?\n\n\
    ## Определение сервиса\n\nСервисный уровень — это сердце сайта, смысл его существования.\
