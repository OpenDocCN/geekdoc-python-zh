  md: '# Тестируем!


    Было введено очень много кода без тестов. Все ли работает? Я бы удивился, если
    бы это было так. Итак, создадим несколько тестов.


    Сделайте в каталоге **test** следующие подкаталоги:


    +   - unit — внутри уровня;

    - full — по всем уровням.


    Какой тип следует написать и запустить первым? Большинство людей сначала пишут
    автоматизированные модульные тесты — они меньше, а всех остальных частей слоя
    может еще не существовать. В этой книге разработка велась сверху вниз, и сейчас
    мы завершаем последний слой. Кроме того, в главах 8 и 9 мы тестировали вручную
    с помощью HTTPie и похожих инструментов. Они помогают быстро выявить ошибки и
    упущения. Автоматизированные тесты гарантируют, что вы не будете повторять те
    же ошибки в дальнейшем. Поэтому я рекомендую:


    +   - провести несколько тестов вручную в процессе написания кода;

    - выполнить модульные тесты после исправления синтаксических ошибок Python;

    - провести полное тестирование после того, как будет получен полный поток данных
    на всех уровнях.


    # Полные тесты


    Они вызывают конечные веб-точки, спускающие лифт кода вниз, через сервисный уровень
    к уровню данных, и поднимающие обратно вверх. Иногда их называют *сквозными* или
    *контрактными* тестами.


    # Получение всех исследователей


    Окунуться в тестовые воды, еще не зная, кишат ли они пираньями, сможет смелый
    доброволец — пример 10.6.


    **Пример 10.6.** Тестирование получения всех исследователей


    ```

    $ http localhost:8000/explorer

    HTTP/1.1 405 Method Not Allowed

    allow: POST

    ```'
