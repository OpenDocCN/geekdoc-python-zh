- img_proc: true
  md: "Обратите внимание на то, что слово who в декораторе теперь заключено в угловые\
    \ скобки (< и >). Во Flask метод должен быть включен в качестве аргумента, если\
    \ только по умолчанию не используется GET. Следовательно, выражение methods= [\"\
    GET\"] можно было бы и опустить, но ясность никогда не помешает.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_102_0.png)\n\
    \nФункция jsonify() из Flask преобразует аргумент в строку формата JSON и возвращает\
    \ ее вместе с заголовком HTTP-ответа, указывающим на то, что это формат JSON.\
    \ Если вы возвращаете данные типа dict (а не другие типы данных), последние версии\
    \ Flask автоматически конвертируют его в JSON и возвращают. Вызов функции jsonify()\
    \ явно работает для всех типов данных, включая dict.\n\n# Параметр запроса\n\n\
    В примере 7.3 повторим пример 3.15, где who передается в качестве параметра запроса\
    \ (после символа ? в URL-адресе).\n\n**Пример 7.3. Параметр запроса FastAPI**\n\
    \n```\npython\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi\"\
    )\ndef greet(who):\n    return f\"Hello? {who}?\"\n```\n\nЭквивалент Flask показан\
