    При запуске в качестве самостоятельной программы Python называет ее main. Выражение
    if __name__... — это указание Python запустить Uvicorn только при вызове в качестве
    основной программы. Да, это некрасиво.


    Этот код делает секундную паузу, после чего вернется к своему робкому приветствию.
    Единственное отличие от синхронной функции с применением стандартной функции sleep(1)
    заключается в том, что в асинхронном примере веб-сервер в это время может обрабатывать
    другие запросы.


    Использование asyncio.sleep(1) имитирует реальную функцию, занимающую одну секунду,
    например вызов базы данных или загрузку веб-страницы. В последующих главах будут
    приведены примеры таких вызовов с веб-уровня на сервисный уровень, а оттуда на
    уровень данных, в результате чего время ожидания тратится на реальную работу.


    FastAPI сам вызывает асинхронную функцию пути greet(), когда получает GET-запрос
    на URL /hi. Вам не нужно добавлять ключевое слово await куда-либо. Но для любых
    других определений функций async def вызывающая сторона должна поместить оператор
    await перед каждым вызовом.


