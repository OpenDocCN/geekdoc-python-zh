- img_proc: true
  md: '● только одного;

    ● возможно, многих;

    ● всех.


    Как заставить наш благонамеренный, но крайне прямолинейно мыслящий компьютер выполнять
    такие задачи? В первом случае, согласно описанному ранее шаблону RESTful, в URL-путь
    нужно включить идентификатор ресурса. При получении нескольких ресурсов может
    потребоваться увидеть результаты в определенном порядке.


    +   ● *Сортировка* — упорядочение всех результатов, даже если за один раз вы получите
    только часть из них.

    ● *Пагинация* — возвращение лишь некоторых результатов за раз с соблюдением любого
    типа сортировки.


    В каждом случае группа параметров, задаваемых пользователем, указывает на то,
    что вам нужно. Обычно их задают в качестве параметров запроса. Вот несколько примеров.


    +   ● *Сортировка* `GET /explorer?sort=country` — получение всех исследователей,
    отсортированных по коду страны.

    ● *Пагинация* `GET /explorer?offset=10&size=10` — возвращение из всего списка
    лишь записей исследователей (в данном случае неотсортированных), находящихся на
    позициях с 10-й по 19-ю.

    ● *Оба запроса* — `GET /explorer?sort=country&offset=10&size=10`.


    Их можно задать в виде отдельных параметров запроса, и в этом вам поможет внедрение
    зависимостей FastAPI.


    +   ● Определите параметры сортировки и пагинации как модель Pydantic.

    ● Предоставьте модель параметров функции пути `get_all()` с функциональной возможностью
    `Depends` в аргументах функции пути.


    Где должны располагаться сортировка и пагинация? Поначалу может показаться, что
    проще всего передавать все результаты запросов к базе данных на веб-уровень и
    использовать Python для обработки данных там. Но это не очень эффективный подход.
    Эти задачи обычно лучше всего решаются на уровне данных, потому что базы данных
