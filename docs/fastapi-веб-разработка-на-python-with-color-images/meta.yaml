  md: '# ГЛАВА 9


    # Сервисный уровень


    > Что это было в середине?

    Отто Уэст (фильм «Рыбка по имени Ванда»)


    # Обзор


    В этой главе рассказывается о сервисном уровне — среднем. Ущерб от протекающей
    крыши здания может вылиться в кругленькую сумму. Утечки в программном обеспечении
    не так очевидны, но исправление вызванных ими проблем может потребовать много
    времени и усилий. Как построить приложение так, чтобы на уровнях не возникало
    утечек? В частности, что должно и что не должно попадать на сервисный уровень,
    расположенный посередине?


    # Определение сервиса


    Сервисный уровень — это сердце сайта, смысл его существования. Он принимает запросы
    из разных источников, получает доступ к данным, представляющим собой ДНК сайта,
    и возвращает ответы.


    Общие шаблоны сервисов включают в себя сочетание следующих элементов:


    +   - создать/извлечь/изменить (частично или полностью)/удалить;

    - один/несколько элементов.'
  merge: -1
  pgno: 134
- img_proc: true
  md: 'На уровне маршрутизатора RESTful существительные — это *ресурсы*. В этой книге
    ресурсы изначально будут включать в себя криптидов (воображаемых существ) и людей
    (исследователей криптидов). Позже можно будет определить связанные ресурсы, подобные
    следующим:


    +   - локации;

    - события (например, экспедиции, наблюдения).


    # Макет


    Вот текущее расположение файлов и каталогов:


    ```

    main.py web

    ├── __init__.py

    ├── creature.py ├── explorer.py service

    ├── __init__.py

    ├── creature.py ├── explorer.py

    data

    ├── __init__.py

    ├── creature.py ├── explorer.py model

    ├── __init__.py

    ├── creature.py ├── explorer.py

    fake

    ├── __init__.py

    ├── creature.py

    ├── explorer.py

    └── test

    ```


    В этой главе вы будете работать с файлами, находящимися в каталоге **service**.


    # Защита


    Одна из приятных особенностей уровней заключается в том, что вам не нужно беспокоиться
    обо всем. Сервисный уровень заботится только о том, что входит на уровень данных
    и выходит с него. В главе 11 вы увидите, что более высокий уровень (здесь — веб-уровень)
    может справиться со всеми сложностями аутентификации и авторизации. Функции создания,
    изменения и удаления не должны быть широко открытыми, и даже для функций get со
    временем могут потребоваться некоторые ограничения.'
