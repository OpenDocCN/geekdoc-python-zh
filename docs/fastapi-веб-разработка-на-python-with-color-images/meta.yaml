    # REST(ful)


    В одной из глав докторской диссертации ([https://oreil.ly/TwGmX](https://oreil.ly/TwGmX))
    Роя Филдинга есть определение *передачи репрезентативного состояния* (Representational
    State Transfer, REST) — *архитектурного стиля* для использования HTTP¹. Несмотря
    на то что на эту работу часто ссылаются, ее по большей части неправильно понимают
    ([https://oreil.ly/bsSry](https://oreil.ly/bsSry)).


    В современной Паутине развилась и доминирует примерно одинаковая адаптация. Она
    называется *RESTful* и обладает следующими характеристиками:


    +   - использует HTTP и протокол «клиент — сервер»;

    - не имеет состояния (каждое соединение независимо);

    - кэшируема;

    - основана на ресурсах.


    *Ресурс* — это данные, которые можно определять и с которыми можно выполнять операции.
    Веб-сервис предоставляет *конечную точку* — отдельный URL и HTTP-глагол (действие)
    — для каждой функции. Конечную точку называют также *маршрутом*, поскольку она
    направляет URL к функции.


    Пользователи баз данных знакомы с акронимом *CRUD* для процедур: создание (create),
    чтение (read), модификация (update), удаление (delete). HTTP-глаголы довольно
    хорошо вписываются в понятие CRUD:


    +   - POST — создание (запись);

    - PUT — полная модификация (замена);

    - PATCH — частичная модификация (обновление);

    - GET — получение (считывание, извлечение);

    - DELETE — удаление.


    Клиент отправляет запрос на конечную точку RESTful с данными в одной из таких
    областей HTTP-сообщения, как:


    > ¹ Под стилем понимается шаблон более высокого уровня, например «клиент — сервер»,
    а не конкретная конструкция.'
