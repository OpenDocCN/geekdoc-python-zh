    # CORS


    Совместное использование ресурсов разными источниками (Cross-Origin Resource Sharing,
    CORS) предполагает связь между другими доверенными серверами и вашим сайтом. Если
    на сайте весь код фронтенда и бэкенда находится в одном месте, то проблем не возникнет.
    Но в наши дни часто встречается ситуация, когда фронтенд на JavaScript общается
    с бэкендом, написанным на чем-то вроде FastAPI. Эти серверы не будут иметь одинакового
    происхождения:


    +   - протокол — HTTP или HTTPS;

    - домен — интернет-домен, например google.com или localhost;

    - порт — числовой TCP/IP-порт в этом домене, например 80, 443 или 8000.


    Как бэкенд может отличить надежный фронтенд от коробки с заплесневелой редиской
    или злоумышленника, крутящего усы? Это работа для CORS — технологии, определяющей,
    чему доверяет бэкенд. Наиболее известными способами являются следующие:


    +   - заголовки запросов Origin;

    - HTTP-методы;

    - HTTP-заголовки;

    - тайм-аут кэша CORS.


    Вы подключаетесь к CORS на веб-уровне. В примере 11.13 показано, как разрешить
    только один фронтенд-сервер (с доменом https://ui.cryptids.com), а также любые
    HTTP-заголовки и методы.'
