  - '[PAGE 195]


    Функция `test_caller_c()` определяет макет с помощью *декоратора* Python. Объект
    макета передается в качестве аргумента в функции `test_caller2()`.


    Функция `test_caller_d()` подобна `test_caller_b()` и задает аргумент `return_value`
    в отдельном вызове к `mock_preamble`.


    В каждом случае строковое имя объекта макета должно совпадать с тем, как он вызывается
    в тестируемом коде, — в данном случае `summer()`. Библиотека макетов преобразует
    это строковое имя в переменную, перехватывающую все ссылки на исходную переменную
    с таким именем. (Помните, что в Python переменные — это просто ссылки на реальные
    объекты.)


    Таким образом, в примере 12.6 во всех четырех тестовых функциях `summer()` при
    вызове `summer(5,6)` вместо настоящей функции вызывается изменяющийся макет `preamble()`.
    В макетированной версии эта строка отбрасывается, поэтому тест может убедиться,
    что функция `summer()` возвращает строковую версию суммы двух своих аргументов.


