  mdcn: "## 示例 5.7. 数据类 dataclass 的应用\n\n```python\n>>> from dataclasses import dataclass\n\
    >>>\n>>> @dataclass\n... class CreatureDataClass():\n...     name: str\n...  \
    \   country: str\n...     area: str\n...     description: str\n...     aka: str\n\
