  md: '![](img/eacb50a37d89d355fa68de0c62d56b32_114_0.png)


    Большинство авторов рекомендуют использовать множественное число при именовании
    ресурса и связанных с ним пространств имен, таких как разделы API и таблицы баз
    данных. Я долго следовал этому совету, но теперь считаю, что названия в единственном
    числе проще по многим причинам (включая странные английского языка):


    +   - некоторые слова представляют множественное число самих себя — series, fish;

    - у некоторых слов неправильное множественное число — children, people;

    - вам нужен код преобразования единственного числа во множественное по требованию
    во многих местах.


    По этим причинам во многих случаях в книге я использую схему именования в единственном
    числе. Это противоречит обычным рекомендациям RESTful, так что не стесняйтесь
    игнорировать эту мою особенность, если не согласны со мной.


    # Макет сайта с файлами и каталогами


    Наши данные касаются в основном существ и исследователей. Изначально мы могли
    бы определить все URL-адреса и их функции пути FastAPI для доступа к данным в
    одном файле Python. Не будем поддаваться искушению и начнем так, как будто мы
    уже восходящая звезда в криптном веб-пространстве. Имея хороший фундамент, гораздо
    легче добавлять новые крутые вещи.


    Сначала выберите на своей машине каталог. Назовите его **fastapi** или как угодно,
    что поможет запомнить, где вы будете работать с кодом из этой книги. В нем создайте
    следующие подкаталоги:


    +   - `src` — содержит весь код сайта;

    - `web` — веб-уровень FastAPI;

    - `service` — уровень бизнес-логики;

    - `data` — уровень интерфейса хранения данных;

    - `model` — для определения моделей Pydantic;

    - `fake` — жестко указанные данные (заглушки) для ранних этапов.


    В каждой из этих папок вскоре появится по три файла:


    +   - `__init__.py` — необходим для восприятия этого каталога в качестве пакета;

    - `creature.py` — код существа для этого уровня;

    - `explorer.py` — код исследователя для этого уровня.'
