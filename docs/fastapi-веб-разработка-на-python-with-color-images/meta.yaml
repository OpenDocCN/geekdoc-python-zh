    - execute(stmt, params) с параметрами params в одной последовательности (в списке\
    \ или кортеже) или словаре;\n- executemany(stmt, params_seq) с несколькими группами\
    \ параметров в последовательности params_seq.\n\nСуществует пять способов указания\
    \ параметров, но не все они поддерживаются всеми драйверами баз данных. Если оператор\
    \ stmt начинается с выражения \"select * from creature where\" и необходимо задать\
    \ строковые параметры name или country существа, оставшаяся часть строки stmt\
    \ и ее параметры будут выглядеть так, как показано в табл. 10.1.\n\n**Таблица\
    \ 10.1.** Указание оператора и параметров\n\n| Тип | Часть, отображающая оператор\
    \ | Часть, отображающая параметры |\n| :--- | :--- | :--- |\n| qmark | name=?\
    \ or country=? | (name, country) |\n| numeric | name=:0 or country=:1 | (name,\
    \ country) |\n| format | name=%s or country=%s | (name, country) |\n| named |\
    \ name=:name or country=:country | {\"name\": name, \"country\": country} |\n\
    | pyformat | name=%(name)s or country=%(country)s | {\"name\": name, \"country\"\
    : country} |\n\nПервые три принимают аргумент в виде кортежа, где порядок параметров\
    \ соответствует ?, :N или %s в описании оператора. Последние два принимают словарь,\
    \ в котором ключи соответствуют именам в операторе.\n\nТаким образом, полный вызов\
    \ в *именованном* стиле будет выглядеть так, как в примере 10.1.\n\n**Пример 10.1.**\
    \ Использование параметров в именованном стиле\n\n```\nstmt = \"\"\"select * from\
    \ creature where\n    name=:name or country=:country\"\"\"\nparams = {\"name\"\
    : \"yeti\", \"country\": \"CN\"}\ncurs.execute(stmt, params)\n```\n\nВозвращаемое\
    \ для SQL-операторов INSERT, DELETE и UPDATE из функции execute() значение рассказывает,\
    \ как это работает. В случае с оператором SELECT необходимо выполнить итерации\
    \ над возвращаемыми строками данных как над кортежами Python с помощью метода\
    \ `fetch`:\n\n- `fetchone()` возвращает один кортеж, или значение `None`;\n- `fetchall()`\
    \ возвращает последовательность кортежей;\n- `fetchmany(num)` возвращает до `num`\
    \ кортежей.\n\n## SQLite\n\nВ стандартных пакетах Python есть поддержка одной\
    \ базы данных (SQLite, https://www.sqlite.org) с помощью модуля sqlite3 (https://oreil.ly/CcYtJ).\n\
    \nSQLite необычен — в нем нет отдельного сервера баз данных. Весь код находится\
    \ в библиотеке, а хранение реализовано в одном файле. Другие базы данных работают\
    \ на отдельных серверах, и клиенты общаются с ними с помощью TCP/IP, используя\
    \ специальные протоколы. Задействуем SQLite в качестве первого физического хранилища\
    \ данных для этого веб-сайта. В главе 14 речь пойдет о других базах данных, реляционных\
    \ и нереляционных, а также о более продвинутых пакетах, таких как SQLAlchemy,\
    \ и методах, подобных ORM.\n\nСначала необходимо определить, как структуры данных,\
    \ используемые на сайте (*модели*), могут быть представлены в базе данных. До\
    \ сих пор наши единственные модели были простыми и похожими, но не идентичными:\
    \ *Creature* и *Explorer*. Они станут меняться по мере того, как мы будем придумывать,\
    \ что с ними делать, и позволять данным развиваться без масштабных изменений кода.\n\
    \nВ примере 10.2 показан голый код DB-API и SQL для создания первых таблиц и работы\
    \ с ними. Он использует *именованные* строки аргументов (значения представляются\
    \ как `name`), поддерживаемые пакетом sqlite3.\n\n**Пример 10.2.** Создание файла\
    \ `data/creature.py` с помощью sqlite3\n\n```\nimport sqlite3\nfrom model.creature\
    \ import Creature\n\nDB_NAME = \"cryptid.db\"\nconn = sqlite3.connect(DB_NAME)\n\
    curs = conn.cursor()\n\ndef init():\n    curs.execute(\"create table creature(name,\
    \ description, country, area, aka)\")\n\ndef row_to_model(row: tuple) -> Creature:\n\
    \    name, description, country, area, aka = row\n    return Creature(name, description,\
    \ country, area, aka)\n\ndef model_to_dict(creature: Creature) -> dict:\n    return\
    \ creature.dict()\n\ndef get_one(name: str) -> Creature:\n    qry = \"select *\
    \ from creature where name=:name\"\n    params = {\"name\": name}\n    curs.execute(qry,\
    \ params)\n    row = curs.fetchone()\n    return row_to_model(row)\n\ndef get_all(name:\
    \ str) -> list[Creature]:\n    qry = \"select * from creature\"\n    curs.execute(qry)\n\
    \    rows = list(curs.fetchall())\n    return [row_to_model(row) for row in rows]\n\
    \ndef create(creature: Creature):\n    qry = \"\"\"insert into creature values\n\
    \        (:name, :description, :country, :area, :aka)\"\"\"\n    params = model_to_dict(creature)\n\
    \    curs.execute(qry, params)\n\ndef modify(creature: Creature):\n    return\
    \ creature\n\ndef replace(creature: Creature):\n    return creature\n\ndef delete(creature:\
    \ Creature):\n    qry = \"delete from creature where name = :name\"\n    params\
