  md: "# Пример 6.2. Возвращение зависимости пользователя\n\n```\nfrom fastapi import\
    \ FastAPI, Depends, Params\n\napp = FastAPI()\n\n# функция зависимости:\ndef user_dep(name:\
    \ str = Params, password: str = Params):\n    return {\"name\": name, \"valid\"\
    : True}\n\n# функция пути/конечная точка веб-приложения:\n@app.get(\"/user\")\n\
    def get_user(user: dict = Depends(user_dep)) -> dict:\n    return user\n```\n\n\
    Если функция зависимости просто проверяет что-то и не возвращает никаких значений,\
    \ вы можете определить зависимость в *декораторе* пути (предыдущая строка, начинающаяся\
    \ с @):\n\n```\n@app.method(url, dependencies=[Depends(depfunc)])\n```\n\nПопробуем\
    \ сделать это в примере 6.3.\n\n# Пример 6.3. Определение зависимости проверки\
    \ пользователя\n\n```\nfrom fastapi import FastAPI, Depends, Params\n\napp = FastAPI()\n\
    \n# функция зависимости:\ndef check_dep(name: str = Params, password: str = Params):\n\
    \    if not name:\n        raise\n\n# функция пути/конечная точка веб-приложения:\n\
    @app.get(\"/check_user\", dependencies=[Depends(check_dep)])\ndef check_user()\
    \ -> bool:\n    return True\n```\n\n# Множество путей\n\nВ главе 9 подробно рассказывается\
    \ о том, как структурировать более крупное приложение FastAPI, включая определение\
