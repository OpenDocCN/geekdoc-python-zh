    \ Изд. 2-е. — СПб.: Питер, 2021;\n- *Бизли Д.* Python. Исчерпывающее руководство.\
    \ — СПб.: Питер, 2023;\n- *Рамальо Л.* Python. К вершинам мастерства. — 2016;\n\
