- md: "@app.route(\"/hi\", methods=[\"GET\"])\ndef greet():\n    who: str = request.headers.get(\"\
    who\")\n    return jsonify(f\"Hello? {who}?\")\n\nКак и в случае с параметрами\
    \ запроса, Flask хранит данные запроса в объекте `request`. В данном случае это\
