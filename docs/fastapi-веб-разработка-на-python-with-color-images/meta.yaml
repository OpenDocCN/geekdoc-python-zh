    можно выразить на JSON или Python.


    # Redis


    Redis — это сервер структур данных, работающий исключительно в оперативной памяти,
    хотя он может сохранять данные на диск и восстанавливать их с диска. Он полностью
    соответствует собственным структурам данных Python и стал очень популярным.'
  - '[PAGE 226]


    # MongoDB


    MongoDB — это своего рода PostgreSQL для NoSQL-серверов. *Коллекция* — это эквивалент
    таблицы SQL, а *документ* — эквивалент строки таблицы SQL. Еще одно отличие —
    и главная причина, по которой база данных NoSQL является основной, — заключается
    в том, что вам не нужно определять, как выглядит документ. Другими словами, нет
    никакой фиксированной *схемы*. Документ — это как словарь Python, ключом в нем
    может быть любая строка.


    # Cassandra


    Cassandra — это крупномасштабная база данных, ее можно распределить между сотнями
    узлов. Она написана на языке Java.


    Альтернативная база данных называется ScyllaDB (https://www.scylladb.com). Она
    написана на C++, и утверждается, что она совместима с Cassandra, но имеет большую
    производительность.


    # Elasticsearch


    Elasticsearch (https://www.elastic.co/elasticsearch) больше похожа на индекс базы
    данных, чем на саму базу данных. Она часто используется для полнотекстового поиска.


    # Возможности NoSQL в базах данных SQL


    Как отмечалось ранее, реляционные базы данных традиционно нормализуются и ограничиваются
    различными уровнями правил, называемых *нормальными формами*. Одним из основных
    правил было то, что значение в каждой ячейке должно быть *скаляром* — никаких
    массивов или других структур.


    Базы данных NoSQL (или документоориентированные) поддерживали JSON напрямую и
    обычно оказывались единственным выбором, если у вас были неравномерные или неровные
    структуры данных. Часто они были *дениормализованными* — все данные, необходимые
    для документа, были включены в него. В SQL для создания полного документа часто
    требовалось выполнить *объединение* данных из разных таблиц.'
  - "[PAGE 227]\n\nОднако последние изменения в стандарте SQL позволили хранить данные\
    \ JSON и в реляционных базах данных. Некоторые из таких БД позволяют хранить сложные\
    \ (нескалярные) данные в ячейках таблиц и даже выполнять в них поиск и индексирование.\
    \ Функции JSON поддерживаются различными способами для SQLite (https://oreil.ly/h_FNn),\
    \ PostgreSQL (https://oreil.ly/awYrc), MySQL (https://oreil.ly/OA_sT), Oracle\
    \ (https://oreil.ly/osOYk) и других систем.\n\nSQL с JSON может быть лучшим из\
    \ двух миров. Базы данных SQL существуют гораздо дольше и поддерживают действительно\
    \ полезные функции, такие как внешние ключи и вторичные индексы. Кроме того, SQL\
    \ довольно хорошо стандартизирован до определенного момента, а языки запросов\
    \ NoSQL все разные.\n\nНаконец, новые языки проектирования данных и запросов пытаются\
    \ объединить преимущества SQL и NoSQL, как, например, EdgeQL, о котором я упоминал\
    \ ранее. Поэтому, если вы не можете разместить свои данные в прямоугольную реляционную\
    \ коробку, обратите внимание на базу данных NoSQL, реляционную базу данных с поддержкой\
    \ JSON или базу данных Post-SQL.\n\n# Нагрузочное тестирование баз данных\n\n\
    Эта книга в основном посвящена FastAPI, но веб-сайты слишком часто связаны с базами\
    \ данных.\n\nПримеры данных в этой книге были крошечными. Чтобы действительно\
    \ протестировать базу данных на стрессоустойчивость, было бы неплохо использовать\
    \ миллионы элементов. Вместо того чтобы их придумывать и добавлять вручную, проще\
    \ воспользоваться пакетом Python, например Faker (https://faker.readthedocs.io).\
    \ Он может быстро генерировать различные типы данных — имена, места или определяемые\
    \ вами специальные типы.\n\nВ примере 14.3 функция Faker выкачивает имена и страны,\
    \ а затем они загружаются с помощью функции load() в SQLite.\n\n**Пример 14.3.**\
    \ Загрузка фиктивных исследователей в файл test_load.py\n\n```\nfrom faker import\
    \ Faker\nfrom time import perf_counter\n\ndef load():\n    from error import Duplicate\n\
    \    from data.explorer import create\n    from model.explorer import Explorer\n\
    ```"
  - "[PAGE 228]\n\n```\nf = Faker()\nNUM = 100_000\nt1 = perf_counter()\nfor row in\
    \ range(NUM):\n    try:\n        create(Explorer(name=f.name(),\n            \
    \            country=f.country(),\n                        description=f.description))\n\
    \    except Duplicate:\n        pass\nt2 = perf_counter()\nprint(NUM, \"rows\"\
    )\nprint(\"write time:\", t2-t1)\n\ndef read_db():\n    from data.explorer import\
    \ get_all\n\n    t1 = perf_counter()\n    _ = get_all()\n    t2 = perf_counter()\n\
    \    print(\"db read time:\", t2-t1)\n\ndef read_api():\n    from fastapi.testclient\
    \ import TestClient\n    from main import app\n\n    t1 = perf_counter()\n   \
    \ client = TestClient(app)\n    _ = client.get(\"/explorer/\")\n    t2 = perf_counter()\n\
    \    print(\"api read time:\", t2-t1)\n\nload()\nread_db()\nread_db()\nread_api()\n\
    ```\n\nКод будет улавливать исключение Duplicate в функции load(), но его стоит\
    \ игнорировать, потому что Faker генерирует имена из ограниченного списка и, скорее\
    \ всего, время от времени повторяет некоторые из них. Таким образом, в результате\
    \ может быть загружено менее 100 000 исследователей.\n\nКроме того, вы вызываете\
    \ функцию read_db() дважды, чтобы исключить время запуска процесса, пока SQLite\
    \ выполняет запрос. Тогда время выполнения read_api() должно получиться честным.\
    \ Пример 14.4 запускает тестирование."
- md: "## Пример 14.4. Проверка производительности запросов к базе данных\n\n```\n\
    $ python test_load.py\n100000 rows\nwrite time: 14.868232927983627\ndb read time:\
    \ 0.4025074450764805\ndb read time: 0.39750714192632586\napi read time: 2.597553930943832\n\
    ```\n\nВремя чтения API для всех исследователей было намного медленнее, чем время\
    \ чтения уровня данных. Вероятно, часть этих расходов связана с преобразованием\
    \ ответа в JSON с помощью FastAPI. Кроме того, время первоначальной записи в базу\
    \ данных было не очень быстрым. Код записывает по одному исследователю за раз,\
    \ потому что в API уровня данных есть единственная функция create(), но нет функции\
    \ create_many(). В части считывания API может вернуть один (get_one()) или все\
    \ (get_all()) результаты. Поэтому, если вы хотите выполнять массовую загрузку,\
    \ возможно, стоит добавить новую функцию загрузки данных и новую конечную точку\
    \ веб-приложения (с ограниченной авторизацией). Кроме того, если вы ожидаете,\
    \ что любая таблица в базе данных вырастет до 100 000 строк, возможно, не стоит\
    \ позволять случайным пользователям получать их все за один вызов API. Не помешала\
    \ бы пагинация или возможность загрузки одного CSV-файла из таблицы.\n\n## Наука\
    \ о данных и искусственный интеллект\n\nPython стал самым популярным языком в\
    \ области науки о данных в целом и машинного обучения (Machine Learning, ML) в\
    \ частности. Там необходимо много работать с данными, и Python отлично справляется\
    \ с этой задачей.\n\nИногда разработчики используют сторонние инструменты (https://oreil.ly/WFH09),\
    \ такие как pandas, для манипулирования слишком сложными в SQL-представлении данными.\n\
    \nPyTorch (https://pytorch.org) — один из самых популярных инструментов ML, поскольку\
    \ в работе с данными он использует сильные стороны Python. Для повышения скорости\
    \ базовые вычисления могут выполняться на C или C++, а для высших задач интеграции\
    \ данных хорошо подходят Python или Go. Язык Mojo (https://www.modular.com/mojo)\
    \ — супернабор Python — сможет справиться с задачами и большой, и малой сложности,\
    \ если все получится создать так, как задумано. Хотя это язык общего назначения,\
    \ он специально предназначен для решения некоторых текущих проблем при разработке\
    \ ИИ.\n\nНовый инструмент Python под названием Chroma (https://www.trychroma.com)\
    \ — это база данных, похожая на SQLite, но предназначенная для машинного обучения,\
    \ в частности для больших языковых моделей (Large Language Models, LLM). Прочтите\
    \ страницу Getting Started page (https://oreil.ly/W59nn), чтобы быстрее начать\
    \ работу.\n\nХотя разработка ИИ сложна и идет быстрыми темпами, вы можете опробовать\
    \ искусственный интеллект с помощью Python на собственной машине, не тратя мегасредства,\
    \ затраченные на создание GPT-4 и ChatGPT. Создадим небольшой веб-интерфейс FastAPI\
    \ для небольшой модели искусственного интеллекта.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_230_0.png)\n\
    \nПонятие «модель» имеет разные значения в области ИИ и Pydantic/FastAPI. В Pydantic\
    \ модель — это класс Python, объединяющий связанные поля данных. Модели ИИ охватывают\
    \ широкий спектр методов определения закономерностей в данных.\n\nПлатформа Hugging\
    \ Face (https://huggingface.co) предоставляет бесплатные модели искусственного\
    \ интеллекта, наборы данных и код на Python для их использования. Сначала установите\
    \ PyTorch и код Hugging Face:\n\n```\n$ pip install torch torchvision\n$ pip install\
    \ transformers\n```\n\nВ примере 14.5 показано приложение FastAPI, использующее\
    \ модуль трансформеров с платформы Hugging Face для доступа к предварительно обученной\
    \ модели машинного языка среднего размера с открытым исходным кодом. Эта программа\
    \ попытается ответить на ваши вопросы. (Код был адаптирован из примера командной\
    \ строки, приведенного на YouTube-канале CodeToTheMoon.)\n\n### Пример 14.5. Тесты\
    \ высокого уровня для LLM (ai.py)\n\n```\nfrom fastapi import FastAPI\n\napp =\
    \ FastAPI()\n\nfrom transformers import (AutoTokenizer,\n    AutoModelForSeq2SeqLM,\
    \ GenerationConfig)\nmodel_name = \"google/flan-t5-base\"\ntokenizer = AutoTokenizer.from_pretrained(model_name)\n\
    model = AutoModelForSeq2SeqLM.from_pretrained(model_name)\nconfig = GenerationConfig(max_new_tokens=200)\n\
    \n@app.get(\"/ai\")\ndef prompt(line: str) -> str:\n    tokens = tokenizer(line,\
    \ return_tensors=\"pt\")\n    outputs = model.generate(**tokens,\n           \
    \                 generator_config=config)\n    result = tokenizer.batch_decode(outputs,\n\
    \                                  skip_special_tokens=True)\n    return result[0]\n\
    ```\n\nЗапустите этот код с помощью выражения uvicorn ai:app (как всегда, сначала\
    \ убедитесь, что у вас нет другого все еще запущенного веб-сервера на адресе localhost,\
    \ порт 8000). Задавайте вопросы конечной точке /ai и получайте ответы, например,\
    \ так (обратите внимание на двойной знак равенства == для параметра запроса HTTPie):\n\
    \n```\n$ http -b localhost:8000/ai line==\"What are you?\"\n\"a sailor\"\n```\n\
    \nЭто довольно маленькая модель, и, как вы можете видеть, она не особенно хорошо\
    \ отвечает на вопросы. Я попробовал другие задания (line-аргументы) и получил\
    \ не менее достойные ответы.\n\n- **В:** Лучше ли кошки, чем собаки?\n  **О:**\
    \ Нет.\n\n- **В:** Что ети ест на завтрак?\n  **О:** Кальмара.\n\n- **В:** Кто\
    \ спускается по дымоходу?\n  **О:** Визжащий поросенок.\n\n- **В:** В какой группе\
    \ состоял Джон Клиз?\n  **О:** The Beatles.\n\n- **В:** У чего есть противные\
    \ острые зубы?\n  **О:** Плюшевый мишка.\n\nВ разное время на эти вопросы можно\
    \ получить разные ответы! Однажды та же самая конечная точка ответила, что ети\
    \ ест на завтрак песок. В среде ИИ подобные ответы называются галлюцинациями.\
    \ Вы можете получить более точные ответы, задействуя более крупную модель, например\
    \ google/flan-75xl, но для загрузки данных модели на персональный компьютер и\
    \ получения ответа потребуется больше времени. И конечно, такие модели, как ChatGPT,\
    \ были обучены на всех данных, которые смогли найти (с использованием всех ЦП,\
    \ ГП, ТП и любых других видов процессоров), и дадут отличные ответы.\n\n## Заключение\n\
    \nВ этой главе мы распространили возможности применения SQLite, описанные в главе\
    \ 10, на другие базы данных SQL и даже NoSQL. Здесь также показано, как некоторые\
    \ базы данных SQL могут выполнять трюки NoSQL с поддержкой JSON. Наконец, речь\
    \ шла об использовании баз данных и специальных инструментов для работы с данными,\
    \ которые становятся все более важными по мере того, как машинное обучение продолжает\
    \ бурно развиваться.\n\n# ГЛАВА 15\n\n## Файлы\n\n### Обзор\n\nПомимо обработки\
    \ API-запросов и традиционного контента, например HTML, веб-серверы должны обрабатывать\
    \ передачу файлов в обоих направлениях. Очень большие файлы могут передаваться\
    \ *частями*, чтобы не занимать много памяти системы. Вы также можете предоставить\
    \ доступ к папке с файлами (и подчиненными папками любой глубины) с помощью статических\
    \ файлов — Static Files.\n\n### Поддержка Multipart\n\nЧтобы обрабатывать большие\
    \ файлы, функции выгрузки и скачивания FastAPI нуждаются в следующих дополнительных\
    \ модулях:\n\n- *Python-Multipart* (https://oreil.ly/FUBk7) — pip install python-multipart;\n\
    - *aio-files* (https://oreil.ly/OZYYR) — pip install aiofiles.\n\n### Выгрузка\
    \ файлов\n\nFastAPI нацелен на разработку API, и в большинстве примеров в этой\
    \ книге используются запросы и ответы в формате JSON. Но в следующей главе вы\
    \ познакомитесь с формами, которые обрабатываются по-другому. Здесь же рассказывается\
    \ о файлах, по некоторым параметрам похожих на формы.\n\nFastAPI предлагает два\
    \ способа выгрузки файлов: функцию File() и класс UploadFile.\n\n### Функция File()\n\
    \nФункция File() применяется в качестве типа для прямой выгрузки файла. Ваша функция\
    \ пути может быть синхронной (def) или асинхронной (async def), но асинхронная\
    \ версия лучше, потому что она не будет нагружать веб-сервер во время выгрузки\
    \ файла.\n\nFastAPI будет извлекать файл по частям и собирать его в памяти, поэтому\
    \ функцию File() следует использовать только для относительно небольших файлов.\
    \ Вместо того чтобы считать, что входные данные представлены в формате JSON, FastAPI\
    \ кодирует файл как элемент формы.\n\nНапишем код для запроса файла и протестируем\
    \ его. Вы можете взять любой файл на своей машине для тестирования или загрузить\
    \ его с такого сайта, как Fastest Fish (https://oreil.ly/EnIH-). Я взял оттуда\
    \ файл размером 1 Кбайт и сохранил его локально под названием 1KB.bin. В примере\
    \ 15.1 добавьте эти строки в файл main.py верхнего уровня.\n\n**Пример 15.1.**\
    \ Обработка выгрузки небольшого файла с помощью FastAPI\n\n```\nfrom fastapi import\
    \ File\n\n@app.post(\"/small\")\nasync def upload_small_file(small_file: bytes\
    \ = File()) -> str:\n    return f\"file size: {len(small_file)}\"\n```\n\nПосле\
    \ перезапуска Uvicorn попробуйте выполнить HTTPie-тест в примере 15.2.\n\n**Пример\
    \ 15.2.** Выгрузка небольшого файла с помощью HTTPie\n\n```\n$ http -f -b POST\
    \ http://localhost:8000/small small_file@1KB.bin\n\"file size: 1000\"\n```\n\n\
    Приведу несколько замечаний по этому тесту.\n\n- Необходимо добавить аргумент\
    \ -f или --form, потому что файлы выгружаются как формы, а не как JSON-текст.\n\
    - small_file@1KB.bin:\n    - small_file соответствует имени переменной small_file\
    \ в функции пути FastAPI в примере 15.1;\n    - @ — сокращение HTTPie для создания\
    \ формы;\n    - 1KB.bin — выгружаемый файл."
  mdcn: "## 示例 14.4. 数据库查询性能测试\n\n```\n$ python test_load.py\n100000 rows\nwrite time:\
    \ 14.868232927983627\ndb read time: 0.4025074450764805\ndb read time: 0.39750714192632586\n\
    api read time: 2.597553930943832\n```\n\nAPI 读取所有研究者的时间比数据层读取时间慢得多。这部分开销可能与使用\
    \ FastAPI 将响应转换为 JSON 有关。此外，初始写入数据库的时间也不是很快。代码一次写入一个研究者，因为数据层 API 中只有一个 `create()`\
    \ 函数，而没有 `create_many()` 函数。在读取部分，API 可以返回单个结果 (`get_one()`) 或所有结果 (`get_all()`)。因此，如果您想执行批量加载，可能值得添加一个新的数据加载函数和一个新的\
    \ Web 应用程序端点（带有限制授权）。此外，如果您预计数据库中的任何表会增长到 100,000 行，可能不应该允许随机用户通过一次 API 调用获取所有数据。分页或从表中下载单个\
    \ CSV 文件的功能会很有帮助。\n\n## 数据科学与人工智能\n\nPython 已成为数据科学领域，特别是机器学习（Machine Learning,\
    \ ML）领域最受欢迎的语言。该领域需要大量处理数据，而 Python 非常擅长这项任务。\n\n有时开发人员会使用第三方工具（https://oreil.ly/WFH09），例如\
    \ pandas，来处理用 SQL 表示过于复杂的数据。\n\nPyTorch (https://pytorch.org) 是最受欢迎的 ML 工具之一，因为它在处理数据时利用了\
    \ Python 的优势。为了提高速度，基础计算可以在 C 或 C++ 上执行，而对于更高级的数据集成任务，Python 或 Go 非常合适。Mojo 语言\
    \ (https://www.modular.com/mojo) 是 Python 的超集，如果一切按计划实现，它将能够处理各种复杂程度的任务。虽然它是一种通用语言，但它专门用于解决当前\
    \ AI 开发中的一些问题。\n\n一个名为 Chroma (https://www.trychroma.com) 的新 Python 工具是一个类似于 SQLite\
    \ 的数据库，但专为机器学习设计，特别是针对大型语言模型（Large Language Models, LLM）。请阅读入门页面 (https://oreil.ly/W59nn)\
    \ 以快速开始使用。\n\n尽管 AI 开发复杂且发展迅速，但您可以在自己的机器上使用 Python 体验人工智能，而无需花费创建 GPT-4 和 ChatGPT\
    \ 所投入的巨额资金。我们将为一个小型人工智能模型创建一个简单的 FastAPI Web 界面。\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_230_0.png)\n\
    \n“模型”一词在 AI 和 Pydantic/FastAPI 领域具有不同的含义。在 Pydantic 中，模型是将相关数据字段组合在一起的 Python\
    \ 类。AI 模型涵盖了在数据中识别模式的广泛方法。\n\nHugging Face 平台 (https://huggingface.co) 提供免费的人工智能模型、数据集以及用于使用它们的\
    \ Python 代码。首先安装 PyTorch 和 Hugging Face 代码：\n\n```\n$ pip install torch torchvision\n\
    $ pip install transformers\n```\n\n示例 14.5 展示了一个 FastAPI 应用程序，它使用 Hugging Face\
    \ 平台的 transformers 模块来访问一个中等规模的开源预训练机器语言模型。该程序将尝试回答您的问题。（代码改编自 YouTube 频道 CodeToTheMoon\
    \ 上提供的命令行示例。）\n\n### 示例 14.5. LLM 的高级测试 (ai.py)\n\n```\nfrom fastapi import FastAPI\n\
    \napp = FastAPI()\n\nfrom transformers import (AutoTokenizer,\n    AutoModelForSeq2SeqLM,\
    \ GenerationConfig)\nmodel_name = \"google/flan-t5-base\"\ntokenizer = AutoTokenizer.from_pretrained(model_name)\n\
    model = AutoModelForSeq2SeqLM.from_pretrained(model_name)\nconfig = GenerationConfig(max_new_tokens=200)\n\
    \n@app.get(\"/ai\")\ndef prompt(line: str) -> str:\n    tokens = tokenizer(line,\
    \ return_tensors=\"pt\")\n    outputs = model.generate(**tokens,\n           \
    \                 generator_config=config)\n    result = tokenizer.batch_decode(outputs,\n\
    \                                  skip_special_tokens=True)\n    return result[0]\n\
    ```\n\n使用命令 `uvicorn ai:app` 运行此代码（一如既往，首先确保没有其他 Web 服务器在 localhost 的 8000 端口上运行）。向\
    \ `/ai` 端点提问并获取答案，例如这样（注意 HTTPie 的查询参数使用双等号 `==`）：\n\n```\n$ http -b localhost:8000/ai\
    \ line==\"What are you?\"\n\"a sailor\"\n```\n\n这是一个相当小的模型，正如您所看到的，它回答问题的效果不是特别好。我尝试了其他任务（line\
    \ 参数）并得到了同样不太理想的答案。\n\n- **问：** 猫比狗好吗？\n  **答：** 不。\n\n- **问：** 蚂蚁早餐吃什么？\n  **答：**\
    \ 鱿鱼。\n\n- **问：** 谁顺着烟囱下来？\n  **答：** 尖叫的猪。\n\n- **问：** 约翰·克里斯属于哪个乐队？\n  **答：**\
    \ The Beatles。\n\n- **问：** 什么有讨厌的锋利牙齿？\n  **答：** 泰迪熊。\n\n在不同时间，这些问题的答案可能会不同！有一次，同一个端点回答说蚂蚁早餐吃沙子。在\
    \ AI 领域，这类答案被称为幻觉。您可以使用更大的模型（例如 google/flan-75xl）来获得更准确的答案，但在个人计算机上加载模型数据并获得答案需要更多时间。当然，像\
    \ ChatGPT 这样的模型是在它们能找到的所有数据上训练的（使用了所有的 CPU、GPU、TPU 和任何其他类型的处理器），并会给出优秀的答案。\n\n\
    ## 结论\n\n在本章中，我们将第 10 章中描述的 SQLite 应用范围扩展到了其他 SQL 数据库，甚至 NoSQL 数据库。本章还展示了一些 SQL\
    \ 数据库如何通过支持 JSON 来执行 NoSQL 的技巧。最后，讨论了使用数据库和专用工具来处理数据，随着机器学习的持续快速发展，这些工具变得越来越重要。\n\
    \n# 第 15 章\n\n## 文件\n\n### 概述\n\n除了处理 API 请求和传统内容（如 HTML）之外，Web 服务器还必须处理双向的文件传输。非常大的文件可以*分块*传输，以避免占用大量系统内存。您还可以通过静态文件（Static\
    \ Files）提供对文件夹（以及任意深度的子文件夹）的访问。\n\n### 多部分支持\n\n为了处理大文件，FastAPI 的上传和下载功能需要以下附加模块：\n\
    \n- *Python-Multipart* (https://oreil.ly/FUBk7) — pip install python-multipart；\n\
    - *aio-files* (https://oreil.ly/OZYYR) — pip install aiofiles。\n\n### 文件上传\n\n\
    FastAPI 旨在开发 API，本书中的大多数示例都使用 JSON 格式的请求和响应。但在下一章中，您将了解以不同方式处理的表单。这里讨论的文件在某些方面与表单类似。\n\
    \nFastAPI 提供了两种上传文件的方式：`File()` 函数和 `UploadFile` 类。\n\n### File() 函数\n\n`File()`\
    \ 函数用作直接文件上传的类型。您的路径函数可以是同步的（`def`）或异步的（`async def`），但异步版本更好，因为它不会在文件上传期间给 Web\
    \ 服务器带来负担。\n\nFastAPI 将分块提取文件并在内存中组装，因此 `File()` 函数应仅用于相对较小的文件。FastAPI 不会假设输入数据是\
    \ JSON 格式，而是将文件编码为表单元素。\n\n让我们编写代码来请求文件并进行测试。您可以使用机器上的任何文件进行测试，或者从 Fastest Fish\
    \ (https://oreil.ly/EnIH-) 这样的网站下载。我从那里取了一个 1 KB 的文件，并将其本地保存为 `1KB.bin`。在示例 15.1\
    \ 中，将这些行添加到顶层的 `main.py` 文件中。\n\n**示例 15.1.** 使用 FastAPI 处理小文件上传\n\n```\nfrom\
    \ fastapi import File\n\n@app.post(\"/small\")\nasync def upload_small_file(small_file:\
    \ bytes = File()) -> str:\n    return f\"file size: {len(small_file)}\"\n```\n\
    \n重启 Uvicorn 后，尝试执行示例 15.2 中的 HTTPie 测试。\n\n**示例 15.2.** 使用 HTTPie 上传小文件\n\n```\n\
    $ http -f -b POST http://localhost:8000/small small_file@1KB.bin\n\"file size:\
    \ 1000\"\n```\n\n关于此测试，我有几点说明。\n\n- 需要添加 `-f` 或 `--form` 参数，因为文件是作为表单上传的，而不是作为\
    \ JSON 文本。\n- `small_file@1KB.bin`：\n    - `small_file` 对应于示例 15.1 中 FastAPI 路径函数中的变量名\
    \ `small_file`；\n    - `@` 是 HTTPie 创建表单的简写；\n    - `1KB.bin` 是要上传的文件。"
