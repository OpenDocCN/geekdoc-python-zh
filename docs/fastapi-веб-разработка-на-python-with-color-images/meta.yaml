- md: "## Веб-уровень пользователей\n\nПример 11.11 определяет базовый пользовательский\
    \ модуль на веб-уровне. Он применяет новый код авторизации из модуля service/user.py\
    \ из примера 11.10.\n\n**Пример 11.11.** Веб-уровень: web/user.py\n\n```python\n\
    import os\nfrom fastapi import APIRouter, HTTPException\nfrom fastapi.security\
    \ import OAuth2PasswordBearer, OAuth2PasswordRequestForm\nfrom model.user import\
    \ User\nif os.getenv(\"CRYPTID_UNIT_TEST\"):\n    from fake import user as service\n\
    else:\n    from service import user as service\nfrom error import Missing, Duplicate\n\
    \nACCESS_TOKEN_EXPIRE_MINUTES = 30\n\nrouter = APIRouter(prefix = \"/user\")\n\
    \n# --- Новые данные auth\n\n# Эта зависимость создает сообщение в каталоге\n\
    # \"/user/token\" (из формы с именем пользователя и паролем)\n# и возвращает токен\
    \ доступа.\noauth2_dep = OAuth2PasswordBearer(tokenUrl=\"token\")\n\ndef unauthed():\n\
    \    raise HTTPException(\n        status_code=401,\n        detail=\"Incorrect\
    \ username or password\",\n        headers={\"WWW-Authenticate\": \"Bearer\"},\n\
    \        )\n\n# К этой конечной точке направляется любой вызов,\n# содержащий\
    \ зависимость oauth2_dep():\n@router.post(\"/token\")\nasync\ndef create_access_token(\n\
    \    form_data: OAuth2PasswordRequestForm = Depends()\n):\n    \"\"\"Получение\
    \ имени пользователя и пароля\n    из формы OAuth, возврат токена доступа\"\"\"\
    \n    user = service.auth_user(form_data.username, form_data.password)\n    if\
    \ not user:\n        unauthed()\n    expires = timedelta(minutes=ACCESS_TOKEN_EXPIRE_MINUTES)\n\
    \    access_token = service.create_access_token(\n        data={\"sub\": user.username},\
    \ expires=expires\n    )\n    return {\"access_token\": access_token, \"token_type\"\
    : \"bearer\"}\n\n@app.get(\"/token\")\ndef get_access_token(token: str = Depends(oauth2_dep))\
    \ -> dict:\n    \"\"\"Возврат текущего токена доступа\"\"\"\n    return {\"token\"\
    : token}\n\n# --- предыдущий материал CRUD\n\n@router.get(\"/\")\ndef get_all()\
    \ -> list[User]:\n    return service.get_all()\n\n@router.get(\"/{name}\")\ndef\
    \ get_one(name) -> User:\n    try:\n        return service.get_one(name)\n   \
    \ except Missing as exc:\n        raise HTTPException(status_code=404, detail=exc.msg)\n\
    \n@router.post(\"/\", status_code=201)\ndef create(user: User) -> User:\n    try:\n\
    \        return service.create(user)\n    except Duplicate as exc:\n        raise\
    \ HTTPException(status_code=409, detail=exc.msg)\n\n@router.patch(\"/\")\ndef\
    \ modify(name: str, user: User) -> User:\n    try:\n        return service.modify(name,\
    \ user)\n    except Missing as exc:\n        raise HTTPException(status_code=404,\
    \ detail=exc.msg)\n\n@router.delete(\"/{name}\")\ndef delete(name: str) -> None:\n\
    \    try:\n        return service.delete(name)\n    except Missing as exc:\n \
    \       raise HTTPException(status_code=404, detail=exc.msg)\n```\n\n## Тестируем!\n\
    \nМодульные и полные тесты для этого нового пользовательского компонента похожи\
    \ на те, что вы уже видели для сущест и исследователей. Вместо того чтобы изучать\
    \ печатный текст, можно посмотреть их на сайте, сопровождающем эту книгу¹.\n\n\
    ## Верхний уровень\n\nВ предыдущем разделе была определена новая переменная router\
    \ для URL, начинающихся с пути /user, поэтому в примере 11.12 добавляется этот\
    \ суб-маршрут.\n\n> Если бы мне платили за количество строк, моя судьба могла\
    \ бы измениться.\n\n**Пример 11.12.** Верхний уровень: main.py\n\n```python\n\
    from fastapi import FastAPI\nfrom web import explorer, creature, user\n\napp =\
    \ FastAPI()\napp.include_router(explorer.router)\napp.include_router(creature.router)\n\
    app.include_router(user.router)\n```\n\nПри автозагрузке Uvicorn конечные точки\
    \ папки /user/... теперь должны быть доступны.\n\nИтак, мы создали пользовательский\
    \ код, а теперь давайте дадим ему повод для работы.\n\n## Этапы аутентификации\n\
    \nВот обзор массы кода из предыдущих разделов.\n\n- Если у конечной точки есть\
    \ зависимость oauth2_dep() (в файле web/user.py), то форма, содержащая поля имени\
    \ пользователя и пароля, генерируется и отправляется клиенту.\n- После того как\
    \ клиент заполнит и отправит эту форму, имя пользователя и пароль (хешированные\
    \ тем же алгоритмом, что и те, которые уже хранятся в локальной базе данных) будут\
    \ сопоставлены с находящимися в локальной базе данных.\n- При их совпадении токен\
    \ доступа (в формате JWT) генерируется и возвращается.\n- Этот токен доступа передается\
    \ обратно веб-серверу в виде HTTP-заголовка Authorization при последующих запросах.\
    \ JWT-токен декодируется на локальном сервере в имя пользователя и другие данные.\
    \ Это имя не нужно снова искать в базе данных.\n- Имя пользователя аутентифицировано,\
    \ и сервер может делать с ним все, что захочет.\n\nЧто может сделать сервер с\
    \ полученной с таким трудом информацией об аутентификации? Он может:\n\n- генерировать\
    \ метрики (пользователя, конечной точки, времени), чтобы изучить, что просматривается,\
    \ кем, как долго и т. д.;\n- сохранять информацию о пользователе.\n\n## JWT\n\n\
    Этот раздел содержит некоторые подробности о JWT. На самом деле эти токены не\
    \ нужны, чтобы применять весь предыдущий код из этой главы, но если вам любопытно...\n\
    \nJWT ([https://jwt.io](https://jwt.io)) — это схема кодирования, а не метод аутентификации.\
    \ Низкоуровневые детали определены в стандарте RFC 7519 ([https://oreil.ly/_op1j](https://oreil.ly/_op1j)).\
    \ Его можно использовать для передачи информации об аутентификации для OAuth2\
    \ и других методов, я покажу пример такой реализации.\n\nJWT — это читаемая строка,\
    \ состоящая из трех разделов, разделенных точками:\n\n- заголовок — используемый\
    \ алгоритм шифрования и тип токена;\n- полезная нагрузка — ...\n- подпись — ...\n\
    \nКаждый раздел состоит из строки JSON, закодированной в формате Base 64 URL ([https://www.base64url.com](https://www.base64url.com)).\
    \ Вот пример (он был разбит на позициях точек, чтобы поместиться на ширине этой\
    \ страницы):\n\n```\neyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.\neyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.\n\
    SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c\n```\n\nКак обычная строка ASCII,\
    \ которую можно использовать также в URL, она может передаваться веб-серверам\
    \ как часть URL-адреса, параметр запроса, HTTP-заголовок, куки-файлы и т. д.\n\
    \nJWT позволяет избежать поиска в базе данных, но это означает также, что вы не\
    \ сможете обнаружить аннулированную авторизацию напрямую.\n\n## Сторонняя аутентификация:\
    \ OIDC\n\nЧасто можно встретить сайты, позволяющие войти в систему с помощью идентификатора\
    \ и пароля или войти через свой аккаунт на другом сайте, например Google, Facebook/Meta,\
    \ LinkedIn и многих других. В таком случае часто используется стандарт OpenID\
    \ Connect (OIDC) ([https://openid.net/connect](https://openid.net/connect)), созданный\
    \ поверх OAuth2. Когда вы подключаетесь к внешнему сайту с поддержкой OIDC, вы\
    \ получаете в ответ маркер доступа OAuth2 (как в примерах в этой главе), а также\
    \ ID token.\n\nОфициальная документация FastAPI не содержит примера кода для интеграции\
    \ с OIDC. Если вы хотите попробовать, то сэкономить время на создание собственной\
    \ реализации позволят некоторые сторонние пакеты (как специфичные для FastAPI,\
    \ так и более общие):\n\n- FastAPI OIDC (https://oreil.ly/TDABr);\n- fastapi-third-party-auth\
    \ (https://oreil.ly/yGaO6);\n- FastAPI Resource Server (https://oreil.ly/THByF);\n\
    - oauthlib (https://oreil.ly/J-pDB);\n- oic (https://oreil.ly/AgYKZ);\n- OIDC\
    \ Client (https://oreil.ly/e9QGb);\n- oidc-op (https://oreil.ly/cJCF4);\n- OpenID\
    \ Connect (https://oreil.ly/WH49I).\n\nСтраница репозитория с проблемами FastAPI\
    \ (https://oreil.ly/ztR3r) содержит множество примеров кода, а также комментарий\
    \ от пользователя tianangelo (Себастьян Рамирес) о том, что в будущем примеры\
    \ FastAPI OIDC будут включены в официальную документацию и учебники.\n\n## Авторизация\n\
    \nАутентификация отвечает за то, *кто* (личность), а авторизация — за то, *что*:\
    \ к каким ресурсам (конечным точкам веб-страниц) вам разрешен доступ и каким образом?\
    \ Количество комбинаций ответов на вопросы «кто?» и «что?» может быть огромным.\n\
    \nВ этой книге основными ресурсами стали исследователи и существа. Поиск исследователя\
    \ или их общего списка — обычно более открытый процесс, чем добавление или изменение\
    \ существующей записи. Если веб-сайт должен быть надежным интерфейсом для доступа\
    \ к данным, доступ к записи должен быть более ограниченным, чем доступ к чтению.\
    \ Потому что, бр-р, люди.\n\nЕсли доступ ко всем конечным точкам полностью открыт,\
    \ авторизация не требуется, можете пропустить этот раздел. Простейшая авторизация\
    \ может быть простой булевой функцией (является этот пользователь администратором\
    \ или нет?). Для примеров в этой книге вам может потребоваться авторизация уровня\
    \ администратора для добавления, удаления или изменения исследователя или существа.\
    \ Если в вашей базе данных много записей, возможно, вы захотите"
  mdcn: "## 用户层\n\n示例 11.11 定义了用户层的基础用户模块。它应用了示例 11.10 中 `service/user.py` 模块的新认证代码。\n\
    \n**示例 11.11.** 用户层：web/user.py\n\n```python\nimport os\nfrom fastapi import APIRouter,\
    \ HTTPException\nfrom fastapi.security import OAuth2PasswordBearer, OAuth2PasswordRequestForm\n\
    from model.user import User\nif os.getenv(\"CRYPTID_UNIT_TEST\"):\n    from fake\
    \ import user as service\nelse:\n    from service import user as service\nfrom\
    \ error import Missing, Duplicate\n\nACCESS_TOKEN_EXPIRE_MINUTES = 30\n\nrouter\
    \ = APIRouter(prefix = \"/user\")\n\n# --- 新的认证数据\n\n# 此依赖项在目录 \"/user/token\"\
    \ 中创建消息\n# （来自包含用户名和密码的表单）\n# 并返回访问令牌。\noauth2_dep = OAuth2PasswordBearer(tokenUrl=\"\
    token\")\n\ndef unauthed():\n    raise HTTPException(\n        status_code=401,\n\
    \        detail=\"Incorrect username or password\",\n        headers={\"WWW-Authenticate\"\
    : \"Bearer\"},\n        )\n\n# 任何包含 oauth2_dep() 依赖项的调用\n# 都会路由到此端点：\n@router.post(\"\
    /token\")\nasync\ndef create_access_token(\n    form_data: OAuth2PasswordRequestForm\
    \ = Depends()\n):\n    \"\"\"从 OAuth 表单获取用户名和密码，\n    返回访问令牌\"\"\"\n    user =\
    \ service.auth_user(form_data.username, form_data.password)\n    if not user:\n\
    \        unauthed()\n    expires = timedelta(minutes=ACCESS_TOKEN_EXPIRE_MINUTES)\n\
    \    access_token = service.create_access_token(\n        data={\"sub\": user.username},\
    \ expires=expires\n    )\n    return {\"access_token\": access_token, \"token_type\"\
    : \"bearer\"}\n\n@app.get(\"/token\")\ndef get_access_token(token: str = Depends(oauth2_dep))\
    \ -> dict:\n    \"\"\"返回当前访问令牌\"\"\"\n    return {\"token\": token}\n\n# --- 之前的\
    \ CRUD 材料\n\n@router.get(\"/\")\ndef get_all() -> list[User]:\n    return service.get_all()\n\
    \n@router.get(\"/{name}\")\ndef get_one(name) -> User:\n    try:\n        return\
    \ service.get_one(name)\n    except Missing as exc:\n        raise HTTPException(status_code=404,\
    \ detail=exc.msg)\n\n@router.post(\"/\", status_code=201)\ndef create(user: User)\
    \ -> User:\n    try:\n        return service.create(user)\n    except Duplicate\
    \ as exc:\n        raise HTTPException(status_code=409, detail=exc.msg)\n\n@router.patch(\"\
    /\")\ndef modify(name: str, user: User) -> User:\n    try:\n        return service.modify(name,\
    \ user)\n    except Missing as exc:\n        raise HTTPException(status_code=404,\
    \ detail=exc.msg)\n\n@router.delete(\"/{name}\")\ndef delete(name: str) -> None:\n\
    \    try:\n        return service.delete(name)\n    except Missing as exc:\n \
    \       raise HTTPException(status_code=404, detail=exc.msg)\n```\n\n## 测试！\n\n\
    这个新用户组件的单元测试和集成测试与你之前看到的关于生物和研究者的测试类似。与其研究印刷文本，不如在本书的配套网站上查看它们¹。\n\n## 顶层\n\n\
