- md: "## Использование форм автоматизированного тестирования FastAPI\n\nПомимо выполняемых\
    \ вручную тестов, которые я применял в большинстве примеров, FastAPI предоставляет\
    \ очень хорошие автоматизированные формы тестирования в конечных точках /docs\
    \ и /redocs. Это два разных стиля для одних и тех же сведений, поэтому я просто\
    \ покажу немного информации, размещаемой на страницах /docs (рис. 8.1).\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_129_0.png)\n\
    \n**Рис. 8.1.** Сгенерированная страница документации\n\nПопробуйте выполнить\
    \ первый тест.\n\n1. Нажмите стрелку вниз, находящуюся справа под верхним разделом\
    \ GET /explorer/. Откроется большая светло-голубая форма.\n2. Нажмите синюю кнопку\
    \ Execute (Выполнить) слева. На рис. 8.2 вы видите верхнюю часть результатов.\n\
    \n![](img/eacb50a37d89d355fa68de0c62d56b32_130_0.png)\n\n**Рис. 8.2.** Генерируемая\
    \ страница результатов для GET /explorer/\n\nВ разделе Response body (Тело ответа)\
    \ выводится текст в формате JSON, возвращаемый для фиктивных данных исследователя.\
    \ Их мы определили ранее:\n\n```json\n[\n    {\n        \"name\": \"Claude Hande\"\
    ,\n        \"country\": \"FE\",\n        \"description\": \"Scarce during full\
    \ moons\"\n    },\n    {\n        \"name\": \"Noah Weiser\",\n        \"country\"\
    : \"DE\",\n        \"description\": \"Myopic machete man\"\n    }\n]\n```\n\n\
    Попробуйте выполнить все остальные тесты. Для некоторых, таких как GET /explorer/{name},\
    \ нужно будет указать входное значение. Вы получите ответ на каждый из тестов\
    \ (правда, некоторые так и останутся без ответа, пока не будет добавлен код базы\
    \ данных). Можно повторить эти тесты в конце глав 9 и 10, чтобы убедиться, что\
    \ никакие конвейеры данных не были повреждены при внесении изменений в код.\n\n\
    ## Общение с уровнями сервисов и данных\n\nКогда функции на веб-уровне нужны данные,\
    \ находящиеся под управлением уровня данных, она должна попросить уровень сервисов\
    \ стать посредником. Это требует больше кода и может показаться ненужным, но это\
    \ хорошая идея.\n\n- Как гласит этикетка на банке, веб-уровень работает с Интернетом,\
    \ а уровень данных — с внешними хранилищами данных и сервисами. Гораздо безопаснее\
    \ хранить их данные по отдельности.\n- Уровни можно тестировать независимо друг\
    \ от друга. Механизм разделения уровней позволяет это сделать.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_131_0.png)\n\
    \nДля очень маленького сайта можно пропустить сервисный слой, если он ничего не\
    \ делает. В главе 9 изначально определены сервисные функции, выполняющие лишь\
    \ передачу запросов и ответов между веб-уровнем и уровнем данных. Хотя бы эти\
    \ уровни необходимо разделить.\n\nЧто делает функция сервисного уровня? Узнаете\
    \ в следующей главе. Подсказка: она разговаривает с уровнем данных, но тихим голосом,\
    \ чтобы веб-уровень не понял, что именно она говорит. Также она определяет любую\
    \ специфическую бизнес-логику, например взаимодействие между ресурсами. Чаще всего\
    \ веб-уровень и уровень данных не должны заботиться о том, что происходит внутри.\n\
    \n> (Уровень сервисов — это секретная служба.)\n\n## Пагинация и сортировка\n\n\
    В веб-интерфейсах, когда возвращаются многие или все сущности с URL-шаблонами,\
    \ такими как GET /resource, часто требуется запросить поиск и возврат ресурсов:\n\
    \n- только одного;\n- возможно, многих;\n- всех.\n\nКак заставить наш благонамеренный,\
    \ но крайне прямолинейно мыслящий компьютер выполнять такие задачи? В первом случае,\
    \ согласно описанному ранее шаблону RESTful, в URL-путь нужно включить идентификатор\
    \ ресурса. При получении нескольких ресурсов может потребоваться увидеть результаты\
    \ в определенном порядке.\n\n- *Сортировка* — упорядочение всех результатов, даже\
    \ если за один раз вы получите только часть из них.\n- *Пагинация* — возвращение\
    \ лишь некоторых результатов за раз с соблюдением любого типа сортировки.\n\n\
    В каждом случае группа параметров, задаваемых пользователем, указывает на то,\
    \ что вам нужно. Обычно их задают в качестве параметров запроса. Вот несколько\
    \ примеров.\n\n- *Сортировка* `GET /explorer?sort=country` — получение всех исследователей,\
    \ отсортированных по коду страны.\n- *Пагинация* `GET /explorer?offset=10&size=10`\
    \ — возвращение из всего списка лишь записей исследователей (в данном случае неотсортированных),\
    \ находящихся на позициях с 10-й по 19-ю.\n- *Оба запроса* — `GET /explorer?sort=country&offset=10&size=10`.\n\
    \nИх можно задать в виде отдельных параметров запроса, и в этом вам поможет внедрение\
