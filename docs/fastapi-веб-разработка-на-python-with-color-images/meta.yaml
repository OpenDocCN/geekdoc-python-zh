    \ 中装饰器对被包装函数所做的操作。\n\n在某些情况下，可以使用中间件或通过 `Depends()` 函数进行依赖注入。中间件更适合解决更全局性的安全问题，例如\
    \ CORS，这导致了……\n\n## CORS\n\n跨源资源共享（Cross-Origin Resource Sharing, CORS）涉及其他受信任服务器与您的网站之间的通信。如果网站的所有前端和后端代码都在一个地方，那么就不会出现问题。但在当今，经常出现的情况是，用\
    \ JavaScript 编写的前端与用类似 FastAPI 的语言编写的后端进行通信。这些服务器将不具有相同的来源：\n\n- 协议——HTTP 或 HTTPS；\n\
    - 域名——互联网域名，例如 google.com 或 localhost；\n- 端口——该域名中的数字 TCP/IP 端口，例如 80、443 或 8000。\n\
    \n后端如何区分可信的前端和一盒发霉的红矮星，或者一个捻着胡子的恶意攻击者？这是 CORS 的工作——一种定义后端信任什么的技术。最著名的方法包括：\n\n\
    - Origin 请求头；\n- HTTP 方法；\n- HTTP 头；\n- CORS 缓存超时。\n\n您在 Web 层连接 CORS。示例 11.13\
    \ 展示了如何仅允许一个前端服务器（域名为 https://ui.cryptids.com），以及任何 HTTP 头和方法。\n\n### 示例 11.13.\
    \ 激活 CORS 中间件\n\n```python\nfrom fastapi import FastAPI, Request\nfrom fastapi.middleware.cors\
    \ import CORSMiddleware\n\napp = FastAPI()\n\napp.add_middleware(\n    CORSMiddleware,\n\
    \    allow_origins=[\"https://ui.cryptids.com\",],\n    allow_credentials=True,\n\
    \    allow_methods=[\"*\"],\n    allow_headers=[\"*\"],\n    )\n\n@app.get(\"\
    /test_cors\")\ndef test_cors(request: Request):\n    print(request)\n```\n\n此后，任何其他试图直接与网站后端通信的域名都将被拒绝。\n\
    \n## 第三方软件包\n\n您已经了解了如何使用 FastAPI 创建身份验证和授权解决方案的示例。但是，可能不需要全部自己动手。FastAPI 的生态系统正在快速发展，可能会出现为您完成大部分工作的软件包。\n\
    \n我将提供一些未经验证的示例。无法保证一段时间后此列表中的任何软件包都会继续存在并得到维护，但也许值得您关注：\n\n- FastAPI Users (https://oreil.ly/ueVfq);\n\
    - FastAPIJWT Auth (https://oreil.ly/ooGSK);\n- FastAPI-Login (https://oreil.ly/oWA3p);\n\
    - fastapi-auth0 (https://oreil.ly/fHfkU);\n- AuthX (https://authx.yezz.me);\n\
    - FastAPI-User-Auth (https://oreil.ly/J57xu);\n- fastapi-authz (https://oreil.ly/aAGzW);\n\
    - fastapi-opa (https://oreil.ly/Bvzv3);\n- FastAPI-key-auth (https://oreil.ly/s-Ui5);\n\
    - FastAPI Auth Middleware (https://oreil.ly/jnR-s);\n- fastapi-jwt (https://oreil.ly/RrxUZ);\n\
    - fastapi_auth2 (https://oreil.ly/5DXkB);\n- fastapi-sso (https://oreil.ly/GLTdt);\n\
    - Fief (https://www.fief.dev).\n\n## 结论\n\n本章比其他章节更难。它展示了对访客进行身份验证和授权以执行特定操作的方法。这是\
    \ Web 安全的两个方面。这里还讨论了 CORS——Web 安全的另一个重要主题。\n\n# 第 12 章\n\n## 测试\n\n> 质量保证工程师走进一家酒吧。点了一杯啤酒。点了\
    \ 0 杯啤酒。点了 99 999 999 999 杯啤酒。点了一只蜥蜴。点了 -1 杯啤酒。点了 ueicbksjdhd。\n\n第一位真正的顾客走进来，询问洗手间在哪里。酒吧里燃起了火焰，所有人都死了。\n\
    \n*布伦南·凯勒（Twitter）*\n\n## 概述\n\n本章讨论了在 FastAPI 网站上执行的测试类型：*单元测试、集成测试和端到端测试*。这里将应用\
    \ *pytest* 模块和自动化测试开发。\n\n## Web API 测试\n\n您已经看到了一些在添加端点时手动测试 API 的工具：\n\n- HTTPie；\n\
    - Requests；\n- HTTPX；\n- 浏览器。\n\n还有许多其他测试工具。\n\n- Curl 工具 (https://curl.se) 非常著名，尽管在本书中我使用了\
    \ HTTPie，以使语法更简单。\n- Httpbin 服务 (http://httpbin.org) 由 Requests 库的作者编写。它是一个免费的测试服务器，可以让您了解关于\
    \ HTTP 请求的许多信息。\n- Postman (https://www.postman.com) 是一个功能齐全的 API 测试平台。\n- Chrome\
    \ DevTools (https://oreil.ly/eUK_R) 是 Chrome 浏览器内置的一套丰富的工具集。\n\n所有这些都可以用于执行端到端测试，类似于您在前面章节中看到的那些测试。这些手动测试对于在输入代码后快速检查代码非常有用。\n\
    \n但是，如果后来的更改破坏了这些早期手动测试中的一个（*回归测试*）怎么办？您不想在每次代码更改后都重复数十个测试。这就是*自动化*测试变得非常重要的原因。本章的其余部分将专注于它们以及如何使用\
    \ pytest 创建它们。\n\n## 在哪里测试\n\n我已经提到了测试的种类：\n\n- *单元测试*——在层级内部，测试单个函数；\n- *集成测试*——跨不同层级，测试相互关系；\n\
    - *端到端测试*——测试完整的 API 及其底层技术栈。\n\n有时它们被称为*测试金字塔*，其宽度表示每组所需的相对测试数量（图 12.1）。\n\n\
    ![](img/eacb50a37d89d355fa68de0c62d56b32_189_0.png)\n\n## 测试什么\n\n在编写代码的过程中需要测试什么？本质上，需要确认在给定输入数据的情况下，您将获得正确的输出数据。\n\
    \n可以检查以下几点：\n\n- 错误输入；\n- 重复输入；\n- 错误的输入类型；\n- 错误的输入顺序；\n- 不允许的输入值；\n- 巨大的输入和输出数据数组。\n\
    \n错误可能发生在任何地方。\n\n- *Web 层*——Pydantic 会捕获任何模型不匹配的情况，并返回 HTTP 状态码 422。\n- *数据层*——当数据缺失或重复，以及\
    \ SQL 查询语法错误时，数据库将抛出异常。当以单个块而不是通过生成器或分页分段传输巨大的数据结果时，可能会发生超时或内存耗尽。\n- *任何层级*——都可能出现普通的错误和疏忽。\n\
    \n第 8-10 章包含其中一些测试：\n\n- 使用 HTTPie 等工具进行*手动端到端测试*；\n- 以 Python 代码片段形式进行的*手动单元测试*；\n\
    - 使用 pytest 脚本进行的*自动化测试*。\n\n在接下来的几个部分中，我们将详细探讨 pytest。"
