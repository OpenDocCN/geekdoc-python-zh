  md: "# Первый код веб-сайта\n\nВ этом разделе мы рассмотрим, как использовать FastAPI\
    \ для написания запросов и ответов для сайта RESTful API. Затем начнем применять\
    \ их на нашем реальном все более и более странном сайте.\n\nНачнем с примера 8.1.\
    \ В каталоге src создайте новую программу верхнего уровня main.py — она будет\
    \ запускать программу Uvicorn и пакет FastAPI.\n\n**Пример 8.1. Основная программа\
    \ main.py**\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"\
    /\")\ndef top():\n    return \"top here\"\n\nif __name__ == \"__main__\":\n  \
    \  import uvicorn\n    uvicorn.run(\"main:app\", reload=True)\n```\n\nСлово app\
    \ здесь представляет собой объект FastAPI, связывающий все воедино. Первый аргумент\
    \ Uvicorn — \"main:app\", потому что файл называется main.py, а второй — app,\
    \ имя объекта FastAPI.\n\nUvicorn будет продолжать работать и перезапустится,\
    \ если в том же каталоге или в любых подкаталогах изменится код. Без аргумента\
    \ reload=True придется перезапускать Uvicorn каждый раз, когда вы вносите изменения\
    \ в код. Во многих следующих примерах просто вносите изменения в один и тот же\
    \ файл main.py и принудительно перезапускайте его, вместо того чтобы создавать\
    \ файлы main2.py, main3.py и т. д. Запустите файл main.py из примера 8.2.\n\n\
    **Пример 8.2. Запуск основной программы**\n\n```\n$ python main.py &\nINFO:  \
    \   Will watch for changes in these directories: [.../fastapi']\nINFO:     Uvicorn\
    \ running on http://127.0.0.1:8000 (Press CTRL+C to quit)\nINFO:     Started reloader\
    \ process [92543] using StatReload\nINFO:     Started server process [92551]\n\
    INFO:     Waiting for application startup.\nINFO:     Application startup complete.\n\
    ```"
