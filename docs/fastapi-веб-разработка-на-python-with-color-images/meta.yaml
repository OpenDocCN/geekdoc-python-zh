  md: "Хотя curl (https://curl.se) — это самый известный текстовый веб-клиент, я считаю,\
    \ что HTTPie проще в использовании. Кроме того, по умолчанию он задействует кодирование\
    \ и декодирование JSON, что лучше подходит для FastAPI. Далее в этой главе вы\
    \ увидите снимок экрана, содержащий синтаксис командной строки curl, необходимой\
    \ для доступа к определенной конечной точке.\n\nСтанем тенью веб-разработчика-интроверта\
    \ в примере 3.1 и сохраним этот код в файле hello.py.\n\n# Пример 3.1. Робкая\
    \ конечная точка (hello.py)\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi\")\ndef greet():\n    return \"Hello? World?\"\n```\n\nНужно\
    \ обратить внимание на следующие моменты.\n\n+   - app — это объект FastAPI верхнего\
    \ уровня, представляющий все веб-приложение.\n- @app.get(\"/hi\") — это декоратор\
    \ пути. Он сообщает FastAPI следующее:\n    - запрос к URL-адресу \"/hi\" на этом\
    \ сервере должен быть направлен на следующую функцию;\n    - этот декоратор применяется\
    \ только к HTTP-глаголу GET. Также можно ответить на URL-запросы \"/hi\", отправленные\
    \ другими HTTP-глаголами (PUT, POST и т. д.), каждый с отдельной функцией.\n-\
    \ def greet() представляет собой функцию пути — основную точку контакта с HTTP-запросами\
    \ и ответами. В этом примере у нее нет аргументов, но следующие разделы показывают,\
    \ что в недрах FastAPI скрывается гораздо больше.\n\nСледующим шагом будет запуск\
    \ этого веб-приложения на веб-сервере. Сам FastAPI не включает в себя веб-сервер,\
    \ но рекомендует использовать Uvicorn. Запустить Uvicorn и веб-приложение FastAPI\
    \ можно двумя способами — извне или изнутри."
