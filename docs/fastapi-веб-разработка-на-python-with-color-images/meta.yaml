    \ requests\n>>> url = \"http://localhost:8000/small\"\n>>> files = {'small_file':\
    \ open('1KB.bin', 'rb')}\n>>> resp = requests.post(url, files=files)\n>>> print(resp.json())\n\
    file size: 1000\n```\n\n# Класс UploadFile\n\nДля больших файлов лучше использовать\
    \ класс UploadFile. Он создает объект Python под названием SpooledTemporary File,\
    \ обычно на диске сервера, а не в памяти. Это файлоподобный объект Python, и он\
    \ поддерживает методы read(), write() и seek(). Пример 15.4 показывает реализацию\
    \ этого подхода; в нем также используется объявление async def вместо def, чтобы\
    \ избежать блокировки веб-сервера во время выгрузки частей файла.\n\n# Пример\
    \ 15.4. Выгрузка большого файла с помощью FastAPI\n(добавить к файлу main.py)\n\
    \n```\nfrom fastapi import UploadFile\n\n@app.post(\"/big\")\nasync def upload_big_file(big_file:\
    \ UploadFile) -> str:\n    return f\"file size: {big_file.size}, name: {big_file.filename}\"\
    \n```\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_235_0.png)\n\nФункция File()\
    \ создает объект bytes и нуждается в круглых скобках. UploadFile — это объект\
