    клиенту.

    - После того как клиент заполнит и отправит эту форму, имя пользователя и пароль
    (хешированные тем же алгоритмом, что и те, которые уже хранятся в локальной базе
    данных) будут сопоставлены с находящимися в локальной базе данных.

    - При их совпадении токен доступа (в формате JWT) генерируется и возвращается.

    - Этот токен доступа передается обратно веб-серверу в виде HTTP-заголовка Authorization
    при последующих запросах. JWT-токен декодируется на локальном сервере в имя пользователя
    и другие данные. Это имя не нужно снова искать в базе данных.

    - Имя пользователя аутентифицировано, и сервер может делать с ним все, что захочет.


