    \ WSGI-приложением, в версии 3.0 была добавлена поддержка стандарта ASGI.\n\n\
    В отличие от Flask и FastAPI, Django предпочитает определять маршруты (связывая\
    \ URL с веб-функциями, которые он называет *функциями представления*) в одной\
