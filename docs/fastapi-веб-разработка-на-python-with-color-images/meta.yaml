  md: 'Существует *множество* мнений о том, как следует планировать страницы для разработки.
    Такой дизайн призван показать разделение уровней и оставить место для *будущих*
    дополнений.


    Сейчас необходимо дать некоторые объяснения. Поначалу файлы `__init__.py` будут
    пустыми. Они представляют собой своего рода хакерскую уловку в отношении Python,
    поэтому к содержащей их папке следует относиться как к пакету Python, который
    можно импортировать. Во-вторых, папка `fake` предоставляет некоторые данные-заглушки
    для более высоких уровней по мере создания нижних.


    Кроме того, логика *импорта* в Python не работает строго с иерархиями каталогов.
    Она опирается на *пакеты* и *модули* Python. Файлы с расширением `.py`, перечисленные
    в приведенной ранее древовидной структуре, являются модулями Python (исходными
    файлами). Их родительские каталоги будут считаться пакетами, *если* они содержат
    файл `__init__.py`. (Это соглашение необходимо, чтобы, если у вас есть каталог
    `sys` и вы набираете команду `import sys`, Python мог определить, вам нужен системный
    каталог или ваш локальный.)


    Программы Python могут импортировать пакеты и модули. У интерпретатора Python
    есть встроенная переменная `sys.path`. Она содержит местоположение стандартного
    кода Python. Переменная окружения `PYTHONPATH` — это пустая или разделенная двоеточием
    строка имен каталогов. Она указывает Python, какие родительские каталоги проверять
    перед `sys.path`, чтобы найти импортируемые модули или пакеты. Поэтому, если вы
    переходите в новую папку `fastapi`, введите следующую команду (в Linux или macOS),
    чтобы новый код в ней проверялся первым при импорте:


    ```

    $ export PYTHONPATH=$PWD/src

    ```


    Часть выражения `$PWD` означает «вывести *рабочий каталог*» и избавляет вас от
    необходимости вводить полный путь к каталогу `fastapi`, хотя вы можете это сделать,
    если хотите. А `src` означает, что искать модули и пакеты для импорта нужно только
    там.


    Чтобы установить переменную окружения `PWD` в Windows, изучите раздел *Excursus:
    Setting Environment Variables* на сайте Python Software Foundation (https://oreil.ly/9NRBA).


    Фух.'
