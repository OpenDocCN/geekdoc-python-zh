- md: "Как же сделать правильный выбор? Стоит рассмотреть следующие критерии:\n\n\
    - типы графиков (например, диаграмма рассеяния, столбчатая диаграмма, линейный\
    \ график);\n- стилизация;\n- простота использования;\n- производительность;\n\
    - ограничения в данных.\n\nТакие сравнительные исследования, как *Top 6 Python\
    \ Libraries for Visualization: Which One to Use?* (https://oreil.ly/10Nsw) пользователя\
    \ khuyentran1476, могут помочь вам с выбором. В конце концов выбор часто сводится\
    \ к тому варианту, о котором вы узнаете больше всего. Для этой главы я выбрал\
    \ пакет Plotly, позволяющий создавать привлекательные графики без написания лишнего\
    \ кода.\n\n## Пример диаграммы 1. Тестирование\n\nPlotly — это библиотека Python\
    \ с открытым исходным кодом (бесплатная) и несколькими уровнями контроля и детализации:\n\
    \n- *Plotly Express* (https://plotly.com/python/plotly-express) — минимальная\
    \ библиотека Plotly;\n- *Plotly* (https://plotly.com/python) — основная библиотека;\n\
    - *Dash* (https://dash.plotly.com) — инструменты для работы с данными.\n\nСуществует\
    \ также платформа Dash Enterprise (https://dash.plotly.com/dash-enterprise). Она,\
    \ как и почти все, что имеет в названии слово enterprise — «корпоративный» (включая\
    \ модели космических кораблей), стоит денег, обычно больших.\n\nЧто мы можем показать\
    \ на основе данных о существах? У диаграмм и графиков есть несколько общих форм:\n\
    \n- столбцовая;\n- рассеяния;\n- линейная;\n- коробчатая (статистическая);\n-\
    \ гистограмма.\n\nВсе наши поля данных — строки намеренно минимального размера,\
    \ чтобы примеры не перегружали логику и этапы интеграции. Для каждого примера\
    \ будем считывать все данные о существах из базы данных SQLite, используя код\
    \ из предыдущих глав, а также добавлять функции веб- и сервисного уровня для выбора\
    \ определенных данных для передачи в функции библиотеки графиков. Сначала установите\
    \ пакет Plotly и библиотеку, необходимую ему для экспорта изображений:\n\n- pip\
    \ install plotly;\n- pip install kaleido.\n\nЗатем (пример 17.8) добавьте тестовую\
    \ функцию в файл web/creature.py, чтобы проверить, есть ли у нас нужные фрагменты\
    \ кода в нужных местах.\n\n### Пример 17.8. Добавление тестовой конечной точки\
    \ (редактирование файла web/creature.py)\n\n```python\n# (добавьте эти строки\
    \ в файл web/creature.py)\n\nfrom fastapi import Response\nimport plotly.express\
    \ as px\n\n@router.get(\"/test\")\ndef test():\n    df = px.data.iris()\n    fig\
    \ = px.scatter(df, x=\"sepal_width\", y=\"sepal_length\", color=\"species\")\n\
    \    fig_bytes = fig.to_image(format=\"png\")\n    return Response(content=fig_bytes,\
    \ media_type=\"image/png\")\n```\n\nВ документации обычно рекомендуется вызывать\
    \ функцию fig.show(), чтобы показать только что созданное изображение, но мы пытаемся\
    \ соответствовать тому, как это делают FastAPI и Starlette.\n\nИтак, сначала вы\
    \ получаете fig_bytes (актуальное содержимое bytes изображения). Затем возвращаете\
    \ пользовательский объект Response.\n\nПосле того как вы добавили конечную точку\
    \ в файл web/creature.py и перезапустили веб-сервер (автоматически, если запустили\
    \ Uvicorn с аргументом --reload), попробуйте получить доступ к новой конечной\
    \ точке, набрав текст **localhost:8000/creature/test** в адресной строке браузера.\
    \ На экране должно появиться изображение, приведенное на рис. 17.1.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_254_0.png)\n\
    \nЕсли вы получили от Uvicorn странную ошибку, например `ValueError: 'not' is\
    \ not a valid parameter name`, обновите Pydantic, чтобы исправить это: `pip install\
    \ -U pydantic`.\n\n## Пример диаграммы 2. Гистограмма\n\nЕсли все в порядке, начнем\
    \ работать с данными о существах. Добавим функцию `plot()` в файл `web/creature.py`.\
    \ Мы получим все данные о существах из базы данных с помощью функции `get_all()`\
    \ в файлах `service/creature.py` и `data/creature.py`. Затем извлечем то, что\
    \ нам нужно, и с помощью возможностей Plotly выведем различные изображения результатов.\n\
    \nДля первого приема (пример 17.9) просто используем поле `name` и построим гистограмму,\
    \ показывающую количество имен существ, начинающихся на каждую букву.\n\n### Пример\
    \ 17.9. Столбчатая диаграмма инициалов имен существ\n\n```python\n# (добавьте\
    \ эти строки в файл web/creature.py)\n\nfrom collections import Counter\nfrom\
    \ fastapi import Response\nimport plotly.express as px\nfrom service.creature\
    \ import get_all\n\n@router.get(\"/plot\")\ndef plot():\n    creatures = get_all()\n\
    \    letters = \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\"\n    counts = Counter(creature.name[0]\
    \ for creature in creatures)\n    y = { letter: counts.get(letter, 0) for letter\
    \ in letters }\n    fig = px.histogram(x=list(letters), y=y, title=\"Creature\
    \ Names\",\n        labels={\"x\": \"Initial\", \"y\": \"Initial\"})\n    fig_bytes\
    \ = fig.to_image(format=\"png\")\n    return Response(content=fig_bytes, media_type=\"\
    image/png\")\n```\n\nВведите localhost:8000/creature/plot в адресную строку своего\
    \ браузера. Вы должны увидеть изображение, приведенное на рис. 17.2.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_255_0.png)\n\
    \nРис. 17.2. Гистограмма инициалов имен существ\n\n## Пакеты для работы с картами\n\
    \nЕсли вы введете в поисковую строку Google слова *Python* и *maps*, то получите\
    \ множество ссылок о словарях Python, которые являются встроенным в язык типом\
    \ отображения¹, но это не то, о чем сейчас пойдет речь. Поэтому вам, возможно,\
    \ придется попробовать такие синонимы, как *GIS*, *geo*, *cartography*, *spatial*\
    \ и т. д. Некоторые популярные пакеты, приведенные далее, созданы на основе других\
    \ пакетов из списка:\n\n- *PyGIS* (https://oreil.ly/3QvCz) — ссылки по обработке\
    \ пространственных данных в Python;\n- *PySAL* (https://pysal.org) — библиотека\
    \ пространственного анализа Python;\n- *Cartopy* (https://oreil.ly/YnUow) — анализирует\
    \ и наносит на карту геопространственные данные;\n- *Folium* (https://oreil.ly/72luj)\
    \ — интегрирован с JavaScript;\n- *Python Client for Google Maps Services* (https://oreil.ly/LWfS5)\
    \ — API-доступ к Google Maps;\n- *Geemap* (https://geemap.org) — с поддержкой\
    \ Google Earth;\n- *Geoplot* (https://oreil.ly/Slfvc) — расширяет пакеты Cartopy\
    \ и Matplotlib;\n- *GeoPandas* (https://geopandas.org) — расширение для нашей\
    \ любимой библиотеки pandas;\n- *ArcGIS and ArcPy* (https://oreil.ly/l7M5C) —\
    \ интерфейс Esri с открытым исходным кодом.\n\nКак и в случае с пакетами диаграмм/графиков,\
    \ выбор может зависеть от таких факторов, как:\n\n- типы карт (например, фоновая,\
    \ векторная, растровая);\n- стилизация;\n- простота использования;\n- производительность;\n\
    - ограничения в данных.\n\n> ¹ В английском языке слово map означает и «карта»,\
    \ и «сопоставлять». Перевод различается только по контексту. — *Примеч. пер.*\n\
    \nКак и диаграммы и графики, карты бывают разных типов и могут использоваться\
    \ для различных целей.\n\n## Пример карты\n\nДля примеров из области картографии\
    \ я снова использую пакет Plotly — он не слишком прост и не слишком сложен и помогает\
    \ показать, как интегрировать небольшую веб-карту с FastAPI.\n\nПример 17.10 иллюстрирует\
    \ получение двухбуквенных кодов стран ISO для наших существ. Но оказалось, что\
    \ функция, создающая карты Plotly (фоновая или *хороплет*, что само по себе звучит\
    \ как криптид, меняющий форму), хочет использовать вместо этого другой, трехбуквенный\
    \ стандарт кодов стран ISO. Б-р-р. Мы могли бы переделать все коды в базе данных\
    \ и PSV-файле, но проще выполнить команду `pip install country_converter` и сопоставить\
    \ один набор кодов стран с другим.\n\n### Пример 17.10. Карта стран с криптидами\
    \ (редактирование файла `web/creature.py`)\n\n```python\n# (добавьте эти строки\
    \ в файл web/creature.py)\n\nimport plotly.express as px\nimport country_converter\
    \ as coco\n\n@router.get(\"/map\")\ndef map():\n    creatures = service.get_all()\n\
    \    iso2_codes = set(creature.country for creature in creatures)\n    iso3_codes\
    \ = coco.convert(names=iso2_codes, to=\"ISO3\")\n    fig = px.choropleth(\n  \
    \      locationmode=\"ISO-3\",\n        locations=iso3_codes)\n    fig_bytes =\
    \ fig.to_image(format=\"png\")\n    return Response(content=fig_bytes, media_type=\"\
    image/png\")\n```\n\nВведите запрос браузеру на получение ответа по адресу `localhost:8000/creature/map`,\
    \ и, если повезет, вы увидите карту, на которой выделяются страны с криптидами\
    \ (рис. 17.3).\n\nМожете увеличить масштаб этой карты, чтобы сосредоточиться на\
    \ США, используя поле `area`, представляющее собой двухсимвольный код государства,\
    \ где `country` — это US. Задействуйте выражение `locationmode=\"USA-states\"\
    ` и присвойте значение `area` параметру `locations` функции `px.choropleth()`."
  mdcn: "如何做出正确的选择？应考虑以下标准：\n\n-   图表类型（例如，散点图、柱状图、折线图）；\n-   样式；\n-   易用性；\n-   性能；\n\
    -   数据限制。\n\n诸如用户khuyentran1476的*Top 6 Python Libraries for Visualization: Which\
    \ One to Use?* (https://oreil.ly/10Nsw)之类的比较研究，可以帮助您做出选择。归根结底，选择往往取决于您最熟悉的那个选项。在本章中，我选择了Plotly包，它允许在不编写过多代码的情况下创建美观的图表。\n\
    \n## 图表示例 1. 测试\n\nPlotly是一个开源（免费）的Python库，提供多个层级的控制和细节：\n\n-   *Plotly Express*\
    \ (https://plotly.com/python/plotly-express) — Plotly的极简库；\n-   *Plotly* (https://plotly.com/python)\
    \ — 核心库；\n-   *Dash* (https://dash.plotly.com) — 数据处理工具。\n\n还有一个Dash Enterprise\
    \ (https://dash.plotly.com/dash-enterprise)平台。它和几乎所有名称中带有“enterprise”（企业级）一词的东西一样（包括宇宙飞船模型），都是要花钱的，而且通常价格不菲。\n\
    \n基于生物数据，我们可以展示什么？图表和图形有几种常见形式：\n\n-   柱状图；\n-   散点图；\n-   折线图；\n-   箱线图（统计图）；\n\
    -   直方图。\n\n我们所有的数据字段——行，都特意设计得尽可能小，以免示例在逻辑和集成步骤上过于复杂。对于每个示例，我们将使用前面章节的代码从SQLite数据库中读取所有生物数据，并添加Web层和服务层函数，以选择特定数据传递给绘图库函数。首先安装Plotly包及其导出图像所需的库：\n\
    \n-   pip install plotly；\n-   pip install kaleido。\n\n然后（示例17.8）在`web/creature.py`文件中添加一个测试函数，以验证我们是否在正确的位置拥有所需的代码片段。\n\
    \n### 示例 17.8. 添加测试端点（编辑文件 `web/creature.py`）\n\n```python\n# (将这些行添加到文件 web/creature.py)\n\
    \nfrom fastapi import Response\nimport plotly.express as px\n\n@router.get(\"\
    /test\")\ndef test():\n    df = px.data.iris()\n    fig = px.scatter(df, x=\"\
    sepal_width\", y=\"sepal_length\", color=\"species\")\n    fig_bytes = fig.to_image(format=\"\
    png\")\n    return Response(content=fig_bytes, media_type=\"image/png\")\n```\n\
    \n文档通常建议调用`fig.show()`函数来显示刚刚创建的图像，但我们试图遵循FastAPI和Starlette的做法。\n\n因此，首先您获得`fig_bytes`（图像的实际字节内容）。然后返回自定义的`Response`对象。\n\
    \n在将端点添加到`web/creature.py`文件并重启Web服务器（如果您使用`--reload`参数启动Uvicorn，则会自动重启）后，尝试在浏览器地址栏中输入**localhost:8000/creature/test**来访问新端点。屏幕上应出现图17.1所示的图像。\n\
    \n![](img/eacb50a37d89d355fa68de0c62d56b32_254_0.png)\n\n如果您从Uvicorn收到奇怪的错误，例如`ValueError:\
    \ 'not' is not a valid parameter name`，请更新Pydantic以修复此问题：`pip install -U pydantic`。\n\
    \n## 图表示例 2. 直方图\n\n如果一切正常，让我们开始处理生物数据。在`web/creature.py`文件中添加`plot()`函数。我们将使用`service/creature.py`和`data/creature.py`文件中的`get_all()`函数从数据库获取所有生物数据。然后提取我们需要的内容，并利用Plotly的功能输出各种结果图像。\n\
    \n对于第一个示例（示例17.9），我们只使用`name`字段，并构建一个直方图，显示以每个字母开头的生物名称的数量。\n\n### 示例 17.9. 生物名称首字母柱状图\n\
    \n```python\n# (将这些行添加到文件 web/creature.py)\n\nfrom collections import Counter\n\
    from fastapi import Response\nimport plotly.express as px\nfrom service.creature\
    \ import get_all\n\n@router.get(\"/plot\")\ndef plot():\n    creatures = get_all()\n\
    \    letters = \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\"\n    counts = Counter(creature.name[0]\
    \ for creature in creatures)\n    y = { letter: counts.get(letter, 0) for letter\
    \ in letters }\n    fig = px.histogram(x=list(letters), y=y, title=\"Creature\
    \ Names\",\n        labels={\"x\": \"Initial\", \"y\": \"Initial\"})\n    fig_bytes\
    \ = fig.to_image(format=\"png\")\n    return Response(content=fig_bytes, media_type=\"\
    image/png\")\n```\n\n在浏览器地址栏中输入`localhost:8000/creature/plot`。您应该会看到图17.2所示的图像。\n\
    \n![](img/eacb50a37d89d355fa68de0c62d56b32_255_0.png)\n\n图 17.2. 生物名称首字母直方图\n\n\
    ## 地图处理包\n\n如果您在Google搜索栏中输入*Python*和*maps*，会得到大量关于Python字典的链接，字典是语言内置的映射类型¹，但这并非我们当前要讨论的内容。因此，您可能需要尝试诸如*GIS*、*geo*、*cartography*、*spatial*等同义词。以下列出的一些流行包是基于列表中的其他包构建的：\n\
    \n-   *PyGIS* (https://oreil.ly/3QvCz) — 关于Python中空间数据处理的链接；\n-   *PySAL* (https://pysal.org)\
    \ — Python空间分析库；\n-   *Cartopy* (https://oreil.ly/YnUow) — 分析和绘制地理空间数据；\n-   *Folium*\
    \ (https://oreil.ly/72luj) — 与JavaScript集成；\n-   *Python Client for Google Maps\
    \ Services* (https://oreil.ly/LWfS5) — Google Maps的API访问；\n-   *Geemap* (https://geemap.org)\
    \ — 支持Google Earth；\n-   *Geoplot* (https://oreil.ly/Slfvc) — 扩展Cartopy和Matplotlib包；\n\
    -   *GeoPandas* (https://geopandas.org) — 我们喜爱的pandas库的扩展；\n-   *ArcGIS and ArcPy*\
    \ (https://oreil.ly/l7M5C) — Esri的开源接口。\n\n与图表/图形包的情况一样，选择可能取决于以下因素：\n\n-   地图类型（例如，背景图、矢量图、栅格图）；\n\
    -   样式；\n-   易用性；\n-   性能；\n-   数据限制。\n\n> ¹ 在英语中，单词map既表示“地图”，也表示“映射”。翻译仅因上下文而异。——\
    \ *译者注*\n\n与图表和图形一样，地图也有不同类型，可用于不同目的。\n\n## 地图示例\n\n对于制图领域的示例，我将再次使用Plotly包——它既不太简单也不太复杂，并有助于展示如何将小型Web地图与FastAPI集成。\n\
    \n示例17.10演示了如何获取我们生物的ISO两位国家代码。但事实证明，创建Plotly地图（背景图或*choropleth*，这本身听起来就像一个会变形的神秘生物）的函数希望使用另一种三位ISO国家代码标准。呃。我们可以重写数据库和PSV文件中的所有代码，但更简单的方法是执行`pip\
    \ install country_converter`命令，将一组国家代码映射到另一组。\n\n### 示例 17.10. 包含神秘生物的国家地图（编辑文件\
    \ `web/creature.py`）\n\n```python\n# (将这些行添加到文件 web/creature.py)\n\nimport plotly.express\
    \ as px\nimport country_converter as coco\n\n@router.get(\"/map\")\ndef map():\n\
    \    creatures = service.get_all()\n    iso2_codes = set(creature.country for\
    \ creature in creatures)\n    iso3_codes = coco.convert(names=iso2_codes, to=\"\
    ISO3\")\n    fig = px.choropleth(\n        locationmode=\"ISO-3\",\n        locations=iso3_codes)\n\
    \    fig_bytes = fig.to_image(format=\"png\")\n    return Response(content=fig_bytes,\
    \ media_type=\"image/png\")\n```\n\n在浏览器中请求地址`localhost:8000/creature/map`，如果运气好，您将看到一张突出显示了有神秘生物的国家的地图（图17.3）。\n\
    \n您可以使用`area`字段（代表两位国家代码，其中`country`为US）来放大这张地图以聚焦美国。使用表达式`locationmode=\"USA-states\"\
    `并将`area`赋值给`px.choropleth()`函数的`locations`参数。"
