    ладки. Если на фабрике есть неизвестные двери, ночной сторож неизбежно будет удивлен.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_30_0.png)


    Стрелки между веб-клиентом и веб-уровнем задействуют протокол HTTP или HTTPS для
    передачи текста, преимущественно в формате JSON. Стрелки между уровнями данных
    и баз данных используют особый протокол для баз данных и передают текст в формате
    SQL или в другом. Стрелки между уровнями — это вызовы функций, переносящие модели
    данных.


    Кроме того, рекомендуемые форматы данных, проходящих через стрелки, таковы:


    +   - клиент ⇔ веб-уровень — RESTful HTTP с помощью JSON;

    - веб-уровень ⇔ сервис — модели;

    - сервис ⇔ данные — модели;

    - данные ⇔ базы данных и сервис — специализированные API.


    Основываясь на собственном опыте, я выбрал именно такую структуру тем для этой
    книги. Она вполне работоспособная и подходит для довольно сложных сайтов, но не
    единственно верная. Вы можете создать лучший дизайн! Как бы вы ни поступили, обратите
    внимание на основные ключевые точки.


    +   - Отделите свойственные домену детали.

    - Определите стандартные API между уровнями.

    - Не обманывайте, не допускайте утечек.


    Иногда решить, какой уровень лучше всего подходит для кода, бывает непросто. Например,
    в главе 11 рассматриваются требования к аутентификации и авторизации и способы
    их реализации — в качестве дополнительного уровня между веб- и сервисным уровнем
    или внутри одного из них. Разработка программного обеспечения — это порой не только
    искусство, но и наука.'
