    # Общение с уровнями сервисов и данных


    Когда функции на веб-уровне нужны данные, находящиеся под управлением уровня данных,
    она должна попросить уровень сервисов стать посредником. Это требует больше кода
    и может показаться ненужным, но это хорошая идея.


    +   - Как гласит этикетка на банке, веб-уровень работает с Интернетом, а уровень
    данных — с внешними хранилищами данных и сервисами. Гораздо безопаснее хранить
    их данные по отдельности.

    - Уровни можно тестировать независимо друг от друга. Механизм разделения уровней
