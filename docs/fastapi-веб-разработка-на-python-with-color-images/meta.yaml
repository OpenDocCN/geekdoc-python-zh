    ББК 32.988.02-018

    УДК 004.738.5

    Л93


    # Любанович Билл


    Л93 FastAPI: веб-разработка на Python. — Астана: «Спринт Бук», 2024. — 288 с.:
    ил.

    ISBN 978-601-08-3847-5


    FastAPI — относительно новый, но надежный фреймворк с чистым дизайном, использующий
    преимущества актуальных возможностей Python. Как следует из названия, FastAPI
    отличается высоким быстродействием и способен конкурировать в этом с аналогичными
    фреймворками на таких языках, как Golang. Эта практическая книга расскажет разработчикам,
    знакомым с Python, как FastAPI позволяет достичь большего за меньшее время и с
    меньшим количеством кода.


    Билл Любанович рассказывает о тонкостях разработки с применением FastAPI и предлагает
    множество рекомендаций по таким темам, как формы, доступ к базам данных, графика,
    карты и многое другое, что поможет освоить основы и даже пойти дальше. Кроме того,
    вы познакомитесь с RESTful API, приемами валидации данных, авторизации и повышения
    производительности. Благодаря сходству с такими фреймворками, как Flask и Django,
    вы легко начнете работу с FastAPI.


    **16+** (В соответствии с Федеральным законом от 29 декабря 2010 г. № 436-ФЗ.)


    ББК 32.988.02-018

    УДК 004.738.5


