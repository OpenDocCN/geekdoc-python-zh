  md: "# Пример 15.9. Загрузка небольшого файла с помощью HTTPie с подсчетом байтов\n\
    \n```\n$ http -b http://localhost:8000/small/1KB.bin | wc -c\n1000\n```\n\n# Класс\
    \ StreamingResponse\n\nКак и в случае с модулем FileUpload, большие файлы лучше\
    \ загружать с помощью класса StreamingResponse, возвращающего файл по частям.\
    \ Пример 15.10 показывает такой подход к реализации с помощью функции пути, определенной\
    \ как async def. Он позволяет избежать блокировки, когда процессор не используется.\
    \ Я пока пропускаю проверку ошибок. Если файла path не существует, вызов функции\
    \ open() выбросит исключение.\n\n# Пример 15.10. Возврат большого файла с помощью\
    \ класса StreamingResponse (добавить в файл main.py)\n\n```\nfrom pathlib import\
    \ path\nfrom typing import Generator\nfrom fastapi.responses import StreamingResponse\n\
    \ndef gen_file(path: str) -> Generator:\n    with open(file=path, mode=\"rb\"\
    ) as file:\n        yield file.read()\n\n@app.get(\"/download_big/{name}\")\n\
    async def download_big_file(name:str):\n    gen_expr = gen_file(file_path=path)\n\
    \    response = StreamingResponse(\n        content=gen_expr,\n        status_code=200,\n\
    \    )\n    return response\n```\n\ngen_expr — выражение-генератор, возвращаемое\
    \ функцией-генератором gen_file(). Класс StreamingResponse использует его для\
    \ своего итерируемого аргумента content, чтобы загружать файл по частям.\n\nПример\
    \ 15.11 представляет собой сопутствующий тест. (Для этого сначала потребуется\
