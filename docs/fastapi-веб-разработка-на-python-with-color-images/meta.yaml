- img_proc: true
  md: "```\nINFO:     127.0.0.1:63502 - \"GET /who2?name=rr23r23 HTTP/1.1\"\n422 Unprocessable\
    \ Entity\n```\n\nПочему форма отправила переменную name в качестве параметра запроса,\
    \ когда мы поместили ее в поле формы? Это оказалось странностью HTML, задокументированной\
    \ на веб-сайте W3C (https://oreil.ly/e6CJb). Кроме того, если в вашем URL были\
    \ параметры запроса, он сотрет их и заменит значе- нием name.\n\nПочему же HTTPie\
    \ справился с этим, как и ожидалось? Мне это неизвестно. Это несоответствие, о\
    \ котором следует знать.\n\nОфициальная магическая формула HTML заключается в\
    \ том, чтобы изменить действие с GET на POST. Так что добавим конечную точку POST\
    \ для /who2 в файл main.py (пример 16.4).\n\n# Пример 16.4. Получение значения\
    \ из формы POST\n\n```\nfrom fastapi import FastAPI, Form\n\napp = FastAPI()\n\
    \n@app.post(\"/who2\")\ndef greet3(name: str = Form()):\n    return f\"Hello,\
    \ {name}?\"\n```\n\nПример 16.5 представляет собой файл stuff/form2.html, но с\
    \ оператором get, замененным на post.\n\n# Пример 16.5. Формирование запроса POST\
    \ (static/form2.html)\n\n```\n<form action=\"http://localhost:8000/who2\" method=\"\
    post\">\nSay hello to my little friend:\n<input type=\"text\" name=\"name\">\n\
    <input type=\"submit\">\n</form>\n```\n\nРазбудите свой браузер и попросите его\
    \ получить эту новую форму. Внесите в нее текст **Bob Frapples** и подтвердите\
    \ отправку формы. На этот раз вы получите тот же результат, что и при использовании\
    \ HTTPie:\n\n> \"Hello, Bob Frapples?\"\n\nПоэтому, если отправляете формы из\
    \ HTML-файлов, задействуйте метод POST."
