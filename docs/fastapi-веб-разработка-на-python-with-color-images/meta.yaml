    \ обнаружил это на веб-уровне, вернув HTTP код состояния 422 и описание проблемы.\
    \ В общем, если FastAPI возвращает код 422, велика вероятность того, что Pydantic\
    \ нашел виновника сбоя. Часть выражения \"loc\" указывает, где произошла ошибка:\
    \ поле \"country\" ошибочно, потому что я так плохо печатаю."
- md: "## Пример 10.11. Создание исследователя с исправленным значением\n\n```\n$\
    \ http post localhost:8000/explorer name=\"Beau Buffette\" country=\"US\"\nHTTP/1.1\
    \ 201 Created\ncontent-length: 55\ncontent-type: application/json\ndate: Mon,\
    \ 27 Feb 2023 20:20:49 GMT\nserver: uvicorn\n\n{\n    \"name\": \"Beau Buffette,\"\
    ,\n    \"country\": \"US\",\n    \"description\": \"\"\n}\n```\n\nНа этот раз\
    \ вызов возвращает код статуса 201. Он традиционно получается при создании ресурса\
    \ (все коды статуса группы 2xx считаются признаком успеха, а наиболее распространен\
    \ простой код 200). Ответ также содержит JSON-версию только что созданного объекта\
    \ Explorer.\n\nА теперь вернемся к начальному тесту: появится ли имя Боу в тестировании\
    \ по получению всех записей исследователей? Пример 10.12 отвечает на этот животрепещущий\
    \ вопрос.\n\n## Пример 10.12. Работает ли последняя функция create()?\n\n```\n\
    $ http localhost:8000/explorer\nHTTP/1.1 200 OK\ncontent-length: 57\ncontent-type:\
    \ application/json\ndate: Mon, 27 Feb 2023 20:26:26 GMT\nserver: uvicorn\n\n[\n\
    \    {\n        \"name\": \"Beau Buffette\",\n        \"country\": \"US\",\n \
    \       \"description\": \"\"\n    }\n]\n```\n\nОтлично!\n\n## Получите записи\
    \ одного исследователя\n\nЧто произойдет, если вы попытаетесь найти Beau с помощью\
    \ конечной точки для получения одной записи — Get One (пример 10.13)?\n\n**Пример\
    \ 10.13.** Тестирование конечной точки с инструкцией Get One\n\n```\nHTTP/1.1\
    \ 200 OK\ncontent-length: 55\ncontent-type: application/json\ndate: Mon, 27 Feb\
    \ 2023 20:28:48 GMT\nserver: uvicorn\n\n{\n    \"name\": \"Beau Buffette\",\n\
    \    \"country\": \"US\",\n    \"description\": \"\"\n}\n```\n\nЯ использовал\
    \ кавычки, чтобы сохранить пробел между именем и фамилией. В URL-адресах вы можете\
    \ применять также написание вида Beau%20Buffette. Выражение %20 означает символ\
    \ пробела в шестнадцатеричном коде стандарта ASCII.\n\n## Отсутствующие и дублированные\
    \ данные\n\nДо сих пор я игнорировал два основных класса ошибок:\n\n- *отсутствующие\
    \ данные* — если вы пытаетесь получить, изменить или удалить запись исследователя\
    \ с именем, которого нет в базе данных;\n- *дублированные данные* — если попытаетесь\
    \ создать запись исследователя с одним и тем же именем более одного раза.\n\n\
    Что же делать, если вы запрашиваете запись несуществующего или продублированного\
    \ исследователя? Пока что код слишком оптимистичен, и исключения будут всплывать\
    \ из бездны.\n\nНаш друг по имени Beau только что был добавлен в базу данных.\
    \ Представьте, что его злобный клон, который носит то же имя, замышляет подменить\
    \ его темной ночью, используя пример 10.14.\n\n**Пример 10.14.** Ошибка дублирования\
    \ — попытка создать исследователя более одного раза\n\n```\n$ http post localhost:8000/explorer\
    \ name=\"Beau Buffette\" country=\"US\"\nHTTP/1.1 500 Internal Server Error\n\
    content-length: 3127\ncontent-type: text/plain; charset=utf-8\ndate: Mon, 27 Feb\
    \ 2023 21:04:09 GMT\nserver: uvicorn\n\nTraceback (most recent call last):\n \
    \ File \".../starlette/middleware/errors.py\", line 162, in call\n  ... (lots\
    \ of confusing innards here) ...\n  File \".../service/explorer.py\", line 11,\
    \ in create\n    return data.create(explorer)\n          ^^^^^^^^^\n  File \"\
    .../data/explorer.py\", line 37, in create\n    curs.execute(qry, params)\nsqlite3.IntegrityError:\
    \ UNIQUE constraint failed: explorer.name\n```\n\nЯ опустил большинство строк\
    \ в этой трассировке ошибок и заменил некоторые части многоточиями, потому что\
    \ данные содержат в основном внутренние вызовы, выполняемые FastAPI и базовым\
    \ Starlette. Но вот последняя строка — исключение SQLite в веб-слое! Где кушетка\
    \ для обмороков?\n\nПо пятам за этим следует еще один ужас — исчезновение исследователя\
    \ (пример 10.15).\n\n## Пример 10.15. Получение несуществующего исследователя\n\
    \n```\n$ http localhost:8000/explorer/\"Beau Buffalo\"\nHTTP/1.1 500 Internal\
    \ Server Error\ncontent-length: 3282\ncontent-type: text/plain; charset=utf-8\n\
    date: Mon, 27 Feb 2023 21:09:37 GMT\nserver: uvicorn\n\nTraceback (most recent\
    \ call last):\n  File \".../starlette/middleware/errors.py\", line 162, in call\n\
    \  ... (many lines of ancient cuneiform) ...\n  File \".../data/explorer.py\"\
    , line 11, in row_to_model\n    name, country, description = row\n          ^^^^^^^^^\n\
    TypeError: cannot unpack non-iterable NoneType object\n```\n\nКаков хороший способ\
    \ выявить их на нижнем (данные) уровне и передать детали на верхний (веб)? Возможны\
    \ следующие варианты.\n\n- Пусть SQLite выкашливает комок волос (исключение) и\
    \ разбирается с ним на веб-уровне.\n\n  Но! Это смешивает уровни, что *плохо*.\
    \ Веб-уровень не должен ничего знать о конкретных базах данных.\n\n- Сделайте\
    \ так, чтобы все функции на сервисном уровне и уровне данных возвращали Explorer\
    \ | None там, где раньше они возвращали объект Explorer. В таком случае None будет\
    \ означать отказ. (Вы можете урезать это, определив OptExplorer = Explorer | None\
    \ в файле model/explorer.py.)\n\n  Но! Функция могла не сработать по нескольким\
    \ причинам, и вам могут понадобиться подробности. А это требует редактирования\
    \ большого количества кода.\n\n- Определите исключения для утраченных (Missing)\
    \ и продублированных (Duplicate) данных, включая более детальное описание проблемы.\
    \ Они будут проходить через все уровни без изменений в коде, пока функции пути\
    \ веб-уровня не поймают их. Кроме того, они зависят от приложения, а не от базы\
    \ данных, что позволяет сохранять неприкосновенность уровней.\n\n  Но! На самом\
    \ деле мне нравится этот вариант, так что он пойдет в пример 10.16.\n\n## Пример\
    \ 10.16. Определение нового файла errors.py верхнего уровня\n\n```\nclass Missing(Exception):\n\
    \    def __init__(self, msg:str):\n        self.msg = msg\n\nclass Duplicate(Exception):\n\
    \    def __init__(self, msg:str):\n        self.msg = msg\n```\n\nУ каждого из\
    \ этих исключений есть строковый атрибут msg. Он может сообщить коду более высокого\
    \ уровня о том, что произошло.\n\nЧтобы реализовать это, в примере 10.17 импортируйте\
    \ исключение DB-API в файл data/init.py. SQLite вызовет его при дублировании данных.\n\
    \n## Пример 10.17. Добавление импорта исключений SQLite в файл data/init.py\n\n\
    ```\nfrom sqlite3 import connect, IntegrityError\n```\n\nИмпортируйте и отловите\
    \ эту ошибку в примере 10.18.\n\n## Пример 10.18. Изменение data/explorer.py,\
    \ чтобы получить возможность отлавливать и выбрасывать исключения\n\n```\nfrom\
    \ init import (conn, curs, IntegrityError)\nfrom model.explorer import Explorer\n\
    from error import Missing, Duplicate\n\ncurs.execute(\"\"\"create table if not\
    \ exists explorer(\n    name text primary key,\n    country text,\n    description\
    \ text)\"\"\")\n\ndef row_to_model(row: tuple) -> Explorer:\n    name, country,\
    \ description = row\n    return Explorer(name=name,\n        country=country,\
    \ description=description)\n\ndef model_to_dict(explorer: Explorer) -> dict:\n\
    \    return explorer.dict()\n\ndef get_one(name: str) -> Explorer:\n    qry =\
    \ \"select * from explorer where name=:name\"\n    params = {\"name\": name}\n\
    \    curs.execute(qry, params)\n    row = curs.fetchone()\n    if row:\n     \
    \   return row_to_model(row)\n    else:\n        raise Missing(msg=f\"Explorer\
    \ {name} not found\")\n\ndef get_all() -> list[Explorer]:\n    qry = \"select\
    \ * from explorer\"\n    curs.execute(qry)\n    return [row_to_model(row) for\
    \ row in curs.fetchall()]\n\ndef create(explorer: Explorer) -> Explorer:\n   \
    \ if not explorer: return None\n    qry = \"\"\"insert into explorer (name, country,\
    \ description) values\n            (:name, :country, :description)\"\"\"\n   \
    \ params = model_to_dict(explorer)\n    try:\n        curs.execute(qry, params)\n\
    \    except IntegrityError:\n        raise Duplicate(msg=\n            f\"Explorer\
    \ {explorer.name} already exists\")\n    return get_one(explorer.name)\n\ndef\
    \ modify(name: str, explorer: Explorer) -> Explorer:\n    if not (name and explorer):\
    \ return None\n    qry = \"\"\"update explorer\n            set name=:name,\n\
    \            country=:country,\n            description=:description\n       \
    \     where name=:name_orig\"\"\"\n    params = model_to_dict(explorer)\n    params[\"\
    name_orig\"] = explorer.name\n    curs.execute(qry, params)\n    if curs.rowcount\
    \ == 1:\n        return get_one(explorer.name)\n    else:\n        raise Missing(msg=f\"\
    Explorer {name} not found\")\n\ndef delete(name: str):\n    if not name: return\
    \ False\n    qry = \"delete from explorer where name = :name\"\n    params = {\"\
    name\": name}\n    curs.execute(qry, params)\n    if curs.rowcount != 1:\n   \
    \     raise Missing(msg=f\"Explorer {name} not found\")\n```\n\nЭто избавляет\
    \ от необходимости объявлять, что все функции возвращают выражение Explorer |\
    \ None или Optional[Explorer].\n\nВы указываете подсказки типов только для обычных\
    \ типов возврата, но не для исключений. Поскольку исключения распространяются\
    \ вверх независимо от стека вызовов до тех пор, пока кто-то их не отловит, вам\
    \ не придется ничего менять на сервисном уровне. А вот новый файл web/explorer.py\
    \ с обработчиками исключений и соответствующим возвратом кода состояния HTTP (пример\
    \ 10.19).\n\n## Пример 10.19. Обработка Missing и Duplicate исключений в файле\
    \ web/explorer.py\n\n```\nfrom fastapi import APIRouter, HTTPException\nfrom model.explorer\
    \ import Explorer\nfrom service import explorer as service\nfrom error import\
    \ Duplicate, Missing\n\nrouter = APIRouter(prefix = \"/explorer\")\n\n@router.get(\"\
    \")\n@router.get(\"/\")\ndef get_all() -> list[Explorer]:\n    return service.get_all()\n\
    \n@router.get(\"/{name}\")\ndef get_one(name) -> Explorer:\n    try:\n       \
    \ return service.get_one(name)\n    except Missing as exc:\n        raise HTTPException(status_code=404,\
    \ detail=exc.msg)\n\n@router.post(\"\", status_code=201)\n@router.post(\"/\",\
    \ status_code=201)\ndef create(explorer: Explorer) -> Explorer:\n    try:\n  \
    \      return service.create(explorer)\n```"
  mdcn: "## 示例 10.11. 创建具有修正值的研究员\n\n```\n$ http post localhost:8000/explorer name=\"\
    Beau Buffette\" country=\"US\"\nHTTP/1.1 201 Created\ncontent-length: 55\ncontent-type:\
    \ application/json\ndate: Mon, 27 Feb 2023 20:20:49 GMT\nserver: uvicorn\n\n{\n\
    \    \"name\": \"Beau Buffette,\",\n    \"country\": \"US\",\n    \"description\"\
    : \"\"\n}\n```\n\n这次调用返回了状态码 201。这通常是在创建资源时获得的（所有 2xx 组的状态码都被视为成功标志，其中最常见的是简单的\
    \ 200 码）。响应还包含了刚刚创建的 Explorer 对象的 JSON 版本。\n\n现在让我们回到最初的测试：在获取所有研究员记录的测试中，会出现\
    \ Beau 的名字吗？示例 10.12 回答了这个引人关注的问题。\n\n## 示例 10.12. 最后的 create() 函数有效吗？\n\n```\n\
    $ http localhost:8000/explorer\nHTTP/1.1 200 OK\ncontent-length: 57\ncontent-type:\
    \ application/json\ndate: Mon, 27 Feb 2023 20:26:26 GMT\nserver: uvicorn\n\n[\n\
    \    {\n        \"name\": \"Beau Buffette\",\n        \"country\": \"US\",\n \
    \       \"description\": \"\"\n    }\n]\n```\n\n太棒了！\n\n## 获取单个研究员的记录\n\n如果你尝试使用获取单个记录的端点——Get\
    \ One（示例 10.13）来查找 Beau，会发生什么？\n\n**示例 10.13.** 测试带有 Get One 指令的端点\n\n```\nHTTP/1.1\
    \ 200 OK\ncontent-length: 55\ncontent-type: application/json\ndate: Mon, 27 Feb\
    \ 2023 20:28:48 GMT\nserver: uvicorn\n\n{\n    \"name\": \"Beau Buffette\",\n\
    \    \"country\": \"US\",\n    \"description\": \"\"\n}\n```\n\n我使用了引号来保留名字和姓氏之间的空格。在\
    \ URL 中，你也可以使用 Beau%20Buffette 这样的写法。表达式 %20 表示 ASCII 标准中的空格字符的十六进制代码。\n\n## 缺失和重复的数据\n\
    \n到目前为止，我忽略了两类主要的错误：\n\n- *缺失数据* —— 如果你尝试获取、修改或删除一个在数据库中不存在名字的研究员记录；\n- *重复数据*\
    \ —— 如果你尝试多次创建具有相同名字的研究员记录。\n\n那么，如果你请求一个不存在或重复的研究员记录，该怎么办？目前代码过于乐观，异常将从深渊中浮现。\n\
    \n我们那位名叫 Beau 的朋友刚刚被添加到数据库中。想象一下，他那个邪恶的克隆体，顶着同样的名字，正计划在某个黑暗的夜晚利用示例 10.14 来取代他。\n\
    \n**示例 10.14.** 重复错误——尝试多次创建研究员\n\n```\n$ http post localhost:8000/explorer name=\"\
    Beau Buffette\" country=\"US\"\nHTTP/1.1 500 Internal Server Error\ncontent-length:\
    \ 3127\ncontent-type: text/plain; charset=utf-8\ndate: Mon, 27 Feb 2023 21:04:09\
    \ GMT\nserver: uvicorn\n\nTraceback (most recent call last):\n  File \".../starlette/middleware/errors.py\"\
    , line 162, in call\n  ... (lots of confusing innards here) ...\n  File \".../service/explorer.py\"\
    , line 11, in create\n    return data.create(explorer)\n          ^^^^^^^^^\n\
    \  File \".../data/explorer.py\", line 37, in create\n    curs.execute(qry, params)\n\
    sqlite3.IntegrityError: UNIQUE constraint failed: explorer.name\n```\n\n我在这次错误跟踪中省略了大多数行，并用省略号替换了部分内容，因为这些数据主要包含\
    \ FastAPI 和底层 Starlette 执行的内部调用。但最后一行——是 SQLite 在 Web 层抛出的异常！哪里有供晕倒用的躺椅？\n\n紧随其后的是另一个恐怖事件——研究员的消失（示例\
    \ 10.15）。\n\n## 示例 10.15. 获取不存在的研究员\n\n```\n$ http localhost:8000/explorer/\"\
    Beau Buffalo\"\nHTTP/1.1 500 Internal Server Error\ncontent-length: 3282\ncontent-type:\
    \ text/plain; charset=utf-8\ndate: Mon, 27 Feb 2023 21:09:37 GMT\nserver: uvicorn\n\
    \nTraceback (most recent call last):\n  File \".../starlette/middleware/errors.py\"\
    , line 162, in call\n  ... (many lines of ancient cuneiform) ...\n  File \".../data/explorer.py\"\
    , line 11, in row_to_model\n    name, country, description = row\n          ^^^^^^^^^\n\
    TypeError: cannot unpack non-iterable NoneType object\n```\n\n有什么好方法可以在底层（数据层）检测它们，并将细节传递到上层（Web\
    \ 层）？以下是几种可能的方案。\n\n- 让 SQLite 咳出毛球（异常），然后在 Web 层处理它。\n\n  但是！这混淆了层级，这是*不好的*。Web\
    \ 层不应该了解任何特定数据库的细节。\n\n- 让服务层和数据层的所有函数在返回 Explorer 对象的地方都返回 Explorer | None。在这种情况下，None\
    \ 将表示失败。（你可以通过在 model/explorer.py 文件中定义 OptExplorer = Explorer | None 来简化这个过程。）\n\
    \n  但是！函数可能因为多种原因失败，你可能需要详细信息。而这需要编辑大量代码。\n\n- 为缺失（Missing）和重复（Duplicate）数据定义异常，包括更详细的问题描述。它们将穿过所有层级而无需更改代码，直到\
    \ Web 层的路由函数捕获它们。此外，它们依赖于应用程序而非数据库，从而保持了层级的完整性。\n\n  但是！实际上我喜欢这个方案，所以它将出现在示例 10.16\
    \ 中。\n\n## 示例 10.16. 定义新的顶层 errors.py 文件\n\n```\nclass Missing(Exception):\n \
    \   def __init__(self, msg:str):\n        self.msg = msg\n\nclass Duplicate(Exception):\n\
    \    def __init__(self, msg:str):\n        self.msg = msg\n```\n\n这些异常中的每一个都有一个字符串属性\
    \ msg。它可以向更高层的代码报告发生了什么。\n\n为了实现这一点，在示例 10.17 中，将 DB-API 异常导入到 data/init.py 文件中。当数据重复时，SQLite\
    \ 将调用它。\n\n## 示例 10.17. 在 data/init.py 文件中添加 SQLite 异常导入\n\n```\nfrom sqlite3\
    \ import connect, IntegrityError\n```\n\n在示例 10.18 中导入并捕获此错误。\n\n## 示例 10.18.\
    \ 修改 data/explorer.py 以捕获和抛出异常\n\n```\nfrom init import (conn, curs, IntegrityError)\n\
    from model.explorer import Explorer\nfrom error import Missing, Duplicate\n\n\
    curs.execute(\"\"\"create table if not exists explorer(\n    name text primary\
    \ key,\n    country text,\n    description text)\"\"\")\n\ndef row_to_model(row:\
    \ tuple) -> Explorer:\n    name, country, description = row\n    return Explorer(name=name,\n\
    \        country=country, description=description)\n\ndef model_to_dict(explorer:\
    \ Explorer) -> dict:\n    return explorer.dict()\n\ndef get_one(name: str) ->\
    \ Explorer:\n    qry = \"select * from explorer where name=:name\"\n    params\
    \ = {\"name\": name}\n    curs.execute(qry, params)\n    row = curs.fetchone()\n\
    \    if row:\n        return row_to_model(row)\n    else:\n        raise Missing(msg=f\"\
    Explorer {name} not found\")\n\ndef get_all() -> list[Explorer]:\n    qry = \"\
    select * from explorer\"\n    curs.execute(qry)\n    return [row_to_model(row)\
    \ for row in curs.fetchall()]\n\ndef create(explorer: Explorer) -> Explorer:\n\
    \    if not explorer: return None\n    qry = \"\"\"insert into explorer (name,\
    \ country, description) values\n            (:name, :country, :description)\"\"\
    \"\n    params = model_to_dict(explorer)\n    try:\n        curs.execute(qry,\
    \ params)\n    except IntegrityError:\n        raise Duplicate(msg=\n        \
    \    f\"Explorer {explorer.name} already exists\")\n    return get_one(explorer.name)\n\
    \ndef modify(name: str, explorer: Explorer) -> Explorer:\n    if not (name and\
    \ explorer): return None\n    qry = \"\"\"update explorer\n            set name=:name,\n\
    \            country=:country,\n            description=:description\n       \
    \     where name=:name_orig\"\"\"\n    params = model_to_dict(explorer)\n    params[\"\
    name_orig\"] = explorer.name\n    curs.execute(qry, params)\n    if curs.rowcount\
    \ == 1:\n        return get_one(explorer.name)\n    else:\n        raise Missing(msg=f\"\
    Explorer {name} not found\")\n\ndef delete(name: str):\n    if not name: return\
