  md: "+   - Строки запросов обычно применяются для предоставления дополнительных\
    \ аргументов, таких как пагинация.\n- Тело запроса обычно используется для больших\
    \ объемов вводимых данных, например целых или частичных моделей.\n\nВо всех случаях,\
    \ если вы предоставите подсказки типов в определениях данных, ваши аргументы будут\
    \ автоматически проверены библиотекой Pydantic. Это гарантирует их наличие и правильность.\n\
    \n# HTTP-ответы\n\nПо умолчанию FastAPI преобразует все, что вы возвращаете из\
    \ своей функции конечной точки, в формат JSON. HTTP-ответ содержит строку заголовка\
    \ Content-type: application/json. Поэтому, несмотря на то что функция greet()\
    \ первоначально возвращает строку \"Hello? World?\", FastAPI преобразует ее в\
    \ формат JSON. Это одно из значений по умолчанию, выбранных FastAPI для упрощения\
    \ разработки API.\n\nВ этом случае строка Python \"Hello? World?\" будет преобразована\
    \ в свой эквивалент строки в формате JSON \"Hello? World?\", который представляет\
    \ собой ту же самую строку. Но все, что вы возвращаете, преобразуется в формат\
    \ JSON, будь то встроенные типы Python или модели Pydantic.\n\n# Код состояния\n\
    \nПо умолчанию FastAPI возвращает код состояния 200. Исключения вызывают коды\
    \ группы 4xx.\n\nВ декораторе пути необходимо указать возвращаемый в случае успеха\
    \ код состояния HTTP (исключения будут генерировать собственные коды и переопределять\
    \ это значение). Добавьте код из примера 3.28 куда-нибудь в свой файл hello.py\
    \ (чтобы не показывать весь файл снова и снова) и проверьте его в примере 3.29.\n\
    \n**Пример 3.28.** Указание кода состояния HTTP (добавьте в файл hello.py)\n\n\
    ```\n@app.get(\"/happy\")\ndef happy(status_code=200):\n    return \":)\"\n```"
