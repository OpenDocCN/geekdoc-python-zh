    1 validation error for Creature name\n  ensure this value has at least 2 characters\n\
    \  (type=value_error.any_str.min_length; limit_value=2)\n```\n\nКлючевое слово\
    \ constr означает *ограниченную строку* (constrained string). В примере 5.17 используется\
    \ альтернативный вариант — спецификация Field из библиотеки Pydantic.\n\n## Пример\
    \ 5.17. Еще один сбой проверки, применена функция Field\n\n```\n>>> from pydantic\
