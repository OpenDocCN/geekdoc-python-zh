  md: '# Форматы данных JSON и API


    Фронтенд-приложения могут обмениваться обычным текстом на основе стандарта ASCII
    с веб-сервисами бэкенда, но как выразить структуры данных, такие как списки элементов?


    Как раз в момент острой нужды появился формат «обозначения объектов JavaScript»
    (JavaScript Object Notation, JSON) — еще одна простая идея, решающая важную проблему
    и кажущаяся очевидной в ретроспективе. Хотя J означает JavaScript, синтаксис очень
    похож на Python.


    JSON в значительной степени заменил такие более ранние попытки реализации этой
    идеи, как XML и SOAP. В оставшейся части этой книги вы увидите, что JSON — это
    формат для ввода и вывода у веб-сервисов по умолчанию.


    # JSON:API


    Сочетание RESTful-дизайна и форматов данных JSON уже стало привычным. Но некоторые
    возможности для двусмысленности и занудства все же остаются. Недавнее предложение
    JSON:API (https://jsonapi.org) направлено на то, чтобы немного ужесточить спецификации.
    В этой книге используется свободный подход RESTful, но JSON:API или что-то подобное
    может оказаться полезным, если у вас возникнут серьезные затруднения.


    # GraphQL


    Для некоторых целей RESTful-интерфейсы могут быть громоздкими. Facebook (сейчас
    Meta¹) разработала язык под названием Graph Query Language (GraphQL) (https://graphql.org).
    Он позволяет определить более гибкие запросы. В этой книге GraphQL не рассматривается,
    но, возможно, стоит обратить на него внимание, если вы считаете, что RESTful-дизайн
    не подходит для вашего приложения.


    # Конкурентность


    Наряду с ростом ориентированности на сервисы стремительное увеличение количества
    подключений к веб-сервисам требует все большей эффективности и масштабирования.
