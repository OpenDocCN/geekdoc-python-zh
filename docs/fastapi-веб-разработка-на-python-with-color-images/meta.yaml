  md: '# Инструмент Poetry


    Сочетание pip и venv настолько распространено, что люди начали комбинировать их,
    чтобы сократить этапы работы и избежать source-примудростей оболочки. Одним из
    таких пакетов стал Pipenv (https://pipenv.pypa.io), но более новый конкурент под
    названием Poetry (https://python-poetry.org) становится все популярнее.


    Я использовал pip, Pipenv и Poetry, но теперь предпочитаю Poetry. Установить его
    можно с помощью команды `pip install poetry`. В Poetry есть множество дополнительных
    команд, таких как `poetry add` для добавления пакета в виртуальную среду, `poetry
    install`, чтобы загрузить и установить инструмент, и т. д. Просмотрите веб-сайт
    Poetry или запустите команду `poetry`, чтобы открыть раздел помощи.


    Помимо загрузки отдельных пакетов, pip и Poetry управляют несколькими пакетами
    в файлах конфигурации — `requirements.txt` для pip и `pyproject.toml` для Poetry.
    Poetry и pip не просто загружают пакеты, но и управляют сложными зависимостями,
    которые могут существовать между пакетами. Вы можете задать желаемые варианты
    пакетов в виде минимумов, максимумов, диапазонов или точных значений, известных
    также как *pinning* или *привязка*. Этот вопрос может стать важным по мере роста
    проекта и изменения пакетов, от которых он зависит. Может понадобиться минимальная
    версия пакета, если используемая вами функция появилась в нем впервые, или максимальная,
    если функция была отменена.


