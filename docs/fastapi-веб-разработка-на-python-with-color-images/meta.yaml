  md: "# Пример 11.13. Активация промежуточного ПО CORS\n\n```\nfrom fastapi import\
    \ FastAPI, Request\nfrom fastapi.middleware.cors import CORSMiddleware\n\napp\
    \ = FastAPI()\n\napp.add_middleware(\n    CORSMiddleware,\n    allow_origins=[\"\
    https://ui.cryptids.com\",],\n    allow_credentials=True,\n    allow_methods=[\"\
    *\"],\n    allow_headers=[\"*\"],\n    )\n\n@app.get(\"/test_cors\")\ndef test_cors(request:\
    \ Request):\n    print(request)\n```\n\nПосле этого любой другой домен, пытающийся\
