    \ —— 功能广泛，但需要一些调整才能获得漂亮的结果；\n-   *Plotly* (https://plotly.com/python) —— 类似于Matplotlib和Seaborn，但侧重于交互式图表；\n\
    -   *Dash* (https://dash.plotly.com) —— 基于Plotly包构建，是一种信息仪表板；\n-   *Seaborn* (https://seaborn.pydata.org)\
