  md: "```\nactual_counter = Counter(actual) # {буква: подсчет, ...}\nguess_counter\
    \ = defaultdict(int)\nresult = [MISS] * длина\nfor pos, letter in enumerate(guess):\n\
    \    if letter == actual[pos]:\n        result[pos] = HIT\n        guess_counter[letter]\
    \ += 1\nfor pos, letter in enumerate(guess):\n    if result[pos] == HIT:\n   \
