    Итак, давайте разберемся с этим вопросом пошагово. Я начну с простых техник, предназначенных
    только для подключения auth-системы к конечной точке веб-сайта для тестирования,
    но на публичном сайте все это применяться не будет.


    # Немного отвлечемся. Нужна ли вам аутентификация?


    Повторю: *аутентификация* связана с *идентификацией* — кто вы? Чтобы реализовать
    аутентификацию, необходимо сопоставить секретную информацию с уникальной идентификацией.
    Существуют разные способы реализовать это со *множеством* уровней сложности. Давайте
    начнем с малого и будем работать на усложнение.


    Часто в книгах и статьях по веб-разработке сразу же переходят к деталям аутентификации
    и авторизации, иногда путая их. Порой в таких материалах пропущен первый вопрос:
    действительно ли вам нужно и то и другое?


    Вы можете предоставить полностью анонимный доступ ко всем страницам своего сайта.
    Но это оставит открытую возможность для таких уязвимостей, как атаки типа «отказ
    в обслуживании» (DoS). Хотя некоторые меры защиты, например ограничение количества
    запросов, можно реализовать вне веб-сервера (см. главу 13), почти все поставщики
    публичных API требуют наличия хотя бы какой-то аутентификации. Помимо безопасности,
    необходимо знать, насколько эффективны веб-сайты.


    +   - Сколько уникальных посетителей?

    - Какие страницы пользуются наибольшей популярностью?

    - Увеличивают ли определенные изменения количество просмотров?

    - Какие последовательности посещения страниц часто встречаются?'
