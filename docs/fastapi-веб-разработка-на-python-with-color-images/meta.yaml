  md: 'схитрить и заглянуть в приложение Б. Применим окончательный сбалансированный
    дизайнерский подход, описанный ранее.


    +   1. Задействуем ванильный JavaScript в клиенте вместо известных библиотек JavaScript,
    таких как React, Angular или даже jQuery.

    2. Новая конечная точка FastAPI, GET в каталоге /game, инициализирует игру. Она
    получает имя случайного существа из нашей базы криптидов и возвращает его, встроенное
    в качестве скрытого значения в файл шаблона Jinja, состоящий из HTML, CSS и JavaScript.

    3. На стороне клиента вновь созданные HTML и JavaScript отображают интерфейс типа
    Wordle. Появится последовательность окошек, по одному на каждую букву в названии
    скрытого существа.

    4. Игрок вводит букву в каждое поле, а затем отправляет свою догадку и скрытое
    истинное имя на сервер. Это происходит в Ajax-вызове с помощью функции JavaScript
    fetch().

    5. Вторая новая конечная точка FastAPI, POST /game, принимает эту догадку и реальное
    секретное имя и в сравнении с ним оценивает догадку. Она возвращает клиенту угаданное
    значение и результат.

    6. Клиентская часть отображает отгадку и результат соответствующими цветами CSS
    во вновь созданной строке таблицы: зеленый — буква в правильном месте, желтый
    — буква в имени, но в другой позиции и серый — буква, не встречающаяся в скрытом
    имени. Результат — строка одиночных символов, используемых как имена классов CSS
    для отображения правильных цветов букв угадайки.

    7. Если все буквы зеленые, можно праздновать. В противном случае клиент отображает
    новую последовательность полей ввода текста для следующей отгадки и повторяет
    шаг 4 и последующие до тех пор, пока имя не будет угадано или вы не сдадитесь.
    Большинство названий криптидов — это не общеупотребительные слова, поэтому при
    необходимости сверьтесь с приложением Б.


    Эти правила немного отличаются от официального варианта игры Wordle, где разрешены
    только словарные слова из пяти букв и есть ограничение в шесть ходов.


    Не надейтесь на это. Как и в большинстве примеров в книге, логика и дизайн игры
    минимальны — их достаточно, чтобы части работали совместно. Вы можете придать
    игре гораздо больше стиля и изящества, если у вас есть рабочая база.'
