  md: "# Flask\n\nРазработчики Flask (https://flask.palletsprojects.com) называют\
    \ его *микрофреймворком*. Он предоставляет базовые возможности, а вы загружаете\
    \ сторонние пакеты, чтобы дополнить их по мере необходимости. Он меньше, чем Django,\
    \ и в начале работы его можно быстрее освоить.\n\nFlask относится к типу синхронных\
    \ и создан на базе стандарта WSGI, а не ASGI. Новый проект под названием quart\
    \ (https://quart.palletsprojects.com) воспроизводит Flask и добавляет в него поддержку\
    \ стандарта ASGI.\n\nНачнем с самого начала, показав, как Flask и FastAPI определяют\
    \ веб-маршрутизацию.\n\n# Путь\n\nНа верхнем уровне Flask и FastAPI используют\
    \ декоратор, чтобы связать маршрут с конечной веб-точкой. В примере 7.1 продублируем\
    \ пример 3.11, в котором человек получает приветствие из URL-пути.\n\n**Пример\
    \ 7.1. Путь FastAPI**\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi/{who}\")\ndef greet(who: str):\n    return f\"Hello? {who}?\"\
    \n```\n\nПо умолчанию FastAPI преобразует строку `f\"Hello? {who}?\"` в формат\
    \ JSON и возвращает ее веб-клиенту.\n\nВ примере 7.2 показано, как это делает\
    \ Flask.\n\n**Пример 7.2. Путь Flask**\n\n```\nfrom flask import Flask, jsonify\n\
    \napp = Flask(__name__)\n\n@app.route(\"/hi/<who>\", methods=[\"GET\"])\ndef greet(who:\
    \ str):\n    return jsonify(f\"Hello? {who}?\")\n```"
