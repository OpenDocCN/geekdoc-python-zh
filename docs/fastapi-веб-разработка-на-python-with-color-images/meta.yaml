    # SQLAlchemy


    Самым популярным SQL-пакетом для Python стал SQLAlchemy. Хотя во многих объяснениях
    SQLAlchemy обсуждаются только возможности ORM этой библиотеки, она содержит несколько
    слоев, и я буду рассматривать их снизу вверх.


    # Core


    Основа SQLAlchemy, называемая *Core*, включает в себя следующее:


    +   - объект Engine, реализующий стандарт DB-API;

    - URL-адреса, выражающие тип и драйвер SQL-сервера, а также конкретную коллекцию
    баз данных на этом сервере;

    - пулы соединений «клиент — сервер»;

    - транзакции (COMMIT и ROLLBACK);

    - различия в *диалектах* SQL для различных типов баз данных;

    - прямые запросы SQL (текстовые строки);

    - запросы на языке выражений SQLAlchemy.


    Некоторые из этих возможностей, например работа с диалектами, делают SQLAlchemy
    оптимальным пакетом для работы с различными типами серверов. С его помощью можно
    выполнять обычные SQL-запросы DB-API или использовать язык выражений SQLAlchemy.


    До этого момента я работал с базовым драйвером DB-API SQLite и буду продолжать
    делать это. Но для больших сайтов или при необходимости вос-'
