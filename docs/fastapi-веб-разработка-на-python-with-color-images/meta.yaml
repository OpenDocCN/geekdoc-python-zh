    # Тестирование безопасности


    Безопасность — это не что-то одно, а все. Вам нужно защищаться не только от злого
    умысла, но и от обычных ошибок, и даже от неподвластных вам событий. Отложим вопросы
    масштабирования до следующего раздела, а здесь займемся в основном анализом потенциальных
    угроз.


    В главе 11 обсуждались аутентификация и авторизация. Эти факторы всегда беспорядочны
    и подвержены ошибкам. Заманчиво использовать умные методы для противодействия
    умным атакам и всегда сложно разработать легкую для понимания и реализации защиту.


    Но теперь, когда вы знаете о Schemathesis, прочитайте его документацию (https://oreil.ly/v_O-Q)
    о тестировании на основе свойств для аутентификации. Так же как он значительно
    упростил тестирование большей части API, он может автоматизировать большую часть
    тестов для конечных точек, требующих аутентификации.


    # Нагрузочное тестирование


    То, как ваше приложение справляется с большим трафиком, показывают нагрузочные
    тесты, проверяющие:


    +   - вызовы API;

    - чтение или запись в базу данных;

    - использование памяти;

    - использование дискового пространства;

    - время ожидания и пропускную способность сети.


    Некоторые из них могут представлять собой *сквозные* тесты, имитирующие армию
    пользователей, жаждущих воспользоваться вашим сервисом. Вам стоит быть готовыми
    к тому, что такой день наступит. Содержание этого раздела частично совпадает с
    содержанием разделов «Производительность» и «Устранение неполадок» главы 13.'
