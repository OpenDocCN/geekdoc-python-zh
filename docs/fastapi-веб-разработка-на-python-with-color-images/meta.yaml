    # Обратные вызовы


    Разработчики интерактивных приложений, таких как игры и графические пользовательские
    интерфейсы, наверняка знакомы с *обратными вызовами*. Вы пишете функции и привязываете
    их к какому-либо событию, например к щелчку кнопкой мыши, нажатию клавиши или
    времени. Выдающимся пакетом Python в этой категории является Twisted (https://twisted.org).
    Его название говорит о том, что программы, основанные на обратных вызовах, немного
    «вывернуты наизнанку» и трудно следовать их потоку выполнения.


    # Генераторы Python


    Как и большинство языков, Python обычно выполняет код последовательно. Когда вы
    вызываете функцию, Python запускает ее с первой строки до конца или до ключевого
    слова `return`.


    Но в функции-генераторе Python вы можете останавливаться и возвращаться из любой
    точки, *а также возвращаться к этой точке позже*. Хитрость заключается в ключевом
    слове `yield`.


    В одном из эпизодов мультсериала «Симпсоны» Гомер врезается на своей машине в
    статую оленя, после чего следуют три реплики диалога. Пример 4.1 определяет обычную
    функцию Python для возврата этих строк с помощью ключевого слова `return` в виде
    списка и их итерации вызывающей стороной.


    **Пример 4.1.** Использование ключевого слова `return`


    ```

    >>> def doh():

    ...     return ["Homer: D''oh!", "Marge: A deer!", "Lisa: A female deer!"]

    ...

    >>> for line in doh():

    ...     print(line)

    ...

    Homer: D''oh!

    Marge: A deer!

    Lisa: A female deer!

    ```


    Этот подход отлично работает, когда списки относительно небольшие. Но что, если
    мы возьмем все диалоги из всех эпизодов «Симпсонов»? Списки занимают много памяти.'
