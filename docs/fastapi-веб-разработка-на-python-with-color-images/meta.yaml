    # ЧАСТЬ I


    ## Что у нас нового


    Мир получил огромную пользу от изобретения Всемирной паутины (или просто «веб»
    как транслитерации названия Web) сэром Тимом Бернерсом-Ли¹ и языка программирования
    Python Гвидо ван Россумом.


    Единственная небольшая проблема заключается в том, что безымянное издательство
    компьютерных книг часто помещает пауков и змей на свои обложки книг по тематике
    Web и Python соответственно. Если бы только сеть называлась Всемирный Гав, а язык
    Python был бы (Винни) Пухом, эта книга могла бы получить обложку как на рис. I.1.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_18_0.png)


    > ¹ Однажды я пожал ему руку. Я не мыл свою в течение месяца, но могу поспорить,
    что он сделал это сразу же.


    Но я отвлекся¹. Эта книга посвящена таким темам, как:


    - *Всемирная паутина* — особенно эффективная технология, как она изменилась и
    как теперь разрабатывать для нее программное обеспечение;

    - *Python* — очень продуктивный язык для веб-разработки;

    - *FastAPI* — особенно производительный веб-фреймворк для Python.


    В двух главах части I книги обсуждаются новые темы в веб-разработке и языке Python
    — сервисы и API, конкурентность, многоуровневые архитектуры и большие-большие
    данные.


    Часть II — это обзор FastAPI, свежего веб-фреймворка на Python. В этой части содержатся
    ответы на заданные в части I вопросы.


    В части III мы углубляемся в инструментарий FastAPI, включая советы, полученные
    в процессе разработки.


    Наконец, в части IV представлена галерея веб-примеров FastAPI. Для них использовался
    общий источник данных — список воображаемых существ, что может быть немного интереснее
    и целостнее, чем обычные случайные представления данных. Это должно дать вам отправную
    точку для конкретного применения этого веб-фреймворка.


    ¹ И точно не в последний раз.


    # ГЛАВА 1


    ## Современная Всемирная паутина


    > Всемирную паутину, какой я ее себе представлял, мы еще не видели. Будущее все
    еще намного больше, чем прошлое.


    *Тим Бернерс-Ли*


    ### Обзор


    Когда-то Всемирная паутина была маленькой и простой. Разработчикам было так весело
    отправлять вызовы PHP, HTML и MySQL в отдельные файлы и с гордостью говорить всем,
    что они могут заглянуть на свой веб-сайт. Но со временем Сеть разрослась до невообразимого
    количества страниц и развивающаяся игровая площадка превратилась в metavселенную
    тематических парков.


    В этой главе отмечены некоторые все более актуальные для современной Всемирной
    паутины области:


    - сервисы и API;

    - конкурентность;

    - уровни (слои);

    - данные.


    В следующей главе я расскажу о том, какие возможности предоставляет Python для
    работы в этих областях. После этого погрузимся в веб-фреймворк FastAPI и посмотрим,
    что он может предложить.


    ### Сервисы и API


    Паутина — это отличная соединительная ткань. Несмотря на то что большая часть
    деятельности по-прежнему происходит на стороне контента — HTML, JavaScript, изображений
    и т. д., все больше внимания уделяется интерфейсам прикладного программирования
    (API), соединяющим различные элементы программ.


    Обычно веб-сервис управляет низкоуровневым доступом к базе данных и бизнес-логикой
    среднего уровня (часто их объединяют в бэкенд), а JavaScript или мобильные приложения
    обеспечивают богатый фронтенд верхнего уровня (интерактивный пользовательский
    интерфейс). Эти миры становятся все более сложными и разнообразными, что обычно
    требует от разработчиков специализации в том или ином направлении.


    Быть разработчиком полного стека (фулстека) сейчас сложнее, чем раньше¹.


    Эти два мира общаются друг с другом с помощью API. В современном Интернете дизайн
    API так же важен, как и дизайн самих сайтов. API — это контракт, подобный схеме
    базы данных. Определение и модификация API — это уже серьезная работа.


    ### Виды API


    Каждый API определяет следующее:


    - протокол — структуру управления;

    - формат — структуру содержимого.


    Многочисленные методы API развивались по мере эволюции технологий от изолированных
    машин до многозадачных систем и сетевых серверов. Вероятно, в какой-то момент
    вы столкнетесь с одним или несколькими из них, поэтому далее приведу краткое описание,
    прежде чем перейти к языку HTTP и его друзьям, описанным в этой книге.


    - До появления сетей API обычно означал очень тесную связь, например вызов функции
    из библиотеки на том же языке, что и ваше приложение, — скажем, вычисление квадратного
    корня в математической библиотеке.


    > ¹ Я бросил попытки несколько лет назад.'
