    # Уровни (слои)


    Поклонники Шрека, возможно, помнят, как он отметил слои своей личности, на что
    Осел уточнил: «Как луковица?»


    ![](img/eacb50a37d89d355fa68de0c62d56b32_27_0.png)


    Ну, если у людоедов и вызывающих слезотечение овощей есть слои, то и у программного
    обеспечения тоже. Чтобы управлять размером и сложностью, многие приложения уже
    давно используют так называемую *трехуровневую модель*¹. Это не так уж и ново.
    Термины могут быть различными², но в этой книге я подразумеваю следующее простое
    разделение понятий (рис. 1.1):


    +   - *веб-уровень* — уровень ввода/вывода поверх HTTP. Он собирает клиентские
    запросы, вызывает сервисный уровень и возвращает ответы;

    - *сервис* — бизнес-логика, при необходимости выполняющая обращения к уровню данных;

    - *данные* — доступ к хранилищам данных и другим сервисам;

    - *модель* — определения данных, общие для всех уровней;

    - *веб-клиент* — веб-браузер или другое программное обеспечение на стороне клиента
    HTTP;

    - *база данных* — хранилище данных, часто SQL- или NoSQL-сервер.


    Эти компоненты помогут вам масштабировать сайт, не начиная с нуля. Их нельзя сравнивать
    с законами квантовой механики, поэтому считайте их руководством к изложению материала
    в этой книге.


    > ¹ Выберите свой вариант: уровень/слой, помидор/томат.

    ² Часто можно встретить термин «модель — представление — контроллер» (Model —
    View — Controller, MVC) и похожие варианты. Обычно это сопровождается религиозными
    войнами, но здесь я агностик.'
  - '[PAGE 28]


    ![](img/eacb50a37d89d355fa68de0c62d56b32_28_0.png)


    Уровни взаимодействуют друг с другом через API. Это могут быть простые вызовы
    функций к отдельным модулям Python, но можно обращаться к внешнему коду через
    любой метод. Как я показывал ранее, это могут быть RPC, сообщения и т. д. В этой
    книге я предполагаю наличие одного веб-сервера с кодом Python, импортирующим другие
    модули Python. Разделение и сокрытие информации выполняется модулями.


    Пользователи видят **веб-уровень**, задействуя клиентские приложения и API. Обычно
    мы говорим о RESTful-веб-интерфейсе с URL-адресами, запросами и закодированными
    в формате JSON ответами. Но наряду с веб-слоем могут быть созданы альтернативные
    текстовые клиенты или интерфейс командной строки (Command-Line Interface, CLI).
    Веб-код Python может импортировать модули сервисного уровня, но не должен импортировать
    модули уровня данных.


    *Сервисный уровень* содержит фактические данные о том, что предоставляет этот
    веб-сайт. По сути, этот уровень похож на *библиотеку*. Он импортирует модули уровня
    данных для доступа к базам данных и внешним сервисам, но не должен получать от
    них детальную информацию.


    *Уровень данных* предоставляет уровень сервисов доступ к данным через файлы или
    клиентские вызовы других сервисов. Могут существовать и альтернативные уровни
    данных, взаимодействующие с одним сервисным уровнем.


    Блочная модель (*model box*) — это не настоящий уровень, а источник определений
    данных, общих для всех уровней. Он не требуется, если вы передаете между уровнями
    встроенные структуры данных Python. Позже вы увидите, что включение библиотеки
    Pydantic в FastAPI позволяет определять структуры данных с множеством полезных
    функциональных возможностей.'
  - '[PAGE 29]


    Зачем проводить такие разделения? По многим причинам каждый уровень может быть:


    +   - написан специалистами;

    - изолированно протестирован;

    - заменен или дополнен — вы можете добавить второй веб-уровень, использующий другой
    API, например gRPC, наряду с веб-уровнем.


    Следуйте одному правилу из фильма «Охотники за привидениями» — не скрещивайте
    лучи. То есть не позволяйте частям веб-сайтов просачиваться за пределы веб-уровня,
    а деталям баз данных — за пределы уровня данных.


    Вы можете представить себе уровни в виде вертикальной стопки, как торт в телепередаче
    «Лучший пекарь Британии»¹.


    ![](img/eacb50a37d89d355fa68de0c62d56b32_29_0.png)


    Вот несколько причин для разделения уровней.


    +   - Если вы не разделите уровни, то ожидайте, что станете широко известным веб-мемом:
    «Теперь у вас две проблемы».

    - Разделить уровни, если они смешаются, будет очень сложно.

    - Вам потребуется знание двух или более специальностей, чтобы понять и написать
    тесты, если логика кода запуталась.


    Кстати, хотя я и называю их *уровнями*, не нужно считать, что один из них находится
    выше или ниже другого и что команды перемещаются с помощью гравитации. Это было
    бы проявлением вертикального шовинизма! Можете рассматривать уровни как блоки,
    стоящие бок о бок друг с другом (рис. 1.2).


    Как бы вы их ни представляли, *единственными* путями связи между блоками/уровнями
    могут служить стрелки (API). Это важно для тестирования и от-


    > ¹ Как известно, если слои вашего торта сложены небрежно, вы можете не вернуться
    в шатер на следующей неделе.'
