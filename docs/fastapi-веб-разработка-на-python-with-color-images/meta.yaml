    # Множество процессов


    Вы наверняка видели сервер Python под названием Gunicorn (https://gunicorn.org).
    Он может контролировать несколько процессов, но это сервер WSGI, а FastAPI основан
    на ASGI. К счастью, существует специальный класс процессов Uvicorn, которым может
    управлять Gunicorn.


    В примере 13.1 рассматриваются эти процессы Uvicorn на localhost, порт 8000 (взято
    из официальной документации, https://oreil.ly/Svdhx). Кавычки защищают оболочку
    от любой специальной интерпретации.


    **Пример 13.1.** Использование Gunicorn с процессами Uvicorn


    ```

    $ pip install "uvicorn[standard]" gunicorn

    $ gunicorn main:app --workers 4 --worker-class \nuvicorn.workers.UvicornWorker
    --bind 0.0.0.0:8000

    ```


    Вы увидите множество строк, когда Gunicorn будет выполнять ваши запросы. Будет
    запущен процесс Gunicorn верхнего уровня, который станет общаться с четырьмя рабочими
    подпроцессами Uvicorn, совместно использующими порт 8000 на local host (0.0.0.0).
    Измените хост, порт или количество процессов, если вам нужно что-то другое. Выражение
    main:app ссылается на файл main.py и объект FastAPI с именем переменной app. В
    документации (https://oreil.ly/TxYIy) Gunicorn утверждается: «Для обработки сотен
    или тысяч запросов в секунду Gunicorn потребуется всего 4–12 рабочих процессов».


    Оказывается, сам Uvicorn также может запускать несколько процессов Uvicorn, как
    показано в примере 13.2.


    **Пример 13.2.** Использование Uvicorn с рабочими процессами Uvicorn


    ```

    $ uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

    ```


    Но этот метод не позволяет управлять процессами, поэтому обычно предпочтение отдается
