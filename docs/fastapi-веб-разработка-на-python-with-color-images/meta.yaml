  md: '# OAuth2


    OAuth 2.0, что расшифровывается как Open Authorization («открытая авторизация»),
    — это стандарт, позволяющий веб-сайту или приложению получать доступ к ресурсам,
    размещенным другими веб-приложениями, от имени пользователя.


    Auth0


    В ранние времена полного доверия к Интернету вы могли предоставить логин и пароль
    от веб-сайта (назовем его Б) другому сайту (А, конечно же), и он получал доступ
    к материалам, размещенным на Б, для вас. В результате А получит полный доступ
    к Б, хотя ему будет позволено иметь доступ только к тому, что ему положено. Примерами
    Б и ресурсов могут служить подписчики в Twitter, друзья в Facebook, контакты по
    электронной почте и т. д. Конечно, это не могло продолжаться долго, поэтому различные
    компании и группы объединились, чтобы определить стандарт OAuth. Изначально он
    был разработан только для того, чтобы позволить сайту А получить доступ к определенным
    (не всем) ресурсам сайта Б.


    OAuth2 (https://oauth.net/2) — это популярный, но сложный стандарт авторизации,
    его применение выходит за рамки примера А/Б. Для него существует множество объяснений,
    от простых (https://oreil.ly/ehmuf) до сложных (https://oreil.ly/qAUaM).


    ![](img/eacb50a37d89d355fa68de0c62d56b32_172_0.png)


    Раньше существовал стандарт OAuth1 (https://oauth.net/1), но он больше не используется.
    Некоторые из первоначальных рекомендаций OAuth2 уже устарели (другими словами
    — не применяйте их). На горизонте уже виден стандарт OAuth2.1 (https://oauth.net/2.1)
    и где-то дальше в тумане — txauth (https://oreil.ly/5PW2T).


    OAuth предлагает различные потоки (flows) (https://oreil.ly/kRiWh) для разных
    обстоятельств. Здесь я буду использовать Authorization Code Flow (поток кода авторизации).
    В этом разделе мы рассмотрим реализацию, по одному среднему этапу за раз.


    Сначала вам нужно установить сторонние пакеты Python:


    +   - JWT handling — pip install python-jose[cryptography];

    - Secure password handling — pip install passlib;

    - Form handling — pip install python-multipart.'
