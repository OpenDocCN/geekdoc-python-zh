    # Об авторе


    **Билл Любанович** занимается разработкой программного обеспечения уже более 40
    лет, специализируясь на Linux, веб-технологиях и Python. Выступил соавтором книги
    издательства O''Reilly «Системное администрирование в Linux» и написал оба издания
    книги «Простой Python». Несколько лет назад он открыл для себя FastAPI и вместе
    со своей командой использовал его для переписывания большого API для биомедицинских
    исследований. Опыт оказался настолько положительным, что они решили применять
    FastAPI для всех новых проектов. Билл живет со своей семьей и кошками в горах
    Сангре-де-Саскуатч в штате Миннесота.'
- md: "## Иллюстрация на обложке\n\nЖивотное на обложке — шипохвостая игуана (род\
    \ *Ctenosaura*). Название *Ctenosaura* происходит от двух греческих слов: *ctenos*,\
    \ что означает «гребень» (за гребнеподобные шипы на спине и хвосте), и *saura*\
    \ — «ящерица». Существует 15 признанных видов шипохвостых игуан, включая пятикловую,\
    \ черногрудую, мотагу, оахаку, роатану и утилу.\n\nДлина шипохвостых игуан может\
    \ варьироваться от 12 до 100 см. Каждый вид окрашен в свой цвет, который может\
    \ меняться в зависимости от температуры тела, настроения, состояния здоровья животного\
    \ и температуры среды обитания. Шипохвостые игуаны всеядны и питаются разнообразными\
    \ фруктами, цветами, листвой и мелкими животными.\n\nИгуан можно встретить в самых\
    \ разных местах обитания. Родиной шипохвостых игуан являются Мексика и Центральная\
    \ Америка. Их можно встретить в тропических и субтропических сухих лесах, зарослях\
    \ кустарников, а иногда и в измененных человеком местах обитания и городских районах.\
    \ Некоторые виды, такие как роатан (встречается только на острове Роатан в Гондурасском\
    \ заливе), утила (встречается только на Утиле — архипелаге в заливе у карибского\
    \ побережья Гондураса, в болотах и мангровых экосистемах) и мотагуа (встречается\
    \ только в Гватемале), являются эндемиками очень специфических территорий.\n\n\
    Несколько видов шипохвостых игуан внесены в список исчезающих или находящихся\
    \ под критической угрозой исчезновения. Некоторые из них (западная и черная шипохвостая\
    \ игуаны) известны как инвазивные виды в США. Они сталкиваются с рядом угроз,\
    \ включая утрату среды обитания из-за сельского хозяйства и выпаса скота, незаконную\
    \ торговлю домашними животными и браконьерство, фрагментацию среды обитания, интродуцированных\
    \ хищников и убийство от страха.\n\nМногие животные, изображаемые на обложках\
    \ книг издательства O'Reilly, находятся под угрозой исчезновения, хотя все они\
    \ важны для мира. Иллюстрация на обложке выполнена Карен Монтгомери на основе\
    \ старинной гравюры из Музея живой природы.\n\n## Алфавитный указатель\n\n- **A**\n\
    \  - Asynchronous Server Gateway Interface, ASGI 41\n  - Authorization Code Flow\
