    \ (https://tiangolo.com). Во многих смыслах это более современный, чем большинство\
    \ веб-фреймворков Python, и он использует добавленный в Python 3 за последние\
    \ несколько лет функционал. Эта глава представляет собой краткий обзор основных\
    \ возможностей FastAPI с акцентом на первом из интересующих вас вопросов: как\
    \ обрабатывать веб-запросы и ответы?\n\n## Что такое FastAPI\n\nКак и любой другой\
    \ веб-фреймворк, FastAPI помогает создавать веб-приложения. Каждый фреймворк призван\
    \ облегчить выполнение некоторых операций за счет особенностей, допущений и настроек\
    \ по умолчанию. Как следует из названия, FastAPI предназначен для разработки веб-интерфейсов\
    \ API, хотя можно использовать его и для традиционных приложений с веб-контентом.\n\
    \nНа сайте FastAPI заявлены такие его преимущества:\n\n- *высокая производительность*\
    \ — в некоторых случаях он работает так же быстро, как Node.js и Go, что необычно\
    \ для фреймворков Python;\n- *ускоренный процесс разработки* — никаких острых\
    \ углов или странностей;\n- *повышение качества кода* — подсказки типов и модели\
    \ помогают уменьшить количество ошибок;\n- *автоматически генерируемая документация\
    \ и тестовые страницы* — это гораздо проще, чем вручную редактировать описания\
    \ OpenAPI.\n\nВ FastAPI используются:\n\n- подсказки типов Python;\n- пакет Starlette\
    \ для веб-машин, включая поддержку асинхронности;\n- пакет Pydantic для определения\
    \ и проверки данных;\n- специальная интеграция, позволяющая использовать и расширять\
    \ возможности других фреймворков.\n\nТакое сочетание создает приятную среду для\
    \ разработки веб-приложений, особенно RESTful-веб-сервисов.\n\n## Приложение FastAPI\n\
    \nНапишем маленькое приложение FastAPI — веб-сервис с одной конечной точкой. Пока\
    \ что будем работать на так называемом веб-уровне, где обрабатываются только веб-запросы\
    \ и ответы. Сначала установите основные необходимые пакеты Python:\n\n- фреймворк\
    \ FastAPI (https://fastapi.tiangolo.com) — pip install fastapi;\n- веб-сервер\
    \ Uvicorn (https://www.uvicorn.org) — pip install uvicorn;\n- текстовый веб-клиент\
    \ HTTPie (https://httpie.io) — pip install httpie;\n- пакет синхронного веб-клиента\
    \ Requests (https://requests.readthedocs.io) — pip install requests;\n- пакет\
    \ синхронного/асинхронного веб-клиента HTTPX (https://www.python-httpx.org) —\
    \ pip install httpx.\n\nХотя curl (https://curl.se) — это самый известный текстовый\
    \ веб-клиент, я считаю, что HTTPie проще в использовании. Кроме того, по умолчанию\
    \ он задействует кодирование и декодирование JSON, что лучше подходит для FastAPI.\
    \ Далее в этой главе вы увидите снимок экрана, содержащий синтаксис командной\
    \ строки curl, необходимой для доступа к определенной конечной точке.\n\nСтанем\
    \ тенью веб-разработчика-интроверта в примере 3.1 и сохраним этот код в файле\
    \ hello.py.\n\n### Пример 3.1. Робкая конечная точка (hello.py)\n\n```python\n\
    from fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi\")\ndef greet():\n\
    \    return \"Hello? World?\"\n```\n\nНужно обратить внимание на следующие моменты.\n\
    \n- app — это объект FastAPI верхнего уровня, представляющий все веб-приложение.\n\
    - @app.get(\"/hi\") — это декоратор пути. Он сообщает FastAPI следующее:\n   \
    \ - запрос к URL-адресу \"/hi\" на этом сервере должен быть направлен на следующую\
    \ функцию;\n    - этот декоратор применяется только к HTTP-глаголу GET. Также\
    \ можно ответить на URL-запросы \"/hi\", отправленные другими HTTP-глаголами (PUT,\
    \ POST и т. д.), каждый с отдельной функцией.\n- def greet() представляет собой\
    \ функцию пути — основную точку контакта с HTTP-запросами и ответами. В этом примере\
    \ у нее нет аргументов, но следующие разделы показывают, что в недрах FastAPI\
    \ скрывается гораздо больше.\n\nСледующим шагом будет запуск этого веб-приложения\
    \ на веб-сервере. Сам FastAPI не включает в себя веб-сервер, но рекомендует использовать\
    \ Uvicorn. Запустить Uvicorn и веб-приложение FastAPI можно двумя способами —\
    \ извне или изнутри.\n\nЧтобы запустить Uvicorn извне, через командную строку,\
    \ смотрите пример 3.2.\n\n### Пример 3.2. Запуск Uvicorn с помощью командной строки\n\
    \n```bash\n$ uvicorn hello:app --reload\n```\n\nСлово hello дает ссылку на файл\
    \ hello.py, а слово app — это имя переменной FastAPI в этом файле.\n\nКроме того,\
    \ вы можете запустить Uvicorn внутри самого приложения, как показано в примере\
    \ 3.3.\n\n### Пример 3.3. Запуск Uvicorn внутри приложения\n\n```python\nfrom\
    \ fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi\")\ndef greet():\n\
    \    return \"Hello? World?\"\n\nif __name__ == \"__main__\":\n    import uvicorn\n\
    \    uvicorn.run(\"hello:app\", reload=True)\n```\n\nВ любом случае параметр reload\
    \ указывает Uvicorn перезапустить веб-сервер, если содержимое файла hello.py изменится.\
    \ В этой главе мы будем часто использовать автоматическую перезагрузку.\n\nПо\
    \ умолчанию будет задействоваться порт 8000 вашей машины под названием localhost.\
    \ И у внешнего, и у внутреннего методов есть аргументы host и port, но, возможно,\
    \ вы предпочтете что-то другое.\n\nТеперь у сервера есть единственная конечная\
    \ точка (/hi), и он готов к приему запросов. Протестируем его с помощью нескольких\
    \ веб-клиентов.\n\n- В браузере введите URL-адрес в строку вверху окна.\n- Для\
    \ текстового веб-клиента HTTPie введите показанную ниже, в примере 3.7, команду\
    \ (символ $ означает командную строку, используемую в вашей системной оболочке).\n\
    - Для запросов или HTTPX применяйте Python в интерактивном режиме и набирайте\
    \ текст после >>>.\n\nКак написано в предисловии, то, что вы вводите, выделено\
    \ **полужирным моноширинным шрифтом**, а вывод представлен в формате обычного\
    \ моноширинного шрифта.\n\nВ примерах 3.4–3.7 показаны различные способы тестирования\
    \ новой конечной точки /hi веб-сервера.\n\n**Пример 3.4.** Проверка /hi в браузере\n\
    http://localhost:8000/hi\n\n**Пример 3.5.** Проверка /hi с помощью Requests\n\n\
    ```python\n>>> import requests\n>>> r = requests.get(\"http://localhost:8000/hi\"\
    )\n>>> r.json()\n'Hello? World?'\n```\n\n**Пример 3.6.** Проверка /hi с помощью\
    \ HTTPX, практически идентичная работе с Requests\n\n```python\n>>> import httpx\n\
    >>> r = httpx.get(\"http://localhost:8000/hi\")\n>>> r.json()\n'Hello? World?'\n\
    ```\n\n> Неважно, используете ли вы Requests или HTTPX для тестирования маршрутов\
    \ FastAPI. Но в главе 13 показаны случаи, когда HTTPX полезен при выполнении других\
    \ асинхронных вызовов. Поэтому в остальных примерах в этой главе задействуются\
    \ именно Requests.\n\n**Пример 3.7.** Проверка /hi с помощью HTTPie\n\n```bash\n\
    $ http localhost:8000/hi\nHTTP/1.1 200 OK\ncontent-length: 15\ncontent-type: application/json\n\
    date: Thu, 30 Jun 2022 07:38:27 GMT\nserver: uvicorn\n\n\"Hello? World?\"\n```\n\
    \nВ примере 3.8 используйте аргумент -b, чтобы пропустить заголовки ответа и вывести\
    \ только тело запроса.\n\n### Пример 3.8. Проверка /hi с помощью HTTPie с выводом\
    \ только тела ответа\n\n```bash\n$ http -b localhost:8000/hi\n\"Hello? World?\"\
    \n```\n\nПример 3.9 позволяет получить полные заголовки запроса, а также ответ\
    \ с помощью аргумента -v.\n\n### Пример 3.9. Проверка /hi с помощью HTTPie с получением\
    \ всех данных\n\n```bash\n$ http -v localhost:8000/hi\nGET /hi HTTP/1.1\nAccept:\
    \ /\nAccept-Encoding: gzip, deflate\nConnection: keep-alive\nHost: localhost:8000\n\
    User-Agent: HTTPie/3.2.1\n\nHTTP/1.1 200 OK\ncontent-length: 15\ncontent-type:\
    \ application/json\ndate: Thu, 30 Jun 2022 08:05:06 GMT\nserver: uvicorn\n\n\"\
    Hello? World?\"\n```\n\nОдни примеры, приводимые в книге, показывают стандартный\
    \ вывод HTTPie (заголовки и тело ответа), а другие — только тело.\n\n## HTTP-запросы\n\
    \nПример 3.9 включает только один конкретный запрос: GET на URL /hi на сервер\
    \ localhost, порт 8000.\n\nВеб-запросы «бегают» по разным частям HTTP-запроса,\
    \ а FastAPI позволяет получить к ним беспрепятственный доступ. В примере 3.10\
    \ показан HTTP-запрос из образца запроса в примере 3.9, отправленный командой\
    \ http на веб-сервер.\n\n### Пример 3.10. HTTP-запрос\n\n```\nGET /hi HTTP/1.1\n\
    Accept: /\nAccept-Encoding: gzip, deflate\n```"
