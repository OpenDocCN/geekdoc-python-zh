  md: 'FastAPI. Как и любой другой веб-фреймворк, Starlette выполняет все обычные
    операции синтаксического анализа HTTP-запросов и генерации ответов. Он аналогичен
    лежащему в основе Flask пакету Werkzeug (https://werkzeug.palletsprojects.com).


    Самая важная его особенность заключается в поддержке современного асинхронного
    веб-стандарта Python — ASGI (https://asgi.readthedocs.io). До сих пор большинство
    веб-фреймворков Python, например Flask и Django, основывались на традиционном
    синхронном стандарте WSGI (https://wsgi.readthedocs.io). ASGI позволяет избежать
    характерных для приложений на базе WSGI блокировок и напряженного ожидания. Проблемы
    такого типа связаны с частым подключением веб-приложений к гораздо более медленному
    коду, например, для доступа к базам данных, файлам и сетям. В результате Starlette
    и использующие его фреймворки стали самыми быстрыми веб-пакетами Python и составили
    конкуренцию даже приложениям на Go и Node.js.


    # Типы конкурентности


    Прежде чем перейти к подробностям поддержки *асинхронности*, предоставляемой Starlette
    и FastAPI, полезно узнать, какими способами можно реализовать *конкурентность*.


    При *параллельных* вычислениях задача распределяется между несколькими выделенными
    центральными процессорами (ЦП). Этот метод часто используется в приложениях для
    выполнения расчетов, таких как задачи обработки графики и машинное обучение.


    При *конкурентных* вычислениях каждый ЦП переключается между несколькими задачами.
    Некоторые задачи из потока занимают больше время, и необходимо сократить общее
    время выполнения. Считывание файла или доступ к удаленному сетевому сервису буквально
    в тысячи и миллионы раз медленнее, чем выполнение вычислений в ЦП.


    Веб-приложения выполняют большую часть этой медленной работы. Как заставить их
    или любые другие серверы работать быстрее? В этом разделе рассматриваются некоторые
    возможности, начиная с общесистемных и заканчивая целевой темой этой главы — реализацией
    конструкций `async` и `await` в FastAPI для Python.'
