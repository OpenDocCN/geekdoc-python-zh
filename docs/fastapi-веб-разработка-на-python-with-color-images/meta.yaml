    # Заглушки и фиктивные данные


    *Заглушки*, известные также как *макеты данных*, представляют собой фиксированные
    результаты, возвращаемые без вызова обычных активных модулей. Это быстрый способ
    проверить свои маршруты и ответы.


    *Фиктивные данные* — это аналог настоящего источника данных, выполняющий по крайней
    мере некоторые из тех же функций. Примером может служить класс в оперативной памяти,
    имитирующий базу данных. В этой и следующих главах вам предстоит создать некоторое
    количество фиктивных данных, по мере того как вы будете заполнять код, определяющий
    уровни и их взаимодействие. В главе 10 вы определите реальное хранилище данных
    (базу данных), и оно заменит фиктивные данные.


    # Создание общих функций с помощью стека


    Как и в примерах с данными, подход к созданию этого сайта является исследовательским.
    Часто бывает неясно, что в итоге понадобится, поэтому давайте начнем с некоторых
    характерных для подобных сайтов элементов. Для обеспечения доступа фронтенда к
    данным обычно требуются способы выполнения следующих запросов:


    +   - *получить* один, некоторые, все (get one, some, all);

    - *создать* (create);

    - *заменить* (replace) полностью;

    - *изменить* (modify) частично;

    - *удалить* (delete).


    По сути, это основы CRUD из баз данных, хотя я разделил букву U (модификация)
    на частичные (*изменение*) и полные (*замена*) функции. Возможно, это различие
    окажется излишним! Это зависит от того, куда ведут данные.'
