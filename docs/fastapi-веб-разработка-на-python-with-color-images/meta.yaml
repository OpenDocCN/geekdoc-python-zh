  md: '● Если да, то находится ли значение в нужном диапазоне или соответствует ли
    оно шаблону?


    По крайней мере три решения отвечают хотя бы некоторым из этих требований:


    +   ● *Dataclasses* (https://oreil.ly/mxANA) — часть стандартного языка Python;

    ● *attrs* (https://www.attrs.org) — сторонний пакет, но содержит супернабор классов
    данных;

    ● *Pydantic* (https://docs.pydantic.dev) — тоже сторонний продукт, но интегрированный
    в FastAPI, поэтому его легко выбрать, если вы уже используете FastAPI. И если
    вы читаете эту книгу, то вполне вероятно, что это именно так.


    Удобное сравнение этих трех вариантов можно посмотреть на YouTube (https://oreil.ly/pkQD3).
    Одним из выводов является то, что Pydantic выделяется при проверке, а его интеграция
    с FastAPI позволяет выявить множество потенциальных ошибок в данных. Другое дело,
    что Pydantic полагается на наследование (от класса BaseModel), а два других используют
    декораторы Python для определения своих объектов. Это скорее вопрос стиля.


    В другом сравнении (https://oreil.ly/gU28a) Pydantic превзошел более старые пакеты
    проверки, такие как marshmallow (https://marshmallow.readthedocs.io) и библиотека
    с интригующим названием Voluptuous¹ (https://github.com/alecthomas/voluptuous).
    Еще один большой плюс Pydantic в том, что он использует стандартный синтаксис
    подсказок типов Python — более старые библиотеки не применяли подсказки типов
    и создавали собственные.


    В книге я остановился на Pydantic, но вы можете найти применение любой из альтернатив,
    если не используете FastAPI.


    Pydantic предоставляет возможность задать любую комбинацию следующих проверок:


    +   ● обязательные и необязательные;

    ● значение по умолчанию, если не указано, но требуется;

    ● ожидаемый тип или типы данных;

    ● ограничения диапазона значений;

    ● другие проверки на основе функций, если необходимо;

    ● сериализацию и десериализацию.


    > ¹ Voluptuous (англ.) — «чувственный». — Примеч. пер.'
