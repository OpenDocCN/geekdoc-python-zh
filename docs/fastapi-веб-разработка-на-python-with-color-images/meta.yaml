    \ не сработать более чем одним способом. На веб-уровне обычно требуется проверить,\
    \ существует ли конечная точка, работает ли она с правильными параметрами и возвращает\
    \ ли правильный код состояния и данные.\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_197_0.png)\n\
    \nЭто поверхностные API-тесты, тестирующие исключительно веб-слой. Таким образом,\
    \ вызовы сервисного уровня, который, в свою очередь, будет обращаться к уровню\
    \ данных и базе данных, должны быть перехвачены, как и любые другие вызовы, выходящие\
    \ с веб-уровня.\n\nИспользуя идею с реализацией конструкции import из предыдущего\
