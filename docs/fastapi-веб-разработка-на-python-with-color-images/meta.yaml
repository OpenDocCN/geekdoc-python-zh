    \ избежать блокировки веб-сервера во время выгрузки частей файла.\n\n## Пример\
    \ 15.4. Выгрузка большого файла с помощью FastAPI\n(добавить к файлу main.py)\n\
    \n```\nfrom fastapi import UploadFile\n\n@app.post(\"/big\")\nasync def upload_big_file(big_file:\
    \ UploadFile) -> str:\n    return f\"file size: {big_file.size}, name: {big_file.filename}\"\
    \n```\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_235_0.png)\n\nФункция File()\
    \ создает объект bytes и нуждается в круглых скобках. UploadFile — это объект\
    \ другого класса.\n\nЕсли стартер Uvicorn еще не износился, значит, пришло время\
    \ испытаний. На этот раз в примерах 15.5 и 15.6 используется файл размером 1 Гбайт\
    \ (1GB.bin), я взял его на сайте Fastest.Fish.\n\n## Пример 15.5. Тестирование\
    \ выгрузки большого файла с помощью HTTPie\n\n```\n$ http -f -b POST http://localhost:8000/big\
    \ big_file@1GB.bin\n\"file size: 1000000000, name: 1GB.bin\"\n```\n\n## Пример\
    \ 15.6. Тестирование выгрузки большого файла с помощью Requests\n\n```\n>>> import\
    \ requests\n>>> url = \"http://localhost:8000/big\"\n>>> files = {'big_file':\
    \ open('1GB.bin', 'rb')}\n>>> resp = requests.post(url, files=files)\n>>> print(resp.json())\n\
    file size: 1000000000, name: 1GB.bin\n```\n\n## Загрузка файлов\n\nК сожалению,\
    \ гравитация не ускоряет скачивание файлов. Вместо этого мы будем использовать\
    \ эквиваленты методов выгрузки.\n\n## Класс FileResponse\n\nПервым (пример 15.7)\
    \ представлен вариант «все и сразу», класс FileResponse.\n\n### Пример 15.7. Загрузка\
    \ небольшого файла с помощью FileResponse (добавить в файл main.py)\n\n```\nfrom\
    \ fastapi.responses import FileResponse\n\n@app.get(\"/small/{name}\")\nasync\
    \ def download_small_file(name):\n    return FileResponse(name)\n```\n\nГде-то\
    \ здесь есть тест. Сначала поместите файл 1KB.bin в тот же каталог, что и main.py.\
    \ Теперь запустите пример 15.8.\n\n### Пример 15.8. Загрузка небольшого файла\
    \ с помощью HTTPie\n\n```\n$ http -b http://localhost:8000/small/1KB.bin\n\n---------------------------------------\n\
    | NOTE: binary data not shown in terminal |\n---------------------------------------\n\
    ```\n\nЕсли вы не доверяете этому сообщению об ограничениях, то пример 15.9 направляет\
    \ вывод в утилиту типа wc, чтобы убедиться, что вы получили все 1000 байт.\n\n\
    ## Пример 15.9. Загрузка небольшого файла с помощью HTTPie с подсчетом байтов\n\
    \n```\n$ http -b http://localhost:8000/small/1KB.bin | wc -c\n1000\n```\n\n##\
    \ Класс StreamingResponse\n\nКак и в случае с модулем FileUpload, большие файлы\
    \ лучше загружать с помощью класса StreamingResponse, возвращающего файл по частям.\
    \ Пример 15.10 показывает такой подход к реализации с помощью функции пути, определенной\
    \ как async def. Он позволяет избежать блокировки, когда процессор не используется.\
    \ Я пока пропускаю проверку ошибок. Если файла path не существует, вызов функции\
    \ open() выбросит исключение.\n\n### Пример 15.10. Возврат большого файла с помощью\
    \ класса StreamingResponse (добавить в файл main.py)\n\n```\nfrom pathlib import\
    \ Path\nfrom typing import Generator\nfrom fastapi.responses import StreamingResponse\n\
    \ndef gen_file(path: str) -> Generator:\n    with open(file=path, mode=\"rb\"\
    ) as file:\n        yield file.read()\n\n@app.get(\"/download_big/{name}\")\n\
    async def download_big_file(name:str):\n    gen_expr = gen_file(path=path)\n \
    \   response = StreamingResponse(\n        content=gen_expr,\n        status_code=200,\n\
    \    )\n    return response\n```\n\ngen_expr — выражение-генератор, возвращаемое\
    \ функцией-генератором gen_file(). Класс StreamingResponse использует его для\
    \ своего итерируемого аргумента content, чтобы загружать файл по частям.\n\nПример\
    \ 15.11 представляет собой сопутствующий тест. (Для этого сначала потребуется\
    \ разместить файл 1GB.bin рядом с файлом main.py, процесс займет немного больше\
    \ времени.)\n\n### Пример 15.11. Загрузка большого файла с помощью HTTPie\n\n\
    ```\n$ http -b http://localhost:8000/big/1GB.bin | wc -c\n1000000000\n```\n\n\
    ## Предоставление статических файлов\n\nТрадиционные веб-серверы могут обращаться\
    \ с файлами сервера так, как будто они находятся в обычной файловой системе. FastAPI\
    \ позволяет делать это с помощью класса StaticFiles.\n\nДля этого примера создадим\
    \ каталог скучных бесплатных файлов для загрузки пользователями.\n\n- Создайте\
    \ каталог static на том же уровне, что и файл main.py. (У этого хранилища может\
    \ быть любое название, я называю его static (статическим) только для того, чтобы\
    \ не забыть, зачем я его сделал.)\n- Поместите в него текстовый файл abc.txt с\
    \ текстовым содержимым abc :).\n\n### Пример 15.12. Предоставление всего содержимого\
    \ в каталоге с помощью StaticFiles (добавить в файл main.py)\n\n```\nfrom pathlib\
    \ import Path\nfrom fastapi import FastAPI\nfrom fastapi.staticfiles import StaticFiles\n\
    \n# Каталог, содержащий файл main.py:\ntop = Path(__file__).resolve().parent\n\
    \napp.mount(\"/static\",\n    StaticFiles(directory=f\"{top}/static\", html=True),\n\
    \    name=\"free\")\n```\n\nРасчет top гарантирует, что вы разместите каталог\
    \ static рядом с файлом main.py. Переменная __file__ представляет собой полное\
    \ имя пути к этому файлу.\n\n### Пример 15.13. Получение статического файла\n\n\
    ```\n$ http -b localhost:8000/static/abc.txt\nabc :)\n```\n\nА что насчет аргумента\
    \ html=True, который мы передаем в функцию StaticFiles()? Это делает ее работу\
    \ немного более похожей на работу традиционного сервера, возвращая файл index.html,\
    \ если он существует в этом каталоге, но вы не запрашивали файл index.html в явном\
    \ виде в URL. Итак, создадим в каталоге static файл index.html с содержимым Oh.\
    \ Hi!, а затем протестируем работу кода в примере 15.14.\n\n### Пример 15.14.\
    \ Получение файла index.html из каталога /static\n\n```\n$ http -b localhost:8000/static/\n\
    Oh. Hi!\n```\n\nУ вас может быть любое необходимое количество файлов (и подкаталогов\
    \ с файлами и т. д.). Создайте подкаталог xyz в каталоге static и поместите туда\
    \ два файла:\n\n- xyx.txt — содержит текст: xyz : (;\n- index.html — содержит\
    \ текст How did you find me?.\n\nЯ не буду приводить здесь примеры. Попробуйте\
    \ запустить их сами (надеюсь, у вас более богатое воображение).\n\n## Заключение\n\
    \nВ этой главе было показано, как выгружать и скачивать файлы — маленькие, большие\
    \ и даже гигантские. Кроме того, вы научились предоставлять статические файлы\
    \ в nostalgicном (не API) веб-стиле из каталога.\n\n# ГЛАВА 16\n\n## Формы и шаблоны\n\
    \n### Обзор\n\nХотя акроним *API* в названии *FastAPI* — это намек на его основную\
    \ направленность, FastAPI может работать и с традиционным веб-контентом. В этой\
    \ главе рассказывается о стандартных HTML-формах и шаблонах для вставки данных\
    \ в HTML.\n\n### Формы\n\nКак вы уже поняли, FastAPI был разработан в основном\
    \ для создания API, и его входной информацией по умолчанию будут данные в формате\
    \ JSON. Но это не значит, что он не может служить стандартным базовым HTML-формам\
    \ и их друзьям.\n\nFastAPI поддерживает данные из HTML-форм так же, как и из других\
    \ источников, таких как Query и Path, используя зависимость Form.\n\nДля работы\
    \ с формами FastAPI вам потребуется пакет Python-Multipart, поэтому при необходимости\
    \ выполните команду `pip install python-multipart`. Кроме того, каталог `static`\
    \ из главы 15 понадобится для размещения тестовых форм из нее.\n\nПовторим пример\
    \ 3.11, но предоставим значение who через форму, а не в виде JSON-строки. (Вызовите\
    \ функцию пути greet2(), чтобы избежать нарушения работы старой функции пути greet(),\
    \ если она все еще существует.) Добавьте пример 16.1 в файл main.py."
  mdcn: "## 示例 15.3. 使用 Requests 上传小文件\n\n```\n$ python\n>>> import requests\n>>>\
    \ url = \"http://localhost:8000/small\"\n>>> files = {'small_file': open('1KB.bin',\
    \ 'rb')}\n>>> resp = requests.post(url, files=files)\n>>> print(resp.json())\n\
    file size: 1000\n```\n\n## UploadFile 类\n\n对于大文件，最好使用 `UploadFile` 类。它会创建一个名为\
    \ `SpooledTemporaryFile` 的 Python 对象，通常存储在服务器磁盘上，而非内存中。这是一个类文件的 Python 对象，支持 `read()`、`write()`\
    \ 和 `seek()` 方法。示例 15.4 展示了这种方法的实现；其中还使用了 `async def` 声明代替 `def`，以避免在上传文件片段时阻塞\
    \ Web 服务器。\n\n## 示例 15.4. 使用 FastAPI 上传大文件\n（添加到 `main.py` 文件）\n\n```\nfrom fastapi\
    \ import UploadFile\n\n@app.post(\"/big\")\nasync def upload_big_file(big_file:\
    \ UploadFile) -> str:\n    return f\"file size: {big_file.size}, name: {big_file.filename}\"\
    \n```\n\n![](img/eacb50a37d89d355fa68de0c62d56b32_235_0.png)\n\n`File()` 函数创建一个\
    \ `bytes` 对象，需要使用圆括号。`UploadFile` 是另一个类的对象。\n\n如果 Uvicorn 启动器还没被用坏，那么是时候进行测试了。这次在示例\
    \ 15.5 和 15.6 中，我使用了一个 1GB 大小的文件（1GB.bin），它来自 Fastest.Fish 网站。\n\n## 示例 15.5.\
    \ 使用 HTTPie 测试上传大文件\n\n```\n$ http -f -b POST http://localhost:8000/big big_file@1GB.bin\n\
    \"file size: 1000000000, name: 1GB.bin\"\n```\n\n## 示例 15.6. 使用 Requests 测试上传大文件\n\
    \n```\n>>> import requests\n>>> url = \"http://localhost:8000/big\"\n>>> files\
    \ = {'big_file': open('1GB.bin', 'rb')}\n>>> resp = requests.post(url, files=files)\n\
    >>> print(resp.json())\nfile size: 1000000000, name: 1GB.bin\n```\n\n## 文件下载\n\
    \n遗憾的是，重力并不能加速文件下载。相反，我们将使用与上传方法等效的下载方法。\n\n## FileResponse 类\n\n首先（示例 15.7）介绍“一步到位”的方案：`FileResponse`\
    \ 类。\n\n### 示例 15.7. 使用 FileResponse 下载小文件（添加到 `main.py` 文件）\n\n```\nfrom fastapi.responses\
    \ import FileResponse\n\n@app.get(\"/small/{name}\")\nasync def download_small_file(name):\n\
    \    return FileResponse(name)\n```\n\n这里应该有个测试。首先，将文件 `1KB.bin` 放在与 `main.py`\
    \ 相同的目录中。现在运行示例 15.8。\n\n### 示例 15.8. 使用 HTTPie 下载小文件\n\n```\n$ http -b http://localhost:8000/small/1KB.bin\n\
    \n---------------------------------------\n| NOTE: binary data not shown in terminal\
    \ |\n---------------------------------------\n```\n\n如果你不相信这个关于限制的提示，那么示例 15.9\
    \ 将输出重定向到 `wc` 之类的工具，以确认你确实收到了全部 1000 字节。\n\n## 示例 15.9. 使用 HTTPie 下载小文件并计算字节数\n\
    \n```\n$ http -b http://localhost:8000/small/1KB.bin | wc -c\n1000\n```\n\n##\
    \ StreamingResponse 类\n\n与 `FileUpload` 模块的情况类似，对于大文件，最好使用 `StreamingResponse`\
    \ 类，它分块返回文件。示例 15.10 展示了使用定义为 `async def` 的路径函数来实现这种方法。它允许在处理器空闲时避免阻塞。我暂时跳过了错误检查。如果\
    \ `path` 文件不存在，调用 `open()` 函数将引发异常。\n\n### 示例 15.10. 使用 StreamingResponse 类返回大文件（添加到\
    \ `main.py` 文件）\n\n```\nfrom pathlib import Path\nfrom typing import Generator\n\
    from fastapi.responses import StreamingResponse\n\ndef gen_file(path: str) ->\
    \ Generator:\n    with open(file=path, mode=\"rb\") as file:\n        yield file.read()\n\
    \n@app.get(\"/download_big/{name}\")\nasync def download_big_file(name:str):\n\
    \    gen_expr = gen_file(path=path)\n    response = StreamingResponse(\n     \
    \   content=gen_expr,\n        status_code=200,\n    )\n    return response\n\
    ```\n\n`gen_expr` 是生成器函数 `gen_file()` 返回的生成器表达式。`StreamingResponse` 类将其用作可迭代的\
    \ `content` 参数，以分块方式加载文件。\n\n示例 15.11 是一个配套测试。（为此，首先需要将文件 `1GB.bin` 放在 `main.py`\
    \ 文件旁边，这个过程会花费稍多一些时间。）\n\n### 示例 15.11. 使用 HTTPie 下载大文件\n\n```\n$ http -b http://localhost:8000/big/1GB.bin\
    \ | wc -c\n1000000000\n```\n\n## 提供静态文件\n\n传统的 Web 服务器可以像处理普通文件系统一样处理服务器上的文件。FastAPI\
    \ 允许通过 `StaticFiles` 类来实现这一点。\n\n在这个例子中，我们将创建一个存放无聊的免费文件供用户下载的目录。\n\n- 在与 `main.py`\
    \ 文件相同的级别创建一个 `static` 目录。（这个存储库可以有任何名称，我将其命名为 `static`（静态）只是为了不忘创建它的目的。）\n- 在其中放置一个文本文件\
    \ `abc.txt`，内容为 `abc :)`。\n\n### 示例 15.12. 使用 StaticFiles 提供目录中的所有内容（添加到 `main.py`\
    \ 文件）\n\n```\nfrom pathlib import Path\nfrom fastapi import FastAPI\nfrom fastapi.staticfiles\
    \ import StaticFiles\n\n# 包含 main.py 文件的目录：\ntop = Path(__file__).resolve().parent\n\
    \napp.mount(\"/static\",\n    StaticFiles(directory=f\"{top}/static\", html=True),\n\
    \    name=\"free\")\n```\n\n计算 `top` 确保你将 `static` 目录放在 `main.py` 文件旁边。变量 `__file__`\
    \ 表示此文件的完整路径名。\n\n### 示例 15.13. 获取静态文件\n\n```\n$ http -b localhost:8000/static/abc.txt\n\
    abc :)\n```\n\n那么我们传递给 `StaticFiles()` 函数的参数 `html=True` 是什么作用呢？这使得它的行为更像传统服务器，如果该目录中存在\
    \ `index.html` 文件，即使你没有在 URL 中明确请求 `index.html` 文件，它也会返回该文件。因此，让我们在 `static` 目录中创建一个内容为\
    \ `Oh. Hi!` 的 `index.html` 文件，然后测试示例 15.14 中的代码。\n\n### 示例 15.14. 从 /static 目录获取\
    \ index.html 文件\n\n```\n$ http -b localhost:8000/static/\nOh. Hi!\n```\n\n你可以拥有任意数量的文件（以及包含文件的子目录等）。在\
    \ `static` 目录中创建一个子目录 `xyz`，并在其中放置两个文件：\n\n- `xyx.txt` — 包含文本：`xyz : (;`\n- `index.html`\
    \ — 包含文本 `How did you find me?`。\n\n我不会在这里给出示例。请尝试自己运行它们（希望你有更丰富的想象力）。\n\n## 结论\n\
    \n本章展示了如何上传和下载文件——小文件、大文件，甚至是巨型文件。此外，你还学会了如何以怀旧的（非 API）Web 风格从目录中提供静态文件。\n\n#\
    \ 第 16 章\n\n## 表单与模板\n\n### 概述\n\n尽管 *FastAPI* 名称中的缩写 *API* 暗示了其主要方向，但 FastAPI\
    \ 也能处理传统的 Web 内容。本章将介绍用于将数据插入 HTML 的标准 HTML 表单和模板。\n\n### 表单\n\n正如你已经理解的，FastAPI\
    \ 主要是为了创建 API 而设计的，其默认输入数据格式是 JSON。但这并不意味着它不能服务于标准的 HTML 表单及其相关内容。\n\nFastAPI\
    \ 使用 `Form` 依赖项来处理来自 HTML 表单的数据，就像处理来自 `Query` 和 `Path` 等其他来源的数据一样。\n\n要使用 FastAPI\
    \ 处理表单，你需要安装 `python-multipart` 包，因此请根据需要执行命令 `pip install python-multipart`。此外，第\
    \ 15 章中的 `static` 目录将用于存放其中的测试表单。\n\n我们将重复示例 3.11，但这次通过表单提供 `who` 的值，而不是作为 JSON\
    \ 字符串。（调用路径函数 `greet2()` 以避免破坏旧的路径函数 `greet()`（如果它仍然存在）。）将示例 16.1 添加到 `main.py`\
    \ 文件中。"
