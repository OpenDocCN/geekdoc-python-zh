    \n    params = {\"name\": name}\n    curs.execute(qry, params)\n    row = curs.fetchone()\n\
    \    if row:\n        return row_to_model(row)\n    else:\n        raise Missing(msg=f\"\
    User {name} not found\")\n```\n\n```\ndef get_all() -> list[User]:\n    qry =\
    \ \"select * from user\"\n    curs.execute(qry)\n    return [row_to_model(row)\
    \ for row in curs.fetchall()]\n```\n\n```\ndef create(user: User, table:str =\
    \ \"user\"):\n    \"\"\"Добавление <пользователя> в таблицу user или xuser\"\"\
    \"\n    qry = f\"\"\"insert into {table}\n        (name, hash)\n        values\n\
    \        (:name, :hash)\"\"\"\n    params = model_to_dict(user)\n    try:\n  \
    \      curs.execute(qry, params)\n    except IntegrityError:\n        raise Duplicate(msg=\n\
    \            f\"{table}: user {user.name} already exists\")\n```\n\n```\ndef modify(name:\
    \ str, user: User) -> User:\n    qry = \"\"\"update user set\n            name=:name,\
    \ hash=:hash\n            where name=:name0\"\"\"\n    params = {\n        \"\
    name\": user.name,\n        \"hash\": user.hash,\n        \"name0\": name}\n \
    \   curs.execute(qry, params)\n```"
  - "[PAGE 175]\n\n```\nif curs.rowcount == 1:\n    return get_one(user.name)\nelse:\n\
    \    raise Missing(msg=f\"User {name} not found\")\n```\n\n```\ndef delete(name:\
    \ str) -> None:\n    \"\"\"Отбрасывание пользователя с именем <name> из таблицы\
    \ пользователей,\n    добавление его в таблицу xuser\"\"\"\n    user = get_one(name)\n\
    \    qry = \"delete from user where name = :name\"\n    params = {\"name\": name}\n\
    \    curs.execute(qry, params)\n    if curs.rowcount != 1:\n        raise Missing(msg=f\"\
    User {name} not found\")\n    create(user, table=\"xuser\")\n```\n\n# Уровень\
    \ фиктивных данных пользователя\n\nМодуль из примера 11.9 применяется в тестах,\
    \ исключающих базу данных, но нуждается в пользовательских данных.\n\n**Пример\
    \ 11.9.** Уровень фиктивных данных: fake/user.py\n\n```\nfrom model.user import\
    \ User\nfrom error import Missing, Duplicate\n\n# (в этом модуле нет проверки\
    \ хешированного пароля)\nfakes = [\n    User(name=\"kwijobo\",\n         hash=\"\
    abc\"),\n    User(name=\"ermagerd\",\n         hash=\"xyz\"),\n    ]\n\ndef find(name:\
    \ str) -> User | None:\n    for e in fakes:\n        if e.name == name:\n    \
    \        return e\n    return None\n\ndef check_missing(name: str):\n    if not\
    \ find(name):\n        raise Missing(msg=f\"Missing user {name}\")\n\ndef check_duplicate(name:\
    \ str):\n    if find(name):\n        raise Duplicate(msg=f\"Duplicate user {name}\"\
    )\n```"
  - "[PAGE 176]\n\n```\ndef get_all() -> list[User]:\n    \"\"\"Возврат всех пользователей\"\
    \"\"\n    return fakes\n\ndef get_one(name: str) -> User:\n    \"\"\"Возврат одного\
    \ пользователя\"\"\"\n    check_missing(name)\n    return find(name)\n\ndef create(user:\
    \ User) -> User:\n    \"\"\"Добавление пользователя\"\"\"\n    check_duplicate(user.name)\n\
    \    return user\n\ndef modify(name: str, user: User) -> User:\n    \"\"\"Частичное\
    \ изменение пользователя\"\"\"\n    check_missing(name)\n    return user\n\ndef\
    \ delete(name: str) -> None:\n    \"\"\"Удаление пользователя\"\"\"\n    check_missing(name)\n\
    \    return None\n```\n\n# Сервисный уровень пользователя\n\nПример 11.10 определяет\
    \ сервисный уровень для пользователей. Отличим от других модулей сервисного уровня\
    \ является добавление функций OAuth2 и JWT. Я думаю, что лучше оставить их здесь,\
    \ чем в веб-слое, хотя несколько функций веб-слоя OAuth2 уже есть в готовящемся\
    \ проекте web/user.py.\n\nФункции CRUD пока что остаются проходными, но в будущем\
    \ их можно будет разнообразить метриками по своему вкусу. Обратите внимание на\
    \ то, что, как и сервисы существ и исследователей, эта конструкция поддерживает\
    \ применение во время выполнения либо фиктивных, либо настоящих уровней данных\
    \ для доступа к пользовательским данным.\n\n**Пример 11.10.** Сервисный уровень:\
    \ service/user.py\n\n```\nfrom datetime import timedelta, datetime\nimport os\n\
    from jose import jwt\nfrom model.user import User\n\nif os.getenv(\"CRYPTID_UNIT_TEST\"\
    ):\n    from fake import user as data\n```"
