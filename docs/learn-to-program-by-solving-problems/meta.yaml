    \ three action figures, and the second has two. We can access each box individually:\n\
    \n```\n>>> boxes[0]\n[4, 5, 7]\n>>> boxes[1]\n[1, 2]\n```\n\nWe'll read the contents\
    \ of the boxes from the input and put that information into a nested list, like\
    \ the one I've shown. Then we'll use that nested list to determine whether the\
    \ boxes can be organized.\n\n## Top-Down Design\n\nWe'll solve this problem using\
    \ a program design approach called *top-down design*. Top-down design breaks a\
    \ large problem into several smaller problems. That's useful because each of the\
    \ smaller problems will be easier to solve. We can then assemble those subproblem\
    \ solutions to solve the original problem.\n\n## Doing Top-Down Design\n\nHere’s\
    \ how top-down design works. We start by writing an incomplete Python program\
    \ that captures the main steps in a solution. Some of these steps won’t require\
    \ much code, so we can proceed to solve them directly. Other steps will require\
    \ more from us, and we’ll turn each of those into a function that we’ll call.\
    \ We might also solve a step by writing a little code *and* calling a function.\
    \ However, those functions won’t exist yet. We’ll have to write them!\n\nTo write\
    \ a needed function, we repeat this same process for that function’s task. That\
    \ is, we start by writing down the steps for that function. If we can write code\
    \ for a step outright, then we do it; otherwise, we call another function (that\
    \ we’ll write later) to handle that step.\n\nWe keep doing this until we have\
    \ no more functions to write. At that point, we’ll have a solution to our problem.\n\
    \nIt’s called top-down design because we start at the top, or highest, level of\
    \ the problem and make our way downward, through the guts of the problem, until\
    \ each step has been completely written in code. We’ll now use this to solve Action\
    \ Figures.\n\n## The Top Level\n\nTo begin our design, we focus on the main tasks\
    \ that we’ll need to solve.\n\nWe’ll certainly have to read the input, so that’s\
    \ our first task.\n\nNow, assume that we’ve read the input. What should we do\
    \ to determine whether the boxes can be organized? One important thing to do is\
    \ check each box on its own to make sure that its action figures have their heights\
    \ in order. For example, suppose that we had the box [18, 20, 4]. This box, with\
    \ heights out of order, means that we have no chance of organizing all of the\
    \ boxes. We can’t even organize this one!\n\nSo, that’s our second task: determine\
    \ whether each box, on its own, has its action figures in order. If any of these\
    \ boxes has its action figures out of order, then we know that the boxes can’t\
    \ be organized. If all boxes are OK, then we have more to check.\n\nIf each box\
    \ on its own is OK, the next question is whether we can organize all of the boxes.\
    \ One important observation we can make here is that the only action figures we\
    \ care about from now on are the ones at the left and right sides of each box.\
    \ The action figures between these don’t matter anymore.\n\nConsider this example\
    \ where we have three boxes:\n\n```\n[[9, 13, 14, 17, 25],\n [32, 33, 34, 36],\n\
    \ [1, 6]]\n```\n\nThe first box starts with an action figure of height 9 and ends\
    \ with an action figure of height 25. Action figures placed to the left of this\
    \ box must all have height 9 or less; for example, we can place the third box\
    \ to the left of this box. Action figures placed to the right of this box must\
    \ all have height 25 or more; for example, we can place the second box to the\
    \ right of this box. The action figures of heights 13, 14, and 17 change nothing;\
    \ they may as well not be there.\n\nThat’s our third task then: ignore all action\
    \ figures except those on the ends of boxes.\n\nFollowing that third task, we’ll\
    \ have a list that looks like this:\n\n```\n[[9, 25],\n [32, 36],\n [1, 6]]\n\
    ```\n\nIt’s a lot easier to tell whether we can organize these boxes if we first\
    \ sort them, like this:\n\n```\n[[1, 6],\n [9, 25],\n [32, 36]]\n```\n\nNow it’s\
    \ easy to see what the neighboring boxes of a box must be. (We used a similar\
    \ approach when solving Village Neighborhood in Chapter 5.) So, our fourth task\
    \ is to sort the boxes.\n\nOur fifth and final task is to determine whether these\
