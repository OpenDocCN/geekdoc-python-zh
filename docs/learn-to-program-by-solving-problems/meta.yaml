    # Summary


    In this chapter, we learned about complete-search algorithms, algorithms that
    search through all options to find the best one. To determine the lifeguard that
    we should fire, we try firing each lifeguard and choose the best one. To determine
    the minimum cost to fix ski hills, we try all valid ranges and choose the best
    one. To determine the number of relevant triples of cows, we check each triple
    and add the ones that meet the requirements.

    Sometimes, complete-search algorithms are efficient enough as they are. We solved
    the Lifeguards and Ski Hills problems with unadorned complete-search code. Other
    times, however, we''ll need to make our complete-search algorithm more efficient.
    We did that when solving Cow Baseball by replacing complete-search while loops
    by much faster binary searches.

    How do programmers and computer scientists discuss efficiency? How do you know
    whether an algorithm is going to be efficient enough? And can you avoid implementing
    algorithms that are simply too slow? Chapter 10 awaits.


    # Chapter Exercises


    Here are some exercises for you to try. For each, use complete search. If your
    solution is not efficient enough, think about how you can make it more efficient
    while still producing the right answer.

    For each exercise, double-check the judge that the problem comes from: some are
    on the DMOJ judge, while others are on the USACO judge.


    +   1. USACO 2019 January Bronze Contest problem Shell Game

    2. USACO 2016 US Open Bronze Contest problem Diamond Collector

    3. DMOJ problem coci20c1p1, Patkice

    4. DMOJ problem ccc09j2, Old Fishin'' Hole

    5. DMOJ problem ecoo16r1p2, Spindie

    6. DMOJ problem cco96p2, SafeBreaker

    7. USACO 2019 December Bronze Contest problem Where Am I

    8. USACO 2016 January Bronze Contest problem Angry Cows

    9. USACO 2016 December Silver Contest problem Counting Haybales

    10. DMOJ problem crci06p3, Firefly


    # Notes


    Lifeguards is originally from the USACO 2018 January Bronze Contest. Ski Hills
    is originally from the USACO 2014 January Bronze Contest. Cow Baseball is originally
    from the USACO 2013 December Bronze Contest.

    There are other types of algorithms beyond complete search, such as *greedy algorithms*
    and *dynamic-programming algorithms*. If a problem cannot be'
  - '[PAGE 277]


    solved by complete search, then it''s worth thinking through whether it can be
    solved using one of these other types.


    If you''re interested in learning more about these and other algorithms topics
    using Python, I recommend *Python Algorithms*, 2nd Edition by Magnus Lie Hetland
    (Apress, 2014).


    I''ve also written a book about algorithm design: *Algorithmic Thinking: A Problem-Based
    Introduction* (No Starch Press, 2021). It follows the same problem-based format
    as this book; as a result, its style and pacing will be familiar to you. However,
    it uses the C programming language, not the Python programming language, so to
    make the most of it, you''ll want to learn some C beforehand.


    In this chapter, we called preexisting Python functions to perform binary searches.
    If we like, we can write our own binary-search code instead of relying on those
    functions. The idea of dividing a list in half until we find the value that we
    want is intuitive, but the code to implement this is surprisingly tricky. Equally
    surprising is the vast range of problems that can be solved using variations of
    binary search. My book mentioned earlier, *Algorithmic Thinking*, contains an
    entire chapter on binary search and what it can do.'
- md: "## 10\n\n## BIG O AND PROGRAM EFFICIENCY\n\nIn the first seven chapters of\
    \ this book, we focused on writing programs that were correct: for any valid input,\
    \ we wanted our program to produce the desired output. In addition to correct\
    \ code, though, we generally want efficient code, code that runs quickly even\
    \ in the face of huge amounts of input. You may have received the occasional time\
    \ limit exceeded error when working through the first seven chapters, but our\
    \ first formal foray into program efficiency wasn't until Chapter 8, when we solved\
    \ Email Addresses. We saw there that sometimes we need to make our programs more\
    \ efficient so that they can finish within a given time limit.\n\nIn this chapter,\
    \ we'll first learn how programmers think and communicate about program efficiency.\
    \ Then, we'll study two problems where we'll need to write efficient code: determining\
    \ the most desired piece of a scarf and painting a ribbon.\n\nFor each problem,\
    \ we'll see that our initial ideas lead to an algorithm that would not be efficient\
    \ enough. But we'll keep at it until we design a faster algorithm for the same\
    \ problem, one that's dramatically more efficient than before. This exemplifies\
    \ a common workflow for programmers: first, come up with a correct algorithm;\
    \ then, only if needed, make it faster.\n\n## The Problem with Timing\n\nEach\
    \ competitive programming problem that we solve in this book has a time limit\
    \ on how long our program will be allowed to run. (I began including time limits\
    \ in the problem descriptions of Chapter 8, when we started running into programming\
    \ problems where efficiency is a serious concern.) If our program exceeds the\
    \ time limit, then the judge terminates our program with a time limit exceeded\
    \ error. A time limit is designed to prevent solutions that are too slow from\
    \ passing the test cases. For example, perhaps we come up with a complete-search\
    \ solution but the author of the problem has worked out a solution that's much\
    \ faster. That faster solution may be a variation of complete search, as it was\
    \ when we solved the Cow Baseball problem in Chapter 9, or it may be a different\
    \ approach entirely. Regardless, the time limit may be set such that our complete-search\
    \ solution will not finish in time. As such, in addition to being correct, we\
    \ may need our programs to be fast.\n\nWe can run a program to explore whether\
    \ it is efficient enough. For example, think back to \"Efficiency of Searching\
    \ a List\" in Chapter 8 when we tried to solve Email Addresses using a list. We\
    \ ran code that used bigger and bigger lists to get a sense of the amount of time\
    \ taken by list operations. This kind of testing can give us some understanding\
    \ of the efficiency of our programs. If our program is too slow, according to\
    \ the time limit for the problem, then we know that we need to optimize the current\
    \ code or find a wholly new approach.\n\nThe amount of time taken by a program\
    \ depends on the computer it is being run on. We don't know what kind of computer\
    \ the judge is using, but running the program on our own computer is still informative\
    \ because the judge is probably using a computer that's at least as fast as ours.\
    \ Say that we run our program on our laptop and it takes 30 seconds on some small\
    \ test case. If the problem time limit is three seconds, we can be confident that\
    \ our program is simply not fast enough.\n\nAn exclusive focus on time limits,\
    \ however, is limiting. Think about our first solution to Cow Baseball in Chapter\
    \ 9. We didn't need to run that code to determine how slow it would be. That's\
    \ because we were able to characterize the program in terms of the amount of work\
    \ that it would do if we did run it. For example, on page 253, we said that for\
    \ $n$ cows, our program processes $n^3$ triples of cows. Notice that our focus\
    \ here is not on the number of seconds our program would take to run, but on how\
    \ much work it does in terms of the amount of input $n$.\n\nThere are significant\
    \ advantages to this kind of analysis compared to running our programs and recording\
    \ execution times. Here are five:\n\n**Execution time depends on the computer:**\
    \ Timing our program tells us only how long our program takes on one computer.\
    \ That's very specific information, and it gives us little in the way of understanding\
    \ what to expect when the program is run on other computers. When working through\
    \ the book, you may have also noticed that the time taken by a program varies\
    \ from run to run, even on the same computer. For example, you might run a program\
    \ on a test case and find that it takes three seconds; you might then run it again,\
    \ on the same test case, and find that it takes two-and-a-half seconds or three-and-a-half\
    \ seconds. The reason for this difference is that your operating system is managing\
    \ your computing resources, shunting them around to different tasks as needed.\
    \ The decisions that your operating system makes influence the runtime of your\
    \ program.\n\n**Execution time depends on the test case:** Timing our program\
    \ on a test case tells us only how long our program takes on that test case. Suppose\
    \ that our program takes three seconds to run on a small test case. That may seem\
    \ fast, but here’s the truth about small test cases: every reasonable solution\
    \ for a problem will quickly be able to solve those. If I ask you to tell me the\
    \ number of unique email addresses among 10 email addresses, or the number of\
    \ triples of cows among 10 cows, you can quickly do it with the first correct\
    \ idea that you have. What’s interesting, then, are large test cases. They are\
    \ the ones where algorithmic ingenuity pays off. How long will our program take\
    \ on a large test case or on a huge test case? We don’t know. We’d have to run\
    \ our program on those test cases, too. Even if we did that, there could be specific\
    \ kinds of test cases that trigger poorer performance. We may be led to believe\
    \ that our program is faster than it is.\n\n**The program requires implementation:**\
    \ We can’t time something that we don’t implement. Suppose that we’re thinking\
    \ about a problem and come up with an idea for how to solve it. Is it fast? Although\
    \ we could implement it to find out, it would be nice to know, in advance, whether\
    \ or not the idea is likely to lead to a fast program. You would not implement\
    \ a program that you knew, at the outset, would be incorrect. It would similarly\
    \ be nice to know, at the outset, that a program would be too slow.\n\n**Timing\
    \ doesn’t explain slowness:** If we find that our program is too slow, then our\
    \ next task is to design a faster one. However, simply timing a program gives\
    \ us no insight into why our program is slow. It just is. Further, if we manage\
    \ to think up a possible improvement to our program, we’d need to implement it\
    \ to see whether or not it helps.\n\n**Execution time is not easily communicated:**\
    \ For many of the reasons listed, it’s difficult to use execution time to talk\
    \ to other people about the efficiency of algorithms. Execution time is too specific:\
    \ it depends on the computer, operating system, test case, programming language,\
    \ and particular implementation that’s used. We’d have to provide all of this\
    \ information to others interested in the efficiency of our algorithm.\n\nNot\
    \ to worry: computer scientists have devised a notation that addresses these shortcomings\
    \ of timing. It’s independent of the computer, independent of test case, and independent\
    \ of a particular implementation. It signals why a slow program is slow. It’s\
    \ easily communicated. It’s called *big O*, and it’s coming right up.\n\n## Big\
    \ O\n\nBig O is a notation that computer scientists use to concisely describe\
    \ the efficiency of algorithms. The key concept here is the *efficiency class*,\
    \ which tells you how fast an algorithm is or, equivalently, how much work it\
    \ does. The faster an algorithm, the less work it does; the slower an algorithm,\
    \ the more work it does. Each algorithm belongs to an efficiency class; the efficiency\
    \ class tells you how much work that algorithm does relative to the amount of\
    \ input that it must process. To understand big O, we need to understand these\
    \ efficiency classes. We’re now going to study seven of the most common ones.\
    \ We’ll see those that do the least amount of work, the ones you’ll hope your\
    \ algorithms fit into. We’ll also see those that do considerably more work, the\
    \ ones whose algorithms will probably give you time limit exceeded errors.\n\n\
    ## Constant Time\n\nThe most desirable algorithms are those that don’t do more\
    \ work as the amount of input increases. No matter the problem instance, such\
    \ an algorithm takes about the same number of steps. These are called *constant-time*\
    \ algorithms.\n\nThis is hard to believe, right? An algorithm that does about\
    \ the same amount of work, no matter what? Indeed, solving a problem with such\
    \ an algorithm is rare. But when you can do it, rejoice: you can’t do any better\
    \ than that.\n\nWe’ve managed to solve a few problems in this book using constant-time\
    \ algorithms. Think back to the Telemarketers problem in Chapter 2, where we had\
    \ to determine whether the provided phone number belongs to a telemarketer. I’ve\
    \ reproduced our solution from Listing 2-2 here:\n\n```\nnum1 = int(input())\n\
    num2 = int(input())\nnum3 = int(input())\nnum4 = int(input())\n\nif ((num1 ==\
    \ 8 or num1 == 9) and\n        (num4 == 8 or num4 == 9) and\n        (num2 ==\
    \ num3)):\n    print('ignore')\nelse:\n    print('answer')\n```\n\nOur solution\
    \ does the same amount of work no matter what the four digits of the phone number\
    \ are. The code starts by reading the input. Then"
  mdcn: "## 10\n\n## 大O表示法与程序效率\n\n在本书的前七章中，我们专注于编写正确的程序：对于任何有效的输入，我们都希望程序能产生预期的输出。然而，除了正确的代码，我们通常还希望代码是高效的，即即使面对海量输入也能快速运行。在学习前七章时，你可能偶尔会遇到“超出时间限制”的错误，但我们对程序效率的正式探索直到第8章解决“电子邮件地址”问题时才开始。我们那时看到，有时我们需要让程序更高效，以便在给定的时间限制内完成。\n\
    \n在本章中，我们将首先学习程序员如何思考和交流程序效率。然后，我们将研究两个需要编写高效代码的问题：确定围巾最受欢迎的部分和给丝带涂色。\n\n对于每个问题，我们将看到最初的思路会导致一个效率不够高的算法。但我们会坚持下去，直到为同一个问题设计出一个更快的算法，一个比之前效率显著提高的算法。这体现了程序员的常见工作流程：首先，提出一个正确的算法；然后，仅在需要时，使其更快。\n\
    \n## 计时的问题\n\n本书中我们解决的每个竞赛编程问题，都对程序允许运行的时间设定了限制。（我从第8章开始在问题描述中加入时间限制，那时我们开始遇到效率成为严重关切的编程问题。）如果我们的程序超时，评测系统就会终止我们的程序并返回“超出时间限制”的错误。时间限制旨在防止过于缓慢的解决方案通过测试用例。例如，也许我们提出了一个穷举搜索的解决方案，但问题的作者已经设计出了一个快得多的解决方案。那个更快的解决方案可能是穷举搜索的一种变体，就像我们在第9章解决“奶牛棒球”问题时那样，也可能是一种完全不同的方法。无论如何，时间限制的设定可能使得我们的穷举搜索解决方案无法及时完成。因此，除了正确性，我们可能还需要程序运行得足够快。\n\
    \n我们可以通过运行程序来探究它是否足够高效。例如，回想第8章“搜索列表的效率”中，我们尝试使用列表解决“电子邮件地址”问题时，我们运行了使用越来越大的列表的代码，以了解列表操作所需的时间。这种测试可以让我们对程序的效率有所了解。如果根据问题的时间限制，我们的程序太慢，那么我们就知道需要优化当前代码或寻找全新的方法。\n\
    \n程序运行所需的时间取决于运行它的计算机。我们不知道评测系统使用的是什么样的计算机，但在自己的计算机上运行程序仍然能提供信息，因为评测系统使用的计算机可能至少和我们的一样快。假设我们在笔记本电脑上运行程序，在某个小测试用例上花了30秒。如果问题的时间限制是三秒，我们就可以确信我们的程序就是不够快。\n\
    \n然而，仅仅关注时间限制是有局限性的。想想我们在第9章对“奶牛棒球”问题的第一个解决方案。我们不需要运行那段代码来确定它有多慢。这是因为我们能够根据程序如果运行将会做的工作量来描述它。例如，在第253页，我们说过对于$n$头奶牛，我们的程序处理$n^3$个奶牛三元组。请注意，我们这里的重点不是程序运行需要多少秒，而是它根据输入量$n$做了多少工作。\n\
    \n与运行程序并记录执行时间相比，这种分析有显著优势。以下是五点：\n\n**执行时间取决于计算机：** 对程序计时只告诉我们程序在一台计算机上运行需要多长时间。这是非常具体的信息，它几乎无法让我们理解在其他计算机上运行程序时会发生什么。在学习本书的过程中，你可能也注意到，即使在同一台计算机上，程序每次运行所需的时间也会变化。例如，你可能在一个测试用例上运行一个程序，发现它需要三秒；然后你可能在同一个测试用例上再次运行它，发现它需要两秒半或三秒半。这种差异的原因是你的操作系统正在管理你的计算资源，根据需要将它们分配给不同的任务。你的操作系统所做的决策会影响程序的运行时间。\n\
    \n**执行时间取决于测试用例：** 在一个测试用例上对程序计时只告诉我们程序在该测试用例上需要多长时间。假设我们的程序在一个小测试用例上运行需要三秒。这可能看起来很快，但关于小测试用例的真相是：对于一个问题，每个合理的解决方案都能快速解决这些用例。如果我让你告诉我10个电子邮件地址中有多少个不同的电子邮件地址，或者10头奶牛中有多少个奶牛三元组，你可以用你想到的第一个正确方法快速完成。那么，有趣的是大测试用例。它们才是算法智慧发挥作用的地方。我们的程序在一个大测试用例或一个巨大的测试用例上需要多长时间？我们不知道。我们也必须在那些测试用例上运行我们的程序。即使我们那样做了，也可能存在特定类型的测试用例会触发更差的性能。我们可能会误以为我们的程序比实际更快。\n\
    \n**程序需要实现：** 我们无法对未实现的东西计时。假设我们正在思考一个问题，并想出了解决它的方法。它快吗？虽然我们可以通过实现它来找出答案，但最好能提前知道这个想法是否可能产生一个快速的程序。你不会实现一个你从一开始就知道是不正确的程序。同样，最好能从一开始就知道一个程序会太慢。\n\
    \n**计时无法解释慢的原因：** 如果我们发现程序太慢，那么我们的下一个任务就是设计一个更快的程序。然而，仅仅对程序计时并不能让我们洞察程序为什么慢。它就是慢。此外，如果我们设法想出了一个可能的改进，我们需要实现它才能看到它是否有帮助。\n\
    \n**执行时间不易交流：** 由于上述许多原因，使用执行时间来与他人讨论算法效率是很困难的。执行时间太具体了：它取决于计算机、操作系统、测试用例、编程语言和所使用的特定实现。我们必须向所有对算法效率感兴趣的人提供所有这些信息。\n\
    \n不用担心：计算机科学家已经设计出一种符号来解决计时的这些缺点。它独立于计算机，独立于测试用例，也独立于特定的实现。它指出了慢程序为什么慢。它易于交流。它叫做*大O表示法*，马上就会介绍。\n\
    \n## 大O表示法\n\n大O表示法是计算机科学家用来简洁描述算法效率的一种符号。这里的关键概念是*效率类别*，它告诉你一个算法有多快，或者等价地，它做了多少工作。算法越快，它做的工作越少；算法越慢，它做的工作越多。每个算法都属于一个效率类别；效率类别告诉你该算法相对于它必须处理的输入量做了多少工作。要理解大O表示法，我们需要理解这些效率类别。我们现在将研究七种最常见的类别。我们将看到那些做最少工作的算法，也就是你希望你的算法能归入的类别。我们还将看到那些做相当多工作的算法，那些算法很可能会给你带来“超出时间限制”的错误。\n\
    \n## 常数时间\n\n最理想的算法是那些不随输入量增加而做更多工作的算法。无论问题实例如何，这样的算法大约需要相同数量的步骤。这些被称为*常数时间*算法。\n\
    \n这很难相信，对吧？一个无论怎样都做大约相同工作量的算法？确实，用这样的算法解决问题是罕见的。但当你能做到时，要高兴：你不可能做得更好了。\n\n在本书中，我们设法用常数时间算法解决了几个问题。回想第2章的“电话推销员”问题，我们需要确定提供的电话号码是否属于电话推销员。我在这里重现了我们来自代码清单2-2的解决方案：\n\
    \n```\nnum1 = int(input())\nnum2 = int(input())\nnum3 = int(input())\nnum4 = int(input())\n\
