  md: '# # The Mod Operator


    In “Integer and Floating-Point Numbers” in Chapter 1, I introduced the mod (%)
    operator for calculating the remainder of an integer division. For example, 16
    divided by 5 has a remainder of 1:


    ```

    >>> 16 % 5

    1

    ```


    And 15 divided by 5 has a remainder of 0 (because 5 divides 15 exactly):


    ```

    >>> 15 % 5

    0

    ```


    The second operand dictates the range of values that % can possibly return. The
    possible return values are 0 up to but not including the second operand. For example,
    if the second operand is 3, then the only values that can be returned by % are
    0, 1, and 2. In addition, as we increase the first operand, we cycle through all
    possible return values. Here’s an example:


    ```

    >>> 0 % 3

    0

    >>> 1 % 3

    1

    >>> 2 % 3

    2

    >>> 3 % 3

    0

    >>> 4 % 3

    1

    >>> 5 % 3

    2

    >>> 6 % 3

    0

    >>> 7 % 3

    1

    ```


    Notice the pattern: 0, 1, 2, 0, 1, 2, and so on.

    This behavior is useful for counting up to a specified number and then cycling
    back to 0. It’s exactly the behavior that we need when playing the slot machines:
    we play slot machine 0, then 1, then 2, then 0, then 1, then 2, then 0, then 1,
    and so on. (This is another reason why I used 0, 1, and 2, rather than other values,
    to refer to the slot machines.)

    Suppose that variable plays refers to the number of times that Martha has played.
    To determine the next machine to play (0, 1, or 2), we can use the % operator.
    For example, suppose that Martha has played one slot machine'
