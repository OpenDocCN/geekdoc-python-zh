    \    print('A')\nelif banana_total > apple_total:\n    print('B')\nelse:\n   \
    \ print('T')\n```\n\n这就是我们需要的所有代码。完整的解决方案见清单 2-1。\n\n```\napple_three = int(input())\n\
    apple_two = int(input())\napple_one = int(input())\n\nbanana_three = int(input())\n\
    banana_two = int(input())\nbanana_one = int(input())\n\napple_total = apple_three\
    \ * 3 + apple_two * 2 + apple_one\nbanana_total = banana_three * 3 + banana_two\
