    # The Problem with Timing


    Each competitive programming problem that we solve in this book has a time limit
    on how long our program will be allowed to run. (I began including time limits
    in the problem descriptions of Chapter 8, when we started running into programming
    problems where efficiency is a serious concern.) If our program exceeds the time
    limit, then the judge terminates our program with a time limit exceeded error.
    A time limit is designed to prevent solutions that are too slow from passing the
    test cases. For example, perhaps we come up with a complete-search solution but
    the author of the problem has worked out a solution that''s much faster. That
    faster solution may be a variation of complete search, as it was when we solved
    the Cow Baseball problem in Chapter 9, or it may be a different approach entirely.
    Regardless, the time limit may be set such that our complete-search solution will
    not finish in time. As such, in addition to being correct, we may need our programs
    to be fast.


    We can run a program to explore whether it is efficient enough. For example, think
    back to "Efficiency of Searching a List" in Chapter 8 when we tried to solve Email
    Addresses using a list. We ran code that used bigger and bigger lists to get a
    sense of the amount of time taken by list operations. This kind of testing can
    give us some understanding of the efficiency of our programs. If our program is
    too slow, according to the time limit for the problem, then we know that we need
    to optimize the current code or find a wholly new approach.


    The amount of time taken by a program depends on the computer it is being run
    on. We don''t know what kind of computer the judge is using, but running the program
    on our own computer is still informative because the judge is probably using a
    computer that''s at least as fast as ours. Say that we run our program on our
    laptop and it takes 30 seconds on some small test case. If the problem time limit
    is three seconds, we can be confident that our program is simply not fast enough.


    An exclusive focus on time limits, however, is limiting. Think about our first
    solution to Cow Baseball in Chapter 9. We didn''t need to run that code to determine
    how slow it would be. That''s because we were able to characterize the program
    in terms of the amount of work that it would do if we did run it. For example,
    on page 253, we said that for $n$ cows, our program processes $n^3$ triples of
    cows. Notice that our focus here is not on the number of seconds our program would
    take to run, but on how much work it does in terms of the amount of input $n$.


    There are significant advantages to this kind of analysis compared to running
    our programs and recording execution times. Here are five:


    **Execution time depends on the computer:** Timing our program tells us only how
    long our program takes on one computer. That''s very'
  - '[PAGE 280]


    specific information, and it gives us little in the way of understanding what
    to expect when the program is run on other computers. When working through the
    book, you may have also noticed that the time taken by a program varies from run
    to run, even on the same computer. For example, you might run a program on a test
    case and find that it takes three seconds; you might then run it again, on the
    same test case, and find that it takes two-and-a-half seconds or three-and-a-half
    seconds. The reason for this difference is that your operating system is managing
    your computing resources, shunting them around to different tasks as needed. The
    decisions that your operating system makes influence the runtime of your program.


    **Execution time depends on the test case:** Timing our program on a test case
    tells us only how long our program takes on that test case. Suppose that our program
    takes three seconds to run on a small test case. That may seem fast, but here’s
    the truth about small test cases: every reasonable solution for a problem will
    quickly be able to solve those. If I ask you to tell me the number of unique email
    addresses among 10 email addresses, or the number of triples of cows among 10
    cows, you can quickly do it with the first correct idea that you have. What’s
    interesting, then, are large test cases. They are the ones where algorithmic ingenuity
    pays off. How long will our program take on a large test case or on a huge test
    case? We don’t know. We’d have to run our program on those test cases, too. Even
    if we did that, there could be specific kinds of test cases that trigger poorer
    performance. We may be led to believe that our program is faster than it is.


    **The program requires implementation:** We can’t time something that we don’t
    implement. Suppose that we’re thinking about a problem and come up with an idea
    for how to solve it. Is it fast? Although we could implement it to find out, it
    would be nice to know, in advance, whether or not the idea is likely to lead to
    a fast program. You would not implement a program that you knew, at the outset,
    would be incorrect. It would similarly be nice to know, at the outset, that a
    program would be too slow.


    **Timing doesn’t explain slowness:** If we find that our program is too slow,
    then our next task is to design a faster one. However, simply timing a program
    gives us no insight into why our program is slow. It just is. Further, if we manage
    to think up a possible improvement to our program, we’d need to implement it to
    see whether or not it helps.


    **Execution time is not easily communicated:** For many of the reasons listed,
    it’s difficult to use execution time to talk to other people about the efficiency
    of algorithms. Execution time is too specific: it depends on the computer, operating
    system, test case, programming language, and particular implementation that’s
    used. We’d have to provide all of this information to others interested in the
    efficiency of our algorithm.


    Not to worry: computer scientists have devised a notation that addresses these
    shortcomings of timing. It’s independent of the computer, indepen-'
