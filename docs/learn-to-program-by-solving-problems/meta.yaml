    \ otherwise, the last line in the essay will be lost.\n\nThe final thing we do\
    \ is close both files.\n\nOne annoying aspect of writing to a file rather than\
    \ the screen is that we aren't shown the output when we run the program. To see\
    \ the output, we have to open the output file in our text editor.\n\nHere's a\
    \ tip: develop the program using print calls rather than write calls so that all\
