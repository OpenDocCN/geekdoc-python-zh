    ```\n\nWhat's that `_io.TextIOWrapper` that we keep seeing? That's the type of\
    \ the value that open returns:\n\n```\n>>> type(open('word.in', 'r'))\n<class\
    \ '_io.TextIOWrapper'>\n```\n\nThink of this type as a file type. Its values represent\
    \ open files, and you'll see shortly that it has methods that we can call.\nAs\
    \ with any function, if we don't assign what open returns to a variable, then\
    \ its return value is lost. The way we've been calling open so far doesn't give\
    \ us any way to refer to the file that we've opened!\nHere's how we can make a\
    \ variable refer to an open file:\n\n```\n>>> input_file = open('word.in', 'r')\n\
    >>> input_file\n<_io.TextIOWrapper name='word.in' mode='r' encoding='cp1252'>\n\
    ```\n\nWe'll be able to use `input_file` to read from 'word.in'.\nWhen solving\
    \ Essay Formatting, we'll also need a way to write to file 'word.out'. Here's\
    \ a variable that will help us do that:\n\n```\n>>> output_file = open('word.out',\
    \ 'w')\n>>> output_file\n<_io.TextIOWrapper name='word.out' mode='w' encoding='cp1252'>\n\
    ```\n\n## Reading from a File\n\nTo read a line from an open file, we use the\
    \ file's `readline` method. That method returns a string containing the contents\
    \ of the next line of the file. In that way, it's similar to the `input` function.\
    \ Unlike `input`, however, `readline` reads from a file rather than from standard\
    \ input.\nLet's open *word.in* and read its two lines:\n\n```\n>>> input_file\
    \ = open('word.in', 'r')\n>>> input_file.readline()\n'12 13\\n'\n>>> input_file.readline()\n\
    'perhaps better poetry will be written in the language of digital computers\\\
    n'\n```\n\nWhat's unexpected here is the \\n at the end of each string. We certainly\
    \ didn't see that when using input to read a line. The \\ symbol in a string is\
    \ an *escape character*. It escapes from the standard interpretation of characters\
    \ and changes their meaning. We don't treat \\n as the two separate characters\
    \ \\ and n. Instead, \\n is just one character: a newline character. All lines\
    \ in a file, perhaps except for the last, end with a newline character. If they\
    \ didn't, then everything would be on a single line! The readline method is literally\
    \ giving us the entire line, including its terminating newline character.\n\n\
    Here's how we can embed newlines in our own strings:\n\n```\n>>> 'one\\ntwo\\\
    nthree'\n'one\\ntwo\\nthree'\n>>> print('one\\ntwo\\nthree')\none\ntwo\nthree\n\
    ```\n\nThe Python shell doesn't process the effects of escape characters, but\
    \ print does.\n\nThe \\n sequence is useful in strings because it helps us add\
    \ multiple lines. But we rarely want those newlines in the lines that we read\
    \ from files. To get rid of them, we can use the string rstrip method. This method\
    \ is like strip except that it removes whitespace only from the right of a string\
    \ (not the left). As far as it's concerned, newlines are whitespace just like\
    \ spaces:\n\n```\n>>> 'hello\\nthere\\n\\n'\n'hello\\nthere\\n\\n'\n>>> 'hello\\\
    nthere\\n\\n'.rstrip()\n'hello\\nthere'\n```\n\nLet's try reading from the file\
    \ again, this time stripping out the newlines:\n\n```\n>>> input_file = open('word.in',\
    \ 'r')\n>>> input_file.readline().rstrip()\n'12 13'\n>>> input_file.readline().rstrip()\n\
    'perhaps better poetry will be written in the language of digital computers'\n\
    ```\n\nAt this point, we've read the two lines, so there's nothing left to read\
    \ from the file. The readline method signals this by returning an empty string.\n\
    \n```\n>>> input_file.readline().rstrip()\n''\n```\n\nThe empty string means that\
    \ we've reached the end of the file. If we want to read the lines again, we have\
    \ to reopen the file to start at its beginning.\n\nLet's do that, this time saving\
    \ each line using variables:\n\n```\n>>> input_file = open('word.in', 'r')\n>>>\
    \ first = input_file.readline().rstrip()\n>>> second = input_file.readline().rstrip()\n\
    >>> first\n'12 13'\n>>> second\n'perhaps better poetry will be written in the\
    \ language of digital computers'\n```\n\nIf we need to read all of the lines from\
