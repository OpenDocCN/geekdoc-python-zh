    an example:


    ```

    >>> lst1 = [1, 2, 3]

    >>> lst2 = [4, 5, 6]

    >>> lst1.extend(lst2)

    >>> lst1

    [1, 2, 3, 4, 5, 6]

    >>> lst2

    [4, 5, 6]

    ```


    If you want to insert into a list at a position other than its end, you can use
    the insert method. It takes an index and a value and inserts the value at the
    index:


    ```

    >>> lst = [10, 20, 30, 40]

    >>> lst.insert(1, 99)

    >>> lst

    [10, 99, 20, 30, 40]

    ```


    # Sorting a List


    The sort method *sorts* a list, putting its values in order. If we call it with
    no arguments, it sorts from smallest to largest:


    ```

    >>> positions = [20, 50, 4, 19, 15, 1]

    >>> positions.sort()

    >>> positions

    [1, 4, 15, 19, 20, 50]

    ```


    If we call it with a reverse argument of value True, it sorts from largest to
    smallest:


    ```

    >>> positions.sort(reverse=True)

    >>> positions

    [50, 20, 19, 15, 4, 1]

    ```


    The syntax that I''ve used, reverse=True, is new. Based on how we''ve called methods
    and functions to this point in the book, you might expect that True by itself
    would work. But no: sort requires the whole reverse=True to be there, for reasons
    I''ll explain in Chapter 6.


    # Removing Values from a List


    The pop method removes a value by index. If no argument is provided, pop both
    removes and returns the rightmost value.'
