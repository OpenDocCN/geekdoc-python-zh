    paid.

    That''s six plays so far. I encourage you to keep tracing. You should see that
    Martha never gets paid again and that after 10 more plays (for a total of 16),
    Martha is broke.


    # A Limitation of for loops


    In Chapter 3, we studied for loops. Standard for loops loop through a sequence,
    such as a string. We certainly have no string in the Slot Machines problem.

    Range for loops loop through a range of integers and can be used to loop a specified
    number of times. But how many times should we loop for Slot Machines? Ten? Fifty?
    Who knows. It depends on the number of plays that Martha can make before she''s
    out of quarters.'
- md: "We have no string and don't know how many iterations are required. If all we\
    \ had were for loops, we'd be stuck.\n\nEnter the *while loop*, the most general\
    \ looping structure that Python offers. We can write while loops that have nothing\
    \ to do with strings or sequences of integers. In return for this added flexibility,\
    \ we'll need to be a little more careful and take a little more responsibility\
    \ with writing our loops. Let's dig in!\n\n## while loops\n\nTo write a while\
    \ loop, we use Python's while statement. A while loop is controlled by a Boolean\
    \ expression. If the Boolean expression is True, then Python executes one iteration\
    \ of the while loop. If the expression is still True, then Python executes another\
    \ iteration of the while loop, and so on, until the Boolean expression is False.\
    \ If the Boolean expression is False at the outset, then the loop does not run\
    \ at all.\n\nwhile loops are *indefinite loops*: the number of iterations may\
    \ not be known in advance.\n\n## Using while loops\n\nLet's start with the following\
    \ example of a while loop:\n\n```\n>>> num = 0\n>>> while num < 5:\n...     print(num)\n\
    ...     num = num + 1\n...\n0\n1\n2\n3\n4\n```\n\nIn a for loop, the loop variable\
    \ is created for us; we don't have to use an assignment statement to create the\
    \ variable prior to the loop. But in a while loop, we get nothing for free. If\
    \ we need a variable to loop through values in a while loop, then we have to create\
    \ that variable ourselves. We do that here by making num refer to 0 prior to the\
    \ loop ❶.\n\nThe while loop itself is controlled by the Boolean expression num\
    \ < 5 ❷. If num < 5 is True, then the code in the loop block will run. Right now,\
    \ num refers to 0, so the Boolean expression is True. We therefore run the loop\
    \ block, which outputs 0 and then increases num to 1 ❸.\n\nWe jump back to the\
    \ top of the loop and evaluate the num < 5 Boolean expression again. As num refers\
    \ to 1, the expression is True. We therefore run the loop block again, which outputs\
    \ 1 and then increases num to 2.\n\nBack to the top of the loop: is num < 5 still\
    \ True? It is, because num is only 2. That kicks off another iteration of the\
    \ loop, which outputs 2 and increases num to 3.\n\nThis pattern continues, with\
    \ two more iterations of the loop: one when num refers to 3 and one when num refers\
    \ to 4. When num refers to 5, the num < 5 Boolean expression is finally False,\
    \ which terminates the loop.\n\nIt’s important that we remember to increase num\
    \ ❸. A for loop automatically steps our loop variable through the appropriate\
    \ values. But, again, we get nothing for free in a while loop and must update\
    \ variables ourselves to bring us closer and closer to loop termination. If we\
    \ forget to increase num, this happens:\n\n```\n>>> num = 0\n>>> while num < 5:\n\
    ...     print(num)\n...\n0\n0\n0\n0\n0\n0\n0\n0\n... forever\n```\n\nIf you run\
    \ this code on your computer, your screen will fill up with zeros, and you’ll\
    \ have to terminate your program. You can do that by pressing CTRL-C or by closing\
    \ the Python window.\n\nThe problem is that num < 5 stays True forever; nothing\
    \ in the loop can ever make it False. This situation, where a loop never terminates,\
    \ is called an infinite loop. It’s surprisingly easy to inadvertently produce\
    \ infinite while loops. If you see the same values repeating or your program appears\
    \ to be doing nothing at all, it’s likely that you’re stuck in an infinite loop.\
    \ Carefully check the while loop’s Boolean expression and that the loop block\
    \ is making progress toward termination.\n\nWe can do whatever we like with the\
    \ num variable. Here’s a while loop counting up by three:\n\n```\n>>> num = 0\n\
    >>> while num < 10:\n...     print(num)\n...     num = num + 3\n...\n0\n3\n6\n\
    9\n```\n\nAnd here's a while loop counting down from 4 to 0:\n\n```\n>>> num =\
    \ 4\n>>> while num >= 0:\n...     print(num)\n...     num = num - 1\n...\n4\n\
    3\n2\n1\n0\n```\n\nNotice that I've used >= here rather than > ❶. This way, the\
    \ while loop runs when num refers to 0, as desired.\n\n## CONCEPT CHECK\n\nWhat\
    \ is the output of the following code?\n\n```\nn = 3\nwhile n > 0:\n    if n ==\
    \ 5:\n        n = -100\n    print(n)\n    n = n + 1\n```\n\nA.\n3\n4\n\nB.\n3\n\
    4\n5\n\nC.\n3\n4\n-100\n\nD.\n3\n4\n5\n-100\n\nAnswer: C. A while loop’s Boolean\
    \ expression is checked only at the start of each iteration. Even if it becomes\
    \ False at some point during the iteration, the remainder of the iteration completes.\n\
    \nAs 3 is greater than 0, an iteration of the loop runs. The if statement block\
    \ is skipped (because its Boolean expression is False), so this iteration outputs\
    \ 3 and sets n to 4. As 4 is greater than 0, we have another iteration of the\
    \ loop, this one outputting 4 and setting n to 5. As 5 is greater than 0, we have\
    \ yet another iteration of the loop. This time, the if statement block runs, which\
    \ sets n to -100. Next, -100 is output, and n is set to -99. And here we stop,\
    \ because n > 0 is False.\n\n## CONCEPT CHECK\n\nWhat is the output of the following\
    \ code?\n\n```\nx = 6\nwhile x > 4:\n    x = x - 1\n    print(x)\n```\n\nA.\n\
    6\n5\n\nB.\n6\n5\n4\n\nC.\n5\n4\n\nD.\n5\n4\n3\n\nE.\n6\n5\n4\n3\n\nAnswer: C.\
    \ Many while loops do something and then update the loop variable, but not this\
    \ one. This one first decrements the loop variable x and then outputs it. As 6\
    \ is greater than 4, an iteration of the loop runs, which assigns 5 to x and then\
    \ outputs 5. Next, 5 is greater than 4, so we have another iteration, this one\
    \ assigning 4 to x and outputting 4. And that's it: 4 is not greater than 4, so\
    \ the loop terminates.\n\n## Nesting Loops in Loops\n\nWe can nest loops inside\
    \ of while loops, much as we can nest loops inside of for loops. In “Nesting”\
    \ in Chapter 3, I noted that the inner for loop completes all of its iterations\
    \ before the next iteration of the outer loop begins. The same holds for while\
    \ loops. Here’s an example:\n\n```\n>>> i = 0\n>>> while i < 3:\n...     j = 8\n\
    ...     while j < 11:\n...         print(i, j)\n...         j = j + 1\n...   \
    \  i = i + 1\n...\n0 8\n0 9\n0 10\n1 8\n1 9\n1 10\n2 8\n2 9\n2 10\n```\n\nEach\
    \ value of i is involved in three lines of output, one for each iteration of the\
    \ inner j loop.\n\n## CONCEPT CHECK\n\nHow many lines are output by the following\
    \ nested loop?\n\n```\nx = 0\ny = 1\nwhile x < 3:\n    while y < 3:\n        print(x,\
    \ y)\n        y = y + 1\n    x = x + 1\n```\n\nA. 2\nB. 3\nC. 6\nD. 8\nE. 9\n\n\
    Answer: A. The outer loop’s Boolean expression, x < 3, is True, so we perform\
    \ an iteration of the outer loop. That leads to two iterations of the inner loop:\
    \ one when y is 1 and one when y is 2, each of which prints a line of output.\
    \ So that’s two lines of output so far.\n\nBut nothing in the code resets y’s\
    \ value! Therefore, y < 3 will never be True again, and there won’t be any further\
    \ iterations of the inner loop.\n\nForgetting to reset a loop variable is a common\
    \ mistake when dealing with nested while loops.\n\n## Adding Boolean Operators\n\
    \nTo solve Slot Machines, we want to loop while Martha has at least one quarter.\
    \ That looks like this:\n\n```\nwhile quarters >= 1:\n```\n\nThat simple Boolean\
    \ expression will suffice for this problem. But just like for if statements, the\
    \ Boolean expression following the word while can include logical or Boolean operators.\
    \ Here’s an example:\n\n```\n>>> x = 4\n>>> y = 10\n>>> while x <= 10 and y <=\
    \ 13:\n...     print(x, y)\n...     x = x + 1\n...     y = y + 1\n...\n4 10\n\
    5 11\n6 12\n7 13\n```\n\nThe while loop is controlled by the Boolean expression\
    \ x <= 10 and y <= 13. As with any and operator, both of its operands must be\
    \ True for the whole expression to be True. When x refers to 8 and y refers to\
    \ 14, the loop terminates because the y <= 13 operand is False.\n\n## Solving\
    \ the Problem\n\nTo solve Slot Machines, we know that we need a while loop, not\
    \ a for loop, because we can't predict the number of iterations in advance. Each\
    \ iteration of the loop will play the current slot machine. When the loop terminates,\
    \ Martha will have no quarters left, and we will output the number of times she\
    \ played.\n\nHere's what we need to do on each iteration:\n\n- Decrease Martha's\
    \ quarters by one (since it costs one quarter to play a slot machine).\n- If Martha\
    \ is currently on the first slot machine, play that machine. This involves increasing\
    \ the number of times this machine has been played. If this is the 35th play,\
    \ then pay Martha and reset the number of times that this machine has been played\
    \ to 0.\n- If Martha is currently on the second slot machine, play that machine\
    \ (similar to how we played the first machine).\n- If Martha is currently on the\
    \ third slot machine, play that machine (similar to how we played the first machine).\n\
    - Increase the number of Martha's plays (since we just played a machine).\n- Move\
    \ to the next machine. If Martha just played the first machine, we want to move\
    \ to the second; if she just played the second, we want to move to the third;\
    \ and if she just played the third, we want to cycle back to the first.\n\nOur\
    \ programs are getting longer now, so outlining the plan as I just did is a useful\
    \ technique for keeping the complexity under control and guiding us toward correct\
    \ code. We can use the outline to make sure we're following the plan and not forgetting\
    \ anything.\n\nOur code is in Listing 4-1.\n\n```\nquarters = int(input())\nfirst\
    \ = int(input())\nsecond = int(input())\nthird = int(input())\n```"
  mdcn: "我们没有字符串，也不知道需要多少次迭代。如果只有 `for` 循环，我们就会束手无策。\n\n这时就要用到 *while 循环*，这是 Python\
    \ 提供的最通用的循环结构。我们可以编写与字符串或整数序列无关的 `while` 循环。作为这种灵活性的代价，我们在编写循环时需要更加小心，并承担更多责任。让我们深入了解一下！\n\
    \n## while 循环\n\n要编写 `while` 循环，我们使用 Python 的 `while` 语句。`while` 循环由一个布尔表达式控制。如果布尔表达式为\
    \ `True`，Python 就会执行一次 `while` 循环的迭代。如果表达式仍然是 `True`，Python 就会再次执行迭代，如此往复，直到布尔表达式变为\
    \ `False`。如果布尔表达式一开始就是 `False`，那么循环根本不会运行。\n\n`while` 循环是 *不确定循环*：迭代次数可能事先未知。\n\
    \n## 使用 while 循环\n\n让我们从以下 `while` 循环示例开始：\n\n```\n>>> num = 0\n>>> while num\
    \ < 5:\n...     print(num)\n...     num = num + 1\n...\n0\n1\n2\n3\n4\n```\n\n\
    在 `for` 循环中，循环变量是为我们自动创建的；我们不必在循环前使用赋值语句来创建变量。但在 `while` 循环中，我们无法免费获得任何东西。如果需要一个变量在\
    \ `while` 循环中遍历值，我们就必须自己创建该变量。我们在这里通过在循环前让 `num` 引用 `0` 来做到这一点 ❶。\n\n`while` 循环本身由布尔表达式\
    \ `num < 5` 控制 ❷。如果 `num < 5` 为 `True`，则循环块中的代码将运行。现在，`num` 引用 `0`，所以布尔表达式为 `True`。因此我们运行循环块，输出\
    \ `0`，然后将 `num` 增加到 `1` ❸。\n\n我们跳回循环顶部，再次评估 `num < 5` 布尔表达式。由于 `num` 引用 `1`，表达式为\
    \ `True`。因此我们再次运行循环块，输出 `1`，然后将 `num` 增加到 `2`。\n\n回到循环顶部：`num < 5` 还是 `True` 吗？是的，因为\
    \ `num` 只有 `2`。这触发了循环的又一次迭代，输出 `2` 并将 `num` 增加到 `3`。\n\n这种模式继续，循环又迭代了两次：一次当 `num`\
    \ 引用 `3` 时，一次当 `num` 引用 `4` 时。当 `num` 引用 `5` 时，`num < 5` 布尔表达式最终变为 `False`，从而终止循环。\n\
