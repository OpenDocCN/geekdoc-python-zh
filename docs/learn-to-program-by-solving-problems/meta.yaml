    \ - positions[1]) / 2\nmin_size = left + right\n\nfor i in range(2, n - 1):\n\
    \    left = (positions[i] - positions[i - 1]) / 2\n    right = (positions[i +\
    \ 1] - positions[i]) / 2\n    size = left + right\n    if size < min_size:\n \
    \       min_size = size\n\nprint(min_size)\n```\n\n看起来像是一个线性时间算法，对吧？我的意思是，有一个线性时间的循环来读取输入❶，另一个线性时间的循环来找到最小大小❸。那么，这段代码是\
    \ $O(n)$ 吗？\n\n现在下结论还为时过早！原因是我们还没有考虑到我们对位置进行了排序❷。我们不能忽略这一点；我们需要了解排序的效率。正如我们将看到的，排序比线性时间慢。所以，既然排序是这里最慢的一步，无论排序的效率如何，它就是整体的效率。\n\
    \n程序员和计算机科学家已经设计了许多排序算法，这些算法大致可以分为两组。第一组包括需要 $O(n^2)$ 时间的算法。其中最著名的三种排序算法是冒泡排序、选择排序和插入排序。如果你愿意，可以自己了解更多关于这些排序算法的信息，但在这里我们不需要了解它们的任何细节。我们只需要记住\
    \ $O(n^2)$ 可能相当慢。例如，要对一个包含10,000个值的列表进行排序，一个 $O(n^2)$ 的排序算法大约需要 $10,000^2 = 100,000,000$\
