    \ = input().split()\n    strokes.append([int(stroke[0]), int(stroke[1])])\n\n\
    strokes.sort()\n\nrightmost_position = 0\n\nblue = 0\n\nfor stroke in strokes:\n\
    \    stroke_start = stroke[0]\n    stroke_end = stroke[1]\n    if stroke_start\
    \ <= rightmost_position:\n        if stroke_end > rightmost_position:\n      \
    \      blue = blue + stroke_end - rightmost_position\n            rightmost_position\
    \ = stroke_end\n    else:\n        blue = blue + stroke_end - stroke_start\n \
    \       rightmost_position = stroke_end\n\nprint(n - blue, blue)\n```\n\nListing\
    \ 10-2: Solving Ribbon Painting\n\nWe read each paint stroke, appending it as\
    \ a list of two values to our strokes list ❶. We then sort all of the paint strokes\
    \ ❷.\nWe next need to process each paint stroke from left to right. There are\
    \ two key variables that drive this processing: variable `rightmost_position`\
    \ stores the rightmost position that we have painted so far, and variable `blue`\
    \ stores the number of units that we have painted blue so far.\nTo process a paint\
    \ stroke, we need to know whether it starts before or after our stored rightmost\
    \ position. Let's think about each of these cases in turn.\nFirst: what do we\
    \ do when the paint stroke starts before our stored rightmost position ❸? This\
    \ paint stroke might give us some new blue units, but only if it extends past\
    \ our stored rightmost position. If it does, then the new"
  merge: -1
  pgno: 305
- img_proc: true
  md: 'blue units are those between the stored rightmost position and the ending position
    of the paint stroke ④.

    Second: what do we do when the paint stroke starts after our stored rightmost
    position ⑤? This time, the paint stroke is completely separate from the painting
    we have done so far; this entire paint stroke is a new blue segment. As such,
    the new blue units are those between the ending position and starting position
    of this paint stroke ⑥.

    Notice in each case that we also correctly update our stored rightmost position
    so that we’re ready to process any further paint strokes.

    That’s a wrap! Guided by our big O analysis, we were able to dismiss an algorithm
    whose implementation we knew would be too slow. We then thought about a second
    algorithm—and before implementing it, we knew it would be plenty fast. It’s time
    to submit our code to the judge and bask in our success.


    # Summary


    In this chapter, we learned about big O analysis. Big O is an important efficiency
    building block for further study of algorithm design. You’ll see it everywhere:
    in tutorials, in books, probably in your next job interview!

    We also solved two problems where we needed to design very efficient algorithms.
    Not only were we able to do that, but we were also able to use big O to obtain
    a satisfying understanding of exactly why our code was so efficient.


    # Chapter Exercises


    Here are some exercises for you to try. For each, use big O to determine whether
    your proposed algorithm is efficient enough to solve the problem within the time
    limit. You might also like to implement algorithms that you know are going to
    be too slow. That would give you extra practice solidifying your Python knowledge
    and confirm that your big O analysis was spot-on!

    Some of these problems are quite challenging. There are two reasons. First, you
    might agree based on your work throughout the book that coming up with *any* algorithm
    can be tough. Coming up with a faster algorithm can be even tougher. Second, this
    is the end of our time together, but only the beginning of the study of algorithms.
    I hope that these problems both help you appreciate what you’ve accomplished and
    offer evidence that there’s a lot more beyond this book if you want it.


    +   1. DMOJ problem dmopc17c1p1, Fujo Neko (The problem talks about using fast
    input/output. Don’t ignore that!)

    2. DMOJ problem coci10c1p2, Profesor

    3. DMOJ problem coci19c4p1, Pod starim krovovima (Hint: to maximize the number
    of empty glasses, you want to put as much liquid as possible in the biggest glasses.)

    4. DMOJ problem dmopc20c1p2, Victor’s Moral Dilemma'
  merge: -1
  pgno: 306
- img_proc: true
  md: '+   5. DMOJ problem avocadotrees, Avocado Trees!

    6. DMOJ problem coci11c5p2, Eko (Hint: the maximum number of trees is far fewer
    than the maximum number of heights. Consider each tree from tallest to shortest.)

    7. DMOJ problem wac6p2, Cheap Christmas Lights (Hint: don''t try flipping a switch
    each second—how would you know which one to flip? Instead, store them up, and
    use them all as soon as you can shut off all the lights that are on.)

    8. DMOJ problem ioi98p3, Party Lamps (Hint: all that matters for each button is
    whether it is pressed an even or odd number of times.)


    # Notes


    Longest Scarf is originally from the DMOPC ''14 March Contest. Ribbon Painting
    is originally from the DMOPC ''20 November Contest.'
