    \ lst, False otherwise.\n    \"\"\"\n    if 'jack' in lst:\n        return False\n\
    \    if 'queen' in lst:\n        return False\n    if 'king' in lst:\n       \
    \ return False\n    if 'ace' in lst:\n        return False\n    return True\n\n\
    deck = []\n\n② for i in range(NUM_CARDS):\n    deck.append(input())\n\nscore_a\
    \ = 0\nscore_b = 0\nplayer = 'A'\n\n③ for i in range(NUM_CARDS):\n    card = deck[i]\n\
    \    points = 0\n    remaining = NUM_CARDS - i - 1\n    if card == 'jack' and\
    \ remaining >= 1 and no_high(deck[i+1:i+2]):\n        points = 1\n    elif card\
    \ == 'queen' and remaining >= 2 and no_high(deck[i+1:i+3]):\n        points =\
    \ 2\n    elif card == 'king' and remaining >= 3 and no_high(deck[i+1:i+4]):\n\
    \        points = 3\n```"
