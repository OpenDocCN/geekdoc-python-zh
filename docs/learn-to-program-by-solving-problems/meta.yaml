  md: "Let's get a feel for how we can implement this function by working through\
    \ an example. Here's the list of endpoints we'll use:\n\n```\n[[1, 6],\n [9, 25],\n\
    \ [32, 36]]\n```\n\nThe first box has a right endpoint of height 6. So, the second\
    \ box better have a left endpoint of height 6 or more. If it doesn't, then we\
    \ return False indicating that the endpoints are not in order. But we're good\
    \ here, because the second box has a left endpoint of height 9.\n\nNow we repeat\
    \ that check using 25, the right endpoint of the second box. The left endpoint\
