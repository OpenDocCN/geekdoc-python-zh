    uppercase:


    ```

    >>> ''q''.isupper()

    False

    >>> ''Q''.isupper()

    True

    ```


    We can use isupper in an if statement to control what happens on each iteration
    of a for loop:


    ```

    >>> title = ''The Escape''

    >>> for char in title:

    ...     if char.isupper():

    ...         print(char)

    ...

    T

    E

    ```


    Be careful with the indentation here. We need one level of indentation for the
    for loop, and an extra level of indentation for the nested if statement.

    On the first iteration, char refers to ''T''. Since ''T'' is uppercase, the isupper
    test returns True, and the if statement block runs. That results in the output
    of T. On the second iteration, char refers to ''h''. This time, the isupper test
    returns False, so the if statement block doesn''t run. Overall, the for loop loops
    through each character of the string, but the nested if statement fires only twice:
    on the ''T'' at the beginning of the string and on the ''E'' at the beginning
    of ''Escape''.

    What about a for loop nested in a for loop? We can do that! Here''s an example:


    ```

    >>> letters = ''ABC''

    >>> digits = ''123''

    >>> for letter in letters:

    ...     for digit in digits:

    ...         print(letter + digit)

