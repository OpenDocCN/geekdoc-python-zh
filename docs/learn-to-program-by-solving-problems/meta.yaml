    \ `answer`；否则，我们应该输出 `ignore`。\n\n如果第一位数字不是 8 也不是 9，那么该电话号码不属于电话推销员。或者，如果第四位数字不是\
    \ 8 也不是 9，那么该电话号码不属于电话推销员。或者，如果第二位和第三位数字不相等，那么该电话号码不属于电话推销员。如果这些表达式中有一个为 `True`，那么该电话号码就不属于电话推销员。\n\
    \n代码清单 2-3 展示了捕获此逻辑的代码版本。\n\n```\nnum1 = int(input())\nnum2 = int(input())\nnum3\
