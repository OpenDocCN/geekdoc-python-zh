  md: 'Both of these functions are in the bisect module. Let’s import them:


    ```

    >>> from bisect import bisect_left, bisect_right

    ```


    Let’s first discuss bisect_left. We call it by providing a sorted list (from low
    to high) and a value x. It returns to us the index of the leftmost value in the
    list that’s greater than or equal to x.

    If the value is in the list, we get the index of its leftmost occurrence:


    ```

    >>> bisect_left([10, 50, 80, 80, 100], 10)

    0

    >>> bisect_left([10, 50, 80, 80, 100], 80)

    2

    ```


    If the value isn’t in the list, then we get the index of the first value that’s
    greater:


    ```

    >>> bisect_left([10, 50, 80, 80, 100], 15)

    1

    >>> bisect_left([10, 50, 80, 80, 100], 81)

    4

    ```


    If we search for something that’s greater than every value in the list, we get
    the list’s length:


    ```

    >>> bisect_left([10, 50, 80, 80, 100], 986)

    5

    ```


    Let’s use bisect_left on our list of seven positions from “Sorting First” earlier
    in this chapter. We’ll find the index of the leftmost position that’s greater
    than or equal to 16:


    ```

    >>> positions = [1, 6, 11, 14, 16, 18, 23]

    >>> bisect_left(positions, 16)

    4

    ```


    Perfect: that’s exactly what we need to replace the first while loop in Listing
    9-6.

    To replace the second while loop, we’ll use bisect_right rather than bisect_left.
    We call bisect_right just as we called bisect_left : with a sorted list and a
    value x. Rather than returning the index of the leftmost value in the list that’s
    greater than or equal to x, it returns the index of the leftmost value that’s
    greater than x.

    Let’s compare bisect_left and bisect_right. For a value that’s in the list, bisect_right
    returns an index greater than that returned by bisect_left:


    ```

    >>> bisect_left([10, 50, 80, 80, 100], 10)

    0

    >>> bisect_right([10, 50, 80, 80, 100], 10)

    1

    ```'
