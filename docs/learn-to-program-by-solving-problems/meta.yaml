  mdcn: "我们的第一次涂色将14 – 4 = 10个单位涂成蓝色。现在我们存储的最右位置是14。\n\n我们的第二次涂色将12个单位涂成蓝色，没错，但这12个单位中有多少是从紫色变为蓝色的呢？毕竟，它与前一次涂色重叠，因此其中一些单位已经是蓝色的了。我们可以通过从16（当前涂色的结束位置）中减去14（我们存储的最右位置）来计算新的蓝色单位数量。这就是我们忽略已被前次涂色涂成蓝色的单位的方法。因此，有16\
    \ – 14 = 2个新的蓝色单位，总共12个蓝色单位。关键的是，我们无需处理这次涂色的每个单位就得出了这个结果。在继续之前，别忘了将我们存储的最右位置更新为16。\n\
