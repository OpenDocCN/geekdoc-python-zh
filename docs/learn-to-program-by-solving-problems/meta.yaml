    Our ribbon''s length is 20, and there are four paint strokes. How much of the
    ribbon do our paint strokes turn blue?

    The first paint stroke paints one unit blue, the one that starts at position 18.

    The second paint stroke paints the units of ribbon starting at positions 4, 5,
    6, 7, and so on, all the way up to position 15. That''s 12 units painted blue
    by this stroke, and 13 blue units in total.

    The third paint stroke paints 10 units blue. But all of those units are already
    blue from the second paint stroke! It would be a colossal waste of time indeed
    if we spent time “painting” anything with this paint stroke. Whatever algorithm
    we come up with better not fall into this time-wasting trap.

    The fourth paint stroke paints 7 units blue. But again: all of these units are
    already blue!

    Now we''re done painting, and we have 13 blue units. There are 20 – 13 = 7 remaining
    purple units, so the correct output for this test case is:


    ```

    7 13

    ```


    # Solving the Problem


    The maximum length of the ribbon is 100,000, and the maximum number of paint strokes
    is 100,000. Recall algorithm 1 from when we solved Longest Scarf, where we learned
    that an *O(mn)* algorithm was too slow with these bounds. Similarly, here, an
    *O(nq)* algorithm would be inadequate, as it would not finish within the time
    limit on large test cases.

    This means that we cannot afford to process each unit that is painted by each
    paint stroke. It would be nice if we could more easily focus on only the *new*
    units that are painted blue by a paint stroke. Then we could go through each paint
    stroke and add up the number of blue units that it contributes.

    Fair enough, but how can we determine the contribution of each paint stroke? That''s
    tricky, because bits and pieces of the next paint stroke may have already been
    painted blue by previous paint strokes.

    This situation is made much simpler, however, if we sort the paint strokes first.
    Remember from “n log n Time” earlier in this chapter that sorting is extremely
    fast, taking only *O(n log n)* time. There''s no efficiency concern in using sorting,
    so let''s understand why sorting helps us here.

    Sorting the paint strokes from the test case in the prior section gives us the
    following list of paint strokes:


    ```

    4 14

    4 16

    5 12

    18 19

    ```


    Now that the paint strokes are sorted, we can efficiently process them. As we
    do so, we''ll store the rightmost position of any paint stroke that we''ve processed
    so far. We''ll start this rightmost position off at 0 to indicate that we haven''t
    painted anything.'
- md: "Our first paint stroke paints 14 – 4 = 10 units blue. Now our stored rightmost\
    \ position is 14.\n\nOur second paint stroke paints 12 units blue, yes, but how\
    \ many of those 12 does it turn from purple to blue? After all, it overlaps the\
    \ previous paint stroke, so some of these units were blue already. We can calculate\
    \ the number of new blue units by subtracting 14, our stored rightmost position,\
    \ from 16, the ending position of the current paint stroke. This is how we ignore\
    \ the units already painted blue by previous paint strokes. So, there are 16 –\
    \ 14 = 2 new blue units and 12 blue units in total. Crucially, we just figured\
    \ this out without processing the individual units of this paint stroke. Before\
    \ we continue, don’t forget to update our stored rightmost position to 16.\n\n\
    Our third paint stroke is like the second in that it starts prior to our stored\
    \ rightmost position. Unlike the second paint stroke, however, its ending position\
    \ does not extend past our stored rightmost position at all. So, this paint stroke\
    \ adds no new blue units, and our stored rightmost position is still 16. Again,\
    \ we figured this out without grinding through each of this paint stroke’s positions!\n\
    \nBe careful with the fourth paint stroke. It does *not* add 19 – 16 = 3 new blue\
    \ units. We have to treat this paint stroke differently because its starting position\
    \ is to the right of our stored rightmost position. In this case, we don’t use\
    \ the stored rightmost position at all, calculating instead 19 – 18 = 1 new blue\
    \ unit, and 13 blue units in total. We also update our stored rightmost position\
    \ to 19.\n\nThe only question is how we sort the paint strokes in our Python code.\
    \ We need to sort them by their starting position; if multiple paint strokes have\
    \ the same starting position, then we want to sort those by their ending position.\n\
    \nThat is, we want to take a list like this:\n\n```\n[[18, 19], [4, 16], [4, 14],\
    \ [5, 12]]\n```\n\nand produce this:\n\n```\n[[4, 14], [4, 16], [5, 12], [18,\
    \ 19]]\n```\n\nHappily, the list sort method works in exactly this way. When given\
    \ a list of lists, sort sorts using the first values in each list; when those\
    \ values are tied, the lists are further sorted using the second values. Check\
    \ it out:\n\n```\n>>> strokes = [[18, 19], [4, 16], [4, 14], [5, 12]]\n>>> strokes.sort()\n\
    >>> strokes\n[[4, 14], [4, 16], [5, 12], [18, 19]]\n```\n\nAlgorithm: check. Sorting:\
    \ check. We’re in great shape! Just one more thing we’d like to know before we\
    \ see the code: what will be its big O efficiency? We need to read the *q* queries;\
    \ that takes *O(q)* time. Then we need to sort the queries; that takes *O(q log\
    \ q)* time. Finally, we need to process the queries; that takes $O(q)$ time. The\
    \ slowest of these is the $O(q \\log q)$ time for the sorting, so that's our overall\
    \ big O efficiency.\n\nNow we have everything we need for a speedy solution. Check\
    \ it out in Listing 10-2.\n\n```\nlst = input().split()\nn = int(lst[0])\nq =\
    \ int(lst[1])\n\nstrokes = []\n\nfor i in range(q):\n    stroke = input().split()\n\
    \    strokes.append([int(stroke[0]), int(stroke[1])])\n\nstrokes.sort()\n\nrightmost_position\
    \ = 0\n\nblue = 0\n\nfor stroke in strokes:\n    stroke_start = stroke[0]\n  \
    \  stroke_end = stroke[1]\n    if stroke_start <= rightmost_position:\n      \
    \  if stroke_end > rightmost_position:\n            blue = blue + stroke_end -\
    \ rightmost_position\n            rightmost_position = stroke_end\n    else:\n\
    \        blue = blue + stroke_end - stroke_start\n        rightmost_position =\
    \ stroke_end\n\nprint(n - blue, blue)\n```\n\nListing 10-2: Solving Ribbon Painting\n\
    \nWe read each paint stroke, appending it as a list of two values to our strokes\
    \ list ❶. We then sort all of the paint strokes ❷.\n\nWe next need to process\
    \ each paint stroke from left to right. There are two key variables that drive\
    \ this processing: variable `rightmost_position` stores the rightmost position\
    \ that we have painted so far, and variable `blue` stores the number of units\
    \ that we have painted blue so far.\n\nTo process a paint stroke, we need to know\
    \ whether it starts before or after our stored rightmost position. Let's think\
    \ about each of these cases in turn.\n\nFirst: what do we do when the paint stroke\
    \ starts before our stored rightmost position ❸? This paint stroke might give\
    \ us some new blue units, but only if it extends past our stored rightmost position.\
    \ If it does, then the new blue units are those between the stored rightmost position\
    \ and the ending position of the paint stroke ④.\n\nSecond: what do we do when\
    \ the paint stroke starts after our stored rightmost position ⑤? This time, the\
    \ paint stroke is completely separate from the painting we have done so far; this\
    \ entire paint stroke is a new blue segment. As such, the new blue units are those\
    \ between the ending position and starting position of this paint stroke ⑥.\n\n\
    Notice in each case that we also correctly update our stored rightmost position\
    \ so that we’re ready to process any further paint strokes.\n\nThat’s a wrap!\
    \ Guided by our big O analysis, we were able to dismiss an algorithm whose implementation\
    \ we knew would be too slow. We then thought about a second algorithm—and before\
    \ implementing it, we knew it would be plenty fast. It’s time to submit our code\
    \ to the judge and bask in our success.\n\n## Summary\n\nIn this chapter, we learned\
    \ about big O analysis. Big O is an important efficiency building block for further\
