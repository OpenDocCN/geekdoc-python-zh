    ```


    We might also want to access the value associated with each key, and we can do
    that by using each key as an index in the dictionary. Here''s a loop that accesses
    both the key and its value:


    ```

    >>> for word in d:

    ...     print(''key'', word, ''has value'', d[word])

    ...

    key cut has value 4

    ```'
