    \ 3.9.2 (default, Feb 20 2021, 20:57:50)\n[GCC 7.5.0] on linux\nType \"help\"\
    , \"copyright\", \"credits\" or \"license\" for more information.\n>>>\n```\n\n\
    What's important here is that you see a Python version of at least 3.6 in the\
