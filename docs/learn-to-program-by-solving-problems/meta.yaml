    \ range any worse. It might even make the range better, since it’s now one unit\
    \ closer to any hill whose height is 83 or less.\n\nWe started with range 84–101\
    \ and showed that range 83–100 is at least as good. We can make this same argument\
    \ for range 85–102, 86–103, and so on. There’s no point going any higher than\
    \ 83–100!\n\nBefore continuing, you might like to try solving exercises 1 and\
    \ 2 from “Chapter Exercises” on page 263.\n\n## Problem #23: Cow Baseball\n\n\
    To end this chapter, I’ve chosen a problem where we’ll need to bump up our algorithm\
    \ design skills beyond complete search. As you read the problem, notice that there’s\
    \ not all that much input. That generally signals the effectiveness of a complete-search\
    \ algorithm. But not this time, because of the amount of searching that such an\
    \ algorithm has to do through this input. The difficulty boils down to having\
    \ too many nested loops. Why do the nested loops bite us here? What can we do\
    \ about it? Read on!\n\nThis is USACO 2013 December Bronze Contest problem Cow\
    \ Baseball.\n\n## The Challenge\n\nFarmer John has *n* cows. They are standing\
    \ in a row, each at a distinct integer position. They are having fun throwing\
    \ a baseball around.\n\nFarmer John is watching the antics. He observes that cow\
    \ *x* throws the ball to some cow *y* to its right, and then that cow *y* throws\
    \ the ball to some cow *z* to its right. He also knows that the distance of the\
    \ second throw is at least the distance of the first throw and at most twice the\
    \ distance of the first throw. (For example, if the first throw is distance 5,\
    \ then the second throw is at least distance 5 and at most distance 10.)\n\nDetermine\
    \ the number of (*x*, *y*, *z*) triples of cows that satisfy Farmer John’s observations.\n\
    \n## Input\n\nRead input from the file named *baseball.in*.\n\nThe input consists\
    \ of the following lines:\n\n- A line containing *n*, the number of cows. *n*\
    \ is between 1 and 1,000.\n- *n* lines, each of which gives the position of a\
    \ cow. All positions are unique, and each is between 1 and 100,000,000.\n\n##\
    \ Output\n\nWrite output to the file named *baseball.out*.\nOutput the number\
    \ of triples of cows that satisfy Farmer John's observations.\nThe time limit\
    \ for solving each test case is four seconds.\n\n## Using Three Nested Loops\n\
    \nWe can use three nested loops to consider all possible triples. We'll start\
    \ by looking at the code and then discuss its efficiency.\n\n## The Code\n\nIn\
    \ \"Nesting\" in Chapter 3, we learned that we can loop through all pairs of values\
    \ using two nested loops. Doing so looks like this:\n\n```python\n>>> lst = [1,\
    \ 9]\n>>> for num1 in lst:\n...     for num2 in lst:\n...         print(num1,\
    \ num2)\n...\n1 1\n1 9\n9 1\n9 9\n```\n\nWe can similarly loop through all triples\
    \ of values using three nested loops, like this:\n\n```python\n>>> for num1 in\
    \ lst:\n...     for num2 in lst:\n...         for num3 in lst:\n...          \
    \   print(num1, num2, num3)\n...\n1 1 1\n1 1 9\n1 9 1\n1 9 9\n9 1 1\n9 1 9\n9\
    \ 9 1\n9 9 9\n```\n\nUsing three nested loops like this gives us a starting point\
    \ for solving the Cow Baseball problem. For each triple, we can check whether\
    \ it matches Farmer John's observations. See Listing 9-5 for the code.\n\n```python\n\
    input_file = open('baseball.in', 'r')\noutput_file = open('baseball.out', 'w')\n\
