    \ $x$ 是 10，而 Pero 当前有 30MB 可用，那么下一个数字最多为 30。）\n\n### 输出\n\n输出下个月可用的兆字节数。\n\n###\
    \ 循环读取输入\n\n到目前为止，在我们所有的问题中，我们都知道确切需要从输入读取多少行。例如，在“三个杯子”问题中，我们读取一行；在“占用停车位”问题中，我们读取三行。而在这里的“数据套餐”问题中，我们事先不知道要读取多少行，因为它取决于我们从第二行读取的数字。\n\
    \n我们可以读取输入的第一行：\n\n```\nmonthly_mb = int(input())\n```\n\n（我使用了变量名 `monthly_mb`\
    \ 而不是 `x`，以赋予它一些含义。）\n\n我们可以读取输入的第二行：\n\n```\nn = int(input())\n```\n\n但没有循环，我们就无法读取更多内容。`range`\
    \ 循环在这里非常合适，因为我们可以用它来精确循环 $n$ 次：\n\n```\nfor i in range(n):\n    # 处理月份\n```\n\
    \n### 解决问题\n\n我解决这个问题的策略是跟踪从前几个月结转的兆字节数。我称之为 *剩余量*。\n\n考虑这个测试用例：\n\n```\n10\n\
