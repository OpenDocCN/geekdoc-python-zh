    like. If the input should be interpreted as an integer, we need to convert the
    string to an integer. If the input should be interpreted as a float, we need to
    convert the string to a float. And if the input should be interpreted as four
    floats? Well, then we had better split it up into individual floats before converting
    anything!


    The string split method splits a string into a list of its pieces. By default,
    split splits around spaces, which is exactly what we need for our four floats:


    ```

    >>> s = ''0.2 0.08 0.4 0.32''

    >>> s.split()

    [''0.2'', ''0.08'', ''0.4'', ''0.32'']

    ```


    The split method returns a list of strings, at which point we can access each
    one independently. Here, I save the list that split returns and then access two
    of its values:


    ```

    >>> proportions = s.split()

