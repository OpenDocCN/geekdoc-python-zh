    \     songs = songs[1] + songs[0] + songs[2:]\n\noutput = ''\nfor song in songs:\n\
    \    output = output + song + ' '\nprint(output[:-1])\n```\n\nListing 4-3: Solving\
    \ Song Playlist\n\nThe while loop continues as long as button 4 hasn't been pressed\
