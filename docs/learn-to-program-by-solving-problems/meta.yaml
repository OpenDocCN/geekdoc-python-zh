    \ of students. For the students who are not accounted for, we are to add them\
    \ to the year with the most students. It's guaranteed that exactly one year will\
    \ have the most students (there won't be a tie between multiple years).\n\nWe'll\
    \ first solve the problem ignoring this catch. Then we'll incorporate the catch\
    \ to give us a full solution.\n\n### Splitting Strings and Joining Lists\n\nThe\
    \ second line of each test case consists of four proportions, like this:\n\n```\n\
    0.2 0.08 0.4 0.32\n```\n\nWe need a way to extract those four numbers from a string\
    \ for further processing. We'll learn about the string split method for splitting\
    \ a string into a list of its pieces. While we're at it, we'll also learn about\
    \ the string join method, which lets us go the other way and collapse a list into\
    \ a single string.\n\n### Splitting a String into a List\n\nRemember that the\
    \ input function returns a string, no matter what the input looks like. If the\
    \ input should be interpreted as an integer, we need to convert the string to\
    \ an integer. If the input should be interpreted as a float, we need to convert\
    \ the string to a float. And if the input should be interpreted as four floats?\
    \ Well, then we had better split it up into individual floats before converting\
    \ anything!\n\nThe string split method splits a string into a list of its pieces.\
    \ By default, split splits around spaces, which is exactly what we need for our\
    \ four floats:\n\n```\n>>> s = '0.2 0.08 0.4 0.32'\n>>> s.split()\n['0.2', '0.08',\
    \ '0.4', '0.32']\n```\n\nThe split method returns a list of strings, at which\
    \ point we can access each one independently. Here, I save the list that split\
    \ returns and then access two of its values:\n\n```\n>>> proportions = s.split()\n\
    >>> proportions\n['0.2', '0.08', '0.4', '0.32']\n>>> proportions[1]\n'0.08'\n\
    >>> proportions[2]\n'0.4'\n```\n\nData in the wild is often comma-separated rather\
    \ than space-separated. Piece of cake: we can call split with an argument that\
    \ tells it what to use as a separator:\n\n```\n>>> info = 'Toronto,Ontario,Canada'\n\
    >>> info.split(',')\n['Toronto', 'Ontario', 'Canada']\n```\n\n### Joining a List\
    \ into a String\n\nTo go the other way, from a list to a string rather than a\
    \ string to a list, we can use the string join method. The string on which join\
    \ is called is used as the separator between list values. Here are two examples:\n\
    \n```\n>>> lst = ['Toronto', 'Ontario', 'Canada']\n>>> ','.join(lst)\n```\n\n\
    ```\n>>> '**'.join(lst)\n'Toronto**Ontario**Canada'\n```\n\nTechnically, join\
    \ can join the values in any sequence, not just in a list. Here's an example of\
    \ joining the characters from a string:\n\n```\n>>> '*'.join('abcd')\n'a*b*c*d'\n\
    ```\n\n### Changing List Values\n\nWhen we use split on a string of four pieces,\
    \ we get a list of strings:\n\n```\n>>> s = '0.2 0.08 0.4 0.32'\n>>> proportions\
