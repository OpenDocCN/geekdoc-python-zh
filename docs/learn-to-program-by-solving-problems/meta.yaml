    >>> s.remove(4)\n>>> s\n{8, 2, 6}\n>>> s.remove(8)\n>>> s\n{2, 6}\n>>> s = {2,\
    \ 6}\n>>> s.remove(8)\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nKeyError: 8\n```\n\n## 概念检查\n\n使用 `help` 来了解集合的 `update`\
    \ 和 `intersect` 方法。\n\n以下代码中 `print` 调用的输出是什么？\n\n```python\ns1 = {1, 3, 5, 7,\
    \ 9}\ns2 = {1, 2, 4, 6, 8, 10}\ns3 = {1, 4, 9, 16, 25}\ns1.update(s2)\ns1.intersection(s3)\n\
