- md: "A final use case for a while loop on a string: stopping at the first index\
    \ that meets some criterion.\n\nThe strategy is to use the Boolean and operator\
    \ to continue while there are more characters to check and we haven't yet met\
    \ our criterion. For example, here is how we can find the index of the first 'y'\
    \ in a string:\n\n```\n>>> i = 0\n>>> while i < len(s) and s[i] != 'y':\n... \
    \    i = i + 1\n...\n>>> print(i)\n4\n```\n\nIf there's no 'y' anywhere in the\
    \ string, the loop stops when i equals the string length:\n\n```\n>>> s = 'breeze'\n\
    >>> i = 0\n>>> while i < len(s) and s[i] != 'y':\n...     i = i + 1\n...\n>>>\
    \ print(i)\n6\n```\n\nWhen i refers to 6, the first operand of and is False, so\
    \ the loop terminates. You might wonder why the second operand of and doesn't\
    \ cause an error here, since index 6 is not a valid index in the string. The reason\
    \ is that the Boolean operators use short-circuiting evaluation, which means that\
    \ they stop evaluating their operands if the result of the operator is already\
    \ known. For and, if the first operand is False, then we know that, no matter\
    \ what the second operand is, and will return False; Python therefore doesn't\
    \ evaluate the second operand. Similarly, for or, if the first operand is True,\
    \ then or is guaranteed to return True, so Python doesn't evaluate the second\
    \ operand.\n\n## Solving the Problem\n\nNow we know how to use a while loop to\
    \ loop through a string.\n\nFor Secret Sentence, we need to do something different\
    \ depending on whether we're looking at a vowel or a nonvowel. If we're looking\
    \ at a vowel, then we need to copy the character and jump ahead by three characters\
    \ (to skip over the p and the second occurrence of this vowel). If we're looking\
    \ at a nonvowel, then we need to copy the character and move to the next character.\
    \ So, we always copy the current character but then move by three or one based\
    \ on whether the current character is a vowel. We can use an if statement inside\
    \ the while loop to make this decision for each character that we see.\n\nA solution\
    \ for Secret Sentence is in Listing 4-4.\n\n```\nsentence = input()\n\nresult\
    \ = ''\ni = 0\n\nwhile i < len(sentence):\n    result = result + sentence[i]\n\
    \    if sentence[i] in 'aeiou':\n        i = i + 3\n    else:\n        i = i +\
    \ 1\n\nprint(result)\n```\n\nListing 4-4: Solving Secret Sentence\n\nThe result\
    \ variable ❶ is used to build the original sentence, one character at a time.\n\
    The while loop’s Boolean expression is the standard one for looping until we reach\
    \ the end of a string ❷. In that loop, we first concatenate the current character\
    \ to the end of the result. Then we check whether the current character is a vowel\
    \ ❸. Recall from “Relational Operators” in Chapter 2 that the in operator can\
    \ be used to check whether the first string occurs in the second. If the current\
    \ character is found in the string of vowels, we jump ahead by three characters;\
    \ if not, we move to the next character.\nOnce the loop terminates, we have gone\
    \ through the entire encoded sentence and copied the correct characters into result.\
    \ The last thing to do is therefore to output this variable.\nYou’re ready to\
    \ submit our code to the judge. Grepeapat wopork!\n\n## break and continue\n\n\
    In this section, I’ll show you two other loop keywords that Python supports: break\
    \ and continue. It’s my experience that introducing these keywords leads learners\
    \ to overuse them to the detriment of the clarity of their loops, so I’ve decided\
    \ to avoid them elsewhere in the book. Nonetheless, they are occasionally useful,\
    \ and you’re likely to see them in other Python code, so let’s have a brief discussion.\n\
    \n## break\n\nThe break keyword immediately terminates a loop, no questions asked.\n\
    Back when we solved Song Playlist, we used a while loop that looped while the\
    \ button was not 4. We could also solve that problem using break; see Listing\
    \ 4-5 for the code.\n\n```\nsongs = 'ABCDE'\n\nwhile True:\n    button = int(input())\n\
    \    if button == 4:\n        break\n    presses = int(input())\n    for i in\
    \ range(presses):\n        if button == 1:\n            songs = songs[1:] + songs[0]\n\
    \        elif button == 2:\n            songs = songs[-1] + songs[:-1]\n     \
    \   elif button == 3:\n            songs = songs[1] + songs[0] + songs[2:]\n\n\
    output = ''\nfor song in songs:\n    output = output + song + ' '\n\nprint(output[:-1])\n\
    ```\n\nListing 4-5: Solving Song Playlist using break\n\nThe loop's Boolean expression\
    \ ① looks suspicious: True is always True, so at first glance it seems that this\
    \ loop never terminates. (That's the downside to break. We can't just look at\
    \ the Boolean expression to understand what must happen for the loop to terminate.)\
    \ But it can terminate, because of our use of break. If button 4 is pressed ②,\
    \ then we hit a break ③, which terminates the loop.\n\nLet's see one more example\
    \ of using break. In \"while Loops Through Indices\" in this chapter, we wrote\
    \ code to find the index of the first 'y' in a string. Here's how that looks using\
    \ break:\n\n```\n>>> s = 'zephyr'\n>>> i = 0\n>>> while i < len(s):\n...     if\
    \ s[i] == 'y':\n...         break\n...     i = i + 1\n...\n>>> print(i)\n4\n```\n\
    \nAgain, notice that the loop's Boolean expression is misleading: it suggests\
    \ that the loop always runs until the end of the string, but further scrutiny\
    \ reveals that a break is lurking and can influence termination.\n\nA break terminates\
    \ only its own loop, not any outer loops. Here's an example:\n\n```\n>>> i = 0\n\
    >>> while i < 3:\n...     j = 10\n...     while j <= 50:\n...         print(j)\n\
    ...         if j == 30:\n...             break\n...         j = j + 10\n...  \
    \   i = i + 1\n...\n10\n20\n30\n10\n20\n30\n10\n20\n30\n```\n\nNotice how the\
    \ break ① cuts the j loop short. But it doesn't affect the i loop: there are three\
    \ iterations of that loop, exactly as there would be without the break ①.\n\n\
    ## continue\n\nThe continue keyword ends the current iteration of the loop without\
    \ running any more of its code. Unlike break, it does not end the loop altogether.\
    \ If the loop condition is True, then further iterations of the loop occur.\n\
    Here's an example that uses continue to print each vowel and its index in a string:\n\
    \n```\n>>> s = 'zephyr'\n>>> i = 0\n>>> while i < len(s):\n① ...     if not s[i]\
    \ in 'aeiou':\n...         i = i + 1\n② ...         continue\n③ ...     print(s[i],\
    \ i)\n...     i = i + 1\n...\ne 1\n```\n\nIf the current character is not a vowel\
    \ ①, then we don't want to print it. So, we increase i by 1 to take us past this\
    \ character and then use continue ② to end the current iteration. If we get below\
    \ the if statement ③, then it must mean that we're looking at a vowel (otherwise\
    \ continue would have prevented us from getting here). We therefore output that\
    \ character and increase i by 1 to take us past this character.\n\nThe continue\
    \ keyword is enticing because it seems to give us a way to get us out of an iteration\
    \ that we don't want to be in. “This isn't a vowel. I'm out of here!” But an if\
    \ statement can also be used to obtain the same behavior, and the logic is often\
    \ clearer:\n\n```\n>>> s = 'zephyr'\n>>> i = 0\n>>> while i < len(s):\n...   \
    \  if s[i] in 'aeiou':\n...         print(s[i], i)\n...     i = i + 1\n...\ne\
    \ 1\n```\n\nRather than skip the iteration when the current character is not a\
    \ vowel, the if statement processes it when it is a vowel.\n\n## Summary\n\nThe\
    \ unifying feature of the problems in this chapter is that we don't know in advance\
    \ how many iterations of a loop will be required.\n\n- **Slot Machines** The number\
    \ of iterations depends on the initial number of quarters and the payouts of the\
    \ slot machines.\n- **Song Playlist** The number of iterations depends on how\
    \ many buttons were pressed.\n- **Secret Sentence** The number of iterations,\
    \ and what to do on each iteration, depends on where vowels are located in a string.\n\
    \nWhen the number of iterations is unknown, we turn to the while loop, which runs\
    \ as long as needed. Using a while loop is more error-prone than code that uses\
    \ a for loop. It's also more flexible, as we are freed from the for loop constraint\
    \ of systematically looping through a sequence.\n\nIn the next chapter, we'll\
    \ learn about lists, which allow us to store large amounts of numeric or string\
    \ data. And how do you suppose we'll process all of that data? Yes: loops! Practice\
    \ the following exercises to hone your loop skills. You'll be using them a lot\
    \ when we solve problems using lists.\n\n## Chapter Exercises\n\nYou now have\
    \ three types of loops at your disposal: for loops, range for loops, and while\
    \ loops. Part of the challenge of solving problems using loops is knowing which\
    \ loop to use! For each of the following exercises, experiment with using different\
    \ types of loops to arrive at the solution that you like best."
