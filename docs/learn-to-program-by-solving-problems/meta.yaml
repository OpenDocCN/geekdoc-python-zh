    \ / 2 = 128个值。经过三步之后，剩下128 / 2 = 64个值。继续下去，四步后我们有32个值，五步后有16个值，六步后有8个值，七步后有4个值，八步后有2个值，九步后我们只有1个值。\n\
    \n九步——仅此而已！这比使用线性搜索最多需要512步要好得多。二分搜索所做的工作远少于线性时间算法。但它是什么类型的算法呢？它不是常数时间：虽然它只需要很少的步骤，但随着输入量的增加，步骤数确实会略有增加。\n\
    \n二分搜索是*对数时间*算法的一个例子。在大O表示法中，我们说对数时间算法是 *O(log n)*。\n\n对数时间指的是数学中的对数函数。给定一个数字，这个函数告诉你需要将该数字除以一个基数多少次才能得到1或更小。我们在计算机科学中通常使用的基数是2，所以我们寻找的是需要将一个数字除以2多少次才能得到1或更小。例如，将512除以2九次才能得到1。我们将其写作\
    \ log₂ 512 = 9。\n\n对数函数是指数函数的反函数，后者可能你更熟悉。计算 log₂ 512 的另一种方法是找到幂 *p*，使得 2ᵖ = 512。因为\
