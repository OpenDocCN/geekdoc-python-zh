    \    min_size = size\n\nprint(min_size)\n```\n\n代码清单 5-2：使用巨大初始值解决村庄邻域问题\n\n注意！现在我们需要从索引\
    \ 1 开始计算大小 ❶（而不是 2）；否则，我们会忘记包含索引为 1 的村庄的邻域。\n\n## 构建大小列表\n\n避免代码重复的另一种方法是将每个邻域大小存储在一个大小列表中。Python\
    \ 有一个内置的 `min` 函数，它接受一个序列并返回其最小值：\n\n```\n>>> min('qwerty')\n'e'\n>>> min([15.5,\
    \ 7.0, 2.5, 7.5])\n2.5\n```\n\n（Python 还有一个 `max` 函数，返回序列的最大值。）\n\n使用 `min` 处理邻域大小列表的解决方案见代码清单\
    \ 5-3。\n\n```\nn = int(input())\n\npositions = []\n\nfor i in range(n):\n    positions.append(int(input()))\n\
    \npositions.sort()\n\nsizes = []\n\nfor i in range(1, n - 1):\n    left = (positions[i]\
    \ - positions[i - 1]) / 2\n    right = (positions[i + 1] - positions[i]) / 2\n\
    \    size = left + right\n    sizes.append(size)\n\nmin_size = min(sizes)\nprint(min_size)\n\
    ```\n\n*代码清单 5-3：使用 min 解决村庄邻域问题*\n\n请随意将这些解决方案中的任何一个提交给评测系统，选择你最喜欢的一个！\n\n在继续之前，你可能想尝试解决第\
    \ 134 页“章节练习”中的练习 1。\n\n## 问题 #12：学校旅行\n\n你遇到的许多问题，其输入每行包含多个整数或浮点数。我们之前避免了这些问题，但它们无处不在！现在我们将学习如何使用列表来处理这类问题的输入。\n\
    \n这是 DMOJ 问题 ecoo17r1p1。\n\n### 挑战\n\n学生们想在学年末去学校旅行，但他们需要钱来支付费用。为了筹款，他们组织了一次早午餐会。参加早午餐会，一年级学生支付\
    \ 12 美元，二年级学生支付 10 美元，三年级学生支付 7 美元，四年级学生支付 5 美元。\n\n早午餐会筹集的所有资金中，50% 可用于支付学校旅行费用（另外\
    \ 50% 用于支付早午餐会本身）。\n\n已知学校旅行的费用、每个年级学生的比例以及学生总数。请判断学生们是否需要为学校旅行筹集更多资金。\n\n###\
    \ 输入\n\n输入包含 10 个测试用例，每个测试用例三行（共 30 行）。每个测试用例的三行如下：\n\n-   第一行包含学校旅行的费用（以美元计）；是一个介于\
    \ 50 到 50,000 之间的整数。\n-   第二行包含四个数字，分别表示参加早午餐会的一年级、二年级、三年级和四年级学生的比例。每对数字之间有一个空格。每个数字介于\
    \ 0 和 1 之间，它们的和为 1（即 100%）。\n-   第三行包含整数 n，表示参加早午餐会的学生人数。n 介于 4 到 2,000 之间。\n\n\
    ### 输出\n\n对于每个测试用例：如果学生们需要为学校旅行筹集更多资金，输出 YES；否则，输出 NO。\n\n### 一个陷阱\n\n假设有 50 名学生，其中\
    \ 10%（比例为 0.1）是四年级学生。那么我们可以计算出 50 * 0.1 = 5 名四年级学生。\n\n现在假设有 50 名学生，但其中 15%（比例为\
    \ 0.15）是四年级学生。如果我们相乘，得到 50 * 0.15 = 7.5 名四年级学生。\n\n拥有 7.5 名学生没有意义。当这种情况发生时，题目规定我们要向下取整——所以这里我们向下取整为\
    \ 7。这可能导致一年级、二年级、三年级和四年级的学生总数不等于学生总数。对于未计入的学生，我们将他们添加到学生人数最多的年级。可以保证恰好有一个年级的学生人数最多（不会出现多个年级并列的情况）。\n\
    \n我们将首先忽略这个陷阱来解决问题。然后我们将结合这个陷阱给出完整的解决方案。\n\n### 分割字符串与连接列表\n\n每个测试用例的第二行包含四个比例，像这样：\n\
    \n```\n0.2 0.08 0.4 0.32\n```\n\n我们需要一种方法从字符串中提取这四个数字以进行进一步处理。我们将学习字符串的 `split`\
    \ 方法，用于将字符串分割成其片段的列表。同时，我们还将学习字符串的 `join` 方法，它让我们可以反向操作，将列表合并成一个字符串。\n\n### 将字符串分割成列表\n\
    \n记住，`input` 函数返回的是一个字符串，无论输入看起来是什么样子。如果输入应被解释为整数，我们需要将字符串转换为整数。如果输入应被解释为浮点数，我们需要将字符串转换为浮点数。那么，如果输入应被解释为四个浮点数呢？嗯，那么我们最好在转换任何内容之前将其分割成单个浮点数！\n\
    \n字符串的 `split` 方法将字符串分割成其片段的列表。默认情况下，`split` 按空格分割，这正是我们处理四个浮点数所需要的：\n\n```\n\
    >>> s = '0.2 0.08 0.4 0.32'\n>>> s.split()\n['0.2', '0.08', '0.4', '0.32']\n```\n\
    \n`split` 方法返回一个字符串列表，此时我们可以独立访问每个字符串。这里，我保存了 `split` 返回的列表，然后访问其中的两个值：\n\n```\n\
    >>> proportions = s.split()\n>>> proportions\n['0.2', '0.08', '0.4', '0.32']\n\
    >>> proportions[1]\n'0.08'\n>>> proportions[2]\n'0.4'\n```\n\n现实世界中的数据通常是逗号分隔而不是空格分隔。小菜一碟：我们可以调用\
    \ `split` 并传入一个参数来指定用作分隔符的内容：\n\n```\n>>> info = 'Toronto,Ontario,Canada'\n>>>\
    \ info.split(',')\n['Toronto', 'Ontario', 'Canada']\n```\n\n### 将列表连接成字符串\n\n\
    要反向操作，从列表到字符串而不是字符串到列表，我们可以使用字符串的 `join` 方法。调用 `join` 的字符串被用作列表值之间的分隔符。以下是两个例子：\n\
    \n```\n>>> lst = ['Toronto', 'Ontario', 'Canada']\n>>> ','.join(lst)\n```\n\n\
    ```\n>>> '**'.join(lst)\n'Toronto**Ontario**Canada'\n```\n\n从技术上讲，`join` 可以连接任何序列中的值，而不仅仅是列表。这是一个连接字符串中字符的例子：\n\
    \n```\n>>> '*'.join('abcd')\n'a*b*c*d'\n```\n\n### 更改列表值\n\n当我们对一个包含四个片段的字符串使用\
    \ `split` 时，我们得到一个字符串列表：\n\n```\n>>> s = '0.2 0.08 0.4 0.32'\n>>> proportions\
    \ = s.split()\n>>> proportions\n['0.2', '0.08', '0.4', '0.32']\n```\n\n在第 1 章的“在字符串和整数之间转换”中，我们学到看起来像数字的字符串不能用于数值计算。因此，我们需要将这个字符串列表转换为浮点数列表。我们可以使用\
    \ `float` 将字符串转换为浮点数，像这样：\n\n```\n>>> float('45.6')\n45.6\n```\n\n这只是一个浮点数。如何将整个字符串列表转换为浮点数列表？尝试使用以下循环来实现这一点非常诱人：\n\
    \n```\n>>> for value in proportions:\n...     value = float(value)\n```\n\n逻辑是这应该遍历列表中的每个值并将其转换为浮点数。遗憾的是，它不起作用。列表仍然引用字符串：\n\
    \n```\n>>> proportions\n['0.2', '0.08', '0.4', '0.32']\n```\n\n可能出了什么问题？是 `float`\
    \ 不工作吗？通过查看转换后 `value` 的类型，我们可以看到 `float` 工作得很好：\n\n```\n>>> for value in proportions:\n\
    ...     value = float(value)\n...     type(value)\n...\n<class 'float'>\n```"
