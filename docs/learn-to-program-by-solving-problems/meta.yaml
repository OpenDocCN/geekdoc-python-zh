  md: '```

    >>> lst

    [''j'', ''e'', ''l'', ''l'', ''o'']

    >>> lst[2] = ''x''

    >>> lst

    [''j'', ''e'', ''x'', ''l'', ''o'']

    ```


    Without a precise understanding of the assignment statement, mutability can lead
    to seemingly bewildering behavior. Here’s an example:


    ```

    >>> x = [1, 2, 3, 4, 5]

    >>> y = x

    >>> x[0] = 99

    >>> x

    [99, 2, 3, 4, 5]

    ```


    No surprises yet. But you might be surprised by this:


    ```

    >>> y

    [99, 2, 3, 4, 5]

    ```


    How did the 99 get into y like that?

    When we assign x to y ❶, y is set to refer to the same list as x. The assignment
    statement doesn’t copy the list. There’s only one list, and it happens to have
    two names (or *aliases*) that refer to it. So if we make a change to that list,
    we see that change whether we refer to the list by x or y.

    Mutability is useful because it directly models what we might want to do with
    the values in a list. If we want to change a value, we just change it. Without
    mutability, changing one value isn’t possible. We’d have to create a new list
    that was the same as the old list except for the value that we wanted to change.
    That would work, but it is a roundabout and less transparent way of changing a
    value.

    If you really do want a copy of a list, not just another name for it, you can
    use slicing. Leave out both the start and end indices, which results in a copy
    of the entire list:


    ```

    >>> x = [1, 2, 3, 4, 5]

    >>> y = x[:]

    >>> x[0] = 99

    >>> x

    [99, 2, 3, 4, 5]

    >>> y

    [1, 2, 3, 4, 5]

    ```


    Observe this time that the y list didn’t change when the x list changed. They’re
    separate lists.'
