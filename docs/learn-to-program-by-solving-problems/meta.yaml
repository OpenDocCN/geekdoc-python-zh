- md: '## MAKING DECISIONS


    Most programs that we use on a daily basis behave differently depending on what
    happens during their execution. For example, when a word processor asks us whether
    we want to save our work, it makes a decision based on our response: saving our
    work if we answer “yes” and not saving our work if we answer “no.” In this chapter,
    we’ll learn about if statements, which let our programs make decisions.


    We’ll solve two problems: determining the result of a basketball game and determining
    whether a phone number belongs to a telemarketer.


    ### Problem #3: Winning Team


    In this problem, we’ll need to output a message that depends on the outcome of
    a basketball game. To do that, we’ll learn all about if statements. We’ll also
    learn how we can store and manipulate true and false values in our programs.


    This is DMOJ problem ccc19j1.


    ## The Challenge


    In basketball, three plays score points: a three-point shot, a two-point shot,
    and a one-point free throw.


    You just watched a basketball game between the Apples and Bananas and recorded
    the number of successful three-point, two-point, and one-point plays for each
    team. Indicate whether the game was won by the Apples, the game was won by the
    Bananas, or the game was a tie.


    ## Input


    There are six lines of input. The first three give the scoring for the Apples,
    and the latter three give the scoring for the Bananas.


    - The first line gives the number of successful three-point shots for the Apples.

    - The second line gives the number of successful two-point shots for the Apples.

    - The third line gives the number of successful one-point free throws for the
    Apples.

    - The fourth line gives the number of successful three-point shots for the Bananas.

    - The fifth line gives the number of successful two-point shots for the Bananas.

    - The sixth line gives the number of successful one-point free throws for the
    Bananas.


    Each number is an integer from 0 to 100.


    ## Output


    The output is a single character.


    - If the Apples scored more points than the Bananas, output A (A for Apples).

    - If the Bananas scored more points than the Apples, output B (B for Bananas).

    - If the Apples and Bananas scored the same number of points, output T (T for
    Tie).


    ## Conditional Execution


    We can make a lot of headway here by using what we learned in Chapter 1. We can
    use input and int to read each of the six integers from the input. We can use
    variables to hang on to those values. We can multiply the number of successful
    three-point shots by 3 and the number of successful two-point shots by 2. We can
    use print to output an A, B, or T.


    What we haven''t learned yet is how our programs can make a decision about the
    outcome of the game. I can demonstrate why we need this through two test cases.


    First, consider this test case:


    ```

    5

    1

    3

    1

    1

    1

    ```


    The Apples scored 5 * 3 + 1 * 2 + 3 = 20 points, and the Bananas scored 1 * 3
    + 1 * 2 + 1 = 6 points. The Apples won the game, so this is the correct output:


    ```

    A

    ```


    Second, consider this test case, where the Apples'' and Bananas'' scores have
    been swapped:


    ```

    1

    1

    1

    5

    1

    3

    ```


    This time, the Bananas won the game, so this is the correct output:


    ```

    B

    ```


    Our program must be able to compare the total points scored by the Apples and
    the total points scored by the Bananas and use the result of that comparison to
    choose whether to output A, B, or T.


    We can use Python''s if statement to make these kinds of decisions. A condition
    is an expression that''s true or false, and an if statement uses conditions to
    determine what to do. if statements lead to conditional execution, so named because
    the execution of our program is influenced by conditions.


    We''ll first learn about a new type that lets us represent true or false values,
    and how we can build expressions of this type. Then, we''ll use such expressions
    to write if statements.


    ## The Boolean Type


    Pass an expression to Python''s type function, and it''ll tell you the type of
    the expression''s value:


    ```

    >>> type(14)

    <class ''int''>

    >>> type(9.5)

    <class ''float''>

    >>> type(''hello'')

    <class ''str''>

    >>> type(12 + 15)

    <class ''int''>

    ```


    One Python type we haven''t met yet is the Boolean (bool) type. Unlike integers,
    strings, and floats, which have billions of possible values, there are only two
    Boolean values: True and False.


    ```

    >>> True

    True

    >>> False

    False

    >>> type(True)

    <class ''bool''>

    >>> type(False)

    <class ''bool''>

    ```


    What can we do with these values? With numbers, we had mathematical operators
    like + and - that let us combine values into more complex expressions. We''ll
    need a new set of operators that work with Boolean values.


    ## Relational Operators


    Is 5 greater than 2? Is 4 less than 1? We can make such comparisons using Python''s
    *relational operators*. They produce True or False and are therefore used to write
    *Boolean expressions*.


    The > operator takes two operands and returns True if the first is greater than
    the second, and False otherwise:


    ```

    >>> 5 > 2

    True

    >>> 9 > 10

    False

    ```


    Similarly, we have the < operator for less-than:


    ```

    >>> 4 < 1

    False

    >>> -2 < 0

    True

    ```


    There''s >= for greater-than-or-equal-to, and <= for less-than-or-equal-to:


    ```

    >>> 4 >= 2

    True

    >>> 4 >= 4

    True

    >>> 4 >= 5

    False

    >>> 8 <= 6

    False

    ```


    To determine equality, we use the == operator. That''s two equal signs, not one.
    Remember that one equal sign (=) is used in an assignment statement; it has nothing
    to do with checking equality.


    ```

    >>> 5 == 5

    True

    >>> 15 == 10

    False

    ```


    For inequality, we use the != operator. It returns True if the operands are not
    equal and False if they are equal:


    ```

    >>> 5 != 5

    False

    >>> 15 != 10

    True

    ```


    Real programs wouldn''t evaluate expressions whose values we already know. We
    don''t need Python to tell us that 15 doesn''t equal 10. More typically, we''d
    use variables in these kinds of expressions. For example, number != 10 is an expression
    whose value depends on what number refers to.


    The relational operators also work on strings. When checking equality, case matters:


    ```

    >>> ''hello'' == ''hello''

    True

    >>> ''Hello'' == ''hello''

    False

    ```


    One string is less than another if it comes first in alphabetical order:


    ```

    >>> ''brave'' < ''cave''

    True

    >>> ''cave'' < ''cavern''

    True

    >>> ''orange'' < ''apple''

    False

    ```


    But things can be surprising when lowercase and uppercase characters are both
    involved:


    ```

    >>> ''apple'' < ''Banana''

    False

    ```


    Weird, right? It has to do with the way that characters are stored internally
    in a computer. Generally, uppercase characters come alphabetically before lowercase
    characters. And check this out:


    ```

    >>> ''10'' < ''4''

    True

    ```


    If these were numbers, then the result would be False. But strings are compared
    character by character from left to right. Python compares the ''1'' and ''4'',
    and because ''1'' is smaller, the < operator returns True. Be sure that your values
    have the types you think they have!


    One relational operator that works on strings but not numbers is in. It returns
    True if the first string occurs at least once in the second, and False otherwise:


    ```

    >>> ''ppl'' in ''apple''

    True

    >>> ''ale'' in ''apple''

    False

    ```


    > CONCEPT CHECK

