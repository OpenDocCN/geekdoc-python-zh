    \ helps us focus on the fact that the algorithm is linear time and away from the\
    \ specifics of the linear relationship.\n\nWhat if an algorithm takes 2*n* + 8\
    \ steps—what kind of algorithm is this? This is still linear time! The reason\
    \ is that the linear term (2*n*) will come to dominate the constant term (8) as\
    \ soon as *n* is big enough. In big O notation, we ignore everything except the\
    \ dominant terms.\n\nMany Python operations take constant time to do their work.\
    \ For example, appending to a list, adding to a dictionary, or indexing a sequence\
    \ or dictionary all take constant time.\n\nBut some Python operations take linear\
    \ time to do their work. Be careful to count them as linear time and not constant\
    \ time. For example, using the Python input function to read a long string takes\
    \ linear time, because Python has to read each character on the line of input.\
    \ Any operation that examines each character of a string or value in a list takes\
    \ linear time as well.\n\nIf an algorithm reads *n* values and processes each\
    \ value in a constant number of steps, then it is a linear-time algorithm.\n\n\
    We don't need to go far to see another linear-time algorithm—our solution to Occupied\
