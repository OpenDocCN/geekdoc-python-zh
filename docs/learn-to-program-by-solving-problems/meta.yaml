    # # 6


    # ## DESIGNING PROGRAMS WITH FUNCTIONS


    ![](img/712dd6dddc9c23a969f25d44b233585c_150_0.png)


    When writing large programs, it’s important to organize our code into smaller
    logical pieces, each of which contributes to the overall goal. That way, we’ll
    be able to think about each piece on its own, without worrying about what other
    pieces are doing. Then we’ll put the pieces together. These pieces are called
    *functions*.


    In this chapter, we’ll use functions to break down and solve two problems: calculating
    the score in a two-player card game and determining whether boxes of action figures
    can be nicely organized.


    # ### Problem #14: Card Game


    In this problem, we’ll implement a two-player card game game. As part of thinking
    through the problem, we’ll find that the same bit of logic crops up several times.
    We’ll learn how to bundle this code into a Python function to avoid code duplication
    and enhance code clarity.


    This is DMOJ problem ccc99s1.'
- md: '## The Challenge


    Two players, A and B, are playing a card game. (You don''t need to know about
    playing cards or card games to understand this problem.)


    The game starts with a deck of 52 cards. Player A takes a card from the deck,
    then player B takes a card from the deck, then player A, then player B, until
    there are no cards left in the deck.


    There are 13 types of cards in the deck. These types are as follows: two, three,
    four, five, six, seven, eight, nine, ten, jack, queen, king, ace. There are four
    cards of each of these types in the deck. For example, there are four twos, four
    threes, and so on, all the way up to four aces. (That''s why there are 52 cards
    in the deck: 13 types times 4 cards per type.)


    A *high card* is a card that is a jack, queen, king, or ace.


    When a player takes a high card, they may score some points. Here are the rules
    by which points are scored:


    - If a player takes a jack, after which there is at least one card remaining in
    the deck, and the next card in the deck is not a high card, then the player scores
    1 point.

    - If a player takes a queen, after which there are at least two cards remaining
    in the deck, and neither of the next two cards in the deck is a high card, then
    the player scores 2 points.

    - If a player takes a king, after which there are at least three cards remaining
    in the deck, and none of the next three cards in the deck is a high card, then
    the player scores 3 points.

    - If a player takes an ace, after which there are at least four cards remaining
    in the deck, and none of the next four cards in the deck is a high card, then
    the player scores 4 points.


    We''re asked to output information each time a player scores, as well as the total
    score for each player at the end of the game.


    ## Input


    The input consists of 52 lines. Each line contains the type of a card in the deck.
    The lines are in the order that cards will be taken from the deck; that is, the
    first line is the first card taken from the deck, the second line is the second
    card taken, and so on.


    ## Output


    Whenever a player scores, output the following line:


    ```

    Player *p* scores *q* point(s).

    ```


    where *p* is A for player A or B for player B, and *q* is the number of points
    that they just scored.


    When the game ends, output the following two lines:


    ```

    Player A: $m$ point(s).

    Player B: $n$ point(s).

    ```


    where $m$ is the total score for player A and $n$ is the total score for player
    B.


    ## Exploring a Test Case


    If you think through how to solve this problem, you might be left wondering whether
    we can just solve it, right now, without learning anything new. Indeed, we can!
    We''re in great shape. We can use a list to represent the deck of cards. We know
    how to use the list append method to add a card to the deck. We can access values
    in the list to look for high cards. We''ve even got f-strings to help us output
    the player and points information.


    Rather than dive in, though, let''s go through a small example. Doing so is going
    to highlight that we''re missing one crucial feature of Python that will make
    it easier to organize our solution and solve this problem.


    We''ll be here all year if we go through a 52-card example, so let''s use a smaller
    one with just 10 cards. This isn''t a complete test case, so the program we write
    won''t work on it, but it''s enough for us to understand the mechanics of the
    game and what our solution will have to do. Here''s the test case:


    - queen

    - three

    - seven

    - king

    - nine

    - jack

    - eight

    - king

    - jack

    - four


    Player A takes the first card, which is a queen. A queen is a high card, and player
    A might score 2 points here. First, we confirm that there are at least two cards
    remaining in the deck after this queen. Next, we have to check these next two
    cards, hoping there is no high card among them. The next two cards are not high
    cards—they are a three and a seven—so player A gets 2 points.


    Player B now takes the second card, which is a three. Three isn''t a high card,
    so no points for player B.


    Player A now takes the seven. No points.


    Player B now takes the king, so there''s a chance for 3 points for player B. There
    are at least three cards remaining in the deck after this king. We have to check
    these next three cards, hoping there is no high card among them. Sadly, there
    is a high card, a jack, among those three. No points for player B.


    Player A now takes the nine. No points.


    Player B now takes the first jack. There is at least one card remaining in the
    deck after this jack. We have to check this next card, hoping it isn''t a high
    card. Good news: it''s not a high card—it''s an eight—so player B gets 1 point.


    There''s only one more point scored, and it''s by player A when they take the
    second-last card (the jack) from the deck.


    Therefore, this is the output for this test case:


    ```

    Player A scores 2 point(s).

    Player B scores 1 point(s).

    Player A scores 1 point(s).

    Player A: 3 point(s).

    Player B: 1 point(s).

    ```


    Notice that each time a player takes a high card, we need to check two things:
    that there are at least a certain number of cards remaining in the deck and that
    there is no high card among these cards. The first we should be able to manage
    by using a variable that tells us how many cards have been taken. The second is
    more difficult. We''d need some code to check a given number of cards for a high
    card. Worse, if we''re not careful, we''d end up duplicating very similar code
    four times: once to check the card after a jack, once to check the two cards after
    a queen, once to check the three cards after a king, and once to check the four
    cards after an ace. If we later found a flaw in our logic, we would have to fix
    it in up to four different places.


    Is there a Python feature that lets us package that "no high cards here" logic,
    just once, and invoke it four times? There is. It''s called a *function*, and
    it''s just a named block of code that carries out a small task. Functions are
    essential to the organization and clarity of our code. All programmers use them.
    Without them, writing large software systems like games and word processors would
    be untenable. Let''s learn how to use functions.


    ## Defining and Calling Functions


    We''ve already learned how to call functions that come with Python. For example,
    we''ve used the input function to read input. Here''s a call of input with no
    arguments:


    ```

    >>> s = input()

    hello

    >>> s

    ''hello''

    ```


    We''ve also used Python''s print function to output text. Here''s a call of print
    with one argument:


    ```

    >>> print(''well, well'')

    well, well

    ```


    The built-in Python functions are general-purpose, designed to be used in a wide
    variety of settings. When we want a function to solve a problem-specific task,
    we''ll have to define it ourselves.


    ## Functions Without Arguments


    To *define*, or create, a function, we use Python''s `def` keyword. Here''s the
    definition of a function that outputs three lines:


    ```

    >>> def intro():

    ...     print(''*********'')

    ...     print(''*WELCOME*'')

    ...     print(''*********'')

    ...

    ```


    The structure of a function definition mirrors that of an `if` statement or loop.
    The name after `def` is the name of the function that we''re defining; here, we''re
    defining a function named `intro`. Following the name of the function, we have
    a pair of empty parentheses, `()`. We''ll see later that we can include information
    in these parentheses to pass arguments to functions. This `intro` function doesn''t
    take any arguments, which is why the parentheses are empty. Following the parentheses
    is a colon; as with `if` statements or loops, leaving out the colon is a syntax
    error. On the following lines, we provide an indented block of statements that
    will run each time the function is called.


    When you defined the `intro` function, you may have expected to see this as output:


    ```

    *********

    *WELCOME*

    *********

    ```


    But no: so far we''ve only defined the function, not called it. Defining a function
    has no observable effect; it simply stores the function in the computer''s memory
    so we can call it later. We call our own functions just like we call any of Python''s
    built-in functions. Since this `intro` function doesn''t take any arguments, we
    use an empty set of parentheses in the call:


    ```

    >>> intro()

    *********

    *WELCOME*

    *********

    ```


    You can call this function as many times as you like. It''s there as often as
    we need it.


    ## Functions with Arguments


    Our `intro` function isn''t very flexible, as it does the same thing each time
    it''s called. We can change the function so that we can pass arguments to it,
