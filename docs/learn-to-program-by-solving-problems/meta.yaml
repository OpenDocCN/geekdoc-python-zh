    \n在下一章中，我们将学习列表，它允许我们存储大量的数字或字符串数据。你认为我们将如何处理所有这些数据？是的：循环！练习以下练习以磨练你的循环技能。当我们使用列表解决问题时，你会经常用到它们。\n\
    \n## 章节练习\n\n你现在有三种类型的循环可供使用：for 循环、range for 循环和 while 循环。使用循环解决问题的部分挑战在于知道使用哪种循环！对于以下每个练习，尝试使用不同类型的循环来找到你最喜欢的解决方案。"
