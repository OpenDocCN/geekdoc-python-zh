    \ depends on *n*. The loops are sequential, not nested, so their work is added\
    \ rather than multiplied.\n\n# Log Time\n\nIn \"Efficiency of Our Program\" on\
    \ page 255, we discussed the difference between linear search and binary search.\
    \ A linear search finds a value in a list by searching the list from beginning\
    \ to end. That's an *O(n)* algorithm. It works whether or not the list is sorted.\
    \ A binary search, by contrast, works only on a sorted list. But if you have a\
    \ sorted list, then binary search is blindingly fast.\nBinary search works by\
    \ comparing the value we're searching for to the value at the middle of the list.\
    \ If the value at the middle of the list is larger than the value we're searching\
    \ for, we continue searching in the left half of the list. If the value at the\
    \ middle of the list is smaller than the value we're searching for, we continue\
    \ searching in the right half of the list. We keep doing this, ignoring half of\
    \ the list each time, until we find the value that we're looking for.\nSuppose\
    \ we use binary search to find a value in a list of 512 values. How many steps\
    \ does it take? Well, after one step, we've ignored half the list, so we're left\
    \ with about 512 / 2 = 256 values. (It doesn't matter whether our value is larger\
    \ than half of the values in the list or smaller than half the"
  merge: -1
  pgno: 292
- img_proc: true
  md: "values in the list; in each case, we ignore one half of the list.) After two\
    \ steps, we're left with 256 / 2 = 128 values. After three steps, we're left with\
    \ 128 / 2 = 64 values. Continuing, after four steps we have 32 values, after five\
    \ steps we have 16 values, after six steps we have 8 values, after seven steps\
    \ we have 4 values, after eight steps we have 2 values, and after nine steps we\
    \ have only 1 value.\n\nNine steps—that's it! That's way better than taking up\
    \ to 512 steps using linear search. Binary search does far less work than a linear-time\
    \ algorithm. But what kind of algorithm is it? It's not constant time: while it\
    \ takes very few steps, the number of steps does increase a little as the amount\
    \ of input increases.\n\nBinary search is an example of a *logarithmic-time* algorithm.\
    \ In big O notation, we say that a logarithmic-time algorithm is *O(log n)*.\n\
    \nLogarithmic-time refers to the logarithm function in mathematics. Given a number,\
    \ this function tells you the number of times you have to divide that number by\
    \ a base to get to 1 or less. The base we typically use in computer science is\
    \ 2, so we're looking for the number of times you have to divide a number by 2\
    \ to get to 1 or less. For example, it takes 9 divisions by 2 to take 512 down\
    \ to 1. We write this as log₂ 512 = 9.\n\nThe logarithm function is the inverse\
    \ of the exponential function, the latter of which may be more familiar to you.\
    \ Another way to calculate log₂ 512 is to find the power *p* so that 2ᵖ = 512.\
    \ Since 2⁹ = 512, we confirm that log₂ 512 = 9.\n\nIt's shocking how slowly the\
    \ logarithm function grows. For example, consider a list of one million values.\
    \ How many steps would binary search take to search that? It takes log₂ 1,000,000\
    \ steps, which is only about 20. Logarithmic-time is much closer to constant-time\
    \ than it is to linear-time. It's a huge win any time you can replace a linear-time\
