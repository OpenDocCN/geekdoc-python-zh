- md: "## More List Operations\n\nTo fix our program, we need to do two things: figure\
    \ out how many students were lost to rounding, and add those students to the year\
    \ with the most students.\n\n## Summing a List\n\nTo determine the number of students\
    \ lost to rounding, we can add up the students in our `students_per_year` list\
    \ and then subtract that from the total number of students. Python’s `sum` function\
    \ takes a list and returns the sum of its values:\n\n```\n>>> students_per_year\
    \ = [6, 0, 0, 0]\n>>> sum(students_per_year)\n6\n>>> students_per_year = [25,\
    \ 10, 50, 40]\n>>> sum(students_per_year)\n125\n```\n\n## Finding the Index of\
    \ the Maximum\n\nPython’s `max` function takes a sequence and returns its maximum\
    \ value:\n\n```\n>>> students_per_year = [6, 0, 0, 0]\n>>> max(students_per_year)\n\
    6\n>>> students_per_year = [25, 10, 50, 40]\n>>> max(students_per_year)\n50\n\
    ```\n\nWe want the index of the maximum, not the maximum itself, so that we can\
    \ increase the number of students at that index. Given the maximum value, we can\
    \ find its index using the `index` method. It returns the leftmost index where\
    \ the provided value is found or generates an error if the value is not in the\
    \ list at all:\n\n```\n>>> students_per_year = [6, 0, 0, 0]\n>>> students_per_year.index(6)\n\
    0\n>>> students_per_year.index(0)\n1\n>>> students_per_year.index(50)\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nValueError:\
    \ 50 is not in list\n```\n\nWe’ll be searching for a value that we know is in\
    \ the list, so we won’t have to worry about getting an error.\n\n## Solving the\
    \ Problem\n\nWe're there! We can now update our partial solution to handle any\
    \ valid test case. The new program is in Listing 5-5.\n\n```\nYEAR_COSTS = [12,\
    \ 10, 7, 5]\n\nfor dataset in range(10):\n    trip_cost = int(input())\n    proportions\
    \ = input().split()\n    num_students = int(input())\n\n    for i in range(len(proportions)):\n\
    \        proportions[i] = float(proportions[i])\n\n    students_per_year = []\n\
    \n    for proportion in proportions:\n        students = int(num_students * proportion)\n\
    \        students_per_year.append(students)\n\n❶ counted = sum(students_per_year)\n\
    \    uncounted = num_students - counted\n    most = max(students_per_year)\n \
    \   where = students_per_year.index(most)\n❷ students_per_year[where] = students_per_year[where]\
    \ + uncounted\n\n    total_paid = 0\n\n    for i in range(len(students_per_year)):\n\
    \        total_paid = total_paid + students_per_year[i] * YEAR_COSTS[i]\n\n  \
    \  if total_paid / 2 < trip_cost:\n        print('YES')\n    else:\n        print('NO')\n\
    ```\n\nListing 5-5: Solving School Trip\n\nThe only new code is the five lines\
    \ starting at ❶. We use sum to calculate how many students we've counted so far\
    \ and then subtract this from the total number of students to arrive at the number\
    \ of uncounted students. We then use max and index to identify the index of the\
    \ year to which we should add the uncounted students. Finally, we add the uncounted\
    \ students to this index ❷. (Adding 0 to a number doesn't change that number,\
    \ so don't worry about coding special behavior for when uncounted is 0. This code\
    \ is safe in that case.)\n\nThat's all for this problem. Go ahead and submit to\
    \ the judge! And then come back—we're about to explore even more general list\
    \ structures.\nBefore continuing, you might like to try solving exercise 5 from\
    \ “Chapter Exercises” on page 134.\n\n## Problem #13: Baker Bonus\n\nIn this problem,\
    \ we'll see how lists help us work with two-dimensional data. This kind of data\
    \ arises often in real-world programs. For example, data in the form of a spreadsheet\
    \ consists of rows and columns; processing such data requires techniques like\
    \ those we're about to learn.\nThis is DMOJ problem ecoo17r3p1.\n\n## The Challenge\n\
    \nBaker Brie has a number of franchisees, each of which sells baked goods to consumers.\
    \ Having reached the milestone of being in business for 13 years, Baker Brie will\
    \ celebrate by awarding bonuses based on sales. The bonuses depend on sales per\
    \ day and sales per franchisee. Here's how the bonuses work:\n\n- For every day\
    \ on which the total sales across all franchisees is a multiple of 13, that multiple\
