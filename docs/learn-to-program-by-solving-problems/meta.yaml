    \n老师拿到了卢卡的编码句子。为老师恢复卢卡的原始句子。\n\n### 输入\n\n输入是一行文本，即卢卡的编码句子。它由小写字母和空格组成。每对单词之间恰好有一个空格。该行的最大长度为100个字符。\n\
    \n### 输出\n\n输出卢卡的原始句子。\n\n## for 循环的另一个局限性\n\n在第3章中，我们学习了如何使用 `for` 循环处理字符串。`for`\
