- md: "No way! It’s all automated. There’s no one typing test cases at the keyboard.\
    \ How does the judge test our code, then, if we satisfy a call to input by typing\
    \ something from the keyboard?\n\nThe truth is that input isn’t necessarily reading\
    \ input from the keyboard. It’s reading from a source of input called *standard\
    \ input*, which, by default, is the keyboard.\n\nIt’s possible to change standard\
    \ input so that it refers to a file rather than the keyboard. The technique is\
    \ called *input redirection*, and it’s what the judge uses to provide input.\n\
    \nWe can also try input redirection ourselves. For programs whose input is small—just\
    \ a line of text or a couple of integers—input redirection may not save us much.\
    \ But for programs whose test cases can be tens or hundreds of lines long, input\
    \ redirection makes it much easier to test our work. Rather than typing the same\
    \ test case over and over, we can store it in a file and then run our program\
    \ on it as many times as we want.\n\nLet’s try input redirection on Telemarketers.\
    \ Navigate to your *programming* folder and create a new file called *telemarketers_input.txt*.\
    \ In that file, type the following:\n\n```\n8\n1\n1\n9\n```\n\nThe problem specifies\
    \ that we should provide one integer per line, so we’ve written them one per line\
    \ here.\n\nSave the file. Now enter `python telemarketers.py < telemarketers_input.txt`\
    \ to run your program using input redirection. Your program should output ignore,\
    \ just as it would if you’d typed the test case from the keyboard.\n\nThe < symbol\
    \ instructs your operating system to use a file rather than the keyboard to provide\
    \ input. After the < symbol comes the name of the file that contains the input.\n\
    \nTo try your program on different test cases, just modify the *telemarketers_input.txt*\
    \ file and run your program again.\n\nWe can also change where our output goes,\
    \ though we won’t need to for this book. The print function outputs to *standard\
    \ output*, which, by default, is the screen. We can change standard output so\
    \ that it instead refers to a file. We do so using *output redirection*, which\
    \ is written as a > symbol followed by a filename.\n\nEnter `python telemarketers.py\
    \ > telemarketers_output.txt` to run your program using output redirection. Provide\
    \ four integers of input, and you should be back to your operating system prompt.\
    \ But you shouldn’t see any output from your Telemarketers program! That’s because\
    \ we’ve redirected the output to file telemarketers_output.txt. If you open telemarketers_output.txt\
    \ in your text editor, you should see the output there.\n\nBe careful with output\
    \ redirection. If you use a filename that already exists, your old file will be\
    \ overwritten! Always double-check that you’re using the filename you intended.\n\
    \n## Summary\n\nIn this chapter, we learned how to use if statements to direct\
    \ what our programs do. The key ingredient of an if statement is a Boolean expression,\
    \ which is an expression with a True or False value. To build up Boolean expressions,\
    \ we use relational operators such as == and >=, and we use Boolean operators\
    \ such as and and or.\n\nDeciding what to do based on what is True and False makes\
    \ our programs more flexible, able to adapt to the situation at hand. But our\
    \ programs are still limited to handling small amounts of input and output—whatever\
    \ we can read with individual calls to input and print. In the next chapter, we’ll\
    \ start learning about loops, which let us repeat code so that we can process\
    \ as much input and output as we like.\n\nWant to work with 100 values? How about\
    \ 1,000? And with just a small amount of Python code? It is a little early for\
    \ me to be provoking you, I know, because you still have the following exercises\
    \ to do. But when you’re ready, read on!\n\n## Chapter Exercises\n\nHere are some\
    \ exercises for you to try:\n\n- 1. DMOJ problem ccc06j1, Canadian Calorie Counting\n\
    - 2. DMOJ problem ccc15j1, Special Day\n- 3. DMOJ problem ccc15j2, Happy or Sad\n\
    - 4. DMOJ problem dmopc16c1p0, C.C. and Cheese-kun\n- 5. DMOJ problem ccc07j1,\
    \ Who is in the Middle\n\n## Notes\n\nWinning Team is originally from the 2019\
    \ Canadian Computing Competition, Junior Level. Telemarketers is originally from\
    \ the 2018 Canadian Computing Competition, Junior Level.\n\n# 3\n\n## REPEATING\
    \ CODE: DEFINITE LOOPS\n\n![](img/712dd6dddc9c23a969f25d44b233585c_60_0.png)\n\
    \nComputers shine when we have them repeat a process over and over. They tirelessly\
    \ do exactly what we ask, whether it involves doing something 10, 100, or a billion\
    \ times. In this chapter, we’ll learn about loops, statements that instruct the\
    \ computer to repeat the execution of part of our program.\n\nWe’ll use loops\
    \ to solve three problems: tracking the location of a ball under a cup, counting\
    \ the number of occupied parking spaces, and determining how much data is available\
    \ on a cell phone plan.\n\n### Problem #5: Three Cups\n\nIn this problem, we’ll\
    \ track the location of a ball under a cup as the cups move. But the cups can\
    \ move many times, so we won’t be able to write code for each move separately.\
    \ Instead, we’ll learn about and use the for loop, which allows us to more easily\
    \ run code for each move.\n\nThis is DMOJ problem coci06c5p1.\n\n## The Challenge\n\
    \nBorko has a row of three opaque cups: one at the left (location 1), one at the\
    \ middle (location 2), and one at the right (location 3). There is a ball under\
    \ the cup at the left. It’s our job to keep track of the location of the ball\
    \ as Borko swaps the locations of the cups.\n\nBorko can make three types of swap:\n\
    \n- **A** Swap the left and middle cups\n- **B** Swap the middle and right cups\n\
    - **C** Swap the left and right cups\n\nFor example, if Borko’s first swap is\
    \ type A, then he swaps the left and middle cups; because the ball starts at the\
    \ left, this swap moves it to the middle. If instead his first swap is type B,\
    \ then he swaps the middle and right cups; the left cup stays where it is, so\
    \ the ball doesn’t change locations.\n\n## Input\n\nThe input is one line of at\
    \ most 50 characters. Each character specifies a type of swap that Borko makes:\
    \ A, B, or C.\n\n## Output\n\nOutput the final location of the ball:\n\n- 1 if\
    \ the ball is at the left\n- 2 if the ball is at the middle\n- 3 if the ball is\
    \ at the right\n\n## Why Loops?\n\nConsider this test case:\n\n```\nACBA\n```\n\
    \nThere are four swaps here. To determine the final location of the ball, we need\
    \ to carry out each one.\nThe first swap is type A, which swaps the cups at the\
    \ left and middle. Since the ball starts at the left, this results in the ball\
    \ moving to the middle. The second swap is type C, which swaps the cups at the\
    \ left and right. Since the ball is currently at the middle, this has no effect\
    \ on the location of the ball. The third swap is type B, which swaps the cups\
    \ at the middle and right. This moves the ball from the middle to the right. The\
    \ fourth swap is type A, which swaps the cups at the left and middle. This has\
    \ no effect on the ball. The correct output is therefore 3, because the ball ends\
    \ up at the right.\nNotice that for each swap, we have to make a decision to determine\
    \ whether the ball moves and, if it does, to move the ball appropriately. Making\
    \ decisions is something we know how to do from Chapter 2. For example,\n\nif\
    \ the swap type is A and the ball is at the left, then the ball moves to the middle.\
    \ That looks like this:\n\n```\nif swap_type == 'A' and ball_location == 1:\n\
    \    ball_location = 2\n```\n\nWe could add an elif for each other case where\
    \ the ball moves: swap type A and ball is at the middle, swap type B and ball\
    \ is at the middle, swap type B and ball is at the right, and so on. This big\
    \ if statement would be enough to handle one swap. But that’s not enough to solve\
    \ the Three Cups problem, because we could have a test case of up to 50 swaps.\
    \ We’d need to repeat the if statement logic for each swap. And we certainly wouldn’t\
    \ want to copy and paste the same code 50 times. Imagine if you had made a typo\
    \ and had to fix it 50 times. Or if you suddenly became interested in test cases\
    \ with up to a million swaps. No, what we have learned so far is not going to\
    \ cut it. We need a way to walk through the swaps, performing the same logic for\
    \ each one. We need a loop.\n\n## for Loops\n\nPython’s for statement produces\
    \ *for loops*. for loops allow us to process each element of a sequence. The only\
    \ sequence type we’ve seen so far is the string. We’ll learn others as we go;\
    \ for loops work on all of them.\nHere’s our first example of a for loop:\n\n\
    ```\n>>> secret_word = 'olive'\n>>> for char in secret_word:\n...     print('Letter:\
    \ ' + char)\n...\nLetter: o\nLetter: l\nLetter: i\nLetter: v\nLetter: e\n```\n\
    \nFollowing the keyword for, we write the name of a *loop variable*. A loop variable\
    \ is one that refers to different values as a loop progresses. In a for loop on\
    \ a string, the loop variable refers to each of the string’s characters.\nI’ve\
    \ chosen the variable name char (for “character”) to remind us that the variable\
    \ refers to a character from the string. Sometimes, it’s clearer if we use a contextual\
    \ variable name. For example, in Three Cups, we could instead use the name swap_type\
    \ to remind us that it refers to a type of swap.\nAfter the variable name, we\
    \ have the keyword in and then the string that we want to loop over. In our example,\
    \ we’re looping over the string referred to by secret_word, which is 'olive'.\n\
    Like the if, elif, and else lines of an if statement, the for line ends with a\
    \ colon (:). And, also like an if statement, a for statement has an indented block\
    \ of one or more statements."
  mdcn: "不可能！一切都是自动化的。没有人坐在键盘前输入测试用例。那么，如果我们在键盘上输入内容来满足 `input` 调用，评测系统是如何测试我们的代码的呢？\n\
    \n事实是，`input` 不一定从键盘读取输入。它从一个称为 *标准输入* 的来源读取，默认情况下，这个来源就是键盘。\n\n可以将标准输入更改为指向一个文件，而不是键盘。这种技术称为\
    \ *输入重定向*，评测系统就是用它来提供输入的。\n\n我们也可以自己尝试输入重定向。对于输入量很小的程序——只有一行文本或几个整数——输入重定向可能节省不了多少时间。但对于测试用例可能长达数十或数百行的程序，输入重定向使得测试我们的工作变得容易得多。我们不必一遍又一遍地输入相同的测试用例，而是可以将其存储在一个文件中，然后根据需要多次运行程序来处理它。\n\
    \n让我们在 Telemarketers 程序上尝试输入重定向。导航到你的 *programming* 文件夹，并创建一个名为 *telemarketers_input.txt*\
    \ 的新文件。在该文件中，输入以下内容：\n\n```\n8\n1\n1\n9\n```\n\n题目规定我们应该每行提供一个整数，所以我们在这里每行写一个。\n\
    \n保存文件。现在输入 `python telemarketers.py < telemarketers_input.txt` 来使用输入重定向运行你的程序。你的程序应该输出\
    \ ignore，就像你从键盘输入测试用例一样。\n\n`<` 符号指示你的操作系统使用文件而不是键盘来提供输入。`<` 符号后面是包含输入的文件名。\n\n\
    要尝试在不同的测试用例上运行你的程序，只需修改 *telemarketers_input.txt* 文件并再次运行你的程序。\n\n我们也可以更改输出的去向，尽管本书不需要这样做。`print`\
    \ 函数输出到 *标准输出*，默认情况下是屏幕。我们可以更改标准输出，使其指向一个文件。我们使用 *输出重定向* 来做到这一点，它写作一个 `>` 符号后跟一个文件名。\n\
    \n输入 `python telemarketers.py > telemarketers_output.txt` 来使用输出重定向运行你的程序。提供四个整数的输入，你应该会回到操作系统提示符。但你不应该看到\
    \ Telemarketers 程序的任何输出！这是因为我们将输出重定向到了文件 telemarketers_output.txt。如果你在文本编辑器中打开\
    \ telemarketers_output.txt，你应该能在那里看到输出。\n\n小心使用输出重定向。如果你使用一个已经存在的文件名，你的旧文件将被覆盖！务必仔细检查你使用的是你想要的文件名。\n\
    \n## 总结\n\n在本章中，我们学习了如何使用 `if` 语句来指导程序的行为。`if` 语句的关键要素是布尔表达式，这是一个值为 `True` 或 `False`\
    \ 的表达式。为了构建布尔表达式，我们使用关系运算符（如 `==` 和 `>=`）以及布尔运算符（如 `and` 和 `or`）。\n\n根据什么是真什么是假来决定做什么，使我们的程序更加灵活，能够适应手头的情况。但我们的程序仍然局限于处理少量的输入和输出——即我们通过单独的\
    \ `input` 和 `print` 调用所能读取的内容。在下一章中，我们将开始学习循环，它让我们能够重复代码，从而可以处理任意数量的输入和输出。\n\n\
    想处理 100 个值吗？1,000 个呢？而且只需要少量的 Python 代码？我知道现在就来激发你可能有点早，因为你还有接下来的练习要做。但当你准备好了，请继续阅读！\n\
    \n## 章节练习\n\n这里有一些供你尝试的练习：\n\n- 1. DMOJ 问题 ccc06j1，Canadian Calorie Counting\n\
    - 2. DMOJ 问题 ccc15j1，Special Day\n- 3. DMOJ 问题 ccc15j2，Happy or Sad\n- 4. DMOJ\
    \ 问题 dmopc16c1p0，C.C. and Cheese-kun\n- 5. DMOJ 问题 ccc07j1，Who is in the Middle\n\
    \n## 注释\n\nWinning Team 原题来自 2019 年加拿大计算机竞赛初级组。Telemarketers 原题来自 2018 年加拿大计算机竞赛初级组。\n\
    \n# 3\n\n## 重复代码：确定循环\n\n![](img/712dd6dddc9c23a969f25d44b233585c_60_0.png)\n\n\
    当我们让计算机一遍又一遍地重复一个过程时，它们就大放异彩。它们会不知疲倦地完全按照我们的要求去做，无论这涉及做某事 10 次、100 次还是十亿次。在本章中，我们将学习循环，即指示计算机重复执行我们程序一部分的语句。\n\
    \n我们将使用循环来解决三个问题：跟踪杯子下球的位置、计算占用停车位的数量，以及确定手机套餐中有多少数据可用。\n\n### 问题 #5：三个杯子\n\n\
    在这个问题中，我们将跟踪杯子移动时杯子下球的位置。但杯子可以移动很多次，所以我们无法为每次移动单独编写代码。相反，我们将学习并使用 `for` 循环，它允许我们更轻松地为每次移动运行代码。\n\
    \n这是 DMOJ 问题 coci06c5p1。\n\n## 挑战\n\nBorko 有一排三个不透明的杯子：一个在左边（位置 1），一个在中间（位置 2），一个在右边（位置\
    \ 3）。左边的杯子下有一个球。我们的任务是在 Borko 交换杯子位置时跟踪球的位置。\n\nBorko 可以进行三种类型的交换：\n\n- **A**\
    \ 交换左边和中间的杯子\n- **B** 交换中间和右边的杯子\n- **C** 交换左边和右边的杯子\n\n例如，如果 Borko 的第一次交换是 A\
    \ 类型，那么他交换左边和中间的杯子；因为球最初在左边，这次交换将它移到了中间。如果他的第一次交换是 B 类型，那么他交换中间和右边的杯子；左边的杯子保持不动，所以球的位置没有改变。\n\
    \n## 输入\n\n输入是一行，最多 50 个字符。每个字符指定 Borko 进行的交换类型：A、B 或 C。\n\n## 输出\n\n输出球的最终位置：\n\
    \n- 如果球在左边，输出 1\n- 如果球在中间，输出 2\n- 如果球在右边，输出 3\n\n## 为什么需要循环？\n\n考虑这个测试用例：\n\n\
    ```\nACBA\n```\n\n这里有四次交换。为了确定球的最终位置，我们需要执行每一次交换。\n第一次交换是 A 类型，它交换左边和中间的杯子。由于球最初在左边，这导致球移动到中间。第二次交换是\
    \ C 类型，它交换左边和右边的杯子。由于球目前在中间，这对球的位置没有影响。第三次交换是 B 类型，它交换中间和右边的杯子。这将球从中间移到右边。第四次交换是\
    \ A 类型，它交换左边和中间的杯子。这对球没有影响。因此，正确的输出是 3，因为球最终在右边。\n注意，对于每次交换，我们都必须做出决定来确定球是否移动，如果移动，则相应地移动球。做决定是我们在第\
    \ 2 章就知道如何做的事情。例如，\n\n如果交换类型是 A 且球在左边，那么球移动到中间。这看起来像这样：\n\n```\nif swap_type ==\
    \ 'A' and ball_location == 1:\n    ball_location = 2\n```\n\n我们可以为球移动的其他每种情况添加一个\
    \ `elif`：交换类型 A 且球在中间，交换类型 B 且球在中间，交换类型 B 且球在右边，等等。这个大的 `if` 语句足以处理一次交换。但这不足以解决三个杯子问题，因为测试用例可能有多达\
    \ 50 次交换。我们需要为每次交换重复 `if` 语句的逻辑。我们当然不想复制粘贴相同的代码 50 次。想象一下，如果你打错了一个字，却要修改 50 次。或者如果你突然对多达一百万次交换的测试用例感兴趣。不，我们目前所学的还不够。我们需要一种方法来遍历交换，对每一次交换执行相同的逻辑。我们需要一个循环。\n\
    \n## for 循环\n\nPython 的 `for` 语句产生 *for 循环*。`for` 循环允许我们处理序列的每个元素。到目前为止，我们见过的唯一序列类型是字符串。我们将在学习过程中了解其他类型；`for`\
    \ 循环适用于所有类型。\n这是我们第一个 `for` 循环的例子：\n\n```\n>>> secret_word = 'olive'\n>>> for\
    \ char in secret_word:\n...     print('Letter: ' + char)\n...\nLetter: o\nLetter:\
    \ l\nLetter: i\nLetter: v\nLetter: e\n```\n\n在关键字 `for` 之后，我们写一个 *循环变量* 的名称。循环变量是在循环进行过程中引用不同值的变量。在字符串的\
    \ `for` 循环中，循环变量引用字符串的每个字符。\n我选择了变量名 `char`（代表“character”）来提醒我们该变量引用字符串中的一个字符。有时，如果我们使用上下文相关的变量名会更清晰。例如，在三个杯子问题中，我们可以改用名称\
    \ `swap_type` 来提醒我们它引用的是交换类型。\n在变量名之后，我们有关键字 `in`，然后是我们要循环遍历的字符串。在我们的例子中，我们循环遍历\
    \ `secret_word` 引用的字符串，即 'olive'。\n就像 `if` 语句的 `if`、`elif` 和 `else` 行一样，`for`\
    \ 行以冒号 (`:`) 结尾。而且，也像 `if` 语句一样，`for` 语句有一个缩进的代码块，包含一个或多个语句。"
