    \ your *programming* folder.\n2.  In the resulting menu, click *Open in Terminal*.\
    \ (You can also open the terminal and navigate to your *programming* folder if\
    \ you're more comfortable with that.)\n3.  At the bottom of the resulting window,\
    \ you'll see a line that ends with a dollar sign ($). This is your operating system\
    \ *prompt*, and it's waiting for you to type a command. You type operating system\
    \ commands here, *not* Python code. Be sure to press ENTER after each command.\n\
    4.  You're now in your *programming* folder. You can type ls if you'd like to\
    \ see what's there. You shouldn't see any files yet, because we haven't created\
