    \ 循环遍历交换字符串。\n\n在其他情况下，这过于受限，`range` `for` 循环可能更合适。`range` `for` 循环让我们访问索引而不是字符。它还允许我们以任意选择的步长跳过序列。例如，我们可以使用\
