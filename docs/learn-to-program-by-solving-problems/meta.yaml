    \ > 2` 为 True，所以第一个 if 语句的代码块执行。赋值 `x = -3` 使 x 指向 -3。现在看第二个 if 语句。这里，`x > 1`\
    \ 为 False，所以 else 代码块运行，`x = 3` 使 x 指向 3。我建议将 `if x > 1` 改为 `elif x > 1` 并观察程序行为如何变化！\n\
    \n## 概念检查\n\n以下两段代码做的事情完全一样吗？假设 temperature 已经指向一个数字。\n\n代码片段 1：\n\n```\nif temperature\
