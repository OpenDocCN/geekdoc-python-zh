- md: '## Counting the Words Using a Variable


    Let’s take stock of our progress toward solving the Word Count problem:


    - We know about strings, and we can use a string to store the line of words.

    - We know about the string count method, which we can use to count the number
    of spaces in the line of words. That gives us one less than the output value that
    we need.

    - We know about integers, whose + operator we can use to add 1 to a number.

    - We know about variables and the assignment statement, which help us hold on
    to values so that we don’t lose them.


    Putting all of this together, we can make a variable refer to a string and then
    count the number of words:


    ```

    >>> line = ''this is a string with a few words''

    >>> total_words = line.count('' '') + 1

    >>> total_words

    8

    ```


    The line and total_words variables aren’t required here; here’s how we could do
    it without them:


    ```

    >>> ''this is a string with a few words''.count('' '') + 1

    8

    ```


    But using variables to capture intermediate results is a good practice for keeping
    code readable. Once our programs get longer than a few lines, variables will be
    indispensable.


    ## Reading Input


    One problem with the code that we''ve written is that it works only on the particular
    string that we''ve typed in. It tells us that there are eight words in ''this
    is a string with a few words'', but that''s all it can do. If we want to know
    how many words are in a different string, we''ll have to replace the current string
    with a new one. To solve Word Count, though, we need our program to work on *any*
    string provided as input to our program.


    To read a line of input, we use the input function. *A function* is similar to
    a method: we call it, perhaps with some arguments, and it returns a value to us.
    One difference between a method and a function is that a function does not use
    the dot operator. All information passed to functions is through arguments.


    Here''s an example of calling the input function and then typing some input—in
    this case, the word testing:


    ```

    >>> input()

    testing

    ''testing''

    ```


    When you type input() and press ENTER, you don''t get a >>> prompt back. Instead,
    Python waits for you to type something on the keyboard and press ENTER. The input
    function then returns the string you typed. As usual, if we don''t store that
    string anywhere, then it''s lost. Let''s use an assignment statement to store
    what we type:


    ```

    >>> result = input()

    testing

    >>> result

    ''testing''

    >>> result.upper()

    ''TESTING''

    ```


    Notice in the last line that I''ve used the upper method on the value returned
    by input. This is allowed because input returns a string, and upper is a string
    method.


    ## Writing Output


    You''ve seen that typing expressions at the Python shell causes their values to
    be displayed:


    ```

    >>> ''abc''

    ''abc''

    >>> ''abc''.upper()

    ''ABC''

    >>> 45 + 9

    54

    ```


    That’s just a convenience provided by the Python shell. It assumes that if you
    type an expression, then you probably want to see its value. But when running
    a Python program outside of the Python shell, this convenience is gone. Instead,
    we must explicitly use the print function whenever we want to output something.
    The print function works from the shell, too:


    ```

    >>> print(''abc'')

    abc

    >>> print(''abc''.upper())

    ABC

    >>> print(45 + 9)

    54

    ```


    Notice that strings output by print don’t have quotes around them. That’s good—we
    probably don’t want to include quotes when communicating with users of our programs
    anyway!

    One nice feature of print is that you can supply as many arguments as you like,
    and they all get output with separating spaces:


    ```

    >>> print(''abc'', 45 + 9)

    abc 54

    ```


    ## Solving the Problem: A Complete Python Program


    We’re now ready to solve Word Count by writing a complete Python program. Exit
    the Python shell and you’ll be back at your operating system command prompt.


    ## Launching a Text Editor


    We’ll use a text editor to write our code. Follow the steps for your operating
    system.


    ### Windows


    On Windows, we’ll use Notepad, a bare-bones text editor. At the operating system
    command prompt, navigate to your *programming* folder if you’re not already there.
    Then type `notepad word_count.py` and press ENTER. Since the *word_count.py* file
    doesn’t exist, Notepad will ask you whether you’d like to create a new *word_count.py*
    file. Click **Yes** and you’ll be ready to type your Python program.


    ### macOS


    On macOS, you can use whichever text editor you like. One editor that you likely
    already have installed is TextEdit. At the operating system command prompt, navigate
    to your *programming* folder if you''re not already there. Then type the following
    two commands, pressing ENTER after each one:


    ```

    $ touch word_count.py

    $ open -a TextEdit word_count.py

    ```


    The touch command creates an empty file so that your text editor can open it.
    Now you''re ready to type your Python program.


    ### Linux


    On Linux, you can use whichever text editor you like. One editor that you likely
    already have installed is gedit. At the operating system command prompt, navigate
    to your *programming* folder if you''re not already there. Then type **gedit word_count.py**
    and press ENTER. Now you''re ready to type your Python program.


    ## The Program


    With your text editor loaded, you can type the code of our Python program. The
    code is in Listing 1-1.


    ```

    ❶ line = input()

    ❷ total_words = line.count('' '') + 1

    ❸ print(total_words)

    ```


    *Listing 1-1: Solving Word Count*


    When entering that code, don''t enter the ❶, ❷, or ❸. Those are there to help
    us walk through the code and are not part of the code itself. We begin by acquiring
    the line of text from the input and assigning it to a variable ❶. That gives us
    a string, on which we can use the count method. We add 1 to the count of spaces
    to account for the final word in the string, and we use the variable total_words
    to refer to that result ❷. The last thing to do is output the value referred to
    by total_words ❸. Be sure to save the file once you''ve finished typing the code.


    ## Running the Program


    To run the program, we''ll use the python command from our operating system command
    prompt. As we''ve seen, entering python by itself runs the Python shell, but we
    don''t want that this time. Instead, we want to tell Python to run the program
    in *word_count.py*. To do that, navigate to your *programming* folder, and enter
    **python word_count.py**. Your program is now waiting at the input prompt for
    you to type something. Type a few words, press ENTER, and you should see our program
    working correctly. For example, type the following:


    ```

    this is my first python program

    ```


    You should see the program produce 6 as the output.


    If instead you see a Python error, go back over the code and make sure you''ve
    typed it in exactly. Python requires precision. Even a missing parenthesis or
    single quote will lead to an error.


    Don''t be frustrated if it takes you some time to get this program to run. Getting
    a first program to run can require a lot of work. We have to be able to type a
    program into a file, invoke Python to run that program, and fix any errors resulting
    from an incorrect program. But the procedure for running programs doesn''t change,
    no matter how complex the program, so time you spend here will be well worth it
    as you work through the rest of the book.


    ## Submitting to the Judge


    Congratulations! I hope it was satisfying to run your first Python program on
    your computer. But how do we know this program is correct? Does it work for all
    possible strings? We can test it on a few more strings, but the way we''ll gain
    even more confidence in the correctness of our code is by submitting it to the
    online judge. The judge automatically runs a bunch of tests on our code and tells
    us whether we passed the tests or if something is wrong.


    Go to https://dmoj.ca/ and log in. (If you don''t have a DMOJ account, please
    create one following the instructions in the introduction.) Click **Problems**,
    and search for the Word Count problem code `dmopc15c7p2`. Click the search result
    to load the problem—it''s called Not a Wall of Text rather than Word Count.


    You should then see the text of the problem, as written by the problem author.
    Click **Submit Solution**, and paste our code into the text area. Be sure to select
    Python 3 as the programming language. Finally, click the **Submit** button.


    DMOJ runs tests on our code and shows us the results. For each test case, you''ll
    see a status code. *AC* stands for *accepted* and is what you want to see for
    each test case. Other codes include *WA* (*wrong answer*) and *TLE* (*time limit
    exceeded*). If you see one of these, double-check the code that you pasted, making
    sure it exactly matches the code from your text editor.


    Assuming all test cases are accepted, we should see that our score is 100/100
    and that we''ve earned 3 points for our work.


    For each problem, we''ll follow the approach that we used to solve Word Count.
    First, we''ll explore using the Python shell, learning new Python features as
    needed. Then, we''ll write a program that solves the problem. We''ll test that
    program on our computer by supplying our own test cases. Finally, we''ll submit
    the code to the judge. If any test cases fail, we''ll look over our code again
    and fix the problem.


