    print(f'Player B: {score_b} point(s).')\n```\n\nListing 6-1: Solving Card Game\n\
    \nI've introduced the constant NUM_CARDS to refer to 52 ❶. We'll use it a couple\
    \ of times in the code, and it's easier to remember what NUM_CARDS means than\
    \ what 52 means.\n\nNext we define the no_high function, including docstring,\
    \ that we've discussed in depth ❷. We'll always put our functions near the top\
    \ of our programs. This way, the functions are available to be called by any code\
