    ...     print(''*********'')

    ...     print(''*WELCOME*'')

    ...     print(''*********'')

    ...

    ```


    The structure of a function definition mirrors that of an `if` statement or loop.
    The name after `def` is the name of the function that we''re defining; here, we''re
    defining a function named `intro`. Following the name of the function, we have
