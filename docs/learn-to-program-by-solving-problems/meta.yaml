    # # 3


    # ## REPEATING CODE: DEFINITE LOOPS


    ![](img/712dd6dddc9c23a969f25d44b233585c_60_0.png)


    Computers shine when we have them repeat a process over and over. They tirelessly
    do exactly what we ask, whether it involves doing something 10, 100, or a billion
    times. In this chapter, we’ll learn about loops, statements that instruct the
    computer to repeat the execution of part of our program.


    We’ll use loops to solve three problems: tracking the location of a ball under
    a cup, counting the number of occupied parking spaces, and determining how much
    data is available on a cell phone plan.


    # ### Problem #5: Three Cups


    In this problem, we’ll track the location of a ball under a cup as the cups move.
    But the cups can move many times, so we won’t be able to write code for each move
    separately. Instead, we’ll learn about and use the for loop, which allows us to
    more easily run code for each move.


    This is DMOJ problem coci06c5p1.'
  - '[PAGE 61]


    # The Challenge


    Borko has a row of three opaque cups: one at the left (location 1), one at the
    middle (location 2), and one at the right (location 3). There is a ball under
    the cup at the left. It’s our job to keep track of the location of the ball as
    Borko swaps the locations of the cups.


    Borko can make three types of swap:


    +   - **A** Swap the left and middle cups

    - **B** Swap the middle and right cups

    - **C** Swap the left and right cups


    For example, if Borko’s first swap is type A, then he swaps the left and middle
    cups; because the ball starts at the left, this swap moves it to the middle. If
    instead his first swap is type B, then he swaps the middle and right cups; the
    left cup stays where it is, so the ball doesn’t change locations.


    # Input


    The input is one line of at most 50 characters. Each character specifies a type
    of swap that Borko makes: A, B, or C.


    # Output


    Output the final location of the ball:


    +   - 1 if the ball is at the left

    - 2 if the ball is at the middle

    - 3 if the ball is at the right


    # Why Loops?


    Consider this test case:


    ```

    ACBA

    ```


    There are four swaps here. To determine the final location of the ball, we need
    to carry out each one.

    The first swap is type A, which swaps the cups at the left and middle. Since the
    ball starts at the left, this results in the ball moving to the middle. The second
    swap is type C, which swaps the cups at the left and right. Since the ball is
    currently at the middle, this has no effect on the location of the ball. The third
    swap is type B, which swaps the cups at the middle and right. This moves the ball
    from the middle to the right. The fourth swap is type A, which swaps the cups
    at the left and middle. This has no effect on the ball. The correct output is
    therefore 3, because the ball ends up at the right.

    Notice that for each swap, we have to make a decision to determine whether the
    ball moves and, if it does, to move the ball appropriately. Making decisions is
    something we know how to do from Chapter 2. For example,'
  - "[PAGE 62]\n\nif the swap type is A and the ball is at the left, then the ball\
    \ moves to the middle. That looks like this:\n\n```\nif swap_type == 'A' and ball_location\
    \ == 1:\n    ball_location = 2\n```\n\nWe could add an elif for each other case\
    \ where the ball moves: swap type A and ball is at the middle, swap type B and\
    \ ball is at the middle, swap type B and ball is at the right, and so on. This\
    \ big if statement would be enough to handle one swap. But that’s not enough to\
    \ solve the Three Cups problem, because we could have a test case of up to 50\
    \ swaps. We’d need to repeat the if statement logic for each swap. And we certainly\
    \ wouldn’t want to copy and paste the same code 50 times. Imagine if you had made\
    \ a typo and had to fix it 50 times. Or if you suddenly became interested in test\
    \ cases with up to a million swaps. No, what we have learned so far is not going\
    \ to cut it. We need a way to walk through the swaps, performing the same logic\
    \ for each one. We need a loop.\n\n# for Loops\n\nPython’s for statement produces\
    \ *for loops*. for loops allow us to process each element of a sequence. The only\
    \ sequence type we’ve seen so far is the string. We’ll learn others as we go;\
    \ for loops work on all of them.\nHere’s our first example of a for loop:\n\n\
    ```\n>>> secret_word = 'olive'\n>>> for char in secret_word:\n...     print('Letter:\
    \ ' + char)\n...\nLetter: o\nLetter: l\nLetter: i\nLetter: v\nLetter: e\n```\n\
    \nFollowing the keyword for, we write the name of a *loop variable*. A loop variable\
    \ is one that refers to different values as a loop progresses. In a for loop on\
    \ a string, the loop variable refers to each of the string’s characters.\nI’ve\
    \ chosen the variable name char (for “character”) to remind us that the variable\
    \ refers to a character from the string. Sometimes, it’s clearer if we use a contextual\
    \ variable name. For example, in Three Cups, we could instead use the name swap_type\
    \ to remind us that it refers to a type of swap.\nAfter the variable name, we\
    \ have the keyword in and then the string that we want to loop over. In our example,\
    \ we’re looping over the string referred to by secret_word, which is 'olive'.\n\
    Like the if, elif, and else lines of an if statement, the for line ends with a\
    \ colon (:). And, also like an if statement, a for statement has an indented block\
    \ of one or more statements."
- md: "An execution of the indented statements is referred to as an *iteration* of\
    \ the loop. Here's a walk-through of what our loop does on each iteration:\n\n\
    - On the first iteration, Python sets char to refer to 'o', the first character\
    \ of 'olive'. It then runs the loop block, which consists only of the call to\
    \ print. As char refers to 'o', the output produced is Letter: o.\n- On the second\
    \ iteration, Python sets char to refer to 'l', the second character of 'olive'.\
    \ It then calls print, outputting Letter: l.\n- This process repeats three more\
    \ times, once for each remaining character in 'olive'.\n- The loop then terminates.\
    \ We have no code after the loop, so our program has finished running. If there\
    \ was additional code after the loop, then execution would continue with that\
    \ code.\n\nYou can put multiple statements in the block of a for loop. Here's\
    \ an example:\n\n```\n>>> secret_word = 'olive'\n>>> for char in secret_word:\n\
    ...     print('Letter: ' + char)\n...     print('*')\n...\nLetter: o\n*\nLetter:\
    \ l\n*\nLetter: i\n*\nLetter: v\n*\nLetter: e\n*\n```\n\nNow we have two statements\
    \ executing on each iteration of the loop: one that outputs the current letter\
    \ of the string, and one that outputs a * character.\n\nA for loop loops through\
    \ the elements of a sequence, so the sequence's length tells us how many iterations\
    \ there will be. The len function takes a string and returns its length:\n\n```\n\
    >>> len('olive')\n5\n```\n\nOur for loop on 'olive' will therefore consist of\
    \ five iterations:\n\n```\n>>> secret_word = 'olive'\n>>> print(len(secret_word),\
    \ 'iterations, coming right up!')\n>>> for char in secret_word:\n...     print('letter:\
    \ ' + char)\n...\n5 iterations, coming right up!\nLetter: o\nLetter: l\nLetter:\
    \ i\nLetter: v\nLetter: e\n```\n\nI called print with multiple arguments ❶, rather\
    \ than using concatenation, to avoid having to convert the length to a string.\n\
    A for loop is what’s called a *definite loop*, referring to the idea that the\
    \ number of iterations is predetermined. There are also *indefinite loops*, whose\
    \ iterations depend on the vagaries of what happens when your program runs. We’ll\
    \ study those in the next chapter.\n\n> CONCEPT CHECK\n\nWhat is the output of\
    \ the following code?\n\n```python\ns = 'garage'\ntotal = 0\n\nfor char in s:\n\
    \    total = total + s.count(char)\n\nprint(total)\n```\n\nA. 6\nB. 10\nC. 12\n\
    D. 36\n\nAnswer: B. For each character in 'garage', we add its count to total.\
    \ There are two g's, two a's, one r, two a's (again!), two g's (again!), and 1\
    \ e.\n\n## Nesting\n\nThe for loop block is one or more statements. Those statements\
    \ can include one-line statements such as function calls and assignment statements.\
    \ But they can also include multiline statements such as if statements and loops.\n\
    Let’s start with an example of an if statement inside a for loop. Suppose we wanted\
    \ to output only the uppercase characters from a string. Strings have an isupper\
    \ method that we can use to determine whether a character is uppercase:\n\n```\n\
    >>> 'q'.isupper()\nFalse\n>>> 'Q'.isupper()\nTrue\n```\n\nWe can use isupper in\
    \ an if statement to control what happens on each iteration of a for loop:\n\n\
    ```\n>>> title = 'The Escape'\n>>> for char in title:\n...     if char.isupper():\n\
    ...         print(char)\n...\nT\nE\n```\n\nBe careful with the indentation here.\
    \ We need one level of indentation for the for loop, and an extra level of indentation\
