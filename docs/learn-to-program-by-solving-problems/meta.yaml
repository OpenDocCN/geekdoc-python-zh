    \   if 'king' in lst:\n...         return False\n...     if 'ace' in lst:\n...\
    \         return False\n...     return True\n...\n```\n\nThe docstring begins\
    \ and ends with three double quotes (\"\"\"). Like a single quote (') or double\
    \ quote (\"), three double quotes can be used to start and end any string. A string\
    \ created with three quotes is called a *triple-quoted string*. (Three single\
    \ quotes work as well, but Python convention is to use three double quotes.) They\
    \ have the bonus of letting us add multiple lines of text to the string by just\
    \ pressing ENTER after each line; strings created with ' or \" can't span lines\
    \ like that. We use triple-quoted strings for docstrings so that we can include\
    \ as many lines as we like.\n\nThe docstring here tells us what `lst` is: it's\
    \ a list of strings representing cards. It also tells us that the function returns\
    \ a `True` or `False` value and what each return value means. This is sufficient\
    \ information to enable someone to call the function without having to look at\
    \ its code. As long as someone knows what a function does, they can just use it.\
    \ We've been using Python functions all along without ever having looked at their\
    \ code. How does `print` work? How does `input` work? We don't know! But it doesn't\
    \ matter: we know what the functions do, so we can just focus on calling them.\n\
    \nFor functions with multiple parameters, the docstring should name each one and\
    \ give its expected type. Here's `remove_all`, from \"Mutable Parameters\" in\
    \ this chapter with a suitable docstring:\n\n```\n>>> def remove_all(lst, value):\n\
    ...     \"\"\"\n...     lst is a list.\n...     value is a value.\n...\n...  \
    \   Remove all occurrences of value from lst.\n...     \"\"\"\n...     while value\
    \ in lst:\n...         lst.remove(value)\n...\n```\n\nNotice that this docstring\
    \ doesn't talk about returning anything. That's because this function doesn't\
    \ return anything useful! It removes from `lst`, which is what the docstring says\
    \ it does.\n\n## Solving the Problem\n\nWe've just learned the fundamentals of\
    \ defining and calling functions. For the rest of the book, whenever we're faced\
    \ with a large problem to solve, we'll be able to break down its solution into\
    \ smaller tasks, each of which will be solved by a function.\n\nLet's use our\
