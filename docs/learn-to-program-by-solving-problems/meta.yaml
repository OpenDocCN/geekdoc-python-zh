    \n这是DMOJ问题 dmopc17c4p1。\n\n### 挑战\n\n你有一条长度为 $n$ 单位的紫色彩带。第一单位从位置0到但不包括位置1，第二单位从位置1到但不包括位置2，依此类推。然后你执行\
