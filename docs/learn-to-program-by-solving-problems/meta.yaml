  md: "```\ndef most_common_words(num_to_words, k):\n    \"\"\"\n    num_to_words\
    \ is a dictionary mapping number of occurrences to\n        lists of words.\n\
    \    k is an integer >= 1.\n\n    Return a list of the kth most-common words in\
    \ num_to_words.\n    \"\"\"\n    nums = list(num_to_words.keys())\n    nums.sort(reverse=True)\n\
    \n    total = 0\n    i = 0\n    done = False\n    while i < len(nums) and not\
    \ done:\n        num = nums[i]\n        if total + len(num_to_words[num]) >= k:\n\
    \            done = True\n        else:\n            total = total + len(num_to_words[num])\n\
    \            i = i + 1\n\n    if total == k - 1 and i < len(nums):\n        return\
    \ num_to_words[nums[i]]\n    else:\n        return []\n```\n\n```\nn = int(input())\n\
    \nfor dataset in range(n):\n    lst = input().split()\n    m = int(lst[0])\n \
    \   k = int(lst[1])\n\n    word_to_num = {}\n\n    for i in range(m):\n      \
    \  word = input()\n        if not word in word_to_num:\n            word_to_num[word]\
    \ = 1\n        else:\n            word_to_num[word] = word_to_num[word] + 1\n\n\
    \    num_to_words = invert_dictionary(word_to_num)\n```"
