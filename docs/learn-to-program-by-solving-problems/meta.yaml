    # Problem #16: Essay Formatting


    There’s one important difference between this problem and all the problems we’ve
    solved to this point: this one requires us to read from and write to specific
    files! Look out for this as you read the problem description.

    This is USACO 2020 January Bronze Contest problem Word Processor. This is the
    first problem in the book from the USACO (USA Computing Olympiad) judge. To find
    the problem, go to http://usaco.org/, click **Contests**, click **2020 January
    Contest Results**, and then click **View problem** under Word Processor.


    # The Challenge


    Bessie the cow is writing an essay. Each word in the essay contains only lowercase
    or uppercase characters. Her teacher has specified the maximum number of characters,
    not counting spaces, that can occur per line. To satisfy this requirement, Bessie
    writes down the words of the essay using the following rules:


    +   - If the next word fits on the current line, add it to the current line. Include
    a space between each pair of words on the line.

    - Otherwise, put this word on a new line; this line becomes the new current line.


    Output the essay with the correct words on each line.


    # Input


    Read input from the file named *word.in*.

    The input consists of two lines.


    +   - The first line contains two integers separated by a space. The first integer
    is *n*, the number of words in the essay; it’s between 1 and 100. The second integer
    is *k*, the maximum number of characters (not counting spaces) that can occur
    per line; it’s between 1 and 80.

    - The second line contains *n* words, with a space between each pair of words.
    Each word has at most *k* characters.


    # Output


    Write output to the file named *word.out*.

    Output the properly formatted essay.


    # Working with Files


    The Essay Formatting problem requires that we read from file *word.in* and write
    to file *word.out*. Before we can do those things, though, we need to learn how
    to open files in our programs.'
