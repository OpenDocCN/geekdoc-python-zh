    \ He uses 1MB this month, so the excess that carries forward is 14 – 1 = 13MB.\n\
    \nWe need to know the number of megabytes that Pero has available for the next\
    \ (that is, fourth) month. He has 13MB that carry over from the first three months,\
    \ and he’s given his usual 10MB for this month, so he has a total of 13 + 10 =\
