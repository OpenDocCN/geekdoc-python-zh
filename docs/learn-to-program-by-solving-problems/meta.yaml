    >>>\n```\n\n这里重要的是，你在第一行看到的Python版本至少是3.6。如果你使用的是旧版本，特别是2.x，或者Python根本没有加载，请按照引言中的说明安装最新版本的Python。\n\
    \n在这个窗口的底部，你会看到一个`>>>` Python提示符。这是你输入Python代码的地方。永远不要自己输入`>>>`符号。编程完成后，你可以按CTRL-D退出。\n\
    \n## Linux\n\n在Linux上，请执行以下操作：\n\n1.  右键单击你的*programming*文件夹。\n2.  在弹出的菜单中，单击*在终端中打开*。（如果你更习惯，也可以打开终端并导航到你的*programming*文件夹。）\n\
    3.  在弹出窗口的底部，你会看到一行以美元符号（$）结尾。这是你的操作系统*提示符*，它正在等待你输入命令。你在这里输入操作系统命令，*而不是*Python代码。确保在每个命令后按回车键。\n\
    4.  你现在位于你的*programming*文件夹中。如果你想查看里面有什么，可以输入ls。此时不应该看到任何文件，因为我们还没有创建任何文件。\n5.\
    \  现在，输入**python3**来启动Python shell。（你也可以尝试输入python，不带3，但这可能会启动旧版本的Python 2。Python\
    \ 2不适合用于学习本书。）\n\n启动Python shell时，你应该会看到类似这样的内容：\n\n```\nPython 3.9.2 (default,\
    \ Feb 20 2021, 20:57:50)\n[GCC 7.5.0] on linux\nType \"help\", \"copyright\",\
    \ \"credits\" or \"license\" for more information.\n>>>\n```\n\n这里重要的是，你在第一行看到的Python版本至少是3.6。如果你使用的是旧版本，特别是2.x，或者Python根本没有加载，请按照引言中的说明安装最新版本的Python。\n\
    \n在这个窗口的底部，你会看到一个>>> Python提示符。这是你输入Python代码的地方。永远不要自己输入>>>符号。编程完成后，你可以按CTRL-D退出。\n\
    \n## 问题 #1：单词计数\n\n现在是我们的第一个问题了！我们将使用Python编写一个简单的单词计数程序。我们将学习如何从用户那里读取输入，处理输入以解决问题，并输出结果。我们还将学习如何在程序中操作文本和数字，利用Python内置操作，并在解决问题的过程中存储中间结果。\n\
    \n这是DMOJ问题dmopc15c7p2。\n\n## 挑战\n\n计算提供的单词数量。对于这个问题，*单词*是任何由小写字母组成的序列。例如，hello是一个单词，但像bbaabbb这样的非英语“单词”也算。\n\
    \n## 输入\n\n输入是一行文本，由小写字母和空格组成。每对单词之间恰好有一个空格，第一个单词前和最后一个单词后没有空格。\n\n该行的最大长度为80个字符。\n\
    \n## 输出\n\n输出输入行中的单词数量。\n\n## 字符串\n\n*值*是Python程序的基本构建块。每个值都有一个*类型*，类型决定了可以对该值执行的操作。在单词计数问题中，我们处理的是一行文本。文本在Python中存储为字符串值，因此我们需要学习字符串。为了解决问题，我们需要输出文本中的单词数量，因此我们还需要学习数值。让我们从字符串开始。\n\
    \n## 表示字符串\n\n*字符串*是Python中用于存储和操作文本的类型。要编写字符串值，我们将其字符放在单引号之间。请在Python shell中跟随操作：\n\
    \n```\n>>> 'hello'\n'hello'\n>>> 'a bunch of words'\n'a bunch of words'\n```\n\
    \nPython shell会回显我输入的每个字符串。当我们的字符串包含单引号作为其字符之一时会发生什么？\n\n```\n>>> 'don't say that'\n\
    \  File \"<stdin>\", line 1\n    'don't say that'\n          ^\nSyntaxError: invalid\
    \ syntax\n```\n\n单词*don't*中的单引号终止了字符串。因此，该行的其余部分*t say that*没有意义，这就是产生语法错误的原因。*语法错误*意味着我们违反了Python的规则，没有编写有效的Python代码。要解决这个问题，我们可以利用双引号也可以用来分隔字符串这一事实：\n\
    \n```\n>>> \"don't say that\"\n\"don't say that\"\n```\n\n除非字符串本身包含单引号，否则本书中不会使用双引号。\n\
    \n## 字符串运算符\n\n我们可以使用字符串来保存我们要计数单词的文本。要计数单词——或对字符串进行任何其他操作——我们需要学习如何使用字符串。\n\n\
    字符串附带了丰富的操作。其中一些操作在操作数之间使用特殊符号。例如，+运算符用于字符串连接：\n\n```\n>>> 'hello' + 'there'\n\
    'hellothere'\n```\n\n哎呀——这两个单词之间需要一个空格。让我们在第一个字符串的末尾添加一个空格：\n\n```\n>>> 'hello\
    \ ' + 'there'\n'hello there'\n```\n\n还有*运算符，它将字符串复制指定次数：\n\n```\n>>> '-' * 30\n\
    '------------------------------'\n```\n\n那里的30是一个整数值。我稍后会更详细地讨论整数。\n\n> 概念检查\n\
    \n以下代码的输出是什么？\n\n>>> '' * 3\n\nA. ''''''\nB. ''\nC. 此代码产生语法错误（无效的Python代码）\n\n\
    答案：B。''是空字符串——一个零字符的字符串。将空字符串重复三次仍然是空字符串！"
