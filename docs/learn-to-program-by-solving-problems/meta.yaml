    # Reading from a File


    To read a line from an open file, we use the file''s `readline` method. That method
    returns a string containing the contents of the next line of the file. In that
    way, it''s similar to the `input` function. Unlike `input`, however, `readline`
    reads from a file rather than from standard input.

    Let''s open *word.in* and read its two lines:


    ```

    >>> input_file = open(''word.in'', ''r'')

