    Python that doesn''t support f-strings.


    Why are we outputting line after the loop ends ❽? The reason is that each iteration
    of the for loop is guaranteed to leave line with one or more words that we have
    not output yet. Consider what happens with each word that we process. If the current
    word fits on the current line, we don''t output anything. If the current word
    doesn''t fit on the current line, then we output'
