    # 致谢


    真的吗？我又能和 No Starch Press 的团队合作了？芭芭拉·延邀请我加入。比尔·波洛克和芭芭拉信任我，让我负责本书的教学方法。我的开发编辑亚历克斯·弗里德细心、友善且及时。我感谢所有参与本书制作的人员，包括我的文字编辑金·温普塞特、制作编辑卡西·安德雷亚迪斯和封面设计师罗布·盖尔。我非常幸运。


    我感谢多伦多大学为我提供了写作的时间和空间。我感谢我的技术审阅卢卡·萨瓦克对手稿的仔细审阅。


    我感谢所有为本书中使用的题目以及整个竞赛编程领域做出贡献的人。我感谢 DMOJ 管理员对我工作的支持。


    我感谢我的父母处理了一切——*一切*。他们只让我做一件事，那就是学习。


    我感谢我的伴侣多亚莉，她为我们投入了更多时间给这本书，并以身作则地展现了写作所需的用心。


    最后，我感谢你们所有人阅读本书并渴望学习。


    # 引言


    ![](img/712dd6dddc9c23a969f25d44b233585c_6_0.png)


    我们使用计算机来完成任务和解决问题。例如，也许你曾用文字处理器写过文章或信件。也许你曾用电子表格程序来整理财务。也许你曾用图像编辑器来修饰图片。很难想象在没有计算机的情况下做这些事情。我们从文字处理器、电子表格程序和图像编辑器中获益良多。


    这些程序被编写为通用工具，以完成各种各样的任务。然而，归根结底，它们是由他人编写的程序，而不是我们自己编写的。当现成的程序不能完全满足我们的需求时，我们该怎么办？


    在本书中，我们的目标是学习如何超越最终用户使用现有程序所能做的事情，从而掌控我们的计算机。我们将编写自己的程序。我们不会编写文字处理器、电子表格或图像编辑器。这些是巨大的任务，幸运的是，人们已经完成了。相反，我们将学习如何编写小程序来解决我们原本无法解决的问题。我想帮助你学习如何向计算机传达指令；这些指令将告诉计算机如何执行你解决问题的计划。


    为了向计算机发出指令，我们使用*编程语言*编写代码。编程语言规定了我们编写的代码的规则，并决定了计算机对该代码的响应方式。


    我们将学习使用 Python 编程语言进行编程。这是你将从本书中获得的一项具体技能，可以写在你的简历上。然而，除了 Python，你还将学习使用计算机解决问题所需的思维方式。编程语言来来去去，但我们解决问题的方式不会改变。我希望本书能帮助你从最终用户走向程序员，并让你在探索可能性的过程中获得乐趣。


    ## 本书适合谁


    本书适合任何想学习如何编写计算机程序来解决问题的人。我心中有三类特定的人群。


    首先，你可能听说过 Python 编程语言，并想学习如何用 Python 编写代码。我将在下一节解释为什么 Python 是学习第一门编程语言的绝佳选择。你将在本书中学到很多关于
    Python 的知识，并且如果你下一步想阅读更高级的 Python 书籍，你将具备相应的能力。


    其次，如果你没听说过 Python，或者只是想了解编程是怎么回事，别担心：这本书也适合你！本书将教你如何思考编程。程序员有特定的方法将问题分解为可管理的部分，并用代码表达这些部分的解决方案。在这个层面上，使用哪种编程语言并不重要，因为程序员的思维方式并不局限于某种特定语言。


    最后，你可能有兴趣学习其他编程语言，如 C++、Java、Go 或 Rust。你在学习 Python 过程中附带学到的很多东西，在你学习其他编程语言时也会很有用。此外，Python
    本身也绝对值得学习。接下来让我们看看原因。


    ## 为什么学习 Python？


    多年的入门编程教学经验告诉我，Python 是学习第一门编程语言的绝佳选择。与其他语言相比，Python 代码通常更具结构性和可读性。一旦你习惯了它，你可能会同意它的部分内容读起来几乎像英语！Python
    还提供了许多其他语言不具备的功能，包括强大的数据操作和存储工具。我们将在本书中使用其中的许多功能。


    Python 不仅是一种优秀的教学语言，也是世界上最受欢迎的编程语言之一。程序员'
