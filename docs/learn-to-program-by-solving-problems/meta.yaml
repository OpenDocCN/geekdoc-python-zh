    \ Remember that the first character of a string is at index 0, not 1. We can put\
    \ that character at the end of the string like this:\n\n```\n>>> songs = 'ABCDE'\n\
    >>> songs = songs[1] + songs[2] + songs[3] + songs[4] + songs[0]\n>>> songs\n\
    'BCDEA'\n```\n\nThis is rather unwieldy and is specific to having exactly five\
