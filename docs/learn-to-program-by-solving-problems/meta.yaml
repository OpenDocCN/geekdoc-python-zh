  md: '# Nested Lists


    To this point, we''ve seen lists of integers, floats, and strings. We can also
    create lists of lists, called *nested lists*. Each value of such a list is itself
    a list. It''s common to use a variable name like grid or table to refer to a nested
    list. Here''s a Python list corresponding to Table 5-3:


    ```

    >>> grid = [[ 1, 13, 2, 1, 1, 8],

    ...         [ 2, 12, 10, 5, 11, 4],

    ...         [39, 6, 13, 52, 3, 3],

    ...         [15, 8, 6, 2, 7, 14]]

    ```


    Each list value corresponds to one row. If we index once, we get a row, which
    is itself a list:


    ```

    >>> grid[0]

    [1, 13, 2, 1, 1, 8]

    >>> grid[2]

    [39, 6, 13, 52, 3, 3]

    ```


    If we index twice, we get a single value. Here''s the value in row 1, column 2:


    ```

    >>> grid[1][2]

    10

    ```


    Working with columns is a little trickier than working with rows, because each
    column is spread over multiple lists. To access a column, we need to aggregate
    one value from each row. We can do that with a loop, which incrementally builds
    a new list representing a column. Here, I obtain column 1:


    ```

    >>> column = []

    >>> for i in range(len(grid)):

    ...     column.append(grid[i][1])

    ...

    >>> column

    [13, 12, 6, 8]

    ```


    Notice how the first index (the row) varies, but the second (the column) does
    not ❶. This picks out each value with the same column index.

    What about summing rows and columns? To sum a row, we can use the sum function.
    Here''s the sum of row 0:


    ```

    >>> sum(grid[0])

    26

    ```


    We can also use a loop, like this:


    ```

    >>> total = 0

    >>> for value in grid[0]:

    ...     total = total + value

    ```'
