    # Return Values


    Let''s come back to our Card Game problem. Our goal is to define a function that
    tells us whether there are no high cards in a list of cards. We''ll name that
    function no_high. We haven''t written no_high yet, but we can still specify what
    we hope to accomplish. Here''s what we''re after:


    ```

    >>> no_high([''two'', ''six''])

    True

    >>> no_high([''eight''])

    True

    >>> no_high([''two'', ''jack'', ''four''])

    False

    >>> no_high([''queen'', ''king'', ''three'', ''queen''])

    False

    ```


    We want the first two calls to return True, because there are no high cards in
    those lists of cards. And we want the third and fourth calls to return False,
    because there''s at least one high card in those lists of cards.

    How can we define a function that returns these True and False values? That''s
    the final piece of the function puzzle.

    To return a value from a function, we use Python''s return keyword. As soon as
    a return is reached, execution of the function terminates, and the specified value
    is returned to the caller.

    Here''s how we can write the no_high function:


    ```

    >>> def no_high(lst):

    ...     if ''jack'' in lst:

    ...         return False

    ...     if ''queen'' in lst:

    ...         return False

    ...     if ''king'' in lst:

    ...         return False

    ...     if ''ace'' in lst:

    ...         return False

    ...     return True

    ...

    ```'
