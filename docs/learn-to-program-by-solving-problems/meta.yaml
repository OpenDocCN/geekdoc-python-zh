    \ before going broke.')\n```\n\nListing 4-2: Solving Slot Machines using %\n\n\
    I've used % in the two ways described in this section: to determine the current\
    \ machine based on the number of plays ❶ and to determine whether Martha gets\
    \ paid on a play (e.g., ❷). Associating % with returning the remainder of a division\
    \ belies its flexibility. Whenever you need to count in a cycle (0, 1, 2, 0, 1,\
    \ 2), consider whether you can use % to simplify your code.\n\n## F-Strings\n\n\
    The final thing we do in our solution to Slot Machines is output the required\
