  md: 'What we haven''t learned yet is how our programs can make a decision about
    the outcome of the game. I can demonstrate why we need this through two test cases.

    First, consider this test case:


    ```

    5

    1

    3

    1

    1

    1

    ```


    The Apples scored 5 * 3 + 1 * 2 + 3 = 20 points, and the Bananas scored 1 * 3
    + 1 * 2 + 1 = 6 points. The Apples won the game, so this is the correct output:


    ```

    A

    ```


    Second, consider this test case, where the Apples'' and Bananas'' scores have
    been swapped:


    ```

    1

    1

    1

    5

    1

    3

    ```


    This time, the Bananas won the game, so this is the correct output:


    ```

    B

    ```


    Our program must be able to compare the total points scored by the Apples and
    the total points scored by the Bananas and use the result of that comparison to
    choose whether to output A, B, or T.

    We can use Python''s if statement to make these kinds of decisions. A condition
    is an expression that''s true or false, and an if statement uses conditions to
    determine what to do. if statements lead to conditional execution, so named because
    the execution of our program is influenced by conditions.

    We''ll first learn about a new type that lets us represent true or false values,
    and how we can build expressions of this type. Then, we''ll use such expressions
    to write if statements.


    # The Boolean Type


    Pass an expression to Python''s type function, and it''ll tell you the type of
    the expression''s value:


    ```

    >>> type(14)

    <class ''int''>

    ```'
