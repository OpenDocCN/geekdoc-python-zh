    \ to keep track of the ball\n```\n\nThere are three types of swaps (A, B, and\
    \ C) and three possible locations for the ball, so it's tempting to conclude that\
    \ we have to write an if statement with 3 * 3 = 9 Boolean expressions (one after\
    \ the if and one after each of eight elifs). In fact, we need only six Boolean\
    \ expressions. Three of the nine don't move the ball at all: swap type A when\
    \ the ball is at the right, swap type B when the ball is at the left, and swap\
    \ type C when the ball is at the middle.\n\nListing 3-1 has a solution to Three\
    \ Cups.\n\n```\nswaps = input()\n\nball_location = 1\n\n❶ for swap_type in swaps:\n\
    \    ❷ if swap_type == 'A' and ball_location == 1:\n        ❸ ball_location =\
    \ 2\n    elif swap_type == 'A' and ball_location == 2:\n        ball_location\
    \ = 1\n    elif swap_type == 'B' and ball_location == 2:\n        ball_location\
    \ = 3\n    elif swap_type == 'B' and ball_location == 3:\n        ball_location\
    \ = 2\n    elif swap_type == 'C' and ball_location == 1:\n        ball_location\
    \ = 3\n    elif swap_type == 'C' and ball_location == 3:\n        ball_location\
    \ = 1\n\nprint(ball_location)\n```\n\nListing 3-1: Solving Three Cups\n\nI've\
    \ used input to assign the string of swaps to the swaps variable. The for loop\
    \ ❶ loops through these swaps. Each swap is processed by the nested if statement\
    \ ❷. The if and elif branches each encode what happens with a given type of swap\
    \ and a given ball location and then move the ball accordingly. For example, if\
