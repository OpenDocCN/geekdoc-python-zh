    \ village has a smaller neighborhood? We can use a loop to process those other\
    \ villages. If we find a neighborhood that's smaller than our current smallest,\
    \ we update our current smallest to that smaller size.\n\nThe code for our solution\
    \ is in Listing 5-1.\n\n```\nn = int(input())\n\npositions = []\n\nfor i in range(n):\n\
    \    positions.append(int(input()))\n\npositions.sort()\n\nleft = (positions[1]\
    \ - positions[0]) / 2\nright = (positions[2] - positions[1]) / 2\nmin_size = left\
    \ + right\n\nfor i in range(2, n - 1):\n    left = (positions[i] - positions[i\
    \ - 1]) / 2\n    right = (positions[i + 1] - positions[i]) / 2\n    size = left\
    \ + right\n    if size < min_size:\n        min_size = size\n\nprint(min_size)\n\
    ```\n\nListing 5-1: Solving Village Neighborhood\n\nWe begin by reading n, the\
    \ number of villages, from the input. We also set positions to refer to an empty\
    \ list ❶.\n\nEach iteration of the first range for loop ❷ is responsible for reading\
    \ one village position and appending it to the positions list. It does that by\
    \ using input to read the next village position, int to convert it to an integer,\
    \ and the list method append to append that integer to the list ❸. That one line\
    \ ❸ is equivalent to these three separate lines:\n\n```\nposition = input()\n\
    position = int(position)\npositions.append(position)\n```\n\nHaving read the village\
    \ positions, we next sort them in increasing order ❹. We then find the size of\
    \ the neighborhood of the village at index 1, storing it using min_size ❺.\n\n\
    Next, in a second loop, we loop through each of the other villages whose neighborhood\
    \ sizes we need to compute ❻. Those villages start at index 2 and end at index\
    \ n - 2. (We don't want to consider the village at index n - 1, because that's\
    \ the rightmost village.) We therefore use range with a first argument of 2 (thus\
    \ starting at 2) and a second argument of n - 1 (thus ending at n - 2).\n\nInside\
    \ the loop, we calculate the size of the current village's neighborhood, exactly\
    \ as we did for the first village. The size of the smallest neighborhood that\
    \ we've found so far is referred to by min_size. Is the current village's neighborhood\
    \ smaller than our smallest so far? To answer that, we use an if statement ❼.\
    \ If this village's neighborhood is smaller than `min_size`, we update `min_size`\
    \ to the size of this neighborhood. If this village's neighborhood isn't smaller\
    \ than `min_size`, then we do nothing, because this village doesn't change the\
    \ size of the smallest neighborhood.\n\nHaving gone through all of the villages,\
    \ `min_size` must be the size of the smallest neighborhood. We therefore output\
    \ the value of `min_size`.\n\nThe \"Output\" section of this problem description\
    \ specified \"Include exactly one digit after the decimal point.\" What if the\
    \ smallest size was something like 6.25 or 8.33333? Shouldn't we do something\
    \ about that?\n\nNo. We're safe with what we've done. The only neighborhood sizes\
    \ we can get are numbers like 3.0 (with a 0 after the decimal point) and 3.5 (with\
    \ a .5 after the decimal point). Here's why. When we calculate the left part of\
    \ a neighborhood, we subtract two integers and divide that resulting integer by\
    \ 2. If we have an even integer before dividing by 2, then dividing gives us a\
    \ .0 number (no remainder). And if we have an odd integer before dividing by 2,\
    \ then dividing gives us a .5 number. The same goes for the right part of the\
    \ neighborhood: the size will be a .0 number or a .5 number. Adding the left and\
    \ right parts to get the total size is therefore guaranteed to give us another\
    \ .0 or .5 number.\n\n## Avoiding Code Duplication: Two More Solutions\n\nIt's\
    \ a little disappointing that we're including the \"compute neighborhood size\"\
    \ code both previously and in the second range for loop. In general, repeated\
    \ code is a sign that we might be able to improve the code's design. We'd like\
    \ to avoid repeated code because it adds to the amount of code that we must maintain,\
    \ and it makes it harder to fix problems in the code if it turns out that the\
    \ repeated code is flawed. Here, the repeated code seems acceptable to me (it's\
    \ only three lines), but let's talk about two ways to avoid it. These are general\
    \ approaches that you'll be able to apply to other similar problems.\n\n## Using\
    \ a Huge Size\n\nThe only reason we're calculating the size of a village's neighborhood\
    \ before the loop is so that the loop has something to compare the other neighborhood\
    \ sizes against. If we entered the loop without a value for `min_size`, we'd get\
    \ an error when the code tries to compare it to the size of the current village.\n\
    \nIf we set `min_size` to 0.0 before the loop, then the loop will never find a\
