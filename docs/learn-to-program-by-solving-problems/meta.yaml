    3.  你可以输入`ls`命令来获取当前文件夹内容的列表。你的*Desktop*应该列在那里。\n4.  输入`cd Desktop`导航到你的*Desktop*文件夹。`cd`命令代表*change\
    \ directory*；*directory*是文件夹的另一个名称。\n5.  输入`cd programming`导航到你的*programming*文件夹。\n\
