    \ $O(n^2)$ 算法。如果你的目标是设计一个 $O(n)$ 算法，那么设计一个 $O(n \\log n)$ 的算法可能就足够好了。\n\n## 处理函数调用\n\
    \n从第6章开始，我们编写了自己的函数来帮助我们设计更大的程序。在我们的大O分析中，我们需要小心地包括调用这些函数时所做的工作。\n\n让我们重新审视第6章的纸牌游戏问题。我们在清单6-1中解决了它，我们解决方案的一部分涉及调用我们的no_high函数。我在这里重现那个解决方案：\n\
    \n```\nNUM_CARDS = 52\n\n① def no_high(lst):\n    \"\"\"\n    lst is a list of\
