  md: 'To begin, we open the input file ❶ and output file ❷. Notice the modes: we
    open the input file with mode ''r'' (for reading) and open the output file with
    mode ''w'' (for writing). We could have opened the output file a little later,
    right before we use it, but I''ve chosen to open both files here to simplify the
    organization of the program. Similarly, we could close a file as soon as we no
    longer need it, but in this book, I''ve chosen to close all files together at
    the end of the program. For long-running programs that manipulate many files,
    you likely want to keep files open only when needed.


    Next, we read the first line of the input file ❸. This line contains two space-separated
    integers: n, the number of words, and k, the maximum number of allowed characters
    (not counting spaces) per line. As always with space-separated values, we use
    split to separate them. We then read the second line, which contains the essay
    words. Again we use split, this time to split the string of words into a list
    of words. That takes care of the input.


    Two variables drive the main portion of the program: line and chars_on_line. The
    line variable refers to the current line; we start out with it referring to the
    empty string ❹. The chars_on_line variable refers to the number of characters,
    not counting spaces, on the current line.


    You may wonder why I''m maintaining chars_on_line at all. Couldn''t we just use
    len(line) instead? Well, if we did that, we''d be including spaces in our count,
    and spaces don''t count toward the number of characters allowed per line. We could
    fix that by subtracting the count of spaces, and I encourage you to try that on
    your own if you find it more intuitive than keeping the chars_on_line variable
    in there.


    Now it''s time to loop through all of the words. For each word, we have to determine
    whether it goes on the current line or next line.


    If the number of nonspace characters on the current line plus the number of characters
    in the current word is at most k, then the current word fits on the current line
    ❺. In that case, we add the word plus a space to the current line and update the
    number of nonspace characters on the line.


    Otherwise, the current word doesn''t fit on the current line. The current line
    is done! We therefore write the line to the output file ❻ and update the line
    and chars_on_line variables to reflect that this is the only word on the now-current
    line.


    There are two things to note about the write call ❼. First, the [:-1] slice is
    in there to prevent us from outputting the space that follows the last word on
    the line. Second, you may have expected me to use an f-string here, like this:


