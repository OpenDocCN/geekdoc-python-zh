  md: '# The Challenge


    There are $n$ villages located at distinct points on a straight road. Each village
    is represented by an integer that indicates its position on the road.


    A village''s left neighbor is the village with the next smallest position; a village''s
    right neighbor is the village with the next biggest position. The *neighborhood*
    of a village consists of half the space between that village and its left neighbor,
    plus half the space between that village and its right neighbor. For example,
    if there''s a village at position 10, with its left neighbor at position 6 and
    its right neighbor at position 15, then this village''s neighborhood starts from
    position 8 (halfway between 6 and 10) and ends at position 12.5 (halfway between
    10 and 15).


    The leftmost and rightmost villages have only one neighbor, so the definition
    of a neighborhood doesn''t make sense for them. We''ll ignore the neighborhoods
    of those two villages in this problem.


    The *size* of a neighborhood is calculated as the neighborhood''s rightmost position
    minus the neighborhood''s leftmost position. For example, the neighborhood that
    goes from 8 to 12.5 has size $12.5 - 8 = 4.5$.


    Determine the size of the smallest neighborhood.


    # Input


    The input consists of the following lines:


    +   - A line containing integer $n$, the number of villages. $n$ is between 3
    and 100.

    - $n$ lines, each of which gives the position of a village. Each position is an
    integer between -1,000,000,000 and 1,000,000,000. The positions need not come
    in order from left to right; the neighbor of a village could be anywhere in these
    lines.


    # Output


    Output the size of the smallest neighborhood. Include exactly one digit after
    the decimal point.


    # Why Lists?


    As part of reading the input, we''ll need to read $n$ integers (the integers that
    represent the positions of the villages). We dealt with this once already when
    solving Data Plan in Chapter 3. There, we used a range for loop to loop exactly
    $n$ times. We''ll do that here, too.


    There''s one crucial difference between Data Plan and Village Neighborhood. In
    Data Plan, we read an integer, used it, and never referred to it again. We didn''t
    need to keep it around. But in Village Neighborhood, it''s not enough to see each
    integer just once. A village''s neighborhood depends on its left and right neighbors.
    Without access to those neighbors, we can''t'
  merge: -1
