    \ We therefore use slicing to remove that final space character ❼.\n\nYou're now\
    \ ready to submit to the judge.\n\nBefore continuing, you might like to try solving\
    \ exercise 3 from \"Chapter Exercises\" on page 99.\n\n## Problem #10: Secret\
    \ Sentence\n\nEven if we have a string and even if we know how much input will\
    \ be provided, a while loop may still be the required type of loop. This problem\
    \ demonstrates why this can be the case.\n\nThis is DMOJ problem coci08c3p2.\n\
    \n### The Challenge\n\nLuka is writing a secret sentence in class. He doesn't\
    \ want the teacher to be able to read it, so instead of writing down the original\
    \ sentence, he writes down an encoded version. After each vowel in the sentence\
    \ (a, e, i, o, or u), he adds the letter *p* and that vowel again. For example,\
    \ rather than write down the sentence *i like you*, he would write *ipi lipikepe\
    \ yopoupu*.\n\nThe teacher acquires Luka's encoded sentence. Recover Luka's original\
    \ sentence for the teacher.\n\n### Input\n\nThe input is one line of text, Luka's\
    \ encoded sentence. It consists of lowercase letters and spaces. There is exactly\
    \ one space between each pair of words. The maximum length of the line is 100\
    \ characters.\n\n### Output\n\nOutput Luka's original sentence.\n\n## Another\
    \ Limitation of for loops\n\nIn Chapter 3, we learned how for loops can be used\
    \ to process strings. A for loop plods through the string, from beginning to end,\
    \ one character at a time. In many cases, that's precisely what we want. In Three\
    \ Cups, for example, we needed to look at each swap from left to right, so we\
    \ used a for loop over the string of swaps.\n\nIn other cases, that's too restrictive,\
    \ and a range for loop may be more appropriate. A range for loop gives us access\
    \ to indices rather than characters. It also allows us to skip through a sequence\
    \ with whatever step size we choose. For example, we can use a range for loop\
    \ to visit every third character of a string:\n\n```\n>>> s = 'zephyr'\n>>> for\
    \ i in range(0, len(s), 3):\n...     print(s[i])\n...\nz\nh\n```\n\nWe can also\
    \ use a range for loop to process a string from right to left instead of left\
    \ to right:\n\n```\n>>> for i in range(len(s) - 1, -1, -1):\n...     print(s[i])\n\
    ...\nr\ny\nh\np\ne\nz\n```\n\nAll of this assumes that we want to step by a fixed\
    \ amount on each iteration.\n\nWhat if sometimes we want to move one character\
    \ to the right and other times we want to move three characters to the right?\
    \ That’s not at all far-fetched. In fact, if we could do that, then we’d be well\
    \ on our way to solving Secret Sentence.\n\nTo see why, consider this test case:\n\
    \nipi lipikepe yopoupu\n\nImagine that we’re reconstructing Luka’s original sentence\
    \ by copying characters to it. The first character in the encoded sentence is\
    \ the vowel i. This is the first character of Luka’s original sentence, too. Based\
    \ on how Luka encodes sentences, we know that the next two characters will be\
    \ p and i. We don’t want to include those in Luka’s original sentence, so we need\
    \ to skip them. That is, after processing index 0, we want to jump to index 3.\n\
    \nIndex 3 is a space character. Since it isn’t a vowel, we copy this character\
    \ as is to Luka’s original sentence and then move to index 4. Index 4 is l, another\
    \ nonvowel, so we copy that too and move to index 5. Here at index 5 we have another\
    \ vowel; after copying it, we want to jump to index 8.\n\nWhat’s the step size\
    \ here? Sometimes we jump by three, but not always. And sometimes we jump by one,\
    \ but not always. It’s a mix of threes and ones. for loops are not designed for\
    \ this kind of processing.\n\nWith a while loop, we can zip around a string however\
    \ we please, unencumbered by predefined step sizes.\n\n## while Loops Through\
    \ Indices\n\nWriting a while loop that loops through string indices isn’t any\
    \ different from writing any other kind of while loop. We just need to incorporate\
    \ the string’s length. Here’s how we can loop through each character of a string\
    \ from left to right:\n\n```\n>>> s = 'zephyr'\n>>> i = 0\n>>> while i < len(s):\n\
    ...     print('We have ' + s[i])\n...     i = i + 1\n...\nWe have z\nWe have e\n\
    We have p\nWe have h\nWe have y\nWe have r\n```\n\nThe variable i allows us to\
    \ access each character of the string. It begins at 0 and increases by one each\
    \ time through the loop.\n\nI used < in the loop's Boolean expression ❶ to continue\
    \ as long as we haven't reached the length of the string. Had I used <= instead\
    \ of <, we'd have received an IndexError:\n\n```\n>>> i = 0\n>>> while i <= len(s):\n\
    ...     print('We have ' + s[i])\n...     i = i + 1\n...\nWe have z\nWe have e\n\
    We have p\nWe have h\nWe have y\nWe have r\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 2, in <module>\nIndexError: string index out of range\n\
    ```\n\nThe length of the string is 6. We get this error because the loop tries\
    \ to access s[6], which is not a valid index in the string.\n\nWant to loop through\
    \ the string jumping by three characters at a time instead of one? No problem;\
    \ just increase i by 3 instead of 1:\n\n```\n>>> i = 0\n>>> while i < len(s):\n\
    ...     print('We have ' + s[i])\n...     i = i + 3\n...\nWe have z\nWe have h\n\
    ```\n\nWe can also go from right to left instead of left to right. We have to\
    \ start at len(s) - 1 instead of 0, and we have to decrease i on each iteration\
    \ rather than increase it. We also have to change the loop's Boolean expression\
    \ to detect when we're at the beginning of the string rather than the end. Here's\
    \ how we go from right to left, looping through each character:\n\n```\n>>> i\
    \ = len(s) - 1\n>>> while i >= 0:\n...     print('We have ' + s[i])\n...     i\
    \ = i - 1\n...\nWe have r\nWe have y\nWe have h\nWe have p\nWe have e\nWe have\
    \ z\n```"
