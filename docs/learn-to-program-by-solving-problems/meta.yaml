  mdcn: "## 关闭文件\n\n完成文件操作后关闭文件是一个好习惯。这向代码的读者表明该文件不再被使用。\n\n关闭文件也有助于操作系统管理计算机资源。当你使用写入方法时，写入的内容可能不会立即存入文件。相反，Python\
    \ 或操作系统可能会等待积累一批写入请求，然后一次性写入。关闭已写入的文件可以确保你写入的内容安全地存储在文件中。\n\n要关闭文件，请调用其 `close`\
    \ 方法。以下是打开文件、读取一行并关闭它的示例：\n\n```\n>>> input_file = open('word.in', 'r')\n>>> input_file.readline()\n\
    '12 13\\n'\n>>> input_file.close()\n```\n\n一旦关闭文件，你就无法再从该文件读取或写入：\n\n```\n>>>\
    \ input_file.readline()\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nValueError: I/O operation on closed file.\n```\n\n## 解决问题\n\
    \n回到文章格式化问题。现在我们知道如何从 *word.in* 读取并写入 *word.out*。这解决了输入和输出要求。是时候处理问题本身了。\n\n让我们先通过一个测试用例来确保我们理解如何解决这个问题。然后我们将查看代码。\n\
    \n## 探索测试用例\n\n这是我一直在使用的 *word.in* 文件：\n\n```\n12 13\nperhaps better poetry will\
    \ be written in the language of digital computers\n```\n\n共有 12 个单词，一行中最大字符数（不计空格）为\
    \ 13。我们应该将单词添加到当前行，只要它们放得下；一旦一个单词放不下，我们就用该单词开始新的一行。\n\n单词 *perhaps* 包含七个字符，所以它适合放在第一行。单词\
    \ *better* 包含六个字符。我们也可以把它放在第一行；加上已有的 *perhaps*，总共是 13 个字符（不包括两个单词之间的空格）。\n\n单词\
    \ *poetry* 无法放在第一行，所以我们用 *poetry* 作为第一个单词开始新的一行。单词 *will* 可以放在第二行的 *poetry* 旁边。类似地，*be*\
    \ 可以放在 *will* 旁边。到目前为止，我们有 12 个非空格字符。现在我们有单词 *written*，而第二行只有一个字符的空间，我们被迫用 *written*\
    \ 作为第一个单词开始下一行。\n\n按照这个过程进行到底，我们需要写入 *word.out* 的完整文章如下：\n\n```\nperhaps better\n\
    poetry will be\nwritten in the\nlanguage of\ndigital\ncomputers\n```\n\n## 代码\n\
    \n我们的解决方案在清单 7-1 中。\n\n```\n1 input_file = open('word.in', 'r')\n2 output_file\
    \ = open('word.out', 'w')\n\n3 lst = input_file.readline().split()\n   n = int(lst[0])\
    \  # n not needed\n   k = int(lst[1])\n   words = input_file.readline().split()\n\
    \n4 line = ''\n   chars_on_line = 0\n\n   for word in words:\n       5 if chars_on_line\
    \ + len(word) <= k:\n           line = line + word + ' '\n           chars_on_line\
    \ = chars_on_line + len(word)\n       else:\n           6 output_file.write(line[:-1]\
    \ + '\\n')\n           line = word + ' '\n           chars_on_line = len(word)\n\
    \n7 output_file.write(line[:-1] + '\\n')\n\ninput_file.close()\noutput_file.close()\n\
    ```\n\n清单 7-1：解决文章格式化问题\n\n首先，我们打开输入文件 ❶ 和输出文件 ❷。注意模式：我们以模式 `'r'`（用于读取）打开输入文件，以模式\
    \ `'w'`（用于写入）打开输出文件。我们本可以稍后打开输出文件，就在使用它之前，但我选择在这里打开两个文件以简化程序的组织。同样，我们可以在不再需要文件时立即关闭它，但在本书中，我选择在程序结束时一起关闭所有文件。对于处理许多文件的长时间运行程序，你可能希望只在需要时才保持文件打开。\n\
    \n接下来，我们读取输入文件的第一行 ❸。这一行包含两个以空格分隔的整数：`n`，单词数量，和 `k`，每行允许的最大字符数（不计空格）。与往常一样，对于以空格分隔的值，我们使用\
    \ `split` 来分隔它们。然后我们读取第二行，其中包含文章单词。我们再次使用 `split`，这次是将单词字符串分割成单词列表。这解决了输入部分。\n\
    \n两个变量驱动程序的主要部分：`line` 和 `chars_on_line`。`line` 变量指的是当前行；我们开始时让它指向空字符串 ❹。`chars_on_line`\
    \ 变量指的是当前行上的字符数，不计空格。\n\n你可能想知道为什么我要维护 `chars_on_line`。我们不能直接使用 `len(line)` 吗？嗯，如果我们那样做，我们会在计数中包含空格，而空格不计入每行允许的字符数。我们可以通过减去空格的数量来解决这个问题，如果你觉得这比保留\
    \ `chars_on_line` 变量更直观，我鼓励你自己尝试一下。\n\n现在是时候遍历所有单词了。对于每个单词，我们必须确定它是放在当前行还是下一行。\n\
    \n如果当前行上的非空格字符数加上当前单词的字符数最多为 `k`，那么当前单词适合放在当前行 ❺。在这种情况下，我们将单词加一个空格添加到当前行，并更新行上的非空格字符数。\n\
    \n否则，当前单词不适合放在当前行。当前行完成了！因此，我们将该行写入输出文件 ❻，并更新 `line` 和 `chars_on_line` 变量以反映这是现在当前行上的唯一单词。\n\
    \n关于 `write` 调用 ❼ 有两点需要注意。首先，`[:-1]` 切片是为了防止我们输出行末最后一个单词后面的空格。其次，你可能期望我在这里使用 f-string，像这样：\n\
    \n```\noutput_file.write(f'{line[:-1]}\\n')\n```\n\n然而，在撰写本文时，USACO 评测系统运行的是一个较旧版本的\
    \ Python，不支持 f-string。\n\n为什么我们在循环结束后输出 `line` ❽？原因是 `for` 循环的每次迭代都保证 `line` 中包含一个或多个我们尚未输出的单词。考虑我们处理每个单词时发生的情况。如果当前单词适合放在当前行，我们不输出任何内容。如果当前单词不适合放在当前行，那么我们输出当前行，但不输出下一行的单词。因此，我们需要在循环*之后*将\
    \ `line` 写入输出文件；否则，文章的最后一行将会丢失。\n\n我们最后做的是关闭两个文件。\n\n写入文件而不是屏幕的一个烦人之处是，运行程序时我们看不到输出。要查看输出，我们必须在文本编辑器中打开输出文件。\n\
    \n这里有一个提示：使用 `print` 调用而不是 `write` 调用来开发程序，这样所有输出都会显示在屏幕上。这应该使你更容易找到程序中的错误，而不必在代码和输出文件之间来回切换。一旦你对代码满意，你可以将\
    \ `print` 调用改回 `write` 调用。然后一定要做更多的测试，以确保所有内容都按预期存入文件。\n\n我们准备好提交给 USACO 评测系统了。发送我们的代码！所有测试用例都应该通过。\n\
    \n## 问题 #17：农场播种\n\n我们可以使用循环从文件中读取指定数量的行。我们将在本题中这样做，并且我们将看到它类似于使用循环和 `input` 从标准输入读取。\n\
    \n在第 6 章中，当我们解决“动作人偶”问题时，我们学习了使用函数的自顶向下设计。这是一个重要的技能，组合多个函数来解决问题。由于关于文件没有更多内容可说，我选择了一个既适合自顶向下设计又适合练习的问题。\n\
    \n这是一个具有挑战性的问题。我们首先需要确切理解我们被要求做什么。之后，我们需要开发一种解决问题的方法，并仔细思考为什么我们的解决方案是正确的。\n\n\
    这是 USACO 2019 年二月铜级竞赛的问题“伟大的重新植被”。\n\n### 挑战\n\n农夫约翰有 *n* 个牧场，他都想种上草。牧场编号为 1,\
    \ 2, . . . , *n*。\n\n农夫约翰有四种不同类型的草种，编号为 1, 2, 3 和 4。他将为每个牧场选择其中一种草类型。\n\n农夫约翰还有\
    \ *m* 头奶牛。每头奶牛有两个它吃草的最爱牧场。每头奶牛只关心它的两个最爱牧场，不关心其他牧场。为了健康的饮食，每头奶牛要求它的两个牧场有不同类型的草。例如，对于某头给定的奶牛，如果它的一个牧场有草类型\
    \ 1，另一个有草类型 4，那是可以的。但如果它的两个牧场都有草类型 1，那就不行了。\n\n一个牧场可能是多头奶牛的最爱。但保证一个牧场最多是三头奶牛的最爱。"
