    \ used to pay for the school trip (the other 50 percent is used to pay for the\
    \ brunch itself).\n\nWe are told the cost of the school trip, the proportion of\
    \ students in each year, and the total number of students. Determine whether the\
    \ students need to raise more money for the school trip.\n\n### Input\n\nThe input\
    \ consists of 10 test cases, with three lines per test case (30 lines in all).\
    \ Here are the three lines for each test case:\n\n- The first line contains the\
