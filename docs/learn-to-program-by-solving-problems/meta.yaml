    \ depends on *n*. The loops are sequential, not nested, so their work is added\
    \ rather than multiplied.\n\n## Log Time\n\nIn \"Efficiency of Our Program\" on\
    \ page 255, we discussed the difference between linear search and binary search.\
    \ A linear search finds a value in a list by searching the list from beginning\
