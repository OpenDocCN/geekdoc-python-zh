    \ everything ends up in the file as it should.\n\nWe're ready to submit to the\
    \ USACO judge. Send it our code! All test cases should pass.\n\n## Problem #17:\
    \ Farm Seeding\n\nWe can use a loop to read a specified number of lines from a\
    \ file. We'll do that in this problem, and we'll see that it's similar to using\
    \ a loop with input to read from standard input.\n\nIn Chapter 6, when we solved\
    \ Action Figures, we learned about top-down design using functions. It's an important\
