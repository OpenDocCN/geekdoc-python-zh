    \nprint()\n```\n\nListing 8-6: Solving Common Words\n\nThe first function is invert_dictionary.\
    \ We've already discussed that, in “Inverting a Dictionary” earlier in this chapter.\
    \ We'll now go through each other piece of the program.\n\n# Adding the Suffix\n\
    \nThe with_suffix function ❶ takes a number and returns a string with the correct\
