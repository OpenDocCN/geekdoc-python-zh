    \n我们需要知道 Pero 下个月（即第四个月）可用的兆字节数。他有从前三个月结转的 13MB，并且他获得了本月通常的 10MB，因此他总共有 13 + 10\
    \ = 23MB 可用。\n\n当我根据这个解释编写代码时，我忽略了加上最后的 10，因此我的输出是 13 而不是 23。我完全专注于剩余量，忘记了我们需要的不是进入下个月的剩余量，而是可用的总兆字节数。这个总数是剩余量加上\
