  md: "# Solving the Problem\n\nWe're ready to solve Cow Baseball using binary search.\
    \ See Listing 9-7 for the code.\n\n```\nfrom bisect import bisect_left, bisect_right\n\
    \ninput_file = open('baseball.in', 'r')\noutput_file = open('baseball.out', 'w')\n\
    \nn = int(input_file.readline())\n\npositions = []\n\nfor i in range(n):\n   \
    \ positions.append(int(input_file.readline()))\n\npositions.sort()\n\ntotal =\
    \ 0\n\nfor i in range(len(positions)):\n    for j in range(i + 1, len(positions)):\n\
    \        diff = positions[j] - positions[i]\n        low = positions[j] + diff\n\
    \        high = positions[j] + 2 * diff\n        left = bisect_left(positions,\
    \ low)\n        right = bisect_right(positions, high)\n        total = total +\
    \ right - left\n\noutput_file.write(str(total) + '\\n')\n\ninput_file.close()\n\
    output_file.close()\n```\n\n*Listing 9-7: Using binary search*\n\nTo begin, we\
    \ import the bisect_left and bisect_right functions from the bisect module so\
