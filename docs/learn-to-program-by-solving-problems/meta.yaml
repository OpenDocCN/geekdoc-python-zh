    # Problem #23: Cow Baseball


    To end this chapter, I’ve chosen a problem where we’ll need to bump up our algorithm
    design skills beyond complete search. As you read the problem, notice that there’s
    not all that much input. That generally signals the effectiveness of a complete-search
    algorithm. But not this time, because of the amount of searching that such an
    algorithm has to do through this input. The difficulty boils down to having too
    many nested loops. Why do the nested loops bite us here? What can we do about
    it? Read on!


    This is USACO 2013 December Bronze Contest problem Cow Baseball.


    # The Challenge


    Farmer John has *n* cows. They are standing in a row, each at a distinct integer
    position. They are having fun throwing a baseball around.


    Farmer John is watching the antics. He observes that cow *x* throws the ball to
    some cow *y* to its right, and then that cow *y* throws the ball to some cow *z*
    to its right. He also knows that the distance of the second throw is at least
    the distance of the first throw and at most twice the distance of the first throw.
    (For example, if the first throw is distance 5, then the second throw is at least
    distance 5 and at most distance 10.)


    Determine the number of (*x*, *y*, *z*) triples of cows that satisfy Farmer John’s
    observations.


    # Input


    Read input from the file named *baseball.in*.


    The input consists of the following lines:


    +   - A line containing *n*, the number of cows. *n* is between 1 and 1,000.

    - *n* lines, each of which gives the position of a cow. All positions are unique,
    and each is between 1 and 100,000,000.'
