    # # 9


    # ## DESIGNING ALGORITHMS WITH COMPLETE SEARCH


    ![](img/712dd6dddc9c23a969f25d44b233585c_250_0.png)


    An *algorithm* is a sequence of steps that solves a problem. For each problem
    in this book, we solved it by writing an algorithm in the form of Python code.
    We’ll focus in this chapter on designing algorithms. When faced with a new problem,
    sometimes it’s hard to know what to do to solve it. What algorithm should we write?
    Fortunately, we don’t need to start from scratch each time. Computer scientists
    and programmers have identified several general types of algorithms, and it’s
    likely that at least one of them can be used to solve our problem.


    One type of algorithm is called a *complete search* algorithm; it involves trying
    all candidate solutions and choosing the best one. For example, if the problem
    asks us to find a maximum, we try all solutions and choose the largest; if the
    problem asks us to find a minimum, we try all solutions and choose the smallest.
    Complete-search algorithms are also known as *brute-force* algorithms, but I’ll
    avoid that term. It’s true that the computer is'
  - '[PAGE 251]


    powering its way through, checking solution after solution, but there''s nothing
    brute force about what we''re doing as algorithm designers.


    We used a complete-search algorithm to solve Village Neighborhood in Chapter 5.
    We were asked to find the smallest size of the neighborhoods, and we did that
    by looking at each neighborhood and remembering the size of the smallest one.
    In this chapter, we''ll use complete-search algorithms to solve other problems.
    We''ll see that it can take considerable ingenuity to determine what exactly to
    search.


    We''ll solve two problems using complete search: determining which lifeguard to
    fire and identifying the minimum cost to meet ski training camp requirements.
    Then we''ll see a third problem, counting triples of cows that meet given observations,
    that requires we go a little further.


    # Problem #21: Lifeguards


    In this problem, we''ll need to determine which lifeguard to fire that leaves
    us with the maximum schedule coverage of a pool. We''ll try separately firing
    each one and observing the results—that''s a complete-search algorithm!


    This is USACO 2018 January Bronze Contest problem Lifeguards.


    # The Challenge


    Farmer John has purchased a swimming pool for his cows. The pool is open from
    time 0 to time 1000.


    Farmer John hires $n$ lifeguards to monitor the pool. Each lifeguard monitors
    the pool for a given interval of time. For example, a lifeguard might start at
    time 2 and end at time 7. I''ll denote such an interval as 2–7. The number of
    units of time covered by an interval is the ending time minus the starting time.
    For example, the lifeguard whose time interval is 2–7 covers $7 - 2 = 5$ units
    of time. Those time units are from time 2 to 3, 3 to 4, 4 to 5, 5 to 6, and 6
    to 7.


    Unfortunately, Farmer John only has enough money to pay for $n - 1$ lifeguards,
    not $n$ lifeguards, so he must fire one lifeguard.


    Determine the maximum number of units of time that can still be covered after
    firing one lifeguard.


    # Input


    Read input from the file named `lifeguards.in`.


    The input consists of the following lines:


    +   - A line containing $n$, the number of lifeguards who were hired. $n$ is between
    1 and 100.

    - $n$ lines, one per lifeguard. Each line gives the time when the lifeguard starts,
    a space, and the time when the lifeguard ends. The start and end times are all
    between 0 and 1,000 and are all distinct.'
