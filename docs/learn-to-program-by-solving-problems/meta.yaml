    \n```\n>>> r = input()\n4\n>>> h = input()\n6\n```\n\ninput 函数总是返回一个字符串，即使用户输入的是整数：\n\
    \n```\n>>> r\n'4'\n>>> h\n'6'\n```\n\n单引号确认这些值是字符串。字符串不能用于执行数学计算。如果我们尝试，会得到一个错误：\n\
    \n```\n>>> (PI * r ** 2 * h) / 3\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nTypeError: unsupported operand type(s) for **\
    \ or pow(): 'str' and 'int'\n```\n\n当我们使用错误类型的值时，会生成 TypeError。Python 反对我们对字符串\
