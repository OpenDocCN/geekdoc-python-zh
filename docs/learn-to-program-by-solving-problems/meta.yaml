    \ general, if the left endpoint of a box is ever less than the right endpoint\
    \ of the previous box, we return False. Otherwise, if all of these checks pass,\
    \ we return True.\n\nHere's the code:\n\n```\ndef all_endpoints_ok(endpoints):\n\
    \    \"\"\"\n    endpoints is a list, where each value is a list of two values:\n\
