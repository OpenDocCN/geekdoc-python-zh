    # Problem #1: Word Count


    Now it''s time for our first problem! We''re going to use Python to write a little
    word-count program. We''ll learn how to read input from the user, process the
    input to solve the problem, and output the result. We''ll also learn how to manipulate
    text and numbers in our programs, make use of built-in Python operations, and
    store intermediate results on our way to the solution.

    This is DMOJ problem dmopc15c7p2.


    # The Challenge


    Count the number of words provided. For this problem, a *word* is any sequence
    of lowercase letters. For example, hello is a word, but so are non-English "words"
    like bbaabbb.


    # Input


    The input is one line of text, consisting of lowercase letters and spaces. There
    is exactly one space between each pair of words, and there are no spaces before
    the first word or after the last word.

    The maximum length of the line is 80 characters.'
