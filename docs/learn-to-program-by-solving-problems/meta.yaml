  md: '# String Methods


    A *method* is an operation specific to a type of value. Strings have a large number
    of methods. For example, there''s a method called upper, which produces the uppercase
    version of a string:


    ```

    >>> ''hello''.upper()

    ''HELLO''

    ```


    The information we get back from a method is known as the method''s *return value*.
    For example, we could say for the previous example that upper returned the string
    ''HELLO''.


    Performing a method on a value is known as *calling* the method. Calling a method
    involves placing the *dot operator* (.) between the value and the method name.
    It also requires parentheses after the method name. For some methods, we leave
    those parentheses empty, as when calling upper.


    For other methods, we can optionally include information there. Still other methods
    require information and won''t work at all without it. Information we include
    when calling a method is referred to as the method''s *arguments*.


    For example, strings have a strip method. If called with no arguments, strip removes
    all leading and trailing spaces from a string:


    ```

    >>> ''   abc''.strip()

    ''abc''

    >>> ''   abc   ''.strip()

    ''abc''

    >>> ''abc''.strip()

    ''abc''

    ```


    But we can also call it with a string as the argument. If we do, that argument
    determines which characters are stripped from the beginning and the end:


    ```

    >>> ''abc''.strip(''a'')

    ''bc''

    >>> ''abca''.strip(''a'')

    ''bc''

    >>> ''abca''.strip(''ac'')

    ''b''

    ```


    Let''s talk about one more string method: count. We pass it a string argument,
    and it tells us how many occurrences of that argument are found in our string:


    ```

    >>> ''abc''.count(''a'')

    1

    >>> ''abc''.count(''q'')

    0

    ```'
