    \n*切片*是 Python 的一个特性，它让我们可以引用字符串的子字符串。（事实上，它适用于任何序列，正如我们将在本书后面看到的那样。）它接受两个索引：我们想要开始的索引，以及我们想要结束的索引右边一个的位置。例如，如果我们使用索引\
