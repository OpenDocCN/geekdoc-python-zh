  md: 'What''s unexpected here is the \n at the end of each string. We certainly didn''t
    see that when using input to read a line. The \ symbol in a string is an *escape
    character*. It escapes from the standard interpretation of characters and changes
    their meaning. We don''t treat \n as the two separate characters \ and n. Instead,
    \n is just one character: a newline character. All lines in a file, perhaps except
    for the last, end with a newline character. If they didn''t, then everything would
    be on a single line! The readline method is literally giving us the entire line,
    including its terminating newline character.


    Here''s how we can embed newlines in our own strings:


    ```

    >>> ''one\ntwo\nthree''

    ''one\ntwo\nthree''

    >>> print(''one\ntwo\nthree'')

    one

    two

    three

    ```


    The Python shell doesn''t process the effects of escape characters, but print
    does.


    The \n sequence is useful in strings because it helps us add multiple lines. But
    we rarely want those newlines in the lines that we read from files. To get rid
    of them, we can use the string rstrip method. This method is like strip except
    that it removes whitespace only from the right of a string (not the left). As
    far as it''s concerned, newlines are whitespace just like spaces:


    ```

    >>> ''hello\nthere\n\n''

    ''hello\nthere\n\n''

    >>> ''hello\nthere\n\n''.rstrip()

    ''hello\nthere''

    ```


    Let''s try reading from the file again, this time stripping out the newlines:


    ```

    >>> input_file = open(''word.in'', ''r'')

    >>> input_file.readline().rstrip()

    ''12 13''

    >>> input_file.readline().rstrip()

    ''perhaps better poetry will be written in the language of digital computers''

    ```


    At this point, we''ve read the two lines, so there''s nothing left to read from
    the file. The readline method signals this by returning an empty string.


    ```

    >>> input_file.readline().rstrip()

    ''''

    ```


    The empty string means that we''ve reached the end of the file. If we want to
    read the lines again, we have to reopen the file to start at its beginning.'
