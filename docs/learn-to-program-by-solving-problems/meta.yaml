  md: '# # 8


    # ## ORGANIZING VALUES USING SETS AND DICTIONARIES


    ![](img/712dd6dddc9c23a969f25d44b233585c_216_0.png)


    A Python list is useful whenever we need to store a sequence of values, such as
    the heights of action figures or the words in an essay. Lists make it easy for
    us to keep values in order and access a value given its index. As we’ll see in
    this chapter, though, there are operations that lists are not optimized for, including
    identifying whether a specific value is in a collection and making associations
    between pairs of values.


    In this chapter, we’ll learn about Python sets and dictionaries, two alternatives
    to lists for storing collections of values. We’ll see that a set can be the tool
    of choice when we need to search for specific values and don’t care about their
    order and that a dictionary can be the tool of choice whenever we need to work
    with pairs of values.


    We’ll solve three problems using these new collections: determining the number
    of unique email addresses, finding common words in a list of words, and determining
    the number of special pairs of cities and states.'
