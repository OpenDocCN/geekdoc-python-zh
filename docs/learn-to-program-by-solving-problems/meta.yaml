    \nThis is USACO 2019 February Bronze Contest problem The Great Revegetation.\n\
    \n### The Challenge\n\nFarmer John has *n* pastures, all of which he would like\
    \ to seed with grass. The pastures are numbered 1, 2, . . . , *n*.\n\nFarmer John\
