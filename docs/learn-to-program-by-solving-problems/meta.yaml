    \ in check in our set-based solution. Where did it go? It seems that we’re adding\
    \ each email address to the set without even making sure that it’s not already\
    \ there.\n\nWe can get away without the in check when using a set because a set\
    \ never contains duplicates. The add method handles the in check for us, ensuring\
