    >>> bisect_right([10, 50, 80, 80, 100], 15)

    1

    >>> bisect_left([10, 50, 80, 80, 100], 81)

    4

    >>> bisect_right([10, 50, 80, 80, 100], 81)

    4

    >>> bisect_left([10, 50, 80, 80, 100], 986)

    5

    >>> bisect_right([10, 50, 80, 80, 100], 986)

    5

    ```


    Let''s use bisect_right on our list of seven positions from "Sorting First" earlier
    in this chapter. We''ll find the index of the leftmost position that''s greater
    than 21:


    ```

    >>> positions = [1, 6, 11, 14, 16, 18, 23]

    >>> bisect_right(positions, 21)

    6

    ```


    There we go: that''s what we can use to replace the second while loop in Listing
    9-6.

    The stunning speed of binary search is hard to appreciate using these tiny examples.
    Time to get real. We''ll search one million times for the rightmost value in a
    list of length 1000000. Don''t look away when you run this code. You might miss
    it.


    ```

    >>> lst = list(range(1, 1000001))

    >>> for i in range(1000000):

    ...     where = bisect_left(lst, 1000000)

    ...

    ```


    On my computer, that takes about a second. You might be wondering what would happen
    if you replaced the binary search with a call to the list index method. If you
    try it, you''ll literally wait hours for the code to run. That''s because index,
    like the in operator, does a linear search through the list. (See "Efficiency
    of Searching a List" in Chapter 8 for more on this.) It has no guarantee that
    the list is sorted, so it can''t perform a blazing-fast binary search. It has
    to go through the values one by one, comparing each of them to the value we''re
    searching for. If you have a sorted list and you want to find values in it, binary
    search is unstoppable.'
