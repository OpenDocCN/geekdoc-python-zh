  md: 'Back to the top of the loop: is num < 5 still True? It is, because num is only
    2. That kicks off another iteration of the loop, which outputs 2 and increases
    num to 3.


    This pattern continues, with two more iterations of the loop: one when num refers
    to 3 and one when num refers to 4. When num refers to 5, the num < 5 Boolean expression
    is finally False, which terminates the loop.


    It’s important that we remember to increase num ③. A for loop automatically steps
    our loop variable through the appropriate values. But, again, we get nothing for
    free in a while loop and must update variables ourselves to bring us closer and
    closer to loop termination. If we forget to increase num, this happens:


    ```

    >>> num = 0

    >>> while num < 5:

    ...     print(num)

    ...

    0

    0

    0

    0

    0

    0

    0

    0

    ... forever

    ```


    If you run this code on your computer, your screen will fill up with zeros, and
    you’ll have to terminate your program. You can do that by pressing CTRL-C or by
    closing the Python window.


    The problem is that num < 5 stays True forever; nothing in the loop can ever make
    it False. This situation, where a loop never terminates, is called an infinite
    loop. It’s surprisingly easy to inadvertently produce infinite while loops. If
    you see the same values repeating or your program appears to be doing nothing
    at all, it’s likely that you’re stuck in an infinite loop. Carefully check the
    while loop’s Boolean expression and that the loop block is making progress toward
    termination.


    We can do whatever we like with the num variable. Here’s a while loop counting
    up by three:


    ```

    >>> num = 0

    >>> while num < 10:

    ...     print(num)

    ...     num = num + 3

    ...

    0

    3

    6

