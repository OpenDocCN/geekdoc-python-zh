    \        if not num in inverted:\n            inverted[num] = [key]\n        else:\n\
    \            inverted[num].append(key)\n    return inverted\n```\n\n*Listing 8-5:\
    \ Inverting a dictionary*\n\nWe're using a for loop over the dictionary d ❶, which\
