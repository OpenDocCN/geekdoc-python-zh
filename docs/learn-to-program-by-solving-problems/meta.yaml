    \ probably in your next job interview!\n\nWe also solved two problems where we\
    \ needed to design very efficient algorithms. Not only were we able to do that,\
    \ but we were also able to use big O to obtain a satisfying understanding of exactly\
    \ why our code was so efficient.\n\n## Chapter Exercises\n\nHere are some exercises\
    \ for you to try. For each, use big O to determine whether your proposed algorithm\
    \ is efficient enough to solve the problem within the time limit. You might also\
    \ like to implement algorithms that you know are going to be too slow. That would\
    \ give you extra practice solidifying your Python knowledge and confirm that your\
    \ big O analysis was spot-on!\n\nSome of these problems are quite challenging.\
    \ There are two reasons. First, you might agree based on your work throughout\
