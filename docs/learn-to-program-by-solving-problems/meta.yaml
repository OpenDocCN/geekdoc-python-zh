    \ load at all, please install a recent version of Python following the instructions\
    \ in the introduction.\n\nAt the bottom of this window, you'll see a >>> Python\
    \ prompt. This is where you type Python code. Never type the >>> symbols yourself.\
    \ Once you're done programming, you can press CTRL-D to quit.\n\n## Problem #1:\
    \ Word Count\n\nNow it's time for our first problem! We're going to use Python\
    \ to write a little word-count program. We'll learn how to read input from the\
    \ user, process the input to solve the problem, and output the result. We'll also\
    \ learn how to manipulate text and numbers in our programs, make use of built-in\
    \ Python operations, and store intermediate results on our way to the solution.\n\
    \nThis is DMOJ problem dmopc15c7p2.\n\n## The Challenge\n\nCount the number of\
    \ words provided. For this problem, a *word* is any sequence of lowercase letters.\
    \ For example, hello is a word, but so are non-English \"words\" like bbaabbb.\n\
    \n## Input\n\nThe input is one line of text, consisting of lowercase letters and\
    \ spaces. There is exactly one space between each pair of words, and there are\
    \ no spaces before the first word or after the last word.\n\nThe maximum length\
    \ of the line is 80 characters.\n\n## Output\n\nOutput the number of words in\
    \ the input line.\n\n## Strings\n\n*Values* are a fundamental building block of\
    \ Python programs. Each value has a *type*, and the type determines the operations\
    \ that can be performed on the value. In the Word Count problem, we're working\
    \ with a line of text. Text is stored as a string value in Python, so we'll need\
    \ to learn about strings. To solve the problem, we output the number of words\
    \ in the text, so we also need to learn about numeric values. Let's begin with\
    \ strings.\n\n## Representing Strings\n\nA *string* is the Python type that's\
    \ used to store and manipulate text. To write a string value, we place its characters\
    \ between single quotes. Follow along in the Python shell:\n\n```\n>>> 'hello'\n\
    'hello'\n>>> 'a bunch of words'\n'a bunch of words'\n```\n\nThe Python shell echoes\
    \ each string that I've typed. What happens when our string has a single quote\
    \ as one of its characters?\n\n```\n>>> 'don't say that'\n  File \"<stdin>\",\
    \ line 1\n    'don't say that'\n          ^\nSyntaxError: invalid syntax\n```\n\
    \nThe single quote in the word *don't* terminates the string. The rest of the\
    \ line, *t say that*, therefore doesn't make sense, and that's what generates\
    \ the syntax error. A *syntax error* means that we have violated the rules of\
    \ Python and have not written valid Python code. To fix this, we can take advantage\
    \ of the fact that double quotes can also be used to delimit strings:\n\n```\n\
    >>> \"don't say that\"\n\"don't say that\"\n```\n\nUnless the string in question\
    \ has a single quote, I won't use double quotes in this book.\n\n## String Operators\n\
    \nWe can use a string to hold the text whose words we want to count. To count\
    \ the words—or to do anything else with strings—we need to learn how to work with\
    \ strings.\n\nStrings come with a rich variety of operations that we can perform.\
    \ Some of them use special symbols between their operands. For example, the +\
    \ operator is used for string concatenation:\n\n```\n>>> 'hello' + 'there'\n'hellothere'\n\
    ```\n\nOops—we need a space between those two words. Let’s add one to the end\
    \ of the first string:\n\n```\n>>> 'hello ' + 'there'\n'hello there'\n```\n\n\
    There’s also the * operator, which replicates a string a specified number of times:\n\
    \n```\n>>> '-' * 30\n'------------------------------'\n```\n\nThat 30 there is\
    \ an integer value. I’ll have more to say about integers shortly.\n\n> CONCEPT\
    \ CHECK\n\nWhat is the output of the following code?\n\n>>> '' * 3\n\nA. ''''''\n\
    B. ''\nC. This code produces a syntax error (invalid Python code)\n\nAnswer: B.\
    \ '' is the empty string—a string of zero characters. Repeating an empty string\
    \ three times is still an empty string!"
