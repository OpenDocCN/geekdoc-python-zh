    Want the neighbors of the village at position 4? Just look immediately to the
    left and immediately to the right: 1 and 15. The neighbors of the village at 15?
    Boom, they’re right there—4 and 19. No more searching all over the place. We’ll
    sort the list of village positions to simplify our code.

    We can add to a list using the append method and sort a list using the sort method.
    We’ll learn these two methods, and a few others that you’ll likely find useful
    as you continue working with lists, and then we’ll come back to solve Village
    Neighborhood.


    # Adding to a List


    The append method *appends* to a list, which means that it adds a value to the
    end of the values already there. Here’s append adding three village positions
    to an initially empty list:


    ```

    >>> positions = []

    >>> positions.append(20)

    >>> positions

    [20]

    >>> positions.append(50)

    >>> positions

    [20, 50]

    >>> positions.append(4)

    >>> positions

    [20, 50, 4]

    ```


    Notice that we’re using append without using an assignment statement. The append
    method doesn’t return a list; it modifies an existing list.

    It’s a common error to use an assignment statement with a method that changes
    a list. Making this error results in the list being lost, like this:


    ```

    >>> positions

    [20, 50, 4]

    >>> positions = positions.append(19)

    >>> positions

    ```


    Nothing is there! Technically, positions now refers to a None value; you can see
    that using print:


    ```

    >>> print(positions)

    None

    ```


    The None value is used to convey that no information is available. That’s absolutely
    not expected here—we wanted our four village positions!—but we’ve lost the list
    through an errant assignment statement.

    If your list is disappearing or you’re getting error messages related to the None
    value, make sure you’re not using an assignment statement with a method that simply
    modifies a list.'
