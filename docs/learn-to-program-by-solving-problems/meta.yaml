    # Summary


    In this chapter, we learned about functions. A function is a self-contained block
    of code that solves a small part of a larger problem. We learned how to pass information
    to a function (through arguments) and get information back (through a return value).


    To determine which functions to write in the first place, we can use top-down
    design. Top-down design helps us break a solution to a large problem into a number
    of smaller steps; for each step, we solve it directly if we can or write a function
    for it if we can''t. If a given step is too unwieldy, we can perform further top-down
    design on it.


    In the next chapter, we''ll learn how to work with files of our choosing, rather
    than using standard input and standard output. As we continue to push the boundaries
    of what we know, we''ll find many uses for functions in that chapter and the rest
    of the book. Practice with some of the following exercises to increase your confidence
    using functions.


    # Chapter Exercises


    Here are some exercises for you to try. For each, use top-down design to identify
    one or more functions that help you organize your code. Include a docstring in
    each function!


    +   1. DMOJ problem ccc13s1, From 1987 to 2013

    2. DMOJ problem ccc18j3, Are we there yet?

    3. DMOJ problem ecoo12r1p2, Decoding DNA

    4. DMOJ problem crci07p1, Platforme

    5. DMOJ problem coci13c2p2, Misa

    6. Revisit some of the exercises from Chapter 5 and improve your solutions by
    using functions. I particularly suggest revisiting DMOJ problem coci18c2p1 (Preokret)
    and DMOJ problem ccc00s2 (Babbling Brooks).'
