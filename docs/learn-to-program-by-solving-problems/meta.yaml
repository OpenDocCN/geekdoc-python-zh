    \ common error to use an assignment statement with a method that changes a list.\
    \ Making this error results in the list being lost, like this:\n\n```\n>>> positions\n\
    [20, 50, 4]\n>>> positions = positions.append(19)\n>>> positions\n```\n\nNothing\
