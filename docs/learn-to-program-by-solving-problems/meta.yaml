    ...

    >>> column

    [13, 12, 6, 8]

    ```


    Notice how the first index (the row) varies, but the second (the column) does
    not ❶. This picks out each value with the same column index.

    What about summing rows and columns? To sum a row, we can use the sum function.
    Here''s the sum of row 0:


    ```

    >>> sum(grid[0])

    26

    ```


    We can also use a loop, like this:


    ```

    >>> total = 0

    >>> for value in grid[0]:

    ...     total = total + value

    ```'
