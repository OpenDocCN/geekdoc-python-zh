  - '[PAGE 76]


    The program starts by reading the three lines of input: n refers to the number
    of parking spaces; and yesterday and today refer to yesterday''s and today''s
    parking-space information, respectively.


    Notice that we don''t refer to the number of parking spaces (n) again. We could
    make use of it to tell us the length of the strings, but I''ve chosen to ignore
    it because it''s often not provided in real-life scenarios.


    We use the occupied variable to count the number of parking spaces that were occupied
    both yesterday and today. We start that variable off at 0 ❶.


    Now we reach the range for loop, which loops through the valid indices of yesterday
    and today ❷. For each such index, we check whether the parking space was occupied
    yesterday and occupied today ❸. If it was, then we include this parking space
    in our total by increasing occupied by 1 ❹.


    When the range for loop terminates, we''ll have gone through all parking spaces.
    The total number of parking spaces that were occupied yesterday and today can
    be accessed through the occupied variable. All that''s left is to output that
    total.


    That''ll do it for this problem. Time to submit your code to the judge.


    # Problem #7: Data Plan


    We''ve learned that for loops are useful for processing data after we''ve read
    it from the input. They''re also often useful for reading the data itself. In
    this problem, we''ll tackle data that''s spread over many lines and use a for
    loop to help us read it all.


    This is DMOJ problem coci16c1p1.


    # The Challenge


    Pero has a data plan with his cell phone provider that offers him x megabytes
    of data per month. In addition, any data he doesn''t use in a given month carries
    over to the next month. For example, if x is 10 and Pero uses only 4MB in a given
    month, the remaining 6MB carry over to the next month (in which he''d now have
    10 + 6 = 16MB available).


    We''re given the number of megabytes of data that Pero uses in each of the first
    n months. Our task is to determine the number of megabytes available for the following
    month.


    # Input


    The input consists of the following lines:


    +   - A line containing integer x, the number of megabytes given to Pero per month.
    x is between 1 and 100.

    - A line containing integer n, the number of months that Pero has had the data
    plan. n is between 1 and 100.'
