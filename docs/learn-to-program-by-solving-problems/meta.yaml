    \ The output must be on one line, with a space separating each pair of songs.\n\
    \n## String Slicing\n\nThe high-level plan of our solution to Song Playlist will\
    \ be a while loop that keeps going as long as we haven't found the press of button\
    \ 4. On each iteration, we'll read two lines of input and process them. That leads\
    \ to this structure:\n\n```\nbutton = 0\n\nwhile button != 4:\n    # Read button\n\
    \    # Read number of presses\n    # Process button presses\n```\n\nPrior to the\
    \ while loop, we create the variable button and make it refer to the number 0\
    \ ❶. Without this, the button variable would not exist, and we'd get a NameError\
    \ in the while loop's Boolean expression. Any number besides 4 would work here\
    \ to trigger the first iteration of the loop.\n\nWithin this while loop, we'll\
    \ use a for loop to process the button presses. For each press, we'll use an if\
    \ statement to check which button was pressed. We'll need four indented blocks\
    \ of statements in the if statement, one for each of the four buttons.\n\nLet's\
    \ talk about how to handle each of the buttons. Button 1 moves the first song\
    \ of the playlist to the end of the playlist. Because we have a small, known number\
    \ of songs, we can get away with using string indexing to concatenate each character.\
    \ Remember that the first character of a string is at index 0, not 1. We can put\
    \ that character at the end of the string like this:\n\n```\n>>> songs = 'ABCDE'\n\
    >>> songs = songs[1] + songs[2] + songs[3] + songs[4] + songs[0]\n>>> songs\n\
    'BCDEA'\n```\n\nThis is rather unwieldy and is specific to having exactly five\
    \ songs. We can use string slicing to write more general and less error-prone\
    \ code.\n\n*Slicing* is a Python feature that lets us refer to a substring of\
    \ a string. (In fact, it works on any sequence, as we'll see later in the book.)\
    \ It takes two indices: the index where we want to start, and the index one to\
    \ the right of where we want to end. If we use indices 4 and 8, for example, then\
    \ we get the characters at indices 4, 5, 6, and 7. Slicing uses square brackets,\
    \ with a colon between the two indices:\n\n```\n>>> s = 'abcdefghijk'\n>>> s[4:8]\n\
    'efgh'\n```\n\nThe slicing doesn't change what s refers to. We can make s refer\
    \ to the slice by using an assignment statement:\n\n```\n>>> s\n'abcdefghijk'\n\
    >>> s = s[4:8]\n>>> s\n'efgh'\n```\n\nIt's easy to make an off-by-one error here\
    \ and think that s[4:8] includes the character at index 8. But it doesn't, just\
