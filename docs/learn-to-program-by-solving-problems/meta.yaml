    # Dictionaries


    A *dictionary* is a Python type that stores a mapping from one group of elements,
    called *keys*, to another group of elements, called *values*.

    We use opening and closing braces to delimit the dictionary. Those are the same
    symbols that we use for a set, but Python can tell the difference between a set
    and a dictionary because of what we put inside the braces. For a set, we list
    values; for a dictionary, we list key:value pairs.

    Here''s a dictionary mapping some strings to numbers:


    ```

    >>> {''cut'':4, ''gully'':3}

    {''cut'': 4, ''gully'': 3}

    ```


    In this dictionary, the keys are ''cut'' and ''gully'', and the values are 4 and
    3. The key ''cut'' is mapped to the value 4, and the key ''gully'' is mapped to
    the value 3.

    Based on our encounters with sets, you might wonder whether dictionaries maintain
    the pairs in the order we enter them. For example, you might wonder whether this
    could happen:


    ```

    >>> {''cut'':4, ''gully'':3}

    {''gully'': 3, ''cut'': 4}

    ```


    As of Python 3.7, the answer is no: dictionaries retain the order in which you
    added pairs. In earlier versions of Python, dictionaries did not maintain this
    order, so you could add pairs in one order but get them back in another. It''s
    still a good idea to write code that doesn''t rely on the Python 3.7 behavior,
    though, because older versions of Python are likely to be in use for the foreseeable
    future.

    Dictionaries are equal if they contain the same key:value pairs, even if we write
    them in different orders:


    ```

    >>> {''cut'':4, ''gully'':3} == {''cut'':4, ''gully'':3}

    True

    >>> {''cut'':4, ''gully'':3} == {''gully'': 3, ''cut'': 4}

    True

    >>> {''cut'':4, ''gully'':3} == {''gully'': 3, ''cut'': 10}

    False

    >>> {''cut'':4, ''gully'':3} == {''cut'': 4}

    False

    ```


    Dictionary keys must be unique. If you try to include the same key multiple times,
    only one pair involving that key is retained:


    ```

    >>> {''storm'': 1, ''storm'': 2}

    {''storm'': 2}

    ```'
