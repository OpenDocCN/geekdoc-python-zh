    # About This Book


    Each chapter in the book is driven by two or three problems from a programming
    judge website. In fact, I start each chapter by posing our first problem, before
    teaching any new Python at all! My goal in doing this is to motivate you to want
    to learn the Python features that we need to solve the problem. Don''t worry if
    you''re not sure how to solve a problem after reading its description. (If you
    can''t solve the problem yet, then you''re reading the right book!) If you understand
    what the problem is asking you to do, then you''re all set. We''re going to learn
    Python and solve the problem together. Subsequent problems in the chapter may
    introduce further Python features or ask us to extend what we learned in the first
    problem. Each chapter concludes with exercises that you should solve on your own
    to practice what you just learned.


    Here''s a rundown of what we''ll learn in each chapter:


    **Chapter 1: Getting Started** There are quite a few introductory concepts that
    we''ll need to learn before we can solve any problems with Python. In this chapter,
    we''ll learn these concepts, including entering Python code, working with strings
    and numbers, using variables, reading input, and writing output.


    **Chapter 2: Making Decisions** In this chapter, we''ll learn about if statements,
    which allow our programs to decide what to do based on whether specific conditions
    are true or false.


    **Chapter 3: Repeating Code: Definite Loops** Many programs continue running as
    long as there is work to do. In this chapter, we''ll learn about the for loop,
    which lets our programs process each piece of input until the job is done.


    **Chapter 4: Repeating Code: Indefinite Loops** Sometimes we don''t know in advance
    how many times our program should repeat some specified behavior. for loops are
    not appropriate for these kinds of problems. In this chapter, we''ll learn about
    the while loop, which repeats code as long as a specific condition is true.


    **Chapter 5: Organizing Values Using Lists** A Python list allows us to use a
    single name to refer to a whole sequence of data. Using a list helps us organize
    our data and leverage the powerful list operations (such as sorting and searching)
    that Python provides. In this chapter, we''ll learn all about lists.'
  merge: -1
  pgno: 12
- img_proc: true
  md: '**Chapter 6: Designing Programs with Functions** A large program, with lots
    of code, can become unwieldy if we don''t organize it well. In this chapter, we''ll
    learn about functions, which help us design programs composed of small, self-contained
    chunks of code. Using functions leads to programs that are much easier to understand
    and modify. We''ll also learn top-down design, an approach to designing programs
    with functions.


    **Chapter 7: Reading and Writing Files** Files are convenient for providing data
    to our programs or obtaining data from our programs. In this chapter, we''ll learn
    how to read data from and write data to files.


    **Chapter 8: Organizing Values Using Sets and Dictionaries** As we begin to solve
    increasingly challenging problems, it''s important that we think about how our
    data is stored. In this chapter, we''ll learn about two new ways to store data
    using Python: using a set and using a dictionary.


    **Chapter 9: Designing Algorithms with Complete Search** Programmers don''t start
    from scratch for each problem they solve. Instead, they think about whether a
    general solution pattern—a type of *algorithm*—can be used to solve it. In this
    chapter, we''ll learn about complete-search algorithms, which can be used to solve
    a wide range of problems.


    **Chapter 10: Big O and Program Efficiency** Sometimes we''ll manage to write
    a program that does the right thing but does so too slowly to be useful in practice.
    In this chapter, we''ll learn how to communicate about the efficiency of programs,
    and we''ll learn about tools we can use to write more efficient code.'
