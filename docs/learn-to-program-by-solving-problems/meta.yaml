  - '[PAGE 101]


    *Slicing* is a Python feature that lets us refer to a substring of a string. (In
    fact, it works on any sequence, as we''ll see later in the book.) It takes two
    indices: the index where we want to start, and the index one to the right of where
    we want to end. If we use indices 4 and 8, for example, then we get the characters
    at indices 4, 5, 6, and 7. Slicing uses square brackets, with a colon between
    the two indices:


    ```

    >>> s = ''abcdefghijk''

    >>> s[4:8]

    ''efgh''

    ```


    The slicing doesn''t change what s refers to. We can make s refer to the slice
    by using an assignment statement:


    ```

    >>> s

    ''abcdefghijk''

    >>> s = s[4:8]

    >>> s

    ''efgh''

    ```


    It''s easy to make an off-by-one error here and think that s[4:8] includes the
    character at index 8. But it doesn''t, just like range(4, 8) doesn''t include
    the 8. So while this behavior may be a little counterintuitive, it''s applied
    consistently in both range and slicing.

    We must always include the colon when performing string slicing, but the start
    and end indices are optional. If we leave off the start index, Python starts slicing
    at index 0:


    ```

    >>> s = ''abcdefghijk''

    >>> s[:4]

    ''abcd''

    ```


    If we leave off the end index, Python slices until the end of the string:


    ```

    >>> s[4:]

    ''efghijk''

    ```


    And leaving out both indices? That gives us a slice consisting of the entire string:


    ```

    >>> s[:]

    ''abcdefghijk''

    ```


    We can even use negative indices in a slice. Here''s an example:


    ```

    >>> s[-4:]

    ''hijk''

    ```


    The start index refers to the fourth character from the right, which is ''h'',
    and the end index is omitted. We therefore get a slice from the ''h'' to the end
    of the string.'
  - '[PAGE 102]


    Unlike indexing, slicing never produces an index error. If we use indices that
    are outside of the string, Python slices to the appropriate end of the string:


    ```

    >>> s[8:20]

    ''ijk''

    >>> s[-50:2]

    ''ab''

    ```


    We''ll use string slicing to implement the behaviors of buttons 1, 2, and 3. Here''s
    what the code looks like for button 1:


    ```

    >>> songs = ''ABCDE''

    >>> songs = songs[1:] + songs[0]

    >>> songs

    ''BCDEA''

    ```


    The slice gives us the entire string except for the character at index 0. (There''s
    nothing specific to a string of length 5 here; this code would work on a nonempty
    string of any length.) Appending that missing character results in the first song
    moving to the end of the playlist. The slicing for the other buttons is similar;
    you''ll see that code next.


