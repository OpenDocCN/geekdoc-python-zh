  md: 'A final use case for a while loop on a string: stopping at the first index
    that meets some criterion.


    The strategy is to use the Boolean and operator to continue while there are more
    characters to check and we haven''t yet met our criterion. For example, here is
    how we can find the index of the first ''y'' in a string:


    ```

    >>> i = 0

    >>> while i < len(s) and s[i] != ''y'':

    ...     i = i + 1

    ...

    >>> print(i)

    4

    ```


    If there''s no ''y'' anywhere in the string, the loop stops when i equals the
    string length:


    ```

    >>> s = ''breeze''

    >>> i = 0

    >>> while i < len(s) and s[i] != ''y'':

    ...     i = i + 1

    ...

    >>> print(i)

    6

    ```


    When i refers to 6, the first operand of and is False, so the loop terminates.
    You might wonder why the second operand of and doesn''t cause an error here, since
    index 6 is not a valid index in the string. The reason is that the Boolean operators
    use short-circuiting evaluation, which means that they stop evaluating their operands
    if the result of the operator is already known. For and, if the first operand
    is False, then we know that, no matter what the second operand is, and will return
    False; Python therefore doesn''t evaluate the second operand. Similarly, for or,
    if the first operand is True, then or is guaranteed to return True, so Python
    doesn''t evaluate the second operand.


    # Solving the Problem


    Now we know how to use a while loop to loop through a string.


    For Secret Sentence, we need to do something different depending on whether we''re
    looking at a vowel or a nonvowel. If we''re looking at a vowel, then we need to
    copy the character and jump ahead by three characters (to skip over the p and
    the second occurrence of this vowel). If we''re looking at a nonvowel, then we
    need to copy the character and move to the next character. So, we always copy
    the current character but then move by three or one based on whether the current
    character is a vowel. We can use an if statement inside the while loop to make
    this decision for each character that we see.'
