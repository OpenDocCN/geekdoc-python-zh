    \ a list of the kth most common words.\n\nTo see how it works, let's look at a\
    \ sample inverted dictionary. I've organized its keys in order from most occurrences\
    \ to fewest occurrences, as that's the order that most_common_words goes through\
    \ the keys. Here's the dictionary:\n\n```\n{4: ['cut'],\n 3: ['gully'],\n 2: ['storm',\
