    我们已知 Pero 在前 n 个月中每个月使用的兆字节数据量。我们的任务是确定下个月可用的兆字节数据量。\n\n### 输入\n\n输入包含以下行：\n\n\
    - 一行包含整数 x，即每月提供给 Pero 的兆字节数。x 在 1 到 100 之间。\n- 一行包含整数 n，即 Pero 拥有该数据套餐的月份数。n\
