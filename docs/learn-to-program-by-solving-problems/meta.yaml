    If you submit to the judge, you''ll see that it doesn''t get much further than
    we got last time. It still times out on most of the test cases.


    # Efficiency of Our Program


    The problem with our program is that finding the third position can still take
    a long time. Those while loops still have some inefficiency. I can demonstrate
    this with a new list of positions, namely, the positions from 1 to 32.'
