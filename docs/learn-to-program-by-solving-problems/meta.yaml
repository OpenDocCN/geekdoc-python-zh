    \ `occupied` 增加 1 ❹。\n\n当 `range` 循环终止时，我们将遍历完所有停车位。昨天和今天都被占用的停车位总数可以通过 `occupied`\
    \ 变量获取。剩下的就是输出这个总数。\n\n这个问题就解决了。是时候将你的代码提交给评测系统了。\n\n## 问题 #7：数据套餐\n\n我们已经了解到，`for`\
    \ 循环在从输入读取数据后处理数据时非常有用。它们也经常用于读取数据本身。在这个问题中，我们将处理分布在多行的数据，并使用 `for` 循环来帮助我们读取所有数据。\n\
    \n这是 DMOJ 问题 coci16c1p1。\n\n### 挑战\n\nPero 与他的手机运营商有一个数据套餐，每月提供给他 x 兆字节的数据。此外，他在给定月份未使用的任何数据都会结转到下个月。例如，如果\
