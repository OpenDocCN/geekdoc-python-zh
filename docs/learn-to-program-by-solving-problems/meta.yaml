    ![](img/712dd6dddc9c23a969f25d44b233585c_14_0.png)


    编程涉及编写代码来解决问题。因此，我想从一开始就和您一起解决问题。也就是说，我们不会先逐个学习Python概念再解决问题，而是通过问题来引导我们需要学习的概念。


    本章将解决两个问题：计算一行文本中的单词数（类似文字处理软件的字数统计功能）以及计算圆锥体体积。解决这些问题需要了解相当多的Python概念。您可能会觉得需要更多细节才能完全理解我介绍的部分内容以及它们在Python程序设计中的整体作用。别担心：我们将在后续章节重新探讨并详细阐述最重要的概念。


    ### 我们将要做什么


    如引言所述，我们将使用Python编程语言解决竞赛编程问题。每个竞赛编程问题都可在在线评测网站上找到。我假设您已按照引言中的说明安装Python并创建了评测账户。


    对于每个问题，我们将编写程序来解决它。每个问题都指定了程序将接收的*输入*类型，以及预期的*输出*（或结果）类型。如果程序能处理任何有效输入并产生正确输出，就说明它正确解决了问题。


    通常会有数百万甚至数十亿种可能的输入。每种输入称为一个*问题实例*。例如，在我们要解决的第一个问题中，输入是一行文本，如`hello there`或`bbaabbb
    aa abab`。我们的任务是输出该行中的单词数。编程中最强大的理念之一是：少量通用代码往往能解决看似无穷无尽的问题实例。无论这行文本有2个、3个还是50个单词，都不会影响结果。我们的程序每次都能正确处理。


    我们的程序将执行三个任务：


    - **读取输入** 我们需要确定正在解决的具体问题实例，因此首先读取提供的输入。

    - **处理** 我们处理输入以确定正确的输出。

    - **输出结果** 解决问题后，我们生成所需的输出。


    这些步骤之间的界限可能并不总是清晰——例如，我们可能需要在生成部分输出的同时进行一些处理——但记住这三个主要步骤会很有帮助。


    您日常使用的程序很可能遵循这种输入-处理-输出模型。以计算器程序为例：您输入公式（输入），程序处理数字（处理），然后显示答案（输出）。或者考虑网络搜索引擎：您输入搜索查询（输入），搜索引擎确定最相关的结果（处理），然后显示它们（输出）。这就是输入-处理-输出模型。


    将这类程序与*交互式*程序对比，后者融合了输入、处理和输出。例如，我正在使用文字编辑器撰写本书。当我输入一个字符时，编辑器会立即将该字符添加到文档中。它不会等我输入完整个文档才显示；而是在我构建文档时交互式地显示。本书不会编写交互式程序。如果您在学习本书后有兴趣编写此类程序，很高兴告诉您Python完全能够胜任。


    每个问题的文本既出现在本书中，也出现在在线评测网站上。但文本不会完全一致，因为我已为保持全书一致性而重写了内容。请放心：我编写的内容传达了与官方问题描述相同的信息。


