    \n$O(n \\log n)$ 是什么意思？不要让这个符号迷惑你。它只是 $n$ 乘以 $\\log n$。让我们在一个包含10,000个值的列表上试试这个。这里，我们有\
    \ $10,000 * \\log 10,000$ 步，这大约只有132,877步。这是一个非常小的步数，特别是与 $O(n^2)$ 排序算法所需的100,000,000步相比。\n\
    \n现在我们可以问我们真正关心的问题：当我们要求Python对一个列表进行排序时，它使用的是什么排序算法？答案：一个 $O(n \\log n)$ 的算法！（它被称为Timsort。如果你想了解更多，可以从归并排序开始，因为Timsort是一个增强版的归并排序。）这里没有缓慢的\
    \ $O(n^2)$ 排序。总的来说，排序非常快——非常接近线性时间——我们可以使用它而不会过多影响我们的效率。\n\n回到村庄邻里问题，现在我们看到它的效率不是\
