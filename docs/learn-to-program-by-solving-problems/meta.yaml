    This is DMOJ problem dmopc17c4p1.


    # The Challenge


    You have a purple ribbon whose length is $n$ units. The first unit goes from position
    0 up to but not including position 1, the second unit goes from position 1 up
    to but not including position 2, and so on. You then carry out $q$ paint strokes,
    each of which colors a segment of the ribbon blue.

    Your goal is to determine the number of units of the ribbon that are still purple
    and the number of units of the ribbon that are now blue.


    # Input


    The input consists of the following lines:


    +   - A line containing the integer ribbon length $n$ and integer number of paint
    strokes $q$, separated by a space. $n$ and $q$ are each between 1 and 100,000.

    - $q$ lines, one per paint stroke, containing two integers separated by a space.
    The first integer gives the starting position of the paint stroke; the second
    gives the ending position of the paint stroke. The starting position is guaranteed
    to be less than the ending position; each integer is between 0 and $n$. The paint
    stroke goes from the starting position up to but not including the ending position.
    As a quick example here, if a paint stroke has a starting position of 5 and an
    ending position of 12, then the stroke paints the ribbon from position 5 up to
    but not including position 12.


    # Output


    Output the number of units of the ribbon that are still purple, a space, and the
    number of units of the ribbon that are now blue.

    The time limit for solving the test cases is 2 seconds.


    # Exploring a Test Case


    Let''s look at a small test case. This test case will not only ensure that we''ve
    interpreted the problem correctly but also highlight the perils of a naive algorithm.
    Here it is:


    ```

    20 4

    18 19

    4 16

    4 14

    5 12

    ```'
