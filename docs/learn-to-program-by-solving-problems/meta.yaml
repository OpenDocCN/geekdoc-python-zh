    牧场1应该选择什么草种类型？唯一关心牧场1的牛是牛3和牛4，所以我们只关注这两头。如果我们已经为这些牛的某些牧场选择了草种类型，那么我们在选择牧场1时就必须小心。我们不希望给某头牛两个相同草种类型的牧场，因为那会违反规则！我们还没有选择任何草种类型，所以无论我们为牧场1选择什么都不会出错。不过，由于我们想要最小的草种类型，我们将选择草种类型1。


    我将把我们的草种类型决策收集在表格中。这是我们刚刚做出的决策，牧场1使用草种类型1：


