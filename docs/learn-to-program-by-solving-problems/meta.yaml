    \n## 字符串切片\n\n我们解决歌曲播放列表问题的高级计划是一个 while 循环，只要我们还没有找到按钮 4 的按压，它就会一直进行。在每次迭代中，我们将读取两行输入并进行处理。这导致了以下结构：\n\
