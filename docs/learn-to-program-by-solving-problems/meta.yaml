    \ location 2 ❸.\n\nThis is a code example where it matters whether we use multiple\
    \ elifs (one big if statement) or multiple ifs (multiple if statements). If we\
    \ change the elifs to ifs, then our code is no longer correct. Listing 3-2 shows\
    \ the incorrect code."
