    \ Let’s take a look at each of these.\nTo read the input ❶, we perform $d$ iterations\
    \ of the outer loop. On each of these iterations we read a row and call split,\
    \ which takes about $f$ steps. We take another $f$ steps to loop through the values\
    \ and convert them to integers. In total, then, each of the $d$ iterations performs\
    \ a number of steps proportional to $f$. Reading the input therefore takes $O(df)$\
    \ time.\nNow for the row bonuses ❷. The outer loop here loops $d$ times. Each\
    \ of these iterations calls sum, which takes $f$ steps because it has to add up\
    \ $f$ values. Like reading the input, then, this part of the algorithm is $O(df)$."
