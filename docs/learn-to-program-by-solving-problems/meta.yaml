  md: "distinguishes these algorithms from each other is the relationship between\
    \ the amount of input and the amount of work that the algorithm does.\n\nA *linear-time*\
    \ algorithm is one with a linear relationship between the amount of input and\
    \ the amount of work done. Suppose we run a linear-time algorithm on an input\
    \ with 50 values, and then we run it again on an input with 100 values. The algorithm\
    \ will do about twice as much work on the 100 values compared with on the 50 values.\n\
    \nFor an example, let's look at the Three Cups problem from Chapter 3. We solved\
    \ that problem in Listing 3-1, and I've reproduced our solution here:\n\n```\n\
    swaps = input()\n\nball_location = 1\n\nfor swap_type in swaps:\n    if swap_type\
    \ == 'A' and ball_location == 1:\n        ball_location = 2\n    elif swap_type\
    \ == 'A' and ball_location == 2:\n        ball_location = 1\n    elif swap_type\
    \ == 'B' and ball_location == 2:\n        ball_location = 3\n    elif swap_type\
    \ == 'B' and ball_location == 3:\n        ball_location = 2\n    elif swap_type\
    \ == 'C' and ball_location == 1:\n        ball_location = 3\n    elif swap_type\
    \ == 'C' and ball_location == 3:\n        ball_location = 1\n\nprint(ball_location)\n\
    ```\n\nThere's a for loop ❶, and the amount of work that it does depends linearly\
    \ on the amount of input. If there are five swaps to process, then the loop iterates\
    \ five times. If there are 10 swaps to process, then the loop iterates 10 times.\
    \ Each iteration of the loop performs a constant number of comparisons and changes\
    \ what `ball_location` refers to. Therefore, the amount of work that this algorithm\
    \ does is directly proportional to the number of swaps.\n\nWe typically use *n*\
    \ to refer to the amount of input provided to a problem. Here, *n* is the number\
    \ of swaps. If there are 5 swaps that we need to perform, then *n* is 5; if there\
    \ are 10 swaps that we need to perform, then *n* is 10.\n\nIf there are *n* swaps,\
    \ then our program does about *n* work. That's because the for loop performs *n*\
    \ iterations, each of which performs a constant number of steps. We don't care\
    \ how many steps it performs on each iteration, as long as it's a constant number.\
    \ Whether the algorithm performs a total of *n* steps or 10*n* steps or 10,000*n*\
    \ steps, it's a linear-time algorithm. In big O notation, we say that this algorithm\
    \ is *O(n)*."
