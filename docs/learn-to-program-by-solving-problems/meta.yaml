  mdcn: "## if 与 elif\n\n让我们使用三个连续的 if 语句来打印：如果苹果队获胜则打印 A，如果香蕉队获胜则打印 B，如果平局则打印 T：\n\
    \n```\n>>> apple_total = 6\n>>> banana_total = 6\n>>> if apple_total > banana_total:\n\
    ...     print('A')\n...\n>>> if banana_total > apple_total:\n...     print('B')\n\
    ...\n>>> if apple_total == banana_total:\n...     print('T')\n...\nT\n```\n\n\
    前两个 if 语句的代码块被跳过了，因为它们的布尔表达式为 False。但第三个 if 语句的代码块执行了，输出了 T。\n\n当你将一个 if 语句放在另一个之后时，它们是独立的。无论之前的布尔表达式是\
    \ True 还是 False，每个布尔表达式都会被求值。\n\n对于 apple_total 和 banana_total 的任何给定值，我们的 if 语句中只有一个能运行。例如，如果\
    \ `apple_total < banana_total` 为 True，那么第一个 if 语句将运行，但其他两个不会。我们可以编写代码来强调只允许一个代码块运行。以下是我们可以这样做的方法：\n\
    \n```\n① >>> if apple_total > banana_total:\n...     print('A')\n② ... elif banana_total\
    \ > apple_total:\n...     print('B')\n... elif apple_total == banana_total:\n\
    ...     print('T')\n...\nT\n```\n\n现在这是一个单独的 if 语句，而不是三个独立的 if 语句。因此，在 `...` 提示符处不要按\
    \ ENTER 键；而是输入 elif 行。\n\n要执行这个 if 语句，Python 首先对第一个布尔表达式 ❶ 求值。如果它为 True，则输出 A，并跳过其余的\
    \ elif。如果它为 False，Python 继续对第二个布尔表达式 ❷ 求值。如果它为 True，则输出 B，并跳过剩余的 elif。如果它为 False，Python\
    \ 继续对第三个布尔表达式 ❸ 求值。如果它为 True，则输出 T。关键字 `elif` 代表“else-if”。用它来提醒自己，elif 代码块仅在 if\
    \ 语句中它之前的任何“else”都没有执行时才会被检查。\n\n这个版本的代码等同于我们之前使用三个独立 if 语句的代码。如果我们想允许执行多个代码块的可能性，我们就必须使用三个独立的\
    \ if 语句，而不是一个带有 elif 代码块的单独 if 语句。\n\n## if 与 else\n\n我们可以使用 `else` 关键字在 if 语句中的所有布尔表达式都为\
    \ False 时运行代码。这是一个例子：\n\n```\n>>> if apple_total > banana_total:\n...     print('A')\n\
    ... elif banana_total > apple_total:\n...     print('B')\n... else:\n...     print('T')\n\
    ...\nT\n```\n\nPython 从上到下对布尔表达式求值。如果其中任何一个为 True，Python 就运行关联的代码块并跳过 if 语句的其余部分。如果所有布尔表达式都为\
    \ False，Python 就执行 else 代码块。\n\n注意，这里不再有对 `apple_total == banana_total` 的测试。进入\
    \ if 语句 else 部分的唯一途径是 `apple_total > banana_total` 为 False 且 `banana_total > apple_total`\
    \ 为 False，也就是说，如果两个值相等。\n\n你应该使用独立的 if 语句吗？使用带有 elif 的 if 语句？使用带有 else 的 if 语句？这通常取决于个人偏好。如果你想最多执行一个代码块，就使用\
    \ elif 链。else 可以帮助使代码更清晰，并且无需编写一个兜底的布尔表达式。比 if 语句的具体风格更重要得多的是编写正确的逻辑！\n\n## 概念检查\n\
    \n以下代码运行后，x 的值是多少？\n\n```\nx = 5\nif x > 2:\n    x = -3\nif x > 1:\n    x = 1\n\
