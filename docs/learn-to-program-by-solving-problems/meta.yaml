  mdcn: "## 输出\n\n如果电话号码属于电话推销员，则输出 `ignore`；否则，输出 `answer`。\n\n## 布尔运算符\n\n一个电话号码要属于电话推销员，必须满足什么条件？它的第一位数字必须是\
    \ 8 或 9。并且，它的第四位数字必须是 8 或 9。并且，第二位和第三位数字必须相同。我们可以使用 Python 的布尔运算符来编码这种“或”和“与”逻辑。\n\
    \n## or 运算符\n\n`or` 运算符接受两个布尔表达式作为其操作数。如果至少有一个操作数为 `True`，则返回 `True`，否则返回 `False`：\n\
    \n```\n>>> True or True\nTrue\n>>> True or False\nTrue\n>>> False or True\nTrue\n\
    >>> False or False\nFalse\n```\n\n要从 `or` 运算符得到 `False`，唯一的可能是它的两个操作数都是 `False`。\n\
    我们可以使用 `or` 来判断一个数字是 8 还是 9：\n\n```\n>>> digit = 8\n>>> digit == 8 or digit ==\
    \ 9\nTrue\n>>> digit = 3\n>>> digit == 8 or digit == 9\nFalse\n```\n\n回顾第 1 章“整数和浮点数”中的内容，Python\
    \ 使用运算符优先级来确定运算符的应用顺序。`or` 的优先级低于关系运算符，这意味着我们通常不需要在操作数周围加括号。例如，在 `digit == 8 or\
    \ digit == 9` 中，`or` 的两个操作数是 `digit == 8` 和 `digit == 9`。这等同于我们写成 `(digit == 8)\
    \ or (digit == 9)`。\n在英语中，说“如果数字是 8 或 9”是合理的。但在 Python 中这样写是不行的：\n\n```\n>>> digit\
    \ = 3\n>>> if digit == 8 or 9:\n...\nprint('yes!')\n...\nyes!\n```\n\n注意，我（错误地！）将第二个操作数写成了\
    \ `9` 而不是 `digit == 9`。Python 输出了 `yes!`，考虑到 `digit` 指的是 3，这肯定不是我们想要的。原因是 Python\
    \ 将非零数字视为 `True`。由于 `9` 被视为 `True`，这使得整个 `or` 表达式为 `True`。在将自然语言翻译成 Python 时，请仔细检查你的布尔表达式，以避免这类错误。\n\
    \n## and 运算符\n\n`and` 运算符在两个操作数都为 `True` 时返回 `True`，否则返回 `False`：\n\n```\n>>>\
    \ True and True\nTrue\n>>> True and False\nFalse\n>>> False and True\nFalse\n\
    >>> False and False\nFalse\n```\n\n要从 `and` 运算符得到 `True`，唯一的可能是它的两个操作数都是 `True`。\n\
    `and` 的优先级高于 `or`。下面是一个例子来说明为什么这很重要：\n\n```\n>>> True or True and False\nTrue\n\
    ```\n\nPython 将该表达式解释如下，`and` 先执行：\n\n```\n>>> True or (True and False)\nTrue\n\
    ```\n\n结果是 `True`，因为 `or` 的第一个操作数是 `True`。\n我们可以通过包含括号来强制 `or` 先执行：\n\n```\n>>>\
    \ (True or True) and False\nFalse\n```\n\n结果是 `False`，因为 `and` 的第二个操作数是 `False`。\n\
    \n## not 运算符\n\n另一个重要的布尔运算符是 `not`。与 `or` 和 `and` 不同，`not` 只接受一个操作数（而不是两个）。如果其操作数为\
    \ `True`，`not` 返回 `False`，反之亦然：\n\n```\n>>> not True\nFalse\n>>> not False\nTrue\n\
    ```\n\n`not` 的优先级高于 `or` 和 `and`。\n\n> **概念检查**\n\n这里有一个表达式以及该表达式带括号的版本。哪一个求值为\
    \ `True`？\n\nA. not True and False\nB. (not True) and False\nC. not (True and\
    \ False)\nD. 以上都不是\n\n---\n\n答案：C。表达式 `(True and False)` 求值为 `False`；因此 `not`\
    \ 使整个表达式为 `True`。\n\n> **概念检查**\n\n考虑表达式 `not a or b`。\n以下哪种情况会使表达式为 `False`？\n\
    \nA. a 为 False，b 为 False\nB. a 为 False，b 为 True\nC. a 为 True，b 为 False\nD. a 为\
    \ True，b 为 True\nE. 以上不止一种情况\n\n---\n\n答案：C。如果 `a` 为 `True`，则 `not a` 为 `False`。由于\
    \ `b` 也为 `False`，`or` 的两个操作数都是 `False`，因此整个表达式求值为 `False`。\n\n## 解决问题\n\n有了布尔运算符，我们就可以解决电话推销员问题了。我们的解决方案在代码清单\
    \ 2-2 中。\n\n```\nnum1 = int(input())\nnum2 = int(input())\nnum3 = int(input())\n\
    num4 = int(input())\n\nif ((num1 == 8 or num1 == 9) and\n        (num4 == 8 or\
    \ num4 == 9) and\n        (num2 == num3)):\n    print('ignore')\nelse:\n    print('answer')\n\
    ```\n\n代码清单 2-2：解决电话推销员问题\n\n与“获胜团队”问题一样，我们首先读取输入并将其转换为整数。\n\n我们的 `if` 语句 ❶ 的高级结构是三个由\
