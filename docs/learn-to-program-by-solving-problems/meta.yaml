    - 8. DMOJ问题 ioi98p3, Party Lamps（提示：对于每个按钮，重要的是它被按下的次数是偶数还是奇数。）\n\n## 注释\n\nLongest\
    \ Scarf最初来自DMOPC '14三月竞赛。Ribbon Painting最初来自DMOPC '11十一月竞赛。\n\n## 后记\n\n![](img/712dd6dddc9c23a969f25d44b233585c_308_0.png)\n\
    \n在你投入接下来的任何事情之前，我想花一分钟祝贺你到目前为止所取得的成就。有可能你在拿起这本书之前从未做过任何编程。或者你可能做过一点编程，并想提高解决问题的能力。无论如何，如果你已经读完了这本书，并花了必要的时间刻苦练习，那么你现在知道如何使用计算机解决问题了。你学会了如何理解问题描述、设计解决方案，并用代码编写该解决方案。你学习了if语句、循环、列表、函数、文件、集合、字典、完全搜索算法和大O分析。这些是编程的核心工具，也是你将一次又一次使用的工具。你现在也可以称自己为Python程序员了！"
