- md: "## Summary\n\nIn this chapter, we learned about functions. A function is a\
    \ self-contained block of code that solves a small part of a larger problem. We\
    \ learned how to pass information to a function (through arguments) and get information\
    \ back (through a return value).\n\nTo determine which functions to write in the\
    \ first place, we can use top-down design. Top-down design helps us break a solution\
    \ to a large problem into a number of smaller steps; for each step, we solve it\
    \ directly if we can or write a function for it if we can't. If a given step is\
    \ too unwieldy, we can perform further top-down design on it.\n\nIn the next chapter,\
    \ we'll learn how to work with files of our choosing, rather than using standard\
    \ input and standard output. As we continue to push the boundaries of what we\
    \ know, we'll find many uses for functions in that chapter and the rest of the\
    \ book. Practice with some of the following exercises to increase your confidence\
    \ using functions.\n\n## Chapter Exercises\n\nHere are some exercises for you\
    \ to try. For each, use top-down design to identify one or more functions that\
    \ help you organize your code. Include a docstring in each function!\n\n1. DMOJ\
    \ problem ccc13s1, From 1987 to 2013\n2. DMOJ problem ccc18j3, Are we there yet?\n\
    3. DMOJ problem ecoo12r1p2, Decoding DNA\n4. DMOJ problem crci07p1, Platforme\n\
    5. DMOJ problem coci13c2p2, Misa\n6. Revisit some of the exercises from Chapter\
    \ 5 and improve your solutions by using functions. I particularly suggest revisiting\
    \ DMOJ problem coci18c2p1 (Preokret) and DMOJ problem ccc00s2 (Babbling Brooks).\n\
    \n## Notes\n\nCard Game is originally from the 1999 Canadian Computing Competition.\
    \ Action Figures is originally from the 2019 Ural School Programming Contest.\n\
    \nMany modern programming languages, Python included, support two distinct programming\
    \ paradigms. One is based on functions; that's what we studied in this chapter.\
    \ The other is based on *objects* and leads to a paradigm known as *object-oriented\
    \ programming (OOP)*. OOP involves defining new types and writing methods for\
    \ those types. We use Python types (such as integers and strings) throughout the\
    \ book, but we won't otherwise discuss OOP. For an introduction to OOP, and case\
    \ studies of OOP in practice, I recommend *Python Crash Course, 2nd Edition* by\
    \ Eric Matthes (No Starch Press, 2019).\n\n# 7\n\n## READING AND WRITING FILES\n\
    \nTo this point, we've read all input using the input function and written all\
    \ output using the print function. These functions read from standard input (defaulting\
    \ to the keyboard) and write to standard output (defaulting to the screen), respectively.\
    \ While we can change these defaults using input and output redirection, sometimes\
    \ a program needs more control over its files. For example, your word processor\
    \ allows you to open whichever document file you like and save a file with whatever\
    \ name you like, without you messing around with standard input and standard output.\n\
    \nIn this chapter, we'll learn how to write programs that manipulate text files.\
    \ We'll solve two problems using files: correctly formatting an essay and seeding\
    \ a farm to feed cows.\n\n## Problem #16: Essay Formatting\n\nThere’s one important\
    \ difference between this problem and all the problems we’ve solved to this point:\
    \ this one requires us to read from and write to specific files! Look out for\
    \ this as you read the problem description.\nThis is USACO 2020 January Bronze\
    \ Contest problem Word Processor. This is the first problem in the book from the\
    \ USACO (USA Computing Olympiad) judge. To find the problem, go to http://usaco.org/,\
    \ click **Contests**, click **2020 January Contest Results**, and then click **View\
    \ problem** under Word Processor.\n\n## The Challenge\n\nBessie the cow is writing\
    \ an essay. Each word in the essay contains only lowercase or uppercase characters.\
    \ Her teacher has specified the maximum number of characters, not counting spaces,\
    \ that can occur per line. To satisfy this requirement, Bessie writes down the\
    \ words of the essay using the following rules:\n\n- If the next word fits on\
    \ the current line, add it to the current line. Include a space between each pair\
    \ of words on the line.\n- Otherwise, put this word on a new line; this line becomes\
    \ the new current line.\n\nOutput the essay with the correct words on each line.\n\
    \n## Input\n\nRead input from the file named *word.in*.\nThe input consists of\
    \ two lines.\n\n- The first line contains two integers separated by a space. The\
    \ first integer is *n*, the number of words in the essay; it’s between 1 and 100.\
    \ The second integer is *k*, the maximum number of characters (not counting spaces)\
    \ that can occur per line; it’s between 1 and 80.\n- The second line contains\
    \ *n* words, with a space between each pair of words. Each word has at most *k*\
    \ characters.\n\n## Output\n\nWrite output to the file named *word.out*.\nOutput\
    \ the properly formatted essay.\n\n## Working with Files\n\nThe Essay Formatting\
    \ problem requires that we read from file *word.in* and write to file *word.out*.\
    \ Before we can do those things, though, we need to learn how to open files in\
    \ our programs.\n\n## Opening a File\n\nUsing your text editor, create a new file\
    \ called *word.in*. Put that file in the same directory that you've been using\
    \ for your *.py* Python programs.\n\nThis is the first time that we're creating\
    \ a file that doesn't end with *.py*. Instead, it ends with *.in*. Be sure to\
    \ name the file *word.in*, not *word.py*. The *in* is short for input; you'll\
    \ see it used often for files that contain input for a program.\n\nIn that file,\
    \ let's place valid input for the Essay Formatting problem. Enter the following\
    \ into the file:\n\n```\n12 13\nperhaps better poetry will be written in the language\
    \ of digital computers\n```\n\nSave the file.\n\nTo open the file in Python, we\
    \ use the open function. We pass two arguments: the first is the filename, and\
    \ the second is the mode in which to open the file. The mode determines how we\
    \ can interact with the file.\n\nHere's how we can open *word.in*:\n\n```\n>>>\
    \ open('word.in', 'r')\n<_io.TextIOWrapper name='word.in' mode='r' encoding='cp1252'>\n\
    ```\n\nIn this function call, we've provided a mode of 'r'. The *r* stands for\
    \ \"read\" and opens the file so that we can read from it. The mode happens to\
    \ be an optional parameter whose default is 'r', so we can leave it out if we\
    \ like. But I'll explicitly include the 'r' throughout the book for consistency.\n\
    \nWhen we use open, Python gives us some information about how the file was opened\
    \ ❶. For example, it confirms the filename and mode. The bit about encoding indicates\
    \ how the file was decoded from its state on disk into a form that we can read.\
    \ Files can be encoded using a variety of encodings, but we don't need to worry\
    \ about encodings in this book.\n\nIf we try to open a file for reading that doesn't\
    \ exist, we get an error:\n\n```\n>>> open('blah.in', 'r')\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nFileNotFoundError: [Errno\
    \ 2] No such file or directory: 'blah.in'\n```\n\nIf you're getting this error\
    \ when opening *word.in*, double-check that the file is named correctly and in\
    \ the directory from which you started Python.\n\nIn addition to mode 'r' for\
    \ reading, there's mode 'w' for writing. If we use 'w', then we're opening a file\
    \ so that we can put text in it.\n\nBe careful with mode 'w'. If you use 'w' with\
    \ a file that already exists, the contents of that file will be deleted. I just\
    \ accidentally did that with my *word.in* file. No big deal, because it was easy\
    \ to re-create. But no one would be happy if we accidentally overwrote an important\
    \ file.\n\nIf you use 'w' with a filename that doesn't exist, it creates an empty\
    \ file."
  mdcn: "## 总结\n\n本章我们学习了函数。函数是一个独立的代码块，用于解决更大问题中的一个小部分。我们学习了如何向函数传递信息（通过参数）以及如何获取返回的信息（通过返回值）。\n\
    \n为了确定首先应该编写哪些函数，我们可以使用自顶向下的设计方法。自顶向下设计帮助我们将一个大问题的解决方案分解为若干个较小的步骤；对于每个步骤，如果能直接解决就直接解决，如果不能就为它编写一个函数。如果某个给定的步骤过于复杂，我们可以对其进行进一步的自顶向下设计。\n\
    \n在下一章中，我们将学习如何处理我们选择的文件，而不是使用标准输入和标准输出。随着我们不断拓展知识边界，我们将在那一章以及本书的其余部分发现函数的许多用途。通过完成以下一些练习来增强你使用函数的信心。\n\
    \n## 章节练习\n\n这里有一些练习供你尝试。对于每个练习，使用自顶向下设计来确定一个或多个函数，以帮助你组织代码。在每个函数中包含一个文档字符串！\n\
    \n1.  DMOJ 问题 ccc13s1，从 1987 年到 2013 年\n2.  DMOJ 问题 ccc18j3，我们到了吗？\n3.  DMOJ 问题\
    \ ecoo12r1p2，解码 DNA\n4.  DMOJ 问题 crci07p1，Platforme\n5.  DMOJ 问题 coci13c2p2，Misa\n\
    6.  重新审视第 5 章的一些练习，并通过使用函数来改进你的解决方案。我特别建议重新审视 DMOJ 问题 coci18c2p1 (Preokret) 和\
    \ DMOJ 问题 ccc00s2 (Babbling Brooks)。\n\n## 注释\n\nCard Game 最初来自 1999 年加拿大计算机竞赛。Action\
    \ Figures 最初来自 2019 年乌拉尔学校编程竞赛。\n\n许多现代编程语言，包括 Python，支持两种不同的编程范式。一种基于函数；这就是我们在本章所学的内容。另一种基于*对象*，并引出一种称为*面向对象编程\
    \ (OOP)* 的范式。OOP 涉及定义新类型并为这些类型编写方法。我们在整本书中使用 Python 类型（如整数和字符串），但我们不会在其他地方讨论 OOP。关于\
    \ OOP 的介绍以及 OOP 在实践中的案例研究，我推荐 Eric Matthes 的 *Python Crash Course, 2nd Edition*\
    \ (No Starch Press, 2019)。\n\n# 7\n\n## 读写文件\n\n到目前为止，我们一直使用 `input` 函数读取所有输入，并使用\
    \ `print` 函数写入所有输出。这些函数分别从标准输入（默认为键盘）读取，并写入标准输出（默认为屏幕）。虽然我们可以使用输入和输出重定向来更改这些默认值，但有时程序需要对其文件进行更多控制。例如，你的文字处理器允许你打开任何你喜欢的文档文件，并以任何你喜欢的名称保存文件，而无需你费心处理标准输入和标准输出。\n\
    \n在本章中，我们将学习如何编写处理文本文件的程序。我们将使用文件解决两个问题：正确格式化一篇论文和为养牛播种农场。\n\n## 问题 #16：论文格式化\n\
    \n这个问题与我们之前解决的所有问题有一个重要区别：这个问题要求我们从特定文件读取并向特定文件写入！在阅读问题描述时请注意这一点。\n这是 USACO 2020\
    \ 年一月铜牌竞赛的问题 Word Processor。这是本书中第一个来自 USACO（美国计算机奥林匹克竞赛）评测系统的问题。要找到该问题，请访问 http://usaco.org/，点击\
    \ **Contests**，点击 **2020 January Contest Results**，然后在 Word Processor 下点击 **View\
    \ problem**。\n\n## 挑战\n\n奶牛 Bessie 正在写一篇论文。论文中的每个单词仅包含小写或大写字符。她的老师指定了每行可以出现的最大字符数（不计空格）。为了满足这个要求，Bessie\
    \ 使用以下规则写下论文的单词：\n\n-   如果下一个单词能放在当前行，就将其添加到当前行。在行中的每对单词之间包含一个空格。\n-   否则，将此单词放在新行；此行成为新的当前行。\n\
    \n输出格式正确的论文，每行包含正确的单词。\n\n## 输入\n\n从名为 *word.in* 的文件读取输入。\n输入包含两行。\n\n-   第一行包含两个由空格分隔的整数。第一个整数是\
    \ *n*，即论文中的单词数；它在 1 到 100 之间。第二个整数是 *k*，即每行可以出现的最大字符数（不计空格）；它在 1 到 80 之间。\n- \
    \  第二行包含 *n* 个单词，每对单词之间有一个空格。每个单词最多有 *k* 个字符。\n\n## 输出\n\n将输出写入名为 *word.out* 的文件。\n\
    输出格式正确的论文。\n\n## 处理文件\n\n论文格式化问题要求我们从文件 *word.in* 读取并向文件 *word.out* 写入。但在我们能够做这些事情之前，我们需要学习如何在程序中打开文件。\n\
    \n## 打开文件\n\n使用你的文本编辑器，创建一个名为 *word.in* 的新文件。将该文件放在你一直用于 *.py* Python 程序的同一目录中。\n\
    \n这是我们第一次创建一个不以 *.py* 结尾的文件。相反，它以 *.in* 结尾。请确保将文件命名为 *word.in*，而不是 *word.py*。*in*\
    \ 是 input 的缩写；你会经常看到它用于包含程序输入的文件。\n\n在该文件中，让我们放置论文格式化问题的有效输入。在文件中输入以下内容：\n\n```\n\
    12 13\nperhaps better poetry will be written in the language of digital computers\n\
    ```\n\n保存文件。\n\n要在 Python 中打开文件，我们使用 `open` 函数。我们传递两个参数：第一个是文件名，第二个是打开文件的模式。模式决定了我们如何与文件交互。\n\
    \n以下是我们如何打开 *word.in* 的方法：\n\n```\n>>> open('word.in', 'r')\n<_io.TextIOWrapper\
    \ name='word.in' mode='r' encoding='cp1252'>\n```\n\n在这个函数调用中，我们提供了一个模式 'r'。*r*\
    \ 代表 \"read\"（读取），打开文件以便我们可以从中读取。该模式恰好是一个可选参数，其默认值为 'r'，因此如果我们愿意，可以省略它。但为了保持一致性，我将在整本书中显式包含\
    \ 'r'。\n\n当我们使用 `open` 时，Python 会给我们一些关于文件如何打开的信息 ❶。例如，它确认了文件名和模式。关于编码的部分表明文件是如何从磁盘上的状态解码成我们可以读取的形式的。文件可以使用多种编码进行编码，但我们在本书中不需要担心编码问题。\n\
    \n如果我们尝试打开一个不存在的文件进行读取，我们会得到一个错误：\n\n```\n>>> open('blah.in', 'r')\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nFileNotFoundError:\
    \ [Errno 2] No such file or directory: 'blah.in'\n```\n\n如果你在打开 *word.in* 时遇到此错误，请仔细检查文件名是否正确以及是否在启动\
    \ Python 的目录中。\n\n除了用于读取的模式 'r'，还有用于写入的模式 'w'。如果我们使用 'w'，那么我们打开文件是为了向其中写入文本。\n\
    \n请小心使用模式 'w'。如果你对已存在的文件使用 'w'，该文件的内容将被删除。我刚刚不小心对我的 *word.in* 文件这样做了。没什么大不了的，因为很容易重新创建。但如果我们不小心覆盖了一个重要文件，没人会高兴。\n\
    \n如果你对不存在的文件名使用 'w'，它会创建一个空文件。"
