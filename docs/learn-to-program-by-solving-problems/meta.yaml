    The original dictionary maps from strings to numbers. The inverted dictionary\
    \ maps from numbers to strings. Well, not quite: the inverted dictionary maps\
    \ from numbers to *lists* of strings. Remember that each key is allowed only once\
    \ in a dictionary. In the inverted dictionary, we need to map each key to multiple\
    \ values, so we store all of those values in a list.\n\nTo invert a dictionary,\
    \ each key becomes a value, and each value becomes a key. If a key doesn't exist\
    \ yet in the inverted dictionary, we create a list for its value. If a key is\
    \ already in the inverted dictionary, then we add its value to its list.\n\nWe\
    \ can now write a function to return the inverted version of a dictionary. See\
