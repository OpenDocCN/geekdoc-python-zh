  - '[PAGE 132]


    We are told the cost of the school trip, the proportion of students in each year,
    and the total number of students. Determine whether the students need to raise
    more money for the school trip.


    # Input


    The input consists of 10 test cases, with three lines per test case (30 lines
    in all). Here are the three lines for each test case:


    +   - The first line contains the cost in dollars of the school trip; it''s an
    integer between 50 and 50,000.

    - The second line contains four numbers indicating the proportion of brunching
    students who are in first, second, third, and fourth year, respectively. There
    is a space between each pair of numbers. Each number is between 0 and 1, and their
    sum is 1 (for 100 percent).

    - The third line contains integer n, the number of students attending the brunch.
    n is between 4 and 2,000.


    # Output


    For each test case: if the students need to raise more money for the school trip,
    output YES; otherwise, output NO.


    # A Catch


    Suppose that there are 50 students and that 10 percent of them (a proportion of
    0.1) are in their fourth year. Then we can calculate that 50 * 0.1 = 5 students
    are in their fourth year.


    Now suppose that there are 50 students, but that 15 percent of them (a proportion
    of 0.15) are in their fourth year. If we multiply, we get 50 * 0.15 = 7.5 students
    in their fourth year.


    Having 7.5 students doesn''t make any sense. When this happens, the problem specifies
    that we are to round down—so we''d round down to 7 here. This could result in
    the sum of the students in first year, second year, third year, and fourth year
    not equaling the total number of students. For the students who are not accounted
    for, we are to add them to the year with the most students. It''s guaranteed that
    exactly one year will have the most students (there won''t be a tie between multiple
    years).


    We''ll first solve the problem ignoring this catch. Then we''ll incorporate the
    catch to give us a full solution.


    # Splitting Strings and Joining Lists


    The second line of each test case consists of four proportions, like this:


    ```

    0.2 0.08 0.4 0.32

    ```'
  - '[PAGE 133]


    We need a way to extract those four numbers from a string for further processing.
    We''ll learn about the string split method for splitting a string into a list
    of its pieces. While we''re at it, we''ll also learn about the string join method,
    which lets us go the other way and collapse a list into a single string.


    # Splitting a String into a List


    Remember that the input function returns a string, no matter what the input looks
    like. If the input should be interpreted as an integer, we need to convert the
    string to an integer. If the input should be interpreted as a float, we need to
    convert the string to a float. And if the input should be interpreted as four
    floats? Well, then we had better split it up into individual floats before converting
    anything!


    The string split method splits a string into a list of its pieces. By default,
    split splits around spaces, which is exactly what we need for our four floats:


    ```

    >>> s = ''0.2 0.08 0.4 0.32''

    >>> s.split()

    [''0.2'', ''0.08'', ''0.4'', ''0.32'']

    ```


    The split method returns a list of strings, at which point we can access each
    one independently. Here, I save the list that split returns and then access two
    of its values:


    ```

    >>> proportions = s.split()

    >>> proportions

    [''0.2'', ''0.08'', ''0.4'', ''0.32'']

    >>> proportions[1]

    ''0.08''

    >>> proportions[2]

    ''0.4''

    ```


    Data in the wild is often comma-separated rather than space-separated. Piece of
    cake: we can call split with an argument that tells it what to use as a separator:


    ```

    >>> info = ''Toronto,Ontario,Canada''

    >>> info.split('','')

    [''Toronto'', ''Ontario'', ''Canada'']

    ```


    # Joining a List into a String


    To go the other way, from a list to a string rather than a string to a list, we
    can use the string join method. The string on which join is called is used as
    the separator between list values. Here are two examples:


    ```

    >>> lst = [''Toronto'', ''Ontario'', ''Canada'']

    >>> '',''.join(lst)

    ```'
  - '[PAGE 134]


    ```

    >>> ''**''.join(lst)

    ''Toronto**Ontario**Canada''

    ```


    Technically, join can join the values in any sequence, not just in a list. Here''s
    an example of joining the characters from a string:


    ```

    >>> ''*''.join(''abcd'')

    ''a*b*c*d''

    ```


    # Changing List Values


    When we use split on a string of four pieces, we get a list of strings:


    ```

    >>> s = ''0.2 0.08 0.4 0.32''

    >>> proportions = s.split()

    >>> proportions

    [''0.2'', ''0.08'', ''0.4'', ''0.32'']

    ```


    In "Converting Between Strings and Integers" in Chapter 1, we learned that strings
    that look like numbers can''t be used in numerical calculations. So, we need to
    convert this list of strings to a list of floats. We can convert a string to a
    float using float, like this:


    ```

    >>> float(''45.6'')

    45.6

    ```


    That''s just one float. How can we convert a whole list of strings to a list of
    floats? It''s awfully tempting to try to make that happen using the following
    loop:


    ```

    >>> for value in proportions:

    ...     value = float(value)

    ```


    The logic is that this should go through each value in the list and convert it
    to a float. Sadly, it doesn''t work. The list still refers to strings:


    ```

    >>> proportions

    [''0.2'', ''0.08'', ''0.4'', ''0.32'']

    ```


    What could be wrong? Is float not working? We can see that float is doing just
    fine by looking at the type of value after conversion:


    ```

    >>> for value in proportions:

    ...     value = float(value)

    ...     type(value)

    ...

    <class ''float''>

    ```'
- md: "## Solving Most of the Problem\n\nWe're now in good shape to solve the problem\
    \ minus the catch. We'll start with an example to highlight what our code will\
    \ have to do. Then we'll move onto the code itself.\n\n## Exploring a Test Case\n\
    \nThe input for this problem consists of 10 test cases, but I'll present only\
    \ one here. If you type this test case from the keyboard, you'll see the answer.\
    \ But the program won't terminate there, because it's waiting for the next test\
    \ case. If you use input redirection with this test case, you'll again see the\
    \ answer. But then you'll get an EOFError. EOF stands for \"end of file\"; the\
    \ error is caused by the program trying to read more input than is available.\
    \ Once your code is working for one test case, you can try adding a few more to\
    \ your input to make sure that those work, too. Once you have 10, your program\
    \ should run to completion. Here's the test case I'd like to trace with you:\n\
    \n```\n504\n0.2 0.08 0.4 0.32\n125\n```\n\nThe school trip costs $504, and there\
    \ are 125 students who attend the brunch. To determine how much money is raised\
    \ at the brunch, we calculate the money raised from each year of students. There\
    \ are 125 * 0.2 = 25 students in their first year, and each of them pays $12 for\
    \ the brunch. So, the first-year students raise 25 * 12 = 300 dollars. We can\
    \ similarly calculate the money raised by the students in second, third, and fourth\
    \ years. See Table 5-1 for this work.\n\nTable 5-1: School Trip Example\n\n| Year\
    \ | Students in year | Cost per student | Money raised |\n| :--- | :--- | :---\
    \ | :--- |\n| First year | 25 | 12 | 300 |\n| Second year | 10 | 10 | 100 |\n\
    | Third year | 50 | 7 | 350 |\n| Fourth year | 40 | 5 | 200 |\n\nThe money raised\
    \ by each year of students is calculated by multiplying the number of students\
    \ in that year by the cost per student in that year; see the rightmost column\
    \ of the table. For the total money raised by all students, we can add the four\
    \ numbers in this rightmost column. That gives us 300 + 100 + 350 + 200 = 950\
    \ dollars. Only 50 percent of that can be used for the school trip. So we're left\
    \ with 950 / 2 = 475 dollars, not sufficient to pay for the $504 trip. The correct\
    \ output is therefore YES, because more money must be raised.\n\n## The Code\n\
    \nThis partial solution will correctly handle any input where multiplying a proportion\
    \ by the number of students gives a whole number of students (such as the test\
    \ case that we just did). See Listing 5-4 for the code.\n\n```python\nYEAR_COSTS\
    \ = [12, 10, 7, 5]\n\nfor dataset in range(10):\n    trip_cost = int(input())\n\
    \    proportions = input().split()\n    num_students = int(input())\n\n    for\
    \ i in range(len(proportions)):\n        proportions[i] = float(proportions[i])\n\
    \n    students_per_year = []\n\n    for proportion in proportions:\n        students\
    \ = int(num_students * proportion)\n        students_per_year.append(students)\n\
    \n    total_raised = 0\n\n    for i in range(len(students_per_year)):\n      \
    \  total_raised = total_raised + students_per_year[i] * YEAR_COSTS[i]\n\n    if\
    \ total_raised / 2 < trip_cost:\n        print('YES')\n    else:\n        print('NO')\n\
    ```\n\nListing 5-4: Solving most of School Trip\n\nTo begin, we use variable YEAR_COSTS\
    \ to refer to a list of costs for attending the brunch: the cost for students\
    \ in their first, second, third, and fourth year ❶. Once we've determined the\
    \ number of students in each year, we'll multiply by these values to determine\
    \ the money raised. The costs never change, so we'll never change what this variable\
    \ refers to. For such \"constant\" variables, Python convention is to write their\
    \ names in capital letters, as I've done here.\n\nThe input contains 10 test cases,\
    \ so we loop 10 times ❷, once for each test case. The rest of the program is inside\
    \ this loop, because we want to repeat everything 10 times.\n\nFor each test case,\
    \ we read the three lines of input. The second line is the one that has the four\
    \ proportions, so we use split to split it into a list of four strings ❸. We use\
    \ a range for loop to convert each of those strings to a float ❹.\n\nUsing those\
    \ proportions, our next task is to determine the number of students in each year.\
    \ We begin with an empty list ❺. Then, for each proportion, we multiply the total\
    \ number of students by that proportion ❻ and append it to the list. Notice at\
    \ ❻ that I'm using int to guarantee that we're appending only integers. When used\
    \ on a float, int drops the fractional part by rounding toward 0.\n\nNow we have\
    \ the two lists that we need to calculate how much money has been raised. In students_per_year,\
    \ we have a list of the number of students in each year, which looks something\
    \ like this:\n\n```\n[25, 10, 50, 40]\n```\n\nAnd in YEAR_COSTS, we have the cost\
    \ of brunch for students in each year:\n\n```\n[12, 10, 7, 5]\n```\n\nEach value\
    \ at index 0 in these lists tells us something about students in their first year,\
    \ each value at index 1 tells us something about students in their second year,\
    \ and so on. Such lists are called parallel lists, because they work in parallel\
    \ to tell us more than each does alone.\n\nWe use these two lists to calculate\
    \ the total money raised, by multiplying each number of students by the corresponding\
    \ cost per student and adding up all of these results ❼.\n\nHas enough money been\
    \ raised for the school trip? To find out, we use an if statement ❽. Half of the\
    \ money raised by the brunch can be used for the school trip. If that amount is\
    \ less than the cost of the school trip, then we need to raise more money (YES);\
