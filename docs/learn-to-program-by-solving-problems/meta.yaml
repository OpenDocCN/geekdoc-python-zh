    # Nesting Loops in Loops


    We can nest loops inside of while loops, much as we can nest loops inside of for
    loops. In “Nesting” in Chapter 3, I noted that the inner for loop completes all
    of its iterations before the next iteration of the outer loop begins. The same
    holds for while loops. Here’s an example:


    ```

    >>> i = 0

    >>> while i < 3:

    ...     j = 8

    ...     while j < 11:

    ...         print(i, j)

    ...         j = j + 1

    ...     i = i + 1

    ...

    0 8

