    \nexcess = 0\n\n❶ for i in range(n):\n    used = int(input())\n    ❷ excess =\
    \ excess + monthly_mb - used\n\n❸ print(excess + monthly_mb)\n```\n\n清单 3-4：解决数据套餐问题\n\
    \n`excess` 变量从 0 开始。在 `range` 循环的每次迭代中，我们为 `excess` 赋予一个考虑每月提供的兆字节数和该月使用的兆字节数的值。\n\
    \n`range` 循环循环 n 次，对应 Pero 拥有该数据套餐的每个月 ❶。`i` 取的值——0、1 等——对我们来说并不重要，因为我们没有理由关心我们正在处理哪个月份。因此，我们不在程序中的任何地方使用\
