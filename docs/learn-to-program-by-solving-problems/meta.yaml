    yes!

    ```


    Notice that I''ve (incorrectly!) written the second operand as 9 instead of digit
    == 9. Python responds by outputting yes!, which is certainly not what we''d want
    given that digit refers to 3. The reason is that Python considers nonzero numbers
    to be True. Since 9 is considered True, this makes the whole or expression True.
    Carefully double-check your Boolean expressions to avoid these kinds of mistakes
    when translating from natural language to Python.


    # and Operator


    The and operator returns True if both of its operands are True, and False otherwise:


    ```

    >>> True and True

    True

    >>> True and False

    False

    >>> False and True

    False

    >>> False and False

    False

    ```


    The only way to get True out of the And operator is if both of its operands are
    True.

    The precedence of and is higher than or. Here''s an example of why this matters:


    ```

    >>> True or True and False

    True

    ```


    Python interprets that expression like this, with the and happening first:


    ```

    >>> True or (True and False)

    True

    ```


    The result is True because the first operand of or is True.

    We can force the or to happen first by including parentheses:


    ```

    >>> (True or True) and False

    False

    ```


    The result is False because the second operand of and is False.'
  - '[PAGE 53]


    # not Operator


    Another important Boolean operator is not. Unlike or and and, not takes only one
    operand (not two). If its operand is True, not returns False, and vice versa:


    ```

    >>> not True

    False

    >>> not False

    True

    ```


    The precedence of not is higher than or and and.


    > **CONCEPT CHECK**


    Here''s an expression and versions of that expression with parentheses. Which
    of them evaluates to True?


    A. not True and False

    B. (not True) and False

    C. not (True and False)

    D. None of the above


    ---


    Answer: C. The expression (True and False) evaluates to False; the not therefore
    makes the full expression True.


    > **CONCEPT CHECK**


    Consider the expression not a or b.

    Which of the following makes the expression False?


    A. a False, b False

    B. a False, b True

    C. a True, b False

    D. a True, b True

    E. More than one of the above


    ---


    Answer: C. If a is True, then not a is False. Since b is False, too, both operands
    to or are False, so the whole expression evaluates to False.'
