    # # The Mod Operator


    In “Integer and Floating-Point Numbers” in Chapter 1, I introduced the mod (%)
    operator for calculating the remainder of an integer division. For example, 16
    divided by 5 has a remainder of 1:


    ```

    >>> 16 % 5

    1

    ```


    And 15 divided by 5 has a remainder of 0 (because 5 divides 15 exactly):


    ```

    >>> 15 % 5

    0

    ```


    The second operand dictates the range of values that % can possibly return. The
    possible return values are 0 up to but not including the second operand. For example,
    if the second operand is 3, then the only values that can be returned by % are
    0, 1, and 2. In addition, as we increase the first operand, we cycle through all
    possible return values. Here’s an example:


    ```

    >>> 0 % 3

    0

    >>> 1 % 3

    1

    >>> 2 % 3

    2

    >>> 3 % 3

    0

    >>> 4 % 3

    1

    >>> 5 % 3

    2

    >>> 6 % 3

    0

    >>> 7 % 3

    1

    ```


    Notice the pattern: 0, 1, 2, 0, 1, 2, and so on.

    This behavior is useful for counting up to a specified number and then cycling
    back to 0. It’s exactly the behavior that we need when playing the slot machines:
    we play slot machine 0, then 1, then 2, then 0, then 1, then 2, then 0, then 1,
    and so on. (This is another reason why I used 0, 1, and 2, rather than other values,
    to refer to the slot machines.)

    Suppose that variable plays refers to the number of times that Martha has played.
    To determine the next machine to play (0, 1, or 2), we can use the % operator.
    For example, suppose that Martha has played one slot machine'
  - '[PAGE 96]


    so far, and we want to know which she will play next. She''ll play slot machine
    1 next, and the % operator tells us that:


    ```

    >>> plays = 1

    >>> plays % 3

    1

    ```


    If Martha has played six times so far, then she''s played slot machines 0, 1,
    2, 0, 1, 2. The next slot machine she''ll play is machine 0. And, as she''s played
    all three machines twice, with no other plays beyond that, the % operator gives
    us 0:


    ```

    >>> plays = 6

    >>> plays % 3

    0

    ```


    As a final example, suppose that Martha has played 11 times so far. She''s done
    three complete cycles: 0, 1, 2, 0, 1, 2, 0, 1, 2. That''s nine of the plays. The
    remaining two plays put Martha on slot machine 2 for her next play:


    ```

    >>> plays = 11

    >>> plays % 3

    2

    ```


    That is, we can figure out the slot machine to play without explicitly maintaining
    a machine variable.

    We can also use % to simplify the logic of determining whether the next play on
    the current slot machine pays Martha. Consider the first slot machine. In Listing
    4-1, we counted the number of plays since the slot machine paid. If that number
    is 35, then we pay Martha and reset the count to 0. But there''s no need to reset
    the count if we''re using the % operator. We can just check whether the slot machine
    has been played a multiple of 35 times and pay Martha if so. To test whether a
    number is a multiple of 35, we can use the % operator. A number is a multiple
    of 35 if dividing it by 35 yields no remainder:


    ```

    >>> first = 35

    >>> first % 35

    0

    >>> first = 48

    >>> first % 35

    13

    >>> first = 70

    >>> first % 35

    0

