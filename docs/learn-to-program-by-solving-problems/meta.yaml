  - '[PAGE 304]


    Our first paint stroke paints 14 – 4 = 10 units blue. Now our stored rightmost
    position is 14.


    Our second paint stroke paints 12 units blue, yes, but how many of those 12 does
    it turn from purple to blue? After all, it overlaps the previous paint stroke,
    so some of these units were blue already. We can calculate the number of new blue
    units by subtracting 14, our stored rightmost position, from 16, the ending position
    of the current paint stroke. This is how we ignore the units already painted blue
    by previous paint strokes. So, there are 16 – 14 = 2 new blue units and 12 blue
    units in total. Crucially, we just figured this out without processing the individual
    units of this paint stroke. Before we continue, don’t forget to update our stored
    rightmost position to 16.


    Our third paint stroke is like the second in that it starts prior to our stored
    rightmost position. Unlike the second paint stroke, however, its ending position
    does not extend past our stored rightmost position at all. So, this paint stroke
    adds no new blue units, and our stored rightmost position is still 16. Again,
    we figured this out without grinding through each of this paint stroke’s positions!


    Be careful with the fourth paint stroke. It does *not* add 19 – 16 = 3 new blue
    units. We have to treat this paint stroke differently because its starting position
    is to the right of our stored rightmost position. In this case, we don’t use the
    stored rightmost position at all, calculating instead 19 – 18 = 1 new blue unit,
    and 13 blue units in total. We also update our stored rightmost position to 19.


    The only question is how we sort the paint strokes in our Python code. We need
    to sort them by their starting position; if multiple paint strokes have the same
    starting position, then we want to sort those by their ending position.


    That is, we want to take a list like this:


    ```

    [[18, 19], [4, 16], [4, 14], [5, 12]]

    ```


    and produce this:


    ```

    [[4, 14], [4, 16], [5, 12], [18, 19]]

    ```


    Happily, the list sort method works in exactly this way. When given a list of
    lists, sort sorts using the first values in each list; when those values are tied,
    the lists are further sorted using the second values. Check it out:


    ```

    >>> strokes = [[18, 19], [4, 16], [4, 14], [5, 12]]

    >>> strokes.sort()

    >>> strokes

    [[4, 14], [4, 16], [5, 12], [18, 19]]

    ```


    Algorithm: check. Sorting: check. We’re in great shape! Just one more thing we’d
    like to know before we see the code: what will be its big O efficiency? We need
    to read the *q* queries; that takes *O(q)* time. Then we need to sort the queries;
    that takes *O(q log q)* time. Finally, we need to process the'
  - "[PAGE 305]\n\nqueries; that takes $O(q)$ time. The slowest of these is the $O(q\
    \ \\log q)$ time for the sorting, so that's our overall big O efficiency.\nNow\
    \ we have everything we need for a speedy solution. Check it out in Listing 10-2.\n\
    \n```\nlst = input().split()\nn = int(lst[0])\nq = int(lst[1])\n\nstrokes = []\n\
    \nfor i in range(q):\n    stroke = input().split()\n    strokes.append([int(stroke[0]),\
    \ int(stroke[1])])\n\nstrokes.sort()\n\nrightmost_position = 0\n\nblue = 0\n\n\
    for stroke in strokes:\n    stroke_start = stroke[0]\n    stroke_end = stroke[1]\n\
    \    if stroke_start <= rightmost_position:\n        if stroke_end > rightmost_position:\n\
    \            blue = blue + stroke_end - rightmost_position\n            rightmost_position\
    \ = stroke_end\n    else:\n        blue = blue + stroke_end - stroke_start\n \
    \       rightmost_position = stroke_end\n\nprint(n - blue, blue)\n```\n\nListing\
    \ 10-2: Solving Ribbon Painting\n\nWe read each paint stroke, appending it as\
    \ a list of two values to our strokes list ❶. We then sort all of the paint strokes\
    \ ❷.\nWe next need to process each paint stroke from left to right. There are\
    \ two key variables that drive this processing: variable `rightmost_position`\
    \ stores the rightmost position that we have painted so far, and variable `blue`\
    \ stores the number of units that we have painted blue so far.\nTo process a paint\
    \ stroke, we need to know whether it starts before or after our stored rightmost\
    \ position. Let's think about each of these cases in turn.\nFirst: what do we\
    \ do when the paint stroke starts before our stored rightmost position ❸? This\
    \ paint stroke might give us some new blue units, but only if it extends past\
    \ our stored rightmost position. If it does, then the new"
  - '[PAGE 306]


    blue units are those between the stored rightmost position and the ending position
    of the paint stroke ④.

    Second: what do we do when the paint stroke starts after our stored rightmost
    position ⑤? This time, the paint stroke is completely separate from the painting
    we have done so far; this entire paint stroke is a new blue segment. As such,
    the new blue units are those between the ending position and starting position
    of this paint stroke ⑥.

    Notice in each case that we also correctly update our stored rightmost position
    so that we’re ready to process any further paint strokes.

    That’s a wrap! Guided by our big O analysis, we were able to dismiss an algorithm
    whose implementation we knew would be too slow. We then thought about a second
    algorithm—and before implementing it, we knew it would be plenty fast. It’s time
    to submit our code to the judge and bask in our success.


    # Summary


    In this chapter, we learned about big O analysis. Big O is an important efficiency
    building block for further study of algorithm design. You’ll see it everywhere:
    in tutorials, in books, probably in your next job interview!

    We also solved two problems where we needed to design very efficient algorithms.
    Not only were we able to do that, but we were also able to use big O to obtain
    a satisfying understanding of exactly why our code was so efficient.


    # Chapter Exercises


    Here are some exercises for you to try. For each, use big O to determine whether
    your proposed algorithm is efficient enough to solve the problem within the time
    limit. You might also like to implement algorithms that you know are going to
    be too slow. That would give you extra practice solidifying your Python knowledge
    and confirm that your big O analysis was spot-on!

    Some of these problems are quite challenging. There are two reasons. First, you
    might agree based on your work throughout the book that coming up with *any* algorithm
    can be tough. Coming up with a faster algorithm can be even tougher. Second, this
    is the end of our time together, but only the beginning of the study of algorithms.
    I hope that these problems both help you appreciate what you’ve accomplished and
    offer evidence that there’s a lot more beyond this book if you want it.


    +   1. DMOJ problem dmopc17c1p1, Fujo Neko (The problem talks about using fast
    input/output. Don’t ignore that!)

    2. DMOJ problem coci10c1p2, Profesor

    3. DMOJ problem coci19c4p1, Pod starim krovovima (Hint: to maximize the number
    of empty glasses, you want to put as much liquid as possible in the biggest glasses.)

    4. DMOJ problem dmopc20c1p2, Victor’s Moral Dilemma'
  - '[PAGE 307]


    +   5. DMOJ problem avocadotrees, Avocado Trees!

    6. DMOJ problem coci11c5p2, Eko (Hint: the maximum number of trees is far fewer
    than the maximum number of heights. Consider each tree from tallest to shortest.)

    7. DMOJ problem wac6p2, Cheap Christmas Lights (Hint: don''t try flipping a switch
    each second—how would you know which one to flip? Instead, store them up, and
    use them all as soon as you can shut off all the lights that are on.)

    8. DMOJ problem ioi98p3, Party Lamps (Hint: all that matters for each button is
    whether it is pressed an even or odd number of times.)


    # Notes


    Longest Scarf is originally from the DMOPC ''14 March Contest. Ribbon Painting
    is originally from the DMOPC ''20 November Contest.'
  - '[PAGE 308]


    # AFTERWORD


    ![](img/712dd6dddc9c23a969f25d44b233585c_308_0.png)


    Before you jump into whatever is next, I’d like to take a minute to congratulate
    you on what you’ve accomplished to this point. It’s possible that you hadn’t done
    any programming before picking up this book. Or maybe you had done a little programming
    and wanted to improve your problem-solving ability. Regardless, if you’ve made
    it through the book and spent the necessary time grinding through the exercises,
    you now know how to solve problems using a computer. You learned how to understand
    a problem description, design a solution, and write that solution in code. You
    learned about if statements, loops, lists, functions, files, sets, dictionaries,
    complete-search algorithms, and big O analysis. These are the core tools of programming,
    and the tools that you’ll turn to again and again. You can also now call yourself
    a Python programmer!'
