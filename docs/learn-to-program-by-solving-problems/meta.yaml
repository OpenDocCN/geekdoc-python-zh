    \ fourth year. Then we can calculate that 50 * 0.1 = 5 students are in their fourth\
    \ year.\n\nNow suppose that there are 50 students, but that 15 percent of them\
    \ (a proportion of 0.15) are in their fourth year. If we multiply, we get 50 *\
    \ 0.15 = 7.5 students in their fourth year.\n\nHaving 7.5 students doesn't make\
    \ any sense. When this happens, the problem specifies that we are to round down—so\
