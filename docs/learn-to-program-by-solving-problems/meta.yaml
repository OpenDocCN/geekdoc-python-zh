    - 5. DMOJ问题ecoo16r1p2，“Spindie”\n- 6. DMOJ问题cco96p2，“SafeBreaker”\n- 7. USACO\
    \ 2019年十二月铜牌组比赛问题“我在哪里”\n- 8. USACO 2016年一月铜牌组比赛问题“愤怒的奶牛”\n- 9. USACO 2016年十二月银牌组比赛问题“数干草堆”\n\
