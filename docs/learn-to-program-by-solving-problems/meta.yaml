    \ solving exercise 1 from “Chapter Exercises” on page 134.\n\n## Problem #12:\
    \ School Trip\n\nMany problems you’ll encounter have input with multiple integers\
    \ or floats per line. We’ve avoided these problems until now, but they are everywhere!\
    \ We’ll now learn how we can use lists to process the input for these kinds of\
    \ problems.\n\nThis is DMOJ problem ecoo17r1p1.\n\n### The Challenge\n\nStudents\
    \ would like to go on a school trip at the end of the year, but they need money\
    \ to pay for it. To raise money, they have organized a brunch. To attend the brunch,\
