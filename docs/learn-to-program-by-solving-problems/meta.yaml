    We can protect against that error by first using `in` to check whether a key is
    in the dictionary. When used on a dictionary, the `in` operator checks only the
    keys, not the values. Here''s how we can check that a key exists before trying
    to find its value:


    ```

    >>> if ''cut'' in d:

    ...     print(d[''cut''])

    ...

    4

    >>> if ''storm'' in d:

    ...     print(d[''storm''])

    ...

    ```


    Indexing and using `in` on a dictionary are extremely fast operations. They don''t
    require searching any kind of list, no matter how many keys are in the dictionary.


    It''s sometimes more convenient to use the `get` method rather than indexing to
    look up the value for a key. The `get` method never produces an error, even if
    the key doesn''t exist:


    ```

    >>> print(d.get(''cut''))

    4

    >>> print(d.get(''storm''))

    None

    ```


    If the key exists, `get` returns its value. Otherwise, it returns `None` to signify
    that the key does not exist.


    In addition to looking up the value for a key, we can use square brackets to add
    keys to a dictionary or change the value that a key maps to. Here''s some code
    that shows how to do each of these, starting with an empty dictionary:


    ```

