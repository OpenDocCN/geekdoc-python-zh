    \n`endpoints`的每个值都是一个包含两个值的列表：索引0是最左边（最小）的高度，索引1是最右边（最大）的高度。代码使用`maximum`变量来跟踪盒子的最大高度。在`for`循环之前，它指的是第一个盒子中的最大高度。`for`循环将下一个盒子的最小值与该最大值进行比较。如果下一个盒子的最小值太小，我们就返回False，因为这两个盒子无法正确组织。每次迭代的最后一件事是更新`maximum`，使其指向下一个盒子的最大值。\n\
    \n## 整合所有部分\n\n在为所有任务编写了代码，包括设计过程中产生的函数之后，我们准备将它们整合成一个完整的解决方案。是否保留程序主部分中的注释由你决定。我保留了它们，但在实践中，这可能是过度文档化代码的情况，因为函数名称本身就被选择来传达代码的功能。完整的代码见清单6-2。\n\
    \n```\ndef read_boxes(n):\n    \"\"\"\n    n是要读取的盒子数量。\n\n    从输入中读取盒子，并将它们作为盒子列表返回；\n\
    \    每个盒子是一个动作人偶高度的列表。\n    \"\"\"\n    boxes = []\n    for i in range(n):\n \
    \       box = input().split()\n        box.pop(0)\n        for i in range(len(box)):\n\
    \            box[i] = int(box[i])\n        boxes.append(box)\n    return boxes\n\
    ```\n\n```\ndef box_ok(box):\n    \"\"\"\n    box是给定盒子中动作人偶高度的列表。\n\n    如果box中的高度是非递减顺序，则返回True，否则返回False。\n\
    \    \"\"\"\n    for i in range(len(box) - 1):\n        if box[i] > box[i + 1]:\n\
    \            return False\n    return True\n```\n\n```\ndef all_boxes_ok(boxes):\n\
    \    \"\"\"\n    boxes是一个盒子列表；每个盒子是一个动作人偶高度的列表。\n\n    如果boxes中的每个盒子的动作人偶都按高度非递减顺序排列，\n\
    \    则返回True，否则返回False。\n    \"\"\"\n    for box in boxes:\n        if not box_ok(box):\n\
    \            return False\n    return True\n```\n\n```\ndef boxes_endpoints(boxes):\n\
    \    \"\"\"\n    boxes是一个盒子列表；每个盒子是一个动作人偶高度的列表。\n\n    返回一个列表，其中每个值都是一个包含两个值的列表：\n\
    \    盒子中最左边和最右边动作人偶的高度。\n    \"\"\"\n    endpoints = []\n    for box in boxes:\n\
    \        endpoints.append([box[0], box[-1]])\n    return endpoints\n```\n\n```\n\
    def all_endpoints_ok(endpoints):\n    \"\"\"\n    endpoints是一个列表，其中每个值都是一个包含两个值的列表：\n\
    \    盒子中最左边和最右边动作人偶的高度。\n\n    要求：endpoints已按最左边动作人偶的高度排序。\n\n    如果端点来自可以按有效顺序排列的盒子，则返回True，否则返回False。\n\
    \    \"\"\"\n    maximum = endpoints[0][1]\n    for i in range(1, len(endpoints)):\n\
    \        if endpoints[i][0] < maximum:\n            return False\n        maximum\
    \ = endpoints[i][1]\n    return True\n```\n\n```\n# 主程序\n\n# 读取输入\nn = int(input())\n\
    boxes = read_boxes(n)\n\n# 检查所有盒子是否都正常\nif not all_boxes_ok(boxes):\n    print('NO')\n\
    else:\n    # 获取一个只包含左右高度的新盒子列表\n    endpoints = boxes_endpoints(boxes)\n\n   \
    \ # 对盒子排序\n    endpoints.sort()\n\n    # 判断盒子是否已组织好\n    if all_endpoints_ok(endpoints):\n\
    \        print('YES')\n    else:\n        print('NO')\n```\n\n清单6-2：解决动作人偶问题\n\
    \n这是到目前为止我们在本书中编写的最大的程序。但看看程序的主部分多么整洁和精简：它主要是函数调用，只有一点if-else逻辑将它们粘合在一起。\n我们在这里每个函数只调用一次。与我们调用了四次的`no_high`纸牌游戏函数相比。即使一个函数只被调用一次，它仍然有助于组织良好、可读的代码。\n\
    是时候提交给Timus评测系统了。你应该看到所有测试用例都通过了。\n\n## 概念检查\n\n在任务2中，我们编写了函数`box_ok`来判断单个盒子的高度是否有序。它使用了一个`for`循环。以下使用`while`循环版本的`box_ok`正确吗？\n\
    \n```\ndef box_ok(box):\n    \"\"\"\n    box是给定盒子中动作人偶高度的列表。\n\n    如果box中的高度是非递减顺序，则返回True，否则返回False。\n\
    \    \"\"\"\n    ok = True\n    i = 0\n    while i < len(box) - 1 and ok:\n  \
    \      if box[i] > box[i + 1]:\n            ok = False\n        i = i + 1\n  \
    \  return ok\n```\n\n- A. 是\n- B. 否；它可能导致IndexError\n- C. 否；它不会导致任何错误，但可能返回错误的值\n\
    \n（续）"
