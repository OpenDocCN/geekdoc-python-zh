    # The Challenge


    Calculate the volume of a right circular cone.


    # Input


    The input consists of two lines of text. The first line contains integer $r$,
    the radius of the cone. The second line contains integer $h$, the height of the
    cone. Both $r$ and $h$ are between 1 and 100. (That is, the minimum value for
    $r$ and $h$ is 1, and the maximum value is 100.)


    # Output


    Output the volume of the right circular cone with radius $r$ and height $h$. The
    formula to calculate the volume is $(\pi r^2 h)/3$.


    # More Math in Python


    Suppose we have r and h variables referring to a radius and height, respectively:


    ```

    >>> r = 4

    >>> h = 6

    ```


    Now we want to evaluate $(\pi r^2 h)/3$. Substituting a radius of 4 and height
    of 6, we have $(\pi * 4^2 * 6)/3$. Using a value of 3.14159 for $\pi$, a calculator
    gives a result of 100.531. How can we do this in Python?


    # Accessing Pi


    To access the value of $\pi$, we''ll use a suitable variable. Here''s an assignment
    statement to PI with a lot of accuracy in its value:


    ```

    PI = 3.141592653589793

    ```


    This is more a *constant* than a variable, since we''ll never want to change the
    value of PI in our code. It''s Python convention to use uppercase letters for
    such variables, as I''ve done here.


