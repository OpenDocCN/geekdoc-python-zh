    \ log₂ 1,000,000 步，这大约只有20步。对数时间比线性时间更接近常数时间。任何时候你能用对数时间算法替换线性时间算法，都是一个巨大的胜利。\n\
    \n## n log n 时间\n\n在第5章中，我们解决了村庄邻里问题。我在这里重现了我们来自清单5-1的解决方案：\n\n```\nn = int(input())\n\
    \npositions = []\n\n❶ for i in range(n):\n    positions.append(int(input()))\n\
