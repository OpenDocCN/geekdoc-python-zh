- md: '## Summary


    In this chapter, we learned about for loops. Standard for loops loop through the
    characters of a sequence; range for loops loop through integers in a range. Each
    problem that we solved required us to process many pieces of input, and we wouldn''t
    have been able to manage that without a loop.


    The for loop is the loop of choice whenever you need to repeat code a specified
    number of times. Python has one other type of loop, and we''ll learn how to use
    it in the next chapter. Why do we need anything besides for loops? What can''t
    for loops do? Good questions! I''ll tell you this for now: practicing with for
    loops is a wonderful way to prepare for what''s to come.


    ## Chapter Exercises


    Here are some exercises for you to try:


    - 1. DMOJ problem wc17c3j3, Uncrackable

    - 2. DMOJ problem coci18c3p1, Magnus

    - 3. DMOJ problem ccc11s1, English or French

    - 4. DMOJ problem ccc11s2, Multiple Choice

    - 5. DMOJ problem coci12c5p1, Ljestvica

    - 6. DMOJ problem coci13c3p1, Rijeci

    - 7. DMOJ problem coci18c4p1, Elder


    ## Notes


    Three Cups is originally from the 2006/2007 Croatian Open Competition in Informatics,
    Contest 5. Occupied Spaces is originally from the 2018 Canadian Computing Competition,
    Junior Level. Data Plan is originally from the 2016/2017 Croatian Open Competition
    in Informatics, Contest 1.


    # 4


    ## REPEATING CODE: INDEFINITE LOOPS


    The for loops and range for loops that you learned in Chapter 3 are convenient
    for looping through a string or range of indices. But what do we do when we have
    no string or when the indices do not follow a fixed pattern? We use a while loop,
    the topic of this chapter. while loops are more general than for loops and can
    handle situations that a for loop cannot.


    We''ll solve three problems where for loops fall short: determining the number
    of times slot machines can be played, organizing a song playlist until the user
    wants to stop, and decoding an encoded message.


    **Problem #8: Slot Machines** How many times can slot machines be played before
    we run out of money? This is a subtle question that depends not only on our starting
    money but also on the pattern of winnings as we play. We''ll see that we need
    a while loop, not a for loop, for this situation. This is DMOJ problem ccc00s1.


    ## The Challenge


    Martha goes to a casino and brings $n$ quarters. The casino has three slot machines,
    and she plays them in order until she has no quarters left. That is, she plays
    the first slot machine, then the second, then the third, then back to the first,
    then the second, and so on. Each play costs one quarter.


    The slot machines operate according to the following rules:


    - The first slot machine pays 30 quarters every 35th time it is played.

    - The second slot machine pays 60 quarters every 100th time it is played.

    - The third slot machine pays 9 quarters every 10th time it is played.

    - No other plays pay anything.


    Determine the number of times Martha plays before she has no quarters left.


    ## Input


    The input consists of four lines.


    - The first line contains an integer $n$, the number of quarters that Martha brings
    to the casino. $n$ is between 1 and 1,000.

    - The second line contains an integer indicating the number of times that the
    first slot machine has been played since it last paid. These plays occurred prior
    to Martha arriving, and Martha''s plays continue from there. For example, suppose
    that the first slot machine has been played 34 times since it last paid. Then,
    Martha will win 30 quarters the first time she plays it.

    - The third line contains an integer indicating the number of times that the second
    slot machine has been played since it last paid.

    - The fourth line contains an integer indicating the number of times that the
    third slot machine has been played since it last paid.


    ## Output


    Output the following sentence, where $x$ is the number of times Martha plays before
    she has no quarters left:


    ```

    Martha plays x times before going broke.

    ```


    ## Exploring a Test Case


    Let''s run through an example, just to make sure that everything in this problem
    is clear. Here''s the test case we''ll use:


    ```

    7

    28

    ```


    To carefully trace Martha’s plays, we’ll need to keep track of six pieces of information.
    It’s convenient to use a table to do this, since a row can tell us the state after
    each play. Here are our columns:


    - **Plays** the number of slot machines that Martha has played

    - **Quarters** the number of quarters that Martha has

    - **Next play** the slot machine that Martha would play next

    - **First plays** the number of times that the first machine has been played since
    it last paid

    - **Second plays** the number of times that the second machine has been played
    since it last paid

    - **Third plays** the number of times that the third machine has been played since
    it last paid


    To start, Martha has played zero slot machines, she has seven quarters, and she’ll
    next play the first slot machine. The first slot machine has been played 28 times
    since it last paid, the second has been played 0 times since it last paid, and
    the third has been played 8 times since it last paid. Our state looks like this:


    | Plays | Quarters | Next play | First plays | Second plays | Third plays |

    |---|---|---|---|---|---|

    | 0 | 7 | first | 28 | 0 | 8 |


    Martha starts by playing the first slot machine. That costs one quarter. Because
    this is the 29th time this machine has been played since it last paid, not the
    35th, the slot machine pays Martha nothing. Martha will play the second slot machine
    next. This is our new state:


    | Plays | Quarters | Next play | First plays | Second plays | Third plays |

    |---|---|---|---|---|---|

    | 1 | 6 | second | 29 | 0 | 8 |


    Playing the second slot machine costs one quarter. Because this is the first time
    this machine has been played since it last paid, not the 100th, the slot machine
    pays Martha nothing. Martha will play the third slot machine next. This is our
    new state:


    | Plays | Quarters | Next play | First plays | Second plays | Third plays |

    |---|---|---|---|---|---|

    | 2 | 5 | third | 29 | 1 | 8 |


    Playing the third slot machine costs one quarter. Because this is the 9th time
    this machine has been played since it last paid, not the 10th, the slot machine
    pays Martha nothing. Next, Martha will cycle back to the first slot machine. This
    is our new state:


    | Plays | Quarters | Next play | First plays | Second plays | Third plays |

    |---|---|---|---|---|---|

    | 3 | 4 | first | 29 | 1 | 9 |


    Now Martha plays the first slot machine:


    | Plays | Quarters | Next play | First plays | Second plays | Third plays |

    |---|---|---|---|---|---|

    | 4 | 3 | second | 30 | 1 | 9 |


    Then Martha plays the second slot machine:


    | Plays | Quarters | Next play | First plays | Second plays | Third plays |

    |---|---|---|---|---|---|

    | 5 | 2 | third | 30 | 2 | 9 |


    Martha is almost out of quarters! But there''s good news coming, because she''s
    next going to play the third slot machine. It has been played nine times since
    it last paid. The next play is therefore its 10th, which pays Martha nine quarters.
    She had two quarters, pays one to play this machine, and then gets paid nine,
    so she''ll have 2 – 1 + 9 = 10 quarters after this play:


    | Plays | Quarters | Next play | First plays | Second plays | Third plays |

    |---|---|---|---|---|---|

    | 6 | 10 | first | 30 | 2 | 0 |


    Notice that the third slot machine has now been played zero times since it last
    paid.

    That''s six plays so far. I encourage you to keep tracing. You should see that
    Martha never gets paid again and that after 10 more plays (for a total of 16),
    Martha is broke.


    ## A Limitation of for loops


    In Chapter 3, we studied for loops. Standard for loops loop through a sequence,
    such as a string. We certainly have no string in the Slot Machines problem.

    Range for loops loop through a range of integers and can be used to loop a specified
    number of times. But how many times should we loop for Slot Machines? Ten? Fifty?
    Who knows. It depends on the number of plays that Martha can make before she''s
    out of quarters.'
  mdcn: '## 总结


    在本章中，我们学习了 for 循环。标准 for 循环遍历序列的字符；范围 for 循环遍历范围内的整数。我们解决的每个问题都需要处理大量输入，如果没有循环，我们将无法应对。


    for 循环是当你需要将代码重复执行指定次数时的首选循环。Python 还有另一种类型的循环，我们将在下一章学习如何使用它。为什么我们需要除 for 循环之外的其他东西？for
    循环有什么做不到的？好问题！我现在可以告诉你：练习 for 循环是为即将到来的内容做准备的绝佳方式。


    ## 章节练习


    以下是一些供你尝试的练习：


    - 1. DMOJ 问题 wc17c3j3，Uncrackable

    - 2. DMOJ 问题 coci18c3p1，Magnus

    - 3. DMOJ 问题 ccc11s1，English or French

    - 4. DMOJ 问题 ccc11s2，Multiple Choice

    - 5. DMOJ 问题 coci12c5p1，Ljestvica

