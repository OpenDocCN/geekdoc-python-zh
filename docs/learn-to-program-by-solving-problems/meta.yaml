  md: 'Before we start looking for triples, we sort the positions ❶.

    Our first loop goes through all positions using the loop variable i ❷. It''s a
    range for loop this time, not a for loop, so that we can keep track of which index
    we''re at. That''s useful because we can use the value of i + 1 as the starting
    index for our second loop ❸. The second loop will now never waste time looking
    at positions that are to the left of the first position.

    We next calculate the low and high ends of the range of values for our third position.

    Rather than increase total by 1 each time we find a suitable third position, we
    can instead find the left and right borders of suitable positions and then increase
    total in one shot. We can only do it this way because the list of positions is
    sorted. We find each of the borders using a while loop. The first while loop finds
    the left border ❹. It keeps going as long as the positions are less than low.
    When it''s done, left will be the leftmost index whose position is greater than
    or equal to low. The second while loop finds the right border ❺. It keeps going
    as long as the positions are less than or equal to high. When it''s done, right
    is the rightmost index whose position is greater than high. Each of the positions
    from left up to but not including right can serve as the third position in a triple
    involving the positions at indices i and j. We add right - left to total to account
    for these positions ❻.

    The two while loops in this program are quite tricky. Let''s make sure we know
    exactly what they''re doing by working through an example. We''ll use the following
    list of positions; they''re the same as those we used in the previous section,
    but sorted:


    ```

    [1, 6, 11, 14, 16, 18, 23]

    ```


    Suppose that i is 1 and j is 2 so that the two positions in prospective triples
    are 6 and 11. For the third position, we''re therefore looking for positions greater
    than or equal to 16 and less than or equal to 21. The first while loop will set
    left to 4, the leftmost index whose position is greater than or equal to 16. The
    second while loop will set right to 6, the leftmost index whose position is greater
    than 21. Subtracting left from right, we obtain 6 - 4 = 2, which means that there
    are two triples involving positions 6 and 11. Before continuing, I encourage you
