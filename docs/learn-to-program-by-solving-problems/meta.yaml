    # String Operators


    We can use a string to hold the text whose words we want to count. To count the
    words—or to do anything else with strings—we need to learn how to work with strings.


    Strings come with a rich variety of operations that we can perform. Some of them
    use special symbols between their operands. For example, the + operator is used
    for string concatenation:


    ```

    >>> ''hello'' + ''there''

    ''hellothere''

    ```


    Oops—we need a space between those two words. Let’s add one to the end of the
    first string:


    ```

    >>> ''hello '' + ''there''

    ''hello there''

    ```


    There’s also the * operator, which replicates a string a specified number of times:


    ```

    >>> ''-'' * 30

    ''------------------------------''

    ```


    That 30 there is an integer value. I’ll have more to say about integers shortly.


    > CONCEPT CHECK


    What is the output of the following code?


    >>> '''' * 3


    A. ''''''''''''

    B. ''''

    C. This code produces a syntax error (invalid Python code)


    Answer: B. '''' is the empty string—a string of zero characters. Repeating an
    empty string three times is still an empty string!'
- md: '## String Methods


    A *method* is an operation specific to a type of value. Strings have a large number
    of methods. For example, there''s a method called `upper`, which produces the
    uppercase version of a string:


    ```

    >>> ''hello''.upper()

    ''HELLO''

    ```


    The information we get back from a method is known as the method''s *return value*.
    For example, we could say for the previous example that `upper` returned the string
    `''HELLO''`.


    Performing a method on a value is known as *calling* the method. Calling a method
    involves placing the *dot operator* (`.`) between the value and the method name.
    It also requires parentheses after the method name. For some methods, we leave
    those parentheses empty, as when calling `upper`.


    For other methods, we can optionally include information there. Still other methods
    require information and won''t work at all without it. Information we include
    when calling a method is referred to as the method''s *arguments*.


    For example, strings have a `strip` method. If called with no arguments, `strip`
    removes all leading and trailing spaces from a string:


    ```

    >>> ''   abc''.strip()

    ''abc''

    >>> ''   abc   ''.strip()

    ''abc''

    >>> ''abc''.strip()

    ''abc''

    ```


    But we can also call it with a string as the argument. If we do, that argument
    determines which characters are stripped from the beginning and the end:


    ```

    >>> ''abc''.strip(''a'')

    ''bc''

    >>> ''abca''.strip(''a'')

    ''bc''

    >>> ''abca''.strip(''ac'')

    ''b''

    ```


    Let''s talk about one more string method: `count`. We pass it a string argument,
    and it tells us how many occurrences of that argument are found in our string:


    ```

    >>> ''abc''.count(''a'')

    1

    >>> ''abc''.count(''q'')

    0

    >>> ''aaabcaa''.count(''a'')

    5

    >>> ''aaabcaa''.count(''ab'')

    1

    ```


    If occurrences of the argument overlap, only the first counts:


    ```

    >>> ''ababa''.count(''aba'')

    1

    ```


    Unlike the other methods I''ve described, `count` is directly useful to our Word
    Count problem.

    Think of a string like `''this is a string with a few words''`. Notice that a
    space comes after each word. In fact, if you had to count the number of words
    by hand, you might use the spaces to tell you where each word ends. What if we
    count the number of spaces in a string? To do that, we can pass a string consisting
    of a single space character to `count`. It looks like this:


    ```

    >>> ''this is a string with a few words''.count('' '')

    7

    ```


    We get a value of 7. That''s not quite the number of words—there are eight words
    in the string—but we''re close. Why are we getting 7 instead of 8?

    The reason is that each word has a space after it except the last word. Counting
    the spaces therefore fails to account for the final word. To remedy that, we need
    to learn how to handle numbers.


    ## Integer and Floating-Point Numbers


    An *expression* is made up of values and operators. We''ll now see how to write
    numeric values and combine them with operators.

    There are two different Python types that represent numbers: integers (with no
    decimal part) and floating-point numbers (with a decimal part).

    We write integer values as numbers with no decimal point. Here are some examples:


    ```

    >>> 30

    30

    >>> 7

    7

    >>> 1000000

    1000000

    >>> -9

    -9

    ```


    A value on its own is the simplest kind of expression.

    The familiar mathematical operators work on integers. We have `+` for addition,
    `-` for subtraction, and `*` for multiplication. We can use these operators to
    write more complicated expressions:


    ```

    >>> 8 + 10

    18

    >>> 8 - 10

    -2

    >>> 8 * 10

    80

    ```


    Notice the spaces around the operators. While `8+10` and `8 + 10` are the same
    as far as Python is concerned, the latter makes the expression easier for us humans
    to read.

    Python has two division operators, not one! The `//` operator performs integer
    division, which throws away any remainder and rounds the result down:


    ```

    >>> 8 // 2

    4

    >>> 9 // 5

    1

    >>> -9 // 5

    -2

    ```


    If you want the remainder of the division, use the mod operator, written as `%`.
    For example, dividing 8 by 2 leaves no remainder:


    ```

    >>> 8 % 2

    0

    ```


    Dividing 8 by 3 leaves a remainder of 2:


    ```

    >>> 8 % 3

    2

    ```


    The `/` operator, in contrast to `//`, doesn''t do any rounding:


    ```

    >>> 8 / 2

    4.0

    >>> 9 / 5

    1.8

    >>> -9 / 5

    -1.8

    ```


    These result values are not integers! They have a decimal point and belong to
    a different Python type called *float* (for "floating-point numbers"). You can
    write float values by including a decimal point:


    ```

    >>> 12.5 * 2

    25.0

    ```


    We''ll focus on integers for now and return to floating-point numbers when we
    solve Cone Volume later in this chapter.


    When we use multiple operators in an expression, Python uses precedence rules
    to determine the order that operators are applied. Each operator has a precedence.
    Just like when we evaluate a mathematical expression on paper, Python performs
    multiplications and divisions (higher precedence) before additions and subtractions
    (lower precedence):


    ```

    >>> 50 + 10 * 2

    70

    ```


    Again, like on paper, operations inside parentheses have the highest precedence.
    We can use this to force Python to perform operations in our desired order:


    ```

    >>> (50 + 10) * 2

    120

    ```


    Programmers often add parentheses even when not technically required. That''s
    because Python has many operators, as we''ll see, and keeping track of their precedence
    is error-prone and not something that programmers typically do.


    In case you''re wondering whether integer values and float values have methods,
    just like strings, they do! But they aren''t all that useful. For example, there''s
    a method that tells us how much of the computer''s memory is taken up by an integer.
    The bigger the integer, the more memory it requires:


    ```

    >>> (5).bit_length()

    3

    >>> (100).bit_length()

    7

    >>> (99999).bit_length()

    17

    ```


    We need the parentheses around the integers; otherwise, the dot operator gets
    confused with a decimal point, and we get a syntax error.


    ## Variables


    We now know how to write string and numeric values. We''ll also find it valuable
    to be able to store them so we can access them later. In Word Count, it would
    be convenient to be able to store the line of words somewhere and then count the
    number of words.


    ### Assignment Statement


    A *variable* is a name that refers to a value. Whenever we later use a variable''s
    name, it gets substituted by what that variable refers to. To make a variable
    refer to a value, we use the *assignment statement*. An assignment statement consists
    of a variable, an equal sign (`=`), and an expression. Python evaluates the expression
    and makes the variable refer to the result. Here''s an example assignment statement:


    ```

    >>> dollars = 250

    ```


    Now, `dollars` is substituted by 250 whenever we use it:


    ```

    >>> dollars

    250

    >>> dollars + 10

    260

    >>> dollars

    250

    ```


    A variable refers to only one value at a time. Once we use an assignment statement
    to make a variable refer to another value, it no longer refers to the old value:


    ```

    >>> dollars = 250

    >>> dollars

    250

    >>> dollars = 300

    >>> dollars

    300

    ```


    We can have as many variables as we like. Large programs typically use hundreds
    of variables. Here''s an example of using two variables:


    ```

    >>> purchase_price1 = 58

    >>> purchase_price2 = 9

    >>> purchase_price1 + purchase_price2

    67

    ```


    Notice that I''ve chosen variable names that give some sense of what they''re
    storing. These two variables, for example, have to do with the prices of two purchases.
    Using variable names `p1` and `p2` would be easier to type, but in a few days
    we''d probably forget what the names mean!

    We can make variables refer to strings, too:


    ```

    >>> start = ''Monday''

    >>> end = ''Friday''

    >>> start

    ''Monday''

    >>> end

    ''Friday''

    ```


    As with variables that refer to numbers, we can use these in larger expressions:


    ```

    >>> start + ''-'' + end

    ''Monday-Friday''

    ```


    Python variable names should start with a lowercase letter and then can contain
    additional letters, underscores to separate words, and numbers.


    ### Changing Variable Values


    Suppose we have a variable `dollars` that refers to value 250:


    ```

    >>> dollars = 250

    ```


    Now we want to increase the value so that `dollars` refers to 251. This won''t
    work:


    ```

    >>> dollars + 1

    251

    ```


    The result is 251, but that value is gone, not stored anywhere:


    ```

    >>> dollars

    250

    ```


    What we need is an assignment statement that captures the result of `dollars +
    1`:


    ```

    >>> dollars = dollars + 1

    >>> dollars

    251

    >>> dollars = dollars + 1

    >>> dollars

    252

    ```


    It''s common for learners to think of the assignment symbol `=` as equality. But
    don''t do that! The assignment statement is a command to make a variable refer
    to the value of an expression, not a claim that two entities are equal.


    > **CONCEPT CHECK**


    What is the value of `y` after the execution of the following code?


    *(continued)*'
  mdcn: '## 字符串方法


    *方法*是特定于某种值类型的操作。字符串拥有大量的方法。例如，有一个名为 `upper` 的方法，它能生成字符串的大写版本：


    ```

    >>> ''hello''.upper()

    ''HELLO''

    ```


    我们从方法获得的信息被称为该方法的*返回值*。例如，对于前面的例子，我们可以说 `upper` 返回了字符串 `''HELLO''`。


    对一个值执行方法被称为*调用*该方法。调用方法需要在值和方法名之间放置*点运算符*（`.`）。它还要求在方法名后加上括号。对于某些方法，我们让这些括号保持为空，就像调用
    `upper` 时那样。


    对于其他方法，我们可以在括号中选择性地包含信息。还有一些方法则需要信息，没有信息就完全无法工作。我们在调用方法时包含的信息被称为该方法的*参数*。


    例如，字符串有一个 `strip` 方法。如果在没有参数的情况下调用，`strip` 会移除字符串开头和结尾的所有空格：


    ```

    >>> ''   abc''.strip()

    ''abc''

    >>> ''   abc   ''.strip()

    ''abc''

    >>> ''abc''.strip()

    ''abc''

    ```


    但我们也可以用一个字符串作为参数来调用它。如果我们这样做，该参数将决定从开头和结尾移除哪些字符：


    ```

    >>> ''abc''.strip(''a'')

    ''bc''

    >>> ''abca''.strip(''a'')

    ''bc''

    >>> ''abca''.strip(''ac'')

    ''b''

    ```


    让我们再讨论一个字符串方法：`count`。我们向它传递一个字符串参数，它会告诉我们该参数在我们的字符串中出现了多少次：


    ```

    >>> ''abc''.count(''a'')

    1

    >>> ''abc''.count(''q'')

    0

    >>> ''aaabcaa''.count(''a'')

    5

    >>> ''aaabcaa''.count(''ab'')

    1

    ```


    如果参数的出现有重叠，只有第一次出现会被计数：


    ```

    >>> ''ababa''.count(''aba'')

    1

    ```


    与我之前描述的其他方法不同，`count` 对我们的“单词计数”问题直接有用。

    想象一个字符串，比如 `''this is a string with a few words''`。注意每个单词后面都有一个空格。事实上，如果你必须手动计算单词数量，你可能会利用空格来判断每个单词在哪里结束。如果我们计算字符串中的空格数量会怎样？为此，我们可以向
    `count` 传递一个由单个空格字符组成的字符串。它看起来像这样：


    ```

    >>> ''this is a string with a few words''.count('' '')

    7

    ```


    我们得到的值是 7。这并不完全等于单词数量——字符串中有八个单词——但我们已经很接近了。为什么我们得到的是 7 而不是 8？

    原因在于，除了最后一个单词，每个单词后面都有一个空格。因此，计算空格数未能计入最后一个单词。为了弥补这一点，我们需要学习如何处理数字。


    ## 整数和浮点数


    一个*表达式*由值和运算符组成。我们现在将了解如何编写数值以及如何将它们与运算符组合。

    Python 中有两种不同的数字类型：整数（没有小数部分）和浮点数（有小数部分）。

    我们将整数值编写为没有小数点的数字。以下是一些示例：


    ```

    >>> 30

    30

    >>> 7

    7

    >>> 1000000

    1000000

    >>> -9

    -9

    ```


    一个单独的值是最简单的表达式。

    熟悉的数学运算符适用于整数。我们有 `+` 表示加法，`-` 表示减法，`*` 表示乘法。我们可以使用这些运算符编写更复杂的表达式：


    ```

    >>> 8 + 10

    18

    >>> 8 - 10

    -2

    >>> 8 * 10

    80

    ```


    注意运算符周围的空格。虽然 `8+10` 和 `8 + 10` 在 Python 看来是一样的，但后者使表达式对我们人类来说更易读。

    Python 有两个除法运算符，而不是一个！`//` 运算符执行整数除法，它会丢弃任何余数并将结果向下取整：


    ```

    >>> 8 // 2

    4

    >>> 9 // 5

    1

    >>> -9 // 5

    -2

    ```


    如果你想得到除法的余数，请使用取模运算符，写作 `%`。例如，8 除以 2 没有余数：


    ```

    >>> 8 % 2

    0

    ```


    8 除以 3 余数为 2：


    ```

    >>> 8 % 3

    2

    ```


    `/` 运算符与 `//` 不同，它不做任何取整：


    ```

    >>> 8 / 2

    4.0

    >>> 9 / 5

    1.8

    >>> -9 / 5

    -1.8

    ```


    这些结果值不是整数！它们有小数点，属于另一种 Python 类型，称为 *float*（即“浮点数”）。你可以通过包含小数点来编写浮点值：


    ```

    >>> 12.5 * 2

    25.0

    ```


    我们现在将重点关注整数，并在本章后面解决“圆锥体体积”问题时再回到浮点数。


    当我们在表达式中使用多个运算符时，Python 使用优先级规则来确定运算符的应用顺序。每个运算符都有一个优先级。就像我们在纸上计算数学表达式一样，Python
    先执行乘法和除法（较高优先级），然后再执行加法和减法（较低优先级）：


    ```

    >>> 50 + 10 * 2

    70

    ```


    同样，就像在纸上一样，括号内的操作具有最高优先级。我们可以利用这一点来强制 Python 按照我们期望的顺序执行操作：


    ```

    >>> (50 + 10) * 2

    120

    ```


    程序员经常在技术上并非必需时也添加括号。这是因为 Python 有很多运算符，正如我们将看到的，跟踪它们的优先级容易出错，而且程序员通常不会这样做。


    如果你想知道整数值和浮点值是否像字符串一样有方法，它们确实有！但它们并不那么有用。例如，有一个方法可以告诉我们一个整数占用了计算机多少内存。整数越大，它需要的内存就越多：


    ```

    >>> (5).bit_length()

    3

    >>> (100).bit_length()

    7

    >>> (99999).bit_length()

    17

    ```


    我们需要在整数周围加上括号；否则，点运算符会与小数点混淆，导致语法错误。


    ## 变量


    我们现在知道如何编写字符串和数值了。我们也会发现能够存储它们以便稍后访问是很有价值的。在“单词计数”问题中，能够将一行单词存储在某个地方，然后计算单词数量，将会很方便。


    ### 赋值语句


    *变量*是引用一个值的名称。每当我们稍后使用变量名时，它都会被该变量所引用的值所替代。要让一个变量引用一个值，我们使用*赋值语句*。赋值语句由一个变量、一个等号（`=`）和一个表达式组成。Python
    计算表达式，并使变量引用结果。这是一个赋值语句的例子：


    ```

    >>> dollars = 250

    ```


    现在，每当我们使用 `dollars` 时，它都会被 250 替代：


    ```

    >>> dollars

    250

    >>> dollars + 10

    260

    >>> dollars

    250

    ```


    一个变量一次只能引用一个值。一旦我们使用赋值语句让一个变量引用另一个值，它就不再引用旧值：


    ```

    >>> dollars = 250

    >>> dollars

    250

    >>> dollars = 300

    >>> dollars

    300

    ```


    我们可以拥有任意多的变量。大型程序通常使用数百个变量。这是一个使用两个变量的例子：


    ```

    >>> purchase_price1 = 58

    >>> purchase_price2 = 9

    >>> purchase_price1 + purchase_price2

    67

    ```


    注意，我选择的变量名能体现它们存储的内容。例如，这两个变量与两次购买的价格有关。使用变量名 `p1` 和 `p2` 会更容易输入，但几天后我们可能就会忘记这些名字的含义！

    我们也可以让变量引用字符串：


    ```

    >>> start = ''Monday''

    >>> end = ''Friday''

    >>> start

    ''Monday''

    >>> end

    ''Friday''

    ```


    与引用数字的变量一样，我们可以在更大的表达式中使用它们：


    ```

    >>> start + ''-'' + end

    ''Monday-Friday''

    ```


    Python 变量名应以小写字母开头，然后可以包含额外的字母、用于分隔单词的下划线和数字。


    ### 更改变量值


    假设我们有一个变量 `dollars`，它引用值 250：


    ```

    >>> dollars = 250

    ```


    现在我们想增加这个值，使 `dollars` 引用 251。这样做是不行的：


    ```

    >>> dollars + 1

    251

    ```


    结果是 251，但这个值消失了，没有存储在任何地方：


    ```

    >>> dollars

    250

    ```


    我们需要的是一个赋值语句来捕获 `dollars + 1` 的结果：


    ```

    >>> dollars = dollars + 1

    >>> dollars

    251

    >>> dollars = dollars + 1

    >>> dollars

    252

    ```


    学习者常常将赋值符号 `=` 视为相等。但不要这样做！赋值语句是一个命令，它让一个变量引用一个表达式的值，而不是声称两个实体相等。


    > **概念检查**


    执行以下代码后，`y` 的值是多少？


    *(续)*'
