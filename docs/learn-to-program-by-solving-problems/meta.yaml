  md: "If any height is greater than the height to its right, we return False since\
    \ the heights are not in order. If we get past the for loop, then there are no\
    \ height violations, so we return True.\n\nOne nice side effect of using top-down\
    \ design is that we get little chunks of code, wrapped up as functions, that we\
    \ can test in isolation. For example, enter the code for box_ok into the Python\
    \ shell. Then we can test it:\n\n```\n>>> box_ok([4, 5, 6])\n```\n\nWe're hoping\
    \ for True to be returned here, because the box is in order from small heights\
    \ to big heights. We certainly weren't hoping for what we actually get:\n\n```\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    \  File \"<stdin>\", line 9, in box_ok\nIndexError: list index out of range\n\
    ```\n\nErrors are never fun, and they're even less fun when we have to trawl through\
    \ pages and pages of code to find them. But here, we know that the error is localized\
    \ to this little function, so our work to find it is reduced considerably. The\
    \ problem here is that we'll eventually compare the rightmost height to the height\
    \ to its right—and of course the latter doesn't exist! So we need to stop one\
    \ iteration earlier, comparing the second-to-last height to the last height. Here's\
    \ the updated code:\n\n```\ndef box_ok(box):\n    \"\"\"\n    box is the list\
    \ of action figure heights in a given box.\n\n    Return True if the heights in\
    \ box are in nondecreasing order,\n    False otherwise.\n    \"\"\"\n    for i\
    \ in range(len(box) - 1):\n        if box[i] > box[i + 1]:\n            return\
