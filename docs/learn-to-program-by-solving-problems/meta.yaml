    Listing 9-2: Main program


    We''re working with files here, not standard input and standard output.

    The program begins by reading the number of lifeguards and then uses a range for
    loop to read each lifeguard''s time interval. We read each time interval from
    the input ❶, convert each of its components to an integer, and append it as a
    two-value list to our list of intervals.

    We use the `max_covered` variable to track the maximum number of time units that
    can be covered.

    Now we separately fire each lifeguard using a range for loop ❷. We call `num_covered`
    ❸ to determine the number of time units that are covered given the firing of one
    lifeguard. We update `max_covered` whenever we''re able to cover a greater number
    of time units.

    When that loop completes, we''ll have checked the number of units of time that
    can be covered by firing each lifeguard, and we''ll have remembered the maximum.
    We output this maximum to solve the problem.

    Feel free to submit our code to the USACO judge. For Python code, this judge uses
    a time limit per test case of four seconds, but our solution shouldn''t come close
    to that limit. For example, I just ran the code here, and each test case finished
    in no more than 130 milliseconds.


    # Efficiency of Our Program


    The reason our code is so fast is because there are so few lifeguards—only at
    most 100 of them. If there were a large number of lifeguards, then our code would
