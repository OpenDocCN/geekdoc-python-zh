    \n对第四次涂色要小心。它*没有*增加19 – 16 = 3个新的蓝色单位。我们必须对这次涂色区别对待，因为它的起始位置在我们存储的最右位置的右侧。在这种情况下，我们完全不使用存储的最右位置，而是计算19\
    \ – 18 = 1个新的蓝色单位，总共13个蓝色单位。我们还将存储的最右位置更新为19。\n\n唯一的问题是我们在Python代码中如何对涂色进行排序。我们需要按它们的起始位置排序；如果多个涂色具有相同的起始位置，那么我们希望按它们的结束位置对这些进行排序。\n\
    \n也就是说，我们希望将这样的列表：\n\n```\n[[18, 19], [4, 16], [4, 14], [5, 12]]\n```\n\n转换成这样：\n\
