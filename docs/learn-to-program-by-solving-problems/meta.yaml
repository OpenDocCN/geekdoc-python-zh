  - '[PAGE 271]


    randint(a, b) method of random.Random instance

    Return random integer in range [a, b], including both end points.


    Another useful function in the random module is choice. We pass it a sequence,
    and it returns one of its values at random:


    ```

    >>> random.choice([''win'', ''lose''])

    ''lose''

    >>> random.choice([''win'', ''lose''])

    ''lose''

    >>> random.choice([''win'', ''lose''])

    ''win''

    ```


    If we frequently use a small number of functions from a module, it can be tedious
    to type the module name and a dot each time. There''s another way to import these
    functions that lets us call them like any other nonmodule function. Here''s how
    we can import only the randint function:


    ```

    >>> from random import randint

    ```


    Now we can call randint without the random. in front:


    ```

    >>> randint(2, 10)

    10

    ```


    If we need randint and choice, we can import them both:


    ```

    >>> from random import randint, choice

    ```


    We won''t do so in this book, but we can create our own modules containing whatever
    functions we like. For example, if we designed a few Python functions related
    to playing a game, we could place them all in a file named game_functions.py.
    We could then import that module using import game_functions and then access the
    functions within.

    The Python programs we''ve written in this book are not designed to be imported
    as modules. The reason is that they all read input as soon as they start running.
    A module shouldn''t do that. Rather, a module should wait for its functions to
    be called before it does anything. The random module is an example of a well-behaved
    module: it only starts giving us random things when we ask for them.


    # The bisect Module


    Now we''re ready to play around with binary search. In Listing 9-6, we had two
    while loops. They''re slow, so we want to get rid of them. To do that, we''re
    going to replace each one with a call to a binary search function: bisect_left
    for the first while loop and bisect_right for the second.'
  - '[PAGE 272]


    Both of these functions are in the bisect module. Let’s import them:


    ```

    >>> from bisect import bisect_left, bisect_right

    ```


    Let’s first discuss bisect_left. We call it by providing a sorted list (from low
    to high) and a value x. It returns to us the index of the leftmost value in the
    list that’s greater than or equal to x.

    If the value is in the list, we get the index of its leftmost occurrence:


    ```

    >>> bisect_left([10, 50, 80, 80, 100], 10)

    0

    >>> bisect_left([10, 50, 80, 80, 100], 80)

    2

    ```


    If the value isn’t in the list, then we get the index of the first value that’s
    greater:


    ```

    >>> bisect_left([10, 50, 80, 80, 100], 15)

    1

    >>> bisect_left([10, 50, 80, 80, 100], 81)

    4

    ```


    If we search for something that’s greater than every value in the list, we get
    the list’s length:


    ```

    >>> bisect_left([10, 50, 80, 80, 100], 986)

    5

    ```


    Let’s use bisect_left on our list of seven positions from “Sorting First” earlier
    in this chapter. We’ll find the index of the leftmost position that’s greater
    than or equal to 16:


    ```

    >>> positions = [1, 6, 11, 14, 16, 18, 23]

    >>> bisect_left(positions, 16)

    4

    ```


    Perfect: that’s exactly what we need to replace the first while loop in Listing
    9-6.

    To replace the second while loop, we’ll use bisect_right rather than bisect_left.
    We call bisect_right just as we called bisect_left : with a sorted list and a
    value x. Rather than returning the index of the leftmost value in the list that’s
    greater than or equal to x, it returns the index of the leftmost value that’s
    greater than x.

    Let’s compare bisect_left and bisect_right. For a value that’s in the list, bisect_right
    returns an index greater than that returned by bisect_left:


    ```

    >>> bisect_left([10, 50, 80, 80, 100], 10)

    0

    >>> bisect_right([10, 50, 80, 80, 100], 10)

    1

    ```'
