    \                    total = total + 1\n\noutput_file.write(str(total) + '\\n')\n\
    \ninput_file.close()\noutput_file.close()\n```\n\nListing 9-5: Using three nested\
    \ for loops\n\nWe read all of the cow positions into the `positions` list ❶. We\
