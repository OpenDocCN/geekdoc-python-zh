    greater-than sign (>). This is your operating system *prompt*, and it''s waiting
    for you to type a command. You type operating system commands here, *not* Python
    code. Be sure to press ENTER after each command.

    4. You''re now in your *programming* folder. You can type **dir** (for *directory*)
    if you''d like to see what''s there. You shouldn''t see any files yet, because
    we haven''t created any.

