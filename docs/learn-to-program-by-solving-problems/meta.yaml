  md: 'Values in a set must be immutable, which explains why we can''t put lists inside
    a set. The restriction has to do with how Python searches a set for a value. When
    Python adds a value to a set, it uses the value itself to determine where exactly
    it gets stored. Later, Python can find this value by looking in the place where
    it should be located. If a value in the set could change, then Python might look
    in the wrong place, failing to find the value.


    While we can''t create a set of lists, there''s no problem with a list of sets:


    ```

    >>> lst = [{1, 2, 3}, {4, 5, 6}]

    >>> lst

    [{1, 2, 3}, {4, 5, 6}]

    >>> len(lst)

    2

    >>> lst[0]

    {1, 2, 3}

    ```


    You can use the len function to determine the number of values in a set:


    ```

    >>> len({2, 4, 6, 8})

    4

    ```


    You can also loop over the values in a set:


    ```

    >>> for value in {2, 4, 6, 8}:

    ...     print(''I found'', value)

    ...

    I found 8

    I found 2

    I found 4

    I found 6

    ```


    You can''t index or slice a set, though. Values in a set don''t have indices.


    To create an empty set, you might expect to use an empty pair of curly braces,
    {}. In an inconsistency of Python syntax, that doesn''t work:


    ```

    >>> type({2, 4, 6, 8})

    <class ''set''>

    >>> {}

    {}

    >>> type({})

    <class ''dict''>

    ```


    Using {} gives us the wrong type: a dict (dictionary) instead of a set. We''ll
    talk about dictionaries later in this chapter.


    To make an empty set, we use set(), like this:


    ```

    >>> set()

    set()

    >>> type(set())

    <class ''set''>

    ```'
