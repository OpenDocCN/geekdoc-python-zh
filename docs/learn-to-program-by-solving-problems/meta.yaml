  md: 'An execution of the indented statements is referred to as an *iteration* of
    the loop. Here''s a walk-through of what our loop does on each iteration:


    +   - On the first iteration, Python sets char to refer to ''o'', the first character
    of ''olive''. It then runs the loop block, which consists only of the call to
    print. As char refers to ''o'', the output produced is Letter: o.

    - On the second iteration, Python sets char to refer to ''l'', the second character
    of ''olive''. It then calls print, outputting Letter: l.

    - This process repeats three more times, once for each remaining character in
    ''olive''.

    - The loop then terminates. We have no code after the loop, so our program has
    finished running. If there was additional code after the loop, then execution
    would continue with that code.


    You can put multiple statements in the block of a for loop. Here''s an example:


    ```

    >>> secret_word = ''olive''

    >>> for char in secret_word:

    ...     print(''Letter: '' + char)

    ...     print(''*'')

    ...

    Letter: o

    *

    Letter: l

    *

    Letter: i

    *

    Letter: v

    *

    Letter: e

    *

    ```


    Now we have two statements executing on each iteration of the loop: one that outputs
    the current letter of the string, and one that outputs a * character.


    A for loop loops through the elements of a sequence, so the sequence''s length
    tells us how many iterations there will be. The len function takes a string and
    returns its length:


    ```

    >>> len(''olive'')

    5

    ```


    Our for loop on ''olive'' will therefore consist of five iterations:


    ```

    >>> secret_word = ''olive''

    >>> print(len(secret_word), ''iterations, coming right up!'')

    >>> for char in secret_word:

    ```'
