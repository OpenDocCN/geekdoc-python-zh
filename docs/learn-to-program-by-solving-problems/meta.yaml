  md: '# The Challenge


    In basketball, three plays score points: a three-point shot, a two-point shot,
    and a one-point free throw.


    You just watched a basketball game between the Apples and Bananas and recorded
    the number of successful three-point, two-point, and one-point plays for each
    team. Indicate whether the game was won by the Apples, the game was won by the
    Bananas, or the game was a tie.


    # Input


    There are six lines of input. The first three give the scoring for the Apples,
    and the latter three give the scoring for the Bananas.


    +   - The first line gives the number of successful three-point shots for the
    Apples.

    - The second line gives the number of successful two-point shots for the Apples.

    - The third line gives the number of successful one-point free throws for the
    Apples.

    - The fourth line gives the number of successful three-point shots for the Bananas.

    - The fifth line gives the number of successful two-point shots for the Bananas.

    - The sixth line gives the number of successful one-point free throws for the
    Bananas.


    Each number is an integer from 0 to 100.


    # Output


    The output is a single character.


    +   - If the Apples scored more points than the Bananas, output A (A for Apples).

    - If the Bananas scored more points than the Apples, output B (B for Bananas).

    - If the Apples and Bananas scored the same number of points, output T (T for
    Tie).


    # Conditional Execution


    We can make a lot of headway here by using what we learned in Chapter 1. We can
    use input and int to read each of the six integers from the input. We can use
    variables to hang on to those values. We can multiply the number of successful
    three-point shots by 3 and the number of successful two-point shots by 2. We can
    use print to output an A, B, or T.'
