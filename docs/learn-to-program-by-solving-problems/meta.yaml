    \ 8]\n- C. [2, 6]\n- D. [2, 8]\n- E. 此代码会产生错误\n\n答案：C。`remove`调用移除了值4，留下[2, 6,\
    \ 8]。现在`pop`调用移除了索引2处的值，即值8。这留下了最终列表[2, 6]。\n\n## 解决问题\n\n假设我们已经成功读取并排序了村庄位置。此时我们的列表看起来会是这样：\n\
    \n```\n>>> positions = [1, 4, 15, 19, 20, 50]\n>>> positions\n[1, 4, 15, 19, 20,\
    \ 50]\n```\n\n为了找到最小邻居区域的大小，我们首先找到索引1处村庄的邻居区域大小。（注意，我们不从索引0开始：索引0处的村庄是最左边的，根据问题描述，我们可以忽略它。）我们可以这样找到该邻居区域的大小：\n\
    \n```\n>>> left = (positions[1] - positions[0]) / 2\n>>> right = (positions[2]\
    \ - positions[1]) / 2\n>>> min_size = left + right\n>>> min_size\n7.0\n```\n\n\
    `left`变量存储邻居区域左侧部分的大小，`right`存储右侧部分的大小。然后我们将它们相加，得到邻居区域的总大小。我们得到的值是7.0。\n\n这是需要超越的值。我们如何知道是否有其他村庄的邻居区域更小？我们可以使用循环来处理其他村庄。如果我们找到一个比当前最小值更小的邻居区域，我们就将当前最小值更新为那个更小的大小。\n\
    \n我们的解决方案代码在清单5-1中。\n\n```\nn = int(input())\n\npositions = []\n\nfor i in range(n):\n\
    \    positions.append(int(input()))\n\npositions.sort()\n\nleft = (positions[1]\
    \ - positions[0]) / 2\nright = (positions[2] - positions[1]) / 2\nmin_size = left\
    \ + right\n\nfor i in range(2, n - 1):\n    left = (positions[i] - positions[i\
    \ - 1]) / 2\n    right = (positions[i + 1] - positions[i]) / 2\n    size = left\
    \ + right\n    if size < min_size:\n        min_size = size\n\nprint(min_size)\n\
    ```\n\n清单5-1：解决“村庄邻居”问题\n\n我们首先从输入中读取`n`，即村庄的数量。我们还将`positions`设置为引用一个空列表❶。\n\n\
    第一个`range` for循环的每次迭代❷负责读取一个村庄位置并将其追加到`positions`列表中。它通过使用`input`读取下一个村庄位置，使用`int`将其转换为整数，并使用列表方法`append`将该整数追加到列表中来实现❸。那一行代码❸等同于以下三行独立的代码：\n\
    \n```\nposition = input()\nposition = int(position)\npositions.append(position)\n\
    ```\n\n读取村庄位置后，我们接下来按升序对它们进行排序❹。然后我们找到索引1处村庄的邻居区域大小，并使用`min_size`存储它❺。\n\n接下来，在第二个循环中，我们遍历每个需要计算邻居区域大小的其他村庄❻。这些村庄从索引2开始，到索引`n\
    \ - 2`结束。（我们不想考虑索引`n - 1`处的村庄，因为那是最右边的村庄。）因此，我们使用`range`，第一个参数为2（因此从2开始），第二个参数为`n\
    \ - 1`（因此到`n - 2`结束）。\n\n在循环内部，我们计算当前村庄的邻居区域大小，就像我们为第一个村庄所做的那样。到目前为止我们找到的最小邻居区域大小由`min_size`引用。当前村庄的邻居区域是否比我们目前的最小值小？为了回答这个问题，我们使用一个`if`语句❼。如果这个村庄的邻居区域小于`min_size`，我们就将`min_size`更新为这个邻居区域的大小。如果这个村庄的邻居区域不小于`min_size`，那么我们什么都不做，因为这个村庄不会改变最小邻居区域的大小。\n\
    \n遍历完所有村庄后，`min_size`必定是最小邻居区域的大小。因此我们输出`min_size`的值。\n\n该问题描述的“输出”部分指定了“小数点后恰好包含一位数字。”如果最小大小是像6.25或8.33333这样的数怎么办？我们不应该对此做些什么吗？\n\
    \n不。我们目前的做法是安全的。我们唯一能得到的邻居区域大小是像3.0（小数点后为0）和3.5（小数点后为.5）这样的数字。原因如下。当我们计算邻居区域的左侧部分时，我们用两个整数相减，然后将得到的整数除以2。如果除以2之前是偶数整数，那么除法会给我们一个.0的数字（没有余数）。如果除以2之前是奇数整数，那么除法会给我们一个.5的数字。邻居区域的右侧部分也是如此：大小将是.0或.5的数字。因此，将左侧和右侧部分相加得到总大小，保证会给我们另一个.0或.5的数字。\n\
    \n## 避免代码重复：另外两种解决方案\n\n有点令人失望的是，我们在之前和第二个`range` for循环中都包含了“计算邻居区域大小”的代码。通常，重复的代码表明我们可能能够改进代码的设计。我们希望避免重复的代码，因为它增加了我们必须维护的代码量，并且如果重复的代码有缺陷，它会使修复代码中的问题变得更加困难。在这里，重复的代码对我来说似乎可以接受（它只有三行），但让我们讨论两种避免它的方法。这些是你能够应用于其他类似问题的通用方法。\n\
    \n## 使用一个巨大的值\n\n我们在循环之前计算村庄邻居区域大小的唯一原因是，以便循环有东西可以与其他邻居区域大小进行比较。如果我们进入循环时没有`min_size`的值，当代码尝试将其与当前村庄的大小进行比较时，我们会得到一个错误。\n\
    \n如果我们在循环之前将`min_size`设置为0.0，那么循环将永远不会找到更小的大小，并且无论测试用例如何，我们都会错误地输出0.0。使用0.0将是一个bug！\n\
    \n但是一个巨大的值，一个至少与每个可能的邻居区域大小一样大的值，*会*起作用。我们只需要让它足够大，以确保循环的第一次迭代保证找到一个不大于它的大小，从而确保我们伪造的巨大值永远不会被输出。"
