  - '[PAGE 243]


    Suppose that k is 3. Therefore, exactly two words must be more common than the
    words that we return. The words we need are not provided by the first dictionary
    key. That key gives us only one word (cut), so it can''t be the third most common
    word. Similarly, the words we need are not provided by the second dictionary key.
    That key gives us one more word (gully). We''ve processed a total of two words
    now but haven''t found the third most common words yet. The words we need, however,
    *are* provided by the third dictionary key. That key gives us two more words;
    each of these words (storm and brook) has exactly two words with more occurrences,
    so these are the words for when k is 3.


    What if k were 4? This time, exactly three words must be more common than the
    words that we return. The candidate words are still those from the third key (storm
    and brook), but there are only two words that occur more often than each of these
    words. There are therefore *no* words for when k = 4.


    In summary, we need to total up the words we see when going through the keys until
    we find the key that might contain the words we need. If exactly k - 1 words occur
    more often, then we have words for k; otherwise, we don''t, and there are no words
    to output.


    Now let''s walk through the code itself. We begin by obtaining a list of the dictionary''s
    keys and sorting them from biggest to smallest. We then loop through the keys
    in that reverse-sorted order ❻. The done variable tells us whether we''ve looked
    at k or more words yet. As soon as we have ❼, we exit the loop.


    When the loop is done, we check whether there are any words for k. If there are
    exactly k - 1 words that occur more often, and we haven''t gone past the end of
    our keys ❽, then we indeed have words to return. Otherwise, there are no words
    to return, so we return the empty list.


    # The Main Program


    Now we arrive at the main part of the program ❾. We build dictionary `word_to_num`,
    which maps each word to its number of occurrences. We then build the inverted
    dictionary `num_to_words` ❿, which maps each number of occurrences to the associated
    list of words. Notice how the names of these dictionaries convey the direction
    of mapping: `word_to_num` goes from words to numbers, and `num_to_words` goes
    from numbers to words.


    The rest of the code calls our other helper functions and outputs the appropriate
    words.


    With that, you''re ready to submit to the judge. Well done: that''s the first
    problem that you''ve solved with dictionaries. Whenever you need to map between
    two types of values, think about whether you can organize the information using
    a dictionary. If you can, it''s likely that you''ll be well on your way to an
    efficient solution!'
- md: "## Problem #20: Cities and States\n\nHere's another problem where we'll be\
    \ able to use a dictionary. As you read the problem description, think about what\
    \ we could use as the keys and what we could use as the values.\nThis is USACO\
    \ 2016 December Silver Contest problem Cities and States.\n\n## The Challenge\n\
    \nThe United States is divided into geographical regions called *states*, each\
    \ of which contains one or more cities. Each state has been given a two-character\
    \ abbreviation. For example, the abbreviation for Pennsylvania is PA, and the\
    \ abbreviation for South Carolina is SC. We'll write city names and state abbreviations\
    \ in all uppercase.\nConsider the pair of cities SCRANTON PA and PARKER SC. This\
    \ pair of cities is *special* because the first two characters of each city give\
    \ the abbreviation for the other city's state. That is, the first two characters\
    \ of SCRANTON give us SC (PARKER's state), and the first two characters of PARKER\
    \ give us PA (SCRANTON's state).\nA pair of cities is *special* if they meet this\
    \ property and are not in the same state.\nDetermine the number of special pairs\
    \ of cities in the provided input.\n\n## Input\n\nRead input from the file named\
    \ *citystate.in*.\nThe input consists of the following lines:\n\n- A line containing\
    \ *n*, the number of cities. *n* is between 1 and 200,000.\n- *n* lines, one per\
    \ city. Each line gives the name of a city in uppercase, a space, and its state's\
    \ abbreviation in uppercase. The name of each city is between 2 and 10 characters;\
    \ the abbreviation for each state is exactly two characters. The same city name\
    \ can exist in multiple states but will not appear more than once in the same\
    \ state. The name of a city or state in this problem is any string that meets\
    \ these requirements; it might not be the name of an actual US city or state.\n\
    \n## Output\n\nWrite output to the file named *citystate.out*.\nOutput the number\
    \ of special pairs of cities.\nThe time limit for solving each test case is four\
    \ seconds.\n\n## Exploring a Test Case\n\nPerhaps you’re thinking that you could\
    \ solve this problem with a list. That’s a good thought to have! If you’re interested,\
    \ I suggest giving that a try before continuing. The strategy would be to use\
    \ two nested loops to consider each pair of cities and check whether each pair\
    \ is special. It’s possible to come up with a correct solution using this approach.\n\
    \nA correct solution, yes, but also a slow one. The list of cities can be huge—up\
    \ to a maximum of 200,000—and any solution involving searching a list for matching\
    \ cities is doomed to be too slow. Let’s explore a test case and work out how\
    \ a dictionary can help.\n\nHere’s our test case:\n\n```\n13\nSCRANTON PA\nMANISTEE\
    \ MI\nNASHUA NH\nPARKER SC\nLAFAYETTE CO\nWASHOUGAL WA\nMIDDLEBOROUGH MA\nWALNUTGROVE\
    \ WA\nMADISON MI\nMILFORD MA\nMIDDLETON MA\nCOVINGTON LA\nLAKEWOOD CO\n```\n\n\
    The first city is SCRANTON PA. To find special pairs involving this city, we need\
    \ to find other cities whose name starts with PA and whose state is SC. The only\
    \ other city that meets this description is PARKER SC.\n\nNotice that all we care\
    \ about for SCRANTON PA is that its name starts with SC and that its state is\
    \ PA. It could have been called SCMERWIN PA or SCSHOCK PA or SCHRUTE PA; it would\
    \ still be a special pair with PARKER SC.\n\nLet’s refer to the first two characters\
    \ of a city name followed by the city’s state as a *combo*. For example, the combo\
    \ for SCRANTON PA is SCPA, and the combo for PARKER SC is PASC.\n\nRather than\
    \ searching for special pairs of cities, we can now look at special pairs of combos.\
    \ Let’s try this.\n\nThere are two cities with the combo MAMI. They happen to\
    \ be MANISTEE MI and MADISON MI, but all we care about is that there are two of\
    \ them. The MAMI cities start with MA and are in state MI. To count up the special\
    \ pairs involving MAMI cities, we need to know the cities that start with MI and\
    \ have state MA. That is, we need to know the number of MIMA cities. There are\
    \ three MIMA cities. They happen to be MIDDLEBOROUGH MA, MILFORD MA, and MIDDLETON\
    \ MA, but all we care about is that there are three of them. Okay—so we have two\
    \ MAMI cities and three MIMA cities. The total special pairs for these combos\
    \ is therefore 2 * 3 = 6, because for each of the two MAMI cities, we have a choice\
    \ of three MIMA cities.\n\nIf you're not convinced, here are the six special pairs\
    \ for these combos:\n\n- MANISTEE MI and MIDDLEBOROUGH MA\n- MANISTEE MI and MILFORD\
    \ MA\n- MANISTEE MI and MIDDLETON MA\n- MADISON MI and MIDDLEBOROUGH MA\n- MADISON\
    \ MI and MILFORD MA\n- MADISON MI and MIDDLETON MA\n\nIf we could map combos—SCPA,\
    \ PASC, MAMI, MIMA, and so on—to the number of occurrences, we could loop through\
    \ the combos to find the number of special pairs of cities. A dictionary is the\
    \ perfect tool for storing this mapping.\n\nHere's the dictionary that we'd like\
    \ to create for our test case:\n\n```\n{'SCPA': 1, 'MAMI': 2, 'NANH': 1, 'PASC':\
    \ 1, 'LACO': 2,\n 'MIMA': 3, 'COLA': 1}\n```\n\nWith this dictionary, we can figure\
    \ out the number of special pairs of cities. Let's work through the process.\n\
    \nThe first key is 'SCPA'; its value is 1. To find special pairs of cities involving\
    \ 'SCPA', we need to look up the value for 'PASC'. That value is also 1. We multiply\
    \ the two values together, yielding 1 * 1 = 1 special pair of cities involving\
    \ these combos. We need to carry out this same procedure for each other key in\
    \ the dictionary.\n\nThe next key is 'MAMI'; its value is 2. To find special pairs\
    \ of cities involving 'MAMI', we need to look up the value for 'MIMA'. That value\
    \ is 3. We multiply the two values together, yielding 2 * 3 = 6 special pairs\
    \ of cities involving these combos. With the 1 we found previously, we now have\
    \ a total of 7.\n\nThe next key is 'NANH'; its value is 1. To find special pairs\
    \ of cities involving 'NANH', we need to look up the value for 'NHNA'. But 'NHNA'\
    \ isn't a key in the dictionary! There are no special pairs of cities involving\
    \ these combos. We still have a total of 7.\n\nPay close attention to this next\
    \ one. The next key is 'PASC'; its value is 1. To find special pairs of cities\
    \ involving 'PASC', we need to look up the value for 'SCPA'. That value is also\
    \ 1. We multiply the two values together, yielding 1 * 1 = 1 special pair of cities\
    \ involving these combos. But wait: we already accounted for this pair when we\
    \ processed the key 'SCPA'. If we add 1 here, then we'll end up double-counting\
    \ this pair. In fact, by processing each key we will double-count *every* special\
    \ pair of cities. Not to worry, though: we'll make an adjustment later when we're\
    \ ready to print the final answer. Let's add this 1 in there. With the 7 we found\
    \ previously, we now have a total of 8.\n\nThe next key is 'LACO'; its value is\
    \ 2. The value for 'COLA' is 1, giving 2 * 1 = 2 special pairs of cities involving\
    \ these combos. With the 8 we found previously, we now have a total of 10.\n\n\
    There are two keys to go, 'MIMA' and 'COLA'. The first leads us to add 6 to our\
    \ total; the second leads us to add 2. With the 10 we found previously, we now\
    \ have a total of 18.\n\nRemember that we've double-counted every special pair\
    \ of cities. We don't have 18 unique special pairs of cities, then. We have only\
    \ 18 / 2 = 9 special pairs of cities. All we need to do is divide by 2 to undo\
    \ the double counting.\n\nIf you compare the dictionary we just went through to\
    \ the cities in the test case, you'll notice that something is missing from the\
    \ dictionary. It's that city WASHOUGAL WA! Its combo is WAWA, but there's no 'WAWA'\
    \ key in our dictionary. We're not accounting for this city, and we need to understand\
    \ why.\n\nThe first two characters of WASHOUGAL WA are WA. This means that the\
    \ only way for WASHOUGAL WA to be part of a special pair of cities is to find\
    \ another city whose state is WA. Notice that WASHOUGAL WA is in state WA, too.\
    \ However, the problem specifies that the two cities in a special pair of cities\
    \ must come from different states. There's therefore no way to find a special\
    \ pair of cities involving WASHOUGAL WA. To make sure we don't accidentally count\
    \ fake special pairs, we don't even include WASHOUGAL WA in the dictionary.\n\n\
    ## Solving the Problem\n\nWe're ready to go! We can use a dictionary for a concise,\
    \ rocket-fast solution to Cities and States. The code is in Listing 8-7.\n\n```python\n\
    input_file = open('citystate.in', 'r')\noutput_file = open('citystate.out', 'w')\n\
    \nn = int(input_file.readline())\n\n❶ combo_to_num = {}\n\nfor i in range(n):\n\
    \    lst = input_file.readline().split()\n    ❷ city = lst[0][:2]\n    state =\
    \ lst[1]\n    ❸ if city != state:\n        combo = city + state\n        if not\
    \ combo in combo_to_num:\n            combo_to_num[combo] = 1\n        else:\n\
    \            combo_to_num[combo] = combo_to_num[combo] + 1\n\ntotal = 0\n\n❹ for\
    \ combo in combo_to_num:\n    ❺ other_combo = combo[2:] + combo[:2]\n    if other_combo\
    \ in combo_to_num:\n        ❻ total = total + combo_to_num[combo] * combo_to_num[other_combo]\n\
    ```"
  mdcn: "## 问题 #20：城市与州\n\n这是另一个我们可以使用字典来解决的问题。在阅读问题描述时，请思考我们可以用什么作为键，用什么作为值。\n这是\
    \ USACO 2016 年十二月银组竞赛的问题“城市与州”。\n\n## 挑战\n\n美国被划分为称为*州*的地理区域，每个州包含一个或多个城市。每个州都有一个两个字符的缩写。例如，宾夕法尼亚州的缩写是\
    \ PA，南卡罗来纳州的缩写是 SC。我们将用全大写字母书写城市名称和州缩写。\n考虑城市对 SCRANTON PA 和 PARKER SC。这对城市是*特殊的*，因为每个城市名称的前两个字符恰好是另一个城市所在州的缩写。也就是说，SCRANTON\
    \ 的前两个字符是 SC（PARKER 所在州的缩写），而 PARKER 的前两个字符是 PA（SCRANTON 所在州的缩写）。\n如果一对城市满足此属性且不在同一个州，则称它们是*特殊的*。\n\
    确定给定输入中特殊城市对的数量。\n\n## 输入\n\n从名为 *citystate.in* 的文件读取输入。\n输入包含以下行：\n\n-   一行包含\
    \ *n*，即城市数量。*n* 在 1 到 200,000 之间。\n-   *n* 行，每行一个城市。每行给出一个全大写的城市名称、一个空格和其所在州的全大写缩写。每个城市名称在\
    \ 2 到 10 个字符之间；每个州的缩写恰好是两个字符。相同的城市名称可以存在于多个州，但在同一个州中不会出现超过一次。本问题中的城市或州名称是任何满足这些要求的字符串；它可能不是实际美国城市或州的名称。\n\
    \n## 输出\n\n将输出写入名为 *citystate.out* 的文件。\n输出特殊城市对的数量。\n解决每个测试用例的时间限制为四秒。\n\n##\
    \ 探索一个测试用例\n\n也许你在想可以用列表来解决这个问题。这是个好想法！如果你感兴趣，我建议在继续之前先尝试一下。策略是使用两个嵌套循环来考虑每一对城市，并检查每一对是否特殊。使用这种方法可以得出一个正确的解决方案。\n\
    \n是的，一个正确的解决方案，但也是一个缓慢的解决方案。城市列表可能非常庞大——最多可达 200,000 个——任何涉及在列表中搜索匹配城市的解决方案都注定会太慢。让我们探索一个测试用例，并研究字典如何提供帮助。\n\
    \n这是我们的测试用例：\n\n```\n13\nSCRANTON PA\nMANISTEE MI\nNASHUA NH\nPARKER SC\nLAFAYETTE\
    \ CO\nWASHOUGAL WA\nMIDDLEBOROUGH MA\nWALNUTGROVE WA\nMADISON MI\nMILFORD MA\n\
    MIDDLETON MA\nCOVINGTON LA\nLAKEWOOD CO\n```\n\n第一个城市是 SCRANTON PA。要找到涉及此城市的特殊城市对，我们需要找到其他名称以\
    \ PA 开头且所在州为 SC 的城市。唯一满足此描述的另一个城市是 PARKER SC。\n\n请注意，对于 SCRANTON PA，我们只关心它的名称以\
    \ SC 开头且所在州是 PA。它可能叫 SCMERWIN PA 或 SCSHOCK PA 或 SCHRUTE PA；它仍然会与 PARKER SC 构成特殊城市对。\n\
    \n让我们将城市名称的前两个字符后跟城市所在州称为一个*组合*。例如，SCRANTON PA 的组合是 SCPA，PARKER SC 的组合是 PASC。\n\
    \n我们现在可以寻找特殊组合对，而不是寻找特殊城市对。让我们试试看。\n\n有两个城市的组合是 MAMI。它们恰好是 MANISTEE MI 和 MADISON\
    \ MI，但我们只关心有两个这样的城市。MAMI 城市以 MA 开头且所在州是 MI。要计算涉及 MAMI 城市的特殊城市对，我们需要知道以 MI 开头且所在州为\
    \ MA 的城市。也就是说，我们需要知道 MIMA 城市的数量。有三个 MIMA 城市。它们恰好是 MIDDLEBOROUGH MA、MILFORD MA\
    \ 和 MIDDLETON MA，但我们只关心有三个这样的城市。好的——我们有两个 MAMI 城市和三个 MIMA 城市。因此，这些组合的特殊城市对总数为\
    \ 2 * 3 = 6，因为对于两个 MAMI 城市中的每一个，我们都有三个 MIMA 城市可以选择。\n\n如果你还不信服，这里是这些组合的六个特殊城市对：\n\
    \n-   MANISTEE MI 和 MIDDLEBOROUGH MA\n-   MANISTEE MI 和 MILFORD MA\n-   MANISTEE\
    \ MI 和 MIDDLETON MA\n-   MADISON MI 和 MIDDLEBOROUGH MA\n-   MADISON MI 和 MILFORD\
    \ MA\n-   MADISON MI 和 MIDDLETON MA\n\n如果我们能够将组合——SCPA、PASC、MAMI、MIMA 等——映射到出现次数，我们就可以遍历这些组合来找出特殊城市对的数量。字典是存储这种映射的完美工具。\n\
    \n这是我们为测试用例希望创建的字典：\n\n```\n{'SCPA': 1, 'MAMI': 2, 'NANH': 1, 'PASC': 1, 'LACO':\
    \ 2,\n 'MIMA': 3, 'COLA': 1}\n```\n\n有了这个字典，我们就可以计算出特殊城市对的数量。让我们逐步进行。\n\n第一个键是\
    \ 'SCPA'；其值是 1。要找到涉及 'SCPA' 的特殊城市对，我们需要查找 'PASC' 的值。该值也是 1。我们将两个值相乘，得出 1 * 1 =\
    \ 1 个涉及这些组合的特殊城市对。我们需要对字典中的每个其他键执行相同的过程。\n\n下一个键是 'MAMI'；其值是 2。要找到涉及 'MAMI' 的特殊城市对，我们需要查找\
    \ 'MIMA' 的值。该值是 3。我们将两个值相乘，得出 2 * 3 = 6 个涉及这些组合的特殊城市对。加上我们之前找到的 1，我们现在总共有 7 个。\n\
    \n下一个键是 'NANH'；其值是 1。要找到涉及 'NANH' 的特殊城市对，我们需要查找 'NHNA' 的值。但 'NHNA' 不是字典中的键！没有涉及这些组合的特殊城市对。我们仍然总共有\
    \ 7 个。\n\n请密切关注下一个。下一个键是 'PASC'；其值是 1。要找到涉及 'PASC' 的特殊城市对，我们需要查找 'SCPA' 的值。该值也是\
    \ 1。我们将两个值相乘，得出 1 * 1 = 1 个涉及这些组合的特殊城市对。但是等等：我们在处理键 'SCPA' 时已经计算过这一对了。如果我们在这里加上\
    \ 1，那么最终会重复计算这一对。事实上，通过处理每个键，我们将重复计算*每一个*特殊城市对。不过别担心：我们将在准备打印最终答案时进行调整。让我们把这个\
    \ 1 加进去。加上我们之前找到的 7，我们现在总共有 8 个。\n\n下一个键是 'LACO'；其值是 2。'COLA' 的值是 1，得出 2 * 1 =\
    \ 2 个涉及这些组合的特殊城市对。加上我们之前找到的 8，我们现在总共有 10 个。\n\n还有两个键，'MIMA' 和 'COLA'。第一个使我们的总数增加\
    \ 6；第二个使我们的总数增加 2。加上我们之前找到的 10，我们现在总共有 18 个。\n\n记住，我们重复计算了每一个特殊城市对。因此，我们并没有 18\
    \ 个独特的特殊城市对。我们只有 18 / 2 = 9 个特殊城市对。我们只需要除以 2 来消除重复计算。\n\n如果你将我们刚刚处理的字典与测试用例中的城市进行比较，你会注意到字典中缺少一些东西。那就是城市\
    \ WASHOUGAL WA！它的组合是 WAWA，但我们的字典中没有 'WAWA' 这个键。我们没有考虑这个城市，我们需要理解为什么。\n\nWASHOUGAL\
    \ WA 的前两个字符是 WA。这意味着 WASHOUGAL WA 成为特殊城市对一部分的唯一方法是找到另一个所在州为 WA 的城市。请注意，WASHOUGAL\
    \ WA 本身也在 WA 州。然而，问题规定特殊城市对中的两个城市必须来自不同的州。因此，不可能找到涉及 WASHOUGAL WA 的特殊城市对。为了确保我们不会意外地计算虚假的特殊城市对，我们甚至不将\
    \ WASHOUGAL WA 包含在字典中。\n\n## 解决问题\n\n我们准备好了！我们可以使用字典来获得一个简洁、极速的“城市与州”解决方案。代码在清单\
