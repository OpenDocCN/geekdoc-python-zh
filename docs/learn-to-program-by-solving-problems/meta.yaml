    The left variable stores the size of the left part of the neighborhood, and right
    stores the size of the right part. We then add them up to obtain the total size
    of the neighborhood. We get a value of 7.0.

    That''s the value to beat. How do we know whether any other village has a smaller
    neighborhood? We can use a loop to process those other villages. If we find a
    neighborhood that''s smaller than our current smallest, we update our current
    smallest to that smaller size.

