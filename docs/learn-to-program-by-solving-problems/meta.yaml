    Listing 9-2: Main program


    We''re working with files here, not standard input and standard output.

    The program begins by reading the number of lifeguards and then uses a range for
    loop to read each lifeguard''s time interval. We read each time interval from
    the input ❶, convert each of its components to an integer, and append it as a
    two-value list to our list of intervals.

    We use the `max_covered` variable to track the maximum number of time units that
    can be covered.

    Now we separately fire each lifeguard using a range for loop ❷. We call `num_covered`
    ❸ to determine the number of time units that are covered given the firing of one
    lifeguard. We update `max_covered` whenever we''re able to cover a greater number
    of time units.

    When that loop completes, we''ll have checked the number of units of time that
    can be covered by firing each lifeguard, and we''ll have remembered the maximum.
    We output this maximum to solve the problem.

    Feel free to submit our code to the USACO judge. For Python code, this judge uses
    a time limit per test case of four seconds, but our solution shouldn''t come close
    to that limit. For example, I just ran the code here, and each test case finished
    in no more than 130 milliseconds.


    # Efficiency of Our Program


    The reason our code is so fast is because there are so few lifeguards—only at
    most 100 of them. If there were a large number of lifeguards, then our code would
    no longer solve the problem within the time limit. We''d be fine if there were
    a few hundred lifeguards. We might squeak through if we had as many as 3,000 or
    4,000 lifeguards. Any more than that, though, and our code would be too slow.
    We probably couldn''t make it in time with 5,000 lifeguards, for example. We''d
    need to design a new algorithm, likely one that uses something faster than complete
    search.

    You might think that 5,000 is a huge number of lifeguards and that it''s okay
    that our algorithm can''t go that high. But it''s not! Think back to the Email
    Addresses problem in Chapter 8. There, we had to contend with up to 100,000 email
    addresses. And think back to the Cities and States problem in the same chapter.
    There, we had to contend with up to 200,000 cities. By comparison, 5,000 is not
    a lot of lifeguards.

    A complete-search solution often works fine for a small amount of input. Large
    test cases are often where complete-search solutions break down.

    The reason that our complete-search solution for Lifeguards doesn''t work well
    with large test cases is because it does a lot of repeated work. Imagine that
    we''re solving a test case with 5,000 lifeguards. We''ll fire lifeguard 0 and
    call `num_covered` to determine the number of units of time covered by the remaining
    lifeguards. Then, we''ll fire lifeguard 1 and call `num_covered` again. Now, what
    `num_covered` does this time is similar to what it'
  merge: -1
  pgno: 255
- img_proc: true
  md: "did on the previous call. After all, things haven't changed much. The only\
    \ change is that lifeguard 0 is back and lifeguard 1 is fired. The other 4,998\
    \ lifeguards are the same as they were! But num_covered doesn't know that. It\
    \ grinds through all of the lifeguards again. That same thing happens when we\
    \ fire lifeguard 2, then lifeguard 3, and so on. Each time, num_covered does all\
    \ of its work from scratch, without learning anything about what it did previously.\n\
    \nRemember that, while useful, complete-search algorithms do have limitations.\
    \ Given a new problem that we want to solve, a complete-search algorithm is a\
    \ useful starting point, even if it ultimately turns out to be too inefficient.\
    \ That's because the act of designing that algorithm may deepen our appreciation\
    \ of the problem and lead to new ideas for solving it.\n\nIn the next section,\
