    \n这可能是你第一次遇到时间限制超时错误，尽管在完成前面章节的练习时你可能已经遇到过。\n\n当你收到这个错误时，首先要检查的是你的程序是否陷入了无限循环。如果是，那么无论时间限制如何，它永远不会完成。评测系统会在分配的时间到期时终止程序。\n\
    \n如果没有无限循环，那么可能的罪魁祸首就是我们程序本身的*效率*。当程序员谈论效率时，他们指的是程序运行所需的时间。运行更快（花费更少时间）的程序比运行更慢（花费更多时间）的程序更高效。为了在时间限制内解决测试用例，我们将使我们的程序更高效。\n\
    \n## 搜索列表的效率\n\n向Python列表追加元素是极其快速的。无论列表只有几个值还是成千上万个值；追加操作花费的时间都一样少。\n\n然而，使用`in`运算符则是另一回事。我们的程序使用`in`运算符来确定一个清理后的电子邮件地址是否已经在我们的清理后电子邮件地址列表中。一个测试用例可能有多达100,000个电子邮件地址。那么，在最坏的情况下，我们的程序可能使用`in`多达100,000次。事实证明，当在包含许多值的列表上使用`in`时，它非常慢，这最终损害了我们程序的效率。为了确定一个值是否在列表中，`in`会从头到尾搜索列表，逐个列表值地进行。它会一直这样做，直到找到它要找的值，或者用完了要检查的列表值。`in`需要查找的值越多，它就越慢。"
