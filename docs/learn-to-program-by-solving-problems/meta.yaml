    每个动作人偶由其高度指定。例如，其中一个盒子可能有三个动作人偶，从左到右的高度分别为4、5和7。当我谈论一个动作人偶盒子时，我总是从左到右列出高度。\n莉娜想要*整理盒子*，这意味着排列盒子，使得动作人偶的高度从左到右递增或保持不变。\n\
    她能否整理盒子取决于盒子内动作人偶的高度。例如，如果第一个盒子有高度为4、5和7的动作人偶，第二个盒子有高度为1和2的动作人偶，那么她可以通过将第二个盒子放在前面来整理这些盒子。但如果我们保持第一个盒子不变，将第二个盒子改为有高度为6和8的动作人偶，那么就无法整理这些盒子了。\n\
    判断莉娜是否可能整理这些盒子。\n\n## 输入\n\n输入包含以下几行：\n\n- 一行包含整数$n$，表示盒子的数量。$n$在1到100之间。\n- $n$行，每行对应一个盒子。每行以整数$k$开头，表示该盒子中动作人偶的数量。$k$在1到100之间。（由于$k$至少为1，我们不必担心空盒子。）在$k$之后，有$k$个整数，给出该盒子中动作人偶从左到右的高度。每个高度是1到10,000之间的整数。每对整数之间有一个空格。\n\
    \n## 输出\n\n如果莉娜可以整理盒子，输出YES；否则，输出NO。\n\n## 表示盒子\n\n这个问题由几个较小的问题组成，每个问题我们都可以通过编写一个函数来解决。让我们首先看看如何在Python中表示盒子，然后我们将设计所需的函数。\n\
    在第5章中，当我们解决Baker Bonus问题时，我们了解到列表可以将其他列表作为其值。这允许我们将列表嵌套在列表中。我们可以使用这种安排来表示动作人偶盒子。例如，这是一个表示两个盒子的列表：\n\
    \n```\n>>> boxes = [[4, 5, 7], [1, 2]]\n```\n\n第一个盒子有三个动作人偶，第二个有两个。我们可以单独访问每个盒子：\n\
    \n```\n>>> boxes[0]\n[4, 5, 7]\n>>> boxes[1]\n[1, 2]\n```\n\n我们将从输入中读取盒子的内容，并将该信息放入一个嵌套列表中，就像我展示的那样。然后我们将使用该嵌套列表来确定盒子是否可以被整理。\n\
    \n## 自顶向下设计\n\n我们将使用一种称为*自顶向下设计*的程序设计方法来解决这个问题。自顶向下设计将一个大问题分解为几个较小的问题。这很有用，因为每个较小的问题将更容易解决。然后我们可以将这些子问题的解决方案组装起来，以解决原始问题。\n\
    \n## 进行自顶向下设计\n\n以下是自顶向下设计的工作原理。我们首先编写一个不完整的Python程序，以捕捉解决方案中的主要步骤。其中一些步骤不需要太多代码，因此我们可以直接解决它们。其他步骤需要我们做更多工作，我们将把每个这样的步骤转换为一个我们将调用的函数。我们可能也会通过编写一点代码*并*调用一个函数来解决一个步骤。然而，这些函数还不存在。我们必须编写它们！\n\
    \n要编写一个所需的函数，我们对该函数的任务重复相同的过程。也就是说，我们首先写下该函数的步骤。如果我们能直接为某个步骤编写代码，那么我们就做；否则，我们调用另一个函数（我们稍后会编写）来处理该步骤。\n\
    \n我们不断这样做，直到没有更多的函数需要编写。那时，我们将得到问题的解决方案。\n\n它被称为自顶向下设计，因为我们从问题的顶部或最高层开始，一路向下，深入问题的内部，直到每个步骤都完全用代码编写出来。我们现在将使用这种方法来解决动作人偶问题。\n\
    \n## 顶层\n\n开始我们的设计时，我们专注于需要解决的主要任务。\n\n我们当然必须读取输入，所以这是我们的第一个任务。\n\n现在，假设我们已经读取了输入。为了确定盒子是否可以整理，我们应该做什么？一件重要的事情是单独检查每个盒子，确保其动作人偶的高度是有序的。例如，假设我们有一个盒子[18,\
    \ 20, 4]。这个盒子高度无序，意味着我们没有机会整理所有的盒子。我们甚至无法整理这一个！\n\n所以，这是我们的第二个任务：确定每个盒子本身是否按顺序排列其动作人偶。如果其中任何一个盒子的动作人偶顺序混乱，那么我们就知道盒子无法整理。如果所有盒子都正常，那么我们还有更多需要检查的。\n\
    \n如果每个盒子本身都正常，下一个问题是我们是否可以整理所有的盒子。这里我们可以做出的一个重要观察是，从现在开始我们唯一关心的动作人偶是每个盒子左右两侧的那些。这些之间的动作人偶不再重要。\n\
    \n考虑这个例子，我们有三个盒子：\n\n```\n[[9, 13, 14, 17, 25],\n [32, 33, 34, 36],\n [1, 6]]\n\
    ```\n\n第一个盒子以高度9的动作人偶开始，以高度25的动作人偶结束。放置在这个盒子左边的动作人偶必须全部高度为9或更低；例如，我们可以将第三个盒子放在这个盒子的左边。放置在这个盒子右边的动作人偶必须全部高度为25或更高；例如，我们可以将第二个盒子放在这个盒子的右边。高度为13、14和17的动作人偶改变不了任何事情；它们相当于不存在。\n\
    \n这就是我们的第三个任务：忽略盒子两端以外的所有动作人偶。\n\n完成第三个任务后，我们将得到一个如下所示的列表：\n\n```\n[[9, 25],\n\
    \ [32, 36],\n [1, 6]]\n```\n\n如果我们先对它们进行排序，就像这样：\n\n```\n[[1, 6],\n [9, 25],\n\
    \ [32, 36]]\n```\n\n那么判断我们是否可以整理这些盒子就容易多了。现在很容易看出一个盒子的相邻盒子必须是什么。（我们在第5章解决Village\
    \ Neighborhood问题时使用了类似的方法。）所以，我们的第四个任务是排序盒子。\n\n我们的第五个也是最后一个任务是确定这些排序后的盒子是否已整理好。如果动作人偶的高度从左到右排序，那么它们就是整理好的。高度为1、6、9、25、32和36的动作人偶是适当排序的，所以前面的盒子可以整理。但考虑这个例子：\n\
    \n```\n[[1, 6],\n [9, 50],\n [32, 36]]\n```\n\n这些盒子无法整理，因为第二个盒子中那个巨大的动作人偶。第二个盒子占据了高度9到50；第三个盒子不能放在第二个盒子的右边，因为它的高度太小了。\n\
    \n我们现在完成了对问题的分析，并确定了五个主要任务：\n\n1. 读取输入。\n2. 检查所有盒子是否正常。\n3. 获取一个新的盒子列表，其中仅包含每个盒子左右两侧的动作人偶高度。\n\
    4. 对这些新盒子进行排序。\n5. 确定这些排序后的盒子是否已整理好。\n\n你可能想知道为什么我们有“读取输入”任务却没有“写入输出”任务。对于这个问题，写入输出只是根据需要输出YES或NO；没什么复杂的。此外，一旦我们知道答案，我们就会输出YES或NO，因此输出将与其他任务交错进行。基于这些原因，我决定不将其作为主要任务。"
