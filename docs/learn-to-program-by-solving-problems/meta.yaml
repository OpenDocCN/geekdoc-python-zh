  md: '# Output


    Write output to the file named *baseball.out*.

    Output the number of triples of cows that satisfy Farmer John''s observations.

    The time limit for solving each test case is four seconds.


    # Using Three Nested Loops


    We can use three nested loops to consider all possible triples. We''ll start by
    looking at the code and then discuss its efficiency.


    # The Code


    In "Nesting" in Chapter 3, we learned that we can loop through all pairs of values
    using two nested loops. Doing so looks like this:


    ```

    >>> lst = [1, 9]

    >>> for num1 in lst:

    ...     for num2 in lst:

    ...         print(num1, num2)

    ...

    1 1

    1 9

    9 1

    9 9

    ```


    We can similarly loop through all triples of values using three nested loops,
    like this:


    ```

    >>> for num1 in lst:

    ...     for num2 in lst:

    ...         for num3 in lst:

    ...             print(num1, num2, num3)

    ...

    1 1 1

    1 1 9

    1 9 1

    1 9 9

    9 1 1

    9 1 9

    9 9 1

    9 9 9

    ```


    Using three nested loops like this gives us a starting point for solving the Cow
    Baseball problem. For each triple, we can check whether it matches Farmer John''s
    observations. See Listing 9-5 for the code.'
