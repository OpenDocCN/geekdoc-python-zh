  md: 'We have to remember to end the first string so that we can output the number
    of plays and then start a new string for the second half of the sentence. In addition,
    we''re using multiple arguments to print to avoid having to convert plays to a
    string. If we were storing the resulting string rather than printing it, we''d
    need the str conversion:


    ```

    >>> plays = 6

    >>> result = ''Martha plays '' + str(plays) + '' times before going broke.''

    >>> result

    ''Martha plays 6 times before going broke.''

    ```


    Gluing strings and integers together is fine for a simple sentence like this,
    but it doesn''t scale. Here''s how it looks when we try to embed three integers
    instead of one:


    ```

    >>> num1 = 7

    >>> num2 = 82

    >>> num3 = 11

    >>> ''We have '' + str(num1) + '', '' + str(num2) + '', and '' + str(num3) + ''.''

    ''We have 7, 82, and 11.''

    ```


    We don''t want to have to keep track of all of those quotes, pluses, and spaces.

    The most flexible way to build a string consisting of strings and numbers is to
    use an f-string. Here''s how the previous example looks with an f-string:


    ```

    >>> num1 = 7

    >>> num2 = 82

    >>> num3 = 11

    >>> f''We have {num1}, {num2}, and {num3}.''

    ''We have 7, 82, and 11.''

    ```


    Notice the f before the opening quote of the string. The f stands for format,
    because f-strings allow you to format the contents of a string. Inside of an f-string,
    we can place expressions inside curly braces. As the string is being built, each
    expression is replaced by its value and inserted into the string. The result is
    just a regular old string–there''s no new type here:


    ```

    >>> type(f''hello'')

    <class ''str''>

    >>> type(f''{num1} days'')

    <class ''str''>

    ```


    The expressions in the braces can be more complex than bare variable names:


    ```

    >>> f''The sum is {num1 + num2 + num3}''

    ''The sum is 100''

    ```'
