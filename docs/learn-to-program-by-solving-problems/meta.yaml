    \ wanted our four village positions!—but we’ve lost the list through an errant\
    \ assignment statement.\n\nIf your list is disappearing or you’re getting error\
    \ messages related to the None value, make sure you’re not using an assignment\
    \ statement with a method that simply modifies a list.\n\nThe extend method is\
    \ related to append. You use extend whenever you'd like to concatenate a list\
    \ (not a single value) to the end of an existing list. Here's an example:\n\n\
    ```\n>>> lst1 = [1, 2, 3]\n>>> lst2 = [4, 5, 6]\n>>> lst1.extend(lst2)\n>>> lst1\n\
    [1, 2, 3, 4, 5, 6]\n>>> lst2\n[4, 5, 6]\n```\n\nIf you want to insert into a list\
