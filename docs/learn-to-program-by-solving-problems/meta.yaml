    \ you’ll be frequently performing and which Python type is ideally suited to those\
    \ operations.\n\nBefore continuing, you might like to try solving exercises 1\
    \ and 2 from “Chapter Exercises” on page 236.\n\n## Problem #19: Common Words\n\
    \nIn this problem, we’ll need to associate words with their number of occurrences.\
    \ This is beyond what we can do with sets, so we won’t use sets here. Instead,\
    \ we’ll learn about and use Python dictionaries.\n\nThis is DMOJ problem cco99p2.\n\
    \n### The Challenge\n\nWe are given *m* words. The words are not necessarily distinct;\
    \ for example, the word *brook* could appear multiple times. We are also given\
    \ an integer *k*.\n\nOur task is to find the *k*th most common words. A word *w*\
    \ is a *k*th most common word if exactly *k* – 1 distinct words occur more often\
    \ than does *w*. Depending on the dataset, the *k*th most common words could be\
    \ no words, one word, or more than one word.\n\nLet’s make sure we’re clear on\
    \ this definition of the *k*th most common words. If *k* = 1, then we’re being\
    \ asked for the words for which exactly 0 words occur more often; that is, we’re\
    \ being asked for the words that occur most often. If *k* = 2, then we’re being\
    \ asked for the words for which exactly 1 word occurs more often. If *k* = 3,\
    \ then we’re being asked for the words for which exactly two distinct words occur\
    \ more often, and so on.\n\n### Input\n\nThe input contains a line giving the\
    \ number of test cases, followed by the lines of the test cases themselves. Each\
    \ test case contains the following lines:\n\n- A line containing the integers\
    \ $m$ (the number of words in the test case) and $k$ separated by a space. $m$\
    \ is between 0 and 1,000; $k$ is at least 1.\n- $m$ lines, each of which gives\
    \ a word. Each word consists of at most 20 characters, and all characters are\
    \ lowercase.\n\n### Output\n\nFor each test case, output the following lines:\n\
    \n- A line containing the following:\n  \n  p most common word(s):\n  \n  where\
    \ $p$ is 1st if $k$ is 1, 2nd if $k$ is 2, 3rd if $k$ is 3, 4th if $k$ is 4, and\
    \ so on.\n- One line for each of the $k$th most common words. If there are no\
    \ such words, there are no lines of output here.\n- A blank line.\n\nThe time\
    \ limit for solving the test cases is one second.\n\n### Exploring a Test Case\n\
    \nLet's start by exploring a test case. It'll boost our understanding of the problem\
    \ and motivate the use of a new Python type.\nSuppose that we're interested in\
    \ the most common words of all. This means that $k$ is 1. Here's the test case:\n\
    \n```\n1\n14 1\nstorm\ncut\nmagma\ncut\nbrook\ngully\ngully\nstorm\ncliff\ncut\n\
    blast\nbrook\ncut\ngully\n```\n\nThe word that shows up most often is cut. There\
    \ are four occurrences of cut, and no other word has that many occurrences. The\
    \ correct output is therefore:\n\n```\n1st most common word(s):\ncut\n```\n\n\
    Notice the required blank line at the end ❶.\nNow, what do we do if *k* were 2?\
    \ We could answer this by scanning through the words again and counting occurrences,\
    \ but there’s a different way to organize the words that would make our task considerably\
    \ easier. Rather than a list of words, let’s look at each word associated with\
    \ its number of occurrences. See Table 8-1.\n\n**Table 8-1:** Words and Number\
    \ of Occurrences\n\n| Word | Number of occurrences |\n| :--- | :--- |\n| cut |\
    \ 4 |\n| gully | 3 |\n| storm | 2 |\n| brook | 2 |\n| magma | 1 |\n| cliff | 1\
    \ |\n| blast | 1 |\n\nI’ve sorted the words based on their number of occurrences.\
    \ Looking at the top row, we can reaffirm that cut is the word to output for *k*\
    \ = 1. Looking at the second row, we see that gully is the word to output for\
    \ *k* = 2. The word gully is the only word that has exactly one word with more\
    \ occurrences.\nNow for *k* = 3. This time, there are *two* words to output, storm\
    \ and brook, because they both have the same number of occurrences. Each of these\
    \ words has exactly two words with more occurrences. This shows that we sometimes\
    \ need to output more than one word.\nIt’s also possible that we need to output\
    \ zero words! For example, consider *k* = 4. There are *no* words that have exactly\
    \ three words with more occurrences. Looking down the table, you might wonder\
    \ why we don’t output magma for *k* = 4. We don’t output magma, because magma\
    \ has exactly four words (not exactly three words) with more occurrences.\nWhen\
    \ *k* = 5, we have three words to output: magma, cliff, and blast. Before continuing,\
    \ verify for yourself that there are no words to output for any other value of\
    \ *k*—no words for *k* = 6, *k* = 7, *k* = 8, *k* = 9, *k* = 100, and so on.\n\
    Table 8-1 simplifies the problem quite a bit for us. We’re now going to learn\
    \ how to organize information like this in Python.\n\n## Dictionaries\n\nA *dictionary*\
    \ is a Python type that stores a mapping from one group of elements, called *keys*,\
    \ to another group of elements, called *values*.\nWe use opening and closing braces\
    \ to delimit the dictionary. Those are the same symbols that we use for a set,\
    \ but Python can tell the difference between a set and a dictionary because of\
    \ what we put inside the braces. For a set, we list values; for a dictionary,\
    \ we list key:value pairs.\nHere's a dictionary mapping some strings to numbers:\n\
    \n```\n>>> {'cut':4, 'gully':3}\n{'cut': 4, 'gully': 3}\n```\n\nIn this dictionary,\
    \ the keys are 'cut' and 'gully', and the values are 4 and 3. The key 'cut' is\
    \ mapped to the value 4, and the key 'gully' is mapped to the value 3.\nBased\
    \ on our encounters with sets, you might wonder whether dictionaries maintain\
    \ the pairs in the order we enter them. For example, you might wonder whether\
    \ this could happen:\n\n```\n>>> {'cut':4, 'gully':3}\n{'gully': 3, 'cut': 4}\n\
    ```\n\nAs of Python 3.7, the answer is no: dictionaries retain the order in which\
    \ you added pairs. In earlier versions of Python, dictionaries did not maintain\
    \ this order, so you could add pairs in one order but get them back in another.\
    \ It's still a good idea to write code that doesn't rely on the Python 3.7 behavior,\
    \ though, because older versions of Python are likely to be in use for the foreseeable\
    \ future.\nDictionaries are equal if they contain the same key:value pairs, even\
    \ if we write them in different orders:\n\n```\n>>> {'cut':4, 'gully':3} == {'cut':4,\
    \ 'gully':3}\nTrue\n>>> {'cut':4, 'gully':3} == {'gully': 3, 'cut': 4}\nTrue\n\
    >>> {'cut':4, 'gully':3} == {'gully': 3, 'cut': 10}\nFalse\n>>> {'cut':4, 'gully':3}\
    \ == {'cut': 4}\nFalse\n```\n\nDictionary keys must be unique. If you try to include\
    \ the same key multiple times, only one pair involving that key is retained:\n\
    \n```\n>>> {'storm': 1, 'storm': 2}\n{'storm': 2}\n```"
