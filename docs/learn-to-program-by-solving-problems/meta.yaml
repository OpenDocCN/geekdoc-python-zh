- md: "## Typical Form\n\nA typical linear-time algorithm looks like this:\n\n```\n\
    for i in range(n):\n    <process input i in a constant number of steps>\n```\n\
    \nIn contrast, a typical quadratic-time algorithm looks like this:\n\n```\nfor\
    \ i in range(n):\n    for j in range(n):\n        <process inputs i and j in a\
    \ constant number of steps>\n```\n\nFor an input of $n$ values, how many values\
    \ does each algorithm process? The linear-time algorithm processes $n$ values,\
    \ one on each iteration of the for loop. The quadratic-time algorithm, in contrast,\
    \ processes $n$ values *on each iteration* of the outer for loop.\n\nOn the first\
    \ iteration of the outer for loop, $n$ values are processed (one on each iteration\
    \ of the inner for loop); on the second iteration of the outer for loop, $n$ more\
    \ values are processed (one on each iteration of the inner for loop); and so on.\
    \ As the outer for loop iterates $n$ times, the total number of values that are\
    \ processed is $n * n$, or $n^2$. Two nested loops, each of which depends on $n$,\
    \ gives rise to a quadratic-time algorithm. In big O notation, we say that a quadratic-time\
    \ algorithm is $O(n^2)$.\n\nLet's compare the amount of work done by linear-time\
    \ and quadratic-time algorithms. Suppose that we're processing an input of 1,000\
    \ values, meaning that $n$ is 1,000. A linear-time algorithm that takes $n$ steps\
    \ would take 1,000 steps. A quadratic-time algorithm that takes $n^2$ steps would\
    \ take $1,000^2 = 1,000,000$ steps. A million is way more than a thousand. But\
    \ who cares: computers are really, really fast, right? Well, yes, and for an input\
    \ of 1,000 values, we're probably okay if we use a quadratic-time algorithm. On\
    \ page 253, I gave a conservative rule claiming that we can perform about five\
    \ million steps per second. A million steps, then, should be doable in all but\
    \ the strictest time limits.\n\nBut any optimism for a quadratic-time algorithm\
    \ is short-lived. Watch what happens if we crank the number of input values up\
    \ from 1,000 to 10,000. The linear-time algorithm takes only 10,000 steps. The\
    \ quadratic-algorithm takes $10,000^2 = 100,000,000$ steps. Hmmm . . . if we're\
    \ using a quadratic-time algorithm, now our computer isn't looking so fast. While\
    \ the linear-time algorithm still runs in milliseconds, the quadratic-time algorithm\
    \ will take at least a few seconds. Time limit exceeded there, no question.\n\n\
    ### CONCEPT CHECK\n\nWhat is the big O efficiency of the following algorithm?\n\
    \n```\nfor i in range(10):\n    for j in range(n):\n        <process inputs i\
    \ and j in a constant number of steps>\n```\n\n- A. O(1)\n- B. O(n)\n- C. O(n²)\n\
    \nAnswer: B. There are two nested loops here, so your first instinct might be\
    \ to claim that this is a quadratic-time algorithm. Be careful, though, because\
    \ the outer for loop iterates only 10 times, independent of the value of n. The\
    \ total number of steps in this algorithm, therefore, is 10n. There’s no n² here;\
    \ 10n is linear, just like n. So, this is a linear-time algorithm, not a quadratic-time\
    \ algorithm. We’d write its efficiency as O(n).\n\n### CONCEPT CHECK\n\nWhat is\
    \ the big O efficiency of the following algorithm?\n\n```\nfor i in range(n):\n\
    \    <process input i in a constant number of steps>\nfor j in range(n):\n   \
    \ <process input j in a constant number of steps>\n```\n\n- A. O(1)\n- B. O(n)\n\
    - C. O(n²)\n\nAnswer: B. We have two loops here, and they both depend on n. Isn’t\
    \ this quadratic time, then?\nNo! These two loops are sequential, not nested.\
    \ The first loop takes n steps, and the second also takes n steps, for a total\
    \ of 2n steps. This is therefore a linear-time algorithm.\n\n## Alternate Form\n\
    \nWhen you see two nested loops where each depends on n, it’s a good bet that\
    \ you’re looking at a quadratic-time algorithm. But it’s possible for a quadratic-time\
    \ algorithm to arise even in the absence of such nested loops.\n\nWe can find\
    \ such an example in our first solution to the Email Addresses problem, Listing\
    \ 8-2. I've reproduced that solution here:\n\n```\n# clean function not shown\n\
    \nfor dataset in range(10):\n    n = int(input())\n    addresses = []\n    for\
    \ i in range(n):\n        address = input()\n        ❶ address = clean(address)\n\
    \        ❷ if not address in addresses:\n            addresses.append(address)\n\
    \n    print(len(addresses))\n```\n\nWe'll let *n* be the maximum number of email\
    \ addresses that we see in our 10 test cases. The outer for loop iterates 10 times;\
    \ the inner for loop iterates at most *n* times. We're therefore processing at\
    \ most 10*n* email addresses, which is linear in *n*.\n\nCleaning an email address\
    \ ❶ takes a constant number of steps, so we don't need to worry about that. But\
    \ this is still *not* a linear-time algorithm, because each iteration of the inner\
    \ for loop takes more than a constant number of steps. Specifically, checking\
    \ whether an email address is already in our list ❷ takes work proportional to\
    \ the number of email addresses already in the list, because Python has to search\
    \ through the list. That's a linear operation on its own! So we're processing\
    \ 10*n* email addresses, each of which requires *n* work, for a total of 10*n*²,\
    \ or quadratic-time, work. This quadratic-time performance is precisely why we\
    \ received a time limit exceeded error with this code, leading us to use a set\
    \ rather than a list.\n\n## Cubic Time\n\nIf one loop can lead to linear time,\
    \ and two nested loops can lead to quadratic time, then what about three nested\
    \ loops? Three nested loops, each of which depends on *n*, leads to a *cubic-time*\
    \ algorithm. In big O notation, we say that a cubic-time algorithm is *O*(*n*³).\n\
    \nIf you thought quadratic-time algorithms were slow, wait till you see how slow\
    \ cubic-time algorithms are. Suppose that *n* is 1,000. We already know that a\
    \ linear-time algorithm will take about 1,000 steps and that a quadratic-time\
    \ algorithm will take about 1,000² = 1,000,000 steps. A cubic-time algorithm will\
    \ take 1,000³ = 1,000,000,000 steps. A billion steps! But it gets worse. For example,\
    \ if *n* is 10,000, which is still a small amount of input, then a cubic-time\
    \ algorithm will take 1,000,000,000,000 (that's one trillion) steps. One trillion\
    \ steps would take many minutes of computing time. No joke: a cubic-time algorithm\
    \ is almost never good enough.\n\nIt certainly wasn't good enough when we tried\
    \ to use a cubic-time algorithm to solve Cow Baseball in Listing 9-5. I've reproduced\
    \ that solution here:\n\n```\ninput_file = open('baseball.in', 'r')\noutput_file\
    \ = open('baseball.out', 'w')\n\nn = int(input_file.readline())\n\npositions =\
    \ []\n\nfor i in range(n):\n    positions.append(int(input_file.readline()))\n\
    \ntotal = 0\n\n❶ for position1 in positions:\n    ❷ for position2 in positions:\n\
    \        first_two_diff = position2 - position1\n        if first_two_diff > 0:\n\
    \            low = position2 + first_two_diff\n            high = position2 +\
    \ first_two_diff * 2\n\n            ❸ for position3 in positions:\n          \
    \      if position3 >= low and position3 <= high:\n                    total =\
    \ total + 1\n\noutput_file.write(str(total) + '\\n')\n\ninput_file.close()\noutput_file.close()\n\
    ```\n\nYou'll see the telltale of cubic time in this code: three nested loops\
    \ ❶ ❷ ❸, each of which depends on the amount of input. As you'll recall, the time\
    \ limit for that problem was four seconds, and we could have up to 1,000 cows.\
    \ A cubic-time algorithm, processing a billion triples, is way too slow.\n\n##\
    \ Multiple Variables\n\nIn Chapter 5, we solved the Baker Bonus problem. I've\
    \ reproduced our solution from Listing 5-6 here:\n\n```\nfor dataset in range(10):\n\
    \    lst = input().split()\n    franchisees = int(lst[0])\n    days = int(lst[1])\n\
    \n    grid = []\n    ❶ for i in range(days):\n        row = input().split()\n\
    \        for j in range(franchisees):\n            row[j] = int(row[j])\n    \
    \    grid.append(row)\n\n    bonuses = 0\n\n    ❷ for row in grid:\n        total\
    \ = sum(row)\n        if total % 13 == 0:\n            bonuses = bonuses + total\
    \ // 13\n\n    ❸ for col_index in range(franchisees):\n        total = 0\n   \
    \     for row_index in range(days):\n            total = total + grid[row_index][col_index]\n\
    \        if total % 13 == 0:\n            bonuses = bonuses + total // 13\n\n\
    \    print(bonuses)\n```\n\nWhat is the big O efficiency of this algorithm? There\
    \ are some nested loops in here, so a first guess is that this algorithm is $O(n^2)$.\
    \ But what is $n$?\nIn the problems we’ve discussed to this point in the chapter,\
    \ we used the single variable $n$ to represent the amount of input: $n$ could\
    \ be the number of swaps or the number of parking spaces or the number of email\
    \ addresses or the number of cows. But in the Baker Bonus problem, we’re dealing\
    \ with two-dimensional input, so we need *two* variables to represent its amount.\
    \ We’ll call the first variable $d$, the number of days; we’ll call the second\
    \ $f$, the number of franchises. More formally, because there are multiple test\
    \ cases per input, we’ll let $d$ be the maximum number of days and $f$ the maximum\
    \ number of franchisees. We need to give the big O efficiency in terms of *both*\
    \ $d$ and $f$.\nOur algorithm consists of three major components: reading the\
    \ input, calculating the number of bonuses from the rows, and calculating the\
    \ number of bonuses from the columns. Let’s take a look at each of these.\nTo\
    \ read the input ❶, we perform $d$ iterations of the outer loop. On each of these\
    \ iterations we read a row and call split, which takes about $f$ steps. We take\
    \ another $f$ steps to loop through the values and convert them to integers. In\
    \ total, then, each of the $d$ iterations performs a number of steps proportional\
    \ to $f$. Reading the input therefore takes $O(df)$ time.\nNow for the row bonuses\
    \ ❷. The outer loop here loops $d$ times. Each of these iterations calls sum,\
    \ which takes $f$ steps because it has to add up $f$ values. Like reading the\
    \ input, then, this part of the algorithm is $O(df)$."
  mdcn: "## 典型形式\n\n一个典型的线性时间算法看起来像这样：\n\n```\nfor i in range(n):\n    <process input\
    \ i in a constant number of steps>\n```\n\n相比之下，一个典型的二次时间算法看起来像这样：\n\n```\nfor\
    \ i in range(n):\n    for j in range(n):\n        <process inputs i and j in a\
    \ constant number of steps>\n```\n\n对于一个包含 $n$ 个值的输入，每个算法处理多少个值？线性时间算法处理 $n$ 个值，每次\
    \ for 循环迭代处理一个。相比之下，二次时间算法在外部 for 循环的*每次迭代*中处理 $n$ 个值。\n\n在外部 for 循环的第一次迭代中，处理了\
    \ $n$ 个值（内部 for 循环的每次迭代处理一个）；在外部 for 循环的第二次迭代中，又处理了 $n$ 个值（内部 for 循环的每次迭代处理一个）；以此类推。由于外部\
    \ for 循环迭代 $n$ 次，处理的总值数为 $n * n$，即 $n^2$。两个嵌套循环，每个都依赖于 $n$，就产生了一个二次时间算法。用大 O 表示法，我们说二次时间算法是\
    \ $O(n^2)$。\n\n让我们比较一下线性时间算法和二次时间算法所做的工作量。假设我们正在处理一个包含 1,000 个值的输入，这意味着 $n$ 是\
    \ 1,000。一个需要 $n$ 步的线性时间算法将需要 1,000 步。一个需要 $n^2$ 步的二次时间算法将需要 $1,000^2 = 1,000,000$\
    \ 步。一百万远大于一千。但谁在乎呢：计算机真的、真的很快，对吧？嗯，是的，对于一个包含 1,000 个值的输入，如果我们使用二次时间算法，我们可能没问题。在第\
    \ 253 页，我给出了一个保守的规则，声称我们每秒可以执行大约五百万步。那么，一百万步应该可以在除最严格的时间限制外的所有情况下完成。\n\n但对二次时间算法的任何乐观都是短暂的。看看如果我们把输入值的数量从\
    \ 1,000 增加到 10,000 会发生什么。线性时间算法只需要 10,000 步。二次算法需要 $10,000^2 = 100,000,000$ 步。嗯……如果我们使用二次时间算法，现在我们的计算机看起来就不那么快了。虽然线性时间算法仍然在毫秒内运行，但二次时间算法至少需要几秒钟。毫无疑问，这里超时了。\n\
    \n### 概念检查\n\n以下算法的大 O 效率是多少？\n\n```\nfor i in range(10):\n    for j in range(n):\n\
    \        <process inputs i and j in a constant number of steps>\n```\n\n- A. O(1)\n\
    - B. O(n)\n- C. O(n²)\n\n答案：B。这里有两个嵌套循环，所以你的第一反应可能是声称这是一个二次时间算法。但要小心，因为外部 for\
    \ 循环只迭代 10 次，与 n 的值无关。因此，该算法的总步数是 10n。这里没有 n²；10n 是线性的，就像 n 一样。所以，这是一个线性时间算法，而不是二次时间算法。我们会将其效率写为\
    \ O(n)。\n\n### 概念检查\n\n以下算法的大 O 效率是多少？\n\n```\nfor i in range(n):\n    <process\
    \ input i in a constant number of steps>\nfor j in range(n):\n    <process input\
    \ j in a constant number of steps>\n```\n\n- A. O(1)\n- B. O(n)\n- C. O(n²)\n\n\
    答案：B。我们这里有两个循环，它们都依赖于 n。那么这不是二次时间吗？\n不！这两个循环是顺序的，而不是嵌套的。第一个循环需要 n 步，第二个也需要 n 步，总共\
    \ 2n 步。因此，这是一个线性时间算法。\n\n## 替代形式\n\n当你看到两个嵌套循环，每个都依赖于 n 时，很有可能你看到的是一个二次时间算法。但即使在没有此类嵌套循环的情况下，也可能出现二次时间算法。\n\
    \n我们可以在我们对电子邮件地址问题的第一个解决方案（清单 8-2）中找到这样的例子。我在这里复制了该解决方案：\n\n```\n# clean function\
    \ not shown\n\nfor dataset in range(10):\n    n = int(input())\n    addresses\
    \ = []\n    for i in range(n):\n        address = input()\n        ❶ address =\
    \ clean(address)\n        ❷ if not address in addresses:\n            addresses.append(address)\n\
    \n    print(len(addresses))\n```\n\n我们将 *n* 设为我们在 10 个测试用例中看到的电子邮件地址的最大数量。外部 for\
    \ 循环迭代 10 次；内部 for 循环最多迭代 *n* 次。因此，我们最多处理 10*n* 个电子邮件地址，这在 *n* 上是线性的。\n\n清理电子邮件地址\
    \ ❶ 需要恒定数量的步骤，所以我们不需要担心这一点。但这仍然*不是*一个线性时间算法，因为内部 for 循环的每次迭代需要超过恒定数量的步骤。具体来说，检查电子邮件地址是否已在我们的列表中\
    \ ❷ 需要与列表中已有的电子邮件地址数量成比例的工作，因为 Python 必须搜索列表。这本身就是一个线性操作！所以我们处理 10*n* 个电子邮件地址，每个需要\
    \ *n* 的工作，总共 10*n*²，即二次时间的工作。这种二次时间性能正是我们收到超时错误的原因，导致我们使用集合而不是列表。\n\n## 立方时间\n\
    \n如果一个循环可以导致线性时间，两个嵌套循环可以导致二次时间，那么三个嵌套循环呢？三个嵌套循环，每个都依赖于 *n*，会导致一个*立方时间*算法。用大 O\
    \ 表示法，我们说立方时间算法是 *O*(*n*³)。\n\n如果你认为二次时间算法很慢，那就等着看立方时间算法有多慢吧。假设 *n* 是 1,000。我们已经知道线性时间算法大约需要\
    \ 1,000 步，二次时间算法大约需要 1,000² = 1,000,000 步。立方时间算法将需要 1,000³ = 1,000,000,000 步。十亿步！但情况变得更糟。例如，如果\
    \ *n* 是 10,000，这仍然是一个很小的输入量，那么立方时间算法将需要 1,000,000,000,000（一万亿）步。一万亿步将需要几分钟的计算时间。不开玩笑：立方时间算法几乎永远不够好。\n\
    \n当我们尝试使用立方时间算法解决清单 9-5 中的牛棒球问题时，它当然不够好。我在这里复制了该解决方案：\n\n```\ninput_file = open('baseball.in',\
    \ 'r')\noutput_file = open('baseball.out', 'w')\n\nn = int(input_file.readline())\n\
    \npositions = []\n\nfor i in range(n):\n    positions.append(int(input_file.readline()))\n\
    \ntotal = 0\n\n❶ for position1 in positions:\n    ❷ for position2 in positions:\n\
    \        first_two_diff = position2 - position1\n        if first_two_diff > 0:\n\
    \            low = position2 + first_two_diff\n            high = position2 +\
    \ first_two_diff * 2\n\n            ❸ for position3 in positions:\n          \
    \      if position3 >= low and position3 <= high:\n                    total =\
    \ total + 1\n\noutput_file.write(str(total) + '\\n')\n\ninput_file.close()\noutput_file.close()\n\
    ```\n\n你会在这段代码中看到立方时间的特征：三个嵌套循环 ❶ ❷ ❸，每个都依赖于输入量。如你所记得的，该问题的时间限制是四秒，我们最多可以有 1,000\
    \ 头牛。一个处理十亿个三元组的立方时间算法太慢了。\n\n## 多个变量\n\n在第 5 章，我们解决了面包师奖金问题。我在这里复制了我们从清单 5-6\
    \ 中的解决方案：\n\n```\nfor dataset in range(10):\n    lst = input().split()\n    franchisees\
    \ = int(lst[0])\n    days = int(lst[1])\n\n    grid = []\n    ❶ for i in range(days):\n\
    \        row = input().split()\n        for j in range(franchisees):\n       \
    \     row[j] = int(row[j])\n        grid.append(row)\n\n    bonuses = 0\n\n  \
    \  ❷ for row in grid:\n        total = sum(row)\n        if total % 13 == 0:\n\
    \            bonuses = bonuses + total // 13\n\n    ❸ for col_index in range(franchisees):\n\
    \        total = 0\n        for row_index in range(days):\n            total =\
    \ total + grid[row_index][col_index]\n        if total % 13 == 0:\n          \
    \  bonuses = bonuses + total // 13\n\n    print(bonuses)\n```\n\n这个算法的大 O 效率是多少？这里有一些嵌套循环，所以第一个猜测是这个算法是\
    \ $O(n^2)$。但 $n$ 是什么？\n在本章到目前为止讨论的问题中，我们使用单个变量 $n$ 来表示输入量：$n$ 可以是交换次数、停车位数量、电子邮件地址数量或牛的数量。但在面包师奖金问题中，我们处理的是二维输入，所以我们需要*两个*变量来表示其数量。我们将第一个变量称为\
    \ $d$，表示天数；我们将第二个变量称为 $f$，表示特许经营商数量。更正式地说，因为每个输入有多个测试用例，我们将让 $d$ 表示最大天数，$f$ 表示最大特许经营商数量。我们需要用*两个*变量\
    \ $d$ 和 $f$ 来给出大 O 效率。\n我们的算法由三个主要部分组成：读取输入、计算行的奖金数量以及计算列的奖金数量。让我们逐一看看。\n要读取输入\
    \ ❶，我们对外部循环执行 $d$ 次迭代。在每次迭代中，我们读取一行并调用 split，这大约需要 $f$ 步。我们还需要另外 $f$ 步来遍历值并将其转换为整数。因此，总的来说，$d$\
    \ 次迭代中的每一次都执行与 $f$ 成比例的步数。因此，读取输入需要 $O(df)$ 时间。\n现在来看行奖金 ❷。这里的外部循环循环 $d$ 次。每次迭代调用\
    \ sum，这需要 $f$ 步，因为它必须将 $f$ 个值相加。因此，与读取输入一样，算法的这一部分是 $O(df)$。"
