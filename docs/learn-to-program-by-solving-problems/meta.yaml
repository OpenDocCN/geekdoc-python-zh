    \n```\n3\n2\n4\n8\n```\n\n正确答案是1，但我们的程序产生的是0。当`i`为0且`j`为1时，程序本应将`left`设置为2，将`right`设置为3。不幸的是，使用`bisect_left`会导致`right`被设置为2，因为索引2处的位置是大于或等于8的最左边位置。\n\
