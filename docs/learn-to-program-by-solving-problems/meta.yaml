- md: "## Output\n\nIf the phone number belongs to a telemarketer, output ignore;\
    \ otherwise, output answer.\n\n## Boolean Operators\n\nWhat has to be true about\
    \ a phone number that belongs to a telemarketer? Its first digit has to be 8 or\
    \ 9. And, its fourth digit has to be 8 or 9. And, the second and third digits\
    \ have to be the same. We can encode this “or” and “and” logic using Python’s\
    \ Boolean operators.\n\n## or Operator\n\nThe or operator takes two Boolean expressions\
    \ as its operands. It returns True if at least one operand is True, and False\
    \ otherwise:\n\n```\n>>> True or True\nTrue\n>>> True or False\nTrue\n>>> False\
    \ or True\nTrue\n>>> False or False\nFalse\n```\n\nThe only way to get False out\
    \ of the or operator is if both of its operands are False.\nWe can use or to tell\
    \ us whether a digit is an 8 or a 9:\n\n```\n>>> digit = 8\n>>> digit == 8 or\
    \ digit == 9\nTrue\n>>> digit = 3\n>>> digit == 8 or digit == 9\nFalse\n```\n\n\
    Remember from “Integer and Floating-Point Numbers” in Chapter 1 that Python uses\
    \ operator precedence to determine the order that operators are applied. The precedence\
    \ of or is lower than the precedence of relational operators, which means that\
    \ we don’t often need parentheses around operands. For example, in digit == 8\
    \ or digit == 9, the two operands to or are digit == 8 and digit == 9. It’s the\
    \ same as if we’d written it as (digit == 8) or (digit == 9).\nIn English, it\
    \ makes sense if someone says “if the digit is 8 or 9.” But writing that won’t\
    \ work in Python:\n\n```\n>>> digit = 3\n>>> if digit == 8 or 9:\n...\nprint('yes!')\n\
    ...\nyes!\n```\n\nNotice that I've (incorrectly!) written the second operand as\
    \ 9 instead of digit == 9. Python responds by outputting yes!, which is certainly\
    \ not what we'd want given that digit refers to 3. The reason is that Python considers\
    \ nonzero numbers to be True. Since 9 is considered True, this makes the whole\
    \ or expression True. Carefully double-check your Boolean expressions to avoid\
    \ these kinds of mistakes when translating from natural language to Python.\n\n\
    ## and Operator\n\nThe and operator returns True if both of its operands are True,\
    \ and False otherwise:\n\n```\n>>> True and True\nTrue\n>>> True and False\nFalse\n\
    >>> False and True\nFalse\n>>> False and False\nFalse\n```\n\nThe only way to\
    \ get True out of the and operator is if both of its operands are True.\nThe precedence\
    \ of and is higher than or. Here's an example of why this matters:\n\n```\n>>>\
    \ True or True and False\nTrue\n```\n\nPython interprets that expression like\
    \ this, with the and happening first:\n\n```\n>>> True or (True and False)\nTrue\n\
    ```\n\nThe result is True because the first operand of or is True.\nWe can force\
    \ the or to happen first by including parentheses:\n\n```\n>>> (True or True)\
    \ and False\nFalse\n```\n\nThe result is False because the second operand of and\
    \ is False.\n\n## not Operator\n\nAnother important Boolean operator is not. Unlike\
    \ or and and, not takes only one operand (not two). If its operand is True, not\
    \ returns False, and vice versa:\n\n```\n>>> not True\nFalse\n>>> not False\n\
    True\n```\n\nThe precedence of not is higher than or and and.\n\n> **CONCEPT CHECK**\n\
    \nHere's an expression and versions of that expression with parentheses. Which\
    \ of them evaluates to True?\n\nA. not True and False\nB. (not True) and False\n\
    C. not (True and False)\nD. None of the above\n\n---\n\nAnswer: C. The expression\
    \ (True and False) evaluates to False; the not therefore makes the full expression\
    \ True.\n\n> **CONCEPT CHECK**\n\nConsider the expression not a or b.\nWhich of\
    \ the following makes the expression False?\n\nA. a False, b False\nB. a False,\
    \ b True\nC. a True, b False\nD. a True, b True\nE. More than one of the above\n\
    \n---\n\nAnswer: C. If a is True, then not a is False. Since b is False, too,\
    \ both operands to or are False, so the whole expression evaluates to False.\n\
    \n## Solving the Problem\n\nWith Boolean operators at the ready, we can tackle\
    \ the Telemarketers problem. Our solution is in Listing 2-2.\n\n```\nnum1 = int(input())\n\
    num2 = int(input())\nnum3 = int(input())\nnum4 = int(input())\n\nif ((num1 ==\
    \ 8 or num1 == 9) and\n        (num4 == 8 or num4 == 9) and\n        (num2 ==\
    \ num3)):\n    print('ignore')\nelse:\n    print('answer')\n```\n\nListing 2-2:\
    \ Solving Telemarketers\n\nAs in Winning Team, we start by reading the input and\
    \ converting it to integers.\n\nThe high-level structure of our if statement ❶\
    \ is three expressions connected by and operators; each of them must be True for\
    \ the entire expression to be True. We require that the first number be 8 or 9,\
    \ that the fourth number be 8 or 9, and that the second and third numbers be equal.\
    \ If all three of these conditions hold, then we know that the phone number belongs\
    \ to a telemarketer, and we output ignore. Otherwise, the phone number does not\
    \ belong to a telemarketer, and we output answer.\n\nI’ve split the Boolean expression\
    \ over three lines. This requires wrapping the entire expression in an additional\
    \ pair of parentheses, as I have done. (Without those parentheses, you’ll get\
    \ a syntax error, because there’s no indication to Python that the expression\
    \ is continuing on the next line.)\n\nPython style guides suggest that a line\
    \ be no longer than 79 characters. A line with the full Boolean expression would\
    \ squeak in there at 76 characters. But I think the three-line version is clearer,\
    \ highlighting each condition that must be True on its own line.\n\nWe have a\
    \ good solution here. To explore a little further, let’s discuss some alternate\
    \ approaches.\n\nOur code uses a Boolean expression to detect when a phone number\
    \ belongs to a telemarketer. We could have also chosen to write code that detects\
    \ when a phone number does *not* belong to a telemarketer. If the phone number\
    \ doesn’t belong to a telemarketer, we should output answer; otherwise, we should\
    \ output ignore.\n\nIf the first digit isn’t 8 and isn’t 9, then the phone number\
    \ doesn’t belong to a telemarketer. Or, if the fourth digit isn’t 8 and isn’t\
    \ 9, then the phone number doesn’t belong to a telemarketer. Or, if the second\
    \ and third digits aren’t equal, then the phone number doesn’t belong to a telemarketer.\
    \ If even one of these expressions is True, then the phone number doesn’t belong\
    \ to a telemarketer.\n\nSee Listing 2-3 for a version of the code that captures\
    \ this logic.\n\n```\nnum1 = int(input())\nnum2 = int(input())\nnum3 = int(input())\n\
    num4 = int(input())\n\nif ((num1 != 8 and num1 != 9) or\n        (num4 != 8 and\
    \ num4 != 9) or\n        (num2 != num3)):\n    print('answer')\nelse:\n    print('ignore')\n\
    ```\n\n*Listing 2-3: Solving Telemarketers, alternate approach*\n\nIt's not easy\
    \ getting all of those !=, or, and and operators correct! Notice, for example,\
    \ that we've had to change all == operators to !=, all or operators to and, and\
    \ all and operators to or.\n\nAn alternate approach is to use the not operator\
    \ to negate the “is a telemarketer” expression in one shot. See Listing 2-4 for\
    \ that code.\n\n```\nnum1 = int(input())\nnum2 = int(input())\nnum3 = int(input())\n\
    num4 = int(input())\n\nif not ((num1 == 8 or num1 == 9) and\n        (num4 ==\
    \ 8 or num4 == 9) and\n        (num2 == num3)):\n    print('answer')\nelse:\n\
    \    print('ignore')\n```\n\n*Listing 2-4: Solving Telemarketers, not operator*\n\
    \nWhich of these solutions do you find most intuitive? There's often more than\
    \ one way to structure the logic of an if statement, and we should use the one\
    \ that's easiest to get right. To me, Listing 2-2 is the most natural, but you\
    \ may feel otherwise!\n\nChoose your favorite version and submit it to the judge.\
    \ You should see that all test cases pass.\n\n## Comments\n\nWe should always\
    \ strive to make our programs as clear as possible. This helps to avoid introducing\
    \ errors when programming and makes it easier to fix our code when errors do slip\
    \ in. Meaningful variable names, spaces around operators, blank lines to segment\
    \ the program into its logical pieces, simple if statement logic: all of these\
    \ practices can improve the quality of the code we write. Another good habit is\
    \ adding *comments* to our code.\n\nA comment is introduced by the # character\
    \ and continues until the end of the line. Python ignores comments, so they have\
    \ no impact on what our program does. We add comments to remind ourselves, or\
    \ others, about design decisions that we've made. Assume that the person reading\
    \ the code knows Python, so avoid comments that simply restate what the code is\
    \ doing. Here's code with an unnecessary comment:\n\n```\n>>> x = 5\n>>> x = x\
    \ + 1  # Increase x by 1\n```\n\nThat comment adds nothing beyond what we already\
    \ know about assignment statements.\n\nSee Listing 2-5 for a version of Listing\
    \ 2-2 with comments.\n\n```\n❶ # ccc18j1, Telemarketers\n\nnum1 = int(input())\n\
    num2 = int(input())\nnum3 = int(input())\nnum4 = int(input())\n\n❷ # Telemarketer\
    \ number: first digit 8 or 9, fourth digit 8 or 9,\n# second digit and third digit\
    \ are same\nif ((num1 == 8 or num1 == 9) and\n    (num4 == 8 or num4 == 9) and\n\
    \    (num2 == num3)):\n    print('ignore')\nelse:\n    print('answer')\n```\n\n\
    *Listing 2-5: Solving Telemarketers, comments added*\n\nI've added three comment\
    \ lines: the one at the top ❶ reminds us of the problem code and name, and the\
    \ two before the if statement ❷ remind us of the rules for detecting a telemarketer\
    \ phone number.\n\nDon't go overboard with comments. Whenever possible, write\
    \ code that doesn't require comments in the first place. But for tricky code or\
    \ to document why you chose to do something in a particular way, a well-placed\
    \ comment now can save time and frustration later.\n\n## Input and Output Redirection\n\
    \nWhen you submit Python code to the judge, it runs many test cases to determine\
