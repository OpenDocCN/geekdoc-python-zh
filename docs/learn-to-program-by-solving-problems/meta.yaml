    # Problem #17: Farm Seeding


    We can use a loop to read a specified number of lines from a file. We''ll do that
    in this problem, and we''ll see that it''s similar to using a loop with input
    to read from standard input.


    In Chapter 6, when we solved Action Figures, we learned about top-down design
    using functions. It''s an important skill, composing multiple functions to solve
    a problem. And since there isn''t much more to say about files, I''ve chosen a
    problem that doubles as a site for top-down design.


    This is a challenging problem. We''ll first need to understand exactly what we''re
    being asked to do. After that, we''ll need to develop a way to solve the problem
    and think carefully about why our solution is correct.


    This is USACO 2019 February Bronze Contest problem The Great Revegetation.


    # The Challenge


    Farmer John has *n* pastures, all of which he would like to seed with grass. The
    pastures are numbered 1, 2, . . . , *n*.


    Farmer John has four different types of grass seed, numbered 1, 2, 3, and 4. He''ll
    choose one of these grass types for each pasture.


    Farmer John also has *m* cows. Each cow has two favorite pastures in which it
    eats grass. Each cow cares only about its two favorite pastures, no others. For
    a healthy diet, each cow requires that its two pastures have different types of
    grass. For example, for some given cow, it would be okay if one of its pastures
    had grass type 1 and the other had grass type 4. But it would not be okay if both
    of its pastures had grass type 1.


    A pasture might be the favorite of more than one cow. But it''s guaranteed that
    a pasture is the favorite of no more than three cows.'
- md: 'Determine the grass type to use in each pasture. Each pasture is required to
    use a grass type between 1 and 4, and each cow''s two favorite pastures must have
    different grass types.


    ## Input


    Read input from the file named `revegetate.in`.

    The input consists of the following lines:


    - A line containing two integers separated by a space. The first integer is $n$,
    the number of pastures; it''s between 2 and 100. The second integer is $m$, the
    number of cows; it''s between 1 and 150.

    - $m$ lines, each of which gives the two favorite pasture numbers for a cow. These
    pasture numbers are integers between 1 and $n$ and are separated by a space.


    ## Output


    Write output to the file named `revegetate.out`.

    Output a valid way to seed the pastures. The output is a line of $n$ characters,
    each of which is a ''1'', ''2'', ''3'', or ''4''. The first character is the grass
    type for pasture 1, the second is the grass type for pasture 2, and so on.

    We can interpret these $n$ characters as an integer with $n$ digits. For example,
    if we have the five grass types ''11123'', then we can interpret this as the integer
    11123.

    This integer interpretation comes into play when we have a choice of what to output.
    If there are multiple valid ways to seed the pastures, we must output the one
    that''s smallest when interpreted as an integer. For example, if both ''11123''
    and ''22123'' are valid, we output the string ''11123'' because 11123 is less
    than 22123.


    ## Exploring a Test Case


    We''re going to use top-down design to arrive at a solution for this problem.
    Working through a test case will help us sift the tasks.

    Here''s the test case:


    ```

    8 6

    5 4

    2 4

    3 5

    4 1

    2 1

    5 2

    ```


    The first line of the test case tells us that we have eight pastures. They''re
    numbered from 1 to 8. The first line also tells us that we have six cows. The
    problem doesn''t specify a numbering for the cows, so I''ll just number them starting
    at 0. The two favorite pastures of each cow are in Table 7-1 for easy reference.


    **Table 7-1: Farm Seeding Example, Cows**


    | Cow | Pasture 1 | Pasture 2 |

    | :--- | :--- | :--- |

    | 0 | 5 | 4 |

    | 1 | 2 | 4 |

    | 2 | 3 | 5 |

    | 3 | 4 | 1 |

    | 4 | 2 | 1 |

    | 5 | 5 | 2 |


    In this problem, we''re being asked to make *n* decisions. What grass type should
    we use for pasture 1? What grass type should we use for pasture 2? Pasture 3?
    Pasture 4? And so on, all the way up to pasture *n*. One strategy for these kinds
    of problems is to make one decision at a time, without making a mistake on any
    of them. If we manage to finish with decision *n* and haven''t made any mistakes
    along the way, then our solution must be correct.


    Let''s go through the pastures from 1 to 8 and see if we can assign a grass type
    to each of them. We need to prioritize choosing small-numbered grass types so
    that we end with the smallest grass types when interpreted as a number.


    What grass type should we choose for pasture 1? The only cows that care about
    pasture 1 are cows 3 and 4, so we focus only on those two. If we had already chosen
    grass types for some of these cows'' pastures, then we''d have to be careful with
    our choice for pasture 1. We wouldn''t want to give some cow two pastures with
    the same grass type, because that would break the rules! We haven''t chosen any
    grass types yet, so nothing can go wrong no matter what we choose for pasture
    1. Since we want the smallest grass types, though, we''ll choose grass type 1.


    I''ll collect our grass-type decisions in tables. Here''s the decision we just
    made, grass-type 1 for pasture 1:


    | Pasture | Grass type |

    | :--- | :--- |

    | 1 | 1 |


    Let''s move on. What grass type should we choose for pasture 2? The cows that
    care about pasture 2 are cows 1, 4, and 5, so we focus on those. One of cow 4''s
    pastures is pasture 1, and we chose grass type 1 for that pasture, so grass type
    1 is eliminated as a grass type for pasture 2. If we used grass type 1 for pasture
    2, then we''d be giving cow 4 two pastures with the same grass type, and that
    would break the rules. Cows 1 and 5, however, don''t eliminate any other grass
    types, because we haven''t chosen grass types for their pastures yet. We therefore
    choose grass type 2, the smallest-numbered grass type that''s available. Here''s
    where we stand:


    | Pasture | Grass type |

    | :--- | :--- |

    | 1 | 1 |

    | 2 | 2 |


    What grass type should we choose for pasture 3? The only cow that cares about
    pasture 3 is cow 2. Cow 2''s pastures are pastures 3 and 5. That cow doesn''t
    eliminate any grass types, however, because we haven''t assigned a grass type
    to pasture 5! To get the smallest number, we''ll use grass type 1 for pasture
    3. Here''s our next snapshot:


    | Pasture | Grass type |

    | :--- | :--- |

    | 1 | 1 |

    | 2 | 2 |

    | 3 | 1 |


    I can see three steps in our top-down design crystallizing here. First, we need
    to obtain the cows that care about the current pasture. Second, we need to determine
    which grass types those cows eliminate from consideration. Third, we need to choose
    the smallest-numbered grass type that wasn''t eliminated. Each of those is a prime
    candidate for a function.


    Let''s keep going. We have three cows that care about pasture 4: cows 0, 1, and
    3. Cow 0 doesn''t eliminate any grass types, because we haven''t assigned grass
    types to its pastures yet. Cow 1 eliminates grass type 2 because we assigned grass
    type 2 to pasture 2 (its other pasture). And cow 3 eliminates grass type 1 because
    we assigned grass type 1 to pasture 1 (its other pasture). The smallest available
    grass type, then, is 3, so that''s what we use for pasture 4:


    | Pasture | Grass type |

    | :--- | :--- |

    | 1 | 1 |

    | 2 | 2 |

    | 3 | 1 |

    | 4 | 3 |


    On to pasture 5. The cows that care about pasture 5 are cows 0, 2, and 5. Cow
    0 eliminates grass type 3; cow 2 eliminates grass type 1; and cow 5 eliminates
    grass type 2. So grass types 1, 2, and 3 are out. Our only choice is grass type
    4.


    That was close! We almost ran out of grass types there. Lucky for us, there was
    no other cow that cared about pasture 5 and eliminated grass type 4.


    Or, wait. This wasn’t luck at all, because of this bit from the problem description:
    “It’s guaranteed that a pasture is the favorite of no more than three cows.” This
    means that at most three grass types can be eliminated for each pasture. We’ll
    never be stuck! And we don’t even have to worry about the ramifications of past
    choices on our next decision. No matter what we did in the past, we’ll always
    have at least one available grass type.


    Let’s add pasture 5 to our table:


    | Pasture | Grass type |

    | :--- | :--- |

    | 1 | 1 |

    | 2 | 2 |

    | 3 | 1 |

    | 4 | 3 |

    | 5 | 4 |


    There are three pastures to go. But no cow cares about any of them, so we can
    just use grass type 1 in each case. That gives us this:


    | Pasture | Grass type |

    | :--- | :--- |

    | 1 | 1 |

    | 2 | 2 |

    | 3 | 1 |

    | 4 | 3 |

    | 5 | 4 |

    | 6 | 1 |

    | 7 | 1 |

    | 8 | 1 |


    We can read the grass types from top to bottom to obtain the correct output for
    this example. The output is as follows:


    ```

    12134111

    ```


    ## Top-Down Design


    With a good understanding of the tasks that we''ll need to complete, we''ll turn
    to a top-down design of this problem.


    ## The Top Level


    We discovered three tasks in the previous section as we worked through a test
