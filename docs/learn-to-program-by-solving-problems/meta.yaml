    \n## 对数时间\n\n在第255页的“我们程序的效率”中，我们讨论了线性搜索和二分搜索的区别。线性搜索通过从头到尾搜索列表来查找一个值。这是一个 *O(n)*\
    \ 的算法。无论列表是否排序，它都有效。相比之下，二分搜索仅适用于已排序的列表。但如果你有一个已排序的列表，那么二分搜索的速度快得惊人。\n二分搜索的工作原理是将我们要查找的值与列表中间的值进行比较。如果列表中间的值大于我们要查找的值，我们就在列表的左半部分继续搜索。如果列表中间的值小于我们要查找的值，我们就在列表的右半部分继续搜索。我们不断重复这个过程，每次忽略一半的列表，直到找到我们要找的值。\n\
