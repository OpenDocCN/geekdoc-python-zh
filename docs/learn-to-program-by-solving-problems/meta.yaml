- md: "## Solving the Problem\n\nWith our range for loops, we're ready to solve Occupied\
    \ Spaces. Our strategy is to loop through each index from the beginning of the\
    \ strings to the end. We can check what's at each index in both yesterday's information\
    \ and today's information. Using a nested if statement, we'll determine whether\
    \ the parking space was occupied on both days.\nListing 3-3 has our solution.\n\
    \n```\nn = int(input())\nyesterday = input()\ntoday = input()\n\noccupied = 0\n\
    \nfor i in range(len(yesterday)):\n    if yesterday[i] == 'C' and today[i] ==\
    \ 'C':\n        occupied = occupied + 1\n\nprint(occupied)\n```\n\nListing 3-3:\
    \ Solving Occupied Spaces\n\nThe program starts by reading the three lines of\
    \ input: n refers to the number of parking spaces; and yesterday and today refer\
    \ to yesterday's and today's parking-space information, respectively.\n\nNotice\
    \ that we don't refer to the number of parking spaces (n) again. We could make\
    \ use of it to tell us the length of the strings, but I've chosen to ignore it\
    \ because it's often not provided in real-life scenarios.\n\nWe use the occupied\
    \ variable to count the number of parking spaces that were occupied both yesterday\
    \ and today. We start that variable off at 0 ❶.\n\nNow we reach the range for\
    \ loop, which loops through the valid indices of yesterday and today ❷. For each\
    \ such index, we check whether the parking space was occupied yesterday and occupied\
    \ today ❸. If it was, then we include this parking space in our total by increasing\
    \ occupied by 1 ❹.\n\nWhen the range for loop terminates, we'll have gone through\
    \ all parking spaces. The total number of parking spaces that were occupied yesterday\
    \ and today can be accessed through the occupied variable. All that's left is\
    \ to output that total.\n\nThat'll do it for this problem. Time to submit your\
    \ code to the judge.\n\n## Problem #7: Data Plan\n\nWe've learned that for loops\
    \ are useful for processing data after we've read it from the input. They're also\
    \ often useful for reading the data itself. In this problem, we'll tackle data\
    \ that's spread over many lines and use a for loop to help us read it all.\n\n\
    This is DMOJ problem coci16c1p1.\n\n### The Challenge\n\nPero has a data plan\
    \ with his cell phone provider that offers him x megabytes of data per month.\
    \ In addition, any data he doesn't use in a given month carries over to the next\
    \ month. For example, if x is 10 and Pero uses only 4MB in a given month, the\
    \ remaining 6MB carry over to the next month (in which he'd now have 10 + 6 =\
    \ 16MB available).\n\nWe're given the number of megabytes of data that Pero uses\
    \ in each of the first n months. Our task is to determine the number of megabytes\
    \ available for the following month.\n\n### Input\n\nThe input consists of the\
    \ following lines:\n\n- A line containing integer x, the number of megabytes given\
    \ to Pero per month. x is between 1 and 100.\n- A line containing integer n, the\
    \ number of months that Pero has had the data plan. n is between 1 and 100.\n\
    - $n$ lines, one for each month, giving the integer number of megabytes that Pero\
    \ uses in that month. Each number is at least 0 and will never outstrip the number\
    \ of available megabytes. (For example, if $x$ is 10 and Pero currently has 30MB\
    \ available, the next number will be at most 30.)\n\n### Output\n\nOutput the\
    \ number of megabytes available for the next month.\n\n### Looping to Read Input\n\
    \nIn all of our problems so far, we've known exactly how many lines to read from\
    \ the input. For example, in Three Cups, we read one line; in Occupied Spaces,\
    \ we read three lines. Here in Data Plan, we don't know in advance how many lines\
    \ to read, because it depends on the number that we read from the second line.\n\
    \nWe can read the first line of input:\n\n```\nmonthly_mb = int(input())\n```\n\
    \n(I've used variable name `monthly_mb` rather than `x` to imbue it with some\
    \ meaning.)\n\nAnd we can read the second line of input:\n\n```\nn = int(input())\n\
    ```\n\nBut we can't read any more without a loop. A range for loop is perfect\
    \ here, because we can use it to loop exactly $n$ times:\n\n```\nfor i in range(n):\n\
    \    # Process month\n```\n\n### Solving the Problem\n\nMy strategy for solving\
    \ the problem is to keep track of the number of megabytes that are carried over\
    \ from previous months. I call this the *excess*.\n\nConsider this test case:\n\
    \n```\n10\n3\n4\n12\n1\n```\n\nIn each month, Pero is given 10MB, and we have\
    \ to process the data that he used in the provided three months. In the first\
    \ month, Pero is given 10MB and uses 4MB, so the excess that carries forward is\
    \ 6MB. In the second month, Pero is given 10MB more, so now he has 16MB total.\
    \ He uses 12MB this month, so the excess that carries forward is 16 – 12 = 4MB.\
    \ In the third month, Pero is given 10MB more, so now he has 14MB total. He uses\
    \ 1MB this month, so the excess that carries forward is 14 – 1 = 13MB.\n\nWe need\
    \ to know the number of megabytes that Pero has available for the next (that is,\
    \ fourth) month. He has 13MB that carry over from the first three months, and\
    \ he’s given his usual 10MB for this month, so he has a total of 13 + 10 = 23MB\
    \ to use.\n\nWhen I went to write the code based on this explanation, I neglected\
    \ to add this final 10, so my output was 13 instead of 23. I was focusing exclusively\
    \ on the excess and forgot that what we need is not the excess going into the\
    \ next month, but the total number of megabytes available. That total is the excess\
    \ plus whatever Pero is given per month.\n\nSee Listing 3-4 for the (corrected!)\
    \ code.\n\n```\nmonthly_mb = int(input())\nn = int(input())\n\nexcess = 0\n\n\
    ❶ for i in range(n):\n    used = int(input())\n    ❷ excess = excess + monthly_mb\
    \ - used\n\n❸ print(excess + monthly_mb)\n```\n\nListing 3-4: Solving Data Plan\n\
    \nThe excess variable begins at 0. On each iteration of the range for loop, we\
    \ assign a value to excess that considers the number of megabytes given per month\
    \ and the number of megabytes used in that month.\n\nThe range for loop loops\
    \ n times, once for each month that Pero has had the data plan ❶. The values that\
    \ i takes on—0, 1, and so on—aren’t of interest to us, because we have no reason\
    \ to care about which month we’re processing. For that reason, we don't use the\
    \ value of i anywhere in the program. You can replace i with _ (an underscore)\
    \ to be explicit about the variable’s “don’t care” status, but I’ll leave it as\
    \ i for consistency with other examples.\n\nIn the range for loop, we read the\
    \ number of megabytes used in this month. Then, we update the number of excess\
    \ megabytes ❷: it’s what it was before, plus the number of megabytes that Pero\
    \ gets per month, minus the number of megabytes that Pero uses this month.\n\n\
    Having computed the excess number of megabytes after n months, we report the number\
    \ of megabytes available for the next month ❸.\n\nThere are always multiple ways\
    \ to solve a problem. Programming is creative, and I enjoy observing the range\
    \ of solution strategies that people come up with. Even if you’ve succeeded in\
    \ solving a problem, you might like to Google the problem to learn from how others\
    \ have solved it. In addition, some online judges, like DMOJ, allow you to view\
    \ other people’s submissions once you’ve solved the problem. For submissions that\
    \ pass all of the test cases: did those programmers do things differently from\
    \ you?"
  mdcn: "## 解决问题\n\n有了我们的 `range` 循环，我们已经准备好解决“占用停车位”问题了。我们的策略是从字符串的开头到结尾遍历每个索引。我们可以检查昨天信息和今天信息中每个索引处的内容。使用嵌套的\
