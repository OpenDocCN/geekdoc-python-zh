    \    for word in words:\n        print(word)\n\n    print()\n```\n\n*代码清单 8-6：解决“常见单词”问题*\n\
    \n第一个函数是 `invert_dictionary`。我们已经在本章前面的“反转字典”部分讨论过它了。我们现在将逐一介绍程序的其他部分。\n\n## 添加后缀\n\
    \n`with_suffix` 函数 ❶ 接受一个数字，并返回一个添加了正确后缀的字符串。我们需要这个函数，是因为那个恼人的要求：输出 k 时需要带后缀。例如，如果\
    \ k = 1，那么输出中必须包含这一行：\n\n```\n1st most common word(s):\n```\n\n如果 k = 2，输出中必须包含这一行：\n\
    \n```\n2nd most common word(s):\n```\n\n以此类推。我们的 `with_suffix` 函数确保我们为数字添加正确的后缀。我们首先将数字转换为字符串\
    \ ❷，这样我们就可以轻松地访问它的各位数字。然后我们使用一系列测试来确定后缀是 st、nd、rd 还是 th。例如，如果最后一位数字是 1，但最后两位数字不是\
    \ 11 ❸，那么正确的后缀就是 st。这给出了 1st、21st 和 31st，但不包括 11st（这是错误的）。\n\n## 查找第 k 常见的单词\n\
    \n`most_common_words` 函数 ❹ 是实际查找我们需要的单词的函数。它接受一个反转字典（将出现次数映射到单词列表）和一个整数 k，并返回第\
    \ k 常见的单词列表。\n\n为了理解它的工作原理，让我们看一个示例反转字典。我已经将其键按出现次数从多到少排序，因为这正是 `most_common_words`\
    \ 遍历键的顺序。字典如下：\n\n```\n{4: ['cut'],\n 3: ['gully'],\n 2: ['storm', 'brook'],\n\
    \ 1: ['magma', 'cliff', 'blast']}\n```\n\n假设 k 是 3。因此，必须恰好有两个单词比我们返回的单词更常见。我们需要的单词不是由第一个字典键提供的。该键只给了我们一个单词（cut），所以它不可能是第三常见的单词。同样，我们需要的单词也不是由第二个字典键提供的。该键给了我们另一个单词（gully）。我们现在总共处理了两个单词，但还没有找到第三常见的单词。然而，我们需要的单词*确实*是由第三个字典键提供的。该键给了我们另外两个单词；每个单词（storm\
    \ 和 brook）都恰好有两个出现次数更多的单词，所以这些就是 k 为 3 时的单词。\n\n如果 k 是 4 呢？这次，必须恰好有三个单词比我们返回的单词更常见。候选单词仍然是来自第三个键的单词（storm\
    \ 和 brook），但只有两个单词比这些单词中的每一个出现得更频繁。因此，当 k = 4 时*没有*单词。\n\n总之，我们需要在遍历键时累加我们看到的单词，直到找到可能包含我们需要的单词的键。如果恰好有\
    \ k - 1 个单词出现得更频繁，那么我们就有了 k 对应的单词；否则，我们就没有，也就没有单词可以输出。\n\n现在让我们逐步分析代码本身。我们首先获取字典键的列表，并将它们从大到小排序。然后我们按照这个逆序遍历键\
    \ ❻。`done` 变量告诉我们是否已经查看了 k 个或更多单词。一旦我们查看了 ❼，我们就退出循环。\n\n循环结束后，我们检查是否有 k 对应的单词。如果恰好有\
    \ k - 1 个单词出现得更频繁，并且我们没有超出键的范围 ❽，那么我们确实有单词可以返回。否则，就没有单词可以返回，所以我们返回空列表。\n\n## 主程序\n\
    \n现在我们来到程序的主体部分 ❾。我们构建字典 `word_to_num`，它将每个单词映射到其出现次数。然后我们构建反转字典 `num_to_words`\
    \ ❿，它将每个出现次数映射到相关的单词列表。注意这些字典的名称如何传达了映射的方向：`word_to_num` 从单词到数字，而 `num_to_words`\
    \ 从数字到单词。\n\n其余的代码调用我们的其他辅助函数并输出相应的单词。\n\n至此，你已经准备好提交给评测系统了。干得好：这是你用字典解决的第一个问题。无论何时你需要在两种类型的值之间进行映射，想想是否可以用字典来组织信息。如果可以，那么你很可能已经走在通往高效解决方案的路上了！"
