    \ that increased latitude that allows Python to optimize searches in a set for\
    \ speed.\nFor similar reasons, there are other operations that are extremely slow\
    \ on large lists but extremely fast on large sets. For example, removing a value\
    \ from a list is very slow, because Python must decrease the index of each value\
    \ that's to the right of that value. By contrast, removing a value from a set\
    \ is very fast: there are no indices to update!\n\n## Solving the Problem\n\n\
    We already have a function to clean an email address (Listing 8-1), and we'll\
    \ use it in our set-based solution. As for the main program, Listing 8-2 gets\
    \ us most of the way there. We just need to use a set instead of a list.\nThe\
