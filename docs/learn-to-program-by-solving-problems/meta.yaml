  md: '```

    >>> 4 >= 5

    False

    >>> 8 <= 6

    False

    ```


    To determine equality, we use the == operator. That''s two equal signs, not one.
    Remember that one equal sign (=) is used in an assignment statement; it has nothing
    to do with checking equality.


    ```

    >>> 5 == 5

    True

    >>> 15 == 10

    False

    ```


    For inequality, we use the != operator. It returns True if the operands are not
    equal and False if they are equal:


    ```

    >>> 5 != 5

    False

    >>> 15 != 10

    True

    ```


    Real programs wouldn''t evaluate expressions whose values we already know. We
    don''t need Python to tell us that 15 doesn''t equal 10. More typically, we''d
    use variables in these kinds of expressions. For example, number != 10 is an expression
    whose value depends on what number refers to.

    The relational operators also work on strings. When checking equality, case matters:


    ```

    >>> ''hello'' == ''hello''

    True

    >>> ''Hello'' == ''hello''

    False

    ```


    One string is less than another if it comes first in alphabetical order:


    ```

    >>> ''brave'' < ''cave''

    True

    >>> ''cave'' < ''cavern''

    True

    >>> ''orange'' < ''apple''

    False

    ```


    But things can be surprising when lowercase and uppercase characters are both
    involved:


    ```

    >>> ''apple'' < ''Banana''

    False

    ```'
