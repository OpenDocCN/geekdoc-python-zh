    \n## Solving the Problem\n\nNow that we have some practice using while loops to\
    \ loop as long as there are more buttons to handle, and using slicing for string\
    \ manipulation, we're ready to solve Song Playlist. See Listing 4-3 for the code.\n\
    \n```\nsongs = 'ABCDE'\n\nbutton = 0\n\nwhile button != 4:\n    button = int(input())\n\
