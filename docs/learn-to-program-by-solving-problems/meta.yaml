    \ It should have returned False.\n\n## Function Documentation\n\nIt's clear to\
    \ us right now what our no_high function does and how we should call it. But what\
    \ about in a few months, when the purpose of our old code doesn't come readily\
    \ to mind? And what about once we've amassed a large collection of our own functions,\
