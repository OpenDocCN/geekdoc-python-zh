- md: "may learn very little. A small test case, by contrast, doesn't cause our program\
    \ to do much; if what it does is wrong, then we don't have far to look for the\
    \ culprit. Devising small, targeted test cases is not always easy. It's a skill\
    \ that you can hone through practice.\n\nSubmit our correct code to the judge,\
    \ and then let's move on.\n\nBefore continuing, you might like to try solving\
    \ exercises 1 and 2 from \"Chapter Exercises\" on page 67.\n\n## Problem #6: Occupied\
    \ Spaces\n\nWe know how to loop through the characters of a string. But sometimes\
    \ we need to know where we are in the string, not just the character that's stored\
    \ there. This problem is one such example.\n\nThis is DMOJ problem ccc18j2.\n\n\
    ## The Challenge\n\nYou supervise a parking lot with *n* parking spaces. Yesterday,\
    \ you recorded whether each parking space was occupied by a car or was empty.\
    \ Today, you again recorded whether each parking space was occupied by a car or\
    \ was empty. Indicate the number of parking spaces that were occupied on both\
    \ days.\n\n## Input\n\nThe input consists of three lines.\n\n- The first line\
    \ contains integer *n*, the number of parking spaces. *n* is between 1 and 100.\n\
    - The second line contains a string of *n* characters for yesterday's information,\
    \ one character for each parking space. A C indicates an occupied parking space\
    \ (C for car), and a . indicates an empty parking space. For example, CC. means\
    \ that the first two parking spaces were occupied and the third was empty.\n-\
    \ The third line contains a string of *n* characters for today's information,\
    \ in the same format as the second line.\n\n## Output\n\nOutput the number of\
    \ parking spaces that were occupied on both days.\n\n## A New Kind of Loop\n\n\
    We could have up to 100 parking spaces, so you may not be surprised that a loop\
    \ will show up here somewhere. The kind of for loop we learned when solving Three\
    \ Cups can certainly loop through a string of parking-space information:\n\n```\n\
    >>> yesterday = 'CC.'\n>>> for parking_space in yesterday:\n...     print('The\
    \ space is ' + parking_space)\n...\nThe space is C\nThe space is C\nThe space\
    \ is .\n```\n\nThat tells us whether each space was occupied yesterday. But we\
    \ also need to know whether each space was also occupied today.\n\nConsider this\
    \ test case:\n\n```\n3\nCC.\n.C.\n```\n\nThe first parking space was occupied\
    \ yesterday. Was that parking space occupied on both days? To answer that, we\
    \ need to look at the corresponding character in today’s string. It’s a . (empty),\
    \ so this parking space was not occupied on both days.\n\nWhat about the second\
    \ parking space? That one was also occupied yesterday. And, looking at the second\
    \ character of today’s string, it was also occupied today. So this *is* a parking\
    \ space that was occupied on both days. (This is the only such parking space;\
    \ the correct output for this test case is 1.)\n\nLooping through the characters\
    \ of one string doesn’t help us find the corresponding characters in the other\
    \ string. But if we could keep track of where we were in the string—we’re at the\
    \ first parking space, we’re at the second parking space, and so on—we could look\
    \ up the corresponding character from each string. The for loops we’ve learned\
    \ so far are not the way to do this. The way to do this is using indexing and\
    \ a new type of for loop.\n\n## Indexing\n\nEach character in a string has an\
    \ *index*, which indicates its location. The first character is at index 0, the\
    \ second character is at index 1, and so on. In natural language, we often start\
    \ counting at 1. In English, no one says “the character at position 0 of *hello*\
    \ is *h*.” But most programming languages, Python included, start at 0.\n\nTo\
    \ use indexing, we follow a string by an index in square brackets. Here are some\
    \ examples of indexing:\n\n```\n>>> word = 'splore'\n>>> word[0]\n's'\n>>> word[3]\n\
    'o'\n>>> word[5]\n'e'\n```\n\nThe highest index that we can use on a nonempty\
    \ string is its length minus 1. (There is no valid index for an empty string.)\
    \ For example, 'splore' is length 6, so index 5 is its highest index. Any bigger\
    \ and we get an error:\n\n```\n>>> word[len(word)]\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nIndexError: string index out\
    \ of range\n>>> word[len(word) - 1]\n'e'\n```\n\nHow can we access the second\
    \ character from the right of a string? This will do it:\n\n```\n>>> word[len(word)\
    \ - 2]\n'r'\n```\n\nBut there's an easier way. Python supports negative indices\
    \ as another option for accessing characters. Index -1 is the rightmost character,\
    \ index -2 is the second character from the right, and so on:\n\n```\n>>> word[-2]\n\
    'r'\n>>> word[-1]\n'e'\n>>> word[-5]\n'p'\n>>> word[-6]\n's'\n>>> word[-7]\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nIndexError:\
    \ string index out of range\n```\n\nThe plan is to use indexing to access corresponding\
    \ positions of yesterday's and today's parking information. We can use index 0\
    \ of each string to access information about the first parking space, index 1\
    \ to access information about the second parking space, and so on. But before\
    \ we can carry out that plan, we need to learn a new kind of for loop.\n\n## CONCEPT\
    \ CHECK\n\nWhat is the output of the following code?\n\n```\ns = 'abcde'\nt =\
    \ s[0] + s[-5] + s[len(s) - 5]\n\nprint(t)\n```\n\n- A. aaa\n- B. aae\n- C. aee\n\
    - D. This code produces an error\n\nAnswer: A. Each of the three indices refers\
    \ to the first character in 'abcde'. First, s[0] refers to 'a' because 'a' is\
    \ at index 0 of the string. Second, s[-5] refers to 'a' because 'a' is the fifth\
    \ character from the right. Third, s[len(s) - 5] refers to 'a' because the index\
    \ evaluates to 0: 5 (the length of the string) minus 5.\n\n## Range for loops\n\
    \nPython's range function generates ranges of integers, and we can use those ranges\
    \ to control for loops. Rather than looping through the characters of a string,\
    \ a range for loop loops through integers. If we provide one argument to range,\
    \ we get a range from 0 to 1 less than that argument:\n\n```\n>>> for num in range(5):\n\
    ...     print(num)\n...\n0\n1\n2\n3\n4\n```\n\nNotice that 5 is not output.\n\n\
    If we provide two arguments to range, we get a sequence from the first argument\
    \ up to but not including the second argument:\n\n```\n>>> for num in range(3,\
    \ 7):\n...     print(num)\n...\n3\n4\n5\n6\n```\n\nWe can count up by a different\
    \ *step size* by including a third argument. The default step size is 1, which\
    \ counts up by one. Let's try a couple of other step sizes:\n\n```\n>>> for num\
    \ in range(0, 10, 2):\n...     print(num)\n...\n0\n2\n4\n6\n8\n>>> for num in\
    \ range(0, 10, 3):\n...     print(num)\n...\n0\n3\n6\n9\n```\n\nWe can count backward,\
    \ too, but *not* like this:\n\n```\n>>> for num in range(6, 2):\n...     print(num)\n\
    ...\n```\n\nThat doesn't work, because by default range counts up. A step size\
    \ of -1 lets us go backward, one at a time:\n\n```\n>>> for num in range(6, 2,\
    \ -1):\n...     print(num)\n...\n6\n5\n4\n3\n```\n\nTo count down from 6 to 0,\
    \ including 0, we need a value of -1 for the second argument:\n\n```\n>>> for\
    \ num in range(6, -1, -1):\n...     print(num)\n...\n6\n5\n4\n3\n2\n1\n0\n```\n\
    \nIt's sometimes helpful to quickly look at the numbers in a range without coding\
    \ a loop. Unfortunately, the range function doesn't directly show us those numbers:\n\
    \n```\n>>> range(3, 7)\nrange(3, 7)\n```\n\nWe can pass that result to the list\
    \ function to get what we want:\n\n```\n>>> list(range(3, 7))\n[3, 4, 5, 6]\n\
    ```\n\nWhen called with a range, the list function produces a list of the range's\
    \ integers. We'll learn all about lists later; for now, keep list in mind as an\
    \ aid to diagnosing errors with ranges.\n\n## CONCEPT CHECK\n\nHow many iterations\
    \ are performed by the following loop?\n\n```\nfor i in range(10, 20):\n    #\
    \ Some code here\n```\n\n- A. 9\n- B. 10\n- C. 11\n- D. 20\n\nAnswer: B. The range\
    \ goes through the numbers 10, 11, 12, 13, 14, 15, 16, 17, 18, and 19. There are\
    \ 10 numbers and hence 10 iterations.\n\n## Range for Loops Through Indices\n\n\
    Suppose we have strings giving yesterday's and today's parking-space information:\n\
    \n```\n>>> yesterday = 'CC.'\n>>> today = '.C.'\n```\n\nGiven an index, we can\
    \ look at yesterday's and today's information for"
  mdcn: "可能学到的很少。相比之下，一个小的测试用例不会让我们的程序做太多事情；如果它做错了，我们也不用费力去寻找问题所在。设计小而有针对性的测试用例并不总是容易的。这是一项可以通过练习来磨练的技能。\n\
    \n提交我们正确的代码给评测系统，然后我们继续前进。\n\n在继续之前，你可能想尝试解决第67页“章节练习”中的练习1和2。\n\n## 问题 #6：被占用的空间\n\
    \n我们知道如何遍历字符串的字符。但有时我们需要知道我们在字符串中的位置，而不仅仅是存储在那里的字符。这个问题就是一个这样的例子。\n\n这是DMOJ问题ccc18j2。\n\
    \n## 挑战\n\n你管理一个有 *n* 个停车位的停车场。昨天，你记录了每个停车位是被汽车占用还是空着。今天，你再次记录了每个停车位是被汽车占用还是空着。指出两天都被占用的停车位数量。\n\
    \n## 输入\n\n输入由三行组成。\n\n- 第一行包含整数 *n*，即停车位的数量。*n* 在1到100之间。\n- 第二行包含一个由 *n* 个字符组成的字符串，表示昨天的信息，每个字符对应一个停车位。C表示被占用的停车位（C代表汽车），.表示空的停车位。例如，CC.表示前两个停车位被占用，第三个是空的。\n\
    - 第三行包含一个由 *n* 个字符组成的字符串，表示今天的信息，格式与第二行相同。\n\n## 输出\n\n输出两天都被占用的停车位数量。\n\n## 一种新型循环\n\
    \n我们最多可能有100个停车位，所以你可能不会惊讶这里会出现循环。我们在解决“三个杯子”问题时学到的那种for循环当然可以遍历停车位信息字符串：\n\n\
    ```\n>>> yesterday = 'CC.'\n>>> for parking_space in yesterday:\n...     print('The\
    \ space is ' + parking_space)\n...\nThe space is C\nThe space is C\nThe space\
    \ is .\n```\n\n这告诉我们昨天每个停车位是否被占用。但我们也需要知道每个停车位今天是否也被占用。\n\n考虑这个测试用例：\n\n```\n\
    3\nCC.\n.C.\n```\n\n第一个停车位昨天被占用。这个停车位两天都被占用吗？要回答这个问题，我们需要查看今天字符串中对应的字符。它是一个.（空的），所以这个停车位两天没有都被占用。\n\
    \n第二个停车位呢？那个停车位昨天也被占用。而且，查看今天字符串的第二个字符，它今天也被占用。所以这*是*一个两天都被占用的停车位。（这是唯一一个这样的停车位；这个测试用例的正确输出是1。）\n\
    \n遍历一个字符串的字符并不能帮助我们找到另一个字符串中对应的字符。但如果我们能跟踪我们在字符串中的位置——我们在第一个停车位，我们在第二个停车位，等等——我们就可以从每个字符串中查找对应的字符。我们目前学到的for循环不是实现这一点的方法。实现这一点的方法是使用索引和一种新型的for循环。\n\
    \n## 索引\n\n字符串中的每个字符都有一个*索引*，表示它的位置。第一个字符在索引0处，第二个字符在索引1处，依此类推。在自然语言中，我们通常从1开始计数。在英语中，没有人会说“*hello*中位置0的字符是*h*”。但大多数编程语言，包括Python，都是从0开始的。\n\
    \n要使用索引，我们在字符串后面加上方括号中的索引。以下是一些索引的示例：\n\n```\n>>> word = 'splore'\n>>> word[0]\n\
    's'\n>>> word[3]\n'o'\n>>> word[5]\n'e'\n```\n\n对于非空字符串，我们可以使用的最高索引是其长度减1。（空字符串没有有效的索引。）例如，'splore'的长度是6，所以索引5是它的最高索引。任何更大的索引都会导致错误：\n\
    \n```\n>>> word[len(word)]\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nIndexError: string index out of range\n>>> word[len(word)\
    \ - 1]\n'e'\n```\n\n我们如何访问字符串中从右数第二个字符？这样做就可以了：\n\n```\n>>> word[len(word) - 2]\n\
    'r'\n```\n\n但有一个更简单的方法。Python支持负索引作为访问字符的另一种选择。索引-1是最右边的字符，索引-2是从右数第二个字符，依此类推：\n\
    \n```\n>>> word[-2]\n'r'\n>>> word[-1]\n'e'\n>>> word[-5]\n'p'\n>>> word[-6]\n\
    's'\n>>> word[-7]\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nIndexError: string index out of range\n```\n\n计划是使用索引来访问昨天和今天停车信息的对应位置。我们可以使用每个字符串的索引0来访问第一个停车位的信息，索引1来访问第二个停车位的信息，依此类推。但在我们能够执行这个计划之前，我们需要学习一种新型的for循环。\n\
    \n## 概念检查\n\n以下代码的输出是什么？\n\n```\ns = 'abcde'\nt = s[0] + s[-5] + s[len(s) - 5]\n\
    \nprint(t)\n```\n\n- A. aaa\n- B. aae\n- C. aee\n- D. 此代码会产生错误\n\n答案：A。这三个索引中的每一个都指向'abcde'中的第一个字符。首先，s[0]指向'a'，因为'a'在字符串的索引0处。其次，s[-5]指向'a'，因为'a'是从右数第五个字符。第三，s[len(s)\
    \ - 5]指向'a'，因为索引计算结果为0：5（字符串的长度）减去5。\n\n## Range for循环\n\nPython的range函数生成整数范围，我们可以使用这些范围来控制for循环。range\
    \ for循环不是遍历字符串的字符，而是遍历整数。如果我们给range提供一个参数，我们会得到一个从0到比该参数小1的范围：\n\n```\n>>> for\
    \ num in range(5):\n...     print(num)\n...\n0\n1\n2\n3\n4\n```\n\n注意，5没有被输出。\n\
    \n如果我们给range提供两个参数，我们会得到一个从第一个参数到但不包括第二个参数的序列：\n\n```\n>>> for num in range(3,\
    \ 7):\n...     print(num)\n...\n3\n4\n5\n6\n```\n\n我们可以通过包含第三个参数来使用不同的*步长*进行计数。默认步长是1，即每次加一。让我们尝试几个其他的步长：\n\
    \n```\n>>> for num in range(0, 10, 2):\n...     print(num)\n...\n0\n2\n4\n6\n\
    8\n>>> for num in range(0, 10, 3):\n...     print(num)\n...\n0\n3\n6\n9\n```\n\
    \n我们也可以倒着计数，但*不能*像这样：\n\n```\n>>> for num in range(6, 2):\n...     print(num)\n\
    ...\n```\n\n这行不通，因为默认情况下range是向上计数的。步长为-1让我们可以一次向后移动一个：\n\n```\n>>> for num in\
    \ range(6, 2, -1):\n...     print(num)\n...\n6\n5\n4\n3\n```\n\n要从6倒数到0，包括0，我们需要第二个参数的值为-1：\n\
    \n```\n>>> for num in range(6, -1, -1):\n...     print(num)\n...\n6\n5\n4\n3\n\
    2\n1\n0\n```\n\n有时快速查看范围中的数字而不编写循环会很有帮助。不幸的是，range函数不会直接显示这些数字：\n\n```\n>>> range(3,\
    \ 7)\nrange(3, 7)\n```\n\n我们可以将该结果传递给list函数以获得我们想要的内容：\n\n```\n>>> list(range(3,\
    \ 7))\n[3, 4, 5, 6]\n```\n\n当使用范围调用时，list函数会生成一个包含该范围整数的列表。我们稍后会全面了解列表；现在，请记住list是诊断范围错误的辅助工具。\n\
