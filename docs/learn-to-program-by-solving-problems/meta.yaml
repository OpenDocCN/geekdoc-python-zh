    # ## REPEATING CODE: INDEFINITE LOOPS


    ![](img/712dd6dddc9c23a969f25d44b233585c_82_0.png)


    The for loops and range for loops that you learned in Chapter 3 are convenient
    for looping through a string or range of indices. But what do we do when we have
    no string or when the indices do not follow a fixed pattern? We use a while loop,
    the topic of this chapter. while loops are more general than for loops and can
    handle situations that a for loop cannot.


    We''ll solve three problems where for loops fall short: determining the number
    of times slot machines can be played, organizing a song playlist until the user
    wants to stop, and decoding an encoded message.


    **Problem #8: Slot Machines** How many times can slot machines be played before
    we run out of money? This is a subtle question that depends not only on our starting
    money but also on the pattern of winnings as we play. We''ll see that we need
    a while loop, not a for loop, for this situation. This is DMOJ problem ccc00s1.'
