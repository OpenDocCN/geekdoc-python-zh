- md: "## Closing Files\n\nIt's good practice to close a file once you're done with\
    \ it. It signals to readers of your code that the file is no longer being used.\n\
    \nClosing files also helps your operating system manage your computer's resources.\
    \ When you use the write method, what you write may not end up in the file immediately.\
    \ Rather, Python or your operating system might wait until it has a bunch of write\
    \ requests and then write them all at once. Closing a file that you wrote to guarantees\
    \ that what you wrote to the file is safely stored in the file.\n\nTo close a\
    \ file, call its close method. Here's an example of opening a file, reading a\
    \ line, and closing it:\n\n```\n>>> input_file = open('word.in', 'r')\n>>> input_file.readline()\n\
    '12 13\\n'\n>>> input_file.close()\n```\n\nOnce you've closed a file, you can\
    \ no longer read from or write to the file:\n\n```\n>>> input_file.readline()\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    ValueError: I/O operation on closed file.\n```\n\n## Solving the Problem\n\nBack\
    \ to Essay Formatting. Now we know how to read from *word.in* and write to *word.out*.\
    \ That takes care of the input and output requirements. It's time to tackle the\
    \ problem itself.\n\nLet's start by exploring a test case to make sure we know\
    \ how to solve this problem. Then we'll see the code.\n\n## Exploring a Test Case\n\
    \nHere's the *word.in* file I've been using:\n\n```\n12 13\nperhaps better poetry\
    \ will be written in the language of digital computers\n```\n\nThere are 12 words,\
    \ and the maximum number of characters on a line (not counting spaces) is 13.\
    \ We should add words to the current line as long as they fit; once a word doesn't\
    \ fit, we'll start a new line with that word.\n\nThe word perhaps contains seven\
    \ characters, so it fits on the first line. The word better contains six characters.\
    \ We can put that on the first line, too; with perhaps already there, we're at\
    \ a total of 13 characters (not including the space between the two words).\n\n\
    The word poetry can't go on the first line, so we start a new line with poetry\
    \ as its first word. The word will fits next to poetry on the second line. Similarly,\
    \ be fits next to will. We're at 12 nonspace characters so far. Now we have the\
    \ word written, and with only one character of room on line 2, we're forced to\
    \ start the next line with written as its first word.\n\nFollowing this process\
    \ to the end, the full essay that we need to write to *word.out* is this:\n\n\
    ```\nperhaps better\npoetry will be\nwritten in the\nlanguage of\ndigital\ncomputers\n\
    ```\n\n## The Code\n\nOur solution is in Listing 7-1.\n\n```\n1 input_file = open('word.in',\
    \ 'r')\n2 output_file = open('word.out', 'w')\n\n3 lst = input_file.readline().split()\n\
    \   n = int(lst[0])  # n not needed\n   k = int(lst[1])\n   words = input_file.readline().split()\n\
    \n4 line = ''\n   chars_on_line = 0\n\n   for word in words:\n       5 if chars_on_line\
    \ + len(word) <= k:\n           line = line + word + ' '\n           chars_on_line\
    \ = chars_on_line + len(word)\n       else:\n           6 output_file.write(line[:-1]\
    \ + '\\n')\n           line = word + ' '\n           chars_on_line = len(word)\n\
    \n7 output_file.write(line[:-1] + '\\n')\n\ninput_file.close()\noutput_file.close()\n\
    ```\n\nListing 7-1: Solving Essay Formatting\n\nTo begin, we open the input file\
    \ ❶ and output file ❷. Notice the modes: we open the input file with mode 'r'\
    \ (for reading) and open the output file with mode 'w' (for writing). We could\
    \ have opened the output file a little later, right before we use it, but I've\
    \ chosen to open both files here to simplify the organization of the program.\
    \ Similarly, we could close a file as soon as we no longer need it, but in this\
    \ book, I've chosen to close all files together at the end of the program. For\
    \ long-running programs that manipulate many files, you likely want to keep files\
    \ open only when needed.\n\nNext, we read the first line of the input file ❸.\
    \ This line contains two space-separated integers: n, the number of words, and\
    \ k, the maximum number of allowed characters (not counting spaces) per line.\
    \ As always with space-separated values, we use split to separate them. We then\
    \ read the second line, which contains the essay words. Again we use split, this\
    \ time to split the string of words into a list of words. That takes care of the\
