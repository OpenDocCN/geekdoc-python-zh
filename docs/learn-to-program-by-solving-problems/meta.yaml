    \ Between Strings and Integers\" in Chapter 1, we learned that strings that look\
    \ like numbers can't be used in numerical calculations. So, we need to convert\
    \ this list of strings to a list of floats. We can convert a string to a float\
    \ using float, like this:\n\n```\n>>> float('45.6')\n45.6\n```\n\nThat's just\
    \ one float. How can we convert a whole list of strings to a list of floats? It's\
