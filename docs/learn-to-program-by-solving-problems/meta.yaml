  md: '# Efficiency of Our Program


    To understand why our program is so slow, it helps to think about the number of
    triples that it must go through. Think back to the test case we just studied,
    which had seven cows. How many triples will our program check? Well, for the first
    cow, there are seven choices: 16, 14, 23, and so on. There are also seven choices
    for the second cow, and seven choices for the third cow. Multiplying these together,
    we see that our program checks $7 * 7 * 7 = 343$ triples.


    What if we had eight cows instead of seven? Then our program would check $8 *
    8 * 8 = 512$ triples.


    We can give an expression for the number of triples that works for any number
    of cows. Let''s use $n$ for the number of cows; it could be 7, 8, 50, 1,000, and
    so on, depending on the test case. Then we can say that the number of triples
    our program checks is $n * n * n$, or $n^3$.


    We can substitute any number of cows for $n$ to determine the number of triples
    that we check. For example, we can verify that the number of triples for seven
    cows is $7^3 = 343$ and that the number of triples for eight cows is $8^3 = 512$.
    These numbers—343 and 512—are tiny. It would take any computer no more than a
    few milliseconds to check those many triples. As a conservative guide, you can
    think of a Python program as being able to check or do about 5,000,000 things
    per second. The time limit for this problem is four seconds per test case, so
    we''ll be able to check about 20,000,000 triples.


    Let''s substitute larger numbers for $n$ and see what happens. For 50 cows, we
    have $50^3 = 125,000$ triples. No big deal: checking 125,000 things is easy for
    today''s computers. For 100 cows, we have $100^3 = 1,000,000$ triples. Again,
    no problem. We can check a million things in less than a second. For 200 cows,
    we have $200^3 = 8,000,000$ triples. We''re still OK for four seconds, but I hope
    you''re starting to get a little worried. The number of triples is shooting up
    pretty quickly here, and we''re only at 200 cows. Remember that we need to be
    able to support up to 1,000 cows.


    For 400 cows, we have $400^3 = 64,000,000$ triples. That''s too many for us to
    process in four seconds. To add insult to injury, let''s try 1,000 cows, the maximum
    we''ll ever get. For 1,000 cows, we have $1,000^3 = 1,000,000,000$ triples. That''s
    one billion. Nope. There''s no way we''re ever going to be able to check that
    many triples in four seconds. We''ll need to make our program more efficient.


    # Sorting First


    Sorting is helpful here. Let''s look at how to use sorting and then discuss the
    efficiency of our resulting solution.


    # The Code


    Our cow positions can come in any order—there''s certainly no guarantee from the
    problem description that they''re sorted. Unfortunately, this leads our program
    to check many triples that have no chance of satisfying the'
