    \ refers to 'A'. On the first iteration of the inner loop, digit refers to 1,\
    \ which explains the A1 output. On the second iteration of the inner loop, digit\
    \ refers to 2, and A2 is output. On the third and final iteration of the inner\
    \ loop, digit refers to 3, and A3 is output.\n\nWe're not done! We've gone through\
    \ only one iteration of the outer loop. On the second iteration of the outer loop,\
    \ letter refers to 'B'. Now the three iterations of the inner loop run again,\
    \ this time with letter referring to 'B'. This accounts for the B1, B2, and B3\
    \ outputs. Finally, on the third iteration of the outer loop, letter refers to\
    \ 'C', and the inner loop produces C1, C2, and C3.\n\n# CONCEPT CHECK\n\nWhat\
    \ is the output of the following code?\n\n```\ntitle = 'The Escape'\ntotal = 0\n\
    \nfor char1 in title:\n    for char2 in title:\n        total = total + 1\n\n\
    print(total)\n```\n\n+   A. 10\nB. 20\nC. 100\nD. This code produces a syntax\
    \ error because two nested loops cannot both use title\n\nAnswer: C. total starts\
    \ off as 0 and is increased by 1 on each iteration of the inner loop. The length\
    \ of 'The Escape' is 10. The outer loop therefore has 10 iterations. For each\
    \ of those iterations, the inner loop has 10 iterations. The inner loop therefore\
    \ has 10*10 = 100 iterations in all."
  - "[PAGE 67]\n\n# Solving the Problem\n\nBack to Three Cups. The structure we need\
    \ is a for loop to go through each swap, and a nested if statement to keep track\
