    \ 0.0 would be a bug!\n\nBut a huge value, one at least as big as every possible\
    \ neighborhood size, *will* work. We just need to make it so huge that the first\
    \ iteration of the loop is guaranteed to find a size that's no bigger, ensuring\
    \ that our fake huge size never gets output."
  mdcn: "想要知道位置4的村庄的邻居吗？只需查看其紧邻的左侧和右侧：1和15。位置15的村庄的邻居呢？看，它们就在那里——4和19。无需再四处寻找。我们将对村庄位置列表进行排序，以简化代码。\n\
    \n我们可以使用`append`方法向列表添加元素，使用`sort`方法对列表进行排序。我们将学习这两个方法，以及你在继续使用列表时可能会发现有用的其他几个方法，然后我们将回来解决“村庄邻居”问题。\n\
    \n## 向列表添加元素\n\n`append`方法向列表*追加*元素，这意味着它将一个值添加到现有值的末尾。以下是`append`向一个初始为空的列表添加三个村庄位置的示例：\n\
    \n```\n>>> positions = []\n>>> positions.append(20)\n>>> positions\n[20]\n>>>\
    \ positions.append(50)\n>>> positions\n[20, 50]\n>>> positions.append(4)\n>>>\
    \ positions\n[20, 50, 4]\n```\n\n注意，我们使用`append`时没有使用赋值语句。`append`方法不返回列表；它修改现有列表。\n\
    \n一个常见的错误是将赋值语句与修改列表的方法一起使用。犯这个错误会导致列表丢失，如下所示：\n\n```\n>>> positions\n[20, 50,\
    \ 4]\n>>> positions = positions.append(19)\n>>> positions\n```\n\n什么都没有了！从技术上讲，`positions`现在引用的是一个`None`值；你可以使用`print`来查看：\n\
    \n```\n>>> print(positions)\nNone\n```\n\n`None`值用于表示没有可用信息。这绝对不是我们想要的——我们想要我们的四个村庄位置！——但我们通过一个错误的赋值语句丢失了列表。\n\
    \n如果你的列表消失了，或者你得到了与`None`值相关的错误消息，请确保你没有将赋值语句与仅仅修改列表的方法一起使用。\n\n`extend`方法与`append`相关。当你想将一个列表（而不是单个值）连接到现有列表的末尾时，可以使用`extend`。这是一个例子：\n\
    \n```\n>>> lst1 = [1, 2, 3]\n>>> lst2 = [4, 5, 6]\n>>> lst1.extend(lst2)\n>>>\
    \ lst1\n[1, 2, 3, 4, 5, 6]\n>>> lst2\n[4, 5, 6]\n```\n\n如果你想在列表末尾以外的位置插入元素，可以使用`insert`方法。它接受一个索引和一个值，并将该值插入到指定索引处：\n\
    \n```\n>>> lst = [10, 20, 30, 40]\n>>> lst.insert(1, 99)\n>>> lst\n[10, 99, 20,\
    \ 30, 40]\n```\n\n## 对列表排序\n\n`sort`方法对列表进行*排序*，将其值按顺序排列。如果我们不带参数调用它，它会按从小到大的顺序排序：\n\
    \n```\n>>> positions = [20, 50, 4, 19, 15, 1]\n>>> positions.sort()\n>>> positions\n\
    [1, 4, 15, 19, 20, 50]\n```\n\n如果我们使用`reverse=True`参数调用它，它会按从大到小的顺序排序：\n\n```\n\
    >>> positions.sort(reverse=True)\n>>> positions\n[50, 20, 19, 15, 4, 1]\n```\n\
    \n我使用的语法`reverse=True`是新的。根据我们到目前为止在书中调用方法和函数的方式，你可能认为单独使用`True`就可以。但不行：`sort`需要完整的`reverse=True`，原因我将在第6章解释。\n\
    \n## 从列表中移除值\n\n`pop`方法按索引移除一个值。如果未提供参数，`pop`会移除并返回最右边的值。\n\n```\n>>> lst = [50,\
    \ 30, 81, 40]\n>>> lst.pop()\n40\n```\n\n我们可以将要移除的值的索引作为参数传递给`pop`。这里，我们移除并返回索引0处的值：\n\
    \n```\n>>> lst.pop(0)\n50\n```\n\n由于`pop`会返回一些东西——不像`append`和`sort`这样的方法——将其返回值赋给一个变量是有意义的：\n\
    \n```\n>>> lst\n[30, 81]\n>>> value = lst.pop()\n>>> value\n81\n>>> lst\n[30]\n\
    ```\n\n`remove`方法按值移除，而不是按索引。将要移除的值传递给它，它会从列表中移除该值最左边的出现。如果该值不存在，`remove`会产生错误。在下面的例子中，列表中有两个50，所以`remove(50)`在产生错误之前可以工作两次：\n\
    \n```\n>>> lst = [50, 30, 81, 40, 50]\n>>> lst.remove(50)\n>>> lst\n[30, 81, 40,\
