    The space is .

    ```


    That tells us whether each space was occupied yesterday. But we also need to know
    whether each space was also occupied today.

    Consider this test case:


    ```

    3

    CC.

    .C.

    ```


    The first parking space was occupied yesterday. Was that parking space occupied
    on both days? To answer that, we need to look at the corresponding character in
    today’s string. It’s a . (empty), so this parking space was not occupied on both
    days.

    What about the second parking space? That one was also occupied yesterday. And,
    looking at the second character of today’s string, it was also occupied today.
    So this *is* a parking space that was occupied on both days. (This is the only
    such parking space; the correct output for this test case is 1.)

    Looping through the characters of one string doesn’t help us find the corresponding
    characters in the other string. But if we could keep track of where we were in
    the string—we’re at the first parking space, we’re at the second parking space,
    and so on—we could look up the corresponding character from each string. The for
    loops we’ve learned so far are not the way to do this. The way to do this is using
    indexing and a new type of for loop.


    # Indexing


    Each character in a string has an *index*, which indicates its location. The first
    character is at index 0, the second character is at index 1, and so on. In natural
    language, we often start counting at 1. In English, no one says “the character
    at position 0 of *hello* is *h*.” But most programming languages, Python included,
    start at 0.

    To use indexing, we follow a string by an index in square brackets. Here are some
    examples of indexing:


    ```

    >>> word = ''splore''

    >>> word[0]

    ''s''

    ```'
