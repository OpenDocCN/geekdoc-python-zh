    \ there are parentheses around each inner value, not square brackets. It turns\
    \ out that this is *not* a list of lists, but a list of *tuples*:\n\n```\n>>>\
    \ type(pairs[0])\n<class 'tuple'>\n```\n\nTuples are similar to lists in that\
    \ they store a sequence of values. The most important difference between tuples\
    \ and lists is that tuples are immutable. You can loop over them, index them,\
    \ and slice them, but you can't modify them. If you try to modify a tuple, you\
    \ get an error:\n\n```\n>>> pairs[0][0] = 'river'\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: 'tuple' object does\
    \ not support item assignment\n```\n\nYou can create your own tuples using parentheses.\
    \ For a tuple with a single value, we need a trailing comma. For a tuple with\
    \ multiple values, we don't:\n\n```\n>>> (4,)\n(4,)\n>>> (4, 5)\n(4, 5)\n>>> (4,\
    \ 5, 6)\n(4, 5, 6)\n```"
  - "[PAGE 238]\n\nTuples have methods—but only a few, because methods that would\
    \ change a tuple are not allowed. I encourage you to learn more about tuples if\
    \ you’re interested, but we won’t use tuples any further in this book.\n\n# Inverting\
    \ a Dictionary\n\nWe’re close to being able to solve Common Words using dictionaries.\
    \ Here’s the plan. We maintain a dictionary that maps from words to their number\
    \ of occurrences. Whenever we process a word, we check whether that word is already\
    \ in the dictionary. If it isn’t, then we add it with a value of 1. If it is,\
    \ then we increase its value by 1.\n\nHere’s an example of adding two words, one\
    \ that we have seen before and one that we haven’t:\n\n```\n>>> d = {'storm':\
    \ 1, 'cut': 1, 'magma': 1}\n>>> word = 'cut'  # 'cut' is already in the dictionary\n\
    >>> if not word in d:\n...     d[word] = 1\n... else:\n...     d[word] = d[word]\
    \ + 1\n...\n>>> d\n{'storm': 1, 'cut': 2, 'magma': 1}\n>>> word = 'brook'  # 'brook'\
    \ is not in the dictionary\n>>> if not word in d:\n...     d[word] = 1\n... else:\n\
    ...     d[word] = d[word] + 1\n...\n>>> d\n{'storm': 1, 'cut': 2, 'magma': 1,\
    \ 'brook': 1}\n```\n\nDictionaries make it easy to go from a key to a value. For\
    \ example, given the key 'brook', we can easily look up the value 1:\n\n```\n\
    >>> d['brook']\n1\n```\n\nReferring to Table 8-1, that’s like going from a word\
    \ in the left column to its number of occurrences in the right column. That doesn’t\
    \ directly tell us the words that have a specified number of occurrences, though.\
    \ What we really need to be able to do is go from the right column to the left,\
    \ from number of occurrences to words. Then we’ll be able to sort the numbers\
    \ of occurrences from most to least to find the words we need.\n\nThat is, we\
    \ need to go from this kind of dictionary:\n\n```\n{'storm': 2, 'cut': 4, 'magma':\
    \ 1, 'brook': 2,\n 'gully': 3, 'cliff': 1, 'blast': 1}\n```"
- md: "## Solving the Problem\n\nIf you'd like more practice with top-down design,\
    \ you might like to solve the problem on your own before continuing. In the interest\
    \ of space, I won't follow the steps of top-down design here. Rather, I'll present\
    \ the solution in its entirety, and then we'll discuss each function and how it\
    \ is used.\n\n## The Code\n\nThe solution is in Listing 8-6.\n\n```python\ndef\
    \ invert_dictionary(d):\n    \"\"\"\n    d is a dictionary mapping strings to\
    \ numbers.\n\n    Return the inverted dictionary of d.\n    \"\"\"\n    inverted\
    \ = {}\n    for key in d:\n        num = d[key]\n        if not num in inverted:\n\
    \            inverted[num] = [key]\n        else:\n            inverted[num].append(key)\n\
    \    return inverted\n```\n\n```python\ndef with_suffix(num):\n    \"\"\"\n  \
    \  num is an integer >= 1.\n\n    Return a string of num with its suffix added;\
    \ e.g. '5th'.\n    \"\"\"\n    s = str(num)\n    if s[-1] == '1' and s[-2:] !=\
    \ '11':\n        return s + 'st'\n    elif s[-1] == '2' and s[-2:] != '12':\n\
    \        return s + 'nd'\n    elif s[-1] == '3' and s[-2:] != '13':\n        return\
    \ s + 'rd'\n    else:\n        return s + 'th'\n```\n\n```python\ndef most_common_words(num_to_words,\
    \ k):\n    \"\"\"\n    num_to_words is a dictionary mapping number of occurrences\
    \ to\n        lists of words.\n    k is an integer >= 1.\n\n    Return a list\
    \ of the kth most-common words in num_to_words.\n    \"\"\"\n    nums = list(num_to_words.keys())\n\
    \    nums.sort(reverse=True)\n\n    total = 0\n    i = 0\n    done = False\n \
    \   while i < len(nums) and not done:\n        num = nums[i]\n        if total\
    \ + len(num_to_words[num]) >= k:\n            done = True\n        else:\n   \
    \         total = total + len(num_to_words[num])\n            i = i + 1\n\n  \
    \  if total == k - 1 and i < len(nums):\n        return num_to_words[nums[i]]\n\
    \    else:\n        return []\n```\n\n```python\nn = int(input())\n\nfor dataset\
    \ in range(n):\n    lst = input().split()\n    m = int(lst[0])\n    k = int(lst[1])\n\
    \n    word_to_num = {}\n\n    for i in range(m):\n        word = input()\n   \
    \     if not word in word_to_num:\n            word_to_num[word] = 1\n       \
    \ else:\n            word_to_num[word] = word_to_num[word] + 1\n\n    num_to_words\
    \ = invert_dictionary(word_to_num)\n\n    ordinal = with_suffix(k)\n    words\
    \ = most_common_words(num_to_words, k)\n\n    print(f'{ordinal} most common word(s):')\n\
    \    for word in words:\n        print(word)\n\n    print()\n```\n\n*Listing 8-6:\
    \ Solving Common Words*\n\nThe first function is `invert_dictionary`. We've already\
    \ discussed that, in \"Inverting a Dictionary\" earlier in this chapter. We'll\
    \ now go through each other piece of the program.\n\n## Adding the Suffix\n\n\
    The `with_suffix` function ❶ takes a number and returns a string with the correct\
    \ suffix added to the number. We need this function because of the pesky requirement\
    \ to output k with a suffix. For example, if k = 1, then we'll have to produce\
    \ this line as part of the output:\n\n```\n1st most common word(s):\n```\n\nIf\
    \ k = 2, we'll have to produce this line as part of the output:\n\n```\n2nd most\
    \ common word(s):\n```\n\nand so on. Our `with_suffix` function makes sure that\
    \ we add the correct suffix to the number. We first convert the number to a string\
    \ ❷ so that we can easily access its digits. Then we use a series of tests to\
    \ determine whether the suffix is st, nd, rd, or th. For example, if the last\
    \ digit is a 1 but the last two digits aren't 11 ❸, then the correct suffix is\
    \ st. That gives us 1st, 21st, and 31st, but not 11st (which would be incorrect).\n\
    \n## Finding the kth Most Common Words\n\nThe `most_common_words` function ❹ is\
    \ the function that actually finds the words that we need. It takes an inverted\
    \ dictionary (which maps numbers of occurrences to lists of words) and an integer\
    \ k and returns a list of the kth most common words.\n\nTo see how it works, let's\
    \ look at a sample inverted dictionary. I've organized its keys in order from\
    \ most occurrences to fewest occurrences, as that's the order that `most_common_words`\
    \ goes through the keys. Here's the dictionary:\n\n```\n{4: ['cut'],\n 3: ['gully'],\n\
    \ 2: ['storm', 'brook'],\n 1: ['magma', 'cliff', 'blast']}\n```\n\nSuppose that\
    \ k is 3. Therefore, exactly two words must be more common than the words that\
    \ we return. The words we need are not provided by the first dictionary key. That\
    \ key gives us only one word (cut), so it can't be the third most common word.\
    \ Similarly, the words we need are not provided by the second dictionary key.\
    \ That key gives us one more word (gully). We've processed a total of two words\
    \ now but haven't found the third most common words yet. The words we need, however,\
    \ *are* provided by the third dictionary key. That key gives us two more words;\
    \ each of these words (storm and brook) has exactly two words with more occurrences,\
    \ so these are the words for when k is 3.\n\nWhat if k were 4? This time, exactly\
    \ three words must be more common than the words that we return. The candidate\
    \ words are still those from the third key (storm and brook), but there are only\
    \ two words that occur more often than each of these words. There are therefore\
    \ *no* words for when k = 4.\n\nIn summary, we need to total up the words we see\
    \ when going through the keys until we find the key that might contain the words\
    \ we need. If exactly k - 1 words occur more often, then we have words for k;\
    \ otherwise, we don't, and there are no words to output.\n\nNow let's walk through\
    \ the code itself. We begin by obtaining a list of the dictionary's keys and sorting\
    \ them from biggest to smallest. We then loop through the keys in that reverse-sorted\
    \ order ❻. The `done` variable tells us whether we've looked at k or more words\
    \ yet. As soon as we have ❼, we exit the loop.\n\nWhen the loop is done, we check\
    \ whether there are any words for k. If there are exactly k - 1 words that occur\
    \ more often, and we haven't gone past the end of our keys ❽, then we indeed have\
    \ words to return. Otherwise, there are no words to return, so we return the empty\
    \ list.\n\n## The Main Program\n\nNow we arrive at the main part of the program\
    \ ❾. We build dictionary `word_to_num`, which maps each word to its number of\
    \ occurrences. We then build the inverted dictionary `num_to_words` ❿, which maps\
    \ each number of occurrences to the associated list of words. Notice how the names\
    \ of these dictionaries convey the direction of mapping: `word_to_num` goes from\
    \ words to numbers, and `num_to_words` goes from numbers to words.\n\nThe rest\
    \ of the code calls our other helper functions and outputs the appropriate words.\n\
    \nWith that, you're ready to submit to the judge. Well done: that's the first\
    \ problem that you've solved with dictionaries. Whenever you need to map between\
    \ two types of values, think about whether you can organize the information using\
    \ a dictionary. If you can, it's likely that you'll be well on your way to an\
    \ efficient solution!"
