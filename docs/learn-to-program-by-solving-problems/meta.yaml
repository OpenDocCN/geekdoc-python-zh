    # Problem #15: Action Figures


    To solve Card Game, we first went through an example, and that example highlighted
    where a function might be useful. Now, we’ll solve another problem using functions,
    but we’ll discover the needed functions using a more systematic approach.

    This is Timus problem 2144. This is the only problem in the book from the Timus
    judge. To find the problem, go to https://acm.timus.ru/, click **Problem set**,
    click **Volume 12**, and find problem 2144 (it’s called Cleaning the Room on the
    judge).


    # The Challenge


    Lena has *n* unopened boxes of action figures. The boxes cannot be opened (otherwise
    the action figures lose their value), so the order of action figures in a box
    cannot be changed. Further, a box cannot be rotated (otherwise the action figures
    will be facing the wrong way).

    Each action figure is specified by its height. For example, one of the boxes might
    have three action figures, from left to right, of heights 4, 5, and 7. When I
    talk about a box of action figures, I’ll always list the heights from left to
    right.

    Lena wants to *organize the boxes*, which means to arrange the boxes so that heights
    of action figures increase or stay the same from left to right.

    Whether she can organize the boxes or not depends on the heights of action figures
    in the boxes. For example, if a first box has action figures of heights 4, 5,
    and 7, and a second box has action figures of heights 1 and 2, then she can organize
    these boxes by putting the second box first. But if we keep the first box as is
    and change the second box to have action figures of heights 6 and 8, then there’s
    no way to organize these boxes.

    Determine whether it’s possible for Lena to organize the boxes.'
  - '[PAGE 167]


    # Input


    The input consists of the following lines:


    +   - A line containing integer $n$, the number of boxes. $n$ is between 1 and
    100.

    - $n$ lines, one for each box. Each of these lines begins with integer $k$, indicating
    the number of action figures in this box. $k$ is between 1 and 100. (Since $k$
    is at least 1, we don''t have to worry about empty boxes.) Following $k$, there
    are $k$ integers giving the heights of the action figures from left to right in
    this box. Each height is an integer between 1 and 10,000. There is a space between
    each pair of integers on the line.


    # Output


    If Lena can organize the boxes, output YES; otherwise, output NO.


    # Representing the Boxes


    This problem consists of several smaller problems, each of which we can solve
    by writing a function. Let''s first see how to represent the boxes in Python,
    and then we''ll design the functions that we need.

    In Chapter 5, when we solved Baker Bonus, we learned that lists can have other
    lists as their values. This allows us to nest lists inside of lists. We can use
    such an arrangement to represent the boxes of action figures. For example, here''s
    a list that represents two boxes:


    ```

    >>> boxes = [[4, 5, 7], [1, 2]]

    ```


    The first box has three action figures, and the second has two. We can access
    each box individually:


    ```

    >>> boxes[0]

    [4, 5, 7]

    >>> boxes[1]

    [1, 2]

    ```


    We''ll read the contents of the boxes from the input and put that information
    into a nested list, like the one I''ve shown. Then we''ll use that nested list
    to determine whether the boxes can be organized.


    # Top-Down Design


    We''ll solve this problem using a program design approach called *top-down design*.
    Top-down design breaks a large problem into several smaller problems. That''s
    useful because each of the smaller problems will be easier to solve. We can then
    assemble those subproblem solutions to solve the original problem.'
