    he adds the letter *p* and that vowel again. For example, rather than write down
    the sentence *i like you*, he would write *ipi lipikepe yopoupu*.

    The teacher acquires Luka''s encoded sentence. Recover Luka''s original sentence
    for the teacher.


    # **Input**


    The input is one line of text, Luka''s encoded sentence. It consists of lowercase
    letters and spaces. There is exactly one space between each pair of words. The
    maximum length of the line is 100 characters.


    # **Output**


    Output Luka''s original sentence.


    # # Another Limitation of for loops


    In Chapter 3, we learned how for loops can be used to process strings. A for loop
    plods through the string, from beginning to end, one character at a time. In many
    cases, that''s precisely what we want. In Three Cups, for example, we needed to
    look at each swap from left to right, so we used a for loop over the string of
    swaps.

    In other cases, that''s too restrictive, and a range for loop may be more appropriate.
    A range for loop gives us access to indices rather than characters. It also allows
    us to skip through a sequence with whatever step size we choose. For example,
    we can use a range for loop to visit every third character of a string:


    ```

    >>> s = ''zephyr''

    >>> for i in range(0, len(s), 3):

    ...     print(s[i])

    ...

    z

    h

    ```


    We can also use a range for loop to process a string from right to left instead
    of left to right:


    ```

    >>> for i in range(len(s) - 1, -1, -1):

    ...     print(s[i])

    ...

    r

    y

    h

    p

    e

    z

    ```'
  - '[PAGE 106]


    All of this assumes that we want to step by a fixed amount on each iteration.


    What if sometimes we want to move one character to the right and other times we
    want to move three characters to the right? That’s not at all far-fetched. In
    fact, if we could do that, then we’d be well on our way to solving Secret Sentence.


    To see why, consider this test case:


    ipi lipikepe yopoupu


    Imagine that we’re reconstructing Luka’s original sentence by copying characters
    to it. The first character in the encoded sentence is the vowel i. This is the
    first character of Luka’s original sentence, too. Based on how Luka encodes sentences,
    we know that the next two characters will be p and i. We don’t want to include
    those in Luka’s original sentence, so we need to skip them. That is, after processing
    index 0, we want to jump to index 3.


    Index 3 is a space character. Since it isn’t a vowel, we copy this character as
    is to Luka’s original sentence and then move to index 4. Index 4 is 1, another
    nonvowel, so we copy that too and move to index 5. Here at index 5 we have another
    vowel; after copying it, we want to jump to index 8.


    What’s the step size here? Sometimes we jump by three, but not always. And sometimes
    we jump by one, but not always. It’s a mix of threes and ones. for loops are not
    designed for this kind of processing.


    With a while loop, we can zip around a string however we please, unencumbered
    by predefined step sizes.


    # while Loops Through Indices


    Writing a while loop that loops through string indices isn’t any different from
    writing any other kind of while loop. We just need to incorporate the string’s
    length. Here’s how we can loop through each character of a string from left to
    right:


    ```

    >>> s = ''zephyr''

    >>> i = 0

    >>> while i < len(s):

    ...     print(''We have '' + s[i])

    ...     i = i + 1

    ...

    We have z

    We have e

    We have p

    We have h

    We have y

    We have r

    ```


    The variable i allows us to access each character of the string. It begins at
    0 and increases by one each time through the loop.'
