    # Representing a Table


    The data for this problem can be visualized as a table. We''ll start with an example
    and then look at how to represent a table as a list.


    # Exploring a Test Case


    If we have *d* days and *f* franchisees, we can lay out the data as a table with
    *d* rows and *f* columns.

    Here''s a sample test case:


    ```

    6 4

    1 13 2 1 1 8

    2 12 10 5 11 4

    39 6 13 52 3 3

    15 8 6 2 7 14

    ```


    The table corresponding to this test case is in Table 5-3.


    Table 5-3: Baker Bonus Table


    | | 0 | 1 | 2 | 3 | 4 | 5 |

    |---|---|---|---|---|---|---|

    | **0** | 1 | 13 | 2 | 1 | 1 | 8 |

    | **1** | 2 | 12 | 10 | 5 | 11 | 4 |

    | **2** | 39 | 6 | 13 | 52 | 3 | 3 |

    | **3** | 15 | 8 | 6 | 2 | 7 | 14 |


    I''ve numbered the rows and columns starting at 0 to coincide with how we''ll
    shortly store this data in a list.

    How many bonuses are awarded in this test case? Let''s first look at the rows
    of the table, which correspond to days. The sum of the sales for row 0 is 1 +
    13 + 2 + 1 + 1 + 8 = 26. As 26 is a multiple of 13, this row gives us 26 / 13
    = 2 bonuses. The sum of row 1 is 44. That''s not a multiple of 13, so no bonuses
    there. The sum of row 2 is 116—again, no bonuses. The sum of row 3 is 52, which
    gives us 52 / 13 = 4 bonuses.

    Now let''s look at the columns, which correspond to franchisees. The sum of column
    0 is 1 + 2 + 39 + 15 = 57. That''s not a multiple of 13, so no bonuses. In fact,
    the only column that gives us any bonuses is column 1. Its sum is 39, giving us
    39 / 13 = 3 bonuses.

    The total number of bonuses awarded is 2 + 4 + 3 = 9. So, 9 is the correct output
    for this test case.'
