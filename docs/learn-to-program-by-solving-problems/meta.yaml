  md: "dent of test case, and independent of a particular implementation. It signals\
    \ why a slow program is slow. It’s easily communicated. It’s called *big O*, and\
    \ it’s coming right up.\n\n# Big O\n\nBig O is a notation that computer scientists\
    \ use to concisely describe the efficiency of algorithms. The key concept here\
    \ is the *efficiency class*, which tells you how fast an algorithm is or, equivalently,\
    \ how much work it does. The faster an algorithm, the less work it does; the slower\
    \ an algorithm, the more work it does. Each algorithm belongs to an efficiency\
    \ class; the efficiency class tells you how much work that algorithm does relative\
    \ to the amount of input that it must process. To understand big O, we need to\
    \ understand these efficiency classes. We’re now going to study seven of the most\
    \ common ones. We’ll see those that do the least amount of work, the ones you’ll\
    \ hope your algorithms fit into. We’ll also see those that do considerably more\
    \ work, the ones whose algorithms will probably give you time limit exceeded errors.\n\
    \n# Constant Time\n\nThe most desirable algorithms are those that don’t do more\
    \ work as the amount of input increases. No matter the problem instance, such\
    \ an algorithm takes about the same number of steps. These are called *constant-time*\
    \ algorithms.\n\nThis is hard to believe, right? An algorithm that does about\
    \ the same amount of work, no matter what? Indeed, solving a problem with such\
    \ an algorithm is rare. But when you can do it, rejoice: you can’t do any better\
    \ than that.\n\nWe’ve managed to solve a few problems in this book using constant-time\
