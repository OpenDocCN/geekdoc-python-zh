    3.9 to PATH** 或 **Add Python to environment variables**；这将使运行 Python 变得更加容易。（如果是在升级
    Python，你可能需要点击“自定义安装”来找到此选项。）


    ### macOS


    macOS 默认不包含 Python 3。要安装它，请访问 https://www.python.org/ 并点击 **Downloads**。这应该会为你提供下载适用于
    macOS 的最新版本 Python 的选项。点击链接下载 Python，然后运行安装程序。


    ### Linux


    Linux 默认包含 Python 3，但可能是一个较旧的 Python 3 版本。安装说明会因你使用的 Linux 发行版而异，但你应该能够使用你喜欢的包管理器安装最新版本的
    Python。


    ## 如何阅读本书


    一口气从头到尾读完本书，很可能让你学到的东西非常有限。这就像试图通过邀请某人到你家弹几个小时钢琴，然后把他们赶走，调暗灯光，独自练习来学习钢琴一样。这不是学习基于实践的技能的方式。


    以下是我对如何阅读本书的建议：


    **分散你的学习时间。** 将练习集中在少数几次进行，远不如将练习分散开效果好。当你感到疲倦时，休息一下。没有人能告诉你每次学习多久才应该休息。也没有人能告诉你读完这本书需要多长时间。这取决于你自己的身心状态。


    **暂停以检验你的理解。** 阅读关于某事的内容可能会给我们一种错觉，认为我们比实际理解得更好。应用所学材料会迫使我们所知道的和我们自以为知道的保持一致。因此，在每章的关键点，我包含了多项选择的“概念检查”问题，要求你做出预测。认真对待这些问题！阅读每个问题，并在不使用电脑查阅任何资料的情况下，承诺给出一个答案。然后，阅读我的答案和解释。这是一个确认你是否走在正确道路上的机会。如果你回答错误，或者回答正确但理由错误，请花时间在继续之前补救你的理解。这可能涉及更多地尝试讨论的相关
    Python 特性，重读书中的材料，或在网上搜索额外的解释和示例。


    **练习编程。** 在阅读时做出预测将有助于巩固你对关键概念的理解。但要成为一名熟练的问题解决者和程序员，你需要的不止这些。你需要练习使用 Python 来解决新问题，这些问题的解决方案你在书中没有读到过。每章末尾都有一系列练习题。请尽可能多地完成这些练习。


    学习编程需要时间。如果你进展缓慢或犯了很多错误，不要气馁。不要被你在网上可能遇到的任何虚张声势的“孔雀”吓倒。让自己周围充满能够帮助你学习的人和资源。


    ## 使用在线评测系统


    我决定围绕 *在线评测系统* 网站上的问题来构建本书。在线评测系统网站提供了一个编程问题库，世界各地的程序员都可以解决这些问题。你提交你的解决方案——你的
    Python 代码——网站会对你的代码运行测试。如果你的代码对每个测试用例都产生了正确的答案，那么你的解决方案很可能是正确的。相反，如果你的代码对一个或多个测试用例产生了错误的答案，那么你的代码就是不正确的，需要修改。


    我认为在线评测系统特别适合学习编程，原因有几个：


    **快速反馈** 在学习编程的早期阶段，快速、有针对性的反馈至关重要。在线评测系统在你提交代码后立即提供反馈。


    **高质量的问题** 我发现在线评测系统上的问题质量很高。许多问题最初来自编程竞赛。其他问题由与在线评测系统相关的个人编写，或者只是想帮助他人学习。有关我们将研究的每个问题的来源，请参阅“问题来源”附录。


    **问题数量** 在线评测系统包含数百个问题。我只为本书选择了一小部分。如果你需要更多练习，相信我：在线评测系统可以提供。


    **社区功能** 在线评测系统允许用户阅读和回复评论。如果你在某个问题上卡住了，可以浏览评论，看看别人留下的提示。如果你仍然卡住，可以考虑发表自己的评论寻求帮助。一旦你成功解决了一个问题，你的学习并没有结束！许多在线评测系统允许你查看其他人提交的代码。深入研究一些这样的提交，看看它们与你的代码相比如何。解决问题的方法总是不止一种。也许你的方式目前对你来说最直观，但向其他可能性敞开大门是迈向编程精通的重要一步。


    ## 创建你的在线评测系统账户


    我们将在本书中使用几个在线评测系统网站。这是因为每个在线评测系统都托管着一些在其他在线评测系统上找不到的问题；我们需要多个在线评测系统来涵盖我选择的所有问题。


    以下是我们将使用的在线评测系统：


    | 评测系统 | 网址 |

    |---|---|

    | DMOJ | https://dmoj.ca/ |

    | Timus | https://acm.timus.ru/ |

    | USACO | http://usaco.org/ |


    每个在线评测系统都要求你在提交代码前创建一个账户。现在让我们开始创建账户的过程，同时了解一下这些评测系统。


    ### DMOJ 评测系统


    DMOJ 评测系统是我们在本书中使用最频繁的评测系统。花时间探索 DMOJ 网站并了解该评测系统提供的内容，比花在任何其他评测系统上都更值得。


    要在 DMOJ 评测系统上创建账户，请访问 https://dmoj.ca/ 并点击 **Sign up**。在出现的注册页面上，输入你的用户名、密码和电子邮件地址。此页面还允许你设置默认编程语言。在本书中，我们将专门使用
    Python 编程语言，因此我建议在此处点击 **Python 3**。点击 **Register!** 创建你的账户。注册后，你可以使用你的用户名和密码登录
    DMOJ。


    本书中的每个问题首先指明可以在哪个评测系统网站上找到该问题，以及你应该使用哪个问题代码来访问它。例如，我们在第 1 章要处理的第一个问题可以在 DMOJ 上找到，问题代码是
    dmopc15c7p2。要在 DMOJ 上找到此问题，请点击 **Problems**，在搜索框中输入 **dmopc15c7p2**，然后点击 **Go**。你应该会看到该问题是唯一的结果。如果你点击问题标题，你应该会看到问题本身。


    当你准备好为某个问题提交 Python 代码时，找到该问题并点击 **Submit solution**。在出现的页面上，将你的 Python 代码粘贴到文本框中，然后点击
    **Submit!**。你的代码将被评判，结果将显示出来。


    ### Timus 评测系统


    要在 Timus 评测系统上创建账户，请访问 https://acm.timus.ru/ 并点击 **Register**。在出现的注册页面上，输入你的姓名、密码、电子邮件地址和其他请求的信息。点击
    **Register** 创建你的账户。然后，检查你的电子邮件，查找来自 Timus 的包含你的评测 ID 的消息。每次提交 Python 代码时，你都需要你的评测
    ID。


    目前无法设置默认编程语言，因此在提交 Python 代码时，请务必选择可用的 Python 3 版本。


    我们只在第 6 章使用一次 Timus 评测系统，因此我在这里不再多说。


    ### USACO 评测系统


    要在 USACO 评测系统上创建账户，请访问 http://usaco.org/ 并点击 **Register for New Account**。在出现的注册页面上，输入你的用户名、电子邮件地址和其他请求的信息。点击
    **Submit** 创建你的账户。然后，检查你的电子邮件，查找来自 USACO 的包含你的密码的消息。一旦你有了密码，你就可以使用你的用户名和密码登录 USACO。'
