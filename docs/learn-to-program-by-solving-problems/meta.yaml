    \ adding a character like * to the beginning of each line that's output so that\
    \ you can see any otherwise blank lines.\n\nAnswer: E. Each piece of code has\
    \ a subtle error.\nCode A outputs only every other line of the file. For example,\
    \ the while loop's Boolean expression causes the first line to be read . . . and\
    \ lost, because it isn't assigned to a variable. The first iteration of the loop\
    \ therefore outputs the second line of the file.\nCode B comes very close to doing\
    \ the right thing. It outputs all the lines of the file, but also outputs an extraneous\
