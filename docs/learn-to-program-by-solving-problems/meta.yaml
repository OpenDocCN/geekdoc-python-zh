    \ in check. There’s no timing concern there, because searching a set is so fast.\n\
    \nIf you submit this solution to the judge, you should pass all of the test cases\
    \ well within the time limit.\n\nAs you’ve seen here, choosing the appropriate\
    \ Python type can mean the difference between an unsatisfactory solution and a\
