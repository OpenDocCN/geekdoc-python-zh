  md: "to this kind, the *inverted dictionary*:\n\n```\n{2: ['storm', 'brook'], 4:\
    \ ['cut'], 1: ['magma', 'cliff', 'blast'],\n3: ['gully']}\n```\n\nThe original\
    \ dictionary maps from strings to numbers. The inverted dictionary maps from numbers\
    \ to strings. Well, not quite: the inverted dictionary maps from numbers to *lists*\
    \ of strings. Remember that each key is allowed only once in a dictionary. In\
    \ the inverted dictionary, we need to map each key to multiple values, so we store\
    \ all of those values in a list.\n\nTo invert a dictionary, each key becomes a\
    \ value, and each value becomes a key. If a key doesn't exist yet in the inverted\
    \ dictionary, we create a list for its value. If a key is already in the inverted\
    \ dictionary, then we add its value to its list.\n\nWe can now write a function\
    \ to return the inverted version of a dictionary. See Listing 8-5 for the code.\n\
    \n```\ndef invert_dictionary(d):\n    \"\"\"\n    d is a dictionary mapping strings\
    \ to numbers.\n\n    Return the inverted dictionary of d.\n    \"\"\"\n    inverted\
    \ = {}\n    for key in d:\n        num = d[key]\n        if not num in inverted:\n\
    \            inverted[num] = [key]\n        else:\n            inverted[num].append(key)\n\
    \    return inverted\n```\n\n*Listing 8-5: Inverting a dictionary*\n\nWe're using\
    \ a for loop over the dictionary d ❶, which gives us each key. We index d to obtain\
    \ the value mapped to by this key ❷. Then we add this key:value pair to the inverted\
    \ dictionary. If num is not yet a key in the inverted dictionary, then we add\
    \ it and make it map to the associated key in d ❸. If num is already a key in\
    \ the inverted dictionary, then its value is already a list. We can therefore\
    \ use append to add the key from d as another value ❹.\n\nEnter the code for our\
    \ invert_dictionary function into the Python shell. Let's give it a try:\n\n```\n\
    >>> d = {'a': 1, 'b': 1, 'c': 1}\n>>> invert_dictionary(d)\n{1: ['a', 'b', 'c']}\n\
    >>> d = {'storm': 2, 'cut': 4, 'magma': 1, 'brook': 2,\n...     'gully': 3, 'cliff':\
    \ 1, 'blast': 1}\n```"
