    \ Here's how the previous example looks with an f-string:\n\n```\n>>> num1 = 7\n\
    >>> num2 = 82\n>>> num3 = 11\n>>> f'We have {num1}, {num2}, and {num3}.'\n'We\
    \ have 7, 82, and 11.'\n```\n\nNotice the f before the opening quote of the string.\
