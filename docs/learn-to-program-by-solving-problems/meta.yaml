    \ 500000)\n```\n\nBoom! Piece of cake.\nPython manages a list in such a way as\
    \ to allow us to use any index at any time. Python has no flexibility to mess\
    \ around with the order of values: the first value has to be at index 0, the second\
    \ at index 1, and so on. But for a set, Python can store it in whatever way it\
