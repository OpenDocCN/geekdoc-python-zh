    \ with the values passed in as arguments to the `__init__()` method. The `say_hello()`\
    \ method uses these instance variables to print out a message.\n\nTo create objects\
    \ from this class and access the instance variables, you would do the following:\n\
    \nCode 10.6 Illustration of class with instance variables\n\n```python\nperson1\
    \ = Person(\"Alice\", 30)\nperson2 = Person(\"Bob\", 25)\nperson1.say_hello()\
    \  # Output: Hello, my name is Alice and I'm 30 years old.\nperson2.say_hello()\
    \  # Output: Hello, my name is Bob and I'm 25 years old.\n```\n\nIn this example,\
    \ `person1` and `person2` are two different instances of the `Person` class, and\
    \ they each have their own set of instance variables `name` and `age`. The `say_hello()`\
    \ method prints out the values of these instance variables for the given object.\n\
    \n## 10.3 Types of Methods\n\nIn Python, there are three types of methods that\
    \ can be defined within a class:\n\n1. **Instance Methods:** These are the most\
    \ common type of methods and are associated with the object of a class. They take\
    \ `self` as the first parameter and are used to modify the object's state or behavior.\n\
    2. **Class Methods:** These methods are associated with the class and can be called\
    \ on the class itself, rather than an instance of the class. They take `cls` as\
    \ the first parameter and are used to modify the class's state or behavior.\n\
    3. **Static Methods:** These methods are not associated with either the class\
    \ or the instance of the class. They take no special parameters (`self` or `cls`)\
    \ and are used for utility functions that do not depend on the class's state or\
    \ behavior.\n\nCode 10.7 Illustration of class method\n\n```python\nclass MyClass:\n\
    \    class_variable = 0\n    def __init__(self, instance_variable):\n        self.instance_variable\
    \ = instance_variable\n        MyClass.class_variable += 1\n    def instance_method(self):\n\
    \        print(f\"This is an instance method. Instance variable: {self.instance_variable}\"\
    )\n    @classmethod\n    def class_method(cls):\n        print(f\"This is a class\
    \ method. Class variable: {cls.class_variable}\")\n    @staticmethod\n    def\
    \ static_method():\n        print(\"This is a static method.\")\n```\n\nIn this\
    \ example, `instance_method` is an instance method, `class_method` is a class\
    \ method, and `static_method` is a static method. `instance_method` takes `self`\
    \ as the first parameter, `class_method` takes `cls` as the first parameter and\
    \ is decorated with `@classmethod`, and `static_method` takes no special parameters\
    \ and is decorated with `@staticmethod`.\n\nCode 10.7 Illustration of call class\
    \ method\n\n```python\nobj = MyClass(\"object\")\nobj.instance_method() # Output:\
    \ This is an instance method. Instance variable: object\nMyClass.class_method()\
    \ # Output: This is a class method. Class variable: 1\nMyClass.static_method()\
    \ # Output: This is a static method.\n```\n\nIn this example, `obj` is an instance\
    \ of the `MyClass` class, and we call the `instance_method` method on it. We also\
    \ call the `class_method` and `static_method` methods on the `MyClass` class itself.\n\
    \n## 10.4 Access Specifiers in Python\n\nIn Python, access specifiers are used\
    \ to restrict access to class attributes and methods from outside the class. There\
    \ are no true access specifiers in Python like in other object-oriented programming\
    \ languages, such as private, protected, and public. However, Python provides\
    \ a convention of using underscores to indicate the intended visibility of a class\
    \ member. Here are the different types of access specifiers in Python:\n\n1. **Public:**\
    \ These are class members that are intended to be accessible from outside the\
    \ class. There are no special syntax rules to define public members. They are\
    \ just defined without any leading underscores.\n2. **Protected:** These are class\
    \ members that are intended to be accessed only within the class and its subclasses.\
    \ In Python, there is no true protected access specifier, but the convention is\
    \ to use a single leading underscore to indicate that a member is intended to\
    \ be protected.\n3. **Private:** These are class members that are intended to\
    \ be accessed only within the class. In Python, there is no true private access\
    \ specifier, but the convention is to use a double leading underscore to indicate\
    \ that a member is intended to be private.\n\nCode 10.8 Illustration of access\
    \ specifiers in python\n\n```python\nclass MyClass:\n    def __init__(self):\n\
    \        self.public_member = \"public\"\n        self._protected_member = \"\
    protected\"\n        self.__private_member = \"private\"\n    def get_private_member(self):\n\
    \        return self.__private_member\n```\n\nIn this example, `public_member`\
    \ is a public member, `_protected_member` is a protected member, and `__private_member`\
    \ is a private member. The `get_private_member` method is used to retrieve the\
    \ value of the private member.\n\nCode 10.9 To access these members from outside\
    \ the class\n\n```python\nobj = MyClass()\nprint(obj.public_member)       # Output:\
    \ public\nprint(obj._protected_member)   # Output: protected\nprint(obj.get_private_member())\
    \ # Output: private\n```\n\nIn this example, `public_member` and `_protected_member`\
    \ can be accessed directly from outside the class, while `__private_member` is\
    \ accessed using the `get_private_member` method. However, it's important to note\
    \ that these are just conventions, and there is nothing stopping a user from accessing\
    \ or modifying these members directly, even if they are intended to be protected\
    \ or private.\n\n## 10.5 Accessing Attributes\n\nIn Python, you can access the\
    \ attributes of an object using dot notation. The syntax is `object_name.attribute_name`.\n\
    \nHere's an example:\n\nCode 10.10 accessing attributes in Python\n\n```python\n\
    class Dog:\n    def __init__(self, name, breed):\n        self.name = name\n \
    \       self.breed = breed\n    def bark(self):\n        print(\"Woof!\")\n\n\
    dog = Dog(\"Rufus\", \"Labrador\")\nprint(dog.name) # Outputs: \"Rufus\"\nprint(dog.breed)\
    \ # Outputs: \"Labrador\"\n```\n\nIn this example, the `Dog` class has two attributes\
    \ `name` and `breed`. We create an instance of the `Dog` class and store it in\
    \ the variable `dog`. To access the attributes of the `dog` object, we use dot\
    \ notation `dog.name` and `dog.breed`. You can also access the attributes of an\
    \ object dynamically using the `getattr` function. The syntax is `getattr(object_name,\
    \ attribute_name)`. For example:\n\nCode 10.11 accessing attributes using getattr\
    \ function\n\n```python\nname = getattr(dog, \"name\")\nbreed = getattr(dog, \"\
    breed\")\nprint(name) # Outputs: \"Rufus\"\nprint(breed) # Outputs: \"Labrador\"\
    \n```\n\nThe `getattr` function takes two arguments: the object and the name of\
    \ the attribute you want to access. If the attribute exists, it returns the value\
    \ of the attribute. If the attribute does not exist, it returns an `AttributeError`.\
    \ You can also provide a default value to be returned in case the attribute does\
    \ not exist, by passing a third argument to `getattr`.\n\n## 10.6 The Class Program\n\
    \nA class program in Python defines a custom data structure that can be used to\
    \ model real-world objects and their behavior. Here is an example of a class program\
    \ in Python:\n\nCode 10.12 A class program in Python\n\n```python\nclass Car:\n\
    \    def __init__(self, make, model, year):\n        self.make = make\n      \
    \  self.model = model\n        self.year = year\n    def honk(self):\n       \
    \ print(\"Beep Beep!\")\n\ncar = Car(\"Toyota\", \"Camry\", 2020)\nprint(car.make)\
    \ # Outputs: \"Toyota\"\nprint(car.model) # Outputs: \"Camry\"\nprint(car.year)\
    \ # Outputs: 2020\ncar.honk() # Outputs: \"Beep Beep!\"\n```"
  mdcn: "## 10.2.2 实例变量\n\n在 Python 中，实例变量是每个类实例（对象）独有的变量。它是在类内部定义的变量，但通常位于方法内部，一般是\
    \ `__init__()` 方法中，该方法在创建新对象时被调用。类的每个实例都有自己的一组实例变量。\n\n实例变量用于存储特定于类每个实例的数据，例如人的姓名或年龄。实例变量通过\
    \ `self` 关键字访问，该关键字指向类的实例。\n\n代码 10.5 包含实例变量的类示例\n\n```python\nclass Person:\n\
    \    def __init__(self, name, age):\n        self.name = name\n        self.age\
    \ = age\n    def say_hello(self):\n        print(f\"Hello, my name is {self.name}\
    \ and I'm {self.age} years old.\")\n```\n\n在此示例中，`name` 和 `age` 是实例变量，它们使用传递给\
    \ `__init__()` 方法的参数值进行初始化。`say_hello()` 方法使用这些实例变量来打印消息。\n\n要从此类创建对象并访问实例变量，你可以执行以下操作：\n\
    \n代码 10.6 包含实例变量的类示例\n\n```python\nperson1 = Person(\"Alice\", 30)\nperson2 =\
    \ Person(\"Bob\", 25)\nperson1.say_hello()  # Output: Hello, my name is Alice\
    \ and I'm 30 years old.\nperson2.say_hello()  # Output: Hello, my name is Bob\
    \ and I'm 25 years old.\n```\n\n在此示例中，`person1` 和 `person2` 是 `Person` 类的两个不同实例，它们各自拥有自己的一组实例变量\
    \ `name` 和 `age`。`say_hello()` 方法为给定对象打印这些实例变量的值。\n\n## 10.3 方法的类型\n\n在 Python\
    \ 中，可以在类内定义三种类型的方法：\n\n1.  **实例方法：** 这是最常见的方法类型，与类的对象相关联。它们以 `self` 作为第一个参数，用于修改对象的状态或行为。\n\
    2.  **类方法：** 这些方法与类相关联，可以在类本身上调用，而不是在类的实例上调用。它们以 `cls` 作为第一个参数，用于修改类的状态或行为。\n\
    3.  **静态方法：** 这些方法与类或类的实例都不相关联。它们不接受特殊参数（`self` 或 `cls`），用于不依赖于类状态或行为的实用函数。\n\n\
    代码 10.7 类方法示例\n\n```python\nclass MyClass:\n    class_variable = 0\n    def __init__(self,\
    \ instance_variable):\n        self.instance_variable = instance_variable\n  \
    \      MyClass.class_variable += 1\n    def instance_method(self):\n        print(f\"\
    This is an instance method. Instance variable: {self.instance_variable}\")\n \
    \   @classmethod\n    def class_method(cls):\n        print(f\"This is an class\
    \ method. Class variable: {cls.class_variable}\")\n    @staticmethod\n    def\
    \ static_method():\n        print(\"This is a static method.\")\n```\n\n在此示例中，`instance_method`\
    \ 是一个实例方法，`class_method` 是一个类方法，`static_method` 是一个静态方法。`instance_method` 以 `self`\
    \ 作为第一个参数，`class_method` 以 `cls` 作为第一个参数并使用 `@classmethod` 装饰器，`static_method`\
    \ 不接受特殊参数并使用 `@staticmethod` 装饰器。\n\n代码 10.7 调用类方法示例\n\n```python\nobj = MyClass(\"\
    object\")\nobj.instance_method() # Output: This is an instance method. Instance\
    \ variable: object\nMyClass.class_method() # Output: This is an class method.\
    \ Class variable: 1\nMyClass.static_method() # Output: This is a static method.\n\
    ```\n\n在此示例中，`obj` 是 `MyClass` 类的一个实例，我们在其上调用 `instance_method` 方法。我们也在 `MyClass`\
    \ 类本身上调用 `class_method` 和 `static_method` 方法。\n\n## 10.4 Python 中的访问说明符\n\n在 Python\
    \ 中，访问说明符用于限制从类外部访问类属性和方法。Python 中没有像其他面向对象编程语言（如私有、受保护和公共）那样的真正访问说明符。但是，Python\
    \ 提供了一种使用下划线来表示类成员预期可见性的约定。以下是 Python 中不同类型的访问说明符：\n\n1.  **公共：** 这些是预期可从类外部访问的类成员。定义公共成员没有特殊的语法规则。它们只是在没有任何前导下划线的情况下定义。\n\
    2.  **受保护：** 这些是预期仅在类及其子类内访问的类成员。在 Python 中，没有真正的受保护访问说明符，但约定是使用单个前导下划线来表示成员预期为受保护。\n\
    3.  **私有：** 这些是预期仅在类内访问的类成员。在 Python 中，没有真正的私有访问说明符，但约定是使用双前导下划线来表示成员预期为私有。\n\n\
    代码 10.8 Python 中访问说明符示例\n\n```python\nclass MyClass:\n    def __init__(self):\n\
    \        self.public_member = \"public\"\n        self._protected_member = \"\
    protected\"\n        self.__private_member = \"private\"\n    def get_private_member(self):\n\
    \        return self.__private_member\n```\n\n在此示例中，`public_member` 是一个公共成员，`_protected_member`\
    \ 是一个受保护成员，`__private_member` 是一个私有成员。`get_private_member` 方法用于检索私有成员的值。\n\n代码\
    \ 10.9 从类外部访问这些成员\n\n```python\nobj = MyClass()\nprint(obj.public_member)    \
    \   # Output: public\nprint(obj._protected_member)   # Output: protected\nprint(obj.get_private_member())\
    \ # Output: private\n```\n\n在此示例中，`public_member` 和 `_protected_member` 可以从类外部直接访问，而\
    \ `__private_member` 则使用 `get_private_member` 方法访问。然而，重要的是要注意这些只是约定，并没有任何东西阻止用户直接访问或修改这些成员，即使它们预期为受保护或私有。\n\
    \n## 10.5 访问属性\n\n在 Python 中，你可以使用点表示法访问对象的属性。语法是 `object_name.attribute_name`。\n\
    \n以下是一个示例：\n\n代码 10.10 在 Python 中访问属性\n\n```python\nclass Dog:\n    def __init__(self,\
    \ name, breed):\n        self.name = name\n        self.breed = breed\n    def\
    \ bark(self):\n        print(\"Woof!\")\n\ndog = Dog(\"Rufus\", \"Labrador\")\n\
    print(dog.name) # Outputs: \"Rufus\"\nprint(dog.breed) # Outputs: \"Labrador\"\
    \n```\n\n在此示例中，`Dog` 类有两个属性 `name` 和 `breed`。我们创建一个 `Dog` 类的实例并将其存储在变量 `dog` 中。要访问\
    \ `dog` 对象的属性，我们使用点表示法 `dog.name` 和 `dog.breed`。你也可以使用 `getattr` 函数动态访问对象的属性。语法是\
    \ `getattr(object_name, attribute_name)`。例如：\n\n代码 10.11 使用 getattr 函数访问属性\n\n\
    ```python\nname = getattr(dog, \"name\")\nbreed = getattr(dog, \"breed\")\nprint(name)\
    \ # Outputs: \"Rufus\"\nprint(breed) # Outputs: \"Labrador\"\n```\n\n`getattr`\
    \ 函数接受两个参数：对象和你要访问的属性的名称。如果属性存在，它返回属性的值。如果属性不存在，它返回一个 `AttributeError`。你也可以通过向\
    \ `getattr` 传递第三个参数来提供在属性不存在时返回的默认值。\n\n## 10.6 类程序\n\nPython 中的类程序定义了一个自定义数据结构，可用于建模现实世界中的对象及其行为。以下是\
    \ Python 中类程序的一个示例：\n\n代码 10.12 Python 中的类程序\n\n```python\nclass Car:\n    def\
    \ __init__(self, make, model, year):\n        self.make = make\n        self.model\
    \ = model\n        self.year = year\n    def honk(self):\n        print(\"Beep\
    \ Beep!\")\n\ncar = Car(\"Toyota\", \"Camry\", 2020)\nprint(car.make) # Outputs:\
    \ \"Toyota\"\nprint(car.model) # Outputs: \"Camry\"\nprint(car.year) # Outputs:\
    \ 2020\ncar.honk() # Outputs: \"Beep Beep!\"\n```"
