    \ assign the raised exception to a variable.\n\n```python\ntry:\n    x = 1 / 0\n\
    except ZeroDivisionError as e:\n    print(\"Cannot divide by zero. Reason: \"\
    , e)\n```\n\nIn this example, the ZeroDivisionError exception is caught and assigned\
    \ to the variable e, which can be used to access the exception's information.\
    \ It's also a good practice to catch the most specific exception first, and then\
