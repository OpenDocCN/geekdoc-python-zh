    single or double quotes.

    3. **Lists:** Lists are ordered sequences of objects, and they are defined using
    square brackets. Lists are mutable, meaning that their elements can be changed.

    4. **Tuples:** Tuples are similar to lists, but they are immutable, meaning that
    their elements cannot be modified once created. Tuples are defined using parentheses.

    5. **Dictionaries:** Dictionaries are unordered collections of key-value pairs,
    and they are defined using curly braces.'
