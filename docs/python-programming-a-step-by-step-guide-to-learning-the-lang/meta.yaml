  mdcn: "## 6.5 Python 用户自定义函数\n\n用户自定义函数是由用户创建和定义的函数，与编程语言或软件系统内置的函数相对。这些函数可用于执行特定任务或操作，并可在整个程序或项目中重复使用。\n\
    \n以下是 Python 中用户自定义函数的一些特性表格：\n\n表 6.2：用户自定义函数的特性\n\n| 特性 | 描述 |\n| :--- | :---\
    \ |\n| 定义 | 用户自定义函数使用 `def` 关键字定义，后跟函数名和一组括号。 |\n| 参数 | 用户自定义函数可以接受零个或多个输入参数，这些参数在括号内指定。\
    \ |\n| 返回值 | 用户自定义函数可以使用 `return` 关键字返回零个或一个值。 |\n| 作用域 | 用户自定义函数有自己的作用域，不会影响全局作用域或其他函数。\
    \ |\n| 可重用性 | 用户自定义函数可以在程序或项目中被多次调用，使代码更具模块化和可重用性。 |\n| 命名 | 用户自定义函数应使用描述其功能的名称。\
    \ |\n\n## 6.5.1 函数定义\n\n函数定义是指创建和指定函数的代码、其名称、输入参数和返回值的过程。在大多数编程语言中，这是通过特定语法完成的，例如\
    \ Python 中的 `def` 关键字。Python 中的用户自定义函数使用 `def` 关键字定义，后跟函数名、一组括号（可包含输入参数）和一个冒号。构成函数操作的代码随后缩进并放置在定义下方。\n\
    \n```\n语法：\ndef function_name(): //函数定义\n    //函数体从这里开始\n```\n\n例如：\n\n```\ndef\
    \ add_numbers(a,b):\n    print(\"welcome!\")\n    return a+b\n```\n\n这样函数体就创建完成了。\n\
    \n## 6.5.2 函数调用\n\n函数调用是调用或执行函数的过程。换句话说，它是告诉程序运行函数内部代码的过程。当函数被定义时，它被创建但未执行。只有在函数被调用时，其代码才会被执行。为了调用函数，你需要使用函数名后跟一组括号，并且在这些括号内，你可以传递任何必需的参数。\n\
    \n要调用函数，我们只需根据函数定义输入函数名，可以带参数也可以不带参数。\n\n```\n语法：\ndef function_name(): //函数定义\n\
    \    //函数体从这里开始\nfunction_name() //调用函数\n```\n\n以下是一个 Python 用户自定义函数的示例，该函数接受两个输入参数\
    \ `a` 和 `b`，并返回它们的和：\n\n### 代码 6.1：一个将两个数字相加的程序\n\n```\ndef add_numbers(a, b):\n\
    \    return a + b\n\nresult = add_numbers(3, 4)\nprint(result) # 输出：7\n```\n\n\
    在这个例子中，函数名为 `add_numbers`，接受两个输入参数 `a` 和 `b`。函数的代码是一行，使用 `+` 运算符计算 `a` 和 `b` 的和，并使用\
    \ `return` 关键字返回结果。当使用参数 3 和 4 调用函数时，返回值为 7。\n\n需要注意的是，同一个函数可以使用不同的参数多次调用，每次都会执行其代码，并根据输入值返回不同的结果。\n\
    \n## 6.5.3 函数参数（形参）的类型\n\n函数参数，也称为形参，是在调用函数时传递给函数的值。这些值随后被函数用于执行其指定的任务。在编程中，可以使用几种类型的函数参数，每种都有其特定的特性和用例。了解不同类型的函数参数可以帮助开发者编写更灵活、更高效的代码。\n\
    \n编程中有几种类型的函数参数（也称为形参）：\n\n1.  **无参数函数：** 无参数函数是指在调用时不需要传递任何输入值的函数。\n2.  **必需参数函数：**\
    \ 必需参数函数是指在调用时需要传递特定输入值的函数。如果未提供这些必需参数，函数将无法运行或会引发错误。\n3.  **任意长度参数函数：** 任意长度参数函数是指可以接受可变数量输入值的函数。这些值可以使用\
    \ `*args` 或 `**kwargs` 表示法传递给函数。\n4.  **基于关键字的参数函数：** 基于关键字的参数函数是指接受通过显式指定参数名称及其值传递的输入值的函数。这允许函数调用具有更大的灵活性和可读性。\n\
    5.  **带默认参数的函数：** 带默认参数的函数是指为某些输入参数分配默认值的函数。如果在调用函数时未提供这些参数的值，则将使用默认值。\n6.  **Python\
    \ 匿名函数：** 匿名函数是指没有名称的函数。它们也称为 lambda 函数，可用于需要函数但不需要命名函数的情况。匿名函数可以使用 Python 中的\
    \ `lambda` 关键字定义。\n\n### 6.5.3.1 无参数函数\n\n无参数函数是指在调用时不需要传递任何输入值的函数。此类函数仍然可以执行有用的操作，例如打印文本、执行计算或返回值。在\
    \ Python 中，无参数函数可以使用 `def` 关键字定义，后跟函数名、一组括号和一个冒号。例如：\n\n**代码 6.2：演示无参数函数。**\n\n\
    ```\ndef greet():\n    print(\"Hello, World!\")\ngreet() # 调用函数\n```\n\n在这个例子中，`greet()`\
    \ 函数使用 `def` 关键字定义，后跟函数名和一组括号。括号内没有定义任何参数，表明该函数不需要任何输入值。该函数在被调用时只是向控制台打印一条问候消息。当使用函数名后跟括号\
    \ `greet()` 调用函数时，函数运行并打印 \"Hello, World!\" 作为输出。这个例子表明，无参数函数仍然可以执行有用的操作，例如打印消息或执行计算。\n\
    \n### 6.5.3.2 必需参数函数\n\n必需参数函数是指在调用时需要传递特定输入值的函数。这些输入值在函数定义中定义为参数，并被函数用于执行其指定的任务。如果未提供这些必需参数，函数将无法运行或会引发错误。在\
    \ Python 中，必需参数函数可以使用 `def` 关键字定义，后跟函数名、一组包含必需参数名称的括号和一个冒号。例如：\n\n**代码 6.3：演示必需参数函数。**\n\
    \n```\ndef greet(name):\n    print(f\"Hello, {name}!\")\ngreet(\"John\") # 使用必需参数调用函数\n\
    ```\n\n在这个例子中，`greet()` 函数使用 `def` 关键字定义，后跟函数名和一组包含一个名为 `name` 的必需参数的括号。此参数用于自定义打印到控制台的问候消息。当使用函数名后跟包含必需参数的括号\
    \ `greet(\"John\")` 调用函数时，函数运行并将问候消息中的 `name` 占位符替换为提供的值 \"John\"，然后打印 \"Hello,\
    \ John!\" 作为输出。\n\n```\nHello, John!\n```\n\n### 6.5.3.3 任意长度参数函数\n\n任意长度参数函数是指可以接受可变数量输入值的函数。这些值可以使用\
    \ `*args` 或 `**kwargs` 表示法传递给函数。在 Python 中，`*args` 允许函数接受任意数量的位置参数，而 `**kwargs`\
    \ 允许函数接受任意数量的关键字参数。以下是 Python 中任意长度参数函数的一个示例：\n\n**代码 6.4：演示任意长度参数函数。**"
