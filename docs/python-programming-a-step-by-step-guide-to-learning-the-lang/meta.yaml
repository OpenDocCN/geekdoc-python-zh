- md: '190 Python Programming: A Step-by-Step Guide to Learning the Language


    When you are done working with a file, it is important to close it using the file.close()
    method to free up system resources.


    It’s important to note that, python have other library like pandas and numpy that
    have their own file read and write functionality. They are more powerful and flexible
    than the built-in python file methods


    You can use it like this:


    ```

    import pandas as pd

    df = pd.read_csv(''file.csv'')

    df.to_csv(''newfile.csv'', index=False)

    ```


    ## 9.4 tell() and seek() Methods


    The tell() method in Python returns the current position of the file pointer.
    This is an integer value that represents the number of bytes from the beginning
    of the file.


    The seek() method in Python allows you to move the file pointer to a specific
    position. You can specify the position as an integer value, measured in bytes
    from the beginning of the file. The method takes two arguments: the first argument
    is the position to move the pointer to, and the second argument is an optional
    value that specifies how to interpret the first argument.


    For example, the following code opens a file, reads the current position, moves
    the pointer to a new position, and then reads the new position:


    ```

    f = open("example.txt", "r")

    print(f.tell()) # prints 0

    f.seek(5)

    print(f.tell()) # prints 5

    f.close()

    ```


    It’s important to note that after moving the pointer, it’s possible to read or
    write the file from the new position.


    ## 9.5 Renaming and Deleting Files


    In Python, you can rename and delete files using the os module. To rename a file,
    you can use the os.rename() function, which takes the current file name and the
    new file name as its arguments. For example:


    ```

    import os

    os.rename("current_file.txt", "new_file.txt")

    ```


    To delete a file, you can use the os.remove() function, which takes the file name
    as its argument. For example:


    ```

    import os

    os.remove("file_to_delete.txt")

    ```


    It''s also worth noting that there is also shutil module which also have similar
    functionality such as shutil.move(src, dst) and shutil.rmtree(path, ignore_errors=False,
    onerror=None) which can be useful in some cases.


    ### 9.5.1 Rename() Method


    The rename() method in python is used to rename a file or directory. It is a method
    of the os module and takes two arguments: the current name of the file or directory
    and the new name. For example, to rename a file "old_file.txt" to "new_file.txt",
    you would use the following code:


    ```

    import os

    os.rename("old_file.txt", "new_file.txt")

    ```


    It also can be used with os.path.join() method to rename files in a specific directory.


    ```

    import os

    os.rename(os.path.join(directory, ''old_file.txt''), os.path.join(directory, ''new_file.txt''))

    ```


    Note that this method will raise a FileNotFoundError if the file or directory
    you are trying to rename does not exist, or a PermissionError if you do not have
    permission to rename the file or directory.


    ### 9.5.2 Remove() Method


    The remove() method in Python is a built-in method for lists that can be used
    to remove an item from a list. The method takes a single argument, which is the
    item to be removed from the list. If the item is not present in the list, the
    method raises a ValueError exception.


    **Syntax : list.remove(item)**


    For example:


    ```

    numbers = [1, 2, 3, 4, 5]

    numbers.remove(3)

    print(numbers) # Output: [1, 2, 4, 5]

    ```


    In this example, the remove() method is used to remove the value 3 from the list
    numbers. After the method is called, the list contains the values 1, 2, 4, and
    5, and the value 3 is no longer present in the list.


    ## 9.6 Directories in Python


    In Python, a directory is a file system folder that contains other files or directories.
    Python provides several built-in modules, such as os and os.path, that make it
    easy to interact with the file system and manipulate directories. The os module
    provides a way to interact with the underlying operating system, including creating,
    moving, and deleting files and directories. The os.path module provides additional
    functionality for working with file and directory paths, such as checking whether
    a path is a file or a directory, and joining multiple paths together.


    With the os and os.path modules, you can perform various operations on directories
    in Python such as:


    - Creating new directories

    - Changing the current working directory

    - Listing the contents of a directory

    - Removing a directory

    - Renaming a directory

    - Checking if a directory exists


    These modules are a powerful tool for automating common file and directory tasks,
    and for creating scripts that manipulate the file system in various ways.


    ### 9.6.1 mkdir() Method


    The os.mkdir() method in Python is a function that creates a new directory with
    the specified name. It takes one argument, which is the name of the directory
    to be created.


    **Syntax :** os.mkdir(path, mode = 0o777, *, dir_fd = None)


    The path parameter is required, and it specifies the name of the directory to
    be created. The mode parameter is an optional argument that specifies the permissions
    mode for the new directory, and the default value is 0o777. The dir_fd parameter
    is used to specify a file descriptor for the parent directory. For example:


    ```

    import os

    os.mkdir("new_directory")

    ```


    This example creates a new directory called “new_directory” in the current working
    directory. If the directory already exists, os.mkdir() will raise a FileExistsError
    exception.


    It’s important to note that the os.mkdir() method creates only one new directory
    at a time, If you need to create multiple directories at once you can use os.makedirs()
    method.


    ### 9.6.2 chdir() Method


    The os.chdir() method in Python is a function that changes the current working
    directory. It takes one argument, which is the path to the new directory.


    Syntax : os.chdir(path)


    The path parameter is required, and it specifies the path to the new directory.
    The method changes the current working directory to the specified path. For example:


    ```

    import os

    os.chdir("/new_directory")

    ```


    This example changes the current working directory to “/new_directory”


    It’s important to note that the os.chdir() method only change the current working
    directory for the process that calls it. It does not affect the current working
    directory of other processes or of the terminal where the script is run. Also,
    if the specified directory does not exist, the os.chdir() method will raise a
    FileNotFoundError exception.


    ### 9.6.3 getcwd() Method


    getcwd() is a method in the os module in Python that stands for “Get Current Working
    Directory”. It returns a string representing the current working directory (i.e.,
    the directory in which the Python process is running). Example usage:


    ```

    import os

    current_dir = os.getcwd()

    print(current_dir)

    ```


    ### 9.6.4 rmdir() Method


    rmdir() is a method in the os module in Python that stands for “Remove Directory”.
    It is used to remove an empty directory. If the directory is not empty, the method
    will raise an error. Example usage:


    ```

    import os

    os.rmdir("path/to/directory")

    ```


    Note: The directory to be removed must be empty, otherwise, a FileNotFoundError
    or OSError will be raised.


    ### 9.6.5 listdir() Method


    listdir() is a method in the os module in Python that returns a list of filenames
    in the specified directory. If no directory is specified, it defaults to the current
    working directory. Example usage:


    ```

    import os

    files_and_dirs = os.listdir("path/to/directory")

    print(files_and_dirs)

    ```


    The resulting list includes both files and directories, so to list only the files
    or only the directories, you can use additional filtering logic on the list returned
    by listdir().


    ## 9.7 Python Directory Methods


    In Python, the os module provides a number of methods for working with directories.
    Here are some of the most commonly used methods:


    Table 9.3 : Directory Methods in Python


    | Method | Description |

    |---|---|

    | os.mkdir(path) | Creates a new directory at the specified path. |

    | os.rmdir(path) | Removes the directory at the specified path (the directory
    must be empty). |'
