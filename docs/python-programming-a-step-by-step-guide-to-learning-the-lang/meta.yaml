    # 6.6.1 Characteristics of Lambda Form


    A lambda form, also known as a lambda function, is a way to create small, anonymous
    functions in Python. These functions are defined using the “lambda” keyword, followed
    by a list of arguments, a colon, and the function’s expression. Here is an example
    of a simple lambda form that takes in one argument (x) and returns its square:


    ```

    square = lambda x: x*x

    ```


    The main characteristics of lambda forms are:


    +   1. **Anonymous:** Lambda forms do not have a name, and they cannot be referenced
    by name.

    2. **Small:** Lambda forms are usually only one line of code, and they are typically
    used for simple operations.

    3. **Function objects:** Lambda forms can be used wherever a function object is
    required, such as being passed as an argument to another function.

    4. **Assignable:** Lambda forms can be assigned to a variable, allowing them to
    be passed as an argument or returned from a function.

    5. **Functional programming:** Lambda forms can be used with the map(), filter()
    and reduce() functions for functional programming.

    6. **Single expression:** Lambda forms are limited to a single expression, unlike
    regular functions which can have multiple statements.

    7. **No return statement:** Lambda forms do not have a return statement, and whatever
    is after the colon is returned.


    Please note that, while lambda forms are useful in certain cases, they should
    be used with caution. They can make code harder to read and understand, especially
    if they are used extensively or in complex ways.


