  md: "# 4.2.8 Nested Loops\n\nIt is possible to have loops inside of other loops\
    \ in Python, known as nested loops. The inner loop will be executed completely\
    \ for each iteration of the outer loop. Here is an example of a nested loop in\
    \ Python:\n\nCode 4.16 Illustration of nested loop\n\n```\nfor i in range(1, 4):\n\
    \    for j in range(1, 4):\n        print(i, j)\n```\n\nThis code will print the\
    \ following:\n\n```\n1 1\n1 2\n1 3\n2 1\n2 2\n2 3\n3 1\n3 2\n3 3\n```\n\nThe inner\
    \ loop (the for loop with the variable j) will be executed completely for each\
    \ iteration of the outer loop (the for loop with the variable i).\n\nIt is also\
    \ possible to use a break statement inside a nested loop to exit both the inner\
    \ loop and the outer loop, or a continue statement to skip the remainder of the\
    \ current iteration of the inner loop and move on to the next one\n\n```\nfor\
    \ i in range(1, 4):\n    for j in range(1, 4):\n        if j == 2:\n         \
    \   break\n        print(i, j)\n```"
