    \ computing and data analysis. Additionally, Python provides support for complex\
    \ numbers, which can be manipulated using arithmetic operators, making it a powerful\
    \ tool for advanced mathematical and scientific calculations.\n\nTable 3.1: Arithmetic\
    \ Operators\n\n| Operator | Symbol | Description |\n| :--- | :--- | :--- |\n|\
    \ Addition | + | Adds two values |\n| Subtraction | - | Subtracts one value from\
    \ another |\n| Multiplication | * | Multiplies two values |\n| Division | / |\
    \ Divides one value by another (returns a float) |\n| Floor Division | // | Divides\
    \ one value by another and rounds down to the nearest integer |\n| Modulus | %\
    \ | Returns the remainder of a division operation |\n| Exponent | ** | Raises\
    \ a value to a power |\n\n### Code 3.1 Illustration of arithmetic operators\n\n\
    ```\na = 5\nb = 2\nprint(a + b)    # 7\nprint(a - b)    # 3\nprint(a * b)    #\
    \ 10\nprint(a / b)    # 2.5\nprint(a // b)   # 2\nprint(a % b)    # 1\nprint(a\
    \ ** b)   # 25\n```\n\nLet's see another examples:\n\n### Code 3.2 Illustration\
    \ of arithmetic operators\n\n```\n# Addition\nx = 3 + 4\nprint(x)  # Output: 7\n\
    \n# Subtraction\nx = 3 - 4\nprint(x)  # Output: -1\n\n# Multiplication\nx = 3\
    \ * 4\nprint(x)  # Output: 12\n\n# Division\nx = 3 / 4\nprint(x)  # Output: 0.75\n\
    \n# Modulus\nx = 7 % 3\nprint(x)  # Output: 1\n\n# Exponentiation\nx = 3 ** 4\n\
    print(x)  # Output: 81\n\n# Floor division\nx = 7 // 3\nprint(x)  # Output: 2\n\
    ```\n\nIt’s also important to note that Python follows the order of operations\
    \ (PEMDAS) when evaluating arithmetic expressions.\n\nPEMDAS stands for Parentheses,\
