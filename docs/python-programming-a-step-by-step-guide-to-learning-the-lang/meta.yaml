  md: "# 10.3 Types of Methods\n\nIn Python, there are three types of methods that\
    \ can be defined within a class:\n\n+   1. **Instance Methods:** These are the\
    \ most common type of methods and are associated with the object of a class. They\
    \ take self as the first parameter and are used to modify the object's state or\
    \ behavior.\n2. **Class Methods:** These methods are associated with the class\
    \ and can be called on the class itself, rather than an instance of the class.\
    \ They take cls as the first parameter and are used to modify the class's state\
    \ or behavior.\n3. **Static Methods:** These methods are not associated with either\
    \ the class or the instance of the class. They take no special parameters (self\
    \ or cls) and are used for utility functions that do not depend on the class's\
    \ state or behavior.\n\n**Code 10.7 Illustration of class method**\n\n```\nclass\
    \ MyClass:\n    class_variable = 0\n    def __init__(self, instance_variable):\n\
    \        self.instance_variable = instance_variable\n        MyClass.class_variable\
    \ += 1\n    def instance_method(self):\n        print(f\"This is an instance method.\
    \ Instance variable: {self.instance_variable}\")\n    @classmethod\n    def class_method(cls):\n\
    \        print(f\"This is a class method. Class variable: {cls.class_variable}\"\
    )\n    @staticmethod\n    def static_method():\n        print(\"This is a static\
    \ method.\")\n```\n\nIn this example, instance_method is an instance method, class_method\
    \ is a class method, and static_method is a static method. instance_method takes\
    \ self as the first parameter, class_method takes cls as the first parameter and\
    \ is decorated with @classmethod, and static_method takes no special parameters\
    \ and is decorated with @staticmethod."
