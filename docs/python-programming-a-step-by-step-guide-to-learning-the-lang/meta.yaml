    # 6.8.2 Disadvantages of Recursion


    Recursion is a programming technique where a function calls itself in order to
    solve a problem. This technique is used to solve problems that can be broken down
    into smaller, similar problems. In Python, recursion is implemented using function
    calls.


    Disadvantages of recursion in python are:


    +   1. It can be more difficult to understand and debug compared to iterative
    solutions.

    2. It can consume a large amount of memory due to the call stack.

    3. The risk of stack overflow error if the recursion goes too deep.

    4. It can be less efficient as compared to iterative solution due to the overhead
    of function calls.

    5. Recursive solutions may be less readable and harder to maintain than their
    iterative counterparts.

    6. A problem that can be solved using a loop may use unnecessary additional function
    calls with recursion.

    7. Recursive solutions may not always be the best choice for solving a problem
    and may result in slower performance.


    # 6.9 Scope and Lifetime of Variables


    In Python, a variable’s scope refers to the portion of the program where the variable
    can be accessed. The lifetime of a variable refers to the period of time that
    a variable exists and retains its value.


    There are two types of scope in Python:


    +   1. **Local scope:** A variable defined within a function or a block of code
    has a local scope and can only be accessed within that function or block.

    2. **Global scope:** A variable defined outside of any function or block has a
    global scope and can be accessed throughout the entire program.'
