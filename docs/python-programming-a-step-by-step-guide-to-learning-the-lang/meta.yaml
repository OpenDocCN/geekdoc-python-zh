    \ Python provides a comprehensive set of tools for developing complex algorithms,\
    \ applications, and data analysis processes.\n\n## 3.1 Operator\n\nOperators in\
    \ Python are special symbols that perform specific operations on one, two or more\
    \ operands (values) and produce a result. Operators can be classified into different\
    \ categories such as arithmetic, comparison, logical, bitwise, assignment and\
