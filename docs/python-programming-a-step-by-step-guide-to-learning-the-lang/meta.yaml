  md: "# 8.3 Exception Handling\n\nBefore we understand the exception handling let\
    \ we shed some light on what Exception is.\n\n**When a** python program terminates\
    \ as soon as it encounters an error. In Python, an error can be a syntax error\
    \ or an exception. Hence, the exceptions should be properly handled so that an\
    \ abrupt termination of the program is prevented.\n\n**Exception handling** in\
    \ Python is a mechanism for handling errors and exceptional conditions in your\
    \ code. It allows you to write code that can gracefully handle unexpected conditions,\
    \ such as a missing file or a network connection error, without causing the entire\
    \ program to crash. In Python, exceptions are raised when something unexpected\
    \ or exceptional occurs in the program, such as a divide-by-zero error or an attempt\
    \ to access a non-existent element in a list. When an exception is raised, the\
    \ normal flow of control in the program is interrupted, and the program looks\
    \ for a piece of code that can handle the exception.\n\nProcess of Exception Handling\
    \ involves following important terms:\n\n+   - **try** : try block used to keep\
    \ the block of code that may raise e\n- **except** : to handle the exception after\
    \ catching it.\n- **else** : it runs when no exception exist\n- **finally** :\
    \ finally block will always execute no matter what\n\nTo handle exceptions in\
    \ Python, you use the try and except statements. The try block contains the code\
    \ that may raise an exception, and the except block contains the code that will\
    \ be executed if an exception is raised. For example:\n\n**Code 8.1: Illustrate\
    \ the use of try and except.**\n\n```\ntry:\n    x = 1 / 0\nexcept ZeroDivisionError:\n\
    \    print(\"Cannot divide by zero.\")\n```\n\nIn this example, the try block\
    \ contains a division operation that may raise a ZeroDivisionError exception,\
    \ and the except block contains a message that will be printed if the exception\
    \ is raised."
