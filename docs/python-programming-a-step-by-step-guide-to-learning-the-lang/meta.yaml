- md: "## 12.3 Overloading Bitwise Operators\n\nIn Python, you can overload the bitwise\
    \ operators such as &, |, ^, ~, <<, and >> by defining special methods in your\
    \ class. The special methods for bitwise operations are __and__, __or__, __xor__,\
    \ __invert__, __lshift__, and __rshift__, respectively.\n\nHere’s an example of\
    \ how you might overload the bitwise operators for a custom class called “BitwiseOps”:\n\
    \n### Code 12.3 Overloading Bitwise operator in Python\n\n```python\nclass BitwiseOps:\n\
    \    def __init__(self, value):\n        self.value = value\n    def __and__(self,\
    \ other):\n        return self.value & other.value\n    def __or__(self, other):\n\
    \        return self.value | other.value\n    def __xor__(self, other):\n    \
    \    return self.value ^ other.value\n    def __invert__(self):\n        return\
    \ ~self.value\n    def __lshift__(self, shift):\n        return self.value <<\
    \ shift\n    def __rshift__(self, shift):\n        return self.value >> shift\n\
    ```\n\n```python\nb1 = BitwiseOps(5)\nb2 = BitwiseOps(3)\nprint(b1 & b2)\nprint(b1\
    \ | b2)\nprint(b1 ^ b2)\nprint(~b1)\nprint(b1 << 2)\nprint(b1 >> 1)\n```\n\nIn\
    \ this example, the BitwiseOps class overloads the bitwise operators. Instances\
    \ of the BitwiseOps class are created and the bitwise operations are applied to\
    \ those instances. The results of the operations are printed.\n\n## 12.4 Overloading\
    \ Relational Operators\n\nIn Python, you can overload relational operators such\
    \ as ‘<’, ‘>’, ‘<=’, ‘>=’ and ‘==’ using special methods called “lt”, “gt”, “le”,\
    \ “ge” and “eq” respectively.\n\nThese methods allow you to define custom comparison\
    \ behavior for your classes, allowing you to compare objects based on specific\
    \ attributes or conditions.\n\nTo overload a relational operator, you simply need\
    \ to define the corresponding special method in your class and implement the desired\
    \ comparison behavior. Here’s an example program that demonstrates how to overload\
    \ the ‘<’ operator in Python:\n\n### Code 12.4 Illustration of overloading ‘<’\
    \ operator in Python\n\n```python\nclass Rectangle:\n    def __init__(self, width,\
    \ height):\n        self.width = width\n        self.height = height\n    def\
    \ area(self):\n        return self.width * self.height\n    def __lt__(self, other):\n\
    \        return self.area() < other.area()\n```\n\n```python\n# Create two rectangles\n\
    rect1 = Rectangle(4, 5)\nrect2 = Rectangle(3, 6)\n# Compare the rectangles using\
    \ the '<' operator\nif rect1 < rect2:\n    print(\"Rectangle 1 has a smaller area\
    \ than Rectangle 2\")\nelse:\n    print(\"Rectangle 1 has a larger area than Rectangle\
    \ 2\")\n```\n\nIn this program, we define a class Rectangle with attributes width\
    \ and height, and methods area and __lt__. The area method calculates the area\
    \ of the rectangle by multiplying the width and height. The __lt__ method overloads\
    \ the '<' operator and compares the areas of two rectangles.\n\nWe then create\
    \ two instances of the Rectangle class and use the '<' operator to compare them.\
    \ The output of the program will depend on the dimensions of the rectangles we\
    \ create. If rect1 has a smaller area than rect2, the program will print \"Rectangle\
    \ 1 has a smaller area than Rectangle 2\", otherwise it will print \"Rectangle\
    \ 1 has a larger area than Rectangle 2\".\n\n## 12.5 Summary\n\nIn Python, we\
    \ can customize the behavior of operators for our own classes by overloading them\
    \ with special methods. We can overload various operators such as the addition\
    \ and subtraction operators, bitwise operators, and relational operators. To overload\
    \ the addition operator '+', we use the special method \"add\", and for the subtraction\
    \ operator '-', we use the \"sub\" method. For the bitwise operators '&', '|',\
    \ '^', and '~', we can overload them with the \"and\", \"or\", \"xor\", and \"\
    invert\" methods respectively. We can also overload the relational operators such\
    \ as '<', '>', '<=', '>=', and '==' by defining the \"lt\", \"gt\", \"le\", \"\
    ge\", and \"eq\" methods respectively. By overloading operators, we can define\
    \ custom behavior for our classes that can simplify the code and make it more\
    \ intuitive to use.\n\n## Review Questions\n\n1. What is operator overloading\
    \ in Python?\n2. How can we overload the addition operator '+' in Python?\n3.\
