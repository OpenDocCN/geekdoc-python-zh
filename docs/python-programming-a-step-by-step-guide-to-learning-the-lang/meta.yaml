    \ |\n| IndexError | 当序列中找不到索引时引发。 |\n| KeyError | 当字典中找不到键时引发。 |\n| NameError\
    \ | 当在局部或全局命名空间中找不到变量时引发。 |\n| TypeError | 当操作或函数应用于不适当类型的对象时引发。 |\n| ValueError\
    \ | 当内置操作或函数接收到类型正确但值不适当的参数时引发。 |\n| ZeroDivisionError | 当除法或取模运算的第二个操作数为零时引发。\
    \ |\n\n## 8.3 异常处理\n\n在我们理解异常处理之前，让我们先阐明什么是异常。\n\n当 Python 程序遇到错误时会立即终止。在 Python\
    \ 中，错误可以是语法错误或异常。因此，必须正确处理异常，以防止程序突然终止。\n\nPython 中的异常处理是一种处理代码中错误和异常情况的机制。它允许你编写能够优雅处理意外情况（如文件缺失或网络连接错误）的代码，而不会导致整个程序崩溃。在\
    \ Python 中，当程序中发生意外或异常情况时（例如除以零错误或尝试访问列表中不存在的元素），会引发异常。当异常被引发时，程序的正常控制流被中断，程序会寻找能够处理该异常的代码段。\n\
    \n异常处理过程涉及以下重要术语：\n\n- **try**：`try` 块用于放置可能引发异常的代码块。\n- **except**：用于在捕获异常后处理它。\n\
    - **else**：当没有异常发生时运行。\n- **finally**：`finally` 块无论发生什么都会执行。\n\n要在 Python 中处理异常，你需要使用\
    \ `try` 和 `except` 语句。`try` 块包含可能引发异常的代码，而 `except` 块包含如果引发异常将执行的代码。例如：\n\n**代码\
    \ 8.1：演示 `try` 和 `except` 的使用。**\n\n```python\ntry:\n    x = 1 / 0\nexcept ZeroDivisionError:\n\
    \    print(\"Cannot divide by zero.\")\n```\n\n在这个例子中，`try` 块包含一个可能引发 `ZeroDivisionError`\
    \ 异常的除法操作，而 `except` 块包含如果引发异常将打印的消息。\n\n你也可以使用 `finally` 块，它包含无论是否引发异常都会执行的代码。以及\
    \ `else` 块，它将在 `try` 块中没有引发异常时执行。也可以使用 `raise` 语句来引发异常。\n\n```python\nif x < 0:\n\
    \    raise ValueError(\"x should be positive.\")\n```\n\n### 8.3.1 Try、Except、Else\
    \ 和 Finally\n\n在 Python 中，`try`、`except` 和 `finally` 语句用于异常处理。**try** 块包含可能引发异常的代码。如果引发异常，程序的正常控制流被中断，程序会寻找能够处理该异常的\
    \ `except` 块。**except** 块包含如果在相应的 `try` 块中引发异常将执行的代码。它可以处理特定的异常，例如：\n\n```python\n\
    try:\n    x = 1 / 0\nexcept ZeroDivisionError:\n    print(\"Cannot divide by zero.\"\
    )\n```\n\n你也可以通过使用多个 `except` 块来处理多个异常。如果异常类型与任何 `except` 块都不匹配，它将保持未处理状态，程序将终止。例如：\n\
    \n```python\ntry:\n    x = 10\n    y = 0\n    print(x / y)\nexcept TypeError:\n\
    \    print('Unsupported operation')\nexcept ZeroDivisionError:\n    print('Cannot\
    \ divide by zero')\n```\n\n**结果：**\n\nCannot divide by zero\n\n**else 块**包含当 `try`\
    \ 块中没有异常时将执行的代码。如果异常发生在 `try` 块内部，则执行 `except` 块；否则，如果 `try` 块被确认没有异常，则处理 `else`\
    \ 块。\n\n**代码 8.2：演示 `try`、`except` 和 `else` 的使用。**\n\n```python\ntry:\n    x =\
    \ 20\n    y = 10\n    z = x / y\n    print(z)\nexcept ZeroDivisionError:\n   \
    \ print('Cannot divide by zero')\nelse:\n    print('The result of division of\
    \ x and y is', z)\n```\n\n**输出：**\n\n2.0\n\nThe result of division of x and y\
    \ is 2.0\n\n**finally 块**包含无论是否引发异常都会执行的代码。此块中的代码保证会被执行，即使 `try` 块中引发了异常或没有引发异常。\n\
    \n**代码 8.3：演示 `finally` 关键字使用的程序。**\n\n```python\ntry:\n    x = 1 / 0\nexcept\
    \ ZeroDivisionError:\n    print(\"Cannot divide by zero.\")\nfinally:\n    print(\"\
    This block will always be executed.\")\n```\n\n它通常用于释放资源，如文件句柄、网络连接等。"
