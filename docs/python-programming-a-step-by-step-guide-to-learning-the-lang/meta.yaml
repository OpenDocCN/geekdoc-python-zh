- md: '## 5.5.4 Removing or Deleting Elements of a Dictionary


    In Python, you can remove or delete elements from a dictionary using the following
    methods:


    - 1. **The del keyword:** You can use the del keyword to remove a specific key-value
    pair from a dictionary. For example:


    ```python

    del my_dict["name"]

    print(my_dict) # Output: {"age": 25, "gender": "male"}

    ```


    This will remove the key-value pair with the key "name" from the dictionary "my_dict".


    - 2. **The pop() method:** The pop() method removes a specific key-value pair
    from a dictionary and returns its value. If the key is not found in the dictionary,
    it raises a KeyError exception. For example:


    ```python

    value = my_dict.pop("age")

    print(value) # Output: 25

    print(my_dict) # Output: {"gender": "male"}

    ```


    - 3. **The popitem() method:** The popitem() method removes and returns an arbitrary
    key-value pair from a dictionary. If the dictionary is empty, it raises a KeyError
    exception. For example:


    ```python

    item = my_dict.popitem()

    print(item) # Output: ("gender", "male")

    print(my_dict) # Output: {}

    ```


    - 4. **The clear() method:** The clear() method removes all key-value pairs from
    a dictionary. For example:


    ```python

    my_dict.clear()

    print(my_dict) # Output: {}

    ```


    ## 5.5.5 Python Dictionary Methods


    Python''s built-in dictionary data type provides several methods that can be used
    to manipulate dictionaries. Here are some of the most commonly used dictionary
    methods:


    | Method | Description |

    |---|---|

    | dict.clear() | Removes all items from the dictionary. |

    | dict.copy() | Returns a shallow copy of the dictionary. |

    | dict.fromkeys(seq[, value]) | Returns a new dictionary with keys from the given
    sequence and all values set to the given value (defaults to None). |

    | dict.get(key[, default]) | Returns the value for key if key is in the dictionary,
    else default. If default is not given, it defaults to None, so that this method
    never raises a KeyError. |

    | dict.items() | Returns a view object that displays a list of dictionary''s (key,
    value) tuple pairs. |

    | dict.keys() | Returns a view object that displays a list of all the keys in
    the dictionary. |

    | dict.pop(key[, default]) | Removes and returns the value for key if key is in
    the dictionary, else default. If default is not given and key is not in the dictionary,
    a KeyError is raised. |

    | dict.popitem() | Remove and return an arbitrary (key, value) item pair from
    the dictionary. If the dictionary is empty, calling popitem() raises a KeyError.
    |

    | dict.setdefault(key[, default]) | If the key is in the dictionary, return its
    value. If not, insert a key with a value of default and return default. default
    defaults to None. |

