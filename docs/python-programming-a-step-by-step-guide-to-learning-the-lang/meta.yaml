    \n## 8.1 异常\n\n在 Python 中，异常是在程序执行期间发生的事件，它会中断指令的正常流程。异常通常由程序中的错误引起，例如除以零、访问超出范围的索引或找不到文件。当异常发生时，程序将停止运行，并创建一个包含错误信息的异常对象。它允许程序处理异常并采取适当的措施，例如显示错误消息或尝试从错误中恢复。Python\
    \ 解释器有一组可以引发的内置异常，用户也可以定义自己的异常类。\n\n## 8.2 Python 内置异常\n\nPython 有一组内置异常，当程序执行期间发生某些错误时会被引发。这些异常定义在内置的\
    \ `exceptions` 模块中，并派生自基类 `BaseException`。\n\n以下是 Python 中一些常见内置异常的列表：\n\n表 8.1：Python\
