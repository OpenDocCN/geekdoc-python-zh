    - Garbage Collection


    Object-Oriented Programming (OOP) is a programming methodology that revolves around
    the concept of objects, which are instances of classes. In Python, you can use
    OOP to create classes that encapsulate data and behavior. A class defines the
    attributes and methods that objects of that class will have. Attributes are the
    data or properties of an object, while methods are the functions or behaviors
    that the object can perform.


    To create a class in Python, you use the “class” keyword, followed by the name
    of the class and a colon. Within the class, you define attributes and methods
    using instance variables and instance methods. Instance variables are variables
    that are specific to each object of the class, while instance methods are methods
    that can be called on each object of the class.'
