    \n**输出：**\n\n```\nx is a positive number\n```\n\n在这个例子中，变量x首先被赋值为10。然后程序检查x的值是否小于0。由于不是，程序继续检查下一个elif语句，检查x是否等于0。由于不是，程序继续执行最后的else语句，并执行其中的代码，即打印“x\
