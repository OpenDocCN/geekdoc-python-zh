  md: 'In Python, you can also use inheritance to create subclasses that inherit attributes
    and methods from a parent class. This allows you to reuse code and create hierarchies
    of classes that share common behavior. OOP in Python can be used to create complex
    programs and libraries, as well as to model real-world objects and systems.


    # Object-Oriented Programming Methodologies:


    +   - **Class:** A blueprint or template for creating objects that share similar
    attributes and behaviors.

    - **Object:** An instance of a class that has its own set of attributes and methods.

    - **Inheritance:** A way to create new classes based on existing classes, inheriting
    their attributes and methods.

    - **Polymorphism:** The ability of objects to take on different forms or behave
    in different ways depending on the context.

    - **Encapsulation:** The practice of hiding the internal details of an object
    and exposing only the necessary information through methods.

    - **Abstraction:** The process of reducing complexity by hiding unnecessary details,
    allowing you to focus on the essential features of an object or system.


    Classes and objects are the fundamental building blocks of object-oriented programming
    (OOP) in Python.


    A class is a blueprint or template for creating objects, which can contain data
    (attributes) and code (methods) that act on that data. Classes provide a way to
    structure the data and behavior of similar objects, making it easier to create
    and manage those objects.


    An object is an instance of a class, created at runtime, with its own set of attributes
    and methods. Objects are used to model real-world entities and their behavior,
    making it easier to represent and manipulate complex data and logic in a program.


    In Python, you can define a class using the class keyword, followed by the name
    of the class, and then the class definition inside a code block. You can define
    the attributes and methods of a class, and when you create an object from a class,
    it will inherit all of the attributes and methods defined in that class.'
