    # 2.8 Multiple Assignment


    Multiple assignment allows you to assign multiple variables at the same time in
    one line of code. This feature often seems simple after you’ve learned about it,
    but it can be tricky to recall multiple assignment when you need it most. In this
    we’ll see what multiple assignment is, we’ll take a look at common uses of multiple
    assignment, and then we’ll look at a few uses for multiple assignment that are
    often overlooked.


    Python’s multiple assignment looks like this:


    ```

    >>> x, y = 10, 20

    ```


    Here we’re setting x to 10 and y to 20.

    What’s happening at a lower level is that we’re creating a tuple of 10, 20 and
    then looping over that tuple and taking each of the two items we get from looping
    and assigning them to x and y in order.

    This syntax might make that a bit more clear:


    ```

    >>> (x, y) = (10, 20)

    ```


    Parenthesis are optional around tuples in Python and they’re also optional in
    multiple assignment (which uses a tuple-like syntax). All of these are equivalent:'
