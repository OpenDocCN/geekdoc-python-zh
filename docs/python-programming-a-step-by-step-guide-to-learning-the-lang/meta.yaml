    \ a tuple of exception types.\n\n```python\ntry:\n    x = int(\"hello\")\nexcept\
    \ (ValueError, TypeError):\n    print(\"Invalid input.\")\n```\n\nIn this example,\
    \ the try block contains a conversion operation that may raise a ValueError or\
