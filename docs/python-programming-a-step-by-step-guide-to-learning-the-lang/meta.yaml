  md: "# 4.3.2 Python Continue Statement\n\nIn Python, the continue statement is used\
    \ to skip the current iteration of a loop and move on to the next iteration. It\
    \ is used to interrupt the normal flow of a loop and return control to the beginning\
    \ of the loop, allowing the next iteration to begin.\n\nHere is an example of\
    \ how to use the continue statement in a for loop:\n\n# Code 4.18 Illustration\
    \ of continue statement\n\n```\nfor i in range(10):\n    if i % 2 == 0:\n    \
    \    continue\n    print(i)\n```\n\nThe output of this code will be:\n\n```\n\
    1\n3\n5\n7\n9\n```\n\nThe continue statement is encountered when it is even, causing\
    \ the current iteration to be skipped and control to be returned to the beginning\
    \ of the loop. As a result, only the odd numbers from 1 to 9 are printed.\n\n\
    The continue statement can also be used in a while loop. In this case, it would\
    \ cause the loop to skip the rest of the current iteration and move on to the\
    \ next iteration, just as it does in a for loop.\n\n```\ni = 0\nwhile i < 10:\n\
    \    i += 1\n    if i % 2 == 0:\n        continue\n    print(i)\n```\n\nThis code\
    \ will have the same output as the for loop example above."
