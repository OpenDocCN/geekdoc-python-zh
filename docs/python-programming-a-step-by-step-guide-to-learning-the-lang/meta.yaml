    ## 5.2.5 列表函数


    下表总结了 Python 中一些常用的列表函数：


    表 5.6：函数列表


    | 函数 | 描述 | 返回值 |

    |---|---|---|

    | len(list) | 返回列表中元素的数量 | 列表的长度 |

