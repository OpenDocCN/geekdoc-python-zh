    ## 7.7 Search Path of Module


    In Python, when you import a module, the interpreter searches for it in a list
    of directories called the “module search path.” The search path is stored in the
    sys.path variable, which is a list of strings. By default, the search path includes
    the directory containing the script being run, as well as several standard library
    directories and the site-packages directory of the current Python installation.


    You can see the current module search path by importing the sys module and printing
    the value of sys.path. For example:


    Code: 7.5: Illustrate the concept of search path by importing the sys module.


    ```python

    import sys

    print(sys.path)

    ```


    You can also add new directories to the module search path by modifying the sys.path
    variable. For example, to add a directory called my_modules to the search path,
    you would use the following command:


    ```python

    import sys

    sys.path.append("my_modules")

    ```


    This would allow you to import modules from the my_modules directory as if they
    were part of the standard library. It''s also worth noting that you can use PYTHONPATH
    environment variable to specify additional directories to be searched for modules.


    It''s important to keep in mind that modifying the module search path can make
    your code less portable, as the modules you import may not be available on other
    systems or in other environments.


    ## 7.8 Module Reloading


    In Python, when you import a module, the interpreter caches the module''s code
    in memory. This means that if you make changes to the module''s code and then
    re-import it, the changes will not be reflected in your script unless you explicitly
    reload the module. You can reload a module using the importlib.reload() function,
    which is part of the importlib module. This function takes a single argument,
    which is the module you want to reload. For example, to reload the math module,
    you would use the following command:


    Code: 7.6: Illustrate the concept of reloading a module in python.


    ```python

    import importlib

    importlib.reload(math)

    ```


    It''s important to note that reload() function only available in python3.4 and
    above. In python 2, you can use reload() function from imp module.


    ```python

    from imp import reload

    reload(math)

    ```


    It''s worth noting that reloading a module can cause problems if the module''s
    code has changed in such a way that it is no longer compatible with the code that
    is using it. It''s always a good idea to test your code thoroughly after reloading
    a module to make sure that everything is still working as expected.


    Additionally, it''s not necessary to reload a module when you are developing and
    testing your code. Python interpreter automatically reloads the module when you
    run the code again.


