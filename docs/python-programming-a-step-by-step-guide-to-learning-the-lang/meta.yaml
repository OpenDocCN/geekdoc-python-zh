    Age cannot be greater than 150.\")\n    else:\n        print(\"Age is valid.\"\
    )\n\ntry:\n    validate_age(-5)\nexcept InvalidAgeError as e:\n    print(e)\n\
    ```\n\nIn this example, we define a function validate_age that raises an InvalidAgeError\
