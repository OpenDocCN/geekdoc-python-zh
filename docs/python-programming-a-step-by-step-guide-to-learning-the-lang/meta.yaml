    # 1.1 Programming Language


    A programming language is a formal language used to instruct a computer to perform
    a specific task or set of tasks. It provides a set of rules and syntax for creating
    and manipulating code, allowing developers to write programs and applications
    that can run on a computer.


    Programming languages can be classified into different types based on their purpose
    and structure. Some common types of programming languages include:


    +   1. **Procedural languages:** These languages use a series of steps to solve
    a problem or accomplish a task. Examples include C, Fortran, and Pascal.

    2. **Object-oriented languages:** These languages model the problem as a set of
    objects that interact with each other to accomplish a task. Examples include Java,
    Python, and C++.

    3. **Functional languages:** These languages focus on the evaluation of expressions
    and functions, treating them as mathematical equations. Examples include Haskell,
    Lisp, and ML.

    4. **Scripting languages:** These languages are used to automate tasks, such as
    web development, and are often interpreted rather than compiled. Examples include
    JavaScript, PHP, and Python.


    There are many programming languages in use today, each with its own strengths
    and weaknesses, and new languages are continually being developed to meet the
    evolving needs of the technology industry.


    Some of the most common programming languages used today include:


    +   1. **Java:** Java is an object-oriented programming language that is widely
    used for developing enterprise-level applications, mobile applications, and web
    applications.

    2. **Python:** Python is a high-level programming language that is popular for
    its readability, ease of use, and versatility. It is commonly used for web development,
    data analysis, and artificial intelligence.

    3. **JavaScript:** JavaScript is a scripting language that is used for developing
    web applications and interactive front-end interfaces.

    4. **C#:** C# is an object-oriented programming language that is commonly used
    for developing Windows desktop applications, video games, and web applications.'
