    ## 2.10 数据类型转换


    数据类型转换，也称为类型转换，是将值从一种数据类型转换为另一种数据类型的过程。例如，将整数转换为字符串，或将字符串转换为浮点数。在大多数编程语言中，可以使用内置函数或方法来完成此操作，例如
    `int()`、`float()`、`str()` 等。需要注意的是，在类型转换过程中可能会发生精度或数据的潜在丢失，尤其是在不同数值类型之间转换时。在许多编程语言中，都有内置函数或方法可用于将值从一种数据类型转换为另一种数据类型。这些函数通常以其转换到的数据类型命名，并将要转换的值作为输入。


    例如，在 Python 中，`int()` 函数可用于将值转换为整数。如果该值是字符串，则它必须包含一个可以解析为整数的数字。否则，它将引发 `ValueError`。类似地，`float()`
    函数可用于将值转换为浮点数，`str()` 函数可用于将值转换为字符串。


    以下是在 Python 中进行数据类型转换的一些示例：


    ```

    x = "123"

    y = int(x) # y 现在是 123，一个整数

    z = 3.14

    a = int(z) # a 现在是 3，一个整数

    b = "3.14"

    c = float(b) # c 现在是 3.14，一个浮点数

    ```


    需要注意的是，在类型转换过程中可能会发生精度或数据的潜在丢失，尤其是在不同数值类型之间转换时。例如，当将一个大整数转换为浮点数时，小数点后的位数可能会丢失，导致原始值的近似值。


    Python 中有两种类型的类型转换方法：


    - 隐式类型转换

    - 显式类型转换。


    ## 2.10.1 Python 中的隐式类型转换


    在 Python 中，数据类型转换也可以隐式地进行，而无需使用内置函数或方法。隐式数据类型转换，也称为“类型强制转换”，发生在一种数据类型的值用于与另一种不同数据类型的值进行操作或表达式时。Python
    会自动将其中一个值转换为适当的数据类型以允许操作继续进行。


