    \ (Relational) operators\n- Logical operators\n- Boolean operators\n- Assignment\
    \ operators\n- Bitwise operators\n- Membership operators\n- Identity operators\n\
    \n### 3.1.1 Arithmetic Operators\n\nArithmetic Operators are the basic mathematical\
    \ operators in Python used to perform arithmetic operations such as addition,\
    \ subtraction, multiplication, division, and others. These operators are represented\
    \ by symbols such as +, -, *, /, %, and **. They are used to perform mathematical\
    \ operations on numbers and produce a single output value. For example, addition\
    \ (+) operator is used to add two values, subtraction (-) operator is used to\
    \ subtract two values, and so on. With these operators, you can perform various\
