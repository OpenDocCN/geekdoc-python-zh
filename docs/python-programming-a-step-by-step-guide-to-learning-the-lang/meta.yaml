    # 5.3 Python Tuples


    In Python, a tuple is a collection of ordered, immutable elements. Tuples are
    defined using parentheses, with elements separated by commas. For example, a tuple
    containing the integers 1, 2, and 3 would be written as (1, 2, 3). Tuples can
    contain elements of different types, such as integers, strings, and other objects.
    Because tuples are immutable, their elements cannot be modified once they are
    created. However, elements within a tuple can be accessed by their index, just
    like a list. Tuples are often used to store related pieces of data, such as a
    name and an age.'
