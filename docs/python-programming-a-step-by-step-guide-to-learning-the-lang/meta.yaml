    ### Highlights

    - Python native data types

    - Number

    - List, Tuple, Set, Dictionary

    - Strings


    In Python, there are several built-in data types that can be used to store and
    manipulate data. These native data types include:


    1. **Numbers:** Python has two main number types, integers, and floating-point
    numbers. Integers are whole numbers, while floating-point numbers are numbers
    with decimal points.

    2. **Strings:** Strings are sequences of characters, and they can be defined using
    single or double quotes.

    3. **Lists:** Lists are ordered sequences of objects, and they are defined using
    square brackets. Lists are mutable, meaning that their elements can be changed.

    4. **Tuples:** Tuples are similar to lists, but they are immutable, meaning that
    their elements cannot be modified once created. Tuples are defined using parentheses.

    5. **Dictionaries:** Dictionaries are unordered collections of key-value pairs,
    and they are defined using curly braces.

    6. **Sets:** Sets are unordered collections of unique elements, and they are defined
    using curly braces.

    7. **Booleans:** Booleans are used to represent the values True and False.


    In addition to these native data types, Python also has several additional data
    types available in its standard library, such as arrays and collections.


    ## 5.1 Numbers


    In Python, there are several types of numbers that you can use in your code. These
    include:


    1. **int** (short for “integer”): These are whole numbers, such as 1, 2, 3, 4,
    etc. They can be positive, negative, or zero.

    2. **float** (short for “floating point”): These are numbers with a decimal point,
    such as 3.14, 2.71828, etc. They can also be positive, negative, or zero.

    3. **complex**: These are complex numbers, which are numbers with both a real
    and imaginary component. The real component is a float and the imaginary component
    is a float multiplied by the imaginary unit j. For example, the complex number
    3 + 2j has a real component of 3 and an imaginary component of 2.


    In addition to these basic number types, Python also has a few additional types
    that are used for representing numbers in specific contexts. For example, the
    decimal module provides support for arbitrary-precision decimal arithmetic, and
    the fractions module provides support for rational number arithmetic.


    You can perform various operations on numbers in Python, such as addition, subtraction,
    multiplication, division, etc. For example:


    ```python

    x = 3  # x is an int

    y = 2.5  # y is a float

    z = x + y  # z is a float

    ```


    You can also use the built-in abs() function to get the absolute value of a number,
    the pow() function to raise a number to a power, and the round() function to round
    a number to a specified number of decimal places.


    ### 5.1.1 Number Type Conversion


    In Python, you can convert one number type to another using the built-in functions
    int(), float(), and complex(). For example, you can convert an int to a float
    like this:


    ```python

    x = 3

    y = float(x)  # y is now a float with the value 3.0

    ```


    You can also convert a float to an int by using the int() function, but keep in
    mind that this will truncate the decimal part of the float. For example:


    ```python

    x = 3.7

    y = int(x)  # y is now an int with the value 3

    ```


    You can convert a number to a complex type by using the complex() function. You
    can pass in two arguments to the function, the real part, and the imaginary part,
    separated by a + or - sign. For example:


    ```python

    x = 3

    y = 4

    z = complex(x, y)  # z is now a complex number with the value 3+4j

    ```


    It''s also possible to convert a string representation of a number to a number
    type using the int(), float(), and complex() functions. For example:


    ```python

    x = "3.14"

    y = float(x)  # y is now a float with the value 3.14

    ```


    ### 5.1.2 Python Mathematical Functions


    There are many built-in mathematical functions in Python that are included in
    the math module. Here is a table of some of the most commonly used ones:


    **Table 5.1: Mathematical Functions**


    | Function | Description |

    |---|---|

    | math.ceil(x) | Returns the smallest integer greater than or equal to x |

    | math.floor(x) | Returns the largest integer less than or equal to x |

    | math.exp(x) | Returns e raised to the power of x |

    | math.log(x, base) | Returns the logarithm of x to the specified base (default
    is e) |

    | math.log2(x) | Returns the base-2 logarithm of x |

    | math.log10(x) | Returns the base-10 logarithm of x |

    | math.pow(x, y) | Returns x raised to the power of y |

    | math.sqrt(x) | Returns the square root of x |

    | math.acos(x), math.asin(x), math.atan(x) | Returns the arc cosine, arc sine,
    arc tangent of x, respectively. |

    | math.cos(x), math.sin(x), math.tan(x) | Returns the cosine, sine, tangent of
    x, respectively. |

    | math.degrees(x) | Converts an angle from radians to degrees |

    | math.radians(x) | Converts an angle from degrees to radians |


    Please note that some of the trigonometric functions math.acos, math.asin, math.atan,
    math.cos, math.sin, math.tan expect input angle in radian and the functions that
    converts degrees to radian and vice-versa math.degrees(x), math.radians(x) are
    also provided.


    There are many mathematical functions available in Python, some of which are built-in
    to the language, while others are part of the standard library, and still others
    are available through external libraries. Here’s in table 5.1 is the example program
    that demonstrates some of the common built-in and standard library mathematical
    functions in Python:


    ### Code 5.1 Illustration of mathematical functions


    ```python

    import math


    # Built-in functions

    print(abs(-5)) # Absolute value

    print(pow(2, 3)) # Raise to a power

    print(round(3.14159)) # Round to nearest integer


    # math library functions

    print(math.ceil(3.14159)) # Round up to nearest integer

    print(math.floor(3.14159)) # Round down to nearest integer

    print(math.sqrt(16)) # Square root

    print(math.log10(100)) # Base-10 logarithm

    print(math.sin(math.pi / 2)) # Sine of a value (in radians)

    ```


    This program starts by importing the math library, which provides additional mathematical
    functions not included in the built-in functions. The program then demonstrates
    some of the built-in functions, such as abs(), which returns the absolute value
    of a number, pow(), which raises a number to a power, and round(), which rounds
    a number to the nearest integer. The program then demonstrates some of the functions
    available in the math library, such as ceil(), which rounds a number up to the
    nearest integer, floor(), which rounds a number down to the nearest integer, sqrt(),
    which returns the square root of a number, log10() which returns base-10 logarithm
    of number and sin() which returns the sine of a value (in radians).


    Please note that this example is quite basic and Python offers a lot more mathematical
    functions with additional libraries like NumPy, SciPy and SymPy etc. These libraries
    provide additional functionality such as linear algebra, optimization, signal
    processing, etc.


    ### 5.1.3 Python Trigonometric Functions


    Python provides several trigonometric functions that can be used to perform mathematical
    operations on angles. These functions are defined in the math module and include:


    **Table 5.2: Trigonometric Functions**


    | Function | Description |

    |---|---|

    | math.sin(x) | Returns the sine of x radians. |

    | math.cos(x) | Returns the cosine of x radians. |

    | math.tan(x) | Returns the tangent of x radians. |

    | math.asin(x) | Returns the arc sine of x, in radians. |

    | math.acos(x) | Returns the arc cosine of x, in radians. |

    | math.atan(x) | Returns the arc tangent of x, in radians. |

    | math.atan2(y, x) | Returns the arc tangent of y/x, in radians. |

    | math.sinh(x) | Returns the hyperbolic sine of x. |

    | math.cosh(x) | Returns the hyperbolic cosine of x. |

    | math.tanh(x) | Returns the hyperbolic tangent of x. |

    | math.asinh(x) | Returns the inverse hyperbolic sine of x. |

    | math.acosh(x) | Returns the inverse hyperbolic cosine of x. |

    | math.atanh(x) | Returns the inverse hyperbolic tangent of x. |


    Here is an example of how you can use these functions in a Python script to compute
    the sine, cosine, and tangent of 30 degrees:'
  mdcn: '# 5 Python 原生数据类型


    ### 重点内容

    - Python 原生数据类型

    - 数字

    - 列表、元组、集合、字典

    - 字符串


    在 Python 中，有几种内置的数据类型可用于存储和操作数据。这些原生数据类型包括：


    1.  **数字：** Python 有两种主要的数字类型：整数和浮点数。整数是完整的数字，而浮点数是带有小数点的数字。

    2.  **字符串：** 字符串是字符的序列，可以使用单引号或双引号来定义。

    3.  **列表：** 列表是对象的有序序列，使用方括号定义。列表是可变的，这意味着它们的元素可以被更改。

    4.  **元组：** 元组与列表类似，但它们是不可变的，这意味着一旦创建，它们的元素就不能被修改。元组使用圆括号定义。

    5.  **字典：** 字典是键值对的无序集合，使用花括号定义。

    6.  **集合：** 集合是唯一元素的无序集合，使用花括号定义。

    7.  **布尔值：** 布尔值用于表示 True 和 False 值。


    除了这些原生数据类型，Python 的标准库中还提供了几种额外的数据类型，例如数组和集合。


    ## 5.1 数字


    在 Python 中，你可以在代码中使用几种类型的数字。这些包括：


    1.  **int**（“integer”的缩写）：这些是整数，例如 1、2、3、4 等。它们可以是正数、负数或零。

    2.  **float**（“floating point”的缩写）：这些是带有小数点的数字，例如 3.14、2.71828 等。它们也可以是正数、负数或零。

    3.  **complex**：这些是复数，即同时具有实部和虚部的数字。实部是一个浮点数，虚部是一个乘以虚数单位 j 的浮点数。例如，复数 3 + 2j 的实部为
    3，虚部为 2。


    除了这些基本的数字类型，Python 还有一些额外的类型，用于在特定上下文中表示数字。例如，`decimal` 模块提供了对任意精度十进制算术的支持，`fractions`
    模块提供了对有理数算术的支持。


    你可以在 Python 中对数字执行各种操作，例如加法、减法、乘法、除法等。例如：


    ```python

    x = 3  # x 是一个 int

    y = 2.5  # y 是一个 float

    z = x + y  # z 是一个 float

    ```


    你还可以使用内置的 `abs()` 函数获取数字的绝对值，使用 `pow()` 函数将数字提升到某个幂，以及使用 `round()` 函数将数字四舍五入到指定的小数位数。


    ### 5.1.1 数字类型转换


    在 Python 中，你可以使用内置函数 `int()`、`float()` 和 `complex()` 将一种数字类型转换为另一种。例如，你可以这样将 int
    转换为 float：


    ```python

    x = 3

    y = float(x)  # y 现在是一个值为 3.0 的 float

    ```


    你也可以使用 `int()` 函数将 float 转换为 int，但请记住这将截断 float 的小数部分。例如：


    ```python

    x = 3.7

    y = int(x)  # y 现在是一个值为 3 的 int

    ```


    你可以使用 `complex()` 函数将数字转换为复数类型。你可以向该函数传递两个参数：实部和虚部，用 + 或 - 号分隔。例如：


    ```python

    x = 3

    y = 4

    z = complex(x, y)  # z 现在是一个值为 3+4j 的复数

    ```


    也可以使用 `int()`、`float()` 和 `complex()` 函数将数字的字符串表示形式转换为数字类型。例如：


    ```python

    x = "3.14"

    y = float(x)  # y 现在是一个值为 3.14 的 float

    ```


    ### 5.1.2 Python 数学函数


    Python 的 `math` 模块中包含许多内置的数学函数。以下是一些最常用函数的表格：


    **表 5.1：数学函数**


    | 函数 | 描述 |

    |---|---|

    | math.ceil(x) | 返回大于或等于 x 的最小整数 |

    | math.floor(x) | 返回小于或等于 x 的最大整数 |

    | math.exp(x) | 返回 e 的 x 次幂 |

    | math.log(x, base) | 返回 x 以指定底数（默认为 e）的对数 |

    | math.log2(x) | 返回 x 以 2 为底的对数 |

    | math.log10(x) | 返回 x 以 10 为底的对数 |

    | math.pow(x, y) | 返回 x 的 y 次幂 |

    | math.sqrt(x) | 返回 x 的平方根 |

    | math.acos(x), math.asin(x), math.atan(x) | 分别返回 x 的反余弦、反正弦、反正切值。 |

    | math.cos(x), math.sin(x), math.tan(x) | 分别返回 x 的余弦、正弦、正切值。 |

    | math.degrees(x) | 将弧度角转换为角度 |

    | math.radians(x) | 将角度角转换为弧度 |


    请注意，一些三角函数 `math.acos`、`math.asin`、`math.atan`、`math.cos`、`math.sin`、`math.tan`
    期望输入的角是弧度制，而将角度转换为弧度以及反向转换的函数 `math.degrees(x)`、`math.radians(x)` 也已提供。


    Python 中有许多数学函数可用，其中一些是语言内置的，另一些是标准库的一部分，还有一些则通过外部库提供。表 5.1 中的示例程序演示了 Python 中一些常见的内置和标准库数学函数：


    ### 代码 5.1 数学函数示例


    ```python

    import math


    # 内置函数

    print(abs(-5)) # 绝对值

    print(pow(2, 3)) # 幂运算

    print(round(3.14159)) # 四舍五入到最接近的整数


    # math 库函数

    print(math.ceil(3.14159)) # 向上取整到最接近的整数

    print(math.floor(3.14159)) # 向下取整到最接近的整数

    print(math.sqrt(16)) # 平方根

    print(math.log10(100)) # 以 10 为底的对数

    print(math.sin(math.pi / 2)) # 值的正弦（以弧度为单位）

    ```


    该程序首先导入 math 库，该库提供了内置函数中未包含的额外数学函数。然后，该程序演示了一些内置函数，例如 `abs()`（返回数字的绝对值）、`pow()`（将数字提升到某个幂）和
    `round()`（将数字四舍五入到最接近的整数）。接着，该程序演示了 math 库中可用的一些函数，例如 `ceil()`（将数字向上取整到最接近的整数）、`floor()`（将数字向下取整到最接近的整数）、`sqrt()`（返回数字的平方根）、`log10()`（返回数字以
    10 为底的对数）和 `sin()`（返回值的正弦（以弧度为单位））。


    请注意，此示例非常基础，Python 通过 NumPy、SciPy 和 SymPy 等额外库提供了更多数学函数。这些库提供了额外的功能，例如线性代数、优化、信号处理等。


    ### 5.1.3 Python 三角函数


    Python 提供了几个三角函数，可用于对角度执行数学运算。这些函数在 `math` 模块中定义，包括：


    **表 5.2：三角函数**


    | 函数 | 描述 |

    |---|---|

    | math.sin(x) | 返回 x 弧度的正弦值。 |

    | math.cos(x) | 返回 x 弧度的余弦值。 |

    | math.tan(x) | 返回 x 弧度的正切值。 |

    | math.asin(x) | 返回 x 的反正弦值，以弧度为单位。 |

    | math.acos(x) | 返回 x 的反余弦值，以弧度为单位。 |

    | math.atan(x) | 返回 x 的反正切值，以弧度为单位。 |

    | math.atan2(y, x) | 返回 y/x 的反正切值，以弧度为单位。 |

    | math.sinh(x) | 返回 x 的双曲正弦值。 |

    | math.cosh(x) | 返回 x 的双曲余弦值。 |

    | math.tanh(x) | 返回 x 的双曲正切值。 |

    | math.asinh(x) | 返回 x 的反双曲正弦值。 |

    | math.acosh(x) | 返回 x 的反双曲余弦值。 |

    | math.atanh(x) | 返回 x 的反双曲正切值。 |


    以下是如何在 Python 脚本中使用这些函数计算 30 度的正弦、余弦和正切的示例：'
