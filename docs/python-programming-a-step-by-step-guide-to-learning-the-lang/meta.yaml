- md: '## 3.1.6 Special Operators


    Python language offers some special types of operators like the identity operator
    and the membership operator. These are described below under


    ### 3.1.6.1 Identity Operators


    In Python, the identity operators are used to determining whether two objects
    are the same object. There are two identity operators:


    - is: returns True if the objects are the same object, False otherwise

    - is not: returns True if the objects are not the same object, False otherwise


    Here''s an example of how to use the identity operators:


    **Code 3.8 Illustration of special operators**


    ```python

    x = [1, 2, 3]

    y = [1, 2, 3]

    z = x


    # x and y are different objects

    print(x is y)  # Output: False

    # x and z are the same object

    print(x is z)  # Output: True

    # x and y are not the same object

    print(x is not y)  # Output: True

    # x and z are the same object

    print(x is not z)  # Output: False

    ```


    It''s important to note that the identity operators check for object identity,
    not object equality. In other words, they check if two objects are the same object
    in memory, not if they have the same content. For example


    **Code 3.9 Illustration of identity operators**


    ```python

    x = [1, 2, 3]

    y = [1, 2, 3]


    # x and y have the same content

    print(x == y)  # Output: True


    # x and y are different objects

    print(x is y)  # Output: False

    ```


    check if two objects have the same content, you should use the equality operator
    (==).


    ### 3.1.6.2 Membership Operators


    In Python, the membership operators are in and not in. These operators are used
    to test whether a value is found within a sequence (such as a string, tuple, or
    list) or not. The operator in returns True if the value is found in the sequence
    and False if it is not. The operator not in returns True if the value is not found
    in the sequence and False if it is.


    Here is an example of how to use the membership operators:


    **Code 3.10 Illustration of membership operators**


    ```python

    >>> # Test if ''a'' is in the string ''abc''

    >>> ''a'' in ''abc''

    True

    >>> # Test if ''d'' is not in the string ''abc''

    >>> ''d'' not in ''abc''

    True

    >>> # Test if 1 is in the list [1, 2, 3]

    >>> 1 in [1, 2, 3]

    True

    >>> # Test if 4 is not in the list [1, 2, 3]

    >>> 4 not in [1, 2, 3]

    True

    ```


    You can also use the membership operators with variables:


    **Code 3.11 Illustration of membership operators**


    ```python

    >>> # Assign a string to a variable

    >>> s = ''abc''

    >>> # Test if ''a'' is in the string

    >>> ''a'' in s

    True

    >>> # Assign a list to a variable

    >>> l = [1, 2, 3]

    >>> # Test if 2 is in the list

    >>> 2 in l

    True

    ```


    ## 3.2 Expressions


    Expressions are statements that can be evaluated to a value. In Python, an expression
    is a combination of values, variables, and operators that can be evaluated to
    a single value. For example, the expression 2 + 3 is a numerical expression that
    evaluates to the value 5. The expression “Hello, “ + “World!” is a string expression
    that evaluates to the value “Hello, World!”.


    Expressions can be simple or complex and can include variables, functions, and
    other elements. Here are some examples of Python expressions:


    - 2 + 3

    - "Hello, " + "World!"

    - len("Hello, World!")

    - 2 * 3 + 5

    - "Hello, " * 3


    In Python, expressions can be used in a variety of contexts, such as in assignments,
    function calls, and as part of control structures like loops and conditional statements.


    ### 3.2.1 Python Operator Precedence


    In Python, operator precedence determines the order in which operations are performed.
    Operators with higher precedence are performed before operators with lower precedence.
    For example, in the expression 4 + 5 * 2, the multiplication operation (*) has
    higher precedence than the addition operation (+), so the multiplication is done
    first and the result is added to 4. The expression is evaluated as 4 + (5 * 2),
    which is equal to 14.


    Here is a list of the operators in Python, listed in order of decreasing precedence:


    1. () Parentheses

    2. ** Exponentiation (raise to the power)

    3. ~ + - Unary plus and minus (method names for the + and - operators)

    4. * / % // Multiply, divide, modulo and floor division

    5. + - Addition and subtraction

    6. >> << Right and left bitwise shift

    7. & Bitwise ‘AND’

    8. ^ | Bitwise exclusive OR and regular OR

    9. <= < > >= Comparison operators

    10. == != Equality operators

    11. = %= /= //= -= += *= **= Assignment operators

    12. is is not Identity operators

    13. in not in Membership operators

    14. not or and Boolean NOT, OR, and AND


    You can use parentheses to override the precedence and specify the order in which
    the operations should be performed. For example, in the expression (4 + 5) * 2,
    the parentheses indicate that the addition should be performed before the multiplication,
    so the expression is evaluated as (4 + 5) * 2, which is equal to 14.


    ### 3.2.2 Associativity


    In Python, the associativity of an operator determines the order in which operations
    with the same precedence are performed. Most operators in Python are left-associative,
    which means that operations are performed from left to right.


    For example, in the expression 2 + 3 - 4, the addition (+) and subtraction (-)
    operators have the same precedence, so they are performed from left to right.
    The expression is evaluated as (2 + 3) - 4, which is equal to 1.


    However, some operators are right-associative. This means that operations are
    performed from right to left. The exponentiation operator (**) is an example of
    a right-associative operator in Python.


    For example, in the expression 2 ** 3 ** 4, the exponentiation operator (**) has
    the same precedence, so it is performed from right to left. The expression is
    evaluated as 2 ** (3 ** 4), which is equal to 2 ** 81, or 43046721.


    Here is a list of the operators in Python, along with their associativity:


    **Left-associative:**


    - + - Addition and subtraction

    - * / % // Multiply, divide, modulo and floor division

    - >> << Right and left bitwise shift

    - & Bitwise ''AND''

    - ^ | Bitwise exclusive OR and regular OR

    - <= < > >= Comparison operators

    - == != Equality operators

    - = %= /= //= -= += *= **= Assignment operators

    - is is not Identity operators

    - in not in Membership operators

    - not or and Boolean NOT, OR, and AND


    **Right-associative:**


    - ** Exponentiation (raise to the power)


    ### 3.2.3 Non-Associative Operators


    In mathematics, a non-associative operator is an operator that does not satisfy
    the associative property. The associative property states that for any three values,
    the order in which the operator is applied to them does not matter. In other words,
    if we have the values a, b, and c, and an operator *, the following expression
    should always be true:


    (a * b) * c = a * (b * c)


    If this property does not hold, then the operator is non-associative.


    Here are some examples of non-associative operators:


    The division operator (/). For example, (3 / 4) / 5 is not equal to 3 / (4 / 5).


    The subtraction operator (-). For example, (5 - 3) - 2 is not equal to 5 - (3
    - 2).


    It’s important to note that non-associative operators can still be used to perform
    calculations, but you need to be careful about the order in which you apply them.
    The order in which you apply non-associative operators can change the result of
    the calculation.


    ## 3.3 Summary


    In this chapter, we have learned about different operators such as arithmetic,
    comparison, logical, bitwise, special operators, identity, and membership operators
    available in the Python language. All the operators are described with appropriate
    examples of each. We have learned how operators and operands form an expression,
    which is the basic sentence of a programming language. The precedence decides
    which operator will be evaluated first and associativity decides how to evaluate
    an expression if two operators exhibit the same precedence. Finally, we have learned
    how Python language evaluates expressions.


    ## Review Questions


    1. What are the different types of operators available in Python?

    2. Can you explain the precedence of operators in Python?

    3. What is the associativity of the Python operators?'
  mdcn: '## 3.1.6 特殊运算符


    Python 语言提供了一些特殊类型的运算符，例如身份运算符和成员运算符。下面将对它们进行描述。


    ### 3.1.6.1 身份运算符


    在 Python 中，身份运算符用于判断两个对象是否是同一个对象。有两个身份运算符：


    - is：如果对象是同一个对象则返回 True，否则返回 False

    - is not：如果对象不是同一个对象则返回 True，否则返回 False


    以下是使用身份运算符的示例：


    **代码 3.8 特殊运算符示例**


    ```python

    x = [1, 2, 3]

    y = [1, 2, 3]

    z = x


    # x 和 y 是不同的对象

    print(x is y)  # 输出：False

    # x 和 z 是同一个对象

    print(x is z)  # 输出：True

    # x 和 y 不是同一个对象

    print(x is not y)  # 输出：True

    # x 和 z 是同一个对象

    print(x is not z)  # 输出：False

    ```


    需要注意的是，身份运算符检查的是对象身份，而不是对象相等性。换句话说，它们检查的是两个对象在内存中是否是同一个对象，而不是它们是否具有相同的内容。例如


    **代码 3.9 身份运算符示例**


    ```python

    x = [1, 2, 3]

    y = [1, 2, 3]


    # x 和 y 具有相同的内容

    print(x == y)  # 输出：True


    # x 和 y 是不同的对象

    print(x is y)  # 输出：False

    ```


    要检查两个对象是否具有相同的内容，你应该使用相等运算符（==）。


    ### 3.1.6.2 成员运算符


    在 Python 中，成员运算符是 `in` 和 `not in`。这些运算符用于测试一个值是否在序列（如字符串、元组或列表）中。运算符 `in` 如果在序列中找到该值则返回
    True，否则返回 False。运算符 `not in` 如果在序列中未找到该值则返回 True，否则返回 False。


    以下是使用成员运算符的示例：


    **代码 3.10 成员运算符示例**


    ```python

    >>> # 测试 ''a'' 是否在字符串 ''abc'' 中

    >>> ''a'' in ''abc''

    True

    >>> # 测试 ''d'' 是否不在字符串 ''abc'' 中

    >>> ''d'' not in ''abc''

    True

    >>> # 测试 1 是否在列表 [1, 2, 3] 中

    >>> 1 in [1, 2, 3]

    True

    >>> # 测试 4 是否不在列表 [1, 2, 3] 中

    >>> 4 not in [1, 2, 3]

    True

    ```


    你也可以将成员运算符与变量一起使用：


    **代码 3.11 成员运算符示例**


    ```python

    >>> # 将字符串赋值给变量

    >>> s = ''abc''

    >>> # 测试 ''a'' 是否在字符串中

    >>> ''a'' in s

    True

    >>> # 将列表赋值给变量

    >>> l = [1, 2, 3]

    >>> # 测试 2 是否在列表中

    >>> 2 in l

    True

    ```


    ## 3.2 表达式


    表达式是可以被求值为一个值的语句。在 Python 中，表达式是值、变量和运算符的组合，可以被求值为一个单一的值。例如，表达式 `2 + 3` 是一个数值表达式，其求值结果为
    5。表达式 `"Hello, " + "World!"` 是一个字符串表达式，其求值结果为 `"Hello, World!"`。


    表达式可以是简单的或复杂的，并且可以包含变量、函数和其他元素。以下是一些 Python 表达式的示例：


    - 2 + 3

    - "Hello, " + "World!"

    - len("Hello, World!")

    - 2 * 3 + 5

    - "Hello, " * 3


    在 Python 中，表达式可以在多种上下文中使用，例如在赋值、函数调用以及作为循环和条件语句等控制结构的一部分。


    ### 3.2.1 Python 运算符优先级


    在 Python 中，运算符优先级决定了执行操作的顺序。优先级较高的运算符在优先级较低的运算符之前执行。例如，在表达式 `4 + 5 * 2` 中，乘法运算符（`*`）的优先级高于加法运算符（`+`），因此先执行乘法，然后将结果加到
    4。该表达式被求值为 `4 + (5 * 2)`，等于 14。


    以下是 Python 中运算符的列表，按优先级从高到低排列：


    1. () 圆括号

    2. ** 幂运算（求幂）

    3. ~ + - 一元正负号（+ 和 - 运算符的方法名）

    4. * / % // 乘、除、取模和整除

    5. + - 加法和减法

    6. >> << 右移和左移位运算

    7. & 按位与

    8. ^ | 按位异或和按位或

    9. <= < > >= 比较运算符

    10. == != 相等运算符

    11. = %= /= //= -= += *= **= 赋值运算符

    12. is is not 身份运算符

    13. in not in 成员运算符

    14. not or and 布尔非、或、与


    你可以使用圆括号来覆盖优先级并指定操作执行的顺序。例如，在表达式 `(4 + 5) * 2` 中，圆括号表示加法应在乘法之前执行，因此该表达式被求值为 `(4
    + 5) * 2`，等于 14。


    ### 3.2.2 结合性


    在 Python 中，运算符的结合性决定了具有相同优先级的操作的执行顺序。Python 中的大多数运算符是左结合的，这意味着操作从左到右执行。


    例如，在表达式 `2 + 3 - 4` 中，加法（`+`）和减法（`-`）运算符具有相同的优先级，因此它们从左到右执行。该表达式被求值为 `(2 + 3)
    - 4`，等于 1。


    然而，有些运算符是右结合的。这意味着操作从右到左执行。幂运算符（`**`）是 Python 中右结合运算符的一个例子。


    例如，在表达式 `2 ** 3 ** 4` 中，幂运算符（`**`）具有相同的优先级，因此它从右到左执行。该表达式被求值为 `2 ** (3 ** 4)`，等于
    `2 ** 81`，即 43046721。


    以下是 Python 中运算符及其结合性的列表：


    **左结合：**


    - + - 加法和减法

    - * / % // 乘、除、取模和整除

    - >> << 右移和左移位运算

    - & 按位与

    - ^ | 按位异或和按位或

    - <= < > >= 比较运算符

    - == != 相等运算符

    - = %= /= //= -= += *= **= 赋值运算符

    - is is not 身份运算符

    - in not in 成员运算符

    - not or and 布尔非、或、与


    **右结合：**


    - ** 幂运算（求幂）


    ### 3.2.3 非结合运算符


    在数学中，非结合运算符是不满足结合律的运算符。结合律指出，对于任意三个值，运算符应用于它们的顺序并不重要。换句话说，如果我们有值 a、b 和 c，以及一个运算符
    `*`，则以下表达式应始终为真：


    `(a * b) * c = a * (b * c)`


    如果此性质不成立，则该运算符是非结合的。


    以下是非结合运算符的一些示例：


    除法运算符（`/`）。例如，`(3 / 4) / 5` 不等于 `3 / (4 / 5)`。


    减法运算符（`-`）。例如，`(5 - 3) - 2` 不等于 `5 - (3 - 2)`。


    需要注意的是，非结合运算符仍然可以用于执行计算，但你需要小心应用它们的顺序。应用非结合运算符的顺序可能会改变计算结果。


    ## 3.3 总结


    在本章中，我们学习了 Python 语言中可用的不同运算符，如算术、比较、逻辑、位运算、特殊运算符、身份和成员运算符。所有运算符都通过适当的示例进行了描述。我们学习了运算符和操作数如何构成表达式，这是编程语言的基本语句。优先级决定了哪个运算符将首先被求值，而结合性决定了当两个运算符具有相同优先级时如何求值表达式。最后，我们学习了
