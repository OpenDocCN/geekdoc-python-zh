  md: "# 4.2.6 The range() Function\n\nThe range() function in Python is a built-in\
    \ function that returns a sequence of numbers, starting from 0 by default, increments\
    \ by 1 (also by default), and ends at a specified number. The syntax for the range()\
    \ function is as follows:\n\n```\nrange(stop)\nrange(start, stop[, step])\n```\n\
    \nThe stop parameter is required and specifies the end of the sequence. The start\
    \ parameter is optional and specifies the starting number of the sequence. The\
    \ step parameter is also optional and specifies the increment between each number\
    \ in the sequence. Here are some examples of using the range() function:\n\n#\
    \ Code 4.14 Illustration of range() function\n\n```\n# Print the numbers 0 through\
    \ 9\nfor i in range(10):\n    print(i)\n\n# Print the numbers 2 through 9\nfor\
    \ i in range(2, 10):\n    print(i)\n\n# Print the even numbers 0 through 8\nfor\
    \ i in range(0, 10, 2):\n    print(i)\n\n# Print the odd numbers 1 through 9\n\
    for i in range(1, 10, 2):\n    print(i)\n```\n\nThe range() function is often\
    \ used with a for loop to repeat a block of code a specific number of times. For\
    \ example:\n\n```\nfor i in range(5):\n    print(\"Hello, World!\")\n```\n\nThis\
    \ code will print \"Hello, World!\" 5 times."
