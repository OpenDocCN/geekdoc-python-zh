    assigned to it during its lifetime must always have that type. Variables in Python
    are not subject to this restriction. In Python, a variable may be assigned a value
    of one type and then later re-assigned a value of a different type:


    # Code 2.11 Illustration of variable in Python


    ```

    var = 21.09

    print(var)

    21.09

