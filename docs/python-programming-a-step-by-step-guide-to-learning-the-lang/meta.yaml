    # 2.2 Identifiers


    In Python, an identifier is a name used to identify a variable, function, class,
    module, or other objects. There are a few rules and conventions for naming identifiers
    in Python:


    +   - Identifiers must start with a letter or an underscore (_).

    - Identifiers cannot start with a number.

    - Identifiers can only contain letters, numbers, and underscores.

    - Identifiers are case-sensitive, so myVariable and myvariable are considered
    to be different identifiers.

    - Python reserves a set of keywords that cannot be used as identifiers. Examples
    include if, else, for, class, etc.'
