    - **clear()**：移除集合中的所有元素。\n- **copy()**：返回集合的浅拷贝。\n- **difference(set)**：返回一个新集合，其中包含仅在原集合中而不在指定集合中的元素。\n\
    - **difference_update(set)**：从原集合中移除那些也存在于指定集合中的元素。\n- **discard(element)**：如果元素存在于集合中，则将其移除。\n\
    - **intersection(set)**：返回一个新集合，其中包含同时存在于原集合和指定集合中的元素。\n- **intersection_update(set)**：从原集合中移除那些不在指定集合中的元素。\n\
    - **isdisjoint(set)**：如果集合与指定集合没有共同元素，则返回 True。\n- **issubset(set)**：如果集合的所有元素都在指定集合中，则返回\
    \ True。\n- **issuperset(set)**：如果指定集合的所有元素都在原集合中，则返回 True。\n- **pop()**：从集合中移除并返回一个任意元素。如果集合为空，则引发\
    \ KeyError。\n- **remove(element)**：从集合中移除一个元素。如果元素不在集合中，则引发 KeyError。\n- **symmetric_difference(set)**：返回一个新集合，其中包含存在于原集合或指定集合中，但不同时存在于两者中的元素。\n\
    - **symmetric_difference_update(set)**：将指定集合中尚未存在于原集合中的元素插入原集合，并从原集合中移除那些存在于指定集合中的元素。\n\
    - **union(set)**：返回一个新集合，其中包含原集合和指定集合中的所有元素。\n- **update(set)**：将指定集合中的元素添加到原集合中。\n\
    \n此外，还有一些其他内置函数可用，如 `len()`、`min()`、`max()` 等。你可以使用这些函数对 Python 中的集合执行各种操作。同样值得注意的是，Python\
    \ 集合也支持集合推导式，允许你使用单行代码创建一个新集合。\n\n## 5.4.6 in 运算符\n\n在 Python 中，`in` 运算符用于检查一个元素是否存在于序列中，例如列表、元组、集合或字符串。`in`\
    \ 运算符返回一个布尔值，指示该元素是否在序列中被找到。例如，如果你有一个名为 `numbers` 的数字列表，并且想检查数字 5 是否在列表中，你可以像下面这样使用\
    \ `in` 运算符。\n\n```\nnumbers = [1, 2, 3, 4, 5]\nif 5 in numbers:\n    print(\"\
    5 is in the list.\")\n```\n\n## 5.4.7 Python 集合函数\n\n在 Python 中，内置的集合函数用于对集合执行各种操作，例如检查所有元素是否满足某个条件、查找集合中的元素数量，或查找集合中的最大或最小元素。这些函数可用于任何可迭代对象，包括列表、元组和集合。以下是一些如何在\
    \ Python 程序中使用内置集合函数的示例：\n\n```\n# 使用 all() 函数\nnumbers = {1, 2, 3, 4, 5}\nif\
    \ all(x > 0 for x in numbers):\n    print(\"All numbers in the set are positive.\"\
    )\n\n# 使用 any() 函数\nnumbers = {1, 2, 3, 4, 5}\nif any(x > 4 for x in numbers):\n\
    \    print(\"There are numbers greater than 4 in the set.\")\n```\n\n```\n# 使用\
    \ len() 函数\nnumbers = {1, 2, 3, 4, 5}\nprint(\"The set has\", len(numbers), \"\
    elements.\")\n\n# 使用 max() 函数\nnumbers = {1, 2, 3, 4, 5}\nprint(\"The largest\
    \ element in the set is\", max(numbers))\n\n# 使用 min() 函数\nnumbers = {1, 2, 3,\
    \ 4, 5}\nprint(\"The smallest element in the set is\", min(numbers))\n```\n\n\
    ## 5.4.8 冻结集合\n\n在 Python 中，冻结集合是一种内置的不可变集合数据类型。这意味着一旦创建了冻结集合，其元素就不能被添加、删除或修改。冻结集合使用内置的\
    \ `frozenset()` 函数或使用带 'f' 前缀的花括号来定义。当你想将一个集合作为字典的键或另一个集合的元素，但又不想让该集合被修改时，冻结集合会很有用。以下是如何创建冻结集合的示例：\n\
    \n```\n# 使用 frozenset() 函数创建冻结集合\nfruits = frozenset([\"apple\", \"banana\", \"\
    cherry\"])\nprint(fruits) # 输出: frozenset({‘apple’, ‘banana’, ‘cherry’})\n\n#\
    \ 使用集合字面量创建冻结集合\nfruits = f{‘apple’, ‘banana’, ‘cherry’}\nprint(fruits) # 输出:\
    \ frozenset({‘apple’, ‘banana’, ‘cherry’})\n```\n\n如你所见，`print` 语句的输出是一个冻结集合对象。你可以在冻结集合上使用相同的集合方法，例如\
    \ `union()` 和 `intersection()`，也可以使用内置的集合函数，如 `len()`、`min()` 和 `max()` 等。因为冻结集合是不可变的，所以在创建后你不能向其中添加或移除元素，也不能修改它们的元素。\n\
    \n```\nfruits.add(\"orange\") # 引发错误\nfruits.remove(\"banana\") # 引发错误\nfruits.clear()\
    \ # 引发错误\n```\n\n冻结集合在你需要一个可以作为字典键或另一个集合元素，但又不想让该集合被修改的集合时非常有用。\n\n## 5.5 Python\
    \ 字典\n\n在 Python 中，字典是一种内置的数据结构，用于存储键值对，其中每个键都是唯一的。字典是可变的，这意味着你可以在字典创建后添加、删除或修改元素。\n\
    \n### 5.5.1 创建字典\n\n字典使用花括号 `{}` 或内置的 `dict()` 函数定义。以下是如何创建字典的示例：\n\n```\n# 使用花括号创建字典\n\
    person = {\"name\": \"John\", \"age\": 30, \"city\": \"New York\"}\n\n# 使用 dict()\
    \ 函数创建字典\nperson = dict(name=\"John\", age=30, city=\"New York\")\n```\n\n在这个例子中，字典\
    \ \"person\" 包含三个键值对：\"name\" 是键，\"John\" 是值；\"age\" 是键，30 是值；\"city\" 是键，\"New\
    \ York\" 是值。\n\n### 5.5.2 访问字典\n\n在 Python 中，字典是键值对的集合，其中每个键都是唯一的。要访问字典中的值，你可以在字典变量名后使用方括号\
    \ `[]` 并放入键。例如，如果你有一个名为 \"my_dict\" 的字典，其中有一个键 \"name\" 和一个值 \"John\"，你可以这样访问该值：\n\
    \n```\nmy_value = my_dict[\"name\"]\nprint(my_value) # 输出: \"John\"\n```\n\n你也可以使用\
    \ `get()` 方法来访问值。此方法接受一个键作为参数，如果该键存在于字典中，则返回对应的值，否则返回 `None`（或者如果指定了默认值，则返回默认值）。例如：\n\
    \n```\nmy_value = my_dict.get(\"name\")\nprint(my_value) # 输出: \"John\"\n```\n\
    \n如果你想检查一个键是否存在于字典中，可以使用 `in` 关键字。例如：\n\n```\nif \"name\" in my_dict:\n    print(\"\
    name key found\")\nelse:\n    print(\"name key not found\")\n```\n\n它将返回 \"name\
    \ key found\"。\n\n### 5.5.3 更新字典\n\n在 Python 中，你可以通过在字典变量名后使用方括号 `[]` 并放入键，然后为其赋一个新值来更新字典的值。例如，如果你有一个名为\
    \ \"my_dict\" 的字典，其中有一个键 \"name\" 和一个值 \"John\"，你可以这样更新该值：\n\n```\nmy_dict[\"\
    name\"] = \"Bob\"\nprint(my_dict) # 输出: {\"name\": \"Bob\"}\n```\n\n你也可以使用 `update()`\
    \ 方法一次更新字典中的多个键值对。此方法接受另一个字典作为参数，并将其键值对添加到原字典中。例如：\n\n```\nnew_dict = {\"age\"\
    : 25, \"gender\": \"male\"}\nmy_dict.update(new_dict)\nprint(my_dict) # 输出: {\"\
    name\": \"Bob\", \"age\": 25, \"gender\": \"male\"}\n```\n\n```\nmy_dict[\"address\"\
    ] = \"NYC\"\nprint(my_dict) # 输出: {\"name\": \"Bob\", \"age\": 25, \"gender\"\
    : \"male\",\n\"address\": \"NYC\"}\n```\n\n它将向字典中添加键 \"address\"，其值为 \"NYC\"。"
