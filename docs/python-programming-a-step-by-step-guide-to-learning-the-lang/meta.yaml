  mdcn: "## 12.3 重载位运算符\n\n在 Python 中，你可以通过在类中定义特殊方法来重载位运算符，例如 `&`、`|`、`^`、`~`、`<<`\
    \ 和 `>>`。位运算对应的特殊方法分别是 `__and__`、`__or__`、`__xor__`、`__invert__`、`__lshift__`\
    \ 和 `__rshift__`。\n\n以下是一个如何为名为 \"BitwiseOps\" 的自定义类重载位运算符的示例：\n\n### 代码 12.3\
    \ 在 Python 中重载位运算符\n\n```python\nclass BitwiseOps:\n    def __init__(self, value):\n\
    \        self.value = value\n    def __and__(self, other):\n        return self.value\
    \ & other.value\n    def __or__(self, other):\n        return self.value | other.value\n\
    \    def __xor__(self, other):\n        return self.value ^ other.value\n    def\
    \ __invert__(self):\n        return ~self.value\n    def __lshift__(self, shift):\n\
    \        return self.value << shift\n    def __rshift__(self, shift):\n      \
    \  return self.value >> shift\n```\n\n```python\nb1 = BitwiseOps(5)\nb2 = BitwiseOps(3)\n\
    print(b1 & b2)\nprint(b1 | b2)\nprint(b1 ^ b2)\nprint(~b1)\nprint(b1 << 2)\nprint(b1\
    \ >> 1)\n```\n\n在此示例中，`BitwiseOps` 类重载了位运算符。创建了 `BitwiseOps` 类的实例，并对这些实例应用了位运算。运算结果被打印出来。\n\
    \n## 12.4 重载关系运算符\n\n在 Python 中，你可以使用名为 `lt`、`gt`、`le`、`ge` 和 `eq` 的特殊方法来重载关系运算符，例如\
    \ `<`、`>`、`<=`、`>=` 和 `==`。\n\n这些方法允许你为类定义自定义的比较行为，使你能够基于特定属性或条件来比较对象。\n\n要重载关系运算符，你只需在类中定义相应的特殊方法并实现所需的比较行为即可。以下是一个演示如何在\
    \ Python 中重载 `<` 运算符的示例程序：\n\n### 代码 12.4 在 Python 中重载 '<' 运算符的示例\n\n```python\n\
    class Rectangle:\n    def __init__(self, width, height):\n        self.width =\
    \ width\n        self.height = height\n    def area(self):\n        return self.width\
    \ * self.height\n    def __lt__(self, other):\n        return self.area() < other.area()\n\
    ```\n\n```python\n# 创建两个矩形\nrect1 = Rectangle(4, 5)\nrect2 = Rectangle(3, 6)\n\
    # 使用 '<' 运算符比较矩形\nif rect1 < rect2:\n    print(\"Rectangle 1 has a smaller area\
    \ than Rectangle 2\")\nelse:\n    print(\"Rectangle 1 has a larger area than Rectangle\
    \ 2\")\n```\n\n在此程序中，我们定义了一个具有 `width` 和 `height` 属性以及 `area` 和 `__lt__` 方法的 `Rectangle`\
    \ 类。`area` 方法通过将宽度和高度相乘来计算矩形的面积。`__lt__` 方法重载了 `<` 运算符，并比较两个矩形的面积。\n\n然后我们创建了\
    \ `Rectangle` 类的两个实例，并使用 `<` 运算符对它们进行比较。程序的输出将取决于我们创建的矩形的尺寸。如果 `rect1` 的面积小于 `rect2`，程序将打印\
    \ \"Rectangle 1 has a smaller area than Rectangle 2\"，否则将打印 \"Rectangle 1 has\
    \ a larger area than Rectangle 2\"。\n\n## 12.5 总结\n\n在 Python 中，我们可以通过使用特殊方法重载运算符来为自定义类定制运算符的行为。我们可以重载各种运算符，例如加法和减法运算符、位运算符以及关系运算符。要重载加法运算符\
    \ `+`，我们使用特殊方法 `add`；对于减法运算符 `-`，我们使用 `sub` 方法。对于位运算符 `&`、`|`、`^` 和 `~`，我们可以分别使用\
    \ `and`、`or`、`xor` 和 `invert` 方法来重载它们。我们还可以通过定义 `lt`、`gt`、`le`、`ge` 和 `eq` 方法来分别重载关系运算符\
    \ `<`、`>`、`<=`、`>=` 和 `==`。通过重载运算符，我们可以为类定义自定义行为，从而简化代码并使其更直观易用。\n\n## 复习题\n\n\
