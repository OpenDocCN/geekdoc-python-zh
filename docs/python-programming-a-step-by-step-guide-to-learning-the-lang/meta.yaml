    \ operand of a division or modulo operation is zero. |\n\n## 8.3 Exception Handling\n\
    \nBefore we understand the exception handling let us shed some light on what Exception\
    \ is.\n\nWhen a Python program terminates as soon as it encounters an error. In\
    \ Python, an error can be a syntax error or an exception. Hence, the exceptions\
