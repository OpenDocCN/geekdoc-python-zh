- md: "## 5.4.5 Python Set Methods\n\nIn Python, sets are built-in data structures\
    \ that are used to store unique elements. Sets are mutable and unordered, and\
    \ they are defined using curly braces {} or the built-in set() function. Here\
    \ are some common methods that can be used with sets in Python:\n\n- **add(element)**:\
    \ Adds an element to the set.\n- **clear()**: Removes all elements from the set.\n\
    - **copy()**: Returns a shallow copy of the set.\n- **difference(set)**: Returns\
    \ a set containing the elements that are only in the original set and not in the\
    \ specified set.\n- **difference_update(set)**: Removes the elements that are\
    \ in the specified set from the original set.\n- **discard(element)**: Removes\
    \ an element from the set if it is present.\n- **intersection(set)**: Returns\
    \ a set containing the elements that are common to both the original set and the\
    \ specified set.\n- **intersection_update(set)**: Removes the elements that are\
    \ not in the specified set from the original set.\n- **isdisjoint(set)**: Returns\
    \ True if the set has no elements in common with the specified set.\n- **issubset(set)**:\
    \ Returns True if all elements of the set are in the specified set.\n- **issuperset(set)**:\
    \ Returns True if all elements of the specified set are in the original set.\n\
    - **pop()**: Removes and returns an arbitrary element from the set. If the set\
    \ is empty, it raises a KeyError.\n- **remove(element)**: Removes an element from\
    \ the set. If the element is not in the set, it raises a KeyError.\n- **symmetric_difference(set)**:\
    \ Returns a set containing the elements that are in either the original set or\
    \ the specified set, but not in both.\n- **symmetric_difference_update(set)**:\
    \ Inserts the elements from the specified set that are not already in the original\
    \ set, and removes the elements from the original set that are in the specified\
    \ set.\n- **union(set)**: Returns a set containing all elements from the original\
    \ set and the specified set.\n- **update(set)**: Adds the elements from the specified\
    \ set to the original set.\n\nAdditionally, there are some other in-built methods\
    \ available like len(), min(), max() etc. You can use these methods to perform\
    \ various operations on sets in Python. It's also worth noting that python set\
    \ has also support of set comprehension, which allows you to create a new set\
    \ using a single line of code.\n\n## 5.4.6 The in Operator\n\nIn Python, the in\
    \ operator is used to check if an element is present in a sequence, such as a\
    \ list, tuple, set, or string. The in operator returns a Boolean value indicating\
    \ whether the element is found in the sequence. For example, if you have a list\
    \ of numbers called numbers and you want to check if the number 5 is in the list,\
    \ you can use the in operator like shown in below.\n\n```\nnumbers = [1, 2, 3,\
    \ 4, 5]\nif 5 in numbers:\n    print(\"5 is in the list.\")\n```\n\n## 5.4.7 Python\
    \ Set Functions\n\nIn Python, the built-in set functions are used to perform various\
    \ operations on sets, such as checking if all elements meet a certain condition,\
    \ finding the number of elements in a set, or finding the maximum or minimum element\
    \ in a set. These functions can be used on any iterable, which includes lists,\
    \ tuples, and sets. Here are some examples of how you can use the built-in set\
    \ functions in a Python program:\n\n```\n# using the all() function\nnumbers =\
    \ {1, 2, 3, 4, 5}\nif all(x > 0 for x in numbers):\n    print(\"All numbers in\
    \ the set are positive.\")\n\n# using the any() function\nnumbers = {1, 2, 3,\
    \ 4, 5}\nif any(x > 4 for x in numbers):\n    print(\"There are numbers greater\
    \ than 4 in the set.\")\n```\n\n```\n# using the len() function\nnumbers = {1,\
    \ 2, 3, 4, 5}\nprint(\"The set has\", len(numbers), \"elements.\")\n\n# using\
    \ the max() function\nnumbers = {1, 2, 3, 4, 5}\nprint(\"The largest element in\
    \ the set is\", max(numbers))\n\n# using the min() function\nnumbers = {1, 2,\
    \ 3, 4, 5}\nprint(\"The smallest element in the set is\", min(numbers))\n```\n\
    \n## 5.4.8 Frozen Sets\n\nIn Python, a frozen set is a built-in immutable set\
    \ data type. This means that once a frozen set is created, its elements cannot\
    \ be added, removed or modified. Frozen sets are defined using the frozenset()\
    \ built-in function or by using curly braces with a ‘f’ prefix. A frozen set can\
    \ be useful in situations where you want to use a set as a key in a dictionary\
    \ or as an element in another set, but you don’t want the set to be modified.\
    \ Here’s an example of how to create a frozen set:\n\n```\n# Creating a frozen\
    \ set using the frozenset() function\nfruits = frozenset([\"apple\", \"banana\"\
    , \"cherry\"])\nprint(fruits) # output: frozenset({‘apple’, ‘banana’, ‘cherry’})\n\
    \n# Creating a frozen set using a set literal\nfruits = f{‘apple’, ‘banana’, ‘cherry’}\n\
    print(fruits) # output: frozenset({‘apple’, ‘banana’, ‘cherry’})\n```\n\nAs you\
    \ can see, the output of the print statement is a frozenset object. You can use\
    \ the same set methods, such as union() and intersection() on frozen sets and\
    \ also use the built-in set functions such as len(), min() and max() etc. Because\
    \ frozen sets are immutable, you can’t add or remove elements from them after\
    \ they’ve been created, and you can’t modify their elements either.\n\n```\nfruits.add(\"\
    orange\") # raises an error\nfruits.remove(\"banana\") # raises an error\nfruits.clear()\
    \ # raises an error\n```\n\nFrozen sets are useful in situations where you need\
    \ a set that can be used as a key in a dictionary, or as an element in another\
    \ set, but you don't want the set to be modified.\n\n## 5.5 Python Dictionary\n\
    \nIn Python, a dictionary is a built-in data structure that stores key-value pairs,\
    \ where each key is unique. Dictionaries are mutable, which means that you can\
    \ add, remove, or modify elements after the dictionary has been created.\n\n###\
    \ 5.5.1 Creating a Dictionary\n\nDictionaries are defined using curly braces {}\
    \ or the built-in dict() function. Here's an example of how to create a dictionary:\n\
    \n```\n# Creating a dictionary using curly braces\nperson = {\"name\": \"John\"\
    , \"age\": 30, \"city\": \"New York\"}\n\n# Creating a dictionary using the dict()\
    \ function\nperson = dict(name=\"John\", age=30, city=\"New York\")\n```\n\nIn\
    \ this example, the dictionary \"person\" contains three key-value pairs: \"name\"\
    \ is the key and \"John\" is the value, \"age\" is the key and 30 is the value,\
    \ and \"city\" is the key and \"New York\" is the value.\n\n### 5.5.2 Accessing\
    \ a Dictionary\n\nIn Python, a dictionary is a collection of key-value pairs,\
    \ where each key is unique. To access a value in a dictionary, you can use the\
    \ key in square brackets [] after the dictionary variable name. For example, if\
    \ you have a dictionary called \"my_dict\" with a key \"name\" and a value \"\
    John\", you can access the value like this:\n\n```\nmy_value = my_dict[\"name\"\
    ]\nprint(my_value) # Output: \"John\"\n```\n\nYou can also use the get() method\
    \ to access a value. This method takes a key as an argument and returns the value\
    \ for that key if it exists in the dictionary, otherwise it returns None (or a\
    \ default value if specified). For example:\n\n```\nmy_value = my_dict.get(\"\
    name\")\nprint(my_value) # Output: \"John\"\n```\n\nIf you want to check if a\
    \ key is present in the dictionary or not, you can use the in keyword. For example:\n\
    \n```\nif \"name\" in my_dict:\n    print(\"name key found\")\nelse:\n    print(\"\
    name key not found\")\n```\n\nIt will return \"name key found\"\n\n### 5.5.3 Updating\
    \ a Dictionary\n\nIn Python, you can update the values of a dictionary by using\
    \ the key in square brackets [] after the dictionary variable name, and assigning\
    \ a new value to it. For example, if you have a dictionary called \"my_dict\"\
    \ with a key \"name\" and a value \"John\", you can update the value like this:\n\
    \n```\nmy_dict[\"name\"] = \"Bob\"\nprint(my_dict) # Output: {\"name\": \"Bob\"\
    }\n```\n\nYou can also use the update() method to update multiple key-value pairs\
    \ in a dictionary at once. This method takes another dictionary as an argument\
    \ and adds its key-value pairs to the original dictionary. For example:\n\n```\n\
    new_dict = {\"age\": 25, \"gender\": \"male\"}\nmy_dict.update(new_dict)\nprint(my_dict)\
    \ # Output: {\"name\": \"Bob\", \"age\": 25, \"gender\": \"male\"}\n```\n\n```\n\
    my_dict[\"address\"] = \"NYC\"\nprint(my_dict) # Output: {\"name\": \"Bob\", \"\
    age\": 25, \"gender\": \"male\",\n\"address\": \"NYC\"}\n```\n\nIt will add the\
    \ key \"address\" to the dictionary with value \"NYC\""
  mdcn: "## 5.4.5 Python 集合方法\n\n在 Python 中，集合是用于存储唯一元素的内置数据结构。集合是可变且无序的，使用花括号 `{}`\
