    \n在 Python 中，继承使用类继承语法实现。子类通过在类名后的括号中包含父类的名称来定义，如下所示：\n\n```python\nclass DerivedClass(BaseClass):\n\
    \    # 子类代码在此\n```\n\n子类继承父类的所有属性和方法，并可以添加新的属性或覆盖现有的属性。这使得重用和扩展现有代码成为可能，并可以创建基于公共基类的更专门化的类。\n\
    \n继承是 OOP 的一个强大特性，它允许代码重用和模块化。它使得在基类中定义一次公共功能，然后在多个派生类中重用该功能成为可能。\n\n### 11.1\
    \ Python 单继承\n\n单继承是面向对象编程（OOP）中的一种继承类型，其中一个子类从单个父类继承属性和方法。在 Python 中，单继承通过定义一个子类并在子类名后的括号中指定父类来实现。\n\
    \n代码 11.1 Python 中的单继承\n\n```python\nclass Animal:\n    def __init__(self, name,\
    \ species):\n        self.name = name\n        self.species = species\n    def\
    \ make_sound(self):\n        print(\"Some generic animal sound\")\nclass Dog(Animal):\n\
    \    def __init__(self, name, breed):\n        Animal.__init__(self, name, species=\"\
    Dog\")\n        self.breed = breed\n    def make_sound(self):\n        print(\"\
    Woof woof!\")\ndog = Dog(\"Max\", \"Labrador\")\nprint(dog.name)\nprint(dog.species)\n\
    print(dog.breed)\ndog.make_sound()\n```\n\n在这个例子中，Dog 类继承自 Animal 类。这意味着 Dog 类可以访问\
    \ Animal 类的所有属性和方法，包括 name 和 species 属性以及 make_sound 方法。Dog 类也可以添加自己的属性和方法，例如\
    \ breed 属性和它自己的 make_sound 方法实现。\n\n### 11.2 Python 多重继承\n\n多重继承是面向对象编程（OOP）中的一种继承类型，其中一个类从多个父类继承属性和方法。在\
    \ Python 中，多重继承通过定义一个类并在类名后的括号中指定多个父类（用逗号分隔）来实现。\n\n代码 11.2 Python 中的多重继承\n\n\
    ```python\nclass Person:\n    def __init__(self, name, age):\n        self.name\
    \ = name\n        self.age = age\n    def say_hello(self):\n        print(f\"\
    Hello, my name is {self.name}\")\n\nclass Student:\n    def __init__(self, student_id):\n\
    \        self.student_id = student_id\n    def enroll(self):\n        print(f\"\
    Enrolling student with ID {self.student_id}\")\n\nclass Teacher(Person, Student):\n\
    \    def __init__(self, name, age, teacher_id):\n        Person.__init__(self,\
    \ name, age)\n        Student.__init__(self, teacher_id)\n        self.teacher_id\
    \ = teacher_id\n    def teach(self):\n        print(f\"Teacher {self.name} is\
    \ teaching\")\n\nteacher = Teacher(\"Jane Doe\", 35, 12345)\nprint(teacher.name)\n\
    print(teacher.age)\nprint(teacher.student_id)\nprint(teacher.teacher_id)\nteacher.say_hello()\n\
    teacher.enroll()\nteacher.teach()\n```\n\n在这个例子中，Teacher 类同时继承自 Person 和 Student\
    \ 类。这意味着 Teacher 类可以访问 Person 和 Student 类的所有属性和方法，包括 name、age、student_id 和 enroll\
    \ 方法。Teacher 类也可以添加自己的属性和方法，例如 teacher_id 属性和 teach 方法。\n\n需要注意的是，当使用多重继承时，类定义中父类的顺序可能很重要。如果父类之间存在冲突，列表中的第一个父类将具有优先权。这在\
    \ Python 中被称为方法解析顺序（MRO）。\n\n### 11.3 Python 多级继承\n\n多级继承是面向对象编程（OOP）中的一种继承类型，其中一个类从父类继承属性和方法，而父类本身又从祖父类继承属性和方法。换句话说，继承是分层的，从一代传递到下一代。\n\
    \n代码 11.3 Python 中的多级继承\n\n```python\nclass Animal:\n    def __init__(self, species):\n\
    \        self.species = species\n    def make_sound(self):\n        print(f\"\
    {self.species} makes a sound\")\nclass Mammal(Animal):\n    def __init__(self,\
    \ species, fur_color):\n        Animal.__init__(self, species)\n        self.fur_color\
    \ = fur_color\n    def have_fur(self):\n        print(f\"{self.species} has {self.fur_color}\
    \ fur\")\nclass Dog(Mammal):\n    def __init__(self, breed, fur_color):\n    \
    \    Mammal.__init__(self, \"Dog\", fur_color)\n        self.breed = breed\n \
    \   def bark(self):\n        print(f\"{self.breed} barks\")\ndog = Dog(\"Labrador\"\
    , \"Golden\")\nprint(dog.species)\nprint(dog.fur_color)\nprint(dog.breed)\ndog.make_sound()\n\
    dog.have_fur()\ndog.bark()\n```\n\n在这个例子中，Dog 类继承自 Mammal 类，而 Mammal 类又继承自 Animal\
    \ 类。这创建了一个分层的继承结构，其中 Dog 类可以访问 Mammal 和 Animal 类的所有属性和方法，包括 species、fur_color、make_sound\
    \ 和 have_fur 方法。Dog 类也可以添加自己的属性和方法，例如 breed 属性和 bark 方法。\n\n多级继承允许更组织化和可重用的代码结构，因为属性和方法可以以分层的方式在类之间共享。\n\
    \n### 11.4 Python 中的方法重写\n\n方法重写是面向对象编程（OOP）中的一个特性，其中一个子类为其父类中已定义的方法提供新的实现。子类中的方法与父类中的方法具有相同的名称、返回类型和参数，但实现不同。\n\
    \n在 Python 中，方法重写通过在子类中定义一个与父类中同名的方法来实现。子类中的新实现"
