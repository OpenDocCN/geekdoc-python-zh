    error. Exceptions can be raised explicitly using the “raise” statement, or they
    can be raised implicitly by the Python interpreter when an error occurs. It is
    also possible to handle exceptions using try-except blocks, which allows the program
    to catch and handle specific exceptions while allowing others to continue propagating.


