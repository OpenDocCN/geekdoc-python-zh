    \nThe list is the most fundamental data structure in Python. Because the index\
    \ of the first element of the list is zero, the index of the second element is\
    \ one, and so on, the list is similar to an array in C, C++, or Java. The list,\
    \ on the other hand, is a collection of disparate data elements. That is, a list\
    \ can contain both numeric and character data.\n\nLists can be used to perform\
    \ a variety of operations. Indexing, slicing, adding, multiplying, and checking\
    \ for membership are some examples. In the following sections, we will illustrate\
    \ all of these operations. Aside from that, the Python language has a number of\
    \ built-in functions that we will go over.\n\n### 5.2.1 Creating a List\n\nIn\
    \ Python, a list is created by placing elements inside square brackets [ ] separated\
    \ by commas. For example, to create a list of integers:\n\n```python\nmy_list\
    \ = [1, 2, 3, 4, 5]\n```\n\nYou can also create a list of strings:\n\n```python\n\
    my_list = ['a', 'b', 'c', 'd', 'e']\n```\n\nor a list of mixed data types:\n\n\
    ```python\nmy_list = [1, 'a', 3.14, True, [1, 2, 3]]\n```\n\nYou can also create\
    \ an empty list using the list() constructor or empty square brackets []\n\n```python\n\
    empty_list = []\nempty_list = list()\n```\n\n### 5.2.2 Traversing a List\n\nIn\
    \ Python, you can traverse a list using a for loop. Here is an example of how\
    \ to use a for loop to print out each element in a list:\n\n**Code 5.6: Program\
    \ to print each element of a list using for loop.**\n\n```python\nmy_list = [1,\
