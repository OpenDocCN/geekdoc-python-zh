    # 3.2.1 Python Operator Precedence


    In Python, operator precedence determines the order in which operations are performed.
    Operators with higher precedence are performed before operators with lower precedence.
    For example, in the expression 4 + 5 * 2, the multiplication operation (*) has
    higher precedence than the addition operation (+), so the multiplication is done
    first and the result is added to 4. The expression is evaluated as 4 + (5 * 2),
    which is equal to 14.


    Here is a list of the operators in Python, listed in order of decreasing precedence:


    +   1. () Parentheses

    2. ** Exponentiation (raise to the power)

    3. ~ + - Unary plus and minus (method names for the + and - operators)

    4. * / % // Multiply, divide, modulo and floor division

    5. + - Addition and subtraction

    6. >> << Right and left bitwise shift

    7. & Bitwise ‘AND’

    8. ^ | Bitwise exclusive OR and regular OR

    9. <= < > >= Comparison operators

    10. == != Equality operators

    11. = %= /= //= -= += *= **= Assignment operators

    12. is is not Identity operators

    13. in not in Membership operators

    14. not or and Boolean NOT, OR, and AND'
