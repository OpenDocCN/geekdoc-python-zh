    ### 2.9.1.1 整数


    在 Python 中，整数是一个可以是正数、负数或零的整数。它没有小数部分，由一系列数字表示。例如，整数 123、-456 和 0 都是整数。要在 Python
    中创建一个整数，你可以简单地将一个整数赋值给一个变量。例如：


