    # 5.4.5 Python Set Methods


    In Python, sets are built-in data structures that are used to store unique elements.
    Sets are mutable and unordered, and they are defined using curly braces {} or
    the built-in set() function. Here are some common methods that can be used with
    sets in Python:


    +   - **add(element)**: Adds an element to the set.

    - **clear()**: Removes all elements from the set.

    - **copy()**: Returns a shallow copy of the set.

    - **difference(set)**: Returns a set containing the elements that are only in
    the original set and not in the specified set.

    - **difference_update(set)**: Removes the elements that are in the specified set
    from the original set.

    - **discard(element)**: Removes an element from the set if it is present.

    - **intersection(set)**: Returns a set containing the elements that are common
    to both the original set and the specified set.

    - **intersection_update(set)**: Removes the elements that are not in the specified
    set from the original set.

    - **isdisjoint(set)**: Returns True if the set has no elements in common with
    the specified set.

    - **issubset(set)**: Returns True if all elements of the set are in the specified
    set.

    - **issuperset(set)**: Returns True if all elements of the specified set are in
    the original set.

    - **pop()**: Removes and returns an arbitrary element from the set. If the set
    is empty, it raises a KeyError.

    - **remove(element)**: Removes an element from the set. If the element is not
    in the set, it raises a KeyError.

    - **symmetric_difference(set)**: Returns a set containing the elements that are
    in either the original set or the specified set, but not in both.

    - **symmetric_difference_update(set)**: Inserts the elements from the specified
    set that are not already in the original set, and removes the elements from the
    original set that are in the specified set.

    - **union(set)**: Returns a set containing all elements from the original set
    and the specified set.

    - **update(set)**: Adds the elements from the specified set to the original set.'
