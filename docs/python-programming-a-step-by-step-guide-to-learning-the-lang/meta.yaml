    to the dictionary. If other is an iterable of key/value pairs, the pairs are added
    to the dictionary. If other is a mapping, the mapping''s keys must be new-style
    strings to be accepted as keys. |

    | dict.values() | Returns a view object that displays a list of all the values
    in the dictionary. |


    ## 5.5.6 Python Dictionary Membership Test


    In Python, there are several ways to test for membership in a dictionary, which
    are:


    - 1. **in operator:** You can use the in operator to check if a key is present
    in a dictionary. For example:


    ```python

    >>> d = {''a'': 1, ''b'': 2, ''c'': 3}

    >>> ''a'' in d

    True

    >>> ''d'' in d

    False

    ```


    - 2. **dict.keys() method:** You can use the keys() method of a dictionary to
    get a view of all the keys in the dictionary, which can be used to test for membership.
    For example:


    ```python

    >>> d = {''a'': 1, ''b'': 2, ''c'': 3}

    >>> ''a'' in d.keys()

    True

    >>> ''d'' in d.keys()

    False

    ```


    - 3. **dict.__contains__() method:** You can use the __contains__() method of
    a dictionary to check if a key is present in the dictionary. For example:


    ```python

    >>> d = {''a'': 1, ''b'': 2, ''c'': 3}

    >>> d.__contains__(''a'')

    True

    >>> d.__contains__(''d'')

    False

    ```


    in operator and keys() method is generally recommended for membership testing
    as they are more readable and easy to understand, contains method is also same
    as in operator but it is less readable.


