    # 6.6 Python Anonymous Functions


    In Python, anonymous functions are functions that are defined without a name.
    They are also known as lambda functions and can be used in situations where a
    function is required but a named function is not necessary. Anonymous functions
    can be defined using the lambda keyword in Python.


    ```

    Syntax:

    lambda arguments: expression

    ```


    The lambda keyword is used to define an anonymous functions in Python. Usually,
    such a function is meant for one-time use.


    This function can have any number of arguments but only one expression, which
    is evaluated and returned. One is free to use lambda functions wherever function
    objects are required.


    Here is an example of an anonymous function in Python:


    # Code 6.7 : Illustrate the use of lambda function


    ```

    x = lambda a : a + 10

    print(x(5))

    ```


    In this example, the anonymous function is defined using the lambda keyword, followed
    by the argument(s) and the function''s expression. The function takes one argument
    a and returns the value of a plus 10. When the function is called by providing
    the argument 5 as input, x(5), the function runs and returns the value 5+10=15
    as output.


    Here is an example of an anonymous function with multiple arguments:


    ```

    x = lambda a,b,c : a + b + c

    print(x(2,5,8))

    ```


    Lambda functions are commonly used when a small, one-time-use function is required.
    They can also be used as a function argument, for example, as a sorting key function,
    a filter function, a map function, and so on. It''s also possible to use lambda
    functions in combination with other built-in functions such as map, filter, and
    reduce.'
