    \ 块也总会被执行。\n\n## 8.4 Python 用户自定义异常\n\n在 Python 中，你可以通过创建一个继承自内置 Exception 类的新类来定义自己的自定义异常。这允许你创建针对程序需求定制的特定类型的异常。\n\
