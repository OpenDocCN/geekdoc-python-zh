    # 2.3 Python Statements


    In Python, a statement is a single line of code that performs a specific action
    or instruction. There are several types of statements in Python, including:


    +   • **Expressions:** These are statements that evaluate to a value, such as
    mathematical operations or function calls. Examples include “2 + 2” or “print(‘Hello,
    world!’)”.

    • **Assignment statements:** These are statements that assign a value to a variable.
    Examples include “x = 2” or “name = ‘John’”.

    • **Control flow statements:** These are statements that control the flow of execution
    of a program, such as conditional statements (if/else) and loops (for/while).

    • **Function and class definitions:** These are statements that define a function
    or class, respectively. Examples include “def my_function():” and “class MyClass:”.

    • **Import statements:** These statements are used to import modules or packages
    in python. Examples include “import os” or “from math import sqrt”'
