    Control structures are blocks of code that allow a programmer to specify the flow
    of execution in a program. In Python, there are three main types of control structures:
    if statements, for loops, and while loops.


    If statements allow the programmer to specify a condition, and if the condition
    is met, a block of code will be executed. If statements can also include optional
    “else” clauses, which will execute if the condition is not met.


    For loops allow the programmer to iterate over a sequence of elements, such as
    a list or a string. The programmer can specify the variable to be used for each
    element in the sequence, and a block of code to be executed for each element.


    While loops allow the programmer to specify a condition, and as long as the condition
    is met, a block of code will be executed. Care must be taken while loops, as it
    is easy to create an infinite loop if the condition is always met.


    Control structures are an essential part of programming, as they allow the programmer
    to specify the order in which code is executed and to repeat certain actions.'
