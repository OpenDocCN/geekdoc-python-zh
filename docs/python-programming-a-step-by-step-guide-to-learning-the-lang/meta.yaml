    \ debug compared to iterative solutions.\n- 2. It can consume a large amount of\
    \ memory due to the call stack.\n- 3. The risk of stack overflow error if the\
    \ recursion goes too deep.\n- 4. It can be less efficient as compared to iterative\
    \ solution due to the overhead of function calls.\n- 5. Recursive solutions may\
