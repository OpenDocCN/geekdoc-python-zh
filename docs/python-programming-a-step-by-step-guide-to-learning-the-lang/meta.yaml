    # 5.3.3.2 Negative Indexing


    In Python, negative indexing allows you to access elements in a list or array
    by counting from the end of the list or array, rather than the beginning. For
    example, if you have a list called my_list and you want to access the last element
    of the list, you can use the index -1 to do so: my_list[-1]. Similarly, you can
    use -2 to access the second to last element, -3 to access the third to last element,
    and so on.


    # 5.3.3.3 Tuple Slicing


    In Python, tuple slicing allows you to access a range of elements in a tuple by
    specifying a start and stop index, separated by a colon. For example, if you have
    a tuple called my_tuple and you want to access the second and third elements of
    the tuple, you can use the slice my_tuple[1:3]. This will return a new tuple containing
    the second and third elements of the original tuple.


    Code 5.23: A program that demonstrates tuple slicing in Python:


    ```

    # Define a tuple

    my_tuple = (1, 2, 3, 4, 5)


    # Use tuple slicing to access a range of elements

    sliced_tuple = my_tuple[1:4]

    print(sliced_tuple) # Output: (2, 3, 4)


    # Use negative indexing with tuple slicing

    sliced_tuple = my_tuple[-4:-1]

    print(sliced_tuple) # Output: (2, 3, 4)


    # Use step value in tuple slicing

    sliced_tuple = my_tuple[1:5:2]

    print(sliced_tuple) # Output: (2, 4)

    ```


    In this example, we first define a tuple my_tuple containing the elements 1, 2,
    3, 4, and 5. Then we use tuple slicing to access a range of elements by specifying
    a start and stop index. We also use negative indexing with tuple slicing and step
    value in tuple slicing to get desired output.'
