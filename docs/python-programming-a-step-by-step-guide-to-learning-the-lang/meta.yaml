    # 9.4 tell() and seek() Methods


    The tell() method in Python returns the current position of the file pointer.
    This is an integer value that represents the number of bytes from the beginning
    of the file.


    The seek() method in Python allows you to move the file pointer to a specific
    position. You can specify the position as an integer value, measured in bytes
    from the beginning of the file. The method takes two arguments: the first argument
    is the position to move the pointer to, and the second argument is an optional
    value that specifies how to interpret the first argument.


    For example, the following code opens a file, reads the current position, moves
    the pointer to a new position, and then reads the new position:


    ```

    f = open("example.txt", "r")

    print(f.tell()) # prints 0

    f.seek(5)

    print(f.tell()) # prints 5

    f.close()

    ```


    It’s important to note that after moving the pointer, it’s possible to read or
    write the file from the new position.


