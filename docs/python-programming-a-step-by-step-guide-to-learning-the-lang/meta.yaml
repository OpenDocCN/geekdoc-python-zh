    # 5.4.8 Frozen Sets


    In Python, a frozen set is a built-in immutable set data type. This means that
    once a frozen set is created, its elements cannot be added, removed or modified.
    Frozen sets are defined using the frozenset() built-in function or by using curly
    braces with a ‘f’ prefix. A frozen set can be useful in situations where you want
    to use a set as a key in a dictionary or as an element in another set, but you
    don’t want the set to be modified. Here’s an example of how to create a frozen
    set:


    ```

    # Creating a frozen set using the frozenset() function

    fruits = frozenset(["apple", "banana", "cherry"])

    print(fruits) # output: frozenset({‘apple’, ‘banana’, ‘cherry’})


    # Creating a frozen set using a set literal

    fruits = f{‘apple’, ‘banana’, ‘cherry’}

    print(fruits) # output: frozenset({‘apple’, ‘banana’, ‘cherry’})

    ```


    As you can see, the output of the print statement is a frozenset object.

    You can use the same set methods, such as union() and intersection() on frozen
    sets and also use the built-in set functions such as len(), min() and max() etc.
    Because frozen sets are immutable, you can’t add or remove elements from them
    after they’ve been created, and you can’t modify their elements either.'
