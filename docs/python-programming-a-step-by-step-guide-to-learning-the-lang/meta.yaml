    It’s also important to note that Python follows the order of operations (PEMDAS)
    when evaluating arithmetic expressions.


    PEMDAS stands for Parentheses, Exponents, Multiplication and Division, and Addition
    and Subtraction. It is the order in which Python (and most other programming languages
    and math systems) evaluates arithmetic operations in an expression.


    +   1. Parentheses: Expressions within parentheses are evaluated first.

    2. Exponents: Exponentiation (ie raising to a power) is done next.

    3. Multiplication and Division (from left to right): These operations are done
    next, from left to right.

    4. Addition and Subtraction (from left to right): These operations are done last,
    from left to right.


