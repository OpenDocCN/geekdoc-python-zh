    ## 2.10.2 Python 中的显式类型转换


    显式类型转换，也称为“类型转换”，是使用内置函数或方法将值从一种数据类型显式转换为另一种数据类型的过程。Python 提供了几个内置函数来执行显式类型转换，例如
    `int()`、`float()`、`str()` 等。


