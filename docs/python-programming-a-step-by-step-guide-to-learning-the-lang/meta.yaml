    ```

    y = x * 2

    print(y)

    ```


    This would define a variable x with the value 5, and then define a variable y
    with the value 10 (which is the result of multiplying x by 2). Finally, it would
    print the value of y to the console.


    You can exit the interactive interpreter by typing exit() or quit() at the command
    prompt and pressing Enter. This will return you to the terminal or command prompt.


    ## 1.12.2 The Script Mode Programming


    In addition to running Python code in interactive mode, you can also write code
    in a file and run it as a script. This is a common way to write larger Python
