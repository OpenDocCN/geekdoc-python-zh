    ## 6.9 Scope and Lifetime of Variables\n\nIn Python, a variable’s scope refers\
    \ to the portion of the program where the variable can be accessed. The lifetime\
    \ of a variable refers to the period of time that a variable exists and retains\
    \ its value.\n\nThere are two types of scope in Python:\n\n- 1. **Local scope:**\
    \ A variable defined within a function or a block of code has a local scope and\
    \ can only be accessed within that function or block.\n- 2. **Global scope:**\
    \ A variable defined outside of any function or block has a global scope and can\
    \ be accessed throughout the entire program.\n\nThe lifetime of a variable in\
    \ Python depends on where the variable is defined: Variables defined within a\
    \ function have a lifetime that lasts only as long as the function call. Once\
    \ the function call is finished, the variable is destroyed. Variables defined\
    \ outside of any function have a lifetime that lasts as long as the program is\
    \ running. Once the program exits, the variable is destroyed. It’s important to\
    \ note that in Python, you can use `global` keyword inside function to make a\
    \ variable global, otherwise it will be treated as local variable.\n\n## 6.10\
