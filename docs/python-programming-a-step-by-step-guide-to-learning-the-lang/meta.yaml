    \n### 4.2.1 循环的类型\n\n- while 循环\n- 无限循环\n- for 循环\n- 嵌套循环\n\n### 4.2.2 Python\
    \ While 循环\n\nPython 中的 while 循环用于只要某个条件为 True，就重复执行一段代码。while 循环的语法如下：\n\n```\n\
    while condition:\n    # 要执行的代码\n```\n\nwhile 循环内部的代码将被重复执行，直到条件变为 False。确保条件最终会变为\
    \ False 很重要，否则循环将无限期运行，这被称为无限循环。以下是 Python 中 while 循环的一个示例：\n\n**代码 4.9  打印从 0\
    \ 到 9 的数字的程序。**\n\n```python\ni = 0\nwhile i < 10:\n    print(i)\n    i += 1\n\
    ```\n\n这个 while 循环将打印数字 0 到 9。\n\n也可以在 while 循环内部使用 `break` 语句提前退出循环，或者使用 `continue`\
    \ 语句跳过当前迭代的剩余部分并继续下一次迭代。\n\n```python\ni = 0\nwhile True:\n    if i == 5:\n  \
    \      break\n    print(i)\n    i += 1\n```\n\n这个 while 循环将无限期运行，但 `break` 语句会在\
    \ `i` 变为 5 时导致它退出。输出将是数字 0 到 4。\n\n```python\ni = 0\nwhile True:\n    i += 1\n\
    \    if i % 2 == 0:\n        continue\n    print(i)\n    if i == 10:\n       \
    \ break\n```\n\n这个 while 循环也将无限期运行，但 `continue` 语句会在 `i` 为偶数时导致它跳过当前迭代的剩余部分，而\
    \ `break` 语句会在 `i` 变为 10 时导致它退出。输出将是奇数 1 到 9。\n\n这是另一个演示 Python 中 while 循环用法的程序：\n\
    \n**代码 4.10  计算用户输入数字之和的程序。**\n\n```python\n# 初始化变量\nsum = 0\nnumber = 1\n# 要求用户输入数字\n\
    while number != 0:\n    number = int(input(\"Enter a number (0 to quit): \"))\n\
    \    sum = sum + number\n# 打印结果\nprint(\"The sum of the numbers is\", sum)\n```\n\
    \n**输出：**\n\n```\nEnter a number (0 to quit): 5\nEnter a number (0 to quit): 10\n\
    Enter a number (0 to quit): 15\nEnter a number (0 to quit): 0\nThe sum of the\
    \ numbers is 30\n```\n\n在上面的程序中，只要 `number` 的值不等于 0，while 循环就会继续执行。程序要求用户输入一个数字，并使用\
    \ `int()` 将输入转换为整数。然后将输入的数字加到所有先前数字的总和中。当用户输入 0 时，循环终止，并打印最终结果。\n\n### 4.2.3 无限循环\n\
    \n无限循环是一种由于循环条件始终为 True 而无限期运行的循环。如果条件在循环内部没有更新，或者条件无法满足，就可能发生这种情况。以下是 Python\
    \ 中无限循环的一个示例：\n\n```python\nwhile True:\n    print(“Hello, World!”)\n```\n\n这个循环将无限期打印\
    \ “Hello, World!”，因为条件 `True` 始终为 True。这个循环将一直打印消息 “Hello, World!”，直到程序被中断。要中断程序，你可以在终端中使用\
    \ **CTRL + C**，或者在 IDLE 编辑器中使用 **CTRL + Break**。\n\n使用 while 循环时要小心，因为无限循环可能导致你的程序崩溃或变得无响应。为避免无限循环，请确保循环的条件最终可以变为\
    \ False，或者在满足某个条件时使用 `break` 语句退出循环。\n\n```python\ni = 0\nwhile True:\n    print(i)\n\
    \    i += 1\n    if i == 10:\n        break\n```\n\n在这个示例中，`break` 语句在 `i` 变为\
    \ 10 时导致循环退出，防止循环无限期运行。输出将是数字 0 到 9。\n\n### 4.2.4 在 While 循环中使用 else\n\n在 Python\
    \ 中，while 循环的 else 子句可用于指定在循环执行完毕后应执行的一段代码，但仅当循环正常完成时（即，如果循环没有被 `break` 语句提前退出）。以下是\
    \ Python 中在 while 循环中使用 else 子句的示例：\n\n**代码 4.11  演示在 while 循环中使用 else 子句的程序。**\n\
    \n```python\ni = 0\nwhile i < 10:\n    print(i)\n    i += 1\nelse:\n    print(“Done!”)\n\
    ```\n\n在这个示例中，while 循环将打印数字 0 到 9，然后 else 子句将被执行，打印 “Done!”。如果 while 循环被 `break`\
    \ 语句提前退出，else 子句将不会被执行。例如：\n\n```python\ni = 0\nwhile True:\n    print(i)\n  \
    \  i += 1\n    if i == 5:\n        break\nelse:\n    print(“Done!”)\n```\n\n在这个示例中，while\
    \ 循环将打印数字 0 到 4，然后在 `i` 变为 5 时退出。else 子句将不会被执行。\n\nwhile 循环的 else 子句对于执行清理代码或处理循环根本没有执行的情况（例如，如果循环的条件从一开始就是\
    \ False）很有用。\n\n### 4.2.5 Python for 循环\n\nPython 中的 for 循环用于遍历一个序列或可迭代对象，例如列表、元组或字符串。for\
    \ 循环的语法如下：\n\n```\nfor item in iterable:\n    # 要执行的代码\n```\n\nfor 循环将遍历可迭代对象中的项目，对于每个项目，它会将值赋给\
    \ `item` 变量并执行循环内部的代码。以下是 Python 中遍历数字列表的 for 循环示例：\n\n**代码 4.12  演示 Python 中遍历数字列表的\
    \ for 循环的程序。**\n\n```python\nfor i in [1, 2, 3, 4, 5]:\n    print(i)\n```\n\n\
    这个 for 循环将打印数字 1 到 5。也可以在 for 循环内部使用 `break` 语句提前退出循环，或者使用 `continue` 语句跳过当前迭代的剩余部分并继续下一次迭代。\n\
    \n```python\nfor i in [1, 2, 3, 4, 5]:\n    if i == 3:\n        break\n    print(i)\n\
    ```\n\n这个 for 循环将打印数字 1 和 2，然后在遇到数字 3 时退出。\n\n```python\nfor i in [1, 2, 3, 4,\
    \ 5]:\n    if i % 2 == 0:\n        continue\n    print(i)\n```\n\n这个 for 循环将打印奇数\
    \ 1、3 和 5，因为 `continue` 语句会在 `i` 为偶数时导致循环跳过当前迭代的剩余部分。\n\n**代码 4.13  打印列表中所有数字之和的程序。**\n\
    \n```python\nnumbers = [1, 2, 3, 4, 5]\nsum = 0\nfor num in numbers:\n    sum\
    \ += num\nprint(\"Sum of all numbers:\", sum)\n```"
