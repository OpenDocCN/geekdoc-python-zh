  md: '# # Exception Handling


    +   ### Highlights

    - Python Exception

    - Python Built-in Exceptions

    - Exception Handling

    - Python User-Defined Exceptions


    An exception in Python is an event that occurs during the execution of a program
    that disrupts the normal flow of instructions. When an exception occurs, the program
    will stop running and an exception object will be created, containing information
    about the error. This allows the program to handle the exception and take appropriate
    action, such as displaying an error message or attempting to recover from the
    error. Exceptions can be raised explicitly using the “raise” statement, or they
    can be raised implicitly by the Python interpreter when an error occurs. It is
    also possible to handle exceptions using try-except blocks, which allows the program
    to catch and handle specific exceptions while allowing others to continue propagating.


    # ## 8.1 Exception


    In Python, an exception is an event that occurs during the execution of a program
    that disrupts the normal flow of instructions. Exceptions are typically caused
    by errors in the program, such as division by zero,'
