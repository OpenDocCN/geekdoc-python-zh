  mdcn: "## 2.11 输入与输出\n\n在 Python 中，有多种方式可以从用户那里接收输入并向用户提供输出。以下是一些常见的 Python 接收输入的方式：\n\
    \n- **使用 `input()` 函数**：此函数从用户那里读取一行文本。例如：\n\n```\nname = input(\"Enter your name:\
    \ \")\nprint(\"Hello, \" + name)\n```\n\n- **使用命令行参数**：当你从命令行运行 Python 脚本时，可以在脚本名之后传递参数。例如，如果你有一个名为\
    \ `myscript.py` 的脚本，你可以这样运行它并传递参数：`python myscript.py arg1 arg2`。你可以在 Python 脚本中使用\
    \ `sys` 模块来访问命令行参数。以下是如何在脚本中访问命令行参数的示例：\n\n```\nimport sys\n\n# Access the arguments\
    \ using sys.argv\narg1 = sys.argv[1]\narg2 = sys.argv[2]\nprint(\"Argument 1:\"\
    , arg1)\nprint(\"Argument 2:\", arg2)\n```\n\n以下是如何从命令行运行此脚本的示例：\n\n```\npython\
    \ myscript.py hello world\n```\n\n这将打印出以下输出：\n\n```\nArgument 1: hello\nArgument\
    \ 2: world\n```\n\nPython 中还有其他接收输入的方式，例如使用 `argparse` 模块或从文件中读取，但这些是最基本的方法。要向用户提供输出，你可以使用\
    \ `print()` 函数。例如：\n\n```\nprint(\"Hello, world!\")\n```\n\n这会将字符串 “Hello, world!”\
    \ 打印到控制台。\n\n## 2.12 导入\n\n在 Python 中，`import` 语句用于导入模块，这些模块的函数或变量可以在你当前的程序中使用。例如，要导入\
    \ `math` 模块，你可以使用以下代码：\n\n```\nimport math\n```\n\n这允许你使用点号表示法来访问 `math` 模块中定义的函数和变量。例如，你可以像这样使用\
    \ `math` 模块中的 `sqrt()` 函数：\n\n### 代码 2.41 Python 中 import 语句的示例\n\n```\nimport\
    \ math\nx = math.sqrt(25)\nprint(x) # Output: 5.0\n```\n\n你也可以使用 `from` 关键字从模块中导入特定的函数或变量。例如：\n\
    \n### 代码 2.42 Python 中 import 语句的示例\n\n```\nfrom math import sqrt\nx = sqrt(25)\n\
    print(x) # Output: 5.0\n```\n\n## 2.13 总结\n\n在本章中，我们介绍了 Python 语言的基础知识，包括关键字、标识符、变量以及它们的使用规则。我们还讨论了\
    \ Python 文档、单行和多行注释，以及各种数据类型，如数字、字符串、列表、元组、集合、字典和文件。我们演示了如何在 Python 中使用交互式输入和输出函数，并展示了如何进行格式化的输入和输出。最后，我们演示了如何使用\
    \ `import` 命令在一个模块中调用和使用另一个模块。\n\n## 复习题\n\n1.  什么是 Python 关键字，它们在程序中如何使用？\n2.\
    \  Python 标识符和 Python 关键字之间有什么区别？\n3.  缩进如何影响 Python 程序的结构？\n4.  一些用于流程控制和迭代的常见\
    \ Python 语句有哪些？\n5.  `input()` 函数在 Python 中是如何工作的，它的输出数据类型是什么？\n6.  在 Python 程序中使用文档的目的是什么，以及如何编写文档？\n\
    7.  `import` 语句在 Python 中是如何工作的，有哪些不同类型的导入？\n8.  在 Python 中执行输出操作有哪些不同的方式？\n9.\
    \  我们如何在 Python 程序中处理错误和异常，以及有哪些内置的异常类型？\n10. Python 中局部变量和全局变量有什么区别，以及何时应该使用每种变量？\n\
    11. 以下哪项不是 Python 数据类型？\n    a. list\n    b. tuple\n    c. dictionary\n    d.\
    \ Matrix\n12. ‘Hello, World!’ 在 Python 中的数据类型是什么？\n    a. int\n    b. float\n\
    \    c. string\n    d. boolean\n\n# 3 运算符与表达式\n\n**要点**\n- 所有 Python 运算符\n- 运算符的优先级和结合性\n\
    - 表达式\n\nPython 是一种用途广泛且流行的编程语言，它提供了一系列运算符来帮助执行各种任务。其简洁性和可读性使其成为所有技能水平的程序员的理想选择。无论你是初学者还是经验丰富的程序员，使用\
    \ Python 运算符都能极大地增强你的编码能力并提高整体产出。从基本的算术运算符到逻辑运算符，Python 拥有你自信开启编码之旅所需的一切。凭借其庞大的库和框架，Python\
    \ 为开发复杂算法、应用程序和数据分析流程提供了一套全面的工具。\n\n## 3.1 运算符\n\nPython 中的运算符是特殊符号，用于对一个、两个或多个操作数（值）执行特定操作并产生结果。运算符可以分为不同的类别，例如算术、比较、逻辑、位运算、赋值和身份运算符，每种都有特定的用途。\n\
    \n54 Python 编程：分步学习指南\n\n- 算术运算符\n- 比较（关系）运算符\n- 逻辑运算符\n- 布尔运算符\n- 赋值运算符\n- 位运算符\n\
    - 成员运算符\n- 身份运算符\n\n### 3.1.1 算术运算符\n\n算术运算符是 Python 中的基本数学运算符，用于执行加法、减法、乘法、除法等算术运算。这些运算符由\
    \ +、-、*、/、% 和 ** 等符号表示。它们用于对数字执行数学运算并产生单个输出值。例如，加法 (+) 运算符用于将两个值相加，减法 (-) 运算符用于从一个值中减去另一个值，依此类推。使用这些运算符，你可以在\
    \ Python 中执行各种数学计算，使其成为数值计算和数据分析的理想选择。此外，Python 支持复数，可以使用算术运算符进行操作，使其成为高级数学和科学计算的强大工具。\n\
    \n表 3.1：算术运算符\n\n| 运算符 | 符号 | 描述 |\n| :--- | :--- | :--- |\n| 加法 | + | 将两个值相加\
    \ |\n| 减法 | - | 从一个值中减去另一个值 |\n| 乘法 | * | 将两个值相乘 |\n| 除法 | / | 将一个值除以另一个值（返回浮点数）\
    \ |\n| 整除 | // | 将一个值除以另一个值并向下取整到最接近的整数 |\n| 取模 | % | 返回除法运算的余数 |\n| 幂运算 | **\
    \ | 将一个值提升到指定幂次 |\n\n### 代码 3.1 算术运算符示例\n\n```\na = 5\nb = 2\nprint(a + b)   \
    \ # 7\nprint(a - b)    # 3\nprint(a * b)    # 10\nprint(a / b)    # 2.5\nprint(a\
    \ // b)   # 2\nprint(a % b)    # 1\nprint(a ** b)   # 25\n```\n\n让我们看另一个例子：\n\n\
    ### 代码 3.2 算术运算符示例\n\n```\n# Addition\nx = 3 + 4\nprint(x)  # Output: 7\n\n# Subtraction\n\
    x = 3 - 4\nprint(x)  # Output: -1\n\n# Multiplication\nx = 3 * 4\nprint(x)  #\
    \ Output: 12\n\n# Division\nx = 3 / 4\nprint(x)  # Output: 0.75\n\n# Modulus\n\
    x = 7 % 3\nprint(x)  # Output: 1\n\n# Exponentiation\nx = 3 ** 4\nprint(x)  #\
    \ Output: 81\n\n# Floor division\nx = 7 // 3\nprint(x)  # Output: 2\n```\n\n同样重要的是要注意，Python\
    \ 在计算算术表达式时遵循运算顺序（PEMDAS）。\n\nPEMDAS 代表括号、指数、乘法和除法、加法和减法。它是 Python（以及大多数其他编程语言和数学系统）在表达式中计算算术运算的顺序。\n\
    \n1.  括号：首先计算括号内的表达式。\n2.  指数：接下来进行幂运算（即提升到指定幂次）。\n3.  乘法和除法（从左到右）：接下来从左到右执行这些运算。\n\
    4.  加法和减法（从左到右）：最后从左到右执行这些运算。\n\n### 3.1.2 比较运算符\n\n比较运算符是任何编程语言的重要组成部分，Python\
    \ 也不例外。这些运算符允许你比较值并确定它们之间的关系。比较的结果是一个布尔值，要么是 `True`，要么是 `False`，可用于在代码中做出决策。在\
    \ Python 中，可以使用以下比较运算符：“==”（等于）、“!=”（不等于）、“>”（大于）、“<”（小于）、“>=”（大于或等于）和 “<=”（小于或等于）。这些运算符可用于比较数字、字符串甚至对象。需要注意的是，使用比较运算符是编程的一个基本方面，理解如何正确使用它们对于编写有效和高效的代码至关重要。\n\
    \n表 3.2：比较运算符\n\n| 运算符 | 含义 | 示例 | 结果 |\n| :--- | :--- | :--- | :--- |\n| == |\
    \ 等于 | 3 == 2 | False |"
