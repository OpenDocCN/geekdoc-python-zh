    ## 5.3.3.8 Advantages of Tuple


    There are several advantages to using tuples in Python:


    1. **Performance:** Tuples are faster than lists because they are immutable and
    require less memory.

    2. **Immutable:** Because tuples are immutable, they are safe to use as keys in
    a dictionary or as elements of a set, whereas lists cannot be used as keys in
    a dictionary or as elements of a set.

    3. **Safety:** Tuples provide a way to separate and store related data that should
    not be modified. For example, you can use a tuple to store the x and y coordinates
    of a point, and be sure that the values won’t change accidentally.

    4. **Readability:** Tuples can make code more readable by allowing you to group
    related data together. This makes it easy to understand the meaning of the data
    and what it represents.

    5. **Easy to use:** Tuples are easy to create and use. They have a simple syntax
    and can be created with or without parentheses.

    6. **Iterable:** Tuples are iterable which means you can iterate over the elements
    of a tuple using a for loop.

    7. **Return multiple values:** Tuples can be used to return multiple values from
    a function, which is more efficient than using a data structure like a list or
    dictionary.


    ## 5.4 Python Sets


    In Python, a set is a collection of unique elements. Sets are defined using curly
    braces {} or the set() function.


    **Code 5.26: To create a set in Python:**


    ```

    # Using curly braces

    my_set = {1, 2, 3, 4, 5}


    # Using the set() function

    my_set = set([1, 2, 3, 4, 5])

    ```


    Sets are unordered, which means that the elements in a set have no specific order.
    Sets are also mutable, which means that you can add, remove, and update elements
    in a set after it is created. For example, you can use the add() method to add
    an element to a set, the remove() method to remove an element from a set, and
    the update() method to add multiple elements to a set at once.


    Sets also support mathematical set operations like union, intersection and difference.


    **Code 5.27: Illustration of union, intersection and difference**


    ```

    # Define two sets

    set1 = {1, 2, 3}

    set2 = {3, 4, 5}


    # Union

    print(set1.union(set2)) # Output: {1, 2, 3, 4, 5}


    # Intersection

    print(set1.intersection(set2)) # Output: {3}


    # Difference

    print(set1.difference(set2)) # Output: {1, 2}

    ```


    It’s important to note that sets do not allow duplicate values, if you try to
    add a duplicate value to a set, it will be ignored.


    ### 5.4.1 Creating a Set


    In Python, a set is a collection of unique items. You can create a set using curly
    braces {} or the set() function. For example:


    ```

    # Using curly braces

    my_set = {1, 2, 3}


    # Using the set() function

    my_set = set([1, 2, 3])

    ```


    You can also create a set from a list or other iterable by passing it as an argument
    to the set() function as given in code 5.36:


    ```

    my_list = [1, 2, 3]

    my_set = set(my_list)

    ```


    ### 5.4.2 Changing/Adding Elements to a Set


    In Python, sets are mutable, meaning that elements can be added or removed from
    a set after it is created. To add an element to a set, use the add() method. For
    example:


    ```

    my_set = {1, 2, 3}

    my_set.add(4)

    print(my_set)

    ```


    This will add the element 4 to the set my_set.

    To add multiple elements to a set at once, use the update() method. This method
    can take any iterable, such as a list or another set, as an argument. For example:


    ```

    my_set = {1, 2, 3}

    my_set.update([4, 5, 6])

    print(my_set)

    ```


    ### 5.4.3 Removing Elements from a Set


    To remove an element from a set, use the remove() method. If the element is not
    present in the set, a KeyError will be raised. For example:


    ```

    my_set = {1, 2, 3}

    my_set.remove(2)

    print(my_set)

    ```


    This will remove the element 2 from the set my_set.


    Alternatively, you can use the discard() method to remove an element from a set.
    This method does not raise an error if the element is not present in the set.


    ```

    my_set = {1, 2, 3}

    my_set.discard(4)

    print(my_set)

    ```


    This will not raise any error, as 4 is not in the set my_set.


    ### 5.4.4 Python Set Operations


    In Python, sets are a built-in data type that can be used to store a collection
    of unique elements. The following are some common set operations that can be performed
    in Python:


    1. **Union:** The union of two sets returns a new set that contains all the elements
    from both sets. The union operation is performed using the | operator or the union()
    method.

    2. **Intersection:** The intersection of two sets returns a new set that contains
    only the elements that are common to both sets. The intersection operation is
    performed using the & operator or the intersection() method.

    3. **Difference:** The difference of two sets returns a new set that contains
    the elements that are in the first set but not in the second set. The difference
    operation is performed using the - operator or the difference() method.

    4. **Symmetric Difference:** The symmetric difference of two sets returns a new
    set that contains elements that are in either of the sets but not in both. The
    symmetric difference operation is performed using the ^ operator or the symmetric_difference()
    method.

    5. **Subset:** To check if a set is a subset of another set, you can use the <=
    operator or the issubset() method.

    6. **Superset:** To check if a set is a superset of another set, you can use the
    >= operator or the issuperset() method.


    It''s worth noting that all these set operations return a new set and the original
    sets remain unchanged.


    #### 5.4.4.1 Set Union


    In Python, the union of two sets can be found using the union() method or the
    | operator. For example, given two sets A and B, the union can be found as follows:


    ```

    A = {1, 2, 3}

    B = {3, 4, 5}

    C = A.union(B) # C = {1, 2, 3, 4, 5}

    D = A | B # D = {1, 2, 3, 4, 5}

    ```


    Both A.union(B) and A | B will return a new set that contains all the elements
    from both sets A and B, without duplicates.


    #### 5.4.4.2 Set Intersection


    In Python, the intersection of two sets can be found using the intersection()
    method or the & operator. For example, given two sets A and B, the intersection
    can be found as follows:


    ```

    A = {1, 2, 3}

    B = {2, 3, 4}

    C = A.intersection(B) # C = {2, 3}

    D = A & B # D = {2, 3}

    ```


    Both A.intersection(B) and A & B will return a new set that contains the elements
    that exist in both sets A and B.


    #### 5.4.4.3 Set Difference


    In Python, the difference between two sets can be found using the difference()
    method or the - operator. For example, given two sets A and B, the difference
    between A and B can be found as follows:


    **Code 5.42:**


    ```

    A = {1, 2, 3}

    B = {2, 3, 4}

    C = A.difference(B) # C = {1}

    D = A - B # D = {1}

    ```


    Both A.difference(B) and A - B will return a new set that contains the elements
    that exist in set A but not in set B.


    It''s also worth mentioning Symmetric difference, it can be found using the symmetric_difference()
    method or the ^ operator. It returns a set of elements that is in either of the
    sets but not in both.


    ```

    A = {1, 2, 3}

    B = {2, 3, 4}

    C = A.symmetric_difference(B) # C = {1, 4}

    D = A ^ B # D = {1, 4}

    ```


    #### 5.4.4.4 Set Symmetric Difference


    In Python, the symmetric difference of two sets can be found using the symmetric_difference()
    method or the "^" operator. For example, if A = {1, 2, 3} and B = {2, 3, 4}, you
    can find the symmetric difference of A and B using the following code 5.44:


    ```

    A = {1, 2, 3}

    B = {2, 3, 4}


    # Using the symmetric_difference() method

    symmetric_diff = A.symmetric_difference(B)

    print(symmetric_diff) # output: {1, 4}


    # Using the "^" operator

    symmetric_diff = A ^ B

    print(symmetric_diff) # output: {1, 4}

    ```


    Both the symmetric_difference() method and the "^" operator will return a new
    set containing the symmetric difference of the two sets.'
