- md: "## 7 Python Modules\n\n### Highlights\n- Python Modules\n- Creating a Module\n\
    - Importing Module\n- Standard Modules\n- Python Packages\n\nA module in Python\
    \ is a file containing Python definitions and statements. The file name is the\
    \ module name with the suffix .py added. Modules can define functions, classes,\
    \ and variables, and can also include runnable code. The import statement is used\
    \ to include a module in a Python script and access the definitions and statements\
    \ defined within the module. Additionally, specific functions or variables can\
    \ be imported from a module using the from ... import ... statement. Aliases can\
    \ also be assigned to modules or functions using the as keyword when importing.\n\
    \nModules can also be included in Python’s built-in library, such as sys and os,\
    \ which provide access to certain variables and functions used or maintained by\
    \ the interpreter and operating system functionality respectively.\n\n### 7.1\
    \ Need of Module\n\nModules are a fundamental concept in programming and are used\
    \ to organize and reuse code. They are a way to divide a large program into smaller\
    \ and more manageable parts. By breaking code into modules, you can make it easier\
    \ to understand, maintain, and update. Modules provide a way to organize related\
    \ code and variables into a separate namespace, which helps to avoid naming conflicts\
    \ and makes your code more organized and readable. Additionally, modules allow\
    \ you to reuse code across multiple projects, saving time and effort. Modules\
    \ also make it easy to use the built-in and third-party functionality in Python.\
    \ Python has a large library of built-in modules that provide a wide range of\
    \ functionality, and a large community of developers who have created a wide variety\
    \ of modules that can be imported and used in your code. This makes it easy to\
    \ accomplish certain tasks, such as machine learning, web scraping, and more.\n\
    \nModules in Python serve several purposes, including:\n\n1. **Code Reusability:**\
    \ Modules allow you to organize your code into reusable and self-contained blocks.\
    \ This means that you can write a module once and use it in multiple projects,\
    \ saving time and effort.\n2. **Namespace:** Modules provide a way to organize\
    \ related code and variables into a separate namespace. This helps to avoid naming\
    \ conflicts and makes your code more organized and readable.\n3. **Code Maintenance:**\
    \ Modules help to separate different parts of your code and make it easier to\
    \ maintain. You can make changes to a module without having to worry about affecting\
    \ other parts of your code.\n4. **Standard Library:** Python has a large library\
    \ of built-in modules that provide a wide range of functionality, including file\
    \ handling, string manipulation, mathematical functions, and more. These modules\
    \ can be imported and used in your code, saving time and effort in developing\
    \ your own solutions.\n5. **Third-party Libraries:** Python has a large community\
    \ of developers who have created a wide variety of modules that can be imported\
    \ and used in your code. These libraries provide additional functionality and\
    \ can make it easier to accomplish certain tasks, such as machine learning, web\
    \ scraping, and more.\n\nIn summary, modules help you to organize your code, increase\
    \ code reusability, and make it easy to use the built-in and third-party functionality.\n\
    \n### 7.2 Module Definition\n\nA module in Python is a file containing Python\
    \ definitions and statements. The file name is the module name with the suffix\
    \ .py added. For example, a file named “example.py” would be considered a module\
    \ in Python. A module can contain various types of definitions such as functions,\
    \ classes, and variables, and can also include runnable code. Functions and classes\
    \ defined in a module can be called and instantiated by other parts of the program.\
    \ Variables defined in a module can be accessed and modified by other parts of\
    \ the program.\n\nYou can create a module by creating a new .py file and adding\
    \ your Python code to it. Once the module is created, it can be imported into\
    \ other Python scripts using the import statement and the definitions and statements\
    \ within the module can be accessed using the dot notation. For example, if you\
    \ have a module called example.py that defines a function called example_function,\
    \ you can import the module and call the function like this:\n\n```\nimport example\n\
    example.example_function()\n```\n\nIt’s worth noting that, python also have a\
    \ mechanism of package which is a collection of related modules. With packages,\
    \ you can organize your modules into a single namespace, making it easy to keep\
    \ related modules together and organized.\n\n### 7.3 Creating a Module\n\nCreating\
    \ a module in Python is as simple as creating a new .py file and adding your Python\
    \ code to it. Here are the basic steps to create a module:\n\n1. Open a text editor\
    \ or an IDE, such as IDLE or PyCharm.\n2. Create a new file and save it with a\
    \ .py file extension. The name of the file will be the name of the module. For\
    \ example, if you want to create a module called “example”, you would save the\
    \ file as “example.py”.\n3. Add your Python code to the file. You can define functions,\
    \ classes, and variables in the module. For example:\n\nCode 7.1: Illustrating\
    \ the concept of module in python\n\n```\ndef example_function():\n    print(“This\
    \ is an example function.”)\n```\n\n```\nclass ExampleClass:\n    pass\nexample_variable\
    \ = \"This is an example variable.\"\n```\n\n4. Save the file.\n\nTo use the module\
    \ in another Python script, you need to import it using the import statement.\
    \ For example:\n\n```\nimport example\nexample.example_function()\n```\n\nOnce\
    \ the module is imported, you can access the functions, classes and variables\
    \ that are defined inside that module, using the dot notation. It's also worth\
    \ noting that, if you want to make some of the functions, classes or variables\
    \ defined in the module to be accessible by importing the module directly, you\
    \ can use the __all__ variable in the module.\n\n```\n__all__ = [\"example_function\"\
    , \"ExampleClass\"]\n```\n\nThis will make only the example_function and ExampleClass\
    \ available when importing the module directly.\n\n### 7.4 Importing Module in\
    \ the Interpreter\n\nIn Python, you can import a module using the \"import\" keyword.\
    \ For example, to import the \"math\" module, you would use the following command:\n\
    \n```\nimport math\n```\n\nOnce the module is imported, you can access its functions\
    \ and variables using the dot notation. For example, you can use the \"math.sqrt()\"\
    \ function to find the square root of a number.\n\nCode 7.2: A program to find\
    \ the square root of a number.\n\n```\nimport math\nprint(math.sqrt(16)) # Output:\
    \ 4.0\n```\n\nYou can also use the \"from\" keyword to import specific functions\
    \ or variables from a module. For example, to import only the \"sqrt\" function\
    \ from the \"math\" module, you would use the following command:\n\n```\nfrom\
    \ math import sqrt\nprint(sqrt(16)) # Output: 4.0\n```\n\nYou can also use the\
    \ “as” keyword to give a module a different name when importing it. For example,\
    \ to import the “math” module as “m”, you would use the following command:\n\n\
    ```\nimport math as m\nprint(m.sqrt(16)) # Output: 4.0\n```\n\n### 7.5 Importing\
    \ Module in the Another Script\n\nTo import a module in another script in Python,\
    \ use the import statement followed by the name of the module you wish to import.\
    \ For example, if you want to import the math module, you would use the following\
    \ statement:\n\n```\nimport math\n```\n\nOnce the module is imported, you can\
    \ use its functions and variables by referencing them with the module name as\
    \ a prefix. For example, you can use the math.sqrt() function to calculate the\
    \ square root of a number.\n\n```\nimport math\nx = math.sqrt(16)\nprint(x)\n\
    ```\n\nYou can also import specific functions or variables from a module using\
    \ the from keyword, followed by the name of the module, and then the name of the\
    \ function or variable you wish to import. For example:\n\nCode 7.3: Illustrate\
    \ the use of from keyword to import a module.\n\n```\nfrom math import sqrt\n\
    x = sqrt(16)\nprint(x)\n```\n\nThis can be useful if you only need to use a small\
    \ number of functions or variables from a module and do not want to have to use\
    \ the module name as a prefix every time you use them.\n\n### 7.6 Importing Modules\n\
    \nIn Python, modules are libraries of pre-written code that you can use in your\
    \ own programs. To use a module in a Python script, you need to import it using\
    \ the import statement."
  mdcn: "## 7 Python 模块\n\n### 重点内容\n- Python 模块\n- 创建模块\n- 导入模块\n- 标准模块\n- Python\
    \ 包\n\nPython 中的模块是一个包含 Python 定义和语句的文件。文件名就是模块名加上后缀 `.py`。模块可以定义函数、类和变量，也可以包含可执行的代码。`import`\
    \ 语句用于将模块包含在 Python 脚本中，并访问模块内定义的定义和语句。此外，可以使用 `from ... import ...` 语句从模块中导入特定的函数或变量。在导入时，也可以使用\
    \ `as` 关键字为模块或函数分配别名。\n\n模块也可以包含在 Python 的内置库中，例如 `sys` 和 `os`，它们分别提供对解释器使用或维护的某些变量和函数以及操作系统功能的访问。\n\
    \n### 7.1 模块的必要性\n\n模块是编程中的一个基本概念，用于组织和重用代码。它们是将大型程序划分为更小、更易于管理部分的一种方式。通过将代码分解成模块，你可以使其更易于理解、维护和更新。模块提供了一种将相关代码和变量组织到单独命名空间中的方法，这有助于避免命名冲突，并使你的代码更有条理、更易读。此外，模块允许你在多个项目中重用代码，节省时间和精力。模块还使得使用\
    \ Python 的内置和第三方功能变得容易。Python 拥有一个庞大的内置模块库，提供了广泛的功能，以及一个庞大的开发者社区，他们创建了各种各样的模块，可以导入并在你的代码中使用。这使得完成某些任务变得容易，例如机器学习、网络爬虫等。\n\
    \nPython 中的模块有几个用途，包括：\n\n1.  **代码可重用性：** 模块允许你将代码组织成可重用且自包含的块。这意味着你可以编写一次模块，并在多个项目中使用它，节省时间和精力。\n\
    2.  **命名空间：** 模块提供了一种将相关代码和变量组织到单独命名空间中的方法。这有助于避免命名冲突，并使你的代码更有条理、更易读。\n3.  **代码维护：**\
    \ 模块有助于分离代码的不同部分，使其更易于维护。你可以对模块进行更改，而不必担心影响代码的其他部分。\n4.  **标准库：** Python 拥有一个庞大的内置模块库，提供了广泛的功能，包括文件处理、字符串操作、数学函数等。这些模块可以导入并在你的代码中使用，节省了开发自己解决方案的时间和精力。\n\
    5.  **第三方库：** Python 拥有一个庞大的开发者社区，他们创建了各种各样的模块，可以导入并在你的代码中使用。这些库提供了额外的功能，可以使完成某些任务变得更容易，例如机器学习、网络爬虫等。\n\
    \n总之，模块帮助你组织代码，提高代码的可重用性，并使使用内置和第三方功能变得容易。\n\n### 7.2 模块定义\n\nPython 中的模块是一个包含\
    \ Python 定义和语句的文件。文件名就是模块名加上后缀 `.py`。例如，一个名为 \"example.py\" 的文件在 Python 中将被视为一个模块。模块可以包含各种类型的定义，如函数、类和变量，也可以包含可执行的代码。模块中定义的函数和类可以被程序的其他部分调用和实例化。模块中定义的变量可以被程序的其他部分访问和修改。\n\
    \n你可以通过创建一个新的 `.py` 文件并向其中添加你的 Python 代码来创建一个模块。一旦模块创建完成，就可以使用 `import` 语句将其导入到其他\
    \ Python 脚本中，并使用点表示法访问模块内的定义和语句。例如，如果你有一个名为 `example.py` 的模块，其中定义了一个名为 `example_function`\
    \ 的函数，你可以这样导入模块并调用该函数：\n\n```\nimport example\nexample.example_function()\n```\n\
    \n值得注意的是，Python 还有一个包机制，包是相关模块的集合。通过包，你可以将模块组织到一个单独的命名空间中，从而轻松地将相关模块放在一起并保持组织性。\n\
    \n### 7.3 创建模块\n\n在 Python 中创建模块就像创建一个新的 `.py` 文件并向其中添加你的 Python 代码一样简单。以下是创建模块的基本步骤：\n\
    \n1.  打开一个文本编辑器或 IDE，例如 IDLE 或 PyCharm。\n2.  创建一个新文件，并将其保存为 `.py` 文件扩展名。文件名将是模块的名称。例如，如果你想创建一个名为\
    \ \"example\" 的模块，你会将文件保存为 \"example.py\"。\n3.  将你的 Python 代码添加到文件中。你可以在模块中定义函数、类和变量。例如：\n\
    \n代码 7.1：说明 Python 中模块的概念\n\n```\ndef example_function():\n    print(\"This is\
    \ an example function.\")\n```\n\n```\nclass ExampleClass:\n    pass\nexample_variable\
    \ = \"This is an example variable.\"\n```\n\n4.  保存文件。\n\n要在另一个 Python 脚本中使用该模块，你需要使用\
    \ `import` 语句导入它。例如：\n\n```\nimport example\nexample.example_function()\n```\n\
    \n一旦模块被导入，你就可以使用点表示法访问该模块内定义的函数、类和变量。同样值得注意的是，如果你想使模块中定义的一些函数、类或变量可以通过直接导入模块来访问，你可以在模块中使用\
    \ `__all__` 变量。\n\n```\n__all__ = [\"example_function\", \"ExampleClass\"]\n```\n\
    \n这将使得在直接导入模块时，只有 `example_function` 和 `ExampleClass` 可用。\n\n### 7.4 在解释器中导入模块\n\
    \n在 Python 中，你可以使用 \"import\" 关键字导入模块。例如，要导入 \"math\" 模块，你可以使用以下命令：\n\n```\nimport\
    \ math\n```\n\n一旦模块被导入，你就可以使用点表示法访问其函数和变量。例如，你可以使用 \"math.sqrt()\" 函数来查找一个数的平方根。\n\
    \n代码 7.2：查找一个数的平方根的程序。\n\n```\nimport math\nprint(math.sqrt(16)) # Output: 4.0\n\
    ```\n\n你也可以使用 \"from\" 关键字从模块中导入特定的函数或变量。例如，要仅从 \"math\" 模块导入 \"sqrt\" 函数，你可以使用以下命令：\n\
    \n```\nfrom math import sqrt\nprint(sqrt(16)) # Output: 4.0\n```\n\n你也可以在导入模块时使用\
    \ \"as\" 关键字为其指定不同的名称。例如，要将 \"math\" 模块导入为 \"m\"，你可以使用以下命令：\n\n```\nimport math\
    \ as m\nprint(m.sqrt(16)) # Output: 4.0\n```\n\n### 7.5 在另一个脚本中导入模块\n\n要在 Python\
    \ 的另一个脚本中导入模块，请使用 `import` 语句，后跟你要导入的模块名称。例如，如果你想导入 math 模块，你会使用以下语句：\n\n```\n\
