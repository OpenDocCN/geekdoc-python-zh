    # 5.2.6 List Comprehension


    List comprehension is a concise way to create a new list in Python. Here is a
    table that explains the syntax and usage of list comprehension:


    Table 5.7 : List comprehension


    | Syntax | Description | Example |

    |---|---|---|

    | [expression for item in iterable] | Creates a new list by applying the expression
    to each item in the iterable | [x**2 for x in range(10)] creates a new list containing
    the squares of numbers 0-9 |

    | [expression for item in iterable if condition] | Creates a new list by applying
    the expression to each item in the iterable that satisfies the condition | [x**2
    for x in range(10) if x % 2 == 0] creates a new list containing the squares of
    even numbers 0-9 |

    | [expression for item1 in iterable1 for item2 in iterable2] | Creates a new list
    by applying the expression to each item in the iterable1 and iterable2 | [x*y
    for x in range(3) for y in range(3)] creates a new list containing the product
    of every combination of numbers 0-2 |


    List comprehension can be a useful tool when you need to create a new list based
    on some existing data or logic. It allows you to write more readable and efficient
    code, as it eliminates the need for explicit loops and temporary variables.


    Note that list comprehension is not always the best choice, if the comprehension
    becomes too complex it might be better to use a for loop.


