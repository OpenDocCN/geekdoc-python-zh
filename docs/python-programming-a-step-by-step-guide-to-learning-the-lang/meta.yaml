    ## 5.2.6 列表推导式


    列表推导式是在 Python 中创建新列表的一种简洁方式。下表解释了列表推导式的语法和用法：


    表 5.7：列表推导式


    | 语法 | 描述 | 示例 |

    |---|---|---|

    | [expression for item in iterable] | 通过对可迭代对象中的每个项应用表达式来创建新列表 | [x**2 for x in
