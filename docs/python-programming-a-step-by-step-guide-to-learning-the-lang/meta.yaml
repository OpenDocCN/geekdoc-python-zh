    # 3.2.2 Associativity


    In Python, the associativity of an operator determines the order in which operations
    with the same precedence are performed. Most operators in Python are left-associative,
    which means that operations are performed from left to right.


    For example, in the expression 2 + 3 - 4, the addition (+) and subtraction (-)
    operators have the same precedence, so they are performed from left to right.
    The expression is evaluated as (2 + 3) - 4, which is equal to 1.


    However, some operators are right-associative. This means that operations are
    performed from right to left. The exponentiation operator (**) is an example of
    a right-associative operator in Python.


    For example, in the expression 2 ** 3 ** 4, the exponentiation operator (**) has
    the same precedence, so it is performed from right to left. The expression is
    evaluated as 2 ** (3 ** 4), which is equal to 2 ** 81, or 43046721.


    Here is a list of the operators in Python, along with their associativity:


    # Left-associative:


    +   - + - Addition and subtraction

