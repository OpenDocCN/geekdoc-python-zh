    # 7.8 Module Reloading


    In Python, when you import a module, the interpreter caches the module''s code
    in memory. This means that if you make changes to the module''s code and then
    re-import it, the changes will not be reflected in your script unless you explicitly
    reload the module. You can reload a module using the importlib.reload() function,
    which is part of the importlib module. This function takes a single argument,
    which is the module you want to reload. For example, to reload the math module,
    you would use the following command:


    Code:7.6 : Illustrate the concept of reloading a module in python.


    ```

