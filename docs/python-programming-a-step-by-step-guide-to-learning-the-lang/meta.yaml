    \ to getattr.\n\n# 10.6 The Class Program\n\nA class program in Python defines\
    \ a custom data structure that can be used to model real-world objects and their\
    \ behavior. Here is an example of a class program in Python:\n\n```\nCode 10.12\
    \ A class program in Python\n\nclass Car:\n    def __init__(self, make, model,\
    \ year):\n        self.make = make\n        self.model = model\n        self.year\
    \ = year\n    def honk(self):\n        print(\"Beep Beep!\")\ncar = Car(\"Toyota\"\
    , \"Camry\", 2020)\nprint(car.make) # Outputs: \"Toyota\"\nprint(car.model) #\
    \ Outputs: \"Camry\"\nprint(car.year) # Outputs: 2020\ncar.honk() # Outputs: \"\
    Beep Beep!\"\n```"
- md: "In this example, we define a class called Car with a constructor `__init__`\
    \ that takes three parameters `make`, `model`, and `year`. The constructor sets\
    \ these parameters as attributes of the Car class. We also have a method `honk`\
    \ that outputs “Beep Beep!” when called.\n\nWe then create an instance of the\
    \ Car class and store it in the variable `car`. To access the attributes and call\
    \ the methods of the car object, we use dot notation.\n\n## 10.6.1 Using a Class\
    \ with Input\n\nIn Python, you can use a class with user input by taking input\
    \ from the user and passing it as arguments to the class constructor. Here’s an\
    \ example:\n\n### Code 10.13 A class with user input\n\n```python\nclass Dog:\n\
    \    def __init__(self, name, breed):\n        self.name = name\n        self.breed\
    \ = breed\n    def bark(self):\n        print(\"Woof!\")\nname = input(\"Enter\
    \ dog name: \")\nbreed = input(\"Enter dog breed: \")\ndog = Dog(name, breed)\n\
    print(dog.name)\nprint(dog.breed)\ndog.bark()\n```\n\nIn this example, we use\
    \ the `input` function to take user input for the dog’s name and breed. The user\
    \ inputs are then passed as arguments to the `Dog` class constructor when creating\
    \ a new instance of the class. The rest of the program works the same as before,\
    \ accessing the attributes and calling the method of the dog object.\n\nYou can\
    \ use this pattern to create class instances with user input in any Python program.\
    \ Just make sure to handle any exceptions or errors that might occur, such as\
    \ invalid input format, to ensure the stability and reliability of your program.\n\
    \n## 10.6.2 A Class Program with Computations\n\nA class program with computations\
    \ in Python is a program that uses a custom data structure defined using a class\
    \ to perform computations. The class can have attributes and methods that are\
    \ used to store and manipulate data, as well as perform operations and computations\
    \ on the data.\n\nFor example, you can create a class that represents a circle\
    \ and has attributes for the radius of the circle, as well as methods to calculate\
    \ the area and circumference of the circle.\n\n### Code 10.14 A class program\
    \ with computations in Python\n\n```python\nclass Circle:\n    pi = 3.14\n\n \
    \   def __init__(self, radius):\n        self.radius = radius\n\n    def area(self):\n\
    \        return Circle.pi * (self.radius ** 2)\n\nradius = float(input(\"Enter\
    \ the radius of the circle: \"))\ncircle = Circle(radius)\nprint(\"The area of\
    \ the circle is\", circle.area())\n```\n\nIn this example, we define a class `Circle`\
    \ with a class attribute `pi` set to 3.14. The class also has a constructor `__init__`\
    \ that takes a `radius` argument and sets it as an attribute of the `Circle` class.\
    \ We also have a method `area` that calculates and returns the area of the circle\
    \ using the formula `pi * r^2`.\n\nWe then create an instance of the `Circle`\
    \ class and store it in the variable `circle`. We use the `input` function to\
    \ take user input for the radius of the circle. The input is then converted to\
    \ a float and passed as an argument to the `Circle` class constructor.\n\nFinally,\
    \ we call the `area` method on the `circle` object to calculate the area of the\
    \ circle and print the result.\n\n## 10.7 Editing Class Attributes\n\nEditing\
    \ class attributes in Python refers to the process of changing the value of an\
    \ attribute that is associated with a class. Class attributes are defined in the\
    \ class definition and are shared by all instances of the class.\n\nIn Python,\
    \ you can edit class attributes by directly modifying the attribute value on an\
    \ instance of the class. This means that you can change the value of an attribute\
    \ for a specific instance of the class, without affecting the value of that attribute\
    \ for other instances of the class or for the class definition itself.\n\n###\
    \ Code 10.15 editing class attributes in Python\n\n```python\nclass Dog:\n   \
    \ def __init__(self, name, breed):\n        self.name = name\n        self.breed\
    \ = breed\n    def bark(self):\n        print(\"Woof!\")\ndog = Dog(\"Buddy\"\
    , \"Labrador\")\nprint(dog.name)\nprint(dog.breed)\ndog.name = \"Rufus\"\ndog.breed\
    \ = \"Golden Retriever\"\nprint(dog.name)\nprint(dog.breed)\n```\n\nIn this example,\
    \ we create an instance of the `Dog` class and store it in the `dog` variable.\
    \ We then print the original name and breed of the dog, which are “Buddy” and\
    \ “Labrador”.\n\nNext, we modify the `name` and `breed` attributes of the dog\
    \ object by directly assigning new values to them. Finally, we print the updated\
    \ name and breed of the dog, which are “Rufus” and “Golden Retriever”.\n\nNote\
    \ that the changes we make to the attributes of an instance of the class only\
    \ affect that particular instance, and do not affect other instances or the class\
    \ definition itself. This allows you to have different instances of the same class\
    \ with different attribute values.\n\n## 10.8 Built-in Class Attributes\n\nIn\
    \ Python, there are several built-in class attributes that you can use to access\
    \ information about a class or an instance of a class. Some of the most commonly\
    \ used built-in class attributes are:\n\n- 1. **`__dict__`**: A dictionary that\
    \ contains the namespace of an object. It stores the object's attributes and their\
    \ values.\n- 2. **`__doc__`**: A string that contains the documentation for a\
    \ class or an object.\n- 3. **`__name__`**: A string that contains the name of\
    \ the class or the object.\n- 4. **`__module__`**: A string that contains the\
    \ name of the module where the class or the object is defined.\n- 5. **`__class__`**:\
    \ A reference to the class that an instance of a class belongs to.\n\nFor example,\
    \ consider the following class:\n\n### Code 10.16 built in attributes in Python\n\
    \n```python\nclass Dog:\n    species = \"Canis lupus familiaris\"\n\n    def __init__(self,\
    \ name, breed):\n        self.name = name\n        self.breed = breed\n\n    def\
    \ bark(self):\n        print(\"Woof!\")\n\ndog = Dog(\"Buddy\", \"Labrador\")\n\
    \nprint(dog.__dict__)\nprint(dog.__doc__)\nprint(dog.__name__)\nprint(dog.__module__)\n\
    print(dog.__class__)\n```\n\nIn this example, we create an instance of the `Dog`\
    \ class and store it in the `dog` variable. Then, we use the built-in class attributes\
    \ `__dict__`, `__doc__`, `__name__`, `__module__`, and `__class__` to access information\
    \ about the dog instance.\n\nThe output of this code will be a dictionary that\
    \ contains the attributes and values of the dog instance, a string that contains\
    \ the documentation for the `Dog` class (which is empty in this case), a string\
    \ that contains the name of the dog instance (which is not defined), a string\
    \ that contains the name of the module where the `Dog` class is defined, and a\
    \ reference to the `Dog` class itself.\n\n## 10.9 Garbage Collection/Destroying\
    \ Objects\n\nIn Python, memory management is handled automatically by the Python\
    \ interpreter, using a mechanism called “garbage collection”. The garbage collector\
    \ periodically frees up memory that is no longer being used by the program.\n\n\
    When an object is no longer needed, the Python interpreter automatically marks\
    \ the object as “unreachable” and the memory occupied by the object becomes eligible\
    \ for garbage collection. When the next garbage collection cycle occurs, the memory\
    \ occupied by the unreachable object is freed up.\n\nIn general, you do not need\
    \ to worry about destroying objects in Python, as the garbage collector takes\
    \ care of it automatically. However, there may be times when you want to explicitly\
    \ release an object’s memory before the next garbage collection cycle.\n\nTo do\
    \ this, you can use the `del` statement in Python. The `del` statement removes\
    \ the reference to an object, making the object eligible for garbage collection.\
    \ For example:\n\n```python\ndog = Dog(\"Buddy\", \"Labrador\")\ndel dog\n```\n\
    \nIn this example, we create an instance of the `Dog` class and store it in the\
    \ `dog` variable. Then, we use the `del` statement to remove the reference to\
    \ the dog instance, making it eligible for garbage collection.\n\nNote that removing\
    \ a reference to an object does not immediately free up the memory occupied by\
    \ the object. The memory occupied by the object will be freed up during the next\
    \ garbage collection cycle.\n\n## 10.10 Summary\n\nIn this chapter, we covered\
    \ the basics of designing classes in Python. A class is a blueprint for creating\
    \ objects, which can be used to encapsulate data and behavior. We learned how\
    \ to create objects from a class by calling the class"
  mdcn: "在这个示例中，我们定义了一个名为 `Car` 的类，其构造函数 `__init__` 接受三个参数：`make`、`model` 和 `year`。构造函数将这些参数设置为\
    \ `Car` 类的属性。我们还有一个 `honk` 方法，调用时会输出“Beep Beep!”。\n\n然后，我们创建一个 `Car` 类的实例并将其存储在变量\
    \ `car` 中。为了访问汽车对象的属性和调用其方法，我们使用点表示法。\n\n## 10.6.1 使用带有输入的类\n\n在 Python 中，你可以通过获取用户输入并将其作为参数传递给类构造函数，来使用带有用户输入的类。以下是一个示例：\n\
    \n### 代码 10.13 一个带有用户输入的类\n\n```python\nclass Dog:\n    def __init__(self, name,\
    \ breed):\n        self.name = name\n        self.breed = breed\n    def bark(self):\n\
    \        print(\"Woof!\")\nname = input(\"Enter dog name: \")\nbreed = input(\"\
    Enter dog breed: \")\ndog = Dog(name, breed)\nprint(dog.name)\nprint(dog.breed)\n\
    dog.bark()\n```\n\n在这个示例中，我们使用 `input` 函数获取用户输入的狗的名字和品种。然后，在创建类的新实例时，将这些用户输入作为参数传递给\
    \ `Dog` 类的构造函数。程序的其余部分与之前一样，访问狗对象的属性并调用其方法。\n\n你可以在任何 Python 程序中使用这种模式，通过用户输入创建类实例。只需确保处理可能出现的任何异常或错误，例如无效的输入格式，以确保程序的稳定性和可靠性。\n\
    \n## 10.6.2 一个包含计算的类程序\n\nPython 中一个包含计算的类程序，是指使用通过类定义的自定义数据结构来执行计算的程序。该类可以包含用于存储和操作数据的属性和方法，以及对数据执行操作和计算。\n\
    \n例如，你可以创建一个表示圆的类，该类具有圆的半径属性，以及计算圆的面积和周长的方法。\n\n### 代码 10.14 Python 中一个包含计算的类程序\n\
    \n```python\nclass Circle:\n    pi = 3.14\n\n    def __init__(self, radius):\n\
    \        self.radius = radius\n\n    def area(self):\n        return Circle.pi\
    \ * (self.radius ** 2)\n\nradius = float(input(\"Enter the radius of the circle:\
    \ \"))\ncircle = Circle(radius)\nprint(\"The area of the circle is\", circle.area())\n\
    ```\n\n在这个示例中，我们定义了一个 `Circle` 类，其类属性 `pi` 设置为 3.14。该类还有一个构造函数 `__init__`，它接受一个\
    \ `radius` 参数并将其设置为 `Circle` 类的属性。我们还有一个 `area` 方法，使用公式 `pi * r^2` 计算并返回圆的面积。\n\
    \n然后，我们创建一个 `Circle` 类的实例并将其存储在变量 `circle` 中。我们使用 `input` 函数获取用户输入的圆的半径。输入被转换为浮点数，然后作为参数传递给\
    \ `Circle` 类的构造函数。\n\n最后，我们在 `circle` 对象上调用 `area` 方法来计算圆的面积并打印结果。\n\n## 10.7\
    \ 编辑类属性\n\n在 Python 中编辑类属性，指的是更改与类关联的属性值的过程。类属性在类定义中定义，并由类的所有实例共享。\n\n在 Python\
    \ 中，你可以通过直接修改类实例上的属性值来编辑类属性。这意味着你可以更改类特定实例的属性值，而不会影响该类其他实例或类定义本身的该属性值。\n\n###\
    \ 代码 10.15 在 Python 中编辑类属性\n\n```python\nclass Dog:\n    def __init__(self, name,\
    \ breed):\n        self.name = name\n        self.breed = breed\n    def bark(self):\n\
    \        print(\"Woof!\")\ndog = Dog(\"Buddy\", \"Labrador\")\nprint(dog.name)\n\
    print(dog.breed)\ndog.name = \"Rufus\"\ndog.breed = \"Golden Retriever\"\nprint(dog.name)\n\
    print(dog.breed)\n```\n\n在这个示例中，我们创建一个 `Dog` 类的实例并将其存储在 `dog` 变量中。然后，我们打印狗的原始名字和品种，即“Buddy”和“Labrador”。\n\
    \n接下来，我们通过直接赋新值来修改狗对象的 `name` 和 `breed` 属性。最后，我们打印狗更新后的名字和品种，即“Rufus”和“Golden\
    \ Retriever”。\n\n请注意，我们对类实例属性所做的更改仅影响该特定实例，不会影响其他实例或类定义本身。这允许你拥有同一类的不同实例，并具有不同的属性值。\n\
    \n## 10.8 内置类属性\n\n在 Python 中，有几个内置类属性可用于访问有关类或类实例的信息。一些最常用的内置类属性包括：\n\n- 1. **`__dict__`**：一个包含对象命名空间的字典。它存储对象的属性及其值。\n\
    - 2. **`__doc__`**：一个包含类或对象文档字符串的字符串。\n- 3. **`__name__`**：一个包含类或对象名称的字符串。\n-\
    \ 4. **`__module__`**：一个包含定义类或对象的模块名称的字符串。\n- 5. **`__class__`**：对类实例所属类的引用。\n\
    \n例如，考虑以下类：\n\n### 代码 10.16 Python 中的内置属性\n\n```python\nclass Dog:\n    species\
    \ = \"Canis lupus familiaris\"\n\n    def __init__(self, name, breed):\n     \
    \   self.name = name\n        self.breed = breed\n\n    def bark(self):\n    \
    \    print(\"Woof!\")\n\ndog = Dog(\"Buddy\", \"Labrador\")\n\nprint(dog.__dict__)\n\
    print(dog.__doc__)\nprint(dog.__name__)\nprint(dog.__module__)\nprint(dog.__class__)\n\
    ```\n\n在这个示例中，我们创建一个 `Dog` 类的实例并将其存储在 `dog` 变量中。然后，我们使用内置类属性 `__dict__`、`__doc__`、`__name__`、`__module__`\
    \ 和 `__class__` 来访问有关狗实例的信息。\n\n这段代码的输出将是一个包含狗实例属性和值的字典，一个包含 `Dog` 类文档字符串的字符串（在此例中为空），一个包含狗实例名称的字符串（未定义），一个包含定义\
    \ `Dog` 类的模块名称的字符串，以及对 `Dog` 类本身的引用。\n\n## 10.9 垃圾回收/销毁对象\n\n在 Python 中，内存管理由\
    \ Python 解释器自动处理，使用一种称为“垃圾回收”的机制。垃圾回收器会定期释放程序不再使用的内存。\n\n当一个对象不再需要时，Python 解释器会自动将该对象标记为“不可达”，该对象占用的内存就具备了被垃圾回收的资格。当下一次垃圾回收周期发生时，不可达对象占用的内存将被释放。\n\
    \n通常，你不需要担心在 Python 中销毁对象，因为垃圾回收器会自动处理。但是，有时你可能希望在下一次垃圾回收周期之前显式释放对象的内存。\n\n为此，你可以使用\
    \ Python 中的 `del` 语句。`del` 语句会移除对对象的引用，使该对象具备被垃圾回收的资格。例如：\n\n```python\ndog =\
    \ Dog(\"Buddy\", \"Labrador\")\ndel dog\n```\n\n在这个示例中，我们创建一个 `Dog` 类的实例并将其存储在\
    \ `dog` 变量中。然后，我们使用 `del` 语句移除对狗实例的引用，使其具备被垃圾回收的资格。\n\n请注意，移除对对象的引用并不会立即释放该对象占用的内存。该对象占用的内存将在下一次垃圾回收周期中被释放。\n\
    \n## 10.10 总结\n\n在本章中，我们介绍了在 Python 中设计类的基础知识。类是创建对象的蓝图，可用于封装数据和行为。我们学习了如何通过调用类来从类创建对象"
