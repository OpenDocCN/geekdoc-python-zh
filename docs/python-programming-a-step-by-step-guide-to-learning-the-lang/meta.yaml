    # 2.7.1 Variable Assignment


    Think of a variable as a name attached to a particular object. In Python, variables
    need not be declared or defined in advance, as is the case in many other programming
    languages. To create a variable, you just assign it a value and then start using
    it. The assignment is done with a single equals sign (=):


    ```

    n = 300

    ```


    This is read or interpreted as “n is assigned the value 300.” Once this is done,
    n can be used in a statement or expression, and its value will be substituted:


    ```

    print(n)

    300

    ```


    Just as a literal value can be displayed directly from the interpreter prompt
    in a REPL session without the need for print(), so can a variable:


    ```

    n

    300

    ```


    Later, if you change the value of n and use it again, the new value will be substituted
    instead:


    ```

    n = 1000

    print(n)

    1000

    ```


    Python also allows chained assignment, which makes it possible to assign the same
    value to several variables simultaneously:


    Code 2.10 Illustration of variable in Python


    ```

    a = b = c = 300

    print(a, b, c)

    300 300 300

    ```


    # 2.7.2 Variable Types in Python


    In many programming languages, variables are statically typed. That means a variable
    is initially declared to have a specific data type, and any value'
