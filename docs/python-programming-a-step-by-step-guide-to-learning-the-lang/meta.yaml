    The | operator performs a bitwise OR operation on two integers. It compares each
    bit of the first integer to the corresponding bit of the second integer, and if
    either bit is 1, the corresponding result bit is set to 1. Otherwise, the corresponding
    result bit is set to 0.


    The ^ operator performs a bitwise XOR operation on two integers. It compares each
    bit of the first integer to the corresponding bit of the second integer, and if
    the bits are different, the corresponding result bit is set to 1. Otherwise, the
    corresponding result bit is set to 0.


    The ~ operator is a bitwise NOT operator. It inverts all the bits of the integer
    that follows it, changing all the 0s to 1s and all the 1s to 0s.


    The << operator shifts the bits of an integer value to the left by the number
    of places specified by the second operand. For example, if x is an integer value
    with n bits, and y is an integer value with m places, x << y is equivalent to
    x * 2**y.


    The >> operator shifts the bits of an integer value to the right by the number
    of places specified by the second operand. For example, if x is an integer value
    with n bits, and y is an integer value with m places, x >> y is equivalent to
    x // 2**y.


