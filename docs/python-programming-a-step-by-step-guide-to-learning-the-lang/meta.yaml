    # 10.9 Garbage Collection/Destroying Objects


    In Python, memory management is handled automatically by the Python interpreter,
    using a mechanism called “garbage collection”. The garbage collector periodically
    frees up memory that is no longer being used by the program.


    When an object is no longer needed, the Python interpreter automatically marks
    the object as “unreachable” and the memory occupied by the object becomes eligible
    for garbage collection. When the next garbage collection cycle occurs, the memory
    occupied by the unreachable object is freed up.


    In general, you do not need to worry about destroying objects in Python, as the
    garbage collector takes care of it automatically. However, there may be times
    when you want to explicitly release an object’s memory before the next garbage
    collection cycle.


    To do this, you can use the del statement in Python. The del statement removes
    the reference to an object, making the object eligible for garbage collection.
    For example:


    ```

    python

    dog = Dog(“Buddy”, “Labrador”)

    del dog

    ```


    In this example, we create an instance of the Dog class and store it in the dog
    variable. Then, we use the del statement to remove the reference to the dog instance,
    making it eligible for garbage collection.


    Note that removing a reference to an object does not immediately free up the memory
    occupied by the object. The memory occupied by the object will be freed up during
    the next garbage collection cycle.


