    # 1.2 History of Python Language


    Python is a high-level, interpreted programming language that was first released
    in 1991 by its creator, Guido van Rossum. It was designed to be easy to read and
    write, and to emphasize code readability and simplicity. The origin of the name
    “Python” comes from a TV show from the 1970s called “Monty Python’s Flying Circus”.
    Guido van Rossum is a big fan of the show, and he named the language after it.


    Python was initially developed as a hobby project, and its first version was released
    in February 1991. The language was designed with a clear and concise syntax that
    allowed developers to write code quickly and efficiently. Python’s creators were
    also focused on making the language easily readable, which has helped to make
    it popular with beginners and experts alike.


    Following are the illustrations of different versions of Python along with the
    timeline.


    In 2000, Python 2.0 was released, which included many new features such as garbage
    collection, Unicode support, and list comprehensions. This version of the language
    became the dominant version of Python for many years, and it is still widely used
    today, despite being officially deprecated as of 2020.


    In 2008, Python 3.0 was released, which was a major overhaul of the language that
    introduced many changes and new features. One of the most significant changes
    was the removal of backward compatibility with Python 2.x, which made it more
    difficult for developers to transition to the new version. However, Python 3.0
    brought many improvements and new features, including better Unicode support,
    improved I/O, and more efficient handling of exceptions.'
