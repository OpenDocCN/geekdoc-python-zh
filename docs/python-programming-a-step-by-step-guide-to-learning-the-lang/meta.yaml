    \    执行代码块1\nelse:\n    if boolean_expression_2:\n        执行代码块2\n    else:\n\
    \        执行代码块3\n```\n\n这是一个演示if-elif-else语句用法的示例程序：\n\n**代码 4.5 一个使用if-elif-else检查给定数字是正数还是负数的程序。**\n\
    \n```\nx = 10\nif x < 0:\n    print(\"x is a negative number\")\nelif x == 0:\n\
