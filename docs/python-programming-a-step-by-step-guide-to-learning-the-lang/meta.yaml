  md: '# # Python Operator Overloading


    +   ### Highlights

    - Overloading ''+'' Operator in Python

    - Overloading ''-'' Operator in Python

    - Overloading Bitwise Operators

    - Overloading Relational Operators


    Operator Overloading in Python is a mechanism that allows us to change the behavior
    of operators for instances of custom classes. This means that we can use the familiar
    mathematical and comparison operators (+, -, *, /, ==, !=, etc.) on instances
    of our own classes, and specify how these operators should behave for those instances.
    This allows us to write more natural and readable code, as well as make our classes
    more convenient to use. Operator Overloading is achieved through the use of special
    methods in Python, such as add, sub, mul, truediv, and others. By defining these
    special methods, we can specify how our objects should behave when they are subjected
    to these operators.


    # ## 12.1 Overloading ''+'' Operator in Python


    To overload the “+” operator in Python, we can define the add method in our custom
    class. The add method takes two arguments, self and other, and is responsible
    for returning the result of adding the two objects together.'
