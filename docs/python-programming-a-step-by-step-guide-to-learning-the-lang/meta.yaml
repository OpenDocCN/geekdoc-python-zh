    \ to vote.**”。\n\n### 4.1.3 Python if-elif-else\n\nif-elif-else语句是一种控制流语句，允许程序在多个选项中执行特定的代码块。它由每个if、elif和else子句的一个布尔表达式以及如果布尔表达式求值为True则执行的代码块组成。\n\
    \n以下是if-elif-else语句的语法：\n\n```\nif boolean_expression_1:\n    # 如果boolean_expression_1为True则执行的代码块\n\
