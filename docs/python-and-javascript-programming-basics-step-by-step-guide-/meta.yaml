  md: '+   - Python version 1.0 was released in 1994, and it included new features
    such as map, filter, and reduce.

    - In October of 2000, Python 2.0 was announced, with new features such as list
    comprehension and a garbage collection system.

    - On December 3, 2018, Python 3.0, also known as “Py3k,” was launched with new
    features. In Python 2.x, for example, “print” is a sentence. “print()” is a function
    in 3.x.


    # Usage of Python


    Python is a programming language that is used by many programmers in a variety
    of fields. It is usually used to execute any complex task in a much more straightforward
    manner than other programming languages.


    When Python is installed, it creates a number of powerful libraries that contain
    a variety of functions.


    There are several libraries available on the internet that make it easier to complete
    complicated tasks.


    It is a powerful programming language because of these standard libraries. Python
    is used extensively in the following areas:


    +   - Web development,

    - Software development,

    - Machine Learning,

    - GUIs based applications,

    - Network programming,

    - Game development,

    - Mathematics

    - Artificial Intelligence

    - Data Science


