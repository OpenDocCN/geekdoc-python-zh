- img_proc: true
  md: 'The value of the stop indicates the list’s final part, which is 60. As a result,
    it will come to a halt just before the stop index. Each nth-element can be taken
    within a start:stop range using the steps.


    ![](img/2bfe61f5593c3ea97ff290c1c0335a80_55_0.png)


    We can skip the start index and it will return to starting at 0. For example:


    ```

    list = [10,20,30,40,50,60,70,80,90]

    print(list[:4])

    ```


    # Output


    ```

    [10, 20, 30, 40]

    ```


    So, list[:4] is the same as the list[0:4]. It’s a quick way to get the first nth
    piece.


    We may also skip the stop index. The last n elements of the specified list will
    be returned. For example:


    ```

    list = [10,20,30,40,50,60,70,80,90]

    print(list[4:])

    ```


    # Output


    ```

    [50, 60, 70, 80, 90]

    ```


    We skip the stop index in the above example, which means it takes elements from
    the beginning to the end of the list.'
