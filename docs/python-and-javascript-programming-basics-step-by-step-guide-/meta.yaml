- md: "## Javascript Data Types\n\nIt has a variety of data types to hold various\
    \ types of values.\nIn Javascript, there are two sorts of data types.\n\n- 1.\
    \ Primitive data types.\n- 2. Non-primitive data types.\n\nBecause JavaScript\
    \ is a dynamic type language, we don’t need to define the type of variable because\
    \ the JavaScript engine uses it dynamically. The data type is specified using\
    \ var in this case. It may store any type of value, including numbers, strings,\
    \ and objects.\n\n## Example\n\n```\nvar a=Ram; //String\n\nvar b=20; //Number\n\
    \nvar x= {FirstName:”Ram”, lastName:”Doe”}; //Object\n```\n\n## JavaScript - primitive\
    \ data types\n\nIn JavaScript, there are five different types of primitive data\
    \ types.\n\n| Data Type | Description |\n| --- | --- |\n| String | It represents\
    \ sequence of characters e.g. “Hello” |\n| Number | It represents numeric values\
    \ e.g. 1,2,3,4,5,6. |\n| Boolean | It represents Boolean value either Right or\
    \ Wrong. |\n| Undefined | It represents undefined values. |\n| Null | It means\
    \ **no values** at all. |\n\n## JavaScript non-primitive data types\n\nThere is\
    \ 3 non-primitive data types are as follows:\n\n| Data type | Description |\n\
    | --- | --- |\n| Object | It represents instance through which we can access members.\
    \ |\n| Array | It represents group of similar values. |\n| RegExp | It represents\
    \ regular expression. |\n\n## Javascript Operators\n\nOperators are symbols in\
    \ JavaScript that are used to perform operations on operands. 3+2 equals 5 in\
    \ simple terms. The operands here are 3 and 2, and the operator is +.\nThe JavaScript\
    \ operators are as follows:\n\n- 1. Arithmetic Operators.\n- 2. Comparison (relational)\
    \ Operators.\n- 3. Bitwise Operators.\n- 4. Logical Operators.\n- 5. Assignment\
    \ Operators.\n- 6. Special Operators.\n\n### Arithmetic Operators\n\nWe employ\
    \ arithmetic operations on the operands in arithmetic operators.\n\n| Operators\
    \ | Description |\n| :--- | :--- |\n| +(Addition) | Add two operands Example:\
    \ A+B |\n| -(subtraction) | Subtraction from one operands to another one Example:\
    \ A-B |\n| *(Multiplication) | Multiply both the operands Example: A*B |\n| /(Division)\
    \ | Divide the numerator by the denominator Example: B/A |\n| %(Modulus) | Remainder\
    \ of an integer division is 0 Example: B%A will give 0 |\n| ++(Increment) | Increase\
    \ an integer value by one Example: If value A is 9, then A++ will give 11 |\n\
    | --(Decrement) | decrease an integer value by one Example: If value A is 11,\
    \ then A-- will give 7 |\n\n## Comparison Operators\n\nIn the Comparison Operator,\
    \ two operands A and B are compared.\n\n| Operators | Description |\n|---|---|\n\
    | ==(Equal) | It checks the value of two operands is equal or not, if yes then\
    \ the condition becomes true. E.g.- A=1, B=2. (A==B) condition is not true |\n\
    | !=(Not Equal) | It checks the value of two operands is equal or not, if the\
    \ values are not equal, then the condition becomes true. E.g.- A=1, B=2. (A!=B)\
    \ is true. |\n| >(Greater than) | It checks the value between two operands which\
    \ one is greater, if condition is right then, it display true. E.g.- (A>B) is\
    \ not true. |\n| <(Less than) | It checks the value between two operands which\
    \ one is less, if condition is right then, it display true. E.g.- (A<B) is true.\
    \ |\n| >=(Greater than or Equal to) | It checks the value of the first operand\
    \ is greater than or equal to the value of second operand, if condition is right\
    \ then it displays true. E.g. – (A>=B) not true. |\n\n## Assignment operator\n\
    \nJavaScript support following - assign operators.\n\n| Operator | Description\
    \ |\n| :--- | :--- |\n| =(Simple Assignment) | It is used to assigns a value to\
    \ a variable. E.g.- var x = 10; |\n| +=(Add and Assignment) | It is used to add\
    \ the value of right operand to a variable and assigns the result to the variable.\
    \ E.g.- Operator: x+=y Meaning: x =x + y |\n| – =(Subtract and Assignment) | It\
    \ is used to subtract the value of right operand to a variable and assigns the\
    \ result to the variable. E.g.- Operator: x – = y Meaning: x = x – y |\n| * =\
    \ (Multiply and Assignment) | It is used to multiply the variable by the value\
    \ of the right operand and assigns the result to the variable. E.g.- Operator:\
    \ x * = y Meaning: x = x * y |\n| / = (Divide and Assignment) | It is used to\
    \ divide the variable by the value of the right operand and assign the result\
    \ to the variable. E.g.- Operator: x / = y Meaning: x = x / y |\n\n## Bitwise\
    \ Operators\n\nJavaScript supports following - bitwise operators:\n\n| Operators\
    \ | Description |\n| :--- | :--- |\n| & (Bitwise AND) | It performs the AND operation\
    \ on each pair of bits. E.g. - (A & B) is 2. |\n| | (Bitwise OR) | It performs\
    \ the OR operation on each pair of bits. E.g. - (A | B) is 3. |\n| ^ (Bitwise\
    \ XOR) | It performs the OR operation on each pair of bits. E.g. - (A ^ B) is\
    \ 1. |\n| ~ (Bitwise Not) | It performs NOT operation on each pair of bits. E.g.\
    \ - (~B) is -4. |\n| << (Left Shift) | This operator shifts the first operand\
    \ the specified no of bits to the left. E.g. - (A << 1) is 4. |\n| >> (Right Shift)\
    \ | The left operand's value is moved right by the number of bits specified by\
    \ the right operand. E.g. - (A >>1) is 1. |\n| >>> (Right shift with zero) | This\
    \ operator is just like the >> (Right operator), except that the bits shifted\
    \ in on the left are always zero. E.g. - (A >>>1) is 1. |\n\n## Logical Operators\n\
    \nBoolean values are commonly utilized with logical operators.\n\nFollowing are\
    \ the - logical operators-\n\n| Operator | Description |\n| :--- | :--- |\n| &&(Logical\
    \ AND) | If both the operands are non-zero, then condition is true. E.g. - (A\
    \ && B) is true. |\n| || (Logical) OR | If any of the two operands are non-zero,\
    \ then the condition is true. E.g. - (A || B) is true. |\n| ! (Logical NOT) |\
    \ Reverses the logical state of its operand. If the condition is true, then the\
    \ Logical NOT Operator will make it false. E.g.- ! (A && B) is false. |\n\n##\
    \ Javascript If Else\n\nA conditional statement in JavaScript is used to conduct\
    \ different activities depending on the criteria.\nIn JavaScript, there are three\
    \ types of statements.\n\n- 1. if Statement.\n- 2. if else Statement.\n- 3. if\
    \ else if Statement.\n\n## if statement\n\nIf the condition is true or false,\
    \ the if statement is used in JavaScript to run the function.\n\n```\nif (condition)\
    \ { //\n\n    //content to be evaluated\n\n}\n```\n\n![](img/2bfe61f5593c3ea97ff290c1c0335a80_99_0.png)\n\
    \nExample:-\n\n```\n<!DOCTYPE html>\n<html>\n<body>\n<script>\nvar x=50;\nif(x>30){\n\
    document.write(\"value of x is greater than 30\");\n}\n</script>\n</body>\n</html>\n\
    ```\n\n## output\n\nValue of x is greater than 30\n\n## if else statement\n\n\
    If either condition is true or false, the if else statement is used.\n\n## Syntax\n\
    \n```\nif(condition)\n{\n// set of statements\n}\nelse\n{\n// set of statements\n\
    }\n```\n\n![](img/2bfe61f5593c3ea97ff290c1c0335a80_101_0.png)\n\n## Example\n\n\
    ```\n<!DOCTYPE html>\n<html>\n<body>\n<script>\nvar x=20;\nif(x%2==0){\ndocument.write(\"\
    x is even number\");\n}\nelse{\ndocument.write(\"a is odd number\")\n}\n</script>\n\
    </body>\n</html>\n```\n\n## Output\n\nX is even number\n\n## If else if\n\nIt\
    \ merely looks at the content to see if the expression is true across many expressions.\
    \ If otherwise if is a more complex version of the if else statement.\n\n## Syntax\n\
    \n```\nIf (condition1)\n{\nStatement(s) to be executed if condition 1 is true\n\
    }\nelse if (condition 2)\n{\nStatement(s) to be executed if condition 2 is true\n\
    }\nelse if (condition 3)\n{\nStatement(s) to be executed if condition 3 is true\n\
    }\nelse\n{\nStatement(s) to be executed if no condition is true\n}\n```\n\n##\
    \ Example\n\n```\n<!DOCTYPE html>\n<html>\n<body>\n<script>\nvar x=50;\nif (x===10){\n\
    document.write(“x is equal to 10”);\n}\nelse if(x===50){\ndocument.write(“x is\
    \ equal to 50”);\n}\nelse if(x===30){\ndocument.write(“x is equal to 30”);\n}\n\
    else{\ndocument.write(“a is not equal to 10, 50 or 30”);\n}\n</script>\n</body>\n\
    </html>\n```\n\n## Output\n\nx is equal to 50\n\n## Javascript Switch Statement\n\
    \nIn JavaScript, the switch statement is used to execute a single code under several\
    \ conditions. It’s the same as the else if statement, but it’s easier to remember\
    \ than the if..else..if statement.\n\n![](img/2bfe61f5593c3ea97ff290c1c0335a80_105_0.png)\n\
    \n## Syntax\n\n```\nswitch (expression)\n{\n    case 1: statement(s)\n    break;\n\
    \n    case 2: statement(s)\n    break;\n}\n```"
  mdcn: "## Javascript 数据类型\n\nJavascript 拥有多种数据类型来存储各种类型的值。\n在 Javascript 中，数据类型分为两种。\n\
    \n- 1. 原始数据类型。\n- 2. 非原始数据类型。\n\n由于 JavaScript 是动态类型语言，我们不需要定义变量的类型，因为 JavaScript\
    \ 引擎会动态使用它。在这种情况下，数据类型使用 `var` 指定。它可以存储任何类型的值，包括数字、字符串和对象。\n\n## 示例\n\n```\nvar\
    \ a=Ram; //String\n\nvar b=20; //Number\n\nvar x= {FirstName:”Ram”, lastName:”Doe”};\
    \ //Object\n```\n\n## JavaScript - 原始数据类型\n\n在 JavaScript 中，有五种不同的原始数据类型。\n\n\
    | 数据类型 | 描述 |\n| --- | --- |\n| String | 表示字符序列，例如 “Hello” |\n| Number | 表示数值，例如\
    \ 1,2,3,4,5,6。 |\n| Boolean | 表示布尔值，即真或假。 |\n| Undefined | 表示未定义的值。 |\n| Null\
    \ | 表示**完全没有值**。 |\n\n## JavaScript 非原始数据类型\n\n有 3 种非原始数据类型，如下所示：\n\n| 数据类型 |\
    \ 描述 |\n| --- | --- |\n| Object | 表示实例，通过它可以访问成员。 |\n| Array | 表示一组相似的值。 |\n|\
    \ RegExp | 表示正则表达式。 |\n\n## Javascript 运算符\n\n运算符是 JavaScript 中用于对操作数执行操作的符号。简单来说，3+2\
    \ 等于 5。这里的操作数是 3 和 2，运算符是 +。\nJavaScript 运算符如下：\n\n- 1. 算术运算符。\n- 2. 比较（关系）运算符。\n\
    - 3. 位运算符。\n- 4. 逻辑运算符。\n- 5. 赋值运算符。\n- 6. 特殊运算符。\n\n### 算术运算符\n\n我们在算术运算符中对操作数进行算术运算。\n\
    \n| 运算符 | 描述 |\n| :--- | :--- |\n| +(加法) | 将两个操作数相加 示例：A+B |\n| -(减法) | 从一个操作数减去另一个操作数\
    \ 示例：A-B |\n| *(乘法) | 将两个操作数相乘 示例：A*B |\n| /(除法) | 将分子除以分母 示例：B/A |\n| %(取模) |\
    \ 整数除法的余数为 0 示例：B%A 将得到 0 |\n| ++(自增) | 将整数值增加一 示例：如果值 A 是 9，那么 A++ 将得到 11 |\n\
    | --(自减) | 将整数值减少一 示例：如果值 A 是 11，那么 A-- 将得到 7 |\n\n## 比较运算符\n\n在比较运算符中，比较两个操作数\
    \ A 和 B。\n\n| 运算符 | 描述 |\n|---|---|\n| ==(等于) | 检查两个操作数的值是否相等，如果相等，则条件为真。例如：A=1,\
    \ B=2。(A==B) 条件不为真 |\n| !=(不等于) | 检查两个操作数的值是否相等，如果值不相等，则条件为真。例如：A=1, B=2。(A!=B)\
    \ 为真。 |\n| >(大于) | 检查两个操作数中哪个值更大，如果条件成立，则显示 true。例如：(A>B) 不为真。 |\n| <(小于) | 检查两个操作数中哪个值更小，如果条件成立，则显示\
    \ true。例如：(A<B) 为真。 |\n| >=(大于或等于) | 检查第一个操作数的值是否大于或等于第二个操作数的值，如果条件成立，则显示 true。例如：(A>=B)\
    \ 不为真。 |\n\n## 赋值运算符\n\nJavaScript 支持以下赋值运算符。\n\n| 运算符 | 描述 |\n| :--- | :--- |\n\
    | =(简单赋值) | 用于将值赋给变量。例如：var x = 10; |\n| +=(加法赋值) | 用于将右操作数的值加到变量上，并将结果赋给变量。例如：运算符：x+=y\
    \ 含义：x = x + y |\n| – =(减法赋值) | 用于从变量中减去右操作数的值，并将结果赋给变量。例如：运算符：x – = y 含义：x =\
    \ x – y |\n| * = (乘法赋值) | 用于将变量乘以右操作数的值，并将结果赋给变量。例如：运算符：x * = y 含义：x = x * y |\n\
    | / = (除法赋值) | 用于将变量除以右操作数的值，并将结果赋给变量。例如：运算符：x / = y 含义：x = x / y |\n\n## 位运算符\n\
    \nJavaScript 支持以下位运算符：\n\n| 运算符 | 描述 |\n| :--- | :--- |\n| & (按位与) | 对每一对位执行与操作。例如：(A\
    \ & B) 是 2。 |\n| | (按位或) | 对每一对位执行或操作。例如：(A | B) 是 3。 |\n| ^ (按位异或) | 对每一对位执行异或操作。例如：(A\
    \ ^ B) 是 1。 |\n| ~ (按位非) | 对每一对位执行非操作。例如：(~B) 是 -4。 |\n| << (左移) | 此运算符将第一个操作数向左移动指定的位数。例如：(A\
    \ << 1) 是 4。 |\n| >> (右移) | 左操作数的值向右移动右操作数指定的位数。例如：(A >>1) 是 1。 |\n| >>> (零填充右移)\
    \ | 此运算符类似于 >> (右移运算符)，只是向左移入的位始终为零。例如：(A >>>1) 是 1。 |\n\n## 逻辑运算符\n\n布尔值通常与逻辑运算符一起使用。\n\
    \n以下是逻辑运算符：\n\n| 运算符 | 描述 |\n| :--- | :--- |\n| &&(逻辑与) | 如果两个操作数都非零，则条件为真。例如：(A\
    \ && B) 为真。 |\n| || (逻辑或) | 如果两个操作数中任意一个非零，则条件为真。例如：(A || B) 为真。 |\n| ! (逻辑非)\
    \ | 反转其操作数的逻辑状态。如果条件为真，则逻辑非运算符会使其变为假。例如：! (A && B) 为假。 |\n\n## Javascript If Else\n\
    \nJavaScript 中的条件语句用于根据条件执行不同的操作。\n在 JavaScript 中，有三种类型的语句。\n\n- 1. if 语句。\n-\
    \ 2. if else 语句。\n- 3. if else if 语句。\n\n## if 语句\n\n在 JavaScript 中，if 语句用于在条件为真或假时执行函数。\n\
    \n```\nif (condition) { //\n\n    //要评估的内容\n\n}\n```\n\n![](img/2bfe61f5593c3ea97ff290c1c0335a80_99_0.png)\n\
    \n示例：\n\n```\n<!DOCTYPE html>\n<html>\n<body>\n<script>\nvar x=50;\nif(x>30){\n\
    document.write(\"value of x is greater than 30\");\n}\n</script>\n</body>\n</html>\n\
    ```\n\n## 输出\n\nValue of x is greater than 30\n\n## if else 语句\n\n当条件为真或假时，使用\
    \ if else 语句。\n\n## 语法\n\n```\nif(condition)\n{\n// 语句集\n}\nelse\n{\n// 语句集\n\
    }\n```\n\n![](img/2bfe61f5593c3ea97ff290c1c0335a80_101_0.png)\n\n## 示例\n\n```\n\
    <!DOCTYPE html>\n<html>\n<body>\n<script>\nvar x=20;\nif(x%2==0){\ndocument.write(\"\
    x is even number\");\n}\nelse{\ndocument.write(\"a is odd number\")\n}\n</script>\n\
    </body>\n</html>\n```\n\n## 输出\n\nX is even number\n\n## If else if\n\n它仅检查内容以查看表达式在多个表达式中是否为真。if\
