  md: '# Python List


    The list is one of Python’s most flexible and mutable data structures. It can
    store a variety of data types and heterogeneous data.


    Inside the square brackets, the list includes comma-separated values (item). In
    Python, making a list is as easy as this:


    ```

    list1 = [‘Abhay’,’Arjun’,’Himanshu’,’Anubhav’]

    list2 = [1,2,3,4,5,6]

    list3 = [‘Himanshu’,20, 54.6,’Abhay’, ‘a’, ‘b’]

    ```


    # Indexing and Slicing in List


    # Indexing in List:


    Indexing of list can be done by using [] operator.

    list =[ ‘P’, ‘Y’, ‘T’, ‘H’, ‘O’ ,N’]


    ![](img/2bfe61f5593c3ea97ff290c1c0335a80_53_0.png)


    The index location of the list can be used to view the list’s values. From 0 to
    n-1, the index is used.


    The 0th index is used to store the first element, and the first index is used
    to store the second element, and so on.'
  merge: -1
  pgno: 53
- img_proc: true
  md: 'The rightmost index position is -1, the leftmost index position is -2, and
    so on. For example:


    ```

    list[0]=P          list[-6]=P

    list[1]=Y          list[-5]=Y

    list[2]=T          list[-4]=T

    list[3]=H          list[-3]=H

    list[4]=O          list[-2]=O

    list[5]=N          list[-1]=N

    ```


    # Slicing in List


    Python has a feature that allows you to get a sub-list of a list. When we just
    need a small amount of data from a list, slicing comes in handy.

    The syntax is:

    <em>list_variable</em>[start: end: step]


    +   - <strong>start</strong> refers to the starting position of the list element.

    - <strong>stop</strong> refers to the index of the element where we should **stop**
    just before to finishing of our slice.

    - <strong>step</strong> allows you to take each nth-element within a **start:stop**
    range.


    Let’s look at this concept using below example:

    Example-1:

    list = [10,20,30,40,50,60,70,80,90]

    print(list[2:6])


    # Output


    ```

    [30, 40, 50, 60]

    ```


    Since the start is equal to 2, slicing begins at the second position in the example
    above. Index 2 has a value of 30.'
  merge: -1
