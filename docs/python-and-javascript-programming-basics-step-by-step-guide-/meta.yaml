    \ stringname=\"string value\";\n```\n\n### Example\n\n```\n<!DOCTYPE html>\n<html>\n\
    <body>\n<script>\nvar str=\"Hello String Literal\";\ndocument.write(str);\n</script>\n\
    </body>\n</html>\n```\n\n### Output\n\nHello String Literal\n\n### Using new keyword\n\
    \n**Syntax**\nvar stringname=new String(\"new keyword\")\n\n**Example**\n\n```\n\
    <!DOCTYPE html>\n<html>\n<body>\n<script>\nvar stringname=new String(\"Hello String\"\
    );\ndocument.write(stringname);\n</script>\n</body>\n</html>\n```\n\n**Output**\n\
    Hello String\n\n### String properties\n\nThere is a list of string object properties\
    \ as well as their descriptions.\n\n1.  constructor.\n2.  length.\n3.  prototype.\n\
    \n**Constructor**– It gives you a reference to the string function that made the\
    \ object in the first place.\n\n**Syntax**\nstring.constructor\n\n**Length**-\
    \ The number of characters in a string is returned.\n\n### Syntax\n\n```\nstring.length\n\
    ```\n\n**Prototype**– It let any object to have properties and methods added to\
    \ it.(Number, Boolean, string, and data etc.).\n\nThis is a global property that\
    \ most objects have access to.\n\n### Syntax\n\n```\nobject.prototype.name = value\n\
    ```\n\nMethods are also available in the JavaScript string:\n\n| Methods | Description\
    \ |\n|---|---|\n| charAt(index) | It returns the character at the given index.\
    \ |\n| concat(str) | It merges the text of two string and returns new string.\
    \ |\n| indexOf(str) | It returns the index position of the given string. |\n|\
    \ lastIndexOf(str) | It returns the last index position of the given string. |\n\
    | match() | It is used to match regular expression against a string. |\n| toLowerCase()\
    \ | It is used to return given string value converted to lower case. |\n| toUpperCase()\
    \ | It is used to return the given string value converted to uppercase. |\n| valueOf()\
    \ | Returns the primitive value of the specified object. |\n\n### charAt()\n\n\
    It’s a method for getting the character from a given index.\n\n```\n<!DOCTYPE\
