  - "[PAGE 105]\n\n# Javascript Switch Statement\n\nIn JavaScript, the switch statement\
    \ is used to execute a single code under several conditions. It’s the same as\
    \ the else if statement, but it’s easier to remember than the if..else..if statement.\n\
    \n![](img/2bfe61f5593c3ea97ff290c1c0335a80_105_0.png)\n\n# Syntax\n\n```\nswitch\
