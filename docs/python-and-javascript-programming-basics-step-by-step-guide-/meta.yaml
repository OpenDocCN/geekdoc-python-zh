    \ num >0:\n    print(num, “is a positive number.”)\n    print(“This is also always\
    \ printed.”)\n```\n\n### Output\n\n3 is a positive number.\nThis is always printed.\n\
    This is also always printed.\n\n## Python elif\n\n**Python elif**\nThe elif statement\
    \ is used to validate multiple conditions and execute a particular block of statements\
    \ based on which one is valid.\n\n**Syntax**\n\n```\nif expression1:\n    statement\n\
    \nelif expression2:\n    statement\n\nelif expression3:\n    statement\n\nelse:\n\
    \    statement\n```\n\nElif statements, such as else, may be optional. If the\
    \ if expression evaluates true, the declaration of expression 1 is printed; otherwise,\
    \ control moves to the elif expression; if the elif condition evaluates false,\
    \ control moves to the next elif.\nIt will go through all of the elif expressions\
    \ before it finds one that is real.\nPython, unlike other programming languages,\
