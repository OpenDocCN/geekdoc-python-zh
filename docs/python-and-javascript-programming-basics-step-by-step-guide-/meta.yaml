    \ then press Edit.\n- Go to the Variable value field and choose it. Add a semicolon\
    \ before the path to the python.exe file (;).\n\n## Python Keywords\n\nKeywords\
    \ are words that are reserved for the compiler and have a specific meaning. They\
    \ aren’t allowed to be used as a variable. Keywords are parts of the syntax, such\
    \ as:\n\n```\nreturn (a+b)\n```\n\nThe keyword return is used here, while the\
    \ variables a and b are variables.\nThe following is a list of all Python keywords:\n\
    \n- and-else-lambda\n- or-except-None\n- assert-finally-nonlocal\n- break-try-pass\n\
    - continue-raise-global\n- class-from-return\n- def-import-False\n- del-in-True\n\
    - if-is-for\n- elif-not-while\n- with-yield-\n\n## Description of Some Python\
    \ keywords\n\n### if\n\nThe if statement in Python is the most basic conditional\
    \ statement. It is used to determine whether or not a statement block will be\
    \ executed.\n\n```\na = 20\n\nif (a>15):\n    print(\"I am bigger than 15\")\n\
    ```\n\n### Output\n\nI am bigger than 15\n\n### else\n\nIf there is an if statement,\
    \ there is also an else statement. If the condition of the if statement is false,\
    \ the else block is executed. The following example exemplifies this point:\n\n\
    ```\na = 20\nb = 30\n\nif (a> b):\n    print('a is greater than b')\nelse:\n \
    \   print('b is greater than a')\n```\n\n### Output\n\nb is greater than a\n\n\
    ### elif\n\nElif is an acronym for else-if. It is used to validate multiple conditions,\
    \ meaning that if the previous condition is incorrect, the next condition is checked.\
    \ Consider the following scenario:\n\n```\na=10\nb=10\n\nif (a>b):\n    print('a\
    \ is smaller than b')\nelif (a == b):\n    print('a is equal to b')\nelse:\n \
    \   print('a is greater than b')\n```\n\n### Output\n\na is equal to b\n\n###\
    \ True\n\nThe boolean true is defined by the true keyword. The interpreter returns\
    \ true if the given statement is true. Consider the following scenario:\n\n```\n\
    print(1==1)\n```\n\n### OUTPUT\n\nTrue\n\n### False\n\nA boolean false is represented\
    \ by the keyword False. The interpreter returns false if the given statement is\
    \ false. for example:\n\n```\nprint(1>1)\n```\n\n### Output\n\nFalse\n\n### assert\n\
    \nAs a debugging method, the assert keyword is used. It aids in the efficient\
    \ flow of code. It makes it easier for us to locate bugs.\nAssertions are essentially\
    \ assumptions that a programmer is aware of and often hopes to be right. As a\
    \ result, they’re coded so that if the argument fails, the code won’t run any\
    \ more.\n\n```\na = 10\nb = 0\nprint('a is dividing by Zero')\nassert b != 0\n\
    print(a / b)\n```\n\n### Output\n\na is dividing by Zero\n\n### Runtime Exception:\n\
    \n```\nTraceback (most recent call last):\nFile \"/home/40545678b342ce3b70beb1224bed345f.py\"\
    , line 4, in\nassert b != 0, \"Divide by 0 error\"\nAssertionError: Divide by\
    \ 0 error\n```\n\n### and\n\nThe logical operators in Python are and, or, and\
    \ not. If all operands are valid in and operator, the condition will be true:\n\
    For example:\n\n```\na=100\nif (a>90) and (a<101):\n    print('Both conditions\
    \ are true.a is ',a)\n```\n\n### Output\n\nBoth conditions are true. a is 100\n\
    \n## Python Operators\n\nA symbol that acts on one or more operands is known as\
    \ an operator. The operand is a value or vector on which the operation is performed.\
    \ Consider the example 6+9. The operands are 6 and 9, and the operator is +. Python\
    \ has a number of operators, which are listed below:\n\n- Arithmetic Operators\n\
    - Assignment Operators\n- Comparison Operators\n- Logical Operators\n- Membership\
    \ Operators\n- Bitwise Operators\n- Identity Operators\n\n### Arithmetic Operator\n\
    \nBasic mathematical operations are performed using the Python Arithmetic operators.\
    \ The following is a list of arithmetic operators. Assume x and y are two variables\
    \ with values of 30 and 10, respectively, and the following is the product of\
    \ the operation:\n\n| Operators | Description | Example |\n| :--- | :--- | :---\
    \ |\n| + (Addition) | It is used to add two operands. | x + y = 40 |\n| – (Subtraction)\
    \ | It is used to subtract two operands. It will give the negative value if the\
    \ first operand is less than the second operand. | x – y = 20 or y – x = -20 |\n\
    | * (Multiplication) | It is used to multiply the value on either side of operators.\
    \ | x * y = 300 |\n| / (Divide) | It divides the first operand by the second operand\
    \ and returns the quotient. | x/y = 3.0 |\n| // (Floor Division) | It is used\
    \ to divide and returns the integer value of the quotient. | x//y=3 or x=30 y=7\
    \ then x//y=4 |\n| % (Modulus) | It returns reminder after division. | x%y = 0\
    \ |\n| ** (Exponent) | It is used to calculate the power of the first operand.\
    \ | x = 5, y = 2 then x ** 2 = 25 |\n\n### Assignment Operators\n\nThe value of\
    \ the right operand is assigned to the left operand using the assignment operator.\
    \ The following is a list of assignment operators. If we give x = 20 and y = 10,\
    \ we get the following results:\n\n| Operator | Description | Examples |\n| :---\
    \ | :--- | :--- |\n| = | Assigns value of the right expression to the left operand.\
    \ | x = 20 |\n| += | It is used to add the value on either side and assign expression\
    \ on the left side. Result is assigned to the right operand. | x+=y is equal to\
    \ x=x + y therefore x = 30 |\n| -= | It is used to subtract the value on either\
    \ side and assign expression on the left side. Result is assigned to the right\
    \ operand. | x-=y is equal to x=x - y therefore x = 10 |\n| *= | It multiplies\
    \ the operands and modifies value assigned to right operand. | x*=y is equal to\
    \ x = x*y therefore x = 200 |\n| /= | It divides the operands and modifies value\
    \ assigned to right operand. | x/=y is equal to x = x/y therefore x = 2.0 |\n\
    | %= | It calculates the modulus of the values on either side. And assigns result\
    \ to the expression on the left. | x%=y is equal to x = x% y therefore x = 0 |\n\
    | **= | It evaluates exponential (power) calculation on operators and assigns\
    \ value to the left operand | x=20,y=2 x**=2 is equal to x=x**y therefore x=400\
    \ |\n| //= | It performs floor division on operators and assign value to the left\
    \ operand | x//=y is equal to x = x//y therefore x = 2 |\n\n### Comparison operators\n\
    \nPython has a number of comparison operators that are often used to compare the\
    \ values of two operands. When these values are compared, the result is a Boolean\
    \ true or false. The operators are listed in the table below. x=10 and y=15 have\
    \ been allocated.\n\n| Operators | Description | Examples |\n| :--- | :--- | :---\
    \ |\n| == | It returns true if the values of the two operands are equal. | x==y\
    \ is False |\n| != | It returns false if the values of the two operands are not\
    \ equal. | x!=y is True |\n| <= | If the left operand is less than or equal to\
    \ the right operand, then it will evaluate True | x<=y is True |\n| >= | If the\
    \ left operand is greater than or equal to the right operand, then it evaluates\
    \ True | x>=y is False |\n| <> | This operator is similar to !=(not equal) | x<>y\
    \ is True |"
  mdcn: "## 第六步 设置环境变量\n\n如果您没有勾选“Add Python to PATH”复选框，或者您的Python安装程序版本不包含该选项，请按照以下步骤操作：\n\
    使用“开始”菜单，选择 +R。\n\n1.  打开命令提示符并输入 `sysdm.cpl`。系统属性窗口将会出现。\n2.  转到“高级”选项卡，并从下拉菜单中选择“环境变量”。\n\
    \n如果您没有勾选“Add Python to PATH”复选框，或者您的Python安装程序版本不包含该选项，请按照以下步骤操作：\n使用“开始”菜单，选择\
    \ +R。\n\n1.  打开命令提示符并输入 `sysdm.cpl`。系统属性窗口将会出现。\n2.  转到“高级”选项卡，并从下拉菜单中选择“环境变量”。\n\
    -   在“系统变量”下找到并选择 `Path` 变量，然后点击“编辑”。\n-   转到“变量值”字段并选中它。在 `python.exe` 文件的路径前添加一个分号（;）。\n\
    \n## Python 关键字\n\n关键字是为编译器保留的、具有特定含义的词语。它们不允许用作变量名。关键字是语法的一部分，例如：\n\n```\nreturn\
    \ (a+b)\n```\n\n这里使用了关键字 `return`，而变量 `a` 和 `b` 是变量。\n以下是所有 Python 关键字的列表：\n\n\
    - and-else-lambda\n- or-except-None\n- assert-finally-nonlocal\n- break-try-pass\n\
    - continue-raise-global\n- class-from-return\n- def-import-False\n- del-in-True\n\
    - if-is-for\n- elif-not-while\n- with-yield-\n\n## 部分 Python 关键字描述\n\n### if\n\
    \nPython 中的 `if` 语句是最基本的条件语句。它用于决定是否执行一个语句块。\n\n```\na = 20\n\nif (a>15):\n  \
    \  print(\"I am bigger than 15\")\n```\n\n### 输出\n\nI am bigger than 15\n\n###\
    \ else\n\n有 `if` 语句，就有 `else` 语句。如果 `if` 语句的条件为假，则执行 `else` 代码块。以下示例说明了这一点：\n\n\
    ```\na = 20\nb = 30\n\nif (a> b):\n    print('a is greater than b')\nelse:\n \
    \   print('b is greater than a')\n```\n\n### 输出\n\nb is greater than a\n\n###\
    \ elif\n\n`elif` 是 `else-if` 的缩写。它用于验证多个条件，意味着如果前一个条件不正确，则检查下一个条件。考虑以下场景：\n\n\
    ```\na=10\nb=10\n\nif (a>b):\n    print('a is smaller than b')\nelif (a == b):\n\
    \    print('a is equal to b')\nelse:\n    print('a is greater than b')\n```\n\n\
    ### 输出\n\na is equal to b\n\n### True\n\n布尔值 `true` 由关键字 `True` 定义。如果给定的语句为真，解释器返回\
    \ `True`。考虑以下场景：\n\n```\nprint(1==1)\n```\n\n### 输出\n\nTrue\n\n### False\n\n布尔值\
    \ `false` 由关键字 `False` 表示。如果给定的语句为假，解释器返回 `False`。例如：\n\n```\nprint(1>1)\n```\n\
    \n### 输出\n\nFalse\n\n### assert\n\n`assert` 关键字用作一种调试方法。它有助于代码的高效运行。它使我们更容易定位错误。\n\
    断言本质上是程序员已知并通常希望为真的假设。因此，它们被编码为：如果断言失败，代码将不再继续执行。\n\n```\na = 10\nb = 0\nprint('a\
    \ is dividing by Zero')\nassert b != 0\nprint(a / b)\n```\n\n### 输出\n\na is dividing\
    \ by Zero\n\n### 运行时异常：\n\n```\nTraceback (most recent call last):\nFile \"/home/40545678b342ce3b70beb1224bed345f.py\"\
    , line 4, in\nassert b != 0, \"Divide by 0 error\"\nAssertionError: Divide by\
    \ 0 error\n```\n\n### and\n\nPython 中的逻辑运算符有 `and`、`or` 和 `not`。在 `and` 运算符中，如果所有操作数都有效，则条件为真：\n\
    例如：\n\n```\na=100\nif (a>90) and (a<101):\n    print('Both conditions are true.a\
    \ is ',a)\n```\n\n### 输出\n\nBoth conditions are true. a is 100\n\n## Python 运算符\n\
    \n作用于一个或多个操作数的符号称为运算符。操作数是执行操作的值或向量。考虑示例 `6+9`。操作数是 `6` 和 `9`，运算符是 `+`。Python\
    \ 有多种运算符，如下所列：\n\n- 算术运算符\n- 赋值运算符\n- 比较运算符\n- 逻辑运算符\n- 成员运算符\n- 位运算符\n- 身份运算符\n\
    \n### 算术运算符\n\nPython 算术运算符用于执行基本的数学运算。以下是算术运算符的列表。假设 `x` 和 `y` 是两个变量，值分别为 `30`\
    \ 和 `10`，以下是运算结果：\n\n| 运算符 | 描述 | 示例 |\n| :--- | :--- | :--- |\n| + (加法) | 用于将两个操作数相加。\
    \ | x + y = 40 |\n| – (减法) | 用于将两个操作数相减。如果第一个操作数小于第二个操作数，则返回负值。 | x – y = 20 或\
    \ y – x = -20 |\n| * (乘法) | 用于将运算符两侧的值相乘。 | x * y = 300 |\n| / (除法) | 将第一个操作数除以第二个操作数并返回商。\
    \ | x/y = 3.0 |\n| // (整除) | 用于除法并返回商的整数值。 | x//y=3 或 x=30 y=7 则 x//y=4 |\n| %\
    \ (取模) | 返回除法后的余数。 | x%y = 0 |\n| ** (幂) | 用于计算第一个操作数的幂。 | x = 5, y = 2 则 x **\
    \ 2 = 25 |\n\n### 赋值运算符\n\n赋值运算符用于将右侧操作数的值赋给左侧操作数。以下是赋值运算符的列表。如果我们设定 `x = 20`\
    \ 和 `y = 10`，得到以下结果：\n\n| 运算符 | 描述 | 示例 |\n| :--- | :--- | :--- |\n| = | 将右侧表达式的值赋给左侧操作数。\
    \ | x = 20 |\n| += | 用于将两侧的值相加，并将表达式赋值给左侧。结果赋给右侧操作数。 | x+=y 等同于 x=x + y 因此 x =\
    \ 30 |\n| -= | 用于将两侧的值相减，并将表达式赋值给左侧。结果赋给右侧操作数。 | x-=y 等同于 x=x - y 因此 x = 10 |\n\
    | *= | 将操作数相乘，并修改赋给右侧操作数的值。 | x*=y 等同于 x = x*y 因此 x = 200 |\n| /= | 将操作数相除，并修改赋给右侧操作数的值。\
    \ | x/=y 等同于 x = x/y 因此 x = 2.0 |\n| %= | 计算两侧值的模。并将结果赋给左侧表达式。 | x%=y 等同于 x =\
    \ x% y 因此 x = 0 |\n| **= | 对运算符进行指数（幂）计算，并将值赋给左侧操作数。 | x=20,y=2 x**=2 等同于 x=x**y\
    \ 因此 x=400 |\n| //= | 对运算符执行整除，并将值赋给左侧操作数。 | x//=y 等同于 x = x//y 因此 x = 2 |\n\n\
    ### 比较运算符\n\nPython 有多种比较运算符，通常用于比较两个操作数的值。当这些值被比较时，结果是一个布尔值 `true` 或 `false`。运算符列于下表中。已分配\
    \ `x=10` 和 `y=15`。\n\n| 运算符 | 描述 | 示例 |\n| :--- | :--- | :--- |\n| == | 如果两个操作数的值相等，则返回\
    \ `true`。 | x==y 为 False |\n| != | 如果两个操作数的值不相等，则返回 `false`。 | x!=y 为 True |\n\
    | <= | 如果左侧操作数小于或等于右侧操作数，则计算结果为 `True`。 | x<=y 为 True |\n| >= | 如果左侧操作数大于或等于右侧操作数，则计算结果为\
    \ `True`。 | x>=y 为 False |\n| <> | 此运算符类似于 `!=`（不等于）。 | x<>y 为 True |"
