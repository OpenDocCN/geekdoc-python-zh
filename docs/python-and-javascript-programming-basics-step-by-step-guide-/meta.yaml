    \ 运算符完成。\n\n```python\nlist = ['P', 'Y', 'T', 'H', 'O', 'N']\n```\n\n列表的索引位置可用于查看列表的值。索引从\
    \ 0 到 n-1 使用。\n\n第 0 个索引用于存储第一个元素，第一个索引用于存储第二个元素，依此类推。\n\n最右边的索引位置是 -1，最左边的索引位置是\
    \ -2，依此类推。例如：\n\n```\nlist[0]=P          list[-6]=P\nlist[1]=Y          list[-5]=Y\n\
