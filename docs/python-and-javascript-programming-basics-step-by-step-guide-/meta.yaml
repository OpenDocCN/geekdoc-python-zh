    ## Python 注释\n\n在任何编程语言中，注释都是必需的。\n它使我们的程序更具可读性，Python 解释器会忽略被注释的代码。\n在 Python\
    \ 代码中，有两种使用注释的方法。在代码中练习使用注释是个好主意，这样更容易理解。\n没有注释的代码可能会令人困惑。\n如果我们想说明一段代码语句而不执行它，我们可以通过注释它来实现。\n\
    虽然注释不是代码的一部分，但它提高了可读性。\n\n### 单行注释\n\n在行首使用 #（井号）字符来创建单行注释。在行尾，它会立即终止。例如：\n\n\
