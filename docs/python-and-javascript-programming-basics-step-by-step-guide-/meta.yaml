  md: '# # Javascript String


    The String object is used to work with a string of characters. It’s a tool for
    storing and manipulating text.

    In JavaScript, there are two ways to make a string:


    +   1. String literal.

    2. Using new keyword.


    # ## String literal


    String literals are created by using double quotes.


    # ### Syntax


    ```

    var stringname=“string value”;

    ```


    # ### Example


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    var str=“Hello String Literal”;

    document.write(str);

    </script>

    </body>

    </html>

    ```


    # ### Output


    Hello String Literal'
