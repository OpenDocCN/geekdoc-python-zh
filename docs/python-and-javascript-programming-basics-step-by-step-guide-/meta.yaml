  md: '# # Python File Handling


    # ## What is the file?


    The file is a single unit that contains a set of data. It’s used to store data
    in non-volatile memory, like a hard drive.


    The RAM (Random Access Memory), which is a volatile memory, is where most computer
    programs run. All data is lost when the program is terminated, so we must save
    it to permanent storage or a local file.


    As a result, in Python, file handling can be accomplished in the following order:


    +   - Open a file

    - Read or write (perform operation)

    - Close the file


    # ## Open a file


    The built-in function open () in Python is used to open a file. A file object
    will be returned by this function. To return a file object, the open () function
    is combined with the two arguments. The file name is accepted in the first argument,
    and the file mode is accepted in the second.


    The syntax following:


    ```

    fs = open (filename, access mode)

    ```


    **filename-** The name of the file we want to open is included in this argument.


    **access_mode** – This argument specifies the file’s open mode, such as read,
    write, add, and so on. This argument is not required; if it is not given, the
    file will open in **r** read mode by default.


    Consider following example:'
