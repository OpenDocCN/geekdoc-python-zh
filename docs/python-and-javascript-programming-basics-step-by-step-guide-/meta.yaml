    \ anyone can learn it in a few hours or days, making it a programmer-friendly\
    \ language.\n   If you have strong logical skills, you can learn this language\
    \ easily even if you don’t know how to code.\n   b) **Easy to read**\n   Python\
    \ code is somewhat similar to English since it is a high-level programming language.\
    \ Curly braces are not used; instead, indentation is used to describe the code\
    \ block, and the code is simple to read.\n\n+   2. **High-level Language**\n \
    \  Python is a programming language with a high degree of abstraction. It focuses\
    \ more on the programming logic than on critical hardware components like memory\
    \ addressing and register use.\n   Its code is self-contained and does not require\
    \ any prior knowledge of the system architecture. We also don’t have to worry\
    \ about memory management.\n\n+   3. **Interpreted**"
- md: 'In programming languages such as C or C++, there are two steps to executing
    code: first compile it, then run it, while Python does not require compiling.
    Internally, the source code is translated to byte code, which is a fast format.
    Python is an interpreted language, which means that it executes code line by line
    and in its entirety. As a result, debugging the code is much simpler. It’s a little
    slower than JAVA because of the interpreter, but that’s not a big deal because
    it’s better than other languages. Python has a greater degree of flexibility than
    compiled languages. It manages memory for you automatically.


    ## 4. Object-Oriented


    Python is an object-oriented programming language that supports concepts such
    as objects, classes, encapsulation, inheritance, and so on. It is object-oriented
    and integrates data and functions. Real-world entities are defined in OOPs by
    objects, and classes are the object’s blueprint. It also works with procedural
    languages. Functions are central to procedural language programming, which makes
    code reusable. The most natural and practical approach is object-oriented programming.
    The principles of OOPs allow you to break down your program into smaller problems
    that you can tackle one at a time.


    ## 5. Dynamically Typed


    Python is a dynamically typed language, which means that when declaring variables,
    the data type does not delegate. The type of value is determined at runtime rather
    than in advance. When we declare a variable with a value, the value is saved in
    memory and attaches the variable to the memory container. For example, we may
    assign the string value x=“Hello world” to a string variable. The advantage of
    dynamic memory allocation is that it prevents memory waste. Since all memory allocation
    cannot be used when we use static memory allocation, a lot of memory is lost.


    ## 6. Large Standard Library


    When you install Python, you’ll be prompted to enter a password. It came with
    a large library that you can use instead of writing to every variable in your
    code. There’s a library for regular expressions, threading, databases, image manipulation,
    unit-testing web browsers, CGI, and more. A Python library is a collection of
    functions and methods. It helps you to perform a variety of tasks without having
    to write code.


    ## 7. Extensible


    Python is extensible, which means you can write Python code in languages other
    than Python, such as Java, C, and C++. Python is therefore an extensible language.
    It doesn’t extend Python in any way (syntax, constructs, etc.), but it does allow
    you to interact with libraries written in other languages. (Mainly C or C++, but
    you can use C as a bridge to call other languages with C interfaces.)


    ## 8. Portable


    Python is platform-agnostic, which means it can run on any device. Python code
    can run on a variety of platforms, including Mac, Linux, and Windows. Assume you
    wrote the code on a Windows computer. You don’t need to make any improvements
    to it now if you want to run it on Linux. It is not necessary to write different
    code for each platform.


    ## 9. Free and Open Source


    Python is available for free on its official website ([www.python.org](http://www.python.org)).
    It is available for download and installation by anyone. You can also get a Python
    IDE (Integrated Development Environment) like Pycharm, Jupiter, Visual Studio,
    and so on. Python is also an open-source language, which ensures that its source
    code is freely accessible and unrestricted. Anyone can download it, use it, and
    build new modules or functions with it, which they can then share with the Python
    community.


    ## 10. GUI Programming


    The acronym GUI stands for “Graphical User Interface.” Using Python Tkinter or
    PyQt, we can build a simple desktop program.


    ## 11. Expressive


    Python is a language that allows you to express yourself. It means that a single
    line of Python code can be more expressive than a line of code written in another
    programming language. The main benefit of using a more expressive language is
    that the fewer lines of code you write, the easier you can finish the project.
    It’s easier to debug and keep the code up to date.


    ## Python Setup Guide and Installation


    Python is a high-level programming language that is commonly used. Python’s first
    version was released in 1991. Python has grown in popularity since then. It’s
    widely regarded as one of the most user-friendly and adaptable server-side programming
    languages available.


    The Python interpreter must be installed before you can begin working with Python.
    Unlike other Linux distributions, Windows does not have Python as a standard feature.
    However, installing Python on a Windows server or a local machine is a simple
    process. There are several popular methods for accomplishing this:


    - Python is available for free at www.python.org, which is run by the Python Software
    Foundation. In most cases, this entails installing and running a suitable installer
    for your operating system.

    - Installing Homebrew, a package manager for macOS, is the fastest way to get
    Python installed.

    - It comes with a package manager for Linux that can be used to install Python.

    - Applications that have a Python programming environment can be downloaded for
    mobile operating systems such as Android and iOS.

    - A Python programming environment is available on a number of websites. These
    websites allow you to practice coding without having to install Python.


    ## Python Installation on Windows


    You must first select a Python version. Python 3.7 must be installed if you want
    to learn the most recent version of Python. This version can be installed alongside
    2.7, but it is no longer used in industry.


    Python on Windows can be installed in a few steps. The following are the steps
    to take:


    ### Step-1: Set Up for Download


    1. Open a browser and go to www.python.org, the official Python website. It will
    take you to the website’s home page.


    ![](img/2bfe61f5593c3ea97ff290c1c0335a80_14_0.png)


    - Go to the Downloads section and choose Windows from the drop-down menu. Look
    for the Python version you like. Python 3 has been updated to version 3.7.4, while
    Python 2 has been updated to version 2.7.16. Consider the following illustration:


    ![](img/2bfe61f5593c3ea97ff290c1c0335a80_14_1.png)


    ### Step-2: Select Installer


    To download Python for 64-bit OS, choose either the window x86-64 executable installer
    or the window x86 executable installer.


    Note that you can install the 32-bit or 64-bit version of Windows. For the most
    part, either installer can operate on a 64-bit machine. According to the operating
    system, the 32-bit version uses less memory, but the 64-bit version works better
    for applications that require intensive computation.


    If you’re unsure about which version to choose, go with 64-bit. However, if you
    make the “wrong” decision and choose to upgrade to a different version of Python,
    you can easily uninstall Python and reinstall another installer.


    ### Step-3: Run the Installer


    Run the installer after you’ve downloaded it.


    1. Check the Add Python 3.7 to Path checkbox and install the launcher for all
    users. The Add Python to Path checkbox is not available in older versions of Python.

    2. Select the option to install now, which is the recommended installation method.


    Note that such features may not be available in older versions of Python. However,
    Pip and IDLE are recommended installation choices in all recent Python versions
    (Integrated Development and Learning Environment).


    ![](img/2bfe61f5593c3ea97ff290c1c0335a80_15_0.png)


    - “Setup was successful,” says the next dialog box. You can allow Python to use
    long path names by selecting “Disable path length limit.”


    ![](img/2bfe61f5593c3ea97ff290c1c0335a80_16_0.png)


    ### Step-4: Check to See if Python is Loaded


    1. Go to the directory where Python was installed on your computer. It’s C:UsersUsernameAppDataLocalProgramsPythonPython37
    in our framework. We’ve installed the most recent version of Python.

    2. Double-click the “python.exe” (python executable file) file.

    3. You can also use the command prompt to verify it by typing “python —version.”
    It will show you the Python version. If Python is successfully enabled, the following
    output will appear.


    ### Step-5: Check to See if Pip is Installed


    Pip is a powerful package management system for Python software packages. If you
    install an older version of Python, it is possible that Pip would not be pre-installed.'
  mdcn: '在C或C++等编程语言中，执行代码有两个步骤：先编译，然后运行，而Python不需要编译。在内部，源代码被转换为字节码，这是一种快速的格式。Python是一种解释型语言，这意味着它逐行并完整地执行代码。因此，调试代码要简单得多。由于解释器的存在，它比JAVA稍慢，但这不是大问题，因为它比其他语言更好。Python比编译语言具有更大的灵活性。它会自动为你管理内存。


    ## 4. 面向对象


    Python是一种面向对象的编程语言，支持对象、类、封装、继承等概念。它是面向对象的，并集成了数据和函数。在面向对象编程中，现实世界的实体通过对象来定义，而类是对象的蓝图。它也适用于过程式语言。函数是过程式语言编程的核心，这使得代码可重用。面向对象编程是最自然和实用的方法。面向对象编程的原则允许你将程序分解成更小的问题，然后逐一解决。


    ## 5. 动态类型


    Python是一种动态类型语言，这意味着在声明变量时，数据类型不会被指定。值的类型是在运行时确定的，而不是预先确定的。当我们用一个值声明一个变量时，该值被保存在内存中，并将变量附加到内存容器。例如，我们可以将字符串值x=“Hello
    world”分配给一个字符串变量。动态内存分配的优点是它可以防止内存浪费。因为当我们使用静态内存分配时，并非所有分配的内存都能被使用，所以会损失大量内存。


    ## 6. 大型标准库


    当你安装Python时，会提示你输入密码。它附带了一个大型库，你可以使用它，而无需在代码中为每个变量编写代码。有用于正则表达式、线程、数据库、图像处理、单元测试、Web浏览器、CGI等的库。Python库是函数和方法的集合。它帮助你执行各种任务，而无需编写代码。


    ## 7. 可扩展


    Python是可扩展的，这意味着你可以用Python以外的语言（如Java、C和C++）编写Python代码。因此，Python是一种可扩展的语言。它不会以任何方式扩展Python（语法、构造等），但它允许你与用其他语言编写的库进行交互。（主要是C或C++，但你可以使用C作为桥梁来调用具有C接口的其他语言。）


    ## 8. 可移植


    Python是平台无关的，这意味着它可以在任何设备上运行。Python代码可以在多种平台上运行，包括Mac、Linux和Windows。假设你在Windows计算机上编写了代码。如果你想在Linux上运行它，现在不需要对它进行任何改进。没有必要为每个平台编写不同的代码。


    ## 9. 免费和开源


    Python可以在其官方网站（[www.python.org](http://www.python.org)）免费获取。任何人都可以下载和安装它。你也可以获得一个Python
    IDE（集成开发环境），如Pycharm、Jupiter、Visual Studio等。Python也是一种开源语言，这确保了其源代码可以自由访问且不受限制。任何人都可以下载它、使用它，并用它构建新的模块或函数，然后他们可以与Python社区分享。


    ## 10. GUI编程


    GUI是“图形用户界面”的缩写。使用Python Tkinter或PyQt，我们可以构建一个简单的桌面程序。


    ## 11. 表达力强


    Python是一种允许你表达自己的语言。这意味着一行Python代码可能比用另一种编程语言编写的一行代码更具表现力。使用更具表现力的语言的主要好处是，你编写的代码行数越少，就越容易完成项目。它更容易调试和保持代码更新。


    ## Python设置指南和安装


    Python是一种常用的高级编程语言。Python的第一个版本于1991年发布。自那时起，Python的受欢迎程度不断提高。它被广泛认为是最用户友好和适应性最强的服务器端编程语言之一。


    在开始使用Python之前，必须安装Python解释器。与其他Linux发行版不同，Windows没有将Python作为标准功能。但是，在Windows服务器或本地计算机上安装Python是一个简单的过程。有几种流行的方法可以实现这一点：


    - Python可以在www.python.org免费获取，该网站由Python软件基金会运营。在大多数情况下，这涉及为你的操作系统安装并运行合适的安装程序。

    - 安装Homebrew（macOS的包管理器）是安装Python的最快方法。

    - 它附带了一个可用于安装Python的Linux包管理器。

    - 可以为移动操作系统（如Android和iOS）下载具有Python编程环境的应用程序。

    - 许多网站提供Python编程环境。这些网站允许你练习编码，而无需安装Python。


    ## 在Windows上安装Python


    你必须首先选择一个Python版本。如果你想学习最新版本的Python，必须安装Python 3.7。此版本可以与2.7并行安装，但它在工业中已不再使用。


    在Windows上安装Python只需几个步骤。以下是需要采取的步骤：


    ### 步骤1：设置下载


    1. 打开浏览器并访问www.python.org，这是Python的官方网站。它将带你到网站的主页。


    ![](img/2bfe61f5593c3ea97ff290c1c0335a80_14_0.png)


    - 转到“下载”部分，从下拉菜单中选择Windows。查找你喜欢的Python版本。Python 3已更新到版本3.7.4，而Python 2已更新到版本2.7.16。请参考以下插图：


    ![](img/2bfe61f5593c3ea97ff290c1c0335a80_14_1.png)


    ### 步骤2：选择安装程序


    要为64位操作系统下载Python，请选择window x86-64可执行安装程序或window x86可执行安装程序。


    请注意，你可以安装32位或64位版本的Windows。在大多数情况下，任一安装程序都可以在64位机器上运行。根据操作系统，32位版本使用更少的内存，但64位版本对于需要密集计算的应用程序效果更好。


    如果你不确定选择哪个版本，请选择64位。但是，如果你做出了“错误”的决定并选择升级到不同版本的Python，你可以轻松卸载Python并重新安装另一个安装程序。


    ### 步骤3：运行安装程序


    下载后运行安装程序。


    1. 选中“将Python 3.7添加到路径”复选框，并为所有用户安装启动器。“将Python添加到路径”复选框在旧版本的Python中不可用。

    2. 选择“立即安装”选项，这是推荐的安装方法。


    请注意，此类功能在旧版本的Python中可能不可用。但是，在所有最新版本的Python中，Pip和IDLE是推荐的安装选择（集成开发和学习环境）。


    ![](img/2bfe61f5593c3ea97ff290c1c0335a80_15_0.png)


    - 下一个对话框显示“安装成功”。你可以通过选择“禁用路径长度限制”来允许Python使用长路径名。


    ![](img/2bfe61f5593c3ea97ff290c1c0335a80_16_0.png)


    ### 步骤4：检查Python是否已加载


    1. 转到计算机上安装Python的目录。在我们的框架中，它是C:UsersUsernameAppDataLocalProgramsPythonPython37。我们已经安装了最新版本的Python。

    2. 双击“python.exe”（Python可执行文件）文件。

    3. 你也可以使用命令提示符通过输入“python —version”来验证它。它将向你显示Python版本。如果Python成功启用，将出现以下输出。


    ### 步骤5：检查Pip是否已安装


    Pip是一个强大的Python软件包管理系统。如果你安装的是旧版本的Python，Pip可能没有预装。'
