    \ weigh?: 35\nThere is a 250 charge for heavy luggage.\nThank you for your business\n\
    \n3. **Create a program that prints the highest of the three numbers.**\n\n```\n\
    a = int(input(“Enter the First number:”))\nb = int(input(“Enter the Second number:”))\n\
    c = int(input(“Enter the Third number:”))\n\nif(a>b) and (a>c):\n    print(a,\
    \ ‘is largest number’ )\n\nif(b>a) and (b>c):\n    print(b, ‘is largest number’)\n\
    \nif (c>a) and (c>b):\n    print(c, “c is largest”);\n```\n\n### Output\n\nEnter\
    \ the First number: 100\nEnter the Second number: 145\nEnter the Third number:\
    \ 200\n200 is largest\n\n4. **Make a program to determine whether a given number\
    \ is positive or negative.**\n\n```\nnum = 3\n\nif num >0:\n    print(num, “is\
