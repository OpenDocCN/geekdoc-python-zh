    \ = 24\n12 * 3 = 36\n12 * 4 = 48\n12 * 5 = 60\n12 * 6 = 72\n12 * 7 = 84\n12 *\
    \ 8 = 96\n12 * 9 = 108\n12 * 10 = 120\n```\n\n### 2. 编写一个程序，多次打印短语“hello world”。\n\
    \n```python\nnum = 1\n# there is a variable num in which we store an integer 1.\n\
