  md: '# Comparison Operators


    In the Comparison Operator, two operands A and B are compared.


    | Operators | Description |

    |---|---|

    | ==(Equal) | It checks the value of two operands is equal or not, if yes then
    the condition becomes true. E.g.- A=1, B=2. (A==B) condition is not true |

    | !=(Not Equal) | It checks the value of two operands is equal or not, if the
    values are not equal, then the condition becomes true. E.g.- A=1, B=2. (A!=B)
    is true. |

    | >(Greater than) | It checks the value between two operands which one is greater,
    if condition is right then, it display true. E.g.- (A>B) is not true. |

    | <(Less than) | It checks the value between two operands which one is less, if
    condition is right then, it display true. E.g.- (A<B) is true. |

    | >=(Greater than or Equal to) | It checks the value of the first operand is greater
    than or equal to the value of second operand, if condition is right then it displays
    true. E.g. – (A>=B) not true. |


    # Assignment operator


    JavaScript support following - assign operators.'
