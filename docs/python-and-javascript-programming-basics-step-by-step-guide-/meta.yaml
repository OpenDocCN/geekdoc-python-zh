  md: "Here are some of the reasons why Python is now the most common programming\
    \ language:\n\n# Python provides rich libraries:\n\nPython has a large set of\
    \ standard libraries that cover topics such as machine learning, algebra, web\
    \ server software, operating system interfaces, and protocols.\n\n# Python is\
    \ Open Source language:\n\nPython can be downloaded for free from its official\
    \ website (www.python.org). Python can be downloaded from its official website\
    \ for anyone.\n\nHere are some reasons why Python is the most popular language\
    \ these days:\n\n# Easy to use:\n\nPython is a simple language to learn and use.\
    \ It is an easy-to-understand language. In comparison to other languages, it only\
    \ requires a few lines to express the code.\n\nFor instance, if you want to print\
    \ “Hello world” in Java, the code will be as follows:\n\n```\npublic class HelloWorld\
    \ {\n    public static void main(String[] args){\n        // Prints “Hello, World”\
    \ to the terminal window.\n        System.out.println(“Hello World”);\n    }\n\
