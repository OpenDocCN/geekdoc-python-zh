    \    list[-2]=O\nlist[5]=N          list[-1]=N\n```\n\n### 列表切片\n\nPython 有一个功能，允许你获取列表的子列表。当我们只需要列表中的一小部分数据时，切片就派上用场了。\n\
    \n语法是：`list_variable[start: end: step]`\n\n- **start** 指列表元素的起始位置。\n- **stop**\
