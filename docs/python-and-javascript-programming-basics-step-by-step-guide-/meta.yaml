    ## Javascript 注释


    JavaScript 中的注释用于描述代码。它用于包含与代码相关的信息，例如警告或建议，以便最终用户能够理解。


    ### JavaScript 注释类型


    1. 单行注释

    2. 多行注释


    ### 单行注释


    双斜杠（//）用于表示单行注释。在程序运行时，双斜杠（//）和行尾之间的任何文本都将被忽略。


    **例如：在语句前添加注释。**


    ```

