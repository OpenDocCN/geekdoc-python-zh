    \ world\nHello world\nHello world\nHello world\nHello world\n```\n\n### 3. 编写一个程序，计算指定序列中有多少个偶数或奇数。\n\
    \n```python\nnumber = 1\ncount_odd = 0\ncount_even = 0\nwhile number < 10:\n \
    \   number = number + 1\n    if number % 2 == 0:\n        count_even = count_even\
    \ + 1\n    else:\n        count_odd = count_odd + 1\nprint('The count of even\
    \ number:', count_even)\nprint('The count of odd number:', count_odd)\n```\n\n\
    **输出：**\n\n```\nThe count of even number: 5\nThe count of odd number: 4\n```\n\
    \n## 无限 while 循环\n\n如果 while 循环中的给定条件永远不会变为假，循环将变为无限循环，永远不会自行结束。while 循环中的任何非零值通常表示真状态。\n\
    \n考虑以下场景：\n\n```python\nnum = 0\nwhile num < 5:\n    print(\"hello\")\n```\n\n\
    ## while 循环中的 else 语句\n\n使用 while 循环时，Python 允许你使用 else 表达式。如果给定条件变为假，else 断言将被执行。使用\
    \ while 循环时，else 语句是一个可选项。\n\n例如：\n\n```python\nnum = 1\nwhile num < 6:\n    print(num)\n\
    \    num = num + 1\nelse:\n    print(\"Loop is finished\")\n```\n\n**输出：**\n\n\
    ```\n1\n2\n3\n4\n5\nLoop is finished\n```\n\n## Python 列表\n\n列表是 Python 最灵活和可变的数据结构之一。它可以存储各种数据类型和异构数据。\n\
