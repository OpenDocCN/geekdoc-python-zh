    ## Javascript Introduction


    This JavaScript lesson makes it simple for both beginners and experts to learn
    JavaScript.

    What is JavaScript and how does it work?

    JavaScript is a dynamic programming language for computers. It is a lightweight
    and cross-platform object-based scripting language.

    With the aid of JavaScript, we can make our website more vibrant and engaging.

    Brendan Eich, a Netscape employee, designed it in 1995.

    It’s a programming language that’s used to make interactive websites. It’s most
    commonly used for:


    - Validation on the client’s end.

    - Its drop-down menus are dynamic.

    - It shows the current date and time.

    - Before transferring data to a server, validate user input in an HTML form.

    - Create forms that respond to user input without requiring a connection to a
    server.

    - Install new windows or frames and close them.

    - Using popup windows and dialog boxes to display information.

    - Create client-side programs that are small but complete.

    - Clocks and other timepieces

    - Game and app development for mobile devices.


    (for example, an alert dialog box, a confirm dialog box, or a prompt dialog box)


    ## Features of Javascript


    - JavaScript is a scripting language that is based on objects.

    - The language is case sensitive.

    - It’s light in weight.

    - In JavaScript, every statement must be followed by a semicolon (;).


    ## Advantages of Javascript


    - JavaScript is a scripting language that is interpreted. There is no need for
    a compiler because there is no compilation process. JavaScript is interpreted
    by the browser as HTML tags.

    - JavaScript is a simple programming language. It is very simple to learn for
    anyone. It’s used to create dynamic and appealing websites.

    - Because JavaScript is run on the client side, it lowers the load on the website
    server.

    - It includes conditional checking, loops, and branching functionality that can
    be used in web pages.

    - For the end user, JavaScript is relatively quick. They don’t have to wait for
    the page to reload to see if they missed something.

    - Web pages now have more functionality. To provide our site visitors with more
    functionality, we can use JavaScript to include drag-and-drop components and sliders.


    ## JavaScript Example


    ```

    <h2>Welcome to JavaScript</h2>

    <script>

    document.write("Hello JavaScript by TutorialandExample");

    </script>

    ```


    ## Output


    Welcome to JavaScript


    Hello JavaScript by TutorialandExample


    ## Javascript Example


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <h2>Welcome to JavaScript</h2>

    <script>

    document.write("Hello Friends");

    </script>

    </body>

    </html>

    ```


    ## Output


    **Welcome to JavaScript**

    Hello Friends


    JavaScript can be implemented by including JavaScript statements in the code.


    ```

    <script>…</script>.

    <!DOCTYPE html>

    <html>

    <body>

    <script type="text/javascript">

    document.write("Hello World");

    </script>

    </body>

    </html>

    ```


    ## Output


    ## Hello World


    **In JavaScript, code may be written in three places.**


    1. Between the <body>......</body> tag of HTML.

    2. Between the <head>......</head> tag of HTML.

    3. In .js file (external JavaScript).


    **As an illustration (code between the body tags)**


    **In the example below, the body tag contains JavaScript code.**


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <script type="text/javascript">

    alert("Hello world");

    </script>

    </body>

    </html>

    ```


    ## Example2


    **(between the head tag, the code)**


    We''ll create the function msg in the example below. In JavaScript, you must write
    function in function name to define a function. To invoke a function, we must
    first create an event. We''re using the one-click event to call the msg() function
    in this case.


    ```

    <!DOCTYPE html>

    <html>

    <head>

    <script type="text/javascript">

    function msg(){

    alert("Hello world");

    }

    </script>

    </head>

    <body>

    <p>Welcome to Javascript</p>

    <form>

    <input type="button" value="click" onclick="msg()"/>

    </form>

    </body>

    </html>

    ```


    ## External JavaScript file


    We can create a JavaScript file that we can include in HTML files.

    Because a single JavaScript file may be used in multiple HTML pages, it allows
    for code reuse.

    It improves the web page’s performance.

    The file must have a .js extension.


    ## Example


    ```

    <!DOCTYPE html>

    <html>

    <head>

    <script type="text/javascript" src="message.js"></script>

    </head>

    <body>

    <p>Hello world</p>

    <form>

    <input type="button" value="click" onclick="msg()"/>

    </form>

    </body>

    </html>

    ```


    ## Javascript comment


    Comments in JavaScript are used to describe the code. It’s used to include code-related
    information, such as warnings or suggestions, so that end users can understand
    it.


    ### JavaScript comments Types


    1. Single-line Comment

    2. Multi-line Comment


    ### Single-line Comment


    Double forward slashes (//) are used to express single-line comments. While the
    program is running, any text between the double forward slashes (//) and the end
    of the line will be ignored.


    **eg. Comment added - before the statement.**


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    // single-line comment //

    document.write("hello world");

    </script>

    </body>

    </html>

    ```


    **eg. Comment added - after the statement.**


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    var a=10;

    var b=20;

    var c=a+b; //It add values of a and b variable

    document.write(c); // print sum of 10 and 20

    </script>

    </body>

    </html>

    ```


    ## Output


    30


    ### Multi-line comment


    Single and multi-line comments can both be made with multi-line comments. Comments
    that span multiple lines begin with /* and conclude with */. JavaScript will ignore
    the text in between them.


    /* Write comment here */


    ## Example


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    /* It is multi-line comment.

    It will not be displayed */

    document.write("Example of JavaScript multi line comment");

    </script>

    </body>

    </html>

    ```


    ## Javascript Variable


    Values (name=”Ram”) and expressions (Sum=x+y) are stored in variables.


    We must first declare a variable before utilizing it. To declare a variable, we
    use the term var as follows:

    var name;


    There are 2 types of variables:


    1. Local Variable

    2. Global Variable


    **Local Variable** – It’s declared inside a function or a block.


    **Example**


    ```

    <script>

    function abc(){

    var x=10; //local variable

    }

    </script>

    ```


    **Global Variable** - It has a global scope, meaning that it can be defined anywhere
    in JavaScript code.

    Outside of the function, a variable is declared.


    **Example**


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    var data = 200; //global variable

    function a(){

    document.writeln(data);

    }

    function b(){

    document.writeln(data);

    }

    a();//calling javascript function

    b();

    </script>

    </body>

    </html>

    ```


    ## In JavaScript, declaring a global variable within a function


    To declare a JavaScript global variable inside a function, we must use the window
    object.


    ## Example


    ```

    window.value=90;

    ```


    It can now be declared within any function and accessed from within any function.


    ## Example


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    function a(){

    window.value=50; //declare global variable by use of window object

    }

    function b(){

    document.writeln(data);

    }

    a();//calling javascript function

    b();

    alert(window.value);//access global variable from other function

    </script>

    </body>

    </html>

    ```'
