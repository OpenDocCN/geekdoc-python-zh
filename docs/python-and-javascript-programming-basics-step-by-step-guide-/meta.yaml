    \n- If statement\n- If-else statement\n- elif statement\n\n### if statement\n\n\
    The if conditional statement is the most straightforward. It’s used to see if\
    \ a certain condition exists. A block of code (if statement block) will be executed\
    \ if the condition is valid.\n\n### Syntax:\n\n```\nif expression:\n    statement\n\
    ```\n\n**Flow chart of if statement:** The flowchart of if statement is following\n\
    \n![](img/2bfe61f5593c3ea97ff290c1c0335a80_32_0.png)\n\nIn the flowchart above,\
    \ the condition is first checked to see if it is valid, and then conditional code\
    \ (if statement) is executed. If the condition is incorrect, the first collection\
    \ of code following the ‘if’ assertion will be run.\n\nAny non-zero and non-null\
    \ value is assumed to be TRUE in the Python programming language. If it is zero,\
    \ it is presumed that the values are FALSE.\n\n### Indentation in Python\n\nThe\
    \ block of code is declared using indentation.\nAll of the statements in a block\
    \ are supposed to be indented at the same stage.\nCurly braces and parentheses\
    \ are not permitted in block-level Python code.\nPython’s indentation makes programming\
    \ quick and straightforward.\n\n**Example:** Following is an example of an if\
    \ statement.\n\n1. **Write a program to check number is even**\n\n```\nn = int(input(“Enter\
    \ the number:”))\n\nif(n%2==0):\n    print(“The number is even”)\n\nprint(“The\
    \ number is odd”)\n```\n\n### Output\n\nEnter the number: 10\nThe number is even\n\
    \n2. **Create a program to check the passenger’s baggage weight.**\n\n```\nweight\
    \ = float(input(“How many Kilograms(kg) does your luggage?: “))\nif (weight <30):\n\
