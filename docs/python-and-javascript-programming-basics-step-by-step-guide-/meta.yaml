  md: '# Javascript Data Types


    It has a variety of data types to hold various types of values.

    In Javascript, there are two sorts of data types.


    +   1. Primitive data types.

    2. Non-primitive data types.


    Because JavaScript is a dynamic type language, we don’t need to define the type
    of variable because the JavaScript engine uses it dynamically. The data type is
    specified using var in this case. It may store any type of value, including numbers,
    strings, and objects.


    # Example


    ```

    var a=Ram; //String


    var b=20; //Number


    var x= {FirstName:”Ram”, lastName:”Doe”}; //Object

    ```


    # JavaScript - primitive data types


    In JavaScript, there are five different types of primitive data types.


    | Data Type | Description |

    | --- | --- |

    | String | It represents sequence of characters e.g. “Hello” |

    | Number | It represents numeric values e.g. 1,2,3,4,5,6. |

    | Boolean | It represents Boolean value either Right or Wrong. |

    | Undefined | It represents undefined values. |

    | Null | It means **no values** at all. |'
