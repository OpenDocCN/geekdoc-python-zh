    \ comment\nusing the triple quotes.\nUse in your code\"\"\"\n```\n\n## Python\
    \ if 语句\n\n任何编程语言都必须具备决策能力。决策能力的核心是条件测试。Python 中有许多决策语句，包括：\n\n- If 语句\n- If-else\
    \ 语句\n- elif 语句\n\n### if 语句\n\nif 条件语句是最直接的。它用于检查是否存在某个条件。如果条件有效，将执行一个代码块（if\
    \ 语句块）。\n\n### 语法：\n\n```\nif expression:\n    statement\n```\n\n**if 语句的流程图：**\
    \ if 语句的流程图如下\n\n![](img/2bfe61f5593c3ea97ff290c1c0335a80_32_0.png)\n\n在上面的流程图中，首先检查条件是否有效，然后执行条件代码（if\
    \ 语句）。如果条件不正确，将运行‘if’断言之后的第一组代码。\n\n在 Python 编程语言中，任何非零和非空值都被假定为 TRUE。如果为零，则假定值为\
    \ FALSE。\n\n### Python 中的缩进\n\n代码块使用缩进来声明。\n块中的所有语句都应在同一级别缩进。\n块级 Python 代码中不允许使用花括号和圆括号。\n\
    Python 的缩进使编程变得快速而简单。\n\n**示例：** 以下是 if 语句的一个示例。\n\n1.  **编写一个程序来检查数字是否为偶数**\n\
    \n```\nn = int(input(“Enter the number:”))\n\nif(n%2==0):\n    print(“The number\
    \ is even”)\n\nprint(“The number is odd”)\n```\n\n### 输出\n\nEnter the number:\
    \ 10\nThe number is even\n\n2.  **创建一个程序来检查乘客的行李重量。**\n\n```\nweight = float(input(“How\
    \ many Kilograms(kg) does your luggage?: “))\nif (weight <30):\n    print(“You\
    \ have charged  ₹300 for heavy luggage .”)\nprint(“Thank you for your business.”)\n\
    ```\n\n### 输出\n\nHow many Kilograms does your suitcase weigh?: 35\nThere is a\
    \ 250 charge for heavy luggage.\nThank you for your business\n\n3.  **创建一个程序，打印三个数字中的最大值。**\n\
    \n```\na = int(input(“Enter the First number:”))\nb = int(input(“Enter the Second\
    \ number:”))\nc = int(input(“Enter the Third number:”))\n\nif(a>b) and (a>c):\n\
    \    print(a, ‘is largest number’ )\n\nif(b>a) and (b>c):\n    print(b, ‘is largest\
    \ number’)\n\nif (c>a) and (c>b):\n    print(c, “c is largest”);\n```\n\n### 输出\n\
    \nEnter the First number: 100\nEnter the Second number: 145\nEnter the Third number:\
    \ 200\n200 is largest\n\n4.  **创建一个程序来确定给定的数字是正数还是负数。**\n\n```\nnum = 3\n\nif\
    \ num >0:\n    print(num, “is a positive number.”)\n    print(“This is always\
    \ printed.”)\n\nnum = -1\n\nif num >0:\n    print(num, “is a positive number.”)\n\
    \    print(“This is also always printed.”)\n```\n\n### 输出\n\n3 is a positive number.\n\
    This is always printed.\nThis is also always printed.\n\n## Python elif\n\n**Python\
    \ elif**\nelif 语句用于验证多个条件，并根据哪个条件有效来执行特定的语句块。\n\n**语法**\n\n```\nif expression1:\n\
    \    statement\n\nelif expression2:\n    statement\n\nelif expression3:\n    statement\n\
    \nelse:\n    statement\n```\n\nElif 语句，如 else，可以是可选的。如果 if 表达式评估为真，则打印表达式 1 的声明；否则，控制权转移到\
    \ elif 表达式；如果 elif 条件评估为假，控制权将转移到下一个 elif。\n它将遍历所有 elif 表达式，直到找到一个为真的表达式。\n与其他编程语言不同，Python\
    \ 没有 switch 或 case 语句。"
