    # Javascript array


    Arrays are used to represent a collection of elements in a single unit or memory
    region.


    Every element that enters the array will be stored in the array with a unique
    index starting at zero. We can store data with the help of indexes.


    In JavaScript, we must use the new keyword to declare an array. We use new Array
    to construct an array (n).


    The number of slots in the array is denoted by n.


    # Syntax


    ```

    myarray = new array(n);

    ```


    **NOTE:** We construct array objects with zero size whenever we build an array
    in JavaScript without specifying the size.


    # Example


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    var i;

    var emp = new Array();

    emp[0] = "Ajay";

    emp[1] = "Abhay";

    emp[2] = "Arun";

    ```'
