  md: '# Bitwise Operators


    Bitwise operators perform bit-by-bit binary operations on operands. Consider the
    following scenario: The variable a is given a value of 5 and the variable b is
    given a value of 6.


    a = 5


    b = 6


    binary (a) = 0101


    binary (b) = 0110


    Hence a&b = 0100 is equivalent to 4


    a|b=0111


    | Operator | Description | Examples |

    | :--- | :--- | :--- |

    | ~(Complement) | This operator converts the number into a binary number and return
    it''s one''s complement or flip the bits. ~x is equivalent to -x-1. | a=~5 is
    evaluated -6 |

    | &(Binary and) | If both the bits at the same place are 1 then the result is
    1 otherwise result is 0 | a=0101, b=0110 a&b =0100 |

    | \|(Binary or) | If both the bits at the same place are 0 then the result is
    1 otherwise result is 0 | a=0101, b=0110 a\|b =0111 |


    | Operator | Description | Examples |

    | :--- | :--- | :--- |

    | ^(Binary Xor) | If both bits are different then the result will be 1 otherwise
    the result will be 0 | a= 0101, b=0110 a^b=0011 |

    | <<(Binary Left Shift) | The left operand value is shifted left by the number
    of bits given in the right operand. | a<<2 = 0010100 |

    | >>(Binary Right Shift) | The left operand value is shifted right by the number
    of bits given in the right operand. | a>>2=0001 |


