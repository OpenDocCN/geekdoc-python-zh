    ## 9. Sets


    Sets in Python are unordered collections of unique elements. They are mutable,
    meaning you can add or remove elements, but unlike lists or tuples, sets do not
    allow duplicate elements. Sets are useful for various operations such as membership
    testing, intersection, union, and difference.


    Here''s an overview of sets:


    ### Creating Sets:


    Sets are created by enclosing comma-separated elements within curly braces {}.


    ### Example:


    ```python

    my_set = {1, 2, 3, 4, 5}

    ```


    ### Accessing Elements:


    Since sets are unordered collections, they do not support indexing or slicing
    like lists or tuples.


    You can check for membership of an element in a set using the in keyword.


    ### Example:


    ```python

    print(3 in my_set) # Output: True

    ```


    ### Modifying Sets:


    Sets are mutable, so you can add or remove elements using specific methods.


    ### Example:


    ```python

    my_set.add(6)    # Add a single element to the set

    my_set.update([7, 8]) # Add multiple elements to the set

    my_set.remove(3)  # Remove a specific element from the set

    my_set.discard(10) # Remove a specific element if it exists, otherwise do nothing

    my_set.pop()    # Remove and return an arbitrary element from the set

    my_set.clear()   # Remove all elements from the set

    ```


    ### Set Operations:


    Sets support various mathematical operations such as union, intersection, difference,
    and symmetric difference.


    ### Example:


    ```python

    set1 = {1, 2, 3}

    set2 = {3, 4, 5}


    union_set = set1.union(set2)          # Union of two sets

    intersection_set = set1.intersection(set2) # Intersection of two sets

    difference_set = set1.difference(set2)   # Set difference (elements in set1 but
    not in set2)

    symmetric_difference_set = set1.symmetric_difference(set2) # Symmetric difference
    (elements in either set1 or set2, but not in both)

    ```


    ### Use Cases:


    Sets are useful for removing duplicates from lists or other collections since
    they only retain unique elements.


    They are also handy for performing set operations such as union, intersection,
    and difference, especially in scenarios involving data analysis, database operations,
    or algorithmic problem-solving.


    Sets are used to efficiently check for membership of elements, making them suitable
    for tasks like filtering, deduplication, and membership testing.


    Sets provide a convenient way to work with unique elements and perform set operations
    efficiently in Python. They are a valuable tool for solving various programming
    problems and optimizing code for performance.


    ## 10. Strings


    Strings in Python are sequences of characters, enclosed within single quotes ('')
    or double quotes ("). They are immutable, meaning once created, their contents
    cannot be changed. Strings support various operations and methods for manipulation
    and processing.


    Here''s an overview of strings in Python:


    ### Creating Strings:


    Strings can be created by enclosing characters within single quotes ('') or double
    quotes (").


    ### Example:


    ```python

    my_string = ''Hello, World!''

    ```


    ### Accessing Characters:


    Individual characters in a string can be accessed using zero-based indexing.


    You can also slice strings to extract substrings.


    ### Example:


    ```python

    print(my_string[0])  # Output: H

    print(my_string[7:12])  # Output: World

    ```


    ### String Concatenation:


    Strings can be concatenated using the + operator.


    ### Example:


    ```python

    str1 = ''Hello''

    str2 = ''World''

    concatenated_str = str1 + '', '' + str2 + ''!''

    ```


    ### String Methods:


    Python provides numerous built-in methods for working with strings, such as upper(),
    lower(), strip(), split(), join(), find(), replace(), etc.


    ### Example:


    ```python

    print(my_string.upper())          # Convert the string to uppercase

    print(my_string.lower())          # Convert the string to lowercase

    print(my_string.strip())          # Remove leading and trailing whitespace

    print(my_string.split('', ''))      # Split the string into a list based on a
    delimiter

    print(''-''.join([''Hello'', ''World''])) # Join elements of a list into a single
    string using a delimiter

    ```


    ### String Formatting:


    Python supports various methods for formatting strings, such as f-strings, format()
    method, and % formatting.


    ### Example:


    ```python

    name = ''Alice''

    age = 30

    formatted_str = f"My name is {name} and I am {age} years old."

    ```


    ### Escape Characters:


    Escape characters are special characters preceded by a backslash (\) that represent
    non-printable characters or special formatting.


    ### Example:


    ```python

    print(''New\nLine'')  # Output: New (newline) Line

    print(''Tab\tDelimited'')  # Output: Tab    Delimited

    ```


    Strings are versatile data types in Python, widely used for representing text-based
    data, formatting output, and performing various string manipulation operations.


    ## 11. Collections Module


    The collections module in Python provides additional data structures that are
    extensions of the built-in data types. These data structures offer more functionality
    and are optimized for specific use cases.


    Here''s an overview of some commonly used data structures provided by the collections
    module:


    ### Counter:


    The Counter class is used for counting the occurrences of elements in an iterable.


    It returns a dictionary-like object with elements as keys and their counts as
    values.


    ### Example:


    ```python

    from collections import Counter


    my_list = [''a'', ''b'', ''a'', ''c'', ''b'', ''a'']

    counts = Counter(my_list)

    print(counts) # Output: Counter({''a'': 3, ''b'': 2, ''c'': 1})

    ```


    ### DefaultDict:


    The DefaultDict class is a dictionary subclass that provides a default value for
    missing keys.


    When accessing a missing key, it automatically creates the key with the specified
    default value.


