    keys(), values(), items(), get(), pop(), update(), etc.


    # Example:


    ```

    keys = my_dict.keys()    # Get a list of all keys

    values = my_dict.values()  # Get a list of all values

    items = my_dict.items()    # Get a list of all key-value pairs

    age = my_dict.get(''age'')   # Get the value associated with the ''age'' key

    removed_item = my_dict.pop(''gender'') # Remove and return the value associated
    with the ''gender'' key

    my_dict.update({''city'': ''Los Angeles'', ''country'': ''USA''}) # Update multiple
    key-value pairs at once

    ```


