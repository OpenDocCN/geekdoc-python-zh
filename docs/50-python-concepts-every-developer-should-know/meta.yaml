    # 8. Dictionaries


    Dictionaries in Python are unordered collections of key-value pairs. They are
    mutable, meaning their contents can be changed after creation. Dictionaries are
    widely used for mapping one set of values (keys) to another set of values (items).


    Here''s an overview of dictionaries:


    # Creating Dictionaries:


    Dictionaries are created by enclosing comma-separated key-value pairs within curly
    braces { }.


    Each key-value pair is separated by a colon : where the key is followed by its
    corresponding value.


    # Example:


    ```

    my_dict = {''name'': ''John'', ''age'': 30, ''city'': ''New York''}

    ```


    # Accessing Elements:


    Elements in a dictionary are accessed using keys rather than indices.


    You can access the value associated with a specific key using square brackets
    [] and the key.


    # Example:


    ```

    print(my_dict[''name''])  # Output: John

    print(my_dict[''age''])   # Output: 30

    ```'
