  md: '# 1. Variables and Data Types


    **Variables:** Variables in Python are used to store data values. They act as
    placeholders for various types of data, such as numbers, strings, lists, etc.
    Unlike some other programming languages, Python does not require explicit declaration
    of variables or their data types. You simply assign a value to a variable using
    the assignment operator "=".


    **Example:**


    ```

    x = 5

    name = "John"

    ```


    In this example, x is a variable storing the integer value 5, and name is a variable
    storing the string "John".


    **Data Types:**


    Python has several built-in data types, including:


    +   - **Integers (int):** Whole numbers, e.g., 5, -3, 100.

    - **Floating-point numbers (float):** Numbers with decimal points, e.g., 3.14,
    -0.5, 2.0.

    - **Strings (str):** Ordered sequence of characters enclosed within quotes, e.g.,
    "hello", ''python'', "123".

    - **Lists:** Ordered collection of items, mutable, enclosed in square brackets,
    e.g., [1, 2, 3], [''apple'', ''banana'', ''orange''].

    - **Tuples:** Ordered collection of items, immutable, enclosed in parentheses,
    e.g., (1, 2, 3), (''apple'', ''banana'', ''orange'').'
  merge: -1
  pgno: 7
- img_proc: true
  md: '+   - **Dictionaries:** Collection of key-value pairs, enclosed in curly braces,
    e.g., {''name'': ''John'', ''age'': 30}.

    - **Sets:** Unordered collection of unique items, enclosed in curly braces, e.g.,
    {1, 2, 3}, {''apple'', ''banana'', ''orange''}.


    **Example:**


    ```

    x = 5    # integer

    y = 3.14  # float

    name = "John"  # string

    my_list = [1, 2, 3]  # list

    my_tuple = (4, 5, 6) # tuple

    my_dict = {''name'': ''John'', ''age'': 30}  # dictionary

    my_set = {1, 2, 3}  # set

    ```


    Understanding variables and data types is fundamental to Python programming, as
    they form the basis for storing and manipulating data in your programs.'
