    \n以下是每个函数的概述：\n\n### map() 函数：\n\n`map()`函数将给定的函数应用于可迭代对象（例如列表）的每个项，并返回一个包含结果的新迭代器。\n\
    \n**语法：** `map(function, iterable)`\n\n**示例：**\n\n```python\nnumbers = [1, 2,\
