    \ `|` and allows matching of multiple alternatives.\n\nExample: The regex pattern\
    \ `cat|dog` matches either \"cat\" or \"dog\" in the text string.\n\n### Grouping:\n\
    \nParentheses `( )` are used for grouping characters or subpatterns together.\
    \ Groups can be quantified as a single unit and can be captured for later use.\n\
    \nExample: The regex pattern `(ab)+` matches one or more occurrences of the sequence\
    \ \"ab\".\n\n### Character Escapes:\n\nCertain characters have special meanings\
    \ in regex patterns (metacharacters). To match them literally, you need to escape\
    \ them with a backslash `\\`.\n\nExample: The regex pattern `\\$` matches the\
