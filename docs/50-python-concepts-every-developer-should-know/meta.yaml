  md: '# Use Character Classes:


    Use character classes ([ ]) to match any one of a set of characters instead of
    enumerating each character individually.


    # Prefer Non-Greedy Quantifiers:


    Use non-greedy quantifiers (*?, +?, ??) when matching repetitive patterns to match
    as few characters as possible.


    # Be Mindful of Performance:


    Be aware that some regex patterns can have poor performance, especially with backtracking.
    Test your patterns with realistic data to ensure acceptable performance.


    # Optimize Quantifiers:


    Be mindful of the use of quantifiers (*, +, {}) in your patterns. Avoid using
    them excessively, especially nested quantifiers, as they can lead to exponential
    backtracking.


    # Escape Metacharacters:


    Escape metacharacters (.^$*+?{}[]\|()) with a backslash (\) if you want to match
    them literally in your pattern.


    # Test Your Patterns:


    Test your regex patterns thoroughly with a variety of input data, including edge
    cases, to ensure they behave as expected.


    # Use Tools and Resources:'
