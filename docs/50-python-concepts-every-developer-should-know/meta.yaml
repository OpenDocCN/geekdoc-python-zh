    # Introduction


    This Book is wonderful because it has not only fundamental concepts but also intermediate
    and advanced ones.


    - Multiprocessing

    - Debugging Techniques

    - Code review practices

    - Idiomatic Pythonic Code

    - Threading

    - Time complexity analysis.


    And many more concepts that will help you feel more confident with the Python
    programming language.


    By knowing these concepts, you will begin to handle the Python Syntax more efficiently
    and will help you with most of the Code quickly.


    # 1. Variables and Data Types


    **Variables:** Variables in Python are used to store data values. They act as
    placeholders for various types of data, such as numbers, strings, lists, etc.
    Unlike some other programming languages, Python does not require explicit declaration
    of variables or their data types. You simply assign a value to a variable using
    the assignment operator "=".


    **Example:**


    ```

    x = 5

    name = "John"

    ```


    In this example, x is a variable storing the integer value 5, and name is a variable
    storing the string "John".


    **Data Types:**


    Python has several built-in data types, including:


    - **Integers (int):** Whole numbers, e.g., 5, -3, 100.

    - **Floating-point numbers (float):** Numbers with decimal points, e.g., 3.14,
    -0.5, 2.0.

    - **Strings (str):** Ordered sequence of characters enclosed within quotes, e.g.,
    "hello", ''python'', "123".

    - **Lists:** Ordered collection of items, mutable, enclosed in square brackets,
    e.g., [1, 2, 3], [''apple'', ''banana'', ''orange''].

    - **Tuples:** Ordered collection of items, immutable, enclosed in parentheses,
    e.g., (1, 2, 3), (''apple'', ''banana'', ''orange'').

    - **Dictionaries:** Collection of key-value pairs, enclosed in curly braces, e.g.,
    {''name'': ''John'', ''age'': 30}.

    - **Sets:** Unordered collection of unique items, enclosed in curly braces, e.g.,
    {1, 2, 3}, {''apple'', ''banana'', ''orange''}.


    **Example:**


    ```

    x = 5    # integer

    y = 3.14  # float

    name = "John"  # string

    my_list = [1, 2, 3]  # list

    my_tuple = (4, 5, 6) # tuple

    my_dict = {''name'': ''John'', ''age'': 30}  # dictionary

    my_set = {1, 2, 3}  # set

    ```


    Understanding variables and data types is fundamental to Python programming, as
    they form the basis for storing and manipulating data in your programs.


    # 2. Operators and Expressions


    **Operators:** Operators are symbols in Python that perform operations on variables
    and values.


    Python supports various types of operators, including:


    **Arithmetic Operators:** Used for performing mathematical operations such as
    addition, subtraction, multiplication, division, etc.


    - Addition (+)

    - Subtraction (-)

    - Multiplication (*)

    - Division (/)

    - Modulus (%)

    - Exponentiation (**)

    - Floor Division (//)


    **Example:**


    ```

    a = 10

    b = 3


    print("Addition:", a + b)    # Addition

    print("Subtraction:", a - b)  # Subtraction

    print("Multiplication:", a * b) # Multiplication

    print("Division:", a / b)    # Division

    print("Modulus:", a % b)     # Modulus (remainder of division)

    print("Exponentiation:", a ** b) # Exponentiation

    print("Floor Division:", a // b) # Floor Division (rounds down to nearest integer)

    ```


    **Comparison (Relational) Operators:** Used to compare values and return a Boolean
    result (True or False).


    - Equal to (==)

    - Not equal to (!=)

    - Greater than (>)

    - Less than (<)

    - Greater than or equal to (>=)

    - Less than or equal to (<=)


    **Example:**


    ```

    x = 5

    y = 10


    print("Equal to:", x == y)        # Equal to

    print("Not equal to:", x != y)    # Not equal to

    print("Greater than:", x > y)     # Greater than

    print("Less than:", x < y)        # Less than

    print("Greater than or equal to:", x >= y) # Greater than or equal to

    print("Less than or equal to:", x <= y)    # Less than or equal to

    ```


    **Logical Operators:** Used to combine conditional statements and return a Boolean
    result.


    - and

    - or

    - not


    **Example:**


    ```

    p = True

    q = False


    print("AND:", p and q) # AND

    print("OR:", p or q) # OR

    print("NOT p:", not p) # NOT

    ```


    **Assignment Operators:** Used to assign values to variables.


    - =

    - +=

    - -=

    - *=

    - /=

    - %=

    - **=

    - //=


    **Example:**


    ```

    x = 5

    x += 2 # Equivalent to x = x + 2

    print("+=:", x)


    y = 10

    y -= 3 # Equivalent to y = y - 3

    print("-=:", y)

    ```


    **Bitwise Operators:** Used to perform bitwise operations on integers.


    - & (Bitwise AND)

    - | (Bitwise OR)

    - ^ (Bitwise XOR)

    - ~ (Bitwise NOT)

    - << (Left Shift)

    - >> (Right Shift)


    **Example:**


    ```

    a = 60 # Binary: 0011 1100

    b = 13 # Binary: 0000 1101


    print("Bitwise AND:", a & b) # Bitwise AND

    print("Bitwise OR:", a | b) # Bitwise OR

    print("Bitwise XOR:", a ^ b) # Bitwise XOR

    print("Bitwise NOT:", ~a) # Bitwise NOT

    print("Left Shift:", a << 2) # Left Shift

    print("Right Shift:", a >> 2) # Right Shift

    ```


    **Identity Operators:** Used to compare the memory locations of two objects.


    - is

    - is not


    **Example:**


    ```

    x = ["apple", "banana"]

    y = ["apple", "banana"]

    z = x


    print("is:", x is z)   # True, because x and z are the same object

    print("is not:", x is not y) # True, because x and y are not the same object

    ```


    **Membership Operators:** Used to test whether a value or variable is found in
    a sequence.


    - in

    - not in


    **Example:**


    ```

    my_list = [1, 2, 3, 4, 5]


    print("in:", 3 in my_list)   # True, because 3 is present in the list

    print("not in:", 6 not in my_list) # True, because 6 is not present in the list

    ```


    **Expressions:** Expressions are combinations of values, variables, and operators
    that Python interprets and evaluates to produce a single value. Expressions can
    involve arithmetic operations, comparisons, logical operations, etc.


    **Example:**


    ```

    x = 5

    y = 3

    z = x + y # Arithmetic expression

    print(z) # Output: 8


    is_greater = x > y # Comparison expression

    print(is_greater) # Output: True


    logical_result = (x > 2) and (y < 2) # Logical expression

    print(logical_result) # Output: False

    ```


    # 3. Control Flow


    Control flow statements in Python, such as if-elif-else statements and loops,
    allow you to control the flow of execution in your code based on conditions and
    iterations.


    Let''s discuss each of them with examples:


    **if-elif-else statements:**


    These statements allow you to execute different blocks of code based on different
    conditions.


    **Syntax:**


    ```

    if condition1:

    ```'
