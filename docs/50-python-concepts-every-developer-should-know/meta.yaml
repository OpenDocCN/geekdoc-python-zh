  md: '# 27. Syntax and Patterns


    In Python, regular expressions (regex) are strings of characters that define search
    patterns. These patterns are then used by regex functions from the re module to
    search for matches within text strings.


    Here''s an overview of regex syntax and common patterns:


    **Literal Characters:**


    Literal characters in a regex pattern match themselves in the text string.

    Example: The regex pattern apple matches the substring "apple" in a text string.


    **Character Classes:**


    Character classes match any one of a set of characters enclosed in square brackets
    [ ].

    You can use a hyphen - to specify a range of characters.


    **Example:** The regex pattern [abc] matches either "a", "b", or "c".


    **Quantifiers:**


    Quantifiers specify the number of occurrences of the preceding element in the
    pattern.


    Common quantifiers include * (zero or more occurrences), + (one or more occurrences),
    ? (zero or one occurrence), {n} (exactly n occurrences), {m,n} (between m and
    n occurrences).


    **Example:** The regex pattern a+ matches one or more occurrences of the character
    "a".


    **Anchors:**'
  merge: -1
  pgno: 89
- img_proc: true
  md: 'Anchors specify positions in the text string, such as the beginning (^) or
    end ($) of a line, or word boundaries (\b).


    Example: The regex pattern ^start matches "start" only if it occurs at the beginning
    of a line.


    # Alternation:


    Alternation is represented by the pipe symbol | and allows matching of multiple
    alternatives.


    Example: The regex pattern cat|dog matches either "cat" or "dog" in the text string.


    # Grouping:


    Parentheses ( ) are used for grouping characters or subpatterns together.


    Groups can be quantified as a single unit and can be captured for later use.


    Example: The regex pattern (ab)+ matches one or more occurrences of the sequence
    "ab".


    # Character Escapes:


    Certain characters have special meanings in regex patterns (metacharacters). To
    match them literally, you need to escape them with a backslash \.


    Example: The regex pattern \$ matches the character "$" in the text string.


    # Flags:


    Flags modify the behavior of the regex engine. Common flags include re.IGNORECASE,
    re.MULTILINE, and re.DOTALL.


    Flags can be passed as arguments to regex functions or embedded in the pattern
    itself using (?i), (?m), (?s), etc.'
