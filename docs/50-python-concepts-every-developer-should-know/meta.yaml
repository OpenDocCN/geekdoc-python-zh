  - '[PAGE 90]


    Anchors specify positions in the text string, such as the beginning (^) or end
    ($) of a line, or word boundaries (\b).


    Example: The regex pattern ^start matches "start" only if it occurs at the beginning
    of a line.


    # Alternation:


    Alternation is represented by the pipe symbol | and allows matching of multiple
    alternatives.


    Example: The regex pattern cat|dog matches either "cat" or "dog" in the text string.


    # Grouping:


    Parentheses ( ) are used for grouping characters or subpatterns together.


    Groups can be quantified as a single unit and can be captured for later use.


    Example: The regex pattern (ab)+ matches one or more occurrences of the sequence
    "ab".


    # Character Escapes:


    Certain characters have special meanings in regex patterns (metacharacters). To
    match them literally, you need to escape them with a backslash \.


    Example: The regex pattern \$ matches the character "$" in the text string.


    # Flags:


    Flags modify the behavior of the regex engine. Common flags include re.IGNORECASE,
    re.MULTILINE, and re.DOTALL.


    Flags can be passed as arguments to regex functions or embedded in the pattern
    itself using (?i), (?m), (?s), etc.'
