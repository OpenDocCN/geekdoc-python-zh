    \ a way to anticipate and manage potential errors that may occur during program\
    \ execution. Here's how try-except blocks work and best practices for using them:\n\
    \n**Basic Syntax:**\n\nThe try block contains the code that may raise an exception.\n\
    \nThe except block catches and handles exceptions raised in the try block.\n\n\
    Optionally, you can include an else block that executes if no exceptions are raised,\
    \ and a finally block that executes regardless of whether an exception occurs.\n\
    \n**Example:**\n\n```python\ntry:\n    # Code that may raise an exception\nexcept\
    \ ExceptionType:\n    # Handle the exception\nelse:\n    # Execute if no exceptions\
    \ are raised\nfinally:\n    # Execute regardless of exceptions\n```\n\n**Handling\
    \ Specific Exceptions:**\n\nYou can specify the type of exception to catch in\
    \ the except block to handle specific types of errors.\n\nHandling specific exceptions\
    \ allows you to provide tailored error messages or take appropriate actions based\
    \ on the type of error encountered.\n\n### Example:\n\n```python\ntry:\n    #\
    \ Code that may raise an exception\nexcept FileNotFoundError:\n    # Handle file\
    \ not found error\nexcept ValueError:\n    # Handle value error\n```\n\n### Handling\
    \ Multiple Exceptions:\n\nYou can handle multiple exceptions in a single except\
    \ block by specifying multiple exception types separated by commas.\n\nThis approach\
    \ reduces code duplication and improves readability.\n\n### Example:\n\n```python\n\
    try:\n    # Code that may raise an exception\nexcept (ValueError, TypeError):\n\
    \    # Handle value error or type error\n```\n\n### Generic Exception Handling:\n\
    \nIt's generally recommended to catch specific exceptions whenever possible to\
    \ handle errors more precisely.\n\nHowever, you can also catch a generic Exception\
    \ to handle any type of exception.\n\n### Example:\n\n```python\ntry:\n    # Code\
    \ that may raise an exception\nexcept Exception as e:\n    # Handle any exception\n\
    \    print(f\"An error occurred: {e}\")\n```\n\n### Raising Exceptions:\n\nInside\
    \ the except block, you can raise another exception to propagate the error or\
    \ raise a custom exception to provide additional context.\n\n### Example:\n\n\
    ```python\ntry:\n    # Code that may raise an exception\nexcept ValueError:\n\
    \    # Handle value error\n    raise RuntimeError(\"Encountered a runtime error\"\
    )\n```\n\n### Finally Block:\n\nThe finally block is used to execute cleanup code\
    \ that should always run, regardless of whether an exception occurs or not.\n\n\
    Common use cases include closing files, releasing resources, or finalizing operations.\n\
    \n**Example:**\n\n```python\ntry:\n    # Code that may raise an exception\nexcept\
    \ ExceptionType:\n    # Handle the exception\nfinally:\n    # Cleanup code (e.g.,\
    \ closing files)\n```\n\nBy using try-except blocks effectively, you can write\
    \ more robust and fault-tolerant Python code, ensuring that your programs handle\
    \ errors gracefully and continue to function correctly even in the presence of\
    \ unexpected conditions.\n\n## 20. Handling Multiple Exceptions\n\nHandling multiple\
    \ exceptions in Python allows you to catch and handle different types of errors\
    \ that may occur within the same block of code. This approach improves code readability\
    \ and reduces redundancy.\n\nHere's how to handle multiple exceptions using try-except\
    \ blocks:\n\n```python\ntry:\n    # Code that may raise exceptions\nexcept ExceptionType1:\n\
    \    # Handle ExceptionType1\nexcept ExceptionType2:\n    # Handle ExceptionType2\n\
    except (ExceptionType3, ExceptionType4):\n    # Handle ExceptionType3 or ExceptionType4\n\
    except:\n    # Handle any other exception\n```\n\n**In the above code:**\n\nThe\
    \ try block contains the code that may raise exceptions.\n\nEach except block\
    \ catches and handles a specific type of exception.\n\nYou can specify multiple\
    \ exceptions in a single except block by enclosing them in parentheses and separating\
    \ them with commas.\n\nA generic except block without specifying any exception\
    \ type can be used to catch any other exception that is not handled by the preceding\
    \ except blocks. However, it's generally recommended to catch specific exceptions\
    \ whenever possible.\n\n**Here's a more concrete example:**\n\n```python\ntry:\n\
    \    x = int(input(\"Enter a number: \"))\n    result = 10 / x\n    print(\"Result:\"\
    , result)\nexcept ValueError:\n    print(\"Please enter a valid integer.\")\n\
    except ZeroDivisionError:\n    print(\"Cannot divide by zero.\")\nexcept KeyboardInterrupt:\n\
    \    print(\"Operation interrupted.\")\nexcept:\n    print(\"An unexpected error\
    \ occurred.\")\n```\n\n**In this example:**\n\nIf the user enters a non-integer\
    \ value, a ValueError will be raised and caught by the first except block.\n\n\
    If the user enters zero as the input, a ZeroDivisionError will be raised and caught\
    \ by the second except block.\n\nIf the user interrupts the operation (e.g., by\
    \ pressing Ctrl+C), a KeyboardInterrupt exception will be raised and caught by\
    \ the third except block.\n\nAny other unhandled exception will be caught by the\
    \ last except block, providing a generic error message.\n\nHandling multiple exceptions\
    \ in this way allows you to tailor error handling for different scenarios and\
    \ improve the robustness of your code.\n\n## 21. Custom Exceptions\n\nCustom exceptions\
    \ in Python allow you to define your own exception classes tailored to specific\
