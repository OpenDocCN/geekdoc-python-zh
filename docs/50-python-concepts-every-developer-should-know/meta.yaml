    \ text)\nfor match in matches:\n    print('Area code:', match[0])\n    print('Exchange:',\
    \ match[1])\n    print('Subscriber number:', match[2])\n```\n\nSubstitution and\
    \ grouping are powerful features of regular expressions that allow you to manipulate\
    \ text strings in sophisticated ways. By using `re.sub()` and capturing groups\
    \ with parentheses, you can perform complex text transformations and extract structured\
    \ information from unstructured text data.\n\n## 30. Regex Best Practices\n\n\
    Regular expressions (regex) are a powerful tool for pattern matching and text\
    \ manipulation in Python. However, crafting efficient and maintainable regex patterns\
    \ requires following certain best practices to ensure readability, performance,\
    \ and reliability.\n\nHere are some regex best practices to keep in mind:\n\n\
    **Use Raw Strings:**\n\nAlways use raw string literals (prefixing the pattern\
    \ with `r`) for regex patterns in Python to avoid unintended interpretation of\
    \ backslashes.\n\n**Compile Regex Patterns:**\n\nIf you need to use a regex pattern\
    \ multiple times, consider compiling it with `re.compile()` to improve performance,\
    \ especially in tight loops.\n\n**Document Your Patterns:**\n\nComplex regex patterns\
    \ can be hard to understand. Document your patterns with comments or docstrings\
    \ to explain their purpose and components.\n\n**Keep Patterns Simple:**\n\nKeep\
    \ regex patterns as simple as possible to achieve the desired functionality. Complex\
    \ patterns can be difficult to maintain and debug.\n\n**Use Character Classes:**\n\
    \nUse character classes (`[ ]`) to match any one of a set of characters instead\
    \ of enumerating each character individually.\n\n**Prefer Non-Greedy Quantifiers:**\n\
    \nUse non-greedy quantifiers (`*?`, `+?`, `??`) when matching repetitive patterns\
    \ to match as few characters as possible.\n\n**Be Mindful of Performance:**\n\n\
    Be aware that some regex patterns can have poor performance, especially with backtracking.\
    \ Test your patterns with realistic data to ensure acceptable performance.\n\n\
    **Optimize Quantifiers:**\n\nBe mindful of the use of quantifiers (`*`, `+`, `{}`)\
    \ in your patterns. Avoid using them excessively, especially nested quantifiers,\
    \ as they can lead to exponential backtracking.\n\n**Escape Metacharacters:**\n\
    \nEscape metacharacters (`.^$*+?{}[]\\|()`) with a backslash (`\\`) if you want\
    \ to match them literally in your pattern.\n\n**Test Your Patterns:**\n\nTest\
    \ your regex patterns thoroughly with a variety of input data, including edge\
    \ cases, to ensure they behave as expected.\n\n**Use Tools and Resources:**\n\n\
    Utilize online regex testers and visualizers (e.g., regex101.com, regexr.com)\
    \ to experiment with and debug your regex patterns.\n\n**Profile Your Code:**\n\
    \nIf regex performance is critical, profile your code to identify bottlenecks\
    \ and optimize accordingly. Consider alternatives if regex is not the best fit\
    \ for your use case.\n\n**Know When Not to Use Regex:**\n\nRegex is not always\
    \ the best tool for every text processing task. For simple string operations,\
    \ consider using built-in string methods or other Python libraries.\n\n**Learn\
    \ and Improve:**\n\nRegular expressions can be complex, and mastering them takes\
    \ practice. Continuously learn and improve your regex skills by studying resources\
    \ and solving real-world problems.\n\nFollowing these best practices will help\
    \ you write more efficient, maintainable, and reliable regex patterns in Python.\
    \ Remember to strike a balance between simplicity and functionality and to thoroughly\
    \ test your patterns to ensure they meet your requirements.\n\n## 31. Iterable\
    \ and Iterator Protocols\n\nThe concepts of iterable and iterator are fundamental\
    \ for understanding how looping constructs like `for` loops work and how to create\
    \ custom iterable objects. The iterable and iterator protocols define the behavior\
    \ of objects that can be iterated over, enabling them to work seamlessly with\
    \ iteration constructs in Python.\n\nHere's an overview of these protocols:\n\n\
    **Iterable Protocol:**\n\nAn object is considered iterable if it implements the\
    \ `__iter__()` method.\nThe `__iter__()` method should return an iterator object.\n\
    \nIterable objects can be used in iteration constructs like `for` loops and comprehensions.\n\
    \n**Example:**\n\n```python\nclass MyIterable:\n    def __iter__(self):\n    \
    \    return iter([1, 2, 3])\n\niterable_obj = MyIterable()\nfor item in iterable_obj:\n\
    \    print(item)\n```\n\n**Iterator Protocol:**\n\nAn iterator is an object that\
    \ implements the `__iter__()` and `__next__()` methods."
