    except FileNotFoundError:\n    # Handle file not found error\nexcept ValueError:\n\
    \    # Handle value error\n```\n\n# Handling Multiple Exceptions:\n\nYou can handle\
    \ multiple exceptions in a single except block by specifying multiple exception\
