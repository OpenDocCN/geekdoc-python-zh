- md: "## Example:\n\n```python\n# custom_exceptions.py\nclass CustomError(Exception):\n\
    \    pass\n```\n\n```python\n# main.py\nfrom custom_exceptions import CustomError\n\
    \ntry:\n    raise CustomError(\"An error occurred\")\nexcept CustomError as e:\n\
    \    print(\"Custom error:\", e)\n```\n\nCustom exceptions provide a flexible\
    \ and powerful mechanism for error handling in Python applications.\n\n## 22.\
    \ Lambda Functions\n\nLambda functions, also known as anonymous functions or lambda\
    \ expressions, are a concise way to create small, one-line functions in Python.\
    \ They are often used when you need a simple function for a short period of time\
    \ or when you want to pass a function as an argument to another function.\n\n\
    Here's an overview of lambda functions:\n\n**Basic Syntax:**\n\nLambda functions\
    \ are defined using the lambda keyword, followed by a list of parameters, a colon\
    \ (:), and the expression to evaluate.\n\nThe syntax is: lambda parameters: expression\n\
    \n**Example:**\n\n```python\nadd = lambda x, y: x + y\n```\n\n**Usage:**\n\nLambda\
    \ functions can be assigned to variables and used like regular functions.\n\n\
    They can also be passed as arguments to other functions or used within list comprehensions,\
    \ map(), filter(), and reduce() functions.\n\n**Example:**\n\n```python\n# Using\
    \ a lambda function to define a custom sorting key\npoints = [(1, 2), (3, 1),\
    \ (5, 3)]\nsorted_points = sorted(points, key=lambda point: point[1])\n```\n\n\
    **Single Expression:**\n\nLambda functions can only contain a single expression.\n\
    \nThe expression is evaluated and returned as the result of the function.\n\n\
    **Example:**\n\n```python\n# Lambda function to check if a number is even\nis_even\
    \ = lambda x: x % 2 == 0\n```\n\n**No Statements:**\n\nLambda functions cannot\
    \ contain statements like return, pass, assert, or raise.\n\nThey are limited\
    \ to a single expression for evaluation.\n\n**Example (incorrect):**\n\n```python\n\
    # Incorrect lambda function with a return statement\nsquare = lambda x: return\
    \ x ** 2 # Raises SyntaxError\n```\n\n**Implicit Return:**\n\nLambda functions\
    \ automatically return the result of the expression.\n\nYou don't need to use\
    \ the return keyword explicitly.\n\n**Example:**\n\n```python\n# Lambda function\
    \ to square a number\nsquare = lambda x: x ** 2\n```\n\nLambda functions are useful\
    \ for writing quick, throwaway functions where defining a named function would\
    \ be overkill.\n\n## 23. Map, Filter, and Reduce\n\nmap(), filter(), and reduce()\
    \ are three built-in functions in Python that are commonly used for processing\
    \ iterables (such as lists, tuples, or sets) in a concise and functional programming\
    \ style. They allow you to perform operations on elements of an iterable in a\
    \ more compact and expressive way than using loops.\n\nHere's an overview of each\
    \ function:\n\n### map() Function:\n\nThe map() function applies a given function\
    \ to each item of an iterable (e.g., a list) and returns a new iterator containing\
    \ the results.\n\n**Syntax:** map(function, iterable)\n\n**Example:**\n\n```python\n\
    numbers = [1, 2, 3, 4, 5]\nsquared = map(lambda x: x**2, numbers)\n# squared is\
    \ now an iterator containing [1, 4, 9, 16, 25]\n```\n\n### filter() Function:\n\
    \nThe filter() function constructs a new iterator from elements of an iterable\
    \ for which a function returns true (i.e., the function filters the elements).\n\
    \n**Syntax:** filter(function, iterable)\n\n**Example:**\n\n```python\nnumbers\
    \ = [1, 2, 3, 4, 5]\neven_numbers = filter(lambda x: x % 2 == 0, numbers)\n# even_numbers\
    \ is now an iterator containing [2, 4]\n```\n\n### reduce() Function:\n\nThe reduce()\
    \ function, which was part of the functools module in Python 3, applies a rolling\
    \ computation to pairs of elements from an iterable, producing a single result.\n\
    \n**Syntax:** reduce(function, iterable, initializer)\n\n**Example:**\n\n```python\n\
    from functools import reduce\nnumbers = [1, 2, 3, 4, 5]\nproduct = reduce(lambda\
