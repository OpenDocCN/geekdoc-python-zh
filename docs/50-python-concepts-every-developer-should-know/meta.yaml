    **Bitwise Operators:** Used to perform bitwise operations on integers.


    +   - & (Bitwise AND)

    - | (Bitwise OR)

    - ^ (Bitwise XOR)

    - ~ (Bitwise NOT)

    - << (Left Shift)

    - (Right Shift)


