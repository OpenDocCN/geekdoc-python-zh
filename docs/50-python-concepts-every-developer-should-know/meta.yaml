    \n列表推导式和生成器表达式是在Python中分别创建列表和生成器的简洁高效的方式。与传统的`for`循环相比，它们提供了更紧凑的语法来生成值序列。\n\n\
    以下是列表推导式和生成器表达式的概述：\n\n**列表推导式：**\n\n列表推导式提供了一种基于现有列表或其他可迭代对象创建列表的简洁方式。\n\n**语法：**\
