    # Generators and Iterators:


    Generators and iterators are key features in Python for implementing lazy evaluation
    and achieving memory efficiency.


    Generators allow for lazy evaluation by generating values on-the-fly using the
    yield statement. They produce values one at a time, as they are needed, rather
    than computing and storing all values in memory upfront.


    Iterators provide a way to iterate over sequences of data lazily, allowing for
    efficient processing of large datasets without loading the entire dataset into
    memory at once.


    By using generators and iterators, Python programmers can write code that is both
    memory-efficient and capable of handling large or infinite datasets.


    # Example:


    Consider the task of processing a large file line by line. Instead of reading
    the entire file into memory, which could be inefficient for large files, you can
    use a generator to lazily read and process each line as needed. This approach
