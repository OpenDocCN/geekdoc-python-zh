    text = 'Lastname, Firstname'\n\nmatch = re.match(pattern, text)\nif match:\n \
    \   print('Last name:', match.group(1))\n    print('First name:', match.group(2))\n\
    ```\n\n**Named Groups:**\n\nYou can assign names to groups using the `(?P<name>...)`\
