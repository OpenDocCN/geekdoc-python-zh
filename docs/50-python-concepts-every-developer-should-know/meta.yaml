  md: "# # 31. Iterable and Iterator Protocols\n\nThe concepts of iterable and iterator\
    \ are fundamental for understanding how looping constructs like for loops work\
    \ and how to create custom iterable objects. The iterable and iterator protocols\
    \ define the behavior of objects that can be iterated over, enabling them to work\
    \ seamlessly with iteration constructs in Python.\n\nHere's an overview of these\
    \ protocols:\n\n**Iterable Protocol:**\n\nAn object is considered iterable if\
    \ it implements the `__iter__()` method.\nThe `__iter__()` method should return\
    \ an iterator object.\n\nIterable objects can be used in iteration constructs\
    \ like for loops and comprehensions.\n\n**Example:**\n\n```\npython\nclass MyIterable:\n\
    \    def __iter__(self):\n        return iter([1, 2, 3])\n\niterable_obj = MyIterable()\n\
    for item in iterable_obj:\n    print(item)\n```\n\n**Iterator Protocol:**\n\n\
    An iterator is an object that implements the `__iter__()` and `__next__()` methods."
  merge: -1
  pgno: 103
- img_proc: true
  md: "The __iter__() method should return the iterator object itself.\nThe __next__()\
    \ method returns the next item in the iteration or raises a StopIteration exception\
    \ when the iteration is complete.\n\n**Example:**\n\n```\npython\nclass MyIterator:\n\
    \    def __init__(self):\n        self.data = [1, 2, 3]\n        self.index =\
    \ 0\n\n    def __iter__(self):\n        return self\n\n    def __next__(self):\n\
