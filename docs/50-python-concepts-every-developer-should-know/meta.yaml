  md: '**Identity Operators:** Used to compare the memory locations of two objects.


    +   - is

    - is not


    **Example:**


    ```

    x = ["apple", "banana"]

    y = ["apple", "banana"]

    z = x


    print("is:", x is z)   # True, because x and z are the same object

    print("is not:", x is not y) # True, because x and y are not the same object

    ```


    **Membership Operators:** Used to test whether a value or variable is found in
    a sequence.


    +   - in

    - not in


    **Example:**


    ```

    my_list = [1, 2, 3, 4, 5]


    print("in:", 3 in my_list)   # True, because 3 is present in the list

    print("not in:", 6 not in my_list) # True, because 6 is not present in the list

    ```


    **Expressions:** Expressions are combinations of values, variables, and operators
    that Python interprets and evaluates to produce a single value. Expressions can
    involve arithmetic operations, comparisons, logical operations, etc.'
