    \ Exception Classes:\n\nCustom exceptions are created by subclassing the built-in\
    \ Exception class or one of its subclasses.\n\nYou can define additional attributes\
    \ or methods in your custom exception class as needed.\n\n### Example:\n\n```python\n\
    class CustomError(Exception):\n    def __init__(self, message=\"An error occurred\"\
