    \ of the original function, such as its name, docstring, and annotations. This\
    \ ensures that the decorated function retains its identity and remains introspectable.\n\
    \n## Example:\n\n```\nfrom functools import wraps\n\ndef my_decorator(func):\n\
    \    @wraps(func)\n    def wrapper(*args, **kwargs):\n        # Function body\n\
    \        pass\n    return wrapper\n```\n\nDecorators are a versatile tool in Python\
    \ for extending and customizing the behavior of functions.\n\n## 26. Regular Expressions\n\
    \nRegular expressions (regex) in Python provide a powerful and flexible way to\
    \ search, match, and manipulate text strings based on patterns. They are implemented\
    \ through the `re` module in Python.\n\nHere's an overview of regular expressions:\n\
    \n### Basic Syntax:\n\nRegular expressions are patterns used to match character\
    \ combinations in strings. Common regex patterns include literal characters, character\
    \ classes, quantifiers, anchors, and groups.\n\n### Example:\n\n```python\nimport\
    \ re\n\npattern = r'apple'\ntext = 'I have an apple'\n\nmatch = re.search(pattern,\
    \ text)\nif match:\n    print('Found')\n```\n\n### Pattern Matching Functions:\n\
    \nThe `re` module provides various functions for pattern matching, including `search()`,\
    \ `match()`, `findall()`, `finditer()`, and `sub()`.\n\n- **search()**: Searches\
    \ the string for a match and returns a match object if found.\n- **match()**:\
    \ Matches the pattern only at the beginning of the string.\n- **findall()**: Finds\
    \ all occurrences of the pattern in the string and returns them as a list.\n-\
    \ **finditer()**: Finds all occurrences of the pattern in the string and returns\
    \ them as an iterator of match objects.\n- **sub()**: Substitutes occurrences\
    \ of the pattern in the string with a replacement string.\n\n### Example:\n\n\
    ```python\nimport re\n\npattern = r'apple'\ntext = 'I have an apple and another\
    \ apple'\n\nmatches = re.findall(pattern, text)\nprint(matches) # Output: ['apple',\
    \ 'apple']\n```\n\n### Metacharacters:\n\nRegular expressions use metacharacters\
    \ like `.` (any character), `*` (zero or more occurrences), `+` (one or more occurrences),\
    \ `?` (zero or one occurrence), `\\d` (digit), `\\w` (word character), `\\s` (whitespace),\
    \ etc.\n\n### Example:\n\n```python\nimport re\n\npattern = r'\\d+'\ntext = 'I\
    \ have 2 apples and 3 oranges'\n\nmatches = re.findall(pattern, text)\nprint(matches)\
    \ # Output: ['2', '3']\n```\n\n### Grouping and Capturing:\n\nParentheses `()`\
    \ are used for grouping characters or patterns and capturing matched substrings.\
    \ Captured groups can be accessed using the `group()` method of the match object\
    \ or through backreferences in replacement strings.\n\n### Example:\n\n```python\n\
    import re\n\npattern = r'(\\d{3})-(\\d{3})-(\\d{4})'\ntext = 'Phone numbers: 123-456-7890,\
    \ 987-654-3210'\n\nmatches = re.findall(pattern, text)\nfor match in matches:\n\
    \    print(match)\n```\n\n### Flags:\n\nFlags modify the behavior of regex patterns.\
