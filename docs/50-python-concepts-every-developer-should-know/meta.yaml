    \ of the regex pattern in the string and returns them as a list of strings.\n\n\
    **Example:**\n\n```python\nimport re\n\npattern = r'\\d+'\ntext = 'I have 2 apples\
    \ and 3 oranges'\n\nmatches = re.findall(pattern, text)\nprint('Matches found:',\
    \ matches)\n```\n\n**`re.finditer()` Function:**\n\nThe `re.finditer()` function\
    \ finds all occurrences of the regex pattern in the string and returns them as\
