- md: "## Decorator Execution Flow:\n\nWhen a decorated function is called, the original\
    \ function is replaced by the inner wrapper function defined in the decorator.\
    \ The wrapper function can perform actions before and after calling the original\
    \ function, such as logging, timing, or input validation.\n\n## Example:\n\n```\n\
    # Output:\n# Something is happening before the function is called.\n# Hello!\n\
    # Something is happening after the function is called.\n```\n\n## Decorator with\
    \ Arguments:\n\nDecorators can accept arguments by defining a decorator factory\
    \ function that returns a decorator function.\n\n## Example:\n\n```\ndef repeat(num_times):\n\
    \    def decorator_repeat(func):\n        def wrapper(*args, **kwargs):\n    \
    \        for _ in range(num_times):\n                result = func(*args, **kwargs)\n\
    \            return result\n        return wrapper\n    return decorator_repeat\n\
    \n@repeat(num_times=3)\ndef greet(name):\n    print(f\"Hello, {name}!\")\n\ngreet(\"\
    Alice\")\n```\n\n## Common Use Cases:\n\n- **Logging:** Add logging statements\
    \ before and after function calls.\n- **Authentication:** Check user authentication\
    \ before executing a function.\n- **Caching:** Cache expensive function calls\
    \ to improve performance.\n- **Rate Limiting:** Limit the rate at which a function\
    \ can be called.\n- **Timing:** Measure the execution time of a function.\n- **Validation:**\
    \ Validate input arguments before calling a function.\n\n## Preserving Function\
