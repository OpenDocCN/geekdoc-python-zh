  md: '# 2. Operators and Expressions


    **Operators:** Operators are symbols in Python that perform operations on variables
    and values.


    Python supports various types of operators, including:


    **Arithmetic Operators:** Used for performing mathematical operations such as
    addition, subtraction, multiplication, division, etc.


    +   - Addition (+)

    - Subtraction (-)

    - Multiplication (*)

    - Division (/)

    - Modulus (%)

    - Exponentiation (**)

    - Floor Division (//)


    **Example:**


    ```

    a = 10

    b = 3


    print("Addition:", a + b)    # Addition

    print("Subtraction:", a - b)  # Subtraction

    print("Multiplication:", a * b) # Multiplication

    print("Division:", a / b)    # Division

    print("Modulus:", a % b)     # Modulus (remainder of division)

    ```'
  merge: -1
  pgno: 9
- img_proc: true
  md: '```

    print("Exponentiation:", a ** b) # Exponentiation

    print("Floor Division:", a // b) # Floor Division (rounds down to nearest integer)

    ```


    **Comparison (Relational) Operators:** Used to compare values and return a Boolean
    result (True or False).


    +   - Equal to (==)

    - Not equal to (!=)

    - Greater than (>)

    - Less than (<)

    - Greater than or equal to (>=)

    - Less than or equal to (<=)


    **Example:**


    ```

    x = 5

    y = 10


    print("Equal to:", x == y)        # Equal to

    print("Not equal to:", x != y)    # Not equal to

    print("Greater than:", x > y)     # Greater than

    print("Less than:", x < y)        # Less than

    print("Greater than or equal to:", x >= y) # Greater than or equal to

    print("Less than or equal to:", x <= y)    # Less than or equal to

    ```


    **Logical Operators:** Used to combine conditional statements and return a Boolean
    result.


    +   - and

    - or'
