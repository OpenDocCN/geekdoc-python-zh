  md: '# # 36. Asynchronous Programming with async/await


    Asynchronous programming with async and await in Python allows you to write non-blocking,
    concurrent code that can efficiently handle I/O-bound tasks, such as network requests,
    file operations, and database queries. Asynchronous programming enables you to
    write code that doesn''t waste time waiting for I/O operations to complete, improving
    the overall performance and responsiveness of your applications.


    Here''s an overview of asynchronous programming with async and await:


    **async and await Keywords:**


    The async and await keywords were introduced in Python 3.5 as part of the asyncio
    module to support asynchronous programming.


    async is used to define asynchronous functions, while await is used to suspend
    the execution of asynchronous functions until awaited operations complete.


    An asynchronous function can contain one or more await expressions, which pause
    the execution of the function until the awaited operation finishes.


    **Asynchronous Functions:**


    An asynchronous function is defined using the async def syntax.


    Inside an asynchronous function, you can use await to call other asynchronous
    functions or awaitable objects, such as coroutines, tasks, or futures.


    **Example:**'
  merge: -1
  pgno: 119
- img_proc: true
  md: "```\nimport asyncio\n\nasync def fetch_data():\n    await asyncio.sleep(1)\
    \ # Simulate I/O-bound operation\n    return \"Data fetched\"\n```\n\n# Event\
    \ Loop:\n\nAsynchronous programming in Python relies on an event loop (asyncio\
    \ event loop) to manage the execution of asynchronous tasks and coordinate I/O\
    \ operations.\n\nThe event loop schedules and executes asynchronous functions,\
    \ handles awaitable objects, and manages concurrency.\n\nYou typically interact\
    \ with the event loop using functions like asyncio.run(), asyncio.create_task(),\
    \ and asyncio.gather().\n\n# Example:\n\n```\nimport asyncio\n\nasync def main():\n\
    \    task1 = asyncio.create_task(fetch_data())\n    task2 = asyncio.create_task(fetch_data())\n\
    \    await asyncio.gather(task1, task2)\n\nasyncio.run(main())\n```\n\n# Concurrency\
    \ and Parallelism:"
