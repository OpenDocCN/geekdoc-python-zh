    # # 15. Method Resolution Order (MRO)


    Method Resolution Order (MRO) is the order in which classes are searched for methods
    and attributes in Python''s inheritance hierarchy. In multiple inheritance scenarios
    where a class inherits from more than one superclass, Python follows a specific
    algorithm to determine the order in which methods and attributes are resolved.


    The MRO is crucial for determining which method implementation will be called
    when a method is invoked on an instance of a class that inherits from multiple
    superclasses. Python uses the C3 linearization algorithm, also known as the C3
    superclass linearization, to compute the MRO.


    Here''s how the C3 linearization algorithm works:


    **Depth-First Search (DFS):**


    +   - Python performs a depth-first search traversal of the inheritance hierarchy,
    starting from the derived class and then recursively visiting its superclasses.


    **Merge Order Lists:**


    +   - For each class, Python creates a list of its ancestors, including itself,
    called the linearization list.

    - These linearization lists are then merged together in a specific order to create
    the final MRO.


    **C3 Linearization:**


    The C3 algorithm ensures that the MRO preserves the following properties:'
  - '[PAGE 50]


    +   - Children precede their parents.

    - If a class inherits from multiple superclasses, the order in which the superclasses
    appear in the MRO is preserved.

    - If there are multiple inheritance paths to the same class, they are reconciled
    in a consistent and predictable manner.


    # Method Resolution:


    +   - When a method is called on an instance of a class, Python looks for the
    method by following the MRO.

    - It searches the linearization list from left to right until it finds the method
    or reaches the end of the list.

    - The method found in the first class in the MRO list is the one that gets invoked.


    The Method Resolution Order is essential for working with multiple inheritance
    in Python.'
