    \ = r'\\d+'\ntext = 'I have 2 apples and 3 oranges'\n\nmatches = re.finditer(pattern,\
    \ text)\nfor match in matches:\n    print('Match found:', match.group())\n```\n\
    \n**Match Object:**\n\nMatch objects contain information about the matched substring,\
    \ such as its start and end positions, the matched text, and any captured groups.\n\
    \nYou can access this information using methods like `group()`, `start()`, `end()`,\
