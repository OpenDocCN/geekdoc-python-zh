    ```\n\n**追加到文件：**\n\n你可以以追加模式打开文件，将新内容添加到文件末尾，而不会截断现有内容。\n\n**示例：**\n\n```\nfile\
    \ = open('example.txt', 'a')\nfile.write(\"This is a new line.\\n\")\nfile.close()\n\
    ```\n\n**关闭文件：**\n\n读取或写入文件后，使用 `close()` 方法关闭文件以释放系统资源至关重要。\n\n**示例：**\n\n```\n\
    file = open('example.txt', 'r')\n# 读取或写入操作\nfile.close()\n```\n\n**使用 `with` 语句：**\n\
