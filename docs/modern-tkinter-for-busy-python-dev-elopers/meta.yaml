- img_proc: true
  md: 'We''ve just seen how event bindings can be set up for an individual widget.
    When a matching event is received by that widget, the binding will trigger. But
    that''s not all you can do.

    Your binding can capture not just a single event, but a short sequence of events.
    The `<Double-1>` binding triggers when two mouse clicks occur in a short time.
    You can do the same thing to capture two keys pressed in a row, e.g., `<KeyPress-A><KeyPress-B>`
    or simply `<ab>`.

    You can also set up an event binding on a toplevel window. When a matching event
    occurs anywhere in that window, the binding will be triggered. In our example,
    we set up a binding for the Return key on the main application toplevel window.
    If the Return key was pressed when any widget in the toplevel window had the focus,
    that binding would fire.

    Less commonly, you can create event bindings that are triggered when a matching
    event occurs anywhere in the application, or even for events received by any widget
    of a given class, e.g., all buttons.


    > More than one binding can fire for an event. This keeps event handlers concise
    and limited in scope, meaning more modular code. For example, the behavior of
    each widget class in Tk is itself defined with script-level event bindings. These
    stay separate from event bindings in your application. Event bindings can also
    be changed or deleted. They can be modified to alter event handling for widgets
    of a certain class or parts of your application. You can reorder, extend, or change
    the sequence of event bindings that will be triggered for each widget; see the
    `bindtags` command reference if you''re curious.

    https://tkdocs.com/man/bindtags


    # Available Events


    The most commonly used events are described below, along with the circumstances
    when they are generated. Some are generated on some platforms and not others.
    For a complete description of all the different event names, modifiers, and the
    different event parameters that are available with each, the best place to look
    is the `bind` command reference.'
