    \n## 15. 文本\n\n**文本**组件管理一个多行文本区域。与画布组件类似，Tk 的文本组件是一个极其灵活和强大的工具，可用于各种任务。它可以作为表单的一部分提供简单的多行文本区域。但文本组件也可以构成样式化代码编辑器、大纲视图、网页浏览器等的基础。\n\
    \n注意：文本组件是经典 Tk 组件的一部分，而不是主题化 Tk 组件。\n\n虽然我们在前面的章节中简要介绍了文本组件，但这里将进行更详细的介绍。你将更好地了解它们所能达到的复杂程度。不过，对于任何涉及文本组件的重要工作，[参考手册](reference\
    \ manual)组织良好、实用性强，强烈推荐阅读。\n\n文本组件使用 `Text` 类创建：\n\n```python\ntext = Text(parent,\
    \ width=40, height=10)\n```\n\n你通常会提供宽度（以字符为单位）和高度（以行为单位）。一如既往，你可以要求几何管理器将其扩展以填充窗口中的可用空间。\n\
    \n### 15.1. 基础知识\n\n如果你只需要一个用于表单的多行文本字段，只需关注几件事：创建和调整组件大小（已完成）、提供初始值，以及在用户提交表单后检索文本。\n\
    \n### 提供初始内容\n\n文本组件初始时为空，因此我们需要自己添加任何初始内容。因为文本组件可以容纳比纯文本多得多的内容，简单的机制（如输入组件的 `textvariable`\
    \ 配置选项）是不够的。相反，我们将使用组件的 `insert` 方法：\n\n```python\ntext.insert('1.0', 'here is\
    \ my\\ntext to insert')\n```\n\n这里的 \"1.0\" 是插入文本的位置，可以理解为 \"第 1 行，第 0 个字符\"。这指的是第一行的第一个字符。历史上，尤其是在\
    \ Unix 上，程序员倾向于将行号视为从 1 开始，字符位置视为从 0 开始。要插入的文本只是一个字符串。因为组件可以容纳多行文本，我们提供的字符串也可以是多行的。要实现这一点，只需在字符串中的适当位置嵌入\
    \ `\\n`（换行）字符即可。\n\n### 检索文本\n\n在用户进行任何更改并提交表单（例如）之后，你的程序可以通过 `get` 方法检索组件的内容：\n\
    \n```python\nthetext = text.get('1.0', 'end')\n```\n\n两个参数是起始和结束位置；`end` 的含义显而易见。如果你想只获取部分文本，可以提供不同的起始和结束位置。你很快会看到更多关于位置的内容。"
