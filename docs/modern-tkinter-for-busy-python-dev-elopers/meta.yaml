  md: "character (specified by index) or a *range* of characters (specified by start\
    \ and end indices). In the latter case, characters from (and including) the start\
    \ index through to *just before* the end index will be deleted (so the character\
    \ at the end index is not deleted). So if we assume for each of these we start\
    \ off with abcd\\nefgh in the text widget:\n\n```\ntext.delete('1.2') ⇒ \"abd\\\
    nefgh\"\ntext.delete('1.1', '1.2') ⇒ \"acd\\nefgh\"\ntext.delete('1.0', '2.0')\
    \ ⇒ \"efgh\"\ntext.delete('1.2', '2.1') ⇒ \"abfgh\"\n```\n\nThere is also a `replace`\
    \ method that performs a `delete` followed by an `insert` at the same location.\n\
    \n# **Example: Logging Window**\n\nHere's a short example that illustrates using\
    \ a text widget as an 80x24 logging window for an application. Users don't edit\
    \ the text widget at all. Instead, the program writes log messages to it. We'd\
    \ like to display more than 24 lines (so no scrolling). If the log is full, old\
    \ messages are removed from the top before new ones are added at the end.\n\n\
    ```\nfrom tkinter import *\nfrom tkinter import ttk\n\nroot = Tk()\nlog = Text(root,\
    \ state='disabled', width=80, height=24,\nwrap='none')\nlog.grid()\n\ndef writeToLog(msg):\n\
    \    numlines = int(log.index('end - 1 line').split('.')[0])\n    log['state']\
    \ = 'normal'\n    if numlines==24:\n        log.delete(1.0, 2.0)\n    if log.index('end-1c')!='1.0':\n\
    \        log.insert('end', '\\n')\n    log.insert('end', msg)\n    log['state']\
    \ = 'disabled'\n```\n\n[</>] [https://tkdocs.com/code/logwindow.py](https://tkdocs.com/code/logwindow.py)"
