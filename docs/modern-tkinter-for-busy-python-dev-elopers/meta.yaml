  md: '# 13.2. Colors


    As with fonts, there are various ways to specify colors. Full details can be found
    in the [colors command reference](https://tkdocs.com/man/colors).


    In general, Tk widgets default to the right colors for most situations. If you''d
    like to change colors, you''ll do so via widget-specific commands or options,
    e.g., the label''s `foreground` and `background` configuration options. For most
    themed widgets, color changes are specified through styles, not by changing the
    widget directly.


    You can specify colors via RGB, as you would in HTML or CSS, e.g. `#3FF` or `#FF016A`.
    Tk also recognizes names such as `red`, `black`, `grey50`, `light blue`, etc.


    > Tk recognizes the standard names for colors defined by X11. You can find a complete
    list in the command reference (noted above).


    As with fonts, both macOS and Windows specify many system-specific abstract color
    names (again, see the reference). The actual color these correspond to may depend
    on system settings and can change over time, e.g., dark mode, text highlight colors,
    default backgrounds.


    If needed, you can find the RGB values (each between 0 and 65535) for a color
    using the `winfo_rgb` method on any widget.


    ```

    root.winfo_rgb(''red'')

    ```


    > It should probably go without saying, but restraint in the use of colors is
    highly advisable!'
  merge: -1
  pgno: 195
- img_proc: true
  md: '# 13.3. Images


    We''ve seen the basics of how to use images already, displaying them in labels
    or buttons, for example. We create an image object, usually from a file on disk.


    ```

    imgobj = PhotoImage(file=''myimage.gif'')

    label[''image''] = imgobj

    ```


    Out of the box, Tk 8.5 includes support for GIF and PPM/PNM images. Tk 8.6 added
    PNG to this short list. However, there is a Tk extension library called `Img`,
    which adds support for many others: BMP, XBM, XPM, JPEG, PNG (if you''re using
    8.5), TIFF, etc. Though not included directly in the Tk core, Img is usually included
    with other packaged distributions (e.g., ActiveTcl).

    Instead of using Tk''s Img extension, Tkinter uses a made-for-Python image library
    called `PIL` (Python Imaging Library). More specifically, we''ll use a more up-to-date
    fork of PIL called `pillow`. As it doesn''t come bundled with Python, you''ll
    normally need to install it. You should be able to do so via, e.g., `pip install
    Pillow`.


    ```

    from PIL import ImageTk, Image

    myimg = ImageTk.PhotoImage(Image.open(''myimage.png''))

    ```


    The `ImageTk.PhotoImage` call provides a drop-in replacement for Tk''s `PhotoImage`
    but supports the broader range of image types.

    Tk''s images are actually quite powerful and sophisticated and provide a wide
    variety of ways to inspect and modify images. You can find out more from the [image
    command reference](https://tkdocs.com/man/image) and the [photo command reference](https://tkdocs.com/man/photo).


    +   - https://tkdocs.com/man/image

    - https://tkdocs.com/man/photo


    > The types of multi-color images we''ve seen here are referred to in Tk as photo
    images. Tk also provides a second type of images, two-bit bitmap images, which
    were widely used in the ''90s when most Unix workstations'
  merge: -1
