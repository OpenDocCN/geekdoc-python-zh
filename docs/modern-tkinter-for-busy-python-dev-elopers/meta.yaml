  - '[PAGE 195]


    # 13.2. Colors


    As with fonts, there are various ways to specify colors. Full details can be found
    in the [colors command reference](https://tkdocs.com/man/colors).


    In general, Tk widgets default to the right colors for most situations. If you''d
    like to change colors, you''ll do so via widget-specific commands or options,
    e.g., the label''s `foreground` and `background` configuration options. For most
    themed widgets, color changes are specified through styles, not by changing the
    widget directly.


    You can specify colors via RGB, as you would in HTML or CSS, e.g. `#3FF` or `#FF016A`.
    Tk also recognizes names such as `red`, `black`, `grey50`, `light blue`, etc.


    > Tk recognizes the standard names for colors defined by X11. You can find a complete
    list in the command reference (noted above).


    As with fonts, both macOS and Windows specify many system-specific abstract color
    names (again, see the reference). The actual color these correspond to may depend
    on system settings and can change over time, e.g., dark mode, text highlight colors,
    default backgrounds.


    If needed, you can find the RGB values (each between 0 and 65535) for a color
    using the `winfo_rgb` method on any widget.


    ```

    root.winfo_rgb(''red'')

    ```


    > It should probably go without saying, but restraint in the use of colors is
    highly advisable!'
  - '[PAGE 196]


    # 13.3. Images


    We''ve seen the basics of how to use images already, displaying them in labels
    or buttons, for example. We create an image object, usually from a file on disk.


    ```

    imgobj = PhotoImage(file=''myimage.gif'')

    label[''image''] = imgobj

    ```


    Out of the box, Tk 8.5 includes support for GIF and PPM/PNM images. Tk 8.6 added
    PNG to this short list. However, there is a Tk extension library called `Img`,
    which adds support for many others: BMP, XBM, XPM, JPEG, PNG (if you''re using
    8.5), TIFF, etc. Though not included directly in the Tk core, Img is usually included
    with other packaged distributions (e.g., ActiveTcl).

    Instead of using Tk''s Img extension, Tkinter uses a made-for-Python image library
    called `PIL` (Python Imaging Library). More specifically, we''ll use a more up-to-date
    fork of PIL called `pillow`. As it doesn''t come bundled with Python, you''ll
    normally need to install it. You should be able to do so via, e.g., `pip install
    Pillow`.


    ```

    from PIL import ImageTk, Image

    myimg = ImageTk.PhotoImage(Image.open(''myimage.png''))

    ```


    The `ImageTk.PhotoImage` call provides a drop-in replacement for Tk''s `PhotoImage`
    but supports the broader range of image types.

    Tk''s images are actually quite powerful and sophisticated and provide a wide
    variety of ways to inspect and modify images. You can find out more from the [image
    command reference](https://tkdocs.com/man/image) and the [photo command reference](https://tkdocs.com/man/photo).


    +   - https://tkdocs.com/man/image

    - https://tkdocs.com/man/photo


    > The types of multi-color images we''ve seen here are referred to in Tk as photo
    images. Tk also provides a second type of images, two-bit bitmap images, which
    were widely used in the ''90s when most Unix workstations'
- md: "## 14. Canvas\n\nCanvas\nhttps://tkdocs.com/man/canvas\n\nA **canvas** widget\
    \ manages a 2D collection of graphical objects — lines, circles, text, images,\
    \ other widgets, and more. Tk's canvas is an incredibly powerful and flexible\
    \ widget, and truly one of Tk's highlights. It is suitable for a wide range of\
    \ uses, including drawing or diagramming, CAD tools, displaying or monitoring\
    \ simulations or actual equipment, and building more complex widgets out of simpler\
    \ ones.\n\nNote: Canvas widgets are part of the classic Tk widgets, not the themed\
    \ Tk widgets.\n\n![](img/e444c319ec16222f00278651bee8c21d_198_0.png)\n\nCanvas\
    \ widgets are created using the `Canvas` class:\n\n```\ncanvas = Canvas(parent,\
    \ width=500, height=400,\nbackground='gray75')\n```\n\nYou'll often provide a\
    \ width and height, either in pixels or any of the other standard distance units.\
    \ As always, you can ask the geometry manager to expand it to fill the available\
    \ space in the window. You might provide a default background color for the canvas,\
    \ specifying colors in any of the ways you learned about in the last chapter.\
    \ Canvas widgets also support other appearance options like `relief` and `borderwidth`\
    \ that we've used before.\n\nCanvas widgets have a tremendous number of features,\
    \ and we won't cover everything here. Instead, we'll start with a simple example,\
    \ a freehand sketching tool, and incrementally add new pieces to it, each showing\
    \ another new feature of canvas widgets.\n\n## 14.1. Creating Items\n\nWhen you\
    \ create a new canvas widget, it is essentially a large rectangle with nothing\
    \ on it, truly a blank canvas in other words. To do anything useful with it, you'll\
    \ need to add *items* to it. There are a wide variety of different *types* of\
    \ items you can add. Here, we'll add a simple *line* item to the canvas.\n\nTo\
    \ create a line, you need to specify its starting and ending *coordinates*. Coordinates\
    \ are expressed as the number of pixels away from the top-left corner, both horizontally\
    \ and vertically, i.e. (x,y). The pixel at the top-left corner, known as the *origin*,\
    \ has coordinates (0,0). The \"x\" value increases as you move to the right and\
    \ the \"y\" value increases as you move down. A line is described by two points,\
    \ which we'd refer to as (x0,y0) and (x1,y1). This code creates a line from (10,5)\
    \ to (200,50):\n\n```\ncanvas.create_line(10, 5, 200, 50)\n```\n\nThe `create_line`\
    \ method returns an item *id* (an integer) that uniquely refers to this item.\
    \ We'll see how it can be used shortly. Often, we don't need to refer to the item\
    \ later and can ignore the returned id.\n\n### A Simple Sketchpad\n\nLet's start\
    \ our simple sketchpad example. For now, we'll implement freehand drawing on the\
    \ canvas with the mouse. We create a canvas widget and attach event bindings to\
    \ it to capture mouse clicks and drags. When the mouse is first pressed, we'll\
    \ remember that location as the \"start\" coordinates of our next line. As the\
    \ mouse is moved with the mouse button held down, we create a line item from this\
    \ \"start\" position to the current mouse location. This current location becomes\
    \ the \"start\" position for the next line item. Every mouse drag creates a new\
    \ line item.\n\n```\nfrom tkinter import *\nfrom tkinter import ttk\n\ndef savePosn(event):\n\
    \    global lastx, lasty\n    lastx, lasty = event.x, event.y\n\ndef addLine(event):\n\
    \    canvas.create_line((lastx, lasty, event.x, event.y))\n    savePosn(event)\n\
    \nroot = Tk()\nroot.columnconfigure(0, weight=1)\nroot.rowconfigure(0, weight=1)\n\
    \ncanvas = Canvas(root)\ncanvas.grid(column=0, row=0, sticky=(N, W, E, S))\ncanvas.bind(\"\
    <Button-1>\", savePosn)\ncanvas.bind(\"<B1-Motion>\", addLine)\n\nroot.mainloop()\n\
    ```\n\nhttps://tkdocs.com/code/sketch1.py\n\nAgain, in this simple example, we're\
    \ using global variables to store the start position. In practice, we'd encapsulate\
    \ all of this in a Python class. Here's one way we could do that. Note that this\
    \ example creates a subclass of Canvas, which is treated like any other widget\
    \ in the code. We could have equally well used a standalone class, as we did with\
    \ the \"feet to meters\" example.\n\n```\nfrom tkinter import *\nfrom tkinter\
    \ import ttk\n\nclass Sketchpad(Canvas):\n    def __init__(self, parent, **kwargs):\n\
    \        super().__init__(parent, **kwargs)\n        self.bind(\"<Button-1>\"\
    , self.save_posn)\n        self.bind(\"<B1-Motion>\", self.add_line)\n\n    def\
    \ save_posn(self, event):\n        self.lastx, self.lasty = event.x, event.y\n\
    \n    def add_line(self, event):\n        self.create_line((self.lastx, self.lasty,\
    \ event.x,\n        event.y))\n        self.save_posn(event)\n\nroot = Tk()\n\
    root.columnconfigure(0, weight=1)\nroot.rowconfigure(0, weight=1)\n\nsketch =\
    \ Sketchpad(root)\nsketch.grid(column=0, row=0, sticky=(N, W, E, S))\n\nroot.mainloop()\n\
    ```\n\n[https://tkdocs.com/code/sketcho.py](https://tkdocs.com/code/sketcho.py)\n\
    \nTry it out - drag the mouse around the canvas to create your masterpiece.\n\n\
    ### Item Attributes\n\nWhen creating items, you can also specify one or more *attributes*\
    \ for the item, affecting how it is displayed. For example, here we'll specify\
    \ that the line should be red and three pixels wide.\n\n```\ncanvas.create_line(10,\
    \ 10, 200, 50, fill='red', width=3)\n```\n\nThe exact set of attributes will vary\
    \ according to the type of item. Some commonly used ones are:\n\n- **fill:** color\
    \ to draw the object\n- **width:** line width of the item (or its outline)\n-\
    \ **outline:** for filled shapes like rectangles, the color to draw the item's\
    \ outline\n- **dash:** draw a dashed line instead of a solid one, e.g., `2 4 6\
    \ 4` alternates short (2 pixels) and long (6 pixels) dashes with 4 pixels between\n\
    - **stipple:** instead of a solid fill color, use a pattern, typically `gray75`,\
    \ `gray50`, `gray25`, or `gray12`; stippling is currently not supported on macOS\n\
    - **state:** assign a state of `normal` (default), `disabled` (item event bindings\
    \ are ignored), or `hidden` (removed from display)\n- **disabledfill**, **disabledwidth**,\
    \ ...: if the item's `state` is set to `disabled`, the item will display using\
    \ these variants of the usual attributes\n- **activefill**, **activewidth**, ...:\
    \ when the mouse pointer is over the item, it will display using these variants\
    \ of the usual attributes\n\n> \U0001F4A1 *If you have canvas items that change\
    \ state, creating the item with both the regular and `disabled*` attribute variants\
    \ can simplify your code. You simply need to change the item's `state`, rather\
    \ than writing code to change multiple display attributes. The same applies to\
    \ the `active*`. Both encourage a more declarative style that can remove a lot\
    \ of boilerplate code.*\n\nAkin to Tk widgets, changing attributes for canvas\
    \ items after we've already created them is easily accomplished.\n\n```\nid =\
    \ canvas.create_line(0, 0, 10, 10, fill='red')\n...\ncanvas.itemconfigure(id,\
    \ fill='blue', width=2)\n```\n\n### Item Types\n\nCanvas widgets support a wide\
    \ variety of item types.\n\n### Line\n\nOur sketchpad created simple line items,\
    \ each a single segment with a start point and an end point. Lines items can also\
    \ consist of multiple segments.\n\n```\ncanvas.create_line(10, 10, 200, 50, 90,\
    \ 150, 50, 80)\n```\n\nLines have several interesting additional attributes, allowing\
    \ for drawing curves, arrows, and more.\n\n- **arrow:** place an arrowhead at\
    \ the start (`first`), end (`last`), or both ends (`both`); default is `none`\n\
    - **arrowshape:** allows changing the appearance of any arrowheads\n- **capstyle:**\
    \ for wide lines without arrowheads, this controls how the end of lines are drawn;\
    \ one of `butt` (default), `projecting`, or `round`\n- **joinstyle:** for wide\
    \ lines with multiple segments, this controls drawings of each vertex; one of\
    \ `round` (default), `bevel`, or `miter`\n- **smooth:** if specified as `true`\
    \ (or `bezier`), draws a smooth curve (via quadratic splines) between multiple\
    \ segments rather than using straight lines; `raw` specifies a different type\
    \ of curve (cubic splines)\n- **splinesteps:** controls the smoothness of curved\
    \ lines, i.e., those with the `smooth` option set\n\n### Rectangle\n\nRectangles\
    \ are specified by the coordinates of opposing corners, e.g., top-left and bottom-right.\
    \ They can be filled in (via `fill`) with one color, and the `outline` given a\
    \ different color.\n\n```\ncanvas.create_rectangle(10, 10, 200, 50, fill='red',\
    \ outline='blue')\n```\n\n### Oval\n\nOvals items work exactly the same as rectangles.\n\
    \n```\ncanvas.create_oval(10, 10, 200, 150, fill='red', outline='blue')\n```"
  mdcn: "## 14. Canvas\n\nCanvas\nhttps://tkdocs.com/man/canvas\n\n**canvas** 控件管理一个二维图形对象集合——包括线条、圆形、文本、图像、其他控件等。Tk\
    \ 的 canvas 是一个功能极其强大且灵活的控件，确实是 Tk 的亮点之一。它适用于广泛的用途，包括绘图或图表绘制、CAD 工具、显示或监控模拟或实际设备，以及用更简单的控件构建更复杂的控件。\n\
    \n注意：Canvas 控件是经典 Tk 控件的一部分，而非主题化 Tk 控件。\n\n![](img/e444c319ec16222f00278651bee8c21d_198_0.png)\n\
    \nCanvas 控件使用 `Canvas` 类创建：\n\n```\ncanvas = Canvas(parent, width=500, height=400,\n\
    background='gray75')\n```\n\n你通常需要提供宽度和高度，可以是像素或任何其他标准距离单位。一如既往，你可以让几何管理器将其扩展以填充窗口中的可用空间。你可能会为\
    \ canvas 提供一个默认背景颜色，使用你在上一章学到的任何方式指定颜色。Canvas 控件还支持其他外观选项，如我们之前使用过的 `relief` 和\
    \ `borderwidth`。\n\nCanvas 控件拥有大量的功能，我们无法在此一一涵盖。相反，我们将从一个简单的例子开始——一个手绘草图工具，并逐步为其添加新的部分，每个部分展示\
    \ canvas 控件的另一个新特性。\n\n## 14.1. 创建项目\n\n当你创建一个新的 canvas 控件时，它本质上是一个上面什么都没有的大矩形，换句话说，是一块真正的空白画布。要对其做任何有用的事情，你需要向其中添加*项目*。你可以添加各种不同*类型*的项目。在这里，我们将向\
    \ canvas 添加一个简单的*线条*项目。\n\n要创建一条线，你需要指定其起始和结束*坐标*。坐标表示为距离左上角的像素数，包括水平和垂直方向，即 (x,y)。左上角的像素，称为*原点*，其坐标为\
    \ (0,0)。当你向右移动时，\"x\" 值增加，当你向下移动时，\"y\" 值增加。一条线由两个点描述，我们称之为 (x0,y0) 和 (x1,y1)。此代码创建一条从\
    \ (10,5) 到 (200,50) 的线：\n\n```\ncanvas.create_line(10, 5, 200, 50)\n```\n\n`create_line`\
    \ 方法返回一个项目 *id*（一个整数），它唯一地引用此项目。我们稍后将看到如何使用它。通常，我们不需要在以后引用该项目，可以忽略返回的 id。\n\n\
    ### 一个简单的画板\n\n让我们开始我们的简单画板示例。目前，我们将使用鼠标在 canvas 上实现手绘。我们创建一个 canvas 控件，并为其附加事件绑定以捕获鼠标点击和拖动。当鼠标首次按下时，我们将记住该位置作为下一条线的“起始”坐标。当鼠标在按住鼠标按钮的情况下移动时，我们从这个“起始”位置到当前鼠标位置创建一个线条项目。这个当前位置成为下一个线条项目的“起始”位置。每次鼠标拖动都会创建一个新的线条项目。\n\
    \n```\nfrom tkinter import *\nfrom tkinter import ttk\n\ndef savePosn(event):\n\
    \    global lastx, lasty\n    lastx, lasty = event.x, event.y\n\ndef addLine(event):\n\
    \    canvas.create_line((lastx, lasty, event.x, event.y))\n    savePosn(event)\n\
    \nroot = Tk()\nroot.columnconfigure(0, weight=1)\nroot.rowconfigure(0, weight=1)\n\
    \ncanvas = Canvas(root)\ncanvas.grid(column=0, row=0, sticky=(N, W, E, S))\ncanvas.bind(\"\
    <Button-1>\", savePosn)\ncanvas.bind(\"<B1-Motion>\", addLine)\n\nroot.mainloop()\n\
    ```\n\nhttps://tkdocs.com/code/sketch1.py\n\n同样，在这个简单的例子中，我们使用全局变量来存储起始位置。在实践中，我们会将所有这些封装在一个\
    \ Python 类中。以下是一种我们可以这样做的方式。请注意，此示例创建了一个 Canvas 的子类，它在代码中被视为任何其他控件。我们同样可以使用一个独立的类，就像我们在“英尺转米”示例中所做的那样。\n\
    \n```\nfrom tkinter import *\nfrom tkinter import ttk\n\nclass Sketchpad(Canvas):\n\
    \    def __init__(self, parent, **kwargs):\n        super().__init__(parent, **kwargs)\n\
    \        self.bind(\"<Button-1>\", self.save_posn)\n        self.bind(\"<B1-Motion>\"\
    , self.add_line)\n\n    def save_posn(self, event):\n        self.lastx, self.lasty\
    \ = event.x, event.y\n\n    def add_line(self, event):\n        self.create_line((self.lastx,\
    \ self.lasty, event.x,\n        event.y))\n        self.save_posn(event)\n\nroot\
    \ = Tk()\nroot.columnconfigure(0, weight=1)\nroot.rowconfigure(0, weight=1)\n\n\
    sketch = Sketchpad(root)\nsketch.grid(column=0, row=0, sticky=(N, W, E, S))\n\n\
    root.mainloop()\n```\n\n[https://tkdocs.com/code/sketcho.py](https://tkdocs.com/code/sketcho.py)\n\
    \n试一试——在 canvas 上拖动鼠标来创作你的杰作。\n\n### 项目属性\n\n创建项目时，你还可以为项目指定一个或多个*属性*，影响其显示方式。例如，这里我们将指定线条应为红色且宽度为三个像素。\n\
    \n```\ncanvas.create_line(10, 10, 200, 50, fill='red', width=3)\n```\n\n确切的属性集将根据项目类型而有所不同。一些常用的属性包括：\n\
    \n- **fill:** 绘制对象的颜色\n- **width:** 项目的线宽（或其轮廓）\n- **outline:** 对于填充形状（如矩形），绘制项目轮廓的颜色\n\
    - **dash:** 绘制虚线而非实线，例如，`2 4 6 4` 交替使用短（2像素）和长（6像素）的虚线，间隔为4像素\n- **stipple:**\
    \ 使用图案而非纯色填充，通常是 `gray75`、`gray50`、`gray25` 或 `gray12`；目前 macOS 不支持 stippling\n\
    - **state:** 分配一个状态：`normal`（默认）、`disabled`（忽略项目事件绑定）或 `hidden`（从显示中移除）\n- **disabledfill**、**disabledwidth**、...：如果项目的\
    \ `state` 设置为 `disabled`，项目将使用这些通常属性的变体进行显示\n- **activefill**、**activewidth**、...：当鼠标指针悬停在项目上时，它将使用这些通常属性的变体进行显示\n\
    \n> \U0001F4A1 *如果你有改变状态的 canvas 项目，使用常规和 `disabled*` 属性变体创建项目可以简化你的代码。你只需更改项目的\
    \ `state`，而无需编写代码来更改多个显示属性。`active*` 也是如此。两者都鼓励更声明式的风格，可以消除大量样板代码。*\n\n类似于 Tk\
    \ 控件，在创建 canvas 项目后更改其属性很容易实现。\n\n```\nid = canvas.create_line(0, 0, 10, 10, fill='red')\n\
    ...\ncanvas.itemconfigure(id, fill='blue', width=2)\n```\n\n### 项目类型\n\nCanvas\
    \ 控件支持多种项目类型。\n\n### 线条\n\n我们的画板创建了简单的线条项目，每个都是一个具有起点和终点的单段线。线条项目也可以由多个段组成。\n\n\
    ```\ncanvas.create_line(10, 10, 200, 50, 90, 150, 50, 80)\n```\n\n线条有几个有趣的附加属性，允许绘制曲线、箭头等。\n\
    \n- **arrow:** 在起点（`first`）、终点（`last`）或两端（`both`）放置箭头；默认为 `none`\n- **arrowshape:**\
    \ 允许更改任何箭头的外观\n- **capstyle:** 对于没有箭头的宽线，这控制线条末端的绘制方式；可以是 `butt`（默认）、`projecting`\
    \ 或 `round`\n- **joinstyle:** 对于具有多个段的宽线，这控制每个顶点的绘制；可以是 `round`（默认）、`bevel` 或\
    \ `miter`\n- **smooth:** 如果指定为 `true`（或 `bezier`），则在多个段之间绘制平滑曲线（通过二次样条），而不是使用直线；`raw`\
    \ 指定不同类型的曲线（三次样条）\n- **splinesteps:** 控制曲线的平滑度，即那些设置了 `smooth` 选项的线条\n\n### 矩形\n\
    \n矩形由对角的坐标指定，例如左上角和右下角。它们可以通过 `fill` 用一种颜色填充，并为 `outline` 指定不同的颜色。\n\n```\ncanvas.create_rectangle(10,\
    \ 10, 200, 50, fill='red', outline='blue')\n```\n\n### 椭圆\n\n椭圆项目的工作方式与矩形完全相同。\n\
    \n```\ncanvas.create_oval(10, 10, 200, 150, fill='red', outline='blue')\n```"
