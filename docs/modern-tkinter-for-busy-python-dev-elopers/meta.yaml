  md: '> For document-centric applications, where you want to allow closing any window
    without the application exiting (as would happen if you destroy the root window),
    use `withdraw` on the root window to remove it from the screen, use new toplevel
    windows for your user interface.


    # Stacking Order


    Stacking order refers to the order that windows are "placed" on the screen, from
    bottom to top. When the positions of two windows overlap each other, the one closer
    to the top of the stacking order will obscure or overlap the one lower in the
    stacking order.

    You can ensure that a window is always at the top of the stacking order (or at
    least above all others where this attribute isn''t set):


    ```

    window.attributes("-topmost", 1)

    ```


    You can find the current stacking order, listed from lowest to highest:


    ```

    root.tk.eval(''wm stackorder ''+str(window))

    ```


    > This method isn''t exposed cleanly in Tkinter. It returns the internal names
    of each window, not the window object.


    You can also just check if one window is above or below another:


    ```

    if (root.tk.eval(''wm stackorder ''+str(window)+'' isabove ''+str(otherwindow))==''1'')
    ...

    if (root.tk.eval(''wm stackorder ''+str(window)+'' isbelow ''+str(otherwindow))==''1'')
    ...

    ```


    You can also raise or lower windows, either to the very top (bottom) of the stacking
    order, or just above (below) a designated window:


    ```

    window.lift()

    window.lift(otherwin)

    window.lower()

    window.lower(otherwin)

    ```'
  merge: -1
