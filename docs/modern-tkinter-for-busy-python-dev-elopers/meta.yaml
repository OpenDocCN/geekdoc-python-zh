    # 4.3. Step-by-Step Walkthrough


    Let''s take a closer look at that code, piece by piece. For now, all we''re trying
    to do is get a basic understanding of the types of things we need to do to create
    a user interface in Tk, and roughly what those things look like. We''ll go into
