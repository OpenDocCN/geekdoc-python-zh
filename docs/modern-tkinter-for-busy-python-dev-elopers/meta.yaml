  md: '# 10.2. Platform Menus


    Each platform has a few menus in every menubar that are handled specially by Tk.


    # macOS


    You''ve probably noticed that Tk on macOS supplies its own default menubar. It
    includes a menu named after the program being run (in this case, your programming
    language''s shell, "Python"), a File menu, and standard Edit, Windows, and Help
    menus, all stocked with various menu items.

    You can override this menubar in your own program, but to get the results you
    want, you''ll need to follow some particular steps (in some cases, in a particular
    order).


    > Starting at Tk 8.5.13, the handling of special menus on macOS changed due to
    the underlying Tk code migrating from the obsolete Carbon API to Cocoa. If you''re
    seeing duplicate menu names, missing items, things you didn''t put there, etc.
    review this section carefully.


    The first thing to know is that if you don''t specify a menubar for a window (or
    its parent window, e.g., the root window), you''ll end up with the default menubar
    Tk supplies, which unless you''re just mucking around on your own, is almost certainly
    not what you want.


    # The Application Menu


    Every menubar starts with the system-wide apple icon menu. To the right of that
    is a menu for the frontmost application. It is always named after the binary being
    run. If you do supply a menubar, *at the time the menubar is attached to the window*,
    if there is *not* a specially named `.apple` menu (see below), Tk will provide
    its default application menu. It will contain an "About Tcl & Tk" item, followed
    by the standard menu items: preferences, the services submenu, hide/show items,
    and quit. Again, you don''t want this.'
  merge: -1
  pgno: 153
- img_proc: true
  md: 'If you supply your own `.apple` menu, when the menubar is attached to the window,
    Tk will add the standard items (preferences and onward) onto the end of any items
    you have added. Perfect! Items you add *after* the menubar is attached to the
    window will appear after the quit item, which, again, you don''t want.


    > The application menu, which we''re dealing with here, is distinct from the apple
    menu (the one with the apple icon, just to the left of the application menu).
    Despite that, we really mean the application menu, even though Tk still refer
    to it as the "apple" menu. This is a holdover from pre-OS X days when these sorts
    of items did go in the actual apple menu, and there was no separate application
    menu.


    So, in other words, in your program, make sure you:


    +   1. Create a menubar for each window or the root window. *Do not attach the
    menubar to the window yet!*

    2. Add a menu to the menubar named `.apple`. It will be used as the application
    menu.

    3. The menu will automatically be named the same as the application binary; if
    you want to change this, rename (or make a copy of) the binary used to run your
    script.

    4. Add the items you want to appear at the top of the application menu, i.e.,
    an "About yourapp" item, followed by a separator.

    5. *After* you have done all this, you can *then* attach the menubar to your window
    via the window''s `menu` configuration option.


    ```

    win = Toplevel(root)

    menubar = Menu(win)

    appmenu = Menu(menubar, name=''apple'')

    menubar.add_cascade(menu=appmenu)

    appmenu.add_command(label=''About My Application'')

    appmenu.add_separator()

    win[''menu''] = menubar

    ```


    > While usually, Tkinter chooses a widget pathname for us, we''ve had to explicitly
    provide one (`apple`) using the `name` option when creating the application menu.'
