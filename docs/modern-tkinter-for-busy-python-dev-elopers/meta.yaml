- img_proc: true
  md: '# # 16. Treeview


    ttk.Treeview

    https://tkdocs.com/man/ttk_treeview


    A **treeview** widget displays a hierarchy of items and allows users to browse
    through it. One or more attributes of each item can be displayed as columns to
    the right of the tree. It can be used to build user interfaces similar to the
    tree display you''d find in file managers like the macOS Finder or Windows Explorer.
    As with most Tk widgets, it offers incredible flexibility so it can be customized
    to suit a wide range of situations.


    ![](img/e444c319ec16222f00278651bee8c21d_234_0.png)


    Treeview widgets are created using the `ttk.Treeview` class:'
  merge: -1
  pgno: 234
- img_proc: true
  md: '```

    tree = ttk.Treeview(parent)

    ```


    Horizontal and vertical scrollbars can be added in the usual manner if desired.'
  merge: -1
  pgno: 235
- img_proc: true
  md: '# 16.1. Adding Items to the Tree


    To do anything useful with the treeview, we''ll need to add one or more *items*
    to it. Each item represents a single node in the tree, whether a leaf node or
    an internal node containing other nodes. Items are referred to by a unique id.
    You can assign this id when the item is first created, or the widget can automatically
    generate one.


    Items are created by inserting them into the tree, using the treeview''s `insert`
    method. To insert an item, we need to know where to insert it. That means specifying
    the parent item and where within the list of the parent''s existing children the
    new item should be inserted.


    The treeview widget automatically creates a root node (which is not displayed).
    Its id is the empty string. It serves as the parent of the first level of items
    that are added. Positions within the list of a node''s children are specified
    by index (0 being the first, and `end` meaning insert after all existing children).


    Normally, you''ll also specify the *name* of each item, which is the text displayed
    in the tree. Other options allow you to add an image beside the name, specify
    whether the node is open or closed, etc.


    ```

    # Inserted at the root, program chooses id:

    tree.insert('''', ''end'', ''widgets'', text=''Widget Tour'')


    # Same thing, but inserted as first child:

    tree.insert('''', 0, ''gallery'', text=''Applications'')


    # Treeview chooses the id:

    id = tree.insert('''', ''end'', text=''Tutorial'')


    # Inserted underneath an existing node:

    tree.insert(''widgets'', ''end'', text=''Canvas'')

    tree.insert(id, ''end'', text=''Tree'')

    ```


    Inserting the item returns the id of the newly created item.'
  merge: -1
  pgno: 236
- img_proc: true
  md: '# 16.2. Rearranging Items


    A node (and its descendants, if any) can be moved to a different location in the
    tree. The only restriction is that a node cannot be moved underneath one of its
    descendants, for obvious reasons. As before, the target location is specified
    via an existing parent node, and a position within its list of children.


    ```

    tree.move(''widgets'', ''gallery'', ''end'')  # move widgets under gallery

    ```


    Items can be *detached* from the tree, which removes the item and its descendants
    from the hierarchy, but does not destroy the items. This allows us to later reinsert
    them with `move`.


    ```

    tree.detach(''widgets'')

    ```


    Items can also be *deleted*, which does completely destroy the item and its descendants.


    ```

    tree.delete(''widgets'')

    ```


    To traverse the hierarchy, there are methods to find the parent of an item (`parent
    item`), its next or previous sibling (`next item` and `prev item`), and return
    the list of children of an item (`children item`).

    We can control whether or not the item is open and shows its children by modifying
    the `open` item configuration option.


    ```

    tree.item(''widgets'', open=TRUE)

    isopen = tree.item(''widgets'', ''open'')

    ```'
  merge: -1
  pgno: 237
- img_proc: true
  md: '# 16.3. Displaying Information for each Item


    The treeview can display one or more additional pieces of information about each
    item. These are shown as columns to the right of the main tree display.

    Each column is referenced by a symbolic name that we assign. We can specify the
    list of columns using the `columns` configuration option of the treeview widget,
    either when first creating the widget, or later on.


    ```

    tree = ttk.Treeview(root, columns=(''size'', ''modified''))

    tree[''columns''] = (''size'', ''modified'', ''owner'')

    ```


    We can specify the width of the column, how the display of item information in
    the column is aligned, and more. We can also provide information about the heading
    of the column, such as the text to display, an optional image, alignment, and
    a script to invoke when the item is clicked (e.g. to sort the tree).


    ```

    tree.column(''size'', width=100, anchor=''center'')

    tree.heading(''size'', text=''Size'')

    ```


    What to display in each column for each item can be specified individually by
    using the `set` method. You can also provide a list describing what to display
    in all the columns for the item. This is done using the `values` item configuration
    option. It can be used either when first inserting the item or to update it later).
    It takes a list of values. The order of the list must be the same as the order
    in the `columns` widget configuration option.


    ```

    tree.set(''widgets'', ''size'', ''12KB'')

    size = tree.set(''widgets'', ''size'')

    tree.insert('''', ''end'', text=''Listbox'', values=(''15KB'',

    ''Yesterday'', ''mark''))

    ```'
  merge: -1
  pgno: 238
- img_proc: true
  md: '# 16.4. Item Appearance and Events


    Like the text and canvas widgets, the treeview widget uses *tags* to modify the
    appearance of items in the tree. We can assign a list of tags to each item using
    the `tags` item configuration option (again, when creating the item or later on).


    Configuration options can then be specified on the tag, which will then apply
    to all items having that tag. Valid tag options include `foreground` (text color),
    `background`, `font`, and `image` (not used if the item specifies its own image).


    We can also create event bindings on tags, which lets us capture mouse clicks,
    keyboard events etc.


    ```

    tree.insert('''', ''end'', text=''button'', tags=(''ttk'', ''simple''))

    tree.tag_configure(''ttk'', background=''yellow'')

    tree.tag_bind(''ttk'', ''<1>'', itemClicked)

    # the item clicked can be found via tree.focus()

    ```


    The treeview will generate virtual events `<<TreeviewSelect>>`, `<<TreeviewOpen>>`,
    and `<<TreeviewClose>>`, which allow us to monitor changes to the widget made
    by users. We can use the `selection` method to determine the current selection
    (the selection can also be changed from your program).'
  merge: -1
  pgno: 239
- img_proc: true
  md: '# 16.5. Customizing the Display


    There are many aspects of how the treeview widget is displayed that we can customize.
    We''ve already seen some of them, such as the text of items, fonts and colors,
    names of column headings, and more. Here are a few additional ones.


    +   - Specify the desired number of rows to show using the `height` widget configuration
    option.

    - Control the width of each column using the column''s `width` or `minwidth` options.
    The column holding the tree can be accessed with the symbolic name `#0`. The overall
    requested width for the widget is based on the sum of the column widths.

    - Choose which columns to display and the order to display them in using the `displaycolumns`
    widget configuration option.

    - You can optionally hide one or both of the column headings or the tree itself
    (leaving just the columns) using the `show` widget configuration option (default
    is "tree headings" to show both).

    - You can specify whether a single item or multiple items can be selected by users
    via the `selectmode` widget configuration option, passing `browse` (single item),
    `extended` (multiple items, the default), or `none`.'
  merge: -1
  pgno: 240
- img_proc: true
  md: '# 17. Styles and Themes


    The *themed* aspect of the modern Tk widgets is one of the most powerful and exciting
    aspects of the newer widget set. Yet, it''s also one of the most confusing.

    This chapter explains styles (which control how widgets like buttons look) and
    themes (which are a collection of styles that define how all the widgets in your
    application look). Changing themes can give your application an entirely different
    look.


    ![](img/e444c319ec16222f00278651bee8c21d_241_0.png)


    Note that it''s not just colors that have changed, but the actual shape of individual
    widgets. Styles and themes are *extremely* flexible.


    # Why?'
  merge: -1
  pgno: 241
- img_proc: true
  md: 'However, before you get carried away, very few applications will benefit from
    switching themes like this. Some games or educational programs might be exceptions.
    Using the standard Tk theme for a given platform will display widgets the way
    that people expect to see them, particularly if they''re running macOS and Windows.


    > On Linux systems, there''s far less standardization of look and feel. Users
    expect (and are more comfortable with) some variability and "coolness." Because
    different widget sets (typically GTK and QT) are used by window managers, control
    panels, and other system utilities, Tk can''t seamlessly blend in with the current
    settings on any particular system. Most of the Linux screenshots in this book
    use Tk''s alt theme. Despite users being accustomed to variability, there are
    limits to what most users will accept. The styling of core widgets in Tk''s classic
    widget set, matching circa-1992 OSF/Motif, is a prime example.


    Styles and themes, used in a more targeted manner and with significant restraint,
    can have a role to play in modern applications. This chapter explains why and
    when you might want to use them and how to go about doing so. We''ll begin by
    drawing a parallel between Tk''s styles and themes and another realm of software
    development.


    # Understanding Styles and Themes


    If you''re familiar with web development, you know about cascading stylesheets
    (CSS). There are two ways it can be used to customize the appearance of an element
    in your HTML page. In the first way, you add a bunch of style attributes (fonts,
    colors, borders, etc.) directly to an element in your HTML code via the style
    attribute. For example:


    ```

    <label style="color:red; font-size:14pt; font-weight:bold; background-color:yellow;
    ">Meltdown imminent!</label>

    ```


    The other way to use CSS is to attach a class to each widget via the class attribute.
    The details of how elements of that class appear are provided elsewhere, often
    in a separate CSS file. You can attach the same class to many elements, and they
    will all have the same appearance. You don''t need to repeat the full details
    for every element. More importantly, you separate the logical content of your
    site (HTML) from its appearance (CSS).'
  merge: -1
  pgno: 242
- img_proc: true
  md: '```

    <label class="danger">Meltdown imminent!</label>

    ...

    <style type="text/css">

    label.danger {color:red; font-size:14pt; font-weight:bold;

    background-color:yellow; }

    </style>

    ```


    Back to Tk.


    +   - In the classic Tk widgets, all appearance customizations require specifying
    each detail on individual widgets, akin to *always* using the `style` HTML attribute.

    - In the themed Tk widgets, *all* appearance customizations are made via attaching
    a style to a widget, akin to using the `class` HTML attribute. Separately, you
    define how widgets with that style will appear, akin to writing CSS.

    - Unlike with HTML, *you can''t freely mix and match*. You can''t customize some
    themed entries or buttons with styles, and others by directly changing appearance
    options.


    > Yes, *there are a few exceptions*, like labels where you can customize the font
    and colors through both styles and configuration options.


    # Benefits


    So why use styles and themes in Tk? They take the fine-grained details of appearance
    decisions away from individual instances of widgets.

    That makes for cleaner code and less repetition. If you have 20 entry widgets
    in your application, you don''t need to repeat the same appearance details every
    time you create one (or write a wrapper function). You just assign them a style.

    Styles also put all appearance decisions in one place. And because styles for
    a button and styles for a widget can share common elements, it promotes consistency
    and improves reuse.


    > Styles also *have many benefits for widget authors*. Widgets can delegate most
    appearance decisions to styles. A widget author no longer has to hardcode logic
    to the effect of "when the state is disabled, consult the ''disabledforeground''
    configuration option and use that for the foreground color." Not only did that
    make coding widgets longer (and more repetitive), but it also restricted'
  merge: -1
