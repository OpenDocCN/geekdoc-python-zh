    \nPlacing a themed frame inside a window.\n\nOn macOS, where this problem is most\
    \ prominent, you can also set the window's background color (via its `background`\
    \ configuration option) to the predefined color `systemWindowHeaderBackground`.\n\
    \n### Creating the Entry Widget\n\nThe first widget we'll create is the entry\
    \ where we can input the number of feet that we want to convert.\n\n```python\n\
