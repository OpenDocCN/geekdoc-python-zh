  md: 'how a widget could be changed based on its state. If the widget author hadn''t
    coded in logic to change the font when the state changed, you as an application
    developer using the widget were out of luck.


    Using styles, widget authors don''t need to provide code for every possible appearance
    option. That not only simplifies the widget but paradoxically ensures that a wider
