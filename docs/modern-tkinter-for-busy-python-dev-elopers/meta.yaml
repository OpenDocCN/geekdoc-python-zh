    # Iconifying and Withdrawing


    On most systems, you can temporarily remove the window from the screen by iconifying
    it. In Tk, whether or not a window is iconified is referred to as the window''s
    `state`. The possible states for a window include `normal` and `iconic` (for an
    iconified window), and several others: `withdrawn`, `icon` or `zoomed`.

    You can query or set the current window state directly. There are also methods
    `iconify`, `deiconify`, and `withdraw`, which are shortcuts for setting the `iconic`,
    `normal`, and `withdrawn` states, respectively.


    ```

    thestate = window.state()

    window.state(''normal'')

    window.iconify()

    window.deiconify()

    window.withdraw()

    ```'
