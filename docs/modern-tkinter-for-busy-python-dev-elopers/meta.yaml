  md: "# Handling the Preferences Menu Item\n\nAs you've noticed, the application\
    \ menu always includes a \"Preferences...\" menu item. If your application has\
    \ a preferences dialog, this menu item should open it. If your application has\
    \ no preferences dialog, this menu item should be disabled, which it is by default.\n\
    To hook up your preferences dialog, you'll need to define a Tcl procedure named\
    \ `::tk::mac::ShowPreferences`. This will be called when the Preferences menu\
    \ item is chosen; if the procedure is not defined, the menu item will be disabled.\n\
    \n```\ndef showMyPreferencesDialog():\n    ....\n\nroot.createcommand('tk::mac::ShowPreferences',\n\
    \    showMyPreferencesDialog)\n```\n\n# Providing a Help Menu\n\nLike the application\
    \ menu, any help menu you add to your own menubar is treated specially on macOS.\
    \ As with the application menu that needed a special name (`.apple`), the help\
    \ menu must be given the name `.help`. Also, like the application menu, the help\
    \ menu should also be added *before the menubar is attached to the window*.\n\
    The help menu will include the standard macOS search box to search help, as well\
    \ as an item named \"*yourapp* Help.\" As with the name of the application menu,\
    \ this comes from your program's executable and cannot be changed. Similar to\
    \ how preferences dialogs are handled, to respond to this help item, you need\
    \ to define a Tcl procedure named `::tk::mac::ShowHelp`. If this procedure is\
    \ not defined, it will *not* disable the menu item. Instead, it will generate\
    \ an error when the help item is chosen.\n\n> \U0001F4A1 *If you don't want to\
    \ include help, don't add a help menu to the menubar, and none will be shown.*"
  merge: -1
