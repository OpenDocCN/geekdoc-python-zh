  md: "# 8.2. Scrollbar\n\nttk.Scrollbar\nhttps://tkdocs.com/man/ttk_scrollbar\n\n\
    A **scrollbar** widget helps users see all parts of another widget, whose content\
    \ is typically much larger than what can be shown in the available screen space.\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_116_0.png)\n\nScrollbars are created\
    \ using the `ttk.Scrollbar` class:\n\n```\ns = ttk.Scrollbar( parent, orient=VERTICAL,\n\
    \    command=listbox.yview)\nlistbox.configure(yscrollcommand=s.set)\n```\n\n\
    Unlike in some user interface toolkits, Tk scrollbars are not a part of another\
    \ widget (e.g., a listbox), but are a separate widget altogether. Instead, scrollbars\
    \ communicate with the *scrolled widget* by calling methods on the scrolled widget;\
    \ as it turns out, the scrolled widget also needs to call methods on the scrollbar.\n\
    \n> If you're using a recent Linux distribution, you've probably noticed that\
    \ the scrollbars you see in many applications have changed to look more"
  merge: -1
  pgno: 116
- img_proc: true
  md: '> like what you''d see on macOS. This newer look isn''t supported on Linux
    by any of the default themes included with Tk. However, some third-party themes
    do support it.


    The `orient` configuration option determines whether the scrollbar will scroll
    the scrolled widget in the `horizontal` or `vertical` dimension. You then need
    to use the `command` configuration option to specify how to communicate with the
    scrolled widget. This is the method to call on the scrolled widget when the scrollbar
    moves.


    Every widget that can be scrolled vertically includes a method named `yview`,
    while those that can be scrolled horizontally have a method named `xview`). As
    long as this method is present, the scrollbar doesn''t need to know anything else
    about the scrolled widget. When the scrollbar is manipulated, it appends several
    parameters to the method call, indicating how it was scrolled, to what position,
    etc.


    The scrolled widget also needs to communicate back to the scrollbar, telling it
    what percentage of the entire content area is now visible. Besides the `yview`
    and/or `xview` methods, every scrollable widget also has a `yscrollcommand` and/or
    `xscrollcommand` configuration option. This is used to specify a method call,
    which must be the scrollbar''s `set` method. Again, additional parameters will
    be automatically tacked onto the method call.


    > 💡 If, for some reason, you want to move the scrollbar to a particular position
    from within your program, you can call the `set first last` method yourself. Pass
    it two floating-point values (between 0 and 1) indicating the start and end percentage
    of the content area that is visible.


    # **Example**


    Listboxes are one of several types of widgets that are scrollable. Here, we''ll
    build a very simple user interface, consisting of a vertically scrollable listbox
    that takes up the entire window, with just a status line at the bottom.'
