    # 7.6. Additional Grid Features


    If you look at the [reference documentation](https://tkdocs.com/man/grid) for
    `grid`, you''ll see many other things you can do with grid. Here are a few of
    the more useful ones.


    https://tkdocs.com/man/grid


    # Querying and Changing Grid Options


    Like widgets themselves, it''s easy to introspect the various grid options or
    change them. Setting options when you first grid the widget is certainly convenient,
    but you can change them anytime you''d like.


    The `slaves` method will tell you all the widgets that have been gridded inside
    a master, or optionally those within just a certain column or row. The `info`
    method will return a list of all the grid options for a widget and their values.
    Finally, the `configure` method lets you change one or more grid options on a
    widget.


    These are illustrated in this interactive session:


    ```

    >>> content.grid_slaves()

    [<tkinter.ttk.Button object .!frame.!button2>,

    <tkinter.ttk.Button object .!frame.!button>,

    <tkinter.ttk.Checkbutton object .!frame.!checkbutton3>,

    <tkinter.ttk.Checkbutton object .!frame.!checkbutton2>,

    <tkinter.ttk.Checkbutton object .!frame.!checkbutton>,

    <tkinter.ttk.Entry object .!frame.!entry>,

    <tkinter.ttk.Label object .!frame.!label>, <tkinter.ttk.Frame object .!frame.!frame>]

    >>> for w in content.grid_slaves(): print(w)

    ...

    .!frame.!button2

    .!frame.!button

    .!frame.!checkbutton3

    .!frame.!checkbutton2

    .!frame.!checkbutton

    .!frame.!entry

    .!frame.!label

    .!frame.!frame

    ```'
