  mdcn: "为了处理这种布局差异而需要额外编写的特殊处理代码，采用这种方式是合理的。\n\n布局的其他方面也得到了改进。查看原始对话框（特别是按钮与其他控件未能对齐的情况），我最初认为它是用`pack`创建的，并计划将其转换为`grid`。有趣的是，它已经在使用`grid`了。那么，为什么控件仍然不对齐，这难道不是`pack`布局的典型特征吗？\n\
    \n结果发现，这是使用许多*嵌套框架*导致的。例如，按钮被放置在自己的框架中，然后再将该框架放入窗口的其余部分。因此，单个按钮无法与用户界面其余部分的控件对齐。\n\
    \n在使用`pack`时需要嵌套框架，但通常使用`grid`时，最好避免嵌套框架，除非在特殊情况下。这允许你使用户界面的不同部分对齐（代价是需要处理大量的colspan/rowspan调整）。\n\
    \n更彻底的重组可能会移除嵌套框架，但特别是在调整按钮时，这个相对简单的布局只需稍作调整就能正常工作。\n\n> \U0001F4A1 *你会注意到许多较旧的Tkinter用户界面存在内容延伸到窗口边缘的问题，这通常看起来不太合适。我已经养成了在每个顶级窗口内直接放置一个`ttk.Frame`并添加一些额外内边距的习惯，然后将用户界面的其余部分放在其中。*\n\
    \n与偏好设置一样，查找对话框最初也是模态的，这意味着在编辑文件之前必须先关闭它们，不过至少它们在重新打开时会记住之前的设置。这些最终被改为了常规的非模态窗口。\n\
    \n## 关于对话框\n\n说到模态对话框，“关于”框最初也是模态的。不仅如此，获取更多信息（例如IDLE的README文件）还会启动*另一个*模态对话框，需要关闭它才能返回第一个模态对话框，而第一个又需要……等等。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_290_0.png)\n\n![](img/e444c319ec16222f00278651bee8c21d_290_1.png)\n\
    \nIDLE的双重模态“关于”对话框（macOS）。\n\n使对话框变为非模态是首要任务。其次，使用渐进式披露技术消除了嵌套对话框。启动时对话框相当简洁，但包含一个“更多...”“链接”。点击后，它会扩展窗口以显示其中一个文档文件，并提供切换到其他文件的选项。\n\
    \n“更多...”“链接”实际上扮演了按钮的角色，但利用了每个人对网络浏览器的熟悉度，提供了一种视觉上更简单的替代方案。就实现而言，我们使用了一个（经典的、非主题的）标签控件，将其设置为蓝色，并为其附加了鼠标点击绑定。\n\
    \n> \U0001F4A1 为了帮助传达链接是可点击的，你可以做的一件事是在鼠标悬停时更改光标（通过许多控件上都有的“cursor”选项）。在macOS上，选择平台特定的“pointinghand”光标，在Windows和Linux上选择“hand2”光标，该光标在这些平台上实际上会被映射为更合适的样式。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_292_0.png)\n\n![](img/e444c319ec16222f00278651bee8c21d_292_1.png)\n\
    \n修订后的“关于”对话框（macOS）。\n\n## 在线帮助\n\nIDLE还有一个（不用说，是模态的）帮助对话框，显示有关使用程序的信息。它显示一个纯文本帮助文件，看起来类似于上面的“关于\
    \ - 自述文件”窗口。\n\n与此同时，像Python的其他部分一样，也有[参考文档](https://docs.python.org/3/)，它是用“restructured\
    \ text”创建的，然后可以使用名为[Sphinx](https://www.sphinx-doc.org/)的工具格式化为HTML、文本等。\n\nIDLE帮助对话框中的文档基于一个单独但类似的纯文本文件。保持两者同步是一个问题。它们是分开的，因为Sphinx的纯文本渲染效果并不好，而且HTML渲染中所有额外的导航等对于在线帮助来说并不需要，然后还有打开网络浏览器等麻烦；参见[bugs.python.org/issue16893](https://bugs.python.org/issue16893)。\n\
    \nTk的文本控件足够智能，可以处理IDLE文档中使用的基本格式，而Python在其标准库中包含一个HTML解析器。将两者结合，使得显示简化版本的HTML参考文档变得容易。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_293_0.png)\n\n使用文本控件的在线帮助（macOS）。\n\
    \n> 很容易在这里走得太远。早在20世纪90年代中期，一个微小的[Tcl HTML解析器](https://www.tcl.tk/software/tclhtml/)催生了一系列“文本控件中的网络浏览器”冒险，首先在Tcl中，然后在其他语言中，例如Python的Grail。试图跟上大型开发团队在真实网络浏览器中投入的所有功能是徒劳的。然而，对于非常有限和受约束的HTML子集（如在线帮助中可能出现的），这完全是一种合理的方法。\n\
    \n## 查询对话框\n\n仍然围绕模态对话框的主题，IDLE使用了“simpledialog”包，该包作为Tkinter的一部分分发，用于通过模态对话框向用户请求某些小信息。一个例子是“转到行...”命令。下面显示了该命令，以及输入无效内容时显示的警报示例。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_294_0.png)\n\n对话框上的警报并不像我们之前看到的对话框上的对话框模式那么糟糕。但这些对话框当然可以进行外观更新，并进行一些其他调整。例如，虽然它们正确地将按回车键或退出键解释为等同于按确定或取消，但它们没有允许macOS的替代约定（数字键盘上的回车键和Command-句点）；参见[bugs.python.org/issue24812](https://bugs.python.org/issue24812)。还有一些其他自定义功能会很好，例如更改确定按钮的名称，但simpledialog不支持。\n\
    \n关于错误处理，在某些情况下处理得更糟。例如，有一个命令可以打开一个包含Python标准库模块源代码的编辑器窗口。看看如果你输入错误会发生什么。\n\n\
    ![](img/e444c319ec16222f00278651bee8c21d_295_0.png)\n\n带有错误的打开模块对话框（macOS）。\n\n\
    因为对话框不知道模块名称是否正确，所以验证是在对话框关闭后才进行的。因此，错误警报被附加到另一个窗口。要重试，你必须关闭那个窗口，使用菜单重新打开对话框，然后从头开始重试。\n\
    \n代码中有几个地方确实需要在对话框中进行更多验证。因为“simpledialog”代码是Tkinter的一部分，并且不容易以所需的方式扩展，开发人员不得不诉诸于“通过文本编辑器继承”（即复制整个simpledialog代码并修改副本）。两次，分别进行。\n\
    \n既然外观无论如何都需要更新，我们概括了处理方式，完全忽略了Tkinter的simpledialog模块中的内容。相反，创建了一个单一的通用替代品，可以在整个IDLE中使用（并且仍然导致更少的代码）。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_295_1.png)\n\n新的查询对话框（macOS）。\n\n除了更新的控件和对齐方式，请注意无效输入的错误消息现在显示在对话框本身中（这种技术在Web应用程序中经常看到），而不是单独的警报。对于macOS，我们还确保为数字键盘回车键和Command-句点添加了按键绑定，并通过这个小技巧确保窗口看起来像模态对话框应有的样子：\n\
    \n```\nself.tk.call('::tk::unsupported::MacWindowStyle', 'style',\nself._w,\n\
    'moveableModal', '')\n```\n\n关于验证，查询对话框的结构是接受一个验证回调，然后可以处理任意标准。例如，这是人们输入新主题名称时使用的验证代码。它确保符合某些语法要求，并且尚未被使用。\n\
    \n```\ndef newtheme(self):\n    def validate_theme(s):\n        if not s:\n  \
    \          raise ValueError('Cannot be blank')\n        if len(s) > 30:\n    \
    \        raise ValueError('Cannot be longer than 30 characters')\n        if s\
    \ in self.all_theme_names():\n            raise ValueError('Name already used')\n\
    \    new_theme = querydialog.askstring(parent=self, prompt='...',\n        title='Create\
    \ New Theme',\n        validatecmd=validate_theme)\n    if new_theme is not None:\n\
    \        ...\n```\n\n一个通用的“整数”验证回调，带有可选的最小值和最大值，作为查询对话框模块的一部分添加，用于像“转到行...”这样的对话框。\n\
    \n## 对话框位置\n\n几个对话框，包括警报、文件保存等，出现在屏幕中央，而不是靠近它们所属的窗口。"
