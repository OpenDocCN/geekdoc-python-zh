    About the Author


    # 1. Introduction


    This book will help you quickly get up to speed and build mainstream desktop graphical
    user interfaces with Python 3 and Tkinter. As you may know, Tkinter is the Python
    interface to a GUI library called Tk. It was initially developed for the Tcl language
    but widely adopted by other dynamic languages, including Ruby, Perl, and of course,
    Python.


    This book will teach you what you need to know about Tkinter and Tk and, in particular,
    Tk 8.5 and 8.6. Tk 8.5 was a milestone release. It marked a significant departure
    from older versions of Tk that most people know and love recognize.


    The downside is that unless you know one or two crucial things, it''s actually
    *not* that significant a release. In fact, it will seem like nothing changed at
    all. Due to backward compatibility, unless existing programs make a few simple
    changes, they won''t look any different. (Imagine if you just moved into a rustic
    and quirky historical home. You''d want someone to point out where they''ve hidden
    the light switches and power outlets, wouldn''t you?)


    If you''re new to Tk or creating a new program, this book will ensure you get
    started the right way. If you''ve used Tk before, it will help you bring your
    knowledge right up to date. And if you''re updating code that may have been written
    years ago, you''ll see step-by-step how to bring it into the modern age. It''s
    a cliche, but I can''t believe how much I''ve learned in writing this book, and
    I''ve been using Tk for over twenty-five years.


    The general state of Tk documentation (outside the Tcl-oriented reference documentation,
    which is excellent) is unfortunately not at a high point these days. This is particularly
    true for developers using Tk from languages other than Tcl, and developers working
    on multiple platforms. So this book will, as much as possible, target developers
    on the three main platforms (Windows, macOS, and Linux).


    It''s also not a reference guide. It''s not going to cover everything, just the
    essentials you need in 95% of applications. The rest you can find in reference
    documentation.


    # 1.1. Who This Book Is For


    This book is designed for developers building tools and applications in Tk. It''s
    also concerned with fairly mainstream graphical user interfaces, with buttons,
    lists, checkboxes, rich text editing, 2D graphics, etc. So if you''re either looking
    to hack on Tk''s internal C code or build the next great 3D immersive game interface,
    this is probably not the material for you.


    This book also doesn''t teach you Python, so you should have a basic grasp on
    that already. This book uses Python 3 exclusively and does not cover using Tkinter
    in Python 2. Similarly, you should have a basic familiarity with desktop applications
    in general. While you don''t have to be a user interface designer, some appreciation
    of GUI design is always helpful.


    # 1.2. Why Tkinter?


    If you''re new to building desktop graphical user interfaces in Python, why might
    you use Tkinter? After all, there are many options, including PyQt, PySide, WxPython,
    PySimpleGUI, and Kivy. Each has various pluses and minuses.


    There are several reasons people chose Tkinter. It''s Python''s default GUI toolkit,
    the only one included in its standard library. It''s cross-platform so that the
    same code can run across Windows, macOS, or Linux systems. Perhaps most importantly,
    it''s easy to learn and work with. It keeps boilerplate and overhead to a minimum.
    It''s Pythonic; it just feels right. Unlike many options which are front ends
    to C++ libraries, Tkinter is built on a user interface tool designed for dynamic
    languages.


    Many large commercial applications these days are web-based. In fact, web (and
    mobile) development sucked most of the life out of desktop user interface toolkits,
    which is why so many mature tools are still widely used today. Writing desktop
    applications still makes sense in many situations, whether open source projects,
    personal or company-internal tools, or putting together a quick front end for
    a specific project. These are situations where Tkinter excels.


    # 1.3. Modern Best Practices


    This book is all about building modern user interfaces using the current tools
    Tk has to offer. It''s all about the best practices you need to know to do this.


    For most tools, you wouldn''t think you''d have to say something like that. But
    for Tk, that''s not the case. Tk has had a very long evolution, and any evolution
    tends to leave you with a bit of cruft. Couple that with how much graphical user
    interface platforms and standards have evolved in that time. You can see where
    keeping something as large and complex as a GUI library up to date (and backward
    compatible) may be challenging.


    Tk has, for most of its lifetime, gotten a bad rap, to put it mildly. Some of
    this has been well deserved, most of it not so much. Like any GUI tool, it can
    be used to create absolutely terrible looking and outdated user interfaces. Still,
    with the proper care and attention, it can also be used to develop spectacularly
    good ones. Most people know about the crappy ones; most of the good ones people
    don''t even know are done in Tk. In this book, we''re going to focus on what you
    need to build good user interfaces. Thankfully, this isn''t nearly as hard as
    it used to be before Tk 8.5.


    So to sum up: modern desktop graphical user interfaces, using modern conventions
    and design sense, using the modern tools provided by Tk 8.5 and 8.6.


    ## Tk Extensions


    When it comes to modern best practices, Tk extensions deserve a special word of
    note. Over the years, developers have created all kinds of add-ons to Tk, for
    example, adding new widgets not available in the core (or at least not at the
    time). Some well-known and quite popular Tk extensions include BLT, Tix, iWidgets,
    BWidgets; there are many, many others.


    Many of these extensions were created decades ago. Because core Tk has always
    been highly backward compatible, these'
