    # 17.2. Using Styles


    We''ll now tackle the more difficult issue of how to take full advantage of styles
    and themes within your application, not just reskinning it with an existing theme.


    # Definitions


    We first need to introduce a few essential concepts.


    # Widget Class


    A *widget class* identifies the type of a particular widget, whether it is a button,
    a label, a canvas, etc. All themed widgets have a default class. Buttons have
    the class `TButton`, labels `TLabel`, etc.


    # Widget State


    A *widget state* allows a single widget to have more than one appearance or behavior,
    depending on things like mouse position, different state options set by the application,
    and so on.


    As you''ll recall, all themed widgets maintain a set of binary state flags, accessed
    by the `state` and `instate` methods. The flags are: `active`, `disabled`, `focus`,
    `pressed`, `selected`, `background`, `readonly`, `alternate`, and `invalid`. All
    widgets have the same set of state flags, though they may ignore some of them
    (e.g., a label widget would likely ignore an `invalid` state flag). See the [themed
    widget](https://tkdocs.com/man/ttk_widget) page in the reference manual for the
    exact meaning of each state flag.


    # Style


    A *style* describes the appearance (or appearances) of a widget class. All themed
    widgets having the same widget class will have the same appearance(s).'
  - '[PAGE 249]


    Styles are referred to by the name of the widget class they describe. For example,
    the style `TButton` defines the appearance of all widgets with the class `TButton`.

    Styles know about different states, and one style can define different appearances
    based on a widget''s state. For example, a style can specify how a widget''s appearance
    should change if the `pressed` state flag is set.


    # Theme


    A *theme* is a collection of styles. While each style is widget-specific (one
    for buttons, one for entries, etc.), a theme collects many styles together. All
    styles in the same theme will be designed to visually "fit" together with each
    other. (Tk doesn''t technically restrict bad design or judgment, unfortunately!)

    Using a particular theme in an application really means that, by default, the
    appearance of each widget will be controlled by the style within that theme responsible
    for that widget class.


    # Style Names


    Every style has a name. If you''re going to modify a style, create a new one,
    or use a style for a widget, you need to know its name.

    How do you know what the names of the styles are? If you have a particular widget,
    and you want to know what style it is currently using, you can first check the
    value of its `style` configuration option. If that is empty, it means the widget
    is using the *default* style for the widget. You can retrieve that via the widget''s
    class. For example:


    ```

    >>> b = ttk.Button()

    >>> b[''style'']

    ''''

    >>> b.winfo_class()

    ''TButton''

    ```


    In this case, the style that is being used is `TButton`. The default styles for
    other themed widgets are named similarly, e.g., `TEntry`, `TLabel`, etc.


    > It''s always wise to check the specifics. For example, the treeview widget''s
    class is `Treeview`, **not** `TTreeview`.'
  - '[PAGE 250]


    Beyond the default styles, though, styles can be named pretty much anything. You
    might create your own style (or use a theme that has a style) named `FunButton`,
    `NuclearReactorButton`, or even `GuessWhatIAm` (not a smart choice).

    More often, you''ll find names like `Fun.TButton` or `NuclearReactor.TButton`,
    which suggest variations of a base style; as you''ll see, this is something Tk
    supports for creating and modifying styles.


    > The ability to retrieve a list of all currently available styles is currently
    not supported. This will likely appear in Tk 8.7 in the form of a new command,
    `ttk::style theme styles` to return the list of styles implemented by a theme.
    It also proposes adding a `style` method for all widgets, so you don''t have to
    examine both the widget''s `style` configuration option and its class. See [TIP
    #584](https://tip.tcl.tk/584).


    # Applying a Style


    To use a style means to apply that style to an individual widget. If you know
    the name of the style you want to use, and which widget to apply it to, it''s
    easy. Setting the style can be done at creation time:


    ```

    b = ttk.Button(parent, text=''Hello'', style=''Fun.TButton'')

    ```


    As well, a widget''s style can be changed at any time with the `style` configuration
    option:


    ```

    b[''style''] = ''Emergency.TButton''

    ```


    # Creating a Simple Style


    So how do we create a new style like `Emergency.TButton`?

    In situations like this, you''re creating a new style similar to an existing one
    but varies in a certain aspect. This is the most common reason for creating new
    styles.

    For example, you want most of the buttons in your application to keep their normal
    appearance, but have certain "emergency" buttons highlighted differently. Creating
    a new style (e.g., `Emergency.TButton`), derived from the base style (`TButton`),
    is the appropriate thing to do.'
  - "[PAGE 251]\n\nPrepending another name (`Emergency`) followed by a dot onto an\
    \ existing style creates a new style derived from the existing one. The new style\
    \ will have exactly the same options as the existing one except for the indicated\
    \ differences:\n\n```\ns.configure('Emergency.TButton', font='helvetica 24',\n\
    \            foreground='red', padding=10)\n```\n\nYou could then apply that style\
    \ to an individual button widget using its `style` configuration option, as shown\
    \ earlier. Every other button widget would retain its normal appearance.\n\nHow\
    \ do you know what options are available to change for a given style? That requires\
    \ diving a little deeper inside styles.\n\n> ![UPGRADE](image_placeholder)\n\n\
    You may have existing code using the classic widgets that you'd like to move to\
    \ the themed widgets. Most appearance changes made to classic widgets through\
    \ configuration options can probably be dropped. For those that can't, you may\
    \ need to create a new style, as shown above.\n\nState-specific appearance changes\
    \ can be treated similarly. In classic Tk, several widgets supported a few state\
    \ changes via configuration options. For example, setting a button's `state` option\
    \ to `disabled` would draw it with a greyed-out label. Some allowed an additional\
    \ state, `active`, which represented a different appearance. You could control\
    \ the appearance of the widget in different states via additional configuration\
    \ options, e.g., `foreground`, `disabledforeground`, and `activeforeground`.\n\
    \nState changes via configuration options should be changed to use the `state`\
    \ method on themed widgets. Configuration options to modify the appearance of\
    \ a widget when in a particular state should be dealt with in the style.\n\nClassic\
    \ Tk widgets also supported a very primitive form of styles that you may encounter.\
    \ This used the **option database**, a now-obscure front end to X11-style configuration\
    \ files.\n\nIn classic Tk, all buttons had the same class (`Button`), all labels\
    \ had the same class (`Label`), etc. You could use this widget class both for\
    \ introspection and for changing options globally through the option database.\
    \ It let you say, for example, that all buttons should have a red background.\n\
    \nA **few** classic Tk widgets, including frame and toplevel widgets, let you\
    \ **change** the widget class of a particular widget when it was first created\
    \ by providing a `class` configuration option. For example, you could specify\
    \ that one particular frame widget had a class of `SpecialFrame`, while others\
    \ would have the default class"
  - '[PAGE 252]


    Frame. You could use the option database to change the appearance of just the
    SpecialFrame **frames**.


    Styles and themes take that simple idea and give it rocket boosters.'
- md: "## 17.3. What's Inside a Style?\n\nIf all you want to do is *use* a style or\
    \ create a new one with a few tweaks, you now know everything you need. If, however,\
    \ you want to make more substantial changes, things start to get \"interesting.\"\
    \n\n## Elements\n\nWhile each style controls a single type of widget, each widget\
    \ is usually composed of smaller pieces, called *elements*. It's the job of the\
    \ style author to construct the entire widget out of these smaller elements. What\
    \ these elements are depends on the widget.\n\nHere's an example of a button.\
    \ It might have a border on the very outside. That's one element. Just inside\
    \ that, there may be a focus ring. Normally, it's just the background color, but\
    \ could be highlighted when a user tabs into the button. So that's a second element.\
    \ Then there might be some spacing between that focus ring and the button's label.\
    \ That spacing is a third element. Finally, the text label of the button itself\
    \ is a fourth element.\n\n![](img/e444c319ec16222f00278651bee8c21d_253_0.png)\n\
    \nWhy might the style author have divided it up that way? If you have one part\
    \ of the widget that may be in a different location from another or might be a\
    \ different color than another, it may be a good candidate for an element. Note\
    \ that this is just one example of how a button could be constructed from elements.\
    \ Different styles and themes could (and do) accomplish this in different ways.\n\
    \nHere is a second example, for a vertical scrollbar. It consists of a \"trough\"\
    \ element, which contains other elements. These include the up and down arrow\
    \ elements at either end and a \"thumb\" element in the middle (it might have\
    \ other elements too, like borders).\n\n![](img/e444c319ec16222f00278651bee8c21d_254_0.png)\n\
    \n## Layout\n\nBesides specifying which elements make up a widget, a style also\
    \ defines how those elements are arranged within the widget. This is called their\
    \ *layout*. In the button example, we had a label element inside a spacing element,\
    \ inside a focus ring element, inside a border element. Its logical layout is\
    \ this:\n\n```\nborder {\n    focus {\n        spacing {\n            label\n\
    \        }\n    }\n}\n```\n\nWe can ask Tk for the layout of the `TButton` style:\n\
    \n```\n>>> s.layout('TButton')\n[(\"Button.border\", {\"children\": [(\"Button.focus\"\
    , {\"children\":\n[(\"Button.spacing\",\n{\"children\": [(\"Button.label\", {\"\
    sticky\": \"nswe\"})], \"sticky\":\n\"nswe\"})], \"sticky\": \"nswe\"})], \"sticky\"\
    : \"nswe\", \"border\": \"1\"})]\n```\n\nIf we clean this up and format it a bit,\
    \ we get something with this structure:\n\n```\nButton.border -sticky nswe -border\
    \ 1 -children {\n    Button.focus -sticky nswe -children {\n        Button.spacing\
    \ -sticky nswe -children {\n            Button.label -sticky nswe\n        }\n\
    \    }\n}\n```\n\nThis starts to make sense; we have four elements, named `Button.border`,\
    \ `Button.focus`, `Button.spacing`, and `Button.label`. Each of these has different\
    \ element options, such as `children`, `sticky`, and `border` that specify layout\
    \ or sizes. Without getting into too much detail at this point, we can clearly\
    \ see the nested layout, based on the `children` and `sticky` attributes.\n\n\
    > Styles uses a simplified version of Tk's `pack` geometry manager to specify\
    \ element layout. This is detailed in the `style` reference manual page. [https://tkdocs.com/man/ttk_style](https://tkdocs.com/man/ttk_style)\n\
    \n## Element Options\n\nEach of these elements has a number of different options.\
    \ For example, a label element has a font and a foreground color. An element representing\
    \ the thumb of a scrollbar may have an option to set its background color or another\
    \ to provide the width of a border. These can be customized to adjust how the\
    \ elements within the overall widget look.\n\nYou can determine what options are\
    \ available for each element? Here's an example of checking what options are available\
    \ for the label inside the button (which we know from the `layout` method is identified\
    \ as `Button.label`):\n\n```\n>>> s.element_options('Button.label')\n('compound',\
    \ 'space', 'text', 'font', 'foreground', 'underline',\n'width', 'anchor', 'justify',\n\
    'wraplength', 'embossed', 'image', 'stipple', 'background')\n```\n\nIn the next\
    \ sections, we'll look at the not-entirely-straightforward way to work with element\
    \ options.\n\n## 17.4. Manipulating Styles\n\nIn this section, we'll see how to\
    \ change the style's appearance by modifying style options. You can do this either\
    \ by modifying an existing style, or more typically, by creating a new style.\
    \ We saw how to create a simple style that was derived from another one earlier:\n\
    \n```\ns.configure('Emergency.TButton', font='helvetica 24',\nforeground='red',\
    \ padding=10)\n```\n\n### Modifying a Style Option\n\nModifying an option for\
    \ an existing style is done in a similar fashion as modifying any other configuration\
    \ option, by specifying the style, name of the option, and new value:\n\n```\n\
    s.configure('TButton', font='helvetica 24')\n```\n\nYou'll learn more about what\
    \ the valid options are shortly.\n\n> If you modify an existing style, like we've\
    \ done here with `TButton`, that modification will apply to all widgets using\
    \ that style (so by default, all buttons). That may well be what you want to do.\n\
    \nTo retrieve the current value of an option, use the `lookup` method:\n\n```\n\
    >>> s.lookup('TButton', 'font')\n'helvetica 24'\n```\n\n### State Specific Style\
    \ Options\n\nBesides the normal configuration options for the style, the widget\
    \ author may have specified different options to use when the widget is in a particular\
    \ widget state. For example, when a button is disabled, it may change the button's\
    \ label to grey.\n\n> Remember that the state is composed of one or more state\
    \ flags (or their negation), as set by the widget's `state` method, or queried\
    \ via the `instate` method.\n\nYou can specify state-specific variations for one\
    \ or more of a style's configuration options with a *map*. For each configuration\
    \ option, you can specify a list of widget states, along with the value that option\
    \ should be assigned when the widget is in that state.\n\nThe following example\
    \ provides for the following variations from a button's normal appearance:\n\n\
    - when the widget is in the disabled state, the background color should be set\
    \ to `#d9d9d9`\n- when the widget is in the active state (mouse over it), the\
    \ background color should be set to `#ececec`\n- when the widget is in the disabled\
    \ state, the foreground color should be set to `#a3a3a3` (this is in addition\
    \ to the background color change we already noted)\n- when the widget is in the\
    \ state where the button is pressed, and the widget is not disabled, the relief\
    \ should be set to `sunken`\n\n```\ns.map('TButton',\n    background=[('disabled','#d9d9d9'),\
    \ ('active','#ececec')],\n    foreground=[('disabled','#a3a3a3')],\n    relief=[('pressed',\
    \ '!disabled', 'sunken')])\n```\n\n> Because widget states can contain multiple\
    \ flags, more than one state may match an option (e.g., `pressed` and `pressed\
    \ !disabled` will both match if the widget's `pressed` state flag is set). The\
    \ list of states is evaluated in the order you provide in the map command. The\
    \ first state in the list that matches is used.\n\n## 17.5. Sound Difficult to\
    \ you?\n\nSo you now know that styles are made up of elements, which have a variety\
    \ of options, and are composed together in a particular layout. You can change\
    \ various options on styles to make all widgets using the style appear differently.\
    \ Any widgets using that style take on the appearance that the style defines.\
    \ Themes collect an entire set of related styles, making it easy to change the\
    \ appearance of your entire user interface.\n\nSo what makes styles and themes\
    \ so difficult in practice? Three things. First:\n\n> You can only modify options\
    \ for a style, not element options (except sometimes).\n\nWe talked earlier about\
    \ how to discover what elements were used in the style by examining the style's\
    \ layout, and also how to discover what options were available for each element.\
    \ But when we went to make changes to a style, we seemed to be configuring an\
    \ option for the *style*, without specifying an individual element. What's going\
    \ on?\n\nAgain, using our button example, we had an element `Button.label`, which,\
    \ among other things, had a `font` configuration option. What happens is that\
    \ when that `Button.label` element is drawn, it looks at the `font` configuration\
    \ option set on the *style* to determine what font to draw itself in.\n\n> To\
    \ understand why, you need to know that when a style includes an element as a\
    \ piece of it, that element does not maintain any (element-specific) storage.\
    \ In particular, it does not store any configuration options itself. When it needs\
    \ to retrieve options, it does so via the containing style, which is passed to\
    \ the element. Individual elements, therefore, are \"flyweight\" objects in GoF\
    \ pattern parlance.\n\nSimilarly, any other elements will lookup their configuration\
    \ options from options set on the style. What if two elements use the same configuration\
    \ option (like a background color)? Because there is only one background configuration\
    \ option, stored in the style, both elements will use the same background color.\
    \ You can't have one element use one background color, and the other use a different\
    \ background color."
  mdcn: "## 17.3. 样式内部是什么？\n\n如果你只想*使用*一个样式，或者通过少量调整创建一个新样式，那么你现在需要知道的都已经掌握了。然而，如果你想进行更实质性的修改，事情就会开始变得“有趣”起来。\n\
    \n## 元素\n\n虽然每个样式控制着一种类型的控件，但每个控件通常由更小的部分组成，这些部分被称为*元素*。样式作者的工作就是用这些更小的元素来构建整个控件。这些元素是什么，取决于具体的控件。\n\
    \n这是一个按钮的示例。它最外面可能有一个边框。这是一个元素。紧挨着边框内部，可能有一个焦点环。通常，它只是背景色，但当用户通过 Tab 键切换到按钮时，它可能会高亮显示。所以这是第二个元素。然后，在焦点环和按钮标签之间可能有一些间距。这个间距是第三个元素。最后，按钮本身的文本标签是第四个元素。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_253_0.png)\n\n为什么样式作者要这样划分呢？如果你的控件中有一部分可能位于另一部分的不同位置，或者可能与另一部分颜色不同，那么它可能就是一个很好的元素候选。请注意，这只是按钮如何由元素构成的一个例子。不同的样式和主题可以（并且确实）以不同的方式来实现这一点。\n\
    \n这是第二个例子，一个垂直滚动条。它由一个“槽”元素组成，该元素包含其他元素。这些元素包括两端的向上和向下箭头元素，以及中间的“滑块”元素（它可能还有其他元素，比如边框）。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_254_0.png)\n\n## 布局\n\n除了指定哪些元素构成一个控件外，样式还定义了这些元素在控件内的排列方式。这被称为它们的*布局*。在按钮示例中，我们有一个标签元素位于间距元素内，间距元素位于焦点环元素内，焦点环元素位于边框元素内。其逻辑布局如下：\n\
    \n```\nborder {\n    focus {\n        spacing {\n            label\n        }\n\
    \    }\n}\n```\n\n我们可以向 Tk 查询 `TButton` 样式的布局：\n\n```\n>>> s.layout('TButton')\n\
    [(\"Button.border\", {\"children\": [(\"Button.focus\", {\"children\":\n[(\"Button.spacing\"\
    ,\n{\"children\": [(\"Button.label\", {\"sticky\": \"nswe\"})], \"sticky\":\n\"\
    nswe\"})], \"sticky\": \"nswe\"})], \"sticky\": \"nswe\", \"border\": \"1\"})]\n\
    ```\n\n如果我们将其整理并格式化一下，会得到如下结构：\n\n```\nButton.border -sticky nswe -border 1 -children\
    \ {\n    Button.focus -sticky nswe -children {\n        Button.spacing -sticky\
    \ nswe -children {\n            Button.label -sticky nswe\n        }\n    }\n\
    }\n```\n\n这开始变得清晰了；我们有四个元素，分别命名为 `Button.border`、`Button.focus`、`Button.spacing`\
    \ 和 `Button.label`。每个元素都有不同的元素选项，例如 `children`、`sticky` 和 `border`，用于指定布局或尺寸。目前无需深入细节，我们可以清楚地看到基于\
    \ `children` 和 `sticky` 属性的嵌套布局。\n\n> 样式使用 Tk 的 `pack` 几何管理器的简化版本来指定元素布局。这在 `style`\
    \ 参考手册页面中有详细说明。[https://tkdocs.com/man/ttk_style](https://tkdocs.com/man/ttk_style)\n\
    \n## 元素选项\n\n这些元素中的每一个都有许多不同的选项。例如，一个标签元素有字体和前景色。一个表示滚动条滑块的元素可能有一个设置其背景色的选项，或者另一个提供边框宽度的选项。这些都可以被自定义，以调整整个控件内元素的外观。\n\
    \n你可以确定每个元素有哪些可用选项吗？这是一个检查按钮内标签选项的例子（我们从 `layout` 方法知道它被标识为 `Button.label`）：\n\
    \n```\n>>> s.element_options('Button.label')\n('compound', 'space', 'text', 'font',\
    \ 'foreground', 'underline',\n'width', 'anchor', 'justify',\n'wraplength', 'embossed',\
    \ 'image', 'stipple', 'background')\n```\n\n在接下来的章节中，我们将探讨处理元素选项的并非完全直接的方法。\n\n\
    ## 17.4. 操作样式\n\n在本节中，我们将了解如何通过修改样式选项来改变样式的外观。你可以通过修改现有样式来实现，或者更典型地，通过创建一个新样式来实现。我们之前已经看到了如何创建一个从另一个样式派生的简单样式：\n\
    \n```\ns.configure('Emergency.TButton', font='helvetica 24',\nforeground='red',\
    \ padding=10)\n```\n\n### 修改样式选项\n\n修改现有样式的选项与修改任何其他配置选项的方式类似，通过指定样式、选项名称和新值：\n\
    \n```\ns.configure('TButton', font='helvetica 24')\n```\n\n你很快就会了解到哪些是有效的选项。\n\
    \n> 如果你修改一个现有样式，就像我们这里对 `TButton` 所做的那样，该修改将应用于所有使用该样式的控件（因此默认情况下，所有按钮）。这很可能就是你想要做的。\n\
    \n要检索选项的当前值，请使用 `lookup` 方法：\n\n```\n>>> s.lookup('TButton', 'font')\n'helvetica\
    \ 24'\n```\n\n### 特定状态的样式选项\n\n除了样式的正常配置选项外，控件作者可能还指定了当控件处于特定控件状态时要使用的不同选项。例如，当按钮被禁用时，它可能会将按钮的标签变为灰色。\n\
    \n> 请记住，状态由一个或多个状态标志（或其否定）组成，这些标志由控件的 `state` 方法设置，或通过 `instate` 方法查询。\n\n你可以使用\
    \ *map* 为样式的一个或多个配置选项指定特定状态的变化。对于每个配置选项，你可以指定一个控件状态列表，以及当控件处于该状态时应分配给该选项的值。\n\n\
    以下示例提供了按钮正常外观的以下变化：\n\n- 当控件处于禁用状态时，背景色应设置为 `#d9d9d9`\n- 当控件处于活动状态（鼠标悬停）时，背景色应设置为\
    \ `#ececec`\n- 当控件处于禁用状态时，前景色应设置为 `#a3a3a3`（这是在我们已经注意到的背景色变化之外的）\n- 当控件处于按钮被按下且控件未被禁用的状态时，浮雕应设置为\
    \ `sunken`\n\n```\ns.map('TButton',\n    background=[('disabled','#d9d9d9'), ('active','#ececec')],\n\
    \    foreground=[('disabled','#a3a3a3')],\n    relief=[('pressed', '!disabled',\
    \ 'sunken')])\n```\n\n> 因为控件状态可以包含多个标志，所以可能不止一个状态匹配一个选项（例如，如果控件的 `pressed` 状态标志被设置，`pressed`\
    \ 和 `pressed !disabled` 都会匹配）。状态列表按照你在 map 命令中提供的顺序进行评估。列表中第一个匹配的状态将被使用。\n\n##\
    \ 17.5. 觉得很难吗？\n\n所以你现在知道样式由元素组成，元素有各种选项，并以特定的布局组合在一起。你可以更改样式上的各种选项，使所有使用该样式的控件呈现不同的外观。任何使用该样式的控件都会呈现该样式定义的外观。主题收集了一整套相关的样式，使得轻松更改整个用户界面的外观变得容易。\n\
    \n那么，是什么让样式和主题在实践中如此困难呢？有三件事。首先：\n\n> 你只能修改样式的选项，而不是元素选项（除了有时）。\n\n我们之前讨论了如何通过检查样式的布局来发现样式中使用了哪些元素，以及如何发现每个元素有哪些可用选项。但当我们着手修改样式时，我们似乎是在配置*样式*的选项，而没有指定单个元素。这是怎么回事？\n\
    \n再次使用我们的按钮示例，我们有一个元素 `Button.label`，它除了其他功能外，还有一个 `font` 配置选项。发生的情况是，当绘制 `Button.label`\
    \ 元素时，它会查看设置在*样式*上的 `font` 配置选项，以确定使用什么字体来绘制自身。\n\n> 要理解原因，你需要知道当样式将一个元素作为其一部分包含时，该元素不维护任何（特定于元素的）存储。特别是，它本身不存储任何配置选项。当它需要检索选项时，它通过包含它的样式来完成，该样式被传递给元素。因此，单个元素是\
    \ GoF 模式术语中的“享元”对象。\n\n类似地，任何其他元素也会从设置在样式上的选项中查找其配置选项。如果两个元素使用相同的配置选项（比如背景色）怎么办？因为只有一个背景配置选项存储在样式中，所以两个元素将使用相同的背景色。你不能让一个元素使用一种背景色，而另一个使用不同的背景色。"
