    # # 11. Windows and Dialogs


    Everything we''ve done up until now has been in a single window. In this chapter,
    we''ll cover how to use multiple windows, changing various attributes of windows,
    and use some of the standard dialog boxes that are available in Tk.'
  - '[PAGE 162]


    # 11.1. Creating and Destroying Windows


    We''ve seen that all Tk programs start out with a root toplevel window, and then
    widgets are created as children of that root window. Creating new toplevel windows
    works almost exactly the same as creating new widgets.


    Toplevel windows are created using the `Toplevel` class:


    ```

    t = Toplevel(parent)

    ```


    Note: Toplevels are part of the classic Tk widgets, not the themed widgets.


    Unlike regular widgets, we don''t have to `grid` a toplevel for it to appear onscreen.
    Once we''ve created a new toplevel, we can create other widgets as children of
    that toplevel, and `grid` them inside the toplevel. The new toplevel behaves exactly
    like the automatically created root window.


    To destroy a window, use its `destroy` method:


    ```

    window.destroy()

    ```


    Note that you can use `destroy` on any widget, not just a toplevel window. When
    you destroy a window, all windows (widgets) that are children of that window are
    also destroyed. Be careful! If you destroy the root window (that all other widgets
    are descended from), that will terminate your application.


    > In a typical document-oriented application, we want to be able to close any
    windows while leaving the others open. In that case, we may want to create a new
    toplevel for every window, and not put anything directly inside the root window
    at all. While we can''t just destroy the root window, we can remove it entirely
    from the screen using its `withdraw` method, which we''ll see shortly.'
  - '[PAGE 163]


    # 11.2. Window Behavior and Styles


    There are lots of things about how windows behave and how they look that can be
    changed.


    # Window Title


    To examine or change the title of the window:


    ```

    oldtitle = window.title()

    window.title(''New title'')

    ```


    # Size and Location


    In Tk, a window''s position and size on the screen are known as its *geometry*.
    A full geometry specification looks like this: `widthxheight±x±y`.

    Width and height (usually in pixels) are pretty self-explanatory. The *x* (horizontal
    position) is specified with a leading plus or minus, so `+25` means the left edge
    of the window should be 25 pixels from the left edge of the screen, while `-50`
    means the right edge of the window should be 50 pixels from the right edge of
    the screen. Similarly, a *y* (vertical) position of `+10` means the top edge of
    the window should be ten pixels below the top of the screen, while `-100` means
    the bottom edge of the window should be 100 pixels above the bottom of the screen.


    > 💡 Geometry specifies the actual coordinates on the screen. It doesn''t make
    allowances for systems like macOS with a menubar along the top or a dock along
    the bottom. So specifying a position of `+0+0` would actually place the top part
    of the window under the system menu bar. It''s a good idea to leave a healthy
    margin (at least 30 pixels) from the screen''s edge.


    Screen positions can be different than you might expect when you have multiple
    monitors on your system. We''ll cover that shortly.'
- md: 'Here is an example of changing the size and position. It places the window
    towards the top righthand corner of the screen:


    ```

    window.geometry(''300x200-5+40'')

    ```


    You can retrieve the current geometry the same way; just don''t provide a new
    geometry value. However, if you try it immediately after changing the geometry,
    you''ll find it doesn''t match. Remember that all drawing effectively occurs in
    the background, in response to idle times via the event loop. Until that drawing
    occurs, the internal geometry of the window won''t be updated. If you do want
    to force things to update immediately, you can.


    ```

    window.update_idletasks()

    print(window.geometry())

    ```


    > 💡 We''ve seen that the window defaults to the size requested by the widgets
    that are gridded into it. If we''re creating and adding new widgets interactively
    in the interpreter, or if our program adds new widgets in response to other events,
    the window size adjusts. This behavior continues until either we explicitly provide
    the window''s geometry as above or a user resizes the window. At that point, even
    if we add more widgets, the window won''t change size. You''ll want to be sure
    you''re using all of `grid`''s features (e.g., `sticky`, `weight`) to make everything
    fit nicely.


    ## Resizing Behavior


    By default, toplevel windows, including the root window, can be resized by users.
    However, sometimes you may want to prevent users from resizing the window. You
    can do this via the `resizable` method. It''s first parameter controls whether
    users can change the width, and the second if they can change the height. So to
    disable all resizing:


    ```

    window.resizable(FALSE, FALSE)

    ```


    If a window is resizable, you can specify a minimum and/or maximum size that you''d
    like the window''s size constrained to (again, parameters are width and height):


    ```

    window.minsize(200,100)

    window.maxsize(500,500)

    ```


    You saw earlier how to obtain the current size of the window via its geometry.
    Wondering how large it would be if you didn''t specify its geometry, or a user
    didn''t resize it? You can retrieve the window''s *requested size*, i.e., how
    much space it requests from the geometry manager. Like with drawing, geometry
    calculations are only done at idle time in the event loop, so you won''t get a
    useful response until the widget has appeared onscreen.


    ```

    window.winfo_reqwidth()    # or winfo_reqheight

    ```


    > You can use the `reqwidth` and `reqheight` methods on any widget, not just toplevel
    windows. There are other `winfo` methods you can call on any widget, such as `width`
    and `height`, to get the actual (not requested) width and height. For more, see
    the `winfo` command reference.

    > https://tkdocs.com/man/winfo


    ## Intercepting the Close Button


    Most windows have a close button in their title bar. By default, Tk will destroy
    the window if users click on that button. You can, however, provide a callback
    that will be run instead. A common use is to prompt the user to save an open file
    if modifications have been made.


    ```

    window.protocol("WM_DELETE_WINDOW", callback)

    ```


    > The somewhat obscurely-named `WM_DELETE_PROTOCOL` originated with X11 window
    manager protocols.


    ## Transparency


    Windows can be made partially transparent by specifying an alpha channel, ranging
    from 0.0 (fully transparent) to 1.0 (fully opaque).


    ```

    window.attributes("-alpha", 0.5)

    ```


    > Tkinter''s wrapper to the underlying wm attributes command doesn''t do any interpretation
    of options, handle keyword arguments, etc.


    On macOS, you can additionally specify a -transparent attribute (using the same
    mechanism as with -alpha), which allows you to make the background of the window
    transparent, and remove the window''s shadow. You should also set the background
    configuration option for the window and any frames to the color systemTransparent.


    ## Full Screen


    You can make a window expand to take up the full screen:


    ```

    window.attributes("-fullscreen", 1)

    ```


    ## Other macOS-Specific Attributes


    In addition to the -transparent attribute described above, macOS windows boast
    some additional attributes.

    The (red) close widget in the title bar can indicate that the content inside the
    window has been modified (e.g., the file needs to be saved). Set the -modified
    attribute to 1 to indicate this, or 0 to remove the modified indicator.

    You can draw users'' attention to the window by bouncing its icon in the macOS
    dock. To do so, set the window''s -notify attribute.

    If a window contains the contents of a document, you can place an icon in the
    title bar specifying the file the document refers to. Users can drag this icon
    as a proxy for dragging the file in the Finder. Set the window''s -titlepath attribute
    to the full path of the file. Note that this does not change the title of the
    window (you''ll need to change that separately), but just provides the icon.

    On macOS, windows can also take a variety of appearances for different purposes,
    e.g. utility windows, modal dialogs, floating windows, and so on. There is an
    unsupported command in Tk called `MacWindowStyle` that lets you assign one of
    these appearances to a window. Unlike many options in Tk which can be changed
    at any point, these appearances must be assigned after the window is created but
    before it appears onscreen.


    ```

    t = Toplevel(root)

    t.tk.call("::tk::unsupported::MacWindowStyle", "style", t._w,

    "utility")

    ```


    Besides `utility`, other useful appearance styles include `floating`, `plain`,
    and `modal`.


    > While officially unsupported, this feature has been available for a long time
    in Tk. It''s likely in future to migrate to the `wm attributes` command. For further
    information, including more details on the different appearances and optional
    attributes, see the [MacWindowStyle wiki page](https://wiki.tcl-lang.org/page/MacWindowStyle).


    ## Iconifying and Withdrawing


    On most systems, you can temporarily remove the window from the screen by iconifying
    it. In Tk, whether or not a window is iconified is referred to as the window''s
    `state`. The possible states for a window include `normal` and `iconic` (for an
    iconified window), and several others: `withdrawn`, `icon` or `zoomed`.

    You can query or set the current window state directly. There are also methods
    `iconify`, `deiconify`, and `withdraw`, which are shortcuts for setting the `iconic`,
    `normal`, and `withdrawn` states, respectively.


    ```

    thestate = window.state()

    window.state(''normal'')

    window.iconify()

    window.deiconify()

    window.withdraw()

    ```


    > For document-centric applications, where you want to allow closing any window
    without the application exiting (as would happen if you destroy the root window),
    use `withdraw` on the root window to remove it from the screen, use new toplevel
    windows for your user interface.


    ## Stacking Order


    Stacking order refers to the order that windows are "placed" on the screen, from
    bottom to top. When the positions of two windows overlap each other, the one closer
    to the top of the stacking order will obscure or overlap the one lower in the
    stacking order.

    You can ensure that a window is always at the top of the stacking order (or at
    least above all others where this attribute isn''t set):


    ```

    window.attributes("-topmost", 1)

    ```


    You can find the current stacking order, listed from lowest to highest:


    ```

    root.tk.eval(''wm stackorder ''+str(window))

    ```


    > This method isn''t exposed cleanly in Tkinter. It returns the internal names
    of each window, not the window object.


    You can also just check if one window is above or below another:


    ```

    if (root.tk.eval(''wm stackorder ''+str(window)+'' isabove ''+str(otherwindow))==''1'')
    ...

    if (root.tk.eval(''wm stackorder ''+str(window)+'' isbelow ''+str(otherwindow))==''1'')
    ...

    ```


    You can also raise or lower windows, either to the very top (bottom) of the stacking
    order, or just above (below) a designated window:


    ```

    window.lift()

    window.lift(otherwin)

    window.lower()

    window.lower(otherwin)

    ```


    > Tkinter uses the name `lift` since `raise` is a reserved keyword in Python.


    Why do you need to pass a window to get the stacking order? Stacking order applies
    not only for toplevel windows, but for any *sibling* widgets (those with the same
    parent). If you have several widgets gridded together but overlapping, you can
    raise and lower them relative to each other:


    ```

    from tkinter import *

    from tkinter import ttk

    root = Tk()

    little = ttk.Label(root, text="Little")

    bigger = ttk.Label(root, text=''Much bigger label'')

    little.grid(column=0,row=0)

    bigger.grid(column=0,row=0)

    root.after(2000, lambda: little.lift())

    root.mainloop()

    ```


    https://tkdocs.com/code/stackorder.py


    > This uses timer events, which we covered in the event loop chapter. The `after`
    command schedules a script to run at a certain number of milliseconds in the future,
    but leaves the event loop to continue.


    ## Screen Information


    We''ve previously used the `winfo` command to find out information about specific
    widgets. It can also provide information about the entire display or *screen*.
    As usual, see the `winfo` command reference for full details.


    https://tkdocs.com/man/winfo


    For example, you can determine the screen''s color depth (how many bits per pixel)
    and color model (usually `truecolor` on modern displays), its pixel density, and
    resolution.


    ```

    print("color depth=" + str(root.winfo_screendepth())+ " (" +

    root.winfo_screenvisual() + ")")

    ```'
