- img_proc: true
  md: '# 15.2. Modifying the Text in Code


    While users can modify the text in the text widget interactively, your program
    can also make changes. Adding text is done with the `insert` method, which we
    used above to provide an initial value for the text widget.


    # Text Positions and Indices


    When we specified a position of `1.0` (first line, first character), this was
    an example of an *index*. It tells the `insert` method where to put the new text
    (just before the first line, first character, i.e., at the very start of the widget).
    Indices can be specified in a variety of ways. We used another one with the `get`
    method: `end` means *just past* the end of the text. (Why "just past?" Text is
    inserted right *before* the given index, so inserting at `end` will add text to
    the end of the widget). Note that Tk will *always* add a newline at the very end
    of the text widget.


    Here are a few additional examples of indices and how to interpret them:


    +   - `3.end`: The newline at the end of line 3.

    - `1.0 + 3 chars`: Three characters past the start of line 1.

    - `2.end -1 chars`: The last character before the new line in line 2.

    - `end -1 chars`: The newline that Tk always adds at the end of the text.

    - `end -2 chars`: The actual last character of the text.

    - `end -1 lines`: The start of the last actual line of text.

    - `2.2 + 2 lines`: The third character (index 2) of the fourth line of text.

    - `2.5 linestart`: The first character of line 2.

    - `2.5 lineend`: The position of the newline at the end of line 2.'
  merge: -1
  pgno: 221
- img_proc: true
  md: '2.5 wordstart:

    First char. of the word with the char. at index 2.5.

    2.5 wordend:

    First char. after the word with the char. at index 2.5.


    Some additional things to keep in mind:


    +   - The term `chars` can be abbreviated as `c`, and `lines` as `l`.

    - Spaces between terms can be omitted, e.g., `1.0+3c`.

    - An index past the end of the text (e.g., `end + 100c`) is interpreted as `end`.

    - Indices wrap to subsequent lines as needed; e.g., `1.0 + 10 chars` on a line
    with only five characters will refer to a position on the second line.

    - Line numbers in indices are interpreted as *logical lines*, i.e., each line
    ends only at the "\n." With long lines and wrapping enabled, one logical line
    may represent multiple *display lines*. If you''d like to move up or down a single
    line on the display, you can specify this as, e.g., "1.0 + 2 display lines".


    To determine the *canonical position* of an index, use the `index idx` method.
    Pass it any index expression, and it returns the corresponding index in the form
    `line.char`. For example, to find the position of the last character (ignoring
    the automatic newline at the end), use:


    ```

    text.index(''end'')

    ```


    You can compare two indices using the `compare` method, which lets you check for
    equality, whether one index is later in the text than the other, etc.


    ```

    if text.compare(idx1, "==", idx2"): # same position

    ```


    Valid operators are `==`, `!=`, `<`, `<=`, `>`, and `>=`.


    # Deleting Text


    While the `insert` method adds new text anywhere in the widget, the `delete start
    ?end?` method removes it. We can delete either a single'
  merge: -1
