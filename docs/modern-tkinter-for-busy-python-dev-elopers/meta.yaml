- img_proc: true
  md: 'of extra code needed to special case for this layout difference, it made sense
    to handle things this way.


    Other aspects of the layout were also improved. Looking at the original dialogs
    (especially how the buttons don''t quite line up with other widgets), I originally
    thought it was created with `pack`, and expected to convert it to `grid`. Interestingly,
    it was already using `grid`. Why then the unaligned widgets, a hallmark of `pack`-based
    layouts?


    This turned out to be a result of using many *nested frames*. For example, the
    buttons were placed into their own frame, and then that placed into the rest of
    the window. Because of that, the individual buttons couldn''t be aligned with
    widgets in the rest of the user interface.


    Nested frames were required when using `pack`, but often with `grid` it is better
    to avoid them except in exceptional circumstances. That allows you to make different
    parts of the user interface line up (at the expense of dealing with a lot of colspan/rowspan
    tweaking).


    A more substantial reorganization would have likely removed the nested frames,
    but particularly with adjusting the buttons, this relatively simple layout could
    be made to work with just a few tweaks.


    > 💡 *You''ll notice a lot of older Tkinter user interfaces have the problem here
    of their contents running to the edge of the windows, which often doesn''t look
    right. I''ve gotten into the habit of placing a `ttk.Frame` directly inside each
    toplevel, with some additional padding, and then placing the rest of the user
    interface inside that.*


    Like Preferences, the Find dialogs were also modal, which meant you had to dismiss
    them before doing any editing of your file, though at least they did remember
    the previous settings when you reopened them. These were eventually changed to
    be regular modeless windows.


    # **About Dialog**


    Speaking of modal dialogs, the About box was also originally modal. Not only that,
    getting more information (e.g., the IDLE README file) resulted in launching *another*
    modal dialog, which needed to be dismissed to go back to the first modal dialog,
    which needed... etc.'
  merge: -1
  pgno: 289
- img_proc: true
  md: '![](img/e444c319ec16222f00278651bee8c21d_290_0.png)


    ![](img/e444c319ec16222f00278651bee8c21d_290_1.png)


    IDLE''s doubly-modal About dialog (macOS).'
  merge: -1
  pgno: 290
- img_proc: true
  md: 'Making the dialog non-modal was the first priority. Second, the nested dialogs
    were eliminated using a progressive disclosure technique. The dialog when launched
    is fairly sparse but contains a ''More...'' "link." When clicked, it expands the
    window to show one of the documentation files, with an option to switch to any
    of the others.


    The ''More...'' "link" is effectively playing the role of a button, but taking
    advantage of everyone''s familiarity with web browsers to provide a visually simpler
    alternative. As far as implementation, we use a (classic, non-themed) label widget,
    colored blue, and attach a mouse click binding to it.


    > 💡 One thing you can do to help convey that the link is clickable is to change
    the cursor when the mouse is over it (via the "cursor" option found on many widgets).
    On macOS, choose the platform-specific "pointinghand" cursor, on Windows and Linux
    choose the "hand2" cursor, which actually gets mapped to something more appropriate
    on those platforms.'
  merge: -1
  pgno: 291
- img_proc: true
  md: '![](img/e444c319ec16222f00278651bee8c21d_292_0.png)


    ![](img/e444c319ec16222f00278651bee8c21d_292_1.png)


    Revised About dialog (macOS).


    # Online Help


    IDLE also had a (needless to say, modal) help dialog which displayed information
    on using the program. This displayed a plain text help file that looked similar
    to the ''About - Readme'' window above.'
  merge: -1
  pgno: 292
- img_proc: true
  md: 'At the same time, like the rest of Python, there was [reference documentation](https://docs.python.org/3/),
    created as "restructured text" which can then be formatted using a tool called
    [Sphinx](https://www.sphinx-doc.org/) into HTML, text, etc.


    The documentation in IDLE''s help dialog was based on a separate, but similar
    plain text file. Keeping the two in sync was a problem. They were separate because
    Sphinx''s plain text rendering didn''t look all that good, and all the extra navigation,
    etc. in the HTML rendering wouldn''t be needed for online help, and then there''s
    the hassle of opening a web browser, etc.; see [bugs.python.org/issue16893](https://bugs.python.org/issue16893).


    Tk''s text widget is smart enough to handle the very basic formatting used in
    IDLE''s documentation, and Python includes an HTML parser in its standard library.
    Putting the two together made displaying a simplified version of the HTML reference
    documentation easy.


    ![](img/e444c319ec16222f00278651bee8c21d_293_0.png)


    Online help using text widget (macOS).


    > It''s easy to get carried away here. Back in the mid-1990s, a tiny [HTML parser
    in Tcl](https://www.tcl.tk/software/tclhtml/) spawned a slew of "web browser in
    a text widget" adventures, first in Tcl and then in other languages, e.g., Python''s
    Grail. Trying to keep up with everything that large teams of developers are putting
    into real web browsers is a fool''s errand. Yet, for very limited and constrained
    subsets of HTML (as might be found in online help), it''s an entirely reasonable
    approach.'
  merge: -1
  pgno: 293
- img_proc: true
  md: '# Query Dialogs


    Still with the modal dialog theme, IDLE used the "simpledialog" package, which
    is distributed as part of Tkinter to request certain small pieces of information
    from users via modal dialogs. An example is the "Goto line..." command. This,
    along with an example of the alert that is presented if you type in something
    invalid is shown below.


    ![](img/e444c319ec16222f00278651bee8c21d_294_0.png)


    The alert-on-dialog isn''t quite as bad as the dialog-on-dialog pattern we saw
    before. But these dialogs could certainly stand to be cosmetically updated, and
    a few other tweaks made. For example, while they correctly interpreted hitting
    the Return or Escape keys as synonymous with pressing OK or Cancel, they didn''t
    also allow for the alternate macOS conventions (Enter key on the numeric keypad
    and Command-period); see [bugs.python.org/issue24812](https://bugs.python.org/issue24812).
    There were some other customizations that would have been nice to have, e.g. changing
    the name of the OK button, that simpledialog didn''t support.


    Regarding the error handling, things were, in some cases, handled worse. For example,
    there is a command to open an editor window containing the source of a module
    from Python''s stdlib. See what happens if you make a typo.'
  merge: -1
  pgno: 294
- img_proc: true
  md: '![](img/e444c319ec16222f00278651bee8c21d_295_0.png)


    Open module dialog with error (macOS).


    Because the dialog doesn''t know if the module name is correct, validation isn''t
    done until after the dialog is dismissed. So the error alert gets attached to
    another window. To try again, you have to dismiss that, use the menu to reopen
    the dialog, and try again (from scratch).


    There were a couple of places in the code where more validation in the dialog
    was really necessary. Because the "simpledialog" code was part of Tkinter and
    wasn''t readily extensible in the ways needed, developers had to resort to "inheritance
    by text editor" (i.e., copy the entire simpledialog code and modify the copy).
    Twice, separately.


    Since the appearance needed to be updated anyway, we generalized things and ignored
    what was in Tkinter''s simpledialog module altogether. Instead, a single general-purpose
    replacement was created that could be used throughout IDLE (and still resulted
    in less code).


    ![](img/e444c319ec16222f00278651bee8c21d_295_1.png)'
  merge: -1
  pgno: 295
- img_proc: true
  md: "New query dialog (macOS).\n\nBesides the updated widgets and alignment, notice\
    \ how error messages from invalid input are now shown in the dialog itself (a\
    \ technique seen frequently in web applications), rather than a separate alert.\
    \ For macOS, we also made sure to add key bindings for the numeric keypad Enter\
    \ key and Command-period, and also made sure the window looked like a modal dialog\
    \ is supposed to via this little gem:\n\n```\nself.tk.call('::tk::unsupported::MacWindowStyle',\
    \ 'style',\nself._w,\n'moveableModal', '')\n```\n\nAs far as validation, the query\
    \ dialog was structured to accept a validation callback, which could then handle\
    \ arbitrary criteria. For example, here is the validation code used when people\
    \ enter the name of a new theme. It makes sure it fits certain syntactical requirements\
    \ and also hasn't been already used.\n\n```\ndef newtheme(self):\n    def validate_theme(s):\n\
    \        if not s:\n            raise ValueError('Cannot be blank')\n        if\
    \ len(s) > 30:\n            raise ValueError('Cannot be longer than 30 characters')\n\
    \        if s in self.all_theme_names():\n            raise ValueError('Name already\
    \ used')\n    new_theme = querydialog.askstring(parent=self, prompt='...',\n \
    \       title='Create New Theme',\n        validatecmd=validate_theme)\n    if\
    \ new_theme is not None:\n        ...\n```\n\nA generic 'integer' validation callback,\
    \ with an optional minimum and maximum, was added as part of the query dialog\
    \ module for dialogs like the 'Goto line...' dialog.\n\n# Dialog Placement\n\n\
    Several dialogs, including alerts, file save, etc. were appearing in the middle\
    \ of the screen, rather than close to the window that they were"
  merge: -1
  pgno: 296
- img_proc: true
  md: 'associated with; see [bugs.python.org/issue25173].


    Choosing the right window as the `parent` of the dialog is important. It ensures
    the dialog window appears near that window. On macOS, these dialogs are often
    attached to the title bar of the parent window (see the error alerts in the previous
    section).


    > 💡 *The front ends to these dialogs in Tkinter support both a `master` and a
    `parent`. While most of the time, "master" and "parent" are used interchangeably
    in Tkinter, that''s not the case here. If you provide only the master, the dialog
    won''t be attached to that window (but the dialog still needs an existing window
    to create the dialog, which is why the master parameter is there). If the dialog
    is associated with another window, be sure to use the parent parameter.*'
  merge: -1
  pgno: 297
- img_proc: true
  md: '# 18.6. Window Integration


    Multiple people had hoped to make it possible to have everything displayed in
    a single window, to avoid the window management hassles that can sometimes trip
    up people, see, e.g., [bugs.python.org/issue9262](https://bugs.python.org/issue9262),
    [bugs.python.org/issue24826](https://bugs.python.org/issue24826), and [bugs.python.org/issue24818](https://bugs.python.org/issue24818).


    Below is an early, partially-functional mockup of some of the things we wanted
    to be able to accomplish.


    ![](img/e444c319ec16222f00278651bee8c21d_298_0.png)


    Early mockup of window integration (macOS).'
  merge: -1
  pgno: 298
- img_proc: true
  md: '> At this point, almost everything here has been completed, and it ended up
    looking almost identical to the original mockup. See, once in a while, it happens!


    # Tabbed Editor


    Even beginner programmers have to juggle multiple different source files. If each
    gets its own window, as was the case originally in IDLE, things can get messy
    and/or lost pretty quickly. Using tabs to organize multiple files in a single
    window is a familiar, effective solution.


    > When architecting your application, don''t build large components as subclasses
    of Toplevel, or assume they''ll be the only thing in the window in the future.
    Getting around that assumption in the code took a large amount of work. If components
    are instead built as frames, they can be more easily inserted into a toplevel,
    a paned window, a tabbed notebook, another frame, etc.


    Luckily, we can rely on the ttk.Notebook widget to provide the tabbed user interface,
    just like we did in Preferences.

    Or maybe not.

    Unfortunately, the ttk.Notebook widget (and the underlying platform widgets it
    uses) only really support displaying and switching between a small, fixed number
    of tabs. There''s nothing built-in to support adding or closing tabs from the
    user interface, which we definitely need here. And as every programmer knows,
    it is more than possible to need a large number of tabs.

    As you''ve seen in different editors and word processors, everyone does things
    slightly differently. We did our own custom tab widget (sigh...) for IDLE. The
    design borrowed heavily from the TextMate editor on macOS. It allows creating
    new tabs, closing old ones, dragging to rearrange the order, tooltips on each
    tab, indicating if the contained file needed saving, etc. When the number of tabs
    grows too large to comfortably display, the remainder are accessible via a popup
    menu on the last visible tab.


    > The tabbed widget implementation relies on a single Tkinter canvas to display
    the row of tabs and handle all interaction. The actual switching of window content
    is handled completely outside of the widget, with a simple callback mechanism
    used to coordinate everything.'
  merge: -1
  pgno: 299
- img_proc: true
  md: '# Debugger


    The design of the original debugger, along with having its own set of flaws (see
    [bugs.python.org/issue17942](https://bugs.python.org/issue17942)), was too tall
    to be integrated like we wanted to do.


    ![](img/e444c319ec16222f00278651bee8c21d_300_0.png)


    The user interface was substantially revised, with a layout that would work both
    in a standalone window and when integrated. The new version uses a paned window
    to separate the controls and stack on the left from the variable display on the
    right. Both the stack and variable display are implemented using tree view widgets.
    This also provides a great deal of control when it comes to how much space each
    element will use.'
  merge: -1
  pgno: 300
- img_proc: true
  md: '![](img/e444c319ec16222f00278651bee8c21d_301_0.png)


    New IDLE debugger (macOS).


    # Integrated Shell and Debugger


    To achieve the integration of the shell and the debugger with the tabbed editor,
    another paned window was used. Additional controls will be added to show/hide
    the panes as the implementation progresses.

    The embedded shell is interesting too. Recall that IDLE normally has a single
    Python shell window running another Python process; when modules in an editor
    are "run," they do so via that shell. It''s nice to have that big shell available,
    and we don''t necessarily want to start up a separate shell in the editor.

    New in Tk 8.5, the Text widget actually supports the ability to create "peers,"
    which are separate widgets, but they share the same text backend. That means when
    something changes in one, it changes in the other. It''s a seamless way to solve
    our problem here.'
  merge: -1
  pgno: 301
- img_proc: true
  md: "# 18.7. Workarounds, Hacks, and More\n\nThis being a chapter on actual experiences\
    \ modernizing a real application, it would be a lie to say that the underlying\
    \ user interface toolkit (Tk and the Tkinter wrapper) always worked exactly as\
    \ it should. Like IDLE, Tkinter and Tcl/Tk are the results of incredible volunteer\
    \ efforts. That being said...\n\n> Tk and Tkinter have some bugs and rough edges.\
    \ I know you're shocked.\n\nIn this section, I'll try to catalog just a few of\
    \ the particular \"gotchas\" that we ran into, as well as provide some little\
    \ tips that don't necessarily fit elsewhere but help provide a bit more polish\
    \ to the user interface.\n\n# Tool Tips\n\n+   - tool tips broken on macOS;\n\
    \  see [bugs.python.org/issue24570]\n- `MacWindowStyle` help for tooltips, vs.\
    \ `wm overrideredirect` elsewhere\n\n# Context Menus\n\n+   - bogus text widget\
    \ bindings interfere with popup clicks;\n  see [bugs.python.org/issue24801]\n\
    - two different popup click bindings needed on macOS;\n  [bugs.python.org/issue24801]\n\
    \n# Peer Text Widgets\n\n+   - broken peer text widget API in Tkinter;\n  see\
    \ [bugs.python.org/issue17945]\n\n# Modal Windows"
  merge: -1
  pgno: 302
- img_proc: true
  md: +   - macOS not doing fully modal, plus window style; see [bugs.python.org/issue24760](https://bugs.python.org/issue24760)
