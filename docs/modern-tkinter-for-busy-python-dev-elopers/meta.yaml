  md: '# 8.3. Text


    Text

    https://tkdocs.com/man/text


    A **text** widget provides users with an area so that they can enter multiple
    lines of text. Text widgets are part of the classic Tk widgets, not the themed
    Tk widgets.


    ![](img/e444c319ec16222f00278651bee8c21d_120_0.png)


    Text widgets.


    > Tk''s text widget is, along with the canvas widget, one of two uber-powerful
    widgets that provide amazingly deep but easily programmed features. Text widgets
    have formed the basis for full word processors, outliners, web browsers, and more.
    We''ll get into some of the advanced stuff in a later chapter. Here, we''ll show
    you how to use the text widget to capture fairly simple, multi-line text input.


    Text widgets are created using the `Text` class:


    ```

    t = Text(parent, width=40, height=10)

    ```


    The `width` and `height` options specify the requested screen size of the text
    widget, in characters and rows, respectively. The contents of the text can be
    arbitrarily large. You can use the `wrap` configuration option to control how
    line wrapping is handled: values are `none` (no'
  merge: -1
  pgno: 120
- img_proc: true
  md: 'wrapping, text may horizontally scroll), `char` (wrap at any character), and
    `word` (wrapping will only occur at word boundaries).


    A text widget can be disabled so that no editing can occur. Because text is not
    a themed widget, the usual `state` and `instate` methods are not available. Instead,
    use the configuration option `state`, setting it to either `disabled` or `normal`.


    ```

    txt[''state''] = ''disabled''

    ```


    Scrolling works the same way as in listboxes. The `xscrollcommand` and `yscrollcommand`
    configuration options attach the text widget to horizontal and/or vertical scrollbars,
    and the `xview` and `yview` methods are called from scrollbars. To ensure that
    a given line is visible (i.e., not scrolled out of view), you can use the `see
    index` method, where `index` is in the form `linenum.charnum`, e.g., `5.0` for
    the first (0-based) character of line 5 (1-based).


    # Contents


    Text widgets do not have a linked variable associated with them like, for example,
    entry widgets do. To retrieve the contents of the entire text widget, call the
    method `get 1.0 end`; the `1.0` is an index into the text, and means the first
    character of the first line, and `end` is a shortcut for the index of the last
    character in the last line. Other indices could be provided to retrieve smaller
    ranges of text if needed.


    ```

    contents = txt.get(''1.0'', ''end'')

    ```


    Text can be added to the widget using the `insert index string` method; again
    `index` is in the form `line.char` and marks the character before which text is
    inserted; use `end` to add text to the end of the widget. You can delete a range
    of text using the `delete start end` method, where both `start` and `end` are
    text indices as already described.


    We''ll get into the text widget''s many additional advanced features in a later
    chapter.'
