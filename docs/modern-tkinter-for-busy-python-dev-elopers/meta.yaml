- md: "## Adding Menus\n\nWe now have a menubar, but that's pretty useless without\
    \ some menus to go in it. So again, we'll create a menu widget for each menu,\
    \ each one a child of the menubar. We'll then add them all to the menubar.\n\n\
    ```python\nmenubar = Menu(parent)\nmenu_file = Menu(menubar)\nmenu_edit = Menu(menubar)\n\
    menubar.add_cascade(menu=menu_file, label='File')\nmenubar.add_cascade(menu=menu_edit,\
    \ label='Edit')\n```\n\n> The `add_cascade` method adds a menu item, which itself\
    \ is a menu (a submenu).\n\n## Adding Menu Items\n\nNow that we have a couple\
    \ of menus in our menubar, we can add a few items to each menu.\n\n### Command\
    \ Items\n\nRegular menu items are called `command` items in Tk. We'll see some\
    \ other types of menu items shortly. Notice that menu items are part of the menu\
    \ itself; we don't have to create a separate menu widget for each one (submenus\
    \ being the exception).\n\n```python\nmenu_file.add_command(label='New', command=newFile)\n\
    menu_file.add_command(label='Open...', command=openFile)\nmenu_file.add_command(label='Close',\
    \ command=closeFile)\n```\n\n> On macOS, the ellipsis (\"...\") is actually a\
    \ special character, more tightly spaced than three periods in a row. Tk takes\
    \ care of substituting this character for you automatically.\n\nEach menu item\
    \ has associated with it several configuration options, analogous to widget configuration\
    \ options. Each type of menu item has a different set of available options. Cascade\
    \ menu items have a `menu` option used to specify the submenu, command menu items\
    \ have a `command` option to specify the command to invoke when the item is chosen.\
    \ Both have a `label` option to specify the text to display for the item.\n\n\
    ### Submenus\n\nWe've already seen `cascade` menu items used to add a menu to\
    \ a menubar. Not surprisingly, if you want to add a submenu to an existing menu,\
    \ you also use a `cascade` menu item in exactly the same way. You might use this\
    \ to build a \"recent files\" submenu, for example.\n\n```python\nmenu_recent\
    \ = Menu(menu_file)\nmenu_file.add_cascade(menu=menu_recent, label='Open Recent')\n\
    for f in recent_files:\n    menu_recent.add_command(label=os.path.basename(f),\n\
    \        command=lambda: openFile(f))\n```\n\nhttps://tkdocs.com/code/recentfiles.py\n\
    \n### Separators\n\nA third type of menu item is the `separator`, which produces\
    \ the dividing line you often see between different menu items.\n\n```python\n\
    menu_file.add_separator()\n```\n\n### Checkbutton and Radiobutton Items\n\nFinally,\
    \ there are also `checkbutton` and `radiobutton` menu items that behave analogously\
    \ to checkbutton and radiobutton widgets. These menu items have a variable associated\
    \ with them. Depending on its value, an indicator (i.e., checkmark or selected\
    \ radiobutton) may be shown next to its label.\n\n```python\ncheck = StringVar()\n\
    menu_file.add_checkbutton(label='Check', variable=check,\n    onvalue=1, offvalue=0)\n\
    radio = StringVar()\nmenu_file.add_radiobutton(label='One', variable=radio,\n\
    \    value=1)\nmenu_file.add_radiobutton(label='Two', variable=radio,\n    value=2)\n\
    ```\n\nWhen a user selects a checkbutton item that is not already checked, it\
    \ sets the associated variable to the value in `onvalue`. Selecting an item that\
    \ is already checked sets it to the value in `offvalue`. Selecting a radiobutton\
    \ item sets the associated variable to the value in `value`. Both types of items\
    \ also react to any changes you make to the associated variable.\n\nLike command\
    \ items, checkbutton and radiobutton menu items support a `command` configuration\
    \ option that is invoked when the menu item is chosen. The associated variable\
    \ and the menu item's state are updated before the callback is invoked.\n\n> Radiobutton\
    \ menu items are not part of the Windows or macOS human interface guidelines.\
    \ On those platforms, the item's indicator is a checkmark, as it would be for\
    \ a checkbutton item. The semantics still work. It's a good way to select between\
    \ multiple items since it will show one of them selected (checked).\n\n## Manipulating\
    \ Menu Items\n\nAs well as adding items to the end of menus, you can also insert\
    \ them in the middle of menus via the `insert index type ?option value...?` method;\
    \ here index is the position (0..n-1) of the item you want to insert before. You\
    \ can also delete one or more menu items using the `delete index ?endidx?` method.\n\
    \n```python\nmenu_recent.delete(0, 'end')\n```\n\nLike most everything in Tk,\
    \ you can look at or change the value of an item's options at any time. Items\
    \ are referred to via an index. Usually, this is a number (0..n-1) indicating\
    \ the item's position in the menu. You can also specify the label of the menu\
    \ item (or, in fact, a \"glob-style\" pattern to match against the item's label).\n\
    \n```python\nprint(menu_file.entrycget(0, 'label'))  # get label of top entry\
    \ in menu\nprint(menu_file.entryconfigure(0))  # show all options for an item\n\
    ```\n\n### State\n\nYou can disable a menu item so that users cannot select it.\
    \ This can be done via the `state` option, setting it to the value `disabled`.\
    \ Use a value of `normal` to re-enable the item.\n\nMenus should always reflect\
    \ the current state of your application. If a menu item is not presently relevant\
    \ (e.g., the \"Copy\" item is only applicable if something in your application\
    \ is selected), you should disable it. When your application state changes so\
    \ that the item is applicable, make sure to enable it.\n\n```python\nmenu_file.entryconfigure('Close',\
    \ state=DISABLED)\n```\n\nSometimes you may have menu items whose name changes\
    \ in response to application state changes, rather than the menu item being disabled.\
    \ For example, a web browser might have a menu item that changes between \"Show\
