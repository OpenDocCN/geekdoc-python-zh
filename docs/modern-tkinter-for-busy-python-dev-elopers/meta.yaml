    和 `wrap`。请查阅参考手册以获取这些选项的详细描述。`tag_cget tag option` 方法允许我们查询标签的配置选项。


    由于多个标签可以应用于同一文本范围，因此可能存在冲突（例如，两个标签指定了不同的字体）。使用优先级顺序来解决这些冲突；最近创建的标签具有最高优先级，但可以使用
    `tag_raise tag` 和 `tag_lower tag` 方法重新排列优先级。


    ## 更多标签操作


    要完全删除一个或多个标签，我们可以使用 `tag_delete tags` 方法。这当然也会移除文本中对该标签的所有引用。我们也可以使用 `tag_remove
    tag start ?end?` 方法从文本范围中移除标签。即使这使得没有文本范围再带有该标签，标签对象本身仍然存在。


    `tag_ranges tag` 方法将返回文本中已应用该标签的范围列表。还有 `tag_nextrange tag start ?end?` 和 `tag_prevrange
    tag start ?end?` 方法，用于从给定位置向前或向后搜索第一个这样的范围。


    `tag_names ?idx?` 方法在不带额外参数调用时，将返回文本控件中当前定义的所有标签列表（包括那些可能当前未使用的标签）。如果我们向该方法传递一个索引，它将返回仅应用于该索引处字符的标签列表。


    最后，我们可以使用文本中具有给定标签的第一个和最后一个字符作为索引，就像我们可以使用 "end" 或 "2.5" 一样。为此，只需指定 `tagname.first`
    或 `tagname.last`。


    ## Canvas 控件与 Text 控件中标签的区别


    Canvas 控件和 Text 控件都支持可以应用于多个对象、设置其样式等的“标签”。然而，canvas 和 text 标签并不相同。有一些重要的区别需要注意。


    在 canvas 控件中，只有单个 canvas 项目拥有控制其外观的配置选项。当我们在 canvas 中引用一个标签时，其含义等同于“当前拥有该标签的所有
    canvas 项目”。标签本身并不存在为一个独立的对象。因此，在以下代码片段中，最后添加的矩形*不会*被着色为红色。


    ```

    canvas.itemconfigure(''important'', fill=''red'')

    canvas.create_rectangle(10, 10, 40, 40, tags=(''important''))

    ```


    相比之下，在 text 控件中，保留外观状态信息的不是单个字符，而是标签，标签是独立的对象。因此，在此代码片段中，新添加的文本*会*被着色为红色。


    ```

    text.insert(''end'', ''first text'', (''important''))

    text.tag_configure(''important'', foreground=''red'')

    text.insert(''end'', ''second text'', (''important''))

    ```


    ## 15.4. 事件与绑定


    我们可以做的一件非常酷的事情是定义标签上的事件绑定。这使我们能够轻松识别对特定文本范围的鼠标点击，并弹出菜单或对话框作为响应。不同的标签可以有不同的绑定。这省去了处理诸如“在此位置点击意味着什么？”之类问题的麻烦。标签上的绑定使用
    `tag_bind` 方法实现：


    ```

    text.tag_bind(''important'', ''<1>'', popupImportantMenu)

    ```


    控件范围内的事件绑定继续像其他所有控件一样工作，例如，捕获文本中任何位置的鼠标点击。除了正常的低级事件外，每当控件内容发生更改时，text 控件会生成一个
    `<<Modified>>` 虚拟事件，每当所选文本发生更改时，会生成一个 `<<Selection>>` 虚拟事件。


    ## 15.5. 选择文本


    我们可以识别用户选择的文本范围（如果有的话）。例如，编辑器可能有一个工具栏按钮用于将选中文本加粗。虽然你可以通过 `<<Selection>>` 虚拟事件知道选择何时更改（例如，更新加粗按钮是否激活），但这并不能告诉你选择了什么。


    text 控件自动维护一个名为 `sel` 的标签，该标签引用选中的文本。每当选择更改时，`sel` 标签都会更新。因此，我们可以使用 `tag_ranges
    ?tag?` 方法，将 `sel` 作为要报告的标签传递给它，来查找选中的文本范围。


    同样，我们可以使用 `tag_add` 设置新选择，或使用 `tag_remove` 移除选择来更改选择。但是，`sel` 标签不能被删除。


    > 尽管默认的控件绑定可以防止这种情况发生，但 `sel` 与其他标签一样，可以支持多个范围，即不连续的选择。为防止这种情况发生，在从代码中更改选择时，请确保在添加新选择之前移除任何旧选择。


    text 控件将插入光标（新输入的文本将出现的位置）的概念与选择分开管理。它使用一个称为 `mark` 的新概念来实现这一点。


    ## 15.6. 标记


    标记指示文本中的特定位置。在这方面，它们类似于索引。但是，随着文本的修改，标记会调整以保持在相同的相对位置。这样，它们类似于标签，但引用的是单个位置而不是文本范围。标记实际上并不引用文本中字符占据的位置，而是指定两个字符*之间*的位置。


    Tk 自动维护两个不同的标记。第一个名为 `insert`，是插入光标的当前位置。当光标移动（通过鼠标或键盘）时，标记随之移动。第二个标记名为 `current`，跟踪当前鼠标位置下方字符的位置。


    要创建自己的标记，请使用控件的 `mark_set name idx` 方法，传递标记的名称和一个索引（标记被定位在给定索引处字符的*之前*）。这也用于将现有标记移动到不同的位置。可以使用
    `mark_unset name` 方法移除标记，传递标记的名称。如果你删除包含标记的文本范围，也会移除该标记。


    标记的名称也可以用作索引（与 `1.0` 或 `end-1c` 作为索引的方式相同）。你可以使用 `mark_next idx` 或 `mark_previous
    idx` 方法从文本中的给定索引查找下一个（或上一个）标记。`mark_names` 方法将返回所有标记名称的列表。


    标记还有一个*重力*，可以通过 `mark_gravity name ?direction?` 方法修改，这会影响在标记处插入文本时发生的情况。假设我们有文本
    "ac"，中间有一个标记，我们用竖线表示，即 "a|c"。如果该标记的重力是 `right`（默认值），则标记附着在 "c" 上。如果在标记处插入新文本 "b"，标记将保持附着在
    "c" 上，因此新文本将插入在标记之前，即 "ab|c"。如果重力改为 `left`，则标记附着在 "a" 上，因此新文本将插入在标记之后，即 "a|bc"。


    ## 15.7. 图像与控件


    与 canvas 控件一样，text 控件不仅可以包含文本，还可以包含图像和任何其他 Tk 控件（包括一个框架，其本身包含许多其他控件）。从某种意义上说，这允许
    text 控件本身作为几何管理器工作。在文本中添加图像和控件的能力为你的程序开启了无限可能。


    图像被添加到 text 控件的特定索引处，图像指定为现有的 Tk 图像。其他选项允许你微调内边距等。


    ```

    flowers = PhotoImage(file=''flowers.gif'')

    text.image_create(''sel.first'', image=flowers)

    ```


    其他控件以与图像大致相同的方式添加到 text 控件中。被添加的控件必须是控件层次结构中 text 控件的后代。


    ```

    b = ttk.Button(text, text=''Push Me'')

    text.window_create(''1.0'', window=b)

    ```'
