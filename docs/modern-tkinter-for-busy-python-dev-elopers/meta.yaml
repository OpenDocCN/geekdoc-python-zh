  md: "# Checkbutton and Radiobutton Items\n\nFinally, there are also `checkbutton`\
    \ and `radiobutton` menu items that behave analogously to checkbutton and radiobutton\
    \ widgets. These menu items have a variable associated with them. Depending on\
    \ its value, an indicator (i.e., checkmark or selected radiobutton) may be shown\
    \ next to its label.\n\n```\ncheck = StringVar()\nmenu_file.add_checkbutton(label='Check',\
    \ variable=check,\n    onvalue=1, offvalue=0)\nradio = StringVar()\nmenu_file.add_radiobutton(label='One',\
    \ variable=radio,\n    value=1)\nmenu_file.add_radiobutton(label='Two', variable=radio,\n\
    \    value=2)\n```\n\nWhen a user selects a checkbutton item that is not already\
    \ checked, it sets the associated variable to the value in `onvalue`. Selecting\
    \ an item that is already checked sets it to the value in `offvalue`. Selecting\
    \ a radiobutton item sets the associated variable to the value in `value`. Both\
    \ types of items also react to any changes you make to the associated variable.\n\
    \nLike command items, checkbutton and radiobutton menu items support a `command`\
    \ configuration option that is invoked when the menu item is chosen. The associated\
    \ variable and the menu item's state are updated before the callback is invoked.\n\
    \n> Radiobutton menu items are not part of the Windows or macOS human interface\
    \ guidelines. On those platforms, the item's indicator is a checkmark, as it would\
    \ be for a checkbutton item. The semantics still work. It's a good way to select\
    \ between multiple items since it will show one of them selected (checked).\n\n\
    # Manipulating Menu Items\n\nAs well as adding items to the end of menus, you\
    \ can also insert them in the middle of menus via the `insert index type ?option`"
