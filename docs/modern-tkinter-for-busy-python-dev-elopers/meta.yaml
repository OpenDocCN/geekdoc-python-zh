  md: 'To insert a tab at somewhere other than the end of the list, use the `insert
    position subwindow ?option value...?`, and to remove a given tab, use the `forget`
    method, passing it either the position (0..n-1) or the tab''s subwindow. You can
    retrieve the list of all subwindows contained in the notebook via the `tabs` method.


    To retrieve the subwindow that is currently selected, call the `select` method,
    and change the selected tab by passing it either the tab''s position or the subwindow
    itself as a parameter.


