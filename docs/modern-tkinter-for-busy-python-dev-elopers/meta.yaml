    \nA **scrollbar** widget helps users see all parts of another widget, whose content\
    \ is typically much larger than what can be shown in the available screen space.\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_116_0.png)\n\nScrollbars are created\
    \ using the `ttk.Scrollbar` class:\n\n```\ns = ttk.Scrollbar( parent, orient=VERTICAL,\n\
    \    command=listbox.yview)\nlistbox.configure(yscrollcommand=s.set)\n```\n\n\
    Unlike in some user interface toolkits, Tk scrollbars are not a part of another\
    \ widget (e.g., a listbox), but are a separate widget altogether. Instead, scrollbars\
    \ communicate with the *scrolled widget* by calling methods on the scrolled widget;\
    \ as it turns out, the scrolled widget also needs to call methods on the scrollbar.\n\
    \n> If you're using a recent Linux distribution, you've probably noticed that\
    \ the scrollbars you see in many applications have changed to look more"
- md: "## 8.2. Scrollbar\n\n> like what you'd see on macOS. This newer look isn't\
    \ supported on Linux by any of the default themes included with Tk. However, some\
    \ third-party themes do support it.\n\nThe `orient` configuration option determines\
    \ whether the scrollbar will scroll the scrolled widget in the `horizontal` or\
    \ `vertical` dimension. You then need to use the `command` configuration option\
    \ to specify how to communicate with the scrolled widget. This is the method to\
    \ call on the scrolled widget when the scrollbar moves.\n\nEvery widget that can\
    \ be scrolled vertically includes a method named `yview`, while those that can\
    \ be scrolled horizontally have a method named `xview`. As long as this method\
    \ is present, the scrollbar doesn't need to know anything else about the scrolled\
    \ widget. When the scrollbar is manipulated, it appends several parameters to\
    \ the method call, indicating how it was scrolled, to what position, etc.\n\n\
    The scrolled widget also needs to communicate back to the scrollbar, telling it\
    \ what percentage of the entire content area is now visible. Besides the `yview`\
    \ and/or `xview` methods, every scrollable widget also has a `yscrollcommand`\
    \ and/or `xscrollcommand` configuration option. This is used to specify a method\
    \ call, which must be the scrollbar's `set` method. Again, additional parameters\
    \ will be automatically tacked onto the method call.\n\n> \U0001F4A1 If, for some\
    \ reason, you want to move the scrollbar to a particular position from within\
    \ your program, you can call the `set first last` method yourself. Pass it two\
    \ floating-point values (between 0 and 1) indicating the start and end percentage\
    \ of the content area that is visible.\n\n### Example\n\nListboxes are one of\
    \ several types of widgets that are scrollable. Here, we'll build a very simple\
    \ user interface, consisting of a vertically scrollable listbox that takes up\
    \ the entire window, with just a status line at the bottom.\n\n![Scrolling a listbox.](img/e444c319ec16222f00278651bee8c21d_118_0.png)\n\
    \n```python\nfrom tkinter import *\nfrom tkinter import ttk\n\nroot = Tk()\nl\
    \ = Listbox(root, height=5)\nl.grid(column=0, row=0, sticky=(N,W,E,S))\ns = ttk.Scrollbar(root,\
    \ orient=VERTICAL, command=l.yview)\ns.grid(column=1, row=0, sticky=(N,S))\nl['yscrollcommand']\
    \ = s.set\nttk.Label(root, text=\"Status message here\", anchor=(W)).grid(column=0,\
    \ columnspan=2, row=1, sticky=(W,E))\nroot.grid_columnconfigure(0, weight=1)\n\
    root.grid_rowconfigure(0, weight=1)\nfor i in range(1,101):\n    l.insert('end',\
    \ 'Line %d of 100' % i)\nroot.mainloop()\n```\n\n[https://tkdocs.com/code/scrollbar.py](https://tkdocs.com/code/scrollbar.py)\n\
    \n![Scrolling a listbox.](img/e444c319ec16222f00278651bee8c21d_118_1.png)\n\n\
    If you've seen an earlier version of this book, you might recall that at this\
    \ point we introduced a `sizegrip` widget. It placed a small handle at the bottom\
    \ right of the window, allowing users to resize the window by dragging the handle.\
    \ This was commonly seen on some platforms, including older versions of macOS.\
    \ Some older versions of Tk even automatically added this handle to the window\
    \ for you.\n\nPlatform conventions tend to evolve faster than long-lived open\
    \ source GUI toolkits. Mac OS X 10.7 did away with the size grip in the corner,\
    \ in favor of allowing resizing from any window edge, finally catching up with\
    \ the rest of the world. Unless there's a pressing need to be visually compatible\
    \ with 10+ year old operating systems, if you have a `sizegrip` (class `ttk.Sizegrip`)\
    \ in your application, it's probably best to remove it.\n\n## 8.3. Text\n\nText\n\
    https://tkdocs.com/man/text\n\nA **text** widget provides users with an area so\
    \ that they can enter multiple lines of text. Text widgets are part of the classic\
    \ Tk widgets, not the themed Tk widgets.\n\n![Text widgets.](img/e444c319ec16222f00278651bee8c21d_120_0.png)\n\
    \n> Tk's text widget is, along with the canvas widget, one of two uber-powerful\
    \ widgets that provide amazingly deep but easily programmed features. Text widgets\
    \ have formed the basis for full word processors, outliners, web browsers, and\
    \ more. We'll get into some of the advanced stuff in a later chapter. Here, we'll\
    \ show you how to use the text widget to capture fairly simple, multi-line text\
    \ input.\n\nText widgets are created using the `Text` class:\n\n```python\nt =\
    \ Text(parent, width=40, height=10)\n```\n\nThe `width` and `height` options specify\
    \ the requested screen size of the text widget, in characters and rows, respectively.\
    \ The contents of the text can be arbitrarily large. You can use the `wrap` configuration\
    \ option to control how line wrapping is handled: values are `none` (no wrapping,\
    \ text may horizontally scroll), `char` (wrap at any character), and `word` (wrapping\
    \ will only occur at word boundaries).\n\nA text widget can be disabled so that\
    \ no editing can occur. Because text is not a themed widget, the usual `state`\
    \ and `instate` methods are not available. Instead, use the configuration option\
    \ `state`, setting it to either `disabled` or `normal`.\n\n```python\ntxt['state']\
    \ = 'disabled'\n```\n\nScrolling works the same way as in listboxes. The `xscrollcommand`\
    \ and `yscrollcommand` configuration options attach the text widget to horizontal\
    \ and/or vertical scrollbars, and the `xview` and `yview` methods are called from\
    \ scrollbars. To ensure that a given line is visible (i.e., not scrolled out of\
    \ view), you can use the `see index` method, where `index` is in the form `linenum.charnum`,\
    \ e.g., `5.0` for the first (0-based) character of line 5 (1-based).\n\n### Contents\n\
    \nText widgets do not have a linked variable associated with them like, for example,\
    \ entry widgets do. To retrieve the contents of the entire text widget, call the\
    \ method `get 1.0 end`; the `1.0` is an index into the text, and means the first\
    \ character of the first line, and `end` is a shortcut for the index of the last\
    \ character in the last line. Other indices could be provided to retrieve smaller\
    \ ranges of text if needed.\n\n```python\ncontents = txt.get('1.0', 'end')\n```\n\
    \nText can be added to the widget using the `insert index string` method; again\
    \ `index` is in the form `line.char` and marks the character before which text\
    \ is inserted; use `end` to add text to the end of the widget. You can delete\
    \ a range of text using the `delete start end` method, where both `start` and\
    \ `end` are text indices as already described.\n\nWe'll get into the text widget's\
    \ many additional advanced features in a later chapter.\n\n## 8.4. Scale\n\nttk.Scale\n\
    https://tkdocs.com/man/ttk_scale\n\nA **scale** widget allows users to choose\
    \ a numeric value through direct manipulation.\n\n![Scale widgets.](img/e444c319ec16222f00278651bee8c21d_122_0.png)\n\
    \nScale widgets are created using the `ttk.Scale` class:\n\n```python\ns = ttk.Scale(parent,\
    \ orient=HORIZONTAL, length=200,\n              from_=1.0, to=100.0)\n```\n\n\
    > Because 'from' is a reserved keyword in Python, we need to add a trailing underscore\
    \ when using it as a configuration option.\n\nThe `orient` option may be either\
    \ `horizontal` or `vertical`. The `length` option, which represents the longer\
    \ axis of either horizontal or vertical scales, is specified in screen units (e.g.,\
    \ pixels). You should also define the range of the number that the scale allows\
    \ users to choose; to do this, set a floating-point number for each of the `from_`\
    \ and `to` configuration options.\n\nThere are several different ways you can\
    \ set the current value of the scale (which must be a floating-point value between\
    \ the `from_` and `to` values). You can set (or read, to get the current value)\
    \ the scale's `value` configuration option. You can link the scale to a variable\
    \ using the `variable` option. Or, you can call the scale's `set value` method\
    \ to change the value, or the `get` method to read the current value.\n\nA `command`\
    \ configuration option lets you specify a script to call whenever the scale is\
    \ changed. Tk will append the current value of the scale as a parameter each time\
    \ it calls this script (we saw a similar thing with extra parameters being added\
    \ to scrollbar callbacks).\n\n```python\n# label tied to the same variable as\
    \ the scale, so auto-updates\nnum = StringVar()\nttk.Label(root, textvariable=num).grid(column=0,\
    \ row=0,\nsticky='we')\n\n# label that we'll manually update via the scale's command\
    \ callback\nmanual = ttk.Label(root)\nmanual.grid(column=0, row=1, sticky='we')\n\
    \ndef update_lbl(val):\n    manual['text'] = \"Scale at \" + val\n\nscale = ttk.Scale(root,\
    \ orient='horizontal', length=200,\nfrom_=1.0, to=100.0, variable=num, command=update_lbl)\n\
    scale.grid(column=0, row=2, sticky='we')\nscale.set(20)\n```\n\nhttps://tkdocs.com/code/scale.py\n\
    \nAs with other themed widgets, you can use the `state disabled`, `state !disabled`,\
    \ and `instate disabled` methods to prevent users from modifying the scale.\n\n\
    > As the scale widget does not display the actual values, you may want to add\
    \ those separately, e.g., using label widgets."
  mdcn: "## 8.2. 滚动条\n\n> 类似于你在 macOS 上看到的样式。Tk 的任何默认主题都不支持这种较新的外观。然而，一些第三方主题确实支持它。\n\
    \n`orient` 配置选项决定了滚动条将在 `horizontal`（水平）还是 `vertical`（垂直）维度上滚动被滚动的部件。然后，你需要使用\
    \ `command` 配置选项来指定如何与被滚动的部件通信。这是当滚动条移动时，需要在被滚动部件上调用的方法。\n\n每个可以垂直滚动的部件都包含一个名为\
    \ `yview` 的方法，而那些可以水平滚动的部件则有一个名为 `xview` 的方法。只要这个方法存在，滚动条就不需要知道关于被滚动部件的任何其他信息。当滚动条被操作时，它会向该方法调用附加几个参数，指示它是如何被滚动的、滚动到什么位置等等。\n\
    \n被滚动的部件也需要与滚动条进行通信，告诉它整个内容区域的百分比现在是可见的。除了 `yview` 和/或 `xview` 方法之外，每个可滚动的部件还有一个\
    \ `yscrollcommand` 和/或 `xscrollcommand` 配置选项。这用于指定一个方法调用，该调用必须是滚动条的 `set` 方法。同样，额外的参数会自动附加到方法调用上。\n\
    \n> \U0001F4A1 如果出于某种原因，你想在程序内部将滚动条移动到特定位置，你可以自己调用 `set first last` 方法。传递两个浮点值（在\
    \ 0 和 1 之间），表示可见内容区域的起始和结束百分比。\n\n### 示例\n\n列表框是几种可滚动部件类型之一。在这里，我们将构建一个非常简单的用户界面，由一个占据整个窗口的垂直可滚动列表框组成，底部只有一个状态行。\n\
    \n![滚动列表框。](img/e444c319ec16222f00278651bee8c21d_118_0.png)\n\n```python\nfrom\
    \ tkinter import *\nfrom tkinter import ttk\n\nroot = Tk()\nl = Listbox(root,\
    \ height=5)\nl.grid(column=0, row=0, sticky=(N,W,E,S))\ns = ttk.Scrollbar(root,\
    \ orient=VERTICAL, command=l.yview)\ns.grid(column=1, row=0, sticky=(N,S))\nl['yscrollcommand']\
    \ = s.set\nttk.Label(root, text=\"Status message here\", anchor=(W)).grid(column=0,\
    \ columnspan=2, row=1, sticky=(W,E))\nroot.grid_columnconfigure(0, weight=1)\n\
    root.grid_rowconfigure(0, weight=1)\nfor i in range(1,101):\n    l.insert('end',\
    \ 'Line %d of 100' % i)\nroot.mainloop()\n```\n\n[https://tkdocs.com/code/scrollbar.py](https://tkdocs.com/code/scrollbar.py)\n\
    \n![滚动列表框。](img/e444c319ec16222f00278651bee8c21d_118_1.png)\n\n如果你看过本书的早期版本，你可能会记得在这一点上我们介绍了一个\
    \ `sizegrip` 部件。它在窗口的右下角放置了一个小手柄，允许用户通过拖动手柄来调整窗口大小。这在一些平台上很常见，包括旧版本的 macOS。一些旧版本的\
    \ Tk 甚至会自动为你添加这个手柄。\n\n平台惯例的演变速度往往快于长期存在的开源 GUI 工具包。Mac OS X 10.7 取消了角落的大小调整手柄，转而允许从任何窗口边缘调整大小，最终赶上了世界其他地区。除非有迫切需要与\
    \ 10 多年前的操作系统在视觉上保持兼容，否则如果你的应用程序中有一个 `sizegrip`（类 `ttk.Sizegrip`），最好将其移除。\n\n\
    ## 8.3. 文本\n\n文本\nhttps://tkdocs.com/man/text\n\n**文本**部件为用户提供了一个区域，以便他们可以输入多行文本。文本部件是经典\
    \ Tk 部件的一部分，而不是主题化 Tk 部件。\n\n![文本部件。](img/e444c319ec16222f00278651bee8c21d_120_0.png)\n\
    \n> Tk 的文本部件与画布部件一起，是两个超级强大的部件，提供了惊人深入但易于编程的功能。文本部件构成了完整文字处理器、大纲工具、网络浏览器等的基础。我们将在后面的章节中介绍一些高级内容。在这里，我们将向你展示如何使用文本部件来捕获相当简单的多行文本输入。\n\
    \n文本部件使用 `Text` 类创建：\n\n```python\nt = Text(parent, width=40, height=10)\n```\n\
    \n`width` 和 `height` 选项分别以字符和行为单位指定文本部件所需的屏幕大小。文本的内容可以任意大。你可以使用 `wrap` 配置选项来控制换行的处理方式：值可以是\
    \ `none`（不换行，文本可能水平滚动）、`char`（在任何字符处换行）和 `word`（仅在单词边界处换行）。\n\n文本部件可以被禁用，以防止进行任何编辑。因为文本不是主题化部件，所以通常的\
    \ `state` 和 `instate` 方法不可用。相反，使用配置选项 `state`，将其设置为 `disabled` 或 `normal`。\n\n\
    ```python\ntxt['state'] = 'disabled'\n```\n\n滚动的工作方式与列表框相同。`xscrollcommand` 和\
    \ `yscrollcommand` 配置选项将文本部件连接到水平和/或垂直滚动条，而 `xview` 和 `yview` 方法则从滚动条调用。为确保给定行可见（即，未被滚动出视图），你可以使用\
    \ `see index` 方法，其中 `index` 的格式为 `linenum.charnum`，例如，`5.0` 表示第 5 行（从 1 开始计数）的第一个（从\
    \ 0 开始计数）字符。\n\n### 内容\n\n文本部件不像例如输入部件那样有关联的链接变量。要检索整个文本部件的内容，请调用方法 `get 1.0 end`；`1.0`\
    \ 是文本中的一个索引，表示第一行的第一个字符，`end` 是最后一行最后一个字符索引的快捷方式。如果需要，可以提供其他索引来检索较小范围的文本。\n\n\
    ```python\ncontents = txt.get('1.0', 'end')\n```\n\n可以使用 `insert index string`\
    \ 方法向部件添加文本；同样，`index` 的格式为 `line.char`，标记文本插入其前的字符；使用 `end` 将文本添加到部件的末尾。你可以使用\
    \ `delete start end` 方法删除一段文本，其中 `start` 和 `end` 都是如前所述的文本索引。\n\n我们将在后面的章节中介绍文本部件的许多其他高级功能。\n\
    \n## 8.4. 滑块\n\nttk.Scale\nhttps://tkdocs.com/man/ttk_scale\n\n**滑块**部件允许用户通过直接操作选择一个数值。\n\
    \n![滑块部件。](img/e444c319ec16222f00278651bee8c21d_122_0.png)\n\n滑块部件使用 `ttk.Scale`\
    \ 类创建：\n\n```python\ns = ttk.Scale(parent, orient=HORIZONTAL, length=200,\n  \
    \            from_=1.0, to=100.0)\n```\n\n> 因为 'from' 是 Python 中的保留关键字，所以当它用作配置选项时，我们需要在末尾添加一个下划线。\n\
    \n`orient` 选项可以是 `horizontal` 或 `vertical`。`length` 选项代表水平或垂直滑块的较长轴，以屏幕单位（例如像素）指定。你还应该定义滑块允许用户选择的数字范围；为此，为\
    \ `from_` 和 `to` 配置选项各设置一个浮点数。\n\n有几种不同的方法可以设置滑块的当前值（该值必须是介于 `from_` 和 `to` 值之间的浮点值）。你可以设置（或读取以获取当前值）滑块的\
    \ `value` 配置选项。你可以使用 `variable` 选项将滑块链接到一个变量。或者，你可以调用滑块的 `set value` 方法来更改值，或调用\
    \ `get` 方法来读取当前值。\n\n`command` 配置选项允许你指定一个脚本，每当滑块更改时调用。Tk 每次调用此脚本时，都会将滑块的当前值作为参数附加（我们在滚动条回调中看到过类似的情况，额外的参数被添加到回调中）。\n\
    \n```python\n# 标签与滑块绑定到同一个变量，因此会自动更新\nnum = StringVar()\nttk.Label(root, textvariable=num).grid(column=0,\
    \ row=0,\nsticky='we')\n\n# 我们将通过滑块的 command 回调手动更新的标签\nmanual = ttk.Label(root)\n\
    manual.grid(column=0, row=1, sticky='we')\n\ndef update_lbl(val):\n    manual['text']\
    \ = \"Scale at \" + val\n\nscale = ttk.Scale(root, orient='horizontal', length=200,\n\
    from_=1.0, to=100.0, variable=num, command=update_lbl)\nscale.grid(column=0, row=2,\
    \ sticky='we')\nscale.set(20)\n```\n\nhttps://tkdocs.com/code/scale.py\n\n与其他主题化部件一样，你可以使用\
    \ `state disabled`、`state !disabled` 和 `instate disabled` 方法来防止用户修改滑块。\n\n> 由于滑块部件不显示实际值，你可能需要单独添加这些值，例如，使用标签部件。"
