    在 macOS 上，你还可以指定 `-transparent` 属性（使用与 `-alpha` 相同的机制），这允许你使窗口背景透明，并移除窗口的阴影。你还应该将窗口和任何框架的背景配置选项设置为颜色
    `systemTransparent`。


    ## 全屏


    你可以让窗口扩展以占据整个屏幕：


    ```

    window.attributes("-fullscreen", 1)

    ```


    ## 其他 macOS 特定属性


    除了上面描述的 `-transparent` 属性外，macOS 窗口还有一些额外的属性。

    标题栏中的（红色）关闭部件可以指示窗口内的内容已被修改（例如，文件需要保存）。将 `-modified` 属性设置为 1 表示此状态，或设置为 0 以移除修改指示器。

    你可以通过在 macOS 码头中弹跳其图标来吸引用户对窗口的注意。为此，请设置窗口的 `-notify` 属性。

    如果窗口包含文档内容，你可以在标题栏中放置一个图标，指定文档所引用的文件。用户可以拖动此图标作为在 Finder 中拖动文件的代理。将窗口的 `-titlepath`
    属性设置为文件的完整路径。请注意，这不会更改窗口的标题（你需要单独更改），而只是提供图标。

    在 macOS 上，窗口还可以根据不同的目的呈现各种外观，例如实用程序窗口、模态对话框、浮动窗口等。Tk 中有一个不受支持的命令 `MacWindowStyle`，允许你将这些外观之一分配给窗口。与
    Tk 中许多可以随时更改的选项不同，这些外观必须在窗口创建之后但在出现在屏幕上之前分配。


    ```

    t = Toplevel(root)

    t.tk.call("::tk::unsupported::MacWindowStyle", "style", t._w,

    "utility")

    ```


    除了 `utility`，其他有用的外观样式包括 `floating`、`plain` 和 `modal`。


    > 虽然官方不支持，但此功能在 Tk 中已存在很长时间。未来可能会迁移到 `wm attributes` 命令。有关更多信息，包括不同外观和可选属性的更多详细信息，请参阅
    [MacWindowStyle wiki 页面](https://wiki.tcl-lang.org/page/MacWindowStyle)。


    ## 图标化和撤回


    在大多数系统上，你可以通过图标化临时将窗口从屏幕上移除。在 Tk 中，窗口是否被图标化被称为窗口的 `state`。窗口的可能状态包括 `normal` 和
    `iconic`（用于图标化窗口），以及其他几种：`withdrawn`、`icon` 或 `zoomed`。

    你可以直接查询或设置当前窗口状态。还有 `iconify`、`deiconify` 和 `withdraw` 方法，它们分别是设置 `iconic`、`normal`
    和 `withdrawn` 状态的快捷方式。


    ```

    thestate = window.state()

    window.state(''normal'')

    window.iconify()

    window.deiconify()

    window.withdraw()

    ```


