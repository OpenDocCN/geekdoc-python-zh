- md: "## Predefined Values\n\nYou can provide a list of values that users can choose\
    \ from using the `values` configuration option:\n\n```\ncountry['values'] = ('USA',\
    \ 'Canada', 'Australia')\n```\n\nIf set, the `readonly` state flag will restrict\
    \ users to making choices only from the list of predefined values, but not be\
    \ able to enter their own (though if the current value of the combobox is not\
    \ in the list, it won't be changed).\n\n```\ncountry.state([\"readonly\"])\n```\n\
    \n> \U0001F4A1 If you're using the combobox in `readonly` mode, I'd recommend\
    \ that when the value changes (i.e., on a `<<ComboboxSelected>>` event), that\
    \ you call the `selection_clear` method. It looks a bit odd visually without doing\
    \ that.\n\nYou can also get the current value using the `get` method, and change\
    \ the current value using the `set` method (which takes a single argument, the\
    \ new value).\n\nAs a complement to the `get` and `set` methods, you can also\
    \ use the `current` method to determine which item in the predefined values list\
    \ is selected. Call `current` with no arguments; it will return a 0-based index\
    \ into the list, or -1 if the current value is not in the list. You can select\
    \ an item in the list by calling `current` with a single 0-based index argument.\n\
    \n> \U0001F4A1 Want to associate some other value with each item in the list so\
    \ that your program can use one value internally, but it gets displayed in the\
    \ combobox as something else? You'll want to have a look at the section entitled\
    \ \"Keeping Extra Item Data\" when we get to the discussion of listboxes in a\
    \ couple of chapters from now.\n\n## 7. The Grid Geometry Manager\n\nWe'll take\
    \ a bit of a break from talking about different widgets (what to put onscreen)\
    \ and focus instead on geometry management (where to put those widgets). We introduced\
    \ the general idea of geometry management in the \"Tk Concepts\" chapter. Here,\
    \ we focus on one specific geometry manager: `grid`.\n\nAs we've seen, `grid`\
    \ lets you layout widgets in columns and rows. If you're familiar with using HTML\
    \ tables to do layout, you'll feel right at home here. This chapter illustrates\
