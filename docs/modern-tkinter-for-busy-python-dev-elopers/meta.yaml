- md: "The `forget` method of grid removes slaves from the grid they're currently\
    \ part of. It takes a list of one or more slave widgets as arguments. This does\
    \ not destroy the widget altogether but takes it off the screen as if it had not\
    \ been gridded in the first place. You can grid it again later, though any grid\
    \ options you'd originally assigned will have been lost.\n\nThe `remove` method\
    \ of grid works the same, except that the grid options will be remembered if you\
    \ `grid` it again later.\n\n## 7.7. Nested Layouts\n\nAs your user interface gets\
    \ more complicated, the grid that you're using to organize all your widgets can\
    \ get increasingly complicated. This can make changing and maintaining your program\
    \ very difficult.\n\nLuckily, you don't have to manage your entire user interface\
    \ with a single grid. If you have one area of your user interface that is fairly\
    \ independent of others, create a new frame to hold that area and grid the widgets\
    \ in area within that frame. For example, if you were building a graphics editor\
    \ with multiple palettes, toolbars, etc., each one of those areas might be a candidate\
    \ for putting in its own frame.\n\nIn theory, these frames, each with its own\
    \ grid, can be nested arbitrarily deep, though, in practice, this usually doesn't\
    \ go beyond a few levels. This can be a big help in modularizing your program.\
    \ If, for example, you have a palette of drawing tools, you can create the whole\
    \ thing in a separate function or class. It would be responsible for creating\
    \ all the component widgets, gridding them together, setting up event bindings,\
    \ etc. The details of how things work inside that palette can be contained in\
    \ that one piece of code. From the point of view of your main program, all it\
    \ needs to know about is the single frame widget containing your palette.\n\n\
    Our examples have shown just a hint of this, where a content frame was gridded\
    \ into the main window, and then all the other widgets gridded into the content\
    \ frame.\n\nAs your own programs grow larger, you'll likely run into situations\
    \ where making a change in the layout of one part of your interface requires code\
    \ changes to the layout of another part. That may be a clue to reconsider how\
    \ you're using `grid` and if splitting out components into separate frames would\
    \ help.\n\n## 8. More Widgets\n\nThis chapter carries on introducing several more\
    \ widgets: listbox, scrollbar, text, scale, spinbox, and progressbar. Some of\
    \ these are starting to be a bit more powerful than the basic ones we looked at\
    \ before. Here we'll also see a few instances of using the classic Tk widgets,\
    \ in cases where there isn't (or there isn't a need for) a themed counterpart.\n\
    \n## 8.1. Listbox\n\nListbox\nhttps://tkdocs.com/man/listbox\n\nA **listbox**\
    \ widget displays a list of single-line text items, usually lengthy, and allows\
    \ users to browse through the list, selecting one or more.\nListboxes are part\
    \ of the classic Tk widgets; there is not presently a listbox in the themed Tk\
    \ widget set.\n\n> Tk's treeview widget (which is themed) can also be used as\
    \ a listbox (a one level deep tree), allowing you to use icons and styles with\
    \ the list.\nIt's also likely that a multi-column (table) list widget will make\
    \ it into Tk at some point, whether based on treeview or one of the available\
    \ extensions.\n\n![](img/e444c319ec16222f00278651bee8c21d_107_0.png)\n\nListboxes\
    \ are created using the `Listbox` class. A height configuration option can specify\
    \ the number of lines the listbox will display at a time without scrolling:\n\n\
    ```\nl = Listbox(parent, height=10)\n```\n\n### Populating the Listbox Items\n\
    \nThere's an easy way and a hard way to populate and manage all the items in the\
    \ listbox.\n\nHere's the easy way. Each listbox has a `listvariable` configuration\
    \ option, which allows you to link a variable (which must hold a list) to the\
    \ listbox. Each element of this list is a string representing one item in the\
    \ listbox. To add, remove, or rearrange items in the listbox, you can simply modify\
    \ this variable as you would any other list. Similarly, to find out, e.g., which\
    \ item is on the third line of the listbox, just look at the third element of\
    \ the list variable.\n\nIt's actually not quite *that* easy. Tkinter doesn't allow\
    \ you to link regular Python lists to a `listbox`. As we saw with widgets like\
    \ `entry`, we need to use a `StringVar` as an intermediary. It provides a mapping\
    \ between Python's lists and a string representation that the underlying Tk widgets\
    \ can use. It also means that anytime we change the list, we need to update the\
    \ `StringVar`.\n\n```\nchoices = [\"apple\", \"orange\", \"banana\"]\nchoicesvar\
    \ = StringVar(value=choices)\nl = Listbox(parent, listvariable=choicesvar)\n...\n\
    choices.append(\"peach\")\nchoicesvar.set(choices)\n```\n\nThe older, harder way\
    \ to do things is to use a set of methods that are part of the listbox widget\
    \ itself. They operate on the (internal) list of items maintained by the widget:\n\
    \n- The `insert idx item ?item...?` method is used to add one or more items to\
    \ the list; `idx` is a 0-based index indicating the position of the item before\
    \ which the item(s) should be added; specify `end` to put the new items at the\
    \ end of the list.\n- Use the `delete first ?last?` method to delete one or more\
    \ items from the list; `first` and `last` are indices as per the `insert` method.\n\
    - Use the `get first ?last?` method to return the contents of a single item at\
    \ the given position, or a list of the items between `first` and `last`.\n- The\
    \ `size` method returns the number of items in the list.\n\n> ![UPGRADE](image_placeholder)\
    \ The reason there is a hard way at all is because the `listvariable` option was\
    \ only introduced in Tk 8.3. Before that, you were stuck with the hard way. Because\
    \ using the list variable lets you use all the standard list operations, it provides\
    \ a much simpler API. It's certainly an upgrade worth considering if you have\
    \ listboxes doing things the older way.\n\n### Selecting Items\n\nYou can choose\
    \ whether users can select only a single item at a time from the `listbox`, or\
    \ if multiple items can simultaneously be selected. This is controlled by the\
    \ `selectmode` option: the default is only being able to select a single item\
    \ (`browse`), while a `selectmode` of `extended` allows users to select multiple\
    \ items.\n\n> ![emoji](image_placeholder) The names `browse` and `extended`, again\
    \ for backward compatibility reasons, are truly awful. This is made worse by the\
    \ fact that there are two other modes, `single` and `multiple`, which you **should\
    \ not use** (they use an old interaction style that is inconsistent with modern\
    \ user interface and platform conventions).\n\nTo find out which item or items\
    \ in the listbox are currently selected, use the `curselection` method. It returns\
    \ a list of indices of all items currently selected; this may be an empty list.\
    \ For lists with a `selectmode` of `browse`, it will never be longer than one\
    \ item. You can also use the `selection_includes index` method to check if the\
    \ item with the given index is currently selected.\n\n```\nif lbox.selection_includes(2):\
    \ ...\n```\n\nTo programmatically change the selection, you can use the `selection_clear\
    \ first ?last?` method to deselect either a single item or any within the range\
    \ of indices specified. To select an item or all items in a range, use the `selection_set\
    \ first ?last?` method. Both of these will not touch the selection of any items\
    \ outside the range specified.\n\nIf you change the selection, you should also\
    \ make sure that the newly selected item is visible (i.e., it is not scrolled\
    \ out of view). To do this, use the `see index` method.\n\n```\nlbox.selection_set(idx)\n\
    lbox.see(idx)\n```\n\nWhen a user changes the selection, a `<<ListboxSelect>>`\
    \ virtual event is generated. You can bind to this to take any action you need.\
    \ Depending on your application, you may also want to bind to a double-click `<Double-1>`\
    \ event and use it to invoke an action with the currently selected item.\n\n```\n\
    lbox.bind(\"<<ListboxSelect>>\", lambda e:\n    updateDetails(lbox.curselection()))\n\
    lbox.bind(\"<Double-1>\", lambda e:\n    invokeAction(lbox.curselection()))\n\
    ```\n\n### Stylizing the List\n\nLike most of the \"classic\" Tk widgets, you\
    \ have immense flexibility in modifying the appearance of a listbox. As described\
    \ in the [reference manual](https://docs.python.org/3/library/tkinter.html), you\
    \ can modify the font the listbox items are displayed in, the foreground (text)\
    \ and background colors for items in their normal state, when selected, when the\
    \ widget is disabled, etc. There is also an `itemconfigure` method that allows\
    \ you to change the foreground and background colors of individual items.\n\n\
    As is often the case, restraint is useful. Generally, the default values will\
    \ be entirely suitable and a good match for platform conventions. In the example\
    \ we'll get to momentarily, we'll show how restrained use of these options can\
    \ be put to good effect, in this case displaying alternate lines of the listbox\
    \ in slightly different colors.\n\n### Keeping Extra Item Data\n\nThe `listvariable`\
    \ (or the internal list, if you're managing things the old way) holds the strings\
    \ that will be shown in the listbox. It's often the case, though, that each string\
    \ you're displaying is associated"
  mdcn: "`grid` 的 `forget` 方法会将子部件从其当前所在的网格中移除。该方法接受一个或多个子部件作为参数。这并不会完全销毁部件，而是将其从屏幕上移除，就像它从未被网格化一样。之后你可以再次对其进行网格化，但最初分配的所有网格选项都将丢失。\n\
    \n`grid` 的 `remove` 方法工作方式相同，不同之处在于，如果你之后再次对其进行 `grid`，网格选项将会被保留。\n\n## 7.7. 嵌套布局\n\
    \n随着用户界面变得越来越复杂，你用来组织所有部件的网格也会变得越来越复杂。这可能会使更改和维护你的程序变得非常困难。\n\n幸运的是，你不必用单个网格来管理整个用户界面。如果你的用户界面中有一个区域相对独立于其他区域，可以创建一个新的框架来容纳该区域，并将该区域内的部件网格化到该框架中。例如，如果你正在构建一个带有多个调色板、工具栏等的图形编辑器，那么这些区域中的每一个都可能适合放入自己的框架中。\n\
    \n理论上，这些各自拥有自己网格的框架可以任意深度地嵌套，尽管在实践中，这通常不会超过几层。这可以极大地帮助你模块化程序。例如，如果你有一个绘图工具调色板，你可以在一个单独的函数或类中创建整个调色板。该函数或类将负责创建所有组件部件、将它们网格化在一起、设置事件绑定等。调色板内部的工作细节可以包含在那一段代码中。从你的主程序的角度来看，它只需要知道包含调色板的单个框架部件即可。\n\
    \n我们的示例已经展示了这一点的一小部分，其中将一个内容框架网格化到主窗口中，然后将所有其他部件网格化到该内容框架中。\n\n随着你自己的程序规模扩大，你可能会遇到这样的情况：更改界面一部分的布局需要修改另一部分布局的代码。这可能是一个提示，让你重新考虑如何使用\
    \ `grid`，以及将组件拆分到单独的框架中是否会有帮助。\n\n## 8. 更多部件\n\n本章继续介绍更多部件：列表框、滚动条、文本、刻度、微调框和进度条。其中一些部件开始比我们之前研究的基本部件更强大一些。这里我们还将看到一些使用经典\
    \ Tk 部件的实例，这些情况是没有（或不需要）主题化对应部件。\n\n## 8.1. 列表框\n\n列表框\nhttps://tkdocs.com/man/listbox\n\
    \n**列表框**部件显示一个单行文本项的列表，通常很长，并允许用户浏览列表，选择一个或多个项目。\n列表框是经典 Tk 部件的一部分；目前主题化 Tk 部件集中没有列表框。\n\
    \n> Tk 的树形视图部件（它是主题化的）也可以用作列表框（一级深度的树），允许你为列表使用图标和样式。\n> 多列（表格）列表部件也可能在某个时候进入\
    \ Tk，无论是基于树形视图还是其他可用的扩展。\n\n![](img/e444c319ec16222f00278651bee8c21d_107_0.png)\n\
    \n列表框使用 `Listbox` 类创建。`height` 配置选项可以指定列表框在不滚动的情况下一次显示的行数：\n\n```\nl = Listbox(parent,\
    \ height=10)\n```\n\n### 填充列表框项目\n\n填充和管理列表框中的所有项目有简单的方法和复杂的方法。\n\n这是简单的方法。每个列表框都有一个\
    \ `listvariable` 配置选项，它允许你将一个变量（必须包含一个列表）链接到列表框。该列表的每个元素都是一个字符串，代表列表框中的一个项目。要添加、删除或重新排列列表框中的项目，你可以像修改任何其他列表一样简单地修改这个变量。同样，要找出例如列表框第三行是哪个项目，只需查看列表变量的第三个元素。\n\
    \n实际上，这并不完全*那么简单*。Tkinter 不允许你将常规的 Python 列表链接到 `listbox`。正如我们在 `entry` 等部件中看到的，我们需要使用\
    \ `StringVar` 作为中介。它提供了 Python 列表和底层 Tk 部件可以使用的字符串表示之间的映射。这也意味着每当我们更改列表时，都需要更新\
    \ `StringVar`。\n\n```\nchoices = [\"apple\", \"orange\", \"banana\"]\nchoicesvar\
    \ = StringVar(value=choices)\nl = Listbox(parent, listvariable=choicesvar)\n...\n\
    choices.append(\"peach\")\nchoicesvar.set(choices)\n```\n\n旧的、更复杂的方法是使用列表框部件本身提供的一组方法。它们操作部件维护的（内部）项目列表：\n\
    \n- `insert idx item ?item...?` 方法用于向列表中添加一个或多个项目；`idx` 是一个从 0 开始的索引，表示应在哪个位置之前添加项目；指定\
    \ `end` 可将新项目放在列表末尾。\n- 使用 `delete first ?last?` 方法从列表中删除一个或多个项目；`first` 和 `last`\
    \ 是与 `insert` 方法相同的索引。\n- 使用 `get first ?last?` 方法返回给定位置单个项目的内容，或返回 `first` 和\
    \ `last` 之间项目的列表。\n- `size` 方法返回列表中的项目数量。\n\n> ![UPGRADE](image_placeholder) 存在复杂方法的原因是\
    \ `listvariable` 选项仅在 Tk 8.3 中引入。在此之前，你只能使用复杂的方法。因为使用列表变量允许你使用所有标准的列表操作，它提供了一个简单得多的\
    \ API。如果你有列表框正在使用旧方法，这绝对是一个值得考虑的升级。\n\n### 选择项目\n\n你可以选择用户是否只能一次从 `listbox` 中选择单个项目，或者是否可以同时选择多个项目。这由\
    \ `selectmode` 选项控制：默认是只能选择单个项目（`browse`），而 `selectmode` 为 `extended` 则允许用户选择多个项目。\n\
    \n> ![emoji](image_placeholder) `browse` 和 `extended` 这些名称，再次出于向后兼容性的原因，确实很糟糕。更糟糕的是还有另外两种模式，`single`\
    \ 和 `multiple`，你**不应该使用**它们（它们使用了一种与现代用户界面和平台惯例不一致的旧交互风格）。\n\n要找出列表框中当前选中的是哪个或哪些项目，请使用\
    \ `curselection` 方法。它返回当前所有选中项目的索引列表；这可能是一个空列表。对于 `selectmode` 为 `browse` 的列表，它永远不会超过一个项目。你也可以使用\
    \ `selection_includes index` 方法检查给定索引的项目是否当前被选中。\n\n```\nif lbox.selection_includes(2):\
    \ ...\n```\n\n要以编程方式更改选择，你可以使用 `selection_clear first ?last?` 方法取消选择单个项目或指定索引范围内的任何项目。要选择一个项目或范围内的所有项目，请使用\
    \ `selection_set first ?last?` 方法。这两种方法都不会影响指定范围之外的任何项目的选择。\n\n如果你更改了选择，还应确保新选中的项目是可见的（即，它没有被滚动出视图）。为此，请使用\
    \ `see index` 方法。\n\n```\nlbox.selection_set(idx)\nlbox.see(idx)\n```\n\n当用户更改选择时，会生成一个\
    \ `<<ListboxSelect>>` 虚拟事件。你可以绑定到此事件以执行任何需要的操作。根据你的应用程序，你可能还想绑定双击 `<Double-1>`\
    \ 事件，并使用它来对当前选中的项目执行操作。\n\n```\nlbox.bind(\"<<ListboxSelect>>\", lambda e:\n \
    \   updateDetails(lbox.curselection()))\nlbox.bind(\"<Double-1>\", lambda e:\n\
    \    invokeAction(lbox.curselection()))\n```\n\n### 设置列表样式\n\n与大多数“经典” Tk 部件一样，你在修改列表框外观方面具有极大的灵活性。如[参考手册](https://docs.python.org/3/library/tkinter.html)所述，你可以修改列表框项目显示的字体、项目在正常状态下、被选中时、部件被禁用时的前景（文本）和背景颜色等。还有一个\
    \ `itemconfigure` 方法，允许你更改单个项目的前景和背景颜色。\n\n通常情况下，克制是有用的。一般来说，默认值将完全适用，并且与平台惯例很好地匹配。在我们即将看到的示例中，我们将展示如何克制地使用这些选项可以产生良好的效果，在这种情况下，以略微不同的颜色显示列表框的交替行。\n\
    \n### 保留额外的项目数据\n\n`listvariable`（或者如果你使用旧方法管理，则是内部列表）包含将在列表框中显示的字符串。然而，通常情况下，你显示的每个字符串都与"
