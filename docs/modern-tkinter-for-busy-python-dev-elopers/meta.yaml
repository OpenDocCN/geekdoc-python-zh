    \ too. Sounds like a useful way to add that event binding on our default button,\
    \ doesn't it?\n\n```\naction = ttk.Button(root, text=\"Action\", default=\"active\"\
    ,\n    command=myaction)\nroot.bind('<Return>', lambda e: action.invoke())\n```\n\
    \n> Standard behavior for dialog boxes and many other windows on most platforms\
    \ is to set up a binding on the window for the Return key (`<Return>` or `<Key-Return>`)\
    \ to invoke the active button if it exists, as we've done here. If there is a\
    \ \"Close\" or \"Cancel\" button, create a binding to the Escape key (`<Key-Escape>`).\
