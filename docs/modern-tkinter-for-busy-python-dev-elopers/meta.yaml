- md: 'As you''ll see from looking at other applications, the border around the text
    widget is no longer a common convention. So let''s start by removing that, which
    is as easy as adding "highlightthickness=0" when we create the text widget.


    That still leaves us with the problem of the status bar blending into the editor.
    We changed the status bar to be a `ttk.Frame` widget, which has a background shading
    on all platforms. We also placed a `ttk.Separator` widget just above the status
    bar, to give us that clean separation.


    Each of the line and column indicators were labels, previously created with:


    ```

    label = Label(self, bd=1, relief=SUNKEN, anchor=W)

    ```


    This was replaced with a `ttk.Label`, to ensure it matched the frame. We also
    did away with the 1990''s sunken "3d" look.


    ```

    label = ttk.Label(self)

    ```


    Last but not least, we can replace the original Tk scrollbar with the newer `ttk.Scrollbar`
    widget.


    The resulting changes to the main window are shown below. Despite these being
    fairly minor, often subtle changes, they go a long way towards IDLE''s main window
    looking a lot cleaner, more modern, and "just fitting in" on all platforms.


    ![](img/e444c319ec16222f00278651bee8c21d_276_0.png)


    IDLE''s main window, with improvements (macOS).


    ![](img/e444c319ec16222f00278651bee8c21d_277_0.png)


    IDLE''s main window, with improvements (Windows).


    ![](img/e444c319ec16222f00278651bee8c21d_277_1.png)


    IDLE''s main window, with improvements (Linux).


    ## 18.4. Preferences Dialog


    One visible piece that greatly needed improvement was the Preferences dialog.
    Again, here are screenshots on the three platforms:


    ![](img/e444c319ec16222f00278651bee8c21d_278_0.png)


    IDLE''s Preferences window (macOS).


    ### Settings


    Fonts/Tabs Highlighting Keys General


    Base Editor Font


    Indentation Width


    Font Face :


    Python Standard: 4 Spaces!


    +   - Courier New

    - Courier New Baltic

    - Courier New CE

    - Courier New CYR

    - Courier New Greek


    4


    2 4 6 8 10 12 14 16


    Size : 10


    Bold


    AaBbCcDdEe

    FfGgHhIiJjK

    1234567890

    #:+= () {} []


    Ok Apply Cancel


    IDLE''s Preferences window (Windows).


    ![](img/e444c319ec16222f00278651bee8c21d_280_0.png)


    IDLE''s Preferences window (Linux).


    The other tabs allow you to modify individual colors for syntax highlighting,
    keystrokes assigned to particular operations, and a few other miscellaneous things.


    While there was some debate as to the need for this level of configuration on
    what was primarily a learning environment, it seemed reasonable to at least make
    what was there look and work better before considering any more radical surgery;
    see [bugs.python.org/issue24810](https://bugs.python.org/issue24810).


    Among other things, the Preferences dialog was changed from modal (which, amusingly
    enough, didn''t quite work on macOS, allowing multiple copies to be created) to
    modeless, though I won''t go further into that at this point; see [bugs.python.org/issue24760](https://bugs.python.org/issue24760).


    ### Tabs


    The first issue to address was the tabs used to switch between the four different
    preference panes. The original used a custom "megawidget", as classic Tk doesn''t
    have its own widget. While the Windows and Linux ones don''t look too bad, on
    recent versions of macOS, there is a built-in tab widget that looks quite different.


    > It''s actually more common in macOS applications now to use something similar
    to a toolbar (row of icons with labels along the top or side) to switch between
    preference panes, though some programs do still use tabs. Tabs are very common
    on Windows and Linux.


    The code was modified to use the `ttk.Notebook` widget, which not only looks better
    on each platform but allows us to jettison a lot of code for managing tabs ourselves.


    ### Updating Widgets


    The next obvious step was upgrading the "classic" widgets to their themed counterparts.
    On this screen, that included the buttons, labels, frames, checkbox, scrollbar,
    etc. There were a few others on some of the other panes. Generally, this was a
    straightforward process, often involving removing widget options that were no
    longer needed or supported by the themed widgets.


    Sometimes choosing a different widget made more sense. In this screen, the option
    menu used for font size was better replaced by a combobox. Similarly, the scale
    widget is not commonly seen in today''s user interfaces and was replaced with
    the more familiar (and compact) spinbox widget.


    There were also various non-standard ways of using certain widgets or specifying
    certain types of data. These were generally modified to use more familiar paradigms.
    There were a number of general issues discussed relating to the design of these
    dialogs, see, e.g., [bugs.python.org/issue24776](https://bugs.python.org/issue24776),
    and [bugs.python.org/issue24782](https://bugs.python.org/issue24782).


    ### Layout


    While this dialog is a bad example, just given the space imbalance between the
    left and right halves, a lot of time was spent in general looking at widget spacing
    and alignment in dialog boxes.


    The general approach was to find similar examples in other applications and use
    those as a guide. Where are the buttons located? How are multiple fields of a
    dialog organized? Where are labels relative to the widget they''re labeling? Are
    they left- or right-aligned, capitalized, do they have a trailing colon? These
    are the sorts of questions to think about.


    > 💡 A great starting point is converting from using the old `pack` geometry manager
    to `grid`. Because of the way it works, `pack`-based layouts tend to have weird
    and inconsistent alignment and spacing, especially if they''ve been modified over
    time. Using `grid` will increase maintainability, both because it uses a more
    familiar mental model and because it''s not dependent on the order in which widgets
    are inserted.


    It''s likely impossible to come up with one layout that looks fantastic on all
    platforms, but often you can come up with one (possibly with a couple platform-specific
    tweaks in the code) that looks decent.


    A revised version of the dialog, incorporating many of the techniques here, is
    shown below.


    ![](img/e444c319ec16222f00278651bee8c21d_283_0.png)


    IDLE Preferences, revised version (macOS).


    ![](img/e444c319ec16222f00278651bee8c21d_283_1.png)


    IDLE Preferences, revised version (Windows).


    ![](img/e444c319ec16222f00278651bee8c21d_284_0.png)


    ### Another Example


    The screenshot below shows a before and after of the IDLE Preferences pane, which
    controls syntax coloring; see [bugs.python.org/issue24781](https://bugs.python.org/issue24781).


    ![](img/e444c319ec16222f00278651bee8c21d_285_0.png)


    IDLE Themes pane, before (Windows).


    ![](img/e444c319ec16222f00278651bee8c21d_286_0.png)


    Again, substituting widgets and using more familiar conventions is one piece of
    this. I think the bigger changes have to do with thinking about things from the
    users'' perspective. Particularly as a beginner tool, if you''re in here at all,
    it''s probably to switch themes, not tweak colors, which is more prominent in
    the new version. It also does away with an arbitrary distinction between "built-in"
    and "custom" themes.

    I think the new version is a big improvement, though as of this writing I have
    yet to convince some people of this. This being open source, we''ll see what happens!


    ## 18.5. Other Dialogs


    There are multiple other dialog boxes in IDLE; we''ll consider a couple more examples
    here.


    ### Find Dialog


    > Planning on doing some more changes on these, likely combining Find and Replace
    into a single dialog.


    One of the find/search dialogs is shown below, again with before and after on
    the three platforms; see [bugs.python.org/issue23218](https://bugs.python.org/issue23218).


    ![](img/e444c319ec16222f00278651bee8c21d_287_0.png)


    ![](img/e444c319ec16222f00278651bee8c21d_288_0.png)


    IDLE Find dialog, before and after (Windows).


    ![](img/e444c319ec16222f00278651bee8c21d_288_1.png)


    IDLE Find dialog, before and after (Linux).


    The first step was upgrading the widgets to use the equivalent themed widgets.
    The effect of this is most obvious with the buttons (being consistent with the
    capitalization doesn''t hurt either).

    Speaking of buttons, notice that in the new version, the buttons are on the right
    on Windows (where they were on all before), but at the bottom for macOS and Linux.
    On examining multiple different applications, our target users would likely have
    encountered on each platform, we found these locations were common. With only
    a few lines'
  mdcn: '正如你从其他应用程序中看到的，文本部件周围的边框已不再是通用惯例。因此，让我们首先移除它，这就像在创建文本部件时添加 `highlightthickness=0`
    一样简单。


    这仍然留下了状态栏与编辑器融为一体的难题。我们将状态栏更改为 `ttk.Frame` 部件，该部件在所有平台上都有背景阴影。我们还在状态栏上方放置了一个 `ttk.Separator`
    部件，以实现清晰的分隔。


    行和列指示器之前都是标签，使用以下代码创建：


    ```

    label = Label(self, bd=1, relief=SUNKEN, anchor=W)

    ```


    这被替换为 `ttk.Label`，以确保它与框架匹配。我们还摒弃了 1990 年代那种凹陷的 "3D" 外观。


    ```

    label = ttk.Label(self)

    ```


    最后但同样重要的是，我们可以用较新的 `ttk.Scrollbar` 部件替换原始的 Tk 滚动条。


    对主窗口所做的更改如下所示。尽管这些更改相当细微，但它们大大有助于 IDLE 的主窗口看起来更整洁、更现代，并且在所有平台上都 "恰到好处"。


