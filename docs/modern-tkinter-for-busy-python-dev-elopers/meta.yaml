  md: 'All platforms support keyboard traversal of the menubar via the arrow keys.
    On Windows and X11, you can also use other keys to jump to particular menus or
    menu items. The keys that trigger these jumps are indicated by an underlined letter
    in the menu item''s label. To add one of these to a menu item, use the `underline`
    configuration option for the item. Its value should be the index of the character
    you''d like underlined (from 0 to the length of the string - 1). Unlike with accelerator
    keys, the menu will watch for the keystroke, so no separate event binding is needed.


    ```

    m.add_command(label=''Path Browser'', underline=5)  # underline "B"

    ```


    # Images


    It is also possible to use images in menu items, either beside the menu item''s
    label, or replacing it altogether. To do this, use the `image` and `compound`
    options, which work just like in label widgets. The value for `image` must be
    a Tk image object, while `compound` can have the values `bottom`, `center`, `left`,
    `right`, `top`, or `none`.


    # Menu Virtual Events


    Platform conventions for menus suggest standard menus and items that should be
    available in most applications. For example, most applications have an "Edit"
    menu, with menu items for "Copy," "Paste," etc. Tk widgets like entry or text
    will react appropriately when those menu items are chosen. But if you''re building
    your own menus, how do you make that work? What `command` would you assign to
    a "Copy" menu item?


    Tk handles this with virtual events. As you''ll recall from the Tk Concepts chapter,
    these are high-level application events, as opposed to low-level operating system
    events. Tk''s widgets will watch for specific events. When you build your menus,
    you can generate those events rather than directly invoking a callback function.
    Your application can create event bindings to watch for those events too.'
