    IDLE was never intended to be a replacement for more full-featured development
    environments. Because it is relatively simple and integrated, and because it is
    bundled with Python, it is popular for those learning (and teaching) the language.


    Originally created by Python BDFL Guido van Rossum in 1998, IDLE has been incrementally
    added to over the years by multiple other'
  - '[PAGE 267]


    developers. But with limited development effort spent on it, it was showing its
    age, especially on platforms (e.g., macOS) infrequently used by those improving
    IDLE.


    A [Python Central comparison of IDE''s](https://www.pythoncentral.io/) described
    IDLE this way:


    > All those features are, in fact, present, but they do not really make an IDE.
    In fact, while IDLE offers some of the features you expect from an IDE, it does
    so without even being a satisfactory text editor. The interface is buggy and fails
    to take into account how Python works, especially in the interactive shell, the
    auto-completion is useless outside the standard library, and the editing functionality
    is so limited that no serious Python programmer — heck, no serious typist — could
    use it full-time.


    If you use an IDE, it should not be IDLE.


    With its buggy and dated user interface, IDLE was [at some risk](https://www.python.org/)
    of being removed from the Python distribution altogether. Yet, because of the
    relative simplicity and it being bundled, there were a number of people, particularly
    those teaching Python, eager to see IDLE leap forward.


    IDLE was obviously a great candidate to be modernized, using newer Tk features
    like the themed widgets to help spur some redesign. But it was about more than
    just swapping widgets. Many improvements could be made just by changing how the
    "classic" widgets were being used, to better reflect a more modern design aesthetic.


    > Because IDLE, which is an application, was a part of Python''s standard library
    (i.e., 99% designed to be used by other code), there were many policies and procedures
    not really appropriate for an application that made changes difficult. Removing
    some of those roadblocks (see [PEP 434](https://www.python.org/dev/peps/pep-0434/))
    was a significant step required for the types of changes being discussed here.'
  - '[PAGE 268]


    # 18.1. Project Goals


    As you can imagine, modernizing a large application like this, based on "classic"
    Tkinter, was not entirely straightforward. In this chapter, I''ll walk through
    some of the user interface changes that were made and why.


    Everyone involved wanted to see IDLE look a lot better than it did, though nobody
    was under the illusion that it was going to turn into a stunning example of cutting-edge
    design. But something that fit in more, so that people could learn about Python
    without getting distracted by the clumsiness of their tools, seemed doable.


    The goal also wasn''t to try to compete with Python IDE''s more commonly used
    by professional programmers, such as [PyCharm](https://www.jetbrains.com/pycharm/),
    [WingIDE](https://wingware.com/), [PyDev](https://www.pydev.org/), [Komodo](https://www.activestate.com/products/komodo-ide/),
    etc. Though some more experienced Python developers did use IDLE, either sporadically
    or regularly, it primarily needed to appeal to newcomers to the language, and
    often those new to programming altogether.


    There has been no shortage of previous attempts to radically advance IDLE, resulting
    in a number of different *forks* that boasted all kinds of improvements. Many
    of them used other GUI toolkits or modules that weren''t part of the standard
    library. It was important here to stay with Tkinter and the standard library because
    we wanted to ensure every improvement could, over time, make it into the *official*
    version that ships with Python, rather than becoming just another fork.


    As well, the hope was to make IDLE easier to contribute to. This suggested pruning
    down a substantial volume of code, removing some redundancies and inconsistencies,
    cleaning up some of the more complex pieces, simplifying interactions between
    system components, etc. There was also a substantial list of reported bugs that
    we hoped to make a dent in.


    While no less important, I''ll largely defer discussion of the substantial issues
    surrounding software architecture, backward compatibility (including systems running
    Tk 8.4, pre-ttk, which received only a few selective improvements), etc.


    Throughout this chapter, you''ll find links to individual issues in Python''s
    issue tracking system, which often provide additional insight'
