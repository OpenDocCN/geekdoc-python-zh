    -]*$', newval) is not None and len(newval) <= 10\n        if not ok_so_far:\n\
    \            errmsg.set(formatmsg)\n        return ok_so_far\n    elif op=='focusout':\n\
    \        if not valid:\n            errmsg.set(formatmsg)\n    return valid\n\
    check_zip_wrapper = (root.register(check_zip), '%P', '%V')\n\nzip = StringVar()\n\
    f = ttk.Frame(root)\nf.grid(column=0, row=0)\nttk.Label(f, text='Name:').grid(column=0,\
    \ row=0, padx=5, pady=5)\nttk.Entry(f).grid(column=1, row=0, padx=5, pady=5)\n\
    ttk.Label(f, text='Zip:').grid(column=0, row=1, padx=5, pady=5)\ne = ttk.Entry(f,\
    \ textvariable=zip, validate='all', validatecommand=check_zip_wrapper)\ne.grid(column=1,\
    \ row=1, padx=5, pady=5)\nbtn = ttk.Button(f, text=\"Process\")\nbtn.grid(column=2,\
    \ row=1, padx=5, pady=5)\nbtn.state(['disabled'])\n```\n\n```\nmsg = ttk.Label(f,\
    \ font='TkSmallCaptionFont',\n    foreground='red', textvariable=errmsg)\nmsg.grid(column=1,\
    \ row=2, padx=5, pady=5, sticky='w')\n```\n\n[https://tkdocs.com/code/validate.py](https://tkdocs.com/code/validate.py)\n\
    \n请注意，`validate` 配置选项已从 `key` 更改为 `all`。这安排了 `validatecommand` 回调不仅在按键时被调用，还在其他触发器时被调用。触发器通过\
    \ `%v` 百分比替换传递给回调。回调区分了 `key` 和 `focusout` 触发器（您也可以检查 `focusin`）。\n\n> 关于验证，还有几点需要了解。首先，如果您的\
    \ `validatecommand` 产生错误（或未返回布尔值），该控件的验证将被禁用。您的回调可以修改输入框，例如，更改其 textvariable。您可以通过调用控件的\
    \ `validate` 方法随时要求控件进行验证，如果验证通过，该方法返回 true（`%v` 替换设置为 `forced`）。\n\n有一个 `invalidcommand`\
    \ 配置选项（其工作方式类似于 `validatecommand`），每当验证失败时调用。您可以使用它来完成诸如将焦点强制返回到未通过验证的控件等操作。实际上，它很少使用。如前所述，输入框的\
    \ `invalid` 状态标志（可以通过 `instate invalid` 方法检查）会随着验证成功或失败而自动更新。\n\n其他百分比替换允许您获取编辑前的输入框内容（`%s`）、区分插入和删除（`%d`）、插入或删除发生的位置（`%i`）、正在插入或删除的内容（`%S`）、`validate`\
    \ 选项的当前设置（`%v`）以及控件的名称（`%W`）。\n\n## 6.7. 组合框\n\nttk.Combobox\nhttps://tkdocs.com/man/ttk_combobox\n\
    \n**组合框**控件将输入框与选项列表结合在一起。这允许用户既可以从您提供的一组值（例如，典型设置）中选择，也可以输入自己的值（例如，用于不太常见的情况）。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_88_0.png)\n\n组合框使用 `ttk.Combobox` 类创建：\n\
    \n```\ncountryvar = StringVar()\ncountry = ttk.Combobox(parent, textvariable=countryvar)\n\
    ```\n\n与输入框类似，`textvariable` 选项将程序中的变量链接到组合框的当前值。与其他控件一样，您应该在自己的代码中初始化链接的变量。\n\
