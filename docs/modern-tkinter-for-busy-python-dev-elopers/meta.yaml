    or examples. Usually, it''s because when those were written, the better ways didn''t
    even exist yet. (Here''s a litmus test for Tk documentation: does it use the archaic
    `pack` instead of the modern `grid`?) Later on, once you''re an expert, and you''re
    encountering some wacky situation where the typical choice doesn''t fit, you can
    go hunt around for alternatives.'
  - '[PAGE 13]


    # 1.5. How to Use


    While the book is designed to be used linearly, feel free to jump around as you
    see fit. We''ll often provide links to go for more information, such as the full
    reference for a particular command. While Tk''s native reference documentation
    is Tcl-based, it''s extremely accurate and well written, and usually easy to "translate"
    into Python. Unfortunately, there''s not yet Tkinter reference documentation that
    approaches its quality or completeness.


    You can find a GitHub repository containing many of the larger examples accessible
    via [https://tkdocs.com/code/](https://tkdocs.com/code/). You''ll also find direct
    links below the code listings in the book.


    # Conventions


    As is typically done, code listings, interpreter or shell commands and responses
    will be indicated with a `fixed-width font`. When showing an interactive session
    with the interpreter, the parts you enter will be in **`bold fixed-width`**.


    When describing procedure or method calls, the literal parts (e.g., the method
    name) will be in a plain fixed-width font, parameters where you should fill in
    the actual value will add italics, and optional parameters will be surrounded
    by ''?'', e.g. `set variable ?value?`.


    In general, when referring to these procedures or method calls in the text, we''ll
    omit punctuation (parentheses, commas, equals, etc.) that Tkinter requires. Code
    snippets show the full syntax, of course.


    You''ll see some paragraphs that are separated from the main text. These are used
    for several different things. Each is identified with a different icon, as follows:


    > 💡 *This paragraph will help point out common mistakes that people make or suggest
    useful but not necessarily obvious solutions related to the topic.*'
  - '[PAGE 14]


    This indicates a new way of doing things in Tk 8.5 or Tk 8.6 that is very different
    from how things would have been done previously. People familiar with older versions
    of Tk, or working on programs developed with older versions of Tk, should pay
    close attention.


    This paragraph provides some additional background information. It''s not strictly
    necessary to learning the topic at hand, but that might help you understand a
    bit more about how or why things are done the way they are.


    This indicates an area in Tk that could most charitably be described as a "rough
    edge." It may indicate a bad or missing API requiring you to use a workaround
    in your code. Because these things tend to get fixed up over time, it''s worth
    marking them in your code with a "TODO." That way, you can remember to go back
    later and see if a newer API resolves the problem cleanly.'
  - '[PAGE 15]


    # 2. A Brief History of Tk and Tkinter


    Tk is a user interface toolkit that makes it easy to build desktop graphical user
    interfaces. Tk is *cross-platform*, meaning the same code can be made to run the
    same on Windows, macOS, or X11 under a huge range of Unix systems (e.g., Linux).
    Compared with many user interface toolkits, Tk is also quite *high-level*, meaning
    that it takes care of many details for you. That makes your code simpler. You
    don''t have to be a professional programmer to use it. It''s ideal for when you
    want to quickly create a user interface, perhaps for a personal project or an
    internal company tool.


    Tk is also unique in that it was designed from the start to be paired with a high-level
    *dynamic programming language* (like Tcl, Python, Ruby, Perl) as opposed to lower-level
    languages like C or C++. In fact, you''ll find a Tk binding for most dynamic languages
    available today. It''s easy to embed and produces executables much smaller than
    many other GUI libraries. It also is BSD-licensed, making it attractive for both
    open source and commercial developers.


    Together, these factors make Tk an attractive option for people trying to develop
    a GUI on Windows, macOS, or Unix, especially if they want it to run on all three.
    And because Tk is used from dynamic programming languages, it''s an accessible
    tool not only for'
  - '[PAGE 16]


    hardcore developers but also for many people without a computer science or engineering
    background.


    Because it''s been around forever and has changed a lot over the years, there''s
    a ton of horribly outdated and incorrect information out there. This makes it
    pretty overwhelming if you just want to figure out if and how to use Tk today.
    That''s what this book will help with.


    Before diving in, we''ll provide a brief history of where it came from, why and
    how it caught on, and how things have evolved. This will help put a great many
    things in context.'
  - '[PAGE 17]


    # 2.1. The Early Years


    Tk was created around 1988 by John Ousterhout, a computer science professor at
    UC Berkeley. It was developed as a way to easily build GUI''s from his Tcl scripting
    language. Tcl was Unix-only at first, and so Tk ran under X11. The first open
    source release was around 1991, with rapid adoption starting about a year later.
    You can find [John''s recollections](http://www.tcl.tk) of the early years at
    the main Tcl/Tk developer site, [www.tcl.tk](http://www.tcl.tk).


    Tk caught on because lots of people at universities were using Unix/X11 in the
    early 1990s. The mainstream X11 libraries like Xt, Xaw and Motif were horribly
    painful to use. A "hello world" application would literally take a couple hundred
    lines of C or C++. Then Tk comes along, where a good looking "hello world" is
    a one-liner, and the toolkit took care of all the housekeeping like redrawing,
    clipping, hit detection, event dispatch, and more. It was a no-brainer.


    For a (very brief) moment, Tcl and Tk were the cool and exciting new things. Developers
    and users of languages other than Tcl paid attention too, and many language bindings
    to Tk were developed. Python''s Tkinter first appeared around mid-1994.'
  - '[PAGE 18]


    # 2.2. The Middle Years


    In 1994, John moved to Sun Labs, where he assembled a team to help move Tcl/Tk
    forward even more. The bulk of the team shifted to a startup called Scriptics
    (later Ajuba) and continued to evolve Tcl/Tk until the company was acquired in
    2000, mostly for the non-Tcl/Tk assets it had developed.


    For Tk, those years produced a major step forward, the development of the Windows
    and macOS versions. This meant that the same script to produce a GUI would run
    unmodified on Unix, Windows, or macOS.


    Stewardship of Tk (and Tcl) moved to a more community-centered model in mid-2000,
    with a [Tcl/Tk core team](https://www.tcl.tk/community/coreteam.html) at the center,
    but with much broader participation.


    Tk continued to evolve, but the pace slowed. Incremental enhancements and adding
    support for new macOS and Windows versions precluded any major leaps forward.
    Almost no core work aimed to track the dueling Gnome/KDE user interface standards
    emerging on Linux. Though Tk has always been highly customizable, unless you knew
    what you were doing and put in the effort, it started looking more and more dated.'
- md: '## 2.3. The Silent Revolution


    Tk 8.5.0 was released on December 20, 2007, and was as crucial a step forward
    as the Windows and macOS versions in 8.0, over ten years earlier. The core distribution
    included "new" widgets for such now-common components like trees, combo-boxes,
    tabbed notebooks, and more. These had only been available before as add-ons (with
    far too many to choose from).


    Most importantly, Tk 8.5 added a new "themed" widget set, which complements but
    does not replace the "classic" widget set. The classic widgets provide full backward
    compatibility, retaining their almost infinite flexibility, but often dated appearance.
    The new themed widgets look much better on their respective platforms out of the
    box. It was intended that developers should use them for nearly all mainstream
    user interface needs. The new widgets also support changing their look and feel
    via themes, making "skinnable" user interfaces easy for applications and platforms
    where they are appropriate.


    Why do I call this Tk''s "silent revolution?" This all happened about ten years
    past its heyday. At the time, web development had relegated desktop GUI''s to
    irrelevancy, and few developers were paying attention to Tk. And if you weren''t
    paying attention, you wouldn''t know that anything changed. Thanks to backward
    compatibility, for most people, it really didn''t. Sadly.


    ## 2.4. Tk Today


    This is being written in September 2020. In the dozen years since 8.5.0 was released,
    there have been approximately 30 new releases of the core Tcl/Tk package, which
    is currently at version 8.6.10. In that time, even though the development of new
    features has slowed, it''s continued to improve.


    ## 2.5. Tkinter


    Python''s Tkinter was one of the earlier bindings to Tk, and certainly one of
    the most popular. Tkinter was originally written by Fredrik Lundh. Tkinter works
    like most Tk bindings by embedding a Tcl interpreter inside the Python application.
    Tkinter commands are then translated into Tcl commands and evaluated in that interpreter.


    In 2009, Guilherme Polo added support for the newer "ttk" themed widgets from
    Tk into Tkinter, starting with Python 2.7 (on the 2.x branch), and Python 3.1.
    This opened the door for building far better user interfaces with Tkinter. Documentation
    remained the main obstacle to Python programmers learning about the new themed.


    ## 3. Installing Tkinter


    In this chapter, you''ll get Tk and Tkinter installed on your machine, verify
    it works, and then see a quick example of what a Tkinter program looks like.


    In the past, this was a multiple-step process. However, if you''re using Python
    3.7 or newer, you''re in luck! The Python binary installers for macOS and Windows,
    available at [python.org](https://python.org), now include everything you need
    to use Tkinter out of the box, including the underlying Tcl/Tk libraries.


    If you''re running on Linux, all popular distros have packages available that
    also make installing Tkinter a breeze.


    If you''re using an older version of Python or compiling from source, you''ll
    need to install Tcl/Tk on your system. If you''re in this situation, we''ll explain
    how to use a free distribution called ActiveTcl (made by [ActiveState](https://www.activestate.com))
    to do so.


    **Remember, this book assumes you''re using Python 3, not Python 2.** There are
    some significant differences between the two. That includes module naming, which
    is the first thing you''ll encounter when trying to use Tkinter. In Python 2.x,
    the module was named `Tkinter` (note the uppercase "T"), while in Python 3.x it
    is named `tkinter` (all lowercase).


    ### 3.1. Installing Tk on macOS


    #### The Easy Way


    As noted, the easiest way to get Tk and Tkinter installed on your system is using
    Python''s binary installer, available at [python.org](http://python.org). Thanks
    to work by Python core developer Ned Deily, binary installers starting with version
    3.7 include Tcl and Tk.


    > Remember, we''re using Python 3.x here, not 2.x. As of this writing, the latest
    3.9 installer (3.9.0rc1) includes Tk 8.6.8.


    If, however, you''re compiling Python yourself, you''ll have more work to do.
    Read on...


    #### Installing Tcl/Tk


    The Tkinter module is included with core Python, of course, but you''ll need a
    version of Tcl/Tk on your system to compile it against. Do yourself a huge favor
    and get the most recent version.


    Whatever you do, *do not rely on the Tk versions included in macOS!* Older versions
    included Tk 8.4.x. Even more recent macOS versions include an early 8.5 version
    (8.5.9, released in 2010), which has several serious bugs that are easily triggered
    by Tkinter.


    While there are several different ways to get Tcl and Tk onto your machine, the
    easiest and most recommended is to use the ActiveTcl distribution.


    In your web browser, visit [www.activestate.com/products/activetcl](http://www.activestate.com/products/activetcl).
    Download ActiveTcl (as of this writing, it''s version 8.6.9). Make sure to download
    an 8.6.x version, not something older! Note that you will need to create an account
    with ActiveState (no cost) to download it. After it''s downloaded, run the installer
    to get Tcl and Tk loaded onto your machine.


    > If you''re a masochist and want to read about other Tcl/Tk options and variations
    and how they interact with Python, see the [Mac Tcl/Tk](http://Mac Tcl/Tk) page
    at [python.org/download/mac/tcltk](http://python.org/download/mac/tcltk). If you
    want to compile Tcl/Tk from source, see [www.tcl.tk](http://www.tcl.tk).


    #### Compiling Python


    When compiling Python from source, you may need to tell it where to find the ActiveTcl
    (or other) distribution. Otherwise, it might not find any Tcl/Tk distribution
    (so Tkinter won''t work), or it could find the (ancient and broken) version of
    Tcl/Tk supplied with macOS.


    If you''re using Python 3.9 or newer, the build system will look in `/Library/Frameworks`,
    where ActiveState and other custom builds are typically installed.


    ```

    % ./configure

    % make

    ```


    > 💡 The initial "%" is the Unix shell prompt; you don''t have to type it. The
    rest of it should all go on one line, without adding line breaks.


    When compiling Python versions prior to 3.9, you will need to add two new command-line
    options to the initial `./configure` in the Python build process. The first provides
    the locations of the Tcl and Tk include files, and the second provides the locations
    of the Tcl and Tk libraries. These are usually found in two different locations
    (i.e., `Tcl.framework` and `Tk.framework`). You therefore need to provide two
    locations for the include files and two for the libraries. Note the location of
    the quotes in the command below and the spaces separating the Tcl and Tk paths.


    ```

    % ./configure --with-tcltk-includes="-I/Library/Frameworks/Tcl.framework/Headers
    -I/Library/Frameworks/Tk.framework/Headers" --with-tcltk-libs="/Library/Frameworks/Tcl.framework/Tcl
    /Library/Frameworks/Tk.framework/Tk"

    % make

    ```


    > 💡 If you have multiple versions of Tcl/Tk installed on your system (and in the
    same frameworks), you may need to check inside the framework to ensure the most
    recent version is marked as the current one. If not, you may need to adjust your
    paths to point to the specific version (i.e., Versions/8.x/) within each framework.


    When everything is built, be sure to test it out. Start Python from your terminal,
    e.g.


    ```

    % ./python.exe

    ```


    This should give you the Python command prompt. From the prompt, enter these two
    commands:


    ```

    >>> import tkinter

    >>> tkinter._test()

    ```


    This should pop up a small window; the first line at the top of the window should
    say "This is Tcl/Tk version 8.6"; make sure it is not 8.4 or 8.5!


    > Get an error saying No module named tkinter? You''re probably using Python 2.
    This book assumes Python 3.


    You can also get the exact version of Tcl/Tk that is being used with:


    ```

    >>> tkinter.Tcl().eval(''info patchlevel'')

    ```


    It should return something like ''8.6.9''.


    > Verified install using ActiveTcl 8.6.9.8609.2 and Python 3.90rc1 source code
    from python.org on macOS 10.15.6.'
  mdcn: '## 2.3. 静默的革命


    Tk 8.5.0 于 2007 年 12 月 20 日发布，其重要性堪比十多年前 8.0 版本中针对 Windows 和 macOS 的更新。核心发行版包含了用于树形视图、组合框、标签页笔记本等如今常见组件的“新”控件。在此之前，这些控件只能作为附加组件使用（而且选择过多）。


    最重要的是，Tk 8.5 引入了一套新的“主题化”控件集，它补充而非取代了“经典”控件集。经典控件提供了完全的向后兼容性，保留了其近乎无限的灵活性，但外观往往过时。新的主题化控件在各自平台上开箱即用时外观要好得多。其设计初衷是让开发者在几乎所有主流用户界面需求中都使用它们。新控件还支持通过主题更改其外观，使得在适合的应用程序和平台上轻松实现“可换肤”的用户界面。


    为什么我称此为 Tk 的“静默革命”？这一切都发生在其鼎盛时期大约十年之后。当时，Web 开发已将桌面 GUI 边缘化，很少有开发者关注 Tk。而如果你不关注，就不会知道发生了任何变化。由于向后兼容性，对大多数人来说，确实没有变化。可悲的是。


    ## 2.4. Tk 的现状


    本文写于 2020 年 9 月。自 8.5.0 发布以来的十几年间，核心 Tcl/Tk 包已发布了大约 30 个新版本，当前版本为 8.6.10。在此期间，尽管新功能的开发有所放缓，但它仍在持续改进。


    ## 2.5. Tkinter


    Python 的 Tkinter 是最早的 Tk 绑定之一，当然也是最受欢迎的之一。Tkinter 最初由 Fredrik Lundh 编写。Tkinter
    的工作方式与大多数 Tk 绑定类似，通过在 Python 应用程序内嵌入一个 Tcl 解释器。然后，Tkinter 命令被转换为 Tcl 命令并在该解释器中执行。


    2009 年，Guilherme Polo 将 Tk 中较新的“ttk”主题化控件支持添加到了 Tkinter 中，从 Python 2.7（在 2.x 分支上）和
    Python 3.1 开始。这为使用 Tkinter 构建更好的用户界面打开了大门。文档仍然是 Python 程序员了解新主题化控件的主要障碍。


    ## 3. 安装 Tkinter


    在本章中，你将把 Tk 和 Tkinter 安装到你的机器上，验证其是否正常工作，然后快速查看一个 Tkinter 程序的示例。


    过去，这是一个多步骤的过程。但是，如果你使用的是 Python 3.7 或更新版本，那么你很幸运！[python.org](https://python.org)
    上提供的 macOS 和 Windows 的 Python 二进制安装程序现在包含了开箱即用使用 Tkinter 所需的一切，包括底层的 Tcl/Tk 库。


    如果你在 Linux 上运行，所有流行的发行版都有可用的软件包，使得安装 Tkinter 也变得轻而易举。


    如果你使用的是旧版本的 Python 或从源代码编译，你需要在你的系统上安装 Tcl/Tk。如果你处于这种情况，我们将解释如何使用名为 ActiveTcl（由
    [ActiveState](https://www.activestate.com) 制作）的免费发行版来完成此操作。


    **请记住，本书假设你使用的是 Python 3，而不是 Python 2。** 两者之间存在一些显著差异。这包括模块命名，这是你尝试使用 Tkinter
    时首先会遇到的问题。在 Python 2.x 中，模块名为 `Tkinter`（注意大写的“T”），而在 Python 3.x 中，它名为 `tkinter`（全小写）。


    ### 3.1. 在 macOS 上安装 Tk


    #### 简单方法


    如前所述，在你的系统上安装 Tk 和 Tkinter 最简单的方法是使用 [python.org](http://python.org) 上提供的 Python
    二进制安装程序。得益于 Python 核心开发者 Ned Deily 的工作，从 3.7 版本开始的二进制安装程序包含了 Tcl 和 Tk。


    > 请记住，我们这里使用的是 Python 3.x，而不是 2.x。在撰写本文时，最新的 3.9 安装程序（3.9.0rc1）包含 Tk 8.6.8。


    但是，如果你自己编译 Python，你需要做更多的工作。请继续阅读...


    #### 安装 Tcl/Tk


    Tkinter 模块当然包含在核心 Python 中，但你需要在你的系统上安装一个 Tcl/Tk 版本以进行编译。帮自己一个大忙，获取最新版本。


    无论你做什么，*不要依赖 macOS 中包含的 Tk 版本！* 旧版本包含 Tk 8.4.x。即使是较新的 macOS 版本也包含一个早期的 8.5 版本（8.5.9，发布于
    2010 年），它有几个严重的错误，很容易被 Tkinter 触发。


    虽然有几种不同的方法可以将 Tcl 和 Tk 安装到你的机器上，但最简单且最推荐的方法是使用 ActiveTcl 发行版。


    在你的网络浏览器中，访问 [www.activestate.com/products/activetcl](http://www.activestate.com/products/activetcl)。下载
    ActiveTcl（在撰写本文时，版本为 8.6.9）。确保下载 8.6.x 版本，而不是更旧的版本！请注意，你需要创建一个 ActiveState 帐户（免费）才能下载它。下载后，运行安装程序以将
    Tcl 和 Tk 加载到你的机器上。


    > 如果你是个受虐狂，想了解其他 Tcl/Tk 选项和变体以及它们如何与 Python 交互，请参阅 [python.org/download/mac/tcltk](http://python.org/download/mac/tcltk)
    上的 [Mac Tcl/Tk](http://Mac Tcl/Tk) 页面。如果你想从源代码编译 Tcl/Tk，请参阅 [www.tcl.tk](http://www.tcl.tk)。


    #### 编译 Python


    从源代码编译 Python 时，你可能需要告诉它在哪里可以找到 ActiveTcl（或其他）发行版。否则，它可能找不到任何 Tcl/Tk 发行版（因此 Tkinter
    将无法工作），或者它可能找到 macOS 附带的（古老且损坏的）Tcl/Tk 版本。


    如果你使用的是 Python 3.9 或更新版本，构建系统将在 `/Library/Frameworks` 中查找，ActiveState 和其他自定义构建通常安装在此处。


    ```

    % ./configure

    % make

    ```


    > 💡 初始的“%”是 Unix shell 提示符；你不必输入它。其余部分应全部在一行中，不要添加换行符。


    编译 3.9 之前的 Python 版本时，你需要在 Python 构建过程的初始 `./configure` 中添加两个新的命令行选项。第一个提供 Tcl
    和 Tk 头文件的位置，第二个提供 Tcl 和 Tk 库的位置。它们通常位于两个不同的位置（即 `Tcl.framework` 和 `Tk.framework`）。因此，你需要为头文件提供两个位置，为库提供两个位置。注意下面命令中引号的位置以及分隔
    Tcl 和 Tk 路径的空格。


    ```

    % ./configure --with-tcltk-includes="-I/Library/Frameworks/Tcl.framework/Headers
    -I/Library/Frameworks/Tk.framework/Headers" --with-tcltk-libs="/Library/Frameworks/Tcl.framework/Tcl
    /Library/Frameworks/Tk.framework/Tk"

    % make

    ```


    > 💡 如果你的系统上安装了多个版本的 Tcl/Tk（并且在同一个框架中），你可能需要检查框架内部以确保最新版本被标记为当前版本。如果不是，你可能需要调整路径以指向每个框架内的特定版本（即
    Versions/8.x/）。


    一切构建完成后，请务必进行测试。从你的终端启动 Python，例如：


    ```

    % ./python.exe

    ```


    这应该会给你 Python 命令提示符。在提示符下，输入以下两个命令：


    ```

    >>> import tkinter

    >>> tkinter._test()

    ```


    这应该会弹出一个小窗口；窗口顶部的第一行应该显示“This is Tcl/Tk version 8.6”；确保它不是 8.4 或 8.5！


    > 收到错误消息“No module named tkinter”？你可能正在使用 Python 2。本书假设使用 Python 3。


    你也可以使用以下命令获取正在使用的 Tcl/Tk 的确切版本：


    ```

    >>> tkinter.Tcl().eval(''info patchlevel'')

    ```


    它应该返回类似 ''8.6.9'' 的内容。


    > 使用 ActiveTcl 8.6.9.8609.2 和来自 python.org 的 Python 3.90rc1 源代码在 macOS 10.15.6
    上验证安装。'
