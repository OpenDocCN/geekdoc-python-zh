    # 4.1. Design


    We''ll create a simple GUI tool to convert a distance in feet to the equivalent
    distance in meters. If we were to sketch this out, it might look something like
    this:


    ![](img/e444c319ec16222f00278651bee8c21d_33_0.png)


    A sketch of our feet to meters conversion program.


    So it looks like we have a short text entry widget that will let us type in the
    number of feet. A "Calculate" button will get the value out of that entry, perform
    the calculation, and put the result in a label below the entry. We''ve also got
    three static labels ("feet," "is equivalent to," and "meters"), which help our
    user figure out how to work the application.


    The next thing we need to do is look at the layout. The widgets that we''ve included
    seem to be naturally divided into a grid with three columns and three rows. In
    terms of layout, things seem to naturally divide into three columns and three
    rows, as illustrated below:'
