    # 17.4. Manipulating Styles


    In this section, we''ll see how to change the style''s appearance by modifying
    style options. You can do this either by modifying an existing style, or more
    typically, by creating a new style. We saw how to create a simple style that was
    derived from another one earlier:


    ```

    s.configure(''Emergency.TButton'', font=''helvetica 24'',

    foreground=''red'', padding=10)

    ```


    # Modifying a Style Option


    Modifying an option for an existing style is done in a similar fashion as modifying
    any other configuration option, by specifying the style, name of the option, and
    new value:


    ```

    s.configure(''TButton'', font=''helvetica 24'')

    ```


    You''ll learn more about what the valid options are shortly.


    > If you modify an existing style, like we''ve done here with `TButton`, that
    modification will apply to all widgets using that style (so by default, all buttons).
    That may well be what you want to do.


    To retrieve the current value of an option, use the `lookup` method:


    ```

    >>> s.lookup(''TButton'', ''font'')

    ''helvetica 24''

    ```


    # State Specific Style Options


    Besides the normal configuration options for the style, the widget author may
    have specified different options to use when the widget is in a particular widget
    state. For example, when a button is disabled, it may change the button''s label
    to grey.


    > Remember that the state is composed of one or more state flags (or their negation),
    as set by the widget''s `state` method, or queried via the `instate` method.'
