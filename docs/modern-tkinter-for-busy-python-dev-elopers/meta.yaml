    # 8.1. Listbox


    Listbox

    https://tkdocs.com/man/listbox


    A **listbox** widget displays a list of single-line text items, usually lengthy,
    and allows users to browse through the list, selecting one or more.

    Listboxes are part of the classic Tk widgets; there is not presently a listbox
    in the themed Tk widget set.


    > Tk''s treeview widget (which is themed) can also be used as a listbox (a one
    level deep tree), allowing you to use icons and styles with the list.

    It''s also likely that a multi-column (table) list widget will make it into Tk
    at some point, whether based on treeview or one of the available extensions.


    ![](img/e444c319ec16222f00278651bee8c21d_107_0.png)


    Listboxes are created using the `Listbox` class. A height configuration option
    can specify the number of lines the listbox will display at a time without scrolling:


    ```

    l = Listbox(parent, height=10)

    ```


    # Populating the Listbox Items'
  - '[PAGE 108]


    There''s an easy way and a hard way to populate and manage all the items in the
    listbox.


    Here''s the easy way. Each listbox has a `listvariable` configuration option,
    which allows you to link a variable (which must hold a list) to the listbox. Each
    element of this list is a string representing one item in the listbox. To add,
    remove, or rearrange items in the listbox, you can simply modify this variable
    as you would any other list. Similarly, to find out, e.g., which item is on the
    third line of the listbox, just look at the third element of the list variable.


    It''s actually not quite *that* easy. Tkinter doesn''t allow you to link regular
    Python lists to a `listbox`. As we saw with widgets like `entry`, we need to use
    a `StringVar` as an intermediary. It provides a mapping between Python''s lists
    and a string representation that the underlying Tk widgets can use. It also means
    that anytime we change the list, we need to update the `StringVar`.


    ```

    choices = ["apple", "orange", "banana"]

    choicesvar = StringVar(value=choices)

    l = Listbox(parent, listvariable=choicesvar)

    ...

    choices.append("peach")

    choicesvar.set(choices)

    ```


    The older, harder way to do things is to use a set of methods that are part of
    the listbox widget itself. They operate on the (internal) list of items maintained
    by the widget:


    +   - The `insert idx item ?item...?` method is used to add one or more items
    to the list; `idx` is a 0-based index indicating the position of the item before
    which the item(s) should be added; specify `end` to put the new items at the end
    of the list.

    - Use the `delete first ?last?` method to delete one or more items from the list;
    `first` and `last` are indices as per the `insert` method.

    - Use the `get first ?last?` method to return the contents of a single item at
    the given position, or a list of the items between `first` and `last`.'
  - '[PAGE 109]


    +   - The `size` method returns the number of items in the list.


    > ![UPGRADE](image_placeholder) The reason there is a hard way at all is because
    the `listvariable` option was only introduced in Tk 8.3. Before that, you were
    stuck with the hard way. Because using the list variable lets you use all the
    standard list operations, it provides a much simpler API. It''s certainly an upgrade
    worth considering if you have listboxes doing things the older way.


    # Selecting Items


    You can choose whether users can select only a single item at a time from the
    `listbox`, or if multiple items can simultaneously be selected. This is controlled
    by the `selectmode` option: the default is only being able to select a single
    item (`browse`), while a `selectmode` of `extended` allows users to select multiple
    items.


    > ![emoji](image_placeholder) The names `browse` and `extended`, again for backward
    compatibility reasons, are truly awful. This is made worse by the fact that there
    are two other modes, `single` and `multiple`, which you **should not use** (they
    use an old interaction style that is inconsistent with modern user interface and
    platform conventions).


    To find out which item or items in the listbox are currently selected, use the
    `curselection` method. It returns a list of indices of all items currently selected;
    this may be an empty list. For lists with a `selectmode` of `browse`, it will
    never be longer than one item. You can also use the `selection_includes index`
    method to check if the item with the given index is currently selected.


    ```

    if lbox.selection_includes(2): ...

    ```


    To programmatically change the selection, you can use the `selection_clear first
    ?last?` method to deselect either a single item or any within the range of indices
    specified. To select an item or all items in a range, use the `selection_set first
    ?last?` method. Both of these will not touch the selection of any items outside
    the range specified.'
