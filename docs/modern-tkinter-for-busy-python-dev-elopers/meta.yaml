- img_proc: true
  md: '# 5.1. Widgets


    Widgets are all the things that you see onscreen. In our example, we had a button,
    an entry, a few labels, and a frame. Others are things like checkboxes, tree views,
    scrollbars, text areas, and so on. Widgets are often referred to as "controls."
    You''ll also sometimes see them referred to as "windows," particularly in Tk''s
    documentation. This is a holdover from its X11 roots (under that terminology,
    both your toplevel application window and things like a button would be called
    windows).

    Here is an example showing some of Tk''s widgets, which we''ll cover individually
    shortly.


    ![](img/e444c319ec16222f00278651bee8c21d_47_0.png)


    # Widget Classes


    Widgets are objects, instances of classes that represent buttons, frames, and
    so on. When you want to create a widget, the first thing you''ll need to do is
    identify the specific class of the widget you''d like to instantiate. This book
    will help with that.


    # Widget Hierarchy'
  merge: -1
  pgno: 47
- img_proc: true
  md: 'Besides the widget class, you''ll need one other piece of information to create
    it: its *parent*. Widgets don''t float off in space. Instead, they''re contained
    within something else, like a window. In Tk, all widgets are part of a *widget
    (or window) hierarchy*, with a single root at the top of the hierarchy.


    In our metric conversion example, we had a single frame that was created as a
    child of the root window, and that frame had all the other controls as children.
    The root window was a *container* for the frame and was, therefore, the frame''s
    *parent*. The complete hierarchy for the example looked like this:


    ![](img/e444c319ec16222f00278651bee8c21d_48_0.png)


    This hierarchy can be arbitrarily deep, so you might have a button in a frame
    in another frame within the root window. Even a new window in your application
    (often called a *toplevel*) is part of that same hierarchy. That window and all
    its contents form a subtree of the overall widget hierarchy.'
  merge: -1
  pgno: 48
- img_proc: true
  md: '![](img/e444c319ec16222f00278651bee8c21d_49_0.png)


    # Creating Widgets


    Each separate widget is a Python object. When instantiating a widget, you must
    pass its parent as a parameter to the widget class. The *only* exception is the
    "root" window, which is the toplevel window that will contain everything else.
    That is automatically created when you instantiate `Tk`. It does not have a parent.
    For example:


    ```

    python

    root = Tk()

    content = ttk.Frame(root)

    button = ttk.Button(content)

    ```


    Whether or not you save the widget object in a variable is entirely up to you,
    depending on whether you''ll need to refer to it later. Because the object is
    inserted into the widget hierarchy, it won''t be garbage collected even if you
    don''t keep your own reference to it.'
  merge: -1
  pgno: 49
- img_proc: true
