    \ ./install.sh`），并按照提示操作。你最终将得到一个新安装的 ActiveTcl，位于例如 `/opt/ActiveTcl-8.6`。\n\n\
    接下来，从 [python.org](https://www.python.org) 下载当前的 Python 3.x 源代码发行版，并解压它。在你的 configure\
    \ 命令行中，你需要告诉它如何找到你安装的 Tcl/Tk 版本。然后像往常一样构建：\n\n```\n./configure --with-tcltk-includes='-I/opt/ActiveTcl-8.6/include'\
    \ \\\n            --with-tcltk-libs='/opt/ActiveTcl-8.6/lib/libtcl8.6.so /opt/ActiveTcl-8.6/lib/libtk8.6.so'\n\
    ```\n\n```\n% make\n% make install\n```\n\n> \U0001F4A1 如果你通过包管理器安装了 `tk8.6-dev`\
    \ 而不是使用 ActiveTcl，头文件应该位于 `/usr/include/tcl8.6`，库 `libtcl8.6.so` 和 `libtk8.6.so`\
    \ 应该位于 `/usr/lib/x86_64-linux-gnu`。\n\n请务必验证你的安装（见下文）。\n\n> \U0001F4A1 没有成功？可能是编译\
    \ Python 的 tkinter 代码时出错了。要检查，请从 Python 主源代码目录尝试 `touch Modules/_tkinter.c`（注意下划线），然后\
    \ `make` 重新编译它。仔细查看错误信息。\n\n最常见的问题是，你指定 Tcl/Tk 头文件和库的方式需要以某种方式更改。或者，如果你收到某些头文件找不到的消息（例如\
    \ `X11/Xlib.h`），你可能需要在你的 Linux 发行版上安装额外的包（例如 `apt-get install libx11-dev`）。一旦你让它编译成功，没有错误，别忘了\
    \ `make install`。\n\n### 验证你的安装\n\n在 Python 命令提示符下，输入以下两条命令：\n\n```\n>>> import\
    \ tkinter\n>>> tkinter._test()\n```\n\n这应该会弹出一个小窗口；窗口顶部的第一行应显示“This is Tcl/Tk\
    \ version 8.6”；请确保它不是 8.4！\n\n如果你尝试 `import tkinter` 时它给你一个错误（例如“If this fails\
    \ your Python may not be configured for Tk”），说明某些东西没有正确设置。如果你自己编译了 Python，请参阅上文检查编译错误。\n\
