  md: "# 7.5. Padding\n\nNormally, each column or row will be directly adjacent to\
    \ the next, so that widgets will be right next to each other. This is sometimes\
    \ what you want (think of a listbox and its scrollbar), but often you want some\
    \ space between widgets. In Tk, this is called padding, and there are several\
    \ ways you can choose to add it.\n\nWe've already actually seen one way, and that\
    \ is using a widget's own options to add the extra space around it. Not all widgets\
    \ have this, but one that does is a frame; this is useful because frames are most\
    \ often used as the master to grid other widgets. The frame's `padding` option\
    \ lets you specify a bit of extra padding inside the frame, whether the same amount\
    \ for each of the four sides or even different for each.\n\nA second way is using\
    \ the `padx` and `pady` grid options when adding the widget. As you'd expect,\
    \ `padx` puts a bit of extra space to the left and right, while `pady` adds extra\
    \ space top and bottom. A single value for the option puts the same padding on\
    \ both left and right (or top and bottom), while a two-value list lets you put\
    \ different amounts on left and right (or top and bottom). Note that this extra\
    \ padding is within the grid cell containing the widget.\n\nIf you want to add\
    \ padding around an entire row or column, the `columnconfigure` and `rowconfigure`\
    \ methods accept a `pad` option, which will do this for you.\n\nLet's add the\
    \ extra sticky, resizing, and padding behavior to our example (additions in bold).\n\
    \n```\nfrom tkinter import *\nfrom tkinter import ttk\n\nroot = Tk()\n\ncontent\
    \ = ttk.Frame(root, **padding=(3,3,12,12)**)\nframe = ttk.Frame(content, borderwidth=5,\
    \ relief=\"ridge\",\n                  width=200, height=100)\nnamelbl = ttk.Label(content,\
    \ text=\"Name\")\nname = ttk.Entry(content)\n```"
