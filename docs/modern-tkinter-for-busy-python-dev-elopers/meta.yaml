    ```

    if text.compare(idx1, "==", idx2"): # same position

    ```


    Valid operators are `==`, `!=`, `<`, `<=`, `>`, and `>=`.


    # Deleting Text


    While the `insert` method adds new text anywhere in the widget, the `delete start
    ?end?` method removes it. We can delete either a single'
