  md: "If you change the selection, you should also make sure that the newly selected\
    \ item is visible (i.e., it is not scrolled out of view). To do this, use the\
    \ `see index` method.\n\n```\nlbox.selection_set(idx)\nlbox.see(idx)\n```\n\n\
    When a user changes the selection, a `<<ListboxSelect>>` virtual event is generated.\
    \ You can bind to this to take any action you need. Depending on your application,\
    \ you may also want to bind to a double-click `<Double-1>` event and use it to\
    \ invoke an action with the currently selected item.\n\n```\nlbox.bind(\"<<ListboxSelect>>\"\
    , lambda e:\n    updateDetails(lbox.curselection()))\nlbox.bind(\"<Double-1>\"\
    , lambda e:\n    invokeAction(lbox.curselection()))\n```\n\n# Stylizing the List\n\
    \nLike most of the \"classic\" Tk widgets, you have immense flexibility in modifying\
    \ the appearance of a listbox. As described in the [reference manual](https://docs.python.org/3/library/tkinter.html),\
    \ you can modify the font the listbox items are displayed in, the foreground (text)\
    \ and background colors for items in their normal state, when selected, when the\
    \ widget is disabled, etc. There is also an `itemconfigure` method that allows\
    \ you to change the foreground and background colors of individual items.\n\n\
    As is often the case, restraint is useful. Generally, the default values will\
    \ be entirely suitable and a good match for platform conventions. In the example\
    \ we'll get to momentarily, we'll show how restrained use of these options can\
    \ be put to good effect, in this case displaying alternate lines of the listbox\
    \ in slightly different colors.\n\n# Keeping Extra Item Data\n\nThe `listvariable`\
    \ (or the internal list, if you're managing things the old way) holds the strings\
    \ that will be shown in the listbox. It's often the case, though, that each string\
    \ you're displaying is associated"
  merge: -1
  pgno: 110
- img_proc: true
  md: 'with some other data item. This might bean internal object that is meaningful
    to your program, but not meant to be displayed to users. In other words, what
    you''re really interested in is not so much the string displayed in the listbox,
    but the associated data item. For example, a listbox may display a list of names
    to users, but your program is really interested in the underlying user object
    (or id number) for each one, not the particular name.


    How can we associate this underlying value with the name that is displayed? Unfortunately,
    the listbox widget itself doesn''t offer any facilities, so it''s something we''ll
    have to manage separately. There are a couple of obvious approaches. First, if
    the displayed strings are guaranteed unique, you could use a hash table to map
    each name to its associated underlying object. This wouldn''t work well for peoples''
    names, where duplicates are possible, but could work for countries, which are
    unique.


    A second approach is to keep a second list, parallel to the list of strings displayed
    in the listbox. This second list will hold the underlying object associated with
    each item that is displayed. So the first item in the displayed strings list corresponds
    to the first item in the underlying objects list, the second to the second, etc.
    Any changes that you make in one list (insert, delete, reorder), you must make
    in the other. You can then easily map from the displayed list item to the underlying
    object, based on their position in the list.


    # Example


    Here is a silly example showing several of these listbox techniques. We''ll have
    a list of countries displayed. We''ll be able to select only a single country
    at a time. As we do so, a status bar will display the population of the country.
    You can press a button to send one of several gifts to the selected country''s
    head of state (well, not really, but use your imagination). Sending a gift can
    also be triggered by double-clicking the list or hitting the Return key.


    Behind the scenes, we maintain two lists in parallel. The first is a list of two-letter
    country codes. The other is the corresponding name for each country that we will
    display in the listbox. We also have a'
