    # Internal Padding


    You saw how the `padx` and `pady` grid options added extra space around the outside
    of a widget. There''s also a less used type of padding called "internal padding"
    controlled by the grid options `ipadx` and `ipady`.


    The difference can be subtle. Let''s say you have a frame that''s 20x20, and specify
    normal (external) padding of 5 pixels on each side. The frame will request a 20x20
    rectangle (its natural size) from the geometry manager. Normally, that''s what
    it will be granted, so it''ll get a 20x20 rectangle for the frame, surrounded
    by a 5-pixel border.


    With internal padding, the geometry manager will effectively add the extra padding
    to the widget when figuring out its natural size, as if the widget has requested
    a 30x30 rectangle. If the frame is centered, or attached to a single side or corner
    (using `sticky`), we''ll end up with a 20x20 frame with extra space around it.
    If, however, the frame is set to stretch (i.e., a `sticky` value of `we`, `ns`,
    or `nwes`), it will fill the extra space, resulting in a 30x30 frame, with no
    border.


