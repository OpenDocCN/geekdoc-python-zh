  md: "choose; to do this, set a floating-point number for each of the `from_` and\
    \ `to` configuration options.\n\nThere are several different ways you can set\
    \ the current value of the scale (which must be a floating-point value between\
    \ the `from_` and `to` values). You can set (or read, to get the current value)\
    \ the scale's `value` configuration option. You can link the scale to a variable\
    \ using the `variable` option. Or, you can call the scale's `set value` method\
    \ to change the value, or the `get` method to read the current value.\n\nA `command`\
    \ configuration option lets you specify a script to call whenever the scale is\
    \ changed. Tk will append the current value of the scale as a parameter each time\
    \ it calls this script (we saw a similar thing with extra parameters being added\
    \ to scrollbar callbacks).\n\n```\n# label tied to the same variable as the scale,\
    \ so auto-\nupdates\nnum = StringVar()\nttk.Label(root, textvariable=num).grid(column=0,\
