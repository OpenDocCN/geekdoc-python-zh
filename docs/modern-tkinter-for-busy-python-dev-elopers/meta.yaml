    # Incorporating Tk


    Our program starts by incorporating Tk.


    ```

    from tkinter import *

    from tkinter import ttk

    ```


    These two lines tell Python that our program needs two modules. The first, `tkinter`,
    is the standard binding to Tk. When imported, it loads the Tk library on your
    system. The second, `ttk`, is a submodule of `tkinter`. It implements Python''s
    binding to the newer "themed widgets" that were added to Tk in 8.5.


    > Notice that we''ve imported everything (*) from the tkinter module. That way,
    we can call tkinter functions etc. without prefixing them with the module name.
    This is standard Tkinter practice.


    However, because we''ve imported just `ttk` itself, we''ll need to prefix anything
    inside that submodule. For example, calling `Entry(...)` would refer to the `Entry`
    class inside the `tkinter` module (classic widgets). We''d need `ttk.Entry(...)`
    to use the `Entry` class inside `ttk` (themed widgets).


    As you''ll see, several classes are defined in both modules. Sometimes you will
    need one or the other, depending on the context. Explicitly requiring the `ttk`
    prefix facilitates this, and will be the style used in this book.


    > One of the first things you''ll find if you''re migrating Python 2.x code is
    that the name of the Tkinter module is now lowercase, i.e. `tkinter`, rather than
    `Tkinter`. In Python 2.x, `Ttk` was also its own module, not a sub-module of `Tkinter`.'
