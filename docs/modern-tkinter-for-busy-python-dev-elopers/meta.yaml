  - '[PAGE 6]


    # # 1. Introduction


    This book will help you quickly get up to speed and build mainstream desktop graphical
    user interfaces with Python 3 and Tkinter. As you may know, Tkinter is the Python
    interface to a GUI library called Tk. It was initially developed for the Tcl language
    but widely adopted by other dynamic languages, including Ruby, Perl, and of course,
    Python.


    This book will teach you what you need to know about Tkinter and Tk and, in particular,
    Tk 8.5 and 8.6. Tk 8.5 was a milestone release. It marked a significant departure
    from older versions of Tk that most people know and love recognize.


    The downside is that unless you know one or two crucial things, it''s actually
    *not* that significant a release. In fact, it will seem like nothing changed at
    all. Due to backward compatibility, unless existing programs make a few simple
    changes, they won''t look any different. (Imagine if you just moved into a rustic
    and quirky historical home. You''d want someone to point out where they''ve hidden
    the light switches and power outlets, wouldn''t you?)


    If you''re new to Tk or creating a new program, this book will ensure you get
    started the right way. If you''ve used Tk before, it will help you bring your
    knowledge right up to date. And if you''re updating code that may have been written
    years ago, you''ll see step-by-step how to bring it into the modern age. It''s
    a cliche, but I can''t'
  - '[PAGE 7]


    believe how much I''ve learned in writing this book, and I''ve been using Tk for
    over twenty-five years.


    The general state of Tk documentation (outside the Tcl-oriented reference documentation,
    which is excellent) is unfortunately not at a high point these days. This is particularly
    true for developers using Tk from languages other than Tcl, and developers working
    on multiple platforms. So this book will, as much as possible, target developers
    on the three main platforms (Windows, macOS, and Linux).


    It''s also not a reference guide. It''s not going to cover everything, just the
    essentials you need in 95% of applications. The rest you can find in reference
    documentation.'
  - '[PAGE 8]


    # 1.1. Who This Book Is For


    This book is designed for developers building tools and applications in Tk. It''s
    also concerned with fairly mainstream graphical user interfaces, with buttons,
    lists, checkboxes, rich text editing, 2D graphics, etc. So if you''re either looking
    to hack on Tk''s internal C code or build the next great 3D immersive game interface,
    this is probably not the material for you.


    This book also doesn''t teach you Python, so you should have a basic grasp on
    that already. This book uses Python 3 exclusively and does not cover using Tkinter
    in Python 2. Similarly, you should have a basic familiarity with desktop applications
    in general. While you don''t have to be a user interface designer, some appreciation
    of GUI design is always helpful.'
  - '[PAGE 9]


    # 1.2. Why Tkinter?


    If you''re new to building desktop graphical user interfaces in Python, why might
    you use Tkinter? After all, there are many options, including PyQt, PySide, WxPython,
    PySimpleGUI, and Kivy. Each has various pluses and minuses.


    There are several reasons people chose Tkinter. It''s Python''s default GUI toolkit,
    the only one included in its standard library. It''s cross-platform so that the
    same code can run across Windows, macOS, or Linux systems. Perhaps most importantly,
    it''s easy to learn and work with. It keeps boilerplate and overhead to a minimum.
    It''s Pythonic; it just feels right. Unlike many options which are front ends
    to C++ libraries, Tkinter is built on a user interface tool designed for dynamic
    languages.


    Many large commercial applications these days are web-based. In fact, web (and
    mobile) development sucked most of the life out of desktop user interface toolkits,
    which is why so many mature tools are still widely used today. Writing desktop
    applications still makes sense in many situations, whether open source projects,
    personal or company-internal tools, or putting together a quick front end for
    a specific project. These are situations where Tkinter excels.'
  - '[PAGE 10]


    # 1.3. Modern Best Practices


    This book is all about building modern user interfaces using the current tools
    Tk has to offer. It''s all about the best practices you need to know to do this.


    For most tools, you wouldn''t think you''d have to say something like that. But
    for Tk, that''s not the case. Tk has had a very long evolution, and any evolution
    tends to leave you with a bit of cruft. Couple that with how much graphical user
    interface platforms and standards have evolved in that time. You can see where
    keeping something as large and complex as a GUI library up to date (and backward
    compatible) may be challenging.


    Tk has, for most of its lifetime, gotten a bad rap, to put it mildly. Some of
    this has been well deserved, most of it not so much. Like any GUI tool, it can
    be used to create absolutely terrible looking and outdated user interfaces. Still,
    with the proper care and attention, it can also be used to develop spectacularly
    good ones. Most people know about the crappy ones; most of the good ones people
    don''t even know are done in Tk. In this book, we''re going to focus on what you
    need to build good user interfaces. Thankfully, this isn''t nearly as hard as
    it used to be before Tk 8.5.


    So to sum up: modern desktop graphical user interfaces, using modern conventions
    and design sense, using the modern tools provided by Tk 8.5 and 8.6.


    # Tk Extensions


    When it comes to modern best practices, Tk extensions deserve a special word of
    note. Over the years, developers have created all kinds of add-ons to Tk, for
    example, adding new widgets not available in the core (or at least not at the
    time). Some well-known and quite popular Tk extensions include BLT, Tix, iWidgets,
    BWidgets; there are many, many others.


    Many of these extensions were created decades ago. Because core Tk has always
    been highly backward compatible, these'
- md: 'extensions generally continue to work with newer versions. However, they may
    not reflect current platform conventions or styles. While they "work", they can
    make your application appear extremely dated or out of place. In many cases, the
    facilities they provide have been obsoleted by newer and more modern facilities
    recently built into Tk itself.


    If you decide to use Tk extensions, it''s highly recommended that you investigate
    and review your choices carefully.


    ## 1.4. The Better Way Forward


    Tk gives you a lot of choices. There are at least six different ways to layout
    widgets on the screen. Multiple widgets can be used to accomplish the same thing,
    and that''s before considering any Tk extensions. Tk emphasized backward compatibility,
    which is a double-edged sword. Most of these old ways of doing things still keep
    working, year after year. That doesn''t necessarily mean you should still be using
    some of them.


    So there are many in Tk, but frankly, all that choice gets in the way. If you
    want to learn and use Tk, you don''t need to know ten different ways to accomplish
    the same thing. You shouldn''t need to do all the research, explore all the options,
    and make a choice yourself. You need to know the *right* way to do things today.
    That''s what this book will give you. Think of it as the documentation equivalent
    of [opinionated software](https://en.wikipedia.org/wiki/Opinionated_software).


    So we''ll often use different ways of doing things than you''d find in other documentation
    or examples. Usually, it''s because when those were written, the better ways didn''t
    even exist yet. (Here''s a litmus test for Tk documentation: does it use the archaic
    `pack` instead of the modern `grid`?) Later on, once you''re an expert, and you''re
    encountering some wacky situation where the typical choice doesn''t fit, you can
    go hunt around for alternatives.


    ## 1.5. How to Use


    While the book is designed to be used linearly, feel free to jump around as you
    see fit. We''ll often provide links to go for more information, such as the full
    reference for a particular command. While Tk''s native reference documentation
    is Tcl-based, it''s extremely accurate and well written, and usually easy to "translate"
    into Python. Unfortunately, there''s not yet Tkinter reference documentation that
    approaches its quality or completeness.


    You can find a GitHub repository containing many of the larger examples accessible
    via [https://tkdocs.com/code/](https://tkdocs.com/code/). You''ll also find direct
    links below the code listings in the book.


    ## Conventions


    As is typically done, code listings, interpreter or shell commands and responses
    will be indicated with a `fixed-width font`. When showing an interactive session
    with the interpreter, the parts you enter will be in **`bold fixed-width`**.


    When describing procedure or method calls, the literal parts (e.g., the method
    name) will be in a plain fixed-width font, parameters where you should fill in
    the actual value will add italics, and optional parameters will be surrounded
    by ''?'', e.g. `set variable ?value?`.


    In general, when referring to these procedures or method calls in the text, we''ll
    omit punctuation (parentheses, commas, equals, etc.) that Tkinter requires. Code
    snippets show the full syntax, of course.


    You''ll see some paragraphs that are separated from the main text. These are used
    for several different things. Each is identified with a different icon, as follows:


    > 💡 *This paragraph will help point out common mistakes that people make or suggest
    useful but not necessarily obvious solutions related to the topic.*


    This indicates a new way of doing things in Tk 8.5 or Tk 8.6 that is very different
    from how things would have been done previously. People familiar with older versions
    of Tk, or working on programs developed with older versions of Tk, should pay
    close attention.


    This paragraph provides some additional background information. It''s not strictly
    necessary to learning the topic at hand, but that might help you understand a
    bit more about how or why things are done the way they are.


    This indicates an area in Tk that could most charitably be described as a "rough
    edge." It may indicate a bad or missing API requiring you to use a workaround
    in your code. Because these things tend to get fixed up over time, it''s worth
    marking them in your code with a "TODO." That way, you can remember to go back
    later and see if a newer API resolves the problem cleanly.


    ## 2. A Brief History of Tk and Tkinter


    Tk is a user interface toolkit that makes it easy to build desktop graphical user
    interfaces. Tk is *cross-platform*, meaning the same code can be made to run the
    same on Windows, macOS, or X11 under a huge range of Unix systems (e.g., Linux).
    Compared with many user interface toolkits, Tk is also quite *high-level*, meaning
    that it takes care of many details for you. That makes your code simpler. You
    don''t have to be a professional programmer to use it. It''s ideal for when you
    want to quickly create a user interface, perhaps for a personal project or an
    internal company tool.


    Tk is also unique in that it was designed from the start to be paired with a high-level
    *dynamic programming language* (like Tcl, Python, Ruby, Perl) as opposed to lower-level
    languages like C or C++. In fact, you''ll find a Tk binding for most dynamic languages
    available today. It''s easy to embed and produces executables much smaller than
    many other GUI libraries. It also is BSD-licensed, making it attractive for both
    open source and commercial developers.


    Together, these factors make Tk an attractive option for people trying to develop
    a GUI on Windows, macOS, or Unix, especially if they want it to run on all three.
    And because Tk is used from dynamic programming languages, it''s an accessible
    tool not only for hardcore developers but also for many people without a computer
    science or engineering background.


    Because it''s been around forever and has changed a lot over the years, there''s
    a ton of horribly outdated and incorrect information out there. This makes it
    pretty overwhelming if you just want to figure out if and how to use Tk today.
    That''s what this book will help with.


    Before diving in, we''ll provide a brief history of where it came from, why and
    how it caught on, and how things have evolved. This will help put a great many
    things in context.


    ### 2.1. The Early Years


    Tk was created around 1988 by John Ousterhout, a computer science professor at
    UC Berkeley. It was developed as a way to easily build GUI''s from his Tcl scripting
    language. Tcl was Unix-only at first, and so Tk ran under X11. The first open
    source release was around 1991, with rapid adoption starting about a year later.
    You can find [John''s recollections](http://www.tcl.tk) of the early years at
    the main Tcl/Tk developer site, [www.tcl.tk](http://www.tcl.tk).


    Tk caught on because lots of people at universities were using Unix/X11 in the
    early 1990s. The mainstream X11 libraries like Xt, Xaw and Motif were horribly
    painful to use. A "hello world" application would literally take a couple hundred
    lines of C or C++. Then Tk comes along, where a good looking "hello world" is
    a one-liner, and the toolkit took care of all the housekeeping like redrawing,
    clipping, hit detection, event dispatch, and more. It was a no-brainer.


    For a (very brief) moment, Tcl and Tk were the cool and exciting new things. Developers
    and users of languages other than Tcl paid attention too, and many language bindings
    to Tk were developed. Python''s Tkinter first appeared around mid-1994.


    ### 2.2. The Middle Years


    In 1994, John moved to Sun Labs, where he assembled a team to help move Tcl/Tk
    forward even more. The bulk of the team shifted to a startup called Scriptics
    (later Ajuba) and continued to evolve Tcl/Tk until the company was acquired in
    2000, mostly for the non-Tcl/Tk assets it had developed.


    For Tk, those years produced a major step forward, the development of the Windows
    and macOS versions. This meant that the same script to produce a GUI would run
    unmodified on Unix, Windows, or macOS.


    Stewardship of Tk (and Tcl) moved to a more community-centered model in mid-2000,
    with a [Tcl/Tk core team](https://www.tcl.tk/community/coreteam.html) at the center,
    but with much broader participation.


    Tk continued to evolve, but the pace slowed. Incremental enhancements and adding
    support for new macOS and Windows versions precluded any major leaps forward.
    Almost no core work aimed to track the dueling Gnome/KDE user interface standards
    emerging on Linux. Though Tk has always been highly customizable, unless you knew
    what you were doing and put in the effort, it started looking more and more dated.'
  mdcn: '扩展通常能继续在新版本中运行。然而，它们可能无法反映当前的平台惯例或风格。虽然它们“能用”，但可能会让你的应用程序显得极其过时或格格不入。在许多情况下，它们提供的功能已被Tk本身内置的更新、更现代的功能所取代。


    如果你决定使用Tk扩展，强烈建议你仔细研究和审查你的选择。


    ## 1.4. 更好的前进方式


    Tk给了你很多选择。至少有六种不同的方式可以在屏幕上布局小部件。多种小部件可以用来完成同一件事，而这还没考虑任何Tk扩展。Tk强调向后兼容，这是一把双刃剑。这些旧的做事方式大多仍然有效，年复一年。但这并不一定意味着你仍然应该使用其中一些。


    所以Tk里有很多选择，但坦率地说，所有这些选择反而成了障碍。如果你想学习和使用Tk，你不需要知道十种不同的方式来完成同一件事。你不应该需要做所有的研究，探索所有的选项，然后自己做出选择。你需要知道今天做事的*正确*方式。这就是本书将要给你的。可以把它看作是[固执己见的软件](https://en.wikipedia.org/wiki/Opinionated_software)的文档等价物。


    因此，我们经常会使用与其他文档或示例中不同的做事方式。通常，这是因为当那些文档编写时，更好的方式甚至还不存在。（这里有一个Tk文档的试金石：它是否使用了古老的`pack`而不是现代的`grid`？）稍后，一旦你成为专家，并且遇到了一些典型选择不适用的古怪情况，你可以去寻找替代方案。


    ## 1.5. 如何使用


    虽然本书设计为线性使用，但你可以根据需要随意跳转。我们经常会提供链接以获取更多信息，例如某个命令的完整参考。虽然Tk的原生参考文档是基于Tcl的，但它极其准确且写得很好，通常很容易“翻译”成Python。不幸的是，目前还没有质量或完整性接近它的Tkinter参考文档。


    你可以在[https://tkdocs.com/code/](https://tkdocs.com/code/)找到一个包含许多较大示例的GitHub仓库。你也会在本书的代码清单下方找到直接链接。


    ## 约定


    按照惯例，代码清单、解释器或shell命令及其响应将用`固定宽度字体`表示。当显示与解释器的交互会话时，你输入的部分将用**`粗体固定宽度`**表示。


    在描述过程或方法调用时，字面部分（例如，方法名）将使用普通固定宽度字体，需要你填入实际值的参数将添加斜体，可选参数将用''?''包围，例如`set variable
    ?value?`。


    通常，在文本中引用这些过程或方法调用时，我们会省略Tkinter要求的标点符号（括号、逗号、等号等）。当然，代码片段会显示完整的语法。


    你会看到一些与正文分开的段落。这些用于几种不同的目的。每个都用不同的图标标识，如下所示：


    > 💡 *本段将帮助指出人们常犯的错误，或就主题提出有用但不一定显而易见的解决方案。*


    这表示在Tk 8.5或Tk 8.6中有一种新的做事方式，与以前的方式截然不同。熟悉旧版Tk或使用旧版Tk开发程序的人应特别注意。


    本段提供了一些额外的背景信息。它对于学习当前主题并非严格必要，但可能有助于你更多地了解事情为何或如何以这种方式完成。


    这表示Tk中一个最善意地可以描述为“粗糙边缘”的领域。它可能表示一个糟糕或缺失的API，需要你在代码中使用变通方法。因为这些事情往往会随着时间的推移得到修复，所以值得在代码中用“TODO”标记它们。这样，你就可以记得稍后回来查看是否有新的API能干净利落地解决问题。


    ## 2. Tk和Tkinter简史


    Tk是一个用户界面工具包，可以轻松构建桌面图形用户界面。Tk是*跨平台*的，意味着相同的代码可以在Windows、macOS或X11（在大量Unix系统下，例如Linux）上运行相同。与许多用户界面工具包相比，Tk也相当*高级*，意味着它为你处理了许多细节。这使你的代码更简单。你不必是专业程序员也能使用它。当你想快速创建用户界面时，比如用于个人项目或公司内部工具，它是理想的选择。


    Tk的独特之处还在于，它从一开始就被设计为与高级*动态编程语言*（如Tcl、Python、Ruby、Perl）配对使用，而不是像C或C++这样的低级语言。事实上，你会发现大多数当今可用的动态语言都有Tk绑定。它易于嵌入，并且生成的可执行文件比许多其他GUI库小得多。它也是BSD许可的，对开源和商业开发者都很有吸引力。


    这些因素共同使得Tk成为在Windows、macOS或Unix上开发GUI的人们的一个有吸引力的选择，特别是如果他们希望它能在所有三个平台上运行。而且因为Tk是从动态编程语言中使用的，它不仅对核心开发者来说是一个易于使用的工具，对许多没有计算机科学或工程背景的人来说也是如此。


    因为它已经存在了很长时间，并且多年来变化很大，所以存在大量极其过时和不正确的信息。如果你只是想弄清楚今天是否以及如何使用Tk，这会让你感到非常不知所措。这就是本书将要帮助解决的问题。


    在深入探讨之前，我们将简要介绍它的起源、为何以及如何流行起来，以及事物是如何演变的。这将有助于将许多事情置于背景中。


    ### 2.1. 早期岁月


    Tk大约在1988年由加州大学伯克利分校的计算机科学教授John Ousterhout创建。它被开发为一种从他的Tcl脚本语言轻松构建GUI的方式。Tcl最初仅适用于Unix，因此Tk在X11下运行。第一次开源发布大约在1991年，大约一年后开始迅速普及。你可以在主要的Tcl/Tk开发者网站[www.tcl.tk](http://www.tcl.tk)找到[John对早期岁月的回忆](http://www.tcl.tk)。


    Tk之所以流行，是因为在1990年代初，许多大学的人都在使用Unix/X11。像Xt、Xaw和Motif这样的主流X11库使用起来极其痛苦。一个“hello
    world”应用程序实际上需要几百行C或C++代码。然后Tk出现了，一个漂亮的“hello world”只需一行代码，工具包处理了所有杂务，如重绘、裁剪、命中检测、事件分发等。这是不假思索的选择。


    在（非常短暂的）一段时间里，Tcl和Tk是酷炫且令人兴奋的新事物。其他语言的开发者和用户也注意到了，并且开发了许多Tk的语言绑定。Python的Tkinter大约在1994年中期首次出现。


    ### 2.2. 中期岁月


    1994年，John加入了Sun Labs，在那里他组建了一个团队，帮助进一步推动Tcl/Tk的发展。团队的大部分成员转移到了一家名为Scriptics（后来是Ajuba）的初创公司，并继续发展Tcl/Tk，直到该公司在2000年被收购，主要是为了它开发的非Tcl/Tk资产。


    对于Tk来说，那些年带来了重大进步，开发了Windows和macOS版本。这意味着产生GUI的相同脚本可以在Unix、Windows或macOS上无需修改即可运行。


    Tk（和Tcl）的管理在2000年中期转向了更以社区为中心的模式，以[Tcl/Tk核心团队](https://www.tcl.tk/community/coreteam.html)为中心，但参与范围更广。


    Tk继续发展，但步伐放缓。增量增强和对新macOS和Windows版本的支持排除了任何重大飞跃。几乎没有核心工作旨在跟踪Linux上出现的Gnome/KDE用户界面标准之争。尽管Tk一直高度可定制，但除非你知道自己在做什么并付出努力，否则它开始显得越来越过时。'
