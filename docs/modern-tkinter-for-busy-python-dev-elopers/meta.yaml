  md: "# Widget Introspection\n\nTk exposes a treasure trove of information about\
    \ each and every widget that your application can take advantage of. Much of it\
    \ is available via the `winfo` facility; see the see the [winfo](https://tkdocs.com/man/winfo)\
    \ command reference for full details.\n\nThis short example traverses the widget\
    \ hierarchy, using each widget's `winfo_children` method to identify any child\
    \ widgets that need to examined. For each widget, we print some basic information,\
    \ including it's class (button, frame, etc.), it's width and height, and it's\
    \ position relative to it's parent.\n\n```\ndef print_hierarchy(w, depth=0):\n\
    \    print(' '*depth + w.winfo_class() + ' w=' +\nstr(w.winfo_width()) + ' h='\
    \ + str(w.winfo_height()) + ' x=' +\nstr(w.winfo_x()) + ' y=' + str(w.winfo_y()))\n\
    \    for i in w.winfo_children():\n        print_hierarchy(i, depth+1)\nprint_hierarchy(root)\n\
    ```\n\nThe following are some of the most useful methods:\n\n+   - `winfo_class`:\
    \ a class identifying the type of widget, e.g. `TButton` for a themed button\n\
    - `winfo_children`: a list of widgets that are the direct children of a widget\
