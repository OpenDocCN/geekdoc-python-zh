    # 12.3. Paned Windows


    ttk.Panedwindow

    https://tkdocs.com/man/ttk_panedwindow


    A **panedwindow** widget lets you stack two or more resizable widgets above and
    below each other (or to the left and right). Users can adjust the relative heights
    (or widths) of each pane by dragging a *sash* located between them. Typically
    the widgets you''re adding to a panedwindow will be frames containing many other
    widgets.


    ![](img/e444c319ec16222f00278651bee8c21d_185_0.png)


    Panedwindows are created using the `ttk.Panedwindow` class:


    ```

    p = ttk.Panedwindow(parent, orient=VERTICAL)

    # two panes, each of which would get widgets gridded into it:

    f1 = ttk.LabelFrame(p, text=''Pane1'', width=100, height=100)

    f2 = ttk.LabelFrame(p, text=''Pane2'', width=100, height=100)

    p.add(f1)

    p.add(f2)

    ```


    A panedwindow is either `vertical` (its panes are stacked vertically on top of
    each other) or `horizontal`. Importantly, each pane you add to the panedwindow
    must be a *direct child* of the panedwindow itself.'
