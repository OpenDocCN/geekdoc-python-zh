    where they are appropriate.


    Why do I call this Tk''s "silent revolution?" This all happened about ten years
    past its heyday. At the time, web development had relegated desktop GUI''s to
    irrelevancy, and few developers were paying attention to Tk. And if you weren''t
    paying attention, you wouldn''t know that anything changed. Thanks to backward
    compatibility, for most people, it really didn''t. Sadly.'
  - '[PAGE 20]


    # 2.4. Tk Today


    This is being written in September 2020. In the dozen years since 8.5.0 was released,
    there have been approximately 30 new releases of the core Tcl/Tk package, which
    is currently at version 8.6.10. In that time, even though the development of new
    features has slowed, it''s continued to improve.'
  - '[PAGE 21]


    # 2.5. Tkinter


    Python''s Tkinter was one of the earlier bindings to Tk, and certainly one of
    the most popular. Tkinter was originally written by Fredrik Lundh. Tkinter works
    like most Tk bindings by embedding a Tcl interpreter inside the Python application.
    Tkinter commands are then translated into Tcl commands and evaluated in that interpreter.

    In 2009, Guilherme Polo added support for the newer "ttk" themed widgets from
    Tk into Tkinter, starting with Python 2.7 (on the 2.x branch), and Python 3.1.
    This opened the door for building far better user interfaces with Tkinter. Documentation
    remained the main obstacle to Python programmers learning about the new themed.'
  - '[PAGE 22]


    # # 3. Installing Tkinter


    In this chapter, you''ll get Tk and Tkinter installed on your machine, verify
    it works, and then see a quick example of what a Tkinter program looks like.


    In the past, this was a multiple-step process. However, if you''re using Python
    3.7 or newer, you''re in luck! The Python binary installers for macOS and Windows,
    available at [python.org](https://python.org), now include everything you need
    to use Tkinter out of the box, including the underlying Tcl/Tk libraries.


    If you''re running on Linux, all popular distros have packages available that
    also make installing Tkinter a breeze.


    If you''re using an older version of Python or compiling from source, you''ll
    need to install Tcl/Tk on your system. If you''re in this situation, we''ll explain
    how to use a free distribution called ActiveTcl (made by [ActiveState](https://www.activestate.com))
    to do so.


    **Remember, this book assumes you''re using Python 3, not Python 2.** There are
    some significant differences between the two. That includes module naming, which
    is the first thing you''ll encounter when trying to use Tkinter. In Python 2.x,
    the module was named `Tkinter` (note the uppercase "T"), while in Python 3.x it
    is named `tkinter` (all lowercase).'
  - '[PAGE 23]


    # # 3.1. Installing Tk on macOS


    # ## The Easy Way


    As noted, the easiest way to get Tk and Tkinter installed on your system is using
    Python''s binary installer, available at [python.org](http://python.org). Thanks
    to work by Python core developer Ned Deily, binary installers starting with version
    3.7 include Tcl and Tk.


    > Remember, we''re using Python 3.x here, not 2.x. As of this writing, the latest
    3.9 installer (3.9.0rc1) includes Tk 8.6.8.


    If, however, you''re compiling Python yourself, you''ll have more work to do.
    Read on...


    # ## Installing Tcl/Tk


    The Tkinter module is included with core Python, of course, but you''ll need a
    version of Tcl/Tk on your system to compile it against. Do yourself a huge favor
    and get the most recent version.


    Whatever you do, *do not rely on the Tk versions included in macOS!* Older versions
    included Tk 8.4.x. Even more recent macOS versions include an early 8.5 version
    (8.5.9, released in 2010), which has several serious bugs that are easily triggered
    by Tkinter.


    While there are several different ways to get Tcl and Tk onto your machine, the
    easiest and most recommended is to use the ActiveTcl distribution.


    In your web browser, visit [www.activestate.com/products/activetcl](http://www.activestate.com/products/activetcl).
    Download ActiveTcl (as of this writing, it''s version 8.6.9). Make sure to download
    an 8.6.x version, not something older! Note that you will need to create an account
    with ActiveState (no cost) to download it. After it''s downloaded, run the installer
    to get Tcl and Tk loaded onto your machine.


    > If you''re a masochist and want to read about other Tcl/Tk options and variations
    and how they interact with Python, see the [Mac Tcl/Tk](http://Mac Tcl/Tk) page'
  - '[PAGE 24]


    at [python.org/download/mac/tcltk](http://python.org/download/mac/tcltk). If you
    want to compile Tcl/Tk from source, see [www.tcl.tk](http://www.tcl.tk).


    # Compiling Python


    When compiling Python from source, you may need to tell it where to find the ActiveTcl
    (or other) distribution. Otherwise, it might not find any Tcl/Tk distribution
    (so Tkinter won''t work), or it could find the (ancient and broken) version of
    Tcl/Tk supplied with macOS.

    If you''re using Python 3.9 or newer, the build system will look in `/Library/Frameworks`,
    where ActiveState and other custom builds are typically installed.


    ```

    % ./configure

    % make

    ```


    > 💡 The initial "%" is the Unix shell prompt; you don''t have to type it. The
    rest of it should all go on one line, without adding line breaks.


    When compiling Python versions prior to 3.9, you will need to add two new command-line
    options to the initial `./configure` in the Python build process. The first provides
    the locations of the Tcl and Tk include files, and the second provides the locations
    of the Tcl and Tk libraries. These are usually found in two different locations
    (i.e., `Tcl.framework` and `Tk.framework`). You therefore need to provide two
    locations for the include files and two for the libraries. Note the location of
    the quotes in the command below and the spaces separating the Tcl and Tk paths.


    ```

    % ./configure --with-tcltk-includes="-I/Library/Frameworks/Tcl.framework/Headers
    -I/Library/Frameworks/Tk.framework/Headers" --with-tcltk-libs="/Library/Frameworks/Tcl.framework/Tcl
    /Library/Frameworks/Tk.framework/Tk"

    % make

    ```


    > 💡 If you have multiple versions of Tcl/Tk installed on your system (and in the
    same frameworks), you may need to check inside the framework to'
  - '[PAGE 25]


    > ensure the most recent version is marked as the current one. If not, you may
    need to adjust your paths to point to the specific version (i.e., Versions/8.x/)
    within each framework.


    When everything is built, be sure to test it out. Start Python from your terminal,
    e.g.


    ```

    % ./python.exe

    ```


    This should give you the Python command prompt. From the prompt, enter these two
    commands:


    ```

    >>> import tkinter

    >>> tkinter._test()

    ```


    This should pop up a small window; the first line at the top of the window should
    say "This is Tcl/Tk version 8.6"; make sure it is not 8.4 or 8.5!


    > Get an error saying No module named tkinter? You''re probably using Python 2.
    This book assumes Python 3.


    You can also get the exact version of Tcl/Tk that is being used with:


    ```

    >>> tkinter.Tcl().eval(''info patchlevel'')

    ```


    It should return something like ''8.6.9''.


    > Verified install using ActiveTcl 8.6.9.8609.2 and Python 3.90rc1 source code
    from python.org on macOS 10.15.6.'
- md: "## 3.2. Installing Tk on Windows\n\nTkinter (and, since Python 3.1, ttk, which\
    \ is the interface to the newer themed widgets) is included in the Python standard\
    \ library. We highly recommend installing Python using the standard binary distributions\
    \ from [python.org](https://python.org). These will automatically install Tcl/Tk,\
    \ which of course, is needed by Tkinter.\n\nIf you're instead building Python\
    \ from source code, the Visual Studio projects included in the \"PCbuild\" directory\
    \ can automatically fetch and compile Tcl/Tk on your system.\n\nOnce you've installed\
    \ or compiled Python, test it out to make sure Tkinter works. From the Python\
    \ prompt, enter these two commands:\n\n```\n>>> import tkinter\n>>> tkinter._test()\n\
    ```\n\nThis should pop up a small window; the first line at the top of the window\
    \ should say \"This is Tcl/Tk version 8.6\"; make sure it is not 8.4 or 8.5!\n\
    \n> Get an error saying No module named tkinter? You're probably using Python\
    \ 2. This book assumes Python 3.\n\nYou can also get the exact version of Tcl/Tk\
    \ that is being used with:\n\n```\n>>> tkinter.Tcl().eval('info patchlevel')\n\
    ```\n\nIt should return something like '8.6.9'.\n\n> Verified using Python 3.9.0rc1\
    \ binary installer from python.org (containing Tcl/Tk 8.6.9) on Windows 10 version\
    \ 1809.\n\n## 3.3. Installing Tk on Linux\n\nTkinter (and, since Python 3.1, ttk,\
    \ which is the interface to the newer themed widgets) is included in the Python\
    \ standard library. It relies on Tcl/Tk being installed on your system. Depending\
    \ on how you install Python, this may not happen automatically.\n\n> Remember,\
    \ we're using Python 3.x here, not 2.x.\n\nYou have several different options\
    \ to get Python and Tkinter onto your machine. We'll show you two, using your\
    \ distro's package manager, or compiling from source.\n\n### Option 1. Your Linux\
    \ Distribution's Package Manager\n\nCurrently supported Linux distributions usually\
    \ install a recent version of Python 3.x by default. If not, they have a package\
    \ (.deb, .rpm, etc.) that you can install using their package manager. This is\
    \ usually the easiest way to install Python.\n\nHowever, after you're done installing\
    \ Python, you should verify that Tkinter works correctly. Start up a Python shell\
    \ (e.g. `/usr/bin/python3`) and verify the install (see below).\n\nYou may find\
    \ that when you try to `import tkinter` that you get an error. Sometimes it will\
    \ tell you that you need to install another package. If so, follow the instructions,\
    \ and try again. It may also just give you Python's standard error message: ModuleNotFoundError:\
    \ No module named 'tkinter'.\n\n> If you're getting an error saying No module\
    \ named tkinter (without the single quotes around the module name), you're probably\
    \ using Python 2. This book assumes Python 3.\n\nSometimes Linux distributions\
    \ separate out their Tkinter support into a separate package. That saves installing\
    \ the Tcl/Tk libraries for people who are using Python but not Tkinter. If so,\
    \ you'll need to find and install this package, which will also ensure that an\
    \ appropriate version of the Tcl/Tk libraries are installed on your system.\n\n\
    For example, running Ubuntu 20.04LTS, Python 3.8.2 is already installed. However,\
    \ to use Tkinter, you need to install a separate package, named `python3-tk`:\n\
    \n```\nsudo apt-get install python3-tk\n```\n\nIn this case, that package provides\
    \ Tcl/Tk 8.6.x libraries to be used with Python.\n\n### Option 2. Install Tcl/Tk\
    \ and Compile the Standard Python Distribution\n\nIf you'd like to use the standard\
    \ source distribution from [python.org](https://www.python.org), you can certainly\
    \ do that. But to do so, you'll need to get the Tcl and Tk include files and libraries\
    \ loaded on your machine first. Again, while there are several ways to do *that*,\
    \ the easiest is to download and install ActiveTcl.\n\n> Another option would\
    \ be to install the Tk development package, e.g. `tk8.6-dev` via your package\
    \ manager.\n\nIn your web browser, go to [www.activestate.com/products/activetcl](https://www.activestate.com/products/activetcl).\
    \ Download the latest version of ActiveTcl for Linux. Make sure you're downloading\
    \ an 8.6 or newer version. Note that you will need to create an account with ActiveState\
    \ (no cost) to download it. After it's downloaded, unpack it, run the installer\
    \ (`sudo ./install.sh`), and follow along. You'll end up with a fresh install\
    \ of ActiveTcl, located in e.g. `/opt/ActiveTcl-8.6`.\n\nNext, download the current\
    \ Python 3.x source distribution from [python.org](https://www.python.org), and\
    \ unpack it. On your configure line, you'll need to tell it how to find the version\
    \ of Tcl/Tk you installed. Then build as usual:\n\n```\n./configure --with-tcltk-includes='-I/opt/ActiveTcl-8.6/include'\
    \ \\\n            --with-tcltk-libs='/opt/ActiveTcl-8.6/lib/libtcl8.6.so /opt/ActiveTcl-8.6/lib/libtk8.6.so'\n\
    ```\n\n```\n% make\n% make install\n```\n\n> \U0001F4A1 If you installed `tk8.6-dev`\
    \ via your package manager instead of using ActiveTcl, the include files should\
    \ be found in `/usr/include/tcl8.6`, and the libraries `libtcl8.6.so` and `libtk8.6.so`\
    \ should be in `/usr/lib/x86_64-linux-gnu`.\n\nMake sure to verify your install\
    \ (see below).\n\n> \U0001F4A1 Didn't work? There may have been an error compiling\
    \ Python's tkinter code. To check, from the main Python source directory, try\
    \ `touch Modules/_tkinter.c` (note the underscore) and then `make` to recompile\
    \ it. Watch closely for error messages.\n\nThe most common thing is that the way\
    \ you specified the Tcl/Tk include and libraries needs to be changed somehow.\
    \ Or if you get messages that certain include files can't be found (e.g. `X11/Xlib.h`)\
    \ you may need to install additional packages on your Linux distribution (e.g.\
    \ `apt-get install libx11-dev`). Once you get it to compile without errors, don't\
    \ forget to `make install`.\n\n### Verifying your Install\n\nAt the Python command\
    \ prompt, enter these two commands:\n\n```\n>>> import tkinter\n>>> tkinter._test()\n\
    ```\n\nThis should pop up a small window; the first line at the top of the window\
    \ should say \"This is Tcl/Tk version 8.6\"; make sure it is not 8.4!\n\nIf it\
    \ gives you an error when you try to `import tkinter` (e.g. \"If this fails your\
    \ Python may not be configured for Tk\"), something hasn't been set up correctly.\
    \ If you compiled Python yourself, see above to check for compile errors.\n\n\
    > \U0001F4A1 Get an error saying No module named tkinter? You're probably using\
    \ Python 2. This book assumes Python 3.\n\nYou can also get the exact version\
    \ of Tcl/Tk that is being used with:\n\n```\n>>> tkinter.Tcl().eval('info patchlevel')\n\
    ```\n\nIt should return something like '8.6.9'.\n\n> Verified install using ActiveTcl\
    \ 8.6.9.8609.2 and Python 3.9.0rc1 source code from python.org on Ubuntu 20.04LTS.\n\
    \n## 3.4. The Obligatory First Program\n\nTo make sure that everything actually\
    \ did work, let's try to run a \"Hello World\" program in Tk. While for something\
    \ this short, you could just type it in directly to the interpreter, instead use\
    \ your favorite text editor to put it in a file.\n\n```\nfrom tkinter import *\n\
    from tkinter import ttk\nroot = Tk()\nttk.Button(root, text=\"Hello World\").grid()\n\
    root.mainloop()\n```\n\n[https://tkdocs.com/code/hello.py](https://tkdocs.com/code/hello.py)\n\
    \nSave this to a file named \"hello.py\". From a command prompt, type:\n\n```\n\
    % python hello.py\n```\n\n> Couldn't find hello.py? You might be looking in the\
    \ wrong directory. Try providing the full path to hello.py.\n\n![](img/e444c319ec16222f00278651bee8c21d_31_0.png)\n\
    \nOur first program. Some work left to do before the IPO.\n\n## 4. A First (Real)\
    \ Example\n\nWith that out of the way, let's try a slightly more substantial example,\
    \ which will give you an initial feel for what the code behind a real Tk program\
    \ looks like.\n\n## 4.1. Design\n\nWe'll create a simple GUI tool to convert a\
    \ distance in feet to the equivalent distance in meters. If we were to sketch\
    \ this out, it might look something like this:\n\n![](img/e444c319ec16222f00278651bee8c21d_33_0.png)\n\
    \nA sketch of our feet to meters conversion program.\n\nSo it looks like we have\
    \ a short text entry widget that will let us type in the number of feet. A \"\
    Calculate\" button will get the value out of that entry, perform the calculation,\
    \ and put the result in a label below the entry. We've also got three static labels\
    \ (\"feet,\" \"is equivalent to,\" and \"meters\"), which help our user figure\
    \ out how to work the application.\n\nThe next thing we need to do is look at\
    \ the layout. The widgets that we've included seem to be naturally divided into\
    \ a grid with three columns and three rows. In terms of layout, things seem to\
    \ naturally divide into three columns and three rows, as illustrated below:"
  mdcn: "## 3.2. 在 Windows 上安装 Tk\n\nTkinter（以及自 Python 3.1 起引入的 ttk，它是对新版主题化小部件的接口）已包含在\
    \ Python 标准库中。我们强烈建议使用 [python.org](https://python.org) 提供的标准二进制发行版来安装 Python。这些发行版会自动安装\
    \ Tcl/Tk，而 Tkinter 当然需要它。\n\n如果你是从源代码构建 Python，那么“PCbuild”目录中包含的 Visual Studio\
    \ 项目可以自动在你的系统上获取并编译 Tcl/Tk。\n\n安装或编译好 Python 后，请测试以确保 Tkinter 正常工作。在 Python 提示符下，输入以下两条命令：\n\
    \n```\n>>> import tkinter\n>>> tkinter._test()\n```\n\n这应该会弹出一个小窗口；窗口顶部的第一行应显示“This\
    \ is Tcl/Tk version 8.6”；请确保它不是 8.4 或 8.5！\n\n> 收到错误信息“No module named tkinter”？你可能正在使用\
    \ Python 2。本书假设使用的是 Python 3。\n\n你也可以使用以下命令获取正在使用的 Tcl/Tk 的确切版本：\n\n```\n>>> tkinter.Tcl().eval('info\
    \ patchlevel')\n```\n\n它应该返回类似 '8.6.9' 的内容。\n\n> 使用来自 python.org 的 Python 3.9.0rc1\
    \ 二进制安装程序（包含 Tcl/Tk 8.6.9）在 Windows 10 版本 1809 上验证。\n\n## 3.3. 在 Linux 上安装 Tk\n\
    \nTkinter（以及自 Python 3.1 起引入的 ttk，它是对新版主题化小部件的接口）已包含在 Python 标准库中。它依赖于系统上已安装的\
    \ Tcl/Tk。根据你安装 Python 的方式，这可能不会自动发生。\n\n> 请记住，我们这里使用的是 Python 3.x，而不是 2.x。\n\n\
    你有几种不同的选择将 Python 和 Tkinter 安装到你的机器上。我们将向你展示两种方法：使用你的发行版的包管理器，或从源代码编译。\n\n###\
    \ 选项 1. 使用你的 Linux 发行版的包管理器\n\n目前受支持的 Linux 发行版通常默认安装较新版本的 Python 3.x。如果没有，它们会提供一个包（.deb、.rpm\
    \ 等），你可以使用其包管理器进行安装。这通常是安装 Python 最简单的方法。\n\n但是，在安装完 Python 后，你应该验证 Tkinter 是否正常工作。启动一个\
    \ Python shell（例如 `/usr/bin/python3`）并验证安装（见下文）。\n\n你可能会发现，当你尝试 `import tkinter`\
    \ 时会收到一个错误。有时它会告诉你需要安装另一个包。如果是这样，请按照说明操作，然后重试。它也可能只是给你 Python 的标准错误信息：ModuleNotFoundError:\
    \ No module named 'tkinter'。\n\n> 如果你收到错误信息“No module named tkinter”（模块名周围没有单引号），你可能正在使用\
    \ Python 2。本书假设使用的是 Python 3。\n\n有时 Linux 发行版会将 Tkinter 支持分离到一个单独的包中。这为那些使用 Python\
    \ 但不使用 Tkinter 的用户节省了安装 Tcl/Tk 库的步骤。如果是这样，你需要找到并安装这个包，这也将确保系统上安装了适当版本的 Tcl/Tk\
    \ 库。\n\n例如，在运行 Ubuntu 20.04LTS 时，Python 3.8.2 已经安装好了。但是，要使用 Tkinter，你需要安装一个单独的包，名为\
