- md: "of extra code needed to special case for this layout difference, it made sense\
    \ to handle things this way.\n\nOther aspects of the layout were also improved.\
    \ Looking at the original dialogs (especially how the buttons don't quite line\
    \ up with other widgets), I originally thought it was created with `pack`, and\
    \ expected to convert it to `grid`. Interestingly, it was already using `grid`.\
    \ Why then the unaligned widgets, a hallmark of `pack`-based layouts?\n\nThis\
    \ turned out to be a result of using many *nested frames*. For example, the buttons\
    \ were placed into their own frame, and then that placed into the rest of the\
    \ window. Because of that, the individual buttons couldn't be aligned with widgets\
    \ in the rest of the user interface.\n\nNested frames were required when using\
    \ `pack`, but often with `grid` it is better to avoid them except in exceptional\
    \ circumstances. That allows you to make different parts of the user interface\
    \ line up (at the expense of dealing with a lot of colspan/rowspan tweaking).\n\
    \nA more substantial reorganization would have likely removed the nested frames,\
    \ but particularly with adjusting the buttons, this relatively simple layout could\
    \ be made to work with just a few tweaks.\n\n> \U0001F4A1 *You'll notice a lot\
    \ of older Tkinter user interfaces have the problem here of their contents running\
    \ to the edge of the windows, which often doesn't look right. I've gotten into\
    \ the habit of placing a `ttk.Frame` directly inside each toplevel, with some\
    \ additional padding, and then placing the rest of the user interface inside that.*\n\
    \nLike Preferences, the Find dialogs were also modal, which meant you had to dismiss\
    \ them before doing any editing of your file, though at least they did remember\
    \ the previous settings when you reopened them. These were eventually changed\
    \ to be regular modeless windows.\n\n## About Dialog\n\nSpeaking of modal dialogs,\
    \ the About box was also originally modal. Not only that, getting more information\
    \ (e.g., the IDLE README file) resulted in launching *another* modal dialog, which\
    \ needed to be dismissed to go back to the first modal dialog, which needed...\
    \ etc.\n\n![](img/e444c319ec16222f00278651bee8c21d_290_0.png)\n\n![](img/e444c319ec16222f00278651bee8c21d_290_1.png)\n\
    \nIDLE's doubly-modal About dialog (macOS).\n\nMaking the dialog non-modal was\
    \ the first priority. Second, the nested dialogs were eliminated using a progressive\
    \ disclosure technique. The dialog when launched is fairly sparse but contains\
    \ a 'More...' \"link.\" When clicked, it expands the window to show one of the\
    \ documentation files, with an option to switch to any of the others.\n\nThe 'More...'\
    \ \"link\" is effectively playing the role of a button, but taking advantage of\
    \ everyone's familiarity with web browsers to provide a visually simpler alternative.\
    \ As far as implementation, we use a (classic, non-themed) label widget, colored\
    \ blue, and attach a mouse click binding to it.\n\n> \U0001F4A1 One thing you\
    \ can do to help convey that the link is clickable is to change the cursor when\
    \ the mouse is over it (via the \"cursor\" option found on many widgets). On macOS,\
    \ choose the platform-specific \"pointinghand\" cursor, on Windows and Linux choose\
    \ the \"hand2\" cursor, which actually gets mapped to something more appropriate\
    \ on those platforms.\n\n![](img/e444c319ec16222f00278651bee8c21d_292_0.png)\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_292_1.png)\n\nRevised About dialog\
    \ (macOS).\n\n## Online Help\n\nIDLE also had a (needless to say, modal) help\
    \ dialog which displayed information on using the program. This displayed a plain\
    \ text help file that looked similar to the 'About - Readme' window above.\n\n\
    At the same time, like the rest of Python, there was [reference documentation](https://docs.python.org/3/),\
    \ created as \"restructured text\" which can then be formatted using a tool called\
    \ [Sphinx](https://www.sphinx-doc.org/) into HTML, text, etc.\n\nThe documentation\
    \ in IDLE's help dialog was based on a separate, but similar plain text file.\
    \ Keeping the two in sync was a problem. They were separate because Sphinx's plain\
    \ text rendering didn't look all that good, and all the extra navigation, etc.\
    \ in the HTML rendering wouldn't be needed for online help, and then there's the\
    \ hassle of opening a web browser, etc.; see [bugs.python.org/issue16893](https://bugs.python.org/issue16893).\n\
    \nTk's text widget is smart enough to handle the very basic formatting used in\
    \ IDLE's documentation, and Python includes an HTML parser in its standard library.\
    \ Putting the two together made displaying a simplified version of the HTML reference\
    \ documentation easy.\n\n![](img/e444c319ec16222f00278651bee8c21d_293_0.png)\n\
    \nOnline help using text widget (macOS).\n\n> It's easy to get carried away here.\
    \ Back in the mid-1990s, a tiny [HTML parser in Tcl](https://www.tcl.tk/software/tclhtml/)\
    \ spawned a slew of \"web browser in a text widget\" adventures, first in Tcl\
    \ and then in other languages, e.g., Python's Grail. Trying to keep up with everything\
    \ that large teams of developers are putting into real web browsers is a fool's\
    \ errand. Yet, for very limited and constrained subsets of HTML (as might be found\
    \ in online help), it's an entirely reasonable approach.\n\n## Query Dialogs\n\
    \nStill with the modal dialog theme, IDLE used the \"simpledialog\" package, which\
    \ is distributed as part of Tkinter to request certain small pieces of information\
    \ from users via modal dialogs. An example is the \"Goto line...\" command. This,\
    \ along with an example of the alert that is presented if you type in something\
    \ invalid is shown below.\n\n![](img/e444c319ec16222f00278651bee8c21d_294_0.png)\n\
    \nThe alert-on-dialog isn't quite as bad as the dialog-on-dialog pattern we saw\
    \ before. But these dialogs could certainly stand to be cosmetically updated,\
    \ and a few other tweaks made. For example, while they correctly interpreted hitting\
    \ the Return or Escape keys as synonymous with pressing OK or Cancel, they didn't\
    \ also allow for the alternate macOS conventions (Enter key on the numeric keypad\
    \ and Command-period); see [bugs.python.org/issue24812](https://bugs.python.org/issue24812).\
    \ There were some other customizations that would have been nice to have, e.g.\
    \ changing the name of the OK button, that simpledialog didn't support.\n\nRegarding\
    \ the error handling, things were, in some cases, handled worse. For example,\
    \ there is a command to open an editor window containing the source of a module\
    \ from Python's stdlib. See what happens if you make a typo.\n\n![](img/e444c319ec16222f00278651bee8c21d_295_0.png)\n\
    \nOpen module dialog with error (macOS).\n\nBecause the dialog doesn't know if\
    \ the module name is correct, validation isn't done until after the dialog is\
    \ dismissed. So the error alert gets attached to another window. To try again,\
    \ you have to dismiss that, use the menu to reopen the dialog, and try again (from\
    \ scratch).\n\nThere were a couple of places in the code where more validation\
    \ in the dialog was really necessary. Because the \"simpledialog\" code was part\
    \ of Tkinter and wasn't readily extensible in the ways needed, developers had\
    \ to resort to \"inheritance by text editor\" (i.e., copy the entire simpledialog\
    \ code and modify the copy). Twice, separately.\n\nSince the appearance needed\
    \ to be updated anyway, we generalized things and ignored what was in Tkinter's\
    \ simpledialog module altogether. Instead, a single general-purpose replacement\
    \ was created that could be used throughout IDLE (and still resulted in less code).\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_295_1.png)\n\nNew query dialog (macOS).\n\
    \nBesides the updated widgets and alignment, notice how error messages from invalid\
    \ input are now shown in the dialog itself (a technique seen frequently in web\
    \ applications), rather than a separate alert. For macOS, we also made sure to\
    \ add key bindings for the numeric keypad Enter key and Command-period, and also\
    \ made sure the window looked like a modal dialog is supposed to via this little\
    \ gem:\n\n```\nself.tk.call('::tk::unsupported::MacWindowStyle', 'style',\nself._w,\n\
    'moveableModal', '')\n```\n\nAs far as validation, the query dialog was structured\
