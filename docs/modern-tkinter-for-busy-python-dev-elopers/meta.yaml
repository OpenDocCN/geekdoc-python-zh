- img_proc: true
  md: '# 18.1. Project Goals


    As you can imagine, modernizing a large application like this, based on "classic"
    Tkinter, was not entirely straightforward. In this chapter, I''ll walk through
    some of the user interface changes that were made and why.


    Everyone involved wanted to see IDLE look a lot better than it did, though nobody
    was under the illusion that it was going to turn into a stunning example of cutting-edge
    design. But something that fit in more, so that people could learn about Python
    without getting distracted by the clumsiness of their tools, seemed doable.


    The goal also wasn''t to try to compete with Python IDE''s more commonly used
    by professional programmers, such as [PyCharm](https://www.jetbrains.com/pycharm/),
    [WingIDE](https://wingware.com/), [PyDev](https://www.pydev.org/), [Komodo](https://www.activestate.com/products/komodo-ide/),
    etc. Though some more experienced Python developers did use IDLE, either sporadically
    or regularly, it primarily needed to appeal to newcomers to the language, and
    often those new to programming altogether.


    There has been no shortage of previous attempts to radically advance IDLE, resulting
    in a number of different *forks* that boasted all kinds of improvements. Many
    of them used other GUI toolkits or modules that weren''t part of the standard
    library. It was important here to stay with Tkinter and the standard library because
    we wanted to ensure every improvement could, over time, make it into the *official*
    version that ships with Python, rather than becoming just another fork.


    As well, the hope was to make IDLE easier to contribute to. This suggested pruning
    down a substantial volume of code, removing some redundancies and inconsistencies,
    cleaning up some of the more complex pieces, simplifying interactions between
    system components, etc. There was also a substantial list of reported bugs that
    we hoped to make a dent in.


    While no less important, I''ll largely defer discussion of the substantial issues
    surrounding software architecture, backward compatibility (including systems running
    Tk 8.4, pre-ttk, which received only a few selective improvements), etc.


    Throughout this chapter, you''ll find links to individual issues in Python''s
    issue tracking system, which often provide additional insight'
  merge: -1
  pgno: 268
- img_proc: true
  md: 'into various peoples'' thought processes around changes.


    > As you''ll see, this chapter highlights many of the shortcomings of IDLE''s
    user interface. This is done mainly for emphasis because many of the problems
    shown here are common to many applications and user interfaces. I have only the
    highest respect for the people who donated their limited time and resources to
    this open source project and had to consciously make tradeoffs between time, features,
    and user interface, all within the context of a decidedly non-trivial codebase.'
  merge: -1
