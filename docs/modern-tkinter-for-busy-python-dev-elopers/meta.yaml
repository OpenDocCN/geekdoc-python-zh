    \n## 验证\n\n用户可以在输入框控件中输入任何他们想要的文本。但是，如果您想限制他们可以在输入框中输入的内容，可以使用*验证*来实现。例如，一个输入框可能只接受整数或有效的邮政编码。\n\
    \n您的程序可以指定什么使输入框有效或无效，以及何时检查其有效性。正如我们即将看到的，这两者是相关的。我们将从一个简单的例子开始：一个只能容纳最多五位整数的输入框。\n\
    \n验证标准通过输入框的 `validatecommand` 配置选项指定。您提供一段代码，其作用是验证输入框。它的功能类似于控件回调或事件绑定，不同之处在于它返回一个值（指示输入框是否有效）。我们将安排在每次按键时验证输入框，这通过向\
    \ `validate` 配置选项提供 `key` 值来指定。\n\n```\nimport re\ndef check_num(newval):\n  \
    \  return re.match('^[0-9]*$', newval) is not None and len(newval) <= 5\ncheck_num_wrapper\
    \ = (root.register(check_num), '%P')\n\nnum = StringVar()\ne = ttk.Entry(root,\
