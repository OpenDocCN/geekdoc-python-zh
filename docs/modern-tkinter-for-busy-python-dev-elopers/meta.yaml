  md: '# 6. Basic Widgets


    This chapter introduces the basic Tk widgets that you''ll find in just about any
    user interface: frames, labels, buttons, checkbuttons, radiobuttons, entries,
    and comboboxes. By the end, you''ll know how to use all the widgets you''d ever
    need for a typical fill-in-the-form type of user interface.


    You''ll find it easiest to read this chapter (and those following that discuss
    more widgets) in order. Because there is so much commonality between many widgets,
    we''ll introduce certain concepts when describing one widget that will also apply
    to a widget we describe later. Rather than going over the same ground multiple
    times, we''ll refer back to when the concept was first introduced.


    At each widget is introduced, we''ll note the Tkinter class used to create the
    widget and its [Tk reference manual page](https://www.tcl.tk/man/tcl8.6/TkCmd/contents.htm).
    Even though this reference documentation refers to the Tcl interface to Tk, it
    is the most accurate and complete description of each Tk widget. The internals
    of Python''s Tkinter module directly rely on this Tcl interface. As a reminder,
    this book highlights the *most useful parts* of Tk and how to use them to build
    effective modern user interfaces. The reference documentation, which details *everything*
    that can be done in Tk, serves a very different purpose.'
