    \ Tab 键离开，该消息将出现。当他们返回输入框或输入有效按键时，我们将移除该消息。我们还将添加一个（虚拟）按钮来“处理”邮政编码，除非邮政编码输入框有效，否则该按钮将被禁用。最后，我们还将添加一个“姓名”输入框，以便您可以按\
    \ Tab 键离开邮政编码输入框。\n\n```\nimport re\nerrmsg = StringVar()\nformatmsg = \"Zip should\
    \ be ##### or #####-####\"\n\ndef check_zip(newval, op):\n    errmsg.set('')\n\
