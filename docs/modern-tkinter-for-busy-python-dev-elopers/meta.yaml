  md: "# 5.3. Event Handling\n\nTk, as with most other user interface toolkits, runs\
    \ an *event loop* that receives events from the operating system. These are things\
    \ like button presses, keystrokes, mouse movement, window resizing, and so on.\n\
    \nGenerally, Tk takes care of managing this event loop for you. It will figure\
    \ out what widget the event applies to (did a user click on this button? if a\
    \ key was pressed, which textbox had the focus?), and dispatch it accordingly.\
    \ Individual widgets know how to respond to events; for example, a button might\
    \ change color when the mouse moves over it, and revert back when the mouse leaves.\n\
    \n> \U0001F4A1 *It's critical in event-driven applications that the event loop\
    \ not be blocked. The event loop should run continuously, normally executing dozens\
    \ of steps per second. At every step, it processes an event. If your program is\
    \ performing a long operation, it can potentially block the event loop. In that\
    \ case, no events would be processed, no drawing would be done, and it would appear\
    \ as if your application is frozen. There are many ways to avoid this happening,\
    \ mostly related to the structure of your application. We'll discuss this in more\
    \ detail in a later chapter.*\n\n# Command Callbacks\n\nYou often want your program\
    \ to handle some event in a particular way, e.g., do something when a button is\
    \ pushed. For those events that are most frequently customized (what good is a\
    \ button without something happening when you press it?), the widget will allow\
    \ you to specify a *callback* as a widget configuration option. We saw this in\
    \ the example with the `command` option of the button.\n\n```\ndef calculate(*args):\n\
    \    ...\n\nttk.Button(mainframe, text=\"Calculate\", command=calculate)\n```"
  merge: -1
  pgno: 58
- img_proc: true
  md: 'Callbacks in Tk tend to be simpler than in user interface toolkits used with
    compiled languages (where a callback must be a procedure with a certain set of
    parameters or an object method with a certain signature). Instead, the callback
    is just an ordinary bit of code that the interpreter evaluates. While it can be
    as complicated as you want to make it, most of the time, you''ll just want your
    callback to call some other procedure.


    # **Binding to Events**


    For events that don''t have a widget-specific command callback associated with
    them, you can use Tk''s `bind` to capture any event, and then (like with callbacks)
    execute an arbitrary piece of code.

    Here''s a (silly) example showing a label responding to different events. When
    an event occurs, a description of the event is displayed in the label.


    ```

    from tkinter import *

    from tkinter import ttk

    root = Tk()

    l =ttk.Label(root, text="Starting...")

    l.grid()

    l.bind(''<Enter>'', lambda e: l.configure(text=''Moved mouse inside''))

    l.bind(''<Leave>'', lambda e: l.configure(text=''Moved mouse outside''))

    l.bind(''<ButtonPress-1>'', lambda e: l.configure(text=''Clicked left mouse button''))

    l.bind(''<3>'', lambda e: l.configure(text=''Clicked right mouse button''))

    l.bind(''<Double-1>'', lambda e: l.configure(text=''Double clicked''))

    l.bind(''<B3-Motion>'', lambda e: l.configure(text=''right button drag to %d,%d''
    % (e.x, e.y)))

    root.mainloop()

    ```


    [https://tkdocs.com/code/bindings.py](https://tkdocs.com/code/bindings.py)


    The first two bindings are pretty straightforward, just watching for simple events.
    An `<Enter>` event means the mouse has moved over top the widget, while the `<Leave>`
    event is generated when the mouse moves outside the widget to a different one.'
  merge: -1
  pgno: 59
- img_proc: true
  md: 'The next binding looks for a mouse click, specifically a `<ButtonPress-1>`
    event. Here, the `<ButtonPress>` is the actual event, but the `-1` is an *event
    detail* specifying the left (main) mouse button on the mouse. The binding will
    only trigger when a `<ButtonPress>` event is generated involving the main mouse
    button. If another mouse button was clicked, this binding would ignore it.


    This next binding looks for a `<3>` event. This is actually a shorthand for `<ButtonPress-3>`.
    It will respond to events generated when the right mouse button is clicked. The
    next binding, `<Double-1>` (shorthand for `<Double-ButtonPress-1>`) adds another
    modifier, `Double`, and so will respond to the left mouse button being double
    clicked.


    The last binding also uses a modifier: capture mouse movement (`Motion`), but
    only when the right mouse button (`B3`) is held down. This binding also shows
    an example of how to use *event parameters*. Many events, such as mouse clicks
    or movement carry additional information like the current position of the mouse.
    Tk provides access to these parameters in Tcl callback scripts through the use
    of *percent substitutions*. These percent substitutions let you capture them so
    they can be used in your script.


    Tkinter abstracts away these percent substitutions and instead encapsulates all
    the event parameters in an *event object*. Above, we used the `x` and `y` fields
    to retrieve the mouse position. We''ll see percent substitutions used later in
    another context, entry widget validation.


    > What''s with the `lambda` expressions? Tkinter expects you to provide a function
    as the event callback, whose first argument is an event object representing the
    event that triggered the callback. It''s sometimes not worth the bother of defining
    regular named functions for one-off trivial callbacks such as in this example.
    Instead, we''ve just used Python''s anonymous functions via `lambda`. In real
    applications, you''ll almost always use a regular function, such as the `calculate`
    function in our feet to meters example, or a method of an object.


    # Multiple Bindings for an Event'
  merge: -1
