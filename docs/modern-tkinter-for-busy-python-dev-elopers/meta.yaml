    \nTry it out - drag the mouse around the canvas to create your masterpiece.\n\n\
    # Item Attributes\n\nWhen creating items, you can also specify one or more *attributes*\
    \ for the item, affecting how it is displayed. For example, here we'll specify\
    \ that the line should be red and three pixels wide.\n\n```\ncanvas.create_line(10,\
    \ 10, 200, 50, fill='red', width=3)\n```\n\nThe exact set of attributes will vary\
