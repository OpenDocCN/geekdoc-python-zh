    ```

    myimg = PhotoImage(file=''pretty.png'')

    canvas.create_image(10, 10, image=myimg, anchor=''nw'')

    ```


    There''s also a `bitmap` item type for images having only two colors, which can
    be changed via `foreground` and `background`. It''s not something that would commonly
    be used these days.


    # Text


    Text items can display a block of text. Positioning the text works the same as
    with image items. Specify the text to display using the `text` attribute. All
    of the text in the item will have the same color (specified by the `fill` attribute)
    and the same font (specified by a `font` attribute).


    The text item can display multiple lines of text if you embed `\n` in the text.
    Alternatively, you can have the item automatically wrapped into multiple lines
    by providing a `width` attribute to represent the maximum width of a line. The
    alignment of multiple lines of text can be set using the `justify` attribute,
    which can be one of `left` (the default), `right`, or `center`.


    ```

    canvas.create_oval(100, 100, text=''A wonderful story'',

    anchor=''nw'', font=''TkMenuFont'', fill=''red'')

    ```


    # Widget


    One of the coolest things you can do with the canvas widget is to embed *other
    widgets* inside it. This can be a lowly button, an entry (think in-place editing
    of text items), a listbox, a frame itself containing a complex set of widgets...
    anything! Remember when we said way back when that a canvas widget could act as
    a geometry manager? This is what we meant.


    Canvas items that display other widgets are known as *window* items (Tk''s longstanding
    terminology for widgets). They are positioned like text and image items. You can
    give them explicit `width` and `height` attributes; they default to the widget''s
    preferred'
  - '[PAGE 207]


    size. Finally, it''s important that the widget you''re placing on the canvas (via
    the `window` attribute) be a child widget of the canvas.


    ```

    b = ttk.Button(canvas, text=''Implode!'')

    canvas.create_image(10, 10, anchor=''nw'', window=b)

    ```


    # Modifying Items


    We''ve seen how you can modify the configuration options on an item — its color,
    width, etc. There are several other things you can do with items.


    To delete items, use the `delete` method.


    To change an item''s size and position, you can use the `coords` method. You supply
    new coordinates for the item, specified the same way as when you first created
    it. Calling this method without a new set of coordinates will return the current
    coordinates of the item. To move one or more items by a particular horizontal
    or vertical amount from their current location, you can use the `move` method.


    All items are ordered from top to bottom in what''s called the stacking order.
    If an item later in the stacking order overlaps an item below it, the first item
    will be drawn on top of the second. The `lift` and `lower` methods allow you to
    adjust an item''s position in the stacking order.


    There are several more operations detailed in the reference manual. They describe
    more ways to modify items and retrieve information about them.'
