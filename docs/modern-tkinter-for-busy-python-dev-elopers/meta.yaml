    \ should be assigned when the widget is in that state.\n\nThe following example\
    \ provides for the following variations from a button's normal appearance:\n\n\
    +   - when the widget is in the disabled state, the background color should be\
    \ set to `#d9d9d9`\n- when the widget is in the active state (mouse over it),\
    \ the background color should be set to `#ececec`\n- when the widget is in the\
    \ disabled state, the foreground color should be set to `#a3a3a3` (this is in\
    \ addition to the background color change we already noted)\n- when the widget\
    \ is in the state where the button is pressed, and the widget is not disabled,\
