    # **Virtual Events**


    The events we''ve seen so far are low-level operating system events like mouse
    clicks and window resizes. Many widgets also generate higher level or semantic
    events called *virtual events*. These are indicated by double angle brackets around
    the event name, e.g., `<<foo>>`.


    For example, a listbox widget will generate a `<<ListboxSelect>>` virtual event
    whenever its selection changes. The same virtual event is generated whether a
    user clicked on an item, moved to it using the arrow keys, or some other way.
    Virtual events avoid the problem of setting up multiple, possibly platform-specific
    event bindings to capture common changes. The available virtual events for a widget
    will be listed in the documentation for the widget class.


    Tk also defines virtual events for common operations that are triggered in different
    ways for different platforms. These include `<<Cut>>`, `<<Copy>>` and `<<Paste>>`.


    You can define your own virtual events, which can be specific to your application.
    This can be a useful way to keep platform-specific details isolated in a single
    module, while you use the virtual event throughout your application. Your own
    code can generate virtual events that work in exactly the same way that virtual
    events generated by Tk do.


    ```

    python

    root.event_generate("<<MyOwnEvent>>")

    ```'
  - '[PAGE 64]


    # 6. Basic Widgets


    This chapter introduces the basic Tk widgets that you''ll find in just about any
    user interface: frames, labels, buttons, checkbuttons, radiobuttons, entries,
    and comboboxes. By the end, you''ll know how to use all the widgets you''d ever
    need for a typical fill-in-the-form type of user interface.


    You''ll find it easiest to read this chapter (and those following that discuss
    more widgets) in order. Because there is so much commonality between many widgets,
    we''ll introduce certain concepts when describing one widget that will also apply
    to a widget we describe later. Rather than going over the same ground multiple
    times, we''ll refer back to when the concept was first introduced.


    At each widget is introduced, we''ll note the Tkinter class used to create the
    widget and its [Tk reference manual page](https://www.tcl.tk/man/tcl8.6/TkCmd/contents.htm).
    Even though this reference documentation refers to the Tcl interface to Tk, it
    is the most accurate and complete description of each Tk widget. The internals
    of Python''s Tkinter module directly rely on this Tcl interface. As a reminder,
    this book highlights the *most useful parts* of Tk and how to use them to build
    effective modern user interfaces. The reference documentation, which details *everything*
    that can be done in Tk, serves a very different purpose.'
  - '[PAGE 65]


    # 6.1. Frame


    ttk.Frame

    https://tkdocs.com/man/ttk_frame


    A **frame** is a widget that displays as a simple rectangle. Frames help to organize
    your user interface, often both visually and at the coding level. Frames often
    act as master widgets for a geometry manager like `grid`, which manages the slave
    widgets contained within the frame.


    ![](img/e444c319ec16222f00278651bee8c21d_65_0.png)


    Frames are created using the `ttk.Frame` class:


    ```

    python

    frame = ttk.Frame(parent)

    ```


    Frames can take several different configuration options, which can alter how they
    are displayed.


    # Requested Size


    Typically, the size of a frame is determined by the size and layout of any widgets
    within it In turn, this is controlled by the geometry manager that manages the
    contents of the frame itself).'
  - '[PAGE 66]


    If, for some reason, you want an empty frame that does not contain other widgets,
    you can instead explicitly set its size using the `width` and/or `height` configuration
    options (otherwise, you''ll end up with a very small frame indeed).


    Screen distances such as width and height are usually specified as a number of
    pixels screen. You can also specify them via one of several suffixes. For example,
    `350` means 350 pixels, `350c` means 350 centimeters, `350m` means 350 millimeters,
    `350i` means 350 inches, and `350p` means 350 printer''s points (1/72 inch).


    > Remember, if you request that a frame (or any widget) to have a given size,
    the geometry manager has the final say. If things aren''t showing up the way you
    want them, make sure to check there too.


    # Padding


    The `padding` configuration option is used to request extra space around the inside
    of the widget. If you''re putting other widgets inside the frame, there will be
    a bit of a margin all the way around. You can specify the same padding for all
    sides, different horizontal and vertical padding, or padding for each side separately.


    ```

    f[''padding''] = 5              # 5 pixels on all sides

    f[''padding''] = (5,10)          # 5 on left and right, 10 on top and bottom

    f[''padding''] = (5,7,10,12)     # left: 5, top: 7, right: 10, bottom: 12

    ```


    # Borders


    You can display a border around a frame widget to visually separate it from its
    surroundings. You''ll see this often used to make a part of the user interface
    look sunken or raised. To do this, you need to set the `borderwidth` configuration
    option (which defaults to 0, i.e., no border), and the `relief` option, which
    specifies the visual appearance of the border. This can be one of: `flat` (default),
    `raised`, `sunken`, `solid`, `ridge`, or `groove`.'
  - '[PAGE 67]


    ```

    frame[''borderwidth''] = 2

    frame[''relief''] = ''sunken''

    ```


    # Changing Styles


    Frames have a `style` configuration option, which is common to all of the themed
    widgets. This lets you control many other aspects of their appearance or behavior.
    This is a bit more advanced, so we won''t go into it in too much detail right
    now. But here''s a quick example of creating a "Danger" frame with a red background
    and a raised border.


    ```

    s = ttk.Style()

    s.configure(''Danger.TFrame'', background=''red'', borderwidth=5,

    relief=''raised'')

    ttk.Frame(root, width=200, height=200,

    style=''Danger.TFrame'').grid()

    ```


    > What elements of widgets can be changed by styles vary by widget and platform.
    On Windows and Linux, it does what you''d expect. On current macOS, the frame
    will have a red raised border, but the background will remain the default grey.
    Much more on why this is in a later chapter.


    > Styles mark a sharp departure from how most aspects of a widget''s visual appearance
    were changed in the "classic" Tk widgets. In classic Tk, you could provide a wide
    range of options to finely control every aspect of an individual widget''s behavior,
    e.g., foreground color, background color, font, highlight thickness, selected
    foreground color, and padding. When using the new themed widgets, these changes
    are made by modifying styles, not adding options to each widget.


    As such, many options you may be familiar with in certain classic widgets are
    not present in their themed version. However, overuse of such options was a key
    factor undermining the appearance of Tk applications, especially when used across
    different platforms. Transitioning from classic to themed widgets provides an
    opportune time to review and refine how (and if!) such appearance changes are
    made.'
- md: "## 6.2. Label\n\n`ttk.Label`\nhttps://tkdocs.com/man/ttk_label\n\nA **label**\
    \ is a widget that displays text or images, typically that users will just view\
    \ but not otherwise interact with. Labels are used to identify controls or other\
    \ parts of the user interface, provide textual feedback or results, etc.\n\n![](img/e444c319ec16222f00278651bee8c21d_68_0.png)\n\
    \nLabels are created using the `ttk.Label` class. Often, the text or image the\
    \ label will display are specified via configuration options at the same time:\n\
    \n```\nlabel = ttk.Label(parent, text='Full name:')\n```\n\nLike frames, labels\
    \ can take several different configuration options, which can alter how they are\
    \ displayed.\n\n## Displaying Text\n\nThe `text` configuration option (shown above\
    \ when creating the label) is the most commonly used, particularly when the label\
    \ is purely decorative or explanatory. You can change what text is displayed by\
    \ modifying this configuration option. This can be done at any time, not only\
    \ when first creating the label.\n\nYou can also have the widget monitor a variable\
    \ in your script. Anytime the variable changes, the label will display the new\
    \ value of the variable. This is done with the `textvariable` option:\n\n```\n\
    resultsContents = StringVar()\nlabel['textvariable'] = resultsContents\nresultsContents.set('New\
    \ value to display')\n```\n\nTkinter only allows you to attach widgets to an instance\
    \ of the `StringVar` class, and not arbitrary Python variables. This class contains\
    \ all the logic to watch for changes and communicate them back and forth between\
    \ the variable and Tk. Use the `get` and `set` methods to read or write the current\
    \ value of the variable.\n\n## Displaying Images\n\nLabels can also display an\
    \ image instead of text. If you just want an image displayed in your user interface,\
    \ this is normally the way to do it. We'll go into images in more detail in a\
    \ later chapter, but for now, let's assume you want to display a GIF stored in\
    \ a file on disk. This is a two-step process. First, you will create an image\
    \ \"object.\" Then, you can tell the label to use that object via its `image`\
    \ configuration option:\n\n```\nimage = PhotoImage(file='myimage.gif')\nlabel['image']\
    \ = image\n```\n\nLabels can also display both an image and text at the same time.\
    \ You'll often see this in toolbar buttons. To do so, use the `compound` configuration\
    \ option. The default value is `none`, meaning display only the image if present;\
    \ if there is no image, display the text specified by the `text` or `textvariable`\
    \ options. Other possible values for the `compound` option are: `text` (text only),\
    \ `image` (image only), `center` (text in the center of image), `top` (image above\
    \ text), `left`, `bottom`, and `right`.\n\n## Fonts, Colors, and More\n\nLike\
    \ with frames, you normally don't want to change things like fonts and colors\
    \ directly. If you need to change them (e.g., to create a special type of label),\
    \ the preferred method would be to create a new style, which is then used by the\
    \ widget with the `style` option.\n\nUnlike most themed widgets, the label widget\
    \ also provides explicit widget-specific configuration options as an alternative.\
    \ Again, you should use these only in special one-off cases when using a style\
    \ didn't necessarily make sense.\n\nYou can specify the font used to display the\
    \ label's text using the `font` configuration option. While we'll go into fonts\
    \ in more detail in a later chapter, here are the names of some predefined fonts\
    \ you can use:\n\n- `TkDefaultFont`: Default for all GUI items not otherwise specified.\n\
    - `TkTextFont`: Used for entry widgets, listboxes, etc.\n- `TkFixedFont`: A standard\
    \ fixed-width font.\n- `TkMenuFont`: The font used for menu items.\n- `TkHeadingFont`:\
    \ A font for column headings in lists and tables.\n- `TkCaptionFont`: A font for\
    \ window and dialog caption bars.\n- `TkSmallCaptionFont`: Smaller captions for\
    \ subwindows or tool dialogs.\n- `TkIconFont`: A font for icon captions.\n- `TkTooltipFont`:\
    \ A font for tooltips.\n\n> Because font choices are so platform-specific, be\
    \ careful of hardcoding specifics (font families, sizes, etc.). This is something\
    \ else you'll see in many older Tk programs that can make them look ugly.\n\n\
    ```\nlabel['font'] = \"TkDefaultFont\"\n```\n\nThe foreground (text) and background\
    \ color of the label can also be changed via the `foreground` and `background`\
    \ configuration options. Colors are covered in detail later, but you can specify\
    \ them as either color names (e.g., `red`) or hex RGB codes (e.g., `#ff340a`).\n\
    \nLabels also accept the `relief` configuration option discussed for frames to\
    \ make them appear sunken or raised.\n\n## Layout\n\nWhile the overall layout\
    \ of the label (i.e., where it is positioned within the user interface, and how\
    \ large it is) is determined by the geometry manager, several options can help\
    \ you control how the label will be displayed within the rectangle the geometry\
    \ manager gives it.\n\nIf the box given to the label is larger than the label\
    \ requires for its contents, you can use the `anchor` option to specify what edge\
    \ or corner the label should be attached to, which would leave any empty space\
    \ in the opposite edge or corner. Possible values are specified as compass directions:\
    \ `n` (north, or top edge), `ne`, (north-east, or top right corner), `e`, `se`,\
    \ `s`, `sw`, `w`, `nw` or `center`.\n\n> \U0001F4A1 Things not appearing where\
    \ you think they should? It may be that the geometry manager is not putting the\
    \ label where you think it is. For example, if you're using `grid`, you may need\
    \ to adjust the `sticky` options. When debugging, it can help to change the background\
    \ color of each widget, so you know exactly where each is positioned. This is\
    \ a good example of those \"one-off\" cases we just mentioned where you might\
    \ use configuration options rather than styles to modify appearance.\n\n## Multi-line\
    \ Labels\n\nLabels can display more than one line of text. To do so, embed carriage\
    \ returns (`\\n`) in the `text` (or `textvariable`) string. Labels can also automatically\
    \ wrap your text into multiple lines via the `wraplength` option, which specifies\
    \ the maximum length of a line (in pixels, centimeters, etc.).\n\n> Multi-line\
    \ labels are a replacement for the older `message` widgets in classic Tk.\n\n\
    ![](img/e444c319ec16222f00278651bee8c21d_72_0.png)\n\nYou can also control how\
    \ the text is justified via the `justify` option. It can have the values `left`,\
    \ `center`, or `right`. If you have only a single line of text, you probably want\
    \ the `anchor` option instead.\n\n## 6.3. Button\n\n`ttk.Button`\nhttps://tkdocs.com/man/ttk_button\n\
    \nA **button**, unlike a frame or label, is very much there to interact with.\
    \ Users press a button to perform an action. Like labels, they can display text\
    \ or images, but accept additional options to change their behavior.\n\n![](img/e444c319ec16222f00278651bee8c21d_73_0.png)\n\
    \nButtons are created using the `ttk.Button` class:\n\n```\nbutton = ttk.Button(parent,\
    \ text='Okay', command=submitForm)\n```\n\nTypically, their contents and command\
    \ callback are specified at the same time. As with other widgets, buttons can\
    \ take several different configuration options, including the standard `style`\
    \ option, which can alter their appearance and behavior.\n\n## Text or Image\n\
    \nButtons take the same `text`, `textvariable` (rarely used), `image`, and `compound`\
    \ configuration options as labels. These control whether the button displays text\
    \ and/or an image.\n\nButtons have a `default` configuration option. If specified\
    \ as `active`, this tells Tk that the button is the default button in the user\
    \ interface; otherwise it is `normal`. Default buttons are invoked if users hit\
    \ the Return or Enter key). Some platforms and styles will draw this default button\
    \ with a different border or highlight. Note that setting this option doesn't\
    \ create an event binding that will make the Return or Enter key activate the\
    \ button; that you have to do yourself.\n\n## The Command Callback\n\nThe `command`\
    \ option connects the button's action and your application. When a user presses\
    \ the button, the script provided by the option is evaluated by the interpreter.\n\
    \nYou can also ask the button to invoke the command callback from your application.\
    \ That way, you don't need to repeat the command to be invoked several times in\
    \ your program. If you change the command attached to the button, you don't need\
    \ to change it elsewhere too. Sounds like a useful way to add that event binding\
    \ on our default button, doesn't it?\n\n```\naction = ttk.Button(root, text=\"\
    Action\", default=\"active\",\n    command=myaction)\nroot.bind('<Return>', lambda\
    \ e: action.invoke())\n```\n\n> Standard behavior for dialog boxes and many other\
    \ windows on most platforms is to set up a binding on the window for the Return\
    \ key (`<Return>` or `<Key-Return>`) to invoke the active button if it exists,\
    \ as we've done here. If there is a \"Close\" or \"Cancel\" button, create a binding\
    \ to the Escape key (`<Key-Escape>`). On macOS, you should additionally bind the\
    \ Enter key on the keyboard (`<KP_Enter>`) to the active button, and Command-period\
    \ (`<Command-.>`) to the close or cancel button.\n\n## Button State\n\nButtons\
    \ and many other widgets start off in a normal state. A button will respond to\
    \ mouse movements, can be pressed, and will invoke its command callback. Buttons\
    \ can also be put into a disabled state,"
  mdcn: "## 6.2. 标签\n\n`ttk.Label`\nhttps://tkdocs.com/man/ttk_label\n\n**标签**是一种用于显示文本或图像的控件，通常用户只会查看而不会与之交互。标签用于标识控件或用户界面的其他部分、提供文本反馈或结果等。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_68_0.png)\n\n标签使用 `ttk.Label` 类创建。通常，标签将显示的文本或图像会在创建时通过配置选项指定：\n\
    \n```\nlabel = ttk.Label(parent, text='Full name:')\n```\n\n与框架类似，标签可以接受多种不同的配置选项，这些选项可以改变其显示方式。\n\
    \n## 显示文本\n\n`text` 配置选项（在创建标签时如上所示）是最常用的，特别是当标签纯粹是装饰性或解释性的时候。你可以通过修改此配置选项来更改显示的文本。这可以在任何时候完成，而不仅仅是在首次创建标签时。\n\
    \n你还可以让控件监视脚本中的一个变量。每当该变量发生变化时，标签就会显示该变量的新值。这通过 `textvariable` 选项实现：\n\n```\n\
    resultsContents = StringVar()\nlabel['textvariable'] = resultsContents\nresultsContents.set('New\
    \ value to display')\n```\n\nTkinter 只允许你将控件附加到 `StringVar` 类的实例，而不是任意的 Python\
    \ 变量。此类包含所有用于监视更改并在变量和 Tk 之间来回通信的逻辑。使用 `get` 和 `set` 方法来读取或写入变量的当前值。\n\n## 显示图像\n\
    \n标签也可以显示图像而不是文本。如果你只想在用户界面中显示图像，这通常是实现方式。我们将在后面的章节中更详细地介绍图像，但现在，假设你想显示存储在磁盘文件中的\
    \ GIF 图像。这是一个两步过程。首先，你将创建一个图像“对象”。然后，你可以通过其 `image` 配置选项告诉标签使用该对象：\n\n```\nimage\
    \ = PhotoImage(file='myimage.gif')\nlabel['image'] = image\n```\n\n标签也可以同时显示图像和文本。你经常会在工具栏按钮中看到这种用法。为此，请使用\
    \ `compound` 配置选项。默认值为 `none`，表示如果存在图像则仅显示图像；如果没有图像，则显示由 `text` 或 `textvariable`\
    \ 选项指定的文本。`compound` 选项的其他可能值包括：`text`（仅文本）、`image`（仅图像）、`center`（文本位于图像中心）、`top`（图像在文本上方）、`left`、`bottom`\
    \ 和 `right`。\n\n## 字体、颜色等\n\n与框架一样，你通常不希望直接更改字体和颜色等设置。如果需要更改它们（例如，创建特殊类型的标签），首选方法是创建一个新的样式，然后通过\
    \ `style` 选项供控件使用。\n\n与大多数主题控件不同，标签控件还提供了显式的控件特定配置选项作为替代方案。同样，你应该仅在特殊的一次性情况下使用这些选项，当使用样式不一定有意义时。\n\
    \n你可以使用 `font` 配置选项指定用于显示标签文本的字体。虽然我们将在后面的章节中更详细地介绍字体，但这里列出了一些你可以使用的预定义字体名称：\n\
    \n- `TkDefaultFont`：所有未另行指定的 GUI 项目的默认字体。\n- `TkTextFont`：用于输入控件、列表框等。\n- `TkFixedFont`：标准等宽字体。\n\
    - `TkMenuFont`：用于菜单项的字体。\n- `TkHeadingFont`：用于列表和表格中列标题的字体。\n- `TkCaptionFont`：用于窗口和对话框标题栏的字体。\n\
    - `TkSmallCaptionFont`：用于子窗口或工具对话框的较小标题字体。\n- `TkIconFont`：用于图标标题的字体。\n- `TkTooltipFont`：用于工具提示的字体。\n\
    \n> 由于字体选择非常依赖于平台，因此要小心硬编码具体信息（字体系列、大小等）。这是你在许多旧的 Tk 程序中会看到的另一件事，可能会使它们看起来很丑陋。\n\
    \n```\nlabel['font'] = \"TkDefaultFont\"\n```\n\n标签的前景（文本）和背景颜色也可以通过 `foreground`\
    \ 和 `background` 配置选项进行更改。颜色将在后面详细介绍，但你可以将它们指定为颜色名称（例如，`red`）或十六进制 RGB 代码（例如，`#ff340a`）。\n\
    \n标签还接受为框架讨论的 `relief` 配置选项，使其看起来凹陷或凸起。\n\n## 布局\n\n虽然标签的整体布局（即它在用户界面中的位置以及大小）由几何管理器决定，但有几个选项可以帮助你控制标签在其几何管理器给定的矩形内的显示方式。\n\
    \n如果给标签的框大于标签内容所需的大小，你可以使用 `anchor` 选项指定标签应附着到哪个边缘或角落，这将把任何空白留在相对的边缘或角落。可能的值指定为罗盘方向：`n`（北，或上边缘）、`ne`（东北，或右上角）、`e`、`se`、`s`、`sw`、`w`、`nw`\
    \ 或 `center`。\n\n> \U0001F4A1 东西没有出现在你认为应该出现的地方？可能是几何管理器没有将标签放在你认为的位置。例如，如果你使用\
    \ `grid`，你可能需要调整 `sticky` 选项。在调试时，更改每个控件的背景颜色会有所帮助，这样你就可以确切知道每个控件的位置。这是我们刚刚提到的那些“一次性”情况的一个很好的例子，你可能会使用配置选项而不是样式来修改外观。\n\
    \n## 多行标签\n\n标签可以显示多行文本。为此，请在 `text`（或 `textvariable`）字符串中嵌入回车符（`\\n`）。标签还可以通过\
    \ `wraplength` 选项自动将你的文本换行成多行，该选项指定一行的最大长度（以像素、厘米等为单位）。\n\n> 多行标签是经典 Tk 中较旧的 `message`\
    \ 控件的替代品。\n\n![](img/e444c319ec16222f00278651bee8c21d_72_0.png)\n\n你还可以通过 `justify`\
    \ 选项控制文本的对齐方式。它可以有 `left`、`center` 或 `right` 值。如果你只有一行文本，你可能更想使用 `anchor` 选项。\n\
    \n## 6.3. 按钮\n\n`ttk.Button`\nhttps://tkdocs.com/man/ttk_button\n\n**按钮**与框架或标签不同，它非常注重交互性。用户按下按钮以执行操作。与标签一样，它们可以显示文本或图像，但接受额外的选项来改变其行为。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_73_0.png)\n\n按钮使用 `ttk.Button` 类创建：\n\
    \n```\nbutton = ttk.Button(parent, text='Okay', command=submitForm)\n```\n\n通常，它们的内容和命令回调会同时指定。与其他控件一样，按钮可以接受多种不同的配置选项，包括标准的\
    \ `style` 选项，它可以改变其外观和行为。\n\n## 文本或图像\n\n按钮接受与标签相同的 `text`、`textvariable`（很少使用）、`image`\
    \ 和 `compound` 配置选项。这些选项控制按钮是否显示文本和/或图像。\n\n按钮有一个 `default` 配置选项。如果指定为 `active`，这会告诉\
    \ Tk 该按钮是用户界面中的默认按钮；否则为 `normal`。默认按钮在用户按下回车键或输入键时被激活。某些平台和样式会使用不同的边框或高亮显示此默认按钮。请注意，设置此选项不会创建使回车键或输入键激活按钮的事件绑定；你必须自己完成。\n\
    \n## 命令回调\n\n`command` 选项将按钮的操作与你的应用程序连接起来。当用户按下按钮时，解释器会评估该选项提供的脚本。\n\n你还可以要求按钮从你的应用程序中调用命令回调。这样，你就不需要在程序中多次重复要调用的命令。如果你更改了附加到按钮的命令，你也不需要在其他地方更改它。听起来这是在我们的默认按钮上添加事件绑定的一种有用方式，不是吗？\n\
    \n```\naction = ttk.Button(root, text=\"Action\", default=\"active\",\n    command=myaction)\n\
    root.bind('<Return>', lambda e: action.invoke())\n```\n\n> 大多数平台上对话框和许多其他窗口的标准行为是在窗口上设置回车键（`<Return>`\
    \ 或 `<Key-Return>`）的绑定，以调用活动按钮（如果存在），就像我们在这里所做的那样。如果有“关闭”或“取消”按钮，请为转义键（`<Key-Escape>`）创建绑定。在\
    \ macOS 上，你还应该将键盘上的输入键（`<KP_Enter>`）绑定到活动按钮，并将 Command-句点（`<Command-.>`）绑定到关闭或取消按钮。\n\
    \n## 按钮状态\n\n按钮和许多其他控件最初处于正常状态。按钮会响应鼠标移动，可以被按下，并会调用其命令回调。按钮也可以被置于禁用状态，"
