    # A Note on Coding Style


    As you know, larger Python programs are almost always structured into objects,
    classes, modules, etc. Because the focus of this book is Tk and Tkinter, we''ll
    keep things as simple as possible, generally using a very direct and procedural
    coding style, rather than wrapping up most of our code in functions or objects.'
