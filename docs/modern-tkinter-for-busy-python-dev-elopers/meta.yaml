    \ of our code in functions or objects.\n\n## 4.3. Step-by-Step Walkthrough\n\n\
    Let's take a closer look at that code, piece by piece. For now, all we're trying\
    \ to do is get a basic understanding of the types of things we need to do to create\
    \ a user interface in Tk, and roughly what those things look like. We'll go into\
    \ details later.\n\n### Incorporating Tk\n\nOur program starts by incorporating\
    \ Tk.\n\n```python\nfrom tkinter import *\nfrom tkinter import ttk\n```\n\nThese\
    \ two lines tell Python that our program needs two modules. The first, `tkinter`,\
    \ is the standard binding to Tk. When imported, it loads the Tk library on your\
    \ system. The second, `ttk`, is a submodule of `tkinter`. It implements Python's\
    \ binding to the newer \"themed widgets\" that were added to Tk in 8.5.\n\n> Notice\
    \ that we've imported everything (*) from the tkinter module. That way, we can\
    \ call tkinter functions etc. without prefixing them with the module name. This\
    \ is standard Tkinter practice.\n\nHowever, because we've imported just `ttk`\
    \ itself, we'll need to prefix anything inside that submodule. For example, calling\
    \ `Entry(...)` would refer to the `Entry` class inside the `tkinter` module (classic\
    \ widgets). We'd need `ttk.Entry(...)` to use the `Entry` class inside `ttk` (themed\
    \ widgets).\n\nAs you'll see, several classes are defined in both modules. Sometimes\
    \ you will need one or the other, depending on the context. Explicitly requiring\
    \ the `ttk` prefix facilitates this, and will be the style used in this book.\n\
    \n> One of the first things you'll find if you're migrating Python 2.x code is\
    \ that the name of the Tkinter module is now lowercase, i.e. `tkinter`, rather\
    \ than `Tkinter`. In Python 2.x, `Ttk` was also its own module, not a sub-module\
    \ of `Tkinter`.\n\n### Setting up the Main Application Window\n\nNext, the following\
    \ code sets up the main application window, giving it the title \"Feet to Meters.\"\
