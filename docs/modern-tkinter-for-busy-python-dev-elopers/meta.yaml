    \ On Windows and X11, you can also use other keys to jump to particular menus\
    \ or menu items. The keys that trigger these jumps are indicated by an underlined\
    \ letter in the menu item's label. To add one of these to a menu item, use the\
    \ `underline` configuration option for the item. Its value should be the index\
    \ of the character you'd like underlined (from 0 to the length of the string -\
    \ 1). Unlike with accelerator keys, the menu will watch for the keystroke, so\
    \ no separate event binding is needed.\n\n```\nm.add_command(label='Path Browser',\
    \ underline=5)  # underline \"B\"\n```\n\n## Images\n\nIt is also possible to\
    \ use images in menu items, either beside the menu item's label, or replacing\
    \ it altogether. To do this, use the `image` and `compound` options, which work\
    \ just like in label widgets. The value for `image` must be a Tk image object,\
    \ while `compound` can have the values `bottom`, `center`, `left`, `right`, `top`,\
    \ or `none`.\n\n## Menu Virtual Events\n\nPlatform conventions for menus suggest\
    \ standard menus and items that should be available in most applications. For\
    \ example, most applications have an \"Edit\" menu, with menu items for \"Copy,\"\
    \ \"Paste,\" etc. Tk widgets like entry or text will react appropriately when\
    \ those menu items are chosen. But if you're building your own menus, how do you\
    \ make that work? What `command` would you assign to a \"Copy\" menu item?\n\n\
    Tk handles this with virtual events. As you'll recall from the Tk Concepts chapter,\
    \ these are high-level application events, as opposed to low-level operating system\
    \ events. Tk's widgets will watch for specific events. When you build your menus,\
    \ you can generate those events rather than directly invoking a callback function.\
    \ Your application can create event bindings to watch for those events too.\n\n\
    > Some developers create virtual events for every item in their menus. They generate\
    \ those events instead of calling routines in their own code directly. It's one\
    \ way of splitting off your user interface code from the rest of your application.\
    \ Remember that even if you do this, you'll still need code that enables and disables\
    \ menu items, adjusts their labels, etc. in response to application state changes.\n\
    \nHere's a minimal example showing how we'd add two items to an \"Edit\" menu,\
    \ the standard \"Paste\" item, and an application-specific \"Find...\" item that\
    \ will open a dialog to find or search for something. We'll include an entry widget\
    \ so that we can check that \"Paste\" works.\n\n```\nfrom tkinter import *\nfrom\
    \ tkinter import ttk, messagebox\n\nroot = Tk()\nttk.Entry(root).grid()\nm = Menu(root)\n\
    m_edit = Menu(m)\nm.add_cascade(menu=m_edit, label=\"Edit\")\nm_edit.add_command(label=\"\
    Paste\", command=lambda:\n    root.focus_get().event_generate(\"<<Paste>>\"))\n\
    m_edit.add_command(label=\"Find...\", command=lambda:\n    root.event_generate(\"\
    <<OpenFindDialog>>\"))\nroot['menu'] = m\n\ndef launchFindDialog(*args):\n   \
    \ messagebox.showinfo(message=\"I hope you find what you're looking for!\")\n\n\
    root.bind(\"<<OpenFindDialog>>\", launchFindDialog)\nroot.mainloop()\n```\n\n\
    https://tkdocs.com/code/menu.py\n\n> When you generate a virtual event, you need\
    \ to specify the widget that the event should be sent to. We want the \"Paste\"\
    \ event to be sent to the widget with the keyboard focus (usually indicated by\
    \ a focus ring). You can determine which widget has the keyboard focus using the\
    \ `focus` command. Try it out, choosing the Paste item when the window is first\
    \ opened (when there's no focus) and after clicking on the entry (making it the\
    \ focus). Notice the entry handles the <<Paste>> event itself. There's no need\
    \ for us to create an event binding.\n\nThe <<OpenFindDialog>> event is sent to\
    \ the root window, which is where we create an event binding. If we had multiple\
    \ toplevel windows, we'd send it to a specific window.\n\nTk predefines the following\
    \ virtual events: <<Clear>>, <<Copy>>, <<Cut>>, <<Paste>>, <<PasteSelection>>,\
    \ <<PrevWindow>>, <<Redo>>, and <<Undo>>. For additional information, see the\
    \ [event](https://tkdocs.com/man/event) command reference.\n\n![](img/e444c319ec16222f00278651bee8c21d_152_0.png)\n\
    \n## 10.2. Platform Menus\n\nEach platform has a few menus in every menubar that\
    \ are handled specially by Tk.\n\n### macOS\n\nYou've probably noticed that Tk\
    \ on macOS supplies its own default menubar. It includes a menu named after the\
    \ program being run (in this case, your programming language's shell, \"Python\"\
    ), a File menu, and standard Edit, Windows, and Help menus, all stocked with various\
    \ menu items.\nYou can override this menubar in your own program, but to get the\
    \ results you want, you'll need to follow some particular steps (in some cases,\
    \ in a particular order).\n\n> Starting at Tk 8.5.13, the handling of special\
    \ menus on macOS changed due to the underlying Tk code migrating from the obsolete\
    \ Carbon API to Cocoa. If you're seeing duplicate menu names, missing items, things\
    \ you didn't put there, etc. review this section carefully.\n\nThe first thing\
    \ to know is that if you don't specify a menubar for a window (or its parent window,\
    \ e.g., the root window), you'll end up with the default menubar Tk supplies,\
    \ which unless you're just mucking around on your own, is almost certainly not\
    \ what you want.\n\n### The Application Menu\n\nEvery menubar starts with the\
    \ system-wide apple icon menu. To the right of that is a menu for the frontmost\
    \ application. It is always named after the binary being run. If you do supply\
    \ a menubar, *at the time the menubar is attached to the window*, if there is\
    \ *not* a specially named `.apple` menu (see below), Tk will provide its default\
    \ application menu. It will contain an \"About Tcl & Tk\" item, followed by the\
    \ standard menu items: preferences, the services submenu, hide/show items, and\
    \ quit. Again, you don't want this.\n\nIf you supply your own `.apple` menu, when\
    \ the menubar is attached to the window, Tk will add the standard items (preferences\
    \ and onward) onto the end of any items you have added. Perfect! Items you add\
    \ *after* the menubar is attached to the window will appear after the quit item,\
    \ which, again, you don't want.\n\n> The application menu, which we're dealing\
    \ with here, is distinct from the apple menu (the one with the apple icon, just\
    \ to the left of the application menu). Despite that, we really mean the application\
    \ menu, even though Tk still refer to it as the \"apple\" menu. This is a holdover\
    \ from pre-OS X days when these sorts of items did go in the actual apple menu,\
    \ and there was no separate application menu.\n\nSo, in other words, in your program,\
    \ make sure you:\n\n1.  Create a menubar for each window or the root window. *Do\
    \ not attach the menubar to the window yet!*\n2.  Add a menu to the menubar named\
    \ `.apple`. It will be used as the application menu.\n3.  The menu will automatically\
    \ be named the same as the application binary; if you want to change this, rename\
    \ (or make a copy of) the binary used to run your script.\n4.  Add the items you\
    \ want to appear at the top of the application menu, i.e., an \"About yourapp\"\
    \ item, followed by a separator.\n5.  *After* you have done all this, you can\
    \ *then* attach the menubar to your window via the window's `menu` configuration\
    \ option.\n\n```\nwin = Toplevel(root)\nmenubar = Menu(win)\nappmenu = Menu(menubar,\
    \ name='apple')\nmenubar.add_cascade(menu=appmenu)\nappmenu.add_command(label='About\
    \ My Application')\nappmenu.add_separator()\nwin['menu'] = menubar\n```\n\n> While\
    \ usually, Tkinter chooses a widget pathname for us, we've had to explicitly provide\
    \ one (`apple`) using the `name` option when creating the application menu.\n\n\
    ### Handling the Preferences Menu Item\n\nAs you've noticed, the application menu\
    \ always includes a \"Preferences...\" menu item. If your application has a preferences\
    \ dialog, this menu item should open it. If your application has no preferences\
    \ dialog, this menu item should be disabled, which it is by default.\nTo hook\
    \ up your preferences dialog, you'll need to define a Tcl procedure named `::tk::mac::ShowPreferences`.\
    \ This will be called when the Preferences menu item is chosen; if the procedure\
    \ is not defined, the menu item will be disabled.\n\n```\ndef showMyPreferencesDialog():\n\
    \    ....\n\nroot.createcommand('tk::mac::ShowPreferences',\n    showMyPreferencesDialog)\n\
    ```\n\n### Providing a Help Menu\n\nLike the application menu, any help menu you\
    \ add to your own menubar is treated specially on macOS. As with the application\
    \ menu that needed a special name (`.apple`), the help menu must be given the\
    \ name `.help`. Also, like the application menu, the help menu should also be\
    \ added *before the menubar is attached to the window*.\nThe help menu will include\
    \ the standard macOS search box to search help, as well as an item named \"*yourapp*\
    \ Help.\" As with the name of the application menu, this comes from your program's\
    \ executable and cannot be changed. Similar to how preferences dialogs are handled,\
    \ to respond to this help item, you need to define a Tcl procedure named `::tk::mac::ShowHelp`.\
    \ If this procedure is not defined, it will *not* disable the menu item. Instead,\
    \ it will generate an error when the help item is chosen.\n\n> \U0001F4A1 *If\
    \ you don't want to include help, don't add a help menu to the menubar, and none\
    \ will be shown.*"
  mdcn: "所有平台都支持通过方向键在菜单栏中进行键盘遍历。在 Windows 和 X11 上，你还可以使用其他键跳转到特定的菜单或菜单项。触发这些跳转的键在菜单项标签中以下划线字母标示。要为菜单项添加此功能，请使用该项的\
    \ `underline` 配置选项。其值应为你希望加下划线的字符的索引（从 0 到字符串长度减 1）。与加速键不同，菜单会监视按键事件，因此无需单独绑定事件。\n\
    \n```\nm.add_command(label='Path Browser', underline=5)  # underline \"B\"\n```\n\
    \n## 图片\n\n也可以在菜单项中使用图片，可以放在菜单项标签旁边，也可以完全替代标签。为此，请使用 `image` 和 `compound` 选项，其用法与标签控件中的相同。`image`\
    \ 的值必须是一个 Tk 图像对象，而 `compound` 可以取值 `bottom`、`center`、`left`、`right`、`top` 或 `none`。\n\
    \n## 菜单虚拟事件\n\n菜单的平台惯例建议大多数应用程序应提供标准菜单和项目。例如，大多数应用程序都有一个“编辑”菜单，其中包含“复制”、“粘贴”等菜单项。像\
    \ entry 或 text 这样的 Tk 控件在选择这些菜单项时会做出适当的反应。但如果你正在构建自己的菜单，如何实现这一点？你会为“复制”菜单项分配什么\
    \ `command`？\n\nTk 通过虚拟事件来处理这个问题。正如你在 Tk 概念章节中回忆的那样，这些是高级应用程序事件，与低级操作系统事件相对。Tk\
    \ 的控件会监视特定事件。当你构建菜单时，你可以生成这些事件，而不是直接调用回调函数。你的应用程序也可以创建事件绑定来监视这些事件。\n\n> 一些开发者为菜单中的每个项目都创建虚拟事件。他们生成这些事件，而不是直接调用自己代码中的例程。这是将用户界面代码与应用程序其余部分分离的一种方式。请记住，即使你这样做，你仍然需要代码来启用和禁用菜单项、调整它们的标签等，以响应应用程序状态的变化。\n\
    \n下面是一个最小示例，展示如何向“编辑”菜单添加两个项目：标准的“粘贴”项目和一个特定于应用程序的“查找...”项目，该项目将打开一个对话框以查找或搜索某些内容。我们将包含一个\
    \ entry 控件，以便我们可以检查“粘贴”是否有效。\n\n```\nfrom tkinter import *\nfrom tkinter import\
    \ ttk, messagebox\n\nroot = Tk()\nttk.Entry(root).grid()\nm = Menu(root)\nm_edit\
    \ = Menu(m)\nm.add_cascade(menu=m_edit, label=\"Edit\")\nm_edit.add_command(label=\"\
    Paste\", command=lambda:\n    root.focus_get().event_generate(\"<<Paste>>\"))\n\
    m_edit.add_command(label=\"Find...\", command=lambda:\n    root.event_generate(\"\
    <<OpenFindDialog>>\"))\nroot['menu'] = m\n\ndef launchFindDialog(*args):\n   \
    \ messagebox.showinfo(message=\"I hope you find what you're looking for!\")\n\n\
    root.bind(\"<<OpenFindDialog>>\", launchFindDialog)\nroot.mainloop()\n```\n\n\
    https://tkdocs.com/code/menu.py\n\n> 当你生成一个虚拟事件时，你需要指定事件应发送到的控件。我们希望“粘贴”事件发送到具有键盘焦点的控件（通常由焦点环指示）。你可以使用\
    \ `focus` 命令确定哪个控件具有键盘焦点。试一试，在窗口首次打开时（没有焦点时）选择粘贴项目，然后在点击 entry 控件（使其获得焦点）后再次选择。注意\
    \ entry 控件自己处理了 <<Paste>> 事件。我们无需创建事件绑定。\n\n<<OpenFindDialog>> 事件被发送到根窗口，我们正是在那里创建事件绑定。如果我们有多个顶层窗口，我们会将其发送到特定的窗口。\n\
    \nTk 预定义了以下虚拟事件：<<Clear>>、<<Copy>>、<<Cut>>、<<Paste>>、<<PasteSelection>>、<<PrevWindow>>、<<Redo>>\
    \ 和 <<Undo>>。有关更多信息，请参阅 [event](https://tkdocs.com/man/event) 命令参考。\n\n![](img/e444c319ec16222f00278651bee8c21d_152_0.png)\n\
    \n## 10.2. 平台菜单\n\n每个平台在每个菜单栏中都有几个由 Tk 特殊处理的菜单。\n\n### macOS\n\n你可能已经注意到，macOS\
    \ 上的 Tk 提供了自己的默认菜单栏。它包括一个以正在运行的程序命名的菜单（在本例中，是你的编程语言的 shell，“Python”）、一个文件菜单，以及标准的编辑、窗口和帮助菜单，所有这些菜单都包含各种菜单项。\n\
    你可以在自己的程序中覆盖此菜单栏，但要获得所需的结果，你需要遵循一些特定的步骤（在某些情况下，需要按特定顺序）。\n\n> 从 Tk 8.5.13 开始，macOS\
    \ 上特殊菜单的处理发生了变化，因为底层的 Tk 代码从过时的 Carbon API 迁移到了 Cocoa。如果你看到重复的菜单名称、缺失的项目、你没有放置的东西等，请仔细阅读本节。\n\
    \n首先要知道的是，如果你没有为窗口（或其父窗口，例如根窗口）指定菜单栏，你最终会得到 Tk 提供的默认菜单栏，除非你只是自己在捣鼓，否则这几乎肯定不是你想要的。\n\
    \n### 应用程序菜单\n\n每个菜单栏都以系统范围的苹果图标菜单开始。其右侧是当前最前面应用程序的菜单。它总是以正在运行的二进制文件命名。如果你确实提供了菜单栏，*在菜单栏附加到窗口时*，如果*没有*特殊命名的\
    \ `.apple` 菜单（见下文），Tk 将提供其默认的应用程序菜单。它将包含一个“关于 Tcl & Tk”项目，后跟标准菜单项：首选项、服务子菜单、隐藏/显示项目和退出。同样，这不是你想要的。\n\
    \n如果你提供了自己的 `.apple` 菜单，当菜单栏附加到窗口时，Tk 会将标准项目（首选项及之后的项目）添加到你添加的任何项目的末尾。完美！你在菜单栏附加到窗口之*后*添加的项目将出现在退出项目之后，这同样不是你想要的。\n\
    \n> 我们在这里处理的应用程序菜单，与苹果菜单（带有苹果图标的那个，就在应用程序菜单的左边）是不同的。尽管如此，我们实际上指的是应用程序菜单，即使 Tk\
    \ 仍然将其称为“苹果”菜单。这是从 OS X 之前的时代遗留下来的，当时这些项目确实放在实际的苹果菜单中，并且没有单独的应用程序菜单。\n\n所以，换句话说，在你的程序中，确保你：\n\
    \n1.  为每个窗口或根窗口创建一个菜单栏。*不要将菜单栏附加到窗口！*\n2.  向菜单栏添加一个名为 `.apple` 的菜单。它将用作应用程序菜单。\n\
    3.  该菜单将自动以应用程序二进制文件的名称命名；如果你想更改此名称，请重命名（或复制）用于运行脚本的二进制文件。\n4.  添加你希望出现在应用程序菜单顶部的项目，即一个“关于你的应用”项目，后跟一个分隔符。\n\
    5.  在完成所有这些操作*之后*，你*然后*可以通过窗口的 `menu` 配置选项将菜单栏附加到窗口。\n\n```\nwin = Toplevel(root)\n\
    menubar = Menu(win)\nappmenu = Menu(menubar, name='apple')\nmenubar.add_cascade(menu=appmenu)\n\
    appmenu.add_command(label='About My Application')\nappmenu.add_separator()\nwin['menu']\
    \ = menubar\n```\n\n> 虽然通常 Tkinter 会为我们选择一个控件路径名，但在创建应用程序菜单时，我们不得不使用 `name` 选项显式提供一个（`apple`）。\n\
    \n### 处理首选项菜单项\n\n正如你所注意到的，应用程序菜单始终包含一个“首选项...”菜单项。如果你的应用程序有一个首选项对话框，此菜单项应该打开它。如果你的应用程序没有首选项对话框，此菜单项应该被禁用，这是默认行为。\n\
    要连接你的首选项对话框，你需要定义一个名为 `::tk::mac::ShowPreferences` 的 Tcl 过程。当选择首选项菜单项时，将调用此过程；如果未定义该过程，菜单项将被禁用。\n\
    \n```\ndef showMyPreferencesDialog():\n    ....\n\nroot.createcommand('tk::mac::ShowPreferences',\n\
    \    showMyPreferencesDialog)\n```\n\n### 提供帮助菜单\n\n与应用程序菜单一样，你添加到自己菜单栏的任何帮助菜单在\
    \ macOS 上都会被特殊处理。与需要特殊名称（`.apple`）的应用程序菜单类似，帮助菜单必须命名为 `.help`。同样，与应用程序菜单类似，帮助菜单也应在*菜单栏附加到窗口之前*添加。\n\
    帮助菜单将包含标准的 macOS 搜索框以搜索帮助，以及一个名为“*你的应用* 帮助”的项目。与应用程序菜单的名称一样，这来自你程序的可执行文件，无法更改。类似于首选项对话框的处理方式，要响应此帮助项目，你需要定义一个名为\
    \ `::tk::mac::ShowHelp` 的 Tcl 过程。如果未定义此过程，它*不会*禁用菜单项。相反，当选择帮助项目时，它将生成一个错误。\n\n\
    > \U0001F4A1 *如果你不想包含帮助，请不要向菜单栏添加帮助菜单，这样就不会显示任何帮助菜单。*"
