    If the font dialog was modal, and the user chose a font, the dialog would have
    invoked your callback, passing it a font specification. If they cancelled out
    of the dialog, there''d be no callback. When the dialog isn''t modal, and the
    user chooses a font, it will invoke your callback. A <<TkFontchooserFontChanged>>
    virtual event is also generated; you can retrieve the current font via the dialog''s
    `font` configuration option. If the font dialog is closed, a <<TkFontchooserVisibility>>
    virtual event is generated. You can also find out if the font dialog is currently
    visible onscreen via the `visible` configuration option (though changing it is
    an error; use the `show` and `hide` methods instead).


    > 💡 Because of the significant differences between them, providing a good user
    experience on all platforms takes a bit of work. On platforms where the font dialog
    is modal, it''s likely to be invoked from a button or menu item that says, e.g.,
    Font.... On other platforms, the button or menu item should toggle between Show
    Fonts and Hide Fonts.


    If you have several text widgets in your application that can be given different
    fonts, when one of them gains focus, it should update the font chooser with its
    current font. This also means that a callback from the font dialog may apply to
    a different text widget than the one you initially called `show` from! Finally,
    be aware that the font chooser itself may gain the keyboard focus on some platforms.


    > 🤔 As of Tk 8.6.10, there are a few bugs in the font chooser on various platforms.
    Here''s a quick rundown including workarounds:


    * on macOS, if you don''t provide a font via the `font` configuration option,
    your callbacks won''t be invoked ⇒ always provide an initial font

    * on X11, if you don''t provide values for all configuration options, those you
    don''t include will be reset to their default values ⇒ whenever you change any
