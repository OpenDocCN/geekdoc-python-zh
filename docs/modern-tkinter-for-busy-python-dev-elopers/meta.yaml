    # 15.3. Formatting with Tags


    So far, we''ve used text widgets when all the text is in a single font. Now it''s
    time to look at how to add special formatting, such as bold, italic, strikethrough,
    background colors, font sizes, and much more. Tk''s text widget implements these
    using a feature called *tags*.


    Tags are objects associated with the text widget. Each tag is referred to via
    a name chosen by the programmer. Each tag has several configuration options. These
    are things like fonts and colors that control formatting. Though tags are objects
    having state, they don''t need to be explicitly created. They are automatically
    created the first time the tag name is used.


    # Adding Tags to Text


    Tags can be associated with one or more ranges of text in the widget. As before,
    ranges are specified via indices. A single index represents a single character,
    and a pair of indices represent a range from the start character to just before
    the end character. Tags are added to a range of text using the `tag_add` method.


    ```

    text.tag_add(''highlightline'', ''5.0'', ''6.0'')

    ```


    Tags can also be provided when first inserting text. The `insert` method supports
    an optional parameter containing a list of one or more tags to add to the text
    being inserted.


    ```

    text.insert(''end'', ''new material to insert'', (''highlightline'',

    ''recent'', ''warning''))

    ```


    As the text in the widget is modified, whether by a user or your program, the
    tags will adjust automatically. For example, if we tagged the text "the quick
    brown fox" with the tag "nounphrase", and then replaced the word "quick" with
    "speedy," the tag still applies to the entire phrase.'
- md: '## Applying Formatting to Tags


    Formatting is applied to tags via configuration options; these work similarly
    to configuration options for the entire widget. As an example:


    ```

    text.tag_configure(''highlightline'', background=''yellow'',

    font=''TkFixedFont'', relief=''raised'')

    ```


    Tags support the following configuration options: `background`, `bgstipple`, `borderwidth`,
    `elide`, `fgstipple`, `font`, `foreground`, `justify`, `lmargin1`, `lmargin2`,
    `offset`, `overstrike`, `relief`, `rmargin`, `spacing1`, `spacing2`, `spacing3`,
    `tabs`, `tabstyle`, `underline`, and `wrap`. Check the reference manual for detailed
    descriptions of these. The `tag_cget tag option` method allows us to query the
    configuration options of a tag.


    Because multiple tags can apply to the same range of text, there is the possibility
    of conflict (e.g., two tags specifying different fonts). A priority order is used
    to resolve these; the most recently created tags have the highest priority, but
    priorities can be rearranged using the `tag_raise tag` and `tag_lower tag` methods.


    ## More Tag Manipulations


    To delete one or more tags altogether, we can use the `tag_delete tags` method.
    This also, of course, removes any references to the tag in the text. We can also
    remove a tag from a range of text using the `tag_remove tag start ?end?` method.
    Even if that leaves no ranges of text with that tag, the tag object itself still
    exists.


    The `tag_ranges tag` method will return a list of ranges in the text that the
    tag has been applied to. There are also `tag_nextrange tag start ?end?` and `tag_prevrange
    tag start ?end?` methods to search forward or backward for the first such range
    from a given position.


    The `tag_names ?idx?` method, called with no additional parameters, will return
    a list of all tags currently defined in the text widget (including those that
    may not be presently used). If we pass the method an index, it will return the
    list of tags applied to just the character at the index.


    Finally, we can use the first and last characters in the text having a given tag
    as indices, the same way we can use "end" or "2.5". To do so, just specify `tagname.first`
    or `tagname.last`.


    ## Differences between Tags in Canvas and Text Widgets


    Both canvas and text widgets support "tags" that can be applied to several objects,
    style them, etc. However, canvas and text tags are not the same. There are important
    differences to take note of.


    In canvas widgets, only individual canvas items have configuration options that
    control their appearance. When we refer to a tag in a canvas, the meaning of that
    is identical to "all canvas items presently having that tag." The tag itself doesn''t
    exist as a separate object. So in the following snippet, the last rectangle added
    will *not* be colored red.


    ```

    canvas.itemconfigure(''important'', fill=''red'')

    canvas.create_rectangle(10, 10, 40, 40, tags=(''important''))

    ```


    In contrast, with text widgets, it''s not the individual characters that retain
    the state information about appearance, but tags, which are objects in their own
    right. So in this snippet, the newly added text *will* be colored red.


    ```

    text.insert(''end'', ''first text'', (''important''))

    text.tag_configure(''important'', foreground=''red'')

    text.insert(''end'', ''second text'', (''important''))

    ```


    ## 15.4. Events and Bindings


    One very cool thing we can do is define event bindings on tags. That allows us
    to do things like easily recognize mouse clicks on particular ranges of text,
    and popup up a menu or dialog in response. Different tags can have different bindings.
    This saves the hassle of sorting out questions like "what does a click at this
    location mean?". Bindings on tags are implemented using the `tag_bind` method:


    ```

    text.tag_bind(''important'', ''<1>'', popupImportantMenu)

    ```


    Widget-wide event bindings continue to work as they do for every other widget,
    e.g., to capture a mouse click anywhere in the text. Besides the normal low-level
    events, the text widget generates a `<<Modified>>` virtual event whenever a change
    is made to the content of the widget, and a `<<Selection>>` virtual event whenever
    there is a change made to which text is selected.


    ## 15.5. Selecting Text


    We can identify the range of text selected by a user, if any. For example, an
    editor may have a toolbar button to bold the selected text. While you can tell
    when the selection has changed (e.g., to update whether or not the bold button
    is active) via the `<<Selection>>` virtual event, that doesn''t tell you what
    has been selected.


    The text widget automatically maintains a tag named `sel`, which refers to the
    selected text. Whenever the selection changes, the `sel` tag will be updated.
    So we can find the range of text selected using the `tag_ranges ?tag?` method,
    passing it `sel` as the tag to report on.


    Similarly, we can change the selection by using `tag_add` to set a new selection,
    or `tag_remove` to remove the selection. The `sel` tag cannot be deleted, however.


    > Though the default widget bindings prevent this from happening, `sel` is like
    any other tag in that it can support multiple ranges, i.e., disjoint selections.
    To prevent this from happening, when changing the selection from your code, make
    sure to remove any old selection before adding a new one.


    The text widget manages the concept of the insertion cursor (where newly typed
    text will appear) separate from the selection. It does so using a new concept
    called a `mark`.


    ## 15.6. Marks


    Marks indicate a particular place in the text. In that respect, they are like
    indices. However, as the text is modified, the mark will adjust to be in the same
    relative location. In that way, they resemble tags, but refer to a single position
    rather than a range of text. Marks actually don''t refer to a position occupied
    by a character in the text but specify a position *between* two characters.


    Tk automatically maintains two different marks. The first, named `insert`, is
    the present location of the insertion cursor. As the cursor is moved (via mouse
    or keyboard), the mark moves with it. The second mark, named `current`, tracks
    the position of the character underneath the current mouse position.


    To create your own marks, use the widget''s `mark_set name idx` method, passing
    it the name of the mark and an index (the mark is positioned just before the character
    at the given index). This is also used to move an existing mark to a different
    position. Marks can be removed using the `mark_unset name` method, passing it
    the name of the mark. If you delete a range of text containing a mark, that also
    removes the mark.


    The name of a mark can also be used as an index (in the same way `1.0` or `end-1c`
    are indices). You can find the next mark (or previous one) from a given index
    in the text using the `mark_next idx` or `mark_previous idx` methods. The `mark_names`
    method will return a list of the names of all marks.


    Marks also have a *gravity*, which can be modified with the `mark_gravity name
    ?direction?` method, which affects what happens when text is inserted at the mark.
    Suppose we have the text "ac" with a mark in between that we''ll symbolize with
    a pipe, i.e., "a|c." If the gravity of that mark is `right` (the default), the
    mark attaches itself to the "c." If the new text "b" is inserted at the mark,
    the mark will remain stuck to the "c," and so the new text will be inserted before
    the mark, i.e., "ab|c." If the gravity is instead `left`, the mark attaches itself
    to the "a," and so new text will be inserted after the mark, i.e., "a|bc."


    ## 15.7. Images and Widgets


    Like canvas widgets, text widgets can contain not only text but also images and
    any other Tk widgets (including a frame, itself containing many other widgets).
    In a sense, this allows the text widget to work as a geometry manager in its own
    right. The ability to add images and widgets within the text opens up a world
    of possibilities for your program.


    Images are added to a text widget at a particular index, with the image specified
    as an existing Tk image. Other options that allow you to fine-tune padding, etc.


    ```

    flowers = PhotoImage(file=''flowers.gif'')

    text.image_create(''sel.first'', image=flowers)

    ```


    Other widgets are added to a text widget in much the same way as images. The widget
    being added must be a descendant of the text widget in the widget hierarchy.


    ```

    b = ttk.Button(text, text=''Push Me'')

    text.window_create(''1.0'', window=b)

    ```'
