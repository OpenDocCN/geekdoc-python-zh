    b.state([''!disabled''])          # clear the disabled flag

    b.instate([''disabled''])         # true if disabled, else false

    b.instate([''!disabled''])        # true if not disabled, else false

    b.instate([''!disabled''], cmd)   # execute ''cmd'' if not disabled

    ```


    > Note that these commands accept an **array** of state flags as their argument.


    The full list of state flags available to themed widgets is: `active`, `disabled`,
    `focus`, `pressed`, `selected`, `background`, `readonly`, `alternate`, and `invalid`.
    These are described in the [themed widget reference](https://tkdocs.com/man/ttk_widget).
    While all widgets have the same set of state flags, not all states are meaningful
    for all widgets. It''s also possible to get fancy in the `state` and `instate`
    methods and specify multiple state flags at the same time.


    https://tkdocs.com/man/ttk_widget


