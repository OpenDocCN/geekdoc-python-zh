  md: "# 14.2. Event Bindings\n\nWe've already seen that the canvas widget as a whole,\
    \ like any other Tk widget, can capture events using the `bind` command.\nYou\
    \ can also attach bindings to individual items in the canvas (or groups of them,\
    \ as we'll see in the next section using tags). So if you want to know whether\
    \ or not a particular item has been clicked on, you don't need to watch for mouse\
    \ click events for the canvas as a whole, and then figure out if that click happened\
    \ on your item. Tk will take care of all this for you.\nTo capture these events,\
    \ you use a bind command built into the canvas. It works exactly like the regular\
    \ bind command, taking an event pattern and a callback. The only difference is\
    \ you specify the canvas item this binding applies to.\n\n```\ncanvas.tag_bind(id,\
    \ '<1>', ...)\n```\n\n> Note the difference between the item-specific `tag_bind`\
    \ method and the widget-level `bind` method.\n\nLet's add some code to our sketchpad\
    \ example to allow changing the drawing color. We'll first create a few different\
    \ rectangle items, each filled with a different color. We'll then attach a binding\
    \ to each of these. When they're clicked on, they'll set a global variable to\
    \ the new drawing color. Our mouse motion binding will look at that variable when\
    \ creating the line segments.\n\n```\ncolor = \"black\"\ndef setColor(newcolor):\n\
    \    global color\n    color = newcolor\n\ndef addLine(event):\n    global lastx,\
    \ lasty\n    canvas.create_line((lastx, lasty, event.x, event.y),\n        fill=color)\n\
    \    lastx, lasty = event.x, event.y\n```"
