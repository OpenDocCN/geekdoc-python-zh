  - '[PAGE 190]


    # 13.1. Fonts


    Tk''s label widget allows you to change the font used to display text via the
    `font` configuration option. The canvas and text widgets, covered in the following
    chapters, also allow you to specify fonts. Other themed widgets that display text
    may not have a `font` configuration option, but their fonts can be changed using
    styles.


    > We''ll cover styles in detail later. In essence, they replace the old way of
    tweaking multiple configuration options on individual widgets. Instead, fonts,
    colors, and other settings that control appearance can be bundled together in
    a style. That style can then be applied to multiple widgets. It''s akin to the
    difference between hardcoding display-oriented markup inside HTML pages vs. using
    CSS to keep display-specific information separate.


    As with many things in Tk, the default fonts are usually a good choice. If you
    need to make changes, this section shows you the best way to do so, using *named
    fonts*. Tk includes named fonts suitable for use in all different components of
    your user interface. They take into account the conventions of the specific platform
    you''re running on. You can also specify your own fonts when you need additional
    flexibility.


    The [font command reference](https://tkdocs.com/man/font) provides full details
    on specifying fonts, as well as other font-related operations.


    > Many older Tk programs hardcoded fonts, using either the "family size style"
    format we''ll see below, X11 font names, or the older and more arcane X11 font
    specification strings. These applications looked increasingly dated as platforms
    evolved. Worse, fonts were often specified on a per-widget basis, leaving font
    decisions spread throughout the code. Named fonts, particularly the standard fonts
    that Tk provides, are a far better solution. Reviewing and updating font decisions
    is an easy and important change to make in any existing applications.


    # Standard Fonts'
- md: "Each platform defines specific fonts that should be used for standard user\
    \ interface elements. Tk encapsulates many of these decisions into a standard\
    \ set of named fonts. They are available on all platforms, though the exact font\
    \ used will vary. This helps abstract away platform differences. Of course, the\
    \ standard widgets use these named fonts. The predefined fonts are:\n\n- **TkDefaultFont:**\
    \ Default for items not otherwise specified.\n- **TkTextFont:** Used for entry\
    \ widgets, listboxes, etc.\n- **TkFixedFont:** A standard fixed-width font.\n\
    - **TkMenuFont:** The font used for menu items.\n- **TkHeadingFont:** Font for\
    \ column headings in lists and tables.\n- **TkCaptionFont:** A font for window\
    \ and dialog caption bars.\n- **TkSmallCaptionFont:** A smaller caption font for\
    \ tool dialogs.\n- **TkIconFont:** A font for icon captions.\n- **TkTooltipFont:**\
    \ A font for tooltips.\n\n## Platform-Specific Fonts\n\nTk provides additional\
    \ named fonts to help you comply with less common situations on specific platforms.\
    \ Individual platform guidelines detail how and where these fonts should be used.\
    \ These fonts are only defined on specific platforms. You'll need to take that\
    \ into account if your application is portable across platforms.\n\nTk on X11\
    \ recognizes any valid X11 font name (see, e.g., the `xlsfonts` command). However,\
    \ these can vary with the operating system, installed software, and the configuration\
    \ of the individual machine. There is no guarantee that a font available on your\
    \ X11 system has been installed on any other X11 system.\n\nOn Windows, Tk provides\
    \ named fonts for all the fonts that can be set in the \"Display\" Control Panel.\
    \ It recognizes the following font names: `system`, `ansi`, `device`, `systemfixed`,\
    \ `ansifixed`, and `oemfixed`.\n\nOn macOS, the Apple Human Interface Guidelines\
    \ (HIG) specifies a number of additional fonts. Tk recognizes the following names:\
    \ `systemSystemFont`, `systemSmallSystemFont`, `systemApplicationFont`, `systemViewsFont`,\
    \ `systemMenuItemFont`, `systemMenuItemCmdKeyFont`, `systemPushButtonFont`, `systemAlertHeaderFont`,\
    \ `systemMiniSystemFont`, `systemDetailEmphasizedSystemFont`, `systemEmphasizedSystemFont`,\
    \ `systemSmallEmphasizedSystemFont`, `systemLabelFont`, `systemMenuTitleFont`,\
    \ `systemMenuItemMarkFont`, `systemWindowTitleFont`, `systemUtilityWindowTitleFont`,\
    \ `systemToolbarFont`, and `systemDetailSystemFont`.\n\n## Working with Named\
    \ Fonts\n\nTk provides several operations that help you work with named fonts.\
    \ You can start by getting a list of all the currently defined named fonts.\n\n\
    ```\nfrom tkinter import font\nfont.names()\n```\n\nYou can find out the actual\
    \ system font represented by an abstract named font. This consists of the `family`\
    \ (e.g., `Times` or `Helvetica`), the `size` (in points if positive, in pixels\
    \ if negative), the `weight` (`normal` or `bold`), the `slant` (`roman` or `italic`),\
    \ and boolean attributes for `underline` and `overstrike`. You can find out the\
    \ font's `metrics` (how tall characters in the font can be and whether it is monospaced),\
    \ and even `measure` how many pixels wide a piece of text rendered in the font\
    \ would be.\n\n```\n>>> from tkinter import font\n>>> f = font.nametofont('TkTextFont')\n\
    >>> f.actual()\n{'family': '.AppleSystemUIFont', 'size': 13, 'weight': 'normal',\n\
    'slant': 'roman', 'underline': 0, 'overstrike': 0}\n>>> f.metrics()\n{'ascent':\
    \ 13, 'descent': 3, 'linespace': 16, 'fixed': 0}\n>>> f.measure('The quick brown\
    \ fox')\n124\n```\n\nTkinter provides a `Font` class to hold information about\
    \ a named font. You can create an instance of this class from the name of a font\
    \ using the `nametofont` function. When you use named fonts in your application\
    \ (e.g., via a label's `font` configuration option), you can supply either the\
    \ font name (as a string) or a `Font` instance.\n\n> \U0001F4A1 *Trying these\
    \ in an interactive shell and got an error? Even though we're not displaying anything\
    \ onscreen, you need to initialize Tk before using the various font functions.*\n\
    \nYou can also create your own fonts, which can then be used exactly like the\
    \ predefined ones. To do so, choose a name for the font and specify its font attributes\
    \ as above.\n\n```\npython\nfrom tkinter import font\nhighlightFont = font.Font(family='Helvetica',\n\
    \    name='appHighlightFont', size=12, weight='bold')\nttk.Label(root, text='Attention!',\
    \ font=highlightFont).grid()\n```\n\nIf you don't supply a name, Tkinter will\
    \ generate one, which you can retrieve via `font.name` or `str(font)`. It's usually\
    \ best to supply one.\n\nThe `family` attribute specifies the font family. Tk\
    \ ensures the names `Courier`, `Times`, and `Helvetica` are available, though\
    \ they may be mapped to an appropriate monospaced, serif, or sans-serif font).\
    \ Other fonts installed on your system can be used, but the usual caveats about\
    \ portability apply. You can get the names of all available families with:\n\n\
    ```\npython\nfont.families()\n```\n\n> \U0001F4A1 *You can change the attributes\
    \ of a named font using its `configure` method. You might do this in response\
    \ to menu options allowing users to zoom in or out, i.e., increasing or decreasing\
    \ font sizes.*\n\n### Font Descriptions\n\nAnother way to specify fonts is via\
    \ a list of attributes, starting with the font family, and then optionally includes\
    \ a size, and one or more style options. Some examples of this are `Helvetica`,\
    \ `Helvetica 12`, `Helvetica 12 bold`, and `Helvetica 12 bold italic`. These font\
    \ descriptions can be used anywhere you'd use a named font, e.g., a `font` configuration\
    \ option.\n\n> In general, switching from font descriptions to named fonts is\
    \ advisable to isolate font differences in one location in the program.\n\n##\
    \ 13.2. Colors\n\nAs with fonts, there are various ways to specify colors. Full\
    \ details can be found in the [colors command reference](https://tkdocs.com/man/colors).\n\
    \nIn general, Tk widgets default to the right colors for most situations. If you'd\
    \ like to change colors, you'll do so via widget-specific commands or options,\
    \ e.g., the label's `foreground` and `background` configuration options. For most\
    \ themed widgets, color changes are specified through styles, not by changing\
    \ the widget directly.\n\nYou can specify colors via RGB, as you would in HTML\
    \ or CSS, e.g. `#3FF` or `#FF016A`. Tk also recognizes names such as `red`, `black`,\
    \ `grey50`, `light blue`, etc.\n\n> Tk recognizes the standard names for colors\
    \ defined by X11. You can find a complete list in the command reference (noted\
    \ above).\n\nAs with fonts, both macOS and Windows specify many system-specific\
    \ abstract color names (again, see the reference). The actual color these correspond\
    \ to may depend on system settings and can change over time, e.g., dark mode,\
    \ text highlight colors, default backgrounds.\n\nIf needed, you can find the RGB\
    \ values (each between 0 and 65535) for a color using the `winfo_rgb` method on\
    \ any widget.\n\n```\nroot.winfo_rgb('red')\n```\n\n> It should probably go without\
    \ saying, but restraint in the use of colors is highly advisable!\n\n## 13.3.\
    \ Images\n\nWe've seen the basics of how to use images already, displaying them\
    \ in labels or buttons, for example. We create an image object, usually from a\
    \ file on disk.\n\n```\nimgobj = PhotoImage(file='myimage.gif')\nlabel['image']\
    \ = imgobj\n```\n\nOut of the box, Tk 8.5 includes support for GIF and PPM/PNM\
    \ images. Tk 8.6 added PNG to this short list. However, there is a Tk extension\
    \ library called `Img`, which adds support for many others: BMP, XBM, XPM, JPEG,\
    \ PNG (if you're using 8.5), TIFF, etc. Though not included directly in the Tk\
    \ core, Img is usually included with other packaged distributions (e.g., ActiveTcl).\n\
    \nInstead of using Tk's Img extension, Tkinter uses a made-for-Python image library\
    \ called `PIL` (Python Imaging Library). More specifically, we'll use a more up-to-date\
    \ fork of PIL called `pillow`. As it doesn't come bundled with Python, you'll\
    \ normally need to install it. You should be able to do so via, e.g., `pip install\
    \ Pillow`.\n\n```\nfrom PIL import ImageTk, Image\nmyimg = ImageTk.PhotoImage(Image.open('myimage.png'))\n\
    ```\n\nThe `ImageTk.PhotoImage` call provides a drop-in replacement for Tk's `PhotoImage`\
    \ but supports the broader range of image types.\n\nTk's images are actually quite\
    \ powerful and sophisticated and provide a wide variety of ways to inspect and\
    \ modify images. You can find out more from the [image command reference](https://tkdocs.com/man/image)\
    \ and the [photo command reference](https://tkdocs.com/man/photo).\n\n- https://tkdocs.com/man/image\n\
    - https://tkdocs.com/man/photo\n\n> The types of multi-color images we've seen\
    \ here are referred to in Tk as photo images. Tk also provides a second type of\
    \ images, two-bit bitmap images, which were widely used in the '90s when most\
    \ Unix workstations"
  mdcn: "每个平台都为标准用户界面元素定义了应使用的特定字体。Tk 将许多此类决策封装到一组标准的命名字体中。这些字体在所有平台上都可用，尽管实际使用的字体会有所不同。这有助于抽象掉平台差异。当然，标准控件使用这些命名字体。预定义字体包括：\n\
    \n- **TkDefaultFont：** 未另行指定项目的默认字体。\n- **TkTextFont：** 用于输入控件、列表框等。\n- **TkFixedFont：**\
    \ 标准等宽字体。\n- **TkMenuFont：** 用于菜单项的字体。\n- **TkHeadingFont：** 用于列表和表格中列标题的字体。\n\
    - **TkCaptionFont：** 用于窗口和对话框标题栏的字体。\n- **TkSmallCaptionFont：** 用于工具对话框的较小标题字体。\n\
    - **TkIconFont：** 用于图标标题的字体。\n- **TkTooltipFont：** 用于工具提示的字体。\n\n## 特定平台字体\n\n\
    Tk 提供了额外的命名字体，以帮助你遵守特定平台上不太常见的情况。各个平台的指南详细说明了这些字体应如何以及在何处使用。这些字体仅在特定平台上定义。如果你的应用程序需要跨平台运行，你需要考虑到这一点。\n\
    \n在 X11 上，Tk 识别任何有效的 X11 字体名称（例如，参见 `xlsfonts` 命令）。然而，这些字体可能因操作系统、已安装的软件以及单个机器的配置而异。无法保证你的\
    \ X11 系统上可用的字体也已安装在任何其他 X11 系统上。\n\n在 Windows 上，Tk 为所有可在“显示”控制面板中设置的字体提供了命名字体。它识别以下字体名称：`system`、`ansi`、`device`、`systemfixed`、`ansifixed`\
    \ 和 `oemfixed`。\n\n在 macOS 上，Apple 人机界面指南 (HIG) 指定了许多额外的字体。Tk 识别以下名称：`systemSystemFont`、`systemSmallSystemFont`、`systemApplicationFont`、`systemViewsFont`、`systemMenuItemFont`、`systemMenuItemCmdKeyFont`、`systemPushButtonFont`、`systemAlertHeaderFont`、`systemMiniSystemFont`、`systemDetailEmphasizedSystemFont`、`systemEmphasizedSystemFont`、`systemSmallEmphasizedSystemFont`、`systemLabelFont`、`systemMenuTitleFont`、`systemMenuItemMarkFont`、`systemWindowTitleFont`、`systemUtilityWindowTitleFont`、`systemToolbarFont`\
    \ 和 `systemDetailSystemFont`。\n\n## 使用命名字体\n\nTk 提供了几个操作来帮助你使用命名字体。你可以从获取所有当前定义的命名字体列表开始。\n\
    \n```\nfrom tkinter import font\nfont.names()\n```\n\n你可以找出抽象命名字体所代表的实际系统字体。这包括\
    \ `family`（例如，`Times` 或 `Helvetica`）、`size`（如果为正数则以磅为单位，如果为负数则以像素为单位）、`weight`（`normal`\
    \ 或 `bold`）、`slant`（`roman` 或 `italic`），以及 `underline` 和 `overstrike` 的布尔属性。你可以找出字体的\
    \ `metrics`（字体中字符的高度以及是否为等宽字体），甚至可以 `measure` 以该字体渲染的一段文本的像素宽度。\n\n```\n>>> from\
    \ tkinter import font\n>>> f = font.nametofont('TkTextFont')\n>>> f.actual()\n\
    {'family': '.AppleSystemUIFont', 'size': 13, 'weight': 'normal',\n'slant': 'roman',\
    \ 'underline': 0, 'overstrike': 0}\n>>> f.metrics()\n{'ascent': 13, 'descent':\
    \ 3, 'linespace': 16, 'fixed': 0}\n>>> f.measure('The quick brown fox')\n124\n\
    ```\n\nTkinter 提供了一个 `Font` 类来保存命名字体的信息。你可以使用 `nametofont` 函数从字体名称创建此类的实例。当你在应用程序中使用命名字体时（例如，通过标签的\
    \ `font` 配置选项），你可以提供字体名称（作为字符串）或 `Font` 实例。\n\n> \U0001F4A1 *在交互式 shell 中尝试这些操作时遇到错误？即使我们不在屏幕上显示任何内容，在使用各种字体函数之前也需要初始化\
    \ Tk。*\n\n你也可以创建自己的字体，然后可以像预定义字体一样使用它们。为此，请为字体选择一个名称，并如上所述指定其字体属性。\n\n```\npython\n\
    from tkinter import font\nhighlightFont = font.Font(family='Helvetica',\n    name='appHighlightFont',\
    \ size=12, weight='bold')\nttk.Label(root, text='Attention!', font=highlightFont).grid()\n\
    ```\n\n如果你不提供名称，Tkinter 将生成一个，你可以通过 `font.name` 或 `str(font)` 检索它。通常最好提供一个名称。\n\
    \n`family` 属性指定字体族。Tk 确保名称 `Courier`、`Times` 和 `Helvetica` 可用（尽管它们可能被映射到适当的等宽、衬线或无衬线字体）。可以使用系统上安装的其他字体，但通常的可移植性注意事项仍然适用。你可以使用以下命令获取所有可用字体族的名称：\n\
    \n```\npython\nfont.families()\n```\n\n> \U0001F4A1 *你可以使用命名字体的 `configure` 方法更改其属性。你可能这样做是为了响应允许用户放大或缩小的菜单选项，即增加或减少字体大小。*\n\
    \n### 字体描述\n\n指定字体的另一种方式是通过属性列表，从字体族开始，然后可选地包括大小和一个或多个样式选项。其中一些示例是 `Helvetica`、`Helvetica\
    \ 12`、`Helvetica 12 bold` 和 `Helvetica 12 bold italic`。这些字体描述可以在任何可以使用命名字体的地方使用，例如\
    \ `font` 配置选项。\n\n> 通常，建议从字体描述切换到命名字体，以便将字体差异隔离在程序中的一个位置。\n\n## 13.2. 颜色\n\n与字体一样，有多种指定颜色的方法。完整详情可在\
    \ [colors 命令参考](https://tkdocs.com/man/colors) 中找到。\n\n通常，Tk 控件在大多数情况下默认使用正确的颜色。如果你想更改颜色，你将通过特定于控件的命令或选项进行，例如标签的\
    \ `foreground` 和 `background` 配置选项。对于大多数主题控件，颜色更改是通过样式指定的，而不是直接更改控件。\n\n你可以通过\
    \ RGB 指定颜色，就像在 HTML 或 CSS 中一样，例如 `#3FF` 或 `#FF016A`。Tk 还识别诸如 `red`、`black`、`grey50`、`light\
    \ blue` 等名称。\n\n> Tk 识别 X11 定义的标准颜色名称。你可以在命令参考（如上所述）中找到完整列表。\n\n与字体一样，macOS 和\
    \ Windows 都指定了许多特定于系统的抽象颜色名称（同样，请参阅参考）。这些颜色对应的实际颜色可能取决于系统设置，并且可能随时间而变化，例如，深色模式、文本高亮颜色、默认背景。\n\
    \n如果需要，你可以使用任何控件上的 `winfo_rgb` 方法查找颜色的 RGB 值（每个值在 0 到 65535 之间）。\n\n```\nroot.winfo_rgb('red')\n\
    ```\n\n> 不用说，但强烈建议谨慎使用颜色！\n\n## 13.3. 图像\n\n我们已经了解了如何使用图像的基础知识，例如在标签或按钮中显示它们。我们创建一个图像对象，通常来自磁盘上的文件。\n\
    \n```\nimgobj = PhotoImage(file='myimage.gif')\nlabel['image'] = imgobj\n```\n\
    \n开箱即用，Tk 8.5 包含对 GIF 和 PPM/PNM 图像的支持。Tk 8.6 将 PNG 添加到这个简短的列表中。然而，有一个名为 `Img`\
    \ 的 Tk 扩展库，它增加了对许多其他格式的支持：BMP、XBM、XPM、JPEG、PNG（如果你使用的是 8.5）、TIFF 等。虽然没有直接包含在 Tk\
    \ 核心中，但 Img 通常包含在其他打包发行版中（例如，ActiveTcl）。\n\nTkinter 没有使用 Tk 的 Img 扩展，而是使用了一个专门为\
    \ Python 制作的图像库，称为 `PIL`（Python Imaging Library）。更具体地说，我们将使用一个名为 `pillow` 的更现代的\
    \ PIL 分支。由于它没有与 Python 捆绑在一起，你通常需要安装它。你应该能够通过例如 `pip install Pillow` 来安装它。\n\n\
    ```\nfrom PIL import ImageTk, Image\nmyimg = ImageTk.PhotoImage(Image.open('myimage.png'))\n\
    ```\n\n`ImageTk.PhotoImage` 调用提供了 Tk 的 `PhotoImage` 的直接替代品，但支持更广泛的图像类型。\n\nTk\
    \ 的图像实际上相当强大和复杂，并提供了多种检查和修改图像的方法。你可以从 [image 命令参考](https://tkdocs.com/man/image)\
    \ 和 [photo 命令参考](https://tkdocs.com/man/photo) 中了解更多信息。\n\n- https://tkdocs.com/man/image\n\
    - https://tkdocs.com/man/photo\n\n> 我们在这里看到的多色图像类型在 Tk 中被称为 photo 图像。Tk 还提供了第二种类型的图像，即两位位图图像，这在\
    \ 90 年代广泛使用，当时大多数 Unix 工作站"
