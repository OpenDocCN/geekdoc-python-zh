    \ key). Some platforms and styles will draw this default button with a different\
    \ border or highlight. Note that setting this option doesn't create an event binding\
    \ that will make the Return or Enter key activate the button; that you have to\
    \ do yourself.\n\n# The Command Callback\n\nThe `command` option connects the\
    \ button's action and your application. When a user presses the button, the script\
    \ provided by the option is evaluated by the interpreter.\nYou can also ask the\
    \ button to invoke the command callback from your application. That way, you don't\
    \ need to repeat the command to be invoked several times in your program. If you\
