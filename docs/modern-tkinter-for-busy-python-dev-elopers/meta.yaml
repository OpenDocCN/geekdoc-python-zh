    label), the preferred method would be to create a new style, which is then used
    by the widget with the `style` option.

    Unlike most themed widgets, the label widget also provides explicit widget-specific
    configuration options as an alternative. Again, you should use these only in special
    one-off cases when using a style didn''t necessarily make sense.

    You can specify the font used to display the label''s text using the `font` configuration
    option. While we''ll go into fonts in more detail in a later chapter, here are
    the names of some predefined fonts you can use:


    +   - `TkDefaultFont`: Default for all GUI items not otherwise specified.

    - `TkTextFont`: Used for entry widgets, listboxes, etc.

    - `TkFixedFont`: A standard fixed-width font.

    - `TkMenuFont`: The font used for menu items.

    - `TkHeadingFont`: A font for column headings in lists and tables.

    - `TkCaptionFont`: A font for window and dialog caption bars.

    - `TkSmallCaptionFont`: Smaller captions for subwindows or tool dialogs.

    - `TkIconFont`: A font for icon captions.

    - `TkTooltipFont`: A font for tooltips.


    > Because font choices are so platform-specific, be careful of hardcoding specifics
    (font families, sizes, etc.). This is something else you''ll see in many older
