  md: '# Setting up the Main Application Window


    Next, the following code sets up the main application window, giving it the title
    "Feet to Meters."


    ```

    root = Tk()

    root.title("Feet to Meters")

    ```


    > Yes, the `calculate` function appeared before this. We''ll describe it down
    below, but need to include it near the start because we reference it in other
    parts of the program.


    # Creating a Content Frame


    Next, we create a frame widget, which will hold the contents of our user interface.


    ```

    mainframe = ttk.Frame(root, padding="3 3 12 12")

    mainframe.grid(column=0, row=0, sticky=(N, W, E, S))

    root.columnconfigure(0, weight=1)

    root.rowconfigure(0, weight=1)

    ```


    After the frame is created, `grid` places it directly inside our main application
    window. The `columnconfigure`/`rowconfigure` bits tell Tk that the frame should
    expand to fill any extra space if the window is resized.


    > Why do we put a frame inside the main window? Strictly speaking, we could just
    put the other widgets in our interface directly into the main application window,
    without the intervening content frame. That''s what you''ll see in older Tk programs.


    However, the main window isn''t itself part of the newer "themed" widgets. Its
    background color doesn''t match the themed widgets we will put inside it. Using
    a "themed" frame widget to hold the content ensures that the background is correct.
    This is illustrated below.'
