  md: "> Some developers create virtual events for every item in their menus. They\
    \ generate those events instead of calling routines in their own code directly.\
    \ It's one way of splitting off your user interface code from the rest of your\
    \ application. Remember that even if you do this, you'll still need code that\
    \ enables and disables menu items, adjusts their labels, etc. in response to application\
    \ state changes.\n\nHere's a minimal example showing how we'd add two items to\
    \ an \"Edit\" menu, the standard \"Paste\" item, and an application-specific \"\
    Find...\" item that will open a dialog to find or search for something. We'll\
    \ include an entry widget so that we can check that \"Paste\" works.\n\n```\n\
    from tkinter import *\nfrom tkinter import ttk, messagebox\n\nroot = Tk()\nttk.Entry(root).grid()\n\
    m = Menu(root)\nm_edit = Menu(m)\nm.add_cascade(menu=m_edit, label=\"Edit\")\n\
    m_edit.add_command(label=\"Paste\", command=lambda:\n    root.focus_get().event_generate(\"\
    <<Paste>>\"))\nm_edit.add_command(label=\"Find...\", command=lambda:\n    root.event_generate(\"\
    <<OpenFindDialog>>\"))\nroot['menu'] = m\n\ndef launchFindDialog(*args):\n   \
    \ messagebox.showinfo(message=\"I hope you find what you're looking for!\")\n\n\
    root.bind(\"<<OpenFindDialog>>\", launchFindDialog)\nroot.mainloop()\n```\n\n\
    https://tkdocs.com/code/menu.py\n\n> When you generate a virtual event, you need\
    \ to specify the widget that the event should be sent to. We want the \"Paste\"\
    \ event to be sent to the widget with the keyboard focus (usually indicated by\
    \ a focus ring). You can determine which widget has the keyboard focus using the\
    \ `focus` command. Try it out, choosing the Paste item when the window is first\
    \ opened (when there's no focus) and after clicking on the entry (making it the\
    \ focus). Notice the"
