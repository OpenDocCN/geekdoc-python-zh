  md: '# 17.3. What''s Inside a Style?


    If all you want to do is *use* a style or create a new one with a few tweaks,
    you now know everything you need. If, however, you want to make more substantial
    changes, things start to get "interesting."


    # Elements


    While each style controls a single type of widget, each widget is usually composed
    of smaller pieces, called *elements*. It''s the job of the style author to construct
    the entire widget out of these smaller elements. What these elements are depends
    on the widget.


    Here''s an example of a button. It might have a border on the very outside. That''s
    one element. Just inside that, there may be a focus ring. Normally, it''s just
    the background color, but could be highlighted when a user tabs into the button.
    So that''s a second element. Then there might be some spacing between that focus
    ring and the button''s label. That spacing is a third element. Finally, the text
    label of the button itself is a fourth element.


    ![](img/e444c319ec16222f00278651bee8c21d_253_0.png)


    Why might the style author have divided it up that way? If you have one part of
    the widget that may be in a different location from another or might be a different
    color than another, it may be a good candidate for an element. Note that this
    is just one example of how a button could be'
  merge: -1
  pgno: 253
- img_proc: true
  md: "constructed from elements. Different styles and themes could (and do) accomplish\
    \ this in different ways.\nHere is a second example, for a vertical scrollbar.\
    \ It consists of a \"trough\" element, which contains other elements. These include\
    \ the up and down arrow elements at either end and a \"thumb\" element in the\
    \ middle (it might have other elements too, like borders).\n\n![](img/e444c319ec16222f00278651bee8c21d_254_0.png)\n\
    \n# Layout\n\nBesides specifying which elements make up a widget, a style also\
    \ defines how those elements are arranged within the widget. This is called their\
    \ *layout*. In the button example, we had a label element inside a spacing element,\
    \ inside a focus ring element, inside a border element. Its logical layout is\
    \ this:\n\n```\nborder {\n    focus {\n        spacing {\n            label\n\
    \        }\n    }\n}\n```"
  merge: -1
  pgno: 254
- img_proc: true
  md: "We can ask Tk for the layout of the `TButton` style:\n\n```\n>>> s.layout('TButton')\n\
    [(\"Button.border\", {\"children\": [(\"Button.focus\", {\"children\":\n[(\"Button.spacing\"\
    ,\n{\"children\": [(\"Button.label\", {\"sticky\": \"nswe\"})], \"sticky\":\n\"\
    nswe\"})], \"sticky\": \"nswe\"})], \"sticky\": \"nswe\", \"border\": \"1\"})]\n\
    ```\n\nIf we clean this up and format it a bit, we get something with this structure:\n\
    \n```\nButton.border -sticky nswe -border 1 -children {\n    Button.focus -sticky\
    \ nswe -children {\n        Button.spacing -sticky nswe -children {\n        \
    \    Button.label -sticky nswe\n        }\n    }\n}\n```\n\nThis starts to make\
    \ sense; we have four elements, named `Button.border`, `Button.focus`, `Button.spacing`,\
    \ and `Button.label`. Each of these has different element options, such as `children`,\
    \ `sticky`, and `border` that specify layout or sizes. Without getting into too\
    \ much detail at this point, we can clearly see the nested layout, based on the\
    \ `children` and `sticky` attributes.\n\n> Styles uses a simplified version of\
    \ Tk's `pack` geometry manager to specify element layout. This is detailed in\
    \ the `style` reference manual page. [https://tkdocs.com/man/ttk_style](https://tkdocs.com/man/ttk_style)\n\
    \n# Element Options\n\nEach of these elements has a number of different options.\
    \ For example, a label element has a font and a foreground color. An element representing\
    \ the thumb of a scrollbar may have an option to set its background color or another\
    \ to provide the width of a border. These can be customized to adjust how the\
    \ elements within the overall widget look.\nYou can determine what options are\
    \ available for each element? Here's an example of checking what options are available\
    \ for the label"
  merge: -1
  pgno: 255
