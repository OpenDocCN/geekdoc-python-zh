  - "[PAGE 175]\n\nWhile the system font dialog is modal on some platforms, e.g.,\
    \ Windows, that's not the case everywhere. On macOS, the system font chooser works\
    \ more like a floating tool palette in a drawing program, remaining available\
    \ to change the font for whatever text is selected in your main application window.\
    \ The Tk font dialog API has to accommodate both models. To do so, it uses callbacks\
    \ (and virtual events) to notify your application of font changes. Additional\
    \ details can be found in the [fontchooser](https://tkdocs.com/man/fontchooser)\
    \ reference manual pages.\n\nTo use the font dialog, first provide it with an\
    \ initial font and a callback which will be invoked when a font is chosen. For\
    \ illustration, we'll have the callback change the font on a label.\n\n```\nl\
    \ = ttk.Label(root, text=\"Hello World\", font=\"helvetica 24\")\nl.grid(padx=10,\
    \ pady=10)\n\ndef font_changed(font):\n    l['font'] = font\n\nroot.tk.call('tk',\
    \ 'fontchooser', 'configure', '-font',\n    'helvetica 24', '-command', root.register(font_changed))\n\
    root.tk.call('tk', 'fontchooser', 'show')\n```\n\nTkinter has not yet added a\
    \ convenient way to use this new dialog, so this example code uses the Tcl API\
    \ directly. You can see the latest work towards a proper Python API and download\
    \ code at [bugs.python.org/issue28694](https://bugs.python.org/issue28694).\n\n\
    > You can query or change the font that is (or will be) displayed in the dialog\
    \ at any time.\n\nNext, put the dialog onscreen via the `show` method. On platforms\
    \ where the font dialog is modal, your program will block at this point until\
    \ the dialog is dismissed. On other platforms, `show` returns immediately; the\
    \ dialog remains onscreen while your program continues. At this point, a font\
    \ has not been chosen. There's also a `hide` method to remove it from the screen\
    \ (not terribly useful when the font dialog is modal)."
- md: "## Alert and Confirmation Dialogs\n\nMany applications use various simple modal\
    \ alerts or dialogs to notify users of an event, ask them to confirm an action,\
    \ or make another similar choice via clicking on a button. Tk provides a versatile\
    \ \"message box\" that encapsulates all these different types of dialogs.\n\n\
    ```python\nfrom tkinter import messagebox\nmessagebox.showinfo(message='Have a\
    \ good day')\n```\n\n![](img/e444c319ec16222f00278651bee8c21d_177_0.png)\n\n```python\n\
    messagebox.askyesno(\n    message='Are you sure you want to install SuperVirus?',\n\
    \    icon='question', title='Install')\n```\n\n![](img/e444c319ec16222f00278651bee8c21d_178_0.png)\n\
    \nExample message boxes.\n\nLike the previous dialogs that we've seen, these are\
    \ modal and return the result of a user's action to the caller. Rather than using\
    \ a `type` option, Tkinter uses a different method name for each type of dialog.\
    \ The return values vary with the method:\n\n- `showinfo`: ⇒ ok\n- `showwarning`:\
    \ ⇒ ok\n- `showerror`: ⇒ ok\n- `askokcancel`: ⇒ `True` (on ok) or `False` (on\
    \ cancel)\n- `askyesno`: ⇒ `True` (on yes) or `False` (on no)\n- `askretrycancel`:\
    \ ⇒ `True` (on retry) or `False` (on cancel)\n- `askquestion`: ⇒ yes or no\n-\
    \ `askyesnocancel`: ⇒ `True` (on yes), `False` (on no), or `None` (on cancel)\n\
    \n> Admittedly, the Tkinter `messagebox` API isn't the most consistent. It mixes\
    \ return types (strings or booleans), there is some duplication (`askyesno` and\
    \ `askquestion`), and one underlying dialog type (`abortretryignore`) is omitted.\n\
    \nThe full list of possible options is shown here:\n\n- `message`: The main message\
    \ displayed inside the alert.\n- `detail`: A secondary message (if needed).\n\
    - `title`: Title for the dialog window. Not used on macOS.\n- `icon`: Icon, one\
    \ of `info` (default), `error`, `question` or `warning`.\n- `default`: Default\
    \ button, e.g. `ok` or `cancel` for a `okcancel` dialog.\n- `parent`: Window of\
    \ your application this dialog is being posted for.\n\nAdditional details can\
    \ be found in the [reference manual](https://tkdocs.com/man/messageBox).\n\n>\
    \ These new messagebox dialogs replace the older `tk_dialog` command, which does\
    \ not comply with current platform user interface conventions.\n\n## Rolling Your\
    \ Own\n\nIf you need to create your own modal dialogs, there are a few things\
    \ you'll need to take care of. We've covered most of them earlier in the chapter,\
    \ e.g. setting up window styles, positioning the window, etc.\n\nFirst, you need\
    \ to ensure that users can only interact with your dialog. You can use `grab_set`\
    \ to do this.\n\nIf you want your dialog function to block your application (i.e.,\
    \ the call to create the dialog shouldn't return until the dialog is dismissed),\
    \ this is also possible. There's no reason you'd *need* to do this, as you can\
    \ respond to callbacks, event bindings, etc. while running the normal event loop,\
    \ destroy the dialog and move on.\n\nThis somewhat cryptic example includes the\
    \ main steps needed to create a modal dialog.\n\n```python\nttk.Entry(root).grid()\
    \    # something to interact with\ndef dismiss():\n    dlg.grab_release()\n  \
    \  dlg.destroy()\n\ndlg = Toplevel(root)\nttk.Button(dlg, text=\"Done\", command=dismiss).grid()\n\
    dlg.protocol(\"WM_DELETE_WINDOW\", dismiss) # intercept close button\ndlg.transient(root)\
    \    # dialog window is related to main\ndlg.wait_visibility()  # can't grab until\
    \ window appears, so we wait\ndlg.grab_set()         # ensure all input goes to\
    \ our window\ndlg.wait_window()      # block until window is destroyed\n```\n\n\
    [https://tkdocs.com/code/dialog.py](https://tkdocs.com/code/dialog.py)\n\n> Application\
    \ code blocking like this is an example of running a nested event loop that we\
    \ generally recommend against, though it may be more convenient in certain circumstances.\n\
    \nTkinter's standard library includes a `simpledialog` module that helps with\
    \ building your own dialogs. Because it uses the classic Tk widgets rather than\
    \ the newer themed widgets, we don't recommend using it directly. However, it\
    \ does illustrate how to use some of the techniques for making dialogs behave\
    \ that we just covered.\n\n# 12. Organizing Complex Interfaces\n\nIf you have\
    \ a complex user interface, you'll need to find ways to organize it that don't\
    \ overwhelm your users. There are several different approaches to doing this.\
    \ Both general-purpose and platform-specific human interface guidelines are good\
    \ resources when designing your user interface.\n\nWhen we talk about complexity\
    \ in this chapter, we don't mean the underlying technical complexity of how the\
    \ program is implemented. Instead, we mean how it's presented to users. A user\
    \ interface can be pulled together from many different modules, built from hundreds\
    \ of widgets combined in a deeply nested hierarchy, but that doesn't mean users\
    \ need to perceive it as complex.\n\n## Multiple windows\n\nOne benefit of using\
    \ multiple windows in an application can be to simplify the user interface. Done\
    \ well, it can require users to focus only on the contents of one window at a\
    \ time to complete a task. Forcing them to focus on or switch between several\
    \ windows can also have the opposite effect. Similarly, showing only the widgets"
  mdcn: "## 警告与确认对话框\n\n许多应用程序使用各种简单的模态警告或对话框来通知用户某个事件、请求确认某个操作，或通过点击按钮做出其他类似选择。Tk\
    \ 提供了一个通用的“消息框”，它封装了所有这些不同类型的对话框。\n\n```python\nfrom tkinter import messagebox\n\
    messagebox.showinfo(message='Have a good day')\n```\n\n![](img/e444c319ec16222f00278651bee8c21d_177_0.png)\n\
    \n```python\nmessagebox.askyesno(\n    message='Are you sure you want to install\
    \ SuperVirus?',\n    icon='question', title='Install')\n```\n\n![](img/e444c319ec16222f00278651bee8c21d_178_0.png)\n\
    \n示例消息框。\n\n与我们之前见过的对话框一样，这些是模态的，并将用户操作的结果返回给调用者。Tkinter 不使用 `type` 选项，而是为每种对话框类型使用不同的方法名。返回值因方法而异：\n\
    \n- `showinfo`: ⇒ ok\n- `showwarning`: ⇒ ok\n- `showerror`: ⇒ ok\n- `askokcancel`:\
    \ ⇒ `True`（点击确定）或 `False`（点击取消）\n- `askyesno`: ⇒ `True`（点击是）或 `False`（点击否）\n-\
    \ `askretrycancel`: ⇒ `True`（点击重试）或 `False`（点击取消）\n- `askquestion`: ⇒ yes 或 no\n\
    - `askyesnocancel`: ⇒ `True`（点击是）、`False`（点击否）或 `None`（点击取消）\n\n> 诚然，Tkinter 的\
    \ `messagebox` API 并非最一致。它混合了返回类型（字符串或布尔值），存在一些重复（`askyesno` 和 `askquestion`），并且省略了一种底层对话框类型（`abortretryignore`）。\n\
    \n所有可能的选项完整列表如下：\n\n- `message`: 警告框内显示的主要消息。\n- `detail`: 次要消息（如果需要）。\n- `title`:\
    \ 对话框窗口的标题。在 macOS 上不使用。\n- `icon`: 图标，可以是 `info`（默认）、`error`、`question` 或 `warning`\
    \ 之一。\n- `default`: 默认按钮，例如 `okcancel` 对话框的 `ok` 或 `cancel`。\n- `parent`: 此对话框为其显示的应用程序窗口。\n\
    \n更多详细信息请参阅[参考手册](https://tkdocs.com/man/messageBox)。\n\n> 这些新的 messagebox 对话框取代了旧的\
    \ `tk_dialog` 命令，后者不符合当前平台的用户界面规范。\n\n## 自定义对话框\n\n如果你需要创建自己的模态对话框，有几件事需要注意。我们已经在本章前面介绍了其中大部分，例如设置窗口样式、定位窗口等。\n\
    \n首先，你需要确保用户只能与你的对话框交互。你可以使用 `grab_set` 来实现这一点。\n\n如果你希望你的对话框函数阻塞你的应用程序（即，创建对话框的调用在对话框关闭之前不应返回），这也是可能的。没有理由你*必须*这样做，因为你可以在运行正常事件循环时响应回调、事件绑定等，销毁对话框并继续执行。\n\
    \n这个有些晦涩的例子包含了创建模态对话框所需的主要步骤。\n\n```python\nttk.Entry(root).grid()    # something\
    \ to interact with\ndef dismiss():\n    dlg.grab_release()\n    dlg.destroy()\n\
    \ndlg = Toplevel(root)\nttk.Button(dlg, text=\"Done\", command=dismiss).grid()\n\
    dlg.protocol(\"WM_DELETE_WINDOW\", dismiss) # intercept close button\ndlg.transient(root)\
    \    # dialog window is related to main\ndlg.wait_visibility()  # can't grab until\
    \ window appears, so we wait\ndlg.grab_set()         # ensure all input goes to\
    \ our window\ndlg.wait_window()      # block until window is destroyed\n```\n\n\
    [https://tkdocs.com/code/dialog.py](https://tkdocs.com/code/dialog.py)\n\n> 像这样阻塞应用程序代码是运行嵌套事件循环的一个例子，我们通常不建议这样做，尽管在某些情况下可能更方便。\n\
    \nTkinter 的标准库包含一个 `simpledialog` 模块，可帮助构建你自己的对话框。因为它使用的是经典的 Tk 小部件而不是更新的主题小部件，我们不建议直接使用它。然而，它确实说明了如何使用我们刚刚介绍的一些使对话框按预期工作的技术。\n\
    \n# 12. 组织复杂界面\n\n如果你有一个复杂的用户界面，你需要找到组织它的方法，以免让用户感到不知所措。有几种不同的方法可以做到这一点。在设计用户界面时，通用和特定平台的人机界面指南都是很好的资源。\n\
    \n在本章中，当我们谈论复杂性时，我们指的不是程序实现的底层技术复杂性。相反，我们指的是它如何呈现给用户。一个用户界面可以由许多不同的模块组合而成，由数百个小部件构建在一个深度嵌套的层次结构中，但这并不意味着用户需要将其感知为复杂。\n\
    \n## 多窗口\n\n在应用程序中使用多窗口的一个好处是可以简化用户界面。如果做得好，它可以要求用户一次只专注于一个窗口的内容来完成任务。强迫他们专注于或在几个窗口之间切换也可能产生相反的效果。同样，只显示相关的小部件"
