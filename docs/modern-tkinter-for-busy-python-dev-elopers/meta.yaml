  md: '> Unlike on X11 and earlier versions of Tk on macOS, the Help menu will not
    automatically be put at the end of the menubar, so ensure it is the last menu
    added.


    You can also add other items to the help menu. These will appear after the application
    help item.


    ```

    helpmenu = Menu(menubar, name=''help'')

    menubar.add_cascade(menu=helpmenu, label=''Help'')

    root.createcommand(''tk::mac::ShowHelp'', ...)

