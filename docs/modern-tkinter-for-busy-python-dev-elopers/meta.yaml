  - '[PAGE 57]


    toplevel window was the master, and the content frame was its slave. At the inner
    level, the content frame was the master, with each of the other widgets being
    slaves. Notice that the same widget, e.g., the content frame, can be both a master
    and a slave! As we saw previously, this widget hierarchy can be nested much more
    deeply.


    > While each master can be managed by only one geometry manager (e.g. `grid`),
    different masters can have different geometry managers. While `grid` is the right
    choice most of the time, others may make sense for a particular layout used in
    one part of your user interface. Other Tk geometry managers include `pack`, which
    we''ve mentioned, and `place`, which leaves all layout decisions entirely up to
    you. Some complex widgets like `canvas` and `text` let you embed other widgets,
    making them de facto geometry managers.


    Finally, we''ve been making the assumption that slave widgets are the immediate
    children of their master in the widget hierarchy. While this is usually the case,
    and mostly there''s no good reason to do it any other way, it''s also possible
    (with some restrictions) to get around this.'
  - "[PAGE 58]\n\n# 5.3. Event Handling\n\nTk, as with most other user interface toolkits,\
    \ runs an *event loop* that receives events from the operating system. These are\
    \ things like button presses, keystrokes, mouse movement, window resizing, and\
    \ so on.\n\nGenerally, Tk takes care of managing this event loop for you. It will\
    \ figure out what widget the event applies to (did a user click on this button?\
    \ if a key was pressed, which textbox had the focus?), and dispatch it accordingly.\
    \ Individual widgets know how to respond to events; for example, a button might\
    \ change color when the mouse moves over it, and revert back when the mouse leaves.\n\
    \n> \U0001F4A1 *It's critical in event-driven applications that the event loop\
    \ not be blocked. The event loop should run continuously, normally executing dozens\
    \ of steps per second. At every step, it processes an event. If your program is\
    \ performing a long operation, it can potentially block the event loop. In that\
    \ case, no events would be processed, no drawing would be done, and it would appear\
    \ as if your application is frozen. There are many ways to avoid this happening,\
    \ mostly related to the structure of your application. We'll discuss this in more\
    \ detail in a later chapter.*\n\n# Command Callbacks\n\nYou often want your program\
    \ to handle some event in a particular way, e.g., do something when a button is\
    \ pushed. For those events that are most frequently customized (what good is a\
    \ button without something happening when you press it?), the widget will allow\
    \ you to specify a *callback* as a widget configuration option. We saw this in\
    \ the example with the `command` option of the button.\n\n```\ndef calculate(*args):\n\
    \    ...\n\nttk.Button(mainframe, text=\"Calculate\", command=calculate)\n```"
  - '[PAGE 59]


    Callbacks in Tk tend to be simpler than in user interface toolkits used with compiled
    languages (where a callback must be a procedure with a certain set of parameters
    or an object method with a certain signature). Instead, the callback is just an
    ordinary bit of code that the interpreter evaluates. While it can be as complicated
    as you want to make it, most of the time, you''ll just want your callback to call
    some other procedure.


    # **Binding to Events**


    For events that don''t have a widget-specific command callback associated with
    them, you can use Tk''s `bind` to capture any event, and then (like with callbacks)
    execute an arbitrary piece of code.

    Here''s a (silly) example showing a label responding to different events. When
    an event occurs, a description of the event is displayed in the label.


    ```

    from tkinter import *

    from tkinter import ttk

    root = Tk()

    l =ttk.Label(root, text="Starting...")

    l.grid()

    l.bind(''<Enter>'', lambda e: l.configure(text=''Moved mouse inside''))

    l.bind(''<Leave>'', lambda e: l.configure(text=''Moved mouse outside''))

    l.bind(''<ButtonPress-1>'', lambda e: l.configure(text=''Clicked left mouse button''))

    l.bind(''<3>'', lambda e: l.configure(text=''Clicked right mouse button''))

    l.bind(''<Double-1>'', lambda e: l.configure(text=''Double clicked''))

    l.bind(''<B3-Motion>'', lambda e: l.configure(text=''right button drag to %d,%d''
    % (e.x, e.y)))

    root.mainloop()

    ```


    [https://tkdocs.com/code/bindings.py](https://tkdocs.com/code/bindings.py)


    The first two bindings are pretty straightforward, just watching for simple events.
    An `<Enter>` event means the mouse has moved over top the widget, while the `<Leave>`
    event is generated when the mouse moves outside the widget to a different one.'
  - '[PAGE 60]


    The next binding looks for a mouse click, specifically a `<ButtonPress-1>` event.
    Here, the `<ButtonPress>` is the actual event, but the `-1` is an *event detail*
    specifying the left (main) mouse button on the mouse. The binding will only trigger
    when a `<ButtonPress>` event is generated involving the main mouse button. If
    another mouse button was clicked, this binding would ignore it.


    This next binding looks for a `<3>` event. This is actually a shorthand for `<ButtonPress-3>`.
    It will respond to events generated when the right mouse button is clicked. The
    next binding, `<Double-1>` (shorthand for `<Double-ButtonPress-1>`) adds another
    modifier, `Double`, and so will respond to the left mouse button being double
    clicked.


    The last binding also uses a modifier: capture mouse movement (`Motion`), but
    only when the right mouse button (`B3`) is held down. This binding also shows
    an example of how to use *event parameters*. Many events, such as mouse clicks
    or movement carry additional information like the current position of the mouse.
    Tk provides access to these parameters in Tcl callback scripts through the use
    of *percent substitutions*. These percent substitutions let you capture them so
    they can be used in your script.


    Tkinter abstracts away these percent substitutions and instead encapsulates all
    the event parameters in an *event object*. Above, we used the `x` and `y` fields
    to retrieve the mouse position. We''ll see percent substitutions used later in
    another context, entry widget validation.


    > What''s with the `lambda` expressions? Tkinter expects you to provide a function
    as the event callback, whose first argument is an event object representing the
    event that triggered the callback. It''s sometimes not worth the bother of defining
    regular named functions for one-off trivial callbacks such as in this example.
    Instead, we''ve just used Python''s anonymous functions via `lambda`. In real
    applications, you''ll almost always use a regular function, such as the `calculate`
    function in our feet to meters example, or a method of an object.


    # Multiple Bindings for an Event'
  - '[PAGE 61]


    We''ve just seen how event bindings can be set up for an individual widget. When
    a matching event is received by that widget, the binding will trigger. But that''s
    not all you can do.

    Your binding can capture not just a single event, but a short sequence of events.
    The `<Double-1>` binding triggers when two mouse clicks occur in a short time.
    You can do the same thing to capture two keys pressed in a row, e.g., `<KeyPress-A><KeyPress-B>`
    or simply `<ab>`.

    You can also set up an event binding on a toplevel window. When a matching event
    occurs anywhere in that window, the binding will be triggered. In our example,
    we set up a binding for the Return key on the main application toplevel window.
    If the Return key was pressed when any widget in the toplevel window had the focus,
    that binding would fire.

    Less commonly, you can create event bindings that are triggered when a matching
    event occurs anywhere in the application, or even for events received by any widget
    of a given class, e.g., all buttons.


    > More than one binding can fire for an event. This keeps event handlers concise
    and limited in scope, meaning more modular code. For example, the behavior of
    each widget class in Tk is itself defined with script-level event bindings. These
    stay separate from event bindings in your application. Event bindings can also
    be changed or deleted. They can be modified to alter event handling for widgets
    of a certain class or parts of your application. You can reorder, extend, or change
    the sequence of event bindings that will be triggered for each widget; see the
    `bindtags` command reference if you''re curious.

    https://tkdocs.com/man/bindtags


    # Available Events


    The most commonly used events are described below, along with the circumstances
    when they are generated. Some are generated on some platforms and not others.
    For a complete description of all the different event names, modifiers, and the
    different event parameters that are available with each, the best place to look
    is the `bind` command reference.'
- md: "## 6. Basic Widgets\n\nThis chapter introduces the basic Tk widgets that you'll\
    \ find in just about any user interface: frames, labels, buttons, checkbuttons,\
    \ radiobuttons, entries, and comboboxes. By the end, you'll know how to use all\
    \ the widgets you'd ever need for a typical fill-in-the-form type of user interface.\n\
    \nYou'll find it easiest to read this chapter (and those following that discuss\
    \ more widgets) in order. Because there is so much commonality between many widgets,\
    \ we'll introduce certain concepts when describing one widget that will also apply\
    \ to a widget we describe later. Rather than going over the same ground multiple\
    \ times, we'll refer back to when the concept was first introduced.\n\nAt each\
    \ widget is introduced, we'll note the Tkinter class used to create the widget\
    \ and its [Tk reference manual page](https://www.tcl.tk/man/tcl8.6/TkCmd/contents.htm).\
    \ Even though this reference documentation refers to the Tcl interface to Tk,\
    \ it is the most accurate and complete description of each Tk widget. The internals\
    \ of Python's Tkinter module directly rely on this Tcl interface. As a reminder,\
    \ this book highlights the *most useful parts* of Tk and how to use them to build\
    \ effective modern user interfaces. The reference documentation, which details\
    \ *everything* that can be done in Tk, serves a very different purpose.\n\n##\
    \ 6.1. Frame\n\nttk.Frame\nhttps://tkdocs.com/man/ttk_frame\n\nA **frame** is\
    \ a widget that displays as a simple rectangle. Frames help to organize your user\
    \ interface, often both visually and at the coding level. Frames often act as\
    \ master widgets for a geometry manager like `grid`, which manages the slave widgets\
    \ contained within the frame.\n\n![](img/e444c319ec16222f00278651bee8c21d_65_0.png)\n\
    \nFrames are created using the `ttk.Frame` class:\n\n```python\nframe = ttk.Frame(parent)\n\
    ```\n\nFrames can take several different configuration options, which can alter\
    \ how they are displayed.\n\n### Requested Size\n\nTypically, the size of a frame\
    \ is determined by the size and layout of any widgets within it. In turn, this\
    \ is controlled by the geometry manager that manages the contents of the frame\
    \ itself.\n\nIf, for some reason, you want an empty frame that does not contain\
    \ other widgets, you can instead explicitly set its size using the `width` and/or\
    \ `height` configuration options (otherwise, you'll end up with a very small frame\
    \ indeed).\n\nScreen distances such as width and height are usually specified\
    \ as a number of pixels on screen. You can also specify them via one of several\
    \ suffixes. For example, `350` means 350 pixels, `350c` means 350 centimeters,\
    \ `350m` means 350 millimeters, `350i` means 350 inches, and `350p` means 350\
    \ printer's points (1/72 inch).\n\n> Remember, if you request that a frame (or\
    \ any widget) to have a given size, the geometry manager has the final say. If\
    \ things aren't showing up the way you want them, make sure to check there too.\n\
    \n### Padding\n\nThe `padding` configuration option is used to request extra space\
    \ around the inside of the widget. If you're putting other widgets inside the\
    \ frame, there will be a bit of a margin all the way around. You can specify the\
    \ same padding for all sides, different horizontal and vertical padding, or padding\
    \ for each side separately.\n\n```python\nf['padding'] = 5              # 5 pixels\
    \ on all sides\nf['padding'] = (5,10)          # 5 on left and right, 10 on top\
    \ and bottom\nf['padding'] = (5,7,10,12)     # left: 5, top: 7, right: 10, bottom:\
    \ 12\n```\n\n### Borders\n\nYou can display a border around a frame widget to\
    \ visually separate it from its surroundings. You'll see this often used to make\
    \ a part of the user interface look sunken or raised. To do this, you need to\
    \ set the `borderwidth` configuration option (which defaults to 0, i.e., no border),\
    \ and the `relief` option, which specifies the visual appearance of the border.\
    \ This can be one of: `flat` (default), `raised`, `sunken`, `solid`, `ridge`,\
    \ or `groove`.\n\n```python\nframe['borderwidth'] = 2\nframe['relief'] = 'sunken'\n\
    ```\n\n### Changing Styles\n\nFrames have a `style` configuration option, which\
    \ is common to all of the themed widgets. This lets you control many other aspects\
    \ of their appearance or behavior. This is a bit more advanced, so we won't go\
    \ into it in too much detail right now. But here's a quick example of creating\
    \ a \"Danger\" frame with a red background and a raised border.\n\n```python\n\
    s = ttk.Style()\ns.configure('Danger.TFrame', background='red', borderwidth=5,\n\
    relief='raised')\nttk.Frame(root, width=200, height=200,\nstyle='Danger.TFrame').grid()\n\
    ```\n\n> What elements of widgets can be changed by styles vary by widget and\
    \ platform. On Windows and Linux, it does what you'd expect. On current macOS,\
    \ the frame will have a red raised border, but the background will remain the\
    \ default grey. Much more on why this is in a later chapter.\n\n> Styles mark\
    \ a sharp departure from how most aspects of a widget's visual appearance were\
    \ changed in the \"classic\" Tk widgets. In classic Tk, you could provide a wide\
    \ range of options to finely control every aspect of an individual widget's behavior,\
    \ e.g., foreground color, background color, font, highlight thickness, selected\
    \ foreground color, and padding. When using the new themed widgets, these changes\
    \ are made by modifying styles, not adding options to each widget.\n\nAs such,\
    \ many options you may be familiar with in certain classic widgets are not present\
    \ in their themed version. However, overuse of such options was a key factor undermining\
    \ the appearance of Tk applications, especially when used across different platforms.\
    \ Transitioning from classic to themed widgets provides an opportune time to review\
    \ and refine how (and if!) such appearance changes are made.\n\n---\n\n<Activate>:\n\
    \    Window has become active.\n<Deactivate>:\n    Window has been deactivated.\n\
    <MouseWheel>:\n    Scroll wheel on mouse has been moved.\n<KeyPress>:\n    Key\
    \ on keyboard has been pressed down.\n<KeyRelease>:\n    Key has been released.\n\
    <ButtonPress>:\n    A mouse button has been pressed.\n<ButtonRelease>:\n    A\
    \ mouse button has been released.\n<Motion>:\n    Mouse has been moved.\n<Configure>:\n\
    \    Widget has changed size or position.\n<Destroy>:\n    Widget is being destroyed.\n\
    <FocusIn>:\n    Widget has been given keyboard focus.\n<FocusOut>:\n    Widget\
    \ has lost keyboard focus.\n<Enter>:\n    Mouse pointer enters widget.\n<Leave>:\n\
    \    Mouse pointer leaves widget.\n\nEvent detail for mouse events are the button\
    \ that was pressed, e.g. 1, 2, or 3. For keyboard events, it's the specific key,\
    \ e.g. A, 9, space, plus, comma, equal. A complete list can be found in the keysyms\
    \ command reference.\n\nhttps://tkdocs.com/man/keysyms\n\nEvent modifiers for\
    \ include, e.g. B1 or Button1 to signify the main mouse button being held down,\
    \ Double or Triple for sequences of the same event. Key modifiers for when keys\
    \ on the keyboard are held down include `Control`, `Shift`, `Alt`, `Option`, and\
    \ `Command`.\n\n## Virtual Events\n\nThe events we've seen so far are low-level\
    \ operating system events like mouse clicks and window resizes. Many widgets also\
    \ generate higher level or semantic events called *virtual events*. These are\
    \ indicated by double angle brackets around the event name, e.g., `<<foo>>`.\n\
    \nFor example, a listbox widget will generate a `<<ListboxSelect>>` virtual event\
    \ whenever its selection changes. The same virtual event is generated whether\
    \ a user clicked on an item, moved to it using the arrow keys, or some other way.\
    \ Virtual events avoid the problem of setting up multiple, possibly platform-specific\
    \ event bindings to capture common changes. The available virtual events for a\
    \ widget will be listed in the documentation for the widget class.\n\nTk also\
    \ defines virtual events for common operations that are triggered in different\
    \ ways for different platforms. These include `<<Cut>>`, `<<Copy>>` and `<<Paste>>`.\n\
    \nYou can define your own virtual events, which can be specific to your application.\
    \ This can be a useful way to keep platform-specific details isolated in a single\
    \ module, while you use the virtual event throughout your application. Your own\
    \ code can generate virtual events that work in exactly the same way that virtual\
    \ events generated by Tk do.\n\n```python\nroot.event_generate(\"<<MyOwnEvent>>\"\
    )\n```"
  mdcn: "## 6. 基础控件\n\n本章介绍在几乎所有用户界面中都能找到的基础 Tk 控件：框架、标签、按钮、复选按钮、单选按钮、输入框和组合框。学完本章，你将掌握如何使用构建典型表单类用户界面所需的所有控件。\n\
    \n你会发现按顺序阅读本章（以及后续讨论更多控件的章节）最为轻松。因为许多控件之间存在大量共通之处，我们会在描述某个控件时引入一些概念，这些概念同样适用于后续介绍的控件。为了避免重复讲解，我们会回溯到概念首次引入的地方。\n\
    \n在介绍每个控件时，我们会注明用于创建该控件的 Tkinter 类及其 [Tk 参考手册页面](https://www.tcl.tk/man/tcl8.6/TkCmd/contents.htm)。尽管该参考文档描述的是\
    \ Tk 的 Tcl 接口，但它却是对每个 Tk 控件最准确、最完整的描述。Python 的 Tkinter 模块内部直接依赖于这个 Tcl 接口。需要提醒的是，本书重点介绍\
    \ Tk *最有用的部分* 以及如何使用它们构建高效的现代用户界面。而参考文档则详细说明了 Tk 中*所有*可用的功能，其目的截然不同。\n\n## 6.1.\
    \ 框架 (Frame)\n\nttk.Frame\nhttps://tkdocs.com/man/ttk_frame\n\n**框架** 是一个显示为简单矩形的控件。框架有助于组织你的用户界面，通常在视觉和代码层面都起到组织作用。框架通常作为几何管理器（如\
    \ `grid`）的主控件，管理包含在其中的子控件。\n\n![](img/e444c319ec16222f00278651bee8c21d_65_0.png)\n\
    \n框架使用 `ttk.Frame` 类创建：\n\n```python\nframe = ttk.Frame(parent)\n```\n\n框架可以接受多种不同的配置选项，这些选项可以改变它们的显示方式。\n\
    \n### 请求尺寸\n\n通常，框架的大小由其内部控件的大小和布局决定。而这又由管理框架内容的几何管理器控制。\n\n如果出于某种原因，你想要一个不包含其他控件的空框架，你可以使用\
    \ `width` 和/或 `height` 配置选项显式设置其大小（否则，你最终会得到一个非常小的框架）。\n\n屏幕距离（如宽度和高度）通常以屏幕上的像素数指定。你也可以通过几种后缀之一来指定。例如，`350`\
    \ 表示 350 像素，`350c` 表示 350 厘米，`350m` 表示 350 毫米，`350i` 表示 350 英寸，`350p` 表示 350 打印点（1/72\
    \ 英寸）。\n\n> 请记住，如果你请求一个框架（或任何控件）具有给定的大小，几何管理器拥有最终决定权。如果显示效果不符合预期，请务必检查几何管理器的设置。\n\
    \n### 内边距 (Padding)\n\n`padding` 配置选项用于请求控件内部周围的额外空间。如果你在框架内放置其他控件，四周会有一点边距。你可以为所有边指定相同的内边距，为水平和垂直方向指定不同的内边距，或者为每一边单独指定内边距。\n\
    \n```python\nf['padding'] = 5              # 所有边均为 5 像素\nf['padding'] = (5,10)\
    \          # 左右 5，上下 10\nf['padding'] = (5,7,10,12)     # 左：5，上：7，右：10，下：12\n\
    ```\n\n### 边框 (Borders)\n\n你可以为框架控件显示边框，以在视觉上将其与周围环境分隔开。你经常会看到它被用来使用户界面的某一部分看起来凹陷或凸起。为此，你需要设置\
    \ `borderwidth` 配置选项（默认为 0，即无边框）和 `relief` 选项，后者指定边框的视觉外观。可以是以下之一：`flat`（默认）、`raised`、`sunken`、`solid`、`ridge`\
    \ 或 `groove`。\n\n```python\nframe['borderwidth'] = 2\nframe['relief'] = 'sunken'\n\
    ```\n\n### 更改样式\n\n框架有一个 `style` 配置选项，这是所有主题控件共有的。这让你可以控制它们外观或行为的许多其他方面。这有点高级，所以我们现在不会详细讨论。但这里有一个快速示例，创建一个红色背景、凸起边框的“危险”框架。\n\
    \n```python\ns = ttk.Style()\ns.configure('Danger.TFrame', background='red', borderwidth=5,\n\
    relief='raised')\nttk.Frame(root, width=200, height=200,\nstyle='Danger.TFrame').grid()\n\
    ```\n\n> 控件的哪些元素可以通过样式更改，因控件和平台而异。在 Windows 和 Linux 上，它会按预期工作。在当前的 macOS 上，框架将具有红色的凸起边框，但背景将保持默认的灰色。关于原因，我们将在后面的章节中详细说明。\n\
    \n> 样式标志着与“经典” Tk 控件中更改控件视觉外观大多数方面的巨大差异。在经典 Tk 中，你可以提供广泛的选项来精细控制单个控件行为的各个方面，例如前景色、背景色、字体、高亮厚度、选中的前景色和内边距。使用新的主题控件时，这些更改是通过修改样式来完成的，而不是为每个控件添加选项。\n\
    \n因此，你在某些经典控件中可能熟悉的许多选项，在其主题版本中并不存在。然而，过度使用此类选项是破坏 Tk 应用程序外观的一个关键因素，尤其是在跨平台使用时。从经典控件过渡到主题控件，为审查和完善如何（以及是否！）进行此类外观更改提供了绝佳时机。\n\
    \n---\n\n<Activate>:\n    窗口已变为活动状态。\n<Deactivate>:\n    窗口已被停用。\n<MouseWheel>:\n\
    \    鼠标滚轮已移动。\n<KeyPress>:\n    键盘上的键已被按下。\n<KeyRelease>:\n    键已被释放。\n<ButtonPress>:\n\
    \    鼠标按钮已被按下。\n<ButtonRelease>:\n    鼠标按钮已被释放。\n<Motion>:\n    鼠标已移动。\n<Configure>:\n\
    \    控件的大小或位置已改变。\n<Destroy>:\n    控件正在被销毁。\n<FocusIn>:\n    控件已获得键盘焦点。\n<FocusOut>:\n\
    \    控件已失去键盘焦点。\n<Enter>:\n    鼠标指针进入控件。\n<Leave>:\n    鼠标指针离开控件。\n\n鼠标事件的事件详情是被按下的按钮，例如\
    \ 1、2 或 3。对于键盘事件，它是特定的键，例如 A、9、空格、加号、逗号、等号。完整列表可在 keysyms 命令参考中找到。\n\nhttps://tkdocs.com/man/keysyms\n\
    \n事件修饰符包括，例如 B1 或 Button1 表示按住主鼠标按钮，Double 或 Triple 表示相同事件的序列。键盘修饰符（当键盘上的键被按住时）包括\
    \ `Control`、`Shift`、`Alt`、`Option` 和 `Command`。\n\n## 虚拟事件\n\n到目前为止我们看到的事件都是低级操作系统事件，如鼠标点击和窗口调整大小。许多控件还会生成更高级别或语义化的事件，称为*虚拟事件*。这些事件用双尖括号括起来表示，例如\
    \ `<<foo>>`。\n\n例如，列表框控件在其选择发生变化时会生成 `<<ListboxSelect>>` 虚拟事件。无论是用户点击项目、使用箭头键移动到项目，还是其他方式，都会生成相同的虚拟事件。虚拟事件避免了为捕获常见更改而设置多个可能特定于平台的事件绑定的问题。控件可用的虚拟事件将在控件类的文档中列出。\n\
    \nTk 还为在不同平台上以不同方式触发的常见操作定义了虚拟事件。这些包括 `<<Cut>>`、`<<Copy>>` 和 `<<Paste>>`。\n\n\
    你可以定义自己的虚拟事件，这些事件可以特定于你的应用程序。这是一种有用的方式，可以将特定于平台的细节隔离在单个模块中，同时在整个应用程序中使用虚拟事件。你自己的代码可以生成与\
    \ Tk 生成的虚拟事件工作方式完全相同的虚拟事件。\n\n```python\nroot.event_generate(\"<<MyOwnEvent>>\"\
    )\n```"
