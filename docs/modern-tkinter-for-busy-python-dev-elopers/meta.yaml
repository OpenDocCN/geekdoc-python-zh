    or vertical rule between groups of widgets; often, this can be more space-efficient
    than using white space, which may be relevant for a tight display. Tk provides
    a simple **separator** widget for this purpose.


    ![](img/e444c319ec16222f00278651bee8c21d_183_0.png)


