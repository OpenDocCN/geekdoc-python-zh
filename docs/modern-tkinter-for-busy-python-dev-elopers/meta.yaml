    into various peoples'' thought processes around changes.


    > As you''ll see, this chapter highlights many of the shortcomings of IDLE''s
    user interface. This is done mainly for emphasis because many of the problems
    shown here are common to many applications and user interfaces. I have only the
    highest respect for the people who donated their limited time and resources to
    this open source project and had to consciously make tradeoffs between time, features,
    and user interface, all within the context of a decidedly non-trivial codebase.'
  - '[PAGE 270]


    # 18.2. Menus


    The very first change that was made was to remove the archaic tearoff menus. The
    macOS version of Tk doesn''t even support them, but they were still there on Windows
    and X11. See [bugs.python.org/issue13884].


    ![](img/e444c319ec16222f00278651bee8c21d_270_0.png)


    The change here was to add a "tearoff=0" option to the few places in the code
    where these menus were created.

    At least that was easy.

    There were also several bugs where items in the menu were not properly disabled
    when the feature was not available. This led to either menu items that did nothing
    (confusing for learners) or error dialogs that said little more than "you can''t
    do that."'
  - '[PAGE 271]


    # 18.3. Main Window


    One good thing about IDLE is that revolving around an editor and a shell, the
    majority of it really is a Tk text widget, and there was very little about *its*
    user interface that had to change. But even in the main window, which is mostly
    just a text widget, there were improvements to be had.


    The following images show the original version of IDLE''s shell window, pre-modernization,
    just as someone would see when they first launched the program.


    Looking at them, what improvements would you make?


    ![](img/e444c319ec16222f00278651bee8c21d_271_0.png)


    Main IDLE window on macOS.'
