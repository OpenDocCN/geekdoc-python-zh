    feet_entry.grid(column=2, row=1, sticky=(W, E))\n```\n\nWe need to do two things:\
    \ create the widget itself, and then place it onscreen.\n\nWhen we create a widget,\
    \ we need to specify its *parent*, which is the widget that this widget will be\
    \ placed inside. In this case, we want our entry placed inside the content frame.\
    \ Our entry, and other widgets we'll create shortly, are said to be *children*\
    \ of the content frame. The `parent` is always the first parameter passed when\
