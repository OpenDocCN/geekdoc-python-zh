    \n有几点值得注意。首先，与事件绑定一样，我们可以通过*百分比替换*访问有关触发验证条件的更多信息。我们在这里使用了其中一个：`%P` 是验证通过时输入框的*新值*。我们将使用一个简单的正则表达式和长度检查来确定更改是否有效。要拒绝更改，我们的验证命令可以返回一个假值，输入框将保持不变。\n\
    \n利用这些百分比替换需要一些技巧。您可能记得 Tkinter 在事件绑定回调中抽象掉了百分比替换。在那里，所有事件参数都被包装到一个事件对象中，该对象始终传递给回调。对于验证回调，没有等效的抽象。相反，我们必须选择我们感兴趣的百分比替换。`register`\
    \ 方法（可以在任何控件上调用，而不仅仅是 `root`）创建一个 Tcl 过程，该过程将调用我们的 Python 函数。我们选择的百分比替换将作为参数传递给它。\n\
    \n让我们扩展我们的示例，使输入框接受美国邮政编码，格式为 \"#####\" 或 \"#####-####\"（\"#\" 可以是任何数字）。我们仍然会在每次按键时进行一些验证（只允许输入数字或连字符）。但是，我们无法再在每次按键时完全验证输入框；如果用户刚刚输入第一位数字，它还不有效。因此，完全验证只会在输入框失去焦点时发生（例如，用户按\
