  - '[PAGE 126]


    Like a listbox or combobox, spinboxes can also be used to let users choose an
    item from an arbitrary list of strings; these can be specified using the `values`
    configuration option. This works in the same way it does for comboboxes; specifying
    a list of values will override to `from_` and `to` settings.

    In their default state, spinboxes allow users to select values either via the
    up and down buttons, or by typing them directly into the entry area that displays
    the current value. If you''d like to disable the latter feature, so that only
    the up and down buttons are available, you can set the `readonly` state flag.


    ```

    s.state([''readonly''])

    ```


    Like other themed widgets, you can also disable spinboxes, via the `disabled`
    state flag, or check the state via the `instate` method. Spinboxes also support
    validation in the same manner as entry widgets, using the `validate` and `validatecommand`
    configuration options.


    > 💡 You might be puzzled about when to choose a scale, listbox, combobox, entry,
    or a spinbox. Often, several of these can be used for the same types of data.
    The answer really depends on what you want users to select, platform user interface
    conventions, and the role the value plays in your user interface.


    For example, both a combobox and a spinbox take up fairly small amounts of space
    compared with a listbox. They might make sense for a more peripheral setting.
    A more primary and prominent choice in a user interface may warrant the extra
    space a listbox occupies. Spinboxes don''t make much sense when items don''t have
    a natural and obvious ordering to them. Be careful about putting too many items
    in both comboboxes and spinboxes. This can make it more time consuming to select
    an item.


    There is a boolean `wrap` option that determines whether the value should wrap
    around when it goes beyond the starting or ending values. You can also specify
    a `width` for the entry holding the current value of the spinbox.

