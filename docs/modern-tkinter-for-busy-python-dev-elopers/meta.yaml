  md: '# 4.4. What''s Missing


    We''ve now seen how to create widgets, put them onscreen, and respond to users
    interacting with them. It''s certainly not fancy, could probably do with some
    error checking, but it''s a fully-functional GUI application.


    It''s also worth examining what we *didn''t* have to include in our Tk program
    to make it work. For example:


    +   - we didn''t have to worry about redrawing the screen as things changed

    - we didn''t have to worry about parsing and dispatching events, hit detection,
    or handling events on each widget

    - we didn''t have to provide a lot of options when we created widgets; the defaults
    seemed to take care of most things, and so we only had to change things like the
    text the button displayed

    - we didn''t have to write complex code to get and set the values of simple widgets;
    we just attached them to variables

    - we didn''t have to worry about what happens when users close the window or resizes
    it

    - we didn''t need to write extra code to get this all to work cross-platform


