  md: '# 3.3. Installing Tk on Linux


    Tkinter (and, since Python 3.1, ttk, which is the interface to the newer themed
    widgets) is included in the Python standard library. It relies on Tcl/Tk being
    installed on your system. Depending on how you install Python, this may not happen
    automatically.


    > Remember, we''re using Python 3.x here, not 2.x.


    You have several different options to get Python and Tkinter onto your machine.
    We''ll show you two, using your distro''s package manager, or compiling from source.


    # Option 1. Your Linux Distribution''s Package Manager


    Currently supported Linux distributions usually install a recent version of Python
    3.x by default. If not, they have a package (.deb, .rpm, etc.) that you can install
    using their package manager. This is usually the easiest way to install Python.


    However, after you''re done installing Python, you should verify that Tkinter
    works correctly. Start up a Python shell (e.g. `/usr/bin/python3`) and verify
    the install (see below).


    You may find that when you try to `import tkinter` that you get an error. Sometimes
    it will tell you that you need to install another package. If so, follow the instructions,
