    \ a frame inside the main window? Strictly speaking, we could just put the other\
    \ widgets in our interface directly into the main application window, without\
    \ the intervening content frame. That's what you'll see in older Tk programs.\n\
    \nHowever, the main window isn't itself part of the newer \"themed\" widgets.\
