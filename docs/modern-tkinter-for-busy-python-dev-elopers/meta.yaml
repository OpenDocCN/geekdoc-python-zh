  - '[PAGE 54]


    # 5.2. Geometry Management


    If you''ve been running code interactively, you''ve probably that just by creating
    widgets, they didn''t appear onscreen. Placing widgets onscreen, and precisely
    *where* they are placed, is a separate step called *geometry management*.


    In our example, positioning each widget was accomplished by the `grid` command.
    We specified the column and row we wanted each widget to go in, how things were
    to be aligned within the grid, etc. Grid is an example of a *geometry manager*
    (of which there are several in Tk, grid being the most useful). For now, we''ll
    look at geometry management in general; we''ll talk about grid in a later chapter.


    A geometry manager''s job is to figure out exactly where those widgets are going
    to be put. This turns out to be a complex optimization problem, and a good geometry
    manager relies on quite sophisticated algorithms. A good geometry manager provides
    the flexibility, power, and ease of use that makes programmers happy. It also
    makes it easy to create good looking user interface layouts without needing to
    jump through hoops. Tk''s `grid` is, without a doubt, one of the absolute best.
    A poor geometry manager... well, all the Java programmers who have suffered through
    "GridBagLayout" please raise their hands.


    > We''ll go into more detail in a later chapter, but `grid` was introduced several
    years after Tk became popular. Before that, an older geometry manager named `pack`
    was most commonly used. It''s very powerful, but is much harder to use, and makes
    it extremely difficult to create layouts that look appealing today. Unfortunately,
    much of the example Tk code and documentation out there uses `pack` instead of
    `grid` (a good clue to how current it is). The widespread use of `pack` is one
    major reason that so many Tk user interfaces look terrible. Start new code with
    `grid`, and upgrade old code when you can.


    # The Problem'
  - '[PAGE 55]


    The problem for a geometry manager is to take all the different widgets the program
    creates, plus the program''s instructions for where in the window each should
    go (explicitly, or more often, relative to other widgets), and then actually position
    them in the window.

    In doing so, the geometry manager has to balance multiple constraints. Consider
    these situations:


    +   - The widgets may have a *natural* size, e.g., the natural width of a label
    would depend on the text it displays and the font used to display it. What if
    the application window containing all these different widgets isn''t big enough
    to accommodate them? The geometry manager must decide which widgets to shrink
    to fit, by how much, etc.

    - If the application window is bigger than the natural size of all the widgets,
    how is the extra space used? Is extra space placed between each widget, and if
    so, how is that space distributed? Is it used to make certain widgets larger than
    they normally want to be, such as a text entry growing to fill a wider window?
    Which widgets should grow?

    - If the application window is resized, how does the size and position of each
    widgets inside it change? Will certain areas (e.g., a text entry area) expand
    or shrink while other parts stay the same size, or is the area distributed differently?
    Do certain widgets have a minimum size that you want to avoid going below? A maximum
    size? Does the window itself have a minimum or maximum size?

    - How can widgets in different parts of the user interface be aligned with each
    other? How much space should be left between them? This is needed to present a
    clean layout and comply with platform-specific user interface guidelines.

    - For a complex user interface, which may have many frames nested in other frames
    nested in the window (etc.), how can all the above be accomplished, trading off
    the conflicting demands of different parts of the entire user interface?


    # **How it Works**'
  - '[PAGE 56]


    Geometry management in Tk relies on the concept of *master* and *slave* widgets.
    A master is a widget, typically a toplevel application window or a frame, which
    contains other widgets, called slaves. You can think of a geometry manager taking
    control of the master widget and deciding how all the slave widgets will be displayed
    within.


    > The computing community has embraced the more general societal trend towards
    more diversity, sensitivity, and awareness about the impacts of language. Recognizing
    this, the Tk core will slowly be adopting a more inclusive set of terminology.
    For example, where it makes sense, "parent" and "child" will be preferred over
    "master" and "slave." To preserve backward compatibility, the current terminology
    will not be disappearing. This is something to be aware of for the future. For
    more details, see [TIP #581](https://tip.tcl.tk/581).


    Your program tells the geometry manager what slaves to manage within the master,
    i.e., via calling `grid`. Your program also provides hints as to how it would
    like each slave to be displayed, e.g., via the `column` and `row` options. You
    can also provide other things to the geometry manager. For example, we used `columnconfigure`
    and `rowconfigure` to indicate the columns and rows we''d like to expand if there
    is extra space available in the window. It''s worth noting that all these parameters
    and hints are specific to `grid`; other geometry managers would use different
    ones.


    The geometry manager takes all the information about the slaves in the master,
    as well as information about how large the master is. It then asks each slave
    widget for its natural size, i.e., how large it would ideally like to be displayed.
    The geometry manager''s internal algorithm calculates the area each slave will
    be allocated (if any!). The slave is then responsible for rendering itself within
    that particular rectangle. And of course, any time the size of the master changes
    (e.g., because the toplevel window was resized), the natural size of a slave changes
    (e.g., because we''ve changed the text in a label), or any of the geometry manager
    parameters change (e.g., like `row`, `column`, or `sticky`) we repeat the whole
    thing.


    This all works recursively as well. In our example, we had a content frame inside
    the toplevel application window, and then several other widgets inside the content
    frame. We, therefore, had to manage the geometry for two different masters. At
    the outer level, the'
- md: "toplevel window was the master, and the content frame was its slave. At the\
    \ inner level, the content frame was the master, with each of the other widgets\
    \ being slaves. Notice that the same widget, e.g., the content frame, can be both\
    \ a master and a slave! As we saw previously, this widget hierarchy can be nested\
    \ much more deeply.\n\n> While each master can be managed by only one geometry\
    \ manager (e.g. `grid`), different masters can have different geometry managers.\
    \ While `grid` is the right choice most of the time, others may make sense for\
    \ a particular layout used in one part of your user interface. Other Tk geometry\
    \ managers include `pack`, which we've mentioned, and `place`, which leaves all\
    \ layout decisions entirely up to you. Some complex widgets like `canvas` and\
    \ `text` let you embed other widgets, making them de facto geometry managers.\n\
    \nFinally, we've been making the assumption that slave widgets are the immediate\
    \ children of their master in the widget hierarchy. While this is usually the\
    \ case, and mostly there's no good reason to do it any other way, it's also possible\
    \ (with some restrictions) to get around this.\n\n## 5.3. Event Handling\n\nTk,\
    \ as with most other user interface toolkits, runs an *event loop* that receives\
    \ events from the operating system. These are things like button presses, keystrokes,\
    \ mouse movement, window resizing, and so on.\n\nGenerally, Tk takes care of managing\
    \ this event loop for you. It will figure out what widget the event applies to\
    \ (did a user click on this button? if a key was pressed, which textbox had the\
    \ focus?), and dispatch it accordingly. Individual widgets know how to respond\
    \ to events; for example, a button might change color when the mouse moves over\
    \ it, and revert back when the mouse leaves.\n\n> \U0001F4A1 *It's critical in\
    \ event-driven applications that the event loop not be blocked. The event loop\
    \ should run continuously, normally executing dozens of steps per second. At every\
    \ step, it processes an event. If your program is performing a long operation,\
    \ it can potentially block the event loop. In that case, no events would be processed,\
    \ no drawing would be done, and it would appear as if your application is frozen.\
    \ There are many ways to avoid this happening, mostly related to the structure\
    \ of your application. We'll discuss this in more detail in a later chapter.*\n\
    \n### Command Callbacks\n\nYou often want your program to handle some event in\
    \ a particular way, e.g., do something when a button is pushed. For those events\
    \ that are most frequently customized (what good is a button without something\
    \ happening when you press it?), the widget will allow you to specify a *callback*\
    \ as a widget configuration option. We saw this in the example with the `command`\
    \ option of the button.\n\n```\ndef calculate(*args):\n    ...\n\nttk.Button(mainframe,\
    \ text=\"Calculate\", command=calculate)\n```\n\nCallbacks in Tk tend to be simpler\
    \ than in user interface toolkits used with compiled languages (where a callback\
    \ must be a procedure with a certain set of parameters or an object method with\
    \ a certain signature). Instead, the callback is just an ordinary bit of code\
    \ that the interpreter evaluates. While it can be as complicated as you want to\
    \ make it, most of the time, you'll just want your callback to call some other\
    \ procedure.\n\n### Binding to Events\n\nFor events that don't have a widget-specific\
    \ command callback associated with them, you can use Tk's `bind` to capture any\
    \ event, and then (like with callbacks) execute an arbitrary piece of code.\n\
    Here's a (silly) example showing a label responding to different events. When\
    \ an event occurs, a description of the event is displayed in the label.\n\n```\n\
    from tkinter import *\nfrom tkinter import ttk\nroot = Tk()\nl = ttk.Label(root,\
    \ text=\"Starting...\")\nl.grid()\nl.bind('<Enter>', lambda e: l.configure(text='Moved\
    \ mouse inside'))\nl.bind('<Leave>', lambda e: l.configure(text='Moved mouse outside'))\n\
    l.bind('<ButtonPress-1>', lambda e: l.configure(text='Clicked left mouse button'))\n\
    l.bind('<3>', lambda e: l.configure(text='Clicked right mouse button'))\nl.bind('<Double-1>',\
    \ lambda e: l.configure(text='Double clicked'))\nl.bind('<B3-Motion>', lambda\
    \ e: l.configure(text='right button drag to %d,%d' % (e.x, e.y)))\nroot.mainloop()\n\
    ```\n\n[https://tkdocs.com/code/bindings.py](https://tkdocs.com/code/bindings.py)\n\
    \nThe first two bindings are pretty straightforward, just watching for simple\
    \ events. An `<Enter>` event means the mouse has moved over top the widget, while\
    \ the `<Leave>` event is generated when the mouse moves outside the widget to\
    \ a different one.\n\nThe next binding looks for a mouse click, specifically a\
    \ `<ButtonPress-1>` event. Here, the `<ButtonPress>` is the actual event, but\
    \ the `-1` is an *event detail* specifying the left (main) mouse button on the\
    \ mouse. The binding will only trigger when a `<ButtonPress>` event is generated\
    \ involving the main mouse button. If another mouse button was clicked, this binding\
    \ would ignore it.\n\nThis next binding looks for a `<3>` event. This is actually\
    \ a shorthand for `<ButtonPress-3>`. It will respond to events generated when\
    \ the right mouse button is clicked. The next binding, `<Double-1>` (shorthand\
    \ for `<Double-ButtonPress-1>`) adds another modifier, `Double`, and so will respond\
    \ to the left mouse button being double clicked.\n\nThe last binding also uses\
    \ a modifier: capture mouse movement (`Motion`), but only when the right mouse\
    \ button (`B3`) is held down. This binding also shows an example of how to use\
    \ *event parameters*. Many events, such as mouse clicks or movement carry additional\
    \ information like the current position of the mouse. Tk provides access to these\
    \ parameters in Tcl callback scripts through the use of *percent substitutions*.\
    \ These percent substitutions let you capture them so they can be used in your\
    \ script.\n\nTkinter abstracts away these percent substitutions and instead encapsulates\
    \ all the event parameters in an *event object*. Above, we used the `x` and `y`\
    \ fields to retrieve the mouse position. We'll see percent substitutions used\
    \ later in another context, entry widget validation.\n\n> What's with the `lambda`\
    \ expressions? Tkinter expects you to provide a function as the event callback,\
    \ whose first argument is an event object representing the event that triggered\
    \ the callback. It's sometimes not worth the bother of defining regular named\
    \ functions for one-off trivial callbacks such as in this example. Instead, we've\
    \ just used Python's anonymous functions via `lambda`. In real applications, you'll\
    \ almost always use a regular function, such as the `calculate` function in our\
    \ feet to meters example, or a method of an object.\n\n### Multiple Bindings for\
    \ an Event\n\nWe've just seen how event bindings can be set up for an individual\
    \ widget. When a matching event is received by that widget, the binding will trigger.\
    \ But that's not all you can do.\nYour binding can capture not just a single event,\
    \ but a short sequence of events. The `<Double-1>` binding triggers when two mouse\
    \ clicks occur in a short time. You can do the same thing to capture two keys\
    \ pressed in a row, e.g., `<KeyPress-A><KeyPress-B>` or simply `<ab>`.\nYou can\
    \ also set up an event binding on a toplevel window. When a matching event occurs\
    \ anywhere in that window, the binding will be triggered. In our example, we set\
    \ up a binding for the Return key on the main application toplevel window. If\
    \ the Return key was pressed when any widget in the toplevel window had the focus,\
    \ that binding would fire.\nLess commonly, you can create event bindings that\
    \ are triggered when a matching event occurs anywhere in the application, or even\
    \ for events received by any widget of a given class, e.g., all buttons.\n\n>\
    \ More than one binding can fire for an event. This keeps event handlers concise\
    \ and limited in scope, meaning more modular code. For example, the behavior of\
    \ each widget class in Tk is itself defined with script-level event bindings.\
    \ These stay separate from event bindings in your application. Event bindings\
    \ can also be changed or deleted. They can be modified to alter event handling\
    \ for widgets of a certain class or parts of your application. You can reorder,\
    \ extend, or change the sequence of event bindings that will be triggered for\
    \ each widget; see the `bindtags` command reference if you're curious.\nhttps://tkdocs.com/man/bindtags\n\
    \n### Available Events\n\nThe most commonly used events are described below, along\
    \ with the circumstances when they are generated. Some are generated on some platforms\
    \ and not others. For a complete description of all the different event names,\
    \ modifiers, and the different event parameters that are available with each,\
    \ the best place to look is the `bind` command reference."
  mdcn: "顶层窗口是主控方，内容框架是其从属方。在内部层级，内容框架是主控方，其他每个控件都是从属方。请注意，同一个控件（例如内容框架）既可以是主控方，也可以是从属方！正如我们之前所见，这种控件层级结构可以嵌套得更深。\n\
    \n> 虽然每个主控方只能由一个几何管理器（例如 `grid`）管理，但不同的主控方可以使用不同的几何管理器。虽然 `grid` 在大多数情况下是正确的选择，但对于用户界面中某个特定部分使用的布局，其他管理器可能更合适。其他\
    \ Tk 几何管理器包括我们之前提到的 `pack`，以及将所有布局决策完全交由你决定的 `place`。一些复杂的控件，如 `canvas` 和 `text`，允许你嵌入其他控件，使它们成为事实上的几何管理器。\n\
    \n最后，我们一直假设从属控件是其主控方在控件层级中的直接子控件。虽然通常情况如此，且大多数时候没有充分理由不这样做，但（在某些限制下）也有可能绕过这一点。\n\
    \n## 5.3. 事件处理\n\nTk 与大多数其他用户界面工具包一样，运行一个从操作系统接收事件的*事件循环*。这些事件包括按钮点击、按键、鼠标移动、窗口大小调整等等。\n\
    \n通常，Tk 会为你管理这个事件循环。它会确定事件适用于哪个控件（用户是否点击了这个按钮？如果按下了键，哪个文本框拥有焦点？），并相应地进行分发。各个控件知道如何响应事件；例如，当鼠标移到按钮上时，按钮可能会变色，当鼠标离开时又会恢复原状。\n\
    \n> \U0001F4A1 *在事件驱动的应用程序中，事件循环不能被阻塞，这一点至关重要。事件循环应持续运行，通常每秒执行数十个步骤。在每个步骤中，它都会处理一个事件。如果你的程序正在执行一个长时间的操作，它可能会阻塞事件循环。在这种情况下，将不会处理任何事件，不会进行任何绘制，你的应用程序看起来就像冻结了一样。有许多方法可以避免这种情况发生，主要与你的应用程序结构有关。我们将在后面的章节中更详细地讨论这一点。*\n\
    \n### 命令回调\n\n你通常希望你的程序以特定方式处理某些事件，例如，当按钮被按下时执行某些操作。对于那些最常被定制的事件（如果按下按钮时什么都不会发生，那按钮有什么用？），控件将允许你将*回调*指定为控件配置选项。我们在按钮的\
    \ `command` 选项示例中看到了这一点。\n\n```\ndef calculate(*args):\n    ...\n\nttk.Button(mainframe,\
    \ text=\"Calculate\", command=calculate)\n```\n\nTk 中的回调往往比使用编译语言的用户界面工具包中的回调更简单（在那些工具包中，回调必须是一个具有特定参数集的过程或具有特定签名的对象方法）。相反，回调只是解释器执行的一段普通代码。虽然它可以像你想要的那样复杂，但大多数时候，你只需要你的回调调用其他某个过程。\n\
    \n### 绑定到事件\n\n对于那些没有与控件特定命令回调相关联的事件，你可以使用 Tk 的 `bind` 来捕获任何事件，然后（就像回调一样）执行任意一段代码。\n\
    下面是一个（有点傻的）示例，展示了一个标签如何响应不同的事件。当事件发生时，标签中会显示事件的描述。\n\n```\nfrom tkinter import\
    \ *\nfrom tkinter import ttk\nroot = Tk()\nl = ttk.Label(root, text=\"Starting...\"\
    )\nl.grid()\nl.bind('<Enter>', lambda e: l.configure(text='Moved mouse inside'))\n\
    l.bind('<Leave>', lambda e: l.configure(text='Moved mouse outside'))\nl.bind('<ButtonPress-1>',\
    \ lambda e: l.configure(text='Clicked left mouse button'))\nl.bind('<3>', lambda\
    \ e: l.configure(text='Clicked right mouse button'))\nl.bind('<Double-1>', lambda\
    \ e: l.configure(text='Double clicked'))\nl.bind('<B3-Motion>', lambda e: l.configure(text='right\
    \ button drag to %d,%d' % (e.x, e.y)))\nroot.mainloop()\n```\n\n[https://tkdocs.com/code/bindings.py](https://tkdocs.com/code/bindings.py)\n\
    \n前两个绑定非常直接，只是监视简单的事件。`<Enter>` 事件表示鼠标已移到控件上方，而 `<Leave>` 事件在鼠标移出控件到另一个控件时生成。\n\
    \n下一个绑定寻找鼠标点击，具体是 `<ButtonPress-1>` 事件。这里，`<ButtonPress>` 是实际事件，但 `-1` 是一个*事件细节*，指定鼠标上的左键（主键）。绑定仅在涉及主鼠标按钮的\
    \ `<ButtonPress>` 事件生成时触发。如果点击了另一个鼠标按钮，此绑定将忽略它。\n\n下一个绑定寻找 `<3>` 事件。这实际上是 `<ButtonPress-3>`\
    \ 的简写。它将响应点击右鼠标按钮时生成的事件。下一个绑定 `<Double-1>`（`<Double-ButtonPress-1>` 的简写）添加了另一个修饰符\
    \ `Double`，因此将响应左鼠标按钮的双击。\n\n最后一个绑定也使用了一个修饰符：捕获鼠标移动（`Motion`），但仅在按住右鼠标按钮（`B3`）时。此绑定还展示了如何使用*事件参数*的示例。许多事件，如鼠标点击或移动，携带额外信息，如鼠标当前位置。Tk\
    \ 通过使用*百分比替换*在 Tcl 回调脚本中提供对这些参数的访问。这些百分比替换允许你捕获它们，以便在脚本中使用。\n\nTkinter 抽象了这些百分比替换，而是将所有事件参数封装在一个*事件对象*中。在上面，我们使用了\
    \ `x` 和 `y` 字段来检索鼠标位置。我们稍后将在另一个上下文（输入控件验证）中看到百分比替换的使用。\n\n> `lambda` 表达式是怎么回事？Tkinter\
    \ 期望你提供一个函数作为事件回调，其第一个参数是一个表示触发回调的事件的事件对象。有时，为了一次性的简单回调（如本例所示）而定义常规命名函数不值得麻烦。相反，我们只是通过\
    \ `lambda` 使用了 Python 的匿名函数。在实际应用中，你几乎总是会使用常规函数，例如我们英尺转米示例中的 `calculate` 函数，或对象的方法。\n\
    \n### 事件的多重绑定\n\n我们刚刚看到了如何为单个控件设置事件绑定。当该控件接收到匹配的事件时，绑定将触发。但这并不是你能做的全部。\n你的绑定不仅可以捕获单个事件，还可以捕获一个短事件序列。`<Double-1>`\
    \ 绑定在短时间内发生两次鼠标点击时触发。你可以做同样的事情来捕获连续按下的两个键，例如 `<KeyPress-A><KeyPress-B>` 或简写为 `<ab>`。\n\
    你也可以在顶层窗口上设置事件绑定。当该窗口中任何位置发生匹配事件时，绑定将被触发。在我们的示例中，我们在主应用程序顶层窗口上为 Return 键设置了一个绑定。如果当顶层窗口中的任何控件拥有焦点时按下了\
    \ Return 键，该绑定就会触发。\n较少见的是，你可以创建在应用程序中任何位置发生匹配事件时触发的事件绑定，甚至对于给定类别的任何控件接收到的事件，例如所有按钮。\n\
    \n> 一个事件可以触发多个绑定。这使得事件处理程序简洁且作用域有限，意味着更模块化的代码。例如，Tk 中每个控件类的行为本身是通过脚本级事件绑定定义的。这些与你的应用程序中的事件绑定是分开的。事件绑定也可以更改或删除。它们可以被修改以改变某个类别的控件或应用程序某些部分的事件处理。你可以重新排序、扩展或更改每个控件将触发的事件绑定序列；如果你好奇，可以参阅\
    \ `bindtags` 命令参考。\nhttps://tkdocs.com/man/bindtags\n\n### 可用事件\n\n最常用的事件描述如下，以及它们生成的情况。有些事件在某些平台上生成，而在其他平台上不生成。要获取所有不同事件名称、修饰符以及每个事件可用的不同事件参数的完整描述，最好的地方是查阅\
    \ `bind` 命令参考。"
