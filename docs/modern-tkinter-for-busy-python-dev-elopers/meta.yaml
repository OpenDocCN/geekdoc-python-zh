    \n## 15. Text\n\nA **text** widget manages a multi-line text area. Like the canvas\
    \ widget, Tk's text widget is an immensely flexible and powerful tool which can\
    \ be used for a wide variety of tasks. It can provide a simple multi-line text\
    \ area as part of a form. But text widgets can also form the basis for a stylized\
    \ code editor, an outliner, a web browser, and much more.\n\nNote: Text widgets\
    \ are part of the classic Tk widgets, not the themed Tk widgets.\n\nWhile we briefly\
    \ introduced text widgets in an earlier chapter, we'll go into much more detail\
    \ here. You'll get a better sense of the level of sophistication they allow. Still,\
    \ for any significant work with the text widget, the [reference manual](reference\
    \ manual) is well-organized, useful, and a highly-recommended read.\n\nText widgets\
    \ are created using the `Text` class:\n\n```python\ntext = Text(parent, width=40,\
    \ height=10)\n```\n\nYou'll often provide a width (in characters) and height (in\
    \ lines). As always, you can ask the geometry manager to expand it to fill the\
    \ available space in the window.\n\n### 15.1. The Basics\n\nIf you simply need\
    \ a multi-line text field for a form, there are only a few things to worry about:\
    \ creating and sizing the widget (check), providing an initial value, and retrieving\
    \ the text after a user has submitted the form.\n\n### Providing Initial Content\n\
    \nText widgets start with nothing in them, so we'll need to add any initial content\
    \ ourselves. Because text widgets can hold a lot more than plain text, a simple\
    \ mechanism (like the entry widget's `textvariable` configuration option) isn't\
    \ sufficient. Instead, we'll use the widget's `insert` method:\n\n```python\n\
    text.insert('1.0', 'here is my\\ntext to insert')\n```\n\nThe \"1.0\" here is\
    \ the position where to insert the text, and can be read as \"line 1, character\
    \ 0\". This refers to the first character of the first line. Historically, especially\
    \ on Unix, programmers tend to think about line numbers as 1-based and character\
    \ positions as 0-based. The text to insert is just a string. Because the widget\
    \ can hold multi-line text, the string we supply can be multi-line as well. To\
    \ do this, simply embed `\\n` (newline) characters in the string at the appropriate\
    \ locations.\n\n### Retrieving the Text\n\nAfter users have made any changes and\
    \ submitted the form (for example), your program can retrieve the contents of\
    \ the widget via the `get` method:\n\n```python\nthetext = text.get('1.0', 'end')\n\
    ```\n\nThe two parameters are the start and end position; `end` has the obvious\
    \ meaning. You can provide different start and end positions if you want to obtain\
    \ only part of the text. You'll see more on positions shortly."
