- md: "## 8.5. Spinbox\n\nttk.Spinbox\nhttps://tkdocs.com/man/ttk_spinbox\n\nA **spinbox**\
    \ widget allows users to choose numbers (or, in fact, items from an arbitrary\
    \ list). It does this by combining an entry-like widget showing the current value\
    \ with a pair of small up/down arrows, which can be used to step through the range\
    \ of possible choices.\n\n> \U0001F4A1 The themed spinbox was added in Tk 8.5.9\
    \ (released in 2010). If you must run an older version, there is a spinbox in\
    \ the classic Tk widgets, though with a slightly different API.\n\n![](img/e444c319ec16222f00278651bee8c21d_125_0.png)\n\
    \nSpinbox widgets are created using the `ttk.Spinbox` class:\n\n```python\nspinval\
    \ = StringVar()\ns = ttk.Spinbox(parent, from_=1.0, to=100.0,\n              \
    \  textvariable=spinval)\n```\n\nLike scale widgets, spinboxes let user choose\
    \ a number between a certain range (specified using the `from_` and `to` configuration\
    \ options), though through a very different user interface. You can also specify\
    \ an `increment`, which controls how much the value changes every time you click\
    \ the up or down button.\n\nLike a listbox or combobox, spinboxes can also be\
    \ used to let users choose an item from an arbitrary list of strings; these can\
    \ be specified using the `values` configuration option. This works in the same\
    \ way it does for comboboxes; specifying a list of values will override to `from_`\
    \ and `to` settings.\nIn their default state, spinboxes allow users to select\
    \ values either via the up and down buttons, or by typing them directly into the\
    \ entry area that displays the current value. If you'd like to disable the latter\
    \ feature, so that only the up and down buttons are available, you can set the\
    \ `readonly` state flag.\n\n```python\ns.state(['readonly'])\n```\n\nLike other\
    \ themed widgets, you can also disable spinboxes, via the `disabled` state flag,\
    \ or check the state via the `instate` method. Spinboxes also support validation\
    \ in the same manner as entry widgets, using the `validate` and `validatecommand`\
    \ configuration options.\n\n> \U0001F4A1 You might be puzzled about when to choose\
    \ a scale, listbox, combobox, entry, or a spinbox. Often, several of these can\
    \ be used for the same types of data. The answer really depends on what you want\
    \ users to select, platform user interface conventions, and the role the value\
    \ plays in your user interface.\n\nFor example, both a combobox and a spinbox\
    \ take up fairly small amounts of space compared with a listbox. They might make\
    \ sense for a more peripheral setting. A more primary and prominent choice in\
    \ a user interface may warrant the extra space a listbox occupies. Spinboxes don't\
    \ make much sense when items don't have a natural and obvious ordering to them.\
    \ Be careful about putting too many items in both comboboxes and spinboxes. This\
    \ can make it more time consuming to select an item.\n\nThere is a boolean `wrap`\
    \ option that determines whether the value should wrap around when it goes beyond\
    \ the starting or ending values. You can also specify a `width` for the entry\
    \ holding the current value of the spinbox.\nAgain there are choices as to how\
    \ to set or get the current value in the spinbox. Normally, you would specify\
    \ a linked variable with the `textvariable` configuration option. As usual, any\
    \ changes to the variable are reflected in the spinbox, while any changes in the\
    \ spinbox are reflected in the linked variable. As well, the `set value` and `get`\
    \ methods allow you to set or get the value directly.\n\nSpinboxes generate virtual\
    \ events when users press up (`<<Increment>>`) or down (`<<Decrement>>`). A `command`\
    \ configuration option allows you to provide a callback that is invoked on any\
    \ changes.\n\n## 8.6. Progressbar\n\nttk.Progressbar\nhttps://tkdocs.com/man/ttk_progressbar\n\
    \nA **progressbar** widget provides feedback to users about the progress of a\
    \ lengthy operation.\nIn situations where you can estimate how long the operation\
    \ will take to complete, you can display what fraction has already been completed.\
    \ Otherwise, you can indicate the operation is continuing, but without suggesting\
    \ how much longer it will take.\n\n![](img/e444c319ec16222f00278651bee8c21d_128_0.png)\n\
    \nProgressbar widgets are created using the `ttk.Progressbar` class:\n\n```python\n\
    p = ttk.Progressbar(parent, orient=HORIZONTAL, length=200,\n    mode='determinate')\n\
    ```\n\nAs with scale widgets, they should be given an orientation (`horizontal`\
    \ or `vertical`) with the `orient` configuration option, and can be given an optional\
    \ `length`. The `mode` configuration option can be set to either `determinate`,\
    \ where the progressbar will indicate relative progress towards completion, or\
    \ to `indeterminate`, where it shows that the operation is still continuing but\
    \ without showing relative progress.\n\n### **Determinate Progress**\n\nTo use\
    \ determinate mode, estimate the total number of \"steps\" the operation will\
    \ take to complete. This could be an amount of time but doesn't need to be. Provide\
    \ this to the progressbar using the `maximum` configuration option. It should\
    \ be a floating-point number and defaults to `100.0` (i.e., each step is 1%).\n\
    \nAs you proceed through the operation, tell the progressbar how far along you\
    \ are with the `value` configuration option. So this would start at 0, and then\
    \ count upwards to the maximum value you have set.\n\n> There are two slight variations\
    \ on this. First, you can just store the current value for the progressbar in\
    \ a variable linked to it by the progressbar's `variable` configuration option;\
    \ that way, when you change the variable, the progressbar will update. The other\
    \ alternative is to call the progressbar's `step ?amount?` method. This increments\
    \ the value by the given `amount` (defaults to 1.0).\n\n### **Indeterminate Progress**\n\
    \nUse indeterminate mode when you can't easily estimate how far along in a long-running\
    \ task you actually are. However, you still want to provide feedback that the\
    \ operation is continuing (and that your program hasn't crashed). At the start\
    \ of the operation you'll just call the progressbar's `start` method. At the end\
    \ of the operation, call its `stop` method. The progressbar will take care of\
    \ the rest.\n\nUnfortunately, \"the progressbar will take care of the rest\" isn't\
    \ quite so simple. In fact, if you `start` the progressbar, call a function that\
    \ takes several minutes to complete, and then `stop` the progressbar, your program\
    \ will appear frozen the whole time, with the progressbar not updating. In fact,\
    \ it will not likely appear onscreen at all. Yikes!\n\nTo learn why that is, and\
    \ how to address it, the next chapter takes a deeper dive into Tk's event loop.\n\
    \n## 9. Event Loop\n\nAt the end of the last chapter, we explained how to use\
    \ a progressbar to provide feedback to users about long-running operations. The\
    \ progressbar itself was simple: call it's `start` method, perform your operation,\
    \ and then call it's `stop` method. Unfortunately, you learned that if you tried\
    \ this, your application will most likely appear completely frozen.\n\nTo understand\
    \ why, we need to revisit our discussion of event handling, way back in the Tk\
    \ Concepts chapter. As we've seen, after we construct an application's initial\
    \ user interface, it enters the Tk event loop. In the event loop, it continually\
    \ processes events, pulled from the system event queue, usually dozens of times\
    \ a second. It watches for mouse or keyboard events, invoking command callbacks\
    \ and event bindings as needed.\n\nLess obviously, all screen updates are processed\
    \ only in the event loop. For example, you may change the text of a label widget.\
    \ However, that change doesn't appear onscreen immediately. Instead, the widget\
    \ notifies Tk that it needs to be redrawn. Later on, in between processing other\
    \ events, Tk's event loop will ask the widget to redraw itself. *All drawing occurs\
    \ only in the event loop.* The change *appears* to happen immediately because\
    \ the time between making the change to the widget and the actual redraw in the\
    \ event loop is so small.\n\n![](img/e444c319ec16222f00278651bee8c21d_131_0.png)\n\
    \nEvent loop showing application callbacks and screen updates."
  mdcn: "## 8.5. Spinbox\n\nttk.Spinbox\nhttps://tkdocs.com/man/ttk_spinbox\n\n**Spinbox**\
    \ 控件允许用户选择数字（或者实际上是从任意列表中选择项目）。它通过组合一个显示当前值的类输入框控件和一对小的上下箭头来实现这一点，这些箭头可用于在可能的选择范围内逐步选择。\n\
    \n> \U0001F4A1 主题化的 Spinbox 是在 Tk 8.5.9（2010年发布）中添加的。如果你必须运行更旧的版本，经典 Tk 控件中有一个\
    \ spinbox，不过其 API 略有不同。\n\n![](img/e444c319ec16222f00278651bee8c21d_125_0.png)\n\
    \nSpinbox 控件使用 `ttk.Spinbox` 类创建：\n\n```python\nspinval = StringVar()\ns = ttk.Spinbox(parent,\
    \ from_=1.0, to=100.0,\n                textvariable=spinval)\n```\n\n与 scale\
    \ 控件类似，spinbox 让用户在特定范围内选择一个数字（通过 `from_` 和 `to` 配置选项指定），尽管使用的是完全不同的用户界面。你还可以指定一个\
    \ `increment`，它控制每次点击向上或向下按钮时值的变化量。\n\n与 listbox 或 combobox 类似，spinbox 也可以用于让用户从任意字符串列表中选择一个项目；这些可以通过\
    \ `values` 配置选项指定。其工作方式与 combobox 相同；指定值列表将覆盖 `from_` 和 `to` 设置。\n在默认状态下，spinbox\
    \ 允许用户通过向上和向下按钮选择值，或者直接在显示当前值的输入区域中键入值。如果你想禁用后一项功能，只允许使用向上和向下按钮，可以设置 `readonly`\
    \ 状态标志。\n\n```python\ns.state(['readonly'])\n```\n\n与其他主题控件一样，你也可以通过 `disabled`\
    \ 状态标志禁用 spinbox，或者通过 `instate` 方法检查状态。Spinbox 还以与 entry 控件相同的方式支持验证，使用 `validate`\
    \ 和 `validatecommand` 配置选项。\n\n> \U0001F4A1 你可能对何时选择 scale、listbox、combobox、entry\
    \ 或 spinbox 感到困惑。通常，其中几种都可以用于相同类型的数据。答案实际上取决于你希望用户选择什么、平台用户界面惯例以及该值在用户界面中扮演的角色。\n\
    \n例如，与 listbox 相比，combobox 和 spinbox 占用的空间都相当小。对于更外围的设置，它们可能更有意义。用户界面中更主要、更突出的选择可能值得使用\
    \ listbox 占用的额外空间。当项目没有自然且明显的顺序时，spinbox 就没有太大意义了。注意不要在 combobox 和 spinbox 中放入过多的项目。这可能会使选择项目更加耗时。\n\
    \n有一个布尔选项 `wrap`，它决定当值超出起始或结束值时是否应该循环。你还可以为保存 spinbox 当前值的输入框指定一个 `width`。\n同样，关于如何设置或获取\
    \ spinbox 中的当前值也有多种选择。通常，你会通过 `textvariable` 配置选项指定一个关联变量。与往常一样，对变量的任何更改都会反映在\
    \ spinbox 中，而 spinbox 中的任何更改也会反映在关联变量中。此外，`set value` 和 `get` 方法允许你直接设置或获取值。\n\
    \n当用户按下向上（`<<Increment>>`）或向下（`<<Decrement>>`）时，Spinbox 会生成虚拟事件。`command` 配置选项允许你提供一个在任何更改时调用的回调函数。\n\
    \n## 8.6. Progressbar\n\nttk.Progressbar\nhttps://tkdocs.com/man/ttk_progressbar\n\
    \n**Progressbar** 控件向用户提供关于长时间操作进度的反馈。\n在你可以估计操作完成所需时间的情况下，你可以显示已完成的比例。否则，你可以指示操作正在进行，但不暗示还需要多长时间。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_128_0.png)\n\nProgressbar 控件使用 `ttk.Progressbar`\
    \ 类创建：\n\n```python\np = ttk.Progressbar(parent, orient=HORIZONTAL, length=200,\n\
    \    mode='determinate')\n```\n\n与 scale 控件一样，应通过 `orient` 配置选项为其指定方向（`horizontal`\
    \ 或 `vertical`），并且可以指定可选的 `length`。`mode` 配置选项可以设置为 `determinate`（进度条将显示相对于完成的进度）或\
    \ `indeterminate`（显示操作仍在继续，但不显示相对进度）。\n\n### **确定进度**\n\n要使用确定模式，请估计操作完成所需的总“步数”。这可以是时间量，但不必是。使用\
    \ `maximum` 配置选项将其提供给进度条。它应该是一个浮点数，默认为 `100.0`（即每一步为 1%）。\n\n在操作过程中，通过 `value`\
    \ 配置选项告诉进度条你的进度。因此，这将从 0 开始，然后向上计数到你设置的最大值。\n\n> 这里有两个细微的变化。首先，你可以将进度条的当前值存储在一个通过进度条的\
    \ `variable` 配置选项与之关联的变量中；这样，当你更改变量时，进度条将更新。另一种选择是调用进度条的 `step ?amount?` 方法。这会将值增加给定的\
    \ `amount`（默认为 1.0）。\n\n### **不确定进度**\n\n当你无法轻松估计长时间运行任务的实际进度时，请使用不确定模式。但是，你仍然希望提供反馈，表明操作正在进行（并且你的程序没有崩溃）。在操作开始时，你只需调用进度条的\
    \ `start` 方法。在操作结束时，调用其 `stop` 方法。进度条将处理其余部分。\n\n不幸的是，“进度条将处理其余部分”并不那么简单。事实上，如果你\
    \ `start` 进度条，调用一个需要几分钟才能完成的函数，然后 `stop` 进度条，你的程序在整个过程中都会显得完全冻结，进度条不会更新。事实上，它可能根本不会出现在屏幕上。哎呀！\n\
    \n要了解原因以及如何解决这个问题，下一章将深入探讨 Tk 的事件循环。\n\n## 9. 事件循环\n\n在上一章的结尾，我们解释了如何使用进度条向用户提供关于长时间运行操作的反馈。进度条本身很简单：调用它的\
    \ `start` 方法，执行你的操作，然后调用它的 `stop` 方法。不幸的是，你了解到如果你尝试这样做，你的应用程序很可能会显得完全冻结。\n\n要理解原因，我们需要重新讨论我们在\
    \ Tk 概念章节中关于事件处理的讨论。正如我们所看到的，在构建应用程序的初始用户界面之后，它会进入 Tk 事件循环。在事件循环中，它不断地处理从系统事件队列中拉取的事件，通常每秒数十次。它监视鼠标或键盘事件，并根据需要调用命令回调和事件绑定。\n\
    \n不太明显的是，所有屏幕更新仅在事件循环中处理。例如，你可能更改了标签控件的文本。但是，该更改不会立即显示在屏幕上。相反，控件会通知 Tk 它需要重绘。稍后，在处理其他事件之间，Tk\
    \ 的事件循环会要求控件重绘自身。*所有绘制仅在事件循环中发生。* 这种更改*看起来*立即发生，是因为从对控件进行更改到事件循环中实际重绘之间的时间非常短。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_131_0.png)\n\n显示应用程序回调和屏幕更新的事件循环。"
