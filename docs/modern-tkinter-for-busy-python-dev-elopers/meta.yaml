    \n![](img/e444c319ec16222f00278651bee8c21d_172_0.png)\n\n![](img/e444c319ec16222f00278651bee8c21d_173_0.png)\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_173_1.png)\n\n![](img/e444c319ec16222f00278651bee8c21d_173_2.png)\n\
    \n保存文件对话框。\n\n![](img/e444c319ec16222f00278651bee8c21d_173_3.png)\n\n![](img/e444c319ec16222f00278651bee8c21d_173_4.png)\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_173_5.png)\n\n选择目录对话框。\n\n可以向这些对话框传递各种选项，允许你设置允许的文件类型、初始目录、默认文件名等等。这些在\
    \ [getOpenFile](https://tkdocs.com/man/getOpenFile)（包括 `getSaveFile`）和 [chooseDirectory](https://tkdocs.com/man/chooseDirectory)\
    \ 参考手册页面中有详细说明。\n\n- [https://tkdocs.com/man/getOpenFile](https://tkdocs.com/man/getOpenFile)\n\
    - [https://tkdocs.com/man/chooseDirectory](https://tkdocs.com/man/chooseDirectory)\n\
    \n## 选择颜色\n\n另一个模态对话框让用户选择颜色。它将返回一个颜色值，例如 `#ff62b8`。该对话框接受一个可选的 `initialcolor`\
    \ 选项来指定现有颜色，即用户可能想要替换的颜色。更多信息可在 [chooseColor](https://tkdocs.com/man/chooseColor)\
    \ 参考手册页面中找到。\n\n- [https://tkdocs.com/man/chooseColor](https://tkdocs.com/man/chooseColor)\n\
    \n```\nfrom tkinter import colorchooser\ncolorchooser.askcolor(initialcolor='#ff0000')\n\
    ```\n\n![](img/e444c319ec16222f00278651bee8c21d_174_0.png)\n\n选择颜色对话框。\n\n## 选择字体\n\
    \nTk 8.6 增加了对另一个系统对话框的支持：字体选择器。虽然文件对话框和颜色选择器是模态对话框，在对话框关闭之前会阻塞并返回结果，但字体选择器的工作方式并非如此。\n\
    \n> 由于字体选择器在 Tk 8.5 中不可用，如果你的代码需要支持旧版本的 Tk，则需要考虑到这一点。\n\n![](img/e444c319ec16222f00278651bee8c21d_174_1.png)\n\
    \n字体选择器对话框。\n\n虽然系统字体对话框在某些平台上是模态的，例如 Windows，但并非所有平台都是如此。在 macOS 上，系统字体选择器的工作方式更像绘图程序中的浮动工具调色板，可以随时更改主应用程序窗口中所选文本的字体。Tk\
    \ 字体对话框 API 必须适应这两种模型。为此，它使用回调（和虚拟事件）来通知你的应用程序字体更改。更多详细信息可在 [fontchooser](https://tkdocs.com/man/fontchooser)\
    \ 参考手册页面中找到。\n\n要使用字体对话框，首先为其提供一个初始字体和一个回调函数，该回调函数将在选择字体时被调用。为了说明，我们将让回调函数更改标签上的字体。\n\
    \n```\nl = ttk.Label(root, text=\"Hello World\", font=\"helvetica 24\")\nl.grid(padx=10,\
    \ pady=10)\n\ndef font_changed(font):\n    l['font'] = font\n\nroot.tk.call('tk',\
    \ 'fontchooser', 'configure', '-font',\n    'helvetica 24', '-command', root.register(font_changed))\n\
    root.tk.call('tk', 'fontchooser', 'show')\n```\n\nTkinter 尚未添加使用此新对话框的便捷方式，因此此示例代码直接使用\
    \ Tcl API。你可以在 [bugs.python.org/issue28694](https://bugs.python.org/issue28694)\
    \ 查看关于适当 Python API 的最新进展并下载代码。\n\n> 你可以随时查询或更改对话框中显示（或将要显示）的字体。\n\n接下来，通过 `show`\
    \ 方法将对话框显示在屏幕上。在字体对话框为模态的平台上，你的程序将在此处阻塞，直到对话框关闭。在其他平台上，`show` 会立即返回；对话框保持在屏幕上，而你的程序继续运行。此时，尚未选择字体。还有一个\
    \ `hide` 方法可以将其从屏幕上移除（当字体对话框是模态时，这用处不大）。"
