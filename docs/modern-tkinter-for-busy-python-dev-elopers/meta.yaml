  md: '# 14.3. Tags


    We''ve seen that every canvas item has a unique id number, but there is another
    very useful and powerful way to refer to items on a canvas, and that is using
    *tags*.


    A tag is just an identifier of your creation, something meaningful to your program.
    You can attach tags to canvas items; each item can have any number of tags. Unlike
    item id numbers, which are unique for each item, many items can have the same
    tag.


    What can you do with tags? We saw that you can use the item id to modify a canvas
    item (and we''ll see soon there are other things you can do to items, like move
    them around, delete them, etc.). Any time you can use an item id, you can use
    a tag. For example, you can change the color of all items having a specific tag.


    Tags are a good way to identify certain types of items in your canvas (items that
    are part of a drawn line, items that are part of the palette, etc.). You can use
    tags to correlate canvas items to particular objects in your application (for
    example, tag all canvas items that are part of the robot with id #37 with the
    tag "robot37"). With tags, you don''t have to keep track of the ids of canvas
    items to refer to groups of items later; tags let Tk do that for you.


    You can assign tags when creating an item using the `tags` item configuration
    option. You can add tags later with the `addtag` method, or remove them with the
    `dtags` method. You can get the list of tags for an item with the `gettags` method,
    or return a list of item id numbers having the given tag with the `find` command.


    For example:


    ```

    >>> c = Canvas(root)

    >>> c.create_line(10, 10, 20, 20, tags=(''firstline'', ''drawing''))

    1

    >>> c.create_rectangle(30, 30, 40, 40, tags=(''drawing''))

    2

    >>> c.addtag(''rectangle'', ''withtag'', 2)

    >>> c.addtag(''polygon'', ''withtag'', ''rectangle'')

    >>> c.gettags(2)

    ```'
