  md: '# 15.1. The Basics


    If you simply need a multi-line text field for a form, there are only a few things
    to worry about: creating and sizing the widget (check), providing an initial value,
    and retrieving the text after a user has submitted the form.


    # Providing Initial Content


    Text widgets start with nothing in them, so we''ll need to add any initial content
    ourselves. Because text widgets can hold a lot more than plain text, a simple
    mechanism (like the entry widget''s `textvariable` configuration option) isn''t
    sufficient.

    Instead, we''ll use the widget''s `insert` method:


    ```

    text.insert(''1.0'', ''here is my\ntext to insert'')

    ```


    The "1.0" here is the position where to insert the text, and can be read as "line
    1, character 0". This refers to the first character of the first line. Historically,
    especially on Unix, programmers tend to think about line numbers as 1-based and
    character positions as 0-based.

    The text to insert is just a string. Because the widget can hold multi-line text,
    the string we supply can be multi-line as well. To do this, simply embed `\n`
    (newline) characters in the string at the appropriate locations.


    # Retrieving the Text


    After users have made any changes and submitted the form (for example), your program
    can retrieve the contents of the widget via the `get` method:


    ```

    thetext = text.get(''1.0'', ''end'')

    ```


    The two parameters are the start and end position; `end` has the obvious meaning.
    You can provide different start and end positions if you want to obtain only part
    of the text. You''ll see more on positions shortly.'
