    # Disabling the Widget


    Some forms will temporarily disable editing in particular widgets unless certain
    conditions are met (e.g., some other options are set to a certain value). To prevent
    users from changing a text widget, set the `state` configuration option to `disabled`.
    Re-enable editing by setting this option back to `normal`.


    ```

    text[''state''] = ''disabled''

    ```


    > As text widgets are part of the classic widgets, the usual `state` and `instate`
    methods are not available.'
