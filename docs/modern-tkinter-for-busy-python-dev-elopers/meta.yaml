    关于作者


    # 1. 引言


    本书将帮助你快速上手，并使用 Python 3 和 Tkinter 构建主流的桌面图形用户界面。如你所知，Tkinter 是 Python 对名为 Tk 的
    GUI 库的接口。它最初是为 Tcl 语言开发的，但被其他动态语言广泛采用，包括 Ruby、Perl，当然还有 Python。


    本书将教你关于 Tkinter 和 Tk，特别是 Tk 8.5 和 8.6 所需知道的一切。Tk 8.5 是一个里程碑式的版本。它标志着与大多数人所熟知和喜爱的旧版
    Tk 的显著不同。


    不利的一面是，除非你知道一两个关键点，否则它实际上*并不是*一个意义重大的版本。事实上，它看起来好像什么都没变。由于向后兼容性，除非现有程序进行一些简单的更改，否则它们看起来不会有任何不同。（想象一下，如果你刚搬进一个古朴而奇特的历史悠久的房子。你会希望有人指出他们把电灯开关和电源插座藏在哪里，不是吗？）


    如果你是 Tk 新手或正在创建一个新程序，本书将确保你以正确的方式开始。如果你以前使用过 Tk，它将帮助你更新知识。如果你正在更新可能多年前编写的代码，你将看到如何将其带入现代时代的分步指南。这是老生常谈，但我简直不敢相信在写这本书的过程中我学到了多少东西，而我已经使用
    Tk 超过二十五年了。


    Tk 文档的总体状况（除了面向 Tcl 的参考文档，那些文档非常出色）不幸的是目前并不处于高点。这对于使用来自 Tcl 以外语言的 Tk 的开发者，以及在多个平台上工作的开发者来说尤其如此。因此，本书将尽可能针对三个主要平台（Windows、macOS
    和 Linux）上的开发者。


    它也不是一本参考指南。它不会涵盖所有内容，只涵盖你在 95% 的应用程序中需要的基础知识。其余的你可以在参考文档中找到。


    # 1.1. 本书适合谁


    本书专为使用 Tk 构建工具和应用程序的开发者设计。它也关注相当主流的图形用户界面，包括按钮、列表、复选框、富文本编辑、2D 图形等。因此，如果你打算修改
    Tk 的内部 C 代码或构建下一个伟大的 3D 沉浸式游戏界面，这可能不是适合你的材料。


    本书也不教你 Python，所以你应该已经掌握了基本知识。本书完全使用 Python 3，不涉及在 Python 2 中使用 Tkinter。同样，你应该对桌面应用程序有基本的了解。虽然你不必是用户界面设计师，但对
    GUI 设计的一些欣赏总是有帮助的。


    # 1.2. 为什么选择 Tkinter？


    如果你是 Python 桌面图形用户界面开发的新手，为什么可能会使用 Tkinter？毕竟，有很多选择，包括 PyQt、PySide、WxPython、PySimpleGUI
    和 Kivy。每个都有各种优缺点。


    人们选择 Tkinter 有几个原因。它是 Python 的默认 GUI 工具包，是标准库中唯一包含的工具包。它是跨平台的，因此相同的代码可以在 Windows、macOS
    或 Linux 系统上运行。也许最重要的是，它易于学习和使用。它将样板代码和开销保持在最低限度。它是 Pythonic 的；感觉就是对的。与许多作为 C++
    库前端的选项不同，Tkinter 是建立在为动态语言设计的用户界面工具之上的。


    如今，许多大型商业应用程序都是基于 Web 的。事实上，Web（和移动）开发吸走了桌面用户界面工具包的大部分活力，这就是为什么许多成熟的工具至今仍被广泛使用的原因。在许多情况下，编写桌面应用程序仍然有意义，无论是开源项目、个人或公司内部工具，还是为特定项目快速组装前端。这些都是
    Tkinter 擅长的场景。


    # 1.3. 现代最佳实践


    本书全部关于使用 Tk 提供的当前工具构建现代用户界面。它全部关于你需要知道的、为此所需的最佳实践。


    对于大多数工具，你不会认为你需要说这样的话。但对于 Tk，情况并非如此。Tk 经历了非常漫长的演变，任何演变往往会留下一些陈旧的东西。再加上图形用户界面平台和标准在此期间的发展程度。你可以看到，保持像
    GUI 库这样庞大而复杂的东西保持最新（并保持向后兼容）可能具有挑战性。


    在 Tk 的大部分生命周期中，它名声不佳，说得委婉一点。其中一些是应得的，但大多数并非如此。像任何 GUI 工具一样，它可用于创建绝对糟糕和过时的用户界面。然而，通过适当的关心和注意，它也可以用于开发非常出色的界面。大多数人知道那些糟糕的界面；大多数好的界面人们甚至不知道是用
    Tk 完成的。在本书中，我们将专注于你需要构建良好用户界面的内容。值得庆幸的是，这远没有 Tk 8.5 之前那么困难。


    所以总结一下：现代桌面图形用户界面，使用现代惯例和设计感，使用 Tk 8.5 和 8.6 提供的现代工具。


    ## Tk 扩展


    当谈到现代最佳实践时，Tk 扩展值得特别一提。多年来，开发者为 Tk 创建了各种各样的附加组件，例如，添加核心中不可用的新控件（或至少当时不可用）。一些知名且相当流行的
    Tk 扩展包括 BLT、Tix、iWidgets、BWidgets；还有很多很多其他扩展。


    许多这些扩展是几十年前创建的。因为核心 Tk 一直具有高度的向后兼容性，这些'
