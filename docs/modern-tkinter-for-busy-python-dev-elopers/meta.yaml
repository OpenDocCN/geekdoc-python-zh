    # Polygon


    Polygon items allow you to create arbitrary shapes as defined by a series of points.
    The coordinates are given in the same way as multipoint lines. Tk ensures the
    polygon is "closed," attaching the last point to the first if needed. Like ovals
    and rectangles, they can have separate `fill` and `outline` colors. They also
    support the `joinstyle`, `smooth`, and `splinesteps` attributes of line items.


    ```

    canvas.create_polygon(10, 10, 200, 50, 90, 150, 50, 80, 120,

    55, fill=''red'', outline=''blue'')

    ```


    # Arc


    Arc items draw a portion of an oval; think of one piece of a pie chart. It''s
    display is controlled by three attributes:


    +   - `start`: how far along the oval the arc should start, in degrees (0 is the
    3-o''clock position)

    - The `extent`: how many degrees "wide" the arc should be, positive for counter-clockwise
    from the start, negative for clockwise

    - `style`: one of `pieslice` (the default), `arc` (draws just the outer perimeter),
    or `chord` (draws the area between a line connecting the start and end points
    of the arc, and the outer perimeter).


    ```

    canvas.create_arc(10, 10, 200, 150, fill=''yellow'',

    outline=''black'', start=45, extent=135, width=5)

    ```


    # Image


    Image items can display arbitrary images. By default, the item is centered at
    the coordinates you specify, but this can be changed with the `anchor` option,
    e.g., `nw` means the coordinates are where to put the top-left of the image.'
