  - '[PAGE 132]


    # 9.1. Blocking the Event Loop


    Where you run into problems is when the event loop is prevented from processing
    events for a lengthy period of time. Your application won''t redraw or respond
    to events and will appear to be frozen. The event loop is said to be *blocked*.
    How can this happen?

    Let''s start by visualizing the event loop as an execution timeline. In a normal
    situation, each deviation from the event loop (callback, screen update) takes
    only a fraction of a second before returning control to the event loop.


    ![](img/e444c319ec16222f00278651bee8c21d_132_0.png)


    In our scenario, the whole thing probably got started from an event like a user
    pressing a button. So the event loop calls our application code to handle the
    event. Our code creates the progressbar, performs the (lengthy) operations, and
    stops the progressbar. Only then does our code return control back to the event
    loop. No events have been processed in the meantime. No screen redrawing has occurred.
    They''ve just been piling up in the event queue.'
  - '[PAGE 133]


    ![](img/e444c319ec16222f00278651bee8c21d_133_0.png)


    *Lengthy callback blocking the event loop.*


    To prevent blocking the event loop, it''s essential that event handlers execute
    quickly and return control back to the event loop.

    If you do have a long-running operation to perform, or anything like network I/O
    that could potentially take a long time, there are a few different approaches
    you can take.


    > For the more technically-inclined, Tk uses a single-threaded, event-driven programming
    model. All the GUI code, the event loop, and your application run within the same
    thread. Because of this, any calls or computations that block event handlers are
    highly discouraged. Some other GUI toolkits use different models that allow for
    blocking code, runs the GUI and event handlers in separate threads from application
    code, etc. Attempting to shoehorn these models into Tk can be a recipe for frustration
    and lead to fragile and hacky code. If you respect Tk''s model rather than try
    to fight with it, you won''t run into problems.'
  - '[PAGE 134]


    # 9.2. One Step at a Time


    If possible, the very best thing you can do is break your operation into very
    small steps, each of which can execute very quickly. You let the event loop be
    responsible for when the next step occurs. That way, the event loop continues
    to run, processing regular events, updating the screen, and, in between all that,
    calling your code to perform the next step of the operation.


    To do this, we make use of *timer events*. Our program can ask the event loop
    to generate one of these events at some time in the future. As part of its regular
    work, when the event loop reaches that time, it will call back into our code to
    handle the event. Our code would perform the next step of the operation. It then
    schedules another timer event for the *next* step of the operation and immediately
    returns control back to the event loop.


    ![](img/e444c319ec16222f00278651bee8c21d_134_0.png)


    *Breaking up a large operation into small steps tied together with timer events.*


    Tk''s `after` command can be used to generate timer events. You provide the number
    of milliseconds to wait until the event should be fired. It may happen later than
    that if Tk is busy processing other events but won''t happen before that. You
    can also ask that an `idle` event be generated; it will fire when no other events
    in the queue need to be processed. (Tk''s screen updates and redraws occur in
    the context of idle events.) You can find more details on `after` in the [reference
    manual](https://tkdocs.com/man/after).


    https://tkdocs.com/man/after'
  - "[PAGE 135]\n\nIn the following example, we'll perform a long operation that is\
    \ broken up into 20 small steps. While this operation is being performed, we'll\
    \ update a progressbar, and also allow users to interrupt the operation.\n\n```\n\
    def start():\n    b.configure(text='Stop', command=stop)\n    l['text'] = 'Working...'\n\
    \    global interrupt; interrupt = False\n    root.after(1, step)\n\ndef stop():\n\
    \    global interrupt; interrupt = True\n\ndef step(count=0):\n    p['value']\
    \ = count\n    if interrupt:\n        result(None)\n        return\n    root.after(100)\
    \  # next step in our operation; don't take too long!\n    if count == 20:  #\
    \ done!\n        result(42)\n        return\n    root.after(1, lambda: step(count+1))\n\
    \ndef result(answer):\n    p['value'] = 0\n    b.configure(text='Start!', command=start)\n\
    \    l['text'] = \"Answer: \" + str(answer) if answer else \"No Answer\"\n\nf\
    \ = ttk.Frame(root); f.grid()\nb = ttk.Button(f, text=\"Start!\", command=start);\n\
    b.grid(column=1, row=0, padx=5, pady=5)\nl = ttk.Label(f, text=\"No Answer\");\
    \ l.grid(column=0, row=0, padx=5, pady=5)\np = ttk.Progressbar(f, orient=\"horizontal\"\
    , mode=\"determinate\", maximum=20);\np.grid(column=0, row=1, padx=5, pady=5)\n\
    ```\n\nhttps://tkdocs.com/code/longrunning.py\n\n> To interrupt the process, we've\
    \ just set a global variable, which is checked next time the timer event fires.\
    \ Another option would be to cancel the pending timer event. When we create the\
    \ timer event, it returns an id"
  - '[PAGE 136]


    number to uniquely identify the pending timer. To cancel it, we can call the `after_cancel`
    method, passing it that unique id.


    You''ll also note that we used a blocking form of `after` to simulate performing
    our operation. Rather than scheduling an event to occur in future, the call blocks,
    waiting a given time before returning. It works the same as a `sleep` system call.'
  - '[PAGE 137]


    # 9.3. Asynchronous I/O


    Timer events take care of breaking up a long-running computation, where you know
    that each step can be guaranteed to complete quickly so that your handler will
    return to the event loop. What if you have an operation that may not complete
    quickly? This can happen when you make a variety of calls to the operating system.
    The most common is when we''re doing some kind of I/O, whether writing a file,
    communicating with a database, or retrieving data from a remote web server.


    Most I/O calls are *blocking*. They don''t return until the operation completes
    (or fails). What we want to use instead are *non-blocking* or *asynchronous* I/O
    calls. When you make an asynchronous I/O call, it returns immediately, before
    the operation is completed. Your code can continue running, or in this case, return
    back to the event loop. Later on, when the I/O operation completes, your program
    is notified and can process the result of the I/O operation.


    If this sounds like treating I/O as another type of event, you''re exactly right.
    In fact, it''s also called *event-driven I/O*.


    In Python, asynchronous I/O is provided through the `asyncio` module, as well
    as many other modules that are layered on top of it.


    All asyncio applications rely heavily on an event loop. How convenient, Tkinter
    has a great event loop! Unfortunately, the asyncio event loop and the Tkinter
    event loop are not the same. You can''t really have both of them running at the
    same time, at least within the same thread (well, you can have one call repeatedly
    into the other, but it''s pretty hacky and fragile).


    My recommendation: keep Tkinter in the main thread, and spin off your asyncio
    event loops in another thread.


    Your application code, running in the main thread, may need to coordinate with
    the asyncio event loop running in the other thread. You can call a function running
    in the asyncio event loop thread (even from the Tkinter event loop, e.g., in a
    widget callback) using the asyncio `call_soon_threadsafe` method. To call Tkinter
    from the asyncio event loop, keep reading.'
  - '[PAGE 138]


    # 9.4. Threads or Processes


    Sometimes it''s either not possible or practical to break up a long-running computation
    into discrete pieces that each run quickly. Or you may be using a library that
    doesn''t support asynchronous operations. Or, like Python''s `asyncio`, it doesn''t
    play nice with Tk''s event loop. In cases like these, to keep your Tk GUI responsive,
    you''ll need to move those time-consuming operations or library calls out of your
    event handlers and run them somewhere else. Threads, or even other processes,
    can help with that.


    Running tasks in threads, communicating with them, etc. is beyond the scope of
    this book. However, there are some restrictions on using Tk with threads that
    you should be aware of. The main rule is that you must only make Tk calls from
    the thread where you loaded Tk.


    Tkinter goes to great lengths internally so you make Tkinter calls from multiple
    threads. It routes them to the main thread (the one that created the Tk instance).
    It mostly works, but not always. Despite all it tries to do, I highly recommend
    you make all Tkinter calls from a single thread.


    If you need to communicate from another thread to the thread running Tkinter,
    keep it as simple as possible. Use `event_generate` to post a virtual event to
    the Tkinter event queue, and then `bind` to that event in your code.


    It can be even more complicated. The Tcl/Tk libraries can be built either with
    or without thread support. If you have more than one thread in your application,
    make sure you''re running in a threaded build. If you''re unsure, check the Tcl
    variable `tcl_platform(threaded)`; it should be 1, not 0.


    ```

    >>> tkinter.Tcl().eval('' set tcl_platform(threaded)'' )

    ```


    > Most everyone should be running threaded builds. The ability to create non-threaded
    builds in Tcl/Tk is likely to go away in future. If you''re using a non-threaded
    build with threaded code, consider this a bug in your application, not a challenge
    to make it work.'
- md: '## 9.5. Nested Event Processing


    The previous three approaches are the correct ways to handle long-running operations
    while still keeping your Tk GUI responsive. What they have in common is a single
    event loop that continuously processes events of all kinds. That event loop will
    call event handlers in your application code, which do their thing and quickly
    return.


    There is one other way. Within your long-running operation, you can invoke the
    event loop to process a bunch of events. You can do this with a single command,
    `update`. There''s no messing around with timer events or asynchronous I/O. Instead,
    you just sprinkle some `update` calls throughout your operation. If you want to
    only keep the screen redrawing but not process other events, there''s even an
    option for that (`update_idletasks`).


    This approach is seductively easy. And if you''re lucky, it might work. At least
    for a little while. But sooner or later, you''re going to run into serious difficulties
    trying to do things that way. Something won''t be updating, event handlers aren''t
    getting called that should be, events are going missing or being fired out of
    order, or worse. You''ll turn your program''s logic inside out and tear your hair
    out trying to make it work again.


    > F.Y.I. When you use `update`, you''re not returning control back to the running
    event loop. You''re effectively starting a new event loop nested within the existing
    one. Remember, the event loop follows a single thread of execution: no threads,
    no coroutines. If you''re not careful, you''re going to end up with event loops
    called from within event loops called from... well, you get the idea. If you even
    realize you''re doing this, unwinding the event loops (each of which may have
    different conditions to terminate it) will be an interesting exercise. The reality
    won''t match with your mental model of a simple event loop dispatching events
    one at a time, independent of every other event. It''s a classic example of fighting
    against Tk''s model. In very specific circumstances, it''s possible to make it
    work. In practice, you''re asking for trouble. Don''t say you haven''t been warned...


    ![](img/e444c319ec16222f00278651bee8c21d_140_0.png)


    Nested event loops... this way madness lies.


    ## 10. Menus


    This chapter describes how to handle menubars and popup menus in Tk. For a polished
    application, these are areas you particularly want to pay attention to. Menus
    need special care if you want your application to fit in with other applications
    on your users'' platform.

    Speaking of which, the recommended way to figure out which platform you''re running
    on is:


    ```python

    root.tk.call(''tk'', ''windowingsystem'')    # returns x11, win32 or aqua

    ```


    > 💡 Tkinter does not provide a direct equivalent to this call. However, it is
    possible to directly execute an arbitrary Tcl-based Tk command, using the `tk.call()`
    method available on any Tkinter widget. Here, we''re invoking the Tcl/Tk command
    `tk windowingsystem`.


    > 🏠 UPGRADE This is more useful than examining global variables like `tcl_platform`
    or `sys.platform`, and older checks that used these methods should be reviewed.
    While in the olden days, there was a pretty good correlation between platform
    and windowing system, it''s less true today. For example, if your platform is
    identified on Unix, that might mean Linux under X11, macOS under Aqua, or even
    macOS under X11.


    ### 10.1. Menubars


    In this section, we''ll look at menubars: how to create them, what goes in them,
    how they''re used, etc.


    Properly designing a menubar and its set of menus is beyond the scope of this
    book. However, if you''re creating an application for someone other than yourself,
    here is a bit of advice. First, if you find yourself with many menus, very long
    menus, or deeply nested menus, you may need to rethink how your user interface
    is organized. Second, many people use the menus to explore what the program can
    do, particularly when they''re first learning it, so try to ensure major features
    are accessible by the menus. Finally, for each platform you''re targeting, become
    familiar with how applications use menus, and consult the platform''s human interface
    guidelines for full details about design, terminology, shortcuts, and much more.
    This is an area you will likely have to customize for each platform.


    ![](img/e444c319ec16222f00278651bee8c21d_142_0.png)


    > You''ll notice on some recent Linux distributions that many applications show
    their menus at the top of the screen when active, rather than in the window itself.
    Tk does not yet support this style of menus.


    ### Menu Widgets and Hierarchy


    #### Menu


    https://tkdocs.com/man/menu


    Menus are implemented as widgets in Tk, just like buttons and entries. Each menu
    widget consists of a number of different *items* in the menu. Items have various
    attributes, such as the text to display for the item, a keyboard accelerator,
    and a command to invoke.


    Menus are arranged in a hierarchy. The menubar is itself a menu widget. It has
    several items ("File," "Edit," etc.), each of which is a submenu containing more
    items. These items can include things like the "Open..." command in a "File" menu,
    but also separators between other items. It can even have items that open up their
    own submenu (so-called *cascading* menus). As you''d expect from other things
    you''ve seen already in Tk, anytime you have a submenu, it must be created as
    a child of its parent menu.


    Menus are part of the classic Tk widgets; there is not presently a menu in the
    themed Tk widget set.


    ### Before you Start


    It''s essential to put the following line in your application somewhere before
    you start creating menus.


    ```python

    root.option_add(''*tearOff'', FALSE)

    ```


    Without it, each of your menus (on Windows and X11) will start with what looks
    like a dashed line and allows you to "tear off" the menu, so it appears in its
    own window. You should eliminate tear-off menus from your application as they''re
    not a part of any modern user interface style.


    > This is a throw-back to the Motif-style X11 that Tk''s original look and feel
    were based on. Get rid of them unless your application is designed to run only
    on that old box collecting dust in the basement. We''ll all look forward to a
    future version of Tk where this misguided paean to backward compatibility is removed.


    While on the topic of ancient history, the `option_add` bit uses the option database.
    On X11 systems, this provided a standardized way to customize certain elements
    of user interfaces through text-based configuration files. It''s no longer used
    today. Older Tk programs may use the `option` command internally to separate style
    configuration options from widget creation code. This all pre-dated themed Tk
    styles, which should be used for that purpose today. However, it''s somehow fitting
    to use the obsolete option database to automatically remove the obsolete tear-off
    menus.


    ### Creating a Menubar


    In Tk, menubars are associated with individual windows; each toplevel window can
    have at most one menubar. On Windows and many X11 window managers, this is visually
    obvious, as the menus are part of each window, sitting just below the title bar
    at the top.


    On macOS, though, there is a single menubar along the top of the screen, shared
    by each window. As far as your Tk program is concerned, each window still does
    have its own menubar. As you switch between windows, Tk ensures that the correct
    menubar is displayed. If you don''t specify a menubar for a particular window,
    Tk will use the menubar associated with the root window; you''ll have noticed
    by now that this is automatically created for you when your Tk application starts.


    > Because all windows have a menubar on macOS, it''s important to define one,
    either for each window or a fallback menubar for the root window. Otherwise, you''ll
    end up with the "built-in" menubar, which contains menus that are only intended
    for typing commands directly into the interpreter.


    To create a menubar for a window, first, create a menu widget. Then, use the window''s
    `menu` configuration option to attach the menu widget to the window.


    ```python

    win = Toplevel(root)

    menubar = Menu(win)

    win[''menu''] = menubar

    ```


    > You can use the same menubar for more than one window. In other words, you can
    specify the same menubar as the `menu` configuration option for several toplevel
    windows. This is particularly useful on'
  mdcn: '## 9.5. 嵌套事件处理


    前三种方法是在保持 Tk GUI 响应性的同时处理长时间运行操作的正确方式。它们的共同点是拥有一个持续处理各类事件的单一事件循环。该事件循环会调用你应用代码中的事件处理器，这些处理器执行其功能后迅速返回。


    还有另一种方法。在你的长时间运行操作中，你可以调用事件循环来处理一批事件。你可以通过一个简单的命令 `update` 来实现这一点。无需处理定时器事件或异步
    I/O。相反，你只需在操作过程中穿插一些 `update` 调用。如果你只想保持屏幕重绘而不处理其他事件，甚至有一个专门的选项（`update_idletasks`）。


    这种方法看似简单诱人。如果你运气好，它可能有效。至少能持续一小会儿。但迟早，你会尝试用这种方式做事时遇到严重困难。某些东西不会更新，本应被调用的事件处理器没有被调用，事件丢失或触发顺序错乱，甚至更糟。你会把程序的逻辑搞得一团糟，为了使其恢复正常而抓狂。


    > 供参考：当你使用 `update` 时，你并没有将控制权交还给正在运行的事件循环。你实际上是在现有事件循环内部启动了一个新的嵌套事件循环。记住，事件循环遵循单一的执行线程：没有线程，没有协程。如果你不小心，最终会得到从事件循环内部调用的事件循环，再从……好吧，你明白的。即使你意识到自己在这样做，解开这些事件循环（每个事件循环可能有不同的终止条件）也将是一项有趣的挑战。现实情况不会与你关于简单事件循环独立处理每个事件的心智模型相符。这是与
    Tk 模型对抗的经典例子。在非常特定的情况下，它可能有效。但在实践中，你是在自找麻烦。别说没人警告过你……


    ![](img/e444c319ec16222f00278651bee8c21d_140_0.png)


    嵌套事件循环……此路通向疯狂。


    ## 10. 菜单


    本章介绍如何在 Tk 中处理菜单栏和弹出菜单。对于一个精致的应用程序，这些是你特别需要关注的方面。如果你想让你的应用程序与用户平台上的其他应用程序保持一致，菜单需要特别注意。

    说到平台，推荐的确定运行平台的方法是：


    ```python

    root.tk.call(''tk'', ''windowingsystem'')    # returns x11, win32 or aqua

    ```


    > 💡 Tkinter 没有提供与此调用直接等效的功能。但是，可以使用任何 Tkinter 控件上可用的 `tk.call()` 方法直接执行任意基于 Tcl
    的 Tk 命令。这里，我们调用的是 Tcl/Tk 命令 `tk windowingsystem`。


    > 🏠 升级提示：这比检查像 `tcl_platform` 或 `sys.platform` 这样的全局变量更有用，使用这些方法的旧检查应该被重新审视。虽然在过去，平台和窗口系统之间有相当好的对应关系，但今天情况已不那么真实。例如，如果你的平台被识别为
    Unix，那可能意味着 X11 下的 Linux、Aqua 下的 macOS，甚至是 X11 下的 macOS。


    ### 10.1. 菜单栏


    在本节中，我们将探讨菜单栏：如何创建它们、包含什么内容、如何使用它们等。


    正确设计菜单栏及其菜单集超出了本书的范围。但是，如果你正在为他人创建应用程序，这里有一些建议。首先，如果你发现自己有很多菜单、非常长的菜单或深层嵌套的菜单，你可能需要重新思考用户界面的组织方式。其次，许多人使用菜单来探索程序的功能，尤其是在初次学习时，因此请尝试确保主要功能可以通过菜单访问。最后，对于你针对的每个平台，熟悉应用程序如何使用菜单，并查阅平台的人机界面指南，以获取有关设计、术语、快捷方式等的详细信息。这是一个你可能需要为每个平台进行定制的领域。


    ![](img/e444c319ec16222f00278651bee8c21d_142_0.png)


    > 你会注意到，在一些较新的 Linux 发行版上，许多应用程序在活动时会在屏幕顶部显示菜单，而不是在窗口本身内。Tk 尚不支持这种菜单样式。


    ### 菜单控件与层次结构


    #### 菜单


    https://tkdocs.com/man/menu


    菜单在 Tk 中作为控件实现，就像按钮和输入框一样。每个菜单控件由菜单中的多个不同*项*组成。项具有各种属性，例如要显示的项的文本、键盘加速键和要调用的命令。


    菜单按层次结构排列。菜单栏本身就是一个菜单控件。它有几个项（“文件”、“编辑”等），每个项都是一个包含更多项的子菜单。这些项可以包括像“文件”菜单中的“打开...”命令，也可以是其他项之间的分隔符。它甚至可以包含打开自己子菜单的项（所谓的*级联*菜单）。正如你从
    Tk 中已经看到的其他内容所预期的那样，任何时候你有一个子菜单，它必须作为其父菜单的子项创建。


    菜单是经典 Tk 控件的一部分；目前主题化 Tk 控件集中没有菜单。


    ### 开始之前


    在开始创建菜单之前，务必将以下行放在应用程序的某个位置。


    ```python

    root.option_add(''*tearOff'', FALSE)

    ```


    没有它，你的每个菜单（在 Windows 和 X11 上）都会以一条看起来像虚线的线开始，并允许你“撕下”菜单，使其出现在自己的窗口中。你应该从应用程序中消除撕下菜单，因为它们不是任何现代用户界面风格的一部分。


    > 这是对 Tk 原始外观和感觉所基于的 Motif 风格 X11 的怀旧。除非你的应用程序设计为仅在地下室里积灰的旧机器上运行，否则请摆脱它们。我们都期待
    Tk 的未来版本能移除这种对向后兼容性的误导性致敬。


    说到古老历史，`option_add` 部分使用了选项数据库。在 X11 系统上，这提供了一种通过基于文本的配置文件自定义用户界面某些元素的标准化方法。今天已不再使用。较旧的
    Tk 程序可能在内部使用 `option` 命令将样式配置选项与控件创建代码分开。这一切都早于主题化 Tk 样式，而今天应该使用主题化 Tk 样式来实现该目的。然而，使用过时的选项数据库来自动移除过时的撕下菜单，在某种程度上是合适的。


    ### 创建菜单栏


    在 Tk 中，菜单栏与单个窗口相关联；每个顶层窗口最多可以有一个菜单栏。在 Windows 和许多 X11 窗口管理器上，这是显而易见的，因为菜单是每个窗口的一部分，位于顶部标题栏的正下方。


    然而，在 macOS 上，屏幕顶部有一个单一的菜单栏，由每个窗口共享。就你的 Tk 程序而言，每个窗口仍然有自己的菜单栏。当你在窗口之间切换时，Tk 会确保显示正确的菜单栏。如果你没有为特定窗口指定菜单栏，Tk
    将使用与根窗口关联的菜单栏；你可能已经注意到，当你的 Tk 应用程序启动时，这会自动为你创建。


    > 因为在 macOS 上所有窗口都有一个菜单栏，所以为每个窗口定义一个菜单栏，或者为根窗口定义一个备用菜单栏，这一点很重要。否则，你最终会得到“内置”菜单栏，其中包含仅用于直接向解释器输入命令的菜单。


    要为窗口创建菜单栏，首先创建一个菜单控件。然后，使用窗口的 `menu` 配置选项将菜单控件附加到窗口。


    ```python

    win = Toplevel(root)

    menubar = Menu(win)

    win[''menu''] = menubar

    ```


    > 你可以将同一个菜单栏用于多个窗口。换句话说，你可以为多个顶层窗口指定相同的菜单栏作为 `menu` 配置选项。这在'
