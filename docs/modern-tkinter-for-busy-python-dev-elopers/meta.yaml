  md: '> As your program grows complex, it''s easy to miss enabling or disabling some
    items. One strategy is to centralize all the menu state changes in one routine.
    Whenever there is a state change in your application, it should call this routine.
    It will examine the current state and update menus accordingly. The same code
    can also handle toolbars, status bars, or other user interface components.


    # Accelerator Keys


    The `accelerator` option is used to indicate a keyboard equivalent that corresponds
    to a menu item. This does not actually *create* the accelerator, but only displays
    it next to the menu item. You still need to create an event binding for the accelerator
    yourself.


    > Remember that event bindings can be set on *individual widgets*, all widgets
    of a certain type, the toplevel window containing the widget you''re interested
    in, or the application as a whole. As menu bars are associated with individual
    windows, the event bindings you create will usually be on the toplevel window
    the menu is associated with.


    Accelerators are very platform-specific, not only in terms of which keys are used
    for what operation, but what modifier keys are used for menu accelerators (e.g.,
    on macOS, it is the "Command" key, on Windows and X11, it is usually the "Control"
    key). Examples of valid accelerator options are `Command-N`, `Shift+Ctrl+X`, and
    `Command-Option-B`. Commonly used modifiers include `Control`, `Ctrl`, `Option`,
    `Opt`, `Alt`, `Shift`, `"Command`, `Cmd`, and `Meta`.


    > On macOS, modifier names are automatically mapped to the different modifier
    icons that appear in menus, i.e., `Shift` ⇒ ⇧, `Command` ⇒ ⌘, `Control` ⇒ ⌃, and
