    # 12. Organizing Complex Interfaces


    If you have a complex user interface, you''ll need to find ways to organize it
    that don''t overwhelm your users. There are several different approaches to doing
    this. Both general-purpose and platform-specific human interface guidelines are
    good resources when designing your user interface.


    When we talk about complexity in this chapter, we don''t mean the underlying technical
    complexity of how the program is implemented. Instead, we mean how it''s presented
    to users. A user interface can be pulled together from many different modules,
    built from hundreds of widgets combined in a deeply nested hierarchy, but that
    doesn''t mean users need to perceive it as complex.


    # Multiple windows


    One benefit of using multiple windows in an application can be to simplify the
    user interface. Done well, it can require users to focus only on the contents
    of one window at a time to complete a task. Forcing them to focus on or switch
    between several windows can also have the opposite effect. Similarly, showing
    only the widgets'
- md: "relevant to the current task (i.e., via `grid`) can help simplify the user\
    \ interface.\n\n## White space\n\nIf you do need to display a large number of\
    \ widgets onscreen at the same time, think about how to organize them visually.\
    \ We've seen how `grid` makes it easy to align widgets with each other. White\
    \ space is another useful aid. Place related widgets close to each other (possibly\
    \ with an explanatory label immediately above) and separate them from other widgets\
    \ by white space. This helps users organize the user interface in their own minds.\n\
    \n> \U0001F4A1 The recommended amount of white space around different widgets,\
    \ between groups of widgets, around borders, etc. is highly platform-specific.\
    \ While you can do an adequate job without worrying about exact pixel numbers,\
    \ if you want a highly polished user interface, you'll need to tune this for each\
    \ platform.\n\n## 12.1. Separator\n\nttk.Separator\nhttps://tkdocs.com/man/ttk_separator\n\
    \nA second approach to grouping widgets in one display is to place a thin horizontal\
    \ or vertical rule between groups of widgets; often, this can be more space-efficient\
    \ than using white space, which may be relevant for a tight display. Tk provides\
    \ a simple **separator** widget for this purpose.\n\n![](img/e444c319ec16222f00278651bee8c21d_183_0.png)\n\
    \n*Separator widgets.*\n\nSeparators are created using the `ttk.Separator` class:\n\
    \n```\npython\ns = ttk.Separator(parent, orient=HORIZONTAL)\n```\n\nThe `orient`\
    \ option may be specified as either `horizontal` or `vertical`.\n\n## 12.2. Label\
    \ Frames\n\nttk.Labelframe\nhttps://tkdocs.com/man/ttk_labelframe\n\nA **labelframe**\
    \ widget, also commonly known as a *group box*, provides another way to group\
    \ related components. It acts like a normal `ttk::frame`, in that it contains\
    \ other widgets that you `grid` inside it. However, it is visually set off from\
    \ the rest of the user interface. You can optionally provide a text label to be\
    \ displayed outside the labelframe.\n\n![](img/e444c319ec16222f00278651bee8c21d_184_0.png)\n\
    \nLabelframes are created using the `ttk.Labelframe` class:\n\n```\nlf = ttk.Labelframe(parent,\
    \ text='Label')\n```\n\n## 12.3. Paned Windows\n\nttk.Panedwindow\nhttps://tkdocs.com/man/ttk_panedwindow\n\
    \nA **panedwindow** widget lets you stack two or more resizable widgets above\
    \ and below each other (or to the left and right). Users can adjust the relative\
    \ heights (or widths) of each pane by dragging a *sash* located between them.\
    \ Typically the widgets you're adding to a panedwindow will be frames containing\
    \ many other widgets.\n\n![](img/e444c319ec16222f00278651bee8c21d_185_0.png)\n\
    \nPanedwindows are created using the `ttk.Panedwindow` class:\n\n```\np = ttk.Panedwindow(parent,\
    \ orient=VERTICAL)\n# two panes, each of which would get widgets gridded into\
    \ it:\nf1 = ttk.LabelFrame(p, text='Pane1', width=100, height=100)\nf2 = ttk.LabelFrame(p,\
    \ text='Pane2', width=100, height=100)\np.add(f1)\np.add(f2)\n```\n\nA panedwindow\
    \ is either `vertical` (its panes are stacked vertically on top of each other)\
    \ or `horizontal`. Importantly, each pane you add to the panedwindow must be a\
    \ *direct child* of the panedwindow itself.\n\nCalling the `add` method adds a\
    \ new pane at the end of the list of panes. The `insert position subwindow` method\
    \ allows you to place the pane at the given position in the list of panes (0..n-1).\
    \ If the pane is already managed by the panedwindow, it will be moved to the new\
    \ position. You can use the `forget subwindow` to remove a pane from the panedwindow\
    \ (you can also pass a position instead of a subwindow).\n\nYou can assign relative\
    \ weights to each pane so that if the overall panedwindow resizes, certain panes\
    \ will be allocated more space than others. As well, you can adjust the position\
    \ of each sash between items in the panedwindow. See the [command reference](https://tkdocs.com/man/ttk_panedwindow)\
    \ for details.\n\n\U0001F4CB [https://tkdocs.com/man/ttk_panedwindow](https://tkdocs.com/man/ttk_panedwindow)\n\
    \n## 12.4. Notebook\n\nttk.Notebook\nhttps://tkdocs.com/man/ttk_notebook\n\nA\
    \ **notebook** widget uses the metaphor of a tabbed notebook to let users switch\
    \ between one of several *pages*, using an index *tab*. Unlike with paned windows,\
    \ users only see a single page (akin to a pane) at a time.\n\n![](img/e444c319ec16222f00278651bee8c21d_187_0.png)\n\
    \nNotebooks are created using the `ttk.Notebook` class:\n\n```\nn = ttk.Notebook(parent)\n\
    f1 = ttk.Frame(n)    # first page, which would get widgets\n                 \
    \     # gridded into it\nf2 = ttk.Frame(n)    # second page\nn.add(f1, text='One')\n\
    n.add(f2, text='Two')\n```\n\nThe operations on tabbed notebooks are similar to\
    \ those on panedwindows. Each page is typically a frame and again must be a direct\
    \ child (subwindow) of the notebook itself. A new page and its associated tab\
    \ are added after the last tab with the `add subwindow ? option value...?` method.\
    \ The `text` tab option sets the label on the tab; also useful is the `state`\
    \ tab option, which can have the value `normal`, `disabled` (not selectable),\
    \ or `hidden`.\n\nTo insert a tab at somewhere other than the end of the list,\
    \ use the `insert position subwindow ?option value...?`, and to remove a given\
    \ tab, use the `forget` method, passing it either the position (0..n-1) or the\
    \ tab's subwindow. You can retrieve the list of all subwindows contained in the\
    \ notebook via the `tabs` method.\n\nTo retrieve the subwindow that is currently\
    \ selected, call the `select` method, and change the selected tab by passing it\
    \ either the tab's position or the subwindow itself as a parameter.\n\nTo change\
    \ a tab option (like the text label on the tab or its state), you can use the\
    \ `tab(tabid, option=value)` method (where `tabid` is again the tab's position\
    \ or subwindow); omit the `=value` to return the current value of the option.\n\
    \nNotebook widgets generate a `<<NotebookTabChanged>>` virtual event whenever\
    \ a new tab is selected.\n\nAgain, there are a variety of less frequently used\
    \ options and commands detailed in the [command reference](https://tkdocs.com/man/ttk_notebook).\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_188_0.png)\n\n[https://tkdocs.com/man/ttk_notebook](https://tkdocs.com/man/ttk_notebook)\n\
    \n## 13. Fonts, Colors, Images\n\nThis chapter describes how Tk handles fonts,\
    \ colors, and images. We've touched on all of these before, but here we'll provide\
    \ a more in-depth treatment.\n\n### 13.1. Fonts\n\nTk's label widget allows you\
    \ to change the font used to display text via the `font` configuration option.\
    \ The canvas and text widgets, covered in the following chapters, also allow you\
    \ to specify fonts. Other themed widgets that display text may not have a `font`\
    \ configuration option, but their fonts can be changed using styles.\n\n> We'll\
    \ cover styles in detail later. In essence, they replace the old way of tweaking\
    \ multiple configuration options on individual widgets. Instead, fonts, colors,\
    \ and other settings that control appearance can be bundled together in a style.\
    \ That style can then be applied to multiple widgets. It's akin to the difference\
    \ between hardcoding display-oriented markup inside HTML pages vs. using CSS to\
    \ keep display-specific information separate.\n\nAs with many things in Tk, the\
    \ default fonts are usually a good choice. If you need to make changes, this section\
    \ shows you the best way to do so, using *named fonts*. Tk includes named fonts\
    \ suitable for use in all different components of your user interface. They take\
    \ into account the conventions of the specific platform you're running on. You\
    \ can also specify your own fonts when you need additional flexibility.\n\nThe\
    \ [font command reference](https://tkdocs.com/man/font) provides full details\
    \ on specifying fonts, as well as other font-related operations.\n\n> Many older\
    \ Tk programs hardcoded fonts, using either the \"family size style\" format we'll\
    \ see below, X11 font names, or the older and more arcane X11 font specification\
    \ strings. These applications looked increasingly dated as platforms evolved.\
    \ Worse, fonts were often specified on a per-widget basis, leaving font decisions\
    \ spread throughout the code. Named fonts, particularly the standard fonts that\
    \ Tk provides, are a far better solution. Reviewing and updating font decisions\
    \ is an easy and important change to make in any existing applications.\n\n###\
    \ Standard Fonts"
  mdcn: '与当前任务相关（例如通过 `grid`）的布局方式有助于简化用户界面。


    ## 空白间距


    如果你确实需要在屏幕上同时显示大量控件，请思考如何从视觉上组织它们。我们已经了解了 `grid` 如何轻松地将控件相互对齐。空白间距是另一个有用的辅助手段。将相关的控件彼此靠近放置（可能在其正上方添加一个说明性标签），并用空白间距将它们与其他控件隔开。这有助于用户在脑海中组织用户界面。


    > 💡 围绕不同控件、控件组、边框等的推荐空白间距量高度依赖于具体平台。虽然不考虑精确像素数也能完成足够的工作，但如果你想要一个高度精致的用户界面，则需要针对每个平台进行调整。


    ## 12.1. 分隔符


    ttk.Separator

    https://tkdocs.com/man/ttk_separator


    在单个显示中对控件进行分组的第二种方法是在控件组之间放置一条细的水平或垂直线；通常，这比使用空白间距更节省空间，这在显示空间紧张时可能很有用。Tk 提供了一个简单的
    **分隔符** 控件来实现此目的。


    ![](img/e444c319ec16222f00278651bee8c21d_183_0.png)


    *分隔符控件。*


    分隔符使用 `ttk.Separator` 类创建：


    ```

    python

    s = ttk.Separator(parent, orient=HORIZONTAL)

    ```


    `orient` 选项可以指定为 `horizontal` 或 `vertical`。


    ## 12.2. 标签框架


    ttk.Labelframe

    https://tkdocs.com/man/ttk_labelframe


    **标签框架** 控件，通常也称为 *分组框*，提供了另一种对相关组件进行分组的方式。它的作用类似于普通的 `ttk::frame`，即包含其他控件，你可以使用
    `grid` 将它们放置在其中。然而，它在视觉上与用户界面的其余部分区分开来。你可以选择提供一个文本标签，显示在标签框架的外部。


    ![](img/e444c319ec16222f00278651bee8c21d_184_0.png)


    标签框架使用 `ttk.Labelframe` 类创建：


    ```

    lf = ttk.Labelframe(parent, text=''Label'')

    ```


    ## 12.3. 窗格窗口


    ttk.Panedwindow

    https://tkdocs.com/man/ttk_panedwindow


    **窗格窗口** 控件允许你将两个或多个可调整大小的控件上下（或左右）堆叠放置。用户可以通过拖动位于它们之间的 *分隔条* 来调整每个窗格的相对高度（或宽度）。通常，你添加到窗格窗口的控件将是包含许多其他控件的框架。


    ![](img/e444c319ec16222f00278651bee8c21d_185_0.png)


    窗格窗口使用 `ttk.Panedwindow` 类创建：


    ```

    p = ttk.Panedwindow(parent, orient=VERTICAL)

    # 两个窗格，每个窗格都将包含使用 grid 布局的控件：

    f1 = ttk.LabelFrame(p, text=''Pane1'', width=100, height=100)

    f2 = ttk.LabelFrame(p, text=''Pane2'', width=100, height=100)

    p.add(f1)

    p.add(f2)

    ```


    窗格窗口可以是 `vertical`（其窗格垂直堆叠）或 `horizontal`。重要的是，你添加到窗格窗口的每个窗格必须是窗格窗口本身的 *直接子控件*。


    调用 `add` 方法会在窗格列表的末尾添加一个新窗格。`insert position subwindow` 方法允许你将窗格放置在窗格列表中的给定位置（0..n-1）。如果该窗格已被窗格窗口管理，它将被移动到新位置。你可以使用
    `forget subwindow` 从窗格窗口中移除一个窗格（你也可以传递一个位置而不是子窗口）。


    你可以为每个窗格分配相对权重，这样如果整个窗格窗口调整大小，某些窗格将比其他窗格分配到更多空间。此外，你可以调整窗格窗口中各项之间每个分隔条的位置。详情请参阅
    [命令参考](https://tkdocs.com/man/ttk_panedwindow)。


    📋 [https://tkdocs.com/man/ttk_panedwindow](https://tkdocs.com/man/ttk_panedwindow)


    ## 12.4. 选项卡式笔记本


    ttk.Notebook

    https://tkdocs.com/man/ttk_notebook


    **选项卡式笔记本** 控件使用带标签的笔记本的比喻，让用户通过索引 *标签* 在多个 *页面* 之间切换。与窗格窗口不同，用户一次只能看到一个页面（类似于一个窗格）。


    ![](img/e444c319ec16222f00278651bee8c21d_187_0.png)


    选项卡式笔记本使用 `ttk.Notebook` 类创建：


    ```

    n = ttk.Notebook(parent)

    f1 = ttk.Frame(n)    # 第一个页面，将包含使用 grid 布局的控件

    f2 = ttk.Frame(n)    # 第二个页面

    n.add(f1, text=''One'')

    n.add(f2, text=''Two'')

    ```


    对选项卡式笔记本的操作类似于对窗格窗口的操作。每个页面通常是一个框架，并且同样必须是笔记本本身的直接子控件（子窗口）。使用 `add subwindow ?
    option value...?` 方法会在最后一个标签之后添加一个新页面及其关联的标签。`text` 标签选项设置标签上的文本；同样有用的还有 `state`
    标签选项，其值可以是 `normal`、`disabled`（不可选择）或 `hidden`。


    要在列表末尾以外的位置插入标签，请使用 `insert position subwindow ?option value...?`；要移除给定标签，请使用
    `forget` 方法，传递位置（0..n-1）或标签的子窗口。你可以通过 `tabs` 方法检索笔记本中包含的所有子窗口列表。


    要检索当前选中的子窗口，请调用 `select` 方法，并通过传递标签的位置或子窗口本身作为参数来更改选中的标签。


    要更改标签选项（如标签上的文本标签或其状态），你可以使用 `tab(tabid, option=value)` 方法（其中 `tabid` 同样是标签的位置或子窗口）；省略
    `=value` 将返回该选项的当前值。


    选项卡式笔记本控件在每次选择新标签时都会生成一个 `<<NotebookTabChanged>>` 虚拟事件。


    同样，[命令参考](https://tkdocs.com/man/ttk_notebook) 中详细介绍了各种较少使用的选项和命令。


    ![](img/e444c319ec16222f00278651bee8c21d_188_0.png)


    [https://tkdocs.com/man/ttk_notebook](https://tkdocs.com/man/ttk_notebook)


    ## 13. 字体、颜色、图像


    本章描述了 Tk 如何处理字体、颜色和图像。我们之前已经接触过所有这些内容，但这里我们将提供更深入的讲解。


    ### 13.1. 字体


    Tk 的标签控件允许你通过 `font` 配置选项更改用于显示文本的字体。接下来章节将介绍的画布和文本控件也允许你指定字体。其他显示文本的主题控件可能没有
    `font` 配置选项，但它们的字体可以使用样式来更改。


    > 我们将在后面详细介绍样式。本质上，它们取代了过去在单个控件上调整多个配置选项的旧方法。相反，控制外观的字体、颜色和其他设置可以捆绑在一个样式中。然后，该样式可以应用于多个控件。这类似于在
    HTML 页面中硬编码显示标记与使用 CSS 将显示特定信息分开之间的区别。


    与 Tk 中的许多事情一样，默认字体通常是一个不错的选择。如果你需要进行更改，本节将向你展示使用 *命名字体* 的最佳方法。Tk 包含适合在用户界面所有不同组件中使用的命名字体。它们考虑了你运行的特定平台的惯例。当你需要额外的灵活性时，你也可以指定自己的字体。


    [字体命令参考](https://tkdocs.com/man/font) 提供了有关指定字体以及其他字体相关操作的完整详细信息。


    > 许多较旧的 Tk 程序硬编码字体，使用我们下面将看到的 "family size style" 格式、X11 字体名称或更古老、更晦涩的 X11 字体规范字符串。随着平台的发展，这些应用程序看起来越来越过时。更糟糕的是，字体通常是在每个控件的基础上指定的，导致字体决策分散在整个代码中。命名字体，特别是
    Tk 提供的标准字体，是一个好得多的解决方案。审查和更新字体决策是任何现有应用程序中一个简单而重要的更改。


    ### 标准字体'
