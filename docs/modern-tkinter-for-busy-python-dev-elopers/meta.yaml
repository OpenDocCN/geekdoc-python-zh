  md: '# 10.1. Menubars


    In this section, we''ll look at menubars: how to create them, what goes in them,
    how they''re used, etc.


    Properly designing a menubar and its set of menus is beyond the scope of this
    book. However, if you''re creating an application for someone other than yourself,
    here is a bit of advice. First, if you find yourself with many menus, very long
    menus, or deeply nested menus, you may need to rethink how your user interface
    is organized. Second, many people use the menus to explore what the program can
    do, particularly when they''re first learning it, so try to ensure major features
    are accessible by the menus. Finally, for each platform you''re targeting, become
    familiar with how applications use menus, and consult the platform''s human interface
    guidelines for full details about design, terminology, shortcuts, and much more.
    This is an area you will likely have to customize for each platform.


    ![](img/e444c319ec16222f00278651bee8c21d_142_0.png)


    > You''ll notice on some recent Linux distributions that many applications show
    their menus at the top of the screen when active, rather than in the window itself.
    Tk does not yet support this style of menus.


    # Menu Widgets and Hierarchy'
