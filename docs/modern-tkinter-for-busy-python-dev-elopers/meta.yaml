  md: '# 11.3. Dialog Windows


    Dialog boxes are a type of window used in applications to get some information
    from users, inform them that some event has occurred, confirm an action, and more.
    The appearance and usage of dialog boxes are usually quite specifically detailed
    in a platform''s style guide. Tk comes with several dialog boxes built-in for
    common tasks. These help you conform to platform-specific style guidelines.


    # Selecting Files and Directories


    Tk provides several dialogs to let users select files or directories. On Windows
    and macOS, these invoke the underlying operating system dialogs directly. The
    "open" variant on the dialog is used when you want users to select an existing
    file (like in a File | Open... menu command), while the "save" variant is used
    to choose a file to save into (usually used by the File | Save As... menu command).


    ```

    from tkinter import filedialog

    filename = filedialog.askopenfilename()

    filename = filedialog.asksaveasfilename()

    dirname = filedialog.askdirectory()

    ```


    All of these commands produce *modal* dialogs. This means that the commands will
    not complete until a user submits the dialog. These commands return the full pathname
    of the file or directory a user has chosen, or an empty string if a user cancels
    out of the dialog.


    ![](img/e444c319ec16222f00278651bee8c21d_172_0.png)'
