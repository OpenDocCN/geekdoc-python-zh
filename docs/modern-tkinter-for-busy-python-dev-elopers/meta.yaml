    \n## 8.2. 滚动条\n\nttk.Scrollbar\nhttps://tkdocs.com/man/ttk_scrollbar\n\n**滚动条**控件帮助用户查看另一个控件的所有部分，该控件的内容通常远大于可用屏幕空间所能显示的范围。\n\
