    All themed widgets maintain an internal state, represented as a series of binary
    flags. Each flag can either be set (on) or cleared (off). You can set or clear
    these different flags, and check the current setting using the `state` and `instate`
    methods. Buttons make use of the `disabled` flag to control whether or not users
    can press the button. For example:


    ```

