    # 14.3. Tags


    We''ve seen that every canvas item has a unique id number, but there is another
    very useful and powerful way to refer to items on a canvas, and that is using
    *tags*.


    A tag is just an identifier of your creation, something meaningful to your program.
    You can attach tags to canvas items; each item can have any number of tags. Unlike
    item id numbers, which are unique for each item, many items can have the same
    tag.


    What can you do with tags? We saw that you can use the item id to modify a canvas
    item (and we''ll see soon there are other things you can do to items, like move
    them around, delete them, etc.). Any time you can use an item id, you can use
    a tag. For example, you can change the color of all items having a specific tag.


    Tags are a good way to identify certain types of items in your canvas (items that
    are part of a drawn line, items that are part of the palette, etc.). You can use
    tags to correlate canvas items to particular objects in your application (for
    example, tag all canvas items that are part of the robot with id #37 with the
    tag "robot37"). With tags, you don''t have to keep track of the ids of canvas
    items to refer to groups of items later; tags let Tk do that for you.


    You can assign tags when creating an item using the `tags` item configuration
    option. You can add tags later with the `addtag` method, or remove them with the
    `dtags` method. You can get the list of tags for an item with the `gettags` method,
    or return a list of item id numbers having the given tag with the `find` command.


    For example:


    ```

    >>> c = Canvas(root)

    >>> c.create_line(10, 10, 20, 20, tags=(''firstline'', ''drawing''))

    1

    >>> c.create_rectangle(30, 30, 40, 40, tags=(''drawing''))

    2

    >>> c.addtag(''rectangle'', ''withtag'', 2)

    >>> c.addtag(''polygon'', ''withtag'', ''rectangle'')

    >>> c.gettags(2)

    ```'
- md: "## 14.4. Scrolling\n\nIn many applications, you'll want the canvas to be larger\
    \ than what appears on the screen. You can attach horizontal and vertical scrollbars\
    \ to the canvas in the usual way, via the `xview` and `yview` methods.\n\nYou\
    \ can specify both how large you'd like it to be on screen and its full size (which\
    \ would require scrolling to see). The `width` and `height` configuration options\
    \ for the canvas widget will request the given amount of space from the geometry\
    \ manager. The `scrollregion` configuration option tells Tk how large the canvas\
    \ surface is by specifying its left, top, right, and bottom coordinates, e.g.,\
    \ `0 0 1000 1000`.\n\nYou should be able to modify the sketchpad program to add\
    \ scrolling, given what you already know. Give it a try.\n\nOnce you've done that,\
    \ scroll the canvas down just a little bit, and then try drawing. You'll see that\
    \ the line you're drawing appears *above* where the mouse is pointing! Surprised?\n\
    \nWhat's going on is that the global `bind` command doesn't know that the canvas\
    \ is scrolled (it doesn't know the details of any particular widget). So if you've\
    \ scrolled the canvas down by 50 pixels, and you click on the top left corner,\
    \ bind will report that you've clicked at (0,0). But we know that because of the\
    \ scrolling, that position should really be (0,50).\n\nThe `canvasx` and `canvasy`\
    \ methods translate the position onscreen (which bind reports) into the actual\
    \ point on the canvas (taking into account scrolling).\n\n> Be careful if you're\
    \ adding `canvasx` and `canvasy` methods directly to the event binding scripts.\
    \ You need to watch the quoting and substitutions to ensure the conversions are\
    \ done when the event fires. As always, it's better to place that code in a procedure\
    \ separate from the event binding itself.\n\nHere then, is our complete example.\
    \ We probably don't want the palette to be scrolled away when the canvas is scrolled,\
    \ but we'll leave that for another day.\n\n```python\nfrom tkinter import *\n\
    from tkinter import ttk\nroot = Tk()\n\nh = ttk.Scrollbar(root, orient=HORIZONTAL)\n\
    v = ttk.Scrollbar(root, orient=VERTICAL)\ncanvas = Canvas(root, scrollregion=(0,\
    \ 0, 1000, 1000),\n    yscrollcommand=v.set, xscrollcommand=h.set)\nh['command']\
    \ = canvas.xview\nv['command'] = canvas.yview\n\ncanvas.grid(column=0, row=0,\
    \ sticky=(N,W,E,S))\nh.grid(column=0, row=1, sticky=(W,E))\nv.grid(column=1, row=0,\
