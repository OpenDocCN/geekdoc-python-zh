    \n### 文本位置与索引\n\n当我们指定位置 `1.0`（第一行，第一个字符）时，这是一个 *索引* 的例子。它告诉 `insert` 方法将新文本放在哪里（就在第一行、第一个字符之前，即部件的最开头）。索引可以通过多种方式指定。我们在\
