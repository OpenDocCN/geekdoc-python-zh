    # 3.2. Installing Tk on Windows


    Tkinter (and, since Python 3.1, ttk, which is the interface to the newer themed
    widgets) is included in the Python standard library. We highly recommend installing
    Python using the standard binary distributions from [python.org](https://python.org).
    These will automatically install Tcl/Tk, which of course, is needed by Tkinter.


    If you''re instead building Python from source code, the Visual Studio projects
    included in the "PCbuild" directory can automatically fetch and compile Tcl/Tk
    on your system.


    Once you''ve installed or compiled Python, test it out to make sure Tkinter works.
    From the Python prompt, enter these two commands:


    ```

    >>> import tkinter

    >>> tkinter._test()

    ```


    This should pop up a small window; the first line at the top of the window should
    say "This is Tcl/Tk version 8.6"; make sure it is not 8.4 or 8.5!


    > Get an error saying No module named tkinter? You''re probably using Python 2.
    This book assumes Python 3.


    You can also get the exact version of Tcl/Tk that is being used with:


    ```

    >>> tkinter.Tcl().eval(''info patchlevel'')

    ```


    It should return something like ''8.6.9''.


    > Verified using Python 3.9.0rc1 binary installer from python.org (containing
    Tcl/Tk 8.6.9) on Windows 10 version 1809.'
