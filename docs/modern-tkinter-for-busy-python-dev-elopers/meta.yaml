    \n我们在英尺转米的例子中看到，你可以调用 `Variable` 的 `get` 方法来检索其值，或调用 `set` 方法来提供新值。你也可以在实例化时提供一个初始值。\n\
    \n```\ns = StringVar(value=\"abc\")    # default value is ''\nb = BooleanVar(value=True)\
    \   # default is False\ni = IntVar(value=10)         # default is 0\nd = DoubleVar(value=10.5)\
    \    # default is 0.0\n```\n\n## 6.5. 单选按钮\n\nttk.Radiobutton\nhttps://tkdocs.com/man/ttk_radiobutton\n\
    \n**单选按钮**控件允许你在几个互斥的选项中选择一个。与复选按钮不同，它们不限于只有两个选项。单选按钮总是成组使用，其中多个单选按钮控件绑定到一个单一的选择或偏好。当选项数量相对较少时（例如\
    \ 3-5 个），适合使用它们。\n\n![](img/e444c319ec16222f00278651bee8c21d_80_0.png)\n\n单选按钮使用\
    \ `ttk.Radiobutton` 类创建。通常，你会同时创建并初始化几个：\n\n```\nphone = StringVar()\nhome = ttk.Radiobutton(parent,\
    \ text='Home', variable=phone,\n    value='home')\noffice = ttk.Radiobutton(parent,\
    \ text='Office',\n    variable=phone, value='office')\ncell = ttk.Radiobutton(parent,\
    \ text='Mobile', variable=phone,\n    value='cell')\n```\n\n单选按钮共享与复选按钮相同的大多数配置选项。一个例外是\
    \ `onvalue` 和 `offvalue` 选项被单个 `value` 选项取代。组中的每个单选按钮将具有相同的链接变量，但具有不同的值。\n\n当变量持有匹配的值时，该单选按钮将在视觉上指示其被选中。如果不匹配，单选按钮将未被选中。如果链接的变量不存在，或者你没有使用\
    \ `variable` 选项指定一个，单选按钮也会显示为“三态”或不确定。这可以通过 `alternate` 状态标志来检查。\n\n## 6.6. 输入框\n\
    \nttk.Entry\nhttps://tkdocs.com/man/ttk_entry\n\n**输入框**控件向用户提供一个单行文本字段，他们可以在其中输入字符串值。这些可以是几乎任何东西：姓名、城市、密码、社会安全号码等。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_82_0.png)\n\n输入框使用 `ttk.Entry` 类创建：\n\
    \n```\nusername = StringVar()\nname = ttk.Entry(parent, textvariable=username)\n\
    ```\n\n可以指定一个 `width` 配置选项来提供输入框应具有的字符宽度。例如，这允许你为邮政编码显示一个较短的输入框。\n\n### 输入框内容\n\
    \n我们已经看到复选按钮和单选按钮控件都有一个与之关联的值。输入框也是如此，该值通常通过 `textvariable` 配置选项指定的链接变量来访问。\n\n\
