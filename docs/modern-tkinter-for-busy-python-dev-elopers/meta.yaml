- md: "## Customizing Appearance\n\nWe previously saw the `width` and `height` configuration\
    \ options for text widgets. Several others control its overall appearance. The\
    \ most useful are:\n\n- `foreground:` color to draw the text in\n- `background:`\
    \ background color of the widget\n- `padx, pady:` extra padding along the inside\
    \ border of the widget\n- `borderwidth:` width of the border around widget\n-\
    \ `relief:` border style: `flat`, `raised`, `sunken`, `solid`, `ridge`, `groove`\n\
    \n## Wrapping and Scrolling\n\nWhat if some lines of text in the widget are very\
    \ long, longer than the width of the widget? By default, the text wraps around\
    \ to the next line. This behavior can be changed with the `wrap` configuration\
    \ option. It defaults to `char`, meaning wrap lines at any character. Other options\
    \ are `word` to wrap lines only at word breaks (e.g., spaces), and `none` meaning\
    \ to not wrap lines at all. In the latter case, some text of longer lines won't\
    \ be visible unless we attach a horizontal scrollbar to the widget. (Users can\
    \ also scroll through the text using arrow keys, even if scrollbars aren't present).\n\
    \nScrollbars, both horizontal and vertical, can be attached to the text widget\
    \ in the same way as with other widgets, e.g., canvas, listbox.\n\n```python\n\
    t = Text(root, width = 40, height = 5, wrap = \"none\")\nys = ttk.Scrollbar(root,\
    \ orient = 'vertical', command = t.yview)\nxs = ttk.Scrollbar(root, orient = 'horizontal',\
    \ command = t.xview)\nt['yscrollcommand'] = ys.set\nt['xscrollcommand'] = xs.set\n\
    t.insert('end', \"Lorem ipsum...\\n...\\n...\")\nt.grid(column = 0, row = 0, sticky\
    \ = 'nwes')\nxs.grid(column = 0, row = 1, sticky = 'we')\nys.grid(column = 1,\
    \ row = 0, sticky = 'ns')\n```\n\n```python\nroot.grid_columnconfigure(0, weight\
    \ = 1)\nroot.grid_rowconfigure(0, weight = 1)\n```\n\n[https://tkdocs.com/code/scrolledtext.py](https://tkdocs.com/code/scrolledtext.py)\n\
    \nWe can also ask the widget to ensure that a certain part of the text is visible.\
    \ For example, let's say we've added more text to the widget than will fit onscreen\
    \ (so it will scroll). However, we want to ensure that the top of the text rather\
    \ than the bottom is visible. We can use the `see` method.\n\n```python\ntext.see('1.0')\n\
    ```\n\n## Disabling the Widget\n\nSome forms will temporarily disable editing\
    \ in particular widgets unless certain conditions are met (e.g., some other options\
    \ are set to a certain value). To prevent users from changing a text widget, set\
    \ the `state` configuration option to `disabled`. Re-enable editing by setting\
    \ this option back to `normal`.\n\n```python\ntext['state'] = 'disabled'\n```\n\
    \n> As text widgets are part of the classic widgets, the usual `state` and `instate`\
    \ methods are not available.\n\n## 15.2. Modifying the Text in Code\n\nWhile users\
    \ can modify the text in the text widget interactively, your program can also\
    \ make changes. Adding text is done with the `insert` method, which we used above\
    \ to provide an initial value for the text widget.\n\n### Text Positions and Indices\n\
    \nWhen we specified a position of `1.0` (first line, first character), this was\
    \ an example of an *index*. It tells the `insert` method where to put the new\
    \ text (just before the first line, first character, i.e., at the very start of\
    \ the widget). Indices can be specified in a variety of ways. We used another\
    \ one with the `get` method: `end` means *just past* the end of the text. (Why\
    \ \"just past?\" Text is inserted right *before* the given index, so inserting\
    \ at `end` will add text to the end of the widget). Note that Tk will *always*\
    \ add a newline at the very end of the text widget.\n\nHere are a few additional\
    \ examples of indices and how to interpret them:\n\n- `3.end`: The newline at\
    \ the end of line 3.\n- `1.0 + 3 chars`: Three characters past the start of line\
    \ 1.\n- `2.end -1 chars`: The last character before the new line in line 2.\n\
    - `end -1 chars`: The newline that Tk always adds at the end of the text.\n- `end\
    \ -2 chars`: The actual last character of the text.\n- `end -1 lines`: The start\
    \ of the last actual line of text.\n- `2.2 + 2 lines`: The third character (index\
    \ 2) of the fourth line of text.\n- `2.5 linestart`: The first character of line\
    \ 2.\n- `2.5 lineend`: The position of the newline at the end of line 2.\n- `2.5\
    \ wordstart`: First char. of the word with the char. at index 2.5.\n- `2.5 wordend`:\
    \ First char. after the word with the char. at index 2.5.\n\nSome additional things\
    \ to keep in mind:\n\n- The term `chars` can be abbreviated as `c`, and `lines`\
    \ as `l`.\n- Spaces between terms can be omitted, e.g., `1.0+3c`.\n- An index\
    \ past the end of the text (e.g., `end + 100c`) is interpreted as `end`.\n- Indices\
    \ wrap to subsequent lines as needed; e.g., `1.0 + 10 chars` on a line with only\
    \ five characters will refer to a position on the second line.\n- Line numbers\
    \ in indices are interpreted as *logical lines*, i.e., each line ends only at\
    \ the \"\\n\". With long lines and wrapping enabled, one logical line may represent\
    \ multiple *display lines*. If you'd like to move up or down a single line on\
    \ the display, you can specify this as, e.g., \"1.0 + 2 display lines\".\n\nTo\
    \ determine the *canonical position* of an index, use the `index idx` method.\
    \ Pass it any index expression, and it returns the corresponding index in the\
    \ form `line.char`. For example, to find the position of the last character (ignoring\
    \ the automatic newline at the end), use:\n\n```python\ntext.index('end')\n```\n\
    \nYou can compare two indices using the `compare` method, which lets you check\
    \ for equality, whether one index is later in the text than the other, etc.\n\n\
    ```python\nif text.compare(idx1, \"==\", idx2): # same position\n```\n\nValid\
    \ operators are `==`, `!=`, `<`, `<=`, `>`, and `>=`.\n\n### Deleting Text\n\n\
    While the `insert` method adds new text anywhere in the widget, the `delete start\
    \ ?end?` method removes it. We can delete either a single character (specified\
    \ by index) or a *range* of characters (specified by start and end indices). In\
    \ the latter case, characters from (and including) the start index through to\
    \ *just before* the end index will be deleted (so the character at the end index\
    \ is not deleted). So if we assume for each of these we start off with abcd\\\
    nefgh in the text widget:\n\n```python\ntext.delete('1.2') ⇒ \"abd\\nefgh\"\n\
    text.delete('1.1', '1.2') ⇒ \"acd\\nefgh\"\ntext.delete('1.0', '2.0') ⇒ \"efgh\"\
    \ntext.delete('1.2', '2.1') ⇒ \"abfgh\"\n```\n\nThere is also a `replace` method\
    \ that performs a `delete` followed by an `insert` at the same location.\n\n###\
    \ Example: Logging Window\n\nHere's a short example that illustrates using a text\
    \ widget as an 80x24 logging window for an application. Users don't edit the text\
    \ widget at all. Instead, the program writes log messages to it. We'd like to\
    \ display more than 24 lines (so no scrolling). If the log is full, old messages\
    \ are removed from the top before new ones are added at the end.\n\n```python\n\
    from tkinter import *\nfrom tkinter import ttk\n\nroot = Tk()\nlog = Text(root,\
    \ state='disabled', width=80, height=24,\nwrap='none')\nlog.grid()\n\ndef writeToLog(msg):\n\
    \    numlines = int(log.index('end - 1 line').split('.')[0])\n    log['state']\
    \ = 'normal'\n    if numlines==24:\n        log.delete(1.0, 2.0)\n    if log.index('end-1c')!='1.0':\n\
    \        log.insert('end', '\\n')\n    log.insert('end', msg)\n    log['state']\
    \ = 'disabled'\n```\n\n[</>] [https://tkdocs.com/code/logwindow.py](https://tkdocs.com/code/logwindow.py)\n\
    \n> \U0001F4A1 Note that because the program placed the widget in a disabled state,\
    \ we had re-enable it to make any changes, even from our program.\n\n## 15.3.\
    \ Formatting with Tags\n\nSo far, we've used text widgets when all the text is\
    \ in a single font. Now it's time to look at how to add special formatting, such\
    \ as bold, italic, strikethrough, background colors, font sizes, and much more.\
    \ Tk's text widget implements these using a feature called *tags*.\n\nTags are\
    \ objects associated with the text widget. Each tag is referred to via a name\
    \ chosen by the programmer. Each tag has several configuration options. These\
    \ are things like fonts and colors that control formatting. Though tags are objects\
    \ having state, they don't need to be explicitly created. They are automatically\
    \ created the first time the tag name is used.\n\n### Adding Tags to Text\n\n\
    Tags can be associated with one or more ranges of text in the widget. As before,\
    \ ranges are specified via indices. A single index represents a single character,\
    \ and a pair of indices represent a range from the start character to just before\
    \ the end character. Tags are added to a range of text using the `tag_add` method.\n\
    \n```python\ntext.tag_add('highlightline', '5.0', '6.0')\n```\n\nTags can also\
    \ be provided when first inserting text. The `insert` method supports an optional\
    \ parameter containing a list of one or more tags to add to the text being inserted.\n\
    \n```python\ntext.insert('end', 'new material to insert', ('highlightline',\n\
    'recent', 'warning'))\n```\n\nAs the text in the widget is modified, whether by\
    \ a user or your program, the tags will adjust automatically. For example, if\
    \ we tagged the text \"the quick brown fox\" with the tag \"nounphrase\", and\
    \ then replaced the word \"quick\" with \"speedy,\" the tag still applies to the\
    \ entire phrase."
