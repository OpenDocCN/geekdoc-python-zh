    \ room in the master to fill. By default, the weight of each column or row is\
    \ 0, meaning it won't expand to fill any extra space.\n\nFor the user interface\
    \ to resize then, we'll need to specify a positive weight to the columns that\
    \ we'd like to expand. This is done using the `columnconfigure` and `rowconfigure`\
    \ methods of `grid`. This weight is relative. If two columns have the same weight,\
    \ they'll expand at the same rate. In our example, we'll give the three leftmost\
    \ columns (holding the checkbuttons) a weight of 3, and the two rightmost columns\
    \ a weight of 1. For every one pixel the right columns grow, the left columns\
    \ will grow by three pixels. So as the window grows larger, most of the extra\
    \ space will go to the left side.\n\n![](img/e444c319ec16222f00278651bee8c21d_98_0.png)\n\
    \n*Resizing the window after adding weights.*\n\nBoth `columnconfigure` and `rowconfigure`\
    \ also take a `minsize` grid option, which specifies a minimum size which you\
    \ really don't want the column or row to shrink beyond.\n\n## 7.5. Padding\n\n\
    Normally, each column or row will be directly adjacent to the next, so that widgets\
    \ will be right next to each other. This is sometimes what you want (think of\
    \ a listbox and its scrollbar), but often you want some space between widgets.\
    \ In Tk, this is called padding, and there are several ways you can choose to\
    \ add it.\n\nWe've already actually seen one way, and that is using a widget's\
    \ own options to add the extra space around it. Not all widgets have this, but\
    \ one that does is a frame; this is useful because frames are most often used\
    \ as the master to grid other widgets. The frame's `padding` option lets you specify\
    \ a bit of extra padding inside the frame, whether the same amount for each of\
    \ the four sides or even different for each.\n\nA second way is using the `padx`\
    \ and `pady` grid options when adding the widget. As you'd expect, `padx` puts\
    \ a bit of extra space to the left and right, while `pady` adds extra space top\
    \ and bottom. A single value for the option puts the same padding on both left\
    \ and right (or top and bottom), while a two-value list lets you put different\
    \ amounts on left and right (or top and bottom). Note that this extra padding\
    \ is within the grid cell containing the widget.\n\nIf you want to add padding\
    \ around an entire row or column, the `columnconfigure` and `rowconfigure` methods\
    \ accept a `pad` option, which will do this for you.\n\nLet's add the extra sticky,\
    \ resizing, and padding behavior to our example (additions in bold).\n\n```python\n\
    from tkinter import *\nfrom tkinter import ttk\n\nroot = Tk()\n\ncontent = ttk.Frame(root,\
    \ **padding=(3,3,12,12)**)\nframe = ttk.Frame(content, borderwidth=5, relief=\"\
    ridge\",\n                  width=200, height=100)\nnamelbl = ttk.Label(content,\
    \ text=\"Name\")\nname = ttk.Entry(content)\nonevar = BooleanVar()\ntwovar = BooleanVar()\n\
    threevar = BooleanVar()\n\nonevar.set(True)\ntwovar.set(False)\nthreevar.set(True)\n\
    \none = ttk.Checkbutton(content, text=\"One\", variable=onevar,\n    onvalue=True)\n\
    two = ttk.Checkbutton(content, text=\"Two\", variable=twovar,\n    onvalue=True)\n\
    three = ttk.Checkbutton(content, text=\"Three\",\n    variable=threevar, onvalue=True)\n\
    ok = ttk.Button(content, text=\"Okay\")\ncancel = ttk.Button(content, text=\"\
    Cancel\")\n\ncontent.grid(column=0, row=0, sticky=(N, S, E, W))\nframe.grid(column=0,\
    \ row=0, columnspan=3, rowspan=2, sticky=\n    (N, S, E, W))\nnamelbl.grid(column=3,\
    \ row=0, columnspan=2, sticky=(N, W),\n    padx=5)\nname.grid(column=3, row=1,\
    \ columnspan=2, sticky=(N,E,W),\n    pady=5, padx=5)\none.grid(column=0, row=3)\n\
    two.grid(column=1, row=3)\nthree.grid(column=2, row=3)\nok.grid(column=3, row=3)\n\
    cancel.grid(column=4, row=3)\n\nroot.columnconfigure(0, weight=1)\nroot.rowconfigure(0,\
    \ weight=1)\ncontent.columnconfigure(0, weight=3)\ncontent.columnconfigure(1,\
    \ weight=3)\ncontent.columnconfigure(2, weight=3)\ncontent.columnconfigure(3,\
    \ weight=1)\ncontent.columnconfigure(4, weight=1)\ncontent.rowconfigure(1, weight=1)\n\
    \nroot.mainloop()\n```\n\n[https://tkdocs.com/code/gridexample2.py](https://tkdocs.com/code/gridexample2.py)\n\
    \nThis looks more promising. Play around with the example to get a feel for the\
    \ resize behavior.\n\n![](img/e444c319ec16222f00278651bee8c21d_101_0.png)\n\n\
    Grid example, handling in-cell layout and resize.\n\n## 7.6. Additional Grid Features\n\
    \nIf you look at the [reference documentation](https://tkdocs.com/man/grid) for\
    \ `grid`, you'll see many other things you can do with grid. Here are a few of\
    \ the more useful ones.\n\n### Querying and Changing Grid Options\n\nLike widgets\
    \ themselves, it's easy to introspect the various grid options or change them.\
    \ Setting options when you first grid the widget is certainly convenient, but\
    \ you can change them anytime you'd like.\n\nThe `slaves` method will tell you\
    \ all the widgets that have been gridded inside a master, or optionally those\
    \ within just a certain column or row. The `info` method will return a list of\
    \ all the grid options for a widget and their values. Finally, the `configure`\
    \ method lets you change one or more grid options on a widget.\n\nThese are illustrated\
    \ in this interactive session:\n\n```python\n>>> content.grid_slaves()\n[<tkinter.ttk.Button\
    \ object .!frame.!button2>,\n<tkinter.ttk.Button object .!frame.!button>,\n<tkinter.ttk.Checkbutton\
    \ object .!frame.!checkbutton3>,\n<tkinter.ttk.Checkbutton object .!frame.!checkbutton2>,\n\
    <tkinter.ttk.Checkbutton object .!frame.!checkbutton>,\n<tkinter.ttk.Entry object\
    \ .!frame.!entry>,\n<tkinter.ttk.Label object .!frame.!label>, <tkinter.ttk.Frame\
    \ object .!frame.!frame>]\n>>> for w in content.grid_slaves(): print(w)\n...\n\
    .!frame.!button2\n.!frame.!button\n.!frame.!checkbutton3\n.!frame.!checkbutton2\n\
    .!frame.!checkbutton\n.!frame.!entry\n.!frame.!label\n.!frame.!frame\n>>> for\
    \ w in content.grid_slaves(row=3): print(w)\n...\n.!frame.!button2\n.!frame.!button\n\
    .!frame.!checkbutton3\n.!frame.!checkbutton2\n.!frame.!checkbutton\n>>> for w\
    \ in content.grid_slaves(column=0): print(w)\n...\n.!frame.!checkbutton\n.!frame.!frame\n\
    >>> namelbl.grid_info()\n{'in': <tkinter.ttk.Frame object .!frame>, 'column':\
    \ 3,\n'row': 0, 'columnspan': 2, 'rowspan': 1,\n'ipadx': 0, 'ipady': 0, 'padx':\
    \ 5, 'pady': 0, 'sticky': 'nw'}\n>>> namelbl.grid_configure(sticky=(E,W))\n>>>\
    \ namelbl.grid_info()\n{'in': <tkinter.ttk.Frame object .!frame>, 'column': 3,\n\
    'row': 0, 'columnspan': 2, 'rowspan': 1,\n'ipadx': 0, 'ipady': 0, 'padx': 5, 'pady':\
    \ 0, 'sticky': 'ew'}\n```\n\n### Internal Padding\n\nYou saw how the `padx` and\
    \ `pady` grid options added extra space around the outside of a widget. There's\
    \ also a less used type of padding called \"internal padding\" controlled by the\
    \ grid options `ipadx` and `ipady`.\n\nThe difference can be subtle. Let's say\
    \ you have a frame that's 20x20, and specify normal (external) padding of 5 pixels\
    \ on each side. The frame will request a 20x20 rectangle (its natural size) from\
    \ the geometry manager. Normally, that's what it will be granted, so it'll get\
    \ a 20x20 rectangle for the frame, surrounded by a 5-pixel border.\n\nWith internal\
    \ padding, the geometry manager will effectively add the extra padding to the\
    \ widget when figuring out its natural size, as if the widget has requested a\
    \ 30x30 rectangle. If the frame is centered, or attached to a single side or corner\
    \ (using `sticky`), we'll end up with a 20x20 frame with extra space around it.\
    \ If, however, the frame is set to stretch (i.e., a `sticky` value of `we`, `ns`,\
    \ or `nwes`), it will fill the extra space, resulting in a 30x30 frame, with no\
    \ border.\n\n### Forget and Remove"
  mdcn: "## 7.4. 处理尺寸调整\n\n如果你尝试调整示例窗口的大小，你会注意到什么都没有移动，如下图所示。\n\n![](img/e444c319ec16222f00278651bee8c21d_97_0.png)\n\
    \n即使你查看了后续内容并为我们的示例添加了额外的 `sticky` 选项，你仍然会看到相同的情况。看起来 `sticky` 可能告诉 Tk *如何*在单元格的行或列调整大小时做出反应，但并没有实际说明如果出现额外空间，行或列*应该*调整大小。让我们来解决这个问题。\n\
    \n网格中的每一列和每一行都有一个与之关联的 `weight` 选项。这告诉 `grid`，如果主窗口中有额外空间需要填充，列或行应该增长多少。默认情况下，每列或每行的权重为\
    \ 0，这意味着它不会扩展以填充任何额外空间。\n\n因此，为了让用户界面能够调整大小，我们需要为希望扩展的列指定一个正权重。这通过使用 `grid` 的\
    \ `columnconfigure` 和 `rowconfigure` 方法来完成。这个权重是相对的。如果两列具有相同的权重，它们将以相同的速率扩展。在我们的示例中，我们将给最左边的三列（包含复选按钮）一个权重\
    \ 3，最右边的两列一个权重 1。右侧列每增长一个像素，左侧列将增长三个像素。因此，随着窗口变大，大部分额外空间将分配给左侧。\n\n![](img/e444c319ec16222f00278651bee8c21d_98_0.png)\n\
    \n*添加权重后调整窗口大小。*\n\n`columnconfigure` 和 `rowconfigure` 还接受一个 `minsize` 网格选项，该选项指定了你确实不希望列或行缩小到的最小尺寸。\n\
    \n## 7.5. 内边距\n\n通常，每一列或每一行将直接与下一列或下一行相邻，因此小部件将彼此紧挨着。这有时是你想要的（想想列表框及其滚动条），但通常你希望小部件之间有一些空间。在\
    \ Tk 中，这被称为内边距，有几种方法可以选择添加它。\n\n我们实际上已经见过一种方法，那就是使用小部件自身的选项在其周围添加额外空间。并非所有小部件都有这个选项，但有一个是框架（frame）；这很有用，因为框架最常被用作网格其他小部件的主窗口。框架的\
    \ `padding` 选项允许你指定框架内部的一些额外内边距，可以是四边相同的量，也可以是每边不同的量。\n\n第二种方法是在添加小部件时使用 `padx`\
    \ 和 `pady` 网格选项。正如你所料，`padx` 在左右添加一些额外空间，而 `pady` 在上下添加额外空间。该选项的单个值会在左右（或上下）放置相同的内边距，而双值列表允许你在左右（或上下）放置不同的量。请注意，这个额外的内边距是在包含小部件的网格单元格内部。\n\
    \n如果你想为整个行或列添加内边距，`columnconfigure` 和 `rowconfigure` 方法接受一个 `pad` 选项，它将为你完成此操作。\n\
    \n让我们为我们的示例添加额外的粘性、调整大小和内边距行为（添加部分以粗体显示）。\n\n```python\nfrom tkinter import *\n\
    from tkinter import ttk\n\nroot = Tk()\n\ncontent = ttk.Frame(root, **padding=(3,3,12,12)**)\n\
    frame = ttk.Frame(content, borderwidth=5, relief=\"ridge\",\n                \
    \  width=200, height=100)\nnamelbl = ttk.Label(content, text=\"Name\")\nname =\
    \ ttk.Entry(content)\nonevar = BooleanVar()\ntwovar = BooleanVar()\nthreevar =\
    \ BooleanVar()\n\nonevar.set(True)\ntwovar.set(False)\nthreevar.set(True)\n\n\
    one = ttk.Checkbutton(content, text=\"One\", variable=onevar,\n    onvalue=True)\n\
    two = ttk.Checkbutton(content, text=\"Two\", variable=twovar,\n    onvalue=True)\n\
    three = ttk.Checkbutton(content, text=\"Three\",\n    variable=threevar, onvalue=True)\n\
    ok = ttk.Button(content, text=\"Okay\")\ncancel = ttk.Button(content, text=\"\
    Cancel\")\n\ncontent.grid(column=0, row=0, sticky=(N, S, E, W))\nframe.grid(column=0,\
    \ row=0, columnspan=3, rowspan=2, sticky=\n    (N, S, E, W))\nnamelbl.grid(column=3,\
    \ row=0, columnspan=2, sticky=(N, W),\n    padx=5)\nname.grid(column=3, row=1,\
    \ columnspan=2, sticky=(N,E,W),\n    pady=5, padx=5)\none.grid(column=0, row=3)\n\
    two.grid(column=1, row=3)\nthree.grid(column=2, row=3)\nok.grid(column=3, row=3)\n\
    cancel.grid(column=4, row=3)\n\nroot.columnconfigure(0, weight=1)\nroot.rowconfigure(0,\
    \ weight=1)\ncontent.columnconfigure(0, weight=3)\ncontent.columnconfigure(1,\
    \ weight=3)\ncontent.columnconfigure(2, weight=3)\ncontent.columnconfigure(3,\
    \ weight=1)\ncontent.columnconfigure(4, weight=1)\ncontent.rowconfigure(1, weight=1)\n\
    \nroot.mainloop()\n```\n\n[https://tkdocs.com/code/gridexample2.py](https://tkdocs.com/code/gridexample2.py)\n\
    \n这看起来更有希望了。尝试操作这个示例，感受一下调整大小的行为。\n\n![](img/e444c319ec16222f00278651bee8c21d_101_0.png)\n\
    \n网格示例，处理单元格内布局和调整大小。\n\n## 7.6. 附加网格功能\n\n如果你查看 `grid` 的[参考文档](https://tkdocs.com/man/grid)，你会看到使用网格可以做的许多其他事情。以下是一些更有用的功能。\n\
    \n### 查询和更改网格选项\n\n与小部件本身一样，可以轻松地内省各种网格选项或更改它们。在首次网格化小部件时设置选项当然很方便，但你可以随时更改它们。\n\
    \n`slaves` 方法将告诉你所有已网格化在主窗口内的小部件，或者可选地，仅在特定列或行内的小部件。`info` 方法将返回小部件所有网格选项及其值的列表。最后，`configure`\
    \ 方法允许你更改小部件上的一个或多个网格选项。\n\n这些在以下交互式会话中进行了说明：\n\n```python\n>>> content.grid_slaves()\n\
    [<tkinter.ttk.Button object .!frame.!button2>,\n<tkinter.ttk.Button object .!frame.!button>,\n\
    <tkinter.ttk.Checkbutton object .!frame.!checkbutton3>,\n<tkinter.ttk.Checkbutton\
    \ object .!frame.!checkbutton2>,\n<tkinter.ttk.Checkbutton object .!frame.!checkbutton>,\n\
    <tkinter.ttk.Entry object .!frame.!entry>,\n<tkinter.ttk.Label object .!frame.!label>,\
    \ <tkinter.ttk.Frame object .!frame.!frame>]\n>>> for w in content.grid_slaves():\
    \ print(w)\n...\n.!frame.!button2\n.!frame.!button\n.!frame.!checkbutton3\n.!frame.!checkbutton2\n\
    .!frame.!checkbutton\n.!frame.!entry\n.!frame.!label\n.!frame.!frame\n>>> for\
    \ w in content.grid_slaves(row=3): print(w)\n...\n.!frame.!button2\n.!frame.!button\n\
    .!frame.!checkbutton3\n.!frame.!checkbutton2\n.!frame.!checkbutton\n>>> for w\
    \ in content.grid_slaves(column=0): print(w)\n...\n.!frame.!checkbutton\n.!frame.!frame\n\
    >>> namelbl.grid_info()\n{'in': <tkinter.ttk.Frame object .!frame>, 'column':\
    \ 3,\n'row': 0, 'columnspan': 2, 'rowspan': 1,\n'ipadx': 0, 'ipady': 0, 'padx':\
    \ 5, 'pady': 0, 'sticky': 'nw'}\n>>> namelbl.grid_configure(sticky=(E,W))\n>>>\
    \ namelbl.grid_info()\n{'in': <tkinter.ttk.Frame object .!frame>, 'column': 3,\n\
    'row': 0, 'columnspan': 2, 'rowspan': 1,\n'ipadx': 0, 'ipady': 0, 'padx': 5, 'pady':\
    \ 0, 'sticky': 'ew'}\n```\n\n### 内部内边距\n\n你已经看到 `padx` 和 `pady` 网格选项如何在小部件外部添加额外空间。还有一种较少使用的内边距类型，称为“内部内边距”，由网格选项\
    \ `ipadx` 和 `ipady` 控制。\n\n区别可能很微妙。假设你有一个 20x20 的框架，并指定每边 5 像素的普通（外部）内边距。框架将向几何管理器请求一个\
    \ 20x20 的矩形（其自然尺寸）。通常，这就是它将被授予的，因此它将获得一个 20x20 的框架矩形，周围环绕着 5 像素的边框。\n\n使用内部内边距时，几何管理器在计算其自然尺寸时会有效地将额外内边距添加到小部件中，就好像小部件请求了一个\
    \ 30x30 的矩形。如果框架居中，或附加到单侧或角落（使用 `sticky`），我们将得到一个 20x20 的框架，周围有额外空间。然而，如果框架设置为拉伸（即\
    \ `sticky` 值为 `we`、`ns` 或 `nwes`），它将填充额外空间，从而产生一个 30x30 的框架，没有边框。\n\n### 忘记和移除"
