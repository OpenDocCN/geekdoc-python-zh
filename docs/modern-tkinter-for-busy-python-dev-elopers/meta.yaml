    `Control`, `Shift`, `Alt`, `Option`, and `Command`.


    # **Virtual Events**


    The events we''ve seen so far are low-level operating system events like mouse
    clicks and window resizes. Many widgets also generate higher level or semantic
    events called *virtual events*. These are indicated by double angle brackets around
    the event name, e.g., `<<foo>>`.


    For example, a listbox widget will generate a `<<ListboxSelect>>` virtual event
    whenever its selection changes. The same virtual event is generated whether a
    user clicked on an item, moved to it using the arrow keys, or some other way.
    Virtual events avoid the problem of setting up multiple, possibly platform-specific
    event bindings to capture common changes. The available virtual events for a widget
    will be listed in the documentation for the widget class.


    Tk also defines virtual events for common operations that are triggered in different
    ways for different platforms. These include `<<Cut>>`, `<<Copy>>` and `<<Paste>>`.


    You can define your own virtual events, which can be specific to your application.
    This can be a useful way to keep platform-specific details isolated in a single
    module, while you use the virtual event throughout your application. Your own
    code can generate virtual events that work in exactly the same way that virtual
    events generated by Tk do.


    ```

    python

    root.event_generate("<<MyOwnEvent>>")

    ```'
