  - '[PAGE 203]


    instead of a solid fill color, use a pattern, typically `gray75`, `gray50`, `gray25`,
    or `gray12`; stippling is currently not supported on macOS


    **`state:`**

    assign a state of `normal` (default), `disabled` (item event bindings are ignored),
    or `hidden` (removed from display)


    **`disabledfill`, `disabledwidth`, ...:**

    if the item''s `state` is set to `disabled`, the item will display using these
    variants of the usual attributes


    **`activefill`, `activewidth`, ...:**

    when the mouse pointer is over the item, it will display using these variants
    of the usual attributes


    > 💡 *If you have canvas items that change state, creating the item with both the
    regular and `disabled*` attribute variants can simplify your code. You simply
    need to change the item''s `state`, rather than writing code to change multiple
    display attributes. The same applies to the `active*`. Both encourage a more declarative
    style that can remove a lot of boilerplate code.*


    Akin to Tk widgets, changing attributes for canvas items after we''ve already
    created them is easily accomplished.


    ```

    id = canvas.create_line(0, 0, 10, 10, fill=''red'')

    ...

    canvas.itemconfigure(id, fill=''blue'', width=2)

    ```


    # **Item Types**


    Canvas widgets support a wide variety of item types.


    # **Line**


    Our sketchpad created simple line items, each a single segment with a start point
    and an end point. Lines items can also consist of multiple segments.


    ```

    canvas.create_line(10, 10, 200, 50, 90, 150, 50, 80)

    ```'
  - '[PAGE 204]


    Lines have several interesting additional attributes, allowing for drawing curves,
    arrows, and more.


    **arrow:**

    place an arrowhead at the start (`first`), end (`last`), or both ends (`both`);
    default is `none`


    **arrowshape:**

    allows changing the appearance of any arrowheads


    **capstyle:**

    for wide lines without arrowheads, this controls how the end of lines are drawn;
    one of `butt` (default), `projecting`, or `round`


    **joinstyle:**

    for wide lines with multiple segments, this controls drawings of each vertex;
    one of `round` (default), `bevel`, or `miter`


    **smooth:**

    if specified as `true` (or `bezier`), draws a smooth curve (via quadratic splines)
    between multiple segments rather than using straight lines; `raw` specifies a
    different type of curve (cubic splines)


    **splinesteps:**

    controls the smoothness of curved lines, i.e., those with the `smooth` option
    set


    # Rectangle


    Rectangles are specified by the coordinates of opposing corners, e.g., top-left
    and bottom-right. They can be filled in (via `fill`) with one color, and the `outline`
    given a different color.


    ```

    canvas.create_rectangle(10, 10, 200, 50, fill=''red'', outline=''blue'')

    ```


    # Oval


    Ovals items work exactly the same as rectangles.


    ```

    canvas.create_oval(10, 10, 200, 150, fill=''red'', outline=''blue'')

    ```'
- md: "## Polygon\n\nPolygon items allow you to create arbitrary shapes as defined\
    \ by a series of points. The coordinates are given in the same way as multipoint\
    \ lines. Tk ensures the polygon is \"closed,\" attaching the last point to the\
    \ first if needed. Like ovals and rectangles, they can have separate `fill` and\
    \ `outline` colors. They also support the `joinstyle`, `smooth`, and `splinesteps`\
    \ attributes of line items.\n\n```\ncanvas.create_polygon(10, 10, 200, 50, 90,\
    \ 150, 50, 80, 120,\n55, fill='red', outline='blue')\n```\n\n## Arc\n\nArc items\
    \ draw a portion of an oval; think of one piece of a pie chart. Its display is\
    \ controlled by three attributes:\n\n- `start`: how far along the oval the arc\
    \ should start, in degrees (0 is the 3-o'clock position)\n- `extent`: how many\
    \ degrees \"wide\" the arc should be, positive for counter-clockwise from the\
    \ start, negative for clockwise\n- `style`: one of `pieslice` (the default), `arc`\
    \ (draws just the outer perimeter), or `chord` (draws the area between a line\
    \ connecting the start and end points of the arc, and the outer perimeter).\n\n\
    ```\ncanvas.create_arc(10, 10, 200, 150, fill='yellow',\noutline='black', start=45,\
    \ extent=135, width=5)\n```\n\n## Image\n\nImage items can display arbitrary images.\
    \ By default, the item is centered at the coordinates you specify, but this can\
    \ be changed with the `anchor` option, e.g., `nw` means the coordinates are where\
    \ to put the top-left of the image.\n\n```\nmyimg = PhotoImage(file='pretty.png')\n\
    canvas.create_image(10, 10, image=myimg, anchor='nw')\n```\n\nThere's also a `bitmap`\
    \ item type for images having only two colors, which can be changed via `foreground`\
    \ and `background`. It's not something that would commonly be used these days.\n\
    \n## Text\n\nText items can display a block of text. Positioning the text works\
    \ the same as with image items. Specify the text to display using the `text` attribute.\
    \ All of the text in the item will have the same color (specified by the `fill`\
    \ attribute) and the same font (specified by a `font` attribute).\n\nThe text\
    \ item can display multiple lines of text if you embed `\\n` in the text. Alternatively,\
    \ you can have the item automatically wrapped into multiple lines by providing\
    \ a `width` attribute to represent the maximum width of a line. The alignment\
    \ of multiple lines of text can be set using the `justify` attribute, which can\
    \ be one of `left` (the default), `right`, or `center`.\n\n```\ncanvas.create_oval(100,\
    \ 100, text='A wonderful story',\nanchor='nw', font='TkMenuFont', fill='red')\n\
    ```\n\n## Widget\n\nOne of the coolest things you can do with the canvas widget\
    \ is to embed *other widgets* inside it. This can be a lowly button, an entry\
    \ (think in-place editing of text items), a listbox, a frame itself containing\
    \ a complex set of widgets... anything! Remember when we said way back when that\
    \ a canvas widget could act as a geometry manager? This is what we meant.\n\n\
    Canvas items that display other widgets are known as *window* items (Tk's longstanding\
    \ terminology for widgets). They are positioned like text and image items. You\
    \ can give them explicit `width` and `height` attributes; they default to the\
    \ widget's preferred size. Finally, it's important that the widget you're placing\
    \ on the canvas (via the `window` attribute) be a child widget of the canvas.\n\
    \n```\nb = ttk.Button(canvas, text='Implode!')\ncanvas.create_image(10, 10, anchor='nw',\
    \ window=b)\n```\n\n## Modifying Items\n\nWe've seen how you can modify the configuration\
    \ options on an item — its color, width, etc. There are several other things you\
    \ can do with items.\n\nTo delete items, use the `delete` method.\n\nTo change\
    \ an item's size and position, you can use the `coords` method. You supply new\
    \ coordinates for the item, specified the same way as when you first created it.\
    \ Calling this method without a new set of coordinates will return the current\
    \ coordinates of the item. To move one or more items by a particular horizontal\
    \ or vertical amount from their current location, you can use the `move` method.\n\
    \nAll items are ordered from top to bottom in what's called the stacking order.\
    \ If an item later in the stacking order overlaps an item below it, the first\
    \ item will be drawn on top of the second. The `lift` and `lower` methods allow\
    \ you to adjust an item's position in the stacking order.\n\nThere are several\
    \ more operations detailed in the reference manual. They describe more ways to\
    \ modify items and retrieve information about them.\n\n## 14.2. Event Bindings\n\
    \nWe've already seen that the canvas widget as a whole, like any other Tk widget,\
    \ can capture events using the `bind` command.\nYou can also attach bindings to\
    \ individual items in the canvas (or groups of them, as we'll see in the next\
    \ section using tags). So if you want to know whether or not a particular item\
    \ has been clicked on, you don't need to watch for mouse click events for the\
    \ canvas as a whole, and then figure out if that click happened on your item.\
    \ Tk will take care of all this for you.\nTo capture these events, you use a bind\
    \ command built into the canvas. It works exactly like the regular bind command,\
    \ taking an event pattern and a callback. The only difference is you specify the\
    \ canvas item this binding applies to.\n\n```\ncanvas.tag_bind(id, '<1>', ...)\n\
    ```\n\n> Note the difference between the item-specific `tag_bind` method and the\
    \ widget-level `bind` method.\n\nLet's add some code to our sketchpad example\
    \ to allow changing the drawing color. We'll first create a few different rectangle\
    \ items, each filled with a different color. We'll then attach a binding to each\
    \ of these. When they're clicked on, they'll set a global variable to the new\
    \ drawing color. Our mouse motion binding will look at that variable when creating\
    \ the line segments.\n\n```\ncolor = \"black\"\ndef setColor(newcolor):\n    global\
    \ color\n    color = newcolor\n\ndef addLine(event):\n    global lastx, lasty\n\
    \    canvas.create_line((lastx, lasty, event.x, event.y),\n        fill=color)\n\
    \    lastx, lasty = event.x, event.y\n```\n\n```\nid = canvas.create_rectangle((10,\
    \ 10, 30, 30), fill=\"red\")\ncanvas.tag_bind(id, \"<Button-1>\", lambda x: setColor(\"\
    red\"))\nid = canvas.create_rectangle((10, 35, 30, 55), fill=\"blue\")\ncanvas.tag_bind(id,\
    \ \"<Button-1>\", lambda x: setColor(\"blue\"))\nid = canvas.create_rectangle((10,\
    \ 60, 30, 80), fill=\"black\")\ncanvas.tag_bind(id, \"<Button-1>\", lambda x:\n\
    setColor(\"black\"))\n```\n\n[https://tkdocs.com/code/sketch2.py](https://tkdocs.com/code/sketch2.py)\n\
    \n## 14.3. Tags\n\nWe've seen that every canvas item has a unique id number, but\
    \ there is another very useful and powerful way to refer to items on a canvas,\
    \ and that is using *tags*.\n\nA tag is just an identifier of your creation, something\
    \ meaningful to your program. You can attach tags to canvas items; each item can\
    \ have any number of tags. Unlike item id numbers, which are unique for each item,\
    \ many items can have the same tag.\n\nWhat can you do with tags? We saw that\
    \ you can use the item id to modify a canvas item (and we'll see soon there are\
    \ other things you can do to items, like move them around, delete them, etc.).\
    \ Any time you can use an item id, you can use a tag. For example, you can change\
    \ the color of all items having a specific tag.\n\nTags are a good way to identify\
    \ certain types of items in your canvas (items that are part of a drawn line,\
    \ items that are part of the palette, etc.). You can use tags to correlate canvas\
    \ items to particular objects in your application (for example, tag all canvas\
    \ items that are part of the robot with id #37 with the tag \"robot37\"). With\
    \ tags, you don't have to keep track of the ids of canvas items to refer to groups\
    \ of items later; tags let Tk do that for you.\n\nYou can assign tags when creating\
    \ an item using the `tags` item configuration option. You can add tags later with\
    \ the `addtag` method, or remove them with the `dtags` method. You can get the\
    \ list of tags for an item with the `gettags` method, or return a list of item\
    \ id numbers having the given tag with the `find` command.\n\nFor example:\n\n\
    ```\n>>> c = Canvas(root)\n>>> c.create_line(10, 10, 20, 20, tags=('firstline',\
    \ 'drawing'))\n1\n>>> c.create_rectangle(30, 30, 40, 40, tags=('drawing'))\n2\n\
    >>> c.addtag('rectangle', 'withtag', 2)\n>>> c.addtag('polygon', 'withtag', 'rectangle')\n\
    >>> c.gettags(2)\n```"
  mdcn: "## 多边形\n\n多边形项目允许你通过一系列点来创建任意形状。其坐标指定方式与多点线相同。Tk 会确保多边形是“闭合”的，如有需要会将最后一个点与第一个点连接起来。与椭圆和矩形一样，它们可以拥有独立的\
    \ `fill`（填充）和 `outline`（轮廓）颜色。它们还支持线条项目的 `joinstyle`（连接样式）、`smooth`（平滑）和 `splinesteps`（样条步数）属性。\n\
    \n```\ncanvas.create_polygon(10, 10, 200, 50, 90, 150, 50, 80, 120,\n55, fill='red',\
    \ outline='blue')\n```\n\n## 弧形\n\n弧形项目绘制椭圆的一部分；可以想象成饼图中的一块。其显示由三个属性控制：\n\n- `start`：弧形在椭圆上开始的位置，以度为单位（0\
    \ 是3点钟方向）\n- `extent`：弧形的“宽度”度数，正值表示从起点逆时针方向，负值表示顺时针方向\n- `style`：可以是 `pieslice`（默认值，扇形）、`arc`（仅绘制外轮廓）或\
    \ `chord`（绘制连接弧形起点和终点的直线与外轮廓之间的区域）。\n\n```\ncanvas.create_arc(10, 10, 200, 150,\
    \ fill='yellow',\noutline='black', start=45, extent=135, width=5)\n```\n\n## 图像\n\
    \n图像项目可以显示任意图像。默认情况下，项目以你指定的坐标为中心，但可以通过 `anchor` 选项更改，例如 `nw` 表示坐标是放置图像左上角的位置。\n\
    \n```\nmyimg = PhotoImage(file='pretty.png')\ncanvas.create_image(10, 10, image=myimg,\
    \ anchor='nw')\n```\n\n还有一种 `bitmap`（位图）项目类型，用于只有两种颜色的图像，可以通过 `foreground`（前景）和\
    \ `background`（背景）更改颜色。这在当今并不常用。\n\n## 文本\n\n文本项目可以显示一段文本。文本的定位方式与图像项目相同。使用 `text`\
    \ 属性指定要显示的文本。项目中的所有文本将具有相同的颜色（由 `fill` 属性指定）和相同的字体（由 `font` 属性指定）。\n\n如果在文本中嵌入\
    \ `\\n`，文本项目可以显示多行文本。或者，你可以通过提供 `width` 属性（表示一行的最大宽度）让项目自动换行。多行文本的对齐方式可以使用 `justify`\
    \ 属性设置，该属性可以是 `left`（默认值）、`right` 或 `center`。\n\n```\ncanvas.create_oval(100,\
    \ 100, text='A wonderful story',\nanchor='nw', font='TkMenuFont', fill='red')\n\
    ```\n\n## 控件\n\n使用画布控件可以做的最酷的事情之一是将*其他控件*嵌入其中。这可以是一个简单的按钮、一个输入框（想象一下文本项目的就地编辑）、一个列表框、一个本身包含复杂控件集的框架……任何东西！还记得我们很久以前说过画布控件可以充当几何管理器吗？这就是我们的意思。\n\
    \n显示其他控件的画布项目被称为 *window*（窗口）项目（Tk 对控件的长期术语）。它们的定位方式与文本和图像项目相同。你可以为它们指定明确的 `width`\
    \ 和 `height` 属性；它们默认为控件的首选大小。最后，重要的是，你放置在画布上的控件（通过 `window` 属性）必须是画布的子控件。\n\n\
    ```\nb = ttk.Button(canvas, text='Implode!')\ncanvas.create_image(10, 10, anchor='nw',\
    \ window=b)\n```\n\n## 修改项目\n\n我们已经了解了如何修改项目上的配置选项——它的颜色、宽度等。你还可以对项目进行其他几种操作。\n\
    \n要删除项目，请使用 `delete` 方法。\n\n要更改项目的大小和位置，可以使用 `coords` 方法。你为项目提供新的坐标，指定方式与首次创建时相同。在不提供新坐标集的情况下调用此方法将返回项目的当前坐标。要将一个或多个项目从当前位置移动特定的水平或垂直距离，可以使用\
    \ `move` 方法。\n\n所有项目都按照所谓的堆叠顺序从上到下排列。如果堆叠顺序中靠后的项目与其下方的项目重叠，第一个项目将绘制在第二个项目之上。`lift`\
    \ 和 `lower` 方法允许你调整项目在堆叠顺序中的位置。\n\n参考手册中详细介绍了更多操作。它们描述了修改项目和检索有关项目信息的更多方法。\n\n\
    ## 14.2. 事件绑定\n\n我们已经看到，整个画布控件，就像任何其他 Tk 控件一样，可以使用 `bind` 命令捕获事件。\n你还可以将绑定附加到画布中的单个项目（或它们的组，我们将在下一节中使用标签看到）。因此，如果你想知道某个特定项目是否被点击，你不需要监视整个画布的鼠标点击事件，然后弄清楚该点击是否发生在你的项目上。Tk\
    \ 会为你处理所有这些。\n要捕获这些事件，你需要使用画布内置的 bind 命令。它的工作方式与常规 bind 命令完全相同，接受一个事件模式和一个回调函数。唯一的区别是你需要指定此绑定适用的画布项目。\n\
    \n```\ncanvas.tag_bind(id, '<1>', ...)\n```\n\n> 注意特定于项目的 `tag_bind` 方法与控件级别的\
    \ `bind` 方法之间的区别。\n\n让我们在草图板示例中添加一些代码，以允许更改绘图颜色。我们将首先创建几个不同的矩形项目，每个项目填充不同的颜色。然后我们将为每个项目附加一个绑定。当它们被点击时，它们会将一个全局变量设置为新的绘图颜色。我们的鼠标移动绑定在创建线段时会查看该变量。\n\
    \n```\ncolor = \"black\"\ndef setColor(newcolor):\n    global color\n    color\
    \ = newcolor\n\ndef addLine(event):\n    global lastx, lasty\n    canvas.create_line((lastx,\
    \ lasty, event.x, event.y),\n        fill=color)\n    lastx, lasty = event.x,\
    \ event.y\n```\n\n```\nid = canvas.create_rectangle((10, 10, 30, 30), fill=\"\
    red\")\ncanvas.tag_bind(id, \"<Button-1>\", lambda x: setColor(\"red\"))\nid =\
    \ canvas.create_rectangle((10, 35, 30, 55), fill=\"blue\")\ncanvas.tag_bind(id,\
    \ \"<Button-1>\", lambda x: setColor(\"blue\"))\nid = canvas.create_rectangle((10,\
    \ 60, 30, 80), fill=\"black\")\ncanvas.tag_bind(id, \"<Button-1>\", lambda x:\n\
    setColor(\"black\"))\n```\n\n[https://tkdocs.com/code/sketch2.py](https://tkdocs.com/code/sketch2.py)\n\
    \n## 14.3. 标签\n\n我们已经看到每个画布项目都有一个唯一的 id 号，但还有另一种非常有用且强大的方式来引用画布上的项目，那就是使用 *tags*（标签）。\n\
    \n标签只是你创建的一个标识符，对你的程序有意义。你可以将标签附加到画布项目；每个项目可以有任意数量的标签。与每个项目唯一的 id 号不同，许多项目可以拥有相同的标签。\n\
    \n标签能做什么？我们看到你可以使用项目 id 来修改画布项目（我们很快会看到你还可以对项目进行其他操作，比如移动它们、删除它们等）。任何可以使用项目 id\
    \ 的地方，你都可以使用标签。例如，你可以更改所有具有特定标签的项目的颜色。\n\n标签是识别画布中某些类型项目的好方法（属于绘制线条的项目、属于调色板的项目等）。你可以使用标签将画布项目与应用程序中的特定对象关联起来（例如，将属于\
    \ id 为 #37 的机器人的所有画布项目标记为 \"robot37\"）。使用标签，你不必跟踪画布项目的 id 来以后引用项目组；标签让 Tk 为你做这件事。\n\
    \n你可以在使用 `tags` 项目配置选项创建项目时分配标签。你可以稍后使用 `addtag` 方法添加标签，或使用 `dtags` 方法删除它们。你可以使用\
    \ `gettags` 方法获取项目的标签列表，或使用 `find` 命令返回具有给定标签的项目 id 号列表。\n\n例如：\n\n```\n>>> c\
    \ = Canvas(root)\n>>> c.create_line(10, 10, 20, 20, tags=('firstline', 'drawing'))\n\
    1\n>>> c.create_rectangle(30, 30, 40, 40, tags=('drawing'))\n2\n>>> c.addtag('rectangle',\
    \ 'withtag', 2)\n>>> c.addtag('polygon', 'withtag', 'rectangle')\n>>> c.gettags(2)\n\
    ```"
