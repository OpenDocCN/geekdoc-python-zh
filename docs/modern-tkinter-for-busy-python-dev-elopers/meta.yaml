- md: "## 9.1. Blocking the Event Loop\n\nWhere you run into problems is when the\
    \ event loop is prevented from processing events for a lengthy period of time.\
    \ Your application won't redraw or respond to events and will appear to be frozen.\
    \ The event loop is said to be *blocked*. How can this happen?\n\nLet's start\
    \ by visualizing the event loop as an execution timeline. In a normal situation,\
    \ each deviation from the event loop (callback, screen update) takes only a fraction\
    \ of a second before returning control to the event loop.\n\n![](img/e444c319ec16222f00278651bee8c21d_132_0.png)\n\
    \nIn our scenario, the whole thing probably got started from an event like a user\
    \ pressing a button. So the event loop calls our application code to handle the\
    \ event. Our code creates the progressbar, performs the (lengthy) operations,\
    \ and stops the progressbar. Only then does our code return control back to the\
    \ event loop. No events have been processed in the meantime. No screen redrawing\
    \ has occurred. They've just been piling up in the event queue.\n\n![](img/e444c319ec16222f00278651bee8c21d_133_0.png)\n\
    \n*Lengthy callback blocking the event loop.*\n\nTo prevent blocking the event\
    \ loop, it's essential that event handlers execute quickly and return control\
    \ back to the event loop.\n\nIf you do have a long-running operation to perform,\
    \ or anything like network I/O that could potentially take a long time, there\
    \ are a few different approaches you can take.\n\n> For the more technically-inclined,\
    \ Tk uses a single-threaded, event-driven programming model. All the GUI code,\
    \ the event loop, and your application run within the same thread. Because of\
    \ this, any calls or computations that block event handlers are highly discouraged.\
    \ Some other GUI toolkits use different models that allow for blocking code, runs\
    \ the GUI and event handlers in separate threads from application code, etc. Attempting\
    \ to shoehorn these models into Tk can be a recipe for frustration and lead to\
    \ fragile and hacky code. If you respect Tk's model rather than try to fight with\
    \ it, you won't run into problems.\n\n## 9.2. One Step at a Time\n\nIf possible,\
    \ the very best thing you can do is break your operation into very small steps,\
    \ each of which can execute very quickly. You let the event loop be responsible\
    \ for when the next step occurs. That way, the event loop continues to run, processing\
    \ regular events, updating the screen, and, in between all that, calling your\
    \ code to perform the next step of the operation.\n\nTo do this, we make use of\
    \ *timer events*. Our program can ask the event loop to generate one of these\
    \ events at some time in the future. As part of its regular work, when the event\
    \ loop reaches that time, it will call back into our code to handle the event.\
    \ Our code would perform the next step of the operation. It then schedules another\
    \ timer event for the *next* step of the operation and immediately returns control\
    \ back to the event loop.\n\n![](img/e444c319ec16222f00278651bee8c21d_134_0.png)\n\
    \n*Breaking up a large operation into small steps tied together with timer events.*\n\
    \nTk's `after` command can be used to generate timer events. You provide the number\
    \ of milliseconds to wait until the event should be fired. It may happen later\
    \ than that if Tk is busy processing other events but won't happen before that.\
    \ You can also ask that an `idle` event be generated; it will fire when no other\
    \ events in the queue need to be processed. (Tk's screen updates and redraws occur\
    \ in the context of idle events.) You can find more details on `after` in the\
    \ [reference manual](https://tkdocs.com/man/after).\n\nhttps://tkdocs.com/man/after\n\
    \nIn the following example, we'll perform a long operation that is broken up into\
    \ 20 small steps. While this operation is being performed, we'll update a progressbar,\
    \ and also allow users to interrupt the operation.\n\n```\ndef start():\n    b.configure(text='Stop',\
    \ command=stop)\n    l['text'] = 'Working...'\n    global interrupt; interrupt\
    \ = False\n    root.after(1, step)\n\ndef stop():\n    global interrupt; interrupt\
    \ = True\n\ndef step(count=0):\n    p['value'] = count\n    if interrupt:\n  \
    \      result(None)\n        return\n    root.after(100)  # next step in our operation;\
    \ don't take too long!\n    if count == 20:  # done!\n        result(42)\n   \
    \     return\n    root.after(1, lambda: step(count+1))\n\ndef result(answer):\n\
    \    p['value'] = 0\n    b.configure(text='Start!', command=start)\n    l['text']\
    \ = \"Answer: \" + str(answer) if answer else \"No Answer\"\n\nf = ttk.Frame(root);\
    \ f.grid()\nb = ttk.Button(f, text=\"Start!\", command=start);\nb.grid(column=1,\
    \ row=0, padx=5, pady=5)\nl = ttk.Label(f, text=\"No Answer\"); l.grid(column=0,\
    \ row=0, padx=5, pady=5)\np = ttk.Progressbar(f, orient=\"horizontal\", mode=\"\
    determinate\", maximum=20);\np.grid(column=0, row=1, padx=5, pady=5)\n```\n\n\
    https://tkdocs.com/code/longrunning.py\n\n> To interrupt the process, we've just\
    \ set a global variable, which is checked next time the timer event fires. Another\
    \ option would be to cancel the pending timer event. When we create the timer\
    \ event, it returns an id number to uniquely identify the pending timer. To cancel\
    \ it, we can call the `after_cancel` method, passing it that unique id.\n\nYou'll\
    \ also note that we used a blocking form of `after` to simulate performing our\
    \ operation. Rather than scheduling an event to occur in future, the call blocks,\
    \ waiting a given time before returning. It works the same as a `sleep` system\
    \ call.\n\n## 9.3. Asynchronous I/O\n\nTimer events take care of breaking up a\
    \ long-running computation, where you know that each step can be guaranteed to\
    \ complete quickly so that your handler will return to the event loop. What if\
    \ you have an operation that may not complete quickly? This can happen when you\
    \ make a variety of calls to the operating system. The most common is when we're\
    \ doing some kind of I/O, whether writing a file, communicating with a database,\
    \ or retrieving data from a remote web server.\n\nMost I/O calls are *blocking*.\
    \ They don't return until the operation completes (or fails). What we want to\
    \ use instead are *non-blocking* or *asynchronous* I/O calls. When you make an\
    \ asynchronous I/O call, it returns immediately, before the operation is completed.\
    \ Your code can continue running, or in this case, return back to the event loop.\
    \ Later on, when the I/O operation completes, your program is notified and can\
    \ process the result of the I/O operation.\n\nIf this sounds like treating I/O\
    \ as another type of event, you're exactly right. In fact, it's also called *event-driven\
    \ I/O*.\n\nIn Python, asynchronous I/O is provided through the `asyncio` module,\
    \ as well as many other modules that are layered on top of it.\n\nAll asyncio\
    \ applications rely heavily on an event loop. How convenient, Tkinter has a great\
    \ event loop! Unfortunately, the asyncio event loop and the Tkinter event loop\
    \ are not the same. You can't really have both of them running at the same time,\
    \ at least within the same thread (well, you can have one call repeatedly into\
    \ the other, but it's pretty hacky and fragile).\n\nMy recommendation: keep Tkinter\
    \ in the main thread, and spin off your asyncio event loops in another thread.\n\
    \nYour application code, running in the main thread, may need to coordinate with\
    \ the asyncio event loop running in the other thread. You can call a function\
    \ running in the asyncio event loop thread (even from the Tkinter event loop,\
    \ e.g., in a widget callback) using the asyncio `call_soon_threadsafe` method.\
    \ To call Tkinter from the asyncio event loop, keep reading.\n\n## 9.4. Threads\
    \ or Processes\n\nSometimes it's either not possible or practical to break up\
    \ a long-running computation into discrete pieces that each run quickly. Or you\
    \ may be using a library that doesn't support asynchronous operations. Or, like\
    \ Python's `asyncio`, it doesn't play nice with Tk's event loop. In cases like\
    \ these, to keep your Tk GUI responsive, you'll need to move those time-consuming\
    \ operations or library calls out of your event handlers and run them somewhere\
    \ else. Threads, or even other processes, can help with that.\n\nRunning tasks\
    \ in threads, communicating with them, etc. is beyond the scope of this book.\
    \ However, there are some restrictions on using Tk with threads that you should\
    \ be aware of. The main rule is that you must only make Tk calls from the thread\
    \ where you loaded Tk.\n\nTkinter goes to great lengths internally so you make\
    \ Tkinter calls from multiple threads. It routes them to the main thread (the\
    \ one that created the Tk instance). It mostly works, but not always. Despite\
    \ all it tries to do, I highly recommend you make all Tkinter calls from a single\
    \ thread.\n\nIf you need to communicate from another thread to the thread running\
    \ Tkinter, keep it as simple as possible. Use `event_generate` to post a virtual\
    \ event to the Tkinter event queue, and then `bind` to that event in your code.\n\
    \nIt can be even more complicated. The Tcl/Tk libraries can be built either with\
    \ or without thread support. If you have more than one thread in your application,\
    \ make sure you're running in a threaded build. If you're unsure, check the Tcl\
    \ variable `tcl_platform(threaded)`; it should be 1, not 0.\n\n```\n>>> tkinter.Tcl().eval('\
    \ set tcl_platform(threaded)' )\n```\n\n> Most everyone should be running threaded\
    \ builds. The ability to create non-threaded builds in Tcl/Tk is likely to go\
    \ away in future. If you're using a non-threaded build with threaded code, consider\
    \ this a bug in your application, not a challenge to make it work."
  mdcn: "## 9.1. 阻塞事件循环\n\n当事件循环在长时间内无法处理事件时，就会出现问题。你的应用程序将不会重绘或响应事件，并且看起来像是冻结了。这种情况被称为事件循环被*阻塞*。这会如何发生呢？\n\
    \n让我们首先将事件循环可视化为一个执行时间线。在正常情况下，每次偏离事件循环（回调、屏幕更新）的操作只占用一小部分时间，然后就会将控制权交还给事件循环。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_132_0.png)\n\n在我们的场景中，整个过程可能始于一个事件，比如用户按下按钮。因此，事件循环调用我们的应用程序代码来处理该事件。我们的代码创建进度条，执行（耗时的）操作，然后停止进度条。只有在那时，我们的代码才会将控制权交还给事件循环。在此期间，没有事件被处理，也没有屏幕重绘发生。它们只是在事件队列中不断堆积。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_133_0.png)\n\n*耗时的回调阻塞了事件循环。*\n\n为了防止阻塞事件循环，事件处理程序必须快速执行并将控制权交还给事件循环，这一点至关重要。\n\
    \n如果你确实有一个长时间运行的操作需要执行，或者任何可能耗时很长的网络 I/O 操作，你可以采取几种不同的方法。\n\n> 对于技术倾向更强的读者，Tk\
    \ 使用单线程、事件驱动的编程模型。所有 GUI 代码、事件循环和你的应用程序都在同一个线程中运行。因此，任何阻塞事件处理程序的调用或计算都是极不推荐的。一些其他的\
    \ GUI 工具包使用不同的模型，允许阻塞代码、在单独的线程中运行 GUI 和事件处理程序（与应用程序代码分离）等。试图将这些模型强行套用到 Tk 中，可能会导致挫败感，并产生脆弱和\
    \ hacky 的代码。如果你尊重 Tk 的模型，而不是试图与之对抗，你就不会遇到问题。\n\n## 9.2. 一次一小步\n\n如果可能，你能做的最好的事情就是将你的操作分解成非常小的步骤，每个步骤都能非常快速地执行。你让事件循环负责决定下一步何时发生。这样，事件循环就能继续运行，处理常规事件，更新屏幕，并在所有这些操作之间，调用你的代码来执行操作的下一步。\n\
    \n为此，我们使用*定时器事件*。我们的程序可以要求事件循环在未来某个时间生成一个这样的事件。作为其常规工作的一部分，当事件循环到达那个时间点时，它会回调我们的代码来处理该事件。我们的代码将执行操作的下一步。然后，它为操作的*下一步*安排另一个定时器事件，并立即将控制权交还给事件循环。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_134_0.png)\n\n*将一个大操作分解成小步骤，并用定时器事件连接起来。*\n\
    \nTk 的 `after` 命令可用于生成定时器事件。你提供等待事件触发的毫秒数。如果 Tk 正忙于处理其他事件，它可能会晚于这个时间发生，但不会早于这个时间。你也可以要求生成一个\
    \ `idle` 事件；它会在事件队列中没有其他事件需要处理时触发。（Tk 的屏幕更新和重绘发生在空闲事件的上下文中。）你可以在[参考手册](https://tkdocs.com/man/after)中找到更多关于\
    \ `after` 的细节。\n\nhttps://tkdocs.com/man/after\n\n在下面的例子中，我们将执行一个被分解成 20 个小步骤的长时间操作。在执行此操作的同时，我们将更新一个进度条，并允许用户中断该操作。\n\
    \n```\ndef start():\n    b.configure(text='Stop', command=stop)\n    l['text']\
    \ = 'Working...'\n    global interrupt; interrupt = False\n    root.after(1, step)\n\
    \ndef stop():\n    global interrupt; interrupt = True\n\ndef step(count=0):\n\
    \    p['value'] = count\n    if interrupt:\n        result(None)\n        return\n\
    \    root.after(100)  # next step in our operation; don't take too long!\n   \
    \ if count == 20:  # done!\n        result(42)\n        return\n    root.after(1,\
    \ lambda: step(count+1))\n\ndef result(answer):\n    p['value'] = 0\n    b.configure(text='Start!',\
    \ command=start)\n    l['text'] = \"Answer: \" + str(answer) if answer else \"\
    No Answer\"\n\nf = ttk.Frame(root); f.grid()\nb = ttk.Button(f, text=\"Start!\"\
    , command=start);\nb.grid(column=1, row=0, padx=5, pady=5)\nl = ttk.Label(f, text=\"\
    No Answer\"); l.grid(column=0, row=0, padx=5, pady=5)\np = ttk.Progressbar(f,\
    \ orient=\"horizontal\", mode=\"determinate\", maximum=20);\np.grid(column=0,\
    \ row=1, padx=5, pady=5)\n```\n\nhttps://tkdocs.com/code/longrunning.py\n\n> 为了中断这个过程，我们只是设置了一个全局变量，该变量在下次定时器事件触发时会被检查。另一个选择是取消待处理的定时器事件。当我们创建定时器事件时，它会返回一个\
    \ id 号来唯一标识待处理的定时器。要取消它，我们可以调用 `after_cancel` 方法，并传入该唯一 id。\n\n你还会注意到，我们使用了 `after`\
    \ 的阻塞形式来模拟执行我们的操作。该调用会阻塞，等待给定的时间后返回，而不是安排一个在未来发生的事件。它的工作方式与 `sleep` 系统调用相同。\n\n\
    ## 9.3. 异步 I/O\n\n定时器事件负责分解长时间运行的计算，其中你知道每个步骤都可以保证快速完成，以便你的处理程序能够返回到事件循环。如果你有一个可能无法快速完成的操作呢？当你进行各种操作系统调用时，就可能发生这种情况。最常见的是当我们进行某种\
    \ I/O 操作时，无论是写入文件、与数据库通信，还是从远程 Web 服务器检索数据。\n\n大多数 I/O 调用是*阻塞*的。它们在操作完成（或失败）之前不会返回。我们想要使用的是*非阻塞*或*异步*\
    \ I/O 调用。当你进行异步 I/O 调用时，它会在操作完成之前立即返回。你的代码可以继续运行，或者在这种情况下，返回到事件循环。稍后，当 I/O 操作完成时，你的程序会收到通知，并可以处理\
    \ I/O 操作的结果。\n\n如果这听起来像是将 I/O 视为另一种类型的事件，那你就完全正确了。事实上，它也被称为*事件驱动 I/O*。\n\n在 Python\
    \ 中，异步 I/O 是通过 `asyncio` 模块以及许多在其之上构建的其他模块提供的。\n\n所有 asyncio 应用程序都严重依赖事件循环。多么方便，Tkinter\
    \ 有一个很棒的事件循环！不幸的是，asyncio 事件循环和 Tkinter 事件循环并不相同。你不能真正让它们同时运行，至少在同一个线程内不行（嗯，你可以让一个反复调用另一个，但这相当\
    \ hacky 且脆弱）。\n\n我的建议是：将 Tkinter 保持在主线程中，并在另一个线程中启动你的 asyncio 事件循环。\n\n你的应用程序代码在主线程中运行，可能需要与在另一个线程中运行的\
    \ asyncio 事件循环进行协调。你可以使用 asyncio 的 `call_soon_threadsafe` 方法来调用在 asyncio 事件循环线程中运行的函数（即使是从\
    \ Tkinter 事件循环中调用，例如在 widget 回调中）。要从 asyncio 事件循环调用 Tkinter，请继续阅读。\n\n## 9.4.\
    \ 线程或进程\n\n有时，将长时间运行的计算分解成每个都能快速运行的离散部分是不可能的或不切实际的。或者你可能正在使用一个不支持异步操作的库。或者，像 Python\
    \ 的 `asyncio` 一样，它与 Tk 的事件循环配合得不好。在这些情况下，为了保持你的 Tk GUI 响应，你需要将那些耗时的操作或库调用从你的事件处理程序中移出，并在其他地方运行它们。线程，甚至其他进程，可以提供帮助。\n\
    \n在线程中运行任务、与它们通信等超出了本书的范围。然而，在使用 Tk 与线程时，你应该注意一些限制。主要规则是，你必须只从加载 Tk 的线程进行 Tk 调用。\n\
    \nTkinter 在内部做了大量工作，以便你可以从多个线程进行 Tkinter 调用。它将这些调用路由到主线程（创建 Tk 实例的那个线程）。它大部分情况下都能工作，但并非总是如此。尽管它尽力而为，但我强烈建议你从单个线程进行所有\
    \ Tkinter 调用。\n\n如果你需要从另一个线程与运行 Tkinter 的线程进行通信，请尽可能保持简单。使用 `event_generate` 将一个虚拟事件发布到\
    \ Tkinter 事件队列，然后在你的代码中 `bind` 到该事件。\n\n情况可能更加复杂。Tcl/Tk 库可以构建为支持线程或不支持线程。如果你的应用程序中有多个线程，请确保你运行的是线程构建版本。如果你不确定，请检查\
    \ Tcl 变量 `tcl_platform(threaded)`；它应该是 1，而不是 0。\n\n```\n>>> tkinter.Tcl().eval('\
    \ set tcl_platform(threaded)' )\n```\n\n> 大多数人都应该运行线程构建版本。在 Tcl/Tk 中创建非线程构建版本的能力在未来可能会消失。如果你在使用线程代码时使用了非线程构建版本，请将此视为你应用程序中的一个\
    \ bug，而不是一个需要解决的挑战。"
