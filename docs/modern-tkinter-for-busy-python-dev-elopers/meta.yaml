    5. *After* you have done all this, you can *then* attach the menubar to your window
    via the window''s `menu` configuration option.


    ```

    win = Toplevel(root)

    menubar = Menu(win)

    appmenu = Menu(menubar, name=''apple'')

    menubar.add_cascade(menu=appmenu)

    appmenu.add_command(label=''About My Application'')

    appmenu.add_separator()

    win[''menu''] = menubar

    ```


    > While usually, Tkinter chooses a widget pathname for us, we''ve had to explicitly
    provide one (`apple`) using the `name` option when creating the application menu.'
  - "[PAGE 155]\n\n# Handling the Preferences Menu Item\n\nAs you've noticed, the\
    \ application menu always includes a \"Preferences...\" menu item. If your application\
    \ has a preferences dialog, this menu item should open it. If your application\
    \ has no preferences dialog, this menu item should be disabled, which it is by\
    \ default.\nTo hook up your preferences dialog, you'll need to define a Tcl procedure\
    \ named `::tk::mac::ShowPreferences`. This will be called when the Preferences\
    \ menu item is chosen; if the procedure is not defined, the menu item will be\
    \ disabled.\n\n```\ndef showMyPreferencesDialog():\n    ....\n\nroot.createcommand('tk::mac::ShowPreferences',\n\
    \    showMyPreferencesDialog)\n```\n\n# Providing a Help Menu\n\nLike the application\
    \ menu, any help menu you add to your own menubar is treated specially on macOS.\
    \ As with the application menu that needed a special name (`.apple`), the help\
    \ menu must be given the name `.help`. Also, like the application menu, the help\
    \ menu should also be added *before the menubar is attached to the window*.\n\
    The help menu will include the standard macOS search box to search help, as well\
