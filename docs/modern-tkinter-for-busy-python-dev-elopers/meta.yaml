  md: '# 14. Canvas


    Canvas

    https://tkdocs.com/man/canvas


    A **canvas** widget manages a 2D collection of graphical objects — lines, circles,
    text, images, other widgets, and more. Tk''s canvas is an incredibly powerful
    and flexible widget, and truly one of Tk''s highlights. It is suitable for a wide
    range of uses, including drawing or diagramming, CAD tools, displaying or monitoring
    simulations or actual equipment, and building more complex widgets out of simpler
    ones.


    Note: Canvas widgets are part of the classic Tk widgets, not the themed Tk widgets.


    ![](img/e444c319ec16222f00278651bee8c21d_198_0.png)'
  merge: -1
  pgno: 198
- img_proc: true
  md: 'Canvas widgets are created using the `Canvas` class:


    ```

    canvas = Canvas(parent, width=500, height=400,

    background=''gray75'')

    ```


    You''ll often provide a width and height, either in pixels or any of the other
    standard distance units. As always, you can ask the geometry manager to expand
    it to fill the available space in the window. You might provide a default background
    color for the canvas, specifying colors in any of the ways you learned about in
    the last chapter. Canvas widgets also support other appearance options like `relief`
    and `borderwidth` that we''ve used before.


    Canvas widgets have a tremendous number of features, and we won''t cover everything
    here. Instead, we''ll start with a simple example, a freehand sketching tool,
    and incrementally add new pieces to it, each showing another new feature of canvas
    widgets.'
  merge: -1
  pgno: 199
- img_proc: true
  md: '# 14.1. Creating Items


    When you create a new canvas widget, it is essentially a large rectangle with
    nothing on it, truly a blank canvas in other words. To do anything useful with
    it, you''ll need to add *items* to it. There are a wide variety of different *types*
    of items you can add. Here, we''ll add a simple *line* item to the canvas.


    To create a line, you need to specify its starting and ending *coordinates*. Coordinates
    are expressed as the number of pixels away from the top-left corner, both horizontally
    and vertically, i.e. (x,y). The pixel at the top-left corner, known as the *origin*,
    has coordinates (0,0). The "x" value increases as you move to the right and the
    "y" value increases as you move down. A line is described by two points, which
    we''d refer to as (x0,y0) and (x1,y1). This code creates a line from (10,5) to
    (200,50):


    ```

    canvas.create_line(10, 5, 200, 50)

    ```


    The `create_line` method returns an item *id* (an integer) that uniquely refers
    to this item. We''ll see how it can be used shortly. Often, we don''t need to
    refer to the item later and can ignore the returned id.


    # A Simple Sketchpad


    Let''s start our simple sketchpad example. For now, we''ll implement freehand
    drawing on the canvas with the mouse. We create a canvas widget and attach event
    bindings to it to capture mouse clicks and drags. When the mouse is first pressed,
    we''ll remember that location as the "start" coordinates of our next line. As
    the mouse is moved with the mouse button held down, we create a line item from
    this "start" position to the current mouse location. This current location becomes
    the "start" position for the next line item. Every mouse drag creates a new line
    item.'
  merge: -1
  pgno: 200
