    primary monitor. So in our side-by-side FHD monitor setup, if you call the `winfo_x`
    method on a window positioned near the left edge of a monitor, it might return
    `100` (if it''s on the primary monitor), `-1820` (if it''s on a monitor to the
    left of the primary monitor), or `2020` (if it''s on a monitor to the right of
    the primary monitor). You can still use the `geometry` method we saw a bit earlier
    to position the window on a different monitor, even though the geometry specification
    may look a bit odd, e.g., `+-1820+100`.


    You can find out approximately how large the entire display is, spanning multiple
    monitors. To do so, check a toplevel widget''s maximum size, i.e., how large the
    user can resize it (you can''t do this after you''ve already changed it, of course).
    This may be a bit smaller than the full size of the display. For example, on macOS,
    it will be reduced by the size of the menubar at the top of the screen.


