  md: "While the system font dialog is modal on some platforms, e.g., Windows, that's\
    \ not the case everywhere. On macOS, the system font chooser works more like a\
    \ floating tool palette in a drawing program, remaining available to change the\
    \ font for whatever text is selected in your main application window. The Tk font\
    \ dialog API has to accommodate both models. To do so, it uses callbacks (and\
    \ virtual events) to notify your application of font changes. Additional details\
    \ can be found in the [fontchooser](https://tkdocs.com/man/fontchooser) reference\
    \ manual pages.\n\nTo use the font dialog, first provide it with an initial font\
    \ and a callback which will be invoked when a font is chosen. For illustration,\
    \ we'll have the callback change the font on a label.\n\n```\nl = ttk.Label(root,\
    \ text=\"Hello World\", font=\"helvetica 24\")\nl.grid(padx=10, pady=10)\n\ndef\
    \ font_changed(font):\n    l['font'] = font\n\nroot.tk.call('tk', 'fontchooser',\
    \ 'configure', '-font',\n    'helvetica 24', '-command', root.register(font_changed))\n\
    root.tk.call('tk', 'fontchooser', 'show')\n```\n\nTkinter has not yet added a\
    \ convenient way to use this new dialog, so this example code uses the Tcl API\
    \ directly. You can see the latest work towards a proper Python API and download\
    \ code at [bugs.python.org/issue28694](https://bugs.python.org/issue28694).\n\n\
    > You can query or change the font that is (or will be) displayed in the dialog\
    \ at any time.\n\nNext, put the dialog onscreen via the `show` method. On platforms\
    \ where the font dialog is modal, your program will block at this point until\
    \ the dialog is dismissed. On other platforms, `show` returns immediately; the\
    \ dialog remains onscreen while your program continues. At this point, a font\
    \ has not been chosen. There's also a `hide` method to remove it from the screen\
    \ (not terribly useful when the font dialog is modal)."
