- md: "a very thin (and not terribly Pythonic) front end to Tcl's [trace](https://tkdocs.com/man/trace)\
    \ command.\n\n[https://tkdocs.com/man/trace](https://tkdocs.com/man/trace)\n\n\
    ## Passwords\n\nEntries can be used for passwords, where the actual contents are\
    \ displayed as a bullet or other symbol. To do this, set the `show` configuration\
    \ option to the character you'd like to display.\n\n```\npasswd = ttk.Entry(parent,\
    \ textvariable=password, show=\"*\")\n```\n\n## Widget States\n\nLike the various\
    \ buttons, entries can also be put into a disabled state via the `state` command\
    \ (and queried with `instate`). Entries can also use the state flag `readonly`;\
    \ if set, users cannot change the entry, though they can still select the text\
    \ in it (and copy it to the clipboard). There is also an `invalid` state, set\
    \ if the entry widget fails validation, which leads us to...\n\n## Validation\n\
    \nUsers can type any text they like into an entry widget. However, if you'd like\
    \ to restrict what they can type into the entry, you can do so with *validation*.\
    \ For example, an entry might only accept an integer or a valid zip or postal\
    \ code.\n\nYour program can specify what makes an entry valid or invalid, as well\
    \ as when to check its validity. As we'll see soon, the two are related. We'll\
    \ start with a simple example, an entry that can only hold an integer up to five\
    \ digits long.\n\nThe validation criteria is specified via an entry's `validatecommand`\
    \ configuration option. You supply a piece of code whose job is to validate the\
    \ entry. It functions like a widget callback or event binding, except that it\
    \ returns a value (whether or not the entry is valid). We'll arrange to validate\
    \ the entry on any keystroke, which is specified by providing a value of `key`\
    \ to the `validate` configuration option.\n\n```\nimport re\ndef check_num(newval):\n\
    \    return re.match('^[0-9]*$', newval) is not None and len(newval) <= 5\ncheck_num_wrapper\
    \ = (root.register(check_num), '%P')\n\nnum = StringVar()\ne = ttk.Entry(root,\
    \ textvariable=num, validate='key',\n              validatecommand=check_num_wrapper)\n\
    e.grid(column=0, row=0, sticky='we')\n```\n\n[https://tkdocs.com/code/numvalidate.py](https://tkdocs.com/code/numvalidate.py)\n\
    \nA few things are worth noting. First, as with event bindings, we can access\
    \ more information about the conditions that triggered the validation via *percent\
    \ substitutions*. We used one of these here: `%P` is the new value of the entry\
    \ *if* the validation passes. We'll use a simple regular expression and a length\
    \ check to determine if the change is valid. To reject the change, our validation\
    \ command can return a false value, and the entry will remain unchanged.\n\nTaking\
    \ advantage of these percent substitutions requires a bit of gymnastics. You'll\
    \ recall that Tkinter abstracts away percent substitutions in event binding callbacks.\
    \ There, all of the event parameters are wrapped into an event object which is\
    \ always passed to the callback. There's not an equivalent abstraction for validation\
    \ callbacks. Instead, we have to choose which percent substitutions we're interested\
    \ in. The `register` method (which can be called on any widget, not just `root`)\
    \ creates a Tcl procedure which will call our Python function. The percent substitutions\
    \ we've chosen will be passed to it as parameters.\n\nLet's extend our example\
    \ so that the entry will accept a US zip code, formatted as \"#####\" or \"#####-####\"\
    \ (\"#\" can be any digit). We'll still do some validation on each keystroke (only\
    \ allowing entry of numbers or a hyphen). However, we can no longer fully validate\
    \ the entry on every keystroke; if they've just typed the first digit, it's not\
    \ valid yet. So full validation will only happen when the entry loses focus (e.g.,\
    \ a user tabs away from it). Tk refers to this as revalidation, in contrast with\
    \ prevalidation (accepting changes on each keystroke).\n\nHow should we respond\
    \ to errors? Let's add a message reminding users of the format. It will appear\
    \ if they type a wrong key or tab away from the entry when it's not holding a\
    \ valid zip code. We'll remove the message when they return to the entry or type\
    \ a valid key. We'll also add a (dummy) button to \"process\" the zip code, which\
    \ will be disabled unless the zip entry is valid. Finally, we'll also add a \"\
    name\" entry so you can tab away from the zip entry.\n\n```\nimport re\nerrmsg\
    \ = StringVar()\nformatmsg = \"Zip should be ##### or #####-####\"\n\ndef check_zip(newval,\
    \ op):\n    errmsg.set('')\n    valid = re.match('^[0-9]{5}(\\-[0-9]{4})?$', newval)\
    \ is not None\n    btn.state(['!disabled'] if valid else ['disabled'])\n    if\
