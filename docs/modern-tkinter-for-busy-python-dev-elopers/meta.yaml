    There are several other callbacks that you can define. For example, you might
    intercept the Quit menu item, prompting users to save their changes before quitting.
    Here is the complete list:


    `tk::mac::ShowPreferences`:

    Called when the "Preferences..." menu item is selected.'
  - '[PAGE 157]


    tk::mac::ShowHelp:

    Called to display main online help for the application.

    tk::mac::Quit:

    Called when the Quit menu item is selected, when a user is trying to shut down
    the system etc.

    tk::mac::OnHide:

    Called when your application has been hidden.

    tk::mac::OnShow:

    Called when your application is shown after being hidden.

    tk::mac::OpenApplication:

    Called when your application is first opened.

    tk::mac::ReopenApplication:

    Called when a user "reopens" your already-running application (e.g. clicks on
    it in the Dock)

    tk::mac::OpenDocument:

    Called when the Finder wants the application to open one or more documents (e.g.
    that were dropped on it). The procedure is passed a list of pathnames of files
    to be opened.

    tk::mac::PrintDocument:

    As with OpenDocument, but the documents should be printed rather than opened.


    For additional information, see the [tk_mac](https://tkdocs.com/man/tk_mac) command
    reference.


    # Windows


    On Windows, each window has a "System" menu at the top left of the window frame,
    with a small icon for your application. It contains items like "Close", "Minimize",
    etc. In Tk, if you create a system menu, you can add new items that will appear
    below the standard items.


    ```

    sysmenu = Menu(menubar, name=''system'')

    menubar.add_cascade(menu=sysmenu)

    ```


    > While usually, Tkinter will choose a widget pathname for us, we''ve had to explicitly
    provide one with the name `system`; this is the cue that Tk needs to recognize
    it as the system menu.'
