    e.g., to capture a mouse click anywhere in the text. Besides the normal low-level
    events, the text widget generates a `<<Modified>>` virtual event whenever a change
    is made to the content of the widget, and a `<<Selection>>` virtual event whenever
    there is a change made to which text is selected.'
  - '[PAGE 229]


    # 15.5. Selecting Text


    We can identify the range of text selected by a user, if any. For example, an
    editor may have a toolbar button to bold the selected text. While you can tell
    when the selection has changed (e.g., to update whether or not the bold button
    is active) via the `<<Selection>>` virtual event, that doesn''t tell you what
    has been selected.


    The text widget automatically maintains a tag named `sel`, which refers to the
    selected text. Whenever the selection changes, the `sel` tag will be updated.
    So we can find the range of text selected using the `tag_ranges ?tag?` method,
    passing it `sel` as the tag to report on.


    Similarly, we can change the selection by using `tag_add` to set a new selection,
    or `tag_remove` to remove the selection. The `sel` tag cannot be deleted, however.


    > Though the default widget bindings prevent this from happening, `sel` is like
    any other tag in that it can support multiple ranges, i.e., disjoint selections.
    To prevent this from happening, when changing the selection from your code, make
    sure to remove any old selection before adding a new one.


    The text widget manages the concept of the insertion cursor (where newly typed
    text will appear) separate from the selection. It does so using a new concept
    called a `mark`.'
  - '[PAGE 230]


    # 15.6. Marks


    Marks indicate a particular place in the text. In that respect, they are like
    indices. However, as the text is modified, the mark will adjust to be in the same
    relative location. In that way, they resemble tags, but refer to a single position
    rather than a range of text. Marks actually don''t refer to a position occupied
    by a character in the text but specify a position *between* two characters.


    Tk automatically maintains two different marks. The first, named `insert`, is
    the present location of the insertion cursor. As the cursor is moved (via mouse
    or keyboard), the mark moves with it. The second mark, named `current`, tracks
    the position of the character underneath the current mouse position.


    To create your own marks, use the widget''s `mark_set name idx` method, passing
    it the name of the mark and an index (the mark is positioned just before the character
    at the given index). This is also used to move an existing mark to a different
    position. Marks can be removed using the `mark_unset name` method, passing it
    the name of the mark. If you delete a range of text containing a mark, that also
    removes the mark.


    The name of a mark can also be used as an index (in the same way `1.0` or `end-1c`
    are indices). You can find the next mark (or previous one) from a given index
    in the text using the `mark_next idx` or `mark_previous idx` methods. The `mark_names`
    method will return a list of the names of all marks.


    Marks also have a *gravity*, which can be modified with the `mark_gravity name
    ?direction?` method, which affects what happens when text is inserted at the mark.
    Suppose we have the text "ac" with a mark in between that we''ll symbolize with
    a pipe, i.e., "a|c." If the gravity of that mark is `right` (the default), the
    mark attaches itself to the "c." If the new text "b" is inserted at the mark,
    the mark will remain stuck to the "c," and so the new text will be inserted before
    the mark, i.e., "ab|c." If the gravity is instead `left`, the mark attaches itself
    to the "a," and so new text will be inserted after the mark, i.e., "a|bc."'
  - '[PAGE 231]


    # 15.7. Images and Widgets


    Like canvas widgets, text widgets can contain not only text but also images and
    any other Tk widgets (including a frame, itself containing many other widgets).
    In a sense, this allows the text widget to work as a geometry manager in its own
    right. The ability to add images and widgets within the text opens up a world
    of possibilities for your program.


    Images are added to a text widget at a particular index, with the image specified
    as an existing Tk image. Other options that allow you to fine-tune padding, etc.


    ```

    flowers = PhotoImage(file=''flowers.gif'')

    text.image_create(''sel.first'', image=flowers)

    ```


    Other widgets are added to a text widget in much the same way as images. The widget
    being added must be a descendant of the text widget in the widget hierarchy.


    ```

    b = ttk.Button(text, text=''Push Me'')

    text.window_create(''1.0'', window=b)

    ```'
- md: '## 15.8. Even More


    Text widgets can do many more things. Here, we''ll briefly mention just a few
    more of them. For details on any of these, see the reference manual.


    ## Search


    The text widget includes a powerful `search` method that allows you to locate
    a piece of text within the widget. This is useful for a "Find" dialog, as one
    obvious example. You can search backward or forward from a particular position
    or within a given range, specify the search term using exact text, case insensitive,
    or via regular expressions, find one or all occurrences of the search term, etc.


    ## Modifications, Undo and Redo


    The text widget keeps track of whether changes have been made to the text (useful
    to know whether it needs to be saved to a file, for example). We can query (or
    change) using the `edit_modified ?bool?` method. There is also a complete multi-level
    undo/redo mechanism, managed automatically by the widget when we set its `undo`
    configuration option to `true`. Calling `edit_undo` or `edit_redo` modifies the
    current text using information stored on the undo/redo stack.


    ## Eliding Text


    Text widgets can include text that is not displayed. This is known as "elided"
    text, and is made available using the `elide` configuration option for tags. It
    can be used to implement an outliner, a "folding" code editor, or even to bury
    extra meta-data intermixed with displayed text. When specifying positions within
    elided text, you have to be a bit more careful. Methods that work with positions
    have extra options to either include or ignore the elided text.


    ## Introspection


    Like most Tk widgets, the text widget goes out of its way to expose information
    about its internal state. We''ve seen this in terms of the `get` method, widget
    configuration options, `names` and `cget` for both tags and marks, etc. There
    is even more information available that can be useful for a wide variety of tasks.
    Check out the `debug`, `dlineinfo`, `bbox`, `count`, and `dump` methods in the
    reference manual.


    ## Peering


    The Tk text widget allows the same underlying text data structure (containing
    all the text, marks, tags, images, etc.) to be shared between two or more different
    text widgets. This is known as *peering* and is controlled via the `peer` method.


    ## 16. Treeview


    ttk.Treeview

    https://tkdocs.com/man/ttk_treeview


    A **treeview** widget displays a hierarchy of items and allows users to browse
    through it. One or more attributes of each item can be displayed as columns to
    the right of the tree. It can be used to build user interfaces similar to the
    tree display you''d find in file managers like the macOS Finder or Windows Explorer.
    As with most Tk widgets, it offers incredible flexibility so it can be customized
    to suit a wide range of situations.


    ![](img/e444c319ec16222f00278651bee8c21d_234_0.png)


    Treeview widgets are created using the `ttk.Treeview` class:


    ```

    tree = ttk.Treeview(parent)

    ```


    Horizontal and vertical scrollbars can be added in the usual manner if desired.


    ## 16.1. Adding Items to the Tree


    To do anything useful with the treeview, we''ll need to add one or more *items*
    to it. Each item represents a single node in the tree, whether a leaf node or
    an internal node containing other nodes. Items are referred to by a unique id.
    You can assign this id when the item is first created, or the widget can automatically
    generate one.


    Items are created by inserting them into the tree, using the treeview''s `insert`
    method. To insert an item, we need to know where to insert it. That means specifying
    the parent item and where within the list of the parent''s existing children the
    new item should be inserted.


    The treeview widget automatically creates a root node (which is not displayed).
    Its id is the empty string. It serves as the parent of the first level of items
    that are added. Positions within the list of a node''s children are specified
    by index (0 being the first, and `end` meaning insert after all existing children).


    Normally, you''ll also specify the *name* of each item, which is the text displayed
    in the tree. Other options allow you to add an image beside the name, specify
    whether the node is open or closed, etc.


    ```

    # Inserted at the root, program chooses id:

    tree.insert('''', ''end'', ''widgets'', text=''Widget Tour'')


    # Same thing, but inserted as first child:

    tree.insert('''', 0, ''gallery'', text=''Applications'')


    # Treeview chooses the id:

    id = tree.insert('''', ''end'', text=''Tutorial'')


    # Inserted underneath an existing node:

    tree.insert(''widgets'', ''end'', text=''Canvas'')

    tree.insert(id, ''end'', text=''Tree'')

    ```


    Inserting the item returns the id of the newly created item.


    ## 16.2. Rearranging Items


    A node (and its descendants, if any) can be moved to a different location in the
    tree. The only restriction is that a node cannot be moved underneath one of its
    descendants, for obvious reasons. As before, the target location is specified
    via an existing parent node, and a position within its list of children.


    ```

    tree.move(''widgets'', ''gallery'', ''end'')  # move widgets under gallery

    ```


    Items can be *detached* from the tree, which removes the item and its descendants
    from the hierarchy, but does not destroy the items. This allows us to later reinsert
    them with `move`.


    ```

    tree.detach(''widgets'')

    ```


    Items can also be *deleted*, which does completely destroy the item and its descendants.


    ```

    tree.delete(''widgets'')

    ```


    To traverse the hierarchy, there are methods to find the parent of an item (`parent
    item`), its next or previous sibling (`next item` and `prev item`), and return
    the list of children of an item (`children item`).

    We can control whether or not the item is open and shows its children by modifying
    the `open` item configuration option.


    ```

    tree.item(''widgets'', open=TRUE)

    isopen = tree.item(''widgets'', ''open'')

    ```


    ## 16.3. Displaying Information for each Item


    The treeview can display one or more additional pieces of information about each
    item. These are shown as columns to the right of the main tree display.

    Each column is referenced by a symbolic name that we assign. We can specify the
    list of columns using the `columns` configuration option of the treeview widget,
    either when first creating the widget, or later on.


    ```

    tree = ttk.Treeview(root, columns=(''size'', ''modified''))

    tree[''columns''] = (''size'', ''modified'', ''owner'')

    ```


    We can specify the width of the column, how the display of item information in
    the column is aligned, and more. We can also provide information about the heading
    of the column, such as the text to display, an optional image, alignment, and
    a script to invoke when the item is clicked (e.g. to sort the tree).


    ```

    tree.column(''size'', width=100, anchor=''center'')

    tree.heading(''size'', text=''Size'')

    ```


    What to display in each column for each item can be specified individually by
    using the `set` method. You can also provide a list describing what to display
    in all the columns for the item. This is done using the `values` item configuration
    option. It can be used either when first inserting the item or to update it later).
    It takes a list of values. The order of the list must be the same as the order
    in the `columns` widget configuration option.


    ```

    tree.set(''widgets'', ''size'', ''12KB'')

    size = tree.set(''widgets'', ''size'')

    tree.insert('''', ''end'', text=''Listbox'', values=(''15KB'',

    ''Yesterday'', ''mark''))

    ```


    ## 16.4. Item Appearance and Events


    Like the text and canvas widgets, the treeview widget uses *tags* to modify the
    appearance of items in the tree. We can assign a list of tags to each item using
    the `tags` item configuration option (again, when creating the item or later on).


    Configuration options can then be specified on the tag, which will then apply
    to all items having that tag. Valid tag options include `foreground` (text color),
    `background`, `font`, and `image` (not used if the item specifies its own image).


    We can also create event bindings on tags, which lets us capture mouse clicks,
    keyboard events etc.


    ```

    tree.insert('''', ''end'', text=''button'', tags=(''ttk'', ''simple''))

    tree.tag_configure(''ttk'', background=''yellow'')

    tree.tag_bind(''ttk'', ''<1>'', itemClicked)

    # the item clicked can be found via tree.focus()

    ```


    The treeview will generate virtual events `<<TreeviewSelect>>`, `<<TreeviewOpen>>`,
    and `<<TreeviewClose>>`, which allow us to monitor changes to the widget made
    by users. We can use the `selection` method to determine the current selection
    (the selection can also be changed from your program).'
  mdcn: '## 15.8. 更多功能


    文本组件还能实现更多功能。这里我们仅简要介绍其中几项。如需了解详细信息，请参阅参考手册。


    ## 搜索


    文本组件包含一个强大的 `search` 方法，允许你在组件内定位一段文本。例如，这对于实现“查找”对话框非常有用。你可以从特定位置或在给定范围内向前或向后搜索，使用精确文本、不区分大小写或通过正则表达式指定搜索词，查找搜索词的单个或所有出现位置等。


    ## 修改、撤销与重做


    文本组件会跟踪文本是否已被修改（例如，这对于判断是否需要保存到文件很有用）。我们可以使用 `edit_modified ?bool?` 方法查询（或修改）此状态。还有一个完整的多级撤销/重做机制，当我们将
    `undo` 配置选项设置为 `true` 时，该机制由组件自动管理。调用 `edit_undo` 或 `edit_redo` 会使用存储在撤销/重做栈中的信息来修改当前文本。


    ## 省略文本


    文本组件可以包含不显示的文本。这被称为“省略”文本，通过标签的 `elide` 配置选项实现。它可以用于实现大纲视图、“折叠”代码编辑器，甚至可以将额外的元数据隐藏在显示的文本中。在指定省略文本中的位置时，需要格外小心。处理位置的方法有额外的选项，可以选择包含或忽略省略的文本。


    ## 自省


    与大多数 Tk 组件一样，文本组件会尽力暴露其内部状态信息。我们已经通过 `get` 方法、组件配置选项、标签和标记的 `names` 和 `cget` 等看到了这一点。还有更多信息可用于各种任务。请查阅参考手册中的
    `debug`、`dlineinfo`、`bbox`、`count` 和 `dump` 方法。


    ## 对等


    Tk 文本组件允许两个或多个不同的文本组件共享相同的底层文本数据结构（包含所有文本、标记、标签、图像等）。这被称为 *对等*，通过 `peer` 方法控制。


    ## 16. 树形视图


    ttk.Treeview

    https://tkdocs.com/man/ttk_treeview


    **树形视图**组件显示一个项目层次结构，并允许用户浏览。每个项目的一个或多个属性可以作为列显示在树的右侧。它可以用于构建类似于 macOS Finder
    或 Windows 资源管理器等文件管理器中的树形显示的用户界面。与大多数 Tk 组件一样，它提供了极大的灵活性，因此可以定制以适应各种情况。


    ![](img/e444c319ec16222f00278651bee8c21d_234_0.png)


    树形视图组件使用 `ttk.Treeview` 类创建：


    ```

    tree = ttk.Treeview(parent)

    ```


    如果需要，可以按照通常的方式添加水平和垂直滚动条。


    ## 16.1. 向树中添加项目


    要对树形视图进行任何有用的操作，我们需要向其中添加一个或多个 *项目*。每个项目代表树中的一个节点，无论是叶节点还是包含其他节点的内部节点。项目通过唯一的
    id 引用。你可以在首次创建项目时分配此 id，或者组件可以自动生成一个。


    项目通过使用树形视图的 `insert` 方法插入到树中来创建。要插入一个项目，我们需要知道在哪里插入它。这意味着需要指定父项目以及新项目应在父项目现有子项列表中的哪个位置插入。


    树形视图组件会自动创建一个根节点（不显示）。其 id 是空字符串。它作为添加的第一级项目的父节点。节点子项列表中的位置通过索引指定（0 表示第一个，`end`
    表示在所有现有子项之后插入）。


    通常，你还会指定每个项目的 *名称*，即在树中显示的文本。其他选项允许你在名称旁边添加图像、指定节点是打开还是关闭等。


    ```

    # 插入到根节点，程序选择 id：

    tree.insert('''', ''end'', ''widgets'', text=''Widget Tour'')


    # 同样的操作，但作为第一个子项插入：

    tree.insert('''', 0, ''gallery'', text=''Applications'')


    # 树形视图选择 id：

    id = tree.insert('''', ''end'', text=''Tutorial'')


    # 插入到现有节点下方：

    tree.insert(''widgets'', ''end'', text=''Canvas'')

    tree.insert(id, ''end'', text=''Tree'')

    ```


    插入项目会返回新创建项目的 id。


    ## 16.2. 重新排列项目


    节点（及其所有后代，如果有的话）可以移动到树中的不同位置。唯一的限制是节点不能移动到其某个后代下方，原因显而易见。与之前一样，目标位置通过现有的父节点及其子项列表中的位置来指定。


    ```

    tree.move(''widgets'', ''gallery'', ''end'')  # 将 widgets 移动到 gallery 下方

    ```


    项目可以从树中 *分离*，这会将项目及其后代从层次结构中移除，但不会销毁这些项目。这允许我们稍后使用 `move` 重新插入它们。


    ```

    tree.detach(''widgets'')

    ```


    项目也可以被 *删除*，这会完全销毁该项目及其后代。


    ```

    tree.delete(''widgets'')

    ```


    要遍历层次结构，有方法可以查找项目的父项（`parent item`）、其下一个或上一个兄弟项（`next item` 和 `prev item`），并返回项目的子项列表（`children
    item`）。

    我们可以通过修改项目的 `open` 配置选项来控制项目是否打开并显示其子项。


    ```

    tree.item(''widgets'', open=TRUE)

    isopen = tree.item(''widgets'', ''open'')

    ```


    ## 16.3. 显示每个项目的信息


    树形视图可以显示关于每个项目的一个或多个附加信息。这些信息显示在主树形显示右侧的列中。

    每列通过我们分配的符号名称引用。我们可以使用树形视图组件的 `columns` 配置选项指定列的列表，可以在首次创建组件时指定，也可以稍后指定。


    ```

    tree = ttk.Treeview(root, columns=(''size'', ''modified''))

    tree[''columns''] = (''size'', ''modified'', ''owner'')

    ```


    我们可以指定列的宽度、列中项目信息的显示对齐方式等。我们还可以提供有关列标题的信息，例如要显示的文本、可选的图像、对齐方式以及单击项目时要调用的脚本（例如，用于对树进行排序）。


    ```

    tree.column(''size'', width=100, anchor=''center'')

    tree.heading(''size'', text=''Size'')

    ```


    每个项目在每列中显示的内容可以使用 `set` 方法单独指定。你也可以提供一个列表来描述该项目所有列中要显示的内容。这通过 `values` 项目配置选项完成。它可以在首次插入项目时使用，也可以稍后更新。它接受一个值列表。列表的顺序必须与
    `columns` 组件配置选项中的顺序相同。


    ```

    tree.set(''widgets'', ''size'', ''12KB'')

    size = tree.set(''widgets'', ''size'')

    tree.insert('''', ''end'', text=''Listbox'', values=(''15KB'',

    ''Yesterday'', ''mark''))

    ```


    ## 16.4. 项目外观与事件


    与文本和画布组件一样，树形视图组件使用 *标签* 来修改树中项目的外观。我们可以使用 `tags` 项目配置选项（同样，在创建项目时或稍后）为每个项目分配一个标签列表。


    然后可以在标签上指定配置选项，这些选项将应用于所有具有该标签的项目。有效的标签选项包括 `foreground`（文本颜色）、`background`、`font`
    和 `image`（如果项目指定了自己的图像，则不使用）。


    我们还可以在标签上创建事件绑定，这让我们能够捕获鼠标点击、键盘事件等。


    ```

    tree.insert('''', ''end'', text=''button'', tags=(''ttk'', ''simple''))

    tree.tag_configure(''ttk'', background=''yellow'')

    tree.tag_bind(''ttk'', ''<1>'', itemClicked)

    # 被点击的项目可以通过 tree.focus() 找到

    ```


    树形视图将生成虚拟事件 `<<TreeviewSelect>>`、`<<TreeviewOpen>>` 和 `<<TreeviewClose>>`，这些事件允许我们监控用户对组件所做的更改。我们可以使用
    `selection` 方法来确定当前的选择（选择也可以从你的程序中更改）。'
