- md: "associated with; see [bugs.python.org/issue25173].\n\nChoosing the right window\
    \ as the `parent` of the dialog is important. It ensures the dialog window appears\
    \ near that window. On macOS, these dialogs are often attached to the title bar\
    \ of the parent window (see the error alerts in the previous section).\n\n> \U0001F4A1\
    \ *The front ends to these dialogs in Tkinter support both a `master` and a `parent`.\
    \ While most of the time, \"master\" and \"parent\" are used interchangeably in\
    \ Tkinter, that's not the case here. If you provide only the master, the dialog\
    \ won't be attached to that window (but the dialog still needs an existing window\
    \ to create the dialog, which is why the master parameter is there). If the dialog\
    \ is associated with another window, be sure to use the parent parameter.*\n\n\
    ## 18.6. Window Integration\n\nMultiple people had hoped to make it possible to\
    \ have everything displayed in a single window, to avoid the window management\
    \ hassles that can sometimes trip up people, see, e.g., [bugs.python.org/issue9262](https://bugs.python.org/issue9262),\
    \ [bugs.python.org/issue24826](https://bugs.python.org/issue24826), and [bugs.python.org/issue24818](https://bugs.python.org/issue24818).\n\
    \nBelow is an early, partially-functional mockup of some of the things we wanted\
    \ to be able to accomplish.\n\n![](img/e444c319ec16222f00278651bee8c21d_298_0.png)\n\
    \nEarly mockup of window integration (macOS).\n\n> At this point, almost everything\
    \ here has been completed, and it ended up looking almost identical to the original\
    \ mockup. See, once in a while, it happens!\n\n## Tabbed Editor\n\nEven beginner\
    \ programmers have to juggle multiple different source files. If each gets its\
    \ own window, as was the case originally in IDLE, things can get messy and/or\
    \ lost pretty quickly. Using tabs to organize multiple files in a single window\
    \ is a familiar, effective solution.\n\n> When architecting your application,\
    \ don't build large components as subclasses of Toplevel, or assume they'll be\
    \ the only thing in the window in the future. Getting around that assumption in\
    \ the code took a large amount of work. If components are instead built as frames,\
    \ they can be more easily inserted into a toplevel, a paned window, a tabbed notebook,\
    \ another frame, etc.\n\nLuckily, we can rely on the ttk.Notebook widget to provide\
    \ the tabbed user interface, just like we did in Preferences.\nOr maybe not.\n\
    Unfortunately, the ttk.Notebook widget (and the underlying platform widgets it\
    \ uses) only really support displaying and switching between a small, fixed number\
    \ of tabs. There's nothing built-in to support adding or closing tabs from the\
    \ user interface, which we definitely need here. And as every programmer knows,\
    \ it is more than possible to need a large number of tabs.\nAs you've seen in\
    \ different editors and word processors, everyone does things slightly differently.\
    \ We did our own custom tab widget (sigh...) for IDLE. The design borrowed heavily\
    \ from the TextMate editor on macOS. It allows creating new tabs, closing old\
    \ ones, dragging to rearrange the order, tooltips on each tab, indicating if the\
    \ contained file needed saving, etc. When the number of tabs grows too large to\
    \ comfortably display, the remainder are accessible via a popup menu on the last\
    \ visible tab.\n\n> The tabbed widget implementation relies on a single Tkinter\
    \ canvas to display the row of tabs and handle all interaction. The actual switching\
    \ of window content is handled completely outside of the widget, with a simple\
    \ callback mechanism used to coordinate everything.\n\n## Debugger\n\nThe design\
    \ of the original debugger, along with having its own set of flaws (see [bugs.python.org/issue17942](https://bugs.python.org/issue17942)),\
    \ was too tall to be integrated like we wanted to do.\n\n![](img/e444c319ec16222f00278651bee8c21d_300_0.png)\n\
    \nThe user interface was substantially revised, with a layout that would work\
    \ both in a standalone window and when integrated. The new version uses a paned\
    \ window to separate the controls and stack on the left from the variable display\
    \ on the right. Both the stack and variable display are implemented using tree\
    \ view widgets. This also provides a great deal of control when it comes to how\
    \ much space each element will use.\n\n![](img/e444c319ec16222f00278651bee8c21d_301_0.png)\n\
    \nNew IDLE debugger (macOS).\n\n## Integrated Shell and Debugger\n\nTo achieve\
    \ the integration of the shell and the debugger with the tabbed editor, another\
    \ paned window was used. Additional controls will be added to show/hide the panes\
    \ as the implementation progresses.\nThe embedded shell is interesting too. Recall\
    \ that IDLE normally has a single Python shell window running another Python process;\
    \ when modules in an editor are \"run,\" they do so via that shell. It's nice\
    \ to have that big shell available, and we don't necessarily want to start up\
    \ a separate shell in the editor.\nNew in Tk 8.5, the Text widget actually supports\
    \ the ability to create \"peers,\" which are separate widgets, but they share\
    \ the same text backend. That means when something changes in one, it changes\
    \ in the other. It's a seamless way to solve our problem here.\n\n## 18.7. Workarounds,\
    \ Hacks, and More\n\nThis being a chapter on actual experiences modernizing a\
    \ real application, it would be a lie to say that the underlying user interface\
    \ toolkit (Tk and the Tkinter wrapper) always worked exactly as it should. Like\
    \ IDLE, Tkinter and Tcl/Tk are the results of incredible volunteer efforts. That\
    \ being said...\n\n> Tk and Tkinter have some bugs and rough edges. I know you're\
    \ shocked.\n\nIn this section, I'll try to catalog just a few of the particular\
    \ \"gotchas\" that we ran into, as well as provide some little tips that don't\
    \ necessarily fit elsewhere but help provide a bit more polish to the user interface.\n\
    \n## Tool Tips\n\n- tool tips broken on macOS;\n  see [bugs.python.org/issue24570]\n\
    - `MacWindowStyle` help for tooltips, vs. `wm overrideredirect` elsewhere\n\n\
    ## Context Menus\n\n- bogus text widget bindings interfere with popup clicks;\n\
    \  see [bugs.python.org/issue24801]\n- two different popup click bindings needed\
    \ on macOS;\n  [bugs.python.org/issue24801]\n\n## Peer Text Widgets\n\n- broken\
    \ peer text widget API in Tkinter;\n  see [bugs.python.org/issue17945]\n\n## Modal\
    \ Windows\n\n- macOS not doing fully modal, plus window style; see [bugs.python.org/issue24760](https://bugs.python.org/issue24760)\n\
    \n## Copyright\n\n*Modern Tkinter for Busy Python Developers*\n\n*Quickly learn\
    \ to create great looking user interfaces for Windows, Mac and Linux using Python's\
    \ standard GUI toolkit*\n\nThird Edition. Copyright © 2012-2020 by Mark Roseman\n\
    \nPublished by Late Afternoon Press. Victoria, BC, Canada. [lateaft.com](http://lateaft.com).\n\
    \nThis book brings together various information from the website [TkDocs.com](http://TkDocs.com),\
    \ which Mark developed as a much-needed source of documentation on the modern\
    \ features available in Tk. The website contains information on using Tk through\
    \ Tcl, Ruby and Perl as well as Python. This book should be considered a companion\
    \ to that website, and supports its further development.\n\nISBN: 978-1-9991495-9-8\
    \ (KINDLE)\n\n## About the Author\n\n![](img/e444c319ec16222f00278651bee8c21d_305_0.png)\n\
    \n**Mark Roseman** is a veteran software developer, entrepreneur, and writer.\
    \ He previously worked and published extensively on topics related to user experience\
    \ and technology to support collaboration between groups of people, and founded\
    \ two software startup companies.\n\nHe has been using Tcl, Tk and Python since\
    \ the early 1990's, and has been influential within the Tcl/Tk community.\n\n\
    Mark lives in Victoria, BC, Canada. He can be contacted via his personal website,\
    \ [markroseman.com](http://markroseman.com).\n\nHe has published additional information\
    \ related to Tk and Tkinter at his [tkdocs.com](http://tkdocs.com) website."
  mdcn: "与之相关；参见 [bugs.python.org/issue25173]。\n\n为对话框选择正确的窗口作为其 `parent`（父窗口）非常重要。这能确保对话框窗口出现在该窗口附近。在\
    \ macOS 上，这些对话框通常会附加到父窗口的标题栏上（参见上一节中的错误警报）。\n\n> \U0001F4A1 *Tkinter 中这些对话框的前端同时支持\
    \ `master` 和 `parent` 参数。虽然在 Tkinter 中，“master”和“parent”大多数时候可以互换使用，但在这里并非如此。如果你只提供\
    \ master，对话框将不会附加到该窗口（但对话框仍然需要一个现有窗口来创建，这就是 master 参数存在的原因）。如果对话框需要与另一个窗口关联，请务必使用\
    \ parent 参数。*\n\n## 18.6. 窗口集成\n\n许多人曾希望能在单个窗口中显示所有内容，以避免有时会困扰人们的窗口管理问题，例如参见 [bugs.python.org/issue9262](https://bugs.python.org/issue9262)、[bugs.python.org/issue24826](https://bugs.python.org/issue24826)\
    \ 和 [bugs.python.org/issue24818](https://bugs.python.org/issue24818)。\n\n下面是一个早期、部分功能的原型图，展示了我们希望实现的一些目标。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_298_0.png)\n\n窗口集成的早期原型（macOS）。\n\n\
    > 到目前为止，这里几乎所有的功能都已完成，并且最终效果与原始原型几乎完全一致。看，偶尔也会有这样的好事发生！\n\n## 标签页编辑器\n\n即使是初级程序员也需要同时处理多个不同的源文件。如果每个文件都有自己的窗口，就像\
    \ IDLE 最初那样，事情很快就会变得混乱和/或文件容易丢失。使用标签页在单个窗口中组织多个文件是一种熟悉且有效的解决方案。\n\n> 在设计应用程序时，不要将大型组件构建为\
    \ Toplevel 的子类，或者假设它们将来会是窗口中的唯一内容。在代码中绕过这个假设需要大量的工作。如果组件被构建为框架（frame），它们可以更容易地插入到顶层窗口、窗格窗口、标签页笔记本、另一个框架等中。\n\
    \n幸运的是，我们可以依赖 ttk.Notebook 小部件来提供标签页用户界面，就像我们在“首选项”中所做的那样。\n或者也许不行。\n不幸的是，ttk.Notebook\
    \ 小部件（以及它使用的底层平台小部件）只真正支持显示和切换少量固定的标签页。没有内置功能支持从用户界面添加或关闭标签页，而我们这里绝对需要这个功能。而且每个程序员都知道，需要大量标签页的情况非常可能。\n\
    正如你在不同的编辑器和文字处理器中看到的，每个人的做法都略有不同。我们为 IDLE 开发了自己的自定义标签页小部件（唉……）。该设计大量借鉴了 macOS\
    \ 上的 TextMate 编辑器。它允许创建新标签页、关闭旧标签页、拖动重新排列顺序、每个标签页的工具提示（指示包含的文件是否需要保存）等。当标签页数量增长过多，无法舒适地显示时，其余的标签页可以通过最后一个可见标签页上的弹出菜单访问。\n\
    \n> 标签页小部件的实现依赖于单个 Tkinter 画布来显示标签页行并处理所有交互。实际的窗口内容切换完全在小部件外部处理，使用简单的回调机制来协调一切。\n\
    \n## 调试器\n\n原始调试器的设计，除了自身存在一些缺陷（参见 [bugs.python.org/issue17942](https://bugs.python.org/issue17942)）之外，其高度也太高，无法像我们希望的那样进行集成。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_300_0.png)\n\n用户界面进行了大幅修订，采用了一种既能在独立窗口中工作，也能在集成时工作的布局。新版本使用窗格窗口将左侧的控件和堆栈与右侧的变量显示分开。堆栈和变量显示都使用树视图小部件实现。这也为控制每个元素将使用多少空间提供了极大的灵活性。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_301_0.png)\n\n新的 IDLE 调试器（macOS）。\n\
    \n## 集成的 Shell 和调试器\n\n为了实现 shell 和调试器与标签页编辑器的集成，使用了另一个窗格窗口。随着实现的进展，将添加额外的控件来显示/隐藏窗格。\n\
    嵌入式 shell 也很有趣。回想一下，IDLE 通常有一个单独的 Python shell 窗口运行另一个 Python 进程；当编辑器中的模块被“运行”时，它们就是通过该\
    \ shell 运行的。拥有那个大的 shell 很好，我们不一定想在编辑器中启动一个单独的 shell。\nTk 8.5 中的新功能是，Text 小部件实际上支持创建“对等体”（peers），它们是独立的小部件，但共享相同的文本后端。这意味着当一个中的内容发生变化时，另一个也会随之变化。这是解决我们这里问题的一种无缝方式。\n\
    \n## 18.7. 解决方法、技巧与更多\n\n既然本章是关于现代化一个真实应用程序的实际经验，如果说底层的用户界面工具包（Tk 和 Tkinter 封装）总是完全按预期工作，那将是一个谎言。就像\
    \ IDLE 一样，Tkinter 和 Tcl/Tk 是令人难以置信的志愿者努力的成果。话虽如此……\n\n> Tk 和 Tkinter 有一些 bug 和粗糙之处。我知道你很震惊。\n\
    \n在本节中，我将尝试列举一些我们遇到的特定“陷阱”，并提供一些小技巧，这些技巧不一定适合放在其他地方，但有助于为用户界面增添一些润色。\n\n## 工具提示\n\
    \n- macOS 上的工具提示损坏；\n  参见 [bugs.python.org/issue24570]\n- `MacWindowStyle` 帮助处理工具提示，而其他地方使用\
    \ `wm overrideredirect`\n\n## 上下文菜单\n\n- 虚假的文本小部件绑定干扰了弹出点击；\n  参见 [bugs.python.org/issue24801]\n\
    - macOS 上需要两种不同的弹出点击绑定；\n  [bugs.python.org/issue24801]\n\n## 对等文本小部件\n\n- Tkinter\
    \ 中损坏的对等文本小部件 API；\n  参见 [bugs.python.org/issue17945]\n\n## 模态窗口\n\n- macOS 未完全实现模态，加上窗口样式问题；参见\
    \ [bugs.python.org/issue24760](https://bugs.python.org/issue24760)\n\n## 版权\n\n\
    *《为忙碌的 Python 开发者准备的现代 Tkinter》*\n\n*快速学习使用 Python 的标准 GUI 工具包为 Windows、Mac 和\
    \ Linux 创建美观的用户界面*\n\n第三版。版权所有 © 2012-2020 Mark Roseman\n\n由 Late Afternoon Press\
    \ 出版。加拿大不列颠哥伦比亚省维多利亚市。[lateaft.com](http://lateaft.com)。\n\n本书汇集了来自 [TkDocs.com](http://TkDocs.com)\
    \ 网站的各种信息，该网站由 Mark 开发，作为关于 Tk 现代功能的急需文档来源。该网站包含有关通过 Tcl、Ruby、Perl 以及 Python 使用\
    \ Tk 的信息。本书应被视为该网站的配套读物，并支持其进一步发展。\n\nISBN: 978-1-9991495-9-8 (KINDLE)\n\n## 关于作者\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_305_0.png)\n\n**Mark Roseman** 是一位经验丰富的软件开发者、企业家和作家。他此前在用户体验以及支持人群协作的技术相关主题上进行了广泛的工作和发表，并创立了两家软件初创公司。\n\
    \n自 1990 年代初以来，他一直使用 Tcl、Tk 和 Python，并在 Tcl/Tk 社区中具有影响力。\n\nMark 居住在加拿大不列颠哥伦比亚省维多利亚市。可以通过他的个人网站\
    \ [markroseman.com](http://markroseman.com) 联系他。\n\n他在 [tkdocs.com](http://tkdocs.com)\
    \ 网站上发布了更多与 Tk 和 Tkinter 相关的信息。"
