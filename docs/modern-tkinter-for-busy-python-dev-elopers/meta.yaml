    # # 18. Case Study: IDLE Modernization


    This chapter presents a case study of modernizing the appearance of a substantial
    Tk-based application.


    > > **F.Y.I.** This chapter is currently (May 2019) a work in progress. The code
    here is slowly finding its way into the Python source tree, but most is not there
    yet. You can find temporary snapshots on [GitHub](https://github.com).


    [IDLE](https://docs.python.org/3/library/idle.html) (Integrated DeveLopment Environment)
    is the standard Python development environment that is bundled with every Python
    release. It consists of an interactive Python shell, editors with syntax highlighting,
    a debugger, etc. Its user interface is written in Tkinter.'
- md: "IDLE was never intended to be a replacement for more full-featured development\
    \ environments. Because it is relatively simple and integrated, and because it\
    \ is bundled with Python, it is popular for those learning (and teaching) the\
    \ language.\n\nOriginally created by Python BDFL Guido van Rossum in 1998, IDLE\
    \ has been incrementally added to over the years by multiple other developers.\
    \ But with limited development effort spent on it, it was showing its age, especially\
    \ on platforms (e.g., macOS) infrequently used by those improving IDLE.\n\nA [Python\
    \ Central comparison of IDE's](https://www.pythoncentral.io/) described IDLE this\
    \ way:\n\n> All those features are, in fact, present, but they do not really make\
    \ an IDE. In fact, while IDLE offers some of the features you expect from an IDE,\
    \ it does so without even being a satisfactory text editor. The interface is buggy\
    \ and fails to take into account how Python works, especially in the interactive\
    \ shell, the auto-completion is useless outside the standard library, and the\
    \ editing functionality is so limited that no serious Python programmer — heck,\
    \ no serious typist — could use it full-time.\n\nIf you use an IDE, it should\
    \ not be IDLE.\n\nWith its buggy and dated user interface, IDLE was [at some risk](https://www.python.org/)\
    \ of being removed from the Python distribution altogether. Yet, because of the\
    \ relative simplicity and it being bundled, there were a number of people, particularly\
    \ those teaching Python, eager to see IDLE leap forward.\n\nIDLE was obviously\
    \ a great candidate to be modernized, using newer Tk features like the themed\
    \ widgets to help spur some redesign. But it was about more than just swapping\
    \ widgets. Many improvements could be made just by changing how the \"classic\"\
    \ widgets were being used, to better reflect a more modern design aesthetic.\n\
    \n> Because IDLE, which is an application, was a part of Python's standard library\
    \ (i.e., 99% designed to be used by other code), there were many policies and\
    \ procedures not really appropriate for an application that made changes difficult.\
    \ Removing some of those roadblocks (see [PEP 434](https://www.python.org/dev/peps/pep-0434/))\
    \ was a significant step required for the types of changes being discussed here.\n\
    \n## 18.1. Project Goals\n\nAs you can imagine, modernizing a large application\
    \ like this, based on \"classic\" Tkinter, was not entirely straightforward. In\
    \ this chapter, I'll walk through some of the user interface changes that were\
    \ made and why.\n\nEveryone involved wanted to see IDLE look a lot better than\
    \ it did, though nobody was under the illusion that it was going to turn into\
    \ a stunning example of cutting-edge design. But something that fit in more, so\
    \ that people could learn about Python without getting distracted by the clumsiness\
    \ of their tools, seemed doable.\n\nThe goal also wasn't to try to compete with\
    \ Python IDE's more commonly used by professional programmers, such as [PyCharm](https://www.jetbrains.com/pycharm/),\
    \ [WingIDE](https://wingware.com/), [PyDev](https://www.pydev.org/), [Komodo](https://www.activestate.com/products/komodo-ide/),\
    \ etc. Though some more experienced Python developers did use IDLE, either sporadically\
    \ or regularly, it primarily needed to appeal to newcomers to the language, and\
    \ often those new to programming altogether.\n\nThere has been no shortage of\
    \ previous attempts to radically advance IDLE, resulting in a number of different\
    \ *forks* that boasted all kinds of improvements. Many of them used other GUI\
    \ toolkits or modules that weren't part of the standard library. It was important\
    \ here to stay with Tkinter and the standard library because we wanted to ensure\
    \ every improvement could, over time, make it into the *official* version that\
    \ ships with Python, rather than becoming just another fork.\n\nAs well, the hope\
    \ was to make IDLE easier to contribute to. This suggested pruning down a substantial\
    \ volume of code, removing some redundancies and inconsistencies, cleaning up\
    \ some of the more complex pieces, simplifying interactions between system components,\
    \ etc. There was also a substantial list of reported bugs that we hoped to make\
    \ a dent in.\n\nWhile no less important, I'll largely defer discussion of the\
    \ substantial issues surrounding software architecture, backward compatibility\
    \ (including systems running Tk 8.4, pre-ttk, which received only a few selective\
    \ improvements), etc.\n\nThroughout this chapter, you'll find links to individual\
    \ issues in Python's issue tracking system, which often provide additional insight\
    \ into various peoples' thought processes around changes.\n\n> As you'll see,\
    \ this chapter highlights many of the shortcomings of IDLE's user interface. This\
    \ is done mainly for emphasis because many of the problems shown here are common\
    \ to many applications and user interfaces. I have only the highest respect for\
    \ the people who donated their limited time and resources to this open source\
    \ project and had to consciously make tradeoffs between time, features, and user\
    \ interface, all within the context of a decidedly non-trivial codebase.\n\n##\
    \ 18.2. Menus\n\nThe very first change that was made was to remove the archaic\
    \ tearoff menus. The macOS version of Tk doesn't even support them, but they were\
    \ still there on Windows and X11. See [bugs.python.org/issue13884].\n\nThe change\
    \ here was to add a \"tearoff=0\" option to the few places in the code where these\
    \ menus were created.\nAt least that was easy.\nThere were also several bugs where\
    \ items in the menu were not properly disabled when the feature was not available.\
    \ This led to either menu items that did nothing (confusing for learners) or error\
    \ dialogs that said little more than \"you can't do that.\"\n\n## 18.3. Main Window\n\
    \nOne good thing about IDLE is that revolving around an editor and a shell, the\
    \ majority of it really is a Tk text widget, and there was very little about *its*\
    \ user interface that had to change. But even in the main window, which is mostly\
    \ just a text widget, there were improvements to be had.\n\nThe following images\
    \ show the original version of IDLE's shell window, pre-modernization, just as\
    \ someone would see when they first launched the program.\n\nLooking at them,\
    \ what improvements would you make?\n\nMain IDLE window on macOS.\n\nMain IDLE\
    \ window on Windows.\n\nMain IDLE window on Linux.\n\n### Default Font\n\nThe\
    \ first change that was made had to do with the default font. IDLE hardcoded 10\
    \ point Courier and used that on all platforms. This didn't actually look too\
    \ bad in Windows, was ok on Linux, but looked terrible on macOS; see [bugs.python.org/issue24745](https://bugs.python.org/issue24745).\
    \ Sure this could be changed through a preferences dialog, but the defaults certainly\
    \ didn't leave a good impression.\n\nWhile one option would simply be to write\
    \ the code to pick a good font depending on which platform we're running on, instead\
    \ the default was changed to use Tk's built-in `TkFixedFont`, which provides a\
    \ better default on each platform.\n\nYou can see the differences in the screenshots\
    \ below. Notice how the new fonts seem to match better with system terminal windows\
    \ that are shown.\n\nIDLE main window using TkFixedFont (macOS).\n\nIDLE main\
    \ window using TkFixedFont (Windows).\n\nIDLE main window using TkFixedFont (Linux).\n\
    \nSpeaking of preferences dialogs, if you want to change the font it often helps\
    \ to know what the font actually is (using `Font.actual`). Here's the new code\
    \ from IDLE's preferences dialog that figures that out:\n\n```\nif (family ==\
    \ 'TkFixedFont'):\n    f = Font(name = 'TkFixedFont', exists = True, root = root)\n\
    \    actualFont = Font.actual(f)\n    family = actualFont['family']\n    size\
    \ = actualFont['size']\n    if size < 0:\n        size = 10  # if font in pixels,\
    \ ignore actual size\n    bold = 1 if actualFont['weight']=='bold' else 0\n```\n\
    \nFor the record, the fonts that Tk chose for TkFixedFont are Monaco 11 on macOS,\
    \ Courier New 10 on Windows, and DejaVu Sans Mono 10 on Linux (Ubuntu 14 to be\
    \ specific).\n\n### Around the Text Widget\n\nThere were a few other cosmetic\
    \ things that just weren't right around the edge of the main window; see [bugs.python.org/issue24750](https://bugs.python.org/issue24750).\
    \ Look back at the earlier screenshots of the IDLE main window.\n\nNotice there's\
    \ a border around the text widget. It's most noticeable on macOS where it's a\
    \ dark black, somewhat less so on Linux, and barely perceptible on Windows. This\
    \ is the result of Tk's \"highlightthickness\" attribute, which is present when\
    \ the text widget has the focus.\n\nIf the text widget doesn't have the focus,\
    \ such as when the window becomes inactive, the highlight goes away:\n\nNotice\
    \ how on the macOS screenshot, without the highlight, the status bar at the bottom\
    \ of the window blends into the text widget. Not good."
  mdcn: "IDLE 从未打算成为功能更全面的开发环境的替代品。由于它相对简单且集成度高，并且随 Python 一起捆绑分发，因此在学习（和教授）这门语言的人群中很受欢迎。\n\
    \nIDLE 最初由 Python 的 BDFL（终身仁慈独裁者）Guido van Rossum 于 1998 年创建，多年来由多位其他开发者逐步添加功能。但由于投入的开发精力有限，它开始显得过时，尤其是在那些改进\
    \ IDLE 的开发者不常使用的平台（例如 macOS）上。\n\n[Python Central 对 IDE 的比较](https://www.pythoncentral.io/)这样描述\
    \ IDLE：\n\n> 所有这些功能实际上都存在，但它们并没有真正构成一个 IDE。事实上，虽然 IDLE 提供了你期望从 IDE 获得的一些功能，但它甚至算不上一个令人满意的文本编辑器。其界面存在缺陷，没有考虑到\
    \ Python 的工作方式，尤其是在交互式 shell 中；自动补全在标准库之外毫无用处；编辑功能非常有限，以至于没有哪个认真的 Python 程序员——天哪，没有哪个认真的打字员——能全天候使用它。\n\
    \n如果你使用 IDE，那它不应该是 IDLE。\n\n由于其充满缺陷且过时的用户界面，IDLE [面临被从 Python 发行版中移除的风险](https://www.python.org/)。然而，由于其相对简单且随\
    \ Python 捆绑，仍有许多人，特别是那些教授 Python 的人，热切希望看到 IDLE 能够飞跃发展。\n\nIDLE 显然是一个进行现代化改造的绝佳候选者，可以使用更新的\
    \ Tk 特性，如主题化小部件，来推动一些重新设计。但这不仅仅是更换小部件的问题。许多改进可以通过改变“经典”小部件的使用方式来实现，以更好地反映更现代的设计美学。\n\
    \n> 因为 IDLE 作为一个应用程序，是 Python 标准库的一部分（即 99% 的设计目的是供其他代码使用），所以存在许多对于应用程序来说并不真正合适的策略和流程，这使得更改变得困难。移除其中一些障碍（参见\
    \ [PEP 434](https://www.python.org/dev/peps/pep-0434/)）是实现此处讨论的更改类型所需的重要一步。\n\n\
    ## 18.1. 项目目标\n\n可以想象，对这样一个基于“经典”Tkinter 的大型应用程序进行现代化改造并非完全直截了当。在本章中，我将介绍一些已进行的用户界面更改及其原因。\n\
    \n所有参与人员都希望看到 IDLE 比以前好看得多，尽管没有人幻想它会变成一个令人惊叹的尖端设计范例。但让它更融入环境，使人们在学习 Python 时不会被工具的笨拙所分心，这似乎是可行的。\n\
    \n目标也不是试图与专业程序员更常用的 Python IDE 竞争，例如 [PyCharm](https://www.jetbrains.com/pycharm/)、[WingIDE](https://wingware.com/)、[PyDev](https://www.pydev.org/)、[Komodo](https://www.activestate.com/products/komodo-ide/)\
    \ 等。尽管一些更有经验的 Python 开发者确实使用 IDLE，无论是偶尔还是定期，但它主要需要吸引这门语言的新手，而且通常是那些对编程本身也很陌生的人。\n\
    \n此前不乏彻底改进 IDLE 的尝试，产生了许多不同的 *分支*，它们都宣称有各种改进。其中许多使用了其他 GUI 工具包或不属于标准库的模块。在这里坚持使用\
    \ Tkinter 和标准库很重要，因为我们希望确保每一项改进最终都能进入随 Python 发布的 *官方* 版本，而不是仅仅成为另一个分支。\n\n此外，希望让\
    \ IDLE 更易于贡献。这意味着需要精简大量代码，移除一些冗余和不一致之处，清理一些更复杂的部分，简化系统组件之间的交互等。还有一个相当长的已报告错误列表，我们希望能在其中取得一些进展。\n\
    \n虽然同样重要，但我将主要推迟讨论围绕软件架构、向后兼容性（包括运行 Tk 8.4、pre-ttk 的系统，这些系统只接受了少数选择性改进）等的重大问题。\n\
    \n在本章中，你将找到指向 Python 问题跟踪系统中各个问题的链接，这些问题通常提供了关于人们围绕更改的各种思考过程的额外见解。\n\n> 正如你将看到的，本章重点介绍了\
    \ IDLE 用户界面的许多缺点。这样做主要是为了强调，因为这里展示的许多问题在许多应用程序和用户界面中都很常见。我对于那些将他们有限的时间和资源捐赠给这个开源项目的人们怀有最高的敬意，他们不得不在时间、功能和用户界面之间做出有意识的权衡，所有这些都在一个绝对非平凡的代码库背景下进行。\n\
    \n## 18.2. 菜单\n\n做出的第一个更改是移除过时的可撕下菜单。macOS 版本的 Tk 甚至不支持它们，但它们在 Windows 和 X11 上仍然存在。参见\
    \ [bugs.python.org/issue13884]。\n\n这里的更改是在代码中创建这些菜单的少数几个地方添加了 \"tearoff=0\" 选项。\n\
    至少这很容易。\n还有几个错误，当功能不可用时，菜单项没有被正确禁用。这导致要么菜单项不起作用（对学习者来说很困惑），要么错误对话框除了“你不能这样做”之外几乎没说什么。\n\
    \n## 18.3. 主窗口\n\nIDLE 的一个优点是，围绕编辑器和 shell，其大部分内容实际上是一个 Tk 文本小部件，*其* 用户界面需要更改的地方非常少。但即使在主要只是文本小部件的主窗口中，也有改进的空间。\n\
    \n以下图像显示了现代化之前 IDLE shell 窗口的原始版本，就像某人第一次启动程序时看到的那样。\n\n看着它们，你会做出哪些改进？\n\nmacOS\
    \ 上的 IDLE 主窗口。\n\nWindows 上的 IDLE 主窗口。\n\nLinux 上的 IDLE 主窗口。\n\n### 默认字体\n\n做出的第一个更改与默认字体有关。IDLE\
    \ 硬编码了 10 点 Courier 并在所有平台上使用。这在 Windows 上看起来实际上并不太糟，在 Linux 上还可以，但在 macOS 上看起来很糟糕；参见\
    \ [bugs.python.org/issue24745](https://bugs.python.org/issue24745)。当然，这可以通过首选项对话框进行更改，但默认设置肯定没有留下好印象。\n\
    \n虽然一个简单的选择是编写代码根据运行平台选择一个好的字体，但默认值被更改为使用 Tk 的内置 `TkFixedFont`，它在每个平台上都提供了更好的默认值。\n\
    \n你可以在下面的截图中看到差异。注意新字体如何与显示的系统终端窗口更好地匹配。\n\n使用 TkFixedFont 的 IDLE 主窗口 (macOS)。\n\
    \n使用 TkFixedFont 的 IDLE 主窗口 (Windows)。\n\n使用 TkFixedFont 的 IDLE 主窗口 (Linux)。\n\
    \n说到首选项对话框，如果你想更改字体，通常需要知道字体实际是什么（使用 `Font.actual`）。这是 IDLE 首选项对话框中用于确定这一点的新代码：\n\
    \n```\nif (family == 'TkFixedFont'):\n    f = Font(name = 'TkFixedFont', exists\
    \ = True, root = root)\n    actualFont = Font.actual(f)\n    family = actualFont['family']\n\
    \    size = actualFont['size']\n    if size < 0:\n        size = 10  # if font\
    \ in pixels, ignore actual size\n    bold = 1 if actualFont['weight']=='bold'\
    \ else 0\n```\n\n作为记录，Tk 为 TkFixedFont 选择的字体是 macOS 上的 Monaco 11，Windows 上的 Courier\
    \ New 10，以及 Linux（具体是 Ubuntu 14）上的 DejaVu Sans Mono 10。\n\n### 文本小部件周围\n\n主窗口边缘还有一些其他装饰性的东西不太对劲；参见\
    \ [bugs.python.org/issue24750](https://bugs.python.org/issue24750)。回顾一下之前 IDLE\
    \ 主窗口的截图。\n\n注意文本小部件周围有一个边框。这在 macOS 上最明显，是深黑色的，在 Linux 上不那么明显，在 Windows 上几乎察觉不到。这是\
    \ Tk 的 \"highlightthickness\" 属性的结果，当文本小部件获得焦点时会出现。\n\n如果文本小部件没有焦点，例如当窗口变为非活动状态时，高亮显示会消失：\n\
    \n注意在 macOS 截图中，没有高亮显示时，窗口底部的状态栏与文本小部件融为一体。这不好。"
