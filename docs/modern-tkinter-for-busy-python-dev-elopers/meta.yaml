  - '[PAGE 68]


    # 6.2. Label


    ttk.Label

    https://tkdocs.com/man/ttk_label


    A **label** is a widget that displays text or images, typically that users will
    just view but not otherwise interact with. Labels are used for to identify controls
    or other parts of the user interface, provide textual feedback or results, etc.


    ![](img/e444c319ec16222f00278651bee8c21d_68_0.png)


    Labels are created using the `ttk.Label` class. Often, the text or image the label
    will display are specified via configuration options at the same time:


    ```

    label = ttk.Label(parent, text=''Full name:'')

    ```


    Like frames, labels can take several different configuration options, which can
    alter how they are displayed.


    # Displaying Text


    The `text` configuration option (shown above when creating the label) is the most
    commonly used, particularly when the label is purely decorative or explanatory.
    You can change what text is displayed by modifying this configuration option.
    This can be done at any time, not only when first creating the label.'
  - '[PAGE 69]


    You can also have the widget monitor a variable in your script. Anytime the variable
    changes, the label will display the new value of the variable. This is done with
    the `textvariable` option:


    ```

    resultsContents = StringVar()

    label[''textvariable''] = resultsContents

    resultsContents.set(''New value to display'')

    ```


    Tkinter only allows you to attach widgets to an instance of the `StringVar` class,
    and not arbitrary Python variables. This class contains all the logic to watch
    for changes and communicate them back and forth between the variable and Tk. Use
    the `get` and `set` methods to read or write the current value of the variable.


    # Displaying Images


    Labels can also display an image instead of text. If you just want an image displayed
    in your user interface, this is normally the way to do it. We''ll go into images
    in more detail in a later chapter, but for now, let''s assume you want to display
    a GIF stored in a file on disk. This is a two-step process. First, you will create
    an image "object." Then, you can tell the label to use that object via its `image`
    configuration option:


    ```

    image = PhotoImage(file=''myimage.gif'')

    label[''image''] = image

    ```


    Labels can also display both an image and text at the same time. You''ll often
    see this in toolbar buttons. To do so, use the `compound` configuration option.
    The default value is `none`, meaning display only the image if present; if there
    is no image, display the text specified by the `text` or `textvariable` options.
    Other possible values for the `compound` option are: `text` (text only), `image`
    (image only), `center` (text in the center of image), `top` (image above text),
    `left`, `bottom`, and `right`.


    # Fonts, Colors, and More'
  - '[PAGE 70]


    Like with frames, you normally don''t want to change things like fonts and colors
    directly. If you need to change them (e.g., to create a special type of label),
    the preferred method would be to create a new style, which is then used by the
    widget with the `style` option.

    Unlike most themed widgets, the label widget also provides explicit widget-specific
    configuration options as an alternative. Again, you should use these only in special
    one-off cases when using a style didn''t necessarily make sense.

    You can specify the font used to display the label''s text using the `font` configuration
    option. While we''ll go into fonts in more detail in a later chapter, here are
    the names of some predefined fonts you can use:


    +   - `TkDefaultFont`: Default for all GUI items not otherwise specified.

    - `TkTextFont`: Used for entry widgets, listboxes, etc.

    - `TkFixedFont`: A standard fixed-width font.

    - `TkMenuFont`: The font used for menu items.

    - `TkHeadingFont`: A font for column headings in lists and tables.

    - `TkCaptionFont`: A font for window and dialog caption bars.

    - `TkSmallCaptionFont`: Smaller captions for subwindows or tool dialogs.

    - `TkIconFont`: A font for icon captions.

    - `TkTooltipFont`: A font for tooltips.


    > Because font choices are so platform-specific, be careful of hardcoding specifics
    (font families, sizes, etc.). This is something else you''ll see in many older
    Tk programs that can make them look ugly.


    ```

    label[''font''] = "TkDefaultFont"

    ```'
  - '[PAGE 71]


    The foreground (text) and background color of the label can also be changed via
    the `foreground` and `background` configuration options. Colors are covered in
    detail later, but you can specify them as either color names (e.g., `red`) or
    hex RGB codes (e.g., `#ff340a`).

    Labels also accept the `relief` configuration option discussed for frames to make
    them appear sunken or raised.


    # Layout


    While the overall layout of the label (i.e., where it is positioned within the
    user interface, and how large it is) is determined by the geometry manager, several
    options can help you control how the label will be displayed within the rectangle
    the geometry manager gives it.

    If the box given to the label is larger than the label requires for its contents,
    you can use the `anchor` option to specify what edge or corner the label should
    be attached to, which would leave any empty space in the opposite edge or corner.
    Possible values are specified as compass directions: `n` (north, or top edge),
    `ne`, (north-east, or top right corner), `e`, `se`, `s`, `sw`, `w`, `nw` or `center`.


    > 💡 Things not appearing where you think they should? It may be that the geometry
    manager is not putting the label where you think it is. For example, if you''re
    using `grid`, you may need to adjust the `sticky` options. When debugging, it
    can help to change the background color of each widget, so you know exactly where
    each is positioned. This is a good example of those "one-off" cases we just mentioned
    where you might use configuration options rather than styles to modify appearance.


    # Multi-line Labels


    Labels can display more than one line of text. To do so, embed carriage returns
    (`\n`) in the `text` (or `textvariable`) string. Labels can also automatically
    wrap your text into multiple lines via the `wraplength` option, which specifies
    the maximum length of a line (in pixels, centimeters, etc.).


    > Multi-line labels are a replacement for the older `message` widgets in classic
    Tk.'
  - '[PAGE 72]


    ![](img/e444c319ec16222f00278651bee8c21d_72_0.png)


    You can also control how the text is justified via the `justify` option. It can
    have the values `left`, `center`, or `right`. If you have only a single line of
    text, you probably want the `anchor` option instead.'
  - '[PAGE 73]


    # 6.3. Button


    ttk.Button

    https://tkdocs.com/man/ttk_button


    A **button**, unlike a frame or label, is very much there to interact with. Users
    press a button to perform an action. Like labels, they can display text or images,
    but accept additional options to change their behavior.


    ![](img/e444c319ec16222f00278651bee8c21d_73_0.png)


    Buttons are created using the `ttk.Button` class:


    ```

    button = ttk.Button(parent, text=''Okay'', command=submitForm)

    ```


    Typically, their contents and command callback are specified at the same time.
    As with other widgets, buttons can take several different configuration options,
    including the standard `style` option, which can alter their appearance and behavior.


    # Text or Image


    Buttons take the same `text`, `textvariable` (rarely used), `image`, and `compound`
    configuration options as labels. These control whether the button displays text
    and/or an image.'
  - "[PAGE 74]\n\nButtons have a `default` configuration option. If specified as `active`,\
    \ this tells Tk that the button is the default button in the user interface; otherwise\
    \ it is `normal`. Default buttons are invoked if users hit the Return or Enter\
    \ key). Some platforms and styles will draw this default button with a different\
    \ border or highlight. Note that setting this option doesn't create an event binding\
    \ that will make the Return or Enter key activate the button; that you have to\
    \ do yourself.\n\n# The Command Callback\n\nThe `command` option connects the\
    \ button's action and your application. When a user presses the button, the script\
    \ provided by the option is evaluated by the interpreter.\nYou can also ask the\
    \ button to invoke the command callback from your application. That way, you don't\
    \ need to repeat the command to be invoked several times in your program. If you\
    \ change the command attached to the button, you don't need to change it elsewhere\
    \ too. Sounds like a useful way to add that event binding on our default button,\
    \ doesn't it?\n\n```\naction = ttk.Button(root, text=\"Action\", default=\"active\"\
    ,\n    command=myaction)\nroot.bind('<Return>', lambda e: action.invoke())\n```\n\
    \n> Standard behavior for dialog boxes and many other windows on most platforms\
    \ is to set up a binding on the window for the Return key (`<Return>` or `<Key-Return>`)\
    \ to invoke the active button if it exists, as we've done here. If there is a\
    \ \"Close\" or \"Cancel\" button, create a binding to the Escape key (`<Key-Escape>`).\
    \ On macOS, you should additionally bind the Enter key on the keyboard (`<KP_Enter>`)\
    \ to the active button, and Command-period (`<Command-.>`) to the close or cancel\
    \ button.\n\n# Button State\n\nButtons and many other widgets start off in a normal\
    \ state. A button will respond to mouse movements, can be pressed, and will invoke\
    \ its command callback. Buttons can also be put into a disabled state,"
- md: "where the button is greyed out, does not respond to mouse movements, and cannot\
    \ be pressed. Your program would disable the button when its command is not applicable\
    \ at a given point in time.\n\nAll themed widgets maintain an internal state,\
    \ represented as a series of binary flags. Each flag can either be set (on) or\
    \ cleared (off). You can set or clear these different flags, and check the current\
    \ setting using the `state` and `instate` methods. Buttons make use of the `disabled`\
    \ flag to control whether or not users can press the button. For example:\n\n\
    ```\nb.state(['disabled'])           # set the disabled flag\nb.state(['!disabled'])\
    \          # clear the disabled flag\nb.instate(['disabled'])         # true if\
    \ disabled, else false\nb.instate(['!disabled'])        # true if not disabled,\
    \ else false\nb.instate(['!disabled'], cmd)   # execute 'cmd' if not disabled\n\
    ```\n\n> Note that these commands accept an **array** of state flags as their\
    \ argument.\n\nThe full list of state flags available to themed widgets is: `active`,\
    \ `disabled`, `focus`, `pressed`, `selected`, `background`, `readonly`, `alternate`,\
    \ and `invalid`. These are described in the [themed widget reference](https://tkdocs.com/man/ttk_widget).\
    \ While all widgets have the same set of state flags, not all states are meaningful\
    \ for all widgets. It's also possible to get fancy in the `state` and `instate`\
    \ methods and specify multiple state flags at the same time.\n\nhttps://tkdocs.com/man/ttk_widget\n\
    \n> The `state` and `instate` methods replace the older `state` configuration\
    \ option (which took the values `normal` or `disabled`).\n\nThat configuration\
    \ option is actually still available for themed widgets in Tk 8.5, but \"write-only,\"\
    \ which means that changing the option calls the appropriate `state` command.\
    \ It's mainly intended as a convenience so you can specify a widget should be\
    \ disabled when you first create it. However, any changes made using the new `state`\
    \ command do not update the configuration option. To avoid confusion, you should\
    \ update your code to use the new state flags for all themed widgets.\n\n## 6.4.\
    \ Checkbutton\n\nttk.Checkbutton\nhttps://tkdocs.com/man/ttk_checkbutton\n\nA\
    \ **checkbutton** widget is like a regular button that also holds a binary value\
    \ of some kind (i.e., a toggle). When pressed, a checkbutton flips the toggle\
    \ and then invokes its callback. Checkbutton widgets are frequently used to allow\
    \ users to turn an option on or off.\n\n![](img/e444c319ec16222f00278651bee8c21d_77_0.png)\n\
    \nCheckbuttons are created using the `ttk.Checkbutton` class. Typically, their\
    \ contents and behavior are specified at the same time:\n\n```\nmeasureSystem\
    \ = StringVar()\ncheck = ttk.Checkbutton(parent, text='Use Metric',\n        \
    \               command=metricChanged, variable=measureSystem,\n             \
    \          onvalue='metric', offvalue='imperial')\n```\n\nCheckbuttons use many\
    \ of the same options as regular buttons but add a few more. The `text`, `textvariable`,\
    \ `image`, and `compound` configuration options control the display of the label\
    \ (next to the checkbox itself). Similarly, the `command` option lets you specify\
    \ a command to be called every time a user toggles the checkbutton; and the `invoke`\
    \ method will also execute the same command. The `state` and `instate` methods\
    \ allow you to manipulate the `disabled` state flag to enable or disable the checkbutton.\n\
    \n### Widget Value\n\nUnlike regular buttons, checkbuttons also hold a value.\
    \ We've seen before how the `textvariable` option can link the label of a widget\
    \ to a variable in your program. The `variable` option for checkbuttons behaves\
    \ similarly, except it links a variable to current value of the widget. The variable\
    \ is updated whenever the widget is toggled. By default, checkbuttons use a value\
    \ of `1` when the widget is checked, and `0` when not checked. These can be changed\
    \ to something else using the `onvalue` and `offvalue` options.\n\nA checkbutton\
    \ doesn't automatically set (or create) the linked variable. Therefore, your program\
    \ needs to initialize it to the appropriate starting value.\n\nWhat happens when\
    \ the linked variable contains neither the `onvalue` or the `offvalue` (or even\
    \ doesn't exist)? In that case, the checkbutton is put into a special \"tristate\"\
    \ or indeterminate mode. When in this mode, the checkbox might display a single\
    \ dash, instead of being empty or holding a checkmark. Internally, the state flag\
    \ `alternate` is set, which you can inspect via the `instate` method:\n\n```\n\
    check.instate(['alternate'])\n```\n\nWhile we've been using an instance of the\
    \ `StringVar` class, Tkinter provides other variable classes that can hold booleans,\
    \ integers, or floating-point numbers. You can always use a `StringVar` (because\
    \ the Tcl API that Tkinter uses is string-based) but can choose one of the others\
    \ if the data that will be stored in it fits the type. All are subclasses of the\
    \ base class `Variable`.\n\nWe saw in the feet to meters example that you can\
    \ call the `get` method of a `Variable` to retrieve its value or the `set` method\
    \ to provide a new value. You can also supply an initial value when you instantiate\
    \ it.\n\n```\ns = StringVar(value=\"abc\")    # default value is ''\nb = BooleanVar(value=True)\
    \   # default is False\ni = IntVar(value=10)         # default is 0\nd = DoubleVar(value=10.5)\
    \    # default is 0.0\n```\n\n## 6.5. Radiobutton\n\nttk.Radiobutton\nhttps://tkdocs.com/man/ttk_radiobutton\n\
    \nA **radiobutton** widget lets you choose between one of several mutually exclusive\
    \ choices. Unlike a checkbutton, they are not limited to just two options. Radiobuttons\
    \ are always used together in a set, where multiple radiobutton widgets are tied\
    \ to a single choice or preference. They are appropriate to use when the number\
    \ of options is relatively small, e.g., 3-5.\n\n![](img/e444c319ec16222f00278651bee8c21d_80_0.png)\n\
    \nRadiobuttons are created using the `ttk.Radiobutton` class. Typically, you'll\
    \ create and initialize several of them at once:\n\n```\nphone = StringVar()\n\
    home = ttk.Radiobutton(parent, text='Home', variable=phone,\n    value='home')\n\
    office = ttk.Radiobutton(parent, text='Office',\n    variable=phone, value='office')\n\
    cell = ttk.Radiobutton(parent, text='Mobile', variable=phone,\n    value='cell')\n\
    ```\n\nRadiobuttons share most of the same configuration options as checkbuttons.\
    \ One exception is that the `onvalue` and `offvalue` options are replaced with\
    \ a single `value` option. Each radiobutton in the set will have the same linked\
    \ variable, but a different value.\n\nWhen the variable holds the matching value,\
    \ that radiobutton will visually indicate it is selected. If it doesn't match,\
    \ the radiobutton will be unselected. If the linked variable doesn't exist, or\
    \ you don't specify one with the `variable` option, radiobuttons also display\
    \ as \"tristate\" or indeterminate. This can be checked via the `alternate` state\
    \ flag.\n\n## 6.6. Entry\n\nttk.Entry\nhttps://tkdocs.com/man/ttk_entry\n\nAn\
    \ **entry** widget presents users with a single line text field where they can\
    \ type in a string value. These can be just about anything: a name, a city, a\
    \ password, social security number, etc.\n\n![](img/e444c319ec16222f00278651bee8c21d_82_0.png)\n\
    \nEntries are created using the `ttk.Entry` class:\n\n```\nusername = StringVar()\n\
    name = ttk.Entry(parent, textvariable=username)\n```\n\nA `width` configuration\
    \ option may be specified to provide the number of characters wide the entry should\
    \ be. This allows you, for example, to display a shorter entry for a zip or postal\
    \ code.\n\n### Entry Contents\n\nWe've seen how checkbutton and radiobutton widgets\
    \ have a value associated with them. Entries do as well, and that value is usually\
    \ accessed through a linked variable specified by the `textvariable` configuration\
    \ option.\n\n> Unlike the various buttons, entries don't have a text or image\
    \ beside them to identify them. Use a separate label widget for that.\n\nYou can\
    \ also get or change the value of the entry widget without going through the linked\
    \ variable. The `get` method returns the current value, and the `delete` and `insert`\
    \ methods let you change the contents, e.g.\n\n```\nprint('current value is %s'\
    \ % name.get())\nname.delete(0, 'end')           # delete between two indices,\
    \ 0-based\nname.insert(0, 'your name')     # insert new text at a given index\n\
    ```\n\n### Watching for Changes\n\nEntry widgets don't have a `command` option\
    \ to invoke a callback whenever the entry is changed. To watch for changes, you\
    \ should watch for changes to the linked variable. See also \"Validation\", below.\n\
    \n```\ndef it_has_been_written(*args):\n    ...\nusername.trace_add(\"write\"\
    , it_has_been_written)\n```\n\nYou'll be fine if you stick with simple uses of\
    \ `trace_add` like that shown above. You might want to know that this is a small\
    \ part of a much more complex system for observing variables and invoking callbacks\
    \ when they are read, written, or deleted. You can trigger multiple callbacks,\
    \ add or delete them (`trace_remove`), and introspect them (`trace_info`).\n\n\
    > These methods also replace a now-deprecated set of older methods (`trace`, `trace_variable`,\
    \ `trace_vdelete`, and `trace_vinfo`) that should not be used.\n\nTkinter allows\
    \ you to watch for changes on a `StringVar` (or any subclass of `Variable`). Both\
    \ the older and newer tracing tools are"
  mdcn: "当按钮变为灰色，不响应鼠标移动且无法被按下时，你的程序应在命令不适用时禁用该按钮。\n\n所有主题控件都维护一个内部状态，该状态由一系列二进制标志表示。每个标志可以被设置（开启）或清除（关闭）。你可以设置或清除这些不同的标志，并使用\
    \ `state` 和 `instate` 方法检查当前设置。按钮利用 `disabled` 标志来控制用户是否可以按下按钮。例如：\n\n```\nb.state(['disabled'])\
    \           # set the disabled flag\nb.state(['!disabled'])          # clear the\
    \ disabled flag\nb.instate(['disabled'])         # true if disabled, else false\n\
    b.instate(['!disabled'])        # true if not disabled, else false\nb.instate(['!disabled'],\
    \ cmd)   # execute 'cmd' if not disabled\n```\n\n> 请注意，这些命令接受一个状态标志**数组**作为其参数。\n\
    \n主题控件可用的完整状态标志列表为：`active`、`disabled`、`focus`、`pressed`、`selected`、`background`、`readonly`、`alternate`\
    \ 和 `invalid`。这些在 [主题控件参考](https://tkdocs.com/man/ttk_widget) 中有描述。虽然所有控件都具有相同的状态标志集，但并非所有状态对所有控件都有意义。在\
    \ `state` 和 `instate` 方法中也可以进行更复杂的操作，同时指定多个状态标志。\n\nhttps://tkdocs.com/man/ttk_widget\n\
    \n> `state` 和 `instate` 方法取代了旧的 `state` 配置选项（该选项接受 `normal` 或 `disabled` 值）。\n\
    \n该配置选项实际上在 Tk 8.5 的主题控件中仍然可用，但是是“只写”的，这意味着更改该选项会调用相应的 `state` 命令。这主要是为了方便，以便你可以在首次创建控件时指定其应被禁用。但是，使用新的\
    \ `state` 命令所做的任何更改都不会更新配置选项。为避免混淆，你应该更新代码，对所有主题控件使用新的状态标志。\n\n## 6.4. 复选按钮\n\n\
    ttk.Checkbutton\nhttps://tkdocs.com/man/ttk_checkbutton\n\n**复选按钮**控件类似于普通按钮，但它还持有一个某种类型的二进制值（即一个开关）。按下时，复选按钮会切换开关，然后调用其回调函数。复选按钮控件常用于允许用户打开或关闭某个选项。\n\
    \n![](img/e444c319ec16222f00278651bee8c21d_77_0.png)\n\n复选按钮使用 `ttk.Checkbutton`\
    \ 类创建。通常，它们的内容和行为会同时指定：\n\n```\nmeasureSystem = StringVar()\ncheck = ttk.Checkbutton(parent,\
    \ text='Use Metric',\n                       command=metricChanged, variable=measureSystem,\n\
    \                       onvalue='metric', offvalue='imperial')\n```\n\n复选按钮使用许多与普通按钮相同的选项，但增加了一些。`text`、`textvariable`、`image`\
    \ 和 `compound` 配置选项控制标签（位于复选框本身旁边）的显示。类似地，`command` 选项允许你指定每次用户切换复选按钮时要调用的命令；`invoke`\
    \ 方法也会执行相同的命令。`state` 和 `instate` 方法允许你操作 `disabled` 状态标志来启用或禁用复选按钮。\n\n### 控件值\n\
    \n与普通按钮不同，复选按钮还持有一个值。我们之前已经看到 `textvariable` 选项如何将控件的标签链接到程序中的一个变量。复选按钮的 `variable`\
    \ 选项行为类似，只是它将一个变量链接到控件的当前值。每当控件被切换时，该变量就会更新。默认情况下，复选按钮在控件被选中时使用值 `1`，未选中时使用值 `0`。这些可以通过\
    \ `onvalue` 和 `offvalue` 选项更改为其他值。\n\n复选按钮不会自动设置（或创建）链接的变量。因此，你的程序需要将其初始化为适当的起始值。\n\
    \n当链接的变量既不包含 `onvalue` 也不包含 `offvalue`（甚至不存在）时会发生什么？在这种情况下，复选按钮会进入一个特殊的“三态”或不确定模式。在此模式下，复选框可能显示单个破折号，而不是为空或显示勾选标记。内部会设置状态标志\
    \ `alternate`，你可以通过 `instate` 方法检查：\n\n```\ncheck.instate(['alternate'])\n```\n\
    \n虽然我们一直在使用 `StringVar` 类的实例，但 Tkinter 提供了其他变量类，可以保存布尔值、整数或浮点数。你总是可以使用 `StringVar`（因为\
