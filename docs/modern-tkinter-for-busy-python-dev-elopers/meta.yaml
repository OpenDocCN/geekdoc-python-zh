    # Providing a Window Menu


    On macOS, a "Window" menu contains items like minimize, zoom, bring all to front,
    etc. It also includes a list of currently open windows. Before that list, other
    application-specific items are sometimes provided.

    By providing a menu named `.window`, this standard window menu will be added.
    Tk automatically keeps it in sync with all your toplevel windows, without any
    extra code on your part. You can also add any application-specific commands to
    this menu. These appear before the list of your windows.


    ```

    windowmenu = Menu(menubar, name=''window'')

    menubar.add_cascade(menu=windowmenu, label=''Window'')

    ```


    # Other Menu Handlers


    You saw previously how handling certain standard menu items required you to define
    Tcl callback procedures, e.g., `tk::mac::ShowPreferences` and `tk::mac::ShowHelp`.

    There are several other callbacks that you can define. For example, you might
    intercept the Quit menu item, prompting users to save their changes before quitting.
    Here is the complete list:


    `tk::mac::ShowPreferences`:

    Called when the "Preferences..." menu item is selected.'
