  md: 'Calling the `add` method adds a new pane at the end of the list of panes. The
    `insert position subwindow` method allows you to place the pane at the given position
    in the list of panes (0..n-1). If the pane is already managed by the panedwindow,
    it will be moved to the new position. You can use the `forget subwindow` to remove
    a pane from the panedwindow (you can also pass a position instead of a subwindow).


    You can assign relative weights to each pane so that if the overall panedwindow
    resizes, certain panes will be allocated more space than others. As well, you
    can adjust the position of each sash between items in the panedwindow. See the
