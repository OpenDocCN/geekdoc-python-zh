    # Multiple Monitors


    While normally you shouldn''t have to pay attention to it, if you do have multiple
    monitors on your system and want to customize things a bit, there are some tools
    in Tk to help.


    First, there are two ways that multiple monitors can be represented. The first
    is with logically separate displays. This is often the case on X11 systems, though
    it can be changed, e.g., using the `xrandr` system utility. A downside of this
    model is that once a window is created on a screen, it can''t be moved to a different
    one. You can determine the screen that a Tk window is running on, which looks
    something like `:0.0` (an X11-formatted display name).


    ```

    root.winfo_screen()

    ```


    When first creating a `toplevel` you can specify the screen it should be created
    on using the `screen` configuration option.


    > Different monitors may have different resolutions, color depths, etc. You''ll
    notice that all the screen information calls we just covered are methods invoked
    on a specific widget. They will return information about whatever screen that
    window is located on.


    Alternatively, multiple monitors can also be represented as one big virtual display,
    which is the case on macOS and Windows. When you ask for information about the
    screen, Tk will return information on the *primary monitor*. For example, if you
    have two Full HD monitors side-by-side, the screen resolution will be reported
    as 1920 x 1080, not 3840 x 1080. This is probably a good thing; it means that
    if we''re positioning or sizing windows, we don''t need to worry about multiple
    monitors, and everything will just show up correctly on the primary monitor.


    What if a user moves a window from the primary monitor to a different one? If
    you ask for its position, it will be relative to the'
