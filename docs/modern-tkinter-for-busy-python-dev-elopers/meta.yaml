    # 17.5. Sound Difficult to you?


    So you now know that styles are made up of elements, which have a variety of options,
    and are composed together in a particular layout. You can change various options
    on styles to make all widgets using the style appear differently. Any widgets
    using that style take on the appearance that the style defines. Themes collect
    an entire set of related styles, making it easy to change the appearance of your
    entire user interface.


    So what makes styles and themes so difficult in practice? Three things. First:


    > You can only modify options for a style, not element options (except sometimes).


    We talked earlier about how to discover what elements were used in the style by
    examining the style''s layout, and also how to discover what options were available
    for each element. But when we went to make changes to a style, we seemed to be
    configuring an option for the *style*, without specifying an individual element.
    What''s going on?


    Again, using our button example, we had an element `Button.label`, which, among
    other things, had a `font` configuration option. What happens is that when that
    `Button.label` element is drawn, it looks at the `font` configuration option set
    on the *style* to determine what font to draw itself in.


    > To understand why, you need to know that when a style includes an element as
    a piece of it, that element does not maintain any (element-specific) storage.
    In particular, it does not store any configuration options itself. When it needs
    to retrieve options, it does so via the containing style, which is passed to the
    element. Individual elements, therefore, are "flyweight" objects in GoF pattern
    parlance.


    Similarly, any other elements will lookup their configuration options from options
    set on the style. What if two elements use the same configuration option (like
    a background color)? Because there is only one background configuration option,
    stored in the style, both elements will use the same background color. You can''t
    have one element use one background color, and the other use a different background
    color.'
- md: 'Except when you can. There are a few nasty, widget-specific things called **sublayouts**
    in the current implementation, which let you sometimes modify just a single element,
    via configuring an option like `TButton.Label` (rather than just `TButton`, the
    name of the style).


    Some styles also provide additional configuration options that let you specify
    what element the option effects. For example, the `TCheckbutton` style provides
    a `background` option for the main part of the widget and an `indicatorbackground`
    option for the box that shows whether it is checked.


    Are the cases where you can do this documented? Is there some way to introspect
    to determine when you can do this? Sometimes to both (believe it or not, this
    is an improvement; the answer to both used to be a clear "no"). You can sometimes
    find **some** of the style''s options by calling the style''s `configure` method
    without providing any new configuration options. The reference manual pages for
    each themed widget now generally include a **styling options** section that lists
    options that **may** be available to change.


    This is one area of the themed widget API that continues to evolve over time.


    The second difficulty is also related to modifying style options:


    > Options that are available don''t necessarily have an effect, and it''s not
    an error to modify a bogus option.


    You''ll sometimes try to change an option that is supposed to exist according
    to element options, but it will have no effect. For example, you can''t modify
    the background color of a button in the `aqua` theme used by macOS. While there
    are valid reasons for these cases, it''s not easy to discover them, which can
    make experimenting frustrating at times.


    Perhaps more frustrating when you''re experimenting is that specifying an `incorrect`
    style name or option name does not generate an error. When doing a `configure`
    or `lookup` you can, in fact, specify any name at all for a style, and specify
    any name at all for an option. So if you''re bored with the `background` and `font`
    options, feel free to configure a `dowhatimean` option. It may not do anything,
    but it''s not an error. Again, it may make it hard to know what you should be
    modifying and what you shouldn''t.


    > This is one of the downsides of having a very lightweight and dynamic system.
    You can create new styles by just providing their name when configuring style
    options; this means you don''t need to explicitly create a style object. At the
    same time, this does open itself to errors. It''s also not possible to find out
    what styles currently exist or are used. And because style options are really
    just a front end for element options, and the elements in a style can change at
    any time, it''s not necessarily obvious that options should be restricted to those
    referred to by current elements alone, which may themselves not all be introspectable.


    Finally, here is the last thing that makes styles and themes so difficult:


    > The elements available, the names of those elements, which options are available
    or have an effect for each of those elements, and which are used for a particular
    widget can be different in every theme.


    So? Remember, the default theme for each platform (Windows, macOS, and Linux)
    is different (which is a good thing). Some implications of this:


    1.  If you want to define a new type of widget (or a variation of an existing
    widget) for your application, you''ll need to do it separately and differently
    for each theme your application uses (i.e., at least three for a cross-platform
    application).

    2.  The elements and options available will differ for each theme/platform, meaning
    you may have to come up with a quite different customization approach for each
    theme/platform.

    3.  The elements, names, and element options available with each theme are not
    typically documented (outside of reading the theme definition files themselves),
    but are generally identified via theme introspection (which we''ll see soon).
    Because all themes aren''t available on all platforms (e.g., `aqua` is only available
    on macOS), you''ll need ready access to every platform and theme you need to run
    on.


    Consider trying to customize a button. You know it uses the `TButton` style. But
    that style is implemented using a different theme on each platform. If you examine
    the layout of that style in each theme, you''ll discover each uses different elements,
    arranged differently. If you try to find the advertised options available for
    each element, you see those are different too. And of course, even if an option
    is nominally available, it may not have an effect).


    The bottom line is that in classic Tk, where you had the ability to modify any
    of a large set of attributes for an individual widget, you''d be able to do something
    on one platform and it would sorta-kinda work (but probably need tweaking) on
    others. In themed Tk, the easy option just isn''t there, and you''re pretty much
    forced to do it the right way if you want your application to work with multiple
    themes/platforms. It''s more work upfront.


    ## 17.6. Advanced: More on Elements


    While that''s about as far as we''re going to go on styles and themes in this
    book, for curious users and those who want to delve further into creating new
    themes, we can provide a few more interesting tidbits about elements.


    Because elements are the building blocks of styles and themes, it begs the question
    of "where do elements come from?" Practically speaking, we can say that elements
    are normally created in C code and conform to a particular API that the theming
    engine understands.


    At the very lowest level, elements come from something called an *element factory*.
    At present, there is a default one, which most themes use, and uses Tk drawing
    routines to create elements. A second allows you to create elements from images
    and is actually accessible at the script level using the `ttk::style element create`
    method (from Tcl). Any image format supported by Tk is available, including scalable
    image formats like SVG, if you have the right extension. Finally, there is a third,
    Windows-specific engine using the underlying "Visual Styles" platform API.


    If a theme uses elements created via a platform''s native widgets, the calls to
    use those native widgets will normally appear within that theme''s element specification
    code. Of course, themes whose elements depend on native widgets or API calls can
    only run on the platforms that support them.


    Themes will then take a set of elements and use those to assemble the styles that
    are actually used by the widgets. And given the whole idea of themes is that several
    styles can share the same appearance, it''s not surprising that different styles
    share the same elements.


    So while the `TButton` style includes a `Button.padding` element, and the `TEntry`
    style includes an `Entry.padding` element, underneath, these padding elements
    are more than likely one and the same. They may appear differently, but that''s
    because of different configuration options, which as we recall, are stored in
    the style that uses the element.


    It''s also probably not surprising to find out that a theme can provide a set
    of common options that are used as defaults for each style if the style doesn''t
    specify them otherwise. This means that if pretty much everything in an entire
    theme has a green background, the theme doesn''t need to explicitly say this for
    each style. This uses a root style named `.`. After all, if `Fun.TButton` can
    inherit from `TButton`, why can''t `TButton` inherit from `.`?


    Finally, it''s worth having a look at how existing themes are defined, both at
    the C code level in Tk''s C library, but also via the Tk scripts found in Tk''s
    "library/ttk" directory or in third-party themes. Search for `Ttk_RegisterElementSpec`
    in Tk''s C library to see how elements are specified.


    ## 18. Case Study: IDLE Modernization


    This chapter presents a case study of modernizing the appearance of a substantial
    Tk-based application.


    > **F.Y.I.** This chapter is currently (May 2019) a work in progress. The code
    here is slowly finding its way into the Python source tree, but most is not there
    yet. You can find temporary snapshots on [GitHub](https://github.com).


    [IDLE](https://docs.python.org/3/library/idle.html) (Integrated DeveLopment Environment)
    is the standard Python development environment that is bundled with every Python
    release. It consists of an interactive Python shell, editors with syntax highlighting,
    a debugger, etc. Its user interface is written in Tkinter.'
  mdcn: '除非你能做到。在当前实现中，存在一些棘手的、特定于控件的**子布局**，它们有时允许你仅通过配置类似`TButton.Label`（而非控件样式名称`TButton`）的选项来修改单个元素。


    一些样式还提供额外的配置选项，允许你指定该选项影响哪个元素。例如，`TCheckbutton`样式为控件主体提供了一个`background`选项，并为显示是否选中的方框提供了一个`indicatorbackground`选项。


    这些情况是否有文档记录？是否有某种内省方法来确定何时可以这样做？有时两者都有（信不信由你，这已经是一种改进；过去这两个问题的答案都是明确的“否”）。你有时可以通过调用样式的`configure`方法（不提供任何新的配置选项）来找到该样式的**部分**选项。每个主题控件的参考手册页面现在通常包含一个**样式选项**部分，列出了**可能**可用于更改的选项。


    这是主题控件API中一个持续发展的领域。


    第二个困难也与修改样式选项有关：


    > 可用的选项不一定有效果，修改一个无效的选项也不会产生错误。


    你有时会尝试更改一个根据元素选项应该存在的选项，但它不会产生任何效果。例如，你无法修改macOS使用的`aqua`主题中按钮的背景颜色。虽然这些情况有合理的原因，但发现它们并不容易，这有时会让实验变得令人沮丧。


    在实验过程中，更令人沮丧的可能是指定一个`不正确`的样式名称或选项名称不会产生错误。事实上，在执行`configure`或`lookup`时，你可以为样式指定任何名称，也可以为选项指定任何名称。所以，如果你厌倦了`background`和`font`选项，可以随意配置一个`dowhatimean`选项。它可能不起作用，但这不是错误。同样，这可能会让你难以知道应该修改什么，不应该修改什么。


    > 这是拥有一个非常轻量级和动态系统的缺点之一。你可以在配置样式选项时仅通过提供名称来创建新样式；这意味着你不需要显式创建样式对象。同时，这也确实容易出错。也无法找出当前存在或正在使用的样式。而且由于样式选项实际上只是元素选项的前端，并且样式中的元素可以随时更改，因此不一定明显的是，选项是否应该仅限于当前元素所引用的那些选项，而这些元素本身可能并非全部都可内省。


    最后，以下是使样式和主题如此困难的最后一点：


    > 可用的元素、这些元素的名称、每个元素可用或有效的选项，以及特定控件使用的选项，在每个主题中都可能不同。


    那么？请记住，每个平台（Windows、macOS和Linux）的默认主题是不同的（这是件好事）。这带来了一些影响：


    1.  如果你想为你的应用程序定义一种新类型的控件（或现有控件的变体），你需要为你的应用程序使用的每个主题（即，对于跨平台应用程序至少三个）分别且以不同的方式完成。

    2.  每个主题/平台可用的元素和选项会有所不同，这意味着你可能需要为每个主题/平台设计出相当不同的自定义方法。

    3.  每个主题可用的元素、名称和元素选项通常没有文档记录（除了阅读主题定义文件本身），但通常通过主题内省（我们很快会看到）来识别。因为并非所有主题在所有平台上都可用（例如，`aqua`仅在macOS上可用），你需要能够随时访问你需要运行的每个平台和主题。


    考虑尝试自定义一个按钮。你知道它使用`TButton`样式。但该样式在每个平台上使用不同的主题实现。如果你检查该样式在每个主题中的布局，你会发现每个主题使用不同的元素，并且排列方式不同。如果你尝试查找每个元素的可用选项，你会发现这些选项也不同。当然，即使一个选项名义上可用，它也可能没有效果。


    关键在于，在经典Tk中，你能够修改单个控件的大量属性中的任何一个，你可以在一个平台上做一些事情，它在其他平台上可能也能工作（但可能需要调整）。在主题Tk中，这个简单的选项不存在了，如果你想让你的应用程序与多个主题/平台兼容，你几乎被迫以正确的方式去做。这需要更多的前期工作。


    ## 17.6. 高级：更多关于元素的内容


    虽然本书关于样式和主题的内容到此为止，但对于好奇的用户和那些想进一步深入创建新主题的人，我们可以提供更多关于元素的有趣细节。


    因为元素是样式和主题的构建块，这就引出了“元素从哪里来？”的问题。实际上，我们可以说元素通常是在C代码中创建的，并符合主题引擎理解的特定API。


    在最底层，元素来自一种叫做*元素工厂*的东西。目前，有一个默认的工厂，大多数主题都使用它，并使用Tk绘图例程来创建元素。第二个允许你从图像创建元素，实际上可以通过`ttk::style
    element create`方法（来自Tcl）在脚本级别访问。Tk支持的所有图像格式都可用，包括可缩放的图像格式（如SVG），如果你有合适的扩展。最后，还有一个特定于Windows的引擎，使用底层的“Visual
    Styles”平台API。


    如果一个主题使用通过平台原生控件创建的元素，那么使用这些原生控件的调用通常会出现在该主题的元素规范代码中。当然，其元素依赖于原生控件或API调用的主题只能在支持它们的平台上运行。


    然后，主题将使用一组元素来组装控件实际使用的样式。考虑到主题的整个理念是多个样式可以共享相同的外观，不同的样式共享相同的元素也就不足为奇了。


    因此，虽然`TButton`样式包含一个`Button.padding`元素，`TEntry`样式包含一个`Entry.padding`元素，但在底层，这些填充元素很可能是同一个。它们可能看起来不同，但那是因为不同的配置选项，正如我们回忆的，这些选项存储在使用该元素的样式中。


    发现一个主题可以提供一组通用选项，如果样式没有另行指定，则用作每个样式的默认值，这可能也不足为奇。这意味着如果整个主题中的几乎所有内容都有绿色背景，主题就不需要为每个样式明确说明这一点。这使用了一个名为`.`的根样式。毕竟，如果`Fun.TButton`可以从`TButton`继承，为什么`TButton`不能从`.`继承呢？


    最后，值得看看现有主题是如何定义的，既在Tk的C库中的C代码级别，也在Tk的“library/ttk”目录或第三方主题中的Tk脚本中。在Tk的C库中搜索`Ttk_RegisterElementSpec`以查看元素是如何指定的。


    ## 18. 案例研究：IDLE现代化


    本章介绍了一个将基于Tk的大型应用程序外观现代化的案例研究。


    > **供参考。** 本章目前（2019年5月）仍在进行中。这里的代码正慢慢进入Python源代码树，但大部分尚未到位。你可以在[GitHub](https://github.com)上找到临时快照。


    [IDLE](https://docs.python.org/3/library/idle.html)（集成开发环境）是随每个Python版本捆绑的标准Python开发环境。它包括一个交互式Python
    shell、带语法高亮的编辑器、调试器等。其用户界面是用Tkinter编写的。'
