    menu (the one with the apple icon, just to the left of the application menu).
    Despite that, we really mean the application menu, even though Tk still refer
    to it as the "apple" menu. This is a holdover from pre-OS X days when these sorts
    of items did go in the actual apple menu, and there was no separate application
    menu.


    So, in other words, in your program, make sure you:


    +   1. Create a menubar for each window or the root window. *Do not attach the
    menubar to the window yet!*

    2. Add a menu to the menubar named `.apple`. It will be used as the application
    menu.

    3. The menu will automatically be named the same as the application binary; if
    you want to change this, rename (or make a copy of) the binary used to run your
    script.

    4. Add the items you want to appear at the top of the application menu, i.e.,
