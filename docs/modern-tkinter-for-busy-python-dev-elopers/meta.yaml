  md: '# Customizing Appearance


    We previously saw the `width` and `height` configuration options for text widgets.
    Several others control its overall appearance. The most useful are:


    +   - `foreground:` color to draw the text in

    - `background:` background color of the widget

    - `padx, pady:` extra padding along the inside border of the widget

    - `borderwidth:` width of the border around widget

    - `relief:` border style: `flat`, `raised`, `sunken`, `solid`, `ridge`, `groove`


    # Wrapping and Scrolling


    What if some lines of text in the widget are very long, longer than the width
    of the widget? By default, the text wraps around to the next line. This behavior
    can be changed with the `wrap` configuration option. It defaults to `char`, meaning
    wrap lines at any character. Other options are `word` to wrap lines only at word
    breaks (e.g., spaces), and `none` meaning to not wrap lines at all. In the latter
    case, some text of longer lines won''t be visible unless we attach a horizontal
    scrollbar to the widget. (Users can also scroll through the text using arrow keys,
    even if scrollbars aren''t present).


    Scrollbars, both horizontal and vertical, can be attached to the text widget in
    the same way as with other widgets, e.g., canvas, listbox.


    ```

    t = Text(root, width = 40, height = 5, wrap = "none")

    ys = ttk.Scrollbar(root, orient = ''vertical'', command = t.yview)

    xs = ttk.Scrollbar(root, orient = ''horizontal'', command = t.xview)

    t[''yscrollcommand''] = ys.set

    t[''xscrollcommand''] = xs.set

    t.insert(''end'', "Lorem ipsum...\n...\n...")

    t.grid(column = 0, row = 0, sticky = ''nwes'')

    xs.grid(column = 0, row = 1, sticky = ''we'')

    ys.grid(column = 1, row = 0, sticky = ''ns'')

    ```'
