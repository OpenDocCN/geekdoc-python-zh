    # Widget Value


    Unlike regular buttons, checkbuttons also hold a value. We''ve seen before how
    the `textvariable` option can link the label of a widget to a variable in your
    program. The `variable` option for checkbuttons behaves similarly, except it links
    a variable to current value of the widget. The variable is updated whenever the
    widget is toggled. By default, checkbuttons use a value of `1` when the widget
    is checked, and `0` when not checked. These can be changed to something else using
    the `onvalue` and `offvalue` options.


    A checkbutton doesn''t automatically set (or create) the linked variable. Therefore,
    your program needs to initialize it to the appropriate starting value.


    What happens when the linked variable contains neither the `onvalue` or the `offvalue`
    (or even doesn''t exist)? In that case, the checkbutton is put into a special
    "tristate" or indeterminate mode. When in this mode, the checkbox might display
    a single dash, instead of being empty or holding a checkmark. Internally, the
    state flag `alternate` is set, which you can inspect via the `instate` method:


    ```

    check.instate([''alternate''])

    ```


    While we''ve been using an instance of the `StringVar` class, Tkinter provides
    other variable classes that can hold booleans, integers, or floating-point numbers.
    You can always use a `StringVar` (because the Tcl API that Tkinter uses is string-based)
    but can choose one of the others if the data that will be stored in it fits the
    type. All are subclasses of the base class `Variable`.


    We saw in the feet to meters example that you can call the `get` method of a `Variable`
    to retrieve its value or the `set` method to provide a new value. You can also
    supply an initial value when you instantiate it.'
