  md: '# 6.1. Frame


    ttk.Frame

    https://tkdocs.com/man/ttk_frame


    A **frame** is a widget that displays as a simple rectangle. Frames help to organize
    your user interface, often both visually and at the coding level. Frames often
    act as master widgets for a geometry manager like `grid`, which manages the slave
    widgets contained within the frame.


    ![](img/e444c319ec16222f00278651bee8c21d_65_0.png)


    Frames are created using the `ttk.Frame` class:


    ```

    python

    frame = ttk.Frame(parent)

    ```


    Frames can take several different configuration options, which can alter how they
    are displayed.


    # Requested Size


    Typically, the size of a frame is determined by the size and layout of any widgets
    within it In turn, this is controlled by the geometry manager that manages the
    contents of the frame itself).'
  merge: -1
  pgno: 65
- img_proc: true
  md: 'If, for some reason, you want an empty frame that does not contain other widgets,
    you can instead explicitly set its size using the `width` and/or `height` configuration
    options (otherwise, you''ll end up with a very small frame indeed).


    Screen distances such as width and height are usually specified as a number of
    pixels screen. You can also specify them via one of several suffixes. For example,
    `350` means 350 pixels, `350c` means 350 centimeters, `350m` means 350 millimeters,
    `350i` means 350 inches, and `350p` means 350 printer''s points (1/72 inch).


    > Remember, if you request that a frame (or any widget) to have a given size,
    the geometry manager has the final say. If things aren''t showing up the way you
    want them, make sure to check there too.


    # Padding


    The `padding` configuration option is used to request extra space around the inside
    of the widget. If you''re putting other widgets inside the frame, there will be
    a bit of a margin all the way around. You can specify the same padding for all
    sides, different horizontal and vertical padding, or padding for each side separately.


    ```

    f[''padding''] = 5              # 5 pixels on all sides

    f[''padding''] = (5,10)          # 5 on left and right, 10 on top and bottom

