  md: '# 7.6. Additional Grid Features


    If you look at the [reference documentation](https://tkdocs.com/man/grid) for
    `grid`, you''ll see many other things you can do with grid. Here are a few of
    the more useful ones.


    https://tkdocs.com/man/grid


    # Querying and Changing Grid Options


    Like widgets themselves, it''s easy to introspect the various grid options or
    change them. Setting options when you first grid the widget is certainly convenient,
    but you can change them anytime you''d like.


    The `slaves` method will tell you all the widgets that have been gridded inside
    a master, or optionally those within just a certain column or row. The `info`
    method will return a list of all the grid options for a widget and their values.
    Finally, the `configure` method lets you change one or more grid options on a
    widget.


    These are illustrated in this interactive session:


    ```

    >>> content.grid_slaves()

    [<tkinter.ttk.Button object .!frame.!button2>,

    <tkinter.ttk.Button object .!frame.!button>,

    <tkinter.ttk.Checkbutton object .!frame.!checkbutton3>,

    <tkinter.ttk.Checkbutton object .!frame.!checkbutton2>,

    <tkinter.ttk.Checkbutton object .!frame.!checkbutton>,

    <tkinter.ttk.Entry object .!frame.!entry>,

    <tkinter.ttk.Label object .!frame.!label>, <tkinter.ttk.Frame object .!frame.!frame>]

    >>> for w in content.grid_slaves(): print(w)

    ...

    .!frame.!button2

    .!frame.!button

    .!frame.!checkbutton3

    .!frame.!checkbutton2

    .!frame.!checkbutton

    .!frame.!entry

    .!frame.!label

    .!frame.!frame

    ```'
  merge: -1
  pgno: 102
- img_proc: true
  md: '```

    >>> for w in content.grid_slaves(row=3): print(w)

    ...

    .!frame.!button2

    .!frame.!button

    .!frame.!checkbutton3

    .!frame.!checkbutton2

    .!frame.!checkbutton

    >>> for w in content.grid_slaves(column=0): print(w)

    ...

    .!frame.!checkbutton

    .!frame.!frame

    >>> namelbl.grid_info()

    {''in'': <tkinter.ttk.Frame object .!frame>, ''column'': 3,

    ''row'': 0, ''columnspan'': 2, ''rowspan'': 1,

    ''ipadx'': 0, ''ipady'': 0, ''padx'': 5, ''pady'': 0, ''sticky'': ''nw''}

    >>> namelbl.grid_configure(sticky=(E,W))

    >>> namelbl.grid_info()

    {''in'': <tkinter.ttk.Frame object .!frame>, ''column'': 3,

    ''row'': 0, ''columnspan'': 2, ''rowspan'': 1,

    ''ipadx'': 0, ''ipady'': 0, ''padx'': 5, ''pady'': 0, ''sticky'': ''ew''}

    ```


    # Internal Padding


    You saw how the `padx` and `pady` grid options added extra space around the outside
    of a widget. There''s also a less used type of padding called "internal padding"
    controlled by the grid options `ipadx` and `ipady`.


    The difference can be subtle. Let''s say you have a frame that''s 20x20, and specify
    normal (external) padding of 5 pixels on each side. The frame will request a 20x20
    rectangle (its natural size) from the geometry manager. Normally, that''s what
    it will be granted, so it''ll get a 20x20 rectangle for the frame, surrounded
    by a 5-pixel border.


    With internal padding, the geometry manager will effectively add the extra padding
    to the widget when figuring out its natural size, as if the widget has requested
    a 30x30 rectangle. If the frame is centered, or attached to a single side or corner
    (using `sticky`), we''ll end up with a 20x20 frame with extra space around it.
    If, however, the frame is set to stretch (i.e., a `sticky` value of `we`, `ns`,
    or `nwes`), it will fill the extra space, resulting in a 30x30 frame, with no
    border.


    # Forget and Remove'
  merge: -1
  pgno: 103
- img_proc: true
  md: 'The `forget` method of grid removes slaves from the grid they''re currently
    part of. It takes a list of one or more slave widgets as arguments. This does
    not destroy the widget altogether but takes it off the screen as if it had not
    been gridded in the first place. You can grid it again later, though any grid
    options you''d originally assigned will have been lost.


    The `remove` method of grid works the same, except that the grid options will
    be remembered if you `grid` it again later.'
  merge: -1
