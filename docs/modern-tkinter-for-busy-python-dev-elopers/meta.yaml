    # 17.1. Using Existing Themes


    Before delving into the weightier matters of tastefully and selectively modifying
    and applying styles to improve the usability of your application and cleanliness
    of your code, let''s deal with the fun bits: using existing themes to completely
    reskin your application.

    Themes are identified by a name. You can obtain the names of all available themes:


    ```

    >>> s = ttk.Style()

    >>> s.theme_names()

    (''aqua'', ''step'', ''clam'', ''alt'', ''default'', ''classic'')

    ```


    > Tkinter encapsulates all style manipulations in the ttk.Style class. We''ll
    therefore need an instance of that class for this and other operations.


    ![](img/e444c319ec16222f00278651bee8c21d_245_0.png)


    Besides the built-in themes (alt, default, clam, and classic), macOS includes
    a theme named aqua to match the system-wide style, while Windows includes themes
    named vista, winxpnative, and winnative.

    Only one theme can ever be active at a time. To obtain the name of the theme currently
    in use, use the following:


    ```

    >>> s.theme_use()

    ''aqua''

    ```'
  - '[PAGE 246]


    > This API, which was originally targeted for Tk 8.6, was back-ported to Tk 8.5.9.
    If you''re using an earlier version of Tk getting this info is a bit trickier.


    Switching to a new theme can be done with:


    ```

    s.theme_use(''themename'')

    ```


    What does this actually do? Obviously, it sets the current theme to the indicated
    theme. Doing this, therefore, replaces all the currently available styles with
    the set of styles defined by the theme. Finally, it refreshes all widgets, so
    that they take on the appearance described by the new theme.


    # Third-Party Themes


    With a bit of looking around, you can find some existing add-on themes available
    for download. A good starting point is [https://wiki.tcl-lang.org/page/List+of+ttk+Themes](https://wiki.tcl-lang.org/page/List+of+ttk+Themes).


    Though themes can be defined in any language that Tk supports, most that you will
    find are written in Tcl. How can you install them so that they are available to
    use in your application?


    As an example, let''s use the "awdark" theme, available from [https://sourceforge.net/projects/tcl-awthemes/](https://sourceforge.net/projects/tcl-awthemes/).
    Download and unzip the `awthemes-*.zip` file somewhere. You''ll notice it contains
    a bunch of `.tcl` files, a subdirectory `i` containing more directory with images
    used by the theme, etc.


    One of the files is named `pkgIndex.tcl`. This identifies it as a Tcl package,
    which is similar to a Python module. If we look inside, you''ll see a bunch of
    lines like `package ifneeded awdark 7.7`. Here, `awdark` is the name of the package,
    and `7.7` is its version number. It''s not unusual, as in this case, for a single
    `pkgIndex.tcl` file to provide several packages.


    To use it, we need to tell Tcl where to find the package (via adding its directory
    to Tcl''s `auto_path`) and the name of the package to use.


    ```

    root.tk.call(''lappend'', ''auto_path'', ''/full/path/to/awthemes-9.3.1'')

    root.tk.call(''package'', ''require'', ''awdark'')

    ```'
- md: "If the theme is instead implemented as a single Tcl source file, without a\
    \ `pkgIndex.tcl`, you can make it available like this:\n\n```\nroot.tk.call('source',\
    \ '/full/path/to/themefile.tcl')\n```\n\nYou should now be able to use the theme\
    \ in your own application, just as you would any of the built-in themes.\n\n##\
    \ 17.2. Using Styles\n\nWe'll now tackle the more difficult issue of how to take\
    \ full advantage of styles and themes within your application, not just reskinning\
    \ it with an existing theme.\n\n## Definitions\n\nWe first need to introduce a\
    \ few essential concepts.\n\n## Widget Class\n\nA *widget class* identifies the\
    \ type of a particular widget, whether it is a button, a label, a canvas, etc.\
    \ All themed widgets have a default class. Buttons have the class `TButton`, labels\
    \ `TLabel`, etc.\n\n## Widget State\n\nA *widget state* allows a single widget\
    \ to have more than one appearance or behavior, depending on things like mouse\
    \ position, different state options set by the application, and so on.\n\nAs you'll\
    \ recall, all themed widgets maintain a set of binary state flags, accessed by\
    \ the `state` and `instate` methods. The flags are: `active`, `disabled`, `focus`,\
    \ `pressed`, `selected`, `background`, `readonly`, `alternate`, and `invalid`.\
    \ All widgets have the same set of state flags, though they may ignore some of\
    \ them (e.g., a label widget would likely ignore an `invalid` state flag). See\
    \ the [themed widget](https://tkdocs.com/man/ttk_widget) page in the reference\
    \ manual for the exact meaning of each state flag.\n\n## Style\n\nA *style* describes\
    \ the appearance (or appearances) of a widget class. All themed widgets having\
    \ the same widget class will have the same appearance(s).\n\nStyles are referred\
    \ to by the name of the widget class they describe. For example, the style `TButton`\
    \ defines the appearance of all widgets with the class `TButton`.\nStyles know\
    \ about different states, and one style can define different appearances based\
    \ on a widget's state. For example, a style can specify how a widget's appearance\
    \ should change if the `pressed` state flag is set.\n\n## Theme\n\nA *theme* is\
    \ a collection of styles. While each style is widget-specific (one for buttons,\
    \ one for entries, etc.), a theme collects many styles together. All styles in\
    \ the same theme will be designed to visually \"fit\" together with each other.\
    \ (Tk doesn't technically restrict bad design or judgment, unfortunately!)\nUsing\
    \ a particular theme in an application really means that, by default, the appearance\
    \ of each widget will be controlled by the style within that theme responsible\
    \ for that widget class.\n\n## Style Names\n\nEvery style has a name. If you're\
    \ going to modify a style, create a new one, or use a style for a widget, you\
    \ need to know its name.\nHow do you know what the names of the styles are? If\
    \ you have a particular widget, and you want to know what style it is currently\
    \ using, you can first check the value of its `style` configuration option. If\
    \ that is empty, it means the widget is using the *default* style for the widget.\
    \ You can retrieve that via the widget's class. For example:\n\n```\n>>> b = ttk.Button()\n\
    >>> b['style']\n''\n>>> b.winfo_class()\n'TButton'\n```\n\nIn this case, the style\
    \ that is being used is `TButton`. The default styles for other themed widgets\
    \ are named similarly, e.g., `TEntry`, `TLabel`, etc.\n\n> It's always wise to\
    \ check the specifics. For example, the treeview widget's class is `Treeview`,\
    \ **not** `TTreeview`.\n\nBeyond the default styles, though, styles can be named\
    \ pretty much anything. You might create your own style (or use a theme that has\
    \ a style) named `FunButton`, `NuclearReactorButton`, or even `GuessWhatIAm` (not\
    \ a smart choice).\nMore often, you'll find names like `Fun.TButton` or `NuclearReactor.TButton`,\
    \ which suggest variations of a base style; as you'll see, this is something Tk\
    \ supports for creating and modifying styles.\n\n> The ability to retrieve a list\
    \ of all currently available styles is currently not supported. This will likely\
    \ appear in Tk 8.7 in the form of a new command, `ttk::style theme styles` to\
    \ return the list of styles implemented by a theme. It also proposes adding a\
    \ `style` method for all widgets, so you don't have to examine both the widget's\
    \ `style` configuration option and its class. See [TIP #584](https://tip.tcl.tk/584).\n\
    \n## Applying a Style\n\nTo use a style means to apply that style to an individual\
    \ widget. If you know the name of the style you want to use, and which widget\
    \ to apply it to, it's easy. Setting the style can be done at creation time:\n\
    \n```\nb = ttk.Button(parent, text='Hello', style='Fun.TButton')\n```\n\nAs well,\
    \ a widget's style can be changed at any time with the `style` configuration option:\n\
    \n```\nb['style'] = 'Emergency.TButton'\n```\n\n## Creating a Simple Style\n\n\
    So how do we create a new style like `Emergency.TButton`?\nIn situations like\
    \ this, you're creating a new style similar to an existing one but varies in a\
    \ certain aspect. This is the most common reason for creating new styles.\nFor\
    \ example, you want most of the buttons in your application to keep their normal\
    \ appearance, but have certain \"emergency\" buttons highlighted differently.\
    \ Creating a new style (e.g., `Emergency.TButton`), derived from the base style\
    \ (`TButton`), is the appropriate thing to do.\n\nPrepending another name (`Emergency`)\
    \ followed by a dot onto an existing style creates a new style derived from the\
    \ existing one. The new style will have exactly the same options as the existing\
    \ one except for the indicated differences:\n\n```\ns.configure('Emergency.TButton',\
    \ font='helvetica 24',\n            foreground='red', padding=10)\n```\n\nYou\
    \ could then apply that style to an individual button widget using its `style`\
    \ configuration option, as shown earlier. Every other button widget would retain\
    \ its normal appearance.\n\nHow do you know what options are available to change\
    \ for a given style? That requires diving a little deeper inside styles.\n\n>\
    \ ![UPGRADE](image_placeholder)\n\nYou may have existing code using the classic\
    \ widgets that you'd like to move to the themed widgets. Most appearance changes\
    \ made to classic widgets through configuration options can probably be dropped.\
    \ For those that can't, you may need to create a new style, as shown above.\n\n\
    State-specific appearance changes can be treated similarly. In classic Tk, several\
    \ widgets supported a few state changes via configuration options. For example,\
    \ setting a button's `state` option to `disabled` would draw it with a greyed-out\
    \ label. Some allowed an additional state, `active`, which represented a different\
    \ appearance. You could control the appearance of the widget in different states\
    \ via additional configuration options, e.g., `foreground`, `disabledforeground`,\
    \ and `activeforeground`.\n\nState changes via configuration options should be\
    \ changed to use the `state` method on themed widgets. Configuration options to\
    \ modify the appearance of a widget when in a particular state should be dealt\
    \ with in the style.\n\nClassic Tk widgets also supported a very primitive form\
    \ of styles that you may encounter. This used the **option database**, a now-obscure\
    \ front end to X11-style configuration files.\n\nIn classic Tk, all buttons had\
    \ the same class (`Button`), all labels had the same class (`Label`), etc. You\
    \ could use this widget class both for introspection and for changing options\
    \ globally through the option database. It let you say, for example, that all\
    \ buttons should have a red background.\n\nA **few** classic Tk widgets, including\
    \ frame and toplevel widgets, let you **change** the widget class of a particular\
    \ widget when it was first created by providing a `class` configuration option.\
    \ For example, you could specify that one particular frame widget had a class\
    \ of `SpecialFrame`, while others would have the default class `Frame`. You could\
    \ use the option database to change the appearance of just the SpecialFrame **frames**.\n\
    \nStyles and themes take that simple idea and give it rocket boosters."
  mdcn: "如果主题是作为单个 Tcl 源文件实现，而没有 `pkgIndex.tcl`，你可以这样使其可用：\n\n```\nroot.tk.call('source',\
    \ '/full/path/to/themefile.tcl')\n```\n\n现在你应该能够在自己的应用程序中使用该主题，就像使用任何内置主题一样。\n\
    \n## 17.2. 使用样式\n\n我们现在将探讨一个更复杂的问题：如何在应用程序中充分利用样式和主题，而不仅仅是使用现有主题重新设计外观。\n\n##\
    \ 定义\n\n我们首先需要介绍几个基本概念。\n\n## 控件类\n\n*控件类*标识特定控件的类型，无论是按钮、标签、画布等。所有主题控件都有一个默认类。按钮的类是\
    \ `TButton`，标签是 `TLabel`，等等。\n\n## 控件状态\n\n*控件状态*允许单个控件根据鼠标位置、应用程序设置的不同状态选项等因素，具有多种外观或行为。\n\
    \n如你所知，所有主题控件都维护一组二进制状态标志，可通过 `state` 和 `instate` 方法访问。这些标志包括：`active`、`disabled`、`focus`、`pressed`、`selected`、`background`、`readonly`、`alternate`\
    \ 和 `invalid`。所有控件都具有相同的状态标志集，尽管它们可能会忽略其中一些（例如，标签控件可能会忽略 `invalid` 状态标志）。有关每个状态标志的确切含义，请参阅参考手册中的[主题控件](https://tkdocs.com/man/ttk_widget)页面。\n\
    \n## 样式\n\n*样式*描述控件类的外观（或多种外观）。所有具有相同控件类的主题控件将具有相同的外观。\n\n样式以其描述的控件类的名称来引用。例如，样式\
    \ `TButton` 定义了所有类为 `TButton` 的控件的外观。\n样式了解不同的状态，一个样式可以根据控件的状态定义不同的外观。例如，一个样式可以指定当\
    \ `pressed` 状态标志被设置时，控件的外观应如何变化。\n\n## 主题\n\n*主题*是样式的集合。虽然每个样式都是特定于控件的（一个用于按钮，一个用于输入框等），但主题将许多样式集合在一起。同一主题中的所有样式在视觉上都会被设计成相互“协调”。（不幸的是，Tk\
    \ 在技术上并不限制糟糕的设计或判断！）\n在应用程序中使用特定主题实际上意味着，默认情况下，每个控件的外观将由该主题中负责该控件类的样式控制。\n\n##\
    \ 样式名称\n\n每个样式都有一个名称。如果你要修改样式、创建新样式或为控件使用样式，你需要知道它的名称。\n如何知道样式的名称？如果你有一个特定的控件，并且想知道它当前使用的样式，你可以先检查其\
    \ `style` 配置选项的值。如果为空，则意味着该控件使用的是该控件的*默认*样式。你可以通过控件的类来检索它。例如：\n\n```\n>>> b =\
    \ ttk.Button()\n>>> b['style']\n''\n>>> b.winfo_class()\n'TButton'\n```\n\n在这种情况下，使用的样式是\
    \ `TButton`。其他主题控件的默认样式命名类似，例如 `TEntry`、`TLabel` 等。\n\n> 始终明智的做法是检查具体细节。例如，树形视图控件的类是\
    \ `Treeview`，**而不是** `TTreeview`。\n\n除了默认样式之外，样式可以命名为几乎任何名称。你可能会创建自己的样式（或使用具有该样式的主题），命名为\
    \ `FunButton`、`NuclearReactorButton`，甚至 `GuessWhatIAm`（这不是一个明智的选择）。\n更常见的是，你会发现像\
    \ `Fun.TButton` 或 `NuclearReactor.TButton` 这样的名称，这表示基础样式的变体；正如你将看到的，这是 Tk 支持用于创建和修改样式的一种方式。\n\
    \n> 目前不支持检索所有当前可用样式的列表。这可能会在 Tk 8.7 中以新命令 `ttk::style theme styles` 的形式出现，用于返回主题实现的样式列表。它还提议为所有控件添加一个\
    \ `style` 方法，这样你就无需同时检查控件的 `style` 配置选项和其类。参见 [TIP #584](https://tip.tcl.tk/584)。\n\
    \n## 应用样式\n\n使用样式意味着将该样式应用于单个控件。如果你知道要使用的样式名称以及要应用到哪个控件，这很容易。设置样式可以在创建时完成：\n\n\
    ```\nb = ttk.Button(parent, text='Hello', style='Fun.TButton')\n```\n\n同样，控件的样式可以随时通过\
    \ `style` 配置选项更改：\n\n```\nb['style'] = 'Emergency.TButton'\n```\n\n## 创建简单样式\n\
    \n那么我们如何创建像 `Emergency.TButton` 这样的新样式呢？\n在这种情况下，你正在创建一个与现有样式相似但在某些方面有所不同的新样式。这是创建新样式的最常见原因。\n\
    例如，你希望应用程序中的大多数按钮保持正常外观，但某些“紧急”按钮以不同方式突出显示。创建一个新样式（例如 `Emergency.TButton`），从基础样式（`TButton`）派生，是合适的做法。\n\
    \n在现有样式前添加另一个名称（`Emergency`）后跟一个点，会创建一个从现有样式派生的新样式。新样式将具有与现有样式完全相同的选项，除了指定的差异：\n\
    \n```\ns.configure('Emergency.TButton', font='helvetica 24',\n            foreground='red',\
    \ padding=10)\n```\n\n然后你可以使用其 `style` 配置选项将该样式应用于单个按钮控件，如前所述。所有其他按钮控件将保留其正常外观。\n\
    \n如何知道给定样式有哪些可用的更改选项？这需要更深入地了解样式内部。\n\n> ![升级](image_placeholder)\n\n你可能有使用经典控件的现有代码，希望将其迁移到主题控件。通过配置选项对经典控件进行的大多数外观更改可能可以省略。对于那些不能省略的，你可能需要创建一个新样式，如上所示。\n\
    \n特定于状态的外观更改可以类似地处理。在经典 Tk 中，一些控件通过配置选项支持一些状态更改。例如，将按钮的 `state` 选项设置为 `disabled`\
    \ 会将其绘制为灰色标签。有些允许额外的状态 `active`，这代表不同的外观。你可以通过额外的配置选项（例如 `foreground`、`disabledforeground`\
    \ 和 `activeforeground`）来控制控件在不同状态下的外观。\n\n通过配置选项进行的状态更改应改为在主题控件上使用 `state` 方法。修改控件在特定状态下外观的配置选项应在样式中处理。\n\
    \n经典 Tk 控件还支持一种非常原始的样式形式，你可能会遇到。这使用了**选项数据库**，这是 X11 风格配置文件的一个现已过时的前端。\n\n在经典\
    \ Tk 中，所有按钮都具有相同的类（`Button`），所有标签都具有相同的类（`Label`），等等。你可以将此控件类用于自省和通过选项数据库全局更改选项。它允许你，例如，指定所有按钮都应具有红色背景。\n\
    \n**少数**经典 Tk 控件，包括框架和顶层控件，允许你在首次创建特定控件时通过提供 `class` 配置选项来**更改**其控件类。例如，你可以指定一个特定的框架控件具有类\
    \ `SpecialFrame`，而其他控件将具有默认类 `Frame`。你可以使用选项数据库仅更改 SpecialFrame **框架**的外观。\n\n\
    样式和主题采用了这个简单的想法，并为其提供了火箭推进器。"
