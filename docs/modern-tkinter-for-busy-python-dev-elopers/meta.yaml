    \ include help, don't add a help menu to the menubar, and none will be shown.*"
- md: "## Providing a Window Menu\n\nOn macOS, a \"Window\" menu contains items like\
    \ minimize, zoom, bring all to front, etc. It also includes a list of currently\
    \ open windows. Before that list, other application-specific items are sometimes\
    \ provided.\nBy providing a menu named `.window`, this standard window menu will\
    \ be added. Tk automatically keeps it in sync with all your toplevel windows,\
    \ without any extra code on your part. You can also add any application-specific\
    \ commands to this menu. These appear before the list of your windows.\n\n```\n\
    windowmenu = Menu(menubar, name='window')\nmenubar.add_cascade(menu=windowmenu,\
    \ label='Window')\n```\n\n## Other Menu Handlers\n\nYou saw previously how handling\
    \ certain standard menu items required you to define Tcl callback procedures,\
    \ e.g., `tk::mac::ShowPreferences` and `tk::mac::ShowHelp`.\nThere are several\
    \ other callbacks that you can define. For example, you might intercept the Quit\
    \ menu item, prompting users to save their changes before quitting. Here is the\
    \ complete list:\n\n`tk::mac::ShowPreferences`:\nCalled when the \"Preferences...\"\
    \ menu item is selected.\n\n`tk::mac::ShowHelp`:\nCalled to display main online\
    \ help for the application.\n\n`tk::mac::Quit`:\nCalled when the Quit menu item\
    \ is selected, when a user is trying to shut down the system etc.\n\n`tk::mac::OnHide`:\n\
    Called when your application has been hidden.\n\n`tk::mac::OnShow`:\nCalled when\
    \ your application is shown after being hidden.\n\n`tk::mac::OpenApplication`:\n\
    Called when your application is first opened.\n\n`tk::mac::ReopenApplication`:\n\
    Called when a user \"reopens\" your already-running application (e.g. clicks on\
    \ it in the Dock).\n\n`tk::mac::OpenDocument`:\nCalled when the Finder wants the\
    \ application to open one or more documents (e.g. that were dropped on it). The\
    \ procedure is passed a list of pathnames of files to be opened.\n\n`tk::mac::PrintDocument`:\n\
    As with OpenDocument, but the documents should be printed rather than opened.\n\
    \nFor additional information, see the [tk_mac](https://tkdocs.com/man/tk_mac)\
    \ command reference.\n\n## Windows\n\nOn Windows, each window has a \"System\"\
    \ menu at the top left of the window frame, with a small icon for your application.\
    \ It contains items like \"Close\", \"Minimize\", etc. In Tk, if you create a\
    \ system menu, you can add new items that will appear below the standard items.\n\
    \n```\nsysmenu = Menu(menubar, name='system')\nmenubar.add_cascade(menu=sysmenu)\n\
    ```\n\n> While usually, Tkinter will choose a widget pathname for us, we've had\
    \ to explicitly provide one with the name `system`; this is the cue that Tk needs\
    \ to recognize it as the system menu.\n\n## X11\n\nOn X11, if you create a help\
    \ menu, Tk will ensure that it is always the last menu in the menubar.\n\n```\n\
    menu_help = Menu(menubar, name='help')\nmenubar.add_cascade(menu=menu_help, label='Help')\n\
    ```\n\n> While usually, Tkinter will choose a widget pathname for us, we've had\
    \ to explicitly provide one with the name `help`; this is the cue that Tk needs\
    \ to recognize it as the help menu.\n\n## 10.3. Contextual Menus\n\nContextual\
    \ menus (\"popup\" menus) are typically invoked by a right mouse button click\
    \ on an object in the application. A menu pops up at the location of the mouse\
    \ cursor. Users can then select an item from the menu (or click outside it to\
    \ dismiss it without choosing any item).\nTo create a contextual menu, we'll use\
    \ exactly the same commands we did to create menus in the menubar. Typically,\
    \ we'd create one menu with several command items in it, and potentially some\
    \ cascade menu items and their associated menus.\nTo activate the menu, users\
    \ will perform a contextual menu click. We'll have to create an event binding\
    \ to capture that click. That, however, can mean different things on different\
    \ platforms. On Windows and X11, this is the right mouse button being clicked\
    \ (the third mouse button). On macOS, this is either a click of the left (or only)\
    \ button with the control key held down or a right-click on a multi-button mouse.\
    \ Unlike Windows and X11, macOS refers to this as the second mouse button, not\
    \ the third, so that's the event we'll see in our program.\n\n> Most earlier programs\
    \ that have used popup menus assumed it was only \"button 3\" they needed to worry\
    \ about.\n\nBesides capturing the correct contextual menu event, we also need\
    \ to capture the mouse's location. It turns out we need to do this relative to\
    \ the entire screen (global coordinates) and not local to the window or widget\
    \ you clicked on (local coordinates). The `%X` and `%Y` substitutions in Tk's\
    \ event binding system will capture those for us.\nThe last step is simply to\
    \ tell the menu to pop up at the particular location, via the `post` method. Here's\
    \ an example of the whole process, using a popup menu on the application's main\
    \ window.\n\n```python\nfrom tkinter import *\nroot = Tk()\nmenu = Menu(root)\n\
    for i in ('One', 'Two', 'Three'):\n    menu.add_command(label=i)\nif (root.tk.call('tk',\
    \ 'windowingsystem')=='aqua'):\n    root.bind('<2>', lambda e: menu.post(e.x_root,\
    \ e.y_root))\n    root.bind('<Control-1>', lambda e: menu.post(e.x_root, e.y_root))\n\
    else:\n    root.bind('<3>', lambda e: menu.post(e.x_root, e.y_root))\nroot.mainloop()\n\
    ```\n\n[https://tkdocs.com/code/contextmenu.py](https://tkdocs.com/code/contextmenu.py)\n\
    \n## 11. Windows and Dialogs\n\nEverything we've done up until now has been in\
    \ a single window. In this chapter, we'll cover how to use multiple windows, changing\
    \ various attributes of windows, and use some of the standard dialog boxes that\
    \ are available in Tk.\n\n## 11.1. Creating and Destroying Windows\n\nWe've seen\
    \ that all Tk programs start out with a root toplevel window, and then widgets\
    \ are created as children of that root window. Creating new toplevel windows works\
    \ almost exactly the same as creating new widgets.\n\nToplevel windows are created\
    \ using the `Toplevel` class:\n\n```python\nt = Toplevel(parent)\n```\n\nNote:\
    \ Toplevels are part of the classic Tk widgets, not the themed widgets.\n\nUnlike\
    \ regular widgets, we don't have to `grid` a toplevel for it to appear onscreen.\
    \ Once we've created a new toplevel, we can create other widgets as children of\
    \ that toplevel, and `grid` them inside the toplevel. The new toplevel behaves\
    \ exactly like the automatically created root window.\n\nTo destroy a window,\
    \ use its `destroy` method:\n\n```python\nwindow.destroy()\n```\n\nNote that you\
    \ can use `destroy` on any widget, not just a toplevel window. When you destroy\
    \ a window, all windows (widgets) that are children of that window are also destroyed.\
    \ Be careful! If you destroy the root window (that all other widgets are descended\
    \ from), that will terminate your application.\n\n> In a typical document-oriented\
    \ application, we want to be able to close any windows while leaving the others\
    \ open. In that case, we may want to create a new toplevel for every window, and\
    \ not put anything directly inside the root window at all. While we can't just\
    \ destroy the root window, we can remove it entirely from the screen using its\
    \ `withdraw` method, which we'll see shortly.\n\n## 11.2. Window Behavior and\
    \ Styles\n\nThere are lots of things about how windows behave and how they look\
    \ that can be changed.\n\n### Window Title\n\nTo examine or change the title of\
    \ the window:\n\n```python\noldtitle = window.title()\nwindow.title('New title')\n\
    ```\n\n### Size and Location\n\nIn Tk, a window's position and size on the screen\
    \ are known as its *geometry*. A full geometry specification looks like this:\
    \ `widthxheight±x±y`.\nWidth and height (usually in pixels) are pretty self-explanatory.\
    \ The *x* (horizontal position) is specified with a leading plus or minus, so\
    \ `+25` means the left edge of the window should be 25 pixels from the left edge\
    \ of the screen, while `-50` means the right edge of the window should be 50 pixels\
    \ from the right edge of the screen. Similarly, a *y* (vertical) position of `+10`\
    \ means the top edge of the window should be ten pixels below the top of the screen,\
    \ while `-100` means the bottom edge of the window should be 100 pixels above\
    \ the bottom of the screen.\n\n> \U0001F4A1 Geometry specifies the actual coordinates\
    \ on the screen. It doesn't make allowances for systems like macOS with a menubar\
    \ along the top or a dock along the bottom. So specifying a position of `+0+0`\
    \ would actually place the top part of the window under the system menu bar. It's\
    \ a good idea to leave a healthy margin (at least 30 pixels) from the screen's\
    \ edge.\n\nScreen positions can be different than you might expect when you have\
    \ multiple monitors on your system. We'll cover that shortly."
  mdcn: "## 提供窗口菜单\n\n在 macOS 上，“窗口”菜单包含最小化、缩放、将所有窗口置于前台等项目。它还包括当前打开的窗口列表。在此之前，有时会提供其他特定于应用程序的项目。\n\
    通过提供一个名为 `.window` 的菜单，这个标准的窗口菜单将被添加。Tk 会自动将其与你所有的顶层窗口保持同步，无需你编写任何额外代码。你也可以向此菜单添加任何特定于应用程序的命令。这些命令会出现在你的窗口列表之前。\n\
    \n```\nwindowmenu = Menu(menubar, name='window')\nmenubar.add_cascade(menu=windowmenu,\
    \ label='Window')\n```\n\n## 其他菜单处理程序\n\n你之前已经看到，处理某些标准菜单项需要你定义 Tcl 回调过程，例如 `tk::mac::ShowPreferences`\
    \ 和 `tk::mac::ShowHelp`。\n还有其他几个你可以定义的回调。例如，你可以拦截“退出”菜单项，提示用户在退出前保存更改。以下是完整列表：\n\
    \n`tk::mac::ShowPreferences`：\n当选择“偏好设置...”菜单项时调用。\n\n`tk::mac::ShowHelp`：\n用于显示应用程序的主在线帮助。\n\
    \n`tk::mac::Quit`：\n当选择退出菜单项时调用，例如用户尝试关闭系统等。\n\n`tk::mac::OnHide`：\n当你的应用程序被隐藏时调用。\n\
    \n`tk::mac::OnShow`：\n当你的应用程序在被隐藏后显示时调用。\n\n`tk::mac::OpenApplication`：\n当你的应用程序首次打开时调用。\n\
    \n`tk::mac::ReopenApplication`：\n当用户“重新打开”你已经运行的应用程序时调用（例如，在程序坞中点击它）。\n\n`tk::mac::OpenDocument`：\n\
    当 Finder 希望应用程序打开一个或多个文档时调用（例如，拖放到其上的文档）。该过程会接收一个包含要打开的文件路径名的列表。\n\n`tk::mac::PrintDocument`：\n\
    与 OpenDocument 类似，但文档应被打印而不是打开。\n\n有关更多信息，请参阅 [tk_mac](https://tkdocs.com/man/tk_mac)\
    \ 命令参考。\n\n## Windows\n\n在 Windows 上，每个窗口的左上角都有一个“系统”菜单，其中包含你的应用程序的小图标。它包含“关闭”、“最小化”等项目。在\
    \ Tk 中，如果你创建一个系统菜单，你可以添加新项目，这些项目将出现在标准项目下方。\n\n```\nsysmenu = Menu(menubar, name='system')\n\
    menubar.add_cascade(menu=sysmenu)\n```\n\n> 虽然通常 Tkinter 会为我们选择一个控件路径名，但我们不得不显式提供一个名为\
    \ `system` 的名称；这是 Tk 需要将其识别为系统菜单的提示。\n\n## X11\n\n在 X11 上，如果你创建一个帮助菜单，Tk 将确保它始终是菜单栏中的最后一个菜单。\n\
    \n```\nmenu_help = Menu(menubar, name='help')\nmenubar.add_cascade(menu=menu_help,\
    \ label='Help')\n```\n\n> 虽然通常 Tkinter 会为我们选择一个控件路径名，但我们不得不显式提供一个名为 `help` 的名称；这是\
    \ Tk 需要将其识别为帮助菜单的提示。\n\n## 10.3. 上下文菜单\n\n上下文菜单（“弹出”菜单）通常通过在应用程序中的对象上单击鼠标右键来调用。菜单会在鼠标光标的位置弹出。然后用户可以从菜单中选择一个项目（或单击菜单外部以在不选择任何项目的情况下关闭它）。\n\
    要创建上下文菜单，我们将使用与在菜单栏中创建菜单完全相同的命令。通常，我们会创建一个包含多个命令项目的菜单，以及可能的级联菜单项目及其关联的菜单。\n要激活菜单，用户将执行上下文菜单单击。我们必须创建一个事件绑定来捕获该单击。然而，这在不同平台上可能意味着不同的事情。在\
    \ Windows 和 X11 上，这是单击鼠标右键（第三个鼠标按钮）。在 macOS 上，这要么是按住控制键单击左键（或唯一按钮），要么是在多按钮鼠标上右键单击。与\
    \ Windows 和 X11 不同，macOS 将此称为第二个鼠标按钮，而不是第三个，因此这是我们程序中将看到的事件。\n\n> 大多数早期使用弹出菜单的程序都假设它们只需要担心“按钮\
    \ 3”。\n\n除了捕获正确的上下文菜单事件外，我们还需要捕获鼠标的位置。事实证明，我们需要相对于整个屏幕（全局坐标）来执行此操作，而不是相对于你单击的窗口或控件（局部坐标）。Tk\
    \ 事件绑定系统中的 `%X` 和 `%Y` 替换将为我们捕获这些坐标。\n最后一步是简单地告诉菜单通过 `post` 方法在特定位置弹出。以下是整个过程的示例，在应用程序的主窗口上使用弹出菜单。\n\
    \n```python\nfrom tkinter import *\nroot = Tk()\nmenu = Menu(root)\nfor i in ('One',\
    \ 'Two', 'Three'):\n    menu.add_command(label=i)\nif (root.tk.call('tk', 'windowingsystem')=='aqua'):\n\
    \    root.bind('<2>', lambda e: menu.post(e.x_root, e.y_root))\n    root.bind('<Control-1>',\
    \ lambda e: menu.post(e.x_root, e.y_root))\nelse:\n    root.bind('<3>', lambda\
    \ e: menu.post(e.x_root, e.y_root))\nroot.mainloop()\n```\n\n[https://tkdocs.com/code/contextmenu.py](https://tkdocs.com/code/contextmenu.py)\n\
    \n## 11. 窗口和对话框\n\n到目前为止，我们所做的一切都在单个窗口中。在本章中，我们将介绍如何使用多个窗口、更改窗口的各种属性，以及使用 Tk 中可用的一些标准对话框。\n\
    \n## 11.1. 创建和销毁窗口\n\n我们已经看到，所有 Tk 程序都从一个根顶层窗口开始，然后控件作为该根窗口的子项创建。创建新的顶层窗口的工作方式与创建新控件几乎完全相同。\n\
    \n顶层窗口使用 `Toplevel` 类创建：\n\n```python\nt = Toplevel(parent)\n```\n\n注意：Toplevel\
    \ 是经典 Tk 控件的一部分，而不是主题控件。\n\n与常规控件不同，我们不必对顶层窗口执行 `grid` 操作才能使其出现在屏幕上。一旦我们创建了一个新的顶层窗口，我们就可以在该顶层窗口内创建其他控件作为其子项，并使用\
    \ `grid` 将它们放置在顶层窗口内。新的顶层窗口的行为与自动创建的根窗口完全相同。\n\n要销毁一个窗口，请使用其 `destroy` 方法：\n\n\
    ```python\nwindow.destroy()\n```\n\n请注意，你可以对任何控件使用 `destroy`，而不仅仅是顶层窗口。当你销毁一个窗口时，该窗口的所有子窗口（控件）也会被销毁。小心！如果你销毁根窗口（所有其他控件都是其后代），这将终止你的应用程序。\n\
    \n> 在典型的面向文档的应用程序中，我们希望能够关闭任何窗口，同时保持其他窗口打开。在这种情况下，我们可能希望为每个窗口创建一个新的顶层窗口，而不是将任何内容直接放入根窗口中。虽然我们不能直接销毁根窗口，但我们可以使用其\
    \ `withdraw` 方法将其完全从屏幕上移除，我们稍后会看到这一点。\n\n## 11.2. 窗口行为和样式\n\n关于窗口的行为和外观，有很多方面可以更改。\n\
    \n### 窗口标题\n\n要检查或更改窗口的标题：\n\n```python\noldtitle = window.title()\nwindow.title('New\
    \ title')\n```\n\n### 大小和位置\n\n在 Tk 中，窗口在屏幕上的位置和大小被称为其 *几何*。完整的几何规范如下所示：`widthxheight±x±y`。\n\
    宽度和高度（通常以像素为单位）不言自明。*x*（水平位置）通过前导加号或减号指定，因此 `+25` 表示窗口的左边缘应距离屏幕左边缘 25 像素，而 `-50`\
    \ 表示窗口的右边缘应距离屏幕右边缘 50 像素。类似地，*y*（垂直）位置 `+10` 表示窗口的顶边缘应位于屏幕顶部下方 10 像素处，而 `-100`\
    \ 表示窗口的底边缘应位于屏幕底部上方 100 像素处。\n\n> \U0001F4A1 几何规范指定了屏幕上的实际坐标。它没有考虑像 macOS 这样顶部有菜单栏或底部有程序坞的系统。因此，指定位置为\
    \ `+0+0` 实际上会将窗口的顶部部分放在系统菜单栏下方。最好与屏幕边缘保持足够的边距（至少 30 像素）。\n\n当你的系统上有多个显示器时，屏幕位置可能与你预期的不同。我们稍后会介绍这一点。"
