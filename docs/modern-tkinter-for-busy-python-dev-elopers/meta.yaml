    \ padding=10)\n```\n\nYou could then apply that style to an individual button\
    \ widget using its `style` configuration option, as shown earlier. Every other\
    \ button widget would retain its normal appearance.\n\nHow do you know what options\
    \ are available to change for a given style? That requires diving a little deeper\
    \ inside styles.\n\n> ![UPGRADE](image_placeholder)\n\nYou may have existing code\
    \ using the classic widgets that you'd like to move to the themed widgets. Most\
    \ appearance changes made to classic widgets through configuration options can\
    \ probably be dropped. For those that can't, you may need to create a new style,\
