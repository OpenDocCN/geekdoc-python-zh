    \    check_age(user_age)\nexcept ValueError as e:\n    print(\"Error:\", e)\n\
    ```\n\n通过引发异常，你可以在程序中强制执行某些条件。这在数据验证中特别有用，你需要确保输入数据符合预期的参数。\n\n## 自定义异常\n\n你也可以通过扩展\
