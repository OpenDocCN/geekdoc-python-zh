- md: '## 8. Generator

    A function that returns an iterator. It generates values one at a time from a
    function using the keyword, which helps in managing memory usage in large data-intensive
    applications.


    ## 9. Inheritance

    A feature of object-oriented programming that allows a class to derive properties
    and characteristics from another class.


    ## 10. Iterator

    An object that contains a countable number of values and lets you iterate over
    these values, one at a time. Generally used with loops.


    ## 11. JSON (JavaScript Object Notation)

    A lightweight data-interchange format that is easy for humans to read and write,
    and easy for machines to parse and generate. It is commonly used for transmitting
    data in web applications between clients and servers.


    ## 12. Library

    A collection of functions and methods that allows you to perform many actions
    without writing your code. Python has a rich set of libraries.


    ## 13. List

    An ordered collection of items which can be of different types. Lists are mutable,
    which means the contents can be changed after it is created.


    ## 14. Module

    A Python object with arbitrarily named attributes that you can bind and reference.
    Simply, a module is a file consisting of Python code which can define functions,
    classes, and variables.


    ## 15. Object

    An instance of a class. This is the realized version of the class, where the class
    is manifested in the program.


    ## 16. Pandas

    A Python library used for data manipulation and analysis. It provides data structures
    and operations for manipulating numerical tables and time series.


    ## 17. Polymorphism

    The ability of different objects to respond, each in its own way, to identical
    messages (methods or functions).


    ## 18. Tuple

    An immutable sequence of Python objects. Tuples are sequences, just like lists,
    but cannot be changed in any way once they are created.


    ## 19. Variable

    A location in memory used to store some data (value).


    ## 20. Virtual Environment

    A self-contained directory that contains a Python installation for a particular
    version of Python, plus a number of additional packages. This is useful for keeping
    dependencies required by different projects in separate places.


    This glossary provides a concise explanation of key terms used throughout the
    book, helping to make the content more accessible and enhancing comprehension
    of the material covered.'
  mdcn: '## 8. 生成器

    一种返回迭代器的函数。它使用关键字从函数中一次生成一个值，这有助于在大型数据密集型应用中管理内存使用。


    ## 9. 继承

    面向对象编程的一个特性，允许一个类从另一个类派生属性和特征。


    ## 10. 迭代器

    一个包含可计数值的对象，允许你一次遍历这些值。通常与循环一起使用。


    ## 11. JSON（JavaScript对象表示法）

    一种轻量级的数据交换格式，易于人类阅读和编写，也易于机器解析和生成。它通常用于在Web应用程序中客户端和服务器之间传输数据。


    ## 12. 库

    一个函数和方法的集合，允许你在不编写自己代码的情况下执行许多操作。Python拥有丰富的库。


    ## 13. 列表

    一个有序的项目集合，可以包含不同类型。列表是可变的，这意味着其内容在创建后可以更改。


    ## 14. 模块

    一个具有任意命名属性的Python对象，你可以绑定和引用这些属性。简单来说，模块是一个由Python代码组成的文件，可以定义函数、类和变量。


    ## 15. 对象

