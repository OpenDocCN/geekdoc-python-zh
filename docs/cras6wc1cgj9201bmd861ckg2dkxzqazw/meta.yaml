  md: '# 3. Chapter 3: Operators and Expressions


    In Python, operators are special symbols that carry out arithmetic or logical
    computation. The value that the operator operates on is called the operand. In
    this chapter, we will explore the different types of operators in Python, specifically
    focusing on arithmetic, comparison, and logical operators. You will learn how
    to use these operators to evaluate and manipulate data.


    # Arithmetic Operators


    Arithmetic operators are used to perform mathematical operations like addition,
    subtraction, multiplication, and division.


    # Example:


    ```

    # Addition

    addition = 5 + 3

    print("Addition:", addition)  # Output: Addition: 8


    # Subtraction

