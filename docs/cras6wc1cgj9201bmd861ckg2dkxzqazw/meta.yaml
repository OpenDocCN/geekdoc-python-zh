  md: '# II. Glossary


    Here’s a glossary of terms frequently used throughout the eBook “How to Python.”
    This section serves as a quick reference guide to help clarify technical terms
    and concepts discussed.


    +   1. **API (Application Programming Interface)** : A set of rules and protocols
    for building and interacting with software applications. APIs allow different
    software programs to communicate with each other.

    2. **Array** : A collection of items stored at contiguous memory locations. In
    Python, arrays can be efficiently implemented using the NumPy library, which provides
    a high-performance array object.

    3. **Class** : In object-oriented programming, a class is a blueprint for creating
    objects (a particular data structure), providing initial values for state (member
    variables or attributes), and implementations of behavior (member functions or
    methods).

    4. **Decorator** : A design pattern in Python that allows a user to add new functionality
    to an existing object without modifying its structure. Decorators are usually
    called before the definition of a function you want to decorate.

    5. **Dictionary** : A Python data type that holds key-value pairs. Dictionaries
    are mutable, which means they can be changed after they are created.

    6. **Framework** : A platform for developing software applications. It provides
    a foundation on which software developers can build programs for a specific platform.

    7. **Function** : A block of organized, reusable code that is used to perform
    a single, related action. Functions provide better modularity for your application
    and a high degree of code reusing.'
  merge: -1
  pgno: 95
- img_proc: true
  md: '**8. Generator** : A function that returns an iterator. It generates values
    one at a time from a function using the keyword, which helps in managing memory
    usage in large data-intensive applications.


    **9. Inheritance** : A feature of object-oriented programming that allows a class
    to derive properties and characteristics from another class.


    **10. Iterator** : An object that contains a countable number of values and lets
    you iterate over these values, one at a time. Generally used with loops.


    **11. JSON (JavaScript Object Notation)** : A lightweight data-interchange format
    that is easy for humans to read and write, and easy for machines to parse and
    generate. It is commonly used for transmitting data in web applications between
    clients and servers.


    **12. Library** : A collection of functions and methods that allows you to perform
    many actions without writing your code. Python has a rich set of libraries.


    **13. List** : An ordered collection of items which can be of different types.
    Lists are mutable, which means the contents can be changed after it is created.


    **14. Module** : A Python object with arbitrarily named attributes that you can
    bind and reference. Simply, a module is a file consisting of Python code which
    can define functions, classes, and variables.


    **15. Object** : An instance of a class. This is the realized version of the class,
    where the class is manifested in the program.


    **16. Pandas** : A Python library used for data manipulation and analysis. It
    provides data structures and operations for manipulating numerical tables and
    time series.


    **17. Polymorphism** : The ability of different objects to respond, each in its
    own way, to identical messages (methods or functions).'
  merge: -1
  pgno: 96
- img_proc: true
  md: '**18. Tuple** : An immutable sequence of Python objects. Tuples are sequences,
    just like lists, but cannot be changed in any way once they are created.


    **19. Variable** : A location in memory used to store some data (value).


    **20. Virtual Environment** : A self-contained directory that contains a Python
    installation for a particular version of Python, plus a number of additional packages.
    This is useful for keeping dependencies required by different projects in separate
    places.


    This glossary provides a concise explanation of key terms used throughout the
    book, helping to make the content more accessible and enhancing comprehension
    of the material covered.'
  merge: -1
  pgno: 97
