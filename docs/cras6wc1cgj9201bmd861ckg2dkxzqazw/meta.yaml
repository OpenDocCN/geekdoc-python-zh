    # Type Conversion


    Type conversion in Python refers to converting one data type into another. This
    is also known as “type casting”. Python provides several built-in functions that
    allow you to perform explicit type conversion.


    # Example:


    ```

    # Converting integer to float

    num_int = 10

    num_float = float(num_int)

    print(num_float)  # Output: 10.0


    # Converting float to integer

    num_float = 9.8

    num_int = int(num_float)

    print(num_int)  # Output: 9 (note the truncation, not rounding)


    # Converting integer to string

    num_int = 300

    num_str = str(num_int)

    print(num_str)  # Output: ''300''


    # Converting string to integer

    num_str = "201"

    num_int = int(num_str)

    print(num_int)  # Output: 201

    ```'
