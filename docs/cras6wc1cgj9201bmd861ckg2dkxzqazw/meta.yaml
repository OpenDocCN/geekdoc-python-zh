    ## 2. Chapter 2: Variables and Data Types


    This chapter will explore the foundational concepts of variables and data types
    in Python. Understanding these concepts is crucial for manipulating data and creating
    efficient programs. You will learn how to define variables, familiarize yourself
    with Python’s primary data types, and convert between different data types.


    ### What is a Variable?


    In programming, a variable is a storage location paired with an associated symbolic
    name, which contains some known or unknown quantity or information, referred to
    as a value. Variables in Python are created the moment you first assign a value
    to them and don’t need to be declared with any type, unlike some other programming
    languages.


    ### Example:


    ```

    # Assigning a value to a variable

    message = "Hello, World!"

    number = 42

    pi_value = 3.14159


    # Printing the values of the variables

    print(message)  # Output: Hello, World!

    print(number)   # Output: 42

    print(pi_value) # Output: 3.14159

    ```


    ### Common Data Types


    Python has several built-in data types that define the operations possible on
    the variables and the storage method for each of them. Here are the most common
    data types:


    - **Integers ()** : Whole numbers without a fractional part.

    - **Floating Point Numbers ()** : Numbers that contain a decimal point or an exponent.

    - **Strings ()** : A sequence of Unicode characters used for storing text.

    - **Booleans ()** : Represents or values and is used for logical operations.

    - **Lists** : A collection which is ordered and changeable. Allows duplicate members.

    - **Tuples** : A collection which is ordered and unchangeable. Allows duplicate
    members.

    - **Dictionaries** : A collection which is unordered, changeable, and indexed
    by keys.


    ### Example:


    ```

    integer = 10

    floating_point = 10.5

    string = "Python Programming"

    boolean = True

    list_example = [1, 2, 3, 4, 5]

    tuple_example = (1, 2, 3, 4, 5)

    dictionary_example = {''name'': ''John'', ''age'': 30}


    # Displaying the data types of each variable

    print(type(integer))            # Output: <class ''int''>

    print(type(floating_point))     # Output: <class ''float''>

    print(type(string))            # Output: <class ''str''>

    print(type(boolean))           # Output: <class ''bool''>

    print(type(list_example))      # Output: <class ''list''>

    print(type(tuple_example))     # Output: <class ''tuple''>

    print(type(dictionary_example)) # Output: <class ''dict''>

    ```


    ### Type Conversion


    Type conversion in Python refers to converting one data type into another. This
    is also known as “type casting”. Python provides several built-in functions that
    allow you to perform explicit type conversion.


    ### Example:


    ```

    # Converting integer to float

    num_int = 10

    num_float = float(num_int)

    print(num_float)  # Output: 10.0


    # Converting float to integer

    num_float = 9.8

    num_int = int(num_float)

    print(num_int)  # Output: 9 (note the truncation, not rounding)


    # Converting integer to string

    num_int = 300

    num_str = str(num_int)

    print(num_str)  # Output: ''300''


    # Converting string to integer

    num_str = "201"

    num_int = int(num_str)

    print(num_int)  # Output: 201

    ```'
