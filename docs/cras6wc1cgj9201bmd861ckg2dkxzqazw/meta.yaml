    \ crashing. This chapter covers the basics of exceptions, how to handle them,\
    \ and how to raise them deliberately when necessary.\n\n## What are Exceptions?\n\
    \nIn Python, exceptions are special objects that the program creates when it encounters\
    \ an error. When an error occurs, Python creates an exception object. If not properly\
    \ handled, this exception halts the execution of the program and often prints\
    \ an error message.\n\n## Common Types of Exceptions:\n\n- `SyntaxError`: Python\
    \ parser detects incorrect syntax.\n- `IndexError`: Trying to access an index\
    \ that is not in a list.\n- `KeyError`: Accessing a dictionary key that does not\
    \ exist.\n- `ValueError`: An operation or function receives an argument of the\
    \ right type but an inappropriate value.\n- `TypeError`: An operation or function\
    \ is applied to an object of inappropriate type.\n\n## Example of an Exception:\n\
    \n```python\nnumbers = [1, 2, 3]\ntry:\n    print(numbers[3])  # This will raise\
    \ an IndexError as the index 3 does not exist.\nexcept IndexError as e:\n    print(\"\
    Error:\", e)\n```\n\n## Handling Exceptions\n\nYou can handle exceptions using\
    \ the `try...except` statement. You put the regular Python code in the `try` block\
    \ and the code to execute if an exception occurs in the `except` block.\n\n##\
    \ Example of Handling Multiple Exceptions:\n\n```python\n# Handling multiple exceptions\
    \ with multiple except blocks\ntry:\n    # This block will try to execute this\
    \ code\n    value = int(input(\"Please enter a number: \"))\n    result = 10 /\
    \ value\nexcept ValueError:\n    # Executed if a ValueError occurs during the\
    \ try block execution\n    print(\"You must enter a valid integer.\")\nexcept\
    \ ZeroDivisionError:\n    # Executed if a ZeroDivisionError occurs during the\
    \ try block execution\n    print(\"Division by zero is not allowed.\")\nelse:\n\
    \    # Executed if no exceptions occur\n    print(\"Result:\", result)\nfinally:\n\
    \    # Always executed, regardless of whether an exception occurred or not\n \
    \   print(\"This block is always executed.\")\n```\n\n## Raising Exceptions\n\n\
    Sometimes it is necessary to raise an exception deliberately if a condition occurs\
    \ that doesn’t allow your program to proceed. You can raise exceptions using the\
    \ `raise` statement.\n\n## Example of Raising an Exception:\n\n```python\ndef\
    \ check_age(age):\n    if age < 0:\n        raise ValueError(\"Age cannot be negative.\"\
    )\n    elif age < 18:\n        print(\"You are not old enough.\")\n    else:\n\
    \        print(\"You are welcome.\")\n\ntry:\n    user_age = int(input(\"Enter\
    \ your age: \"))\n    check_age(user_age)\nexcept ValueError as e:\n    print(\"\
    Error:\", e)\n```\n\nBy raising an exception, you can enforce certain conditions\
    \ within your programs. It’s particularly useful in data validation, where you\
    \ need to ensure that input data conforms to expected parameters.\n\n## Custom\
    \ Exceptions\n\nYou can also define your own exceptions by extending the `Exception`\
    \ class. This is useful when you need to create custom error messages for specific\
    \ business logic in your application.\n\n## Example of a Custom Exception:\n\n\
    ```python\nclass NegativeAgeError(Exception):\n    \"\"\"Exception raised when\
    \ the age is negative.\"\"\"\n    def __init__(self, age):\n        self.message\
    \ = f\"Age {age} is not valid. Age cannot be negative.\"\n        super().__init__(self.message)\n\
    \ndef check_age(age):\n    if age < 0:\n        raise NegativeAgeError(age)\n\
    \    print(f\"Age {age} is valid.\")\n\ntry:\n    check_age(-5)\nexcept NegativeAgeError\
    \ as e:\n    print(e)\n```\n\nException handling makes your code more robust and\
