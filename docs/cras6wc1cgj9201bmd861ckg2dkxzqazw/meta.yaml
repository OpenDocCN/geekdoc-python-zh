    print("Subtraction:", subtraction)  # Output: Subtraction: 2


    # Multiplication

    multiplication = 5 * 3

    print("Multiplication:", multiplication)  # Output: Multiplication: 15


    # Division (float)

    division = 5 / 3

    print("Division:", division)  # Output: Division:

    ```'
