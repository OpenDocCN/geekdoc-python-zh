    print(df_sorted)\n```\n\n### Grouping and Aggregating Data:\n\n```python\n# Grouping\
    \ by a column and aggregating\ndf_grouped = df.groupby('Age').size()\nprint(df_grouped)\n\
    ```\n\n## Visualizing Data\n\nVisualization is key in data analysis, helping to\
