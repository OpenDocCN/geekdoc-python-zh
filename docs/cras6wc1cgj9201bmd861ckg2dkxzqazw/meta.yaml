  md: '# 19. Chapter 19: Python for Mobile Development


    While Python is not traditionally used for mobile app development, frameworks
    like Kivy make it possible to write apps using Python that run on both Android
    and iOS. This chapter introduces Kivy, guides you through building a simple app,
    and covers the basics of deploying Python apps to Android and iOS devices.


    # Introduction to Kivy


    Kivy is an open-source Python library for developing multitouch applications.
    It is cross-platform (Linux/OS X/Windows/Android/iOS) and released under the MIT
    license. One of Kivy’s main goals is to enable the quick and easy creation of
    applications that make use of innovative user interfaces, like multi-touch apps.


    **Key Features of Kivy:**


    +   - **Cross-platform** : Write your code once and run it on all supported platforms.

    - **GPU Accelerated** : Kivy graphics are built on top of OpenGL ES 2, allowing
    for hardware acceleration.

    - **Flexible** : Design custom widgets and interfaces with a powerful and intuitive
    API.


    # Building a Simple App


    To start with Kivy, you’ll first need to install it along with its dependencies.
    Kivy can be installed using pip:


    ```

    pip install kivy

    ```'
  merge: -1
  pgno: 87
- img_proc: true
  md: "# Example: A Basic Kivy App\n\nHere’s how to create a simple application that\
    \ displays “Hello, Kivy” on the screen:\n\n+   1. Create a basic application:\n\
    \n```\nfrom kivy.app import App\nfrom kivy.uix.label import Label\n\nclass MyApp(App):\n\
    \    def build(self):\n        return Label(text='Hello, Kivy!')\n\nif __name__\
    \ == '__main__':\n    MyApp().run()\n```\n\nThis script creates a basic app with\
    \ a single label. The method in the class returns a widget that becomes the root\
    \ of the widget tree.\n\n# Deploying to Android and iOS\n\nKivy apps can be packaged\
    \ and deployed on Android and iOS. You’ll need specific tools for each platform.\n\
    \n# Deploying to Android:\n\nKivy can use Buildozer or python-for-android (p4a)\
    \ to package your application. Buildozer is a tool that simplifies the entire\
    \ process.\n\n+   1. Install Buildozer:"
  merge: -1
  pgno: 88
- img_proc: true
  md: '```

    pip install buildozer

    ```


    2. **Create a spec file for your project:** Navigate to your project directory
    and run:


    ```

    buildozer init

    ```


    This command creates a file, which you can configure according to your needs.


    3. **Build and Deploy:**


    ```

    buildozer -v android debug deploy run

    ```


    This command will compile your application, deploy it to a connected Android device,
    and run it.


    # Deploying to iOS:


    For iOS, you need to run Buildozer under macOS with Xcode installed. The steps
    are similar, but you need to target iOS:


    +   1. **Prepare your environment:** Make sure you have Xcode and the necessary
    tools installed.

    2. **Modify the file:** Change the line to match the Python version and set as
    needed.

    3. **Build for iOS:**'
