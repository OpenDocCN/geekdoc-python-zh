    Kivy is an open-source Python library for developing multitouch applications.
    It is cross-platform (Linux/OS X/Windows/Android/iOS) and released under the MIT
    license. One of Kivy’s main goals is to enable the quick and easy creation of
    applications that make use of innovative user interfaces, like multi-touch apps.


    **Key Features of Kivy:**


    +   - **Cross-platform** : Write your code once and run it on all supported platforms.

    - **GPU Accelerated** : Kivy graphics are built on top of OpenGL ES 2, allowing
    for hardware acceleration.

    - **Flexible** : Design custom widgets and interfaces with a powerful and intuitive
    API.


    # Building a Simple App


    To start with Kivy, you’ll first need to install it along with its dependencies.
    Kivy can be installed using pip:


    ```

    pip install kivy

    ```'
