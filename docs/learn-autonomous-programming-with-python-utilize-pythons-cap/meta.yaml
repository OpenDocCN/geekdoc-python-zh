- md: "## Chapter 2\n### RPA Foundations\n\n### Introduction\n\nThis chapter intends\
    \ to build a foundation of **Robotic Process Automation (RPA)**, which is one\
    \ of the hallmarks of the current industry. Today, RPA technology can be conveniently\
    \ leveraged by an HR department to automatically source candidates and screen\
    \ their resumes, thus reducing hours of manual effort. This chapter takes the\
    \ reader into the historical background and progress of robotic technology and\
    \ how it has led the industry to the current state of RPA. Components of RPA have\
    \ been covered in a lucid manner in order to get the reader familiar with the\
    \ concepts. Various industry leaders in the RPA market like Automation Anywhere,\
    \ UiPath and Blue Prism have been described in this chapter along with their comparative\
    \ advantages and disadvantages over each other. The end of this chapter tries\
    \ to highlight the role that Python plays in enhancing the potential of RPA and\
    \ discusses a practical use case of how Python can be conveniently leveraged to\
    \ achieve the same RPA which these tools do.\n\n### Structure\n\nThe chapter covers\
    \ the following topics:\n\n- History of Robotic Process Automation\n- What is\
    \ RPA\n- Components of RPA\n- Various RPA tools in the market\n- Comparison between\
    \ various RPA tools\n- RPA Python package\n- Practical use case of RPA with Python\n\
    \n### Objectives\n\nAt the end of this chapter, you would have a practical understanding\
    \ of **Robotic Process Automation (RPA)**, its various offerings in the market\
    \ and how Python can be efficiently utilized to achieve RPA.\n\n### History of\
    \ Robotic Process Automation\n\nThe contemporary era is called Industry 4.0 which\
    \ is basically the assimilation of digital technology and the **Internet of Things\
    \ (IoT)** into manufacturing. Automation has always been a part of prior industrial\
    \ revolutions. As far as the automation of computer processes is concerned, the\
    \ advent of the internet, cloud computing and artificial intelligence has greatly\
    \ provided an impetus to the rise of niche solutions to execute the automation\
    \ of workflows and business processes. Although early developments in automation\
    \ started with screen scraping software, the world has come a long way to realize\
    \ market leaders in RPA who are now able to provide automation as a service. Popular\
    \ names under this category, are Blue Prism, Automation Anywhere and UiPath.\n\
    \n### What is RPA\n\n**Robotic Process Automation** is a technology that enables\
    \ the construction of software robots (known as bots) which automatically perform\
    \ regular manual operations that a human performs on a computer. These operations\
    \ include opening a website, clicking buttons, navigating web pages entering credentials\
    \ and many more. As we see, all these operations are manual and repetitive, consume\
    \ loads of time and have a propensity to be error prone due to human intervention\
    \ and fatigue.\n\nRPA exactly solves this problem by enabling automated execution\
    \ of the entire repetitive business process workflow. Also, RPA being a bot does\
    \ not suffer from human shortcomings like error and fatigue. Hence, it will save\
    \ a tremendous amount of time and effort for an organization.\n\n### Components\
    \ of RPA\n\nWe have now understood that RPA is software enabling the creation\
    \ of bots for process automation. Like every other software, RPA has certain components\
    \ which are generic to all the RPA products that we have in the market. Let us\
    \ look at each of these components:\n\n- **Recorder:** This is the most important\
    \ but basic and user-friendly component of an RPA tool. This is similar to the\
    \ **Record Macro** feature that Microsoft Excel provides. In this feature, the\
    \ user records the manual process while it is being performed. What the recorder\
    \ does is that it captures salient elements that are being navigated by the user\
    \ on the screen like buttons, web page URLs and dropdowns and treats them as objects.\
    \ It also captures the properties of these objects. After the recording is complete,\
    \ the user has the flexibility to edit these properties and make them generic\
    \ by passing them into variables, thus transforming a hardcoded recording into\
    \ a dynamic bot! The figure below is a screenshot of the recorder feature in UiPath:\n\
    \n![](img/3bdf02f00d53ff55047d1e1759de2882_38_0.png)\n\n**Figure 2.1:** A screenshot\
    \ of the app/web recorder in UiPath\n\n- **Development studio:** This is the primary\
    \ component of an RPA tool. A development studio is the actual interface or environment\
    \ that contains various features to develop a software bot. These features have\
    \ been listed below:\n    - Dashboard with a **Graphical User Interface (GUI)**\
    \ for navigating features.\n    - Various types of recording functionalities.\n\
    \    - Standard templates to choose from with drag and drop feature.\n\nThe *Figure*\
    \ 2.2 below shows the interface of the **Development Studio** in UiPath:\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_39_0.png)\n\
    \n**Figure 2.2:** *Development studio in UiPath*\n\n- **Plugins and extensions:**\
    \ Plugins or extensions allow the expansion of the original capability of the\
    \ RPA tool by enabling its integration with an external program or third-party\
    \ software.\n- **Bot runner:** This is the component that enables to run the bot\
    \ that is created by the Bot Creator.\n- **Control center:** In order to centrally\
    \ manage, schedule and control the bots, a control center is used.\n\n### Various\
    \ RPA tools in the market\n\nThere are numerous companies that offer RPA solutions\
    \ in the market. However, this section shall discuss only the three market leaders\
    \ which are UiPath, Automation Anywhere and Blue Prism.\n\n- **UiPath:** This\
    \ is one of the leaders in RPA tools used for desktop and web automation. A big\
    \ advantage of this tool is that it provides a community edition for users who\
    \ intend to learn the tool. A person with no knowledge of coding can also use\
    \ this tool because it offers drag and drop features for the user to create bots.\
    \ The primary components of UiPath are UiPath Studio, UiPath Robot and UiPath\
    \ orchestrator. These shall be discussed in detail in another chapter related\
    \ to UiPath.\n\n- **Automation Anywhere:** This is a web-based automation tool\
    \ which also has a free version called Community Edition. The three main components\
    \ of Automation Anywhere are:\n    - **Bot Creator:** This is a component in which\
    \ the user creates the bot.\n    - **Control room:** This is the interface that\
    \ is used to centrally manage the bots.\n    - **Bot runner:** This is the component\
    \ that is used to run the bots after they have been created in the Bot Creator.\
    \ This also reports the bot execution status to the control room.\n\n- **Blue\
    \ Prism:** This is an RPA tool that helps organizations automate manual and repetitive\
    \ processes. This is a platform independent tool and can be used on any platform.\
    \ This does not have a community edition like Automation Anywhere or UiPath but\
    \ has a learning version which is free for 180 days. One disadvantage of this\
    \ tool is that it does not have a recording functionality like UiPath and Automation\
    \ Anywhere. The main components of Blue Prism are:\n    - **Object studio:** This\
    \ is where Blue Prism objects are created, or bots are built.\n    - **Process\
    \ studio:** This is similar to object studio but here one can define the flow\
    \ of the process.\n    - **Control room:** This is where the processes are controlled.\n\
    \nApart from the three market leaders discussed above, there are numerous other\
    \ RPA tools in the market like Pega, OpenConnect, WorkFusion, Contextor, Cryon,\
    \ OnviSource, AutomationEdge and Foxtrot.\n\n### Comparison between various RPA\
    \ tools\n\nConsidering that there are multiple options to choose from when it\
    \ comes to RPA tools in the market, it can be a tough decision to make for an\
    \ organization while finalizing its choice of an RPA platform. However, there\
    \ are certain important parameters that could be taken into account while selecting\
    \ the optimum RPA tool for the organization. They are recording feature, availability\
    \ of free version, drag and drop functionality, architecture and cost considerations.\
    \ The comparison between Automation Anywhere, Blue Prism and UiPath based on these\
    \ parameters is shown in the Table 2.1 below:\n\n| Parameter | Automation Anywhere\
    \ | Blue Prism | UiPath |\n| :--- | :--- | :--- | :--- |\n| Macro recording |\
    \ Yes | No | Yes |\n| Community edition | Yes | No | Yes |\n| Drag and drop |\
    \ Not for all tasks. (Requires scripting) | Yes | Yes |"
  mdcn: "## 第2章\n### RPA基础\n\n### 引言\n\n本章旨在为**机器人流程自动化（RPA）**奠定基础，这是当前行业的标志性技术之一。如今，人力资源部门可以便捷地利用RPA技术自动筛选候选人并审核其简历，从而节省大量人工操作时间。本章将带领读者了解机器人技术的历史背景与发展历程，以及它如何推动行业演进至当前的RPA状态。为了帮助读者熟悉相关概念，本章以清晰的方式阐述了RPA的组成部分。同时，本章还介绍了RPA市场中的主要行业领导者，如Automation\
    \ Anywhere、UiPath和Blue Prism，并分析了它们各自的比较优势与劣势。本章最后将重点阐述Python在增强RPA潜力方面的作用，并探讨一个实际用例，说明如何便捷地利用Python实现与这些工具相同的RPA功能。\n\
    \n### 结构\n\n本章涵盖以下主题：\n\n- 机器人流程自动化的历史\n- 什么是RPA\n- RPA的组成部分\n- 市场上的各种RPA工具\n\
    - 各种RPA工具之间的比较\n- RPA Python包\n- 使用Python的RPA实际用例\n\n### 目标\n\n学完本章后，你将对**机器人流程自动化（RPA）**及其市场上的各种产品有实际的理解，并了解如何高效利用Python来实现RPA。\n\
    \n### 机器人流程自动化的历史\n\n当代被称为工业4.0，其核心是将数字技术与**物联网（IoT）**融入制造业。自动化一直是历次工业革命的一部分。就计算机流程自动化而言，互联网、云计算和人工智能的兴起极大地推动了执行工作流和业务流程自动化的专业解决方案的发展。尽管自动化早期发展始于屏幕抓取软件，但世界已取得长足进步，涌现出能够提供自动化即服务的RPA市场领导者。该领域的知名品牌包括Blue\
    \ Prism、Automation Anywhere和UiPath。\n\n### 什么是RPA\n\n**机器人流程自动化**是一种技术，它能够构建软件机器人（称为bots），这些机器人可以自动执行人类在计算机上进行的常规手动操作。这些操作包括打开网站、点击按钮、浏览网页、输入凭证等等。正如我们所见，所有这些操作都是手动且重复的，耗费大量时间，并且由于人为干预和疲劳，容易出错。\n\
    \nRPA通过实现整个重复性业务流程工作流的自动化执行，恰好解决了这个问题。此外，RPA作为机器人，不会像人类那样出现错误和疲劳等缺点。因此，它将为组织节省大量的时间和精力。\n\
    \n### RPA的组成部分\n\n我们现在了解到，RPA是一种软件，能够创建用于流程自动化的机器人。与其他软件一样，RPA也有某些组成部分，这些组成部分对于市场上所有的RPA产品都是通用的。让我们逐一了解这些组成部分：\n\
    \n- **录制器：** 这是RPA工具最重要但基础且用户友好的组成部分。它类似于Microsoft Excel提供的**录制宏**功能。在此功能中，用户在执行手动过程时进行录制。录制器的作用是捕获用户在屏幕上导航的关键元素，如按钮、网页URL和下拉菜单，并将它们视为对象。它还会捕获这些对象的属性。录制完成后，用户可以灵活地编辑这些属性，并通过将它们传递给变量使其通用化，从而将硬编码的录制转换为动态机器人！下图是UiPath中录制器功能的截图：\n\
    \n![](img/3bdf02f00d53ff55047d1e1759de2882_38_0.png)\n\n**图 2.1：** UiPath中应用/网页录制器的截图\n\
    \n- **开发工作室：** 这是RPA工具的主要组成部分。开发工作室是实际的界面或环境，包含用于开发软件机器人的各种功能。这些功能如下所列：\n    -\
    \ 带有**图形用户界面（GUI）**的仪表板，用于导航功能。\n    - 各种类型的录制功能。\n    - 可选择的标准模板，并具有拖放功能。\n\n\
    下图*图* 2.2展示了UiPath中**开发工作室**的界面：\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_39_0.png)\n\
    \n**图 2.2：** *UiPath中的开发工作室*\n\n- **插件和扩展：** 插件或扩展允许通过将RPA工具与外部程序或第三方软件集成，来扩展其原始功能。\n\
    - **机器人运行器：** 这是允许运行由机器人创建器创建的机器人的组件。\n- **控制中心：** 为了集中管理、调度和控制机器人，需要使用控制中心。\n\
    \n### 市场上的各种RPA工具\n\n市场上有许多公司提供RPA解决方案。然而，本节将只讨论三大市场领导者：UiPath、Automation Anywhere和Blue\
    \ Prism。\n\n- **UiPath：** 这是用于桌面和网页自动化的RPA工具领导者之一。该工具的一大优势是为希望学习该工具的用户提供了社区版。即使没有编码知识的人也可以使用此工具，因为它提供了拖放功能供用户创建机器人。UiPath的主要组件是UiPath\
    \ Studio、UiPath Robot和UiPath Orchestrator。这些将在另一章关于UiPath的内容中详细讨论。\n\n- **Automation\
    \ Anywhere：** 这是一个基于网页的自动化工具，也提供一个名为Community Edition的免费版本。Automation Anywhere的三个主要组件是：\n\
    \    - **机器人创建器：** 这是用户创建机器人的组件。\n    - **控制室：** 这是用于集中管理机器人的界面。\n    - **机器人运行器：**\
    \ 这是在机器人创建器中创建机器人后用于运行机器人的组件。它还会向控制室报告机器人的执行状态。\n\n- **Blue Prism：** 这是一个帮助组织自动化手动和重复性流程的RPA工具。这是一个平台无关的工具，可以在任何平台上使用。它没有像Automation\
    \ Anywhere或UiPath那样的社区版，但有一个学习版本，免费使用180天。该工具的一个缺点是它没有像UiPath和Automation Anywhere那样的录制功能。Blue\
    \ Prism的主要组件是：\n    - **对象工作室：** 这是创建Blue Prism对象或构建机器人的地方。\n    - **流程工作室：**\
    \ 这类似于对象工作室，但在这里可以定义流程的流向。\n    - **控制室：** 这是控制流程的地方。\n\n除了上述三大市场领导者外，市场上还有许多其他RPA工具，如Pega、OpenConnect、WorkFusion、Contextor、Cryon、OnviSource、AutomationEdge和Foxtrot。\n\
    \n### 各种RPA工具之间的比较\n\n考虑到市场上有多种RPA工具可供选择，组织在最终确定其RPA平台选择时可能面临艰难的决定。然而，在为组织选择最佳RPA工具时，可以考虑某些重要参数。它们是录制功能、免费版本的可用性、拖放功能、架构和成本考虑。基于这些参数，Automation\
    \ Anywhere、Blue Prism和UiPath之间的比较如下表2.1所示：\n\n| 参数 | Automation Anywhere | Blue\
    \ Prism | UiPath |\n| :--- | :--- | :--- | :--- |\n| 宏录制 | 是 | 否 | 是 |\n| 社区版\
    \ | 是 | 否 | 是 |\n| 拖放 | 并非所有任务都支持。（需要脚本） | 是 | 是 |"
