    Now, these values at hidden layers y1, y2, y3 and y4 would be fed to the output
    layers z1 and z2 with their respective weights and biases and after applying the
    activation function as shown in the expressions below:


    +   - z1 = v11*y1 + v12*y2 + v13*y3 + v14*y4 + c1.

    - z2 = v21*y1 + v22*y2 + v23*y3 + v24*y4 + c2.


    In this way, the final outputs of the network z1 and z2 are produced from the
    inputs x1, x2 and x3 by applying transformations through the hidden layer with
    the help of weights, biases, and activation functions.


    The learning mechanism in any neural network is basically a self-learning mechanism.
    Based on the closeness of the output to the expected output, the neural network
    adjusts its weights and biases so that the output produced in the next iteration
    matches the expected output more closely than the one produced in the previous
    iteration. This process repeats until the output produced is satisfactory.


    The process of learning in a neural network takes place by a technique called
    **back propagation**. In this process, a loss function is minimized using the
    chain rule of derivatives starting from the output layer and moving towards the
    innermost input layer. The loss function is basically the quantity that we are
    trying to minimize to optimize the neural network.'
