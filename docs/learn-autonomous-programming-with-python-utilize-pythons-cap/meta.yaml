    # # Chapter 15

    ## The PyScript Framework


    # ## Introduction


    In this chapter, we introduce the reader to an interesting and ongoing project
    which is currently under development, but garnering lots of attention called **PyScript**
    which is basically a Python framework that allows us to write Python code inside
    HTML directly. The advantage of PyScript is that it allows one to run the Python
    code directly in the browser without infrastructural barriers. PyScript does not
    require any development environment other than a web browser like Chrome and a
    text editor like Notepad. Additionally, we do not install anything like we used
    to do earlier using the pip installer.


    Developers in Python who have background in JavaScript would find it exciting
    to experiment with the functionality provided by PyScript.


    This chapter shall provide the basic awareness that is necessary for the reader
    to explore this novel framework.'
