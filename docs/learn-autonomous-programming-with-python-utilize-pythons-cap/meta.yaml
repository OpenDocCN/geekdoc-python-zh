    Let us try to understand this architecture in detail:


    +   - x1, x2, x3 and x4 are the input values that go into the perceptron. In this
    case we have taken four inputs. However, a perceptron can have as many numbers
    as possible of inputs that it might require.

    - w1, w2, w3 and w4 are the weights that are associated with each of these inputs.
    Every input is basically multiplied by its associated weight. In this case, the
    operation that is performed is w1*x1 + w2*x2 + w3*x3 + w4*x4. Mathematically,
    this expression is known as the dot product of the weights and the inputs.

    - b0 is the bias term. This value is added to the final dot product that is obtained
    above. The bias term is added in order to offset the final dot product by a standard
    value. This term can have a positive value, negative value or even zero value.

    - The final expression thus becomes w1*x1 + w2*x2 + w3*x3 + w4*x4 + b0. We see
    in the diagram that ther'
  - '[PAGE 72]


    e is an activation function at the end before the final output is produced. We
    will discuss activation functions in detail later. For the time being, we would
    want to think of activation function like a trigger that decides whether the perceptron
    would be activated or not.


    +   - After the expression consisting of inputs, weights and the bias is evaluated,
    the activation function is applied to the expression to decide the final output
    of the perceptron.


    Now that we have understood the basic architecture of a perceptron, let us apply
    this further to see how we can construct a simple neural network out of multiple
    perceptrons. The *Figure 3.8* below shows the architecture of a simple neural
    network:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_72_0.png)


    As observed in the figure below, a neural network is composed of several perceptrons
    or **nodes**. As a basic constituent of a neural network, the perceptron would
    be hereafter referred to as a **node**.


    We observe that the neural network consists of three layers. The **Input Layer**,
    **Hidden Layer** and the **Output Layer**.'
  - '[PAGE 73]


    Each of these layers can have one or many nodes. In this case, we have three nodes
    in the input later, four nodes in the hidden layer and two nodes in the output
    layer. It is important to note that in this case we have just one hidden layer,
    but one may have a neural network with multiple hidden layers. Moreover, the choice
    of the number of nodes in the input, hidden and output layers depends upon the
    complexity of the data that the neural network is trained on. However, we also
    use certain rules of thumb in most cases like the number of hidden nodes should
    be roughly 2/3 of the sum of the number of input and output nodes.


    Now, we would be interested in knowing how this neural network works!


    We have already seen earlier how a single node operates. In a similar way, we
    have three input nodes with their three input values x1, x2, x3. We observe from
    the diagram that these inputs are being fed to four nodes in the hidden layer.
    Hence, each of the nodes in the hidden layer would be fed with these same three
    inputs, but with different weights as mentioned below:


    +   - y1 would be fed with inputs x1, x2, x3 with weights w 11, w12, w13.

    - y2 would be fed with inputs x1, x2, x3 with weights w 21, w22, w23.

    - y3 would be fed with inputs x1, x2, x3 with weights w 31, w32, w33.

    - y4 would be fed with inputs x1, x2, x3 with weights w 41, w42, w43.


    As seen earlier, there would also be four bias terms b1, b2, b3 and b4 that would
    be added to these outputs. The final expressions that would be fed to each of
    the nodes are as below. Also, remember that each of these expressions would'
- md: 'be subject to an activation function before producing the final output:


    - y1 = w11*x1 + w12*x2 + w13*x3 + b1.

    - y2 = w21*x1 + w22*x2 + w23*x3 + b2.

    - y3 = w31*x1 + w32*x2 + w33*x3 + b3.

    - y4 = w41*x1 + w42*x2 + w43*x3 + b4.


    Now, these values at hidden layers y1, y2, y3 and y4 would be fed to the output
    layers z1 and z2 with their respective weights and biases and after applying the
    activation function as shown in the expressions below:


    - z1 = v11*y1 + v12*y2 + v13*y3 + v14*y4 + c1.

    - z2 = v21*y1 + v22*y2 + v23*y3 + v24*y4 + c2.


    In this way, the final outputs of the network z1 and z2 are produced from the
    inputs x1, x2 and x3 by applying transformations through the hidden layer with
    the help of weights, biases, and activation functions.


    The learning mechanism in any neural network is basically a self-learning mechanism.
    Based on the closeness of the output to the expected output, the neural network
    adjusts its weights and biases so that the output produced in the next iteration
    matches the expected output more closely than the one produced in the previous
    iteration. This process repeats until the output produced is satisfactory.


    The process of learning in a neural network takes place by a technique called
    **back propagation**. In this process, a loss function is minimized using the
    chain rule of derivatives starting from the output layer and moving towards the
    innermost input layer. The loss function is basically the quantity that we are
    trying to minimize to optimize the neural network.


    Let us now take a deeper look at the concept of an activation function which is
    very important in a neural network. An activation function is primarily used to
    transform the output of a node in such a way that it assists in performing backpropagation.
    It is also used to remove any irrelevant components of the output and retain only
    the relevant components. The *Figure 3.9* below shows a straight-line function.
    Suppose we want the node to get activated only when the output is greater than
    zero and to remain deactivated when the output is less than zero. In this case,
    we apply the **Rectified Linear Unit Function (ReLU)**.


    ![](img/3bdf02f00d53ff55047d1e1759de2882_75_0.png)


    **Figure 3.9:** *Straight line prior to applying activation function*


    The ReLU function basically retains the output only if the value is greater than
    zero otherwise it converts all other values to zero. Mathematically, it is expressed
    as (refer to *Figure 3.10*):


    **ReLU**


    f(X) = max(0,X)


    ![](img/3bdf02f00d53ff55047d1e1759de2882_76_0.png)


    **Figure 3.10:** *Straight line after applying ReLU Activation Function*


    The figure above shows the transformed output after applying the ReLU activation
    function. Apart from ReLU, there could be several other activation functions depending
    upon the type of requirement. The most popular one is the sigmoid function which
    we have already seen in logistic regression. This sigmoid function basically transforms
    any output to a nonlinear distribution between 0 and 1. Hence, it becomes easier
    to perform backpropagation using the chain rule of derivatives.


    ## Types of neural networks


    The **Artificial Neural Network (ANN)** that we saw in the previous section can
    be divided into different types depending upon the type of data that it is trained
    on and the type of application that it is being used for. In this chapter, we
    shall only take a look at the important ones at a high level:


    - **Convolutional Neural Network:** A **Convolutional Neural Network** (CNN),
    also known as CovNet is a special type of neural network where we modify a conventional
    **Artificial Neural Network (ANN)** in such a way that it is efficiently able
    to read and extract information from image files. A CNN has three layers: a convolutional
    layer, a pooling layer and a fully connected layer.


    The convolutional layer is used to enable sparse interaction as opposed to a regular
    neural network where every output node interacts with every input node. While
    processing information in an image that contains millions of pixels, one needs
    only fewer parameters to extract meaningful information from the image which might
    be sought from only tens or thousands of pixels. A convolution layer contains
    a kernel which is smaller than the image and slides throughout the image to form
    a representation of the receptive region. This process of sliding is called **convolution**.
    This kernel is basically a matrix initialized to arbitrary random values that
    performs a dot product with an equivalently sized portion of the image that it
    is interacting with, thus forming an image representation of the region.


    The pooling layer shrinks the output at certain locations by a representational
    statistic. This is required in order to reduce the computational time associated
    with a large size. Most commonly, the maximum value from the neighborhood is reported,
    which is called max pooling.


    The fully connected layer is just like a regular neural network layer where nodes
    are fully connected with preceding and succeeding layers.


    The convolutional and pooling layers use the ReLU function as activation function
    whereas the fully connected layer uses the softmax function as an activation function.
    The *Figure 3.11* below would make a CNN clear:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_78_0.png)


    **Figure 3.11:** *Convolutional Neural Network*


    - **Recurrent Neural Network:** In regular neural networks or convolutional neural
    networks, once the output is produced, the input is forgotten or in other words,
    it does not retain the input in memory. This shortcoming is addressed by using
    **Recurrent Neural Networks (RNN)** which proves to be useful in applications
    like text processing, natural language understanding, language translation and
    sequential output generation. In an RNN, every node has the potential to store
    the value from the previous operation. This enables the network to utilize the
    information from prior input to process current input and output. RNNs are typically
    used in applications like Google Translate and Siri. *Figure 3.12* below shows
    the architecture of a Recurrent Neural Network:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_79_0.png)


    **Figure 3.12:** Recurrent Neural Network


    - **Long Short-Term Memory:** Long Short Term Memory (LSTM) is a special type
    of **Recurrent Neural Network (RNN)** that addresses the problem of long term
    dependencies associated with a traditional RNN. Traditional RNNs can make predictions
    from recent information more rapidly than information stored in long term memory.
    Hence, traditional RNN cannot give efficient performance on information that has
    been stored in long term memory. LSTM network contains a memory cell that can
    handle information for extended periods of time, thus making it suitable for speech
    recognition and language translation tasks.


    We have now seen the main types of neural networks in this section that give us
    an idea of the different variations that a neural network can be subjected to
    in order to realize different objectives.


    The most popular applications of RNNs and LSTM is **natural language processing
    (NLP)** which is gaining momentum in the contemporary era due to applications
    like Siri, Alexa, Google Translator and of course intelligent chatbots like ChatGPT!
    The next section would provide an overview on natural language processing.


    ## Natural language processing


    **Natural language processing (NLP)** is a branch of artificial intelligence where
    computers are trained in such a way that they understand language used by people
    in a way that it is spoken and written. NLP takes place in two phases:


    - **Data processing:** This is the phase where text data is transformed or cleaned
    and brought to a format where machines can analyze it. This includes stemming
    and lemmatization, where words are broken down to their root forms; tokenization
    where the text data is broken down to smaller units; part of speech tagging where
    words in a text are identified based on their part of speech like nouns, pronouns,
    adjectives, and verbs; stop word removal where commonly used words are removed
    from the text so that only those key words that convey meaning are retained.

    - **Algorithmic processing:** Once the data is processed as discussed above, it
    is fed to algorithms to process it further so that it is trained further. Sometimes,
    simple rules may be used wherever possible but most of the training happens with
    the use of complex neural networks like RNN and LSTM that we have seen earlier.
    These networks then learn from repeated training and feedback.


    Python provides popular packages like NLTK and Spacy to execute natural language
    processing. NLTK is popularly used in the creation of chatbots.'
