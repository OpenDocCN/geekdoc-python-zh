    words, it does not retain the input in memory. This shortcoming is addressed by
    using **Recurrent Neural Networks (RNN)** which proves to be useful in applications
    like text processing, natural language understanding, language translation and
    sequential output generation. In an RNN, every node has the potential to store
    the value from the previous operation. This enables the network to utilize the
    information from prior input to process current input and output. RNNs are typically
    used in applications like Google Translate and Siri. *Figure 3.12* below shows
    the architecture of a Recurrent Neural Network:'
  - '[PAGE 79]


    ![](img/3bdf02f00d53ff55047d1e1759de2882_79_0.png)


    **Figure 3.12:** Recurrent Neural Network


    +   - **Long Short-Term Memory:** Long Short Term Memory (LSTM) is a special type
    of **Recurrent Neural Network (RNN)** that addresses the problem of long term
    dependencies associated with a traditional RNN. Traditional RNNs can make predictions
    from recent information more rapidly than information stored in long term memory.
    Hence, traditional RNN cannot give efficient performance on information that has
    been stored in long term memory. LSTM network contains a memory cell that can
    handle information for extended periods of time, thus making it suitable for speech
    recognition and language translation tasks.


    We have now seen the main types of neural networks in this section that give us
    an idea of the different variations that a neural network can be subjected to
    in order to realize different objectives.'
