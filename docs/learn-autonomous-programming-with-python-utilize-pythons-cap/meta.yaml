  - '[PAGE 365]


    # Introduction to PyScript


    PyScript is an open-source web framework that allows one to embed and execute
    Python code in the browser using HTML tags. It enables dynamic generation of pages
    with Python. For a long time JavaScript has been the language that has dominated
    frontend development because of its ability to run natively in the browser and
    interact with HTML and CSS. Then arrived WebAssembly, which is an open standard
    enabling the usage of binary code on the web. This allowed developers to run languages
    like C and C++ in the browser. Obviously, Python soon entered the race and came
    up with this framework.


    PyScript was developed by Anaconda and is built using Pyodide, which ports CPython
    to WebAssembly. It is typically used when one would want to move a Python application
    from the backend to the frontend. Another great advantage is the ability to use
    scientific packages from Python like Scikit-learn, pandas and numpy. These work
    only in the back end and not in the front end. However, PyScript allows one to
    utilize these modules in the front end. Finally, PyScript provides the ability
    to interact with the local file system which JavaScript does not.


    Listed below are basic prerequisites that the reader needs to be having prior
    to beginning this chapter:


    +   - Basic knowledge of HTML, CSS and JavaScript.

    - The Chrome web browser, which is the suggested browser in the official documentation
    of PyScript.


    In this chapter, we shall gradually witness the involvement of Python for web
    development in the form of the PyScript framework by starting with basic HTML
    applications and increasing the complexity of the examples thereafter.'
