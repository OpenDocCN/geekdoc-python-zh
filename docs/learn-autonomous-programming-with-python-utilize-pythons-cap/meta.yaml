- md: 'Let us understand the code above. First, we imported the **linear_model** module
    from the **scikit-learn** library. Next, we created an instance of the **LinearRegression**
    class and stored it in a variable named **reg**.


    We created a sample 2D array and stored it in variable `training_data`. We should
    note that the training data here would always be a 2D array because it contains
    the features or numbers of parameters as columns and number of samples as rows.
    Thereafter, we create a 1D array called **labels** which is basically the outputs
    corresponding to these inputs. Note that the number of elements in this array
    should always be equal to the number of samples in the training data array.


    Next, we use the **fit** method which takes in the **training_data** and **labels**
    variables as arguments. This method basically creates a best fit line based on
    least squares regression. At the end, we use the **coef_** and **intercept_**
    properties of the **reg** object to get the coefficients and the intercept respectively,
    of the regression.


    In this case, since the training data consists of only one point in every sample,
    we should be having just one coefficient since we have just one parameter in the
    equation. Here, the coefficient that we have obtained is **3**, which should also
    be obvious from the **training_data** and the labels arrays where every element
    in the labels is thrice that of the training data. The intercept is expected to
    be zero since the equation $y=3x$ perfectly fits this line. The intercept that
    we have obtained is **7.105427357601002e-15** which is very close to zero.


    Now that we have been able to fit a straight line to this set of data points,
    our next step is to use this straight line to predict the output of a new set
    of data points for which we do not have labels, basically where the output is
    unknown. We use the **predict** method of the **LinearRegression** class for this
    purpose. Copy and run the code below in the Python editor:


    ```python

    # Importing necessary libraries

    from sklearn import linear_model

    import numpy as np


    # Create an instance of the Linear Regression model

    reg = linear_model.LinearRegression()


    # Define training data and corresponding labels

    # Training data represents the independent variables

    training_data = np.array([[0],[3],[17],[23]])


    # Labels are the dependent variable (output) for each training data point

    labels = np.array([0,9,51,69])


    # Train the model using the training data and labels

    reg.fit(training_data, labels)


    # Define testing data for which we want to predict the output

    testing_data = np.array([[21],[13],[15]])


    # Use the trained model to make predictions on the testing data

    output = reg.predict(testing_data)


    # Print the predicted output

    print(output)

    ```


    # Output:


    [63. 39. 45.]


    We see that the output obtained is exactly what we expected from the equation
    y=3x.


    # Key concepts in Machine Learning models


    There are certain important concepts that we need to understand in order to have
    a better background of the theory behind building and optimizing machine learning
    models. These concepts have been covered in the bullets points to follow:


    - **Gradient descent**: This is the process that is used to optimize a model.
    Before understanding gradient descent, it is important to understand another term
    called **cost function**. We saw in linear regression that the best fit line is
    the one where the sum of the squares of the residuals (vertical distance between
    the points and line) is the minimum. In other words, this is the parameter that
    we are trying to minimize. In machine learning terminology, this parameter is
    called the **cost function**, which is basically a measure of the difference between
    the actual and the predicted values.


    Coming back to gradient descent, the process works by first creating a curve of
    the cost function against its parameters. Next, we select an arbitrary point on
    the plot and find the derivative of the cost function at that point. Next, we
    select an arbitrary parameter called the **learning rate** and multiply it by
    the derivative this obtained. Next, we subtract this product from the coordinate
    of the arbitrary point that we had selected on the cost function curve. The result
    thus obtained becomes the starting point for the next iteration where we repeat
    the same process for multiple iterations. At every iteration, we calculate the
    value of the cost function. Since we are descending, the value of the cost function
    should go on reducing. Once we reach a point where the cost function does not
    reduce any further or remains somewhat stationary, we understand that the algorithm
    has converged, and we have reached the minimum of the cost function. The parameters
    at which the cost function is minimum are thus selected as the best fit or optimum
    parameters of the model. Gradient descent algorithm can be mathematically expressed
    below:


    $$X'' = X - \gamma \nabla$$


    Where,


    - $X$ = Initial arbitrary point

    - $\gamma$ = Learning rate

    - $\nabla$ = Derivative at arbitrary point

    - $X''$ = Resultant point obtained for using in next iteration


    - **Bias versus variance**: Bias is when a model oversimplifies the assumptions
    in order to fit itself to the training data. When there is bias, the model does
    not consider all the points in the data set. This is also usually called **underfitting**.
    On the contrary, when a model tries too hard to fit itself to every single point
    in the training data set, it loses its ability to generalize the other data. This
    (also called **overfitting**) gives rise to **variance**, which is basically a
    large deviation of predictions from the expected output. The tradeoff here is
    that if the model is too simplistic due to the bias, the variance would be less
    on the testing data. However, if the model is too rigid due to overfitting, the
    bias would be less, but the variance would be high as it would become more difficult
    for the model to make predictions on a testing data that looks different. A good
    machine learning model is the one that finds a sweet spot between bias and variance.


    # Logistic regression


    In order to study logistic regression using Scikit-learn, we would be using the
    Iris dataset that is inbuilt within Scikit-learn. Let us familiarize ourselves
    with the Iris dataset before proceeding with the tutorial.


    The Iris dataset consists of information related to flowers of three species with
    50 samples of each. Hence the total samples in this dataset are 150. The features
    used in this dataset are **Sepal Length (cm)**, **Sepal Width (cm)**, **Petal
    Length (cm)** and **Petal Width (cm)** which are stored in an array named **data**.
    There is another feature called **target** which basically represents the species
    of the flowers which are **setosa**, **versicolor** and **virginica**. Here, it
    is numerically labelled as 0, 1 and 2 respectively and stored in another array
    named **target**. Now, we shall store this dataset in a pandas dataframe so that
    it enables better visualization and analysis. Copy and run the code below into
    the Python editor:


    ```python

    from sklearn.datasets import load_iris

    import pandas as pd

    iris = load_iris()

    df = pd.DataFrame(iris.data,columns=iris.feature_names)

    df[''target''] = iris.target

    print(df)

    ```


    Here, we first import the **load_iris** class from the **datasets** module of
    the Scikit-learn library and then instantiate it by initializing it to variable
    **iris**. Thereafter, we read it into a pandas dataframe and define the columns
    property with the **feature_names** key of the Iris dataset. Next, we also add
    another column for the target variable by assigning it the value of the **target**
    key of the Iris dataset. On running the code above, we get the output as shown
    below:


    | sepal length (cm) | sepal width (cm) | petal length (cm) | petal width (cm)
    | target |

    | :--- | :--- | :--- | :--- | :--- |

    | 0 | 5.1 | 3.5 | 1.4 | 0.2 | 0 |

    | 1 | 4.9 | 3.0 | 1.4 | 0.2 | 0 |

    | 2 | 4.7 | 3.2 | 1.3 | 0.2 | 0 |

    | 3 | 4.6 | 3.1 | 1.5 | 0.2 | 0 |

    | 4 | 5.0 | 3.6 | 1.4 | 0.2 | 0 |

    | ... | ... | ... | ... | ... | ... |

    | 145 | 6.7 | 3.0 | 5.2 | 2.3 | 2 |

    | 146 | 6.3 | 2.5 | 5.0 | 1.9 | 2 |

    | 147 | 6.5 | 3.0 | 5.2 | 2.0 | 2 |

    | 148 | 6.2 | 3.4 | 5.4 | 2.3 | 2 |

    | 149 | 5.9 | 3.0 | 5.1 | 1.8 | 2 |'
