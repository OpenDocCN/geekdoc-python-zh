    objWorksheet = objWorkbook.worksheets[0]

    objWorksheet[''B5'']="=ROUND(AVERAGE(B2:B4),0)"

    objWorksheet[''C5''] = Translator("=ROUND(AVERAGE(B2:B4),0)",\n"B5").translate_formula("C5")

    objWorksheet[''C5''].alignment = Alignment(horizontal=''center'',\nvertical=''center'')

    objWorkbook.save("Student Table.xlsx")

    ```


    After executing the above code, open the workbook **Student Table.xlsx**. We would
