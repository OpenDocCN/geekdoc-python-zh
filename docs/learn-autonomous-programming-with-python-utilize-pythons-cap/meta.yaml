    现在，让我们最终使用一下我们刚刚创建的 **requirements.txt** 文件。在此之前，我们需要创建一个新的虚拟环境来测试该功能。我们将相同的 **project-directory**
    设为当前目录，然后输入以下命令：


    ```

    virtualenv test_env

    ```


    这将创建一个名为 **test_env** 的虚拟环境。接下来，我们使用以下命令激活该环境：


    ```

    .\test_env\Scripts\activate

    ```


    接下来，我们输入以下命令，该命令将把 **requirements.txt** 文件中的所有包安装到虚拟环境 **test_env** 中。


    ```

    pip install -r requirements.txt

    ```


    如果我们进入虚拟环境 **test_env** 的 **Lib** 文件夹并打开 **site-packages** 文件夹，我们会发现 **requirements.txt**
    文件中列出的所有包都已安装。


    通过这种方式，我们探索了 **pip** 提供的功能，该功能允许安装 **requirements.txt** 文件中列出的所有包。


    ## 使用 Docker 进行容器化


    到目前为止，我们已经了解了 Python 中的虚拟环境如何封装整套 Python 依赖项。另一个概念是 **Docker**，它是一个容器化平台，用于将应用程序及其所有相关依赖项打包成容器形式，从而确保应用程序在任何环境中（无论是开发、测试还是生产环境）都能无缝运行。与封装
    Python 依赖项的虚拟环境不同，Docker 封装的是整个操作系统。Docker 容器提供了代码隔离性、独立性和可移植性，当需要将应用程序部署到生产环境时，就需要它。


    本节关于 Docker 的目的是快速概述该概念。更深入的容器化概念探索以及相关命令的尝试，则留给热心的读者自行完成。


    至此，我们结束了关于构建 Python 自动化项目的讨论，本章也告一段落。


    ## 结论


    在本章中，我们的重点是回顾所有辅助概念，这些概念虽然不属于特定主题，但考虑到自动化项目的架构考量，它们具有极其重要的意义。虚拟环境的概念以及 **pip**
    库命令的详细示例，将极大地提升自动化项目的整体效用。


    在下一章中，我们将探索 Python 提供的另一个令人兴奋的便利工具——PyScript 框架。这是一个开源框架，提供了使用 Python 创建前端 Web
    应用程序的功能。如果这听起来足够有趣，让我们翻页进入下一章吧！


