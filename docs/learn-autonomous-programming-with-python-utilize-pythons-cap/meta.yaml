  md: '# # Preface


    The contemporary industry has witnessed an unprecedented growth of technology
    characterized by the advent of big data, Internet of Things (IoT), Artificial
    Intelligence, Machine Learning, Deep Learning and Robotic Process Automation.
    This has led to an inevitable need for professionals to upskill themselves in
    order to keep themselves relevant with this moving industry trend.


    This book has been designed with the sole purpose of providing a launching pad
    to students and professionals for breaking into these domains by leveraging the
    salient powers of Python.


    As one progresses through this book, one shall embark on an exciting learning
    curve to get oneself familiarized with preliminary domain specific concepts before
    picking up the Python editor to write code. The initial chapter would be a refresher
    that demonstrates the importance of Python in the current scenario and the chapters
    to follow would concentrate on individual topics. Every chapter would observe
    a consistent sequence of an initial overview of fundamental concepts followed
    by corresponding Python exercises.Wherever necessary, detailed guidance has also
    been provided for setup and installation of required software.


    Each chapter would end with an industry relevant use case in Python. These use
    cases are golden exercises in brushing up ones potential to add value and have
    been designed'
