    and some workaround always needs to be done even after using libraries like PyPDF2.


    ## Rotate and merge PDF files


    Very often, we find that we receive PDF files that may be in landscape mode when
    we require them to be in portrait mode. This is when the functionality to rotate
    a PDF comes handy.


    Copy the code below into the Python editor:


    ```python

    import PyPDF2


    strFileName = ''Stock Prices.pdf''

    strRotatedFileName = ''Stock Prices Rotated File.pdf''

    intRotation = 90


    objPDF = open(strFileName, ''rb'')

    objPDFReader = PyPDF2.PdfReader(objPDF)

    objPDFWriter = PyPDF2.PdfWriter()

    objPage = objPDFReader.pages[0]

    objPage.rotate(intRotation)

    objPDFWriter.add_page(objPage)

    objRotatedFile = open(strRotatedFileName, ''wb'')

    objPDFWriter.write(objRotatedFile)

    objPDF.close()

    objRotatedFile.close()

    ```


    What we are essentially doing here is rotating the page of this PDF by 90 degrees
    clockwise and saving the file as a new document named **Stock_Prices_Rotated_File.pdf**.
    On running the code and opening the new file **Stock_Prices_Rotated_File.pdf**,
    we see that the page has indeed been rotated by 90 degrees clockwise as shown
    in the *Figure 7.2* below:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_164_0.png)


    **Figure 7.2:** PDF file page rotated by 90 degrees clockwise using Python code


    Remember that the default rotation would always be clockwise. In case we would
    want to rotate the page in the anticlockwise direction, we could do so simply
    by adding a minus sign to the rotation number.


    Now that we are familiar with rotating a PDF, let us learn how to merge two PDF
    documents into a single document. We already have our original document **Stock_Prices.pdf**
    which we shall merge with our newly created document **Stock_Prices_Rotated_File.pdf**.
