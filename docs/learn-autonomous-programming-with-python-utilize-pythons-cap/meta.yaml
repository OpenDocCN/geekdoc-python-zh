    \ as shown in *Figure 16.9* below:\n\n    ![](img/3bdf02f00d53ff55047d1e1759de2882_406_1.png)\n\
    \n    **Figure 16.9:** *Creating a new project in RIDE*\n\n7.  On selecting **New\
    \ Project** a new window opens as shown in *Figure 16.10* below which contains\
    \ fields for browsing to the directory and assigning a name to the project:\n\n\
    \    ![](img/3bdf02f00d53ff55047d1e1759de2882_407_0.png)\n\n    **Figure 16.10:**\
    \ *New Project window in RIDE*\n\n    Below are quick actions that we perform\
    \ with this window:\n\n    -   As shown in *Figure 16.10* above, we browse to\
