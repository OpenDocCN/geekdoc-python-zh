    ```\n\n**输出：**\n\n**0.49012999999999995**\n\n## 用于深度学习的流行Python库\n\n我们已经在*第9章，智能自动化第一部分：使用机器学习*中学习机器学习时，看到了Scikit-learn的强大功能。它仍然是机器学习应用的最佳库。然而，当我们深入研究深度学习时，Python开源社区已经推出了众多强大的库，这些库在训练深度神经网络时执行计算提供了巨大的计算能力。在本节中，我们将讨论一些在深度学习中常用的流行库：\n\
