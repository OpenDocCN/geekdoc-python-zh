    \n## Implementing conversational agents: The role of chatbots\n\nA chatbot is\
    \ a great application of natural language processing technology which does the\
    \ job of reducing the involvement of people in regular and repetitive interactions.\
    \ Typically, these interactions could be between the organization and its clients\
    \ or between the IT team of an organization and its employees. A chatbot does\
    \ a great job of generating automated responses to regular questions and advanced\
    \ chatbots even go to the extent of learning from previous interactions and refining\
    \ future responses. Due to the presence of a chatbot, an organization greatly\
    \ saves on time, effort and resources required in hiring and training a person\
    \ for the job of doing regular interactions involving repetitive responses. Also,\
    \ the same person could be utilized elsewhere for tasks requiring more creativity.\
    \ In this way, a chatbot becomes a perfect example of **hyperautomation** since\
    \ it uses automation coupled with a deep learning technology like NLP to accelerate\
    \ the pace of an organization and results in the saving of time, effort and resources\
    \ that would be required in involving a person for the same job of having regular\
    \ interactions.\n\nIn this section, we shall create our own chatbot using Python\
    \ library NLTK. We have already seen the different steps in the natural language\
    \ processing cycle in *Chapter 10, Intelligent Automation Part 2: Using Deep Learning*.\
    \ A chatbot being an application of natural language processing shall utilize\
    \ few or more of these steps.\n\nTypically, a chatbot would be of either of the\
    \ two types listed below or the combination of both:\n\n- **Rule based chatbot**:\
    \ A rule based chatbot or a scripted chatbot is basically a chatbot that generates\
    \ responses based on well-defined rules that have been embedded or programmed\
    \ into it. Prior to the advent of AI, early versions of chatbots were predominantly\
    \ rule based and were customized for a particular requirement. These might not\
    \ be able to understand questions outside the scope of the logic that has been\
    \ programmed into it.\n- **Self-learning chatbot**: These chatbots also called\
    \ **intelligent chatbots** utilize AI technology like NLP to self-learn and refine\
    \ their responses.\n\nFor regular requirements in organizations, a rule based\
    \ chatbot does most of the tasks. In this exercise, we would create a simple rule\
    \ based chatbot using Python library NLTK that addresses new software installation\
    \ requests and resolves issues related to existing software. This exercise would\
    \ provide us with a basic environment based on which we could further build complex\
    \ chatbots.\n\nBefore using NLTK, the first step we would need to do is install\
    \ the library using the command below:\n\n```\npip install nltk\n```\n\nNext,\
    \ we import the libraries that we require as shown in the code below:\n\n```\n\
    import nltk\nfrom nltk.chat.util import Chat, reflections\n```\n\nLet us have\
    \ a quick understanding of **Chat** and **reflections** that we have imported.\n\
    \n- **Chat**: This is the basic class that contains the logic that has been embedded\
    \ into it that enables the chatbot to process text information and produce responses.\
    \ We shall soon see how we use it in code.\n- **Reflections**: This is basically\
    \ a dictionary where if the value in a regular expression matches the key, it\
    \ shall output the value as a response. There are many basic phrases in a conversation\
    \ where this dictionary proves useful. One could also produce a customized dictionary\
    \ or add contents to this one. We could quickly observe the contents of this dictionary\
    \ using the command below.\n\n```\nprint(reflections)\n```\n\n**Output:**\n\n\
    ```\n{'i am': 'you are', 'i was': 'you were', 'i': 'you', \"i'm\": 'you are',\
    \ \"i'd\": 'you would', \"i've\": 'you have', \"i'll\": 'you will', 'my': 'your',\
    \ 'you are': 'I am', 'you were': 'I was', \"you've\": 'I have', \"you'll\": 'I\
    \ will', 'your': 'my', 'yours': 'mine', 'you': 'me', 'me': 'you'}\n```\n\nNext,\
    \ we create a list called **pairs** which stores the rules or logic that we would\
    \ want to incorporate into the chatbot. We shall create a basic list here, but\
    \ this list could be expanded further based on new rules and business logic:\n\
    \n```\npairs = [\n    [\n        r\"My name is (.*)\",\n        [\"Hello %1\"\
    ,]\n    ],\n    [\n        r\"(I'm|good|good,|I am)\",\n        [\"How can I help\
    \ you?\\nPlease select one from the following:\" \\n  \"\\n1)New Software Installation\\\
    n2)Issue with Existing Software\",]\n    ],\n    [\n        r\"(.*) Installation\"\
    ,\n        [\"Could you please mention the name of the software? Please type 'Software:'\"\
    \ \\n  \"before mentioning the software name. Thanks!\",]\n    ],\n    [\n   \
    \     r\"(.*) Existing\",\n        [\"Please select the issue from the following:\"\
    \ \\n  \"\\n1)Version needs Upgradation\\n2)Uninstall Software\",]\n    ],\n \
    \   [\n        r\"(Version|Uninstall)\",\n        [\"Thanks for your patience.\
    \ Someone from the IT team \" \\n\"would reach out to you to resolve your issue.\
    \ Is there anything else\" \\n\"I could help you with?\",]\n    ],\n    [\n  \
    \      r\"Software:(.*)\",\n        [\"Thanks for your patience. I am assigning\
    \ this ticket to someone from \" \\n\"the IT team who shall help you install %1.\
    \ Is there anything else I could help you with?\",]\n    ],\n    [\n        r\"\
    No\",\n        [\"Thank you. Have a great day!\",]\n    ],\n]\n```\n\nThe reader\
    \ is advised to spend some time observing the statements and responses in this\
    \ list so that could provide a better idea of how the chatbot produces answers\
    \ to the questions. The reader is assumed to be familiar with regex in Python.\n\
    \nFinally, we use the **Chat** class to instantiate the chatbot by passing **pairs**\
    \ and **reflections** as arguments. At the end, we use the **converse** method\
    \ of the **Chat** class to start the conversation. We also print an introductory\
    \ statement prior to instantiating the **Chat** class in order to begin the conversation\
    \ on behalf of the chatbot.\n\n```\nprint(\"Hi, I'm your new chatbot friend and\
    \ I'm here to help you! May I know your name?\")\n\nchat = Chat(pairs, reflections)\n\
    chat.converse(quit=\"No\")\n```\n\nNote the argument **quit=\"No\"** that has\
    \ been passed in the **converse** method. This argument enables the chatbot to\
    \ understand that the conversation needs to be closed when the user types the\
    \ word **No** typically at the end of the conversation.\n\nThe entire code has\
    \ been provided below for reference. Copy and run the code in a Python editor:\n\
    \n```\nimport nltk\nfrom nltk.chat.util import Chat, reflections\n\npairs = [\n\
    \    [\n        r\"My name is (.*)\",\n        [\"Hello %1\",]\n    ],\n    [\n\
    \        r\"(I'm|good|good,|I am)\",\n        [\"How can I help you?\\nPlease\
    \ select one from the following:\" \\n\"\\n1)New Software Installation\\n2)Issue\
    \ with Existing Software\",]\n    ],\n    [\n        r\"(.*) Installation\",\n\
    \        [\"Could you please mention the name of the software? Please type 'Software:'\"\
    \ \\n\"before mentioning the software name. Thanks!\",]\n    ],\n    [\n     \
    \   r\"(.*) Existing\",\n        [\"Please select the issue from the following:\"\
    \ \\n\"\\n1)Version needs Upgradation\\n2)Uninstall Software\",]\n    ],\n   \
    \ [\n        r\"(Version|Uninstall)\",\n        [\"Thanks for your patience. Someone\
    \ from the IT team \" \\n\"would reach out to you to resolve your issue. Is there\
    \ anything else\" \\n\"I could help you with?\",]\n    ],\n    [\n        r\"\
    Software:(.*)\",\n        [\"Thanks for your patience. I am assigning this ticket\
    \ to someone from \" \\n\"the IT team who shall help you install %1. Is there\
    \ anything else I could help you with?\",]\n    ],\n    [\n        r\"No\",\n\
    \        [\"Thank you. Have a great day!\",]\n    ],\n]\nprint(\"Hi, I'm your\
    \ new chatbot friend and I'm here to help you! May I know your name?\")\nchat\
    \ = Chat(pairs, reflections)\nchat.converse(quit=\"No\")\n```\n\n**Output:**\n\
    **Hi, I'm your new chatbot friend and I'm here to help you! May I know your name?**\n\
    **>My name is abc**\n**Hello abc, How are you?**\n**>I'm good, thanks!**"
  mdcn: "需要指出的是，OCR是一项复杂的任务，不存在一种通用方法能让人直接得到理想解决方案，因为每种方法都有其局限性。人们总是需要结合多种方法来优化提取的输出结果。另外，OpenCV是一个用于在应用OCR之前对图像进行预处理的库，这样OCR工具就能更容易地检测图像中的文本。建议感兴趣的读者自行深入探索这个主题！\n\
    \n## 实现对话代理：聊天机器人的角色\n\n聊天机器人是自然语言处理技术的一个出色应用，它能减少人们在常规和重复性交互中的参与。通常，这些交互可能发生在组织与其客户之间，或组织的IT团队与其员工之间。聊天机器人在生成对常规问题的自动回复方面表现出色，而高级聊天机器人甚至能从之前的交互中学习并优化未来的回复。由于聊天机器人的存在，组织在雇佣和培训人员处理涉及重复性回复的常规交互任务上，大大节省了时间、精力和资源。同时，这些人员可以被安排到其他需要更多创造力的任务上。这样，聊天机器人就成为了**超级自动化**的一个完美范例，因为它结合了自动化与深度学习技术（如NLP），加速了组织的运作节奏，并节省了原本需要人员参与同类常规交互任务所需的时间、精力和资源。\n\
    \n在本节中，我们将使用Python库NLTK创建自己的聊天机器人。我们已经在*第10章，智能自动化第二部分：使用深度学习*中了解了自然语言处理循环的不同步骤。聊天机器人作为自然语言处理的一个应用，将使用其中部分或全部步骤。\n\
    \n通常，聊天机器人属于以下两种类型之一，或两者的结合：\n\n- **基于规则的聊天机器人**：基于规则的聊天机器人或脚本化聊天机器人，基本上是根据嵌入或编程到其中的明确规则来生成响应的聊天机器人。在AI出现之前，早期的聊天机器人主要是基于规则的，并针对特定需求进行定制。它们可能无法理解超出其编程逻辑范围的问题。\n\
    - **自学习聊天机器人**：这些聊天机器人也称为**智能聊天机器人**，利用AI技术（如NLP）进行自我学习并优化其响应。\n\n对于组织的常规需求，基于规则的聊天机器人能完成大部分任务。在本练习中，我们将使用Python库NLTK创建一个简单的基于规则的聊天机器人，用于处理新的软件安装请求和解决现有软件相关问题。本练习将为我们提供一个基础环境，基于此我们可以进一步构建更复杂的聊天机器人。\n\
    \n在使用NLTK之前，我们需要做的第一步是使用以下命令安装该库：\n\n```\npip install nltk\n```\n\n接下来，我们导入所需的库，如下所示：\n\
    \n```\nimport nltk\nfrom nltk.chat.util import Chat, reflections\n```\n\n让我们快速了解一下导入的**Chat**和**reflections**。\n\
    \n- **Chat**：这是基础类，包含了嵌入其中的逻辑，使聊天机器人能够处理文本信息并生成响应。我们很快就会看到如何在代码中使用它。\n- **Reflections**：这基本上是一个字典，如果正则表达式中的值与键匹配，它将输出该值作为响应。在对话中，有许多基本短语会用到这个字典。人们也可以创建自定义字典或向此字典添加内容。我们可以使用以下命令快速查看此字典的内容。\n\
    \n```\nprint(reflections)\n```\n\n**输出：**\n\n```\n{'i am': 'you are', 'i was':\
    \ 'you were', 'i': 'you', \"i'm\": 'you are', \"i'd\": 'you would', \"i've\":\
    \ 'you have', \"i'll\": 'you will', 'my': 'your', 'you are': 'I am', 'you were':\
    \ 'I was', \"you've\": 'I have', \"you'll\": 'I will', 'your': 'my', 'yours':\
    \ 'mine', 'you': 'me', 'me': 'you'}\n```\n\n接下来，我们创建一个名为**pairs**的列表，用于存储我们希望融入聊天机器人的规则或逻辑。我们将在这里创建一个基础列表，但可以根据新的规则和业务逻辑进一步扩展此列表：\n\
    \n```\npairs = [\n    [\n        r\"My name is (.*)\",\n        [\"Hello %1\"\
    ,]\n    ],\n    [\n        r\"(I'm|good|good,|I am)\",\n        [\"How can I help\
    \ you?\\nPlease select one from the following:\" \\n  \"\\n1)New Software Installation\\\
    n2)Issue with Existing Software\",]\n    ],\n    [\n        r\"(.*) Installation\"\
    ,\n        [\"Could you please mention the name of the software? Please type 'Software:'\"\
    \ \\n  \"before mentioning the software name. Thanks!\",]\n    ],\n    [\n   \
    \     r\"(.*) Existing\",\n        [\"Please select the issue from the following:\"\
    \ \\n  \"\\n1)Version needs Upgradation\\n2)Uninstall Software\",]\n    ],\n \
