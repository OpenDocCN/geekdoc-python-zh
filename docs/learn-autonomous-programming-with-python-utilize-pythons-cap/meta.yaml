  md: '![](img/3bdf02f00d53ff55047d1e1759de2882_268_0.png)


    **Figure 11.1:** *Concept of a business process workflow*


    As shown in the above figure, a general idea of a business process workflow is
    a series of processes that run in a sequence. We observe that **Process 1** is
    followed by **Process 2**. The output of 2 is subjected to a conditional logic.
    If the output value of the Boolean is **True**, then **Process 3** is executed,
    which is further followed by **Process 4**, which ends the workflow. If the output
    value of the Boolean is **False**, then **Process 2** directly progresses to **Process
    4** that ends the workflow.'
