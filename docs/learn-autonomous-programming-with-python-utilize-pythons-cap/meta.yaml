  mdcn: "## 变换器与大型语言模型\n\n变换器近年来日益流行，因为世界正见证着基于变换器架构的智能聊天机器人（如ChatGPT）的兴起。GPT是生成式预训练变换器的缩写。变换器被用于任何需要将输入序列转换为输出序列的场景，例如文本到语音的转换。变换器利用了卷积神经网络。然而，它们也使用了“注意力”机制。这包括一个编码器和一个解码器。编码器基本上将输入数据转换为一种称为隐藏状态的数值表示。这捕捉了输入数据中的重要信息。然后，这个隐藏状态被输入到解码器网络中，由其生成输出。\n\
    \n变换器架构最流行的应用是大型语言模型。这些模型通过无监督学习在海量数据上进行训练，模型自行学习。最新的热门词汇ChatGPT就是大型语言模型的一个例子。它在截至2021年9月的570GB数据集上进行了训练。这些数据包括科学期刊、维基百科、文学作品、书籍和其他来源。\n\
    \n大型语言模型可用于生成内容、总结文章、建议解决常规数学和物理问题的方法、规划旅行行程等等！\n\n通过这种方式，神经网络自我微调，产生出色的机制，协助我们完成各种任务和应用。\n\
    \n## 结论\n\n本章通过带领我们从人工智能历史到基本机器学习概念，再从深度学习和神经网络到自然语言处理和变换器的渐进式旅程，为我们奠定了人工智能和机器学习概念的坚实基础。这个基础现在应该能够让我们在后续专门致力于机器学习和深度学习的章节中，使用Python库自行开发算法。\n\
    \n为了开发和训练良好的机器学习模型，我们首先需要的是一个良好的数据集。这些数据来自众多来源，其中最常见的是网页，这使得从网络提取数据，即网络爬取，成为开始任何机器学习项目前最重要的技能。\n\
    \n在从网页提取数据时，如果提供了网络API，事情会变得容易。然而，在没有此类API的情况下，我们不应错过提取网页数据的机会。在下一章中，我们将探讨网络爬取的概念，即在不使用任何API的情况下从网页提取数据的过程。因此，事不宜迟，让我们直接进入下一章，学习如何使用Python进行网络爬取！\n\
    \n# 第4章\n## 自动化网络爬取\n\n### 简介\n\n本章讨论使用Python从网络提取数据的过程。数据是机器学习所有项目的核心部分，而大多数学习项目或现实应用的数据都来源于网络。因此，了解网络爬取技术对于实施人工智能、机器学习或数据科学项目至关重要。本章向读者介绍网络爬取，并讨论执行网络爬取所需的一些流行的Python库，如**Requests**和**Beautiful\
    \ Soup**。本章继续介绍网络爬取的显著特点，如检查和提取。本章以一个实际用例项目结束。\n\n### 结构\n\n本章涵盖以下主题：\n\n- 什么是网络爬取\n\
    - 用于网络爬取的流行Python库\n    - Python中的request模块\n    - Beautiful Soup库\n    - 检查网页\n\
    - 从网页提取信息\n- 网络爬取的法律考量\n- Python中的实际用例\n\n### 目标\n\n本章将使读者能够熟练使用Python库执行常规数据收集任务的网络爬取，并使读者熟悉常用的网络爬取技术。\n\
    \n### 什么是网络爬取\n\n网络爬取是通过访问网站的HTML页面，自动从任何网页提取数据的过程。通常，如果我们需要的数据量很小，我们可以方便地复制粘贴。然而，随着所需数据量变得庞大，每次手动复制粘贴几乎变得不可能。正是在这些时候，网络爬取技术被证明对于从网络提取数据非常有用。此外，网页上的数据是非结构化格式，这意味着它不是以系统的方式存在的。网络爬取将这些非结构化数据存储为结构化格式。网络爬取可用于许多应用，如研发、社交媒体分析或市场数据收集。\n\
    \n从网站提取数据的另一种方式是利用提供给开发者的API。然而，这是传统和经典的方法，不属于网络爬取的定义范畴。在网络爬取中，我们直接访问页面并从中提取数据。\n\
    \n### 用于网络爬取的流行Python库\n\nPython提供了非常有用的库来执行网络爬取。下面，我们讨论最流行的几种，但在本章中，我们将只关注**Requests**和**Beautiful\
