    various operations in a workbook and worksheet. The chapter continues with the
    description and usage of other Python libraries used for Excel automation like
    xlwings and xlsxWriter. The relative advantage of each library over the other
    has been briefly discussed. The chapter ends with a real-world use case project
    involving Excel automation with Python.


