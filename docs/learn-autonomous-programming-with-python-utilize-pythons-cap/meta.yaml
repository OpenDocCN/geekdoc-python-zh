  md: '# Advancing efficiency with robotic process automation


    Robotic process automation enables an organization to eliminate the involvement
    of people in processes that are repetitive. In the context of software, this could
    be desktop or web automation. We have previously covered the basic concepts related
    to robotic process automation in *Chapter 2, RPA Foundations*, and studied a practical
    use case in Python involving web automation using the **rpa** package. It is important
    to note that other Python libraries like **shutil** and **PyAutoGUI** that we
    studied in *Chapter 8, Mechanizing Applications, Folders and Actions*, are also
    valuable contributors in the context of robotic process automation as they enable
    the automation of repetitive desktop processes. In this chapter, we shall directly
    make use of the RPA functionality when we study the practical use case in Python.
    With this, we have had good overview of the three use cases of hyperautomation
    that we intended to discuss which are OCR, NLP chatbots and RPA. Now, let us move
    to the final section before we take up the practical use case in Python where
    we discuss the challenges with hyperautomation.


    # Navigating the challenges of hyperautomation


    Although useful, hyperautomation comes with its own set of challenges which an
    organization needs to tackle. Some of them are discussed below:


    +   - **Resistance to change**: Complete or partial replacement of people with
    software or machines might render existing workforce redundant thus arousing resistance
    to the adoption of hyperautomation technologies like'
  merge: -1
  pgno: 317
- img_proc: true
  md: 'AI or RPA. Hence, a balance needs to be struck between technology and people.


    +   - **Misplaced priorities**: To keep up with the existing trend, an organization
    might go for the latest cutting-edge technology without keeping in mind its specific
    business plan or organizational goals. To go for hyperautomation just for sake
    of it is the surest way to ask for trouble.

    - **Return on investment**: An organization needs to ensure that benefits accrued
    by adopting hyperautomation exceed costs to justify the ROI.


    # Practical use case in Python


    It is time to apply what we have learnt! In this use case, we shall navigate to
    a web page and take a snapshot of an image which has text written into it. We
    shall save this snapshot in our directory and thereafter apply OCR to read the
    text from the image. Hence, this use case would require knowledge of both RPA
    and OCR making it a perfect example of hyperautomation. Does this not sound interesting?


    We would navigate to the URL below that contains an image with a message written.
    The image is shown in *Figure 12.4*:


    **https://c4.wallpaperflare.com/wallpaper/734/647/661/quote-motivational-wallpaper-preview.jpg**'
  merge: -1
  pgno: 318
- img_proc: true
  md: '![](img/3bdf02f00d53ff55047d1e1759de2882_319_0.png)


    **Figure 12.4:** *Image from webpage*


    We would now write a Python script using the **rpa** package that automatically
    navigates to the web page URL to open the image, takes a snapshot of the image,
    saves the snapshot to the same directory where the Python code file is saved and
    then closes the web page window. As we have studied all these steps in *Chapter
    2, RPA Foundations*, on RPA, we shall directly write the code as follows:


    ```

    import rpa as r


    r.init()


    r.url(''https://c4.wallpaperflare.com/wallpaper/734/647/661/quote-motivational-wallpaper-preview.jpg'')


    r.snap(''page'', ''Captured_Image.png'')


    r.wait(5)


    r.close()

    ```


    Now, we have a file named **Captured_Image.png** saved in the same directory where
    the Python code has been saved. This is a snapshot of the image that the get when
    we visit the URL.


    Our next step would be to apply Python library **tesseract** to read the contents
    written in the snapshot image. We are'
  merge: -1
  pgno: 319
- img_proc: true
  md: 'already familiar with the usage of the **tesseract** library, so we directly
    write the script as shown below:


    ```

    import pytesseract


    pytesseract.pytesseract.tesseract_cmd = r"C:\Program Files\Tesseract-OCR\tesseract.exe"


    image = ''Captured_Image.png''


    text = pytesseract.image_to_string(image, lang=''eng'', config=''--psm 11'')


    print(text)

    ```


    Note that we have used **config=''--psm 11''** in the last argument of the **image_to_string**
    method of the **pytesseract** library. Please refer to the tesseract manual link
    provided in *Chapter 7, Working with PDFs and Images* that discusses in detail
    the config types.


    The entire code has been provided below for reference. Copy and run the code in
    a Python editor:


    ```

    import rpa as r

    r.init()

    r.url(''https://c4.wallpaperflare.com/wallpaper/734/647/661/quote-motivational-wallpaper-preview.jpg'')

    r.snap(''page'', ''Captured_Image.png'')

    r.wait(5)

    r.close()


    import pytesseract


    pytesseract.pytesseract.tesseract_cmd = r"C:\Program Files\Tesseract-OCR\tesseract.exe"

    ```'
