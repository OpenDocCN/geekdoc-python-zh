    \n让我们创建一个计算数字平方的简单函数。以下是该函数的 Python 代码。\n\n```\ndef Square(intNum):\n    intSquare\
    \ = intNum*intNum\n    return intSquare\n```\n\n将上述代码复制到 Python 编辑器中，并将文件保存为 **Calculate_Square.py**。\n\
