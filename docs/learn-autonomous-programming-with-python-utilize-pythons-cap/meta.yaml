    .**\n\n基本上，该公式试图计算学生A在所有三个科目中获得分数的平均值，然后将结果四舍五入到最接近的整数。一旦你执行代码，打开工作簿并观察单元格B5。你会看到四舍五入到最接近整数的平均值将被填充到该单元格中。对于学生A，数学、科学和英语分别获得的45、55和75分的平均值是58.333。将其四舍五入到最接近的整数得到58，这正是我们在下面的*图5.7*中单元格B5看到的值：\n\
