  md: '# Backpropagation


    In this section, we shall study an important concept related to the efficient
    training of neural networks which is backpropagation. What backpropagation does
    is that it efficiently trains the neural network by backwardly propagating the
    errors from the output nodes to the input nodes. It does this by defining the
    loss function and calculating the impact of each of the weights of the neural
    network on the loss function by means of gradient descent. We have already studied
    gradient descent in *Chapter 9 - Intelligent Automation Part 1: Using Machine
    Learning* on machine learning. Here, we shall see how backpropagation also uses
    gradient descent to calculate the optimum values of the weights and biases that
    could do the task which the neural network is intended to do. In order to perform
    mathematical calculations required for backpropagation, this section assumes that
    the reader is conversant with basic concepts of calculus like derivatives, partial
    derivatives and chain rule.


    We are already familiar with the process of calculating the output of a node from
    a neural network. We calculate the dot product of the weights and the inputs and
    then add the bias term at the end. This process is alternatively called as **forward
    pass**. For the neural network shown in *Figure 10.2* the output for node *y1*
    calculated using weights *w11,w12,w13* and inputs *x1,x2,x3* by the process of
    forward pass would be *w11*x1 + w12*x2 + w13*x3 + b1* where *b1* is the bias.
    The outputs for the other nodes would be calculated in a similar way.


    Now, the outputs calculated in this way would be the predicted outputs. However,
    when we train the neural network, we train it with the intention of producing
    an expected output. A measure of the gap between the expected output and the predicted
    output is called as error and the goal of training the neural network is to optimize
    the weights in such a way that they minimize this error. The process of optimizing
    these weights is called as **backpropagation**.


    As the purpose of this book is simply to demonstrate the significance of Python
    in simplifying computations, we would not be going into the actual implementation
    of backpropagation in the'
  merge: -1
  pgno: 246
- img_proc: true
  md: 'context of a fully connected neural network; else the calculations might span
    many pages and go beyond the scope of this book.


    However, we shall acquaint ourselves with the general process of backpropagation
    in the context of a single perceptron so that the reader could expand the idea
    to implement backpropagation to a fully connected neural network.


    As shown in the above *Figure 10.3*, the node gets four values of inputs as *x1*,
    *x2*, *x3* and *x4* with weights *w1*, *w2*, *w3* and *w4* respectively. The bias
    value is *b0*. Hence, the nodal sum or the output would be given by the dot product
    of the inputs and weights added to the bias.


    If *z* is the output, we have:


    $$z = w1 * x1 + w2 * x2 + w3 * x3 + b0$$


    Thereafter, we subject this output to an activation function. Let us choose the
    ReLU activation function which is defined as:


    $$ReLU(z) = max(0,z)$$


    Hence, the final output of the node could also be expressed in the following way:


    $$output = ReLU(w1*x1 + w2*x2 + w3*x3 + b0)$$


    Mathematically, this could also be expressed in the manner below:


    $$output = ReLU(sum(w1*x1, w2*x2, w3*x3, b0))$$


    As discussed earlier, the neural network tries to realize an expected output.
    The gap between the expected output and the predicted output is called the **error**
    or also the **cost function**. Let us define a mean square error in this simple
    case which is given by:


    $$Error = \frac{1}{2}(output(E) - output)^2$$


    Here, *output(E)* is the expected output.


    To perform backpropagation, we assess the impact of a particular parameter on
    the total error. For this exercise, let us try to assess the impact of weight
    *w1* on the total error. The impact of other parameters can be assessed using
    the same process.'
