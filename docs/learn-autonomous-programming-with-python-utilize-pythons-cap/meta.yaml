  - '[PAGE 61]


    algorithms fall into various categories like regression, classification, and clustering
    which we shall see in this chapter as well as in related chapters to come.

    Now that we have conceptually understood what machine learning is, let us delve
    deeper to understand the different types of machine learning.


    # Supervised and unsupervised learning


    Depending on the type of input data, machine learning can be classified into Supervised
    Learning and Unsupervised Learning. Let us try to understand each of these:

    **Supervised learning:** In the example from the previous section, we saw that
    every item in the input data set was accompanied by a corresponding item in the
    output data set. This kind of data set where every input is accompanied by a corresponding
    output is called as a ‘labelled’ data set. Whenever a machine is trained on such
    a labelled data set the type of machine learning is called as ‘supervised learning’
    because the training is guided or supervised by the presence of an output data.
    Typical examples of supervised algorithms are linear regression, logistic regression,
    k nearest neighbors, Naïve Bayes, decision trees, random forests and support vector
    machines. Let us take a quick look at each of them. We shall implement them in
    detail using Python in later chapters. Here, we shall try to understand them.


    +   - **Linear regression:** This is the process of drawing a straight line that
    fits best to a set of points. Linear Regression is also sometimes conveniently
    called **least squares regression** because the criterion chosen to fit the line
    is that the sum of the squares of the vertical distance of the points from the
    line should be the least.'
  - '[PAGE 62]


    The example in the previous section where we found out by observation that y=3x
    was a classic example of linear regression.


    +   - **Logistic regression:** Although this algorithm includes the name regression,
    it is a classification algorithm. It is used when wish to predict the output of
    a categorical variable. For example, if we want to know whether the output is
    True or False, 1 or 0, On or Off, Yes or No, we use logistic regression. When
    we have two possible outcomes, it is called binary logistic regression. Logistic
    regression can also extend to Multinomial and Ordinal when we have more than two
    possible outcomes. Logistic regression uses the sigmoid function which basically
    maps any real number data set into a range between 0 and 1. The Figure 3.2 below
    shows the Sigmoid function which is given by the following equation:


    $$y = \frac{1}{1 + e^{-x}}$$


    ![](img/3bdf02f00d53ff55047d1e1759de2882_62_0.png)


    **Figure 3.2:** Sigmoid function'
  - '[PAGE 63]


    +   - **K nearest neighbors:** As the name implies, this is a classification algorithm
    that tries to classify a data point into its nearest class. The data set fed to
    the algorithm would be a labelled data set consisting of points as the input and
    their corresponding classes as the labelled output to which the points respectively
    belong. The aim of this algorithm is to correctly classify the unknown set of
    new input data points into their respective classes based on the **nearest** or
    least distance to the classes. Hence the name **nearest neighbors**. The distance
    measure is usually the Euclidean distance that we use in Cartesian coordinate
    systems. Please refer to the following *Figure 3.5*:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_63_0.png)


    *Figure 3.3: K nearest neighbors*


    +   - **Naïve Bayes:** This is a classification algorithm based on Bayes Theorem
    of conditional probability which is expressed mathematically as shown below:'
  - '[PAGE 64]


    $P(A|B) = \frac{P(B|A) \cdot P(A)}{P(B)}$, where $P(B) > 0$


    This theorem has many applications in situations where we want to take a decision
    on the probability of an event based on the occurrence of another event. As the
    name ‘Naïve’ implies, the algorithm assumes that each of the features resulting
    in the outcome of an event have an equal and independent contribution. The most
    popular application of this algorithm is in classifying an email as **spam** or
    not spam.


    +   - **Decision tree:** A decision tree algorithm is the process of fitting a
    decision-making thought process to a labelled data set. Similar to the way in
    which we think, a decision tree would start with a root node and bifurcate further
    into branches that would contain decision nodes and leaf nodes. Observe the figure
    below that shows root nodes, decision nodes and leaf nodes of a sample decision
    tree describing the thought process while buying a house. Please refer to the
    following *Figure 3.4*:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_64_0.png)


    **Figure 3.4:** Sample decision tree to finalize the decision of buying a house'
  - '[PAGE 65]


    +   - **Random forests:** This is a continuation of decision tree algorithm but
    what we do here is we combine the results of multiple decision trees to come up
    with the result. The limitation with having a single decision tree is that there
    is a possibility of overfitting. Overfitting is the phenomenon where an algorithm
    fits the training data set so rigidly that it does not have the bandwidth to accommodate
    any flexibility to allow itself to fit with equivalent ease on the testing dataset.
    Random forest is an example of an Ensemble Learning algorithm that uses the Bagging
    technique. Ensemble Learning is the technique of improving results by combining
    the results of several models. Bagging is the technique where different samples
    of training data are fed to the algorithm to obtain a different result for each
    sample. In this case, random samples of training data are fed to the algorithm.
    This results in the creation of multiple decision trees that produce multiple
    outputs. The result is decided by a majority vote process. The most frequently
    occurring output is chosen as the result.

    - **Support vector machine:** This is a classification algorithm that creates
    an optimal hyperplane that separates the dataset in the best possible way into
    categories or classes based on differentiable attributes. If the data set is two
    dimensional with two classes, then the hyperplane would be a straight line. The
    algorithm works by choosing the points closest to the line from both classes and
    trying to maximize the distance between the points and the line called as **margin**.
    These points are called as ‘Support Vectors’ hence the name **support vector machine**.'
  - '[PAGE 66]


    ![](img/3bdf02f00d53ff55047d1e1759de2882_66_0.png)


    **Figure 3.5:** *Support vector machine*


    **Unsupervised learning:** This is the type of machine learning where the input
    dataset is not labelled into categories. The algorithm has to learn on its own
    from the input. The most popular type of algorithm in this category is clustering.
    K Means clustering is one of the types of clustering algorithms where the algorithm
    clubs the data sets into K different clusters after repetitive iterations. DBSCAN
    is another popular clustering algorithm. Hierarchical clustering is a kind of
    clustering method which is used whenever the clusters are to be ordered in a predetermined
    way.


    # ## Popular Python Libraries for ML


    Let us now look at some popular machine learning libraries in Python which we
    shall be using for implementing ML algorithms in later chapters. We shall only
    go through them in this section at a high level to understand their unique'
  - '[PAGE 67]


    significance and relative differences. Their actual implementation in Python shall
    be done in later chapters:


    +   - **Scikit Learn:** This is one of the most popular Python libraries for supervised
    and unsupervised machine learning. This library has a separate class for every
    algorithm and each of those classes has a method called **fit()** that fits the
    algorithm to the dataset.

    - **TensorFlow:** This is an advanced deep learning library used to perform complex
    computations in Mathematics and Physics through a tensor. A tensor is basically
    a multidimensional array with a uniform data type. Although this is a Python library,
    the actual mathematical operations are performed in C++. Python simply directs
    these pieces of code and holds them together. TensorFlow can be used to train
    and run deep neural networks. Recently, TensorFlow has also integrated Keras through
    the **tf.Keras** module.

    - **OpenCV:** This is an open source Python library used for Computer Vision applications
    and image processing. Computer vision is the process by which a computer is made
    to understand images and videos and extract insightful information from them to
    take further decisions. Popular applications of computer vision are face recognition
    applications, autonomous self-driving cars and image generation applications.
    **Optical Character Recognition (OCR)** is another application of OpenCV that
    is used for text detection.

    - **Keras:** This is a high-level neural network library built in Python. It does
    not perform the low-level computations by itself but uses other backend libraries
    like TensorFlow, Theano and CNTK to do them.

    - **Theano:** This is another popular deep learning library that is used to perform
    fast mathematical computations'
- md: '## Reinforcement learning


    In earlier sections, we have seen that the two types of machine learning are supervised
    learning where there are labelled data sets provided and then unsupervised learning
    where there are no labelled data sets, and the algorithm has to learn on its own
    from the data by grouping together items with similar attributes. There is another
    mechanism which enables a machine to learn on its own based on the outcome of
    a previous output or in other words from ‘experience’. Reinforcement learning
    systems use algorithms that receive feedback to determine whether the output decision
    was correct, wrong, or neutral. Hence, reinforcement learning is an autonomous
    self-learning mechanism. The *Figure 3.6* below shows the reinforcement learning
    mechanism:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_69_0.png)


    **Figure 3.6:** *Reinforcement learning mechanism*


    As shown in the figure above, the agent sends out an action to the environment.
    The environment then returns that action with a new state. This state captures
    feedback from the environment and the agent adjusts its next action based on the
    feedback. Reinforcement learning along with supervised learning is popularly used
    in fine tuning **large language models (LLM)** enabled chatbots like ChatGPT.


    Now that we are familiar with machine learning algorithms and the corresponding
    Python libraries, let us start with the exciting journey of deep learning!


    ## Deep learning


    The name **deep learning** is derived from process of training multiple layers.
    The central mechanism of deep learning is an **Artificial Neural Network (ANN)**
    which is intended to mimic the neural learning mechanism in a person. Deep learning
    involves the training of multiple layers of neural networks which is achieved
    by adjusting the weights of every neuron. More on this to come in later chapters.


    One might wonder why does one need to approach a deep neural network in spite
    of the availability of all these machine learning algorithms? The reason is that
    where machine learning algorithms fall short of accuracy at numerous instances,
    deep neural networks do an exceptional job of achieving the desired result! Due
    to the rise of high and efficient computational systems and availability of large
    datasets, deep learning has become a popular method of training complex multi
    layered neural networks. Let us now try to understand the basic concepts of a
    neural network.


    ## Introduction to neural networks


    The fundamental unit of any neural network is the perceptron as shown in *Figure
    3.7* below:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_71_0.png)


    **Figure 3.7:** *Basic architecture of a perceptron*


    Let us try to understand this architecture in detail:


    - x1, x2, x3 and x4 are the input values that go into the perceptron. In this
    case we have taken four inputs. However, a perceptron can have as many numbers
    as possible of inputs that it might require.

    - w1, w2, w3 and w4 are the weights that are associated with each of these inputs.
    Every input is basically multiplied by its associated weight. In this case, the
    operation that is performed is w1*x1 + w2*x2 + w3*x3 + w4*x4. Mathematically,
    this expression is known as the dot product of the weights and the inputs.

    - b0 is the bias term. This value is added to the final dot product that is obtained
    above. The bias term is added in order to offset the final dot product by a standard
    value. This term can have a positive value, negative value or even zero value.

    - The final expression thus becomes w1*x1 + w2*x2 + w3*x3 + w4*x4 + b0. We see
    in the diagram that there is an activation function at the end before the final
    output is produced. We will discuss activation functions in detail later. For
    the time being, we would want to think of activation function like a trigger that
    decides whether the perceptron would be activated or not.

    - After the expression consisting of inputs, weights and the bias is evaluated,
    the activation function is applied to the expression to decide the final output
    of the perceptron.


    Now that we have understood the basic architecture of a perceptron, let us apply
    this further to see how we can construct a simple neural network out of multiple
    perceptrons. The *Figure 3.8* below shows the architecture of a simple neural
    network:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_72_0.png)


    As observed in the figure below, a neural network is composed of several perceptrons
    or **nodes**. As a basic constituent of a neural network, the perceptron would
    be hereafter referred to as a **node**.


    We observe that the neural network consists of three layers. The **Input Layer**,
    **Hidden Layer** and the **Output Layer**. Each of these layers can have one or
    many nodes. In this case, we have three nodes in the input layer, four nodes in
    the hidden layer and two nodes in the output layer. It is important to note that
    in this case we have just one hidden layer, but one may have a neural network
    with multiple hidden layers. Moreover, the choice of the number of nodes in the
    input, hidden and output layers depends upon the complexity of the data that the
    neural network is trained on. However, we also use certain rules of thumb in most
    cases like the number of hidden nodes should be roughly 2/3 of the sum of the
    number of input and output nodes.


    Now, we would be interested in knowing how this neural network works!


    We have already seen earlier how a single node operates. In a similar way, we
    have three input nodes with their three input values x1, x2, x3. We observe from
    the diagram that these inputs are being fed to four nodes in the hidden layer.
    Hence, each of the nodes in the hidden layer would be fed with these same three
    inputs, but with different weights as mentioned below:


    - y1 would be fed with inputs x1, x2, x3 with weights w11, w12, w13.

    - y2 would be fed with inputs x1, x2, x3 with weights w21, w22, w23.

    - y3 would be fed with inputs x1, x2, x3 with weights w31, w32, w33.

    - y4 would be fed with inputs x1, x2, x3 with weights w41, w42, w43.


    As seen earlier, there would also be four bias terms b1, b2, b3 and b4 that would
    be added to these outputs. The final expressions that would be fed to each of
    the nodes are as below. Also, remember that each of these expressions would'
  mdcn: '## 强化学习


    在前面的章节中，我们已经了解到机器学习的两种类型：监督学习，即提供带标签的数据集；以及无监督学习，即没有带标签的数据集，算法必须通过将具有相似属性的项目分组来自主地从数据中学习。还有一种机制使机器能够基于先前输出的结果，或者换句话说，从“经验”中自主学习。强化学习系统使用接收反馈的算法来确定输出决策是正确、错误还是中性的。因此，强化学习是一种自主的自我学习机制。下面的*图3.6*展示了强化学习机制：


    ![](img/3bdf02f00d53ff55047d1e1759de2882_69_0.png)


    **图3.6：** *强化学习机制*


    如上图所示，智能体向环境发送一个动作。环境随后以一个新的状态返回该动作。这个状态捕获了来自环境的反馈，智能体根据反馈调整其下一个动作。强化学习与监督学习一起，被广泛用于微调像ChatGPT这样由**大型语言模型（LLM）**驱动的聊天机器人。


    既然我们已经熟悉了机器学习算法和相应的Python库，让我们开始激动人心的深度学习之旅吧！


    ## 深度学习


    **深度学习**的名称源于训练多层的过程。深度学习的核心机制是**人工神经网络（ANN）**，旨在模拟人类的神经学习机制。深度学习涉及训练多层神经网络，这是通过调整每个神经元的权重来实现的。更多相关内容将在后续章节中介绍。


    人们可能会想，既然有所有这些机器学习算法可用，为什么还需要采用深度神经网络呢？原因在于，在许多情况下，机器学习算法的准确性不足，而深度神经网络在实现预期结果方面表现出色！由于高效计算系统的兴起和大型数据集的可用性，深度学习已成为训练复杂多层神经网络的流行方法。现在，让我们尝试理解神经网络的基本概念。


    ## 神经网络简介


    任何神经网络的基本单元是感知机，如下方*图3.7*所示：


    ![](img/3bdf02f00d53ff55047d1e1759de2882_71_0.png)


    **图3.7：** *感知机的基本架构*


    让我们详细理解这个架构：


    - x1、x2、x3和x4是输入到感知机的输入值。在这个例子中，我们取了四个输入。然而，一个感知机可以有尽可能多的输入，具体数量取决于其需求。

    - w1、w2、w3和w4是与每个输入相关联的权重。每个输入基本上都会乘以其关联的权重。在这个例子中，执行的操作是 w1*x1 + w2*x2 + w3*x3
    + w4*x4。在数学上，这个表达式被称为权重和输入的点积。

    - b0是偏置项。这个值被添加到上面得到的最终点积中。添加偏置项是为了用一个标准值来抵消最终的点积。这个项可以是正值、负值，甚至是零值。

    - 因此，最终的表达式变为 w1*x1 + w2*x2 + w3*x3 + w4*x4 + b0。我们在图中看到，在产生最终输出之前，有一个激活函数。我们将在后面详细讨论激活函数。目前，我们可以将激活函数想象成一个触发器，它决定感知机是否会被激活。

    - 在评估了由输入、权重和偏置组成的表达式之后，将激活函数应用于该表达式，以决定感知机的最终输出。


    既然我们已经理解了感知机的基本架构，让我们进一步应用它，看看如何从多个感知机构建一个简单的神经网络。下面的*图3.8*展示了一个简单神经网络的架构：


    ![](img/3bdf02f00d53ff55047d1e1759de2882_72_0.png)


    如下图所示，一个神经网络由若干个感知机或**节点**组成。作为神经网络的基本组成部分，感知机此后将被称为**节点**。


    我们观察到神经网络由三层组成：**输入层**、**隐藏层**和**输出层**。每一层可以有一个或多个节点。在这个例子中，输入层有三个节点，隐藏层有四个节点，输出层有两个节点。需要注意的是，在这个例子中我们只有一个隐藏层，但神经网络可以有多个隐藏层。此外，输入层、隐藏层和输出层中节点数量的选择取决于神经网络所训练数据的复杂性。然而，在大多数情况下，我们也会使用一些经验法则，例如隐藏节点的数量应大致为输入和输出节点数量之和的2/3。


    现在，我们有兴趣了解这个神经网络是如何工作的！


    我们之前已经看到了单个节点是如何运作的。类似地，我们有三个输入节点，其输入值为x1、x2、x3。从图中我们观察到，这些输入被馈送到隐藏层的四个节点中。因此，隐藏层中的每个节点都将接收这三个相同的输入，但权重不同，如下所示：


    - y1将接收输入x1、x2、x3，权重为w11、w12、w13。

    - y2将接收输入x1、x2、x3，权重为w21、w22、w23。

    - y3将接收输入x1、x2、x3，权重为w31、w32、w33。

    - y4将接收输入x1、x2、x3，权重为w41、w42、w43。


    如前所述，还会有四个偏置项b1、b2、b3和b4被添加到这些输出中。馈送到每个节点的最终表达式如下。同时，请记住，每个表达式都将'
