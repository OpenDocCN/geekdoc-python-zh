    being an application of natural language processing shall utilize few or more
    of these steps.


    Typically, a chatbot would be of either of the two types listed below or the combination
    of both:


    +   - **Rule based chatbot**: A rule based chatbot or a scripted chatbot is basically
    a chatbot that generates responses based on well-defined rules that have been
    embedded or programmed into it. Prior to the advent of AI, early versions of chatbots
    were predominantly rule based and were customized for a particular requirement.
    These might not be able to understand questions outside the scope of the logic
    that has been programmed into it.

    - **Self-learning chatbot**: These chatbots also called **intelligent chatbots**
    utilize AI technology like NLP to self-learn and refine their responses.


