- md: '# Learn Autonomous Programming with Python


    Utilize Python''s capabilities in artificial intelligence, machine learning, deep
    learning and robotic process automation


    Varun P Divadkar


    [www.bpbonline.com](http://www.bpbonline.com)


    First Edition 2024


    Copyright © BPB Publications, India


    ISBN: 978-93-55517-630


    *All Rights Reserved*. No part of this publication may be reproduced, distributed
    or transmitted in any form or by any means or stored in a database or retrieval
    system, without the prior written permission of the publisher with the exception
    to the program listings which may be entered, stored and executed in a computer
    system, but they can not be reproduced by the means of publication, photocopy,
    recording, or by any electronic and mechanical means.


    ## LIMITS OF LIABILITY AND DISCLAIMER OF WARRANTY


    The information contained in this book is true to correct and the best of author’s
    and publisher’s knowledge. The author has made every effort to ensure the accuracy
    of these publications, but publisher cannot be held responsible for any loss or
    damage arising from any information in this book.


    All trademarks referred to in the book are acknowledged as properties of their
    respective owners but BPB Publications cannot guarantee the accuracy of this information.


    ## Dedicated to


    Every earnest reader of this book


    ## About the Authors


    In a diverse career spanning 12+ years, across six multinational organizations,
    **Varun P Divadkar** holds the distinction of having contributed to a variety
    of global techno-functional engagements with his delivery expertise in Python
    programming applications towards cutting edge domains like Artificial Intelligence,
    Machine Learning, Deep Learning and Robotic Process Automation. Being a qualified
    Mechanical Engineer with a gold medal from MIT has endowed him with uniquely acquired
    logical reasoning abilities and quantitative aptitude. This has further enabled
    him to grasp key mathematical and technical concepts with a steep learning curve
    and thereby mentor students and professionals in their journey towards exploration
    of these cutting edge domains.


    He began his career with the prestigious Tata group within the manufacturing domain
    in the engineering services sector and was involved in automation of engineering
    designs. Thereafter, he had a stint of 5+ years with financial consulting giants
    Ernst & Young and Deloitte, where he had the privilege to work out of the global
    financial epicenter of Wall Street, Manhattan, New York and the culturally significant
    hub of Los Angeles, California. Within India, he has worked across major commercial
    centers like Mumbai, Bengaluru, Chennai, Hyderabad and Pune, thus adding to his
    diverse expanse of professional network. Of recent, he has been with three banking
    organizations and currently leads the Machine Learning and Generative AI initiative
    at a large global commercial bank as the Vice President.


    ## About the Reviewer


    **Jyant**, a passionate Data Enthusiast with a Postgraduate degree in Artificial
    Intelligence from Great Lakes, embarked on his IT journey with Accenture, where
    he honed his skills in SAP BODS, SQL, PYTHON, and Excel, catering to US-based
    retail clients. Later, at Impact Analytics, he delved into a diverse tech stack,
    including R, Python, SQL, AWS, GCP, GUROBI, and more, while refining his interpersonal
    skills.


    During his tenure at Sapient, Jyant led teams in delivering a spectrum of products,
    from price optimization to movie recommendations and Credit Scoring Models, employing
    a versatile toolkit encompassing Python, R, Advance SQL, Superset, Airflow, Git,
    Azure, Pyspark, and others.


    Currently, as a leader at Zscaler, Jyant spearheads the development of two pivotal
    models: an attrition model and an innovative chatbot powered by AWS LEX. His expertise
    extends to LLm, Rag, and ReAct Prompt integration, alongside utilizing SQLAlchemy
    to enhance the chatbot''s capabilities.


    Jyant excels in tackling diverse challenges, is adept at creating Regression models
    for promotion optimization, utilizing Seaborn and Matplotlib for extensive EDA,
    and applying CNN and RESNET50 for image attribute tagging. He is also experienced
    at employing NLP for data extraction, developing Movie Recommendation Engines
    with Lightfm Neural Network models, and crafting intricate Price Optimization
    and Credit Scoring Models using bank and retail data.


    ## Acknowledgement


    I was extremely thrilled when BPB publications reached out to me with the opportunity
    to write this wonderful book. I would want to thank all the reviewers, technical
    experts, and editors of BPB publications for their valuable support and guidance
    throughout this journey and making it a worthwhile experience.


    I would want to acknowledge the generosity and consistent effort of the worldwide
    open source community of data science for providing a plethora of libraries and
    chunks of free reading material online that enables one to leverage their salient
    learnings and incorporate valuable inputs.


    Last but not least, I would wish to thank all the interested readers who have
    instilled in me, the motivation and inspiration leading to the making of this
    book.


    ## Preface


    The contemporary industry has witnessed an unprecedented growth of technology
    characterized by the advent of big data, Internet of Things (IoT), Artificial
    Intelligence, Machine Learning, Deep Learning and Robotic Process Automation.
    This has led to an inevitable need for professionals to upskill themselves in
    order to keep themselves relevant with this moving industry trend.


    This book has been designed with the sole purpose of providing a launching pad
    to students and professionals for breaking into these domains by leveraging the
    salient powers of Python.


    As one progresses through this book, one shall embark on an exciting learning
    curve to get oneself familiarized with preliminary domain specific concepts before
    picking up the Python editor to write code. The initial chapter would be a refresher
    that demonstrates the importance of Python in the current scenario and the chapters
    to follow would concentrate on individual topics. Every chapter would observe
    a consistent sequence of an initial overview of fundamental concepts followed
    by corresponding Python exercises. Wherever necessary, detailed guidance has also
    been provided for setup and installation of required software.


    Each chapter would end with an industry relevant use case in Python. These use
    cases are golden exercises in brushing up ones potential to add value and have
    been designed keeping in mind the demands of today’s industry and the salient
    skills and abilities required to fulfil them.


    This book is intended for both students and professionals who want to take their
    ability in Python programming to the next level by providing industry relevant
    value addition. This book should also be useful as an optimum handbook for quick
    reference of basic concepts of specific domains discussed within the book.


    This book shall definitely get one enthused in the arena of Python automation
    and channelize ones thought process in the appropriate direction for continuing
    to build value added applications in Python.


    ## Chapter 1: Why Python for Automation?


    - This chapter provides an overview of why Python is the chosen favorite programming
    language when it comes to building value added applications in popular domains
    like Artificial Intelligence, Machine Learning, Deep Learning. It shall discuss
    the inherent advantages associated with Python as an open source language and
    then highlight frequently used Python libraries.


    ## Chapter 2: RPA Foundations


    - This chapter introduces the reader to fundamental concepts of Robotic Process
    Automation (RPA) and discusses the various components of RPA. Thereafter, an overview
    of industry leaders in RPA like UiPath, Automation Anywhere and Blueprism has
    been provided. The chapter shall introduce the user to the Python ‘rpa’ library
    and end with an interesting practical use case with it.


    ## Chapter 3: Getting Started with AI/ML in Python


    - This chapter gets the reader kickstarted with fundamental concepts in Artificial
    Intelligence, Machine Learning and Deep Learning. Classical machine learning algorithms
    have been discussed followed by an introduction to deep'
  mdcn: '# 使用Python学习自主编程


    利用Python在人工智能、机器学习、深度学习和机器人流程自动化方面的能力


    Varun P Divadkar


    [www.bpbonline.com](http://www.bpbonline.com)


    2024年第一版


    版权所有 © BPB Publications, India


    ISBN: 978-93-55517-630


    *保留所有权利*。未经出版商事先书面许可，不得以任何形式或任何方式复制、分发或传播本出版物的任何部分，也不得将其存储在数据库或检索系统中，但程序清单除外，这些清单可以输入、存储和执行在计算机系统中，但不能通过出版、影印、录音或任何电子和机械手段进行复制。


    ## 责任限制与免责声明


    本书所含信息根据作者和出版商的最佳知识判断是真实准确的。作者已尽一切努力确保这些出版物的准确性，但对于因本书中任何信息而引起的任何损失或损害，出版商不承担任何责任。


    本书中提及的所有商标均被确认为其各自所有者的财产，但BPB Publications无法保证这些信息的准确性。


    ## 献给


    本书的每一位认真读者


    ## 关于作者


    在跨越12年以上、横跨六家跨国组织的多元化职业生涯中，**Varun P Divadkar** 因其在Python编程应用方面的交付专长，为人工智能、机器学习、深度学习和机器人流程自动化等前沿领域的各种全球技术功能项目做出了贡献，从而享有盛誉。他拥有MIT颁发的金牌机械工程师资格，这赋予了他独特的逻辑推理能力和定量分析能力。这进一步使他能够以陡峭的学习曲线掌握关键的数学和技术概念，从而指导学生和专业人士在探索这些前沿领域的旅程中前进。


    他的职业生涯始于著名的塔塔集团，在工程服务领域的制造部门工作，参与了工程设计的自动化。此后，他在金融咨询巨头安永和德勤工作了5年以上，有幸在华尔街、纽约曼哈顿这一全球金融中心以及加利福尼亚洛杉矶这一文化重镇工作。在印度，他曾在孟买、班加罗尔、钦奈、海得拉巴和浦那等主要商业中心工作，从而拓展了他多元化的职业网络。最近，他曾在三家银行机构工作，目前在一家大型全球商业银行担任副总裁，领导机器学习和生成式人工智能项目。


    ## 关于审稿人


    **Jyant** 是一位充满热情的数据爱好者，拥有大湖区大学人工智能研究生学位，他在埃森哲开始了他的IT职业生涯，在那里磨练了他在SAP BODS、SQL、PYTHON和Excel方面的技能，服务于美国零售客户。后来，在Impact
    Analytics，他深入研究了包括R、Python、SQL、AWS、GCP、GUROBI等在内的多样化技术栈，同时提升了他的人际交往能力。


    在Sapient任职期间，Jyant领导团队交付了从价格优化到电影推荐和信用评分模型等一系列产品，运用了包括Python、R、高级SQL、Superset、Airflow、Git、Azure、Pyspark等在内的多功能工具包。


    目前，作为Zscaler的领导者，Jyant主导开发两个关键模型：一个流失率模型和一个由AWS LEX驱动的创新聊天机器人。他的专业知识扩展到LLm、Rag和ReAct提示集成，同时利用SQLAlchemy增强聊天机器人的功能。


    Jyant擅长应对各种挑战，擅长创建用于促销优化的回归模型，利用Seaborn和Matplotlib进行广泛的探索性数据分析，并应用CNN和RESNET50进行图像属性标记。他还拥有使用NLP进行数据提取、使用Lightfm神经网络模型开发电影推荐引擎，以及使用银行和零售数据构建复杂的定价优化和信用评分模型的经验。


    ## 致谢


    当BPB Publications联系我，给我机会撰写这本精彩的书时，我感到非常兴奋。我要感谢BPB Publications的所有审稿人、技术专家和编辑在整个旅程中提供的宝贵支持和指导，使这次经历变得非常有价值。


    我要感谢全球数据科学开源社区的慷慨和持续努力，他们提供了大量的库和免费在线阅读材料，使人们能够利用他们的显著学习成果并融入有价值的输入。


    最后但同样重要的是，我要感谢所有感兴趣的读者，是他们激发了我创作这本书的动力和灵感。


    ## 前言


    当代工业见证了前所未有的技术增长，其特点是大数据、物联网、人工智能、机器学习、深度学习和机器人流程自动化的出现。这不可避免地要求专业人士提升自身技能，以跟上这一不断变化的行业趋势。


    本书的唯一目的是为学生和专业人士提供一个跳板，通过利用Python的显著力量进入这些领域。


    随着读者逐步深入本书，他们将踏上一段激动人心的学习曲线，在拿起Python编辑器编写代码之前，先熟悉初步的领域特定概念。第一章将是一个复习，展示Python在当前场景中的重要性，随后的章节将专注于各个主题。每章都将遵循一个一致的顺序：首先概述基本概念，然后进行相应的Python练习。在必要时，还提供了安装所需软件的详细指导。


    每章都将以一个与行业相关的Python用例结束。这些用例是提升个人价值潜力的宝贵练习，其设计考虑了当今行业的需求以及满足这些需求所需的重要技能和能力。


    本书旨在为希望将Python编程能力提升到新水平的学生和专业人士提供行业相关的价值增值。本书也应作为快速参考特定领域基本概念的最佳手册。


    本书无疑将使读者在Python自动化领域充满热情，并引导读者的思维过程朝着正确的方向发展，以继续构建增值的Python应用程序。


    ## 第1章：为什么选择Python进行自动化？


    - 本章概述了为什么Python是构建人工智能、机器学习、深度学习等热门领域增值应用的首选编程语言。它将讨论Python作为开源语言的固有优势，然后重点介绍常用的Python库。


    ## 第2章：RPA基础


    - 本章向读者介绍机器人流程自动化的基本概念，并讨论RPA的各种组成部分。随后，概述了RPA行业的领导者，如UiPath、Automation Anywhere和Blueprism。本章将向用户介绍Python的‘rpa’库，并以一个有趣的实际用例结束。


    ## 第3章：Python中的AI/ML入门


    - 本章让读者快速入门人工智能、机器学习和深度学习的基本概念。讨论了经典的机器学习算法，然后介绍了深度学习'
