  - "[PAGE 231]\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_231_0.png)\n\n**Figure\
    \ 9.1:** *Finding the optimum number of clusters using the elbow method*\n\nLet\
    \ us try to understand the code. We have created a loop which increments the number\
    \ of clusters starting from 1 to 10. Thereafter, we calculate the sum of the squared\
    \ errors in each iteration using the method **inertia_**. We then plot a graph\
    \ of the number of clusters versus the SSE values. This method is called as the\
    \ elbow method of determining the optimum value of K. As per the elbow method,\
    \ optimum value obtained is the one after which the graph distortion starts decreasing\
    \ in a linear trend. We observe from the graph that when the number of clusters\
    \ is **3**, the graph decreases in a linear trend for values beyond that. Hence,\
    \ the optimum value of K is **3**, which we already know is correct since this\
    \ is a labelled dataset of three types of flowers.\n\nNow, let is implement the\
    \ K Means clustering algorithm using the number of clusters as *K*=3. Copy and\
