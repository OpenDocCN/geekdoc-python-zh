- md: "## Chapter 5\n## Automating Excel and Spreadsheets\n\n### Introduction\n\n\
    Microsoft Excel automation is the commonly performed automation exercise by organizations\
    \ and individuals as Excel is the commonly used spreadsheet tool. The chapter\
    \ begins with the openpyxl library, which is a Python library to read/write Excel\
    \ 2010 xlsx/xlsm/xltx/xltm files and then takes the reader through the process\
    \ of automating some common tasks like creating a workbook, opening a workbook,\
    \ and performing various operations in a workbook and worksheet. The chapter continues\
    \ with the description and usage of other Python libraries used for Excel automation\
    \ like xlwings and xlsxWriter. The relative advantage of each library over the\
    \ other has been briefly discussed. The chapter ends with a real-world use case\
    \ project involving Excel automation with Python.\n\n### Structure\n\nThe chapter\
    \ covers the following topics:\n\n- Need for automating Excel using Python\n-\
    \ Introduction to openpyxl library\n    - Open and modify an existing workbook\n\
    \    - Access a cell using range name\n    - Merging a cell\n    - Looping through\
    \ cells\n    - Working with Excel formulae using openpyxl\n    - Create charts\
    \ using openpyxl\n    - Styling a chart\n- Other Python libraries for Excel automation\n\
    \    - Comparison summary of Python libraries\n- Practical use case in Python\n\
    \n### Objectives\n\nThis chapter would introduce the reader to the process of\
    \ creating basic and intermediate scripts to automate regular Excel processes\
    \ by unleashing the power of open-source Python libraries. Thereafter, the reader\
    \ would be able to comfortably explore these Python modules independently to create\
    \ custom scripts for more complicated tasks.\n\n### Need for automating Excel\
    \ using Python\n\nMicrosoft Excel spreadsheets have been the most widely used\
    \ office tool for decades together primarily due to their ease of use and secondarily\
    \ due to the variety of other features that they offer. Even though most of the\
    \ end users of Excel manually perform tasks, most of which typically involve the\
    \ use of formulae and then dragging them down or copying and pasting data or tables\
    \ from one sheet to another, the need for automation arises when these tasks become\
    \ repetitive, time-consuming, or prone to human error. Python, with its powerful\
    \ libraries, provides an efficient way to automate these processes, saving time\
    \ and improving accuracy.\n\n### Legal considerations of web scraping\n\nThere\
    \ exists no clear blueprint or a legal statement on web scraping that denies the\
    \ ethicality of the practice neither does the scope of this book intend to discuss\
    \ any grey areas in that regard. This topic is best left to the discretion and\
    \ further research of the reader. However, as a fact, most organizations are known\
    \ to conveniently use web scraping for analyzing customer sentiment, competitor\
    \ activities, market pricing and much more. It is important to understand that\
    \ no website would generally want to entertain another party to scrape data from\
    \ their page. If the scraping bot gets frequently detected, it could lead to the\
    \ visitor’s IP address getting blocked from further visiting the page, hence one\
    \ needs to be careful and considerate while performing web scraping and avoid\
    \ any malevolent intentions. If it can be proved by companies that a certain scraping\
    \ activity has caused infrastructural damage, then it may result in legal action.\
    \ Most websites usually provide a file called **robots.txt** which can be obtained\
    \ by just adding **/robots.txt** at the end of the web page URL. It contains certain\
    \ parameters like **User-agent** and **Disallow** that provide an idea of the\
    \ extent to which crawling might be allowed or disallowed to scrapers on their\
    \ web page.\n\n### Practical use case in Python\n\nLet us apply all that we learnt\
    \ in executing a practical use case using Python. Let us scrape the same website\
    \ **https://toscrape.com/** that we used in earlier exercises. Last time, we simply\
    \ wanted to extract the single line of text **Microdata and Pagination**. In this\
    \ exercise, we shall try to extract all the values in the first column titled\
    \ **Endpoints** from the table in the webpage shown in *Figure 4.4*.\n\nAs always,\
    \ we shall import the required libraries and create a **BeautifulSoup** object:\n\
    \n```python\nimport requests\nfrom bs4 import BeautifulSoup\nx = requests.get('https://toscrape.com/')\n\
    if x.status_code == 200:\n    objSoup = BeautifulSoup(x.content, 'html.parser')\n\
    ```\n\nNext, we shall access the last (second) table of the web page using the\
    \ code below:\n\n```python\ntbl = objSoup.findAll('table')[1]\n```\n\nWe have\
    \ seen previously that this table has multiple **tr** tags that embed the text\
    \ elements and links within it. We use the code below to get a list of all the\
    \ **tr** tags:\n\n```python\ntbltr = tbl.findAll('tr')\n```\n\nIf we inspect the\
    \ HTML tree from the developer’s tool, we find that except the first element in\
    \ the table which is basically the column header that contains the text *Endpoints*,\
    \ all other values in the column follow the tree structure of two **td** tags.\
    \ The first **td** tag contains the text that we want, and the second **td** tag\
    \ corresponds to the next column of the table which is what we were trying to\
    \ fetch in the previous exercise. We would now use the power of Python loops to\
    \ fetch the entire list of values using the code below:\n\n```python\ni=0\nfor\
    \ element in tbltr:\n    if not i==0:\n        print(element.findAll('td')[0].text)\n\
    \    i=+1\n```\n\nHere, we use an incremental **i** in order to ensure that the\
    \ first element is excluded.\n\nGiven below is the entire code for reference.\
    \ Let us run it in the Python editor and observe the output:\n\n```python\nimport\
    \ requests\nfrom bs4 import BeautifulSoup\nx = requests.get('https://toscrape.com/')\n\
    if x.status_code == 200:\n    objSoup = BeautifulSoup(x.content, 'html.parser')\n\
    \    tbl = objSoup.findAll('table')[1]\n    tbltr = tbl.findAll('tr')\n    i=0\n\
    \    for element in tbltr:\n        if not i==0:\n            print(element.findAll('td')[0].text)\n\
    \        i=+1\n```\n\nBelow is exactly the output that we were looking forward\
    \ to:\n\n- Default\n- Scroll\n- JavaScript\n- Delayed\n- Tableful\n- Login\n-\
    \ ViewState\n- Random\n\n### Conclusion\n\nThis chapter has kickstarted us on\
    \ the practical journey of data science because in the absence of reliable training\
    \ data, we cannot really proceed further with anything substantial. Web pages\
    \ are a source that occupy major chunks of data and hence web scraping using the\
    \ **requests** module and BeautifulSoup library from Python is an important skillset\
    \ that one needs to have when building challenging models and projects in data\
    \ science. Hope you have enjoyed the exercises and practical use cases from the\
    \ chapter and are now comfortable to explore web scraping further by yourself!\n\
    \nNow that we have the data, where do we think it should be stored? One place\
    \ would be databases and the other would be spreadsheets of course! Microsoft\
    \ Excel is the widely used spreadsheet software that is used to store, read, transform,\
    \ and manipulate data from spreadsheets. Do you not think it would be worthwhile\
    \ to have knowledge of automatically having to perform commonly used tasks on\
    \ Excel? The pleasing fact is that Python provides useful libraries to do exactly\
    \ that! Hence, without wasting further time, let us turn to the next chapter to\
    \ learn how we can utilize Python to perform automation on Microsoft Excel spreadsheets!\n\
    \n### Join our book’s Discord space\n\nJoin the book’s Discord Workspace for Latest\
    \ updates, Offers, Tech happenings around the world, New Release and Sessions\
    \ with the Authors:\n\n[https://discord.bpbonline.com](https://discord.bpbonline.com)"
  mdcn: "## 第五章\n## 自动化 Excel 与电子表格\n\n### 简介\n\nMicrosoft Excel 自动化是组织和个人常进行的自动化实践，因为\
    \ Excel 是常用的电子表格工具。本章首先介绍 `openpyxl` 库，这是一个用于读写 Excel 2010 xlsx/xlsm/xltx/xltm\
    \ 文件的 Python 库，然后引导读者了解自动化一些常见任务的过程，如创建工作簿、打开工作簿以及在工作簿和工作表中执行各种操作。本章继续介绍并描述了其他用于\
    \ Excel 自动化的 Python 库，如 `xlwings` 和 `xlsxWriter`。简要讨论了每个库相对于其他库的相对优势。本章以一个涉及使用\
    \ Python 进行 Excel 自动化的实际用例项目结束。\n\n### 结构\n\n本章涵盖以下主题：\n\n- 使用 Python 自动化 Excel\
    \ 的需求\n- `openpyxl` 库简介\n    - 打开并修改现有工作簿\n    - 使用范围名称访问单元格\n    - 合并单元格\n  \
    \  - 遍历单元格\n    - 使用 `openpyxl` 处理 Excel 公式\n    - 使用 `openpyxl` 创建图表\n    - 设置图表样式\n\
    - 其他用于 Excel 自动化的 Python 库\n    - Python 库比较总结\n- Python 实际用例\n\n### 目标\n\n本章将向读者介绍通过利用开源\
    \ Python 库的力量，创建基础和中级脚本来自动化常规 Excel 流程的过程。此后，读者将能够独立地轻松探索这些 Python 模块，为更复杂的任务创建自定义脚本。\n\
    \n### 使用 Python 自动化 Excel 的需求\n\nMicrosoft Excel 电子表格几十年来一直是使用最广泛的办公工具，主要归功于其易用性，其次是其提供的各种其他功能。尽管大多数\
    \ Excel 最终用户手动执行任务，其中大多数通常涉及使用公式，然后向下拖动或复制粘贴数据或表格到另一个工作表，但当这些任务变得重复、耗时或容易出现人为错误时，自动化的需求就出现了。Python\
    \ 及其强大的库提供了一种高效的方式来自动化这些流程，节省时间并提高准确性。\n\n### 网络爬虫的法律考量\n\n目前没有明确的蓝图或法律声明来否定网络爬虫实践的道德性，本书的范围也不打算讨论这方面的任何灰色地带。这个话题最好留给读者自行判断和进一步研究。然而，事实上，大多数组织都以方便地使用网络爬虫来分析客户情绪、竞争对手活动、市场价格等而闻名。重要的是要理解，通常没有网站会愿意让另一方从其页面抓取数据。如果爬虫被频繁检测到，可能会导致访问者的\
    \ IP 地址被阻止进一步访问该页面，因此在进行网络爬虫时需要谨慎并考虑周全，避免任何恶意意图。如果公司能够证明某个爬虫活动造成了基础设施损坏，则可能导致法律行动。大多数网站通常提供一个名为\
    \ **robots.txt** 的文件，只需在网页 URL 末尾添加 **/robots.txt** 即可获取。它包含某些参数，如 **User-agent**\
    \ 和 **Disallow**，这些参数提供了关于爬虫在其网页上被允许或禁止爬取程度的概念。\n\n### Python 实际用例\n\n让我们运用所学知识，使用\
    \ Python 执行一个实际用例。让我们抓取我们在之前练习中使用的同一个网站 **https://toscrape.com/**。上次，我们只想提取单行文本\
    \ **Microdata and Pagination**。在本练习中，我们将尝试从 *图 4.4* 所示网页的表格中提取标题为 **Endpoints**\
    \ 的第一列中的所有值。\n\n一如既往，我们将导入所需的库并创建一个 **BeautifulSoup** 对象：\n\n```python\nimport\
    \ requests\nfrom bs4 import BeautifulSoup\nx = requests.get('https://toscrape.com/')\n\
    if x.status_code == 200:\n    objSoup = BeautifulSoup(x.content, 'html.parser')\n\
    ```\n\n接下来，我们将使用以下代码访问网页的最后一个（第二个）表格：\n\n```python\ntbl = objSoup.findAll('table')[1]\n\
    ```\n\n我们之前已经看到，这个表格有多个 **tr** 标签，其中嵌入了文本元素和链接。我们使用以下代码获取所有 **tr** 标签的列表：\n\n\
    ```python\ntbltr = tbl.findAll('tr')\n```\n\n如果我们从开发人员工具检查 HTML 树，会发现除了表格中的第一个元素（基本上是包含文本\
    \ *Endpoints* 的列标题）之外，该列中的所有其他值都遵循两个 **td** 标签的树结构。第一个 **td** 标签包含我们想要的文本，第二个\
    \ **td** 标签对应于表格的下一列，这正是我们在上一个练习中试图获取的内容。我们现在将使用 Python 循环的力量，使用以下代码获取整个值列表：\n\
    \n```python\ni=0\nfor element in tbltr:\n    if not i==0:\n        print(element.findAll('td')[0].text)\n\
    \    i=+1\n```\n\n在这里，我们使用一个递增的 **i** 来确保排除第一个元素。\n\n以下是供参考的完整代码。让我们在 Python 编辑器中运行它并观察输出：\n\
    \n```python\nimport requests\nfrom bs4 import BeautifulSoup\nx = requests.get('https://toscrape.com/')\n\
    if x.status_code == 200:\n    objSoup = BeautifulSoup(x.content, 'html.parser')\n\
    \    tbl = objSoup.findAll('table')[1]\n    tbltr = tbl.findAll('tr')\n    i=0\n\
    \    for element in tbltr:\n        if not i==0:\n            print(element.findAll('td')[0].text)\n\
    \        i=+1\n```\n\n以下正是我们期待的输出：\n\n- Default\n- Scroll\n- JavaScript\n- Delayed\n\
    - Tableful\n- Login\n- ViewState\n- Random\n\n### 结论\n\n本章已经开启了我们数据科学的实践之旅，因为在缺乏可靠训练数据的情况下，我们无法真正进行任何实质性的工作。网页是占据大量数据的来源，因此使用\
    \ Python 的 **requests** 模块和 BeautifulSoup 库进行网络爬虫是构建具有挑战性的数据科学模型和项目时需要掌握的重要技能。希望你喜欢本章的练习和实际用例，现在可以自己进一步探索网络爬虫了！\n\
    \n既然我们有了数据，你认为它应该存储在哪里？一个地方是数据库，另一个当然是电子表格！Microsoft Excel 是广泛使用的电子表格软件，用于存储、读取、转换和操作电子表格中的数据。你不认为掌握自动执行\
    \ Excel 常用任务的知识是值得的吗？令人高兴的是，Python 提供了有用的库来做到这一点！因此，事不宜迟，让我们转向下一章，学习如何利用 Python\
    \ 在 Microsoft Excel 电子表格上执行自动化！\n\n### 加入我们的书籍 Discord 空间\n\n加入书籍的 Discord 工作区，获取最新更新、优惠、全球科技动态、新书发布以及与作者的交流会：\n\
    \n[https://discord.bpbonline.com](https://discord.bpbonline.com)"
