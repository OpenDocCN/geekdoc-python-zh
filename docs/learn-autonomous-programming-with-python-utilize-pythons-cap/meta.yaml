    ## Sending a Gmail message using Python


    After following all steps in the previous exercises, we have finally arrived at
    the section where we would be writing the Python code!


    Copy the code below into the Python editor:


    ```

    from email.message import EmailMessage

    import ssl as objSSL

    import smtplib


    strSender = ''XXXXXXXX@gmail.com''

    strReceiver = ''XXXXXXXX@gmail.com''

    strPassword = ''XXXXXXXX''


    strSubject = ''Learning Email Sending with Python''

    strBody = """ Learning how to send emails using Python.

    """


    objEmail = EmailMessage()

    objEmail[''From''] = strSender

    objEmail[''To''] = strReceiver

    objEmail[''Subject''] = strSubject

    objEmail.set_content(strBody)


    objContext = objSSL.create_default_context()


    objSMTP = smtplib.SMTP_SSL(''smtp.gmail.com'',465,context=objContext)

    objSMTP.login(strSender, strPassword)

    objSMTP.sendmail(strSender,

    strReceiver,objEmail.as_string())

    ```


    Most of the code is self-explanatory. In the value for string variable **strSender**
    enter your Gmail ID for which you performed the 2-step verification and generated
    the app password. For the variable **strReceiver** enter the email ID of the person
    to whom you want to send the email message.


    While for the variable **strPassword** enter the app password that we just generated
    and saved in the previous section.


    We use **ssl** library from Python in order to add a layer of security to safeguard
    information by authenticating the website. SSL basically stands for Secure Socket
    Layer protocol.


    To send the mail, we use the **smtplib** library from Python which provides the
    functionality of sending email through Simple Mail Transfer Protocol. We also
