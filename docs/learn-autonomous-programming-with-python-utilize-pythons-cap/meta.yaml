  mdcn: "## Luigi\n\nApache Luigi 是一个基于 Python API 的工作流管理系统，能够构建复杂的数据管道。\n\n- 1. 在使用\
    \ **luigi** 之前，第一步需要使用以下命令安装该软件包：\n\n**pip install luigi**\n\n我们将使用相同的数学运算示例来理解\
    \ **luigi** 的工作原理。\n\n**luigi** 软包的基础模块是 **Task** 模块，我们首先使用以下代码导入它：\n\n```python\n\
    import luigi\nfrom luigi import Task\n```\n\n**luigi** 的工作方式是创建一个接收 **Task** 参数的类，在该类中定义所有必需的函数，并包含一个执行工作流的\
    \ **run** 方法。我们首先将类定义为 **Mathematical_Operations**，如下所示：\n\n```python\nclass Mathematical_Operations(Task):\n\
    ```\n\n我们观察到，我们定义了一个接收 **Task** 对象作为参数的类，这使我们能够在该类中执行 **luigi** 活动。\n\n- 2. 接下来，我们在类中定义两个参数\
    \ **intNum_1** 和 **intNum_2**，并将它们初始化为 **luigi.Parameter()**。这将使我们能够使用动态参数初始化类，类似于类中的构造函数，如下所示：\n\
    \n```python\nclass Mathematical_Operations(Task):\n    intNum_1 = luigi.Parameter()\n\
    \    intNum_2 = luigi.Parameter()\n```\n\n- 3. 接下来，我们将在类中定义常规的 **Add** 函数，该函数将使用参数\
    \ **intNum_1** 和 **intNum_2**。我们还定义了 **Double** 函数，该函数将返回值加倍。更新后的类如下所示：\n\n```python\n\
    class Mathematical_Operations(Task):\n    intNum_1 = luigi.Parameter()\n    intNum_2\
    \ = luigi.Parameter()\n    def Add(self,intNum_1,intNum_2):\n        return intNum_1\
    \ + intNum_2\n    def Double(self,intNum):\n        return 2*intNum\n```\n\n-\
    \ 4. 现在我们来到最重要的部分，即 **run** 函数。正是这个函数将使用我们在类中定义的所有函数来执行工作流中的过程。整个类以及 **run** 函数如下所示：\n\
    \n```python\nclass Mathematical_Operations(Task):\n    intNum_1 = luigi.Parameter()\n\
    \    intNum_2 = luigi.Parameter()\n    def Add(self,intNum_1,intNum_2):\n    \
    \    return intNum_1 + intNum_2\n    def Double(self,intNum):\n        return\
    \ 2*intNum\n    def run(self):\n        Sum = self.Add(self.intNum_1,self.intNum_2)\n\
    \        Doubled_Sum = self.Double(Sum)\n        print(Doubled_Sum)\n```\n\n-\
    \ 5. 最后，我们调用 **luigi** 模块的 **build** 函数来执行工作流，如下所示：\n\n```python\nluigi.build([Mathematical_Operations(intNum_1=5,intNum_2=10)],local_scheduler=True)\n\
    ```\n\n我们向 **build** 函数传递两个参数。第一个参数是 **Mathematical_Operations** 类的实例，第二个参数是 **local_scheduler\
    \ = True**，这表示我们希望在本地运行此任务，而无需连接到 **luigi** 服务器。\n\n完整的代码如下所示，供参考。在 Python 编辑器中复制并运行代码：\n\
    \n```python\nimport luigi\nfrom luigi import Task\n\nclass Mathematical_Operations(Task):\n\
    \    intNum_1 = luigi.Parameter()\n    intNum_2 = luigi.Parameter()\n\n    def\
    \ Add(self,intNum_1,intNum_2):\n        return intNum_1 + intNum_2\n\n    def\
    \ Double(self,intNum):\n        return 2*intNum\n\n    def run(self):\n      \
    \  Sum = self.Add(self.intNum_1,self.intNum_2)\n        Doubled_Sum = self.Double(Sum)\n\
    \        print(Doubled_Sum)\n\nluigi.build([Mathematical_Operations(intNum_1=5,intNum_2=10)],local_scheduler=True)\n\
    ```\n\n运行代码后，我们得到如下输出：\n\n```\n===== Luigi Execution Summary =====\nScheduled\
    \ 1 tasks of which:\n* 1 ran successfully:\n    - 1 Mathematical_Operations(intNum_1=5,\
    \ intNum_2=10)\nThis progress looks :) because there were no failed tasks or missing\
    \ dependencies\n===== Luigi Execution Summary =====\n30\n```\n\n我们观察到输出控制台中显示了值\
    \ **30**，这正是我们期望在结果中得到的值。摘要显示了已运行的任务信息。由于我们这里只有一个 **Mathematical_Operations**\
    \ 类，摘要仅提及了该特定任务。\n\n控制台中的完整输出还将包含带有 **DEBUG** 和 **INFO** 语句以及用户名详细信息的完整日志，此处未显示。\n\
    \n通过这种方式，我们了解了 **luigi** 模块的基本框架。**luigi** 的官方文档将讨论更多有用的功能，这些功能将使人们能够将更复杂的管道整合到其中。\n\
    \n我们现在已经了解了 **prefect** 和 **luigi** 模块，并通过示例观察了它们如何实现工作流管理功能的整合。现在，我们将通过一个 Python\
    \ 中的实际用例来结束本章。\n\n## Python 中的实际用例\n\n我们现在来到了本章的最后一节，在这里我们将应用所学知识，在 Python 中实现一个实际用例。\n\
