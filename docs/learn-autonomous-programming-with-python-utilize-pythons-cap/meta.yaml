    In 1950, English mathematician and computer scientist *Alan Turing* came up with
    a test to determine whether a machine can mimic a human in terms of thinking.
    This test also called **Turing Test** has become a blueprint of measure even today
    of the artificial intelligence that a machine possesses. In this test, a person
    is supposed to simultaneously interact with another human and a machine. Based
    on the responses received from the human and the machine, the person who is interacting
    is supposed to distinguish the machine’s response from the human’s response. If
    at some point of time the person fails to distinguish between the machine’s response
    and the human’s response, then the machine is considered to have successfully
    passed the Turing Test.


    Since then, incremental attempts have been made at enhancing the potential of
    machines to mimic human abilities. With the rise of big data, cloud computing
    and **Internet of Things (IoT)**, computational capabilities have risen manifold
