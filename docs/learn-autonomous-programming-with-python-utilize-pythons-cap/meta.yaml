  - '[PAGE 112]


    Here, we first create a dictionary named **dict_scores** that stores the scores
    of every student in each of the subjects Mathematics, Science and English. This
    dictionary contains keys ‘A’, ‘B’, ‘C’, ‘D’,’E’ that correspond to the students.
    Every value corresponding to this key is also a dictionary that contains keys
    as subjects ‘Mathematics’, ‘Science’, ‘English’ and values as the respective scores
    obtained by the student in these subjects. Next, we loop through each student
    key and within this loop we further loop through every subject key to obtain the
    scores of every student in that subject.


    Study the loop in the code carefully to see how the loop navigates through individual
    columns for each student and through every row within each column while entering
    the scores. After running the code, open the workbook **Student Table.xlsx**.
    You would observe that the scores have been entered as shown in the *Figure 5.6*
    below:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_112_0.png)


    **Figure 5.6:** *Students table populated with scores using Python loop*


    In this section, we saw how **worksheet.cell()** in openpyxl can accept row and
    column parameters as dynamic inputs and enable one to navigate through the worksheet
    populate values by using Python loops.


    Next, we shall see how openpyxl can be used to populate Excel formulas that we
    regularly use.


    # Working with Excel formulae using openpyxl'
  - '[PAGE 113]


    In this section, we would learn how to populate an Excel formula in a particular
    cell using openpyxl library and thereafter we shall also learn how to drag the
    formulae to adjacent cells.


    We shall use the same workbook **Student Table.xlsx** that we saved in the previous
    exercise. Copy the code below in the Python editor:


    ```

    from openpyxl import load_workbook

    from openpyxl.styles import Alignment

    objWorkbook = load_workbook("Student Table.xlsx")

    objWorksheet = objWorkbook.worksheets[0]

    objWorksheet[''B5'']="=ROUND(AVERAGE(B2:B4),0)"

    objWorksheet[''B5''].alignment = Alignment(horizontal=''center'',\nvertical=''center'')

    objWorkbook.save("Student Table.xlsx")

    ```


    Here, the line of code that inserts an Excel formula at cell B5 is:


    **objWorksheet[''B5'']="=ROUND(AVERAGE(B2:B4),0)".**


    Basically, the formula is trying to calculate the average of the scores earned
    in all the three subjects by student A and then round the result to the nearest
    integer. Once you execute the code, open the workbook and observe cell B5. You
    would see that the average value rounded to the nearest integer would be populated
    in that cell. For student A, the average of the scores 45, 55 and 75 earned in
    Mathematics, Science and English respectively comes out to be 58.333. Rounding
    it to the nearest integer gives 58 which is exactly the value that we see in cell
    B5 as shown in the *Figure 5.7* below:'
  - '[PAGE 114]


    ![](img/3bdf02f00d53ff55047d1e1759de2882_114_0.png)


    **Figure 5.7:** *Average score of student A calculated in cell B5 using openpyxl*


    Now that we have successfully populated the formula in one cell, the next thing
    we would want to do is drag the formula to the remaining cells C5, D5, E5 and
    F5 so that we could compute the average scores of students B, C, D and E as well,
    rounded to the nearest integer.


    When we manually work with Excel spreadsheets, we simply copy a cell and paste
    it to another cell, so the formula gets automatically updated in that cell. However,
    we would need a different work around when we perform this exercise through code
    using openpyxl. Fortunately, openpyxl provides a module called Translator that
    does this task for us.


    Add the line below to the previous code:


    ```

    from openpyxl.formula.translate import Translator

    ```


    This line imports the Translator module. Now let us implement it using the code
    below:


    ```

    objWorksheet[''C5''] = Translator("=ROUND(AVERAGE(B2:B4),0)", \n"B5").translate_formula("C5")

    ```


    The Translator module takes in two parameters, the formula to be translated and
    the cell range where the formula originally belongs. Thereafter, the **translate_formula**
    method of the Translator module takes in the cell range as'
  - '[PAGE 115]


    an argument where we would want to transfer the formula. In this case, it is **C5**
    because we want to transfer the formula to range C5. The complete code is given
