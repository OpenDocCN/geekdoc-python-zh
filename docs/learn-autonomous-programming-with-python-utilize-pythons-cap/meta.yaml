    +   - Pytest is extremely easy to learn as is evident from the examples we just
    studied in the previous section. The **assert** keyword of Python forms the crux
    of Pytest which makes it the essence of focus for the tester. Moreover, test functions
    should simply be named with **test_** prepended or **_test** appended and **pytest**
    would itself do the job of searching them. All of this makes the learning curve
    for Pytest a steep one.

    - Pytest is free and does not have any licensing cost.

    - Pytest can choose to selectively run specific methods from a test file based
    on the conditions. This is accomplished using the filtering functionality provided
    by the **pytest** library.

    - As compared to other testing libraries like **unittest**, the **pytest** library
    requires writing less code which makes it compact for the tester.


    Inspite of the numerous advantages mentioned above that Pytest provides, it is
    important to note one possible limitation of Pytest that integrating Pytest with
    other frameworks might become challenging because Pytest uses specific routines
    for writing tests requiring rewriting of the entire code.


    With this, we finish our exploration of another interesting framework called Pytest.


