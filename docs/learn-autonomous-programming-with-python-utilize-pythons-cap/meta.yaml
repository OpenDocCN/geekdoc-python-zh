    \n$$Y = c0 + c1*x1 + c2*x2 + c3*x3 + ..... + cn*xn.$$\n\n这里，集合*{c0, c1, c2, c3,......,cn}*是系数，值*cn*是截距。在线性回归中，我们基本上是获得系数和截距的最佳值。所谓最佳值，我们指的是那些能使实际点与线预测的点之间的垂直距离平方和最小化的值集。\n\
