    ### Introduction


    The fact that we have previously covered the foundations of **robotic process
    automation (RPA)** in *Chapter 2, RPA Foundations*, should give us the prerogative
    to explore the role of Python in enhancing the efficiency and flexibility of RPA
    tools like UiPath. This chapter shall deal with this topic in depth where the
    inclusion of Python scripting in RPA enhancement would be demonstrated through
    a detailed step by step guided walkthrough.


    Even though RPA tools like UiPath provide specialized versions that do not require
    programming for those professionals who are not keen to program themselves, this
    chapter would focus on the customizable version of RPA software that enables one
    to include a programmable script to enhance the efficiency and operations of the
    workflow.


    In this chapter, we would discuss the different activities within UiPath that
    constitute the sequence that enables Python integration with UiPath. Each of these
    activities would have their own unique attributes which we would glance through
    in detail.'
