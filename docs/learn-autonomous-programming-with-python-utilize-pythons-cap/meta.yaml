  - '[PAGE 116]


    ![](img/3bdf02f00d53ff55047d1e1759de2882_116_0.png)


    **Figure 5.8:** Formula from cell B5 updated to cell C5 using openpyxl Translator.


    The cell C5 correctly reflects the formula **=ROUND(AVERAGE(C2:C4),0)** thus making
    it clear that the formula from cell B5 has been correctly dragged to C5. Similarly,
    we can use the Translator module to update the formula in cell D5, E5 and F5.


    However, would this be the most efficient way of updating the formulae in subsequent
    cells? Here, we have just three more cells to update the formulae but suppose
    we had one hundred such cells to update then would we be calling the Translator
    module one hundred more times and write a hundred lines of additional code? Definitely
    not! And that is where the power of Python loops comes into picture.


    Unlike what we did earlier, we would start from cell C5 and loop through four
