    # Supervised and unsupervised learning


    Depending on the type of input data, machine learning can be classified into Supervised
    Learning and Unsupervised Learning. Let us try to understand each of these:

    **Supervised learning:** In the example from the previous section, we saw that
    every item in the input data set was accompanied by a corresponding item in the
    output data set. This kind of data set where every input is accompanied by a corresponding
    output is called as a ‘labelled’ data set. Whenever a machine is trained on such
    a labelled data set the type of machine learning is called as ‘supervised learning’
    because the training is guided or supervised by the presence of an output data.
    Typical examples of supervised algorithms are linear regression, logistic regression,
    k nearest neighbors, Naïve Bayes, decision trees, random forests and support vector
    machines. Let us take a quick look at each of them. We shall implement them in
    detail using Python in later chapters. Here, we shall try to understand them.


    +   - **Linear regression:** This is the process of drawing a straight line that
    fits best to a set of points. Linear Regression is also sometimes conveniently
    called **least squares regression** because the criterion chosen to fit the line
    is that the sum of the squares of the vertical distance of the points from the
    line should be the least.'
