    # # Chapter 12

    ## Hyperautomation


    # ## Introduction


    Until now, we have explored the intricacies of automation when it comes to desktop,
    web, file, folder, data science algorithms or workflow automation. Our journey
    in automation until now has culminated into workflow automation in *Chapter 11,
    Automating Business Process Workflows*, where we have not just automated individual
    processes but incorporated sequential procedures in a workflow using Python libraries.


    All these frontiers that we explored have been wonderful in their own ways. However,
    when used in tandem with cognitive intelligence provided by machine learning,
    **robotic process automation (RPA)** and other AI tools, they have the potential
    to make a remarkable impact on the entire system. That is exactly what hyperautomation
    is!


    This chapter shall introduce the reader to the concept of hyperautomation, expand
    on the idea further and thereafter cover salient examples in Python that illustrate
