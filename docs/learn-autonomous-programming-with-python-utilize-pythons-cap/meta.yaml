    # # Chapter 5

    # Automating Excel and Spreadsheets


    # ## Introduction


    Microsoft Excel automation is the commonly performed automation exercise by organizations
    and individuals as Excel is the commonly used spreadsheet tool. The chapter begins
    with the openpyxl library, which is a Python library to read/write Excel 2010
    xlsx/xlsm/xltx/xltm files and then takes the reader through the process of automating
