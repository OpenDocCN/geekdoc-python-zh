- md: 'Even though the examples might come under the previously studied topics of
    **natural language processing (NLP)** and robotic process automation, it would
    be an altogether novel experience revisiting the topics from a different perspective
    and under a different section.


    ## Structure


    The chapter covers the following topics:


    - Defining hyperautomation: What it is and why it matters

    - The hyperautomation cycle: Key steps and processes

    - Exploring typical use cases for hyperautomation

    - Enhancing document understanding with optical character recognition

    - Implementing conversational agents: The role of chat bots

    - Advancing efficiency with robotic process automation

    - Navigating the challenges of hyperautomation

    - Practical use case in Python


    ## Objectives


    By the end of this chapter, the reader would appreciate the term **hyperautomation**
    as something which contains the same technologies which we covered in earlier
    chapters but have the potential to create something new when used in tandem.


    This chapter shall revisit some of the previously covered topics like natural
    language processing, optical character recognition and robotic process automation
    from a different perspective and under a broader horizon of hyperautomation and
    shall also attempt to tackle certain previously uncovered sections related to
    these technologies. The concept, design, and application of a conversational agent
    or chatbot would be explored using Python, thus adding a new dimension to the
    topic of natural language processing. Applications like Email filtering would
    be discussed, thus doing further justice to the usage of machine learning for
    hyperautomation. As with any other chapter, this one would also end with a practical
    use case in Python of an interesting example in hyperautomation.


    ## Defining hyperautomation: What it is and why it matters


    If we look at the history of the industry, the first industrial revolution called
    **Industry 1.0** demonstrated the power of locomotives like the steam engine in
    achieving automation. The second one called **Industry 2.0** took a step further,
    with regards to sophistication by adding electricity and internal combustion engine.
    The third called **Industry 3.0** pioneered the use of computers, electronics,
    and **information technology (IT)** to greatly accelerate the rate of automation.
    The fourth one called **Industry 4.0** has the internet as the hallmark where
    the concept of **internet of things (IoT)** makes all computing devices interrelated.
    Higher computational power enabled by **graphical processing unit (GPU)** has
    made the implementation of machine learning and deep learning algorithms a reality.


    Tracing the evolution of industry from the steam-powered automation of Industry
    1.0 to the interconnected world of Industry 4.0, we see a pattern of constant
    innovation. Considering the fact that the contemporary industry has witnessed
    tremendous growth due to innovation, it becomes imperative for an organization
    to not just restrict itself to procedural automation but also incorporate cognitive
    intelligence in its business process workflows in order to remain relevant in
    the ever-evolving business landscape and emerge as an able competitor who is a
    cut above the rest. To make it simple, the horizon of traditional automation needs
    to be expanded to include salient aspects of cognitive thinking that adds an element
    of intelligence to the business process and to the system. Today’s business landscape
    demands more than just procedural automation – it requires the integration of
    cognitive intelligence. In the emerging context, this idea is termed as **hyperautomation**
    which basically means automating everything that is possible. Hyperautomation
    represents this next leap, where AI, ML, and RPA are orchestrated to not just
    automate tasks but to imbue systems with sophisticated, cognitive capabilities.
    This may sound very idealistic and may be far from reality now, but nevertheless
    has the potential to upgrade and ascend to levels close to what we define as **ideal**.
    Simply put, hyperautomation is the process of increasing the capability of existing
    automation by introducing the power of **artificial intelligence (AI)**, **machine
    learning (ML)** and robotic process automation into it. In other words, we define
    hyperautomation as the holistic automation of complex business processes, aiming
    to automate as much as possible by harnessing AI and ML. This concept is not just
    an ideal but a tangible goal that can significantly elevate operational efficiency
    and competitiveness.


    We have already studied the concept of orchestration in the previous chapter.
    Another way of looking at hyperautomation is the orchestration of multiple technologies
    by combining process automation with robotic process automation and cognitive
    technologies like artificial intelligence and machine learning. This addition
    of cognitive intelligence adds an element of sophistication and provides a competitive
    advantage to the business.


    ## The hyperautomation cycle: Key steps and processes


    Every organization would have to go through some key steps in the planning of
    their hyperautomation cycle. These steps might vary from one organization to another,
    but there are some general steps that remain common to any organization. They
    have been diagrammatically shown in *Figure 12.1* below:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_298_0.png)


    **Figure 12.1:** *Steps in the hyperautomation cycle*


    We shall now elaborate each step:


    1.  **Identifying the goal:** This is the most crucial and important defining
    step of the hyperautomation process and hence it comes first in the sequence.
    Any business needs to have a clear goal in picture prior to contemplating any
    implementation of hyperautomation. If a business is going for hyperautomation
    just for the sake of it or to keep up with the trend or simply because other organizations
    are using it, then it clearly becomes a recipe for disaster. A business should
    have a clear vision of the goals and the challenges that it is trying to conquer
    so that the adoption of hyperautomation becomes well defined, selective, and customized
    for the business.


    2.  **Selection of key technologies:** Once a business has identified the goal,
    the next step would be to list out those areas where adoption of hyperautomation
    would ensure significant value addition. For example, an e-commerce business would
    want to consider adoption of recommendation algorithms in order to improve customer
    engagement and satisfaction. This might prompt them to incorporate sophisticated
    machine learning algorithms to serve this purpose. Another business might simply
    be interested in eliminating the involvement of its talented workforce in repetitive
    manual work in order to utilize them for more creative and constructive tasks.
    Hence it might go for robotic process automation.


    3.  **Assessment of capabilities:** Once the goal has been identified along with
    the necessary technologies that would meet the goal, the organization needs to
    assess the time, money, and resources that it would need in order to implement
    the technologies.


    4.  **Continuous improvement:** Any process must be continuously monitored for
    feedback that enables the business to rectify errors and incorporate learning
    in the next implementation.


    ## Exploring typical use cases for hyperautomation


    Having already received a good understanding about hyperautomation in the previous
    introductory sections, let us jump straightaway to some typical use cases in hyperautomation
    where Python comes to the rescue! In this chapter, we would be covering the commonly
    occurring applications below that come under the purview of hyperautomation and
    study each of them in the sections to follow:


    - **Document understanding using optical character recognition**: We have studied
    the concept of **optical character recognition (OCR)** in *Chapter 7, Working
    with PDFs, and Images*, where we utilized the tesseract library of Python to read
    text from images. We shall implement the same concept in this chapter, this time
    for reading information from image documents. This requirement frequently arises
    in all organizations where important documents may have information in an unstructured
    format where text recognition using OCR greatly accelerates the automation cycle
    by considerably reducing the element of human involvement in extracting information
    from these documents.


    - **Conversational agents - Chatbots**: In our discussion on natural language
    processing in one of our previous chapters, we have discussed how the Python libraries
    NLTK and Spacy provide readily available methods to enable one to implement salient
    features of NLP pipeline. One of the many applications of NLP is a Chatbot or
    a conversational agent which has become an indispensable part of any business
    today. Chatbots enable human to customer interaction on most of the generic topics,
    thus reducing unnecessary human involvement.'
  mdcn: '尽管这些示例可能涉及先前已学习的**自然语言处理（NLP）**和机器人流程自动化主题，但从不同视角和章节重新审视这些主题将是一种全新的体验。


    ## 结构


    本章涵盖以下主题：


    - 定义超级自动化：它是什么以及为何重要

    - 超级自动化周期：关键步骤和流程

    - 探索超级自动化的典型用例

    - 利用光学字符识别增强文档理解

    - 实施对话代理：聊天机器人的作用

    - 通过机器人流程自动化提升效率

    - 应对超级自动化的挑战

    - Python中的实际用例


    ## 目标


    在本章结束时，读者将理解**超级自动化**这一术语，它包含我们在前面章节中涵盖的相同技术，但当这些技术协同使用时，具有创造新事物的潜力。


    本章将从不同视角和更广阔的超级自动化视野，重新审视一些先前涵盖的主题，如自然语言处理、光学字符识别和机器人流程自动化，并尝试探讨与这些技术相关的某些先前未涵盖的部分。我们将使用Python探索对话代理或聊天机器人的概念、设计和应用，从而为自然语言处理主题增添新的维度。还将讨论电子邮件过滤等应用，进一步体现机器学习在超级自动化中的应用。与其他章节一样，本章也将以Python中一个有趣的超级自动化实际用例结束。


    ## 定义超级自动化：它是什么以及为何重要


    回顾工业历史，第一次工业革命（称为**工业1.0**）展示了蒸汽机等机车在实现自动化方面的力量。第二次工业革命（称为**工业2.0**）通过增加电力和内燃机，在复杂性上更进一步。第三次工业革命（称为**工业3.0**）率先使用计算机、电子设备和**信息技术（IT）**，极大地加速了自动化进程。第四次工业革命（称为**工业4.0**）以互联网为标志，其中**物联网（IoT）**的概念使所有计算设备相互关联。**图形处理单元（GPU）**提供的更高计算能力使机器学习和深度学习算法的实现成为现实。


    追溯工业从工业1.0的蒸汽动力自动化到工业4.0的互联世界的演变，我们看到了持续创新的模式。考虑到当代工业因创新而经历了巨大增长，组织不仅需要将自身限制于流程自动化，还需要在其业务流程工作流中融入认知智能，以便在不断演变的商业环境中保持相关性，并成为脱颖而出的有能力的竞争者。简而言之，传统自动化的视野需要扩展，以包含认知思维的重要方面，为业务流程和系统增添智能元素。当今的商业格局要求的不仅仅是流程自动化——它需要整合认知智能。在新兴背景下，这一概念被称为**超级自动化**，其基本含义是自动化一切可能的事物。超级自动化代表了下一个飞跃，其中人工智能、机器学习和机器人流程自动化被协调起来，不仅自动化任务，还为系统赋予复杂的认知能力。这听起来可能非常理想化，目前可能还远未实现，但它具有升级并提升到接近我们所定义的**理想**水平的潜力。简而言之，超级自动化是通过引入**人工智能（AI）**、**机器学习（ML）**和机器人流程自动化的强大功能来增强现有自动化能力的过程。换句话说，我们将超级自动化定义为复杂业务流程的整体自动化，旨在通过利用AI和ML尽可能实现自动化。这一概念不仅是一个理想，更是一个可以显著提升运营效率和竞争力的切实目标。


    我们已经在前一章中研究了编排的概念。另一种看待超级自动化的方式是通过将流程自动化与机器人流程自动化以及人工智能和机器学习等认知技术相结合，来编排多种技术。这种认知智能的加入增添了复杂性元素，并为业务提供了竞争优势。


    ## 超级自动化周期：关键步骤和流程


    每个组织在规划其超级自动化周期时都需要经历一些关键步骤。这些步骤可能因组织而异，但有一些通用步骤对任何组织都是共同的。它们已在下面的*图12.1*中以图表形式展示：


    ![](img/3bdf02f00d53ff55047d1e1759de2882_298_0.png)


    **图12.1：** *超级自动化周期中的步骤*


    现在我们将详细阐述每个步骤：


    1.  **确定目标：** 这是超级自动化过程中最关键和最重要的定义性步骤，因此它在序列中排在第一位。任何业务在考虑实施超级自动化之前，都需要有一个清晰的目标。如果一个业务仅仅为了超级自动化而进行，或者为了跟上潮流，或者仅仅因为其他组织在使用它，那么这显然会成为灾难的根源。业务应该对试图实现的目标和挑战有清晰的愿景，以便超级自动化的采用变得明确、有选择性并针对业务进行定制。


    2.  **选择关键技术：** 一旦业务确定了目标，下一步就是列出那些采用超级自动化将确保显著增值的领域。例如，电子商务业务可能希望考虑采用推荐算法，以提高客户参与度和满意度。这可能促使他们整合复杂的机器学习算法来实现这一目的。另一个业务可能只是希望消除其优秀员工参与重复性手动工作的需要，以便将他们用于更具创造性和建设性的任务。因此，它可能会选择机器人流程自动化。


    3.  **评估能力：** 一旦确定了目标以及满足目标所需的关键技术，组织需要评估实施这些技术所需的时间、资金和资源。


    4.  **持续改进：** 任何流程都必须持续监控反馈，以便业务能够纠正错误并在下一次实施中融入学习。


    ## 探索超级自动化的典型用例


    在前面的介绍性部分中，我们已经对超级自动化有了很好的理解，让我们直接进入一些Python可以派上用场的超级自动化典型用例！在本章中，我们将涵盖以下属于超级自动化范畴的常见应用，并在后续章节中逐一研究：


    - **使用光学字符识别进行文档理解**：我们在*第7章，处理PDF和图像*中研究了**光学字符识别（OCR）**的概念，当时我们利用Python的tesseract库从图像中读取文本。我们将在本章中实现相同的概念，这次是从图像文档中读取信息。这一需求在所有组织中经常出现，其中重要文档可能包含非结构化格式的信息，使用OCR进行文本识别通过大大减少从这些文档中提取信息的人工参与元素，极大地加速了自动化周期。


    - **对话代理 - 聊天机器人**：在我们之前章节关于自然语言处理的讨论中，我们讨论了Python库NLTK和Spacy如何提供现成的方法来实现NLP管道的重要功能。NLP的众多应用之一是聊天机器人或对话代理，它已成为当今任何业务不可或缺的一部分。聊天机器人能够在大多数通用主题上实现人与客户的互动，从而减少不必要的人工参与。'
