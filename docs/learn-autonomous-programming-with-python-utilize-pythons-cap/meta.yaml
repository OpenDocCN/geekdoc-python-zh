- md: "## Chapter 11\n### Automating Business Process Workflows\n\n### Introduction\n\
    \nWe have had sufficient discussions on the topic of automation in the last several\
    \ chapters of this book. Within desktop automation we covered file and folder\
    \ navigation, we covered screen automation; we went through the intricacies of\
    \ automating processes in Excel documents, PDF documents as well as in image documents.\
    \ We also covered automation through the web by getting familiar with the process\
    \ of data gathering using scraping techniques and thereafter explored the arena\
    \ of automated messaging to individuals and groups. The hallmark of all the automated\
    \ processes that these chapters discussed was the way in which Python assists\
    \ in eliminating manual intervention in them thus playing a crucial role in enhancing\
    \ an organization’s efficiency. However, we need to consider the fact that these\
    \ processes do not run individually in any organization. The process workflow\
    \ of any business or organization is composed of many such processes that run\
    \ in a particular sequence and get triggered conditionally at appropriate times.\
    \ They might also run in tandem with other processes. This is exactly where the\
    \ need arises to have a framework that can sequentially and efficiently align\
    \ these processes along the business workflow. This framework is called orchestration.\
    \ In this chapter, we will introduce you to orchestration, underscoring how Python\
    \ can be leveraged to implement and enhance this vital aspect of business process\
    \ management.\n\n### Structure\n\nThe chapter covers the following topics:\n\n\
    - Understanding a business process workflow\n- Introduction to orchestration\n\
    - Automation versus orchestration: Differences\n- Orchestration platforms available\
    \ in market\n- Achieving orchestration with Python\n  - Prefect\n  - Luigi\n-\
    \ Practical use case in Python\n\n### Objectives\n\nBy the end of this chapter,\
    \ the reader shall be conversant with the concept of orchestration in a business\
    \ process workflow and learn to keep in mind the broader picture of orchestration\
    \ while automating regular tasks. A summary of the available orchestration frameworks\
    \ in market would also be presented.\n\nThe reader shall also get a fair understanding\
    \ of implementing orchestration in a workflow using Python since this chapter\
    \ shall try at illustrating this concept through specific examples in Python.\
    \ The Python modules that this chapter shall cover are the **prefect** and the\
    \ **luigi** modules. It shall also compare the two, based on relative advantages\
    \ and disadvantages.\n\nAs with any other chapter, this chapter shall end with\
    \ a practical use case in Python enabling the reader to apply salient concepts\
    \ from the learnings gained in the chapter.\n\n### Understanding a business process\
    \ workflow\n\nA workflow can be defined as a sequence of tasks that defines the\
    \ process cycle of an organization. Consider an organization to have ten different\
    \ processes. These ten processes shall have their own time and course of being\
    \ triggered in an organization’s business process. The *Figure 11.1* below will\
    \ make this concept clearer:\n\n**Figure 11.1:** *Concept of a business process\
    \ workflow*\n\nAs shown in the above figure, a general idea of a business process\
    \ workflow is a series of processes that run in a sequence. We observe that **Process\
    \ 1** is followed by **Process 2**. The output of 2 is subjected to a conditional\
    \ logic. If the output value of the Boolean is **True**, then **Process 3** is\
    \ executed, which is further followed by **Process 4**, which ends the workflow.\
    \ If the output value of the Boolean is **False**, then **Process 2** directly\
    \ progresses to **Process 4** that ends the workflow.\n\nThe diagram is just for\
    \ representational purposes and shows a very simple illustration of a workflow.\
    \ However, actual workflows in an organization could constitute multiple, intricate,\
    \ and complex processes interlinked together. It is also important to note here\
    \ that some of these processes might be individual workflows themselves. A large\
    \ organization would definitely have a complex hierarchy of such processes and\
    \ workflows culminating into a top-level workflow. This should provide some clarity\
    \ on the concept of a business process workflow in an organization.\n\nThere are\
    \ few questions that we would need to address prior to delving deeper into business\
    \ process workflows.\n\nThe first question that needs to be addressed is whether\
    \ we have a framework in place to sequentially trigger each of these processes\
    \ based on not only their respective chronology within the workflow but on conditional\
    \ logic as well.\n\nPrior to that we would need to address another question: Why\
    \ would an organization require automating this sequential alignment of a workflow\
    \ when it can deploy individuals to trigger these tasks at will?\n\nThe answer\
    \ to this question is simple. We require automating them to eliminate human involvement\
    \ in repetitive rules-based tasks. Humans could be better employed at tasks that\
    \ require creativity and problem-solving rather than being utilized in activities\
    \ that have a specific rule or repetitive pattern. Besides, this would cut down\
    \ significant labor costs as well.\n\nLet us now retrace to the first question.\
    \ Do we have a framework to streamline this group of automated tasks together?\
    \ The answer is **yes**, and that leads us to the main subject of study in this\
    \ chapter, which is **orchestration**.\n\n**Orchestration** is a sure shot way\
    \ to get rid of manual errors in a workflow as well as speed up the process. It\
    \ also lowers the overall costs of the business due to elimination of defects\
    \ in the workflow.\n\nIn this chapter, we shall try to implement orchestration\
    \ with Python by using our own Python code snippets as an analogy for business\
    \ processes, since it is not possible to cover actual business processes here,\
    \ which might be too complex. So let us turn to the next page to begin our journey\
    \ with orchestration!\n\n### Introduction to orchestration\n\nWe already had a\
    \ look at the general concept and idea of a business process workflow where individual\
    \ processes are sequentially connected to each other and triggered at the appropriate\
    \ time. Each of these individual processes might themselves contain a series or\
    \ a sequence of automated steps. The process that manages these set of individual\
    \ tasks to create an amalgamated workflow is called as orchestration.\n\nIn orchestration,\
    \ multiple technologies and platforms might be coordinated together based on specific\
    \ rules and circumstances. Orchestration also takes care of alternate decisions\
    \ that would need to be made during changing circumstances. This could extend\
    \ from simple to complex systems. A typical example of orchestration is the creation\
    \ of an app and deployment of the app to connect to multiple users. This could\
    \ involve the triggering of multiple processes within the network. Almost all\
    \ large projects that get deployed on the cloud involve orchestration of some\
    \ sort.\n\nIt is important to note here that in orchestration, it is not necessary\
    \ that all the constituent tasks or processes are themselves all automated processes.\
    \ While most of them might be automated, some of them might even be manual.\n\n\
    Conceptually, orchestration is simply the process of effectively coordinating\
    \ between individual tasks that constitute a business process workflow. In the\
    \ present day, this shall be automated due to the availability of numerous platforms\
    \ and technology to do so. In this book, we shall be studying this orchestration\
    \ in the context of our Python scripts. Hence, we shall be performing orchestration\
    \ of only those automated scripts that we regularly execute in Python.\n\nHaving\
    \ understood the concept of orchestration, let us now take a quick glance of the\
    \ salient differences between automation and orchestration as that shall help\
    \ us consolidate our understanding further. Even though automation and orchestration\
    \ are complementary to each other, there lie certain subtle differences between\
    \ them. The next section shall enlist and elaborate on these differences.\n\n\
    ### Automation versus orchestration: Differences\n\nThe *Table 11.1* below summarizes\
    \ the main differences between automation and orchestration:\n\n| | Automation\
    \ | Orchestration |\n|---|---|---|\n| **Number of tasks** | Automation of a task\
    \ is the process where human intervention is eliminated from a single task. |\
    \ Orchestration is the coordination (mostly automated) of multiple automated tasks\
    \ (few might be manual). |"
  mdcn: "## 第11章\n### 业务流程工作流自动化\n\n### 引言\n\n在本书的前几章中，我们已经对自动化主题进行了充分的讨论。在桌面自动化方面，我们涵盖了文件和文件夹导航、屏幕自动化；我们深入探讨了在Excel文档、PDF文档以及图像文档中自动化流程的复杂性。我们还通过熟悉使用抓取技术进行数据收集的过程，介绍了通过网络实现的自动化，并进一步探索了向个人和群体发送自动消息的领域。这些章节讨论的所有自动化流程的共同特点是，Python通过消除其中的人工干预来发挥作用，从而在提高组织效率方面扮演着关键角色。然而，我们需要考虑到这样一个事实：在任何组织中，这些流程都不是独立运行的。任何业务或组织的流程工作流都是由许多这样的流程组成的，这些流程按特定顺序运行，并在适当的时间有条件地触发。它们也可能与其他流程并行运行。这正是需要一个框架来按顺序并高效地将这些流程与业务工作流对齐的地方。这个框架被称为编排。在本章中，我们将向您介绍编排，重点说明如何利用Python来实现和增强业务流程管理的这一重要方面。\n\
    \n### 结构\n\n本章涵盖以下主题：\n\n- 理解业务流程工作流\n- 编排简介\n- 自动化与编排：区别\n- 市场上可用的编排平台\n- 使用Python实现编排\n\
    \  - Prefect\n  - Luigi\n- Python中的实际用例\n\n### 目标\n\n在本章结束时，读者应熟悉业务流程工作流中编排的概念，并学会在自动化常规任务时牢记编排的全局图景。还将介绍市场上可用的编排框架概览。\n\
    \n读者还将对使用Python在工作流中实现编排有一个清晰的理解，因为本章将尝试通过Python中的具体示例来说明这一概念。本章将涵盖的Python模块是**prefect**和**luigi**模块。还将基于相对优缺点对两者进行比较。\n\
    \n与任何其他章节一样，本章将以一个Python中的实际用例结束，使读者能够应用本章学习中获得的重要概念。\n\n### 理解业务流程工作流\n\n工作流可以定义为定义组织流程周期的一系列任务。假设一个组织有十个不同的流程。这十个流程在组织的业务流程中将有其各自的时间和触发过程。下面的*图11.1*将使这个概念更清晰：\n\
    \n**图11.1：** *业务流程工作流的概念*\n\n如上图所示，业务流程工作流的一般概念是一系列按顺序运行的流程。我们观察到**流程1**之后是**流程2**。流程2的输出会经过一个条件逻辑判断。如果布尔值的输出为**True**，则执行**流程3**，随后是**流程4**，从而结束工作流。如果布尔值的输出为**False**，则**流程2**直接进入**流程4**，结束工作流。\n\
    \n该图仅用于示意目的，展示了一个非常简单的工作流示例。然而，组织中的实际工作流可能由多个相互关联的、错综复杂的流程组成。这里还需要注意的是，其中一些流程本身可能就是独立的工作流。一个大型组织肯定会有这样一个复杂的流程和工作流层次结构，最终形成一个顶层工作流。这应该能为理解组织中的业务流程工作流概念提供一些清晰度。\n\
    \n在深入探讨业务流程工作流之前，我们需要解决几个问题。\n\n需要解决的第一个问题是，我们是否有一个框架来按顺序触发这些流程中的每一个，不仅基于它们在工作流中的各自顺序，还基于条件逻辑。\n\
    \n在此之前，我们需要解决另一个问题：为什么一个组织需要自动化工作流的这种顺序对齐，而不是部署人员来随意触发这些任务？\n\n这个问题的答案很简单。我们需要自动化它们，以消除在重复性、基于规则的任务中的人工参与。人类可以更好地从事需要创造力和解决问题的任务，而不是被用于具有特定规则或重复模式的活动。此外，这也将大幅降低劳动力成本。\n\
    \n现在让我们回到第一个问题。我们是否有框架来将这组自动化任务整合在一起？答案是**肯定的**，这引出了本章的主要研究主题，即**编排**。\n\n**编排**是消除工作流中人为错误并加快流程的可靠方法。它还通过消除工作流中的缺陷来降低业务的总体成本。\n\
    \n在本章中，我们将尝试使用我们自己的Python代码片段作为业务流程的类比，通过Python来实现编排，因为在这里涵盖实际的业务流程是不可能的，它们可能过于复杂。那么，让我们翻到下一页，开始我们的编排之旅吧！\n\
    \n### 编排简介\n\n我们已经了解了业务流程工作流的一般概念和思想，其中各个流程相互按顺序连接，并在适当的时间触发。这些单独的流程中的每一个本身可能包含一系列或一个序列的自动化步骤。管理这组单独任务以创建一个合并工作流的过程称为编排。\n\
    \n在编排中，多种技术和平台可以根据特定的规则和情况进行协调。编排还处理在变化情况下需要做出的替代决策。这可以从简单系统扩展到复杂系统。编排的一个典型例子是创建一个应用程序并将其部署以连接多个用户。这可能涉及在网络中触发多个流程。几乎所有部署在云上的大型项目都涉及某种形式的编排。\n\
    \n这里需要注意的是，在编排中，并非所有组成任务或流程本身都是自动化流程。虽然其中大部分可能是自动化的，但有些甚至可能是手动的。\n\n从概念上讲，编排只是在构成业务流程工作流的各个任务之间进行有效协调的过程。在当今，由于有众多平台和技术可用，这将是自动化的。在本书中，我们将在Python脚本的背景下研究这种编排。因此，我们将只对我们定期在Python中执行的那些自动化脚本进行编排。\n\
    \n理解了编排的概念后，让我们快速浏览一下自动化和编排之间的主要区别，因为这将有助于我们进一步巩固理解。尽管自动化和编排是相辅相成的，但它们之间存在一些微妙的差异。下一节将列举并详细阐述这些差异。\n\
    \n### 自动化与编排：区别\n\n下面的*表11.1*总结了自动化和编排之间的主要区别：\n\n| | 自动化 | 编排 |\n|---|---|---|\n\
    | **任务数量** | 任务的自动化是从单个任务中消除人工干预的过程。 | 编排是协调（主要是自动化的）多个自动化任务（少数可能是手动的）。 |"
