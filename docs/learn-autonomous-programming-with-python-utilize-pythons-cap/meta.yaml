  md: '# Transformers and large language models


    Transformers have been gaining popularity in recent times because the world is
    witnessing the rise of intelligent chatbots like ChatGPT which are based on the
    transformer architecture. GPT is the abbreviation for Generative Pre-Trained Transformer.
    Transformers are used wherever an input sequence is required to be transformed
    to an output sequence like text to speech transformation. Transformers make use
    of Convolutional Neural Networks. However, they also make use of the ‘attention’
    mechanism. This consists of an encoder and a decoder. The encoder basically transforms
    the input data into a numerical representation which is called as the hidden state.
    This captures important information from the input data. This hidden state is
    then fed into the decoder network that generates the output.


    The most popular application of the transformer architecture is a LLM. These are
    models that are fed on voluminous amounts of data using unsupervised learning
    where the model learns by itself. The latest buzzword ChatGPT is an example of
    a Large Language Model. It has been trained on massive dataset of 570 GB on data
    until September 2021. This data consists of scientific journals, Wikipedia, literary
    work, books, and other sources.


    Large language models can be used for generating content, summarizing articles,
    suggesting an approach to solve regular mathematics and Physics problems, suggesting
    itinerary for a trip and many more!


    In this way, neural networks fine tune themselves to produce wonderful mechanisms
    that assist us in variety of tasks and applications.


    # Conclusion'
