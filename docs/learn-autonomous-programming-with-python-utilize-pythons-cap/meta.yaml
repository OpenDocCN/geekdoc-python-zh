- md: "## Comparison summary of Python libraries\n\nBelow is a table that provides\
    \ a comparison based on salient parameters of all the libraries that we studied\
    \ so far. This *Table 5.1* would be handy while deciding about the most optimum\
    \ Python library specific to our task of Excel automation:\n\n| Parameter | openpyxl\
    \ | xlwings | xlsxwriter |\n| :--- | :--- | :--- | :--- |\n| **Launching Excel**\
    \ | Works at the backend without launching Excel application. | Launches the Excel\
    \ application while performing tasks. | Creates a new Excel workbook but can work\
    \ at the backend without launching the Excel application. |\n| **Unique advantages**\
    \ | Ability to create, read, edit and write Excel files with variety of features.\
    \ | Provides short and smart execution for specific features like Excel formulae.\
    \ | Covers numerous features in Excel that are not covered by other Python libraries.\
    \ |\n| **Shortcomings** | Runs slow when working with large datasets or formulae.\
    \ | It opens the Excel application while performing tasks. The user needs to set\
    \ the ‘visible’ property of the Excel App object created by xlwings to ‘False’\
    \ to hide the object. | It cannot open or edit an already existing workbook. It\
    \ can only be used to create fresh workbooks. |\n\n**Table 5.1:** *Comparison\
    \ summary of Python libraries for Excel automation*\n\nWith this, we have completed\
    \ our learning and exercises of Excel automation with Python. Let us now apply\
    \ whatever we have learnt to execute a practical use case and then conclude the\
    \ chapter.\n\n## Practical use case in Python\n\nLet us apply all that we learnt\
    \ in the previous exercises to implement a practical use case in Python where\
    \ we shall make use of all the libraries xlsxwriter, openpyxl and xlwings.\n\n\
    Let us create a new Excel workbook called **Stock Prices.xlsx**. We shall be analyzing\
    \ the stock prices of five indices ‘A’, ‘B’, ‘C’, ‘D’ and ‘E’ through the months\
    \ of January to December in this Excel workbook.\n\nTo begin with, we need to\
    \ create a new workbook and enter this data in a tabular format. We do this by\
    \ creating a dictionary in Python and then using xlsxwriter to transfer the dictionary\
    \ values to the Excel worksheet. Copy and run the code below in the Python editor:\n\
    \n```\nimport xlsxwriter as xw\n\nobjWorkbook = xw.Workbook('Stock Prices.xlsx')\n\
    objWorksheet = objWorkbook.add_worksheet('Prices')\n\ndict_Stock_Prices = {'A':[357,\
    \ 457, 187, 831, 779, 338, 129, 508, 407, 748, 511, 609],\n                  \
    \   'B':[14908, 13408, 17103, 18886, 19828, 12098, 17080, 16850, 15023, 12405,\
    \ 15469, 13800],\n                     'C':[60,64,54, 93, 87, 74, 96, 92, 83,85,70,88],\n\
    \                     'D':[1667, 1962, 1845, 1535, 1753, 1767, 1551, 1893, 1715,\
    \ 1707, 1627, 1532],\n                     'E':[2181, 2333, 2265, 2274, 2739,\
    \ 2601, 2569, 2520, 2744, 2234, 2836, 2230]}\n\nmonth_list = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']\n\
    \nstock_list = ['A','B','C','D','E']\n\nobjFormat_1=objWorkbook.add_format({'border':1})\n\
    objFormat_2=objWorkbook.add_format({'border':2})\n\nobjWorksheet.write_column('A2',\
    \ stock_list,objFormat_2)\nobjWorksheet.write_row('B1', month_list, objFormat_2)\n\
    \nrow=1\n```\n\n- **xlwings**: In order to use this library, one needs to first\
    \ install it using the command below:\n  **pip install xlwings**\n\nThis library\
    \ is especially useful when it comes to Excel formulae. Let us try to insert formulae\
    \ in the same **Student Table.xlsx** workbook.\n\nIn cell G2 of the workbook,\
    \ let us insert the formula **=ROUND(AVERAGE(B2:F2),0)** which would basically\
    \ calculate the average score across a particular subject earned by all students.\
    \ We also want to drag this formula down until cell G4. Copy the code below into\
    \ the Python editor:\n\n```\nimport xlwings as xlw\n\nobj_excel_app = xlw.App(visible=False)\n\
    objWorkbook = xlw.Book('Student Table.xlsx')\nobjWorksheet = objWorkbook.sheets[0]\n\
    formula = '=ROUND(AVERAGE(B2:F2),0)'\nobjWorksheet.range(\"G2,G3,G4\").formula\
    \ = formula\nobjWorkbook.save()\nobjWorkbook.close()\nobj_excel_app.kill()\n```\n\
    \n> **Note:** Here, we first initialize a variable called as ‘obj_excel_app’ to\
    \ the ‘App’ object of ‘xlwings’ and set the ‘visible’ property to ‘False’. The\
    \ way ‘xlwings’ works is it actually creates an Excel Application and opens the\
    \ workbook at real time while performing tasks on the workbook. This is unlike\
    \ ‘openpyxl’ where everything can be executed without opening the Excel application.\
    \ If we set this ‘visible’ property to ‘True’, which is the default value, the\
    \ user can observe the workbook opened by xlwings.\n\nObserve that xlwings provides\
    \ a simple way to insert a formula where we just assign the formula string to\
    \ the **formula** property of the **range** object. In the **range** object, we\
    \ simply specify which cells we want to assign the formula to. In this case, we\
    \ specify **G2**, **G3** and **G4** as the ranges since that is where we want\
    \ to assign the formulae.\n\nOn running the code, we find that the formulae have\
    \ successfully been assigned to ranges G2, G3 and G4 as shown in the *Figure 5.14*\
    \ below:\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_127_0.png)\n\n**Figure 5.14:**\
    \ *Using xlwings to calculate average across a subject by all students*\n\nLastly,\
    \ we save the workbook and close the workbook. Finally, we also kill the Excel\
    \ application object **obj_excel_app** that we created at the beginning. This\
    \ step is necessary because the Excel application object remains open in the background\
    \ even after the workbook is closed, which might cause issues while trying to\
    \ manually open another workbook.\n\nIn this way we learnt how **xlwings** provides\
    \ a simple functionality to insert formulae in an Excel worksheet.\n\n- **xlsxwriter:**\
    \ The first step to using this library is to install it using the command below:\n\
    \n# pip install xlsxwriter\n\nLet us try a sample task in xlsxwriter of entering\
    \ a text in the first cell of the worksheet. Copy and run the code below in the\
    \ Python editor:\n\n```\nimport xlsxwriter as xr\nobjWorkbook = xr.Workbook('Learn_Writer.xlsx')\n\
    objWorksheet = objWorkbook.add_worksheet('Exercise')\nobjWorksheet.write('A1','This\
    \ is my first tutorial in xlsxwriter!')\nobjWorkbook.close()\n```\n\nThe *Figure\
    \ 5.15* below shows the output obtained on running the code above:\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_128_0.png)\n\
    \nWe find that we were able to write text, **This is my first tutorial in xlsxwriter!**\
    \ in cell A1 of the worksheet named **Exercise** of the workbook **Learn_Writer.xlsx**\
    \ that we created using xlsxwriter. Here, the **write** method of the worksheet\
    \ object is really helpful as it can accommodate both the cell reference and the\
    \ content that we want to write as parameters within itself.\n\nIt is important\
    \ to note that the library xlsxwriter can be used only to create a fresh Excel\
    \ workbook and cannot be used to open and edit Excel workbooks that already exist.\
    \ However, it is a very useful library when it comes to speed and memory considerations.\
    \ Also, it provides very useful features like formatting, filtering, importing\
    \ images and creating charts. In fact, the number of features this provides is\
    \ more than any other libraries that Python provides for Excel automation.\n\n\
    One of the big advantages of this library is also that it produces files that\
    \ are 100% equivalent to files produced by Microsoft Excel, thus having a high\
    \ degree of fidelity with files produced by Excel. Hence, apart from one shortcoming\
    \ that it cannot edit existing Excel workbooks, this library is great for Excel\
    \ automation on all other fronts.\n\nIn this section, we explored the xlwings\
    \ and xlsxwriter libraries which have their own advantages as compared to openpyxl\
    \ when it comes to specific requirements.\n\nIn the next section, we shall go\
    \ through a quick comparison table of these libraries so that the user could leverage\
    \ the table as a ready reference while taking a decision about the most optimum\
    \ library to use for automating an Excel application."
  mdcn: "## Python 库比较总结\n\n下表基于我们目前研究的所有库的显著参数提供了比较。在决定针对 Excel 自动化任务最合适的 Python\
    \ 库时，这个*表 5.1* 会很方便：\n\n| 参数 | openpyxl | xlwings | xlsxwriter |\n| :--- | :---\
    \ | :--- | :--- |\n| **启动 Excel** | 在后台工作，无需启动 Excel 应用程序。 | 执行任务时启动 Excel 应用程序。\
