    ## 机器学习概念


    既然我们知道了机器学习在人工智能大图景中的位置，现在让我们更深入地理解它。那么，机器学习到底是什么？让我们尝试从分析的角度来理解这个概念。


    我们都熟悉数学公式和方程。假设我们有一个方程 $y = 3x+4$。我们从这个方程中能理解什么？首先，我们看到方程有两个变量。一个是自变量 $x$，另一个是因变量
    $y$。我们也可以说 $x$ 是输入变量，$y$ 是输出变量。为了得到输出变量 $y$，我们需要将输入变量 $x$ 乘以3，然后将乘积加上4。换句话说，输入变量
    $x$ 和输出变量 $y$ 之间存在一种关系或映射。用数学语言来说，我们说 $y$ 是 $x$ 的函数，表示为 $y=f(x)$。现在，如果我们被提供任意输入并要求找出输出，我们可以使用公式
    $y = 3x+4$ 轻松完成。假设我们被提供以下输入集合：{2,3,9,6,10,15}。我们可以将这些值中的每一个代入方程 $y=3x+4$，得到相应的
    $y$ 值。让我们取第一个值2。将其代入方程 $y=3x+4$ 得到 $y=3*2+4$。因此，$y=6+4=10$。


    因此，对于第一个输入值2，输出是10。以类似的方式，我们可以计算剩余输入集合的各自输出。下面的*表3.1*显示了每个输入对应的最终输出值：


    | 输入 | 输出 |

    | :---: | :---: |

    | 2 | 10 |

    | 3 | 13 |

    | 9 | 31 |

    | 6 | 22 |

    | 10 | 34 |

    | 15 | 49 |


    **表3.1：** *输入对应的最终输出*


    那么，我们这里到底做了什么？我们已经知道一个将输入映射到输出的函数，并且手头有一组输入。利用这两个实体，我们可以轻松获得每个输入的输出。换句话说，我们已经有一组将输入映射到输出的规则。这被称为基于规则的编程，通常用于我们所有的常规计算机应用程序，如计算器，甚至像办公软件和游戏这样的复杂应用程序。机器学习与此恰恰相反。让我们用一个不同的例子来理解这一点。


    考虑一种情况，我们已经有一组输入和一组输出，如下表*表3.2*所示：


    | 输入 | 输出 |

    | :---: | :---: |

    | 5 | 15 |

    | 20 | 60 |

    | 3 | 9 |

    | 7 | 21 |

    | 150 | 450 |

    | 100 | 300 |


    **表3.2：** *输入和输出*


    现在假设我们被给定一个任意值，比如50，并被要求找出相应的输出，我们能做到吗？首先想到的问题是输入和输出之间的关系是什么？我们所拥有的只是一组输入和一组输出。但是，有没有办法找出输入和输出之间的关系？快速浏览输入及其对应的输出，会发现每个输出都是输入的三倍。5乘以3是15，20乘以3是60，以此类推。现在，我们似乎也找到了映射函数，即
    *y=3x*。让我们将值50代入此函数 *y=3x* 以获得输出。在这种情况下，输出将是 *y = 3*50 = 150*。那么，在这种方法中我们到底做了什么？我们手头已有输入和输出，但不知道函数。我们必须先知道函数，才能找出任何任意输入的输出。这正是机器学习！


    与我们已经拥有函数的基于规则的编程相反，机器学习的任务是找出将输入映射到输出的函数，以便此后可以为任何新的输入集预测正确的输出。在这个例子中，输入和输出是简单的数字，但它们可以是任何东西，比如复杂的图像。此外，在这个例子中，我们仅通过观察就找出了函数，但有各种机器学习算法可以完成找出这种关系的任务。这些'
