    ## Implementing unsupervised learning algorithms using Python


    Having familiarized ourselves with implementing supervised learning algorithms
    using the Scikit-learn library of Python, we shall now implement unsupervised
    learning algorithms using Scikit-learn. To provide a summary, unsupervised learning
    algorithms are those that are applied to an unlabeled dataset, and they cluster
    together sample elements that are similar in parameters. We shall study k means
    clustering and hierarchical clustering as the unsupervised learning algorithms
    in this section.


    However, prior to implementing them in Scikit-learn, it is important to understand
    few more important theoretical concepts in the context of machine learning modeling.
    These concepts are dimensionality reduction, principal component analysis and
    linear discriminant analysis that we shall study in the sections to follow.


    ## Dimensionality reduction


    Dimensionality reduction is an important part of machine learning. A dataset with
    too many features might render the model complex, thus resulting in overfitting,
    where the model might fit too tightly on the training data resulting in a large
    variance on the testing data. Hence, it is essential to reduce the number of features
    or dimensions in a dataset to include only those that are required or may represent
    the entire dataset. This technique of reducing the number of features in a dataset
    in a way that the essence of the data is still preserved is called as dimensionality
    reduction. There are different ways in which dimensionality reduction can be achieved:


    - **Feature selection**: In this method, only a subset of features is selected
    from the main sample such that they are most relevant to the problem that is being
    solved.

    - **Feature extraction**: In this method, the original features are transformed
    in such a way that the new features formed are less in number and represent the
    original dataset. **principal component analysis (PCA)** and **linear discriminant
    analysis (LDA)** are the popular methods under this category. In the next sections,
    we shall learn about these methods.


    ## Principal component analysis


    Principal component analysis is basically a dimensionality reduction technique
    in which an orthogonal transformation is applied in order to transform the data
    to a new coordinate system. This technique identifies a set of orthogonal axes
    called **principal components** in such way that the first principal component
    captures the maximum variance in the data and the second principal component captures
    the second greatest variance orthogonal to the first component. A lot of matrix
    algebra goes into principal component analysis as we would not go into that detail
    since we would be restricting ourselves with the Python implementation of PCA.
    It is important to note that implementation of PCA depends only on the feature
    set and not the labels. In other words, PCA is an unsupervised learning technique.
    To implement PCA on the Iris dataset, copy and run the code below into the Python
    editor:


    ```

    from sklearn.model_selection import train_test_split

    from sklearn.datasets import load_iris


    iris = load_iris()

    X = iris.data

    Y = iris.target


    X_Train, X_Test, Y_Train, Y_Test = train_test_split(X,Y,test_size=0.3, random_state=100)


    from sklearn.preprocessing import StandardScaler

    sc = StandardScaler()

    X_Train = sc.fit_transform(X_Train)

    X_Test = sc.transform(X_Test)


    from sklearn.decomposition import PCA

    pca = PCA()

    X_train = pca.fit_transform(X_Train)

    X_test = pca.transform(X_Test)


    explained_variance = pca.explained_variance_ratio_


    print(explained_variance)

    ```


    **Output:**

    **[0.72201925 0.23393497 0.03914811 0.00489767]**


    Let us now try to understand the code above:


    - First, we load the Iris dataset and split it into training and testing data
    as we always did for all other algorithms before.

    - Next, we scale the data using the **StandardScaler** class of the **preprocessing**
    module of the Scikit-learn library. This is used to standardize the features to
    unit variance by subtracting the feature mean and dividing the value thus obtained
    by the standard deviation. Standard scaling makes the features comparable on a
    level basis and eliminates possible discrepancies between features arising due
    to factors like units of measurement. We use the **fit_transform** method of the
    **StandardScaler** class on the training dataset and the **transform** method
    on the testing dataset.

    - Thereafter, we use the **PCA()** class of the **decomposition** module of the
    Scikit-learn library. This method takes in the parameter **n_components** as the
    first argument which is the number of principal components. In our code, we have
    not specified anything so it would take all components by default. We use the
    **fit_transform** method of the **PCA** class on the training dataset and the
    **transform** method on the testing dataset.

    - Finally, we use the **explained_variance_ratio_** property of the **PCA** class
    that provides a summary of the variance that each principal component is responsible
    for. By observing the output, we understand that the first principal component
    is responsible for the maximum variance of around 73% and the second principal
    component is responsible for the second largest variance of around 23%. Together,
    they account for around 96% of the variance. The remaining two components account
    for minimal variance of close to 4% and 1% respectively.


    ## Linear discriminant analysis


    Unlike principal component analysis which is an unsupervised learning technique,
    linear discriminant analysis is a supervised technique that considers both the
    data and its corresponding labels. LDA works by projecting data around new dimensions
    such that the separation between the classes is maximum and individual elements
    of each class are closely grouped around the centroid of the class. In order to
    implement LDA on the same Iris dataset, copy and run the code below in the Python
    editor:


    ```

    from sklearn.model_selection import train_test_split

    from sklearn.datasets import load_iris


    iris = load_iris()

    X = iris.data

    Y = iris.target


    X_Train, X_Test, Y_Train, Y_Test = train_test_split(X,Y,test_size=0.3, random_state=100)


    from sklearn.preprocessing import StandardScaler

    sc = StandardScaler()

    X_Train = sc.fit_transform(X_Train)

    X_Test = sc.transform(X_Test)


    from sklearn.discriminant_analysis import LinearDiscriminantAnalysis

    lda = LinearDiscriminantAnalysis()


    X_train = lda.fit_transform(X_Train, Y_Train)

    X_test = lda.transform(X_Test)


    explained_variance = lda.explained_variance_ratio_


    print(explained_variance)

    ```


