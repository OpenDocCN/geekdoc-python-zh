  md: '+   - **Load Python script**: This activity enables us to load an external
    Python script within UiPath. The purpose of this activity is to utilize Python
    code to perform a task within UiPath, which is essentially the hallmark of this
    chapter. Note that this activity is different from **Run Python Script** which
    we would be discussing at the end.

    - **Invoke Python method**: This activity enables one to reference a method or
    function from the Python script that we had loaded using the **Load Python Script**
    activity. The **Invoke Python Method** activity enables one to pass actual values
    from UiPath into the Python method as arguments and utilize the method to produce
    the intended output.

    - **Get Python object**: This activity enables one to retrieve a Python object
    from a specified variable.

    - **Run Python script**: Using this activity, we directly run an external Python
    script from the UiPath environment.


