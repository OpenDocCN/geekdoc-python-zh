  md: "We observe that the column **'Specialism'** contains information about whether\
    \ a player is a batsman, bowler, wicket keeper or all-rounder. Though helpful,\
    \ we would need to make sure that the values here are transformed to numeric codes\
    \ as the model would not be able to process string values.\n\nWe get that done\
    \ using the code below:\n\n```\nmapping_dictionary ={'ALL-ROUNDER' : 0, 'BATSMAN'\
    \ : 1, 'BOWLER' : 2, 'WICKETKEEPER':3}\ndf['Specialism'] = df['Specialism'].map(mapping_dictionary)\n\
    ```\n\nNext, we create the feature and target arrays using the code below:\n\n\
    ```\nX = df.drop('Bid',axis=1).values\nY = df['Bid'].values\n```\n\nOur next step\
    \ is to choose the right classification algorithm for this dataset. Since we are\
    \ interested in only two outcomes **'Sold'** or **'Unsold'**, we can use a logistic\
    \ regression model for this dataset. As usual, we split the data into training\
    \ and testing sets and then train the model on the training sets.\n\nBelow is\
    \ the implementation:\n\n```\nfrom sklearn.model_selection import train_test_split\n\
    from sklearn.linear_model import LogisticRegression\n\nX_Train, X_Test, Y_Train,\
    \ Y_Test = train_test_split(\n    X, Y, test_size = 0.3, random_state=100)\nLR\
    \ = LogisticRegression()\nLR.fit(X,Y)\n```"
