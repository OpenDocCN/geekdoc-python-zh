    # Implementing supervised machine learning algorithms using Python


    In this chapter, we shall primarily be using the Scikit-learn library to implement
    our machine learning algorithms. Scikit-learn is an open-source Python library
    that supports supervised and unsupervised machine learning. Before using Scikit-learn,
    the first step is to install it using the command below:


    ```

    pip install scikit-learn

    ```


    The hallmark of the Scikit-learn library is the **fit()** method. Every machine
    learning algorithm within the Scikit-learn library shall have its own class and
    every such class shall have a method named **fit()**. This method takes in the
    training data in the form of arrays as arguments and fits the model to the training
    data. In case of supervised learning, the array of training data shall be accompanied
    with its corresponding array of labels as well, which would make two arrays as
    arguments. In case of unsupervised learning, the training dataset shall consist
    of a single input array as arguments as the data here is unlabeled.


    In this section, we shall be implementing supervised machine learning algorithms
    using the Scikit-learn library of Python. We shall start with the simplest one
    which is linear regression.


    # Linear regression'
