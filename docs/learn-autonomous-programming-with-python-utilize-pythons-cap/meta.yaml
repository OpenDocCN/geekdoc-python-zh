    \n# Chapter 16\n## Test Automation in Python\n\n### Introduction\n\nSo here we\
    \ are into the last chapter of the book! We shall begin this chapter by delving\
    \ into a topic that is most commonly addressed at the end of software development\
    \ which is testing. The practice of testing software involves creation of multiple\
    \ test cases and performing of checks. As this process gets manual, it becomes\
    \ time consuming and inefficient. This is where Python comes to the rescue with\
    \ open-source libraries to enable automation of this process.\n\nWe start by introducing\
    \ Selenium, the world’s most popular framework for automating web browsers. Python,\
    \ among other languages, is supported by Selenium, and we will explore its capabilities\
    \ through the Selenium Python module. Following this, we will examine Pytest,\
    \ another powerful testing framework known for its simplicity and scalability.\
    \ Lastly, we will venture into the Python Robot Framework, an interesting tool\
    \ that offers a higher-level, keyword-driven approach to test automation.\n\n\
    ### Structure\n\nThe chapter covers the following topics:\n\n- Introduction to\
    \ Selenium\n    - Setting up the Selenium\n    - Exploring web automation with\
    \ Selenium Python API\n- The Pytest library\n    - Advantages and limitations\
    \ of Pytest\n- Python Robot Framework\n    - Running test cases in the Python\
    \ Robot Framework\n\n### Objectives\n\nThis concluding chapter of the book shall\
    \ address the most practically useful topic of test automation by introducing\
    \ the reader to frameworks like Selenium, Pytest and the Python robotic framework.\
    \ By the end of this chapter, the reader shall not only have a basic understanding\
    \ of these frameworks but shall also appreciate the mammoth role that Python plays\
    \ in providing the functionality of test automation. Each of these sections shall\
    \ cover practical examples that shall illustrate salient concepts and demonstrate\
    \ the use of Python libraries in execution of required tasks.\n\nThe chapter shall\
    \ aim to provide a foundation based on which the reader would be able to independently\
    \ explore and implement further use cases using Python frameworks like Selenium,\
    \ Pytest and the Robot Framework, thus making the reader get acquainted with an\
    \ extremely useful skillset that adds the final finishing touch to an automation\
    \ project.\n\n### Introduction to Selenium\n\nSelenium is an open-source software\
    \ testing framework that is used to automate web applications. It works on all\
    \ browsers, majority of the operating systems and the scripts are written in various\
    \ programming languages like Python, Java, and C#.\n\nIn this chapter, we shall\
    \ be focusing on the Chrome browser and of course, the Python programming language.\n\
    \nThere are four main components in Selenium as shown below in *Figure 16.1*:\n\
    \n![](img/3bdf02f00d53ff55047d1e1759de2882_387_0.png)\n\n**Figure 16.1:** *The\
    \ Four Main Components of Selenium*\n\nEach of these components is discussed below:\n\
    \n- **Selenium IDE:** The Selenium **integrated development environment (IDE)**\
    \ is the major tool in Selenium which is available as an IDE for Selenium tests.\
    \ This is available as a Chrome extension and allows recording, editing, and debugging\
    \ functional tests. This was also called as Selenium Recorder in the past.\n-\
    \ **Selenium RC:** The **Selenium Remote Control (RC)** is a server written in\
    \ Java that enables the functionality to write automated tests for a web application\
    \ in any programming language. However, the use of this component deprecated later\
    \ with the advent of Selenium WebDriver, which is the next component that we shall\
    \ be studying.\n- **Selenium WebDriver**: This component is the successor of Selenium\
    \ Remote Control and sends commands to the browser. This does not need a special\
    \ server to execute tests. It opens an instance of a browser and performs actions\
    \ on various browser elements. It supports various programming languages like\
    \ Java, Python and C#.\n- **Selenium GRID**: This is a server that allows one\
    \ to run test cases across different browsers, machines, and operating systems\
    \ in parallel. This functionality enables to spread the load of testing across\
    \ several machines and is also useful when tests are to be run on different browsers\
    \ that run on their specific platforms or operating systems.\n\nIn this chapter,\
    \ we shall focus on browser automation using Selenium with Python. The Python\
    \ module of Selenium is built to perform automated testing with Python. This Python\
    \ API shall provide us with the ability to access the WebDriver component of Selenium.\n\
    \nThrough Selenium Python API, we can access several browsers like Chrome, Firefox,\
    \ Internet Explorer and Edge. It also supports multiple operating systems like\
    \ Windows, Linux, Mac, Android, iOS. The efficient functionality of parallel test\
    \ execution is supported by this API.\n\nIn the sections to follow, we shall look\
    \ at the procedure to install Selenium and its associated web drivers and then\
    \ go through few examples in Python that would provide a walkthrough of the Selenium\
    \ functionality."
