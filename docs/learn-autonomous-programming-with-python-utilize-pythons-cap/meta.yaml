    # # Introduction to Selenium


    Selenium is an open-source software testing framework that is used to automate
    web applications. It works on all browsers, majority of the operating systems
    and the scripts are written in various programming languages like Python, Java,
    and C#.


    In this chapter, we shall be focusing on the Chrome browser and of course, the
    Python programming language.


    There are four main components in Selenium as shown below in *Figure 16.1*:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_387_0.png)


    **Figure 16.1:** *The Four Main Components of Selenium*


    Each of these components is discussed below:


    +   - **Selenium IDE:** The Selenium **integrated development environment (IDE)**
    is the major tool in Selenium which is available as an IDE for Selenium tests.
    This is available as a Chrome extension and allows recording, editing, and debugging
    functional tests. This was also called as Selenium Recorder in the past.

    - **Selenium RC:** The **Selenium Remote Control (RC)** is a server written in
    Java that enables the functionality to write automated tests for a web application
    in an'
  - '[PAGE 388]


    y programming language. However, the use of this component deprecated later with
    the advent of Selenium WebDriver, which is the next component that we shall be
    studying.


    +   - **Selenium WebDriver**: This component is the successor of Selenium Remote
    Control and sends commands to the browser. This does not need a special server
    to execute tests. It opens an instance of a browser and performs actions on various
    browser elements. It supports various programming languages like Java, Python
    and C#.

    - **Selenium GRID**: This is a server that allows one to run test cases across
    different browsers, machines, and operating systems in parallel. This functionality
    enables to spread the load of testing across several machines and is also useful
    when tests are to be run on different browsers that run on their specific platforms
    or operating systems.


    In this chapter, we shall focus on browser automation using Selenium with Python.
    The Python module of Selenium is built to perform automated testing with Python.
    This Python API shall provide us with the ability to access the WebDriver component
    of Selenium.


    Through Selenium Python API, we can access several browsers like Chrome, Firefox,
    Internet Explorer and Edge. It also supports multiple operating systems like Windows,
    Linux, Mac, Android, iOS. The efficient functionality of parallel test execution
    is supported by this API.


    In the sections to follow, we shall look at the procedure to install Selenium
    and its associated web drivers and then go through few examples in Python that
    would provide a walkthrough of the Selenium functionality.'
