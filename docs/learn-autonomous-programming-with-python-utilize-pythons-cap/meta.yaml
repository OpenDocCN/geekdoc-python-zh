    # # Machine learning concepts


    Now that we know where machine learning fits into the larger picture of Artificial
    Intelligence, let us now try to understand it in greater depth. So, what exactly
    is machine learning? Let us try to understand this concept analytically.


    We all are familiar with mathematical formulae and equations. Suppose we are provided
    an equation $y = 3x+4$. What do we understand from this equation? Firstly, we
    see that the equation has two variables. One is the independent variable $x$ and
    the other one is the dependent variable $y$. We could also say that $x$ is the
    input variable and $y$ is the output variable. In order to get the output variable
    $y$, we need to multiply the input variable $x$ by 3 and add 4 to the product.
    In other words, there exists a relationship or mapping between the input variable
    $x$ and the output variable $y$. In the language of mathematics, we say that $y$
    is a function of $x$ and represent it as $y=f(x)$. Now, if we are provided with
    any arbitrary input and are asked to find the output, we'
  merge: -1
  pgno: 58
