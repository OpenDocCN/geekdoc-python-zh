- md: 'learning, neural networks, types of neural networks and their applications
    like Natural Language Processing.


    ## Chapter 4: Automating Web Scraping


    - This chapter familiarizes the reader with the process of extracting data from
    the web using Python libraries ‘requests’ and ‘beautiful soup.’ Data being a central
    component of all applications, this chapter presents a useful approach to leverage
    the web to access data.


    ## Chapter 5: Automating Excel and Spreadsheets


    - This chapter revisits the arena of Excel automation by highlighting the central
    role that Python plays by speeding up the process. The libraries ‘openpyxl’, ‘xlwings’
    and ‘xlsxWriter’ shall be discussed individually followed by a practical use case
    in Python which shall illustrate the beauty of collectively utilizing them in
    combination.


    ## Chapter 6: Automating Emails and Messaging


    - This chapter enters the foray of email and social media messaging by demonstrating
    the powers of Python libraries in sending swift messages through Gmail and Whatsapp.


    ## Chapter 7: Working with PDFs and Images


    - This chapter expands the capabilities of Python by showcasing the ability to
    read data from PDF documents. The chapter further discusses the concept of Optical
    Character Recognition (OCR) and illustrates how ‘pytesseract’ and ‘OpenCV’ enable
    one to achieve it in practice by reading data from images.


    ## Chapter 8: Mechanizing Applications, Folders and Actions


    - This chapter introduces the ‘os’ and ‘shutil’ modules in Python that enable
    one to automate the process of reading, writing and moving files and folders and
    is followed by the ‘PyAutoGUI’ and ‘PyWinAuto’ libraries that are used to automate
    mouse operations on a computer.


    ## Chapter 9: Intelligent Automation Part 1: Using Machine Learning


    - This chapter consolidates into the idea of machine learning by taking a deep
    dive into various machine learning algorithms and demonstrates their smooth implementation
    using Python libraries. This chapter covers both supervised and unsupervised learning
    methods and ends with a practical use case in Python that makes the user conversant
    with the process of independently building machine learning Python applications.


    ## Chapter 10: Intelligent Automation Part 2: Using Deep Learning


    - This chapter revisits the concept of a neural network and implements a basic
    neural network from scratch in Python. The concept of back propagation has been
    illustrated using the perceptron. Thereafter the libraries ‘TensorFlow’ and ‘PyTorch’
    have been discussed followed by a discussion on Natural Language Processing (NLP).
    An interesting practical use case in Python concludes the chapter.


    ## Chapter 11: Automating Business Process Workflows


    - This chapter begins with an introduction to the concept of orchestration which
    is basically workflow automation or can also be thought of as the automation of
    automations. Thereafter the ‘luigi’ and ‘prefect’ modules shall be discussed that
    enable one to achieve orchestration.


    ## Chapter 12: Hyperautomation


    - This chapter discusses the novel concept of hyperautomation which is basically
    the application of Machine Learning, RPA and other AI tools in tandem with regular
    automation. This chapter shall revisit the topics of NLP and RPA from a different
    perspective.


    ## Chapter 13: Python and UiPath


    - This chapter builds on the basic concepts of RPA tool UiPath to illustrate the
    salient role that Python plays in enhancing its capabilities. This chapter shall
    be a detailed walkthrough of the setup and environment required to achieve UiPath
    integration with Python.


    ## Chapter 14: Architecting Automation Projects


    - This chapter gives an overview of the various components that need to be taken
    care of while architecting an automation project. The concept of virtual environment
    and the ‘pip’ command have been discussed in detail in this chapter.


    ## Chapter 15: The PyScript Framework


    - This chapter introduces the reader to an ongoing project in Python called the
    ‘PyScript’ framework which essentially enhances the potential of an HTML script
    by allowing the presence of a Python code within it. This chapter shall be exciting
    for developers who have background in Javascript and shall provide them with a
    functionality to experiment with a different perspective.


