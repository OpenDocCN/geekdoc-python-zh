    by adjusting the weights of every neuron. More on this to come in later chapters.


    One might wonder why does one need to approach a deep neural network in spite
    of the availability of all these machine learning algorithms? The reason is that
    where machine learning algorithms fall short of accuracy at numerous instances,
    deep neural networks do an exceptional job of achieving the desired result! Due
    to the rise of high and efficient computational systems and availability of large
    datasets, deep learning has become a popular method of training complex multi
    layered neural networks. Let us now try to understand the basic concepts of a
