    - **Beautiful Soup：** 这是一个流行的Python库，它将HTML和XML文档解析成树状结构，有助于识别和提取数据。\n- **Scrapy：**\
    \ 这是一个网络爬虫库，可以爬取网站并从其页面提取结构化数据。该库也可用于数据挖掘和自动化测试。\n- **Selenium：** 这是一个开源框架，可以为网络浏览器或网络应用程序启用自动化测试用例。\n\
    \n我们现在将通过Python示例进一步详细查看**Requests**和**Beautiful Soup**。\n\n### Python中的requests模块\n\
    \n这是最常用的网络爬取框架，如前所述，它通常是网络爬取的第一步。该模块用于发送HTTP请求，该请求反过来返回一个包含内容的响应对象。\n\n要使用这个库，首先需要使用以下命令在anaconda提示符中安装它：\n\
    \n```\npip install requests\n```\n\n为了在我们接下来的练习中学习网络爬取，我们将使用网站**https://toscrape.com/**，这实际上是一个学习网络爬取的沙盒。由于我们的目标是学习，我们必然会向该网站发出多个HTTP请求。因此，使用沙盒比使用实际网站更好，因为对同一网站的多个HTTP请求可能会封锁我们的IP。我们将在本章末尾了解网络爬取的法律考量。一旦我们通过点击上面的网站链接打开该网站，我们将看到该网站的主页面，如下图*图4.1*所示：\n\
    \n### 网络爬取沙盒\n\n#### 书籍\n\n一个虚构的书店，非常渴望被爬取。对于学习网络爬取的初学者以及验证其爬取技术的开发者来说，这是一个安全的地方。访问地址：books.toscrape.com\n\
    \n![](img/3bdf02f00d53ff55047d1e1759de2882_87_0.png)\n\n| 详情 | |\n|---|---|\n\
    | 项目数量 | 1000 |\n| 分页 | ✓ |\n| 每页项目数 | 最多20 |\n| 需要JavaScript | X |\n\n#### 名言\n\
    \n一个列出名人名言的网站。它有许多端点，以多种不同的方式展示名言，每个端点都为你带来新的爬取挑战，如下所述。\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_87_1.png)\n\
    \n| 端点 | |\n|---|---|\n| 默认 | 微数据和分页 |\n| 滚动 | 无限滚动分页 |\n| JavaScript | JavaScript生成的内容\
    \ |\n| 延迟 | 与JavaScript相同，但有延迟（?delay=10000） |\n| Tableful | 基于表格的混乱布局 |\n| 登录\
