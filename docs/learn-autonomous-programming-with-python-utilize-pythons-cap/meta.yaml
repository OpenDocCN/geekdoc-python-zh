- md: "## Chapter 15\n### The PyScript Framework\n\n### Introduction\n\nIn this chapter,\
    \ we introduce the reader to an interesting and ongoing project which is currently\
    \ under development, but garnering lots of attention called **PyScript** which\
    \ is basically a Python framework that allows us to write Python code inside HTML\
    \ directly. The advantage of PyScript is that it allows one to run the Python\
    \ code directly in the browser without infrastructural barriers. PyScript does\
    \ not require any development environment other than a web browser like Chrome\
    \ and a text editor like Notepad. Additionally, we do not install anything like\
    \ we used to do earlier using the pip installer.\n\nDevelopers in Python who have\
    \ background in JavaScript would find it exciting to experiment with the functionality\
    \ provided by PyScript.\n\nThis chapter shall provide the basic awareness that\
    \ is necessary for the reader to explore this novel framework.\n\n### Structure\n\
    \nThe chapter covers the following topics:\n\n- Introduction to PyScript\n- Creating\
    \ a basic webpage using PyScript\n- Adding working Python code to the webpage\n\
    - Using third party libraries with PyScript\n- Referencing external Python files\
    \ in PyScript\n\n### Objectives\n\nThis chapter is a worthwhile exploration of\
    \ a novel framework which shall take the reader through multiple lucid examples\
    \ from specific sections related to the PyScript framework. Each of these sections\
    \ would introduce the reader to unique concepts which the reader shall find extremely\
    \ useful for further implementation.\n\nThe Python code in this chapter has been\
    \ kept simple since the key focus here would be to understand salient concepts\
    \ in PyScript. The sections and the corresponding exercises have been carefully\
    \ chosen in such a way that they would clearly enlighten the reader about the\
    \ concept that is intended to be explained. The chapter would introduce the reader\
    \ to PyScript and basic concepts related to the framework. Thereafter, specific\
    \ exercises would introduce the reader to the creation of a basic webpage in PyScript,\
    \ inclusion of a working Python code in PyScript, importing third party libraries\
    \ in PyScript and referencing external Python code in PyScript.\n\nBy the end\
    \ of this chapter, the reader would appreciate the advent of PyScript as a novel\
    \ idea to implement web applications along with the presence of conventional web\
    \ development frameworks.\n\n### Introduction to PyScript\n\nPyScript is an open-source\
    \ web framework that allows one to embed and execute Python code in the browser\
    \ using HTML tags. It enables dynamic generation of pages with Python. For a long\
    \ time JavaScript has been the language that has dominated frontend development\
    \ because of its ability to run natively in the browser and interact with HTML\
    \ and CSS. Then arrived WebAssembly, which is an open standard enabling the usage\
    \ of binary code on the web. This allowed developers to run languages like C and\
    \ C++ in the browser. Obviously, Python soon entered the race and came up with\
    \ this framework.\n\nPyScript was developed by Anaconda and is built using Pyodide,\
    \ which ports CPython to WebAssembly. It is typically used when one would want\
    \ to move a Python application from the backend to the frontend. Another great\
    \ advantage is the ability to use scientific packages from Python like Scikit-learn,\
    \ pandas and numpy. These work only in the back end and not in the front end.\
    \ However, PyScript allows one to utilize these modules in the front end. Finally,\
    \ PyScript provides the ability to interact with the local file system which JavaScript\
    \ does not.\n\nListed below are basic prerequisites that the reader needs to be\
    \ having prior to beginning this chapter:\n\n- Basic knowledge of HTML, CSS and\
    \ JavaScript.\n- The Chrome web browser, which is the suggested browser in the\
    \ official documentation of PyScript.\n\nIn this chapter, we shall gradually witness\
    \ the involvement of Python for web development in the form of the PyScript framework\
    \ by starting with basic HTML applications and increasing the complexity of the\
    \ examples thereafter.\n\nIn the next section, we shall create a basic web page\
    \ using PyScript.\n\n### Creating a basic webpage using PyScript\n\nIn this section,\
    \ we shall begin our journey with PyScript by creating a basic webpage. Prior\
    \ to adding PyScript framework, we would need to create a basic HTML template.\
    \ In order to create the template, open a blank text editor like Notepad and copy\
    \ the basic HTML script shown below:\n\n```html\n<!DOCTYPE html>\n<html lang=\"\
    en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>PyScript Tutorial</title>\n\
    </head>\n<body>\n\n</body>\n</html>\n```\n\nSave the file as **PyScript_Tutorial.html**.\n\
    \nNext, we shall need to add the link tag and the script tag which are described\
    \ below:\n\n- **Link tag**: This is the link for the stylesheet allowing one to\
    \ format the output of Python code. This is given as below:\n\n```html\n<link\
    \ rel=\"stylesheet\" href=\"https://pyscript.net/alpha/pyscript.css\" />\n```\n\
    \n- **Script tag**: This brings the JavaScript source file that works with the\
    \ browser for interacting with Python run time. This is given as below:\n\n```html\n\
    <script defer src=\"https://pyscript.net/alpha/pyscript.js\"></script>\n```\n\n\
    After incorporating both these tags, the modified HTML script would look like\
    \ the one below:\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n   \
    \ <meta charset=\"UTF-8\">\n    <link rel=\"stylesheet\" href=\"https://pyscript.net/alpha/pyscript.css\"\
    \ />\n    <script defer src=\"https://pyscript.net/alpha/pyscript.js\"></script>\n\
    \    <title> PyScript Tutorial </title>\n</head>\n```\n\nHowever, this does not\
    \ complete the application as we are yet to add the important section where Python\
    \ code shall be written. We implement this using the **py-script** tag as shown\
    \ below:\n\n```html\n<py-script>\n    #python code\n</py-script>\n```\n\nIt is\
    \ important to note that the Python code written with the **py-script** tag needs\
    \ to be indented. So, with this knowledge, let us write our first **Hello World**\
    \ script and modify the HTML document accordingly to incorporate the Python code\
    \ within the **py-script** tag.\nThe modified HTML script would look like the\
    \ one shown on the next page.\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n\
    <head>\n    <meta charset=\"UTF-8\">\n    <link rel=\"stylesheet\" href=\"https://pyscript.net/alpha/pyscript.css\"\
    \ />\n    <script defer src=\"https://pyscript.net/alpha/pyscript.js\"></script>\n\
    \    <title> PyScript Tutorial </title>\n</head>\n<py-script>\n    print('Hello\
    \ World!')\n</py-script>\n```\n\nSave the document **PyScript_Tutorial.html**\
    \ after pasting the modified script above. Close the document and open it in a\
    \ Chrome browser. We find that while opening, the browser first displays a message\
    \ that says **Loading Runtime** and then displays the message **Hello World!**\
    \ as shown in *Figure 15.1* below:\n\n![First webpage using PyScript](img/3bdf02f00d53ff55047d1e1759de2882_369_0.png)\n\
    \n**Figure 15.1:** *First webpage using PyScript*\n\nHurrah! We have just created\
    \ our first webpage using PyScript!\n\n### Adding working Python code to the webpage\n\
    \nGiven the fact that we have the basic template of HTML ready with PyScript placeholders,\
    \ let us move to the next task of adding a working piece of Python code in the\
    \ **py-script** tag.\n\nWe shall proceed with writing a small program that creates\
    \ a dictionary and then populates the values of the dictionary on the webpage.\n\
    \nLet us create a sample dictionary that consists of names of few countries as\
    \ keys and values as their capital cities as shown below:\n\n```python\ndict_countries\
    \ = {'United States of America':'Washington D.C.',\n    'India':'New Delhi',\n\
    \    'Argentina':'Buenos Aires',\n    'Japan':'Tokyo',\n    'Germany':'Berlin',\n\
    \    'France':'Paris',\n    'Egypt':'Cairo'}\n```\n\nNext, we shall print the\
    \ values of the dictionary keys as shown below. These values are basically the\
    \ capital cities of the respective countries:\n\n```python\nfor str_country in\
    \ dict_countries:\n    print(dict_countries[str_country])\n```\n\nWe would need\
    \ to include this code within the **py-script** block in the HTML template **PyScript_Tutorial.html**\
    \ that we saved earlier. Save this file with a different name **Countries_List.html**.\
    \ The modified piece of HTML code is shown in the next page:\n\n```html\n<!DOCTYPE\
    \ html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <link rel=\"\
    stylesheet\" href=\"https://pyscript.net/alpha/pyscript.css\" />\n    <script\
    \ defer src=\"https://pyscript.net/alpha/pyscript.js\"></script>\n    <title>\
    \ PyScript Tutorial </title>\n</head>\n<py-script>\n    dict_countries = {'United\
    \ States of America':'Washington D.C.',\n                      'India':'New Delhi',\n\
    \                      'Argentina':'Buenos Aires',\n```"
  mdcn: "## 第15章\n### PyScript框架\n\n### 简介\n\n在本章中，我们将向读者介绍一个有趣且正在进行中的项目，该项目目前仍在开发中，但已引起广泛关注，名为**PyScript**。它本质上是一个Python框架，允许我们直接在HTML中编写Python代码。PyScript的优势在于，它允许用户直接在浏览器中运行Python代码，无需任何基础设施障碍。PyScript不需要除Chrome等网络浏览器和Notepad等文本编辑器之外的任何开发环境。此外，我们无需像以前那样使用pip安装器安装任何东西。\n\
    \n具有JavaScript背景的Python开发者会发现，尝试PyScript提供的功能令人兴奋。\n\n本章将为读者提供探索这个新颖框架所必需的基础知识。\n\
    \n### 结构\n\n本章涵盖以下主题：\n\n- PyScript简介\n- 使用PyScript创建基本网页\n- 向网页添加可运行的Python代码\n\
    - 在PyScript中使用第三方库\n- 在PyScript中引用外部Python文件\n\n### 目标\n\n本章是对一个新颖框架的有益探索，将通过与PyScript框架相关的特定部分中的多个清晰示例引导读者。每个部分都将向读者介绍独特的概念，读者会发现这些概念对于进一步的实现极其有用。\n\
    \n本章中的Python代码保持简单，因为这里的关键重点是理解PyScript中的重要概念。各节及相应的练习经过精心选择，旨在清晰地阐明所要解释的概念。本章将向读者介绍PyScript及其相关的基本概念。随后，特定的练习将引导读者学习在PyScript中创建基本网页、在PyScript中包含可运行的Python代码、在PyScript中导入第三方库以及在PyScript中引用外部Python代码。\n\
    \n在本章结束时，读者将欣赏到PyScript作为一种新颖理念的出现，它与传统的Web开发框架并存，用于实现Web应用程序。\n\n### PyScript简介\n\
    \nPyScript是一个开源的Web框架，允许用户使用HTML标签在浏览器中嵌入和执行Python代码。它能够使用Python动态生成页面。长期以来，JavaScript一直是前端开发的主导语言，因为它能够在浏览器中原生运行并与HTML和CSS交互。随后出现了WebAssembly，这是一个开放标准，允许在Web上使用二进制代码。这使得开发者能够在浏览器中运行C和C++等语言。显然，Python很快也加入了竞争，并推出了这个框架。\n\
    \nPyScript由Anaconda开发，基于Pyodide构建，后者将CPython移植到了WebAssembly。它通常用于希望将Python应用程序从后端迁移到前端的场景。另一个巨大优势是能够使用Python的科学计算包，如Scikit-learn、pandas和numpy。这些包通常只在后端工作，而不在前端工作。然而，PyScript允许用户在前端利用这些模块。最后，PyScript提供了与本地文件系统交互的能力，这是JavaScript所不具备的。\n\
    \n以下是读者在开始本章之前需要具备的基本先决条件：\n\n- HTML、CSS和JavaScript的基础知识。\n- Chrome网络浏览器，这是PyScript官方文档中建议使用的浏览器。\n\
    \n在本章中，我们将从基本的HTML应用程序开始，逐步见证Python以PyScript框架的形式参与Web开发，并在此后增加示例的复杂性。\n\n在下一节中，我们将使用PyScript创建一个基本网页。\n\
    \n### 使用PyScript创建基本网页\n\n在本节中，我们将通过创建一个基本网页来开始我们的PyScript之旅。在添加PyScript框架之前，我们需要创建一个基本的HTML模板。为了创建模板，请打开一个空白的文本编辑器（如Notepad），并复制下面显示的基本HTML脚本：\n\
    \n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\"\
    >\n    <title>PyScript Tutorial</title>\n</head>\n<body>\n\n</body>\n</html>\n\
    ```\n\n将文件保存为**PyScript_Tutorial.html**。\n\n接下来，我们需要添加下面描述的link标签和script标签：\n\n\
    - **Link标签**：这是用于格式化Python代码输出的样式表链接。如下所示：\n\n```html\n<link rel=\"stylesheet\"\
    \ href=\"https://pyscript.net/alpha/pyscript.css\" />\n```\n\n- **Script标签**：这引入了与浏览器协同工作以与Python运行时交互的JavaScript源文件。如下所示：\n\
    \n```html\n<script defer src=\"https://pyscript.net/alpha/pyscript.js\"></script>\n\
    ```\n\n合并这两个标签后，修改后的HTML脚本将如下所示：\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\"\
    >\n<head>\n    <meta charset=\"UTF-8\">\n    <link rel=\"stylesheet\" href=\"\
    https://pyscript.net/alpha/pyscript.css\" />\n    <script defer src=\"https://pyscript.net/alpha/pyscript.js\"\
    ></script>\n    <title> PyScript Tutorial </title>\n</head>\n```\n\n然而，这并未完成应用程序，因为我们尚未添加将编写Python代码的重要部分。我们使用**py-script**标签来实现这一点，如下所示：\n\
    \n```html\n<py-script>\n    #python code\n</py-script>\n```\n\n需要注意的是，写在**py-script**标签中的Python代码需要缩进。因此，了解这一点后，让我们编写我们的第一个**Hello\
    \ World**脚本，并相应地修改HTML文档，将Python代码包含在**py-script**标签内。\n修改后的HTML脚本将如下一页所示。\n\n\
    ```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\"\
    >\n    <link rel=\"stylesheet\" href=\"https://pyscript.net/alpha/pyscript.css\"\
    \ />\n    <script defer src=\"https://pyscript.net/alpha/pyscript.js\"></script>\n\
    \    <title> PyScript Tutorial </title>\n</head>\n<py-script>\n    print('Hello\
    \ World!')\n</py-script>\n```\n\n粘贴上述修改后的脚本后，保存文档**PyScript_Tutorial.html**。关闭文档并在Chrome浏览器中打开它。我们发现，在打开时，浏览器首先显示一条消息**Loading\
    \ Runtime**，然后显示消息**Hello World!**，如下图*图15.1*所示：\n\n![使用PyScript的第一个网页](img/3bdf02f00d53ff55047d1e1759de2882_369_0.png)\n\
    \n**图15.1：** *使用PyScript的第一个网页*\n\n太棒了！我们刚刚使用PyScript创建了我们的第一个网页！\n\n### 向网页添加可运行的Python代码\n\
    \n鉴于我们已经有了带有PyScript占位符的基本HTML模板，让我们继续下一个任务：在**py-script**标签中添加一段可运行的Python代码。\n\
    \n我们将编写一个小程序，该程序创建一个字典，然后在网页上填充字典的值。\n\n让我们创建一个示例字典，其中包含几个国家的名称作为键，其首都城市作为值，如下所示：\n\
    \n```python\ndict_countries = {'United States of America':'Washington D.C.',\n\
    \    'India':'New Delhi',\n    'Argentina':'Buenos Aires',\n    'Japan':'Tokyo',\n\
    \    'Germany':'Berlin',\n    'France':'Paris',\n    'Egypt':'Cairo'}\n```\n\n\
    接下来，我们将打印字典键的值，如下所示。这些值基本上是相应国家的首都城市：\n\n```python\nfor str_country in dict_countries:\n\
    \    print(dict_countries[str_country])\n```\n\n我们需要将此代码包含在我们之前保存的HTML模板**PyScript_Tutorial.html**的**py-script**块中。将此文件另存为**Countries_List.html**。修改后的HTML代码如下一页所示：\n\
    \n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\"\
    >\n    <link rel=\"stylesheet\" href=\"https://pyscript.net/alpha/pyscript.css\"\
    \ />\n    <script defer src=\"https://pyscript.net/alpha/pyscript.js\"></script>\n\
    \    <title> PyScript Tutorial </title>\n</head>\n<py-script>\n    dict_countries\
    \ = {'United States of America':'Washington D.C.',\n                      'India':'New\
    \ Delhi',\n                      'Argentina':'Buenos Aires',\n```"
