    # Comparison between various RPA tools


    Considering that there are multiple options to choose from when it comes to RPA
    tools in the market, it can be a tough decision to make for an organization while
    finalizing its choice of an RPA platform. However, there are certain important
    parameters that could be taken into account while selecting the optimum RPA tool
    for the organization. They are recording feature, availability of free version,
    drag and drop functionality, architecture and cost considerations. the comparison
    between Automation Anywhere, Blue Prism and UiPath based on these parameters is
    shown in the Table 2.1 below:


    | Parameter | Automation Anywhere | Blue Prism | UiPath |

    | :--- | :--- | :--- | :--- |

    | Macro recording | Yes | No | Yes |

    | Community edition | Yes | No | Yes |

    | Drag and drop | Not for all tasks. (Requires scripting) | Yes | Yes |'
