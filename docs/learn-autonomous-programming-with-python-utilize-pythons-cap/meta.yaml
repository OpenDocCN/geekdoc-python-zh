    \ min_row=1, max_row=1, max_col = 6**来实现这一点。\n\n之后，我们创建**chart**变量作为**BarChart**对象，并在**add_data**方法中将**values**和**titles**作为其参数传递。\n\
    \n我们还需要使用**set_categories**方法并传递**titles**变量作为参数来指定图表中的类别。\n\n最后，我们使用工作表对象中的**add_chart**方法将图表添加到工作表中，并指定我们需要添加它的位置。在这个例子中，我们指定了**H7**作为我们希望放置图表的单元格。\n\
    \n运行代码后，我们打开工作簿**Student Table.xlsx**。我们观察到柱状图已创建，如下方*图5.10*所示：\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_121_0.png)\n\
    \n**图5.10：** *显示每位学生平均分的柱状图*\n\n## 设置图表样式\n\n我们在上一个练习中创建的图表是一个基本图表。然而，我们也想探索openpyxl在为图表添加各种样式（如颜色、边框和格式）方面提供的功能。\n\
    \n将下面的代码复制到Python编辑器中：\n\n```python\nimport openpyxl\nfrom openpyxl import load_workbook\n\
    from openpyxl.chart import BarChart,Reference\nobjWorkbook = openpyxl.load_workbook('Student\
    \ Table.xlsx')\nobjWorksheet = objWorkbook.worksheets[0]\nchart = objWorksheet._charts[0]\n\
    chart.style = 8\nobjWorkbook.save(\"Student Table.xlsx\")\n```\n\n关闭工作簿‘**Student\
    \ Table.xlsx**’并运行代码。打开工作簿后，我们从下方的*图5.11*观察到图表颜色已更改：\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_122_0.png)\n\
    \n**图5.11：** *使用‘style’属性探索不同的图表颜色*\n\n基本上，我们使用工作表的**_charts**属性从工作表中访问图表，并传递索引键0，因为工作表中只有一个图表。之后，我们使用图表对象的**style**属性并赋值为8，以获得与8对应的图表颜色，如*图5.11*所示。每个数字都对应一种特定的颜色，留给读者去探索。\n\
    \n让我们也为X轴和Y轴添加标签，以便更容易理解它们分别对应**学生**和他们的**分数**。关闭**Student Table.xlsx**工作簿，在编辑器中运行代码。我们会观察到X轴和Y轴分别被分配了**Students**和**Scores**标签（参考*下方图5.12*）：\n\
    \n```python\nimport openpyxl\nfrom openpyxl import load_workbook\nfrom openpyxl.chart\
    \ import BarChart,Reference\nfrom openpyxl.chart.layout import Layout, ManualLayout\n\
    objWorkbook = openpyxl.load_workbook('Student Table.xlsx')\nobjWorksheet = objWorkbook.worksheets[0]\n\
    chart = objWorksheet._charts[0]\nchart.style = 8\nchart.x_axis.title = 'Students'\n\
    chart.y_axis.title = 'Scores'\nchart.legend.position = 'tr'\nobjWorkbook.save(\"\
    Student Table.xlsx\")\n```\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_123_0.png)\n\
    \n**图5.12：** *为X轴和Y轴添加标签*\n\n在这里，我们使用了图表**x_axis**和**y_axis**对象的**title**属性来为轴分配标签。我们还使用了图表**legend**对象的**position**属性来表示我们希望放置**系列1**图例的位置。我们将**tr**赋值给此属性，它代表**右上角**。如下图所示，图例实际上已移动到右上角。\n\
    \n最后，让我们为图表添加一个标题。我们只需要添加一行额外的代码：`chart.title = \"Average Scores of Students\"\
    `。\n\n关闭工作簿**Student Table.xlsx**并在Python编辑器中运行下面的代码：\n\n```python\nimport openpyxl\n\
    from openpyxl import load_workbook\nfrom openpyxl.chart import BarChart,Reference\n\
    from openpyxl.chart.layout import Layout, ManualLayout\nobjWorkbook = openpyxl.load_workbook('Student\
    \ Table.xlsx')\nobjWorksheet = objWorkbook.worksheets[0]\nchart = objWorksheet._charts[0]\n\
    chart.style = 8\nchart.x_axis.title = 'Students'\nchart.y_axis.title = 'Scores'\n\
    chart.legend.position = 'tr'\nchart.title = \"Average Scores of Students\"\nobjWorkbook.save(\"\
    Student Table.xlsx\")\n```\n\n打开工作簿**Student Table.xlsx**并观察图表。\n\n我们发现图表现在有了一个标题**Average\
    \ Scores of Students**，如下方*图5.13*所示：\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_125_0.png)\n\
    \n**图5.13：** *为图表添加标题‘Average Scores of Students’*\n\n至此，我们完成了关于图表的系列教程！我们所进行的练习应能让读者充分理解，以便进一步探索openpyxl在创建和设置图表样式方面提供的功能。\n\
    \n我们已经看到openpyxl是一个极其有用的库，它提供了读取、编辑、转换和分析Excel电子表格的能力。openpyxl中还有许多其他模块为用户提供了额外的功能。本章奠定的基础应能为读者提供足够的基础，以独立探索openpyxl的其他功能。\n\
    \n至此，我们现在将继续探索Python提供的其他开源库，这些库可替代openpyxl用于自动化Excel中的常规任务。这些库是**xlwings**和**xlsxWriter**。\n\
    \n## 用于Excel自动化的其他Python库\n\n我们将在本节中探索xlwings和xlsxwriter库。"
