  md: '+   - **Random forests:** This is a continuation of decision tree algorithm
    but what we do here is we combine the results of multiple decision trees to come
    up with the result. The limitation with having a single decision tree is that
    there is a possibility of overfitting. Overfitting is the phenomenon where an
    algorithm fits the training data set so rigidly that it does not have the bandwidth
    to accommodate any flexibility to allow itself to fit with equivalent ease on
    the testing dataset. Random forest is an example of an Ensemble Learning algorithm
    that uses the Bagging technique. Ensemble Learning is the technique of improving
    results by combining the results of several models. Bagging is the technique where
    different samples of training data are fed to the algorithm to obtain a different
    result for each sample. In this case, random samples of training data are fed
    to the algorithm. This results in the creation of multiple decision trees that
    produce multiple outputs. The result is decided by a majority vote process. The
    most frequently occurring output is chosen as the result.

    - **Support vector machine:** This is a classification algorithm that creates
    an optimal hyperplane that separates the dataset in the best possible way into
    categories or classes based on differentiable attributes. If the data set is two
    dimensional with two classes, then the hyperplane would be a straight line. The
    algorithm works by choosing the points closest to the line from both classes and
    trying to maximize the distance between the points and the line called as **margin**.
    These points are called as ‘Support Vectors’ hence the name **support vector machine**.'
