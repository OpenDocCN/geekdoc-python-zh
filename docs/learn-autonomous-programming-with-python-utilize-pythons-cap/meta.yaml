    # Legal considerations of web scraping


    There exists no clear blueprint or a legal statement on web scraping that denies
    the ethicality of the practice neither does the scope of this book intend to discuss
    any grey areas in that regard. This topic is best left to the discretion and further
    research of the reader. However, as a fact, most organizations are known to conveniently
    use web scraping for analyzing customer sentiment, competitor activities, market
    pricing and much more. It is important to understand that no website would generally
    want to entertain another party to scrape data from their page. If the scraping
    bot gets frequently detected, it could lead to the visitor’s IP address getting
    blocked from further visiting the page, hence one needs to be careful and considerate
    while performing web scraping and avoid any malevolent intentions. If it can be
    proved by companies that a certain scraping activity has caused infrastructural
    damage, then it may result in legal action. Most websites usually provide a file
    called **robots.txt** which can be obtained by just adding **\robots.txt** at
    the end of the web page URL. It contains certain parameters like **User-agent**
    and **Disallow** that provide an idea of the extent to which crawling might be
    allowed or disallowed to scrapers on their web page.


