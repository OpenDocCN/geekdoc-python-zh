    \ UiPath are UiPath Studio, UiPath Robot and UiPath orchestrator. These shall\
    \ be discussed in detail in another chapter related to UiPath.\n\n+   - **Automation\
    \ anywhere:** This is a web-based automation tool which also has a free version\
    \ called Community Edition. The three main components of Automation Anywhere are:\n\
    \    - **Bot Creator:** This is a component in which the user creates the bot.\n\
    \    - **Control room:** This is the interface that is used to centrally manage\
    \ the bots.\n    - **Bot runner:** This is the component that is used to run the\
    \ bots after they have been created in the Bot Creator. This also reports the\
    \ bot execution status to the control room.\n\n+   - **Blue Prism:** This is an\
    \ RPA tool that helps organizations automate manual and repetitive processes.\
    \ This is a platform independent tool and can be used on any platform. This does\
    \ not have a community edition like Automation Anywhere or UiPath but has a learning\
    \ version which is free for 180 days. One disadvantage of this tool is that it\
    \ does not have a recording functionality like UiPath and Automation Anywhere.\
    \ The main components of Blue Prism are:\n    - **Object studio:** This is where\
    \ Blue Prism objects are created, or bots are built.\n    - **Process studio:**\
    \ This is similar to object studio but here one can define the flow of the process\n\
