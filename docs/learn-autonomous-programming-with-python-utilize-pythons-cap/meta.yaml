    and adaptation between multiple tasks in a workflow. |

    | **Deployment** | An automated solution might be deployed in-house or locally
    on a desktop. | An orchestrated solution usually involves deployment on the network.
    |

    | **Typical use cases** | IT processes, financial processes, designing processes
    | DevOps, Cloud |


    *Table 11.1: Primary differences between automation and orchestration*


