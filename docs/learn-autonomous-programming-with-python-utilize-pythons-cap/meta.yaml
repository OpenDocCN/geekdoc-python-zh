    # Defining hyperautomation: What it is and why it matters


    If we look at the history of the industry, the first industrial revolution called
    **Industry 1.0** demonstrated the power of locomotives like the steam engine in
    achieving automation. The second one called **Industry 2.0** took a step further,
    with regards to sophistication by adding electricity and internal combustion engine.
    The third called **Industry 3.0** pioneered the use of computers, electronics,
    and **information technology (IT)** to greatly accelerate the rate of automation.
    The fourth one called **Industry 4.0** has the internet as the hallmark where
    the concept of **internet of things (IoT)** makes all computing devices interrelated.
    Higher computational power enabled by **graphical processing unit (GPU)** has
    made the implementation of machine learning and deep learning algorithms a reality.

    Tracing the evolution of industry from the steam-powered automation of Industry
    1.0 to the interconnected world of Industry 4.0, we see a pattern of constant
    innovation. Considering the fact that the contemporary industry has witnessed
    tremendous growth due to innovation, it becomes'
  - '[PAGE 297]


    imperative for an organization to not just restrict itself to procedural automation
    but also incorporate cognitive intelligence in its business process workflows
    in order to remain relevant in the ever-evolving business landscape and emerge
    as an able competitor who is a cut above the rest. To make it simple, the horizon
    of traditional automation needs to be expanded to include salient aspects of cognitive
    thinking that adds an element of intelligence to the business process and to the
    system. Today’s business landscape demands more than just procedural automation
    – it requires the integration of cognitive intelligence. In the emerging context,
    this idea is termed as **hyperautomation** which basically means automating everything
    that is possible. Hyperautomation represents this next leap, where AI, ML, and
    RPA are orchestrated to not just automate tasks but to imbue systems with sophisticated,
    cognitive capabilities. This may sound very idealistic and may be far from reality
    now, but nevertheless has the potential to upgrade and ascend to levels close
    to what we define as **ideal**. Simply put, hyperautomation is the process of
    increasing the capability of existing automation by introducing the power of **artificial
    intelligence (AI)**, **machine learning (ML)** and robotic process automation
    into it. In other words, we define hyperautomation as the holistic automation
    of complex business processes, aiming to automate as much as possible by harnessing
    AI and ML. This concept is not just an ideal but a tangible goal that can significantly
    elevate operational efficiency and competitiveness.


    We have already studied the concept of orchestration in the previous chapter.
    Another way of looking at hyperautomation is the orchestration of multiple technologies
    by combining process automation with robotic process automation and cognitive
    technologies like artificial intelligence and machine learning. This addition
    of cognitive'
  - '[PAGE 298]


    intelligence adds an element of sophistication and provides a competitive advantage
    to the business.


    # The hyperautomation cycle: Key steps and processes


    Every organization would have to go through some key steps in the planning of
    their hyperautomation cycle. These steps might vary from one organization to another,
    but there are some general steps that remain common to any organization. They
    have been diagrammatically shown in *Figure 12.1* below:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_298_0.png)


    **Figure 12.1:** *Steps in the hyperautomation cycle*


    We shall now elaborate each step:


    +   1. **Identifying the goal:** This is the most crucial and important defining
    step of the hyperautomation process and hence it comes first in the sequence.
    Any business needs to have a clear goal in picture prior to contem'
  - '[PAGE 299]


    plating any implementation of hyperautomation. If a business is going for hyperautomation
    just for the sake of it or to keep up with the trend or simply because other organizations
    are using it, then it clearly becomes a recipe for disaster. A business should
    have a clear vision of the goals and the challenges that it is trying to conquer
    so that the adoption of hyperautomation becomes well defined, selective, and customized
    for the business.


    +   2. **Selection of key technologies:** Once a business has identified the goal,
    the next step would be to list out those areas where adoption of hyperautomation
    would ensure significant value addition. For example, an e-commerce business would
    want to consider adoption of recommendation algorithms in order to improve customer
    engagement and satisfaction. This might prompt them to incorporate sophisticated
    machine learning algorithms to serve this purpose. Another business might simply
    be interested in eliminating the involvement of its talented workforce in repetitive
    manual work in order to utilize them for more creative and constructive tasks.
    Hence it might go for robotic process automation.


    +   3. **Assessment of capabilities:** Once the goal has been identified along
    with the necessary technologies that would meet the goal, the organization needs
    to assess the time, money, and resources that it would need in order to implement
    the technologies.


    +   4. **Continuous improvement:** Any process must be continuously monitored
    for feedback that enables the business to rectify errors and incorporate learning
    in the next implementation.'
  - '[PAGE 300]


    # Exploring typical use cases for hyperautomation


    Having already received a good understanding about hyperautomation in the previous
    introductory sections, let us jump straightaway to some typical use cases in hyperautomation
    where Python comes to the rescue! In this chapter, we would be covering the commonly
    occurring applications below that come under the purview of hyperautomation and
    study each of them in the sections to follow:


    +   - **Document understanding using optical character recognition**: We have
    studied the concept of **optical character recognition (OCR)** in *Chapter 7,
    Working with PDFs, and Images*, where we utilized the tesseract library of Python
    to read text from images. We shall implement the same concept in this chapter,
    this time for reading information from image documents. This requirement frequently
    arises in all organizations where important documents may have information in
    an unstructured format where text recognition using OCR greatly accelerates the
    automation cycle by considerably reducing the element of human involvement in
    extracting information from these documents.

    - **Conversational agents - Chatbots**: In our discussion on natural language
    processing in one of our previous chapters, we have discussed how the Python libraries
    NLTK and Spacy provide readily available methods to enable one to implement salient
    features of NLP pipeline. One of the many applications of NLP is a Chatbot or
    a conversational agent which has become an indispensable part of any business
    today. Chatbots enable human to customer interaction on most of the generic topics,
    thus reducing unnecessary human involvement'
- md: "## Enhancing document understanding with optical character recognition\n\n\
    An organization frequently comes across cases where extracting key information\
    \ from documents and processing it further becomes a pivotal point in the business\
    \ process. Most of the times, this information is not readily available in a structured\
    \ format, thus requiring the involvement of experts from the profession to manually\
    \ extract information. This consumes lots of time and makes the process prone\
    \ to human errors as well. With the availability of technology like optical character\
    \ recognition, the manual involvement in this process could be greatly reduced\
    \ by enabling the reading and interpretation of information from documents, thus\
    \ proving to be a great catalyst in the arena of hyperautomation using AI.\n\n\
    In this section, we shall be revisiting the **pytesseract** Python library to\
    \ read text from images. We have already covered the downloading and installation\
    \ procedure for **pytesseract** in *Chapter 7, Working with PDFs and Images*,\
    \ so we would straightaway move to the Python implementation here.\n\nThe example\
    \ file that we shall be using is **Stock Prices.pdf** which we also used in *Chapter\
    \ 7*, while working with the **PyPDF** library. However, this time the file would\
    \ be an image PDF file, which means that one cannot use it with **PyPDF** as the\
    \ text within the file is unsearchable. Hence, we would be making use of OCR in\
    \ order to extract text from this image file.\n\nIt is important to note here\
    \ that Tesseract OCR currently does not support the reading of text directly from\
    \ a PDF file. Hence, we would need to convert the PDF file into an image format\
    \ like **.JPG** which Tesseract OCR could consume as an input.\n\nLet us open\
    \ the **Stock Prices.pdf** file and observe the contents of the file. On opening\
    \ the file, we see that shown in *Figure 12.2*, it contains the same text and\
    \ table that we observed in the text PDF **Stock Prices.pdf** which we used in\
    \ *Chapter 7 - Working with PDFs and Images*, while studying the **PyPDF2** library.\
    \ The only difference is that the text cannot be searched or selected since this\
    \ is an image PDF. Therefore, we would be using OCR to extract text from this\
    \ image PDF.\n\n*Figure 12.2* below shows the contents from the image PDF file\
    \ **Stock Prices.pdf**:\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_303_0.png)\n\
    \n**Figure 12.2:** Contents from image PDF file Stock Prices.pdf\n\nAs discussed,\
    \ let us first transform the PDF file into an image file in order to make it into\
    \ a format that could be consumed by Tesseract OCR. We use the Python library\
    \ **pdf2image** to transform the PDF file into an image file. Before using the\
    \ library, we install the library using the command below:\n\n```\npip install\
    \ pdf2image\n```\n\nNext, we import the required libraries as follows:\n\n```\n\
    from pdf2image import convert_from_path\nimport pytesseract\n```\n\nHere, we shall\
    \ be using the **convert_from_path** method of the **pdf2image** library. Save\
    \ the file **Stock Prices.pdf** in the same directory where the Python file has\
    \ been saved. As shown in the code below, we simply provide the name of the file\
    \ as the path and pass it as an argument to the function **convert_from_path**\
    \ which would convert all the pages of the PDF document into images that could\
    \ be consumed by Tesseract.\n\n```\nstr_pdf_path = \"Stock Prices.pdf\"\nimages\
    \ = convert_from_path(pdf_path, 500)\n```\n\nNow, we specify the path of the Tesseract\
    \ executable since we would be using it:\n\n```\npytesseract.pytesseract.tesseract_cmd\
    \ = r'C:\\Program Files (x86)\\Tesseract-OCR\\tesseract.exe'\n```\n\nNext, we\
    \ shall loop through every image and pass it into **pytesseract** to read text\
    \ from the image and then we shall concatenate the text from every page to produce\
    \ a single text in the output. Here, we have just one page in the PDF document\
    \ so we would be having just one image to iterate through.\n\nBelow is the code\
    \ that performs the task:\n\n```\ntext_output = ''\nfor image in images:\n   \
    \ text = pytesseract.image_to_string(image)\n    text_output += text + '\\n'\n\
    \nprint(text_output)\n```\n\nThe entire code has been shown below for reference.\
    \ Copy and run the code in a Python editor and observe the output in the console:\n\
    \n```\nfrom pdf2image import convert_from_path\nimport pytesseract\n\nstr_pdf_path\
    \ = \"Stock Prices.pdf\"\n\nimages = convert_from_path(str_pdf_path)\n\npytesseract.pytesseract.tesseract_cmd\
    \ = r'C:\\Program Files (x86)\\Tesseract-OCR\\tesseract.exe'\n\ntext_output =\
    \ ''\nfor image in images:\n    text = pytesseract.image_to_string(image)\n  \
    \  text_output += text + '\\n'\n\nprint(text_output)\n```\n\n**Output:**\n\n**Below\
    \ is a table showing the price of five stocks A,B,C,D, and E from January to December.\
    \ The first column contains the stock names and the remaining columns contain\
    \ the respective values of the stock from January to December.**\n\n| Stocks |\
    \ Jan | Feb | Mar | Apr | May | Jun | Jul | Aug | Sep | Oct | Nov | Dec |\n|---|---|---|---|---|---|---|---|---|---|---|---|---|\n\
    | A | 357 | 457 | 187 | 831 | 779 | 338 | 129 | 508 | 407 | 748 | 511 | 609 |\n\
    | C | 60 | 64 | 54 | 93 | 87 | 74 | 96 | 92 | 83 | 85 | 70 | 88 |\n| D | 1667\
    \ | 1962 | 1845 | 1535 | 1753 | 1767 | 1551 | 1893 | 1715 | 1707 | 1627 | 1532\
    \ |\n| E | 2181 | 2333 | 2265 | 2274 | 2739 | 2601 | 2569 | 2520 | 2744 | 2234\
    \ | 2836 | 2230 |\n\nThe document contains a paragraph at the top and a table\
    \ at the bottom. We clearly see that every word of the paragraph has been perfectly\
    \ extracted. However, we see that in the table, the line corresponding to stock\
    \ B has been completely omitted even though rest of the information from the table\
    \ has been correctly retained. There are certain limitations with Tesseract when\
    \ it comes to detecting and extracting tables.\n\nWe would try to tackle this\
    \ limitation by using another Python library called **img2table** and then use\
    \ OCR. Prior to using it, we would need to install it using the command below:\n\
    \n```\npip install img2table\n```\n\nNext, we import the required libraries using\
    \ the code below:\n\n```\nfrom img2table.document import PDF\nfrom img2table.ocr\
    \ import TesseractOCR\n```\n\nFrom the code above, we understand that we would\
    \ be using the **PDF** method provided by the **document** module of the **img2table**\
    \ library and the **TesseractOCR** method provided by the **ocr** module of the\
    \ **img2table** library.\n\nNext, we create the objects **obj_pdf** and **obj_ocr**\
    \ using the respective methods as shown in the code below. Prior to running the\
    \ code, make sure that the exercise file **Stock Prices.pdf** is in the same directory\
    \ as the Python code, else the explicit path of the file needs to be mentioned\
    \ in the **src** argument of the **PDF** method in the code below:\n\n```\nobj_pdf\
    \ = PDF(src=\"Stock Prices.pdf\")\n\nobj_ocr = TesseractOCR(lang=\"eng\")\n```\n\
    \nNext, we use the **extract_tables** method of the **obj_pdf** object which extracts\
    \ all tables within the document using OCR. Here, we pass the **obj_ocr** object\
    \ as an argument to the **ocr** parameter of the **extract_tables** method:\n\n\
    ```\nobj_pdf_tables = obj_pdf.extract_tables(ocr=obj_ocr)\n```\n\nThereafter,\
    \ we use the **to_xlsx** method of the **obj_pdf** object to export the table\
    \ to an Excel worksheet as shown in the code below:\n\n```\nobj_pdf.to_xlsx(\"\
    Extracted_Tables.xlsx\", ocr=obj_ocr)\n```\n\nHere, we observe that the **to_xlsx**\
    \ method as well requires an input to the **ocr** parameter that we provide as\
    \ the **obj_ocr** object. The name of the output file that we require is \"**Extracted_Tables.xlsx**\"\
    \ and has been passed as the first argument to the **to_xlsx** method.\n\nThe\
    \ entire piece of code has been included on the next page for reference. Copy\
    \ and run the code in the Python editor and observe that an Excel file named \"\
    **Extracted_Tables.xlsx**\" has been created in the same directory where the code\
    \ has been saved.\n\n```\nfrom img2table.document import PDF\nfrom img2table.ocr\
    \ import TesseractOCR\n\nobj_pdf = PDF(src=\"Stock Prices.pdf\")\nobj_ocr = TesseractOCR(lang=\"\
    eng\")\nobj_pdf_tables = obj_pdf.extract_tables(ocr=obj_ocr)\nobj_pdf.to_xlsx(\"\
    Extracted_Tables.xlsx\", ocr=obj_ocr)\n```\n\nOn opening the output Excel file\
    \ \"**Extracted_Tables.xlsx**\", we observe a table as shown in *Figure 12.3*\
    \ below:\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_307_0.png)\n\n**Figure 12.3:**\
    \ Table from output Excel File \"Extracted_Tables.xlsx\"\n\nWe observe that this\
    \ is a much better-looking table than the one which we obtained using the **image_to_string**\
    \ method of the **pytesseract** library. However, we still find that the first\
    \ column Stocks that mentions the names of stocks **A**, **B**, **C**, **D** and\
    \ **E** has all values blank. Additionally, the value corresponding to **Nov**\
    \ for stock **A** is missing."
  mdcn: "## 利用光学字符识别增强文档理解\n\n组织机构经常遇到需要从文档中提取关键信息并进一步处理的情况，这成为业务流程中的关键环节。大多数时候，这些信息并非以结构化格式直接可用，因此需要相关领域的专家手动提取信息。这不仅耗费大量时间，也使流程容易出现人为错误。随着光学字符识别等技术的可用性提高，通过实现文档信息的读取和解读，可以大大减少此过程中的手动参与，从而成为利用人工智能实现超级自动化的强大催化剂。\n\
    \n在本节中，我们将重新审视 **pytesseract** Python 库，用于从图像中读取文本。我们已经在 *第7章 处理PDF和图像* 中介绍了 **pytesseract**\
    \ 的下载和安装过程，因此这里将直接进入 Python 实现部分。\n\n我们将使用的示例文件是 **Stock Prices.pdf**，这也是我们在 *第7章*\
    \ 中使用 **PyPDF** 库时用过的文件。然而，这次该文件将是一个图像 PDF 文件，这意味着无法使用 **PyPDF**，因为文件中的文本不可搜索。因此，我们将利用\
    \ OCR 从该图像文件中提取文本。\n\n这里需要注意的是，Tesseract OCR 目前不支持直接从 PDF 文件中读取文本。因此，我们需要将 PDF\
    \ 文件转换为图像格式，如 **.JPG**，以便 Tesseract OCR 可以将其作为输入使用。\n\n让我们打开 **Stock Prices.pdf**\
    \ 文件并观察其内容。打开文件后，我们看到如 *图12.2* 所示，它包含与我们在 *第7章 处理PDF和图像* 中学习 **PyPDF2** 库时使用的文本\
    \ PDF **Stock Prices.pdf** 中相同的文本和表格。唯一的区别是文本无法搜索或选择，因为这是一个图像 PDF。因此，我们将使用 OCR\
    \ 从该图像 PDF 中提取文本。\n\n*图12.2* 下方显示了图像 PDF 文件 **Stock Prices.pdf** 的内容：\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_303_0.png)\n\
    \n**图12.2：** 图像 PDF 文件 Stock Prices.pdf 的内容\n\n如前所述，让我们首先将 PDF 文件转换为图像文件，以使其成为\
    \ Tesseract OCR 可以使用的格式。我们使用 Python 库 **pdf2image** 将 PDF 文件转换为图像文件。在使用该库之前，我们使用以下命令安装它：\n\
    \n```\npip install pdf2image\n```\n\n接下来，我们按如下方式导入所需的库：\n\n```\nfrom pdf2image\
    \ import convert_from_path\nimport pytesseract\n```\n\n在这里，我们将使用 **pdf2image**\
    \ 库的 **convert_from_path** 方法。将文件 **Stock Prices.pdf** 保存在与 Python 文件相同的目录中。如下方代码所示，我们只需提供文件名作为路径，并将其作为参数传递给函数\
    \ **convert_from_path**，该函数将把 PDF 文档的所有页面转换为 Tesseract 可以使用的图像。\n\n```\nstr_pdf_path\
    \ = \"Stock Prices.pdf\"\nimages = convert_from_path(pdf_path, 500)\n```\n\n现在，我们指定\
    \ Tesseract 可执行文件的路径，因为我们将使用它：\n\n```\npytesseract.pytesseract.tesseract_cmd =\
    \ r'C:\\Program Files (x86)\\Tesseract-OCR\\tesseract.exe'\n```\n\n接下来，我们将遍历每张图像并将其传递给\
    \ **pytesseract** 以从图像中读取文本，然后我们将连接每页的文本以在输出中生成单个文本。这里，PDF 文档中只有一页，因此我们只需要遍历一张图像。\n\
    \n以下是执行此任务的代码：\n\n```\ntext_output = ''\nfor image in images:\n    text = pytesseract.image_to_string(image)\n\
    \    text_output += text + '\\n'\n\nprint(text_output)\n```\n\n完整的代码如下所示供参考。在\
    \ Python 编辑器中复制并运行代码，并在控制台中观察输出：\n\n```\nfrom pdf2image import convert_from_path\n\
    import pytesseract\n\nstr_pdf_path = \"Stock Prices.pdf\"\n\nimages = convert_from_path(str_pdf_path)\n\
    \npytesseract.pytesseract.tesseract_cmd = r'C:\\Program Files (x86)\\Tesseract-OCR\\\
    tesseract.exe'\n\ntext_output = ''\nfor image in images:\n    text = pytesseract.image_to_string(image)\n\
    \    text_output += text + '\\n'\n\nprint(text_output)\n```\n\n**输出：**\n\n**下表显示了五只股票\
    \ A、B、C、D 和 E 从一月到十二月的价格。第一列包含股票名称，其余列包含股票从一月到十二月的相应值。**\n\n| Stocks | Jan | Feb\
    \ | Mar | Apr | May | Jun | Jul | Aug | Sep | Oct | Nov | Dec |\n|---|---|---|---|---|---|---|---|---|---|---|---|---|\n\
    | A | 357 | 457 | 187 | 831 | 779 | 338 | 129 | 508 | 407 | 748 | 511 | 609 |\n\
    | C | 60 | 64 | 54 | 93 | 87 | 74 | 96 | 92 | 83 | 85 | 70 | 88 |\n| D | 1667\
    \ | 1962 | 1845 | 1535 | 1753 | 1767 | 1551 | 1893 | 1715 | 1707 | 1627 | 1532\
    \ |\n| E | 2181 | 2333 | 2265 | 2274 | 2739 | 2601 | 2569 | 2520 | 2744 | 2234\
    \ | 2836 | 2230 |\n\n文档顶部包含一个段落，底部包含一个表格。我们清楚地看到段落中的每个单词都已被完美提取。然而，我们看到在表格中，对应于股票\
    \ B 的行被完全省略了，尽管表格中的其余信息已被正确保留。Tesseract 在检测和提取表格方面存在某些局限性。\n\n我们将尝试通过使用另一个名为 **img2table**\
    \ 的 Python 库来解决这个局限性，然后使用 OCR。在使用它之前，我们需要使用以下命令安装它：\n\n```\npip install img2table\n\
    ```\n\n接下来，我们使用以下代码导入所需的库：\n\n```\nfrom img2table.document import PDF\nfrom img2table.ocr\
    \ import TesseractOCR\n```\n\n从上面的代码中，我们了解到我们将使用 **img2table** 库的 **document**\
    \ 模块提供的 **PDF** 方法和 **img2table** 库的 **ocr** 模块提供的 **TesseractOCR** 方法。\n\n接下来，我们使用各自的方法创建对象\
    \ **obj_pdf** 和 **obj_ocr**，如下方代码所示。在运行代码之前，请确保练习文件 **Stock Prices.pdf** 与 Python\
    \ 代码位于同一目录中，否则需要在下面代码中 **PDF** 方法的 **src** 参数中明确指定文件的路径：\n\n```\nobj_pdf = PDF(src=\"\
    Stock Prices.pdf\")\n\nobj_ocr = TesseractOCR(lang=\"eng\")\n```\n\n接下来，我们使用 **obj_pdf**\
    \ 对象的 **extract_tables** 方法，该方法使用 OCR 提取文档中的所有表格。这里，我们将 **obj_pdf** 对象作为参数传递给\
    \ **extract_tables** 方法的 **ocr** 参数：\n\n```\nobj_pdf_tables = obj_pdf.extract_tables(ocr=obj_ocr)\n\
    ```\n\n之后，我们使用 **obj_pdf** 对象的 **to_xlsx** 方法将表格导出到 Excel 工作表，如下方代码所示：\n\n```\n\
    obj_pdf.to_xlsx(\"Extracted_Tables.xlsx\", ocr=obj_ocr)\n```\n\n这里，我们观察到 **to_xlsx**\
    \ 方法也需要一个输入到 **ocr** 参数，我们将其作为 **obj_ocr** 对象提供。我们需要的输出文件名是 \"**Extracted_Tables.xlsx**\"\
    ，并将其作为第一个参数传递给 **to_xlsx** 方法。\n\n完整的代码已包含在下一页供参考。在 Python 编辑器中复制并运行代码，并观察在代码保存的同一目录中创建了一个名为\
