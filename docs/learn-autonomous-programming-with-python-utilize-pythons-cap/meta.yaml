    # Key concepts in Machine Learning models


    There are certain important concepts that we need to understand in order to have
    a better background of the theory behind building and optimizing machine learning
    models. These concepts have been covered in the bullets points to follow:


    +   - **Gradient descent**: This is the process that is used to optimize a model.
    Before understanding gradient descent, it is important to understand another term
    called **cost function**. We saw in linear regression that the best fit line is
    the one where the sum of the squares of the residuals (vertical distance between
    the points and line) is the minimum. In other words, this is the parameter that
    we are trying to minimize. In machine learning terminology, this parameter is
    called the **cost function**, which is basically a measure of the difference between
    the actual and the predicted values.


    Coming back to gradient descent, the process works by first creating a curve of
    the cost function against its parameters. Next, we select an arbitrary point on
    the plot and find the derivative of the cost function at that point. Next, we
    select an arbitrary parameter called the **learning rate** and multiply it by
    the derivative this obtained. Next, we subtract this product from the coordinate
    of the arbitrary point that we had selected on the cost function curve. The result
    thus obtained becomes the starting point for the next iteration where we repeat
    the same process for multiple iterations. At eve'
  merge: -1
  pgno: 212
- img_proc: true
  md: 'ry iteration, we calculate the value of the cost functio n. Since we are descending,
    the value of the cost func tion should go on reducing. Once we reach a point wh
    ere the cost function does not reduce any further or re mains somewhat stationary,
    we understand that the a lgorithm has converged, and we have reached the mi nimum
    of the cost function. The parameters at which t he cost function is minimum are
    thus selected as the best fit or optimum parameters of the model. Gradien t descent
    algorithm can be mathematically expressed below:


    $$X'' = X - \gamma \nabla$$


    Where,


    +   - $X$ = Initial arbitrary point

    - $\gamma$ = Learning rate

    - $\nabla$ = Derivative at arbitrary point

    - $X''$ = Resultant point obtained for using in next iteration


    +   - **Bias versus variance**: Bias is when a model oversim plifies the assumptions
    in order to fit itself to the traini ng data. When there is bias, the model does
    not consi der all the points in the data set. This is also usually c alled **underfitting**.
    On the contrary, when a model tr ies too hard to fit itself to every single point
    in the trai ning data set, it loses its ability to generalize the othe r data.
    This (also called **overfitting**) gives rise to **vari ance**, which is basically
    a large deviation of prediction s from the expected output. The tradeoff here
    is that i f the model is too simplistic due to the bias, the varian ce would be
    less on the testing data. However, if the model is too rigid due to overfitting,
    the bias would be less, but the variance would be high as it would beco me more
    difficult for the model to make predictions o'
  merge: -1
  pgno: 213
- img_proc: true
  md: 'n a testing data that looks different. A good machine learning model is the
    one that finds a sweet spot between bias and variance.


