    \    return intSquare\n\n#Performs the addition of two integers\n\ndef Add(intNum1,intNum2):\n\
    \    intSum = intNum1 + intNum2\n    return intSum\n```\n\n我们将在练习的后面引用这些函数中的每一个。\n\
