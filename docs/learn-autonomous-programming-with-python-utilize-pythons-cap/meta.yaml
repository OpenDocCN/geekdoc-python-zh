    \n2.  接下来，我们点击序列中的**Python作用域**窗口。我们发现UiPath流程中的属性窗口打开，如*图13.8*所示：\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_330_1.png)\n\
    \n**图13.8：** *Python作用域活动的属性窗口*\n\n这里有几个我们会感兴趣的属性，我们需要为这些属性指定正确的值。\n\n以下是我们想要指定的属性列表：\n\
