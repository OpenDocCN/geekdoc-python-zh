    # Structure


    The chapter covers the following topics:


    +   - Setting up the Python environment in UiPath

    - Exploring Python activities in UiPath

    - Creating the Python script

    - Integrating Python with UiPath


    # Objectives


    This chapter assumes that the reader is already familiar and comfortable navigating
    basic functionalities in UiPath. Although *Chapter 2, RPA Foundations* has provided
    an overview and summary of different RPA functionalities, it would be helpful
    to get acquainted with primary concepts related to UiPath prior to beginning this
    chapter, as the focus of this chapter would be the integration of Python with
    UiPath.


