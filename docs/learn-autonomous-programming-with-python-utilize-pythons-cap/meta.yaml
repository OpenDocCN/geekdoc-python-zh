  md: '![](img/3bdf02f00d53ff55047d1e1759de2882_39_0.png)


    **Figure 2.2:** *Development studio in UiPath*


    +   - **Plugins and extensions:** Plugins or extensions allow the expansion of
    the original capability of the RPA tool by enabling its integration with an external
    program or third-party software.

    - **Bot runner:** This is the component that enables to run the bot that is created
    by the Bot Creator.

    - **Control center:** In order to centrally manage, schedule and control the bots,
    a control center is used.


    # Various RPA tools in the market


    There are numerous companies that offer RPA solutions in the market. However,
    this section shall discuss only the three market leaders which are UiPath, Automation
    Anywhere and Blue Prism.


    +   - **UiPath:** This is one of the leaders in RPA tools used for desktop and
    web automation. A big advantage of this tool is that it provides a community edition
    for users who intend to learn the tool. A person with no knowledge of coding can
    also use this tool because it offers d'
