- md: "## Backpropagation\n\nIn this section, we shall study an important concept\
    \ related to the efficient training of neural networks which is backpropagation.\
    \ What backpropagation does is that it efficiently trains the neural network by\
    \ backwardly propagating the errors from the output nodes to the input nodes.\
    \ It does this by defining the loss function and calculating the impact of each\
    \ of the weights of the neural network on the loss function by means of gradient\
    \ descent. We have already studied gradient descent in *Chapter 9 - Intelligent\
    \ Automation Part 1: Using Machine Learning* on machine learning. Here, we shall\
    \ see how backpropagation also uses gradient descent to calculate the optimum\
    \ values of the weights and biases that could do the task which the neural network\
    \ is intended to do. In order to perform mathematical calculations required for\
    \ backpropagation, this section assumes that the reader is conversant with basic\
    \ concepts of calculus like derivatives, partial derivatives and chain rule.\n\
    \nWe are already familiar with the process of calculating the output of a node\
    \ from a neural network. We calculate the dot product of the weights and the inputs\
    \ and then add the bias term at the end. This process is alternatively called\
    \ as **forward pass**. For the neural network shown in *Figure 10.2* the output\
    \ for node *y1* calculated using weights *w11,w12,w13* and inputs *x1,x2,x3* by\
    \ the process of forward pass would be *w11*x1 + w12*x2 + w13*x3 + b1* where *b1*\
    \ is the bias. The outputs for the other nodes would be calculated in a similar\
    \ way.\n\nNow, the outputs calculated in this way would be the predicted outputs.\
    \ However, when we train the neural network, we train it with the intention of\
    \ producing an expected output. A measure of the gap between the expected output\
    \ and the predicted output is called as error and the goal of training the neural\
    \ network is to optimize the weights in such a way that they minimize this error.\
    \ The process of optimizing these weights is called as **backpropagation**.\n\n\
    As the purpose of this book is simply to demonstrate the significance of Python\
    \ in simplifying computations, we would not be going into the actual implementation\
    \ of backpropagation in the context of a fully connected neural network; else\
    \ the calculations might span many pages and go beyond the scope of this book.\n\
    \nHowever, we shall acquaint ourselves with the general process of backpropagation\
    \ in the context of a single perceptron so that the reader could expand the idea\
    \ to implement backpropagation to a fully connected neural network.\n\nAs shown\
    \ in the above *Figure 10.3*, the node gets four values of inputs as *x1*, *x2*,\
    \ *x3* and *x4* with weights *w1*, *w2*, *w3* and *w4* respectively. The bias\
    \ value is *b0*. Hence, the nodal sum or the output would be given by the dot\
    \ product of the inputs and weights added to the bias.\n\nIf *z* is the output,\
    \ we have:\n\n$$z = w1 * x1 + w2 * x2 + w3 * x3 + b0$$\n\nThereafter, we subject\
    \ this output to an activation function. Let us choose the ReLU activation function\
    \ which is defined as:\n\n$$ReLU(z) = max(0,z)$$\n\nHence, the final output of\
    \ the node could also be expressed in the following way:\n\n$$output = ReLU(w1*x1\
    \ + w2*x2 + w3*x3 + b0)$$\n\nMathematically, this could also be expressed in the\
    \ manner below:\n\n$$output = ReLU(sum(w1*x1, w2*x2, w3*x3, b0))$$\n\nAs discussed\
    \ earlier, the neural network tries to realize an expected output. The gap between\
    \ the expected output and the predicted output is called the **error** or also\
    \ the **cost function**. Let us define a mean square error in this simple case\
    \ which is given by:\n\n$$Error = \\frac{1}{2}(output(E) - output)^2$$\n\nHere,\
    \ *output(E)* is the expected output.\n\nTo perform backpropagation, we assess\
    \ the impact of a particular parameter on the total error. For this exercise,\
    \ let us try to assess the impact of weight *w1* on the total error. The impact\
    \ of other parameters can be assessed using the same process.\n\nWe know that\
    \ the partial derivative of a function consisting of several variables is its\
    \ derivative with respect to one of the variables keeping all others constant.\
    \ Is this too much jargon? Let us now do it mathematically, to make it easier.\n\
    \nThe impact of weight $w1$ on the error would be given by:\n\n$$\\frac{\\partial\
    \ Error}{\\partial w1}$$\n\nUsing the chain rule, this can be expressed as:\n\n\
    $$\\frac{\\partial Error}{\\partial w1} = \\frac{\\partial Error}{\\partial output}\
    \ * \\frac{\\partial output}{\\partial sum} * \\frac{\\partial sum}{\\partial\
    \ w1}$$\n\nLet us calculate each of these terms separately:\n\n1. $$\\frac{\\\
    partial Error}{\\partial output} = \\frac{\\partial \\frac{1}{2}(output(E)-output)^2}{\\\
    partial output} = (output(E) - output)$$\n2. $$\\frac{\\partial output}{\\partial\
    \ sum} = \\frac{\\partial ReLU(sum)}{\\partial sum} = \\frac{\\partial (sum \\\
    text{ if } sum>0 \\text{ else } 0)}{\\partial sum} = (1 \\text{ if } sum > 0 \\\
    text{ else } 0)$$\n3. $$\\frac{\\partial sum}{\\partial w1} = \\frac{\\partial\
    \ (w1*x1 + w2*x2 + w3*x3 + b0)}{\\partial w1} = x1$$\n\nWe define all these functions\
    \ from the forward pass in Python, as shown below:\n\n```python\ndef ReLU(z):\n\
    \    return np.maximum(0,z)\ndef Sum(lst_inputs,arr_weights,lst_bias):\n    return\
