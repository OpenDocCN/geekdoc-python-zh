  mdcn: "## 反向传播\n\n在本节中，我们将学习一个与神经网络高效训练相关的重要概念，即反向传播。反向传播的作用是通过将误差从输出节点反向传播到输入节点，从而高效地训练神经网络。它通过定义损失函数，并利用梯度下降法计算神经网络中每个权重对损失函数的影响来实现这一点。我们已经在*第9章\
    \ - 智能自动化第一部分：使用机器学习*中学习了机器学习的梯度下降法。在这里，我们将看到反向传播如何同样使用梯度下降法来计算权重和偏置的最优值，以完成神经网络预期的任务。为了执行反向传播所需的数学计算，本节假设读者熟悉微积分的基本概念，如导数、偏导数和链式法则。\n\
    \n我们已经熟悉从神经网络计算节点输出的过程。我们计算权重和输入的点积，然后在最后加上偏置项。这个过程也被称为**前向传播**。对于*图10.2*所示的神经网络，使用权重*w11,\
    \ w12, w13*和输入*x1, x2, x3*，通过前向传播过程计算节点*y1*的输出将是*w11*x1 + w12*x2 + w13*x3 + b1*，其中*b1*是偏置。其他节点的输出将以类似方式计算。\n\
    \n现在，以这种方式计算出的输出将是预测输出。然而，当我们训练神经网络时，我们训练它的目的是产生预期输出。预期输出和预测输出之间差距的度量被称为误差，训练神经网络的目标是优化权重，使它们最小化这个误差。优化这些权重的过程被称为**反向传播**。\n\
    \n由于本书的目的仅仅是展示Python在简化计算方面的重要性，我们不会深入探讨在全连接神经网络背景下反向传播的实际实现；否则计算可能跨越许多页，超出本书的范围。\n\
    \n然而，我们将熟悉在单个感知器背景下反向传播的一般过程，以便读者可以扩展这个想法，将反向传播应用于全连接神经网络。\n\n如上图*图10.3*所示，节点获得四个输入值*x1*、*x2*、*x3*和*x4*，对应的权重分别为*w1*、*w2*、*w3*和*w4*。偏置值为*b0*。因此，节点和或输出将由输入和权重的点积加上偏置给出。\n\
    \n如果*z*是输出，我们有：\n\n$$z = w1 * x1 + w2 * x2 + w3 * x3 + b0$$\n\n然后，我们将这个输出通过一个激活函数。让我们选择ReLU激活函数，其定义为：\n\
    \n$$ReLU(z) = max(0,z)$$\n\n因此，节点的最终输出也可以表示为：\n\n$$output = ReLU(w1*x1 + w2*x2\
    \ + w3*x3 + b0)$$\n\n从数学上讲，这也可以表示为：\n\n$$output = ReLU(sum(w1*x1, w2*x2, w3*x3,\
    \ b0))$$\n\n如前所述，神经网络试图实现预期输出。预期输出和预测输出之间的差距被称为**误差**，也称为**代价函数**。让我们在这个简单的情况下定义一个均方误差，其由下式给出：\n\
    \n$$Error = \\frac{1}{2}(output(E) - output)^2$$\n\n这里，*output(E)*是预期输出。\n\n为了执行反向传播，我们评估特定参数对总误差的影响。在这个练习中，让我们尝试评估权重*w1*对总误差的影响。其他参数的影响可以使用相同的过程进行评估。\n\
    \n我们知道，由多个变量组成的函数的偏导数是它对其中一个变量的导数，同时保持其他变量不变。这术语太多了吗？现在让我们用数学方法来做，使其更容易理解。\n\n\
    权重$w1$对误差的影响由下式给出：\n\n$$\\frac{\\partial Error}{\\partial w1}$$\n\n使用链式法则，这可以表示为：\n\
    \n$$\\frac{\\partial Error}{\\partial w1} = \\frac{\\partial Error}{\\partial\
    \ output} * \\frac{\\partial output}{\\partial sum} * \\frac{\\partial sum}{\\\
    partial w1}$$\n\n让我们分别计算这些项：\n\n1. $$\\frac{\\partial Error}{\\partial output}\
    \ = \\frac{\\partial \\frac{1}{2}(output(E)-output)^2}{\\partial output} = (output(E)\
    \ - output)$$\n2. $$\\frac{\\partial output}{\\partial sum} = \\frac{\\partial\
    \ ReLU(sum)}{\\partial sum} = \\frac{\\partial (sum \\text{ if } sum>0 \\text{\
    \ else } 0)}{\\partial sum} = (1 \\text{ if } sum > 0 \\text{ else } 0)$$\n3.\
    \ $$\\frac{\\partial sum}{\\partial w1} = \\frac{\\partial (w1*x1 + w2*x2 + w3*x3\
    \ + b0)}{\\partial w1} = x1$$\n\n我们在Python中定义所有这些来自前向传播的函数，如下所示：\n\n```python\n\
    def ReLU(z):\n    return np.maximum(0,z)\ndef Sum(lst_inputs,arr_weights,lst_bias):\n\
    \    return np.dot(arr_weights, lst_inputs) + lst_bias\ndef Error(output_E,output):\n\
    \    return (1/2)*(output_E-output) ** 2\n```\n\n类似地，我们在Python中定义所有来自反向传播的函数，如下所示：\n\
    \n```python\ndef dError(output_E,output):\n    return output_E-output\ndef dRELU(z):\n\
    \    return 1. if z > 0 else 0.\ndef dSum_w1(lst_inputs,arr_weights):\n    return\
    \ lst_inputs[0]\n```\n\n接下来，我们初始化输入、权重和偏置集，如下所示：\n\n```python\nlst_inputs = [3,10,9.7,0.95]\n\
    arr_weights = [0.5, 0.3, 0.93, 1.0]\nlst_bias = [0.2]\n```\n\n作为反向传播的一部分，我们还需要定义预期输出以计算误差，以及学习率以执行梯度下降。我们将参数初始化为如下值：\n\
    \n```python\noutput_E = 15.00\nlearning_rate = 0.01\n```\n\n然后我们使用下面的代码执行反向传播：\n\
    \n```python\noutput = ReLU(Sum(lst_inputs,arr_weights,lst_bias))[0]\nError_Value\
    \ = Error(output_E,output)\ndError_value = dError(output_E,output)\ndRELU_value\
    \ = dRELU(Sum(lst_inputs,arr_weights,lst_bias))\ndSum_w1_value = dSum_w1(lst_inputs,arr_weights)\n\
    dError_w1 = dError_value*dRELU_value*dSum_w1_value\n```\n\n最后，我们将使用梯度下降法计算**w1**的新值，如下式所示：\n\
    \n```python\nw1 = arr_weights[0]\nw1_new = w1 - learning_rate*dError_w1\n```\n\
    \n这样获得的**w1_new**值将是我们将在执行下一次前向传播迭代以及随后的反向传播时用于权重**w1**的新值。这些迭代将持续进行，直到我们达到误差不再大幅减少并且权重似乎收敛到某个特定值的点。这里需要注意的是，学习率是执行反向传播的一个重要参数，因为过高或过低的学习率可能无法为参数提供适当的优化值。\n\
    \n完整的代码如下供参考。将代码复制并粘贴到Python编辑器中：\n\n```python\n#反向传播\nimport numpy as np\nimport\
    \ matplotlib.pyplot as plt\n\ndef ReLU(z):\n    return np.maximum(0,z)\n\ndef\
    \ Sum(lst_inputs,arr_weights,lst_bias):\n    return np.dot(arr_weights, lst_inputs)\
    \ + lst_bias\n\ndef Error(output_E,output):\n    return (1/2)*(output_E-output)\
    \ ** 2\n\ndef dError(output_E,output):\n    return output_E-output\n\ndef dRELU(z):\n\
    \    return 1. if z > 0 else 0.\n\ndef dSum_w1(lst_inputs,arr_weights):\n    return\
    \ lst_inputs[0]\n\nlst_inputs = [3,10,9.7,0.95]\narr_weights = [0.5, 0.3, 0.93,\
    \ 1.0]\nlst_bias = [0.2]\n\noutput_E = 15.00\nlearning_rate = 0.01\n\noutput =\
    \ ReLU(Sum(lst_inputs,arr_weights,lst_bias))[0]\nError_Value = Error(output_E,output)\n\
