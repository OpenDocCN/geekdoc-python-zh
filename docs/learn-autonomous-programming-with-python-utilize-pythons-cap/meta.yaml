  md: '# Reinforcement learning


    In earlier sections, we have seen that the two types of machine learning are supervised
    learning where there are labelled data sets provided and then unsupervised learning
    where there are no labelled data sets, and the algorithm has to learn on its own
    from the data by grouping together items with similar attributes. There is another
    mechanism which enables a machine to learn on its own based on the outcome of
    a previous output or in other words from ‘experience’. Reinforcement learning
    systems use algorithms that receive feedback to determine whether the output decision
    was correct, wrong, or neutral. Hence, reinforcement learning is an autonomous
    self-learning mechanism. The *Figure 3.6* below shows the reinforcement learning
    mechanism:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_69_0.png)


    **Figure 3.6:** *Reinforcement learning mechanism*


    As shown in the figure above, the agent sends out an action to the environment.
    The environment then returns that action with a new state. This state captures
    feedback from'
  merge: -1
