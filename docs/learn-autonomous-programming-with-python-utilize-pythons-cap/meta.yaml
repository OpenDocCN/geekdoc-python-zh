    \n接下来，我们将了解如何使用openpyxl来填充我们常用的Excel公式。\n\n## 使用openpyxl处理Excel公式\n\n在本节中，我们将学习如何使用openpyxl库在特定单元格中填充Excel公式，然后我们还将学习如何将公式拖动到相邻单元格。\n\
    \n我们将使用在上一个练习中保存的同一个工作簿 **Student Table.xlsx**。将下面的代码复制到Python编辑器中：\n\n```python\n\
