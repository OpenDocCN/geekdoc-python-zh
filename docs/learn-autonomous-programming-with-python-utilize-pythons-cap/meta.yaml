- md: "## Using third party libraries with PyScript\n\nWe have discussed that one\
    \ of the advantages of the PyScript framework is the ability to use third party\
    \ Python libraries like pandas, numpy and matplotlib in the front end. In this\
    \ exercise, we shall use import the numpy package into our Python code and include\
    \ that code within the **py-script** tag.\n\nPrior to writing the Python code\
    \ within the **py-script** block of the HTML code, we would need to include a\
    \ new block called **py-env** in the HTML code and mention the **numpy** module\
    \ within that block in order to inform the HTML code that the **numpy** library\
    \ is being referenced in the Python code.\n\nBelow is the **py-env** block that\
    \ we would need to include in our HTML code:\n\n```\n<py-env>\n- numpy\n</py-env>\n\
    ```\n\nNext, we shall run the following program in our Python code using the **numpy**\
    \ library:\n\n1. Import **numpy** module into Python.\n2. Create a **numpy** array\
    \ named **matrix_1** with three rows and four columns where each element of the\
    \ matrix is a random number multiplied by 10.\n3. Create a **numpy** array named\
    \ **matrix_2** with three rows and four columns where each element of the matrix\
    \ is a random number multiplied by 10.\n4. Create a **numpy** array named **matrix_sum**\
    \ with three rows and four columns which is basically the result of the sum of\
    \ corresponding elements of **matrix_1** and **matrix_2**.\n\nBelow is the Python\
    \ code that would execute the steps 1 to 4 that we discussed. Paste the code in\
    \ a Python editor so that it could be formatted accordingly for errors and indentation.\n\
    \n```\n#Calculate the sum of two matrices\nimport numpy as np\nmatrix_1 = np.random.rand(3,4)*10\n\
    matrix_2 = np.random.rand(3,4)*10\nmatrix_sum = matrix_1 + matrix_2\nprint('\\\
    nThis is a program to calculate the sum of two matrices having randomly generated\
    \ values:\\n')\nprint('\\nThe first matrix is:\\n')\nprint(matrix_1)\nprint('\\\
    nThe second matrix is:\\n')\nprint(matrix_2)\nprint('\\nThe matrix sum is:\\n')\n\
    print(matrix_sum)\n```\n\n5. Next, we include this Python code within the **py-script**\
    \ block of the HTML code. The complete HTML code has been shown in the next page.\
    \ Paste this code in a text editor and save the file with the name as **Using_Numpy_With_PyScript.html**.\n\
    \n```\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\"\
    >\n    <link rel=\"stylesheet\" href=\"https://pyscript.net/alpha/pyscript.css\"\
    \ />\n    <script defer src=\"https://pyscript.net/alpha/pyscript.js\"></script>\n\
    \    <title> PyScript Tutorial </title>\n    <py-env>\n    - numpy\n    </py-env>\n\
    </head>\n<body>\n<py-script>\n    import numpy as np\n    matrix_1 = np.random.rand(3,4)*10\n\
    \    matrix_2 = np.random.rand(3,4)*10\n    matrix_sum = matrix_1 + matrix_2\n\
    \    print('\\nThis is a program to calculate the sum of two matrices having randomly\
    \ generated values:\\n')\n    print('\\nThe first matrix is:\\n')\n    print(matrix_1)\n\
    \    print('\\nThe second matrix is:\\n')\n    print(matrix_2)\n    print('\\\
    nThe matrix sum is:\\n')\n    print(matrix_sum)\n</py-script>\n</body>\n```\n\n\
    6. On running the HTML file with the code above and opening the results in a Chrome\
    \ browser, we get the results as shown below in *Figure 15.3*:\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_375_0.png)\n\
    \n**Figure 15.3:** Numpy arrays and the result obtained after adding them\n\n\
    Note that the arrays shall look different at every run because the values are\
    \ randomly generated numbers.\n\n## Referencing external Python files in PyScript\n\
    \nUntil now, we have studied how we could include Python code into the **py-script**\
    \ block of the HTML code and observe the results at the front end.\n\nLet us now\
    \ consider a scenario where the Python code may get voluminous, and it might render\
    \ the HTML code too long if we write the entire Python code within the HTML file.\
    \ In such a case, PyScript provides us with a very useful functionality of referencing\
    \ code from an external Python file. Using this functionality, we could store\
    \ most of the Python code in an external Python file which would typically include\
    \ the function definitions. Thereafter, we could import only the functions from\
    \ the Python file and perform our tasks in the **py-script** block of the HTML\
    \ code. An example would make this clear.\n\nAs our focus here would be on understanding\
    \ the concept, we would keep the Python script simple. Let us create a Python\
    \ script that defines two functions **Square** and **Cube** that calculate the\
    \ square and cube respectively of an integer number. Below is the Python code\
    \ which would do that for us. Copy the code in a Python editor and save the Python\
    \ file with the name **Perform_Math.py**:\n\n```\n#Perform Math\n\n#Calculate\
    \ Square\ndef Square(intNum):\n    intSquare = intNum * intNum\n    return intSquare\n\
    \n#Calculate Cube\ndef Cube(intNum):\n    intCube = intNum * intNum * intNum\n\
    \    return intCube\n```\n\nNext, we would want to reference the Python file in\
    \ the **py-script** block and perform the calculations. Below is the code that\
    \ we would include in the **py-script** block:\n\n```\n<py-script>\n    from Perform_Math\
    \ import Square,Cube\n    intNum=5\n    intSquare = Square(intNum)\n    intCube\
    \ = Cube(intNum)\n    print('\\nThe number is:')\n    print(intNum)\n    print('\\\
    nThe square of the number is:')\n    print(intSquare)\n    print('\\nThe cube\
    \ of the number is:')\n    print(intCube)\n</py-script>\n```\n\nWe reference **Perform_Math**\
    \ as a module and import the functions **Square** and **Cube** into the Python\
    \ code to perform calculations and print the results thereafter.\n\nBefore running\
    \ the HTML code, we would need to add another block in the HTML file called **py-config**\
    \ which basically instructs the HTML code to fetch the appropriate Python file.\
    \ For this exercise, we shall be saving the Python file and the HTML file in the\
    \ same folder within the directory.\n\nBelow is the additional block of code corresponding\
    \ to the **py-config** tag that we would need to add to the HTML code.\n\n```\n\
    <py-config>\n[[fetch]]\n    files = [\"./Perform_Math.py\"]\n</py-config>\n```\n\
    \nWe would also require making few more changes in **href** and **src** within\
    \ the HTML code where we specify the PyScript releases. Unlike what we did in\
    \ the previous exercise where we used the **/latest/pyscript.js** release, we\
    \ would be linking to the PyScript static assets in release **2022.12.1** which\
    \ is a later release with which the code seemed to work properly. Below is the\
    \ modified block of the HTML code in which we include the title as well:\n\n```\n\
    <title>Referencing External Python Files</title>\n<link rel=\"stylesheet\" href=\"\
    https://pyscript.net/releases/2022.12.1/pyscript.css\" />\n<script defer src=\"\
    https://pyscript.net/releases/2022.12.1/pyscript.js\"></script>\n```\n\nThe complete\
    \ HTML code has been given below for reference. Copy the code in a text editor\
    \ like notepad and save the file with the name **Perform_Math.html**. As mentioned\
    \ earlier, we would want to make sure that the HTML file is saved in the same\
    \ folder where the Python file is saved.\n\n```\n<!DOCTYPE html>\n<html lang=\"\
    en\">\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Referencing External\
    \ Python Files</title>\n```"
