    Now that we have conceptually understood what machine learning is, let us delve
    deeper to understand the different types of machine learning.


    ## Supervised and unsupervised learning


    Depending on the type of input data, machine learning can be classified into Supervised
    Learning and Unsupervised Learning. Let us try to understand each of these:


    **Supervised learning:** In the example from the previous section, we saw that
    every item in the input data set was accompanied by a corresponding item in the
    output data set. This kind of data set where every input is accompanied by a corresponding
    output is called as a ‘labelled’ data set. Whenever a machine is trained on such
    a labelled data set the type of machine learning is called as ‘supervised learning’
    because the training is guided or supervised by the presence of an output data.
    Typical examples of supervised algorithms are linear regression, logistic regression,
    k nearest neighbors, Naïve Bayes, decision trees, random forests and support vector
    machines. Let us take a quick look at each of them. We shall implement them in
    detail using Python in later chapters. Here, we shall try to understand them.


    - **Linear regression:** This is the process of drawing a straight line that fits
    best to a set of points. Linear Regression is also sometimes conveniently called
    **least squares regression** because the criterion chosen to fit the line is that
    the sum of the squares of the vertical distance of the points from the line should
    be the least. The example in the previous section where we found out by observation
    that y=3x was a classic example of linear regression.


    - **Logistic regression:** Although this algorithm includes the name regression,
    it is a classification algorithm. It is used when wish to predict the output of
    a categorical variable. For example, if we want to know whether the output is
    True or False, 1 or 0, On or Off, Yes or No, we use logistic regression. When
    we have two possible outcomes, it is called binary logistic regression. Logistic
    regression can also extend to Multinomial and Ordinal when we have more than two
    possible outcomes. Logistic regression uses the sigmoid function which basically
    maps any real number data set into a range between 0 and 1. The Figure 3.2 below
    shows the Sigmoid function which is given by the following equation:


    $$y = \frac{1}{1 + e^{-x}}$$


    ![](img/3bdf02f00d53ff55047d1e1759de2882_62_0.png)


    **Figure 3.2:** Sigmoid function


    - **K nearest neighbors:** As the name implies, this is a classification algorithm
    that tries to classify a data point into its nearest class. The data set fed to
    the algorithm would be a labelled data set consisting of points as the input and
    their corresponding classes as the labelled output to which the points respectively
    belong. The aim of this algorithm is to correctly classify the unknown set of
    new input data points into their respective classes based on the **nearest** or
    least distance to the classes. Hence the name **nearest neighbors**. The distance
    measure is usually the Euclidean distance that we use in Cartesian coordinate
    systems. Please refer to the following *Figure 3.5*:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_63_0.png)


    *Figure 3.3: K nearest neighbors*


    - **Naïve Bayes:** This is a classification algorithm based on Bayes Theorem of
    conditional probability which is expressed mathematically as shown below:


    $P(A|B) = \frac{P(B|A) \cdot P(A)}{P(B)}$, where $P(B) > 0$


    This theorem has many applications in situations where we want to take a decision
    on the probability of an event based on the occurrence of another event. As the
    name ‘Naïve’ implies, the algorithm assumes that each of the features resulting
    in the outcome of an event have an equal and independent contribution. The most
    popular application of this algorithm is in classifying an email as **spam** or
    not spam.


    - **Decision tree:** A decision tree algorithm is the process of fitting a decision-making
    thought process to a labelled data set. Similar to the way in which we think,
    a decision tree would start with a root node and bifurcate further into branches
    that would contain decision nodes and leaf nodes. Observe the figure below that
    shows root nodes, decision nodes and leaf nodes of a sample decision tree describing
    the thought process while buying a house. Please refer to the following *Figure
    3.4*:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_64_0.png)


    **Figure 3.4:** Sample decision tree to finalize the decision of buying a house


    - **Random forests:** This is a continuation of decision tree algorithm but what
    we do here is we combine the results of multiple decision trees to come up with
    the result. The limitation with having a single decision tree is that there is
    a possibility of overfitting. Overfitting is the phenomenon where an algorithm
    fits the training data set so rigidly that it does not have the bandwidth to accommodate
    any flexibility to allow itself to fit with equivalent ease on the testing dataset.
    Random forest is an example of an Ensemble Learning algorithm that uses the Bagging
    technique. Ensemble Learning is the technique of improving results by combining
    the results of several models. Bagging is the technique where different samples
    of training data are fed to the algorithm to obtain a different result for each
    sample. In this case, random samples of training data are fed to the algorithm.
    This results in the creation of multiple decision trees that produce multiple
    outputs. The result is decided by a majority vote process. The most frequently
    occurring output is chosen as the result.


    - **Support vector machine:** This is a classification algorithm that creates
    an optimal hyperplane that separates the dataset in the best possible way into
    categories or classes based on differentiable attributes. If the data set is two
    dimensional with two classes, then the hyperplane would be a straight line. The
    algorithm works by choosing the points closest to the line from both classes and
    trying to maximize the distance between the points and the line called as **margin**.
    These points are called as ‘Support Vectors’ hence the name **support vector machine**.


    ![](img/3bdf02f00d53ff55047d1e1759de2882_66_0.png)


    **Figure 3.5:** *Support vector machine*


    **Unsupervised learning:** This is the type of machine learning where the input
    dataset is not labelled into categories. The algorithm has to learn on its own
    from the input. The most popular type of algorithm in this category is clustering.
    K Means clustering is one of the types of clustering algorithms where the algorithm
    clubs the data sets into K different clusters after repetitive iterations. DBSCAN
    is another popular clustering algorithm. Hierarchical clustering is a kind of
    clustering method which is used whenever the clusters are to be ordered in a predetermined
    way.


    ## Popular Python Libraries for ML


    Let us now look at some popular machine learning libraries in Python which we
    shall be using for implementing ML algorithms in later chapters. We shall only
    go through them in this section at a high level to understand their unique significance
    and relative differences. Their actual implementation in Python shall be done
    in later chapters:


    - **Scikit Learn:** This is one of the most popular Python libraries for supervised
    and unsupervised machine learning. This library has a separate class for every
    algorithm and each of those classes has a method called **fit()** that fits the
    algorithm to the dataset.


    - **TensorFlow:** This is an advanced deep learning library used to perform complex
    computations in Mathematics and Physics through a tensor. A tensor is basically
    a multidimensional array with a uniform data type. Although this is a Python library,
    the actual mathematical operations are performed in C++. Python simply directs
    these pieces of code and holds them together. TensorFlow can be used to train
    and run deep neural networks. Recently, TensorFlow has also integrated Keras through
    the **tf.Keras** module.


    - **OpenCV:** This is an open source Python library used for Computer Vision applications
    and image processing. Computer vision is the process by which a computer is made
    to understand images and videos and extract insightful information from them to
    take further decisions. Popular applications of computer vision are face recognition
    applications, autonomous self-driving cars and image generation applications.
    **Optical Character Recognition (OCR)** is another application of OpenCV that
    is used for text detection.


    - **Keras:** This is a high-level neural network library built in Python. It does
    not perform the low-level computations by itself but uses other backend libraries
    like TensorFlow, Theano and CNTK to do them.


    - **Theano:** This is another popular deep learning library that is used to perform
    fast mathematical computations.'
  mdcn: '算法分为多种类别，如回归、分类和聚类，我们将在本章以及后续相关章节中探讨这些内容。

    既然我们已经从概念上理解了什么是机器学习，让我们深入探讨机器学习的不同类型。


    ## 监督学习与无监督学习


    根据输入数据的类型，机器学习可分为监督学习和无监督学习。让我们尝试理解每一种：


    **监督学习：** 在上一节的例子中，我们看到输入数据集中的每个项目都伴随着输出数据集中的相应项目。这种每个输入都带有相应输出的数据集被称为“标记”数据集。当机器在这样的标记数据集上进行训练时，这种机器学习类型被称为“监督学习”，因为训练是由输出数据的存在来引导或监督的。监督算法的典型例子包括线性回归、逻辑回归、k近邻、朴素贝叶斯、决策树、随机森林和支持向量机。让我们快速了解一下每一种。我们将在后面的章节中使用Python详细实现它们。在这里，我们将尝试理解它们。


    - **线性回归：** 这是绘制一条最适合一组点的直线的过程。线性回归有时也方便地称为**最小二乘回归**，因为选择拟合直线的标准是点到直线的垂直距离的平方和应最小。上一节中我们通过观察发现y=3x的例子就是线性回归的一个经典例子。


    - **逻辑回归：** 尽管这个算法名称中包含“回归”，但它实际上是一个分类算法。当我们希望预测一个分类变量的输出时使用它。例如，如果我们想知道输出是真还是假、1还是0、开还是关、是还是否，我们就使用逻辑回归。当我们有两个可能的结果时，它被称为二元逻辑回归。当我们有超过两个可能的结果时，逻辑回归也可以扩展到多项式和有序逻辑回归。逻辑回归使用sigmoid函数，该函数基本上将任何实数数据集映射到0到1之间的范围。下面的图3.2显示了sigmoid函数，其由以下方程给出：


    $$y = \frac{1}{1 + e^{-x}}$$


    ![](img/3bdf02f00d53ff55047d1e1759de2882_62_0.png)


    **图3.2：** Sigmoid函数


    - **K近邻：** 顾名思义，这是一种分类算法，试图将数据点分类到其最近的类别中。输入算法的数据集将是一个标记数据集，包含作为输入的点及其分别所属的相应类别作为标记输出。该算法的目标是根据与类别的**最近**或最小距离，将未知的新输入数据点正确分类到各自的类别中。因此得名**近邻**。距离度量通常是我们笛卡尔坐标系中使用的欧几里得距离。请参考以下*图3.5*：


    ![](img/3bdf02f00d53ff55047d1e1759de2882_63_0.png)


    *图3.3：K近邻*


    - **朴素贝叶斯：** 这是一种基于贝叶斯条件概率定理的分类算法，其数学表达式如下所示：


    $P(A|B) = \frac{P(B|A) \cdot P(A)}{P(B)}$，其中 $P(B) > 0$


    该定理在许多情况下都有应用，当我们想根据一个事件的发生来决定另一个事件的概率时。正如“朴素”一词所暗示的，该算法假设导致事件结果的每个特征都具有相等且独立的贡献。该算法最流行的应用是将电子邮件分类为**垃圾邮件**或非垃圾邮件。


    - **决策树：** 决策树算法是将决策思维过程拟合到标记数据集的过程。与我们思考的方式类似，决策树从一个根节点开始，进一步分叉成包含决策节点和叶节点的分支。观察下图，它显示了一个描述购房决策思维过程的示例决策树的根节点、决策节点和叶节点。请参考以下*图3.4*：


    ![](img/3bdf02f00d53ff55047d1e1759de2882_64_0.png)


    **图3.4：** 用于最终购房决策的示例决策树


    - **随机森林：** 这是决策树算法的延续，但我们在这里做的是结合多个决策树的结果来得出最终结果。单个决策树的局限性在于存在过拟合的可能性。过拟合是指算法过于严格地拟合训练数据集，以至于没有足够的灵活性来同样轻松地拟合测试数据集的现象。随机森林是集成学习算法的一个例子，它使用了Bagging技术。集成学习是通过结合多个模型的结果来改进结果的技术。Bagging是一种技术，其中不同的训练数据样本被输入算法，以获得每个样本的不同结果。在这种情况下，随机的训练数据样本被输入算法。这导致创建多个决策树，产生多个输出。结果由多数投票过程决定。出现频率最高的输出被选为结果。


    - **支持向量机：** 这是一种分类算法，它创建一个最优超平面，根据可区分的属性以最佳方式将数据集分离成类别或类。如果数据集是二维的且有两个类别，那么超平面将是一条直线。该算法通过从两个类别中选择最接近直线的点，并试图最大化这些点与直线之间的距离（称为**间隔**）来工作。这些点被称为“支持向量”，因此得名**支持向量机**。


    ![](img/3bdf02f00d53ff55047d1e1759de2882_66_0.png)


    **图3.5：** *支持向量机*


    **无监督学习：** 这是机器学习的一种类型，其中输入数据集没有被标记为类别。算法必须自己从输入中学习。这类算法中最流行的是聚类。K均值聚类是聚类算法的一种类型，算法在重复迭代后将数据集组合成K个不同的簇。DBSCAN是另一种流行的聚类算法。层次聚类是一种聚类方法，当需要以预定方式对簇进行排序时使用。


    ## 常用的Python机器学习库


    现在让我们看看一些流行的Python机器学习库，我们将在后面的章节中使用它们来实现机器学习算法。在本节中，我们只会在高层次上了解它们，以理解它们的独特意义和相对差异。它们在Python中的实际实现将在后面的章节中进行：


    - **Scikit Learn：** 这是最流行的Python库之一，用于监督和无监督机器学习。该库为每种算法都有一个单独的类，每个类都有一个名为**fit()**的方法，该方法将算法拟合到数据集。


    - **TensorFlow：** 这是一个高级深度学习库，用于通过张量执行数学和物理中的复杂计算。张量基本上是一个具有统一数据类型的多维数组。虽然这是一个Python库，但实际的数学运算是用C++执行的。Python只是指导这些代码片段并将它们组合在一起。TensorFlow可用于训练和运行深度神经网络。最近，TensorFlow还通过**tf.Keras**模块集成了Keras。


    - **OpenCV：** 这是一个开源的Python库，用于计算机视觉应用和图像处理。计算机视觉是使计算机能够理解图像和视频并从中提取有洞察力的信息以做出进一步决策的过程。计算机视觉的流行应用包括人脸识别应用、自动驾驶汽车和图像生成应用。**光学字符识别（OCR）**是OpenCV的另一个应用，用于文本检测。


    - **Keras：** 这是一个用Python构建的高级神经网络库。它本身不执行低级计算，而是使用其他后端库（如TensorFlow、Theano和CNTK）来执行。


    - **Theano：** 这是另一个流行的深度学习库，用于执行快速数学计算。'
