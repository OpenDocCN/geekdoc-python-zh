    # K means clustering


    K means clustering is one of the commonly used unsupervised learning algorithms
    that groups unlabeled points in a dataset into similar clusters. The name **k
    means** is derived from the fact that **k** is an arbitrary number of clusters
    that are chosen at the beginning of the algorithm. Thereafter, we randomly choose
    **k** arbitrary centroids for each of the clusters and associate every point in
    the dataset with its nearest cluster based on the Euclidean distance between the
    point and the cluster centroid. The goal here is to optimize the position of these
    centroids. Next, we take the mean of each of the points in the dataset belonging
    to a particular cluster and then update the cluster center locations to coincide
    with the means. This process is iterated until no further convergence is possible.


    We shall use the same Iris dataset to implement k means clustering in Python so
    that we can assess the accuracy of clustering. To implement the algorithm in Python
    using Scikit-learn, copy, and run the code below in the Python editor:


