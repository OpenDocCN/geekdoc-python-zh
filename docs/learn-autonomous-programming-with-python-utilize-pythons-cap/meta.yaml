    # [Implementing unsupervised learning algorithms using Python](Implementing unsupervised
    learning algorithms using Python)


    Having familiarized ourselves with implementing supervised learning algorithms
    using the Scikit-learn library of Python, we shall now implement unsupervised
    learning algorithms using Scikit-learn. To provide a summary, unsupervised learning
    algorithms are those that are applied to an unlabeled dataset, and they cluster
    together sample elements that are similar in parameters. We shall study k means
    clustering and hierarchical clustering as the unsupervised learning algorithms
    in this section.


    However, prior to implementing them in Scikit-learn, it is important to understand
    few more important theoretical concepts in the context of machine learning modeling.
    These concepts are dimensionality reduction, principal component analysis and
    linear discriminant analysis that we shall study in the sections to follow.


    # [Dimensionality reduction](Dimensionality reduction)


    Dimensionality reduction is an important part of machine learning. A dataset with
    too many features might render the model complex, thus resulting in overfitting,
    where the model might fit too tightly on the training data resulting in a large
    variance on the testing data. Hence, it is essential to reduce the number of features
    or dimensions in a dataset to include only those that are required or may represent
    the entire dataset. This technique of reducing the number of'
  merge: -1
  pgno: 224
- img_proc: true
  md: 'features in a dataset in a way that the essence of the data is still preserved
    is called as dimensionality reduction. There are different ways in which dimensionality
    reduction can be achieved:


    +   - **Feature selection**: In this method, only a subset of features is selected
    from the main sample such that they are most relevant to the problem that is being
    solved.

    - **Feature extraction**: In this method, the original features are transformed
    in such a way that the new features formed are less in number and represent the
    original dataset. **principal component analysis (PCA)** and **linear discriminant
    analysis (LDA)** are the popular methods under this category. In the next sections,
    we shall learn about these methods.


    # Principal component analysis


    Principal component analysis is basically a dimensionality reduction technique
    in which an orthogonal transformation is applied in order to transform the data
    to a new coordinate system. This technique identifies a set of orthogonal axes
    called **principal components** in such way that the first principal component
    captures the maximum variance in the data and the second principal component captures
    the second greatest variance orthogonal to the first component. A lot of matrix
    algebra goes into principal component analysis as we would not go into that detail
    since we would be restricting ourselves with the Python implementation of PCA.
    It is important to note that implementation of PCA depends only on the feature
    set and not the labels. In other words, PCA is an unsupervised learning technique.
    To implement PCA on the Iris dataset, copy and run the code below into the Python
    editor:


    ```

    from sklearn.model_selection import train_test_split

    ```'
