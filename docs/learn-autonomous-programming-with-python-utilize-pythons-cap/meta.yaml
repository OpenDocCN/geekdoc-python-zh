    \ Offers, Tech happenings around the world, New Release and Sessions with the\
    \ Authors:\n\n[https://discord.bpbonline.com](https://discord.bpbonline.com)\n\
    \n![](img/3bdf02f00d53ff55047d1e1759de2882_341_0.png)\n\n# Chapter 14\n## Architecting\
    \ Automation Projects\n\n## Introduction\n\nWhile building an automation project,\
    \ there are several components that one needs to take care of. These components,\
    \ whether it be an accessory, determine the efficient working of the automation\
    \ project. This chapter discusses the various components that are required for\
    \ building the architecture of an automation project in Python. Different accessory\
    \ tools like these add up to the total effectiveness of the automation project,\
    \ which makes it imperative for us to discuss them in this chapter.\n\nThis chapter\
    \ is basically a collection of discrete topics, which might be directly unrelated\
    \ to each other, but collectively turn out to be valuable in the context of the\
    \ overall automation task or project.\n\nThe process of setting up a virtual environment\
    \ has been discussed in this chapter. The pip command, which is the gateway to\
    \ installing any package in Python has been revisited in this chapter in greater\
    \ detail. The various functionalities provided by the pip command have been discussed\
    \ through syntax and examples. Further essentials like docker have also been highlighted\
    \ upon at the end of the chapter.\n\n## Structure\n\nThe chapter covers the following\
    \ topics:\n\n- Introduction to virtual environment\n  - Setting up a virtual environment\n\
    \  - Virtual environment directories\n  - Additional considerations\n- Python\
    \ PIP revisited\n  - Performing basic operations\n  - Working with the requirements.txt\
    \ file\n- Using Docker for containerization\n\n## Objectives\n\nThis chapter is\
    \ basically the outcome of the realization that certain important accessories\
    \ which could not be visited in other chapters need to be jotted down in one place.\
    \ This chapter does a great job of providing a useful appendix for these accessory\
    \ utilities.\n\nBy the end of this chapter, the reader shall have a firm grasp\
    \ on the concepts of a virtual environment, pip command and docker. Many features\
    \ like these have now become a part of regular usage, but most of us remain bereft\
    \ of their theoretical understanding. This chapter shall imbibe that additional\
    \ know-how of these supplementary topics, thus enabling the reader to effectively\
    \ manage and architect future automation projects.\n\nIn this chapter, the reader\
    \ shall thoroughly get acquainted with the process of creating virtual environments\
    \ in Python, using pip to perform various essential tasks, and thereafter using\
    \ the requirements.txt file within the virtual environment.\n\n## Introduction\
    \ to virtual environment\n\nA virtual environment is a tool that provides the\
    \ ability to keep separate dependencies for separate projects. This becomes typically\
    \ important in the case of multiple complex projects of large scale requiring\
    \ several dependencies.\n\nOne might not realize the importance of a virtual environment\
    \ while working on small chunks of code. However, as the number of projects increases\
    \ along with the expanse of each project, a situation arises where we have one\
    \ project that uses a particular version of a specific library and another project\
    \ that uses another version of the same library. The fact is that every project\
    \ would refer to the same directory for third party libraries and that is where\
    \ things get tricky. This is where virtual environments come into picture as a\
    \ useful tool for working on multiple projects in Python that require separate\
    \ dependencies. *Figure 14.1* below illustrates the concept of a virtual environment\
    \ in Python:\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_345_0.png)\n\n**Figure\
    \ 14.1:** *Concept of a Virtual Environment in Python*\n\nWe observe that the\
    \ illustration shows two projects named **Project 1** and **Project 2** which\
    \ require **Python 3.6** and **3.10.10** as their respective Python versions.\
    \ Each of them further requires **Pandas == 1.3** and **Pandas == 2.0.0** as their\
    \ respective Pandas versions. The combination of Python 3.6 with Pandas 1.3 installed\
    \ is incorporated into Virtual Environment 1. Similarly, the other combination\
    \ of Python 3.10.10 with Pandas 2.0.0 installed is incorporated into Virtual Environment\
    \ 2. Each of them separately serves their purpose for Project 1 and Project 2\
    \ respectively.\n\nIn this way, a virtual environment provides a customized arena\
    \ for every project based on its specific dependencies. One could have as many\
    \ virtual environments as may be required.\n\nIt is also obvious that a virtual\
    \ environment proves useful when it comes to sharing project dependencies with\
    \ other members of the team. Consider a scenario where an individual within a\
    \ team has been working on two different projects Project A and Project B that\
    \ requires different third-party Python libraries. Some of these might even overlap\
    \ between the two projects while others might be unique to each project. In the\
    \ absence of a virtual environment, all these libraries shall be stored in the\
    \ same location in the global Python environment. The project then works well\
    \ and becomes a success! That is great, but here comes the problem.\n\nThere are\
    \ other team members now who would require working on Project A and this individual\
    \ has the task of assisting these team members with the list of all dependencies\
    \ associated with only Project A. The difficulty now is that all the dependencies\
    \ are stored in the same global environment and knowing which packages belong\
    \ only to Project A is not easy to segregate. In the presence of a virtual environment,\
    \ this issue would not exist because all the dependencies related to a specific\
    \ project reside within the virtual environment itself, which becomes easy to\
    \ transfer to anyone.\n\nTo summarize, a virtual environment is a folder structure\
    \ which provides one with everything that is required to run an isolated Python\
    \ environment. Now that we have understood the concept of a virtual environment\
    \ and the advantages of having one, we shall move to the next section where we\
    \ set up a virtual environment of our own.\n\n## Setting up a virtual environment\n\
    \nIn this section, we shall go through the process of creating a Python virtual\
    \ environment in Windows.\n\n1. The first step to create a virtual environment\
    \ in Windows is installation of **virtualenv** using the **pip** command. This\
    \ **virtualenv** is a tool used to create isolated Python environments."
