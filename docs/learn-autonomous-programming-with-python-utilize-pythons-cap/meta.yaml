    \ 中。\n\n如 *图 16.17* 所示，下面是计算变量 **answer** 值的代码行。\n\n```\n${answer} = Calculate\
    \ Square ${{int(${intNumber})}}\n```\n\n这里有几个重要的注意事项：\n\n- 变量名的语法基本上是一个 $ 符号，变量名包含在花括号内。\n\
