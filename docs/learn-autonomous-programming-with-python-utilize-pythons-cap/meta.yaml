    dRELU_value = dRELU(Sum(lst_inputs,arr_weights,lst_bias))


    dSum_w1_value = dSum_w1(lst_inputs,arr_weights)


    dError_w1 = dError_value*dRELU_value*dSum_w1_value


    w1 = arr_weights[0]


    w1_new = w1 - learning_rate*dError_w1


    print(w1_new)

    ```


    **Output:**


    **0.49012999999999995**


