- md: "## Chapter 10 Intelligent Automation Part 2: Using Deep Learning\n\n### Introduction\n\
    \nThis chapter provides a background on deep learning and neural networks along\
    \ with an implementation of a neural network in Python. It is important to note\
    \ that the study of deep learning is vast, and it is impossible to discuss every\
    \ single topic within the scope of this book. This chapter intends to inform the\
    \ reader about the role that Python plays in easing the process of deep learning\
    \ computations. The chapter revisits the concept of a neural network, which forms\
    \ the crux of deep learning. The chapter shall also walk the user through the\
    \ step-by-step process of building a neural network in Python. The key concept\
    \ of **backpropagation** shall be covered with an actual example in Python by\
    \ taking the perceptron as a starting point. The chapter continues with the discussion\
    \ of useful applications of deep learning like **natural language processing (NLP)**\
    \ and computer vision also provide a list of popular Python libraries that are\
    \ used in deep learning applications like NLTK, Spacy and OpenCV to name a few.\
    \ The chapter then concludes with the study of a real-world use case in deep learning.\n\
    \n### Structure\n\nThe chapter covers the following topics:\n\n- Implementing\
    \ a neural network in Python\n- Backpropagation\n- Popular Python libraries for\
    \ deep learning\n- Deep learning applications\n- Natural language processing\n\
    - Practical use case in Python\n\n### Objectives\n\nWe have already seen the architecture\
    \ of a neural network in *Chapter 3, Getting Started with AI/ML in Python*, where\
    \ we observed that successive layers of nodes consisting of inputs, weights and\
    \ biases combined with activation functions are iteratively responsible for the\
    \ self-learning mechanism of a neural network. We also went through different\
    \ types of neural networks like convolutional neural network and recurrent neural\
    \ network. Towards the end, we will cover theoretical aspects of various applications\
    \ in deep learning like computer vision, natural language processing and long\
    \ short-term memory. With this background, we shall now plunge deep into the Python\
    \ implementation of a basic neural network and its outputs transformed using activation\
    \ functions. The process of backpropagation has been covered in quite detail in\
    \ the context of a single perceptron. Later, the exciting foray of natural language\
    \ processing shall be touched upon which provides a glimpse of the useful applications\
    \ of deep learning. By the end of this chapter, the reader shall also be comfortable\
    \ in independently exploring and implementing deep learning algorithms.\n\n###\
    \ Implementing a neural network in Python\n\nIf we recall, the basic element of\
    \ a neural network is the perceptron as shown in *Figure 10.1* below:\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_241_0.png)\n\
    \n**Figure 10.1:** *Basic element of a neural network: A perceptron*\n\nWe shall\
    \ begin with the implementation of the perceptron in Python. We know that the\
    \ output of a single perceptron is equal to the dot product of the inputs (x1,x2,x3,x4)\
    \ and its corresponding weights (w1,w2,w3,w4) to which the bias is added at the\
    \ end. Let us first create separate variables for inputs, weights and bias in\
    \ Python as shown below:\n\n**Inputs:**\n\n```\nlst_inputs = [5, 3.7, 1.3, 2.75]\n\
    ```\n\n**Weights:**\n\n```\nlst_weights = [0.8, 0.5, -0.3, 1.0]\n```\n\n**Bias:**\n\
    \n```\ndbl_bias = 3.5\n```\n\nNext, we multiply each element of the inputs with\
    \ the corresponding element of the weights in order to get the dot product and\
    \ then add the bias value as shown below:\n\n```\ndbl_output = (lst_inputs[0]*lst_weights[0]\
    \ +\n              lst_inputs[1]*lst_weights[1] +\n              lst_inputs[2]*lst_weights[2]\
    \ +\n              lst_inputs[3]*lst_weights[3]) + dbl_bias\n\nprint(dbl_output)\n\
    ```\n\n**Output:**\n**11.71**\nOn printing the output, the value obtained is **11.71**.\
    \ In this way, we can implement a perceptron in Python.\n\nIn a similar way, let\
    \ us use Python to implement a basic multi-layer neural network as shown in *Figure\
    \ 10.2* below:\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_242_0.png)\n\n**Figure\
    \ 10.2:** *Basic neural network*\n\nHere, we have three nodes in the input layer.\
    \ In the middle layer, we have four nodes and in the output layer we have two\
    \ nodes. Let us first focus on obtaining the values *y1*, *y2*, *y3* and *y4*\
    \ at the four nodes of the hidden layer. As the hidden layer contains four nodes\
    \ and the input layer contains four nodes, we shall be having four lists of three\
    \ elements each as the weights. As the hidden layer contains four nodes, we shall\
    \ have a single list of four elements as the list that represents the bias values.\
    \ The code below represents these entities as variables:\n\n```\nlst_inputs =\
    \ [3, 10, 9.7]\n\nlst_weights_1 = [0.5, 0.9, 0.35]\nlst_weights_2 = [0.1, 0.3,\
    \ 0.93]\nlst_weights_3 = [0.91, 0.72, 0.1]\nlst_weights_4 = [1.0, 0.31, 0.75]\n\
    \nlst_bias = [0.2, 0.95, 1.0, 4.0]\n```\n\nNext, we calculate the values at each\
    \ output using the same operation that we perform for individual perceptrons using\
    \ the code below:\n\n```\ny1 = lst_inputs[0]*lst_weights_1[0]+\n    lst_inputs[1]*lst_weights_1[1]+\n\
    \    lst_inputs[2]*lst_weights_1[2] + lst_bias[0]\n\ny2 = lst_inputs[0]*lst_weights_2[0]+\n\
    \    lst_inputs[1]*lst_weights_2[1]+\n    lst_inputs[2]*lst_weights_2[2] + lst_bias[1]\n\
    \ny3 = lst_inputs[0]*lst_weights_3[0]+\n    lst_inputs[1]*lst_weights_3[1]+\n\
    \    lst_inputs[2]*lst_weights_3[2] + lst_bias[2]\n\ny4 = lst_inputs[0]*lst_weights_4[0]+\n\
    \    lst_inputs[1]*lst_weights_4[1]+\n    lst_inputs[2]*lst_weights_4[2] + lst_bias[3]\n\
    \nprint('y1 = ' + str(y1))\nprint('y2 = ' + str(y2))\nprint('y3 = ' + str(y3))\n\
    print('y4 = ' + str(y4))\n```\n\n**Output:**\n\ny1 = 14.094999999999999\ny2 =\
    \ 13.270999999999997\ny3 = 11.9\ny4 = 17.375\n\nIn this way, we obtain the nodal\
    \ outputs for **y1**, **y2**, **y3** and **y4** which would thereafter be the\
    \ inputs for the output layer that shall be computed in a similar way.\n\nAlthough,\
    \ we successfully captured the outputs in the most classical way, the process\
    \ becomes tedious as the number of layers and nodes in each layer goes on increasing.\
    \ In this case, we need to be in search of a faster way of populating the outputs\
    \ using Python itself. Fortunately, we do have one! It is the power of **numpy**\
    \ arrays!\n\nLet us see how it is done!\n\nCopy and run the code below into the\
    \ Python editor:\n\n```\nimport numpy as np\n\nlst_inputs = [3, 10, 9.7]\n\narr_weights\
    \ = [[0.5, 0.9, 0.35],\n               [0.1, 0.3, 0.93],\n               [0.91,\
    \ 0.72, 0.1],\n               [1.0, 0.31, 0.75]]\n\nlst_bias = [0.2, 0.95, 1.0,\
    \ 4.0]\n\nhidden_layer_output = np.dot(arr_weights, lst_inputs) + lst_bias\n\n\
    print(hidden_layer_output)\n```\n\n**Output:**\n**[14.095, 13.271, 11.9, 17.375]**\n\
    \nWe observe that in this case, the output is a list, and all the values match\
    \ the ones that we had individually obtained in the earlier exercise. Essentially,\
    \ what we have done here is create a single variable for weights and initialize\
    \ it to be a list of four lists, each of which contains three elements corresponding\
    \ to the weights. Thereafter, we use **np.dot** to obtain the dot product of the\
    \ inputs and weights and then we add the biases to this product. Is it not simple\
    \ to do?\n\nNow that we have successfully been able to implement the output of\
    \ a hidden layer in an artificial neural network, let us move to the next step\
    \ that we had discussed in *Chapter 3, Getting Started with AI/ML in Python*,\
    \ which deals with processing the output with an activation function. The most\
    \ common activation function is a **rectified linear unit (ReLU)** function that\
    \ returns the same input if the input is positive, else it returns a value of\
    \ zero. Mathematically, it can be expressed as below:\n\n### ReLU\n\n$f(X) = max(0,X)$\n\
    \nNow, let us implement this activation function using Python. We just observed\
    \ that the output obtained for the four nodes of the hidden layer is **[14.095,\
    \ 13.271, 11.9, 17.375]**. For the node **y1**, the output is **14.095**. This\
    \ is just one value of output that is obtained for a particular combination of\
    \ inputs and weights. However, several different values of the output could be\
    \ obtained for various combinations of inputs and weights. Let us assume a list\
    \ of arbitrary values of outputs where **14.095** would also be one of them and\
    \ apply the ReLU function to check the final output. Copy and run the code below\
    \ in the Python editor:\n\n```\nimport numpy as np\n\nlst_Output = [0.5, -3.7,\
    \ 14.095, 10.5, -2.8, -15, 0, 0.135]\nlst_Activated_Output = np.maximum(0,lst_Output)\n\
    \nprint(lst_Activated_Output)\n```\n\n**Output:**\n**[ 0.5 0. 14.095 10.5 0. 0.\
    \ 0. 0.135]**\n\nWe observe that all the values less than zero have been converted\
    \ to zero by ReLU."
  mdcn: "## 第10章 智能自动化 第二部分：使用深度学习\n\n### 引言\n\n本章提供深度学习和神经网络的背景知识，并介绍如何在Python中实现神经网络。需要指出的是，深度学习的研究领域非常广阔，本书无法涵盖所有主题。本章旨在向读者介绍Python在简化深度学习计算过程中的作用。本章将回顾神经网络的概念，这是深度学习的核心。同时，本章将引导用户逐步了解如何在Python中构建神经网络。**反向传播**的核心概念将通过一个以感知机为起点的Python实际示例进行讲解。本章将继续讨论深度学习的有用应用，如**自然语言处理（NLP）**和计算机视觉，并列出一些用于深度学习应用的流行Python库，例如NLTK、Spacy和OpenCV等。最后，本章将以一个深度学习的实际用例研究作为结束。\n\
    \n### 结构\n\n本章涵盖以下主题：\n\n- 在Python中实现神经网络\n- 反向传播\n- 用于深度学习的流行Python库\n- 深度学习应用\n\
    - 自然语言处理\n- Python中的实际用例\n\n### 目标\n\n我们已经在*第3章，Python AI/ML入门*中了解了神经网络的架构，其中我们观察到由输入、权重和偏置组成的连续节点层，结合激活函数，共同负责神经网络的自学习机制。我们还介绍了不同类型的神经网络，如卷积神经网络和循环神经网络。最后，我们将涵盖深度学习各种应用的理论方面，如计算机视觉、自然语言处理和长短期记忆。有了这些背景知识，我们现在将深入探讨基本神经网络的Python实现及其使用激活函数转换的输出。反向传播的过程已在单个感知机的背景下进行了详细阐述。随后，我们将触及令人兴奋的自然语言处理领域，以一窥深度学习的有用应用。在本章结束时，读者应能舒适地独立探索和实现深度学习算法。\n\
    \n### 在Python中实现神经网络\n\n回想一下，神经网络的基本元素是感知机，如下图*图10.1*所示：\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_241_0.png)\n\
    \n**图10.1：** *神经网络的基本元素：一个感知机*\n\n我们将从在Python中实现感知机开始。我们知道，单个感知机的输出等于输入（x1,x2,x3,x4）与其对应权重（w1,w2,w3,w4）的点积，最后加上偏置。让我们首先在Python中为输入、权重和偏置创建单独的变量，如下所示：\n\
    \n**输入：**\n\n```\nlst_inputs = [5, 3.7, 1.3, 2.75]\n```\n\n**权重：**\n\n```\nlst_weights\
    \ = [0.8, 0.5, -0.3, 1.0]\n```\n\n**偏置：**\n\n```\ndbl_bias = 3.5\n```\n\n接下来，我们将输入的每个元素与权重的对应元素相乘以获得点积，然后加上偏置值，如下所示：\n\
    \n```\ndbl_output = (lst_inputs[0]*lst_weights[0] +\n              lst_inputs[1]*lst_weights[1]\
    \ +\n              lst_inputs[2]*lst_weights[2] +\n              lst_inputs[3]*lst_weights[3])\
    \ + dbl_bias\n\nprint(dbl_output)\n```\n\n**输出：**\n**11.71**\n打印输出时，得到的值是**11.71**。通过这种方式，我们可以在Python中实现一个感知机。\n\
    \n类似地，让我们使用Python来实现一个基本的多层神经网络，如下图*图10.2*所示：\n\n![](img/3bdf02f00d53ff55047d1e1759de2882_242_0.png)\n\
    \n**图10.2：** *基本神经网络*\n\n这里，输入层有三个节点。中间层有四个节点，输出层有两个节点。让我们首先关注获取隐藏层四个节点上的值*y1*、*y2*、*y3*和*y4*。由于隐藏层包含四个节点，输入层包含四个节点，我们将有四个列表，每个列表包含三个元素作为权重。由于隐藏层包含四个节点，我们将有一个包含四个元素的列表作为表示偏置值的列表。下面的代码将这些实体表示为变量：\n\
    \n```\nlst_inputs = [3, 10, 9.7]\n\nlst_weights_1 = [0.5, 0.9, 0.35]\nlst_weights_2\
    \ = [0.1, 0.3, 0.93]\nlst_weights_3 = [0.91, 0.72, 0.1]\nlst_weights_4 = [1.0,\
    \ 0.31, 0.75]\n\nlst_bias = [0.2, 0.95, 1.0, 4.0]\n```\n\n接下来，我们使用与处理单个感知机相同的操作，使用下面的代码计算每个输出的值：\n\
    \n```\ny1 = lst_inputs[0]*lst_weights_1[0]+\n    lst_inputs[1]*lst_weights_1[1]+\n\
    \    lst_inputs[2]*lst_weights_1[2] + lst_bias[0]\n\ny2 = lst_inputs[0]*lst_weights_2[0]+\n\
    \    lst_inputs[1]*lst_weights_2[1]+\n    lst_inputs[2]*lst_weights_2[2] + lst_bias[1]\n\
    \ny3 = lst_inputs[0]*lst_weights_3[0]+\n    lst_inputs[1]*lst_weights_3[1]+\n\
    \    lst_inputs[2]*lst_weights_3[2] + lst_bias[2]\n\ny4 = lst_inputs[0]*lst_weights_4[0]+\n\
    \    lst_inputs[1]*lst_weights_4[1]+\n    lst_inputs[2]*lst_weights_4[2] + lst_bias[3]\n\
    \nprint('y1 = ' + str(y1))\nprint('y2 = ' + str(y2))\nprint('y3 = ' + str(y3))\n\
    print('y4 = ' + str(y4))\n```\n\n**输出：**\n\ny1 = 14.094999999999999\ny2 = 13.270999999999997\n\
    y3 = 11.9\ny4 = 17.375\n\n通过这种方式，我们获得了**y1**、**y2**、**y3**和**y4**的节点输出，这些输出随后将作为输出层的输入，并以类似的方式进行计算。\n\
    \n尽管我们以最经典的方式成功捕获了输出，但随着层数和每层节点数的增加，这个过程会变得繁琐。在这种情况下，我们需要寻找一种使用Python本身更快地填充输出的方法。幸运的是，我们确实有一种方法！那就是**numpy**数组的力量！\n\
    \n让我们看看它是如何完成的！\n\n将下面的代码复制并粘贴到Python编辑器中运行：\n\n```\nimport numpy as np\n\nlst_inputs\
    \ = [3, 10, 9.7]\n\narr_weights = [[0.5, 0.9, 0.35],\n               [0.1, 0.3,\
    \ 0.93],\n               [0.91, 0.72, 0.1],\n               [1.0, 0.31, 0.75]]\n\
    \nlst_bias = [0.2, 0.95, 1.0, 4.0]\n\nhidden_layer_output = np.dot(arr_weights,\
    \ lst_inputs) + lst_bias\n\nprint(hidden_layer_output)\n```\n\n**输出：**\n**[14.095,\
    \ 13.271, 11.9, 17.375]**\n\n我们观察到，在这种情况下，输出是一个列表，并且所有值都与我们之前单独获得的值相匹配。本质上，我们在这里做的是为权重创建一个单一变量，并将其初始化为一个包含四个列表的列表，每个列表包含三个对应于权重的元素。然后，我们使用**np.dot**获取输入和权重的点积，然后将偏置加到这个乘积上。这样做不是很简单吗？\n\
    \n既然我们已经成功实现了人工神经网络中隐藏层的输出，让我们转向*第3章，Python AI/ML入门*中讨论的下一步，即使用激活函数处理输出。最常见的激活函数是**修正线性单元（ReLU）**函数，如果输入为正，则返回相同的输入，否则返回零值。数学上，它可以表示如下：\n\
    \n### ReLU\n\n$f(X) = max(0,X)$\n\n现在，让我们使用Python实现这个激活函数。我们刚刚观察到隐藏层四个节点的输出是**[14.095,\
    \ 13.271, 11.9, 17.375]**。对于节点**y1**，输出是**14.095**。这只是针对特定输入和权重组合获得的一个输出值。然而，对于不同的输入和权重组合，可以获得多个不同的输出值。让我们假设一个任意输出值的列表，其中**14.095**也是其中之一，并应用ReLU函数来检查最终输出。在Python编辑器中复制并运行以下代码：\n\
    \n```\nimport numpy as np\n\nlst_Output = [0.5, -3.7, 14.095, 10.5, -2.8, -15,\
    \ 0, 0.135]\nlst_Activated_Output = np.maximum(0,lst_Output)\n\nprint(lst_Activated_Output)\n\
    ```\n\n**输出：**\n**[ 0.5 0. 14.095 10.5 0. 0. 0. 0.135]**\n\n我们观察到，所有小于零的值都被ReLU转换为零。"
