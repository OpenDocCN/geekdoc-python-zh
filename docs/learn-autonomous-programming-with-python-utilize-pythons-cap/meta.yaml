  md: 'The first thing that comes to our notice is that the table that is populated
    at the bottom is bereft of column lines that separate the columns. Hence, it becomes
    difficult to read the table.


    The second observation we can make is that although the output provides us with
    the extracted text, there are challenges that will arise when it is directly used.
    We see that in the first sentence **Below i s a table..** the word **is** has
    been populated erroneously by inserting a space between **i** and **s**. This
    might occasionally happen because the text in a PDF document is not like a stream
    of text that we have in a word document. All that a PDF document knows is that
    it has a set of characters that need to be placed at positions relative to each
    other. This relative positioning of characters might sometimes make it difficult
    for the parser to figure out whether two characters constitute the same word or
    whether they should be separated by space. Each character in a PDF document is
    enclosed by a bounding box. The position of this bounding box is determined by
    an X and Y co-ordinate each for the lower left and upper right points. Sometimes,
    the bounding boxes of two adjacent characters might have a greater separation
    than is generally expected between adjacent characters. That might create difficulty
    for the parser to identify that the adjacent characters belong to the same word.


    Whatever might be the challenges here, we need to find some ways to address them.
    In such cases, we need to use alternative Python libraries to get our job done.


    In order to address the first challenge, we could use a library called **tabula**
    that is specially meant for extracting tables. Copy the code below into the Python
    editor:


    ```

    from tabula import read_pdf

