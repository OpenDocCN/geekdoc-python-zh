    \n```\npip install scikit-learn\n```\n\nScikit-learn库的标志是**fit()**方法。Scikit-learn库中的每个机器学习算法都有自己的类，每个这样的类都有一个名为**fit()**的方法。该方法以数组形式的训练数据作为参数，并将模型拟合到训练数据。在监督学习的情况下，训练数据数组还将附带其对应的标签数组，这将使两个数组作为参数。在无监督学习的情况下，训练数据集将由单个输入数组作为参数组成，因为这里的数据是无标签的。\n\
