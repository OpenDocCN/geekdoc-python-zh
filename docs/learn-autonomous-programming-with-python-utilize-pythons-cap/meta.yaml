    # Introduction to virtual environment


    A virtual environment is a tool that provides the ability to keep separate dependencies
    for separate projects. This becomes typically important in the case of multiple
    complex projects of large scale requiring several dependencies.

    One might not realize the importance of a virtual environment while working on
    small chunks of code. However, as the number of projects increases along with
    the expanse of each project, a situation arises where we have one project that
    uses a particular version of a specific library and another project that uses
    another version of the same library. The fact is that every project would refer
    to the same directory for third party libraries and that is where things get tricky.
    This is where virtual environments come into picture as a useful tool for working
    on multiple projects in Python that require separate dependencies. *Figure 14.1*
    below illustrates the concept of a virtual environment in Python:'
  - '[PAGE 345]


    ![](img/3bdf02f00d53ff55047d1e1759de2882_345_0.png)


    **Figure 14.1:** *Concept of a Virtual Environment in Python*


    We observe that the illustration shows two projects named **Project 1** and **Project
    2** which require **Python 3.6** and **3.10.10** as their respective Python versions.
    Each of them further requires **Pandas == 1.3** and **Pandas == 2.0.0** as their
    respective Pandas versions. The combination of Python 3.6 with Pandas 1.3 installed
    is incorporated into Virtual Environment 1. Similarly, the other combination of
    Python 3.10.10 with Pandas 2.0.0 installed is incorporated into Virtual Environment
    2. Each of them separately serves their purpose for Project 1 and Project 2 respectively.


    In this way, a virtual environment provides a customized arena for every project
    based on its specific dependencies. One could have as many virtual environments
    as may be required.


    It is also obvious that a virtual environment proves useful when it comes to sharing
    project dependencies with other members of the team. Consider a scenario where
    an individual within a team has been working on two different'
  - '[PAGE 346]


    projects Project A and Project B that requires different third-party Python libraries.
    Some of these might even overlap between the two projects while others might be
    unique to each project. In the absence of a virtual environment, all these libraries
    shall be stored in the same location in the global Python environment. The project
    then works well and becomes a success! That is great, but here comes the problem.


    There are other team members now who would require working on Project A and this
    individual has the task of assisting these team members with the list of all dependencies
    associated with only Project A. The difficulty now is that all the dependencies
    are stored in the same global environment and knowing which packages belong only
    to Project A is not easy to segregate. In the presence of a virtual environment,
    this issue would not exist because all the dependencies related to a specific
    project reside within the virtual environment itself, which becomes easy to transfer
    to anyone.


    To summarize, a virtual environment is a folder structure which provides one with
    everything that is required to run an isolated Python environment. Now that we
    have understood the concept of a virtual environment and the advantages of having
    one, we shall move to the next section where we set up a virtual environment of
    our own.


