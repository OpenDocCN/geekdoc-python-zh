    \ **pip** 命令执行的最常见任务。此任务的语法如下：\n\n  ```\n  pip install package\n  ```\n\n  此处，**package**\
    \ 是我们想要安装的包的占位符。\n\n如前所述，为 **pip** 指定版本是安装包的一种更精确的方式，其语法如下：\n\n```\npython -m\
