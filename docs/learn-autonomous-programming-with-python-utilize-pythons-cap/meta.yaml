    \ (GUI)** for navigating features.\n    - Various types of recording functionalities.\n\
    \    - Standard templates to choose from with drag and drop feature.\n\nThe *Figure*\
    \ 2.2 below shows the interface of the **Development Studio** in UiPath:"
