    When we manually work with Excel spreadsheets, we simply copy a cell and paste
    it to another cell, so the formula gets automatically updated in that cell. However,
    we would need a different work around when we perform this exercise through code
    using openpyxl. Fortunately, openpyxl provides a module called Translator that
