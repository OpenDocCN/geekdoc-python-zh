    **Figure 3.12:** Recurrent Neural Network


    +   - **Long Short-Term Memory:** Long Short Term Memory (LSTM) is a special type
    of **Recurrent Neural Network (RNN)** that addresses the problem of long term
    dependencies associated with a traditional RNN. Traditional RNNs can make predictions
    from recent information more rapidly than information stored in long term memory.
    Hence, traditional RNN cannot give efficient performance on information that has
    been stored in long term memory. LSTM network contains a memory cell that can
    handle information for extended periods of time, thus making it suitable for speech
    recognition and language translation tasks.


