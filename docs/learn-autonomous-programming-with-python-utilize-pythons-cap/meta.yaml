    \ in web automation using **selenium**. Let us now proceed with the next section!\n\
    \n## Pytest library\n\nPytest is an open-source Python framework used for unit\
    \ testing, which is basically the process of performing automated testing to validate\
    \ that a single component of a software works as intended. While many other Python\
    \ frameworks like **unittest** and **doctest** are used for this purpose, the\
    \ advantage of Pytest is that it has a large community to support its open-source\
    \ development. Hence, we would discuss the Pytest framework in this chapter. In\
    \ this section, we would explore some sample examples that would illustrate the\
    \ efficient usage and implementation of Pytest in unit testing.\n\nThe first step\
    \ that needs to be performed prior to using the library is its installation using\
    \ the **pip** command as shown below:\n\n```\npip install pytest\n```\n\nOnce\
    \ the library is installed, we would move ahead with writing some piece of code.\
    \ In this section, we shall take a simple example of a test that checks whether\
    \ a number equals a certain target number.\n\nLet us create a simple function\
    \ that calculates the square of a number. Below is the Python code for the function.\n\
    \n```\ndef Square(intNum):\n    intSquare = intNum*intNum\n    return intSquare\n\
    ```\n\nCopy the code above in a Python editor and save the file by the name **Calculate_Square.py**.\n\
    \nNext, we create another Python file within the same directory. In this new file,\
    \ we would be importing this file as a module and using the **Square** function.\n\
    \nCopy the code below in a new file within the Python editor.\n\n```\n#Perform\
    \ test\nfrom Calculate_Square import Square\n\ndef test_Square():\n    intNum\
    \ = 10\n    intSquare = Square(intNum)\n    assert intSquare == 100\n```\n\nNow\
    \ comes the important part. While saving the file, we should name the Python file\
    \ in such a way that the name should start with **test_** or end with **_test**.\
    \ The way Pytest works is that it checks for the Python file in the particular\
    \ directory that starts with **test_** or ends with **_test**. Let us save this\
    \ file with the name **Square_test.py**.\n\nBelow is a quick explanation of the\
    \ code in the file **Square_test.py**.\n\n1.  First, we import the file **Calculate_Square**\
    \ as a module and import the **Square** function from the module using the code\
    \ below:\n\n    ```python\n    from Calculate_Square import Square\n    ```\n\n\
    2.  Next, we define a function named **test_Square** that checks whether the square\
    \ of a number being calculated using the imported **Square** function equals 100.\
    \ Note that Pytest requires the function name to be prepended with **test_**.\n\
    \n    Here, define a variable **intNum** and initialize it to an integer value\
    \ of **10** using the code below:\n\n    ```python\n    intNum = 10\n    ```\n\
    \n    Next, we pass **intNum** as an argument to the function **Square** to calculate\
    \ the square of the value held in variable **intNum** and assign the result thus\
    \ obtained to another variable named **intSquare**.\n\n    Finally, we use the\
