    **Figure 7.1:** *Table from PDF exported to Excel document using tabula Python
    module*


    To address the second challenge as well, we shall use a different library. Python
    provides a library called **textract** which is a generic text reader library
    that enables text reading from different types of documents having extensions
    **.docx**, **.xlsx**, **.pdf**. Copy the code below into the Python editor and
