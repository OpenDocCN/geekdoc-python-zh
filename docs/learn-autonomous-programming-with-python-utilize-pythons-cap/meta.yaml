    the new output when a new input is provided to it. How is this related to artificial
    intelligence? To put it simply, artificial intelligence is the objective that
    we are trying to realize, and Machine Learning is the means through which we realize
    that objective. AI is the noun and **Machine Learning (ML)** is the verb.


