- md: "## 16.16 Scalar Variable window\n\nWe enter the variable name as **intNumber**\
    \ and its value as shown in the image above.\n\n4. Next, we click on the tab **Text\
    \ Edit** which opens the editor window as shown in *Figure 16.17* below:\n\n**Figure\
    \ 16.17:** Text Edit tab in the test case\n\n5. We observe that the imported module\
    \ **Calculate_Perfect_Square.py** has been included under the **Settings** section\
    \ and the variable **intNumber = 10** has been mentioned under the **Variables**\
    \ section.\n\n6. Next, we write the actual test under a new section that we name\
    \ as **Test Cases**. We label the test as **Validation of Output** which is reflected\
    \ on the left-hand side pane under **First Test Case**. We call the function **Calculate_Square**\
    \ from the module **Calculate_Perfect_Square** and pass the variable **intNumber**\
    \ as an argument. The result thus obtained is stored in the variable **answer**.\n\
    \nAs shown in *Figure 16.17*, below is the line of code that calculates the value\
    \ in the variable **answer**.\n\n```\n${answer} = Calculate Square ${{int(${intNumber})}}\n\
    ```\n\nThere are few important things to note here:\n\n- The syntax for the variable\
    \ names is basically a $ sign with the variable name included within curly brackets.\n\
    - While calling the **Calculate_Square** function, the underscore between the\
    \ words **Calculate** and **Square** is not included.\n- In order to convert the\
    \ Scalar Variable **intNumber** to an integer, it is transformed using the **int**\
    \ keyword and thereafter converted to a variable using the $ sign again. This\
    \ is then passed as an argument to the function **Calculate_Square**.\n- There\
    \ needs to be sufficient space of at least 3 to 4 characters between each of the\
    \ terms in the line of code above, else the IDE fails to identify the terms resulting\
    \ in errors.\n\n7. Finally, we write the actual test which is the line that would\
    \ perform the validation using the line of code below.\n\n```\nShould Be Equal\
    \ As Numbers ${answer} 100\n```\n\nWe use the **Should Be Equal As Numbers** method\
    \ of the Robot Framework, which would take two arguments and basically validate\
