    ## 第四章：自动化网页抓取


    - 本章向读者介绍使用 Python 库 ‘requests’ 和 ‘beautiful soup’ 从网络中提取数据的过程。数据是所有应用的核心组成部分，本章提供了一种利用网络访问数据的实用方法。


    ## 第五章：自动化 Excel 和电子表格


    - 本章重新审视了 Excel 自动化领域，重点介绍了 Python 在加速该过程中所扮演的核心角色。将分别讨论 ‘openpyxl’、‘xlwings’
    和 ‘xlsxWriter’ 这些库，随后是一个 Python 实际用例，该用例将展示将它们组合使用的美妙之处。


    ## 第六章：自动化电子邮件和消息传递


    - 本章进入了电子邮件和社交媒体消息传递的领域，展示了 Python 库通过 Gmail 和 Whatsapp 发送快速消息的能力。


    ## 第七章：处理 PDF 和图像


    - 本章通过展示从 PDF 文档中读取数据的能力，扩展了 Python 的功能。本章进一步讨论了光学字符识别（OCR）的概念，并说明了 ‘pytesseract’
    和 ‘OpenCV’ 如何通过从图像中读取数据来实现这一目标。


    ## 第八章：机械化应用程序、文件夹和操作


    - 本章介绍了 Python 中的 ‘os’ 和 ‘shutil’ 模块，这些模块使得自动化读取、写入和移动文件及文件夹的过程成为可能，随后介绍了用于自动化计算机鼠标操作的
    ‘PyAutoGUI’ 和 ‘PyWinAuto’ 库。


    ## 第九章：智能自动化第一部分：使用机器学习


    - 本章通过深入探讨各种机器学习算法，并展示使用 Python 库进行平滑实现，将概念整合到机器学习中。本章涵盖了监督学习和无监督学习方法，并以一个 Python
    实际用例结束，该用例使用户熟悉独立构建机器学习 Python 应用程序的过程。


    ## 第十章：智能自动化第二部分：使用深度学习


    - 本章重新审视了神经网络的概念，并从零开始在 Python 中实现了一个基本的神经网络。使用感知器阐述了反向传播的概念。随后讨论了 ‘TensorFlow’
    和 ‘PyTorch’ 库，接着讨论了自然语言处理（NLP）。一个有趣的 Python 实际用例为本章画上了句号。


    ## 第十一章：自动化业务流程工作流


    - 本章首先介绍了编排的概念，这基本上是工作流自动化，也可以被视为自动化的自动化。随后将讨论 ‘luigi’ 和 ‘prefect’ 模块，这些模块使得实现编排成为可能。


    ## 第十二章：超级自动化


    - 本章讨论了超级自动化这一新概念，它基本上是将机器学习、RPA 和其他 AI 工具与常规自动化相结合的应用。本章将从不同的角度重新审视 NLP 和 RPA
    主题。


    ## 第十三章：Python 和 UiPath


    - 本章基于 RPA 工具 UiPath 的基本概念，阐述了 Python 在增强其能力方面所扮演的重要角色。本章将详细介绍实现 UiPath 与 Python
    集成所需的设置和环境。


    ## 第十四章：构建自动化项目架构


    - 本章概述了在构建自动化项目架构时需要处理的各种组件。本章详细讨论了虚拟环境和 ‘pip’ 命令的概念。


    ## 第十五章：PyScript 框架


    - 本章向读者介绍了一个名为 ‘PyScript’ 框架的 Python 进行中的项目，该框架本质上通过允许在 HTML 脚本中嵌入 Python 代码来增强其潜力。本章对于具有
    Javascript 背景的开发者来说将是令人兴奋的，并将为他们提供一种从不同角度进行实验的功能。


    ## 第十六章：Python 中的测试自动化


    - 本章通过讨论通常也出现在开发周期末尾的主题——测试，为本书画上了句号。本章详细阐述了 ‘Selenium’、‘PyTest’ 和 Robot Framework，这些工具能够实现测试过程的平滑自动化。


