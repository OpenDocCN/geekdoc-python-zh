    in the variable **answer**.


    ```

    ${answer} = Calculate Square ${{int(${intNumber})}}

    ```


    There are few important things to note here:


    +   - The syntax for the variable names is basically a $ sign with the variable
    name included within curly brackets.

    - While calling the **Calculate_Square** function, the underscore between the
    words **Calculate** and **Square** is not included.

    - In order to convert the Scalar Variable **intNumber** to an integer, it is transformed
    using the **int** keyword and thereafter converted to a variable using the $ sign
    again. This is then passed as an argument to the function **Calculate_Square**.

    - There needs to be sufficient space of at least 3 to 4 characters between each
    of the terms in the line of code above, else the IDE fails to identify the terms
    resulting in errors.


    7. Finally, we write the actual test which is the line that would perform the
    validation using the line of code below.


    ```

    Should Be Equal As Numbers ${answer} 100

    ```


