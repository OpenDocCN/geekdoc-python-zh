    ## Working with OpenCV


    **Open-Source Computer Vision (OpenCV)** is a Python package that is popularly
    used for computer vision applications. Computer vision is a technology that enables
    computers to understand the content in images and videos thereby helping them
    to identify and classify objects contained in the images and videos. Contemporary
    technologies like Face Recognition and Autonomous Self Driving Cars are the result
    of salient developments in the field of computer vision. In this section, we shall
    understand some basic concepts in computer vision and then take a walk through
    few Python examples in OpenCV.


    Let us first try to understand how a computer understands images. The smallest
    unit of an image is a pixel. Images are basically of two kinds as discussed below:


    - **Grayscale**: These images contain only two colors black and white where the
    pixel value is assigned based on the level of darkness.

    - **RGB**: These are colored images where each pixel in the image is a combination
    of Red Green and Blue.


    We have already seen an example of an RGB and a grayscale image in the previous
    exercise where we converted an RGB color image into grayscale before passing it
    to tesseract. In order to start using OpenCV library, the first step is to install
    it using the following command:


    ```

    pip install opencv-python

    ```


    We shall now use OpenCV to read an image both as a colored image and as a grayscale
    image. Let us use the same image of the bird that we used in one of our previous
    exercises. Copy and run the code below from the Python editor:


    ```python

    import cv2


    img = cv2.imread(''Image of a Bird.jpg'')

    cv2.imshow(''image'', img)

    cv2.waitKey(0)

    ```


    The code is simple and short as explained below:


    1. We first import the OpenCV module into our code using the line: `import cv2`.

    2. Next, we use the **imread** method of the **cv2** library and pass the image
    file as an argument. This is the key line of the code that reads the image file.
    Here, we are reading the image file as a colored file itself. We shall see in
    the next exercise how we read an image in the grayscale format.

    3. Thereafter, we use the **imshow** method of **cv2** to display the image that
    was read by **cv2**. At the end, we use a **waitkey** method of **cv2** that allows
    users to display a window for a given amount of time or until the user presses
    any key.


    After running the code above, one observes that the image gets opened on the screen
    as shown in the *Figure 7.8* below:


    **Figure 7.8:** *Image read as an RGB color by OpenCV*


    Now, let us read the same image as a grayscale. Most of the code remains the same
    except for a small change in the **imread** method. The **imread** method takes
    another argument which is basically an integer that stands for the color or the
    grayscale flag. If we pass a value of 1, it shall read the image as a regular-colored
    image. This is always the default value, so we did not pass any argument in the
    last exercise. However, if we wish to read the image as a grayscale image, then
    we need to pass **0** as the second argument. Let us try this out using the code
    below:


    ```python

    import cv2


    img = cv2.imread(''Image of a Bird.jpg'', 0)

    cv2.imshow(''image'', img)

    cv2.waitKey(0)

    ```


    On running the code above, we see that the image generated on the screen looks
    like the one in the figure below which shows that **cv2** has indeed read the
    *Figure 7.9* as a grayscale image:


    *Figure 7.9: Image read as a grayscale image by OpenCV*


