    # Implementing conversational agents: The role of chatbots


    A chatbot is a great application of natural language processing technology which
    does the job of reducing the involvement of people in regular and repetitive interactions.
    Typically, these interactions could be between the organization and its clients
    or between the IT team of an organization and its employees. A chatbot does a
    great job of generating automated responses to regular questions and advanced
    chatbots even go to the extent of learning from previous interactions and refining
    future responses. Due to the presence of a chatbot, an organization greatly saves
    on time, effort and resources required in hiring and training a person for the
    job of doing regular interactions involving repetitive responses. Also, the same
    person could be utilized elsewhere for tasks requiring more creativity. In this
    way, a chatbot becomes a perfect example of **hyperautomation** since it uses
    automation coupled with a deep learning technology like NLP to accelerate the
    pace of an organization and results in the saving of time, effort and resources
    that would be required in involving a person for the same job of having regular
    interactions.'
