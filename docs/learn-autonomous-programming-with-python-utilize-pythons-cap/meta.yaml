    # Introduction to orchestration


    We already had a look at the general concept and idea of a business process workflow
    where individual processes are sequentially connected to each other and triggered
    at the appropriate time. Each of these individual processes might themselves contain
    a series or a sequence of automated steps. The process that manages these set
    of individual tasks to create an amalgamated workflow is called as orchestration.


    In orchestration, multiple technologies and platforms might be coordinated together
    based on specific rules and circumstances. Orchestration also takes care of alternate
    decisions that would need to be made during changing circumstances. This could
    extend from simple to complex systems. A typical example of orchestration is the
    creation of an app and deployment of the app to connect to multiple users. This
    could involve the triggering of multiple processes within the network. Almost
    all large projects that get deployed on the cloud involve orchestration of some
    sort.


    It is important to note here that in orchestration, it is not necessary that all
    the constituent tasks or processes are themselves all automated processes. While
    most of them might be automated, some of them might even be manual.'
