    ## Machine learning concepts


    Now that we know where machine learning fits into the larger picture of Artificial
    Intelligence, let us now try to understand it in greater depth. So, what exactly
    is machine learning? Let us try to understand this concept analytically.


    We all are familiar with mathematical formulae and equations. Suppose we are provided
    an equation $y = 3x+4$. What do we understand from this equation? Firstly, we
    see that the equation has two variables. One is the independent variable $x$ and
    the other one is the dependent variable $y$. We could also say that $x$ is the
    input variable and $y$ is the output variable. In order to get the output variable
    $y$, we need to multiply the input variable $x$ by 3 and add 4 to the product.
    In other words, there exists a relationship or mapping between the input variable
    $x$ and the output variable $y$. In the language of mathematics, we say that $y$
    is a function of $x$ and represent it as $y=f(x)$. Now, if we are provided with
    any arbitrary input and are asked to find the output, we would be able to do it
    easily using the formula $y = 3x+4$. Suppose we are provided with the following
    set of inputs: {2,3,9,6,10,15}. We can insert each of these values into the equation
    $y=3x+4$ and get the corresponding value of $y$. Let us take the first value of
    2. Putting it in the equation $y=3x+4$ gives us $y=3*2+4$. Hence, $y=6+4=10$.


    Hence, for the first input value of 2, the output is 10. In a similar manner,
    we can calculate the respective outputs for the remaining set of inputs. The *Table
    3.1* below shows the final output values mapped against each of the inputs:


    | Inputs | Outputs |

    | :---: | :---: |

    | 2 | 10 |

    | 3 | 13 |

    | 9 | 31 |

    | 6 | 22 |

    | 10 | 34 |

    | 15 | 49 |


    **Table 3.1:** *Final Outputs mapped against the inputs*


    Hence, what did we exactly do here? We already knew a function that maps the input
    to the output and had a set of inputs with us. Using these two entities, we could
    easily obtain the output for each of the inputs. In other words, we already had
    a set of rules that mapped the input to the output. This is called rules-based
    programming and is commonly used in all our regular computer applications like
    calculator or even in complex applications like office software and games. Machine
    learning is exactly in contrast to this. Let us take a different example to understand
    this.


    Consider a case where we already have a set of inputs and a set of outputs as
    shown in the *Table 3.2* below:


    | Inputs | Outputs |

    | :---: | :---: |

    | 5 | 15 |

    | 20 | 60 |

    | 3 | 9 |

    | 7 | 21 |

    | 150 | 450 |

    | 100 | 300 |


    **Table 3.2:** *Inputs and outputs*


    Now suppose we are given an arbitrary value say 50 and are asked to find out the
    corresponding output, would we be able to do so? The first question that would
    occur is what is the relationship between the input and the output? All that we
    have is just a set of inputs and a set of outputs. But is there a way to find
    a relationship between the input and the output? A quick glance at the inputs
    and their corresponding outputs reveals that each of the outputs is three times
    the input. 5 multiplied by 3 is 15, 20 multiplied by 3 is 60 and so on. Now, we
    seem to have found out the mapping function as well, which is *y=3x*. Let us insert
    the value 50 in this function *y=3x* to get the output. In this case, the output
    would be *y = 3*50 = 150*. So what did we exactly do in this approach? We already
    had the inputs and outputs with us but did not know the function. We had to know
    the function before we could find out the output for any arbitrary input. This
    is exactly what machine learning is!


    As opposed to rules-based programming where we already have the function, the
    job of machine learning is to find out the function that maps the input to the
    output so that the correct output could be predicted thereafter for any new set
    of input. In this case, the inputs and outputs were simple numbers, but they could
    be anything like complex images. Also, in this example we found out the function
    by mere observation but, there are various machine learning algorithms that do
    the job of finding this relationship. These'
  mdcn: '在这种情况下，像ChatGPT这样的**大型语言模型（LLM）**聊天机器人的兴起，正慢慢为人类带来一丝希望，引领我们走向被称为**通用人工智能（AGI）**或强人工智能的理想场景。我们目前所处的AI水平被称为弱人工智能或窄人工智能，因为它不具备完全复制人类的能力，例如理解情感或讽刺。此外，任何形式的AI智能程度都仅限于其训练所用的数据集。让我们从早期趋势到当前发展，回顾一下AI的历史，并尝试理解这个领域的未来。


    1950年，英国数学家和计算机科学家*艾伦·图灵*提出了一项测试，用于判断机器能否在思维方面模仿人类。这项测试也被称为**图灵测试**，至今仍是衡量机器所拥有人工智能水平的蓝图。在此测试中，一个人需要同时与另一个人和一台机器进行互动。根据从人类和机器那里收到的回复，互动者需要区分机器的回复和人类的回复。如果在某个时刻，互动者无法区分机器的回复和人类的回复，那么该机器就被认为成功通过了图灵测试。


    自那时起，人们一直在逐步尝试增强机器模仿人类能力。随着大数据、云计算和**物联网（IoT）**的兴起，计算能力成倍增长，从而为在更短时间内用海量数据训练模型提供了环境。就像智能手机最初作为奢侈品进入世界，随后成为我们生活中不可或缺的一部分一样，AI目前是一个流行词，但它预计将接管我们的生活，这只是时间问题！


    AI的当代用例，如自动驾驶汽车、人脸识别技术、像ChatGPT这样的智能聊天机器人，都是由于计算能力的提升而不断升级AI的结果。AI的未来既令人兴奋又充满挑战，因为像深度伪造这样的技术可以操纵视频，以及使用AI生成的模型来复制真实人类或电影明星！


    每当讨论围绕AI展开时，就无法回避机器学习、深度学习以及更广泛的讨论范畴——数据科学这些补充主题。让我们快速了解一下这些概念，它们在更广泛体系中的位置以及彼此之间的关系。


    机器学习是训练机器通过发现输入数据和输出数据之间的模式来自我学习，并在提供新输入时预测新输出的过程。这与人工智能有何关系？简单来说，人工智能是我们试图实现的目标，而机器学习是我们实现该目标的手段。AI是名词，而**机器学习（ML）**是动词。


    说到**深度学习（DL）**，它是一种学习过程，使计算机能够通过连续的神经网络层以类似于人类学习的方式进行学习。我们将在后续章节中详细探讨神经网络。


    数据科学是一个广义术语，涉及数据生命周期的所有领域，例如数据收集、数据抓取、数据工程、数据挖掘和数据转换等。由于这些过程中的大部分也是构建ML模型的一部分，因此数据科学、AI、ML和DL之间总是存在一些重叠。


