    \ 文件本质上包含了有关虚拟环境包的信息，这对于团队其他成员在安装相同虚拟环境时是一个有用的参考。我们使用以下命令创建该文件：\n\n  ```\n  pip\
    \ freeze > requirements.txt\n  ```\n\n- **停用虚拟环境**：最后，一旦我们使用完虚拟环境，应该使用以下命令停用环境，以便命令提示符恢复到正常的系统设置：\n\
    \n  ```\n  deactivate\n  ```\n\n## 重新审视 Python PIP\n\n在本书的整个练习中，我们经常使用 Python\
