    # Implementing basic mouse functions using PyAutoGUI


    In this section, we shall implement basic mouse functions that we usually carry
    out manually:


    +   - **moveTo()**: This method enables one to move the cursor to a particular
    location on the screen as specified by the coordinates. Copy and run the code
    below into the Python editor:


    python

    import pyautogui

    pyautogui.moveTo(1000,500)



    On running the code above, we find that the cursor immediately moves to the location
    on the screen where the coordinates are **1000** and **50**.


    There is a small addition that we could have in this method. Suppose we want to
    execute this cursor movement in an extended manner so the user can observe the
    movement of the cursor in real time, this method provides the capability of adding
    another argument called **duration**. Copy and run the code below in the Python
    editor:


    python

    import pyautogui

    pyautogui.moveTo(1000,500,duration=5)



    We find that the cursor moves to the coordinates **1000** and **50** this time
    as well, however it takes **5** seconds to reach there since we have specified
    **duration=5**.


    +   - **Click()**: This is the generic click function that enables one to automate
    the regular click, right click, middle click'
