- img_proc: true
  md: 'lick and double click that we manually achieve with the mouse. Copy and run
    the code below into the Python editor:


    ```

    import pyautogui

    pyautogui.click(1000, 800, 2,0,''left'')

    ```


    On running the code above, the cursor would be brought to the coordinates (**1000,
    800**) and perform a regular double left click that we execute with the mouse.
    Let us see how we achieve this.


    The first two arguments of the **click** method are the X and Y coordinates respectively
    where we want to position the mouse on the screen to double click. The next argument
    is the number of clicks. In this case, we have specified **2** as the argument
    because we want to achieve a double click. The next argument is the time interval
    between two clicks. The double click operation is such that we need to click twice
    one after the other in immediate succession without much time interval, else the
    system does not recognize the operation to be a double click if the time interval
    between the two successive clicks is too large. Hence, we have specified the time
    interval as **0** seconds. Finally, the last argument that we have specified is
    **left** which means that the click operation is left click. In case of right
    click, we need to mention **right** and in case of middle click we need to mention
    **middle**.


    Although this generic function was useful, PyAutoGUI also provides us with the
    capability to use special functions to achieve specific mouse operations. These
    functions have been noted below with their syntax:


    +   - **pyautogui.rightClick(x, y)**: This function shall perform the right click
    operation at the given coordinates, x and y.'
