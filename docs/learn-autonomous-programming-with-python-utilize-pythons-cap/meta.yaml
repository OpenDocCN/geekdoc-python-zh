    # # Chapter 1

    ## Why Python for Automation?


    # ## Introduction


    This chapter introduces the reader to the significance of Python as an open-source
    language and further delves deeper to explain why it is the most powerful and
    formidable tool for autonomous programming. The chapter emphasizes Python’s inherent
    flexibility, adaptability, and user-friendly nature, attributed to its high-level
    language and straightforward syntax. It also throws insights into Python’s flexibility
    and adaptability considerations and ease of use as a high-level language with
    a simple syntax. Further into the chapter, Python’s rich assortment of libraries
    like ‘Pandas’, ‘NumPy’, ‘Matplotlib’ would be discussed which are pivotal for
    machine learning. In subsequent chapters, we will delve deeper into the practical
    implementations of these libraries.


    # ## Structure


    The chapter covers the following topics:'
- md: '## Objectives


    At the end of this chapter, you will clearly understand why Python has been chosen
    as the language for autonomous programming despite the availability of numerous
    other alternatives from the myriad pool of programming languages.


    ## Python as an open-source language


    Congratulations on choosing the best place to begin your journey of learning autonomous
    programming with Python! As the book’s name implies, the story’s crux is built
    on the Python language. This chapter will tell you precisely why Python has been
    chosen as an optimum tool to construct the monument of autonomous programming.


    Let us keep Python aside for a moment to understand the first advantage it has.
    Imagine you wish to create a short application that would automatically produce
    some Excel reports out of a few raw chunks of Excel data. You consult your friend,
    a professional in writing algorithms in C++, JAVA and Visual Basic. He advises
    you to use the API of either of these languages and go ahead with building your
    application. As soon as you agree with your friend, the first roadblock you stumble
    upon is the realization that this exercise cannot be easily performed free of
    cost and that you must purchase certain licenses for using the respective platforms.
    Now in search of hope elsewhere, you research a bit about Python and realize that
    Python does not have any such cost constraint!


    And that is the first gigantic advantage of using Python. Python is an open-source
    language which means that the source code is freely available, distributable,
    and modifiable by users making it the most preferred language to develop and maintain
    code and share it with communities globally. This is exactly the reason why Python
    is the most preferred tool for building numerous libraries which we shall soon
    discuss.


    ## Python’s repository of extensive libraries


    Python provides extensive libraries which are basically reusable pieces of code
    that data scientists use to further build their applications. The most popular
    libraries are listed below with some short descriptions:


    - **NumPy:** This is one of the most popular libraries of Python that is used
    to work with large matrices. It is an abbreviation for **Numerical Python**. This
    library forms the core of scientific computing as well as constitutes a building
    block for other advanced machine learning libraries like TensorFlow and SciPy.

    - **Pandas:** This library is one of the key offerings of Python. The pandas DataFrame
    is the fundamental unit that enables one to work with data in a tabular format.
    It allows one to read data from raw sources as a DataFrame, perform transformations
    on it using multiple inbuilt methods and export the data to various other applications.

    - **Matplotlib:** Data visualization has become the need of the hour to have quick
    insights around raw data as well as transformed data. The library matplotlib does
    a great job of enabling one to derive valuable insights out of data by providing
    one with the ability to plot variety of charts like pie charts, histograms, and
    scatter plots.


    Other Python libraries that are primarily used in data science, machine learning
    and deep learning applications have been summarized below but shall be discussed
    in detail in relevant chapters to follow. However, this is not an exhaustive list
    and exercises from actual chapters would have more libraries to discuss.


    - **TensorFlow:** This is an advanced deep learning library used to perform complex
    computations in Mathematics and Physics.

    - **Beautiful Soup:** This is a popular Python library for web scraping. Web scraping
    is the process of automating the data gathering process from the web. Beautiful
    Soup helps achieve this by enabling data pulling from HTML and XML files.

    - **Scrapy:** This is an open-source Python library used for web scraping.

    - **Json:** This is a Python package which provides useful tools for working with
    JSON (JavaScript Object Notation) objects.

    - **SciPy:** SciPy is an abbreviation for Scientific Python. It is built on NumPy
    and is used for scientific computing.

    - **Scikit-learn:** This is commonly used for implementing machine learning algorithms
    like regression, classification, and clustering.

    - **PyPDF:** This is used for reading and transforming PDF files.

    - **Openpyxl:** Python library used for Excel automation.

    - **Pywhatkit:** Python library that is used to send WhatsApp messages.

    - **OpenCV:** Python library used for Computer Vision applications.


    ## Python as a high-level language


    Returning to JAVA and C++, one needs to be conversant with the syntax and familiar
    with memory management considerations to develop applications in these languages.
    Such kinds of languages fall into the category of low level or middle level languages.
    However, Python tells a different story. The syntax is extremely simple, so much
    that calling it an extended version of pseudo code would not be an exaggeration!


    This is exactly the reason why Python is the preferred tool for programmers worldwide
    to deploy open-source projects in machine learning and deep learning. Python provides
    that flexibility and luxury to the developer to focus only on the algorithm and
    not worry about any additional brackets or semicolons apart from the ones required
    for some standard data types.


    Despite this ease of syntax, Python retains the authority of being an **Object-Oriented
    Programming (OOP)** language and exhibits all attributes of object-oriented languages
    like abstraction, encapsulation, polymorphism, and inheritance.


    ## Portability aspect of Python


    Portability of a programming language is the ability to use the code of that language
    on different machines or platforms without requiring modification. For example,
    if you write a Python code on a Windows machine, you do not have to make any changes
    to it if you would want to run it on Linux or Mac. That is the beauty of Python
    as a portable language. In certain cases, however, care needs to be taken to avoid
    platform-specific dependencies or behaviors. Nevertheless, Python’s emphasis on
    portability and its vast standard library makes it easier to write cross-platform
    code compared to many other languages.


    ## Salient advantages of Python


    Other significant advantages of Python are the following:


    - **Dynamically typed language:** Python is a dynamically typed language, which
    means that one need not specify the data type of a variable beforehand. The data
    type of the variable is decided during run time.

    - **Large community:** Python language has a huge developer community worldwide
    which is invested in assisting and guiding each other in growing this prospect
    and initiative. Hence, it is possible to obtain quick support for anything related
    to Python due to this large community.

    - **Support for multiple programming paradigms:** Python is one of the languages
    that supports multiple programming paradigms viz., imperative, functional, procedural,
    and object-oriented, thus adding to the flexibility of the user.

    - **Scalable:** Python’s ability to handle large amounts of data makes it a scalable
    programming language.

    - **Embeddable:** It is possible to execute Python code from an application coded
    in another language, thus making it embeddable.

    - **Extensible:** A new functionality can be added to a Python code by writing
    a code in another programming language and linking it with the Python code, thus
    making Python an extensible language.


    ## Conclusion


    Now that we know why Python is the chosen favorite, what else are we waiting for!
    In the next chapter, we will introduce you to the exciting realm of **Robotic
    Process Automation (RPA)** technology and witness the power of Python in executing
    RPA processes independently. Without further delay, let kick start our journey
    by moving to the next chapter on RPA foundations!


