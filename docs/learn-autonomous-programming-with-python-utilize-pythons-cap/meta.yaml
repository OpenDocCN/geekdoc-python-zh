    occasionally happen because the text in a PDF document is not like a stream of
    text that we have in a word document. All that a PDF document knows is that it
    has a set of characters that need to be placed at positions relative to each other.
    This relative positioning of characters might sometimes make it difficult for
    the parser to figure out whether two characters constitute the same word or whether
    they should be separated by space. Each character in a PDF document is enclosed
    by a bounding box. The position of this bounding box is determined by an X and
    Y co-ordinate each for the lower left and upper right points. Sometimes, the bounding
    boxes of two adjacent characters might have a greater separation than is generally
    expected between adjacent characters. That might create difficulty for the parser
    to identify that the adjacent characters belong to the same word.


    Whatever might be the challenges here, we need to find some ways to address them.
    In such cases, we need to use alternative Python libraries to get our job done.


    In order to address the first challenge, we could use a library called **tabula**
    that is specially meant for extracting tables. Copy the code below into the Python
    editor:


    ```python

    from tabula import read_pdf


    objTable = read_pdf("Stock Prices.pdf", pages="all")

    df = objTable[0]

    df.to_excel("Stock Prices.xlsx", index=None)

    ```


    Here, we basically import the **read_pdf** module of the **tabula** library. We
    have entered two arguments in this module. The first argument is the name of the
    PDF document which is **Stock Prices.pdf**. The second argument is the pages.
    In this case, we specify **all**. This is a single page document, but as a practice,
    specifying **all** should extract information from all pages of the document.
    We then store the value of this object into the **objTable** variable.


    The important part of this code is the creation of the **df** variable which we
    basically obtain by indexing the **objTable** variable. In this case, we have
    just one table so we specify **objTable[0]** to obtain the first table. It is
    important to note that value returned here is a pandas dataframe which is extremely
    advantageous from the point of view of exporting it or transforming it.


    Here, we export the dataframe to an Excel file named **Stock Prices.xlsx** using
    the **to_excel** method of the **dataframe** object. On opening the Excel, we
    see that the table in the figure below has beautifully been exported to an Excel
    spreadsheet:


