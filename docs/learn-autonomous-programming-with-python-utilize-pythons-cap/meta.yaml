    \ are Alexa and Google Translate.\n\nAdvanced implementations of natural language\
    \ processing have given rise to **large language models (LLMs)** becoming prominent\
    \ and taking on the technological landscape by storm. Most popular examples in\
    \ this category are ChatGPT by OpenAI and BARD by Google.\n\nWe have previously\
    \ studied specific examples on computer vision in *Chapter 7, Working with PDFs\
    \ and Images*, so we would not be revisiting the topic here. However, it would\
    \ be advantageous to have a quick refresher on natural language processing which\
    \ is exactly what we do in the section to follow.\n\n## Natural language processing\n\
    \nAs discussed earlier, natural language processing enables computers to understand\
    \ and interpret human language and generate responses that humans can understand.\
    \ The ideal state of this technology would be that it entirely replicates a human\
    \ in terms of cognitive ability and creativity. However, NLP is currently far\
    \ away from ideal. The most popular NLP libraries are NLTK and Spacy.\n\nThe NLP\
    \ cycle consists of certain general steps that are usually performed on the text\
    \ data in order to process it and interpret it further. These steps are as follows:\n\
    \n- **Segmentation**: This process breaks down a paragraph into constituent sentences.\
    \ For example, the paragraph *AI is the greatest innovation of the current century.\
    \ However, AI needs to be selectively used to benefit the world. Every technology\
    \ has its advantages and disadvantages* can be broken down into the following:\n\
    \    - AI is the greatest innovation of the current century.\n    - However, AI\
    \ needs to be selectively used to benefit the world.\n    - Every technology has\
    \ its advantages and disadvantages.\n- **Tokenization**: This step breaks the\
    \ sentence into constituent words. The first sentence *AI is the greatest innovation\
    \ of the 21st century* could be broken down as, *AI, is, the, greatest, innovation,\
    \ of, the, current, century*.\n- **Stemming**: This step breaks down a derived\
    \ word into the base or root form. For example, the word innovation in the second\
    \ sentence could be broken down to the root word innov which is not an actual\
    \ word, but other modifications of innov could be innovate or innovative.\n- **Lemmatization**:\
    \ This is similar to stemming but for the fact that lemmatization returns an actual\
    \ word. For example, the word greatest in the first sentence could be lemmatized\
    \ to great.\n- **Removal of stop words**: Words like a, an, is, the are considered\
    \ stop words and may need to be removed in order to focus only on the key words\
    \ in a sentence.\n- **Part-of-speech (POS) tagging**: This step tags words into\
    \ the corresponding part-of-speech that it belongs to which further helps in understanding\
    \ the context of the sentence.\n\nIn neural networks as well. The **Keras** module\
    \ built on top of **TensorFlow** enables one to create neural networks where one\
    \ also has the flexibility to specify the activation functions and layers in the\
    \ neural network. Let us have a look at this functionality using the sequential\
    \ method of the **Keras** module. Prior to using TensorFlow, one would need to\
    \ install it using the command below:\n\n```\npip install tensorflow\n```\n\n\
    Now, copy and paste the code below into the Python editor:\n\n```\n#TensorFlow\
    \ Tutorial\nimport tensorflow as tf\nmodel = tf.keras.Sequential([\ntf.keras.layers.Dense(10,\
    \ activation='relu',input_shape=[4])])\nmodel.summary()\n```\n\nHere, we observe\
    \ that we have created a dense layer for a neural network by specifying the input\
    \ shape argument as **[4]** which is basically the shape of the input that is\
    \ fed to the neural network. Thereafter, we use the **model.summary()** method\
    \ to populate the details of the model in the console. On running the code, we\
    \ obtain the following output in the console:\n\nModel: \"sequential\"\n\n________________________________________________________________\n\
    ____\nLayer (type)             Output Shape              Param #\n=================================================================\n\
    =================================================================\ndense (Dense)\
    \            (None, 10)                50\n=================================================================\n\
    =================================================================\nTotal params:\
    \ 50 (200.00 Byte)\nTrainable params: 50 (200.00 Byte)\nNon-trainable params:\
    \ 0 (0.00 Byte)\n\nWe observe from the output that the model is \"**Sequential**\"\
    \ and the layer is **dense**. For dense layers, the number of parameters is calculated\
    \ using the equation below:\n*Param = Output Shape * (Input Shape + 1)*\nOn inserting\
    \ the values, we obtain:\n*Param = 10 * (4 + 1) = 50*\nAs observed in the *Param*\
    \ column of the table, the number of parameters is indeed **50**.\n\nIn our last\
    \ section of this chapter on practical use case with Python, we shall study how\
    \ TensorFlow proves to be a powerful solution to create a neural network that\
    \ classifies data from our very familiar Iris dataset.\nUntil then, let us acquaint\
    \ ourselves with another useful deep learning library called **PyTorch**.\n\n\
    - **PyTorch**: PyTorch is another useful Python library for deep learning computations\
    \ which is open-source and built by Facebook. This library is easy to use and\
    \ hence the favorite of most academicians and researchers. It is extensively used\
    \ in many deep learning applications like computer vision and text processing.\
    \ Prior to using PyTorch, one would need to install it using the command below:\n\
    \n```\npip install torch\n```\n\nThe hallmark of PyTorch is that it provides the\
    \ **torch.nn** module that provides a powerful functionality to build a neural\
    \ network using high level API. We would not be discussing the implementation\
    \ in detail here but interested readers could find a plethora of examples online\
    \ that beautifully illustrate the usage of PyTorch. However, it would be advantageous\
    \ to take a quick glimpse of key concepts related to PyTorch data types.\nPyTorch\
    \ acts as an effective replacement for the **numpy** data type while performing\
    \ calculations. It provides us with the very useful **tensor** data type that\
    \ acts as a generic n dimensional vector. Let us take an example. Copy and run\
    \ the code below into the Python editor:\n\n```\nimport torch\ntsr = torch.tensor([[10,5],[3,1]])\n\
    print(tsr)\n```\n\n**Output:**\n**tensor([[10, 5],\n    [ 3, 1]])**\n\nHowever,\
    \ that is not all! Just wait until we see the beauty of a tensor in PyTorch. In\
    \ the section on backpropagation, we observed how tedious it is to calculate the\
    \ derivatives of certain expressions at points. But the hassle is about to end\
    \ with the **backward** method of PyTorch! Copy and run the code below into the\
    \ Python editor:\n\n```\nimport torch\nx = torch.tensor(5.0, requires_grad=True)\n\
    y = x**3 + 7*x + 9\ny.backward()\nprint(x.grad)\n```\n\n**Output:**\n**tensor(82.)**\n\
    \nWhat we did is plain simple. We initialized a tensor **x** to the value **5.0**.\
    \ Next, we created a dependent variable *y* as a function of *x* given by the\
    \ equation:\n\n$$y = x^3 + 7x + 9$$\n\nWe can algebraically obtain the derivative\
    \ of this function with respect to *x* as shown below:\n\n$$\\frac{dy}{dx} = 3x^2\
    \ + 7$$\n\nNext, we assign $x = 5$ in the above expression to obtain the value\
    \ of the derivative as:\n\n$$\\frac{dy}{dx} = 3 * (5)^2 + 7 = 75 + 7 = 82$$\n\n\
    Now, Pytorch has calculated the derivative of $y$ at $x=5$ by applying the simple\
    \ **backward** method to **y** and thereafter the **grad** method to **x**. As\
    \ observed from the output, we get the same value of 82 in just two lines! This\
    \ is sufficient to get kick started with building our own neural network!"
  mdcn: "## 深度学习应用\n\n计算机中GPU的出现，结合最新Python深度学习库提供的计算和数学能力，催生了当代人工智能领域令人惊叹的应用。其中最突出的是计算机视觉和自然语言处理。\n\
    \n计算机视觉主要使用**卷积神经网络（CNNs）**，赋予计算机识别图像和视频中物体的能力。自然语言处理则赋予计算机理解和解读人类语言的能力。目前最流行的当代例子是Alexa和谷歌翻译。\n\
    \n自然语言处理的高级应用催生了**大语言模型（LLMs）**，它们日益突出并席卷了技术领域。这一类别中最著名的例子是OpenAI的ChatGPT和谷歌的BARD。\n\
    \n我们之前在*第7章，处理PDF和图像*中已经学习过计算机视觉的具体示例，因此这里不再重复该主题。不过，快速回顾一下自然语言处理将是有益的，这正是我们接下来要做的。\n\
    \n## 自然语言处理\n\n如前所述，自然语言处理使计算机能够理解和解读人类语言，并生成人类能够理解的响应。这项技术的理想状态是它在认知能力和创造力方面完全复制人类。然而，NLP目前距离理想状态还很远。最流行的NLP库是NLTK和Spacy。\n\
    \nNLP处理流程包含一些通用步骤，通常对文本数据执行这些步骤以进行处理和进一步解读。这些步骤如下：\n\n- **分段**：此过程将段落分解为组成句子。例如，段落*AI是当前世纪最伟大的创新。然而，AI需要有选择性地使用以造福世界。每项技术都有其优点和缺点*可以分解为：\n\
    \    - AI是当前世纪最伟大的创新。\n    - 然而，AI需要有选择性地使用以造福世界。\n    - 每项技术都有其优点和缺点。\n- **分词**：此步骤将句子分解为组成单词。第一个句子*AI是21世纪最伟大的创新*可以分解为：*AI,\
    \ is, the, greatest, innovation, of, the, current, century*。\n- **词干提取**：此步骤将派生词分解为基本形式或词根。例如，第二个句子中的单词innovation可以分解为词根innov，这不是一个实际的单词，但innov的其他变体可以是innovate或innovative。\n\
    - **词形还原**：这与词干提取类似，但词形还原返回的是一个实际的单词。例如，第一个句子中的单词greatest可以词形还原为great。\n- **停用词移除**：像a,\
    \ an, is, the这样的词被认为是停用词，可能需要移除，以便只关注句子中的关键词。\n- **词性标注**：此步骤将单词标记为其所属的相应词性，这有助于进一步理解句子的上下文。\n\
    \n在神经网络中也是如此。构建在**TensorFlow**之上的**Keras**模块允许创建神经网络，并且可以灵活地指定神经网络中的激活函数和层。让我们使用**Keras**模块的sequential方法来看看这个功能。在使用TensorFlow之前，需要使用以下命令安装它：\n\
    \n```\npip install tensorflow\n```\n\n现在，将下面的代码复制并粘贴到Python编辑器中：\n\n```\n#TensorFlow\
    \ Tutorial\nimport tensorflow as tf\nmodel = tf.keras.Sequential([\ntf.keras.layers.Dense(10,\
    \ activation='relu',input_shape=[4])])\nmodel.summary()\n```\n\n在这里，我们观察到通过指定输入形状参数为**[4]**（这基本上是输入到神经网络的数据的形状），我们为神经网络创建了一个全连接层。之后，我们使用**model.summary()**方法在控制台中填充模型的详细信息。运行代码后，我们在控制台中获得以下输出：\n\
    \nModel: \"sequential\"\n\n________________________________________________________________\n\
    ____\nLayer (type)             Output Shape              Param #\n=================================================================\n\
    =================================================================\ndense (Dense)\
    \            (None, 10)                50\n=================================================================\n\
    =================================================================\nTotal params:\
    \ 50 (200.00 Byte)\nTrainable params: 50 (200.00 Byte)\nNon-trainable params:\
    \ 0 (0.00 Byte)\n\n我们从输出中观察到模型是\"**Sequential**\"，层是**dense**。对于全连接层，参数数量使用以下公式计算：\n\
    *Param = Output Shape * (Input Shape + 1)*\n代入数值，我们得到：\n*Param = 10 * (4 + 1)\
    \ = 50*\n正如表格的*Param*列所示，参数数量确实是**50**。\n\n在本章关于Python实际用例的最后一节中，我们将研究TensorFlow如何成为一个强大的解决方案，用于创建一个对来自我们非常熟悉的鸢尾花数据集的数据进行分类的神经网络。\n\
    在那之前，让我们先熟悉另一个有用的深度学习库，称为**PyTorch**。\n\n- **PyTorch**：PyTorch是另一个用于深度学习计算的有用Python库，它是开源的，由Facebook构建。这个库易于使用，因此是大多数学者和研究人员的最爱。它广泛用于许多深度学习应用，如计算机视觉和文本处理。在使用PyTorch之前，需要使用以下命令安装它：\n\
    \n```\npip install torch\n```\n\nPyTorch的标志性特点是它提供了**torch.nn**模块，该模块提供了使用高级API构建神经网络的强大功能。我们不会在这里详细讨论实现，但感兴趣的读者可以在网上找到大量示例，这些示例很好地说明了PyTorch的用法。不过，快速浏览一下与PyTorch数据类型相关的关键概念将是有益的。\n\
    PyTorch在执行计算时是**numpy**数据类型的有效替代品。它为我们提供了非常有用的**tensor**数据类型，它充当通用的n维向量。让我们举个例子。将下面的代码复制并运行到Python编辑器中：\n\
    \n```\nimport torch\ntsr = torch.tensor([[10,5],[3,1]])\nprint(tsr)\n```\n\n**输出：**\n\
    **tensor([[10, 5],\n    [ 3, 1]])**\n\n然而，这还不是全部！请稍等，直到我们看到PyTorch中张量的美妙之处。在关于反向传播的章节中，我们观察到计算某些表达式在某点的导数是多么繁琐。但随着PyTorch的**backward**方法的出现，这种麻烦即将结束！将下面的代码复制并运行到Python编辑器中：\n\
    \n```\nimport torch\nx = torch.tensor(5.0, requires_grad=True)\ny = x**3 + 7*x\
    \ + 9\ny.backward()\nprint(x.grad)\n```\n\n**输出：**\n**tensor(82.)**\n\n我们所做的非常简单。我们将一个张量**x**初始化为值**5.0**。接下来，我们创建一个因变量*y*作为*x*的函数，由以下方程给出：\n\
    \n$$y = x^3 + 7x + 9$$\n\n我们可以通过代数方法得到该函数对*x*的导数，如下所示：\n\n$$\\frac{dy}{dx} = 3x^2\
    \ + 7$$\n\n接下来，我们在上述表达式中赋值$x = 5$，得到导数的值为：\n\n$$\\frac{dy}{dx} = 3 * (5)^2 + 7\
    \ = 75 + 7 = 82$$\n\n现在，Pytorch通过简单地对**y**应用**backward**方法，然后对**x**应用**grad**方法，计算出了$y$在$x=5$处的导数。从输出中观察到，我们仅用两行代码就得到了相同的值82！这足以让我们开始构建自己的神经网络了！"
