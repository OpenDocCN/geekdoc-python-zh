    are complementary to each other, there lie certain subtle differences between
    them. The next section shall enlist and elaborate on these differences.


    # Automation versus orchestration: Differences


    The *Table 11.1* below summarizes the main differences between automation and
    orchestration:


    | | Automation | Orchestration |

    |---|---|---|

    | **Number of tasks** | Automation of a task is the process where human intervention
    is eliminated from a single task. | Orchestration is the coordination (mostly
    automated) of multiple automated tasks (few might be manual). |'
