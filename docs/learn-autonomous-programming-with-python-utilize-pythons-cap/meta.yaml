    with the following set of inputs: {2,3,9,6,10,15}. We can insert each of these
    values into the equation $y=3x+4$ and get the corresponding value of $y$. Let
    us take the first value of 2. Putting it in the equation $y=3x+4$ gives us $y=3*2+4$.
    Hence, $y=6+4=10$.


    Hence, for the first input value of 2, the output is 10. In a similar manner,
    we can calculate the respective outputs for the remaining set of inputs. The *Table
    3.1* below shows the final output values mapped against each of the inputs:


    | Inputs | Outputs |

    | :---: | :---: |

    | 2 | 10 |

    | 3 | 13 |

    | 9 | 31 |

    | 6 | 22 |

    | 10 | 34 |

    | 15 | 49 |


    **Table 3.1:** *Final Outputs mapped against the inputs*


    Hence, what did we exactly do here? We already knew a function that maps the input
    to the output and had a set of inputs with us. Using these two entities, we could
    easily obtain the output for each of the inputs. In other words, we already had
    a set of rules that mapped the input to the output. This is called rules-based
    programming and is commonly used in all our regular computer applications like
    calculator or even in complex applications like office software and games. Machine
    learning is exactly in contrast to this. Let us take a different example to understand
    this.


    Consider a case where we already have a set of inputs and a set of outputs as
    shown in the *Table 3.2* below:


    | Inputs | Outputs |

    | :---: | :---: |'
