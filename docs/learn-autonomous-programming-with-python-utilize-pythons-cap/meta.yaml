    \ Iris dataset and try to achieve the objective of classifying items in that dataset\
    \ using a neural network instead of our classical machine learning algorithms.\n\
    Let us load the dataset first from Scikit-learn using the code below:\n\n```\n\
    from sklearn.datasets import load_iris\n\niris = load_iris()\n```\n\nNext, we\
    \ split that into features and target and assign them to variables **X** and **Y**\
    \ respectively using the code below:\n\n```\nX = iris.data\n\nY = iris.target\n\
    ```\n\nIt is always a good practice to perform encoding of the target dataset\
    \ as encoding transforms the labelled outputs into numerically assigned outputs.\
    \ For example, if a dataset contains labelled values like *Dog*, *Cat* and *Mouse*,\
    \ then an encoder would transform them to 0, 1 and 2 respectively.\nWe perform\
    \ encoding using the **LabelEncoder** module of Scikit-learn as shown in the following\
    \ code:\n\n```\nfrom sklearn.preprocessing import LabelEncoder\n\nencoder = LabelEncoder()\n\
    Y = encoder.fit_transform(Y)\n```\n\nNext, we perform one hot encoding of this\
    \ encoded target output. One hot encoding is the process of transforming an output\
    \ into a vector representation. Referring to the earlier example, *Dog* would\
    \ be converted to {0, 0, 1}, *Cat* would be converted to {0, 1, 0} and *Mouse*\
    \ would be converted to {1, 0, 0}.\n\n```\nfrom sklearn.preprocessing import OneHotEncoder\n\
    onehot_encoder=OneHotEncoder(sparse=False)\nY=Y.reshape(len(Y), 1)\nY=onehot_encoder.fit_transform(Y)\n\
    ```\n\nNext, we split the data into training data and testing data using our regular\
    \ **train_test_split** function from the **model_selection** module of the Scikit-learn\
    \ library as shown in the code below:\n\n```\nX_Train, X_Test, Y_Train, Y_Test\
    \ = train_test_split(\nX, Y, test_size = 0.3, random_state=100)\n```\n\nWe use\
    \ a test size of **0.3** and specify a random state of **100**.\n\nThis step takes\
    \ us to the end of the data preparatory phase. To revise what we just did, we\
    \ have loaded the Iris data, separated the target variable from the features,\
    \ encoded the target and thereafter one hot encoded the target. At the end, we\
    \ split the data into training and testing dataset.\n\nNow comes the most interesting\
    \ part, that of training the model! However, which model do we choose? A self-made\
    \ neural network! Here comes TensorFlow to the rescue!\n\nWe use the **Sequential**\
    \ method of the **Keras** module of TensorFlow to create our neural network as\
    \ shown in the code below:\n\n```\nmodel = tf.keras.Sequential([\n    tf.keras.layers.Dense(10,\
    \ activation='relu'),\n    tf.keras.layers.Dense(10, activation='relu'),\n   \
    \ tf.keras.layers.Dense(3, activation='softmax')\n])\n```\n\nAs evident from the\
    \ arguments to the **Sequential** method, we have created two dense layers with\
    \ ReLU activation and one layer with Softmax activation function.\n\nThe next\
    \ step after creating a neural network model is always to compile it as shown\
    \ in the code below:\n\n```\nmodel.compile(optimizer='rmsprop',\n            \
    \  loss='categorical_crossentropy',\n              metrics=['accuracy'])\n```\n\
    \nThis step specifies certain important parameters required in the neural network.\
    \ As a next step, which is the most important one, we train the model using the\
    \ **fit** method as shown in the code below:\n\n```\nmodel.fit(X_Train, Y_Train,\
    \ batch_size=50, epochs=100)\n```\n\nHere, the number of iterations shall correspond\
    \ to the number of **epochs**.\n\nNext, we assess the accuracy of the model using\
    \ metrics **Loss** and **Accuracy** as shown in the code below:\n\n```\nloss,\
    \ accuracy = model.evaluate(X_Test, Y_Test, verbose=0)\nprint('Loss:', loss)\n\
    print('Accuracy:', accuracy)\n```\n\nFinally, we would also be interested in knowing\
    \ whether the actual values match with the **predicted** values. We perform this\
    \ analysis using the code below:\n\n```\nY_Pred = model.predict(X_Test)\n\nactual\
    \ = np.argmax(Y_Test,axis=1)\npredicted = np.argmax(Y_Pred,axis=1)\n\nprint(f\"\
    Actual: {actual}\")\nprint(f\"Predicted: {predicted}\")\n```\n\nWhile this has\
    \ so far been a piecemeal exercise, it would be advantageous to have the entire\
    \ code as single pieces so that it can be run at one go.\n\nCopy and run the code\
    \ below into the Python editor:\n\n```\n#Practical Use Case in Python\nfrom sklearn.model_selection\
    \ import train_test_split\nfrom sklearn.datasets import load_iris\nfrom sklearn.preprocessing\
    \ import LabelEncoder\nfrom sklearn.preprocessing import OneHotEncoder\n\nimport\
    \ tensorflow as tf\nfrom tensorflow.keras import layers\nimport pandas as pd\n\
    import numpy as np\nfrom tensorflow.keras import datasets, layers, models\nfrom\
