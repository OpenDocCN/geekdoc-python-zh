    section, we would have a practical understanding of them when we perform an actual
    exercise.


    +   - **Python scope**: This activity comes at the first level in the hierarchy
    within the sequence. Here, we specify the basic parameters like the Python installation
    directory and the Python version. All other Python activities are included within
    this activity.'
