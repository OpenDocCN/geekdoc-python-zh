    # Working with the requirements.txt file


    Until now, we have installed solitary packages using the **pip** command. However,
    project requirements at times demand that multiple packages be installed at once
    as the same dependencies would need to be installed by other team members as well.
    In such a scenario, **pip** provides a very advantageous functionality to install
    packages in bulk using the **requirements.txt** file.


    We would first need to create a **requirements.txt** file in order to work with
    it using **pip**. We shall go back to our virtual environment **myenv** to create
    a **requirements.txt** file.


    Before creating the **requirements.txt** file, we need to make sure that we install
    some sample packages in the virtual environment using the **pip install package**
    command so that after creating the **requirements.txt** file, the packages automatically
    get listed in the file.


    For this exercise, we install **pandas** in the virtual environment **myenv**
    that we created earlier. As **pandas** gets installed, it would automatically
    install the dependencies **numpy**, **python-dateutil**, **pytz** and **tzdata**.
    The dependency **python-dateutil** has its own dependency package named **six**
    which is in turn automatically installed by **python-dateutil**.


    Next, we would want to create a **requirements.txt** file that lists all these
    installed packages together so that the list'
  - '[PAGE 359]


    could be utilized by another member of the team. The **pip** command comes to
    the rescue again that provides us with the functionality to create a **requirements.txt**
    file. Before using it, we would need to activate the virtual environment **myenv**
    using the commands below:


    ```

    cd project-directory

    ```


    This makes the directory **project-directory** the current directory where we
    have previously created the virtual environment **myenv**.


    Next, we activate the virtual environment using the command below:


    ```

    .\myenv\Scripts\activate

    ```


    Now, we create a **requirements.txt** file in the **myenv** virtual environment
    directory using the command below:


    ```

    pip freeze > requirements.txt

    ```


    After running this command, a file named **requirements.txt** would be created
    in the **myenv** directory. On opening the file, we would observe as shown in
    *Figure 14.9* that it contains a list of all the packages that have been installed
    in the virtual environment. Please refer to the following *Figure 14.9*:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_359_0.png)'
  - '[PAGE 360]


    **Figure 14.9:** *List of installed packages listed in the requirements.txt file*


    As shown in *Figure 14.9* above, the **requirements.txt** file not only lists
    the package names but also the versions of the installed packages.


    Now, let us finally put to use the **requirements.txt** file that we just created.
    Before that, we would need to create a new virtual environment in order to test
    the functionality. We make the same **project-directory** as the current directory
    and then enter the command below:


    ```

    virtualenv test_env

    ```


    This creates a virtual environment called **test_env**. Next, we activate the
    environment using the command below:


    ```

    .\test_env\Scripts\activate

    ```


    Next, we type the command below which shall install all packages from the **requirements.txt**
    file into the virtual environment **test_env**.


    ```

    pip install -r requirements.txt

    ```


    If we go to the **Lib** folder and open the **site-packages** folder in the virtual
    environment **test_env**, we find that all the packages listed in the **requirements.txt**
    file have been installed.


    In this way, we have explored the functionality provided by **pip** that enables
    one to install all packages listed in the **requirements.txt** file.


    # Using Docker for containerization


    We have seen so far how a virtual environment in Python enables one to encapsulate
    the entire set of Python dependencies. Another concept is **Docker**, which is
    a containerization platform that is used to package the application and all related
    dependencies in the form of containers thus ensuring that the application works'
  - '[PAGE 361]


    seamlessly in any environment, which may be development or test or production.
    Unlike a virtual environment that encapsulates Python dependencies, a Docker encapsulates
    the entire operating system. A docker container provides code isolation, independence
    and portability and is required when one wants to deploy the application into
    production.


    The purpose of this section on docker was to provide a quick summary of the concept.
    It is further left to the enthusiastic reader to explore containerization concepts
    in docker and try related commands thereafter.


    With this, we end our discussion of architecting Python automation projects and
    the chapter as well.


    # Conclusion


    In this chapter, our focus has been on brushing up all accessory concepts that
    were otherwise not a part of specific topics but are of immense importance considering
    the architectural considerations of automation projects. The concepts of virtual
    environment and detailed examples of **pip** library commands shall provide a
    massive boost to the overall utility of the automation project.


    In the next chapter, we would explore another exciting luxury provided by Python
    which is the PyScript framework, which is an open-source framework that provides
    the functionality to create front end web applications using Python. If that sounds
    interesting enough let us turn the page to the next chapter!


