    Getting Started with AI/ML in Python*. Now, we shall implement it using Python
    on some sample data. We know that the goal of linear regression is to fit a line
    to a sample of points, such that we could minimize the sum of the squares of the
    vertical distances of the points from the line. The equation shall assume the
    form below. The predicted value *y* shall be represented as:


    $$Y = c0 + c1*x1 + c2*x2 + c3*x3 + ..... + cn*xn.$$


    Here, the set *{c0, c1, c2, c3,......,cn}* are the co-efficient and the value
    *cn* is the intercept. In linear regression, we basically obtain the optimum values
    of the coefficients and the intercept. By optimum values, we mean those set of
    values that would minimize the sum of the squared vertical distances between the
    actual points and the points predicted by the line.


    To implement linear regression using Python library Scikit-learn, copy, and run
