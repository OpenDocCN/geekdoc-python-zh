    \ function that calculates the perfect square of an integer number and save the\
    \ file in the project directory that we created earlier.\n\nOpen a blank file\
    \ in the Python editor and copy the code below:\n\n```\npython\ndef Calculate_Square(intNum):\n\
    \    intSquare = intNum*intNum\n    return intSquare\n```\n\nSave the file in\
    \ the same directory of the project **Learn_Robot_Framework** and name the file\
    \ as"
  merge: -1
  pgno: 410
- img_proc: true
  md: '# Calculate_Perfect_Square.py.


    Next, we shall proceed to writing the test case. Similar to what we did during
    our section on Pytest, we shall validate whether the square of an arbitrary integer
    generated using the function **Calculate_Square** equals 100.


    Follow the steps below to prepare the test case:


    +   1. We would need to import the Python file **Calculate_Perfect_Square.py**
    in order to be able to call its function **Calculate_Square**. We do this by clicking
    the **Library** button at the right-hand side of the **Edit** bar of the IDE window
    that is shown in *Figure 16.14*. On clicking the **Library** button, a window
    opens as shown in *Figure 16.15* below:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_411_0.png)


    +   2. We click on the **Browse** button and select the **Calculate_Perfect_Square.py**
    file by browsing to its location. Next, we click on the **OK** button.


    +   3. Now, we create an input variable that would be passed as an argument to
    the function **Calculate_Square**. To create variable, click on the **Create Scalar**
    button at the right side of the **Edit** bar of the IDE that is shown in *Figure
    16.14*. On clicking the **Create Scalar** button, a new window appears as shown
    below in *Figure 16.16*:'
  merge: -1
  pgno: 411
- img_proc: true
  md: '![](img/3bdf02f00d53ff55047d1e1759de2882_412_0.png)


    **Figure 16.16:** Scalar Variable window


    We enter the variable name as **intNumber** and its value as shown in the image
    above.


    4. Next, we click on the tab **Text Edit** which opens the editor window as shown
    in *Figure 16.17* below:


    ![](img/3bdf02f00d53ff55047d1e1759de2882_412_1.png)


    **Figure 16.17:** Text Edit tab in the test case


    5. We observe that the imported module **Calculate_Perfect_Square.py** has been
    included under the **Settings** section and the variable **intNumber = 10** has
    been mentioned under the **Variables** section.


    6. Next, we write the actual test under a new section that we name as **Test Cases**.
    We label the test as **Validation of Output** which is reflected on the left-hand
    side pane under **First Test Case**. We call the function **Calculate_Square**
    from the module **Calculate_Perfect_Square** and pass the variable **intNumber**
    as an argument. The result thus obtained is stored in the variable **answer**.'
  merge: -1
  pgno: 412
- img_proc: true
  md: 'As shown in *Figure 16.17*, below is the line of code that calculates the value
    in the variable **answer**.


    ```

    ${answer} = Calculate Square ${{int(${intNumber})}}

    ```


    There are few important things to note here:


    +   - The syntax for the variable names is basically a $ sign with the variable
    name included within curly brackets.

    - While calling the **Calculate_Square** function, the underscore between the
    words **Calculate** and **Square** is not included.

    - In order to convert the Scalar Variable **intNumber** to an integer, it is transformed
    using the **int** keyword and thereafter converted to a variable using the $ sign
    again. This is then passed as an argument to the function **Calculate_Square**.

    - There needs to be sufficient space of at least 3 to 4 characters between each
    of the terms in the line of code above, else the IDE fails to identify the terms
    resulting in errors.


    7. Finally, we write the actual test which is the line that would perform the
    validation using the line of code below.


    ```

    Should Be Equal As Numbers ${answer} 100

    ```


    We use the **Should Be Equal As Numbers** method of the Robot Framework, which
    would take two arguments and basically validate whether they are the same or different.
    If they are the same, then the test would pass, else it would fail.


    8. We are all set to run the test case now! As shown in *Figure 16.18* below,
    go to the **Run** tab and select the **V**'
