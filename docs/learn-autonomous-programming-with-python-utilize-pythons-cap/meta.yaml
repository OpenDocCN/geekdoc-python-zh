  mdcn: "从输出结果可以看出，LDA技术使用了2个成分，第一个成分解释了99%的方差，而第二个成分仅解释了约1%的方差。\n\n## K均值聚类\n\nK均值聚类是一种常用的无监督学习算法，它将数据集中未标记的点分组到相似的簇中。名称**k均值**源于这样一个事实：**k**是在算法开始时选择的任意簇数。之后，我们为每个簇随机选择**k**个任意的质心，并根据每个点与簇质心之间的欧几里得距离，将数据集中的每个点与其最近的簇关联起来。这里的目标是优化这些质心的位置。接下来，我们计算属于特定簇的数据集中每个点的均值，然后更新簇中心位置以与均值重合。这个过程会迭代进行，直到无法进一步收敛。\n\
    \n我们将使用相同的鸢尾花数据集在Python中实现K均值聚类，以便评估聚类的准确性。要使用Scikit-learn在Python中实现该算法，请在Python编辑器中复制并运行以下代码：\n\
    \n```python\nfrom sklearn.model_selection import train_test_split\nfrom sklearn.datasets\
    \ import load_iris\nfrom sklearn.cluster import KMeans\n\niris = load_iris()\n\
    X = iris.data\nY = iris.target\n\nsse = {}\nfor i in range(1, 11):\n    kmeans\
    \ = KMeans(n_clusters=i,\n                    init='k-means++',\n            \
    \        max_iter=300,\n                    n_init=10,\n                    random_state=0)\n\
    \    kmeans.fit(X)\n    sse[i]=kmeans.inertia_\n\nimport matplotlib.pyplot as\
    \ plt\n\nplt.figure()\nplt.plot(list(sse.keys()), list(sse.values()))\nplt.xlabel(\"\
    Number of clusters\")\nplt.ylabel(\"SSE\")\nplt.show()\n```\n\n*图9.1*展示了运行代码后得到的图表。该图表用于确定最佳的簇数：\n\
    \n![img/3bdf02f00d53ff55047d1e1759de2882_231_0.png](img/3bdf02f00d53ff55047d1e1759de2882_231_0.png)\n\
    \n**图9.1：** *使用肘部法则确定最佳簇数*\n\n让我们来理解一下代码。我们创建了一个循环，将簇数从1递增到10。然后，我们使用**inertia_**方法计算每次迭代的误差平方和。接着，我们绘制了簇数与SSE值的关系图。这种方法被称为确定K最佳值的肘部法则。根据肘部法则，获得的最佳值是图表失真开始呈线性趋势下降之后的那个值。我们从图中观察到，当簇数为**3**时，图表在超过该值后呈线性趋势下降。因此，K的最佳值是**3**，我们已经知道这是正确的，因为这是一个包含三种类型花朵的有标签数据集。\n\
    \n现在，让我们使用簇数*K*=3来实现K均值聚类算法。在Python编辑器中复制并运行以下代码：\n\n```python\nkmeans = KMeans(n_clusters=3,\n\
    \    init='k-means++',\n    max_iter=300,\n    n_init=10,\n    random_state=0)\n\
    y_kmeans = kmeans.fit_predict(X)\nprint(y_kmeans)\n```\n\n**输出：**\n\n```\n[1 1\
