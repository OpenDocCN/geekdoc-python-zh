    \ BATSMAN | LHB |\n| David Miller | BA1 | South Africa | F | 32 | BATSMAN | LHB\
    \ |\n\n**Figure 9.2:** IPL Auction 2022 Dataset from Kaggle\n\nFrom the figure\
    \ of the dataset above, there are many variables like **Country** and **State\
    \ Association** that we do not require since they are unrelated to player performance.\
    \ We need to focus only on that information which tells more about a player's\
    \ past performance and ability, thus making a player more probable to be sold\
    \ in an auction. One could clearly see that '**Specialism**', '**Test caps**',\
    \ '**ODI caps**', '**T20 caps**', and '**IPL**' are those key variables that completely\
    \ describe the ability of the player and hence we could select them as the features\
    \ to train the model. The last column '**Bid**' is obviously the target variable\
    \ for the model that contains only two values '**Sold**' and '**Unsold**'. Let\
    \ us execute all of this in a pandas dataframe. Copy and run the code below in\
    \ the Python editor:\n\n```\nimport pandas as pd\nimport numpy as np\ndf = pd.read_csv(r\"\
    IPL_Auction_2022_FullList.csv\")\ndf = df[['Specialism','Test caps','ODI caps','T20\
    \ caps','IPL','Bid']]\n```\n\nWe observe that the column **'Specialism'** contains\
    \ information about whether a player is a batsman, bowler, wicket keeper or all-rounder.\
    \ Though helpful, we would need to make sure that the values here are transformed\
    \ to numeric codes as the model would not be able to process string values.\n\n\
    We get that done using the code below:\n\n```\nmapping_dictionary ={'ALL-ROUNDER'\
    \ : 0, 'BATSMAN' : 1, 'BOWLER' : 2, 'WICKETKEEPER':3}\ndf['Specialism'] = df['Specialism'].map(mapping_dictionary)\n\
    ```\n\nNext, we create the feature and target arrays using the code below:\n\n\
    ```\nX = df.drop('Bid',axis=1).values\nY = df['Bid'].values\n```\n\nOur next step\
    \ is to choose the right classification algorithm for this dataset. Since we are\
    \ interested in only two outcomes **'Sold'** or **'Unsold'**, we can use a logistic\
    \ regression model for this dataset. As usual, we split the data into training\
    \ and testing sets and then train the model on the training sets.\n\nBelow is\
    \ the implementation:\n\n```\nfrom sklearn.model_selection import train_test_split\n\
    from sklearn.linear_model import LogisticRegression\n\nX_Train, X_Test, Y_Train,\
    \ Y_Test = train_test_split(\n    X, Y, test_size = 0.3, random_state=100)\nLR\
    \ = LogisticRegression()\nLR.fit(X,Y)\n```\n\nNow that we have fit the logistic\
    \ regression model on the training dataset, our next task is to evaluate its accuracy\
    \ on the testing dataset using the code below:\n\n```\nfrom sklearn.metrics import\
    \ accuracy_score\nY_Predict = LR.predict(X_Test)\naccuracy = accuracy_score(Y_Test,\
    \ Y_Predict)\nprint('Accuracy:', accuracy)\n\nfrom sklearn.metrics import confusion_matrix\n\
    tn, fp, fn, tp = confusion_matrix(Y_Test, Y_Predict).ravel()\nprint('True Negative:'\
    \ + str(tn), 'False Positive:' + str(fp),\n      'False Negative:' + str(fn),\
    \ 'True Positive:' + str(tp))\n```\n\n**Output:**\n**Accuracy: 0.7288135593220338**\n\
    **True Negative:17**\n**False Positive:42**\n**False Negative:6**\n**True Positive:112**\n\
    \nFrom the output above, we see that the model shows an accuracy of 72.88% on\
    \ the testing data, which means that the model is fairly accurate.\nWe have also\
    \ obtained individual values from the confusion matrix. We see that the **True\
    \ Positive** number is high, and the **False Negative** number is low, which means\
    \ that the model has a high accuracy in predicting positive outcomes. We also\
    \ see that the **False Positive** number is high compared to the **True Negative**\
    \ which means that the model does a less accurate job of predicting a negative\
    \ outcome when the outcome is negative. We can assess this from various performance\
    \ metrics related to a confusion matrix.\n\nLet us calculate the various performance\
    \ metrics associated with the confusion matrix as shown below:\n\n- Precision\
    \ = $\\frac{\\text{True Positive}}{\\text{True Positive} + \\text{False Positive}}\
    \ = \\frac{112}{112 + 42} = 72.72\\%$\n- Recall = $\\frac{\\text{True Positive}}{\\\
    text{True Positive} + \\text{False Negative}} = \\frac{112}{112 + 6} = 94.91\\\
    %$\n- False Positive Rate = $\\frac{\\text{False Positive}}{\\text{True Negative}\
    \ + \\text{False Positive}} = \\frac{42}{17 + 42} = 71.18\\%$\n- False Negative\
    \ Rate = $\\frac{\\text{False Negative}}{\\text{True Positive} + \\text{False\
    \ Negative}} = \\frac{6}{112 + 6} = 5.08\\%$\n- True Negative Rate = $\\frac{\\\
    text{True Negative}}{\\text{True Negative} + \\text{False Positive}} = \\frac{17}{17\
    \ + 42} = 28.81\\%$\n- Accuracy = $\\frac{\\text{True Negative} + \\text{True\
    \ Positive}}{\\text{True Positive} + \\text{False Positive} + \\text{True Negative}\
    \ + \\text{False Negative}} = \\frac{17 + 112}{112 + 42 + 17 + 6} = 72.88\\%$\n\
    - F1 Score = $\\frac{2 * \\text{Precision} * \\text{Recall}}{\\text{Precision}\
    \ + \\text{Recall}} = \\frac{2 * 0.7272 * 0.9491}{0.7272 + 0.9491} = 82.34\\%$\n\
    \nIn this model we see that precision, recall, accuracy, and F1 Score are all\
