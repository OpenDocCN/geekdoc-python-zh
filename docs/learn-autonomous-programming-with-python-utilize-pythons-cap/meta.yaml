    # What is RPA


    **Robotic Process Automation** is a technology that enables the construction of
    software robots (known as bots) which automatically perform regular manual operations
    that a human performs on a computer. These operations include opening a website,
    clicking buttons, navigating web pages entering credentials and many more. As
    we see, all these operations are manual and repetitive, consume loads of time
    and have a propensity to be error prone due to human intervention and fatigue.


    RPA exactly solves this problem by enabling automated execution of the entire
    repetitive business process workflow. Also, RPA being a bot does not suffer from
    human shortcomings like error and fatigue. Hence, it will save a tremendous amount
    of time and effort for an organization.


    # Components of RPA


    We have now understood that RPA is software enabling the creation of bots for
    process automation. Like every other software, RPA has certain components which
    are generic to all the RPA products that we have in the market. Let us look at
    each of these components:


    +   - **Recorder:** This is the most important but basic and user-friendly component
    of an RPA tool. This is similar to the **Record Macro** feature that Microsoft
    Excel provides. In this feature, the user records the manual process while it
    is being performed. What the recorder does is that it captures salient elements
    that are being navigated by the user on the screen like buttons, web page URLs
    and dropdowns and treats them as objects. It also captures the properties of these
    objects. After the recording is complete, the user has the flexibility to edit
    these properties and make them generic by passing'
