    # # Chapter 9. Expressions


    An "expression" comprises operators and operands and it evaluates to a value.
    A value is (trivially) an expression.


    In Python, the building blocks of an expression are called "atoms". Atoms include
    [lexical tokens](lexical tokens) like identifiers and literals, and they can be
    nested. Expressions enclosed in parentheses, square brackets or curly braces are
    also syntactically atoms.


    At the next level up, the following "primaries" represent the most tightly bound
    operations:


    **Attribute References**

    A primary followed by a period and a name, called the attribute reference, is
    also a primary. An object''s attribute reference can be customized by overriding
    its `__getattr__` method.


    **Subscriptions**

    Subscription, or indexing, of a sequence (e.g., string, tuple, or list) or mapping
    object (e.g., dictionary) selects an item from the given collection. User-defined
    objects can support subscription by implementing a `__getitem__` method.


    **Slicings**

    A slicing selects a range of items in a sequence object. Slicings may be used
    as expressions or as targets in assignment or `del` statements. The primary is
    indexed (using the same `__getitem__` method as the subscription) with a key that
    is constructed from the slice list, as follows.


    +   - If the slice list contains at least one comma, the key is a tuple containing
    the conversion of the slice items.

    - Otherwise, the conversion of the lone slice item is the key.'
