  mdcn: "## 3.4. 名称与作用域示例\n\n指的是在最小包含函数作用域中绑定的名称。如果在编译时未找到该名称绑定，则会引发 `SyntaxError`\
    \ 异常。\n\n以下是一个单一模块（例如，名为 *my_module.py* 的 Python 源文件），它演示了函数和类块以及在这些块中定义的变量的作用域。（注意：出于格式原因，程序/模块被分成了三个部分。）\n\
    \n*my_module.py*\n\n```\n1 x, w = 1, 2 ①\n2\n3 def var_demo(): ②\n4     y = 3\
    \ ③\n5     print(\"A\", x, w, y) ④\n6     def inner_function(): ⑤\n7         w\
    \ = 22 ⑥\n8         nonlocal y ⑦\n8         y = 33 ⑧\n10        print(\"B\", x,\
    \ w, y) ⑨\n11    inner_function() ⑩\n12    print(\"C\", x, w, y) ⑪\n```\n\n① 变量\
    \ `x` 和 `w` 对模块是*局部*的，因此它们是*全局*变量。它们的作用域包括整个模块，第 1-28 行。\n\n② 函数定义。它创建了一个块，第 4-12\
    \ 行。\n\n③ 名称绑定将名称引入当前作用域。因此，`y` 对此函数是局部的，其作用域是同一个块，第 4-12 行。\n\n④ 此时，我们无法轻易判断这个\
    \ `print` 函数会打印出什么，例如，如果不通读/理解整个程序的话。`x` 和 `w` 是全局的，因此在执行此语句时，它们的值可能已在代码中的某处被更改。`y`\
    \ 的当前值是 3。\n\n⑤ 内部函数定义。它创建了一个嵌套作用域。\n\n⑥ 新的变量绑定。`w` 是 `inner_function` 函数的局部变量，其作用域是函数块，第\
    \ 7-10 行。\n\n⑦ `nonlocal` 语句断言我们将使用外部函数作用域中的变量 `y`，第 4-12 行。\n\n⑧ 我们正在为这个非局部变量\
    \ `y` 赋予一个新值 33。如果没有 `nonlocal` 声明，此语句可能会在局部作用域（第 7-10 行）中引入一个新的变量 `y`。\n\n⑨ 此时，`x`\
    \ 是全局变量，`w` 是局部变量（对 `inner_function` 局部），`y` 是非局部变量（但对 `var_demo` 局部）。\n\n⑩ 调用\
    \ `inner_function` 可能（潜在地）改变了全局 `x` 和非局部 `y` 的值，但对全局 `w` 应该没有影响。\n\n⑪ 它打印全局 `x`\
    \ 和 `w`，以及局部 `y`（对 `var_demo` 局部）。\n\n```\n14 class VarDemo: ①\n15     z = 5 ②\n\
    16     global w ③\n17     w = 222 ④\n18     print(\"D\", x, w, z) ⑤\n19     def\
    \ inner_method(self): ⑥\n20         print(\"E\", x, w, self.z) ⑦\n21         self.z\
    \ = 10 ⑧\n22         print(\"F\", x, w, self.z) ⑨\n```\n\n① 类定义创建了一个新的作用域（在全局作用域内）。\n\
    \n② `z` 是类块中的局部变量。其作用域是第 15-18 行，不包括被包含的函数/方法块，例如第 19-22 行。\n\n③ 此 `global` 语句声明名称\
    \ `w` 与在全局作用域中定义的是同一个。\n\n④ 此赋值将全局 `w` 的值更改为 `222`。如果没有 `global` 声明，此语句可能会在局部作用域（第\
    \ 15-18 行）中引入一个新名称 `w`。\n\n⑤ 此时，`x` 和 `w` 指向全局变量（首次绑定在第 1 行），`z` 指向局部变量。\n\n⑥\
    \ 内部方法定义。它在*全局作用域*内（而不是在 `VarDemo` 的作用域内）创建了一个新的作用域。\n\n⑦ 全局 `x` 和全局 `w`。`self.z`\
    \ 指向类变量 `z`（因为名为 `z` 的实例变量（尚未）存在）。\n\n⑧ 这创建了一个新的实例变量 `z`，它遮蔽了在第 15 行定义的类变量 `z`。\n\
    \n⑨ 此时，`self.z` 指向实例变量 `z`。类变量与实例变量将在后面的章节“类”中更详细地讨论。\n\n```\n25 if __name__ ==\
