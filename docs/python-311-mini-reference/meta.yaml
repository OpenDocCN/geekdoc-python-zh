    \ a break statement.\n\n④ The break statement is executed after printing the first\
    \ 1. The second print statement is skipped.\n\n⑤ The finally clause is still executed\
    \ before exiting the loop.\n\n## 10.7. The continue Statement\n\nJust like break,\
    \ a continue statement can only be used directly in a for or while loop. It continues\
    \ with the next cycle of the innermost enclosing loop, without executing the rest\
    \ of the statements in the current loop.\n\n```\n>>> for i in range(3):\n... \
    \    try:\n...         print(i)\n...         if i == 1:\n...             continue\n\
    ...         print(i)\n...     finally:\n...         print(\"finally\")\n... else:\n\
    ...     print(\"huh?\")\n...\n0\n0\nfinally\n1\nfinally\n2\n2\nfinally\nhuh\n\
    ```\n\n① A for loop.\n\n② A continue statement in this for loop.\n\n③ The continue\
    \ statement is executed after printing the first 1. The second print statement\
    \ is skipped.\n\n④ The finally clause is still executed before continuing with\
    \ the next iteration.\n\n⑤ The next iteration continues.\n\n⑥ The else clause\
    \ is executed when the loop is normally terminated.\n\n## 10.8. The global Statement\n\
    \nThe global statement, the keyword global followed by a comma-separated list\
    \ of names, indicates that the declared names, in the current code block, are\
    \ to be interpreted as globals (e.g., the current module scope). The names listed\
    \ in a global statement cannot be used in the same code block before that global\
    \ statement.\n\nNote the asymmetry between name binding and use in Python. There\
    \ is no way to bind a value to a global variable without using the global declaration\
    \ in a non-global code block. On the other hand, to access the value of a global\
    \ variable, the global declaration is not needed.\n\n```\n>>> def f():\n...  \
    \   print(x)          ①\n...     global y          ②\n...     y = 4          \
    \   ③\n...     print(y)\n...\n>>> x, y = 1, 2          ④\n>>> f()            \
    \      ⑤\n1\n4\n```\n\n① No global declaration is needed to access the (later-defined)\
    \ global variable, x, in the function scope. Note that the variable x is used\
    \ within the function f without declaring it first. This is called a \"free variable\"\
    .\n\n② This global declaration allows the global variable, y, to be assignable.\n\
    \n③ After the global statement, we can assign a value to the global variable.\
    \ Now, y is bound to a different object 4 in this example.\n\n④ The global variables,\
    \ x and y, are declared.\n\n⑤ The function call f() uses these global variables.\n\
    \n## 10.9. The nonlocal Statement\n\nThe nonlocal statement works in a similar\
    \ way as the global statement. The names declared in a nonlocal statement refer\
    \ to the previously bound variables in the innermost enclosing scope (excluding\
    \ globals).\n\n```\n>>> def a():\n...     x, y = 1, 2\n...     def b():\n... \
    \        print(x)\n...         nonlocal y\n...         y = 4\n...         print(y)\n\
    ...     b()\n...\n>>> a()\n1\n4\n```\n\n① x and y are variables local to the code\
    \ block of the function definition for a."
  mdcn: "## 10.2. 赋值语句\n\n将结果对象从左到右依次赋值给左侧对应的目标列表。如果目标列表是一个没有尾随逗号的单个目标，则将对象赋值给该目标。（如前所述，将表达式列表赋值给目标列表是[元组打包](https://docs.python.org/3/reference/expressions.html#tuple-packing)和[序列解包](https://docs.python.org/3/reference/expressions.html#sequence-unpacking)的组合。）\n\
