    # 10.8. The global Statement


    The global statement, the keyword global followed by a comma-separated list of
    names, indicates that the declared names, in the current code block, are to be
    interpreted as globals (e.g., the current module scope). The names listed in a
    global statement cannot be used in the same code block before that global statement.


    Note the asymmetry between name binding and use in Python. There is no way to
    bind a value to a global variable without using the global declaration in a non-global
    code block. On the other hand, to access the value of a global variable, the global
    declaration is not needed.


    ```

    >>> def f():

    ...     print(x)          ①

    ...     global y          ②

    ...     y = 4             ③

    ...     print(y)

    ...

    >>> x, y = 1, 2          ④

    >>> f()                  ⑤

    1

    4

    ```


    ① No global declaration is needed to access the (later-defined) global'
