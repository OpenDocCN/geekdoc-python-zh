    # Chapter 8. Compound Types


    Objects can be built from other objects. Likewise, types can be built from other
    types. They are called the complex or "compound types".


    Python''s builtin compound types such as tuples and lists, which we will discuss
    in this chapter, and the user-defined compound types, which we will discuss later
    in the book, are built using other (simple and complex) types as building blocks.


    Python''s builtin compound types fall into three categories,


    +   - Sequences, such as `tuple` and `list`,

    - Sets, such as `set`, and

    - Mappings, such as `dict`.


    We will go through each of these three categories in this chapter after a brief
    discussion on how to construct tuples, lists, sets, and dicts.


    # 8.1. Tuples, Lists, Sets, and Dictionaries


    The builtin collection types, tuples, lists, sets, and dictionaries, can be constructed
    in a few different ways.


    # 8.1.1. Constructors


    First, we can use type constructors, `tuple`, `list`, `set`, and `dict`.


    ```

    >>> tuple()

    ()

    >>> list()

    []

    >>> set()

    set()

    ```'
