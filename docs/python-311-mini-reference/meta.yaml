    # 14.3.4. Multiple inheritance


    When there are multiple direct base classes for a given class, these base classes
    as well as their base classes, and their bases classes, etc., up to object, are
    "linearized" for the purposes of looking up any inherited attributes.


    This is called the MRO (method resolution order) in Python, and it is done through
    a method called the "C3 Linearization algorithm". It essentially tries to find
    an order that is consistent with the left-to-right ordering of the base classes
    of each class involved. This method yields, if successful, a unique ordering among
    all (direct or indirect) base classes, including object, of a given class. This
    is not always achievable, and in such cases, a compile error is raised. An obvious
    example is attempting to inherit from two classes whose base classes have incompatible
    orders.


    ```

    class A: pass

    class B: pass

    class C(A, B): pass

    class D(B, A): pass

    class E(C, D): pass

    ```


    In this example, there is no way to consistently order all base classes of E (A,
    B, C, D, and object) because C requires an A → B ordering,'
