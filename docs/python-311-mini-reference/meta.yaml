    The following names are used as reserved words, or keywords of the language, and
    they cannot be used as ordinary identifiers.


    - False True None and as assert async await break class continue def del elif
    else except from finally for global if import in is lambda nonlocal not or pass
    raise return try while with yield


    ## 5.3.2. Reserved classes of identifiers


    In addition to keywords, certain classes of identifiers have special meanings
    to Python. These classes are identified by the patterns of leading and trailing
    underscore characters:


    **_**

    The special identifier `_` is used in the interactive interpreter to store the
    result of the last evaluation.


    **_xyz**

    Not imported by `from module import *`.


    **__xyz__**

    System-defined names, informally known as "dunder names". These names are defined
    by the interpreter and its implementation (including the standard library).


    **__xyz**

    Class-private names. When used in a class definition, these names are re-written
    to use a mangled form to help avoid name clashes between "private" attributes
    of base and derived classes.


    ## 5.4. Literals


    "Literals" are a particular class of tokens that have special meanings to the
    lexer, other than identifiers and other special tokens. Usually, literals are
    constant values of some built-in types.


    ### 5.4.1. String and bytes literals


    String and bytes literals can be enclosed in matching single quotes ('') or double
    quotes ("). They can also be enclosed in matching groups of three single (''''
    '''') or double (""") quotes.


    The backslash (\) character is used within string and bytes literals to "escape"
    characters that otherwise have special meanings, such as newline, backslash itself,
    or the quote characters.


    Bytes literals, instances of the `bytes` type, are always prefixed with ''b''
    or ''B''. They may only contain ASCII characters. Both string and bytes literals
    may optionally be prefixed with a letter ''r''/''R''. Such literals are called
    raw strings and treat backslashes as literal characters.


    ### 5.4.2. Formatted string literals


    A *formatted string literal*, or *f-string* for short, is a string literal with
    prefix ''f'' or ''F''. These strings may contain replacement fields, which are
    variables or expressions enclosed in curly braces {}. A format specifier may be
    added, after an optional colon :.


    While other string literals always have constant values, f-strings are really
    expressions evaluated at run time.


    An equal sign = can be added after the expression and before the colon and format
    string, if any. When it is included, the result string will have the expression
    text, the = sign, and the evaluated value, concatenated.


    For example,


    ```

    >>> a = 10 / 7

    >>> f"{a}" ①

    ''1.4285714285714286''

    >>> f"a = {a:.5f}" ②

    ''a = 1.42857''

    >>> f"{a=}", f"{10/7=:.5f}" ③

    (''a=1.4285714285714286'', ''10/7=1.42857'')

    ```


    ① A simple f-string.


    ② The replacement field has a format specifier, .5f, after :.


    ③ The equal sign prints out the expression text, followed by =, before the value.


    ### 5.4.3. String literal concatenation


    We can concatenate string expressions using the + operator. As a shortcut, in
    case of adjacent string literals, as well as bytes literals, they can be concatenated
    without using the + operator. They can be delimited by (possibly empty) whitespaces,
    and they have the same effect as the string concatenation using the + operator.


    Literal concatenation can use different quoting styles for each operand. F-string
    literals may be concatenated with plain string literals. For instance,


    ```

    >>> a = "hello"

    >>> (

    ... "hi" "hi" ②

    ... f"{a} world" ③

    ... """bye bye""" ④

    ... )

    ''hihihello worldbye bye''

    ```


    ① The parenthesized expression is used here to put the string literals in multiple
    physical lines, for illustration.


    ② "hi" "hi" is equivalent to "hi" + "hi".


    ③ An f-string literal can be concatenated with other string literals. Again, the
    + operator is optional.


    ④ A triple quoted string literal, which can span multiple physical lines, is concatenated
    with the adjacent formatted string literal, without the + operator in this example.


    ### 5.4.4. Numeric literals


    There are three types of numeric literals: integers, floating point numbers, and
    imaginary numbers.


    Integer literals must start with digits. Literals that start with 0x/0X, 0o/0O,
    and 0b/0B are hexadecimal, octal, and binary numbers, respectively. Decimal numbers
    cannot start with the digit 0 except for the number 0.


    Underscores (_) are ignored for evaluating the value of an integer literal. Integer
    literals cannot start with an underscore, and multiple consecutive underscores
    are not allowed. For example,


    ```

    0b_010 ①

    00000_010 ②

    0x0F ③

    1_000_000 ④

    ```


    ① A binary integer literal representing a decimal number 2.


    ② An integer literal in base 8, representing a decimal number 8.


    ③ A hexadecimal literal equivalent to a decimal number 15.


    ④ A decimal number (base 10). Note that decimal integer literals cannot start
    with 0.


    Floating point literals include a period (.) and/or exponent symbol (e or E).
    The integer and exponent parts are interpreted using base 10.


    Examples of floating point number literals:


    ```

    100.

    03.14

    .0101

    0_0_0e0_0_0

    31.415_927E-10

    ```


    An imaginary literal, a floating point literal with a suffix j or J, yields a
    complex number with a real part of 0.0. An expression 1j * 1j yields a complex
    number (-1+0j).


    To create a complex number with a nonzero real part, one can use an expression
    that adds a floating point number to an imaginary number literal. For instance,


    ```

    100j ①

    03.14J ②

    10E10 + 0.0001E-100j ③

    10 - 0.314_159e+10J ④

    ```


    ① An imaginary literal.


    ② Another imaginary literal.


    ③ An expression comprising real and imaginary number literals.


    ④ Another expression whose type is complex.


    ## 5.5. Compound Type Literals


    The literal syntax for tuples, lists, sets, and dictionaries are discussed in
    the Builtin Compound Types chapter.


    ## 5.6. Operators


    The following tokens are operators in Python:


    | + | - | * | ** | / | // | % | @ |

    |---|---|---|---|---|---|---|---|

    | << | >> | & | \| | ^ | ~ | := | |

    | < | > | <= | >= | == | != | | |


    ## 5.7. Delimiters


    The following tokens, other than whitespaces, serve as delimiters in the Python
    grammar:


    | ( | ) | [ | ] | { | } |

    |---|---|---|---|---|---|

    | , | : | . | ; | @ | = |

    | -> | | | | | |


    The following tokens, the augmented assignment operators, perform operations,
    and they are also lexical delimiters.


    | += | -= | *= | /= | //= | %= | @= |

    |---|---|---|---|---|---|---|

    | &= | \|= | ^= | >>= | <<= | **= | |


    # Chapter 6. Objects


    In Python, data is represented by *objects*. An object has an *identity*, *type*,
    and *value*. An object may be referred to by a "name" (or, "reference"). An object
    has one and only one invariant identity, throughout its lifetime, but it can have
    zero, one, or more names/references at any given moment.


    Python is a dynamically and loosely typed programming language. Although the type
    system is at the heart of the Python programming language, and the types play
    a crucial role in Python programs, they become relevant primarily at run time,
    and only indirectly. (Python''s type system is often called "duck typing".) In
    fact, one can create a new type at run time and one can even change the type of
    an object at run time (although that is not generally a common practice).


    The values of objects of certain types can change. These objects are said to be
    "mutable". For example, builtin data types like lists and dictionaries are mutable
    types. On the other hand, for certain other types, one cannot *directly* modify
    the values of the objects once they are created. They are called "immutable".
    For example, numbers, strings, and tuples are immutable types. (Note that the
    (internal) values of immutable objects can still change.)


    ## 6.1. Identities


    The "identity" is a rather abstract concept, but Python includes a builtin `id`
    function that returns a unique value which can be used as the identity of a given
    object. In fact, the `id` function "defines" the identities of the objects. (In
    CPython implementation, it returns the given object''s memory address.)


