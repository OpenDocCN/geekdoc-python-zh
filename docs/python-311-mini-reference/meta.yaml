    [1, 2, 3] ②

    {1, 2, 3} ③

    {"a": 1, "b": 2, "c": 3} ④

    ```


    ① This literal creates a `tuple` of three integer elements, `1`, `2`, and `3`,
    enclosed in a pair of parentheses `((...))`. For a one-element tuple, a trailing
    comma is required. E.g., `(1,)`.

    ② A `list` literal, enclosed in a pair of square brackets `([...])`.

    ③ A `set` literal, enclosed in a pair of curly braces `({...})`.

    ④ This literal creates a `dict` of three key-value pairs, `("a", 1)`, `("b", 2)`,
    and `("c", 3)`. Dictionaries use the same curly braces `({...})` as sets, for
    their literals. The literal `{}` represents an empty dictionary.


