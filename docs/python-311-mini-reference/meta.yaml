    # # Chapter 13. Functions


    # ## 13.1. Function Definition


    A function definition is a compound statement that defines a user-defined function.


    +   - A `def` function definition defines a user-defined function.

    - When a function definition statement is executed, it creates a function object
    and it binds the function name in the current local namespace to the function
    object.

    - The function definition does not execute the function body. It gets executed
    every time the function object is called.

    - If the first statement in the function body is a string literal expression statement,
    then the literal is used as the value of the function object''s `__doc__` attribute.
    Hence, it becomes the function''s "docstring".


    For example, the following statement, when executed, creates a function object
    named `add` which takes two arguments, `p1` and `p2`, and returns one value.


    ```

    >>> def add(p1, p2):

    ...     "Adds p1 and p2"

    ...     return p1 + p2

    ...

    >>> add.__doc__

    ''Adds p1 and p2''

    >>> add(1, 2)

    3

    ```


    ① The `add` function takes two arguments. Note that there is no way to specify
    the return values in Python. See below.'
