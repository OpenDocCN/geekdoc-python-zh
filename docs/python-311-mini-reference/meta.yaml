    \n④ `a` 和 `b` 引用的对象与之前相同，但 `b` 的值已经改变。\n\n⑤ 右侧的表达式列表求值为一个元组对象。\n\n⑥ `x` 引用一个元组，一个“不可变”对象。\n\
    \n⑦ 不能直接更改其值，因为 `x` 是“不可变”的。\n\n⑧ 然而，如果集合中的某个项或对象的某个属性是可变的，就可以更改其值。在此示例中，`x` 的第二个项恰好是一个可变对象，一个列表\
    \ `[30, 40]`。因此，我们可以更改其值。\n\n⑨ “不可变”的 `x` 的有效值确实发生了变化（尽管 `x` 的第一项和第二项在更改前后仍然是相同的对象）。\n\
    \n## 6.6. 构造函数\n\nPython 的所有类型，无论是内置的还是用户定义的，都包含构造函数，或简称构造函数。类型的名称与构造函数函数的名称相同。或者，更准确地说，类型是“可调用的”。构造函数被调用时，会返回给定类型/类的实例对象。\n\
    \n对于某些内置类型，如元组和列表，也可以使用字面量语法来创建这些类型的实例，我们将在后面的章节“内置复合类型”中进行解释。\n\n```python\n\
    >>> class A: pass\n...\n>>> type(A)\n<class 'type'>\n>>> a = A()\n>>> type(a)\n\
    <class '__main__.A'>\n```\n\n① 类语句创建一个新的类对象，在此示例中是 `A`。\n\n② `A` 的类型是 `type`。\n\
    \n③ `A`，一个类对象，是可调用的。"
