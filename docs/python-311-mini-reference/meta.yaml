    \ matched 0.5 + 2j\")\n...         case \"hello\": ④\n...             print(f\"\
    {val} matched 'hello'\")\n...         case _: ⑤\n...             print(\"Matched\
    \ none\")\n...\nFalse matched False\n30 matched 30\n(0.5+2j) matched 0.5 + 2j\n\
    hello matched 'hello'\nMatched none\n```\n\n① 如果 `val` 是 `False`，则此 case 匹配。\n\
    ② 如果 `val == 30`，则此 case 匹配。\n③ 如果 `val == 0.5 + 2j`，则此 case 匹配。\n④ 如果 `val ==\
    \ \"hello\"`，则此 case 匹配。\n⑤ 捕获所有模式。请注意，如果 case 表达式是 `None`，则元组 `arr` 中的字面量 `None`\
    \ 本可以匹配一个 case。\n\n### 12.2.3. 命名值模式\n\n另一类模式是引用值的名称/变量，包括对象的属性。例如，\n\n```\n>>>\
