  - '[PAGE 19]


    # Chapter 3. Program Execution


    # 3.1. Code Blocks


    A Python program is executed in a series of "execution frames". A piece of Python
    program that is executed as a unit in an execution frame is called a "code block".


    For example, modules and function/class definitions are code blocks, among other
    things. An entire program passed to the interpreter, e.g., as -c option or as
    a file argument, is a code block (more precisely, the top-level code block). So
    is an imported module. The code blocks can be nested.


    # 3.2. Name Binding


    In Python, all values are "objects", and objects are often referred to by their
    "names". Names are introduced by name binding operations.


    For example, `import` statements, function and class definitions, and assignment
    expressions and statements bind names within their enclosing code blocks. Function
    parameters also bind names, within the function definition block. If a name is
    bound in a block, it is a "local variable" of that block by default.


    If a name is bound at the module level, it is also a "global variable". The `import
    statement` of the form “from XYZ import *” can only be used at the module level.
    It binds all names defined in the imported module that do not begin with an underscore
    (_). All names imported this way are global (as well as local with respect to
    the importing module).'
  - '[PAGE 20]


    # 3.3. Scope


    A name is accessible within a particular part of a program, e.g., within the code
    block where the name is bound. This is called a "scope". The scope of a local
    variable bound in a code block includes that block.


    When a name is used in a code block, the smallest enclosing scope is used to find
    the binding of the name. It is called the "name resolution". If the name cannot
    be resolved, then an exception is raised. Depending on the context, `NameError`,
    or more specifically `UnboundLocalError`, may be raised.


    # 3.3.1. Function definition block


    A `function def statement` defines a code block. If a name is bound in a function
    block, then its scope includes this function block and any other blocks that are
    contained/nested therein.


    # 3.3.2. Class definition block


    In a `class definition`, the scope of the names defined in a class block is limited
    to that class block only, *excluding* those of the enclosed methods. The local
    variables that are not bound in the class block are looked up in the global namespace.


    # 3.3.3. The `global` statement


    If a `global statement` is used for a name in a block, then the uses of the name
    refer to its binding in the top-level namespace, which includes those of the code
    block module and the `builtins` module, as well as the builtins namespace.


