    # Calls


    A "call" calls a callable object (e.g., a `function` or `class`) with a (possibly
    empty) series of arguments. All objects having a `__call__` method are callable
    such as built-in functions, methods of built-in objects, class objects, methods
    of class instances, and user-defined functions. All argument expressions are evaluated
    before the call is attempted.


    There are a few different kinds of expressions in Python. An expression can comprise
    one or more other (sub-)expressions, e.g., combined with operators.


    +   - Arithmetic conversions.

    - Arithmetic operations, unary and binary.

    - Bitwise operations, unary and binary.

    - Shifting operations.

    - Comparisons (`==`, `!=`, `>`, `>=`, `<`, `<=`)

    - Boolean operations (`not`, `and`, and `or`).

    - Assignment expressions.

    - Conditional expressions.


    [Lambda expressions](https://docs.python.org/3/reference/expressions.html#lambda)
    and [await expressions](https://docs.python.org/3/reference/expressions.html#await)
    are described later in the book.


    # 9.1. Expression Lists


    An expression list is a series of one or more expressions, separated by commas.
    A trailing comma is optional, except for an expression list comprising a single
    expression. The expressions in an expression list are evaluated from left to right.


    An expression list of one or more expressions yields to a tuple with the'
