    \ of a sequence type. The values of the enum members can be of any type, but immutable\
    \ types such as `int` or `str` are typically used.\n\nYou create a new `enum`\
    \ class by inheriting from the `enum.Enum` type, or one of its subtypes such as\
    \ `enum.IntEnum`. Here’s an example:\n\n```\n>>> from enum import Enum\n>>>\n\
    >>> class Color(Enum):\n...     RED = \"red\"\n...     GREEN = \"green\"\n...\
    \     BLUE = \"blue\"\n...\n```\n\nThe type of an enum member (e.g., `Color.RED`)\
    \ is not the type of its value (e.g., \"red\"). Its type is the same `enum` type,\
    \ e.g., `Color` in this example.\n\n```\n>>> isinstance(Color.RED, Color)\nTrue\n\
    >>> issubclass(Color, Enum)\nTrue\n```\n\nNote that you cannot use an enum type\
