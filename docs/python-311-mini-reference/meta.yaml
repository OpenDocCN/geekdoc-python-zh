    # 6.6. Constructors


    All types of Python, built-in or user-defined, include constructor functions,
    or constructors for short. The name of the type is the same as the name of the
    constructor function. Or, more precisely, a type is "callable". A constructor,
    when called, returns an instance object of the given type/class.


    For some builtin types such as tuples and lists, one can also use the literal
    syntax to create instances of those types as we explain in a later chapter, Builtin
    Compound Types.


    ```

    >>> class A: pass

    ...

    >>> type(A)

    <class ''type''>

    >>> a = A()

    >>> type(a)

    <class ''__main__.A''>

    ```


    ① A class statement creates a new class object, A in this example.


    ② The type of A is type.


    ③ A, a class object, is callable.'
- md: "## 6.7. Boolean Context\n\n(Almost) all objects in Python have \"truth values\"\
    , which depend on their types and values by default. When an object is used in\
    \ an `if` or `while` condition or as an operand of a Boolean operation, its truth\
    \ value is returned. (The `and` and `or` operators work slightly differently.)\n\
    \nThe truth value of an object is `True` by default. It is `False` in the following\
    \ cases:\n\n- If the object/its class has a `__bool__` method defined, and\n \
    \   - This method returns `False`, or\n- If the object does not have a `__bool__`\
    \ method but the object/its class has a `__len__` method, and\n    - This method\
    \ returns `0`.\n\nFor built-in types, the truth values of the following objects\
    \ are `False`:\n\n- `None` and `False`.\n- \"Zero value\" objects of numeric types,\
    \ e.g., `0`, `0.0`, `0j`, etc.\n- Empty collections, e.g., `\"\"`, `()`, `[]`,\
    \ `{}`, etc.\n\nThe truth value of an object of a custom type is always `True`\
    \ by default, regardless of the values of their attributes. In order to give a\
    \ different behavior, e.g., having either `True` or `False` based on their internal\
    \ states, we will need to implement the `__bool__` method. This method, by default,\
    \ does not exist in a custom type.\n\nIf an object, or more precisely its type,\
    \ implements this method, then it is called in the boolean context, e.g., by the\
    \ Python interpreter. For example,\n\n```python\nclass BiggerThan8:\n    def __init__(self,\
    \ zzz):\n        self.zzz = zzz\n    def __bool__(self):\n        return True\
    \ if self.zzz >= 8 else False\n```\n\n```python\n>>> z = BiggerThan8(5)\n>>> bool(z)\n\
    False\n>>> z = BiggerThan8(10)\n>>> bool(z)\nTrue\n```\n\nThe builtin `bool` function\
    \ returns the Boolean value of the argument (object or expression, or name). This\
    \ code provides another example of the \"duck typing\". As long as the object\
    \ `z` is of a type that has the method `__bool__`, it works as expected.\n\n##\
    \ 6.8. Lifetime of an Object\n\nIn Python, we can create objects, e.g., using\
    \ constructors, but there is no way to explicitly destroy them. Any objects that\
    \ are unreachable, e.g., because they do not have any valid names referring to\
    \ them, may be \"garbage collected\" by the Python runtime.\n\nThe `del` statement\
    \ can be used to remove/unbind a name from a given object. Furthermore, Python's\
    \ standard library module `gc` can used to explicitly control various aspects\
    \ of the garbage collection process.\n\n## Chapter 7. Simple Types\n\nA number\
    \ of types are built into the Python programming language. They are called the\
    \ \"builtin\" types. Types can be classified into simple vs compound types. Python's\
    \ builtin compound types are described in the next chapter.\n\n### 7.1. None\n\
    \nThe `NoneType` simple type has a single value, `None`, which generally indicates\
    \ an absence of a (meaningful) value.\n\n`None` has a number of uses in Python.\
    \ For example, a function that does not explicitly return a value is considered\
    \ to be returning `None`. That is, the value of a function call expression that\
    \ does not return any concrete values like `100` or anything else is `None`.\n\
    \n```python\n>>> type(None)          ①\n<class 'NoneType'>\n>>> bool(None)   \
    \       ②\nFalse\n>>> def f(): pass       ③\n...\n>>> print(f())          ④\n\
    None\n```\n\n① `None` is the only value of the type `NoneType`.\n② The Boolean/truth\
    \ value of `None` is `False`.\n③ A function that does not return any value. *It\
    \ returns none*.\n④ The Python REPL does not print the value of an expression\
    \ if it is `None`. We use the `print` function to explicitly print the value of\
    \ the `f()` expression.\n\n### 7.2. NotImplemented\n\nThe `NotImplemented` type\
    \ is another singleton type, and it likewise has a single value, `NotImplemented`.\n\
    \n```python\n>>> type(NotImplemented)\n<class 'NotImplementedType'>\n>>> def f():\
    \ return NotImplemented ①\n...\n>>> f()\nNotImplemented\n>>> if NotImplemented:\
    \ ②\n...     print(\"Not implemented\")\n...\n<stdin>:1: DeprecationWarning: NotImplemented\
    \ should not be used in a boolean context\nNot implemented\n```\n\n① `NotImplemented`\
    \ is sort of an invalid value, and it cannot be used in numerical or comparisons\
    \ operations, for instance.\n\n② The Boolean value of `NotImplemented` used to\
    \ be `True`. It still is, as of this writing. But, its use has been deprecated\
    \ and if you use `NotImplemented` in a Boolean context, Python will raise a warning\
    \ or error.\n\n### 7.3. Ellipsis\n\nAn `ellipsis` literal, `...` (or, `Ellipsis`),\
    \ can be used in a few different places in Python programs where no specific value\
    \ is needed (e.g., as a placeholder).\n\n```python\n>>> type(...), bool(...) ①\n\
    (<class 'ellipsis'>, True)\n>>> Ellipsis is ... ②\nTrue\n```\n\n① The Boolean\
    \ value of ... is `True`.\n② `Ellipsis` and ... are synonyms. They point to the\
    \ same (singleton) object.\n\n### 7.4. Numbers\n\nAll numeric types inherit from\
    \ `numbers.Number` from the `numbers` module. Numeric objects are immutable. In\
    \ fact, the objects of the simple types in Python are all immutable.\n\nOne thing\
    \ to note is that `bool` is a numerical type in Python.\n\n#### 7.4.1. Integers\
    \ (`numbers.Integral`)\n\nThe `numbers.Integral` type defines a set of integers.\n\
    \n**int**\nThe `int` type in Python represent (arbitrary-precision) integers.\n\
    \n**bool**\nThe `bool` type represent the truth values `False` and `True`. Their\
    \ numeric values are `0` and `1`, and their string values are \"False\" and \"\
    True\", respectively.\n\n```python\n>>> import numbers\n>>> issubclass(int, numbers.Integral)\n\
    True\n>>> issubclass(bool, int)\nTrue\n>>> isinstance(True, int), isinstance(10,\
    \ int)\n(True, True)\n```\n\n#### 7.4.2. Real numbers (`numbers.Real`)\n\n**float**\n\
    The float type represents a set of double precision floating point numbers.\n\n\
    ```python\n>>> import numbers\n>>> issubclass(float, numbers.Real)\nTrue\n>>>\
    \ isinstance(1.5, float), isinstance(1.2E-5, float)\n(True, True)\n```\n\n####\
    \ 7.4.3. Complex numbers (`numbers.Complex`)\n\n**complex**\nThe complex type\
    \ represents a set of all pairs of double precision floating numbers, the real\
    \ and imaginary parts.\n\n```python\n>>> import numbers\n>>> issubclass(complex,\
    \ numbers.Complex)\nTrue\n>>> c = 1 + 2j\n>>> isinstance(c, complex), isinstance(0.1\
    \ + .5j, complex)\n(True, True)\n>>> c.real, c.imag\n(1.0, 2.0)\n```\n\n① The\
    \ complex type has attributes real and imag, which return the real and imaginary\
    \ parts of the complex number object, respectively.\n\n## Chapter 8. Compound\
    \ Types\n\nObjects can be built from other objects. Likewise, types can be built\
    \ from other types. They are called the complex or \"compound types\".\n\nPython's\
    \ builtin compound types such as tuples and lists, which we will discuss in this\
    \ chapter, and the user-defined compound types, which we will discuss later in\
    \ the book, are built using other (simple and complex) types as building blocks.\n\
    \nPython's builtin compound types fall into three categories,\n\n- Sequences,\
    \ such as `tuple` and `list`,\n- Sets, such as `set`, and\n- Mappings, such as\
    \ `dict`.\n\nWe will go through each of these three categories in this chapter\
    \ after a brief discussion on how to construct tuples, lists, sets, and dicts.\n\
    \n### 8.1. Tuples, Lists, Sets, and Dictionaries\n\nThe builtin collection types,\
    \ tuples, lists, sets, and dictionaries, can be constructed in a few different\
    \ ways.\n\n#### 8.1.1. Constructors\n\nFirst, we can use type constructors, `tuple`,\
    \ `list`, `set`, and `dict`.\n\n```python\n>>> tuple()\n()\n>>> list()\n[]\n>>>\
    \ set()\nset()\n>>> dict()\n{}\n```\n\n① Calling a `tuple()` type constructor\
    \ function without any arguments creates an empty tuple, whose literal representation\
    \ is `()`.\n② Calling a `list()` constructor, which creates an empty list, `[]`.\n\
    ③ This constructor call `set()` creates an empty set. Note that there is no literal\
    \ syntax for an empty set.\n④ This call `dict()` creates an empty dictionary,\
    \ `{}`.\n\nThese constructors also accept arguments of an iterable type, for their\
    \ initial elements. For instance,\n\n```python\n>>> tuple((1, 2)), tuple([1, 2])\n\
    ((1, 2), (1, 2))\n>>> list((1, 2)), list([1, 2])\n([1, 2], [1, 2])\n>>> set((1,\
    \ 2)), set([1, 2])\n({1, 2}, {1, 2})\n>>> dict([('a', 1), ('b', 2)])\n{'a': 1,\
    \ 'b': 2}\n```\n\n① An iterable of two-element iterables.\n\nIn addition, the\
    \ `dict` constructor supports a special keyword argument syntax. `dict` can also\
    \ be initialized with another mapping object. For instance,\n\n```python\n>>>\
    \ x = dict(a = 1, b = 2)\n>>> x\n{'a': 1, 'b': 2}\n>>> y = dict(x)\n>>> y\n{'a':\
    \ 1, 'b': 2}\n```"
  mdcn: "## 6.7. 布尔上下文\n\n（几乎）Python中的所有对象都有“真值”，这默认取决于它们的类型和值。当一个对象在`if`或`while`条件中使用，或作为布尔运算的操作数时，会返回其真值。（`and`和`or`运算符的工作方式略有不同。）\n\
    \n对象的真值默认为`True`。在以下情况下为`False`：\n\n- 如果对象/其类定义了`__bool__`方法，并且\n    - 该方法返回`False`，或者\n\
    - 如果对象没有`__bool__`方法，但对象/其类定义了`__len__`方法，并且\n    - 该方法返回`0`。\n\n对于内置类型，以下对象的真值为`False`：\n\
    \n- `None`和`False`。\n- 数值类型的“零值”对象，例如`0`、`0.0`、`0j`等。\n- 空集合，例如`\"\"`、`()`、`[]`、`{}`等。\n\
    \n自定义类型对象的真值默认始终为`True`，无论其属性的值如何。为了赋予不同的行为，例如根据其内部状态返回`True`或`False`，我们需要实现`__bool__`方法。此方法在自定义类型中默认不存在。\n\
    \n如果一个对象，或者更准确地说其类型，实现了此方法，那么它会在布尔上下文中被调用，例如由Python解释器调用。例如，\n\n```python\nclass\
    \ BiggerThan8:\n    def __init__(self, zzz):\n        self.zzz = zzz\n    def\
    \ __bool__(self):\n        return True if self.zzz >= 8 else False\n```\n\n```python\n\
    >>> z = BiggerThan8(5)\n>>> bool(z)\nFalse\n>>> z = BiggerThan8(10)\n>>> bool(z)\n\
    True\n```\n\n内置的`bool`函数返回参数（对象或表达式，或名称）的布尔值。这段代码提供了“鸭子类型”的另一个例子。只要对象`z`是具有`__bool__`方法的类型，它就能按预期工作。\n\
    \n## 6.8. 对象的生命周期\n\n在Python中，我们可以创建对象，例如使用构造函数，但没有办法显式地销毁它们。任何不可达的对象，例如因为没有有效的名称引用它们，都可能被Python运行时“垃圾回收”。\n\
    \n`del`语句可用于从给定对象中删除/解绑一个名称。此外，Python的标准库模块`gc`可用于显式控制垃圾回收过程的各个方面。\n\n## 第7章.\
    \ 简单类型\n\nPython编程语言内置了许多类型。它们被称为“内置”类型。类型可以分为简单类型和复合类型。Python的内置复合类型将在下一章中描述。\n\
    \n### 7.1. None\n\n`NoneType`简单类型只有一个值`None`，通常表示（有意义的）值的缺失。\n\n`None`在Python中有多种用途。例如，一个没有显式返回值的函数被认为返回了`None`。也就是说，一个不返回任何具体值（如`100`或其他任何值）的函数调用表达式的值是`None`。\n\
    \n```python\n>>> type(None)          ①\n<class 'NoneType'>\n>>> bool(None)   \
    \       ②\nFalse\n>>> def f(): pass       ③\n...\n>>> print(f())          ④\n\
    None\n```\n\n① `None`是类型`NoneType`的唯一值。\n② `None`的布尔/真值是`False`。\n③ 一个不返回任何值的函数。*它返回none*。\n\
    ④ 如果表达式的值是`None`，Python REPL不会打印该值。我们使用`print`函数来显式打印`f()`表达式的值。\n\n### 7.2. NotImplemented\n\
    \n`NotImplemented`类型是另一个单例类型，它同样只有一个值`NotImplemented`。\n\n```python\n>>> type(NotImplemented)\n\
    <class 'NotImplementedType'>\n>>> def f(): return NotImplemented ①\n...\n>>> f()\n\
    NotImplemented\n>>> if NotImplemented: ②\n...     print(\"Not implemented\")\n\
    ...\n<stdin>:1: DeprecationWarning: NotImplemented should not be used in a boolean\
    \ context\nNot implemented\n```\n\n① `NotImplemented`有点像一个无效值，例如，它不能用于数值或比较运算。\n\
    \n② `NotImplemented`的布尔值曾经是`True`。在撰写本文时，它仍然是。但是，它的使用已被弃用，如果你在布尔上下文中使用`NotImplemented`，Python会引发警告或错误。\n\
    \n### 7.3. Ellipsis\n\n一个`ellipsis`字面量`...`（或`Ellipsis`）可以在Python程序中不需要特定值的几个不同地方使用（例如作为占位符）。\n\
    \n```python\n>>> type(...), bool(...) ①\n(<class 'ellipsis'>, True)\n>>> Ellipsis\
    \ is ... ②\nTrue\n```\n\n① ...的布尔值是`True`。\n② `Ellipsis`和...是同义词。它们指向同一个（单例）对象。\n\
    \n### 7.4. 数字\n\n所有数值类型都继承自`numbers`模块的`numbers.Number`。数值对象是不可变的。事实上，Python中简单类型的对象都是不可变的。\n\
    \n需要注意的一点是，`bool`在Python中是一种数值类型。\n\n#### 7.4.1. 整数 (`numbers.Integral`)\n\n`numbers.Integral`类型定义了一组整数。\n\
    \n**int**\nPython中的`int`类型表示（任意精度的）整数。\n\n**bool**\n`bool`类型表示真值`False`和`True`。它们的数值分别是`0`和`1`，字符串值分别是\"\
    False\"和\"True\"。\n\n```python\n>>> import numbers\n>>> issubclass(int, numbers.Integral)\n\
    True\n>>> issubclass(bool, int)\nTrue\n>>> isinstance(True, int), isinstance(10,\
    \ int)\n(True, True)\n```\n\n#### 7.4.2. 实数 (`numbers.Real`)\n\n**float**\nfloat类型表示一组双精度浮点数。\n\
    \n```python\n>>> import numbers\n>>> issubclass(float, numbers.Real)\nTrue\n>>>\
    \ isinstance(1.5, float), isinstance(1.2E-5, float)\n(True, True)\n```\n\n####\
    \ 7.4.3. 复数 (`numbers.Complex`)\n\n**complex**\ncomplex类型表示所有双精度浮点数对，即实部和虚部。\n\
    \n```python\n>>> import numbers\n>>> issubclass(complex, numbers.Complex)\nTrue\n\
    >>> c = 1 + 2j\n>>> isinstance(c, complex), isinstance(0.1 + .5j, complex)\n(True,\
    \ True)\n>>> c.real, c.imag\n(1.0, 2.0)\n```\n\n① complex类型具有real和imag属性，它们分别返回复数对象的实部和虚部。\n\
    \n## 第8章. 复合类型\n\n对象可以由其他对象构建。同样，类型也可以由其他类型构建。它们被称为复杂或“复合类型”。\n\nPython的内置复合类型，如元组和列表（我们将在本章讨论），以及用户定义的复合类型（我们将在本书后面讨论），都是使用其他（简单和复杂）类型作为构建块构建的。\n\
    \nPython的内置复合类型分为三类，\n\n- 序列，如`tuple`和`list`，\n- 集合，如`set`，以及\n- 映射，如`dict`。\n\
    \n在简要讨论如何构造元组、列表、集合和字典之后，我们将在本章中逐一介绍这三类。\n\n### 8.1. 元组、列表、集合和字典\n\n内置的集合类型——元组、列表、集合和字典——可以通过几种不同的方式构造。\n\
    \n#### 8.1.1. 构造函数\n\n首先，我们可以使用类型构造函数`tuple`、`list`、`set`和`dict`。\n\n```python\n\
    >>> tuple()\n()\n>>> list()\n[]\n>>> set()\nset()\n>>> dict()\n{}\n```\n\n① 调用不带任何参数的`tuple()`类型构造函数会创建一个空元组，其字面表示为`()`。\n\
    ② 调用`list()`构造函数，创建一个空列表`[]`。\n③ 此构造函数调用`set()`创建一个空集合。注意，空集合没有字面语法。\n④ 此调用`dict()`创建一个空字典`{}`。\n\
    \n这些构造函数也接受可迭代类型的参数作为其初始元素。例如，\n\n```python\n>>> tuple((1, 2)), tuple([1, 2])\n\
    ((1, 2), (1, 2))\n>>> list((1, 2)), list([1, 2])\n([1, 2], [1, 2])\n>>> set((1,\
    \ 2)), set([1, 2])\n({1, 2}, {1, 2})\n>>> dict([('a', 1), ('b', 2)])\n{'a': 1,\
    \ 'b': 2}\n```\n\n① 一个包含两个元素可迭代对象的可迭代对象。\n\n此外，`dict`构造函数支持一种特殊的关键字参数语法。`dict`也可以用另一个映射对象初始化。例如，\n\
    \n```python\n>>> x = dict(a = 1, b = 2)\n>>> x\n{'a': 1, 'b': 2}\n>>> y = dict(x)\n\
    >>> y\n{'a': 1, 'b': 2}\n```"
