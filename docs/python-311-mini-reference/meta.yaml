    \ 'unknown_name' is not defined\n>>>\n```\n\n① Python REPL 处理了错误，程序没有崩溃。它等待用户的下一个命令。\n\
    \n在存在活动 `Exception` 的上下文中，`raise` 语句会重新抛出当前的异常/错误。此示例代码与以下代码或多或少等价，后者显式地抛出当前异常。\n\
    \n```\n>>> try:\n...     sum = 100 + unknown_name\n... except NameError as ex:\n\
    ...     raise ex\n...\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 4, in <module>\n  File \"<stdin>\", line 2, in <module>\nNameError: name\
    \ 'unknown_name' is not defined\n```\n\n## 11.5. with 语句\n\n`with` 语句用于将一组语句的执行包装在由上下文管理器定义的方法中。例如，它可以用于封装常见的\
    \ `try...except...finally` 使用模式。其语法如下：\n\n```\nwith Expression as Target:  # ①\n\
    \    Suite\n```\n\n① `as` 子句是可选的。\n\n`Expression` 必须求值为一个上下文管理器类型，该类型支持 `__enter__`\
    \ 和 `__exit__` 方法。`with` 语句的执行过程如下：\n\n- 对上下文 `Expression` 求值以获取一个上下文管理器。\n- 首先加载上下文管理器的\
    \ `__enter__` 方法。\n- 接着加载上下文管理器的 `__exit__` 方法。\n- 调用 `__enter__` 方法。\n- 如果指定了\
    \ `Target`，则将 `__enter__` 的返回值赋值给 `Target`。\n- 执行 `Suite` 中的语句。\n- 调用 `__exit__`\
    \ 方法。\n\n例如，\n\n```\n>>> import pathlib\n>>> path = pathlib.Path(\"hello.py\"\
    )\n>>> with (c := path.open(\"w\")) as file:  # ①\n...     file.write(\"print('Hello\
    \ World!')\")  # ②\n...  # ③\n```\n\n```\n>>> type(c) ④\n<class '_io.TextIOWrapper'>\n\
    >>> dir(c) ⑤\n['_CHUNK_SIZE', '__class__', '__del__', '__delattr__',\n'__dict__',\
    \ '__dir__', '__doc__', '__enter__', '__eq__',\n'__exit__', ...]\n```\n\n① `path.open`\
    \ 函数返回一个上下文管理器。如果成功，其 `__enter__` 方法返回一个文件对象。*仅用于说明*，我们使用海象运算符将上下文管理器赋值给变量 `c`。（上下文管理器通常不能被“重用”。）\n\
    \n② `with` 语句套件中包含的所有语句都会被执行，例如，直到遇到错误（如果有的话）。\n\n③ 在终止 `with` 语句之前，无论错误条件如何，都保证会调用上下文管理器的\
    \ `__exit__` 方法。\n\n④ 内部类型 `_io.TextIOWrapper` 是一个类管理器。\n\n⑤ 此对象包含预期的 `__enter__`\
    \ 和 `__exit__` 方法。\n\n`with` 头部可以包含多个表达式-目标项。当有多个表达式-目标对时，上下文管理器的处理方式就像多个 `with`\
    \ 语句从左到右嵌套一样。\n\n例如，\n\n```\n>>> with open(\"a.txt\") as f1, open(\"b.txt\") as\
