    # 10.9. The nonlocal Statement


    The nonlocal statement works in a similar way as the global statement. The names
    declared in a nonlocal statement refer to the previously bound variables in the
    innermost enclosing scope (excluding globals).


    ```

    >>> def a():

    ...     x, y = 1, 2

    ...     def b():

    ...         print(x)

    ...         nonlocal y

    ...         y = 4

    ...         print(y)

    ...     b()

    ...

    >>> a()

    1

    4

    ```


    ① x and y are variables local to the code block of the function definition for
    a.'
- md: "## 10.10. The `del` Statement\n\nA `del` statement deletes the listed target\
    \ name(s). Deletion of a target list recursively deletes each target, from left\
    \ to right. If a target name is unbound, a `NameError` exception will be raised.\n\
    \nDeletion of a name removes the binding of that name from the local or global\
    \ namespace, depending on whether the name occurs in a `global` statement in the\
    \ same code block.\n\nFor example,\n\n```\n>>> x = 1\n>>> def f():\n...     global\
    \ x\n...     del x ①\n...\n>>> print(x)\n1\n>>> f() ②\n>>> print(x) ③\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nNameError:\
    \ name 'x' is not defined\n```\n\n① This `del` statement deletes the global variable\
    \ `x`.\n\n② Calling f() will execute the del statement.\n\n③ Attempting to use\
    \ a deleted/unbound name will raise a NameError exception.\n\n## 10.11. The assert\
    \ Statement\n\nAn assert statement is a convenient way to insert debugging assertions\
    \ into a program. There are two forms. The basic form:\n\n```\nassert <expression>\n\
    ```\n\nThis is equivalent to:\n\n```\nif __debug__:\n    if not <expression>:\
    \ raise AssertionError\n```\n\nNote that the values for the built-in variables,\
    \ such as `__debug__`, are determined when the Python interpreter starts and they\
    \ cannot be modified. The variable `__debug__` is `True` under normal circumstances,\
    \ `False` when optimization is requested (command line option `-O`). The assert\
    \ statement generates no code when optimization is requested at compile time.\n\
    \nThe extended form:\n\n```\nassert <expression1>, <expression2>\n```\n\nis equivalent\
    \ to\n\n```\nif __debug__:\n    if not <expression1>: raise AssertionError(<expression2>)\n\
    ```\n\nFor example,\n\n```\n>>> a = 1, 2, 3, ①\n>>> assert a == (1, 2, 3) ②\n\
    >>> assert a == [1, 2, 3] ③\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nAssertionError\n```\n\n① An expression list evaluates to\
    \ a tuple.\n\n② This assert statement succeeds, and hence there is no output.\n\
    \n③ This assertion fails and it throws an AssertionError.\n\n## Chapter 11. Compound\
    \ Statements\n\nA compound statement comprises other statements, and it affects\
    \ or controls the execution of those statements in some way. A compound statement\
    \ can span multiple (logical) lines.\n\nA compound statement consists of one or\
    \ more \"clauses\". A clause consists of a \"header\" and a \"suite\". The clause\
    \ headers of a particular compound statement are all at the same indentation level.\
    \ Each clause header begins with a uniquely identifying keyword (e.g., `if`, `else`,\
    \ `try`, `except`, etc.), and it ends with a colon (:). A suite is a group of\
    \ one or more statements controlled by the clause. A suite can be\n\n- One or\
    \ more semicolon-separated simple statements on the same line as the header, following\
    \ the colon, or\n- It can be one or more one-level more indented (simple or compound)\
    \ statements on subsequent lines.\n\nPython uses, as in many imperative programming\
    \ languages, the common control flow statements such as the `if` statement, `while`\
    \ statement, and `for` statement. They are all compound statements in Python.\
    \ The `for` statement is often used with the builtin `range` and `enumerate` functions.\n\
    \nThe `try` statement, along with the simple `raise` statement, is used for exception\
    \ handling and/or for providing cleanup code. Another compound statement, the\
    \ `with` statement, which is closely related to the context manager, is used to\
    \ provide initialization and finalization code for a series of statements.\n\n\
    The new `match` statement (new as of 3.10) is discussed later in a broader context\
    \ of pattern matching. Likewise, two other important compound statements, the\
    \ `function def` statement and the `class` definition statement, are discussed\
    \ in their own chapters. Finally, coroutines and other related statements are\
    \ explained separately in the last chapter of the book. async/await is Python's\
    \ new (relatively new) construct for high-level asynchronous programming.\n\n\
    ### 11.1. The if - elif - else Statement\n\nThe if statement is used for conditional\
    \ execution. It selects at most one of the suites by evaluating the expressions\
    \ one by one, from top to bottom, until one is found to be True. Then the corresponding\
    \ suite is executed (and no other part of the if statement is executed or evaluated).\
    \ If all expressions are False, then the suite of the else clause, if present,\
    \ is executed.\n\nFor example,\n\n```\n1 from datetime import datetime\n2\n3 weekday\
    \ = datetime.today().isoweekday() ①\n4\n5 if weekday == 7: ②\n6     println(\"\
    Today is Sunday!\")\n7 elif weekday == 6: ③\n8     println(\"Today is Saturday!\"\
    )\n9 else: ④\n10     println(\"Just another day. :(\")\n11\n12 println(\"Regardless,\
    \ let's learn some programming!\")\n```\n\n① datetime's isoweekday method returns\
    \ integer values, 1 for Monday, 2 for Tuesday, and 7 for Sunday, etc.\n\n② This\
    \ if statement comprises three clauses, if (lines 5-6), elif (lines 7-8), and\
    \ else (lines 9-10). The if expression checks if today is Sunday. If so, it will\
    \ print out today is Sunday! and the control moves to the end of the if statement,\
    \ e.g., line 11.\n\n③ If today is not Sunday, it is then tested against Saturday\
    \ (6). If this expression evaluates to True, the statements in the suite (a single\
    \ statement, line 8, in this example) are executed, and the execution of the if\
    \ statement terminates.\n\n④ In all other cases, this if statement will end up\
    \ printing Just another day :(. After executing the if statement (regardless of\
    \ which clause has been executed), the program execution moves to the next statement,\
    \ line 12, in this example.\n\nNote that, unlike in many C-style languages, Python's\
    \ if statement syntax does not require parentheses around the Boolean expressions\
    \ in the if and elif lines. Parentheses can still be used for grouping purposes.\n\
    \n### 11.2. The while - else Statement\n\nThe while statement is used for repeated\
    \ execution, similar to the for statement. The while statement's execution depends\
    \ on an expression. It tests the expression at every start of iteration and, as\
    \ long as an expression evaluates to True, it executes the first suite. If the\
    \ expression turns False (which may be the first time it is tested), then the\
    \ suite of the else clause, if present, is executed and the loop terminates.\n\
    \nFor both while and for statements,\n\n- A break statement in the while/for suite\
    \ terminates the loop without executing the else clause's suite.\n- A continue\
    \ statement in the while/for suite skips the rest of the statements and goes back\
    \ to testing the expression.\n\nPython 3.0 was first released in 2008, and it\
    \ now has a yearly release schedule (since 2020?). Let's print that information\
    \ out:\n\n```\n>>> year = 2007\n>>> while (year := year + 1) and (year < 3000):\
    \ ①\n...     if year < 2018: ②\n...         if year == 2008:\n...            \
    \ print(f\"Python 3 was first released in {year}.\")\n...         continue ③\n\
    ...     elif year == 2022: ④\n...         print(\"Python 3.11 is to be released\
    \ at the end of 2022.\")\n...         break ⑤\n...\n...     version = f\"3.{year\
    \ - 2011}\"\n...     print(f\"Python {version} in {year}.\") ⑥\n...\nPython 3\
    \ was first released in 2008.\nPython 3.7 in 2018.\nPython 3.8 in 2019.\nPython\
    \ 3.9 in 2020.\nPython 3.10 in 2021.\nPython 3.11 is to be released at the end\
    \ of 2022.\n```\n\n① This `while` statement is effectively an infinite loop (`while\
    \ True: ...`), and its termination is controlled by the `break` statement. The\
    \ condition `year < 3000` is added as a precaution, e.g., to avoid a runaway iteration\
    \ in case there is a bug in the code. The assignment expression `year := year\
    \ + 1`, which always yields `True` in the Boolean context (since `year > 2007\
    \ > 0`), is used here, for illustration. An assignment statement could have been\
    \ used instead, for example, in the first line in the `while` suite.\n\n② When\
    \ `year < 2018`, we merely `continue` except when `year == 2008`.\n\n③ The `continue`\
    \ statement.\n\n④ When `year == 2022`, we print out a special message and terminate\
    \ the loop."
  mdcn: "## 10.10. `del` 语句\n\n`del` 语句会删除列出的目标名称。删除目标列表时，会从左到右递归删除每个目标。如果目标名称未绑定，将引发\
    \ `NameError` 异常。\n\n删除名称会从局部或全局命名空间中移除该名称的绑定，具体取决于该名称是否出现在同一代码块的 `global` 语句中。\n\
    \n例如，\n\n```\n>>> x = 1\n>>> def f():\n...     global x\n...     del x ①\n...\n\
    >>> print(x)\n1\n>>> f() ②\n>>> print(x) ③\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'x' is not defined\n\
    ```\n\n① 此 `del` 语句删除了全局变量 `x`。\n\n② 调用 f() 将执行 del 语句。\n\n③ 尝试使用已删除/未绑定的名称将引发\
    \ NameError 异常。\n\n## 10.11. assert 语句\n\nassert 语句是一种向程序中插入调试断言的便捷方式。它有两种形式。基本形式：\n\
    \n```\nassert <expression>\n```\n\n这等价于：\n\n```\nif __debug__:\n    if not <expression>:\
    \ raise AssertionError\n```\n\n请注意，内置变量（如 `__debug__`）的值在 Python 解释器启动时确定，且无法修改。变量\
    \ `__debug__` 在正常情况下为 `True`，当请求优化时（命令行选项 `-O`）为 `False`。当在编译时请求优化时，assert 语句不会生成任何代码。\n\
    \n扩展形式：\n\n```\nassert <expression1>, <expression2>\n```\n\n等价于\n\n```\nif __debug__:\n\
    \    if not <expression1>: raise AssertionError(<expression2>)\n```\n\n例如，\n\n\
    ```\n>>> a = 1, 2, 3, ①\n>>> assert a == (1, 2, 3) ②\n>>> assert a == [1, 2, 3]\
    \ ③\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    AssertionError\n```\n\n① 表达式列表求值为一个元组。\n\n② 此 assert 语句成功，因此没有输出。\n\n③ 此断言失败，抛出一个\
    \ AssertionError。\n\n## 第 11 章. 复合语句\n\n复合语句包含其他语句，并以某种方式影响或控制这些语句的执行。复合语句可以跨越多个（逻辑）行。\n\
    \n复合语句由一个或多个“子句”组成。子句由一个“头部”和一个“代码块”组成。特定复合语句的所有子句头部都处于相同的缩进级别。每个子句头部以一个唯一标识的关键字（例如\
    \ `if`、`else`、`try`、`except` 等）开始，并以冒号 (:) 结束。代码块是由子句控制的一组一个或多个语句。代码块可以是\n\n-\
    \ 与头部在同一行上、冒号之后的一个或多个用分号分隔的简单语句，或者\n- 可以是后续行上缩进多一级（简单或复合）的一个或多个语句。\n\nPython 与许多命令式编程语言一样，使用常见的控制流语句，如\
    \ `if` 语句、`while` 语句和 `for` 语句。它们在 Python 中都是复合语句。`for` 语句通常与内置的 `range` 和 `enumerate`\
    \ 函数一起使用。\n\n`try` 语句与简单的 `raise` 语句一起用于异常处理和/或提供清理代码。另一个复合语句 `with` 语句与上下文管理器密切相关，用于为一系列语句提供初始化和终结代码。\n\
    \n新的 `match` 语句（3.10 版本新增）将在模式匹配的更广泛上下文中稍后讨论。同样，另外两个重要的复合语句，`function def` 语句和\
    \ `class` 定义语句，将在各自的章节中讨论。最后，协程和其他相关语句将在本书的最后一章中单独解释。async/await 是 Python 的新（相对较新的）用于高级异步编程的构造。\n\
    \n### 11.1. if - elif - else 语句\n\nif 语句用于条件执行。它通过从上到下依次计算表达式，直到找到一个为 True 的表达式，从而最多选择一个代码块。然后执行相应的代码块（并且\
    \ if 语句的其他部分不会被执行或计算）。如果所有表达式都为 False，则执行 else 子句的代码块（如果存在）。\n\n例如，\n\n```\n1\
    \ from datetime import datetime\n2\n3 weekday = datetime.today().isoweekday()\
    \ ①\n4\n5 if weekday == 7: ②\n6     println(\"Today is Sunday!\")\n7 elif weekday\
    \ == 6: ③\n8     println(\"Today is Saturday!\")\n9 else: ④\n10     println(\"\
    Just another day. :(\")\n11\n12 println(\"Regardless, let's learn some programming!\"\
    )\n```\n\n① datetime 的 isoweekday 方法返回整数值，1 代表星期一，2 代表星期二，7 代表星期日，依此类推。\n\n② 此\
    \ if 语句包含三个子句：if（第 5-6 行）、elif（第 7-8 行）和 else（第 9-10 行）。if 表达式检查今天是否是星期日。如果是，它将打印出“今天是星期日！”，然后控制权移动到\
    \ if 语句的末尾，例如第 11 行。\n\n③ 如果今天不是星期日，则接着测试是否是星期六（6）。如果此表达式求值为 True，则执行代码块中的语句（在此示例中为单个语句，第\
    \ 8 行），并且 if 语句的执行终止。\n\n④ 在所有其他情况下，此 if 语句最终将打印“Just another day. :(\"。执行 if\
    \ 语句后（无论执行了哪个子句），程序执行将移动到下一条语句，在此示例中为第 12 行。\n\n请注意，与许多 C 风格语言不同，Python 的 if 语句语法不需要在\
    \ if 和 elif 行中的布尔表达式周围加括号。括号仍可用于分组目的。\n\n### 11.2. while - else 语句\n\nwhile 语句用于重复执行，类似于\
    \ for 语句。while 语句的执行取决于一个表达式。它在每次迭代开始时测试该表达式，并且只要表达式求值为 True，它就执行第一个代码块。如果表达式变为\
    \ False（可能是在第一次测试时），则执行 else 子句的代码块（如果存在），并且循环终止。\n\n对于 while 和 for 语句，\n\n- while/for\
    \ 代码块中的 break 语句会终止循环，而不执行 else 子句的代码块。\n- while/for 代码块中的 continue 语句会跳过剩余的语句，并返回到测试表达式。\n\
    \nPython 3.0 于 2008 年首次发布，现在（自 2020 年起？）采用年度发布计划。让我们打印出该信息：\n\n```\n>>> year =\
    \ 2007\n>>> while (year := year + 1) and (year < 3000): ①\n...     if year < 2018:\
    \ ②\n...         if year == 2008:\n...             print(f\"Python 3 was first\
    \ released in {year}.\")\n...         continue ③\n...     elif year == 2022: ④\n\
    ...         print(\"Python 3.11 is to be released at the end of 2022.\")\n...\
    \         break ⑤\n...\n...     version = f\"3.{year - 2011}\"\n...     print(f\"\
    Python {version} in {year}.\") ⑥\n...\nPython 3 was first released in 2008.\n\
    Python 3.7 in 2018.\nPython 3.8 in 2019.\nPython 3.9 in 2020.\nPython 3.10 in\
    \ 2021.\nPython 3.11 is to be released at the end of 2022.\n```\n\n① 此 `while`\
    \ 语句实际上是一个无限循环（`while True: ...`），其终止由 `break` 语句控制。添加条件 `year < 3000` 是作为预防措施，例如，以避免在代码中存在错误时出现失控迭代。赋值表达式\
    \ `year := year + 1` 在布尔上下文中始终产生 `True`（因为 `year > 2007 > 0`），此处用于说明。也可以使用赋值语句，例如，在\
    \ `while` 代码块的第一行中。\n\n② 当 `year < 2018` 时，我们仅在 `year == 2008` 时执行 `continue`。\n\
    \n③ `continue` 语句。\n\n④ 当 `year == 2022` 时，我们打印出一条特殊消息并终止循环。"
