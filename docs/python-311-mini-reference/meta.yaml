    # Chapter 7. Simple Types


    A number of types are built into the Python programming language. They are called
    the "builtin" types. Types can be classified into simple vs compound types. Python''s
    builtin compound types are described in the next chapter.


    # 7.1. None


    The `NoneType` simple type has a single value, `None`, which generally indicates
    an absence of a (meaningful) value.


    `None` has a number of uses in Python. For example, a function that does not explicitly
    return a value is considered to be returning `None`. That is, the value of a function
    call expression that does not return any concrete values like `100` or anything
    else is `None`.


    ```

    >>> type(None)          ①

    <class ''NoneType''>

    >>> bool(None)          ②

    False

    >>> def f(): pass       ③

    ...

    >>> print(f())          ④

    None

    ```


    ① `None` is the only value of the type `NoneType`.

    ② The Boolean/truth value of `None` is `False`.

    ③ A function that does not return any value. *It returns none*.

    ④ The Python REPL does not print the value of an expression if it is `None`. We
    use the `print` function to explicitly print the value of the `f()` expression.'
