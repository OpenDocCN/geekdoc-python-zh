    # 6.3. Types


    Every object in Python is associated with a "type" besides its identity and value.
    The type of an object affects the object''s behavior. For instance, the type of
    an object defines all possible values that the object can have. Furthermore, the
    type of an object determines the set of operations that the object supports. (Note
    that objects (of most types) in Python are malleable, so to speak, and their behavior
    can change during the execution of the program, regardless of their designated
    types/type names.)


    As another example, the objects of immutable types are "reused" by the Python
    interpreter, when possible. That is, operations that return new objects, or compute
    new values, for immutable types may actually return a reference to any existing
    object with the same type and value. On the contrary, objects are never "reused"
    for mutable types.


    For example,


    ```

    >>> def f():

    ...     a, b = (1, 2), [3, 4]

    ...     print(id(a), id(b))

    ...     p, q = (1, 2), [3, 4]

    ...     print(id(p), id(q))

    ...

    >>> f()

    510220577408 510220577600

    510220577408 510221371520

    ```


    Note that the `ids` of the tuples `a` and `p`, immutable objects, are the same'
