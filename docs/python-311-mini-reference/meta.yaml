    # 14.2. Classes and Instances


    Python''s `class` is just an object (with some special features). But, in Python
    programming, it plays the role of classes in other "class-based" object oriented
    programming (OOP) languages. If nothing else, using classes can help create more
    modular and more structured Python programs, whose components can be more easily
    reusable, etc. In many problem domains, thinking in terms of "classes" and "objects"
    (in the sense of the OOP) can be rather natural and intuitive.


    Just like function definitions, a class definition includes a series of any kind
    of statements. Most class definitions primarily include the definitions of variables
    (e.g., "class variables") and functions (e.g., "static methods", "class methods",
    and "instance methods").


    When a class definition is read/executed by the Python interpreter, these statements
    are executed. For example,


    ```

    >>> class X(object):

    ...     if True:

    ...         print(True)

    ...     else:

    ...         print(False)

    ...

    ```'
