    The following names are used as reserved words, or keywords of the language, and
    they cannot be used as ordinary identifiers.


    +   - False True None and as assert async await break class continue def del elif
    else except from finally for global if import in is lambda nonlocal not or pass
    raise return try while with yield


    # 5.3.2. Reserved classes of identifiers


    In addition to keywords, certain classes of identifiers have special meanings
    to Python. These classes are identified by the patterns of leading and trailing
    underscore characters:


    **_**

    The special identifier `_` is used in the interactive interpreter to store the
    result of the last evaluation.


    **_xyz**

    Not imported by `from module import *`.


    **__xyz__**

    System-defined names, informally known as "dunder names". These names are defined
    by the interpreter and its implementation (including the standard library).


    **__xyz**

    Class-private names. When used in a class definition, these names are re-written
    to use a mangled form to help avoid name clashes between "private" attributes
    of base and derived classes.'
