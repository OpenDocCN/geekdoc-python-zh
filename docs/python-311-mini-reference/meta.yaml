    \n如果你运行该程序，\n\n1. 它将首先将全局 `x` 和 `w` 分别绑定到 `1` 和 `2`。第 1 行。\n2. 它将为 `var_demo`\
    \ 创建一个函数对象。第 3-12 行。\n3. 它将执行 `class` 定义中的语句。第 15-20 行。\n   a. 新的局部变量 `z` 被绑定到\
    \ `5`，第 15 行。\n   b. 全局变量 `w` 被赋予新值 `222`，第 17 行。\n   c. 此 `print` 函数将使用 `x ==\
    \ 1`（第 1 行）、`w == 222`（第 17 行）和 `z == 5`（第 15 行），因此其输出为 `D 1 222 5`。\n   d. 然后，为\
    \ `inner_method` 创建一个函数对象，第 19-20 行。\n4. 接下来，执行 `if` 复合语句。第 23-28 行。\n   a. 将新值\
    \ `10` 赋给全局 `x`，第 24 行。\n   b. 当我们调用函数 `var_demo` 时，`x == 10` 且 `w == 222`，第 25\
    \ 行。\n      i. 局部变量 `y` 被绑定到 `3`，第 4 行。\n      ii. 因此，第 5 行的 `print` 调用打印出 `A\
    \ 10 222 3`。\n      iii. 为 `inner_function` 创建一个函数对象，第 6-10 行。\n      iv. 然后，我们调用此函数，第\
    \ 11 行。\n         A. 当我们执行 `print` 调用语句（第 10 行）时，全局 `x`、局部 `w` 和非局部 `y` 的值分别为\
    \ 10（第 24 行）、22（第 7 行）和 33（第 9 行）。因此，输出将是 `B 10 22 33`。\n      v. 第 12 行的 `print`\
    \ 调用将打印出 `C 10 222 33`，因为全局 `x` 是 `10`（第 26 行），全局 `w` 是 `222`（第 17 行），局部 `y` 是\
    \ `33`（第 9 行）。\n   c. 全局 `x` 在此处被设置为 `20`，第 28 行。\n   d. 我们调用构造函数 `VarDemo`，第\
    \ 29 行，创建一个名为 `obj` 的新对象。`obj` 对象与 `VarDemo` 类共享类变量 `z`，其值为 `5`。\n   e. 当我们在 `obj`\
    \ 上调用 `inner_method` 时，`x == 20` 且 `w == 222`，第 30 行。\n      i. 因此，print 函数调用（第\
    \ 20 行）打印出 `E 20 222 5`。\n      ii. 另一方面，第二个 print 函数调用（第 22 行）打印出 `F 20 222 10`，因为\
    \ `self.z` 现在指向实例变量 `z`，其值为 `10`（第 21 行）。\n\n以下是完整输出：\n\n```\nD 1 222 5\nA 10\
    \ 222 3\nB 10 22 33\nC 10 222 33\nE 20 222 5\nF 20 222 10\n```\n\n## 3.5. 程序启动与终止\n\
    \n如前所述，脚本的主模块 `__main__` 是一个代码块。\n\nPython 解释器通过执行主代码块来启动程序，该代码块随后可以调用其他代码块，而这些代码块又可以调用其他代码块，依此类推。当一个代码块的执行完成时，它会将控制权返回给调用当前代码块的外围代码块。\n\
    \n当主模块代码块的执行完成时，程序终止。\n\n## 3.6. 异常\n\n程序的正常流程（通过代码块调用链）可以使用异常处理机制来绕过。在异常或错误条件下，可以使用\
    \ `raise` 语句显式地“引发”一个异常。当 Python 解释器检测到运行时错误时，也可以引发异常。\n\n引发的异常可以由周围的或任何上游的代码块处理。当异常在任何代码块中都未被处理时，解释器在非交互模式下会终止程序的执行。在\
    \ REPL 模式下，它只是返回到其交互式主循环。无论哪种情况，它都会打印堆栈跟踪信息，除非异常是 `SystemExit`。\n\n异常处理程序通过 `try`\
    \ 语句指定。从 Python 3.11 开始，除了 `try - except` 之外，还支持新的 `try - except*` 语法。\n\nPython\
    \ 中有两种基本的内置异常类型：`BaseException` 和 `Exception`，它们大致分别对应于 Java 的“运行时异常”和“检查型异常”。同样，Python\
    \ 现在（3.11+）包含两种内置异常组类型：`BaseExceptionGroup` 和 `ExceptionGroup`。\n\n异常处理将在本书后面的\
    \ `try` 和 `raise` 语句上下文中进一步讨论。"
