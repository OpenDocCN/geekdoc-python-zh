  mdcn: "# Python 简明参考手册 2022\n\n## 现代 Python 编程语言快速指南（审阅副本）\n\nHarry Yoon\n\n版本 0.9.0，2022-10-03\n\
    \n## 审阅副本\n\n这是审阅副本，不得与他人分享或分发。请将任何反馈或意见发送给作者。\n\n- feedback@codingbookspress.com\n\
    \n本书暂定于 2022 年 10 月 12 日出版。我们希望在发布日到来时，您也能考虑在亚马逊上撰写一篇诚实的评论。\n\n- Python Mini Reference\
    \ 2022: A Quick Guide to the Modern Python Programming Language for Busy Coders\
    \ [https://www.amazon.com/dp/B0B2QJD6P8/]\n\n## 版权\n\n**Python 简明参考手册：**\n*Python\
    \ 编程语言快速指南*\n\n© 2022 Coding Books Press\n\n版权所有。未经出版商事先书面许可，不得以任何形式或任何方式复制、存储在检索系统中或传播本书的任何部分，除非在评论文章或评论中嵌入简短引用。\n\
    \n在编写本书时，我们已尽一切努力确保所提供信息的准确性。但是，本书所含信息是按“原样”出售的，不附带任何明示或暗示的保证。作者、经销商和分销商均不对因本书直接或间接造成的任何损害或声称造成的损害负责。\n\
    \n出版日期：2022 年 10 月\n\nHarry Yoon\n加利福尼亚州，圣地亚哥\n\n## 前言\n\nPython 是一种动态语言。\n\n\
    这意味着许多不同的事情。它意味着该语言更灵活。它意味着 Python 是一种更容易编程的语言。与许多其他编程语言相比，你可以快速编写一个简单的程序，而无需经历太多“仪式”。Python\
    \ 脚本往往需要更少的样板代码。Python 给你更多的自由。\n\n另一方面，这也意味着该语言安全性较低，更容易出错。这意味着用 Python 构建一个更大的系统更难。这意味着用\
    \ Python 编写的软件通常更难长期维护。\n\n有效使用 Python 的关键是理解这种权衡。例如，Python 可以是快速原型设计或“脚本编写”的理想语言。另一方面，Python\
    \ 并不常用于“企业软件”开发。\n\nPython 是一种通用编程语言。Python 用于许多不同的应用领域，从系统管理任务到 Web 应用程序开发。Python\
    \ 现在是科学家们最广泛使用的编程语言之一，他们传统上使用更高级的工具，如 Matlab。Python 为这些“非专业”程序员提供了一条更简单的“升级”路径。现在，Python\
    \ 正在成为机器学习和数据科学的*首选*语言。\n\nPython 对初学者友好。事实上，它似乎是初学程序员最喜欢的第一门语言，甚至比 JavaScript\
    \ 更受欢迎。\n\n然而，应该指出的是，Python *不是*一门简单的语言。在其大约 30 年的历史中，它经历了许多大大小小的变化。用 Python 开始编程仍然很容易。\n\
    \n尽管如此，一旦你达到某个阶段，比如从高级初学者到中级水平，它的复杂性可能会让人难以承受。\n\n本书将为你提供一个关于 Python 语言的广泛且*精炼*的概述，涵盖其最新版本（例如\
    \ 3.10 和 3.11）。本书对任何一直在涉猎 Python 但没有坚实基础的人都可能有用。它也可能对那些有其他编程经验并希望快速了解该语言的人有用。\n\
    \n本书是作为（非正式的）语言参考编写的。本书的目标不是教你如何有效地用 Python 编程，而是提供语言语法的简明总结。如果你有一些基本的编程知识，你可以或多或少地从头到尾阅读本书，无论你的具体编程背景如何，你都应该能够快速获得对\
    \ Python 编程语言的整体理解。\n\n本书面向广泛的读者，但有一个注意事项是，与教程风格的书籍不同，本书有相当多的交叉引用。如果你之前没有用 Python\
    \ 或任何类似语言编程的经验，那么你可能会发现阅读本书的某些部分有点困难。本书不适合完全的初学者。为了简洁起见，它在开头略过了一些基本概念，以便我们可以更多地关注中级和高级主题。\n\
    \n> 本书不是权威的语言参考。为此，我们建议读者参考官方语言规范。\n\n## 目录\n\n- 版权 ................................................................................................\
