    [''__class__'', ... ''__weakref__'', ''one_address'', ''one_name'', ''one_number'']

    ```


    Note that the instance `s` includes more or less the same predefined attributes
    in the original `SoSimple` class as well as other attributes later added to this
    class object `SoSimple`, and those specific to the instance object `s` itself.
    We can also delete an attribute defined in a class or in an instance using the
    `del` statement.'
