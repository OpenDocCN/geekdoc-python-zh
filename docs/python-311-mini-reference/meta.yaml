    ## 12.2.4. Group patterns


    A pattern enclosed in parentheses is also a pattern, in fact, the same pattern.
    For instance,


    ```

    >>> match True:

    ...     case (True):

    ...         print("True is true no matter what")

    ...

    True is true no matter what

    ```


    ## 12.2.5. Capture patterns


    A capture pattern comprises a name. When a match occurs, it binds the subject
    value to the specified name. For instance,


    ```

    >>> match 1 + 2:

    ...     case _sum:                    ①

    ...         print(f"sum is {_sum}.")

    ...

    sum is 3.

    ```


    ① The capture pattern always succeeds. The name `_sum` is bound to the value of
    the subject expression, `3`.


    The name cannot be an underscore (`_`), and the capture pattern always matches
    the subject expression. A capture pattern can be used as part of other patterns
    such as the OR pattern or sequence pattern.


    ## 12.2.6. OR patterns


    We can use the vertical bars | to include alternative patterns in one case. For
    example,


    ```

    >>> today = "Saturday"

    >>> match today.lower():

    ...     case "saturday" | "sunday":     ①

    ...         print("It is a weekend!")

    ...     case _:

    ...         print("Just a weekday.")

    ...

    It is a weekend!

    ```


    ① This case matches if the subject expression is equal to either one of the alternative
    patterns. In this example, `today.lower() == "saturday"`, hence this case ends
    up matching. The patterns in the OR pattern is tested from left to right.


    ## 12.2.7. AS patterns


    The matched expression of the OR pattern can be given a name using the `as` keyword.
    For example,


    ```

    >>> import random

    >>> match random.randint(0, 3):

    ...     case 0 | 2 as e:

    ...         print(f"Got {e}. We are even now.")

    ...     case 1 | 3 as o:

    ...         print(f"Got {o}. That is odd!")

    ...

    Got 1. That is odd!

    ```


    ## 12.2.8. Sequence patterns


    The sequence patterns match structures and values of a sequence expression, e.g.,
    tuples, lists, and strings.


    A sequence pattern uses parentheses (( )) or square brackets ([ ]), and it includes
    one or more subpatterns, separated by commas, each to be matched against an element
    or elements of the subject expression. When only one subpattern is used in parentheses,
    a trailing comma is required. Otherwise, it is considered a group pattern.


    A subpattern can belong to any one of the pattern categories. In addition, at
    most one "star pattern" can be used, using an asterisk (*) followed by a capture
    pattern or a wildcard pattern. The star pattern matches the "remaining elements".
    If there is no star subpattern, all elements in a pattern must match the corresponding
    elements in the subject sequence. (Hence, their lengths should be the same to
    match.)


    Here''s a recursive implementation of the builtin `len` function, using pattern
    matching:


    ```

    >>> def seq_length(seq):

    ...     match seq:

    ...         case []: ①

    ...             return 0

    ...         case [_, *y]: ②

    ...             return 1 + seq_length(y)

    ...

    ```


    ① This is a fixed length pattern. It matches a sequence with zero elements.


    ② This is a variable length pattern, with two subpatterns, a wildcard pattern
    for the first element and the star capture pattern for the rest. This case will
    match any sequence with at least one element. We ignore the specific value of
    the first element, in this example, and use the rest, a subsequence, to call the
    function recursively. Note that the length of a one-element sequence is 1.


    Here''s another example.


    ```

    >>> for p in [(0, 0), (0, 2), (3, 3), (2, 4)]:

    ...     match p:                                    ①

    ...         case (0, 0):                            ②

    ...             print("I''m the origin!")

    ...         case (x, 0):                            ③

    ...             print(f"I''m on the x-axis, x = {x}")

    ...         case (0, y):                            ④

    ...             print(f"I''m on the y-axis, y = {y}")

    ...         case (x, y) if x == y or x == -y:       ⑤

    ...             print(f"I''m on a diagonal, ({x}, {y})")

    ...         case (x, y):                            ⑥

    ...             print(f"I''m just a random point. ;(")

    ...

    I''m the origin!

    I''m on the y-axis, y = 2

    I''m on a diagonal, (3, 3)

    I''m just a random point. ;(

    ```


    ① In this example, the subject expression is a tuple.


    ② This pattern matches the tuple with specified elements, 0 and 0. Note that the
    pattern need not use parentheses (because the subject expression is a tuple in
    this example). Parentheses and square brackets are interchangeable, except for
    the one-element sequence pattern, as we alluded above.


    ③ This pattern comprises a capture subpattern and a literal pattern. This will
    match any two-element tuple with its second element 0, and x will be bound to
    the first element of the tuple.


    ④ Similarly, this fixed-length pattern comprises a literal pattern for the first
    element and a capture subpattern for the second element. This will match any two-element
    tuple with the form (0, y), and y will be bound to the second element of the tuple.


    ⑤ The pattern (x, y) will match any two-element sequence since both subpatterns
    are capture patterns. This particular case includes the "guard". Besides matching
    the pattern, the guard expression must evaluate to True. Otherwise, the pattern
    is considered not a match. Note that we can use the captured names in the guard
    expression.


    ⑥ Since we do not use the captured name in this example, this pattern is equivalent
    to the catch-all wildcard pattern for all valid two-element sequences. The wildcard
    pattern _, if included as the last case, would have caught all expressions which
    are not a two-element sequence.


    ## 12.2.9. Mapping patterns


    The mapping types can be used as patterns as well. It works in a similar manner
    to the sequence pattern, except that the subject expression is a mapping, e.g.,
    a dictionary, and the subpatterns involve keys and values of the mapping elements.


    For example,


    ```

    >>> m = {"k1": 1, "k2": 2, "k3": 3}

    >>> match m:

    ...     case {"k1": 1, "k2": 2}:

    ...         print("Exactly matched the ''k1'' and ''k2'' elements.")

    ...     case {"k1": v1, "k2": v2}:

    ...         print(f"For key ''k1'', the value is {v1}, for ''k2'', the value is
    {v2}.")

    ...     case {"k1": 1}:

    ...         print("Exactly matched the ''k1'' element.")

    ...     case {"k1": v1}:

    ...         print(f"For key ''k1'', the value is {v1}.")

    ...     case {}:

    ...         print("An empty mapping pattern matches all objects of a mapping type.")

    ...

    Exactly matched the ''k1'' and ''k2'' elements.

    ```


    In this example, every case is "matchable" to the given subject expression, a
    dictionary m. Hence, the first case matches, and the match statement terminates.
    The mapping pattern also supports a "double star" subpattern, for "the rest" of
    the elements in a mapping expression. For example, {"k1": v1, **rest}.


    The sequence and mapping patterns can be nested.


    ## 12.2.10. Class patterns


    The class patterns are another category of patterns that Python''s match statement
    supports. A class pattern represents a class and its positional and keyword arguments.
    The keyword argument uses the equal sign (=) instead of the colon (:) in case
    of the mapping pattern.


    Here''s an example,


    ```

    >>> class A:

    ...     def __init__(self):

    ...         self.x, self.y = 1, 2

    ...

    >>> a = A()

    >>> match a:

    ...     case A(x = 1, y = 2):

    ...         print("Matched the attributes ''x'' and ''y''.")

    ...     case A(x = v):

    ...         print(f"Matched the attribute ''x''. Its value is {v}.")

    ...     case A():

    ...         print("As long as ''a'' is of type A, it always matches. In this case,
    the parentheses is optional.")

    ...

    Matched the attributes ''x'' and ''y''.

    ```


    The patterns of the three cases, in this example, are again all compatible with
    the subject expression, an object `a`. Hence, it matches the first case, and the
    `match` statement terminates. The positional argument patterns can be used when
    the type''s constructor function has positional arguments.'
