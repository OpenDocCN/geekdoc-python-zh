    just like static methods, but they receive the class as its first argument (even
    when it is called on an instance). If a class method is called for a derived class,
    the derived class object is passed as the implied first argument.


    The `@classmethod` decorator converts a function to be a class method. For example,


    ```

    >>> class Z:

    ...     @classmethod

    ...     def f2(cls):

    ...         print(f"Class method: {cls.__name__}")

    ...

    >>> Z.f2()

    Class method: Z

    >>> z = Z()

    >>> z.f2()

    Class method: Z

    >>> class Z2(Z): pass

    ...

    >>> Z2.f2()

    Class method: Z2

    ```


    ① The `@classmethod` decorator makes the decorated method a class method.


    ② Without the decoration, this would have been a syntax error.


    ③ By default, methods defined in a class is an instance method, which takes the
    instance object as the implicit first argument. For class methods, the implicit
    first argument is the class object.


    ④ The implicit class object argument is now the subclass `Z2`.'
- md: "## 14.1. Class Definition\n\nA `class` definition is a compound statement that\
    \ defines a callable class object. When executed, it executes the statements in\
    \ the class suite, and it creates an object of the type `type` in memory as specified\
    \ by the class definition.\n\nThe general syntax is as follows:\n\n```\nclass\
    \ MyType(BaseType1, BaseType2):\n    Suite\n```\n\nThe keyword `class` starts\
    \ the statement, followed by the new class name (e.g., `MyType` in this example)\
    \ and an optional list of one or more base classes in the parentheses (e.g., `BaseType1`,\
    \ `BaseType2`, etc.). Python supports \"multiple inheritance\".\n\nWhen no base\
    \ class list is specified, the class inherits from the ultimate base class `object`.\
    \ In such a case, the parentheses after the class name can be omitted. That is,\n\
    \n```\nclass Orange:\n    pass\n```\n\nThis definition is equivalent to the following:\n\
    \n```\nclass Orange(object):\n    pass\n```\n\n- A `class` definition creates\
    \ a local namespace, nested within the global namespace, and the statements in\
    \ the class's suite are executed in the newly created execution frame.\n- A `class`\
    \ object is then created, inherited from the base class(es) as (explicitly or\
    \ implicitly) specified in the base class list, and using the newly created local\
    \ namespace for the class's `__dict__` attribute.\n- The class name, as defined\
    \ in the `class` definition statement, is then bound to this class object in the\
    \ original local namespace (which can be the global namespace).\n\n## 14.2. Classes\
    \ and Instances\n\nPython's `class` is just an object (with some special features).\
    \ But, in Python programming, it plays the role of classes in other \"class-based\"\
    \ object oriented programming (OOP) languages. If nothing else, using classes\
    \ can help create more modular and more structured Python programs, whose components\
    \ can be more easily reusable, etc. In many problem domains, thinking in terms\
    \ of \"classes\" and \"objects\" (in the sense of the OOP) can be rather natural\
    \ and intuitive.\n\nJust like function definitions, a class definition includes\
    \ a series of any kind of statements. Most class definitions primarily include\
    \ the definitions of variables (e.g., \"class variables\") and functions (e.g.,\
    \ \"static methods\", \"class methods\", and \"instance methods\").\n\nWhen a\
    \ class definition is read/executed by the Python interpreter, these statements\
    \ are executed. For example,\n\n```\n>>> class X(object):\n...     if True:\n\
    ...         print(True)\n...     else:\n...         print(False)\n...\nTrue\n\
    ```\n\n① This is the output of the `if` statement. Unlike function definitions,\
    \ Python executes all statements in the `class` definition scope while creating\
    \ a `class` object.\n\nA `class` definition is somewhat similar to a \"module\"\
    . These statements are only executed for the first time when the `class` statement\
    \ is executed (e.g., when the Python interpreter reads the statement). When we\
    \ *use* the \"class object\" (e.g., to create an instance object of that class),\
    \ these statements are not executed. For instance,\n\n```\n>>> x = X()\n>>>\n\
    ```\n\n① We \"call\" the class to create an instance of that class. The \"function\"\
    \ `X()` for class `X` used this way is a *constructor function*.\n② The statements\
    \ in the class definition is not executed.\n\n### 14.2.1. Class objects\n\nPython's\
    \ `class` statement creates a class object in memory (just like the `def` statement\
    \ creates a function object). A `class` object supports the \"[attribute references](https://docs.python.org/3/reference/datamodel.html#attribute-references)\"\
    , e.g., through the dot notation, just like any other Python objects.\n\n```\n\
    >>> class SoSimple:\n...     one_name = \"simple\"\n...\n>>> type(SoSimple)\n\
    <class 'type'>\n>>> SoSimple.one_name\n'simple'\n>>> SoSimple.one_number = 666\n\
    >>> SoSimple.one_number\n666\n>>> dir(SoSimple) ④\n['__class__', ... '__weakref__',\
    \ 'one_name', 'one_number']\n```\n\n① The type of a class object is `type`.\n\
    ② The attribute included in the class definition.\n③ You can add any attributes\
    \ to a class object, just like any other object.\n④ Note that a class object comes\
    \ with a number of predefined attributes all of which start and end with double\
    \ underscores (`__`), aka \"dunder\".\n\nThis type of attributes of a class correspond\
    \ to the static variables (or, static fields) and the static methods in other\
    \ OOP programming languages.\n\n### 14.2.2. Class variables\n\nA class object\
    \ (e.g., defined by the `class` statement) plays two roles, among others. First,\
    \ as we have seen before, it is the *constructor* for the instance objects of\
    \ the given class/type. Second, it holds the common variables across all instances\
    \ of the class. In fact, the class variables are *shared* by all instance objects,\
    \ as we just mentioned.\n\n```\n>>> class Car:\n...     brand = \"GM\"\n...\n\
    >>> car1, car2 = Car(), Car()\n>>> car1.brand, car2.brand\n('GM', 'GM')\n>>> Car.brand\
    \ = \"Ford\"\n>>> car1.brand, car2.brand\n('Ford', 'Ford')\n```\n\n### 14.2.3.\
    \ Constructors\n\nIn addition to the attribute references, a `class` object supports\
    \ the \" instantiation operation\". A `class` object in Python is a constructor\
    \ for the objects of the given class/type.\n\nUsing the same example from earlier,\n\
    \n```\n>>> s = SoSimple()\n>>> type(s)\n<class '__main__.SoSimple'>\n>>> s.one_name\n\
    'simple'\n>>> s.one_number\n666\n```\n\nNote that the instance object, `s`, includes\
    \ the ad-hoc attribute, `one_number`, as well as `one_name`, which is part of\
    \ the original class definition. One can add any additional attributes to a given\
    \ instance object as well:\n\n```\n>>> s.one_address = \"Playa\"\n>>> s.one_address\n\
    'Playa'\n>>> dir(s)\n['__class__', ... '__weakref__', 'one_address', 'one_name',\
    \ 'one_number']\n```\n\nNote that the instance `s` includes more or less the same\
    \ predefined attributes in the original `SoSimple` class as well as other attributes\
    \ later added to this class object `SoSimple`, and those specific to the instance\
    \ object `s` itself. We can also delete an attribute defined in a class or in\
    \ an instance using the `del` statement.\n\n```\n>>> del s.one_number\n>>> dir(s)\n\
    ['__class__', ... '__weakref__', 'one_address', 'one_name']\n```\n\nThe instance\
    \ object `s` no longer has the attribute, `one_number`, after executing the `del`\
    \ statement.\n\n### 14.2.4. The `__init__` function\n\nNote that a class object\
    \ is not only used as a \"template\" when creating an instance object of that\
    \ class, but they essentially share the same attributes.\n\n```\n>>> s = SoSimple()\n\
    >>> s.one_name\n'simple'\n>>> SoSimple.one_name = \"not simple any more\"\n>>>\
    \ SoSimple.one_name\n'not simple any more'\n>>> s.one_name\n'not simple any more'\n\
    ```\n\nClass instantiation (or, instantiating an instance object of a class) can\
    \ be customized by overwriting the `__init__` method of the class. This method\
    \ is automatically called, e.g., by the Python interpreter, after an instance\
    \ has been created.\n\n```\n>>> class SoEasy:\n...     def __init__(self):\n...\
    \         self.one_title = \"programmer\"\n...\n>>> s = SoEasy()\n>>> s.one_title\n\
    'programmer'\n>>> dir(s)\n['__class__', ... '__weakref__', 'one_title']\n```\n\
    \nNote the function signature. The `__init__` method has at least one parameter.\
    \ The first parameter always refers to the instance object just created, which\
    \ is always named `self`.\n\nAn instance object for the type `SoEasy`, in this\
    \ example, has an attribute, `one_title`, automatically attached to it. This is\
    \ because we create this name/attribute and attach it to the `self` object in\
    \ the `SoEasy.__init__` method.\n\n### 14.2.5. Instance objects\n\nAn *instance\
    \ object* of a class includes all the attributes defined in the class, and it\
    \ can include other instance-specific attributes. Attribute references can be\
    \ used to refer to those attributes of an instance object. There are two kinds\
    \ of attributes, the data attributes, or fields or variables, and the methods.\n\
    \nAs mentioned, an instance object, just like everything else in Python, has attributes,\
    \ namely, the data attributes and the method attributes. Initially, most of its\
    \ attributes come from its type, and those added in the `__init__` method, when\
    \ it is created. But, as with other kinds of custom objects (including functions,\
    \ classes, etc.), new attributes can be added to the instance objects.\n\nInstance\
    \ objects have methods that correspond to the functions in a class definition.\
    \ All functions that take an instance object as its first argument (e.g., `self`)\
    \ are, by definition, \"methods\", and Python allows the object method calling\
    \ syntax for these functions. For example,\n\n```\n>>> class Ship:\n...     def\
    \ fly(self):\n...         print(\"I cannot fly. Only spaceships can fly.\")\n\
    ```"
  mdcn: "## 14.1. 类定义\n\n一个 `class` 定义是一个复合语句，它定义了一个可调用的类对象。当执行时，它会执行类套件中的语句，并根据类定义在内存中创建一个\
    \ `type` 类型的对象。\n\n其一般语法如下：\n\n```\nclass MyType(BaseType1, BaseType2):\n    Suite\n\
    ```\n\n关键字 `class` 开始该语句，后跟新的类名（例如，本例中的 `MyType`）以及括号中一个或多个基类的可选列表（例如，`BaseType1`、`BaseType2`\
    \ 等）。Python 支持“多重继承”。\n\n当未指定基类列表时，该类继承自最终基类 `object`。在这种情况下，类名后的括号可以省略。即，\n\n\
    ```\nclass Orange:\n    pass\n```\n\n此定义等同于以下内容：\n\n```\nclass Orange(object):\n\
    \    pass\n```\n\n-   一个 `class` 定义会创建一个局部命名空间，嵌套在全局命名空间中，类套件中的语句在新创建的执行帧中执行。\n\
    -   然后创建一个 `class` 对象，它继承自基类列表中（显式或隐式）指定的基类，并使用新创建的局部命名空间作为类的 `__dict__` 属性。\n\
    -   然后，在 `class` 定义语句中定义的类名被绑定到原始局部命名空间（可以是全局命名空间）中的这个类对象。\n\n## 14.2. 类与实例\n\n\
    Python 的 `class` 只是一个对象（具有一些特殊功能）。但是，在 Python 编程中，它扮演着其他“基于类”的面向对象编程（OOP）语言中类的角色。至少，使用类可以帮助创建更模块化、结构更清晰的\
    \ Python 程序，其组件可以更容易地重用等。在许多问题领域，以“类”和“对象”（OOP 意义上的）来思考可能相当自然和直观。\n\n就像函数定义一样，类定义包含一系列任何类型的语句。大多数类定义主要包含变量（例如，“类变量”）和函数（例如，“静态方法”、“类方法”和“实例方法”）的定义。\n\
    \n当 Python 解释器读取/执行类定义时，这些语句会被执行。例如，\n\n```\n>>> class X(object):\n...     if\
    \ True:\n...         print(True)\n...     else:\n...         print(False)\n...\n\
    True\n```\n\n① 这是 `if` 语句的输出。与函数定义不同，Python 在创建 `class` 对象时会执行 `class` 定义作用域中的所有语句。\n\
    \n一个 `class` 定义在某种程度上类似于一个“模块”。这些语句仅在 `class` 语句首次执行时（例如，当 Python 解释器读取该语句时）执行。当我们*使用*“类对象”（例如，创建该类的实例对象）时，这些语句不会被执行。例如，\n\
    \n```\n>>> x = X()\n>>>\n```\n\n① 我们“调用”类来创建该类的一个实例。以这种方式使用的类 `X` 的“函数” `X()`\
    \ 是一个*构造函数*。\n② 类定义中的语句没有被执行。\n\n### 14.2.1. 类对象\n\nPython 的 `class` 语句在内存中创建一个类对象（就像\
    \ `def` 语句创建一个函数对象一样）。一个 `class` 对象支持“[属性引用](https://docs.python.org/3/reference/datamodel.html#attribute-references)”，例如，通过点表示法，就像任何其他\
    \ Python 对象一样。\n\n```\n>>> class SoSimple:\n...     one_name = \"simple\"\n...\n\
    >>> type(SoSimple)\n<class 'type'>\n>>> SoSimple.one_name\n'simple'\n>>> SoSimple.one_number\
    \ = 666\n>>> SoSimple.one_number\n666\n>>> dir(SoSimple) ④\n['__class__', ...\
    \ '__weakref__', 'one_name', 'one_number']\n```\n\n① 类对象的类型是 `type`。\n② 类定义中包含的属性。\n\
    ③ 你可以向类对象添加任何属性，就像任何其他对象一样。\n④ 注意，类对象自带许多预定义属性，所有这些属性都以双下划线（`__`）开头和结尾，也称为“dunder”。\n\
    \n这种类型的类属性对应于其他 OOP 编程语言中的静态变量（或静态字段）和静态方法。\n\n### 14.2.2. 类变量\n\n一个类对象（例如，由 `class`\
    \ 语句定义的）扮演着两个主要角色。首先，正如我们之前所见，它是给定类/类型的实例对象的*构造器*。其次，它保存着该类所有实例的公共变量。事实上，正如我们刚才提到的，类变量被所有实例对象*共享*。\n\
    \n```\n>>> class Car:\n...     brand = \"GM\"\n...\n>>> car1, car2 = Car(), Car()\n\
    >>> car1.brand, car2.brand\n('GM', 'GM')\n>>> Car.brand = \"Ford\"\n>>> car1.brand,\
    \ car2.brand\n('Ford', 'Ford')\n```\n\n### 14.2.3. 构造器\n\n除了属性引用，一个 `class` 对象还支持“实例化操作”。Python\
    \ 中的一个 `class` 对象是给定类/类型的对象的构造器。\n\n使用之前的同一个例子，\n\n```\n>>> s = SoSimple()\n>>>\
    \ type(s)\n<class '__main__.SoSimple'>\n>>> s.one_name\n'simple'\n>>> s.one_number\n\
    666\n```\n\n注意，实例对象 `s` 包括临时属性 `one_number`，以及原始类定义的一部分 `one_name`。也可以向给定的实例对象添加任何额外的属性：\n\
    \n```\n>>> s.one_address = \"Playa\"\n>>> s.one_address\n'Playa'\n>>> dir(s)\n\
    ['__class__', ... '__weakref__', 'one_address', 'one_name', 'one_number']\n```\n\
    \n注意，实例 `s` 包含与原始 `SoSimple` 类中大致相同的预定义属性，以及后来添加到该类对象 `SoSimple` 的其他属性，还有实例对象\
    \ `s` 本身特有的属性。我们也可以使用 `del` 语句删除在类或实例中定义的属性。\n\n```\n>>> del s.one_number\n>>>\
    \ dir(s)\n['__class__', ... '__weakref__', 'one_address', 'one_name']\n```\n\n\
    执行 `del` 语句后，实例对象 `s` 不再具有属性 `one_number`。\n\n### 14.2.4. `__init__` 函数\n\n注意，类对象不仅在创建该类的实例对象时用作“模板”，而且它们本质上共享相同的属性。\n\
