    ```\n\n① 重新引发当前异常。\n\n```\n>>> try:\n...     raise UnusualException(\"Unusual\"\
    )\n... except BaseException as ex: ①\n...     raise UnusualException(\"Really\
    \ unusual\") from ex ②\n...\nTraceback (most recent call last):\n  File \"<stdin>\"\
