    \nWhen `return` passes control out of a `try` statement with a `finally` clause,\
    \ that `finally` clause is executed before leaving the function.\n\n## 10.5. The\
    \ `raise` Statement\n\nA `raise` statement raises, or throws, an exception or\
    \ an exception group:\n\n- If an argument is provided,\n    - If it evaluates\
    \ to an instance of `BaseException` or its subtype, it raises the exception/exception\
    \ group object.\n    - If the expression is a class, then it creates an instance\
    \ of the class constructed with no argument.\n- If no argument is provided,\n\
    \    - If an exception is active in the current scope, it re-raises this exception.\n\
    \    - Otherwise, it is a `RuntimeError`.\n\nWhen a new exception is raised when\
    \ another exception is currently active, the new exception can be tied to the\
    \ existing exception using the `__cause__` attribute. This is known as the \"\
    exception chaining\". This can be accomplished by attaching the `from` clause\
    \ at the end of a `raise` statement.\n\n```\n>>> class UnusualException(Exception):\
    \ pass ①\n...\n>>> raise UnusualException ②\nTraceback (most recent call last):\
