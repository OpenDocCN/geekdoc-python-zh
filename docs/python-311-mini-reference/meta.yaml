    “字面量”是词法分析器赋予特殊含义的一类特定标记，有别于标识符和其他特殊标记。通常，字面量是某些内置类型的常量值。


    ### 5.4.1. 字符串和字节串字面量


    字符串和字节串字面量可以用匹配的单引号 ('') 或双引号 (") 括起来。也可以用匹配的三单引号 ('''' '''') 或三双引号 (""") 括起来。


    反斜杠 (\) 字符在字符串和字节串字面量中用于“转义”那些原本具有特殊含义的字符，例如换行符、反斜杠本身或引号字符。


    字节串字面量是 `bytes` 类型的实例，始终以 ''b'' 或 ''B'' 为前缀。它们只能包含 ASCII 字符。字符串和字节串字面量都可以选择性地以字母
    ''r''/''R'' 为前缀。这样的字面量称为原始字符串，将反斜杠视为普通字符。


    ### 5.4.2. 格式化字符串字面量


    *格式化字符串字面量*，简称 *f-string*，是带有 ''f'' 或 ''F'' 前缀的字符串字面量。这些字符串可以包含替换字段，即用花括号 {} 括起来的变量或表达式。可以在可选的冒号
    : 之后添加格式说明符。


    虽然其他字符串字面量总是具有常量值，但 f-string 实际上是在运行时求值的表达式。


    可以在表达式之后、冒号和格式字符串（如果有的话）之前添加等号 =。当包含它时，结果字符串将连接表达式文本、= 号和求值后的值。


    例如，


    ```

    >>> a = 10 / 7

    >>> f"{a}" ①

    ''1.4285714285714286''

    >>> f"a = {a:.5f}" ②

    ''a = 1.42857''

    >>> f"{a=}", f"{10/7=:.5f}" ③

    (''a=1.4285714285714286'', ''10/7=1.42857'')

    ```


    ① 一个简单的 f-string。


    ② 替换字段在 : 之后有一个格式说明符 .5f。


    ③ 等号打印出表达式文本，后跟 =，然后是值。


    ### 5.4.3. 字符串字面量连接


    我们可以使用 + 运算符连接字符串表达式。作为快捷方式，对于相邻的字符串字面量以及字节串字面量，可以在不使用 + 运算符的情况下连接它们。它们可以由（可能为空的）空格分隔，其效果与使用
