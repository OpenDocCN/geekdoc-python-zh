    # 14.2.2. Class variables


    A class object (e.g., defined by the `class` statement) plays two roles, among
    others. First, as we have seen before, it is the *constructor* for the instance
    objects of the given class/type. Second, it holds the common variables across
    all instances of the class. In fact, the class variables are *shared* by all instance
    objects, as we just mentioned.


    ```

    >>> class Car:

    ...     brand = "GM"

    ...

    >>> car1, car2 = Car(), Car()

    >>> car1.brand, car2.brand

    (''GM'', ''GM'')

    >>> Car.brand = "Ford"

    >>> car1.brand, car2.brand

    (''Ford'', ''Ford'')

    ```'
