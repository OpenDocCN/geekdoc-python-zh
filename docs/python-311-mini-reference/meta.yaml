    # 6.4. Builtin type Function


    Python provides a builtin type function that returns the type/class of a given
    object. A type is, in fact, a "class object" that creates a type. One of its constructor
    functions takes an object as its argument and returns the object''s type object
    (e.g., possibly "reused").


    For example,


    ```

    >>> type, type(type), type(type(type))

    (<class ''type''>, <class ''type''>, <class ''type''>)

    >>> type(10), type(''hello''), type([1, 2])

    (<class ''int''>, <class ''str''>, <class ''list''>)

    ```


    ① The type of type is type. 😊


    ② The types of objects 10, ''hello'', and [1, 2] are int, str, and list, respectively.


    # 6.5. Mutable vs Immutable Types


    In Python, the mutability/immutability is a characteristic of a type. An object
    of a mutable type is mutable, and an object of an immutable type is immutable.


    One cannot directly change the value of an immutable object. However, that does
    not mean that the object is truly immutable. The object that an attribute of an
    immutable object references can still be mutable, and the overall effective value
    of the immutable object may change. This is generally true for compound types.
    For instance, for immutable container types like tuples, they can still contain
    mutable elements, and'
