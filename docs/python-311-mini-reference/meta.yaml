    \ 语句\n\nnonlocal 语句的工作方式与 global 语句类似。在 nonlocal 语句中声明的名称引用最内层封闭作用域中先前绑定的变量（不包括全局变量）。\n\
    \n```\n>>> def a():\n...     x, y = 1, 2\n...     def b():\n...         print(x)\n\
    ...         nonlocal y\n...         y = 4\n...         print(y)\n...     b()\n\
    ...\n>>> a()\n1\n4\n```\n\n① x 和 y 是函数 a 的函数定义代码块的局部变量。"
