    \ break 语句\n\nbreak 语句可以在 for 或 while 循环中使用，只能直接包含，而不能作为循环内函数或类定义的一部分。它会终止最内层的封闭循环。如果循环有\
    \ else 子句，则会被跳过。\n\n```\n>>> for i in range(3): ①\n...     try:\n...         print(i)\n\
    ...         if i == 1:\n...             break ②\n...         print(i)\n...   \
