  md: '4.3. Package Relative Imports


    # 4.2.2. Namespace packages


    An implicit namespace package is a (virtual) composite package that can include
    subpackages from different locations in the file system (e.g., not constrained
    by the directory hierarchy).


    With namespace packages, there is no package `__init__.py` file. A namespace package
    may correspond to multiple directories unlike the regular packages. For example,
    when the packages `parent/one` and `parent/two` are imported with no physical
    directory corresponding to the `parent` module, Python automatically creates a
    namespace package for the top-level `parent` package.


    # 4.3. Package Relative Imports


    Relative imports use leading dots (.). A single leading dot indicates a relative
    import, starting with the current package. Two leading dots indicate a relative
    import of the parent to the current package, etc.


    Absolute imports may use either the `import X.Y` or `from X import Y` syntax,
    but relative imports may only use the second form. For instance, from a given
    Python script/module `xyz` in a folder `bbb`,


    aaa/bbb/xyz.py


    ```

    from . import efg ①

    from .hij import klm ②

    from .. import mno ③

    from ..opq.qrs import stu ④

