    \ API”的一部分。\n\nPython *确实*对[名称隐藏](https://docs.python.org/3/reference/lexical_analysis.html#private-name-mangling)有一些最小的支持。当类中变量或函数/方法的名称*以至少两个下划线开头，并以最多一个下划线结尾*时，Python\
