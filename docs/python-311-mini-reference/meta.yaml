  mdcn: '## 第一章 引言


    本书将为你概述 Python 语言的语法。


    如今，编程语言本身与标准库之间的界限似乎正变得日益模糊。尽管我们的目标并非全面讲解 Python 标准库（这远超本书范围），但我们仍会涉及标准库模块中一些被认为或多或少属于语言本身的重要概念。


    这本“参考手册”从 Python 最枯燥的部分开始。☺ 如果你打算从头到尾通读本书，而非仅仅将其用作快速参考，那么在初次阅读时可以跳过前几章，待后续需要时再回看。


    “程序”一词在不同语境和不同编程语言中含义各异。我们将从对[什么是 Python 程序](what a Python program is)以及[Python
    程序如何执行](how Python programs are executed)（例如在 Python 解释器中）的较为正式的解释开始。


    Python 程序在逻辑上组织为[包和模块](packages and modules)，接下来我们将对此进行探讨。*模块*对应于物理文件系统中的一个文件，而模块（包括包模块）是
    Python 中代码复用和共享的基本单元。


    接下来，我们将简要介绍 [Python 源代码](Python source code)的一些词法元素。不同编程语言之间存在一些细微差异，但它们的词法构成相当相似，Python
    也不例外。这部分内容在你的“阅读”中可以跳过。


    一般来说，程序由*代码和数据*组成。代码指的是指令。Python 中的数据由*对象*表示。Python 中的对象是一个基本组件。我们在 Python 程序中处理的一切都是对象。本书的主体部分将从介绍与[对象](objects)相关的各种重要概念开始。


    尽管 Python 使用动态类型系统，但类型在 Python 编程语言中仍然扮演着基础性角色。我们首先介绍 Python 中的一些[基本内置类型](basic
    builtin types)。Python 包含相当多的内置类型，而这本参考手册仅涉及其中一部分。如前所述，这本参考手册中讨论的所有主题普遍如此。完整性并非这本*迷你参考手册*的目标。


    Python 还包括一些[内置复合类型](builtin compound types)，如列表和字典，它们是任何非平凡程序的重要组成部分。我们将在[下一章](the
    next chapter)中简要介绍这些类型。高级类型，特别是函数和类，将在本书后面详细讲解。


    与任何命令式编程语言一样，Python 拥有表达式和语句。表达式规定了如何使用其他表达式和值来计算一个值。Python 支持其他命令式语言中常见的[大多数运算符和表达式](the
    common operators and expressions)。如果你有其他过程式编程语言的背景，可以略读这部分的大部分内容。


    语句是指令。语句控制程序的流程以达到预期目标。在 Python 中，有两类语句：[简单语句](simple statements)和[复合语句](compound
    statements)。复合或复杂语句可以“包含”其他简单或复合语句。


    简单语句包括[表达式语句](expression statement)、[赋值语句](assignment statement)、[断言语句](assert
    statement)、[空语句](pass statement)、[删除语句](del statement)、[返回语句](return statement)、[引发语句](raise
    statement)、[中断语句](break statement)、[继续语句](continue statement)、[全局语句](global statement)和[非局部语句](nonlocal
    statement)。Python 的复合语句包括 [if 语句](if statement)、[while 语句](while statement)、[for
    语句](for statement)、[try 语句](try statement)、[with 语句](with statement)、[match 语句](match
    statement)、[函数定义语句](function def statement)、[类定义](class definition)以及其他[协程相关语句](coroutine-related
    statements)。


