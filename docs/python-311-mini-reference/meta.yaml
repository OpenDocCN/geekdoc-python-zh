    # Chapter 15. Coroutines & Asynchronous Programming\n\nA coroutine is essentially\
    \ a generalization of a function, or subroutine. A function has a single entry\
    \ point and, once done executing the function's statements according to its logic,\
    \ it returns the control to the caller once and for all. In contrast, coroutines\
