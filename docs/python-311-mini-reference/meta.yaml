    # 13.8. Function Decorators


    # The @staticmethod decorator


    A "static method" of a class in Python is similar to those in other OOP languages
    like C++, Java, and C#. It is an independent function although it is defined in
    a class definition.


    Syntactically, static methods can called on the class or on an instance, but they
    do not receive an implicit first argument, `self`.


    The `@staticmethod` decorator converts a function within a class definition to
    be a static method. For example,


    ```

    >>> class Y:

    ...     @staticmethod

    ...     def f1():

    ...         print("I am a static method")

    ...

    >>> Y.f1()

    I am a static method

    >>> y = Y()

    >>> y.f1()

    I am a static method

    ```


    +   ① This decorator makes the decorated method a static method.

    ② The method can be called on the class object.

    ③ Without the `@staticmethod` decorator, the method couldn''t have been called
    on an instance object.


    # The @classmethod decorator


    A "class method" of a class in Python is a method defined on a class object, not
    on an instance. Normal methods receive the instance object as implicit first argument.
    In contrast, a class method receive the class object as implicit first argument.


    Syntactically, class methods can called on the class or on an instance,'
