- md: '## Chapter 1. Introduction


    This book will give you an overview of the Python language grammar.


    It appears that the line between the programming language proper and the standard
    library is becoming more blurred these days. Although it is not our goal to go
    through the Python standard library (which is well beyond the scope of this book),
    we will touch upon a few important concepts from the standard library modules
    that are considered more or less part of the language.


    This "reference" starts with the most boring part of Python. ☺ If you plan to
    read the book from beginning to end, say, rather than using it just as a quick
    reference, then you can skip the first few chapters in your first reading, and
    come back to them later when needed.


    The term "program" means different things in different contexts, and across different
    programming languages. We start with somewhat formal explanations of [what a Python
    program is](what a Python program is), and [how Python programs are executed](how
    Python programs are executed), e.g., in the Python interpreter.


    Python programs are logically organized into [packages and modules](packages and
    modules), which we take a look at next. A *module* corresponds to a file in a
    physical file system, and modules, and including package modules, are the basic
    units of code reuse and sharing in Python.


    Next, we briefly go through some of the lexical elements of the [Python source
    code](Python source code). There are some small variations across different programming
    languages, but their lexical compositions are rather similar, and Python is no
    different. This part can be skipped in your "reading".


    Generally speaking, a program consists of *code and data*. Code refers to instructions.
    Data in Python is represented by *objects*. The object in Python is a fundamental
    component. Everything which we deal with in a Python program is objects. We start
    the main part of the book by introducing various important concepts related to
    the [objects](objects).


    Although Python uses a dynamic type system, the types still play the foundational
    roles in the Python programming language. We first go through some of the [basic
    builtin types](basic builtin types) in Python. Python includes quite a few builtin
    types, and this reference touches on only some of them. As indicated, this is
    generally true across all topics discussed in this reference. Completeness is
    not the goal of this *mini reference*.


    Python also includes a few [builtin compound types](builtin compound types) such
    as list and dictionary, which are important components of any non-trivial programs.
    We briefly go through these types in [the next chapter](the next chapter). Advanced
    types, e.g., functions and classes, in particular, are explained in detail later
    in the book.


    As with any imperative programming language, Python has expressions and statements.
    An expression prescribes how to compute a value using other expressions and values.
    Python supports most of [the common operators and expressions](the common operators
    and expressions) found in other imperative languages. If you are coming from other
    procedural programming language background, you can skim through most of this
    part.


    A statement is an instruction. Statements control the flow of a program to attain
    the desired goal. In Python, there are two kinds of statements, [simple statements](simple
    statements) and [compound statements](compound statements). Compound, or complex,
    statements can "include" other simple or compound statements.


    Simple statements include [expression statement](expression statement), [assignment
    statement](assignment statement), [assert statement](assert statement), [pass
    statement](pass statement), [del statement](del statement), [return statement](return
    statement), [raise statement](raise statement), [break statement](break statement),
    [continue statement](continue statement), [global statement](global statement),
    and [nonlocal statement](nonlocal statement). Python''s compound statements include
    [if statement](if statement), [while statement](while statement), [for statement](for
    statement), [try statement](try statement), [with statement](with statement),
    [match statement](match statement), [function def statement](function def statement),
    [class definition](class definition), and other [coroutine-related statements](coroutine-related
    statements).


