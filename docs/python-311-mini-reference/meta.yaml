    ② `p` and `q` refer to the same object.\n\n### 10.2.1. Augmented Assignment Statements\n\
    \nAn augmented assignment statement is the combination of a binary operation and\
    \ an assignment statement. The following operators are used in augmented assignment:\
    \ `+=`, `-=`, `*=`, `@=`, `/=`, `//=`, `%=`, `**=`, `>>=`, `<<=`, `&=`, `^=`,\
