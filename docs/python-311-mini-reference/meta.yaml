    \ Really unusual\n```\n\n① The as clause is used to name an exception.\n\n② Exception\
    \ chaining using the raise - from syntax.\n\n## 10.6. The break Statement\n\n\
    A break statement can be used in a for or while loop, only directly included,\
    \ and not as part of a function of class definition within the loop. It terminates\
    \ the innermost enclosing loop. If the loop has an else clause, it is skipped.\n\
    \n```\n>>> for i in range(3): ①\n...     try:\n...         print(i)\n...     \
