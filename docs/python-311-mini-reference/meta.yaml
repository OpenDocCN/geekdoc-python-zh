    # Chapter 11. Compound Statements


    A compound statement comprises other statements, and it affects or controls the
    execution of those statements in some way. A compound statement can span multiple
    (logical) lines.


    A compound statement consists of one or more "clauses". A clause consists of a
    "header" and a "suite". The clause headers of a particular compound statement
    are all at the same indentation level. Each clause header begins with a uniquely
    identifying keyword (e.g., `if`, `else`, `try`, `except`, etc.), and it ends with
    a colon (:). A suite is a group of one or more statements controlled by the clause.
    A suite can be


    +   - One or more semicolon-separated simple statements on the same line as the
    header, following the colon, or

    - It can be one or more one-level more indented (simple or compound) statements
    on subsequent lines.


    Python uses, as in many imperative programming languages, the common control flow
    statements such as the `if` statement, `while` statement, and `for` statement.
    They are all compound statements in Python. The `for` statement is often used
    with the builtin `range` and `enumerate` functions.


    The `try` statement, along with the simple `raise` statement, is used for exception
    handling and/or for providing cleanup code. Another compound statement, the `with`
    statement, which is closely related to the context manager, is used to provide
    initialization and finalization code for a series of statements.


    The new `match` statement (new as of 3.10) is discussed later in a broader context
    of pattern matching. Likewise, two other important compound statements, the `function
    def` statement and the `class`'
  - '[PAGE 89]


    definition statement, are discussed in their own chapters. Finally, coroutines
    and other related statements are explained separately in the last chapter of the
    book. async/await is Python''s new (relatively new) construct for high-level asynchronous
    programming.


    # 11.1. The if - elif - else Statement


    The if statement is used for conditional execution. It selects at most one of
    the suites by evaluating the expressions one by one, from top to bottom, until
    one is found to be True. Then the corresponding suite is executed (and no other
    part of the if statement is executed or evaluated). If all expressions are False,
    then the suite of the else clause, if present, is executed.


    For example,


    ```

    1 from datetime import datetime

    2

    3 weekday = datetime.today().isoweekday() ①

    4

    5 if weekday == 7: ②

    6     println("Today is Sunday!")

    7 elif weekday == 6: ③

    8     println("Today is Saturday!")

    9 else: ④

    10     println("Just another day. :(")

    11

    12 println("Regardless, let''s learn some programming!")

    ```


    ① datetime''s isoweekday method returns integer values, 1 for Monday, 2 for Tuesday,
    and 7 for Sunday, etc.


    ② This if statement comprises three clauses, if (lines 5-6), elif (lines 7-8),
    and else (lines 9-10). The if expression checks if today is Sunday. If so, it
    will print out today is Sunday! and the control moves to the end of the if statement,
    e.g., line 11.'
  - '[PAGE 90]


    ③ If today is not Sunday, it is then tested against Saturday (6). If this expression
    evaluates to True, the statements in the suite (a single statement, line 8, in
    this example) are executed, and the execution of the if statement terminates.


    ④ In all other cases, this if statement will end up printing Just another day
    :(. After executing the if statement (regardless of which clause has been executed),
    the program execution moves to the next statement, line 12, in this example.


    Note that, unlike in many C-style languages, Python''s if statement syntax does
    not require parentheses around the Boolean expressions in the if and elif lines.
    Parentheses can still be used for grouping purposes.


    # 11.2. The while - else Statement


    The while statement is used for repeated execution, similar to the for statement.
    The while statement''s execution depends on an expression. It tests the expression
    at every start of iteration and, as long as an expression evaluates to True, it
    executes the first suite. If the expression turns False (which may be the first
    time it is tested), then the suite of the else clause, if present, is executed
    and the loop terminates.


    For both while and for statements,


    +   - A break statement in the while/for suite terminates the loop without executing
    the else clause''s suite.

    - A continue statement in the while/for suite skips the rest of the statements
    and goes back to testing the expression.


    Python 3.0 was first released in 2008, and it now has a yearly release schedule
    (since 2020?). Let''s print that information out:'
  - '[PAGE 91]


    # 11.2. The while-else Statement


    ```

    >>> year = 2007

    >>> while (year := year + 1) and (year < 3000): ①

    ...     if year < 2018: ②

    ...         if year == 2008:

    ...             print(f"Python 3 was first released in {year}.")

    ...         continue ③

    ...     elif year == 2022: ④

    ...         print("Python 3.11 is to be released at the end of 2022.")

    ...         break ⑤

    ...

    ...     version = f"3.{year - 2011}"

    ...     print(f"Python {version} in {year}.") ⑥

    ...

    Python 3 was first released in 2008.

    Python 3.7 in 2018.

    Python 3.8 in 2019.

    Python 3.9 in 2020.

    Python 3.10 in 2021.

    Python 3.11 is to be released at the end of 2022.

    ```


    ① This `while` statement is effectively an infinite loop (`while True: ...`),
    and its termination is controlled by the `break` statement. The condition `year
    < 3000` is added as a precaution, e.g., to avoid a runaway iteration in case there
    is a bug in the code. The assignment expression `year := year + 1`, which always
    yields `True` in the Boolean context (since `year > 2007 > 0`), is used here,
    for illustration. An assignment statement could have been used instead, for example,
    in the first line in the `while` suite.


    ② When `year < 2018`, we merely `continue` except when `year == 2008`.


    ③ The `continue` statement.


    ④ When `year == 2022`, we print out a special message and terminate the loop.'
- md: "## 11.3. The for - in - else Statement\n\nThe `for-in-else` statement is used\
    \ to iterate over the elements of a sequence (such as a string, tuple, or list)\
    \ or [other iterable object](https://docs.python.org/3/glossary.html#term-iterable),\
    \ including a dictionary. It has the following syntax:\n\n```\nfor <target> in\
    \ <expression_list>:\n    <for_suite>\nelse:\n    <else_suite>\n```\n\nThe `<expression_list>`\
    \ is evaluated first, and only once. An [iterator](https://docs.python.org/3/glossary.html#term-iterator)\
    \ is created as a result. The suite, `<for_suite>`, is then executed once for\
    \ each item provided by the iterator. Each item in turn is assigned to the `<target>`\
    \ using the standard rules for [assignments](https://docs.python.org/3/reference/simple_stmts.html#assignment-statements),\
    \ and then the `<for_suite>` is executed with the value of the current `<target>`.\
    \ When the items are exhausted, that is, when the iterator raises a `StopIteration`\
    \ exception, the `<else_suite>` in the `else` clause, if present, is executed,\
    \ and the loop terminates.\n\nNote that when the `<expression_list>` returns an\
    \ empty sequence, the `<target>` variable is never assigned.\n\nFor example,\n\
    \n```\n>>> features = {\n...     \"3.11\": \"the exception group\",\n...     \"\
    3.10\": \"the match statement\",\n...     \"3.9\": \"the dictionary union operator\"\
    ,\n...     \"3.8\": \"the assignment expression\",\n... }\n>>> for k in features:\n\
    ...     print(f\"\"\"Python {k} includes many new features\n...           such\
    \ as {features[k]}.\"\"\")\n...\nPython 3.11 includes many new features\n    \
    \    such as the exception group.\nPython 3.10 includes many new features\n  \
    \      such as the match statement.\nPython 3.9 includes many new features\n \
    \       such as the dictionary union operator.\nPython 3.8 includes many new features\n\
    \        such as the assignment expression.\n```\n\n① A `dict` is an iterable.\n\
    \n② A `for` statement, iterating over a dictionary. Note that the order is preserved.\n\
    \n### 11.3.1. The range function\n\nPython's `for in` statement can be used just\
    \ like C's classic `for` loop, with the help of the builtin `range` function,\
    \ which generates an integer sequence.\n\nThe `range` function can be called in\
    \ three different ways:\n\n```\nrange(start, end, step) ①\nrange(start, end) ②\n\
    range(end) ③\n```\n\n① It specifies a `start` (inclusive), an `end` (exclusive),\
    \ and a `step`, which represents an increment or decrement in the sequence. All\
    \ arguments are integers, and `step` cannot be zero.\n② If the `step` is omitted,\
    \ its default value is 1.\n③ In this case, `start` and `step` use default values,\
    \ 0 and 1, respectively.\n\nFor example, let's try adding even integers from 0\
    \ to 100, using the `for` statement:\n\n```\n>>> _sum = 0\n>>> for i in range(0,\
    \ 100+1, 2):\n...     _sum += i\n...\n>>> print(f\"Sum of even numbers from 0\
    \ to 100 is {_sum}\")\nSum of even numbers from 0 to 100 is 2550\n```\n\nThere\
    \ is, in fact, a builtin `sum` function which adds all elements in a given sequence.\n\
    \n```\n>>> sum(range(0, 101, 2))\n2550\n```\n\n### 11.3.2. The enumerate function\n\
    \nThe above two use cases, e.g., iterating over items in an arbitrary sequence\
    \ and iterating over an integer sequence, can be more or less combined with the\
    \ builtin `enumerate` function.\n\nThe `enumerate` function takes an iterable\
    \ as an argument and returns an iterable of indexed pairs of the original sequence.\
    \ That is, given [item1, item2, item3], it returns an iterable of three elements,\
    \ (0, item1), (1, item2), and (2, item3). The `enumerate` function is not as flexible\
    \ as `range`, but it takes an optional second argument `start`. Otherwise, the\
    \ index is 0-based, by default.\n\nHere's an example:\n\n```\n>>> name = \"python\"\
    \n>>> for i, v in enumerate(name, 3):\n...     print(i, v, end = ', ')\n... else:\n\
    ...     print()\n...\n3 p, 4 y, 5 t, 6 h, 7 o, 8 n,\n>>>\n```\n\n① A string is\
    \ an (immutable) sequence type, which is an iterable.\n② We use the unpacking\
    \ syntax to assign the index and value, from each iteration of the `enumerate()`\
    \ function, to two separate variables (`i`, `v`).\n③ The `else` clause is always\
    \ executed at the end of the loop unless the loop is abnormally terminated, e.g.,\
    \ by a `break` statement, etc. In this example, we add a new line, at the end\
    \ of the loop.\n④ Otherwise, this line would not have ended with a new line.\n\
    \n## 11.4. The try Statement\n\nAs of Python 3.11+, Python's exception framework\
    \ has been extended to allow programs to raise and handle multiple unrelated exceptions\
    \ simultaneously. First, a new standard exception type, the `ExceptionGroup`,\
    \ which represents a group of unrelated exceptions have been introduced. Second,\
    \ a new syntax `except*` has been added for handling ExceptionGroups.\n\nThe classic\
    \ `try - except` compound statement has the following general syntax:\n\n```\n\
    try:\n    <suite>\nexcept <except_expression>: ①\n    <suite>\nexcept <except_expression>\
    \ as <name>: ②\n    <suite>\nexcept: ③\n    <suite>\nelse: ④\n    <suite>\nfinally:\
    \ ⑤\n    <suite>\n```\n\n① An expression that evaluates to an Exception or ExceptionGroup\
    \ type. The ExceptionGroup types were introduced in Python 3.11.\n② A try statement\
    \ can have zero, one, or more except clauses.\n③ The \"catch all\" clause.\n④\
    \ An optional else clause.\n⑤ An optional finally clause. Note that, when there\
    \ is no except clause, finally is required.\n\nSince Python 3.11+, the try clause\
    \ can be followed by one or more except* clauses instead of except.\n\n```\ntry:\n\
    \    <suite>\nexcept* <exception_group>: ①\n    <suite>\nexcept* <exception_group>\
    \ as <name>: ②\n    <suite>\nexcept* (<ex1>, <ex2>) as <name>: ③\n    <suite>\n\
    else:\n    <suite>\nfinally:\n    <suite>\n```\n\n① An expression that evaluates\
    \ to an `Exception` or `ExceptionGroup` type.\n\n② A `try` statement can have\
    \ one or more `except*` clauses. Note that, unlike `except`, `except*` cannot\
    \ be used as a \"catch all\" clause. That is, the exception/exception group expression\
    \ is always required.\n\n③ A quick shorthand way to create an \"exception group\"\
    \ from the existing exception types.\n\nThe `except` clauses specify exception\
    \ handlers for specific `BaseException` or `BaseExceptionGroup` types. On the\
    \ other hand, the `except*` clauses specify exception handlers for a set of `BaseException`\
    \ types contained in a `BaseExceptionGroup` type. `except/except*`, `else`, `finally`\
    \ are all optional, but at least one of `except/except*` or `finally` is required.\
    \ Note that `except` and `except*` cannot be mixed in one `try` statement.\n\n\
    When no exception occurs in the `try` clause, no exception handler is executed.\n\
    \nWhen an exception occurs in the `try` suite, a search for an exception handler\
    \ is started. In case of the `except` clauses, this search inspects the `except`\
    \ clauses, and evaluates the expressions, in order, from top to bottom, until\
    \ one is found that matches the exception. An expression-less `except` clause,\
    \ which matches any exception, must be last, if present.\n\nIn case of the `except*`\
    \ clauses, the clause matches the exception if the exception or any of the exceptions\
    \ in the exception group is the same or a base type of the given exception. Unlike\
    \ in the case of `except` clauses, more than one `except*` clauses can match the\
    \ exception/exception group. Hence, control flow statements like `break` are not\
    \ allowed in `except*` clauses.\n\nIf no `except` clause matches the exception,\
    \ or if `except*` clauses do not fully handle all exceptions in the exception\
    \ group, the search for a handler(s) for the exception, or the remaining unhandled\
    \ exceptions, continues in the surrounding code and on the invocation stack.\n\
    \nWhen a matching except clause is found, the exception is assigned to the target\
    \ specified after the `as` keyword in that except clause, if present, and the\
    \ except clause's suite is executed. All except clauses must have an executable\
    \ block. When the end of this block is reached, execution continues normally after\
    \ the entire try statement. (This means that if two nested handlers exist for\
    \ the same exception, and the exception occurs in the try clause of the inner\
    \ handler, the outer handler will not handle the exception.)\n\nThe optional `else`\
    \ clause is executed if the control flow leaves the `try` suite, no exception\
    \ was raised, and no `return`, `continue`, or `break` statement was executed.\
    \ Exceptions in the `else` clause are not handled by the preceding `except` clauses.\n\
    \nIf `finally` is present, it specifies a 'cleanup' handler. The `try` clause\
    \ is executed, including any `except` and `else` clauses. If an exception occurs\
    \ in any of the clauses and is not handled, the exception is temporarily saved.\
    \ The `finally` clause is executed. If there is a saved exception it is re-raised\
    \ at the end of the `finally` clause. If the `finally` clause raises another exception,\
    \ the saved exception is set as the context of the new exception. If the `finally`\
    \ clause executes a `return`, `break` or `continue` statement, the saved exception\
    \ is discarded.\n\nThe exception information is not available to the program during\
    \ execution of the `finally` clause.\n\nWhen a `return`, `break` or `continue`\
    \ statement is executed in the `try` suite of a `try...finally` statement, the\
    \ `finally` clause is also executed 'on the way out.'"
  mdcn: "## 11.3. for - in - else 语句\n\n`for-in-else` 语句用于遍历序列（如字符串、元组或列表）或[其他可迭代对象](https://docs.python.org/3/glossary.html#term-iterable)的元素，包括字典。其语法如下：\n\
    \n```\nfor <target> in <expression_list>:\n    <for_suite>\nelse:\n    <else_suite>\n\
    ```\n\n首先，`<expression_list>` 会被求值，且仅求值一次。其结果是一个[迭代器](https://docs.python.org/3/glossary.html#term-iterator)。然后，对于迭代器提供的每个元素，`<for_suite>`\
    \ 代码块会执行一次。每个元素依次使用[赋值](https://docs.python.org/3/reference/simple_stmts.html#assignment-statements)的标准规则赋值给\
    \ `<target>`，然后使用当前 `<target>` 的值执行 `<for_suite>`。当元素耗尽时，即迭代器引发 `StopIteration`\
    \ 异常时，如果存在 `else` 子句，则执行其中的 `<else_suite>`，然后循环终止。\n\n请注意，当 `<expression_list>`\
    \ 返回一个空序列时，`<target>` 变量永远不会被赋值。\n\n例如，\n\n```\n>>> features = {\n...     \"3.11\"\
    : \"the exception group\",\n...     \"3.10\": \"the match statement\",\n...  \
    \   \"3.9\": \"the dictionary union operator\",\n...     \"3.8\": \"the assignment\
    \ expression\",\n... }\n>>> for k in features:\n...     print(f\"\"\"Python {k}\
    \ includes many new features\n...           such as {features[k]}.\"\"\")\n...\n\
    Python 3.11 includes many new features\n        such as the exception group.\n\
    Python 3.10 includes many new features\n        such as the match statement.\n\
    Python 3.9 includes many new features\n        such as the dictionary union operator.\n\
    Python 3.8 includes many new features\n        such as the assignment expression.\n\
    ```\n\n① `dict` 是一个可迭代对象。\n\n② 一个 `for` 语句，遍历一个字典。请注意，顺序被保留了。\n\n### 11.3.1. range\
    \ 函数\n\n借助内置的 `range` 函数（它生成一个整数序列），Python 的 `for in` 语句可以像 C 语言经典的 `for` 循环一样使用。\n\
    \n`range` 函数可以通过三种不同的方式调用：\n\n```\nrange(start, end, step) ①\nrange(start, end)\
    \ ②\nrange(end) ③\n```\n\n① 它指定了一个 `start`（包含）、一个 `end`（不包含）和一个 `step`，表示序列中的增量或减量。所有参数都是整数，且\
    \ `step` 不能为零。\n② 如果省略 `step`，其默认值为 1。\n③ 在这种情况下，`start` 和 `step` 分别使用默认值 0 和\
    \ 1。\n\n例如，让我们尝试使用 `for` 语句计算从 0 到 100 的偶数之和：\n\n```\n>>> _sum = 0\n>>> for i\
    \ in range(0, 100+1, 2):\n...     _sum += i\n...\n>>> print(f\"Sum of even numbers\
    \ from 0 to 100 is {_sum}\")\nSum of even numbers from 0 to 100 is 2550\n```\n\
    \n实际上，有一个内置的 `sum` 函数可以对给定序列中的所有元素求和。\n\n```\n>>> sum(range(0, 101, 2))\n2550\n\
    ```\n\n### 11.3.2. enumerate 函数\n\n上述两个用例，例如遍历任意序列中的元素和遍历整数序列，可以或多或少地与内置的 `enumerate`\
    \ 函数结合使用。\n\n`enumerate` 函数接受一个可迭代对象作为参数，并返回一个包含原始序列索引对的可迭代对象。也就是说，给定 [item1,\
    \ item2, item3]，它返回一个包含三个元素的可迭代对象：(0, item1)、(1, item2) 和 (2, item3)。`enumerate`\
    \ 函数不如 `range` 灵活，但它接受一个可选的第二个参数 `start`。否则，索引默认从 0 开始。\n\n这里有一个例子：\n\n```\n>>>\
    \ name = \"python\"\n>>> for i, v in enumerate(name, 3):\n...     print(i, v,\
    \ end = ', ')\n... else:\n...     print()\n...\n3 p, 4 y, 5 t, 6 h, 7 o, 8 n,\n\
    >>>\n```\n\n① 字符串是一种（不可变的）序列类型，它是一个可迭代对象。\n② 我们使用解包语法将 `enumerate()` 函数每次迭代的索引和值赋给两个独立的变量（`i`、`v`）。\n\
    ③ `else` 子句总是在循环结束时执行，除非循环被异常终止，例如被 `break` 语句等终止。在这个例子中，我们在循环结束时添加了一个换行。\n④ 否则，这一行就不会以换行结束。\n\
    \n## 11.4. try 语句\n\n从 Python 3.11+ 开始，Python 的异常框架得到了扩展，允许程序同时引发和处理多个不相关的异常。首先，引入了一种新的标准异常类型\
    \ `ExceptionGroup`，它表示一组不相关的异常。其次，添加了一种新的语法 `except*` 来处理 ExceptionGroup。\n\n\
    经典的 `try - except` 复合语句具有以下通用语法：\n\n```\ntry:\n    <suite>\nexcept <except_expression>:\
    \ ①\n    <suite>\nexcept <except_expression> as <name>: ②\n    <suite>\nexcept:\
    \ ③\n    <suite>\nelse: ④\n    <suite>\nfinally: ⑤\n    <suite>\n```\n\n① 一个求值结果为\
    \ Exception 或 ExceptionGroup 类型的表达式。ExceptionGroup 类型在 Python 3.11 中引入。\n② 一个\
    \ try 语句可以有零个、一个或多个 except 子句。\n③ “捕获所有”子句。\n④ 一个可选的 else 子句。\n⑤ 一个可选的 finally\
    \ 子句。请注意，当没有 except 子句时，finally 是必需的。\n\n从 Python 3.11+ 开始，try 子句后面可以跟一个或多个 except*\
    \ 子句，而不是 except。\n\n```\ntry:\n    <suite>\nexcept* <exception_group>: ①\n   \
    \ <suite>\nexcept* <exception_group> as <name>: ②\n    <suite>\nexcept* (<ex1>,\
    \ <ex2>) as <name>: ③\n    <suite>\nelse:\n    <suite>\nfinally:\n    <suite>\n\
    ```\n\n① 一个求值结果为 `Exception` 或 `ExceptionGroup` 类型的表达式。\n\n② 一个 `try` 语句可以有一个或多个\
    \ `except*` 子句。请注意，与 `except` 不同，`except*` 不能用作“捕获所有”子句。也就是说，异常/异常组表达式总是必需的。\n\
    \n③ 一种快速简写方式，用于从现有异常类型创建“异常组”。\n\n`except` 子句为特定的 `BaseException` 或 `BaseExceptionGroup`\
    \ 类型指定异常处理程序。另一方面，`except*` 子句为包含在 `BaseExceptionGroup` 类型中的一组 `BaseException`\
    \ 类型指定异常处理程序。`except/except*`、`else`、`finally` 都是可选的，但至少需要 `except/except*` 或\
    \ `finally` 中的一个。请注意，在一个 `try` 语句中不能混合使用 `except` 和 `except*`。\n\n当 `try` 子句中没有发生异常时，不会执行任何异常处理程序。\n\
    \n当 `try` 代码块中发生异常时，会开始搜索异常处理程序。对于 `except` 子句，此搜索会从上到下依次检查 `except` 子句并求值其表达式，直到找到匹配该异常的子句。如果存在一个无表达式的\
    \ `except` 子句（它匹配任何异常），则它必须是最后一个。\n\n对于 `except*` 子句，如果异常或异常组中的任何异常与给定的异常相同或是其基类型，则该子句匹配该异常。与\
    \ `except` 子句的情况不同，可以有多个 `except*` 子句匹配异常/异常组。因此，`except*` 子句中不允许使用 `break` 等控制流语句。\n\
    \n如果没有 `except` 子句匹配该异常，或者 `except*` 子句没有完全处理异常组中的所有异常，则会在周围的代码和调用栈中继续搜索该异常或剩余未处理异常的处理程序。\n\
    \n当找到匹配的 except 子句时，如果存在 `as` 关键字，则异常被赋值给该 except 子句中指定的目标，然后执行该 except 子句的代码块。所有\
    \ except 子句都必须有一个可执行块。当到达该块的末尾时，执行将在整个 try 语句之后正常继续。（这意味着，如果存在两个嵌套的处理程序处理同一个异常，并且该异常发生在内部处理程序的\
    \ try 子句中，则外部处理程序将不会处理该异常。）\n\n如果控制流离开 `try` 代码块，没有引发异常，并且没有执行 `return`、`continue`\
    \ 或 `break` 语句，则执行可选的 `else` 子句。`else` 子句中的异常不会被前面的 `except` 子句处理。\n\n如果存在 `finally`，它指定一个“清理”处理程序。`try`\
    \ 子句被执行，包括任何 `except` 和 `else` 子句。如果在任何子句中发生异常且未被处理，则该异常会被暂时保存。然后执行 `finally`\
    \ 子句。如果存在保存的异常，则在 `finally` 子句结束时重新引发该异常。如果 `finally` 子句引发了另一个异常，则保存的异常将作为新异常的上下文。如果\
    \ `finally` 子句执行了 `return`、`break` 或 `continue` 语句，则保存的异常将被丢弃。\n\n在执行 `finally`\
    \ 子句期间，异常信息对程序不可用。\n\n当在 `try...finally` 语句的 `try` 代码块中执行 `return`、`break` 或 `continue`\
    \ 语句时，`finally` 子句也会在“退出时”执行。"
