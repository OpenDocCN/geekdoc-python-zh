  md: '# Chapter 5. Python Source Code


    The Python interpreter reads program text as Unicode code points. The encoding
    of a Python source code file is "UTF-8" by default. The source file can also be
    given an explicit encoding declaration. If an encoding is declared, the encoding
    name must be recognized by Python. If the text cannot be decoded, then a `SyntaxError`
    exception is raised.


    The Python interpreter first breaks a source file into "tokens", which are then
    fed into the parser.


    # 5.1. Line Structure


    Python programs are "line-based". A Python source code consists of "logical lines".


    # 5.1.1. Logical lines


    A statement is normally contained in a logical line, whose end is represented
    by the NEWLINE token. A `compound statement` can be in multiple logical lines
    if that is permitted by the Python grammar.


    A logical line is constructed from one or more "physical line".


    # 5.1.2. Physical lines


    A physical line is a sequence of characters terminated by an end-of-line sequence.
    In Python source files and strings, any one of the three standard line termination
    sequences can be used, `\n`, `\r\n`, or `\r`, regardless of platform. The end
    of input also serves as an implicit terminator for the final physical line.'
  merge: -1
  pgno: 30
- img_proc: true
  md: '5.1. Line Structure


    # 5.1.3. Comments


    A comment starts with a hash character (#) and it continues until the end of the
    physical line. Comments are mostly ignored by the syntax. A comment can signify
    the end of a logical line, that is, a NEWLINE token is generated unless the implicit
    line joining rules are invoked.


    # 5.1.4. Blank Lines


    A logical line that contains only spaces, tabs, formfeeds and possibly a comment,
    is ignored.


    # 5.1.5. Physical line joining


    **Explicit joining**


    Two or more physical lines may be joined into a logical line using backslash characters
    (\).


    When a physical line ends with a backslash, it is joined with the following line
    forming a single logical line, deleting the backslash and the following end-of-line
    character.


    +   - A backslash is not allowed anywhere else on a line outside a string literal
    or a comment.

    - A backslash cannot split a token across physical lines except for string literals.

    - A backslash does not continue a comment.


    For example,


    ```

    >>> a, b = \n... 10, 20

    ```'
