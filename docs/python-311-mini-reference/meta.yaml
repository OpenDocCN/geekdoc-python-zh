    \ 语句。\n\n③ 当循环因 break 语句终止时，else 子句不会执行。\n\n④ break 语句在打印第一个 1 后执行。第二个 print 语句被跳过。\n\
    \n⑤ finally 子句在退出循环之前仍然执行。\n\n## 10.7. continue 语句\n\n与 break 类似，continue 语句只能直接在\
    \ for 或 while 循环中使用。它继续执行最内层封闭循环的下一次迭代，而不执行当前循环中剩余的语句。\n\n```\n>>> for i in range(3):\n\
    ...     try:\n...         print(i)\n...         if i == 1:\n...             continue\n\
    ...         print(i)\n...     finally:\n...         print(\"finally\")\n... else:\n\
    ...     print(\"huh?\")\n...\n0\n0\nfinally\n1\nfinally\n2\n2\nfinally\nhuh\n\
    ```\n\n① 一个 for 循环。\n\n② 此 for 循环中的 continue 语句。\n\n③ continue 语句在打印第一个 1 后执行。第二个\
    \ print 语句被跳过。\n\n④ finally 子句在继续下一次迭代之前仍然执行。\n\n⑤ 继续下一次迭代。\n\n⑥ 当循环正常终止时，else\
    \ 子句执行。\n\n## 10.8. global 语句\n\nglobal 语句，关键字 global 后跟一个逗号分隔的名称列表，表示在当前代码块中声明的名称将被解释为全局变量（例如，当前模块作用域）。在\
