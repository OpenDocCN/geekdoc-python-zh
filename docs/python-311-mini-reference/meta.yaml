    a stack traceback, except when the exception is `SystemExit`.


    Exception handlers are specified with the `try` statement. As of Python 3.11,
    a new `try - except*` syntax is also supported in addition to `try - except`.


    There are two basic builtin exception types in Python, `BaseException` and `Exception`,
    which roughly correspond, for instance, to the "runtime exception" and "checked
    exception" of Java, respectively. Likewise, Python now includes (3.11+) two builtin
    exception group types, `BaseExceptionGroup` and `ExceptionGroup`.


    Exception handling will be further discussed, later in the book, in the contexts
    of the `try` and `raise` statements.'
- md: "## Chapter 4. Packages & Modules\n\n### 4.1. Modules\n\nPython code is organized\
    \ into \"modules\", which are associated with namespaces containing other Python\
    \ *objects*. Python code in a module can access the code in a different module\
    \ through the process of \"importing\". For example, a module can be imported\
    \ using the `import` statement.\n\n#### 4.1.1. The `import` statement\n\nThe `import`\
    \ statement performs the following operations:\n\n- It first searches for the\
    \ named module, and\n- If the module is found, then\n    - It creates, and initializes,\
    \ a module object, and it binds the object to a name in the local scope.\n- If\
    \ the named module is not found, then\n    - A `ModuleNotFoundError` exception\
    \ is raised.\n\nFor example,\n\n```\n>>> import math ①\n>>> type(math) ②\n<class\
    \ 'module'> ③\n```\n\n① An `import` statement.\n② We will take a look at Python's\
    \ type system throughout this book. The builtin `type` function returns the type\
    \ of the given object.\n③ The type of a module is `module`.\n\nThe internal implementations\
    \ of the `import` statement, as well as other importing related utility functions,\
    \ are provided in the standard library module, `importlib`.\n\n### 4.2. Packages\n\
    \nTo help organize modules, Python has a concept of `packages`. A package is a\
    \ special kind of module, and it provides a namespace/naming hierarchy. Technically,\
    \ packages are modules that contains a `__path__` attribute.\n\nIf the Python\
    \ interpreter is invoked with a script, then a package corresponds to a directory\
    \ on a file system and a regular non-package module corresponds to a Python source\
    \ file. Like file system directories, packages are organized hierarchically, and\
    \ packages may contain other packages, as well as regular modules.\n\nEvery module\
    \ has a name. Subpackage names are separated from their parent package name by\
    \ a dot (.). A module's `__name__` attribute is set to the fully-qualified name\
    \ of the module. Module's qualified names are used to uniquely identify the modules\
    \ in the Python import system.\n\nThere are two kinds of packages in Python, \"\
    regular packages\" and \"namespace packages\".\n\n#### 4.2.1. Regular packages\n\
    \nA regular package is typically implemented as a directory containing an `__init__.py`\
    \ file. When a regular package is imported, the `__init__.py` files of the package\
    \ and all of its parent packages are implicitly executed. The objects defined\
    \ in each package's `__init__.py` file are bound to names in the package's namespace.\n\
    \n#### 4.2.2. Namespace packages\n\nAn implicit namespace package is a (virtual)\
    \ composite package that can include subpackages from different locations in the\
    \ file system (e.g., not constrained by the directory hierarchy).\n\nWith namespace\
    \ packages, there is no package `__init__.py` file. A namespace package may correspond\
    \ to multiple directories unlike the regular packages. For example, when the packages\
    \ `parent/one` and `parent/two` are imported with no physical directory corresponding\
    \ to the `parent` module, Python automatically creates a namespace package for\
    \ the top-level `parent` package.\n\n### 4.3. Package Relative Imports\n\nRelative\
    \ imports use leading dots (.). A single leading dot indicates a relative import,\
    \ starting with the current package. Two leading dots indicate a relative import\
    \ of the parent to the current package, etc.\n\nAbsolute imports may use either\
    \ the `import X.Y` or `from X import Y` syntax, but relative imports may only\
    \ use the second form. For instance, from a given Python script/module `xyz` in\
    \ a folder `bbb`,\n\naaa/bbb/xyz.py\n\n```\nfrom . import efg ①\nfrom .hij import\
    \ klm ②\nfrom .. import mno ③\nfrom ..opq.qrs import stu ④\n```\n\n① The module\
    \ `efg` corresponds to a file `aaa/bbb/efg.py`.\n\n② The module `klm` corresponds\
    \ to a file `aaa/bbb/hij/klm.py`.\n\n③ The module `mno` corresponds to a file\
    \ `aaa/mno.py`.\n\n④ The module `stu` corresponds to a file `aaa/opq/qrs/stu.py`.\n\
    \n## Chapter 5. Python Source Code\n\nThe Python interpreter reads program text\
    \ as Unicode code points. The encoding of a Python source code file is \"UTF-8\"\
    \ by default. The source file can also be given an explicit encoding declaration.\
    \ If an encoding is declared, the encoding name must be recognized by Python.\
    \ If the text cannot be decoded, then a `SyntaxError` exception is raised.\n\n\
    The Python interpreter first breaks a source file into \"tokens\", which are then\
    \ fed into the parser.\n\n### 5.1. Line Structure\n\nPython programs are \"line-based\"\
    . A Python source code consists of \"logical lines\".\n\n#### 5.1.1. Logical lines\n\
    \nA statement is normally contained in a logical line, whose end is represented\
    \ by the NEWLINE token. A `compound statement` can be in multiple logical lines\
    \ if that is permitted by the Python grammar.\n\nA logical line is constructed\
    \ from one or more \"physical line\".\n\n#### 5.1.2. Physical lines\n\nA physical\
    \ line is a sequence of characters terminated by an end-of-line sequence. In Python\
    \ source files and strings, any one of the three standard line termination sequences\
    \ can be used, `\\n`, `\\r\\n`, or `\\r`, regardless of platform. The end of input\
    \ also serves as an implicit terminator for the final physical line.\n\n#### 5.1.3.\
    \ Comments\n\nA comment starts with a hash character (#) and it continues until\
    \ the end of the physical line. Comments are mostly ignored by the syntax. A comment\
    \ can signify the end of a logical line, that is, a NEWLINE token is generated\
    \ unless the implicit line joining rules are invoked.\n\n#### 5.1.4. Blank Lines\n\
    \nA logical line that contains only spaces, tabs, formfeeds and possibly a comment,\
    \ is ignored.\n\n#### 5.1.5. Physical line joining\n\n**Explicit joining**\n\n\
    Two or more physical lines may be joined into a logical line using backslash characters\
    \ (\\).\n\nWhen a physical line ends with a backslash, it is joined with the following\
    \ line forming a single logical line, deleting the backslash and the following\
    \ end-of-line character.\n\n- A backslash is not allowed anywhere else on a line\
    \ outside a string literal or a comment.\n- A backslash cannot split a token across\
    \ physical lines except for string literals.\n- A backslash does not continue\
    \ a comment.\n\nFor example,\n\n```\n>>> a, b = \\n... 10, 20\n```\n\nThis is\
    \ one logical line, `a, b = 10, 20`, although it is written on two physical lines.\
    \ Note that no other characters, including white spaces, are allowed after the\
    \ backslash other than one of the three line termination sequences.\n\n**Implicit\
    \ joining**\n\nExpressions in parentheses (`(...)`), square brackets (`[...]`),\
    \ or curly braces (`{...}`), as well as triple-quoted strings (`\"\"\"...\"\"\"\
    ` or `'''...'''`), can be split over more than one physical line without using\
    \ backslashes.\n\nThe implicitly continued lines can carry comments except for\
    \ triple-quoted multiline strings. The indentation of the continuation lines is\
    \ not important. Blank continuation lines are allowed.\n\nFor instance,\n\n```\n\
    >>> fruits = [\n...     \"manzana\",    # apple\n...     \"naranja\",    # orange\n\
    ... ]\n>>> print(\n...\n...     fruits\n... )\n['manzana', 'naranja']\n```\n\n\
    ① The start of an implicit joining.\n② Comments are allowed.\n③ The end of a logical\
    \ line.\n④ The start of another implicit joining.\n⑤ An empty physical line.\n\
    ⑥ The end of a logical line. This statement is equivalent to `print(fruits)` in\
    \ one physical line.\n\nNote that since parentheses can be used to group expressions,\
    \ practically any expression can be split into multiple physical lines.\n\n####\
    \ 5.1.6. Indentations\n\nIn Python, the indentations of the logical lines are\
    \ used to determine the grouping of statements.\n\nThe indentation level of a\
    \ line is computed based on the leading whitespace at the beginning of the line.\
    \ The total number of spaces preceding the first non-blank character determines\
    \ the line’s indentation.\n\nThe Python lexical analyzer generates INDENT and\
    \ DEDENT tokens, using a stack, based on the indentation levels of consecutive\
    \ logical lines, which are then used to group logical lines into statements.\n\
    \n### 5.2. Tokens\n\nBesides NEWLINE, INDENT and DEDENT, Python has the following\
    \ categories of tokens: *identifiers*, *keywords*, *literals*, *operators*, and\
    \ *delimiters*.\n\n### 5.3. Identifiers and Keywords\n\nThe syntax of identifiers,\
    \ or names, in Python is based on the Unicode standard. Identifiers are unlimited\
    \ in length and they are case-sensitive. Within the ASCII range (U+0001..U+007F),\
    \ the names can include the alphanumeric characters and the underscore (_). The\
    \ names cannot start with digits. Outside the ASCII range, the `unicodedata` module\
    \ classifies the characters which are valid in identifiers."
  mdcn: "## 第4章 包与模块\n\n### 4.1. 模块\n\nPython代码被组织成“模块”，模块与包含其他Python*对象*的命名空间相关联。模块中的Python代码可以通过“导入”过程访问不同模块中的代码。例如，可以使用`import`语句导入模块。\n\
    \n#### 4.1.1. `import`语句\n\n`import`语句执行以下操作：\n\n- 它首先搜索指定的模块，并且\n- 如果找到该模块，则\n\
    \    - 它创建并初始化一个模块对象，并将该对象绑定到本地作用域中的一个名称。\n- 如果未找到指定的模块，则\n    - 会引发`ModuleNotFoundError`异常。\n\
    \n例如，\n\n```\n>>> import math ①\n>>> type(math) ②\n<class 'module'> ③\n```\n\n\
    ① 一个`import`语句。\n② 我们将在本书中了解Python的类型系统。内置的`type`函数返回给定对象的类型。\n③ 模块的类型是`module`。\n\
    \n`import`语句以及其他与导入相关的实用函数的内部实现，由标准库模块`importlib`提供。\n\n### 4.2. 包\n\n为了帮助组织模块，Python引入了`包`的概念。包是一种特殊的模块，它提供了一个命名空间/命名层次结构。从技术上讲，包是包含`__path__`属性的模块。\n\
    \n如果使用脚本调用Python解释器，那么包对应于文件系统上的一个目录，而常规的非包模块对应于一个Python源文件。与文件系统目录类似，包是分层组织的，包可以包含其他包以及常规模块。\n\
    \n每个模块都有一个名称。子包名称与其父包名称用点（.）分隔。模块的`__name__`属性被设置为模块的完全限定名。模块的限定名用于在Python导入系统中唯一标识模块。\n\
    \nPython中有两种包：“常规包”和“命名空间包”。\n\n#### 4.2.1. 常规包\n\n常规包通常实现为一个包含`__init__.py`文件的目录。当导入常规包时，包及其所有父包的`__init__.py`文件会被隐式执行。每个包的`__init__.py`文件中定义的对象被绑定到包的命名空间中的名称。\n\
    \n#### 4.2.2. 命名空间包\n\n隐式命名空间包是一个（虚拟的）复合包，可以包含来自文件系统不同位置的子包（例如，不受目录层次结构的限制）。\n\
    \n使用命名空间包时，没有包`__init__.py`文件。与常规包不同，一个命名空间包可能对应多个目录。例如，当导入包`parent/one`和`parent/two`，而没有与`parent`模块对应的物理目录时，Python会自动为顶级`parent`包创建一个命名空间包。\n\
    \n### 4.3. 包相对导入\n\n相对导入使用前导点（.）。单个前导点表示相对导入，从当前包开始。两个前导点表示相对导入当前包的父包，以此类推。\n\n\
    绝对导入可以使用`import X.Y`或`from X import Y`语法，但相对导入只能使用第二种形式。例如，从文件夹`bbb`中的给定Python脚本/模块`xyz`，\n\
    \naaa/bbb/xyz.py\n\n```\nfrom . import efg ①\nfrom .hij import klm ②\nfrom ..\
    \ import mno ③\nfrom ..opq.qrs import stu ④\n```\n\n① 模块`efg`对应于文件`aaa/bbb/efg.py`。\n\
    \n② 模块`klm`对应于文件`aaa/bbb/hij/klm.py`。\n\n③ 模块`mno`对应于文件`aaa/mno.py`。\n\n④ 模块`stu`对应于文件`aaa/opq/qrs/stu.py`。\n\
    \n## 第5章 Python源代码\n\nPython解释器将程序文本读取为Unicode码点。Python源代码文件的默认编码是“UTF-8”。源文件也可以给出显式的编码声明。如果声明了编码，则编码名称必须被Python识别。如果文本无法解码，则会引发`SyntaxError`异常。\n\
    \nPython解释器首先将源文件分解为“词法单元”，然后将其传递给解析器。\n\n### 5.1. 行结构\n\nPython程序是“基于行的”。Python源代码由“逻辑行”组成。\n\
    \n#### 5.1.1. 逻辑行\n\n一个语句通常包含在一个逻辑行中，其结束由NEWLINE词法单元表示。如果Python语法允许，一个`复合语句`可以跨越多个逻辑行。\n\
    \n一个逻辑行由一个或多个“物理行”构成。\n\n#### 5.1.2. 物理行\n\n物理行是以行结束序列终止的字符序列。在Python源文件和字符串中，无论平台如何，都可以使用三种标准行终止序列中的任何一种：`\\\
    n`、`\\r\\n`或`\\r`。输入的结束也作为最后一个物理行的隐式终止符。\n\n#### 5.1.3. 注释\n\n注释以井号字符（#）开始，并持续到物理行的末尾。语法大多忽略注释。注释可以表示逻辑行的结束，即，除非调用隐式行连接规则，否则会生成一个NEWLINE词法单元。\n\
    \n#### 5.1.4. 空行\n\n仅包含空格、制表符、换页符，可能还有注释的逻辑行会被忽略。\n\n#### 5.1.5. 物理行连接\n\n**显式连接**\n\
    \n可以使用反斜杠字符（\\）将两个或多个物理行连接成一个逻辑行。\n\n当一个物理行以反斜杠结束时，它会与下一行连接形成一个逻辑行，删除反斜杠和随后的行结束字符。\n\
    \n- 除了在字符串字面量或注释中，反斜杠不允许出现在行上的任何其他位置。\n- 除了字符串字面量，反斜杠不能将词法单元分割到多个物理行上。\n- 反斜杠不会延续注释。\n\
    \n例如，\n\n```\n>>> a, b = \\n... 10, 20\n```\n\n这是一个逻辑行，`a, b = 10, 20`，尽管它写在两个物理行上。请注意，除了三种行终止序列之一之外，反斜杠之后不允许有其他任何字符，包括空格。\n\
    \n**隐式连接**\n\n括号（`(...)`）、方括号（`[...]`）或花括号（`{...}`）中的表达式，以及三引号字符串（`\"\"\"...\"\
    \"\"`或`'''...'''`），可以在不使用反斜杠的情况下分割成多个物理行。\n\n隐式延续的行可以携带注释，但三引号多行字符串除外。延续行的缩进并不重要。允许空的延续行。\n\
    \n例如，\n\n```\n>>> fruits = [\n...     \"manzana\",    # apple\n...     \"naranja\"\
    ,    # orange\n... ]\n>>> print(\n...\n...     fruits\n... )\n['manzana', 'naranja']\n\
    ```\n\n① 隐式连接的开始。\n② 允许注释。\n③ 逻辑行的结束。\n④ 另一个隐式连接的开始。\n⑤ 一个空的物理行。\n⑥ 逻辑行的结束。此语句等效于在一个物理行中的`print(fruits)`。\n\
    \n请注意，由于括号可用于对表达式进行分组，实际上任何表达式都可以分割成多个物理行。\n\n#### 5.1.6. 缩进\n\n在Python中，逻辑行的缩进用于确定语句的分组。\n\
    \n一行的缩进级别是根据行首的前导空格计算的。第一个非空格字符之前的空格总数决定了该行的缩进。\n\nPython词法分析器使用一个栈，根据连续逻辑行的缩进级别生成INDENT和DEDENT词法单元，然后用于将逻辑行分组为语句。\n\
    \n### 5.2. 词法单元\n\n除了NEWLINE、INDENT和DEDENT，Python还有以下类别的词法单元：*标识符*、*关键字*、*字面量*、*运算符*和*分隔符*。\n\
    \n### 5.3. 标识符和关键字\n\nPython中标识符（或名称）的语法基于Unicode标准。标识符的长度不受限制，并且区分大小写。在ASCII范围内（U+0001..U+007F），名称可以包含字母数字字符和下划线（_）。名称不能以数字开头。在ASCII范围之外，`unicodedata`模块对标识符中有效的字符进行分类。"
