    \n## 10.4. return 语句\n\nreturn 语句在语法上只允许出现在函数定义内部。执行时，它会退出当前函数调用。return 语句可以包含一个可选的参数，即一个表达式列表。如果存在，该表达式列表将作为函数调用的值返回给调用者。如果不存在，则假定返回值为\
    \ None。\n\n```\n>>> def f():\n...     return 1, 2, 3 ①\n...\n>>> f()\n(1, 2, 3)\
