    methods, such as `Task` and `Future`, for managing coroutines.


    # 15.5. Coroutine Functions


    The `async def` statement defines a coroutine function in a similar way that the
    `def` statement defines a (normal) function. A coroutine defined with `async def`
    *can*, but does not have to, include `await` expressions and `async` statements
    such as `async for` and `async with`.


    Calling a coroutine function returns an `awaitable` object, more specifically,
    a `coroutine object`. Execution of coroutines can be suspended and resumed, as
    explained in the previous section.


    ```

    >>> async def a():

    ...     print("a")

    ...

    >>> async def b():

    ...     await a()

    ...

    >>> import asyncio

    >>> asyncio.run(b())

    a

    ```


    ① A coroutine function definition without any `async/await` expressions/statements.


    ② Another coroutine function definition which includes an `await` expression.


    ③ Calling `a()` will return a coroutine object, which can be `awaited`.'
