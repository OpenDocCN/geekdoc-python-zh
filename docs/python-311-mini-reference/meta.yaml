  md: '# Preface


    Python is a dynamic language.


    It means many different things. It means that the language is more flexible. It
    means that Python is an easier language to program with. You can quickly write
    a simple program without having to go through too much "rituals", compared to
    many other programming languages. Python scripts tend to require less boilerplate
    code. Python gives you more freedom.


    On the other hand, it also means that the language is less safe, and more error
    prone. It means that it is harder to build a larger system with Python. It means
    that software written in Python is generally harder to maintain over a longer
    period of time.


    The key to using Python effectively is to understand this tradeoff. Python can
    be an ideal language, for instance, for quick prototyping, or "scripting". On
    the flip side, Python is not as much used for the "enterprise software" development.


    Python is a general purpose programming language. Python is used in many different
    application areas, from system administration tasks to web application development.
    Python is now one of the most widely used programming languages for scientists,
    who have traditionally been using more high-level tools like Matlab. Python provides
    an easier "upgrade" path to these "non-professional" programmers. Now, Python
    is becoming *the* language for machine learning and data science.


    Python is beginner-friendly. In fact, it seems to be the most favorite first language
    for beginning programmers, even more so than JavaScript.


    It should be noted, however, that Python is *not* a simple language. Over the
    past 30 years or so of its history, it has gone through a lot of big and small
    changes. It is still easy to get started with programming in Python.'
  merge: -1
