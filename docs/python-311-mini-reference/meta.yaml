    # Implicit joining


    Expressions in parentheses (`(...)`), square brackets (`[...]`), or curly braces
    (`{...}`), as well as triple-quoted strings (`"""..."""` or `''''''...''''''`),
    can be split over more than one physical line without using backslashes.


    The implicitly continued lines can carry comments except for triple-quoted multiline
    strings. The indentation of the continuation lines is not important. Blank continuation
    lines are allowed.


    For instance,


    ```

    >>> fruits = [

    ...     "manzana",    # apple

    ...     "naranja",    # orange

    ... ]

    >>> print(

    ...

    ...     fruits

    ... )

    [''manzana'', ''naranja'']

    ```


    +   ① The start of an implicit joining.

    ② Comments are allowed.

    ③ The end of a logical line.

    ④ The start of another implicit joining.

    ⑤ An empty physical line.

