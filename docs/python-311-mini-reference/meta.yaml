    # 14.2.4. The `__init__` function


    Note that a class object is not only used as a "template" when creating an instance
    object of that class, but they essentially share the same attributes.


    ```

    >>> s = SoSimple()

    >>> s.one_name

    ''simple''

    >>> SoSimple.one_name = "not simple any more"

    >>> SoSimple.one_name

    ''not simple any more''

    >>> s.one_name

    ''not simple any more''

    ```


    Class instantiation (or, instantiating an instance object of a class) can be customized
    by overwriting the `__init__` method of the class. This method is automatically
    called, e.g., by the Python interpreter, after an instance has been created.


    ```

    >>> class SoEasy:

    ...     def __init__(self):

    ...         self.one_title = "programmer"

    ...

    >>> s = SoEasy()

    >>> s.one_title

    ''programmer''

    ```'
