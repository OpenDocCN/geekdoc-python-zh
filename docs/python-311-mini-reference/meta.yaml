    # 14.3.5. `super()`


    In many programming languages that support OOP, the terms like super, base, and
    parent have certain related meanings. In Python, the `super` method, which roughly
    refers to a "base class", has more specific semantics, especially in the context
    of multiple inheritance.


    For example, when `super().x` is referenced in a class, for data or method attribute,
    Python goes through the "linearized" base class hierarchy (MRO) of the given class,
    from left to right (or, from bottom to top, depending on how you see the inheritance
    tree), to find the attribute, starting from the class itself. Once it is found
    during the traversal, that implementation of the attribute is used and all others
    (e.g., in their base classes) are ignored.


    Note that the MRO is defined per class. For instance, using the above example,
    `B`''s MRO is not a partial segment of `D`''s MRO. It can be completely different.


    ```

    >>> B.mro()

    [<class ''__main__.B''>, <class ''__main__.A''>, <class ''object''>]

    ```


    The order is `B` → `A` → `object`.


