    \n```\n>>> with open(\"a.txt\") as f1:\n...     with open(\"b.txt\") as f2:\n\
    ...         print(f1.read())\n...         print(f2.read())\n...\n```\n\n## 第 12\
    \ 章. 模式匹配\n\nPython 的 `match - case` 语句（首次在 3.10 中引入）现在可以在过去可能需要复杂 `if - elif\
    \ - else` 语句的地方使用。模式匹配本质上是[比较表达式](https://example.com)的泛化，后者产生布尔值。\n\n## 12.1.\
    \ match - case 语句\n\n`match` 语句具有以下通用语法：\n\n```\nmatch SubjectExpression:\n  \
    \  CaseBlock\n    ...\n    CaseBlock\n```\n\n与其他复合语句不同，`match` 语句不能写在一行物理行中。也就是说，冒号后总是需要换行。*SubjectExpression*\
    \ 可以是命名表达式，也可以是一个或两个星号命名表达式（逗号分隔）。当使用表达式列表时，它会先被求值为一个元组，然后才开始匹配过程。\n\n至少需要一个 *CaseBlock*。也就是说，例如，我们不能只在\
    \ `match` 语句的主体中使用像 `pass` 语句这样的占位符。每个 *CaseBlock* 具有以下形式：\n\n```\ncase Pattern:\n\
    \    Suite\n```\n\n或\n\n```\ncase Pattern Guard:\n    Suite\n```\n\n我们将在[下一节](the\
    \ next section)中介绍 Python 当前支持的所有不同模式类别。*Guard* 是一个可选的布尔条件。如果包含，只有当模式匹配且条件满足时，case\
    \ 子句才会匹配。\n\n在最简单的用法中，`match` 语句可以或多或少地像 C 语言中传统的 `switch` 语句一样使用。例如，\n\n```\n\
    >>> color = Color.BLUE\n>>> match color:\n...     case Color.RED:\n...       \
    \  print(\"Color red detected\")\n...     case Color.BLUE:\n...         print(\"\
    Blue wins!\")\n...     case _:\n...         print(\"We don't care about other\
    \ colors :)\")\n...\nBlue wins!\n```\n\n与 C 语言的 `switch - case` 语句不同，`case` 子句不需要\
    \ `break` 语句。它们不会“贯穿”。\n\n在此示例中，第一个 case 不匹配，因为 `color != Color.RED`。然后 `match`\
    \ 语句匹配下一个 case，因为 `color == Color.BLUE`，因此执行匹配 case 中的语句。\n\n通配符表达式 `_` 用于“捕获所有”。也就是说，（可选的）`case\
    \ _` 子句或多或少等同于 C 风格 switch 语句中的 *default* case。如果没有匹配的 `case`，则 `match` 语句在不执行任何套件的情况下终止。如果指定了捕获所有\
    \ case `case _`，则执行此默认 case 中的语句。\n\n## 12.2. 模式\n\n### 12.2.1. 通配符模式\n\n如上一节末尾所示，特殊模式\
    \ `_` 匹配任何主题表达式。这是最简单的模式，因为它匹配任何表达式，所以它只能在 match 语句的最后一个 case 子句中使用。\n\n```\n\
    >>> match 5:\n...     case _:\n...         print(\"I always match!\")\n...\nI\
    \ always match!\n```\n\n### 12.2.2. 字面量模式\n\n匹配字面量模式实际上等同于主题表达式和字面量模式之间的比较操作。支持大多数常量字面量表达式，包括布尔值、整数和浮点数以及字符串。复数（不是常量字面量）也属于此类。\n\
    \n例如，\n\n```\n>>> arr = (False, 30, 0.5 + 2j, \"\"\"hello\"\"\", None)\n... for\
