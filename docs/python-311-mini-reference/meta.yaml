    # 11.4. The try Statement


    If no `except` clause matches the exception, or if `except*` clauses do not fully
    handle all exceptions in the exception group, the search for a handler(s) for
    the exception, or the remaining unhandled exceptions, continues in the surrounding
    code and on the invocation stack.


    When a matching except clause is found, the exception is assigned to the target
    specified after the `as` keyword in that except clause, if present, and the except
    clause''s suite is executed. All except clauses must have an executable block.
    When the end of this block is reached, execution continues normally after the
    entire try statement. (This means that if two nested handlers exist for the same
    exception, and the exception occurs in the try clause of the inner handler, the
    outer handler will not handle the exception.)


    The optional `else` clause is executed if the control flow leaves the `try` suite,
    no exception was raised, and no `return`, `continue`, or `break` statement was
    executed. Exceptions in the `else` clause are not handled by the preceding `except`
    clauses.


    If `finally` is present, it specifies a ''cleanup'' handler. The `try` clause
    is executed, including any `except` and `else` clauses. If an exception occurs
    in any of the clauses and is not handled, the exception is temporarily saved.
    The `finally` clause is executed. If there is a saved exception it is re-raised
    at the end of the `finally` clause. If the `finally` clause raises another exception,
    the saved exception is set as the context of the new exception. If the `finally`
    clause executes a `return`, `break` or `continue` statement, the saved exception
    is discarded.


    The exception information is not available to the program during execution of
    the `finally` clause.


    When a `return`, `break` or `continue` statement is executed in the `try` suite
    of a `try...finally` statement, the `finally` clause is also executed ''on the
    way out.'''
- md: "## 11.4. The try Statement\n\nThe return value of a function is determined\
    \ by the last `return` statement executed. Since the `finally` clause always executes,\
    \ a `return` statement executed in the `finally` clause will always be the last\
    \ one executed.\n\nAn exception can be \"re-raised\". For example,\n\n```\n>>>\
    \ try:\n...     sum = 100 + unknown_name\n... except:\n...     raise\n...\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 2, in <module>\nNameError:\
    \ name 'unknown_name' is not defined\n>>>\n```\n\n① The Python REPL handles the\
    \ error, and it does not crash. It waits for the next user command.\n\nIn the\
    \ context where an active `Exception` is present, the `raise` statement re-raises\
    \ the current exception/error. This example code is more or less equivalent to\
    \ the following, which explicitly raises the current exception.\n\n```\n>>> try:\n\
    ...     sum = 100 + unknown_name\n... except NameError as ex:\n...     raise ex\n\
    ...\nTraceback (most recent call last):\n  File \"<stdin>\", line 4, in <module>\n\
    \  File \"<stdin>\", line 2, in <module>\nNameError: name 'unknown_name' is not\
    \ defined\n```\n\n## 11.5. The with Statement\n\nThe `with` statement is used\
    \ to wrap the execution of a group of statements with methods defined by a context\
    \ manager. For example, it can be used to encapsulate the common `try...except...finally`\
    \ usage patterns. It has the following syntax:\n\n```\nwith Expression as Target:\
    \  # ①\n    Suite\n```\n\n① The `as` clause is optional.\n\nThe `Expression` must\
    \ evaluate to a context manager type, which supports `__enter__` and `__exit__`\
    \ methods. The execution of the `with` statement proceeds as follows:\n\n- The\
    \ context `Expression` is evaluated to obtain a context manager.\n- The context\
    \ manager's `__enter__` is loaded first.\n- The context manager's `__exit__` is\
    \ loaded next.\n- The `__enter__` method is invoked.\n- The return value from\
    \ `__enter__` is assigned to `Target`, if specified.\n- The statements in the\
    \ `Suite` is executed.\n- The `__exit__` method is invoked.\n\nFor example,\n\n\
    ```\n>>> import pathlib\n>>> path = pathlib.Path(\"hello.py\")\n>>> with (c :=\
    \ path.open(\"w\")) as file:  # ①\n...     file.write(\"print('Hello World!')\"\
    )  # ②\n...  # ③\n```\n\n```\n>>> type(c) ④\n<class '_io.TextIOWrapper'>\n>>>\
    \ dir(c) ⑤\n['_CHUNK_SIZE', '__class__', '__del__', '__delattr__',\n'__dict__',\
    \ '__dir__', '__doc__', '__enter__', '__eq__',\n'__exit__', ...]\n```\n\n① The\
    \ `path.open` function returns a context manager. Its `__enter__` method returns\
    \ a file object, if successful. *For illustration only*, we assign the context\
    \ manager to a variable `c` using the walrus operator. (The context managers cannot\
    \ generally be \"reused\".)\n\n② All statements included in the `with` statement\
    \ suite are executed, e.g., until it encounters an error, if any.\n\n③ Before\
    \ terminating the `with` statement, regardless of the error conditions, the context\
    \ manager's `__exit__` is guaranteed to be called.\n\n④ An internal type, `_io.TextIOWrapper`,\
    \ is a class manager.\n\n⑤ This object includes `__enter__` and `__exit__` methods,\
    \ as expected.\n\nThe `with` header can include more than one expression-target\
    \ items. With more than one expression-target pairs, the context managers are\
    \ processed as if multiple `with` statements were nested, from left to right.\n\
    \nFor example,\n\n```\n>>> with open(\"a.txt\") as f1, open(\"b.txt\") as f2:\n\
    ...     print(f1.read())\n...     print(f2.read())\n...\n```\n\nThis statement\
    \ is equivalent to the following:\n\n```\n>>> with open(\"a.txt\") as f1:\n...\
    \     with open(\"b.txt\") as f2:\n...         print(f1.read())\n...         print(f2.read())\n\
    ...\n```\n\n## Chapter 12. Pattern Matching\n\nPython's `match - case` statements,\
    \ which was first introduced in 3.10, can now be used where complex `if - elif\
    \ - else` statements may have been required. Pattern matching is essentially a\
    \ generalization of [the comparison expressions](https://example.com), which yield\
    \ Boolean values.\n\n## 12.1. The match - case Statement\n\nThe `match` statement\
    \ has the following general syntax:\n\n```\nmatch SubjectExpression:\n    CaseBlock\n\
    \    ...\n    CaseBlock\n```\n\nUnlike other compound statements, the `match`\
    \ statement cannot be written in one physical line. That is, a newline is always\
    \ needed after the colon. The *SubjectExpression* can be either a named expression\
    \ or one or two star named expressions (comma separated). When an expression list\
    \ is used, it is evaluated to a tuple first before the match process starts.\n\
    \nAt least one *CaseBlock* is required. That is, for instance, we cannot just\
    \ use a placeholder like the `pass` statement in the body of the `match` statement.\
    \ Each *CaseBlock* has the following forms:\n\n```\ncase Pattern:\n    Suite\n\
    ```\n\nOr\n\n```\ncase Pattern Guard:\n    Suite\n```\n\nWe go through all different\
    \ pattern categories in [the next section](the next section) that are currently\
    \ supported in Python. *Guard* is an optional Boolean condition. If included,\
    \ the case clause matches only if both the pattern matches and the condition is\
    \ satisfied.\n\nIn the simplest usage, the `match` statement can be used more\
    \ or less like the traditional `switch` statement in C. For instance,\n\n```\n\
    >>> color = Color.BLUE\n>>> match color:\n...     case Color.RED:\n...       \
    \  print(\"Color red detected\")\n...     case Color.BLUE:\n...         print(\"\
    Blue wins!\")\n...     case _:\n...         print(\"We don't care about other\
    \ colors :)\")\n...\nBlue wins!\n```\n\nThe `case` clauses do not require `break`\
    \ statements, unlike in C's `switch - case` statement. They do not \"fall through\"\
    .\n\nIn this example, the first case does not match since `color != Color.RED`.\
    \ Then the `match` statement matches the next case because `color == Color.BLUE`,\
    \ and hence the statement(s) in the matched case is executed.\n\nThe wildcard\
    \ expression `_` is used for \"catch all\". That is, the (optional) `case _` clause\
    \ is more or less equivalent to the *default* case in the C-style switch statement.\
    \ If there is no matching `case`, then the `match` statement terminates without\
    \ executing any suites. If the catch-all case `case _` is specified, then the\
    \ statements within this default case are executed.\n\n## 12.2. Patterns\n\n###\
    \ 12.2.1. The wildcard pattern\n\nAs indicated at the end of the previous section,\
