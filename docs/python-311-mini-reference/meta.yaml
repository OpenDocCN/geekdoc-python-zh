    # 14.2.5. Instance objects


    An *instance object* of a class includes all the attributes defined in the class,
    and it can include other instance-specific attributes. Attribute references can
    be used to refer to those attributes of an instance object. There are two kinds
    of attributes, the data attributes, or fields or variables, and the methods.


    As mentioned, an instance object, just like everything else in Python, has attributes,
    namely, the data attributes and the method attributes. Initially, most of its
    attributes come from its type, and those added in the `__init__` method, when
    it is created. But, as with other kinds of custom objects (including functions,
    classes, etc.), new attributes can be added to the instance objects.


    Instance objects have methods that correspond to the functions in a class definition.
    All functions that take an instance object as its first argument (e.g., `self`)
    are, by definition, "methods", and Python allows the object method calling syntax
    for these functions. For example,


    ```

    >>> class Ship:

    ...     def fly(self):

    ...         print("I cannot fly. Only spaceships can fly.")

    ```'
- md: "## 14.2.6. Instance variables\n\nAlthough we can add any attributes to an instance\
    \ object in Python, it is conventionally done in the `__init__` method. Then,\
    \ all instance objects of the class will have the same set of (not shared) attributes.\n\
    \n```python\n>>> class Pet:\n...     def __init__(self):\n...         self.kind\
    \ = \"dog\"\n...\n>>> pet1, pet2 = Pet(), Pet()\n>>> pet1.kind, pet2.kind\n('dog',\
    \ 'dog')\n```\n\nIn the initializer, the parameter `self` refers to the instance\
    \ object which has been just created by *calling* the class object. In the case\
    \ of `pet1`, for instance, `self` and `self.kind` refer to `pet1` and `pet1.kind`,\
    \ respectively. Likewise, for the `pet2` instance, `self` and `self.kind` refer\
    \ to `pet2` and `pet2.kind`, respectively.\n\nThe attribute `kind` is an instance\
    \ variable, and it belongs to a specific instance object, and they are not shared\
    \ across different instances. In addition, the class object does not have that\
    \ attribute:\n\n```python\n>>> Pet.kind\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nAttributeError: type object 'Pet' has\
    \ no attribute 'kind'\n```\n\nNote the syntax to define an instance variable in\
    \ a class definition. Instance variables are defined on the `self` object. Hence,\
    \ as a corollary, in a class definition, you can only define instance variables\
    \ within an instance method.\n\n> All user-defined types are mutable. All objects\
    \ of user-defined types are mutable.\n\n## 14.2.7. Instance methods\n\nAs indicated,\
    \ the most common statements included in `class` definitions are generally the\
    \ `def` statements to define functions. A function defined in a class is an attribute\
    \ of a class, and it is also an attribute of any instance object of that class.\
    \ And, it can be used with the method syntax on the object as long as the type\
    \ of its first argument is the same class.\n\nUnlike the class variables, the\
    \ class functions have two kinds, besides the instance methods:\n\n- One that\
    \ is just a function (except for the dotted name syntax), which is called the\
    \ \"static method\", and\n- The other which is a part of a class object and which\
    \ can access the class variables. This is called the \"class method\". The first\
    \ argument of a class method is the class object itself.\n\nAs we have seen earlier,\
    \ the builtin decorators, `@staticmethod` and `@classmethod`, can be used to specifically\
    \ declare one or the other kind of class-level methods. Otherwise, by convention,\
    \ all other methods in a class definition should be instance methods, that is,\
    \ their first function parameter must be an instance of that class, `self`.\n\n\
    ## 14.3. Object Oriented Programming\n\nA `class` definition statement is used\
    \ in Python to create a \"template\" for objects of that class. A `class` defines\
    \ a custom type, how to create an instance object of that type, and how to access\
    \ the object, among other things.\n\nA `class` always implicitly \"inherits\"\
    \ from the builtin type `object` in Python, either directly or indirectly. This\
    \ is true for any builtin or custom types. A `class` can directly inherit from\
    \ another type (which is in turn a subtype of `object`). Python supports [inheritance\
    \ from more than one direct base class](https://docs.python.org/3/tutorial/classes.html#multiple-inheritance).\n\
    \n### 14.3.1. Data encapsulation\n\nIn Python, there is no such things as real\
    \ \"private\" attributes, data or methods. Data hiding in an instance object is\
    \ supported via conventions, as with many other features in Python.\n\nA name\
    \ prefixed with an underscore `_` is treated as \"private\". That is, by convention,\
    \ we do not directly access the members of other class objects or instance objects\
    \ if their names start with one or more underscores. Such attributes are considered\
    \ an implementation detail, and they are not part of the \"public API\".\n\nPython\
    \ *does* have some minimal support for [name hiding](https://docs.python.org/3/reference/lexical_analysis.html#private-name-mangling),\
    \ however. When a name of a variable or a function/method in a class *starts with\
    \ at least two underscores and ends with at most one underscore*, then Python\
    \ modifies the attribute's name. It is called the \"name mangling\" although it\
    \ does not truly \"mangle\" the names (e.g., as in C++). Regardless, using the\
    \ mangled names should be avoided, even within your own programs. (Note that the\
    \ \"dunder names\" are not mangled, or modified, since they end with two underscores.)\n\
    \n### 14.3.2. Magic methods\n\nThe `__init__` method is a special method, as indicated.\
    \ This particular method is used to provide any initialization code for the newly\
    \ instantiated instance object. This method is automatically called, by the Python\
    \ runtime, on the newly created instance object, if it is overwritten in the object's\
    \ class.\n\nThe base type `object` has the following attributes:\n\n```python\n\
    >>> dir(object)\n['__class__', '__delattr__', '__dir__', '__doc__', '__eq__',\n\
    '__format__', '__ge__', '__getattribute__', '__gt__',\n'__hash__', '__init__',\
    \ '__init_subclass__', '__le__',\n'__lt__', '__ne__', '__new__', '__reduce__',\
    \ '__reduce_ex__',\n'__repr__', '__setattr__', '__sizeof__', '__str__',\n'__subclasshook__']\n\
    ```\n\nSince every type inherits, directly or indirectly/transitively, from this\
    \ base class `object`, these attributes are always available to all types, builtin\
    \ or user-defined. Some of those data attributes might be empty, and some of those\
    \ method attributes might have empty implementations. Also, some attributes may\
    \ not show in the `dir()` output since the `__dir__` method of a class/object\
    \ can be customized.\n\nThe `__doc__` attribute stores the docstring of the type,\
    \ if any. Otherwise, it is an empty string. As with functions, if the first statement\
    \ in the class definition suite is a string literal expression statement, then\
    \ it is automatically used as the class's docstring.\n\n(Python's builtin `help`\
    \ function uses the object's docstring as part of their automatically generated\
    \ help message.)\n\nThe `__str__` method is used when an object is used in a string\
    \ context. When a `__str__` method is not implemented in a class, it falls back\
    \ to the `__repr__` method, if present. For lower-level customization, or for\
    \ displaying debug information, etc., one can overwrite the `__repr__` method.\
    \ For example,\n\n```python\n>>> class A:\n...     def __str__(self):\n...   \
    \      return \"A from __str__()\"\n...\n>>> class B:\n...     def __repr__(self):\n\
    ...         return \"B from __repr__()\"\n...\n>>> class C:\n...     def __str__(self):\n\
    ...         return \"C from __str__()\"\n...     def __repr__(self):\n...    \
    \     return \"C from __repr__()\"\n...\n>>> a, b, c = A(), B(), C()\n>>> print(f\"\
    \"\"\\n... a = {a}\n... b = {b}\n... c = {c}\"\"\")\na = A from __str__() ①\n\
    b = B from __repr__() ②\nc = C from __str__() ③\n```\n\n① Since a's type A has\
    \ the `__str__` method implemented, it is called in the string context.\n\n② Since\
    \ b's type B has the `__repr__` method, but not `__str__` method, the `__repr__`\
    \ method is called.\n\n③ Likewise, c's `__str__` method is called in the string\
    \ context.\n\nOn the other hand,\n\n```python\n>>> print([a, b, c])\n[<__main__.A\
    \ object at 0x7093ad81f0>, B from __repr__(), C from __repr__()]\n```\n\n① The\
    \ internal implementations of lists, and other collections types, use the `__repr__`\
    \ method of its elements for their string representations. Since the type A does\
    \ not implement this method, it uses the default string representation of a (which\
    \ includes its type and memory location, etc.).\n\nWe can, and we should in many\
    \ cases, override some of these dunder methods to customize the behavior of the\
    \ custom classes. For example, methods like `__eq__` (for ==), `__ne__` (for !=),\
    \ `__ge__` (for >=), `__gt__` (for >), `__le__` (for <=), and `__lt__` (for <)\
    \ are often overwritten to customize the equality and comparison-related behaviors\
    \ of the user-defined types.\n\nFor instance,\n\n```python\n>>> from functools\
    \ import total_ordering\n>>> import random\n>>>\n>>> @total_ordering\n>>> class\
    \ Pt(object):\n...     def __init__(self, x, y):\n...         self.x, self.y =\
    \ x, y\n```"
  mdcn: "## 14.2.6. 实例变量\n\n虽然我们可以在 Python 中为实例对象添加任何属性，但通常是在 `__init__` 方法中完成。这样，该类的所有实例对象都将拥有相同的（非共享的）属性集。\n\
    \n```python\n>>> class Pet:\n...     def __init__(self):\n...         self.kind\
    \ = \"dog\"\n...\n>>> pet1, pet2 = Pet(), Pet()\n>>> pet1.kind, pet2.kind\n('dog',\
    \ 'dog')\n```\n\n在初始化器中，参数 `self` 指的是刚刚通过*调用*类对象创建的实例对象。以 `pet1` 为例，`self` 和 `self.kind`\
    \ 分别指代 `pet1` 和 `pet1.kind`。同样，对于 `pet2` 实例，`self` 和 `self.kind` 分别指代 `pet2` 和\
    \ `pet2.kind`。\n\n属性 `kind` 是一个实例变量，它属于特定的实例对象，并且在不同实例之间不共享。此外，类对象本身没有该属性：\n\n\
    ```python\n>>> Pet.kind\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nAttributeError: type object 'Pet' has no attribute 'kind'\n\
    ```\n\n请注意在类定义中定义实例变量的语法。实例变量是在 `self` 对象上定义的。因此，作为推论，在类定义中，你只能在实例方法内定义实例变量。\n\
    \n> 所有用户定义的类型都是可变的。所有用户定义类型的对象都是可变的。\n\n## 14.2.7. 实例方法\n\n如前所述，`class` 定义中包含的最常见语句通常是用于定义函数的\
    \ `def` 语句。在类中定义的函数是类的属性，也是该类任何实例对象的属性。并且，只要其第一个参数的类型是同一个类，它就可以在对象上使用方法语法调用。\n\
    \n与类变量不同，类函数除了实例外，还有两种类型：\n\n- 一种只是函数（除了点号名称语法），称为“静态方法”，以及\n- 另一种是类对象的一部分，可以访问类变量。这称为“类方法”。类方法的第一个参数是类对象本身。\n\
    \n正如我们之前所见，内置装饰器 `@staticmethod` 和 `@classmethod` 可用于专门声明其中一种或另一种类级别的方法。否则，按照惯例，类定义中的所有其他方法都应该是实例方法，即它们的第一个函数参数必须是该类的实例，`self`。\n\
    \n## 14.3. 面向对象编程\n\nPython 中的 `class` 定义语句用于为该类的对象创建一个“模板”。`class` 定义了一个自定义类型、如何创建该类型的实例对象以及如何访问对象等。\n\
    \n在 Python 中，一个 `class` 总是隐式地“继承”自内置类型 `object`，无论是直接还是间接。对于任何内置或自定义类型，这都是正确的。一个\
    \ `class` 可以直接继承自另一个类型（而该类型又是 `object` 的子类型）。Python 支持[从多个直接基类继承](https://docs.python.org/3/tutorial/classes.html#multiple-inheritance)。\n\
    \n### 14.3.1. 数据封装\n\n在 Python 中，没有真正的“私有”属性、数据或方法。实例对象中的数据隐藏是通过约定支持的，就像 Python\
