    5.2. Tokens


    Note that since parentheses can be used to group expressions, practically any
    expression can be split into multiple physical lines.


    # 5.1.6. Indentations


    In Python, the indentations of the logical lines are used to determine the grouping
    of statements.


    The indentation level of a line is computed based on the leading whitespace at
    the beginning of the line. The total number of spaces preceding the first non-blank
    character determines the line’s indentation.


    The Python lexical analyzer generates INDENT and DEDENT tokens, using a stack,
    based on the indentation levels of consecutive logical lines, which are then used
    to group logical lines into statements.


    # 5.2. Tokens


    Besides NEWLINE, INDENT and DEDENT, Python has the following categories of tokens:
    *identifiers*, *keywords*, *literals*, *operators*, and *delimiters*.


    # 5.3. Identifiers and Keywords


    The syntax of identifiers, or names, in Python is based on the Unicode standard.
    Identifiers are unlimited in length and they are case-sensitive. Within the ASCII
    range (U+0001..U+007F), the names can include the alphanumeric characters and
    the underscore (_). The names cannot start with digits. Outside the ASCII range,
    the `unicodedata` module classifies the characters which are valid in identifiers.'
