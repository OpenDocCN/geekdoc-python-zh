    zero, one, or more names/references at any given moment.


    Python is a dynamically and loosely typed programming language. Although the type
    system is at the heart of the Python programming language, and the types play
    a crucial role in Python programs, they become relevant primarily at run time,
    and only indirectly. (Python''s type system is often called "duck typing".) In
    fact, one can create a new type at run time and one can even change the type of
    an object at run time (although that is not generally a common practice).


