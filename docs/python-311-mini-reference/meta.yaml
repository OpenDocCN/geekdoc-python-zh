    # 13.2. Function Parameters


    A function can be defined with zero, one, or more parameters. There are three
    kinds of function parameters in Python.


    **Positional only parameters**

    For this type of parameters, when the function is called, the corresponding arguments
    need to be provided in the exactly the same positions as they are defined in the
    parameter list (e.g., as in C/C++ and some other C-style languages). In order
    to define positional only parameters, we use a separator `/` (forward slash).
    Any parameter preceding this optional separator is positional-only.


    **Keyword only parameters**

    For this type of parameters, they do not have the fixed positions in the parameter
    list, and the corresponding arguments need to be provided using the `parameter=value`
    syntax (known as the "keyword arguments"). To define *keyword only* parameters,
    on the other hand, we use a separator `*` (asterisk). (Or, the varargs arguments
    are also used as a separator for this purpose. See below.) The parameters following
    this optional separator, if any, are keyword-only.


    **Positional or keyword parameters**

    By default, all other parameters, they have fixed positions and they can be used
    either with the positional argument syntax (in the corresponding positions) or
    with the keyword argument syntax.'
