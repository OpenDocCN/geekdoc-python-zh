    ```\n\n① The same with the class definition. Clearly, these comments are not needed\
    \ since the use of the pass statements generally implies that they are placeholders.\n\
    \n## 10.4. The return Statement\n\nA return statement is only allowed syntactically\
    \ within a function definition. When executed, it leaves the current function\
    \ call. A return statement can include an optional argument, an expression list.\
    \ If present, the expression list is returned to the caller as the value of the\
    \ function call. If not, the None return value is assumed.\n\n```\n>>> def f():\n\
    ...     return 1, 2, 3 ①\n...\n>>> f()\n(1, 2, 3) ②\n```\n\n① The function `f`\
    \ returns an expression list with three expressions.\n② The value of the function\
