    # 13.7. map, filter, and reduce


    # 13.7.1. The map function


    The builtin map function takes a function and an iterable and it applies the function
    to each element in the given iterable. For example,


    ```

    >>> list(map(lambda x: x**2, [1, 2, 3]))

    [1, 4, 9]

    ```


    ① The map function returns a map object. (That is, it is a constructor.) We use
    the list constructor to convert the returned map to a list.


    # 13.7.2. The filter function


    The builtin filter function likewise takes a function and an iterable, and it
    returns a filtered list based on the given function. For example,


    ```

    >>> list(filter(

    ...     lambda x: True if x%2==0 else False,

    ...     [1, 2, 3, 4]))

    [2, 4]

    ```


    ① The same with filter. It is a constructor function.

    ② It applies the function to each element in the given iterable, and if its Boolean
    value is True (e.g., 3, ''hello'', etc.), it is included in the result. Otherwise
    (e.g., None, [], etc.), it is filtered out.


    # 13.7.3. The functools.reduce function


    The reduce function of the functools module works in a similar manner, but it
    applies the given function cumulatively to all elements in the given iterable.


