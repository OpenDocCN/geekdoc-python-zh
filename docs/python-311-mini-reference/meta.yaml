  md: '# Community Support


    # Code and Tips


    We are building a website for programmers, from beginners to more experienced.
    It covers various coding-related topics from algorithms to machine learning, and
    from design patterns to cybersecurity, and more. We publish new content on a weekly
    basis.


    +   - www.codeandtips.com


    You can also find some sample code in the GitLab repositories:


    +   - gitlab.com/codeandtips


    # Mailing List


    Please join our mailing list, join@codingbookspress.com, to receive coding tips
    and other news from **Coding Books Press**, including free, or discounted, book
    promotions. If you let us know which book you have bought, and if we find any
    significant errors in the book, then we will notify you. Advance review copies
    will be made available to select members on the list before new books are published
    so that their input can be incorporated, if feasible.


    # Office Hours


    We may set up a regular time, weekly or monthly, to answer any questions from
    the readers, or to go through some of the exercises in the book together, *if
    there is a demand*. If you sign up on the mailing list, then we will notify you
    when the office hours starts.


    *Revision 0.9.0, 2022-10-03*'
