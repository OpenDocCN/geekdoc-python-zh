    The * (multiplication) operator yields the product of its arguments. The arguments
    must either both be numbers, in which case they are multiplied together, or one
    argument must be an integer and the other must be a sequence, in which case sequence
    repetition is performed. A negative repetition factor yields an empty sequence.


    The / (division) and // (floor division) operators yield the quotient of their
    arguments. Division of floats or integers yields a float, while floor division
    of integers results in an integer. Division by zero raises the ZeroDivisionError
    exception.


    The % (modulo) operator yields the remainder from the division of the first argument
    by the second. A zero right argument raises the ZeroDivisionError exception. The
    arguments may be floating point numbers, e.g., 3.14 % 0.7 equals 0.34 (since 3.14
    equals 4 * 0.7 + 0.34). The modulo operator always yields a result with the same
    sign as its second operand (or zero).


    The floor division and modulo operators are connected by the following identity:
    x == (x // y) * y + (x % y). Floor division and modulo are also connected with
    the built-in function divmod: divmod(x, y) == (x // y, x % y).


    The + (addition) operator yields the sum of its arguments. The arguments must
    either both be numbers, in which case they are added together, or both be sequences
    of the same type, in which case the sequences are concatenated. The - (subtraction)
    operator yields the difference of its arguments.


    # 9.6.3. The power operator


    The power operator (**) takes two arguments and it works the same way as the built-in
    pow function. That is, x ** y is equivalent to pow(x, y), which yields the value
    x raised to the power of y.'
