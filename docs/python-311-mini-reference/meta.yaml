- img_proc: true
  md: 'Nonetheless, once you reach a certain point, say, from the advanced beginners
    to intermediate level, its complexity can be overwhelming.


    This book will give you a broad and *sanitized* overview of the Python language,
    as of its most recent incarnation (e.g., 3.10 and 3.11). This book can be useful
    to anyone who has been dabbling with Python without solid foundation. It can also
    be useful to the people who have experience with other programming languages and
    want to get some quick overview of the language.


    This book is written as an (informal) language reference. The goal of this book
    is not to teach you how to program effectively in Python, but rather to provide
    a concise summary of the language grammar. If you have some basic programming
    knowledge, you can read this book more or less from beginning to end, and you
    should be able to get the overall understanding of the Python programming language
    quickly, regardless of your particular programming background.


    The book is written for a broad audience, but one caveat is that there are a fair
    amount of cross references, unlike in the books written in a tutorial style. If
    you have no prior experience with programming in Python or any similar language,
    then you may find it a little difficult to go through some parts of the book.
    This book is not for complete beginners. It skims through some elementary concepts
    in the beginning, for the sake of brevity, so that we can focus more on the intermediate
    and advanced level topics.


    > This book is not an authoritative language reference. For that, we recommend
    the readers to refer to the official language specification.'
