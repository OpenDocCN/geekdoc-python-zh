- md: "One of the most significant changes to Python for the last 30+ years has been\
    \ the addition of [structural pattern matching](https://docs.python.org/3/reference/compound_stmts.html#the-match-statement)\
    \ to the language, as of Python 3.10 (2021). Pattern matching was first popularized\
    \ by functional programming languages like Haskell, and it is now becoming more\
    \ and more widely available across many different programming languages like C#,\
    \ Rust, Swift, Scala, and (yes) even Java. ☺\n\nAs we more adopt this feature,\
    \ as a community, pattern matching will likely change how we program in Python\
    \ in the coming years. Although it is currently supported only in the context\
    \ of the `match` statement, it is conceivable, and in fact expected, that pattern\
    \ matching will be available more broadly across the language in the near future,\
    \ considering its simplicity, elegance, and power.\n\nA function definition is\
    \ a compound statement. We dedicate its own chapter to [the function definition](https://docs.python.org/3/reference/compound_stmts.html#function-definitions).\
    \ This chapter also includes other function-related topics such as lambda expressions\
    \ and decorators.\n\nAnother compound statement, [the class definition](https://docs.python.org/3/reference/compound_stmts.html#class-definitions),\
    \ is explained next. Other class-related concepts such enums and class decorators\
    \ are also described in this chapter. We also provide an informal introduction\
    \ to the basics of the object oriented programming styles in Python, including\
    \ multiple inheritance.\n\nSpecial kinds of functions, generators and coroutines,\
    \ are separately discussed in the last part of the book, in [the Coroutines chapter](https://docs.python.org/3/reference/compound_stmts.html#async-def).\
    \ We briefly touch on the (high-level) asynchronous programming style in Python\
    \ using the new `async` and `await` keywords.\n\nAs stated, we do not exhaustively\
    \ cover every topic in Python in this \"mini reference\", including the (low-level)\
    \ multi-thread and multi-process programming, etc. However, it goes through all\
    \ *the essential language features* that any intermediate to advanced level Python\
    \ programmers should be familiar with.\n\n## Chapter 2. Python Programs\n\nA complete\
    \ Python program can be passed to the Python interpreter:\n\n- With the -c command\
    \ line option with a program text,\n- With the -m command line option with a module\
    \ name,\n- As a file name passed as the first command line argument, or\n- From\
    \ the standard input.\n\nThe Python interpreter executes the input file, or the\
    \ input text, as a complete program, in the namespace of a special module, `__main__`.\n\
    \nWhen the file or standard input is a terminal, or when the Python interpreter\
    \ is invoked without an argument, the interpreter enters the interactive mode.\
    \ The Python interpreter reads and executes one statement at a time (simple or\
    \ compound) in the interactive mode instead of executing a complete program.\n\
    \nHere are a few examples:\n\n```\n$ python -c \"print('Hello World!')\"\n```\n\
    \n① A complete Python program is executed using the -c flag.\n\n```\n$ python\
    \ main.py\n```\n\n① The Python script is passed to the interpreter as a command\
    \ line argument.\n\n```\n$ python -m hello_world\n```\n\n① The Python module `hello_world`\
    \ is executed through the -m flag.\n\n```\n$ echo \"print('huh?')\" | python\n\
    ```\n\n① The Python code from the stdin (via Unix pipe).\n\n```\n$ python <<<\
    \ \"print('a')\"\n```\n\n① Using the Unix shell \"here string\" syntax.\n\n```\n\
    $ python << EOF\n> print(\"hello\")\n> print(\"world\")\n> EOF\n```\n\n① The \"\
    here doc\".\n\n```\n$ python\n```\n\n① Invoking the python command without an\
    \ argument starts the REPL.\n\n```\n$ python -\n```\n\n① Ditto. The Python interpreter\
    \ ignores the flags following the dash -.\n\n```\n$ python -i\n```\n\n① It also\
    \ starts the interactive shell. The -i flag can be combined with other flags,\
    \ e.g., -m, -c, etc.\n\n> We will use the Unix shell for illustration, throughout\
    \ the book, when relevant. Depending on your platform, some commands may not work\
    \ exactly as indicated here.\n\n## 2.1. File/Text Input\n\nA complete Python program\
    \ is a series of zero or more statements, with optional newlines between the statements.\
    \ A complete program with this form is expected in the following situations:\n\
    \n- When a Python program is read from a file or from an input string,\n- When\
    \ an imported module is parsed, and\n- When a string argument is passed to the\
    \ builtin `exec` function.\n\nAs indicated, the main module of a running program\
    \ is always called `__main__` in Python.\n\n## 2.2. Interactive Mode\n\nThe Python\
    \ interpreter in the interactive mode (aka Python REPL) does not execute a complete\
    \ program. Instead, it reads and executes one statement at a time. Each input\
    \ comprises a code block in the namespace of `__main__`.\n\nA top-level compound\
    \ statement must be followed by an extra newline in the interactive mode, which\
    \ is used by the parser to detect the end of the input.\n\n```\n$ python\nPython\
    \ 3.10.4 (main, Jun 29 2022, 12:14:53) [GCC 11.2.0] on linux\nType \"help\", \"\
    copyright\", \"credits\" or \"license\" for more information.\n>>> \n>>> for levels\
    \ in (\"White\", \"Black\"):\n...     print(levels)\n...\nWhite\nBlack\n>>> \n\
    >>> exit()\n$\n```\n\n① A command that starts the Python REPL. This might be different\
    \ on your system.\n\n② The Python REPL prompt, >>> . We just pressed Enter in\
    \ this example.\n\n③ The first line of a for compound statement.\n\n④ The Prompt\
    \ has changed from >>> to ... . The statements in the for \"suite\" need to be\
    \ indented.\n\n⑤ We press Enter one more time to signal the end of the compound\
    \ statement to the Python interpreter.\n\n⑥ The output, displayed in two lines.\
    \ Note that the output lines are not preceded by the REPL prompts.\n\n⑦ The Python\
    \ REPL waits for another command/statement. We press Enter again in this example.\n\
    \n⑧ You can exit the Python REPL by calling the builtin exit or quit functions,\
    \ or by issuing the EOF signal (e.g., CTRL+D or CMD+D).\n\n⑨ Back to the Unix\
    \ shell.\n\n## Chapter 3. Program Execution\n\n## 3.1. Code Blocks\n\nA Python\
    \ program is executed in a series of \"execution frames\". A piece of Python program\
    \ that is executed as a unit in an execution frame is called a \"code block\"\
    .\n\nFor example, modules and function/class definitions are code blocks, among\
    \ other things. An entire program passed to the interpreter, e.g., as -c option\
    \ or as a file argument, is a code block (more precisely, the top-level code block).\
    \ So is an imported module. The code blocks can be nested.\n\n## 3.2. Name Binding\n\
    \nIn Python, all values are \"objects\", and objects are often referred to by\
    \ their \"names\". Names are introduced by name binding operations.\n\nFor example,\
    \ `import` statements, function and class definitions, and assignment expressions\
    \ and statements bind names within their enclosing code blocks. Function parameters\
    \ also bind names, within the function definition block. If a name is bound in\
    \ a block, it is a \"local variable\" of that block by default.\n\nIf a name is\
    \ bound at the module level, it is also a \"global variable\". The `import statement`\
    \ of the form “from XYZ import *” can only be used at the module level. It binds\
    \ all names defined in the imported module that do not begin with an underscore\
    \ (_). All names imported this way are global (as well as local with respect to\
    \ the importing module).\n\n## 3.3. Scope\n\nA name is accessible within a particular\
    \ part of a program, e.g., within the code block where the name is bound. This\
    \ is called a \"scope\". The scope of a local variable bound in a code block includes\
    \ that block.\n\nWhen a name is used in a code block, the smallest enclosing scope\
    \ is used to find the binding of the name. It is called the \"name resolution\"\
    . If the name cannot be resolved, then an exception is raised. Depending on the\
    \ context, `NameError`, or more specifically `UnboundLocalError`, may be raised.\n\
    \n### 3.3.1. Function definition block\n\nA `function def statement` defines a\
    \ code block. If a name is bound in a function block, then its scope includes\
    \ this function block and any other blocks that are contained/nested therein.\n\
    \n### 3.3.2. Class definition block\n\nIn a `class definition`, the scope of the\
    \ names defined in a class block is limited to that class block only, *excluding*\
    \ those of the enclosed methods. The local variables that are not bound in the\
    \ class block are looked up in the global namespace.\n\n### 3.3.3. The `global`\
    \ statement\n\nIf a `global statement` is used for a name in a block, then the\
    \ uses of the name refer to its binding in the top-level namespace, which includes\
    \ those of the code block module and the `builtins` module, as well as the builtins\
    \ namespace.\n\n### 3.3.4. The `nonlocal` statement\n\nIf a `nonlocal statement`\
    \ is used for a name in a code block, the name"
  mdcn: "过去30多年来，Python 最重大的变化之一是在 Python 3.10（2021年）版本中为语言添加了[结构化模式匹配](https://docs.python.org/3/reference/compound_stmts.html#the-match-statement)。模式匹配最初由\
    \ Haskell 等函数式编程语言普及，如今在 C#、Rust、Swift、Scala 以及（是的）甚至 Java 等众多不同的编程语言中变得越来越普遍。☺\n\
    \n随着我们社区越来越多地采用这一特性，模式匹配很可能会在未来几年改变我们编写 Python 程序的方式。尽管目前它仅在 `match` 语句的上下文中受支持，但考虑到其简洁性、优雅性和强大功能，可以预见，并且事实上也预期，模式匹配在不久的将来将在整个语言中更广泛地可用。\n\
    \n函数定义是一种复合语句。我们为[函数定义](https://docs.python.org/3/reference/compound_stmts.html#function-definitions)专门设有一章。本章还包括其他与函数相关的主题，例如\
    \ lambda 表达式和装饰器。\n\n接下来解释另一种复合语句，[类定义](https://docs.python.org/3/reference/compound_stmts.html#class-definitions)。本章也描述了其他与类相关的概念，如枚举和类装饰器。我们还对\
    \ Python 中面向对象编程风格的基础知识进行了非正式介绍，包括多重继承。\n\n特殊类型的函数，生成器和协程，在本书的最后一部分[协程章节](https://docs.python.org/3/reference/compound_stmts.html#async-def)中单独讨论。我们简要介绍了使用新的\
    \ `async` 和 `await` 关键字进行（高级）异步编程的风格。\n\n如前所述，我们并未在这本“迷你参考”中详尽涵盖 Python 的每个主题，包括（低级）多线程和多进程编程等。然而，它涵盖了任何中级到高级\
    \ Python 程序员都应熟悉的所有*核心语言特性*。\n\n## 第2章. Python 程序\n\n一个完整的 Python 程序可以传递给 Python\
    \ 解释器：\n\n-   使用 -c 命令行选项传递程序文本，\n-   使用 -m 命令行选项传递模块名，\n-   作为第一个命令行参数传递的文件名，或\n\
    -   从标准输入。\n\nPython 解释器在特殊模块 `__main__` 的命名空间中，将输入文件或输入文本作为完整程序执行。\n\n当文件或标准输入是终端时，或者当\
    \ Python 解释器在没有参数的情况下被调用时，解释器会进入交互模式。在交互模式下，Python 解释器一次读取并执行一条语句（简单或复合语句），而不是执行完整的程序。\n\
    \n以下是一些示例：\n\n```\n$ python -c \"print('Hello World!')\"\n```\n\n① 使用 -c 标志执行一个完整的\
    \ Python 程序。\n\n```\n$ python main.py\n```\n\n① Python 脚本作为命令行参数传递给解释器。\n\n```\n\
    $ python -m hello_world\n```\n\n① 通过 -m 标志执行 Python 模块 `hello_world`。\n\n```\n\
    $ echo \"print('huh?')\" | python\n```\n\n① 来自 stdin（通过 Unix 管道）的 Python 代码。\n\
    \n```\n$ python <<< \"print('a')\"\n```\n\n① 使用 Unix shell 的“here string”语法。\n\
    \n```\n$ python << EOF\n> print(\"hello\")\n> print(\"world\")\n> EOF\n```\n\n\
    ① “here doc”。\n\n```\n$ python\n```\n\n① 不带参数调用 python 命令会启动 REPL。\n\n```\n$ python\
    \ -\n```\n\n① 同上。Python 解释器会忽略短横线 - 后面的标志。\n\n```\n$ python -i\n```\n\n① 这也会启动交互式\
    \ shell。-i 标志可以与其他标志组合使用，例如 -m、-c 等。\n\n> 在本书中，当相关时，我们将使用 Unix shell 进行说明。根据您的平台，某些命令可能无法完全按照此处所示工作。\n\
    \n## 2.1. 文件/文本输入\n\n一个完整的 Python 程序是一系列零条或多条语句，语句之间可选地包含换行符。在以下情况下需要这种形式的完整程序：\n\
    \n-   当从文件或输入字符串读取 Python 程序时，\n-   当解析导入的模块时，以及\n-   当将字符串参数传递给内置 `exec` 函数时。\n\
    \n如前所述，运行程序的主模块在 Python 中始终称为 `__main__`。\n\n## 2.2. 交互模式\n\n交互模式下的 Python 解释器（也称为\
    \ Python REPL）不执行完整的程序。相反，它一次读取并执行一条语句。每个输入都在 `__main__` 的命名空间中构成一个代码块。\n\n在交互模式下，顶级复合语句后必须跟一个额外的换行符，解析器使用它来检测输入的结束。\n\
    \n```\n$ python\nPython 3.10.4 (main, Jun 29 2022, 12:14:53) [GCC 11.2.0] on linux\n\
    Type \"help\", \"copyright\", \"credits\" or \"license\" for more information.\n\
    >>> \n>>> for levels in (\"White\", \"Black\"):\n...     print(levels)\n...\n\
    White\nBlack\n>>> \n>>> exit()\n$\n```\n\n① 启动 Python REPL 的命令。在您的系统上可能有所不同。\n\
    \n② Python REPL 提示符，>>>。在此示例中，我们刚刚按下了 Enter。\n\n③ for 复合语句的第一行。\n\n④ 提示符已从 >>>\
    \ 变为 ...。for “套件”中的语句需要缩进。\n\n⑤ 我们再次按 Enter，向 Python 解释器发出复合语句结束的信号。\n\n⑥ 输出，显示在两行中。请注意，输出行前面没有\
    \ REPL 提示符。\n\n⑦ Python REPL 等待另一个命令/语句。在此示例中，我们再次按 Enter。\n\n⑧ 您可以通过调用内置的 exit\
    \ 或 quit 函数，或发出 EOF 信号（例如 CTRL+D 或 CMD+D）来退出 Python REPL。\n\n⑨ 返回 Unix shell。\n\
    \n## 第3章. 程序执行\n\n## 3.1. 代码块\n\nPython 程序在一系列“执行帧”中执行。在执行帧中作为单元执行的一段 Python 程序称为“代码块”。\n\
    \n例如，模块和函数/类定义是代码块，以及其他东西。传递给解释器的整个程序，例如作为 -c 选项或作为文件参数，是一个代码块（更准确地说，是顶级代码块）。导入的模块也是如此。代码块可以嵌套。\n\
    \n## 3.2. 名称绑定\n\n在 Python 中，所有值都是“对象”，对象通常通过其“名称”来引用。名称通过名称绑定操作引入。\n\n例如，`import`\
    \ 语句、函数和类定义以及赋值表达式和语句在其封闭代码块内绑定名称。函数参数也在函数定义块内绑定名称。如果一个名称在块中被绑定，它默认是该块的“局部变量”。\n\
    \n如果一个名称在模块级别被绑定，它也是一个“全局变量”。形式为“from XYZ import *”的 `import statement` 只能在模块级别使用。它绑定导入模块中定义的所有不以下划线\
    \ (_) 开头的名称。所有以此方式导入的名称都是全局的（相对于导入模块也是局部的）。\n\n## 3.3. 作用域\n\n一个名称在程序的特定部分内可访问，例如在名称被绑定的代码块内。这称为“作用域”。在代码块中绑定的局部变量的作用域包括该块。\n\
    \n当在代码块中使用名称时，会使用最小的封闭作用域来查找名称的绑定。这称为“名称解析”。如果名称无法解析，则会引发异常。根据上下文，可能会引发 `NameError`，或者更具体地说是\
    \ `UnboundLocalError`。\n\n### 3.3.1. 函数定义块\n\n`function def statement` 定义一个代码块。如果一个名称在函数块中被绑定，那么它的作用域包括此函数块以及其中包含/嵌套的任何其他块。\n\
    \n### 3.3.2. 类定义块\n\n在 `class definition` 中，类块中定义的名称的作用域仅限于该类块，*不包括*封闭方法的名称。未在类块中绑定的局部变量将在全局命名空间中查找。\n\
    \n### 3.3.3. `global` 语句\n\n如果在块中对某个名称使用了 `global statement`，那么对该名称的引用将指向其在顶级命名空间中的绑定，该命名空间包括代码块模块和\
    \ `builtins` 模块的绑定，以及内置命名空间。\n\n### 3.3.4. `nonlocal` 语句\n\n如果在代码块中对某个名称使用了 `nonlocal\
    \ statement`，则该名称"
