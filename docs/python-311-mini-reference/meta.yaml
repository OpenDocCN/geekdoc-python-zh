    \n当 `return` 将控制权从带有 `finally` 子句的 `try` 语句中传出时，该 `finally` 子句会在离开函数之前执行。\n\n\
    ## 10.5. `raise` 语句\n\n`raise` 语句引发或抛出一个异常或异常组：\n\n- 如果提供了参数，\n    - 如果它求值为 `BaseException`\
