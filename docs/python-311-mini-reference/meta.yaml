    # 4.2. Packages


    To help organize modules, Python has a concept of `packages`. A package is a special
    kind of module, and it provides a namespace/naming hierarchy. Technically, packages
    are modules that contains a `__path__` attribute.


    If the Python interpreter is invoked with a script, then a package corresponds
    to a directory on a file system and a regular non-package module corresponds to
    a Python source file. Like file system directories, packages are organized hierarchically,
    and packages may contain other packages, as well as regular modules.


    Every module has a name. Subpackage names are separated from their parent package
    name by a dot (.). A module''s `__name__` attribute is set to the fully-qualified
    name of the module. Module''s qualified names are used to uniquely identify the
    modules in the Python import system.


    There are two kinds of packages in Python, "regular packages" and "namespace packages".


    # 4.2.1. Regular packages


    A regular package is typically implemented as a directory containing an `__init__.py`
    file. When a regular package is imported, the `__init__.py` files of the package
    and all of its parent packages are implicitly executed. The objects defined in
    each package''s `__init__.py` file are bound to names in the package''s namespace.'
