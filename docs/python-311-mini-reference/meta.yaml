    # 5.6. Operators


    The following tokens are operators in Python:


    | + | - | * | ** | / | // | % | @ |

    | << | >> | & | | | ^ | ~ | := |

    | < | > | <= | >= | == | != | | |


    # 5.7. Delimiters


    The following tokens, other than whitespaces, serve as delimiters in the Python
    grammar:


    | ( | ) | [ | ] | { | } |

    | , | : | . | ; | @ | = | -> |


    The following tokens, the augmented assignment operators, perform operations,
    and they are also lexical delimiters.


    | += | -= | *= | /= | //= | %= | @= |

    | &= | |= | ^= | >>= | <<= | **= | |'
