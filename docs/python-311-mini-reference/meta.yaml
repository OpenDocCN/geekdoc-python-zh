  - '[PAGE 56]


    # 8.1.2. Literal syntax


    Another way to create builtin collections is to use the literal syntax,


    +   - Either by explicitly listing the elements, or

    - By providing "instructions" as to how to generate the element list, which is
    called a *comprehension*.


    Here are some examples of the explicit literal syntax:


    ```

    (1, 2, 3) ①

    [1, 2, 3] ②

    {1, 2, 3} ③

    {"a": 1, "b": 2, "c": 3} ④

    ```


    ① This literal creates a `tuple` of three integer elements, `1`, `2`, and `3`,
    enclosed in a pair of parentheses `((...))`. For a one-element tuple, a trailing
    comma is required. E.g., `(1,)`.

    ② A `list` literal, enclosed in a pair of square brackets `([...])`.

    ③ A `set` literal, enclosed in a pair of curly braces `({...})`.

    ④ This literal creates a `dict` of three key-value pairs, `("a", 1)`, `("b", 2)`,
    and `("c", 3)`. Dictionaries use the same curly braces `({...})` as sets, for
    their literals. The literal `{}` represents an empty dictionary.


    # 8.1.3. Comprehensions


    Lists, sets, and dictionaries (but not tuples) can also be constructed using the
    comprehension syntax. The comprehension consists of the following general components:


    +   - An expression, followed by

    - At least one `for` clause, and

    - Zero or more `if` or (nested) `for` clauses.'
  - '[PAGE 57]


    8.2. Sequences


    The `for` clause has the following general syntax:


    +   - The `for` keyword, or `async for`,

    - The target variable list, and

    - The `in` keyword, followed by

    - An iterable, or an `async` iterable, respectively.


    # 8.2. Sequences


    Sequences are ordered sets indexed by non-negative integers. The `i`-th item of
    a sequence `a` is selected by `a[i]`. The index runs from 0 to `len(a) - 1`. `len`
    is a built-in function that returns the number of items in a sequence.


    "Slicing" a sequence produces another sequence of the same type, called a slice.
    For example, `a[i:j]` selects all items with index between `i` (inclusive) and
    `j` (exclusive). The index of a slice starts from 0 regardless of how it is sliced.


    # 8.2.1. Sequence unpacking


    An `expression list` evaluates to a `tuple` object. When the resulting tuple is
    assigned to a single variable, it is called "tuple packing":


    ```

    >>> x = 1, ''a'', True

    >>> x

    (1, ''a'', True)

    ```


    ① "Tuple packing". The type of `x` is `tuple`. The three values on the right-hand
    side have been "packed" into one variable.


    On the flip side, a sequence type object can be "unpacked" to multiple variables.'
  - '[PAGE 58]


    ```

    >>> p, q, r = [''a'', ''b'', ''c''] ①

    >>> p, q, r

    (''a'', ''b'', ''c'')

    ```


    ① A single list with three items on the right-hand side has been "unpacked" to
    three variables, p, q, and r.


    Normally, the number of variables must be the same as that of elements in the
    sequence. Python, however, supports a special syntax for the "remaining elements".
    For example,


    ```

    >>> p, *q = [1, 2, 3, 4] ①

    >>> p, q

    (1, [2, 3, 4])

    ```


    ① At most one variable in the unpacking syntax can be marked with *. This variable
    gets all the remaining elements from the sequence after each leading or trailing
    element has been mapped to the corresponding variable. Note that the type of q
    is list.


    # 8.3. Immutable Sequences


    An object of an immutable sequence type cannot change once it is created. (We
    explained earlier what exactly the "immutability" means in Python.)


    # 8.3.1. Strings


    A string is a sequence of values that represent Unicode code points. Python does
    not have a character type. The built-in function ord converts a code point from
    its string form to an integer in the range 0 - 0x10FFFF. On the other hand, chr
    converts an integer in the range 0 - 0x10FFFF to the corresponding length-1 string
    object.'
  - '[PAGE 59]


    8.4. Mutable Sequences


    Strings can be concatenated with the `+` operator. Adding two strings returns
    a *new* string. Strings are truly immutable in Python.


    # 8.3.2. Tuples


    A `tuple` is an immutable sequence of zero, one, or more arbitrary Python objects
    within a pair of parentheses.


    The *length* of a tuple, that is, the number of elements, or items, in the tuple,
    can be computed using the Python builtin function, `len`.


    ```

    >>> len((False, "Hello", 1_000_000))

    3

    ```


    # 8.3.3. Bytes sequences


    Python does not have a byte type. Instead, it has a `bytes` sequence type, which
    is an immutable array of 8-bit bytes.


    # 8.4. Mutable Sequences


    Items of a mutable sequence can be changed after they are created, e.g., using
    the assignment or `del` (delete) statements.


    # 8.4.1. Lists


    The `list` type is another important builtin data type in Python. A list is a
    mutable sequence of zero, one, or more arbitrary Python objects. A list can be
    modified using the builtin `list` methods such as `append`, `insert`, `pop`, and
    `remove`, etc. The order of the elements in a list can be updated using the methods,
    `reverse` and `sort`.


    As with tuples, the `len` builtin function can be used to get the number of elements
    in a list. For instance,'
  - '[PAGE 60]


    ```

    >>> len([1.0, 2.0, 3.0])

    3

    ```


    # 8.4.2. List comprehension


    A `list` can be created by using the `list comprehension syntax`, in addition
    to the explicit literal syntax. For example,


    ```

    >>> [ x**x for x in range(5) ] ①

    [0, 1, 4, 9, 16]

    >>> [ x**x for x in range(5) if x % 2 == 0 ] ②

    [0, 4, 16]

    ```


    ① This expression evaluates to `[0, 1, 4, 9, 16]`.

    ② The `if` clause can be used to filter elements.


    A list comprehension, as well as the list literal expression, yields a *new* list
    object every time they are evaluated.


    # 8.4.3. Byte arrays


    `bytearray` objects are like `bytes` sequences, but they are mutable. A `bytearray`
    object is created by the built-in `bytearray` constructor.


    # 8.5. Set Types


    The set types represent unordered sets of unique, immutable objects. (Elements
    of a set type are comparable to the keys of a `mapping type`.)


    The items in a set cannot be indexed using the subscription syntax. But they can
    be iterated over, as with other sequence types. (That is, a set is an `iterable`.)
    The built-in function `len` returns the number of items in a set.'
  - '[PAGE 61]


    8.6. Mappings


    # 8.5.1. Sets


    A `set` represents a mutable set. They can be created by the built-in `set` constructor,
    as illustrated earlier.


    # 8.5.2. Set comprehension


    A `set` can be created using the [set comprehension syntax](https://docs.python.org/3/reference/expressions.html#set-displays),
    in addition to the explicit literal syntax. For example,


    ```

    >>> type({1, 3, 5, 7})

    <class ''set''>

    >>> { x*2 for x in range(5) }

    {0, 2, 4, 6, 8}

    ```


    ① A set literal, `{1, 3, 5, 7}`.

    ② This expression evaluates to `{0, 2, 4, 8, 6}`.


    A set comprehension, as well as the literal expression with a comma-separated
    list of elements, returns a *new* mutable set object each time they are evaluated.


    # 8.5.3. Frozen sets


    The built-in `frozenset` constructor creates a `frozenset` object, which is an
    immutable set.


    # 8.6. Mappings


    Mapping types represent ordered or unordered sets of objects indexed by arbitrary
    index sets, or keys. The built-in function `len` returns the number of items in
    a mapping object. The subscript notation `a[k]` selects the item indexed by `k`
    from the mapping `a`. This can be used, for example, as the target of assignments
    or `del` statements.'
  - '[PAGE 62]


    # 8.6.1. Dictionaries


    A dictionary is the builtin mutable mapping type in Python. They represent finite
    sets of objects indexed by the values of any type that support constant hash values.


    Dictionaries preserve insertion order. That is, keys will be produced in the same
    order they were added sequentially to the dictionary.


    # 8.6.2. Dictionary comprehension


    A new `dict` object can be created using the [dictionary comprehension syntax](https://docs.python.org/3/reference/expressions.html#dict),
    in addition to the literal syntax by listing elements. For example,


    ```

    >>> { str(x): x**2 for x in range(4) } ①

    {''0'': 0, ''1'': 1, ''2'': 4, ''3'': 9}

    ```


    ① Note the expression syntax `(k:v)` before the `for` clause.


    # 8.6.3. Element insertion/deletion


    ```

    >>> d = {"a": 1}

    >>> d[''b''] = 2 ①

    >>> del(d[''a'']) ②

    >>> d

    {''b'': 2}

    ```


    ① Overwrites an existing element if the element exists with a given key. Otherwise,
    it inserts a new element.


    ② The `del` statement is described later in the book.'
- md: "## Chapter 9. Expressions\n\nAn \"expression\" comprises operators and operands\
    \ and it evaluates to a value. A value is (trivially) an expression.\n\nIn Python,\
    \ the building blocks of an expression are called \"atoms\". Atoms include [lexical\
    \ tokens](lexical tokens) like identifiers and literals, and they can be nested.\
    \ Expressions enclosed in parentheses, square brackets or curly braces are also\
    \ syntactically atoms.\n\nAt the next level up, the following \"primaries\" represent\
    \ the most tightly bound operations:\n\n**Attribute References**\nA primary followed\
    \ by a period and a name, called the attribute reference, is also a primary. An\
    \ object's attribute reference can be customized by overriding its `__getattr__`\
    \ method.\n\n**Subscriptions**\nSubscription, or indexing, of a sequence (e.g.,\
    \ string, tuple, or list) or mapping object (e.g., dictionary) selects an item\
    \ from the given collection. User-defined objects can support subscription by\
    \ implementing a `__getitem__` method.\n\n**Slicings**\nA slicing selects a range\
    \ of items in a sequence object. Slicings may be used as expressions or as targets\
    \ in assignment or `del` statements. The primary is indexed (using the same `__getitem__`\
    \ method as the subscription) with a key that is constructed from the slice list,\
    \ as follows.\n\n- If the slice list contains at least one comma, the key is a\
    \ tuple containing the conversion of the slice items.\n- Otherwise, the conversion\
    \ of the lone slice item is the key.\n\n## Calls\n\nA \"call\" calls a callable\
    \ object (e.g., a `function` or `class`) with a (possibly empty) series of arguments.\
    \ All objects having a `__call__` method are callable such as built-in functions,\
    \ methods of built-in objects, class objects, methods of class instances, and\
    \ user-defined functions. All argument expressions are evaluated before the call\
    \ is attempted.\n\nThere are a few different kinds of expressions in Python. An\
    \ expression can comprise one or more other (sub-)expressions, e.g., combined\
    \ with operators.\n\n- Arithmetic conversions.\n- Arithmetic operations, unary\
    \ and binary.\n- Bitwise operations, unary and binary.\n- Shifting operations.\n\
    - Comparisons (`==`, `!=`, `>`, `>=`, `<`, `<=`)\n- Boolean operations (`not`,\
    \ `and`, and `or`).\n- Assignment expressions.\n- Conditional expressions.\n\n\
    [Lambda expressions](https://docs.python.org/3/reference/expressions.html#lambda)\
    \ and [await expressions](https://docs.python.org/3/reference/expressions.html#await)\
    \ are described later in the book.\n\n## 9.1. Expression Lists\n\nAn expression\
    \ list is a series of one or more expressions, separated by commas. A trailing\
    \ comma is optional, except for an expression list comprising a single expression.\
    \ The expressions in an expression list are evaluated from left to right.\n\n\
    An expression list of one or more expressions yields to a tuple with the corresponding\
    \ number of elements. For instance,\n\n```\n>>> 50 + 50, 100 * 2\n(100, 200)\n\
    ```\n\n① The Python interpreter first computes `50 + 50`, which is evaluated to\
    \ `100`, and then it computes `100 * 2`, which is evaluated to `200`.\n② The value\
    \ of this expression list is a tuple, e.g., as represented by a tuple literal\
    \ `(100, 200)` in this case.\n\n```\n>>> 1 / 2\n0.5\n>>> 1 / 2,\n(0.5,)\n```\n\
    \n① The value of an expression `1 / 2` is `0.5`.\n② The value of an expression\
    \ list `1 / 2,` is `(0.5,)`. The trailing comma is required for single-expression\
    \ expression lists.\n\nThe \"iterable unpacking\" syntax, using the asterisk `*`\
    \ operator, may be used in the expressions of the `iterable` types in an expression\
    \ list.\n\n```\n>>> a, b, c = 1, [2, 3, 4], 5\n>>> a, b, c\n(1, [2, 3, 4], 5)\n\
    >>> a, *b, c\n(1, 2, 3, 4, 5)\n>>> *b,\n(2, 3, 4)\n```\n\n① `b` is a list, an\
    \ iterable type.\n② Unpacking `b`. The elements of `b` is now a part of the resulting\
    \ tuple.\n③ Unpacking in an expression list comprising a single iterable expression.\
    \ Note that the trailing comma is required.\n\n## 9.2. Evaluation Order\n\nAs\
    \ a general rule, Python evaluates expressions from left to right, based on the\
    \ operator precedence rules.\n\nWhen evaluating an assignment, the right-hand\
    \ side is evaluated before the left-hand side. In an \"augmented assignment\"\
    \ expression, however, the left hand side target is evaluated first before the\
    \ right hand side. Then the final result is assigned back to the left hand side\
    \ target.\n\n```\n>>> a, b = 1 + 2, 2 * 5 ①\n>>> a, b\n(3, 10)\n>>> a += 1 + 2\
    \ * 3 ②\n>>> a\n10\n```\n\n① The expressions, 1 + 2 are 2 * 5 evaluated first\
    \ (from left to right) and the resulting value (a tuple) is \"unpacked\" and assigned\
    \ to a and b, respectively.\n\n② In this statement, the (current) value of a is\
    \ evaluated first, which is 3. The right hand side is next evaluated to 7 (since\
    \ the multiplication 2 * 3 has a higher precedence than the addition +). 3 + 7\
    \ is then evaluated and its result is assigned back to a.\n\n## 9.3. Assignment\
    \ Expressions\n\nAn assignment expression assigns an expression on the right hand\
    \ side of the assignment operator := (informally called the \"walrus\" operator)\
    \ to a name on the left hand side, and it returns its value (which is the same\
    \ as that of the target).\n\nAssignment expressions are commonly used in compound\
    \ statements where the result of an expression evaluation needs to be retained,\
    \ e.g., so that it can be used in the statement suite. For instance,\n\n```\n\
    >>> import random\n>>> def zero_or_not():\n...     return random.randint(0, 4)\n\
    ...\n>>> while r := zero_or_not():\n...     print(\"Not zero:\", r)\n...\nNot\
    \ zero: 1\nNot zero: 1\nNot zero: 4\n```\n\n① The while clause depends on the\
    \ result of the function call, `zero_or_not()`.\n② The *same value* is used here.\
    \ Hence, the value was previously stored in the variable `r`.\n\n## 9.4. Conditional\
    \ Expressions\n\nIn addition to the conditional statement, Python also supports\
    \ the conditional expression, through the `if - else` expression syntax. In the\
    \ expression `x if C else y`, comprising three (sub-) expressions, `C`, `x`, and\
    \ `y`, if `C` evaluates to `True`, then the value of the expression is `x`. Otherwise,\
    \ its value is `y`.\n\nFor instance,\n\n```\nfamily = input(\"What is your family\
    \ name? \")\nprint(f\"You are {'a reptile' if family == 'Python' else 'nobody'}!\"\
    )\n```\n\nPython's `if` expression corresponds to the ternary operator `? :` in\
    \ other C-style languages. An expression `x if C else y` is roughly equivalent\
    \ to `C ? x : y` in those languages.\n\nNote that *only two* of these three (sub-)\
    \ expressions are evaluated regardless of the value of `C`. The condition `C`\
    \ is always evaluated first, and if it true, then `x` evaluated, but not `y`.\
    \ Otherwise, `y` is evaluated, but not `x`.\n\n## 9.5. Arithmetic Conversions\n\
    \nWhen a binary arithmetic operation is performed,\n\n- If either argument is\
    \ a complex number, the other is converted to complex, and\n- Otherwise\n    -\
    \ If either argument is a floating point number, the other is converted to floating\
    \ point, and\n    - Otherwise, both arguments are integers and Python does no\
    \ automatic conversion.\n\n## 9.6. Arithmetic Operations\n\n### 9.6.1. Unary arithmetic\
    \ operators\n\nThe unary `-` (minus) operator yields the negation of its numeric\
    \ argument. The unary `+` (plus) operator yields its numeric argument unchanged.\
    \ In either case, if the argument does not have the proper type, a `TypeError`\
    \ exception is raised.\n\nAll unary arithmetic and bitwise operations have the\
    \ same priority.\n\n### 9.6.2. Binary arithmetic operators\n\nThe * (multiplication)\
    \ operator yields the product of its arguments. The arguments must either both\
    \ be numbers, in which case they are multiplied together, or one argument must\
    \ be an integer and the other must be a sequence, in which case sequence repetition\
    \ is performed. A negative repetition factor yields an empty sequence.\n\nThe\
    \ / (division) and // (floor division) operators yield the quotient of their arguments.\
    \ Division of floats or integers yields a float, while floor division of integers\
    \ results in an integer. Division by zero raises the ZeroDivisionError exception.\n\
    \nThe % (modulo) operator yields the remainder from the division of the first\
    \ argument by the second. A zero right argument raises the ZeroDivisionError exception.\
    \ The arguments may be floating point numbers, e.g., 3.14 % 0.7 equals 0.34 (since\
    \ 3.14 equals 4 * 0.7 + 0.34). The modulo operator always yields a result with\
    \ the same sign as its second operand (or zero).\n\nThe floor division and modulo\
    \ operators are connected by the following identity: x == (x // y) * y + (x %\
    \ y). Floor division and modulo are also connected with the built-in function\
    \ divmod: divmod(x, y) == (x // y, x % y).\n\nThe + (addition) operator yields\
    \ the sum of its arguments. The arguments must either both be numbers, in which\
    \ case they are added together, or both be sequences of the same type, in which\
    \ case the sequences are concatenated. The - (subtraction) operator yields the\
    \ difference of its arguments.\n\n### 9.6.3. The power operator\n\nThe power operator\
    \ (**) takes two arguments and it works the same way as the built-in pow function.\
    \ That is, x ** y is equivalent to pow(x, y), which yields the value x raised\
    \ to the power of y."
  mdcn: "## 第9章 表达式\n\n一个“表达式”由操作符和操作数组成，它会计算出一个值。一个值（简单来说）也是一个表达式。\n\n在Python中，表达式的基本构建块被称为“原子”。原子包括[词法标记](lexical\
    \ tokens)，如标识符和字面量，并且它们可以嵌套。用圆括号、方括号或花括号括起来的表达式在语法上也是原子。\n\n在更高一级，以下“初等表达式”代表了结合最紧密的操作：\n\
    \n**属性引用**\n一个初等表达式后跟一个句点和一个名称，称为属性引用，它本身也是一个初等表达式。对象的属性引用可以通过重写其 `__getattr__`\
    \ 方法来自定义。\n\n**下标**\n序列（如字符串、元组或列表）或映射对象（如字典）的下标或索引，从给定的集合中选择一个项。用户定义的对象可以通过实现\
    \ `__getitem__` 方法来支持下标。\n\n**切片**\n切片从序列对象中选择一个范围内的项。切片可以用作表达式，也可以用作赋值或 `del`\
    \ 语句中的目标。初等表达式使用一个由切片列表构造的键进行索引（使用与下标相同的 `__getitem__` 方法），如下所示。\n\n- 如果切片列表包含至少一个逗号，则键是一个包含切片项转换结果的元组。\n\
    - 否则，单个切片项的转换结果就是键。\n\n## 调用\n\n一个“调用”使用一个（可能为空的）参数序列来调用一个可调用对象（例如，一个 `函数` 或 `类`）。所有具有\
    \ `__call__` 方法的对象都是可调用的，例如内置函数、内置对象的方法、类对象、类实例的方法以及用户定义的函数。在尝试调用之前，所有参数表达式都会被求值。\n\
    \nPython中有几种不同类型的表达式。一个表达式可以包含一个或多个其他（子）表达式，例如，通过操作符组合。\n\n- 算术转换。\n- 算术运算，一元和二元。\n\
    - 位运算，一元和二元。\n- 移位运算。\n- 比较（`==`、`!=`、`>`、`>=`、`<`、`<=`）\n- 布尔运算（`not`、`and` 和\
    \ `or`）。\n- 赋值表达式。\n- 条件表达式。\n\n[Lambda表达式](https://docs.python.org/3/reference/expressions.html#lambda)和[await表达式](https://docs.python.org/3/reference/expressions.html#await)将在本书后面描述。\n\
    \n## 9.1. 表达式列表\n\n表达式列表是一系列由逗号分隔的一个或多个表达式。尾随逗号是可选的，除非表达式列表只包含一个表达式。表达式列表中的表达式从左到右求值。\n\
    \n一个或多个表达式的表达式列表会生成一个具有相应元素数量的元组。例如，\n\n```\n>>> 50 + 50, 100 * 2\n(100, 200)\n\
    ```\n\n① Python解释器首先计算 `50 + 50`，其值为 `100`，然后计算 `100 * 2`，其值为 `200`。\n② 这个表达式列表的值是一个元组，例如，在本例中表示为元组字面量\
    \ `(100, 200)`。\n\n```\n>>> 1 / 2\n0.5\n>>> 1 / 2,\n(0.5,)\n```\n\n① 表达式 `1 /\
    \ 2` 的值是 `0.5`。\n② 表达式列表 `1 / 2,` 的值是 `(0.5,)`。对于单表达式表达式列表，尾随逗号是必需的。\n\n“可迭代解包”语法，使用星号\
    \ `*` 操作符，可用于表达式列表中 `可迭代` 类型的表达式。\n\n```\n>>> a, b, c = 1, [2, 3, 4], 5\n>>> a,\
    \ b, c\n(1, [2, 3, 4], 5)\n>>> a, *b, c\n(1, 2, 3, 4, 5)\n>>> *b,\n(2, 3, 4)\n\
    ```\n\n① `b` 是一个列表，一种可迭代类型。\n② 解包 `b`。`b` 的元素现在是结果元组的一部分。\n③ 在包含单个可迭代表达式的表达式列表中解包。注意，尾随逗号是必需的。\n\
    \n## 9.2. 求值顺序\n\n作为一般规则，Python根据操作符优先级规则从左到右对表达式求值。\n\n在对赋值求值时，右侧在左侧之前求值。然而，在“增强赋值”表达式中，左侧目标在右侧之前求值。然后，最终结果被赋回给左侧目标。\n\
    \n```\n>>> a, b = 1 + 2, 2 * 5 ①\n>>> a, b\n(3, 10)\n>>> a += 1 + 2 * 3 ②\n>>>\
    \ a\n10\n```\n\n① 表达式 `1 + 2` 和 `2 * 5` 首先被求值（从左到右），生成的值（一个元组）被“解包”并分别赋给 `a` 和\
    \ `b`。\n\n② 在此语句中，`a` 的（当前）值首先被求值，为3。接下来右侧被求值为7（因为乘法 `2 * 3` 的优先级高于加法 `+`）。然后计算\
    \ `3 + 7`，其结果被赋回给 `a`。\n\n## 9.3. 赋值表达式\n\n赋值表达式将赋值运算符 `:=`（非正式地称为“海象”运算符）右侧的表达式赋给左侧的名称，并返回其值（与目标的值相同）。\n\
    \n赋值表达式通常用于复合语句中，其中需要保留表达式求值的结果，例如，以便可以在语句体中使用。例如，\n\n```\n>>> import random\n\
    >>> def zero_or_not():\n...     return random.randint(0, 4)\n...\n>>> while r\
    \ := zero_or_not():\n...     print(\"Not zero:\", r)\n...\nNot zero: 1\nNot zero:\
    \ 1\nNot zero: 4\n```\n\n① `while` 子句依赖于函数调用 `zero_or_not()` 的结果。\n② 这里使用了*相同的值*。因此，该值之前已存储在变量\
    \ `r` 中。\n\n## 9.4. 条件表达式\n\n除了条件语句，Python还通过 `if - else` 表达式语法支持条件表达式。在表达式 `x\
    \ if C else y` 中，包含三个（子）表达式 `C`、`x` 和 `y`，如果 `C` 的值为 `True`，则表达式的值为 `x`。否则，其值为\
    \ `y`。\n\n例如，\n\n```\nfamily = input(\"What is your family name? \")\nprint(f\"\
    You are {'a reptile' if family == 'Python' else 'nobody'}!\")\n```\n\nPython的\
    \ `if` 表达式对应于其他C风格语言中的三元运算符 `? :`。表达式 `x if C else y` 大致等同于那些语言中的 `C ? x : y`。\n\
    \n请注意，无论 `C` 的值如何，这三个（子）表达式中*只有两个*会被求值。条件 `C` 总是首先被求值，如果为真，则求值 `x`，但不求值 `y`。否则，求值\
    \ `y`，但不求值 `x`。\n\n## 9.5. 算术转换\n\n当执行二元算术运算时，\n\n- 如果任一参数是复数，则另一个被转换为复数，并且\n\
    - 否则\n    - 如果任一参数是浮点数，则另一个被转换为浮点数，并且\n    - 否则，两个参数都是整数，Python不进行自动转换。\n\n##\
    \ 9.6. 算术运算\n\n### 9.6.1. 一元算术运算符\n\n一元 `-`（减号）运算符生成其数值参数的相反数。一元 `+`（加号）运算符生成其数值参数本身。在这两种情况下，如果参数没有正确的类型，将引发\
    \ `TypeError` 异常。\n\n所有一元算术和位运算具有相同的优先级。\n\n### 9.6.2. 二元算术运算符\n\n`*`（乘法）运算符生成其参数的乘积。参数必须都是数字，在这种情况下它们相乘；或者一个参数必须是整数，另一个必须是序列，在这种情况下执行序列重复。负的重复因子生成一个空序列。\n\
    \n`/`（除法）和 `//`（整除）运算符生成其参数的商。浮点数或整数的除法生成浮点数，而整数的整除结果为整数。除以零会引发 `ZeroDivisionError`\
    \ 异常。\n\n`%`（取模）运算符生成第一个参数除以第二个参数的余数。右参数为零会引发 `ZeroDivisionError` 异常。参数可以是浮点数，例如，`3.14\
    \ % 0.7` 等于 `0.34`（因为 `3.14` 等于 `4 * 0.7 + 0.34`）。取模运算符总是生成与第二个操作数符号相同的结果（或为零）。\n\
    \n整除和取模运算符通过以下恒等式相关联：`x == (x // y) * y + (x % y)`。整除和取模也与内置函数 `divmod` 相关联：`divmod(x,\
    \ y) == (x // y, x % y)`。\n\n`+`（加法）运算符生成其参数的和。参数必须都是数字，在这种情况下它们相加；或者都是相同类型的序列，在这种情况下序列被连接。`-`（减法）运算符生成其参数的差。\n\
    \n### 9.6.3. 幂运算符\n\n幂运算符（`**`）接受两个参数，其工作方式与内置函数 `pow` 相同。也就是说，`x ** y` 等同于 `pow(x,\
    \ y)`，它生成 `x` 的 `y` 次幂的值。"
