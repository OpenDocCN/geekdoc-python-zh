- md: "## 13.6. Lambda Expressions\n\nseparated by `*` and `/`, if needed.\n\nWhen\
    \ we call a function, or any callable, we can provide positional arguments to\
    \ positional-only and positional-or-keyword parameters, and keyword arguments\
    \ to positional-or-keyword and keyword-only parameters.\n\nIn addition,\n\n- All\
    \ positional arguments should come before all keyword arguments, if any.\n- Each\
    \ of the positional arguments should be placed in the position of the corresponding\
    \ positional parameters.\n- Valid arguments should be provided for all non-optional\
    \ parameters, positional or keyword.\n\nSome examples were given earlier, in the\
    \ Function Definition section.\n\n## 13.6. Lambda Expressions\n\nA Lambda *expression*\
    \ evaluates to an anonymous function object. Here's the general syntax:\n\n```\n\
    lambda <parameters>: <expression>\n```\n\nThe above form is more or less equivalent\
    \ to a (named) function object defined with:\n\n```\ndef <name>(<parameters>):\n\
    \    return <expression>\n```\n\nNote that\n\n- Function objects created with\
    \ lambda expressions can be called \"in place\", and\n- The Lambda expressions\
    \ cannot contain statements or annotations.\n\nFor example,\n\n```\n>>> (lambda\
    \ x: x + 1)(10) ①\n11\n>>> a = [1, 2, 3]\n>>> list(map(lambda x: x * 2, a)) ②\n\
    [2, 4, 6]\n```\n\n① A Lambda expression can be assigned to a variable, or it can\
    \ be called at the point of definition, as shown in this example.\n② Lambda expressions\
    \ are often used as one-time use function-type arguments to higher-order functions\
    \ (HOFs), for instance. In this example, map is a builtin function that takes\
    \ a function and an iterable.\n\n## 13.7. map, filter, and reduce\n\nAlthough\
    \ we do not go through all builtin functions in this mini reference, let's review\
    \ the builtin map and filter functions as well as the reduce function from the\
    \ functools module. They are generally called the \"high-order functions\" (HOFs)\
    \ because they take as arguments, and/or return, functions.\n\nThe map, filter,\
    \ and reduce functions, possibly with different names, are a few of the most commonly\
    \ used high-order functions across different programming languages, functional\
    \ or imperative.\n\nIt is a rather common practice to use anonymous functions,\
    \ Lambda expressions, for their function arguments for these HOF functions since\
    \ the function arguments are often used only once.\n\n### 13.7.1. The map function\n\
    \nThe builtin map function takes a function and an iterable and it applies the\
    \ function to each element in the given iterable. For example,\n\n```\n>>> list(map(lambda\
    \ x: x**2, [1, 2, 3]))\n[1, 4, 9]\n```\n\n① The map function returns a map object.\
    \ (That is, it is a constructor.) We use the list constructor to convert the returned\
    \ map to a list.\n\n### 13.7.2. The filter function\n\nThe builtin filter function\
    \ likewise takes a function and an iterable, and it returns a filtered list based\
    \ on the given function. For example,\n\n```\n>>> list(filter(\n...     lambda\
    \ x: True if x%2==0 else False,\n...     [1, 2, 3, 4]))\n[2, 4]\n```\n\n① The\
    \ same with filter. It is a constructor function.\n② It applies the function to\
    \ each element in the given iterable, and if its Boolean value is True (e.g.,\
    \ 3, 'hello', etc.), it is included in the result. Otherwise (e.g., None, [],\
    \ etc.), it is filtered out.\n\n### 13.7.3. The functools.reduce function\n\n\
    The reduce function of the functools module works in a similar manner, but it\
    \ applies the given function cumulatively to all elements in the given iterable.\n\
    \nHere's an example:\n\n```\n>>> from functools import reduce\n>>> reduce(lambda\
    \ s, a: s + a, [1, 2, 4], 0)  ①\n7\n```\n\n① The third argument is optional, and\
    \ if it is provided, it is used as the first item in the \"reduction\" operation.\
    \ In this example, the `reduce` function applies the given lambda function iteratively\
    \ for each element in the list `[1, 2, 4]`. That is, it computes, `0 + 1` (which\
    \ is `1`), `1 + 2` (which is `3`), `3 + 4`, which is `7`, the final result.\n\n\
    ## 13.8. Function Decorators\n\nA decorator is a function, or more generally a\
    \ callable, that takes a function/callable and returns a function/callable of\
    \ the same type. Syntactically, a decorator is used with the target function definition,\
    \ as a prefix, and it transforms the target function and returns the transformed\
    \ function. In other words, the decorator becomes effectively a part of the target\
    \ function definition.\n\nHere's the general syntax:\n\n```\n@decorator_function\n\
    def another_function(args):\n    pass\n```\n\nThis is semantically equivalent\
    \ to the following:\n\n```\ndef another_function(args):\n    pass\n\nanother_function\
    \ = decorator_function(another_function)\n```\n\nThe `decorator_function` is a\
    \ function:\n\n```\ndef decorator_function(f1):\n    # transform f1 to f2,\n \
    \   # or otherwise create f2 based on f1.\n    return f2\n```\n\nThe key to using\
    \ decorators, besides the syntactic convenience, is\n\n- The *decorator_function*\
    \ function provides common functionalities across multiple different functions,\
    \ and\n- These decorated functions, such as `another_function`, will always be\
    \ used as decorated/transformed in the program.\n\n### 13.8.1. Built-in decorators\n\
    \n#### The @property decorator\n\nA \"property\" in Python is an abstract construct\
    \ that behaves like a data attribute of an object, e.g., with a getter, setter,\
    \ and deleter, and a docstring, etc.\n\nA property can be created using the `property`\
    \ constructor function. Alternatively, the `@property` decorator can be used to\
    \ easily define new properties, or modify existing ones, in a class definition.\
    \ For example,\n\n```\n>>> class X:\n...     def __init__(self):\n...        \
    \ self._a = 10\n...     @property\n...     def a(self):\n...         \"I am the\
    \ 'a' property.\"\n...         return f\"Magical {self._a}\"\n...     @a.setter\n\
    ...     def a(self, value):\n...         self._a = value\n...     @a.deleter\n\
    ...     def a(self):\n...         print(\"Urghhh, I am being deleted...\")\n...\
    \         del self._a\n...\n```\n\n① This creates a property named a. The decorated\
    \ method is used as a \"getter\" for the property a.\n\n② This sets the decorated\
    \ method the setter of a.\n\n③ When the del statement is used on the property\
    \ a, the decorated method is called.\n\nLet's try using an object of type X:\n\
    \n```\n>>> x = X()\n>>> help(X.a)\nHelp on property:\n\n    I am the 'a' property.\n\
    (END)\n>>> x.a\n'Magical 10'\n>>> x.a = 100\n>>> x.a\n'Magical 100'\n>>> del x.a\n\
    Urghhh, I am being deleted...\n>>> x.a\nTraceback (most recent call last):\n \
    \ File \"<stdin>\", line 1, in <module>\n  File \"<stdin>\", line 7, in a\nAttributeError:\
    \ 'X' object has no attribute '_a'. Did you mean: 'a'?\n```\n\n#### The @staticmethod\
    \ decorator\n\nA \"static method\" of a class in Python is similar to those in\
    \ other OOP languages like C++, Java, and C#. It is an independent function although\
    \ it is defined in a class definition.\n\nSyntactically, static methods can called\
    \ on the class or on an instance, but they do not receive an implicit first argument,\
    \ `self`.\n\nThe `@staticmethod` decorator converts a function within a class\
    \ definition to be a static method. For example,\n\n```\n>>> class Y:\n...   \
    \  @staticmethod\n...     def f1():\n...         print(\"I am a static method\"\
    )\n...\n>>> Y.f1()\nI am a static method\n>>> y = Y()\n>>> y.f1()\nI am a static\
    \ method\n```\n\n① This decorator makes the decorated method a static method.\n\
    ② The method can be called on the class object.\n③ Without the `@staticmethod`\
    \ decorator, the method couldn't have been called on an instance object.\n\n####\
    \ The @classmethod decorator\n\nA \"class method\" of a class in Python is a method\
    \ defined on a class object, not on an instance. Normal methods receive the instance\
    \ object as implicit first argument. In contrast, a class method receive the class\
    \ object as implicit first argument.\n\nSyntactically, class methods can called\
    \ on the class or on an instance, just like static methods, but they receive the\
    \ class as its first argument (even when it is called on an instance). If a class\
    \ method is called for a derived class, the derived class object is passed as\
    \ the implied first argument.\n\nThe `@classmethod` decorator converts a function\
    \ to be a class method. For example,\n\n```\n>>> class Z:\n...     @classmethod\n\
    ...     def f2(cls):\n...         print(f\"Class method: {cls.__name__}\")\n...\n\
    >>> Z.f2()\nClass method: Z\n>>> z = Z()\n>>> z.f2()\nClass method: Z\n>>> class\
    \ Z2(Z): pass\n...\n>>> Z2.f2()\nClass method: Z2\n```\n\n① The `@classmethod`\
    \ decorator makes the decorated method a class method.\n\n② Without the decoration,\
    \ this would have been a syntax error.\n\n③ By default, methods defined in a class\
    \ is an instance method, which takes the instance object as the implicit first\
    \ argument. For class methods, the implicit first argument is the class object.\n\
    \n④ The implicit class object argument is now the subclass `Z2`."
  mdcn: "## 13.6. Lambda 表达式\n\n由 `*` 和 `/` 分隔，如果需要的话。\n\n当我们调用一个函数，或任何可调用对象时，我们可以为位置参数和位置或关键字参数提供位置参数，为位置或关键字参数和仅关键字参数提供关键字参数。\n\
    \n此外，\n\n-   如果有关键字参数，所有位置参数应位于所有关键字参数之前。\n-   每个位置参数应放置在相应位置参数的位置上。\n-   应为所有非可选参数（位置或关键字）提供有效的参数。\n\
    \n一些示例已在函数定义部分给出。\n\n## 13.6. Lambda 表达式\n\n一个 Lambda *表达式* 会求值为一个匿名函数对象。以下是通用语法：\n\
    \n```\nlambda <parameters>: <expression>\n```\n\n上述形式或多或少等同于使用以下方式定义的（命名）函数对象：\n\
    \n```\ndef <name>(<parameters>):\n    return <expression>\n```\n\n请注意，\n\n-  \
    \ 使用 Lambda 表达式创建的函数对象可以“就地”调用，并且\n-   Lambda 表达式不能包含语句或注解。\n\n例如，\n\n```\n>>>\
    \ (lambda x: x + 1)(10) ①\n11\n>>> a = [1, 2, 3]\n>>> list(map(lambda x: x * 2,\
    \ a)) ②\n[2, 4, 6]\n```\n\n① Lambda 表达式可以赋值给一个变量，也可以在定义点直接调用，如本例所示。\n② Lambda\
    \ 表达式通常用作高阶函数（HOFs）的一次性函数类型参数。例如，在此例中，`map` 是一个内置函数，它接受一个函数和一个可迭代对象。\n\n## 13.7.\
    \ map、filter 和 reduce\n\n尽管本迷你参考中不会涵盖所有内置函数，但让我们回顾一下内置的 `map` 和 `filter` 函数，以及来自\
    \ `functools` 模块的 `reduce` 函数。它们通常被称为“高阶函数”（HOFs），因为它们接受函数作为参数，和/或返回函数。\n\n`map`、`filter`\
    \ 和 `reduce` 函数（可能名称不同）是不同编程语言（无论是函数式还是命令式）中最常用的高阶函数之一。\n\n对于这些高阶函数，使用匿名函数（Lambda\
    \ 表达式）作为其函数参数是一种相当常见的做法，因为这些函数参数通常只使用一次。\n\n### 13.7.1. map 函数\n\n内置的 `map` 函数接受一个函数和一个可迭代对象，并将该函数应用于给定可迭代对象中的每个元素。例如，\n\
    \n```\n>>> list(map(lambda x: x**2, [1, 2, 3]))\n[1, 4, 9]\n```\n\n① `map` 函数返回一个\
    \ map 对象。（也就是说，它是一个构造函数。）我们使用 `list` 构造函数将返回的 map 转换为列表。\n\n### 13.7.2. filter\
    \ 函数\n\n内置的 `filter` 函数同样接受一个函数和一个可迭代对象，并根据给定的函数返回一个过滤后的列表。例如，\n\n```\n>>> list(filter(\n\
    ...     lambda x: True if x%2==0 else False,\n...     [1, 2, 3, 4]))\n[2, 4]\n\
    ```\n\n① 与 `filter` 相同。它是一个构造函数。\n② 它将函数应用于给定可迭代对象中的每个元素，如果其布尔值为 True（例如，3，'hello'\
    \ 等），则将其包含在结果中。否则（例如，None，[] 等），则将其过滤掉。\n\n### 13.7.3. functools.reduce 函数\n\n\
    `functools` 模块的 `reduce` 函数以类似的方式工作，但它将给定的函数累积地应用于给定可迭代对象中的所有元素。\n\n以下是一个示例：\n\
    \n```\n>>> from functools import reduce\n>>> reduce(lambda s, a: s + a, [1, 2,\
    \ 4], 0)  ①\n7\n```\n\n① 第三个参数是可选的，如果提供了，它将用作“归约”操作中的第一个项。在此示例中，`reduce` 函数对列表\
    \ `[1, 2, 4]` 中的每个元素迭代地应用给定的 lambda 函数。也就是说，它计算 `0 + 1`（结果为 `1`），`1 + 2`（结果为 `3`），`3\
    \ + 4`，结果为 `7`，即最终结果。\n\n## 13.8. 函数装饰器\n\n装饰器是一个函数，或者更一般地说是一个可调用对象，它接受一个函数/可调用对象并返回一个相同类型的函数/可调用对象。在语法上，装饰器与目标函数定义一起使用，作为前缀，它转换目标函数并返回转换后的函数。换句话说，装饰器实际上成为了目标函数定义的一部分。\n\
    \n以下是通用语法：\n\n```\n@decorator_function\ndef another_function(args):\n    pass\n\
    ```\n\n这在语义上等同于以下内容：\n\n```\ndef another_function(args):\n    pass\n\nanother_function\
    \ = decorator_function(another_function)\n```\n\n`decorator_function` 是一个函数：\n\
    \n```\ndef decorator_function(f1):\n    # 将 f1 转换为 f2，\n    # 或者基于 f1 创建 f2。\n\
    \    return f2\n```\n\n使用装饰器的关键，除了语法上的便利性，还在于\n\n-   *decorator_function* 函数为多个不同的函数提供通用功能，并且\n\
    -   这些被装饰的函数，例如 `another_function`，在程序中将始终作为已装饰/已转换的形式使用。\n\n### 13.8.1. 内置装饰器\n\
    \n#### @property 装饰器\n\nPython 中的“属性”是一个抽象构造，其行为类似于对象的数据属性，例如，具有 getter、setter\
    \ 和 deleter，以及文档字符串等。\n\n属性可以使用 `property` 构造函数创建。或者，可以使用 `@property` 装饰器在类定义中轻松定义新属性或修改现有属性。例如，\n\
    \n```\n>>> class X:\n...     def __init__(self):\n...         self._a = 10\n...\
    \     @property\n...     def a(self):\n...         \"I am the 'a' property.\"\n\
    ...         return f\"Magical {self._a}\"\n...     @a.setter\n...     def a(self,\
    \ value):\n...         self._a = value\n...     @a.deleter\n...     def a(self):\n\
    ...         print(\"Urghhh, I am being deleted...\")\n...         del self._a\n\
    ...\n```\n\n① 这创建了一个名为 `a` 的属性。被装饰的方法用作属性 `a` 的“getter”。\n\n② 这将被装饰的方法设置为 `a`\
    \ 的 setter。\n\n③ 当对属性 `a` 使用 `del` 语句时，会调用被装饰的方法。\n\n让我们尝试使用一个类型为 `X` 的对象：\n\n\
    ```\n>>> x = X()\n>>> help(X.a)\nHelp on property:\n\n    I am the 'a' property.\n\
    (END)\n>>> x.a\n'Magical 10'\n>>> x.a = 100\n>>> x.a\n'Magical 100'\n>>> del x.a\n\
    Urghhh, I am being deleted...\n>>> x.a\nTraceback (most recent call last):\n \
    \ File \"<stdin>\", line 1, in <module>\n  File \"<stdin>\", line 7, in a\nAttributeError:\
    \ 'X' object has no attribute '_a'. Did you mean: 'a'?\n```\n\n#### @staticmethod\
    \ 装饰器\n\nPython 中类的“静态方法”类似于其他面向对象语言（如 C++、Java 和 C#）中的静态方法。它是一个独立的函数，尽管是在类定义中定义的。\n\
    \n在语法上，静态方法可以在类或实例上调用，但它们不接收隐式的第一个参数 `self`。\n\n`@staticmethod` 装饰器将类定义中的函数转换为静态方法。例如，\n\
    \n```\n>>> class Y:\n...     @staticmethod\n...     def f1():\n...         print(\"\
    I am a static method\")\n...\n>>> Y.f1()\nI am a static method\n>>> y = Y()\n\
    >>> y.f1()\nI am a static method\n```\n\n① 此装饰器使被装饰的方法成为静态方法。\n② 该方法可以在类对象上调用。\n\
    ③ 如果没有 `@staticmethod` 装饰器，该方法将无法在实例对象上调用。\n\n#### @classmethod 装饰器\n\nPython\
    \ 中类的“类方法”是在类对象上定义的方法，而不是在实例上。普通方法接收实例对象作为隐式的第一个参数。相比之下，类方法接收类对象作为隐式的第一个参数。\n\n\
    在语法上，类方法可以在类或实例上调用，就像静态方法一样，但它们接收类作为其第一个参数（即使是在实例上调用时）。如果为派生类调用类方法，则派生类对象将作为隐式第一个参数传递。\n\
    \n`@classmethod` 装饰器将函数转换为类方法。例如，\n\n```\n>>> class Z:\n...     @classmethod\n\
    ...     def f2(cls):\n...         print(f\"Class method: {cls.__name__}\")\n...\n\
    >>> Z.f2()\nClass method: Z\n>>> z = Z()\n>>> z.f2()\nClass method: Z\n>>> class\
    \ Z2(Z): pass\n...\n>>> Z2.f2()\nClass method: Z2\n```\n\n① `@classmethod` 装饰器使被装饰的方法成为类方法。\n\
    \n② 如果没有装饰，这将是一个语法错误。\n\n③ 默认情况下，在类中定义的方法是实例方法，它接收实例对象作为隐式第一个参数。对于类方法，隐式第一个参数是类对象。\n\
    \n④ 隐式的类对象参数现在是子类 `Z2`。"
