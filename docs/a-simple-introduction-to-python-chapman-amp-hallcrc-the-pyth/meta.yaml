  - "[PAGE 28]\n\n# 8 ■ A Simple Introduction to Python\n\nA **tuple** is a collection\
    \ of elements which is ordered and unchangeable, permitting duplicate elements.\
    \ Tuples are usually used for heterogeneous (different) data types. For example,\
    \ (4,5,42,6,6,“cherry”,“date”), is a tuple with six elements. Note the round brackets\
    \ and zero-based indexing is used.\n\nA **set** is a collection of elements which\
    \ is unordered, unchangeable and unindexed with no duplicate elements. For example,\
    \ {7,8,9,“fig”,“grape”}, is a set with five elements. Note the curly brackets.\n\
    \nA **dictionary** is a collection of key:value pairs which is ordered and changeable,\
    \ without duplicate elements. For example, {“England” : “London”, “France” : “Paris”,\
    \ “Germany” : “Berlin”}, is a dictionary of European capitals. Note the curly\
    \ brackets and key:value pairs and zero-based indexing is used.\n\nPython uses\
    \ **zero-based indexing**, where the first element has index zero, the second\
    \ element has index one and so on.\n\n**Slicing** is used in Python to remove\
    \ certain elements from data types.\n\nThe reader should execute the commands\
    \ below and make up their own examples to get a deeper understanding.\n\n# **Examples.**\n\
    \n**In/Out** &nbsp;&nbsp;&nbsp;&nbsp; **Code Cells**\n\n```\nIn [1]:  # An empty\
