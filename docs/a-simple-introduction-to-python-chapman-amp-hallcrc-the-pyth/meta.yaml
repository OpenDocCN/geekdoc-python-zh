    \n4.  较长的Python程序：\n    (a) 编写一个交互式Python程序来玩“猜数字”游戏。计算机应生成一个1到20之间的随机整数，用户（玩家）必须在六次尝试内猜出该数字。程序应让用户知道猜测是太高还是太低。读者将需要random库中的**randint**函数。\n\
    \    (b) 考虑毕达哥拉斯三元组，正整数$a, b, c$，使得$a^2 + b^2 = c^2$。假设$c$由$c = b + n$定义，其中$n$也是一个整数。编写一个Python程序，对于给定的$n$值，找出所有这样的三元组，其中$a$和$b$都小于或等于某个最大值$m$。对于$n\
