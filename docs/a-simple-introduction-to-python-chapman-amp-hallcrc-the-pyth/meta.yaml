    0$;

    2. $\frac{a}{b} \times \frac{c}{d} = \frac{a \times c}{b \times d}$, where $b,
    d \neq 0$;

    3. $\frac{a}{b} \div \frac{c}{d} = \frac{a \times d}{b \times c}$, where $b, c,
    d \neq 0$.


