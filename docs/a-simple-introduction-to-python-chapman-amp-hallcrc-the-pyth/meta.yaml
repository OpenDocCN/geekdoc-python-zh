    # PYTHON 简明入门


    ![](img/3d655b79e80c72c183e10b0d0ec43472_0_0.png)


    # 斯蒂芬·林奇


    CRC 出版社

    泰勒-弗朗西斯集团

    查普曼与霍尔图书


    # Python 简明入门


    *《Python 简明入门》* 面向大学预科学生和编程完全新手。全书使用 Jupyter 笔记本创建。在将 Python 介绍为强大的计算器之后，本书涵盖了简单的编程结构，并介绍了
    NumPy、MatPlotLib 和 SymPy 模块（库）。随后，本书展示了如何将 Python 用于数学、密码学、人工智能、数据科学和面向对象编程。读者将学习如何使用集成开发环境进行编程：Python
    IDLE、Spyder、Jupyter 笔记本，以及通过 Google Colab 进行云计算。


    **特点：**


    -   无需任何编程经验。

    -   演示如何将 Jupyter 笔记本格式化以发布到网络。

    -   练习的完整解答可作为 Jupyter 笔记本在网络上获取。

    -   所有 Jupyter 笔记本解答文件均可通过 GitHub 下载。


    数据文件和 Jupyter 解答笔记本的 GitHub 仓库：

    https://github.com/proflynch/A-Simple-Introduction-to-Python


    Jupyter 解答笔记本网页：

    https://drstephenlynch.github.io/webpages/A-Simple-Introduction-to-Python-Solutions.html


    2022 年，**斯蒂芬·林奇** 被授予国家教学研究员称号，该称号旨在表彰和认可在高等教育中对学生成果和教学产生杰出影响的个人。他因其在 STEM 学科编程教学、研究成果融入教学以及扩大参与度（利用体验式和基于对象的学习）方面的工作而获奖。尽管接受的是纯数学家教育，但斯蒂芬的许多兴趣现在包括应用数学、细胞生物学、电气工程、计算、神经网络、非线性光学和二进制振荡器计算（他与同事共同发明）。他拥有
    2 项国际发明专利、8 本书、4 本书章节、45 多篇期刊文章和一些会议论文集。斯蒂芬是数学及其应用研究所会士（FIMA）和高等教育学院高级会士（SFHEA）。他目前是曼彻斯特城市大学的高级讲师，并于
    2008 年至 2012 年担任开放大学的兼职讲师。2010 年，斯蒂芬自愿担任 STEM 大使；2012 年，他被授予曼彻斯特城市大学公共参与冠军称号；2014
    年，他成为学校演讲者。他举办关于“面向 A-Level 数学及更高级别的 Python”的全国研讨会，以及关于“面向科学计算的 Python 和面向人工智能的
    TensorFlow”的国际研讨会。他在中国、马来西亚、新加坡、沙特阿拉伯和美国举办过研讨会。


    # 查普曼与霍尔/CRC

    Python 系列


    # 关于本系列


    Python 已被列为最受欢迎的编程语言，并在教育和工业界广泛使用。本系列丛书将为学生和专业人士提供一系列关于 Python 的书籍。本系列的书目将帮助用户在入门和高级水平上学习该语言，并探索其在数据科学、人工智能和机器学习中的众多应用。本系列书目还可辅以
    Jupyter 笔记本。


    **《使用 Python 进行图像处理与获取，第二版》**

    *Ravishankar Chityala, Sridevi Pudipeddi*


    **《Python 包》**

    *Tomas Beuzen and Tiffany-Anne Timbers*


    **《使用 Python 进行统计与数据可视化》**

    *Jesús Rogel-Salazar*


    **《面向人文学者的 Python 入门》**

    *William J.B. Mattingly*


    **《面向科学计算与人工智能的 Python》**

    *Stephen Lynch*


    **《学习专业 Python 第一卷：基础》**

    *Usharani Bhimavarapu and Jude D. Hemanth*


    **《学习专业 Python 第二卷：进阶》**

    *Usharani Bhimavarapu and Jude D. Hemanth*


    **《从开源项目学习高级 Python》**

    *Rongpeng Li*


    **《Python 数据科学基础》**

    *John Mark Shea*


    **《使用 Python 进行数据挖掘：理论、应用与案例研究》**

    *Di Wu*


    **《Python 简明入门》**

    *Stephen Lynch*


    欲了解有关本系列的更多信息，请访问：[https://www.crcpress.com/Chapman-HallCRC/book-series/PYTH](https://www.crcpress.com/Chapman-HallCRC/book-series/PYTH)


