    In [2]: testint()\n        Enter integer: -296\n        Integer -296 is negative\n\
    ```\n\nNote that the if, elif and else statements all end with a colon. Python\
    \ will automatically indent for you when you hit the **RETURN** key.\n\n**Saving\
