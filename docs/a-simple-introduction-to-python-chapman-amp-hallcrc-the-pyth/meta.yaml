- md: '## Accessing Python:


    There are many Integrated Development Environments (IDEs) and code editors for
    Python. In 2023, the most popular include Atom, Dreamweaver, Eric, PyCharm, Pydev,
    Sublime Text, Thonny, Vim, Visual Studio Code and Wing, for example. The reader
    can find more information on each of these on the Web.


    For this book, there are three easy ways to access Python through the internet.
    The first is using Python IDLE, which is popular in schools around the world.
    The second is via the Anaconda Navigator, where users have access to Jupyter notebooks
    and Spyder (Scientific PYthon Development EnviRonment). The third popular way
    to access Python is via cloud computing using Google Colab. Readers need a Google
    account to use Colab. There are many videos freely available online demonstrating
    how each of these media is used. Here, I give a brief introduction to each one.


    1. The Python Integrated Development Learning Environment (IDLE): is suitable
    for beginner-level developers and school children. The URL to access Python IDLE
    is:

    https://www.python.org.


    Figure 1 shows the Python homepage where readers can download Python IDLE. After
    downloading Python IDLE, readers can click on the IDLE logo (see the left hand
    of Figure 2), and an IDLE Shell is loaded where readers can use Python as a calculator.
    For writing programs (as in Chapters 2 and 3), open an untitled Editor Window
    as you would for a Word document. The file can then be saved in the same way that
    you save files in Microsoft.


    For scientific computing and the material covered in Chapters 4 to 10, the reader
    will need to either download Anaconda (a distribution of the Python and R programming
    languages for scientific computing that aims to simplify package management and
    deployment) or use cloud computing via Google Colab.


    ![](img/3d655b79e80c72c183e10b0d0ec43472_15_0.png)


    Figure 1 Homepage of [Python.org](https://www.python.org/). Readers can download
    Python IDLE here.


    ## 2. The URL to download Anaconda is:


    [https://www.anaconda.com/download](https://www.anaconda.com/download).


    Figure 3 shows the Anaconda distribution download page. Readers can download for
    Windows, Apple or Linux computers. Clicking on


    ![](img/3d655b79e80c72c183e10b0d0ec43472_15_1.png)


    Figure 2 The Python IDLE Shell, where readers can use Python like a calculator.
    See [Chapters 1 to 3](#).


    ![](img/3d655b79e80c72c183e10b0d0ec43472_16_0.png)


    Figure 3 The homepage for Anaconda.


    the Anaconda Navigator icon opens Anaconda Navigator window; see Figure 4, where
