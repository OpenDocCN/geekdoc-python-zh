  md: 'error. Thus, using the chain rule from calculus:


    $$\frac{\partial Err}{\partial w_2} = \frac{\partial Err}{\partial y} \frac{\partial
    y}{\partial w_2} = \frac{\partial Err}{\partial y} \frac{\partial y}{\partial
    o_1} \frac{\partial o_1}{\partial w_2},$$


    and


    $$\frac{\partial Err}{\partial w_2} = (y_t - y) \times \frac{\partial \sigma}{\partial
    o_1} \times \sigma(h_1),$$


    and


    $$\frac{\partial Err}{\partial w_2} = (y_t - y) \times \sigma(o_1)(1 - \sigma(o_1))
    \times \sigma(h_1).$$


    The weight $w_2$ is then updated using the formula:


    $$w_2 = w_2 - \eta \times \frac{\partial Err}{\partial w_2},$$


    where $\eta$ is called the learning rate. A similar argument is used to update
    $w_1$, thus:


    $$\frac{\partial Err}{\partial w_1} = \frac{\partial Err}{\partial y} \frac{\partial
    y}{\partial w_1} = \frac{\partial Err}{\partial y} \times \frac{\partial y}{\partial
    o_1} \times \frac{\partial o_1}{\partial \sigma(h_1)} \times \frac{\partial \sigma(h_1)}{\partial
    h_1} \times \frac{\partial h_1}{\partial w_1},$$


    and


    $$\frac{\partial Err}{\partial w_1} = (y_t - y) \times \sigma(o_1)(1 - \sigma(o_1))
    \times w_2 \times \sigma(h_1)(1 - \sigma(h_1)) \times x_1.$


    The weight $w_1$ is then updated using the formula:


    $$w_1 = w_1 - \eta \times \frac{\partial Err}{\partial w_1}.$


    Readers should note that partial differentiation is used here as the error, $Err$,
    is a function of $y, \sigma, o_i, h_i$ and $w_i$, where $o_i, h_i$ are output
    and hidden activation potentials, respectively. The basic idea is to minimize
    $Err$ with respect to the weights $w_1$ and $w_2$, in this case. Note that the
    biases $b_1, b_2$ are assumed to be constant for simplification.


    **Example 8.3.1.** Consider the ANN for the XOR gate. Given that, $w_{11} = 0.2,
    w_{12} = 0.15, w_{21} = 0.25, w_{22} = 0.3, w_{13} = 0.15, w_{23} = 0.1, b_1 =
    b_2 = b_3 = -1, x_1 = 1, x_2 = 1, y_t = 0$ and $\eta = 0.1$:


    (i) Determine the output $y$ of the ANN on a forward pass given that the transfer
    function is $\sigma(v)$.'
