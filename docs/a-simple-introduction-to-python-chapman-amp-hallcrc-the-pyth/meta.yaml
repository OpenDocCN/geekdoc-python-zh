  md: '# Preface


    Currently, Python is the most popular programming language in the world. It is
    open source and completely free to the user. It is also fun to program with and
    extremely powerful at solving real-world problems.


    This book is for pre-university students or complete novices to programming. This
    is the third book I have written on Python. The most recent book, **Python for
    Scientific Computing and Artificial Intelligence** [1], published by CRC Press
    in 2023, is aimed at high-school students, undergraduates, postgraduates and scientists,
    and concentrates on interdisciplinary science, computational modeling, simulation
    and programming. The more advanced book, **Dynamical Systems with Applications
    using Python** [2], published by Springer International Publishing, is set at
    a final-year undergraduate and postgraduate level and covers the mathematical
    theory and research in some detail. This book is a precursor to both [1] and [2]
    and provides a gentle introduction to programming in Python and is aimed at complete
    novices.


    In the second part of the Preface, the reader is shown three (from many) methods
    to access Python. The Python Integrated Development Learning Environment (IDLE)
    is suitable for Chapters 1 to 3. For Scientific Computing and the material in
    Chapters 4 to 10, the reader will need to use Jupyter notebooks or Spyder through
    Anaconda, or Google Colab, via cloud computing.


    Each chapter provides both examples and exercises. In order to understand programming,
    the reader must attempt these exercises. Learning to program is like learning
    to ride a bike – you have to fall off many times before mastering the art. Expect
    to make many mistakes, learn from those mistakes and then move on to the next
    chapter. Full working solutions to all of the exercises and other resources will
    be provided via GitHub, where readers will be able to download all files for free.
    There will also be a web page with full-worked solutions, where readers can simply
    copy and paste code and run the programs in a Python environment. Readers should
    note that Python programs can easily be generated with ChatGPT (Chat Generative
    Pre-trained Transformer), developed'
  merge: -1
  pgno: 11
- img_proc: true
  md: 'by OpenAI, and other alternatives such as Microsoft Bing, Perplexity AI and
    Google Bard AI, for example. Readers should ask these AI chatbots why humans should
    learn how to program – they give some very sound arguments.


    Chapter 1 shows the reader how Python can be used as a simple, powerful calculator,
    and the first library (or module) is introduced. The Math library consists of
    functions (written in Python) which can be called within Python. Some of the functions
    will be familiar to most readers (asin, sin, exp, gcd, lcm, sqrt, etc), and some
    unfamiliar functions (ceil, floor, fmod, radians, trunc) will be defined here.
    Chapter 2 starts with lists, tuples, sets and dictionaries and then moves on to
    simple programming, defining functions (think of adding buttons to your Python
    calculator), loops and conditional constructs (if, elif, else). In Chapter 3,
    the turtle library is loaded into a notebook and simple fractals (images repeated
    on ever-reduced scales) are plotted using recursive functions and iteration. Numerical
    Python (NumPy) and the Matrix Plotting Library (MatPLotLib) are used in Chapter
    4 when dealing with arrays, matrices, vectors, tensors and plots. Cloud computing
    with Google Colab (Collaboratory) is covered in Section 5.1, where the reader
    can use Jupyter notebooks without requiring any software on their own computer.
    The next section introduces the reader to formatting notebooks, inserting titles,
    figures and mathematical equations using LaTeX. Next, the Symbolic Python (SymPy)
    library for symbolic computation is introduced and the final section shows the
    reader how to access GitHub, the AI-powered developer platform to build, scale,
    and deliver secure software. As well as storing and sharing Python programs here,
    the reader should know that it also provides a platform to publish your own web
    pages – as the author has done for his personal web pages and the solutions to
    this book.


    Chapter 6 shows the reader how Python can help understand basic Mathematics. Using
    Python can help provide a deeper understanding of the mathematics, I am a strong
    advocate of bringing it into all school curricula across the world. Not only can
    it help with the understanding but it can also be lots of fun too – something
    that is missing from a lot of children’s mathematics education! Chapter 7 provides
    a basic introduction to cryptography and cyber security starting with some well-known
    historical ciphers and ending with a simple example of the Rivest-Shamir-Adleman
    (RSA) algorithm. Artificial Intelligence (AI) by way of artificial neural networks
    (ANNs) is addressed in Chapter 8. There are simple ANNs for the AND, OR and XOR
    gates from logic, and'
