  md: '# 8.1 ARTIFICIAL NEURAL NETWORKS


    Artificial Neural Networks (ANNs) are the building blocks for AI. The figure below
    shows a pictorial representation of a single mathematical neuron, where $x_1,
    x_2, \dots, x_n$ are inputs, $w_1, w_2, \dots, w_n$ represent weights (synaptic
    weights for biological neurons) $b$ is a bias, $v$ is an activation potential,
    defined by:


    $$v = x_1w_1 + x_2w_2 + \dots + x_nw_n + b,$$


    $\sigma(v)$ is a transfer (or activation) function known as the sigmoid function:


    $$\sigma(v) = \frac{1}{1 + e^{-v}},$$


    and $y$ is the output of the neuron, defined by:


    $$y = \sigma(v).$$


    Neurons are connected together to form neural networks.


    ![](img/3d655b79e80c72c183e10b0d0ec43472_80_0.png)


    This single neuron ANN is also known as a perceptron. For difficult problems in
    AI, ANNs consist of many layers with many neurons in each layer, these are known
    as deep learning ANNs. AI is inspired by the dynamics of neurons in the human
    brain.'
