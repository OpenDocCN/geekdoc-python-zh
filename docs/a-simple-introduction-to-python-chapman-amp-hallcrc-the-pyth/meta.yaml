    \  # Class type.\n        list1 = [1 , 2 , 3 , 4 , 5]\n        print(type(list1))\n\
    Out[2]:  <class 'list'>\nIn [3]:  # Zero-based indexing.\n        list1[0] , list1[1]\
    \ , list1[-1]\nOut[3]:  (1,2,5)\n```"
