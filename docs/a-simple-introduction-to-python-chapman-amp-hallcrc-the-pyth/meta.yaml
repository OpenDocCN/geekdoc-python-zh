    familiar with MATLAB® will notice similarities here. The Editor Window is where
    users can write Python programs. The top right window is where one can get help,
    explore variables, see plots and see files in folders. The Console Window is where
    Python can be used as a calculator.


    Figure 6 is the window that opens on launching the Jupyter Notebook button. Jupyter
    Notebook only offers a very simple interface in which users can open notebooks,
