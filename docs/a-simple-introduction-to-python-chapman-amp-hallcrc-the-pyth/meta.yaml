- md: "## CHAPTER 10\n\n## An Introduction to Object Oriented Programming\n\nObject-Oriented\
    \ Programming (OOP) is a programming paradigm based on the concept of “object,”\
    \ which can contain data and code. The data is in the form of attributes, and\
    \ the code is in the form of methods.\n\n![](img/3d655b79e80c72c183e10b0d0ec43472_99_0.png)\n\
    \n## 10.1 CLASSES AND OBJECTS\n\nAttributes are the characteristics of the class\
    \ and methods are the actions that can be performed on the class.\n\n**Example\
    \ 10.1.** Set up a Student class with attributes, methods and objects of your\
    \ choice.\n\n```\nIn [1]: # Define a class.\nclass Student:\n    # Attributes.\n\
    \    def __init__(self, name, age, course, student_id):\n        self.name = name\n\
    \        self.age = age\n        self.course = course\n        self.student_id\
    \ = student_id\n    # Methods.\n    def enrol(self):\n        return \"Enrolled\"\
    \n    def payfees(self):\n        return \"Fees Paid\"\n    def accommodation(self):\n\
    \        return \"Student in Accommodation\"\n# Create objects of the Student\
    \ class.\nAli_M = Student(\"Mohammad Ali\", 18, \"Software Engineering\", 23000001)\n\
    Parker_P = Student(\"Peter Parker\", 19, \"Physics\", 23000002)\nKane_K = Student(\"\
    Kate Kane\", 22, \"Biology\", 23000003)\nChang_A = Student(\"Angela Chang\", 18,\
    \ \"Music\", 23000004)\n```\n\n```\nIn [2]: # Using attributes.\nprint(Ali_M.name)\n\
    print(Parker_P.age)\nprint(Kane_K.course)\nprint(Chang_A.student_id)\n```\n\n\
    ```\nOut [2]: Mohammad Ali\n19\nBiology\n```\n\n```\nIn [3]: # Using methods.\n\
    print(Ali_M.enrol())\nprint(Parker_P.payfees())\nprint(Kane_K.accommodation())\n\
    ```\n\n```\nOut[3]: Enrolled\nFees Paid\nStudent in Accommodation\n```\n\n## 10.2\
    \ ENCAPSULATION\n\nEncapsulation is one of the core concepts in object-oriented\
    \ programming and describes the attributes and methods operating on this data\
    \ into one unit.\n\n**Advantages of Encapsulation:**\n\n1.  Security: The main\
    \ advantage of using encapsulation is in the securing of data. Encapsulation protects\
    \ an object from unauthorized access. It allows private and protected access levels\
    \ to prevent accidental data modification.\n2.  Data Hiding: The user would not\
    \ be aware of what is going on behind the scenes. To modify a data member, call\
    \ the setter method. To read a data member, call the getter method. What these\
    \ setter and getter methods are doing is hidden from the user.\n3.  Simplicity:\
    \ It simplifies the maintenance of the application by keeping classes separated\
    \ and preventing them from tightly coupling with each other.\n4.  Aesthetics:\
    \ Bundling attributes and methods within a class makes code more readable and\
    \ maintainable.\n\n```\nIn [4]: # Encapsulation and data hiding.\nclass Employee:\n\
    \    # Attributes\n    def __init__(self, name, job_title, salary):\n        #\
    \ Public attributes.\n        self.name = name\n        self.job_title = job_title\n\
