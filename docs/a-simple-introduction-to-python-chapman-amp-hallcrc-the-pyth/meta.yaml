    \ a kernel density estimation of the underlying distribution. This can be an effective\
    \ and attractive way to show multiple distributions of data at once, but keep\
    \ in mind that the estimation procedure is influenced by the sample size, and\
    \ violins for relatively small samples might look misleadingly smooth.\n\n**Example\
    \ 9.4.1.** Create violin plots of life expectancy at birth in 2010, grouped by\
    \ region.\n\n```\nIn [10]: sns.violinplot(data=df, x=\"Life expectancy at \\n\
    \                birth 2010\", y=\"Region\")\n```\n\n![](img/3d655b79e80c72c183e10b0d0ec43472_95_0.png)\n\
    \nFigure 9.1 Out[10]: Violin plots, compare with the box and whisker plots earlier.\n\
    \nFigure 9.1 shows the violin plots.\n\nScatter plots are useful to see correlations\
    \ between two variables. The coordinates of each point are defined by two DataFrame\
    \ columns and filled circles are used to represent each point. In the example\
    \ below, the points are color-coded by region. The **aspect** function changes\
    \ the ratio of the width to the height within the chart arguments.\n\n**Example\
    \ 9.4.2.** Create a scatter plot of GDP per capita (US dollars) against life expectancy\
    \ at birth in 2010, color-coded by region.\n\n```\nIn [11]: sns.relplot(data=df,\
    \ x=\"GDP per capita (US$)\", \\n                y=\"Life expectancy at birth\
    \ 2010\", \\n                hue=\"Region\", aspect=1.5)\n```\n\n![](img/3d655b79e80c72c183e10b0d0ec43472_96_0.png)\n\
    \nFigure 9.2 Out[11]: Scatter plot color-coded by region. The life expectancy\
    \ at birth in South Africa is much worse than all other regions.\n\nFigure 9.2\
    \ shows Out[11].\n\n**Hexagonal Bin Plots:** When you have a very large data set,\
    \ with thousands or even millions of data points, scatter plots can be misleading.\
    \ This is because the points start landing on top of each other, making it hard\
    \ to tell if there are many points in an area or just a few. To solve this, some\
    \ charts 'bin' the data first, in much the same way a histogram does. Unlike a\
    \ histogram, a bin plot shows density using shading with colors representing higher\
    \ densities. Seaborn can create a bin plot using its **jointplot function**, which\
    \ also provides histograms of the two variables. Run the code below to create\
    \ a hexagonal bin plot of life expectancy against GDP.\n\n**Example 9.4.3.** Plot\
    \ a hexagonal plot of GDP per capita (US dollars) against life expectancy at birth\
    \ 2010.\n\n```\nIn [12]: sns.jointplot(data=df, kind=\"hex\", x=\"GDP per \\n\
    \      capita (US$)\", y=\"Life expectancy at birth 2010\")\n```\n\n![](img/3d655b79e80c72c183e10b0d0ec43472_97_0.png)\n\
    \nFigure 9.3 Out[12]: Hexagonal bin plot of GDP per capita (US dollars) against\
    \ life expectancy at birth 2010.\n\nFigure 9.3 shows Out[12].\n\n# EXERCISES\n\
    \nThe data sets used below are taken from the A-Level Mathematics data sets used\
    \ in the UK. All data sets can be downloaded through GitHub: https://github.com/proflynch/A-Simple-Introduction-to-Python.\n\
    \n- 1. For the data set Data-1-OCR.xlsx, create a scatter plot of GDP against\
    \ life expectancy at birth in 2010, where the size of the filled circles is determined\
    \ by physician density. What can you conclude?\n- 2. Load the data file, Data-2-Edexcel.csv\
    \ from GitHub. This LDS consists of weather data samples provided by the UK Met\
    \ Office for five UK weather stations. Load the data and set up a data frame.\
    \ Explore the data. Compare the daily mean temperature at the five stations in\
    \ 1987 compared to 2015. Communicate the results.\n- 3. Load the data file, Data-3-AQA.xlsx\
    \ from GitHub. This LDS has been taken from the UK Department for Transport Stock\
    \ Vehicle Database. Load the data and set up a data frame. Explore the data. Create\
    \ a scatter diagram for carbon dioxide emissions against mass for the petrol cars\
    \ only. Communicate the results.\n- 4. Load the data file, Data-4-OCR.xlsx from\
    \ GitHub. This LDS consists of four sets of data: two each from the censuses of\
