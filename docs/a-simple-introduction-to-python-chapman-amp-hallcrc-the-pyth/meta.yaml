  md: '# 2 ■ A Simple Introduction to Python


    ```

    In [1]: 4 + 5 - 6  # Python ignores anything after the hash.

    Out[1]: 3

    ```


    ```

    In [2]: 2 * 3  # Asterisk for multiplication.

    Out[2]: 6

    ```


    ```

    In [3]: 3 * (2 - 5)

    Out[3]: -9

    ```


    ```

    In [4]: 2 + 3 * (6 + 2 * 5) - 8

    Out[4]: 42

    ```


    ```

    In [5]: (1 / 2) * (1 / 3 - 1 / 4)  # Forward slash for divide.

    Out[5]: 0.04166666666666666

    ```


    # 1.2 FRACTIONS: SYMBOLIC COMPUTATION


    To compute with fractions, without using decimals, readers must load the **Fraction**
    function from the **fractions** library.


    The rules of fraction arithmetic are as follows:


    +   1. $\frac{a}{b} \pm \frac{c}{d} = \frac{ad \pm bc}{bd}$, where $b, d \neq
    0$;

    2. $\frac{a}{b} \times \frac{c}{d} = \frac{a \times c}{b \times d}$, where $b,
    d \neq 0$;

    3. $\frac{a}{b} \div \frac{c}{d} = \frac{a \times d}{b \times c}$, where $b, c,
    d \neq 0$.


    The examples below are in the same Jupyter notebook as above, so start with the
    code cell In [6]:. To execute each cell, the reader hits **SHIFT + ENTER**.


    **Example 1.2.1.** Compute the following, leaving the answers as fractions:


    +   (a) $\frac{1}{2} + \frac{1}{3}$; (b) $\frac{1}{2} \times 8$; (c) $\frac{1}{3}
    \times \frac{2}{5}$;

    (d) $\frac{1}{2} \div \frac{1}{3}$; (e) $\frac{1}{2} \times (\frac{1}{3} - \frac{1}{4})$.'
