    \n**编辑器窗口：** 此窗口显示在Spyder界面的左栏，是用户编写Python程序的地方。请记住**运行**文件。定义函数时，必须在控制台窗口中调用之前先运行文件。用户也可以**取消停靠**此窗口，以在计算机屏幕上获得更多空间。**重新停靠**将重新停靠该窗口。\n\
