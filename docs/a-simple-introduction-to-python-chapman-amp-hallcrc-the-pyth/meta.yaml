    \n![](img/3d655b79e80c72c183e10b0d0ec43472_95_0.png)\n\n图 9.1 Out[10]：小提琴图，与之前的箱线图进行比较。\n\
    \n图 9.1 显示了小提琴图。\n\n散点图对于查看两个变量之间的相关性很有用。每个点的坐标由 DataFrame 的两列定义，并使用实心圆来表示每个点。在下面的示例中，点按地区进行颜色编码。**aspect**\
    \ 函数在图表参数中改变宽度与高度的比例。\n\n**示例 9.4.2.** 创建人均 GDP（美元）与 2010 年出生时预期寿命的散点图，按地区进行颜色编码。\n\
    \n```\nIn [11]: sns.relplot(data=df, x=\"GDP per capita (US$)\", \\n         \
    \       y=\"Life expectancy at birth 2010\", \\n                hue=\"Region\"\
    , aspect=1.5)\n```\n\n![](img/3d655b79e80c72c183e10b0d0ec43472_96_0.png)\n\n图\
    \ 9.2 Out[11]：按地区颜色编码的散点图。南非的出生时预期寿命远低于所有其他地区。\n\n图 9.2 显示了 Out[11]。\n\n**六边形分箱图：**\
    \ 当你有一个非常大的数据集，包含数千甚至数百万个数据点时，散点图可能会产生误导。这是因为点开始相互重叠，使得很难判断一个区域中是有很多点还是只有几个点。为了解决这个问题，一些图表首先对数据进行“分箱”，其方式与直方图非常相似。与直方图不同，分箱图使用阴影来显示密度，颜色代表更高的密度。Seaborn\
    \ 可以使用其 **jointplot 函数** 创建分箱图，该函数还提供两个变量的直方图。运行下面的代码来创建预期寿命与 GDP 的六边形分箱图。\n\n\
    **示例 9.4.3.** 绘制人均 GDP（美元）与 2010 年出生时预期寿命的六边形图。\n\n```\nIn [12]: sns.jointplot(data=df,\
    \ kind=\"hex\", x=\"GDP per \\n      capita (US$)\", y=\"Life expectancy at birth\
    \ 2010\")\n```\n\n![](img/3d655b79e80c72c183e10b0d0ec43472_97_0.png)\n\n图 9.3\
    \ Out[12]：人均 GDP（美元）与 2010 年出生时预期寿命的六边形分箱图。\n\n图 9.3 显示了 Out[12]。\n\n# 练习\n\n\
    以下使用的数据集取自英国 A-Level 数学数据集。所有数据集均可通过 GitHub 下载：https://github.com/proflynch/A-Simple-Introduction-to-Python。\n\
    \n- 1. 对于数据集 Data-1-OCR.xlsx，创建人均 GDP 与 2010 年出生时预期寿命的散点图，其中实心圆的大小由医生密度决定。你能得出什么结论？\n\
    - 2. 从 GitHub 加载数据文件 Data-2-Edexcel.csv。这个 LDS 包含英国气象局为五个英国气象站提供的天气数据样本。加载数据并建立一个数据框。探索数据。比较\
    \ 1987 年与 2015 年五个气象站的日平均温度。解读结果。\n- 3. 从 GitHub 加载数据文件 Data-3-AQA.xlsx。这个 LDS\
    \ 取自英国交通部的库存车辆数据库。加载数据并建立一个数据框。探索数据。仅为汽油车创建二氧化碳排放量与质量的散点图。解读结果。\n- 4. 从 GitHub\
    \ 加载数据文件 Data-4-OCR.xlsx。这个 LDS 包含四组数据：两组来自 2001 年和 2011 年的人口普查；两组关于通勤方式，两组显示人口年龄结构。加载数据并建立一个数据框。探索数据。添加一列，给出就业人口中骑自行车上班的人的百分比。创建按地区划分的骑自行车上班工人百分比的箱线图。解读结果。"
