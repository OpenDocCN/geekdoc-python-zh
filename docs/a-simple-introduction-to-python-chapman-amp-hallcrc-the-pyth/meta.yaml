  - '[PAGE 75]


    **Definition 7.3.2:** Given an integer $k > 1$, called a **modulus**, two integers
    $m$ and $n$, are said to be **congruent** modulo $k$, if $k$ is a divisor of their
    difference, so $m - n = rk$, where $r$ is an integer.


    **Definition 7.3.3:** Congruence modulo $k$ is written: $m \equiv n \pmod{k}$.


    **Definition 7.3.4:** The **Extended Euclidean Algorithm (EEA)** computes, in
    addition to the greatest common divisor (gcd) of integers $a$ and $b$, also the
    coefficients of Bézout''s identity, which are integers $x$ and $y$ such that:


    $$ax + by = \gcd(a, b).$$


    Readers can find more information on Wikipedia:


    https://en.wikipedia.org/wiki/Extended_Euclidean_algorithm.


    The RSA algorithm can be described in five simple steps:


    +   1. Choose two large prime numbers, $p$ and $q$, say.

    2. Compute $n = p \times q$.

    3. The Euler totient function is given as: $\phi(n) = (p - 1) \times (q - 1)$.

    4. The public key, $e$ say, is chosen such that $2 < e < \phi(n)$, and $\gcd(e,
    \phi(n)) = 1$; that is, $e$ and $\phi(n)$ are co-prime.

    5. The public and private keys satisfy the congruence, $d \equiv e^{-1} \pmod{\phi(n)}$,
    where $d$ is the private key computed using the EEA.


    # 7.4 SIMPLE RSA ALGORITHM EXAMPLE


    The RSA algorithm for encryption and decryption can be summarized using the following
    steps:


    +   1. **Bob** follows the steps 1 to 5 in the RSA algorithm above.

    2. **Alice** computes $E = m^e \pmod{n}$, where $m$ is the message and $E$ is
    the encrypted message, and sends $E$ to Bob.

    3. **Bob** computes $D = E^d \pmod{n}$, where $D$ is the decrypted message.'
