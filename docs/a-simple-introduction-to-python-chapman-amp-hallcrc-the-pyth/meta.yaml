    # 1.3 POWERS (EXPONENTIATION) AND ROOTS


    To compute powers and roots, readers can import the pow and sqrt functions from
    the math library. The rules of indices (powers) are as follows:


    +   1. $x^a \times x^b = x^{a+b}$;

    2. $x^{-a} = \frac{1}{x^a}$;

    3. $x^a \div x^b = x^{a-b}$;

    4. $(x^a)^b = x^{ab}$;

    5. $x^{\frac{a}{b}} = \sqrt[b]{x^a}$.


    Note that fractional powers result in roots.'
