    \ on this data into one unit.\n\n**Advantages of Encapsulation:**\n\n+   1. Security:\
    \ The main advantage of using encapsulation is in the securing of data. Encapsulation\
    \ protects an object from unauthorized access. It allows private and protected\
    \ access levels to prevent accidental data modification.\n2. Data Hiding: The\
    \ user would not be aware of what is going on behind the scenes. To modify a data\
    \ member, call the setter method. To read a data member, call the getter method.\
    \ What these setter and getter methods are doing is hidden from the user.\n3.\
    \ Simplicity: It simplifies the maintenance of the application by keeping classes\
    \ separated and preventing them from tightly coupling with each other.\n4. Aesthetics:\
    \ Bundling attributes and methods within a class makes code more readable and\
    \ maintainable.\n\n```\nIn [4]: # Encapsulation and data hiding.\nclass Employee:\n\
    \    # Attributes\n    def __init__(self, name, job_title, salary):\n```"
