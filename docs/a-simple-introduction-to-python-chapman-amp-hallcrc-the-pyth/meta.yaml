    # Simple Programming with Python\n\n![](img/3d655b79e80c72c183e10b0d0ec43472_27_0.png)\n\
    \n## 2.1 LISTS, TUPLES, SETS AND DICTIONARIES\n\nThere are four built-in data\
    \ types in Python, these are lists, tuples, sets and dictionaries. Each will now\
    \ be defined:\n\nA **list** is a collection of elements which is ordered and changeable,\
    \ permitting duplicate elements. For example, [1, 2, 3, 3, 4, 5], is a list with\
    \ six elements. Note the square brackets and zero-based indexing is used.\n\n\
    ## 8 ■ A Simple Introduction to Python\n\nA **tuple** is a collection of elements\
    \ which is ordered and unchangeable, permitting duplicate elements. Tuples are\
    \ usually used for heterogeneous (different) data types. For example, (4,5,42,6,6,“cherry”,“date”),\
    \ is a tuple with six elements. Note the round brackets and zero-based indexing\
    \ is used.\n\nA **set** is a collection of elements which is unordered, unchangeable\
    \ and unindexed with no duplicate elements. For example, {7,8,9,“fig”,“grape”},\
    \ is a set with five elements. Note the curly brackets.\n\nA **dictionary** is\
    \ a collection of key:value pairs which is ordered and changeable, without duplicate\
    \ elements. For example, {“England” : “London”, “France” : “Paris”, “Germany”\
    \ : “Berlin”}, is a dictionary of European capitals. Note the curly brackets and\
    \ key:value pairs and zero-based indexing is used.\n\nPython uses **zero-based\
    \ indexing**, where the first element has index zero, the second element has index\
    \ one and so on.\n\n**Slicing** is used in Python to remove certain elements from\
    \ data types.\n\nThe reader should execute the commands below and make up their\
    \ own examples to get a deeper understanding.\n\n### Examples.\n\n**In/Out** &nbsp;&nbsp;&nbsp;&nbsp;\
    \ **Code Cells**\n\n```\nIn [1]:  # An empty list.\n        list_empty = []\n\
    \        print(list_empty)\nOut[1]:  []\nIn [2]:  # Class type.\n        list1\
    \ = [1, 2, 3, 4, 5]\n        print(type(list1))\nOut[2]:  <class 'list'>\nIn [3]:\
    \  # Zero-based indexing.\n        list1[0], list1[1], list1[-1]\nOut[3]:  (1,\
    \ 2, 5)\n```\n\n```\nIn [4]:  # Length, maximum and minimum.\n        len(list1),\
    \ max(list1), min(list1)\nOut[4]: (6, 5, 1)\nIn [5]:  # Using range to generate\
    \ numerical lists.\n        list(range(5)), list(range(2, 14, 2))\nOut[5]: ([0,\
    \ 1, 2, 3, 4], [2, 4, 6, 8, 10, 12])\nIn [6]:  # Slicing lists.\n        list1[1:3],\
    \ list1[2:], list1[:1]\nOut[6]: ([2, 3], [3, 3, 4, 5], [1])\nIn [7]:  # Lists\
    \ of lists.\n        list2 = [[1, 2], [3, 4]]\n        list2\nOut[7]: [[1, 2],\
    \ [3, 4]]\nIn [8]:  # The second element in the first list.\n        list2[0][1]\n\
    Out[8]: 2\nIn [9]:  # Append and remove elements from a list.\n        list1.append(10)\n\
    \        print(list1)\nOut[9]: [1, 2, 3, 3, 4, 5, 10]\nIn [10]: list1.remove(3)\
    \ # Removes the first 3.\n        print(list1)\nOut[10]: [1, 2, 3, 4, 5, 10]\n\
    In [11]: # Working with dictionaries.\n        Capitals={\"England\":\"London\"\
    ,\"France\":\"Paris\"}\n        Capitals.pop(\"England\") # Remove item.\n   \
    \     print(Capitals)\nOut[11]: {\"France\":\"Paris\"}\nIn [12]: Capitals.get(\"\
    France\")\nOut[12]: 'Paris'\n```\n\nConsider In [2];, above, the list1 is a list\
    \ of five elements, [1,2,3,4,5], list1[0] is the first element, which is 1, list1[-1],\
    \ is the final element, which is 5. Slicing, list1[1:3], starts at list1[1], which\
    \ is 2, and goes up to, but not including, list1[3], which is 4. So list1[1:3]\
    \ = [2, 3]."
