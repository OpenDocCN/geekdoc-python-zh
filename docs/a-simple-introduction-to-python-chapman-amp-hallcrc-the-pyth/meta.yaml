    # 2.1 LISTS, TUPLES, SETS AND DICTIONARIES


    There are four built-in data types in Python, these are lists, tuples, sets and
    dictionaries. Each will now be defined:


    A **list** is a collection of elements which is ordered and changeable, permitting
    duplicate elements. For example, [1, 2, 3, 3, 4, 5], is a list with six elements.
    Note the square brackets and zero-based indexing is used.'
