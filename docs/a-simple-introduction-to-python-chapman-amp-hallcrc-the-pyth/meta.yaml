    \ 1, 2, 3, 4], [2, 4, 6, 8, 10, 12])\nIn [6]:  # Slicing lists.\n        list1[1:3],\
    \ list1[2:], list1[:1]\nOut[6]: ([2, 3], [3, 3, 4, 5], [1])\nIn [7]:  # Lists\
    \ of lists.\n        list2 = [[1, 2], [3, 4]]\n        list2\nOut[7]: [[1, 2],\
    \ [3, 4]]\nIn [8]:  # The second element in the first list.\n        list2[0][1]\n\
    Out[8]: 2\nIn [9]:  # Append and remove elements from a list.\n        list1.append(10)\n\
    \        print(list1)\nOut[9]: [1, 2, 3, 3, 4, 5, 10]\nIn [10]: list1.remove(3)\
    \ # Removes the first 3.\n        print(list1)\nOut[10]: [1, 2, 3, 4, 5, 10]\n\
    In [11]: # Working with dictionaries.\n        Capitals={\"England\":\"London\"\
    ,\"France\":\"Paris\"}\n        Capitals.pop(\"England\") # Remove item.\n   \
    \     print(Capitals)\nOut[11]: {\"France\":\"Paris\"}\nIn [12]: Capitals.get(\"\
    France\")\nOut[12]: 'Paris'\n```\n\n考虑上面的 In [2];，list1 是一个包含五个元素的列表 [1,2,3,4,5]，list1[0]\
    \ 是第一个元素，即 1，list1[-1] 是最后一个元素，即 5。切片 list1[1:3] 从 list1[1]（即 2）开始，一直到但不包括 list1[3]（即\
    \ 4）。所以 list1[1:3] = [2, 3]。"
