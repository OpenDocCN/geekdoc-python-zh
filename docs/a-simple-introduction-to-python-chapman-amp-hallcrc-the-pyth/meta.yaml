    # A SIMPLE INTRODUCTION TO PYTHON


    ![](img/3d655b79e80c72c183e10b0d0ec43472_0_0.png)


    # STEPHEN LYNCH


    CRC Press

    Taylor & Francis Group

    A CHAPMAN & HALL BOOK


    # A Simple Introduction to Python


    *A Simple Introduction to Python* is aimed at pre-university students and complete
    novices to programming. The whole book has been created using Jupyter notebooks.
    After introducing Python as a powerful calculator, simple programming constructs
    are covered, and the NumPy, MatPlotLib and SymPy modules (libraries) are introduced.
    Python is then used for Mathematics, Cryptography, Artificial Intelligence, Data
    Science and Object Oriented Programming. The reader is shown how to program using
    the integrated development environments: Python IDLE, Spyder, Jupyter notebooks,
    and through cloud computing with Google Colab.


    **Features:**


    - No prior experience in programming is required.

    - Demonstrates how to format Jupyter notebooks for publication on the Web.

    - Full solutions to exercises are available as a Jupyter notebook on the Web.

    - All Jupyter notebook solution files can be downloaded through GitHub.


    GitHub Repository of Data Files and a Jupyter Solution notebook:

    https://github.com/proflynch/A-Simple-Introduction-to-Python


    Jupyter Solution notebook web page:

    https://drstephenlynch.github.io/webpages/A-Simple-Introduction-to-Python-Solutions.html


    In 2022, **Stephen Lynch** was named a National Teaching Fellow, which celebrates
    and recognizes individuals who have made an outstanding impact on student outcomes
    and teaching in higher education. He won the award for his work in programming
    in STEM subjects, research feeding into teaching, and widening participation (using
    experiential and object-based learning). Although educated as a pure mathematician,
    Stephen''s many interests now include applied mathematics, cell biology, electrical
    engineering, computing, neural networks, nonlinear optics and binary oscillator
    computing, which he co-invented with a colleague. He has authored 2 international
    patents for inventions, 8 books, 4 book chapters, over 45 journal articles, and
    a few conference proceedings. Stephen is a Fellow of the Institute of Mathematics
    and Its Applications (FIMA) and a Senior Fellow of the Higher Education Academy
    (SFHEA). He is currently a Reader with MMU and was an Associate Lecturer with
    the Open University from 2008 to 2012. In 2010, Stephen volunteered as a STEM
    Ambassador, in 2012, he was awarded MMU Public Engagement Champion status, and
    in 2014, he became a Speaker for Schools. He runs national workshops on "Python
    for A-Level Mathematics and Beyond" and international workshops on "Python for
    Scientific Computing and TensorFlow for Artificial Intelligence." He has run workshops
    in China, Malaysia, Singapore, Saudi Arabia, and the USA.


    # Chapman & Hall/CRC

    The Python Series


    # About the Series


    Python has been ranked as the most popular programming language, and it is widely
    used in education and industry. This book series will offer a wide range of books
    on Python for students and professionals. Titles in the series will help users
    learn the language at an introductory and advanced level, and explore its many
    applications in data science, AI, and machine learning. Series titles can also
    be supplemented with Jupyter notebooks.


    **Image Processing and Acquisition using Python, Second Edition**

    *Ravishankar Chityala, Sridevi Pudipeddi*


    **Python Packages**

    *Tomas Beuzen and Tiffany-Anne Timbers*


    **Statistics and Data Visualisation with Python**

    *Jesús Rogel-Salazar*


    **Introduction to Python for Humanists**

    *William J.B. Mattingly*


    **Python for Scientific Computation and Artificial Intelligence**

    *Stephen Lynch*


    **Learning Professional Python Volume 1: The Basics**

    *Usharani Bhimavarapu and Jude D. Hemanth*


    **Learning Professional Python Volume 2: Advanced**

    *Usharani Bhimavarapu and Jude D. Hemanth*


    **Learning Advanced Python from Open Source Projects**

    *Rongpeng Li*


    **Foundations of Data Science with Python**

    *John Mark Shea*


    **Data Mining with Python: Theory, Applications, and Case Studies**

    *Di Wu*


    **A Simple Introduction to Python**

    *Stephen Lynch*


    For more information about this series please visit: [https://www.crcpress.com/Chapman-HallCRC/book-series/PYTH](https://www.crcpress.com/Chapman-HallCRC/book-series/PYTH)


