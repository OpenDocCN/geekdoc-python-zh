    # 9.4 VIOLIN, SCATTER AND HEXAGONAL BIN PLOTS


    A violin plot plays a similar role as a box and whisker plot. It shows the distribution
    of quantitative data across several levels of one (or more) categorical variables
    such that those distributions can be compared. Unlike a box plot, in which all
    of the plot components correspond to actual datapoints, the violin plot features
    a kernel density estimation of the underlying distribution. This can be an effective
    and attractive way to show multiple distributions of data at once, but keep in
    mind that the estimation procedure is influenced by the sample size, and violins
    for relatively small samples might look misleadingly smooth.


    **Example 9.4.1.** Create violin plots of life expectancy at birth in 2010, grouped
    by region.


