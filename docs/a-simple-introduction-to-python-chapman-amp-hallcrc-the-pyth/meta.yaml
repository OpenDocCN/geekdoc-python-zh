- md: "## 3.1 THE CANTOR SET FRACTAL\n\nStart with a line segment at stage zero. At\
    \ each stage, remove the middle third segment and replace one segment with two\
    \ segments each one third the length of the previous segment.\n\n```python\n#\
    \ You must run this cell before the other programs.\n# These commands are not\
    \ needed in IDLE.\n!pip install ColabTurtlePlus\nfrom ColabTurtlePlus.Turtle import\
    \ *\n```\n\n```python\n# The Cantor set.\ninitializeTurtle()\ndef cantor(x , y\
    \ , length):\n    speed(13)                # Fastest speed.\n    if length >=\
    \ 5:\n        penup()\n        pensize(2)\n        pencolor(\"blue\")\n      \
    \  setpos(x , y)\n        pendown()\n        fd(length)            # Forward.\n\
    \        y -= 80               # y = y - 80.\n        cantor(x , y , length /\
    \ 3)\n        cantor(x + 2 * length / 3 , y , length / 3)\n        penup()\n \
    \       setpos(x , y + 80)\ncantor(-400 , 200 , 500)\n```\n\n## 3.2 THE KOCH SNOWFLAKE\n\
    \nStart with an equilateral triangle. On the outside, replace each segment with\
    \ four segments, each one-third the length of the previous segment.\n\n```python\n\
    # The Koch Snowflake.\ninitializeTurtle()\npensize(1)\npenup()\nsetpos(-250 ,\
    \ 200)           # To center image.\npendown()\ndef KochSnowflake(length, level):\n\
    \    speed(13)                 # Fastest speed.\n    for i in range(3):\n    \
    \    plot_side(length, level)\n        rt(120)                    # Right turn\
    \ 120 degrees.\ndef plot_side(length, level):\n    if level==0:\n        fd(length)\n\
    \        return\n    plot_side(length/3, level-1)\n    lt(60)                \
    \     # Left turn 60 degrees.\n    plot_side(length/3, level-1)\n    rt(120)\n\
    \    plot_side(length/3, level-1)\n    lt(60)\n    plot_side(length/3, level-1)\n\
    KochSnowflake(300 , 3)\n```\n\n## 3.3 A BIFURCATING TREE\n\nTo plot a bifurcating\
    \ tree, at each stage replace one segment with two shorter segments, turning one\
    \ left and the other right through given angles.\n\n```python\n# A bifurcating\
    \ tree.\ninitializeTurtle()\nspeed(13)\nsetheading(90)        # Point turtle up.\n\
    penup()               # Lift pen.\nsetpos(-200 , -120)   # Start point coordinates.\n\
    pendown()\ndef FractalTreeColor(length, level):\n    pensize(length / 10) # Thickness\
    \ of lines.\n    if length < 20:\n        pencolor(\"green\")\n    else:\n   \
    \     pencolor(\"brown\")\n    if level > 0:\n        fd(length)        # Forward\n\
    \        rt(60)            # Right turn 60 degrees\n        FractalTreeColor(length*0.7,\
    \ level-1)\n        lt(90)            # Left turn 90 degrees\n        FractalTreeColor(length*0.5,\
    \ level-1)\n        rt(30)            # Right turn 30 degrees\n        penup()\n\
    \        bk(length)        # Backward\n        pendown()\nFractalTreeColor(200\
    \ , 10)\n```\n\n## 3.4 THE SIERPINSKI TRIANGLE\n\nStart with a solid equilateral\
    \ triangle. At each stage remove the inverted central equilateral triangle.\n\n\
    ```python\n# Sierpinski Triangle.\ninitializeTurtle()\nspeed(13)          # Fastest\
    \ speed.\npenup()\nsetpos(-300 , 0)\npendown()\ndef SierpinskiTriangle(length,\
    \ level):\n    if level==0:\n        return\n    begin_fill()           # Fill\
    \ shape.\n    color(\"red\")\n    for i in range(3):\n        SierpinskiTriangle(length/2,\
    \ level-1)\n        fd(length)\n        lt(120)             # Left turn 120 degrees.\n\
    \    end_fill()\nSierpinskiTriangle(300 , 5)\n```\n\n## EXERCISES\n\n1.  Plot\
    \ a variation of the Cantor set, where the two middle segments are removed at\
    \ each stage. Thus, at each stage, one segment is replaced with three segments\
    \ each one-fifth the length of the previous segment.\n2.  Plot a Koch square fractal,\
    \ where on each side of a square, one segment is replaced with five segments each\
    \ one-third the length of the previous segment.\n3.  Plot a trifurcating tree\
    \ fractal.\n4.  Plot a Sierpinski square fractal, where at each stage a central\
    \ square is removed and the length scales decrease by one-third.\n5.  In Python\
    \ IDLE, click on the **Help** tab and **Turtle Demo** to see some cool examples.\
    \ Figure 3.1 shows stills of three animations.\n\nFigure 3.1 Stills of animations\
    \ from the Turtle Demo. (a) Trajectories of the earth and moon around the sun.\
    \ (b) Analog clock with day and date. (c) Solution to the Towers of Hanoi problem.\n\
    \n# CHAPTER 4\n\n## NumPy and MatPlotLib\n\n## 4.1 NUMERICAL PYTHON (NUMPY)\n\n\
    Numpy is a library that allows Python to compute with lists, arrays, vectors,\
