    \n**Console Window:** The lower right window is where Python can be used as a\
    \ calculator. Users can also **Undock** and **Redock** this window.\n\n**Example\
    \ 2.3.2.** Within Google Colab, use a **while loop** to define a function that\
    \ computes the sum of the first $n$ natural numbers.\n\n![](img/3d655b79e80c72c183e10b0d0ec43472_33_0.png)\n\
    \nThe sum of the first 100 natural numbers is 5050.\n\n**Google Colab:** The URL\
    \ for Google Colab is:\n\nhttps://colab.research.google.com/.\n\nReaders should\
    \ note that this is cloud computing and you need access to the internet to use\
