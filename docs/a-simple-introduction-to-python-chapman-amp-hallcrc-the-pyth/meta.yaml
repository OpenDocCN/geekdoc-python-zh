    ```\n\n```\nOut[5]: Jessa\nHuman Resources\nAttributeError: 'Employee' object\
    \ has no attribute '__salary'\n```\n\n## 10.3 继承\n\n将父类的属性继承到子类的过程称为继承。现有的类称为基类或父类，新类称为子类或派生类。\n\
