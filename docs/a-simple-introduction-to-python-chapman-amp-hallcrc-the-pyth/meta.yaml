    \ 列表、元组、集合和字典\n\nPython 中有四种内置数据类型，它们是列表、元组、集合和字典。现在将逐一定义：\n\n**列表**是一个有序且可更改的元素集合，允许重复元素。例如，[1,\
    \ 2, 3, 3, 4, 5] 是一个包含六个元素的列表。请注意使用了方括号和从零开始的索引。\n\n## 8 ■ Python 简明教程\n\n**元组**是一个有序且不可更改的元素集合，允许重复元素。元组通常用于异构（不同）数据类型。例如，(4,5,42,6,6,“cherry”,“date”)\
    \ 是一个包含六个元素的元组。请注意使用了圆括号和从零开始的索引。\n\n**集合**是一个无序、不可更改且无索引的元素集合，没有重复元素。例如，{7,8,9,“fig”,“grape”}\
    \ 是一个包含五个元素的集合。请注意使用了花括号。\n\n**字典**是一个有序且可更改的键值对集合，没有重复元素。例如，{“England” : “London”,\
    \ “France” : “Paris”, “Germany” : “Berlin”} 是一个欧洲首都的字典。请注意使用了花括号、键值对和从零开始的索引。\n\
    \nPython 使用**从零开始的索引**，其中第一个元素的索引为零，第二个元素的索引为一，依此类推。\n\nPython 中使用**切片**从数据类型中移除某些元素。\n\
    \n读者应该执行下面的命令并自己编造示例，以获得更深入的理解。\n\n### 示例。\n\n**In/Out** &nbsp;&nbsp;&nbsp;&nbsp;\
    \ **代码单元格**\n\n```\nIn [1]:  # An empty list.\n        list_empty = []\n     \
    \   print(list_empty)\nOut[1]:  []\nIn [2]:  # Class type.\n        list1 = [1,\
    \ 2, 3, 4, 5]\n        print(type(list1))\nOut[2]:  <class 'list'>\nIn [3]:  #\
    \ Zero-based indexing.\n        list1[0], list1[1], list1[-1]\nOut[3]:  (1, 2,\
    \ 5)\n```\n\n```\nIn [4]:  # Length, maximum and minimum.\n        len(list1),\
    \ max(list1), min(list1)\nOut[4]: (6, 5, 1)\nIn [5]:  # Using range to generate\
