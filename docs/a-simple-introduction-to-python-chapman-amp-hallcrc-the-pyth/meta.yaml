    \        list(range(5) , list(range(2 , 14 , 2))\nOut[5]: ([0,1,2,3,4], [2,4,6,8,10,12])\n\
    In [6]:  # Slicing lists.\n        list1[1 : 3] , list1[2:] , list1[:1]\nOut[6]:\
