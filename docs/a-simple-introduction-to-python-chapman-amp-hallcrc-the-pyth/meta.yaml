    ## 前言


    目前，Python 是世界上最流行的编程语言。它是开源的，对用户完全免费。用它编程很有趣，并且在解决现实世界问题方面功能极其强大。


    本书面向大学预科生或编程完全新手。这是我编写的第三本关于 Python 的书。最近的一本书，**《Python 科学计算与人工智能》** [1]，由 CRC
    Press 于 2023 年出版，面向高中生、本科生、研究生和科学家，专注于跨学科科学、计算建模、模拟和编程。更高级的书，**《使用 Python 的动力系统及其应用》**
    [2]，由 Springer International Publishing 出版，设定在本科高年级和研究生水平，详细涵盖了一些数学理论和研究。本书是 [1]
    和 [2] 的前导，提供了 Python 编程的温和入门，面向完全新手。


    在前言的第二部分，将向读者展示（众多方法中的）三种访问 Python 的方法。Python 集成开发学习环境 (IDLE) 适用于第 1 至 3 章。对于科学计算和第
    4 至 10 章的内容，读者需要通过 Anaconda 使用 Jupyter notebooks 或 Spyder，或者通过云计算使用 Google Colab。


    每章都提供示例和练习。为了理解编程，读者必须尝试这些练习。学习编程就像学习骑自行车——你必须摔倒很多次才能掌握这门艺术。预计会犯很多错误，从错误中学习，然后继续下一章。所有练习的完整解决方案和其他资源将通过
    GitHub 提供，读者可以免费下载所有文件。还将有一个包含完整解决方案的网页，读者可以简单地复制粘贴代码并在 Python 环境中运行程序。读者应注意，Python
    程序可以很容易地由 OpenAI 开发的 ChatGPT（聊天生成预训练转换器）以及其他替代方案（如 Microsoft Bing、Perplexity AI
    和 Google Bard AI）生成。读者应该问问这些 AI 聊天机器人，为什么人类应该学习编程——它们给出了一些非常有力的论据。


    第 1 章向读者展示如何将 Python 用作简单、强大的计算器，并介绍了第一个库（或模块）。Math 库包含可以在 Python 中调用的函数（用 Python
    编写）。其中一些函数对大多数读者来说很熟悉（asin、sin、exp、gcd、lcm、sqrt 等），一些不熟悉的函数（ceil、floor、fmod、radians、trunc）将在此定义。第
    2 章从列表、元组、集合和字典开始，然后转向简单编程、定义函数（想想为你的 Python 计算器添加按钮）、循环和条件构造（if、elif、else）。在第
    3 章中，将 turtle 库加载到笔记本中，并使用递归函数和迭代绘制简单的分形（在不断缩小的尺度上重复的图像）。第 4 章在处理数组、矩阵、向量、张量和绘图时使用了数值
    Python (NumPy) 和矩阵绘图库 (MatPLotLib)。第 5.1 节介绍了使用 Google Colab (Collaboratory) 进行云计算，读者可以在自己的计算机上无需安装任何软件即可使用
    Jupyter notebooks。下一节向读者介绍如何格式化笔记本，使用 LaTeX 插入标题、图形和数学方程。接下来介绍了用于符号计算的符号 Python
    (SymPy) 库，最后一节向读者展示如何访问 GitHub，这个 AI 驱动的开发者平台，用于构建、扩展和交付安全的软件。除了在这里存储和共享 Python
    程序外，读者还应该知道它也提供了一个发布自己网页的平台——正如作者为其个人网页和本书解决方案所做的那样。


    第 6 章向读者展示 Python 如何帮助理解基础数学。使用 Python 可以帮助更深入地理解数学，我强烈主张将其引入世界各地的所有学校课程。它不仅可以帮助理解，而且可以带来很多乐趣——这是许多儿童数学教育中所缺乏的！第
    7 章从一些著名的历史密码开始，以里维斯特-沙米尔-阿德勒曼 (RSA) 算法的简单示例结束，提供了密码学和网络安全的基础介绍。第 8 章讨论了通过人工神经网络
    (ANN) 实现的人工智能 (AI)。有用于逻辑与、或和异或门的简单 ANN，并使用一个非常简单的 ANN 解释了反向传播算法。讨论了 1970 年代著名的波士顿房价数据集，并在解决方案笔记本中提供了波士顿房价
    ANN 的完整工作程序。作为数据科学的入门，第 9 章从 Python 和数据分析 (PANDAS) 库开始，然后向读者展示如何加载、预处理数据、可视化呈现数据、探索数据以及分析和传达结果的示例。本章使用了四个大型数据集
    (LDS)，所有 LDS 都可以通过 GitHub 下载。


    第 10 章提供了面向对象编程 (OOP) 的简单介绍，这是一种与前面章节中遇到的函数式和过程式编程不同的编程风格。该概念基于包含数据（属性）和代码（方法）的对象。使用学生、员工和车辆对象，简要解释了封装、继承和多态的概念。练习中列出了一个砖块破坏者游戏
    OOP 的示例，解决方案笔记本中提供了该游戏的完整工作程序。


    数据文件和所有章节练习的完整解决方案将通过 GitHub 提供：


    https://github.com/proflynch/A-Simple-Introduction-to-Python。


    或者，读者可以在此处查看所有解决方案的 Jupyter notebook：


    https://drstephenlynch.github.io/webpages/A-Simple-Introduction-to-Python-Solutions.html。


    有关生物学、化学、数据科学、经济学、工程学、分形和多重分形、图像处理、常微分方程和偏微分方程的数值方法、物理学、统计学和人工智能 (AI) 的应用，请参阅
    [1]。有关连续和离散动力系统的理论和应用的更多信息，请读者参阅 [2]。


    - 1. Lynch, S. (2023). Python for Scientific Computing and Artificial Intelligence.
    CRC Press, Boca Raton, FL, USA.

