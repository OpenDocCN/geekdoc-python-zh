    import numpy as np

    x = np.arange(-5 , 5 , 0.1)

    y = np.arange(-5 , 5 , 0.1)

    X,Y = np.meshgrid(x,y)

    # Z is a function of two variables.

    Z = X**2 + Y**2

    fig = plt.figure(figsize=(12,6))

    ax = fig.add_subplot(111, projection = "3d")

    ax.set_xlabel("x")

    ax.set_xlim(-5 , 5)

    ax.set_ylabel("y")

    ax.set_ylim(-5 , 5)

    ax.set_zlabel("z")

    ax.set_zlim(np.min(Z) , np.max(Z))

    ax.set_title("3D Surface, $z=x^2+y^2$")

    ax.plot_surface(X , Y , Z)

    plt.show()

    ```'
