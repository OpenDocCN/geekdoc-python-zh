- img_proc: true
  md: 'the backpropagation algorithm is explained using a very simple ANN. The well-known
    data set for Boston housing from the 1970s is discussed and a full working program
    of the Boston housing ANN is provided in the solutions notebook. As an introduction
    to Data Science, Chapter 9 starts with the Python and Data Analysis (PANDAS) library
    and then the reader is given examples of how to load, pre-process data, present
    the data visually, explore the data and analyze and communicate the results. Four
    large data sets (LDSs) are used in this chapter, and all LDSs can be downloaded
    through GitHub.


    Chapter 10 provides a simple introduction to object oriented programming (OOP),
    which is a style of programming which is different to functional and procedural
    programming encountered in earlier chapters. The concept is based on objects which
    contain data (attributes) and code (methods). Using student, employee and vehicle
    objects, the concepts of encapsulation, inheritance and polymorphism are briefly
    explained. An example of a Brick Breaker Game OOP is listed in the exercises,
    and a full working program of the game is provided in the solution notebook.


    Data files and full worked solutions to all of the chapter exercises will be available
