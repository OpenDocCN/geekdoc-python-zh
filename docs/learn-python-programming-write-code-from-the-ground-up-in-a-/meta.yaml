    \ B : np.array([dB_k(B, k)\n\n            for k in range(self.x_train.shape[1])])\n\
    \n        # Optimize\n\n        self.betas = fmin_bfgs(self.negative_lik, self.betas,\
    \ fprime=dB)\n\n    def set_data(self, x_train, y_train, x_test, y_test):\n\n\
    \        \"\"\" Take data that's already been generated. \"\"\"\n\n        self.x_train\
