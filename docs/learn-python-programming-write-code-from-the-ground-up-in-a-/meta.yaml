- img_proc: true
  md: 'One of the first models that would be worth trying is logistic regression.


    # Coding it up


    I wasn''t working on this exact problem, but I was working on something close.
    Being one to practice what I preach, I started looking for a dead simple Python
    logistic regression class. The only requirement is that I wanted it to support
    L2 regularization (more on this later). I''m also sharing this code with a bunch
    of other people on many platforms, so I wanted as few dependencies on external
    libraries as possible.


    I couldn''t find exactly what I wanted, so I decided to take a stroll down memory
    lane and implement it myself. I''ve written it in C++ and Matlab before but never
    in Python.


    I won''t do the derivation, but there are plenty of good explanations out there
    to follow if you''re not afraid of a little calculus. Just do a little Googling
    for "logistic regression derivation." The big idea is to write down the probability
    of the data given some setting of internal parameters, then to take the derivative,
    which will tell you how to change the internal parameters to make the data more
    likely. Got it? Good.


    For those of you out there that know logistic regression inside and out, take
    a look at how short the train() method is. I really like how easy it is to do
    in Python.


    # Regularization


    I caught a little indirect flak during March madness season for talking about
    how I regularized the latent vectors in my matrix-factorization model of team
    offensive and defensive strengths when predicting outcomes in NCAA basketball.
    Apparently people thought I was talking nonsense -- crazy, right?'
