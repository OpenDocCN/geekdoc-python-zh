    # Destroying Objects (Garbage Collection)


    Python deletes unneeded objects (built-in types or class instances) automatically
    to free the memory space. The process by which Python periodically reclaims blocks
    of memory that no longer are in use is termed Garbage Collection.


    Python''s garbage collector runs during program execution and is triggered when
    an object''s reference count reaches zero. An object''s reference count changes
    as the number of aliases that point to it changes.


    An object''s reference count increases when it is assigned a new name or placed
    in a container (list, tuple, or dictionary). The object''s reference count decreases
    when it''s deleted with del, its reference is reassigned, or its reference goes
    out of scope. When an object''s reference count'
  - "[PAGE 44]\n\nreaches zero, Python collects it automatically.\n\n```\na = 40 \
    \   # Create object <40>\nb = a     # Increase ref. count  of <40>\nc = [b]  \
    \ # Increase ref. count  of <40>\n```\n\n```\ndel a     # Decrease ref. count\
    \  of <40>\nb = 100   # Decrease ref. count  of <40>\nc[0] = -1 # Decrease ref.\
    \ count  of <40>\n```\n\nYou normally will not notice when the garbage collector\
    \ destroys an orphaned instance and reclaims its space. But a class can implement\
    \ the special method __del__(), called a destructor, that is invoked when the\
    \ instance is about to be destroyed. This method might be used to clean up any\
    \ non memory resources used by an instance.\n\n# Example\n\nThis __del__() destructor\
    \ prints the class name of an instance that is about to be destroyed –\n\n```\n\
    #!/usr/bin/python\n\nclass Point:\n    def __init__( self, x=0, y=0):\n      \
    \  self.x = x\n        self.y = y\n    def __del__(self):\n        class_name\
    \ = self.__class__.__name__\n        print class_name, \"destroyed\"\n```"
