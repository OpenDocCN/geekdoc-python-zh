    \ Syntax Rules\n    - 3) Family of Languages\n    - 4) Ways to Achieve Same Results\n\
    \    - 5) Web Scripting Language\n    - 6) Web Application Frameworks\n    - 7)\
    \ Usage\n    - 8) Performance and Speed\n    - 9) Structured Data Analysis\n \
    \   - 10) JVM Interoperability\n    - 11) Advanced Object Oriented Programming\n\
    \    - 12) Text Processing Capability\n- CHAPTER 14\n  - APPS BUILT WITH PYTHON\n\
    \    - Instagram\n    - Pinterest\n    - Disqus\n    - Spotify\n    - Dropbox\n\
    \    - Uber\n    - Reddit\n- CHAPTER 15\n  - TOOLS TO RUN PYTHON ON ANDROID\n\
    \    - BeeWare\n    - Chaquopy\n    - Kivy\n    - Pyqtdeploy\n    - QPython\n\
    \    - SL4A\n    - PySide\n    - Termux\n- CHAPTER 16\n  - PYTHON AS A MOBILE\
    \ APP DEVELOPMENT LANGUAGE\n- CHAPTER 17\n  - PROGRAMMING LANGUAGES FOR MOBILE\
    \ APP DEVELOPMENT\n    - BuildFire.js\n    - Python\n    - Java\n    - PHP\n \
    \   - Swift\n    - C#\n    - Objective-C\n    - C++\n    - JavaScript\n    - HTML5\n\
    \    - Ruby\n    - Perl\n    - Rust\n    - SQL\n\n# CHAPTER 1\n\n## LEARN PYTHON\
    \ PROGRAMMING\n\n**INTRODUCTION**\n\nPython is an example of a high level language.\
    \ Other high level languages you might have heard of are C++, PHP, Pascal, C#,\
    \ and Java. Python is an easy to learn, powerful programming language. It has\
    \ efficient high-level data structures and a simple but effective approach to\
    \ object-oriented programming.\n\nPython was originally conceived by Van Rossum\
    \ as a hobby language in December 1989. Also, the major and backward-incompatible\
    \ version of the general-purpose programming language was released on 3rd December\
    \ 2008. But Python is recently rated by a number of surveyors as the most popular\
    \ coding language of 2015. The massive popularity indicates Python's effectiveness\
    \ as a modern programming language. At the same time, Python 3 is currently used\
    \ by developers across the worlds for creating a variety of desktop GUI, web and\
    \ mobile applications.\n\nPython is a high-level, interpreted scripting language\
    \ developed in the late 1980s by Guido van Rossum at the National Research Institute\
    \ for Mathematics and Computer Science in the Netherlands. The initial version\
    \ was published at the alt.sources newsgroup in 1991, and version 1.0 was released\
    \ in 1994.\n\nPython 2.0 was released in 2000, and the 2.x versions were the prevalent\
    \ releases until December 2008. At that time, the development team made the decision\
    \ to release version 3.0, which contained a few relatively small but significant\
    \ changes that were not backward compatible with the 2.x versions. Python 2 and\
    \ 3 are very similar, and some features of Python 3 have been backported to Python\
    \ 2. But in general, they remain not quite compatible.\n\nBoth Python 2 and 3\
    \ have continued to be maintained and developed, with periodic release updates\
    \ for both. As of this writing, the most recent versions available are 2.7.15\
    \ and 3.6.5. However, an official End Of Life date of January 1, 2020 has been\
    \ established for Python 2, after which time it will no longer be maintained.\
    \ If you are a newcomer to Python, it is recommended that you focus on Python\
    \ 3, as this tutorial will do.\n\nPython is still maintained by a core development\
    \ team at the Institute, and Guido is still in charge, having been given the title\
    \ of BDFL (Benevolent Dictator For Life) by the Python community. The name Python,\
    \ by the way, derives not from the snake, but from the British comedy troupe Monty\
    \ Python’s Flying Circus, of which Guido was, and presumably still is, a fan.\
    \ It is common to find references to Monty Python sketches and movies scattered\
    \ throughout the Python documentation.\n\nThere are also a number of reasons why\
    \ the huge popularity and market share of Python will remain intact over a longer\
    \ period of time.\n\n## REASONS WHY THE MASSIVE POPULARITY OF PYTHON WILL REMAIN\
    \ INTACT IN THE FUTURE\n\n### Supports Multiple Programming Paradigms\n\nGood\
    \ developers often take advantage of different programming paradigms to reduce\
    \ the amount of time and efforts required for developing large and complex applications.\
    \ Like other modern programming languages, Python also supports a number of commonly\
    \ used programming styles including object-oriented, functional, procedural and\
    \ imperative. It further features automatic memory management, along with a dynamic\
    \ type system. So programmers can use the language to effectuate development of\
    \ large and complex software applications.\n\n### Doesn't Require Programmers\
    \ to Write Lengthy Code\n\nPython is designed with complete focus on code readability.\
    \ So the programmers can create readable code base that can be used by members\
    \ of distributed teams. At the same time, the simple syntax of the programming\
    \ language enables them to express concepts without writing longer lines of code.\
    \ The feature makes it easier for developers to large and complex applications\
    \ within a stipulated amount of time. As they can easily skip certain tasks required\
    \ by other programming languages, it becomes easier for developers to maintain\
    \ and update their applications.\n\n### Provides a Comprehensive Standard Library\n\
    \nPython further scores over other programming languages due to its extensive\
    \ standard library. The programmers can use these libraries to accomplish a variety\
    \ of tasks without writing longer lines of code. Also, the standard library of\
    \ Python is designed with a large number of high use programming tasks scripted\
    \ into it. Thus, it helps programmers to accomplish tasks like string operations,\
    \ development and implementation of web services, working with internet protocols,\
    \ and handling operating system interface."
  mdcn: "# 学习Python编程\n\n以清晰简洁的方法从零开始编写代码，配合完整的标准培训课程。从初学者到中级水平，通过实例进行动手实践，以符合详细的要求。\n\
    \n恭喜您下载了这本电子书，感谢您的支持。\n\n**请尽情享受！**\n\n© 版权所有 2021 [保留所有权利](https://example.com)\n\
    \n未经出版商事先书面许可，不得以任何形式或任何方式（包括影印、录制或其他电子或机械方法，或任何信息存储和检索系统）复制、分发或传播本出版物的任何部分，但版权法允许的简短引用用于评论和某些其他非商业用途的情况除外。\n\
    \n## 目录\n\n- 第1章\n  - 学习Python编程\n  - 引言\n  - Python在未来保持巨大受欢迎程度的原因\n    - 支持多种编程范式\n\
    \    - 不要求程序员编写冗长代码\n    - 提供全面的标准库\n    - 促进Web应用开发\n    - 便于开发高质量的GUI、科学和数值应用\n\
    \    - 简化应用原型设计\n    - 也可用于移动应用开发\n    - 开源\n- 第2章\n  - 如何接受用户输入并显示输出\n- 第3章\n\
    \  - 如何定义自己的函数和模块\n- 第4章\n  - 如何编写自己的类\n  - 面向对象\n- 第5章\n  - 如何处理外部文件\n- 第6章\n\
    \  - 探索变量、字符串、整数等以设计对话式程序\n- 第7章\n  - 理解“图形用户界面”并创建自己的街机游戏和应用\n- 第8章\n  - Django对现有Python开发者有何益处\n\
    \  - 更短更简洁的代码\n  - 自定义Web应用的选项\n  - 用于完成常见任务的内置工具\n  - 多种软件包\n  - 对象关系映射器（ORM）\n\
    \  - 人类可读的URL\n  - 动态管理界面\n  - 优化的安全性\n  - 交流想法的选项\n- 第9章\n  - 重要的Python框架\n \
    \   - 1) Kivy\n    - 2) Qt\n    - 3) PyGUI\n    - 4) WxPython\n    - 5) Django\n\
    \    - 6) CherryPy\n    - 7) Flask\n    - 8) Pyramid\n    - 9) Web.py\n    - 10)\
    \ TurboGears\n- 第10章\n  - Python在图像应用中的作用\n- 第11章\n  - Python中带L2正则化的逻辑回归\n- 第12章\n\
    \  - Python Web应用能否使用Selenium进行测试？\n    - 支持主要操作系统和Web浏览器\n    - 允许用户创建完整的测试自动化套件\n\
    \    - 更快地执行测试\n    - 需要基本的HTML概念\n    - 帮助测试人员解决可维护性问题\n    - 提供Selenium Python\
    \ API\n- 第13章\n  - Perl与Python\n    - 1) 设计目标\n    - 2) 语法规则\n    - 3) 语言家族\n\
    \    - 4) 实现相同结果的方式\n    - 5) Web脚本语言\n    - 6) Web应用框架\n    - 7) 用途\n    - 8)\
    \ 性能和速度\n    - 9) 结构化数据分析\n    - 10) JVM互操作性\n    - 11) 高级面向对象编程\n    - 12) 文本处理能力\n\
    - 第14章\n  - 使用Python构建的应用\n    - Instagram\n    - Pinterest\n    - Disqus\n  \
    \  - Spotify\n    - Dropbox\n    - Uber\n    - Reddit\n- 第15章\n  - 在Android上运行Python的工具\n\
    \    - BeeWare\n    - Chaquopy\n    - Kivy\n    - Pyqtdeploy\n    - QPython\n\
    \    - SL4A\n    - PySide\n    - Termux\n- 第16章\n  - Python作为移动应用开发语言\n- 第17章\n\
    \  - 用于移动应用开发的编程语言\n    - BuildFire.js\n    - Python\n    - Java\n    - PHP\n\
    \    - Swift\n    - C#\n    - Objective-C\n    - C++\n    - JavaScript\n    -\
    \ HTML5\n    - Ruby\n    - Perl\n    - Rust\n    - SQL\n\n# 第1章\n\n## 学习Python编程\n\
    \n**引言**\n\nPython是高级语言的一个例子。您可能听说过的其他高级语言包括C++、PHP、Pascal、C#和Java。Python是一种易于学习、功能强大的编程语言。它具有高效的高级数据结构和一种简单但有效的面向对象编程方法。\n\
    \nPython最初由Van Rossum在1989年12月构想为一种业余爱好语言。此外，这种通用编程语言的主要且向后不兼容的版本于2008年12月3日发布。但最近，Python被许多调查者评为2015年最受欢迎的编程语言。这种巨大的受欢迎程度表明了Python作为现代编程语言的有效性。同时，Python\
    \ 3目前被世界各地的开发者用于创建各种桌面GUI、Web和移动应用。\n\nPython是一种高级、解释型的脚本语言，由Guido van Rossum于1980年代末在荷兰国家数学与计算机科学研究所开发。初始版本于1991年在alt.sources新闻组发布，1.0版本于1994年发布。\n\
    \nPython 2.0于2000年发布，2.x版本是2008年12月之前的主流版本。当时，开发团队决定发布3.0版本，其中包含一些相对较小但重要的更改，这些更改与2.x版本不向后兼容。Python\
    \ 2和3非常相似，Python 3的一些功能已被移植回Python 2。但总的来说，它们仍然不完全兼容。\n\nPython 2和3都继续得到维护和开发，并定期发布更新。截至撰写本文时，可用的最新版本是2.7.15和3.6.5。然而，Python\
    \ 2的官方生命周期结束日期已定为2020年1月1日，届时将不再维护。如果您是Python新手，建议您专注于Python 3，本教程也将如此。\n\nPython仍由研究所的核心开发团队维护，Guido仍然负责，被Python社区授予BDFL（终身仁慈独裁者）的称号。顺便说一下，Python这个名字并非源自蛇，而是源自英国喜剧团体Monty\
    \ Python's Flying Circus，Guido是，而且可能仍然是，该团体的粉丝。在Python文档中，经常可以找到对Monty Python小品和电影的引用。\n\
    \nPython在未来很长一段时间内保持巨大受欢迎程度和市场份额的原因还有很多。\n\n## Python在未来保持巨大受欢迎程度的原因\n\n### 支持多种编程范式\n\
    \n优秀的开发者经常利用不同的编程范式来减少开发大型复杂应用所需的时间和精力。与其他现代编程语言一样，Python也支持多种常用的编程风格，包括面向对象、函数式、过程式和命令式。它还具有自动内存管理功能以及动态类型系统。因此，程序员可以使用该语言来高效开发大型复杂的软件应用。\n\
    \n### 不要求程序员编写冗长代码\n\nPython的设计完全专注于代码可读性。因此，程序员可以创建可读的代码库，供分布式团队成员使用。同时，该编程语言的简单语法使他们能够在不编写更长代码行的情况下表达概念。这一特性使开发者更容易在规定时间内开发大型复杂应用。由于他们可以轻松跳过其他编程语言所需的某些任务，开发者维护和更新应用变得更加容易。\n\
    \n### 提供全面的标准库\n\nPython因其广泛的标准库而进一步优于其他编程语言。程序员可以使用这些库来完成各种任务，而无需编写更长的代码行。此外，Python的标准库设计了大量高频使用的编程任务。因此，它帮助程序员完成诸如字符串操作、Web服务的开发和实现、处理互联网协议以及处理操作系统接口等任务。"
