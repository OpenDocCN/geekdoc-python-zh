    \ import fmin_cg, fmin_bfgs, fmin\n\nimport numpy as np\n\ndef sigmoid(x):\n \
    \   return 1.0 / (1.0 + np.exp(-x))\n\nclass SyntheticClassifierData():\n    def\
    \ __init__(self, N, d):\n        \"\"\" Create N instances of d dimensional input\
    \ vectors and a 1D\n        class label (-1 or 1). \"\"\"\n        means = .05\
    \ * np.random.randn(2, d)\n\n        self.X_train = np.zeros((N, d))\n\n     \
    \   self.Y_train = np.zeros(N)\n\n        for i in range(N):\n\n            if\
    \ np.random.random() > .5:\n\n                y = 1\n\n            else:\n\n \
    \               y = 0\n\n            self.X_train[i, :] = np.random.random(d)\
    \ + means[y, :]\n\n            self.Y_train[i] = 2.0 * y - 1\n\n        self.X_test\
    \ = np.zeros((N, d))\n\n        self.Y_test = np.zeros(N)\n\n        for i in\
    \ range(N):\n\n            if np.random.randn() > .5:\n\n                y = 1\n\
    \n            else:\n\n                y = 0\n\n            self.X_test[i, :]\
    \ = np.random.random(d) + means[y, :]\n\n            self.Y_test[i] = 2.0 * y\
    \ - 1\n\nclass LogisticRegression():\n\n    \"\"\" A simple logistic regression\
    \ model with L2 regularization (zero-mean\n\n    Gaussian priors on parameters).\
    \ \"\"\"\n\n    def __init__(self, x_train=None, y_train=None, x_test=None, y_test=None,\n\
    \                 alpha=.1, synthetic=False):\n        # Set L2 regularization\
    \ strength\n        self.alpha = alpha\n\n        # Set the data.\n        self.set_data(x_train,\
    \ y_train, x_test, y_test)\n\n        # Initialize parameters to zero, for lack\
    \ of a better choice.\n        self.betas = np.zeros(self.x_train.shape[1])\n\n\
    \    def negative_lik(self, betas):\n        return -1 * self.lik(betas)\n\n \
    \   def lik(self, betas):\n        \"\"\" Likelihood of the data under the current\
    \ settings of parameters. \"\"\"\n\n        # Data likelihood\n        l = 0\n\
    \n        for i in range(self.n):\n\n            l += log(sigmoid(self.y_train[i]\
    \ *\n\n                             np.dot(betas, self.x_train[i, :])))\n\n  \
    \      # Prior likelihood\n\n        for k in range(1, self.x_train.shape[1]):\n\
    \n            l -= (self.alpha / 2.0) * self.betas[k]**2\n\n        return l\n\
    \n    def train(self):\n\n        \"\"\" Define the gradient and hand it off to\
    \ a scipy gradient-based\n\n        optimizer. \"\"\"\n\n        # Define the\
    \ derivative of the likelihood with respect to beta_k.\n\n        # Need to multiply\
    \ by -1 because we will be minimizing.\n\n        dB_k = lambda B, k : np.sum([-self.alpha\
    \ * B[k] +\n\n                                    self.y_train[i] * self.x_train[i,\
    \ k] *\n\n                                    sigmoid(-self.y_train[i] *\n\n \
    \                                   np.dot(B, self.x_train[i,:]))\n\n        \
    \                            for i in range(self.n)]) * -1\n\n        # The full\
