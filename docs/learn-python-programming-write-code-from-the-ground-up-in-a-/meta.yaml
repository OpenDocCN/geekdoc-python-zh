- md: '## EXECUTES TESTS FASTER


    To identify all bugs and performance issues in the web applications, QA professionals
    have to perform tests repeatedly and frequently. But the testers also have to
    complete all tests within a limited amount of time. Selenium allows testing professionals
    to take advantage of cloud-based testing grids to boost the performance of their
    test runs. In addition to optimizing the test infrastructure, these tools further
    enable testers to run parallel tests. Thus, it becomes easier for the testers
    to execute tests quickly and repeatedly. The testers also have option to choose
    from several open source cloud-based functional testing grids to avoid increased
    project overheads.


    ## Requires Basic HTML Concepts


    Selenium supports a number of modern programming languages. But while testing
    a Python web application, it requires only basic HTML concepts. HTML is used for
    describing a web page, whereas individual HTML tags represent document content.
    Thus, HTML tags decide how the content appears on the web browsers. Selenium divides
    the HTML elements or attributes into three distinct categories, i.e., single,
    group and customized. It locates single elements by their id, link or link text,
    whereas the group elements are identified based on combined values or index property.
    So it becomes easier for testers to find out the location of the defect or bug.
    The feature makes it easier for them to identify the exact bugs and performance
    issues quickly.


    ## Helps Testers to Address Maintainability Issues


    In addition to creating and executing test scripts quickly, QA professionals are
    also required to maintain the test cases effectively. Selenium helps testers to
    overcome maintainability issues by structuring the automated test code using a
    pattern called page objects. The page objects focuses on the structure of HTML
    code of a particular web page instead of checking how the services are implemented.
    Thus, testers can take advantage of page objects to locate the code easily, navigate
    between various web pages smoothly, and making changes only once. As most Selenium
    code will be located inside page objects, the testers can easily increase the
    code base without adding fresh Selenium code.


    ## Provides Selenium Python API


    As noted earlier, Selenium supports several programming languages including Python.
    So the testers have option to write test scripts in Python. Also, they can use
    Selenium Python API to write acceptance and functional tests by accessing Selenium
    WebDrivers like common, support, chrome, Firefox, ie, remote and phantomjs. The
    most recent version of the API further supports multiple versions of Python including
    3.2, 3.3, 3.4 and 2.7. It can further be accessed simply by downloading and installing
    the Selenium Python bindings. Thus, an organization can leverage the skills of
    existing Python programmers to perform acceptance and functional testing efficiently.


    ## Works with several testing frameworks


    While testing the Python web application with Selenium, QA professionals have
    option to use a number of test frameworks. At present, the portable web browser
    automation framework works with Pytest, PyUnit, unittest, and robot framework.
    As a part of Python 2.1 standard library, PyUnit enables testers to write tests
    easily, and execute multiple tests in text or GUI mode. Likewise, pytest comes
    with a number of features that help testers to write better programs. So the QA
    professional can take advantage of these test frameworks to ensure that the Python
    web application delivers flawless user experience across many web browsers.


    Python is an open source programming language, whereas Selenium is an open source
    web browser automation tool. Thus, organizations can use the programming language
    and web testing tool together to bring down the project costs. However, the combination
    will further enable them to test the application across major web browsers within
    a stipulated amount of time.


    # CHAPTER 13


    # PERL AND PYTHON


    Both Python and Perl are mature, open source, general purpose, high level, and
    interpreted programming languages. But the usage statistics posted on various
    websites depict that Python is currently more popular than Perl. Hence, a software
    developer can enhance his career prospects by switching from Perl to Python.


    A beginner can further learn and use Python programming language without putting
    extra time and effort. However, you must not switch to a new programming language
    just because of its popularity and usage. You must keep in mind the major differences
    between the two programming languages while deciding about migrating from Perl
    to Python.


    ## Points You Must Keep in Mind while Switching from Perl to Python


    ### 1) Design Goal


    Perl was originally designed as a scripting language to simplify report processing
    capabilities. Hence, it comes with built-in text processing capability. On the
    other hand, Python was designed initially as a hobby programming language. But
    it was designed with features to help programmers build applications with concise,
    readable and reusable code. The two programming languages still differ in the
    category of features and performance.


    ### 2) Syntax Rules


    The syntax rules of both Python and Perl are influenced by several other programming
    languages. For instance, Perl borrows features from a number of programming languages
    including C, shell script, sed, AWK and Lisp. Likewise, Python implements functional
    programming features in a manner similar to Lisp. But Python is hugely popular
    among modern programming languages due to its simple syntax rules. In addition
    to being easy to use, the syntax rules of Python further enable programmers to
    express many concepts with less and readable code.


    ### 3) Family of Languages


    Perl belongs to a family of high-level programming languages that includes Perl
    5 and Perl 6. The versions 5 and 6 of Perl are compatible with each other. A developer
    can easily migrate from Perl 5 to Perl 6 without putting extra time and effort.
    The programmers have option to choose from two distinct versions of Python - Python
    2 and Python 3. But the two versions of Python are not compatible with each other.
    Hence, a programmer has to choose from two distinct versions of the programming
    language.


    ### 4) Ways to Achieve Same Results


    Python enables programmers to express concepts without writing longer lines of
    code. But it requires programmers to accomplish tasks or achieve results in a
    specific and single way. On the other hand, Perl enables programmers to accomplish
    a single task or achieve the same results in a number of ways. Hence, many programmers
    find Perl to be more flexible than Python. But the multiple ways to achieve the
    same result often make the code written in Perl messy and application difficult
    to maintain.


    ### 5) Web Scripting Language


    Perl was originally designed as a UNIX scripting language. Many developers use
    Perl as a scripting language to avail its built-in text processing capabilities.
    However, there are many web developers who complain that Perl is slower than other
    widely used scripting languages. Python is also used widely by programmers for
    web application development. But it lacks built-in web development capabilities.
    Hence, developers have to avail various frameworks and tools to write web applications
    in Python efficiently and rapidly.


    ### 6) Web Application Frameworks


    Most developers nowadays avail the tools and features provided by various frameworks
    to build web applications efficiently and rapidly. Perl web programmers have option
    to choose from an array of frameworks including Catalyst, Dancer, Mojolicious,
    Poet, Interchange, Jifty, and Gantry. Likewise, the web developers also have option
    to use a number of Python web frameworks including Django, Flask, Pyramid, Bottle
    and Cherrypy. However, the number of Python web frameworks is much higher than
    the number of Perl web frameworks.


    ### 7) Usage


    As mentioned earlier, both Python and Perl are general-purpose programming languages.
    Hence, each programming language is used for developing a variety of software
    applications. Perl is used widely for graphic and network programming, system
    administration, and development of finance and biometric applications. But Python
    comes with a robust standard library that simplifies web application development,
    scientific computing, big data solution development, and artificial intelligence
    tasks. Hence, developers prefer using Python for development of advanced and mission-critical
    software applications.


    ### 8) Performance and Speed


    A number of studies have shown that Python is slower than other programming languages
    like Java and C++. Hence, developers frequently explore ways to enhance the execution
    speed of Python code. Some developers even replace default Python runtime with
    their own custom runtime to make the Python applications run faster. Many programmers
    even find Perl to be faster than Python. Many web developers use Perl as a scripting
    language to make the web applications faster, and deliver enhanced user experience.


    ### 9) Structured Data Analysis


    At present, big data is one of the hottest trends in software development. Many
    enterprises nowadays build custom applications for collecting, storing, and analyzing
    huge amount of structured and unstructured data. The PDL provided by Perl enables
    developers to analyze big data.'
  mdcn: '## 更快地执行测试


    为了识别Web应用程序中的所有缺陷和性能问题，QA专业人员必须反复且频繁地执行测试。但测试人员也必须在有限的时间内完成所有测试。Selenium允许测试专业人员利用基于云的测试网格来提升其测试运行的性能。除了优化测试基础设施外，这些工具还进一步使测试人员能够运行并行测试。因此，测试人员能够更轻松、更快速地反复执行测试。测试人员还可以选择多种开源的基于云的功能测试网格，以避免增加项目开销。


    ## 需要基本的HTML概念


    Selenium支持多种现代编程语言。但在测试Python Web应用程序时，它只需要基本的HTML概念。HTML用于描述网页，而各个HTML标签代表文档内容。因此，HTML标签决定了内容在Web浏览器上的呈现方式。Selenium将HTML元素或属性分为三个不同的类别，即单个、组和自定义。它通过id、链接或链接文本来定位单个元素，而组元素则根据组合值或索引属性来识别。因此，测试人员更容易找出缺陷或错误的位置。此功能使他们能够更轻松、更快速地识别确切的缺陷和性能问题。


    ## 帮助测试人员解决可维护性问题


    除了快速创建和执行测试脚本外，QA专业人员还需要有效地维护测试用例。Selenium通过使用一种称为页面对象的模式来构建自动化测试代码，从而帮助测试人员克服可维护性问题。页面对象关注特定网页的HTML代码结构，而不是检查服务是如何实现的。因此，测试人员可以利用页面对象轻松定位代码、在不同网页之间顺畅导航，并且只需修改一次。由于大多数Selenium代码将位于页面对象内部，测试人员可以轻松地扩展代码库，而无需添加新的Selenium代码。


    ## 提供Selenium Python API


    如前所述，Selenium支持多种编程语言，包括Python。因此，测试人员可以选择用Python编写测试脚本。此外，他们可以使用Selenium Python
    API，通过访问Selenium WebDrivers（如common、support、chrome、Firefox、ie、remote和phantomjs）来编写验收测试和功能测试。该API的最新版本进一步支持多个Python版本，包括3.2、3.3、3.4和2.7。它还可以通过下载并安装Selenium
    Python绑定来简单访问。因此，组织可以利用现有Python程序员的技能来高效地执行验收和功能测试。


    ## 与多个测试框架协同工作


    在使用Selenium测试Python Web应用程序时，QA专业人员可以选择使用多种测试框架。目前，这个可移植的Web浏览器自动化框架可与Pytest、PyUnit、unittest和robot
    framework协同工作。作为Python 2.1标准库的一部分，PyUnit使测试人员能够轻松编写测试，并在文本或GUI模式下执行多个测试。同样，pytest附带了许多功能，帮助测试人员编写更好的程序。因此，QA专业人员可以利用这些测试框架来确保Python
    Web应用程序在多种Web浏览器上提供无瑕疵的用户体验。


    Python是一种开源编程语言，而Selenium是一种开源的Web浏览器自动化工具。因此，组织可以将这两种编程语言和Web测试工具结合使用，以降低项目成本。此外，这种组合将使他们能够在规定的时间内跨主要Web浏览器测试应用程序。


    # 第13章


    # PERL和PYTHON


    Python和Perl都是成熟的、开源的、通用的、高级的、解释型的编程语言。但各种网站上发布的使用统计数据显示，Python目前比Perl更受欢迎。因此，软件开发人员可以通过从Perl转向Python来提升其职业前景。


    初学者还可以在不投入额外时间和精力的情况下学习和使用Python编程语言。但是，你不应该仅仅因为一种编程语言的流行度和使用率而转向它。在决定从Perl迁移到Python时，你必须记住这两种编程语言之间的主要区别。


    ## 从Perl转向Python时必须记住的要点


    ### 1) 设计目标


    Perl最初被设计为一种脚本语言，旨在简化报告处理能力。因此，它内置了文本处理功能。另一方面，Python最初是作为一种业余爱好编程语言设计的。但它被设计了帮助程序员构建具有简洁、可读和可重用代码的应用程序的功能。这两种编程语言在功能和性能类别上仍然存在差异。


    ### 2) 语法规则


    Python和Perl的语法规则都受到其他几种编程语言的影响。例如，Perl借鉴了多种编程语言的特性，包括C、shell脚本、sed、AWK和Lisp。同样，Python以类似于Lisp的方式实现了函数式编程特性。但Python因其简单的语法规则而在现代编程语言中广受欢迎。除了易于使用外，Python的语法规则还使程序员能够用更少且可读的代码表达许多概念。


    ### 3) 语言家族


    Perl属于一个高级编程语言家族，包括Perl 5和Perl 6。Perl的版本5和版本6彼此兼容。开发人员可以轻松地从Perl 5迁移到Perl 6，而无需投入额外的时间和精力。程序员可以选择两种不同版本的Python——Python
    2和Python 3。但这两个版本的Python彼此不兼容。因此，程序员必须从该编程语言的两个不同版本中做出选择。


    ### 4) 实现相同结果的方式


    Python使程序员能够无需编写冗长的代码行来表达概念。但它要求程序员以特定且单一的方式完成任务或实现结果。另一方面，Perl使程序员能够以多种方式完成单个任务或实现相同的结果。因此，许多程序员发现Perl比Python更灵活。但实现相同结果的多种方式常常使用Perl编写的代码变得混乱，且应用程序难以维护。


    ### 5) Web脚本语言


    Perl最初被设计为一种UNIX脚本语言。许多开发人员使用Perl作为脚本语言，以利用其内置的文本处理能力。然而，许多Web开发人员抱怨Perl比其他广泛使用的脚本语言慢。Python也被程序员广泛用于Web应用程序开发。但它缺乏内置的Web开发能力。因此，开发人员必须利用各种框架和工具来高效、快速地用Python编写Web应用程序。


    ### 6) Web应用程序框架


    如今，大多数开发人员都利用各种框架提供的工具和功能来高效、快速地构建Web应用程序。Perl Web程序员可以从一系列框架中选择，包括Catalyst、Dancer、Mojolicious、Poet、Interchange、Jifty和Gantry。同样，Web开发人员也可以选择使用多种Python
    Web框架，包括Django、Flask、Pyramid、Bottle和Cherrypy。然而，Python Web框架的数量远多于Perl Web框架的数量。


    ### 7) 用途


