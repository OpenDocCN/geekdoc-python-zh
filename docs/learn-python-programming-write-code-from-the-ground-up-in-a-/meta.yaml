    print(interviewer + '' will interview '' + applicant + '' at '' + time + ''.'')

    print(interviewer, '' will interview '', applicant, '' at '', time, ''.'', sep="")

    print(''{} will interview {} at {}.''.format(interviewer, applicant, time))

