    , SPRITE_SCALING_PLAYER)\nself.player_sprite.center_x = 50 # Starting position\n\
    self.player_sprite.center_y = 50\nself.player_list.append(self.player_sprite)\n\
    \n# Create the coins\nfor i in range(COIN_COUNT):\n\n    # Create the coin instance\n\
    \    # Coin image from kenney.nl\n    coin = arcade.Sprite(\"images/coin_01.png\"\
    , SPRITE_SCALING_COIN)\n\n    # Position the coin\n    coin.center_x = random.randrange(SCREEN_WIDTH)\n\
    \    coin.center_y = random.randrange(SCREEN_HEIGHT)\n\n    # Add the coin to\
    \ the lists\n    self.coin_list.append(coin)\n\nWe can easily draw all the coins\
    \ in the coin lists:\n\n```\ndef on_draw(self):\n    \"\"\" Draw everything \"\
    \"\"\n    arcade.start_render()\n    self.coin_list.draw()\n    self.player_list.draw()\n\
    ```\n\n### Detecting sprite collisions\n\nThe function check_for_collision_with_list\
    \ allows us to see if a sprite runs into another sprite in a list. We can use\
    \ this to see all the coins the player sprite is in contact with. Using a simple\
    \ for loop, we can get rid of the coin from the game and increase our score.\n\
    \n```\ndef update(self, delta_time):\n    # Generate a list of all coin sprites\
