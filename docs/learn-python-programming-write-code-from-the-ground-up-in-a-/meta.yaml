    # REASONS WHY THE MASSIVE POPULARITY OF PYTHON WILL REMAIN INTACT IN THE FUTURE


    # Supports Multiple Programming Paradigms


    Good developers often take advantage of different programming paradigms to reduce
    the amount of time and efforts re q uired for developing large and complex applications.
    Like other modern programming languages, Python also supports a number of commonly
    used programming styles including object-oriented, functional, procedural and
    imperative. It further features automatic memory management, along with a dynamic
    type system. So programmers can use the language to effectuate development of
    large and complex software applications.


    # Doesn''t Require Programmers to Write Lengthy Code


    Python is designed with complete focus on code readability. So the programmers
    can create readable code base that can be used by members of distributed teams.
    At the same time, the simple syntax of the programming language enables them to
    express concepts without writing longer lines of code. The feature makes it easier
    for developers to large and complex applications within a stipulated amount of
    time. As they can easily skip certain tasks required by other programming languages,
    it becomes easier for developers to maintain and update their applications.


    # Provides a Comprehensive Standard Library


    Python further scores over other programming languages due to its extensive standard
    library. The programmers can use these libraries to accomplish a variety of tasks
    without writing longer lines of code. Also, the standard library of Python is
    designed with a large number of high use programming tasks scripted into it. Thus,
    it helps programmers to accomplish tasks like string operations, development and
    implementation of web services, working with internet protocols, and handling
    operating system interface.'
- md: '## Effectuates Web Application Development


    Python is designed as a general-purpose programming language, and lacks built-in
    web development features. But the web developers use a variety of add-on modules
    to write modern web applications in Python. While writing web applications in
    Python, programmers have option to use several high-level web frameworks including
    Django, web2py, TurboGears, CubicWeb, and Reahl. These web frameworks help programmers
    to perform a number of operations, without writing additional code, like database
    manipulation, URL routing, session storage and retrieval, and output template
    formatting. They can further use the web frameworks to protect the web application
    from cross-site scripting attacks, SQL injection, and cross-site request forgery.


    ## Facilitates Development of High Quality GUI, Scientific and Numeric Applications


    Python is currently available on major operating systems like Windows, Mac OS
    X, Linux and UNIX. So the desktop GUI applications written in the programming
    language can be deployed on multiple platforms. The programmers can further speedup
    cross-platform desktop GUI application development using frameworks like Kivy,
    wxPython and PyGtk. A number of reports have highlighted that Python is used widely
    for development of numeric and scientific applications. While writing scientific
    and numeric applications in Python, the developers can take advantage of tools
    like Scipy, Pandas, IPython, along with the Python Imaging Library.


    ## Simplifies Prototyping of Applications


    Nowadays, each organization wants to beat competition by developing software with
    distinct and innovative features. That is why; prototyping has become an integral
    part of modern software development lifecycle. Before writing the code, developers
    have to create prototype of the application to display its features and functionality
    to various stakeholders. As a simple and fast programming language, Python enables
    programmers to develop the final system without putting any extra time and effort.
    At the same time, the developers also have option to start developing the system
    directly from the prototype simply by refactoring the code.


    ## Can also be used for Mobile App Development


    Frameworks like Kivy also make Python usable for developing mobile apps. As a
    library, Kivy can be used for creating both desktop applications and mobile apps.
    But it allows developers to write the code once, and deploy the same code on multiple
    platforms. Along with interfacing with the hardware of the mobile device, Kivy
    also comes with built-in camera adapters, modules to render and play videos, and
    modules to accept user input through multi-touch and gestures. Thus, programmers
    can use Kivy to create different versions of the same applications for iOS, Android
    and Windows Phone. Also, the framework does not require developers to write longer
    lines of code while creating Kivy programs. After creating different versions
    of the mobile app, they can package the app separately for individual app store.
    The option makes it easier for developers to create different versions of the
    mobile app without deploying separate developers.


    ## Open Source


    Despite being rated as the most popular coding language of 2015, Python is still
    available as open source and free software. Along with large IT companies, the
    startups and freelance software developers can also use the programming language
    without paying any fees or royalty. Thus, Python makes it easier for businesses
    to reduce development cost significantly. At the same time, the programmers can
    also avail the assistance of large and active community to add out-of-box features
    to the software application.


    The last major release of Python took place in December 2008. Python 3 was released
    as a backward-incompatible version with most of the major features back ported
    to Python 2.6 and 2.7. However, the programming language is being updated by the
    community at regular intervals. The community released Python 3.4.3 on 23rd February
    with several features and patches. So the developer can always use the most recent
    version of the Python programming language to effectuate development of various
    software applications.


    # CHAPTER 2


    ## HOW TO ACCEPT USER INPUTS AND DISPLAY OUTPUTS


    ![](img/ec3692d13e45b982b1da1fe3997bd6d1_11_0.png)


    ## The Input Function


    The hello program of The Classic First Program always does the same thing. This
    is not very interesting. Programs are only going to be reused if they can act
    on a variety of data. One way to get data is directly from the user. Modify the
    hello.py program as follows in the editor, and save it with File ▸ Save As....,
    using the name hello_you.py.


    ```

    person = input(''Enter your name: '')

    print(''Hello'', person)

    ```


    Run the program. In the Shell you should see


    ```

    Enter your name:

    ```


    Follow the instruction (and press Enter). Make sure the typing cursor is in the
    Shell window, at the end of this line. After you type your response, you can see
    that the program has taken in the line you typed. That is what the built-in function
    input does: First it prints the string you give as a parameter (in this case ''Enter
    your name: ''), and then it waits for a line to be typed in, and returns the string
    of characters you typed. In the hello_you.py program this value is assigned to
    the variable person, for use later.


    The parameter inside the parentheses after input is important. It is a prompt,
    prompting you that keyboard input is expected at that point, and hopefully indicating
    what is being requested. Without the prompt, the user would not know what was
    happening, and the computer would just sit there waiting!


    Open the example program, interview.py. Before running it (with any made-up data),
    see if you can figure out what it will do:


    ```

    """Illustrate input and print."""


    applicant = input("Enter the applicant''s name: ")

    interviewer = input("Enter the interviewer''s name: ")

    time = input("Enter the appointment time: ")

    print(interviewer, "will interview", applicant, "at", time)

    ```


    The statements are executed in the order they appear in the text of the program:
    sequentially. This is the simplest way for the execution of the program to flow.
    You will see instructions later that alter that natural flow.


    If we want to reload and modify the hello_you.py program to put an exclamation
    point at the end, you could try:


    ```

    person = input(''Enter your name: '')

    print(''Hello'', person, ''!'')

    ```


    Run it and you see that it is not spaced right. There should be no space after
    the person''s name, but the default behavior of the print function is to have
    each field printed separated by a space. There are several ways to fix this. You
    should know one. Think about it before going on to the next section. Hint: [1]


    [1] The + operation on strings adds no extra space.


    ## 1.10.2. Print with Keyword Parameter sep


    One way to put punctuation but no space after the person in hello_you.py is to
    use the plus operator, +. Another approach is to change the default separator
    between fields in the print function. This will introduce a new syntax feature,
    keyword parameters. The print function has a keyword parameter named sep. If you
    leave it out of a call to print, as we have so far, it is set equal to a space
    by default. If you add a final field, sep="", in the print function in hello_you.py,
    you get the following example file, hello_you2.py:


    ```

    """Hello to you! Illustrates sep with empty string in print.

    """


    person = input(''Enter your name: '')

    print(''Hello '', person, ''!'', sep="")

    ```


    Try the program.


    Keyword parameters must be listed at the end of the parameter list.


    ## 1.10.3. Numbers and Strings of Digits


    Consider the following problem: Prompt the user for two numbers, and then print
    out a sentence stating the sum. For instance if the user entered 2 and 3, you
    would print ‘The sum of 2 and 3 is 5.’


    You might imagine a solution like the example file addition1.py, shown below.
    There is a problem. Can you figure it out before you try it? Hint: [2]


    ```

    """Error in addition from input."""


    x = input("Enter a number: ")

    y = input("Enter a second number: ")

    print("The sum of ", x, '' and '', y, '' is '', x+y, ''.'', sep="") #error

    ```


    End up running it in any case.


    We do not want string concatenation, but integer addition. We need integer operands.
    Briefly mentioned in Whirlwind Introduction To Types and Functions was the fact
    that we can use type names as functions to convert types. One approach would be
    to do that. Further variable names are also introduced in the example addition2.py
    file below to emphasize the distinctions in types. Read and run:


    ```

    """Conversion of strings to int before addition"""


    xString = input("Enter a number: ")

    x = int(xString)

    yString = input("Enter a second number: ")

    ```'
  mdcn: '## 促进 Web 应用程序开发


    Python 被设计为一种通用编程语言，本身并不内置 Web 开发功能。但 Web 开发者可以使用各种附加模块，用 Python 编写现代 Web 应用程序。在用
    Python 编写 Web 应用程序时，程序员可以选择使用多种高级 Web 框架，包括 Django、web2py、TurboGears、CubicWeb
    和 Reahl。这些 Web 框架帮助程序员执行许多操作，无需编写额外代码，例如数据库操作、URL 路由、会话存储与检索，以及输出模板格式化。他们还可以进一步利用这些
    Web 框架来保护 Web 应用程序免受跨站脚本攻击、SQL 注入和跨站请求伪造的侵害。


    ## 促进高质量 GUI、科学和数值应用程序的开发


    Python 目前可在 Windows、Mac OS X、Linux 和 UNIX 等主要操作系统上运行。因此，用该编程语言编写的桌面 GUI 应用程序可以部署在多个平台上。程序员还可以使用
    Kivy、wxPython 和 PyGtk 等框架来加速跨平台桌面 GUI 应用程序的开发。许多报告指出，Python 被广泛用于开发数值和科学应用程序。在用
    Python 编写科学和数值应用程序时，开发者可以利用 Scipy、Pandas、IPython 以及 Python Imaging Library 等工具。


    ## 简化应用程序原型设计


    如今，每个组织都希望通过开发具有独特和创新功能的软件来超越竞争对手。这就是为什么原型设计已成为现代软件开发生命周期中不可或缺的一部分。在编写代码之前，开发者必须创建应用程序的原型，以向各种利益相关者展示其特性和功能。作为一种简单快速的编程语言，Python
    使程序员能够在不投入额外时间和精力的情况下开发最终系统。同时，开发者也可以选择直接从原型开始开发系统，只需重构代码即可。


    ## 也可用于移动应用程序开发


    Kivy 等框架也使 Python 可用于开发移动应用程序。作为一个库，Kivy 可用于创建桌面应用程序和移动应用程序。但它允许开发者编写一次代码，然后将相同的代码部署到多个平台上。除了与移动设备的硬件进行交互外，Kivy
    还内置了摄像头适配器、用于渲染和播放视频的模块，以及通过多点触控和手势接受用户输入的模块。因此，程序员可以使用 Kivy 为 iOS、Android 和 Windows
    Phone 创建同一应用程序的不同版本。此外，该框架在创建 Kivy 程序时不需要开发者编写冗长的代码行。创建移动应用程序的不同版本后，他们可以为各个应用商店分别打包应用程序。这一选项使开发者更容易创建移动应用程序的不同版本，而无需部署单独的开发人员。


    ## 开源


    尽管被评为 2015 年最受欢迎的编程语言，Python 仍然作为开源和免费软件提供。除了大型 IT 公司外，初创公司和自由软件开发者也可以在不支付任何费用或版税的情况下使用该编程语言。因此，Python
    使企业更容易显著降低开发成本。同时，程序员也可以利用庞大而活跃的社区的帮助，为软件应用程序添加开箱即用的功能。


    Python 的上一个主要版本发布于 2008 年 12 月。Python 3 作为一个向后不兼容的版本发布，其大部分主要功能被移植回 Python 2.6
    和 2.7。然而，该编程语言正由社区定期更新。社区于 2 月 23 日发布了 Python 3.4.3，包含多项功能和补丁。因此，开发者始终可以使用最新版本的
    Python 编程语言来促进各种软件应用程序的开发。


    # 第 2 章


    ## 如何接受用户输入和显示输出


    ![](img/ec3692d13e45b982b1da1fe3997bd6d1_11_0.png)


    ## 输入函数


    经典入门程序中的 hello 程序总是做同样的事情。这并不十分有趣。只有当程序能够处理各种数据时，才会被重用。获取数据的一种方式是直接从用户那里获取。在编辑器中按如下方式修改
    hello.py 程序，并使用“文件 ▸ 另存为...”将其保存为 hello_you.py。


    ```

    person = input(''Enter your name: '')

    print(''Hello'', person)

    ```


    运行该程序。在 Shell 中，你应该会看到


    ```

    Enter your name:

    ```


    按照指示操作（并按回车键）。确保输入光标位于 Shell 窗口中该行的末尾。输入你的响应后，你可以看到程序已经接收了你输入的那一行。这就是内置函数 input
    的作用：首先它打印你作为参数提供的字符串（在本例中为 ''Enter your name: ''），然后等待输入一行文本，并返回你输入的字符字符串。在 hello_you.py
    程序中，这个值被赋给变量 person，以供后续使用。


    input 后面括号内的参数很重要。它是一个提示，提示你此时需要键盘输入，并希望说明正在请求什么内容。如果没有提示，用户将不知道发生了什么，计算机只会坐在那里等待！


    打开示例程序 interview.py。在运行它之前（使用任何虚构的数据），看看你是否能弄清楚它将做什么：


    ```

    """Illustrate input and print."""


    applicant = input("Enter the applicant''s name: ")

    interviewer = input("Enter the interviewer''s name: ")

    time = input("Enter the appointment time: ")

    print(interviewer, "will interview", applicant, "at", time)

    ```


    这些语句按照它们在程序文本中出现的顺序执行：顺序执行。这是程序执行流程最简单的方式。你稍后会看到改变这种自然流程的指令。


    如果我们想重新加载并修改 hello_you.py 程序，在末尾加上感叹号，你可以尝试：


    ```

    person = input(''Enter your name: '')

    print(''Hello'', person, ''!'')

    ```


    运行它，你会发现间距不对。人名后面不应该有空格，但 print 函数的默认行为是在每个字段之间用空格分隔打印。有几种方法可以解决这个问题。你应该知道一种。在继续下一节之前思考一下。提示：[1]


    [1] 字符串上的 + 操作不会添加额外的空格。


    ## 1.10.2. 使用关键字参数 sep 进行打印


    在 hello_you.py 中，在人名后添加标点符号但不加空格的一种方法是使用加号运算符 +。另一种方法是更改 print 函数中字段之间的默认分隔符。这将引入一个新的语法特性：关键字参数。print
    函数有一个名为 sep 的关键字参数。如果你在调用 print 时省略它，就像我们目前所做的那样，它默认被设置为空格。如果你在 hello_you.py 的
    print 函数中添加最后一个字段 sep=""，你会得到以下示例文件 hello_you2.py：


    ```

    """Hello to you! Illustrates sep with empty string in print.

    """


    person = input(''Enter your name: '')

    print(''Hello '', person, ''!'', sep="")

    ```


    试运行该程序。


    关键字参数必须列在参数列表的末尾。


    ## 1.10.3. 数字和数字字符串


    考虑以下问题：提示用户输入两个数字，然后打印出一个说明总和的句子。例如，如果用户输入 2 和 3，你应该打印 ''The sum of 2 and 3 is
    5.''。


    你可能会想象一个像示例文件 addition1.py 那样的解决方案，如下所示。这里有一个问题。在你尝试之前，你能找出问题所在吗？提示：[2]


    ```

    """Error in addition from input."""


    x = input("Enter a number: ")

    y = input("Enter a second number: ")

    print("The sum of ", x, '' and '', y, '' is '', x+y, ''.'', sep="") #error

    ```


    无论如何，最终运行它。


    我们不需要字符串连接，而是需要整数加法。我们需要整数操作数。在《类型与函数快速入门》中简要提到，我们可以使用类型名称作为函数来转换类型。一种方法就是这样做。下面的示例文件
    addition2.py 中还引入了进一步的变量名，以强调类型之间的区别。阅读并运行：


    ```

    """Conversion of strings to int before addition"""


    xString = input("Enter a number: ")

    x = int(xString)

    yString = input("Enter a second number: ")

    ```'
