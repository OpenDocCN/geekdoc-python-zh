    \ IDLE 会将当前工作目录更改为包含你的模块的目录。如果你将 `.py` 文件和数据文件都放在一个目录中，你会发现事情进展顺利。\n\n下一个最常见的错误是权限错误。这通常意味着尝试写入你没有所有权的文件，或者尝试在你没有写入权限的目录中创建文件。如果你使用的是服务器或公司拥有的计算机，这可能需要与系统管理员合作，以理清你想要做什么以及如何在不损害安全性的情况下完成它。\n\
    \n错误消息中的 `[Errno 2]` 注释是对内部操作系统错误编号的引用。有超过 100 个这样的错误编号，全部收集在名为 `errno` 的模块中。有很多不同的事情可能出错，其中许多是非常、非常模糊的情况。\n\
    \n### 文件对象上的方法\n\nPython 文件对象是我们对底层操作系统文件的视图。操作系统文件反过来又使我们能够访问特定设备。\n\nPython\
    \ 文件对象有许多操作，这些操作可以转换文件对象、从操作系统文件读取或写入，或访问有关文件对象的信息。\n\n读取。以下读取方法从操作系统文件获取数据。这些操作也可能改变\
    \ Python 文件对象的内部状态和缓冲区。例如，在文件末尾，文件对象的内部状态将被更改。最重要的是，这些方法具有从操作系统文件消耗数据的明显效果。\n\n\
    `file.read(size) → string`\n从文件 `f` 中读取多达 `size` 个字符作为单个大字符串。如果 `size` 为负数或省略，则将文件的其余部分读入单个字符串。\n\
    ```python\nfrom __future__ import print_function\ndataSource= open( \"name_addr.csv\"\
    , \"r\" )\ntheData= dataSource.read()\nfor n in theData.splitlines():\n    print(n)\n\
    dataSource.close()\n```\n\n`file.readline(size) → string`\n从文件 `f` 中读取下一行或多达 `size`\
    \ 个字符；可以读取不完整的行。如果 `size` 为负数或省略，则读取下一个完整的行。如果读取了完整的行，它包括尾随的换行符。如果文件在末尾，`f.readline()`\
    \ 返回一个零长度字符串。如果文件有一个空行，这将是一个长度为 1 的字符串，仅包含换行符。\n```python\nfrom __future__ import\
    \ print_function\ndataSource= file( \"name_addr.csv\", \"r\" )\nn= dataSource.readline()\n\
    while len(n) > 0:\n    print(n.rstrip())\n    n= dataSource.readline()\ndataSource.close()\n\
    ```\n\n`file.readlines(hint)`\n从文件 `f` 中读取下一行或从下一个 `hint` 字符中读取尽可能多的行。`hint` 大小可能会向上舍入以匹配内部缓冲区大小。如果\
    \ `hint` 为负数或省略，则读取文件的其余部分。所有行都将包括尾随的换行符。如果文件在末尾，`f.readlines()` 返回一个零长度列表。\n\n\
    当我们简单地在 `for` 语句中引用文件对象时，这就是用于迭代文件的函数。\n```python\ndataSource= file( \"name_addr.csv\"\
    , \"r\" )\nfor n in dataSource:\n```"
