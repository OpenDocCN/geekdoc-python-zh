- md: "## Creating Instance Objects\n\nTo create instances of a class, you call the\
    \ class using class name and pass in whatever arguments its `__init__` method\
    \ accepts.\n\n```\n\"This would create first object of Employee class\"\nemp1\
    \ = Employee(\"Zara\", 2000)\n\"This would create second object of Employee class\"\
    \nemp2 = Employee(\"Manni\", 5000)\n```\n\n## Accessing Attributes\n\nYou access\
    \ the object's attributes using the dot operator with object. Class variable would\
    \ be accessed using class name as follows –\n\n```\nemp1.displayEmployee()\nemp2.displayEmployee()\n\
    print \"Total Employee %d\" % Employee.empCount\n```\n\nNow, putting all the concepts\
    \ together:\n\n```\n#!/usr/bin/python\n\nclass Employee:\n    'Common base class\
    \ for all employees'\n    empCount = 0\n\n    def __init__(self, name, salary):\n\
    \        self.name = name\n        self.salary = salary\n        Employee.empCount\
    \ += 1\n\n    def displayCount(self):\n        print \"Total Employee %d\" % Employee.empCount\n\
    \n    def displayEmployee(self):\n        print \"Name : \", self.name,  \", Salary:\
    \ \", self.salary\n```\n\n\"This would create first object of Employee class\"\
    \nemp1 = Employee(\"Zara\", 2000)\n\"This would create second object of Employee\
    \ class\"\nemp2 = Employee(\"Manni\", 5000)\nemp1.displayEmployee()\nemp2.displayEmployee()\n\
    print \"Total Employee %d\" % Employee.empCount\n\nWhen the above code is executed,\
    \ it produces the following result –\n\n```\nName :  Zara ,Salary:  2000\nName\
    \ :  Manni ,Salary:  5000\nTotal Employee 2\n```\n\nYou can add, remove, or modify\
    \ attributes of classes and objects at any time –\n\n```\nemp1.age = 7  # Add\
    \ an 'age' attribute.\nemp1.age = 8  # Modify 'age' attribute.\ndel emp1.age \
    \ # Delete 'age' attribute.\n```\n\nInstead of using the normal statements to\
    \ access attributes, you can use the following functions –\n\nThe `getattr(obj,\
    \ name[, default])` – to access the attribute of object.\n\nThe `hasattr(obj,\
    \ name)` – to check if an attribute exists or not.\n\nThe `setattr(obj, name,\
    \ value)` – to set an attribute. If attribute does not exist, then it would be\
    \ created.\n\nThe `delattr(obj, name)` – to delete an attribute.\n\n```\nhasattr(emp1,\
    \ 'age')   # Returns true if 'age' attribute exists\ngetattr(emp1, 'age')   #\
    \ Returns value of 'age' attribute\nsetattr(emp1, 'age', 8) # Set attribute 'age'\
    \ at 8\ndelattr(emp1, 'age')   # Delete attribute 'age'\n```\n\n## Built-In Class\
    \ Attributes\n\nEvery Python class keeps following built-in attributes and they\
    \ can be accessed using dot operator like any other attribute –\n\n`__dict__`\
    \ – Dictionary containing the class's namespace.\n\n`__doc__` – Class documentation\
    \ string or none, if undefined.\n\n`__name__` – Class name.\n\n`__module__` –\
    \ Module name in which the class is defined. This attribute is `\"__main__\"`\
    \ in interactive mode.\n\n`__bases__` – A possibly empty tuple containing the\
    \ base classes, in the order of their occurrence in the base class list.\n\nFor\
    \ the above class let us try to access all these attributes:\n\n```\n#!/usr/bin/python\n\
    \nclass Employee:\n    'Common base class for all employees'\n    empCount = 0\n\
    \n    def __init__(self, name, salary):\n        self.name = name\n        self.salary\
    \ = salary\n        Employee.empCount += 1\n\n    def displayCount(self):\n  \
    \      print \"Total Employee %d\" % Employee.empCount\n\n    def displayEmployee(self):\n\
    \        print \"Name : \", self.name,  \", Salary: \", self.salary\n```\n\n```\n\
    print \"Employee.__doc__:\", Employee.__doc__\nprint \"Employee.__name__:\", Employee.__name__\n\
    print \"Employee.__module__:\", Employee.__module__\nprint \"Employee.__bases__:\"\
    , Employee.__bases__\nprint \"Employee.__dict__:\", Employee.__dict__\n```\n\n\
    When the above code is executed, it produces the following result –\n\n```\nEmployee.__doc__:\
    \ Common base class for all employees\nEmployee.__name__: Employee\nEmployee.__module__:\
    \ __main__\nEmployee.__bases__: ()\nEmployee.__dict__: {'__module__': '__main__',\
    \ 'displayCount': <function displayCount at 0xb7c84994>, 'empCount': 2, 'displayEmployee':\
    \ <function displayEmployee at 0xb7c8441c>, '__doc__': 'Common base class for\
    \ all employees', '__init__': <function __init__ at 0xb7c846bc>}\n```\n\n## Destroying\
    \ Objects (Garbage Collection)\n\nPython deletes unneeded objects (built-in types\
    \ or class instances) automatically to free the memory space. The process by which\
    \ Python periodically reclaims blocks of memory that no longer are in use is termed\
    \ Garbage Collection.\n\nPython's garbage collector runs during program execution\
    \ and is triggered when an object's reference count reaches zero. An object's\
    \ reference count changes as the number of aliases that point to it changes.\n\
    \nAn object's reference count increases when it is assigned a new name or placed\
    \ in a container (list, tuple, or dictionary). The object's reference count decreases\
    \ when it's deleted with `del`, its reference is reassigned, or its reference\
    \ goes out of scope. When an object's reference count reaches zero, Python collects\
    \ it automatically.\n\n```\na = 40    # Create object <40>\nb = a     # Increase\
    \ ref. count  of <40>\nc = [b]   # Increase ref. count  of <40>\n```\n\n```\n\
    del a     # Decrease ref. count  of <40>\nb = 100   # Decrease ref. count  of\
    \ <40>\nc[0] = -1 # Decrease ref. count  of <40>\n```\n\nYou normally will not\
    \ notice when the garbage collector destroys an orphaned instance and reclaims\
    \ its space. But a class can implement the special method `__del__()`, called\
    \ a destructor, that is invoked when the instance is about to be destroyed. This\
    \ method might be used to clean up any non memory resources used by an instance.\n\
    \n## Example\n\nThis `__del__()` destructor prints the class name of an instance\
    \ that is about to be destroyed –\n\n```\n#!/usr/bin/python\n\nclass Point:\n\
    \    def __init__( self, x=0, y=0):\n        self.x = x\n        self.y = y\n\
    \    def __del__(self):\n        class_name = self.__class__.__name__\n      \
    \  print class_name, \"destroyed\"\n```\n\n```\npt1 = Point()\npt2 = pt1\npt3\
    \ = pt1\nprint id(pt1), id(pt2), id(pt3) # prints the ids of the objects\ndel\
    \ pt1\ndel pt2\ndel pt3\n```\n\nWhen the above code is executed, it produces following\
    \ result –\n\n```\n3083401324 3083401324 3083401324\nPoint destroyed\n```\n\n\
    Note – Ideally, you should define your classes in separate file, then you should\
    \ import them in your main program file using import statement.\n\n## Class Inheritance\n\
    \nInstead of starting from scratch, you can create a class by deriving it from\
    \ a preexisting class by listing the parent class in parentheses after the new\
    \ class name.\n\nThe child class inherits the attributes of its parent class,\
    \ and you can use those attributes as if they were defined in the child class.\
    \ A child class can also override data members and methods from the parent.\n\n\
    ## Syntax\n\nDerived classes are declared much like their parent class; however,\
    \ a list of base classes to inherit from is given after the class name –\n\n```\n\
    class SubClassName (ParentClass1[, ParentClass2, ...]):\n    'Optional class documentation\
    \ string'\n    class_suite\n```\n\n```\n#!/usr/bin/python\n\nclass Parent:   \
    \    # define parent class\n    parentAttr = 100\n    def __init__(self):\n  \
    \      print \"Calling parent constructor\"\n\n    def parentMethod(self):\n \
    \       print 'Calling parent method'\n\n    def setAttr(self, attr):\n      \
    \  Parent.parentAttr = attr\n\n    def getAttr(self):\n        print \"Parent\
    \ attribute :\", Parent.parentAttr\n\nclass Child(Parent): # define child class\n\
    \    def __init__(self):\n        print \"Calling child constructor\"\n\n    def\
    \ childMethod(self):\n        print 'Calling child method'\n```\n\n```\nc = Child()\
    \        # instance of child\nc.childMethod()    # child calls its method\nc.parentMethod()\
    \   # calls parent's method\nc.setAttr(200)     # again call parent's method\n\
    c.getAttr()        # again call parent's method\n```\n\nWhen the above code is\
    \ executed, it produces the following result –\n\n```\nCalling child constructor\n\
    Calling child method\nCalling parent method\nParent attribute : 200\n```\n\nSimilar\
    \ way, you can drive a class from multiple parent classes as follows –\n\n```\n\
    class A:       # define your class A\n......\n\nclass B:       # define your class\
    \ B\n......\n\nclass C(A, B): # subclass of A and B\n......\n```\n\nYou can use\
    \ `issubclass()` or `isinstance()` functions to check a relationships of two classes\
    \ and instances.\n\nThe `issubclass(sub, sup)` boolean function returns true if\
    \ the given subclass `sub` is indeed a subclass of the superclass `sup`."
  mdcn: "## 创建实例对象\n\n要创建类的实例，你需要使用类名调用该类，并传入其`__init__`方法所接受的任何参数。\n\n```\n\"这将创建Employee类的第一个对象\"\
    \nemp1 = Employee(\"Zara\", 2000)\n\"这将创建Employee类的第二个对象\"\nemp2 = Employee(\"\
    Manni\", 5000)\n```\n\n## 访问属性\n\n你可以使用点运算符配合对象来访问对象的属性。类变量则可以使用类名来访问，如下所示：\n\n\
    ```\nemp1.displayEmployee()\nemp2.displayEmployee()\nprint \"Total Employee %d\"\
    \ % Employee.empCount\n```\n\n现在，将所有概念整合在一起：\n\n```\n#!/usr/bin/python\n\nclass\
    \ Employee:\n    'Common base class for all employees'\n    empCount = 0\n\n \
    \   def __init__(self, name, salary):\n        self.name = name\n        self.salary\
    \ = salary\n        Employee.empCount += 1\n\n    def displayCount(self):\n  \
    \      print \"Total Employee %d\" % Employee.empCount\n\n    def displayEmployee(self):\n\
    \        print \"Name : \", self.name,  \", Salary: \", self.salary\n```\n\n\"\
    这将创建Employee类的第一个对象\"\nemp1 = Employee(\"Zara\", 2000)\n\"这将创建Employee类的第二个对象\"\
    \nemp2 = Employee(\"Manni\", 5000)\nemp1.displayEmployee()\nemp2.displayEmployee()\n\
    print \"Total Employee %d\" % Employee.empCount\n\n执行上述代码后，会产生以下结果：\n\n```\nName\
    \ :  Zara ,Salary:  2000\nName :  Manni ,Salary:  5000\nTotal Employee 2\n```\n\
    \n你可以随时添加、删除或修改类和对象的属性：\n\n```\nemp1.age = 7  # 添加一个'age'属性。\nemp1.age = 8  #\
    \ 修改'age'属性。\ndel emp1.age  # 删除'age'属性。\n```\n\n除了使用常规语句访问属性外，你还可以使用以下函数：\n\n\
    `getattr(obj, name[, default])` – 用于访问对象的属性。\n\n`hasattr(obj, name)` – 用于检查属性是否存在。\n\
    \n`setattr(obj, name, value)` – 用于设置属性。如果属性不存在，则会被创建。\n\n`delattr(obj, name)`\
    \ – 用于删除属性。\n\n```\nhasattr(emp1, 'age')   # 如果'age'属性存在则返回true\ngetattr(emp1,\
    \ 'age')   # 返回'age'属性的值\nsetattr(emp1, 'age', 8) # 将属性'age'设置为8\ndelattr(emp1,\
    \ 'age')   # 删除属性'age'\n```\n\n## 内置类属性\n\n每个Python类都保留以下内置属性，它们可以像其他属性一样使用点运算符访问：\n\
    \n`__dict__` – 包含类命名空间的字典。\n\n`__doc__` – 类的文档字符串，如果未定义则为None。\n\n`__name__` –\
    \ 类名。\n\n`__module__` – 定义类的模块名。在交互模式下，此属性为`\"__main__\"`。\n\n`__bases__` – 一个可能为空的元组，包含基类，按其在基类列表中出现的顺序排列。\n\
    \n对于上面的类，让我们尝试访问所有这些属性：\n\n```\n#!/usr/bin/python\n\nclass Employee:\n    'Common\
    \ base class for all employees'\n    empCount = 0\n\n    def __init__(self, name,\
    \ salary):\n        self.name = name\n        self.salary = salary\n        Employee.empCount\
    \ += 1\n\n    def displayCount(self):\n        print \"Total Employee %d\" % Employee.empCount\n\
    \n    def displayEmployee(self):\n        print \"Name : \", self.name,  \", Salary:\
    \ \", self.salary\n```\n\n```\nprint \"Employee.__doc__:\", Employee.__doc__\n\
    print \"Employee.__name__:\", Employee.__name__\nprint \"Employee.__module__:\"\
    , Employee.__module__\nprint \"Employee.__bases__:\", Employee.__bases__\nprint\
    \ \"Employee.__dict__:\", Employee.__dict__\n```\n\n执行上述代码后，会产生以下结果：\n\n```\n\
    Employee.__doc__: Common base class for all employees\nEmployee.__name__: Employee\n\
    Employee.__module__: __main__\nEmployee.__bases__: ()\nEmployee.__dict__: {'__module__':\
    \ '__main__', 'displayCount': <function displayCount at 0xb7c84994>, 'empCount':\
    \ 2, 'displayEmployee': <function displayEmployee at 0xb7c8441c>, '__doc__': 'Common\
    \ base class for all employees', '__init__': <function __init__ at 0xb7c846bc>}\n\
    ```\n\n## 销毁对象（垃圾回收）\n\nPython会自动删除不再需要的对象（内置类型或类实例）以释放内存空间。Python定期回收不再使用的内存块的过程被称为垃圾回收。\n\
    \nPython的垃圾回收器在程序执行期间运行，并在对象的引用计数达到零时触发。对象的引用计数会随着指向它的别名数量的变化而变化。\n\n当对象被赋予新名称或放入容器（列表、元组或字典）时，其引用计数会增加。当对象被`del`删除、其引用被重新赋值或其引用超出作用域时，其引用计数会减少。当对象的引用计数达到零时，Python会自动回收它。\n\
    \n```\na = 40    # 创建对象 <40>\nb = a     # 增加 <40> 的引用计数\nc = [b]   # 增加 <40> 的引用计数\n\
    ```\n\n```\ndel a     # 减少 <40> 的引用计数\nb = 100   # 减少 <40> 的引用计数\nc[0] = -1 #\
    \ 减少 <40> 的引用计数\n```\n\n通常，你不会注意到垃圾回收器何时销毁一个孤立的实例并回收其空间。但是，一个类可以实现特殊方法`__del__()`，称为析构函数，该方法在实例即将被销毁时被调用。此方法可用于清理实例使用的任何非内存资源。\n\
    \n## 示例\n\n这个`__del__()`析构函数会打印即将被销毁的实例的类名：\n\n```\n#!/usr/bin/python\n\nclass\
    \ Point:\n    def __init__( self, x=0, y=0):\n        self.x = x\n        self.y\
    \ = y\n    def __del__(self):\n        class_name = self.__class__.__name__\n\
    \        print class_name, \"destroyed\"\n```\n\n```\npt1 = Point()\npt2 = pt1\n\
    pt3 = pt1\nprint id(pt1), id(pt2), id(pt3) # 打印对象的id\ndel pt1\ndel pt2\ndel pt3\n\
    ```\n\n执行上述代码后，会产生以下结果：\n\n```\n3083401324 3083401324 3083401324\nPoint destroyed\n\
    ```\n\n注意 – 理想情况下，你应该在单独的文件中定义你的类，然后使用import语句在主程序文件中导入它们。\n\n## 类继承\n\n你可以通过从一个预先存在的类派生来创建一个类，而不是从头开始，方法是在新类名后的括号中列出父类。\n\
    \n子类继承其父类的属性，你可以像在子类中定义的那样使用这些属性。子类也可以覆盖父类的数据成员和方法。\n\n## 语法\n\n派生类的声明方式与父类类似；但是，在类名之后给出了要继承的基类列表：\n\
    \n```\nclass SubClassName (ParentClass1[, ParentClass2, ...]):\n    'Optional\
    \ class documentation string'\n    class_suite\n```\n\n```\n#!/usr/bin/python\n\
    \nclass Parent:       # 定义父类\n    parentAttr = 100\n    def __init__(self):\n\
    \        print \"Calling parent constructor\"\n\n    def parentMethod(self):\n\
    \        print 'Calling parent method'\n\n    def setAttr(self, attr):\n     \
    \   Parent.parentAttr = attr\n\n    def getAttr(self):\n        print \"Parent\
    \ attribute :\", Parent.parentAttr\n\nclass Child(Parent): # 定义子类\n    def __init__(self):\n\
    \        print \"Calling child constructor\"\n\n    def childMethod(self):\n \
    \       print 'Calling child method'\n```\n\n```\nc = Child()        # 子类的实例\n\
    c.childMethod()    # 子类调用其方法\nc.parentMethod()   # 调用父类的方法\nc.setAttr(200)   \
    \  # 再次调用父类的方法\nc.getAttr()        # 再次调用父类的方法\n```\n\n执行上述代码后，会产生以下结果：\n\n```\n\
    Calling child constructor\nCalling child method\nCalling parent method\nParent\
    \ attribute : 200\n```\n\n类似地，你可以从多个父类派生一个类，如下所示：\n\n```\nclass A:       # 定义你的类A\n\
    ......\n\nclass B:       # 定义你的类B\n......\n\nclass C(A, B): # A和B的子类\n......\n\
    ```\n\n你可以使用`issubclass()`或`isinstance()`函数来检查两个类和实例之间的关系。\n\n`issubclass(sub,\
    \ sup)`布尔函数在给定的子类`sub`确实是超类`sup`的子类时返回true。"
