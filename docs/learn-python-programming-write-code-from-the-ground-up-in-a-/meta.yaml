    # LOGISTIC REGRESSION WITH L2 REGULARIZATION IN PYTHON


    ![](img/ec3692d13e45b982b1da1fe3997bd6d1_106_0.png)


    Logistic regression is used for binary classification problems -- where you have
    some examples that are "on" and other examples that are "off." You get as input
    a training set; which has some examples of each class along with a label saying
    whether each example is "on" or "off". The goal is to learn a model from the training
    data so that you can predict the label of new examples that you haven''t seen
    before and don''t know the label of.


    For one example, suppose that you have data describing a bunch of buildings and
    earth q uakes (E.g., year the building was constructed, type of material used,
    strength of earthquake,etc), and you know whether each building collapsed ("on")
    or not ("off") in each past earthquake. Using this data, you''d like to make predictions
    about whether a given building is going to collapse in a hypothetical future earth
    q uake.'
  merge: -1
