- md: "## Overriding Methods\n\nYou can always override your parent class methods.\
    \ One reason for overriding parent's methods is because you may want special or\
    \ different functionality in your subclass.\n\n## Example\n\n```python\n#!/usr/bin/python\n\
    \nclass Parent:       # define parent class\n    def myMethod(self):\n       \
    \ print 'Calling parent method'\n\nclass Child(Parent): # define child class\n\
    \    def myMethod(self):\n        print 'Calling child method'\n\nc = Child()\
    \          # instance of child\nc.myMethod()         # child calls overridden\
    \ method\n```\n\nWhen the above code is executed, it produces the following result\
    \ –\n\n```\nCalling child method\n```\n\n## Base Overloading Methods\n\nFollowing\
    \ table lists some generic functionality that you can override in your own classes\
    \ –\n\n| Sr.No. | Method, Description & Sample Call |\n| :--- | :--- |\n| 1 |\
    \ `__init__` ( self [,args...] )<br>Constructor (with any optional arguments)<br>Sample\
    \ Call : obj = className(args) |\n| 2 | `__del__`( self )<br>Destructor, deletes\
    \ an object<br>Sample Call : del obj |\n| 3 | `__repr__`( self )<br>Evaluable\
    \ string representation<br>Sample Call : repr(obj) |\n| 4 | `__str__`( self )<br>Printable\
    \ string representation<br>Sample Call : str(obj) |\n| 5 | `__cmp__` ( self, x\
    \ )<br>Object comparison<br>Sample Call : cmp(obj, x) |\n\n## Overloading Operators\n\
    \nSuppose you have created a Vector class to represent two-dimensional vectors,\
    \ what happens when you use the plus operator to add them? Most likely Python\
    \ will yell at you.\n\nYou could, however, define the `__add__` method in your\
    \ class to perform vector addition and then the plus operator would behave as\
    \ per expectation –\n\n## Example\n\n```python\n#!/usr/bin/python\n\nclass Vector:\n\
    \    def __init__(self, a, b):\n        self.a = a\n        self.b = b\n\n   \
    \ def __str__(self):\n        return 'Vector (%d, %d)' % (self.a, self.b)\n\n\
    \    def __add__(self,other):\n        return Vector(self.a + other.a, self.b\
    \ + other.b)\n\nv1 = Vector(2,10)\nv2 = Vector(5,-2)\nprint v1 + v2\n```\n\nWhen\
    \ the above code is executed, it produces the following result –\n\n```\nVector(7,8)\n\
    ```\n\n## Data Hiding\n\nAn object's attributes may or may not be visible outside\
    \ the class definition. You need to name attributes with a double underscore prefix,\
    \ and those attributes then are not be directly visible to outsiders.\n\n## Example\n\
    \n```python\n#!/usr/bin/python\n\nclass JustCounter:\n    __secretCount = 0\n\n\
    \    def count(self):\n        self.__secretCount += 1\n        print self.__secretCount\n\
    \ncounter = JustCounter()\ncounter.count()\ncounter.count()\nprint counter.__secretCount\n\
    ```\n\nWhen the above code is executed, it produces the following result –\n\n\
    ```\n1\n2\nTraceback (most recent call last):\n  File \"test.py\", line 12, in\
    \ <module>\n    print counter.__secretCount\nAttributeError: JustCounter instance\
    \ has no attribute '__secretCount'\n```\n\nPython protects those members by internally\
    \ changing the name to include the class name. You can access such attributes\
    \ as `object._className__attrName`. If you would replace your last line as following,\
    \ then it works for you –\n\n```python\nprint counter._JustCounter__secretCount\n\
    ```\n\n# CHAPTER 5\n\n## HOW TO WORK WITH EXTERNAL FILES\n\nAll programs must\
    \ deal with external data. They will either accept data from sources outside the\
    \ text of the program, or they will produce some kind of output, or they will\
    \ do both. Think about it: if the program produces no output, how do you know\
    \ it did anything?\n\nBy external data, we mean data outside of volatile, high-speed,\
    \ primary memory; we mean data on peripheral devices. This may be persistent data\
    \ on a disk, or transient data on a network interface. For now, it may mean transient\
    \ data displayed on our terminal.\n\nMost operating systems provide simple, uniform\
    \ access to external data via the abstraction called a file. We'll look at the\
    \ operating system implementation, as well as the Python class that gives us access\
    \ to the operating system file in our programs.\n\nIn File Objects – Our Connection\
    \ To The File System, we provide definitions of how Python works with files. We\
    \ cover the built-in functions for working with files in The File and Open Functions.\
    \ In Methods We Use on File Objects, we describe some method functions of file\
    \ objects. We'll look at file-processing statements in File Statements: Reading\
    \ and Writing (but no Arithmetic).\n\n## File Objects – Our Connection To The\
    \ File System\n\nAbstractions Built on Top of Abstractions. Files do a huge number\
    \ of things for us. To support this broad spectrum of capabilities, there are\
    \ two layers of abstraction involved: the OS and Python. Unfortunately, both layers\
    \ use the same words, so we have to be careful about casually misusing the word\
    \ “file”.\n\nThe operating system has devices of various kinds. All of the various\
    \ devices are unified using a common abstraction that we call the file system.\
    \ All of a computer's devices appear as OS files of one kind or another. Some\
    \ things which aren't physical devices also appear as files. Files are the plumbing\
    \ that move data around our information infrastructure.\n\nAdditionally, Python\
    \ defines file objects. These file objects are the fixtures that give our Python\
    \ program access to OS files.\n\n## Python File and OS File\n\nHow Files Work.\
    \ When your program evaluates a method function of a Python file object, Python\
    \ transforms this into an operation on the underlying OS file. An OS file operation\
    \ becomes an operation on one of the various kinds of devices attached to our\
    \ computer. Or, a OS file operation can become a network operation that reaches\
    \ through the Internet to access data from remote computers. The two layers of\
    \ abstraction mean that one Python program can do a wide variety of things on\
    \ a wide variety of devices.\n\n## Python File Objects\n\nIn Python, we create\
    \ a file object to work with files in the file system. In addition to files in\
    \ the OS’s file system, Python recognizes a spectrum of file-like objects, including\
    \ abstractions for network interfaces called pipes and sockets and even some kind\
    \ of in-memory buffers.\n\nUnlike sequences, sets and mappings, there are no Python\
    \ literals for file objects. Lacking literals, we create a file object using the\
    \ `file()` or `open()` factory function. We provide two pieces of information\
    \ to this function. We can provide a third, optional, piece of information that\
    \ may improve the performance of our program.\n\nThe name of the file. The operating\
    \ system will interpret this name using its “working directory” rules. If the\
    \ name starts with `/` (or `device:\\`) it’s an absolute name. Otherwise, it’s\
    \ a relative name; the current working directory plus this name identifies the\
    \ file.\n\nPython can translate standard paths (using `/`) to Windows-specific\
    \ paths. This saves us from having to really understand the differences. We can\
    \ name all of our files using `/`, and avoid the messy details.\n\nWe can, if\
    \ we want, use raw strings to specify Windows path names using the `\\` character.\n\
    \nThe access mode for the file. This is some combination of read, write and append.\
    \ The mode can also include instructions for interpreting the bytes as characters.\n\
    \nOptionally, we can include the buffering for the file. Generally, we omit this.\
    \ If the buffering argument is given, 0 means each byte is transferred as it is\
    \ read or written. A value of 1 means the data is buffered a line at a time, suitable\
    \ for reading from a console, or writing to an error log. Larger numbers specify\
    \ the buffer size: numbers over 4,096 may speed up your program.\n\nOnce we create\
    \ the file object, we can do operations to read characters from the file or write\
    \ characters to the file. We can read individual characters or whole lines. Similarly,\
    \ we can write individual characters or whole lines.\n\nWhen Python reads a file\
    \ as a sequence of lines, each line will become a separate string. The `'\\n'`\
    \ character is preserved at the end of the string. This extra character can be\
    \ removed from the string using the `rstrip()` method function.\n\nA file object\
    \ (like a sequence) can create an iterator which will yield the individual lines\
    \ of the file. You can, consequently, use the file object in a `for` statement.\
    \ This makes reading text files very simple.\n\nWhen the work is finished, we\
    \ also need to use the file's `close()` method. This empties the in-memory buffers\
    \ and releases the connection with the operating system file. In the case of a\
    \ socket connection, this will release all of the resources used to assure that\
    \ data travels through the Internet successfully.\n\n## The File and Open Functions\n\
    \nHere's the formal definition of the `file()` and `open()` factory functions.\
    \ These functions create Python file objects and connect them to the appropriate\
    \ operating system resources.\n\n```\nopen(filename, mode[, buffering]) → file\n\
    ```\n\nThe filename is the name of the file. This is simply given to the operating\
    \ system. The OS expects either absolute or relative paths; the operating system\
    \ folds in the current working directory to relative paths.\n\nThe mode is covered\
    \ in detail below. In can be `'r'`, `'w'` or `'a'` for reading (default), writing\
    \ or appending. If the file doesn't exist when opened for writing or appending,\
    \ it will be created. If a file existed when opened for writing, it will be truncated\
    \ and overwritten. Add a `'b'` to the mode"
  mdcn: "## 方法重写\n\n你总是可以重写父类的方法。重写父类方法的一个原因可能是，你希望在子类中实现特殊或不同的功能。\n\n## 示例\n\n```python\n\
    #!/usr/bin/python\n\nclass Parent:       # 定义父类\n    def myMethod(self):\n   \
    \     print 'Calling parent method'\n\nclass Child(Parent): # 定义子类\n    def myMethod(self):\n\
    \        print 'Calling child method'\n\nc = Child()          # 子类的实例\nc.myMethod()\
    \         # 子类调用重写的方法\n```\n\n当执行上述代码时，会产生以下结果 –\n\n```\nCalling child method\n\
    ```\n\n## 基类重载方法\n\n下表列出了一些你可以在自己的类中重写的通用功能 –\n\n| 序号 | 方法、描述与示例调用 |\n| :--- |\
    \ :--- |\n| 1 | `__init__` ( self [,args...] )<br>构造函数（可带任意可选参数）<br>示例调用 : obj\
    \ = className(args) |\n| 2 | `__del__`( self )<br>析构函数，删除一个对象<br>示例调用 : del obj\
    \ |\n| 3 | `__repr__`( self )<br>可求值的字符串表示<br>示例调用 : repr(obj) |\n| 4 | `__str__`(\
    \ self )<br>可打印的字符串表示<br>示例调用 : str(obj) |\n| 5 | `__cmp__` ( self, x )<br>对象比较<br>示例调用\
    \ : cmp(obj, x) |\n\n## 运算符重载\n\n假设你创建了一个 `Vector` 类来表示二维向量，当你使用加号运算符将它们相加时会发生什么？Python\
    \ 很可能会报错。\n\n然而，你可以在类中定义 `__add__` 方法来执行向量加法，这样加号运算符就会按预期工作 –\n\n## 示例\n\n```python\n\
    #!/usr/bin/python\n\nclass Vector:\n    def __init__(self, a, b):\n        self.a\
    \ = a\n        self.b = b\n\n    def __str__(self):\n        return 'Vector (%d,\
    \ %d)' % (self.a, self.b)\n\n    def __add__(self,other):\n        return Vector(self.a\
    \ + other.a, self.b + other.b)\n\nv1 = Vector(2,10)\nv2 = Vector(5,-2)\nprint\
    \ v1 + v2\n```\n\n当执行上述代码时，会产生以下结果 –\n\n```\nVector(7,8)\n```\n\n## 数据隐藏\n\n对象的属性可能在类定义外部可见，也可能不可见。你需要用双下划线前缀来命名属性，这样这些属性就不会被外部直接访问。\n\
    \n## 示例\n\n```python\n#!/usr/bin/python\n\nclass JustCounter:\n    __secretCount\
    \ = 0\n\n    def count(self):\n        self.__secretCount += 1\n        print\
    \ self.__secretCount\n\ncounter = JustCounter()\ncounter.count()\ncounter.count()\n\
    print counter.__secretCount\n```\n\n当执行上述代码时，会产生以下结果 –\n\n```\n1\n2\nTraceback\
    \ (most recent call last):\n  File \"test.py\", line 12, in <module>\n    print\
    \ counter.__secretCount\nAttributeError: JustCounter instance has no attribute\
    \ '__secretCount'\n```\n\nPython 通过内部更改名称（包含类名）来保护这些成员。你可以通过 `object._className__attrName`\
    \ 的方式访问此类属性。如果你将最后一行替换为以下内容，它就能正常工作 –\n\n```python\nprint counter._JustCounter__secretCount\n\
    ```\n\n# 第五章\n\n## 如何处理外部文件\n\n所有程序都必须处理外部数据。它们要么从程序文本之外的源接收数据，要么产生某种输出，或者两者兼而有之。想一想：如果程序不产生任何输出，你怎么知道它做了什么？\n\
    \n我们所说的外部数据，是指位于易失性、高速主存储器之外的数据；我们指的是外围设备上的数据。这可能是磁盘上的持久数据，也可能是网络接口上的临时数据。目前，它可能指的是显示在我们终端上的临时数据。\n\
    \n大多数操作系统通过称为文件的抽象概念，提供对简单、统一的外部数据访问。我们将研究操作系统的实现，以及在程序中为我们提供操作系统文件访问的 Python\
    \ 类。\n\n在《文件对象——我们与文件系统的连接》中，我们提供了 Python 如何处理文件的定义。我们在《文件和打开函数》中介绍了处理文件的内置函数。在《我们在文件对象上使用的方法》中，我们描述了文件对象的一些方法函数。我们将在《文件语句：读写（但不进行算术运算）》中查看文件处理语句。\n\
    \n## 文件对象——我们与文件系统的连接\n\n建立在抽象之上的抽象。文件为我们做了大量的事情。为了支持这种广泛的功能，涉及两个抽象层：操作系统和 Python。不幸的是，这两层使用相同的术语，因此我们必须小心不要随意误用“文件”这个词。\n\
    \n操作系统有各种类型的设备。所有这些不同的设备都使用我们称为文件系统的通用抽象统一起来。计算机的所有设备都以某种操作系统文件的形式出现。一些不是物理设备的东西也以文件的形式出现。文件是在我们的信息基础设施中传输数据的管道。\n\
    \n此外，Python 定义了文件对象。这些文件对象是让我们的 Python 程序访问操作系统文件的装置。\n\n## Python 文件与操作系统文件\n\
    \n文件的工作原理。当你的程序评估 Python 文件对象的方法函数时，Python 会将其转换为对底层操作系统文件的操作。操作系统文件操作会变成对我们计算机上连接的各种设备之一的操作。或者，操作系统文件操作可以变成一个网络操作，通过互联网访问远程计算机的数据。这两层抽象意味着一个\
    \ Python 程序可以在各种设备上执行各种各样的操作。\n\n## Python 文件对象\n\n在 Python 中，我们创建一个文件对象来处理文件系统中的文件。除了操作系统文件系统中的文件外，Python\
    \ 还识别一系列类文件对象，包括用于网络接口的抽象，称为管道和套接字，甚至还有一些内存缓冲区。\n\n与序列、集合和映射不同，文件对象没有 Python 字面量。由于缺少字面量，我们使用\
    \ `file()` 或 `open()` 工厂函数创建文件对象。我们向此函数提供两条信息。我们可以提供第三条可选信息，这可能会提高程序的性能。\n\n文件的名称。操作系统将使用其“工作目录”规则来解释此名称。如果名称以\
    \ `/`（或 `device:\\`）开头，则它是绝对名称。否则，它是相对名称；当前工作目录加上此名称标识该文件。\n\nPython 可以将标准路径（使用\
    \ `/`）转换为 Windows 特定路径。这使我们不必真正理解其中的差异。我们可以使用 `/` 来命名所有文件，避免繁琐的细节。\n\n如果我们愿意，可以使用原始字符串来指定使用\
    \ `\\` 字符的 Windows 路径名。\n\n文件的访问模式。这是读、写和追加的某种组合。该模式还可以包括将字节解释为字符的指令。\n\n可选地，我们可以包含文件的缓冲。通常，我们省略此项。如果给出了缓冲参数，0\
    \ 表示每个字节在读取或写入时立即传输。值为 1 表示数据按行缓冲，适用于从控制台读取或写入错误日志。更大的数字指定缓冲区大小：超过 4,096 的数字可能会加快你的程序速度。\n\
    \n一旦我们创建了文件对象，我们就可以执行操作来从文件读取字符或向文件写入字符。我们可以读取单个字符或整行。同样，我们可以写入单个字符或整行。\n\n当 Python\
    \ 将文件作为行序列读取时，每行将成为一个单独的字符串。`'\\n'` 字符保留在字符串末尾。可以使用 `rstrip()` 方法函数从字符串中删除这个额外的字符。\n\
    \n文件对象（像序列一样）可以创建一个迭代器，该迭代器将生成文件的各个行。因此，你可以在 `for` 语句中使用文件对象。这使得读取文本文件变得非常简单。\n\
    \n工作完成后，我们还需要使用文件的 `close()` 方法。这会清空内存缓冲区并释放与操作系统文件的连接。在套接字连接的情况下，这将释放用于确保数据通过互联网成功传输的所有资源。\n\
    \n## 文件和打开函数\n\n以下是 `file()` 和 `open()` 工厂函数的正式定义。这些函数创建 Python 文件对象并将其连接到适当的操作系统资源。\n\
    \n```\nopen(filename, mode[, buffering]) → file\n```\n\nfilename 是文件的名称。这直接交给操作系统。操作系统期望绝对或相对路径；操作系统会将当前工作目录合并到相对路径中。\n\
    \n模式在下面详细介绍。可以是 `'r'`、`'w'` 或 `'a'`，分别表示读取（默认）、写入或追加。如果在写入或追加模式下打开时文件不存在，它将被创建。如果在写入模式下打开时文件已存在，它将被截断并覆盖。在模式中添加\
    \ `'b'`"
