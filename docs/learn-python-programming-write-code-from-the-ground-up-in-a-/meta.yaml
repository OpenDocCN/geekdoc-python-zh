  md: '# CHAPTER 1


    # LEARN PYTHON PROGRAMMING


    ![](img/ec3692d13e45b982b1da1fe3997bd6d1_6_0.png)


    **INTRODUCTION**

    Python is an example of a high level language.Other high level languages you might
    have heard of are C++,PHP,Pascal,C#,and Java. Python is an easy to learn, powerful
    programming language. It has efficient high-level data structures and a simple
    but effective approach to object-oriented programming.


    Python was originally conceived by Van Rossum as a hobby language in December
    1989. Also, the major and backward-incompatible version of the general-purpose
    programming language was released on 3rd December 2008. But Python is recently
    rated by a number of surveyors as the most popular coding language of 2015. The
    massive popularity indicates Python''s effectiveness as a modern programming language.
    At the same time, Python 3 is currently used by developers across the worlds for
    creating a variety of desktop GUI, web and mobile applications.


    Python is a high-level, interpreted scripting language developed in the late 1980s
    by Guido van Rossum at the National Research Institute for Mathematics and Computer
    Science in the Netherlands. The initial version was published at the alt.sources
    newsgroup in 1991, and version 1.0 was released in 1994.'
  merge: -1
  pgno: 6
- img_proc: true
  md: 'Python 2.0 was released in 2000, and the 2.x versions were the prevalent releases
    until December 2008. At that time, the development team made the decision to release
    version 3.0, which contained a few relatively small but significant changes that
    were not backward compatible with the 2.x versions. Python 2 and 3 are very similar,
    and some features of Python 3 have been backported to Python 2. But in general,
    they remain not quite compatible.


    Both Python 2 and 3 have continued to be maintained and developed, with periodic
    release updates for both. As of this writing, the most recent versions available
    are 2.7.15 and 3.6.5. However, an official End Of Life date of January 1, 2020
    has been established for Python 2, after which time it will no longer be maintained.
    If you are a newcomer to Python, it is recommended that you focus on Python 3,
    as this tutorial will do.


    Python is still maintained by a core development team at the Institute, and Guido
    is still in charge, having been given the title of BDFL (Benevolent Dictator For
    Life) by the Python community. The name Python, by the way, derives not from the
    snake, but from the British comedy troupe Monty Python’s Flying Circus, of which
    Guido was, and presumably still is, a fan. It is common to find references to
    Monty Python sketches and movies scattered throughout the Python documentation.


    There are also a number of reasons why the huge popularity and market share of
    Python will remain intact over a longer period of time.'
  merge: -1
  pgno: 7
- img_proc: true
  md: '# REASONS WHY THE MASSIVE POPULARITY OF PYTHON WILL REMAIN INTACT IN THE FUTURE


    # Supports Multiple Programming Paradigms


    Good developers often take advantage of different programming paradigms to reduce
    the amount of time and efforts re q uired for developing large and complex applications.
    Like other modern programming languages, Python also supports a number of commonly
    used programming styles including object-oriented, functional, procedural and
    imperative. It further features automatic memory management, along with a dynamic
    type system. So programmers can use the language to effectuate development of
    large and complex software applications.


    # Doesn''t Require Programmers to Write Lengthy Code


    Python is designed with complete focus on code readability. So the programmers
    can create readable code base that can be used by members of distributed teams.
    At the same time, the simple syntax of the programming language enables them to
    express concepts without writing longer lines of code. The feature makes it easier
    for developers to large and complex applications within a stipulated amount of
    time. As they can easily skip certain tasks required by other programming languages,
    it becomes easier for developers to maintain and update their applications.


    # Provides a Comprehensive Standard Library


    Python further scores over other programming languages due to its extensive standard
    library. The programmers can use these libraries to accomplish a variety of tasks
    without writing longer lines of code. Also, the standard library of Python is
    designed with a large number of high use programming tasks scripted into it. Thus,
    it helps programmers to accomplish tasks like string operations, development and
    implementation of web services, working with internet protocols, and handling
    operating system interface.'
  merge: -1
  pgno: 8
- img_proc: true
  md: '# Effectuates Web Application Development


    Python is designed as a general-purpose programming language, and lacks built-in
    web development features. But the web developers use a variety of add-on modules
    to write modern web applications in Python. While writing web applications in
    Python, programmers have option to use several high-level web frameworks including
    Django, web2py, TurboGears, CubicWeb, and Reahl. These web frameworks help programmers
    to perform a number of operations, without writing additional code, like database
    manipulation, URL routing, session storage and retrieval, and output template
    formatting. They can further use the web frameworks to protect the web application
    from cross-site scripting attacks, SQL injection, and cross-site request forgery.


    # Facilitates Development of High Quality GUI, Scientific and Numeric Applications


    Python is currently available on major operating systems like Windows, Mac OS
    X, Linux and UNIX. So the desktop GUI applications written in the programming
    language can be deployed on multiple platforms. The programmers can further speedup
    cross-platform desktop GUI application development using frameworks like Kivy,
    wxPython and PyGtk. A number of reports have highlighted that Python is used widely
    for development of numeric and scientific applications. While writing scientific
    and numeric applications in Python, the developers can take advantage of tools
    like Scipy, Pandas, IPython, along with the Python Imaging Library.


    # Simplifies Prototyping of Applications


    Nowadays, each organization wants to beat competition by developing software with
    distinct and innovative features. That is why; prototyping has become an integral
    part of modern software development lifecycle. Before writing the code, developers
    have to create prototype of the application to display its features and functionality
    to various stakeholders. As a simple and fast programming language, Python enables
    programmers to develop the final system without putting any extra time and effort.
    At the same time, the developers also have option to start developing the system
