    \ 5 分钟即可开始使用 Chaquopy，无需更改现有开发流程。\n    - 下载和安装通过 Gradle 自动化完成。\n\n开始使用：\n\n- 试用\
    \ Python 2 或 Python 3 的演示应用。\n- 在 GitHub 上浏览示例源代码。\n- 或查看文档。\n\n## Kivy\n\nKivy\
    \ 是一个基于 OpenGL 的跨平台用户界面工具包。\n\n你可以在 Android 上运行 Kivy 应用程序，基本上任何支持 OpenGL ES 2.0（最低\
    \ Android 2.2）的设备都可以。这是现代设备的标准配置；Google 报告称 99.9% 的设备满足此要求。\n\nKivy APK 是普通的 Android\
    \ 应用，你可以像分发任何其他应用一样分发它们，包括在 Play 商店等应用商店上分发。它们在暂停或重启时行为正常，可以利用 Android 服务，并且可以访问大多数常规\
    \ Java API，如下所述。\n\n请按照以下说明学习如何为 Android 打包应用、在设备上调试代码，以及使用 Android API（如振动和读取传感器）。\n\
    \nKivy 项目提供了在 Android 上打包应用所需的所有工具，包括构建你自己的独立 APK，该 APK 可以在 Play 商店等市场上分发。这在“为\
