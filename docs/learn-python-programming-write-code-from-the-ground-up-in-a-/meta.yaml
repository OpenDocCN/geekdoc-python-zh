    ## 1.10.4. String Format Operation


    In grade school quizzes a common convention is to use fill-in-the blanks. For
    instance,


    Hello _____!


    and you can fill in the name of the person greeted, and combine given text with
    a chosen insertion. We use this as an analogy: Python has a similar construction,
    better called fill-in-the-braces. There is a particular operation on strings called
    format, that makes substitutions into places enclosed in braces. For instance
    the example file, hello_you3.py, creates and prints the same string as in hello_you2.py
    from the previous section:


    ```python

    """Hello to you! Illustrates format with {} in print.

    """

    person = input(''Enter your name: '')

    greeting = ''Hello, {}!''.format(person)

    print(greeting)

    ```


    There are several new ideas here!


    First method calling syntax for objects is used. You will see this very important
    modern syntax in more detail at the beginning of the next chapter in Object Orientation.
    All data in Python are objects, including strings. Objects have a special syntax
    for functions, called methods, associated with the particular type of object.
    In particular str objects have a method called format. The syntax for methods
    has the object followed by a period followed by the method name, and further parameters
    in parentheses.


    ```

    object.methodname(parameters)

    ```


    In the example above, the object is the string ''Hello {}!''. The method is named
    format. There is one further parameter, person.


    The string for the format method has a special form, with braces embedded. Places
    where braces are embedded are replaced by the value of an expression taken from
    the parameter list for the format method. There are many variations on the syntax
    between the braces. In this case we use the syntax where the first (and only)
    location in the string with braces has a substitution made from the first (and
    only) parameter.


    In the code above, this new string is assigned to the identifier greeting, and
    then the string is printed.


    The identifier greeting was introduced to break the operations into a clearer
    sequence of steps. However, since the value of greeting is only referenced once,
    it can be eliminated with the more concise version:


    ```python

    person = input(''Enter your name: '')

    print(''Hello {}!''.format(person))

    ```


    Consider the interview program. Suppose we want to add a period at the end of
    the sentence (with no space before it). One approach would be to combine everything
    with plus signs. Another way is printing with keyword sep="". Another approach
    is with string formatting. Using our grade school analogy, the idea is to fill
    in the blanks in


    _____ will interview _____ at _____.


    There are multiple places to substitute, and the format approach can be extended
    to multiple substitutions: Each place in the format string where there is ''{}'',
    the format operation will substitute the value of the next parameter in the format
    parameter list.


    Run the example file interview2.py, and check that the results from all three
    methods match.


    ```python

