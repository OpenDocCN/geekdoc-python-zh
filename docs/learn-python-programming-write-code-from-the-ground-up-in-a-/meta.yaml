    # Pyqtdeploy


    Pyqtdeploy is a tool for deploying PyQt applications. It supports deployment to
    desktop platforms (Linux, Windows and OS X) and to mobile platforms (iOS and Android).


    py q tdeploy works by taking the individual modules of a PyQt application, freezing
    them, and then placing them in a Qt resource file that is converted to C++ code
    by Qt’s rcc tool. Python’s standard library is handled in the same way.


    py q tdeploy also generates a Qt .pro file that describes all the generated C++
    code. From this Qt’s qmake tool is used to generate a platform-specific Makefile
    which will then generate a single executable. Further Qt and/or platform specific
    tools can then be used to convert the executable to a platform specific deployable
    package.


    py q tdeploy re q uires PyQt5 and Python v3.2 or later to be installed.


