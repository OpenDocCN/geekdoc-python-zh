  - '[PAGE 95]


    # SHORTER AND CLEANER CODE


    The existing Python programmers understand the long-term benefits of a shorter
    and cleaner code base. As Python enables those to express common concepts with
    less code, they can always avoid creating longer code. At the same time, Django
    supports model-view-controller (MVC) pattern. The pattern makes it easier for
    programmers to organize their code efficiently by keeping the business logic,
    user interface and application data separate. The combination of Python and Django
    helps experienced developers to create readable, shorter and cleaner code.


    # OPTIONS TO CUSTOMIZE WEB APPLICATIONS


    Nowadays each business wants its website to deliver distinct and rich user experience.
    Python developers look for options to customize pieces of websites without putting
    any extra time and effort. As a flexible web framework, Django enables them to
    customize different pieces of a website. Instead of using pre-built web applications,
    the programmers are re q uired to focus only on customizing pieces of the website
    according to client''s specific requirements. The focus enables them to create
    applications that deliver relevant content or information according to the specific
    needs of user.


    # BUILT-IN TOOLS FOR ACCOMPLISHING COMMON TASKS


    Django is being updated regularly with new features and built-in tools. It includes
    a variety of built-in tools that help users to accomplish common web development
    tasks without writing lengthy code. These built-in tools help programmers to reduce
    the amount of time re q uired for developing large websites.


    # A VARIETY OF PACKAGES


    The existing Python programmers further boost performance of their web application
    using Django packages. The Django packages include reusable tools, apps, and sites.
    Many developers fre q uently use apps like Django Extensions, Django Celery, Django
    Rest Framework and South. They also effectuate development of ecommerce websites
    by using django SHOP, django-oscar, Satchmo, satchless or Cartridge. They also
    have option to choose from a variety of reusable tools, apps and sites according
    to the nature and needs of the web application. These packages make it easier
    for them to boost the website''s performance without writing extra code.'
- md: '## OBJECT-RELATIONAL MAPPER (ORM)


    The choice of database differs from one client to another. The experienced Python
    developers prefer using object-relational mapper to write database queries without
    using SQL. Django comes with an ORM that enables developers to manipulate database
    without writing lengthy SQL queries. The framework implements the ORM by default
    to allow programmers to describe the database layout as a Python class. At the
    same time, they also have option to use a Python API to access data in a more
    efficient way. As the API is generated on the fly, the developers are not required
    to generate any additional code. That is why; Django is used widely for development
    of data-driven websites.


    ## HUMAN READABLE URLS


    The beginners often ignore the significance of human readable URLs. But existing
    Python developers understand the benefits of human readable URLs for the web application.
    The website visitors can understand and remember the URL more easily. Also, the
    human readable URLs will make the web pages rank higher on search engine results
    pages. Django makes it easier for programmers to create simple, readable and easy-to-remember
    URLs for both website visitors and search engine bottoms.


    ## DYNAMIC ADMIN INTERFACE


    Each client wants a simple and dynamic admin interface to manage the application
    smoothly. Django is designed with features to generate a production-ready admin
    interface. The dynamic admin interface allows authenticate users to add, delete
    and change objects. Thus, it makes it easier for the business to edit or update
    the website content, without using any backend interface. The existing Python
    programmers take advantage of this feature to setup and run admin sites while
    developing the models.


    ## OPTIMIZED SECURITY


    Python scores over other popular web programming language in the category of security.
    The existing Python developers also avail the features of Django to optimize the
    security of Python web application. Unlike other web frameworks, Django often
    generates web pages dynamically, and sends the content to web browsers through
    templates. So the source code remains hidden from both the web browser and end
    users. As the source code is not directly exposed to the end users, the internet
    application gets comprehensive security cover. At the same time, the developers
    can also use Django to prevent cross-site scripting attacks, SQL injection and
    other security threats.


    ## OPTION TO EXCHANGE IDEAS


    Like other open source technologies, Django is also supported by a large and active
    community. So the existing Python web developer often avail assistance of the
    community to handle new issues. At the same time, they also exchange ideas and
    best practices with other members of the community on a regular basis. The exchange
    makes it easier for them to keep track of the latest trends in web development,
    along with understanding how to implement these trends without any hassle.


    The existing Python programmers also upgrade to the latest version of Django to
    avail new features and enhancements, along with a number of bug fixes. Further,
    they can avail regular security updates for the most recent version of the web
    framework to protect the application from latest security threats. Many programmers
    even upgrade to the latest version of Django to keep their code base relevant
    and up to date.


    ## CHAPTER 9


    ## IMPORTANT PYTHON FRAMEWORKS


    As a dynamic, general purpose and object-oriented programming language, Python
    is used widely by developers across the world for building a variety of software
    applications. Unlike other modern programming languages, Python enables programmers
    to express concept with less and readable code. The users also have an option
    to integrate Python with other popular programming languages and tools seamlessly.
    But it cannot be used directly for writing different types of software.


    Often Python developers have to use a variety of frameworks and tools to build
    high quality software applications within a shorter amount of time. The resources
    provided by the Python frameworks help users to reduce the time and effort required
    for modern applications. They also have an option to choose from a number of frameworks
    according to the nature and requirements of individual projects. However, it is
    also important for the programmers to know some of the Python frameworks that
    will remain popular in the longer run.


    10 Python Frameworks that will Remain Popular:


    **1) Kivy**

    As an open source Python library, Kivy makes it easier for programmers to build
    multi-touch user interfaces. It supports a number of popular platforms including
    Windows, Linux, OS X, iOS and Android. So the cross-platform framework enables
    users to create the app for multiple platforms using the same code base. It is
    also designed with features to take advantage of the native inputs, protocols
    and devices. Kivy further includes a fast graphic engine, while allowing users
    to choose from more than 20 extensible widgets.


    **2) Qt**

    The open source Python framework is written in C++. Qt enables developers to build
    connected applications and UIs that run on multiple operating systems and devices.
    The developers can further create cross-platform applications and UIs without
    making any changes to the code. Qt further scores over other frameworks due to
    its comprehensive library of APIs and tools. The programmers have option to use
    Qt either under the community license or the commercial license.


    **3) PyGUI**

    PyGUI is considered to be simpler than other Python frameworks. But it enables
    developers to create GUI API by taking advantage of the language features of Python.
    PyGUI currently supports Windows, OS X and Linux. So the developers can use it
    for creating lightweight GUI APIs that can be implemented on these three platforms.
    They can further document the API comprehensively without referring to the documentation
    of any third-party GUI library.


    **4) WxPython**

    The GUI toolkit for Python helps programmers to create applications with highly
    functional graphical user interfaces. As wxPython supports Windows, Linux and
    OS X, it becomes easier for developers to run the same program in multiple platforms
    without modifying the code. The users can write the programs in Python, while
    taking advantage of the 2D path drawing engine, standard dialogs, dockable windows
    and other features provided by the framework.


    **5) Django**

    Django is the most popular high-level web application development framework for
    Python. Despite being open source, Django provides a simple and rapid development
    environment for building a variety of websites and web applications rapidly. It
    further helps programmers to create web application without writing lengthy code.
    It further comes with features to prevent some of the common security mistakes
    made by the developers.


    **6) CherryPy**

    As a minimalist web framework, CherryPy enables programs to create websites and
    web applications just like writing other object-oriented Python programs. So it
    becomes easier for developers to build web applications without writing lengthy
    code. CherryPy further comes with a clean interface, while allowing developers
    to decide the right frontend utilities and data storage option. Despite being
    the oldest Python web application development framework in the market, CherryPy
    is still being used by programmers to create a variety of modern websites.


    **7) Flask**

    Flask is one of the micro web frameworks available for Python. Its core is simple
    and easy to use, but highly extensible. It also lacks many features provided by
    other web frameworks including database abstraction layer and form validations.
    Also, it does not allow users to add common functionality to the web application
    through third-party libraries. However, Flask enables programmers to create website
    rapidly by using extensions and code snippets. The snippets and patterns contributed
    by other members help developers to accomplish common tasks like database access,
    caching, file upload and authentication without writing any additional code.


    **8) Pyramid**

    Despite being a lightweight and simple Python web framework, Pyramid is hugely
    popular among programmers due to its high and rapid performance. The open source
    framework can be used for creating a variety of applications. Once the standard
    Python development environment is set up, the developers can use Pyramid to build
    the applications rapidly. Pyramid further allows users to take advantage of an
    independent Model-view-controller (MVC) structure. At the same time, they can
    further take advantage of other frameworks by integrating them with Pyramid.


    **9) Web.py**

    As a simple but powerful web framework for Python, web.py helps programmers to
    build a variety of modern web applications rapidly. The combination of simple
    architecture and impressive development potential further helps users to overcome
    some of the common restrictions and inconveniences in web development. It still
    lacks many features provided by other modern web frameworks. But developers can
    easily integrate web.py with other frameworks to avail a number of advanced features
    and functionality.


    **10) TurboGears**

    As a highly-scalable web application development framework for Python, TurboGears
    helps users to eliminate restrictions and limitations within the development environment.
    It can be used as a micro-framework or full-stack framework. It further provides
    a flexible object relationship mapper (ORM), along with supporting several databases,
    multiple data exchange formats, and horizontal data partitioning. The developers
    can further use the new widget system provided by TurboGears to effectuate development
    of AJAX-heavy web applications.


    On the whole, the Python developers have option to choose from many frameworks.
    Some of these frameworks effectuate development of GUI desktop applications, whereas
    others help programmers to build modern websites and web application rapidly.
    At the same time, the'
  mdcn: '## 对象关系映射器（ORM）


    不同客户对数据库的选择各不相同。经验丰富的 Python 开发者倾向于使用对象关系映射器来编写数据库查询，而无需使用 SQL。Django 自带一个 ORM，使开发者无需编写冗长的
    SQL 查询即可操作数据库。该框架默认实现了 ORM，允许程序员将数据库布局描述为一个 Python 类。同时，他们也可以选择使用 Python API 以更高效的方式访问数据。由于
    API 是动态生成的，开发者无需生成任何额外代码。这就是为什么 Django 被广泛用于开发数据驱动型网站。


    ## 人类可读的 URL


    初学者常常忽视人类可读 URL 的重要性。但现有的 Python 开发者明白人类可读 URL 对 Web 应用程序的好处。网站访问者可以更容易地理解和记住
    URL。此外，人类可读的 URL 会使网页在搜索引擎结果页面上的排名更高。Django 使程序员更容易为网站访问者和搜索引擎爬虫创建简单、易读且易于记忆的
    URL。


    ## 动态管理界面


    每个客户都希望有一个简单且动态的管理界面来顺畅地管理应用程序。Django 的设计特性可以生成一个生产就绪的管理界面。动态管理界面允许经过认证的用户添加、删除和更改对象。因此，它使企业无需使用任何后端界面即可更轻松地编辑或更新网站内容。现有的
    Python 程序员利用这一特性在开发模型时设置和运行管理站点。


    ## 优化的安全性


    在安全性方面，Python 优于其他流行的 Web 编程语言。现有的 Python 开发者也利用 Django 的特性来优化 Python Web 应用程序的安全性。与其他
    Web 框架不同，Django 通常动态生成网页，并通过模板将内容发送到 Web 浏览器。因此，源代码对 Web 浏览器和最终用户都是隐藏的。由于源代码不直接暴露给最终用户，互联网应用程序获得了全面的安全覆盖。同时，开发者也可以使用
    Django 来防止跨站脚本攻击、SQL 注入和其他安全威胁。


    ## 交流想法的选择


    与其他开源技术一样，Django 也得到了一个庞大而活跃社区的支持。因此，现有的 Python Web 开发者经常利用社区的帮助来处理新问题。同时，他们也定期与其他社区成员交流想法和最佳实践。这种交流使他们更容易跟踪
    Web 开发的最新趋势，并了解如何轻松地实施这些趋势。


    现有的 Python 程序员也会升级到最新版本的 Django，以利用新功能和增强功能，以及大量的错误修复。此外，他们可以获取 Web 框架最新版本的定期安全更新，以保护应用程序免受最新安全威胁。许多程序员甚至升级到最新版本的
    Django，以保持其代码库的相关性和时效性。


    ## 第 9 章


    ## 重要的 Python 框架


    作为一种动态、通用和面向对象的编程语言，Python 被世界各地的开发者广泛用于构建各种软件应用程序。与其他现代编程语言不同，Python 使程序员能够用更少且可读的代码来表达概念。用户还可以选择将
    Python 与其他流行的编程语言和工具无缝集成。但它不能直接用于编写不同类型的软件。


    通常，Python 开发者必须使用各种框架和工具，在更短的时间内构建高质量的软件应用程序。Python 框架提供的资源帮助用户减少现代应用程序所需的时间和精力。他们还可以根据各个项目的性质和需求从多个框架中进行选择。然而，程序员了解一些在长期内仍将流行的
    Python 框架也很重要。


    10 个将持续流行的 Python 框架：


    **1) Kivy**

    作为一个开源的 Python 库，Kivy 使程序员更容易构建多点触控用户界面。它支持许多流行的平台，包括 Windows、Linux、OS X、iOS 和
    Android。因此，这个跨平台框架使用户能够使用相同的代码库为多个平台创建应用程序。它还设计了利用原生输入、协议和设备的特性。Kivy 还包含一个快速图形引擎，同时允许用户从
    20 多个可扩展小部件中进行选择。


    **2) Qt**

    这个开源的 Python 框架是用 C++ 编写的。Qt 使开发者能够构建在多个操作系统和设备上运行的互联应用程序和 UI。开发者还可以在不更改代码的情况下创建跨平台应用程序和
    UI。Qt 还因其全面的 API 和工具库而优于其他框架。程序员可以选择在社区许可或商业许可下使用 Qt。


    **3) PyGUI**

    PyGUI 被认为比其他 Python 框架更简单。但它使开发者能够利用 Python 的语言特性来创建 GUI API。PyGUI 目前支持 Windows、OS
    X 和 Linux。因此，开发者可以使用它来创建可以在这些三个平台上实现的轻量级 GUI API。他们还可以全面地记录 API，而无需参考任何第三方 GUI
    库的文档。


    **4) WxPython**

    这个 Python 的 GUI 工具包帮助程序员创建具有高度功能图形用户界面的应用程序。由于 wxPython 支持 Windows、Linux 和 OS
    X，开发者可以更容易地在多个平台上运行相同的程序而无需修改代码。用户可以用 Python 编写程序，同时利用框架提供的 2D 路径绘制引擎、标准对话框、可停靠窗口和其他特性。


    **5) Django**

    Django 是 Python 最流行的高级 Web 应用程序开发框架。尽管是开源的，Django 为快速构建各种网站和 Web 应用程序提供了简单而快速的开发环境。它进一步帮助程序员无需编写冗长的代码即可创建
    Web 应用程序。它还具有防止开发者犯下一些常见安全错误的功能。


    **6) CherryPy**

    作为一个极简的 Web 框架，CherryPy 使程序能够像编写其他面向对象的 Python 程序一样创建网站和 Web 应用程序。因此，开发者可以更容易地构建
    Web 应用程序而无需编写冗长的代码。CherryPy 还具有简洁的界面，同时允许开发者决定合适的前端工具和数据存储选项。尽管是市场上最古老的 Python
    Web 应用程序开发框架，CherryPy 仍被程序员用于创建各种现代网站。


    **7) Flask**

    Flask 是 Python 可用的微 Web 框架之一。其核心简单易用，但高度可扩展。它也缺少其他 Web 框架提供的许多功能，包括数据库抽象层和表单验证。此外，它不允许用户通过第三方库向
    Web 应用程序添加通用功能。然而，Flask 使程序员能够通过使用扩展和代码片段快速创建网站。其他成员贡献的片段和模式帮助开发者无需编写任何额外代码即可完成数据库访问、缓存、文件上传和身份验证等常见任务。


    **8) Pyramid**

    尽管是一个轻量级且简单的 Python Web 框架，Pyramid 因其高性能和快速性能而深受程序员欢迎。这个开源框架可用于创建各种应用程序。一旦设置了标准的
    Python 开发环境，开发者就可以使用 Pyramid 快速构建应用程序。Pyramid 还允许用户利用独立的模型-视图-控制器（MVC）结构。同时，他们还可以通过将其他框架与
    Pyramid 集成，进一步利用其他框架的优势。


    **9) Web.py**

    作为一个简单但功能强大的 Python Web 框架，web.py 帮助程序员快速构建各种现代 Web 应用程序。简单架构与令人印象深刻的开发潜力的结合，进一步帮助用户克服
    Web 开发中一些常见的限制和不便。它仍然缺少其他现代 Web 框架提供的许多功能。但开发者可以轻松地将 web.py 与其他框架集成，以获得许多高级功能和特性。


    **10) TurboGears**

    作为一个高度可扩展的 Python Web 应用程序开发框架，TurboGears 帮助用户消除开发环境中的限制和约束。它可以用作微框架或全栈框架。它还提供了一个灵活的对象关系映射器（ORM），并支持多个数据库、多种数据交换格式和水平数据分区。开发者还可以使用
    TurboGears 提供的新小部件系统，以有效开发 AJAX 密集型 Web 应用程序。


    总的来说，Python 开发者可以从众多框架中进行选择。其中一些框架有助于开发 GUI 桌面应用程序，而另一些则帮助程序员快速构建现代网站和 Web 应用程序。同时，'
