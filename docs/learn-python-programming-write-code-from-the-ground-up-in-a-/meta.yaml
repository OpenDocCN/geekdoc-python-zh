    \      self.score += 1\n```\n\nFor the full example, see collect_coins.py.\n\n\
    ### Game physics\n\nMany games include some kind of physics. The simplest are\
    \ top-down programs that prevent the player from walking through walls. Platformers\
    \ add more complexity with gravity and platforms that move. Some games use a full\
    \ 2D physics engine with mass, friction, springs, and more.\n\nFor simple top-down\
    \ based games, an Arcade program needs a list of walls that the player (or anything\
    \ else) can't move through. I usually call this wall_list. Then a physics engine\
    \ is created in the Window class's setup code with:\n\n```\nself.physics_engine\
    \ = arcade.PhysicsEngineSimple(self.player_sprite, self.wall_list)\n```\n\nThe\
