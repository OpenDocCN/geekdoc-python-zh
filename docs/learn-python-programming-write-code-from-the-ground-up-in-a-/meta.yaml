    \n        self.y_test = y_test\n\n        self.n = y_train.shape[0]\n\n    def\
    \ training_reconstruction(self):\n\n        p_y1 = np.zeros(self.n)\n\n      \
    \  for i in range(self.n):\n\n            p_y1[i] = sigmoid(np.dot(self.betas,\
    \ self.x_train[i,:]))\n\n        return p_y1\n\n    def test_predictions(self):\n\
    \n        p_y1 = np.zeros(self.n)\n\n        for i in range(self.n):\n\n     \
