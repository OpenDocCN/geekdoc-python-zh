  - '[PAGE 53]


    # CHAPTER 5


    # HOW TO WORK WITH EXTERNAL FILES


    ![](img/ec3692d13e45b982b1da1fe3997bd6d1_53_0.png)


    All programs must deal with external data. They will either accept data from sources
    outside the text of the program, or they will produce some kind of output, or
    they will do both. Think about it: if the program produces no output, how do you
    know it did anything?


    By external data, we mean data outside of volatile, high-speed, primary memory;
    we mean data on peripheral devices. This may be persistent data on a disk, or
    transient data on a network interface. For now, it may mean transient data displayed
    on our terminal.'
  - '[PAGE 54]


    Most operating systems provide simple, uniform access to external data via the
    abstraction called a file. We''ll look at the operating system implementation,
    as well as the Python class that gives us access to the operating system file
    in our programs.


    In File Objects – Our Connection To The File System, we provide definitions of
    how Python works with files. We cover the built-in functions for working with
    files in The File and Open Functions. In Methods We Use on File Objects, we describe
    some method functions of file objects. We''ll look at file-processing statements
    in File Statements: Reading and Writing (but no Arithmetic).


    # File Objects – Our Connection To The File System


    Abstractions Built on Top of Abstractions. Files do a huge number of things for
    us. To support this broad spectrum of capabilities, there are two layers of abstraction
    involved: the OS and Python. Unfortunately, both layers use the same words, so
    we have to be careful about casually misusing the word “file”.


    The operating system has devices of various kinds. All of the various devices
    are unified using a common abstraction that we call the file system. All of a
    computer''s devices appear as OS files of one kind or another. Some things which
    aren''t physical devices also appear as files. Files are the plumbing that move
    data around our information infrastructure.


    Additionally, Python defines file objects. These file objects are the fixtures
    that give our Python program access to OS files.


    # Python File and OS File


    How Files Work. When your program evaluates a method function of a Python file
    object, Python transforms this into an operation on the underlying OS file. An
    OS file operation becomes an operation on one of the various kinds of devices
    attached to our computer. Or, a OS file operation can become a network operation
    that reaches through the Internet to access data from remote computers. The two
    layers of abstraction mean that one Python program can do a'
  - '[PAGE 55]


    wide variety of things on a wide variety of devices.


    # Python File Objects


    In Python, we create a file object to work with files in the file system. In addition
    to files in the OS’s file system, Python recognizes a spectrum of file-like objects,
    including abstractions for network interfaces called pipes and sockets and even
    some kind of in-memory buffers.


    Unlike sequences, sets and mappings, there are no Python literals for file objects.
    Lacking literals, we create a file object using the file() or open() factory function.
    We provide two pieces of information to this function. We can provide a third,
    optional, piece of information that may improve the performance of our program.


    The name of the file. The operating system will interpret this name using its
    “working directory” rules. If the name starts with / (or device:\) it’s an absolute
    name. Otherwise, it’s a relative name; the current working directory plus this
    name identifies the file.


    Python can translate standard paths (using /) to Windows-specific paths. This
    saves us from having to really understand the differences. We can name all of
    our files using /, and avoid the messy details.


    We can, if we want, use raw strings to specify Windows path names using the \
    character.


    The access mode for the file. This is some combination of read, write and append.
    The mode can also include instructions for interpreting the bytes as characters.


    Optionally, we can include the buffering for the file. Generally, we omit this.
    If the buffering argument is given, 0 means each byte is transferred as it is
    read or written. A value of 1 means the data is buffered a line at a time, suitable
    for reading from a console, or writing to an error log. Larger numbers specify
    the buffer size: numbers over 4,096 may speed up your program.'
  - '[PAGE 56]


    Once we create the file object, we can do operations to read characters from the
    file or write characters to the file. We can read individual characters or whole
    lines. Similarly, we can write individual characters or whole lines.


    When Python reads a file as a sequence of lines, each line will become a separate
    string. The ''\n'' character is preserved at the end of the string. This extra
    character can be removed from the string using the rstrip() method function.


    A file object (like a sequence) can create an iterator which will yield the individual
    lines of the file. You can, consequently, use the file object in a for statement.
    This makes reading text files very simple.


    When the work is finished, we also need to use the file''s close() method. This
    empties the in-memory buffers and releases the connection with the operating system
    file. In the case of a socket connection, this will release all of the resources
    used to assure that data travels through the Internet successfully.


    # The File and Open Functions


    Here''s the formal definition of the file() and open() factory functions. These
    functions create Python file objects and connect them to the appropriate operating
    system resources.


    ```

    open(filename, mode[, buffering]) → file

    ```


    The filename is the name of the file. This is simply given to the operating system.
    The OS expects either absolute or relative paths; the operating system folds in
    the current working directory to relative paths.


    The mode is covered in detail below. In can be ''r'', ''w'' or ''a'' for reading
    (default), writing or appending. If the file doesn''t exist when opened for writing
    or appending, it will be created. If a file existed when opened for writing, it
    will be truncated and overwritten. Add a ''b'' to the mode'
- md: "## 文件操作\n\n对于二进制文件，在模式字符串中添加 `+` 以允许同时进行读写操作。\n\n如果提供了缓冲参数，`0` 表示无缓冲，`1` 表示行缓冲，更大的数字则指定缓冲区大小。\n\
    \n`file(filename, mode[, buffering]) → file`\n这是 `open()` 函数的另一个名称。它类似于其他工厂函数，如\
