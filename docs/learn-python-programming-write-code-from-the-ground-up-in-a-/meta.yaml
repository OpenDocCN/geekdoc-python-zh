  md: 'The Mode String. The mode string specifies how the OS file will be accessed
    by your program. There are four separate issues addressed by the mode string:
    opening, bytes, newlines and operations.


    Opening. For the opening part of the mode string, there are three alternatives:


    +   - r: Open for reading. Start at the beginning of the OS file. If the OS file
    does not exist, raise an IOError exception. This is the default.

    - w: Open for writing. Start at he beginning of the OS file. If the OS file does
    not exist, create the OS file.

    - a: Open for appending. Start at the end of the OS file. If the OS file does
    not exist, create the OS file.


    Bytes or Characters. For the byte handling part of the mode string, there are
    two alternatives:


    +   - b: The OS file is a se q uence of bytes; do not interpret the file as a
    sequence of characters. This is suitable for .csv files as well as images, movies,
    sound samples, etc.


    The default, if b is not included, is to interpret the file is a sequence of ordinary
    characters. The Python file object will be an iterator that yields each individual
    line from the OS file as a separate string. Translations from various encoding
    schemes like UTF-8 and UTF-16 will be handled automatically.


    Universal Newlines. The newline part of the mode string has two alternatives:


    +   - U: Universal newline interpretation. The first instance of \n, \r\n (or
    \r) will define the newline character(s). Any of these three newline se q uences
    will be silently translated to the standard ''\n'' character. The \r\n is a Windows
    feature.


    The default, if U is not included, is to only handle this operating system''s
    standard newline character(s).'
