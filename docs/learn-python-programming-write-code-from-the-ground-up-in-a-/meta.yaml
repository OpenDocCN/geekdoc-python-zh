  md: 'Mixed Operations. For the additional operations part of the mode string, there
    are two alternatives:


    +: Allow both read and write operations to the OS file.

    The default, if + is not included, is to allow only limited operations: only reads
    for files opened with “r”; only writes for OS files opened with “w” or “a”.


    Typical combinations include the following:


    +   - "r" to read text files.

    - "rb" to read binary files. A .csv file, for example, is often processed in binary
