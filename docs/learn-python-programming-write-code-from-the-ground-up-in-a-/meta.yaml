    ## CHAPTER 11


    ## LOGISTIC REGRESSION WITH L2 REGULARIZATION IN PYTHON


    ![](img/ec3692d13e45b982b1da1fe3997bd6d1_106_0.png)


    Logistic regression is used for binary classification problems -- where you have
    some examples that are "on" and other examples that are "off." You get as input
    a training set; which has some examples of each class along with a label saying
    whether each example is "on" or "off". The goal is to learn a model from the training
    data so that you can predict the label of new examples that you haven''t seen
    before and don''t know the label of.


    For one example, suppose that you have data describing a bunch of buildings and
    earthquakes (E.g., year the building was constructed, type of material used, strength
    of earthquake, etc), and you know whether each building collapsed ("on") or not
    ("off") in each past earthquake. Using this data, you''d like to make predictions
    about whether a given building is going to collapse in a hypothetical future earthquake.


    One of the first models that would be worth trying is logistic regression.


    ### Coding it up


    I wasn''t working on this exact problem, but I was working on something close.
    Being one to practice what I preach, I started looking for a dead simple Python
    logistic regression class. The only requirement is that I wanted it to support
    L2 regularization (more on this later). I''m also sharing this code with a bunch
    of other people on many platforms, so I wanted as few dependencies on external
    libraries as possible.


    I couldn''t find exactly what I wanted, so I decided to take a stroll down memory
    lane and implement it myself. I''ve written it in C++ and Matlab before but never
    in Python.


    I won''t do the derivation, but there are plenty of good explanations out there
    to follow if you''re not afraid of a little calculus. Just do a little Googling
    for "logistic regression derivation." The big idea is to write down the probability
    of the data given some setting of internal parameters, then to take the derivative,
    which will tell you how to change the internal parameters to make the data more
    likely. Got it? Good.


    For those of you out there that know logistic regression inside and out, take
    a look at how short the train() method is. I really like how easy it is to do
    in Python.


    ### Regularization


    I caught a little indirect flak during March madness season for talking about
    how I regularized the latent vectors in my matrix-factorization model of team
    offensive and defensive strengths when predicting outcomes in NCAA basketball.
    Apparently people thought I was talking nonsense -- crazy, right?


    But seriously, guys -- regularization is a good idea.


    Let me drive home the point. Take a look at the results of running the code (linked
    at the bottom).


    Take a look at the top row.


    On the left side, you have the training set. There are 25 examples laid out along
    the x axis, and the y axis tells you if the example is "on" (1) or "off" (0).
    For each of these examples, there''s a vector describing its attributes that I''m
    not showing. After training the model, I ask the model to ignore the known training
    set labels and to estimate the probability that each label is "on" based only
    on the examples''s description vectors and what the model has learned (hopefully
    things like stronger earthquakes and older buildings increase the likelihood of
    collapse). The probabilities are shown by the red X''s. In the top left, the red
    X''s are right on top of the blue dots, so it is very sure about the labels of
    the examples, and it''s always correct.


    Now on the right side, we have some new examples that the model hasn''t seen before.
    This is called the test set. This is essentially the same as the left side, but
    the model knows nothing about the test set class labels (yellow dots). What you
    see is that it still does a decent job of predicting the labels, but there are
    some troubling cases where it is very confident and very wrong. This is known
    as overfitting.


    This is where regularization comes in. As you go down the rows, there is stronger
    L2 regularization -- or equivalently, pressure on the internal parameters to be
    zero. This has the effect of reducing the model''s certainty. Just because it
    can perfectly reconstruct the training set doesn''t mean that it has everything
    figured out. You can imagine that if you were relying on this model to make important
    decisions, it would be desirable to have at least a bit of regularization in there.


    And here''s the code. It looks long, but most of it is to generate the data and
    plot the results.'
