    This code will create a sprite using the image stored in coin_01.png. The image\
    \ will be scaled down to 20% of its original height and width.\n\n# Sprite lists\n\
    \nSprites are normally organized into lists. These lists make it easier to manage\
    \ the sprites. Sprites in a list will use OpenGL to batch-draw the sprites as\
    \ a group. The code below sets up a game with a player, and a bunch of coins for\
    \ the player to collect. We use two lists, one for the player and one for the\
    \ coins.\n\n```\ndef setup(self):\n    \"\"\" Set up the game and initialize the\
    \ variables. \"\"\"\n```"
