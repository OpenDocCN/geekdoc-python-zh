    snake, but from the British comedy troupe Monty Python’s Flying Circus, of which
    Guido was, and presumably still is, a fan. It is common to find references to
    Monty Python sketches and movies scattered throughout the Python documentation.


    There are also a number of reasons why the huge popularity and market share of
    Python will remain intact over a longer period of time.'
