    library, Kivy can be used for creating both desktop applications and mobile apps.
    But it allows developers to write the code once, and deploy the same code on multiple
    platforms. Along with interfacing with the hardware of the mobile device, Kivy
    also comes with built-in camera adapters, modules to render and play videos, and
    modules to accept user input through multi-touch and gestures. Thus, programmers
    can use Kivy to create different versions of the same applications for iOS, Android
    and Windows Phone. Also, the framework does not require developers to write longer
    lines of code while creating Kivy programs. After creating different versions
    of the mobile app, they can package the app separately for individual app store.
    The option makes it easier for developers to create different versions of the
    mobile app without deploying separate developers.


