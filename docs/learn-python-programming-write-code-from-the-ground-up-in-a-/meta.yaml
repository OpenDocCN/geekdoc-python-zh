    \ API，你可以直接使用 Pyjnius。Kivy 还提供了一个 android 模块用于基本的 Android 功能。\n\n用户贡献的 Android\
    \ 代码和示例可在 Kivy wiki 上找到。\n\n## Pyqtdeploy\n\nPyqtdeploy 是一个用于部署 PyQt 应用程序的工具。它支持部署到桌面平台（Linux、Windows\
    \ 和 OS X）以及移动平台（iOS 和 Android）。\n\nPyqtdeploy 的工作原理是获取 PyQt 应用程序的各个模块，将它们冻结，然后将它们放入一个\
    \ Qt 资源文件中，该文件通过 Qt 的 rcc 工具转换为 C++ 代码。Python 标准库也以相同方式处理。\n\nPyqtdeploy 还会生成一个\
    \ Qt .pro 文件，描述所有生成的 C++ 代码。然后使用 Qt 的 qmake 工具生成特定于平台的 Makefile，该 Makefile 将生成一个可执行文件。之后可以使用进一步的\
    \ Qt 和/或平台特定工具将可执行文件转换为特定于平台的可部署包。\n\nPyqtdeploy 需要安装 PyQt5 和 Python v3.2 或更高版本。\n\
    \n支持使用 Python v2.6 及更高版本和 Python v3.3 及更高版本编写的 PyQt4 和 PyQt5 应用程序。\n\nPyqtdeploy\
    \ 在 BSD 许可证下发布。\n\n## QPython\n\nQPython 是一个设备端脚本引擎和开发环境。\n\n在大多数情况下，脚本可以像原生应用程序一样很好地完成你的工作。现在你可以借助\
