    \n对于模式字符串的字节处理部分，有两种选择：\n- `b`：操作系统文件是字节序列；不要将文件解释为字符序列。这适用于 `.csv` 文件以及图像、电影、声音样本等。\n\
    \n如果未包含 `b`，默认值是将文件解释为普通字符序列。Python 文件对象将是一个迭代器，它从操作系统文件中逐行生成单独的字符串。来自各种编码方案（如\
    \ UTF-8 和 UTF-16）的转换将自动处理。\n\n模式字符串的换行符部分有两种选择：\n- `U`：通用换行符解释。第一个出现的 `\\n`、`\\\
