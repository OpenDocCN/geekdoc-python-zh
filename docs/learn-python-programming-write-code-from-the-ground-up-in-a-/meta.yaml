    ## JavaScript


    JavaScript is a high-level interpreted programming language. It is a multi-paradigm
    language that supports object-oriented and functional programming.


    JavaScript is ranked third by the number of programming jobs it offers.


    JavaScript is not primarily a language for app development instead, it is the
    language that is run by browsers which is used to develop and control web pages.
    Creating mobile apps with JavaScript is possible but it has to be used with CSS,
    HTML, and AJAX.


    There are several frameworks that can be used to create a professional JavaScript
    app such as PhoneGap, jQuery Mobile, and Ionic.


    Creating apps in JavaScript is easy because you have to code the app once and
    it can be released on all the platforms (Android, iOS, and Windows).


    ### Key features


    - One of the easiest languages out there that you can be learned in a few days.

    - Fast and efficient.

    - It is executed on the client-side which means it saves bandwidth by not using
    the server.

    - Used for dynamics and creating animations on otherwise dull and boring websites.


    ### Resources


    - The official JavaScript website

    - JavaScript Track on Codecademy

    - Basics of JavaScript on Udacity


    ## HTML5


    HTML5 is the fifth version of HTML (HyperText Markup Language). HTML5 is used
    to present content on the internet.


    HTML5 is not essentially a mobile app development language. In order to create
    an app in HTML5, it has to be used with other languages such as JavaScript.


    You can create Android as well as iOS apps in HTML5. The only requirement is using
    a powerful framework such as PhoneGap.


    Joe Wolf shares some great tips and reasons for creating HTML5 apps. You can create
    a mobile app in HTML5 (CSS and JavaScript) or you can use it in combination with
    APIs. In any case, HTML5 apps are responsive and work smoothly on all devices.


    Code once, and use on multiple devices.


    There are hundreds of web apps that are created in HTML5 that you use every single
    day. The all-famous Google Docs and Google Drive are mostly coded in HTML5. That''s
    not all, the Zoho app collection has over 33 productivity apps and most of them
    are developed in HTML5.


    So why bother creating a mobile app in HTML5 when there are more sophisticated
    programming languages available to choose from?


    Here are a few reasons to learn and code in HTML5:


    - HTML5 has been fully adopted by mobile (and desktop) browsers.

    - Cross-browser support.

    - With its cross-browser support and responsiveness, anything created in HTML5
    works on all devices painlessly.

    - Use canvas tag to develop games in HTML5.

    - Easy and clean coding.

    - It fully supports videos and audios.


    Time to take HTML5 seriously.


    ### Key features


    - Easy-to-learn

    - Support for mobile

    - Responsive design with support for all the devices

    - Drag-and-drop feature


    ### Resources


    - Learn HTML5 programming from scratch at Udemy.

    - HTML5 cheat sheet is a great resource for beginners.

    - HTML5 guide by Mozilla.


    ## Ruby


    Ruby is a general-purpose object-oriented programming language. It was developed
    by Yukihiro Matz Matsumoto in 1990s. It supports multiple paradigms.


    The demand for Ruby developers is five times more than the demand for Python developers.
    It is the fastest growing programming language and an average Ruby developer earns
    $77K per project while some earn as high as $112K.


    Analysis of over 50 repository servers shows that Ruby is the second language
    that has most projects completed while Java is at the top.


    You cannot create a mobile app on Ruby without using a framework such as RubyMotion
    or Rhodes. Using one of these frameworks, you can create apps for Android, iOS,
    Windows, and OS X.


    If there is one language that is easiest of them all, it is Ruby. You can create
    an app in 10 minutes on Ruby. It is not just easy to code but it is no less than
    a ghost.


    Some of the biggest websites are coded in Ruby like Fiverr, Airbnb, Pixlr, Groupon,
    Basecamp, Scribd, Bloomberg, ThemeForest, and many others.


    It is easy and insanely powerful. Why not use it to create a next level mobile
    app.


    ### Key features


    - It supports dynamic typing.

    - Object oriented language.

    - Easy coding. Anyone can do it.

    - Best for beginners.

    - Use existing codes.

    - Helpful community.


    ### Resources


    - Ruby course by Code Academy.

    - Rail Casts.

    - Learn Ruby the hard way.


    ## Perl


    Perl is a combination of two languages (Perl 5 and Perl 6). This is a high-level
    dynamic programming language family. It uses features from other programming languages
    like C, sed, AWK, and others. Both Perl 5 and Perl 6 run and evolve independently.


    Perl is used for a whole lot of applications such as automation, bioinformatics,
    website development, app development, games development, and others.


    LiveJournal, IMDB, and Booking are a few most popular websites developed in Perl.


    Developing Android apps in Perl is easier than before since Google now has its
    APK available for Perl developers.


    For iOS app development, you have to use a framework. Catalyst, Dancer, and Mojo
    are the three most famous frameworks for Perl mobile app development.


    ### Key features


    - The most powerful feature of Perl is CPAN which is the comprehensive Perl archive
    network.

    - It is fast, reliable, and personal.

    - It is fun. Perl has the happiest users.

    - If you learn Perl, you will be operating in a low or no-competition zone.


    ### Resources


    - How to build Perl on Android.

    - Official Perl website.

    - Perl for beginners.


    ## Rust


    Rust is a compiled programming language by Mozilla. It is a multiple paradigm
    general-purpose language.


    Rust is like C and C++ but it is safer and better. It has a powerful management
    tool that makes it better than other programming languages such as Ruby and Python.


    More than 64% of developers are using Rust which makes it quite a popular programming
    language among developers.


    Rust is still a new language that is not fully mature but it has a great future.
    There are developers who are using Rust to create mobile apps such as John Gallagher
    who has created an iOS app in Rust.


    Mozilla''s browser engine, known as Servo, is developed in Rust. This is not all,
    there are some other big projects completed in Rust, for example, Piston, Zinc,
    and Maidsafe.


    Learning Rust at this time and creating a mobile app will put you in the driving
    seat. Rust has the potential to take over C and C++ in near future.


    ### Key features


    - Not an easy language to learn.

    - Safer than most of the other languages.

    - It is fast.

    - It can be used to create a whole lot of applications in different fields.

    - Cargo, the build system, is very famous among developers.

    - Developers are in love with Rust.


    ### Resources


    - Rust by example.

    - Introduction to Rust.

    - A 30-minute introduction to Rust.


    ## SQL


    Structured Query Language (SQL) is a programming language that is used for managing
    relational database management systems, database analytics, and for data processing.


    SQL is not a language that is used for developing mobile apps but it supports
    applications.


    Mobile apps where you have to access data from the server, SQL will be used. Essentially,
    it is the single language that will be integrated with most of the mobile apps.
    Learning SQL is, therefore, crucial.


    ### Key features


    - The best thing about SQL is that it doesn''t require any coding.

    - It is portable and works on all devices.

    - One of the easiest languages to learn.

    - SQL standards make it even easier to understand and manage databases.

    - Works as a programming language and interactive language.'
