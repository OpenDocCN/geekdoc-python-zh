    Transformers. The following file transforms change the file object itself. This
    includes closing it (and releasing all OS resources) or change the position at
    which reading or writing happens.


    ```

    file.close()

    ```


    Close file f. The closed flag is set. Any further operations (except a redundant
    close) raise an IOError exception.


    ```

    file.seek(offset[, whence])

    ```


    Change the position from which file f will be processed. There are three values
    for whence which determine the direction of the move.


    If whence is 0 (the default), move to the absolute position given by offset. f.seek(0)
    will rewind file f.


    If whence is 1, move relative to the current position by offset bytes. If offset
    is negative, move backwards; otherwise move forward.


    If whence is 2, move relative to the end of file. f.seek(0,2) will advance file
    f to the end.


