- md: "## File Statements: Reading and Writing (but no Arithmetic)\n\nA file object\
    \ (like a sequence) can create an iterator which will yield the individual lines\
    \ of the file. We looked at how sequences work with the for statement in Looping\
    \ Back: Iterators, the for statement and Generators. Here, we'll use the file\
    \ object in a for statement to read all of the lines.\n\nAdditionally, the print\
    \ statement can make use of a file other than standard output as a destination\
    \ for the printed characters. This will change with Python 3.0, so we won't emphasize\
    \ this.\n\n### Opening and Reading From a File\n\nLet's say we have the following\
    \ file. If you use an email service like HotMail, Yahoo! or Google, you can download\
    \ an address book in Comma-Separated Values (CSV) format that will look similar\
    \ to this file. Yahoo!'s format will have many more columns than this example.\n\
    \n**name_addr.csv**\n\n```\n\"First\",\"Middle\",\"Last\",\"Nickname\",\"Email\"\
    ,\"Category\"\n\"Moe\",\"\",\"Howard\",\"Moe\",\"moe@3stooges.com\",\"actor\"\n\
    \"Jerome\",\"Lester\",\"Howard\",\"Curly\",\"curly@3stooges.com\",\"actor\"\n\"\
    Larry\",\"\",\"Fine\",\"Larry\",\"larry@3stooges.com\",\"musician\"\n\"Jerome\"\
    ,\"\",\"Besser\",\"Joe\",\"joe@3stooges.com\",\"actor\"\n\"Joe\",\"\",\"DeRita\"\
    ,\"CurlyJoe\",\"curlyjoe@3stooges.com\",\"actor\"\n\"Shemp\",\"\",\"Howard\",\"\
    Shemp\",\"shemp@3stooges.com\",\"actor\"\n```\n\nHere's a quick example that shows\
    \ one way to read this file using the file's iterator. This isn't the best way,\
    \ that will have to wait for The csv Module.\n\n```\ndataSource = file( \"name_addr.csv\"\
    , \"r\" )\nfor addr in dataSource:\n    print(addr)\ndataSource.close()\n```\n\
    \nWe create a Python file object for the name_addr.csv in the current working\
    \ directory in read mode. We call this object dataSource.\n\nThe for statement\
    \ creates an iterator for this file; the iterator will yield each individual line\
    \ from the file.\n\nWe can print each line.\n\nWe close the file when we're done.\
    \ This releases any operating system resources that our program tied up while\
    \ it was running.\n\n### A More Complete Reader\n\nHere's a program that reads\
    \ this file and reformats the individual records. It prints the results to standard\
    \ output. This approach to reading CSV files isn't very good. In the next chapter,\
    \ we'll look at the csv module that handles some of the additional details required\
    \ for a really reliable program.\n\n**nameaddr.py**\n\n```\n#!/usr/bin/env python\n\
    \"\"\"Read the name_addr.csv file.\"\"\"\ndataSource = file( \"name_addr.csv\"\
    , \"r\" )\nfor addr in dataSource:\n    # split the string on the ,s\n    quotes=\
    \ addr.split(\",\")\n    # strip the \"\"s from each field\n    fields= [ f.strip('\"\
    ') for f in quotes ]\n    print( fields[0], fields[1], fields[2], fields[4] )\n\
    dataSource.close()\n```\n\nWe open the file name_addr.csv in our current working\
    \ directory. The variable dataSource is our Python file object.\n\nThe for statement\
    \ gets an iterator from the file. It can then use the iterator, which yields the\
    \ individual lines of the file. Each line is a long string. The fields are surrounded\
    \ by \"s and are separated by ,s.\n\nWe use the split() function to break the\
    \ string up using the ,s. This particular process won't work if there are ,s inside\
    \ the quoted fields. We'll look at the csv module to see how to do this better.\n\
    \nWe use the strip() function to remove the \"s from each field. Notice that we\
    \ used a list comprehension to map from a list of fields wrapped in \"s to a list\
    \ of fields that are not wrapped in \"s.\n\n### Seeing Output with print\n\nThe\
    \ print() function does two things. When we introduced print() back in Seeing\
    \ Results: The print Statement, we hustled past both of these things because they\
    \ were really quite advanced concepts.\n\nWe covered strings in Sequences of Characters:\
    \ str and Unicode. We're covering files in this chapter. Now we can open up the\
    \ hood and look closely at the print() function.\n\nThe print() function evaluates\
    \ all of its expressions and converts them to strings. In effect, it calls the\
    \ str() built-in function for each argument value.\n\nThe print() function writes\
    \ these strings, separated by a separator character, sep. The default separator\
    \ is a space, ' '.\n\nThe print() function also writes an end character, end.\
    \ The default end is the newline character, '\\n'.\n\nThe print() function has\
    \ one more feature which can be very helpful to us. We can provide a file parameter\
    \ to redirect the output to a particular file.\n\nWe can use this to write lines\
    \ to sys.stderr.\n\n```\nfrom __future__ import print_function\nimport sys\nprint(\"\
    normal output\")\nprint(\"Red Alert!\", file=sys.stderr)\nprint(\"still normal\
    \ output\", file=sys.stdout)\n```\n\n- We enable the print function.\n- We import\
    \ the sys module.\n- We write a message to standard output using the undecorated\
    \ print statement.\n- We use the file parameter to write to sys.stderr.\n- We\
    \ also use the file parameter to write to sys.stdout.\n\nWhen you run this in\
    \ IDLE, you’ll notice that the error messages display in red, while the standard\
    \ output displays in blue.\n\n### Print Command\n\nHere is the syntax for an extension\
    \ to the print statement."
