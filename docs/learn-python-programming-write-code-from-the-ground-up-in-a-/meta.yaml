    \ .5 + .5 * self.y_train, 'bo')\n\n        plot(np.arange(self.n), self.training_reconstruction(),\
    \ 'rx')\n\n        ylim([-.1, 1.1])\n\n    def plot_test_predictions(self):\n\n\
