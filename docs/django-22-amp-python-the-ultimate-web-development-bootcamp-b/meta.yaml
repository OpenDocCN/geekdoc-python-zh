    # Introduction:


    Welcome to the chapter on Gunicorn! When you develop web applications, one of
    the critical steps is deploying the application to a production server. While
    Django''s built-in development server is excellent for development, it''s not
    suited for production. This is where Gunicorn comes in. Gunicorn is a Python Web
    Server Gateway Interface (WSGI) HTTP server that is highly efficient and lightweight,
    perfect for serving Django applications in production.


    # 1. Why Gunicorn?:


    Gunicorn, or "Green Unicorn", stands out for a few reasons:


    +   - Efficiency: Gunicorn works on the pre-fork worker model, meaning it forks
    multiple worker processes to handle incoming requests. This ensures optimal CPU
    usage and the capability to handle several simultaneous connections.


    +   - Compatibility: Gunicorn is compliant with WSGI, which means it can serve
    any Python application that implements the WSGI standard, including Django.


    +   - Simplicity: Its configuration and setup process are straightforward, making
    the transition from a development environment to production smooth.


    # 2. Installing Gunicorn:


    If you''ve set up a virtual environment for your Django project (as covered in
    Chapter 25), ensure you have it activated. Then, simply run:'
  - '[PAGE 170]


    ```


    pip install gunicorn

    ```


    This will fetch and install the latest version of Gunicorn and its dependencies.


    # 3. Testing Gunicorn with your Django Project:


    Navigate to your Django project directory. You can test if Gunicorn can serve
    your application using:


    ```


    gunicorn projectname.wsgi:application

    ```


    Replace `projectname` with the name of your Django project. If everything is set
    up correctly, you should see Gunicorn start and bind to `localhost` on port `8000`.


    # 4. Configuration:


    While the basic command can get Gunicorn up and running, in a production environment,
    you''ll likely need more customization. Here''s a basic Gunicorn configuration
    you can start with:


    ```

    bash

    gunicorn projectname.wsgi:application --bind 0.0.0.0:8000 --workers 3

    ```


    +   - `--bind 0.0.0.0:8000`: This tells Gunicorn to bind to all available network
    interfaces on port `8000`.


    +   - `--workers 3`: This starts Gunicorn with three worker processes. The optimal
    number of worker processes depends on the server''s hardware, but a general rule
    of thumb is to have a number of workers equal to twice the number of CPU cores
    available.'
  - '[PAGE 171]


    # 5. Integrating with Nginx:


    While Gunicorn is efficient, it''s not optimized to serve static files (e.g.,
    CSS, JavaScript). It''s common practice to use a web server like Nginx in front
    of Gunicorn to handle client requests, serve static files, and forward dynamic
    requests to Gunicorn.


    In the next chapter, "Nginx", we''ll dive deep into setting up Nginx as a reverse
    proxy for your Gunicorn server.


    # 6. Running Gunicorn as a Service:


    In a production environment, you''ll want Gunicorn to start automatically whenever
    the server reboots. For this, you can use a system manager like `systemd`.


    Here''s a basic example of a `systemd` service file for Gunicorn:


    ```

    bash

    [Unit]

    Description=gunicorn daemon for Django project

    After=network.target


    [Service]

    User=username

    Group=groupname

    WorkingDirectory=/path/to/your/django/project

    ExecStart=/path/to/your/virtualenv/bin/gunicorn projectname.wsgi:application --bind
    0.0.0.0:8000 --workers 3


    [Install]

    WantedBy=multi-user.target

    ```


    Replace placeholders (`username`, `groupname`, etc.) with appropriate values.
    Save this as `gunicorn.service`'
  - '[PAGE 172]


    in `/etc/systemd/system/`. Then, you can start and enable the service with:


    ```

    bash

    sudo systemctl start gunicorn

    sudo systemctl enable gunicorn

    ```


    # Conclusion:


    Congratulations! You''ve now set up Gunicorn to serve your Django project in a
    production environment. With its simplicity and efficiency, Gunicorn is a staple
    in the Django community for deployment. Remember to couple it with a robust web
    server like Nginx for the best performance.


