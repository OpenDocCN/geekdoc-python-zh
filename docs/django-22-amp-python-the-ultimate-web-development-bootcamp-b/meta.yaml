- img_proc: true
  md: '# 4. Organizing your Static Files:


    Inside the `static` directory, it''s common practice to create subdirectories
    for different types of static files. For example:


    +   - `css/` for CSS files.

    - `js/` for JavaScript files.

    - `img/` for image files.


    # 5. Using Bootstrap:


    Since we''re going to use Bootstrap to style our personal portfolio website, download
    the Bootstrap CSS and JS files from the official website. Place the CSS files
    in the `css/` subdirectory and the JS files in the `js/` subdirectory.


    # 6. Linking Static Files in Templates:


    When you want to use a static file in a Django template, you need to inform the
    template about your static files first. At the top of your template, include:


    ```

    html

    {% load static %}

    ```


    Now, if you want to link a CSS file, you can use:


    ```

    html

    <link rel="stylesheet" href="{% static ''css/bootstrap.min.css'' %}">

    ```


    For a JavaScript file:


    ```

    html

    <script src="{% static ''js/bootstrap.min.js'' %}"></script>

    ```


    And for an image:'
  merge: -1
  pgno: 145
- img_proc: true
  md: '```

    html

    <img src="{% static ''img/myimage.jpg'' %}" alt="My Image">

    ```


    # 7. Handling Static Files During Deployment:


    When you''re ready to deploy your website, you''ll run `python manage.py collectstatic`.
    This command tells Django to gather all static files from the various apps and
    the main `static` directory into the `STATIC_ROOT` directory. From there, you
    can serve these static files using a web server or a content delivery network
    (CDN).


    # Summary:


    In this chapter, we''ve delved into how to set up and use static files in Django.
    By now, you should have a solid understanding of how to organize, link, and deploy
    static files for your personal portfolio website. Remember, the proper organization
    is key to maintaining a scalable and efficient web application. In the next chapter,
    we''ll be polishing our portfolio website, ensuring it''s as sleek and professional
    as possible.


