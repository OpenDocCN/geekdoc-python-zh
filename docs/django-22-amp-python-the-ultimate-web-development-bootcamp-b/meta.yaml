    # Introduction:'
  - '[PAGE 55]


    URLs are the gateways to our web applications. They allow users to access different
    parts of a website, and in Django, they play a crucial role in determining how
    a request should be processed. In this chapter, we''ll delve deep into the world
    of Django URLs and understand how they tie into our Word Counter website project.


    # 1. What Are URLs?


    In the context of web development, a URL (Uniform Resource Locator) is a reference
    to a web resource that specifies its location on a computer network. Think of
    URLs as the address of a specific page, image, or file on the web.


    In Django, URLs are more than just addresses. They act as a roadmap for your Django
    application, directing incoming requests to the appropriate view functions.


    # 2. URL Configuration in Django:


    Django uses a URL dispatcher to match the requested URL with a list of patterns.
    This list is commonly known as the URL configuration or `urlpatterns`.


    Each URL pattern is associated with a view, which is essentially a Python function
    that handles what should be displayed or processed for that specific URL.


    # 3. Setting Up URL Configuration for Word Counter:


    Step 1: Start by creating a new file called `urls.py` inside the Word Counter
    app folder.


    Step 2: In `urls.py`, you''ll need to import a few modules:


    ```

    python

    from django.urls import path

    from . import views

    ```'
  - "[PAGE 56]\n\nStep 3: Set up the `urlpatterns` list, which will hold all of your\
    \ URL patterns. For our Word Counter project, let's start with the home page:\n\
    \n```\npython\nurlpatterns = [\n    path('', views.home, name=\"home\"),\n]\n\
    ```\n\nHere, `''` indicates the root URL (i.e., the home page), `views.home` is\
    \ the view function that should be called when this URL is accessed, and `name`\
    \ is an optional parameter that allows you to name your URL pattern.\n\n# 4. How\
    \ URL Patterns Work:\n\nEach pattern in `urlpatterns` is processed from top to\
    \ bottom until a match is found. The first pattern to match the requested URL\
    \ will be used, and its associated view will be executed.\n\nThe `path()` function\
    \ takes two required arguments:\n\n+   1. The route – a string representing the\
    \ URL pattern to match.\n2. The view – the function to execute when the pattern\
    \ matches.\n\nFor example, if a user accesses `http://yourwebsite.com/`, Django\
    \ will match it with the `''` pattern and execute the `views.home` function.\n\
    \n# 5. Dynamic URL Patterns:\n\nOften, we want our URLs to be dynamic. For instance,\
    \ if we want to display word count results for different texts, we might have\
    \ URLs like `/results/1/`, `/results/2/`, etc., where the number represents a\
    \ specific text's ID."
  - "[PAGE 57]\n\nTo achieve this, Django allows you to capture parts of the URL as\
    \ arguments. In our case, we can modify the `urlpatterns` as:\n\n```\npython\n\
    urlpatterns = [\n    path('results/<int:text_id>/', views.results, name=\"results\"\
    ),\n]\n```\n\nHere, `<int:text_id>` captures an integer from the URL and passes\
    \ it as an argument named `text_id` to the `views.results` function.\n\n# 6. Connecting\
    \ the App URLs to the Project:\n\nFinally, for our Word Counter app's URLs to\
    \ work, we need to include them in the project's main `urls.py` (found in the\
    \ main project folder).\n\nModify the main `urls.py` to include our app's URLs:\n\
    \n```\npython\nfrom django.contrib import admin\nfrom django.urls import path,\
    \ include\n\nurlpatterns = [\n    path('admin/', admin.site.urls),\n    path('',\
    \ include('wordcounter.urls')),\n]\n```\n\nThe `include()` function tells Django\
    \ to include the URL patterns from our Word Counter app.\n\n# Conclusion:"
