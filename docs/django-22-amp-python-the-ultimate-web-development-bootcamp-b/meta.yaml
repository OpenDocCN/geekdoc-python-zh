    # 1. Understanding Git Push


    `git push` is utilized to upload local repository content to a remote repository.
    After making your local changes and committing them, pushing transfers those changes
    to the remote repository so that others can view or even deploy them.


    Basic Syntax:


    ```


    git push [remote-name] [branch-name]

    ```


    For instance, if you want to push changes from your local master branch to a remote
    named origin (the default name given to the remote you cloned from), you''d use:'
