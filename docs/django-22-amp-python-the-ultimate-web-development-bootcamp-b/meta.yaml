    >\n</form>\n```\n\n这里，`{% url 'count' %}` 指的是表单数据将提交到的 URL。`csrf_token` 出于安全原因是必不可少的，可以防止跨站请求伪造攻击。\n\
    \n### 自动渲染：\n\nDjango 提供了渲染表单的快捷方式：\n\n```html\n<form method=\"post\" action=\"\
    {% url 'count' %}\">\n  {% csrf_token %}\n  {{ form.as_p }}\n  <input type=\"\
