- md: "# Django 2.2 & Python: The Ultimate Web Development Bootcamp\n\nBuild three\
    \ complete websites, learn back and front-end web development, and publish your\
    \ site online with DigitalOcean.\n\n## Course Content\n\n- Introduction\n\n###\
    \ Section 1: Python Refresher\n\n- Chapter 1: Install Python\n- Chapter 2: Variables,\
    \ Strings, Ints, and Print\n- Chapter 3: If Statements and Comments\n- Chapter\
    \ 4: Functions\n- Chapter 5: Lists\n- Chapter 6: Loops\n- Chapter 7: Dictionaries\n\
    - Chapter 8: Classes\n\n### Section 2: Project #1 - Word Counter Website\n\n-\
    \ Chapter 9: Project Intro\n- Chapter 10: Django Cheat Sheet\n- Chapter 11: Installing\
    \ Django\n- Chapter 12: Running the Django Server\n- Chapter 13: Project Tour\n\
    - Chapter 14: URLs\n- Chapter 15: Templates\n- Chapter 16: Forms\n- Chapter 17:\
    \ Counting the words\n- Chapter 18: Challenge\n- Chapter 19: Solution\n\n### Section\
    \ 3: Git\n\n- Chapter 20: Intro to Git\n- Chapter 21: Installing Git A-Z\n- Chapter\
    \ 22: Troubleshooting\n\n### Section 4: Project #2 - Your Personal Portfolio Website\n\
    \n- Chapter 23: Project Intro\n- Chapter 24: Sketch\n- Chapter 25: Virtualenv\n\
    - Chapter 26: Gitignore\n- Chapter 27: Apps\n- Chapter 28: Models\n- Chapter 29:\
    \ Admin\n- Chapter 30: psycopg2 fix\n- Chapter 31: Postgres\n- Chapter 32: Test\
    \ Your Skills - Blog Model\n- Chapter 33: Home Page\n- Chapter 34: Bootstrap\n\
    - Chapter 35: Show Jobs\n- Chapter 36: All Blogs\n- Chapter 37: Blog Detail\n\
    - Chapter 38: Static Files\n- Chapter 39: Polish\n\n### Section 5: VPS\n\n- Chapter\
    \ 40: Intro\n- Chapter 41: Digital Ocean\n- Chapter 42: Security\n- Chapter 43:\
    \ Postgres and Virtualenv\n- Chapter 44: Git Push and Pull\n- Chapter 45: Gunicorn\n\
    - Chapter 46: Nginx\n- Chapter 47: Domains\n\n### Section 6: Project #3 - Product\
    \ Hunt Clone Website\n\n- Chapter 48: Project Intro\n- Chapter 49: Sketch\n- Chapter\
    \ 50: Extending Templates\n- Chapter 51: Base Styling\n- Chapter 52: Sign Up\n\
    - Chapter 53: Login and Logout\n- Chapter 54: Products Model\n- Chapter 55: Creating\
    \ Products\n- Chapter 56: Iconic\n- Chapter 57: Product Details\n- Chapter 58:\
    \ Home Page\n- Chapter 59: Polish\n- Conclusion\n\n## Introduction\n\nAssets and\
    \ Resources:\n\n- Django Official Website ([Visit Here](https://www.djangoproject.com/))\n\
    - Python Official Website ([Visit Here](https://www.python.org/))\n- DigitalOcean's\
    \ Overview & Documentation ([Visit Here](https://www.digitalocean.com/docs/))\n\
    \nWelcome to \"Django 2.2 & Python: The Ultimate Web Development Bootcamp\". This\
    \ book is designed to be your one-stop guide to mastering the powerful combination\
    \ of Django, a high-level web framework, and Python, one of the world's most versatile\
    \ programming languages. By the end of this bootcamp, you will not only have built\
    \ three functional web applications but will also be equipped with the knowledge\
    \ and confidence to embark on your own web development projects.\n\n## Why Django\
    \ and Python?\n\nWhen venturing into the world of web development, the sheer number\
    \ of languages, frameworks, and tools can be overwhelming. So why focus on Django\
    \ and Python?\n\nPython is celebrated for its simplicity, versatility, and readability,\
    \ making it a top choice for beginners and seasoned developers alike. It powers\
    \ a myriad of applications, from simple scripts to machine learning algorithms\
    \ and large-scale web applications.\n\nDjango, on the other hand, was birthed\
    \ from Python's philosophy. Often referred to as the framework \"for perfectionists\
    \ with deadlines,\" Django makes it significantly faster to build high-quality\
    \ web applications. It's designed to avoid repetitive tasks and encourage the\
    \ rapid development of robust applications, making your development journey smoother\
    \ and more enjoyable.\n\n## What's Inside this Bootcamp?\n\nAs you delve into\
    \ the upcoming sections and chapters, here's what you can expect:\n\n1. Python\
    \ Refresher: Even if you've never written a line of Python code, we've got you\
    \ covered. We begin with the basics, ensuring you're well-equipped to tackle Django\
    \ with confidence.\n\n2. Three Comprehensive Projects: From a simple word-counting\
    \ website to your own portfolio and a clone of the renowned Product Hunt platform,\
    \ you'll be applying your newfound knowledge in practical, tangible ways.\n\n\
    3. Insights into Git: Dive into version control with Git, a must-know tool for\
    \ every developer. You'll learn why it's crucial, how to set it up, and how to\
    \ use it effectively.\n\n4. Deploying with DigitalOcean: We won't just leave you\
    \ with applications on your local machine. We'll guide you through deploying your\
    \ projects to a Virtual Private Server (VPS) on DigitalOcean, making them accessible\
    \ to the world.\n\n## Are You Ready?\n\nWhether you're a novice curious about\
    \ web development or a Python enthusiast eager to dip your toes into web frameworks,\
    \ this book is crafted for you. Our approach is hands-on, interspersed with challenges\
    \ and solutions, ensuring you not only consume content but also actively engage\
    \ with it.\n\nBefore you dive into the next sections, ensure you have a functioning\
    \ computer and a stable internet connection. While no prior experience with Django\
    \ or Python is required, a basic understanding of general programming concepts\
    \ will be beneficial.\n\nAnd most importantly, come with an open mind and a thirst\
    \ for knowledge. The world of web development is vast and fascinating, and we're\
    \ thrilled to be your guide on this journey.\n\n*Prepare yourself for an immersive,\
    \ enlightening, and, above all, fun exploration of Django 2.2 and Python. **Let's\
    \ begin!***\n\n## Section 1: Python Refresher\n\n## Install Python\n\nAssets and\
    \ Resources for this Chapter:\n\n- Python Installer: Available from the official\
    \ Python website ([Download here](https://www.python.org/downloads/))\n- Python\
    \ Documentation: Helpful for any installation troubleshooting or additional details\
    \ ([Visit here](https://docs.python.org/3/))\n\n## Introduction\n\nBefore we dive\
    \ into the world of Django, it's essential to familiarize ourselves with the foundational\
    \ language upon which it's built: Python. While Django is a powerful web framework,\
    \ Python is the heart and soul that powers it. In this chapter, we'll ensure you\
    \ have Python installed and set up correctly on your machine.\n\n## Why Python?\n\
    \nPython is one of the world's most popular programming languages. It is known\
    \ for its simplicity, readability, and vast array of libraries and frameworks,\
    \ making it versatile for everything from web development to data analysis to\
    \ artificial intelligence and more.\n\n## Choosing a Python Version\n\nWhile there\
    \ are multiple versions of Python available, as of writing this book, Python 3.9\
    \ is the latest stable release. It is always advisable to use the latest version\
    \ unless you have a specific need for an older version. Django 2.2, which we'll\
    \ be focusing on in this book, requires Python 3.5 or newer.\n\n## Steps to Install\
    \ Python:\n\n1. Visit the Official Python Website\n\n   Open your browser and\
    \ navigate to [Python's official website](https://www.python.org/downloads/).\n\
    \n2. Download the Installer\n\n   You'll see a button labeled \"Download Python\
    \ 3.9.x\" (or the latest version). Click on it to start the download.\n\n3. Run\
    \ the Installer\n\n   Once the download is complete, locate the installer in your\
    \ downloads folder and double-click to run it.\n\n   Important: Ensure you check\
    \ the box that says \"Add Python 3.9 to PATH\" before proceeding. This will allow\
    \ you to run Python from your command line or terminal without any extra configuration.\n\
    \n4. Choose Installation Options\n\n   For most users, the default installation\
    \ options will suffice. However, if you're an advanced user and want to customize\
    \ the installation, feel free to do so.\n\n   Click \"Install Now\" to begin the\
    \ installation process.\n\n5. Installation Complete\n\n   Once the installation\
    \ is finished, you'll see a screen indicating that Python was installed successfully.\n\
    \n6. Verify the Installation\n\n   Open your command line or terminal and type\
    \ `python --version` and press enter. This should return the version number, confirming\
    \ that Python was installed correctly.\n\n## Potential Issues and Troubleshooting:\n\
    \n- If you receive an error when trying to verify the installation, it's possible\
    \ that Python wasn't added to your system's PATH. Make sure you checked the \"\
    Add Python to PATH\" option during installation.\n\n- On some systems, you might\
    \ need to use `python3` instead of `python` to invoke Python.\n\n## Conclusion"
  mdcn: "# Django 2.2 & Python：终极 Web 开发训练营\n\n构建三个完整的网站，学习后端和前端 Web 开发，并使用 DigitalOcean\
    \ 将您的网站发布到线上。\n\n## 课程内容\n\n- 简介\n\n### 第 1 节：Python 快速复习\n\n- 第 1 章：安装 Python\n\
    - 第 2 章：变量、字符串、整数和打印\n- 第 3 章：If 语句和注释\n- 第 4 章：函数\n- 第 5 章：列表\n- 第 6 章：循环\n-\
    \ 第 7 章：字典\n- 第 8 章：类\n\n### 第 2 节：项目 #1 - 字数统计网站\n\n- 第 9 章：项目简介\n- 第 10 章：Django\
    \ 速查表\n- 第 11 章：安装 Django\n- 第 12 章：运行 Django 服务器\n- 第 13 章：项目导览\n- 第 14 章：URL\n\
    - 第 15 章：模板\n- 第 16 章：表单\n- 第 17 章：统计字数\n- 第 18 章：挑战\n- 第 19 章：解决方案\n\n### 第 3\
    \ 节：Git\n\n- 第 20 章：Git 简介\n- 第 21 章：全面安装 Git\n- 第 22 章：故障排除\n\n### 第 4 节：项目 #2\
    \ - 您的个人作品集网站\n\n- 第 23 章：项目简介\n- 第 24 章：草图\n- 第 25 章：Virtualenv\n- 第 26 章：Gitignore\n\
    - 第 27 章：应用\n- 第 28 章：模型\n- 第 29 章：后台管理\n- 第 30 章：psycopg2 修复\n- 第 31 章：Postgres\n\
    - 第 32 章：技能测试 - 博客模型\n- 第 33 章：首页\n- 第 34 章：Bootstrap\n- 第 35 章：展示工作\n- 第 36 章：所有博客\n\
    - 第 37 章：博客详情\n- 第 38 章：静态文件\n- 第 39 章：润色\n\n### 第 5 节：VPS\n\n- 第 40 章：简介\n- 第\
    \ 41 章：Digital Ocean\n- 第 42 章：安全\n- 第 43 章：Postgres 和 Virtualenv\n- 第 44 章：Git\
    \ Push 和 Pull\n- 第 45 章：Gunicorn\n- 第 46 章：Nginx\n- 第 47 章：域名\n\n### 第 6 节：项目\
    \ #3 - Product Hunt 克隆网站\n\n- 第 48 章：项目简介\n- 第 49 章：草图\n- 第 50 章：扩展模板\n- 第 51\
    \ 章：基础样式\n- 第 52 章：注册\n- 第 53 章：登录和登出\n- 第 54 章：产品模型\n- 第 55 章：创建产品\n- 第 56 章：Iconic\n\
    - 第 57 章：产品详情\n- 第 58 章：首页\n- 第 59 章：润色\n- 结语\n\n## 简介\n\n资源与参考资料：\n\n- Django\
    \ 官方网站（[点击访问](https://www.djangoproject.com/)）\n- Python 官方网站（[点击访问](https://www.python.org/)）\n\
    - DigitalOcean 概览与文档（[点击访问](https://www.digitalocean.com/docs/)）\n\n欢迎阅读《Django\
    \ 2.2 & Python：终极 Web 开发训练营》。本书旨在成为您掌握 Django（一个高级 Web 框架）和 Python（世界上用途最广泛的编程语言之一）这一强大组合的一站式指南。到本训练营结束时，您不仅将构建三个功能完备的\
    \ Web 应用程序，还将获得开启自己 Web 开发项目所需的知识和信心。\n\n## 为什么选择 Django 和 Python？\n\n当您踏入 Web\
    \ 开发的世界时，大量的语言、框架和工具可能会让人不知所措。那么为什么要专注于 Django 和 Python 呢？\n\nPython 以其简洁性、多功能性和可读性而备受赞誉，使其成为初学者和资深开发者的首选。它为无数应用提供支持，从简单的脚本到机器学习算法，再到大规模\
    \ Web 应用程序。\n\n另一方面，Django 诞生于 Python 的哲学。它常被称为\"为有截止日期的完美主义者\"准备的框架，Django 让您能够显著更快地构建高质量的\
    \ Web 应用程序。它的设计旨在避免重复性任务，并鼓励快速开发健壮的应用程序，让您的开发之旅更加顺畅和愉快。\n\n## 本训练营包含哪些内容？\n\n\
    当您深入接下来的章节时，您可以期待以下内容：\n\n1. Python 快速复习：即使您从未写过一行 Python 代码，我们也为您做好了准备。我们从基础开始，确保您有信心应对\
    \ Django。\n\n2. 三个综合项目：从一个简单的字数统计网站到您自己的作品集，再到著名的 Product Hunt 平台的克隆，您将以实用、具体的方式应用您新学到的知识。\n\
    \n3. Git 深入解析：深入了解版本控制工具 Git，这是每位开发者必须掌握的工具。您将了解它为何至关重要、如何设置以及如何有效使用它。\n\n4. 使用\
    \ DigitalOcean 部署：我们不会让您只在本地机器上运行应用程序。我们将指导您将项目部署到 DigitalOcean 的虚拟专用服务器（VPS）上，让全世界都能访问它们。\n\
    \n## 您准备好了吗？\n\n无论您是对 Web 开发充满好奇的新手，还是渴望涉足 Web 框架的 Python 爱好者，本书都是为您量身打造的。我们的方法是实践导向的，穿插着挑战和解决方案，确保您不仅吸收内容，还能积极参与其中。\n\
    \n在深入下一节之前，请确保您有一台功能正常的电脑和稳定的网络连接。虽然不需要有 Django 或 Python 的先前经验，但对一般编程概念的基本理解将会有所帮助。\n\
    \n最重要的是，带着开放的心态和对知识的渴望而来。Web 开发的世界广阔而迷人，我们很荣幸能成为您这段旅程的向导。\n\n*为一次沉浸式、启发性，最重要的是**充满乐趣**的\
    \ Django 2.2 和 Python 探索做好准备。**让我们开始吧！***\n\n## 第 1 节：Python 快速复习\n\n## 安装 Python\n\
    \n本章的资源与参考资料：\n\n- Python 安装程序：可从 Python 官方网站获取（[点击下载](https://www.python.org/downloads/)）\n\
    - Python 文档：有助于任何安装故障排除或获取额外详情（[点击访问](https://docs.python.org/3/)）\n\n## 简介\n\n\
    在我们深入 Django 的世界之前，熟悉它所构建的基础语言至关重要：Python。虽然 Django 是一个强大的 Web 框架，但 Python 才是驱动它的核心与灵魂。在本章中，我们将确保您在机器上正确安装并设置了\
    \ Python。\n\n## 为什么选择 Python？\n\nPython 是世界上最受欢迎的编程语言之一。它以其简洁性、可读性以及庞大的库和框架生态系统而闻名，使其在从\
    \ Web 开发到数据分析再到人工智能等各个领域都具有多功能性。\n\n## 选择 Python 版本\n\n虽然有多个 Python 版本可供选择，但在撰写本书时，Python\
    \ 3.9 是最新的稳定版本。除非您有特定需要使用旧版本，否则始终建议使用最新版本。我们将在本书中重点介绍的 Django 2.2 需要 Python 3.5\
    \ 或更新版本。\n\n## 安装 Python 的步骤：\n\n1. 访问 Python 官方网站\n\n   打开浏览器，导航至 [Python 官方网站](https://www.python.org/downloads/)。\n\
    \n2. 下载安装程序\n\n   您会看到一个标有\"Download Python 3.9.x\"（或最新版本）的按钮。点击它开始下载。\n\n3. 运行安装程序\n\
    \n   下载完成后，在下载文件夹中找到安装程序并双击运行。\n\n   重要提示：在继续之前，请确保勾选\"Add Python 3.9 to PATH\"\
    选项。这将允许您从命令行或终端运行 Python，无需额外配置。\n\n4. 选择安装选项\n\n   对于大多数用户，默认安装选项就足够了。但是，如果您是高级用户并希望自定义安装，请随意操作。\n\
    \n   点击\"Install Now\"开始安装过程。\n\n5. 安装完成\n\n   安装完成后，您将看到一个屏幕，指示 Python 已成功安装。\n\
    \n6. 验证安装\n\n   打开命令行或终端，输入 `python --version` 并按回车键。这应该返回版本号，确认 Python 已正确安装。\n\
    \n## 潜在问题与故障排除：\n\n- 如果您在尝试验证安装时收到错误，可能是 Python 未添加到系统的 PATH 中。请确保您在安装过程中勾选了\"\
    Add Python to PATH\"选项。\n\n- 在某些系统上，您可能需要使用 `python3` 而不是 `python` 来调用 Python。\n\
    \n## 结语"
