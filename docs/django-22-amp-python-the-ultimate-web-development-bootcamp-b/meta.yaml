    # ## 2. Understanding Git Pull


    On the other hand, `git pull` is used to fetch changes made in the remote repository
    and merge them into your local working branch. This ensures that you are working
    with the most recent codebase.


    Basic Syntax:


    ```


    git pull [remote-name] [branch-name]

    ```


    For example, to fetch changes from the origin''s master branch:


    ```


    git pull origin master

    ```


    # ## 3. Working with a VPS


    When deploying to a VPS, especially with services like DigitalOcean, you might
    use Git to transfer (or push) your web application''s code from your local machine
    to your server. Here''s how this can work:


    +   1. Setting Up the Remote Repository on VPS: Log in to your VPS and navigate
    to your project directory. Then, initialize a bare Git repository:


    ```


    git init —bare myproject.git

    ```'
  merge: -1
  pgno: 166
- img_proc: true
  md: '2. Pushing to VPS: On your local machine, add your VPS as a remote repository:


    ```


    git remote add vps user@your_server_ip:/path/to/myproject.git

    ```


    Now, you can push your local changes directly to your VPS:


    ```


    git push vps master

    ```


    3. Setting Up a Post-Receive Hook: To automate the deployment process on your
    VPS, you can use a post-receive hook. This is a script that Git executes after
    receiving changes. For example, you can set it up to move the code to your web
    directory and restart the server whenever you push changes.


    # 4. Handling Merge Conflicts


    Sometimes when you `pull` changes from the remote repository, Git may not be able
    to merge the changes automatically. This usually happens when changes occur in
    the same parts of a file on both sides. When this happens, Git will notify you
    of a "merge conflict".


    Resolving merge conflicts involves:


    +   1. Opening the conflicted file and looking for the conflict markers `<<<<<<<`,
    `=======`, and `>>>>>>>`. The changes from the remote branch will be on top (between
    `<<<<<<<` and `=======`), and your changes will be below (between `=======` and
    `>>>>>>>`).


    +   2. Decide which changes you want to keep or merge the changes manually as
    needed.


    +   3. Save the file.'
