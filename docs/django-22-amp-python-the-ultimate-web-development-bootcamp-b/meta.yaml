    - `widget=forms.Textarea` 指定此字符字段应在 HTML 中显示为文本区域。\n\n### 在模板中渲染表单：\n\nDjango\
    \ 提供了两种主要的表单渲染方式：\n\n1. 手动渲染\n2. 自动渲染\n\n### 手动渲染：\n\n使用此方法，你可以自由设计表单。以下是在 Django\
    \ 模板中手动渲染我们的 `TextForm` 的方法：\n\n```html\n<form method=\"post\" action=\"{% url\
    \ 'count' %}\">\n    {% csrf_token %}\n    {{ form.text_input.label_tag }} <br>\n\
