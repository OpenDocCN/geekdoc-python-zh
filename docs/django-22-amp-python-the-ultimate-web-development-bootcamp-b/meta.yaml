    # Introduction


    In the world of web development, one of the most important aspects is presenting
    data to users in a manner that''s understandable and visually appealing. That''s
    where templates come into play. A template, in Django, is a way to generate HTML
    dynamically. You can think of it as a tool that allows you to mix Python with
    HTML, allowing you to create dynamic web pages.


    # Why Use Templates?


    Using templates provides several advantages:


    +   1. Separation of Concerns: By keeping your presentation logic separate from
    your business logic, your code becomes cleaner, more maintainable, and easier
    to debug.

    2. Reusability: Templates can be reused across different views, which reduces
    redundancy.

    3. Flexibility: Templates can be easily updated without affecting the backend
    logic.'
  - "[PAGE 59]\n\n# Setting Up Templates in Django\n\nDjango uses its template engine\
    \ by default, but it can also be configured to use other engines like Jinja2.\
    \ Here's how to set it up:\n\n+   1. In your Django project, inside your app directory,\
    \ create a new directory named `templates`.\n\n+   2. Inside the `templates` directory,\
    \ create another directory with the name of your app (in our case, it might be\
    \ `wordcounter`).\n\n+   3. Any HTML file you place inside this directory will\
    \ be considered a template by Django.\n\n# Your First Template\n\nLet's create\
    \ a simple template to display a welcome message for our Word Counter Website.\n\
    \n+   1. Inside the `wordcounter` directory (which is inside `templates`), create\
    \ a new file named `welcome.html`.\n\n+   2. Open `welcome.html` in your text\
    \ editor and write the following code:\n\n```\nhtml\n<!DOCTYPE html>\n<html>\n\
    <head>\n  <title>Welcome to Word Counter</title>\n</head>\n<body>\n  <h1>Welcome\
    \ to Word Counter!</h1>\n  <p>This website will help you count the frequency of\
    \ words in any given text.</p>\n</body>\n</html>\n```"
- md: "# Rendering a Template\n\nTo display this template when a user visits our website,\
    \ we need to set up a view:\n\n1. In `views.py`, import `render` at the top:\n\
    \n```python\nfrom django.shortcuts import render\n```\n\n2. Add the following\
    \ view function:\n\n```python\ndef welcome(request):\n    return render(request,\
    \ 'wordcounter/welcome.html')\n```\n\n3. Now, set up a URL pattern to map to this\
    \ view. In `urls.py`, add:\n\n```python\nfrom django.urls import path\nfrom .\
    \ import views\n\nurlpatterns = [\n    path('', views.welcome, name='welcome'),\n\
    ]\n```\n\nNow, when you run your server and navigate to the root URL, you should\
    \ see the welcome message from the template.\n\n---\n\n## Dynamic Content in Templates\n\
    \nOne of the key benefits of templates is the ability to display dynamic content.\
    \ Let's say you want to display the user's name in the welcome message.\n\n1.\
    \ Modify the `welcome` view in `views.py`:\n\n```python\ndef welcome(request):\n\
    \    user_name = \"John\"\n    return render(request, 'wordcounter/welcome.html',\
    \ {'name': user_name})\n```\n\n2. Update the `welcome.html` template to display\
    \ this dynamic data:\n\n```html\n<h1>Welcome to Word Counter, {{ name }}!</h1>\n\
    ```\n\nWhen you refresh the page, you should see \"Welcome to Word Counter, John!\"\
    \n\n## Template Tags and Filters\n\nDjango templates come with built-in tags and\
