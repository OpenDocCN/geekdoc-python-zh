    # 1. What Are URLs?


    In the context of web development, a URL (Uniform Resource Locator) is a reference
    to a web resource that specifies its location on a computer network. Think of
    URLs as the address of a specific page, image, or file on the web.


    In Django, URLs are more than just addresses. They act as a roadmap for your Django
    application, directing incoming requests to the appropriate view functions.


    # 2. URL Configuration in Django:


    Django uses a URL dispatcher to match the requested URL with a list of patterns.
    This list is commonly known as the URL configuration or `urlpatterns`.


    Each URL pattern is associated with a view, which is essentially a Python function
    that handles what should be displayed or processed for that specific URL.


    # 3. Setting Up URL Configuration for Word Counter:


    Step 1: Start by creating a new file called `urls.py` inside the Word Counter
    app folder.


    Step 2: In `urls.py`, you''ll need to import a few modules:


    ```

    python

    from django.urls import path

    from . import views

    ```'
