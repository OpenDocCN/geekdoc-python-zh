    # Relationships


    Often, you''ll want to define relationships between models. Django offers three
    ways to define relationships:


    +   1. **ForeignKey**: A many-to-one relationship. For instance, if you have a
    `Blog` model and each blog post is written by a `User`, the `Blog` model might
    have a `ForeignKey` to the `User` model.


    +   2. **OneToOneField**: A one-to-one relationship. For instance, if each `User`
    has one profile, you''d use a `OneToOneField` to link the `User` model to a `Profile`
    model.'
