    Once you''ve copied your key, modify the SSH configuration to disable password
    authentication.


    ```

    bash

    sudo nano /etc/ssh/sshd_config

    ```


    Find the line that says `PasswordAuthentication` and change it to `no`. Also,
    ensure `PermitRootLogin` is set to `no` to disable root logins. After making these
    changes, restart the SSH service:


    ```

    bash

    sudo service ssh restart

    ```


    # ## 2. Setting Up a Firewall with UFW


    UFW, or Uncomplicated Firewall, is a simple interface to manage iptables, the
    user space utility for managing packet filtering in Linux.


    +   - First, ensure UFW is installed:


