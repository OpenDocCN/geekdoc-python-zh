    # Introduction


    Before we dive into building our first project, the Word Counter Website, we need
    to lay the groundwork. That means setting up Django on our machine. In this chapter,
    we''ll learn how to install Django, a powerful web framework written in Python.


    # What is Django?


    Django is a high-level Python web framework that encourages rapid design and a
    clean, pragmatic design. Built by experienced developers, it takes care of much
    of the web development, so you can focus on writing your app without needing to
    reinvent the wheel. It''s free and open source.


    # Pre-requisites


    +   1. Python: Make sure you have Python installed on your machine. We installed
    and set up Python in Chapter 1.

    2. pip: This is Python''s package manager. It allows you to install and manage
    additional libraries and dependencies that are not distributed as part of the
    standard library.


    # Step-by-Step Guide to Install Django


    +   1. Check Python & pip Version


    Before we proceed, let''s check the installed versions of Python and pip.


    Open your terminal or command prompt and type:'
  - '[PAGE 47]


    ```

    bash

    python —version

    pip —version

    ```


    You should see the versions you have installed for both. Ensure your Python version
    is above 3.x.


    # 2. Install Django


    With pip in place, installing Django is a breeze. In your terminal or command
    prompt, type:


    ```

    bash

    pip install django==2.2

    ```


    This will install Django version 2.2, which is the version we will be using for
    our project.


    # 3. Verify Django Installation


    After installation, it''s always a good practice to verify. Let''s check which
    version of Django got installed:


    ```

    bash

    python -m django —version

    ```


    This should return "2.2", indicating that the installation was successful.


    # Setting Up a Virtual Environment (Recommended)


    While it''s not strictly necessary for this project, in real-world development,
    it''s a common practice to use virtual environments. A virtual environment is
    a self-contained directory that contains a Python installation for a particular
    version of Python, plus a number of additional packages.


    Benefits:'
  - '[PAGE 48]


    +   - Multiple projects can have different versions of packages (even Python itself).

    - Keeps your global site-packages directory clean and manageable.


    # Steps to Set Up a Virtual Environment:


    1. Install virtualenv:


    ```

    bash

    pip install virtualenv

    ```


    2. Create a new virtual environment: Navigate to your project directory and run:


    ```

    bash

    virtualenv projectname_env

    ```


    This will create a new folder named `projectname_env` in your project directory.
    This folder contains all the necessary executables to use the packages that a
    Python project would need.


    3. Activate the virtual environment:


    - On macOS and Linux:


    ```

    bash

    source projectname_env/bin/activate

    ```


    - On Windows:


    ```

    bash

    projectname_env\Scripts\activate

    ```


    Once activated, you''ll notice your terminal''s prompt changes to show the name
    of the activated environment. Now, when you install something, it''s installed
    to this environment specifically and not globally.'
