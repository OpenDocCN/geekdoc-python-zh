  md: "Step 3: Set up the `urlpatterns` list, which will hold all of your URL patterns.\
    \ For our Word Counter project, let's start with the home page:\n\n```\npython\n\
    urlpatterns = [\n    path('', views.home, name=\"home\"),\n]\n```\n\nHere, `''`\
    \ indicates the root URL (i.e., the home page), `views.home` is the view function\
    \ that should be called when this URL is accessed, and `name` is an optional parameter\
    \ that allows you to name your URL pattern.\n\n# 4. How URL Patterns Work:\n\n\
    Each pattern in `urlpatterns` is processed from top to bottom until a match is\
    \ found. The first pattern to match the requested URL will be used, and its associated\
    \ view will be executed.\n\nThe `path()` function takes two required arguments:\n\
    \n+   1. The route – a string representing the URL pattern to match.\n2. The view\
    \ – the function to execute when the pattern matches.\n\nFor example, if a user\
    \ accesses `http://yourwebsite.com/`, Django will match it with the `''` pattern\
    \ and execute the `views.home` function.\n\n# 5. Dynamic URL Patterns:\n\nOften,\
    \ we want our URLs to be dynamic. For instance, if we want to display word count\
    \ results for different texts, we might have URLs like `/results/1/`, `/results/2/`,\
    \ etc., where the number represents a specific text's ID."
