    # # Running the Django Server


    Assets and Resources:


    +   - Django framework (You can acquire this by running the command `pip install
    django` in your terminal or command prompt.)

    - A computer with Python and Django installed.


    Django, as a web framework, provides developers with a built-in lightweight web
    server that is immensely useful during the development phase. This web server
    is not intended for production use but is more than adequate for local development
    and testing. In this chapter, we will delve into how to start the Django server,
    understand its output, and also look at some common issues that you might encounter.


    # ## Starting the Django Development Server'
  - '[PAGE 50]


    +   1. Navigate to Your Project: Before you can start the server, ensure you are
    in the directory where your Django project''s `manage.py` file resides. You can
    navigate using your terminal or command prompt:


    ```

    bash

    cd path_to_your_project

    ```


    +   2. Run the Server: Once you''re in the correct directory, use the following
    command to start the Django development server:


    ```

    bash

    python manage.py runserver

    ```


    +   3. By default, the server will start on port 8000. If you want to specify
    a different port, simply add it after the `runserver` command, like this:


    ```

    bash

    python manage.py runserver 8080

    ```


    This will start the server on port 8080.


    # Understanding the Output


    When you start the server, you will see output in the terminal that looks something
    like this:


    ```


    Starting development server at http://127.0.0.1:8000/

    Quit the server with CTRL+C.

    ```


    This output indicates that your server is running. You can access the server by
    going to the provided URL (`http://127.0.0.1:8000/`) in your web browser.'
  - '[PAGE 51]


    # Common Issues & Troubleshooting


    +   1. Port is Already in Use: If you see an error like `Error: That port is already
    in use`, it means another service or application is using the default port (8000).
    You can either close the other application or specify a different port as mentioned
    above.

    2. Missing manage.py: If you get an error saying `manage.py not found`, it means
    you are not in the correct directory. Navigate to your project directory and try
    again.

    3. ModuleNotFoundError: If you get an error related to a missing module, it''s
    likely you haven''t installed all required dependencies. Ensure you''ve installed
    Django and any other necessary libraries for your project.


    # Stopping the Server


    To stop the Django development server, you can press `CTRL+C` in the terminal.
    You''ll know the server has stopped when you see a line indicating the process
    has ended and you get back to the command prompt.


    # Conclusion


    Running the Django development server is a crucial step in building and testing
    your web applications locally. It provides a quick and convenient way to view
    your changes in real-time. In the next chapter, we''ll take a tour of our "Word
    Counter" project, familiarizing ourselves with its structure and components.


    Remember, while the Django development server is fantastic for local testing and
    development, it is not meant for production. When you''re ready to deploy your
    website to the public, you''ll want to use a more robust server setup, which we
    will discuss in later sections.'
