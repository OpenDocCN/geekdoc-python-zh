    be handy as our project grows.


    +   - JSON Support: Modern web apps often work with JSON data, and Postgres has
    excellent built-in support for JSON columns.


    +   - ACID Compliance: This ensures data integrity and reliability by following
    a set of properties - Atomicity,'
