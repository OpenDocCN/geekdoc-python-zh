  md: "```\npython\nfrom django.views.generic.detail import DetailView\nfrom .models\
    \ import Blog\n```\n\n+   2. Create the `BlogDetailView` using the `DetailView`:\n\
    \n```\npython\nclass BlogDetailView(DetailView):\n    model = Blog\n    template_name\
    \ = 'blog/detail.html'\n    context_object_name = 'blog'\n```\n\nHere, we're specifying\
    \ the model (`Blog`), the template we'll use, and the context variable name.\n\
    \n# Step 2: Setting up the URL Pattern for the Detail View\n\n+   1. Open `urls.py`\
    \ of your blog app and import the view:\n\n```\npython\nfrom .views import BlogDetailView\n\
    ```\n\n+   2. Add a URL pattern for the detail view:\n\n```\npython\npath('blog/<int:pk>/',\
    \ BlogDetailView.as_view(),\nname='blog_detail'),\n```\n\nThis pattern means that\
    \ any URL like `/blog/1/` will show the detail for the blog with primary key (pk)\
    \ 1.\n\n# Step 3: Creating the Blog Detail Template\n\nCreate a new file in your\
    \ `blog/templates/blog` directory named `detail.html`. This will be the template\
    \ for our blog details."
