  - "[PAGE 13]\n\nAt its heart, an if statement is a simple decision-making tool that\
    \ Python provides. It evaluates an expression and, based on whether that expression\
    \ is `True` or `False`, will execute a block of code.\n\n# Basic If Statement\n\
    \n```\npython\nx = 10\n\nif x > 5:\n    print(\"x is greater than 5\")\n```\n\n\
    In the code above, Python checks if the value of `x` is greater than 5. If it\
    \ is, the message \"x is greater than 5\" is printed to the console.\n\n# If-Else\
    \ Statement\n\nOften, you'll want to have an alternative action in case the if\
    \ condition isn't met:\n\n```\npython\nx = 3\n\nif x > 5:\n    print(\"x is greater\
    \ than 5\")\nelse:\n    print(\"x is not greater than 5\")\n```\n\n# If-Elif-Else\
    \ Statement\n\nFor multiple conditions, Python provides the `elif` keyword:\n\n\
    ```\npython\nx = 5\n```"
