    # 1. Variables:


    A variable in Python is like a container or storage location that holds data values.
    A variable is assigned with a value, and you can change this value based on your
    needs.


    Syntax:


    ```

    python

    variable_name = value

    ```


    Example:


    ```

    python

    greeting = "Hello, World!"

    ```


    In this example, `greeting` is a variable that holds the string "Hello, World!".


    # 2. Strings:


    Strings in Python are a sequence of characters, enclosed within single ('' '')
    or double (" ") quotes.


    Examples:


    ```

    python

    name = "John"

    message = ''Welcome to the world of Python!''

    ```


    String Concatenation:


    You can also combine or concatenate strings using the `+` operator:


    ```

    python

    first_name = "John"

    last_name = "Doe"

    ```'
