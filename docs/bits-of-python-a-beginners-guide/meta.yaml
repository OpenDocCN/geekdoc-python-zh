    # And, Or, and Not


    Now let’s get a bit more complex.


    I’m sure all of you know what the words **and**, **or**, and **not** mean, and
    in the context of coding, they are quite similar.


    *And* means that both conditions must be *True* for the whole statement to be
    *True*


    *Or* means that one of the conditions have to be *True* for the statement to be
    *True*


    *Not* reverses the result of the condition (*True* => *False*, *False* => *True*)'
