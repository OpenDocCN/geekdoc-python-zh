    ## 第七章：输入与输出


    当你在谷歌中输入内容时，这被称为**输入**，我们可以在Python中使用**input()**来实现相同的功能。


    你将通过在终端中输入来提供数据。无论你在终端中输入什么，它都是一个字符串。即使你输入数字10，它也会被转换为字符串，因此它看起来会像这样：“10”


    让我们开始一个新项目，在这个项目中，你将在终端中输入你的名字，你的代码将通过重复你的名字来回应你。首先，让我们从用户输入开始：


    ```

    input("What is your name?: ")

    ```


    如上所示，我们可以为用户提供一个提示，告诉他们在终端中输入什么。提示必须是用单引号或双引号括起来的字符串。


    现在我们已经写下了输入，我们必须编写代码来回应你。


    当我们尝试这个时，我们很快遇到了如何将你的名字从终端传回程序的问题，但这可以通过使用变量来解决。如果我们为输入命令分配一个变量，该变量将保存用户输入。


    ```

    Name = input("What is your name?: ")

    ```


    现在你的输入已经存储好了，我们可以打印它了！


    ```

    Name = input("What is your name?: ")

    print(Name)

    ```


    好了，你现在知道如何接收和使用来自程序的输入了。


    如果我们想让程序说“Hello”然后加上我们的名字，我们必须添加一个小的补充：


    ```

    Name = input("What is your name?: ")

    print("Hello" + Name)

    ```


    如字符串章节所示，这将打印“Hello”然后是你的名字。


    ## 第八章：数据类型转换


    这是一个测试你到目前为止Python知识的谜题：


    ```

    Number = input("Pick a number: ")


    Half = Number / 2


    print(Half)

    ```


    如果你说输入总是一个字符串，而字符串不能用于数学运算，那么你是正确的！


    这就引出了一个问题，我们如何从用户那里获取输入并对它们进行数学运算？


    这就是**数据类型转换**的用武之地。字符串、整数、布尔值和浮点数都是不同的**数据类型**，你可以通过说出类型的名称，然后将要转换的内容括在括号中来在它们之间进行转换。


    *字符串 <=> 整数/浮点数*


    例如，我们只需使用**int()**就可以解决之前的问题：


    ```

    Number = input("Pick a number: ")


    Half = int(Number) / 2


    print(Half)

    ```


    这将使*Number*成为一个真正的整数，从而允许它被2除。


    但是，请注意，*Number*必须是一个实际的数字，转换才不会产生错误。你不能将像“ten”或“cat”这样的字符串转换为整数，因为它们没有整数版本，但*int("12")*将返回数字12。


    只要字符串具有浮点表示，浮点转换也是相同的。浮点转换的命令是**float()**，所以*float("12")*将返回12.0。


    同样，反向操作也可以，我们可以将整数或浮点数转换为字符串，没有任何限制（任何东西都可以是字符串）。需要注意的是，当将某些内容转换为字符串时，命令是**str()**，而不是**string()**


    ### *整数 <=> 浮点数*


    将整数转换为浮点数时，它只是在末尾添加一个额外的.0，所以*float(20)*是20.0。


    同样，反向操作也可以，*int(20.0)*将得到20。


    ### *布尔值 <=> 任何类型*


    对于布尔值，我们也可以转换它们，只是工作方式有点不同。*True*布尔值对应于1，而*False*布尔值对应于0。


    这意味着如果我们执行*int(True)*，我们得到1，如果我们执行*int(False)*，我们得到0。它们的浮点表示只是在每个末尾添加一个.0。


    布尔转换使用**bool()**命令，所以执行**bool(1)**或**bool(0)**分别得到True和False。字符串转换与普通转换相同，*str(True)*得到字符串“True”，*str(False)*得到“False”。


    ## 第九章：库


    让我们暂时从数据类型和输入中抽离出来，谈谈**库**。我们指的不是实际的物理图书馆，而是非常相似的东西，只是以数字形式存在。


    用更熟悉的术语来说，编程中的库可以看作是一个书架，上面放着许多不同的书。每本书代表该库中可用的不同命令。


    例如，Python中的*math*库可以找到某个东西的绝对值，可以找到一个数的阶乘，以及许多更复杂的数学运算，而你甚至不需要编写所有这些代码，你所要做的就是使用称为**方法**的小命令来执行它们。


    库就像Python的一个外部部分，与你的程序分开：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_62_0.png)


    为了能够访问库，我们需要使用一个称为**import**的命令：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_63_0.png)


    如果我们想导入math库，在程序开始时，我们会说*import math*。就这么简单！


    确保所有你想使用的库都在程序的开始，因为如果你在开始使用库中的方法之后才导入它，Python将无法使用它（记住Python是从上到下读取的）。


    这是一个我们刚刚讨论的math库的例子：


    ```

    import math


    x = math.factorial(7)


    print(x)

    ```


    如你所见，导入这些库并不太难。


    要使用这些方法，你所要做的就是输入库的名称，后跟一个点和你想使用的方法类型，如我们分配给变量*x*的*math.factorial(7)*所示。


    这个程序将打印7*6*5*4*3*2*1的结果，即5040。


    ### As


    如果库的名称太长而难以输入（相信我，有些库输入起来会变得非常烦人），你可以使用**as**和import命令一起将库的名称缩短为你选择的任何名称：


    ```

    import math as m


    x = m.factorial(7)


    print(x)

    ```


    如你所见，一切正常。


    如果你尝试一下，你会看到我们得到了相同的结果5040。


    我们将使用的两个常见的Python库是*Math*库和*Random*库，但你可以随意搜索任何其他库，看看Python提供了什么。


    ## 第十章：标准库


    如前一章所述，方法是可以在库中找到的各种命令，但还有许多其他方法是内置在Python中的，你不需要导入任何东西。


    这被称为**标准库**，我们已经接触过其中的许多方法和函数，比如*print()*。


    使用之前的同一个例子，这样思考标准库：


