  - '[PAGE 104]


    Dictionaries come in key value pairs. Just like how the letter A is the first
    letter of the alphabet, a key value pair could be *A : 1*, where A is the key
    and 1 is the value. A dictionary assembles many of these key value pairs as elements
    into a group enclosed by curly braces. Each element is separated by commas, as
    shown below:


    ```

    MyDictionary = {"A":1, "B":2, "C":3, "D":4}

    ```


    # Dictionary Methods


    One use of dictionaries is to retrieve the value from the key, and with these
    key value pairs like this, we can use the **.get()** method for dictionaries to
    find out the value from the key:


    ```

    MyDictionary.get("A")

    ```


    And the result will be 1.'
  - '[PAGE 105]


    If we input a key that is not in the dictionary, then we can supply a default
    value to the .get() method:


    ```

    MyDictionary.get("E", "You forgot some of the alphabet...")

    ```


    Since "E" is not a key in the dictionary, it will print "You forgot some of the
    alphabet"


    There are many more dictionary methods listed below, but you can also state the
    name of your dictionary followed by a dot to get a list of all of the methods
    you can use:'
  - '[PAGE 106]


    | Method | Description |

    |---|---|

    | clear() | Removes all elements from a dictionary |

    | copy() | Returns a copy of the dictionary |

    | fromkeys() | Returns a dictionary with specified keys and value |

    | get() | Returns the value of a specified key |

    | keys() | Returns a list containing the dictionary keys |

    | pop() | Removes the element with a specified key |

    | popitem() | Removes the last inserted key value pair |

    | setdefault() | Returns the value of a specified key, but if that key does not
    exist, insert the key and value as an argument |

    | update() | Updates the dictionary with specified key value pairs |

    | values() | Returns a list of all key value pairs in a dictionary |


    # Empty Dictionaries


    Yes, I know, this is getting a bit repetitive, but I assure you, this is the last
    one. An empty dictionary is just like empty strings and empty lists, it''s a dictionary
    with nothing in it.'
