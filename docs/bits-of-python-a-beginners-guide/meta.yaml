  - '[PAGE 110]


    The else means the opposite of what the if statement is saying, so in our case,
    that means that the else is representing the case where x is not greater than
    10.


    Another thing you may have noticed is the indentation. Indenting simply means
    that the code is inside another statement and will only get executed if the statement
    is *True*. Indenting tells the program that the code is apart of and is contained
    in something else, like conditional statements, but also in things like loops
    or functions, which we will get into later.


    Thus, *if* statements can be evaluated as either *True* or *False*.


    If it is *True*, we will be able to execute the code inside of the *if* statement
    and then skip the *else* statement, but if it is not *True*, then we skip over
    the *if* statement and go to the next line after the *if* statement.'
