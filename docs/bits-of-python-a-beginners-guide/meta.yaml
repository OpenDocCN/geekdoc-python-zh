  mdcn: "这将打印变量 *txt*，因为程序没有错误。它会跳过第一个 *except* 语句，执行 *else* 语句，并执行 *finally* 语句：\n\
    \n```\nhello\nAll good!\nThe try-except is done!\n```\n\n最后需要注意的是，try-except 语句不会停止程序，它们只是让程序在\
    \ except 语句中继续执行。\n\nTry-Except 块可能看起来没有必要，我们完全可以直接阅读错误信息，但它们是防止程序崩溃的好方法，让我们能够自己处理错误。\n\
    \n## Raise\n\n**raise** 命令实际上可以让我们主动引发一个错误。我们为什么会想这样做呢？嗯，当用户输入了不允许的内容时，我们可以引发一个错误并告诉用户他们不能输入该内容：\n\
    \n```\ntxt = 17\n\nif type(txt) != str:\n    raise TypeError(\"Only strings are\
    \ allowed\")\n```\n\n我们这里所做的就是指出用户输入了一个整数，而他们只能输入字符串，因此我们引发了一个带有自定义消息的 TypeError，解释了他们做错了什么：\n\
    \n```\nTypeError: Only strings are allowed\n```\n\n我们也可以根据 *raise* 命令想要实现的目标，简单地使用\
    \ *raise Exception* 或任何其他错误类型来代替 TypeError。\n\n请注意，*raise* 语句会立即结束程序，它不像 try-except\
    \ 语句那样让程序继续运行。\n\n## 第20章：项目提示\n\n1.  一个星座计算器，根据你的出生月份和日期，程序将打印出星座\n2.  一个字符串反转程序，给定用户输入，程序可以反转输入（hello\
    \ -> olleh）。（试着思考一下你能多高效地解决这个问题，它可以用**两行代码**完成！）\n3.  一个邮箱解析器，给定一个有效的邮箱，程序可以获取邮箱的用户名和域名（例如：coding@gmail.com\
    \ 的结果将是：用户名：coding，域名：gmail.com）\n4.  接收一个数字列表，遍历列表直到找到一个奇数。将该数字变为偶数，并保持所有偶数不变。我们称之为“偶数化器”\n\
    5.  创建一个密码检查器，你需要输入一个密码，程序需要满足以下条件才会接受它：\n    - 长度必须至少为8个字符\n    - 必须包含至少1个数字\n\
    \    - 必须包含至少1个字母\n    - 必须包含至少1个大写字母\n    - 必须包含一个特殊字符（@、$、%等）\n6.  使用数学运算以及\
    \ if、else 和 elif 语句来检测一个年份是否是闰年\n7.  经典的石头剪刀布游戏，我们都知道怎么玩。\n8.  使用用户输入创建一个猜数字游戏。计算机在用户输入的范围内随机选择一个数字，你需要猜出这个数字。当你猜对时，游戏结束。如果你想增加挑战，可以尝试设置猜测次数限制，甚至可以根据所选数字和用户猜测设置提示，比如用户猜的数字是高了还是低了！\n\
    9.  创建一个程序，接收一个输入，并通过将每个字符在字母表中移动X个字符来创建一个新字符串。移动的字符数必须由用户输入。\n10. 创建一个斐波那契数列生成器，用户可以输入他们想要的斐波那契数字的数量，程序输出正确数量的斐波那契数字列表\n\
    \n## 关于作者\n\n**Ashrit Ram Anala**\n\nAshrit Ram Anala 在5年多前对计算机科学产生了兴趣，从那时起，他在\
    \ Python、Java、Javascript、HTML 和 CSS 等多种语言中获得了编程经验。他希望与年轻学生分享他的知识，让他们也能拥有自己的火花。\n\
    \n## 参考资料\n\nPython 内置函数。 (n.d.). https://www.w3schools.com/python/python_ref_functions.asp\n\
    \nPython 字典方法。 (n.d.). https://www.w3schools.com/python/python_ref_dictionary.asp\n\
    \nPython 转义字符。 (n.d.). https://www.w3schools.com/python/gloss_python_escape_characters.asp\n\
    \nPython 关键字。 (n.d.). https://www.w3schools.com/python/python_ref_keywords.asp\n\
