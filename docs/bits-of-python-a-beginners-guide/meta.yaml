    ## CHAPTER 07: INPUTS AND OUTPUTS


    When you type something into Google, that is known as an **input**, and we can
    do the same thing in Python using **input()**.


    You will input the data by typing it in the terminal. Whatever you type in the
    terminal is a string. Even if you type the number 10, that will be converted to
    a string, so it will look like this: “10”


    Let’s get started on a new project where you will enter your name into the terminal
    and your code will respond to you by repeating your name. First, let’s start off
    with the user input:


    ```

    input("What is your name?: ")

    ```


    As shown above, we can have a prompt for the user that tells them what to type
    into the terminal. The prompt must be a string enclosed in single or double quotes.


    Now that we have the input written down, we must write the code for it to respond
    to you.


    When we try this, we quickly run into the issue of getting your name back from
    the terminal into the program, but this can be solved through the use of variables.
    If we assign a variable to the input command, that variable will hold the user
    input.


    ```

    Name = input("What is your name?: ")

    ```


    Now that your input is stored, we can print it!


    ```

    Name = input("What is your name?: ")

    print(Name)

    ```


    There we go, you now know how to receive and use inputs from a program.


    If we want the program to say "Hello" and then our name, we must add a small addition:


    ```

    Name = input("What is your name?: ")

    print("Hello" + Name)

    ```


    As shown in the Strings chapter, This will print "Hello" and then your name.


    ## CHAPTER 08: CONVERTING BETWEEN DATA TYPES


    Here’s a puzzle to test your Python knowledge thus far:


    ```

    Number = input("Pick a number: ")


    Half = Number / 2


    print(Half)

    ```


    If you said that the input is always a string and strings cannot be used in mathematical
    operations, you would be correct!


    This then raises the question, how can we take inputs from a user and use mathematical
    operations on them?


    This is where **Data Type Conversion** comes in. Strings, Ints, Booleans, and
    Floats are all different **data types**, and you can convert between them by saying
    the name of the type and enclosing what you want to convert in parentheses afterwards.


    *String <=> Int/Float*


    Ex. We would solve the problem from before by simply using **int()**:


    ```

    Number = input("Pick a number: ")


    Half = int(Number) / 2


    print(Half)

    ```


    This will make *Number* an actual int, thus allowing it to be divided by 2.


    Note, however, that *Number* must be an actual number for the conversion to not
    produce an error. You cannot make a string like “ten” or “cat” into an int because
    there is no integer version of them, but *int("12")* will give back the number
    12.


    Float conversion is the same as long as the string has a floating point representation.
    The command for float conversion is **float()**, so *float("12")* will give back
    12.0 .


    The same can be done backwards as well, we can convert an int or a float to a
    string with no restrictions (Anything can be a string). It is important to note
    that when converting something to a string, the command is **str()**, not **string()**


    ### *Int <=> Float*


    When converting ints to floats, it will simply add an extra .0 on the end, so
    *float(20)* is 20.0.


    Once again, the same can be done backwards, *int(20.0)* will result in 20.


    ### *Boolean <=> Anything*


    When it comes to booleans, we can convert these as well, things just work a bit
    differently. A *True* boolean value corresponds to 1, while a *False* boolean
    value corresponds to 0.


    This means that if we do *int(True)*, we get 1, if we do *int(False)*, we get
    0. The floating point representation of those simply adds on a .0 to the ends
    of each.


    The boolean conversion uses the **bool()** command, so doing **bool(1)** or **bool(0)**
    results in True and False, respectively. String conversions work the same as normal,
    *str(True)* results in the string “True” and *str(False)* results in “False”.


    ## CHAPTER 09: LIBRARIES


    Let''s take a slight detour from data types and inputs to talk about **libraries**.
    We are not referring to the actual physical libraries, but actually something
    quite similar, just in a digital format.


    In more familiar terms, a library in programming can be seen as a bookshelf with
    the many different books on it. Each book represents a different command that
    is available in that library.


    For example, the *math* library in Python can find the absolute value of something,
    it can find the factorial of a number, and many more complex mathematical operations
    without you even having to code them all, all you have to do is use small commands
    to execute them known as **methods**.


    A library is like an external part of Python that is separate from your program:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_62_0.png)


    To be able to access the libraries, we will need to use a command known as **import**:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_63_0.png)


    If we wanted to import the math library, at the start of our program, we would
    say *import math*. It''s as simple as that!


    Make sure that all of the libraries you want use are at the start of the program
    though, as Python will not be able to use it if you import it after you start
    using the methods in the library (Python reads from top to bottom remember).


    Here''s an example with the math library we just talked about:


    ```

    import math


    x = math.factorial(7)


    print(x)

    ```


    As you can see, it''s not too hard to import these libraries.


    To use the methods, all you have to do is type the name of the library followed
    by a dot and the type of method you want to use, as shown by the *math.factorial(7)*
    that we assigned to the variable *x*.


    This program will print a result of 7*6*5*4*3*2*1, or 5040.


    ### As


    If the name of the library is too long to type (trust me, some of them get very
    annoying to type after a while), you can use **as** along with the import command
    to shorten the name of the library to whatever you choose:


    ```

    import math as m


    x = m.factorial(7)


    print(x)

    ```


    As you can see, everything works out fine.


    If you try it out, you will see that we get the same result of 5040.


    Two common Python libraries that we will use are the *Math* library and the *Random*
    library, but feel free to search for any other libraries to see what Python has
    to offer.


    ## CHAPTER 10: STANDARD LIBRARY


    As stated in the previous chapter, methods are various commands that can be found
