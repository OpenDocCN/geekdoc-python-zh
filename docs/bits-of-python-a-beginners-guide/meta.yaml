    | float() | 将对象转换为浮点数 |

    | hex() | 将整数转换为以“0x”为前缀的十六进制字符串 |

    | input() | 从用户那里接收输入 |

    | int() | 将对象转换为整数 |

    | len() | 返回对象的长度 |

    | list() | 创建一个列表 |

    | max() | 返回可迭代对象中的最大项 |

    | min() | 返回可迭代对象中的最小项 |

    | next() | 检索可迭代对象中的下一项 |

    | oct() | 将整数转换为以“0o”为前缀的八进制字符串 |

    | ord() | 使用ASCII返回字符的数值表示 |'
