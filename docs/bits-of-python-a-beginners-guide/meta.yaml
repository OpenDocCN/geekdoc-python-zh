  md: '# CHAPTER

    01: GETTING

    STARTED


    # Background


    Before we get ready to code, let''s understand some basics. Us humans have several
    languages we communicate in, English, Spanish, French, and so many more, and to
    communicate with a computer, we need a language too. A computer cannot understand'
  merge: -1
  pgno: 6
- img_proc: true
  md: 'English, or any other language for that matter, but it is able to translate
    them into a language it can understand: Binary.


    Binary is made up of 1s and 0s. Each 1 and 0 is called a **bit**. A binary number
    like 101 can be translated to the number 5. As you can probably tell, it''s quite
    difficult for us to communicate like this, so **programming languages** were created.
    Programming languages allow us to type in a much more understandable format and
    the computer can translate what we type to binary using a **compiler** so that
    the computer can understand it. There are many programming languages available
    today, each with their own strengths. In 1991, Python was born. Now we''re all
    ready to code.


    Well, not quite. We haven''t figured out where to type the code yet. We can''t
    simply open a Google Doc and then start coding away, so I present to you...the
    **Integrated Development Environment**, or **IDE** for short.'
  merge: -1
  pgno: 7
- img_proc: true
  md: 'This is where we will type our code. An IDE comes with many different features,
    like the **editor** (Where you type), the **compiler** (The program translator),
    the **debugger** (To help you find errors), and many more that, as you explore,
    you will become more and more familiar with.


    An IDE is much more than just a place where you can type. The benefit of using
    an IDE is that it is made for developers and makes coding much easier and more
    convenient.


