    # 第六章：关于字符串的一切


    字符串看似简单，但其用途无穷无尽。


    ## 多行字符串


    字符串可以通过简单地在后面添加另一个引号来跨越多行：


    ```

    亲爱的学校管理部门，


    我们希望减少家庭作业。


    此致，


    学生们。

    ```


    这将像你输入的那样，将所有内容作为一个大块打印出来。


    ## 空字符串


    空字符串顾名思义，就是初始化时没有任何内容的字符串。它们看起来像这样：


    ```python

    Empty = ""

    ```


    这可能看起来没用，空字符串能做什么？嗯，在正确的情况下，它们非常有用。


    假设我们想编写一个程序来检查字符串中是否有元音字母，然后创建一个只包含元音字母的新字符串。我们稍后会介绍如何实际操作，但假设我们有一个可以给出所有元音字母的程序。现在我们把它们放在哪里呢？这就是空字符串派上用场的地方。如果我们初始化一个变量为空字符串，我们就可以在过程中将元音字母添加到空字符串中（你很快就会学到如何做到这一点！），瞧，就这样完成了。有用吧？编写这类程序的概念将在接下来的章节中介绍，但一旦你继续阅读并理解了如何操作，随时可以回到这里自己编写代码。


    再次使用盒子的例子，上面的问题可以这样表示：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_41_0.png)


    ## 字符串索引


    索引是编程中最重要的工具之一，我们很快会进一步探讨，但现在，我们可以使用索引来引用字符串的特定部分。


    **索引**指的是字符串中的每个字符，每个字符都有自己的索引。索引从 0 开始，一直到字符串的末尾（例如，字符串 “Hello” 的索引 0 是字符 “H”，索引
    4 是 “o”。字符串的最后一个索引总是比字符串长度小 1，因为索引从 0 开始）。


    我们可以通过以下方式编写代码：


    ```python

    String = "How are you?"

    print(String[0])

    ```


    这将打印索引 0 的字符，即 “H”。


    要打印最后一个索引，我们可以这样写：


    ```python

    String = "How are you?"

    print(String[11])

    ```


    *记住空格也算！*


    另一种方法是使用负数来实现：


    ```python

    String = "How are you?"

    print(String[-1])

    ```


    这将给你最后一个索引，即 “?”。当我们不知道字符串长度时，这非常有用。


    类似地，如果我们说：


    ```python

    String = "How are you?"

    print(String[-12])

    ```


    这将给你 “H”。


    ## 字符串切片


    字符串切片的设置如下：


    我们输入字符串名称，后跟方括号，就像平常一样，但然后我们在方括号中遵循以下语法：


    ```python

    String[start : stop : step]

    ```


    本质上，这是通过指定我们从哪个索引开始和结束来打印字符串的特定部分。如果我们使用 String[0:]，我们将得到整个字符串：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_44_0.png)


    （将字段留空将默认为字符串的末尾）


    我们可以根据索引进行分割，所以 *String[2:-2]* 将给我们从第 3 个字符（索引 2）到倒数第 3 个字符的所有内容：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_45_0.png)


    至于最后一个参数，步长，这是我们跳过多少个字母。将其留空意味着我们打印起始和结束范围内的每个字母，但如果我们将其更改为 3，那么这将使我们从起始索引开始，打印该索引处的字符，跳过
    3 个索引，打印该索引处的字符，依此类推，直到我们达到结束索引。


    如果步长使我们超过了结束索引，那么打印的最后一个索引将是步长超过结束索引之前的那个索引。


    假设我们使用与之前相同的示例，但将步长设置为 3：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_46_0.png)


    如你所见，步长打印了每第三个字符，但当它到达字符串末尾前 2 个字符时，它无法再打印任何内容，因此它打印了字符串结束前的最后一个索引。


    ## 连接


    我们也可以将变量添加到字符串中，但其格式有点不同：


    ```python

    string = "I''m good"


    print("Hello, how are you " + string)

    ```


    这的结果将是：


    ```

    Hello, how are you I''m good

    ```


    如你所见，要将一个字符串添加到另一个字符串，我们需要添加一个加号，然后是变量的名称。这种字符串的组合称为**连接**。但是请注意，你只能将字符串与字符串连接，所以如果你有类似这样的代码：


    ```python

    num = 7


    print("I like donuts so much, I have " + num)

    ```


    这可能不会立即在代码中产生错误，但当你运行代码时，你会得到：


    ```

    print("I like donuts so much, I have " + num)

    TypeError: can only concatenate str (not "int") to str

    ```


    这个错误只是意味着你不能将字符串与任何其他数据类型连接，它必须是字符串与字符串连接。


    我们不需要将字符串赋值给变量才能连接它，我们也可以简单地在两个字符串之间放置一个加号并打印，这将完美运行。


    ## 特殊字符


    Python 中的特殊字符总是以反斜杠开头，表示后面的字母是一个特殊字符。有许多特殊字符，但大多数你很少使用和看到。一些常见的特殊字符是 \n、\'' 和
    \"。


    \n 只是一个换行命令，如果你将其放在字符串的末尾，它将在其后创建一个新行，因此下一个打印的行将与上一个打印的行之间有一个空格：


    ```python

    print("Wow, this is cool \n")

    print("Am i on a new line?")

    ```


    结果将如下所示：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_49_0.png)


    其余命令的格式与 \n 命令完全相同，只是有一些细微的调整。


    \'' 和 \" 命令非常相似，当你需要在字符串中包含引号时非常有用。例如，如果你想引用苏格拉底并打印引言 “Wonder is the beginning
    of wisdom”，你可以尝试将其放入字符串中：


    ```python

    print("""Wonder is the beginning of wisdom" - Socrates")

    ```


    但如你所见，这会产生错误，因为我们在实际引言中使用了双引号，所以 Python 认为你正在结束字符串。


    为了解决这个问题，我们可以简单地使用 \" 命令：


    ```python

    print("\"Wonder is the beginning of wisdom\" - Socrates")

    ```


    通过这样做，我们能够在终端中获得这个美妙的苏格拉底引言：


    ```

    "Wonder is the beginning of wisdom" - Socrates

    ```


    \'' 命令与 \" 命令的格式完全相同，我们只需要将 “ 替换为 ‘：


    ```python

    print("\''Wonder is the beginning of wisdom\'' - Socrates")

    ```


    现在在终端中，我们得到这个结果：


    ```

    ''Wonder is the beginning of wisdom'' - Socrates

    ```


