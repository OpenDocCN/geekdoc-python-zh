    # PREFACE


    Whether you’re a beginner level programmer or an experienced one, Python is a
    great language to learn. Not only is it easy to understand and relatively easy
    to code in, it is also used in many fields, such as Artificial Intelligence and
    Website Development, which have shown great promise for the future.


    Bolded words indicate important concepts and anything that is italicized is code
    segments.


    This book covers all the important concepts for a beginner or even a person who
    has some experience in coding, but it is by no means a one way ticket to understanding
    all of Python. You will learn all of the basics and many complex concepts that
    will get your Python journey rolling and make it infinitely easier to delve deeper
    into Python, but as said, it''s not a one way ticket.


    # CHAPTER 01: GETTING STARTED


    ## Background


    Before we get ready to code, let''s understand some basics. Us humans have several
    languages we communicate in, English, Spanish, French, and so many more, and to
    communicate with a computer, we need a language too. A computer cannot understand
    English, or any other language for that matter, but it is able to translate them
    into a language it can understand: Binary.


    Binary is made up of 1s and 0s. Each 1 and 0 is called a **bit**. A binary number
    like 101 can be translated to the number 5. As you can probably tell, it''s quite
    difficult for us to communicate like this, so **programming languages** were created.
    Programming languages allow us to type in a much more understandable format and
    the computer can translate what we type to binary using a **compiler** so that
    the computer can understand it. There are many programming languages available
    today, each with their own strengths. In 1991, Python was born. Now we''re all
    ready to code.


    Well, not quite. We haven''t figured out where to type the code yet. We can''t
    simply open a Google Doc and then start coding away, so I present to you...the
    **Integrated Development Environment**, or **IDE** for short.


    This is where we will type our code. An IDE comes with many different features,
    like the **editor** (Where you type), the **compiler** (The program translator),
    the **debugger** (To help you find errors), and many more that, as you explore,
    you will become more and more familiar with.


    An IDE is much more than just a place where you can type. The benefit of using
    an IDE is that it is made for developers and makes coding much easier and more
    convenient.


    Here''s a general overview of how a program would work in the form of a diagram:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_8_0.png)


    The IDE is simply a place where we code, it does not come with the language. We
    will need to download and install the language for the IDE to be able to identify
    it on your device when we create a new Python file.


    Now we''re actually ready.


    ## Downloading Python


    **If you have Python already downloaded and installed and have the IDE all ready,
    skip to chapter 2.**


    Go to **python.org** in a new browser tab and hover over the “downloads” tab until
    an extension rolls down displaying the current version of Python:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_10_0.png)


    Click the button to download Python for your operating system (I am on a Mac so
    the Mac download is automatically shown. If your operating system is Windows,
    then that should be there).


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_10_1.png)


    The installation process for the Mac and Windows are a bit different, so I will
    go through both:


    ## Mac Installation


    The Mac installation process is fairly easy. All you need to do is click on the
    download for the version you wish to download and open the file:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_11_0.png)


    Once you have done this, an installer should pop up:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_12_0.png)


    Go through the steps of the installation process until you get to this screen:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_12_1.png)


    Here, you can change where you want Python to be installed. If you think everything
    is fine, then go ahead and click install. You may need to enter your computer
    password, but once you do so, it may take a minute or two to fully install. After
    that, you should see this screen:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_13_0.png)


    And now you''re done! Python is fully installed and ready to code in for your
    Mac.


    ## Windows Installation


    The Windows installation process asks if you allow the program to make changes
    to your device several times, and you can press allow.


    Once you have downloaded your desired version of Python, this should pop up in
    the bottom of your screen:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_14_0.png)


    Python downloaded itself as an **executable file**, .exe, so to install Python,
    you will need to **execute** it:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_14_1.png)


    Once you open Python, follow the steps until you get to this screen:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_15_0.png)


    Now that Python is installed, Let''s begin your Python journey!


    ## The IDE


    There are many different IDEs you can use for Python, like PyCharm, Anaconda,
    etc., so look over all of the options and decide which one works best for you.
    For this book, I will be using Visual Studio Code to code in Python, but the language
    stays the same no matter what you use.


    Before we get started with the coding, you must understand the layout of your
    editor first. The area where you will be writing the code is called the editor
    and it should look something like this:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_16_0.png)


    There''s not that much there right now, but once we start coding, this editor
    will be filled to the brim with Python!


    The area where the results will be displayed is the terminal:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_17_0.png)


    At the top of your editor, you may see many tabs, most of which you can ignore
    for now, but the main ones you will need to keep track of are the ones that say
    *Run* as they run the program. You may need to look through a few of these tabs
    if a tab is not explicitly named *Run*:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_17_1.png)


    # CHAPTER 02: CREATING YOUR FIRST PYTHON PROGRAM


    Now that everything is installed, open your editor and open a new file. Name it
    “Hello_World.py”. Note, all Python programs end in **.py** to signify that they
    are Python projects. To make the most out of this book, be sure to try each example
    in **this** book for yourself. You may think you understand it at the'
