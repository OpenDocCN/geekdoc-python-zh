  mdcn: "## 第17章：循环\n\n循环！循环通过自动重复执行任务指定次数，让我们的生活更轻松。\n\n### While 循环\n\n一种循环类型被称为\
    \ **While 循环**。*while* 循环通过 *True* 和 *False* 语句工作。只要给定的条件在下一次运行时仍为 *True*，它就会持续执行命令。每次循环执行称为一次\
    \ **迭代**。\n\n例如，如果我们有类似这样的代码：\n\n```\nx = 1\n\nwhile x<10:\n    print(x)\n   \
    \ x = x + 1\n\nprint (\"Done\")\n```\n\n如果我们逐步分析这个程序，会看到我们首先将 *x* 初始化为 1，然后有一个\
    \ while 循环，它会一直运行直到 *x* 大于或等于 10。\n\n在 while 循环内部，我们打印分配给 *x* 的值，并将 *x* 递增 1。一旦\
    \ *x* 为 10，循环结束，我们打印“Done”。\n\n注意“Done”不在循环内部，因为它没有缩进。这是因为我们只想在循环结束后打印一次“Done”，所以如果把它放在循环内部，“Done”会在每次迭代时都被打印。\n\
    \n因此，这个程序的结果是：\n\n![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_122_0.png)\n\n最后需要意识到的是，我们需要\
    \ $x = x + 1$ 这个条件，因为没有它，$x$ 将始终为 1，而 1 始终小于 10。\n\n### 无限 While 循环\n\n这看起来可能没用，为什么要有永远无法结束的循环呢？\n\
    \n然而，这在几乎所有使用循环的场景中都非常有用，因为更多时候，我们永远不知道可能需要循环多少次。\n\n例如，如果你正在设计一个游戏，想要有一个结束屏幕显示“*再玩一次？*”，如果用户选择“是”，循环再次运行，如果选择“否”，游戏结束。我们不知道应该循环多少次，因为用户可能在玩\
    \ 1 轮或 50 轮后就结束了。\n\n因此，我介绍 **while True** 循环。\n\n*while True* 循环会永远继续，没有任何条件能让它停止。它只能通过\
    \ **break** 语句停止。\n\n通过在循环内部放置 break 语句，它会立即结束循环，语句之后的所有代码都不会执行。还有一个 **continue**\
    \ 语句，它会强制程序回到循环顶部，程序不会执行 continue 语句之后的任何内容。\n\n为了说明这些语句在哪里有用，让我们使用之前的场景。如果我们想制作一个游戏，让用户决定是否再玩一次，如果用户说“否”，break\
    \ 语句可以派上用场；如果用户说“是”，continue 语句可以派上用场，所以我们可以这样做：\n\n```\nwhile True:\n    print(\"\
    Wow Python Wow\")\n    answer = input(\"Play Again? (Y/N)\")\n    if answer ==\
    \ \"N\":\n        break\n    elif answer == \"Y\":\n        continue\n```\n\n\
    创建无限循环的另一种方法是使用布尔值。\n\n我们可以将一个变量初始化为布尔值 *True*，只要该变量的求值结果为 *True*，我们就继续循环：\n\n\
    ```\ncondition = True\nwhile condition == True:\n    print(\"Wow Python Wow\"\
    )\n    answer = input(\"Play Again? (Y/N)\")\n    if answer == \"N\":\n      \
    \  condition = False\n    elif answer == \"Y\":\n        continue\n```\n\n这与 *while\
    \ True* 循环具有相同的功能，只是在这里，我们只有在变量 *condition* 为 *True* 时才继续循环，并且不需要 break 语句。\n\n\
    因此，如果用户拒绝再玩，我们只需将 condition 的值更改为 *False*，当我们再次循环时，程序结束，因为变量 *condition* 不是 *True*。\n\
    \n如果用户决定继续玩，*condition* 保持不变，我们再次循环。\n\n### For 循环\n\n另一种循环类型是 **for 循环**，它类似于\
    \ while 循环。\n\n*for* 循环仍然循环，但它与 *while* 循环的不同之处在于它遍历对象。例如，*for* 循环可以遍历字符串并打印字符串中的每个元素，或者可以遍历数字列表。\n\
    \n对于这两种情况，工作方式是：选择对象中的第一个元素，执行 *for* 循环中的代码，然后循环回到顶部，选择下一个元素，依此类推。这个过程持续进行，直到没有更多元素可供选择。\n\
    \n*for* 循环的一般格式是有一个临时变量，该变量被分配给对象中的每个元素，以便随后在 *for* 循环中使用。\n\n它的唯一目的是遍历数据集。\n\n\
    如果之前的解释有点混乱，这里有一个例子：\n\n```\nMyList = [2,4,7,12,13,6,5,16,7,16,2]\n\ndivcount\
    \ = 0\n\nfor i in MyList:\n    if i % 3 != 0:\n        divcount = divcount + 1\n\
    \nprint(\"There are \" + str(divcount) + \" numbers in this list that are not\
    \ divisible by three\")\n```\n\n这里的目标是找出列表中不能被三整除的数字的数量，为此，我们首先获取列表，然后创建一个变量 *divcount*\
    \ 来跟踪不能被三整除的数字的数量。然后我们创建一个 *for* 循环来遍历列表并检查列表中的每个元素是否能被三整除，如果不能，我们将 *divcount*\
    \ 变量增加一，并在程序结束时打印最终计数。\n\n在继续之前，让我们澄清一下关于前面程序的一些混淆点。我们在 for 循环中使用了变量 *i* 作为临时变量来存储列表中的每个元素。每次循环迭代时，*i*\
    \ 都会被重新分配给列表中的下一个元素。\n\n*i* 是制作循环时常用的变量，但任何其他你选择的变量名也可以使用。\n\n最重要的是要记住，它在程序中的唯一目的是作为一个变量，在遍历列表时被重新分配给列表中的项目。\n\
    \n### 嵌套循环\n\n嵌套 *for* 循环起初是一个难以理解的概念，但一旦你掌握了它们，它们在各种情况下都非常有用。\n\n它们有用性的一个例子是，当我们有一个二维列表，我们不仅想遍历该列表，还想遍历列表中包含的列表元素。\n\
    \n在这里，我们会这样做：\n\n```\nmy2dlist = [[2,1,13,1023], [6,1,27,1], [10,12], [1,16,1,54,39],\
    \ [18,1]]\n\nfor i in my2dlist:\n    for j in i:\n        if j == 1:\n       \
    \     print(\"1 is here!\")\n```\n\n如你所见，外层循环遍历每个元素并将其分配给 *i*。内层循环然后遍历列表元素 *i*\
    \ 以查找数字 1 是否存在。\n\n运行后，我们得到结果：\n\n```\n1 is here!\n1 is here!\n1 is here!\n1 is\
    \ here!\n1 is here!\n1 is here!\n```\n\n我们可以得出结论，这个二维列表中总共有 6 个 1。\n\n嵌套循环也可以用于普通列表，而不仅仅是二维列表。\n\
    \n如果我们想将一个元素与列表中的每个其他元素进行比较，我们会有一个外层循环遍历元素，然后有一个内层循环遍历所有其他元素以便进行比较。\n\n我们还可以有嵌套的\
    \ *while* 循环和 *for* 循环在 *while* 循环内，反之亦然，但你必须确保 while 循环被正确处理，并且有一个 break 语句可以访问，否则循环将永远不会结束。\n\
    \n---\n\nvalue = 14\n\nif value % 2 == 0:\n    if value % 6 == 0:\n        print(\"\
    multiple of 2 and 6!\")\n\n我们检查值是否为偶数的条件，只有当它是偶数时，我们才检查它是否是 6 的倍数的条件。这是一个嵌套的 *if*\
    \ 语句。\n\n我们还可以在 else 语句中有 if 语句，逻辑与之前相同。假设我们在程序中添加另一个子句：\n\n```\nvalue = 20\n\n\
    if value % 2 == 0:\n    if value % 6 == 0:\n        print(\"multiple of 2 and\
    \ 6!\")\nelse:\n    if value % 5 == 0:\n        print(\"multiple of 5 and odd!\"\
    )\n    else:\n        print(\":(\")\n```\n\n在这里，我们说的是，如果我们发现我们的值不满足第一个条件，意味着它不是偶数而是奇数，我们才会检查它是否能被\
    \ 5 整除。如果它也不能被 5 整除，那么我们只打印一个悲伤的表情 :("
