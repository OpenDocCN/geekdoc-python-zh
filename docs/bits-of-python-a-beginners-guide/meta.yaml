    # 前言


    无论你是初学者还是经验丰富的程序员，Python 都是一门值得学习的优秀语言。它不仅易于理解、编码相对简单，而且在许多领域都有应用，例如人工智能和网站开发，这些领域在未来展现出巨大的潜力。


    加粗的词语表示重要的概念，斜体部分则是代码片段。


    本书涵盖了初学者甚至有一定编程经验的人所需的所有重要概念，但它绝不是理解 Python 全貌的唯一途径。你将学习所有基础知识和许多复杂的概念，这些将为你的
    Python 之旅奠定基础，并使你更轻松地深入探索 Python。但正如所说，它并非唯一的途径。


    # 第 01 章：入门


    ## 背景


    在我们准备编码之前，让我们先了解一些基础知识。我们人类有多种交流语言，如英语、西班牙语、法语等等，而要与计算机交流，我们也需要一种语言。计算机无法理解英语或任何其他语言，但它能够将这些语言翻译成它能理解的语言：二进制。


    二进制由 1 和 0 组成。每个 1 和 0 被称为一个**比特**。像 101 这样的二进制数可以转换为数字 5。你可能已经发现，用这种方式交流对我们来说相当困难，因此**编程语言**应运而生。编程语言允许我们以更易理解的格式输入内容，计算机则可以使用**编译器**将我们输入的内容转换为二进制，以便计算机能够理解。如今有许多编程语言可供选择，每种语言都有其独特的优势。1991
    年，Python 诞生了。现在，我们已经准备好开始编码了。


    嗯，还不完全。我们还没有确定在哪里输入代码。我们不能简单地打开一个 Google 文档就开始编码，所以我向你介绍……**集成开发环境**，简称 **IDE**。


    这就是我们将输入代码的地方。IDE 具有许多不同的功能，例如**编辑器**（你输入代码的地方）、**编译器**（程序翻译器）、**调试器**（帮助你查找错误），以及更多你将在探索过程中逐渐熟悉的功能。


    IDE 不仅仅是一个输入代码的地方。使用 IDE 的好处在于它是为开发者设计的，使编码变得更加容易和便捷。


    以下是程序工作流程的概览图：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_8_0.png)


    IDE 只是我们编写代码的地方，它本身并不包含语言。我们需要下载并安装语言，以便 IDE 在我们创建新的 Python 文件时能够在你的设备上识别它。


    现在我们真的准备好了。


    ## 下载 Python


    **如果你已经下载并安装了 Python，并且 IDE 也已准备就绪，请直接跳到第 2 章。**


    在新的浏览器标签页中访问 **python.org**，将鼠标悬停在“downloads”标签上，直到出现一个扩展菜单，显示当前版本的 Python：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_10_0.png)


    点击按钮下载适用于你操作系统的 Python（我使用的是 Mac，因此 Mac 下载选项会自动显示。如果你的操作系统是 Windows，那么 Windows
    选项应该在那里）。


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_10_1.png)


    Mac 和 Windows 的安装过程略有不同，因此我将分别介绍：


    ## Mac 安装


    Mac 的安装过程相当简单。你只需点击你想要下载的版本，然后打开文件：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_11_0.png)


    完成此操作后，应该会弹出一个安装程序：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_12_0.png)


    按照安装过程的步骤操作，直到你看到这个屏幕：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_12_1.png)


    在这里，你可以更改 Python 的安装位置。如果你认为一切正常，那么请继续点击安装。你可能需要输入计算机密码，但一旦输入，可能需要一两分钟才能完全安装。之后，你应该会看到这个屏幕：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_13_0.png)


    现在你完成了！Python 已完全安装，可以在你的 Mac 上开始编码了。


    ## Windows 安装


    Windows 安装过程会多次询问你是否允许程序对你的设备进行更改，你可以点击允许。


    下载你想要的 Python 版本后，屏幕底部应该会弹出以下内容：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_14_0.png)


    Python 以**可执行文件**（.exe）的形式下载，因此要安装 Python，你需要**执行**它：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_14_1.png)


    打开 Python 后，按照步骤操作，直到你看到这个屏幕：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_15_0.png)


    现在 Python 已安装，让我们开始你的 Python 之旅吧！


    ## IDE


    有许多不同的 IDE 可以用于 Python，例如 PyCharm、Anaconda 等，因此请查看所有选项并决定哪一个最适合你。在本书中，我将使用 Visual
    Studio Code 来编写 Python 代码，但无论你使用什么工具，语言本身都是一样的。


    在我们开始编码之前，你必须首先了解编辑器的布局。你将编写代码的区域称为编辑器，它应该看起来像这样：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_16_0.png)


    目前这里内容不多，但一旦我们开始编码，这个编辑器将被 Python 填满！


    显示结果的区域是终端：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_17_0.png)


    在编辑器的顶部，你可能会看到许多标签页，其中大部分你现在可以忽略，但你需要关注的主要标签页是那些标有 *Run* 的标签，因为它们用于运行程序。如果某个标签页没有明确命名为
    *Run*，你可能需要查看几个标签页：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_17_1.png)


    # 第 02 章：创建你的第一个 Python 程序


    现在一切准备就绪，打开你的编辑器并新建一个文件。将其命名为“Hello_World.py”。请注意，所有 Python 程序都以 **.py** 结尾，以表示它们是
    Python 项目。为了充分利用本书，请务必亲自尝试**本书**中的每个示例。你可能认为自己已经理解了'
