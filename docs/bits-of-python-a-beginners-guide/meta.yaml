    # CHAPTER 14: LISTS AND LIST METHODS


    You have surely heard of lists, but in Python, lists are structured a bit differently.
    Though, their overall premise is the same. A list is enclosed in brackets and
    is used to contain multiple elements. Each element in a list is separated by commas
    like this:


    ```

    ["a", "b", "c", "d", "e"]

    ```'
  - '[PAGE 97]


    The first element in a list is the 0th element, so if we had a list called *List1*
    and it had a total of 5 elements, the first element would be *List1[0]* and the
    last would be *List1[4]*


    # List Methods


    In your IDE, if you create a list, like one named *List1*, and then type *List1*
    followed by a dot, you should see several different methods you can perform on
    your list, like adding or removing items, along with explanations for all of them.
    If you do not see this, then we have compiled a list of the most used list methods
    and their uses in a neat table below:'
  - '[PAGE 98]


    | Method | Description |

    |---|---|

    | append() | Adds elements to the end of a list |

    | clear() | Removes all elements from a list |

    | copy() | Copies a list and returns a copy of it |

    | count() | Counts the number of elements in the list and returns the number |

    | extend() | Adds all elements of a list to the end of an existing list |

    | index() | Returns the index of the first element found with a specified value
    |

    | insert() | Adds an element at a specific index |

    | pop() | Removes an element at a specific index |

    | remove() | Removes the first element found with a specified value |

    | reverse() | Reverses the order of a list |

    | sort() | Sorts a list |


    # Empty Lists


    An empty list is much like an empty string, it is simply a list with nothing in
    it:


    ```

    mylist = []

    ```'
  - '[PAGE 99]


    Just like with empty strings, these are useful when we need to edit a current
    list and add the new values to a new list. We can do this using the **.append()**
    method as shown above in the table.


    # 2D Lists


    A two dimensional list is a list in a list. This is also known as a nested list
    and it can be difficult to visualize at first, but an example should help:


    ```

    my2dlist = [[2,4,5], [20,21,22], [40,41,42,43,44,45,46], [12]]

    ```


    As you can see, we have a list, but each element in that list is another list!


    Just like normal, we can access the elements in the outer list by simply doing
    *my2dlist[]* and in the brackets, we type the index we want:


    ```

    my2dlist = [[2,4,5], [20,21,22], [40,41,42,43,44,45,46], [12]]


    print(my2dlist[1])

    ```'
  - '[PAGE 100]


    And we get a result of:


    ```

    [20, 21, 22]

    ```


    But then how do we access the elements of the list inside of the list? (that''s
    a mouthful)


    Well, all we have to do is add another bracket with the index of the element that
    we want to access inside of it, as follows:


    ```

    my2dlist = [[2,4,5], [20,21,22], [40,41,42,43,44,45,46], [12]]


    print(my2dlist[1][2])

    ```


    And thus, we will get a result of:'
