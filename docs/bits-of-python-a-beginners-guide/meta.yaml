    | 方法 | 描述 |

    |---|---|

    | append() | 将元素添加到列表末尾 |

    | clear() | 从列表中移除所有元素 |

    | copy() | 复制列表并返回其副本 |

    | count() | 计算列表中元素的数量并返回该数字 |

    | extend() | 将一个列表的所有元素添加到现有列表的末尾 |

    | index() | 返回具有指定值的第一个元素的索引 |

    | insert() | 在特定索引处添加一个元素 |

    | pop() | 移除特定索引处的元素 |

    | remove() | 移除找到的第一个具有指定值的元素 |

    | reverse() | 反转列表的顺序 |

    | sort() | 对列表进行排序 |


    ### 空列表


    空列表就像空字符串一样，它只是一个没有任何内容的列表：


    ```python

    mylist = []

    ```


    就像空字符串一样，当我们需要编辑当前列表并将新值添加到新列表时，这些列表非常有用。我们可以使用上面表格中所示的 **.append()** 方法来做到这一点。


    ### 二维列表


    二维列表是列表中的列表。这也称为嵌套列表，起初可能难以想象，但一个例子应该会有所帮助：


    ```python

    my2dlist = [[2,4,5], [20,21,22], [40,41,42,43,44,45,46], [12]]

    ```


    如你所见，我们有一个列表，但该列表中的每个元素都是另一个列表！


    就像普通列表一样，我们可以通过简单地输入 *my2dlist[]* 并在方括号中输入我们想要的索引来访问外部列表中的元素：


    ```python

    my2dlist = [[2,4,5], [20,21,22], [40,41,42,43,44,45,46], [12]]


    print(my2dlist[1])

    ```


    我们得到的结果是：


    ```

    [20, 21, 22]

    ```


    但是，我们如何访问列表内部列表的元素呢？（这有点绕口）


    嗯，我们所要做的就是添加另一个方括号，并在其中输入我们想要访问的元素的索引，如下所示：


    ```python

    my2dlist = [[2,4,5], [20,21,22], [40,41,42,43,44,45,46], [12]]


    print(my2dlist[1][2])

    ```


    因此，我们将得到的结果是：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_101_0.png)


    这就引出了一个问题：这有什么用？好吧，让我们设想一个场景，假设你是一家杂货店的老板。


    每位顾客购买 10 件商品。如果我们有 3 位顾客，那么我们可以简单地创建 3 个列表，每个顾客一个，并将他们购买的商品放在每个列表中。


    但是，如果你有 1,000 位顾客呢？10,000 位？我们无法创建那么多列表，但这就是二维列表的用武之地。使用二维列表，我们可以将每位顾客购买的商品放在一个列表中，然后将所有这些列表放在另一个列表中，每个内部列表的索引位置对应相应的顾客。


    以下是用 3 位顾客展示的视觉示例，以显示区别：


    ```python

    #单列表


    customer1 = ["cherries", "chicken", "bread"]

    customer2 = ["grapes", "peaches", "lettuce", "candy"]

    customer3 = ["Noodles", "tomatoes"]


    #VS


    #二维列表


    customersitens = [["cherries", "chicken", "bread"], ["grapes", "peaches", "lettuce",
    "candy"], ["Noodles", "tomatoes"]]

    ```


    二维列表在这种情况下更容易创建，并且更有用。'
