    # The Infinite While Loop


    This may seem useless, why even have a loop that can never end?


    However, this will prove to be very useful in almost every scenario where you
    use a loop because, more often than not, we never know how many times we may need
    to loop through something.


    For example, if you were designing a game and wanted to have an ending screen
    that said “*play again?*” and if the user selects "yes", the loop runs again and
    if not, the game ends. We don’t know how many times we should loop because the
    user could be done after 1 round of playing or 50 rounds of playing.


    As a result, I introduce the **while True** loop.'
  - '[PAGE 124]


    A *while True* loop continues forever and there are no conditions that make it
    stop. It can only be stopped with the **break** statement.


    By placing a break statement inside of a loop, it will end the loop immediately
    and all code after the statement will not be executed. There is also a **continue**
    statement, which will force the program to go back to the top of the loop and
    the program will not execute anything after the continue statement.


    To give some context about where these can be useful, let''s use the same scenario
    from before. If we wanted to make a game where the user can decide if they want
    to play again or not, the break statement can come in useful if the user says
    no and the continue statement can be useful if the user says yes, so we can do
    something like this:'
  - "[PAGE 125]\n\n```\nwhile True:\n    print(\"Wow Python Wow\")\n    answer = input(\"\
    Play Again? (Y/N)\")\n    if answer == \"N\":\n        break\n    elif answer\
    \ == \"Y\":\n        continue\n```\n\nAn alternate method of creating an infinite\
    \ loop would be to use booleans.\n\nWe can initialize a variable to the boolean\
    \ value *True*, and as long as the variable is evaluated as *True*, we continue\
    \ the loop:\n\n```\ncondition = True\nwhile condition == True:\n    print(\"Wow\
    \ Python Wow\")\n    answer = input(\"Play Again? (Y/N)\")\n    if answer == \"\
    N\":\n        condition = False\n    elif answer == \"Y\":\n        continue\n\
    ```\n\nThis has the same functionality as the *while True* loop except here, we\
    \ only continue the loop if the"
  - '[PAGE 126]


    variable *condition* is *True* and don''t need the break statement.


    Consequently, if the user refuses to play again, we simply change the value of
    condition to *False* and when we go to loop again, the program ends as the variable
    *condition* is not *True*.


    If the user decides to keep playing, *condition* is unchanged and we loop again.


    # For Loops


    Another type of loop is a **for loop**, which is similar to a while loop.


    A *for* loop still loops, but it is different from a *while* loop in that it loops
    through objects. For example, a *for* loop could loop through a string and print
    every element in a string, or it could loop through a list of numbers.'
  - "[PAGE 127]\n\nFor both of these, the way this works is the first element in the\
    \ object is selected, it goes through the code in the *for* loop, and then the\
    \ loop goes back up to the top and selects the next element and so on and so forth.\
    \ This process continues until there are no more elements left to choose from.\n\
    \nThe general format of a *for* loop is something where we have a temporary variable\
    \ that is assigned to each element in the object so that it can then be used in\
    \ the *for* loop.\n\nIts only purpose is to loop through the set of data.\n\n\
    Here's an example if that explanation was a bit confusing:\n\n```\nMyList = [2,4,7,12,13,6,5,16,7,16,2]\n\
    \ndivcount = 0\n\nfor i in MyList:\n    if i % 3 != 0:\n        divcount = divcount\
    \ + 1\n\nprint(\"There are \" + str(divcount) + \" numbers in this list that are\
    \ not divisible by three\")\n```"
  - '[PAGE 128]


    The goal here was to find the number of numbers not divisible by three in the
    list, and to do so, we first got the list and then made a variable, *divcount*,
    to keep track of the number of numbers that are not divisible by three. We then
    made a *for* loop to go through the list and check if each element in the list
    was divisible by three, and if not, we increase the *divcount* variable by one
    and we print the final tally at the end of the program.


    Before we move on, let''s clear up a few topics of confusion regarding the previous
    program. We used the variable *i* in the for loop as the temporary variable to
    store each element in the list. Each time the loop iterates, *i* gets reassigned
    to the next element in the list.


    *i* is a popular variable to use when making loops, but any other variable name
    of your choice works as well.'
  - '[PAGE 129]


    The most important thing to remember is that it''s only purpose in the program
    is to be a variable that is reassigned to items in the list as we loop through
    it.


    # Nested Loops


    Nested *for* loops are a difficult concept to understand at first, but once you
    get the hang of them, they can be incredibly useful in a variety of situations.


    One example of their usefulness is in the case where we have a 2D list and we
    not only want to loop through that list, but also loop through the list elements
    contained in the list.


    Here, we would do something like this:'
  - "[PAGE 130]\n\n```\nmy2dlist = [[2,1,13,1023], [6,1,27,1], [10,12], [1,16,1,54,39],\
    \ [18,1]]\n\nfor i in my2dlist:\n    for j in i:\n        if j == 1:\n       \
    \     print(\"1 is here!\")\n```\n\nAs you can see, the outer loop goes through\
    \ each element and assigns it to *i*. The inner loop then loops through the list\
    \ element *i* to find if the number 1 is present.\n\nOnce this is run, we get\
    \ the result:\n\n```\n1 is here!\n1 is here!\n1 is here!\n1 is here!\n1 is here!\n\
    1 is here!\n```\n\nAnd we can conclude that there are a total of 6 1s in this\
    \ 2D list."
  - '[PAGE 131]


    Nested loops can also be used with normal lists, not just 2D ones.


    If we wanted to compare an element with every other element in the list, we would
    have an outer loop that loops through the elements, and then we would have an
    inner loop that goes through all of the other elements so that we can compare.


    We can also have nested *while* loops and *for* loops within *while* loops or
    vice versa, but you must make sure that the while loop is accounted for and has
    a break statement it can access or else the loop will never end.'
- md: "## CHAPTER 18: FUNCTIONS\n\nFunctions\n\nNow that you understand how to write\
    \ code comes the organization part. Don't run away though, this isn't like cleaning\
    \ your room, organizing your code can actually be quite a bit of fun and it can\
    \ also save you time in the long run!\n\nFunctions seem like a new concept, but\
    \ we have been using them ever since this book began.\n\nA function is essentially\
    \ a block of code that can be “called” or executed with one command, meaning we\
    \ only have to write it once and then whenever we need to use that block of code\
    \ again, we can call it. Here’s an example:\n\n```\ndef myfunc():\n    a = 12\n\
    \    b = 20\n    return a+b\n\nmyfunc()\n```\n\nAs you can see, we created the\
    \ function by using the *def* keyword and then wrote the name of the function\
    \ followed by parentheses and a colon.\n\nWe then wrote some code inside of the\
    \ function to sum two numbers and said **return** a + b at the end.\n\n**Return**\
    \ is a new keyword and appears at the end of functions.\n\nThe purpose of the\
    \ return keyword is to **store** the final value outputted by the function and\
    \ have the program go back to where it left off when the function was called.\
    \ The return statement does not print anything.\n\nHere's an illustration to show\
    \ you how the return and call statements work:\n\n![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_134_0.png)\n\
    \nTo make sure that you understand this illustration, here's an explanation.\n\
    \nThis program does not start at the function, Python actually ignores all of\
    \ that code because the function has not been called yet.\n\nThe program starts\
    \ at the call statement, *myfunc()*. It then goes back up to the function, goes\
    \ through it, and then the return statement brings the program back to where it\
    \ left off at the print statement.\n\n## Parameters\n\nWe've worked with functions\
    \ all the time, and if you look back, you'll notice that they often have something\
    \ in the parentheses, whether it be text or numbers. These are known as **parameters**.\n\
    \nParameters are like a function's input, we type the parameters and the function\
    \ uses those as input to carry out the code inside of it.\n\nFor example, if we\
    \ look back at the program from before:\n\n```\ndef myfunc(a, b):\n    return\
    \ a+b\n\nprint(myfunc(12, 20))\n```\n\nNow, we placed two parameters, a and b,\
    \ inside of the parentheses to indicate that the function needs to have these\
    \ two passed into it to execute.\n\nWe can then call the function and input any\
    \ numbers that we like. These inputs are called **arguments**. The argument is\
    \ the input passed to a function, the parameter is the variable placeholder that\
    \ the function takes in.\n\nThese are not restricted to only numbers, however.\
    \ They can be lists, strings, booleans, and any other data type you can think\
    \ of that best fit your function. Anything can be passed to a function to suit\
    \ your programming needs.\n\nThe benefit of parameters is that, if we wanted to\
    \ add different sets of numbers without using parameters, we would need to change\
    \ the code inside of the function every time, which may not seem like a hassle\
    \ here, but in programs where there are many calculations that are required with\
    \ an input, it can become quite tedious.\n\nBy using parameters, all we have to\
    \ do is change the values of the arguments once in the call statement and those\
    \ new values are then passed in, making it so that we don't need to change a thing\
    \ regarding the actual function.\n\n## Inputs as Arguments\n\nWe have used inputs\
    \ from the user before as values in our program and for functions, it is no different.\n\
    \nIf we want to use inputs in our functions, all we have to do is set those inputs\
    \ as arguments to the function, as such:\n\n```\ndef myfunc(a, b):\n    return\
    \ a+b\n\nvalue1 = int(input(\"select a number: \"))\nvalue2 = int(input(\"select\
    \ a number: \"))\nprint(myfunc(value1, value2))\n```\n\nAs you can see, we simply\
    \ created variables to take in the inputs, converted the inputs from strings to\
    \ ints, and then used those variables as arguments.\n\nAnother thing that you\
    \ may have noticed is that the name of the variables is not the same as the name\
    \ of the parameters in the function. This may seem like a mistake, but it is perfectly\
    \ fine.\n\nThe variable names of the input arguments do not have to be the same\
    \ as the names of the parameters that the function takes.\n\nWe must use the proper\
    \ parameter names (the *a* and *b* that the function takes in) within the function,\
    \ but outside of it, we can pass in any variable name as the input.\n\nThe function\
    \ takes in the value assigned to the variables we make and reassigns them to the\
    \ name of the parameter that it has defined.\n\nIn our case, the value contained\
    \ in *value1* becomes assigned to *a* and the value contained in *value2* becomes\
    \ assigned to *b*.\n\nYou also likely noticed that the setup of a function is\
    \ different from our normal code, like we give the function its inputs in the\
    \ call statement after the function instead of at the beginning of the code like\
    \ usual. This is because, as you know, Python runs in a top down manner, so we\
    \ cannot put the call statement before the function since Python hasn't seen the\
    \ function yet, so it will give you a NameError.\n\nThis is why the call statements\
    \ must be after the function has been defined.\n\nAs for the initialization of\
    \ the input variables, those can be placed before the function and then used in\
    \ the call statement after the function has been defined, however, it is always\
    \ best to keep the parts of code that are not in the function together to avoid\
    \ confusion.\n\n## CHAPTER 19: TRY-EXCEPT\n\nI'm sure we can all say that the\
    \ error messages from before weren't exactly what we'd call pleasant to read,\
    \ and sometimes, the error doesn't tell you exactly what went wrong in your program\
    \ and quits without giving you the chance to handle the error yourself.\n\n##\
    \ Try, Except\n\nTo solve that, we have the **try-except** statement. A try-except\
    \ statement is for error handling, as shown below:\n\n```\ntry:\n    txt = \"\
    hello\"\n    print(text)\nexcept:\n    print(\"An error happened, oops\")\n```\n\
    \nAnd this prints:\n\n```\nAn error happened, oops\n```\n\nThe format of a try\
    \ except works by having a **try** statement where the code goes in, and then\
    \ having an **except** statement, where, if an error occurs, instead of the program\
    \ quitting immediately, the programmer gets the chance to address the error by\
    \ either having a whole separate code segment in the case where an error occurs\
    \ or by simply telling the user where they went wrong.\n\n## Try, Except...Twice?\n\
    \nWe can also use the *except* statement for a specific error:\n\n```\ntry:\n\
    \    txt = \"hello\"\n    print(txt)\nexcept NameError:\n    print(\"A variable\
    \ is not defined\")\n```\n\nHere, we specified the type of error that the *except*\
    \ statement can check for and then print our custom error message if that error\
    \ occurs:\n\n```\nA variable is not defined\n```\n\nBut what if we get a different\
    \ error than what we were expecting? In that case, we can actually have 2 *except*\
    \ statements:\n\n```\ntry:\n    txt = \"hello\"\n    print(text)\nexcept SyntaxError:\n\
    \    print(\"You did not follow the rules of Python\")\nexcept:\n    print(\"\
    Something else went wrong\")\n```\n\nThe other *except* statement here is there\
    \ just in case if the error raised was not a SyntaxError.\n\nIn this case, the\
    \ error was actually a NameError, so the program will raise the NameError, check\
    \ to see if the except statement says anything about a NameError, and if not,\
    \ it goes into the second *except* statement:\n\n```\nSomething else went wrong\n\
    ```\n\n## Else\n\nIf nothing goes wrong, we can place an *else* statement:\n\n\
    ```\ntry:\n    txt = \"hello\"\n    print(txt)\nexcept NameError:\n    print(\"\
    A variable is not defined\")\nelse:\n    print(\"All good!\")\n```\n\nSince this\
    \ program has no mistakes, no error is raised and the variable *txt* and the else\
    \ statement are printed:\n\n![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_145_0.png)\n\
    \n## Finally\n\nOnce the try-except statements have completed, we can place the\
    \ **finally** block of code that executes no matter what. It can inform us that\
    \ the try-except is done:\n\n```\ntry:\n    txt = \"hello\"\n    print(txt)\n\
    except NameError:\n    print(\"A variable is not defined\")\nelse:\n    print(\"\
    All good!\")\nfinally:\n    print(\"The try-except is done!\")\n```"
  mdcn: "## 第18章：函数\n\n函数\n\n现在你已经理解了如何编写代码，接下来是组织代码的部分。不过别跑开，这不像打扫房间那样枯燥，组织代码实际上可以相当有趣，而且从长远来看还能节省你的时间！\n\
    \n函数似乎是一个新概念，但我们从本书开始就一直在使用它们。\n\n函数本质上是一块可以通过一条命令“调用”或执行的代码，这意味着我们只需编写一次，之后每当需要再次使用该代码块时，就可以调用它。这里有一个例子：\n\
    \n```\ndef myfunc():\n    a = 12\n    b = 20\n    return a+b\n\nmyfunc()\n```\n\
    \n如你所见，我们使用 *def* 关键字创建了函数，然后写了函数名，后跟括号和冒号。\n\n接着我们在函数内部编写了一些代码来对两个数字求和，并在最后写了\
    \ **return** a + b。\n\n**Return** 是一个新关键字，出现在函数的末尾。\n\nreturn 关键字的目的是**存储**函数输出的最终值，并让程序返回到调用函数时中断的地方。return\
    \ 语句不会打印任何内容。\n\n下面是一个图示，向你展示 return 和 call 语句是如何工作的：\n\n![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_134_0.png)\n\
    \n为了确保你理解这个图示，这里有一个解释。\n\n这个程序不是从函数开始的，Python 实际上会忽略所有这些代码，因为函数还没有被调用。\n\n程序从调用语句\
    \ *myfunc()* 开始。然后它回到函数，执行函数，接着 return 语句将程序带回 print 语句处中断的地方。\n\n## 参数\n\n我们一直在使用函数，如果你回顾一下，你会注意到它们通常在括号里有一些东西，无论是文本还是数字。这些被称为**参数**。\n\
    \n参数就像函数的输入，我们输入参数，函数使用这些作为输入来执行其内部的代码。\n\n例如，如果我们回顾之前的程序：\n\n```\ndef myfunc(a,\
    \ b):\n    return a+b\n\nprint(myfunc(12, 20))\n```\n\n现在，我们在括号内放置了两个参数 a 和 b，表示函数需要传入这两个参数才能执行。\n\
    \n然后我们可以调用函数并输入我们喜欢的任何数字。这些输入被称为**实参**。实参是传递给函数的输入，参数是函数接收的变量占位符。\n\n然而，它们不仅限于数字。它们可以是列表、字符串、布尔值以及你能想到的任何其他最适合你函数的数据类型。任何东西都可以传递给函数以满足你的编程需求。\n\
    \n参数的好处在于，如果我们想在不使用参数的情况下添加不同的数字集，我们就需要每次都更改函数内部的代码，这在这里可能看起来不是什么麻烦，但在需要大量输入计算的程序中，它会变得相当繁琐。\n\
    \n通过使用参数，我们所要做的就是在调用语句中更改一次实参的值，然后这些新值就会被传入，这样我们就不需要对实际函数做任何更改。\n\n## 输入作为实参\n\
    \n我们之前已经使用过用户的输入作为程序中的值，对于函数来说，这也没有什么不同。\n\n如果我们想在函数中使用输入，我们所要做的就是将这些输入设置为函数的实参，如下所示：\n\
    \n```\ndef myfunc(a, b):\n    return a+b\n\nvalue1 = int(input(\"select a number:\
    \ \"))\nvalue2 = int(input(\"select a number: \"))\nprint(myfunc(value1, value2))\n\
    ```\n\n如你所见，我们只是创建了变量来接收输入，将输入从字符串转换为整数，然后使用这些变量作为实参。\n\n你可能还注意到的另一件事是，变量的名称与函数中参数的名称不同。这看起来可能是个错误，但这是完全没问题的。\n\
    \n输入实参的变量名不必与函数接收的参数名相同。\n\n我们必须在函数内部使用正确的参数名（函数接收的 *a* 和 *b*），但在函数外部，我们可以传入任何变量名作为输入。\n\
    \n函数接收分配给我们创建的变量的值，并将其重新分配给它定义的参数名。\n\n在我们的例子中，*value1* 中包含的值被分配给 *a*，*value2*\
    \ 中包含的值被分配给 *b*。\n\n你可能还注意到函数的设置与我们正常的代码不同，比如我们在函数之后的调用语句中给函数输入，而不是像往常一样在代码开头。这是因为，如你所知，Python\
    \ 是自上而下运行的，所以我们不能在函数之前放置调用语句，因为 Python 还没有看到该函数，所以它会给你一个 NameError。\n\n这就是为什么调用语句必须在函数定义之后。\n\
    \n至于输入变量的初始化，它们可以放在函数之前，然后在函数定义之后的调用语句中使用，但是，最好将不在函数中的代码部分放在一起，以避免混淆。\n\n## 第19章：TRY-EXCEPT\n\
    \n我相信我们都能说，之前的错误信息并不完全是我们所说的愉快的阅读体验，有时，错误并没有确切地告诉你程序中出了什么问题，就退出了，没有给你自己处理错误的机会。\n\
    \n## Try, Except\n\n为了解决这个问题，我们有 **try-except** 语句。try-except 语句用于错误处理，如下所示：\n\
    \n```\ntry:\n    txt = \"hello\"\n    print(text)\nexcept:\n    print(\"An error\
    \ happened, oops\")\n```\n\n这会打印：\n\n```\nAn error happened, oops\n```\n\ntry\
    \ except 的格式是通过一个 **try** 语句来放置代码，然后是一个 **except** 语句，如果发生错误，程序不会立即退出，程序员有机会通过在发生错误时有一个完全独立的代码段，或者简单地告诉用户他们哪里出错了来处理错误。\n\
    \n## Try, Except...两次？\n\n我们也可以对特定错误使用 *except* 语句：\n\n```\ntry:\n    txt = \"\
    hello\"\n    print(txt)\nexcept NameError:\n    print(\"A variable is not defined\"\
    )\n```\n\n在这里，我们指定了 *except* 语句可以检查的错误类型，然后如果发生该错误，就打印我们的自定义错误消息：\n\n```\nA variable\
    \ is not defined\n```\n\n但如果我们得到的错误与预期的不同呢？在这种情况下，我们实际上可以有 2 个 *except* 语句：\n\n\
    ```\ntry:\n    txt = \"hello\"\n    print(text)\nexcept SyntaxError:\n    print(\"\
    You did not follow the rules of Python\")\nexcept:\n    print(\"Something else\
    \ went wrong\")\n```\n\n这里的另一个 *except* 语句是为了以防引发的错误不是 SyntaxError。\n\n在这种情况下，错误实际上是\
    \ NameError，所以程序会引发 NameError，检查 except 语句是否提到了 NameError，如果没有，它就会进入第二个 *except*\
    \ 语句：\n\n```\nSomething else went wrong\n```\n\n## Else\n\n如果一切正常，我们可以放置一个 *else*\
    \ 语句：\n\n```\ntry:\n    txt = \"hello\"\n    print(txt)\nexcept NameError:\n \
    \   print(\"A variable is not defined\")\nelse:\n    print(\"All good!\")\n```\n\
    \n由于这个程序没有错误，没有引发错误，变量 *txt* 和 else 语句被打印：\n\n![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_145_0.png)\n\
    \n## Finally\n\n一旦 try-except 语句完成，我们可以放置 **finally** 代码块，无论发生什么都会执行。它可以通知我们 try-except\
    \ 已经完成：\n\n```\ntry:\n    txt = \"hello\"\n    print(txt)\nexcept NameError:\n\
    \    print(\"A variable is not defined\")\nelse:\n    print(\"All good!\")\nfinally:\n\
    \    print(\"The try-except is done!\")\n```"
