- md: "## CHAPTER 15: DICTIONARIES AND DICTIONARY METHODS\n\nYou may be confused as\
    \ to what dictionaries have to do with coding, but this makes complete sense and\
    \ they are very useful when you understand them.\n\nDictionaries come in key value\
    \ pairs. Just like how the letter A is the first letter of the alphabet, a key\
    \ value pair could be *A : 1*, where A is the key and 1 is the value. A dictionary\
    \ assembles many of these key value pairs as elements into a group enclosed by\
    \ curly braces. Each element is separated by commas, as shown below:\n\n```\n\
    MyDictionary = {\"A\":1, \"B\":2, \"C\":3, \"D\":4}\n```\n\n### Dictionary Methods\n\
    \nOne use of dictionaries is to retrieve the value from the key, and with these\
    \ key value pairs like this, we can use the **.get()** method for dictionaries\
    \ to find out the value from the key:\n\n```\nMyDictionary.get(\"A\")\n```\n\n\
    And the result will be 1.\n\nIf we input a key that is not in the dictionary,\
    \ then we can supply a default value to the .get() method:\n\n```\nMyDictionary.get(\"\
    E\", \"You forgot some of the alphabet...\")\n```\n\nSince \"E\" is not a key\
    \ in the dictionary, it will print \"You forgot some of the alphabet\"\n\nThere\
    \ are many more dictionary methods listed below, but you can also state the name\
    \ of your dictionary followed by a dot to get a list of all of the methods you\
    \ can use:\n\n| Method | Description |\n|---|---|\n| clear() | Removes all elements\
    \ from a dictionary |\n| copy() | Returns a copy of the dictionary |\n| fromkeys()\
    \ | Returns a dictionary with specified keys and value |\n| get() | Returns the\
    \ value of a specified key |\n| keys() | Returns a list containing the dictionary\
    \ keys |\n| pop() | Removes the element with a specified key |\n| popitem() |\
    \ Removes the last inserted key value pair |\n| setdefault() | Returns the value\
    \ of a specified key, but if that key does not exist, insert the key and value\
    \ as an argument |\n| update() | Updates the dictionary with specified key value\
    \ pairs |\n| values() | Returns a list of all key value pairs in a dictionary\
    \ |\n\n### Empty Dictionaries\n\nYes, I know, this is getting a bit repetitive,\
    \ but I assure you, this is the last one. An empty dictionary is just like empty\
    \ strings and empty lists, it's a dictionary with nothing in it.\n\nWe can add\
    \ key value pairs using the *update()* method:\n\n```\nmydict = {\"A\" : 1, \"\
    B\" : 2, \"C\" : 3, \"D\" : 4}\n\nmydict.update({\"E\" : 1})\n\nprint(mydict)\n\
    ```\n\nAs you can see, we simply enter a key value pair and it adds it to the\
    \ dictionary:\n\n```\n{'A': 1, 'B': 2, 'C': 3, 'D': 4, 'E': 1}\n```\n\n### Applications\n\
    \nYou may be wondering why this is useful, well here's a situation. Let's say\
    \ you ran a calendar company that kept track of the birthdays of millions of people.\n\
    \nLooking for one person's birthday can be tricky with that many people, but if\
    \ all of the names are in dictionaries, then you can simply use the .get() method,\
    \ input the name, and in a fraction of a second, you have the date. Nifty isn't\
    \ it!\n\n## CHAPTER 16: IF, ELSE, AND ELSE IF STATEMENTS\n\n### If and Else\n\n\
    Statements such as if or else are known as **conditional statements** because\
    \ there is a condition involved:\n\nIf John likes ice cream, give him ice cream.\
    \ Else, give him candy.\n\nIn Python, it works the same, the only thing that is\
    \ different is the formatting.\n\nIf and else statements go hand in hand in Python,\
    \ and they are normally formatted like this:\n\n```\nx = 7\n\nif x > 10:\n   \
    \ print(\"x is greater than 10\")\n\nelse:\n    print(\"x is not greater than\
    \ 10\")\n```\n\nNote, we did not put a statement for the else clause because it\
    \ ties in with the if statement.\n\nThe else means the opposite of what the if\
    \ statement is saying, so in our case, that means that the else is representing\
    \ the case where x is not greater than 10.\n\nAnother thing you may have noticed\
    \ is the indentation. Indenting simply means that the code is inside another statement\
    \ and will only get executed if the statement is *True*. Indenting tells the program\
    \ that the code is apart of and is contained in something else, like conditional\
    \ statements, but also in things like loops or functions, which we will get into\
    \ later.\n\nThus, *if* statements can be evaluated as either *True* or *False*.\n\
    \nIf it is *True*, we will be able to execute the code inside of the *if* statement\
    \ and then skip the *else* statement, but if it is not *True*, then we skip over\
    \ the *if* statement and go to the next line after the *if* statement.\n\n###\
    \ ==?\n\nOne operator to remember is **the comparison operator, ==**. This may\
    \ seem odd, why would we ever need a double equal to symbol?\n\nWell, it has a\
    \ very useful purpose and you will use it greatly during your coding endeavors.\
    \ The normal = is an **assignment operator**, we can assign something a value.\
    \ Now, let us create an if statement that, if it is true, we will print “wow”:\n\
    \n```\nx = 10\n\nif x / 2 == 5:\n    print(\"wow\")\n```\n\nAs you can see, there\
    \ is a red underline under the equal to symbol because we were supposed to use\
    \ the comparison operator there.\n\nBy saying $x / 2 = 5$, we are assigning the\
    \ value $x / 2$ to 5, we are not checking to see if it is 5. Therefore, we need\
    \ to use the comparison operator, ==. A good rule of thumb is to only use the\
    \ normal = when we are assigning a value to a variable, but everywhere else, we\
    \ use == .\n\n### Else If\n\nElse if statements (written as *elif*) are used when\
    \ we have multiple conditions we want to check, but we only want to go onto the\
    \ next condition if the previous condition fails.\n\nFor example, if we have a\
    \ variable, *age*, then we can write something like this:\n\n```\nage = int(input\
    \ (\"What is your age?:\"))\n\nif age < 18:\n    print (\"Minor\")\n\nelif age\
    \ >= 18 and age < 40:\n    print( \"Adult\")\n\nelif age >= 40 and age < 60:\n\
    \    print(\"Middle Aged\")\n\nelse:\n    print(\"Elderly\")\n```\n\nAs you can\
    \ see, we only move onto the next statement if the previous one fails. If *age*\
    \ was 16, for example, we would pass the first condition and simply print \"Minor\"\
    \ without going through the rest of the code since we did not fail it. Once one\
    \ of the conditions are passed, the rest are ignored and we move on with the program.\n\
    \nA good way to think about *if* and *elif* and *else* commands is with tree diagrams:\n\
    \n![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_114_0.png)\n\nThe benefit of using\
    \ *elif* statements rather than using multiple *if* statements is that the other\
    \ *if* statements would still be run even when a previous condition is satisfied.\n\
    \nOne way to think about it is that *elif* statements all check whether one of\
    \ them have been satisfied and respond accordingly, whereas multiple *if* statements\
    \ are all independent and are checked no matter what.\n\n### And, Or, and Not\n\
    \nNow let’s get a bit more complex.\n\nI’m sure all of you know what the words\
    \ **and**, **or**, and **not** mean, and in the context of coding, they are quite\
    \ similar.\n\n*And* means that both conditions must be *True* for the whole statement\
    \ to be *True*\n\n*Or* means that one of the conditions have to be *True* for\
    \ the statement to be *True*\n\n*Not* reverses the result of the condition (*True*\
    \ => *False*, *False* => *True*)\n\nLet's look at some examples to clear up any\
    \ doubts. Using the same example from before:\n\n```\nx = 7\n\nif x > 10 and x\
    \ > 5:\n    print(\"wow!\")\nelse:\n    print(\"uh oh\")\n```\n\nHere, we see\
    \ that we satisfy the second condition of the *if* statement but not the first,\
    \ so the whole statement goes to *False*. We'll then move onto the *else* statement.\n\
    \nNow it's time for *Or*:\n\n```\nx = 7\n\nif x > 10 or x > 5:\n    print(\"wow!\"\
    )\n\nelse:\n    print(\"uh oh\")\n```\n\nHere our result is different, $x$ might\
    \ not satisfy the first condition, but this is an *or* operator, meaning as long\
    \ as one of them is *True*, the whole statement is *True*. 7 is greater than 5,\
    \ so we will print \"wow!\"\n\nAnd finally, *Not*:\n\n```\nx = 7\n\nif not(x >\
    \ 10) :\n    print(\"wow!\")\n\nelse:\n    print(\"uh oh\")\n```\n\nWe see that\
    \ 7 is not greater than 10 so the first condition is not met, but we have a *not*\
    \ in front of it, meaning the *False* goes to a *True*.\n\nSince the if statement\
    \ is evaluated to *True*, we execute the code inside of it and print “wow!”\n\n\
    ### Nested If And Else Statements\n\nThis essentially means having a conditional\
    \ statement within another conditional statement.\n\nThese are useful in cases\
    \ where we must check for one condition and only when that condition is satisfied\
    \ can we check for another condition within that.\n\nHere’s an example:"
  mdcn: "## 第15章：字典与字典方法\n\n你可能会困惑字典与编程有什么关系，但这完全合理，一旦理解了它们，你会发现字典非常有用。\n\n字典以键值对的形式存在。就像字母A是字母表的第一个字母一样，一个键值对可以是\
    \ *A : 1*，其中A是键，1是值。字典将许多这样的键值对作为元素组合在一个由花括号包围的集合中。每个元素之间用逗号分隔，如下所示：\n\n```\n\
    MyDictionary = {\"A\":1, \"B\":2, \"C\":3, \"D\":4}\n```\n\n### 字典方法\n\n字典的一个用途是通过键来检索值。对于这样的键值对，我们可以使用字典的\
    \ **.get()** 方法来根据键查找值：\n\n```\nMyDictionary.get(\"A\")\n```\n\n结果将是1。\n\n如果我们输入一个字典中不存在的键，那么我们可以为.get()方法提供一个默认值：\n\
    \n```\nMyDictionary.get(\"E\", \"You forgot some of the alphabet...\")\n```\n\n\
    由于\"E\"不是字典中的一个键，它将打印\"You forgot some of the alphabet\"。\n\n下面列出了更多字典方法，但你也可以通过输入字典名称后跟一个点来获取所有可用方法的列表：\n\
    \n| 方法 | 描述 |\n|---|---|\n| clear() | 从字典中移除所有元素 |\n| copy() | 返回字典的一个副本 |\n|\
    \ fromkeys() | 返回一个具有指定键和值的字典 |\n| get() | 返回指定键的值 |\n| keys() | 返回一个包含字典键的列表\
    \ |\n| pop() | 移除指定键的元素 |\n| popitem() | 移除最后插入的键值对 |\n| setdefault() | 返回指定键的值，但如果该键不存在，则插入该键和值作为参数\
    \ |\n| update() | 用指定的键值对更新字典 |\n| values() | 返回字典中所有键值对的列表 |\n\n### 空字典\n\n是的，我知道，这有点重复，但我向你保证，这是最后一个。空字典就像空字符串和空列表一样，是一个没有任何内容的字典。\n\
    \n我们可以使用 *update()* 方法添加键值对：\n\n```\nmydict = {\"A\" : 1, \"B\" : 2, \"C\" : 3,\
    \ \"D\" : 4}\n\nmydict.update({\"E\" : 1})\n\nprint(mydict)\n```\n\n如你所见，我们只需输入一个键值对，它就会将其添加到字典中：\n\
    \n```\n{'A': 1, 'B': 2, 'C': 3, 'D': 4, 'E': 1}\n```\n\n### 应用\n\n你可能想知道这有什么用，好吧，这里有一个场景。假设你经营一家日历公司，需要跟踪数百万人的生日。\n\
    \n在这么多人中查找一个人的生日可能很棘手，但如果所有名字都在字典中，那么你只需使用.get()方法，输入名字，瞬间就能得到日期。是不是很巧妙！\n\n##\
    \ 第16章：IF、ELSE和ELSE IF语句\n\n### If和Else\n\n像if或else这样的语句被称为**条件语句**，因为其中涉及一个条件：\n\
    \n如果约翰喜欢冰淇淋，就给他冰淇淋。否则，就给他糖果。\n\n在Python中，工作原理相同，唯一不同的是格式。\n\n在Python中，if和else语句通常像这样格式化：\n\
    \n```\nx = 7\n\nif x > 10:\n    print(\"x is greater than 10\")\n\nelse:\n   \
    \ print(\"x is not greater than 10\")\n```\n\n注意，我们没有为else子句放置语句，因为它与if语句相关联。\n\
    \nelse意味着与if语句相反的情况，所以在我们的例子中，这意味着else代表x不大于10的情况。\n\n你可能注意到的另一件事是缩进。缩进仅仅意味着代码位于另一个语句内部，并且只有在该语句为*True*时才会执行。缩进告诉程序，这段代码是某个其他部分的一部分并包含在其中，比如条件语句，但也包括循环或函数等，我们稍后会讲到。\n\
    \n因此，*if*语句可以被评估为*True*或*False*。\n\n如果它是*True*，我们将能够执行*if*语句内部的代码，然后跳过*else*语句；但如果它不是*True*，那么我们将跳过*if*语句，转到*if*语句之后的下一行。\n\
    \n### ==?\n\n一个需要记住的运算符是**比较运算符，==**。这可能看起来很奇怪，为什么我们需要一个双等号符号？\n\n嗯，它有一个非常有用的用途，你将在编码过程中大量使用它。普通的=是一个**赋值运算符**，我们可以给某物赋值。现在，让我们创建一个if语句，如果为真，我们将打印“wow”：\n\
    \n```\nx = 10\n\nif x / 2 == 5:\n    print(\"wow\")\n```\n\n如你所见，等号下面有红色下划线，因为我们本应在那里使用比较运算符。\n\
    \n通过说 $x / 2 = 5$，我们是在将值 $x / 2$ 赋给5，而不是检查它是否等于5。因此，我们需要使用比较运算符==。一个经验法则是，只在给变量赋值时使用普通的=，而在其他所有地方都使用==。\n\
    \n### Else If\n\nElse if语句（写作*elif*）用于当我们有多个条件需要检查，但我们只想在前一个条件失败时才进入下一个条件的情况。\n\
    \n例如，如果我们有一个变量*age*，那么我们可以这样写：\n\n```\nage = int(input (\"What is your age?:\"\
    ))\n\nif age < 18:\n    print (\"Minor\")\n\nelif age >= 18 and age < 40:\n  \
    \  print( \"Adult\")\n\nelif age >= 40 and age < 60:\n    print(\"Middle Aged\"\
    )\n\nelse:\n    print(\"Elderly\")\n```\n\n如你所见，我们只在前一个语句失败时才进入下一个语句。例如，如果*age*是16，我们将通过第一个条件，直接打印\"\
    Minor\"，而不会执行其余代码，因为我们没有失败。一旦通过了其中一个条件，其余的条件将被忽略，我们继续执行程序。\n\n思考*if*、*elif*和*else*命令的一个好方法是使用树状图：\n\
    \n![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_114_0.png)\n\n使用*elif*语句而不是多个*if*语句的好处在于，即使前一个条件满足，其他*if*语句仍然会被执行。\n\
    \n一种思考方式是，*elif*语句都检查是否满足其中一个条件并相应地做出响应，而多个*if*语句都是独立的，无论是否满足都会被检查。\n\n### And、Or和Not\n\
    \n现在让我们稍微复杂一点。\n\n我相信你们都知道**and**、**or**和**not**这些词的意思，在编程的上下文中，它们非常相似。\n\n*And*意味着两个条件都必须为*True*，整个语句才为*True*。\n\
    \n*Or*意味着其中一个条件必须为*True*，语句才为*True*。\n\n*Not*会反转条件的结果（*True* => *False*，*False*\
    \ => *True*）。\n\n让我们看一些例子来消除任何疑虑。使用之前的例子：\n\n```\nx = 7\n\nif x > 10 and x > 5:\n\
    \    print(\"wow!\")\nelse:\n    print(\"uh oh\")\n```\n\n这里，我们看到我们满足了*if*语句的第二个条件，但不满足第一个条件，所以整个语句为*False*。然后我们将进入*else*语句。\n\
    \n现在轮到*Or*了：\n\n```\nx = 7\n\nif x > 10 or x > 5:\n    print(\"wow!\")\n\nelse:\n\
    \    print(\"uh oh\")\n```\n\n这里我们的结果不同，$x$可能不满足第一个条件，但这是一个*or*运算符，意味着只要其中一个为*True*，整个语句就为*True*。7大于5，所以我们将打印\"\
    wow!\"。\n\n最后是*Not*：\n\n```\nx = 7\n\nif not(x > 10) :\n    print(\"wow!\")\n\n\
    else:\n    print(\"uh oh\")\n```\n\n我们看到7不大于10，所以第一个条件不满足，但我们前面有一个*not*，这意味着*False*变成了*True*。\n\
    \n由于if语句被评估为*True*，我们执行其内部的代码并打印“wow!”。\n\n### 嵌套If和Else语句\n\n这本质上意味着在一个条件语句内部包含另一个条件语句。\n\
    \n当我们必须检查一个条件，并且只有在该条件满足时才能检查另一个条件时，这些语句非常有用。\n\n这里有一个例子："
