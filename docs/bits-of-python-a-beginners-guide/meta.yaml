    # CHAPTER 06: ALL ABOUT STRINGS


    Strings may seem simple, but there are an unlimited amount of uses for them.


    ## Multiline Strings


    Strings can go for multiple lines by simply adding another quote mark after:


    ```

    Dear School Administration,


    We wish to have less Homework.


    Sincerely,


    The Students.

    ```


    And this will print it all as one large block just like how you input it.


    ## Empty Strings


    Empty strings are exactly like they sound, they''re strings that are simply initialized
    with nothing in them. They look something like this:


    ```python

    Empty = ""

    ```


    These may seem useless, what can you do with an empty string? Well, they''re very
    useful given the correct situation.


    Let''s say we wanted to write a program to check if a string has vowels or not,
    and then we create a new string with only the vowels in it. We will cover how
    to actually do this later on, but let''s say we have the program that can give
    us all of the vowels. Now where do we put them? This is where an empty string
    comes in handy. If we initialize a variable as an empty string, we can add the
    vowels to the empty string as we go (You will learn how to do this soon!) and
    voila, there we have it. Useful, right? The concepts to code this type of program
    will be covered in the coming chapters, but once you feel that you understand
    how to do this once you continue reading, feel free to come back here and code
    this yourself.


    Once again using the box example, the problem from above can be represented like
    this:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_41_0.png)


    ## String Indexing


    Indexing is one of the most important tools of programming, and this will be further
    explored soon, but for now, we can use indexing to refer to specific parts of
    a string.


    The **Index** refers to each and every character in a string, with each character
    having its own index. Indexes start from 0 and go until the end of the string
    (Ex. Index 0 of the string “Hello” would be the character “H” and index 4 would
    be “o”. The last index of a string is always one less than the length of the string
    since indexes start at 0).


    We can code this by saying:


    ```python

    String = "How are you?"

    print(String[0])

    ```


    This will print the character of index 0, or “H”.


    To print the last index, we can say:


    ```python

    String = "How are you?"

    print(String[11])

    ```


    *Remember spaces count too!*


    An alternative method is we can use negative numbers to do this:


    ```python

    String = "How are you?"

    print(String[-1])

    ```


    This would give you the last index, or the “?”. This can be very useful when we
    do not know the length of the string.


    Similarly, if we said:


    ```python

    String = "How are you?"

    print(String[-12])

    ```


    This would give you the “H”.


    ## String Splicing


    String splicing is set up as follows:


    We type the name of the string followed by brackets, like normal, but then we
    follow this syntax in the brackets:


    ```python

    String[start : stop : step]

    ```


    Essentially, what this is doing is we can print specific parts of a string by
    specifying which index we start at and end at. If we do String[0:], we will receive
    the whole string:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_44_0.png)


    (leaving the field blank will have it default to the end of the string)


    We can split it up based on the indexes, so *String[2:-2]* will give us everything
    from the 3rd character (2nd index) to the third to last character:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_45_0.png)


    As for the last parameter, the step, this is how many letters we skip. By leaving
    it blank, this means that we print every letter in the start and stop range, but
    if we changed it to 3, then this would make it so that we start at the start index,
    print the character at that index, skip 3 indexes, print the character at that
    index, and so on and so forth until we reach the ending index.


    If the step makes it so that we go past the ending index, then the last index
    printed would be the one before the step crossed the ending index.


    Let''s say we use the same examples as before but set the step to 3:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_46_0.png)


    As you can see, the step printed every third character but once it got to 2 characters
    before the end of the string, it was unable to print anything else so it printed
    the last index before the string ended.


    ## Concatenation


    We can also add variables to strings, but the format for it is a bit different:


    ```python

    string = "I''m good"


    print("Hello, how are you " + string)

    ```


    And the result for this will simply be:


    ```

    Hello, how are you I''m good

    ```


    As you can see, to add a string to another string, we will need to add a plus
    sign and then the name of the variable. This combination of strings is called
    **concatenation**. Note, however, that you can only concatenate strings with strings,
    so if you had something like this:


    ```python

    num = 7


    print("I like donuts so much, I have " + num)

    ```


    This may not give an error in the code immediately, but when you run the code
    you will get this:


    ```

    print("I like donuts so much, I have " + num)

    TypeError: can only concatenate str (not "int") to str

    ```


    This error just means that you cannot concatenate strings to any other data type,
    it must be strings to strings.


    We don''t need to assign the string to a variable to be able to concatenate it,
    we can also simply place a plus sign between two strings and print, that would
    work perfectly.


    ## Special Characters


    Special characters in Python always begin with a backslash to indicate that the
    following letter is a special character. There are many special characters, but
    most you will rarely use and see. A few common special characters are \n, \'',
    and \".


    \n is simply a new line command, if you place this at the end of a string, it
    will create a new line after it, so the next printed line will have a gap in between
    the previous printed line:


    ```python

    print("Wow, this is cool \n")

    print("Am i on a new line?")

    ```


    And the result will look like this:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_49_0.png)


    The format for the rest of the commands is exactly the same as the \n command
    but with a few minor tweaks.


    The \'' and \" commands are very similar and are useful when you need to have
    quotes in your string. For example, if you wanted to quote Socrates and print
    the quote “Wonder is the beginning of wisdom”, you could try and put that in a
    string:


    ```python

    print("""Wonder is the beginning of wisdom" - Socrates")

    ```


    But as you can see, this produces an error because we used double quotes in the
    actual quote, so Python thinks that you are ending the string.


    To solve this, we can simply use the \" command:


    ```python

    print("\"Wonder is the beginning of wisdom\" - Socrates")

    ```


    By doing this, we were able to obtain this wonderful Socrates quote in our terminal:


    ```

    "Wonder is the beginning of wisdom" - Socrates

    ```


    The \'' command is exactly the same format as the \" command, we just need to
    swap out the “ with a ‘:


    ```python

    print("\''Wonder is the beginning of wisdom\'' - Socrates")

    ```


    And now in the terminal, we get this result:


    ```

    ''Wonder is the beginning of wisdom'' - Socrates

    ```


    Below is a list of a few different special characters in case you want to note
    them down for future use:'
