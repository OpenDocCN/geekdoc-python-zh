    are Python projects. To make the most out of this book, be sure to try each example
    in **this** book for yourself. You may think you understand it at the'
- md: 'first glance, but when you try it, you may realize that you are running into
    issues. Doing this will allow you to fully understand each problem and solution.
    Create a folder and place all of your Python projects/exercises that we do in
    there once you have saved them. This will allow you to look back on them if you
    need to remember how to do something.


    Your first program will be a “Hello World!” project where you will print the words
    “Hello World!” into the terminal.


    This introduces our first built-in Python command: **print()**


    The **syntax** (technical term for rules) of the print command is that all text
    inside the parentheses must be in ‘single’ or “double” quotes for Python to recognize
    it.


    Similarly, when we type *print("Hello World!")* into our text editor, this should
    pop up in our terminal when we run the program:


    ```

    Hello World!

    ```


    Great! That''s one project done that has exposed you to Python.


    ## CHAPTER 03: COMMENTS


    **Comments** in Python are very useful tools for explaining and understanding
    code. A comment is simply a statement that can be used to explain a code segment
    and explain the purpose.


    A comment can be written like so:


    ```python

    # This is a comment

    ```


    Python knows you''re writing a comment when you start a new line with a hashtag
    (#). Comments have **no effect on your code** and are simply statements that you,
    the programmer, can read to help you or others understand the code.


    The program ignores all comments, so comment away!


    ## CHAPTER 04: THE BASICS


    Now it''s time to learn about data types in Python. This may not be the most exciting
    part, but it is vital, nonetheless.


    ### Strings


    The “Hello World!” in the last project you did is known as a **string**. Strings
    are essentially all text inputs and must always be enclosed by ‘single’ or “double”
    quotes. Strings can be words, like “*Hello*” or even numbers, like “5”. Anything
    enclosed in quotes becomes a string.


    ### Ints


    Integers like 10, 15, -17, and 39 are known as an **int**, short for integers.
    You are able to perform mathematical operations on them like addition, subtraction,
    and multiplication. We cannot perform mathematical operations on strings. In the
    previous example, we made the number 5 into a string by enclosing in double quotes,
    meaning we cannot perform mathematical operations on that either.


    ### Floats


    Numbers such as 10.1, 23.5, and -9.54 are known as **floats**, or **floating-point
    numbers**. They represent decimal numbers and, much like ints, mathematical operations
    can be performed on them.


    ### Boolean


    The last major data type is the **Boolean**, which represents ***True*** or ***False***
    statements.


    ### Variables


    **Variables** are an essential part of any programming language, and we use these
    to store data in the computer for later use. For example, we can say *price* =
    10, or *name* = “John”. *price* and *name* are both variables. Variables can store
    anything, Strings, Ints, Booleans, or Floats.


    When we said *price* = 10 and *name* = "John", this is known as the **initialization**
    of the variable, when we assign it a value.


    Think of assigning variables a value as placing the value in a box:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_26_0.png)


    An interesting property of variables is they can be used to print instead of typing
    out everything. Take the "Hello World!" Program from before. Instead of saying
    *print("Hello World!")*, we could say this:


    ```python

    Text = "Hello World!"


    print(Text)

    ```


    This results in the exact same thing as before.


    Python is **case sensitive** (capitalization matters!) so make sure everything
    is exactly the same when typing. If we change the capitalization on the variable
    *Text* when we print it in the last example, we will get this error:


    ```

    NameError: name ''text'' is not defined. Did you mean: ''Text''?

    ```


    Another thing to note is that if we have something like:


    ```

    Value = 10


    Value = 20


    print(Value)

    ```


    What comes out? The way Python works is it goes top to bottom, so the data stored
    in value will be the **last updated version**, so our result will be 20.


    Using the same example as before, think of the box as something that can only
    contain one item at a time:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_28_0.png)


    Another cool thing you can do with variables is that, if your variable is a number,
    we can increment it by saying:


    ```

    Value = 10


    Value = Value + 1


    print(Value)

    ```


    This may seem confusing from a mathematics standpoint, how can a number be equal
    to that number plus one? Well, in programming, all this is doing is **reassigning**
    the value of the variable to one value above it, so *Value = Value + 1* reassigns
    the variable *Value* from 10 to 11:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_29_0.png)


    Another way to write this is with a shortcut, += :


    ```

    Value = 10


    Value += 1


    print(Value)

    ```


    And this prints the same result:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_30_0.png)


    If this was a bit difficult to visualize, here''s an image using the diagrams
    from before:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_30_1.png)


    ## CHAPTER 05: ARITHMETIC OPERATIONS AND OPERATOR PRECEDENCE


    I''m sure we''ve all heard of the operators such as addition (+), subtraction
    (-), multiplication (*), and division (/), but there are a few more in Python
    that are represented a bit differently than their real-world counterparts, as
    shown on the next page.


    In school, you learn that you do parentheses first, then exponents, then multiplication
    and division, and then addition and subtraction, and Python works similarly. In
    Python, we always evaluate parentheses, then exponents, then multiplication and
    division, and then addition and subtraction, but there are many more that are
    a bit more complex.


    Instead of explaining each through text, a visual representation may be better.
    Below is a table that displays all the operators you will ever need in order of
    their respective precedence. Pay attention to the operator list below, I will
    be using some of them in upcoming examples and projects. If you see me using an
    operator that you have not seen before, refer back here and you should be able
    to see what I used. I have compiled most of the operators here in this table,
    so you may see some that you have never heard of or seen before. As you get into
    the later stages of the book, those operators will become more and more clear,
    so keep reading!


    ### Arithmetic Operators


    | Operator | Name | Example |

    | :--- | :--- | :--- |

    | + | Addition | x + y (2 + 3 = 5) |

    | - | Subtraction | x - y (3 - 2 = 1) |

    | * | Multiplication | x * y (2 * 3 = 6) |

    | / | Division | x / y (2 / 4 = 0.5) |

    | ** | Exponent | x ** y (2 ** 3 = 8) |

    | % | Modulus | x % y (4 % 2 = 0) **Remainder when 4 is divided by 2** |

    | // | Floor Division | x // y (3 // 2 = 1) **3 / 2 is 1.5, but the floor division
    rounds it down to the nearest whole number, which is 1** |


    ### Assignment Operators


    | Operator | Example | Explanation |

    | :--- | :--- | :--- |

    | = | x = y | Assigns x to y |

    | += | x += y | Same as x = x + y. Increments x by value y. Ex. x = 4, x += 3.
    **This makes x equal 7** |

    | -= | x -= y | Same as x = x - y. Decrements x by value y |

    | *= | x *= y | Same as x = x * y. Reassigns the value of x to x * y. Ex. x =
    4, x *= 3. **This makes x equal 12** |

    | /= | x /= y | Same as x = x / y. Reassigns the value of x to x / y |

    | **= | x **= y | Same as x = x ** y. Reassigns the value of x to x ** y |

    | %= | x %= y | Same as x = x % y. Reassigns the value of x to x % y |

    | //= | x //= y | Same as x = x // y. Reassigns the value of x to x // y |


    ### Comparison Operators


    | Operator | Name | Example |

    | :--- | :--- | :--- |

    | == | Comparison Equal To | x == y. **Checks if x is equal to y. Does not assign
    x to y** |

    | != | Not Equal To | x != y. **Checks if x is not equal to y** |

    | > | Greater Than | x > y. **Checks if x is greater than y** |

    | < | Less Than | x < y. **Checks if x is less than y** |

    | >= | Greater Than or Equal To | x >= y. **Checks if x is greater than or equal
    to y** |

    | <= | Less Than or Equal To | x <= y. **Checks if x is less than or equal to
    y** |'
  mdcn: '乍一看似乎很简单，但当你尝试时，可能会发现自己遇到了问题。这样做能让你充分理解每个问题和解决方案。创建一个文件夹，将我们完成的所有Python项目/练习保存在其中。这样，当你需要回忆如何做某事时，可以随时回顾。


    你的第一个程序将是一个“Hello World!”项目，你将在终端中打印出“Hello World!”这几个字。


    这引入了我们第一个Python内置命令：**print()**


    **print**命令的**语法**（规则的专业术语）是，括号内的所有文本必须用‘单引号’或“双引号”括起来，Python才能识别它。


    同样，当我们在文本编辑器中输入*print("Hello World!")*时，运行程序后，终端中应该会显示：


    ```

    Hello World!

    ```


    太棒了！你已经完成了一个让你接触Python的项目。


    ## 第三章：注释


    Python中的**注释**是解释和理解代码的非常有用的工具。注释只是一条语句，可用于解释代码段并说明其用途。


    注释可以这样写：


    ```python

    # This is a comment

    ```


    当你以井号（#）开始新行时，Python就知道你在写注释。注释**对你的代码没有任何影响**，它们只是供你（程序员）阅读的语句，以帮助你或他人理解代码。


    程序会忽略所有注释，所以尽情注释吧！


    ## 第四章：基础


    现在是时候学习Python中的数据类型了。这可能不是最令人兴奋的部分，但它至关重要。


    ### 字符串


    你上一个项目中的“Hello World!”被称为**字符串**。字符串本质上是所有文本输入，必须始终用‘单引号’或“双引号”括起来。字符串可以是单词，如“*Hello*”，甚至是数字，如“5”。任何用引号括起来的东西都会变成字符串。


    ### 整数


    像10、15、-17和39这样的整数被称为**int**，即整数的缩写。你可以对它们执行数学运算，如加法、减法和乘法。我们不能对字符串执行数学运算。在前面的例子中，我们通过用双引号将数字5括起来，使其变成了字符串，这意味着我们也不能对它执行数学运算。


    ### 浮点数


    像10.1、23.5和-9.54这样的数字被称为**浮点数**。它们代表小数，与整数类似，可以对它们执行数学运算。


    ### 布尔值


    最后一个主要的数据类型是**布尔值**，它表示***True***或***False***语句。


    ### 变量


    **变量**是任何编程语言的重要组成部分，我们使用它们将数据存储在计算机中以备后用。例如，我们可以说*price* = 10，或者*name* = “John”。*price*和*name*都是变量。变量可以存储任何东西，字符串、整数、布尔值或浮点数。


    当我们说*price* = 10和*name* = "John"时，这被称为变量的**初始化**，即我们为其赋值。


    将变量赋值想象成将值放入一个盒子中：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_26_0.png)


    变量的一个有趣特性是，它们可以用来打印，而无需输入所有内容。以之前的“Hello World!”程序为例。我们不必说*print("Hello World!")*，而可以这样说：


    ```python

    Text = "Hello World!"


    print(Text)

    ```


    这与之前的结果完全相同。


    Python是**区分大小写的**（大小写很重要！），因此在输入时请确保所有内容完全相同。如果我们在上一个例子中打印变量*Text*时改变了大小写，我们会得到这个错误：


    ```

    NameError: name ''text'' is not defined. Did you mean: ''Text''?

    ```


    另一件需要注意的事情是，如果我们有类似这样的代码：


    ```

    Value = 10


    Value = 20


    print(Value)

    ```


    输出是什么？Python的工作方式是从上到下执行，因此存储在value中的数据将是**最后更新的版本**，所以我们的结果将是20。


    使用与之前相同的例子，将盒子想象成一次只能容纳一个物品的东西：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_28_0.png)


    使用变量的另一个酷炫功能是，如果你的变量是一个数字，我们可以通过这样说来递增它：


    ```

    Value = 10


    Value = Value + 1


    print(Value)

    ```


    从数学的角度来看，这可能令人困惑，一个数字怎么能等于那个数字加一呢？嗯，在编程中，这所做的只是将变量的值**重新赋值**为比它大一的值，所以*Value =
    Value + 1*将变量*Value*从10重新赋值为11：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_29_0.png)


    另一种写法是使用快捷方式+=：


    ```

    Value = 10


    Value += 1


    print(Value)

    ```


    这会打印出相同的结果：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_30_0.png)


    如果这有点难以想象，这里有一张使用之前图表的图片：


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_30_1.png)


    ## 第五章：算术运算和运算符优先级


    我相信我们都听说过加法（+）、减法（-）、乘法（*）和除法（/）等运算符，但在Python中还有更多运算符，它们的表示方式与现实世界中的对应物略有不同，如下一页所示。


    在学校里，你学到的是先算括号，然后是指数，接着是乘法和除法，最后是加法和减法，Python的工作方式类似。在Python中，我们总是先计算括号，然后是指数，接着是乘法和除法，最后是加法和减法，但还有更多更复杂的运算符。


    与其通过文字解释每一个，不如用视觉表示可能更好。下面是一个表格，按优先级顺序显示了你将来会用到的所有运算符。请注意下面的运算符列表，我将在接下来的示例和项目中使用其中一些。如果你看到我使用了一个你以前没见过的运算符，请回到这里查看，你应该能看到我使用了什么。我在这个表格中汇编了大多数运算符，所以你可能会看到一些你从未听说过或见过的运算符。随着你深入本书的后续章节，这些运算符会变得越来越清晰，所以请继续阅读！


    ### 算术运算符


    | 运算符 | 名称 | 示例 |

    | :--- | :--- | :--- |

    | + | 加法 | x + y (2 + 3 = 5) |

    | - | 减法 | x - y (3 - 2 = 1) |

    | * | 乘法 | x * y (2 * 3 = 6) |

    | / | 除法 | x / y (2 / 4 = 0.5) |

    | ** | 指数 | x ** y (2 ** 3 = 8) |

    | % | 取模 | x % y (4 % 2 = 0) **4除以2的余数** |

    | // | 整除 | x // y (3 // 2 = 1) **3 / 2 是 1.5，但整除会将其向下舍入到最接近的整数，即1** |


    ### 赋值运算符


    | 运算符 | 示例 | 说明 |

    | :--- | :--- | :--- |

    | = | x = y | 将y赋值给x |

    | += | x += y | 等同于 x = x + y。将x的值增加y。例如 x = 4, x += 3。**这使得x等于7** |

    | -= | x -= y | 等同于 x = x - y。将x的值减少y |

    | *= | x *= y | 等同于 x = x * y。将x的值重新赋值为 x * y。例如 x = 4, x *= 3。**这使得x等于12** |

    | /= | x /= y | 等同于 x = x / y。将x的值重新赋值为 x / y |

    | **= | x **= y | 等同于 x = x ** y。将x的值重新赋值为 x ** y |

    | %= | x %= y | 等同于 x = x % y。将x的值重新赋值为 x % y |

    | //= | x //= y | 等同于 x = x // y。将x的值重新赋值为 x // y |


    ### 比较运算符


    | 运算符 | 名称 | 示例 |

    | :--- | :--- | :--- |

    | == | 等于 | x == y。**检查x是否等于y。不会将x赋值给y** |

    | != | 不等于 | x != y。**检查x是否不等于y** |

    | > | 大于 | x > y。**检查x是否大于y** |

    | < | 小于 | x < y。**检查x是否小于y** |

    | >= | 大于或等于 | x >= y。**检查x是否大于或等于y** |

    | <= | 小于或等于 | x <= y。**检查x是否小于或等于y** |'
