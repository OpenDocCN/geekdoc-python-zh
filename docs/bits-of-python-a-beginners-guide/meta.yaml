    ## KeyboardInterrupt


    This is a very unique error and it does not occur because there is something wrong
    with your code. This error occurs when you press control + C while a program is
    running in the output terminal.


    This will stop the program in its tracks and exit the program. This comes in especially
    handy later on when we get into loops that can go on to infinity if not conditioned
    and checked properly, so by hitting control + C, we can quickly stop the never
    ending program with ease.


    We can also press control + C for normal programs to end them for whatever reason:


    ```python

