    ## CHAPTER 13: ASCII


    There are many databases that computers use to communicate, such as UTF-8, or
    Unicode, but the one we will focus on here is one known as the **American Standard
    Code for Information Interchange**, or **ASCII** for short. The ASCII table is
    listed below:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_89_0.png)


    This list shows the conversions of most symbols to numbers such that computers
    can understand and share them.


    Of course, it does not contain everything and there are more databases that cover
    a far wider range of characters, however, during every day coding, ASCII contains
    everything you may need.


    Python has a library for ASCII called the *string* library, and from here, we
    have many different <u>methods</u> that we can use regarding ASCII:


    ### string.ascii_lowercase


    What this will do is, when assigned to a value, it will print all of the lowercase
    ASCII letters:


    ```python

    import string


    var = string.ascii_lowercase


    print(var)

    ```


    And this prints:


    ```

    abcdefghijklmnopqrstuvwxyz

    ```


    ### string.ascii_uppercase


    Similarly, this will print all of the uppercase ascii letters:


    ```python

    import string


    var = string.ascii_uppercase


    print(var)

    ```


    This results in:


    ```

    ABCDEFGHIJKLMNOPQRSTUVWXYZ

    ```


    ### string.ascii_letters


    This will print both uppercase and lowercase:


    ```python

    import string


    var = string.ascii_letters


    print(var)

    ```


    And the terminal output is:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_92_0.png)


    ### string.digits


    This will print all of the digits in the ASCII database, or just the numbers 0-9:


    ```python

    import string


    var = string.digits


    print(var)

    ```


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_92_1.png)


    Those are the most commonly used commands, but if you do `string.` , then you
    should see a dropdown of everything available.


    **Now for some functions:**


    I will only be discussing 2 functions in the string library, but feel free to
    look further into it and see what it has to offer. The two I will be discussing
    are the ones that I see most used.


    ### ord()


    The ord() function takes any character and converts it into its numerical ASCII
    form:


    ```python

    import string


    print(ord("$"))

    ```


    As you can see, we simply imported the *string* library, and used the *ord()*
    method on the string "$". When we printed this, we got:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_93_0.png)


    We got 36, and if you check this against the table at the start of this chapter,
    you''ll see that this does indeed align with the decimal representation of the
    dollar sign.


    Keep in mind, the ord() method can only take a string as an input, so even if
    you wanted to find the ASCII value of the number 9, you would need to input it
    as a string:


    ```python

    import string

    print(ord("9"))

    ```


    And when we run this, we find out that the ASCII representation of the number
    9 is:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_94_0.png)


    ### chr()


    The chr() function is the opposite of the ord method; it takes any number and
    converts it into its character form using the ASCII table:


    ```python

    import string


    print(chr(36))

    ```


    And this gives us back the dollar sign "$"


    ## CHAPTER 14: LISTS AND LIST METHODS


    You have surely heard of lists, but in Python, lists are structured a bit differently.
    Though, their overall premise is the same. A list is enclosed in brackets and
    is used to contain multiple elements. Each element in a list is separated by commas
    like this:


    ```python

    ["a", "b", "c", "d", "e"]

    ```


    The first element in a list is the 0th element, so if we had a list called *List1*
    and it had a total of 5 elements, the first element would be *List1[0]* and the
    last would be *List1[4]*


    ### List Methods


    In your IDE, if you create a list, like one named *List1*, and then type *List1*
    followed by a dot, you should see several different methods you can perform on
    your list, like adding or removing items, along with explanations for all of them.
    If you do not see this, then we have compiled a list of the most used list methods
    and their uses in a neat table below:


    | Method | Description |

    |---|---|

    | append() | Adds elements to the end of a list |

    | clear() | Removes all elements from a list |

    | copy() | Copies a list and returns a copy of it |

    | count() | Counts the number of elements in the list and returns the number |

    | extend() | Adds all elements of a list to the end of an existing list |

    | index() | Returns the index of the first element found with a specified value
    |

    | insert() | Adds an element at a specific index |

    | pop() | Removes an element at a specific index |

    | remove() | Removes the first element found with a specified value |

    | reverse() | Reverses the order of a list |

    | sort() | Sorts a list |


    ### Empty Lists


    An empty list is much like an empty string, it is simply a list with nothing in
    it:


    ```python

    mylist = []

    ```


    Just like with empty strings, these are useful when we need to edit a current
    list and add the new values to a new list. We can do this using the **.append()**
    method as shown above in the table.


    ### 2D Lists


    A two dimensional list is a list in a list. This is also known as a nested list
    and it can be difficult to visualize at first, but an example should help:


    ```python

    my2dlist = [[2,4,5], [20,21,22], [40,41,42,43,44,45,46], [12]]

    ```


    As you can see, we have a list, but each element in that list is another list!


    Just like normal, we can access the elements in the outer list by simply doing
    *my2dlist[]* and in the brackets, we type the index we want:


    ```python

    my2dlist = [[2,4,5], [20,21,22], [40,41,42,43,44,45,46], [12]]


    print(my2dlist[1])

    ```


    And we get a result of:


    ```

    [20, 21, 22]

    ```


    But then how do we access the elements of the list inside of the list? (that''s
    a mouthful)


    Well, all we have to do is add another bracket with the index of the element that
    we want to access inside of it, as follows:


    ```python

    my2dlist = [[2,4,5], [20,21,22], [40,41,42,43,44,45,46], [12]]


    print(my2dlist[1][2])

    ```


    And thus, we will get a result of:


    ![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_101_0.png)


    This then begs the question, why is this even useful? Well, let''s take a scenario
    and imagine yourself as the owner of a grocery store.


    Each customer buys 10 items. If we have 3 customers, then we can simply make 3
    lists, 1 for each customer, and have the items they buy within each list.


    However, what if you have 1,000 customers? 10,000? We can''t make that many lists,
    but this is where a 2D List comes in. With a 2D List, we can put the items each
    customer buys in a list and all of those lists in another list, with the index
    position of each inner list being the respective customer.


    Here''s that shown visually to show you the difference with 3 customers:


    ```python

    #Single Lists


    customer1 = ["cherries", "chicken", "bread"]

    customer2 = ["grapes", "peaches", "lettuce", "candy"]

    customer3 = ["Noodles", "tomatoes"]


    #VS


    #2D Lists


    customersitens = [["cherries", "chicken", "bread"], ["grapes", "peaches", "lettuce",
    "candy"], ["Noodles", "tomatoes"]]

    ```


    The 2D list was much easier to create and is much more useful in this case.'
