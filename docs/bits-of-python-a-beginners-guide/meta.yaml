  md: "tion it is given is still *True* on the next run. Each time the loop gets executed\
    \ is called an **iteration**.\n\nFor example, if we have something like:\n\n```\n\
    x = 1\n\nwhile x<10:\n    print(x)\n    x = x + 1\n\nprint (\"Done\")\n```\n\n\
    If we go through this program step by step, then we see that we first initialize\
    \ *x* as 1 and we have a while loop that keeps on going until *x* is greater than\
    \ or equal to 10.\n\nInside of the while loop, we print the value assigned to\
    \ *x*, and we increment *x* by 1. Once *x* is 10, the loop is over and we print\
