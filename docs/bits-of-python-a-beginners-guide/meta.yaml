- md: "## CHAPTER 17: LOOPS\n\nLoops! Loops make our lives easier by looping through\
    \ a task for a set number of times on its own until we are done.\n\n### While\
    \ Loops\n\nOne type of loop is known as a **While Loop**. The *while* loop works\
    \ through *True* and *False* statements. It keeps executing a command as long\
    \ as the condition it is given is still *True* on the next run. Each time the\
    \ loop gets executed is called an **iteration**.\n\nFor example, if we have something\
    \ like:\n\n```\nx = 1\n\nwhile x<10:\n    print(x)\n    x = x + 1\n\nprint (\"\
    Done\")\n```\n\nIf we go through this program step by step, then we see that we\
    \ first initialize *x* as 1 and we have a while loop that keeps on going until\
    \ *x* is greater than or equal to 10.\n\nInside of the while loop, we print the\
    \ value assigned to *x*, and we increment *x* by 1. Once *x* is 10, the loop is\
    \ over and we print “Done”.\n\nNotice that the \"Done\" is not inside of the loop\
    \ as it isn't indented. This is because we only want to print done once the loop\
    \ ends, so if we put it inside of the loop, \"Done\" will be printed on each iteration.\n\
    \nThus, the result of this program is:\n\n![](img/68bd89f6eb7eca3e8b8bb158e8d40be2_122_0.png)\n\
    \nOne last thing to realize is that we need the $x = x + 1$ condition because\
    \ without it, $x$ would always be 1, which is always less than 10.\n\n### The\
    \ Infinite While Loop\n\nThis may seem useless, why even have a loop that can\
    \ never end?\n\nHowever, this will prove to be very useful in almost every scenario\
    \ where you use a loop because, more often than not, we never know how many times\
    \ we may need to loop through something.\n\nFor example, if you were designing\
    \ a game and wanted to have an ending screen that said “*play again?*” and if\
    \ the user selects \"yes\", the loop runs again and if not, the game ends. We\
    \ don’t know how many times we should loop because the user could be done after\
    \ 1 round of playing or 50 rounds of playing.\n\nAs a result, I introduce the\
    \ **while True** loop.\n\nA *while True* loop continues forever and there are\
    \ no conditions that make it stop. It can only be stopped with the **break** statement.\n\
    \nBy placing a break statement inside of a loop, it will end the loop immediately\
    \ and all code after the statement will not be executed. There is also a **continue**\
    \ statement, which will force the program to go back to the top of the loop and\
    \ the program will not execute anything after the continue statement.\n\nTo give\
    \ some context about where these can be useful, let's use the same scenario from\
    \ before. If we wanted to make a game where the user can decide if they want to\
    \ play again or not, the break statement can come in useful if the user says no\
    \ and the continue statement can be useful if the user says yes, so we can do\
    \ something like this:\n\n```\nwhile True:\n    print(\"Wow Python Wow\")\n  \
    \  answer = input(\"Play Again? (Y/N)\")\n    if answer == \"N\":\n        break\n\
    \    elif answer == \"Y\":\n        continue\n```\n\nAn alternate method of creating\
    \ an infinite loop would be to use booleans.\n\nWe can initialize a variable to\
    \ the boolean value *True*, and as long as the variable is evaluated as *True*,\
    \ we continue the loop:\n\n```\ncondition = True\nwhile condition == True:\n \
    \   print(\"Wow Python Wow\")\n    answer = input(\"Play Again? (Y/N)\")\n   \
    \ if answer == \"N\":\n        condition = False\n    elif answer == \"Y\":\n\
    \        continue\n```\n\nThis has the same functionality as the *while True*\
    \ loop except here, we only continue the loop if the variable *condition* is *True*\
    \ and don't need the break statement.\n\nConsequently, if the user refuses to\
    \ play again, we simply change the value of condition to *False* and when we go\
    \ to loop again, the program ends as the variable *condition* is not *True*.\n\
    \nIf the user decides to keep playing, *condition* is unchanged and we loop again.\n\
    \n### For Loops\n\nAnother type of loop is a **for loop**, which is similar to\
    \ a while loop.\n\nA *for* loop still loops, but it is different from a *while*\
    \ loop in that it loops through objects. For example, a *for* loop could loop\
    \ through a string and print every element in a string, or it could loop through\
    \ a list of numbers.\n\nFor both of these, the way this works is the first element\
    \ in the object is selected, it goes through the code in the *for* loop, and then\
    \ the loop goes back up to the top and selects the next element and so on and\
    \ so forth. This process continues until there are no more elements left to choose\
    \ from.\n\nThe general format of a *for* loop is something where we have a temporary\
    \ variable that is assigned to each element in the object so that it can then\
    \ be used in the *for* loop.\n\nIts only purpose is to loop through the set of\
    \ data.\n\nHere's an example if that explanation was a bit confusing:\n\n```\n\
    MyList = [2,4,7,12,13,6,5,16,7,16,2]\n\ndivcount = 0\n\nfor i in MyList:\n   \
    \ if i % 3 != 0:\n        divcount = divcount + 1\n\nprint(\"There are \" + str(divcount)\
    \ + \" numbers in this list that are not divisible by three\")\n```\n\nThe goal\
    \ here was to find the number of numbers not divisible by three in the list, and\
    \ to do so, we first got the list and then made a variable, *divcount*, to keep\
    \ track of the number of numbers that are not divisible by three. We then made\
    \ a *for* loop to go through the list and check if each element in the list was\
    \ divisible by three, and if not, we increase the *divcount* variable by one and\
    \ we print the final tally at the end of the program.\n\nBefore we move on, let's\
    \ clear up a few topics of confusion regarding the previous program. We used the\
    \ variable *i* in the for loop as the temporary variable to store each element\
    \ in the list. Each time the loop iterates, *i* gets reassigned to the next element\
    \ in the list.\n\n*i* is a popular variable to use when making loops, but any\
    \ other variable name of your choice works as well.\n\nThe most important thing\
    \ to remember is that it's only purpose in the program is to be a variable that\
    \ is reassigned to items in the list as we loop through it.\n\n### Nested Loops\n\
    \nNested *for* loops are a difficult concept to understand at first, but once\
    \ you get the hang of them, they can be incredibly useful in a variety of situations.\n\
    \nOne example of their usefulness is in the case where we have a 2D list and we\
    \ not only want to loop through that list, but also loop through the list elements\
    \ contained in the list.\n\nHere, we would do something like this:\n\n```\nmy2dlist\
    \ = [[2,1,13,1023], [6,1,27,1], [10,12], [1,16,1,54,39], [18,1]]\n\nfor i in my2dlist:\n\
    \    for j in i:\n        if j == 1:\n            print(\"1 is here!\")\n```\n\
    \nAs you can see, the outer loop goes through each element and assigns it to *i*.\
    \ The inner loop then loops through the list element *i* to find if the number\
    \ 1 is present.\n\nOnce this is run, we get the result:\n\n```\n1 is here!\n1\
    \ is here!\n1 is here!\n1 is here!\n1 is here!\n1 is here!\n```\n\nAnd we can\
    \ conclude that there are a total of 6 1s in this 2D list.\n\nNested loops can\
    \ also be used with normal lists, not just 2D ones.\n\nIf we wanted to compare\
    \ an element with every other element in the list, we would have an outer loop\
    \ that loops through the elements, and then we would have an inner loop that goes\
    \ through all of the other elements so that we can compare.\n\nWe can also have\
    \ nested *while* loops and *for* loops within *while* loops or vice versa, but\
    \ you must make sure that the while loop is accounted for and has a break statement\
    \ it can access or else the loop will never end.\n\n---\n\nvalue = 14\n\nif value\
    \ % 2 == 0:\n    if value % 6 == 0:\n        print(\"multiple of 2 and 6!\")\n\
    \nWe check the condition that the value is even, and only if it is even do we\
    \ check the condition of if it is a multiple of 6. This is a nested *if* statement.\n\
    \nWe can also have if statements within else statements and the logic is the same\
    \ as before. Let's say we add on another clause to our program:\n\n```\nvalue\
    \ = 20\n\nif value % 2 == 0:\n    if value % 6 == 0:\n        print(\"multiple\
    \ of 2 and 6!\")\nelse:\n    if value % 5 == 0:\n        print(\"multiple of 5\
