  md: "# Create with Python\n\n# Pivaders part 2: graphics and sound\n\n# Loading\
    \ the sprite sheet\n\n07 Since we're inheriting from the Sprite class to create\
    \ our Player class, we can easily alter how the player looks on screen by changing\
    \ Player.image. First, we need to load our ship sprite sheet with pygame.image.load().\
    \ Since we made our sheet with a transparent background, we can append .convert_alpha()\
    \ to the end of the line so the ship frames render correctly (without any background).\
    \ We then use subsurface to set the initial Player.image to the middle ship sprite\
    \ on the sheet. This is set by self.ani_pos, which has an initial value of 5.\
    \ Changing this value will alter the ship image drawn to the screen: '0' would\
    \ draw it leaning fully left, '11' fully to the right.\n\n# Animation flags\n\n\
    08 Slightly further down the list in the initialising code for the Game class,\
    \ we also set two flags for our player animation: self.animate_left and self.animate_right.\
    \ As you'll see in the Control method of our Game class, we use these to 'flag'\
    \ when we want animations to happen with True and False. It also allows us to\
    \ 'automatically' animate the player sprite back to its natural resting state\
    \ (otherwise the ship will continue to look as if it's flying left when it has\
    \ stopped).\n\n# The animation method\n\n09 We use flags again in the code for\
    \ the player: animate_player(). Here we use nested if statements to control the\
    \ animation and physically set the player image. It states that if the animate_right\
    \ flag is True and if the current animation position is different to what we want,\
    \ we incrementally increase the ani_pos variable and set the player's image. The\
    \ Else statement then animates the ship sprite back to its resting state and the\
    \ same logic is then applied in the opposite direction.\n\n```\nGameState.end_game\
    \ = False\nGameState.start_screen = True\nGameState.vector = 0\nGameState.shoot_bullet\
    \ = False\n\ndef control(self):\n    for event in pygame.event.get():\n      \
    \  if event.type == pygame.QUIT:\n            GameState.start_screen = False\n\
    \            GameState.end_game = True\n        if event.type == pygame.KEYDOWN\
    \ \\n        and event.key == pygame.K_ESCAPE:\n            if GameState.start_screen:\n\
    \                GameState.start_screen = False\n                GameState.end_game\
    \ = True\n                self.kill_all()\n            else:\n               \
    \ GameState.start_screen = True\n    self.keys = pygame.key.get_pressed()\n  \
    \  if self.keys[pygame.K_LEFT]:\n        GameState.vector = -1\n        self.animate_left\
    \ = True\n        self.animate_right = False\n    elif self.keys[pygame.K_RIGHT]:\n\
    \        GameState.vector = 1\n        self.animate_right = True\n        self.animate_left\
    \ = False\n    else:\n        GameState.vector = 0\n        self.animate_right\
    \ = False\n        self.animate_left = False\n\n    if self.keys[pygame.K_SPACE]:\n\
    \        if GameState.start_screen:\n            GameState.start_screen = False\n\
    \            self.lives = 2\n            self.score = 0\n            self.make_player()\n\
    \            self.make_defenses()\n            self.alien_wave(0)\n        else:\n\
    \            GameState.shoot_bullet = True\n            self.bullet_fx.play()\n\
    \ndef animate_player(self):\n    if self.animate_right:\n        if self.ani_pos\
    \ < 10:\n            Player.image = self.ship_sheet.subsurface(\n            \
    \    self.ani_pos*64, 0, 64, 61)\n            self.ani_pos += 1\n    else:\n \
    \       if self.ani_pos > 5:\n            self.ani_pos -= 1\n            Player.image\
    \ = self.ship_sheet.subsurface(\n                self.ani_pos*64, 0, 64, 61)\n\
    \n    if self.animate_left:\n        if self.ani_pos > 0:\n            self.ani_pos\
    \ -= 1\n```"
