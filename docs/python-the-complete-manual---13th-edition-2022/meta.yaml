    \ 变量让我们确切地知道我们已经执行了多少次 while 循环。\n\n### 完成\n\n16 最后一步是打印程序正在退出。这是最后一行，我们不需要做任何其他事情，因为当没有更多行需要解释时，Python\
    \ 就会简单地结束。\n\n![](img/3303e52de17b2e01ada468e51372cd68_104_0.png)\n\n### 使用循环递增数字\n\
    \n15 while 循环将运行直到 count 为 6，这意味着它将总共运行 5 次，因为 count 从 1 开始。在每次运行中，while 循环递增\
