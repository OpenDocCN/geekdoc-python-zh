  md: "# Get started with Python\n\n# Getting started\n\n```\n#!/usr/bin/env python2\n\
    cont = False\nif cont:\n    var = 1234\nprint(var)\n```\n\nIn the section of code\
    \ above, Python will convert the integer to a string before printing it. However,\
    \ it's always a good idea to explicitly convert things to strings – especially\
    \ when it comes to concatenating strings together. If you try to use the + operator\
    \ on a string and an integer, there will be an error because it's not explicitly\
    \ clear what needs to happen. The + operator would usually add two integers together.\
    \ Having said that, Python's string formatter that we demonstrated earlier is\
    \ a cleaner way of doing that. Can you see the problem? Var has only been defined\
    \ in the scope of the if statement. This means that we get a very nasty error\
    \ when we try to access var.\n\n```\n[liam@liam-laptop Python]$ ./scope.py\nTraceback\
    \ (most recent call last):\n  File \"/scope.py\", line 8, in <module>\n    print\
    \ var\nNameError: name 'var' is not defined\n```\n\nIf cont is set to True, then\
    \ the variable will be created and we can access it just fine. However, this is\
    \ a bad way to do things. The correct way is to initialise the variable outside\
    \ of the scope of the if statement.\n\n```\n#!/usr/bin/env python2\n\ncont = False\n\
    \nvar = 0\nif cont:\n    var = 1234\n\nif var != 0:\n    print(var)\n```\n\n![](img/3303e52de17b2e01ada468e51372cd68_20_0.png)"
