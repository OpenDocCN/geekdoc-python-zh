    \n## 完整代码清单\n\n我们希望在列表中包含的整数数量\n\n```\n#!/usr/bin/env python2\n\n# 我们将编写一个程序，要求用户输入任意数量的整数，将它们存储在一个集合中，然后演示如何使用各种控制结构来操作该集合。\n\
    \nimport sys # 用于 sys.exit 函数\n\ntarget_int = raw_input(\"How many integers? \"\
