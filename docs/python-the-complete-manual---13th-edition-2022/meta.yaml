- md: "## Python for system administrators\n\n## Work with Python\n\n## So, you want\
    \ to use some Yahoo! APIs...\n\nWe need some information from you... To use Yahoo!\
    \ Web Services, we need some information about you and the application you're\
    \ building. We collect this information to get a better understanding of how Yahoo!\
    \ Web Services are being used and to protect the security and privacy of Yahoo!\
    \ users. All questions are required.\n\n![](img/3303e52de17b2e01ada468e51372cd68_66_0.png)\n\
    \n## About your application\n\nApplication Name: LUDPySearch\nKind of Application:\
    \ Client/Desktop\nDescription: An App to demonstrate the JSON parsing using Python.\n\
    Favicon URL: http://www.yoursite.com/thisApp/favicon.gif\n\n## Security & Privacy\n\
    \nYahoo! APIs use the OAuth protocol for secure validation of API usage and end-user\
    \ authentication, if needed.\nAccess Scopes:\n- This app will only access public\
    \ APIs, Web Services, or RSS feeds.\n- This app requires access to private user\
    \ data.\n\n## Contact information\n\nJust in case something comes up and we need\
    \ to get ahold of you :-)\nApplication Owner: Kunal Dec\nContact Email: kunaldeo2001@yahoo.com\n\
    Terms of Use: I have read and agree to the Yahoo! Developer Network Terms of Use.\n\
    \nAbove Generating the Yahoo App ID\n\n```\n>>> execfile(\"LUDYSearch.py\")\n\
    >>> results = search('Linux User and Developer')\n>>> results['totalResultsAvailable']\n\
    123000000\n>>> results['totalResultsReturned']\n20\n>>> items = results['Result']\n\
    >>> for Result in items:\n...     print Result['Title'],Result['Url']\n...\n```\n\
    \nencyclopedia http://en.wikipedia.org/wiki/Linux_User_and_Developer\nLinux User\
    \ &amp; Developer | Linux User http://www.linuxuser.co.uk/tag/linux-user-developer/\n\
    \n## Gathering system information\n\nAn important job for a system administrator\
    \ is gathering system information. Here we will use the SIGAR (System Information\
    \ Gatherer And Reporter) API to demonstrate how we can gather system information\
    \ using Python. SIGAR is a very complete API and can provide lots of information,\
    \ including:\n\n1. System memory, swap, CPU, load average, uptime, logins.\n2.\
    \ Per-process memory, CPU, credential info, state, arguments, environment, open\
    \ files.\n3. File system detection and metrics.\n4. Network interface detection,\
    \ configuration info and metrics.\n5. TCP and UDP connection tables.\n6. Network\
    \ route table.\n\nLinux User http://www.linuxuser.co.uk/\nLinux User and Developer\
    \ - Wikipedia, the free\n\n## Installing SIGAR\n\nThe first step is to build and\
    \ install SIGAR. SIGAR is hosted at GitHub, so make sure that you have Git installed\
    \ in your system. Then perform the following steps to install SIGAR and its Python\
    \ bindings:\n\n```\n$ git clone git://github.com/hyperic/sigar.git sigar.git\n\
    $ cd sigar.git/bindings/python\n$ sudo python setup.py install\n```\n\nAt the\
    \ end you should see a output similar to the following:\nWriting /usr/local/lib/python2.6/dist-packages/pysigar-0.1.egg-info\n\
    SIGAR is a very easy-to-use library and can be used to get information on almost\
    \ every aspect of a system. The next example shows you how to do this. The following\
    \ code shows the memory and the file system information.\n\n```\n@code: PySysInfo.py\n\
    import os\nimport sigar\nsg = sigar.open()\nmem = sg.mem()\nswap = sg.swap()\n\
    fslist = sg.file_system_list()\nprint \"================Memory Information================\"\
    \nprint \"\\tTotal\\tUsed\\tFree\"\nprint \"Mem:\\t\", \\n    (mem.total() / 1024),\
    \ \\n    (mem.used() / 1024), \\n    (mem.free() / 1024)\nprint \"Swap:\\t\",\
    \ \\n    (swap.total() / 1024), \\n    (swap.used() / 1024), \\n    (swap.free()\
    \ / 1024)\nprint \"RAM:\\t\", mem.ram(), \"MB\"\nprint \"================File\
    \ System Information================\"\ndef format_size(size):\n    return sigar.format_size(size\
    \ * 1024)\nprint 'Filesystem\\tSize\\tUsed\\tAvail\\tUse%\\tMounted on\\tType\\\
    n'\nfor fs in fslist:\n    dir_name = fs.dir_name()\n    usage = sg.file_system_usage(dir_name)\n\
    \    total = usage.total()\n    used = total - usage.free()\n    avail = usage.avail()\n\
    \    pct = usage.use_percent() * 100\n    if pct == 0.0:\n        pct = '-'\n\
    \    print fs.dev_name(), format_size(total), format_size(used), format_size(avail),\\\
    n        pct, dir_name, fs.sys_type_name(), '/', fs.type_name()\n```\n\n```\n\
    @Output\n================Memory Information================\n\tTotal\tUsed\tFree\n\
    Mem:\t 8388608 6061884 2326724\nSwap: 131072 16048 115024\nRAM:  8192 MB\n================File\
    \ System Information================\nFilesystem  Size  Used  Avail Use%  Mounted\
    \ on  Type\n/dev/disk0s2 300G 175G 124G 59.0 / hfs / local\ndevfs 191K 191K 0\
    \ - /dev devfs / none\n```\n\n```\nimport base64, getpass, os, socket, sys, socket,\
    \ traceback\nimport paramiko\nimport interactive\n# setup logging\nparamiko.util.log_to_file('demo_simple.log')\n\
    # get hostname\nusername = ''\nif len(sys.argv) > 1:\n    hostname = sys.argv[1]\n\
    \    if hostname.find('@') >= 0:\n        username, hostname = hostname.split('@')\n\
    else:\n    hostname = raw_input('Hostname: ')\nif len(hostname) == 0:\n    print\
    \ '*** Hostname required.'\n    sys.exit(1)\nport = 22\nif hostname.find(':')\
    \ >= 0:\n    hostname, portstr = hostname.split(':')\n    port = int(portstr)\n\
    # get username\nif username == '':\n    default_username = getpass.getuser()\n\
    \    username = raw_input('Username [%s]: ' % default_username)\n    if len(username)\
    \ == 0:\n        username = default_username\npassword = getpass.getpass('Password\
    \ for %s@%s: ' % (username, hostname))\n# now, connect and use paramiko Client\n\
    to negotiate SSH2 across the connection\ntry:\n    client = paramiko.SSHClient()\n\
    \    client.load_system_host_keys()\n    client.set_missing_host_key_policy(paramiko.WarningPolicy)\n\
    ```\n\n## Accessing Secure Shell (SSH) services\n\nSSH (Secure Shell) is a modern\
    \ replacement for an old remote shell system called Telnet. It allows data to\
    \ be exchanged using a secure channel between two networked devices. System administrators\
    \ frequently use SSH to administrate networked systems. In addition to providing\
    \ remote shell, SSH is also used for secure file transfer (using SSH File Transfer\
    \ Protocol, or SFTP) and remote X server forwarding (allows you to use SSH clients\
    \ as X server). In this section we will learn how to use the SSH protocol from\
    \ Python using a Python module called paramiko, which implements the SSH2 protocol\
    \ for Python. paramiko can be installed using the following steps:\n\n```\n$ git\
    \ clone https://github.com/robey/paramiko.git\n$ cd paramiko\n$ sudo python setup.py\
    \ install\n```\n\nTo the core of paramiko is the SSHClient class. This class wraps\
    \ L{Transport}, L{Channel}, and L{SFTPClient} to handle most of the aspects of\
    \ SSH. You can use SSHClient as:\n\n```\nclient = SSHClient()\nclient.load_system_host_keys()\n\
    client.connect('some.host.com')\nstdin, stdout, stderr = client.exec_command('dir')\n\
    ```\n\nThe following example demonstrates a full SSH client written using the\
    \ paramiko module.\n\n```\n@code: PySSHClient.py\nprint '*** Connecting...'\n\
    client.connect(hostname, port,\nusername, password)\nchan = client.invoke_shell()\n\
    print repr(client.get_transport())\nprint '*** SSH Server Connected! ***'\nprint\n\
    interactive.interactive_shell(chan)\nchan.close()\nclient.close()\nexcept Exception,\
    \ e:\n    print '*** Caught exception: %s: %s' % (e.__class__, e)\n    traceback.print_exc()\n\
    \    try:\n        client.close()\n    except:\n        pass\n    sys.exit(1)\n\
    ```\n\nIf the host key for the SSH server is not added to your $HOME/.ssh/known_hosts\
    \ file, the client will throw the following error:\n\n```\n[~ $:]\n*** Caught\
    \ exception: <type 'exceptions.TypeError'>: unbound method missing_host_key()\
    \ must be called with WarningPolicy instance as first argument (got SSHClient\
    \ instance instead)\n```\n\nThis means that the client cannot verify the authenticity\
    \ of the server you are connected to. To add the host key to known_hosts, you\
    \ can use the ssh command. It is important to remember that this is not the ideal\
    \ way to add the host key; instead you should use ssh-keygen. But for simplicity's\
    \ sake we are using the ssh client.\n\nTo run this code you will also need a custom\
    \ Python class interactive.py which implements the interactive shell for the SSH\
    \ session. Look for this file on FileSilo and copy it into the same folder where\
    \ you have created PySSHClient.py.\n\n```\n@code_Output\nkunal@ubuntu-vm-kdeo:~/src/paramiko/demos$\
    \ python demo_simple.py\nHostname: 192.168.1.2\nUsername [kunal]: luduser\nPassword\
    \ for luduser@192.168.1.2:\n*** Connecting...\n<paramiko.Transport at 0xb76201acL\n\
    (cipher aes128-ctr, 128 bits) (active; 1 open channel(s))>\n*** SSH Server Connected!\
    \ ***\nLast login: Thu Jan 13 02:01:06 2011 from 192.168.1.9\n```\n\n```\nkunal@ubuntu-vm-kdeo:~/.ssh$\
    \ ssh luduser@192.168.1.2\nThe authenticity of host '192.168.1.2 (192.168.1.2)'\
    \ can't be established.\nRSA key fingerprint is be:01:76:6a:b9:bb:69:64:e3:dc:37:00:a4:36:33:d1.\n\
    Are you sure you want to continue connecting (yes/no)? yes\nWarning: Permanently\
    \ added '192.168.1.2' (RSA) to the list of known hosts.\n```\n\nSo now you've\
    \ seen just how easy it can be to carry out the complex sysadmin tasks using Python's\
    \ versatile language.\nAs is the case with all Python coding, the code that is\
    \ presented here can fairly easily be adopted into your GUI application (using\
    \ software such as PyGTK or PyQt) or a web application (using a framework such\
    \ as Django or Grok)."
