  md: "# Scrape Wikipedia with Beautiful Soup\n\n# Work with Python\n\n# Tying up\
    \ loose ends\n\n08 After our script has iterated through every link on every page\
    \ to the maximum level of depth that it can, it will try to exit. On line 34 of\
    \ the code (on the disc and online) in the init function, we registered the function\
    \ cleanUp to execute on the program trying to exit; cleanUp's job is to go through\
    \ the documents that we've downloaded and check that every link we've left in\
    \ the pages does in fact link to a file that we have available. If it can't match\
    \ the link in the href to a file in the addresses list, it will remove it. Once\
    \ we're done, we will have a fully portable chunk of Wikipedia we can take with\
    \ us.\n\n6 Copy to file\nAfter that, We take the content we've parsed and put\
    \ it into a brand new HTML file\n\n```\ndoctype = \"<!DOCTYPE html>\"\n\nhead\
    \ = \"<head><meta charset=\"UTF-8\" /><title>\" + fileName + \"</title></head>\"\
    \n\nf = open(storeFolder + \"/\" + fileName.replace('/', '_') + \".html\", 'w')\n\
    f.write(doctype + \"<html lang=\"en\">\" + head + \"<body><h1>\" + fileName +\
    \ \"</h1>\" + str(content) + \"</body></html>\")\nf.close()\n```\n\n7 Clean up\n\
    Once every page has been parsed and stored, we'll go on through and try to remove\
    \ any dead links\n\n```\ndef cleanUp():\n\n    print(\"\\nRemoving links to pages\
    \ that have not been saved\\n\")\n\n    for deepPage in deepestAddresses:\n\n\
    \        rF = open(storeFolder + \"/\" + deepPage, 'r')\n\n        deepSoup =\
    \ BeautifulSoup(rF.read(), \"html5lib\", from_encoding=\"UTF-8\")\n\n        for\
    \ deepLinks in deepSoup.find_all('a'):\n            link = deepLinks.get(\"href\"\
    )\n\n            pageStored = False\n\n            for addr in addresses:\n  \
