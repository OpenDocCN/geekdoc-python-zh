  md: "# Handle multiple tasks\n\n# Use Python with Pi\n\ncalled the GIL (global interpreter\
    \ lock). The GIL is used to control access to certain core functions and data\
    \ within the Python interpreter. This means that at certain points, your threads\
    \ will run only one at a time. This can introduce a serious bottleneck in some\
    \ situations. If you are in this boat, then you may need to use the multiprocessing\
    \ module. This module uses subprocesses to bypass the GIL completely in order\
    \ to get true parallel operation. In its most basic use case, you could use something\
    \ like the code below to get behaviour similar to what you get with threads:\n\
    \nprocess object starts up a new Python engine in one of a number of ways. The\
    \ default on UNIX systems, like the Pi, is to fork a new process. The fork method\
    \ essentially makes a complete copy of the current Python engine and executes\
    \ the given function. Another method is to spawn a new Python engine. In the spawn\
    \ method, only the parts of the current Python engine that is needed for the new\
    \ Python engine. If you do need to change it, you can use the following code:\n\
    \n```\nimport multiprocessing\ndef f(name):\n    print('hello', name)\n\np = multiprocessing.Process(target=f,\n\
    \    args=('bob',))\np.start()\np.join()\n```\n\n```\nmultiprocessing.set_start_method('spawn')\n\
    ```\n\nIf you need to start many subprocesses, this may help speed your code up.\
    \ The set_start_method should only ever be called once in a given program. Hopefully,\
    \ this tutorial has given you some ideas on how to include the ability to manage\
    \ multiple tasks in parallel. This can be a powerful tool to make the software\
    \ design of your project more flexible and capable. Be aware that we have only\
    \ been able to cover the most basic topics in such a short tutorial.\n\nThis appears\
    \ to be the same on the surface, but what is happening in the back-end is radically\
    \ different. The\n\n# Other ways to do parallelisation\n\nWe've looked at how\
    \ to handle parallel tasks strictly within a Python program. But sometimes you\
    \ need to run other pieces of code asynchronously. In these cases, you can use\
    \ the subprocess module to execute external code and interact with it. As an example,\
    \ we will look at how you could run the ls program and use its output.\n\nthe\
    \ output from the external program is sent back to the calling Python code. Sometimes,\
    \ you may want to run this external program through a shell. In order to do this,\
    \ you will need to use the input parameter shell=True. The run method is a simplified\
    \ interface for running external programs. When you need more control over how\
    \ the external programs execute, you can use the Popen method.\n\ncommunicate()\n\
    If you want to also send input to the external process, you can include a parameter\
    \ named input with the data. This blocks until the external process finishes and\
    \ exits. If you need to read from these streams without waiting for the external\
    \ program to finish, you can get access to pipes for stdout and stderr streams.\
    \ For example, the following code reads from the standard output stream:\n\n```\n\
    import subprocess\nsubprocess.run([\"ls\", \"-l\"],\n    stdout=subprocess.PIPE)\n\
    ```\n\n```\nproc1 = subprocess.Popen(['/bin/\nls', '-l'])\n```\n\n```\nproc2 =\
