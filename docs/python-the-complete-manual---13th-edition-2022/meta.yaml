    01 The django-admin.py file is used to create new Django projects. Let''s create
    one for our issue tracker project here...


    In Django, a project represents the site and its settings. An application, on
    the other hand, represents a specific feature of the site, like blogging or tagging.
    The benefit of this approach is that your Django application becomes


    portable and can be integrated with other Django sites with very little effort.


    ```

    $ django-admin.py startproject

    1udIssueTracker

    ```


    A project directory will be created. This will also act as the root of your development
    web server that comes with Django. Under the project directory you will find the
    following items...


    manage.py: Python script to work with your project.


    1udIssueTracker: A python package (a directory with __init__.py file) for'
