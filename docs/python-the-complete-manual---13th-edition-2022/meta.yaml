  md: '# Create with Python


    # Program a Space Invaders clone


    # Classes – part 2


    # Main loop key logic – part 1


    07 In Pivader''s classes, besides creating the required attributes for the object,
    you''ll also notice all the classes have an update() method apart from the Block
    class (a method is a function within a class). The update() method is called in
    every loop through the main game and simply asks the iteration of the class we''ve
    created to move. In the case of a bullet from the Ammo class, we''re asking it
    to move down the screen. If it goes off either end, we destroy it.


    11 Firstly the game checks that the end_game attribute is false – if it''s true,
    the entire loop in main_loop() is skipped and we go straight to pygame.quit(),
    exiting the game. This flag is set to true only if the player closes the game
    window or presses the Esc key when on the start_screen. Assuming end_game and
    start_screen are false, the main loop can start proper, with the control() method,
    which checks to see if the location of the player needs to change. Next we attempt
    to make an enemy missile and we use the random module to limit the number of missiles
    that can be created. Next we call the update() method for each and every actor
    on the screen using a simple for loop. This makes sure everyone''s up to date
    and moved before we check collisions in calc_collisions().


    ![](img/3303e52de17b2e01ada468e51372cd68_91_0.png)


    # Ammo


    08 What''s most interesting about classes, though, is that you can use one class
    to create lots of different things. You could, for example, have a pet class.
    From that class you could create a cat (that meows) and a dog (that barks). They''re
    different in many ways, but they''re both furry and have four legs, so can be
    created from the same parent class. We''ve done exactly that with our Ammo class,
    using it to create both the player bullets and the alien missiles. They''re different
    colours and they shoot in opposite directions, but they''re fundamentally one
    and the same.


    # Main loop key logic – part 2


    12 Once collisions have been calculated, we need to see if the game is still meant
    to continue. We do so with is_dead() and defenses_breached() – if either of these
    methods returns true, we know we need to return to the start screen. On the other
    hand, we also need to check to see if we''ve killed all the aliens, from within
    win_round(). Assuming we''re not dead, but the aliens are, we know we can call
    the next_round() method, which creates a fresh batch of aliens and increases their
    speed around the screen. Finally, we refresh the screen so everything that''s
    been moved, shot or killed can be updated or removed from the screen. Remember,
    the main loop happens 20 times a second – so the fact we don''t call for the screen
    to update right at the end of the loop is of no consequence.


    # The game


    09 Our final class is called Game. This is where all the main functionality of
    the game itself comes in, but remember, so far this is still just a list of ingredients
    – nothing can actually happen until a ''Game'' object is created (right at the
    bottom of the code). The Game class is where the central mass of the game resides,
    so we initialise Pygame, set the imagery for our protagonist and extraterrestrial
    antagonist and create some GameState attributes that we use to control key aspects
    of external classes, like changing the player''s vector (direction).


    # The main loop


    10 There are a lot of methods (class functions) in the Game class, and each is
    designed to control a particular aspect of either setting up the game or the gameplay
    itself. The logic that dictates what happens within any one round of the game
    is contained in the main_loop() method right at the bottom of the pivaders.py
    script and is the key to unlocking exactly what variables and functions you need
    for your game.'
