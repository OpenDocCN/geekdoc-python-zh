- md: "## Introducing Python\n\n## 50 Python tips\n\n### Using SQLite database with\
    \ Python\n\n34 SQLite is fast becoming a very popular embedded database because\
    \ of the zero configuration that is needed, and its superior levels of performance.\
    \ You can use the module 'sqlite3' in order to work with these SQLite databases.\n\
    \n```\nExample:\n>>> import sqlite3\n>>> connection = sqlite.connect('test.db')\n\
    >>> curs = connection.cursor()\n>>> curs.execute('''create table item\n... (id\
    \ integer primary key,\n... itemno text unique,\n... scancode text, descr text,\n\
    ... price real)''')\n<sqlite3.Cursor object at 0x1004a2b30>\n```\n\n### Using\
    \ wildcards to search for filenames\n\n36 You can use the module 'glob' to find\
    \ all the pathnames matching a pattern according to the rules used by the UNIX\
    \ shell. *, ?, and character ranges expressed with [] will be matched.\n\n```\n\
    Example:\n>>> import glob\n>>> glob.glob('./[0-9].*')\n['./1.gif', './2.txt']\n\
    >>> glob.glob('*.gif')\n['1.gif', 'card.gif']\n>>> glob.glob('??.gif')\n['1.gif']\n\
    ```\n\n### Executing UNIX commands from Python\n\n38 You can use module commands\
    \ to execute UNIX commands. This is not available in Python 3 – instead, in this,\
    \ you will need to use the module 'subprocess'.\n\n```\nExample:\n>>> import commands\n\
    >>> commands.getoutput('ls')\n'bz2-example.py\\ntest.py'\n```\n\n### Working with\
    \ zip files\n\n35 You can use the module 'zipfile' to work with zip files.\n\n\
    ```\nzipfile.ZipFile(filename [, mode [, compression\n[,allowZip64]]])\nOpen a\
    \ zip file, where the file can be either a path to a file (a string) or a file-like\
    \ object.\nzipfile.close()\nClose the archive file. You must call 'close()' before\
    \ exiting your program or essential records will not be written.\nzipfile.extract(member\
    \ [, path [, pwd]])\nExtract a member from the archive to the current working\
    \ directory; 'member' must be its full name (or a zipinfo object). Its file information\
    \ is extracted as accurately as possible. 'path' specifies a different directory\
    \ to extract to. 'member' can be a filename or a zipinfo object. 'pwd' is the\
    \ password used for encrypted files.\n```\n\n### Performing basic file operations\n\
    \n37 You can use the module 'shutil' to perform basic file operation at a high\
    \ level. This module works with your regular files and so will not work with special\
    \ files like named pipes, block devices, and so on.\n\n```\nshutil.copy(src,dst)\n\
    Copies the file src to the file or directory dst.\nshutil.copymode(src,dst)\n\
    Copies the file permissions from src to dst.\nshutil.move(src,dst)\nMoves a file\
    \ or directory to dst.\nshutil.copytree(src, dst, symlinks [,ignore])\nRecursively\
    \ copy an entire directory at src.\nshutil.rmtree(path [, ignore_errors [, onerror]])\n\
    Deletes an entire directory.\n```\n\n### Reading environment variables\n\n39 You\
    \ can use the module 'os' to gather up some operating-system-specific information:\n\
    \n```\nExample:\n>>> import os\n>>> os.path <module 'posixpath'\nfrom '/usr/lib/python2.6/posixpath.pyc'>\n\
    >>> os.environ\n{'LANG': 'en_IN', 'TERM': 'xterm-color', 'SHELL':\n'/bin/bash',\
    \ 'LESSCLOSE':\n'/usr/bin/lesspipe %s %s',\n'XDG_SESSION_COOKIE':\n'925c4644597c791c04656354adf56d6-1257673132.347986-1177792325',\n\
    'SHLVL': '1', 'SSH_TTY': '/dev/pts/2', 'PWD': '/home/kunal',\n'LESSOPEN': '| /usr/bin/lesspipe\
    \ '}\n......\n>>> os.name\n'posix'\n>>> os.linesep\n'\\n'\n```\n\n> \"Look around\
    \ and you will find Python everywhere, from various configuration tools to XML\
    \ parsing\"\n\n### Sending email\n\n40 You can use the module 'smtplib' to send\
    \ email using an SMTP (Simple Mail Transfer Protocol) client interface.\n\n```\n\
    smtplib.SMTP([host [, port]])\n```\n\nExample (send an email using Google Mail\
    \ SMTP server):\n\n```\nimport smtplib\n# Use your own to and from email address\n\
    fromaddr = 'kunaldeo@gmail.com'\ntoaddrs = 'toemail@gmail.com'\nmsg = 'I am a\
    \ Python geek. Here is the proof!'\n# Credentials\n# Use your own Google Mail\
    \ credentials while running the program\nusername = 'kunaldeo@gmail.com'\npassword\
    \ = 'xxxxxxxx'\n# The actual mail send\nserver = smtplib.SMTP('smtp.gmail.com:587')\n\
    # Google Mail uses secure connection for SMTP connections\nserver.starttls()\n\
    server.login(username,password)\nserver.sendmail(fromaddr, toaddrs, msg)\nserver.quit()\n\
    ```\n\n### Accessing FTP server\n\n41 'ftplib' is a fully fledged client FTP module\
    \ for Python. To establish an FTP connection, you can use the following function:\n\
    \n```\nftplib.FTP([host [, user [, passwd [, acct [, timeout]]]])\n```\n\nExample:\n\
