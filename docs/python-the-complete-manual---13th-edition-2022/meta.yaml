    # Work with Python


    # Scrape Wikipedia with Beautiful Soup


    Wiki-Everything


    Wikipedia has so many different services that interlink with each other; however,
    we don''t want to grab those pages, so we''ve got quite a lengthy conditional
    statement to stop that. It''s pretty good at making sure we only get links from
    Wikipedia.


    # Creating some useful variables


    02 These variables will keep track of the links we''ve accessed while the script
    has been running; addresses is a list containing every link we''ve accessed; deepestAddresses
    are the links of the pages that were the furthest down the link tree from our
    starting point; storeFolder is where we will save the HTML files we create and
    maxLevel is the maximum depth that we can follow the links to from our starting
    page.


    # Handling the user''s input


    03 In the first few lines of this function, we''re just creating a helper statement.
    Afterwards, we''re parsing any arguments passed into the program on its execution
    and looking for a -URL flag and a -levels flag. The -levels flag is optional as
    we already have a preset depth that we''ll follow the links to, but we need a
    link to start from so if the -URL flag is missing, we''ll prompt the user and
    exit. If we have a link, then we quickly check whether or not we have a directory
    to store files in – which we''ll create if we don''t – and then we''ll fire off
    the function to get that page. Finally, we register a handler for when the script
    tries to exit. We''ll get to that bit later.


    # Retrieving the page from the URL


    04 Here we''re using URLlib2 to request the page the the user has asked for and
    then, once we''ve received that page, we''re going to pass the content through
    to Beautiful Soup with the soup variable. This gives us access to the methods
    we''re going to call as we parse the document.


    # Trimming the fat


    05 Wikipedia has a lot of nodes that we don''t want to parse. The content variable
    allows us to straight away ignore most of Wikipedia''s GUI, but there are still
    lots of elements that we don''t want to parse. We remedy this by iterating through
    the list ''undesirables'' that we created earlier on in the document. For each
    different div/section/node that we don''t want, we call Beautiful Soup''s find_all()
    method and use the extract() method to remove that node from the document. At
    the end of the undesirables loop, most of the content we don''t want any more
    will be gone. We also look for the ''also'' element in the Wiki page. Generally,
    everything after this div is of no use to us. By calling the find_all_next() method
    on the also node, we can get a list of every other element we can remove from
    that point on.


