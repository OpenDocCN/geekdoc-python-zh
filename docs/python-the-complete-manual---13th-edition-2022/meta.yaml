  md: '# Work with Python


    # Scrape Wikipedia with Beautiful Soup


    ![](img/3303e52de17b2e01ada468e51372cd68_75_0.png)


    Above Find the documentation for Beautiful Soup at http://bit.ly/O2H8ID


    # Grabbing the links


    06 By calling content.find_all(''a'') we get a list of every <a> in the document.
    We can iterate through this and check whether or not there is a valid Wikipedia
    link in the <a>''s href. If the link is a valid link, we quickly check how far
    down the link tree we are from the original page. If we''ve reached the maximum
    depth we can go, we''ll store this page and call it quits, otherwise we''ll start
    looking for links that we can grab within it. For every page we request, we append
    its URL to the addresses list; to make sure we don''t call the same page twice
    for each link we find, we check if we''ve already stored it. If we have, then
    we''ll skip over the rest of the loop, but if we''ve not then we''ll add it to
    the list of URLs that we''ve requested and fire off a request. Once that check
    is done, We then do a quick string replace on that link so that it points to the
    local directory, not to the subfolder /wiki/ that it''s looking for.


    # Writing to file


    07 Now we create a file to store the newly parsed document in for later reading.
    We change any ''/'' in the filename to ''_'' so the script doesn''t try and write
    to a random folder. We also do a quick check to see how many links we''ve followed
    since the first page. If it''s the max level, we''ll add it to the deepestAddresses
    list. We''ll use this a little bit later.'
