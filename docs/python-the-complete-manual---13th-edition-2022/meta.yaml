  md: "# Get started with Python\n\n# Getting started\n\n> ## Indentation in detail\n\
    \nAs previously mentioned, the level of indentation dictates which statement a\
    \ block of code belongs to. Indentation is mandatory in Python, whereas in other\
    \ languages, sets of braces are used to organise code blocks. For this reason,\
    \ it is essential to use a consistent indentation style. Four spaces are typically\
    \ used to represent a single level of indentation in Python. You can use tabs,\
    \ but tabs are not well defined, especially if you open a file in more than one\
    \ editor.\n\n# Control structures\n\nIn programming, a control structure is any\
    \ kind of statement that can change the path that the code execution takes. For\
    \ example, a control structure that decided to end the program if a number was\
    \ less than 5 would look something like this:\n\n```\n#!/usr/bin/env python2\n\
    import sys # Used for the sys.exit function\nint_condition = 5\nif int_condition\
    \ < 6:\n    sys.exit(\"int_condition must be >= 6\")\nelse:\n    print(\"int_condition\
    \ was >= 6 - continuing\")\n```\n\nThe path that the code takes will depend on\
    \ the value of the integer int_condition. The code in the 'if' block will only\
    \ be executed if the condition is true. The import statement is used to load the\
    \ Python system library; the latter provides the exit function, allowing you to\
    \ exit the program, printing an error message. Notice that indentation (in this\
    \ case four spaces per indent) is used to indicate which statement a block of\
    \ code belongs to. 'If' statements are probably the most commonly used control\
    \ structures. Other control\n\n> “The path the code takes will depend on the value\
    \ of the integer int_condition”"
