    ## 第 2 节：IPython：一个现成的 Python 系统 Shell 替代品


    在第 1 节中，我们向你介绍了 Python 模块，这些模块允许你使用原生 Python 非常轻松地完成与系统 shell 相关的任务。使用相同的功能，你可以构建一个功能齐全的
    shell，并在此过程中移除大量 Python 样板代码。然而，如果你是那种想要一切现成的人，你很幸运。IPython 提供了一个强大且交互式的 Python
    shell，你可以将其用作你的主要 shell。IPython 支持 Python 2.6 到 2.7 以及 3.1 到 3.2。它支持两种类型的 Python
    shell：基于终端的和基于 Qt 的。


    重申一下，IPython 完全用 Python 实现，并提供 100% 符合 Python 的 shell 接口，因此你在第 1 节中学到的所有内容都可以在
    IPython 中毫无问题地运行。


    IPython 已经在大多数 Linux 发行版中可用。搜索你的发行版的软件库来查找它。如果你找不到它，你也可以使用 easy_install 或 PyPI
    来安装它。


    IPython 提供了许多有趣的功能，使其成为一个很棒的 shell 替代品...


    **Tab 补全：** Tab 补全提供了一种极好的方式来探索你正在使用的任何 Python 对象。它还可以帮助你避免拼写错误。


    **示例：**


    ```

    In [3]: import o {hit tab}

    objc    opcode    operator    optparse    os    os2emxpath


    In [3]: import os


    In [4]: os.p {hit tab}

    os.pardir    os.pathconf_names    os.popen    os.popen4

    os.path    os.pathsep    os.popen2    os.putenv

    os.pathconf    os.pipe    os.popen3

    ```


    **内置对象浏览器：** 你可以在任何 Python 对象后添加 ''?'' 来查看其详细信息，例如类型、基类、字符串形式、命名空间、文件和文档字符串。


    示例：


    ```

    In [28]: os.path?

    Type:        module

    Base Class: <type ''module''>

    String Form:<module ''posixpath'' from ''/System/Library/Frameworks/Python.framework/Versions/2.7/lib/python2.7/posixpath.pyc''>

    Namespace:  Interactive

    File:        /System/Library/Frameworks/Python.framework/Versions/2.7/lib/python2.7/posixpath.py

    Docstring:

    Common operations on POSIX pathnames.

    ```


    不要直接导入此模块，而是导入 os 并将此模块引用为 os.path。''os.path'' 名称是此模块在 POSIX 系统上的别名；在其他系统（例如 Mac、Windows）上，os.path
    以特定于该平台的方式提供相同的操作，并且是另一个模块（例如 macpath、ntpath）的别名。

    其中一些在非 POSIX 系统上实际上也很有用，例如用于操作 URL 的路径名组件。你也可以使用双问号 (??) 来查看相关对象的源代码。


    **魔术函数：** IPython 附带一组预定义的“魔术函数”，你可以使用命令行风格的语法调用它们。IPython ''magic'' 命令通常以 % 为前缀，但如果标志
    %automagic 设置为 on，那么你可以不带 % 调用魔术命令。要查看可用魔术函数的列表，请使用 ''magic function %lsmagic''。它们包括处理代码的函数，如
    %run、%edit、%macro、%recall 等；影响 shell 的函数，如 %colors、%xmode、%autoindent 等；以及其他函数，如
    %reset、%timeit、%paste 等。IPython 的大多数酷炫功能都是由魔术函数驱动的。


    示例：


    ```

    In [45]: %lsmagic

    Available magic functions:

    %alias  %autocall  %autoindent  %automagic  %bookmark  %cd

    %colors  %cpaste  %debug  %dhist  %dirs  %doctest_mode  %ed

    %edit  %env  %gui  %hist  %history  %install_default_config

    %install_profiles  %load_ext  %loadpy  %logoff  %logon

    %logstart  %logstate  %logstop  %lsmagic  %macro  %magic

    %page %paste %pastebin %pdb %pdef %pdoc %pfile

    %pinfo %pinfo2 %popd %pprint %precision %profile %prun

    %psearch %psource %pushd %pwd %pycat %pylab %quickref

    %recall %rehashx %reload_ext %rep %rerun %reset

    %reset_selective %run %save %sc %sx %tb %time %timeit

    %unalias %unload_ext %who %who_ls %whos %xdel %xmode

    ```


    Automagic 已关闭，魔术函数需要 % 前缀。要查看任何魔术函数的帮助，请调用 ''%somemagic?'' 来阅读其文档字符串。


    **Python 脚本执行和运行时代码编辑：** 你可以使用 %run 来运行任何 Python 脚本。你也可以使用 -d 通过 pdb 调试器控制运行 Python
    脚本，或使用 -p 通过 pdn 分析器运行。你也可以使用 %edit 命令编辑 Python 脚本，该命令会在 $EDITOR 环境变量定义的编辑器中打开给定的
    Python 脚本。


    **Shell 命令支持：** 要运行 shell 命令，请在命令前加上 !。


    示例：


    ```

    In [5]: !ps

    PID TTY TIME CMD

    4508 ttys000 0:00.07 -bash

    84275 ttys001 0:00.03 -bash

    17958 ttys002 0:00.18 -bash

    ```


    ```

    In [8]: !clang prog.c -o prog

    prog.c:2:1: warning: type specifier missing, defaults to ''int'' [-Wimplicit-int]

    main()

    ^~~~

    1 warning generated.

    ```


    **Qt 控制台：** IPython 附带一个基于 Qt 的控制台。这提供了仅在 GUI 中可用的功能，如内联图形、带语法高亮的多行编辑和图形化调用提示。使用以下命令启动
    Qt 控制台：


    ```

    $ ipython qtconsole

    ```


    如果你遇到缺少模块的错误，请确保你已安装依赖包 – PyQt、pygments、pyexpect 和 ZeroMQ。


    **结论**


    正如你所看到的，很容易定制 Python 以满足你所有的 shell 环境需求。像 os、subprocess 和 shutil 这样的 Python 模块可供你使用，几乎可以完成你需要用
    Python 做的任何事情。IPython 将这整个体验变成了一个更完整的包。你可以完成标准 Python shell 所做的一切，并且具有更方便的功能。IPython
    的魔术函数确实提供了神奇的 Python shell 体验。所以下次你打开一个 Bash 会话时，再想想：既然铂金就在一步之遥，为什么还要满足于黄金呢？'
