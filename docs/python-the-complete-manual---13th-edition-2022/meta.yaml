    \n```\nsize_hint: None, None\nproper_size:\n    min(0.03*self.parent.height, 0.03*self.parent.width)\n\
    size: self.proper_size, self.proper_size\n# ... canvas part\n```\n\nThis should\
    \ fully handle the loss or win, opening a pop-up with an appropriate message and\
    \ providing a button to try again. Finally, we have to handle destroying blocks\
    \ when the ball hits them (Fig. 10).\n\nWe'll build for Android using the Buildozer\
    \ tool, and a Kivy sister project wrapping other build tools to create packages\
    \ on different systems. This takes care of downloading and running the Android\
    \ build tools (SDK, NDK, etc) and Kivy's Python-for-Android tools that create\
    \ the APK.\n\n# Fig 06\n\n```\nfrom kivy.clock import Clock\nfrom kivy.core.window\
    \ import Window\nfrom kivy.utils import platform\n```\n\nThis fully covers these\
    \ last conditions, checking collision via Kivy's built-in collide_widget method\
    \ that compares their bounding boxes (pos and size). The bounce direction will\
    \ depend on how far the ball has penetrated, as this will tell us how it first\
    \ collided with the Block.\n\n# Fig 04\n\n```\nimport random\n\nclass Block(Widget):\n\
    \    def __init__(self, **kwargs):\n        super(Block, self).__init__(**kwargs)\n\
    \        self.colour = random.choice([\n            (0.78, 0.28, 0), (0.28, 0.63,\
    \ 0.28), (0.25, 0.28, 0.78)])\n```\n\n```\nclass Game(FloatLayout):\n    def update(self,\
    \ dt):\n        self.ball.update(dt)  # Not defined yet\n        self.player.update(dt)\
    \  # Not defined yet\n\n    def start(self, *args):\n        Clock.schedule_interval(self.update,\
    \ 1/60.)\n\n    def stop(self):\n        Clock.unschedule(self.update)\n\n   \
    \ def reset(self):\n        for block in self.blocks:\n            self.remove_widget(block)\n\
    \        self.blocks = []\n        self.setup_blocks()\n        self.ball.velocity\
    \ = [random.random(), 0.5]\n        self.player.position = 0.5\n```\n\nSo there\
    \ we have it, you can run the code to play your simple Breakout game. Obviously\
