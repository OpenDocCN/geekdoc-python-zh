    The median value of a set is an element that divides the data set into two subsets
    (left and right subsets) with the same number of elements. If the data set has
    an odd number of elements, then the median is part of the data set. On the other
    side, if the data set has an even number of elements, then the median is the mean
    value of the two centre elements of the sorted data set.


    # Using arrays with NumPy


    04 NumPy not only embraces the indexing methods used in typical Python for strings
    and lists but also extends them. If you want to select a given element from an
    array, you can use the following notation:


    ```

    >>> twoD[1,2]

    ```


    You can also select a part of an array (a slice) using the following notation:


    ```

    >>> twoD[1,1:3]

    ```


    Finally, you can convert an array into a Python list using the tolist() function.


    # Reading files


    05 Imagine that you have just extracted information from an Apache log file using
    AWK and you now want to go and process the text file using NumPy. The following
    AWK code finds out the total number of requests per hour:


    ```

    $ cat access.log | cut -d[ -f2 | cut -d] -f1 | awk -F: ''{print $2}'' | sort -n
    | uniq -c | awk ''{print $2, $1}'' > timeN.txt

    ```


    The format of the text file (timeN.txt) with the data is the following:


    +   - 00 191

    - 01 225

    - 02 121

    - 03 104


    Reading the timeN.txt file and assigning it to a new array variable can be done
    as follows:


    ```

    aa = np.loadtxt("timeN.txt")

    ```


