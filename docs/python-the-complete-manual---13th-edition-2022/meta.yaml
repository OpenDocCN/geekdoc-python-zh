    \ = (0, 0, 0)\nBLUE = (0, 0, 255)\nWHITE = (255, 255, 255)\nRED = (255, 0, 0)\n\
    ALIEN_SIZE = (30, 40)\nALIEN_SPACER = 20\nBARRIER_ROW = 10\nBARRIER_COLUMN = 4\n\
    BULLET_SIZE = (5, 10)\nMISSILE_SIZE = (5, 5)\nBLOCK_SIZE = (10, 10)\nRES = (800,\
    \ 600)\n\nclass Player(pygame.sprite.Sprite):\n    def __init__(self):\n     \
    \   pygame.sprite.Sprite.__init__(self)\n        self.size = (60, 55)\n      \
    \  self.rect = self.image.get_rect()\n        self.rect.x = (RES[0] / 2) - (self.size[0]\
    \ / 2)\n        self.rect.y = 520\n        self.travel = 7\n        self.speed\
    \ = 350\n        self.time = pygame.time.get_ticks()\n\n    def update(self):\n\
    \        self.rect.x += GameState.vector * self.travel\n        if self.rect.x\
    \ < 0:\n            self.rect.x = 0\n        elif self.rect.x > RES[0] - self.size[0]:\n\
    \            self.rect.x = RES[0] - self.size[0]\n\nclass Alien(pygame.sprite.Sprite):\n\
    \    def __init__(self):\n        pygame.sprite.Sprite.__init__(self)\n      \
    \  self.size = (ALIEN_SIZE)\n        self.rect = self.image.get_rect()\n     \
    \   self.has_moved = [0, 0]\n        self.vector = [1, 1]\n        self.travel\
    \ = [(ALIEN_SIZE[0] - 7), ALIEN_SPACER]\n        self.speed = 700\n        self.time\
    \ = pygame.time.get_ticks()\n\n    def update(self):\n        if GameState.alien_time\
    \ - self.time > self.speed:\n            if self.has_moved[0] < 12:\n        \
    \        self.rect.x += self.vector[0] * self.travel[0]\n                self.has_moved[0]\
    \ += 1\n            else:\n                if not self.has_moved[1]:\n       \
    \             self.rect.y += self.vector[1] * self.travel[1]\n               \
    \     self.vector[0] *= -1\n                    self.has_moved = [0, 0]\n    \
    \                self.speed -= 20\n                    if self.speed <= 100:\n\
    \                        self.speed = 100\n                    self.time = GameState.alien_time\n\
    \nclass Ammo(pygame.sprite.Sprite):\n    def __init__(self, color, (width, height)):\n\
    \        pygame.sprite.Sprite.__init__(self)\n        self.image = pygame.Surface([width,\
    \ height])\n        self.image.fill(color)\n        self.rect = self.image.get_rect()\n\
    \        self.speed = 0\n        self.vector = 0\n\n    def update(self):\n  \
    \      self.rect.y += self.vector * self.speed\n        if self.rect.y < 0 or\
    \ self.rect.y > RES[1]:\n            self.kill()\n\nclass Block(pygame.sprite.Sprite):\n\
    \    def __init__(self, color, (width, height)):\n        pygame.sprite.Sprite.__init__(self)\n\
    \        self.image = pygame.Surface([width, height])\n        self.image.fill(color)\n\
    \        self.rect = self.image.get_rect()\n\nclass GameState:\n    pass\n\nclass\
    \ Game(object):\n    def __init__(self):\n        pygame.init()\n        pygame.font.init()\n\
    \        self.clock = pygame.time.Clock()\n        self.game_font = pygame.font.Font('data/Orbitracer.ttf',\
