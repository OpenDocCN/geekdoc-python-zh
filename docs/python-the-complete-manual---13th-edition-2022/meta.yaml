- md: "## Introducing Python\n\n## Build an app for Android with Python\n\n## Putting\
    \ your APK on the Play Store\n\nFind out how to digitally sign a release APK and\
    \ upload it to an app store of your choice\n\n## 1 Build and sign a release APK\n\
    \nBegin by creating a personal digital key, then using it to sign a special release\
    \ version of the APK. Run these commands, and follow the instructions.\n\n> “Check\
    \ through the whole file just to see what’s available, but most of the default\
    \ settings will be fine”\n\n```\n## Create your personal digital key\n## You can\
    \ choose your own keystore name, alias, and passwords.\n$ keytool -genkey -v -keystore\
    \ test-release-key.keystore -alias test-alias -keyalg RSA -keysize 2048 -validity\
    \ 10000\n\n## Compile your app in release mode\n$ buildozer android release\n\n\
    ## Sign the APK with your new key\n$ jarsigner -verbose -sigalg SHA1withRSA -digestalg\
    \ SHA1 -keystore ./test-release-key.keystore ./bin/KivyBreakout-0.1-release-unsigned.apk\
    \ test-alias\n\n## Align the APK zip file\n$ ~/.buildozer/android/platform/android-sdk-21/tools/zipalign\
    \ -v 4 ./bin/KivyBreakout-0.1-release-unsigned.apk ./bin/KivyBreakout-0.1-release.apk\n\
    ```\n\n```\ngit clone git://github.com/kivy/buildozer\ncd buildozer\nsudo python2.7\
    \ setup.py install\n```\n\nWhen you’re done with that part you can then go on\
    \ and navigate to your Kivy app, and you’ll have to name the main code file ‘main.py’,\
    \ this is the access point that the Android APK will expect. Then:\n\n**buildozer\
    \ init**\n\nThis creates a ‘buildozer.spec’ file, a settings file containing all\
    \ the information that Buildozer needs to create your APK, from the name and version\
    \ to the specific Android build options. We suggest that you check through the\
    \ whole file just to see what’s available but most of the default settings will\
    \ be fine, the only thing we suggest changing is (Fig. 11).\n\nThere are various\
    \ other options you will often want to set, but none are really all that vital\
    \ right now, so you’re able to immediately tell Buildozer to build your APK and\
    \ get going!\n\n**buildozer android debug**\n\nThis will take some time, so be\
    \ patient and it will work out fine.\n\nWhen you first run it, it will download\
    \ both the Android SDK and NDK, which are large (at least hundreds of megabytes)\
    \ but vital to the build. It will also take time to build these and to compile\
    \ the Python components of your APK. A lot of this only needs to be done once,\
    \ as future builds will take a couple of minutes if you change the buildozer.spec,\
    \ or just a few seconds if you’ve only changed your code.\n\nThe APK produced\
    \ is a debug APK, and you can install and use it. There are extra steps if you\
    \ want to digitally sign it so that it can be posted on the Play store. This isn’t\
    \ hard, and Buildozer can do some of the work, but check the documentation online\
    \ for full details.\n\nAssuming everything goes fine (it should!), your Android\
    \ APK will be in a newly created ‘bin’ directory with the name ‘KivyBreakout-0.1-debug.apk’.\
    \ You can send it to your phone any way you like (eg email), though you may need\
    \ to enable application installation from unknown sources in your Settings before\
    \ you can install it.\n\n## Build an app for Android with Python\n\n## Introducing\
    \ Python\n\n```python\nif len(self.blocks) == 0:\n    self.win()\n    return \
    \ # Only remove at most 1 block per frame\n```\n\n```python\nself.parent.do_layout()\n\
    self.parent.destroy_blocks(self)\n```\n\n```python\nclass Game(FloatLayout):\n\
    \    def destroy_blocks(self, ball):\n        for i, block in enumerate(self.blocks):\n\
