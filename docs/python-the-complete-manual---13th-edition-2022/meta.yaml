    Create with Python


    Pivaders part 2: graphics and sound


    # Pivaders Pt 2: graphics & sound


    This time we''ll expand our Space Invaders clone to include immersive animation
    and sound


    We had great fun creating our basic Space Invaders clone, Pivaders, in the previous
    guide. Pygame''s ability to group, manage and detect collisions thanks to the
    Sprite class really made a great difference to our project, not just in terms
    of code length, but in simplicity too. If you missed the first part of the project,
    you can find the v0.1 code listing on GitHub via git.io/cBVTBg, while you can
    find version v0.2 of the code, including all the images, music and sound effects
    we''ve used at git.io/8QsK-w.


    To help keep our project code manageable and straightforward (as your projects
    grow keeping your code easy to follow becomes increasingly harder) we integrated
    a few animation methods into our Game class and opted to use a sprite sheet. Not
    only does it make it very easy to draw to the screen, but it also keeps the asset
    count under control and keeps performance levels up, which is especially important
    for the Raspberry Pi. We hope you have fun using our techniques to add animation
    and sound to your projects!


    What you''ll need...


    Raspbian

    www.raspberrypi.org/downloads


    Python

    www.python.org/doc


    Pygame

    www.pygame.org/docs


    Art assets

    opengameart.org


    > Did you know...

    Space Invaders is one of the most cloned games in the world! It makes a great
    first project for game programmers.


    # Setting up dependencies


    01 You''ll get much more from the exercise if you download the code (git.io/8QsK-w)
    and use it for reference as you create your own animations and sound effects.
    Regardless of whether you just want to simply preview and play or walk-through
    the code to get a better understanding of basic game creation, you''re still going
    to need to satisfy some basic dependencies. The two key requirements here are
    Pygame and Git, both of which are installed by default on up-to-date Raspbian
    installations. That''s easy!


    # Downloading pivaders


    02 Git is a superb version control solution that helps programmers safely store
    their code and associated files. Not only does it help you retain a full history
    of changes, it means you can ''clone'' entire projects to use and work on from
    places like github.com. To clone the version of the project we created for this
    tutorial, go to your home folder from the command line (cd ~) and type:


    ```

    git pull https://github.com/russ78/pivaders.git

    ```


    This creates a folder called pivaders.


    # Navigating the project


    03 Within pivaders sits a licence, readme and a second pivaders folder. This contains
