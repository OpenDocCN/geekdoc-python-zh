    # Python for system administrators


    # What you''ll need...


    **Python-devel**

    Python development libraries, required for compiling third-party Python modules.


    **setuptools**

    setuptools allows you to download, build, install, upgrade, and uninstall Python
    packages with ease.


    # Python for system administrators


    Learn how Python can help by daring to replace the usual shell scripting...


    > **Note**

    This is written for the Python 2.X series, as it is still the most popular and
    default Python distribution across all the platforms (including all Linux distros,
    BSDs and Mac OS X).


    System administration is an important part of our computing environment. It does
    not matter whether you are managing systems at your work our home. Linux, being
    a UNIX-based operating system, already has everything a system administrator needs,
    such as the world-class shells (not just one but many, including Bash, csh, zsh
    etc), handy tools, and many other features which make the Linux system an administrator''s
    dream. So why do we need Python when Linux already has everything built-in? Being
    a dynamic scripting language, Python is very easy to read and learn. That''s just
    not us saying that, but many Linux distributions actually use Python in core administrative
    parts. For example, Red Hat (and Fedora) system setup tool Anaconda is written
    in Python (read this line again, got the snake connection?). Also, tools like
    GNU Mailman, CompizConfig Settings Manager (CCSM) and hundreds of tiny GUI and
    non-GUI configuration tools are written using Python. Python does not limit you
    on the choice of user interface to follow – you can build command-line, GUI and
    web apps using Python. This way, it has got covered almost all the possible interfaces.
    Here we will look into executing sysadmin-related tasks using Python.


    # Parsing configuration files


    Configuration files provide a way for applications to store various settings.
    In order to write a script that allows you to modify settings of a particular
    application, you should be able to parse the configuration file of the application.
    In this section we learn how to parse INI-style configuration files. Although
    old, the INI file format is very popular with much modern open source software,
    such as PHP and MySQL.


    Excerpt for php.ini configuration file:


    ```

    [PHP]

    engine = On

    ```'
