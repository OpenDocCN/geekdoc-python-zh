  md: 'Use Python with Pi


    Create a Pi-powered virtual reality setup


    # What you''ll need...


    +   - Raspberry Pi 3

    - 8GB SD card

    - Xbox 360 controller

    - Oculus Rift Developer Kit (optional)


    # Create a Pi-powered virtual reality setup


    Combine the Raspberry Pi, Python-VRZero and 3D graphics module Pi3D to edit or
    make virtual reality environments


    ![](img/3303e52de17b2e01ada468e51372cd68_113_0.png)


    Virtual Reality is huge now and has come a long way since the concepts and CGI
    visuals of Stephen King''s *Lawnmower Man*. It is one of the fastest growing areas
    of technology and you can now design models, explore new places and play games
    all within a virtual environment. A professional VR hardware package is expensive
    and will set you back several hundred pounds. However, it''s possible to emulate
    the VR setup using a Raspberry Pi, Python-VRZero and a 3D graphics module, Pi3D.
    Now, this is purely for fun and learning, so don''t expect huge gaming PC frame
    rates, although some of the demos do peak at around 25-30 FPS on a Raspberry Pi
    3. This tutorial shows you how you create a VR setup using the Raspberry Pi 3,
    a Xbox 360 controller and some Python code. Our first steps will walk you through
    how to install the required software and modules. We''ll then cover configuring
    the hardware and drivers to enable you to control movement within the VR environment.
    The final steps look at the program code structure, where you can develop your
    own versions of the VR demo or design and build your own virtual worlds.


    ![](img/3303e52de17b2e01ada468e51372cd68_113_1.png)'
