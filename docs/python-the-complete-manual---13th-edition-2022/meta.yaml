    total = len(ints)\ncount = 0\nwhile count < total:\n    print(str(ints[count]))\n\
    \    count += 1\n\n## 关于 Python 列表的更多信息\n\nPython 列表类似于其他语言中的数组。Python 中的列表（或元组）可以包含多种类型的数据，这在其他语言的数组中通常不是这种情况。因此，我们建议你只在列表中存储相同类型的数据。由于列表中数据的处理方式，这几乎总是应该如此。\n\
    \n## 函数和变量作用域\n\n函数在编程中用于将过程分解为更小的部分。这通常使代码更易于阅读。如果设计得当，函数也可以是可重用的。函数可以接收传递给它们的变量。Python\
    \ 中的变量总是按值传递，这意味着传递给函数的是变量的一个副本，该副本仅在函数的作用域内有效。在函数内部对原始变量所做的任何更改都将被丢弃。然而，函数也可以返回值，所以这不是问题。函数使用关键字\
