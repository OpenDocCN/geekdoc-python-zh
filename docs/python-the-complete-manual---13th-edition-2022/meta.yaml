  mdcn: "## 使用Python构建Android应用\n\n掌握Kivy——这个出色的跨平台应用框架，打造你的第一个Android应用……\n\n![](img/3303e52de17b2e01ada468e51372cd68_31_0.png)\n\
    \nKivy的妙处在于，我们可以通过多种方向用它来实现相当炫酷的功能。但我们将直奔Kivy最酷的特性之一——它能让你轻松地在Android设备上运行你的程序。\n\
