    \ Django 管理界面\nadmin.site.register(Issue, IssueAdmin)\n```\n\n## 启用管理站点\n\n管理站点已经启用，但我们需要在\
    \ urls.py 文件中启用它——该文件包含从模型到视图的基于正则表达式的 URL 映射。按如下方式更新 urls.py 文件：\n\n```python\n\
    from django.conf.urls import patterns, include, url\nfrom django.contrib import\
    \ admin\nadmin.autodiscover()\n\nurlpatterns = patterns('',\n    url(r'^admin/',\
    \ include(admin.site.urls)),\n)\n```\n\n![img](img/3303e52de17b2e01ada468e51372cd68_27_1.png)\n\
    \n## 启动 Django Web 服务器\n\nDjango 包含一个内置的 Web 服务器，对于调试和测试 Django 应用程序非常方便。让我们启动它，看看我们的管理界面是如何工作的...\n\
    要启动 Web 服务器：\n\n```\n$ python manage.py runserver\n```\n\n如果你的代码没有错误，服务器应该在 8000\
    \ 端口上可用。要启动管理界面，请将浏览器导航到 http://localhost:8000/admin。\n系统会要求你在此处登录。输入用户名和密码。\n\
    \n点击 Issues 旁边的 Add 按钮。在这里你会注意到可以输入问题的所有者、状态和摘要。但是我们在建模应用时定义的 opened_on 和 modified_on\
    \ 字段呢？它们不在这里，因为它们不应该由用户输入。opened_on 将自动设置为创建时的日期时间，modified_on 将自动设置为问题被修改时的日期时间。\n\
    \n> \"所有者字段自动填充了站点内用户的详细信息，这真是太棒了\"\n\n![img](img/3303e52de17b2e01ada468e51372cd68_28_0.png)\n\
    \n![img](img/3303e52de17b2e01ada468e51372cd68_28_1.png)\n\n## 为 ludissues 创建公共用户界面\n\
    \n此时，管理界面已经可以工作了。但我们需要一种方式来显示我们通过管理界面添加的数据。然而目前没有公共界面。让我们现在创建它。\n\n## 创建 ludissues.url\n\
    \n另一个很酷的事情是，所有者字段会自动填充站点内的所有用户。\n\n我们必须从编辑主 urls.py (ludissuetracker/urls.py)\
    \ 开始。\n\n在应用目录 (ludissues/urls.py) 中创建一个 urls.py 文件，内容如下：\n\n```python\nfrom django.conf.urls\
    \ import patterns, include, url\n# 使用 ludissues 模型\nfrom models import ludissues\n\
    ```\n\n```python\nurlpatterns = patterns('',\n    (r'^', include('ludissues.urls')),\n\
    \    (r'^admin/', include(admin.site.urls)),\n)\n```\n\n这确保了所有请求都会首先由 ludissues.urls\
    \ 处理。\n\n我们已经在模型中定义了列表视图，以显示 ID、名称、状态、所有者和“修改时间”。你可以通过导航到 http://localhost:8000/admin/ludissues/issue/\
    \ 来访问此视图。\n\n```python\n# 包含 ludissues 中所有对象的字典\ninfo = {\n    'queryset': ludissues.objects.all(),\n\
    }\n\n# 为了节省我们编写大量 Python 代码\n# 我们使用 list_detail 通用视图\n\n# list detail 是我们使用的视图名称\n\
    urlpatterns = patterns('django.views.generic.list_detail',\n    # issue-list 和\
    \ issue-detail 是模板名称\n    # 它们将在默认模板目录中查找\n    url(r'^$', 'object_list', info,\
    \ name='issue-list'),\n    url(r'^(?P<object_id>\\d+)/$', 'object_detail', info,\
    \ name='issue-detail'),\n)\n```\n\n为了显示问题列表和详情，我们使用了 Django 的一个特性，称为通用视图。在这种情况下，我们使用名为\
    \ list 和 details 的视图。这允许我们创建一个问题列表视图和一个问题详情视图。然后这些视图通过 issue_list.html 和 issue_detail.html\
    \ 模板来应用。在接下来的步骤中，我们将创建这些模板文件。\n\n## 设置模板和媒体目录\n\n在这一步中，我们将创建模板和媒体目录。我们已经提到了模板目录为：\n\
    \n```python\nTEMPLATE_DIRS = (\n    getabspath('templates')\n)\n```\n\n这对应于 ludissueTracker/ludissueTracker/templates/。由于我们将从\
    \ ludissues 应用访问模板，完整的目录路径将是 ludissueTracker/ludissueTracker/templates/ludissues。在你的项目文件夹中创建这些文件夹。\n\
    \n同时，创建目录 ludissueTracker/ludissueTracker/media/ 用于存放 CSS 文件。将 style.css 文件从代码文件夹的\
    \ resources 目录复制过来。要从此文件夹提供文件，请使其公开可用。打开 settings.py 并在 ludissueTracker/ludissueTracker/urls.py\
    \ 中添加以下几行：\n\n```python\nfrom django.conf.urls import patterns, include, url\n\
    from django.conf import settings\n# 取消注释以下两行以启用管理界面：\nfrom django.contrib import\
    \ admin\nadmin.autodiscover()\n\nurlpatterns = patterns('',\n    (r'^', include('ludissues.urls')),\n\
    \    (r'^admin/', include(admin.site.urls)),\n    (r'^media/(?P<path>.*)$', 'django.views.static.serve',\n\
    \        {'document_root': settings.MEDIA_ROOT})\n)\n```\n\n## 创建模板文件\n\n模板将从\
    \ ludissueTracker/ludissueTracker/templates 目录加载。\n\n在 Django 中，我们从 ludissueTracker/ludissueTracker/templates/base.html\
    \ 模板开始。可以把它想象成一个主模板，可以被子模板继承。ludissueTracker/ludissueTracker/templates/base.html\n\
    \n```html\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    >\n<html>\n    <head>\n        <title>{% block title %}{% endblock %}LUD Issues</title>\n\
    \        <link rel=\"stylesheet\" href=\"{{ MEDIA_URL }}style.css\" type=\"text/css\"\
    \ media=\"screen\" />\n    </head>\n    <body>\n        <div id=\"hd\">\n    \
    \        <h1>LUD Issue Tracker</h1>\n        </div>\n        <div id=\"mn\">\n\
    \            <ul>\n                <li><a href=\"{% url issue-list %}\" class=\"\
    sel\">View Issues</a></li>\n                <li><a href=\"/admin/\">Admin Site</a></li>\n\
    \            </ul>\n        </div>\n        <div id=\"bd\">\n            {% block\
    \ content %}{% endblock %}\n        </div>\n    </body>\n</html>\n```\n\n> \"\
    为了在这里显示问题列表和详情，我们使用了 Django 的一个特性，称为通用视图\"\n\n![img](img/3303e52de17b2e01ada468e51372cd68_30_0.png)\n\
    \n| 问题 | 描述 | 状态 | 所有者 |\n|---|---|---|---|\n| 1 | 那个模块有问题。 | new | max |\n| 2\
    \ | 无法连接到火星服务器的互联网。 | accepted | ana |\n| 3 | 银河联邦对《星球大战》的准确性有一些问题 | started |\
    \ samfisher |\n| 4 | 移动楼梯又卡住了。这是今天第三次发生这种情况了。 | started | dumbledore |\n| 5 |\
    \ 分裂细胞手电筒缺少三个电池 | started | samfisher |\n\n`{{ variablename }}` 代表一个 Django 变量。`{%\
    \ block title %}` 代表块。块的内容由 Django 求值并显示。这些块可以被子模板替换。\n\n现在我们需要创建 issue_list.html\
    \ 模板。此模板负责显示系统中所有可用的问题。\n\n```html\nludissueTracker/ludissueTracker/templates/ludissues/issue_list.html\n\
    {% extends 'base.html' %}\n{% block title %}View Issues - {% endblock %}\n{% block\
    \ content %}\n<table cellspacing=\"0\" class=\"column-options\">\n    <tr>\n \
    \       <th>Issue</th>\n        <th>Description</th>\n        <th>Status</th>\n\
    \        <th>Owner</th>\n    </tr>\n    {% for issue in object_list %}\n    <tr>\n\
    \        <td><a href=\"{% url issue-detail issue.id %}\">{{ issue.id }}</a></td>\n\
    \        <td><a href=\"{% url issue-detail issue.id %}\">{{ issue.name }}</a></td>\n\
    \        <td>{{ issue.status }}</td>\n        <td>{{ issue.owner }}</td>\n   \
    \ </tr>\n    {% endfor %}\n</table>\n{% endblock %}\n```\n\n这里我们继承了之前创建的 base.html\
    \ 文件。`{% for issue in object_list %}` 在 urls.py 发送的对象上运行。然后我们遍历 object_list 以获取\
    \ issue.id 和 issue.name。\n\n现在我们将创建 issue_detail.html。此模板负责显示一个案例的详情视图。\n\n```html\n\
    ludissueTracker/ludissueTracker/templates/ludissues/issue_detail.html\n{% extends\
    \ 'base.html' %}\n{% block title %}Issue #{{ object.id }} - {% endblock %}\n{%\
    \ block content %}\n<h2>Issue #{{ object.id }} <span>{{ object.status }}</span></h2>\n\
    <div class=\"issue\">\n    <h2>Information</h2>\n    <div class=\"date\">\n  \
    \      <p class=\"cr\">Opened {{ object.opened_on }} ago</p>\n        <p class=\"\
    up\">Last modified {{ object.modified_on }} ago</p>\n    </div>\n    <div class=\"\
    clear\">&nbsp;</div>\n    <div class=\"block w49 right\">\n        <p class=\"\
    ass title\">Owner</p>\n        <p class=\"ass\">{{ object.owner }}</p>\n    </div>\n\
    \    <div class=\"clear\">&nbsp;</div>\n    <div class=\"block\">\n        <p\
    \ class=\"des title\">Summary</p>\n        <p class=\"des\">{{ object.summary\
    \ }}</p>\n    </div>\n</div>\n{% endblock %}\n```\n\n就是这样！问题跟踪器应用现在已完成并可以使用了。你现在可以将浏览器指向\
    \ localhost:8000 来开始使用该应用。"
