    \ when you create it. Then, when threads use it and call the wait method, they\
    \ will block until all of the threads call the wait method. The threading module\
    \ is a light, fast and easy method to add the ability divide up the processing\
    \ within your code, but it does suffer from one major issue. Within the Python\
    \ core engine, there is a structure"
