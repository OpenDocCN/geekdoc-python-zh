    # Programming in Python on the Raspberry Pi


    # Use Python with Pi


    ![](img/3303e52de17b2e01ada468e51372cd68_102_0.png)


    ![](img/3303e52de17b2e01ada468e51372cd68_102_1.png)


    # Testing our program


    08 Now we''ve done that part, why not test it? It''s worth noting that you have
    to save before running the program, or anything you''ve done since you last saved
    won''t be interpreted by Python. Run the program by pressing the F5 key. Input
    your name by typing it and then pressing the Enter key. Once you have done this,
    you''ll see a welcome message. If the program exits with the code 0 then everything
    was run successfully. Press Enter to close the terminal.


    # Fixing a small issue


    07 The Debian image that we''re currently using has a small misconfiguration issue
    in Geany. You''ll know if you have this problem by trying to run your program
    with either the F5 key or going to the Build menu and selecting Execute. If the
    issue is present then nothing will happen and you''ll see a message saying ''Could
    not find terminal: xterm''. Not to worry, it''s easy to fix. Go to the Edit menu
    and then select Preferences. Go to the Tools tab and change the value for Terminal
    from xterm to lxterminal.


    # Working with numbers


    09 We''re going to ask the user for a number by basically repeating the first
    couple of lines we did. Once the user gives us a number, we''ll halve, square
    and double it. The raw_input function returns the value that the user input as
    a string. A string is a text-based value so we can''t perform arithmetic on it.
    The integer type in Python can only store whole numbers whereas the decimal type
    can store numbers with decimals. We''re going to do something called a type cast,
    which basically converts a value with one type to another type. We''re going to
    convert our number string to a decimal value because it''s likely that decimals
    will be involved if we are halving numbers. If the number was of an integer type,
    any decimal values would simply be cut off the end, without any rounding. This
    is called truncation.'
- md: "## Use Python with Pi\n\n## Programming in Python on the Raspberry Pi\n\n###\
    \ Performing arithmetic\n\n10 The main arithmetic operators in Python are + -\
    \ / *, the latter two being divide and multiply respectively. We've created three\
    \ new variables called numberHalved, numberDoubled and numberSquared. Notice that\
    \ we don't need to specify that they should be decimal because Python gives a\
    \ type to its variables from the type of their initial value. The number variable\
    \ is a decimal type, so all values returned from performing arithmetic on that\
    \ number will also be of a decimal type.\n\n```python\n# Print out the values\
    \ we just worked out, converting each float value\n# to a string\nprint(\"The\
    \ result of halving that number: \" + str(numberHalved))\nprint(\"The result of\
    \ doubling that number: \" + str(numberDoubled))\nprint(\"The result of squaring\
    \ that number: \" + str(numberSquared))\nprint(\"\")\n```\n\n### Printing our\
    \ numbers\n\n11 Now that we have performed our arithmetic, we need to print the\
    \ results using the print function. The print function only accepts string values\
    \ passed to it. This means that we need to convert each decimal value to a string\
    \ using the str() function before they can be printed. We're using a print statement\
    \ with nothing between the quotation marks to print one blank line. This works\
    \ because the print function always adds a new line at the end of its output unless\
    \ told otherwise, so printing an empty string just prints a new line.\n\nBelow\
    \ The Raspberry Pi takes the 'Pi' part of its name from its compatibility with\
    \ the Python programming language\n\n### Input validation with While loops and\
    \ If statements\n\n12 To demonstrate a while loop and if statements, we will output\
    \ a question to the user that requires a yes or no answer. We're going to ask\
    \ them if they want to continue – and for this we require either a lower-case\
    \ 'yes', or a lower-case 'no'. A while loop is a loop that runs until a condition\
    \ is met. In this case, we will create a variable called yesOrNo and the while\
    \ loop will run while yesOrNo is false. The yesOrNo variable will be a Boolean\
    \ type that can be either True or False. The variable will be initialised with\
    \ a value of False, or the while loop will not run.\n\nA while loop has the format\
    \ 'while [condition]:' – where any code that is part of the while loop needs to\
    \ be indented in the lines below the colon. Any code that is not indented will\
    \ not be part of the while loop. This is the same for an if statement. The condition\
    \ is checked with the comparison operator '=='. A single '=' is an assignment\
    \ operator whereas a double equals is a comparison operator. Another common comparison\
    \ operator is '!=' – which means 'not equal to'.\n\nWe create a variable called\
    \ 'result', which holds the result of the question, do you want to continue? We\
    \ then check this result is valid with an if statement. Notice the 'or' operator\
    \ which allows two conditions to be tested. If the user inputs a correct value\
    \ then we set yesOrNo to True, which stops the while loop on the next run. Otherwise,\
    \ we output an error message and the while loop will run again. The user can use\
    \ the Ctrl+C command at the terminal to exit the program at any time.\n\n![](img/3303e52de17b2e01ada468e51372cd68_103_0.png)\n\
    \n```python\n# Deal with the result\nif result == \"yes\":\n    print(\"\\nContinuing\"\
    )\nelse:\n    print(\"\\nExiting\")\n    sys.exit()\n```\n\n> \"The print function\
    \ always adds a new line at the end of its output\"\n\n### Continue or exit?\n\
    \n13 Next we will deal with the result that was stored during the while loop with\
    \ if statements. If the user typed 'yes' then we will print 'Continuing'. Otherwise,\
    \ we will print 'Exiting' and then call the sys.exit function. You don't have\
    \ to do anything else for the program to continue because it will simply carry\
    \ on if the sys.exit function wasn't called. This code also shows that the newline\
    \ character \\n can be used anywhere in a string, not just in separate quotation\
    \ marks like above.\n\n```python\n# Use a while loop to add 5 to the number and\
    \ output the value each time\nprint(\"Incrementing the number by 5\\n\")\n\nwhile\
    \ count <= 5:\n    number += 1\n    print(\"number + \" + str(count) + \" = \"\
    \ + str(number))\n\n    # Increment the count\n    count += 1\n```\n\n### Loops\
    \ with numbers\n\n14 We'll be using a while loop that uses a number and a <= (less\
    \ than or equal to) operator as its stopping condition. The while loop will be\
    \ used to increment the number by 1, printing the change on each loop until the\
    \ stopping condition is met. The count variable allows us to know exactly how\
    \ many times we have been through the while loop.\n\n### Finishing off\n\n16 The\
    \ final step is to print that the program is exiting. This is the last line and\
    \ we don't have to do anything else because Python simply finishes when there\
    \ are no more lines to interpret.\n\n![](img/3303e52de17b2e01ada468e51372cd68_104_0.png)\n\
    \n### Incrementing numbers with a loop\n\n15 The while loop will run until the\
    \ count is 6, meaning that it will run for a total of 5 times because the count\
