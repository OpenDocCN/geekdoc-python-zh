    which (if it isn''t already) can be installed from the terminal by typing:

    sudo apt-get install python-pygame


    05 Once we''ve imported the modules we need for the project, there''s quite a
    long list of variables in block capitals. The capitals denote that these variables
    are constants (or global variables). These are important numbers that never change
    – they represent things referred to regularly in the code, like colours, block
    sizes and resolution. You''ll also notice that colours and sizes hold multiple
    numbers in braces – these are tuples. You could use square brackets (to make them
    lists), but we use tuples here since they''re immutable, which means you can''t
    reassign individual items within them. Perfect for constants, which aren''t designed
    to change anyway.


    # Installation


    02 For Pivaders we''ve used Git, a brilliant form of version control used to safely
    store the game files and retain historical versions of your code. Git should already
    be installed on your Pi; if not, you can acquire it by typing:

    sudo apt-get install git

    As well as acting as caretaker for your code, Git enables you to clone copies
    of other people''s projects so you can work on them, or just use them. To clone
    Pivaders, go to your home folder in the terminal (cd ~), make a directory for
    the project (mkdir pivaders), enter the directory (cd pivaders) and type:

    git pull https://github.com/russb78/pivaders.git


    # Testing Pivaders


    03 With Pygame installed and the project cloned to your machine (you can also
    find the .zip on this issue''s cover DVD – simply unpack it and copy it to your
    home directory to use it), you can take it for a quick test drive to make sure
    everything''s set up properly. All you need to do is type python pivaders.py from
    within the pivaders directory in the terminal to get started. You can start the
    game with the space bar, shoot with the same button and simply use the left and
    right arrows on your keyboard to move your ship left and right.


    # Classes – part 1


    06 A class is essentially a blueprint for an object you''d like to make. In the
    case of our player, it contains all the required info, from which you can make
    multiple copies (we create a player instance in the make_player() method halfway
    through the project). The great thing about the classes in Pivaders is that they
    inherit lots of capabilities and shortcuts from Pygame''s Sprite class, as denoted
    by the pygame.sprite.Sprite found within the braces of the first line of the class.
    You can read the docs to learn more about the Sprite class via www.pygame.org/docs/ref/sprite.html.


    # Creating your own clone


