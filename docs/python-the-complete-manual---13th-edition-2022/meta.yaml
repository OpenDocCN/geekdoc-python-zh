    \    player = ObjectProperty()\n    # 游戏的Player实例\n    ball = ObjectProperty()\
    \  # 游戏的Ball实例\n```\n\n```\nclass Player(Widget):  # 一个移动的挡板\n    position = NumericProperty(0.5)\n\
    \    direction = StringProperty('none')\n```\n\n```\nclass Ball(Widget):  # 一个弹跳的球\n\
    \    # pos_hints用于比例定位，见下文\n    pos_hint_x = NumericProperty(0.5)\n    pos_hint_y\
    \ = NumericProperty(0.3)\n    proper_size = NumericProperty(0.)\n    velocity\
    \ = ListProperty([0.1, 0.5])\n```\n\n```\nclass Block(Widget):  # 每个要销毁的彩色方块\n\
