    \        for block in self.blocks:\n            self.remove_widget(block)\n  \
    \      self.blocks = []\n        self.setup_blocks()\n        self.ball.velocity\
    \ = [random.random(), 0.5]\n        self.player.position = 0.5\n```\n\n就是这样，你可以运行代码来玩你的简单Breakout游戏了。显然，它现在非常简单，但希望你能看到很多不同的方法来添加任何你喜欢的额外行为——你可以添加不同类型的方块和道具、生命系统、更复杂的挡板/球交互，甚至构建一个带有菜单和设置屏幕的完整游戏界面。\n\
    \n### 图05\n\n```\n<Block>:\n    size_hint: 0.09, 0.05\n    # ... canvas part\n\
