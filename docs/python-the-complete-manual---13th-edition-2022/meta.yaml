    \ by the path to the Python interpreter. The program loader uses this line to\
    \ work out what the rest of the lines need to be interpreted with. If you're running\
    \ this in an IDE like IDLE, you don't necessarily need to do this.\n\nThe code\
    \ that is actually read by the Python interpreter is only a single line. We're\
    \ passing the value Hello World to the print function by placing it in brackets\
    \ immediately after we've called the print function. Hello World is enclosed in\
    \ quotation marks to indicate that it is a literal value and should not be interpreted\
    \ as source code. As we would expect, the print function in Python prints any\
    \ value that gets passed to it from the console.\n\nYou can save the changes you've\
    \ just made to the file in nano using the key combination Ctrl+O, followed by\
    \ Enter. Use Ctrl+X to exit nano.\n\n```\n#!/usr/bin/env python2\nprint(\"Hello\
    \ World\")\n```\n\nYou can run the Hello World program by prefixing its filename\
    \ with ./ – in this case you'd type: ./hello_world.py.\n\n```\n[liam@liam-laptop\
    \ Python]$ ./hello_world.py\nHello World\n```\n\n## Variables and data types\n\
    \nA variable is a name in source code that is associated with an area in memory\
    \ that you can use to store data, which is then called upon throughout the code.\
    \ The data can be one of many types, including:\n\n| Type | Description |\n|---|---|\n\
    | Integer | Stores whole numbers |\n| Float | Stores decimal numbers |\n| Boolean\
    \ | Can have a value of True or False |\n| String | Stores a collection of characters.\
    \ \"Hello World\" is a string |\n\n> \"A variable is associated with an area in\
    \ memory that you can use to store data\"\n\n![](img/3303e52de17b2e01ada468e51372cd68_10_0.png)\n\
    \n> **Tip**\n\nAt this point, it's worth explaining that any text in a Python\
    \ file that follows a # character will be ignored by the interpreter. This is\
    \ so you can write comments in your code.\n\nAs well as these main data types,\
    \ there are sequence types (technically, a string is a sequence type but is so\
    \ commonly used we've classed it as a main data type):\n\n| Type | Description\
    \ |\n|---|---|\n| List | Contains a collection of data in a specific order |\n\
    | Tuple | Contains a collection of immutable data in a specific order |\n\nA tuple\
    \ would be used for something like a co-ordinate, containing an x and y value\
    \ stored as a single variable, whereas a list is typically used to store larger\
    \ collections. The data stored in a tuple is immutable because you aren't able\
    \ to change values of individual elements in a tuple. However, you can do so in\
    \ a list.\n\nIt will also be useful to know about Python's dictionary type. A\
    \ dictionary is a mapped data type. It stores data in key-value pairs. This means\
    \ that you access values stored in the dictionary using that value's corresponding\
    \ key, which is different to how you would do it with a list. In a list, you would\
    \ access an element of the list using that element's index (a number representing\
    \ where the element is placed in the list).\n\nLet's work on a program we can\
    \ use to demonstrate how to use variables and different data types. It's worth\
    \ noting at this point that you don't always have to specify data types in Python.\
    \ Feel free to create this file in any editor you like. Everything will work just\
    \ fine as long as you remember to make the file executable. We're going to call\
    \ ours variables.py.\n\n## Interpreted vs compiled languages\n\nAn interpreted\
    \ language such as Python is one where the source code is converted to machine\
    \ code and then executed each time the program runs. This is different from a\
    \ compiled language such as C, where the source code is only converted to machine\
    \ code once – the resulting machine code is then executed each time the program\
    \ runs.\n\n## Full code listing\n\nThe following line creates an integer variable\
    \ called hello_int with the value of 21. Notice how it doesn't need to go in quotation\
    \ marks\n\n```\n#!/usr/bin/env python2\n\n# We create a variable by writing the\
    \ name of the variable we want followed by an equals sign, which is followed by\
    \ the value we want to store in the variable. For example, the following line\
    \ creates a variable called hello_str, containing the string Hello World.\nhello_str\
    \ = \"Hello World\"\n\nhello_int = 21\n\nhello_bool = True\n\nhello_tuple = (21,\
    \ 32)\n\nhello_list = [\"Hello,\", \"this\", \"is\", \"a\", \"list\"]\n```\n\n\
    The same principle is true of Boolean values.\n\nWe create a tuple in the following\
    \ way.\n\nAnd a list in this way.\n\n# This list now contains 5 strings. Notice\
    \ that there are no spaces between these strings so if you were to join them up\
    \ to make a sentence you'd have to add a space between each element.\n\nYou could\
    \ also create the same list in the following way.\n\n```\nhello_list = list()\n\
    hello_list.append(\"Hello,\")\nhello_list.append(\"this\")\nhello_list.append(\"\
    is\")\nhello_list.append(\"a\")\nhello_list.append(\"list\")\n```\n\n# The first\
    \ line creates an empty list and the following lines use the append function of\
    \ the list type to add elements to the list. This way of using a list isn't really\
    \ very useful when working with strings you know of in advance, but it can be\
    \ useful when working with dynamic data such as user input. This list will overwrite\
    \ the first list without any warning.\n\n![](img/3303e52de17b2e01ada468e51372cd68_12_0.png)\n\
    \nWe might as well create a dictionary while we're at it. Notice how we've aligned\
    \ the colons below to make the code tidy.\n\n```\nhello_dict = { \"first_name\"\
    \ : \"Liam\",\n    \"last_name\" : \"Fraser\",\n    \"eye_colour\" : \"Blue\"\
    \ }\n```\n\n# Let's access some elements inside our collections. We'll start by\
    \ changing the value of the last string in our hello_list and add an exclamation\
    \ mark to the end. The \"list\" string is the 5th element in the list. However,\
    \ indexes in Python are zero-based, which means the first element has an index\
    \ of 0.\n\nNotice that there will now be two exclamation marks present when we\
    \ print the element.\n\n```\nprint(hello_list[4])\nhello_list[4] += \"!\"\n# The\
    \ above line is the same as\nhello_list[4] = hello_list[4] + \"!\"\nprint(hello_list[4])\n\
    ```\n\nRemember that tuples are immutable, although we can access the elements\
    \ of them like so.\n\n```\nprint(str(hello_tuple[0]))\n# We can't change the value\
    \ of those elements like we just did with the list\n# Notice the use of the str\
    \ function above to explicitly convert the integer\n# value inside the tuple to\
    \ a string before printing it.\n```\n\nLet's create a sentence using the data\
    \ in our hello_dict.\n\n```\nprint(hello_dict[\"first_name\"] + \" \" + hello_dict[\"\
    last_name\"] + \" has \" + hello_dict[\"eye_colour\"] + \" eyes.\")\n```\n\nA\
    \ much tidier way of doing this would be to use Python's string formatter.\n\n\
    ```\nprint(\"{0} {1} has {2} eyes.\".format(hello_dict[\"first_name\"],\n    hello_dict[\"\
    last_name\"],\n    hello_dict[\"eye_colour\"]))\n```\n\n![](img/3303e52de17b2e01ada468e51372cd68_13_0.png)\n\
    \n### Indentation in detail\n\nAs previously mentioned, the level of indentation\
    \ dictates which statement a block of code belongs to. Indentation is mandatory\
    \ in Python, whereas in other languages, sets of braces are used to organise code\
    \ blocks. For this reason, it is essential to use a consistent indentation style.\
    \ Four spaces are typically used to represent a single level of indentation in\
    \ Python. You can use tabs, but tabs are not well defined, especially if you open\
    \ a file in more than one editor.\n\n## Control structures\n\nIn programming,\
    \ a control structure is any kind of statement that can change the path that the\
    \ code execution takes. For example, a control structure that decided to end the\
    \ program if a number was less than 5 would look something like this:\n\n```\n\
    #!/usr/bin/env python2\nimport sys # Used for the sys.exit function\nint_condition\
    \ = 5\nif int_condition < 6:\n    sys.exit(\"int_condition must be >= 6\")\nelse:\n\
    \    print(\"int_condition was >= 6 - continuing\")\n```\n\nThe path that the\
    \ code takes will depend on the value of the integer int_condition. The code in\
    \ the 'if' block will only be executed if the condition is true. The import statement\
    \ is used to load the Python system library; the latter provides the exit function,\
    \ allowing you to exit the program, printing an error message. Notice that indentation\
    \ (in this case four spaces per indent) is used to indicate which statement a\
    \ block of code belongs to. 'If' statements are probably the most commonly used\
    \ control structures. Other control structures include 'for' loops and 'while'\
    \ loops.\n\n> \"The path the code takes will depend on the value of the integer\
    \ int_condition\""
  mdcn: "## Python 入门指南\n\n## 开始学习\n\n（作为哈希bang）后跟 Python 解释器的路径。程序加载器使用此行来确定后续各行应使用什么进行解释。如果你在\
    \ IDLE 等 IDE 中运行此程序，则不一定需要这样做。\n\nPython 解释器实际读取的代码只有一行。我们通过将值 Hello World 放在调用\
    \ print 函数后的括号内，将其传递给 print 函数。Hello World 用引号括起来，表示它是一个字面值，不应被解释为源代码。正如我们所料，Python\
    \ 中的 print 函数会将传递给它的任何值打印到控制台。\n\n你可以使用组合键 Ctrl+O，然后按 Enter，将刚才在 nano 中对文件所做的更改保存。使用\
    \ Ctrl+X 退出 nano。\n\n```\n#!/usr/bin/env python2\nprint(\"Hello World\")\n```\n\
    \n你可以通过在文件名前加上 ./ 来运行 Hello World 程序——在这种情况下，你需要输入：./hello_world.py。\n\n```\n\
    [liam@liam-laptop Python]$ ./hello_world.py\nHello World\n```\n\n## 变量和数据类型\n\n\
    变量是源代码中的一个名称，它与内存中的一个区域相关联，你可以用该区域存储数据，然后在整个代码中调用这些数据。数据可以是多种类型之一，包括：\n\n| 类型\
    \ | 描述 |\n|---|---|\n| 整数 | 存储整数 |\n| 浮点数 | 存储小数 |\n| 布尔值 | 可以是 True 或 False |\n\
    | 字符串 | 存储字符集合。\"Hello World\" 就是一个字符串 |\n\n> \"变量与内存中的一个区域相关联，你可以用该区域存储数据\"\n\
    \n![](img/3303e52de17b2e01ada468e51372cd68_10_0.png)\n\n> **提示**\n\n此时，值得解释的是，Python\
    \ 文件中任何跟在 # 字符后面的文本都会被解释器忽略。这样你就可以在代码中编写注释。\n\n除了这些主要数据类型外，还有序列类型（从技术上讲，字符串是一种序列类型，但由于其非常常用，我们将其归类为主要数据类型）：\n\
    \n| 类型 | 描述 |\n|---|---|\n| 列表 | 包含按特定顺序排列的数据集合 |\n| 元组 | 包含按特定顺序排列的不可变数据集合 |\n\
    \n元组可用于存储坐标之类的数据，其中包含作为单个变量存储的 x 和 y 值，而列表通常用于存储较大的集合。元组中存储的数据是不可变的，因为你无法更改元组中单个元素的值。但是，你可以在列表中这样做。\n\
    \n了解 Python 的字典类型也很有用。字典是一种映射数据类型。它以键值对的形式存储数据。这意味着你可以使用值对应的键来访问存储在字典中的值，这与使用列表的方式不同。在列表中，你会使用元素的索引（一个表示元素在列表中位置的数字）来访问列表的元素。\n\
    \n让我们编写一个程序来演示如何使用变量和不同的数据类型。此时值得注意的是，在 Python 中你并不总是必须指定数据类型。请随意在你喜欢的任何编辑器中创建此文件。只要你记得将文件设为可执行，一切都会正常工作。我们将我们的文件命名为\
    \ variables.py。\n\n## 解释型语言与编译型语言\n\n像 Python 这样的解释型语言，其源代码在每次程序运行时都会被转换为机器代码并执行。这与\
    \ C 等编译型语言不同，后者源代码只转换一次机器代码——生成的机器代码随后在每次程序运行时执行。\n\n## 完整代码清单\n\n以下行创建了一个名为 hello_int\
    \ 的整数变量，其值为 21。注意它不需要放在引号中\n\n```\n#!/usr/bin/env python2\n\n# 我们通过编写想要的变量名，后跟等号，再后跟要存储在变量中的值来创建变量。例如，以下行创建了一个名为\
    \ hello_str 的变量，包含字符串 Hello World。\nhello_str = \"Hello World\"\n\nhello_int =\
    \ 21\n\nhello_bool = True\n\nhello_tuple = (21, 32)\n\nhello_list = [\"Hello,\"\
    , \"this\", \"is\", \"a\", \"list\"]\n```\n\n布尔值的原理相同。\n\n我们以如下方式创建元组。\n\n以及以这种方式创建列表。\n\
    \n# 此列表现在包含 5 个字符串。注意这些字符串之间没有空格，因此如果要将它们连接成一个句子，你需要在每个元素之间添加一个空格。\n\n你也可以以如下方式创建相同的列表。\n\
    \n```\nhello_list = list()\nhello_list.append(\"Hello,\")\nhello_list.append(\"\
    this\")\nhello_list.append(\"is\")\nhello_list.append(\"a\")\nhello_list.append(\"\
    list\")\n```\n\n# 第一行创建一个空列表，后续行使用列表类型的 append 函数向列表中添加元素。当你处理预先知道的字符串时，这种使用列表的方式并不十分有用，但当你处理动态数据（如用户输入）时，它可能很有用。此列表将覆盖第一个列表，且不会有任何警告。\n\
    \n![](img/3303e52de17b2e01ada468e51372cd68_12_0.png)\n\n我们不妨顺便创建一个字典。注意我们如何对齐下面的冒号以使代码整洁。\n\
    \n```\nhello_dict = { \"first_name\" : \"Liam\",\n    \"last_name\" : \"Fraser\"\
    ,\n    \"eye_colour\" : \"Blue\" }\n```\n\n# 让我们访问集合中的一些元素。我们将从更改 hello_list 中最后一个字符串的值开始，并在末尾添加一个感叹号。\"\
    list\" 字符串是列表中的第 5 个元素。然而，Python 中的索引是从零开始的，这意味着第一个元素的索引为 0。\n\n注意，当我们打印该元素时，现在会有两个感叹号。\n\
    \n```\nprint(hello_list[4])\nhello_list[4] += \"!\"\n# 上面这行等同于\nhello_list[4]\
    \ = hello_list[4] + \"!\"\nprint(hello_list[4])\n```\n\n请记住，元组是不可变的，尽管我们可以像这样访问它们的元素。\n\
    \n```\nprint(str(hello_tuple[0]))\n# 我们不能像刚才对列表那样更改这些元素的值\n# 注意上面使用了 str 函数，在打印之前显式地将元组内的整数值转换为字符串。\n\
    ```\n\n让我们使用 hello_dict 中的数据创建一个句子。\n\n```\nprint(hello_dict[\"first_name\"] +\
    \ \" \" + hello_dict[\"last_name\"] + \" has \" + hello_dict[\"eye_colour\"] +\
    \ \" eyes.\")\n```\n\n更整洁的方法是使用 Python 的字符串格式化器。\n\n```\nprint(\"{0} {1} has {2}\
    \ eyes.\".format(hello_dict[\"first_name\"],\n    hello_dict[\"last_name\"],\n\
    \    hello_dict[\"eye_colour\"]))\n```\n\n![](img/3303e52de17b2e01ada468e51372cd68_13_0.png)\n\
    \n### 缩进详解\n\n如前所述，缩进级别决定了代码块属于哪个语句。在 Python 中缩进是强制性的，而在其他语言中，则使用花括号来组织代码块。因此，使用一致的缩进风格至关重要。在\
    \ Python 中，通常使用四个空格表示一个缩进级别。你可以使用制表符，但制表符定义不明确，尤其是在多个编辑器中打开文件时。\n\n## 控制结构\n\n\
    在编程中，控制结构是任何可以改变代码执行路径的语句。例如，一个控制结构如果决定在数字小于 5 时结束程序，它可能看起来像这样：\n\n```\n#!/usr/bin/env\
    \ python2\nimport sys # 用于 sys.exit 函数\nint_condition = 5\nif int_condition <\
    \ 6:\n    sys.exit(\"int_condition must be >= 6\")\nelse:\n    print(\"int_condition\
    \ was >= 6 - continuing\")\n```\n\n代码执行的路径将取决于整数 int_condition 的值。只有当条件为真时，'if'\
    \ 块中的代码才会执行。import 语句用于加载 Python 系统库；后者提供了 exit 函数，允许你退出程序并打印错误消息。注意缩进（在这种情况下每个缩进级别为四个空格）用于指示代码块属于哪个语句。'If'\
    \ 语句可能是最常用的控制结构。其他控制结构包括 'for' 循环和 'while' 循环。\n\n> \"代码执行的路径将取决于整数 int_condition\
    \ 的值\""
