  md: "# Create with Python\n\n# Build tic-tac-toe with Kivy\n\n# Our own widget:\
    \ tic-tac-toe\n\nSince Kivy doesn't have a tic-tac-toe widget, we'll have to make\
    \ our own! It's natural to create a new widget class to contain this behaviour:\n\
    \n```\nfrom kivy.uix.gridlayout import GridLayout\nclass TicTacToeGrid(GridLayout):\n\
    \    pass\n```\n\nNow this obviously doesn't do anything yet, except that it inherits\
    \ all the behaviour of the Kivy GridLayout widget - that is, we'll need to tell\
    \ it how many columns to have, but then it will automatically arrange any child\
    \ widgets to fit nicely with as many rows as necessary. Tic-tac-toe requires three\
    \ columns and nine children.\n\nHere we introduce the Kivy language (kv), a special\
    \ domain-specific language for making rules describing Kivy widget trees. It's\
    \ very simple but removes a lot of necessary boilerplate for manipulating the\
    \ GUI with Python code - as a loose analogy you might think of it as the HTML/CSS\
    \ to Python's JavaScript. Python gives us the dynamic power to do anything, but\
    \ all that power gets in the way if we just want to declare the basic structure\
    \ of our GUI. Note that you never need kv language, you can always do the same\
    \ thing in Python alone, but the rest of the example may show why Kivy programmers\
    \ usually like to use kv.\n\nKivy comes with all the tools needed to use kv language;\
    \ the simplest way is to write it in a file with a name based on our App class.\
    \ That is, we should place the following in a file named 'tictactoe.kv':\n\n```\n\
    <TicTacToeGrid>:\n    cols: 3\n```\n\nThis is the basic syntax of kv language;\
    \ for each widget type we may write a rule defining its behaviour, including setting\
    \ its properties and adding child widgets. This example demonstrates the former,\
    \ creating a rule for the 'TicTacToeGrid' widget by declaring that every 'TicTacToeGrid'\
    \ instantiated should have its 'cols' property set to 3.\n\nWe'll use some more\
    \ kv language features later, but for now let's go back to Python to create the\
    \ buttons that will be the entries in our tic-tac-toe grid.\n\n```\nfrom kivy.uix.button\
    \ import Button\nfrom kivy.properties import ListProperty\n```\n\n```\nclass GridEntry(Button):\n\
    \    coords = ListProperty([0, 0])\n```\n\nThis inherits from Kivy's 'Button'\
    \ widget, which interacts with mouse or touch input, dispatching events when interactions\
    \ toggle it. We can hook into these events to call our own functions when a user\
    \ presses the button, and can set the button's 'text' property to display the\
    \ 'X' or 'O'. We also created a new Kivy property for our widget, 'coords' - we'll\
    \ show how this is useful later on. It's almost identical to making a normal Python\
    \ attribute by writing 'self.coords = [0, 0]' in 'GridEntry.__init__'.\n\nAs with\
    \ the 'TicTacToeGrid', we'll style our new class with kv language, but this time\
    \ we get to see a more interesting feature.\n\n```\n<GridEntry>:\n    font_size:\
    \ self.height\n```\n\nAs before, this syntax defines a rule for how a 'GridEntry'\
    \ widget should be constructed, this time setting the 'font_size' property that\
    \ controls the size of the text in the button's label. The extra magic is that\
    \ kv language automatically detects that we've referenced the Button's own height\
    \ and will create a binding to update this relationship - when a 'GridEntry' widget's\
    \ height changes, its 'font_size' will change so the text fits perfectly. We could\
    \ have"
