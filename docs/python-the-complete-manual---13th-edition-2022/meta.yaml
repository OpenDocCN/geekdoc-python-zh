    # Build an app for Android with Python


    Master Kivy, the excellent cross-platform application framework to make your first
    Android app...


    ![](img/3303e52de17b2e01ada468e51372cd68_31_0.png)


    The great thing about Kivy is there are loads of directions we could take it in
    to do some pretty fancy things. But, we''re going to make a beeline for one of
    Kivy''s coolest features - the ability it affords you to easily run your programs
    on Android.


    We''ll approach this by first showing how to make a new app, this time a dynamic
    Breakout-style game. We''ll then be able to compile this straight to an Android
    APK that you can use just like any other.


    Of course, once you have mastered the basic techniques you aren''t limited to
    using any particular kind of app, as even on Android you can make use of all your
    favourite Python libraries


    to make any sort of program you like.


    Once you''ve mastered Kivy, your imagination is the only limit. If you''re pretty
    new to Kivy, don''t worry, we won''t assume that you have any pre-existing knowledge.
    As long as you have mastered some of the Python in this book so far, and have
    a fairly good understanding of the language, you shouldn''t have any problems
    following along with this.


    Before anything else, let''s throw together a basic Kivy app (Fig. 01). We''ve
    pre-imported the widget types we''ll be using, which this time are just three:
    the basic Widget with no special behaviour, the ModalView with


    a pop-up behaviour as used last time, and the FloatLayout as we will explain later.
    Kivy has many other pre-built widgets for creating GUIs, but this time we''re
    going to focus on drawing the whole GUI from scratch using Kivy''s graphics instructions.
    These comprise either vertex instructions to create shapes (including rectangles,
    lines, meshes, and so on) or contextual graphics changes (such as translation,
    rotation, scaling, etc), and are able to be drawn anywhere on your screen and
    on any widget type.


    Before we can do any of this we''ll need a class for each kind of game object,
    which we''re going to pre-populate with some of the properties that we''ll need
    later to control them. Remember from last time, Kivy properties are special attributes
    declared at class level, which (among other things) can be modified via kv language
    and dispatch events when they are modified. The Game class will be one big widget
    containing the entire game. We''ve specifically'
