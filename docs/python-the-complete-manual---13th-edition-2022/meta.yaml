- md: "## Writing a user interface using Python\n\nAdministrators are comfortable\
    \ with running raw scripts by hand, but end-users are not. So if you are writing\
    \ a script that is supposed to be used by common users, it is a good idea to create\
    \ a user-friendly interface on top of the script. This way end-users can run the\
    \ scripts just like any other application. To demonstrate this, we will create\
    \ a simple GRUB configuration tool which allows users to select default boot entry\
    \ and the timeout. We will be creating a TUI (text user interface) application\
    \ and will use the Python module 'snack' to facilitate this (not to be confused\
    \ with the Python audio library, tksnack).\n\nThis app consists of two files...\n\
    \n**grub.py**: GRUB Config File (grub.conf) Parser (available on FileSilo). It\
    \ implements two main functions, readBootDB() and writeBootFile(), which are responsible\
    \ for reading and writing the GRUB configuration file.\n\n**grub_tui.py**: Text\
    \ user interface file for manipulating the GRUB configuration file using the functions\
    \ available in grub.py.\n\n```python\n@code:grub_tui.py\nimport sys\nfrom snack\
    \ import *\n\nfrom grub import (readBootDB, writeBootFile)\n\ndef main(entry_value='1',\
    \ kernels=[]):\n    try:\n        (default_value, entry_value,\n         kernels)=readBootDB()\n\
    \    except:\n        print >> sys.stderr, (\"Error reading /boot/grub/grub.conf\"\
    )\n        sys.exit(10)\n\n    screen=SnackScreen()\n\n    while True:\n     \
    \   g=GridForm(screen, (\"Boot configuration\"),1,5)\n        if len(kernels)>0\
    \ :\n            li=Listbox(height=len(kernels), width=20,\n                 \
    \      returnExit=1)\n            for i, x in enumerate(kernels):\n          \
    \      li.append(x,i)\n            g.add(li, 0, 0)\n            li.setCurrent(default_value)\n\
    \n        bb = ButtonBar(screen, ((\"Ok\", \"ok\"),\n                        \
    \       (\"Cancel\", \"cancel\")))\n\n        e=Entry(3, str(entry_value))\n \
    \       l=Label((\"Timeout (in seconds):\"))\n        gg=Grid(2,1)\n        gg.setField(l,0,0)\n\
    \        gg.setField(e,1,0)\n\n        g.add(Label(''),0,1)\n        g.add(gg,0,2)\n\
    \        g.add(Label(''),0,3)\n        g.add(bb,0,4,growx=1)\n        result =\
    \ g.runOnce()\n        if bb.buttonPressed(result) == 'cancel':\n            screen.finish()\n\
    \            sys.exit(0)\n        else:\n            entry_value = e.value()\n\
    \            try :\n                c = int(entry_value)\n                break\n\
    \            except ValueError:\n                continue\n\n    writeBootFile(c,\
    \ li.current())\n    screen.finish()\n\nif __name__ == '__main__':\n    main()\n\
    ```\n\nStart the tool using the sudo command (as it reads the grub.conf file)\n\
    \n```\n$ sudo grub_tui.py\n```\n\n![](img/3303e52de17b2e01ada468e51372cd68_70_0.png)\n\
    \n## Work with Python\n\n### Scrape Wikipedia with Beautiful Soup\n\n### What\
    \ you'll need...\n\n**Beautiful Soup**\nwww.crummy.com/software/BeautifulSoup/\n\
    \n**HTML5Lib**\nhttps://github.com/html5lib/html5lib-python\n\n**Python 2.6+ &\
    \ WikiParser. zip Six**\nhttps://pypi.python.org/pypi/six/\n\n### Scrape Wikipedia\
    \ with Beautiful Soup\n\nUse the Beautiful Soup Python library to parse Wikipedia's\
    \ HTML and store it for offline reading\n\nIn this tutorial we'll use the popular\
    \ Python library Beautiful Soup to scrape Wikipedia for links to articles and\
    \ then save those pages for offline reading. This is ideal for when travelling\
    \ or in a location with a poor internet connection.\n\nThe plan is simple: using\
    \ Beautiful Soup with the HTML5Lib Parser, we're going to load a Wikipedia page,\
    \ remove all of the GUI and unrelated content, search the content for links to\
    \ other Wikipedia articles and then, after a tiny bit of modification, write them\
    \ to a file.\n\nEven though it's now the de facto knowledge base of the world,\
    \ Wikipedia isn't great when it comes to DOM consistency – that is, IDs and classes\
    \ are sometimes quite loose in their usage. Because of this, we will also cover\
    \ how to handle all of the excess bits and bobs of the Wikipedia GUI that we don't\
    \ need, as well as the various erroneous links that won't be of much use to us.\
    \ You can find the CSS stylings sheet and a Python script pertaining to this tutorial\
    \ at http://bit.ly/19MlbBv.\n\n### Infinite Links\n\nWikipedia has a lot of links\
    \ and when you start following links to links to links, the number of pages you\
    \ have to parse can grow exponentially, depending on the subject matter. By passing\
    \ through the levels value, we put a cap on the amount of pages we can grab –\
    \ although the number of files stored can still vary greatly. Use it wisely.\n\
    \n### Install Beautiful Soup & HTML5Lib\n\n**01** Before we can start writing\
    \ code, we need to install the libraries we'll be using for the program (Beautiful\
    \ Soup, HTML5Lib, Six). The installation process is fairly standard: grab the\
    \ libraries from their respective links, then unzip them. In the terminal, enter\
    \ the unzipped directory and run python setup.py install for each library. They\
    \ will now be ready for use.\n\n> “Wikipedia isn't great when it comes to DOM\
    \ consistency”\n\n### Scrape Wikipedia with Beautiful Soup\n\n### Work with Python\n\
    \n### Full code listing\n\n1 Import libraries\nThese are the libraries we are\
    \ going to be using for this program\n\n```python\nimport os, sys, urllib2, argparse,\
    \ datetime, atexit\nfrom bs4 import BeautifulSoup\n```\n\n```python\naddresses\
    \ = []\ndeepestAddresses = []\n\nmaxLevel = 1\nstoreFolder = \"Wikistore \" +\
    \ str(datetime.datetime.now().strftime(\"%Y-%m-%d %H:%M\"))\n\nundesirables =\
    \ [ {\"element\" : \"table\", \"attr\" : {\"class\" : \"infobox\"} }, {\"element\"\
    \ : \"table\", \"attr\" : {\"class\" : \"vertical-navbox\"}}, {\"element\" : \"\
    span\", \"attr\" : {\"class\" : \"mw-editsection\"}}, {\"element\" : \"div\",\
