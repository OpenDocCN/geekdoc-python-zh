- md: "## Use Python with Pi\n\n## Use Python to code new creations in Minecraft\n\
    \n## Print the total number of devices found\n\n**04** Now, by using **setBlock()**\
    \ and **getPos()** commands we can place blocks into the world relative to our\
    \ player's position. Try adding the following two lines to your **helloworld**\
    \ script:\n\n```\nplayerPos = mc.player.getPos()\nmc.setBlock(playerPos.x,playerPos.y-1,playerPos.z,DIAMOND_ORE)\n\
    ```\n\nThen run /python helloworld again in Minecraft. You'll see the chat message\
    \ again, but this time if you look down to the ground below your player character,\
    \ you'll see a diamond block has also been placed at your feet. You can try replacing\
    \ **DIAMOND_ORE** with any other Minecraft block ID (i.e. DIRT/GRASS).\n\n> “If\
    \ you look down to the ground below your player character, you’ll see a diamond\
    \ block has been placed at your feet”\n\n![](img/3303e52de17b2e01ada468e51372cd68_107_0.png)\n\
    \n## Use Python to code new creations in Minecraft\n\n## Use Python with Pi\n\n\
    ![](img/3303e52de17b2e01ada468e51372cd68_108_0.png)\n\n## Common errors\n\n**06**\
    \ If you get a 'Script not found' error, this probably means that you don't have\
    \ the mod scripts installed in your Minecraft directory. Check that you've replaced\
    \ **.minecraft** with the one from McPiFoMo.\n\nIf you receive a 'Cannot run program\
    \ \"python\"' error, your game cannot locate Python. Ensure you've got the latest\
    \ version of Python installed, and that it's installed in Path. In the Bash shell\
    \ type export PATH=\"$PATH:/usr/local/bin/python\" to check.\n\nShould you come\
    \ into any problems with memory leakage or infinite loops, you can stop a script\
    \ that's running by just typing **/python**.\n\n## Mmm, doughnuts\n\n**05** One\
    \ of the pre-fab scripts that you will find in the MCPiPy collection is the doughnut:\n\
    \n```\npython\nfrom mc import *\n\ndef draw_donut(mcx,mcy,mcz,R,r,mcblock):\n\
    \    for x in range(-R-r,R+r):\n        for y in range(-R-r,R+r):\n          \
    \  xy_dist = sqrt(x**2 + y**2)\n            if (xy_dist > 0):\n              \
    \  ringx = x / xy_dist * R # nearest point on major ring\n                ringy\
    \ = y / xy_dist * R\n                ring_dist_sq = (x-ringx)**2 + (y-ringy)**2\n\
    \n    for z in range(-R-r,R+r):\n        if (ring_dist_sq + z**2 <= r**2):\n \
    \           mc.setBlock(mcx+x, mcy+z, mcz+y, mcblock)\n\nmc = Minecraft()\n\n\
    playerPos = mc.player.getPos()\n\ndraw_donut(playerPos.x, playerPos.y + 9, playerPos.z,\
    \ 18, 9, GLASS)\nmc.postToChat(\"Glass donut done\")\ndraw_donut(playerPos.x,\
    \ playerPos.y + 9, playerPos.z, 18, 6, WATER_STATIONARY)\nmc.postToChat(\"Water\
    \ donut done\")\n```\n\nBy changing the block ID from WATER_STATIONARY you can\
    \ fill the doughnut with any object type. Try filling the glass with lava. Then\
    \ try changing outer shell from glass to TNT.\n\n> **Cannot find script**\n\n\
    If you see red text stating 'Cannot find script', check the name and location\
    \ of your PY file. All of your Python scripts should be in ~/.minecraft/mcpi.py,\
    \ for Python and Minecraft to be able to locate them. You don't need to append\
    \ 'py' to the end of your run command, just be sure you're using the exact name\
    \ of your Python script file. /python doughnut.py will work just as well as /python\
    \ doughnut.py, so long as doughnut.py is stored in ~/.minecraft/mcpi.py. If you\
    \ can't see this directory, remember to un-hide your files (CTRL+H).\n\n## Handle\
    \ multiple tasks\n\nYour Pi project may need to deal with more than one thing\
    \ at a time. Learn how to handle multiple tasks\n\nIn this tutorial, we will look\
    \ at how to use the multitasking capabilities within Python to manage multiple\
    \ tasks. In the standard library, there are three main modules that are available.\
    \ They are threading, multiprocessing and concurrent. Each has its own strengths\
    \ and weaknesses. Since these are all part of the standard library, there should\
    \ not be anything extra that you will need to install.\n\nFirst, we will look\
    \ at the threading module. There are two ways that you can use this module. The\
    \ first is to use it to create new thread objects that can be told to run some\
    \ target function within your program. The following is a simple example:\n\n\
    ```\nimport threading\ndef my_func():\n    print(\"Hello World\")\nmy_thread =\
    \ threading.Thread(target=my_func)\nmy_thread.start()\n```\n\nAssuming that your\
    \ tasks can be partitioned into separate functions, you can create a thread for\
    \ each of these functions. One thing to be aware of is that these new threads\
    \ will not start executing the function code until you call the start method.\
    \ At that point, the target function will start running asynchronously in the\
    \ background. You can check to see whether or not a given thread is done by using\
    \ code like that below:\n\n```\nif my_thread.is_alive():\n    print('This thread\
    \ is still running')\n```\n\nAt some point in the main body of your program, you\
    \ are going to want to use the results from the functions running in these threads.\
    \ When this happens you can use the join() method of the thread object. This halts\
    \ the main core of your program and forces it to wait until the thread exits.\
    \ The thread exits by default when the running function exits.\n\nBut, how do\
    \ you write code that uses threads well? The first item to consider is whether\
    \ you will be using data that is globally available or whether you are using data\
    \ that should only be visible within the current thread. If you do need local\
    \ only data, you can create a local object that can store these values. The following\
    \ code stores a string with your author's name in it:\n\n```\nmydata = threading.local()\n\
    mydata.myname = 'Joey Bernard'\n```\n\nThis would be code used within the function\
    \ being run by a thread. If you need to use global data, you need to consider\
    \ how different threads may try to use this global data. If everyone is reading\
    \ from a given variable, you won't run into any issues. The problem arises when\
    \ you have multiple threads that may try to write a given variable. In this case\
    \ you'll end up with a situation known as a race condition, where one thread may\
    \ overwrite the data from another. In these cases, you will need to use lock objects\
    \ to manage access to these global variables. A basic example would look like:\n\
    \n```\nmylock = threading.Lock()\ncounter = 0\ndef func1():\n    mylock.acquire()\n\
    \    counter = counter + 1\n    mylock.release()\n```\n\nAs you can see, you create\
    \ the lock object in the main body of your program. Then, within the function\
    \ code, you try to acquire the lock. If it is free, you get access to it and it\
    \ is locked. If the lock object has already been locked by another thread, then\
    \ this call to acquire blocks and waits until the lock has been released. This\
    \ is why you need to be really careful to always have a release statement for\
    \ every acquire statement. Otherwise, you'll have a bug that will be almost impossible\
    \ to find after the fact. This also introduces a bottleneck to your program, so\
    \ you want to make sure that whatever code exists between the acquire and lock\
    \ is the bare minimum required to do the necessary work. This is the simplest\
    \ form of locking mechanism available in Python. If your needs are greater, you\
    \ can look at some of the other options to see if they might offer better control\
    \ access. Along with controlling access to global data, you may need to communicate\
    \ directly between threads. This can be handled through an event object, which\
    \ can be used to set a flag to true or false and make that visible to other threads.\
    \ As an example, the code below shows how to set and use such a flag:\n\n```\n\
    event1 = threading.Event()\ndef func1():\n    ....\n    event1.set()\n    ....\n\
    def func2():\n    ....\n    if event1.set():\n        print('I got a flag from\
    \ func1')\n    ....\n```\n\nSometimes, the only communication you need is to know\
    \ when all of the threads have completed some stage of their work. Say, you multiple\
    \ threads loading data files and you need to wait until everyone is done before\
    \ moving on to the next stage. In this case, you can do so with barrier objects.\
    \ Below, you can see how you could add a barrier to the two threads (above):\n\
    \n```\nbarrier1 = threading.Barrier(2)\ndef func1():\n    ....\n    barrier1.wait()\n\
    \    ....\ndef func2():\n    ....\n    barrier1.wait()\n    ....\n```\n\nIn the\
    \ above code, you need to set how many threads will take part in the barrier object\
    \ when you create it. Then, when threads use it and call the wait method, they\
    \ will block until all of the threads call the wait method. The threading module\
    \ is a light, fast and easy method to add the ability divide up the processing\
    \ within your code, but it does suffer from one major issue. Within the Python\
    \ core engine, there is a structure"
  mdcn: "## 在树莓派上使用 Python\n\n## 使用 Python 在 Minecraft 中编码创作新内容\n\n## 打印找到的设备总数\n\n\
    **04** 现在，通过使用 **setBlock()** 和 **getPos()** 命令，我们可以相对于玩家的位置在世界中放置方块。尝试将以下两行添加到你的\
    \ **helloworld** 脚本中：\n\n```\nplayerPos = mc.player.getPos()\nmc.setBlock(playerPos.x,playerPos.y-1,playerPos.z,DIAMOND_ORE)\n\
    ```\n\n然后在 Minecraft 中再次运行 /python helloworld。你会再次看到聊天消息，但这次如果你向下看玩家角色下方的地面，你会看到一个钻石方块也被放置在你的脚下。你可以尝试将\
    \ **DIAMOND_ORE** 替换为任何其他 Minecraft 方块 ID（例如 DIRT/GRASS）。\n\n> “如果你向下看玩家角色下方的地面，你会看到一个钻石方块被放置在你的脚下”\n\
    \n![](img/3303e52de17b2e01ada468e51372cd68_107_0.png)\n\n## 使用 Python 在 Minecraft\
    \ 中编码创作新内容\n\n## 在树莓派上使用 Python\n\n![](img/3303e52de17b2e01ada468e51372cd68_108_0.png)\n\
    \n## 常见错误\n\n**06** 如果你收到“找不到脚本”的错误，这可能意味着你的 Minecraft 目录中没有安装 mod 脚本。检查你是否已用\
    \ McPiFoMo 中的文件替换了 **.minecraft**。\n\n如果你收到“无法运行程序 'python'”的错误，你的游戏无法定位 Python。确保你已安装最新版本的\
    \ Python，并且它已安装在 Path 中。在 Bash shell 中输入 export PATH=\"$PATH:/usr/local/bin/python\"\
    \ 来检查。\n\n如果你遇到内存泄漏或无限循环的问题，只需输入 **/python** 即可停止正在运行的脚本。\n\n## 嗯，甜甜圈\n\n**05**\
    \ 你将在 MCPiPy 集合中找到的预制脚本之一是甜甜圈：\n\n```\npython\nfrom mc import *\n\ndef draw_donut(mcx,mcy,mcz,R,r,mcblock):\n\
    \    for x in range(-R-r,R+r):\n        for y in range(-R-r,R+r):\n          \
    \  xy_dist = sqrt(x**2 + y**2)\n            if (xy_dist > 0):\n              \
    \  ringx = x / xy_dist * R # nearest point on major ring\n                ringy\
    \ = y / xy_dist * R\n                ring_dist_sq = (x-ringx)**2 + (y-ringy)**2\n\
    \n    for z in range(-R-r,R+r):\n        if (ring_dist_sq + z**2 <= r**2):\n \
    \           mc.setBlock(mcx+x, mcy+z, mcz+y, mcblock)\n\nmc = Minecraft()\n\n\
    playerPos = mc.player.getPos()\n\ndraw_donut(playerPos.x, playerPos.y + 9, playerPos.z,\
    \ 18, 9, GLASS)\nmc.postToChat(\"Glass donut done\")\ndraw_donut(playerPos.x,\
    \ playerPos.y + 9, playerPos.z, 18, 6, WATER_STATIONARY)\nmc.postToChat(\"Water\
    \ donut done\")\n```\n\n通过更改 WATER_STATIONARY 的方块 ID，你可以用任何对象类型填充甜甜圈。尝试用岩浆填充玻璃。然后尝试将外壳从玻璃改为\
    \ TNT。\n\n> **找不到脚本**\n\n如果你看到红色文本显示“找不到脚本”，请检查你的 PY 文件的名称和位置。你所有的 Python 脚本都应位于\
    \ ~/.minecraft/mcpi.py，以便 Python 和 Minecraft 能够找到它们。你不需要在运行命令末尾附加“py”，只需确保使用 Python\
    \ 脚本文件的确切名称。/python doughnut.py 和 /python doughnut.py 一样有效，只要 doughnut.py 存储在\
    \ ~/.minecraft/mcpi.py 中。如果你看不到此目录，请记住取消隐藏文件（CTRL+H）。\n\n## 处理多个任务\n\n你的树莓派项目可能需要同时处理多件事情。学习如何处理多个任务\n\
    \n在本教程中，我们将探讨如何使用 Python 中的多任务功能来管理多个任务。在标准库中，有三个主要模块可用。它们是 threading、multiprocessing\
    \ 和 concurrent。每个都有其自身的优点和缺点。由于这些都是标准库的一部分，因此你不需要安装任何额外的东西。\n\n首先，我们将看看 threading\
    \ 模块。你可以使用此模块的两种方式。第一种是使用它来创建新的线程对象，这些对象可以被告知在你的程序中运行某个目标函数。以下是一个简单的例子：\n\n```\n\
    import threading\ndef my_func():\n    print(\"Hello World\")\nmy_thread = threading.Thread(target=my_func)\n\
    my_thread.start()\n```\n\n假设你的任务可以划分为单独的函数，你可以为每个函数创建一个线程。需要注意的一点是，这些新线程在你调用 start\
    \ 方法之前不会开始执行函数代码。在那时，目标函数将开始在后台异步运行。你可以使用如下代码来检查给定线程是否完成：\n\n```\nif my_thread.is_alive():\n\
    \    print('This thread is still running')\n```\n\n在你的程序主体中的某个时刻，你将希望使用在这些线程中运行的函数的结果。当这种情况发生时，你可以使用线程对象的\
    \ join() 方法。这会暂停你的程序核心并强制它等待直到线程退出。线程在运行函数退出时默认退出。\n\n但是，如何编写使用线程的好代码呢？首先要考虑的是你将使用全局可用的数据，还是使用仅应在当前线程内可见的数据。如果你确实需要仅本地数据，你可以创建一个可以存储这些值的本地对象。以下代码存储一个包含作者姓名的字符串：\n\
    \n```\nmydata = threading.local()\nmydata.myname = 'Joey Bernard'\n```\n\n这将是在线程运行的函数内使用的代码。如果你需要使用全局数据，你需要考虑不同的线程可能如何尝试使用此全局数据。如果每个人都从给定变量读取，你不会遇到任何问题。问题出现在你有多个线程可能尝试写入给定变量时。在这种情况下，你最终会遇到一种称为竞态条件的情况，其中一个线程可能会覆盖另一个线程的数据。在这些情况下，你需要使用锁对象来管理对这些全局变量的访问。一个基本示例如下所示：\n\
    \n```\nmylock = threading.Lock()\ncounter = 0\ndef func1():\n    mylock.acquire()\n\
    \    counter = counter + 1\n    mylock.release()\n```\n\n如你所见，你在程序主体中创建锁对象。然后，在函数代码中，你尝试获取锁。如果锁是空闲的，你获得访问权并将其锁定。如果锁对象已被另一个线程锁定，那么对\
    \ acquire 的调用将阻塞并等待直到锁被释放。这就是为什么你需要非常小心，始终为每个 acquire 语句都有一个 release 语句。否则，你将有一个几乎不可能在事后找到的错误。这也为你的程序引入了一个瓶颈，因此你要确保\
    \ acquire 和 lock 之间的任何代码都是完成必要工作所需的最低限度。这是 Python 中可用的最简单的锁定机制形式。如果你的需求更大，你可以查看其他选项，看看它们是否可能提供更好的访问控制。除了控制对全局数据的访问外，你可能还需要在线程之间直接通信。这可以通过事件对象来处理，该对象可用于将标志设置为\
    \ true 或 false，并使其对其他线程可见。例如，下面的代码展示了如何设置和使用这样的标志：\n\n```\nevent1 = threading.Event()\n\
    def func1():\n    ....\n    event1.set()\n    ....\ndef func2():\n    ....\n \
    \   if event1.set():\n        print('I got a flag from func1')\n    ....\n```\n\
    \n有时，你唯一需要的通信是知道所有线程何时完成了它们工作的某个阶段。假设你有多个线程加载数据文件，你需要等待每个人都完成才能进入下一阶段。在这种情况下，你可以使用屏障对象来实现。下面，你可以看到如何为两个线程（上面）添加屏障：\n\
    \n```\nbarrier1 = threading.Barrier(2)\ndef func1():\n    ....\n    barrier1.wait()\n\
    \    ....\ndef func2():\n    ....\n    barrier1.wait()\n    ....\n```\n\n在上面的代码中，你需要在创建屏障对象时设置有多少线程将参与其中。然后，当线程使用它并调用\
    \ wait 方法时，它们将阻塞直到所有线程都调用 wait 方法。threading 模块是一种轻量、快速且简单的方法，可以为你的代码添加划分处理的能力，但它确实存在一个主要问题。在\
    \ Python 核心引擎内部，有一个结构"
