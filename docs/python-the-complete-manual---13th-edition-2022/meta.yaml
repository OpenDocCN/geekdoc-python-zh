    ## Replace your shell with Python


    Python is a great programming language, but did you know it can even replace your
    primary shell?


    We all use shell on a daily basis. For most of us, shell is the gateway into our
    Linux system. For years and even today, Bash has been the default shell for Linux.
    But it is getting a bit long in the tooth.


    No need to be offended: we still believe Bash is the best shell out there when
    compared to some other UNIX shells such as Korn Shell (KSH), C Shell (CSH) or
    even TCSH.


    This tutorial is not about Bash being incapable, but it is about how to breathe
    completely new life into the shell to do old things conveniently and new things
    which were previously not possible, even by a long shot. So, without further delay,
    let''s jump in.


    While the Python programming language may require you to write longer commands
    to accomplish a task (due to the way Python''s modules are organised), this is
    not something to be particularly concerned about. You can easily write aliases
    to the equivalent of the Bash command that you intend to replace. Most of the
    time there will be more than one way to do a thing, but you will need to decide
    which way works best for you.


    Python provides support for executing system commands directly (via the os or
    subprocess module), but where possible we will focus on Python-native implementations
    here, as this allows us to develop portable code.


    ### SECTION 1: Completing basic shell tasks in Python


    ### 1. File management


    The Python module shutil provides support for file and directory operations. It
    provides support for file attributes, directory copying, archiving etc. Let''s
    look at some of its important functions.


    ```

    shutil module

    ```


    ## Replace your shell with Python


    ## Work with Python


    **copy (src,dst)**: Copy the src file to the destination directory. In this mode
    permissions bits are copied but metadata is not copied.


    **copy2 (src,dst)**: Same as copy() but also copies the metadata.


    **copytree(src, dst[, symlinks=False[, ignore=None]])**: This is similar to ''cp
    -r'', it allows you to copy an entire directory.


    **ignore_patterns (*patterns)**: ignore_patterns is an interesting function that
    can be used as a callable for copytree(), it allows you to ignore files and directories
    specified by the glob-style patterns.


    **rmtree(path[, ignore_errors[, onerror]])**: rmtree() is used to delete an entire
    directory.


    **move(src,dst)**: Similar to mv command it allows you to recursively move a file
    or directory to a new location.


    Example:


    ```

    from shutil import copytree, ignore_patterns

    copytree(source, destination, ignore=ignore_patterns(''*.pyc'', ''tmp*''))

    ```


    **make_archive(base_name, format[, root_dir[, base_dir[, verbose[, dry_run[, owner[,
    group[, logger]]]]]]])**: Think of this as a replacement for tar, zip, bzip etc.
    make_archive() creates an archive file in the given format such as zip, bztar,
    tar , gztar. Archive support can be extended via Python modules.


    Example:


    ```

    from shutil import make_archive

    import os

    archive_name = os.path.expanduser(os.path.join(''~'', ''ludarchive''))

    root_dir = os.path.expanduser(os.path.join(''~'', ''.ssh''))

    make_archive(archive_name, ''gztar'', root_dir)

    ```


    ''/Users/kunal/ludarchive.tar.gz''


    ### 2. Interfacing operating system & subprocesses


    Python provides two modules to interface with the OS and to manage processes,
    called os and subprocess. These modules let you interact with the core operating
    system shell, and work with the environment, processes, users and file descriptors.
    The subprocess module was introduced to support better management of subprocesses
    (parallel in Python and is aimed to replace os.system, os.spawn*, os.popen, popen2.*
    and commands.* modules.


