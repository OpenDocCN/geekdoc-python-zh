    ## Work with Python


    Put the powerful programming language to work


    With a more solid understanding of Python, you can really begin to make it work
    for you. It is a highly functional and versatile language, and in this section,
    we''ll show you how to use this versatility in your own projects. First, we''ll
    show you how to ditch the primary shell and replace it using Python (p.50), then
    look at how NumPy can help with scientific computing (p.58). We''ll also look
    at how Python can help with system administration (p.64), and how you can use
    it with Beautiful Soup to read Wikipedia offline (p.72). Get ready to use Python
    to its full potential.


