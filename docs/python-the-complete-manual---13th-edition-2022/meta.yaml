  md: "# Build tic-tac-toe with Kivy\n\n# Create with Python\n\nThis is a pop-up widget\
    \ that draws itself on top of everything else rather than as part of the normal\
    \ widget tree. It also automatically closes when the user clicks or taps outside\
    \ it.\n\n![](img/3303e52de17b2e01ada468e51372cd68_84_0.png)\n\n```\nwinner = None\n\
    if -3 in sums:\n    winner = 'Xs win!'\nelif 3 in sums:\n    winner = 'Os win!'\n\
    elif 0 not in self.status:\n    winner = 'Draw...nobody wins!'\n\nif winner:\n\
    \    popup = ModalView(size_hint=(0.75, 0.5))\n    victory_label = Label(text=winner,\n\
    \                          font_size=50)\n    popup.add_widget(victory_label)\n\
    \    popup.bind(on_dismiss=self.reset)\n    popup.open()\n```\n\nAbove A tic-tac-toe\
    \ grid now accepting input, adding in an O or X alternately, each go\n\nThis mostly\
    \ uses the same ideas we already covered, adding the 'Label' widget to the 'ModalView'\
    \ then letting the 'ModalView' take care of drawing itself and its children on\
    \ top of everything else. We also use another binding; this time to 'on_dismiss',\
    \ which is an event dispatched by the 'ModalView' when it is closed. Finally,\
    \ we made use of the 'size_hint' property common to all widgets, which in this\
    \ case is used to set the 'ModalView' size proportional to the window – while\
    \ a 'ModalView' is open you can resize the window to see it dynamically resize,\
    \ always maintaining these proportions. This is another trick made possible by\
    \ a binding with the 'size_hint' Kivy property, this time managed internally by\
    \ Kivy.\n\nThat's it, a finished program! We can now not only play tic-tac-toe,\
    \ but our program automatically tells us when somebody has won, and resets the\
    \ board so we can play again. Simply run your program and enjoy hours of fun!\n\
    \n# Time to experiment\n\nThis has been a quick tour through some of Kivy's features,\
    \ but hopefully it demonstrates how to think about building a Kivy application.\
    \ Our programs are built from individual Kivy widgets, interacting by having Python\
    \ code run when their properties change (eg our 'on_status' method) or when they\
    \ dispatch events (eg 'Button' 'on_release'). We also briefly saw kv language\
    \ and experienced how it can automatically create bindings between properties.\n\
    \nYou can find a copy of the full program on FileSilo, reference this to check\
    \ you've followed everything correctly. We've also added an extra widget, the\
    \ 'Interface', with a structure coded entirely in kv language that demonstrates\
    \ how to add child widgets. Test it by uncommenting the 'return Interface()' line\
    \ in 'TicTacToeGrid.build()'. It doesn't do anything fundamentally different to\
    \ what we already covered, but it does make extensive use of kv language's binding\
    \ ability to automatically update a label showing the current player, and to resize\
    \ the TicTacToeGrid so it is always square to fit within its parent. You can play\
    \ with the settings to see how it fits together, or try swapping out the different\
    \ widget types to see how other widgets behave."
