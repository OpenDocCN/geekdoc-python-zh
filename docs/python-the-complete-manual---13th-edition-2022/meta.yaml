    \ Juice/Pi API.\n\n## Use Python to code new creations in Minecraft\n\n## Use\
    \ Python with Pi\n\n![](img/3303e52de17b2e01ada468e51372cd68_106_0.png)\n\n###\
    \ Replace your .minecraft directory\n\n**01** Backup .minecraft in your home directory.\
    \ If you're using a GUI, you may need to press CTRL+H to view the hidden directories.\
    \ In terminal `mv ~/.minecraft ~/.minecraft-backup` should suffice.\n\nRight:\
    \ Backup your original .minecraft dir and copy over the modded install from McPiFoMo\n\
    Below: You'll need to run Minecraft 1.8 with the pre-installed Forge profile\n\
    \n### Launch Minecraft in Forge mode\n\n**02** Launch Minecraft as you normally\
    \ would, but after logging in, select the Forge profile. This should load Minecraft\
    \ 1.8 with Forge 11.14. You can play around with the latest version of Minecraft\
    \ and download and install an updated Forge if you wish, but these are the versions\
    \ we've found most compatible with Raspberry Jam. You'll know you're running the\
    \ correct profile when you see the version numbers in the bottom left corner of\
    \ the window. Create a new super flat world in singleplayer creative mode and\
    \ you're ready to begin coding.\n\n![](img/3303e52de17b2e01ada468e51372cd68_106_1.png)\n\
    \n![](img/3303e52de17b2e01ada468e51372cd68_106_2.png)\n\n### Hello World – Implement\
    \ chat commands\n\n**03** Using your favourite text editor, you'll need to create\
    \ a new `helloworld.py` file and save it in `~/.minecraft/mcpipy` directory:\n\
    \n```python\nfrom mc import *\nmc = Minecraft()\nmc.postToChat(\"Hello world!\"\
    )\n```\n\nReturn to Minecraft and type `/python helloworld`\nMinecraft will now\
    \ run your python script, which should result in a chat command saying Hello world!"
