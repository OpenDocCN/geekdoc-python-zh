  md: '# Use Python with Pi


    # Create a Pi-powered virtual reality setup


    # Install software – part 1


    # Copy over the configuration files – part 1


    05 The Python-VRzero is available from the GitHub website and is easy downloaded
    using the git clone command, line one. Type this into your LXTerminal. Then move
    to the python-vrzero folder (line two) and install the program (line three).


    07 To interact with the Oculus Rift''s rotation sensor and the Xbox 360 controller,
    you''ll need to copy over the configuration files. This enables you to orientate
    and look around the environments. As you turn your head to the left the VR environment
    will adjust as if you are looking to the left. Type both of the lines below into
    the LXTerminal and press Enter after each line:


    ```

    sudo git clone https://github.com/WayneKeenan/python-vrzero

    cd python-vrzero

    sudo python3 setup.py install

    ```


    ```

    sudo cp config/83-hmd.rules /etc/udev/rules.d/

    sudo cp config/xboxdrv.init /etc/init.d/xboxdrv

    ```


    # Install software – part 2


    # Copy over the configuration files – part 2


    06 Once the installation completes, select and install the OpenHMD (line one)
    which enables the data from the Oculus Rift sensors to be read and worked with.
    Type line one into the LXTerminal and press Enter, then line two to install the
    required module. Enter line three and press Enter to link together all the required
    libraries:


    08 The Xbox 360 controller setup requires an additional command line to copy the
    default configuration file to the folder which contains the Xbox Drivers. This
    file contains all the mapping for the buttons, paddles and joysticks. Type in
    the line as shown below and press Enter:


    ```

    sudo dpkg -i install/openhmd_0.8.1-1_armhf.deb

    sudo apt-get install -f

    sudo ldconfig

    ```


    ```

    sudo cp config/83-hmd.rules /etc/udev/rules.d/

    sudo cp config/xboxdrv.init /etc/init.d/xboxdrv

    ```


    # Rift Development Kit 1


    09 If you do not have an Oculus Rift kit you can still use a HDMI monitor to display
    the output. Move to Step 11. If you own or have access to the Oculus Rift Development
    kit, you will need to copy over the configuration file into the config.txt file.
    This file contains the configuration settings for the operating system which are
    loaded when you Raspberry Pi boots up. Type the line below into the LXTerminal
    and press Enter.


    ```

    sudo cp config/config_DK1.txt /boot/config.txt

    ```


    ![](img/3303e52de17b2e01ada468e51372cd68_115_0.png)'
