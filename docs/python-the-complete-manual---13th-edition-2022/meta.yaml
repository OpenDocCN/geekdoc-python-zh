    Python provides quick and easy way to build applications, including web apps.
    Find out how to use it to build a feature-complete web app


    Python is known for its simplicity and capabilities. At this point it is so advanced
    that there is nothing you cannot do with Python, and conquering the web is one
    of the possibilities. When you are using Python for web development you get access
    to a huge catalogue of modules and community support – make the most of them.


    Web development in Python can be done in many different ways, right from using
    the plain old CGI modules to utilising fully groomed web frameworks. Using the
    latter is the most popular method of building web applications with Python, since
    it allows you to build applications without worrying about all that low-level
    implementation stuff. There are many web frameworks available for Python, such
    as Django, TurboGears and Web2Py. For this tutorial we will be using our current
    preferred option, Django.


