- md: "## Create with Python\n\n## Pivaders part 2: graphics and sound\n\n### Loading\
    \ the sprite sheet\n\n07 Since we're inheriting from the Sprite class to create\
    \ our Player class, we can easily alter how the player looks on screen by changing\
    \ Player.image. First, we need to load our ship sprite sheet with pygame.image.load().\
    \ Since we made our sheet with a transparent background, we can append .convert_alpha()\
    \ to the end of the line so the ship frames render correctly (without any background).\
    \ We then use subsurface to set the initial Player.image to the middle ship sprite\
    \ on the sheet. This is set by self.ani_pos, which has an initial value of 5.\
    \ Changing this value will alter the ship image drawn to the screen: '0' would\
    \ draw it leaning fully left, '11' fully to the right.\n\n### Animation flags\n\
    \n08 Slightly further down the list in the initialising code for the Game class,\
    \ we also set two flags for our player animation: self.animate_left and self.animate_right.\
    \ As you'll see in the Control method of our Game class, we use these to 'flag'\
    \ when we want animations to happen with True and False. It also allows us to\
    \ 'automatically' animate the player sprite back to its natural resting state\
    \ (otherwise the ship will continue to look as if it's flying left when it has\
    \ stopped).\n\n### The animation method\n\n09 We use flags again in the code for\
    \ the player: animate_player(). Here we use nested if statements to control the\
    \ animation and physically set the player image. It states that if the animate_right\
    \ flag is True and if the current animation position is different to what we want,\
    \ we incrementally increase the ani_pos variable and set the player's image. The\
    \ Else statement then animates the ship sprite back to its resting state and the\
    \ same logic is then applied in the opposite direction.\n\n```\nGameState.end_game\
    \ = False\nGameState.start_screen = True\nGameState.vector = 0\nGameState.shoot_bullet\
    \ = False\n\ndef control(self):\n    for event in pygame.event.get():\n      \
    \  if event.type == pygame.QUIT:\n            GameState.start_screen = False\n\
    \            GameState.end_game = True\n        if event.type == pygame.KEYDOWN\
    \ \\\n        and event.key == pygame.K_ESCAPE:\n            if GameState.start_screen:\n\
    \                GameState.start_screen = False\n                GameState.end_game\
    \ = True\n                self.kill_all()\n            else:\n               \
    \ GameState.start_screen = True\n    self.keys = pygame.key.get_pressed()\n  \
    \  if self.keys[pygame.K_LEFT]:\n        GameState.vector = -1\n        self.animate_left\
    \ = True\n        self.animate_right = False\n    elif self.keys[pygame.K_RIGHT]:\n\
    \        GameState.vector = 1\n        self.animate_right = True\n        self.animate_left\
    \ = False\n    else:\n        GameState.vector = 0\n        self.animate_right\
    \ = False\n        self.animate_left = False\n\n    if self.keys[pygame.K_SPACE]:\n\
    \        if GameState.start_screen:\n            GameState.start_screen = False\n\
    \            self.lives = 2\n            self.score = 0\n            self.make_player()\n\
    \            self.make_defenses()\n            self.alien_wave(0)\n        else:\n\
    \            GameState.shoot_bullet = True\n            self.bullet_fx.play()\n\
    \ndef animate_player(self):\n    if self.animate_right:\n        if self.ani_pos\
    \ < 10:\n            Player.image = self.ship_sheet.subsurface(\n            \
    \    self.ani_pos*64, 0, 64, 61)\n            self.ani_pos += 1\n    else:\n \
    \       if self.ani_pos > 5:\n            self.ani_pos -= 1\n            Player.image\
    \ = self.ship_sheet.subsurface(\n                self.ani_pos*64, 0, 64, 61)\n\
    \n    if self.animate_left:\n        if self.ani_pos > 0:\n            self.ani_pos\
    \ -= 1\n            Player.image = self.ship_sheet.subsurface(\n             \
    \   self.ani_pos*64, 0, 64, 61)\n    else:\n        if self.ani_pos < 5:\n   \
    \         Player.image = self.ship_sheet.subsurface(\n                self.ani_pos*64,\
    \ 0, 64, 61)\n            self.ani_pos += 1\n```\n\n### Animating explosions\n\
    \n10 The player_explosion() and alien_explosion() methods that come after the\
    \ player animation block in the Game class are similar but simpler executions\
    \ of the same thing. As we only need to run through the same predefined set of\
    \ frames (this time vertically), we only need to see if the self.explode and self.alien_explode\
    \ flags are True before we increment the variables that change the image.\n\n\
    ```\ndef player_explosion(self):\n    if self.explode:\n        if self.explode_pos\
    \ < 8:\n            self.explosion_image = self.explosion_sheet.subsurface(0,\
    \ self.explode_pos*96, 79, 96)\n            self.explode_pos += 1\n          \
    \  self.screen.blit(self.explosion_image, [self.player.rect.x -10, self.player.rect.y\
    \ - 30])\n        else:\n            self.explode = False\n            self.explode_pos\
    \ = 0\n```\n\n### Adding music\n\n11 Pygame makes it easy to add a musical score\
    \ to a project. Just obtain a suitable piece of music in your preferred format\
    \ (we found ours via freemusicarchive.org) and load it using the Mixer Pygame\
    \ class. As it's already been initialised via pygame.init(), we can go ahead and\
    \ load the music. The music.play(-1) requests that the music should start with\
    \ the app and continue to loop until it quits. If we replaced -1 with 5, the music\
    \ would loop five times before ending. Learn more about the Mixer class via www.pygame.org/docs/ref/mixer.html.\n\
    \n```\ndef alien_explosion(self):\n    if self.alien_explode:\n        if self.alien_explode_pos\
    \ < 9:\n            self.alien_explode_graphics = self.alien_explosion_sheet.subsurface(0,\
    \ self.alien_explode_pos*96, 94, 96)\n            self.alien_explode_pos += 1\n\
    \            self.screen.blit(self.alien_explode_graphics, [int(self.explodey_alien[0])\
    \ - 50 , int(self.explodey_alien[1]) - 60])\n        else:\n            self.alien_explode\
    \ = False\n            self.alien_explode_pos = 0\n            self.explodey_alien\
    \ = []\n```\n\n### Using sound effects\n\n12 Loading and using sounds is similar\
    \ to how we do so for images in Pygame. First we load the sound effect using a\
    \ simple assignment. For the laser beam, the initialisation looks like this:\n\
    \n```\nself.bullet_fx = pygame.mixer.Sound('location/of/file')\n```\n\nThen we\
    \ simply trigger the sound effect at the appropriate time. In the case of the\
    \ laser, we want it to play whenever we press the space bar to shoot, so we place\
    \ it in the Game class's Control method, straight after we raise the shoot_bullet\
    \ flag. You can get different sounds from www.freesound.org.\n\n```\ndef splash_screen(self):\n\
    \    while GameState.start_screen:\n        self.kill_all()\n        self.screen.blit(self.intro_screen,\
    \ [0, 0])\n        self.screen.blit(self.intro_font.render(\"PIVADERS\", 1, WHITE),\
    \ (265, 120))\n        self.screen.blit(self.game_font.render(\"PRESS SPACE TO\
    \ PLAY\", 1, WHITE), (274, 191))\n        pygame.display.flip()\n        self.control()\n\
    \        self.clock.tick(self.refresh_rate / 2)\n```\n\n```\ndef make_player(self):\n\
    \    self.player = Player()\n```\n\nFind the rest of the code at github.com/russb78/pivaders\n\
    \n> \"Sprite sheets make it easy to draw to the screen, but it also keeps the\
    \ asset count down and performance levels up\"\n\n## Use Python with Pi\n\nCreate\
    \ amazing projects\n\n![](img/3303e52de17b2e01ada468e51372cd68_97_0.png)\n\n##\
    \ Use Python with Pi\n\nAmazing creations with Python code and Raspberry Pi\n\n\
    From the tutorials up to this point, you'll have a firm grounding in Python. Now\
    \ we're going to add the Raspberry Pi computer. First you'll learn how to get\
    \ started with Python on the Pi, and then you'll discover exciting projects such\
    \ as learning to multi-task with your Raspberry Pi (p.110), creating a Pi-powered\
    \ virtual reality setup (p.114) and using it to get more out of Minecraft (p.106).\n\
    \nCreate amazing projects\n\nUse Python with Pi\n\n![](img/3303e52de17b2e01ada468e51372cd68_98_0.png)\n\
    \n## Use Python with Pi\n\n### Using Python on Raspberry Pi\n\n### What you'll\
    \ need...\n\n### Using Python on Raspberry Pi\n\nA Raspberry Pi with all necessary\
    \ peripherals\n\nSD card with latest Debian image for Pi www.raspberrypi.org/downloads\n\
    \nProgram in Python with the Raspberry Pi, and lay the foundations for all your\
    \ future projects\n\nBefore getting started with this tutorial, ensure that you've\
    \ set up the latest version of the Raspbian operating system on an SD card for\
    \ your Raspberry Pi. The beauty of using an SD card image is that the operating\
    \ system is ready to go and a development environment is already configured for\
    \ us.\n\nWe'll use a lightweight integrated development environment (IDE) called\
    \ Geany for our Python development. Geany provides a friendlier interface compared\
    \ to text-based editors such as nano to make it easier to get into the swing of\
    \ things. This tutorial will cover topics such as:\n\n- Basic arithmetic\n- Comparison\
    \ operators, for example 'equal to' and 'not equal to'\n- Control structures,\
    \ for example loops and if statements\n\nBy the end, we'll have an advanced version\
    \ of our 'hello world' application. Let's dive straight in...\n\n![](img/3303e52de17b2e01ada468e51372cd68_99_0.png)\n\
    \n### Staying organised\n\n01 We don't want to have messy folders on our new Pi,\
    \ so let's go to the file manager and organise ourselves. Open the file manager\
    \ by clicking the icon next to the menu icon on the bottom left of the screen.\
    \ Create a new folder by right-clicking and selecting New>Folder, then type a\
    \ name and click OK. We created a folder called Python, and inside that created\
    \ a folder called Hello World v2."
  mdcn: "## 使用 Python 进行创作\n\n## Pivaders 第二部分：图形与音效\n\n### 加载精灵图\n\n07 由于我们通过继承 Sprite\
