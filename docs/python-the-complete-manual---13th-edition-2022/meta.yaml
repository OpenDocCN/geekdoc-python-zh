    \n## Python 简介\n\n## 50 个 Python 技巧\n\nPython 是一种编程语言，可以让你工作得更快，并更有效地集成你的系统。如今，Python\
    \ 是开源领域最受欢迎的编程语言之一。环顾四周，你会发现它无处不在，从各种配置工具到 XML 解析。这里是 50 个技巧的集合，让你的 Python 体验物有所值...\n\
    \n## 基础\n\n## 运行 Python 脚本\n\n01 在大多数 UNIX 系统上，你可以从命令行运行 Python 脚本。\n\n```\n$\
    \ python mypyprog.py\n```\n\n## 从 Python 解释器运行 Python 程序\n\n02 Python 交互式解释器使你能够轻松尝试编程的第一步并使用所有\
    \ Python 命令。你只需在命令提示符（>>>）处逐个发出每个命令，答案会立即给出。\n\n**可以使用以下命令启动 Python 解释器：**\n\n\
    ```\n$ python\nkunal@ubuntu:~$ python\nPython 2.6.2 (release26-maint, Apr 19 2009,\
    \ 01:56:41)\n[GCC 4.3.3] on linux2\nType \"help\", \"copyright\", \"credits\"\
    \ or \"license\" for more information.\n>>> <在此输入命令>\n```\n\n**在本文中，所有以 >>> 符号开头的代码都应在\
    \ Python 提示符处输入。**\n\n同样重要的是要记住，Python 非常重视制表符——所以如果你收到任何提到制表符的错误，请更正制表符间距。\n\n\
    ## 动态类型\n\n03 在 Java、C++ 和其他静态类型语言中，你必须指定函数返回值和每个函数参数的数据类型。另一方面，Python 是一种动态类型语言。在\
    \ Python 中，你永远不需要显式指定你使用的任何东西的数据类型。根据你分配的值，Python 会在内部自动跟踪数据类型。\n\n## Python 语句\n\
    \n04 Python 使用回车符分隔语句，使用冒号和缩进分隔代码块。大多数编译型编程语言，如 C 和 C++，使用分号分隔语句，使用花括号分隔代码块。\n\
