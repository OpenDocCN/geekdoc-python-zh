    the loadtxt() function.


    # Common functions


    07 NumPy supports many numerical and statistical functions. When you apply a function
    to an array, the function is then automatically applied to all of the array elements.
    When working with matrices, you can find the inverse of a matrix AA by typing
    "AA.I". You can also find its eigenvalues by typing "np.linalg.eigvals(AA)" and
    its eigenvector by typing "np.linalg.eig(BB)".


    # Working with matrices


    08 A special subtype of a two-dimensional NumPy array is a matrix. A matrix is
