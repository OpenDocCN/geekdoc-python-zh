    # Work with Python


    %page %paste %pastebin %pdb %pdef %pdoc %pfile

    %pinfo %pinfo2 %popd %pprint %precision %profile %prun

    %psearch %psource %pushd %pwd %pycat %pylab %quickref

    %recall %rehashx %reload_ext %rep %rerun %reset

    %reset_selective %run %save %sc %sx %tb %time %timeit

    %unalias %unload_ext %who %who_ls %whos %xdel %xmode


    Automagic is OFF, % prefix IS needed for magic functions. To view help on any
    Magic Function, call ''%somemagic?'' to read its docstring.

    Python script execution and runtime code editing: You can use %run to run any
    Python script. You can also control-run the Python script with pdb debugger using
    -d, or pdn profiler using -p. You can also edit a Python script using the %edit
    command which opens the given Python script in the editor defined by the $EDITOR
    environment variable.


    Shell command support: To just run a shell command, prefix the command with !.


    Example:

    In [5]: !ps

    PID TTY TIME CMD

    4508 ttys000 0:00.07 -bash

    84275 ttys001 0:00.03 -bash

    17958 ttys002 0:00.18 -bash


    ```

    In [8]: !clang prog.c -o prog

    prog.c:2:1: warning: type specifier missing, defaults to ''int'' [-Wimplicit-int]

    main()

    ^~~~

    1 warning generated.

    ```


    Qt console: IPython comes with a Qt-based console. This provides features only
    available in a GUI, like inline figures, multiline editing with syntax highlighting,
    and graphical calltips. Start the Qt console with:


    ```

    $ ipython qtconsole

    ```


    If you get errors about missing modules, ensure that you have installed dependent
    packages – PyQt, pygments, pyexpect and ZeroMQ.


    Conclusion

    As you can see, it''s easy to tailor Python for all your shell environment needs.
    Python modules like os, subprocess and shutil are available at your disposal to
    do just about everything you need using Python. IPython turns this whole experience
    into an even more complete package. You get to do everything a standard Python
    shell does and with much more convenient features. IPython''s magic functions
    really do provide a magical Python shell experience. So next time you open a Bash
    session, think again: why settle for gold when platinum is a step away?'
