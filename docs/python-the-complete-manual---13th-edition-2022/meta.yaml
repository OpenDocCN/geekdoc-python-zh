    # Welcome to Python


    ## The Complete Manual


    Python is a versatile language and its rise in popularity is certainly no surprise.
    Its similarity to everyday language has made it a perfect companion for the Raspberry
    Pi, which is often a first step into practical programming. But don''t be fooled
    by its beginner-friendly credentials – Python has plenty of more advanced functions.
    In this new edition, you will learn how to program in Python, discover amazing
    projects to improve your understanding, and find ways to use Python to enhance
    your experience of computing. You''ll also create fun projects including programming
    a *Space Invaders* clone and teaching your Raspberry Pi to multi-task.


    Let''s get coding!


