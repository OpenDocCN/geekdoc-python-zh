  md: '# Use Python to code new creations in Minecraft


    # Use Python with Pi


    ![](img/3303e52de17b2e01ada468e51372cd68_106_0.png)


    # Replace your .minecraft directory


    **01** Backup .minecraft in your home directory. If you''re using a GUI, you may
    need to press CTRL+H to view the hidden directories. In terminal `mv ~/.minecraft
    ~/.minecraft-backup` should suffice.


    Right: Backup your original .minecraft dir and copy over the modded install from
    McPiFoMo

    Below: You''ll need to run Minecraft 1.8 with the pre-installed Forge profile


    # Launch Minecraft in Forge mode


    **02** Launch Minecraft as you normally would, but after logging in, select the
    Forge profile. This should load Minecraft 1.8 with Forge 11.14. You can play around
    with the latest version of Minecraft and download and install an updated Forge
    if you wish, but these are the versions we''ve found most compatible with Raspberry
    Jam. You''ll know you''re running the correct profile when you see the version
    numbers in the bottom left corner of the window. Create a new super flat world
    in singleplayer creative mode and you''re ready to begin coding.


    ![](img/3303e52de17b2e01ada468e51372cd68_106_1.png)


    ![](img/3303e52de17b2e01ada468e51372cd68_106_2.png)


    # Hello World – Implement chat commands


    **03** Using your favourite text editor, you''ll need to create a new `helloworld.py`
    file and save it in `~/.minecraft/mcpipy` directory:


    ```

    python

    from mc import *

    mc = Minecraft()

    mc.postToChat("Hello world!")

    ```


    Return to Minecraft and type `/python helloworld`

    Minecraft will now run your python script, which should result in a chat command
    saying Hello world!'
