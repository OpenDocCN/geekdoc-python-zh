  - '[PAGE 121]


    # Use Python with Pi


    # Use your Raspberry Pi to find and track your phone


    > Is your Bluetooth Dongle compatible?


    If you have an older Raspberry Pi model 1, 2 or the Pi Zero then Bluetooth capability
    is not included. However, you can buy a USB Bluetooth dongle and attach it via
    one of the USB ports to add capability. Not all Bluetooth dongles are compatible
    so there is a developing list of the tried and tested ones available. Check here
    before you purchase one: http://elinux.org/RPi_USB_Bluetooth_adapters


    # Print the total number of devices found


    05 Each of the names of any discoverable devices are now stored in a variable.
    Use the code len(nearby_devices) to return the number of items stored in the variable,
    this is the number of Bluetooth devices the program has found. Then print out
    the total number of devices. Add the following code after the previous line of
    your program.


    ```

    print("found %d devices" % len(nearby_devices))

    ```


    # The Bluetooth address (BD_ADDR)


    06 Each Bluetooth-enabled device has a Bluetooth address that is a combination
    of 12 alphanumeric characters; for example, 69:58:78:3A:CB:7F. The addresses are
    hexadecimal, which means they can contain numbers from 0 to 9 and letters from
    A to F. Most devices manufactures will include the address on a sticker attached
    to the hardware or within the user manual.


    ![](img/3303e52de17b2e01ada468e51372cd68_121_0.png)'
