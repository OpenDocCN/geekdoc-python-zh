    # Scrape Wikipedia with Beautiful Soup


    Use the Beautiful Soup Python library to parse Wikipedia''s HTML and store it
    for offline reading


    In this tutorial we''ll use the popular Python library Beautiful Soup to scrape
    Wikipedia for links to articles and then save those pages for offline reading.
    This is ideal for when travelling or in a location with a poor internet connection.


    The plan is simple: using Beautiful Soup with the HTML5Lib Parser, we''re going
    to load a Wikipedia page, remove all of the GUI and unrelated content, search
    the content for links to other Wikipedia articles and then, after a tiny bit of
    modification, write them to a file.


    Even though it''s now the de facto knowledge base of the world, Wikipedia isn''t
    great when it comes to DOM consistency – that is, IDs and classes are sometimes
    quite loose in their usage. Because of this, we will also cover how to handle
    all of the excess bits and bobs of the Wikipedia GUI that we don''t need, as well
    as the various erroneous links that won''t be of much use to us. You can find
    the CSS stylings sheet and a Python script pertaining to this tutorial at http://bit.ly/19MlbBv.


    # Infinite Links


    Wikipedia has a lot of links and when you start following links to links to links,
    the number of pages you have to parse can grow exponentially, depending on the
    subject matter. By passing through the levels value, we put a cap on the amount
    of pages we can grab – although the number of files stored can still vary greatly.
    Use it wisely.


    # Install Beautiful Soup & HTML5Lib


    **01** Before we can start writing code, we need to install the libraries we''ll
    be using for the program (Beautiful Soup, HTML5Lib, Six). The installation process
    is fairly standard: grab the libraries from their respective links, then unzip
    them. In the terminal, enter the unzipped directory and run python setup.py install
    for each library. They will now be ready for use.


