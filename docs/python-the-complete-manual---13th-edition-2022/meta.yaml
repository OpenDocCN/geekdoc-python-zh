  md: "# Use your Raspberry Pi to find and track your phone\n\n# Use Python with Pi\n\
    \n![](img/3303e52de17b2e01ada468e51372cd68_126_0.png)\n\n# Another response, the\
    \ next device is found\n\n16 As before, check and respond, line 1, using an IF\
    \ statement to see if the device is not found. Remember to use the new variable\
    \ name, in this example, device_one. If it finds the named device then print out\
    \ a message, line 2. If it does not find the device, line 3, then print out a\
    \ message to notify the user, line 4. Add these lines of code underneath the previous\
    \ line. Save and run the program to find the two particular devices within your\
    \ location.\n\n```\nif (device_one != None):\n    print \"Linux Laptop is in\"\
    \nelse:\n    print \"Linux Laptop is out\"\n```\n\n# Add an alternative action\n\
    \n17 To customise the project further you could add your own action to the devices\
    \ on being discovered. For example, use a strip of LEDs to flash each time a device\
    \ enters the location and is detected. Or use individual LEDs for each individual\
    \ device to indicate if the device is present or not. How about combining the\
    \ program with an LCD screen as a message board for who is present and who is\
    \ out? For more inspiration, check out: https://www.youtube.com/watch?v=qUZQv87GVdQ"
