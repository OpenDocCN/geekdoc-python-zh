    \ = 2\n        self.player_group = pygame.sprite.Group()\n        self.alien_group\
    \ = pygame.sprite.Group()\n        self.bullet_group = pygame.sprite.Group()\n\
    \        self.missile_group = pygame.sprite.Group()\n        self.barrier_group\
    \ = pygame.sprite.Group()\n```"
- md: "## Create with Python Program a Space Invaders clone\n\n## Setting up dependencies\n\
    \n## Global variables & tuples\n\n01 If you're looking to get a better understanding\
    \ of programming games with Python and Pygame, we strongly recommend you copy\
    \ the Pivaders code in this tutorial into your own program. It's great practice\
    \ and gives you a chance to tweak elements of the game to suit you, be it a different\
    \ ship image, changing the difficulty or the ways the alien ships behave. If you\
    \ just want to play the game, that's easily achieved too, though. Either way,\
    \ the game's only dependency is Pygame, which (if it isn't already) can be installed\
    \ from the terminal by typing:\nsudo apt-get install python-pygame\n\n05 Once\
    \ we've imported the modules we need for the project, there's quite a long list\
    \ of variables in block capitals. The capitals denote that these variables are\
    \ constants (or global variables). These are important numbers that never change\
    \ – they represent things referred to regularly in the code, like colours, block\
    \ sizes and resolution. You'll also notice that colours and sizes hold multiple\
    \ numbers in braces – these are tuples. You could use square brackets (to make\
    \ them lists), but we use tuples here since they're immutable, which means you\
    \ can't reassign individual items within them. Perfect for constants, which aren't\
    \ designed to change anyway.\n\n## Installation\n\n02 For Pivaders we've used\
    \ Git, a brilliant form of version control used to safely store the game files\
    \ and retain historical versions of your code. Git should already be installed\
    \ on your Pi; if not, you can acquire it by typing:\nsudo apt-get install git\n\
    As well as acting as caretaker for your code, Git enables you to clone copies\
    \ of other people's projects so you can work on them, or just use them. To clone\
    \ Pivaders, go to your home folder in the terminal (cd ~), make a directory for\
    \ the project (mkdir pivaders), enter the directory (cd pivaders) and type:\n\
    git pull https://github.com/russb78/pivaders.git\n\n## Testing Pivaders\n\n03\
    \ With Pygame installed and the project cloned to your machine (you can also find\
    \ the .zip on this issue's cover DVD – simply unpack it and copy it to your home\
    \ directory to use it), you can take it for a quick test drive to make sure everything's\
    \ set up properly. All you need to do is type python pivaders.py from within the\
    \ pivaders directory in the terminal to get started. You can start the game with\
    \ the space bar, shoot with the same button and simply use the left and right\
    \ arrows on your keyboard to move your ship left and right.\n\n## Classes – part\
    \ 1\n\n06 A class is essentially a blueprint for an object you'd like to make.\
    \ In the case of our player, it contains all the required info, from which you\
    \ can make multiple copies (we create a player instance in the make_player() method\
    \ halfway through the project). The great thing about the classes in Pivaders\
    \ is that they inherit lots of capabilities and shortcuts from Pygame's Sprite\
    \ class, as denoted by the pygame.sprite.Sprite found within the braces of the\
    \ first line of the class. You can read the docs to learn more about the Sprite\
    \ class via www.pygame.org/docs/ref/sprite.html.\n\n## Creating your own clone\n\
    \n04 Once you've racked up a good high score (anything over 2,000 points is respectable)\
    \ and got to know our simple implementation, you'll get more from following along\
    \ with and exploring the code and our brief explanations of what's going on. For\
    \ those who want to make their own project, create a new project folder and use\
    \ either IDLE or Leafpad (or perhaps install Geany) to create and save a .py file\
    \ of your own.\n\n![](img/3303e52de17b2e01ada468e51372cd68_89_0.png)\n\n> \"We've\
    \ tried to use many features of Pygame, which is designed to make the creation\
    \ of games and interactive applications easier\"\n\n## Program a Space Invaders\
    \ clone\n\n## Create with Python\n\nContinued from page 89\n\n```python\nself.all_sprite_list\
    \ = pygame.sprite.Group()\nself.intro_screen = pygame.image.load('data/start_screen.jpg').convert()\n\
    self.background = pygame.image.load('data/Space-Background.jpg').convert()\npygame.display.set_caption('PIVaders\
    \ - ESC to exit')\npygame.mouse.set_visible(False)\nPlayer.image = pygame.image.load('data/ship.png').convert()\n\
    Player.image.set_colorkey(BLACK)\nAlien.image = pygame.image.load('data/Spaceship16.png').convert()\n\
    Alien.image.set_colorkey(WHITE)\nGameState.end_game = False\nGameState.start_screen\
    \ = True\nGameState.vector = 0\nGameState.shoot_bullet = False\n```\n\n```python\n\
    self.screen.blit(self.game_font.render(\"PRESS SPACE TO PLAY\", 1, WHITE), (274,\
    \ 191))\npygame.display.flip()\nself.control()\n```\n\n```python\ndef make_player(self):\n\
    \    self.player = Player()\n    self.player_group.add(self.player)\n    self.all_sprite_list.add(self.player)\n\
    ```\n\n```python\ndef refresh_screen(self):\n    self.all_sprite_list.draw(self.screen)\n\
    \    self.refresh_scores()\n    pygame.display.flip()\n    self.screen.blit(self.background,\
    \ [0, 0])\n    self.clock.tick(self.refresh_rate)\n```\n\n```python\ndef refresh_scores(self):\n\
    \    self.screen.blit(self.game_font.render(\"SCORE \" + str(self.score), 1, WHITE),\
    \ (10, 8))\n    self.screen.blit(self.game_font.render(\"LIVES \" + str(self.lives\
    \ + 1), 1, RED), (355, 575))\n```\n\n```python\ndef control(self):\n    for event\
    \ in pygame.event.get():\n        if event.type == pygame.QUIT:\n            GameState.start_screen\
    \ = False\n            GameState.end_game = True\n        if event.type == pygame.KEYDOWN\
    \ \\\n                and event.key == pygame.K_ESCAPE:\n            if GameState.start_screen:\n\
    \                GameState.start_screen = False\n                GameState.end_game\
    \ = True\n                self.kill_all()\n            else:\n               \
    \ GameState.start_screen = True\n    self.keys = pygame.key.get_pressed()\n  \
    \  if self.keys[pygame.K_LEFT]:\n        GameState.vector = -1\n    elif self.keys[pygame.K_RIGHT]:\n\
    \        GameState.vector = 1\n    else:\n        GameState.vector = 0\n    if\
    \ self.keys[pygame.K_SPACE]:\n        if GameState.start_screen:\n           \
    \ GameState.start_screen = False\n            self.lives = 2\n            self.score\
    \ = 0\n            self.make_player()\n            self.make_defenses()\n    \
    \        self.alien_wave(0)\n        else:\n            GameState.shoot_bullet\
    \ = True\n```\n\n```python\ndef alien_wave(self, speed):\n    for column in range(BARRIER_COLUMN):\n\
    \        for row in range(BARRIER_ROW):\n            alien = Alien()\n       \
    \     alien.rect.y = 65 + (column * (ALIEN_SIZE[1] + ALIEN_SPACER))\n        \
    \    alien.rect.x = ALIEN_SPACER + (row * (ALIEN_SIZE[0] + ALIEN_SPACER))\n  \
    \          self.alien_group.add(alien)\n            self.all_sprite_list.add(alien)\n\
    \            alien.speed = speed\n```\n\n```python\ndef make_bullet(self):\n \
    \   if GameState.game_time - self.player.time > self.player.speed:\n        bullet\
    \ = Ammo(BLUE, BULLET_SIZE)\n        bullet.vector = -1\n        bullet.speed\
    \ = 26\n        bullet.rect.x = self.player.rect.x + 28\n        bullet.rect.y\
    \ = self.player.rect.y\n        self.bullet_group.add(bullet)\n        self.all_sprite_list.add(bullet)\n\
    \        self.player.time = GameState.game_time\n        GameState.shoot_bullet\
    \ = False\n```\n\n```python\ndef splash_screen(self):\n    while GameState.start_screen:\n\
    \        self.kill_all()\n        self.screen.blit(self.intro_screen, [0, 0])\n\
    \        self.screen.blit(self.intro_font.render(\"PIVADERS\", 1, WHITE), (265,\
    \ 120))\n```\n\n```python\ndef make_missile(self):\n    if len(self.alien_group):\n\
    \        shoot = random.random()\n        if shoot <= 0.05:\n            shooter\
    \ = random.choice([alien for alien in self.alien_group])\n            missile\
    \ = Ammo(RED, MISSILE_SIZE)\n```\n\nContinued on page 93\n\n## Create with Python\n\
    \n## Program a Space Invaders clone\n\n## Classes – part 2\n\n## Main loop key\
    \ logic – part 1\n\n07 In Pivader's classes, besides creating the required attributes\
    \ for the object, you'll also notice all the classes have an update() method apart\
    \ from the Block class (a method is a function within a class). The update() method\
    \ is called in every loop through the main game and simply asks the iteration\
    \ of the class we've created to move. In the case of a bullet from the Ammo class,\
    \ we're asking it to move down the screen. If it goes off either end, we destroy\
    \ it.\n\n11 Firstly the game checks that the end_game attribute is false – if\
    \ it's true, the entire loop in main_loop() is skipped and we go straight to pygame.quit(),\
    \ exiting the game. This flag is set to true only if the player closes the game\
    \ window or presses the Esc key when on the start_screen. Assuming end_game and\
    \ start_screen are false, the main loop can start proper, with the control() method,\
    \ which checks to see if the location of the player needs to change. Next we attempt\
    \ to make an enemy missile and we use the random module to limit the number of\
    \ missiles that can be created. Next we call the update() method for each and\
    \ every actor on the screen using a simple for loop. This makes sure everyone's\
    \ up to date and moved before we check collisions in calc_collisions().\n\n![](img/3303e52de17b2e01ada468e51372cd68_91_0.png)\n\
    \n## Ammo\n\n08 What's most interesting about classes, though, is that you can\
    \ use one class to create lots of different things. You could, for example, have\
    \ a pet class. From that class you could create a cat (that meows) and a dog (that\
    \ barks). They're different in many ways, but they're both furry and have four\
    \ legs, so can be created from the same parent class. We've done exactly that\
    \ with our Ammo class, using it to create both the player bullets and the alien\
    \ missiles. They're different colours and they shoot in opposite directions, but\
    \ they're fundamentally one and the same.\n\n## Main loop key logic – part 2\n\
    \n12 Once collisions have been calculated, we need to see if the game is still\
    \ meant to continue. We do so with is_dead() and defenses_breached() – if either\
    \ of these methods returns true, we know we need to return to the start screen.\
    \ On the other hand, we also need to check to see if we've killed all the aliens,\
    \ from within win_round(). Assuming we're not dead, but the aliens are, we know\
    \ we can call the next_round() method, which creates a fresh batch of aliens and\
    \ increases their speed around the screen. Finally, we refresh the screen so everything\
    \ that's been moved, shot or killed can be updated or removed from the screen.\
    \ Remember, the main loop happens 20 times a second – so the fact we don't call\
    \ for the screen to update right at the end of the loop is of no consequence.\n\
    \n## The game\n\n09 Our final class is called Game. This is where all the main\
    \ functionality of the game itself comes in, but remember, so far this is still\
    \ just a list of ingredients – nothing can actually happen until a 'Game' object\
    \ is created (right at the bottom of the code). The Game class is where the central\
    \ mass of the game resides, so we initialise Pygame, set the imagery for our protagonist\
    \ and extraterrestrial antagonist and create some GameState attributes that we\
    \ use to control key aspects of external classes, like changing the player's vector\
    \ (direction).\n\n## The main loop\n\n10 There are a lot of methods (class functions)\
    \ in the Game class, and each is designed to control a particular aspect of either\
    \ setting up the game or the gameplay itself. The logic that dictates what happens\
    \ within any one round of the game is contained in the main_loop() method right\
    \ at the bottom of the pivaders.py script and is the key to unlocking exactly\
    \ what variables and functions you need for your game."
  mdcn: "## 使用 Python 程序创建太空侵略者克隆版\n\n## 设置依赖项\n\n## 全局变量与元组\n\n01 如果你想更好地理解如何使用 Python\
    \ 和 Pygame 编写游戏，我们强烈建议你将本教程中的 Pivaders 代码复制到你自己的程序中。这是很好的实践，也让你有机会调整游戏元素以适应你的需求，无论是更换飞船图像、改变难度，还是调整外星飞船的行为方式。当然，如果你只想玩游戏，那也很容易实现。无论哪种方式，游戏唯一的依赖项是\
    \ Pygame，如果尚未安装，可以通过在终端输入以下命令来安装：\nsudo apt-get install python-pygame\n\n05 一旦我们导入了项目所需的模块，就会看到一长串大写字母的变量。大写字母表示这些变量是常量（或全局变量）。这些是永远不会改变的重要数字——它们代表代码中经常引用的东西，比如颜色、方块大小和分辨率。你还会注意到颜色和大小在花括号中包含多个数字——这些是元组。你可以使用方括号（将它们变成列表），但我们在这里使用元组，因为它们是不可变的，这意味着你不能重新赋值其中的单个项目。这非常适合常量，因为它们本来就不打算改变。\n\
    \n## 安装\n\n02 对于 Pivaders，我们使用了 Git，这是一种出色的版本控制形式，用于安全地存储游戏文件并保留代码的历史版本。Git 应该已经安装在你的树莓派上；如果没有，你可以通过输入以下命令来获取：\n\
    sudo apt-get install git\n除了作为代码的守护者，Git 还使你能够克隆其他项目的副本，以便你可以处理它们，或者只是使用它们。要克隆\
    \ Pivaders，请在终端中转到你的主文件夹（cd ~），为项目创建一个目录（mkdir pivaders），进入该目录（cd pivaders）并输入：\n\
    git pull https://github.com/russb78/pivaders.git\n\n## 测试 Pivaders\n\n03 安装 Pygame\
    \ 并将项目克隆到你的机器上后（你也可以在本期封面 DVD 上找到 .zip 文件——只需解压并将其复制到你的主目录即可使用），你可以快速测试一下，以确保一切设置正确。你只需在终端中进入\
    \ pivaders 目录，输入 python pivaders.py 即可开始。你可以用空格键开始游戏，用同一个按钮射击，只需使用键盘上的左右箭头键来左右移动你的飞船。\n\
    \n## 类 – 第一部分\n\n06 类本质上是你想要创建的对象的蓝图。就我们的玩家而言，它包含了所有必需的信息，你可以从中创建多个副本（我们在项目中途的\
    \ make_player() 方法中创建了一个玩家实例）。Pivaders 中类的伟大之处在于，它们从 Pygame 的 Sprite 类继承了许多功能和快捷方式，正如类第一行花括号中的\
    \ pygame.sprite.Sprite 所表示的那样。你可以通过 www.pygame.org/docs/ref/sprite.html 阅读文档以了解更多关于\
    \ Sprite 类的信息。\n\n## 创建你自己的克隆版\n\n04 一旦你获得了不错的高分（超过 2000 分就算不错）并熟悉了我们简单的实现，你将从跟随和探索代码以及我们对正在发生的事情的简要解释中获得更多收获。对于那些想要创建自己项目的人，请创建一个新的项目文件夹，并使用\
    \ IDLE 或 Leafpad（或者安装 Geany）来创建并保存你自己的 .py 文件。\n\n![](img/3303e52de17b2e01ada468e51372cd68_89_0.png)\n\
    \n> \"我们尝试使用 Pygame 的许多特性，它旨在使游戏和交互式应用程序的创建变得更容易\"\n\n## 编程实现太空侵略者克隆版\n\n## 使用\
