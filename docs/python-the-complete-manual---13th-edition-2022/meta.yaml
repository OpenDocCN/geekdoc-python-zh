    # Python 入门


    一直想尝试编程？别再找借口了，因为 Python 是入门的完美方式！


    Python 是一门非常适合初学者和专家的编程语言。它在设计时就考虑了代码的可读性，使其成为仍在适应各种编程概念的初学者的绝佳选择。


    这门语言很受欢迎，并且有大量可用的库，允许程序员用相对较少的代码完成很多工作。


    你可以用 Python 制作各种应用程序：你可以使用 Pygame 框架编写简单的 2D 游戏，可以使用 GTK 库创建窗口应用程序，或者可以尝试一些更有野心的东西，比如创建一个使用
    Python 的蓝牙和输入库来捕获 USB 键盘输入并将输入事件中继到 Android 手机的应用程序。


    在本教程中，我们将使用 Python 2.x，因为这是你的 Linux 发行版上最可能安装的版本。


    在接下来的教程中，你将学习如何使用 Python 编程创建流行的游戏。我们还将向你展示如何为这些游戏添加声音和人工智能。


    # Python 入门


    ## 入门


    ![](img/3303e52de17b2e01ada468e51372cd68_8_0.png)


    # Hello World


    让我们开始吧，还有什么比程序员的好朋友——''Hello World'' 应用程序更好的方式呢！首先打开一个终端。它当前的工作目录将是你的主目录。最好为我们在本教程中将要创建的文件创建一个目录，而不是让它们散落在你的主目录中。你可以使用命令
    mkdir Python 创建一个名为 Python 的目录。然后你需要使用命令 cd Python 切换到该目录。


    下一步是使用命令 ''touch'' 后跟文件名来创建一个空文件。我们的专家使用了命令 touch hello_world.py。设置文件的最后也是最重要的部分是使其可执行。这允许我们运行
    hello_world.py 文件中的代码。我们通过命令 chmod +x hello_world.py 来实现这一点。现在我们已经设置好了文件，可以继续在
    nano 中打开它，或者选择任何你喜欢的文本编辑器。Gedit 是一个很棒的编辑器，具有语法高亮支持，应该在任何发行版上都可用。如果你还没有安装，可以使用你的包管理器安装它。


    ```

    [liam@liam-laptop ~]$ mkdir Python

    [liam@liam-laptop ~]$ cd Python/

    [liam@liam-laptop Python]$ touch hello_world.py

    [liam@liam-laptop Python]$ chmod +x hello_world.py

    [liam@liam-laptop Python]$ nano hello_world.py

    ```


    我们的 Hello World 程序非常简单，只需要两行。第一行以 ''shebang''（符号 #! – 也称为'
