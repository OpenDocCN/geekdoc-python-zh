  md: '# Work with Python


    # Replace your shell with Python


    ```

    Example:

    In [28]: os.path?

    Type:        module

    Base Class: <type ''module''>

    String Form:<module ''posixpath'' from ''/System/Library/Frameworks/Python.framework/Versions/2.7/lib/python2.7/posixpath.pyc''>

    Namespace:  Interactive

    File:        /System/Library/Frameworks/Python.framework/Versions/2.7/lib/python2.7/posixpath.py

    Docstring:

    Common operations on POSIX pathnames.

    ```


    Instead of importing this module directly, import os and refer to this module
    as os.path. The ''os.path'' name is an alias for this module on POSIX systems;
    on other systems (eg Mac, Windows), os.path provides the same operations in a
    manner specific to that platform, and is an alias to another module (eg macpath,
    ntpath).

    Some of this can actually be useful on non-POSIX systems too, eg for manipulation
    of the pathname component of URLs. You can also use double question marks (??)
    to view the source code for the relevant object.


    **Magic functions:** IPython comes with a set of predefined ''magic functions''
    that you can call with a command-line-style syntax. IPython ''magic'' commands
    are conventionally prefaced by %, but if the flag %automagic is set to on, then
    you can call magic commands without the %. To view a list of available magic functions,
    use ''magic function %lsmagic''. They include functions that work with code such
    as %run, %edit, %macro, %recall etc; functions that affect shell such as %colors,
    %xmode, %autoindent etc; and others such as %reset, %timeit, %paste etc. Most
    cool features of IPython are powered using magic functions.


    ```

    Example:

    In [45]: %lsmagic

    Available magic functions:

    %alias  %autocall  %autoindent  %automagic  %bookmark  %cd

    %colors  %cpaste  %debug  %dhist  %dirs  %doctest_mode  %ed

    %edit  %env  %gui  %hist  %history  %install_default_config

    %install_profiles  %load_ext  %loadpy  %logoff  %logon

    %logstart  %logstate  %logstop  %lsmagic  %macro  %magic

    ```'
