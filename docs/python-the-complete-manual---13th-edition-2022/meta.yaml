  md: "# Handle multiple tasks\n\n# Use Python with Pi\n\nthe main core of your program\
    \ and forces it to wait until the thread exits. The thread exits by default when\
    \ the running function exits.\nBut, how do you write code that uses threads well?\
    \ The first item to consider is whether you will be using data that is globally\
    \ available or whether you are using data that should only be visible within the\
    \ current thread. If you do need local only data, you can create a local object\
    \ that can store these values. The following code stores a string with your author's\
    \ name in it:\n\n```\nmydata = threading.local()\nmydata.myname = 'Joey Bernard'\n\
    ```\n\nThis would be code used within the function being run by a thread. If you\
    \ need to use global data, you need to consider how different threads may try\
    \ to use this global data. If everyone is reading from a given variable, you won't\
    \ run into any issues. The problem arises when you have multiple threads that\
    \ may try to write a given variable. In this case you'll end up with a situation\
    \ known as a race condition, where one thread may overwrite the data from another.\
    \ In these cases, you will need to use lock objects to manage access to these\
    \ global variables. A basic example would look like:\n\n```\nmylock = threading.Lock()\n\
    counter = 0\ndef func1():\n    mylock.acquire()\n    counter = counter + 1\n \
    \   mylock.release()\n```\n\nAs you can see, you create the lock object in the\
    \ main body of your program. Then, within the function code, you try to acquire\
    \ the lock. If it is free, you get access to it and it is locked. If the lock\
    \ object has already been locked by another thread, then this call to acquire\
    \ blocks and waits until the lock has been released. This is why you need to be\
    \ really careful to always have a release statement for every acquire statement.\
    \ Otherwise, you'll have a bug that will be almost impossible to find after the\
    \ fact. This also introduces a bottleneck to your program, so you want to make\
    \ sure that whatever code exists between the acquire and lock is the bare minimum\
    \ required to do the necessary work. This is the simplest form of locking mechanism\
    \ available in Python. If your needs"
