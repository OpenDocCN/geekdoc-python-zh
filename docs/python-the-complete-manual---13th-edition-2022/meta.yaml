- md: "## Build an app for Android with Python\n\n## Introducing Python\n\ntake this\
    \ opportunity to do the same for the other widgets as well (Fig. 05).\nThis takes\
    \ care of keeping all our game widgets positioned and sized in proportion to the\
    \ Game containing them. Notice that the Player and Ball use references to the\
    \ properties we set earlier, so we'll be able to move them by just setting these\
    \ properties and letting kv language automatically update their positions.\nThe\
    \ Ball also uses an extra property to remain square rather than rectangular, just\
    \ because the alternative would likely look a little bit odd.\nWe've now almost\
    \ finished the basic graphics of our app! All that remains is to add a Ball and\
    \ a Player widget to the Game.\n\n```\n<Game>:\n    ball: the_ball\n    player:\
    \ the_player\nBall:\n    id: the_ball\nPlayer:\n    id: the_player\n```\n\nYou\
    \ can run the game again now, and should be able to see all the graphics working\
    \ properly. Nothing moves yet, but thanks to the FloatLayout everything should\
    \ remain in proportion if you resize the game/window.\nNow we just have to add\
    \ the game mechanics. For a game like this you usually want to run some update\
    \ function many times per second, updating the widget positions and carrying out\
    \ game logic – in this case collisions with the ball (Fig. 06).\nThe Clock can\
    \ schedule any function at any time, either once or repeatedly. A function scheduled\
    \ at interval automatically receives the time since its last call (dt here), which\
    \ we've passed through to the ball and player via the references we created in\
    \ kv language. It's good practice to scale the update (eg ball distance moved)\
    \ by this dt, so things remain stable even if something interrupts the clock and\
    \ updates don't meet the regular 1/60s you want.\nAt this point we have also added\
    \ the first steps toward handling keyboard input, by binding to the kv Window\
    \ to call a method of the Player every time a key is pressed. We can then finish\
    \ off the Player class by adding this key handler along with touch/mouse input.\n\
    \n```\nclass Player(Widget):\n    def on_touch_down(self, touch):\n        self.direction\
    \ = (\n            'right' if touch.x >\n            self.parent.center_x else\n\
    \            'left')\n\n    def on_touch_up(self, touch):\n        self.direction\
    \ = 'none'\n\n    def on_key_down(self, keypress, scancode, *args):\n        if\
    \ scancode == 275:\n            self.direction = 'right'\n        elif scancode\
    \ == 276:\n            self.direction = 'left'\n        else:\n            self.direction\
    \ = 'none'\n\n    def on_key_up(self, *args):\n        self.direction = 'none'\n\
    \n    def update(self, dt):\n        dir_dict = {'right': 1,\n        'left':\
    \ -1, 'none': 0}\n        self.position += (0.5\n        * dt * dir_dict[self.direction])\n\
    ```\n\nThese on_touch_ functions are Kivy's general method for interacting with\
    \ touch or mouse input, they are automatically called when the input is detected\
    \ and you can do anything you like in response to the touches you receive. In\
    \ this case we set the Player's direction property in response to either keyboard\
    \ and touch/mouse input, and use this direction to move the Player when its update\
    \ method is called. We can also add the right behaviour for the ball (Fig. 07).\n\
    This makes the ball bounce off every wall by forcing its velocity to point back\
    \ into the Game, as well as bouncing from the player paddle – but with an extra\
    \ kick just to let the ball speed change. It doesn't yet handle any interaction\
    \ with the blocks or any win/lose conditions, but it does try to call Game.lose()\
    \ if the ball hits the bottom of the player's screen, so let's now add in some\
    \ game end code to handle all of this (Fig. 08). And then add the code in Fig.\
    \ 09 to your 'breakout.kv' file.\n\nof your Android devices. You can even access\
    \ the normal Android API to access hardware or OS features such as vibration,\
    \ sensors or native notifications.\n\n```\nsize_hint: None, None\nproper_size:\n\
    \    min(0.03*self.parent.height, 0.03*self.parent.width)\nsize: self.proper_size,\
    \ self.proper_size\n# ... canvas part\n```\n\nThis should fully handle the loss\
    \ or win, opening a pop-up with an appropriate message and providing a button\
    \ to try again. Finally, we have to handle destroying blocks when the ball hits\
    \ them (Fig. 10).\n\nWe'll build for Android using the Buildozer tool, and a Kivy\
    \ sister project wrapping other build tools to create packages on different systems.\
    \ This takes care of downloading and running the Android build tools (SDK, NDK,\
    \ etc) and Kivy's Python-for-Android tools that create the APK.\n\n### Fig 06\n\
    \n```\nfrom kivy.clock import Clock\nfrom kivy.core.window import Window\nfrom\
    \ kivy.utils import platform\n```\n\nThis fully covers these last conditions,\
    \ checking collision via Kivy's built-in collide_widget method that compares their\
    \ bounding boxes (pos and size). The bounce direction will depend on how far the\
    \ ball has penetrated, as this will tell us how it first collided with the Block.\n\
    \n### Fig 04\n\n```\nimport random\n\nclass Block(Widget):\n    def __init__(self,\
    \ **kwargs):\n        super(Block, self).__init__(**kwargs)\n        self.colour\
    \ = random.choice([\n            (0.78, 0.28, 0), (0.28, 0.63, 0.28), (0.25, 0.28,\
    \ 0.78)])\n```\n\n```\nclass Game(FloatLayout):\n    def update(self, dt):\n \
    \       self.ball.update(dt)  # Not defined yet\n        self.player.update(dt)\
    \  # Not defined yet\n\n    def start(self, *args):\n        Clock.schedule_interval(self.update,\
    \ 1/60.)\n\n    def stop(self):\n        Clock.unschedule(self.update)\n\n   \
    \ def reset(self):\n        for block in self.blocks:\n            self.remove_widget(block)\n\
    \        self.blocks = []\n        self.setup_blocks()\n        self.ball.velocity\
    \ = [random.random(), 0.5]\n        self.player.position = 0.5\n```\n\nSo there\
    \ we have it, you can run the code to play your simple Breakout game. Obviously\
    \ it's very simple right now, but hopefully you can see lots of different ways\
    \ to add whatever extra behaviour you like – you could add different types of\
    \ blocks and power-ups, a lives system, more sophisticated paddle/ball interaction,\
    \ or even build a full game interface with a menu and settings screen as well.\n\
    \n### Fig 05\n\n```\n<Block>:\n    size_hint: 0.09, 0.05\n    # ... canvas part\n\
    \n<Player>:\n    size_hint: 0.1, 0.025\n    pos_hint: {'x': self.position, 'y':\
    \ 0.1}\n    # ... canvas part\n\n<Ball>:\n    pos_hint: {'x': self.pos_hint_x,\
    \ 'y': self.pos_hint_y}\n```\n\nWe're just going to finish showing one cool thing\
    \ that you can already do – compile your game for Android! Generally speaking\
    \ you can take any Kivy app and turn it straight into an Android APK that will\
    \ run on any\n\n```\nclass BreakoutApp(App):\n    def build(self):\n        g\
    \ = Game()\n        if platform() != 'android':\n            Window.bind(on_key_down=g.player.on_key_down)\n\
    \            Window.bind(on_key_up=g.player.on_key_up)\n        g.reset()\n  \
    \      Clock.schedule_once(g.start, 0)\n        return g\n```\n\n```\ndef bounce_from_player(self,\
    \ player):\n    if self.collide_widget(player):\n        self.velocity[1] = abs(self.velocity[1])\n\
    \        self.velocity[0] += (0.1 * ((self.center_x - player.center_x) / player.width))\n\
    ```\n\n```\n<GameEndPopup>:\n    size_hint: 0.8, 0.8\n    auto_dismiss: False\n\
    \    # Don't close if player clicks outside\n    BoxLayout:\n        orientation:\
    \ 'vertical'\n        Label:\n            text: root.message\n            font_size:\
    \ 60\n            markup: True\n            halign: 'center'\n        Button:\n\
    \            size_hint_y: None\n            height: sp(80)\n            text:\
    \ 'Play again?'\n            font_size: 60\n            on_release: root.game.start();\
    \ root.dismiss()\n```\n\n```\nclass Ball(Widget):\n    def update(self, dt):\n\
    \        self.pos_hint_x += self.velocity[0] * dt\n        self.pos_hint_y +=\
    \ self.velocity[1] * dt\n        if self.right > self.parent.right:  # Bounce\
    \ from right\n            self.velocity[0] = -1 * abs(self.velocity[0])\n    \
    \    if self.x < self.parent.x:  # Bounce from left\n            self.velocity[0]\
    \ = abs(self.velocity[0])\n        if self.top > self.parent.top:  # Bounce from\
    \ top\n            self.velocity[1] = -1 * abs(self.velocity[1])\n        if self.y\
    \ < self.parent.y:  # Lose at bottom\n            self.parent.lose()  # Not implemented\
    \ yet\n            self.bounce_from_player(self.parent.player)\n```\n\n```\nclass\
    \ GameEndPopup(ModalView):\n    message = StringProperty()\n    game = ObjectProperty()\n\
    \nclass Game(Widget):\n    def lose(self):\n        self.stop()\n        GameEndPopup(message='[color=#ff0000]You\
    \ lose![/color]', game=self).open()\n    def win(self):  # Not called yet, but\
    \ we'll need it later\n        self.stop()\n        GameEndPopup(message='[color=#00ff00]You\
    \ win![/color]', game=self).open()\n```\n\nHere you will be needing some basic\
    \ dependencies, which can be installed with ease just by using your distro's normal\
    \ repositories. The main ones to use are OpenJDK7, zlib, an up-to-date Cython,\
    \ and Git. If you are using a 64-bit distro you will also be in need of 32-bit\
    \ compatibility libraries for zlib, libstdc++, as well as libgcc. You can then\
    \ go on and download and install Buildozer:"
  mdcn: "## 使用Python为Android构建应用\n\n## Python简介\n\n借此机会，我们同样为其他部件完成此操作（图05）。\n这确保了我们所有的游戏部件都能按比例定位和缩放，相对于包含它们的Game部件。请注意，Player和Ball部件引用了我们之前设置的属性，因此我们只需设置这些属性，就能移动它们，让kv语言自动更新它们的位置。\n\
    Ball部件还使用了一个额外的属性来保持正方形而非矩形，因为否则看起来可能会有点奇怪。\n现在，我们几乎完成了应用的基本图形！剩下的就是向Game中添加一个Ball和一个Player部件。\n\
    \n```\n<Game>:\n    ball: the_ball\n    player: the_player\nBall:\n    id: the_ball\n\
    Player:\n    id: the_player\n```\n\n你现在可以再次运行游戏，应该能看到所有图形都正常工作了。目前还没有任何东西移动，但得益于FloatLayout，即使你调整游戏/窗口的大小，所有内容都应该保持比例。\n\
    现在我们只需要添加游戏机制。对于这样的游戏，你通常希望每秒运行多次更新函数，更新部件位置并执行游戏逻辑——在本例中是与球的碰撞（图06）。\nClock可以在任何时间调度任何函数，可以是一次性的，也可以是重复的。以间隔调度的函数会自动接收自上次调用以来的时间（这里是dt），我们已经通过在kv语言中创建的引用将其传递给了ball和player。一个好习惯是用这个dt来缩放更新量（例如球移动的距离），这样即使某些东西中断了时钟，更新没有达到你想要的规律的1/60秒，事物也能保持稳定。\n\
    此时，我们还通过绑定到kv Window，为处理键盘输入迈出了第一步，每次按键时都调用Player的一个方法。然后我们可以通过添加这个按键处理器以及触摸/鼠标输入来完成Player类。\n\
    \n```\nclass Player(Widget):\n    def on_touch_down(self, touch):\n        self.direction\
    \ = (\n            'right' if touch.x >\n            self.parent.center_x else\n\
    \            'left')\n\n    def on_touch_up(self, touch):\n        self.direction\
    \ = 'none'\n\n    def on_key_down(self, keypress, scancode, *args):\n        if\
    \ scancode == 275:\n            self.direction = 'right'\n        elif scancode\
    \ == 276:\n            self.direction = 'left'\n        else:\n            self.direction\
    \ = 'none'\n\n    def on_key_up(self, *args):\n        self.direction = 'none'\n\
    \n    def update(self, dt):\n        dir_dict = {'right': 1,\n        'left':\
    \ -1, 'none': 0}\n        self.position += (0.5\n        * dt * dir_dict[self.direction])\n\
    ```\n\n这些on_touch_函数是Kivy用于与触摸或鼠标输入交互的通用方法，当检测到输入时它们会自动调用，你可以对接收到的触摸做任何你想做的事情。在本例中，我们根据键盘和触摸/鼠标输入设置Player的direction属性，并在调用其update方法时使用这个方向来移动Player。我们还可以为球添加正确的行为（图07）。\n\
    这通过强制其速度指向Game内部，使球从每一面墙反弹，同时也从玩家挡板反弹——但额外增加了一次踢击，以便让球的速度发生变化。它目前还不处理与方块的任何交互或任何输赢条件，但如果球击中玩家屏幕底部，它确实会尝试调用Game.lose()，所以现在让我们添加一些游戏结束代码来处理所有这些（图08）。然后将图09中的代码添加到你的'breakout.kv'文件中。\n\
    \n你的Android设备。你甚至可以访问普通的Android API来访问硬件或操作系统功能，如振动、传感器或原生通知。\n\n```\nsize_hint:\
