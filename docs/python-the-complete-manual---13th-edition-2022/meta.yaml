- md: '## Create a Pi-powered virtual reality setup


    ### Use Python with Pi


    ### Rift Development Kit 2


    10 If you have access to the Oculus Rift development kit version 2, then you will
    again be required to copy over a configuration file. Except this time select the
    config_DK2.txt file and copy the contents to the boot/config file. In the LXTerminal
    type the line below and press enter. Ensure that you select the correct configuration
    for the kit version which you have.


    ```

    sudo cp config/config_DK2.txt /boot/config.txt

    ```


    ### Complete the set up


    11 Finally run two commands. The first command (line one) enables the rootless
    USB udev config setup which was set up earlier in Step 7. The second command (line
    two) disables BluetoothLE. This is required as it stops the OpenGL ES from hanging.
    Ensure that each line is typed in as printed, and press Enter after each line
    to enable the command to run:


    ```

    sudo udevadm control --reload-rules

    sudo systemctl disable hciuart

    ```


    ### Restart and plug in


    12 This completes the installation and project setup. From the LXTerminal, shutdown
    the Raspberry Pi (line one). Attach the Xbox 360 controller and if you have one,
    the Oculus Rift. Turn the Rift on first before starting the Pi to ensure that
    it registers the hardware when the Pi boots up:


    ```

    sudo shutdown

    ```


    ### Hardware controls and setup


    13 Python-VRzero sets up sensible defaults for handling input events from attached
    devices. The keyboard controls movement and the default mappings are: WASD, SPACE
    for jump and ENTER for action. The mouse controls looking (and direction of travel
    when moving). Mouse button 1 is action and mouse button 2 is jump. An Xbox 360
    controller controls movement and view using the left and right stick respectively.
    The ''A'' button is ''action'' and the ''B'' button is jump. The OpenHMD library
    is used to read the HMD sensor data. VR Pi3D Stereoscopic camera in response to
    HMD readings.


    ### Running a demo


    14 Now for the fun part, which is to run a demo program and immerse yourself in
    a VR world. There are several to choose from, and each one demonstrates the features
    of the Python-VRzero program. The demos need to be run using Python 3 and executed
    as a script from the demos folder. (If you are using an Oculus Rift you will need
    to navigate to the folder via the display inside the Rift headset.) Open the LXTerminal,
    and move to the python-vrzero/demos folder, line one. To list the available demos
    type ls, this will list the file names of all the demos. To run a demo type ./
    followed by the name of the demo, for example to run the abbey demo type, ./abbey.py
    (line 2). You will be presented with a VR render of Buckfast Abbey, to end the
    environment just press Escape on the keyboard.


    ```

    cd python-vrzero/demos

    ./abbey.py

    ```


    ### Use Python with Pi


    Create a Pi-powered virtual reality setup


    ```python

    import pi3d

    from vrzero import engine


    # VR Zero init, must be done *before* Pi3D setup.

    engine.init()


    # Pi3D scene setup...


    shader = pi3d.Shader("uv_light")

    shinesh = pi3d.Shader("uv_reflect")

    flatsh = pi3d.Shader("uv_flat")

    matsh = pi3d.Shader("mat_reflect")

    ##########################################

    # Load textures

    patimg = pi3d.Texture("textures/PATRN.PNG")

    coffimg = pi3d.Texture("textures/COFFEE.PNG")

    shapebump = pi3d.Texture("textures/floor_nm.jpg")

    shapeshine = pi3d.Texture("textures/stars.jpg")

    light = pi3d.Light(lightpos=(-1.0, 0.0, 10.0), lightcol=(3.0, 3.0, 3.0))

    ```


    ### Editing the textures


    ### Rift Development Kit 2


    15 If you have used Pi3D before you can access the program template to set up
    your own models. If not, then change the textures in the Shape demo program. First
    open the LXTerminal and type sudo idle 3 to load Python 3. Select File and open,
    navigate to the following folder /home/pi/python-vrzero/demos and select the shapes.py
    program. Locate line 14 which begins patimg = pi3d (pictured, top of the page).
    This is the first line of code which tells the program which textures to load
    for each shape. There are several after which can also be edited.


    16 Using the folder explorer, click the file icon to navigate to the textures
    in the texture folder /home/pi/python-vrzero/demos/textures. You will see the
    files that are used for the shapes demo. Replace the image file with one of your
    own and then on line 14 of the program change the file name to match your selected
    image file choice. If you don''t want to use your own texture file then you can
    change the file name to one of the other image files listed in the folder. Press
    F5 to save and run the demo. You will notice that the shape textures have changed.


    > Try some other demos

    You may be interested in trying out some other demonstrations which are available
    at https://github.com/pi3d/pi3d_demos. Try riding a Roller Coaster or driving
    a tank! This resource also provides a guide how to create your own models using
    the Pi3D python library and code.


    ### Create a Pi-powered virtual reality setup


    Use Python with Pi


    ### Alter the message


    17 Return to your Python editor and locate line 71. This holds the message which
    is displayed in the shapes VR demo. Change the text to a sentence of your choice.
    Save and run the program. Congratulations you have now begun to modify your own
    VR demos. Experiment with the program files for each of the demos editing the
    textures. For example, how about creating a church made out of chocolate? If you
    want to try other demos, find additional details at https://github.com/pi3d/pi3d_demos.


    ### Use Python with Pi


    Use your Raspberry Pi to find and track your phone


    ### Use your Raspberry Pi to find and track your phone


    ### What you''ll need...


    - Raspberry Pi 3

    - Bluetooth USB dongle (if using an older Pi model)


    Create a program that locates Bluetooth devices and responds to them


    The Raspberry Pi model 3 saw the introduction of embedded Wi-Fi and Bluetooth
    capabilities. This now makes it even easier to interact with Bluetooth-enabled
    devices such as mobile phones, tablets and speakers. The Python programming language
    supports a range of libraries that enable you to interact, monitor and control
    various elements of a Bluetooth device. This tutorial combines the Pi''s Bluetooth
    hardware with Python code to create three simple but useful programs. First, build
    a short program to search for Bluetooth-enabled devices and return the 12-part
    address of each device. Once you have obtained the addresses, you can then scan
    and find Bluetooth services that are available on that particular device. Finally,
    use the Bluetooth address and some conditions to check which devices are present
    in a building and in turn, which people are present or absent in a building, responding
    with a desired action – it''s a kind of automated Bluetooth checking-in system.


    ### Use your Raspberry Pi to find and track your phone


    ### Use Python with Pi


    ### Using Bluetooth


    01 Bluetooth is a wireless standard for exchanging data between devices over short
    distances of between one and ten metres. The current version, Bluetooth v5, was
    notified in June 2016 and has an increased range of over 200 metres. It was released
    in 2017 and will probably be a staple of many IoT devices and applications. Bluetooth
    uses the standard IEEE 802.11, which is the same standard as Wi-Fi. They both
    have similarities such as setting up a connection, transferring and receiving
    files and streaming audio and media content. If you have a Pi 2 or lower, you
    can still create and use these programs by using a Bluetooth USB dongle.


    > Is your dongle working?

    If you are using a USB Bluetooth Dongle then you can check that it is working
    by plugging it in, then restarting your Raspberry Pi by typing the command sudo
    reboot. When reloaded, check that the Dongle has been recognised, load the LX
    Terminal window and type lsusb. This will list all the connected USB devices.
    You can also type hcitool dev to identify the dongle and return its USB address.


    ### Install the required libraries


    02 Although the Raspberry Pi OS image comes with a Bluetooth library for interfacing
    with devices, for this tutorial you will want to control the interface with Python
    code. Load up your Pi and open the LX Terminal window. Check for and update/upgrade
    the OS, typing in lines 1 and 2. Then install the Python development tools, line
    3. Finally install two further Bluetooth development libraries. Once they have
    completed, restart your Pi by typing sudo halt.


    ```

    sudo apt-get update

    sudo apt-get upgrade

    sudo apt-get install python-pip python-dev ipython

    sudo apt-get install bluetooth libbluetooth-dev

    sudo pip install pybluez

    ```


    ### Load Python


    03 Load the LX Terminal and type sudo idle, this will open the Python editor with
    super-user privileges, which will give you access to the USB hardware via Python
    code. Start a new Window and import the first Bluetooth module, line 1. Then add
    a short message to inform the user that the program is searching for nearby devices.


    ```python

    import bluetooth

    print("Searching for device...")

    ```


    ### Search for the names of the devices


    04 The next line of your program searches for the names of the Bluetooth enabled
    devices. Each device must have Bluetooth enabled and be discoverable in order
    to be found. On the next line down, create a variable called nearby_devices to
    store the names and use the code bluetooth.discover_devices to look up the names
    of the devices.


    ```python

    nearby_devices = bluetooth.discover_devices(lookup_names=True)

    ```'
