    # Working with zip files


    # Performing basic file operations


    # Reading environment variables


    35 You can use the module ''zipfile'' to work with zip files.


    37 You can use the module ''shutil'' to perform basic file operation at a high
    level. This module works with your regular files and so will not work with special
    files like named pipes, block devices, and so on.


    39 You can use the module ''os'' to gather up some operating-system-specific information:


    ```

    zipfile.ZipFile(filename [, mode [, compression

    [,allowZip64]]])

    Open a zip file, where the file can be either a path to a file (a string) or a
    file-like object.

    zipfile.close()

    Close the archive file. You must call ''close()'' before exiting your program
    or essential records will not be written.

    zipfile.extract(member [, path [, pwd]])

    Extract a member from the archive to the current working directory; ''member''
    must be its full name (or a zipinfo object). Its file information is extracted
    as accurately as possible. ''path'' specifies a different directory to extract
    to. ''member'' can be a filename or a zipinfo object. ''pwd'' is the password
    used for encrypted files.

    ```


    ```

    shutil.copy(src,dst)

    Copies the file src to the file or directory dst.

    shutil.copymode(src,dst)

    Copies the file permissions from src to dst.

    shutil.move(src,dst)

    Moves a file or directory to dst.

    shutil.copytree(src, dst, symlinks [,ignore])

    Recursively copy an entire directory at src.

    shutil.rmtree(path [, ignore_errors [, onerror]])

    Deletes an entire directory.

    ```


