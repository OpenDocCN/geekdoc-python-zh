    # Work with Python


    **copy (src,dst)**: Copy the src file to the destination directory. In this mode
    permissions bits are copied but metadata is not copied.


    **copy2 (src,dst)**: Same as copy() but also copies the metadata.


    **copytree(src, dst[, symlinks=False[, ignore=None]])**: This is similar to ''cp
    -r'', it allows you to copy an entire directory.


    **ignore_patterns (*patterns)**: ignore_patterns is an interesting function that
    can be used as a callable for copytree(), it allows you to ignore files and directories
    specified by the glob-style patterns.


    **rmtree(path[, ignore_errors[, onerror]])**: rmtree() is used to delete an entire
    directory.


    **move(src,dst)**: Similar to mv command it allows you to recessively move a file
    or directory to a new location.


    Example:


    ```

    from shutil import copytree, ignore_patterns

    copytree(source, destination, ignore=ignore_patterns(''*.pyc'', ''tmp*''))

    ```


    **make_archive(base_name, format[, root_dir[, base_dir[, verbose[, dry_run[, owner[,
    group[, logger]]]]]]])**: Think of this as a replacement for tar, zip, bzip etc.
    make_archive() creates an archive file in the given format such as zip, bztar,
    tar , gztar. Archive support can be extended via Python modules.


    Example:


    ```

    from shutil import make_archive

    import os

    archive_name = os.path.expanduser(os.path.join(''~'', ''ludarchive''))

    root_dir = os.path.expanduser(os.path.join(''~'', ''.ssh''))

    make_archive(archive_name, ''gztar'', root_dir)

    ```


