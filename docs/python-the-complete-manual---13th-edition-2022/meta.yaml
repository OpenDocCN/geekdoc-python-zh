    创建一个定位蓝牙设备并对其做出响应的程序


    树莓派3型引入了嵌入式Wi-Fi和蓝牙功能。这使得与支持蓝牙的设备（如手机、平板电脑和扬声器）进行交互变得更加容易。Python编程语言支持一系列库，使你能够与蓝牙设备的各种元素进行交互、监控和控制。本教程将树莓派的蓝牙硬件与Python代码相结合，创建三个简单但有用的程序。首先，构建一个简短的程序来搜索支持蓝牙的设备并返回每个设备的12位地址。一旦你获得了地址，你就可以扫描并查找该特定设备上可用的蓝牙服务。最后，使用蓝牙地址和一些条件来检查建筑物中存在哪些设备，进而检查哪些人存在或不在建筑物中，并以所需的操作作为响应——这是一种自动化的蓝牙签到系统。


    ### 使用你的树莓派查找和跟踪你的手机


    ### 在树莓派上使用Python


    ### 使用蓝牙


    01 蓝牙是一种无线标准，用于在设备之间通过一到十米的短距离交换数据。当前版本Bluetooth v5于2016年6月发布，范围增加到200多米。它于2017年发布，很可能成为许多物联网设备和应用的主流。蓝牙使用标准IEEE
    802.11，与Wi-Fi相同。它们有相似之处，例如建立连接、传输和接收文件以及流式传输音频和媒体内容。如果你使用的是Pi 2或更低版本，你仍然可以通过使用蓝牙USB加密狗来创建和使用这些程序。


    > 你的加密狗工作正常吗？

    如果你使用的是USB蓝牙加密狗，你可以通过插入它，然后输入命令`sudo reboot`重启树莓派来检查它是否工作。重新加载后，检查加密狗是否已被识别，加载LX
    Terminal窗口并输入`lsusb`。这将列出所有连接的USB设备。你也可以输入`hcitool dev`来识别加密狗并返回其USB地址。


    ### 安装所需的库


    02 尽管树莓派操作系统镜像附带了用于与设备接口的蓝牙库，但在本教程中，你将希望使用Python代码控制接口。启动你的树莓派并打开LX Terminal窗口。检查并更新/升级操作系统，输入第1行和第2行。然后安装Python开发工具（第3行）。最后安装另外两个蓝牙开发库。完成后，输入`sudo
    halt`重启你的树莓派。


    ```

    sudo apt-get update

    sudo apt-get upgrade

    sudo apt-get install python-pip python-dev ipython

    sudo apt-get install bluetooth libbluetooth-dev

    sudo pip install pybluez

    ```


    ### 加载Python


    03 加载LX Terminal并输入`sudo idle`，这将打开具有超级用户权限的Python编辑器，使你能够通过Python代码访问USB硬件。开始一个新窗口并导入第一个蓝牙模块（第1行）。然后添加一条简短的消息，告知用户程序正在搜索附近的设备。


    ```python

    import bluetooth

    print("Searching for device...")

    ```


    ### 搜索设备名称


    04 你程序的下一行搜索支持蓝牙的设备的名称。每个设备必须启用蓝牙并可被发现才能被找到。在下一行，创建一个名为`nearby_devices`的变量来存储名称，并使用代码`bluetooth.discover_devices`来查找设备的名称。


    ```python

    nearby_devices = bluetooth.discover_devices(lookup_names=True)

    ```'
