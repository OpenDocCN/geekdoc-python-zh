    interactive result and a greater sense of accomplishment. Game programming can
    also teach improvisation and advanced mathematics skills for code. We''ll be using
    the fantastic SimpleGUITk module in Python, a very straightforward way of creating
    graphical interfaces based on Tkinter.


    ![](img/3303e52de17b2e01ada468e51372cd68_85_0.png)


    # Python module preparation


    # The SimpleGUI code


    **01** Head to the websites we''ve listed in ''What you''ll need'' and download
    a zip of the source files from the GitHub pages. Update your Raspbian packages
    and then install the following:

    `$ sudo apt-get install python-dev python-setuptools tk8.5-dev tcl8.5-dev`


    **05** The important parts in the draw function are the draw_line, draw_image
    and draw_text functions. These are specifically from SimpleGUI, and allow you
    to easily put these objects on the screen with a position, size and colour. You
    need to tie them to an object, though – in this case, canvas. This tells the software
    that we want to put these items on the screen for people to see.


    # Install the modules


    # Write your code


    **02** Open the terminal and use cd to move to the extracted Pillow folder. Once
    there, type:

    `$ sudo python setup.py install`

    Once that''s complete, move to the simpleguitk folder and use the same command
    to install that as well.


    **03** Launch IDLE 2, rather than IDLE 3, and open a new window. Use the code
    listing to create our game ''Tux for Two''. Be careful to follow along with the
    code to make sure you know what you''re doing. This way, you can make your own
    changes to the game rules if you wish.


    # Set up the game


    # SimpleGUI setup code


    **04** There''s nothing too groundbreaking to start the code: Tux''s and the paddles''
    initial positions are set, along with the initial speed and direction of Tux.
    These are also used when a point is won and the playing field is reset. The direction
    and speed is set to random for each spawn.


    **06** The last parts are purely for the interface. We tell the code what to do
    when a key is depressed and then released, and give it a frame to work in. The
    frame is then told what functions handle the graphics, key functions etc. Finally,
    we give it frame.start() so it starts.'
