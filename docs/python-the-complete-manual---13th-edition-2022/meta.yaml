  md: "# Make web apps with Python\n\n# Introducing Python\n\n![](img/3303e52de17b2e01ada468e51372cd68_30_0.png)\n\
    \n| Issue | Description | Status | Owner |\n|---|---|---|---|\n| 1 | There is\
    \ a problem in that module. | new | max |\n| 2 | Internet is not able to connect\
    \ on the mars server. | accepted | ana |\n| 3 | galactic federation has some issues\
    \ with Star Wars accuracy | started | samfisher |\n| 4 | Moving stairs are stuck\
    \ again. This is the third time it happened today. | started | dumbledore |\n\
    | 5 | Three cells are missing from splinter cell torch | started | samfisher |\n\
    \n{{ variablename }} represents a Django variable. {% block title %} represents\
    \ blocks. Contents of a block are evaluated by Django and are displayed. These\
    \ blocks can be replaced by the child templates.\n\nNow we need to create the\
    \ issue_list.html template. This template is responsible for displaying all the\
    \ issues available in the system.\n\n```\nludissueTracker/ludissueTracker/templates/ludissues/issue_list.html\n\
    {% extends 'base.html' %}\n{% block title %}View Issues - {% endblock %}\n{% block\
    \ content %}\n<table cellspacing=\"0\" class=\"column-options\">\n    <tr>\n \
    \       <th>Issue</th>\n        <th>Description</th>\n        <th>Status</th>\n\
    \        <th>Owner</th>\n    </tr>\n    {% for issue in object_list %}\n    <tr>\n\
    \        <td><a href=\"{% url issue-detail issue.id %}\">{{ issue.id }}</a></td>\n\
    \        <td><a href=\"{% url issue-detail issue.id %}\">{{ issue.name }}</a></td>\n\
    \        <td>{{ issue.status }}</td>\n        <td>{{ issue.owner }}</td>\n   \
    \ </tr>\n    {% endfor %}\n</table>\n{% endblock %}\n```\n\nHere we are inheriting\
    \ the base.html file that we created earlier. {% for issue in object_list %} runs\
    \ on the object sent by the urls.py. Then we are iterating on the object_list\
    \ for issue.id and issue.name.\n\nNow we will create issue_detail.html. This template\
    \ is responsible for displaying the detail view of a case.\n\n```\nludissueTracker/ludissueTracker/templates/ludissues/issue_detail.html\n\
    {% extends 'base.html' %}\n{% block title %}Issue #{{ object.id }} - {% endblock\
    \ %}\n{% block content %}\n<h2>Issue #{{ object.id }} <span>{{ object.status }}</span></h2>\n\
    <div class=\"issue\">\n    <h2>Information</h2>\n    <div class=\"date\">\n  \
    \      <p class=\"cr\">Opened {{ object.opened_on }} ago</p>\n        <p class=\"\
    up\">Last modified {{ object.modified_on }} ago</p>\n    </div>\n    <div class=\"\
    clear\">&nbsp;</div>\n    <div class=\"block w49 right\">\n        <p class=\"\
    ass title\">Owner</p>\n        <p class=\"ass\">{{ object.owner }}</p>\n    </div>\n\
    \    <div class=\"clear\">&nbsp;</div>\n    <div class=\"block\">\n        <p\
    \ class=\"des title\">Summary</p>\n        <p class=\"des\">{{ object.summary\
    \ }}</p>\n    </div>\n</div>\n{% endblock %}\n```\n\nAnd that's everything! The\
    \ issue tracker app is now complete and ready to use. You can now point your browser\
    \ at localhost:8000 to start using the app."
