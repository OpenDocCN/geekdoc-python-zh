    \ Finish off by printing that we are exiting\nprint(\"\\nExiting\")\n```\n\n思考数据类型很重要。我们将数字转换为十进制，以确保在算术运算中不会丢失任何小数部分。\n\
    \nwhile 循环的停止条件必须在代码中的某个时刻得到满足；否则循环将永远不会结束！\n\nprint 函数只能接受字符串数据类型，因此在将任何数字数据类型的变量打印到屏幕之前，我们需要先将它们转换为字符串。\n\
    \n![](img/3303e52de17b2e01ada468e51372cd68_100_0.png)\n\n## 启动 Geany\n\n02 通过进入\
    \ LXDE 菜单并选择程序来启动 Geany。在这里，选择 Geany。进入 Geany 界面后，通过选择“新建（带模板）>main.py”从模板创建一个新的\
    \ Python 文件。删除此模板中的所有内容，只保留第一行：`#!/usr/bin/env python`。这一行很重要，因为它意味着你可以从命令行运行代码，并且\
    \ Bash shell 会知道使用 Python 解释器来打开它。\n\n## 在 Pi 上使用 Python\n\n## 在树莓派上进行 Python\
    \ 编程\n\n## 保存你的工作\n\n03 在编程时，养成使用 Ctrl+S 不断保存工作的习惯总是好的，因为丢失你一直在处理的任何内容都会很可惜。要第一次保存文件，可以按\
    \ Ctrl+S 或转到文件菜单并选择保存。给文件一个合理的名称，并将其保存在你之前创建的整洁文件夹结构中。在编程时保持良好的组织性是一个好习惯，因为当你的项目变得更大更复杂时，这会让事情变得容易得多。\n\
    \n![](img/3303e52de17b2e01ada468e51372cd68_101_0.png)\n\n## 设置\n\n04 在代码中包含详细的注释很重要，因为它允许你记录下你觉得困惑的事情，并记录复杂的流程。如果将来有其他程序员需要处理你的代码，他们会非常感激。首先添加一个注释，描述程序将做什么以及你的名字。所有注释行都以井号（#）开头，不会被\
    \ Python 解释器解释为代码。我们导入 sys 库，以便稍后可以使用 sys.exit 函数来关闭程序。我们还从 decimal 库导入所有内容，因为我们想利用\
    \ decimal 类型。\n\n> “在编程时保持良好的组织性是一个好习惯”\n\n## 变量\n\n05 变量是存储在内存中并可通过名称访问的数据。我们的程序将首先询问你的名字，将其存储在一个变量中，然后打印出欢迎消息。我们将添加一个注释来解释这一点，并创建一个名为\
    \ firstName 的变量。注意我们如何将第二个单词的首字母大写以使其更易于阅读。\n\n我们希望 firstName 变量保存由名为 raw_input\
    \ 的函数返回的值，该函数将询问用户输入。问题通过括号传递给 print 函数，并且由于这是一个字符串，因此用引号括起来。字符串类型基本上是字符的集合。注意我们在冒号后添加了额外的空格，因为用户会在此问题后直接输入他们的输入。\n\
    \n```python\n#!/usr/bin/env python\n\n# An advanced Hello World\n# programming\
    \ in Python v\n# for Linux User and Deve\n\n# Import the sys library f\nimport\
    \ sys\n# Import everything from\ndecimal import *\n```\n\n## 打印消息\n\n06 现在我们在\
    \ firstName 中有了一个值，我们需要向屏幕输出一条欢迎消息。我们在 Python 中使用 print 函数打印到屏幕。print 函数后跟一对括号，括号内包含要打印的值。当对字符串使用加法运算符时，它们会被连接在一起。注意\
    \ firstName 不需要用引号括起来，因为它是变量的名称。如果它被引号括起来，输出的将是文本 firstName。我们通过在输出中添加一个 '\\n'\
    \ 字符（换行符）来结束，以便在开始下一个示例之前留出一个空行。\n\n![](img/3303e52de17b2e01ada468e51372cd68_102_0.png)\n\
    \n![](img/3303e52de17b2e01ada468e51372cd68_102_1.png)\n\n## 测试我们的程序\n\n08 现在我们已经完成了那部分，为什么不测试一下呢？值得注意的是，你必须在运行程序之前保存，否则自上次保存以来你所做的任何操作都不会被\
    \ Python 解释。通过按 F5 键运行程序。通过输入你的名字然后按 Enter 键来输入。完成此操作后，你将看到一条欢迎消息。如果程序以代码 0 退出，则表示一切运行成功。按\
    \ Enter 关闭终端。\n\n## 修复一个小问题\n\n07 我们当前使用的 Debian 镜像在 Geany 中存在一个小的配置错误问题。如果你遇到此问题，可以通过按\
    \ F5 键或转到构建菜单并选择执行来尝试运行你的程序来知道。如果问题存在，则不会发生任何事情，你会看到一条消息说“找不到终端：xterm”。别担心，这很容易修复。转到编辑菜单，然后选择首选项。转到工具选项卡，将终端的值从\
    \ xterm 更改为 lxterminal。\n\n## 处理数字\n\n09 我们将通过基本上重复我们之前做的前几行来询问用户一个数字。一旦用户给我们一个数字，我们将对其进行减半、平方和加倍。raw_input\
    \ 函数将用户输入的值作为字符串返回。字符串是基于文本的值，因此我们不能对其进行算术运算。Python 中的整数类型只能存储整数，而 decimal 类型可以存储带小数的数字。我们将进行一种称为类型转换的操作，这基本上是将一种类型的值转换为另一种类型。我们将把我们的数字字符串转换为\
    \ decimal 值，因为如果我们要对数字进行减半，很可能会涉及小数。如果数字是整数类型，任何小数值都将直接被截断，而不会进行任何舍入。这称为截断。"
