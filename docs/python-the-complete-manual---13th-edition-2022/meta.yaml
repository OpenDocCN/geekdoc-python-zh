  md: "# Using Python on Raspberry Pi\n\n# Use Python with Pi\n\nIt's good practice\
    \ to describe what the program's purpose is at the top of the file. This will\
    \ help you out when working on larger projects with multiple files\n\n```\n#!/usr/bin/env\
    \ python\n\n# An advanced Hello World program that will demonstrate the basics\
    \ of\n# programming in Python via a series of examples. Created by Liam Fraser\n\
    # for Linux User and Developer :: 22/04/2012.\n\n# Import the sys libary for the\
    \ sys.exit function\nimport sys\n# Import everything from the Decimal libary\n\
    from decimal import *\n\n# Get the users first name and output a welcome message\n\
    firstName = raw_input(\"Please enter your first name: \")\nprint(\"Welcome \"\
    \ + firstName + \"\\n\")\n\n# Ask the user for a number and square it, double\
    \ it and halve it\nnumber = raw_input(\"Please enter a number: \")\nnumber = Decimal(number)\n\
    numberHalved = number / 2\nnumberDoubled = number * 2\nnumberSquared = number\
    \ * number\n\n# Print out the values we just worked out, converting each float\
    \ value\n# to a string\nprint(\"The result of halving that number: \" + str(numberHalved))\n\
    print(\"The result of doubling that number: \" + str(numberDoubled))\nprint(\"\
    The result of squaring that number: \" + str(numberSquared))\nprint(\"\")\n\n\
    # The stopping condition for a while loop\nyesOrNo = False\n\n# A while loop that\
    \ will run untill a user enters either \"yes\" or \"no\"\nwhile yesOrNo == False:\n\
    \    result = raw_input(\"Do you want to continue? (yes/no) \")\n\n    if result\
    \ == \"yes\" or result == \"no\":\n        yesOrNo = True\n    else:\n       \
    \ print(\"Error, please type yes or no\" + \"\\n\")\n\n# Deal with the result\n\
    if result == \"yes\":\n    print(\"\\nContinuing\")\nelse:\n    print(\"\\nExiting\"\
    )\n    sys.exit()\n\n# Create the count which will be a stopping condition for\
    \ a while loop\ncount = 1\n\n# Use a while loop to add 5 to the number and output\
    \ the value each time\nprint (\"Incrementing the number by 5\\n\")\nwhile count\
    \ <= 5:\n    number += 1\n    print(\"number + \" + str(count) + \" = \" + str(number))\n\
    \n    # Increment the count:\n    count += 1\n\n# Finish off by printing that\
    \ we are exiting\nprint(\"\\nExiting\")\n```\n\nIt's important to think about\
    \ data types. We convert the number to decimal to make sure that we don't lose\
    \ any decimal numbers during arithmetic\n\nThe stopping condition for a while\
    \ loop has to be satisfied at some point in the code; otherwise the loop will\
    \ never end!\n\nThe print function can only accept string data types, so we need\
    \ to convert any variables with a number data type to a string before we can print\
    \ them to the screen\n\n![](img/3303e52de17b2e01ada468e51372cd68_100_0.png)\n\n\
