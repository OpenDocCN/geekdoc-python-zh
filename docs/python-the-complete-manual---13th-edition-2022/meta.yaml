    def modify_string(original):\n    original += \" that has been modified.\"\n \
    \   # 目前，只有这个字符串的本地副本被修改了\n```\n\n```\ndef modify_string_return(original):\n \
    \   original += \" that has been modified.\"\n    # 然而，我们可以将我们的本地副本返回给调用者。一旦使用\
    \ return 语句，函数就会结束，无论它在函数中的什么位置。\n    return original\n```\n\n我们现在位于 modify_string\
    \ 函数的作用域之外，因为我们减少了缩进级别\n\n在此代码中，测试字符串不会被更改\n\n```\ntest_string = \"This is a test\
    \ string\"\nmodify_string(test_string)\nprint(test_string)\n```\n\n```\ntest_string\
    \ = modify_string_return(test_string)\nprint(test_string)\n```\n\n然而，我们可以这样调用函数\n\
    \n# 函数的返回值存储在变量 test_string 中，覆盖了原始值，因此更改了打印的值。\n\n```\n[liam@liam-laptop Python]$\
    \ ./functions_and_scope.py\nThis is a test string\nThis is a test string that\
    \ has been modified.\n```\n\n作用域是需要掌握的重要内容，否则它可能会让你养成一些坏习惯。让我们编写一个快速程序来演示这一点。它将有一个名为\
    \ `cont` 的布尔变量，该变量将决定是否在 `if` 语句中将数字赋值给一个变量。然而，除了在 `if` 语句的作用域内，该变量在其他任何地方都没有定义。我们将通过尝试打印该变量来结束。\n\
    \n```\n#!/usr/bin/env python2\ncont = False\nif cont:\n    var = 1234\nprint(var)\n\
    ```\n\n在上面的代码段中，Python 会在打印之前将整数转换为字符串。然而，显式地将内容转换为字符串总是一个好主意——尤其是在将字符串连接在一起时。如果你尝试对字符串和整数使用\
    \ `+` 运算符，将会出错，因为不清楚需要发生什么。`+` 运算符通常会将两个整数相加。话虽如此，我们之前演示的 Python 字符串格式化器是更简洁的方法。你能看出问题所在吗？`var`\
    \ 仅在 `if` 语句的作用域内定义。这意味着当我们尝试访问 `var` 时，会得到一个非常严重的错误。\n\n```\n[liam@liam-laptop\
    \ Python]$ ./scope.py\nTraceback (most recent call last):\n  File \"/scope.py\"\
    , line 8, in <module>\n    print var\nNameError: name 'var' is not defined\n```\n\
    \n如果 `cont` 设置为 `True`，那么变量将被创建，我们可以正常访问它。然而，这是一种不好的做法。正确的方法是在 `if` 语句的作用域之外初始化变量。\n\
    \n```\n#!/usr/bin/env python2\n\ncont = False\n\nvar = 0\nif cont:\n    var =\
    \ 1234\n\nif var != 0:\n    print(var)\n```"
