    \ 0.1, 0.1, 0.1\n        Line:\n            rectangle: [self.x, self.y, self.width,\
    \ self.height]\n```\n\nThe canvas declaration is special, underneath it we can\
    \ write any canvas instructions we like. Don't get confused, canvas is not a widget\
    \ and nor are graphics instructions like Line. This is just a special syntax that\
    \ is unique to the canvas. Instructions all have different properties that can\
    \ be set, like the pos and size of the rectangle, and you can check the Kivy documentation\
    \ online for all the different possibilities. The biggest advantage is that although\
