    \ then prints what is being added to the original number, followed by the result.\
    \ Finally, the count is incremented.\n\n### Admire your work\n\n17 Now that we've\
    \ finished coding, save any changes you have made and run your program with the\
    \ F5 key.\n\n## Use Python with Pi\n\n## Use Python to code new creations in Minecraft\n\
    \n### What you'll need...\n\n- Minecraft http://www.mojang.com/games\n- Python\
    \ https://www.python.org\n- McPiFoMo http://rogerthat.co.uk/McPiFoMo.rar\n\n###\
    \ Use Python to code new creations in Minecraft\n\nTap directly into Minecraft\
    \ with Python and produce fantastic creations using Forge mod\n\n![](img/3303e52de17b2e01ada468e51372cd68_105_0.png)\n\
    \nSometimes, Minecraft can seem far more than just a game. It's an incredibly\
    \ creative tool and with the use of Redstone and Command Blocks you can produce\
    \ some amazing worlds. We're taking things a step further by enabling you to plug\
