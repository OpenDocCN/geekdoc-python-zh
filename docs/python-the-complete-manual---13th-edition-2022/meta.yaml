  md: "# Create with Python\n\n# Build tic-tac-toe with Kivy\n\n```\ndef button_pressed(self,\
    \ button):\n    player = {1: 'O', -1: 'X'}\n    colours = {1: (1, 0, 0, 1), -1:\
    \ (0, 1, 0, 1)}  # (r, g, b, a)\n    row, column = button.coords\n    status_index\
    \ = 3*row + column\n    already_played = self.status[status_index]\n    if not\
    \ already_played:\n        self.status[status_index] = self.current_player\n \
    \       button.text = {1: 'O', -1: 'X'}[self.current_player]\n        button.background_color\
    \ = colours[self.current_player]\n        self.current_player *= -1\n```\n\n```\n\
    def on_status(self, instance, new_value):\n    status = new_value\n    sums =\
    \ [sum(status[0:3]),  # rows\n            sum(status[3:6]),\n            sum(status[6:9]),\n\
    \            sum(status[0::3]),  # columns\n            sum(status[1::3]),\n \
    \           sum(status[2::3]),\n            sum(status[::4]),  # diagonals\n \
    \           sum(status[2:-2:2])]\n    if 3 in sums:\n        print('Os win!')\n\
    \    elif -3 in sums:\n        print('Xs win!')\n    elif 0 not in self.status:\
    \  # Grid full\n        print('Draw!')\n```\n\nYou can run your app again to see\
    \ exactly what this did, and you'll find that clicking each button now places\
    \ an 'O' or 'X' as well as a coloured background depending on whose turn it is\
    \ to play. Not only that, but you can only play one move in each button thanks\
    \ to our status array that keeps track of the existing moves.\n\nThis covers the\
    \ basic detection of a won or drawn board, but it only prints the result to stdout.\
    \ At this stage we probably want to reset the board so that the players can try\
    \ again, along with displaying a graphical indicator of the result.\n\nThis is\
    \ enough to play the game but there's one vital element missing... a big pop-up\
    \ telling you when you've won! Before we can do that, we need to add some code\
    \ to check if the game is over.\n\n```\ndef reset(self, *args):\n    self.status\
    \ = [0 for _ in range(9)]\n    for child in self.children:\n        child.text\
    \ = ''\n        child.background_color = (1, 1, 1, 1)\n    self.current_player\
    \ = 1\n```\n\nKivy properties have another useful feature here, whenever they\
    \ change they automatically call an 'on_propertyname' method if it exists and\
    \ dispatch a corresponding event in Kivy's event system. That makes it very easy\
    \ to write code that will run when a property changes, both in Python and kv language.\
    \ In our case we can use it to check the status list every time it is updated,\
    \ doing something special if a player has filled a column, row or diagonal.\n\n\
    Finally, we can modify the `on_status` method to both reset the board and display\
    \ the winner in a 'ModalView' widget.\n\n```\nfrom kivy.uix.modalview import ModalView\n\
    ```"
