    \ is not found. This uses the symbol '!=', which means 'is not'. However, the\
    \ code is checking if it is not 'None' – in other words the device is found. If\
    \ it finds the named device then print out a message, line 2. If it does not find\
    \ the device, line 3, then print out a message to notify the user, line 4. Add\
    \ these lines of code underneath the previous line. Ensuring that your Bluetooth\
    \ is enabled, save and run the program to find your device.\n\n```\nif (device\
    \ != None):\n    print \"TeCoEd is in\"\nelse:\n    print \"Tecoed is out\"\n\
    ```\n\n# Find a different device\n\n15 To find other devices and respond with\
    \ an action, simply use the same sequence of code but first create a different\
    \ variable to store the response in. Add the code on the next line down and remember\
    \ to de-indent it. Rename the variable, for example call it device_one and edit\
    \ the address to match that of the second device.\n\n```\nDevice_one = bluetooth.lookup_name(\"\
    44:67:73:6T:BR:7A\", timeout=5)\n```"
  merge: -1
  pgno: 125
