    \ to do your job.\n\nAbove Fitting to Polynomials\n\n## Work with Python\n\n##\
    \ Python for system administrators\n\n## What you'll need...\n\n**Python-devel**\n\
    Python development libraries, required for compiling third-party Python modules.\n\
    \n**setuptools**\nsetuptools allows you to download, build, install, upgrade,\
    \ and uninstall Python packages with ease.\n\n## Python for system administrators\n\
    \nLearn how Python can help by daring to replace the usual shell scripting...\n\
    \n> **Note**\n> This is written for the Python 2.X series, as it is still the\
    \ most popular and default Python distribution across all the platforms (including\
    \ all Linux distros, BSDs and Mac OS X).\n\nSystem administration is an important\
    \ part of our computing environment. It does not matter whether you are managing\
    \ systems at your work our home. Linux, being a UNIX-based operating system, already\
    \ has everything a system administrator needs, such as the world-class shells\
    \ (not just one but many, including Bash, csh, zsh etc), handy tools, and many\
    \ other features which make the Linux system an administrator's dream. So why\
    \ do we need Python when Linux already has everything built-in? Being a dynamic\
    \ scripting language, Python is very easy to read and learn. That's just not us\
    \ saying that, but many Linux distributions actually use Python in core administrative\
    \ parts. For example, Red Hat (and Fedora) system setup tool Anaconda is written\
    \ in Python (read this line again, got the snake connection?). Also, tools like\
    \ GNU Mailman, CompizConfig Settings Manager (CCSM) and hundreds of tiny GUI and\
    \ non-GUI configuration tools are written using Python. Python does not limit\
    \ you on the choice of user interface to follow – you can build command-line,\
    \ GUI and web apps using Python. This way, it has got covered almost all the possible\
    \ interfaces. Here we will look into executing sysadmin-related tasks using Python.\n\
    \n## Parsing configuration files\n\nConfiguration files provide a way for applications\
    \ to store various settings. In order to write a script that allows you to modify\
    \ settings of a particular application, you should be able to parse the configuration\
    \ file of the application. In this section we learn how to parse INI-style configuration\
    \ files. Although old, the INI file format is very popular with much modern open\
    \ source software, such as PHP and MySQL.\n\nExcerpt for php.ini configuration\
    \ file:\n\n```\n[PHP]\nengine = On\nzend.ze1_compatibility_mode = Off\nshort_open_tag\
    \ = On\nasp_tags = Off\nprecision = 14\ny2k_compliance = On\noutput_buffering\
    \ = 4096\n;output_handler =\nzlib.output_compression = Off\n```\n\n```\nconfig.set('MySQL','mysql.default_host','localhost')\n\
    config.set('MySQL','mysql.default_port','3306')\nconfig.set('MySQL','mysql.allow_persistent','On')\n\
    config.set('MySQL','mysql.max_persistent','20')\n```\n\n```\n[MySQL]\n; Allow\
    \ or prevent persistent links.\nmysql.allow_persistent = On\nmysql.max_persistent\
    \ = 20\nmysql.max_links = -1\nmysql.default_port = 3306\nmysql.default_socket\
    \ =\nmysql.default_host = localhost\nmysql.connect_timeout = 60\nmysql.trace_mode\
    \ = Off\n```\n\n```\nwith open('php.ini', 'ap') as configfile:\n    config.write(configfile)\n\
    ```\n\n```\nOutput:php.ini\n[MySQL]\nmysql.max_persistent = 20\nmysql.allow_persistent\
    \ = On\nmysql.default_port = 3306\nmysql.default_host = localhost\nmysql.trace_mode\
    \ = Off\nmysql.connect_timeout = 60\n```\n\nPython provides a built-in module\
    \ called ConfigParser (known as configparser in Python 3.0). You can use this\
    \ module to parse and create configuration files.\n\n@code: writeconfig.py\n@description:\
    \ The following demonstrates adding MySQL section to the php.ini file.\n@warning:\
    \ Do not use this script with the actual php.ini file, as it's not designed to\
    \ handle all aspects of a complete php.ini file.\n\n```\n@code: parseconfig.py\n\
    @description: Parsing and updating the config file\nimport ConfigParser\nconfig\
    \ = ConfigParser.ConfigParser()\nconfig.read('php.ini')\n# Print config values\n\
    print config.get('MySQL','mysql.default_host')\nprint config.get('MySQL','mysql.default_port')\n\
    config.remove_option('MySQL','mysql.trace_mode')\nwith open('php.ini', 'wb') as\
    \ configfile:\n    config.write(configfile)\n```\n\n```\nimport ConfigParser\n\
    config = ConfigParser.RawConfigParser()\n\nconfig.add_section('MySQL')\nconfig.set('MySQL','mysql.trace_mode','Off')\n\
    config.set('MySQL','mysql.connect_timeout','60')\nconfig.set('MySQL','mysql.default_')\n\
    ```\n\n## Parsing JSON data\n\nJSON (also known as JavaScript Object Notation)\
    \ is a lightweight modern data-interchange format. JSON is an open standard under\
    \ ECMA-262. It is a text format and is completely language-independent. JSON is\
    \ also used as the configuration file format for modern applications such as Mozilla\
    \ Firefox and Google Chrome. JSON is also very popular with modern web services\
    \ such as Facebook, Twitter, Amazon EC2 etc. In this section we will use the Python\
    \ module 'simplejson' to access Yahoo Search (using the Yahoo Web Services API),\
    \ which outputs JSON data.\n\nFor this section we will use the simplejson.load\
    \ function, which allows us to deserialise a JSON object into a Python object.\n\
    \nTo use this section, you should have the following:\n\n1. Python module: simplejson.\n\
    \   Note: You can install Python modules using the command 'easy_install <module\
    \ name>'. This command assumes that you have a working internet connection.\n\
    2. Yahoo App ID:\n   The Yahoo App ID can be created from https://developerapps.yahoo.com/dashboard/createKey.html.\
    \ The Yahoo App ID will be generated on the next page. See the screenshot below\
    \ for details.\n\nsimplejson is very easy to use. In the following example we\
    \ will use the capability of mapping JSON data structures directly to Python data\
    \ types. This gives us direct access to the JSON data without developing any XML\
    \ parsing code.\n\nJSON PYTHON DATA MAPPING\n\n| JSON | Python |\n|---|---|\n\
    | object | dict |\n| array | list |\n| string | unicode |\n| number (int) | int,\
    \ long |\n| number (real) | float |\n| TRUE | TRUE |\n| FALSE | FALSE |\n| null\
    \ | None |\n\n```\n@code: LUDSearch.py\nimport simplejson, urllib\nAPP_ID = 'xxxxxxxx'\
    \ # Change this to your APP ID\nSEARCH_BASE = 'http://search.yahooapis.com/WebSearchService/V1/webSearch'\n\
    \nclass YahooSearchError(Exception):\n    pass\n\ndef search(query, results=20,\
    \ start=1, **kwargs):\n    kwargs.update({\n        'appid': APP_ID,\n       \
    \ 'query': query,\n        'results': results,\n        'start': start,\n    \
    \    'output': 'json'\n    })\n    url = SEARCH_BASE + '?' + urllib.urlencode(kwargs)\n\
    \    result = simplejson.load(urllib.urlopen(url))\n    if 'Error' in result:\n\
    \        # An error occurred; raise an exception\n        raise YahooSearchError,\
    \ result['Error']\n    return result['ResultSet']\n```\n\nLet's use the code listed\
    \ above from the Python shell to see how it works. Change to the directory where\
    \ you have saved the LUDSearch.py and open a Python shell.\n\n```\n@code: Python\
    \ Shell Output. Lines\n```"
