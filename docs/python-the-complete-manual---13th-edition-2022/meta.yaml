    # 注意下面我使用 ==，这与 = 不同。单等号是赋值运算符，而双等号是比较运算符。\n\n```\nif isint == True:\n    # 将整数添加到集合中\n\
    \    ints.append(new_int)\n    # 计数加 1\n    count += 1\n```\n\n到目前为止，用户已经放弃或者我们已经拥有一个填满整数的列表。我们可以通过几种方式遍历这些整数。第一种是使用\
