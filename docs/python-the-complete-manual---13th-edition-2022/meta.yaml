    \ capabilities, among other things. NumPy also supports broadcasting, which is\
    \ a clever way for universal functions to deal in a meaningful way with inputs\
    \ that do not have exactly the same form.\n\nApart from its capabilities, the\
    \ other advantage of NumPy is that it can be integrated into Python programs.\
    \ In other words, you may get your data from a database, the output of another\
    \ program, an external file or an HTML page and then process it using NumPy.\n\
    \nThis article will show you how to install NumPy, make calculations, plot data,\
    \ read and write external files, and it will introduce you to some Matplotlib\
    \ and SciPy packages that work well with NumPy.\n\nNumPy also works with Pygame,\
    \ a Python package for creating games, though explaining its use is unfortunately\
    \ beyond the scope of this article.\n\nIt is considered good practice to try the\
    \ various NumPy commands inside the Python shell before putting them into Python\
    \ programs. The examples in this article use either Python shell or iPython.\n\
    \n> “Apart from its capabilities, the other advantage of NumPy is that it can\
    \ be integrated into Python programs”\n\nA simple Python program for Polynomial\
    \ Fitting\n\n![](img/3303e52de17b2e01ada468e51372cd68_58_0.png)\n\n![](img/3303e52de17b2e01ada468e51372cd68_58_1.png)\n\
    \nMatplotlib generated output\n\nA Python script that uses SciPy to process an\
    \ image\n\n![](img/3303e52de17b2e01ada468e51372cd68_58_2.png)\n\n![](img/3303e52de17b2e01ada468e51372cd68_58_3.png)\n\
    \nFinding help is easy\n\n## Installing NumPy\n\n01 Most Linux distributions have\
    \ a ready-to-install package you can use. After installation, you can find out\
    \ the NumPy version you are using by executing the following:\n\n```\n$ python\n\
    Python 2.7.3 (default, Mar 13 2014, 11:03:55)\n[GCC 4.7.2] on linux2\nType \"\
    help\", \"copyright\", \"credits\" or \"license\" for more information.\n>>> numpy.version.version\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    NameError: name 'numpy' is not defined\n>>> import numpy\n>>> numpy.version.version\n\
    '1.6.2'\n```\n\nNot only have you found the NumPy version but you also know that\
    \ NumPy is properly installed.\n\n## About NumPy\n\n02 Despite its simplistic\
    \ name, NumPy is a powerful Python package that is mainly for working with arrays\
    \ and matrices. There are many ways to create an array but the simplest one is\
    \ to make use of the array() function:\n\n```\n>>> oneD = array([1,2,3,4])\n```\n\
    \nThe aforementioned command creates a one-dimensional array. If you want to create\
    \ a two-dimensional array, you can use the array() function as follows:\n\n```\n\
    >>> twoD = array([ [1,2,3],\n... [3,3,3],\n... [-1,-0.5,4],\n... [0,1,0]] )\n\
    ```\n\nYou can also create arrays with some more dimensions.\n\n## Making simple\
    \ calculations using NumPy\n\n03 Given an array named myArray, you can find the\
    \ minimum and maximum values in it by executing the following commands:\n\n```\n\
    >>> myArray.min()\n>>> myArray.max()\n```\n\nShould you wish to find the mean\
    \ value of all array elements, you can run the next command:\n\n```\n>>> myArray.mean()\n\
    ```\n\nSimilarly, you can find the median of the array by running the following\
    \ Python command:\n\n```\n>>> median(myArray)\n```\n\nThe median value of a set\
    \ is an element that divides the data set into two subsets (left and right subsets)\
    \ with the same number of elements. If the data set has an odd number of elements,\
    \ then the median is part of the data set. On the other side, if the data set\
    \ has an even number of elements, then the median is the mean value of the two\
    \ centre elements of the sorted data set.\n\n> \"When you apply a function to\
    \ an array, the function is automatically applied to all of the array elements\"\
    \n\n## Using arrays with NumPy\n\n04 NumPy not only embraces the indexing methods\
    \ used in typical Python for strings and lists but also extends them. If you want\
    \ to select a given element from an array, you can use the following notation:\n\
    \n```\n>>> twoD[1,2]\n```\n\nYou can also select a part of an array (a slice)\
    \ using the following notation:\n\n```\n>>> twoD[1,1:3]\n```\n\nFinally, you can\
    \ convert an array into a Python list using the tolist() function.\n\n## Reading\
    \ files\n\n05 Imagine that you have just extracted information from an Apache\
    \ log file using AWK and you now want to go and process the text file using NumPy.\
    \ The following AWK code finds out the total number of requests per hour:\n\n\
    ```\n$ cat access.log | cut -d[ -f2 | cut -d] -f1 | awk -F: '{print $2}' | sort\
    \ -n | uniq -c | awk '{print $2, $1}' > timeN.txt\n```\n\nThe format of the text\
    \ file (timeN.txt) with the data is the following:\n\n- 00 191\n- 01 225\n- 02\
    \ 121\n- 03 104\n\nReading the timeN.txt file and assigning it to a new array\
    \ variable can be done as follows:\n\n```\naa = np.loadtxt(\"timeN.txt\")\n```\n\
    \n## Writing to files\n\n06 Writing variables to a file is largely similar to\
    \ reading a file. If you have an array variable named aa1, you can easily save\
    \ its contents into a file called aa1.txt by using the following command:\n\n\
    ```\nIn [17]: np.savetxt(\"aa1.txt\", aa1)\n```\n\nAs you can easily imagine,\
    \ you can read the contents of aa1.txt later by using the loadtxt() function.\n\
    \n## Common functions\n\n07 NumPy supports many numerical and statistical functions.\
    \ When you apply a function to an array, the function is then automatically applied\
    \ to all of the array elements. When working with matrices, you can find the inverse\
    \ of a matrix AA by typing \"AA.I\". You can also find its eigenvalues by typing\
    \ \"np.linalg.eigvals(AA)\" and its eigenvector by typing \"np.linalg.eig(BB)\"\
    .\n\n## Working with matrices\n\n08 A special subtype of a two-dimensional NumPy\
    \ array is a matrix. A matrix is like an array except that matrix multiplication\
    \ replaces element-by-element multiplication. Matrices are generated using the\
    \ matrix (or mat) function as follows:\n\n```\nIn [2]: AA = np.mat('0 1 1; 1 1\
    \ 1; 1 1 1')\n```\n\nYou can add matrices named AA and BB by typing AA + BB. Similarly,\
    \ you can multiply them by typing AA * BB.\n\n## Plotting with Matplotlib\n\n\
    09 The first move you should make is to install Matplotlib. As you can see, Matplotlib\
    \ has many dependencies that you should also install. The first thing you will\
    \ learn is how to plot a polynomial function. The necessary commands for plotting\
    \ the 3x^2-x+1 polynomial are the following:\n\n```\nimport numpy as np\nimport\
    \ matplotlib.pyplot as plt\nmyPoly = np.poly1d(np.array([3, -1, 1]).astype(float))\n\
    x = np.linspace(-5, 5, 100)\ny = myPoly(x)\nplt.xlabel('x values')\nplt.ylabel('f(x)\
    \ values')\nxticks = np.arange(-5, 5, 10)\nyticks = np.arange(0, 100, 10)\nplt.xticks(xticks)\n\
    plt.yticks(yticks)\nplt.grid(True)\nplt.plot(x,y)\n```\n\nThe variable that holds\
    \ the polynomial is myPoly. The range of values that will be plotted for x is\
    \ defined using \"x = np.linspace(-5, 5, 100)\". The other important variable\
    \ is y, which calculates and holds the values of f(x) for each x value.\n\nIt\
    \ is important that you start ipython using the \"ipython --pylab=qt\" parameters\
    \ in order to see the output on your screen. If you are interested in plotting\
    \ polynomial functions, you should experiment more, as NumPy can also calculate\
    \ the derivatives of a function and plot multiple functions in the same output.\n\
    \n> “Try the various NumPy commands inside the Python shell”\n\n## Using SciPy\
    \ for image processing\n\n## About SciPy\n\n10 SciPy is built on top of NumPy\
    \ and is significantly more advanced than NumPy. It supports numerical integration,\
    \ optimisations, signal processing, image and audio processing, and statistics.\
    \ For reference, the example below uses just one small part of the scipy.stats\
    \ package about statistics.\n\n> \"For plotting polynomial functions, experiment\
    \ more\"\n\n```\nIn [36]: from scipy.stats import poisson, lognorm\nIn [37]: mySh\
    \ = 10;\nIn [38]: myMu = 10;\nIn [39]: ln = lognorm(mySh)\nIn [40]: p = poisson(myMu)\n\
    In [41]: ln.rvs((10,))\nOut[41]: array([  9.29393114e-02,   1.15957068e+01,  \
    \ 9.78411983e+01,\n         8.26370734e-07,   5.64451441e-03,   4.61744055e-09,\n\
    \         4.98471222e-06,   1.45947948e+02,   9.25502852e-06,\n         5.87353720e-02])\n\
    In [42]: p.rvs((10,))\nOut[42]: array([12, 11,  9,  9,  9, 10,  9,  4, 13,  8])\n\
    In [43]: ln.pdf(3)\nOut[43]: 0.013218067177522842\n```\n\nThe example uses two\
    \ statistics distributions and may be difficult to understand, but it is presented\
    \ in order to give you a better taste of SciPy commands.\n\n11 Now we will show\
    \ you how to process and transform a PNG image using SciPy. The most important\
    \ part of the code is the following line:\n\n```\nimage = np.array(Image.open('SA.png').convert('L'))\n\
    ```\n\nThis line allows you to read a usual PNG file and convert it into a NumPy\
    \ array for additional processing. The program will also separate the output into\
    \ four parts and displays a different image for each of these four parts.\n\n\
    ## Other useful functions\n\n12 It is very useful to be able to find out the data\
    \ type of the elements in an array; it can be done using the dtype() function.\
    \ Similarly, the ndim() function returns the number of dimensions of an array.\n\
    \nWhen reading data from external files, you can save their data columns into\
    \ separate variables using the following method:\n\n```\nIn [10]: aa1,aa2 =\n\
    ```\n\n![](img/3303e52de17b2e01ada468e51372cd68_61_0.png)"
