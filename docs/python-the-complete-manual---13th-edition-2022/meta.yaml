    should know that array broadcasting has a rule: in order for two arrays to be
    considered for array broadcasting, "the size of the trailing axes for both arrays
    in an operation must either be the same size or one of them must be one."


    Put simply, array broadcasting allows NumPy to "change" the dimensions of an array
    by filling it with data in order to be able to do calculations with another array.
    Nevertheless, you cannot stretch both dimensions of an array to do your job.


