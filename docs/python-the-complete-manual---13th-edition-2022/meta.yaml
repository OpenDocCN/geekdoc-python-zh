    \ —— 意思是 '不等于'。\n\n我们创建一个名为 'result' 的变量，它保存问题的结果：你想继续吗？然后我们用 if 语句检查这个结果是否有效。注意\
    \ 'or' 运算符，它允许测试两个条件。如果用户输入了正确的值，那么我们将 yesOrNo 设置为 True，这将在下一次运行时停止 while 循环。否则，我们将输出一条错误消息，while\
    \ 循环将再次运行。用户可以随时在终端使用 Ctrl+C 命令退出程序。\n\n![](img/3303e52de17b2e01ada468e51372cd68_103_0.png)\n\
