  md: '# 50 Python tips


    # Introducing Python


    # Calculating maximum, minimum and sum


    27 You can use the following built-in functions.

    **max**: Returns the largest element in the list.

    **min**: Returns the smallest element in the list.

    **sum**: This function returns the sum of all elements in the list. It accepts
    an optional second argument: the value to start with when summing (defaults to
    0).


    # Representing fractional numbers


    28 Fraction instance can be created in Python using the following constructor:

    Fraction([numerator [, denominator]])


    # Performing math operations


    29 The ''math'' module provides a plethora of mathematical functions. These functions
    work on integer and float numbers, except complex numbers. For complex numbers,
    a separate module is used, called ''cmath''.

    **For example:**

    math.acos(x): Return arc cosine of x.

    math.cos(x): Returns cosine of x.

    math.factorial(x): Returns x factorial.


    # Working with arrays


    30 The ''array'' module provides an efficient way to use arrays in your programs.
    The ''array'' module defines the following type:

    array(typecode [, initializer])

    Once you have created an array object, say myarray, you can apply a bunch of methods
    to it. Here are a few important ones:

    myarray.count(x): Returns the number of occurrences of x in a.

    myarray.extend(x): Appends x at the end of the array.

    myarray.reverse(): Reverse the order of the array.


    # Sorting items


    31 The ''bisect'' module makes it very easy to keep lists in any possible order.
    You can use the following functions to order lists.

    bisect.insort(list, item [, low [, high]])

    Inserts item into list in sorted order. If item is already in the list, the new
    entry is inserted to the right of any existing entries there.

    bisect.insort_left(list, item [, low [, high]])

    Inserts item into list in sorted order. If item is already within the list, the
    new entry is inserted to the left of any existing entries.


    # Using regular expression-based search


    32 The ''re'' module makes it very easy to use regexp-based searches. You can
    use the function ''re.search()'' with a regexp-based expression. Check out the
    example included below.

    **Example:**

    >>> import re

    >>> s = "Kunal is a bad boy"

    >>> if re.search("K", s):

    print "Match!" # char literal

    ...

    Match!

    >>> if re.search("[A-Z]", s):

    print "Match!" # char class

    ... # match either at-sign or capital letter

    Match!

    >>> if re.search("\d", s):

    print "Match!" # digits class

    ...


    # Working with bzip2 (.bz2) compression format


    33 You can use the module ''bz2'' to read and write data using the bzip2 compression
    algorithm.

    bz2.compress(): For bz2 compression

    bz2.decompress(): For bz2 decompression

    **Example:**

    # File: bz2-example.py

    import bz2

    MESSAGE = "Kunal is a bad boy"

    compressed_message = bz2.compress(MESSAGE)

    decompressed_message = bz2.decompress(compressed_message)

    print "original:", repr(MESSAGE)

    print "compressed message:", repr(compressed_message)

    print "decompressed message:", repr(decompressed_message)

    **Output:**

    [~/src/python $] python bz2-example.py

    original: ''Kunal is a bad boy''

    compressed message: ''BZh91AY&SY\xc4\xf6\x98\x00\x02\x15\x80\x80\x00\x04\%\x8a\x00\x00\x0c\x84\r\x0C\xa2\xb0\xd6s\xa5\xb3\x19\x00\xf8\xbb\x92\)\xc2\x84\x86
    \x0c\x0''

    decompressed message: ''Kunal is a bad boy''


    > "There are tools to help develop with Python"'
