    \ you can see how you could add a barrier to the two threads (above):\n\n```\n\
    barrier1 = threading.Barrier(2)\ndef func1():\n    ....\n    barrier1.wait()\n\
    \    ....\ndef func2():\n    ....\n    barrier1.wait()\n    ....\n```\n\nIn the\
