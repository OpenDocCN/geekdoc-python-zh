  md: "# Build tic-tac-toe with Kivy\n\n# Create with Python\n\nentry point for the\
    \ creation of our GUI. We can start by making the simplest Kivy app possible:\n\
    \n```\nfrom kivy.app import App\n\nclass TicTacToeApp(App):\n    pass\n\nif __name__\
    \ == \"__main__\":\n    TicTacToeApp().run()\n```\n\n![](img/3303e52de17b2e01ada468e51372cd68_80_0.png)\n\
    \nYou can already run this, your app will start up and you'll get a plain black\
    \ window. Exciting!\n\nWe can build our own GUI out of Kivy widgets. Each is a\
    \ simple graphics element with some specific behaviour of its own ranging from\
    \ standard GUI functionality (eg the Button, Label or TextInput), to those that\
    \ impose positioning on their child widgets (eg the BoxLayout, FloatLayout or\
    \ GridLayout), to those abstracting a more involved task like interacting with\
    \ hardware (eg the FileChooser, Camera or VideoPlayer). Most importantly, Kivy's\
    \ widgets are designed to be easily combined - rather than including a widget\
    \ for every need imaginable, widgets are kept simple but are easy to join to invent\
    \ new interfaces. We'll see some of that in this tutorial.\n\nSince 'Hello World!'\
    \ is basically compulsory in any programming tutorial, let's get it over with\
    \ by using a simple 'Label' widget to display the text:\n\n```\nfrom kivy.uix.label\
    \ import Label\n```\n\nWe'll display the 'Label' by returning it as our app's\
    \ root widget. Every app has a single root widget, the top level of its widget\
    \ tree, and it will automatically be sized to fill the window. We'll see later\
    \ how to construct a full GUI by adding more widgets for this one, but for now\
    \ it's enough to set the root widget by adding a new method to the 'App':\n\n\
    **Above** The game with final additions, making the grid square and extending\
    \ the interface\n\n```\ndef build(self):\n    return Label(text='Hello World!',\n\
    \                 font_size=100,\n                 color=(0, 1, 0, 1))  # (r,\
    \ g, b, a)\n```\n\nThe 'build' method is called when the 'App' is run, and whatever\
    \ widget is returned automatically becomes the root widget of that App'. In our\
    \ case that's a Label, and we've set several properties - the 'text', 'font_size'\
    \ and 'color'. All widgets have different properties controlling aspects of their\
    \ behaviour, which can be dynamically updated to alter their appearance later,\
    \ though here we set them just once upon instantiation.\n\nNote that these properties\
    \ are not just Python attributes but instead Kivy properties. These are accessed\
    \ like normal attributes but provide extra functionality by hooking into Kivy's\
    \ event system. We'll see examples of creating properties shortly, and you should\
    \ do the same if you want to use your variables with Kivy's event or binding functionality.\n\
    \nThat's all you need to show some simple text, so run the program again to check\
    \ that this does work. You can experiment with the parameters if it's unclear\
    \ what any of them are doing."
