    \ The output from the above program is as follows:\n\n```\n[liam@liam-laptop Python]$\
    \ ./construct.py\nHow many integers? acd\nYou must enter an integer\n\n[liam@liam-laptop\
    \ Python]$ ./construct.py\nHow many integers? 3\nPlease enter integer 1: t\nYou\
    \ must enter an integer\nPlease enter integer 1: 5\nPlease enter integer 2: 2\n\
    Please enter integer 3: 6\nUsing a for loop\n5\n2\n6\nUsing a while loop\n5\n\
    2\n6\n```\n\n> “The ‘for’ loop uses a local copy, so changes in the loop won’t\
    \ affect the list”\n\n## Full code listing\n\nThe number of integers we want in\
    \ the list\n\n```\n#!/usr/bin/env python2\n\n# We're going to write a program\
    \ that will ask the\n# user to input an arbitrary\n# number of integers, store\
    \ them in a collection,\n# and then demonstrate how the\n# collection would be\
    \ used with various control\n# structures.\n\nimport sys # Used for the sys.exit\
    \ function\n\ntarget_int = raw_input(\"How many integers? \")\n\n# By now, the\
    \ variable target_int contains a string representation of\n# whatever the user\
    \ typed. We need to try and convert that to an integer but\n# be ready to deal\
    \ with the error if it's not. Otherwise the program will\n# crash.\ntry:\n   \
    \ target_int = int(target_int)\nexcept ValueError:\n    sys.exit(\"You must enter\
    \ an integer\")\n\nints = list()\n\ncount = 0\n```\n\nA list to store the integers\n\
    \nThese are used to keep track of how many integers we currently have\n\nIf the\
    \ above succeeds then isint will be set to true: isint = True\n\n```\n# Keep asking\
    \ for an integer until we have the required number\nwhile count < target_int:\n\
    \    new_int = raw_input(\"Please enter integer {0}: \".format(count + 1))\n \
    \   isint = False\n    try:\n        new_int = int(new_int)\n    except:\n   \
    \     print(\"You must enter an integer\")\n```\n\n# Only carry on if we have\
    \ an integer. If not, we'll loop again\n# Notice below I use ==, which is different\
    \ from =. The single equals is an assignment operator whereas the double equals\
    \ is a comparison operator.\n\n```\nif isint == True:\n    # Add the integer to\
    \ the collection\n    ints.append(new_int)\n    # Increment the count by 1\n \
    \   count += 1\n```\n\nBy now, the user has given up or we have a list filled\
    \ with integers. We can loop through these in a couple of ways. The first is with\
    \ a for loop\n\n```\nprint(\"Using a for loop\")\nfor value in ints:\n    print(str(value))\n\
    ```\n\n# Or with a while loop:\nprint(\"Using a while loop\")\n# We already have\
    \ the total above, but knowing the len function is very useful.\ntotal = len(ints)\n\
    count = 0\nwhile count < total:\n    print(str(ints[count]))\n    count += 1\n\
    \n## More about a Python list\n\nA Python list is similar to an array in other\
    \ languages. A list (or tuple) in Python can contain data of multiple types, which\
    \ is not usually the case with arrays in other languages. For this reason, we\
    \ recommend that you only store data of the same type in a list. This should almost\
    \ always be the case anyway due to the nature of the way data in a list would\
    \ be processed.\n\n## Functions and variable scope\n\nFunctions are used in programming\
    \ to break processes down into smaller chunks. This often makes code much easier\
    \ to read. Functions can also be reusable if designed in a certain way. Functions\
    \ can have variables passed to them. Variables in Python are always passed by\
    \ value, which means that a copy of the variable is passed to the function that\
    \ is only valid in the scope of the function. Any changes made to the original\
    \ variable inside the function will be discarded. However, functions can also\
    \ return values, so this isn't an issue. Functions are defined with the keyword\
    \ def, followed by the name of the function. Any variables that can be passed\
    \ through are put in brackets following the function's name. Multiple variables\
    \ are separated by commas. The names given to the variables in these brackets\
    \ are the ones that they will have in the scope of the function, regardless of\
    \ what the variable that's passed to the function is called.\nLet's see this in\
    \ action. The output from the program opposite is as follows:\n\n> “Functions\
    \ are defined with the keyword def, then the name of the function”\n\n```\n#!/usr/bin/env\
    \ python2 # Below is a function called modify_string, which accepts a variable\n\
    # that will be called original in the scope of the function. Anything indented\
    \ with 4 spaces\n# under the function definition is in the scope.\ndef modify_string(original):\n\
    \    original += \" that has been modified.\"\n    # At the moment, only the local\
    \ copy of this string has been modified\n```\n\n```\ndef modify_string_return(original):\n\
    \    original += \" that has been modified.\"\n    # However, we can return our\
    \ local copy to the caller. The function ends as soon as the return\n    # statement\
    \ is used, regardless of where it is in the function.\n    return original\n```\n\
    \nWe are now outside of the scope of the modify_string function, as we have reduced\
    \ the level of indentation\n\nThe test string won't be changed in this code\n\n\
    ```\ntest_string = \"This is a test string\"\nmodify_string(test_string)\nprint(test_string)\n\
    ```\n\n```\ntest_string = modify_string_return(test_string)\nprint(test_string)\n\
    ```\n\nHowever, we can call the function like this\n\n# The function's return\
    \ value is stored in the variable test_string, overwriting the original and therefore\
    \ changing the value that is printed.\n\n```\n[liam@liam-laptop Python]$ ./functions_and_scope.py\n\
    This is a test string\nThis is a test string that has been modified.\n```\n\n\
    Scope is an important thing to get the hang of, otherwise it can get you into\
    \ some bad habits. Let's write a quick program to demonstrate this. It's going\
    \ to have a Boolean variable called cont, which will decide if a number will be\
    \ assigned to a variable in an if statement. However, the variable hasn't been\
    \ defined anywhere apart from in the scope of the if statement. We'll finish off\
    \ by trying to print the variable.\n\n```\n#!/usr/bin/env python2\ncont = False\n\
    if cont:\n    var = 1234\nprint(var)\n```\n\nIn the section of code above, Python\
    \ will convert the integer to a string before printing it. However, it's always\
    \ a good idea to explicitly convert things to strings – especially when it comes\
    \ to concatenating strings together. If you try to use the + operator on a string\
    \ and an integer, there will be an error because it's not explicitly clear what\
    \ needs to happen. The + operator would usually add two integers together. Having\
    \ said that, Python's string formatter that we demonstrated earlier is a cleaner\
    \ way of doing that. Can you see the problem? var has only been defined in the\
    \ scope of the if statement. This means that we get a very nasty error when we\
    \ try to access var.\n\n```\n[liam@liam-laptop Python]$ ./scope.py\nTraceback\
    \ (most recent call last):\n  File \"/scope.py\", line 8, in <module>\n    print\
    \ var\nNameError: name 'var' is not defined\n```\n\nIf cont is set to True, then\
    \ the variable will be created and we can access it just fine. However, this is\
    \ a bad way to do things. The correct way is to initialise the variable outside\
    \ of the scope of the if statement.\n\n```\n#!/usr/bin/env python2\n\ncont = False\n\
    \nvar = 0\nif cont:\n    var = 1234\n\nif var != 0:\n    print(var)\n```"
  mdcn: "## 入门指南\n\n## Python 入门\n\n结构包括：以下是你在使用 Python 时应该了解的项目：\n\n-   `for` 语句，允许你遍历集合中的项目，或将一段代码重复执行特定次数；\n\
