    \n在我们进行任何操作之前，我们需要为每种游戏对象创建一个类，我们将预先填充一些稍后需要用来控制它们的属性。还记得上次吗，Kivy属性是在类级别声明的特殊属性，它们（除其他功能外）可以通过kv语言修改，并在修改时触发事件。`Game`类将是一个包含整个游戏的大控件。我们特意将其设为`FloatLayout`的子类，因为这种特殊的布局能够根据其自身的位置和尺寸来按比例定位和调整其子控件的大小——因此，无论我们在哪里运行它或如何调整窗口大小，它都会适当地放置所有游戏对象。\n\
    \n接下来，我们可以使用Kivy的图形指令在我们的控件上绘制各种形状。我们将只演示简单的矩形来展示它们的位置，尽管还有许多更高级的选项你可能想要研究。在Python文件中，我们可以通过在任何控件的画布上声明指令来应用任何指令，图03展示了一个示例。\n\
    \n```\nfrom kivy.graphics.context_instructions import Color\nfrom kivy.graphics.vertex_instructions\
