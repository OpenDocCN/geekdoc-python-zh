    can be used as a callable for copytree(), it allows you to ignore files and directories
    specified by the glob-style patterns.


    **rmtree(path[, ignore_errors[, onerror]])**: rmtree() is used to delete an entire
    directory.


    **move(src,dst)**: Similar to mv command it allows you to recessively move a file
    or directory to a new location.


