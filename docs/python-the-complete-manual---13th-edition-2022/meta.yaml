    **make_archive(base_name, format[, root_dir[, base_dir[, verbose[, dry_run[, owner[,
    group[, logger]]]]]]])**：可以将其视为tar、zip、bzip等的替代品。make_archive()创建指定格式（如zip、bztar、tar、gztar）的归档文件。归档支持可以通过Python模块扩展。


    示例：


