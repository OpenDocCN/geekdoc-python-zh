    ## SECTION 2: IPython: a ready-made Python system shell replacement


    In section 1 we have introduced you to the Python modules which allow you to do
    system shell-related tasks very easily using vanilla Python. Using the same features,
    you can build a fully featured shell and remove a lot of Python boilerplate code
    along the way. However, if you are kind of person who wants everything ready-made,
    you are in luck. IPython provides a powerful and interactive Python shell which
    you can use as your primary shell. IPython supports Python 2.6 to 2.7 and 3.1
    to 3.2. It supports two type of Python shells: Terminal based and Qt based.


    Just to reiterate, IPython is purely implemented in Python and provides a 100%
    Python-compliant shell interface, so everything that you have learnt in section
    1 so far can be run inside IPython without any problems.


    IPython is already available in most Linux distributions. Search your distro''s
    repositories to look for it. In case you are not able to find it, you can also
    install it using easy_install or PyPI.


    IPython provides a lot of interesting features which makes it a great shell replacement...


    **Tab completion:** Tab completion provides an excellent way to explore any Python
    object that you are working with. It also helps you to avoid making typos.


    **Example:**


    ```

    In [3]: import o {hit tab}

    objc    opcode    operator    optparse    os    os2emxpath


    In [3]: import os


    In [4]: os.p {hit tab}

    os.pardir    os.pathconf_names    os.popen    os.popen4

    os.path    os.pathsep    os.popen2    os.putenv

    os.pathconf    os.pipe    os.popen3

    ```


    **Built In Object Explorer:** You can add ''?'' after any Python object to view
    its details such as Type, Base Class, String Form, Namespace, File and Docstring.


    Example:


    ```

    In [28]: os.path?

    Type:        module

    Base Class: <type ''module''>

    String Form:<module ''posixpath'' from ''/System/Library/Frameworks/Python.framework/Versions/2.7/lib/python2.7/posixpath.pyc''>

    Namespace:  Interactive

    File:        /System/Library/Frameworks/Python.framework/Versions/2.7/lib/python2.7/posixpath.py

    Docstring:

    Common operations on POSIX pathnames.

    ```


    Instead of importing this module directly, import os and refer to this module
    as os.path. The ''os.path'' name is an alias for this module on POSIX systems;
    on other systems (eg Mac, Windows), os.path provides the same operations in a
    manner specific to that platform, and is an alias to another module (eg macpath,
    ntpath).

    Some of this can actually be useful on non-POSIX systems too, eg for manipulation
    of the pathname component of URLs. You can also use double question marks (??)
    to view the source code for the relevant object.


    **Magic functions:** IPython comes with a set of predefined ''magic functions''
    that you can call with a command-line-style syntax. IPython ''magic'' commands
    are conventionally prefaced by %, but if the flag %automagic is set to on, then
    you can call magic commands without the %. To view a list of available magic functions,
    use ''magic function %lsmagic''. They include functions that work with code such
    as %run, %edit, %macro, %recall etc; functions that affect shell such as %colors,
    %xmode, %autoindent etc; and others such as %reset, %timeit, %paste etc. Most
    cool features of IPython are powered using magic functions.


    Example:


    ```

    In [45]: %lsmagic

    Available magic functions:

    %alias  %autocall  %autoindent  %automagic  %bookmark  %cd

    %colors  %cpaste  %debug  %dhist  %dirs  %doctest_mode  %ed

    %edit  %env  %gui  %hist  %history  %install_default_config

    %install_profiles  %load_ext  %loadpy  %logoff  %logon

    %logstart  %logstate  %logstop  %lsmagic  %macro  %magic

    %page %paste %pastebin %pdb %pdef %pdoc %pfile

    %pinfo %pinfo2 %popd %pprint %precision %profile %prun

    %psearch %psource %pushd %pwd %pycat %pylab %quickref

    %recall %rehashx %reload_ext %rep %rerun %reset

    %reset_selective %run %save %sc %sx %tb %time %timeit

    %unalias %unload_ext %who %who_ls %whos %xdel %xmode

    ```


    Automagic is OFF, % prefix IS needed for magic functions. To view help on any
    Magic Function, call ''%somemagic?'' to read its docstring.


    **Python script execution and runtime code editing:** You can use %run to run
    any Python script. You can also control-run the Python script with pdb debugger
    using -d, or pdn profiler using -p. You can also edit a Python script using the
    %edit command which opens the given Python script in the editor defined by the
    $EDITOR environment variable.


    **Shell command support:** To just run a shell command, prefix the command with
    !.


    Example:


    ```

    In [5]: !ps

    PID TTY TIME CMD

    4508 ttys000 0:00.07 -bash

    84275 ttys001 0:00.03 -bash

    17958 ttys002 0:00.18 -bash

    ```


    ```

    In [8]: !clang prog.c -o prog

    prog.c:2:1: warning: type specifier missing, defaults to ''int'' [-Wimplicit-int]

    main()

    ^~~~

    1 warning generated.

    ```


    **Qt console:** IPython comes with a Qt-based console. This provides features
    only available in a GUI, like inline figures, multiline editing with syntax highlighting,
    and graphical calltips. Start the Qt console with:


    ```

    $ ipython qtconsole

    ```


    If you get errors about missing modules, ensure that you have installed dependent
    packages – PyQt, pygments, pyexpect and ZeroMQ.


    **Conclusion**


    As you can see, it''s easy to tailor Python for all your shell environment needs.
    Python modules like os, subprocess and shutil are available at your disposal to
    do just about everything you need using Python. IPython turns this whole experience
    into an even more complete package. You get to do everything a standard Python
    shell does and with much more convenient features. IPython''s magic functions
    really do provide a magical Python shell experience. So next time you open a Bash
    session, think again: why settle for gold when platinum is a step away?'
