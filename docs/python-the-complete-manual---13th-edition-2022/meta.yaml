    ![](img/3303e52de17b2e01ada468e51372cd68_125_0.png)\n\n## 查找设备和人\n\n13 在步骤 7 中，你使用了一个简短的程序来发现支持蓝牙的设备，并检查和返回设备的地址。现在使用\
    \ `bluetooth.lookup_name` 代码行来搜索特定设备并返回是否找到它。如果找到，则设备存在；如果未找到，我们可以假设设备不在。但是，请记住蓝牙可能已关闭。在你的\
    \ Python 程序中添加定位设备的行，将示例地址替换为你想要定位的设备的地址。\n\n```\ndevice = bluetooth.lookup_name(\"\
