    \n```\nif (device != None):\n    print \"TeCoEd is in\"\nelse:\n    print \"Tecoed\
    \ is out\"\n```\n\n## 查找不同的设备\n\n15 要查找其他设备并响应操作，只需使用相同的代码序列，但首先创建一个不同的变量来存储响应。在下一行添加代码，并记得取消缩进。重命名变量，例如将其命名为\
