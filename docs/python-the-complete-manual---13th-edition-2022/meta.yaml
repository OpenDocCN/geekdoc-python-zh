- md: "## Build an app for Android with Python\n\nMaster Kivy, the excellent cross-platform\
    \ application framework to make your first Android app...\n\n![](img/3303e52de17b2e01ada468e51372cd68_31_0.png)\n\
    \nThe great thing about Kivy is there are loads of directions we could take it\
    \ in to do some pretty fancy things. But, we're going to make a beeline for one\
    \ of Kivy's coolest features - the ability it affords you to easily run your programs\
    \ on Android.\n\nWe'll approach this by first showing how to make a new app, this\
    \ time a dynamic Breakout-style game. We'll then be able to compile this straight\
    \ to an Android APK that you can use just like any other.\n\nOf course, once you\
    \ have mastered the basic techniques you aren't limited to using any particular\
    \ kind of app, as even on Android you can make use of all your favourite Python\
    \ libraries to make any sort of program you like.\n\nOnce you've mastered Kivy,\
    \ your imagination is the only limit. If you're pretty new to Kivy, don't worry,\
    \ we won't assume that you have any pre-existing knowledge. As long as you have\
    \ mastered some of the Python in this book so far, and have a fairly good understanding\
    \ of the language, you shouldn't have any problems following along with this.\n\
    \nBefore anything else, let's throw together a basic Kivy app (Fig. 01). We've\
    \ pre-imported the widget types we'll be using, which this time are just three:\
    \ the basic Widget with no special behaviour, the ModalView with a pop-up behaviour\
    \ as used last time, and the FloatLayout as we will explain later. Kivy has many\
    \ other pre-built widgets for creating GUIs, but this time we're going to focus\
    \ on drawing the whole GUI from scratch using Kivy's graphics instructions. These\
    \ comprise either vertex instructions to create shapes (including rectangles,\
    \ lines, meshes, and so on) or contextual graphics changes (such as translation,\
    \ rotation, scaling, etc), and are able to be drawn anywhere on your screen and\
    \ on any widget type.\n\nBefore we can do any of this we'll need a class for each\
    \ kind of game object, which we're going to pre-populate with some of the properties\
    \ that we'll need later to control them. Remember from last time, Kivy properties\
    \ are special attributes declared at class level, which (among other things) can\
    \ be modified via kv language and dispatch events when they are modified. The\
    \ Game class will be one big widget containing the entire game. We've specifically\
    \ made it a subclass of FloatLayout because this special layout is able to position\
    \ and size its children in proportion to its own position and size – so no matter\
    \ where we run it or how much we resize the window, it will place all the game\
    \ objects appropriately.\n\nNext we can use Kivy's graphics instructions to draw\
    \ various shapes on our widgets. We'll just demonstrate simple rectangles to show\
    \ their locations, though there are many more advanced options you might like\
    \ to investigate. In a Python file we can apply any instruction by declaring it\
    \ on the canvas of any widget, an example of which is shown in Fig. 03.\n\n```\n\
    from kivy.graphics.context_instructions import Color\nfrom kivy.graphics.vertex_instructions\
    \ import Rectangle\n```\n\n```\nclass Player(Widget):\n    def __init__(self,\
    \ **kwargs):\n        super(Player, self).__init__(**kwargs)\n        with self.canvas:\n\
    \            Color(1, 0, 0, 1)  # r, g, b, a -> red\n            Rectangle(pos=self.pos,\
    \ size=self.size)\n            # or without the with syntax, self.canvas.add(...)\n\
    ```\n\nThis would draw a red rectangle with the same position and size as the\
    \ player at its moment of instantiation – but this presents a problem, unfortunately,\
    \ because the drawing is static. When we later go on to move the player widget,\
    \ the red rectangle will stay in the same place, while the widget will be invisible\
    \ when it is in its real position.\n\nWe could fix this by keeping references\
    \ to our canvas instructions and repeatedly updating their properties to track\
    \ the player, but there's actually an easier way to do all of this - we can use\
    \ the Kivy language we introduced last time. It has a special syntax for drawing\
    \ on the widget canvas, which we can use here to draw each of our widget shapes:\n\
    \n```\n<Player>:\n    canvas:\n        Color:\n            rgba: 1, 1, 1, 1\n\
    \        Rectangle:\n            pos: self.pos\n            size: self.size\n\
    ```\n\n```\n<Ball>:\n    canvas:\n        Color:\n            rgb: 1, 0.55, 0\n\
    \        Rectangle:\n            pos: self.pos\n            size: self.size\n\
    ```\n\n```\n<Block>:\n    canvas:\n        Color:\n            rgb: self.colour\n\
