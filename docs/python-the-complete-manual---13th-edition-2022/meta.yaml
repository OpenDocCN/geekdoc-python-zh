  md: "# Get started with Python\n\nthe len function is very\n# useful.\ntotal = len(ints)\n\
    count = 0\nwhile count < total:\n    print(str(ints[count]))\n    count += 1\n\
    \n# More about a Python list\n\nA Python list is similar to an array in other\
    \ languages. A list (or tuple) in Python can contain data of multiple types, which\
    \ is not usually the case with arrays in other languages. For this reason, we\
    \ recommend that you only store data of the same type in a list. This should almost\
    \ always be the case anyway due to the nature of the way data in a list would\
    \ be processed.\n\n# Functions and variable scope\n\nFunctions are used in programming\
    \ to break processes down into smaller chunks. This often makes code much easier\
    \ to read. Functions can also be reusable if designed in a certain way. Functions\
    \ can have variables passed to them. Variables in Python are always passed by\
    \ value, which means that a copy of the variable is passed to the function that\
    \ is only valid in the scope of the function. Any changes made to the original\
    \ variable inside the function will be discarded. However, functions can also\
    \ return values, so this isn't an issue. Functions are defined with the keyword\
    \ def, followed by the name of the function. Any variables that can be passed\
    \ through are put in brackets following the function's name. Multiple variables\
    \ are separated by commas. The names given to the variables in these brackets\
    \ are the ones that they will have in the scope of the function, regardless of\
    \ what the variable that's passed to the function is called.\nLet's see this in\
    \ action. The output from the program opposite is as follows:\n\n> “Functions\
    \ are defined with the keyword def, then the name of the function”"
