  md: '# Create a Pi-powered virtual reality setup


    # Use Python with Pi


    # Python-VRZero


    01 Using Python-VRZero is a frictionless way to get started creating your own
    virtual reality worlds in Python on a Raspberry Pi and combine an Oculus Rift.
    The program adds a number of features on top of Pi3D and solves the headaches
    of configuring a Pi 3 for VR development in Python. It includes default input
    event handling for keyboard, mouse, controller and the Rift for moving and altering
    the view of the player. It also supports Xbox 360 controller configuration and
    uses OpenHMD to read the rotational sensor reading from the Rift.


    # Install the Xbox 360 controller drivers


    04 Now install the package dependencies for the Xbox 360 controller. You can keep
    the library up to date by adding the code --upgrade to the end of the first line.
    Then install Pi3D software which will render the images. Type the two lines below
    as shown and press Enter.


    # Fresh SD card install


    02 Before you get started, it is recommended that you use a new SD card with a
    freshly installed image of the Raspberry Pi''s official operating system, Raspbian.
    You can download the operating system directly from the Raspberry Pi website at
    https://www.raspberrypi.org/downloads. Install using your normal preferred method.
    This project setup was tested using the Pixel OS image.


    # Update the Pi


    03 Boot up your Raspberry Pi. At this stage you do not need to connect the Xbox
    360 controller or Oculus Rift. When loaded, open the LXTerminal and update and
    upgrade the OS typing the two lines below. This may take some time.


    ```

    sudo apt-get update

    sudo apt-get upgrade

    ```


    ```

    sudo apt-get install -y libhidapi-libusb0 xboxdrv

    sudo pip3 install pi3d==2.14

    ```


    > Keep up to date

    Python-VRzero is an ongoing development, and updates and improvement are always
    being added. Refer to the GitHub repository for the latest updates: https://github.com/WayneKeenan/python-vrzero


    ![](img/3303e52de17b2e01ada468e51372cd68_114_0.png)'
  merge: -1
