    \ If the lock object has already been locked by another thread, then this call\
    \ to acquire blocks and waits until the lock has been released. This is why you\
    \ need to be really careful to always have a release statement for every acquire\
    \ statement. Otherwise, you'll have a bug that will be almost impossible to find\
    \ after the fact. This also introduces a bottleneck to your program, so you want\
    \ to make sure that whatever code exists between the acquire and lock is the bare\
    \ minimum required to do the necessary work. This is the simplest form of locking\
    \ mechanism available in Python. If your needs"
