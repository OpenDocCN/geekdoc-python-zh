  md: "# Build tic-tac-toe with Kivy\n\n# Create with Python\n\nmade these bindings\
    \ straight from Python (another usage of the 'bind' method used later on), but\
    \ that's rarely as convenient as referencing the property we want to bind to.\n\
    Let's now populate our 'TicTacToeGrid' with 'GridEntry' widgets.\n\ndisplay them\
    \ and knows it should automatically arrange them into a grid with the number of\
    \ columns we set earlier.\nNow all we have to do is replace our root widget (returned\
    \ from 'App.build') with a 'TicTacToeGrid' and we can see what our app looks like.\n\
    \n```\nclass TicTacToeGrid(GridLayout):\n    def __init__(self, *args, **kwargs):\n\
    \        super(TicTacToeGrid, self).__init__(*args, **kwargs)\n        for row\
    \ in range(3):\n            for column in range(3):\n                grid_entry\
    \ = GridEntry(\n                    coords=(row, column))\n                grid_entry.bind(on_release=self.button_pressed)\n\
    \                self.add_widget(grid_entry)\n\n    def button_pressed(self, instance):\n\
    \        print('{} button clicked!'.format(instance.coords))\n```\n\n```\ndef\
    \ build(self):\n    return TicTacToeGrid()\n```\n\nWith this complete you can\
    \ run your main Python file again and enjoy your new program. All being well,\
    \ the single Label is replaced by a grid of nine buttons, each of which you can\
    \ click (it will automatically change colour) and release (you'll see the printed\
    \ output information from our binding).\nWe could customise the appearance by\
    \ modifying other properties of the Button, but for now we'll leave them as they\
    \ are.\n\nThis introduces a few new concepts: When we instantiated our 'GridEntry'\
    \ widgets, we were able to set their 'coords' property by simply passing it in\
    \ as a kwarg. This is a minor feature that is automatically handled by Kivy properties.\n\
    We used the 'bind' method to call the grid's 'button_pressed' method whenever\
    \ the 'GridEntry' widget dispatches an 'on_release' event. This is automatically\
    \ handled by its 'Button' superclass, and will occur whenever a user presses,\
    \ then releases a 'GridEntry' button. We could also bind to 'on_press', which\
    \ is dispatched when the button is first clicked, or to any Kivy property of the\
    \ button, dispatched dynamically when the property is modified.\nWe added each\
    \ 'GridEntry' widget to our 'Grid' via the 'add_widget' method. That means each\
    \ one is a child widget of the 'TicTacToeGrid', and so it will\n\n# Has anyone\
    \ won yet?\n\nWe'll want to keep track of the state of the board to check if anyone\
    \ has won, which we can do with a couple more Kivy properties:\n\n```\nfrom kivy.properties\
    \ import (ListProperty, NumericProperty)\n\nclass TicTacToeGrid(GridLayout):\n\
    \    status = ListProperty([0, 0, 0, 0, 0, 0, 0, 0, 0])\n    current_player =\
    \ NumericProperty(1)\n```\n\nThis adds an internal status list representing who\
    \ has played where, and a number to represent the current player (1 for 'O', -1\
    \ for 'X').\nBy placing these numbers in our status list, we'll know if somebody\
    \ wins because the sum of a row, column or diagonal will be +3. Now we can update\
    \ our graphical grid when a move is played."
