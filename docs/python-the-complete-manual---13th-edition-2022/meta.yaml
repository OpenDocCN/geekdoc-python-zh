  md: "# Writing a user interface using Python\n\nAdministrators are comfortable with\
    \ running raw scripts by hand, but end-users are not. So if you are writing a\
    \ script that is supposed to be used by common users, it is a good idea to create\
    \ a user-friendly interface on top of the script. This way end-users can run the\
    \ scripts just like any other application. To demonstrate this, we will create\
    \ a simple GRUB configuration tool which allows users to select default boot entry\
    \ and the timeout. We will be creating a TUI (text user interface) application\
    \ and will use the Python module 'snack' to facilitate this (not to be confused\
    \ with the Python audio library, tksnack).\n\nThis app consists of two files...\n\
    \n**grub.py**: GRUB Config File (grub.conf) Parser (available on FileSilo). It\
    \ implements two main functions, readBootDB() and writeBootFile(), which are responsible\
    \ for reading and writing the GRUB configuration file.\n\n**grub_tui.py**: Text\
    \ user interface file for manipulating the GRUB configuration file using the functions\
    \ available in grub.py.\n\n```\n@code:grub_tui.py\nimport sys\nfrom snack import\
    \ *\n\nfrom grub import (readBootDB, writeBootFile)\n\ndef main(entry_value='1',\
    \ kernels=[]):\n    try:\n        (default_value, entry_value,\n         kernels)=readBootDB()\n\
    \    except:\n        print >> sys.stderr, (\"Error reading /boot/grub/grub.conf\"\
    )\n        sys.exit(10)\n\n    screen=SnackScreen()\n\n    while True:\n     \
    \   g=GridForm(screen, (\"Boot configuration\"),1,5)\n        if len(kernels)>0\
    \ :\n            li=Listbox(height=len(kernels), width=20,\n                 \
    \      returnExit=1)\n            for i, x in enumerate(kernels):\n          \
    \      li.append(x,i)\n            g.add(li, 0, 0)\n            li.setCurrent(default_value)\n\
    \n        bb = ButtonBar(screen, ((\"Ok\", \"ok\"),\n                        \
    \       (\"Cancel\"), \"cancel\")))\n\n        e=Entry(3, str(entry_value))\n\
    \        l=Label((\"Timeout (in seconds):\"))\n        gg=Grid(2,1)\n        gg.setField(l,0,0)\n\
    \        gg.setField(e,1,0)\n\n        g.add(Label(''),0,1)\n        g.add(gg,0,2)\n\
    \        g.add(Label(''),0,3)\n        g.add(bb,0,4,growx=1)\n        result =\
    \ g.runOnce()\n        if bb.buttonPressed(result) == 'cancel':\n            screen.finish()\n\
    \            sys.exit(0)\n        else:\n            entry_value = e.value()\n\
    \            try :\n                c = int(entry_value)\n                break\n\
    \            except ValueError:\n                continue\n\n    writeBootFile(c,\
    \ li.current())\n    screen.finish()\n\nif __name__ == '__main__':\n    main()\n\
    ```\n\nStart the tool using the sudo command (as it reads the grub.conf file)\n\
    \n```\n$ sudo grub_tui.py\n```\n\n![](img/3303e52de17b2e01ada468e51372cd68_70_0.png)"
