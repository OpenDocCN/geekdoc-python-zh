  - "[PAGE 20]\n\n# Get started with Python\n\n# Getting started\n\n```\n#!/usr/bin/env\
    \ python2\ncont = False\nif cont:\n    var = 1234\nprint(var)\n```\n\nIn the section\
    \ of code above, Python will convert the integer to a string before printing it.\
    \ However, it's always a good idea to explicitly convert things to strings – especially\
    \ when it comes to concatenating strings together. If you try to use the + operator\
