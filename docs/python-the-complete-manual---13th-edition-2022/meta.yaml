    # Use Python with Pi


    # Programming in Python on the Raspberry Pi


    # Performing arithmetic


    10 The main arithmetic operators in Python are + - / *, the latter two being divide
    and multiply respectively. We''ve created three new variables called numberHalved,
    numberDoubled and numberSquared. Notice that we don''t need to specify that they
    should be decimal because Python gives a type to its variables from the type of
    their initial value. The number variable is a decimal type, so all values returned
    from performing arithmetic on that number will also be of a decimal type.


    ```

    23 # Print out the values we just worked out, converting each float value

    24 # to a string

    25 print("The result of halving that number: " + str(numberHalved))

    26 print("The result of doubling that number: " + str(numberDoubled))

    27 print("The result of squaring that number: " + str(numberSquared))

    28 print("")

    ```


    # Printing our numbers


    11 Now that we have performed our arithmetic, we need to print the results using
    the print function. The print function only accepts string values passed to it.
    This means that we need to convert each decimal value to a string using the str()
    function before they can be printed. We''re using a print statement with nothing
    between the quotation marks to print one blank line. This works because the print
    function always adds a new line at the end of its output unless told otherwise,
    so printing an empty string just prints a new line.


    Below The Raspberry Pi takes the ''Pi'' part of its name from its compatibility
    with the Python programming language


    # Input validation with While loops and If statements


    12 To demonstrate a while loop and if statements, we will output a question to
    the user that requires a yes or no answer. We''re going to ask them if they want
    to continue – and for this we require either a lower-case ''yes'', or a lower-case
    ''no''. A while loop is a loop that runs until a condition is met. In this case,
    we will create a variable called yesOrNo and the while loop will run while yesOrNo
    is false. The yesOrNo variable will be a Boolean type that can be either True
    or False. The variable will be initialised with a value of False, or the while
    loop will not run.

    A while loop has the format ''while [condition]:'' – where any code that is part
    of the while loop needs to be indented in the lines below the colon. Any code
    that is not indented will not be part of the while loop. This is the same for
    an if statement. The condition is checked with the comparison operator ''==''.
    A single ''='' is an assignment operator whereas a double equals is a comparison
    operator. Another common comparison operator is ''!='' – which means ''not equal
    to''.

    We create a variable called ''result'', which holds the result of the question,
    do you want to continue? We then check this result is valid with an if statement.
    Notice the ''or'' operator which allows two conditions to be tested. If the user
    inputs a correct value then we set yesOrNo to True, which stops the while loop
    on the next run. Otherwise, we output an error message and the while loop will
    run again. The user can use the Ctrl+C command at the terminal to exit the program
    at any time.


    ![](img/3303e52de17b2e01ada468e51372cd68_103_0.png)'
