- md: "## Build tic-tac-toe with Kivy\n\n## Create with Python\n\nentry point for\
    \ the creation of our GUI. We can start by making the simplest Kivy app possible:\n\
    \n```python\nfrom kivy.app import App\n\nclass TicTacToeApp(App):\n    pass\n\n\
    if __name__ == \"__main__\":\n    TicTacToeApp().run()\n```\n\n![](img/3303e52de17b2e01ada468e51372cd68_80_0.png)\n\
    \nYou can already run this, your app will start up and you'll get a plain black\
    \ window. Exciting!\n\nWe can build our own GUI out of Kivy widgets. Each is a\
    \ simple graphics element with some specific behaviour of its own ranging from\
    \ standard GUI functionality (eg the Button, Label or TextInput), to those that\
    \ impose positioning on their child widgets (eg the BoxLayout, FloatLayout or\
    \ GridLayout), to those abstracting a more involved task like interacting with\
    \ hardware (eg the FileChooser, Camera or VideoPlayer). Most importantly, Kivy's\
    \ widgets are designed to be easily combined - rather than including a widget\
    \ for every need imaginable, widgets are kept simple but are easy to join to invent\
    \ new interfaces. We'll see some of that in this tutorial.\n\nSince 'Hello World!'\
    \ is basically compulsory in any programming tutorial, let's get it over with\
    \ by using a simple 'Label' widget to display the text:\n\n```python\nfrom kivy.uix.label\
    \ import Label\n```\n\nWe'll display the 'Label' by returning it as our app's\
    \ root widget. Every app has a single root widget, the top level of its widget\
    \ tree, and it will automatically be sized to fill the window. We'll see later\
    \ how to construct a full GUI by adding more widgets for this one, but for now\
    \ it's enough to set the root widget by adding a new method to the 'App':\n\n\
    **Above** The game with final additions, making the grid square and extending\
    \ the interface\n\n```python\ndef build(self):\n    return Label(text='Hello World!',\n\
    \                 font_size=100,\n                 color=(0, 1, 0, 1))  # (r,\
    \ g, b, a)\n```\n\nThe 'build' method is called when the 'App' is run, and whatever\
    \ widget is returned automatically becomes the root widget of that App'. In our\
    \ case that's a Label, and we've set several properties - the 'text', 'font_size'\
    \ and 'color'. All widgets have different properties controlling aspects of their\
    \ behaviour, which can be dynamically updated to alter their appearance later,\
    \ though here we set them just once upon instantiation.\n\nNote that these properties\
    \ are not just Python attributes but instead Kivy properties. These are accessed\
    \ like normal attributes but provide extra functionality by hooking into Kivy's\
    \ event system. We'll see examples of creating properties shortly, and you should\
    \ do the same if you want to use your variables with Kivy's event or binding functionality.\n\
    \nThat's all you need to show some simple text, so run the program again to check\
    \ that this does work. You can experiment with the parameters if it's unclear\
    \ what any of them are doing.\n\n## Our own widget: tic-tac-toe\n\nSince Kivy\
    \ doesn't have a tic-tac-toe widget, we'll have to make our own! It's natural\
    \ to create a new widget class to contain this behaviour:\n\n```python\nfrom kivy.uix.gridlayout\
    \ import GridLayout\nclass TicTacToeGrid(GridLayout):\n    pass\n```\n\nNow this\
    \ obviously doesn't do anything yet, except that it inherits all the behaviour\
    \ of the Kivy GridLayout widget - that is, we'll need to tell it how many columns\
    \ to have, but then it will automatically arrange any child widgets to fit nicely\
    \ with as many rows as necessary. Tic-tac-toe requires three columns and nine\
    \ children.\n\nHere we introduce the Kivy language (kv), a special domain-specific\
    \ language for making rules describing Kivy widget trees. It's very simple but\
    \ removes a lot of necessary boilerplate for manipulating the GUI with Python\
    \ code - as a loose analogy you might think of it as the HTML/CSS to Python's\
    \ JavaScript. Python gives us the dynamic power to do anything, but all that power\
    \ gets in the way if we just want to declare the basic structure of our GUI. Note\
    \ that you never need kv language, you can always do the same thing in Python\
    \ alone, but the rest of the example may show why Kivy programmers usually like\
    \ to use kv.\n\nKivy comes with all the tools needed to use kv language; the simplest\
    \ way is to write it in a file with a name based on our App class. That is, we\
    \ should place the following in a file named 'tictactoe.kv':\n\n```\n<TicTacToeGrid>:\n\
    \    cols: 3\n```\n\nThis is the basic syntax of kv language; for each widget\
    \ type we may write a rule defining its behaviour, including setting its properties\
    \ and adding child widgets. This example demonstrates the former, creating a rule\
    \ for the 'TicTacToeGrid' widget by declaring that every 'TicTacToeGrid' instantiated\
    \ should have its 'cols' property set to 3.\n\nWe'll use some more kv language\
    \ features later, but for now let's go back to Python to create the buttons that\
    \ will be the entries in our tic-tac-toe grid.\n\n```python\nfrom kivy.uix.button\
    \ import Button\nfrom kivy.properties import ListProperty\n```\n\n```python\n\
    class GridEntry(Button):\n    coords = ListProperty([0, 0])\n```\n\nThis inherits\
    \ from Kivy's 'Button' widget, which interacts with mouse or touch input, dispatching\
    \ events when interactions toggle it. We can hook into these events to call our\
    \ own functions when a user presses the button, and can set the button's 'text'\
    \ property to display the 'X' or 'O'. We also created a new Kivy property for\
    \ our widget, 'coords' - we'll show how this is useful later on. It's almost identical\
    \ to making a normal Python attribute by writing 'self.coords = [0, 0]' in 'GridEntry.__init__'.\n\
    \nAs with the 'TicTacToeGrid', we'll style our new class with kv language, but\
    \ this time we get to see a more interesting feature.\n\n```\n<GridEntry>:\n \
    \   font_size: self.height\n```\n\nAs before, this syntax defines a rule for how\
    \ a 'GridEntry' widget should be constructed, this time setting the 'font_size'\
    \ property that controls the size of the text in the button's label. The extra\
    \ magic is that kv language automatically detects that we've referenced the Button's\
    \ own height and will create a binding to update this relationship - when a 'GridEntry'\
    \ widget's height changes, its 'font_size' will change so the text fits perfectly.\
    \ We could have made these bindings straight from Python (another usage of the\
    \ 'bind' method used later on), but that's rarely as convenient as referencing\
    \ the property we want to bind to.\n\nLet's now populate our 'TicTacToeGrid' with\
    \ 'GridEntry' widgets.\n\n```python\nclass TicTacToeGrid(GridLayout):\n    def\
    \ __init__(self, *args, **kwargs):\n        super(TicTacToeGrid, self).__init__(*args,\
    \ **kwargs)\n        for row in range(3):\n            for column in range(3):\n\
    \                grid_entry = GridEntry(\n                    coords=(row, column))\n\
    \                grid_entry.bind(on_release=self.button_pressed)\n           \
    \     self.add_widget(grid_entry)\n\n    def button_pressed(self, instance):\n\
    \        print('{} button clicked!'.format(instance.coords))\n```\n\n```python\n\
    def build(self):\n    return TicTacToeGrid()\n```\n\nWith this complete you can\
    \ run your main Python file again and enjoy your new program. All being well,\
    \ the single Label is replaced by a grid of nine buttons, each of which you can\
    \ click (it will automatically change colour) and release (you'll see the printed\
    \ output information from our binding).\n\nWe could customise the appearance by\
    \ modifying other properties of the Button, but for now we'll leave them as they\
    \ are.\n\nThis introduces a few new concepts: When we instantiated our 'GridEntry'\
    \ widgets, we were able to set their 'coords' property by simply passing it in\
    \ as a kwarg. This is a minor feature that is automatically handled by Kivy properties.\n\
    \nWe used the 'bind' method to call the grid's 'button_pressed' method whenever\
    \ the 'GridEntry' widget dispatches an 'on_release' event. This is automatically\
    \ handled by its 'Button' superclass, and will occur whenever a user presses,\
    \ then releases a 'GridEntry' button. We could also bind to 'on_press', which\
    \ is dispatched when the button is first clicked, or to any Kivy property of the\
    \ button, dispatched dynamically when the property is modified.\n\nWe added each\
    \ 'GridEntry' widget to our 'Grid' via the 'add_widget' method. That means each\
    \ one is a child widget of the 'TicTacToeGrid', and so it will display them and\
    \ knows it should automatically arrange them into a grid with the number of columns\
    \ we set earlier.\n\nNow all we have to do is replace our root widget (returned\
    \ from 'App.build') with a 'TicTacToeGrid' and we can see what our app looks like.\n\
    \n## Has anyone won yet?\n\nWe'll want to keep track of the state of the board\
    \ to check if anyone has won, which we can do with a couple more Kivy properties:\n\
    \n```python\nfrom kivy.properties import (ListProperty, NumericProperty)\n\nclass\
    \ TicTacToeGrid(GridLayout):\n    status = ListProperty([0, 0, 0, 0, 0, 0, 0,\
    \ 0, 0])\n    current_player = NumericProperty(1)\n```\n\nThis adds an internal\
    \ status list representing who has played where, and a number to represent the\
    \ current player (1 for 'O', -1 for 'X').\n\nBy placing these numbers in our status\
    \ list, we'll know if somebody wins because the sum of a row, column or diagonal\
    \ will be +3. Now we can update our graphical grid when a move is played."
  mdcn: "## 使用 Kivy 构建井字棋\n\n## 使用 Python 创建\n\n这是我们创建图形用户界面的入口点。我们可以从创建一个最简单的 Kivy\
    \ 应用开始：\n\n```python\nfrom kivy.app import App\n\nclass TicTacToeApp(App):\n \
    \   pass\n\nif __name__ == \"__main__\":\n    TicTacToeApp().run()\n```\n\n![](img/3303e52de17b2e01ada468e51372cd68_80_0.png)\n\
    \n你已经可以运行它了，你的应用会启动并显示一个纯黑色的窗口。令人兴奋！\n\n我们可以用 Kivy 的部件来构建自己的图形用户界面。每个部件都是一个简单的图形元素，具有其特定的行为，范围从标准的图形用户界面功能（例如按钮、标签或文本输入框），到那些对其子部件施加定位规则的部件（例如BoxLayout、FloatLayout或GridLayout），再到那些抽象更复杂任务（如与硬件交互）的部件（例如FileChooser、Camera或VideoPlayer）。最重要的是，Kivy\
    \ 的部件设计得易于组合——并非为每种想象得到的需求都包含一个部件，而是保持部件简单但易于连接以发明新的界面。我们将在本教程中看到一些这样的例子。\n\n\
    既然“Hello World!”基本上是任何编程教程的必修内容，让我们用一个简单的“Label”部件来显示文本，完成这个任务：\n\n```python\n\
    from kivy.uix.label import Label\n```\n\n我们将通过将“Label”作为应用的根部件返回来显示它。每个应用都有一个根部件，即其部件树的顶层，它会自动调整大小以填满窗口。我们稍后将看到如何通过为此根部件添加更多部件来构建完整的图形用户界面，但现在，通过向“App”添加一个新方法来设置根部件就足够了：\n\
    \n**上图** 最终添加了使网格方正并扩展界面的游戏\n\n```python\ndef build(self):\n    return Label(text='Hello\
    \ World!',\n                 font_size=100,\n                 color=(0, 1, 0,\
    \ 1))  # (r, g, b, a)\n```\n\n当“App”运行时，“build”方法会被调用，返回的任何部件都会自动成为该“App”的根部件。在我们的例子中，这是一个Label，我们设置了几个属性——“text”、“font_size”和“color”。所有部件都有不同的属性来控制其行为的各个方面，这些属性可以动态更新以在之后改变其外观，尽管这里我们只在实例化时设置了一次。\n\
    \n请注意，这些属性不仅仅是Python属性，而是Kivy属性。它们的访问方式与普通属性相同，但通过接入Kivy的事件系统提供了额外的功能。我们很快就会看到创建属性的例子，如果你想将你的变量与Kivy的事件或绑定功能一起使用，你也应该这样做。\n\
    \n这就是显示一些简单文本所需的全部内容，所以再次运行程序以检查这是否有效。如果不清楚任何参数的作用，你可以尝试调整它们。\n\n## 我们自己的部件：井字棋\n\
    \n由于Kivy没有井字棋部件，我们必须自己创建一个！创建一个新的部件类来包含这种行为是很自然的：\n\n```python\nfrom kivy.uix.gridlayout\
    \ import GridLayout\nclass TicTacToeGrid(GridLayout):\n    pass\n```\n\n现在这显然还没有做任何事情，除了它继承了Kivy\
    \ GridLayout部件的所有行为——也就是说，我们需要告诉它有多少列，然后它会自动排列任何子部件，以尽可能多的行数整齐地适配。井字棋需要三列和九个子部件。\n\
