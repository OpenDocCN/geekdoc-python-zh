  md: "Introducing Python\n\n50 Python tips\n\n# 50 Python tips\n\nPython is a programming\
    \ language that lets you work more quickly and integrate your systems more effectively.\
    \ Today, Python is one of the most popular programming languages in the open source\
    \ space. Look around and you will find it running everywhere, from various configuration\
    \ tools to XML parsing. Here is the collection of 50 gems to make your Python\
    \ experience worthwhile...\n\n# Basics\n\n# Running Python scripts\n\n01 On most\
    \ of the UNIX systems, you can run Python scripts from the command line.\n\n```\n\
    $ python mypyprog.py\n```\n\n# Running Python programs from Python interpreter\n\
    \n02 The Python interactive interpreter makes it easy to try your first steps\
    \ in programming and using all Python commands. You just issue each command at\
    \ the command prompt (>>>), one by one, and the answer is immediate.\n\n**Python\
    \ interpreter can be started with the command:**\n\n```\n$ python\nkunal@ubuntu:~$\
    \ python\nPython 2.6.2 (release26-maint, Apr 19 2009, 01:56:41)\n[GCC 4.3.3] on\
    \ linux2\nType \"help\", \"copyright\", \"credits\" or \"license\" for more information.\n\
    >>> <type commands here>\n```\n\n**In this article, all the code starting at the\
    \ >>> symbol is to be given at the Python prompt.**\n\nIt is also important to\
    \ remember that Python takes tabs very seriously – so if you are receiving any\
    \ error that mentions tabs, correct the tab spacing.\n\n# Dynamic typing\n\n03\
    \ In Java, C++, and other statically typed languages, you must specify the data\
    \ type of the function return value and each function argument. On the other hand,\
    \ Python is a dynamically typed language. In Python you will never have to explicitly\
    \ specify the data type of anything you use. Based on what value you assign, Python\
    \ will automatically keep track of the data type internally.\n\n# Python statements\n\
    \n04 Python uses carriage returns to separate statements, and a colon and indentation\
    \ to separate code blocks. Most of the compiled programming languages, such as\
    \ C and C++, use semicolons to separate statements and curly brackets to separate\
    \ code blocks.\n\n# == and = operators\n\n05 Python uses '==' for comparison and\
    \ '=' for assignment. Python does not support inline assignment, so there's no\
    \ chance of accidentally assigning the value when you actually want to compare\
    \ it.\n\nassignment. Python does not support inline assignment, so there's no\
    \ chance of accidentally assigning the value when you actually want to compare\
    \ it.\n\n# Concatenating strings\n\n06 You can use '+' to concatenate strings.\n\
    \n```\n>>> print 'kun'+'al'\nkunal\n```\n\n# The __init__ method\n\n07 The __init__\
    \ method is run as soon as an object of a class is instantiated. The method is\
    \ useful to do any initialization you want to do with your object. The __init__\
    \ method is analogous to a constructor in C++, C# or Java.\n\n**Example:**\n\n\
    ```\nclass Person:\n    def __init__(self, name):\n        self.name = name\n\
    \    def sayHi(self):\n        print 'Hello, my name is', self.name\np = Person('Kunal')\n\
    p.sayHi()\n```\n\n**Output:**\n\n```\n[~/src/python $:] python initmethod.py\n\
    Hello, my name is Kunal\n```"
