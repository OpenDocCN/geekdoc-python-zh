  mdcn: "## 处理多任务\n\n## 在树莓派上使用Python\n\n这被称为GIL（全局解释器锁）。GIL用于控制对Python解释器中某些核心函数和数据的访问。这意味着在某些时刻，你的线程一次只能运行一个。这在某些情况下会引入严重的瓶颈。如果你遇到这种情况，那么你可能需要使用multiprocessing模块。该模块使用子进程来完全绕过GIL，以实现真正的并行操作。在其最基本的用例中，你可以使用类似下面的代码来获得与使用线程类似的行为：\n\
    \n进程对象以多种方式之一启动一个新的Python引擎。在UNIX系统（如树莓派）上的默认方式是fork一个新进程。fork方法本质上是创建当前Python引擎的完整副本并执行给定的函数。另一种方法是spawn一个新的Python引擎。在spawn方法中，只有当前Python引擎中需要的部分会被复制到新的Python引擎中。如果你确实需要更改它，可以使用以下代码：\n\
    \n```python\nimport multiprocessing\ndef f(name):\n    print('hello', name)\n\n\
    p = multiprocessing.Process(target=f,\n    args=('bob',))\np.start()\np.join()\n\
    ```\n\n```python\nmultiprocessing.set_start_method('spawn')\n```\n\n如果你需要启动许多子进程，这可能有助于加速你的代码。set_start_method应该在给定的程序中只调用一次。希望本教程能给你一些关于如何包含并行管理多任务能力的想法。这可以成为一个强大的工具，使你项目的软件设计更灵活、功能更强大。请注意，在如此简短的教程中，我们只能涵盖最基本的主题。\n\
    \n这表面上看起来相同，但后端发生的事情却截然不同。这\n\n## 其他并行化方法\n\n我们已经研究了如何在Python程序内部严格处理并行任务。但有时你需要异步运行其他代码片段。在这些情况下，你可以使用subprocess模块来执行外部代码并与之交互。作为一个例子，我们将看看如何运行ls程序并使用其输出。\n\
    \n外部程序的输出被发送回调用的Python代码。有时，你可能想通过shell运行这个外部程序。为此，你需要使用参数shell=True。run方法是运行外部程序的简化接口。当你需要对外部程序的执行方式有更多控制时，可以使用Popen方法。\n\
    \ncommunicate()\n如果你想同时向外部进程发送输入，可以包含一个名为input的参数并附带数据。这会阻塞直到外部进程完成并退出。如果你需要在不等待外部程序完成的情况下从这些流中读取，你可以获取stdout和stderr流的管道。例如，以下代码从标准输出流读取：\n\
    \n```python\nimport subprocess\nsubprocess.run([\"ls\", \"-l\"],\n    stdout=subprocess.PIPE)\n\
