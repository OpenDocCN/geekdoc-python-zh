    # Use Python with Pi


    # Using Python on Raspberry Pi


    # What you''ll need...


    # Using Python on Raspberry Pi


    A Raspberry Pi with all necessary peripherals


    SD card with latest Debian image for Pi www.raspberrypi.org/downloads


    Program in Python with the Raspberry Pi, and lay the foundations for all your
    future projects


    Before getting started with this tutorial, ensure that you''ve set up the latest
    version of the Raspbian operating system on an SD card for your Raspberry Pi.
    The beauty of using an SD card image is that the operating system is ready to
    go and a development environment is already configured for us.


    We''ll use a lightweight integrated development environment (IDE) called Geany
    for our Python development. Geany provides a friendlier interface compared to
    text-based editors such as nano to make it easier to get into the swing of things.
    This tutorial will cover topics such as:


    +   - Basic arithmetic

    - Comparison operators, for example ''equal to'' and ''not equal to''

    - Control structures, for example loops and if statements


    By the end, we''ll have an advanced version of our ''hello world'' application.
    Let''s dive straight in...


    ![](img/3303e52de17b2e01ada468e51372cd68_99_0.png)


    # Staying organised


    01 We don''t want to have messy folders on our new Pi, so let''s go to the file
    manager and organise ourselves. Open the file manager by clicking the icon next
    to the menu icon on the bottom left of the screen. Create a new folder by right-clicking
    and selecting New>Folder, then type a name and click OK. We created a folder called
    Python, and inside that created a folder called Hello World v2.'
- md: "## Using Python on Raspberry Pi\n\n## Use Python with Pi\n\nIt's good practice\
    \ to describe what the program's purpose is at the top of the file. This will\
    \ help you out when working on larger projects with multiple files.\n\n```python\n\
    #!/usr/bin/env python\n\n# An advanced Hello World program that will demonstrate\
    \ the basics of\n# programming in Python via a series of examples. Created by\
    \ Liam Fraser\n# for Linux User and Developer :: 22/04/2012.\n\n# Import the sys\
    \ library for the sys.exit function\nimport sys\n# Import everything from the\
    \ Decimal library\nfrom decimal import *\n\n# Get the user's first name and output\
    \ a welcome message\nfirstName = raw_input(\"Please enter your first name: \"\
    )\nprint(\"Welcome \" + firstName + \"\\n\")\n\n# Ask the user for a number and\
    \ square it, double it and halve it\nnumber = raw_input(\"Please enter a number:\
    \ \")\nnumber = Decimal(number)\nnumberHalved = number / 2\nnumberDoubled = number\
    \ * 2\nnumberSquared = number * number\n\n# Print out the values we just worked\
    \ out, converting each float value\n# to a string\nprint(\"The result of halving\
    \ that number: \" + str(numberHalved))\nprint(\"The result of doubling that number:\
    \ \" + str(numberDoubled))\nprint(\"The result of squaring that number: \" + str(numberSquared))\n\
    print(\"\")\n\n# The stopping condition for a while loop\nyesOrNo = False\n\n\
    # A while loop that will run until a user enters either \"yes\" or \"no\"\nwhile\
    \ yesOrNo == False:\n    result = raw_input(\"Do you want to continue? (yes/no)\
    \ \")\n\n    if result == \"yes\" or result == \"no\":\n        yesOrNo = True\n\
    \    else:\n        print(\"Error, please type yes or no\" + \"\\n\")\n\n# Deal\
    \ with the result\nif result == \"yes\":\n    print(\"\\nContinuing\")\nelse:\n\
    \    print(\"\\nExiting\")\n    sys.exit()\n\n# Create the count which will be\
    \ a stopping condition for a while loop\ncount = 1\n\n# Use a while loop to add\
    \ 5 to the number and output the value each time\nprint(\"Incrementing the number\
    \ by 5\\n\")\nwhile count <= 5:\n    number += 1\n    print(\"number + \" + str(count)\
    \ + \" = \" + str(number))\n\n    # Increment the count:\n    count += 1\n\n#\
    \ Finish off by printing that we are exiting\nprint(\"\\nExiting\")\n```\n\nIt's\
    \ important to think about data types. We convert the number to decimal to make\
    \ sure that we don't lose any decimal numbers during arithmetic.\n\nThe stopping\
    \ condition for a while loop has to be satisfied at some point in the code; otherwise\
    \ the loop will never end!\n\nThe print function can only accept string data types,\
    \ so we need to convert any variables with a number data type to a string before\
    \ we can print them to the screen.\n\n![](img/3303e52de17b2e01ada468e51372cd68_100_0.png)\n\
    \n## Starting Geany\n\n02 Start Geany by going to the LXDE menu and going to Programs.\
    \ From here, select Geany. Once you're in the Geany interface, create a new Python\
    \ file from a template by selecting 'New (with template)>main.py'. Delete everything\
    \ in this template apart from the first line: `#!/usr/bin/env python`. This line\
    \ is important because it means you can run the code from the command line and\
    \ the Bash shell will know to open it with the Python interpreter.\n\n## Use Python\
    \ with Pi\n\n## Programming in Python on the Raspberry Pi\n\n## Saving your work\n\
    \n03 It's always a good idea to keep saving your work with Ctrl+S as you program,\
    \ because it would be a shame to lose anything you've been working on. To save\
    \ your file for the first time, either press Ctrl+S or go to the File menu and\
    \ select Save. Give the file a sensible name and save it in the tidy folder structure\
    \ you created before. It's a good habit to be well organised when programming,\
    \ because it makes things much easier when your projects become bigger and more\
    \ complicated.\n\n![](img/3303e52de17b2e01ada468e51372cd68_101_0.png)\n\n## Setting\
    \ it up\n\n04 Having detailed comments in your code is important because it allows\
    \ you to note down things you find confusing and document complex procedures.\
    \ If another programmer has to work with your code in the future, they'll be extremely\
    \ grateful. Start by adding a comment with a description of what the program will\
    \ do and your name. All comment lines start with a hash (#) and are not interpreted\
    \ as code by the Python interpreter. We import the sys library so we can use the\
    \ sys.exit function to close the program later on. We also import everything from\
    \ the decimal library because we want to make use of the decimal type.\n\n> \"\
    It's a good habit to be well organised when programming\"\n\n## Variables\n\n\
    05 A variable is data that is stored in memory and can be accessed via a name.\
    \ Our program is going to start by asking for your first name, store that in a\
    \ variable and then print out a welcome message. We're going to add a comment\
    \ that explains this and create a variable called firstName. Notice how we've\
    \ capitalised the first letter of the second word to make it easier to read.\n\
    \nWe want the firstName variable to hold the value returned by a function called\
    \ raw_input, that will ask the user for input. The question is passed into the\
    \ print function within brackets, and because this is a string it is enclosed\
    \ within quotation marks. A string type is basically a collection of characters.\
    \ Note the extra space we've added after the colon because the user types their\
    \ input straight after this question.\n\n```python\n#!/usr/bin/env python\n\n\
    # An advanced Hello World\n# programming in Python v\n# for Linux User and Deve\n\
    \n# Import the sys library f\nimport sys\n# Import everything from\ndecimal import\
    \ *\n```\n\n## Printing a message\n\n06 Now that we have a value in firstName,\
    \ we need to output a welcome message to the screen. We print to the screen in\
    \ Python using the print function. The print function is followed by a pair of\
    \ brackets which enclose the values to print. When using the addition operator\
    \ with strings, they are joined together. Note how firstName doesn't need to be\
    \ enclosed by quotation marks because it is the name of a variable. If it was\
    \ enclosed in quotation marks, the text firstName would be output. We finish off\
    \ by adding a '\\n' character (new line character) to our output to leave one\
    \ blank line before we start our next example.\n\n![](img/3303e52de17b2e01ada468e51372cd68_102_0.png)\n\
    \n![](img/3303e52de17b2e01ada468e51372cd68_102_1.png)\n\n## Testing our program\n\
    \n08 Now we've done that part, why not test it? It's worth noting that you have\
    \ to save before running the program, or anything you've done since you last saved\
    \ won't be interpreted by Python. Run the program by pressing the F5 key. Input\
    \ your name by typing it and then pressing the Enter key. Once you have done this,\
    \ you'll see a welcome message. If the program exits with the code 0 then everything\
    \ was run successfully. Press Enter to close the terminal.\n\n## Fixing a small\
    \ issue\n\n07 The Debian image that we're currently using has a small misconfiguration\
    \ issue in Geany. You'll know if you have this problem by trying to run your program\
    \ with either the F5 key or going to the Build menu and selecting Execute. If\
    \ the issue is present then nothing will happen and you'll see a message saying\
    \ 'Could not find terminal: xterm'. Not to worry, it's easy to fix. Go to the\
    \ Edit menu and then select Preferences. Go to the Tools tab and change the value\
    \ for Terminal from xterm to lxterminal.\n\n## Working with numbers\n\n09 We're\
    \ going to ask the user for a number by basically repeating the first couple of\
    \ lines we did. Once the user gives us a number, we'll halve, square and double\
    \ it. The raw_input function returns the value that the user input as a string.\
    \ A string is a text-based value so we can't perform arithmetic on it. The integer\
    \ type in Python can only store whole numbers whereas the decimal type can store\
    \ numbers with decimals. We're going to do something called a type cast, which\
    \ basically converts a value with one type to another type. We're going to convert\
    \ our number string to a decimal value because it's likely that decimals will\
    \ be involved if we are halving numbers. If the number was of an integer type,\
    \ any decimal values would simply be cut off the end, without any rounding. This\
    \ is called truncation."
