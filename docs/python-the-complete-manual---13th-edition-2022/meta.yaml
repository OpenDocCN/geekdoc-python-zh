    ## 使用Python


    **copy (src,dst)**：将src文件复制到目标目录。在此模式下，权限位会被复制，但元数据不会被复制。


    **copy2 (src,dst)**：与copy()相同，但也复制元数据。


    **copytree(src, dst[, symlinks=False[, ignore=None]])**：这类似于''cp -r''，它允许你复制整个目录。


    **ignore_patterns (*patterns)**：ignore_patterns是一个有趣的函数，可以用作copytree()的可调用对象，它允许你忽略由glob风格模式指定的文件和目录。


    **rmtree(path[, ignore_errors[, onerror]])**：rmtree()用于删除整个目录。


    **move(src,dst)**：类似于mv命令，它允许你递归地将文件或目录移动到新位置。


    示例：


    ```

    from shutil import copytree, ignore_patterns

