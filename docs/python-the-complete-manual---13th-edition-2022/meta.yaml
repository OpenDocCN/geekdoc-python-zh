  md: '# Get started with Python


    # Getting started


    # Coding style


    It''s worth taking a little time to talk about coding style. It''s simple to write
    tidy code. The key is consistency. For example, you should always name your variables
    in the same manner. It doesn''t matter if you want to use camelCase or use underscores
    as we have. One crucial thing is to use self-documenting identifiers for variables.
    You shouldn''t have to guess what a variable does. The other thing that goes with
    this is to always comment your code. This will help anyone else who reads your
    code, and yourself in the future. It''s also useful to put a brief summary at
    the top of a code file describing what the application does, or a part of the
    application if it''s made up of multiple files.


    # Summary


    This article should have introduced you to the basics of programming in Python.
    Hopefully you are getting used to the syntax, indentation and general look and
    feel of a Python program. The next step is to learn how to come up with a problem
    that you want to solve, and break it down into small steps that you can implement
    in a programming language. Google, or any other search engine, is very helpful.
    If you are stuck with anything, or have an error message you can''t work out how
    to fix, stick it into Google and you should be a lot closer to solving your problem.
    For example, if we Google ''play mp3 file with python'', the first link takes
    us to a Stack Overflow thread with a bunch of useful replies. Don''t be afraid
    to get stuck in – the real fun of programming is solving problems one manageable
    chunk at a time.


