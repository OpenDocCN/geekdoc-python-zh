    SIGAR 是一个非常易于使用的库，可用于获取系统几乎所有方面的信息。下一个示例将向你展示如何操作。以下代码显示了内存和文件系统信息。\n\n```\n@code:\
    \ PySysInfo.py\nimport os\nimport sigar\nsg = sigar.open()\nmem = sg.mem()\nswap\
    \ = sg.swap()\nfslist = sg.file_system_list()\nprint \"================Memory\
    \ Information================\"\nprint \"\\tTotal\\tUsed\\tFree\"\nprint \"Mem:\\\
    t\", \\n    (mem.total() / 1024), \\n    (mem.used() / 1024), \\n    (mem.free()\
    \ / 1024)\nprint \"Swap:\\t\", \\n    (swap.total() / 1024), \\n    (swap.used()\
    \ / 1024), \\n    (swap.free() / 1024)\nprint \"RAM:\\t\", mem.ram(), \"MB\"\n\
    print \"================File System Information================\"\ndef format_size(size):\n\
    \    return sigar.format_size(size * 1024)\nprint 'Filesystem\\tSize\\tUsed\\\
    tAvail\\tUse%\\tMounted on\\tType\\n'\nfor fs in fslist:\n    dir_name = fs.dir_name()\n\
    \    usage = sg.file_system_usage(dir_name)\n    total = usage.total()\n    used\
    \ = total - usage.free()\n    avail = usage.avail()\n    pct = usage.use_percent()\
    \ * 100\n    if pct == 0.0:\n        pct = '-'\n    print fs.dev_name(), format_size(total),\
    \ format_size(used), format_size(avail),\\n        pct, dir_name, fs.sys_type_name(),\
    \ '/', fs.type_name()\n```\n\n```\n@Output\n================Memory Information================\n\
    \tTotal\tUsed\tFree\nMem:\t 8388608 6061884 2326724\nSwap: 131072 16048 115024\n\
    RAM:  8192 MB\n================File System Information================\nFilesystem\
    \  Size  Used  Avail Use%  Mounted on  Type\n/dev/disk0s2 300G 175G 124G 59.0\
    \ / hfs / local\ndevfs 191K 191K 0 - /dev devfs / none\n```\n\n```\nimport base64,\
    \ getpass, os, socket, sys, socket, traceback\nimport paramiko\nimport interactive\n\
    # setup logging\nparamiko.util.log_to_file('demo_simple.log')\n# get hostname\n\
    username = ''\nif len(sys.argv) > 1:\n    hostname = sys.argv[1]\n    if hostname.find('@')\
    \ >= 0:\n        username, hostname = hostname.split('@')\nelse:\n    hostname\
    \ = raw_input('Hostname: ')\nif len(hostname) == 0:\n    print '*** Hostname required.'\n\
    \    sys.exit(1)\nport = 22\nif hostname.find(':') >= 0:\n    hostname, portstr\
    \ = hostname.split(':')\n    port = int(portstr)\n# get username\nif username\
    \ == '':\n    default_username = getpass.getuser()\n    username = raw_input('Username\
    \ [%s]: ' % default_username)\n    if len(username) == 0:\n        username =\
    \ default_username\npassword = getpass.getpass('Password for %s@%s: ' % (username,\
    \ hostname))\n# now, connect and use paramiko Client\nto negotiate SSH2 across\
    \ the connection\ntry:\n    client = paramiko.SSHClient()\n    client.load_system_host_keys()\n\
    \    client.set_missing_host_key_policy(paramiko.WarningPolicy)\n```\n\n## 访问安全\
    \ Shell (SSH) 服务\n\nSSH（安全 Shell）是旧的远程 Shell 系统 Telnet 的现代替代品。它允许在两个联网设备之间使用安全通道交换数据。系统管理员经常使用\
    \ SSH 来管理联网系统。除了提供远程 Shell，SSH 还用于安全文件传输（使用 SSH 文件传输协议，或 SFTP）和远程 X 服务器转发（允许你将\
    \ SSH 客户端用作 X 服务器）。在本节中，我们将学习如何使用一个名为 paramiko 的 Python 模块从 Python 中使用 SSH 协议，该模块为\
    \ Python 实现了 SSH2 协议。paramiko 可以通过以下步骤安装：\n\n```\n$ git clone https://github.com/robey/paramiko.git\n\
    $ cd paramiko\n$ sudo python setup.py install\n```\n\nparamiko 的核心是 SSHClient\
    \ 类。该类封装了 L{Transport}、L{Channel} 和 L{SFTPClient}，以处理 SSH 的大部分方面。你可以这样使用 SSHClient：\n\
    \n```\nclient = SSHClient()\nclient.load_system_host_keys()\nclient.connect('some.host.com')\n\
    stdin, stdout, stderr = client.exec_command('dir')\n```\n\n以下示例演示了一个使用 paramiko\
    \ 模块编写的完整 SSH 客户端。\n\n```\n@code: PySSHClient.py\nprint '*** Connecting...'\n\
    client.connect(hostname, port,\nusername, password)\nchan = client.invoke_shell()\n\
    print repr(client.get_transport())\nprint '*** SSH Server Connected! ***'\nprint\n\
    interactive.interactive_shell(chan)\nchan.close()\nclient.close()\nexcept Exception,\
    \ e:\n    print '*** Caught exception: %s: %s' % (e.__class__, e)\n    traceback.print_exc()\n\
    \    try:\n        client.close()\n    except:\n        pass\n    sys.exit(1)\n\
    ```\n\n如果 SSH 服务器的主机密钥未添加到你的 $HOME/.ssh/known_hosts 文件中，客户端将抛出以下错误：\n\n```\n[~\
    \ $:]\n*** Caught exception: <type 'exceptions.TypeError'>: unbound method missing_host_key()\
    \ must be called with WarningPolicy instance as first argument (got SSHClient\
    \ instance instead)\n```\n\n这意味着客户端无法验证你所连接服务器的真实性。要将主机密钥添加到 known_hosts，你可以使用\
    \ ssh 命令。重要的是要记住，这不是添加主机密钥的理想方式；相反，你应该使用 ssh-keygen。但为了简单起见，我们使用 ssh 客户端。\n\n\
    要运行此代码，你还需要一个自定义的 Python 类 interactive.py，它为 SSH 会话实现了交互式 Shell。在 FileSilo 上查找此文件，并将其复制到你创建\
    \ PySSHClient.py 的同一文件夹中。\n\n```\n@code_Output\nkunal@ubuntu-vm-kdeo:~/src/paramiko/demos$\
    \ python demo_simple.py\nHostname: 192.168.1.2\nUsername [kunal]: luduser\nPassword\
    \ for luduser@192.168.1.2:\n*** Connecting...\n<paramiko.Transport at 0xb76201acL\n\
    (cipher aes128-ctr, 128 bits) (active; 1 open channel(s))>\n*** SSH Server Connected!\
    \ ***\nLast login: Thu Jan 13 02:01:06 2011 from 192.168.1.9\n```\n\n```\nkunal@ubuntu-vm-kdeo:~/.ssh$\
    \ ssh luduser@192.168.1.2\nThe authenticity of host '192.168.1.2 (192.168.1.2)'\
    \ can't be established.\nRSA key fingerprint is be:01:76:6a:b9:bb:69:64:e3:dc:37:00:a4:36:33:d1.\n\
    Are you sure you want to continue connecting (yes/no)? yes\nWarning: Permanently\
    \ added '192.168.1.2' (RSA) to the list of known hosts.\n```\n\n所以现在你已经看到，使用 Python\
    \ 这种多功能语言执行复杂的系统管理任务是多么容易。\n与所有 Python 编码一样，这里展示的代码可以相当容易地集成到你的 GUI 应用程序（使用 PyGTK\
    \ 或 PyQt 等软件）或 Web 应用程序（使用 Django 或 Grok 等框架）中。"
