    # JAVASCRIPT INTRO


    This JavaScript tutorial makes it easy for both beginners and experts to learn
    JavaScript.


    To learn JavaScript, you only need a basic understanding of CODING.


    # JAVASCRIPT EXAMPLE


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <h2>Welcome to JavaScript</h2>

    <script>

    document.write("Hello Friends");

    </script>

    </body>

    </html>

    ```


    JavaScript can be implemented by adding JavaScript statements in the code.


    `<script>…</script>`.


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script type="text/javascript">

    document.write("Hello World");

    </script>

    </body>

    </html>

    ```


    # JavaScript code can be written in 3 places in JavaScript


    1. Between the `<body>......</body>` tag of HTML.

    2. Between the `<head>......</head>` tag of HTML.

    3. In .js file (external JavaScript).


    # Example (code between the body tags)


    In the example below, the body tag contains JavaScript code.


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script type="text/javascript">

    alert("Hello world");

    </script>

    </body>

    </html>

    ```


    # Example2 (code between the head tag)


    We''ll create the function msg() in the example below. In JavaScript, you must
    write function in function name to construct a function. To call a method, we
    must first create a case. We''re using the one-click event to call the msg() function
    in this case.


    ```html

    <!DOCTYPE html>

    <html>

    <head>

    <script type="text/javascript">

    function msg(){

    alert("Hello world");

    }

    </script>

    </head>

    <body>

    <p>Welcome to Javascript</p>

    <form>

    <input type="button" value="click" onclick="msg()"/>

    </form>

    </body>

    </html>

    ```


    # External JavaScript file


    We can build a JavaScript file that we can use in HTML files.


    Since a single JavaScript file can be used in several HTML pages, it allows for
    code reuse.


    It improves the web page''s efficiency.


    The file must have a **.js** extension.


    # Example


    ```html

    <!DOCTYPE html>

    <html>

    <head>

    <script type="text/javascript" src="message.js"></script>

    </head>

    <body>

    <p>Hello world</p>

    <form>

    <input type="button" value="click" onclick="msg()"/>

    </form>

    </body>

    </html>

    ```


    # Javascript comment


    Comments in JavaScript are used to describe the code. It''s used to add code-related
    content, such as warnings or recommendations, so that end users can understand
    it.


    ## Types of JavaScript comments


    There are two kinds of JavaScript comments:


    1. Single-line Comment

    2. Multi-line Comment


    ### Single-line Comment


    Double forward slashes (//) are used to represent single-line comments. While
    the program is running, any text between the double forward slashes (//) and the
    end of the line will be ignored.


    eg. Comment added before the statement.


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    // single-line comment //

    document.write("hello world");

    </script>

    </body>

    </html>

    ```


    eg. Comment added after the statement.


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    var a=10;

    var b=20;

    var c=a+b; //It add values of a and b variable

    document.write(c); // print sum of 10 and 20

    </script>

    </body>

    </html>

    ```


    # Output


    30


    # Multi-line comment


    Single and multi-line comments can also be made for multi-line comments. Comments
    that span multi lines begin with `/*` and end with `*/`. JavaScript will ignore
    the text in between them.


    `/* Write comment here */`


    # Example


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    /* It is multi-line comment.

    It will not be displayed */

    document.write ("Example of JavaScript multi line comment");

    </script>

    </body>

    </html>

    ```


    # Javascript Variable


    Values (name=”Ram”) and expressions (Sum=x+y) are stored in variables.

    We must first declare a variable before using it. To declare a variable, we use
    the keyword **var** as follows:


    ```javascript

    var name;

    ```


    There are two types of variables:


    1. Local Variable

    2. Global Variable


    # Local Variable


    – It''s declared within a function or a block.


    **Example**


    ```html

    <script>

    function abc(){

    var x=10; //local variable

    }

    </script>

    ```


    # Global Variable


    - It has a global scope, meaning that it can be specified anywhere in JavaScript
    code.


    Outside of the function, a variable is declared.


    **Example**


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    var data =200; //global variable

    function a(){

    document.writeln(data);

    }

    function b(){

    document.writeln(data);

    }

    a();//calling javascript function

    b();

    </script>

    </body>

    </html>

    ```


    # Declaring JavaScript global variable within function


    We need to use the **window object** to declare a JavaScript global variable within
    a function.


    # Example


    ```javascript

    window.value=90;

    ```


    It can now be declared within any function and accessed from within any function.


    # Example


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    function a(){

    window.value=50; //declare global variable by use of window object

    }

    function b(){

    alert(window.value);//access global variable from other function

    }

    a();

    b();

    </script>

    </body>

    </html>

    ```


    # Javascript Data Types


    It has a variety of data types to store various types of values.


    In Javascript, there are two kinds of data types.


    1. Primitive data types.

    2. Non-primitive data types.


    Since JavaScript is a dynamic style language, we don''t need to define the type
    of variable because the JavaScript engine uses it dynamically. The data type is
    defined using var in this case. It can store any sort of value, including numbers,
    strings, and objects.


    ## Example


    ```javascript

    var a=Ram; //String

    var b=20; //Number

    var x= {FirstName:"Ram", lastName:"Doe"}; //Object

    ```


    ## JavaScript primitive data types


    There are 5 types of primitive data types in JavaScript.


    | Data Type | Description |

    | --- | --- |

    | String | It represents sequence of characters e.g. "Hello" |

    | Number | It represents numeric values e.g. 1,2,3,4,5,6. |

    | Boolean | It represents Boolean value either Right or Wrong. |

    | Undefined | It represents undefined values. |

    | Null | It means **no values** at all. |


    # JavaScript non-primitive data types


    There is 3 non-primitive data types are as follows:


    | Data type | Description |

    | --- | --- |

    | Object | It represents instance through which we can access members. |

    | Array | It represents group of similar values. |

    | RegExp | It represents regular expression. |


    Operators are symbols in JavaScript that are used to execute operations on operands.
    3+2 equals 5 in plain terms. The operands here are 3 and 2, and the operator is
    +.


    Following are the operators used in JavaScript:


    1. Arithmetic Operators.

    2. Comparison (relational) Operators.

    3. Bitwise Operators.

    4. Logical Operators.

    5. Assignment Operators.

    6. Special Operators.


    # Arithmetic Operators


    We use arithmetic operations on the operands in arithmetic operators.


    | Operators | Description |

    | :--- | :--- |

    | +(Addition) | Add two operands Example: A+B |

    | -(subtraction) | Subtraction from one operands to another one Example: A-B |

    | *(Multiplication) | Multiply both the operands Example: A*B |

    | /(Division) | Divide the numerator by the denominator Example: B/A |

    | %(Modulus) | Remainder of an integer division is 0 Example: B%A will give 0
    |

    | ++(Increment) | Increase an integer value by one Example: If value A is 9, then
    A++ will give 11 |

    | --(Decrement) | decrease an integer value by one Example: If value A is 11,
    then A-- will give 7 |


    # Comparison Operators


    In the Comparison Operator, two operands A and B are compared.


    | Operators | Description |

    | :--- | :--- |

    | ==(Equal) | It checks the value of two operands is equal or not, if yes then
    the condition becomes true. E.g. A=1, B=2. (A==B) condition is not true |

    | !=(Not Equal) | It checks the value of two operands is equal or not, if the
    values are not equal, then the condition becomes true. E.g. A=1, B=2. (A!=B) is
    true. |

    | >(Greater than) | It checks the value between two operands which one is greater,
    if condition is right then, it display true. E.g. (A>B) is not true. |

    | <(Less than) | It checks the value between two operands which one is less, if
    condition is right then, it display true. E.g. (A<B) is true. |

    | >=(Greater than or Equal to) | It checks the value of the first operand is greater
    than or equal to the value of second operand, if condition is right then it displays
    true. E.g. - (A>=B) not true. |


