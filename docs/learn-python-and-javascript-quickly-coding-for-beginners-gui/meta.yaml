    Book Author is: Chetan Bhagat\n\n## Methods of Object\n\n## EXAMPLE\n\n```html\n\
    <!DOCTYPE html>\n<html>\n<head>\n<title>User-defined objects</title>\n<script\
    \ type=\"text/javascript\">// Define a function which will work as a method\n\
    function addPrice(amount){\n    this.price = amount;\n}\nfunction book(title,\
    \ author){\n    this.title = title;\n    this.author = author;\n    this.addPrice\
    \ = addPrice; // Assign that method as property.\n}\n</script>\n</head>\n<body>\n\
    <script type=\"text/javascript\">\nvar myBook = new book(\"5 Points Someone\"\
    , \"Chetan Bhagat\");\nmyBook.addPrice(150);\ndocument.write(\"Book Title is :\
    \ \" + myBook.title + \"<br>\");\ndocument.write(\"Book Author is : \" + myBook.author\
    \ + \"<br>\");\ndocument.write(\"Book Price is : \" + myBook.price + \"<br>\"\
    );\n</script>\n</body>\n</html>\n```\n\n## OUTPUT\n\nBook Author is: Chetan Bhagat\n\
    \nBook Price is: 150\n\n## Javascript array\n\nArrays are used to describe a set\
    \ of elements in a single unit or memory place.\n\nAny element that enters the\
    \ array will be stored in the array with a unique index starting at zero. We can\
    \ store data with the aid of indexes.\n\nIn JavaScript, we must use the new keyword\
    \ to declare an array. We use new Array to generate an array (n).\n\nThe number\
    \ of slots in the sequence is denoted by n.\n\n## SYNTAX\n\n```javascript\nmyarray\
    \ = new Array(n);\n```\n\n**NOTE:** If we generate an array in JavaScript without\
