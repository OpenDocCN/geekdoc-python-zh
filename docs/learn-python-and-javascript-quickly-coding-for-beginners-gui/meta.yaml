    \ to the reader, it is valuable information provided by the programmer in source\
    \ code.\n\nDuring compilation, comments are not executed and are not shown on\
    \ the output either.\n\n## Types of comments in Python\n\n1. Single line comment\
    \ (#)\n2. Multi-line string as comment (\"\"\"\")\n\n### 1) Single line comments\n\
    \nSingle-line comments are used for one-line statements in Python, such as explanations\
    \ of various variables, functions, expressions, etc.\n\nA hash (#) symbol is used\
    \ to render single-line comments without whitespace when the comments go to the\
    \ next line, then at the beginning of the next line they must position each other's\
    \ hashtag (#).\n\nLet's see an instance and try to understand how in the software\
    \ we apply the single-line comments.\n\n#### EXAMPLE\n\n```\n# Single line comments\
    \ example\n# a program to print a given string and addition.\n\nprint('Welcome\
    \ @ Learnpython')\na=2\nb=5\nprint(a+b)\n\n# addition of both numbers by using\
    \ plus(+) sign.\n```\n\n### 2) Multi-line string comments\n\nAs we've seen in\
    \ the above example, we have to put a hash (#) symbol in each line for multi-line\
    \ comments.\n\nIn Python, multi-line string comments are given using the delimiter\
    \ When it does not fit into one line, it is helpful.\n\nWe have to enclose the\
    \ string with a delimiter at both ends for multiline string comments.\n\n####\
    \ EXAMPLE\n\n```\n\"\"\"\n    Here we will check a given number n is even or odd\n\
    \    with multi-line comments in Python.\n\"\"\"\n\nn=6768\n\nif n%2==0:\n   \
    \ print(\"Even number.\")\nelse:\n    print(\"Odd number.\")\n```\n\n## Block\
    \ Comments in Python\n\n### Comments\n\nA comment is a piece of text in a computer\
    \ program that is intended to be an interpretation or annotation.\n\nIt readable\
    \ by the author in the source code and that is ignored by the compiler / interpreter.\n\
    \n### Type of Python Comments\n\n**Block Comments** and **Inline Comments**\n\n\
    #### 1) Block Comments\n\nFor the piece of code that follows, Block comments apply.\
    \ It may refer to a part of the code or the code as a whole.\n\nThey have the\
    \ same degree of indentation as that code.\n\nEach comment line begins with a\
    \ #.\n\n##### EXAMPLE\n\n```\n# Python program to print\n# Hello World\n\nprint(\"\
    Hello World\")\n```\n\n##### Output:\n\n```\nHello World\n```\n\nIt is also possible\
    \ to make block comments using `''' '''` Something written in these quotes is\
    \ known as Comment.\n\n#### EXAMPLE\n\n```\n\"\"\"\nPython program to print\n\
    Hello World\n\"\"\"\n\nprint(\"Hello World\")\n```\n\n#### EXAMPLE 2\n\n```\n\
    def hello():\n    \"\"\"\n    Here, this is docstring\n    since it is written\
    \ right after\n    the function definition.\n\n    below given print statement\
    \ will print\n    Hello World\n    \"\"\"\n    print(\"Hello World\")\n\nif __name__\
    \ == \"__main__\":\n    # calling hello function\n    hello()\n```\n\n#### 2)\
    \ Inline Comments\n\nA comment on the same line as a declaration is an inline\
    \ comment.\n\nInline remarks should be separated from the argument by at least\
    \ two spaces.\n\nThey're supposed to begin with a # and a single room.\n\n####\
    \ EXAMPLE\n\n```\nprint(\"Hello World\") # This is an inline comment\n```\n\n\
    #### OUTPUT\n\n```\nHello World\n```\n\n### Create multiline comments\n\nThere\
    \ are two ways to do this when we need to comment on several lines / statements,\
    \ either comment on each line or build multiline comments (or block comment).\n\
    \nThe first approach is to comment on every section,\n\nThis can be regarded as\
    \ a single line comment in Python-at the beginning of each line to be commented,\
    \ we use the hash character (#).\n\n```\n# This is line 1\n# This is line 2\n\
    # This is line 3\n```\n\nAnd, the second way to comment on the segment,\n\nThis\
    \ can be considered in Python as a multiline comment-we use triple single quotes\
    \ (''') at the beginning of the segment to be commented and triple single quotes\
    \ (''') at the end.\n\n```\n'''\nThis is line 1\nThis is line 2\nThis is line\
    \ 3\n'''\n```\n\n#### EXAMPLE\n\n```\n'''\nFunction name: print_text\nParameters:\
    \ None\nReturn type: None\nDescription: This function will print some text on\
    \ the screen\n\"\"\"\n\ndef print_text():\n    print(\"Hello, world! How are you?\"\
    )\n\nif __name__ == \"__main__\":\n    # Here, we will call the print_text function\n\
    \    # that will print some text on the screen\n    print_text()\n```\n\n## Python\
    \ Numeric Types\n\nData types are an important concept in programming.\n\nData\
    \ of different kinds can be stored in variables according to the role that we\
    \ want the variables to perform.\n\nIn Python, the built-in data types are\n\n\
    - Text Type\n- Numeric Type\n- Mapping Type\n- Sequence Type\n- Set Type\n- Boolean\
    \ Type\n- Binary Type\n\n3 numeric data types in Python:\n\n1. int\n2. float\n\
    3. complex\n\n### 1) int\n\nThe Integer numeric form is used without decimal points\
    \ to store signed integers, such as -5, 2, 78, etc.\n\n#### EXAMPLE\n\n```\n#\
    \ Assigning integer values to Variables\nx = 8\ny = -9\n\n# Manipulating the value\
    \ of x\nx = x + y\n\n# Prints the updated value of x\nprint(\"x= \", x)\n\n# Prints\
