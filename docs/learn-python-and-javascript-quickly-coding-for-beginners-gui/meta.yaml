    \ - (A << 1) 的结果是 4。 |\n| >> (右移) | 左操作数的值向右移动右操作数指定的位数。例如 - (A >> 1) 的结果是 1。\
    \ |\n| >>> (零填充右移) | 此运算符与 >> (右移) 类似，只是左侧移入的位始终为零。例如 - (A >>> 1) 的结果是 1。 |\n\n\
    ## 逻辑运算符\n\n布尔值通常用于逻辑运算符。\n逻辑运算符如下：\n\n| 运算符 | 描述 |\n| :--- | :--- |\n| && (逻辑与)\
    \ | 如果两个操作数都非零，则条件为真。例如 – (A && B) 为真。 |\n| \\|\\| (逻辑或) | 如果两个操作数中任意一个非零，则条件为真。例如\
    \ – (A \\|\\| B) 为真。 |\n| ! (逻辑非) | 反转其操作数的逻辑状态。如果条件为真，则逻辑非运算符会将其变为假。例如 !(A &&\
    \ B) 为假。 |\n\n## Javascript If Else\n\nJavaScript 中的条件语句用于根据条件执行不同的任务。\n\n在 JavaScript\
    \ 中，有三种类型的语句。\n\n- 1. if 语句。\n- 2. if else 语句。\n- 3. if else if 语句。\n\n## if 语句\n\
    \n如果条件为真或假，JavaScript 中使用 **if 语句**来执行代码。\n\n```\nif (condition){ //\n    //要评估的内容\n\
    }\n```\n\n![](img/3814666d53e5e432023792c444b3b015_82_0.png)\n\n## 示例\n\n```\n\
    <!DOCTYPE html>\n<html>\n<body>\n<script>\nvar x=50;\nif(x>30){\ndocument.write(\"\
    x 的值大于 30\");\n}\n</script>\n</body>\n</html>\n```\n\n## 输出\n\nx 的值大于 30\n\n##\
    \ if else 语句\n\n如果条件为真或假，则使用 **if else** 语句。\n\n## 语法\n\n```\nif(condition)\n\
    {\n// 语句集\n}\nelse\n{\n// 语句集\n}\n```\n\n![](img/3814666d53e5e432023792c444b3b015_84_0.png)\n\
    \n## 示例\n\n```\n<!DOCTYPE html>\n<html>\n<body>\n<script>\nvar x=20;\nif(x%2==0){\n\
    document.write(\"x 是偶数\");\n}\nelse{\ndocument.write(\"a 是奇数\")\n}\n</script>\n\
    </body>\n</html>\n```\n\n## 输出\n\nX 是偶数\n\n## If else if\n\n它只是查看内容以通过多个表达式检查表达式是否有效。**If\
    \ else if** 是 if else 语句的更高级版本。\n\n## 语法\n\n```\nIf (condition1)\n{\n如果条件 1 为真则执行的语句\n\
    }\nelse if (condition 2)\n{\n如果条件 2 为真则执行的语句\n}\nelse if (condition 3)\n{\n如果条件\
    \ 3 为真则执行的语句\n}\nelse\n{\n如果没有条件为真则执行的语句\n}\n```\n\n## 示例\n\n```\n<!DOCTYPE html>\n\
    <html>\n<body>\n<script>\nvar x=50;\nif (x==10){\ndocument.write(\"x 等于 10\");\n\
    }\nelse if(x==50){\ndocument.write(\"x 等于 50\");\n}\nelse if(x==30){\ndocument.write(\"\
    x 等于 30\");\n}\nelse{\ndocument.write(\"a 不等于 10、50 或 30\");\n}\n</script>\n</body>\n\
    </html>\n```\n\n## 输出\n\nx 等于 50\n\n## Javascript Switch 语句\n\n在 JavaScript 中，switch\
    \ 语句用于在不同条件下执行单个代码。它与 else if 语句相同。\n\n![](img/3814666d53e5e432023792c444b3b015_87_0.png)\n\
    \n## 语法\n\n```\nswitch (expression)\n{\ncase 1: statement(s)\nbreak;\ncase 2:\
    \ statement(s)\nbreak;\n...\ncase n: statement(s)\nbreak;\ndefault: statements(s)\n\
    }\n```\n\n## 示例\n\n```\n<!DOCTYPE html>\n<html>\n<body>\n<script>\nvar grade='B';\n\
    var result;\nswitch(grade){\ncase 'A':\nresult=\"A 等级\";\nbreak;\ncase 'B':\n\
    result=\"B 等级\";\nbreak;\ncase 'C':\nresult=\"C 等级\";\nbreak;\ndefault:\nresult=\"\
    无等级\";\n}\ndocument.write(result);\n</script>\n</body>\n</html>\n```\n\n## 输出\n\
    \nB 等级\n\n## JavaScript 函数\n\n在 <Script>.....</script> 标签内构建新函数的能力是 JavaScript\
    \ 的一个基本特性。在 JavaScript 中，使用 function 关键字来声明函数。\n\n为了重用文件，我们多次调用 JavaScript 函数。\n\
    \n## 优点 - JavaScript 函数\n\n- 1. 代码可重用性：我们多次使用相同的功能以节省时间和代码。\n- 2. 更少的编码：因此我们的软件被压缩了。当我们执行常规任务时，我们不需要编写大量代码。\n\
    \n## 语法\n\n```\nfunction functionName(参数或无)\n{\n语句\n}\n```\n\n## 示例\n\n```\n<!DOCTYPE\
    \ html>\n<html>\n<body>\n<script>\nfunction msg()\n{\nalert(\"你好！世界\");\n}\n</script>\n\
    <input type=\"button\" onclick=\"msg()\" value=\"点击此处\"/>\n</body>\n</html>\n\
    ```\n\n## 输出\n\n你好世界！\n\n## 带参数的函数\n\n通过传递参数调用函数。\n\n```\n<!DOCTYPE html>\n<html>\n\
    <body>\n<script>\nfunction getcube(number)\n{\nalert(number* number* number);\n\
    }\n</script>\n<form>\n<input type=\"button\" value=\"点击\" onclick=\"getcube(3)\"\
    />\n</form>\n</body>\n</html>\n```\n\n## 输出\n\n27\n\n## 示例\n\n```\n<!DOCTYPE html>\n\
    <html>\n<body>\n<script>\nfunction getname()\n{\nname=prompt(\"请输入姓名\");\nalert(\"\
    欢迎 \" + name + \" 先生/女士\");\n}\n</script>\n</body>\n<form>\n<input type=\"button\"\
    \ value=\"点击\" onclick=\"getname()\"/>\n</form>\n</html>\n```\n\n## 带返回值的函数\n\n\
    调用返回值的函数并在程序中使用它。\n\n```\n<!DOCTYPE html>\n<html>\n<body>\n<script>\nfunction\
    \ getInfo()\n{\nreturn \"你好 Raj！你好吗？\";\n}\n</script>\n<script>\ndocument.write(getInfo());\n\
    </script>\n</body>\n</html>\n```\n\n## 输出\n\n你好 Raj！你好吗？\n\n## Function() 构造函数\n\
    \n函数语句不仅用于定义新函数；它还可以与 Function() 构造函数和 new 运算符一起用于动态定义函数。\n\n## 语法\n\n```\n<script>\n\
    \    var variablename = new Function(Arg1, Arg2..., \"函数体\"\n</script>\n```\n\n\
    ## 示例\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n<script>\nvar func = new Function(\"\
    a\", \"b\", \"return a+b;\");\nfunction secondFunction(){\nvar result;\nresult\
    \ = func(50,50);\ndocument.write ( result );\n}\n</script>\n</head>\n<body>\n\
    <p>点击按钮调用函数</p>\n<form>\n<input type=\"button\" onclick=\"secondFunction()\" value=\"\
    调用函数\">\n</form>\n<p>在函数内使用不同的参数并自行尝试...\n</p>\n</body>\n</html>\n```\n\n## 函数字面量\n\
    \n函数字面量的定义是 JavaScript 1.2 中引入的另一种描述函数的方式。它是一个描述没有名称的函数的表达式。\n\n函数字面量的语法类似于函数语句，不同之处在于它用作表达式而不是语句，并且不需要函数名。\n\
    \n## 语法\n\n```\n<script>\nvar variablename = function (参数列表){\n```"
