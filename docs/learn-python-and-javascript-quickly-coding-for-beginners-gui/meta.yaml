    # 1) Single line comments


    Single-line comments are used for one-line statements in Python, such as explanations
    of various variables , functions, expressions, etc.


    A hash (#) symbol is used to render single-line comments without whitespace when
    the comments go to the next line, then at the beginning of the next line they
    must position each other''s hashtag (#).


    Let''s see an instance and try to understand how in the software we apply the
    single-line comments.


    # EXAMPLE


    ```

    # Single line comments example

    # a program to print a given string and addition.


    print(''Welcome @ Learnpython'')

    a=2

    b=5

    print(a+b)


    # addition of both numbers by using plus(+) sign.

    ```


    # 2) Multi-line string comments


    As we''ve seen in the above example, we have to put a hash (#) symbol in each
    line for multi-line comments.'
