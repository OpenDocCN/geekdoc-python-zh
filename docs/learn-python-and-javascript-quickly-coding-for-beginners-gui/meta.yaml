    # JavaScript 简介


    本 JavaScript 教程让初学者和专家都能轻松学习 JavaScript。


    要学习 JavaScript，你只需要对**编程**有基本的了解。


    # JavaScript 示例


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <h2>欢迎来到 JavaScript</h2>

    <script>

    document.write("Hello Friends");

    </script>

    </body>

    </html>

    ```


    可以通过在代码中添加 JavaScript 语句来实现 JavaScript。


    `<script>…</script>`。


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script type="text/javascript">

    document.write("Hello World");

    </script>

    </body>

    </html>

    ```


    # JavaScript 代码可以写在 JavaScript 的 3 个地方


    1.  在 HTML 的 `<body>......</body>` 标签之间。

    2.  在 HTML 的 `<head>......</head>` 标签之间。

    3.  在 .js 文件中（外部 JavaScript）。


    # 示例（代码在 body 标签之间）


    在下面的示例中，body 标签包含 JavaScript 代码。


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script type="text/javascript">

    alert("Hello world");

    </script>

    </body>

    </html>

    ```


    # 示例2（代码在 head 标签之间）


    我们将在下面的示例中创建函数 msg()。在 JavaScript 中，你必须在函数名中编写函数来构造一个函数。要调用一个方法，我们必须首先创建一个实例。在这个例子中，我们使用单击事件来调用
    msg() 函数。


    ```html

    <!DOCTYPE html>

    <html>

    <head>

    <script type="text/javascript">

    function msg(){

    alert("Hello world");

    }

    </script>

    </head>

    <body>

    <p>欢迎来到 Javascript</p>

    <form>

    <input type="button" value="click" onclick="msg()"/>

    </form>

    </body>

    </html>

    ```


    # 外部 JavaScript 文件


    我们可以创建一个可以在 HTML 文件中使用的 JavaScript 文件。


    由于单个 JavaScript 文件可以在多个 HTML 页面中使用，它允许代码重用。


    它提高了网页的效率。


    该文件必须具有 **.js** 扩展名。


    # 示例


    ```html

    <!DOCTYPE html>

    <html>

    <head>

    <script type="text/javascript" src="message.js"></script>

    </head>

    <body>

    <p>Hello world</p>

    <form>

    <input type="button" value="click" onclick="msg()"/>

    </form>

    </body>

    </html>

    ```


    # Javascript 注释


    JavaScript 中的注释用于描述代码。它用于添加与代码相关的内容，例如警告或建议，以便最终用户能够理解。


    ## JavaScript 注释的类型


    JavaScript 注释有两种：


    1.  单行注释

    2.  多行注释


    ### 单行注释


    双斜杠（//）用于表示单行注释。在程序运行时，双斜杠（//）和行尾之间的任何文本都将被忽略。


    例如。在语句前添加注释。


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    // 单行注释 //

    document.write("hello world");

    </script>

    </body>

    </html>

    ```


    例如。在语句后添加注释。


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    var a=10;

    var b=20;

    var c=a+b; // 它将 a 和 b 变量的值相加

    document.write(c); // 打印 10 和 20 的和

    </script>

    </body>

    </html>

    ```


    # 输出


    30


    # 多行注释


    也可以为多行注释创建单行和多行注释。跨多行的注释以 `/*` 开头，以 `*/` 结尾。JavaScript 将忽略它们之间的文本。


    `/* 在此编写注释 */`


    # 示例


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    /* 这是多行注释。

    它不会被显示 */

    document.write ("JavaScript 多行注释示例");

    </script>

    </body>

    </html>

    ```


    # Javascript 变量


    值（name=”Ram”）和表达式（Sum=x+y）存储在变量中。

    在使用变量之前，我们必须先声明它。要声明一个变量，我们使用关键字 **var**，如下所示：


    ```javascript

    var name;

    ```


    变量有两种类型：


    1.  局部变量

    2.  全局变量


    # 局部变量


    – 它在函数或块内声明。


    **示例**


    ```html

    <script>

    function abc(){

    var x=10; // 局部变量

    }

    </script>

    ```


    # 全局变量


    - 它具有全局作用域，这意味着它可以在 JavaScript 代码中的任何地方指定。


    在函数外部声明一个变量。


    **示例**


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    var data =200; // 全局变量

    function a(){

    document.writeln(data);

    }

    function b(){

    document.writeln(data);

    }

    a(); // 调用 javascript 函数

    b();

    </script>

    </body>

    </html>

    ```


    # 在函数内声明 JavaScript 全局变量


    我们需要使用 **window 对象**在函数内声明 JavaScript 全局变量。


    # 示例


    ```javascript

    window.value=90;

    ```


    现在可以在任何函数内声明，并从任何函数内访问。


    # 示例


    ```html

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    function a(){

    window.value=50; // 使用 window 对象声明全局变量

    }

    function b(){

    alert(window.value); // 从其他函数访问全局变量

    }

    a();

    b();

    </script>

    </body>

    </html>

    ```


    # Javascript 数据类型


    它有多种数据类型来存储各种类型的值。


    在 Javascript 中，有两种数据类型。


    1.  原始数据类型。

    2.  非原始数据类型。


    由于 JavaScript 是一种动态风格的语言，我们不需要定义变量的类型，因为 JavaScript 引擎会动态使用它。在这种情况下，数据类型使用 var
    定义。它可以存储任何类型的值，包括数字、字符串和对象。


    ## 示例


    ```javascript

    var a=Ram; // 字符串

    var b=20; // 数字

    var x= {FirstName:"Ram", lastName:"Doe"}; // 对象

    ```


    ## JavaScript 原始数据类型


    JavaScript 中有 5 种原始数据类型。


    | 数据类型 | 描述 |

    | --- | --- |

    | String | 它表示字符序列，例如 "Hello" |

    | Number | 它表示数值，例如 1,2,3,4,5,6。 |

    | Boolean | 它表示布尔值，正确或错误。 |

    | Undefined | 它表示未定义的值。 |

    | Null | 它表示**完全没有值**。 |


    # JavaScript 非原始数据类型


    有 3 种非原始数据类型如下：


    | 数据类型 | 描述 |

    | --- | --- |

    | Object | 它表示实例，通过它可以访问成员。 |

    | Array | 它表示一组相似的值。 |

