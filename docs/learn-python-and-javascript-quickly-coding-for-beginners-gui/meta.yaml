    | >(大于) | 它检查两个操作数中哪个值更大，如果条件正确，则显示真。例如 (A>B) 不为真。 |

    | <(小于) | 它检查两个操作数中哪个值更小，如果条件正确，则显示真。例如 (A<B) 为真。 |

    | >=(大于或等于) | 它检查第一个操作数的值是否大于或等于第二个操作数的值，如果条件正确，则显示真。例如 - (A>=B) 不为真。 |


