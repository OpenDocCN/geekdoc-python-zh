- md: '## Javascript Date


    Date Object is a data form that is built into the JavaScript language. The new
    Date object is used to construct data objects. A single moment in time is represented
    by a JavaScript Date case. The only way to create a JavaScript date object is
    to use JavaScript as a constructor.


    ## SYNTAX


    The Date() constructor can be used to generate a Date object using the following
    syntaxes.


    ```

    new Date();

    new Date(value);

    new Date(dateString);

    new Date(year, month, day, hours, minutes, seconds, milliseconds);

    ```


    **NOTE: Bracketed parameters are always optional.**


    ## Descriptions


    ### year


    The year is represented by an integer number. Map of values ranging from 0 to
    99 for the years 2000 to 2099.


    ### Month


    Beginning with 0 for January and ending with 11 for December, this integer value
    represents the month.


    ### Date


    It''s an option. The month''s day is represented by an integer value.


    ### Hours


    It''s an option. The hours of the day are represented by an integer value.


    ### Minutes


    It''s an option. The minute section of time is represented by an integer value.


    ### Seconds


    It''s an option. The second time segment is represented by an integer value.


    ### Milliseconds


    It''s an option. A millisecond segment of time is represented by an integer value.


    ## Example of Date


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    var date=new Date();

    var day=date.getDate();

    var month=date.getMonth()+1;

    var year=date.getFullYear();

    document.write("<br>Date: "+day+"/"+month+"/"+year);

    </script>

    </body>

    </html>

    ```


    ## Current Time - Example


    ```

    <!DOCTYPE html>

    <html>

    <body>

    Current Time: <span id="txt"></span>

    <script>

    var today=new Date();

    var h=today.getHours();

    var m=today.getMinutes();

    var s=today.getSeconds();

    document.getElementById(''txt'').innerHTML=h+":"+m+":"+s;

    </script>

    </body>

    </html>

    ```


    ## JavaScript Math


    Math is a built-in object with properties and methods for mathematical functions
    and constants.


    It enables you to carry out mathematical operations on numbers.


    Syntax


    ```

    var pi_val = Math.PI;

    var sin_val = Math.sin(30);

    ```


    ### Examples


    #### Math.pow()


    The value of x to the power of y is returned by Math.pow(x,y):


    ```

    <!DOCTYPE html>

    <html>

    <body>


    <h2>JavaScript Math.pow()</h2>


    <p>Math.pow(x,y) returns the value of x to the power of y:</p>


    <p id="demo"></p>


    <script>

    document.getElementById("demo").innerHTML = Math.pow(6,2);

    </script>


    </body>

    </html>

    ```


    #### Math.sqrt()


    The square root of x is returned by Math.sqrt(x).


    ```

    <!DOCTYPE html>

    <html>

    <body>


    <h2>JavaScript Math.sqrt()</h2>


    <p>Math.sqrt(x) returns the square root of x:</p>


    <p id="demo"></p>


    <script>

    document.getElementById("demo").innerHTML = Math.sqrt(81);

    </script>


    </body>

    </html>

    ```


    #### Math.ceil()


    The value of x rounded up to the nearest integer is returned by Math.ceil(x):


    ```

    <!DOCTYPE html>

    <html>

    <body>


    <h2>JavaScript Math.ceil()</h2>


    <p>Math.ceil() rounds a number <strong>up</strong> to its nearest integer.</p>


    <p id="demo"></p>


    <script>

    document.getElementById("demo").innerHTML = Math.ceil(6.8);

    </script>


    </body>

    </html>

    ```


    ## Javascript Number


    The Number object is a wrapper object that lets you manipulate numerical values.


    The Number() constructor is used to build the number object.


    It could be either an integer or a floating-point number.


    ### SYNTAX


    ```

    var n=new Number(value);

    ```


    ### EXAMPLES


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    var x=100;//integer value

    var y=100.7;//floating point value

    var z=12e5;//exponent value, output: 1200000

    var n=new Number(20);//integer value by number object

    document.write(x+" "+y+" "+z+" "+n);

    </script>

    </body>

    </html>

    ```


    ### OUTPUT


    100 100.7 1200000 20


    ### Description


    The number object is most commonly used for the following purposes:


    - It returns NaN if the claim cannot be converted to a number (Not a Number).

    - Number can be used to perform a type conversion in a non-constructor context
    (i.e., without the new operator).


    ### JavaScript Number Constants


    | Constant | Description |

    |---|---|

    | MIN_VALUE | It returns the largest minimum value. |

    | MAX_VALUE | It returns the largest maximum value. |

    | POSITIVE_INFINITY | It returns the positive infinity, overflow value. |

    | NEGATIVE_INFINITY | It returns the negative infinity, overflow value. |

    | NaN | It represent "Not a Number" value. |'
  mdcn: '## Javascript 日期


    日期对象是 JavaScript 语言内置的数据形式。`new Date` 对象用于构造数据对象。一个 JavaScript Date 实例代表一个特定的时间点。创建
    JavaScript 日期对象的唯一方法是使用 JavaScript 作为构造函数。


    ## 语法


    `Date()` 构造函数可用于使用以下语法生成日期对象。


    ```

    new Date();

    new Date(value);

    new Date(dateString);

    new Date(year, month, day, hours, minutes, seconds, milliseconds);

    ```


    **注意：括号中的参数始终是可选的。**


    ## 描述


    ### year


    年份由一个整数表示。对于 2000 年到 2099 年，其值范围映射为 0 到 99。


    ### Month


    月份由一个整数表示，从 0（一月）开始，到 11（十二月）结束。


    ### Date


    这是可选的。月份中的日期由一个整数表示。


    ### Hours


    这是可选的。一天中的小时数由一个整数表示。


    ### Minutes


    这是可选的。时间中的分钟部分由一个整数表示。


    ### Seconds


    这是可选的。时间中的秒部分由一个整数表示。


    ### Milliseconds


    这是可选的。时间中的毫秒部分由一个整数表示。


    ## 日期示例


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    var date=new Date();

    var day=date.getDate();

    var month=date.getMonth()+1;

    var year=date.getFullYear();

    document.write("<br>Date: "+day+"/"+month+"/"+year);

    </script>

    </body>

    </html>

    ```


    ## 当前时间 - 示例


    ```

    <!DOCTYPE html>

    <html>

    <body>

    Current Time: <span id="txt"></span>

    <script>

    var today=new Date();

    var h=today.getHours();

    var m=today.getMinutes();

    var s=today.getSeconds();

    document.getElementById(''txt'').innerHTML=h+":"+m+":"+s;

    </script>

    </body>

    </html>

    ```


    ## JavaScript 数学对象


    Math 是一个内置对象，包含用于数学函数和常量的属性和方法。


    它使你能够对数字执行数学运算。


    语法


    ```

    var pi_val = Math.PI;

    var sin_val = Math.sin(30);

    ```


    ### 示例


    #### Math.pow()


    `Math.pow(x,y)` 返回 x 的 y 次幂的值：


    ```

    <!DOCTYPE html>

    <html>

    <body>


    <h2>JavaScript Math.pow()</h2>


    <p>Math.pow(x,y) 返回 x 的 y 次幂的值：</p>


    <p id="demo"></p>


    <script>

    document.getElementById("demo").innerHTML = Math.pow(6,2);

    </script>


    </body>

    </html>

    ```


    #### Math.sqrt()


    `Math.sqrt(x)` 返回 x 的平方根。


    ```

    <!DOCTYPE html>

    <html>

    <body>


    <h2>JavaScript Math.sqrt()</h2>


    <p>Math.sqrt(x) 返回 x 的平方根：</p>


    <p id="demo"></p>


    <script>

    document.getElementById("demo").innerHTML = Math.sqrt(81);

    </script>


    </body>

    </html>

    ```


    #### Math.ceil()


    `Math.ceil(x)` 返回将 x **向上**舍入到最接近的整数的值：


    ```

    <!DOCTYPE html>

    <html>

    <body>


    <h2>JavaScript Math.ceil()</h2>


    <p>Math.ceil() 将一个数字<strong>向上</strong>舍入到最接近的整数。</p>


    <p id="demo"></p>


    <script>

    document.getElementById("demo").innerHTML = Math.ceil(6.8);

    </script>


    </body>

    </html>

    ```


    ## Javascript 数字对象


    Number 对象是一个包装对象，允许你操作数值。


    `Number()` 构造函数用于创建数字对象。


    它可以是整数或浮点数。


    ### 语法


    ```

    var n=new Number(value);

    ```


    ### 示例


    ```

    <!DOCTYPE html>

    <html>

    <body>

    <script>

    var x=100;//整数值

    var y=100.7;//浮点数值

    var z=12e5;//指数值，输出：1200000

    var n=new Number(20);//通过数字对象创建的整数值

    document.write(x+" "+y+" "+z+" "+n);

    </script>

    </body>

    </html>

    ```


    ### 输出


    100 100.7 1200000 20


    ### 描述


    数字对象最常用于以下目的：


    - 如果声明无法转换为数字，则返回 NaN（非数字）。

    - Number 可以在非构造函数上下文中（即不使用 `new` 操作符）用于执行类型转换。


    ### JavaScript 数字常量


    | 常量 | 描述 |

    |---|---|

    | MIN_VALUE | 返回最小的正数。 |

    | MAX_VALUE | 返回最大的正数。 |

    | POSITIVE_INFINITY | 返回正无穷大，溢出值。 |

    | NEGATIVE_INFINITY | 返回负无穷大，溢出值。 |

    | NaN | 表示“非数字”值。 |'
