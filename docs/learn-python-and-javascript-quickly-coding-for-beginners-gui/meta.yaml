    ## Python 中的注释\n\nPython 中的注释用于提高代码的可读性。\n\n对于读者更好地理解代码和逻辑，它们是程序员在源代码中提供的有价值的信息。\n\
    \n在编译期间，注释不会被执行，也不会在输出中显示。\n\n## Python 中注释的类型\n\n1. 单行注释（#）\n2. 多行字符串注释（\"\"\"\
    \"）\n\n### 1) 单行注释\n\n单行注释用于 Python 中的单行语句，例如对各种变量、函数、表达式等的解释。\n\n使用井号（#）符号来呈现单行注释，当注释换行时，下一行的开头必须对齐井号（#）。\n\
    \n让我们看一个实例，尝试理解在软件中如何应用单行注释。\n\n#### 示例\n\n```\n# 单行注释示例\n# 一个打印给定字符串和加法的程序。\n\
    \nprint('Welcome @ Learnpython')\na=2\nb=5\nprint(a+b)\n\n# 使用加号(+)进行两个数字的加法。\n\
    ```\n\n### 2) 多行字符串注释\n\n正如我们在上面的示例中看到的，对于多行注释，我们必须在每一行都放置一个井号（#）符号。\n\n在 Python\
    \ 中，当内容不适合一行时，使用分隔符提供多行字符串注释很有帮助。\n\n对于多行字符串注释，我们必须用分隔符将字符串括起来。\n\n#### 示例\n\n\
    ```\n\"\"\"\n    这里我们将检查给定的数字 n 是偶数还是奇数\n    使用 Python 中的多行注释。\n\"\"\"\n\nn=6768\n\
    \nif n%2==0:\n    print(\"Even number.\")\nelse:\n    print(\"Odd number.\")\n\
    ```\n\n## Python 中的块注释\n\n### 注释\n\n注释是计算机程序中的一段文本，旨在作为解释或注解。\n\n它在源代码中对作者可读，并被编译器/解释器忽略。\n\
    \n### Python 注释的类型\n\n**块注释**和**行内注释**\n\n#### 1) 块注释\n\n块注释适用于其后的代码片段。它可以指代代码的一部分或整个代码。\n\
    \n它们与代码具有相同的缩进级别。\n\n每一行注释都以 # 开头。\n\n##### 示例\n\n```\n# Python 程序打印\n# Hello\
    \ World\n\nprint(\"Hello World\")\n```\n\n##### 输出：\n\n```\nHello World\n```\n\
    \n也可以使用 `''' '''` 来制作块注释，写在这些引号中的内容被称为注释。\n\n#### 示例\n\n```\n\"\"\"\nPython 程序打印\n\
    Hello World\n\"\"\"\n\nprint(\"Hello World\")\n```\n\n#### 示例 2\n\n```\ndef hello():\n\
    \    \"\"\"\n    这里，这是文档字符串\n    因为它写在函数定义之后。\n\n    下面的 print 语句将打印\n    Hello\
    \ World\n    \"\"\"\n    print(\"Hello World\")\n\nif __name__ == \"__main__\"\
    :\n    # 调用 hello 函数\n    hello()\n```\n\n#### 2) 行内注释\n\n与声明在同一行的注释是行内注释。\n\n\
    行内注释应与参数至少用两个空格隔开。\n\n它们应该以 # 和一个空格开头。\n\n#### 示例\n\n```\nprint(\"Hello World\"\
    ) # 这是一个行内注释\n```\n\n#### 输出\n\n```\nHello World\n```\n\n### 创建多行注释\n\n当我们需要注释多行/语句时，有两种方法：要么注释每一行，要么创建多行注释（或块注释）。\n\
    \n第一种方法是注释每一行，\n\n这在 Python 中可以被视为单行注释——在要注释的每一行开头使用井号（#）。\n\n```\n# 这是第 1 行\n\
    # 这是第 2 行\n# 这是第 3 行\n```\n\n第二种方法是注释代码段，\n\n这在 Python 中可以被视为多行注释——我们在要注释的代码段开头使用三个单引号（'''），在结尾也使用三个单引号（'''）。\n\
    \n```\n'''\n这是第 1 行\n这是第 2 行\n这是第 3 行\n'''\n```\n\n#### 示例\n\n```\n'''\n函数名：print_text\n\
    参数：无\n返回类型：无\n描述：此函数将在屏幕上打印一些文本\n\"\"\"\n\ndef print_text():\n    print(\"Hello,\
    \ world! How are you?\")\n\nif __name__ == \"__main__\":\n    # 这里，我们将调用 print_text\
    \ 函数\n    # 它将在屏幕上打印一些文本\n    print_text()\n```\n\n## Python 数值类型\n\n数据类型是编程中的一个重要概念。\n\
    \n根据我们希望变量执行的角色，可以在变量中存储不同种类的数据。\n\n在 Python 中，内置数据类型有\n\n- 文本类型\n- 数值类型\n- 映射类型\n\
    - 序列类型\n- 集合类型\n- 布尔类型\n- 二进制类型\n\nPython 中的 3 种数值数据类型：\n\n1. int\n2. float\n\
    3. complex\n\n### 1) int\n\n整数数值形式用于存储不带小数点的有符号整数，例如 -5、2、78 等。\n\n#### 示例\n\n\
    ```\n# 将整数值赋给变量\nx = 8\ny = -9\n\n# 操作 x 的值\nx = x + y\n\n# 打印 x 的更新值\nprint(\"\
    x= \", x)\n\n# 打印 x 的数据类型\nprint(\"Data type of x: \", type(x))\n```\n\n#### 输出\n\
    \n```\nx= -1\n\nData type of x: <class 'int'>\n```\n\n### 2) float\n\n浮点数的数值形式用于存储浮点值，例如\
    \ 6.66、58.9、3.14 等。\n\n浮点数也可以使用科学计数法，用 E 或 e 表示 10 的幂（3.6e3 = 3.6x 103 = 3600）。\n\
    \n#### 示例\n\n```\n# 将浮点值赋给变量\nx = 8.9\ny = -9.1\n\n# 操作 x 的值\nx = x - y\n\n# 打印\
    \ x 的更新值\nprint(\"x= \", x)\n\n# 打印 x 的数据类型\nprint(\"Data type of x: \", type(x))\n\
    ```\n\n#### 输出\n\n```\nx= 18.0\n\nData type of x: <class 'float'>\n```\n\n###\
    \ 3) complex\n\n复数数值形式用于存储复数，例如 3.14j、8.0 + 5.3j、2 + 6j 等。\n\n格式：实部 + 虚部 j\n\n\
    注意：J 必须表示复数的虚部。如果用 i 表示，在 Python 中是无效语法。\n\n#### 示例\n\n```\n# 将复数值赋给变量\nx = 1+8.5j\n\
    y = 4+9j\n\n# 操作 x 的值\nx = x + y\n\n# 打印 x 的更新值\nprint(\"x= \", x)\n```"
