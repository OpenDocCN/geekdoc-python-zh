- md: '## Variables and DataTypes


    ### 1. Number


    Data type numbers store numerical values. This type of data is eternal, i.e. the
    meaning of its object can not be modified (this aspect will be addressed later).

    They come in three different kinds:


    - **Integer & Long**

    - **Float/floating point**

    - **Complex**


    ### i) Integers:


    Integers are whole numbers with decimal digits such as 100000, -99, 0, 17 consisting
    of + or - sign.

    L is appended to the value when we want a value to be viewed as a very long integer
    value. Python considers those values as long integers.


    ```python

    >>> a = 10

    >>> b = 5192L #example of supplying a very long value to a variable

    >>> c= 4298114

    >>> type(c) # type ( ) is used to check data type of value

    ```


    ### ii) Floating Point:


    Floating-point numbers are called numbers of fractions or decimal points.

    A floating point number consists of a decimal digit series of signs (+,-) and
    a dot such as 0.0, -21.9, 0.98333328, 15.2963.


    ### iii) Complex:


    The python complex number consists of two floating point values, each one for
    real and imaginary sections.


    We''ll use x.real and x.imag to access various parts of the vector (object) x.

    The imaginary part of the number is defined by j instead of I so the imaginary
    part of 1 + 0j denotes zero.


    **EXAMPLE**


    ```python

    >>> x = 1+0j

    >>> print (x.real,x.imag)

    1.0 0.0

    ```


    ### 2. None


    This is a particular category of data with a single value. It is used in a scenario
    to indicate the absence of value / false. It is pictured by None.


    ### 3. Sequence


    An ordered set of objects, indexed by positive integers, is a sequence.


    It is a mixture of data types that are mutable and non-mutable.


    Lines, Lists & Tuples are three sequence data form types available in Python.


    #### 3.1) String:


    It is an ordered sequence of characters / letters.


    They are found in single quotes ('''') or double quotes ("").


    The quotes do not form part of the string.


    They just tell the machine where it starts and ends with the string constant.


    ```python

    >>> type (''Good Morning'')

    <class ''str''>

    >>> type (''3.2'')

    <class ''str''>

    ```


    #### 3.2) Lists:


    The list is also a sequence of some sort of importance.


    The values are called elements / objects in the list. Mutable and indexed / ordered
    are these.


    In square brackets, the list is enclosed.


    #### 3.3) Tuples:


    Tuples are a set of values and are indexed by integers of some kind. They''re
    unchangeable.


    ### 4. Sets


    Set is an unordered array of values, without duplicate entry, of any kind. Sets
    will be timeless.


    **EXAMPLE**


    ```python

    >>> s = set ([1,2,3,4])

    >>> print(s)

    {1, 2, 3, 4}

    ```


    ## Determine a Python variable''s type


    ### 1) type() method


    If type() is passed to a single argument, it returns the type of the given object.


    **EXAMPLE**


    ```python

    >>> test_string = "yes"

    >>> test_number = 1

    >>> print(type(test_string))

    <class ''str''>

    >>> print(type(test_number))

    <class ''int''>

    ```


    ### 2) isinstance() method


    The isinstance() function tests whether an object (the first argument) is a classinfo
    class instance or subclass (the second argument).


    **EXAMPLE**


    ```python

    >>> class Example:

    ...     name = ''include_help''

    ...

    >>> ExampleInstance = Example()

    >>> print(isinstance(ExampleInstance, Example))

    True

    >>> print(isinstance(ExampleInstance, (list, set)))

    False

    >>> print(isinstance(ExampleInstance, (list, set, Example)))

    True

    ```


    ### Comparison between type() and isinstance()


    | type() | isinstance() |

    | --- | --- |

    | It returns the type object of an object and comparing what it returns to another
    type object will only return True when the same type object are on both sides.
    | In order to see if an object has a certain type, use **isinstance()** as it
    checks to see if the object passed in the first argument is of the type of any
    of the type objects passed in the second argument. Hence, it works as expected
    with subclassing and old-style classes, all of which have the legacy type object
    instance. |


    ## Python Arithmetic Operators


    Arithmetic operators are used to perform different arithmetic / mathematical operations,
    and they are binary operators, meaning that calculations require two operands.


    | Operator | Name | Descriptions |

    | :--- | :--- | :--- |

    | + | Addition Operator | It returns the addition of two expressions. |

    | - | Subtraction Operator | It returns the subtraction of two expressions. |

    | * | Multiplication Operator | It returns the product of two expressions. |

    | ** | Power Operator | It returns the value of the expression raised to the given
    power i.e. it returns the expression1 raised to the power of expression2. |

    | / | Division Operator | It returns the quotient of two expressions. |

    | // | Floor Division Operator | It returns the integral part of the quotient
    of two expressions. |

    | % | Modulus Operator | It returns the decimal part of the quotient i.e. remainder
    of the division of two expressions. |


    **Syntax:**


    ```

    exp1 + exp2

    exp1 - exp2

    exp1 * exp2

    exp1 ** exp2

    exp1 / exp2

    exp1 // exp2

    exp1 % exp2

    ```


    **PROGRAM**


    ```python

    # Python program to demonstrate

    # the example of arithmetic operators


    a = 10

    b = 3


    # printing the values

    print("a:", a)

    print("b:", b)


    # operations

    print("a + b :", a + b)

    print("a - b :", a - b)

    print("a * b :", a * b)

    print("a ** b:", a ** b)

    print("a / b :", a / b)

    print("a // b:", a // b)

    print("a % b :", a % b)

    ```


    **Output:**


    ```

    a: 10

    b: 3

    a + b : 13

    a - b : 7

    a * b : 30

    a ** b: 1000

    a / b : 3.3333333333333335

    a // b: 3

    a % b : 1

    ```


    **EXAMPLE 2**


    ```python

    # Python program to demonstrate

    # the example of arithmetic operators


    a = 10.10

    b = -2.5


    # printing the values

    print("a:", a)

    print("b:", b)


    # operations

    print("a + b :", a + b)

    print("a - b :", a - b)

    print("a * b :", a * b)

    print("a ** b:", a ** b)

    print("a / b :", a / b)


    # // operator rounds the result

    # down to the nearest whole number

    print("a // b:", a // b)


    print("a % b :", a % b)

    ```


    **Output:**


    ```

    a: 10.1

    b: -2.5

    a + b : 7.6

    a - b : 12.6

    a * b : -25.25

    a ** b: 0.0030845837443758094

    a / b : -4.04

    a // b: -5.0

    a % b : -2.4000000000000004

    ```


    **EXAMPLE 3**


    ```python

    # Python program to demonstrate

    # the example of arithmetic operators

    # Operations on lists, strings, etc


    x = "Hello"

    y = "World"


    # ''+'', ''*'' with strings

    print("x + y:", x + y)

    print("x + y + x:", x + y + x)

    print("x * 2:", x * 2)

    print("x * 10:", x * 10)

    print()


    # ''+'', ''*'' with lists

    x = [10, 20, 30, 40]

    y = [40, 30, 20, 10]


    print("x + y:", x + y)

    print("x + y + x:", x + y + x)

    print("x * 2:", x * 2)

    print("x * 3:", x * 3)

    print()

    ```


    **Output:**


    ```

    x + y: HelloWorld

    x + y + x: HelloWorldHello

    x * 2: HelloHello

    x * 10: HelloHelloHelloHelloHelloHelloHelloHelloHelloHello

    x + y: [10, 20, 30, 40, 40, 30, 20, 10]

    x + y + x: [10, 20, 30, 40, 40, 30, 20, 10, 10, 20, 30, 40]

    x * 2: [10, 20, 30, 40, 10, 20, 30, 40]

    x * 3: [10, 20, 30, 40, 10, 20, 30, 40, 10, 20, 30, 40]

    ```


    ## Python Identity Operators


    Identity operators are used to perform an object comparison operation, i.e., these
    operators check whether or not both operands apply to the same objects (with the
    same memory location).


    The Identity Operators are follows,


    | Operator | Descriptions | Example |

    | :--- | :--- | :--- |

    | **is** | It returns True if both operands refer to the same objects; False,
    otherwise. | `x is y` |

    | **is not** | It returns True if both operands do not refer to the same objects;
    False, otherwise. | `x is not y` |


    **Syntax:**


    ```

    operand1 is operand2

    operand1 is not operand2

    ```


    **''is'' operator example**


    ```python

    # Python program to demonstrate the

    # example of identity operators


    x = [10, 20, 30]

    y = [10, 20, 30]

    z = x


    # Comparing the values using == operator

    print("x == y: ", x == y)

    print("y == z: ", y == z)

    print("z == x: ", z == x)

    print()


    # Comparing the objects

    # whether they are referring

    # the same objects or not

    print("x is y: ", x is y)

    print("y is z: ", y is z)

    print("z is x: ", z is x)

    print()

    ```


    **Output:**


    ```

    x == y:  True

    y == z:  True

    z == x:  True

    x is y:  False

    y is z:  False

    z is x:  True

    ```


