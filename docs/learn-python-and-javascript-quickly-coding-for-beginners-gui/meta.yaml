    \n```html\n<!DOCTYPE html>\n<html>\n<body>\n<script>\nvar i;\nvar emp = new Array();\n\
    emp[0] = \"Ajay\";\nemp[1] = \"Abhay\";\nemp[2] = \"Arun\";\nemp[3] = \"Shipra\"\
    ;\nfor (i=0; i<emp.length; i++)\n{\n    document.write(emp[i] + \"<br>\");\n}\n\
    </script>\n</body>\n</html>\n```\n\n## OUTPUT\n\nAjay\nAbhay\nArun\nShipra\n\n\
    ## EXAMPLE 2\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n<script type=\"text/javascript\"\
