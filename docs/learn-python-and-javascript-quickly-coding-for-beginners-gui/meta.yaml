    \ (i=0; i<num.length; i++)\n    {\n        sum = sum + num[i];\n    }\n    alert(sum)\n\
    }\n</script>\n</head>\n<body>\n<input type=\"button\" onclick=\"array()\" value=\"\
    click here\">\n</body>\n</html>\n```\n\n## FUNCTIONS IN ARRAY\n\n| Functions |\
