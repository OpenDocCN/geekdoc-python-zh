    # Python built-in keywords


    There are built-in python keywords in the python programming language, which are
    used to perform different tasks for different purposes.


    # All python keywords – List


    | Sr. | Keyword | Description |

    |---|---|---|

    | 1 | and | It is used for logical operations, it is a logical AND operator. It
    returns "True" if both operands are True. |

    | 2 | as | It is used to create an alias of a module. |

    | 3 | assert | It is used for debugging purpose, it returns an "AssertionError"
    if the given test condition is False. |

    | 4 | break | break the loop''s execution. It is used to transfer program''s control
    from a scope of loop body to the next statement written after the loop body. |

    | 5 | class | It is used to define/create a class. |

    | 6 | continue | It leaves the rest of the statements in the loop body and continues
    the next iteration of the loop. |

    | 7 | def | It is used to define/create a function. |

    | 8 | del | It is used to delete an object. |

    | 9 | elif | It is used with "if...elif...else" statement to check next condition.
    It is the same as "else if" of C, C++ language. |

    | 10 | else | It is used with "if...elif...else" statement to define an else block
    – if any condition is not True, else block executes. |'
