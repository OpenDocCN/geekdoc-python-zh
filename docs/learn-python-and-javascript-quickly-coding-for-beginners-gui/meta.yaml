- md: "# LEARN JAVASCRIPT QUICKLY: CODING FOR BEGINNERS\n\n![](img/3814666d53e5e432023792c444b3b015_0_0.png)\n\
    \nGUIDE TO LEARN CODING BASICS QUICKLY\n\nTAM JP\n\n# LEARN PYTHON QUICKLY: CODING\
    \ FOR BEGINNERS\n\n![](img/3814666d53e5e432023792c444b3b015_0_1.png)\n\nGUIDE\
    \ TO LEARN CODING BASICS QUICKLY\n\nTAM JP\n\n# LEARN PYTHON AND JAVASCRIPT QUICKLY:\
    \ CODING FOR BEGINNERS\n\n## GUIDE TO LEARN CODING BASICS QUICKLY\n\nTAM JP\n\n\
    [INTRODUCTION TO PYTHON](https://www.example.com)\n\n[FEATURES OF PYTHON](https://www.example.com)\n\
    \n[INSTALL PIP](https://www.example.com)\n\n[EXECUTING FIRST PROGRAM](https://www.example.com)\n\
    \n[PYTHON KEYWORDS](https://www.example.com)\n\n[PYTHON BUILT-IN KEYWORDS](https://www.example.com)\n\
    \n[COMMENTS IN PYTHON](https://www.example.com)\n\n[BLOCK COMMENTS IN PYTHON](https://www.example.com)\n\
    \n[CREATE MULTILINE COMMENTS](https://www.example.com)\n\n[PYTHON NUMERIC TYPES](https://www.example.com)\n\
    \n[VARIABLES AND DATATYPES](https://www.example.com)\n\n[DETERMINE A PYTHON VARIABLE'S\
    \ TYPE](https://www.example.com)\n\n[PYTHON ARITHMETIC OPERATORS](https://www.example.com)\n\
    \n[PYTHON IDENTITY OPERATORS](https://www.example.com)\n\n[MEMBERSHIP OPERATORS\
    \ IN PYTHON](https://www.example.com)\n\n[BEHAVIOR OF INCREMENT OPERATORS IN PYTHON](https://www.example.com)\n\
    \n[LOGICAL AND BITWISE NOT OPERATORS](https://www.example.com)\n\n[LOGICAL OPERATORS\
    \ ON STRING](LOGICAL OPERATORS ON STRING)\n\n[IF ELSE CONDITIONAL OPERATOR](IF\
    \ ELSE CONDITIONAL OPERATOR)\n\n[JAVASCRIPT INTRO](JAVASCRIPT INTRO)\n\n[JAVASCRIPT\
    \ EXAMPLE](JAVASCRIPT EXAMPLE)\n\n[JAVASCRIPT COMMENT](JAVASCRIPT COMMENT)\n\n\
    [JAVASCRIPT VARIABLE](JAVASCRIPT VARIABLE)\n\n[JAVASCRIPT DATA TYPES](JAVASCRIPT\
    \ DATA TYPES)\n\n[JAVASCRIPT IF ELSE](JAVASCRIPT IF ELSE)\n\n[JAVASCRIPT SWITCH\
    \ STATEMENT](JAVASCRIPT SWITCH STATEMENT)\n\n[JAVASCRIPT FUNCTION](JAVASCRIPT\
    \ FUNCTION)\n\n[JAVASCRIPT OBJECT](JAVASCRIPT OBJECT)\n\n[JAVASCRIPT ARRAY](JAVASCRIPT\
    \ ARRAY)\n\n[JAVASCRIPT STRING](JAVASCRIPT STRING)\n\n[JAVASCRIPT DATE](JAVASCRIPT\
    \ DATE)\n\n[JAVASCRIPT MATH](JAVASCRIPT MATH)\n\n[JAVASCRIPT NUMBER](JAVASCRIPT\
    \ NUMBER)\n\n# Introduction to Python\n\n## salient features of Python\n\nIt is\
    \ a programming language of general intent that can be used for both scientific\
    \ and non-scientific programming.\n\nFor beginners, it is excellent as the language\
    \ is translated, thereby producing immediate results.\n\nIt incorporates better\
    \ than the other languages of its time the principle of exception handling and\
    \ dynamic binding.\n\nEasily readable and understandable are the programs written\
    \ in Python.\n\nIt is a programming language independent of a platform.\n\nFor\
    \ customizable applications, it is suitable as an extension language.\n\nLearning\
    \ and using it is simple.\n\n## Major Applications\n\nGoogle search engine, Twitter,\
    \ etc.\n\nUsing Python, Bit Torrent peer to peer file sharing is written.\n\n\
    Python for hardware testing is used by Intel, Cisco, HP, IBM, etc.\n\nA Python\
    \ scripting API is provided by Maya.\n\nFor the creation of industrial robots,\
    \ Python Used\n\nFor their scientific programming activities, NASA and others\
    \ use Python.\n\n# Setting up Python Interpreter\n\nIn order to write and run\
    \ a Python program, we need to install a Python interpreter on our computer.\n\
    \nThe standard and most common Python development environment is IDLE (GUI integrated).\n\
    \nIDLE refers to the world of Integrated Growth.\n\nThis allows a single gui to\
    \ modify, run, search and debug Python programs. This atmosphere makes writing\
    \ programs simple.\n\nNOTE: In these tutorials, we'll be using version 3.6 of\
    \ Python IDLE to develop and run Python code. It is available for free at www.python.org.\n\
    \n# start up the IDLE\n\n![](img/3814666d53e5e432023792c444b3b015_5_0.png)\n\n\
    # Features of python\n\n- Object oriented\n- Strong exception handling\n- Automatic\
    \ memory management\n- Dynamic\n- Strong data types\n- Easy syntax\n- Indentation\
    \ based\n- Forgiving in nature\n\nPrinting \"Hello World\" in Python\n\n```\n\
    Python 3.7.0 (v3.7.0:1bf9cc5093, Jun 26 2018, 23:26:24)\n[Clang 6.0 (clang-600.0.57)]\
    \ on darwin\nType \"copyright\", \"credits\" or \"license()\" for more information.\n\
    >>> print ('hi')\nhi\n>>> print(\"hiiii\")\nhiiii\n>>> print (\"a\\nb\")\na\n\
    b\n>>> print (\"a\\tb\")\na\tb\n>>> print(\"\"\"y\ta\na\na\"\"\")\ny\ta\na\na\n\
    >>> print(\" a \" \")\n a \" \n>>> print(\"a\\ \")\na\\ \n>>> print(\"a \\n b\
    \ \")\na \\n b \n>>> print(\"a \\n b\")\na \n b\n>>> |\n```\n\n# Install pip\n\
    \nPip is a platform that enables the installation and management of python packages.\n\
    \n## Python: install pip\n\nIn order to install the new version of pip, run command\
    \ in the MacOS\n\n```\n$ sudo easy_install pip\n$ sudo pip install --upgrade pip\n\
    ```\n\n### install the pip in the Ubuntu\n\n```\n$ sudo apt-get update\n$ sudo\
    \ apt-get install python-pip\n$ sudo pip install --upgrade pip\n```\n\n### pip\
    \ in Centos\n\n```\n$ sudo yum update\n$ sudo yum install epel-release\n$ sudo\
    \ yum install python-pip\n# version>= Centos7\n$ sudo pip install --upgrade pip\n\
    ```\n\n# Executing first program\n\nWe will launch Python on our device to function\
    \ in the interactive mode.\n\nAfter the prompt (> > >), we type the Python expression\
    \ / statement / command and Python automatically responds with the output of the\
    \ prompt.\n\n# First program on Python\n\nLet's begin by typing \"Hello Python!\"\
    \ after the prompt.\n\n>>>print(\"Hello Python!\")\n\n![](img/3814666d53e5e432023792c444b3b015_9_0.png)\n\
    \n# Try the following\n\n- a) 5+7\n- b) 4*10\n- c) 7/8\n- d) 9%2\n- e) 6//4\n\n\
    ![](img/3814666d53e5e432023792c444b3b015_10_0.png)\n\n# Also try this\n\n```\n\
    >>> x=1\n>>> y=5\n>>> z = x+y\n>>> print (z)\n```\n\n![](img/3814666d53e5e432023792c444b3b015_10_1.png)\n\
    \n# Other operation:\n\n```\n>>> a=3\n>>>a+1, a-1\n```\n\n```\ndef test():\n \
    \   x=2\n    y=6\n    z = x+y\n    print(z)\n```\n\n# 2) Script Mode\n\nWe type\
    \ the Python program into a file in script mode and then use the interpreter to\
    \ execute the material from the file.\n\nIt is useful for beginners and for testing\
    \ small pieces of code to function in interactive mode, as we can test them immediately.\n\
    \nBut we should still save our code so that we can change and reuse the code to\
    \ encode more than a few lines.\n\nWe'll use the following steps in IDLE to build\
    \ and run a Python script if the script mode is not made accessible by default\
    \ in the IDLE environment.\n\n- 1. File>New File\n- 2. Write the Python code.\n\
    - 3. Save it (^S).\n- 4. Execute it interactive mode- by (^F5) - using RUN option\n\
    \n**Step 1:** File> New File\n\n**Step 2:** Write:\n\n```\ndef test():\n    x=2\n\
    \    y=6\n    z = x+y\n    print (z)\n```\n\n![](img/3814666d53e5e432023792c444b3b015_13_0.png)\n\
    \n**Step 3:** Save or File > Save As\n\n**Step 4:** For execution, press ^F5\n\
    \n```\n>>>test()\n```\n\n![](img/3814666d53e5e432023792c444b3b015_13_1.png)\n\n\
    # Python Keywords\n\nKeywords are the Python programming language's reserved words\
    \ (and any other programming languages such as C, C++, Java, etc.) whose definitions\
    \ are defined and whose definitions can not be modified.\n\nThe keywords in python\
    \ programming languages are case-sensitive.\n\n## Python keyword list\n\n### In\
    \ Python 2.5\n\n- and\n- del\n- from\n- not\n- while\n- as\n- elif\n- global\n\
    - or\n- with\n- assert\n- else\n- if\n- pass\n- yield\n- break\n- except\n- import\n\
    - print\n- class\n- exec\n- in\n- raise\n- continue\n- finally\n- is\n- return\n\
    - def\n- for\n- lambda\n- try\n\n### In Python 3.8.1\n\n- False\n- None\n- True\n\
    - and\n- as\n- assert\n- async\n- await\n- break\n- class\n- continue\n- def\n\
    - del\n- elif\n- else\n- except\n- finally\n- for\n- from\n- global\n- if\n- import\n\
    - in\n- is\n- lambda\n- nonlocal\n- not\n- or\n- pass\n- raise\n- return\n- try\n\
    - while\n- with\n- yield\n\n# Python built-in keywords\n\nThere are built-in python\
    \ keywords in the python programming language, which are used to perform different\
    \ tasks for different purposes.\n\n# All python keywords – List\n\n| Sr. | Keyword\
    \ | Description |\n|---|---|---|\n| 1 | and | It is used for logical operations,\
    \ it is a logical AND operator. It returns \"True\" if both operands are True.\
    \ |\n| 2 | as | It is used to create an alias of a module. |\n| 3 | assert | It\
    \ is used for debugging purpose, it returns an \"AssertionError\" if the given\
    \ test condition is False. |\n| 4 | break | break the loop's execution. It is\
    \ used to transfer program's control from a scope of loop body to the next statement\
    \ written after the loop body. |\n| 5 | class | It is used to define/create a\
    \ class. |\n| 6 | continue | It leaves the rest of the statements in the loop\
    \ body and continues the next iteration of the loop. |\n| 7 | def | It is used\
    \ to define/create a function. |\n| 8 | del | It is used to delete an object.\
    \ |\n| 9 | elif | It is used with \"if...elif...else\" statement to check next\
    \ condition. It is the same as \"else if\" of C, C++ language. |\n| 10 | else\
    \ | It is used with \"if...elif...else\" statement to define an else block – if\
    \ any condition is not True, else block executes. |"
  mdcn: "# 快速学习JavaScript：初学者编程指南\n\n![](img/3814666d53e5e432023792c444b3b015_0_0.png)\n\
    \n快速学习编程基础指南\n\nTAM JP\n\n# 快速学习Python：初学者编程指南\n\n![](img/3814666d53e5e432023792c444b3b015_0_1.png)\n\
    \n快速学习编程基础指南\n\nTAM JP\n\n# 快速学习Python和JavaScript：初学者编程指南\n\n## 快速学习编程基础指南\n\n\
    TAM JP\n\n[Python简介](https://www.example.com)\n\n[Python特性](https://www.example.com)\n\
    \n[安装pip](https://www.example.com)\n\n[执行第一个程序](https://www.example.com)\n\n[Python关键字](https://www.example.com)\n\
    \n[Python内置关键字](https://www.example.com)\n\n[Python中的注释](https://www.example.com)\n\
    \n[Python中的块注释](https://www.example.com)\n\n[创建多行注释](https://www.example.com)\n\
    \n[Python数值类型](https://www.example.com)\n\n[变量和数据类型](https://www.example.com)\n\
    \n[确定Python变量的类型](https://www.example.com)\n\n[Python算术运算符](https://www.example.com)\n\
    \n[Python身份运算符](https://www.example.com)\n\n[Python中的成员运算符](https://www.example.com)\n\
    \n[Python中增量运算符的行为](https://www.example.com)\n\n[逻辑和按位非运算符](https://www.example.com)\n\
    \n[字符串上的逻辑运算符](LOGICAL OPERATORS ON STRING)\n\n[If Else条件运算符](IF ELSE CONDITIONAL\
    \ OPERATOR)\n\n[JavaScript简介](JAVASCRIPT INTRO)\n\n[JavaScript示例](JAVASCRIPT EXAMPLE)\n\
    \n[JavaScript注释](JAVASCRIPT COMMENT)\n\n[JavaScript变量](JAVASCRIPT VARIABLE)\n\n\
    [JavaScript数据类型](JAVASCRIPT DATA TYPES)\n\n[JavaScript If Else](JAVASCRIPT IF\
    \ ELSE)\n\n[JavaScript Switch语句](JAVASCRIPT SWITCH STATEMENT)\n\n[JavaScript函数](JAVASCRIPT\
    \ FUNCTION)\n\n[JavaScript对象](JAVASCRIPT OBJECT)\n\n[JavaScript数组](JAVASCRIPT\
    \ ARRAY)\n\n[JavaScript字符串](JAVASCRIPT STRING)\n\n[JavaScript日期](JAVASCRIPT DATE)\n\
    \n[JavaScript数学](JAVASCRIPT MATH)\n\n[JavaScript数字](JAVASCRIPT NUMBER)\n\n# Python简介\n\
    \n## Python的显著特性\n\n它是一种通用编程语言，可用于科学和非科学编程。\n\n对于初学者来说，它非常出色，因为该语言是解释型的，因此能立即产生结果。\n\
    \n它比同时期的其他语言更好地融入了异常处理和动态绑定的原则。\n\n用Python编写的程序易于阅读和理解。\n\n它是一种与平台无关的编程语言。\n\n\
    对于可定制的应用程序，它适合作为扩展语言。\n\n学习和使用它都很简单。\n\n## 主要应用\n\n谷歌搜索引擎、Twitter等。\n\nBit Torrent点对点文件共享是用Python编写的。\n\
    \n英特尔、思科、惠普、IBM等公司使用Python进行硬件测试。\n\nMaya提供了Python脚本API。\n\nPython被用于创建工业机器人。\n\
    \n美国宇航局等机构使用Python进行其科学编程活动。\n\n# 设置Python解释器\n\n为了编写和运行Python程序，我们需要在计算机上安装Python解释器。\n\
    \n标准且最常见的Python开发环境是IDLE（图形用户界面集成）。\n\nIDLE指的是集成开发环境。\n\n它允许通过单个图形用户界面修改、运行、搜索和调试Python程序。这种环境使编写程序变得简单。\n\
    \n注意：在这些教程中，我们将使用Python IDLE 3.6版本来开发和运行Python代码。它可以在www.python.org免费获取。\n\n#\
    \ 启动IDLE\n\n![](img/3814666d53e5e432023792c444b3b015_5_0.png)\n\n# Python的特性\n\
    \n- 面向对象\n- 强大的异常处理\n- 自动内存管理\n- 动态类型\n- 强数据类型\n- 语法简单\n- 基于缩进\n- 本质上宽容\n\n在Python中打印\"\
    Hello World\"\n\n```\nPython 3.7.0 (v3.7.0:1bf9cc5093, Jun 26 2018, 23:26:24)\n\
    [Clang 6.0 (clang-600.0.57)] on darwin\nType \"copyright\", \"credits\" or \"\
    license()\" for more information.\n>>> print ('hi')\nhi\n>>> print(\"hiiii\")\n\
    hiiii\n>>> print (\"a\\nb\")\na\nb\n>>> print (\"a\\tb\")\na\tb\n>>> print(\"\"\
    \"y\ta\na\na\"\"\")\ny\ta\na\na\n>>> print(\" a \" \")\n a \" \n>>> print(\"a\\\
    \ \")\na\\ \n>>> print(\"a \\n b \")\na \\n b \n>>> print(\"a \\n b\")\na \n b\n\
    >>> |\n```\n\n# 安装pip\n\nPip是一个用于安装和管理Python包的平台。\n\n## Python：安装pip\n\n为了安装新版本的pip，请在MacOS中运行命令\n\
    \n```\n$ sudo easy_install pip\n$ sudo pip install --upgrade pip\n```\n\n### 在Ubuntu中安装pip\n\
    \n```\n$ sudo apt-get update\n$ sudo apt-get install python-pip\n$ sudo pip install\
    \ --upgrade pip\n```\n\n### 在Centos中安装pip\n\n```\n$ sudo yum update\n$ sudo yum\
    \ install epel-release\n$ sudo yum install python-pip\n# 版本>= Centos7\n$ sudo\
    \ pip install --upgrade pip\n```\n\n# 执行第一个程序\n\n我们将在设备上启动Python，以交互模式运行。\n\n\
    在提示符（>>>）之后，我们输入Python表达式/语句/命令，Python会自动响应提示符的输出。\n\n# Python上的第一个程序\n\n让我们从在提示符后输入\"\
    Hello Python!\"开始。\n\n>>>print(\"Hello Python!\")\n\n![](img/3814666d53e5e432023792c444b3b015_9_0.png)\n\
    \n# 尝试以下操作\n\n- a) 5+7\n- b) 4*10\n- c) 7/8\n- d) 9%2\n- e) 6//4\n\n![](img/3814666d53e5e432023792c444b3b015_10_0.png)\n\
    \n# 也试试这个\n\n```\n>>> x=1\n>>> y=5\n>>> z = x+y\n>>> print (z)\n```\n\n![](img/3814666d53e5e432023792c444b3b015_10_1.png)\n\
    \n# 其他操作：\n\n```\n>>> a=3\n>>>a+1, a-1\n```\n\n```\ndef test():\n    x=2\n   \
    \ y=6\n    z = x+y\n    print(z)\n```\n\n# 2) 脚本模式\n\n我们在脚本模式下将Python程序输入到一个文件中，然后使用解释器执行文件中的内容。\n\
    \n对于初学者和测试小段代码来说，在交互模式下运行很有用，因为我们可以立即测试它们。\n\n但我们仍然应该保存我们的代码，以便我们可以修改和重用代码来编写超过几行的程序。\n\
    \n如果IDLE环境中默认未启用脚本模式，我们将使用以下步骤在IDLE中创建和运行Python脚本。\n\n- 1. 文件>新建文件\n- 2. 编写Python代码。\n\
    - 3. 保存它（^S）。\n- 4. 使用RUN选项执行它 - 交互模式 - 通过（^F5）\n\n**步骤1：** 文件> 新建文件\n\n**步骤2：**\
    \ 编写：\n\n```\ndef test():\n    x=2\n    y=6\n    z = x+y\n    print (z)\n```\n\
    \n![](img/3814666d53e5e432023792c444b3b015_13_0.png)\n\n**步骤3：** 保存或文件 > 另存为\n\
    \n**步骤4：** 要执行，按^F5\n\n```\n>>>test()\n```\n\n![](img/3814666d53e5e432023792c444b3b015_13_1.png)\n\
    \n# Python关键字\n\n关键字是Python编程语言（以及任何其他编程语言，如C、C++、Java等）的保留字，其定义是固定的，不能被修改。\n\n\
    Python编程语言中的关键字区分大小写。\n\n## Python关键字列表\n\n### 在Python 2.5中\n\n- and\n- del\n\
    - from\n- not\n- while\n- as\n- elif\n- global\n- or\n- with\n- assert\n- else\n\
    - if\n- pass\n- yield\n- break\n- except\n- import\n- print\n- class\n- exec\n\
    - in\n- raise\n- continue\n- finally\n- is\n- return\n- def\n- for\n- lambda\n\
    - try\n\n### 在Python 3.8.1中\n\n- False\n- None\n- True\n- and\n- as\n- assert\n\
    - async\n- await\n- break\n- class\n- continue\n- def\n- del\n- elif\n- else\n\
    - except\n- finally\n- for\n- from\n- global\n- if\n- import\n- in\n- is\n- lambda\n\
    - nonlocal\n- not\n- or\n- pass\n- raise\n- return\n- try\n- while\n- with\n-\
    \ yield\n\n# Python内置关键字\n\nPython编程语言中有内置关键字，它们用于执行不同目的的不同任务。\n\n# 所有Python关键字\
    \ – 列表\n\n| 序号 | 关键字 | 描述 |\n|---|---|---|\n| 1 | and | 用于逻辑运算，是逻辑与运算符。如果两个操作数都为真，则返回\"\
    True\"。 |\n| 2 | as | 用于创建模块的别名。 |\n| 3 | assert | 用于调试目的，如果给定的测试条件为假，则返回\"AssertionError\"\
    。 |\n| 4 | break | 中断循环的执行。用于将程序的控制权从循环体的作用域转移到循环体之后的下一条语句。 |\n| 5 | class | 用于定义/创建一个类。\
    \ |\n| 6 | continue | 跳过循环体中剩余的语句，继续循环的下一次迭代。 |\n| 7 | def | 用于定义/创建一个函数。 |\n\
    | 8 | del | 用于删除一个对象。 |\n| 9 | elif | 与\"if...elif...else\"语句一起使用，用于检查下一个条件。它等同于C、C++语言中的\"\
    else if\"。 |\n| 10 | else | 与\"if...elif...else\"语句一起使用，用于定义一个else块 – 如果任何条件都不为真，则执行else块。\
    \ |"
