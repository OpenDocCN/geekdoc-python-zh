    \n```\nx= -1\n\nData type of x: <class 'int'>\n```\n\n### 2) float\n\nThe numerical\
    \ form of float is used to store floating-point values such as 6.66, 58.9, 3.14,\
    \ etc.\n\nFloats can be in scientific notation as well, with a power of 10 (3.6e3\
    \ = 3.6x 103 = 3600) indicated by E or e.\n\n#### EXAMPLE\n\n```\n# Assigning\
    \ float values to Variables\nx = 8.9\ny = -9.1\n\n# Manipulating the value of\
    \ x\nx = x - y\n\n# Prints the updated value of x\nprint(\"x= \", x)\n\n# Prints\
    \ the Data Type of x\nprint(\"Data type of x: \", type(x))\n```\n\n#### Output\n\
    \n```\nx= 18.0\n\nData type of x: <class 'float'>\n```\n\n### 3) complex\n\nTo\
    \ store complex numbers such as 3.14j, 8.0 + 5.3j, 2 + 6j, etc., the complex numeric\
    \ form is used.\n\nFormat: Real component + Imaginary component j\n\nNote: J must\
    \ denote the imaginary part of a complex number. It is known to be an invalid\
    \ syntax in Python if we denote it with i.\n\n#### EXAMPLE\n\n```\n# Assigning\
    \ complex values to Variables\nx = 1+8.5j\ny = 4+9j\n\n# Manipulating the value\
    \ of x\nx = x + y\n\n# Prints the updated value of x\nprint(\"x= \", x)\n```"
