    # ## Summary


    In this lesson we will discuss what a loop is, why they’re helpful, and the two
    types of loops that we can use in Python. Loops are powerful and simple tools
    that we can use to complete code much faster than we can without them. We can
    use while loops to run code until a specific condition is met. Or we can use for
    loops to iterate over a given list and perform some kind of action on it.


    # ## Objective


    The objective of this lesson is to understand how loops are used and when is it
    appropriate to use a for loops vs a while loop. We will review the syntax and
    how to prevent errors to make sure our code runs perfectly every time.


    +   ### Vocabulary

    - **Loop:** used to iterate over a sequence, such as a list, to complete code
    fast and efficiently

    - **While Loop:** a loop used to repeat until a specific condition is met

    - **For Loop:** a loop used to iterate through a given sequence, such as a list

    - **Counter:** a variable used to keep track of how often a loop is iterated through

    - **Iterate:** to actually go through each individual element with in iterable

    - **Iterable:** a representation of a series of elements, such as a list, dictionary,
    tuple, or set'
