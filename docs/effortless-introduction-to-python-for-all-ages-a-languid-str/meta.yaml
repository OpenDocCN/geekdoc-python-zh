    ```\n\n## Removing Teammates\n\nBut, what if that was the wrong Tarik!? We just\
    \ removed the wrong one!\n\nIt might be a better idea to remove him by his index\
    \ in the team rather than by name. This would be a great time for the **pop**\
    \ function.\n\n```\nplayers = [\"Tarik\", \"Alec\", \"Jordan\", \"Franko\", \"\
    Erik\", \"Tarik\"]\nplayers.pop(5)\n# Removes the item at index 5 - 'Tarik'\n\
    # ['Tarik', 'Alec', 'Jordan', 'Franko', 'Erik']\n```\n\n## Iterating Through Lists\n\
    \nIn Python, it's often where we have to use loops to access each item of the\
