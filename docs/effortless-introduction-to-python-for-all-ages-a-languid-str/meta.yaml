    Set Theory is a branch of math dedicated to sets and the use of sets in math.
    Here is some vocabulary that will be useful to know for the rest of this lesson.


    **Vocabulary**


    +   - Set: A collection of unique values/items

    - Difference: The difference between two or more sets

    - Intersection: A set of items that are common between two or more sets.

    - Subset: A subset is a set that is made up of only items from another set

    - Superset: A superset is a set that contains all items of another set

    - Union: A set of all items that are in two or more sets

    - Disjoint: Two sets are disjoint if they contain no common elements

    - Symmetric Difference: A set of all items that are not shared between two or
    more sets'
