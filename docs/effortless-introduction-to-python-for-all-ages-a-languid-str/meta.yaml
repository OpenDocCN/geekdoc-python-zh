    \ p 来访问循环的当前项目。每次循环运行时，p 将是列表中的下一个球员。\n\n## 遍历列表\n\n这里有一些关于理解循环以及它如何与球员列表一起工作的帮助。\n\
    \n```\nfor p in players:\n    print(p)\n```\n\n| \"Tarik\" | \"Alec\" | \"Jordan\"\
