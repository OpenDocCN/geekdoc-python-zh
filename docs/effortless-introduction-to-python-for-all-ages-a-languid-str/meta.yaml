    \  \"year\" : 1972\n}\n# option 1\ndel my_dict[\"year\"]\n# option 2\nmy_dict.pop(\"\
    year\")\n```\n\nOur two options for deleting an item are using the `pop()` method\
    \ or the `del` keyword. Both methods work exactly the same, so it’s up to you!\n\
    \nFor option 1: all you have to do is put the del keyword before the item in the\
    \ dictionary that you want to delete.\n\nFor option 2: all you have to do is use\
    \ the `.pop()` method and pass the key of the item you want to delete as an argument!\n\
    \n## Updating our dictionaries\n\nDictionaries in Python have a very helpful way\
    \ to update and add items all at once - it's called the `update()` method.\n\n\
    The `update()` method allows us to pass in a dictionary as an argument that it\
