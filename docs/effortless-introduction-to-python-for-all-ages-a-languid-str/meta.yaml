    \ the **index** we want to access.\n\n```\nplayers = [\"Tarik\", \"Alec\", \"\
    Jordan\", \"Franko\", \"Erik\"]\n\nprint(players[0]) # prints 'Tarik'\nprint(players[2])\
    \ # prints 'Jordan'\nprint(players[10]) # Error - out of bounds!\n```\n\n> **Warning:**\
    \ we can only access items up to the end of the list - if we go out of bounds,\
