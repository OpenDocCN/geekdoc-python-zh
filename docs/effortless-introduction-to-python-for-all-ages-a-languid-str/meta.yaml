  mdcn: "## 访问列表中的项目\n\n让我们看看代码。我们可以使用**下标表示法**来访问每个单独的项目。\n\n这就是在列表名称后包含**方括号**——并在括号内包含我们想要访问的**索引**。\n\
    \n```\nplayers = [\"Tarik\", \"Alec\", \"Jordan\", \"Franko\", \"Erik\"]\n\nprint(players[0])\
