    # # Slicing


    # ## Summary


    In this lesson, we will be talking about a very useful topic in data manipulation
    - slicing. Slicing is a flexible tool in Python that allows you to make new strings,
    lists, and tuples out of the existing ones by taking portions of, reordering,
    and reorganizing them. Slicing is able to be used on any sequential data in Python!
    For example: lists, strings, tuples, bytearrays, bytes, and ranges. Other data
    types can be made compatible too!


    # ## Objective


    Students will add slicing to their coding toolbelt and know exactly when to reach
    for it when needed.


    # ## Vocabulary


    +   - Substring: A portion of a string starting at index a and ending at index
    b.

    - Slice: The name of Python''s string manipulation tool.'
