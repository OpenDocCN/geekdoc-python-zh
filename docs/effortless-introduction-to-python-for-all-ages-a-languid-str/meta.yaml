    \n1. Get a **count** of a certain element in the list\n2. Get the **length** of\
    \ the list\n3. **Reverse** the order of the list\n4. **Insert** an item at a specific\
    \ index\n5. **Clear** the list of all items\n\n## More on Lists\n\nIn Python,\
    \ each of these things we can do with the list are like tools attached to the\
    \ list.\n\nWe can think of the list datatype as a tool-belt with a bunch of uses\
