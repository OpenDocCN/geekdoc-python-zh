    \ for representing objects!\n\n### Objective\n\nStudents will understand practical\
    \ and critical uses for Dictionaries in Python. Students will also understand\
    \ how to create, update, and delete their own dictionaries.\n\n### Vocabulary\n\
    \n- **Dictionary:** A data structure in python that allows you to store your data\
    \ in key:value pairs\n- **Data Structure:** A data storage structure that allows\
    \ efficient access and manipulation.\n- **Key:** A unique value that has a value\
    \ attached to it. Think of it like a word in the dictionary.\n- **Value:** The\
    \ value associated with the unique key - think of it as the definition of a word\
    \ in a dictionary\n\n## Understanding Dictionaries\n\nReal Life Example:\n\nThink\
    \ of a dictionary:\n\n- A book of words and definitions (keys and values)\n- Each\
    \ word is unique (each key is unique)\n- Each word has a definition (each key\
    \ has a value)\n\n![](img/764aef0d5d73276c0d8a4da4cf838843_225_0.png)\n\nHow about\
    \ in Python?\n\n- A collection of keys and values\n- Each key has a value associated\
    \ with it\n- No two keys can be the same\n- Values are referenced by their keys\n\
    \n## Let's Start Simple\n\n### Dictionary Syntax\n\n```\nmy_dict = {\n    \"brand\"\
    \ : \"chevrolet\",\n    \"model\" : \"camaro\",\n    \"color\" : \"black\"\n}\n\
    ```\n\nWe make a dictionary by making a variable name, curly brackets, and then\
    \ our key:value pairs separated by commas!\n\n### How Do We Make A Dictionary?\n\
    \n- Curly braces with key:value pairs inside, separated by commas!\n- Let's do\
    \ an example together and make a dictionary for our favorite car\n\n## Understanding\
    \ Dictionaries\n\nDictionaries in Python are very powerful tools, and to understand\
    \ them better, you are gonna need to understand how they work, too!\n\n- Dictionaries\
    \ are **ordered** as of python 3.7\n- They are **changeable** - meaning that you\
    \ can change elements in them!\n- They **don't allow duplicate keys**\n\nFor example:\
    \ this code would throw an error:\n\n```\nmy_dict = {\n    \"brand\" : \"chevrolet\"\
    ,\n    \"model\" : \"camaro\",\n    \"color\" : \"red\",\n    \"color\" : \"blue\"\
    \n}\n```\n\nThere are duplicate keys here, and that doesn't work! Python doesn't\
    \ know what the actual color of the car is!\n\n## Understanding Dictionaries\n\
    \nDictionaries in Python are very flexible with the data type of the values. They\
    \ can be strings, ints, booleans, lists, and even other dictionaries!\n\nThis\
    \ gives us a lot of flexibility for customizing our dictionary car\n\n```\nmy_dict\
    \ = {\n  \"brand\" : \"chevrolet\",\n  \"model\" : \"camaro\",\n  \"electric\"\
    \ : False,\n  \"year\" : 2021,\n  \"colors\" : [\"black\", \"red\", \"white\"\
    ]\n}\n```\n\nAs you can see - we are using strings, int, boolean, and even a list\
    \ in this dictionary.\n\nKeys can ALSO be string, int, and boolean:\n\n## Understanding\
    \ Dictionaries\n\nKeys can also be string, int, boolean? Say what?! Yes, I'm as\
    \ baffled as you are. Let's switch this dictionary up and take a look:\n\n```python\n\
    my_dict = {\n    True : \"chevrolet\",\n    20 : \"camaro\",\n    32 : False,\n\
    \    \"year\" : 2021,\n    False : [\"black\", \"red\", \"white\"]\n}\n\nprint(my_dict[False])\n\
    print(my_dict[20])\nprint(my_dict[\"year\"])\n```\n\n```\n['black', 'red', 'white']\n\
    camaro\n2021\n```\n\nThis does allow for a lot of flexibility - but can get confusing\
    \ fast! Make sure your keys have meaning so that your dictionary is effective\
    \ and convenient!\n\n## Dictionary Operations\n\nSo, we created a dictionary -\
    \ cool. What can we do with it, you might ask? Well, in Python, we can do a lot:\n\
    \n- Add items\n- Change items\n- Delete items\n- Update/add items at the same\
    \ time\n- Iterate through items\n- Nest dictionaries\n\nA lot, right? Dictionaries\
    \ are a very powerful and convenient tool in our Python Toolbox.\n\nLet’s start\
    \ with some examples so that you can better understand some of these operations.\
    \ Fear not! By the end of this, you will be a dictionary pro!\n\n![](img/764aef0d5d73276c0d8a4da4cf838843_230_0.png)\n\
    \n## Accessing in Dictionaries\n\nAccessing the values in our dictionary is really\
    \ easy - just like accessing an item in a list! But, instead of an index, we just\
    \ give the key inside the brackets.\n\n```\nmy_dict = {\n    \"brand\" : \"chevrolet\"\
    ,\n    \"model\" : \"camaro\",\n    \"color\" : \"black\"\n}\n\nbrand = my_dict[\"\
    brand\"]\n\nprint(brand)\n```\n\nWe can also use the .get() method to retrieve\
    \ a value from our dictionary - like so:\n\n```\nmy_dict = {\n    \"brand\" :\
    \ \"chevrolet\",\n    \"model\" : \"camaro\",\n    \"color\" : \"black\"\n}\n\n\
    brand = my_dict.get(\"brand\")\n\nprint(brand)\n```\n\n## Adding Items To Dictionaries\n\
    \nWe have our dictionary - what if we want to add an item to it? Let’s start with\
    \ our base dictionary again:\n\n```\nmy_dict = {\n    \"brand\" : \"chevrolet\"\
    ,\n    \"model\" : \"camaro\",\n    \"color\" : \"black\"\n}\n```\n\nWhat if we\
