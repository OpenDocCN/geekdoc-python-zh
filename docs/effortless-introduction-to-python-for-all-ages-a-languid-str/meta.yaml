    We can also zip more than two iterables together, with each of our tuples having
    as many elements as iterables we give to zip.


    ```

    nums = ["1", "2", "3", "4", "5", "6", "7"]

    numbers = ["one", "two", "three", "four", "five"]

    third = ["uno", "dos", "tres", "cuatro"]


    groups = zip(nums, numbers, third) # returns zip object


    print(list(groups)) # print list version of zip object

    ```


