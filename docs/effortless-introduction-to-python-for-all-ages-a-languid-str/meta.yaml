    \nThere are two class periods at Hello World High School. **Class 1** and **Class\
    \ 2**. Some students have both classes together, some students only have one class,\
    \ and some students don't have either.\n\nUsing the following sets below, make\
    \ the following 3 sets.\n\n1. Students that have no classes together\n2. Students\
