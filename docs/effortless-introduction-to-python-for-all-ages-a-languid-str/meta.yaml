  md: '# Lesson: Comprehensions


    # Summary


    In this lesson, we will be talking about a more elegant way for creating lists,
    sets and dictionaries - all in one line of code! Comprehensions are a tool in
    python that allows us to create a new list based on values out of an existing
    list.


    # Objective


    Students will learn how to use comprehensions to more elegantly create lists,
    sets, and dictionaries. Students will also understand when it is best to use comprehensions
    when creating new lists, sets, and dictionaries.


    # Vocabulary


    +   - **Comprehension:** Python''s shorthand way of making new lists, sets and
    dictionaries from others'
  merge: -1
