  md: '# # How do they compare?


    In Python, we have a decent amount of different data structures to pick from.
    Namely, lists, sets, tuples, and dictionaries. Why would you ever pick one over
    the other?


    It’s very important to know the difference between them and why one of them might
    be a better bet than another. Let’s take a look.


    | Set | List | Tuple |

    | :--- | :--- | :--- |

    | ● unordered | ● ordered | ● ordered |

    | ● mutable | ● mutable | ● immutable |

    | ● Multiple data-types | ● Multiple data-types | ● Multiple data-types |'
