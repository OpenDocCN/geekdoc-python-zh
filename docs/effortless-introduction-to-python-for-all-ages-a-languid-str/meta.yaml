    \ - 1\n\n    # next day, but mod 7 to wrap around to beginning of week\n    nextday\
    \ = daysofweek[(index+1)%7]\n\n    return daysleft, nextday\n\nprint(daysLeft(dayinput))\n\
    ```\n\n## 第 10 章\n\n## 字典\n\n### 概要\n\n在本课中，我们将介绍 Python 字典 - 一种强大的数据结构，允许你以 **键\
    \ : 值** 对的形式存储数据。这为组织数据提供了便捷的方式，并允许轻松查找值。字典也非常适合表示对象！\n\n### 目标\n\n学生将理解 Python\
    \ 字典的实际和关键用途。学生还将了解如何创建、更新和删除自己的字典。\n\n### 词汇表\n\n- **字典（Dictionary）:** Python\
    \ 中的一种数据结构，允许你以键值对的形式存储数据。\n- **数据结构（Data Structure）:** 一种数据存储结构，允许高效访问和操作。\n\
    - **键（Key）:** 一个唯一的值，该值关联着一个值。可以将其想象成字典中的一个单词。\n- **值（Value）:** 与唯一键关联的值 - 可以将其想象成字典中一个单词的定义。\n\
    \n## 理解字典\n\n现实生活中的例子：\n\n想一想字典（工具书）：\n\n- 一本包含单词和定义（键和值）的书。\n- 每个单词都是唯一的（每个键都是唯一的）。\n\
    - 每个单词都有一个定义（每个键都有一个值）。\n\n![](img/764aef0d5d73276c0d8a4da4cf838843_225_0.png)\n\
    \n在 Python 中呢？\n\n- 键和值的集合。\n- 每个键都有一个与之关联的值。\n- 不允许有两个相同的键。\n- 值通过其键进行引用。\n\n\
    ## 让我们从简单的开始\n\n### 字典语法\n\n```\nmy_dict = {\n    \"brand\" : \"chevrolet\",\n\
    \    \"model\" : \"camaro\",\n    \"color\" : \"black\"\n}\n```\n\n我们通过以下方式创建一个字典：变量名、花括号，然后是用逗号分隔的键值对！\n\
    \n### 我们如何创建一个字典？\n\n- 包含在花括号内的键值对，用逗号分隔！\n- 让我们一起做一个例子，为我们最喜欢的汽车创建一个字典。\n\n##\
    \ 理解字典\n\nPython 中的字典是非常强大的工具，要更好地理解它们，你还需要理解它们的工作原理！\n\n- 字典在 Python 3.7 中是 **有序的**。\n\
    - 它们是 **可变的（changeable）** - 意味着你可以更改其中的元素！\n- 它们 **不允许重复的键**。\n\n例如：以下代码会抛出错误：\n\
    \n```\nmy_dict = {\n    \"brand\" : \"chevrolet\",\n    \"model\" : \"camaro\"\
    ,\n    \"color\" : \"red\",\n    \"color\" : \"blue\"\n}\n```\n\n这里有重复的键，这是行不通的！Python\
    \ 不知道汽车的实际颜色是什么！\n\n## 理解字典\n\nPython 中的字典对值的处理非常灵活。它们可以是字符串、整数、布尔值、列表，甚至是其他字典！\n\
    \n这为我们自定义字典汽车提供了极大的灵活性。\n\n```\nmy_dict = {\n  \"brand\" : \"chevrolet\",\n  \"\
    model\" : \"camaro\",\n  \"electric\" : False,\n  \"year\" : 2021,\n  \"colors\"\
    \ : [\"black\", \"red\", \"white\"]\n}\n```\n\n如你所见 - 我们在这个字典中使用了字符串、整数、布尔值甚至列表。\n\
    \n键也可以是字符串、整数和布尔值：\n\n## 理解字典\n\n键也可以是字符串、整数、布尔值？什么？！是的，我和你一样困惑。让我们换一下这个字典看看：\n\
    \n```python\nmy_dict = {\n    True : \"chevrolet\",\n    20 : \"camaro\",\n  \
    \  32 : False,\n    \"year\" : 2021,\n    False : [\"black\", \"red\", \"white\"\
    ]\n}\n\nprint(my_dict[False])\nprint(my_dict[20])\nprint(my_dict[\"year\"])\n\
    ```\n\n```\n['black', 'red', 'white']\ncamaro\n2021\n```\n\n这确实提供了很大的灵活性 - 但也可能很快变得混乱！确保你的键有意义，这样你的字典才能高效且方便！\n\
    \n## 字典操作\n\n所以，我们创建了一个字典 - 很酷。你可能会问，我们可以用它做什么？嗯，在 Python 中，我们可以做很多事情：\n\n- 添加项目\n\
    - 更改项目\n- 删除项目\n- 同时更新/添加项目\n- 迭代项目\n- 嵌套字典\n\n很多，对吧？字典是我们 Python 工具箱中非常强大且方便的工具。\n\
    \n让我们从一些示例开始，以便你更好地理解其中的一些操作。别担心！到本章结束时，你将成为一个字典专家！\n\n![](img/764aef0d5d73276c0d8a4da4cf838843_230_0.png)\n\
    \n## 访问字典中的值\n\n访问字典中的值非常简单 - 就像访问列表中的一个项目一样！但是，我们不是用索引，而是在括号内给出键。\n\n```\nmy_dict\
    \ = {\n    \"brand\" : \"chevrolet\",\n    \"model\" : \"camaro\",\n    \"color\"\
    \ : \"black\"\n}\n\nbrand = my_dict[\"brand\"]\n\nprint(brand)\n```\n\n我们也可以使用\
    \ `.get()` 方法从字典中检索一个值 - 像这样：\n\n```\nmy_dict = {\n    \"brand\" : \"chevrolet\"\
    ,\n    \"model\" : \"camaro\",\n    \"color\" : \"black\"\n}\n\nbrand = my_dict.get(\"\
    brand\")\n\nprint(brand)\n```\n\n## 向字典中添加项目\n\n我们有了自己的字典 - 如果我们想向其中添加一个项目怎么办？让我们再次从基础字典开始：\n\
    \n```\nmy_dict = {\n    \"brand\" : \"chevrolet\",\n    \"model\" : \"camaro\"\
    ,\n    \"color\" : \"black\"\n}\n```\n\n如果我们想给汽车添加一个年份怎么办？嗯，这超级简单！\n\n```\nmy_dict\
    \ = {\n    \"brand\" : \"chevrolet\",\n    \"model\" : \"camaro\",\n    \"color\"\
