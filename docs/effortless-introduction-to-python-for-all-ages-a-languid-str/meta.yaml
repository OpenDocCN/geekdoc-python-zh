    # # Python Sets


    # ## Summary


    In this lesson, we will be talking about the last of Python’s 4 built-in datatypes:
    the Set. Sets are used to store multiple elements in a single variable and are
    a very powerful tool in your coding toolbelt! In this lesson, you will learn how
    to create and use your own sets along with practical uses of them.


    # ## Objective


    Students will learn how to create and use sets in their code. They will also learn
    practical uses for them and when to reach for them in their problem solving. Another
    main objective here is to show students when each collection type has an advantage
    and when sets would be the best one to use. Students will also get a basic understanding
    of set theory.


    # ## Vocabulary


    +   - **Set:** One of Python’s 4 built-in data types - used to store multiple
    items in a single variable. Basically, a set of unique values.

    - **Mutable:** Able to be changed or updated

    - **Unordered:** Does not have a specific order to it and therefore, is unable
    to be indexed.

    - **Set Theory:** A branch of mathematics that is built around sets and math with
    sets.'
