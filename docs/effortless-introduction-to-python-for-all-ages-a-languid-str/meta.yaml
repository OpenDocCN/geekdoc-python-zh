    \ 1 | 2 | 3 | 4 |\n\n对于循环的每次迭代，p 被赋值为球员列表中的下一个球员。\n\n## 让我们试试吧！\n\n让我们练习一下到目前为止学到的一些东西！请按照以下步骤操作：\n\
    \n1. 创建一个包含你最喜欢食物的列表\n2. 打印列表中的第二个项目\n3. 将列表中的第三个项目更改为列表中第一个项目的值\n4. 如果‘Vegetables’不在列表中，则将其添加到列表中。（它们对你有好处！）\n\
    5. 使用 `remove` 或 `pop`，移除一个不是蔬菜的项目\n6. 使用循环打印列表中的项目\n\n## 让我们试试吧！\n\n```\n# 1\n\
    foods = ['pizza', 'cheeseburgers', 'chicken wings']\n\n# 2\nprint(foods[1])\n\n\
    # 3\nfoods[2] = foods[0]\n\n# 4\nfoods.append('vegetables')\n\n# 5\nfoods.remove('pizza')\n\
    \n# 6\nfor f in food:\n    print(f)\n```\n\n## 关于列表的更多信息\n\n关于列表，我们还有很多很多可以学习的内容，但本节课我们将只关注重要的部分。让我们看看我们还可以做的一些其他事情：\n\
    \n1. 获取列表中某个元素的**计数**\n2. 获取列表的**长度**\n3. **反转**列表的顺序\n4. 在特定索引处**插入**一个项目\n5.\
    \ **清空**列表中的所有项目\n\n## 关于列表的更多信息\n\n在 Python 中，我们可以对列表做的每一件事都像是附在列表上的工具。\n\n我们可以将列表数据类型想象成一个工具带，上面附着许多用途和工具！\n\
    \n### 我的列表\n\n## 关于列表的更多信息\n\n我们可以通过使用列表名称、一个点，然后是工具名称来访问所有这些**工具**。\n\n例如：`myList.append()`\
    \ - 这是使用我们列表的 **append** 工具，它添加一个项目！\n\n## 列表长度\n\n在 Python 中，我们可以使用 **len()**\
    \ 函数来获取列表中项目的**计数**。我们可以这样写：\n\n```\nfoods = ['pizza', 'cheeseburgers', 'chicken\
    \ wings']\n\ncount = len(foods)\n\nprint(count) # prints 3\n```\n\n在这种情况下，我们创建了一个包含\
    \ 3 种食物的食物列表。然后我们创建一个 count 变量，它被设置为食物列表中项目的 **len()**！我们得到数字 3。\n\n## 列表计数\n\n\
    在 Python 中，我们可能还需要查看某个项目在列表中出现了多少次。\n\n例如，如果我们想统计有多少学生名叫‘Eric’怎么办？\n\n```\nfoods\
    \ = ['pizza', 'cheeseburgers', 'chicken wings']\n\ncount = len(foods)\n\nprint(count)\
    \ # prints 3\n```\n\n## 反转列表的顺序\n\n我们可以使用 `.reverse()` 函数来**反转**列表的顺序。这会将列表的顺序从后到前切换。\n\
    \n```\nfoods = ['pizza', 'cheeseburgers', 'chicken wings']\nfoods.reverse()  #\
    \ switches the order\nprint(foods)  # ['chicken wings', 'cheeseburgers', 'pizza']\n\
