  md: '# Set Methods


    Python includes a lot of different set methods. We will go more in detail on the
    things they can do, but here is a list below.


    +   - add(): adds an element to the set

    - clear(): clears all the elements from the set

    - copy(): returns a copy of the set

    - difference(): returns a set containing the difference between two or more sets

    - discard(): removes the specified element

    - intersection(): returns a set which is the intersection of two other sets

    - intersection_update(): removes the items in this set that are not present in
