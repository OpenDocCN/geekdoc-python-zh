- md: "# Subset\n\nSo, let's say there are two sets: **A** and **B**. The best way\
    \ to explain subset is **A** is a subset of **B** if **A** is only made up of\
    \ elements that are present in **B**.\n\n![](img/764aef0d5d73276c0d8a4da4cf838843_185_0.png)\n\
    \nSo, **A** is a subset of **B** because it is made up of only elements from **B**.\
    \ This is why it is drawn inside of **B**.\n\n# Superset\n\nSuperset is the other\
    \ side of subset. **B** is a superset of **A** if **B** contains all the elements\
    \ of **A**. This diagram is exactly the same - as **B** is a superset of **A**.\n\
    \n![](img/764aef0d5d73276c0d8a4da4cf838843_186_0.png)\n\nSo, **B** is a superset\
    \ of **A** because it contains all the elements in **A**. This is why it is drawn\
    \ around **A**.\n\n# Subset and Superset in Python\n\nIn Python, we can check\
    \ whether or not a set is a superset or subset of another set using some of the\
    \ built-in methods.\n\n```python\ncolors1 = {\"red\", \"orange\", \"yellow\",\
    \ \"green\", \"blue\"}\ncolors2 = {\"red\", \"yellow\", \"blue\"}\n\n# which one\
    \ is the superset?\nprint(colors1.issuperset(colors2)) # true\nprint(colors2.issuperset(colors1))\
    \ # false\n\n# which one is the subset?\nprint(colors1.issubset(colors2)) # false\n\
    print(colors2.issubset(colors1)) # true\n```\n\n# Disjoint\n\nIn set theory, we\
    \ describe two sets that contain no elements in common as disjoint. In other words,\
    \ if two sets have no intersections, they are considered to be disjoint.\n\n![](img/764aef0d5d73276c0d8a4da4cf838843_188_0.png)\n\
    \nIf there is nothing in the middle of the venn diagram, then technically they\
    \ are disjoint.\n\n# Disjoint in Python\n\nWe can check whether or not two sets\
    \ are disjoint in python using the\n\n```python\ncolors1 = {\"red\", \"orange\"\
    , \"yellow\"}\ncolors2 = {\"green\", \"blue\", \"purple\"}\n\ncolors3 = {\"red\"\
    , \"orange\", \"yellow\"}\ncolors4 = {\"red\", \"blue\", \"purple\"}\n\n# we can\
    \ see whether or not they are disjoint\n# by using the .isdisjoint() method\n\
    a = colors1.isdisjoint(colors2) # true\nb = colors2.isdisjoint(colors1) # true\n\
    \nc = colors3.isdisjoint(colors4) # false\nd = colors4.isdisjoint(colors3) # false\n\
    ```\n\n# Exercise: Duplicates\n\nWrite a Python program that takes user input\
    \ for a list of numbers and returns how many duplicate items are in the list.\n\
    \nConsider using **sets** for this, as we know that sets have a certain way of\
