    ## What does strip do?


    The strip function in Python is used to clear off unnecessary whitespace or characters
    before or after your string. This is especially useful when trying to clean data
    from a large string!


    > We want to clear off unnecessary whitespace and characters around our string.
    For example, if our string was

    > " hello world "

    > would turn into "hello world"


    ![](img/764aef0d5d73276c0d8a4da4cf838843_258_0.png)


    The solution: use the built-in strip function to clean up both ends of our string.

    Let’s take a look at the syntax.


    ```

    dirtystring = "       hello world.       "

    cleanstring = dirtystring.strip()

    print(cleanstring) # prints "hello world."

    ```


    ![](img/764aef0d5d73276c0d8a4da4cf838843_259_0.png)


    ```

    hello world.

    ```


    So, what happened? Python’s built-in strip function took our string that had a
    lot of whitespace before and after our content and cleaned it up. How does this
    work?


    ### Description

    Returns a copy of the string with the leading and trailing characters removed.


    ### Syntax


    `str.strip(chars)`


    ### str

    The string to be stripped.


    ### chars

    Optional. String specifying the set of characters to be removed. If omitted or
    None, the chars argument defaults to removing whitespace. The chars argument is
    not a prefix; rather all combinations of its values are stripped.


    ## Example #1


    We can remove whitespace on both sides of our content by giving no arguments to
    strip function. See below


    ```

    my_str = "           I''m a code hero!       "

    clean_str = my_str.strip()

    print(clean_str) # prints I''m a code hero!

    ```


    ```

    I''m a code hero!

    ```


    ## Example #2


    We can remove other characters on both sides of our content by giving them as
    arguments to the strip function. See below


    ```

    my_str = "____I''m a code hero!____"

    clean_str = my_str.strip("_")

    print(clean_str) # prints I''m a code hero!

    ```


    ```

    I''m a code hero!

    ```


    ## Example #3


    We can give multiple characters in the chars argument - this will remove any character
    within the chars string leading and trailing our string.


    ```

    my_str = "_!-= >I''m a code hero! <=-_!"

    clean_str = my_str.strip(" _!-=<>")

    print(clean_str) # prints I''m a code hero!

    ```


    ![](img/764aef0d5d73276c0d8a4da4cf838843_263_0.png)


    ```

    I''m a code hero!

    ```


    ## What does zip do?


    Let’s say in school your class and another class are pairing up to do a school
    project. If we have a list or tuple of all the students in both class, we can
    use the **zip** function to create pairings in the class!


    > **PROBLEM**


    We want to use the class lists to create pairings between the two classes.


    How can we pair different students up easily using Python?


    ![](img/764aef0d5d73276c0d8a4da4cf838843_264_0.png)


    The solution: use the built-in zip function to create pairings between the two
    class lists. Let''s take a look at the syntax.


    ```

    classOne = ["Steven", "Rebecca", "Rachel", "Abir", "Michel"]

    classTwo = ["Adam", "Raquel", "Mason", "Rahul", "David"]


    pairings = zip(classOne, classTwo) # returns zip object


    print(list(pairings)) # print list version of zip object

    ```


    ```

    [(''Steven'', ''Adam''), (''Rebecca'', ''Raquel''), (''Rachel'', ''Mason''), (''Abir'',
    ''Rahul''), (''Michel'', ''David'')]

    ```


    Python’s zip function takes two or more iterables (lists, etc) and creates pairs
    or groups as tuples. It basically ‘zips’ the them all together!


    ### Description

    Returns a list of tuples, where the i-th tuple contains the i-th element from
    each argument sequence.


    ### Syntax

    `zip([iterables, ...])`


    ### iterables

    The iterables that you want zipped together


    ![](img/764aef0d5d73276c0d8a4da4cf838843_266_0.png)


    ## Example #1


    We can zip together two iterables such as lists using just the zip function.


    ```

    nums = ["1", "2", "3", "4", "5"]

    numbers = ["one", "two", "three", "four", "five"]


    pairings = zip(nums, numbers) # returns zip object


    print(list(pairings)) # print list version of zip object

    ```


    ![](img/764aef0d5d73276c0d8a4da4cf838843_267_0.png)


    ```

    [(''1'', ''one''), (''2'', ''two''), (''3'', ''three''), (''4'', ''four''), (''5'',
    ''five'')]

    ```


    ## Example #2


    When one of our iterables has more elements than the other, the pairings only
    go to the length of the shortest iterable.


    ```

