    # Arguments vs Keyword Arguments


    When writing a function, when we ask for an argument, that argument **is required**
    and will throw an error if no argument is present.


    Python also allows us to define a default value for an argument, making it an
    optional or **keyword** argument.


    +   **Arguments**

    - Arguments are also known as parameters

    - Arguments are required

    - They are not assigned a value until one is passed through


    +   **Keyword Arguments**

    - Optional arguments

    - Are assigned a default value if they’re never used

    - Let’s see one in a pre-built function'
