    # Negative Indices


    A nice trick in indexing in Python is using **negative** numbers to index from
    the end of the collection or string. For example, if we wanted to just grab someone’s
    last name from a full name string, it might be easier to count from the back rather
    than the front.


    For example, we could write an index of -6 to reference the F


