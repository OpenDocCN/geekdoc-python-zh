    ```python\n# VALUES\nfor value in my_dict.values():\n    print(value)\n\n# prints\
    \ all the values\n```\n\n```python\n# BOTH\nfor key,value in my_dict.items():\n\
    \    print(key, value)\n\n# prints all the key:value pair\n```"
