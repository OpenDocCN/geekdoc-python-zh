  md: '# # Lesson 2: Conditional Statements


    # ## Summary


    In this lesson, we will discuss conditional statements in Python. Conditional
    statements occur when we want to perform a specific operation only if a specific
    condition or criteria is met. If that condition is not met, then we want to either
    perform a different action or stop our code altogether. Conditional statements
    are helpful when making decisions or when our actions can result in several different
    outcomes.


    # ## Objective


    The objective of this lesson is to learn the syntax and decision making required
    in conditional statements.


    # ## Vocabulary


    +   - **Condition**: a requirement or criteria needed to perform an action


    +   - **If**: Keyword to begin an if-statement, requires a condition and ends
    with a semicolon


    +   - **Elif**: an optional keyword used in if-statements, after the if keyword
    and before the else keyword, that requires a condition and adds more flexibility
    to your code


    +   - **Else**: an optional keyword in if-statements that does not accept condition
    and is the default output'
