    \ assigned to a new index in **myString** every time the loop runs until we have\
    \ reached the end of the string.\n\n![](img/764aef0d5d73276c0d8a4da4cf838843_85_0.png)\n\
    \nWe can also iterate through a string with its indices using a range!\n\n```\n\
    myString = \"Hello, world!\"\n\nfor i in range(len(myString)):\n    print(myString[i])\n\
