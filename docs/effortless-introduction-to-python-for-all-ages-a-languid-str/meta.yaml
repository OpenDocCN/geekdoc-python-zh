  md: '# Python’s Dictionary Methods


    Python has included a bunch of methods (a.k.a. actions) that dictionaries can
    perform. They all can help you do different things with your dictionary - anywhere
    from clearing all the items to updating your dictionary!


    +   - **clear()** - Removes all the elements from the dictionary

    - **copy()** - Returns a copy of the dictionary

    - **fromkeys()** - Returns a dictionary with the specified keys and value

    - **get()** - Returns the value associated with the given key

    - **items()** - Returns a list containing a tuple for every key:value pair

    - **pop()** - Removes the element with the specified key

    - **popitem()** - Removes the last inserted key:value pair

    - **setdefault()** - Returns the value of the specified key. If the key doesn’t
    exist - insert the key with the specified value.

    - **update()** - Updates the dictionary with the set of key:value pairs

    - **values()** - Returns a list of all the values in the dictionary'
