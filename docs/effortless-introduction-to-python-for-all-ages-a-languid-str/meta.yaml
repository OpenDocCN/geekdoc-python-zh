    \n![](img/764aef0d5d73276c0d8a4da4cf838843_221_0.png)\n\n## 元组练习 3：一周七天 答案\n\n\
    ```\ndaysofweek = (\"monday\", \"tuesday\", \"wednesday\",\n\"thursday\", \"friday\"\
