  md: '# Conditionals in Comprehensions


    We can also use a conditional to filter the items that we are making the list
    out of. For example, what if we wanted only to add numbers that were less than
    10?


    ```

    under_ten = [n for n in nums if n < 10]

    ```


    By adding a conditional at the end, we are able to filter the items that get put
    into the new list.


    ```

    nums = [1, 7, 22, 3, 16, 233, 9]


    # I want ''n'' for each ''n'' in nums if ''n'' is less than 10

    under_ten = [n for n in nums if n < 10]


    print(under_ten)


    # prints [1, 7, 3, 9]

    ```'
