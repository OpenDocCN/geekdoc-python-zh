    \n# 3\nfoods[2] = foods[0]\n\n# 4\nfoods.append('vegetables')\n\n# 5\nfoods.remove('pizza')\n\
    \n# 6\nfor f in food:\n    print(f)\n```\n\n## More on Lists\n\nThere are many,\
    \ many more things that we can learn about lists, but for this lesson we will\
