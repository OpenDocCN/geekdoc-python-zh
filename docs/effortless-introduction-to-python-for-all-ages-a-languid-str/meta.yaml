    转换为集合的特别之处在于它 **可以移除任何重复值**。\n\n```python\nmylst = [1,1,2,2,3,3,4,4]\n\nmytuple\
    \ = (\"apple\", \"apple\", \"orange\")\n\n# output: {1,2,3,4}\nset1 = set(mylst)\n\
    \n# output: {\"apple\", \"orange\"}\nset2 = set(mytuple)\n```\n\n## 动手试试！\n\n\
    Python 中集合的一个非常有用的特性是，当我们把其他数据类型转换为集合时，任何重复的项都会被移除。让我们试试看：\n\n-   创建一个包含数字 1 到\
    \ 5 的列表，每个数字出现不止一次。\n-   打印 “Before: ” 然后是该列表。\n-   使用 `set()` 构造器将你的列表转换为集合。\n\
    -   打印 “After: ” 然后是转换后的集合。\n\n## 移除集合元素\n\n我们可以通过几种不同的方式从集合中移除元素。来看看。\n\n我们可以使用\
