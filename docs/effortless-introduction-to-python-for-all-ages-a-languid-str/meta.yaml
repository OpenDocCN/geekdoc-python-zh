    \n```\nteacher = \"Rachel Fuller\"\n\nfirstname = teacher[:6] # Rachel\nlastname\
    \ = teacher[7:]  # Fuller\nfullname = teacher[:] # Rachel Fuller\nnolastletter\
    \ = teacher[:-1] # Rachel Fulle\n```\n\n## Negative Indices\n\nA nice trick in\
