    \ # prints 'Omar'\n```\n\n## 添加队友\n\n如果我们的团队需要一名额外的替补球员怎么办？我们如何向列表中添加一个项目？\n\n\
    在 Python 中，我们可以使用 `append` 向列表中添加项目。我们使用以下语法来实现：\n\n```\nmylist.append(item)\n\
    ```\n\n```\nplayers = [\"Tarik\", \"Alec\", \"Jordan\", \"Franko\", \"Erik\"]\n\
    players.append(\"John\")\n# players is now\n# [\"Tarik\", \"Alec\", \"Jordan\"\
