    \ 4 duplicates in this list!\nHere is the new list with no duplicates: {'2', '1',\
    \ '3', '4'}\n>>> \n```\n\n# Exercise: Duplicates Key\n\nTo solve this problem,\
    \ Python made it easy, as when we convert a list to a set, any duplicate items\
    \ are removed.\n\n```python\n# split the user input into a list\nnums = input(\"\
    Enter some numbers: \").split()\n\n# convert to a set to remove duplicates\nnumset\
    \ = set(nums)\n\n# find difference in length to find amount of duplicates\nnumduplicates\
    \ = len(nums) - len(numset)\n\n# print for user using f-string\nprint(f\"There\
    \ were {numduplicates} duplicates in this list!\")\nprint(f\"Here is the new list\
