    ## What does join do?


    Join does basically the opposite of split! It takes an iterable (a list, tuple,
    etc) and joins all the elements together with a given separator.


    Let’s say we have a list of letters and want to build a word out of it.


    > **PROBLEM**


    We want to turn a list of characters into a string. For example, ["C","o","d","e","
    ", "H", "e", "r", "o"] would turn into "Code Hero"


    ```

    ["C","o","d","e"," ", "H", "e", "r", "o"]

    ↓

    "Code Hero"

    ```


    The solution: use the built-in join method to convert the list of characters into
    a string.


    Let’s take a look at the syntax.


    ```

    charlist = ["C","o","d","e"," ","H","e","r","o"]

    delimiter = ""

    string = delimiter.join(charlist)

    print(string)

    ```


    ![](img/764aef0d5d73276c0d8a4da4cf838843_253_0.png)


    ```

    Code Hero

    ```


    So, what happened? Python’s built-in join method took our list of characters and
    joined them together with the given delimiter (which was an empty string, meaning
    no spaces in between the letters) How does this work?


    DOCUMENTATION


    ### Description


    Returns a string made from the elements of an iterable.


    ### Syntax


    `str.join(iterable)`


    ### str


    The given delimiter string that will join the iterable.


    ### iterable


    The iterable used for creating the string. For example, a list of characters.


    ## Example #1


    We can use other delimiters and symbols to separate our elements once joined.
    Take a look.


    ```

    charlist = ["1","2","3","4","5","6","7","8","9"]

    delimiter = "-"

    string = delimiter.join(charlist)

    print(string)

    ```


    ![](img/764aef0d5d73276c0d8a4da4cf838843_255_0.png)


    ```

    1-2-3-4-5-6-7-8-9

    ```


    ## Example #2


    We can shorten the amount of code too by specifying the delimiter in-line with
    the join call. Take a look:


    ```

    wordlist = ["hello","world","I","am","a","programmer!"]

    sentence = " ".join(wordlist)

    print(sentence)

    ```


    ![](img/764aef0d5d73276c0d8a4da4cf838843_256_0.png)


    ```

    hello world I am a programmer!

