  md: '# Syntax


    This can look a bit confusing at first - let''s take a look at the syntax in closer
    detail so we can see how we can make any comprehension we want.


    ```

    newlist = [expression for item in iterable if condition == True]

    ```


    ```

    fruits = ["apple", "banana", "cherry", "kiwi", "mango"]

    newlist = [x for x in fruits if "a" in x]

    print(newlist)

    # prints ["apple", "banana", "mango"] because they all contain ''a''

    ```'
