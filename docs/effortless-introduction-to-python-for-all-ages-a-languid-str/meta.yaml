    ```\nfoods = ['pizza', 'cheeseburgers', 'chicken wings']\n\ncount = len(foods)\n\
    \nprint(count) # prints 3\n```\n\nIn this case, we make a food list filled with\
    \ 3 foods. We then create a count variable that is set to the **len()** of items\
