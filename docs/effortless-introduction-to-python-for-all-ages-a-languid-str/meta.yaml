    students = {\n    \"Erick\",\n    \"Georgia\",\n    \"Abhay\",\n    \"Raquel\"\
    ,\n    \"Becky\",\n    \"Jack\",\n    \"Max\",\n    \"Andrew\",\n    \"Shawn\"\
    ,\n    \"Patrick\",\n    \"Henrique\"\n}\n\nclass1 = {\n    \"Georgia\",\n   \
    \ \"Jack\",\n    \"Max\",\n    \"Patrick\",\n    \"Henrique\"\n}\n\nclass2 = {\n\
    \    \"Erick\",\n    \"Becky\",\n    \"Jack\",\n    \"Max\",\n    \"Shawn\",\n\
    \    \"Patrick\"\n}\n```\n\n# Exercise: Hello World High School Key\n\n```python\n\
    students = {\"Erick\",\"Georgia\",\"Abhay\",\"Raquel\",\"Becky\",\n        \"\
    Jack\",\"Max\",\"Andrew\",\"Shawn\",\"Patrick\",\"Henrique\"}\nclass1 = {\"Georgia\"\
    ,\"Jack\",\"Max\",\"Patrick\",\"Henrique\"}\nclass2 = {\n\"Erick\",\"Becky\",\"\
    Jack\",\"Max\",\"Shawn\",\"Patrick\"}\n\n# students that have classes together:\n\
    # intersections give us common set items\nclasstogether = class1.intersection(class2)\n\
    \n# students that have no classes together:\n# symmetric difference gives us only\
