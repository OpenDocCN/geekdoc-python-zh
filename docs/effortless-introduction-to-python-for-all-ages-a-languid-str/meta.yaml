  md: '# What else can we do with them?


    We can also generate a list from scratch using comprehensions and **ranges**.
    This way, we don''t need to have an initial list to create from.


    ```

    mylst = [n for n in range(100)]

    ```


    Let''s spice this up to only use numbers that are even and not odd. By adding
    a conditional we can achieve this!


    ```

    mylst = [n for n in range(100) if n%2 == 0]

