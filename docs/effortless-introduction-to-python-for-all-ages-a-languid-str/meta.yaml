    in conditional statements.


    # ## Vocabulary


    +   - **Condition**: a requirement or criteria needed to perform an action


    +   - **If**: Keyword to begin an if-statement, requires a condition and ends
    with a semicolon


    +   - **Elif**: an optional keyword used in if-statements, after the if keyword
    and before the else keyword, that requires a condition and adds more flexibility
    to your code


    +   - **Else**: an optional keyword in if-statements that does not accept condition
    and is the default output'
