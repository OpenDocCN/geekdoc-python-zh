    \ their values updated, and any keys that don't will be added to your dictionary!\n\
    \n> Let's say we want to make some changes to our car: We want to update our **year**\
    \ and **color** and also add a new item for our **license plate**. In Python,\
    \ we can use the update() method to achieve this all in <u>one line of code</u>.\n\
    \n```\nmy_dict.update({\"year\" : 2021, \"color\" : \"red\",\n    \"licenseplate\"\
    \ : \"2fast4u\"})\n```\n\n## Iterating through dictionaries\n\nIn Python, we can\
