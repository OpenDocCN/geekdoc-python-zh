- img_proc: true
  md: "# What Are Comprehensions?\n\nThe best way to describe what they are is to\
    \ describe the situations in which they help the most. Comprehensions are shorthand\
    \ ways to create new collections, so let’s first take a look at the long way.\n\
    \n**Goal:** Create a new list out filled with numbers from an existing list\n\n\
    ```\nnums = [1, 2, 3, 4, 5]\nnewlst = []\n# I want ‘n’ for each ‘n’ in nums\n\
    for num in nums:\n    newlst.append(num)\n\nprint(newlst)\n# prints [1, 2, 3,\
    \ 4, 5]\n```\n\nTo solve this problem, we made an **empty list** and used a **for\
    \ loop** to **append** each new item to the list."
  merge: -1
  pgno: 310
- img_proc: true
  md: "# What Are Comprehensions?\n\nHow can we shorten this? Well, Python includes\
    \ a great way to do that called ‘comprehensions’. These allow us to do exactly\
    \ the same thing with just one line of code.\n\n```\nnums = [1, 2, 3, 4, 5]\n\n\
    '''\nnewlst = []\n# I want 'n' for each 'n' in nums\nfor num in nums:\n    newlst.append(num)\n\
    '''\n\n# I want 'n' for each 'n' in nums\nnewlst = [n for n in nums]\n\nprint(newlst)\n\
    # prints [1, 2, 3, 4, 5]\n```"
  merge: -1
