- md: "## Chapter 2\n\n## Syntaxes Below the Class Level\n\nWriting an honest, efficient\
    \ little bit of code are some things of an art, and most frequently art may be\
    \ a skill which will be nurtured and learned. The syntax is vital in not only\
    \ pleasing the observer’s eye but allowing adjustments and reducing obfuscations.\
    \ A good few projects and prototypes go under because their syntax was too dense,\
    \ or incomprehensible at a look, requiring guidance on the way to check out the\
    \ code and interact with it.\n\nA lot of labor has been done on the rear end of\
    \ Python to permit for less complicated, cleaner syntax. It's an old language,\
    \ its inception has been in 1991, and it's been kept updated ever since. The basics\
    \ have remained an equivalent, but the instruments we've to figure with are polished\
    \ and upgraded.\n\nWe will tackle five of the more integral topics in writing\
    \ good Python syntax, and offer advice on the way to proceed with them. They are,\
    \ in our order:\n\n- List comprehensions:\n- Iterators and Generators:\n- Descriptors\
    \ and their properties:\n- Decorators:\n- with and contextlib\n\nAs you follow\
    \ along, it'd be helpful for you to be ready to access various tips and documentation\
    \ on samples of how things are done. These are often found in your compiler console’s\
    \ own help function, and Python’s own official tutorials and guides.\n\n## List\
    \ Comprehensions\n\nPython isn’t exactly C. There are inherent differences in\
    \ design and interpreter that allow C to possess more expansive code than Python\
    \ which might be more resource intensive. An example:\n\n```\n>>> numbers = range(10)\n\
    >>> size = len(numbers)\n>>> evens = []\n>>> i = 0\n>>> while i < size:\n... \
    \    if i % 2 == 0:\n...         evens.append(i)\n...     i += 1\n...\n>>> evens\n\
    [0, 2, 4, 6, 8]\n```\n\nThis form presents Python problems, namely that one, the\
    \ compiler interpreter has got to recalculate what must be changed within the\
    \ sequence per loop iteration and two, there has got to be a counter to stay an\
    \ eye fixed on what element needs interaction.\n\nWe can use Python’s list comprehension\
    \ functionalities that automate the above code’s processes using wired features,\
    \ which finishes up tidying it up and reducing our work to a singular line of\
    \ code. Additionally, the convenience and ease of this allow it to be comprehended\
    \ and troubleshoot faster, making bugs less likely and subsequent bug fixing easier.\n\
    \n```\n>>> [i for i in range(10) if i % 2 == 0]\n[0, 2, 4, 6, 8]\n```\n\n`enumerate`\
    \ is another example of Python’s elegant simplicity. This function indexes a sequence\
    \ conveniently when the sequence is employed during a loop.\n\nFor instance, this:\n\
    \n```\n>>> i = 0\n>>> seq = [\"one\", \"two\", \"three\"]\n>>> for element in\
    \ seq:\n...     seq[i] = '%d: %s' % (i, seq[i])\n...     i += 1\n...\n>>> seq\n\
    ['0: one', '1: two', '2: three']\n```\n\nreduces to this:\n\n```\n>>> seq = [\"\
    one\", \"two\", \"three\"]\n>>> for i, element in enumerate(seq):\n...     seq[i]\
    \ = '%d: %s' % (i, seq[i])\n...\n>>> seq\n['0: one', '1: two', '2: three']\n```\n\
    \nand features a neat bow tied thereon, using list comprehension, as shown below.\
    \ As an aside, converting the loop into a little function vectorizes for the code,\
    \ making later attempts at understanding and using it far more successful:\n\n\
    ```\n>>> def _treatment(pos, element):\n...     return '%d: %s' % (pos, element)\n\
    ...\n>>> seq = [\"one\", \"two\", \"three\"]\n>>> [_treatment(i, el) for i, el\
    \ in enumerate(seq)]\n['0: one', '1: two', '2: three']\n```\n\n## Iterators and\
    \ Generators\n\nAn iterator may be a container object that simply causes iteration\
    \ inside it. It comprises of two parts, `next` which produces subsequent item\
    \ in containment and `__iter__`, which returns the iterator object. Let’s use\
    \ a sequence to assist in understanding iterators.\n\n```\n>>> i = iter('abc')\n\
    >>> i.next()\n'a'\n>>> i.next()\n'b'\n>>> i.next()\n'c'\n>>> i.next()\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nStopIteration\n\
    ```\n\nAt the top of the sequence, we use `StopIteration`, which handily allows\
    \ iterator use in loops thanks to the condition allowing it to interrupt out and\
    \ stop.\n\nWe can also create an iterator during a class as follows, which uses\
    \ subsequent method and uses `__iter__` to return an iterator instance:\n\n```\n\
    >>> class MyIterator(object):\n...     def __init__(self, step):\n...        \
    \ self.step = step\n...     def next(self):\n...         \"\"\"Returns subsequent\
    \ element.\"\"\"\n...         if self.step == 0:\n...             raise StopIteration\n\
    ...         self.step -= 1\n...         return self.step\n...     def __iter__(self):\n\
    ...         \"\"\"Returns the iterator itself.\"\"\"\n...         return self\n\
    ...\n>>> for el in MyIterator(4):\n...     print el\n...\n3\n2\n1\n0\n```\n\n\
    Iterators are a basic and low-level construction, and their use is fairly unnecessary,\
    \ but they are doing form the bedrock for the concept of generators. Introduced\
    \ in Python version 2.2, it serves to make functions that return an inventory\
