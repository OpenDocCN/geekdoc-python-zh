    ## Chapter 9


    ### Creating Packages in Python


    Creating software packages is one among the foremost common applications of the
    Python programing language. As such, the discussion are going to be focused on
    browsing the method which will allow us to make Python packages and release them
    also. Additionally, the method of making and releasing Python packages are often
    repeated several times in one coding session enabling the user to form several
    packages for various applications.


    One might wonder on what''s the underlying purpose or maybe the benefits of learning
    the way to create packages when coding in Python. To answer also as explain the
    productivity of making Python packages, here are a couple of key points which
    may help provide the acceptable context:


    - Packages basically prime the resources that the programmer needs in later stages
    of app development. In simpler terms, the programmer won’t got to allocate his
    time towards doing the initial set-ups.

    - The process explained during this chapter to make Python packages doesn''t revolve
    around experimental techniques or workarounds. the tactic that we''ll explore
    isn''t only preferred by many programmers thanks to its popularity but it''s also
    easy to know.

    - The discussion of making Python packages also will facilitate programmers that
    adopt the ‘test-driven’ approach towards the event of their projects making the
    implementation relatively easier.

    - The releasing process is additionally made easier with the assistance of packages.


    ### A Common Pattern for each Python Package


    Whenever we create an application, we''ll usually need to contribute many code
    lines. Even the foremost simple of applications can have anywhere from 25 to 150
    lines of code. this will make the readability, maintenance, updates, patches,
    bug fixes, and even debugging of the appliance quite overwhelming for anyone.
    to stay things as simple as possible, we employ different techniques to arrange
    the application’s ASCII text file. One such approach towards organizing lines
    of code is to use ‘eggs’.


    An ‘egg’ is essentially a term that''s wont to ask a selected portion of the application’s
    ASCII text file. aside from being a simply definitive term, ‘egg’ is additionally
    a functional element in Python programming also. In other words, we divide the
    whole code into different sections, and every section is then put into different
    packages by using eggs. during this way, the application’s ASCII text file becomes
    much easier to figure with and if needed, the programmer also can reuse portions
    for an additional project also. This definitely makes the lifetime of programmers
    considerably easier as they will reuse code conveniently. From this attitude,
    packages function as individual components that, together, build the whole application.
    during this way, we will simply create every Python package by incorporating an
    egg structure to separate different code blocks for an application.


    This section will mainly be using the functionality provided by the 2 Python modules,
    which are ‘distutils’ and ‘setuptools’ to make ‘namespaced packages’. you''ll
    learn the method of organizing, releasing, and distributing a ‘namespaced package’
    using these Python modules also.


    Creating eggs is pretty simple and straight-forward. even as how an egg are often
    broken to reveal the yellow and white parts of the egg (yolk and albumen respectively),
    in programming, an egg are often created by putting different portions of code
    inside a nested folder. To elaborate, we create a parent folder then put one package
    inside this folder, then we create a sub-folder and place another package inside
    it, and so on. When creating ‘namespaced packages’ using eggs, the important thing
    is for each sub-folder to possess a reputation employed by the parent folder.
    as an example, if we create a ‘namespace package’ by using eggs and therefore
    the root folder''s name is ‘python.advanced’, then the name of the subfolders
    should have a minimum of a prefix that’s common with the basis folder’s namespace.
    during this case, if we were to make two sub-folders, then we could name the primary
    one ‘python’ and therefore the other ‘advanced’.


    A good practice when creating ‘namespace packages’ is to define the character
    of the code within the namespace itself. as an example, if the code lines in our
    package are meant to affect an SQL database, we will have something like this
    for the basis folder''s namespace; ‘python.sql’. we will then have two folders
    with ‘python’ and ‘sql’ namespaces accordingly.


    ### Using the ‘setup.py’ Script in Namespaced Packages


    Since we are handling nested folders, it''s important to possess a script capable
    of managing the successive executions of the packages housed in several sub-folders.
    we will consider this script as a game’s installation wizard that decompresses
    a whole game albeit the sport data is split into several individual zip files.


    The ‘setup.py’ script is usually placed within the basis directory of the nested
    folders to make sure that this script is that the first to be executed. What’s
    the purpose if the most controlling mechanism is that the first one? initialized
    later on? The anatomy of this script isn’t too complex also. By using the ‘setuptools’
    module, we will extend this function to make the required egg structure for our
    different packages.


    Depending on the programmer’s needs, they will easily create their own custom
    setup.py script file but the bare minimum to form one is to use the subsequent
    two lines of code:


    ```python

    from setuptools import setup


    setup(name=''acme.sql'')

    ```


    What we see here may be a slight demonstration of the arguments which will be
    used with the functions. within the upcoming sections, you''ll see that we''ll
    define many other package elements using this particular function. The setup.py
    file''s purpose is to line the stage for us to execute more instructions (through
    commands) needed for creating packages. While we cannot explain every possible
    control right here and now, the module gives a full command list that users can
    examine. To mention the command list, we simply access an option referred to as
    ‘--help-commands’. This has been demonstrated below for the sake of convenience:


    ```

    $ python setup.py --help-commands

    ```


    Standard commands:


    - build build everything needed to put in

    - ...

    - install install everything from build directory

    - sdist create a source distribution

    - register register the distribution

    - bdist create a built (binary) distribution


    Extra commands:


    - develop install package in ''development mode''

    - ...

    - test run unit tests after in-place build

    - alias defines a shortcut

    - bdist_egg create an "egg" distribution


    The commands that are used commonly and are emphasized quite the remainder belong
    to none aside from the ‘Standard Commands’ family. But this doesn’t mean that
    the additional commands are useless, on the contrary, they provide extended functionality
    ensuring tasks possible which might otherwise require unnecessary workarounds.
    Before we advance to discussing a couple of of the foremost important commands,
    it’s important to notice that if we don''t have any extension modules installed
    in our Python IDE, like the setuptools module, then we won’t have access to the
    ‘Extra Commands’ list. By installing the ‘distutils’ module, we gain access to
    the ‘Standard Commands’ and by installing the ‘setuptools’ module, we will use
    its corresponding commands listed under ‘Extra Commands’.


    ### The ‘sdist’ Command


    Not only is that the ‘sdist’ command the foremost commonly used, but it''s also
    the only command out of the bunch. This command is liable for copying all the
    files necessary for the package to run properly during a ‘release tree’. It then
    proceeds to archive this tree. The tree are often either archived during a file
    or in several files.


    This command is primarily executed when a programmer wants to distribute a specific
    package from a ‘target system independently’. All things said and done, this is
    often arguably one among the foremost easiest approaches to performing such a
    task. As soon because the ‘sdist’ command is executed, a folder named ‘dist’ is
    generated which houses the archive files containing a replica of the package’s
    source tree (which was initially created). during this way, once we distribute
    this ‘dist’ file, we are essentially distributing the package itself.'
