- md: '## Working Environment


    A proper environment is completely necessary for any programming project, be it
    creating an easy package, or a whole application. The environment is essentially
    an area where the programmer performs most of the coding and testing and prepares
    the packages which will execute the code in an orderly fashion. An environment
    can be considered as a kind of ‘work desk’. On your work desk, you make sure that
    you have all the tools you’ll need for the project, all the components as well
    as the necessary materials. If your work desk is missing something, then you will
    presumably need to drop the whole project and fetch what you’re missing, and sometimes,
    you don’t even have the resources to prepare any substitute. The same is the case
    for the working environment in programming, but in here, if the environment isn''t
    set up properly, then you will need to drop most of the progress you''ve made
    and can''t continue any longer until you prepare another suitable environment.


    The environment needed to be set can be done in the following two ways:


    - It can be built up by composing it with many small tools. This way of setting
    the environment has now become old.

    - A new way is to use an all-in-one tool.


    These are the main methods of building the environment while many other ways in
    between are also available. The developer should be given the right to choose
    any way they might wish to set up their environment.


    ## Editor Tools and Other Components


    Many programmers prefer creating the environment for their project using a suitable
    ‘Editor tool’ along with other components. Creating an environment from scratch
    using an editor is quite taxing on the resource of time, meaning that it takes
    a lot of your time to do so. That said, the time one invests to create an environment
    in this method is paid-off pretty much as the resulting product is worthwhile.
    Environments built in this manner are easily customizable after creation, which
    has a huge impact on the project results as well (you can tweak the environment
    to match the requirements of your project later on in the development stage as
    well). If you know that the environment you''ve built will come in handy in the
    future, then you can simply make a portable version of it and store it in a removable
    drive, preferably a USB. In this way, you can plug it into any system you want
    and have it ready for the project on the fly. In the upcoming chapters, we will
    find out how to create a template for creating an environment as well. This dramatically
    decreases the time it takes to create an environment from scratch for a completely
    new project.


    Hence, the working environment should have the following:


    - An open-source and free code editor that''s available for use on any OS

    - Additional binaries for features which can help avoid having to rewrite them
    in Python


    A popular code editor used by many programmers is ‘Vim’ but a few prefer the ‘Emacs’
    code editor; we will only focus on the Vim editor in this chapter.


    ## Installing and Configuring the Vim Code Editor


    The Vim code editor tool can be downloaded from their official website.


    http://www.vim.org/download.php


    Systems running on Linux OS usually have a version of Vim installed by default.
    But there are chances that the version is an older release so you should check
    the Vim installation version by executing the following command in the terminal.


    ```

    vim --version

    ```


    If the version isn''t the latest release, then it''s recommended you update it.


    On other systems like Windows and macOS, Vim isn''t included by default and needs
    to be manually downloaded and installed. On Windows, users will have the option
    to download a Vim version that has a graphical interface along with the standard
    console version. This version of Vim is usually referred to as ‘gvim’. The official
