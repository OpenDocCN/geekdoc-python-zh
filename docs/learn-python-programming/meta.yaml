    1.0版本旨在帮助在一个框架中统一研究和生产功能，而不是分两部分进行，使事情变得更容易，并避免在尝试合并两部分时发生的一些价值损失和复杂性。这使我们能够获得更多的性能优化以及完成研究和生产所需的灵活性。


