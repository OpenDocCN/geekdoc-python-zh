    被启用，因此可以从 shell 访问它。


    ## Windows 安装


    在 Windows 操作系统上安装和编译 Python 的基本过程与 Linux 类似，但 Windows 还需要设置一个复杂的编译环境，这可能相当麻烦。网站“python.org”上的下载部分有适用于
