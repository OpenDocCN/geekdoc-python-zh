    is to fetch these files from their respective directory and include them within
    the distributable archive. This is done by the ‘sdist’ command. To do this, the
    ‘sdist’ command generates a file named ‘MANIFEST’ and creates the list for all
    of the package’s files, then proceeds to add them into the archive sequentially.


    When we use tools and commands that handle the responsibility of checking out
