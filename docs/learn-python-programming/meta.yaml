    # Chapter 1


    ## Preparing to figure with Python


    In today’s day and age, Python is during all in every of the foremost popular
    programming languages that has excellent usability in a big variety of high-level
    niches, like machine learning, data science, penetration testing, etc. Even for
    scenarios like application development and standard programming, Python doesn''t
    fall behind other languages like C or C++. during this chapter, we''ll comprehensively
