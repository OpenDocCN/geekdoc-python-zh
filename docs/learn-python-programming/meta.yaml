- md: 'experimenting with it.


    ## Other implementations


    Apart from the commonly used implementations, other interesting implementations
    and ports of Python also are available. Examples include the Python 2.2.2 available
    for access within the Nokia S60 phone series, and a port on ARM Linux which provides
    its availability in devices like Sharp Zaurus.


    ## Linux Installation


    If the OS in question is Linux, then the Python language may already be installed.
    To access it, just attempt to call it from the shell as:


    ```

    tarek@dabox:~$ python

    Python 2.3.5 (#1, Jul 4 2007, 17:28:59)

    [GCC 4.1.2 20061115 (prerelease) (Debian 4.1.1-21)] on linux2

    >>>

    ```


    Once the shell is finished executing the command from the user, it''ll either
    display a mistake detailing that there''s no valid installation of Python on the
    system, or it''ll easily replace the version of the Python installation and perform
    the IDE. At the top of the shell, you''ll notice three ‘greater than’ symbols
    (>>>). These symbols tell the user that Python will execute any valid command
    written during this space. The shell also tells us the compiler that''s available
    for the Python and it depends on OS to OS. As an example, the compiler on a system
    running Linux are going to be ‘GCC’ while on the opposite hand, the compiler for
    a system running Windows are going to be the Visual Studio.


    If you''re indeed running a Linux-based system, you''ll install other Python versions
    also. With quite one Python installation, all you''ve got to try to is execute
    the command while passing the precise version you would like the shell to run.
    During this way, the shell won''t execute a completely different version of Python
    or all Python versions at an equivalent time. Here’s an indication that explains
    this:


    ```

    tarek@dabox:~$ which python

    /usr/bin/python

    ```


    ```

    tarek@dabox:~$ python

    python python2.3 python2.5

    python2.4

    ```


    There is an opportunity that the system doesn''t recognize the Python command
    you''ve got executed. This will be either because you''ve got made a typo when
    writing the command or the system cannot access the Python installation. In such
    cases, the matter are often, most of the time, fixed by simply doing a fresh installation
    through the package manager of the Linux distribution you''re running.


    The preferred way of putting in Python for the Linux system is to use the package
    installation method, but the package-management tools might not always have the
    newest Python version.


    ## Installing the Python as a Package


    Python is usually installed in Linux by using the package-management tools provided
