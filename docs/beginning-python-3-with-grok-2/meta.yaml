  md: '# USING A LIST AS A STACK AND A QUEUE


    A stack is a LIFO data structure with `push()` and `pop()` functions for adding
    and removing elements, respectively. The most recently added element in a stack
    is in the top position and therefore the first element that can be removed from
    the stack.


    The following code blocks illustrate how to create a stack and also remove and
    append items from a stack in Python. Create a Python list (which we''ll use as
    a stack):


    ```

    >>> s = [1,2,3,4]

    ```


    Append 5 to the stack:


    ```

    >>> s.append(5)

    >>> s

    [1, 2, 3, 4, 5]

    ```


    Remove the last element from the stack:


    ```

    >>> s.pop()

    5

    >>> s

    [1, 2, 3, 4]

    ```


    A queue is a FIFO data structure with `insert()` and `pop()` functions for inserting
    and removing elements, respectively. The most recently added element in a queue
    is in the top position and therefore the last element that can be removed from
    the queue.


    The following code blocks illustrate how to create a queue and also insert and
    append items to a queue in Python.


    Create a Python list (which we''ll use as a queue):


    ```

    >>> q = [1,2,3,4]

    ```


    Insert 5 at the beginning of the queue:


    ```

    >>> q.insert(0,5)

    >>> q

    [5, 1, 2, 3, 4]

    ```


    Remove the last element from the queue:


    ```

    >>> q.pop(0)

    1

    >>> q

    [5, 2, 3, 4]

    ```'
