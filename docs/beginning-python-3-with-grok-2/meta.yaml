    \n清单 2.4 的输出如下所示：\n\n```\nfound identical matches: 1\nfound case matches: 1\n\
    ```\n\n## 使用 split() 函数打印对齐文本\n\n清单 2.5 展示了 `fixed_column_count1.py` 的内容，该文件演示了如何使用固定列数将文本字符串中的一组单词打印为对齐文本。\n\
