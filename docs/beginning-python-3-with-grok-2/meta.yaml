    \ 1))\nplt.tight_layout()\nplt.show()\n```\n\n### 代码解释：\n\n- 导入库：\n  - pandas\
    \ 用于数据操作。\n  - numpy 用于生成随机数。\n  - matplotlib.pyplot 用于绘图。\n\n- 设置随机种子：\n  - `np.random.seed(42)`\
    \ 确保随机数的可重复性。\n\n- 创建数据框：\n  - `np.random.randint(0, 100, size=(4, 5))` 生成一个 4x5\
