    \n关键特征：\n- 任务特定：为特定任务或问题设计\n- 固定架构：架构在训练前定义\n- 有限上下文：通常处理固定大小的输入或短序列输入\n- 在有标签数据上训练：需要大量有标签数据进行训练\n\
    \n## 大语言模型\n\n另一方面，大语言模型旨在大规模处理和理解人类语言。它们通常在大量文本数据上进行训练，目标是学习语言中的模式、关系和结构。\n\n\
