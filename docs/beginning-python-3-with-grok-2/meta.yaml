  md: '# CALCULATING THE MEAN AND STANDARD DEVIATION (2)


    The code sample in this section extends the code sample in the previous section
    with additional statistical values, and the code in Listing 4.19 can be used for
    any data distribution. Keep in mind that the code sample uses random numbers simply
    for the purposes of illustration. After you have launched the code sample, replace
    those numbers with values from a CSV file or some other dataset containing meaningful
    values.


    Moreover, this section does not provide details regarding the meaning of quartiles,
    but you can learn about quartiles here: https://en.wikipedia.org/wiki/Quartile


    Listing 4.19 displays the contents of `stat_summary.py`, which illustrates how
    to display various statistical values from a NumPy array of random numbers.


    **Listing 4.19: stat_values.py**


    ```

    import numpy as np


    from numpy import percentile

    from numpy.random import rand


    # generate data sample

    data = np.random.rand(1000)


    # calculate quartiles, min, and max

    quartiles = percentile(data, [25, 50, 75])

    data_min, data_max = data.min(), data.max()


    # print summary information

    print(''Minimum:  %.3f'' % data_min)

    print(''Q1 value: %.3f'' % quartiles[0])

    print(''Median:   %.3f'' % quartiles[1])

    print(''Mean Val: %.3f'' % data.mean())

    print(''Std Dev:  %.3f'' % data.std())

    print(''Q3 value: %.3f'' % quartiles[2])

    print(''Maximum:  %.3f'' % data_max)

    ```'
