  md: '# OTHER USEFUL NUMPY METHODS


    In addition to the `NumPy` methods that you saw in the code samples prior to this
    section, the following (often intuitively named) `NumPy` methods are also very
    useful.


    +   - The method `np.zeros()` initializes an array with 0 values.

    - The method `np.ones()` initializes an array with 1 values.

    - The method `np.empty()` initializes an array with 0 values.

    - The method `np.arange()` provides a range of numbers.

    - The method `np.shape()` displays the shape of an object.

    - The method `np.reshape()` is *very useful*! It changes the dimensions of an
    array.

    - The method `np.linspace()` is *useful in regression*.

    - The method `np.mean()` computes the mean of a set of numbers.

    - The method `np.std()` computes the standard deviation of a set of numbers.


    Although `np.zeros()` and `np.empty()` both initialize a two-dimensional array
    with 0, `np.zeros()` requires less execution time. You could also use `np.full(size,
    0)`, but this method is the slowest of all three methods.


    The `reshape()` method and the `linspace()` method are very useful for changing
    the dimensions of an array and generating a list of numeric values, respectively.
    The `reshape()` method often appears in TensorFlow code, and the `linspace()`
    method is useful for generating a set of numbers in linear regression.


    The `mean()` and `std()` methods are useful for calculating the mean and the standard
    deviation of a set of numbers. For example, you can use these two methods in order
    to resize the values in a Gaussian distribution so that their mean is 0 and the
    standard deviation is 1. This process is called *standardizing* a Gaussian distribution.


