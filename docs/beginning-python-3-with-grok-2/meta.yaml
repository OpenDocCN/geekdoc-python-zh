    \ code blocks is shown here:\n1\n4\n\nA second (and better) way to sort a list\
    \ is shown here:\n`minList = x.sort(reverse=True)`\n\nA third way to sort a list\
    \ involves the built-in functional version of the sort() method, as shown here:\n\
    `sorted(x, reverse=True)`\n\nThe preceding code snippet is useful when you do\
    \ not want to modify the original order of the list or you want to compose multiple\
    \ list operations on a single line.\n\n## Lists and Filter-Related Operations\n\
    \nPython enables you to filter a list (also called list comprehension), as shown\
    \ here:\n\n```python\nmylist = [1, -2, 3, -5, 6, -7, 8]\npos = [n for n in mylist\
    \ if n > 0]\nneg = [n for n in mylist if n < 0]\n\nprint pos\nprint neg\n```\n\
