    -   **特点：**\n    -   用于需要临时存储和操作信息的任务。\n    -   类似于人类的工作记忆，有助于推理和解决问题等任务。\n\n\
    ### 实现与技术\n\n-   **注意力机制：** 用于关注输入序列的相关部分，增强上下文理解。\n-   **检索增强生成（RAG）：** 将生成模型与检索系统相结合，以获取和整合外部信息。"
