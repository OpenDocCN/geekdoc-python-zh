    \    there are      extra    spaces    \ntext2: there are extra spaces\ntext2:\
    \ thereXYZareXYZextraXYZspaces\n```\n\n## PYTHON WHILE LOOPS\n\nYou can define\
    \ a `while` loop to iterate through a set of numbers, as shown in the following\
    \ examples:\n\n```\n>>> x = 0\n>>> while x < 5:\n...     print(x)\n...     x =\
    \ x + 1\n...\n0\n1\n2\n3\n4\n```\n\nPython uses indentation instead of curly braces,\
    \ which are used in other languages such as JavaScript and Java. Although Python\
    \ lists are not discussed until chapter 3, you can probably understand the following\
    \ simple code block, which contains a variant of the preceding loop that you can\
    \ use when working with lists:\n\n```\nlst = [1,2,3,4]\n\nwhile lst:\n    print('list:',lst)\n\
    \    print('item:',lst.pop())\n```\n\nThe preceding `while` loop terminates when\
    \ the `lst` variable is empty, and there is no need to explicitly test for an\
    \ empty list. The output from the preceding code is shown here:\n\n```\nlist:\
    \ [1, 2, 3, 4]\nitem: 4\nlist: [1, 2, 3]\nitem: 3\nlist: [1, 2]\nitem: 2\nlist:\
    \ [1]\nitem: 1\n```\n\nThis concludes the examples that use the `split()` function\
    \ in order to process words and characters in a text string. The next part of\
    \ this chapter shows you examples of using conditional logic in Python code.\n\
    \n## CONDITIONAL LOGIC IN PYTHON\n\nIf you have written code in other programming\
    \ languages, you have undoubtedly seen `if/then/else` (or `if-elif-else`) conditional\
    \ statements. Although the syntax varies between languages, the logic is essentially\
    \ the same. The following example shows you how to use if/elif statements in Python:\n\
    \n```\n>>> x = 25\n>>> if x < 0:\n...     print('negative')\n... elif x < 25:\n\
    ...     print('under 25')\n... elif x == 25:\n...     print('exactly 25')\n...\
    \ else:\n...     print('over 25')\n...\nexactly 25\n```\n\nThe preceding code\
    \ block illustrates how to use multiple conditional statements, and the output\
    \ is exactly what you expect.\n\n## THE BREAK/CONTINUE/PASS STATEMENTS\n\nThe\
    \ `break` statement in Python enables you to perform an “early exit” from a loop,\
    \ whereas the `continue` statement essentially returns to the top of the loop\
    \ and continues with the next value of the loop variable. The `pass` statement\
    \ is essentially a “do nothing” statement.\n\nListing 2.9 displays the contents\
