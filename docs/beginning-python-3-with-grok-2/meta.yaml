    >>> x = ['a', 'b', 'c']\n>>> for w in x:\n...     print(w, end=' ')\n...\na b\
    \ c\n```\n\n当你想在单行而不是多行上显示文本文件的内容时，可以使用这种类型的代码。\n\nPython 还提供了内置的 `reversed()`\
