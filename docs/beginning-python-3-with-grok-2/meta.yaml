    \ 'set'>, {'a': set([1, 2]), 'b': set([4])})\n```\n\n下一节将讨论本章前面部分未涉及的其他 Python\
    \ 序列类型。\n\n## PYTHON 中的其他序列类型\n\nPython 支持七种序列类型：`str`、`unicode`、`list`、`tuple`、`bytearray`、`buffer`\
