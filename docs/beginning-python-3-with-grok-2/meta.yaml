    # WHAT ARE HALLUCINATIONS?


    As noted previously in this chapter, all LLMs suffer from hallucinations, a term
    that refers to false information, untrue facts, and so forth. By way of comparison,
    you might know people who can speak about a given topic with self-assured confidence,
    and yet they are mistaken in their opinions. Similarly, LLMs can provide information
    with “confidence” in their accuracy (and might even appear to be convincing to
    you), yet that information is incorrect or even illogical.


    Although there are techniques that can assist in reducing hallucinations, such
    as the temperature inference parameter or the use of retrieval augmented generation
    (aka RAG), thus far, hallucinations cannot be 100% eliminated.


    With the preceding points in mind, hallucinations can be classified into several
    types. The following prompt was given to Llama 3 to describe those different types
