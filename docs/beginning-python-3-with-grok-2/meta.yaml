    \ 中执行自定义异常处理。\n\n清单 6.11：grok_exception_handling.py\n\n```\ntry:\n    # 可能引发异常的代码\n\
    \    x = 5\n    y = 0\n    result = x / y\nexcept ZeroDivisionError:\n    # 处理\
    \ ZeroDivisionError 异常的代码\n    print(\"Error: Division by zero!\")\nexcept Exception\
    \ as e:\n    # 处理任何其他异常的代码\n    print(f\"An error occurred: {e}\")\nelse:\n  \
    \  # 如果没有引发异常则执行的代码\n    print(\"Result:\", result)\nfinally:\n    # 无论是否引发异常都将执行的代码\n\
    \    print(\"Execution complete.\")\n```\n\n让我解释一下这段代码的作用：\ntry 块包含可能引发异常的代码。在本例中，我们尝试用\
    \ x 除以 y，如果 y 为 0，这将引发 ZeroDivisionError。\nexcept ZeroDivisionError 块捕获 ZeroDivisionError\
    \ 异常并打印错误消息。\nexcept Exception as e 块捕获可能引发的任何其他异常，并打印包含异常详细信息的错误消息。\nelse 块在\
    \ try 块中没有引发异常时执行。在本例中，它打印除法的结果。\nfinally 块包含无论是否引发异常都将执行的代码。在本例中，它打印一条完成消息。\n\
    通过使用这个 try-except 块，我们可以优雅地处理异常，防止程序崩溃。\n现在运行清单 6.11 中的代码，你将看到以下输出。\n\n```\nError:\
    \ Division by zero!\nExecution complete.\n```\n\n## Python 中的生成器\n\n生成器允许惰性求值，即时生成值，而无需将整个序列存储在内存中。本章代码示例的\
