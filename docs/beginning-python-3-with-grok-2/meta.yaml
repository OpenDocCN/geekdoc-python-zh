    # ARE CHATGPT-3 AND GPT-4 PART OF GENERATIVE AI?


    Both ChatGPT-3 and GPT-4 are LLMs that are considered examples of Generative AI.
    They belong to a class of models called “transformers,” which are particularly
    adept at handling sequences of data, such as text-related tasks.


    The following bullet list provides various reasons why these LLMs are considered
    generative, followed by a brief description of each bullet item:


    +   - Text generation

    - Learning distributions

    - Broad applications

    - Unsupervised learning


    Firstly, these models can produce coherent, contextually relevant, and often highly
    sophisticated sequences of text based on given prompts. They generate responses
    that weren’t explicitly present in their training data but are constructed based
    on the patterns and structures they learned during training.


    In addition, GPT-3, GPT-4, and similar models learn the probability distribution
    of their training data. When generating text, they’re essentially sampling from
    this learned distribution to produce sequences that are likely based on their
    training.


    Furthermore, beyond just text-based chat or conversation, these models can be
    used for a variety of generative tasks, such as story writing, code generation,
    poetry, and even creating content in specific styles or mimicking certain authors,
    showcasing their generative capabilities.


    Lastly, while they can be fine-tuned with specific datasets, models such as GPT-3
    are primarily trained in an unsupervised manner on vast amounts of text, learning
    to generate content without requiring explicitly labeled data for every possible
    response.


    In essence, ChatGPT-3, GPT-4, and similar models by OpenAI are quintessential
    examples of Generative AI in the realm of NLP and text generation, code generation,
    and graphics.'
