- md: "## ORDERED DICTIONARIES\n\nRegular Python dictionaries iterate over key/value\
    \ pairs in arbitrary order. Python 2.7 introduced a new OrderedDict class in the\
    \ collections module. The OrderedDict API provides the same interface as regular\
    \ dictionaries but iterates over keys and values in a guaranteed order depending\
    \ on when a key was first inserted:\n\n```python\n>>> from collections import\
    \ OrderedDict\n>>> d = OrderedDict([('first', 1),\n...                  ('second',\
    \ 2),\n...                  ('third', 3)])\n>>> d.items()\n[('first', 1), ('second',\
    \ 2), ('third', 3)]\n```\n\nIf a new entry overwrites an existing entry, the original\
    \ insertion position is left unchanged:\n\n```python\n>>> d['second'] = 4\n>>>\
    \ d.items()\n[('first', 1), ('second', 4), ('third', 3)]\n```\n\nDeleting an entry\
    \ and reinserting it will move it to the end:\n\n```python\n>>> del d['second']\n\
    >>> d['second'] = 5\n>>> d.items()\n[('first', 1), ('third', 3), ('second', 5)]\n\
    ```\n\n## Sorting Dictionaries\n\nPython enables you to support the entries in\
    \ a dictionary. For example, you can modify the code in the preceding section\
    \ to display the alphabetically sorted words and their associated word count.\
    \ Consider the following dictionary:\n\n```python\nmydict = {\"a\" : \"avocado\"\
    , \"y\" : \"yoghurt\", \"b\" : \"bread\" }\nfor key in sorted(mydict.keys()):\n\
    \    print(\"key:\",key,\" value:\",mydict[key])\n```\n\nLaunch the preceding\
    \ code snippet and you will see the following output:\n\n```\nkey: a  value: avocado\n\
    key: b  value: bread\nkey: y  value: yoghurt\n```\n\n## Python Multi Dictionaries\n\
    \nYou can define entries in a Python dictionary so that they reference lists or\
    \ other types of Python structures. Listing 3.12 displays the contents of multi_dictionary1.py,\
    \ which illustrates how to define more complex dictionaries.\n\n### Listing 3.12:\
    \ multi_dictionary1.py\n\n```python\nfrom collections import defaultdict\n\nd\
    \ = {'a' : [1, 2, 3], 'b' : [4, 5]}\nprint('firsts:',d)\n\nd = defaultdict(list)\n\
    d['a'].append(1)\nd['a'].append(2)\nd['b'].append(4)\nprint('second:',d)\n\nd\
    \ = defaultdict(set)\nd['a'].add(1)\nd['a'].add(2)\nd['b'].add(4)\nprint('third:',d)\n\
    ```\n\nListing 3.12 starts by defining the dictionary `d` and printing its contents.\
    \ The next portion of Listing 3.12 specifies a list-oriented dictionary, and then\
    \ modifies the values for the keys `a` and `b`. The final portion of Listing 3.12\
    \ specifies a set-oriented dictionary, and then modifies the values for the keys\
    \ `a` and `b` as well.\n\nThe output from Listing 3.12 is shown here:\n\n```\n\
    first: {'a': [1, 2, 3], 'b': [4, 5]}\nsecond: defaultdict(<type 'list'>, {'a':\
    \ [1, 2], 'b': [4]})\nthird: defaultdict(<type 'set'>, {'a': set([1, 2]), 'b':\
    \ set([4])})\n```\n\nThe next section discusses other Python sequence types that\
    \ have not been discussed in previous sections of this chapter.\n\n## OTHER SEQUENCE\
    \ TYPES IN PYTHON\n\nPython supports seven sequence types: `str`, `unicode`, `list`,\
    \ `tuple`, `bytearray`, `buffer`, and `xrange`.\n\nYou can iterate through a sequence\
    \ and retrieve the position index and corresponding value at the same time using\
    \ the `enumerate()` function.\n\n```python\n>>> for i, v in enumerate(['x', 'y',\
    \ 'z']):\n...     print(i, v)\n...\n0 x\n1 y\n2 z\n```\n\n`bytearray` objects\
    \ are created with the built-in function `bytearray()`. Although `buffer` objects\
    \ are not directly supported by Python syntax, you can create them via the built-in\
    \ `buffer()` function.\n\nObjects of type `xrange` are created with the `xrange()`\
    \ function. An `xrange` object is similar to a `buffer` in the sense that there\
    \ is no specific syntax to create them. Moreover, `xrange` objects do not support\
    \ operations such as slicing, concatenation, or repetition.\n\nAt this point,\
    \ you have seen all the Python types that you will encounter in the remaining\
    \ chapters of this book, so it makes sense to also discuss mutable and immutable\
    \ types in Python, which is the topic of the next section.\n\n## MUTABLE AND IMMUTABLE\
    \ TYPES IN PYTHON\n\nPython represents its data as objects. Some of these objects\
    \ (such as lists and dictionaries) are mutable, which means you can change their\
    \ content without changing their identity. Others, such as integers, floats, strings,\
    \ and tuples, are objects that cannot be changed. The key point to understand\
    \ is the difference between changing the value versus assigning a new value to\
    \ an object; you cannot change a string but you can assign it a different value.\
    \ This detail can be verified by checking the `id` value of an object, as shown\
    \ in Listing 3.13.\n\n### Listing 3.13: mutability.py\n\n```python\ns = \"abc\"\
    \nprint('id #1:', id(s))\nprint('first char:', s[0])\n\ntry:\n    s[0] = \"o\"\
    \nexcept:\n    print('Cannot perform reassignment')\n\ns = \"xyz\"\nprint('id\
    \ #2:',id(s))\ns += \"uvw\"\nprint('id #3:',id(s))\n```\n\nThe output of Listing\
    \ 3.13 is shown here:\n\n```\nid #1: 4297972672\nfirst char: a\nCannot perform\
    \ reassignment\nid #2: 4299809336\nid #3: 4299777872\n```\n\nThus, a Python type\
    \ is immutable if its value cannot be changed (even though it's possible to assign\
    \ a new value to such a type); otherwise, a Python type is mutable. Python immutable\
    \ objects are of the type `bytes`, `complex`, `float`, `int`, `str`, or `tuple`.\
    \ On the other hand, dictionaries, lists, and sets are mutable. The key in a hash\
    \ table must be an immutable type.\n\nSince strings are immutable in Python, you\
    \ cannot insert a string in the “middle” of a given text string unless you construct\
    \ a second string using concatenation. For example, suppose you have the string:\n\
    \"this is a string\"\nand you want to create the following string:\n\"this is\
    \ a longer string\"\nThe following Python code block illustrates how to perform\
    \ this task:\n\n```python\ntext1 = \"this is a string\"\ntext2 = text1[0:10] +\
    \ \"longer\" + text1[9:]\nprint('text1:',text1)\nprint('text2:',text2)\n```\n\n\
    The output of the preceding code block is shown here:\n\n```\ntext1: this is a\
    \ string\ntext2: this is a longer string\n```\n\n## THE TYPE() FUNCTION\n\nThe\
    \ type() primitive returns the type of any object, including Python primitives,\
    \ functions, and user-defined objects. The following code sample displays the\
    \ type of an integer and a string:\n\n```python\nvar1 = 123\nvar2 = 456.78\nprint(\"\
    type var1: \",type(var1))\nprint(\"type var2: \",type(var2))\n```\n\nThe output\
    \ of the preceding code block is shown here:\n\n```\ntype var1: <type 'int'>\n\
    type var2: <type 'float'>\n```\n\n## SUMMARY\n\nThis chapter showed you how to\
    \ work with various Python data structures. In particular, you learned about tuples,\
    \ sets, and dictionaries. Next, you learned how to work with lists and how to\
    \ use list-related operations to extract sublists. In addition, you learned how\
    \ to work with dictionaries, tuples, and sets in Python. Moreover, you saw several\
    \ prompts that were submitted to Grok in order to generate Python code samples\
    \ for counting uppercase and lowercase letters in a string, as well as code for\
    \ a stack and a queue.\n\n# CHAPTER 4\n\n## INTRODUCTION TO NUMPY AND PANDAS\n\
    \nThe first half of this chapter starts with a quick introduction to the Python\
    \ NumPy package, followed by a quick introduction to pandas and some of its useful\
    \ features. The pandas package for Python provides a rich and powerful set of\
    \ APIs for managing datasets. These APIs are very useful for machine learning\
    \ and deep learning tasks that involve dynamically “slicing and dicing” subsets\
    \ of datasets.\n\nThe first section contains examples of working arrays in NumPy,\
    \ and contrasts some of the APIs for lists with the same APIs for arrays. In addition,\
    \ you will see how easy it is to compute the exponent-related values (square,\
    \ cube, and so forth) of elements in an array.\n\nThe second section introduces\
    \ subranges, which are very useful (and frequently used) for extracting portions\
    \ of datasets in machine learning tasks. In particular, you will see code samples\
    \ that handle negative (-1) subranges for vectors as well as for arrays, because\
    \ they are interpreted one way for vectors and a different way for arrays.\n\n\
    The third part of this chapter delves into other NumPy methods, including the\
