    | D | 44.0 | 1206.000000 | 34.727511 |\n| E | 48.0 | 556.666667 | 23.593784 |\n\
    \n## USEFUL ONE-LINE COMMANDS IN PANDAS\n\nThis section contains an eclectic mix\
    \ of one-line commands in pandas (some of which you have already seen in this\
    \ chapter) that are useful to know.\n\nSave a DataFrame to a CSV file (comma separated\
    \ and without indices):\n`df.to_csv(\"data.csv\", sep=\",\", index=False)`\n\n\
    List the column names of a DataFrame:\n`df.columns`\n\nDrop missing data from\
    \ a DataFrame:\n`df.dropna(axis=0, how='any')`\n\nReplace missing data in a DataFrame:\n\
    `df.replace(to_replace=None, value=None)`\n\nCheck for NaN values in a DataFrame:\n\
    `pd.isnull(object)`\n\nDrop a feature in a DataFrame:\n`df.drop('feature_variable_name',\
    \ axis=1)`\n\nConvert object type to float in a DataFrame:\n`pd.to_numeric(df[\"\
    feature_name\"], errors='coerce')`\n\nConvert data in a DataFrame to a NumPy array:\n\
    `df.as_matrix()`\n\nDisplay the first n rows of a DataFrame:\n`df.head(n)`\n\n\
    Get data by feature name in a DataFrame:\n`df.loc[feature_name]`\n\nApply a function\
    \ to a DataFrame; multiply all values in the height column of the DataFrame by\
    \ 3:\n\n```python\ndf[\"height\"].apply(lambda height: 3 * height)\n```\n\nOr:\n\
    \n```python\ndef multiply(x):\n    return x * 3\ndf[\"height\"].apply(multiply)\n\
    ```\n\nRename the fourth column of the DataFrame as height:\n\n```python\ndf.rename(columns\
    \ = {df.columns[3]:'height'},\n          inplace=True)\n```\n\nGet the unique\
    \ entries of the column first in a DataFrame:\n\n```python\ndf[\"first\"].unique()\n\
    ```\n\nCreate a DataFrame with the columns first and last from an existing DataFrame:\n\
    \n```python\nnew_df = df[[\"name\", \"size\"]]\n```\n\nSort the data in a DataFrame:\n\
    \n```python\ndf.sort_values(ascending = False)\n```\n\nFilter the data column\
    \ named size to display only values equal to 7:\n\n```python\ndf[df[\"size\"]\
    \ == 7]\n```\n\nSelect the first row of the height column in a DataFrame:\n\n\
    ```python\ndf.loc([0], ['height'])\n```\n\n## SUMMARY\n\nThis chapter introduced\
    \ you to pandas, including creating labeled DataFrames and displaying metadata\
    \ of pandas DataFrames. Then, you learned how to create pandas DataFrames from\
    \ various sources of data, such as random numbers and hard-coded data values.\n\
    \nYou also learned how to read Excel spreadsheets and perform numeric calculations\
    \ on that data, such as the min, mean, and max values in numeric columns. Then,\
    \ you saw how to create pandas DataFrames from data stored in files. After that,\
    \ you learned how to invoke a Web service to retrieve data and populate a pandas\
    \ DataFrame with that data. In addition, you learned how to generate a scatterplot\
    \ from data in a pandas DataFrame. At this point, you are ready for Chapter 5,\
    \ which provides an introduction to the generative AI landscape.\n\n# CHAPTER\
    \ 5\n\n## THE GENERATIVE AI LANDSCAPE\n\nThis chapter provides a fast-paced introduction\
    \ to Generative AI (aka GenAI) that highlights some of its important features.\n\
    \nThe first part of this chapter introduces you to Generative AI, including key\
    \ features and techniques. You will also learn about the difference between conversational\
    \ AI and Generative AI.\n\nThe second part of this chapter discusses Generative\
    \ AI models, such as DALL-E, ChatGPT, and GPT-4. You will also see a comparison\
    \ of Generative AI against machine learning (ML), deep learning (DL), and natural\
    \ language processing (NLP).\n\nThe third part of this chapter poses open-ended\
    \ types of questions regarding artificial general intelligence (AGI) and a brief\
    \ comparison of AGI versus Generative AI. The fourth part of this chapter introduces\
    \ large language models (LLMs), along with various facets of LLMs, such as their\
    \ cost, size versus performance, and emergent abilities.\n\nThe fifth part of\
    \ this chapter introduces you to the concept of hallucinations, which is an important\
    \ topic. All LLMs suffer from hallucinations. In fact, LLMs can unintentionally\
    \ generate nonsensical and even hilarious responses to prompts.\n\nThe final part\
    \ of this chapter starts with a brief introduction to several companies that make\
    \ significant contributions to AI and NLP. Indeed, you will become very familiar\
    \ with these companies if you plan to pursue a career in NLP.\n\nOne detail to\
    \ keep in mind is that the term “prompt” in this chapter refers to any text-based\
    \ string that you provide to an LLM, and the response from the LLM is a text-based\
    \ string that is called a “completion.”\n\n## WHAT IS GENERATIVE AI?\n\nGenerative\
    \ AI refers to a subset of AI models and techniques that are designed to generate\
    \ new data samples that are similar in nature to a given set of input data. The\
    \ goal is to produce content or data that wasn’t part of the original training\
    \ set but is coherent, contextually relevant, and in the same style or structure.\n\
    \nGenerative AI stands apart in its ability to create and innovate, as opposed\
    \ to merely analyzing or classifying. The advancements in this field have led\
    \ to breakthroughs in creative domains and practical applications, making it a\
    \ cutting-edge area of AI research and development.\n\n### Key Features of Generative\
    \ AI\n\nThe following bullet list contains key features of Generative AI, followed\
    \ by a brief description for each bullet item:\n\n-   **Data generation:** refers\
    \ to the ability to create new data points that are not part of the training data\
    \ but resemble it. This can include text, images, music, videos, or any other\
    \ form of data.\n-   **Synthesis:** means that generative models can blend various\
    \ inputs to generate outputs that incorporate features from each input, such as\
    \ merging the styles of two images.\n-   **Learning distributions:** means that\
    \ Generative AI models aim to learn the probability distribution of the training\
    \ data so they can produce new samples from that distribution.\n\n### Popular\
    \ Techniques in Generative AI\n\n-   **Generative adversarial networks (GANs):**\
