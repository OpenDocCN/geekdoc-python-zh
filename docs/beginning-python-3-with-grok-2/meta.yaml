    # DICTIONARIES


    Python has a key/value structure called a `dict`, which is a hash table. A Python
    dictionary (and hash tables in general) can retrieve the value of a key in constant
    time, regardless of the number of entries in the dictionary (and the same is true
    for sets). You can think of a set as essentially just the keys (not the values)
    of a `dict` implementation.


    The contents of a `dict` can be written as a series of *key:value* pairs, as shown
    here:

    `dict1 = {key1:value1, key2:value2, ... }`


    An “empty `dict`” is just an empty pair of curly braces, {}.


    # Creating a Dictionary


    A Python dictionary (or hash table) contains colon-separated key/value bindings
    inside a pair of curly braces, as shown here:

    `dict1 = {}`

    `dict1 = {''x'' : 1, ''y'' : 2}`'
