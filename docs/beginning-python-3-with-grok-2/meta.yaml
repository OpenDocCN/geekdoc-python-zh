    # RECURSION


    Recursion is a powerful technique that can provide an elegant solution to various
    problems. The following subsections contain examples of using recursion to calculate
    some well-known numbers.


    # Calculating Factorial Values


    The factorial value of a positive integer n is the product of all the integers
    between 1 and n. The symbol for factorial is the exclamation point (!) and some
    sample factorial values are shown here:


    ```

    1! = 1

    2! = 2

    3! = 6

    4! = 20

    5! = 120

    ```


    The formula for the factorial value of a number is succinctly defined as follows:


    ```

    Factorial(n) = n*Factorial(n-1) for n > 1 and

    Factorial(0) = 1 and Factorial(1) = 1

    ```


    Listing 2.17 displays the contents of `factorial.py`, which illustrates how to
    use recursion in order to calculate the factorial value of a positive integer.'
