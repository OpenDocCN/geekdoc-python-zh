    \n- 计算行总和：\n  - `df['Row Sum'] = df.sum(axis=1)` 计算每行的总和。\n\n- 计算列总和：\n  - `df.iloc[:,\
    \ :-1].sum()` 计算除最后一列（'Row Sum'）外所有列的总和。\n\n- 计算 'Row Sum' 列的总和：\n  - `row_sum_of_sums\
