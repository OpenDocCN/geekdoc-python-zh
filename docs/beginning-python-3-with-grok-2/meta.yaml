- md: "## SORTING LISTS OF NUMBERS AND STRINGS\n\nListing 3.2 displays the contents\
    \ of the Python script `sorted1.py`, which determines whether or not two lists\
    \ are sorted.\n\n**Listing 3.2: sorted1.py**\n\n```python\nlist1 = [1,2,3,4,5]\n\
    list2 = [2,1,3,4,5]\n\nsort1 = sorted(list1)\nsort2 = sorted(list2)\n\nif(list1\
    \ == sort1):\n    print(list1,'is sorted')\nelse:\n    print(list1,'is not sorted')\n\
    \nif(list2 == sort2):\n    print(list2,'is sorted')\nelse:\n    print(list2,'is\
    \ not sorted')\n```\n\nListing 3.2 initializes the lists `list1` and `list2`,\
    \ and the sorted lists `sort1` and `sort2` based on the lists `list1` and `list2`,\
    \ respectively. If `list1` equals `sort1` then `list1` is already sorted; similarly,\
    \ if `list2` equals `sort2` then `list2` is already sorted.\n\nThe output from\
    \ Listing 3.2 is shown here:\n\n```\n[1, 2, 3, 4, 5] is sorted\n[2, 1, 3, 4, 5]\
    \ is not sorted\n```\n\nNote that if you sort a list of character strings, the\
    \ output is case sensitive, and that uppercase letters appear before lowercase\
    \ letters. This is due to the fact that the collating sequence for ASCII places\
    \ uppercase letters (decimal 65 through decimal 91) before lowercase letters (decimal\
    \ 97 through decimal 127). The following example provides an illustration:\n\n\
    ```python\n>>> list1 = ['a', 'A', 'b', 'B', 'Z']\n>>> print sorted(list1)\n['A',\
    \ 'B', 'Z', 'a', 'b']\n```\n\nYou can also specify the `reverse` option so that\
    \ the list is sorted in reverse order:\n\n```python\n>>> list1 = ['a', 'A', 'b',\
    \ 'B', 'Z']\n>>> print sorted(list1, reverse=True)\n['b', 'a', 'Z', 'B', 'A']\n\
    ```\n\nYou can even sort a list based on the length of the items in the list:\n\
    \n```python\n>>> list1 = ['a', 'AA', 'bbb', 'BBBBB', 'ZZZZZZZ']\n>>> print sorted(list1,\
    \ key=len)\n['a', 'AA', 'bbb', 'BBBBB', 'ZZZZZZZ']\n>>> print sorted(list1, key=len,\
    \ reverse=True)\n['ZZZZZZZ', 'BBBBB', 'bbb', 'AA', 'a']\n```\n\nYou can specify\
    \ `str.lower` if you want to treat uppercase letters as though they are lowercase\
    \ letters during the sorting operation, as shown here:\n\n```python\n>>> print\
    \ sorted(list1, key=str.lower)\n['a', 'AA', 'bbb', 'BBBBB', 'ZZZZZZZ']\n```\n\n\
    ## EXPRESSIONS IN LISTS\n\nThe following construct is similar to a `for` loop\
    \ but without the colon (:) character that appears at the end of a loop construct.\
    \ Consider the following example:\n\n```python\nnums = [1, 2, 3, 4]\ncubes = [\
    \ n*n*n for n in nums ]\n\nprint('nums: ',nums)\nprint('cubes:',cubes)\n```\n\n\
    The output from the preceding code block is shown here:\n\n```\nnums:  [1, 2,\
    \ 3, 4]\ncubes: [1, 8, 27, 64]\n```\n\n## CONCATENATING A LIST OF WORDS\n\nPython\
    \ provides the `join()` method for concatenating text strings, as shown here:\n\
    \n```python\n>>> parts = ['Is', 'SF', 'In', 'California?']\n>>> ' '.join(parts)\n\
