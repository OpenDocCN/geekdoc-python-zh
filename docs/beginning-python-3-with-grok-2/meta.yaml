    ```\n>>> str = \"World\"\n>>> x1,x2,x3,x4,x5 = str\n>>> x1\n'W'\n>>> x2\n'o'\n\
    >>> x3\n'r'\n>>> x4\n'l'\n>>> x5\n'd'\n```\n\n前面的代码片段向你展示了提取文本字符串中的字母是多么容易，在第\
    \ 3 章中，你将学习如何“解包”其他 Python 数据结构。\n\n你可以提取字符串的子字符串，如以下示例所示：\n\n```\n>>> x = \"\
