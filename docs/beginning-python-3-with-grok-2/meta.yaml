    # WHAT IS NUMPY?


    `NumPy` is a `Python` module that provides many convenient methods and also better
    performance. `NumPy` provides a core library for scientific computing in `Python`,
    with performant multidimensional arrays and good vectorized math functions, along
    with support for linear algebra and random numbers.


    `NumPy` is modeled after `MATLAB`, with support for lists, arrays, and so forth.
    `NumPy` is easier to use than `MATLAB`, and it''s common in `TensorFlow` code,
    `PyTorch` code, and `Python` code.


    # Useful NumPy Features


    The `NumPy` package provides the `ndarray` object, which encapsulates *multidimensional*
    arrays of homogeneous data types. Many `ndarray` operations are performed in compiled
    code in order to improve performance.


    Keep in mind the following important differences between `NumPy arrays` and the
    standard Python sequences:


    +   - `NumPy` arrays have a fixed size, whereas Python lists can expand dynamically.
    Whenever you modify the size of an `ndarray`, a new array is created and the original
    array is deleted.

    - `NumPy` arrays are homogeneous, which means that the elements in a `NumPy` array
    must have the same data type. Except for NumPy'
