    \n```\n>>> 'Python'.lower()\n'python'\n>>> 'Python'.upper()\n'PYTHON'\n>>>\n```\n\
    \n`lower()` 和 `upper()` 方法对于执行两个 ASCII 字符串的不区分大小写的比较非常有用。清单 1.2 显示了 `compare.py`\
