    # PANDAS BOOLEAN DATAFRAMES


    pandas supports Boolean operations on DataFrames, such as the logical OR, the
    logical AND, and the logical negation of a pair of DataFrames. Listing 4.22 displays
    the contents of pandas_boolean_df.py, which illustrates how to define a pandas
    DataFrame whose rows and columns are Boolean values.


    **Listing 4.22: pandas_boolean_df.py**


    ```

    import pandas as pd


    df1 = pd.DataFrame({''a'' : [1, 0, 1], ''b'' : [0, 1, 1] }, dtype=bool)


    df2 = pd.DataFrame({''a'' : [0, 1, 1], ''b'' : [1, 1, 0] }, dtype=bool)

    ```'
