    首先，让我们找出掷三个骰子时可能结果的总数。每个骰子有 6 个面，所以结果的总数是 6^3 = 216。\n现在，让我们找出结果之和为 7 或 11 的结果数量。\n\
    对于和为 7，可能的组合是：\n(1, 1, 5), (1, 2, 4), (1, 3, 3), (1, 4, 2), (1, 5, 1),\n(2, 1,\
