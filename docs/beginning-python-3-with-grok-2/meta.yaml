- md: "## USING THE SPLIT() FUNCTION TO COMPARE TEXT STRINGS\n\nListing 2.7 displays\
    \ the contents of `compare_strings1.py`, which illustrates how to determine whether\
    \ or not the words in one text string are also words in a second text string.\n\
    \n```\nListing 2.7: compare_strings1.py\ntext1 = 'a b c d'\ntext2 = 'a b c e d'\n\
    \nif(text2.find(text1) >= 0):\n    print('text1 is a substring of text2')\nelse:\n\
    \    print('text1 is not a substring of text2')\n\nsubStr = True\nfor w in text1.split():\n\
    \    if (text2.find(w) == -1):\n        subStr = False\n        break\n\nif (subStr\
    \ == True):\n    print('Every word in text1 is a word in text2')\nelse:\n    print('Not\
    \ every word in text1 is a word in text2')\n```\n\nListing 2.7 initializes the\
    \ string variables `text1` and `text2`, and uses conditional logic to determine\
    \ whether or not `text1` is a substring of `text2` (and then prints a suitable\
    \ message).\n\nThe next part of Listing 2.7 is a loop that iterates through the\
    \ words in the string `text1` and checks whether each of those words is also a\
    \ word in the string `text2`. If a non-match occurs, the variable `subStr` is\
    \ set to `False`, followed by the `break` statement, which causes an early exit\
    \ from the loop. The final portion of Listing 2.7 prints the appropriate message\
    \ based on the value of `subStr`. The output from Listing 2.7 is shown here:\n\
    \n```\ntext1 is not a substring of text2\nEvery word in text1 is a word in text2\n\
    ```\n\n## USING THE SPLIT() FUNCTION TO DISPLAY CHARACTERS IN A STRING\n\nListing\
    \ 2.8 displays the contents of `string_chars1.py`, which illustrates how to print\
    \ the characters in a text string.\n\n### Listing 2.8: string_chars1.py\n\n```\n\
    text = 'abcdef'\nfor ch in text:\n    print('char:', ch, 'ord value:', ord(ch))\n\
    print\n```\n\nListing 2.8 is straightforward: a `for` loop iterates through the\
    \ characters in the string `text` and then prints the character and its `ord`\
    \ value. The output from Listing 2.8 is shown here:\n\n```\n('char:', 'a', 'ord\
    \ value:', 97)\n('char:', 'b', 'ord value:', 98)\n('char:', 'c', 'ord value:',\
    \ 99)\n('char:', 'd', 'ord value:', 100)\n('char:', 'e', 'ord value:', 101)\n\
    ('char:', 'f', 'ord value:', 102)\n```\n\n## THE JOIN() FUNCTION\n\nAnother way\
    \ to remove extraneous spaces is to use the `join()` function, as shown here:\n\
    \n```\ntext1 = '   there are      extra    spaces    '\nprint('text1:',text1)\n\
    \ntext2 = ' '.join(text1.split())\nprint('text2:',text2)\n\ntext2 = 'XYZ'.join(text1.split())\n\
    print('text2:',text2)\n```\n\nThe `split()` function \"splits\" a text string\
    \ into a set of words, and also removes the extraneous white spaces. Next, the\
    \ `join()` function \"joins\" together the words in the string `text1`, using\
    \ a single white space as the delimiter. The last code portion of the preceding\
