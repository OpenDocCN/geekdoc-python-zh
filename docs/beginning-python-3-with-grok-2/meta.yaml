  mdcn: '## 挑战与局限性


    - 1. 数据质量：校准需要能够准确反映问题真实分布的高质量数据。数据质量差可能导致模型校准不佳。

    - 2. 过拟合：校准技术有时可能对验证集过拟合，导致在未见数据上表现不佳。

    - 3. 计算成本：一些校准技术，特别是贝叶斯方法，计算成本可能很高。


    ## 最佳实践


    - 1. 使用具有代表性的验证集：确保用于校准的验证集能够代表测试数据的分布。

    - 2. 监控校准指标：定期监控校准指标，如预期校准误差（ECE）或布里尔分数，以确保模型保持良好校准。

    - 3. 定期更新校准：随着模型更新或微调，重新进行校准，以确保模型的置信度与其准确性保持一致。


    ## 结论


    模型校准是大型语言模型开发和部署中的关键步骤。通过确保模型的置信度与其准确性保持一致，校准可以显著提高大型语言模型在实际应用中的可靠性和可信度。然而，重要的是要认识到校准技术的挑战和局限性，并遵循最佳实践以获得最佳结果。


    ## KAPLAN 与训练不足的模型


    Kaplan 等人提供了关于语言模型性能的（经验性）幂律，他们认为这取决于以下因素：


    - 模型大小

    - 数据集大小

    - 训练的计算量


    Kaplan 等人断言，改变网络宽度或深度的影响很小。他们还声称，超大模型的最优训练涉及相对适中的数据量。相关细节的论文可在此处访问：


    https://arxiv.org/abs/2001.08361


    然而，Chinchilla 是一个拥有 700 亿参数的大型语言模型，其训练数据集远大于 Kaplan 等人推荐的大小。事实上，Chinchilla 达到了
    SOTA（最先进）状态，并超越了以下所有大型语言模型的性能，这些模型的大小都是 Chinchilla 的 2 到 7 倍：


    - Gopher (280B)

    - GPT-3 (175B)

    - J1-Jumbo (178B)

    - LaMDA (137B)

    - MT-NLG (530B)


    此外，Chinchilla 大型语言模型的创建者撰写了一篇论文《神经语言模型的缩放定律》¹，其中包含了为各种模型大小建议的令牌数量，以实现充分训练而非训练不足（参见参考论文中的表
    3）。例如，对于拥有 1750 亿、5200 亿和 1 万亿参数的模型，建议的训练集大小分别为 3.7 万亿个令牌、11.0 万亿个令牌和 21.2 万亿个令牌。同一表格中最大的条目是拥有
    10 万亿参数的语言模型，其推荐的训练集大小为 216.2 万亿个参数。


    显然，超过 1 万亿参数的大型语言模型在创建如 Chinchilla 作者论文中所述的推荐大小数据集方面面临重大挑战。一个有趣的可能途径涉及自动语音识别（ASR），它可能通过将音频转录为文本来生成超过
    10 万亿个令牌的数据集。


    ¹ https://arxiv.org/abs/2001.08361


