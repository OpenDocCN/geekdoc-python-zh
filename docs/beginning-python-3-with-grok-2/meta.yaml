    # WHAT IS PANDAS?


    `pandas` is a Python package that is compatible with other Python packages, such
    as `NumPy` and `Matplotlib`. Install `pandas` by opening a command shell and invoking
    this command for Python 3.x:


    ```

    pip3 install pandas

    ```


    In many ways, the `pandas` package has the semantics of a spreadsheet, and it
    also works with `.xsl`, `.xml`, `.html`, and `.csv` file types. `pandas` provides
    a data type called a `DataFrame` (similar to a Python dictionary) with extremely
    powerful functionality, which is discussed in the next section.


    `pandas` `DataFrames` support a variety of input types, such as `ndarray`, lists,
    and `dict`. `pandas` also provides another data type called `pandas Series` (not
    discussed in this chapter). This data structure provides another mechanism for
    managing data (search online for more details).


    # pandas DataFrames


    In simplified terms, a `pandas DataFrame` is a two-dimensional data structure,
    and it''s convenient to think of the data structure in terms of rows and columns.
    `DataFrames` can be labeled (rows as well as columns), and the columns can contain
    different data types.'
  - '[PAGE 148]


    By way of analogy, it might be useful to think of a `DataFrame` as the counterpart
    to a spreadsheet, which makes it a very useful data type in `pandas`-related Python
    scripts. The source of the dataset can be a data file, database table, Web service,
    and so forth. `pandas` DataFrame features include:


    +   - DataFrame methods

    - DataFrame statistics

    - Grouping, pivoting, and reshaping

    - Dealing with missing data

    - Joining DataFrames


    # DataFrames and Data-Cleaning Tasks


    The specific tasks that you need to perform depend on the structure and contents
    of a dataset. In general, you will perform a workflow with the following steps
    (not necessarily always in this order), all of which can be performed with a `pandas`
    DataFrame:


    +   - Read data into a DataFrame.

    - Display top of DataFrame.

    - Display column data types.

    - Display non-missing values.

    - Replace `NA` with a value.

    - Iterate through the columns.

    - View statistics for each column.

    - Find missing values.

    - Total missing values.

    - Find the percentage of missing values.

    - Sort table values.

    - Print summary information.

    - Identify columns with >50% of data missing.

    - Rename columns.'
