    asquare = np.square(a)

    asqsum = np.sum(np.square(a))

    anorm1 = np.sqrt(np.sum(a*a))

    anorm2 = np.sqrt(np.sum(np.square(a)))

    anorm3 = np.linalg.norm(a)


    print(''a:        '',a)

    print(''asquare:'',asquare)

    print(''asqsum: '',asqsum)

