    \ \"<stdin>\", line 1, in <module>\nValueError: too many values to unpack\n```\n\
    \n## Reversing and Sorting a List\n\nThe Python `reverse()` method reverses the\
    \ contents of a list, as shown here:\n\n```python\n>>> a = [4, 1, 2, 3]\n>>> a.reverse()\n\
    [3, 2, 1, 4]\n```\n\nThe Python `sort()` method sorts a list:\n\n```python\n>>>\
    \ a = [4, 1, 2, 3]\n>>> a.sort()\n[1, 2, 3, 4]\n```\n\nYou can sort a list and\
    \ then reverse its contents, as shown here:\n\n```python\n>>> a = [4, 1, 2, 3]\n\
    >>> a.reverse(a.sort())\n[4, 3, 2, 1]\n```\n\nAnother way to reverse a list is:\n\
    \n```python\n>>> L = [0,10,20,40]\n>>> L[::-1]\n[40, 20, 10, 0]\n```\n\nKeep in\
    \ mind that `reversed(array)` is an iterable and not a list. You can, however,\
    \ convert the reversed array into a list with this code snippet:\n`list(reversed(array))`\
    \ or `L[::-1]`\n\nListing 3.1 contains a `while` loop whose logic is the opposite\
    \ of the listing in the previous section; if `num` is divisible by multiple numbers\
    \ (each of which is strictly less than `num`), then `num` is not prime.\n\n##\
    \ Listing 3.1: uppercase1.py\n\n```python\nlist1 = ['a', 'list', 'of', 'words']\n\
    list2 = [s.upper() for s in list1]\nlist3 = [s for s in list1 if len(s) <=2 ]\n\
    list4 = [s for s in list1 if 'w' in s ]\n\nprint('list1:',list1)\nprint('list2:',list2)\n\
    print('list3:',list3)\nprint('list4:',list4)\n```\n\nThe output from launching\
