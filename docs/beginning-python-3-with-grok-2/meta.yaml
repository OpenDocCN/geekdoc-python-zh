    # DeepMind and Games


    DeepMind is the force behind the AI systems StarCraft and AlphaGo, which defeated
    the best human players in Go (which is considerably more difficult than chess).
    These games provide “perfect information,” whereas games with “imperfect information”
    (such as poker) have posed challenges for ML models.


    AlphaGo Zero (the successor of AlphaGo) mastered the game through self-play in
    less time and with less computing power. AlphaGo Zero exhibited extraordinary
    performance by defeating AlphaGo 100–0. Another powerful system is AlphaZero,
