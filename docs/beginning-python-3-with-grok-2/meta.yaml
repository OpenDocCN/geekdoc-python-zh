    \ can create a list containing different data types, as well as multidimensional\
    \ lists. The next several sections show you how to manipulate list structures\
    \ in Python.\n\n## Lists and Basic Operations\n\nA Python list consists of comma-separated\
    \ values enclosed in a pair of square brackets. The following examples illustrate\
    \ the syntax for defining a list in Python, and also how to perform various operations\
    \ on a Python list:\n\n```python\n>>> list = [1, 2, 3, 4, 5]\n>>> list\n[1, 2,\
    \ 3, 4, 5]\n>>> list[2]\n3\n>>> list2 = list + [1, 2, 3, 4, 5]\n>>> list2\n[1,\
