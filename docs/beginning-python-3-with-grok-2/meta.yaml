- md: "## SELECT, ADD, AND DELETE COLUMNS IN DATAFRAMES\n\nThis section contains short\
    \ code blocks that illustrate how to perform operations on a DataFrame that resemble\
    \ the operations on a Python dictionary. For example, getting, setting, and deleting\
    \ columns works with the same syntax as the analogous Python dict operations,\
    \ as shown here:\n\n```python\ndf = pd.DataFrame.from_dict(dict([('A',[1,2,3]),\n\
    \    ('B',[4,5,6])]),\n    orient='index', columns=['one', 'two',\n    'three'])\n\
    \nprint(df)\n```\n\nThe output from the preceding code snippet is shown here:\n\
    \n```\n   one  two  three\nA    1    2      3\nB    4    5      6\n```\n\nNow\
    \ look at the following sequence of operations on the contents of the DataFrame\
    \ df:\n\n```python\ndf['three'] = df['one'] * df['two']\ndf['flag'] = df['one']\
    \ > 2\nprint(df)\n```\n\nThe output from the preceding code block is shown here:\n\
    \n```\n   one  two  three   flag\na  1.0  1.0    1.0  False\nb  2.0  2.0    4.0\
    \  False\nc  3.0  3.0    9.0   True\nd  NaN  4.0    NaN  False\n```\n\nColumns\
    \ can be deleted or popped as with a Python dict, as shown in the following code\
    \ snippet:\n\n```python\ndel df['two']\nthree = df.pop('three')\nprint(df)\n```\n\
    \nThe output from the preceding code block is shown here:\n\n```\n    one    flag\n\
    a  1.0  False\nb  2.0  False\nc  3.0  True\nd  NaN  False\n```\n\nWhen inserting\
    \ a scalar value, it will naturally be propagated to fill the column:\n\n```python\n\
    df['foo'] = 'bar'\nprint(df)\n```\n\nThe output from the preceding code snippet\
    \ is shown here:\n\n```\n    one    flag  foo\na  1.0  False  bar\nb  2.0  False\
    \  bar\nc  3.0  True  bar\nd  NaN  False  bar\n```\n\nWhen inserting a Series\
    \ that does not have the same index as the DataFrame, it will be \"conformed\"\
    \ to the index of the DataFrame:\n\n```python\ndf['one_trunc'] = df['one'][:2]\n\
    print(df)\n```\n\nThe output from the preceding code snippet is shown here:\n\n\
    ```\n    one    flag  foo  one_trunc\na  1.0  False  bar        1.0\nb  2.0  False\
    \  bar        2.0\nc  3.0  True  bar        NaN\nd  NaN  False  bar        NaN\n\
    ```\n\nYou can insert raw ndarray objects but their length must match the length\
    \ of the index of the DataFrame.\n\n## PANDAS DATAFRAMES AND SCATTERPLOTS\n\n\
    Listing 4.34 displays the contents of `pandas_scatter_df.py`, which illustrates\
    \ how to generate a scatterplot from a pandas DataFrame.\n\n### Listing 4.34:\
    \ pandas_scatter_df.py\n\n```python\nimport numpy as np\nimport pandas as pd\n\
    import matplotlib.pyplot as plt\nfrom pandas import read_csv\nfrom pandas.plotting\
    \ import scatter_matrix\n\nmyarray = np.array([[10,30,20], [50,40,60],\n[1000,2000,3000]])\n\
    \nrownames = ['apples', 'oranges', 'beer']\ncolnames = ['January', 'February',\
    \ 'March']\n\nmydf = pd.DataFrame(myarray, index=rownames, columns=\ncolnames)\n\
    \nprint(mydf)\nprint(mydf.describe())\n\nscatter_matrix(mydf)\nplt.show()\n```\n\
    \nListing 4.34 starts with various `import` statements, followed by the definition\
    \ of the NumPy array `myarray`. Next, the variables `myarray` and `colnames` are\
    \ initialized with values for the rows and columns, respectively. The next portion\
    \ of Listing 4.34 initializes the pandas DataFrame `mydf` so that the rows and\
    \ columns are labeled in the output, as shown here:\n\n| | January | February\
    \ | March |\n|---|---|---|---|\n| apples | 10 | 30 | 20 |\n| oranges | 50 | 40\
    \ | 60 |\n| beer | 1000 | 2000 | 3000 |\n\n| | January | February | March |\n\
    |---|---|---|---|\n| count | 3.000000 | 3.000000 | 3.000000 |\n| mean | 353.333333\
    \ | 690.000000 | 1026.666667 |\n| std | 560.386771 | 1134.504297 | 1709.073823\
    \ |\n| min | 10.000000 | 30.000000 | 20.000000 |\n| 25% | 30.000000 | 35.000000\
    \ | 40.000000 |\n| 50% | 50.000000 | 40.000000 | 60.000000 |\n| 75% | 525.000000\
    \ | 1020.000000 | 1530.000000 |\n| max | 1000.000000 | 2000.000000 | 3000.000000\
    \ |\n\n## GROK, DATAFRAMES, AND BAR CHARTS\n\nThe following prompt was given to\
    \ Grok.\nPlease generate Python code that creates a Pandas dataframe with 4 rows\
    \ and 5 columns of randomly generated numbers and then calculates the sum of each\
    \ row and the sum of each column, as well as a bar chart with the data in the\
    \ dataframe, along with an explanation of the Python code.\n\nGrok:\n\n### Listing\
    \ 4.35: grok_barchart.py\n\n```python\nimport pandas as pd\nimport numpy as np\n\
    import matplotlib.pyplot as plt\n\n# Set a seed for reproducibility\nnp.random.seed(42)\n\
    \n# Create a DataFrame with 4 rows and 5 columns of random numbers\ndf=pd.DataFrame(np.random.randint(0,\
    \ 100, size=(4, 5)),\ncolumns=['A', 'B', 'C', 'D', 'E'])\n\n# Calculate the sum\
    \ of each row\ndf['Row Sum'] = df.sum(axis=1)\n\n# Calculate the sum of each column\
    \ (excluding the 'Row Sum' column)\ncol_sums = df.iloc[:, :-1].sum()\n\n# Calculate\
    \ the sum of 'Row Sum' column\nrow_sum_of_sums = df['Row Sum'].sum()\n\n# Create\
    \ a new row for column sums, including the sum\n# of 'Row Sum' column\ncolumn_sums_row\
    \ = pd.concat([col_sums, pd.Series({'Row\nSum': row_sum_of_sums})], axis=1).iloc[0]\n\
    \n# Add the column sums as a new row\ndf.loc['Column Sum'] = column_sums_row\n\
    \n# Display the DataFrame with sums\nprint(df)\n\n# Print column sums separately\
    \ for clarity\nprint(\"\\nColumn Sums:\")\nprint(col_sums)\n\n# Create a bar chart\
    \ for the DataFrame data\nplt.figure(figsize=(10, 6))\ndf.iloc[:-1, :-1].plot(kind='bar',\
    \ figsize=(10, 6))\nplt.title('Bar Chart of Random Data')\nplt.xlabel('Columns')\n\
    plt.ylabel('Values')\nplt.legend(title='Rows', loc='upper right', bbox_to_\nanchor=(1.25,\
    \ 1))\nplt.tight_layout()\nplt.show()\n```\n\n### Explanation of the Code:\n\n\
    - Importing Libraries:\n  - pandas for data manipulation.\n  - numpy for generating\
    \ random numbers.\n  - matplotlib.pyplot for plotting.\n\n- Setting a Seed:\n\
    \  - `np.random.seed(42)` ensures reproducibility of random numbers.\n\n- Creating\
    \ the DataFrame:\n  - `np.random.randint(0, 100, size=(4, 5))` generates a 4x5\
    \ array of random integers between 0 and 99.\n  - `pd.DataFrame(...)` converts\
    \ this array into a DataFrame with column names 'A' through 'E'.\n\n- Calculating\
    \ Row Sums:\n  - `df['Row Sum'] = df.sum(axis=1)` computes the sum of each row.\n\
    \n- Calculating Column Sums:\n  - `df.iloc[:, :-1].sum()` calculates the sum of\
    \ all columns except the last one ('Row Sum').\n\n- Calculating the Sum of 'Row\
    \ Sum' Column:\n  - `row_sum_of_sums = df['Row Sum'].sum()` computes the sum of\
    \ all the row sums.\n\n- Creating a Complete Row for Column Sums:\n  - `pd.concat([col_sums,\
    \ pd.Series({'Row Sum': row_sum_of_sums})], axis=1).iloc[0]` concatenates column\
    \ sums with the sum of 'Row Sum' to form a complete row.\n\n- Adding the Column\
    \ Sums to the DataFrame:\n  - `df.loc['Column Sum'] = column_sums_row` adds this\
    \ new row to the DataFrame.\n\n- Displaying Results:\n  - The DataFrame and column\
    \ sums are printed for verification.\n\n- Creating a Bar Chart:\n  - `plt.figure(figsize=(10,\
    \ 6))` sets up a figure with a specific size.\n  - `df.iloc[:-1, :-1].plot(kind='bar',\
    \ figsize=(10, 6))` plots a bar chart for all data except the 'Row Sum' column\
    \ and 'Column Sum' row.\n  - `plt.title()`, `plt.xlabel()`, and `plt.ylabel()`\
    \ set the title and axis labels.\n  - `plt.legend()` adds a legend for the rows,\
    \ positioned outside the plot for clarity.\n  - `plt.tight_layout()` adjusts the\
    \ plot layout to prevent overlapping.\n  - `plt.show()` displays the plot.\n\n\
    This code not only performs data manipulation and calculations but also visualizes\
    \ the data in a bar chart, providing a graphical representation of the random\
    \ numbers generated.\n\nNow launch the code in Listing 4.35 and you will see the\
    \ following output:\n\n```\n          A     B     C     D     E  Row Sum\n0  51.0\
    \  92.0  14.0  71.0  60.0    288.0\n1  20.0  82.0  86.0  74.0  74.0    336.0\n\
    2  87.0  99.0  23.0   2.0  21.0    232.0\n3  52.0   1.0  87.0  29.0  37.0    206.0\n\
    Column Sum  NaN  NaN  NaN  NaN  NaN      NaN\n\nColumn Sums:\nA    210\nB    274\n\
    C    210\nD    176\nE    192\ndtype: int64\n```\n\nIn addition, you will see the\
    \ image that is displayed in Figure 4.1.\n\n![A Bar Chart Generated by Grok.](img/3b68f3b190a1168d9ea6bb5d70e40aa6_174_0.png)\n\
    \n**FIGURE 4.1** A Bar Chart Generated by Grok.\n\n## PANDAS DATAFRAMES AND SIMPLE\
    \ STATISTICS\n\nListing 4.36 displays the contents of `housing_stats.py`, which\
    \ illustrates how to gather basic statistics from data in a pandas DataFrame.\n\
    \n### Listing 4.36: housing_stats.py\n\n```python\nimport pandas as pd\n\ndf =\
    \ pd.read_csv(\"housing.csv\")\n\nminimum_bdrms = df[\"bedrooms\"].min()\nmedian_bdrms\
    \  = df[\"bedrooms\"].median()\nmaximum_bdrms = df[\"bedrooms\"].max()\n\nprint(\"\
    minimum # of bedrooms:\", minimum_bdrms)\nprint(\"median  # of bedrooms:\", median_bdrms)\n\
    print(\"maximum # of bedrooms:\", maximum_bdrms)\nprint(\"\")\n\nprint(\"median\
    \ values:\", df.median().values)\nprint(\"\")\n\nprices = df[\"price\"]\nprint(\"\
    first 5 prices:\")\nprint(prices.head())\nprint(\"\")\n\nmedian_price = df[\"\
    price\"].median()\nprint(\"median price:\", median_price)\nprint(\"\")\n\ncorr_matrix\
    \ = df.corr()\nprint(\"correlation matrix:\")\nprint(corr_matrix[\"price\"].sort_values\n\
    (ascending=False))\n```\n\nListing 4.36 initializes the pandas DataFrame `df`\
    \ with the contents of the CSV file `housing.csv`. The next three variables are\
    \ initialized with the minimum, median, and maximum number of bedrooms, respectively,\
    \ and then these values are displayed."
