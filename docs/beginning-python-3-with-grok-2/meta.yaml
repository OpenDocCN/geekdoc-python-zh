  - "[PAGE 298]\n\n# Listing 6.12: grok_generator_fibonacci.py\n\n```\ndef fibonacci():\n\
    \    a, b = 0, 1\n    while True:\n        yield a\n        a, b = b, a + b\n\n\
    # Usage:\nfib_generator = fibonacci()\n\nfor _ in range(10):  # Generate the first\
    \ 10 Fibonacci numbers\n    print(next(fib_generator))\n```\n\nExplanation:\n\
    The fibonacci function is a generator that yields Fibonacci numbers indefinitely.\
    \ It uses two variables, a and b, to keep track of the current and next Fibonacci\
    \ numbers.\nThe generator starts with a = 0 and b = 1, which are the first two\
    \ Fibonacci numbers. It then enters an infinite loop where it yields the current\
    \ Fibonacci number (a) and updates the values of a and b to the next Fibonacci\
    \ number.\nThe yield statement is what makes this function a generator. It returns\
    \ the current Fibonacci number and pauses the execution of the function until\
    \ the next time it is called. When the function is called again, it resumes from\
    \ where it left off.\nTo use the generator, we create an instance of it with fib_generator\
    \ = fibonacci(). We then use a for loop to call the generator 10 times, printing\
    \ each Fibonacci number.\nNow launch the code in Listing 6.12 and you will see\
    \ the following output:\n\n0\n1\n1\n2\n3"
