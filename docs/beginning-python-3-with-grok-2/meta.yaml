    \ y.lower()):\n    print('x and y: case insensitive match')\nelse:\n    print('x\
    \ and y: different')\n```\n\n由于 `x` 包含混合大小写字母，而 `y` 包含小写字母，清单 1.2 产生以下输出：\n\n\
    ```\nx and y: different\n```\n\n## Python 中的字符串格式化\n\nPython 提供了 `string.lstring()`、`string.rstring()`\
    \ 和 `string.center()` 函数，用于将文本字符串分别定位为左对齐、右对齐或居中。正如你在前面一节中看到的，Python 还提供了 `format()`\
    \ 方法用于高级插值功能。\n\n现在在 Python 解释器中输入以下命令：\n\n```\nimport string\n\nstr1 = 'this\
    \ is a string'\nprint(string.ljust(str1, 10))\nprint(string.rjust(str1, 40))\n\
    print(string.center(str1,40))\n```\n\n输出如下所示：\n\n```\nthis is a string\n     \
    \                           this is a string\n                this is a string\n\
    ```\n\n本章的下一部分将向你展示如何使用内置的 Python 函数“切片和拼接”文本字符串。\n\n## 切片和拼接字符串\n\nPython 允许你使用数组表示法提取字符串的子字符串（称为“切片”）。切片表示法是\
    \ `start:stop:step`，其中 `start`、`stop` 和 `step` 值是整数，分别指定起始值、结束值和增量值。Python 切片的有趣之处在于，你可以使用值\
    \ -1，它从字符串的右侧而不是左侧开始操作。\n\n以下是一些字符串切片的示例：\n\n```\ntext1 = \"this is a string\"\
