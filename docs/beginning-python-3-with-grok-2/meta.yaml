    # LOCAL AND GLOBAL VARIABLES


    Python variables can be local or global. A Python variable is local to a function
    if the following are true:


    +   - It is a parameter of the function.

    - It appears in a statement in the function.

    - It is bound to a control structure (such as `for`, `with`, or `except`).


    A variable that is referenced in a function but is not local (according to the
    previous list) is a non-local variable. You can specify a variable as non-local
    with this snippet:


    ```

    nonlocal z

    ```


    A variable can be explicitly declared as global with this statement:


    ```

    global z

    ```


    The following code block illustrates the behavior of a global versus a local variable:


    ```

    global z

    z = 3

