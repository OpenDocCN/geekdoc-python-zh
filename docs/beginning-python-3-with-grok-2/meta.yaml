    `list2: ['A', 'LIST', 'OF', 'WORDS']`\n`list3: ['a', 'of']`\n`list4: ['words']`\n\
    \n## Lists and Arithmetic Operations\n\nThe minimum value of a list of numbers\
    \ is the first number in the sorted list of numbers. If you reverse the sorted\
    \ list, the first number is the maximum value. There are several ways of reversing\
    \ a list, starting with the technique shown in the following code:\n\n```python\n\
    x = [3,1,2,4]\nmaxList = x.sort()\nminList = x.sort(x.reverse())\n\nmin1 = min(x)\n\
