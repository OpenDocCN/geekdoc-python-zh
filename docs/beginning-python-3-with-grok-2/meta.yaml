  md: "# MUTABLE AND IMMUTABLE TYPES IN PYTHON\n\nPython represents its data as objects.\
    \ Some of these objects (such as lists and dictionaries) are mutable, which means\
    \ you can change their content without changing their identity. Others, such as\
    \ integers, floats, strings, and tuples, are objects that cannot be changed. The\
    \ key point to understand is the difference between changing the value versus\
    \ assigning a new value to an object; you cannot change a string but you can assign\
    \ it a different value. This detail can be verified by checking the `id` value\
    \ of an object, as shown in Listing 3.13.\n\n**Listing 3.13: mutability.py**\n\
    \n```\ns = \"abc\"\nprint('id #1:', id(s))\nprint('first char:', s[0])\n\ntry:\n\
    \    s[0] = \"o\"\nexcept:\n    print('Cannot perform reassignment')\n\ns = \"\
    xyz\"\nprint('id #2:',id(s))\ns += \"uvw\"\nprint('id #3:',id(s))\n```\n\nThe\
    \ output of Listing 3.13 is shown here:\n\n```\nid #1: 4297972672\nfirst char:\
    \ a\nCannot perform reassignment\nid #2: 4299809336\nid #3: 4299777872\n```\n\n\
    Thus, a Python type is immutable if its value cannot be changed (even though it's\
    \ possible to assign a new value to such a type); otherwise, a Python type is\
    \ mutable. Python immutable objects are of the type `bytes`, `complex`, `float`,\
    \ `int`, `str`, or `tuple`. On the other hand, dictionaries, lists, and sets are\
    \ mutable. The key in a hash table must be an immutable type."
