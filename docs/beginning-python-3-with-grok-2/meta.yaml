    # CHAPTER 1


    ## INTRODUCTION TO PYTHON


    This chapter contains an introduction to Python, with information about useful
    tools for installing Python modules, basic Python constructs, and how to work
    with some data types in Python.


    The first part of this chapter covers how to install Python, some Python environment
    variables, and how to use the Python interpreter. You will see Python code samples
    and also how to save Python code in text files that you can launch from the command
    line. The second part of this chapter shows you how to work with simple data types,
    such as numbers, fractions, and strings. The final part of this chapter discusses
    exceptions and how to use them in Python scripts.


    > NOTE The Python files in this book are for Python 3.x.


    ## TOOLS FOR PYTHON


    The Anaconda Python distribution is available for Windows, Linux, and Mac, and
    it''s downloadable here: http://continuum.io/downloads


    Anaconda is well suited for modules such as numpy and scipy, and if you are a
    Windows user, Anaconda appears to be a better alternative.


    ### easy_install and pip


    Both easy_install and pip are very easy to use when you need to install Python
    modules. Whenever you need to install a Python module (and there are many in this
    book), use either easy_install or pip with the following syntax:


    ```

    easy_install <module-name>

    pip install <module-name>

    ```


    NOTE Python-based modules are easier to install, whereas modules with code written
    in C are usually faster but more difficult in terms of installation.


    ### virtualenv


    The virtualenv tool enables you to create isolated Python environments, and its
    home page can be found here: http://www.virtualenv.org/en/latest/virtualenv.html


    virtualenv addresses the problem of preserving the correct dependencies and versions
    (and, indirectly, permissions) for different applications. If you are a Python
    novice, you might not need virtualenv right now but keep this tool in mind.


    ### IPython


    Another very good tool is IPython (which won a Jolt award), and its home page
    can be found here:


    http://ipython.org/install.html


    Two very nice features of IPython are tab expansion and ?, and an example of tab
    expansion is shown here:


    ```

    python

    Python 3.12.5 (v3.12.5:ff3bc82f7c9, Aug  7 2024, 05:32:06)

    [Clang 13.0.0 (clang-1300.0.29.30)] on darwin

    Type "help", "copyright", "credits" or "license" for more information.


    IPython 0.13.2 -- An enhanced Interactive Python.

    ?         -> Introduction and overview of IPython''s features.

    %quickref -> Quick reference.

    help      -> Python''s own help system.

    object?   -> Details about ''object'', use ''object??'' for extra details.


    In [1]: di

    %dirs    dict     dir      divmod

    ```


    In the preceding session, if you type the characters di, IPython responds with
    the following line, which contains all the functions that start with the letters
    di:


    ```

    %dirs    dict     dir      divmod

    ```


    If you enter a question mark (?), IPython provides textual assistance, the first
    part of which is shown here:


    ```

    IPython -- An enhanced Interactive Python

    =========================================


    IPython offers a combination of convenient shell features, special commands and
    a history mechanism for both input (command history) and output (results caching,
    similar to Mathematica). It is intended to be a fully compatible replacement for
    the standard Python interpreter, while offering vastly improved functionality
    and flexibility.

    ```


    The next section shows you how to check whether or not Python is installed on
    your machine, and also where you can download Python.


    ## PYTHON INSTALLATION


    Before you download anything, check whether you have Python already installed
    on your machine (which is likely if you have a MacBook or a Linux machine) by
    typing the following command in a command shell:


    ```

    python -V

    ```


    The output for the MacBook used in this book is shown here:


    ```

    Python 3.12.5

    ```


    > **NOTE** *Install Python 3.9 (or as close as possible to this version) on your
    machine so that you will have the same version of Python that was used to test
    the Python files in this book.*


    If you need to install Python on your machine, navigate to the Python home page
    and select the downloads link or navigate directly to this Web site:


    http://www.python.org/download/


    In addition, PythonWin is available for Windows, and its home page can be found
    here:


    http://www.cgl.ucsf.edu/Outreach/pc204/pythonwin.html


    Use any text editor that can create, edit, and save Python scripts and save them
    as plain text files (don''t use Microsoft Word).


    Once you have Python installed and configured on your machine, you are ready to
    work with the Python scripts in this book.


    ## SETTING THE PATH ENVIRONMENT VARIABLE (WINDOWS ONLY)


    The PATH environment variable specifies a list of directories that are searched
    whenever you specify an executable program from the command line. A very good
    guide to setting up your environment so that the Python executable is always available
    in every command shell can be found here:


    http://www.blog.pythonlibrary.org/2011/11/24/python-101-setting-up-python-on-windows/


    ## LAUNCHING PYTHON ON YOUR MACHINE


    There are three different ways to launch Python:


    - Use the Python interactive interpreter.

    - Launch Python scripts from the command line.

    - Use an IDE.


    The next section shows you how to launch the Python interpreter from the command
    line, and later in this chapter, you will learn how to launch Python scripts from
    the command line and also about Python IDEs.


    > NOTE: the emphasis in this book is on launching Python scripts from the command
    line or entering code in the Python interpreter.


    ### The Python Interactive Interpreter


    Launch the Python interactive interpreter from the command line by opening a command
    shell and typing the following command:


    ```

    python

    ```


    You will see the following prompt (or something similar):


    ```

    Python 3.12.5 (v3.12.5:ff3bc82f7c9, Aug 7 2024, 05:32:06)

    [Clang 13.0.0 (clang-1300.0.29.30)] on Darwin

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```'
