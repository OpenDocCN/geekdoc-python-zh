    ## **DEEPMIND**


    DeepMind 对人工智能做出了重大贡献，包括创建了各种AI系统。DeepMind 成立于 2010 年，并于 2014 年成为 Google 的子公司。其主页可在此处找到：https://deepmind.com/


    DeepMind 创建了 280 GB 的语言模型 Gopher，其性能显著优于竞争对手，包括 GPT-3、J1-Jumbo 和 MT-NLG。DeepMind
    还开发了 AlphaFold，它在 30 分钟内解决了一个蛋白质折叠任务；这项任务曾让研究人员困扰了 10 年。此外，DeepMind 于 2021 年 7
    月免费向所有人开放了 AlphaFold。DeepMind 在开发世界级AI游戏系统方面做出了重大贡献，其中一些将在下一节中讨论。


    ## **DeepMind 与游戏**


    DeepMind 是星际争霸和 AlphaGo 背后的AI系统，它们击败了围棋（比国际象棋难得多）领域最优秀的人类玩家。这些游戏提供“完全信息”，而具有“不完全信息”的游戏（如扑克）则对机器学习模型构成了挑战。


    AlphaGo Zero（AlphaGo 的后继者）通过自我对弈，在更短的时间内、使用更少的计算能力掌握了这款游戏。AlphaGo Zero 以 100 比
    0 击败了 AlphaGo，展现出非凡的性能。另一个强大的系统是 AlphaZero，它同样使用自我对弈技术学会了如何下围棋、国际象棋和将棋，并且也取得了最先进的性能结果。


    相比之下，使用树搜索的机器学习模型非常适合具有完全信息的游戏。相反，具有不完全信息的游戏（如扑克）涉及隐藏信息，这些信息可以被利用来制定反制策略以对抗对手的策略。特别是，AlphaStar
    能够与星际争霸 II 的顶尖玩家对战，并且也成为第一个在需要“在不完全信息世界中具备战略能力”的游戏中取得最先进成果的AI。


    ## **Player of Games (PoG)**


    Google 的 DeepMind 团队设计了通用的 PoG（Player of Games）算法，该算法基于以下技术：


    -   CFR（反事实遗憾最小化）

    -   CVPN（反事实价值与策略网络）

    -   GT-CFT（增长树反事实遗憾最小化）


    CVPN 是一个神经网络，用于计算游戏中每个状态信念的反事实值。这是在任何给定时间评估游戏不同变体的关键。


    GT-CFR 是 CFR 的一种变体，针对随时间增长的游戏树进行了优化。GT-CFR 基于两个基本阶段，此处有更详细的讨论：


    https://medium.com/syncedreview/deepminds-pog-excels-in-perfect-and-imperfect-information-games-advancing-research-on-general-9dbad5c04221


    ## **OPENAI**


    OpenAI 是一家AI研究公司，对人工智能做出了重大贡献，包括 DALL-E 和 ChatGPT。其主页可在此处找到：https://openai.com/api/


    OpenAI 由 Elon Musk 和 Sam Altman（以及其他人）在旧金山创立，其宣称的目标之一是开发造福人类的AI。鉴于微软对该组织的巨额投资和深度联盟，OpenAI
    可能被视为微软的一个分支。OpenAI 是 GPT-x 系列大型语言模型以及 ChatGPT 的创造者，后者于 2022 年 11 月 30 日发布。'
