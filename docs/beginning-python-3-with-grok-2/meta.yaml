    \n    Return a copy of the string S converted to lowercase.\n\n(END)\n```\n\n\
    Check the online documentation and also experiment with `help()` and `dir()` when\
    \ you need additional information about a particular function or module.\n\n#\
    \ COMPILE-TIME AND RUNTIME CODE CHECKING\n\nPython performs some compile-time\
    \ checking, but most checks (including type and name) are *deferred* until code\
    \ execution. Consequently, if your Python code references a user-defined function\
    \ that does not exist, the code will compile successfully. In fact, the code will\
    \ fail with an exception *only* when the code execution path references the non-existent\
    \ function.\n\nAs a simple example, consider the following Python function, `myFunc`,\
    \ which references a non-existent function called `DoesNotExist`:\n\n```\ndef\
    \ myFunc(x):\n    if x == 3:\n        print(DoesNotExist(x))\n    else:\n    \
    \    print('x: ', x)\n```\n\nThe preceding code will only fail when the `myFunc`\
    \ function is passed the value 3, after which Python raises an error."
