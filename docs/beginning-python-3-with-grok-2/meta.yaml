    \n# 第 2 章\n\n## 条件逻辑、循环和函数\n\n本章向你介绍了在 Python 中执行条件逻辑的各种方式，以及 Python 中的控制结构和用户定义函数。几乎每一个执行有用计算的\
    \ Python 程序都需要某种类型的条件逻辑或控制结构（或两者兼有）。尽管这些 Python 特性的语法与其他语言略有不同，但其功能对你来说将是熟悉的。\n\
    \n本章的第一部分包含代码示例，说明如何在 Python 中处理 `if-else` 条件逻辑以及 `if-elif-else` 语句。本章的第二部分讨论了\
