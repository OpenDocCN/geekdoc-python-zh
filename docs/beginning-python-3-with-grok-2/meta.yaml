    \n## Formatting Strings in Python\n\nPython provides the functions `string.lstring()`,\
    \ `string.rstring()`, and `string.center()` for positioning a text string so that\
    \ it is left-justified, right-justified, or centered, respectively. As you saw\
    \ in a previous section, Python also provides the `format()` method for advanced\
    \ interpolation features.\n\nNow enter the following commands in the Python interpreter:\n\
    \n```\nimport string\n\nstr1 = 'this is a string'\nprint(string.ljust(str1, 10))\n\
    print(string.rjust(str1, 40))\nprint(string.center(str1,40))\n```\n\nThe output\
    \ is shown here:\n\n```\nthis is a string\n                                this\
    \ is a string\n                this is a string\n```\n\nThe next portion of this\
    \ chapter shows you how to “slice and dice” text strings with built-in Python\
    \ functions.\n\n## SLICING AND SPLICING STRINGS\n\nPython enables you to extract\
    \ substrings of a string (called “slicing”) using array notation. Slice notation\
    \ is `start:stop:step`, where the `start`, `stop`, and `step` values are integers\
    \ that specify the start value, end value, and increment value. The interesting\
    \ part about slicing in Python is that you can use the value -1, which operates\
    \ from the right side instead of the left side of a string.\n\nSome examples of\
    \ slicing a string are shown here:\n\n```\ntext1 = \"this is a string\"\nprint('First\
    \ 7 characters:',text1[0:7])\nprint('Characters 2-4:',text1[2:4])\nprint('Right-most\
    \ character:',text1[-1])\nprint('Right-most 2 characters:',text1[-3:-1])\n```\n\
    \nThe output from the preceding code block is shown here:\n\n```\nFirst 7 characters:\
    \ this is\nCharacters 2-4: is\nRight-most character: g\nRight-most 2 characters:\
    \ in\n```\n\nLater in this chapter, you will see how to insert a string in the\
    \ middle of another string.\n\n## Testing for Digits and Alphabetic Characters\n\
    \nPython enables you to examine each character in a string and then test whether\
    \ that character is a bona fide digit or an alphabetic character. This section\
    \ provides a precursor to the topic of regular expressions, which is discussed\
    \ in Chapter 4.\n\nListing 1.3 displays the contents of `char_types.py`, which\
    \ illustrates how to determine whether a string contains digits or characters.\
    \ If you are unfamiliar with the conditional `if` statement in Listing 1.3, more\
    \ detailed information is available in Chapter 2.\n\n### Listing 1.3: char_types.py\n\
    \n```\nstr1 = \"4\"\nstr2 = \"4234\"\nstr3 = \"b\"\nstr4 = \"abc\"\nstr5 = \"\
    a1b2c3\"\n\nif(str1.isdigit()):\n    print(\"this is a digit:\",str1)\n\nif(str2.isdigit()):\n\
    \    print(\"this is a digit:\",str2)\n\nif(str3.isalpha()):\n    print(\"this\
    \ is alphabetic:\",str3)\n\nif(str4.isalpha()):\n    print(\"this is alphabetic:\"\
    ,str4)\n\nif(not str5.isalpha()):\n    print(\"this is not pure alphabetic:\"\
    ,str5)\n\nprint(\"capitalized first letter:\",str5.title())\n```\n\nListing 1.3\
    \ initializes some variables, followed by two conditional tests that check whether\
    \ or not `str1` and `str2` are digits using the `isdigit()` function. The next\
    \ portion of Listing 1.3 checks whether `str3`, `str4`, and `str5` are alphabetic\
    \ strings using the `isalpha()` function. The output of Listing 1.3 is shown here:\n\
    \n```\nthis is a digit: 4\nthis is a digit: 4234\nthis is alphabetic: b\nthis\
    \ is alphabetic: abc\nthis is not pure alphabetic: a1b2c3\ncapitalized first letter:\
    \ A1B2C3\n```\n\n## SEARCH AND REPLACE A STRING IN OTHER STRINGS\n\nPython provides\
    \ methods for searching and also for replacing a string in a second text string.\
    \ Listing 1.4 displays the contents of `find_pos1.py`, which shows you how to\
    \ use the `find()` function to search for the occurrence of one string in another\
    \ string.\n\n### Listing 1.4: find_pos1.py\n\n```\nitem1 = 'abc'\nitem2 = 'Abc'\n\
    text = 'This is a text string with abc'\n\npos1 = text.find(item1)\npos2 = text.find(item2)\n\
    \nprint('pos1=', pos1)\nprint('pos2=', pos2)\n```\n\nListing 1.4 initializes the\
    \ variables `item1`, `item2`, and `text`, and then searches for the index of the\
    \ contents of `item1` and `item2` in the string `text`. The Python `find()` function\
    \ returns the column number where the first successful match occurs; otherwise,\
    \ the `find()` function returns a -1 if a match is unsuccessful.\n\nThe output\
    \ from launching Listing 1.4 is shown here:\n\n```\npos1= 27\npos2= -1\n```\n\n\
    In addition to the `find()` method, you can use the `in` operator when you want\
    \ to test for the presence of an element, as shown here:\n\n```\n>>> lst = [1,2,3]\n\
    >>> 1 in lst\nTrue\n```\n\nListing 1.5 displays the contents of `replace1.py`,\
    \ which shows you how to replace one string with another string.\n\n### Listing\
    \ 1.5: replace1.py\n\n```\ntext = 'This is a text string with abc'\nprint('text:',text)\n\
    text = text.replace('is a', 'was a')\nprint('text:',text)\n```\n\nListing 1.5\
    \ starts by initializing the variable text and then printing its contents. The\
    \ next portion of Listing 1.5 replaces the occurrence of `is a` with `was a` in\
    \ the string text, and then prints the modified string. The output from launching\
    \ Listing 1.5 is shown here:\n\n```\ntext: This is a text string with abc\ntext:\
    \ This was a text string with abc\n```\n\n## REMOVE LEADING AND TRAILING CHARACTERS\n\
    \nPython provides the functions `strip()`, `lstrip()`, and `rstrip()` to remove\
    \ characters in a text string. Listing 1.6 displays the contents of `remove1.py`,\
    \ which shows you how to search for a string.\n\n### Listing 1.6: remove1.py\n\
    \n```\ntext = '   leading and trailing white space   '\nprint('text1:','x',text,'y')\n\
    \ntext = text.lstrip()\nprint('text2:','x',text,'y')\n\ntext = text.rstrip()\n\
    print('text3:','x',text,'y')\n```\n\nListing 1.6 starts by concatenating the letter\
    \ x and the contents of the variable text and then printing the result. The second\
    \ part of Listing 1.6 removes the leading white spaces in the string text and\
    \ then appends"
  mdcn: "## 处理字符串\n\n你可以使用 `+` 运算符连接两个字符串。以下示例先打印一个字符串，然后连接两个单字母字符串：\n\n```\n>>> 'abc'\n\
