    This concludes the portion of the chapter pertaining to `NumPy`. The second half
    of this chapter discusses some of the features of `pandas`.


    # WHAT IS PANDAS?


    `pandas` is a Python package that is compatible with other Python packages, such
    as `NumPy` and `Matplotlib`. Install `pandas` by opening a command shell and invoking
    this command for Python 3.x:


    ```

    pip3 install pandas

    ```


    In many ways, the `pandas` package has the semantics of a spreadsheet, and it
    also works with `.xsl`, `.xml`, `.html`, and `.csv` file types. `pandas` provides
    a data type called a `DataFrame` (similar to a Python dictionary) with extremely
    powerful functionality, which is discussed in the next section.


    `pandas` `DataFrames` support a variety of input types, such as `ndarray`, lists,
    and `dict`. `pandas` also provides another data type called `pandas Series` (not
    discussed in this chapter). This data structure provides another mechanism for
    managing data (search online for more details).


    # pandas DataFrames


    In simplified terms, a `pandas DataFrame` is a two-dimensional data structure,
    and it''s convenient to think of the data structure in terms of rows and columns.
    `DataFrames` can be labeled (rows as well as columns), and the columns can contain
    different data types.'
