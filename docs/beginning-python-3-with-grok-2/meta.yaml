    # KAPLAN AND UNDER-TRAINED MODELS


    Kaplan et al. provide (empirical) power laws regarding the performance of language
    models, which they assert depends on the following:


    +   - Model size

    - Dataset size

    - Amount of compute for training


    Kaplan et al. assert that changing the network width or depth has minimal effects.
    They also claim that the optimal training of very large models involves a relatively
    modest amount of data. The paper with the relevant details is accessible here:


    https://arxiv.org/abs/2001.08361


    Chinchilla, however, is a 70-billion-parameter LLM that was trained on a dataset
    that is much larger than the size that is recommended by Kaplan et al. In fact,
    Chinchilla achieved SOTA (state-of-the-art) status and has surpassed the performance
    of the following LLMs, all of which are between 2 and 7 times larger than Chinchilla:


    +   - Gopher (280B)

    - GPT-3 (175B)

    - J1-Jumbo (178B)

    - LaMDA (137B)

    - MT-NLG (530B)


    In addition, the creators of the Chinchilla LLM wrote a paper, “Scaling Laws for
    Neural Language Models,”¹ that includes the suggested number of tokens for various
    model sizes in order to be fully trained instead of under-trained (see table 3
    in the referenced paper). For example, the suggested training set sizes for models
    that have 175 billion, 520 billion, and 1 trillion parameters are 3.7 trillion
    tokens, 11.0 trillion tokens, and 21.2 trillion tokens, respectively. The largest
    entry in the same table is LMMs that have 10 trillion parameters, with a recommended
    training set size of 216.2 trillion parameters.


    Obviously, an LLM that exceeds 1 trillion parameters faces a significant challenge
    in order to create datasets of the recommended size, as described in the paper
    by the authors of Chinchilla. One interesting


    ¹ https://arxiv.org/abs/2001.08361'
