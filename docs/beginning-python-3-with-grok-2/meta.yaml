  md: 'By way of analogy, it might be useful to think of a `DataFrame` as the counterpart
    to a spreadsheet, which makes it a very useful data type in `pandas`-related Python
    scripts. The source of the dataset can be a data file, database table, Web service,
    and so forth. `pandas` DataFrame features include:


    +   - DataFrame methods

    - DataFrame statistics

    - Grouping, pivoting, and reshaping

    - Dealing with missing data

    - Joining DataFrames


    # DataFrames and Data-Cleaning Tasks


    The specific tasks that you need to perform depend on the structure and contents
    of a dataset. In general, you will perform a workflow with the following steps
    (not necessarily always in this order), all of which can be performed with a `pandas`
    DataFrame:


    +   - Read data into a DataFrame.

    - Display top of DataFrame.

    - Display column data types.

    - Display non-missing values.

    - Replace `NA` with a value.

    - Iterate through the columns.

    - View statistics for each column.

    - Find missing values.

    - Total missing values.

    - Find the percentage of missing values.

    - Sort table values.

    - Print summary information.

    - Identify columns with >50% of data missing.

    - Rename columns.'
