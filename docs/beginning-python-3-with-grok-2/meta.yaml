    +   - CTRL

    - GPT/GPT-2

    - Transformer-XL


    The preceding LLMs perform text *generation*, whereas encoder-only models perform
    next-word *prediction*. Finally, some of the well-known encoder/decoder-based
    LLMs include the following:


    +   - BART

    - mBART

    - MarianMT

    - T5


    The preceding LLMs perform summarization, translation, and question-answering.


    A recent trend has been the use of fine-tuning, zero-/one-/few-shot training,
    and prompt-based learning with respect to LLMs. Fine-tuning is typically accompanied
    by a so-called “curated” dataset, and if the latter is not available (or infeasible),
    few-shot training might be an acceptable alternative.


    One observation from training the `Jurassic-1` LLM is that wider and shallower
    is better than narrower and deeper with respect to performance because a wider
    context allows for more calculations to be performed in parallel.


    Another result, from `Chinchilla` (discussed earlier), is that smaller models
    that are trained on a corpus with a very large number of tokens can be more performant
    than larger models that are trained on a more modest number of tokens.


    The success of the `GLaM` and `Switch` LLMs (both from Google) suggests that sparse
    transformers, in conjunction with `MoE`, also present an interesting direction,
    potentially leading to even better results in the future.


    In addition, there is the possibility of “over-curation” of data, which is to
    say that performing *very* detailed data curation to remove spurious-looking tokens
    does not guarantee that models will produce better results on those curated datasets.'
  - '[PAGE 238]


    The use of prompts has revealed an interesting detail: the results of similar
    yet different prompts can lead to substantively different responses. Thus, the
    goal is to create well-crafted prompts, which are inexpensive and yet can be a
    somewhat elusive task.


    Another area of development pertains to the continued need for benchmarks that
    leverage better and more complex datasets, especially when LLMs exceed human performance.
    Specifically, a benchmark becomes out-dated when all modern LLMs can pass the
    suite of tests in that benchmark. Two such benchmarks are `XNLI` and `Big-bench`
    (Beyond the Imitation Game Benchmark).


