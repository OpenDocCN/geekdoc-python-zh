    ## 生成式AI有何不同？


    - 创造与分类：虽然大多数传统AI模型旨在将输入数据分类到预定义的类别中，但生成模型旨在创造新数据。

    - 无监督学习：许多生成模型，特别是GANs和VAEs，以无监督方式运行，这意味着它们不需要带标签的数据进行训练。

    - 多样化输出：生成模型可以根据学习到的分布产生各种各样的输出，使其成为艺术生成和风格迁移等任务的理想选择。

    - 挑战：生成式AI带来了独特的挑战，例如GANs中的模式坍塌或确保生成内容的连贯性。


