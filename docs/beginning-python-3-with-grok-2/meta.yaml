  md: '# Python for Loops


    Python supports the `for` loop, whose syntax is slightly different from other
    languages (such as JavaScript and Java). The following code block shows you how
    to use a `for` loop in Python in order to iterate through the elements in a list:


    ```

    >>> x = [''a'', ''b'', ''c'']

    >>> for w in x:

    ...     print(w)

    ...

    a

    b

    c

    ```


    The preceding code snippet prints three letters on three separate lines. You can
    force the output to be displayed on the same line (which will “wrap” if you specify
    a large enough number of characters) by appending including `(,end='' '')` in
    the `print` statement, as shown here:


    ```

    >>> x = [''a'', ''b'', ''c'']

    >>> for w in x:

    ...     print(w, end='' '')

    ...

    a b c

    ```


    You can use this type of code when you want to display the contents of a text
    file on a single line instead of multiple lines.


    Python also provides the built-in `reversed()` function, which reverses the direction
    of the loop, as shown here:


    ```

    >>> a = [1, 2, 3, 4, 5]

    >>> for x in reversed(a):

    ...     print(x)

    5

    4

    3

    2

    1

    ```


    Note that reversed iteration only works if the size of the current object can
    be determined or if the object implements a `__reversed__()` special method.'
