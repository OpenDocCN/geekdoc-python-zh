    ```\n\nThe output of Listing 2.9 is shown here:\n\n```\nfirst loop\n1\n\nsecond\
    \ loop\n1\n3\n\nthird loop\n1\n2\n3\n```\n\n## COMPARISON AND BOOLEAN OPERATORS\n\
    \nPython supports a variety of Boolean operators, such as `in`, `not in`, `is`,\
    \ `is not`, `and`, `or`, and `not`. The next several sections discuss these operators\
    \ and provide some examples of how to use them.\n\n### The in/not in/is/is not\
    \ Comparison Operators\n\nThe `in` and `not in` operators are used with sequences\
    \ to check whether a value occurs or does not occur in a sequence. The operators\
    \ `is` and `is not` determine whether or not two objects are the same object,\
    \ which only matters for mutable objects such as lists. All comparison operators\
    \ have the same priority, which is lower than that of all numerical operators.\
    \ Comparisons can also be chained. For example, `a < b == c` tests whether `a`\
    \ is less than `b` and `b` equals `c`.\n\n### The and, or, and not Boolean Operators\n\
    \nThe Boolean operators `and`, `or`, and `not` have lower priority than comparison\
    \ operators. The Boolean `and` and `or` are binary operators, whereas the Boolean\
    \ `not` operator is a unary operator. Here are some examples:\n\n- `A and B` can\
    \ only be true if both `A` and `B` are true.\n- `A or B` is true if either `A`\
