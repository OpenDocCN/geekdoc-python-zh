- md: "## USING A LIST AS A STACK AND A QUEUE\n\nA stack is a LIFO data structure\
    \ with `push()` and `pop()` functions for adding and removing elements, respectively.\
    \ The most recently added element in a stack is in the top position and therefore\
    \ the first element that can be removed from the stack.\n\nThe following code\
    \ blocks illustrate how to create a stack and also remove and append items from\
    \ a stack in Python. Create a Python list (which we'll use as a stack):\n\n```\n\
    >>> s = [1,2,3,4]\n```\n\nAppend 5 to the stack:\n\n```\n>>> s.append(5)\n>>>\
    \ s\n[1, 2, 3, 4, 5]\n```\n\nRemove the last element from the stack:\n\n```\n\
    >>> s.pop()\n5\n>>> s\n[1, 2, 3, 4]\n```\n\nA queue is a FIFO data structure with\
    \ `insert()` and `pop()` functions for inserting and removing elements, respectively.\
    \ The most recently added element in a queue is in the top position and therefore\
    \ the last element that can be removed from the queue.\n\nThe following code blocks\
    \ illustrate how to create a queue and also insert and append items to a queue\
    \ in Python.\n\nCreate a Python list (which we'll use as a queue):\n\n```\n>>>\
    \ q = [1,2,3,4]\n```\n\nInsert 5 at the beginning of the queue:\n\n```\n>>> q.insert(0,5)\n\
    >>> q\n[5, 1, 2, 3, 4]\n```\n\nRemove the last element from the queue:\n\n```\n\
    >>> q.pop(0)\n1\n>>> q\n[5, 2, 3, 4]\n```\n\nThe preceding code uses `q.insert(0,\
    \ 5)` to insert at the beginning and `q.pop()` to remove from the end. Keep in\
    \ mind, however, that the `insert()` operation is slow in Python; insert at 0\
    \ requires copying all the elements in the underlying array down one space. Therefore,\
    \ use `collections.deque` with `coll.appendleft()` and `coll.pop()`, where `coll`\
    \ is an instance of the `Collection` class.\n\nThe next section shows you how\
    \ to use tuples in Python.\n\n## TUPLES (IMMUTABLE LISTS)\n\nPython supports a\
    \ data type called a *tuple* that consists of comma-separated values without brackets\
    \ (square brackets are used for lists, round brackets for arrays, and curly braces\
    \ for dictionaries). Various examples of Python tuples can be found here:\n\n\
    https://docs.python.org/3.6/tutorial/datastructures.html#tuples-and-sequences\n\
    \nThe following code block illustrates how to create a tuple and create new tuples\
    \ from an existing type in Python.\n\nDefine a Python tuple, `t`, as follows:\n\
    \n```\n>>> t = 1,'a', 2,'hello',3\n>>> t\n(1, 'a', 2, 'hello', 3)\n```\n\nDisplay\
    \ the first element of `t`:\n\n```\n>>> t[0]\n1\n```\n\nCreate a tuple, `v`, containing\
    \ 10, 11, and `t`:\n\n```\n>>> v = 10,11,t\n>>> v\n(10, 11, (1, 'a', 2, 'hello',\
    \ 3))\n```\n\nTry modifying an element of `t` (which is immutable):\n\n```\n>>>\
    \ t[0] = 1000\nTraceback (most recent call last):\n  File \"<stdin>\", line 1,\
    \ in <module>\nTypeError: 'tuple' object does not support item assignment\n```\n\
    \nPython \"deduplication\" is useful because you can remove duplicates from a\
    \ set and obtain a list, as shown here:\n\n```\n>>> lst = list(set(lst))\n```\n\
    \n> NOTE The `in` operator used on a list to search is $O(n)$, whereas the `in`\
    \ operator on a set is $O(1)$.\n\nThe next section discusses Python sets.\n\n\
    ## WORKING WITH SETS\n\nA Python set is an unordered collection that does not\
    \ contain duplicate elements. Use curly braces or the `set()` function to create\
    \ sets. Set objects support set-theoretic operations, such as union, intersection,\
    \ and difference.\n\n> NOTE `set()` is required in order to create an empty set\
    \ because `{}` creates an empty dictionary.\n\nThe following code blocks illustrate\
    \ how to work with a Python set.\n\nCreate a list of elements:\n\n```\n>>> l =\
    \ ['a', 'b', 'a', 'c']\n```\n\nCreate a set from the preceding list:\n\n```\n\
    >>> s = set(l)\n>>> s\nset(['a', 'c', 'b'])\n```\n\nTest whether an element is\
    \ in the set:\n\n```\n>>> 'a' in s\nTrue\n>>> 'd' in s\nFalse\n>>>\n```\n\nCreate\
    \ a set from a string:\n\n```\n>>> n = set('abacad')\n>>> n\nset(['a', 'c', 'b',\
    \ 'd'])\n>>>\n```\n\nSubtract n from s:\n\n```\n>>> s - n\nset([])\n```\n\nSubtract\
    \ s from n:\n\n```\n>>> n - s\nset(['d'])\n>>>\n```\n\nThe union of s and n:\n\
    \n```\n>>> s | n\nset(['a', 'c', 'b', 'd'])\n```\n\nThe intersection of s and\
    \ n:\n\n```\n>>> s & n\nset(['a', 'c', 'b'])\n```\n\nThe exclusive-or of s and\
    \ n:\n\n```\n>>> s ^ n\nset(['d'])\n```\n\nThe next section shows you how to work\
    \ with Python dictionaries.\n\n## DICTIONARIES\n\nPython has a key/value structure\
    \ called a `dict`, which is a hash table. A Python dictionary (and hash tables\
    \ in general) can retrieve the value of a key in constant time, regardless of\
    \ the number of entries in the dictionary (and the same is true for sets). You\
    \ can think of a set as essentially just the keys (not the values) of a `dict`\
    \ implementation.\n\nThe contents of a `dict` can be written as a series of *key:value*\
    \ pairs, as shown here:\n`dict1 = {key1:value1, key2:value2, ... }`\n\nAn \"empty\
    \ `dict`\" is just an empty pair of curly braces, {}.\n\n### Creating a Dictionary\n\
    \nA Python dictionary (or hash table) contains colon-separated key/value bindings\
    \ inside a pair of curly braces, as shown here:\n`dict1 = {}`\n`dict1 = {'x' :\
    \ 1, 'y' : 2}`\n\nThe preceding code snippet defines `dict1` as an empty dictionary,\
    \ and then adds two key/value bindings.\n\n### Displaying the Contents of a Dictionary\n\
    \nYou can display the contents of `dict1` with the following code:\n\n```\n>>>\
    \ dict1 = {'x':1,'y':2}\n>>> dict1\n{'y': 2, 'x': 1}\n>>> dict1['x']\n1\n>>> dict1['y']\n\
    2\n>>> dict1['z']\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nKeyError: 'z'\n```\n\n> **NOTE** *Key/value bindings for a `dict`\
    \ and a set are not necessarily stored in the same order that you defined them.*\n\
    \nPython dictionaries also provide the `get` method in order to retrieve key values:\n\
    \n```\n>>> dict1.get('x')\n1\n>>> dict1.get('y')\n2\n>>> dict1.get('z')\n```\n\
    \nAs you can see, the Python `get()` method returns `None` (which is displayed\
    \ as an empty string) instead of an error when referencing a key that is not defined\
    \ in a dictionary. You can also use `dict` comprehensions to create dictionaries\
    \ from expressions, as shown here:\n\n```\n>>> {x: x**3 for x in (1, 2, 3)}\n\
    {1: 1, 2: 8, 3: 37}\n```\n\n### Checking for Keys in a Dictionary\n\nYou can easily\
    \ check for the presence of a key in a Python dictionary, as follows:\n\n```\n\
    >>> 'x' in dict1\nTrue\n>>> 'z' in dict1\nFalse\n```\n\nUse square brackets for\
    \ finding or setting a value in a dictionary. For example, `dict['abc']` finds\
    \ the value associated with the key 'abc'. You can use strings, numbers, and tuples\
    \ as key values, and you can use any type as the value.\n\nIf you access a value\
    \ that is not in the `dict`, Python throws a `KeyError`. Consequently, use the\
    \ `in` operator to check whether the key is in the `dict`. Alternatively, use\
    \ `dict.get(key)`, which returns the value or `None` if the key is not present.\
    \ You can even use the expression `get(key, not-found-string)` to specify the\
    \ value to return if a key is not found.\n\n### Deleting Keys from a Dictionary\n\
    \nLaunch the Python interpreter and enter the following commands:\n\n```\n>>>\
    \ MyDict = {'x' : 5, 'y' : 7}\n>>> MyDict['z'] = 13\n>>> MyDict\n{'y': 7, 'x':\
    \ 5, 'z': 13}\n>>> del MyDict['x']\n>>> MyDict\n{'y': 7, 'z': 13}\n>>> MyDict.keys()\n\
    ['y', 'z']\n>>> MyDict.values()\n[13, 7]\n>>> 'z' in MyDict\nTrue\n```\n\n###\
    \ Iterating Through a Dictionary\n\nThe following code snippet shows you how to\
    \ iterate through a dictionary:\n\n```\nMyDict = {'x' : 5, 'y' : 7, 'z' : 13}\n\
    \nfor key, value in MyDict.iteritems():\n    print key, value\n```\n\nThe output\
    \ from the preceding code block is shown here:\ny 7\nx 5\nz 13\n\n### Interpolating\
    \ Data from a Dictionary\n\nThe % operator substitutes values from a Python dictionary\
    \ into a string by name. Listing 3.11 contains an example of doing so.\n\n```\n\
    Listing 3.11: interpolate_dict1.py\nhash = {}\nhash['beverage'] = 'coffee'\nhash['count']\
    \ = 3\n\n# %d for int, %s for string\ns = 'Today I drank %(count)d cups of %(beverage)s'\
    \ % hash\nprint('s:', s)\n```\n\nThe output from the preceding code block is shown\
    \ here:\nToday I drank 3 cups of coffee\n\n### Dictionary Functions and Methods\n\
    \nPython provides various functions and methods for a Python dictionary, such\
    \ as `cmp()`, `len()`, and `str()`, which compare two dictionaries, return the\
    \ length of a dictionary, and display a string representation of a dictionary,\
    \ respectively.\n\nYou can also manipulate the contents of a Python dictionary\
    \ using the functions `clear()` to remove all elements, `copy()` to return a shallow\
    \ copy, `get()` to retrieve the value of a key, `items()` to display the key/value\
    \ pairs of a dictionary, `keys()` to display the keys of a dictionary, and `values()`\
    \ to return the list of values of a dictionary.\n\n### Dictionary Formatting\n\
    \nThe % operator works conveniently to substitute values from a `dict` into a\
    \ string by name:\n\n```\n#create a dictionary\n>>> h = {}\n```"
  mdcn: "## 将列表用作栈和队列\n\n栈是一种后进先出（LIFO）的数据结构，具有 `push()` 和 `pop()` 函数，分别用于添加和移除元素。栈中最近添加的元素位于顶部，因此是第一个可以从栈中移除的元素。\n\
    \n以下代码块展示了如何在 Python 中创建一个栈，以及如何从栈中移除和追加项目。创建一个 Python 列表（我们将用作栈）：\n\n```\n>>>\
    \ s = [1,2,3,4]\n```\n\n向栈中追加 5：\n\n```\n>>> s.append(5)\n>>> s\n[1, 2, 3, 4,\
    \ 5]\n```\n\n从栈中移除最后一个元素：\n\n```\n>>> s.pop()\n5\n>>> s\n[1, 2, 3, 4]\n```\n\n\
    队列是一种先进先出（FIFO）的数据结构，具有 `insert()` 和 `pop()` 函数，分别用于插入和移除元素。队列中最近添加的元素位于顶部，因此是最后一个可以从队列中移除的元素。\n\
    \n以下代码块展示了如何在 Python 中创建一个队列，以及如何向队列中插入和追加项目。\n\n创建一个 Python 列表（我们将用作队列）：\n\n\
    ```\n>>> q = [1,2,3,4]\n```\n\n在队列开头插入 5：\n\n```\n>>> q.insert(0,5)\n>>> q\n[5,\
    \ 1, 2, 3, 4]\n```\n\n从队列中移除最后一个元素：\n\n```\n>>> q.pop(0)\n1\n>>> q\n[5, 2, 3,\
    \ 4]\n```\n\n前面的代码使用 `q.insert(0, 5)` 在开头插入，使用 `q.pop()` 从末尾移除。但请记住，在 Python 中\
    \ `insert()` 操作速度较慢；在索引 0 处插入需要将底层数组中的所有元素向下复制一个位置。因此，请使用 `collections.deque`\
    \ 配合 `coll.appendleft()` 和 `coll.pop()`，其中 `coll` 是 `Collection` 类的一个实例。\n\n下一节将向你展示如何在\
    \ Python 中使用元组。\n\n## 元组（不可变列表）\n\nPython 支持一种称为 *元组* 的数据类型，它由逗号分隔的值组成，没有括号（方括号用于列表，圆括号用于数组，花括号用于字典）。可以在以下位置找到各种\
    \ Python 元组的示例：\n\nhttps://docs.python.org/3.6/tutorial/datastructures.html#tuples-and-sequences\n\
    \n以下代码块展示了如何在 Python 中创建一个元组，以及如何从现有类型创建新的元组。\n\n定义一个 Python 元组 `t`，如下所示：\n\n\
    ```\n>>> t = 1,'a', 2,'hello',3\n>>> t\n(1, 'a', 2, 'hello', 3)\n```\n\n显示 `t`\
    \ 的第一个元素：\n\n```\n>>> t[0]\n1\n```\n\n创建一个包含 10、11 和 `t` 的元组 `v`：\n\n```\n>>>\
    \ v = 10,11,t\n>>> v\n(10, 11, (1, 'a', 2, 'hello', 3))\n```\n\n尝试修改 `t` 的一个元素（它是不可变的）：\n\
    \n```\n>>> t[0] = 1000\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nTypeError: 'tuple' object does not support item assignment\n\
    ```\n\nPython 的“去重”功能很有用，因为你可以从集合中移除重复项并获得一个列表，如下所示：\n\n```\n>>> lst = list(set(lst))\n\
    ```\n\n> 注意 在列表上使用 `in` 运算符进行搜索的时间复杂度是 $O(n)$，而在集合上使用 `in` 运算符的时间复杂度是 $O(1)$。\n\
    \n下一节将讨论 Python 集合。\n\n## 使用集合\n\nPython 集合是一个不包含重复元素的无序集合。使用花括号或 `set()` 函数来创建集合。集合对象支持集合论运算，如并集、交集和差集。\n\
    \n> 注意 需要使用 `set()` 来创建一个空集合，因为 `{}` 会创建一个空字典。\n\n以下代码块展示了如何使用 Python 集合。\n\n\
    创建一个元素列表：\n\n```\n>>> l = ['a', 'b', 'a', 'c']\n```\n\n从前面的列表创建一个集合：\n\n```\n\
    >>> s = set(l)\n>>> s\nset(['a', 'c', 'b'])\n```\n\n测试一个元素是否在集合中：\n\n```\n>>>\
    \ 'a' in s\nTrue\n>>> 'd' in s\nFalse\n>>>\n```\n\n从一个字符串创建一个集合：\n\n```\n>>> n\
    \ = set('abacad')\n>>> n\nset(['a', 'c', 'b', 'd'])\n>>>\n```\n\n从 s 中减去 n：\n\n\
    ```\n>>> s - n\nset([])\n```\n\n从 n 中减去 s：\n\n```\n>>> n - s\nset(['d'])\n>>>\n\
    ```\n\ns 和 n 的并集：\n\n```\n>>> s | n\nset(['a', 'c', 'b', 'd'])\n```\n\ns 和 n 的交集：\n\
    \n```\n>>> s & n\nset(['a', 'c', 'b'])\n```\n\ns 和 n 的对称差集：\n\n```\n>>> s ^ n\n\
    set(['d'])\n```\n\n下一节将向你展示如何使用 Python 字典。\n\n## 字典\n\nPython 有一种称为 `dict` 的键/值结构，它是一个哈希表。Python\
    \ 字典（以及通常的哈希表）可以在常数时间内检索键的值，无论字典中有多少条目（集合也是如此）。你可以将集合本质上看作只是 `dict` 实现的键（而不是值）。\n\
    \n`dict` 的内容可以写成一系列 *键:值* 对，如下所示：\n`dict1 = {key1:value1, key2:value2, ... }`\n\
    \n“空 `dict`”只是一对空的花括号，{}。\n\n### 创建字典\n\nPython 字典（或哈希表）包含在花括号内的冒号分隔的键/值绑定，如下所示：\n\
    `dict1 = {}`\n`dict1 = {'x' : 1, 'y' : 2}`\n\n前面的代码片段将 `dict1` 定义为空字典，然后添加了两个键/值绑定。\n\
    \n### 显示字典的内容\n\n你可以使用以下代码显示 `dict1` 的内容：\n\n```\n>>> dict1 = {'x':1,'y':2}\n\
    >>> dict1\n{'y': 2, 'x': 1}\n>>> dict1['x']\n1\n>>> dict1['y']\n2\n>>> dict1['z']\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    KeyError: 'z'\n```\n\n> **注意** *`dict` 和集合的键/值绑定不一定按照你定义它们的顺序存储。*\n\nPython 字典还提供了\
    \ `get` 方法来检索键值：\n\n```\n>>> dict1.get('x')\n1\n>>> dict1.get('y')\n2\n>>> dict1.get('z')\n\
    ```\n\n如你所见，当引用字典中未定义的键时，Python 的 `get()` 方法返回 `None`（显示为空字符串）而不是错误。你也可以使用字典推导式从表达式创建字典，如下所示：\n\
    \n```\n>>> {x: x**3 for x in (1, 2, 3)}\n{1: 1, 2: 8, 3: 37}\n```\n\n### 检查字典中的键\n\
    \n你可以轻松检查 Python 字典中是否存在某个键，如下所示：\n\n```\n>>> 'x' in dict1\nTrue\n>>> 'z' in dict1\n\
    False\n```\n\n使用方括号来查找或设置字典中的值。例如，`dict['abc']` 查找与键 'abc' 关联的值。你可以使用字符串、数字和元组作为键值，并且可以使用任何类型作为值。\n\
    \n如果你访问 `dict` 中不存在的值，Python 会抛出 `KeyError`。因此，请使用 `in` 运算符检查键是否在 `dict` 中。或者，使用\
    \ `dict.get(key)`，它返回值，如果键不存在则返回 `None`。你甚至可以使用表达式 `get(key, not-found-string)`\
    \ 来指定如果找不到键时要返回的值。\n\n### 从字典中删除键\n\n启动 Python 解释器并输入以下命令：\n\n```\n>>> MyDict\
    \ = {'x' : 5, 'y' : 7}\n>>> MyDict['z'] = 13\n>>> MyDict\n{'y': 7, 'x': 5, 'z':\
    \ 13}\n>>> del MyDict['x']\n>>> MyDict\n{'y': 7, 'z': 13}\n>>> MyDict.keys()\n\
    ['y', 'z']\n>>> MyDict.values()\n[13, 7]\n>>> 'z' in MyDict\nTrue\n```\n\n###\
    \ 遍历字典\n\n以下代码片段向你展示如何遍历字典：\n\n```\nMyDict = {'x' : 5, 'y' : 7, 'z' : 13}\n\n\
    for key, value in MyDict.iteritems():\n    print key, value\n```\n\n前面代码块的输出如下：\n\
    y 7\nx 5\nz 13\n\n### 从字典中插值数据\n\n% 运算符通过名称将 Python 字典中的值替换到字符串中。清单 3.11 包含一个这样的示例。\n\
    \n```\n清单 3.11: interpolate_dict1.py\nhash = {}\nhash['beverage'] = 'coffee'\n\
    hash['count'] = 3\n\n# %d 用于整数，%s 用于字符串\ns = 'Today I drank %(count)d cups of\
    \ %(beverage)s' % hash\nprint('s:', s)\n```\n\n前面代码块的输出如下：\nToday I drank 3 cups\
    \ of coffee\n\n### 字典函数和方法\n\nPython 为 Python 字典提供了各种函数和方法，例如 `cmp()`、`len()`\
    \ 和 `str()`，它们分别用于比较两个字典、返回字典的长度以及显示字典的字符串表示。\n\n你还可以使用函数 `clear()` 来移除所有元素，`copy()`\
    \ 来返回浅拷贝，`get()` 来检索键的值，`items()` 来显示字典的键/值对，`keys()` 来显示字典的键，以及 `values()` 来返回字典的值列表，从而操作\
    \ Python 字典的内容。\n\n### 字典格式化\n\n% 运算符可以方便地通过名称将 `dict` 中的值替换到字符串中：\n\n```\n#创建一个字典\n\
    >>> h = {}\n```"
