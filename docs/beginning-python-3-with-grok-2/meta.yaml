- md: 'Keep in mind that there are various types of LLMs, including text-to-text,
    text-to-image, text-to-audio, and text-to-video. This book focuses on text-to-text
    LLMs, and you can perform an Internet search to find information about other types
    of LLMs. In addition, there is a non-stop race (perhaps better described as a
    marathon) among several of the top AI companies to create LLMs that are faster,
    cheaper, and more accurate than their predecessors.


    LLMs are known for their size, which is typically at least 10 billion parameters
    (`BERT` has “only” 1.5 billion parameters). Moreover, they involve very large
    datasets for the training step, which can require weeks of training time at a
    cost of millions of dollars. Unfortunately, there is an associated environmental
    cost. According to the following article, the carbon footprint of training GPT-3
    is comparable to a car round-trip to the moon:


    https://www.theregister.com/2020/11/04/gpt3_carbon_footprint_estimate/


    Outside of `BERT` and the `BERT` family, one well-known LLM that has generated
    tremendous interest is GPT-3, which consists of 175 billion parameters, which
    is almost 12 times larger than `BERT`. There are, however, models that are much
    larger: 540 billion parameters as well as more than 1.2 trillion parameters (such
    as `Switch` and Wu Dao). The next LLM that created tremendous excitement was ChatGPT,
    which was followed by GPT-4, and soon will be succeeded by GPT-5.


    ## What Is the Purpose of LLMs?


    The following prompt was given to ChatGPT to explain the purpose of LLMs.


    ```

    What is the purpose of LLMs, and which LLMs do you recommend?

    ```


    ChatGPT:


    Large Language Models (LLMs) serve several purposes in the field of artificial
