- md: "Note that while `dir()` does not list the names of built-in functions and variables,\
    \ you can obtain this information from the standard module `__builtin__`, which\
    \ is automatically imported under the name `__builtins__`:\n\n```\n>>> dir(__builtins__)\n\
    ```\n\nThe following command shows you how to get more information about a function:\n\
    \n```\nhelp(str.lower)\n```\n\nThe output from the preceding command is shown\
    \ here:\n\n```\nHelp on method_descriptor:\n\nlower(...)\n    S.lower() -> string\n\
    \n    Return a copy of the string S converted to lowercase.\n\n(END)\n```\n\n\
    Check the online documentation and also experiment with `help()` and `dir()` when\
    \ you need additional information about a particular function or module.\n\n##\
    \ COMPILE-TIME AND RUNTIME CODE CHECKING\n\nPython performs some compile-time\
    \ checking, but most checks (including type and name) are *deferred* until code\
    \ execution. Consequently, if your Python code references a user-defined function\
    \ that does not exist, the code will compile successfully. In fact, the code will\
    \ fail with an exception *only* when the code execution path references the non-existent\
    \ function.\n\nAs a simple example, consider the following Python function, `myFunc`,\
    \ which references a non-existent function called `DoesNotExist`:\n\n```\ndef\
    \ myFunc(x):\n    if x == 3:\n        print(DoesNotExist(x))\n    else:\n    \
    \    print('x: ', x)\n```\n\nThe preceding code will only fail when the `myFunc`\
    \ function is passed the value 3, after which Python raises an error.\n\nIn Chapter\
    \ 2, you will learn how to define and invoke user-defined functions. You will\
    \ also see an explanation of the difference between local versus global variables\
    \ in Python.\n\nNow that you understand some basic concepts (such as how to use\
    \ the Python interpreter) and how to launch your custom Python modules, the next\
    \ section discusses primitive data types in Python.\n\n## SIMPLE DATA TYPES IN\
    \ PYTHON\n\nPython supports primitive data types, such as numbers (integers, floating-point\
    \ numbers, and exponential numbers), strings, and dates. Python also supports\
    \ more complex data types, such as lists (or arrays), tuples, and dictionaries,\
    \ all of which are discussed in Chapter 3. The next several sections discuss some\
    \ of the Python primitive data types, along with code snippets that show you how\
    \ to perform various operations on those data types.\n\n## WORKING WITH NUMBERS\n\
    \nPython provides arithmetic operations for manipulating numbers in a straightforward\
    \ manner that is similar to other programming languages. The following examples\
    \ involve arithmetic operations on integers:\n\n```\n>>> 2+2\n4\n\n>>> 4/3\n1\n\
    \n>>> 3*8\n24\n```\n\nThe following example assigns numbers to two variables and\
    \ computes their product:\n\n```\n>>> x = 4\n>>> y = 7\n>>> x * y\n28\n```\n\n\
    The following examples demonstrate arithmetic operations involving integers:\n\
    \n```\n>>> 2+2\n4\n>>> 4/3\n1\n>>> 3*8\n24\n```\n\nNotice that the division (/)\
    \ of two integers is truncated so that only the integer result is retained. The\
    \ following example converts a floating-point number into exponential form:\n\n\
    ```\n>>> fnum = 0.0001234568900007\n>>> \"%.14e\"%fnum\n'1.23456890000070e-04'\n\
    ```\n\nYou can use the `int()` function and the `float()` function to convert\
    \ strings into numbers:\n\n```\nword1 = \"123\"\nword2 = \"456.78\"\nvar1 = int(word1)\n\
    var2 = float(word2)\nprint(\"var1: \",var1,\" var2: \",var2)\n```\n\nThe output\
    \ from the preceding code block is shown here:\n\n```\nvar1:  123  var2:  456.78\n\
    ```\n\nAlternatively, you can use the `eval()` function:\n\n```\nword1 = \"123\"\
    \nword2 = \"456.78\"\nvar1 = eval(word1)\nvar2 = eval(word2)\nprint(\"var1: \"\
    ,var1,\" var2: \",var2)\n```\n\nIf you attempt to convert a string that is not\
    \ a valid integer or a floating-point number, Python raises an exception, so it's\
    \ advisable to place your code in a `try/except` block (discussed later in this\
    \ chapter).\n\n### Working with Other Bases\n\nNumbers in Python are in base 10\
    \ (the default), but you can easily convert numbers to other bases. For example,\
    \ the following code block initializes the variable x with the value 1234, and\
    \ then displays that number in base 2, 8, and 16, respectively:\n\n```\n>>> x\
    \ = 1234\n>>> bin(x) '0b10011010010'\n>>> oct(x) '0o2322'\n>>> hex(x) '0x4d2'\
    \ >>>\n```\n\nUse the `format()` function if you want to suppress the `0b`, `0o`,\
    \ or `0x` prefix, as shown here:\n\n```\n>>> format(x, 'b') '10011010010'\n>>>\
    \ format(x, 'o') '2322'\n>>> format(x, 'x') '4d2'\n```\n\nNegative integers are\
    \ displayed with a negative sign:\n\n```\n>>> x = -1234\n>>> format(x, 'b') '-10011010010'\n\
    >>> format(x, 'x') '-4d2'\n```\n\n### The chr() Function\n\nThe Python `chr()`\
    \ function takes a positive integer as a parameter and converts it into its corresponding\
    \ alphabetic value (if one exists). The uppercase letters A through Z have a decimal\
    \ representation of 65 through 91 (which corresponds to hexadecimal 41 through\
    \ 5b), and the lowercase letters a through z have a decimal representation of\
    \ 97 through 122 (hexadecimal 61 through 7b).\n\nHere is an example of using the\
    \ `chr()` function to print uppercase A:\n\n```\n>>> x=chr(65)\n>>> x\n'A'\n```\n\
    \nThe following code block prints the ASCII values for a range of integers:\n\n\
    ```\nresult = \"\"\nfor x in range(65,91):\n    print(x, chr(x))\n    result =\
    \ result+chr(x)+' '\nprint(\"result: \",result)\n```\n\n> NOTE Python 2 uses ASCII\
    \ strings whereas Python 3 uses Unicode.\n\nYou can represent a range of characters\
    \ with the following line:\n\n```\nfor x in range(65,91):\n```\n\nNote, however,\
    \ that the following equivalent code snippet is more intuitive:\n\n```\nfor x\
    \ in range(ord('A'), ord('Z')):\n```\n\nIf you want to display the result for\
    \ lowercase letters, change the preceding range from (65,91) to either of the\
    \ following statements:\n\n```\nfor x in range(65,91):\nfor x in range(ord('a'),\
    \ ord('z')):\n```\n\n### The round() Function in Python\n\nThe Python round()\
    \ function enables you to round decimal values to the nearest precision:\n\n```\n\
    >>> round(1.23, 1)\n1.2\n>>> round(-3.42,1)\n-3.4\n```\n\n### Formatting Numbers\
    \ in Python\n\nPython allows you to specify the number of decimal places of precision\
    \ to use when printing decimal numbers, as shown here:\n\n```\n>>> x = 1.23456\n\
    >>> format(x, '0.2f')\n'1.23'\n>>> format(x, '0.3f')\n'1.235'\n>>> 'value is {:0.3f}'.format(x)\
    \ 'value is 1.235'\n>>> from decimal import Decimal\n>>> a = Decimal('4.2')\n\
    >>> b = Decimal('2.1')\n>>> a + b\nDecimal('6.3')\n>>> print(a + b)\n6.3\n>>>\
    \ (a + b) == Decimal('6.3')\nTrue\n>>> x = 1234.56789\n>>> # Two decimal places\
    \ of accuracy\n>>> format(x, '0.2f')\n'1234.57'\n>>> # Right justified in 10 chars,\
    \ one-digit accuracy\n>>> format(x, '>10.1f')\n' 1234.6'\n>>> # Left justified\n\
    >>> format(x, '<10.1f') '1234.6 '\n>>> # Centered\n>>> format(x, '^10.1f') ' 1234.6\
    \ '\n>>> # Inclusion of thousands separator\n>>> format(x, ',')\n'1,234.56789'\n\
    >>> format(x, '0,.1f')\n'1,234.6'\n```\n\n## WORKING WITH FRACTIONS\n\nPython\
    \ supports the Fraction() function (which is defined in the fractions module),\
    \ which accepts two integers that represent the numerator and the denominator\
    \ (which must be non-zero) of a fraction. Several examples of defining and manipulating\
    \ fractions in Python are shown here:\n\n```\n>>> from fractions import Fraction\n\
    >>> a = Fraction(5, 4)\n>>> b = Fraction(7, 16)\n>>> print(a + b)\n27/16\n>>>\
    \ print(a * b) 35/64\n>>> # Getting numerator/denominator\n>>> c = a * b\n>>>\
    \ c.numerator\n35\n>>> c.denominator 64\n>>> # Converting to a float >>> float(c)\n\
    0.546875\n>>> # Limiting the denominator of a value\n>>> print(c.limit_denominator(8))\n\
    4\n>>> # Converting a float to a fraction >>> x = 3.75\n>>> y = Fraction(*x.as_integer_ratio())\n\
    >>> y\nFraction(15, 4)\n```\n\nBefore delving into Python code samples that work\
    \ with strings, the next section briefly discusses Unicode and UTF-8, both of\
    \ which are character encodings.\n\n## UNICODE AND UTF-8\n\nA Unicode string consists\
    \ of a sequence of numbers that are between 0 and 0x10ffff, where each number\
    \ represents a group of bytes. An encoding is the manner in which a Unicode string\
    \ is translated into a sequence of bytes. Among the various encodings, UTF-8 (UTF\
    \ stands for Unicode Transformation Format) is perhaps the most common, and it's\
    \ also the default encoding for many systems. The digit 8 in UTF-8 indicates that\
    \ the encoding uses 8-bit numbers, whereas UTF-16 uses 16-bit numbers (but this\
    \ encoding is less common).\n\nThe ASCII character set is a subset of UTF-8, so\
    \ a valid ASCII string can be read as a UTF-8 string without any re-encoding required.\
    \ In addition, a Unicode string can be converted into a UTF-8 string.\n\n## WORKING\
    \ WITH UNICODE\n\nPython supports Unicode, which means that you can render characters\
    \ in different languages. Unicode data can be stored and manipulated in the same\
    \ way as strings. Create a Unicode string by prepending the letter u, as shown\
    \ here:\n\n```\n>>> u'Hello from Python!'\nu'Hello from Python!'\n```\n\nSpecial\
    \ characters can be included in a string by specifying their Unicode value. For\
    \ example, the following Unicode string embeds a space (which has the Unicode\
