    Now that you understand some basic concepts (such as how to use the Python interpreter)
    and how to launch your custom Python modules, the next section discusses primitive
    data types in Python.


    # SIMPLE DATA TYPES IN PYTHON


    Python supports primitive data types, such as numbers (integers, floating-point
    numbers, and exponential numbers), strings, and dates. Python also supports more
    complex data types, such as lists (or arrays), tuples, and dictionaries, all of
    which are discussed in Chapter 3. The next several sections discuss some of the
    Python primitive data types, along with code snippets that show you how to perform
    various operations on those data types.


    # WORKING WITH NUMBERS


    Python provides arithmetic operations for manipulating numbers in a straightforward
    manner that is similar to other programming languages. The following examples
    involve arithmetic operations on integers:


    ```

    >>> 2+2

    4


    >>> 4/3

    1


    >>> 3*8

    24

    ```


    The following example assigns numbers to two variables and computes their product:


    ```

    >>> x = 4

    >>> y = 7

    >>> x * y

    28

    ```


    The following examples demonstrate arithmetic operations involving integers:


    ```

    >>> 2+2

    4

    ```'
