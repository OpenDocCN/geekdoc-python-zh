    \n代码清单 1.14 的最后部分使用条件逻辑来确定是否执行 `main()` 函数。\n\n## 总结\n\n本章向你展示了如何处理数字并对数字执行算术运算，然后你学习了如何处理字符串和使用字符串操作。你还学习了如何使用\
