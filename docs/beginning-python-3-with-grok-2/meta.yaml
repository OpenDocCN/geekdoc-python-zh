    \ Python 解释器执行上述代码的结果相同。\n\n当 Python 模块直接运行时，特殊变量 `__name__` 被设置为 `__main__`。你经常会看到\
    \ Python 模块中出现以下类型的代码：\n\n```\nif __name__ == '__main__':\n    # do something\
    \ here\n    print('Running directly')\n```\n\n上述代码片段使 Python 能够确定 Python 模块是从命令行启动的还是导入到另一个\
    \ Python 模块中的。\n\n## PYTHON 中的一些标准模块\n\nPython 标准库提供了许多可以简化你的 Python 脚本的模块。标准库模块列表可在此处找到：\n\
