  md: '# CALCULATING THE MEAN AND STANDARD DEVIATION (1)


    If you need to review these concepts from statistics (and perhaps also the mean,
    median, and mode as well), please read the appropriate online tutorials.


    NumPy provides various built-in functions that perform statistical calculations,
    such as the following list of methods:


    +   - np.linspace() <= useful for regression tasks

    - np.mean()

    - np.std()


    The np.linspace() method generates a set of equally spaced numbers between a lower
    bound and an upper bound. The np.mean() and np.std() methods calculate the mean
    and standard deviation, respectively, of a set of numbers. Listing 4.18 displays
    the contents of sample_mean_std.py, which illustrates how to calculate statistical
    values from a NumPy array.


    **Listing 4.18: sample_mean_std.py**


    ```

    import numpy as np


    x2 = np.arange(8)

    print(''mean = '', x2.mean())

    print(''std = '', x2.std())


    x3 = (x2 - x2.mean()) / x2.std()

    print(''x3 mean = '', x3.mean())

    print(''x3 std = '', x3.std())

    ```


    Listing 4.18 contains a NumPy array, x2, that consists of the first eight integers.
    Next, the mean() and std() that are “associated” with x2 are invoked in order
    to calculate the mean and standard deviation, respectively, of the elements of
    x2. The output from launching Listing 4.18 is shown here:


    ```

    (''a:            '', array([1, 2]))

    (''b:            '', array([3, 4]))

    ```'
