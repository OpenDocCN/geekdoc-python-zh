    You can use the `int()` function and the `float()` function to convert strings
    into numbers:


    ```

    word1 = "123"

    word2 = "456.78"

    var1 = int(word1)

    var2 = float(word2)

    print("var1: ",var1," var2: ",var2)

    ```


    The output from the preceding code block is shown here:


    ```

    var1:  123  var2:  456.78

    ```


    Alternatively, you can use the `eval()` function:


    ```

    word1 = "123"

    word2 = "456.78"

    var1 = eval(word1)

    var2 = eval(word2)

    print("var1: ",var1," var2: ",var2)

    ```


    If you attempt to convert a string that is not a valid integer or a floating-point
    number, Python raises an exception, so it''s advisable to place your code in a
    `try/except` block (discussed later in this chapter).


