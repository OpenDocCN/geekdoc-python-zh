    \ accordingly.\n\nThe `join()` function does the opposite of `split()`; it \"\
    joins\" two or more words into a single line. You can easily remove extra spaces\
    \ in a sentence by using the `split()` function and then invoking the `join()`\
    \ function, thereby creating a line of text with one white space between any two\
    \ words.\n\n# USING THE SPLIT() FUNCTION TO COMPARE WORDS\n\nListing 2.4 displays\
    \ the contents of `compare2.py`, which illustrates how to use the `split()` function\
