    One detail to keep in mind is that the term “prompt” in this chapter refers to
    any text-based string that you provide to an LLM, and the response from the LLM
    is a text-based string that is called a “completion.”


    # WHAT IS GENERATIVE AI?


    Generative AI refers to a subset of AI models and techniques that are designed
    to generate new data samples that are similar in nature to a given set of input
    data. The goal is to produce content or data that wasn’t part of the original
    training set but is coherent, contextually relevant, and in the same style or
    structure.


    Generative AI stands apart in its ability to create and innovate, as opposed to
    merely analyzing or classifying. The advancements in this field have led to breakthroughs
    in creative domains and practical applications, making it a cutting-edge area
    of AI research and development.


    # Key Features of Generative AI


    The following bullet list contains key features of Generative AI, followed by
    a brief description for each bullet item:


    +   - Data generation

    - Synthesis

    - Learning distributions


    *Data generation* refers to the ability to create new data points that are not
    part of the training data but resemble it. This can include text, images, music,
    videos, or any other form of data.


    *Synthesis* means that generative models can blend various inputs to generate
    outputs that incorporate features from each input, such as merging the styles
    of two images.


    *Learning distributions* means that Generative AI models aim to learn the probability
    distribution of the training data so they can produce new samples from that distribution.


    # Popular Techniques in Generative AI


    +   - Generative adversarial networks (GANs): GANs consist of two networks, a
    generator and a discriminator, that are trained simultaneously. The generator
    tries to produce fake data, while the'
- md: 'discriminator tries to distinguish between real data and fake data. Over time,
    the generator gets better at producing realistic data.


    - Variational autoencoders (VAEs): VAEs are probabilistic models that learn to
    encode and decode data in a way that the encoded representations can be used to
    generate new data samples.

    - Recurrent neural networks (RNNs): RNNs are used primarily for sequence generation,
    such as text or music.


    ## What Makes Generative AI Different?


    - Creation versus classification: While most traditional AI models aim to classify
    input data into predefined categories, generative models aim to create new data.

    - Unsupervised learning: Many generative models, especially GANs and VAEs, operate
    in an unsupervised manner, meaning they don''t require labeled data for training.

    - Diverse outputs: Generative models can produce a wide variety of outputs based
    on learned distributions, making them ideal for tasks such as art generation and
    style transfer.

    - Challenges: Generative AI poses unique challenges, such as mode collapse in
    GANs or ensuring the coherence of generated content.


    Furthermore, there are numerous areas that involve Generative AI applications,
    some of which are listed in the following bullet list:


    - Art and music creation

    - Data augmentation

    - Style transfer

    - Text generation

    - Image synthesis

    - Drug discovery


    *Art and music creation* includes generating paintings, music, or other forms
    of art.


    *Data augmentation* involves creating additional data for training models, especially
    when the original dataset is limited.


    *Style transfer* refers to applying the style of one image to the content of another.


    *Text generation* is a very popular application of Generative AI, which involves
    creating coherent and contextually relevant text.


    *Image synthesis* is another popular area of Generative AI, which involves generating
    realistic images or faces, or even creating scenes for video games.


    *Drug discovery* is a very important facet of Generative AI that pertains to generating
    molecular structures for new potential drugs.


    ## CONVERSATIONAL AI VERSUS GENERATIVE AI


    Both conversational AI and Generative AI are prominent subfields within the broader
    domain of AI. These subfields, however, have a different focus regarding their
    primary objective, the technologies that they use, and their applications.


    The primary differences between the two subfields are listed in the following
    bullet points:


    - Primary objective

    - Applications

    - Technologies used

    - Training and interaction

    - Evaluation

    - Data requirements


    ## Primary Objective


    The main goal of conversational AI is to facilitate human-like interactions between
    machines and humans. This includes chatbots, virtual assistants, and other systems
    that engage in dialogue with users.


    The primary objective of Generative AI is to create new content or data that wasn''t
    in the training set but is similar in structure and style. This can range from
    generating images, music, and text to more complex tasks such as video synthesis.


    ## Applications


    Common applications for conversational AI include customer support chatbots, voice-operated
    virtual assistants (such as Siri or Alexa), and interactive voice response (IVR)
    systems.


    Generative AI has a broad spectrum of applications, such as creating art or music,
    generating realistic video game environments, synthesizing voices, and producing
    realistic images or even deepfakes.


    ## Technologies Used


    Conversational AI often relies on NLP techniques to understand and generate human
    language. This includes intent recognition, entity extraction, and dialogue management.


    Generative AI commonly utilizes GANs, VAEs, and other generative models to produce
    new content.


    ## Training and Interaction


    While training can be supervised, semi-supervised, or unsupervised, the primary
    interaction mode for conversational AI is through back-and-forth dialogue or conversation.


    The training process for Generative AI, especially with models such as GANs, involves
    iterative processes where the model learns to generate data by trying to fool
    a discriminator into believing the generated data is real.


    ## Evaluation


    Conversational AI evaluation metrics often revolve around understanding and response
    accuracy, user satisfaction, and the fluency of generated responses.


    Generative AI evaluation metrics for models such as GANs can be challenging and
    might involve using a combination of quantitative metrics and human judgment to
    assess the quality of generated content.


    ## Data Requirements


    Data requirements for conversational AI typically involve dialogue data, with
    conversations between humans or between humans and bots.


    Data requirements for Generative AI involve large datasets of the kind of content
    it is supposed to generate, be it images, text, music, etc.


    Although both conversational AI and Generative AI deal with generating outputs,
    their primary objectives, applications, and methodologies can differ significantly.
    Conversational AI is geared toward interactive communication with users, while
    Generative AI focuses on producing new, original content.


    ## WHAT ARE GENERATIVE AI MODELS?


    The following prompt was given to GPT-4o.


    ```

    Please describe the types of Generative AI models.

    ```


    ChatGPT:


    Generative AI models are designed to generate new data that mimics the patterns
    and characteristics of a given dataset. They can be used for a variety of tasks
    such as image generation, text generation, music composition, and more. Here''s
    a detailed description of different types of Generative AI models:


    1. Generative Adversarial Networks (GANs)

    Description: GANs consist of two neural networks, a generator and a discriminator,
    that are trained simultaneously. The generator creates fake data, and the discriminator
    tries to distinguish between real and fake data. The generator aims to produce
    data that is indistinguishable from real data.


    Key Components:

    Generator: Produces new data instances.

    Discriminator: Evaluates the authenticity of the data produced by the generator.

    Applications: Image generation, video generation, data augmentation, super-resolution.


    Example: Generating realistic human faces.


    2. Variational Autoencoders (VAEs)

    Description: VAEs are a type of autoencoder that learns to encode input data into
    a latent space and then decode it back to the original data. They incorporate
    probabilistic elements by assuming a distribution over the latent space.


    Key Components:

    Encoder: Compresses the input data into a latent space representation.

    Decoder: Reconstructs the data from the latent space representation.

    Applications: Image generation, anomaly detection, data compression.

    Example: Generating new samples of handwritten digits similar to those in the
    MNIST dataset.


    3. Autoregressive Models

    Description: Autoregressive models generate each data point as a function of the
    previous data points. They model the conditional distribution of each data point
    given the previous ones.


    Key Components:

    Sequence Modeling: Generates each token or data point based on the previous sequence.

    Applications: Text generation, time series forecasting, audio synthesis.

    Example: Language models like GPT (Generative Pre-trained Transformer) generate
    text one word at a time.


    4. Normalizing Flows

    Description: Normalizing flows transform a simple distribution (e.g., a Gaussian)
    into a more complex distribution using a series of invertible and differentiable
    mappings.


    Key Components:

    Invertible Transformations: Series of transformations that map simple distributions
    to complex distributions.

    Applications: Density estimation, image generation.

    Example: Using normalizing flows to generate realistic images from noise.


    5. Energy-Based Models (EBMs)

    Description: EBMs define a probability distribution over data by associating each
    data point with an energy score. The model is trained to assign low energy to
    real data and high energy to fake data.


    Key Components:

    Energy Function: Assigns a score to each data point.

    Applications: Image generation, outlier detection.

    Example: Training an energy-based model to generate realistic images by minimizing
    the energy assigned to real images.


    6. Diffusion Models

    Description: Diffusion models learn to reverse a diffusion process, where data
    is gradually corrupted by noise, to generate new samples. These models are trained
    to denoise data step-by-step.'
