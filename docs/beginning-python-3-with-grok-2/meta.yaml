  md: '# THE help() AND dir() FUNCTIONS


    An Internet search for Python-related topics usually returns a number of links
    with useful information. Alternatively, you can check the official Python documentation
    site: docs.python.org


    In addition, Python provides the help() and dir() functions, which are accessible
    from the Python interpreter. The help() function displays documentation strings,
    whereas the dir() function displays defined symbols.


    For example, if you type help(sys), you will see documentation for the sys module,
    whereas dir(sys) displays a list of the defined symbols.


    Type the following command in the Python interpreter to display the string-related
    methods in Python:


    ```

    >>> dir(str)

    ```


    The preceding command generates the following output:


    ```

    [''__add__'', ''__class__'', ''__contains__'', ''__delattr__'',

    ''__doc__'', ''__eq__'', ''__format__'', ''__ge__'',

    ''__getattribute__'', ''__getitem__'', ''__getnewargs__'',

    ''__getslice__'', ''__gt__'', ''__hash__'', ''__init__'',

    ''__le__'', ''__len__'', ''__lt__'', ''__mod__'', ''__mul__'',

    ''__ne__'', ''__new__'', ''__reduce__'', ''__reduce_ex__'',

    ''__repr__'', ''__rmod__'', ''__rmul__'', ''__setattr__'',

    ''__sizeof__'', ''__str__'', ''__subclasshook__'',

    ''_formatter_field_name_split'', ''_formatter_parser'',

    ''capitalize'', ''center'', ''count'', ''decode'', ''encode'',

    ''endswith'', ''expandtabs'', ''find'', ''format'', ''index'',

    ''isalnum'', ''isalpha'', ''isdigit'', ''islower'', ''isspace'',

    ''istitle'', ''isupper'', ''join'', ''ljust'', ''lower'',

    ''lstrip'', ''partition'', ''replace'', ''rfind'', ''rindex'',

    ''rjust'', ''rpartition'', ''rsplit'', ''rstrip'', ''split'',

    ''splitlines'', ''startswith'', ''strip'', ''swapcase'',

    ''title'', ''translate'', ''upper'', ''zfill'']

    ```


    The preceding list gives you a consolidated “dump” of built-in functions (including
    some that are discussed later in this chapter). Although the max() function obviously
    returns the maximum value of its arguments, the purpose of other functions, such
    as filter() and map(), is not immediately apparent (unless you have used them
    in other programming languages). In any case, the preceding list provides a starting
    point for finding out more about various Python built-in functions that are not
    discussed in this chapter.'
