    # Intrinsic Versus Extrinsic Hallucinations


    The following prompt was given to Llama 3.


    ```

    Please compare in-context hallucinations with extrinsic hallucinations.

    ```


    Llama 3:


    In-context hallucinations occur when a language model generates text that is not
    based on any actual information or evidence, but rather is a product of its own
    internal workings and biases. This type of hallucination'
  - '[PAGE 253]


    happens within the context of the conversation or text generation, and the model
    may not even realize it''s generating fictional information.


    Examples of in-context hallucinations:


    +   - A language model generates a fictional event or detail that is not supported
    by any evidence or facts.

    - A model creates a character or entity that does not exist in reality.

    - A model provides a false or misleading explanation for a phenomenon or concept.


    In-context hallucinations can be problematic because they can:


    +   - Spread misinformation or disinformation

    - Erode trust in language models and AI systems

    - Lead to confusion or misinterpretation of information


    # Extrinsic Hallucinations


    Extrinsic hallucinations, on the other hand, occur when a language model generates
    text based on external information or stimuli that are not actually present in
    the input or context. This type of hallucination is often triggered by external
    factors, such as:


    +   - Biases or assumptions in the training data

    - Overfitting or memorization of specific patterns or examples

    - Adversarial attacks or manipulation of the input


    Examples of extrinsic hallucinations:


    +   - A language model generates text that is influenced by biases in the training
    data, such as stereotypes or discriminatory language.

    - A model generates text that is overly reliant on memorized patterns or examples,
    rather than generating novel responses.

    - A model is manipulated by an adversary to generate specific types of text or
    responses.


    Extrinsic hallucinations can be problematic because they can:


    +   - Perpetuate biases and stereotypes

    - Compromise the integrity and reliability of language models'
  - '[PAGE 254]


    Enable malicious actors to manipulate the output of language models


    # Key differences


    The key differences between in-context and extrinsic hallucinations are:


    +   - Source: In-context hallucinations arise from the model''s internal workings,
    while extrinsic hallucinations are triggered by external factors.

    - Nature: In-context hallucinations are often fictional or made-up information,
    while extrinsic hallucinations are influenced by external biases, patterns, or
    manipulation.

    - Impact: Both types of hallucinations can be problematic, but extrinsic hallucinations
    can have more severe consequences, such as perpetuating biases or enabling malicious
    actors.


    By understanding the differences between in-context and extrinsic hallucinations,
    we can better address the challenges and limitations of language models and work
    towards developing more accurate, reliable, and trustworthy AI systems.


