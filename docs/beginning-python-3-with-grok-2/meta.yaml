    performance results.


    By way of comparison, ML models that use tree search are well suited for games
    with perfect information. By contrast, games with imperfect information (such
    as poker) involve hidden information that can be leveraged to devise counter strategies
    to counteract the strategies of opponents. In particular, AlphaStar is capable
    of playing against the best players of StarCraft II, and also became the first
    AI to achieve SOTA results in a game that requires “strategic capability in an
    imperfect information world.”


    # Player of Games (PoG)


    The DeepMind team at Google devised the general-purpose PoG (Player of Games)
    algorithm, which is based on the following techniques:


    +   - CFR (counterfactual regret minimization)

    - CVPN (counterfactual value-and-policy network)

    - GT-CFT (growing tree counterfactual regret minimization)


    CVPN is a neural network that calculates the counterfactuals for each state belief
    in the game. This is key to evaluating the different variants of the game at any
    given time.


    GT-CFR is a variation of CFR that is optimized for game trees that grow over time.
    GT-CFR is based on two fundamental phases, which are discussed in more detail
    here:


    https://medium.com/syncedreview/deepminds-pog-excels-in-perfect-and-imperfect-information-games-advancing-research-on-general-9dbad5c04221


