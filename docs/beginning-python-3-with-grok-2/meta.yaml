    ## RECURSION\n\nRecursion is a powerful technique that can provide an elegant\
    \ solution to various problems. The following subsections contain examples of\
    \ using recursion to calculate some well-known numbers.\n\n### Calculating Factorial\
    \ Values\n\nThe factorial value of a positive integer n is the product of all\
    \ the integers between 1 and n. The symbol for factorial is the exclamation point\
    \ (!) and some sample factorial values are shown here:\n\n```\n1! = 1\n2! = 2\n\
    3! = 6\n4! = 24\n5! = 120\n```\n\nThe formula for the factorial value of a number\
    \ is succinctly defined as follows:\n\n```\nFactorial(n) = n*Factorial(n-1) for\
    \ n > 1 and\nFactorial(0) = 1 and Factorial(1) = 1\n```\n\nListing 2.17 displays\
    \ the contents of `factorial.py`, which illustrates how to use recursion in order\
    \ to calculate the factorial value of a positive integer.\n\n**Listing 2.17: factorial.py**\n\
    \n```python\ndef factorial(num):\n    if (num > 1):\n        return num * factorial(num-1)\n\
    \    else:\n        return 1\n\nresult = factorial(5)\nprint('The factorial of\
    \ 5 =', result)\n```\n\nListing 2.17 contains the function `factorial`, which\
    \ implements the recursive definition of the factorial value of a number. The\
    \ output from Listing 2.17 is shown here:\n\n```\nThe factorial of 5 = 120\n```\n\
    \nIn addition to a recursive solution, there is also an iterative solution for\
    \ calculating the factorial value of a number. In fact, Listing 2.18 displays\
    \ the contents of `factorial2.py`, which illustrates how to use the `range()`\
    \ function in order to calculate the factorial value of a positive integer.\n\n\
    **Listing 2.18: factorial2.py**\n\n```python\ndef factorial2(num):\n    prod =\
    \ 1\n    for x in range(1, num+1):\n        prod = prod * x\n    return prod\n\
    \nresult = factorial2(5)\nprint('The factorial of 5 =', result)\n```\n\nListing\
    \ 2.18 defines the function `factorial2()` with a parameter `num`, followed by\
    \ the variable `prod`, which has an initial value of 1. The next part of `factorial2()`\
    \ is a `for` loop whose loop variable `x` ranges between 1 and `num+1`, and each\
    \ iteration through that loop multiples the value of `prod` with the value of\
    \ `x`, thereby computing the factorial value of `num`. The output from Listing\
    \ 2.18 is shown here:\n\n```\nThe factorial of 5 = 120\n```\n\n### Calculating\
    \ Fibonacci Numbers\n\nThe set of Fibonacci numbers represents some interesting\
    \ patterns (such as the pattern of a sunflower) in nature, and its recursive definition\
    \ is shown here:\n\n```\nFib(0) = 0\nFib(1) = 1\nFib(n) = Fib(n-1) + Fib(n-2)\
    \ for n >= 2\n```\n\nListing 2.19 displays the contents of `fib.py`, which illustrates\
    \ how to calculate Fibonacci numbers.\n\n**Listing 2.19: fib.py**\n\n```python\n\
    def fib(num):\n    if (num == 0):\n        return 0\n    elif (num == 1):\n  \
    \      return 1\n    else:\n        return fib(num-1) + fib(num-2)\n\nresult =\
    \ fib(10)\nprint('Fibonacci value of 10 =', result)\n```\n\nListing 2.19 defines\
    \ the `fib()` function with the parameter `num`. If `num` equals 0 or 1, then\
    \ `fib()` returns `num`; otherwise, `fib()` returns the result of adding `fib(num-1)`\
    \ and `fib(num-2)`. The output from Listing 2.19 is shown here:\n\n```\nFibonacci\
    \ value of 10 = 55\n```\n\n### Calculating the GCD of Two Numbers\n\nThe GCD (greatest\
    \ common divisor) of two positive integers is the largest integer that divides\
    \ both integers with a remainder of 0. Some values are shown here:\n\n```\ngcd(6,2)\
    \ = 2\ngcd(10,4) = 2\ngcd(24,16) = 8\n```\n\nListing 2.20 uses recursion and Euclid's\
    \ algorithm in order to find the GCD of two positive integers.\n\n**Listing 2.20:\
    \ gcd.py**\n\n```python\ndef gcd(num1, num2):\n    if (num1 % num2 == 0):\n  \
    \      return num2\n    elif (num1 < num2):\n        print(\"switching \", num1,\
    \ \" and \", num2)\n        return gcd(num2, num1)\n    else:\n        print(\"\
    reducing\", num1, \" and \", num2)\n        return gcd(num1-num2, num2)\n\nresult\
    \ = gcd(24, 10)\nprint(\"GCD of\", 24, \"and\", 10, \"=\", result)\n```\n\nListing\
    \ 2.20 defines the function gcd() with the parameters num1 and num2. If num1 is\
    \ divisible by num2, the function returns num2. If num1 is less than num2, then\
    \ gcd() is invoked by switching the order of num1 and num2. In all other cases,\
    \ gcd() returns the result of computing gcd() with the values num1-num2 and num2.\
    \ The output from Listing 2.20 is shown here:\n\n```\nreducing 24  and  10\nreducing\
    \ 14  and  10\nswitching  4  and  10\nreducing 10  and  4\nreducing 6  and  4\n\
    switching  2  and  4\nGCD of 24 and 10 = 2\n```\n\n### Calculating the LCM of\
    \ Two Numbers\n\nThe LCM (lowest common multiple) of two positive integers is\
    \ the smallest integer that is a multiple of those two integers. Some values are\
    \ shown here:\n\n```\nlcm(6,2)    = 2\nlcm(10,4)   = 20\nlcm(24,16)  = 48\n```\n\
    \nIn general, if x and y are two positive integers, you can calculate their LCM\
    \ as follows:\n\n```\nlcm(x,y) = x*y/gcd(x,y)\n```"
