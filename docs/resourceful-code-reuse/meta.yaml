- md: "The mechanism of transferring compiled units into memory and replacing or augmenting\
    \ other units was implemented as early as 1966 in the OS/360 Linkage Editor (we’d\
    \ call it a linker today). From the time of OS/360 until well into the 1990s,\
    \ this mechanism was called *overlaying*, and the transferred units were called\
    \ overlays and stored in OVL files. The last system that seriously relied on overlays\
    \ probably was AutoDesk’s AutoCAD until after Release 14 in 1997. With the massive\
    \ introduction of virtual memory (which is beyond this book’s scope), overlaying\
    \ rapidly fell out of favor and survived mostly in the form of dynamic loading.\n\
    \nOnly shared (dynamically linked) libraries can be overlayed. Let’s have a look\
    \ at how loading and unloading code dynamically works in C and Python. In both\
    \ cases, let’s assume that the dynamic library `libmyjson.so` has been created\
    \ (as explained in [Building Your Own Dynamic Libraries](Building Your Own Dynamic\
    \ Libraries)) and is referred to by the complete path to the library file or exists\
    \ somewhere along the `LD_LIBRARY_PATH` (defined [here](here)).\n\n## Dynamic\
    \ Loading with dlopen (the C Way)\n\nThe dynamic loading mechanism in C is implemented\
    \ in the library `libdl` through the functions `void *dlopen(const char *filename,\
    \ int flags)` for loading, `int dlclose(void *handle)` for unloading, and some\
    \ other functions. The library is a tribute to the almost extinct SunOS operating\
    \ system. To use dynamic loading with a C program, you must include the header\
    \ file `dlfcn.h` and link the library `libdl.so`, as shown in the next two listings.\
    \ Don’t forget: you can only unload what you’ve previously loaded.\n\n```c\n//\
    \ dlopen-test.c\n#include <stdio.h>\n#include <stdlib.h> // For EXIT_SUCCESS or\
    \ EXIT_FAILURE\n#include <dlfcn.h> // for the dl* functions\n#include \"json.h\"\
    \n\nint main() {\n    // Open the handle\n    void *json_lib = dlopen(\"./libmyjson.so\"\
    , RTLD_LAZY);\n    if (!json_lib) {\n        fprintf(stderr, \"%s\\n\", dlerror());\
    \ // perror() does not work!\n        return EXIT_FAILURE;\n    }\n\n    // Find\
    \ a symbol\n    dlerror();\n    void *json_reader = dlsym(json_lib, \"read_json\"\
    );\n    char *possible_error = dlerror();\n\n    if (possible_error) {\n     \
    \   fprintf(stderr, \"%s\\n\", possible_error);\n        return EXIT_FAILURE;\n\
    \    }\n\n    // Call the function\n    typedef JSON_Object* (*Reader_Func)(char\
    \ *);\n    JSON_Object *retval = ((Reader_Func)json_reader)(\"somefile.json\"\
    );\n    puts((char *)retval);\n\n    // Close the handle\n    if(dlclose(json_lib))\n\
    \        fprintf(stderr, \"%s, but who cares?\\n\", dlerror());\n\n    return\
    \ EXIT_SUCCESS;\n}\n```\n\n```makefile\n# Makefile\ndlopen-test: dlopen-test.c\n\
    \t$(CC) dlopen-test.c -o dlopen-test -ldl\n```\n\nWorking with a dynamically loaded\
    \ library (which is, of course, a shared piece of previously written code!) consists\
    \ of at least four steps. You may need more steps for more sophisticated tasks.\n\
    \n1.  Start by opening the file that contains the overlay library and load it\
    \ into memory (dlopen-test.c:8). Beware: at this moment, the library code, with\
    \ all its inefficiencies, bugs, and malware, becomes an almost indistinguishable\
    \ part of your program code!\n\n    The function `dlopen` expects two parameters:\
    \ the path to the file and flags. The flags are optional. If you don't know what\
    \ flags to use, use none by passing a 0. In the example, the flag `RTLD_LAZY`\
    \ instructs `dlopen` to perform “lazy binding.” The loader will resolve imported\
    \ functions’ names only when the main program attempts to use them. If you never\
    \ use a function, its name is never resolved, making loading a bit faster.\n\n\
    \    > Error reporting in functions that implement dynamic loading is different\
    \ from the standard C library.\n\n    The function `dlopen` returns an opaque\
    \ handle, a void pointer not meant to be interpreted by the caller (think `FILE*`).\
    \ If the function fails, which may happen for many reasons, but most likely because\
    \ the library isn't found or is corrupted, the handle is `NULL`. In that case,\
    \ don't continue! Report an error message with `char *dlerror` and take alternative\
    \ action. Oh, and `perror` doesn't report errors related to `libdl`.\n\n2.  Your\
    \ next task is to find the function you want to call or the global variable you\
    \ want to access. Both are symbols bound to some memory addresses either previously\
    \ or, in the case of lazy binding, right at this point in time. You provide the\
    \ symbol name—say, \"read_json\"—to the function `dlsym` and let the function\
    \ resolve the symbol for you (dlopen-test.c:15). What you get back from `dlsym`\
    \ is the address of the function in memory represented as `void*`.\n\n    Incidentally,\
    \ the address may be NULL; there’s no law against storing a symbol at the beginning\
    \ of the address space. The trick to validating the return value is bizarre. Call\
    \ dlerror twice: before the call to dlsym (to reset the error status) and after\
    \ the call (to check the most recent error status). If there’s an error, the error\
    \ status will change.\n\n3.  You’re almost done. The void pointer that you have\
    \ isn’t callable. C cannot call pointers. You must first persuade the compiler\
    \ that the pointer indeed points to a function—that is, you must cast void* to\
    \ a function pointer. The conversion is best accomplished by defining a new data\
    \ type, Reader_Func, that corresponds to a function that takes char* as the parameter\
    \ and returns a JSON_Object* (dlopen-test.c:25). Note that the compiler cannot\
    \ validate the function prototype yet because it’s defined differently in the\
    \ library header file json.h. You may choose to ignore this potential inconsistency.\
    \ If you don’t and if you have full control over the library sources (because\
    \ you are reusing your code), replace the classic prototype of read_json:\n\n\
    \    ```c\n    JSON_Object *read_json(char*);\n    ```\n\n    with an equivalent\
    \ prototype that’s better suited for dynamic loading:\n\n    ```c\n    typedef\
    \ JSON_Object* (*Reader_Func)(char *);\n    Reader_Func read_json;\n    ```\n\n\
    \    Either way, you can now call read_json, which has magically become a part\
    \ of your program. You’ve reused code at runtime.\n\n4.  Polite programmers always\
    \ return what they borrow and close what they open. Call dlclose to close the\
    \ handle and inform the operating system that you don’t need the library anymore\
    \ (dlopen-test.c:30). The function may fail, but you can do little to nothing\
    \ to recover.\n\nI hear you asking: “Why did I have to jump through hoops when\
    \ I could call read_json directly?” You could—if you knew that you’d read a JSON\
    \ file. Imagine that the file format isn’t known until you attempt to read it.\
    \ Then you can choose a suitable library (JSON, XML, HTML, HDF5—you name it),\
    \ load it dynamically, and call the reader from the library. In this case, the\
    \ data type of the return value must be adjusted to accommodate the variety of\
    \ formats, but that’s doable. In another scenario, you may need to download a\
    \ shared library from a software as a service (SaaS) server to solve a particular\
    \ problem and then discard it from both the memory and the disk.\n\nHave I mentioned\
    \ that the main program and the loaded library don’t even have to be written in\
    \ the same programming language? And, unlike the separate compilation case mentioned\
    \ in [Mixing Languages](Mixing Languages), one of the languages doesn’t even have\
    \ to be compiled. Let’s dynamically load a shared library written in C into a\
    \ Python program.\n\n## Dynamic Loading with ctypes (the Python Way)\n\nEverything\
    \ is simple in Python. What took you 34 lines of code in C takes six in Python.\
    \ Let me know if you feel cheated after you read the rest of this section.\n\n\
    Python provides dynamic loading in the module ctypes ([https://docs.python.org/3/library/ctypes.html](https://docs.python.org/3/library/ctypes.html)).\
    \ The module can load shared libraries conforming to the C language standards\
    \ on all major platforms (Linux, Windows, and macOS). This practically means that\
    \ even if a library is written in C++, Fortran, or Rust, as long as its function\
    \ definitions and data types can be transferred into C, ctypes supports it.\n\n\
    The module `ctypes` exports three library loaders: `cdll` for standard C libraries,\
    \ `windll` for Windows functions that use the `stdcall` calling convention, and\
    \ `oledll` for Windows OLE functions. The `windll` and `oledll` loaders work only\
    \ on Windows. In this section, you’ll see the `cdll` loader in action.\n\nAfter\
    \ importing the module, call the loader and pass it the name of the library you\
    \ want to use (`dlopen-test.py:2`). The loader returns a `ctypes.cdll` object\
    \ that, for any practical purpose, behaves like a Python dictionary. The dictionary\
    \ keys are the names of the library symbols, and the values are the Python objects\
    \ that represent the symbols (including their memory addresses). On the next line\
    \ of `dlopen-test.py`, the object that represents `read_json`—a *wrapper function*—is\
    \ stored in a namesake variable.\n\nLast but not least, `ctypes` assumes that\
    \ a function always returns an integer number. You have to assure it that `read_json`\
    \ returns a C-style string: a pointer to a `NULL`-terminated character array (`dlopen-test.py:4`).\
    \ The wrapper function is ready to be called, and when you call it, it returns\
    \ the expected value.\n\n```python\n# dlopen-test.py\nimport ctypes\nso = ctypes.cdll.LoadLibrary(\"\
    ./libmyjson.so\")\nread_json = so[\"read_json\"]\nread_json.restype = ctypes.c_char_p\n\
    result = read_json(\"somefile.json\".encode()).decode()\nprint(result)\n```\n\n\
    Note that all `ctypes` strings are Python byte objects. You must `.encode` Python\
    \ strings before passing them as parameters and `.decode` the return values.\n\
    \nDynamic loading via `dlopen` and `ctypes` is an exciting, unsafe (regrettably),\
    \ and rarely used (luckily!) mechanism for reusing shared"
  mdcn: "早在1966年的OS/360链接编辑器（我们现在称之为链接器）中，就实现了将编译单元传输到内存并替换或增强其他单元的机制。从OS/360时代直到1990年代后期，这种机制被称为*覆盖*，传输的单元被称为覆盖文件，并存储在OVL文件中。最后一个严重依赖覆盖的系统可能是AutoDesk的AutoCAD，直到1997年的第14版之后。随着虚拟内存的大规模引入（这超出了本书的范围），覆盖技术迅速失宠，主要以动态加载的形式得以保留。\n\
    \n只有共享（动态链接）库才能被覆盖。让我们看看在C和Python中如何动态加载和卸载代码。在这两种情况下，我们都假设动态库`libmyjson.so`已经创建（如[构建自己的动态库](构建自己的动态库)中所述），并通过库文件的完整路径引用，或者存在于`LD_LIBRARY_PATH`（定义[此处](此处)）的某个位置。\n\
    \n## 使用dlopen进行动态加载（C语言方式）\n\nC语言中的动态加载机制在`libdl`库中实现，通过函数`void *dlopen(const\
    \ char *filename, int flags)`进行加载，`int dlclose(void *handle)`进行卸载，以及其他一些函数。该库是对几乎灭绝的SunOS操作系统的致敬。要在C程序中使用动态加载，必须包含头文件`dlfcn.h`并链接库`libdl.so`，如下两个代码清单所示。别忘了：你只能卸载之前加载过的内容。\n\
    \n```c\n// dlopen-test.c\n#include <stdio.h>\n#include <stdlib.h> // For EXIT_SUCCESS\
    \ or EXIT_FAILURE\n#include <dlfcn.h> // for the dl* functions\n#include \"json.h\"\
    \n\nint main() {\n    // Open the handle\n    void *json_lib = dlopen(\"./libmyjson.so\"\
    , RTLD_LAZY);\n    if (!json_lib) {\n        fprintf(stderr, \"%s\\n\", dlerror());\
    \ // perror() does not work!\n        return EXIT_FAILURE;\n    }\n\n    // Find\
    \ a symbol\n    dlerror();\n    void *json_reader = dlsym(json_lib, \"read_json\"\
    );\n    char *possible_error = dlerror();\n\n    if (possible_error) {\n     \
    \   fprintf(stderr, \"%s\\n\", possible_error);\n        return EXIT_FAILURE;\n\
    \    }\n\n    // Call the function\n    typedef JSON_Object* (*Reader_Func)(char\
    \ *);\n    JSON_Object *retval = ((Reader_Func)json_reader)(\"somefile.json\"\
    );\n    puts((char *)retval);\n\n    // Close the handle\n    if(dlclose(json_lib))\n\
    \        fprintf(stderr, \"%s, but who cares?\\n\", dlerror());\n\n    return\
    \ EXIT_SUCCESS;\n}\n```\n\n```makefile\n# Makefile\ndlopen-test: dlopen-test.c\n\
    \t$(CC) dlopen-test.c -o dlopen-test -ldl\n```\n\n使用动态加载的库（当然，这是之前编写的共享代码！）至少包括四个步骤。对于更复杂的任务，你可能需要更多步骤。\n\
    \n1.  首先打开包含覆盖库的文件并将其加载到内存中（dlopen-test.c:8）。注意：此时，库代码及其所有低效性、错误和恶意软件几乎会成为你程序代码中不可区分的一部分！\n\
    \n    函数`dlopen`需要两个参数：文件路径和标志。标志是可选的。如果你不知道使用什么标志，可以传递0来不使用任何标志。在示例中，标志`RTLD_LAZY`指示`dlopen`执行“延迟绑定”。加载器只会在主程序尝试使用导入的函数时才解析它们的名称。如果你从未使用某个函数，其名称永远不会被解析，从而使加载速度稍快。\n\
    \n    > 实现动态加载的函数中的错误报告与标准C库不同。\n\n    函数`dlopen`返回一个不透明的句柄，一个不应由调用者解释的void指针（可以想象`FILE*`）。如果函数失败，可能由于多种原因，但最可能是因为库未找到或已损坏，句柄为`NULL`。在这种情况下，不要继续！使用`char\
    \ *dlerror`报告错误消息并采取替代措施。哦，`perror`不会报告与`libdl`相关的错误。\n\n2.  你的下一个任务是找到你想要调用的函数或你想要访问的全局变量。两者都是绑定到某些内存地址的符号，这些地址要么是预先绑定的，要么是在延迟绑定的情况下，就在当前时刻绑定。你提供符号名称——比如\"\
    read_json\"——给函数`dlsym`，让函数为你解析符号（dlopen-test.c:15）。你从`dlsym`得到的是函数在内存中的地址，表示为`void*`。\n\
    \n    顺便说一句，地址可能是NULL；没有法律禁止将符号存储在地址空间的开头。验证返回值的技巧很奇特。调用dlerror两次：在调用dlsym之前（以重置错误状态）和调用之后（以检查最新的错误状态）。如果有错误，错误状态会改变。\n\
    \n3.  你几乎完成了。你拥有的void指针不可调用。C不能调用指针。你必须首先说服编译器该指针确实指向一个函数——也就是说，你必须将void*转换为函数指针。转换最好通过定义一个新的数据类型Reader_Func来完成，该类型对应于一个接受char*作为参数并返回JSON_Object*的函数（dlopen-test.c:25）。注意，编译器此时无法验证函数原型，因为它在库头文件json.h中定义不同。你可以选择忽略这种潜在的不一致性。如果你不忽略，并且你完全控制库源代码（因为你正在重用你的代码），请将read_json的经典原型：\n\
    \n    ```c\n    JSON_Object *read_json(char*);\n    ```\n\n    替换为更适合动态加载的等效原型：\n\
    \n    ```c\n    typedef JSON_Object* (*Reader_Func)(char *);\n    Reader_Func\
    \ read_json;\n    ```\n\n    无论哪种方式，你现在都可以调用read_json，它已经神奇地成为你程序的一部分。你在运行时重用了代码。\n\
    \n4.  有礼貌的程序员总是归还他们借的东西，并关闭他们打开的东西。调用dlclose关闭句柄，并通知操作系统你不再需要该库（dlopen-test.c:30）。该函数可能失败，但你几乎无法恢复。\n\
    \n我听到你问：“为什么我必须费尽周折，而我本可以直接调用read_json？”你可以——如果你知道你将读取一个JSON文件。想象一下，文件格式直到你尝试读取时才知道。然后你可以选择一个合适的库（JSON、XML、HTML、HDF5——随你选），动态加载它，并从库中调用读取器。在这种情况下，返回值的数据类型必须调整以适应各种格式，但这是可行的。在另一种情况下，你可能需要从软件即服务（SaaS）服务器下载一个共享库来解决特定问题，然后将其从内存和磁盘中丢弃。\n\
    \n我是否提到过主程序和加载的库甚至不必用同一种编程语言编写？而且，与[混合语言](混合语言)中提到的单独编译情况不同，其中一种语言甚至不必是编译的。让我们将一个用C编写的共享库动态加载到Python程序中。\n\
    \n## 使用ctypes进行动态加载（Python方式）\n\n在Python中一切都很简单。你在C中需要34行代码才能完成的事情，在Python中只需六行。如果你在阅读本节其余部分后感到被欺骗，请告诉我。\n\
    \nPython在ctypes模块（[https://docs.python.org/3/library/ctypes.html](https://docs.python.org/3/library/ctypes.html)）中提供动态加载。该模块可以在所有主要平台（Linux、Windows和macOS）上加载符合C语言标准的共享库。这实际上意味着，即使库是用C++、Fortran或Rust编写的，只要其函数定义和数据类型可以转换为C，ctypes就支持它。\n\
    \n模块`ctypes`导出三个库加载器：`cdll`用于标准C库，`windll`用于使用`stdcall`调用约定的Windows函数，`oledll`用于Windows\
    \ OLE函数。`windll`和`oledll`加载器仅在Windows上工作。在本节中，你将看到`cdll`加载器的实际应用。\n\n导入模块后，调用加载器并传递你想要使用的库的名称（`dlopen-test.py:2`）。加载器返回一个`ctypes.cdll`对象，对于任何实际目的，其行为类似于Python字典。字典键是库符号的名称，值是表示符号的Python对象（包括它们的内存地址）。在`dlopen-test.py`的下一行，表示`read_json`的对象——一个*包装函数*——存储在一个同名变量中。\n\
    \n最后但同样重要的是，`ctypes`假设函数总是返回一个整数。你必须向它保证`read_json`返回一个C风格的字符串：一个指向以`NULL`结尾的字符数组的指针（`dlopen-test.py:4`）。包装函数已准备好被调用，当你调用它时，它会返回预期的值。\n\
    \n```python\n# dlopen-test.py\nimport ctypes\nso = ctypes.cdll.LoadLibrary(\"\
    ./libmyjson.so\")\nread_json = so[\"read_json\"]\nread_json.restype = ctypes.c_char_p\n\
    result = read_json(\"somefile.json\".encode()).decode()\nprint(result)\n```\n\n\
    请注意，所有`ctypes`字符串都是Python字节对象。在将Python字符串作为参数传递之前，必须使用`.encode`进行编码，并对返回值使用`.decode`进行解码。\n\
    \n通过`dlopen`和`ctypes`进行动态加载是一种令人兴奋、不安全（遗憾地）且很少使用（幸运地！）的重用共享代码的机制。"
