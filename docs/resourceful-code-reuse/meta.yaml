    \ the preprocessor to search for `stdio.h` along the standard search path. The\
    \ latter attempts to find `json.h` in the current directory or in the path specified\
    \ on the command line with the `-I` compiler’s option.\n\nTo prevent a header\
    \ file from being incidentally included recursively, add conditional inclusion\
    \ directives `#ifndef` and `#endif` at the top and bottom of the file, respectively.\
    \ Combined with the macro definition `#define`, these directives ensure that the\
