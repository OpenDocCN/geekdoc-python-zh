    # Dependencies and Separate Compilation


    Hopefully, you''re convinced that compiling a C file into an object file makes
    your code more protected against reverse engineering and possibly against IP theft.
    That is one of the promises of this book. Let''s get to another promise: increased
    speed.


    Once a source file is compiled into an object file, you don''t need to recompile
    it—as long as you don''t change it. We say that an object file *depends* on the
    source file. It also depends on all header files included in the source file.
    After preprocessing, they become integral parts of the source file. A change in
    any included header file may lead to recompilation. Conversely, if the source
    file and any of the included files don''t change, the object file shouldn''t change,
    either.


    You can think of your project as a graph of dependencies between files. Each object
    file depends on at least one source file and probably on a bunch of your header
    files. Almost any C file also depends on some system header files (such as `stdio.h`
    and `string.h`), but the system headers are much more stable. You may treat them
    as relative invariants.


    For a large project, you may want to visualize the graph using *component diagrams*
    from the Unified Modeling Language (UML) or other diagramming tools. Sadly, UML
    has become a rare, almost'
  - '[PAGE 43]


    extinct, species in programmers’ tool chests. If you’re intrigued, consult the
    excellent UML books by [Fowler](https://martinfowler.com/) [Fow03] and [Larman](https://www.craiglarman.com/)
    [Lar04].


    Understanding dependencies leads to better packaging, as you will see in [Building
    Static Libraries](https://www.example.com/). Understanding dependencies can also
    dramatically reduce project build time. If a source file changes, you must recompile
    only those object files that depend on it. You don’t need to modify any other
    object files in the project. You simply need to separate the build process into
    the compile stage (with the “compile but don’t link” option -c) and the link stage
    like this:


    ```

    /home/dzreuse/> cc -c myjsontool.c -o myjsontool.o

    /home/dzreuse/> cc -c json_syntax.c -o json_syntax.o

    /home/dzreuse/> cc -c json_tokens.c -o json_tokens.o

    /home/dzreuse/> cc myjsontool.o json_syntax.o json_tokens.o -o jsontool

    ```


    Welcome to *separate compilation*!


    Compare these four commands to the single command [here](https://www.example.com/).
    At first glance, executing one command might look faster than executing four.
    But that appearance is deceptive. The original command always takes the same long
    time. Of the four commands previously shown, only the last one is inescapable.
    The other three are executed together only in the worst case scenario, during
    the original or the final build. In the best case, you can compile only one file.
    In general, the build time is determined by the dependencies: the more dependencies
    are activated by the source files’ changes, the longer the build is.


