    \ *hostname, unsigned long prog_id, unsigned long prog_vers, char *protocol)`,\
    \ as shown on line `rpc/json_rpctest.c:14` [here](rpc/json_rpctest.c:14). The\
    \ client encapsulates the server `hostname`, the unique ID and version of the\
    \ server program `prog_id` and `prog_vers`, and the suggested network `protocol`.\
    \ `in` and `out` are the pointers to the parameters and the future return value,\
    \ respectively. `inproc` and `outproc` are the functions for"
