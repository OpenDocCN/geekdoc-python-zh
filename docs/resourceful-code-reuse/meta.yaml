    \n```\n#include <stdio.h>\n#include \"json.h\"\n```\n\n第一条指令指示预处理器沿着标准搜索路径查找`stdio.h`。第二条指令则尝试在当前目录或通过编译器选项`-I`指定的路径中查找`json.h`。\n\
    \n为了防止头文件被意外地递归包含，请在文件的顶部和底部分别添加条件包含指令`#ifndef`和`#endif`。结合宏定义`#define`，这些指令确保只有在宏`JSON_H`尚未定义的情况下，该文件才会被包含。宏名称可以是任何内容，只要它与文件唯一关联即可，但传统上我们使用全大写字母的文件名，并用下划线代替点号。\n\
    \n你的项目头文件将如下所示：\n\n```\njson.h\n\n#ifndef JSON_H\n#define JSON_H\n\n#include <stdbool.h>\
    \ // 用于 bool, false, 和 true\n\n// 数据类型\ntypedef struct JSON_Object {\n    // ...\n\
    } JSON_Object;\n// ...\n\n// 全局变量\nextern int json_errno;\n// ...\n\n// 函数原型\n\
    bool read_boolean(FILE*);\nchar *read_string(FILE*);\nvoid *obscure_helper();\n\
    JSON_Object *read_json(char*);\nint write_json(char*, JSON_Object*);\n// ...\n\
    \n#endif\n```\n\n在每个源文件中包含这个头文件——如果你想的话，包含多次也没关系。有了所有这些内置的安全特性，它不会造成任何问题。\n\n\
    现在，你已经准备好在自己的项目之间，甚至与其他人（比如在 GitHub (https://github.com) 上）共享你的编译单元了。\n\n## 模块化代码（Python\
    \ 的方式）\n\nC 语言于 1972 年发布。它最初是为代码重用而设计的，但没有*模块*的概念：一个具有声明的或易于发现的外部接口的、可轻松重用的代码单元。这就是为什么我们不得不费尽周折（通过使用“头文件”）来构建类似模块的单元。\n\
    \n> **模块化语言**\n>\n> 以下语言官方支持模块化（按发布年份排序；列表并不完整）：IBM RPG (1959), COBOL (1960),\
    \ PL/I (1964), ALGOL (1965), ML (1973), Modula (1975), Ada (1980), Common Lisp,\
    \ MATLAB, Objective-C (1984), C++ (1985), Erlang, Object Pascal (1986), Oberon,\
    \ Perl (1987), Fortran-90, Haskell (1990), Python (1991), Java, Ruby, JavaScript\
    \ (1995), OCaml (1996), C# (2000), D (2001), BlitzMax, eC (2004), F# (2005), Closure\
    \ (2007), Go (2009), Rust (2010), Dart, Elixir (2011), Elm (2012), F (2014), NEWP\
    \ (2015)。除了四种语言外，其他所有语言都是在 C 之后开发的。指责 C 不模块化是不公平的。\n\n一种日益流行的语言是 Python，它从设计上就支持模块化。在\
    \ Python 中创建模块极其简单：任何 Python 文件本身就是一个模块。模块的名称就是文件名，去掉 `py` 扩展名。例如，文件 `jsontool.py`\
    \ [这里](here) 包含一个名为 `jsontool` 的模块。如果你曾经用 Python 写过任何文件，你就已经写过一个 Python 模块了。\n\
    \n要在你的 Python 程序中（重）使用一个模块，你必须使用以下语句之一来导入它：\n\n```\nimport jsontool\nfrom jsontool\
    \ import json_read # 只导入 json_read\nfrom jsontool import * # 导入所有内容\n```\n\nC\
    \ 文件和 Python 模块之间的三个关键区别是：\n\n1.  要从模块外部引用 Python 模块的对象，你通常使用其完全限定名，该名称由模块名和对象名组成。模块\
    \ `jsontool` 中的函数 `read_json` 被称为 `jsontool.json_read`，除非你使用 `import` 的 `from`\
    \ 形式，这也是可能的但不建议这样做。你可能在不同的模块中定义了多个同名函数。例如，你可能有一系列输入/输出模块（如 `json`、`xml` 和 `csv`），每个模块都有\
    \ `read` 和 `write` 函数，并提供一致且易于记忆的接口。限定名是一个福音。在 C 中，所有名称都是扁平的，它们最终都在同一个命名空间中。\n\
    \n2.  第二个区别既是福音也是诅咒。与 C 不同，Python 是一种*动态类型语言*：变量或函数返回值的类型在运行时确定，并且可以更改。好消息是，你不需要头文件来确保调用者对函数的期望与其实际实现相匹配。Python\
    \ 中甚至不存在这样的机制！坏消息是，调用者不会知道模块的实现是否发生了更改，这可能导致不一致性。正如你从[这里](here)的例子中已经知道的，这种不一致性很可能在运行时显现出来，而那时修复它已经太晚了。\n\
    \n3.  最后说个好消息：第三个区别也对 Python 模块有利。任何 C 程序都必须有 `main` 函数。任何可重用的 C 文件都必须与另一个代码片段（通常称为*驱动程序*）结合使用。驱动程序提供\
    \ `main` 函数来调用该文件中的函数——例如，用于测试目的。并不是说编写驱动程序是什么大事，但它既繁琐又不灵活。Python 模块可能具有双重性质：当从另一个单元导入时，它是一个模块（函数和变量的集合），但当单独调用时，它是一个完整的程序。\n\
    \n这种二元性是通过变量 `__name__` 实现的。这个变量的值由 Python 解释器（`python` 本身）自动设置。当另一个模块导入该模块时，`__name__`\
    \ 的值为被导入模块的名称。否则，它的值为 `\"__main__\"`，这是对 C 的 `main` 函数一个不那么微妙的引用。`jsontool.py`\
    \ 的底部可能如下所示：\n\n```\n# 所有函数和变量都在上面的某个地方 ^^^^^\ndef main():\n    # 在这里执行所有业务逻辑——或者测试！\n\
    \    pass\n\nif __name__ == \"__main__\":\n    main()\n```\n\n当然，被调用的函数名称不必是 `main`。\n\
    \nPython 的解释性质支持了这种二元性以及 Python 模块的其他友好和不那么友好的特性。解释器在运行时根据需要发现导入的模块并将其集成到执行环境中。另一方面，C\
    \ 传统上是一种编译型语言。C 程序在执行前会被翻译成机器码。（C 解释器存在，但它们不是主流。）CPU 执行代码时，对文件、模块、接口，甚至 C 语言本身都一无所知。如果它对这些东西有任何概念，本书的其余部分就毫无意义了。\n\
    \n在下一章中，你将学习如何预编译旨在重用的 C 代码，以减少开发时间并保护你的知识产权。你还将看到如何将生成的*目标文件*组织成静态库和动态库。\n\n\
    ## 第 2 章\n\n## 在链接时重用代码（仅限 C）\n\n将项目分成几个编译单元是迈向代码重用的第一小步。但编译时的代码重用有一些局限性。出于公司和法律原因，完全向其他程序员暴露共享源代码可能是不可取的。此外，你不想为每个项目构建重新编译所有单元，特别是如果项目很大。（例如，在\
    \ 2015 年，Linux 由 40,000 个文件组成。）你可以通过将模块预编译成目标文件，然后将它们组织成库来提高构建性能和代码安全性。"
