  - '[PAGE 37]


    # Chapter 2


    # Reuse Code at Link Time (C Only)


    Separating a project into several compilation units is the first small step toward
    code reuse. But compile-time code reuse has some limitations. Fully exposing shared
    source code to other programmers may be undesirable for corporate and legal reasons.
    Additionally, you don’t want to recompile all units for every project build, especially
    if the project is large. (For example, in 2015, Linux consisted of 40,000 files.)
    You can improve build performance and code security by precompiling modules into
    object files and later arranging them into libraries.'
- md: '## Compiling Object Files


    A compiler (say, a C compiler) translates a source file into an *object* file:
    a fragment of the future program that must be later linked with other object files
    (in all non-trivial cases) and with system and application-specific libraries
    (almost always). The name of an object file usually is the same as the source
    file''s name with the extension changed to `o` or `obj`.


    An object file contains the executable code, the names of all global objects (variables
    and functions), and all unresolved external references (variables and functions,
    collectively known as *symbols*). It may also include debugging numbers, but debugging
    is outside this book''s scope.


    As an example, here are the first 2560 bytes (the so-called hexadecimal dump)
    of `jsontool.o` obtained by compiling `jsontool.c` introduced [here](https://example.com).
    The dump shows the offsets in the left column, the hexadecimal character codes
    in the middle eight columns, and the characters themselves, if printable, in the
    right column. Note the strings `their_file.json`, `my_json.json`, and `Success!`
    from the C file. The executable code is unrecognizable, and the symbols are elsewhere
    in the dump.


    ```

    00000000: 7f45 4c46 0201 0100 0000 0000 0000 0000 .ELF...........

    00000010: 0100 3e00 0100 0000 0000 0000 0000 0000 ..>.............

    00000020: 0000 0000 0000 0000 7006 0000 0000 0000 ........p.......

    00000030: 0000 0000 4000 0000 0000 4000 0d00 0c00 ....@.....@.....

    00000040: 5548 89e5 4889 7df8 b800 0000 005d c355 UH..H.}......].U

    00000050: 4889 e548 897d f8b8 0000 0000 5dc3 5548 H..H.}......].UH

    00000060: 89e5 b800 0000 005d c355 4889 e548 897d .....].UH..H.}

    00000070: e848 c745 f800 0000 0048 8b45 f85d c355 .H.E.....H.E.].U

    00000080: 4889 e548 897d e848 8975 e0c7 45fc 0000 H..H.}.H.u..E...

    00000090: 0000 8b45 fc5d c355 4889 e548 897d f848 ...E.].UH..H.}.H

    000000a0: 8b45 f85d c355 4889 e548 83ec 1048 8d3d .E.].UH..H...H.=

    000000b0: 0000 0000 e800 0000 0048 8945 f848 837d .........H.E.H.}

    000000c0: f800 7507 b801 0000 00eb 4448 8b45 f848 ..u.......DH.E.H

    000000d0: 89c7 e800 0000 0048 8945 f848 8b45 f848 .......H.E.H.E.H

    000000e0: 89c6 488d 3d00 0000 00b8 0000 0000 e800 ..H.=...........

    000000f0: 0000 0085 c075 07b8 0100 0000 eb11 488d .....u........H.

    00000100: 3d00 0000 00e8 0000 0000 b800 0000 00c9 =...............

    00000110: c300 0000 7468 6569 725f 6669 6c65 2e6a ....their_file.j

    00000120: 736f 6e00 6d79 5f6a 736f 6e2e 6a73 6f6e son.my_json.json

    00000130: 0053 7563 6365 7373 2100 0047 4343 3a20 .Success!..GCC:

    00000140: 2855 6275 6e74 7520 372e 352e 302d 3375 (Ubuntu 7.5.0-3u

    00000150: 6275 6e74 7531 7e31 382e 3034 2920 372e buntu1~18.04) 7.

    00000160: 352e 3000 0000 0000 1400 0000 0000 0000 5.0.............

    ```


    ## Understanding Linking


    What happens to the object files once you compile them? At the next step of the
    project build, you should link them and any necessary static libraries (essentially,
    archives of object files) together to form an executable file. A program that
    performs linking is known as a *linker* or a *link editor*. In the world of GNU,
    the linker is called `ld` (because it’s also a *loader*, see [Building Dynamic
    Libraries](Building Dynamic Libraries)); Microsoft calls it [LINK.exe](LINK.exe).
    Interestingly, when invoked on object files, your default C compiler `cc` most
    probably acts as a linker: `cc` is a wrapper that invokes a compiler or a linker,
    depending on the files you feed to it.


    A linker doesn’t just mechanically concatenate the archives and object files.
    Most importantly, it relocates the data and resolves symbolic references.


    Let’s have a look at the function `write_json` in the file `json_syntax.c`. The
    compiler will store the function’s implementation at some address *within* the
    compiled module—for example, at the address `0x00000200` (see the code listing
    [here](here)). A potential caller of the function will typically execute the `call
    X` instruction, where `X` is the address of the function. But after the concatenation
    of the project components, the addresses change—the global variables and functions
    are displaced. The displacement is affected by the components’ sizes and their
    order in the final executable file. It’s improbable (though possible, as in the
    case of Microsoft DOS COM executable files: [https://en.wikipedia.org/wiki/COM_file](https://en.wikipedia.org/wiki/COM_file))
    that the new address of `write_json` is still `0x00000200` and not, say, `0x00012345`.
    It’s the linker’s responsibility to replace each reference to `0x00000200` with
    a reference to `0x00012345` in the executable file. The same has to be done to
    each global function and variable.


    Let’s get back to `json_syntax.c`. The functions from that file are likely to
    refer to the global variable `json_errno`, which holds the most recent error code.
    They likely update the variable in the case of an error:


    ```

    ...

    #define JSON_UNBALANCED_BRACES -99 // Or whatever

    ...

    json_errno = JSON_UNBALANCED_BRACES;

    ```


    When translated to machine code, this statement becomes a `MOV` instruction that
    needs to know the variable’s address. You may think the situation is similar to
    the relocation case, but it isn’t. The variable is not defined in `json_syntax.c`
    and doesn’t have an address that could be adjusted. Instead of the address, the
    compiler puts a placeholder (a stub) into the object file that roughly says, “if
    variable `json_errno` existed, this would be the address for it.” Calls to functions
    defined elsewhere are replaced with placeholders, too.


    It’s not until the link stage that the missing variables and functions are (hopefully)
    discovered. At this point, the linker resolves the missing references by matching
    all placeholders in all object files in the project with the available global
    variables and functions. If a match exists, the linker replaces a placeholder
    with the adjusted address. If a match doesn’t exist, the linker hopes that the
    reference will be resolved later, at runtime (say, through dynamic loading—see
    [Harnessing Dynamic Loading](Harnessing Dynamic Loading)).


    The linker may find some resolved references in dynamic (shared) libraries ([Building
    Dynamic Libraries](Building Dynamic Libraries))—reusable components combined with
    the rest of the code when the program is loaded into the RAM for execution. While
    the presence of the dynamic libraries at the time of linking doesn’t, strictly
    speaking, guarantee their presence at runtime, the linker has no way of securing
    those references. A link to a dynamic library is a promise. It’s your responsibility
    to keep it.


    Notably absent from an object file is the original code in the original programming
    language. The compilation is an irreversible process (“one can’t ungrind ground
    meat”). You may apply a *disassembler* (such as Linux `objdump -d`) to an object
    file in the hope of making it somewhat human-readable, but the best you can get
    is a rather undecipherable assembly code with no data structures. You may further
    try your luck in *reverse engineering*: tracing assembly language commands back
    to the C statements and operators from which they might have been generated. But
    you’re highly unlikely to succeed in using it.


    This isn’t bad news! If you cannot reconstruct a source file from an object file,
    then your competitors cannot, either. If you’d like to share executable code without
    sharing the source code (*closed-source sharing*), object files are exactly what
    you need. Whoever intends to reuse your files will get the expected functionality
    but not have access to the implementation details, which presumably constitute
    your intellectual property (IP).


    > **Code Obfuscation**


    Compiling a file isn’t the only way to protect your IP. You may choose to *obfuscate*
    your code by violating formatting, naming, and coding conventions. I once heard
    an urban legend about a software company that had been ordered by a judge to share
    its product’s source code with a competitor. The unenthusiastic developers removed
    all comments, replaced every function and variable name with 0s (zeros) and Os
    (Os), messed up the formatting, randomly sprinkled in *trigraphs*, and obediently
    shared the'
  mdcn: '## 编译目标文件


    编译器（例如C编译器）将源文件翻译成*目标*文件：这是未来程序的一个片段，必须在后续步骤中与其他目标文件（在所有非简单情况下）以及系统和特定于应用程序的库（几乎总是）进行链接。目标文件的名称通常与源文件的名称相同，只是扩展名改为`o`或`obj`。


    目标文件包含可执行代码、所有全局对象（变量和函数）的名称，以及所有未解析的外部引用（变量和函数，统称为*符号*）。它还可能包含调试编号，但调试超出了本书的范围。


    举个例子，以下是通过编译[此处](https://example.com)介绍的`jsontool.c`所获得的`jsontool.o`的前2560字节（即所谓的十六进制转储）。转储显示了左侧列的偏移量、中间八列的十六进制字符代码，以及右侧列中可打印的字符本身。请注意来自C文件的字符串`their_file.json`、`my_json.json`和`Success!`。可执行代码无法识别，符号则位于转储的其他位置。


    ```

    00000000: 7f45 4c46 0201 0100 0000 0000 0000 0000 .ELF...........

    00000010: 0100 3e00 0100 0000 0000 0000 0000 0000 ..>.............

    00000020: 0000 0000 0000 0000 7006 0000 0000 0000 ........p.......

    00000030: 0000 0000 4000 0000 0000 4000 0d00 0c00 ....@.....@.....

    00000040: 5548 89e5 4889 7df8 b800 0000 005d c355 UH..H.}......].U

    00000050: 4889 e548 897d f8b8 0000 0000 5dc3 5548 H..H.}......].UH

    00000060: 89e5 b800 0000 005d c355 4889 e548 897d .....].UH..H.}

    00000070: e848 c745 f800 0000 0048 8b45 f85d c355 .H.E.....H.E.].U

    00000080: 4889 e548 897d e848 8975 e0c7 45fc 0000 H..H.}.H.u..E...

    00000090: 0000 8b45 fc5d c355 4889 e548 897d f848 ...E.].UH..H.}.H

    000000a0: 8b45 f85d c355 4889 e548 83ec 1048 8d3d .E.].UH..H...H.=

    000000b0: 0000 0000 e800 0000 0048 8945 f848 837d .........H.E.H.}

    000000c0: f800 7507 b801 0000 00eb 4448 8b45 f848 ..u.......DH.E.H

    000000d0: 89c7 e800 0000 0048 8945 f848 8b45 f848 .......H.E.H.E.H

    000000e0: 89c6 488d 3d00 0000 00b8 0000 0000 e800 ..H.=...........

    000000f0: 0000 0085 c075 07b8 0100 0000 eb11 488d .....u........H.

    00000100: 3d00 0000 00e8 0000 0000 b800 0000 00c9 =...............

    00000110: c300 0000 7468 6569 725f 6669 6c65 2e6a ....their_file.j

    00000120: 736f 6e00 6d79 5f6a 736f 6e2e 6a73 6f6e son.my_json.json

    00000130: 0053 7563 6365 7373 2100 0047 4343 3a20 .Success!..GCC:

    00000140: 2855 6275 6e74 7520 372e 352e 302d 3375 (Ubuntu 7.5.0-3u

    00000150: 6275 6e74 7531 7e31 382e 3034 2920 372e buntu1~18.04) 7.

    00000160: 352e 3000 0000 0000 1400 0000 0000 0000 5.0.............

    ```


    ## 理解链接


    编译目标文件后会发生什么？在项目构建的下一步中，你应该将它们与任何必要的静态库（本质上是目标文件的归档）链接在一起，形成一个可执行文件。执行链接的程序被称为*链接器*或*链接编辑器*。在GNU世界中，链接器被称为`ld`（因为它也是一个*加载器*，参见[构建动态库](构建动态库)）；微软则称其为[LINK.exe](LINK.exe)。有趣的是，当在目标文件上调用时，你的默认C编译器`cc`很可能充当链接器：`cc`是一个包装器，根据你提供给它的文件来调用编译器或链接器。


    链接器不仅仅是机械地连接归档和目标文件。最重要的是，它会重定位数据并解析符号引用。


    让我们看看文件`json_syntax.c`中的函数`write_json`。编译器会将该函数的实现存储在编译模块内的某个地址——例如，在地址`0x00000200`（参见[此处](here)的代码清单）。该函数的潜在调用者通常会执行`call
    X`指令，其中`X`是函数的地址。但在项目组件连接之后，地址会发生变化——全局变量和函数会发生位移。位移受组件大小及其在最终可执行文件中的顺序影响。`write_json`的新地址仍然是`0x00000200`而不是，比如说，`0x00012345`的可能性不大（尽管可能，如微软DOS
    COM可执行文件的情况：[https://en.wikipedia.org/wiki/COM_file](https://en.wikipedia.org/wiki/COM_file)）。链接器的责任是在可执行文件中将每个对`0x00000200`的引用替换为对`0x00012345`的引用。对每个全局函数和变量也必须这样做。


    让我们回到`json_syntax.c`。该文件中的函数很可能引用全局变量`json_errno`，该变量保存最近的错误代码。在发生错误时，它们可能会更新该变量：


    ```

    ...

    #define JSON_UNBALANCED_BRACES -99 // 或其他值

    ...

    json_errno = JSON_UNBALANCED_BRACES;

    ```


    当翻译成机器代码时，这条语句变成一条`MOV`指令，需要知道变量的地址。你可能认为这种情况与重定位情况类似，但事实并非如此。该变量未在`json_syntax.c`中定义，也没有可以调整的地址。编译器不是放入地址，而是在目标文件中放入一个占位符（一个存根），大致意思是：“如果变量`json_errno`存在，这将是它的地址。”对在其他地方定义的函数的调用也会被替换为占位符。


    直到链接阶段，缺失的变量和函数才会（希望）被发现。此时，链接器通过将项目中所有目标文件中的所有占位符与可用的全局变量和函数进行匹配来解析缺失的引用。如果存在匹配，链接器会将占位符替换为调整后的地址。如果不存在匹配，链接器希望该引用将在稍后运行时解析（例如，通过动态加载——参见[利用动态加载](利用动态加载)）。


    链接器可能会在动态（共享）库（[构建动态库](构建动态库)）中找到一些已解析的引用——这些是可重用组件，在程序加载到RAM中执行时与其余代码组合。虽然严格来说，链接时存在动态库并不能保证运行时它们的存在，但链接器无法确保这些引用。对动态库的链接是一个承诺。保持它是你的责任。


    目标文件中明显缺少的是原始编程语言中的原始代码。编译是一个不可逆的过程（“无法将绞肉还原”）。你可以对目标文件应用*反汇编器*（如Linux `objdump
    -d`），希望使其在某种程度上可读，但你能得到的最好结果是相当难以理解的汇编代码，没有数据结构。你可以进一步尝试*逆向工程*的运气：将汇编语言命令追溯到可能生成它们的C语句和运算符。但你极不可能成功使用它。


    这并不是坏消息！如果你无法从目标文件重建源文件，那么你的竞争对手也不能。如果你想共享可执行代码而不共享源代码（*闭源共享*），目标文件正是你所需要的。任何打算重用你文件的人都将获得预期的功能，但无法访问实现细节，这些细节大概构成了你的知识产权（IP）。


    > **代码混淆**


    编译文件并不是保护你IP的唯一方式。你可以选择通过违反格式、命名和编码约定来*混淆*你的代码。我曾听过一个都市传说，一家软件公司被法官命令与竞争对手共享其产品的源代码。不情愿的开发人员删除了所有注释，将每个函数和变量名替换为0（零）和O（O），搞乱了格式，随意添加了*三字母组*，并顺从地共享了'
