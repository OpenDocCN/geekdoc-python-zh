    [Fowler](https://martinfowler.com/) [Fow03] 和 [Larman](https://www.craiglarman.com/)
    [Lar04] 的优秀 UML 书籍。


    理解依赖关系有助于更好的打包，正如你将在[构建静态库](https://www.example.com/)中看到的。理解依赖关系还可以显著减少项目的构建时间。如果一个源文件发生更改，你只需要重新编译那些依赖于它的目标文件。你不需要修改项目中的任何其他目标文件。你只需要将构建过程分为编译阶段（使用“编译但不链接”选项
    -c）和链接阶段，如下所示：


    ```

    /home/dzreuse/> cc -c myjsontool.c -o myjsontool.o

    /home/dzreuse/> cc -c json_syntax.c -o json_syntax.o

    /home/dzreuse/> cc -c json_tokens.c -o json_tokens.o

    /home/dzreuse/> cc myjsontool.o json_syntax.o json_tokens.o -o jsontool

    ```


    欢迎来到*分离编译*！


    将这四个命令与[这里](https://www.example.com/)的单个命令进行比较。乍一看，执行一个命令可能比执行四个命令更快。但这种表象具有欺骗性。原始命令总是花费同样长的时间。在之前显示的四个命令中，只有最后一个命令是不可避免的。其他三个命令只有在最坏的情况下，即在原始构建或最终构建时才会一起执行。在最好的情况下，你只需要编译一个文件。通常，构建时间取决于依赖关系：源文件的更改激活的依赖关系越多，构建时间就越长。


    ## 不要把所有鸡蛋放在一个头文件里


    ![](img/c0b6e19a136e7361a7284f5c371b1d8b_44_0.png)


    根据需要将几个小的头文件包含在源文件中，比将一个全面的头文件包含在所有源文件中要好。如果你更改了全面的头文件，你将不得不重新编译所有源文件，即使它们没有受到更改的影响。拥有许多小的头文件可以最大限度地降低重新编译的风险。但拥有太多的头文件会使依赖关系难以管理。试着找到合适的平衡点。


    ## 混合语言


    分离编译的一个额外好处是能够用不同的语言编写项目的不同部分，只要这些语言实现具有相同的调用约定和相同的运行时概念。“没有一种单一的编程语言适合所有的需求和目标，”Michael
    Scott [Sco15] 说。例如，将 C 与 C++ 或 Fortran 混合使用并不少见。C++ 甚至对外部 C 函数和变量有一个特殊的指定：`extern
    "C"`。


    当我还是博士生的时候，我参与了一个结合了基于 Prolog 的用户界面和 Fortran 数值库的项目。后来我们用 Tcl/Tk（现在谁还在乎 Tcl/Tk？）替换了
    Prolog，并使用 C 作为粘合剂。最终，我们摆脱了 Fortran，并用 Python 替换了 Tcl/Tk。它仍然像魔法一样工作。


    ## 创建 Make 文件


    我们关于目标文件和分离编译的讨论即将结束。你可能想知道，在一个拥有 40,000 个文件的真实项目中，人类如何可能跟踪所有这些依赖关系。这就需要 make，一个根据依赖关系描述来确定哪些项目单元需要重新编译，然后发出重新编译命令的程序。


    make 是一个极其方便且被低估的工具。它能做的远不止我在上一段中所说的。只需将“重新编译”这个词替换为“更新”，我们突然就在谈论一个强制执行依赖关系并在需要时更新组件的工具。组件甚至不必是程序文件。它们可以是文档、图像、电子表格等等。这样一个宏大的工具值得单独写一本书。我将向你展示
    make 的一些功能，并推荐你参考 [Small, Sharp Software Tools [Hog19]](https://example.com) 了解更多细节。


    你通过编写一个 make 文件来开始一个 make 项目。make 文件的名称可以是任何东西，但如果它是 makefile 或 Makefile，那么 make
    无需额外提示就能找到它。


    一个 make 文件由定义和规则组成。定义类似于 Python 中的赋值语句。在我们下面的 Makefile 示例中，定义在第 1 到 5 行。变量 EXE
    包含可执行文件的名称；变量 SRCS 和 OBJS 分别包含源文件和目标文件的列表（顺序不一定相同）。变量 CFLAGS 是预定义的，包含传递给 C 编译器的标志列表。变量
    X 的值是 $(X)。


    规则从第 6 行之后开始。一条规则表示目标与其先决条件之间的依赖关系，并描述更新目标所需的操作。第一条规则定义了一个伪目标 all，它象征的不是特定的文件，而是整个项目。当你在命令行输入
    make 时，make 会尝试构建这个目标。该目标依赖于文件 jsontool，即变量 EXE 的值。目标显示在冒号之前。先决条件显示在同一行的冒号之后。


    ```

    Makefile

    1:  EXE = jsontool

    -   SRCS = myjsontool.c json_syntax.c json_tokens.c

    -   REUSABLE_OBJS = json_syntax.o json_tokens.o

    -   OBJS = myjsontool.o $(REUSABLE_OBJS)

    5:  CFLAGS = -Wall -g # 显示所有警告；包含调试信息

    -

    -   all: $(EXE)

    -

    -   jsontool: $(OBJS)

    -       $(CC) $(OBJS) -o $(EXE)

    10:

    -

    -   clean:

    -       rm -f $(OBJS) $(EXE) depend

    -

    -   depend: $(SRCS)

    15:

    -

    -       $(CC) -MM $(SRCS) > depend

    -

    -   include depend

    ```


    如果依赖关系被违反，make 会更新目标。如果任何先决条件比目标更新，即先决条件已更改但目标尚未更新，则依赖关系被违反。make 期望执行规则第二行的操作会更新目标。第一条规则有一个空操作。它只是说：“要更新
    all，请以任何应该更新的方式更新 jsontool”，这把我们带到了第二条规则。


    > **Making 与 Raking**

