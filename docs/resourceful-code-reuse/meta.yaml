  md: '# Introduction: Why Reuse Code?


    Despite its name, modern computer science isn’t just a science—it’s also a 200-year-old
    arcane art, if we accept Charles Babbage as the first theoretical computer scientist.
    It comes loaded with legends, anecdotes, apocrypha, unwritten rules, and other
    words of wisdom. One example is the *proudly found elsewhere (PFE)* or *invented
    elsewhere (IE)* predisposition: if the wheel has been already invented, you shouldn’t
    design it again without a strong reason but reuse the existing design. PFE/IE
    is a special case of the more general philosophical Occam’s razor principle: entities
    shouldn’t be multiplied without necessity.


    As far as this book is concerned, both Occam’s razor and PFE/IE apply to a simple
    concept: you should write a large code fragment only if you or someone else hasn’t
    written that code fragment before. If the fragment has been written, use it again—*reuse*
    it.


    Several reasons exist for code reuse:


    +   1. Code reuse puts into practice the advice of none other than William of
    Occam (or Ockham, depending on whom you ask). If you and I were philosophers,
    that alone would suffice.

    2. Code reuse improves your productivity. Code fragments that you develop to deal
    with frequently occurring tasks (for example, reading from and writing to JSON
    files or supporting heterogeneous arrays and maps) become parts of your'
  merge: -1
  pgno: 12
- img_proc: true
  md: 'programming portfolio. You can readily incorporate them into your new projects,
    most likely bypassing the unit testing stage. Third-party libraries (for example,
    libjson) are usually even more powerful and more reliable. Ideally, you’d like
    to build your new program out of existing pieces with as little new code of your
    own as possible.


    +   3. Code reuse improves software quality. A reuseable code unit that has been
    a part of another project must have been thoroughly debugged and tested in the
    past. It never hurts to test it again, but at least you can expect to have a good
    baseline.


    +   4. Code reuse improves software configurability. Runtime code reuse techniques
    from Chapter 3, [Reuse Code at Runtime (C and Python)](Reuse Code at Runtime (C
    and Python)), allow your program to postpone deciding what code to use until the
    program runs. You can develop a skeletal program (a *framework*) with slots for
    future code fragments to be filled as needed. In a sense, you get a program that
    may configure itself or be configured by the user on the fly.


    You can reuse code in many ways and at many stages. This book will explain how
    to reuse your *source code* (the program’s text written in a human-readable programming
    language, such as C or Python) in Chapter 1, [Reuse Code at Compile Time (C and
    Python)](Reuse Code at Compile Time (C and Python)). You’ll learn how to speed
    up program build time and avoid disclosing the source code (if desirable) by creating
    object files and libraries in Chapter 2, [Reuse Code at Link Time (C Only)](Reuse
    Code at Link Time (C Only)). Finally, in Chapter 3, [Reuse Code at Runtime (C
    and Python)](Reuse Code at Runtime (C and Python)), you’ll learn how to physically
    separate the proper program code and the reusable fragments and either bind them
    when the program runs ([Harnessing Dynamic Loading](Harnessing Dynamic Loading))
    or not bind them at all and instead use a network communication protocol to request
    services and obtain results ('
  merge: -1
  pgno: 13
- img_proc: true
  md: '[Getting a Taste of Remote Procedure Calls](https://example.com). Incidentally,
    the latter form of reuse makes your code available to both your own programs and
    any other programs you authorize.'
  merge: -1
  pgno: 14
- img_proc: true
  md: '# C vs. Python


    You’ll see that C and Python software each require different code reuse techniques.


    C programs are usually compiled—they’re converted into files that contain native
    CPU instructions with little or no “memory” of the original development language.
    These converted files are relatively language-agnostic and can be combined with
    other files developed in other compiled programming languages (such as C++ or
    Rust). It makes sense then to organize them into libraries for further reuse.


    Python programs are usually interpreted by an interpreter or byte-compiled—they’re
    converted into files that contain instructions for a virtual machine. These converted
    files have more limited reusability, get along only with other Python files, and
    often have to be byte-compiled again before reuse. This limitation makes building
    complex shared Python libraries impractical.'
  merge: -1
  pgno: 15
- img_proc: true
  md: '# Running Example


    Throughout the book, I’ll show you how to reuse code written mostly in the C language
    and occasionally in Python. For that, we’re going to need a running example. We’ll
