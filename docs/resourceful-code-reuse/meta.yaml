    \ cc jsontool.c -o jsontool\n/home/dzreuse/> ./jsontool\nSuccess!\n```\n\n抛开代码重用不谈，这是一个优秀的\
    \ C 程序！它（希望）是正确的、简洁的、易于编写的，并且遵循了自然的人类逻辑。该程序定义了一个数据结构，实现了辅助函数，使用它们来实现解析器和写入器，并使用解析器和写入器来解决问题。\n\
    \n遗憾的是，它有两个问题：从 C 编译器的角度来看，它效率低下，而且实际上不可重用。\n\nC 编译器一次只翻译一个编译单元，通常是整个 C 文件以及所有头文件（如\
    \ `stdio.h`）被原封不动地包含进来。如果你只更改了 C 文件或头文件中的一行或一个字符，整个单元都必须重新编译。随着程序的增长，编译时间会变长。如果你想让程序编译得更快，就必须让编译单元更小。我将在[编译目标文件](Compiling\
    \ Object Files)中向你展示如何利用这种拆分，使用所谓的*分离编译*。\n\n但让我们回到可重用性的问题上。为什么[这里](here)的代码不适合重用？因为它解决了一个特定的问题：它解析一个\
    \ JSON 文件，以特定的方式转换它，并将其写入另一个文件。由于代码是一个不可分割的编译单元，除了通过复制粘贴到文本编辑器中，该文件中的任何函数都无法在任何其他项目中使用——但复制粘贴代码会损害其可维护性和一致性，并削弱奥卡姆剃刀原则。而且由于代码已经有了\
