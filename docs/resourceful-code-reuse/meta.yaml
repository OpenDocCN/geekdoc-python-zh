    void *obscure_helper();\nJSON_Object *read_json(char*);\nint write_json(char*,\
    \ JSON_Object*);\n// ...\n\n#endif\n```\n\nInclude the header file in each source\
    \ file—more than once if you want to. It won't hurt anything with all the embedded\
    \ safety features.\n\nNow, you're ready to share your compilation units between\
    \ your own projects and even with other people—say, on GitHub (https://github.com).\n\
    \n## Modularizing Code (the Python Way)\n\nThe C language was released in 1972.\
    \ It was originally designed for code reuse, but didn’t have the concept of a\
    \ *module*: a readily reusable code unit with a declared or easily discoverable\
    \ external interface. That’s why we had to jump through hoops (by using “header\
    \ files”) to construct module-like units.\n\n> **Modular Languages**\n>\n> The\
    \ following languages officially support modularization (in the order of their\
    \ release years; the list isn’t complete): IBM RPG (1959), COBOL (1960), PL/I\
    \ (1964), ALGOL (1965), ML (1973), Modula (1975), Ada (1980), Common Lisp, MATLAB,\
    \ Objective-C (1984), C++ (1985), Erlang, Object Pascal (1986), Oberon, Perl (1987),\
    \ Fortran-90, Haskell (1990), Python (1991), Java, Ruby, JavaScript (1995), OCaml\
    \ (1996), C# (2000), D (2001), BlitzMax, eC (2004), F# (2005), Closure (2007),\
    \ Go (2009), Rust (2010), Dart, Elixir (2011), Elm (2012), F (2014), NEWP (2015).\
    \ All but four of them have been developed after C. It would be unfair to blame\
    \ C for not being modular.\n\nOne increasingly popular language that supports\
    \ modularization by design is Python. Creating a module in Python is ridiculously\
    \ easy: any Python file is already a module. The name of the module is the name\
    \ of the file, less the `py` extension. For example, file `jsontool.py` [here](here)\
    \ contains a module called `jsontool`. If you’ve ever written any file in Python,\
    \ you’ve written a Python module.\n\nTo (re)use a module in your Python program,\
    \ you must import it with one of the following statements:\n\n```\nimport jsontool\n\
    from jsontool import json_read # import just json_read\nfrom jsontool import *\
    \ # import everything\n```\n\nThe three key differences between a C file and a\
    \ Python module are:\n\n1.  To refer to a Python module’s object from outside\
    \ that module, you usually use its fully qualified name, which consists of the\
    \ module name and the object name. Function `read_json` from module `jsontool`\
    \ is known as `jsontool.json_read` unless you use the `from` form of the `import`,\
    \ which is also possible but not advised. You may have more than one function\
    \ with the same name defined in different modules. For example, you may have a\
    \ family of input/output modules (such as `json`, `xml`, and `csv`), each having\
    \ the functions `read` and `write` and providing a consistent and easily memorizable\
    \ interface. The qualified names are a blessing. In C, all names are flat, they\
    \ end up in the same name space.\n\n2.  The second difference is both a blessing\
    \ and a curse. Unlike C, Python is a *dynamically typed language*: the type of\
    \ a variable or a value returned from a function is determined at runtime and\
    \ can be changed. The good news is that you don’t need a header file to ensure\
    \ that the caller’s expectations of a function match its implementation. No such\
    \ mechanism even exists in Python! The bad news is that the caller won’t know\
    \ if the module’s implementation changed, potentially leading to inconsistency.\
    \ As you already know from the example [here](here), the inconsistency will likely\
    \ manifest itself at runtime, when it’s already too late to fix it.\n\n3.  To\
    \ end on a positive note: the third difference is also in favor of Python modules.\
    \ Any C program must have the `main` function. Any reusable C file must be combined\
    \ with another code fragment (often called a *driver*). The driver provides the\
    \ `main` function that calls functions from the file—say, for testing purposes.\
    \ Not that writing a driver is a big deal, but it’s tedious and inflexible. A\
    \ Python module may have a dual nature: when imported from another unit, it’s\
    \ a module (a collection of functions and variables) but when called alone, it’s\
    \ a complete program.\n\nThis duality is accomplished by having the variable `__name__`.\
    \ The value of this variable is automatically set by the Python interpreter (`python`\
    \ itself). When another module imports the module, `__name__` evaluates to the\
    \ imported module’s name. Otherwise, it evaluates to `\"__main__\"`, a not so\
    \ subtle reference to C’s `main` function. The bottom of `jsontool.py` might look\
    \ like this:\n\n```\n# All functions and variables are somewhere above ^^^^^\n\
    def main():\n    # Do all business logic -- or testing! -- here\n    pass\n\n\
    if __name__ == \"__main__\":\n    main()\n```\n\nNaturally, the name of the called\
    \ function doesn’t have to be `main`.\n\nPython’s interpreted nature supports\
    \ the duality and other friendly and not so friendly features of Python modules.\
    \ The interpreter discovers imported modules and integrates them into the execution\
    \ environment at runtime as needed. On the other hand, C traditionally has been\
    \ a compiled language. A C program is translated into machine code before the\
    \ execution. (C interpreters exist, but they’re not mainstream.) The CPU executes\
    \ the code with no idea about files, modules, interfaces, and even the C language\
    \ in mind. If it had any idea of these things, the rest of this book would be\
    \ futile.\n\nIn the next chapter, you’ll learn how to pre-compile C code intended\
    \ for reuse to reduce development time and protect your intellectual property.\
    \ You’ll also see how to organize the resulting *object files* into static and\
    \ dynamic libraries.\n\n## Chapter 2\n\n## Reuse Code at Link Time (C Only)\n\n\
    Separating a project into several compilation units is the first small step toward\
    \ code reuse. But compile-time code reuse has some limitations. Fully exposing\
    \ shared source code to other programmers may be undesirable for corporate and\
    \ legal reasons. Additionally, you don’t want to recompile all units for every\
    \ project build, especially if the project is large. (For example, in 2015, Linux\
    \ consisted of 40,000 files.) You can improve build performance and code security\
    \ by precompiling modules into object files and later arranging them into libraries."
