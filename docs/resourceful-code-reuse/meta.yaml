  raw:
  - '[PAGE 59]


    These considerations are true for almost any library, static or shared. A static
    library has its unique strengths but also its Achilles’ heels.


    On the positive side, when you link your program with static libraries, you eliminate
    many external dependencies. (Don’t forget to pass `-static` to the linker if you
    have both a static and a shared library with the same name!) If you disable the
    standard C runtime and the standard C library with the `--nostdlib` option, your
    program depends only on the system calls. It’s expected to behave identically
    on all systems, as long as they provide the same API, such as Ubuntu, Debian,
    and Red Hat flavors of Linux. Statically linked tools are often included in “rescue
    kits” used to recover a system after an unsuccessful upgrade or intrusion, when
    the shared libraries are damaged, compromised, or missing. As a corollary, statically
    linked programs are also insensitive to upgrade-related surprises.


    But the immunity to upgrades, in general, isn’t necessarily desirable. To upgrade
    a statically linked program, you must relink it—and to relink it, you must maintain
    the object files that aren’t parts of any library. If any constituent object file
    is missing, you cannot upgrade the program anymore. Bummer.


    Size-wise, a static library not explicitly designed for a project behaves like
    a leech on your program’s body. Consider the worst offender: `libc.a` with the
    coincidence cohesion. Surely you want any program of yours to call at least some
    input or output function, perhaps `printf` or `scanf`. Both of them are defined
    in `libc.a`, so linking a 5MB `libc.a` is a must. After linking with a static
    `libc.a`, anything as simple as `puts("Hello, world!")` becomes a 5MB program
    on the disk (not a big deal) and a 5MB process in the RAM (possibly a big deal).
    The linker isn’t smart enough to statically link select members from a library.'
  - '[PAGE 60]


    To add insult to injury, a static library cannot be physically shared between
    multiple processes. (If it could, we wouldn’t need shared libraries!) It’s an
    integral part of a program’s code. Once attached to the rest of the program, it
    cannot be identified and detached. It’s in the address space of the running process.
    The operating system protects it from intentional or incidental accesses by other
    processes, even if those processes execute the same program. The decision not
    to share code leads to a waste of RAM. There you are, staring at the trade-off
    between reliability and memory footprint, one of those Scylla-and-Charybdis scenarios
    of modern computing.


    To regain some sense of balance, you need shared libraries.'
  - '[PAGE 61]


    # Building Dynamic Libraries


    As the name suggests, a dynamic library (also known as a shared library) is in
    the first place a library: a collection of object files that have something in
    common. But unlike a static library, it is dynamic. What’s the difference?


    # Understanding Dynamic Linking


    The first difference between a static library and a dynamic library is in the
    name. The extension of a dynamic library on Linux/macOS is `so` (“shared object,”
    such as `libmyjson.so`). Microsoft calls them “dynamic linked libraries” with
    the extension `dll`, as in `libmyjson.dll`.


    The second difference is in the way a library is linked to the rest of the program.
    A static library is permanently linked to an executable file, and each process
    has its copy of the library. On the bright side, a statically linked program’s
    functionality isn’t affected by library upgrades, specifically by disappearing
    libraries. (Think about what may happen if you incidentally remove the standard
    C library `libc`!) On the dark side, statically linked programs pollute memory
    (hello, Occam!) and aren’t affected by library upgrades. It might sound like a
    contradiction to say that not being affected by library upgrades is both the bright
    and dark side, but it is true. Sometimes, you want to replace libraries with better,
    faster, and more secure versions. Such replacement won’t work in the static libraries’
    case. The introduction of dynamic libraries makes the dark side brighter but the
    bright side darker.


    In some sense, a dynamic library is linked to an executable file twice: at the
    proper link time and at runtime.


    At the link time, the linker checks the unresolved global references against the
    dynamic libraries and ensures that they are valid: that functions like `json_syntax`
    and variables like `json_errno` indeed exist. But'
  - '[PAGE 62]


    the linker doesn’t replace their addresses’ placeholders with the actual addresses
    because dynamic libraries aren’t integrated in executable files yet. The linker
    annotates the placeholders with the names of the dynamic libraries that contain
    the symbols. The linker puts a great deal of trust in the system environment:
    it assumes that if a symbol is in some dynamic library at the moment of linking,
    it’ll be in the library at runtime, which, frankly, may or may not be true.


    When you run the program, the unresolved symbols’ availability must be checked
    once again (because who knows if their “host” libraries are still around?) and
    resolved to the actual addresses. The program in charge of runtime linking is
    called a loader (ld.so on Linux).


    The rest of the story depends on whether your programs have already used the requested
    libraries.


    If a dynamic library has been recently used or is currently used by any program,
    then the library code may already be in the RAM. Remember you learned that dynamic
    libraries are also known as shared libraries? That’s why! A shared library isn’t
    attached to any particular process. Any running program can use any shared function
    at any time. When the loader loads the program code, it resolves the unresolved
    symbols. Luckily, the names of the libraries that contain the symbols are already
    known because they were stored in the program earlier at the linking stage.


    What if a library needed by a program hasn’t been used so far? The loader will
    then find the library file (so or dll) and load it—if the library still exists
    and can be found in some predefined location (more about predefined locations
    [here](https://example.com)).


    Before you build your dynamic libraries, let’s find out what libraries a typical
    program uses. On Linux, you can check which dynamic libraries are required by
    a program by running the ldd—the shared object dependencies displayer. On macOS,
    the closest to ldd is otool -L, but it'
