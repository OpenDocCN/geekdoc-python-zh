    \ data structures seem similar on the surface, they may have different implementations:\
    \ C strings are `NULL`-terminated, but Pascal strings store their length in the\
    \ first byte and don't have a terminator. At the hardware level, the byte orders\
    \ for integers and floating-point numbers may differ, too. The caller must convert\
    \ the parameters to some mutually acceptable, widely agreed-upon, programming\
    \ language--agnostic representation. The representation used by the standard RPC\
    \ is called eXternal Data Representation (XDR, see [A Note on XDR](A Note on XDR)).\
    \ In brief, XDR provides routines for converting any C data structure into opaque\
    \ blobs and back. This operation is known as *marshaling* or serialization. You\
    \ first met serialization [here](here) in the context of JSON. In truth, JSON\
    \ could be used for serialization, too, but XDR is venerable and more compact.\n\
    \n    Remember, RPC allows only one parameter to pass. If your remote function\
    \ requires several parameters, the caller must combine them in one blob at this\
    \ step.\n\n2.  The caller puts together the blob with the parameters and the function\
    \ ID number and sends them to the server program—for example, as a UDP datagram.\n\
    \n3.  The server program receives the datagram and unmarshals (extracts) the parameters\
    \ and the function ID number.\n\n4.  The server program calls the requested function\
    \ and collects the return value.\n\n5.  The server program marshals the return\
    \ value and sends it back to the client program—for example, as a UDP datagram.\n\
    \n6.  The caller receives the datagram and unmarshals the return value. And that’s\
    \ the end of the remote procedure call.\n\n> **A Note on XDR**\n> A part of the\
    \ standard C library libc, the eXternal Data Representation (XDR) format and the\
    \ accompanying functions aren’t used exclusively for remote procedure calls. XDR\
    \ allows data transfer across different languages, operating systems, and hardware\
    \ architectures. You can use XDR functions to serialize arrays (xdr_array), Boolean\
    \ values (xdr_bool), characters, Pascal-style counted byte strings, C-style NULL-terminated\
    \ strings, integers and floating-point numbers, enums, structs, unions, and even\
    \ memory fragments with pointers to them.\n\nAs an application developer, you\
    \ may want to spare yourself the boredom of sending, receiving, and other housekeeping.\
