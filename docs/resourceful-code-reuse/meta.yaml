    \ stealthily performs function-name-to-ID-number translation, marshaling, unmarshaling,\
    \ and networking. Once the stub is complete, you can call it from your code as\
    \ if it were a local function, thus reusing the remote code. Moreover, you can\
    \ package the remote code and the stubs, providing convenient and consistent access\
    \ to remote libraries.\n\nOriginally, the idea behind RPC was that you would call\
    \ a remote function or a local function in the same way, perhaps even without\
    \ knowing whether the function code ran on localhost elsewhere. The idea would\
    \ work in the world of unbelievably friendly and incredibly reliable networks,\
    \ but it doesn’t work in the real world. Real networks aren’t friendly: the required\
    \ function may not be available, or you may not be authorized to call it. Real\
    \ networks aren’t reliable (especially UDP/IP networks) because when congested,\
    \ they’re allowed to drop UDP datagrams, including your function call requests\
    \ and return values. No matter how hard you try, the caller will still tell a\
    \ local call from a remote call.\n\nThat’s not to say that code reuse via RPC\
    \ is a joke. In many cases RPC or an RPC-like service is a blessing. RPC services\
    \ provide access to code written in different languages, compiled for other operating\
    \ systems, running on incompatible hardware, and subject to restrictive licenses.\
    \ If implemented correctly, RPC can be used for parallelization and load balancing,\
    \ shifting computationally expensive jobs to other computers. Not surprisingly,\
    \ [Joe Armstrong](Arm13) built the whole Erlang programming language with RPC\
    \ in mind. You can start a new Erlang thread executing an Erlang function on any\
    \ Erlang *node*, where “node” is a humble name for a networked computer. So, without\
    \ further ado, let’s proceed to an RPC example in the C language.\n\n## RPC Example\n\
    \nOne of the workhorses of the RPC subsystem is the monstrosity called `enum clnt_stat\
