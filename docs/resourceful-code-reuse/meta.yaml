    ## Dependencies and Separate Compilation


    Hopefully, you''re convinced that compiling a C file into an object file makes
    your code more protected against reverse engineering and possibly against IP theft.
    That is one of the promises of this book. Let''s get to another promise: increased
    speed.


    Once a source file is compiled into an object file, you don''t need to recompile
    it—as long as you don''t change it. We say that an object file *depends* on the
    source file. It also depends on all header files included in the source file.
    After preprocessing, they become integral parts of the source file. A change in
    any included header file may lead to recompilation. Conversely, if the source
    file and any of the included files don''t change, the object file shouldn''t change,
    either.


    You can think of your project as a graph of dependencies between files. Each object
    file depends on at least one source file and probably on a bunch of your header
    files. Almost any C file also depends on some system header files (such as `stdio.h`
    and `string.h`), but the system headers are much more stable. You may treat them
    as relative invariants.


    For a large project, you may want to visualize the graph using *component diagrams*
    from the Unified Modeling Language (UML) or other diagramming tools. Sadly, UML
    has become a rare, almost extinct, species in programmers’ tool chests. If you’re
    intrigued, consult the excellent UML books by [Fowler](https://martinfowler.com/)
    [Fow03] and [Larman](https://www.craiglarman.com/) [Lar04].


    Understanding dependencies leads to better packaging, as you will see in [Building
    Static Libraries](https://www.example.com/). Understanding dependencies can also
    dramatically reduce project build time. If a source file changes, you must recompile
    only those object files that depend on it. You don’t need to modify any other
    object files in the project. You simply need to separate the build process into
    the compile stage (with the “compile but don’t link” option -c) and the link stage
    like this:


    ```

    /home/dzreuse/> cc -c myjsontool.c -o myjsontool.o

    /home/dzreuse/> cc -c json_syntax.c -o json_syntax.o

    /home/dzreuse/> cc -c json_tokens.c -o json_tokens.o

    /home/dzreuse/> cc myjsontool.o json_syntax.o json_tokens.o -o jsontool

    ```


    Welcome to *separate compilation*!


    Compare these four commands to the single command [here](https://www.example.com/).
    At first glance, executing one command might look faster than executing four.
    But that appearance is deceptive. The original command always takes the same long
    time. Of the four commands previously shown, only the last one is inescapable.
    The other three are executed together only in the worst case scenario, during
    the original or the final build. In the best case, you can compile only one file.
    In general, the build time is determined by the dependencies: the more dependencies
    are activated by the source files’ changes, the longer the build is.


    ## Don’t Put All Your Eggs in One Header File


    ![](img/c0b6e19a136e7361a7284f5c371b1d8b_44_0.png)


    Having several small header files included in source files as needed is better
    than having one comprehensive header file included in all source files. If you
    change the comprehensive header file, you’ll have to recompile all source files,
    even if they aren’t affected by the change. Having many small header files minimizes
    the risk of recompiling. But having too many of them makes the dependencies hard
    to manage. Try to find the right balance.


    ## Mixing Languages


    An added benefit of separate compilation is the ability to write different parts
    of a project in different languages, as long as the language implementations have
    the same calling convention and the same idea of the runtime. “There is no single
    programming language suitable for all needs and goals,” says Michael Scott [Sco15].
    For example, it’s not uncommon to mix C with C++ or Fortran. C++ even has a special
    designation for external C functions and variables: extern "C".


    When I was a Ph.D. student, I worked on a project that combined a Prolog-based
    user interface and Fortran numerical libraries. We later replaced Prolog with
    Tcl/Tk (who cares about Tcl/Tk now?) and used C as the glue. Eventually, we got
    rid of Fortran and replaced Tcl/Tk with Python. It still worked like a charm.


    ## Creating a Make File


    We’re almost finished with our discussion of object files and separate compilation.
    You might wonder how it’s humanly possible to keep track of all those dependencies
    in a real project with 40,000 files. Enter make, a program that determines which
    project units need to be recompiled, based on a description of their dependencies,
    and then issues the commands to recompile them.


    make is an unbelievably handy and underestimated utility. It can do so much more
    than I said in the previous paragraph. Simply replace the word “recompile” with
    “update,” and we are suddenly talking about a tool that enforces dependencies
    and updates components whenever they need it. The components don’t even have to
    be program files. They can be documents, images, spreadsheets, and so on. A program
    so grand deserves a separate book. I’ll give you a glimpse of make’s features
    and refer you to [Small, Sharp Software Tools [Hog19]](https://example.com) for
    more details.


    You start a make project by writing a make file. The name of the make file may
    be anything, but if it’s makefile or Makefile, then make finds it without additional
    hints.


    A make file consists of definitions and rules. The definitions are like assignment
    statements in Python. In our following Makefile example, the definitions are on
    lines 1 through 5. Variable EXE contains the executable file’s name; variables
    SRCS and OBJS contain lists of source and object files, respectively (not necessarily
    in the same order). Variable CFLAGS is predefined and contains a list of flags
    passed to the C compiler. The value of variable X is $(X).


    Rules start after line 6. A rule represents a dependency between a target and
    its prerequisites and describes the actions needed to update the target. The first
    rule defines a phony target all that symbolizes not a particular file but the
    whole project. When you type make on the command line, make attempts to build
    this target. The target depends on the file jsontool, which is the value of the
    variable EXE. The target is shown before the colon. The prerequisites are shown
    after the colon on the same line.


    ```

    Makefile

    1:  EXE = jsontool

    -   SRCS = myjsontool.c json_syntax.c json_tokens.c

    -   REUSABLE_OBJS = json_syntax.o json_tokens.o

    -   OBJS = myjsontool.o $(REUSABLE_OBJS)

    5:  CFLAGS = -Wall -g # Show all warnings; include debug info

    -

    -   all: $(EXE)

    -

    -   jsontool: $(OBJS)

    -       $(CC) $(OBJS) -o $(EXE)

    10:

    -

    -   clean:

    -       rm -f $(OBJS) $(EXE) depend

    -

    -   depend: $(SRCS)

    15:

    -

    -       $(CC) -MM $(SRCS) > depend

    -

    -   include depend

    ```


    make updates the target if the dependency is violated. A dependency is violated
    if any prerequisite is newer than the target, meaning that a prerequisite was
    changed but the target hasn''t been updated yet. make expects that executing the
    actions on the second line of a rule will update the target. The first rule has
    a null action. It merely says: “To update all, please update jsontool in whatever
    way it’s supposed to be updated,” which takes us to the second rule.


    > **Making vs. Raking**

    > The Ruby programming language uses a make-style build system. Being Ruby, it
    takes great pride in starting with an “r.” Thus, Ruby''s make is called rake,
    and Ruby''s Makefile is called Rakefile. While working on this book in the late
    Fall of 2020, I did a lot of raking: literally, in my backyard, and figuratively,
    building the manuscript.


    The target of the second rule is jsontool. It depends on each object file. If
    any object file changes (because it was recompiled), the target must change, too,
    by relinking the object files. An object file, in turn, depends on the namesake
    C file. make is an intelligent program and recognizes trivial dependencies without
    special rules.


    The target clean doesn''t depend on anything. You update it unconditionally by
    removing all reproducible files: the object files and the executable file.


    As a matter of fact, the dependence of an object file on the source file isn''t
