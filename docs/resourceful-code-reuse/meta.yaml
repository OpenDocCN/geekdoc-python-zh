    \ running before the first service request arrives. Either start the server program\
    \ manually (as in [RPC Example](RPC Example)) or configure your operating system\
    \ to start it in the boot sequence.\n\nYou should execute these steps only once,\
    \ and the server side is now ready. Here's the client-side sequence for each remote\
    \ call:\n\n1.  The caller and function being called may be written in different\
    \ programming languages with different data structures. For example, the server\
    \ program may be a C program that expects to pass a `struct` to the called function,\
