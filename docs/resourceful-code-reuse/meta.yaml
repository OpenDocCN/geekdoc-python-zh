    \ Calls\n\nRemember the function `read_json` that you called over and over again\
    \ directly and in different disguises? In this section, `read_json` is a part\
    \ of another program on another computer, and you’ll still be able to call it.\
    \ Welcome to the fantastic world of remote procedure calls. (By the way, for the\
    \ rest of this book, assume that “procedure” is a synonym of “function.”)\n\n\
    > Remote procedure calls take at most one parameter.\n\nRemote procedure calls\
    \ are fundamentally different from local procedure calls in two ways. First, the\
    \ caller and the callee communicate via a network (typically, a UDP/IP network).\
    \ Second, they don’t share the address space. The first difference limits the\
    \ size of the parameter and return value (usually to 8 kB). The second difference\
    \ prevents the use of pointers, which means that you should reconsider the way\
    \ `read_json` behaves.\n\nLet’s assume that `read_json` takes two parameters.\
    \ The first is a file name. The second is a path to an element within the file\
    \ (for example, a colon-separated character string of array indexes and object\
    \ keys). As you’ll see shortly in *RPC Basics*, a remote procedure can take only\
    \ one parameter. It could be a `struct` or an array, but it’s much easier to create\
    \ one parameter by joining the file name and the path, say, with another colon.\
    \ For example, string `\"somefile.json:2:bar:11\"` refers to the 11th item in\
    \ the array with the key `\"bar\"` in the 2nd object in the top-level array in\
    \ the file `somefile.json`. The function reads the file and finds and returns\
    \ the requested item, also as a string. The new function isn’t perfect, but it’s\
    \ not insane and reflects the spirit of RPC. Let’s call the new function `char\
    \ *read_json_item(char *fullpath)` and look at how it works.\n\n## RPC Basics\n\
    \nA remote procedure call requires two programs: a client that makes the call\
    \ and a server program that executes the call. The programs may or may not run\
    \ on the same computer, as long as a reliable network connection between the two\
    \ exists. Preparation for a call involves the following steps:\n\n1.  Service\
    \ discovery. The client must find a server that provides the service of interest,\
    \ such as `read_json_item`. Service discovery uses a network-based, possibly distributed\
    \ service registry and a programming language--agnostic protocol such as JSON-RPC\
    \ ([https://spec.open-rpc.org](https://spec.open-rpc.org)). (Keep in mind that\
    \ \"JSON-RPC\" is a protocol. Don't confuse it with general JSON.) Service discovery\
    \ is a vast topic well beyond the scope of this book. Let's assume that the server\
    \ program is running on `localhost`.\n\n    The server program has a unique numeric\
    \ ID and a version number. Each service provided by the server program also has\
    \ a unique numeric ID. For example, `read_json_item` may be known as service number\
    \ 1 provided by the server program number `0x1234567`, version 1 (see the file\
    \ `rpc/json.x` [here](here)). It's assumed that you know the ID of the service\
    \ that you want to call.\n\n2.  Port mapping. On the remote side, the RPC subsystem\
    \ uses a port mapper utility (such as `rpcbind`) to associate server programs\
    \ with UDP/IP or TCP/IP port numbers. Later on, the port mapper will redirect\
    \ a request for a service from the server program number `0x1234567` to the port\
    \ associated with that server program. Make sure that a port mapper runs on the\
    \ remote computer! If it doesn't, install and start one.\n\n3.  Service initialization.\
