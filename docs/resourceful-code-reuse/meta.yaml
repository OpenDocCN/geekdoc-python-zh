  md: 'Working with a dynamically loaded library (which is, of course, a shared piece
    of previously written code!) consists of at least four steps. You may need more
    steps for more sophisticated tasks.


    +   1. Start by opening the file that contains the overlay library and load it
    into memory (dlopen-test.c:8). Beware: at this moment, the library code, with
    all its inefficiencies, bugs, and malware, becomes an almost indistinguishable
    part of your program code!


    The function `dlopen` expects two parameters: the path to the file and flags.
    The flags are optional. If you don''t know what flags to use, use none by passing
    a 0. In the example, the flag `RTLD_LAZY` instructs `dlopen` to perform “lazy
    binding.” The loader will resolve imported functions’ names only when the main
    program attempts to use them. If you never use a function, its name is never resolved,
    making loading a bit faster.


    > Error reporting in functions that implement dynamic loading is different from
    the standard C library.


    The function `dlopen` returns an opaque handle, a void pointer not meant to be
    interpreted by the caller (think `FILE*`). If the function fails, which may happen
    for many reasons, but most likely because the library isn''t found or is corrupted,
    the handle is `NULL`. In that case, don''t continue! Report an error message with
    `char *dlerror` and take alternative action. Oh, and `perror` doesn''t report
    errors related to `libdl`.


    +   2. Your next task is to find the function you want to call or the global variable
    you want to access. Both are symbols bound to some memory addresses either previously
    or, in the case of lazy binding, right at this point in time. You provide the
    symbol name—say, "read_json"—to the function `dlsym` and let the function resolve
    the symbol for you (dlopen-test.c:15). What you get back from `dlsym` is the address
    of the function in memory represented as `void*`.'
