    \ of interest directly, you’d roughly need lines 23 through 30. Remote calls come\
    \ at a price!\n\nTo complete the RPC project, you should retrofit the server program’s\
    \ skeleton with the remote function definitions. The remote function matching\
    \ the local function `read_json_item_1` is called `read_json_item_1_svc`. It takes\
    \ two parameters: a pointer to the original function parameter (possibly a combination\
    \ of several caller-side parameters, see above) and a pointer to `struct svc_req`\
    \ that contains some additional information about the call (including possible\
    \ authentication information).\n\nThe result of the execution must be declared\
    \ static. (I didn’t explain local static variables in the sidebar [here](https://example.com)\
    \ for nothing!) The function must return the address of the result. If the result\
    \ isn’t static, its address becomes invalid after returning from the function.\n\
    \n```\nc\nrpc/json_remote.c\n\n// remote function(s); called by server program\n\
    #include <stdlib.h>\n```"
  merge: -1
  pgno: 85
- img_proc: true
  md: "```\n#include <rpc/rpc.h>\n#include \"json.h\"\n\nchar **read_json_item_1_svc(char\
    \ **arg1, struct svc_req *arg2) {\n    static char *retval; // Required, MUST\
    \ be static\n\n    // Let's simply return the path after the first \":\"\n   \
    \ retval = *arg1;\n    strtok(retval, \":\");\n    retval = strtok(NULL, \"\"\
    );\n\n    return &retval; // Required\n}\n```\n\nAnd here's the project's make\
    \ file that runs the RPC compiler and compiles and links an RPC client and an\
    \ RPC server.\n\n```\nrpc/Makefile\n\n1:  all: client server\n2:\n3:  json_svc.c\
    \ json_clnt.c json.h: json.x\n4:          rpcgen json.x\n5:\n6:  client: json_clnt.o\
    \ json_rpctest.o\n7:          $(CC) -o client json_clnt.o json_rpctest.o\n8:\n\
    9:  server: json_svc.o json_remote.o\n10:         $(CC) -o server json_svc.o json_remote.o\n\
    ```\n\nYou can now build the full project, initialize the server program, and\
    \ test the client. (I start both programs on the localhost for lack of another\
    \ computer, but you can try to run them separately.)\n\n```\n/home/dzreuse> make\n\
    ...copious output...\n/home/dzreuse> ./server & ./client localhost\n2:bar:11\n\
    ```"
  merge: -1
  pgno: 86
- img_proc: true
  md: 'Don''t forget to terminate the server when you don''t need it anymore! It keeps
    running in the background, waiting for more code to share with other clients.


    ![](img/c0b6e19a136e7361a7284f5c371b1d8b_87_0.png)


    Congratulations! You''ve completed your code reuse journey. You started at a monolithic,
    seemingly indivisible, and seemingly nonreusable C file. You arrived at an elaborate,
    flexible, distributed RPC client-server system.


    The monolithic coding style is frowned upon, but the RPC-based approach isn''t
    for every project, either. The optimal solution, as always, is somewhere in the
    middle. It''s perfectly fine to reuse and share well-documented C files if compilation
    speed and intellectual property rights aren''t at stake. If they are, then precompiled
    object files (hopefully, still well-documented!) work much better. When more than
    one object file is involved (especially if the source files are written in different
    languages) a static library, a dynamic library, or both are better containers.
    In particular, you may reuse a shared library at runtime when a need for it arises.


    Choose the option that works best for your project. Happy code reuse to you!'
  merge: -1
