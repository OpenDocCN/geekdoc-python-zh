    \n> 共享代码是有风险的，但这种风险通常是值得的。\n\n不，不，不。动态加载不会在指令级别修改代码。它添加和移除完整的模块，这些模块至少在理论上可以追溯到其源代码及其开发者。虽然将来源不明的第三方代码引入你的程序地址空间确实是一项有风险的业务，但从长远来看，它并不比将你的程序链接到第三方库风险更大。"
