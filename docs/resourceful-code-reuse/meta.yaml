  md: '# Preface


    I took my first and only academic course in software engineering in the fall of
    1994. The course was taught by Professor Peter Henderson, who had spent a quarter
    of a century at Stony Brook University and retired shortly after my graduation.
    The course was taught in Smalltalk, the mother of all object-oriented languages,
    and was undeniably excellent. Sadly, I have never had another chance to write
    a line of code in Smalltalk and barely remember what it looked like.


    What I do remember is the mantra that Professor Henderson recited over and over
    again, until it got imprinted into my mind, from the top of my head to my fingertips:
    “Thou shalt use make files and reuse your code.” Ever since, I’ve started every
    new non-trivial project by writing a makefile and spending a ridiculous amount
    of time dissecting the job into potentially reusable units. In this book, I want
    to share with you my passion for code reuse and code organization and the skills
    that support that passion.'
  merge: -1
  pgno: 8
- img_proc: true
  md: '# About the Reader


    This book is mainly intended for beginner through intermediate software developers
    in C and, to a much lesser extent, in Python, who want to achieve higher productivity,
    better code quality, and more flexible and adaptable products by reusing and organizing
    previously written code. Experience with command-line software development tools
    is helpful but not required.'
  merge: -1
  pgno: 9
- img_proc: true
  md: '# About the Book


    After the mandatory introduction that sets the scene for the story, the book goes
    over three stages of small project development: editing (producing the project’s
    text in a programming language), compiling (converting the text into object files
    with machine code), and linking (combining the pre-compiled object files into
    one executable program file). Any unit produced at any stage can be reused and
    shared at a later stage, including the runtime when there is no more development.
    The rest of the book is organized into three chapters focused on these topics:
    compile-time reuse, link-time reuse, and runtime reuse.


    I tried to keep the chapters as independent as possible but still ended up with
    some backward and forward references. The forward references are not so essential
    for understanding the material, but if you open the book in the middle and come
    across a backward reference that you do not recognize, I strongly suggest visiting
    it.'
  merge: -1
