    \n最初，RPC 背后的想法是你将以相同的方式调用远程函数或本地函数，甚至可能不知道函数代码是在本地主机还是其他地方运行。这个想法在极其友好和极其可靠的网络世界中会奏效，但在现实世界中行不通。现实网络并不友好：所需的函数可能不可用，或者你可能没有被授权调用它。现实网络不可靠（尤其是\
