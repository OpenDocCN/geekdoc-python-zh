- md: "## Chapter 1\n\n## Reuse Code at Compile Time (C and Python)\n\nCompile-time\
    \ reuse is about organizing your program’s source code into potentially reusable\
    \ and somewhat independent files, known as *compilation units*. Compile-time reuse\
    \ is language-specific. In this chapter you’ll see two approaches: the C way (splitting\
    \ your code into source and header files) and the Python way (creating modules).\
    \ Let’s start with the C way, out of respect for the language’s age.\n\n## Arranging\
    \ Source and Header Files (the C Way)\n\nProper code reuse can be challenging\
    \ because it requires a specific mind-set. A common mistake that even professional\
    \ programmers make is putting all their code in the same file like this:\n\n```c\n\
    // jsontool.c\n\n#include <stdio.h>  // For input/output\n#include <stdlib.h>\
    \ // For EXIT_SUCCESS or EXIT_FAILURE\n#include <stdbool.h> // For bool, false,\
    \ and true\n\ntypedef struct JSON_Object {\n    // Lots of lines of code here\n\
    \    // ...\n} JSON_Object;\n\n// Lots of helper functions, data types, and global\
    \ variables\n\nint json_errno = 0;\nbool read_boolean(FILE* infile) { /* ... */;\
    \ return false; }\nchar *read_string(FILE* infile) { /* ... */; return NULL; }\n\
    void *obscure_helper() { /* ... */; return NULL; }\n// ...\n\n// JSON parser and\
    \ writer\nJSON_Object *read_json(char *fname) {\n    JSON_Object *object = NULL;\n\
    \    // Lots of lines of code here\n    // ...\n    return object;\n}\n\nint write_json(char\
    \ *fname, JSON_Object *object) {\n    int status = 0;\n    // Lots of lines of\
    \ code here\n    // ...\n    return status;\n}\n\n// Business logic\nstatic JSON_Object\
    \ *do_stuff(JSON_Object *json) {\n    // Lots of lines of code here\n    // ...\n\
    \n    return json;\n}\n\nint main() {\n    JSON_Object *json = read_json(\"their_file.json\"\
    );\n\n    if(!json) return EXIT_FAILURE;\n\n    // Do some processing\n    json\
    \ = do_stuff(json);\n\n    if(!write_json(\"my_json.json\", json))\n        return\
    \ EXIT_FAILURE;\n\n    puts(\"Success!\");\n    return EXIT_SUCCESS;\n}\n```\n\
    \nThese programmers will then compile the program with their favorite C compiler,\
    \ get an executable file, and run it:\n\n```\n/home/dzreuse/> cc jsontool.c -o\
    \ jsontool\n/home/dzreuse/> ./jsontool\nSuccess!\n```\n\nCode reuse aside, this\
    \ is an excellent C program! It’s (hopefully) correct, concise, and easy to write,\
    \ and it follows natural human logic. The program defines a data structure, implements\
    \ helper functions, uses them to implement the parser and the writer, and uses\
    \ the parser and the writer to solve the problem.\n\nSadly, it has two issues:\
    \ it’s inefficient from a C compiler’s point of view, and it’s virtually not reusable.\n\
    \nA C compiler always translates one compilation unit at a time, typically the\
    \ whole C file with all header files (such as `stdio.h`) pasted into it verbatim.\
    \ If you change only one line or character in a C or header file, the whole unit\
    \ must be recompiled. As your program grows, compilation takes longer. If you\
    \ want to make your program compile faster, you must make compilation units smaller.\
    \ I’ll show you how to take advantage of this splitting in by using what is known\
    \ as *separate compilation* in [Compiling Object Files](Compiling Object Files).\n\
    \nBut let’s get to the point of reusability. Why is the code [here](here) not\
    \ suitable for reuse? Because it solves a specific problem: it parses a JSON file,\
    \ transforms it in a specific way, and writes it into another file. Since the\
    \ code is an indivisible compilation unit, no function from the file can be used\
    \ in any other project except by copying and pasting it into a text editor—but\
    \ copying and pasting code hurts its maintainability and consistency and blunts\
    \ Occam’s razor. And since the code already has the `main` function, it cannot\
    \ become a part of any other project as a whole.\n\nHere’s the bottom line: a\
    \ monolithic program file written in the C language is slow to compile and hard\
    \ (frankly, impossible) to reuse. let’s break the compilation unit into several\
    \ smaller units and see if it helps.\n\nA long and tedious list [here](here) goes\
    \ to great lengths to enumerate the ways of decomposing *components* (functions,\
    \ data types, and global variables) into somewhat coherent collections. For now,\
    \ if your file isn’t insanely large yet, you can split it into a more reusable\
    \ input/output part (JSON support) and a non-reusable business logic part (JSON\
    \ processing). Use your best judgment to estimate each function’s propensity to\
    \ be included in another project in the future. Ask yourself: “How likely is it\
    \ that I or someone else I know or can think of will require the operation implemented\
    \ in this function?” If the answer is “more than likely,” that function belongs\
    \ to the reusable part. If the answer is “unlikely,” it belongs to the non-reusable\
    \ part. It’s okay to make a mistake! Splitting a compilation unit is a *wicked\
    \ problem*: it doesn’t have one correct answer.\n\nOh, and place *all* functions\
    \ called from any potentially reusable function into the same reusable part or\
    \ provide a way to combine parts. A function won’t work without its dependencies!\n\
    \nOn a closer look, the non-reusable part probably consists of the [main](https://example.com/main)\
    \ function and the function that implements the business logic of the [jsontool](https://example.com/jsontool).\
    \ Let’s call that part “business logic.” The helper functions, the parser, and\
    \ the writer are likely in the reusable part. You may further subdivide the reusable\
    \ part into two more parts.\n\nA programmer may use the helper functions that\
    \ read and write strings, numbers, Boolean values, and the like in any project\
    \ that requires reading such elements—this is our “JSON tokens” part. And just\
    \ as “J” in “JSON” doesn’t mean JavaScript anymore, “JSON” in “JSON tokens” doesn’t\
    \ refer exclusively to JSON tokens but to any JSON-like tokens.\n\nIn contrast,\
    \ the parser and the writer are JSON-specific. Their applicability area is JSON\
    \ processing; they’re useless in a non-JSON project and belong to a “JSON syntax”\
    \ part.\n\nLet’s not forget that the “JSON syntax” part depends on the “JSON tokens”\
    \ part. The latter may exist on its own but not the other way around.\n\nNote\
    \ that these functions aren’t members of any Python class. Unlike C++ classes\
    \ and C programs, Python and Java classes are monolithic. They cannot be split\
    \ into separate compilation units. Designing for code reuse in an object-oriented\
    \ language is a topic for another book.\n\nThere may be various helper functions\
    \ and global variables in the example program, such as `read_string` for reading\
    \ quoted strings, `read_boolean` for reading boolean values, `read_array` for\
    \ reading an array in square brackets, and even the fictitious and suspiciously\
    \ named `obscure_helper` whose job is to optimize the inner machinery of `read_json`.\
    \ The variable `json_errno` holds the code of the most recent error in any JSON-related\
    \ function (similar to the variable `errno` from the standard C library file `errno.h`).\n\
    \nFinally, bear in mind that this book doesn’t explain how to parse, process,\
    \ or generate JSON. The book treats the functions previously mentioned as “black\
    \ boxes” that you could and would develop independently. This approach allows\
    \ you to concentrate on the reuse practices rather than on the domain-specific\
    \ details.\n\nThe stage is set. We’re ready to look at the first round of code\
    \ reuse techniques, and we’ll start with compile-time reuse.\n\nHere is how to\
    \ declare the same object and functions in Python:\n\n```python\n# jsontool.py\n\
    \ndef read_json(fname):\n    object = None\n    # Lots of lines of code here -\
    \ but fewer than in C!\n    # ...\n    return object\n\ndef write_json(fname,\
    \ object):\n    status = 0\n    # Fewer lines of code here - we love Python for\
    \ its brevity!\n    # ...\n    return status\n```"
