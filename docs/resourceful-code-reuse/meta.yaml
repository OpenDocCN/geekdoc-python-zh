    The three key differences between a C file and a Python module are:


    +   1. To refer to a Python module’s object from outside that module, you usually
    use its fully qualified name, which consists of the module name and the object
    name. Function `read_json` from module `jsontool` is known as `jsontool.json_read`
    unless you use the `from` form of the `import`, which is also possible but not
    advised. You may have more than one function with the same name defined in different
    modules. For example, you may have a family of input/output modules (such as `json`,
