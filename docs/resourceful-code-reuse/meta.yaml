- md: '# The Pragmatic Programmers


    # Resourceful Code Reuse


    Write → Compile → Link → Run


    ![](img/c0b6e19a136e7361a7284f5c371b1d8b_0_0.png)


    Dmitry Zinoviev

    edited by Adaobi Obi Tulton


    # Resourceful Code Reuse


    Write → Compile → Link → Run


    by Dmitry Zinoviev


    Version: P1.0 (April 2021)


    Copyright © 2021 The Pragmatic Programmers, LLC. This book is licensed to the
    individual who purchased it. We don''t copy-protect it because that would limit
    your ability to use it for your own purposes. Please don''t break this trust—you
    can use this across all of your devices but please do not share this copy with
    other members of your team, with friends, or via file sharing services. Thanks.


    Many of the designations used by manufacturers and sellers to distinguish their
    products are claimed as trademarks. Where those designations appear in this book,
    and The Pragmatic Programmers, LLC was aware of a trademark claim, the designations
    have been printed in initial capital letters or in all capitals. The Pragmatic
    Starter Kit, The Pragmatic Programmer, Pragmatic Programming, Pragmatic Bookshelf
    and the linking g device are trademarks of The Pragmatic Programmers, LLC.


    Every precaution was taken in the preparation of this book. However, the publisher
    assumes no responsibility for errors or omissions, or for damages that may result
    from the use of information (including program listings) contained herein.


    ## About the Pragmatic Bookshelf


    The Pragmatic Bookshelf is an agile publishing company. We''re here because we
    want to improve the lives of developers. We do this by creating timely, practical
    titles, written by programmers for programmers.


    Our Pragmatic courses, workshops, and other products can help you and your team
    create better software and have more fun. For more information, as well as the
    latest Pragmatic titles, please visit us at [http://pragprog.com](http://pragprog.com).


    Our ebooks do not contain any Digital Restrictions Management, and have always
    been DRM-free. We pioneered the beta book concept, where you can purchase and
    read a book while it''s still being written, and provide feedback to the author
    to help make a better book for everyone. Free resources for all purchasers include
    source code downloads (if applicable), errata and discussion forums, all available
    on the book''s home page at pragprog.com. We''re here to make your life easier.


    ## New Book Announcements


    Want to keep up on our latest titles and announcements, and occasional special
    offers? Just create an account on [pragprog.com](pragprog.com) (an email address
    and a password is all it takes) and select the checkbox to receive newsletters.
    You can also follow us on twitter as @pragprog.


    ## About Ebook Formats


    If you buy directly from [pragprog.com](pragprog.com), you get ebooks in all available
    formats for one price. You can synch your ebooks amongst all your devices (including
    iPhone/iPad, Android, laptops, etc.) via Dropbox. You get free updates for the
    life of the edition. And, of course, you can always come back and re-download
    your books when needed. Ebooks bought from the Amazon Kindle store are subject
    to Amazon''s polices. Limitations in Amazon''s file format may cause ebooks to
    display differently on different devices. For more information, please see our
    FAQ at [pragprog.com/#about-ebooks](pragprog.com/#about-ebooks). To learn more
    about this book and access the free resources, go to [https://pragprog.com/book/dzreuse](https://pragprog.com/book/dzreuse),
    the book''s homepage.


    Thanks for your continued support,


    Andy Hunt

    The Pragmatic Programmers


    The team that produced this book includes: Dave Rankin (CEO),

    Janet Furlow (COO), Tammy Coron (Managing Editor),

    Adaobi Obi Tulton (Development Editor), Corina Lebegioara (Copy Editor),

    Andy Hunt and Dave Thomas (Founders)


    For customer support, please contact [support@pragprog.com](mailto:support@pragprog.com).


    For international rights, please contact [rights@pragprog.com](mailto:rights@pragprog.com).


    ## Table of Contents


    Acknowledgments


    Preface


    - About the Reader

    - About the Book

    - About the Software


    Introduction: Why Reuse Code?


    - C vs. Python

    - Running Example


    1. Reuse Code at Compile Time (C and Python)


    - Arranging Source and Header Files (the C Way)

    - Modularizing Code (the Python Way)


    2. Reuse Code at Link Time (C Only)


    - Compiling Object Files

    - Building Static Libraries

    - Building Dynamic Libraries


    3. Reuse Code at Runtime (C and Python)


    - Harnessing Dynamic Loading

    - Getting a Taste of Remote Procedure Calls


    ## Bibliography


    ## Early Praise for *Resourceful Code Reuse*


    *Resourceful Code Reuse* offers readers a quick way to understand how code is
    compiled and linked using the C language within the modern context of consuming
    and processing JSON.


    → Mike Riley

    President, Ingenious Solutions, Inc.


    Every developer should know about the concepts described in this book. Even if
    you don’t use C and Python in your daily work, you will learn something about
    software development and how to reuse code.


    → Dominik Hauser

    Author of *Build Location-Based Projects for iOS*


    Everyone can code, but writing beautiful code requires code reuse skills. Whether
    you are starting coding or you have broad experience, this book offers a practical
    guide that allows you to optimize your code by applying code reuse techniques.


    → Jose Arturo Mora Soto

    Senior Curriculum Engineer, 2U Inc.


    ## Acknowledgments


    This is my second book edited by Adaobi Obi Tulton and, just like the first book,
    it would not be possible without her enthusiasm, dedication, and highest professionalism.
    Thank you, Adaobi.


    I am grateful to my reviewers (in alphabetical order): Ludovico Fischer, Dominik
    Houser, Andy Lester, Mike Riley, Jose Arturo Mora Soto, and Ilya Usvyatsky. Their
    criticism was refreshening and energizing. Their reviews greatly improved the
    structure, usability, and style of the book. Thank you, reviewers.


    My wife, Anna; my children, Eugenia and Roman; my colleagues from Suffolk University
    (especially Pelin Bicen) and my friends (especially Dmitry and Tanya Cherevik)
    provided much-needed emotional support. Thank you, my supporters.


    Last but not least, I am grateful to Desbenoit [https://thenounproject.com/term/reuse/6786/](https://thenounproject.com/term/reuse/6786/)
    for the royalty-free image [here](https://thenounproject.com/term/reuse/6786/).


    ## Preface


    I took my first and only academic course in software engineering in the fall of
    1994. The course was taught by Professor Peter Henderson, who had spent a quarter
    of a century at Stony Brook University and retired shortly after my graduation.
    The course was taught in Smalltalk, the mother of all object-oriented languages,
    and was undeniably excellent. Sadly, I have never had another chance to write
    a line of code in Smalltalk and barely remember what it looked like.


    What I do remember is the mantra that Professor Henderson recited over and over
    again, until it got imprinted into my mind, from the top of my head to my fingertips:
    “Thou shalt use make files and reuse your code.” Ever since, I’ve started every
    new non-trivial project by writing a makefile and spending a ridiculous amount
    of time dissecting the job into potentially reusable units. In this book, I want
    to share with you my passion for code reuse and code organization and the skills
    that support that passion.


    ## About the Reader


    This book is mainly intended for beginner through intermediate software developers
    in C and, to a much lesser extent, in Python, who want to achieve higher productivity,
    better code quality, and more flexible and adaptable products by reusing and organizing
    previously written code. Experience with command-line software development tools
    is helpful but not required.


    ## About the Book


    After the mandatory introduction that sets the scene for the story, the book goes
    over three stages of small project development: editing (producing the project’s
    text in a programming language), compiling (converting the text into object files
    with machine code), and linking (combining the pre-compiled object files into
    one executable program file). Any unit produced at any stage can be reused and
    shared at a later stage, including the runtime when there is no more development.
    The rest of the book is organized into three chapters focused on these topics:
    compile-time reuse, link-time reuse, and runtime reuse.


    I tried to keep the chapters as independent as possible but still ended up with
    some backward and forward references. The forward references are not so essential
    for understanding the material, but if you open the book in the middle and come
    across a backward reference that you do not recognize, I strongly suggest visiting
    it.'
