    ## 关于务实书架


    务实书架是一家敏捷出版公司。我们在此是因为我们希望改善开发者的生活。我们通过创建及时、实用的书籍来实现这一目标，这些书籍由程序员为程序员而写。


    我们的务实课程、研讨会和其他产品可以帮助您和您的团队创建更好的软件并获得更多乐趣。有关更多信息以及最新的务实书籍，请访问我们的网站 [http://pragprog.com](http://pragprog.com)。


    我们的电子书不包含任何数字版权管理，并且始终是无DRM的。我们开创了测试版书籍的概念，您可以在书籍仍在撰写时购买和阅读，并向作者提供反馈，以帮助为每个人制作更好的书籍。所有购买者均可获得的免费资源包括源代码下载（如适用）、勘误和讨论论坛，所有这些都可在书籍主页
    pragprog.com 上找到。我们在此是为了让您的生活更轻松。


    ## 新书公告


    想了解我们的最新书籍和公告，以及偶尔的特别优惠吗？只需在 [pragprog.com](pragprog.com) 上创建一个账户（只需一个电子邮件地址和密码），并选择复选框以接收新闻通讯。您也可以在
    Twitter 上关注我们，账号为 @pragprog。


    ## 关于电子书格式


    如果您直接从 [pragprog.com](pragprog.com) 购买，您将获得所有可用格式的电子书，只需支付一次费用。您可以通过 Dropbox 在所有设备（包括
    iPhone/iPad、Android、笔记本电脑等）之间同步您的电子书。在版本有效期内，您可以获得免费更新。当然，您也可以随时返回并重新下载您的书籍。从
    Amazon Kindle 商店购买的电子书受 Amazon 政策的约束。Amazon 文件格式的限制可能导致电子书在不同设备上显示不同。有关更多信息，请参阅我们的常见问题解答
    [pragprog.com/#about-ebooks](pragprog.com/#about-ebooks)。要了解有关本书的更多信息并访问免费资源，请访问本书主页
    [https://pragprog.com/book/dzreuse](https://pragprog.com/book/dzreuse)。


    感谢您持续的支持，


    安迪·亨特

    务实的程序员


    本书的制作团队包括：戴夫·兰金（CEO）、珍妮特·弗洛（COO）、塔米·科伦（执行编辑）、阿达奥比·奥比·图尔顿（开发编辑）、科琳娜·莱贝吉奥阿拉（文字编辑）、安迪·亨特和戴夫·托马斯（创始人）。


    如需客户支持，请联系 [support@pragprog.com](mailto:support@pragprog.com)。


    如需国际版权事宜，请联系 [rights@pragprog.com](mailto:rights@pragprog.com)。


    ## 目录


    致谢


    前言


    - 关于读者

    - 关于本书

    - 关于软件


    引言：为何要复用代码？


    - C 与 Python

    - 运行示例


    1. 在编译时复用代码（C 和 Python）


    - 安排源文件和头文件（C 方式）

    - 模块化代码（Python 方式）


    2. 在链接时复用代码（仅限 C）


    - 编译目标文件

    - 构建静态库

    - 构建动态库


    3. 在运行时复用代码（C 和 Python）


    - 利用动态加载

    - 初探远程过程调用


    ## 参考文献


    ## 对《代码复用之道》的早期赞誉


    《代码复用之道》为读者提供了一种快速理解在现代 JSON 消费和处理背景下，如何使用 C 语言编译和链接代码的方法。


    → 迈克·莱利

    Ingenious Solutions, Inc. 总裁


    每位开发者都应该了解本书中描述的概念。即使您在日常工作中不使用 C 和 Python，您也会学到一些关于软件开发以及如何复用代码的知识。


    → 多米尼克·豪瑟

    《为 iOS 构建基于位置的项目》作者


    每个人都可以编码，但编写优美的代码需要代码复用技能。无论您是刚开始编码还是拥有丰富经验，本书都提供了一份实用指南，允许您通过应用代码复用技术来优化代码。


    → 何塞·阿图罗·莫拉·索托

    2U Inc. 高级课程工程师


    ## 致谢


    这是阿达奥比·奥比·图尔顿编辑的我的第二本书，就像第一本书一样，如果没有她的热情、奉献和最高的专业精神，这是不可能的。谢谢你，阿达奥比。


    我感谢我的审稿人（按字母顺序排列）：卢多维科·费舍尔、多米尼克·豪瑟、安迪·莱斯特、迈克·莱利、何塞·阿图罗·莫拉·索托和伊利亚·乌斯维亚茨基。他们的批评令人耳目一新，充满活力。他们的审阅极大地改善了本书的结构、可用性和风格。谢谢你们，审稿人。


    我的妻子安娜；我的孩子叶夫根尼亚和罗曼；我在萨福克大学的同事（特别是佩林·比森）和我的朋友（特别是德米特里和坦尼娅·切列维克）提供了急需的情感支持。谢谢你们，我的支持者们。


    最后但同样重要的是，我感谢 Desbenoit [https://thenounproject.com/term/reuse/6786/](https://thenounproject.com/term/reuse/6786/)
    提供的免版税图片 [此处](https://thenounproject.com/term/reuse/6786/)。


    ## 前言


    我在1994年秋季参加了我的第一门也是唯一一门软件工程学术课程。这门课程由彼得·亨德森教授讲授，他在石溪大学工作了四分之一个世纪，并在我毕业后不久退休。这门课程使用面向对象语言之母
    Smalltalk 讲授，无疑是优秀的。遗憾的是，我再也没有机会用 Smalltalk 写过一行代码，也几乎不记得它是什么样子了。


    我确实记得的是亨德森教授一遍又一遍重复的箴言，直到它深深印在我的脑海里，从头顶到指尖：“汝当使用 make 文件并复用汝之代码。”从那时起，我开始每个新的非平凡项目时，都会先编写一个
    makefile，并花费大量时间将任务分解为潜在可复用的单元。在本书中，我想与您分享我对代码复用和代码组织的热情，以及支持这种热情的技能。


    ## 关于读者


    本书主要面向 C 语言的初级到中级软件开发者，以及在较小程度上使用 Python 的开发者，他们希望通过复用和组织先前编写的代码来实现更高的生产力、更好的代码质量以及更灵活、更适应性强的产品。使用命令行软件开发工具的经验会有所帮助，但并非必需。


    ## 关于本书


    在设定了故事背景的必要引言之后，本书回顾了小型项目开发的三个阶段：编辑（用编程语言生成项目的文本）、编译（将文本转换为包含机器码的目标文件）和链接（将预编译的目标文件组合成一个可执行程序文件）。在任何阶段产生的任何单元都可以在后续阶段复用和共享，包括没有更多开发工作的运行时阶段。本书的其余部分分为三个章节，重点讨论这些主题：编译时复用、链接时复用和运行时复用。


    我试图让各章节尽可能独立，但最终还是有一些前后引用。前向引用对于理解材料并非至关重要，但如果您从书中间开始阅读，并遇到一个您不熟悉的后向引用，我强烈建议您去查看它。'
