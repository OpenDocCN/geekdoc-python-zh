    for reuse? Because it solves a specific problem: it parses a JSON file, transforms
    it in a specific way, and writes it into another file. Since the code is an indivisible
    compilation unit, no function from the file can be used in any other project except
    by copying and pasting it into a text editor—but copying and pasting code hurts
    its maintainability and consistency and blunts Occam’s razor. And since the code
    already has the `main` function, it cannot become a part of any other project
    as a whole.


    Here’s the bottom line: a monolithic program file written in the C language is
    slow to compile and hard (frankly, impossible) to reuse. let’s break the compilation
    unit into several smaller units and see if it helps.


    A long and tedious list [here](here) goes to great lengths to enumerate the ways
    of decomposing *components* (functions, data types, and global'
  - '[PAGE 24]


    variables) into somewhat coherent collections. For now, if your file isn’t insanely
    large yet, you can split it into a more reusable input/output part (JSON support)
    and a non-reusable business logic part (JSON processing). Use your best judgment
    to estimate each function’s propensity to be included in another project in the
    future. Ask yourself: “How likely is it that I or someone else I know or can think
    of will require the operation implemented in this function?” If the answer is
    “more than likely,” that function belongs to the reusable part. If the answer
    is “unlikely,” it belongs to the non-reusable part. It’s okay to make a mistake!
    Splitting a compilation unit is a *wicked problem*: it doesn’t have one correct
    answer.


    Oh, and place *all* functions called from any potentially reusable function into
    the same reusable part or provide a way to combine parts. A function won’t work
    without its dependencies!


    On a closer look, the non-reusable part probably consists of the [main](https://example.com/main)
    function and the function that implements the business logic of the [jsontool](https://example.com/jsontool).
    Let’s call that part “business logic.” The helper functions, the parser, and the
    writer are likely in the reusable part. You may further subdivide the reusable
    part into two more parts.


    A programmer may use the helper functions that read and write strings, numbers,
    Boolean values, and the like in any project that requires reading such elements—this
    is our “JSON tokens” part. And just as “J” in “JSON” doesn’t mean JavaScript anymore,
    “JSON” in “JSON tokens” doesn’t refer exclusively to JSON tokens but to any JSON-like
    tokens.


    In contrast, the parser and the writer are JSON-specific. Their applicability
    area is JSON processing; they’re useless in a non-JSON project and belong to a
    “JSON syntax” part.


    Let’s not forget that the “JSON syntax” part depends on the “JSON tokens” part.
    The latter may exist on its own but not the other way'
- md: "around. If you plan to reuse the “JSON syntax” components, you should reuse\
    \ the “JSON tokens” too.\n\nYou’ll have to apply the same classification procedure\
    \ to the data types. Once the components are nicely categorized, we’ll use a few\
    \ technical tricks to separate the compilation unit into three units by following\
    \ these steps:\n\n1.  Physically move the content into three files.\n2.  Hide\
    \ the global variables that aren’t global anymore.\n3.  Create a header file:\
    \ an interface to the new source files.\n\n## Splitting the File\n\nThe first\
    \ step is straightforward. Using your favorite text editor, such as emacs or vi,\
    \ cut the reusable components from jsontool.c and paste them into one or two other\
    \ files. Let’s say, for the sake of consistency, the files are json_syntax.c and\
    \ json_tokens.c. The leftover non-reusable components go in a file called myjsontool.c.\
    \ But beware: other than json_tokens.c, you cannot compile any file anymore, either\
    \ separately or together! The compiler complains about an unknown type name JSON_Object,\
    \ an implicit declaration of function read_json, the making of a pointer from\
    \ an integer, and other things.\n\nThe new arrangement’s problem is that a typical\
    \ C compiler (unlike a Java compiler) isn’t smart enough to find the data types,\
    \ variables, and functions defined in other files. When you move the definition\
    \ of JSON_Object to the file json_syntax.c, it becomes unavailable in the other\
    \ two files. The file json_tokens.c doesn’t use JSON_Object, so it’s not affected\
    \ by the split, but myjsontool.c does and is. When you move the declaration of\
    \ read_json, it becomes unavailable in the other two files. A typical C compiler\
    \ assumes that a function whose declaration (the prototype) isn’t available takes\
    \ integer parameters and returns an integer value. The assignment statement on\
    \ line jsontool.c:40 attempts to convert an integer number (presumably returned\
    \ by read_json) to a JSON_Object*, which often works but causes a warning and,\
    \ when the function returns a floating-point number, is wrong.\n\nLet’s assume\
    \ that the global variable json_errno drifts into json_tokens.c (things won’t\
    \ change if you place json_tokens.c into any other file). When processing the\
    \ other two files, the compiler doesn’t know json_errno’s data type, doesn’t make\
    \ any assumptions, and aborts with an error.\n\nBefore you’ll see how to address\
    \ the lack of global visibility issue, let’s briefly do the opposite: hide a visible\
    \ function that isn’t supposed to be visible.\n\n## Hiding a Function\n\nFunction\
    \ obscure_helper on line myjsontool.c:14 is used only by the functions from json_syntax.c.\
    \ It isn’t and probably shouldn’t be used anywhere outside of that file. Yet,\
    \ by default, a function name in C has the global scope: it’s visible anywhere\
    \ in the project (which is the opposite of data types and variables). Most of\
    \ the time, global visibility is not a concern unless you try to define a function\
    \ with the same popular name in another file.\n\nIt’s considered good practice\
    \ to keep local functions local, known to C programmers as being static:\n\n```\n\
    static void *obscure_helper() { /* ... */; return NULL; }\n```\n\nAs a rule of\
    \ thumb, you can mark all functions static and try to compile your code. If the\
    \ compiler complains about the implicit declaration of function xxx and later\
    \ the linker complains about an undefined reference to xxx, then xxx is used outside\
    \ of the file in which it’s defined. You can make it global again by removing\
    \ the static keyword. On the other hand, if you know for sure which functions\
    \ you plan to reuse, you can save a step and keep them global in the first place.\n\
    \nYou can apply the `static` keyword not only to functions but also to global\
    \ variables to the same effect. The scope of a static global variable is limited\
    \ to the file in which it’s defined. Both static global variables and static functions\
    \ are hidden from the rest of the project. They don’t pollute the global namespace\
    \ and cannot be called or altered, incidentally or maliciously, by the code outside\
    \ of the compilation unit. Static is as close as you get to privacy in C.\n\n\
    ## All Things Static\n\n![](img/c0b6e19a136e7361a7284f5c371b1d8b_27_0.png)\n\n\
    The `static` keyword, when applied to a *local* variable, means something entirely\
    \ different. A static variable in a function preserves its value after it goes\
    \ out of scope (when the enclosing function exits or calls another function or\
    \ itself recursively). The following little function implements a self-contained\
    \ up-counter. Every time you call it, it increments the embedded static counter\
    \ `count` and returns its new value.\n\n```\nunsigned counter() {\n    static\
    \ unsigned count = 0;\n    return ++count;\n}\n```\n\n> **All Things Static**\n\
    \nAs in the case of global variables, the `static` keyword protects `count` from\
    \ any external access. But the main benefit of `static` in this context is that\
    \ `count` isn’t initialized every time you call the function. That’s what makes\
    \ counting possible.\n\nNow that you know how to hide code components, let’s find\
    \ out how to expose them across file boundaries.\n\n## Creating a Header File\n\
    \nWhen a compiler compiles `myjsontool.c` or `json_syntax.c`, it needs to be aware\
    \ that the former depends on the latter and both depend, implicitly or explicitly,\
    \ on `json_tokens.c`. The compiler needs to know the definitions of the data structures\
    \ from those files. It also needs to know the global functions’ prototypes and\
    \ global variables’ data types.\n\nA function prototype, also known as a function\
    \ signature or declaration, is the first line of the function definition: the\
    \ function name, the types of its parameters, and the type of the return value.\
    \ A function prototype must match the full function definition, except that the\
    \ parameters’ names aren’t required in a prototype (because they’re names that\
    \ you can change painlessly).\n\nA prototype is a promise to the compiler: “Look,\
    \ this function isn’t available right now. Perhaps it’s defined in another C file\
    \ or a library ([Building Static Libraries](Building Static Libraries), and [Building\
    \ Dynamic Libraries](Building Dynamic Libraries)) or not even defined at all but\
    \ will be defined by the time we need it ([Harnessing Dynamic Loading](Harnessing\
    \ Dynamic Loading)). Rest assured that the function takes this many parameters\
    \ of such and such data types, and it returns such and such data type.” That’s\
    \ enough information for the compiler to compile the function call.\n\nHere’s\
    \ a prototype of `read_boolean`. Note the semicolon at the end and the absence\
    \ of the parameter name:\n\n```\nbool read_boolean(FILE*);\n```\n\nLike any other\
    \ promise, this promise may be broken—when the declared function is never defined.\
    \ The compiler alone cannot check your honesty. That would be the responsibility\
    \ of the linker. Ultimately, it’s the linker’s job to put all compiled code together.\
    \ If a piece is missing, linking fails.\n\nYou need a specific “promise word”\
    \ to declare global variables defined in other compilation units: `extern`. A\
    \ declaration with `extern` looks like any other variable declaration, except\
    \ that it doesn’t create an instance of the variable. It directs the compiler\
    \ to a variable that will become available at the link time. Here’s an external\
    \ declaration of `json_errno`:\n\n```\nextern int json_errno;\n```\n\nAt the compile\
    \ time, the compiler cannot determine the location of `json_errno` in memory.\
    \ It generates a placeholder (a *stub*) for the variable that’s later resolved\
    \ by the linker and replaced by (*bound to*) the actual address of `json_errno`.\n\
    \nAs far as data structures are concerned, no particular mechanism exists for\
    \ sharing them. You can redeclare them in each compilation unit.\n\nTo summarize,\
    \ you should inform the compiler in each compilation unit about all code components\
    \ defined in the other compilation units and libraries. You may end up adding\
    \ something like the following code snippet at the beginning of each file:\n\n\
    ```\ntypedef struct JSON_Object {\n    ...\n} JSON_Object;\n...\nextern int json_errno;\n\
    bool read_boolean(FILE*);\nchar *read_string(FILE*);\nvoid *obscure_helper();\n\
    JSON_Object *read_json(char*);\nint write_json(char*, JSON_Object*);\n...\n```\n\
    \nProblem solved! Ready to go! (Spoiler alert: Not yet.)\n\nTechnically, at this\
    \ point, you’re ready to go. You separated your project into three compilation\
    \ units, two of which are likely reusable. Compile the three files together, get\
    \ a single executable file, and enjoy:\n\n```\n/home/dzreuse/> cc myjsontool.c\
    \ json_syntax.c json_tokens.c -o jsontool\n```\n\nBut wait: replication of data\
    \ structures and functions’ and variables’ declarations inevitably leads to inconsistency.\
    \ What do you think happens if you change the declaration of a global variable,\
    \ a function, or a data type in the unit in which you define them? You must update\
    \ each external declaration to match the change. That’s fine, but let’s pretend\
    \ that you forget. (You are only human, after all.) Since the compiler isn’t trained\
    \ to detect changes happening in other files, it will compile your project using\
    \ the obsolete definitions because you promised that they were accurate. The mismatch\
    \ most probably won’t be detected by the linker: the linker blindly stitches together\
    \ the code blocks generated by the compiler. Suddenly, you have software that"
  mdcn: "如果你计划重用“JSON语法”组件，那么也应该重用“JSON令牌”。\n\n你需要对数据类型应用相同的分类过程。一旦组件被妥善分类，我们将使用一些技术技巧，按照以下步骤将编译单元拆分为三个单元：\n\
    \n1.  将内容物理移动到三个文件中。\n2.  隐藏那些不再是全局的全局变量。\n3.  创建一个头文件：作为新源文件的接口。\n\n## 拆分文件\n\
    \n第一步很直接。使用你最喜欢的文本编辑器，比如emacs或vi，将可重用的组件从jsontool.c中剪切出来，粘贴到一个或两个其他文件中。为了保持一致性，我们假设这些文件是json_syntax.c和json_tokens.c。剩余的不可重用组件放入一个名为myjsontool.c的文件中。但要注意：除了json_tokens.c，你无法再单独或一起编译任何文件！编译器会报错，提示未知的类型名JSON_Object、函数read_json的隐式声明、从整数创建指针以及其他问题。\n\
    \n新安排的问题在于，典型的C编译器（与Java编译器不同）不够智能，无法找到在其他文件中定义的数据类型、变量和函数。当你将JSON_Object的定义移动到文件json_syntax.c中时，它在其他两个文件中就变得不可用了。文件json_tokens.c不使用JSON_Object，因此不受拆分影响，但myjsontool.c使用了，所以受到了影响。当你移动read_json的声明时，它在其他两个文件中也变得不可用了。典型的C编译器会假设一个声明（原型）不可用的函数接受整数参数并返回整数值。jsontool.c第40行的赋值语句试图将一个整数（假设由read_json返回）转换为JSON_Object*，这通常有效但会导致警告，并且当函数返回浮点数时，这是错误的。\n\
    \n让我们假设全局变量json_errno漂移到了json_tokens.c中（如果你将json_tokens.c放入任何其他文件，情况也不会改变）。在处理其他两个文件时，编译器不知道json_errno的数据类型，不做任何假设，并以错误中止。\n\
    \n在你了解如何解决全局可见性问题之前，让我们先简要地做相反的事情：隐藏一个本不应可见的可见函数。\n\n## 隐藏函数\n\nmyjsontool.c第14行的函数obscure_helper仅被json_syntax.c中的函数使用。它不应该在该文件之外的任何地方使用。然而，默认情况下，C中的函数名具有全局作用域：它在项目中的任何地方都可见（这与数据类型和变量相反）。大多数情况下，全局可见性不是问题，除非你尝试在另一个文件中定义一个同名的流行函数。\n\
    \n将局部函数保持为局部函数被认为是良好的实践，C程序员称之为静态：\n\n```\nstatic void *obscure_helper() { /*\
    \ ... */; return NULL; }\n```\n\n根据经验法则，你可以将所有函数标记为static并尝试编译你的代码。如果编译器抱怨函数xxx的隐式声明，然后链接器抱怨对xxx的未定义引用，那么xxx在定义它的文件之外被使用了。你可以通过移除static关键字使其再次全局化。另一方面，如果你确切知道你计划重用哪些函数，你可以省去一步，从一开始就保持它们全局化。\n\
    \n你不仅可以将`static`关键字应用于函数，也可以应用于全局变量，效果相同。静态全局变量的作用域仅限于定义它的文件。静态全局变量和静态函数都对项目的其余部分隐藏。它们不会污染全局命名空间，也不能被编译单元之外的代码意外或恶意调用或更改。静态是C语言中最接近私有的东西。\n\
    \n## 一切皆静态\n\n![](img/c0b6e19a136e7361a7284f5c371b1d8b_27_0.png)\n\n当应用于*局部*变量时，`static`关键字意味着完全不同的东西。函数中的静态变量在离开作用域后（当包含函数退出、调用另一个函数或递归调用自身时）会保留其值。下面的小函数实现了一个自包含的向上计数器。每次调用它时，它都会递增内置的静态计数器`count`并返回其新值。\n\
    \n```\nunsigned counter() {\n    static unsigned count = 0;\n    return ++count;\n\
    }\n```\n\n> **一切皆静态**\n\n与全局变量的情况一样，`static`关键字保护`count`免受任何外部访问。但在此上下文中，`static`的主要好处是`count`不会在每次调用函数时都被初始化。这就是计数成为可能的原因。\n\
    \n既然你知道了如何隐藏代码组件，让我们找出如何跨文件边界暴露它们。\n\n## 创建头文件\n\n当编译器编译`myjsontool.c`或`json_syntax.c`时，它需要知道前者依赖于后者，并且两者都隐式或显式地依赖于`json_tokens.c`。编译器需要知道这些文件中数据结构的定义。它还需要知道全局函数的原型和全局变量的数据类型。\n\
    \n函数原型，也称为函数签名或声明，是函数定义的第一行：函数名、其参数的类型以及返回值的类型。函数原型必须与完整的函数定义匹配，只是原型中不需要参数名称（因为它们是可以轻松更改的名称）。\n\
    \n原型是对编译器的承诺：“听着，这个函数现在不可用。也许它在另一个C文件或库（[构建静态库](Building Static Libraries)和[构建动态库](Building\
    \ Dynamic Libraries)）中定义，或者甚至根本没有定义，但会在我们需要它的时候定义（[利用动态加载](Harnessing Dynamic\
    \ Loading)）。请放心，该函数接受这么多这种和那种数据类型的参数，并返回这种和那种数据类型。”这足以让编译器编译函数调用。\n\n这是`read_boolean`的原型。注意末尾的分号和参数名的缺失：\n\
    \n```\nbool read_boolean(FILE*);\n```\n\n像任何其他承诺一样，这个承诺可能会被打破——当声明的函数从未被定义时。仅靠编译器无法检查你的诚实。那将是链接器的责任。最终，将所有编译代码放在一起是链接器的工作。如果缺少一部分，链接就会失败。\n\
    \n你需要一个特定的“承诺词”来声明在其他编译单元中定义的全局变量：`extern`。带有`extern`的声明看起来像任何其他变量声明，只是它不创建变量的实例。它指示编译器一个将在链接时变得可用的变量。这是`json_errno`的外部声明：\n\
    \n```\nextern int json_errno;\n```\n\n在编译时，编译器无法确定`json_errno`在内存中的位置。它为该变量生成一个占位符（一个*存根*），该存根稍后由链接器解析并替换为（*绑定到*）`json_errno`的实际地址。\n\
    \n就数据结构而言，没有特定的共享机制。你可以在每个编译单元中重新声明它们。\n\n总结一下，你应该在每个编译单元中通知编译器所有在其他编译单元和库中定义的代码组件。你可能最终会在每个文件的开头添加类似以下的代码片段：\n\
    \n```\ntypedef struct JSON_Object {\n    ...\n} JSON_Object;\n...\nextern int\
    \ json_errno;\nbool read_boolean(FILE*);\nchar *read_string(FILE*);\nvoid *obscure_helper();\n\
    JSON_Object *read_json(char*);\nint write_json(char*, JSON_Object*);\n...\n```\n\
    \n问题解决了！准备出发！（剧透警告：还没。）\n\n从技术上讲，此时你已准备就绪。你将项目拆分为三个编译单元，其中两个可能可重用。将这三个文件一起编译，得到一个可执行文件，然后享受：\n\
    \n```\n/home/dzreuse/> cc myjsontool.c json_syntax.c json_tokens.c -o jsontool\n\
    ```\n\n但是等等：数据结构以及函数和变量声明的重复不可避免地会导致不一致。如果你在定义它们的单元中更改了全局变量、函数或数据类型的声明，会发生什么？你必须更新每个外部声明以匹配更改。这没问题，但让我们假装你忘记了。（毕竟，你只是凡人。）由于编译器没有经过训练来检测其他文件中发生的变化，它将使用过时的定义编译你的项目，因为你承诺它们是准确的。这种不匹配很可能不会被链接器检测到：链接器盲目地将编译器生成的代码块拼接在一起。突然间，你拥有了一个软件"
