    fantastic world of remote procedure calls. (By the way, for the rest of this book,
    assume that “procedure” is a synonym of “function.”)


    > Remote procedure calls take at most one parameter.


    Remote procedure calls are fundamentally different from local procedure calls
    in two ways. First, the caller and the callee communicate via a network (typically,
    a UDP/IP network). Second, they don’t share the address space. The first difference
    limits the size of the parameter and return value (usually to 8 kB). The second
    difference prevents the use of pointers, which means that you should reconsider
    the way `read_json` behaves.


    Let’s assume that `read_json` takes two parameters. The first is a file name.
    The second is a path to an element within the file (for example, a colon-separated
    character string of array indexes and object keys). As you’ll see shortly in *RPC
    Basics*, a remote procedure can take only one parameter. It could be a `struct`
    or an array, but it’s much easier to create one parameter by joining the file
    name and the path, say, with another colon. For example, string `"somefile.json:2:bar:11"`
    refers to the 11th item in the array with the key `"bar"` in the 2nd object in
    the top-level array in the file `somefile.json`. The function reads the file and
    finds and returns the requested item, also as a string. The new function isn’t
    perfect, but it’s not insane and reflects the spirit of RPC. Let’s call the new
    function `char *read_json_item(char *fullpath)` and look at how it works.


    # RPC Basics'
  - '[PAGE 79]


    A remote procedure call requires two programs: a client that makes the call and
    a server program that executes the call. The programs may or may not run on the
    same computer, as long as a reliable network connection between the two exists.
    Preparation for a call involves the following steps:


    +   1. Service discovery. The client must find a server that provides the service
    of interest, such as `read_json_item`. Service discovery uses a network-based,
    possibly distributed service registry and a programming language--agnostic protocol
    such as JSON-RPC ([https://spec.open-rpc.org](https://spec.open-rpc.org)). (Keep
    in mind that "JSON-RPC" is a protocol. Don''t confuse it with general JSON.) Service
    discovery is a vast topic well beyond the scope of this book. Let''s assume that
    the server program is running on `localhost`.


    The server program has a unique numeric ID and a version number. Each service
    provided by the server program also has a unique numeric ID. For example, `read_json_item`
    may be known as service number 1 provided by the server program number `0x1234567`,
    version 1 (see the file `rpc/json.x` [here](here)). It''s assumed that you know
    the ID of the service that you want to call.


    2. Port mapping. On the remote side, the RPC subsystem uses a port mapper utility
    (such as `rpcbind`) to associate server programs with UDP/IP or TCP/IP port numbers.
    Later on, the port mapper will redirect a request for a service from the server
    program number `0x1234567` to the port associated with that server program. Make
    sure that a port mapper runs on the remote computer! If it doesn''t, install and
    start one.


    3. Service initialization. As a rule, the server program doesn''t start itself,
    but it has to be up and running before the first service request arrives. Either
    start the server program manually (as in'
  - '[PAGE 80]


    [RPC Example](RPC Example) or configure your operating system to start it in the
    boot sequence.


    You should execute these steps only once, and the server side is now ready. Here''s
    the client-side sequence for each remote call:


    +   1. The caller and function being called may be written in different programming
    languages with different data structures. For example, the server program may
    be a C program that expects to pass a `struct` to the called function, but the
    caller is a Python script with no knowledge of `structs`. Even if the data structures
    seem similar on the surface, they may have different implementations: C strings
    are `NULL`-terminated, but Pascal strings store their length in the first byte
    and don''t have a terminator. At the hardware level, the byte orders for integers
    and floating-point numbers may differ, too. The caller must convert the parameters
    to some mutually acceptable, widely agreed-upon, programming language--agnostic
    representation. The representation used by the standard RPC is called eXternal
    Data Representation (XDR, see [A Note on XDR](A Note on XDR)). In brief, XDR provides
    routines for converting any C data structure into opaque blobs and back. This
    operation is known as *marshaling* or serialization. You first met serialization
    [here](here) in the context of JSON. In truth, JSON could be used for serialization,
    too, but XDR is venerable and more compact.


    Remember, RPC allows only one parameter to pass. If your remote function requires
    several parameters, the caller must combine them in one blob at this step.


    +   2. The caller puts together the blob with the parameters and the function
    ID number and sends them to the server program—for example, as a UDP datagram.


    +   3. The server program receives the datagram and unmarshals (extracts) the
    parameters and the function ID number.'
  - '[PAGE 81]


    +   4. The server program calls the requested function and collects the return
    value.

    5. The server program marshals the return value and sends it back to the client
    program—for example, as a UDP datagram.

    6. The caller receives the datagram and unmarshals the return value. And that’s
    the end of the remote procedure call.


    > **A Note on XDR**

    A part of the standard C library libc, the eXternal Data Representation (XDR)
    format and the accompanying functions aren’t used exclusively for remote procedure
    calls. XDR allows data transfer across different languages, operating systems,
    and hardware architectures. You can use XDR functions to serialize arrays (xdr_array),
    Boolean values (xdr_bool), characters, Pascal-style counted byte strings, C-style
    NULL-terminated strings, integers and floating-point numbers, enums, structs,
    unions, and even memory fragments with pointers to them.


    As an application developer, you may want to spare yourself the boredom of sending,
    receiving, and other housekeeping. You can write a so-called *stub function* `read_json_item_1`
    that looks almost like your original local function `read_json_item`, but with
    a few key differences. Your stub function takes the server’s location as an additional
    parameter and stealthily performs function-name-to-ID-number translation, marshaling,
    unmarshaling, and networking. Once the stub is complete, you can call it from
    your code as if it were a local function, thus reusing the remote code. Moreover,
    you can package the remote code and the stubs, providing convenient and consistent
    access to remote libraries.


    Originally, the idea behind RPC was that you would call a remote function or a
    local function in the same way, perhaps even without knowing whether the function
    code ran on localhost elsewhere. The idea'
  - '[PAGE 82]


    would work in the world of unbelievably friendly and incredibly reliable networks,
    but it doesn’t work in the real world. Real networks aren’t friendly: the required
    function may not be available, or you may not be authorized to call it. Real networks
    aren’t reliable (especially UDP/IP networks) because when congested, they’re allowed
    to drop UDP datagrams, including your function call requests and return values.
    No matter how hard you try, the caller will still tell a local call from a remote
    call.


    That’s not to say that code reuse via RPC is a joke. In many cases RPC or an RPC-like
    service is a blessing. RPC services provide access to code written in different
    languages, compiled for other operating systems, running on incompatible hardware,
    and subject to restrictive licenses. If implemented correctly, RPC can be used
    for parallelization and load balancing, shifting computationally expensive jobs
    to other computers. Not surprisingly, [Joe Armstrong](Arm13) built the whole Erlang
    programming language with RPC in mind. You can start a new Erlang thread executing
    an Erlang function on any Erlang *node*, where “node” is a humble name for a networked
    computer. So, without further ado, let’s proceed to an RPC example in the C language.


    # RPC Example


    One of the workhorses of the RPC subsystem is the monstrosity called `enum clnt_stat
    clnt_call(CLIENT *client, unsigned long proc_id, xdrproc_t inproc, char *in, xdrproc_t
    outproc, char *out, struct timeval timeout)`. This function attempts to call the
    remote function number `proc_id` associated with the client handle `client`. You
    can create the client handle with a call to `clnt_create(char *hostname, unsigned
    long prog_id, unsigned long prog_vers, char *protocol)`, as shown on line `rpc/json_rpctest.c:14`
    [here](rpc/json_rpctest.c:14). The client encapsulates the server `hostname`,
    the unique ID and version of the server program `prog_id` and `prog_vers`, and
    the suggested network `protocol`. `in` and `out` are the pointers to the parameters
    and the future return value, respectively. `inproc` and `outproc` are the functions
    for'
- md: "## RPC编程与代码重用\n\n### RPC调用与rpcgen工具\n\n使用`clnt_call`进行RPC调用既繁琐又具有挑战性。这就是为什么需要`rpcgen`——一个将用RPC接口定义语言（IDL）编写的远程服务描述编译成一堆C源文件和头文件的工具。不同的分布式系统使用不同的IDL。RPC\
    \ IDL，也称为RPCL，是一种C风格的语言，用于描述服务器程序以及该程序提供的所有函数的名称、版本、参数和返回值。\n\n以下文件是`read_json_item`函数的RPCL文件示例。如果计划重用多个函数，请将它们的RPCL定义添加到文件中，但需更改ID编号。注意扩展名为`.x`，函数名全部大写（RPCL不区分大小写）。\n\
    \n```\nrpc/json.x\n\nprogram JSONPROG {  /* server program name */\n    version\
    \ JSONVERS { /* server program version name */\n        string READ_JSON_ITEM(string\
    \ fullpath) = 1; /* function ID */\n    } = 1;\n} = 0x1234567;     /* unique server\
    \ program ID */\n```\n\nRPCL使用自己的类型名称。C字符串在它看来是`string`，而不是`char*`。\n\n在shell命令行（或从`rpc/Makefile:4`）执行`rpcgen\
    \ json.x`时，几乎神奇地会得到三个文件：`json_svc.c`、`json_clnt.c`和`json.h`。第一个文件包含服务器端代码，本质上实现了一个骨架UDP/IP或TCP/IP服务器程序。第二个文件包含客户端存根。头文件供你在双方代码中包含，以保证调用者和被调用者之间的一致性。\n\
    \n### 客户端调用示例\n\n以下调用方程序展示了在第23行对远程函数`read_json_item`的存根`read_json_item_1`的调用。第一个参数是JSON路径的地址（不是路径本身）。第二个参数是对先前构建的RPC客户端的引用。存根返回的值不是像本地函数调用者期望的那样是解引用的JSON路径，而是它的地址。返回值的内存由存根分配，并在第32行销毁客户端对象时释放。函数`clnt_perror`是`perror`和`dlerror`的RPC等价物。\n\
    \n```\nrpc/json_rpctest.c\n\n1:  // client program to test remote JSON service\n\
    -   #include <stdio.h>\n-   #include <stdlib.h>\n-   #include <rpc/rpc.h>\n5:\
    \  #include \"json.h\"\n-   \n-   int main(int argc, char *argv[])\n-   {\n- \
    \    if (argc != 2) {\n-       fprintf(stderr, \"USAGE: %s hostname\\n\", argv[0]);\n\
    10: \n-       return EXIT_FAILURE;\n-     }\n-     \n-     CLIENT *cl = clnt_create(argv[1],\
    \ JSONPROG, JSONVERS, \"udp\");\n-     if (!cl) {\n15: \n-       // couldn't establish\
    \ connection with server\n-       fprintf(stderr, \"can't establish connection\
    \ with host %s\\n\", argv[1]);\n-       return EXIT_FAILURE;\n-     }\n20: \n\
    ```\n\n```\nc\n// first call the remote procedure read_json()\nchar *fullpath\
    \ = \"somefile.json:2:bar:11\";\nchar **result = read_json_item_1(&fullpath, cl);\n\
    if (!result) {\n    clnt_perror(cl, \"read_json\");\n    return EXIT_FAILURE;\n\
    }\n\nprintf(\"%s\\n\", *result);\n// prints 2:bar:11\n\nclnt_destroy(cl); // done\
    \ with the handle\nreturn EXIT_SUCCESS;\n}\n```\n\n如果直接调用感兴趣的函数，大约需要第23到30行。远程调用是有代价的！\n\
    \n### 服务器端实现\n\n要完成RPC项目，你需要用远程函数定义改造服务器程序的骨架。与本地函数`read_json_item_1`匹配的远程函数名为`read_json_item_1_svc`。它接受两个参数：一个指向原始函数参数的指针（可能是多个调用方参数的组合，见上文），以及一个指向`struct\
    \ svc_req`的指针，其中包含关于调用的一些附加信息（包括可能的认证信息）。\n\n执行结果必须声明为`static`。（我并非无缘无故在侧边栏[这里](https://example.com)解释局部静态变量！）函数必须返回结果的地址。如果结果不是静态的，其地址在函数返回后将失效。\n\
    \n```\nc\nrpc/json_remote.c\n\n// remote function(s); called by server program\n\
    #include <stdlib.h>\n#include <rpc/rpc.h>\n#include \"json.h\"\n\nchar **read_json_item_1_svc(char\
    \ **arg1, struct svc_req *arg2) {\n    static char *retval; // Required, MUST\
    \ be static\n\n    // Let's simply return the path after the first \":\"\n   \
    \ retval = *arg1;\n    strtok(retval, \":\");\n    retval = strtok(NULL, \"\"\
    );\n\n    return &retval; // Required\n}\n```\n\n### 项目构建与测试\n\n以下是项目的Makefile，它运行RPC编译器并编译和链接RPC客户端与RPC服务器。\n\
    \n```\nrpc/Makefile\n\n1:  all: client server\n2:\n3:  json_svc.c json_clnt.c\
    \ json.h: json.x\n4:          rpcgen json.x\n5:\n6:  client: json_clnt.o json_rpctest.o\n\
    7:          $(CC) -o client json_clnt.o json_rpctest.o\n8:\n9:  server: json_svc.o\
    \ json_remote.o\n10:         $(CC) -o server json_svc.o json_remote.o\n```\n\n\
    现在你可以构建整个项目，初始化服务器程序，并测试客户端。（由于没有另一台计算机，我在localhost上启动两个程序，但你可以尝试分别运行它们。）\n\n\
    ```\n/home/dzreuse> make\n...copious output...\n/home/dzreuse> ./server & ./client\
    \ localhost\n2:bar:11\n```\n\n不要忘记在不再需要时终止服务器！它会在后台持续运行，等待与其他客户端共享更多代码。\n\n![](img/c0b6e19a136e7361a7284f5c371b1d8b_87_0.png)\n\
    \n恭喜！你已经完成了代码重用之旅。你从一个整体的、看似不可分割且不可重用的C文件开始，最终到达了一个精心设计的、灵活的、分布式的RPC客户端-服务器系统。\n\
    \n整体编码风格不被推崇，但基于RPC的方法也并非适用于每个项目。最佳解决方案，一如既往，介于两者之间。如果编译速度和知识产权不是问题，重用和共享文档完善的C文件是完全可以的。如果是，那么预编译的目标文件（希望仍然是文档完善的！）效果更好。当涉及多个目标文件时（特别是当源文件用不同语言编写时），静态库、动态库或两者都是更好的容器。特别是，你可以在需要时在运行时重用共享库。\n\
    \n选择最适合你项目的选项。祝你代码重用愉快！\n\n## 参考文献\n\n- [Arm13] Joe Armstrong. *Programming Erlang\
    \ (2nd edition)*. The Pragmatic Bookshelf, Raleigh, NC, 2nd, 2013.\n- [Fow03]\
    \ Martin Fowler. *UML Distilled: A Brief Guide to the Standard Object Modeling\
    \ Language*. Addison-Wesley Professional, Boston, MA, Third, 2003.\n- [Hog19]\
    \ Brian P. Hogan. *Small, Sharp Software Tools*. The Pragmatic Bookshelf, Raleigh,\
    \ NC, 2019.\n- [Lar04] Craig Larman. *Applying UML and Patterns: an Introduction\
    \ to Object-Oriented Analysis and Design and Iterative Development*. Prentice\
    \ Hall, Englewood Cliffs, NJ, Third, 2004.\n- [Sco15] Michael Scott. *Programming\
    \ Language Pragmatics*. Morgan Kaufmann Publishers, San Francisco, CA, Fourth,\
    \ 2015.\n\n谢谢！\n你喜欢这本书吗？请告诉我们。花点时间给我们发邮件至support@pragprog.com，分享你的反馈。告诉我们你的故事，你就有机会赢得免费电子书。请使用主题行“Book\
    \ Feedback”。\n\n准备好阅读你的下一本精彩的Pragmatic Bookshelf图书了吗？请访问[https://pragprog.com](https://pragprog.com)，使用优惠券代码BUYANOTHER2021，下一本电子书可享受30%的折扣。\n\
    \n在禁止、限制或不受欢迎的地方无效。请勿在水边使用电子书。如果出现皮疹，请咨询医生。不适用于*The Pragmatic Programmer*电子书，因为它比Pragmatic\
