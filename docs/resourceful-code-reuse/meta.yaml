    # It’s Not Time to Strip


    > You can remove the global symbols—the *linkage information*—from a dynamic library
    using the `strip` utility, but please don’t. If a dynamic library doesn’t have
    the linkage information, it cannot be linked to a program. The intended purpose
    of `strip` is to remove all symbols from a *ready* program to protect IP and inhibit
    reverse engineering.


    # On Magic


    The `file` utility attempts to classify a file based on three features: file extension,
    file magic, and file language. For example, a `c` file would be classified as
    a C file. A file with executable permission `x` is reported as executable. A file
    clearly written in Python must be a Python script. As far as “magic” is concerned,
    there’s no magic: some file formats begin with a fixed or regular prefix that’s
    called a “magic number.” For example, a GIF image file begins with `GIF89a`, and
    a JPEG image file starts with a string `"ÿd8ÿe0\x0010JFIF"`.


