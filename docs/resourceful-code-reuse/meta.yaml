  - '[PAGE 49]


    # Building Static Libraries


    A well-debugged, well-tested, and well-documented object file with several functions
    and global variables is an excellent reusable code unit. You can link it with
    your program to get access to the previously implemented features. Yet, there
    are two practical considerations related to object files:


    +   1. You should collect the relevant files in an archive and give it a descriptive
    name.


    Some people consider it inelegant to have more than one public function per file.
    In fact, in Java, it’s explicitly forbidden to have more than one public class
    per file. If you try to avoid having more than one public class or function per
    file, you may end up compiling several object files that together implement the
    desired functionality. You’ll have to tell the linker to link all of them. The
    more files you have, the more you tell the linker until you forget why all those
    objects files are on the linker’s command line. This is also true of the file
    names that probably match the names of the public functions, but not the name
    of the problem they collectively solve.


    Linking a descriptively named archive, rather than individual object files, will
    take some pressure off you.


    2. You should store that archive someplace where the linker can find it without
    your assistance. Notifying the linker about the locations of archives is a pain,
    and it becomes even more painful if the archive files move around.


    The easiest way to organize your object files in a collection is to build a static
    *library*—actually, libraries, because nobody puts all their'
  - '[PAGE 50]


    eggs in one basket, and neither should you. The files that belong to one library
    should have at least something in common, aside from all being object files, and
    the name of the library should reflect that commonality.


    In software engineering, the property of having something in common is called
    *cohesion*. Here are several cohesion types:


    +   - Functional cohesion: all routines in the library work toward a single goal.
    Example: flex/bison lexer/parser generators and the supporting library `libfl.a`.
    They can generate parsers and then parse—and nothing else.

    - Sequential cohesion: the outputs of some library routines are the inputs to
    other routines in the same library. Example: Python `pycrawl` module has tools
    for extracting a URL from an HTML document, validating it, and downloading it.

    - Communication cohesion: the routines in the library work on the same data. Example:
    in some sense, SQL and the underlying database management system.

    - Procedural cohesion: the routines in the library are typically executed one
    after another. Example: a library of all functions called directly from your program’s
    `main` function.

    - Temporal cohesion: the time of invocation is the binding factor. Example: `libini.a`,
    a library of routines for reading initialization files.

    - Logical cohesion: the routines seem generally related, but that is the only
    thing they share. Examples: the standard math library `libm.a`, and `libcrypt.a`,
    a cryptography toolset.'
  - '[PAGE 51]


    +   - Coincidental cohesion: the routines are there because they are, and why
    not, and who cares.Example: the most well-known C programming library, the standard
    C library libc.a, has coincidental cohesion.


    The desirability of the cohesion type decreases from the top to the bottom of
    the list. Alas, at the same time, the reusability of a library increases! Consider
    this extreme case: a coincidentally assembled standard C library is so reusable
    that the linker automatically links every C program to it. You must pass a particular
    option to the linker, --nostdlib or --nolibc, if you think you can survive without
    printf, malloc, exit, and other goodies. On the other hand, the flex/bison duo
    is a part of only those projects that deal with parsing text files (compilers,
    interpreters, translators). When was the last time you wrote any of those?


    Think of a coincidentally cohesive library as a first-aid kit and a functionally
    cohesive library as a million-dollar MRI machine. When you go hiking, you need
    the former; when you have unexplainable headaches, you need the latter. No single
    best rule exists to help you choose one over the other without knowing your project’s
    context and perspectives.


    Once you choose a cohesion type, the library building procedure is straightforward.
    Let’s start by choosing the library name.


    In a POSIX programming environment, a static library is a file whose name starts
    with the prefix lib-, followed by the name of the library, followed by the extension
    .a (from “archive”—because a static library is an indexed archive of functions).
    In the world of Microsoft Windows, the standard extension is .lib. The standard
    POSIX math library is called libm.a or libm.lib, where “m” stands for “math.”
    If your'
  - '[PAGE 52]


    static library is called foobar (a must-have for a seasoned programmer), the library’s
    file is called libfoobar.a or libfoobar.lib.


    The object files from our example ([Arranging Source and Header Files (the C Way)](https://example.com))
    provide tools for working with JSON files. A natural name for the library of such
    files is libjson.a. The name is short and descriptive, but unfortunately it’s
    already taken by an open-source project. When I come across an unavailable name
    that I want, I apply what I’ve learned from Perl coders and add “my” in front
    of the name: libmyjson.a. It’s incredible that nobody seems to be using this trick,
    except me (and now you, too).


    Once you have the library file’s name, you can consider ar: the POSIX tool for
    building static libraries. In truth, ar isn’t only a tool for building static
    libraries. It is also a tool for working with file archives: creating and modifying
    them and extracting archive members. The name ar is a tribute to a time when shortening
    a perfectly short word from seven characters to two at the expense of obfuscating
    it was considered excusable: ar[chive].


    > **Tape Archives**


    Early software developers acutely appreciated the value of archiving and archives.
    In addition to ar, which packed several files into one, they had another tool
    that also saved the new archive on a magnetic tape. The name of the tool was tar
    (t[ape] ar[chiver]), and the archive would have a namesake extension, .tar. Both
    tar and .tar files are still used in the POSIX universe. Sadly, archives produced
    by tar and ar are mutually incompatible.


    Like any other self-respecting POSIX utility, ar takes a plethora of command-line
    options. A single keyletter represents each option. For'
  - '[PAGE 53]


    compatibility reasons, `ar` allows you to omit the dash in front of an option.
    (Yet another similarity to `tar`!) The most useful keyletters are:


    +   - `d`—delete a member from an archive.

    - `m`—move a file into an existing archive.

    - `t`—print the list of archive members.

    - `p`—print the archive members. Beware: if some or all archive members are binary,
    which is true for a static library, you’ll wish you didn’t see the printout!

    - `r`—insert a file into an archive; replace a member with the same name.

    - `x`—extract a member from an archive.


    Each keyletter may take additional modifier letters that must immediately follow
    the keyletter. Two of the most widely known modifier letters are:


    +   - `c`—create an archive if it doesn’t exist yet.

    - `s`—add an index to the archive. This option is no longer needed because `ar`
    adds the index automatically. But there was a special utility `ranlib` in the
    past whose sole purpose was to add an index to a library.


    You’re finally ready to create your first static library, populate it with the
    object files, and print out the library contents:


    ```

    /home/dzreuse/> ar rc libmyjson.a json_syntax.o json_tokens.o

    /home/dzreuse/> ar t libmyjson.a

    json_syntax.o

    ```'
- md: "## json_tokens.o\n\nAlternatively, pass the options the POSIX way, one by one\
    \ and with the familiar dashes:\n\n```\n/home/dzreuse/> ar -r -c libmyjson.a json_syntax.o\
    \ json_tokens.o\n```\n\nLet’s have a look at the new library from the perspective\
    \ of a linker. The linker needs to know two things: whether the wanted functions\
    \ are in the library and where to find their definitions. Note that if a function\
    \ isn’t in the library, searching for its definition has no point, especially\
    \ if the archive is large. The sizes of the Wolfram Mathematica runtime, libWolframRTL_Static_Minimal.a,\
    \ and LAPACK linear algebra library, liblapack.a, are 55MB and 11MB, respectively.\
    \ For a quick check, a library index is located at the beginning of the archive\
    \ that contains all library members’ names. The linker can quickly read the index\
    \ and then decide whether to read the rest of the library file.\n\nTo introspect\
    \ the library without disassembling it, let’s use one more binary utility called\
    \ nm, which comes from name.\n\nWhen you call nm with no parameters other than\
    \ the archive name, it lists all of the archive’s members (object files) and their\
    \ symbols (functions and variables). For each symbol, nm reports if the symbol\
    \ is defined in the code segment of the member file (T), in the BSS segment (B),\
    \ in the read-only section of the data segment (R), or referenced from the file\
    \ and defined elsewhere (U). For each locally defined symbol, nm also reports\
    \ the address of the symbol in the member file. If you add the option -s, the\
    \ utility also prints out the archive index, and -S adds the symbol size in bytes:\n\
    \n```\n/home/dzreuse/> nm -s -S libmyjson.a\nArchive index:\njson_syntax in json_syntax.o\n\
    json_tokens in json_tokens.o\n\njson_syntax.o:\n0000000000000000 0000000000000014\
    \ T json_syntax\njson_tokens.o:\n                 U fprintf\n                \
    \ U _GLOBAL_OFFSET_TABLE_\n0000000000000000 0000000000000035 T json_tokens\n```\n\
    \nBased on the printout, it looks like `ar` didn’t cheat on us and faithfully\
    \ put both functions in the archive. It’s now time to reuse your code by linking\
    \ the newly minted library and the `main` function. (That was the goal of the\
    \ exercise!) Rather than listing all object files and their whereabouts on the\
    \ linker’s command line, we’ll direct it to use the library:\n\n```\n/home/dzreuse/>\
    \ cc myjsontool.c -lmyjson -L. -o jsontool -static\n/home/dzreuse/> ./jsontool\n\
    Success!\n/home/dzreuse/> ldd ./jsontool\n    not a dynamic executable\n```\n\n\
    It worked. Note that the “undefined” reference to `fprintf` was resolved from\
    \ the standard C library `libc.a` that’s linked implicitly. The option `-static`\
    \ reminds the linker that even the standard C library must be linked in its static\
    \ form. `ldd`, the utility for tracing dynamic (shared) libraries and their dependencies\
    \ (you’ll see it again in [Building Dynamic Libraries](Building Dynamic Libraries)),\
    \ confirms in its peculiar way that nothing is shared in the executable file.\n\
    \nThe command line has two more options that you may have seen before (or maybe\
    \ not). The first option, `-lmyjson`, tells the linker to link the code in `myjsontool.c`\
    \ with the library `myjson`. `myjson` is the name of the library, not the name\
    \ of the library file! The name of the file is the library’s name with the prefix\
    \ `lib` and suffix `.a`—that is, `libmyjson.a`. Remember being told by a friendly\
    \ StackOverflow tutor to add `-lm` to the command line? You thought it was black\
    \ magic, but it was a reference to `libm.a`, the standard math library with `sin`,\
    \ `sqrt`, and `fabs`. And `-lc` is a redundant reference to `libc.a`, the standard\
    \ C library. The linker always links this library, unless you tell it to stop.\n\
    \nThe libraries `libc.a` and `libm.a`, on the one hand, and `libmyjson.a`, on\
    \ the other hand, are different in so many ways. `libc.a` and `libm.a` are the\
    \ result of the collaboration of thousands of programmers and are half a century\
    \ old. `libmyjson.a` was created by you just a few minutes ago. `libc.a` and `libm.a`\
    \ are 5MB and 65kB, respectively. `libmyjson.a` is merely 8kB, at least for the\
    \ time being. `libc.a` and `libm.a` are presumably bug-free. `libmyjson.a`, who\
    \ knows? But, most importantly, `libc.a` and `libm.a` are in a standard location\
    \ (possibly in `/usr/lib/x86_64-linux-gnu/`), and `libmyjson.a` is in your current\
    \ working directory. You may find it bizarre, but the linker is better trained\
    \ in searching for the libraries in `/usr/lib/x86_64-linux-gnu/` than in the current\
    \ working directory. This is precisely for the reasons previously discussed: to\
    \ avoid incidentally linking to raw, untested, untrusted libraries. With just\
    \ the `-l` option, the linker will not find your library.\n\nYou and your library\
    \ have four options:\n\n1.  You can move the new library to one of the trusted\
    \ directories where the linker will have no problems finding it. The list of those\
    \ directories—the load path—is platform-dependent. For example, Linux stores the\
    \ path in the file `/etc/ld.so.conf.d/x86_64-linux-gnu.conf`. For your reference,\
    \ `ld.so` is the Linux program loader that you’ll encounter in *Building Dynamic\
    \ Libraries*. The file is owned and writable only by the superuser, and the secure\
    \ directories are, too. If you’re not the superuser, you won’t be able to update\
    \ the load path or copy your static libraries to any predefined location. Even\
    \ if you’re the superuser, you shouldn’t mess with those directories because you\
    \ may break other programs.\n\n2.  Instead, you can modify `LIBRARY_PATH` by including\
    \ in it the directories that you own. `LIBRARY_PATH` is an environment variable\
    \ used by the linker to search for static and shared variables (in addition to\
    \ the predefined load path). Its value is a colon-separated list of directories.\
    \ How you update the variable depends on which shell you use. If you’re like me\
    \ and in love with `bash`, then the `export` command creates a new variable and\
    \ makes it available (“exports”) to the shell’s children, including the linker:\n\
    \n    ```\n    /home/dzreuse/> export LIBRARY_PATH=$HOME/lib:$HOME/lib/untested\n\
    \    ```\n\n    If the path variable already exists, you can expand it:\n\n  \
    \  ```\n    /home/dzreuse/> export LIBRARY_PATH=/tmp:$LIBRARY_PATH\n    ```\n\n\
    \    Bear in mind that the linker scans the directories in the order they’re listed\
    \ in the library path. If you have more than one static library with the same\
    \ name, the first encountered library will be linked.\n\n3.  Changing `LIBRARY_PATH`\
    \ works like a charm if you often use the same directories for library development.\
    \ In that case, you can permanently store the path-setting command into `$HOME/.profile`\
    \ and spare yourself from the misery of reminding the linker where to search.\n\
    \n4.  But what if you only want to link a library once or twice? In that case,\
    \ you can use the option `-Ldir`, which temporarily adds `dir` to the search path—for\
    \ the duration of the compilation. Specifically, `-L.` adds the current directory.\
    \ You can put as many `-L`s on the command line as you want, possibly one for\
    \ each linked static library.\n\nNo matter which path you choose, you need to\
    \ find the static libraries only at the program development stage. Once the program\
    \ development is over (I hear you laughing), all static libraries become integral\
    \ and inseparable parts of the program. That carved in stone integration is a\
    \ blessing—and a curse.\n\nWhat are the implications of linking your program with\
    \ static libraries? Static libraries enable and promote code reuse in several\
    \ ways.\n\nFirst, unlike a flock of object files, a library has a single and hopefully\
    \ meaningful name. As a developer, you may have issues with remembering the names\
    \ and purposes of many object files. It’s much easier to remember the name and\
    \ purpose of a single library. What was that library that you built to deal with\
    \ JSON files? It must be `libjson.a` or `libmyjson.a`, and here it is, just link\
    \ it. Easy.\n\nSecond, unlike a throw-away object file, a library is an asset.\
    \ It’s worth the investment: debugging, testing, maintenance, and documentation.\
    \ Consequently, a library has a higher “social status” than an object file and\
    \ is more appealing to be reused as a part of another project. In turn, that escalates\
    \ the need for further debugging, testing, maintenance, and documentation, especially\
    \ if the library gets adopted by third-party developers.\n\nThird, the separation\
    \ of a project into the core (the `main` function and dependencies) and the libraries\
    \ allows you and your coworkers to treat the library as a separate project. Such\
    \ separation usually adds good vibes and helps keep software development complexity\
    \ under control."
