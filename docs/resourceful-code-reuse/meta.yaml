    The mechanism of transferring compiled units into memory and replacing or augmenting
    other units was implemented as early as 1966 in the OS/360 Linkage Editor (we’d
    call it a linker today). From the time of OS/360 until well into the 1990s, this
    mechanism was called *overlaying*, and the transferred units were called overlays
    and stored in OVL files. The last system that seriously relied on overlays probably
    was AutoDesk’s AutoCAD until after Release 14 in 1997. With the massive introduction
    of virtual memory (which is beyond this book’s scope), overlaying rapidly fell
    out of favor and survived mostly in the form of dynamic loading.


    Only shared (dynamically linked) libraries can be overlayed. Let’s have a look
    at how loading and unloading code dynamically works in C and Python. In both cases,
    let’s assume that the dynamic library `libmyjson.so` has been created (as explained
    in [Building Your Own Dynamic Libraries](Building Your Own Dynamic Libraries))
    and is referred to by the complete path to the library file or exists somewhere
    along the `LD_LIBRARY_PATH` (defined [here](here)).


    # Dynamic Loading with dlopen (the C Way)


    The dynamic loading mechanism in C is implemented in the library `libdl` through
    the functions `void *dlopen(const char *filename, int flags)` for loading, `int
    dlclose(void *handle)` for unloading, and some other functions. The library is
    a tribute to the almost extinct SunOS operating system. To use dynamic loading
    with a C program, you must include the header file `dlfcn.h` and link the library
    `libdl.so`, as shown in the next two listings. Don’t forget: you can only unload
    what you’ve previously loaded.


