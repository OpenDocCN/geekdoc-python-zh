    command line as you want, possibly one for each linked static library.


    No matter which path you choose, you need to find the static libraries only at
    the program development stage. Once the program development is over (I hear you
    laughing), all static libraries become integral and inseparable parts of the program.
    That carved in stone integration is a blessing—and a curse.


    What are the implications of linking your program with static libraries? Static
    libraries enable and promote code reuse in several ways.


    First, unlike a flock of object files, a library has a single and hopefully meaningful
    name. As a developer, you may have issues with remembering the names and purposes
    of many object files. It’s much easier to remember the name and purpose of a single
    library. What was that library that you built to deal with JSON files? It must
    be `libjson.a` or `libmyjson.a`, and here it is, just link it. Easy.


    Second, unlike a throw-away object file, a library is an asset. It’s worth the
    investment: debugging, testing, maintenance, and documentation. Consequently,
    a library has a higher “social status” than an object file and is more appealing
    to be reused as a part of another project. In turn, that escalates the need for
    further debugging, testing, maintenance, and documentation, especially if the
    library gets adopted by third-party developers.


    Third, the separation of a project into the core (the `main function` and dependencies)
    and the libraries allows you and your coworkers to treat the library as a separate
    project. Such separation usually adds good vibes and helps keep software development
    complexity under control.'
- md: "These considerations are true for almost any library, static or shared. A static\
    \ library has its unique strengths but also its Achilles’ heels.\n\nOn the positive\
    \ side, when you link your program with static libraries, you eliminate many external\
    \ dependencies. (Don’t forget to pass `-static` to the linker if you have both\
    \ a static and a shared library with the same name!) If you disable the standard\
    \ C runtime and the standard C library with the `--nostdlib` option, your program\
    \ depends only on the system calls. It’s expected to behave identically on all\
    \ systems, as long as they provide the same API, such as Ubuntu, Debian, and Red\
    \ Hat flavors of Linux. Statically linked tools are often included in “rescue\
    \ kits” used to recover a system after an unsuccessful upgrade or intrusion, when\
    \ the shared libraries are damaged, compromised, or missing. As a corollary, statically\
    \ linked programs are also insensitive to upgrade-related surprises.\n\nBut the\
    \ immunity to upgrades, in general, isn’t necessarily desirable. To upgrade a\
    \ statically linked program, you must relink it—and to relink it, you must maintain\
    \ the object files that aren’t parts of any library. If any constituent object\
    \ file is missing, you cannot upgrade the program anymore. Bummer.\n\nSize-wise,\
    \ a static library not explicitly designed for a project behaves like a leech\
    \ on your program’s body. Consider the worst offender: `libc.a` with the coincidence\
    \ cohesion. Surely you want any program of yours to call at least some input or\
    \ output function, perhaps `printf` or `scanf`. Both of them are defined in `libc.a`,\
    \ so linking a 5MB `libc.a` is a must. After linking with a static `libc.a`, anything\
    \ as simple as `puts(\"Hello, world!\")` becomes a 5MB program on the disk (not\
    \ a big deal) and a 5MB process in the RAM (possibly a big deal). The linker isn’t\
    \ smart enough to statically link select members from a library.\n\nTo add insult\
    \ to injury, a static library cannot be physically shared between multiple processes.\
    \ (If it could, we wouldn’t need shared libraries!) It’s an integral part of a\
    \ program’s code. Once attached to the rest of the program, it cannot be identified\
    \ and detached. It’s in the address space of the running process. The operating\
    \ system protects it from intentional or incidental accesses by other processes,\
    \ even if those processes execute the same program. The decision not to share\
    \ code leads to a waste of RAM. There you are, staring at the trade-off between\
    \ reliability and memory footprint, one of those Scylla-and-Charybdis scenarios\
    \ of modern computing.\n\nTo regain some sense of balance, you need shared libraries.\n\
    \n## Building Dynamic Libraries\n\nAs the name suggests, a dynamic library (also\
    \ known as a shared library) is in the first place a library: a collection of\
    \ object files that have something in common. But unlike a static library, it\
    \ is dynamic. What’s the difference?\n\n## Understanding Dynamic Linking\n\nThe\
    \ first difference between a static library and a dynamic library is in the name.\
    \ The extension of a dynamic library on Linux/macOS is `so` (“shared object,”\
    \ such as `libmyjson.so`). Microsoft calls them “dynamic linked libraries” with\
    \ the extension `dll`, as in `libmyjson.dll`.\n\nThe second difference is in the\
    \ way a library is linked to the rest of the program. A static library is permanently\
    \ linked to an executable file, and each process has its copy of the library.\
    \ On the bright side, a statically linked program’s functionality isn’t affected\
    \ by library upgrades, specifically by disappearing libraries. (Think about what\
    \ may happen if you incidentally remove the standard C library `libc`!) On the\
    \ dark side, statically linked programs pollute memory (hello, Occam!) and aren’t\
    \ affected by library upgrades. It might sound like a contradiction to say that\
    \ not being affected by library upgrades is both the bright and dark side, but\
    \ it is true. Sometimes, you want to replace libraries with better, faster, and\
    \ more secure versions. Such replacement won’t work in the static libraries’ case.\
    \ The introduction of dynamic libraries makes the dark side brighter but the bright\
    \ side darker.\n\nIn some sense, a dynamic library is linked to an executable\
    \ file twice: at the proper link time and at runtime.\n\nAt the link time, the\
    \ linker checks the unresolved global references against the dynamic libraries\
    \ and ensures that they are valid: that functions like `json_syntax` and variables\
    \ like `json_errno` indeed exist. But the linker doesn’t replace their addresses’\
    \ placeholders with the actual addresses because dynamic libraries aren’t integrated\
    \ in executable files yet. The linker annotates the placeholders with the names\
    \ of the dynamic libraries that contain the symbols. The linker puts a great deal\
    \ of trust in the system environment: it assumes that if a symbol is in some dynamic\
    \ library at the moment of linking, it’ll be in the library at runtime, which,\
    \ frankly, may or may not be true.\n\nWhen you run the program, the unresolved\
    \ symbols’ availability must be checked once again (because who knows if their\
    \ “host” libraries are still around?) and resolved to the actual addresses. The\
    \ program in charge of runtime linking is called a loader (ld.so on Linux).\n\n\
    The rest of the story depends on whether your programs have already used the requested\
    \ libraries.\n\nIf a dynamic library has been recently used or is currently used\
    \ by any program, then the library code may already be in the RAM. Remember you\
    \ learned that dynamic libraries are also known as shared libraries? That’s why!\
    \ A shared library isn’t attached to any particular process. Any running program\
    \ can use any shared function at any time. When the loader loads the program code,\
    \ it resolves the unresolved symbols. Luckily, the names of the libraries that\
    \ contain the symbols are already known because they were stored in the program\
    \ earlier at the linking stage.\n\nWhat if a library needed by a program hasn’t\
    \ been used so far? The loader will then find the library file (so or dll) and\
    \ load it—if the library still exists and can be found in some predefined location\
    \ (more about predefined locations [here](https://example.com)).\n\nBefore you\
    \ build your dynamic libraries, let’s find out what libraries a typical program\
    \ uses. On Linux, you can check which dynamic libraries are required by a program\
    \ by running the ldd—the shared object dependencies displayer. On macOS, the closest\
    \ to ldd is otool -L, but it shows which shared libraries are expected, not whether\
    \ they exist. Let’s have a look at two top-rated COVID-era applications: [Dropbox](https://www.dropbox.com/)\
    \ for file sharing and [Zoom](https://zoom.us/) for teleconferencing.\n\n[Dropbox](https://www.dropbox.com/)\
    \ comes statically linked. It doesn’t depend on any external libraries, not even\
    \ on `libc`. With a plethora of Linux distributions in the wild, a sealed, self-contained\
    \ program has better survival chances:\n\n```\n/home/dzreuse> ldd `which dropbox`\n\
    \    not a dynamic executable\n```\n\nMy [Zoom](https://zoom.us/), on the other\
    \ hand, has seven dependencies. (Your [Zoom](https://zoom.us/) may be differently\
    \ structured).\n\n```\n/home/dzreuse> ldd `which zoom`\nlinux-vdso.so.1 (0x00007fff925d9000)\n\
