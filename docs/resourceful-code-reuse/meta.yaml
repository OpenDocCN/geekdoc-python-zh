    \n## 初探远程过程调用\n\n还记得你反复直接调用或以不同伪装调用的函数 `read_json` 吗？在本节中，`read_json` 是另一台计算机上另一个程序的一部分，而你仍然能够调用它。欢迎来到奇妙的远程过程调用世界。（顺便说一句，在本书的其余部分，请假设“过程”是“函数”的同义词。）\n\
