    \ the project. They don’t pollute the global namespace and cannot be called or\
    \ altered, incidentally or maliciously, by the code outside of the compilation\
    \ unit. Static is as close as you get to privacy in C.\n\n# All Things Static\n\
    \n![](img/c0b6e19a136e7361a7284f5c371b1d8b_27_0.png)\n\nThe `static` keyword,\
    \ when applied to a *local* variable, means something entirely different. A static\
    \ variable in a function preserves its value after it goes out of scope (when\
    \ the enclosing function exits or calls another function or itself recursively).\
    \ The following little function implements a self-contained up-counter. Every\
    \ time you call it, it increments the embedded static counter `count` and returns\
    \ its new value.\n\n```\nc\nunsigned counter() {\n    static unsigned count =\
    \ 0;\n    return ++count;\n}\n```"
  - '[PAGE 28]


    > **All Things Static**


    As in the case of global variables, the `static` keyword protects `count` from
    any external access. But the main benefit of `static` in this context is that
    `count` isn’t initialized every time you call the function. That’s what makes
    counting possible.


    Now that you know how to hide code components, let’s find out how to expose them
    across file boundaries.


    # Creating a Header File


    When a compiler compiles `myjsontool.c` or `json_syntax.c`, it needs to be aware
    that the former depends on the latter and both depend, implicitly or explicitly,
    on `json_tokens.c`. The compiler needs to know the definitions of the data structures
    from those files. It also needs to know the global functions’ prototypes and global
    variables’ data types.


    A function prototype, also known as a function signature or declaration, is the
    first line of the function definition: the function name, the types of its parameters,
    and the type of the return value. A function prototype must match the full function
    definition, except that the parameters’ names aren’t required in a prototype (because
    they’re names that you can change painlessly).'
  - '[PAGE 29]


    A prototype is a promise to the compiler: “Look, this function isn’t available
    right now. Perhaps it’s defined in another C file or a library ( [Building Static
    Libraries](Building Static Libraries), and [Building Dynamic Libraries](Building
    Dynamic Libraries)) or not even defined at all but will be defined by the time
    we need it ([Harnessing Dynamic Loading](Harnessing Dynamic Loading)). Rest assured
    that the function takes this many parameters of such and such data types, and
    it returns such and such data type.” That’s enough information for the compiler
    to compile the function call.


    Here’s a prototype of `read_boolean`. Note the semicolon at the end and the absence
    of the parameter name:


    ```

    bool read_boolean(FILE*);

    ```


    Like any other promise, this promise may be broken—when the declared function
    is never defined. The compiler alone cannot check your honesty. That would be
    the responsibility of the linker. Ultimately, it’s the linker’s job to put all
    compiled code together. If a piece is missing, linking fails.


    You need a specific “promise word” to declare global variables defined in other
    compilation units: `extern`. A declaration with `extern` looks like any other
    variable declaration, except that it doesn’t create an instance of the variable.
    It directs the compiler to a variable that will become available at the link time.
    Here’s an external declaration of `json_errno`:


    ```

    extern int json_errno;

    ```


    At the compile time, the compiler cannot determine the location of `json_errno`
    in memory. It generates a placeholder (a *stub*) for the variable that’s later
    resolved by the linker and replaced by (*bound to*) the actual address of `json_errno`.


    As far as data structures are concerned, no particular mechanism exists for sharing
    them. You can redeclare them in each compilation unit.'
