    to the C statements and operators from which they might have been generated. But
    you’re highly unlikely to succeed in using it.


    This isn’t bad news! If you cannot reconstruct a source file from an object file,
    then your competitors cannot, either. If you’d like to share executable code without
    sharing the source code (*closed-source sharing*), object files are exactly what
    you need. Whoever intends to reuse your files will get the expected functionality
    but not have access to the implementation details, which presumably constitute
    your intellectual property (IP).


