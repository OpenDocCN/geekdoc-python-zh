    `libc.a` and `libm.a` are in a standard location (possibly in `/usr/lib/x86_64-linux-gnu/`),
    and `libmyjson.a` is in your current working directory. You may find it bizarre,
    but the linker is better trained in searching for the libraries in `/usr/lib/x86_64-linux-gnu/`
