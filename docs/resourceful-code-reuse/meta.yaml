    \ ar -r -c libmyjson.a json_syntax.o json_tokens.o\n```\n\n让我们从链接器的角度来审视这个新库。链接器需要了解两件事：所需函数是否存在于库中，以及在哪里可以找到它们的定义。请注意，如果某个函数不在库中，那么搜索其定义就毫无意义，尤其是当归档文件很大时。Wolfram\
    \ Mathematica 运行时库 `libWolframRTL_Static_Minimal.a` 和 LAPACK 线性代数库 `liblapack.a`\
    \ 的大小分别为 55MB 和 11MB。为了快速检查，归档文件的开头包含一个库索引，其中列出了所有库成员的名称。链接器可以快速读取索引，然后决定是否需要读取库文件的其余部分。\n\
    \n为了在不反汇编的情况下检查库，让我们使用另一个名为 `nm` 的二进制工具，其名称来源于 \"name\"。\n\n当你仅使用归档文件名作为参数调用 `nm`\
    \ 时，它会列出归档文件的所有成员（目标文件）及其符号（函数和变量）。对于每个符号，`nm` 会报告该符号是在成员文件的代码段（T）、BSS 段（B）、数据段的只读部分（R）中定义，还是从文件中引用但在其他地方定义（U）。对于每个本地定义的符号，`nm`\
    \ 还会报告该符号在成员文件中的地址。如果添加 `-s` 选项，该工具还会打印出归档索引，而 `-S` 则会添加符号的字节大小：\n\n```\n/home/dzreuse/>\
    \ nm -s -S libmyjson.a\nArchive index:\njson_syntax in json_syntax.o\njson_tokens\
    \ in json_tokens.o\n\njson_syntax.o:\n0000000000000000 0000000000000014 T json_syntax\n\
    json_tokens.o:\n                 U fprintf\n                 U _GLOBAL_OFFSET_TABLE_\n\
    0000000000000000 0000000000000035 T json_tokens\n```\n\n根据输出，`ar` 似乎没有欺骗我们，忠实地将两个函数都放入了归档文件中。现在是时候通过链接新创建的库和\
    \ `main` 函数来重用你的代码了。（这就是本练习的目标！）我们无需在链接器的命令行上列出所有目标文件及其位置，而是直接指示它使用该库：\n\n```\n\
    /home/dzreuse/> cc myjsontool.c -lmyjson -L. -o jsontool -static\n/home/dzreuse/>\
    \ ./jsontool\nSuccess!\n/home/dzreuse/> ldd ./jsontool\n    not a dynamic executable\n\
    ```\n\n它成功了。请注意，对 `fprintf` 的“未定义”引用是从隐式链接的标准 C 库 `libc.a` 中解析的。选项 `-static` 提醒链接器，即使是标准\
    \ C 库也必须以静态形式链接。`ldd` 是一个用于跟踪动态（共享）库及其依赖项的工具（你将在[构建动态库](Building Dynamic Libraries)中再次见到它），它以其独特的方式确认了可执行文件中没有任何共享内容。\n\
    \n命令行中还有两个你可能见过（也可能没见过）的选项。第一个选项 `-lmyjson` 告诉链接器将 `myjsontool.c` 中的代码与库 `myjson`\
    \ 链接。`myjson` 是库的名称，而不是库文件的名称！文件的名称是库名加上前缀 `lib` 和后缀 `.a`——即 `libmyjson.a`。还记得友好的\
    \ StackOverflow 导师让你在命令行中添加 `-lm` 吗？你曾以为那是黑魔法，但它实际上是对 `libm.a` 的引用，这是一个包含 `sin`、`sqrt`\
    \ 和 `fabs` 的标准数学库。而 `-lc` 则是对 `libc.a`（标准 C 库）的冗余引用。链接器总是会链接这个库，除非你明确告诉它停止。\n\n\
    一方面，`libc.a` 和 `libm.a`，另一方面，`libmyjson.a`，在许多方面都不同。`libc.a` 和 `libm.a` 是成千上万程序员协作的成果，已有半个世纪的历史。`libmyjson.a`\
    \ 则是你几分钟前刚刚创建的。`libc.a` 和 `libm.a` 的大小分别为 5MB 和 65kB。`libmyjson.a` 目前仅有 8kB。`libc.a`\
    \ 和 `libm.a` 大概是无 bug 的。`libmyjson.a` 呢，谁知道呢？但最重要的是，`libc.a` 和 `libm.a` 位于标准位置（可能在\
    \ `/usr/lib/x86_64-linux-gnu/`），而 `libmyjson.a` 位于你当前的工作目录中。你可能觉得这很奇怪，但链接器在 `/usr/lib/x86_64-linux-gnu/`\
    \ 中搜索库比在当前工作目录中搜索要熟练得多。这正是出于前面讨论过的原因：避免意外链接到原始的、未经测试的、不可信的库。仅使用 `-l` 选项，链接器将找不到你的库。\n\
    \n你和你的库有四个选择：\n\n1.  你可以将新库移动到链接器能够轻松找到的受信任目录之一。这些目录的列表——加载路径——是平台相关的。例如，Linux\
    \ 将路径存储在文件 `/etc/ld.so.conf.d/x86_64-linux-gnu.conf` 中。供你参考，`ld.so` 是 Linux 程序加载器，你将在*构建动态库*中遇到它。该文件仅由超级用户拥有和可写，安全目录也是如此。如果你不是超级用户，你将无法更新加载路径或将你的静态库复制到任何预定义位置。即使你是超级用户，也不应随意更改这些目录，因为你可能会破坏其他程序。\n\
    \n2.  相反，你可以通过修改 `LIBRARY_PATH` 环境变量，将你拥有的目录包含在其中。`LIBRARY_PATH` 是链接器用于搜索静态和共享变量（除了预定义的加载路径之外）的环境变量。其值是一个以冒号分隔的目录列表。如何更新该变量取决于你使用的\
    \ shell。如果你像我一样钟情于 `bash`，那么 `export` 命令会创建一个新变量并使其对 shell 的子进程（包括链接器）可用（“导出”）：\n\
    \n    ```\n    /home/dzreuse/> export LIBRARY_PATH=$HOME/lib:$HOME/lib/untested\n\
    \    ```\n\n    如果路径变量已经存在，你可以扩展它：\n\n    ```\n    /home/dzreuse/> export LIBRARY_PATH=/tmp:$LIBRARY_PATH\n\
    \    ```\n\n    请记住，链接器会按照库路径中列出的顺序扫描目录。如果你有多个同名的静态库，将链接第一个遇到的库。\n\n3.  如果你经常使用相同的目录进行库开发，修改\
    \ `LIBRARY_PATH` 会非常有效。在这种情况下，你可以将路径设置命令永久存储到 `$HOME/.profile` 中，从而免去提醒链接器搜索位置的麻烦。\n\
    \n4.  但如果你只想链接一两次库呢？在这种情况下，你可以使用 `-Ldir` 选项，它会临时将 `dir` 添加到搜索路径中——仅在编译期间有效。具体来说，`-L.`\
    \ 会添加当前目录。你可以在命令行上放置任意多个 `-L`，可能为每个链接的静态库都添加一个。\n\n无论你选择哪条路径，你只需要在程序开发阶段找到静态库。一旦程序开发完成（我听到你笑了），所有静态库都将成为程序不可分割的组成部分。这种刻入石头的集成既是福，也是祸。\n\
    \n将你的程序与静态库链接有什么影响？静态库以多种方式实现并促进了代码重用。\n\n首先，与一堆目标文件不同，库有一个单一且希望是有意义的名称。作为开发者，你可能难以记住许多目标文件的名称和用途。记住单个库的名称和用途要容易得多。你构建的那个用于处理\
    \ JSON 文件的库叫什么？它一定是 `libjson.a` 或 `libmyjson.a`，就在这里，直接链接它。很简单。\n\n其次，与一次性的目标文件不同，库是一种资产。它值得投资：调试、测试、维护和文档。因此，库比目标文件具有更高的“社会地位”，更有可能作为另一个项目的一部分被重用。反过来，这又增加了进一步调试、测试、维护和文档的需求，特别是如果该库被第三方开发者采用的话。\n\
    \n第三，将项目分离为核心（`main` 函数和依赖项）和库，允许你和你的同事将库视为一个独立的项目。这种分离通常能带来良好的氛围，并有助于控制软件开发的复杂性。"
