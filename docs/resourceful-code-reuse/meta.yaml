  md: '# Building Static Libraries


    A well-debugged, well-tested, and well-documented object file with several functions
    and global variables is an excellent reusable code unit. You can link it with
    your program to get access to the previously implemented features. Yet, there
    are two practical considerations related to object files:


    +   1. You should collect the relevant files in an archive and give it a descriptive
    name.


    Some people consider it inelegant to have more than one public function per file.
    In fact, in Java, it’s explicitly forbidden to have more than one public class
    per file. If you try to avoid having more than one public class or function per
    file, you may end up compiling several object files that together implement the
    desired functionality. You’ll have to tell the linker to link all of them. The
    more files you have, the more you tell the linker until you forget why all those
    objects files are on the linker’s command line. This is also true of the file
    names that probably match the names of the public functions, but not the name
    of the problem they collectively solve.


    Linking a descriptively named archive, rather than individual object files, will
    take some pressure off you.


    2. You should store that archive someplace where the linker can find it without
    your assistance. Notifying the linker about the locations of archives is a pain,
    and it becomes even more painful if the archive files move around.


    The easiest way to organize your object files in a collection is to build a static
    *library*—actually, libraries, because nobody puts all their'
  merge: -1
  pgno: 49
- img_proc: true
  md: 'eggs in one basket, and neither should you. The files that belong to one library
    should have at least something in common, aside from all being object files, and
    the name of the library should reflect that commonality.


    In software engineering, the property of having something in common is called
    *cohesion*. Here are several cohesion types:


    +   - Functional cohesion: all routines in the library work toward a single goal.
    Example: flex/bison lexer/parser generators and the supporting library `libfl.a`.
    They can generate parsers and then parse—and nothing else.

    - Sequential cohesion: the outputs of some library routines are the inputs to
    other routines in the same library. Example: Python `pycrawl` module has tools
    for extracting a URL from an HTML document, validating it, and downloading it.

    - Communication cohesion: the routines in the library work on the same data. Example:
    in some sense, SQL and the underlying database management system.

    - Procedural cohesion: the routines in the library are typically executed one
    after another. Example: a library of all functions called directly from your program’s
    `main` function.

    - Temporal cohesion: the time of invocation is the binding factor. Example: `libini.a`,
    a library of routines for reading initialization files.

    - Logical cohesion: the routines seem generally related, but that is the only
    thing they share. Examples: the standard math library `libm.a`, and `libcrypt.a`,
    a cryptography toolset.'
