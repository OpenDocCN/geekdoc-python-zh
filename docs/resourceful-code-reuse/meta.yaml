  md: 'A prototype is a promise to the compiler: “Look, this function isn’t available
    right now. Perhaps it’s defined in another C file or a library ( [Building Static
    Libraries](Building Static Libraries), and [Building Dynamic Libraries](Building
    Dynamic Libraries)) or not even defined at all but will be defined by the time
    we need it ([Harnessing Dynamic Loading](Harnessing Dynamic Loading)). Rest assured
    that the function takes this many parameters of such and such data types, and
    it returns such and such data type.” That’s enough information for the compiler
    to compile the function call.


    Here’s a prototype of `read_boolean`. Note the semicolon at the end and the absence
    of the parameter name:


    ```

    bool read_boolean(FILE*);

    ```


    Like any other promise, this promise may be broken—when the declared function
    is never defined. The compiler alone cannot check your honesty. That would be
    the responsibility of the linker. Ultimately, it’s the linker’s job to put all
    compiled code together. If a piece is missing, linking fails.


    You need a specific “promise word” to declare global variables defined in other
    compilation units: `extern`. A declaration with `extern` looks like any other
    variable declaration, except that it doesn’t create an instance of the variable.
    It directs the compiler to a variable that will become available at the link time.
    Here’s an external declaration of `json_errno`:


    ```

    extern int json_errno;

    ```


    At the compile time, the compiler cannot determine the location of `json_errno`
    in memory. It generates a placeholder (a *stub*) for the variable that’s later
    resolved by the linker and replaced by (*bound to*) the actual address of `json_errno`.


    As far as data structures are concerned, no particular mechanism exists for sharing
    them. You can redeclare them in each compilation unit.'
