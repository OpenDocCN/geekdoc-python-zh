    \    self.setPhase(self.phase)\n\n    def stepReverse(self):\n        self.phase\
    \ = (self.phase - 1) % 8\n        self.setPhase(self.phase)\n```\n\n唯一的真正区别是，现在我们使用CompositeDevice将DigitalOutputDevice对象存储在一个元组中。如前所述，"
