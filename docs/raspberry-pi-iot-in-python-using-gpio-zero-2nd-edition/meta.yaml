  - '[PAGE 166]


    If Phase two is activated, the rotor turns through 90 degrees:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_166_0.png)


    This is the simplest stepper motor you can make. A typical stepper motor will
    have many more coils than four, but they are usually connected into two or three
    phases.

    Another big difference is bipolar versus unipolar. A bipolar motor is like the
    one shown in the diagram. To generate a north pole the current has to flow in
    the opposite direction to when you want to create a south pole. This means you
    have to drive each bank of coils with a bidirectional driver, e.g. an H-bridge.
    A unipolar motor has two windings, one in each direction, and both windings can
    be driven by a unidirectional driver – one giving a north pole and the other a
    south pole. Notice that a unipolar motor has twice the number of coils to drive
    and the switching sequence is slightly different.

    A two-phase bipolar motor with Phases A and B would switch on in the sequence:

    A → B → A- → B- → A etc

    where the minus sign means the current flows the other way.

    A two-phase unipolar motor has two coils per phase, A1, A2 and B1, B2 with the
    1 and 2 windings creating opposite magnetic fields for the same current flow.
    Now the sequence is:

    A1 → B1 → A2 → B2 → A1 etc

    and all driven in the same direction.'
  - '[PAGE 167]


    Switching single phases fully on and off in sequence makes the motor make repeated
    steps. You can also switch on more than one phase at a time to generate micro-steps.
    For example, in our two-phase example, switching on two phases makes the rotor
    settle between the two, so producing a half micro-step:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_167_0.png)


    The driving sequence for a two-phase bipolar motor is:

    A → AB → B → BA- → A- → A- B- → B- → AB- → A

    with minus indicating that the coil is energized in the opposite direction, giving
    a total of eight, rather than four, steps.

    You can even vary the current through the coils and move the rotor to intermediate
    positions. At the extreme limit you can vary the current sinusoidally and produce
    a smooth rotation. Micro-stepping is smoother and can eliminate buzzing. For high
    accuracy positioning, micro-stepping is a poor performer under load.


    # Stepper Motor Driver


    How best to drive a stepper motor using a Pi?

    There are stepper motor controllers, including HATs, that you can buy and these
    come with software that allows you to control the stepper. There are also some
    chips that work with unipolar and bipolar stepper motors. However, you can easily
    control a bipolar stepper motor using one of the H-bridges described in the section
    on directional motor control.'
