- md: "If you want to keep the pulse trains going then you need a loop to keep the\
    \ queue filled:\n\n```python\nimport lgpio\nfrom collections import namedtuple\n\
    \nPulse = namedtuple('Pulse', ['group_bits', 'group_mask',\n                 \
    \            'pulse_delay'])\n\nGPIOChip = lgpio.gpiochip_open(4)\nlgpio.group_claim_output(GPIOChip,\
    \ [4,17])\nwhile True:\n    if lgpio.tx_room(GPIOChip,4,lgpio.TX_WAVE)>2:\n  \
    \      lgpio.tx_wave(GPIOChip, 4,\n            [Pulse(1,3,1000),Pulse(2,3,1000)])\n\
    ```\n\nThe if statement checks to see if there is enough room in the queue and\
    \ then adds two Pulse specifications if there is. If you try this out you will\
    \ find that you get a continuous phased pulse stream, but there are still irregularities:\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_231_0.png)\n\n## More lgpio\n\nAs well\
    \ as the basic GPIO functions there are also functions to use the serial port,\
    \ I2C and SPI buses. All three are implemented in hardware and make use of the\
    \ corresponding Linux drivers for the device. This means that they should work\
    \ without glitches but it also means that they are only as good as the Linux drivers.\
    \ The drivers for the Pi family work well enough to make these functions attractive.\
    \ GPIO Zero has an SPI object and this makes it a better choice for this bus.\
    \ However it doesn't provide an object for the I2C or serial interfaces. If you\
    \ are interested in using either then the raw Linux drivers are not difficult\
    \ to use and you can find out more in *Raspberry Pi IOT in Python with Linux Drivers,\
    \ 2nd Ed*, ISBN:9781871962864.\n\nThe lgpio functions are also not difficult but\
    \ they are beyond the scope of this book. If you find that you are contemplating\
    \ making use of them, it may well be a sign that you have outgrown GPIO Zero.\n\
    \n## Summary\n\n- The GPIO Zero library is based on using the lgpio library as\
    \ its pin factory for all versions of the Pi.\n- The lgpio library is installed\
    \ by default alongside GPIO Zero and as such it is tempting to use it directly\
    \ to increase speed and access missing features.\n- The lgpio library makes use\
    \ of Linux GPIO drivers and as such is slower than direct access to the hardware,\
    \ but has the advantage of being largely hardware independent.\n- Linux drivers\
    \ are used as if they were files and data is transferred using read and write\
    \ operations. The lgpio library deals with this lower level interaction for you\
    \ and provides functions to deal with the drivers.\n- For a Pi 5 the GPIO driver\
    \ file name is gpiochip4 and for all other Pis it is gpiochip0. This is the only\
    \ difference in using lgpio with the Pi 5.\n- Before you can use GPIO lines you\
    \ have to open the GPIO driver and remember to close it again when you are finished\
    \ using the line.\n- Functions are provided to let you configure and use GPIO\
    \ line objects.\n- There are also functions that work with groups of GPIO line\
    \ objects.\n- For more sophisticated output you can use the pulse functions which\
    \ generate preset pulse trains from one or more GPIO lines.\n- The most useful\
    \ of the pulse functions are the PWM function and the servo function.\n- There\
    \ are also functions that use GPIO lines to work with serial, I2C and SPI buses.\n\
    \n## Appendix I\n### VS Code\n\nMicrosoft’s Visual Studio Code, VS Code, has good\
    \ Python support, runs on a range of platforms including the Raspberry Pi and\
    \ is possibly a better choice of code editor than Thonny, as it has full remote\
    \ Python development including debugging. That is, you can write your program\
    \ on a desktop, generally a more powerful machine, and run it on a Pi connected\
    \ over SSH and single step and breakpoint it.\n\nThe only problem with this approach\
    \ is that VS Code has more facilities than you need to just run Python, it supports\
    \ a wide range of languages, and this can make it confusing. However, after you\
    \ have run your first program, it all becomes so much easier. If you are going\
    \ to be doing much programming on Pis, this is worth the effort in setting up\
    \ and mastering it.\n\nAs it is under constant development, it is probably better\
    \ to consult its website to find the latest instructions on how to install it\
    \ and its various components.\n\nVS Code doesn’t support remote working on the\
    \ Pi Zero and Zero W. This presents a problem as the device you most want to remote\
    \ operate with is the Pi Zero/W. Even though it works on a Pi Zero 2W, the lack\
    \ of memory makes it slow. It also approaches the problem of remote working in\
    \ a way that is less useful for IoT applications. It keeps all of the programs\
    \ on the remote device, which makes managing code more difficult than if the code\
    \ is kept on the local device.\n\nA more useful, but slightly more complicated,\
    \ approach is to make use of VS Code Tasks to provide remote build and debug.\
    \ This works with all versions of the Pi, or indeed any Linux-based device, and\
    \ it keeps all of the files on the local machine. It also works with the Pi Zero/W\
    \ and is described later.\n\n### SSH Without a Password\n\nBefore trying to make\
    \ any of the following work, you need to have set up SSH access using a key file.\
    \ Some of the commands work if you simply supply a password, but the debugging\
    \ commands don’t.\n\nUsing a password to connect over SSH is fine when you are\
    \ just testing the installation, but the number of times you are asked to provide\
    \ it quickly becomes irritating. The solution is to create a key pair to use.\
    \ If you look up the instructions for doing this, you might conclude that it is\
    \ very difficult. This is because every effort is made to ensure security is enforced.\
    \ If you simply want to use a key as a way of avoiding having to supply a password\
    \ then you can take shortcuts. As long as you keep your private key safe, the\
    \ setup is secure.\n\nThe first step is generating a key pair on the local machine.\
    \ As long as you have OpenSSH installed, this is easy. The steps described here\
    \ will work on Windows, Mac and Linux. If you are using Windows, start a PowerShell\
    \ session:\n\n```bash\ncd ~/.ssh\nssh-keygen -t rsa\n```\n\nThis generates a default\
    \ RSA key in the .ssh directory within the current user's home directory. You\
    \ can provide a name for the key files and in this example the name pi is used,\
    \ although this doesn't affect what device you can use them for. There are advantages\
    \ in using the default name.\n\nYou will see output something like:\n\n```\nGenerating\
    \ public/private rsa key pair.\nEnter file in which to save the key (C:\\Users\\\
    nuserhome/.ssh/id_rsa): pi\nEnter passphrase (empty for no passphrase):\nEnter\
    \ same passphrase again:\nYour identification has been saved in pi.\nYour public\
    \ key has been saved in pi.pub.\nThe key fingerprint is:\nSHA256:UtiQ3RMYpluJb+nx8n5pqsbLXHgiYv2hKs1EVof7vqQ\
    \ user@Rockrose\nThe key's randomart image is:\n+---[RSA 2048]----+\n|       \
    \ .o+o+..  |\n|       . oBo.o   |\n|        o+ =  .  |\n|       + .= .    |\n\
    |      o oo S     |\n|     ..o+ +      |\n|    +oooo* + .   |\n|   ..E..*oB  +\
    \   |\n|    .....*+++    |\n+----[SHA256]-----+\n```\n\nIf you really are using\
    \ the keys for security purposes you should supply a passphrase, which is requested\
    \ when the key pair is used. If you are simply using the keys to avoid entering\
    \ a password then leave the passphrase blank for simplicity.\n\nThe key generation\
    \ will leave two files in the .ssh directory – in this case pi and pi.pub. The\
    \ first is the private key and this you keep to yourself as it is what proves\
    \ that the machine is the one that the public key belongs to. The pi.pub file\
    \ contains the public key and this is the one that has to be copied to the remote\
    \ machine. The remote machine uses the public key to challenge the local machine\
    \ to decode something which can only be done with the private key, so proving\
    \ that the machine is legitimate, or rather that it has the private key.\n\nYou\
    \ can use the public key with as many remote machines as you need to. The key\
    \ identifies you as being allowed to connect to a machine that has it using SSH.\
    \ To make this happen, you have to enter the details of the file into .ssh/authorized_keys.\
    \ You can do this any way you know how to, but the public key file has to be copied\
    \ to ~/.ssh/ on the remote machine and renamed authorized_keys. As you have SSH\
    \ working, the simplest thing to do is:\n\n```bash\nscp pi.pub pi@192.168.11.151:~/.ssh/authorized_keys\n\
    ```\n\nYou might have to make the .ssh folder first. You will have to provide\
    \ the user's password. If this works you will find authorized_keys in the .ssh\
    \ directory. If you want to store more public keys in authorized_keys so that\
    \ more than one user can log on, you have to append additional public key files\
    \ to authorized_keys.\n\nSSH will not use the key file if ~/.ssh or ~ are writable\
    \ by Group or Others. One way of ensuring this is not the case:\n\n```bash\nchmod\
    \ 700 ~/.ssh\nchmod 600 ~/.ssh/authorized_keys\n```\n\nAs long as the permissions\
    \ are set correctly, you should be able to connect without a password using:\n\
    \n```bash\nssh -i ~/.ssh/pi pi@192.168.11.151\n```\n\nIf you don't use -i ~/.ssh/pi\
    \ to specify the private key file, you might be asked for a password as well as\
    \ the key file. You also have to specify the correct user name.\n\nIf you want\
    \ to log on and not specify the key file, i.e. just using:\n\n```bash\npi@192.168.11.151\n\
    ```\n\nthen you need to make sure your key files have the correct default names.\
    \ For protocol 2 the keys have to be called id_rsa and id_rsa.pub. If you use\
    \ these default names for RSA keys then the SSH agent will use them automatically.\
    \ If you use any other names, like pi and pi.pub, you will need an Identity file\
    \ specified in .ssh config.\n\nOpen the file config in the C:\\Users\\user\\.ssh\
    \ directory on the local machine (~/.ssh under Linux) and enter:\n\n```\nHost\
    \ 192.168.11.151\n    HostName 192.168.11.151\n    User pi\n    PubKeyAuthentication\
    \ yes\n    IdentityFile ~/.ssh/pi\n```"
  mdcn: "如果你想让脉冲序列持续输出，就需要一个循环来保持队列填充：\n\n```python\nimport lgpio\nfrom collections\
    \ import namedtuple\n\nPulse = namedtuple('Pulse', ['group_bits', 'group_mask',\n\
    \                             'pulse_delay'])\n\nGPIOChip = lgpio.gpiochip_open(4)\n\
