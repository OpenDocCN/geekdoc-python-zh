  md: '# Chapter 13

    The SPI Bus


    The Pi offers three standard protocols for connecting more sophisticated devices
    – serial or RS232, Serial Peripheral Interface or SPI, and I2C. Of these, GPIO
    Zero supports only the SPI bus and this is the one we need to look at first.


    As long as you restrict your attention to the devices that GPIO Zero supports,
    then everything is very easy. The good news is that if you are prepared to spend
    a little time understanding how the SPI bus works, you can easily add your own
    custom devices. If you want to use the I2C, or any other bus, then you need to
    look beyond GPIO Zero. You could move to C and interface directly with the hardware
    or, if you want to stay with Python, you could use Linux drivers, in which case
    see *Raspberry Pi IOT in Python with Linux Drivers, 2nd Ed*, ISBN:9781871962864.


    # SPI Bus Basics


    In the configuration most used for the Pi, there is a single master and, at most,
    two slaves.

    The signal lines are:


    +   - MOSI (Master Output Slave Input), i.e. data to the slave

    - MISO (Master Input Slave Output), i.e. data to the master

    - SCLK (Serial Clock), which is always generated by the master'
  merge: -1
  pgno: 196
- img_proc: true
  md: "![](img/39c0a42d027b4a8b43b07050c297f3ff_197_0.png)\n\nIn general, there can\
    \ also be any number of SS (Slave Select) or CE (Chip Enable) lines, which are\
    \ usually set low to specify which slave is being addressed. Notice that unlike\
    \ other buses, I2C for example, there are no SPI standard commands or addresses,\
    \ only bytes of data. However, slave devices do interpret some of the data as\
    \ commands to do something or send some particular data.\n\nThe pins that are\
    \ used for the Pi's SPI0 bus are:\n\n| Function | Pin | GPIO Line |\n| :--- |\
    \ :--- | :--- |\n| MOSI | 19 | GPIO10 |\n| MISO | 21 | GPIO09 |\n| SCLK | 23 |\
    \ GPIO11 |\n| CE0 | 24 | GPIO08 |\n| CE1 | 26 | GPIO07 |\n\nGPIO Zero supports\
    \ the SPI0 bus, but only via the Linux SPI driver spidev and the Python spidev\
    \ library, which should already be installed. However, to make use of the SPI\
    \ driver you have to enable it. You can do this either by using raspi-config,\
    \ or by ensuring the line dtparam=spi=on isn't commented out in /boot/config.txt,\
    \ and rebooting. If the SPI driver is loaded, you should see the file /dev/spidev0.0.\n\
    \nIf you want to activate the driver in Python code then use:\n\n```\nimport subprocess\n\
    temp = subprocess.Popen([\"sudo\", \"dtparam\", \"-l\"],\n                   \
    \    stdout = subprocess.PIPE)\noutput = str(temp.communicate())\nprint(output)\n\
    lastSPI=output.rfind(\"spi\")\n```"
