  - "[PAGE 242]\n\nCreate the .vscode folder in the top-level of the folder. Again,\
    \ it is important that you create the folder in GPIOZERO as the configuration\
    \ files apply to all of the subdirectories.\n\nCreate a test project folder HelloWorld\
    \ in this case and create a simple Hello.py test program.\n\nDownload the three\
    \ files settings.json, tasks.json and launch.json from the I/O Press website,\
    \ www.iopress.info, or type them in from the listings at the end of this appendix,\
    \ and copy them into the .vscode folder.\n\nEdit settings.json in the .vscode\
    \ folder to read something like:\n\n```\n{\n    \"sshUser\": \"pi\",\n    \"sshEndpoint\"\
    : \"192.168.11.170\",\n    \"remoteDirectory\": \"/home/pi/Documents/\",\n}\n\
    ```\n\nChange the user name, IP address and the directory you want to use to store\
    \ your programs in.\n\nIf you haven't already done so, you need to install debugpy,\
    \ which is the latest Python debugger for VS Code. On the remote machine, i.e.\
    \ the Pi, enter:\n\n```\npython3 -m pip install debugpy\n```\n\nIf you don't have\
    \ a virtual environment set up you may need to use:\n\n```\npython3 -m pip install\
    \ debugpy --break-system-packages\n```\n\nYou have to do this on any machine you\
    \ want to remote debug on.\n\nTo run a program, view the program in the editor\
    \ and use the menu option Terminal,Run Build Task or press Ctrl+Shift+B. You will\
    \ see the program files being copied and then you will see the output of the program\
    \ in the terminal window. Notice that you will not see any graphics and you can't\
    \ provide input to the program. For general-purpose Python programs this would\
    \ be a problem, but for IoT programs it usually isn't. Notice that if you have\
    \ to provide a password for SSH connections you will be asked to supply it. Use\
    \ the StopRemotePython task to stop all Python programs on the remote machine.\n\
    \nTo debug a program, first use the menu option Terminal,Run Task and select tunnel.\
    \ You will see a terminal open and connect to the remote computer. You only need\
    \ to establish a tunnel once and you can check if one is already open by the presence\
    \ of a terminal window labeled Task - tunnel. Don't try to open more than one\
    \ tunnel and note that remote debugging won't work unless you have a tunnel to\
    \ the remote machine open.\n\nYou also need to make sure that the workspace folder\
    \ is present on the remote machine. You can use the makeRemoteWorkSpace task to\
    \ do this."
