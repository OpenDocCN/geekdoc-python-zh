- img_proc: true
  md: '# Chapter 14

    Custom SPI Devices


    If you only want to use SPI A to D converter chips, you already know enough about
    SPI. However, the SPI bus is commonly encountered as it is used to connect all
    sorts of devices, from LCD displays to real time clocks, and not just A to D converters.
    If you want to write your own code to work with other devices then GPIO Zero makes
    this relatively easy, but you do need to know a little more about how SPI works.


    # SPI Software


    The SPI bus is odd - it does not use bidirectional serial connections. There is
    a data line for the data to go from the master to the slave and a separate data
    line from the slave back to the master. That is, instead of a single data line
    that changes its transfer direction, there is one for data out and one for data
    in. It is also worth knowing that the drive on the SPI bus is push-pull, and not
    open collector/drain. This provides higher speed and more noise protection as
    the bus is driven in both directions.


    Data transfer on the SPI bus is also slightly odd. What happens is that the master
    pulls one of the chip selects low, which activates a slave. Then the master toggles
    the clock SCLK and both the master and the slave send a single bit on their respective
    data lines. After eight clock pulses, a byte has been transferred from the master
    to the slave and from the slave to the master. You can think of this as being
    implemented as a circular buffer, although it doesn''t have to be.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_206_0.png)


    This full-duplex data transfer is often hidden by the software and the protocol
    used. For example, there is a read function that reads data from the slave and
    sends zeros or data that is ignored by the slave. Similarly, there is a write
    function that sends valid data, but ignores whatever the slave sends.'
  merge: -1
  pgno: 206
- img_proc: true
  md: 'The transfer is typically in groups of eight bits, usually most significant
    bit first, but this isn''t always the case. In general, as long as the master
    supplies clock pulses, data is transferred.


    Notice this circular buffer arrangement allows for slaves to be daisy-chained
    with the output of one going to the input of the next. This makes the entire chain
    one big circular shift register. This can make it possible to have multiple devices
    with only a single chip select, but it also means any commands sent to the slaves
    are received by each one in turn. For example, you could send a convert command
    to each A to D converter in turn and receive back results from each one.


    # SPI Device - The Data Transfer Functions


    The A to D converter objects all inherit from the SPI class, which is the base
    class for working with any SPI device. You create an SPI device in the usual way,
    specifying the SPI port or the GPIO lines to be used. If the device can open the
    Linux driver on those lines then this is used, otherwise the software interface
    is used. You have to remember to close the SPI device to release the GPIO lines,
    otherwise Linux will be unable to manage them.


    The SPI Device has a number of methods, provided via the _spi field, that allow
    you to transfer data and the most fundamental is the transfer function. The _spi
    field is an instance of the SPI interface class that the pin factory provides.
    That is, assuming Dev is an instance of SPI Device:


    ```

    wordsIn=Dev._spi._transfer(wordsOut)

    ```


    sends the bytes specified in wordsOut and receives the bytes sent by the client
    device in wordsIn. The wordsIn and wordsOut variables are simply a list of bytes.
    So for example:


    ```

    wordsIn=Dev._spi._transfer([0xAA,0xEE])

    ```


    sends two bytes, 0xAA and 0xEE. The returned data is similarly a list of bytes.
    There are two functions provided to make the conversion of integers to lists of
    bytes and vice versa easy:


    ```

    words=Dev._int_to_words(value)

    value=Dev._words_to_int(words)

    ```


    The first takes a numeric value and converts it to a list of bytes and the second
    does the opposite. To see how these work you have to keep in mind that in Python
    an integer can be as big as you like without loss of precision. For example:


    ```

    words=Dev._int_to_words(0xAABBCCDDEEFF)

    print(hex(Dev._words_to_int(words)))

    ```


    prints:

    0xaabbccddeeff'
