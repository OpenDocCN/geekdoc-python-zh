    \ is that for a PWM signal to convey information it generally has to deliver a\
    \ number of complete cycles with a given duty cycle. This is because of the way\
    \ pulses are often averaged in applications.\n\nWe also have another problem –\
    \ synchronization. There is no way to swap from one duty cycle to another exactly\
    \ when a complete duty cycle has just finished. All you can do is use a timer\
    \ to estimate when the pulse is high or low. What this means is that there is\
