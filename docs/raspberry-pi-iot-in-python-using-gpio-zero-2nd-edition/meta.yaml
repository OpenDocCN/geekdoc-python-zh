  - "[PAGE 144]\n\n# Uses of PWM – D to A\n\nSo far we have looked at PWM driving\
    \ devices that were happy being switched on and off and hence varying their output.\
    \ Of course, an LED doesn't dim to 50%, it is simply off for half of the time\
    \ and our eyes don't see the flashing as long as it is fast enough. It is possible\
    \ to arrange for a PWM signal to generate a voltage proportional to its duty cycle\
    \ and remove all the switching on and off. If you add a low-pass filter to the\
    \ output of a PWM signal then what you get is the average of the voltage, i.e.\
    \ a voltage that is proportional to the duty cycle.\n\nThis can be looked at in\
    \ many different ways, but again it is the result of the amount of power delivered\
    \ by a PWM signal. You can also think of it as using the filter to remove the\
    \ high frequency components of the signal, leaving only the slower components,\
    \ due to the modulation of the duty cycle.\n\nThe PWM output in this configuration\
    \ mimics the workings of a digital to analog converter. You set the duty cycle\
    \ d to a value between 0 to 1 and you get a voltage output that is 3.3 times dV.\
    \ The frequency of the PWM signal governs how fast you can change the voltage.\
    \ The usual rule of thumb is that you need 10 pulses to occur per conversion,\
    \ i.e. the maximum frequency you can produce is pulse frequency/10. This means\
    \ that the fastest signal you can create using the GPIO pin factory is around\
    \ 1kHz, which isn't fast enough for a great many applications and you can't use\
    \ it for sound synthesis, in particular.\n\nTo demonstrate the sort of approach\
    \ that you can take to D to A conversion, the following program creates a triangle\
    \ waveform:\n\n```\nfrom gpiozero import PWMOutputDevice\nfrom time import sleep\n\
    \npwm=PWMOutputDevice(4)\npwm.frequency=1000\nsteps=8\ndelay=0.001\nwhile True:\n\
    \    for d in range(steps):\n        pwm.value=d/steps\n        sleep(delay)\n\
    \n    for d in range(steps):\n        pwm.value=(steps-d)/steps\n        sleep(delay)\n\
    ```\n\nThis first generates an increasing duty cycle and then a decreasing duty\
    \ cycle with about 8 pulses needed to go from 0 to 1 and then back to 1."
