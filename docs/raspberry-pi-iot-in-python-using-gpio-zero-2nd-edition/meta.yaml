  md: "of a virtual class, a class that simply defines the attributes that any class\
    \ derived from it has to have. This often serves as the base class for a hierarchy\
    \ as it doesn't even implement the methods it defines, leaving that to the next\
    \ derived class.\n\nPython doesn't have virtual classes, but that doesn't stop\
    \ GPIO Zero from using something that looks like a virtual class. If you look\
    \ at the entire GPIO Zero class hierarchy, you will see that Device is the top\
    \ of the hierarchy:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_49_0.png)\n\n\
    If you examine the code for Device you will find that, while it does have some\
    \ methods and data attributes, one of its attributes is coded as:\n\n```\n@property\n\
    def value(self):\n    \"\"\"\n    Returns a value representing the device's state.\
    \ Frequently, this is a\n    boolean value, or a number between 0 and 1 but some\
    \ devices use larger\n    ranges (e.g. -1 to +1) and composite devices usually\
    \ use tuples to\n    return the states of all their subordinate components.\n\
    \    \"\"\"\n    raise NotImplementedError\n```\n\nYou can see that this makes\
