  md: '# Connecting the MCP3008 to the Pi


    The connection to the Pi''s SPI bus is very simple and can be seen in the diagram
    below.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_202_0.png)


    The only additional component that is recommended is a 1µF capacitor connected,
    between pins 15 and 16, to ground, mounted as close to the chip as possible. As
    discussed in the previous section, you might want a separate voltage reference
    for pin 15, rather than just using the 3.3V supply.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_202_1.png)


    The program that reads the voltage on any of the device''s pins is exceptionally
    simple:


    ```

    python

    from gpiozero import MCP3008


    adc=MCP3008(channel=0)

    print(adc.value)

    ```


    The MCP3008 class returns an object that can be used to read the A to D converter''s
    channel by calling its value method. Each time you call value, a new conversion
    is initiated. If this program doesn''t work and you get a'
  merge: -1
  pgno: 202
- img_proc: true
  md: "warning message, then it is almost certain that you don't have the Linux driver\
    \ installed. If you look beyond the warning message, you should see that the program\
    \ has worked. The reason is that, if the Linux driver isn't found, GPIO Zero falls\
    \ back to a software implementation, which is slow but works in this case. If\
    \ the program works, but you get silly readings then it is almost certain that\
    \ you have wired the circuit incorrectly or have a malfunctioning component.\n\
    \nIt is assumed that the reference voltage is 3.3V and the value returned is scaled\
    \ to the range 0.0 to 1.0. You can set the reference voltage using:\n`max_voltage=Vref`\n\
    \nIf you want to work in differential mode you have to add:\n`differential=True`\n\
    \nThat's all there is to it. You can specify which SPI interface to use, but as\
    \ only one is supported this is redundant.\n\n# The Software Fallback\n\nIf you\
    \ want to use the software implementation you can specify the GPIO pins used for\
    \ each SPI function. For example, the previous A to D program can be written:\n\
    \n```\nadc=MCP3008(channel=0, clock_pin=11, mosi_pin=10,\n            miso_pin=9,\
    \ select_pin=8)\nprint(adc.value)\n```\n\nNotice that now we are specifying the\
    \ GPIO lines to be used for each SPI function. In this case these are the same\
    \ as the hardware-provided SPI pins, but if the Linux driver isn't loaded the\
    \ software implementation is used. Of course, if you select a set of pins that\
    \ aren't supported by the Linux driver, then the software implementation is always\
    \ used. You can silence the warning that the software implementation is about\
    \ to be used with:\n\n```\nimport warnings\nwarnings.simplefilter('ignore')\n\
    ```\n\n# How Fast?\n\nHow fast the SPI interface can work is a complicated question.\
    \ A simpler one is how fast does the default hardware SPI interface work when\
    \ reading an A to D? The program to find this out is:\n\n```\nfrom gpiozero import\
    \ MCP3008\nadc=MCP3008(channel=0)\nwhile True:\n    adc.value\n```"
