    \n- Unlike other serial buses, the SPI makes use of unidirectional connections.\n\
    - The data lines are MOSI (master output slave input) and MISO (master input slave\
    \ output).\n- In addition, there is a clock line, output from master, and a number\
    \ of select lines, two in the case of the Pi.\n- Data is transferred from the\
    \ master to the slave and from the slave to the master on each clock pulse, arranged\
    \ as a circular buffer.\n- You can test the SPI bus using a simple loopback connection.\n\
    - Working with a single slave is usually fairly easy, working with multiple slaves\
    \ can be more of a problem.\n- Making SPI work with any particular device has\
    \ four steps:\n    i. Discover how to connect the device to the SPI pins. This\
    \ is a matter of identifying pinouts and mostly what chip selects are supported.\n\
    \    ii. Find out how to configure the Pi's SPI bus to work with the device. This\
    \ is mostly a matter of clock speed and mode.\n    iii. Identify the commands\
    \ that you need to send to the device to get it to do something and what data\
    \ it sends back as a response.\n    iv. Find, or work out, the relationship between\
    \ the raw reading, the voltage and the quantity the voltage represents.\n- Implementing\
    \ any custom device using almost any method of connection generally involves a\
    \ great deal of bit manipulation.\n\n# Chapter 15\n\n## Using The Lgpio Library\n\
    \nAlthough this book is about GPIO Zero, the default pin factory that it uses\
    \ is based on the lgpio library which provides a lower level way of working with\
    \ the hardware. lgpio is a Python library that uses the Linux GPIO and other drivers\
    \ to access the hardware. It lacks any object-oriented features and as such is\
    \ potentially faster and not as abstract. If GPIO Zero is two steps away from\
    \ the hardware, lgpio is at only one remove. What this means is that you can use\
    \ it to do things that aren't implemented in GPIO Zero and you can use its functions\
    \ to implement objects that do the same job and so extend GPIO Zero in new ways\
    \ that are still reasonably machine-independent.\n\nlgpio is a large collection\
    \ of functions and covering them all would take a book in its own right. This\
    \ chapter explains the basic philosophy and organization of the library and the\
    \ principles you need to know to make good use of it.\n\n## A First Program Blinky\n\
    \nYou don't need to do anything new to use lgpio as you have already been using\
    \ it as the pin factory for GPIO Zero. Even if you haven't, the library is installed\
    \ by default on all Pis – you simply have to import it. The Linux drivers that\
    \ lgpio makes use of all follow the same basic idea. They convert the hardware\
    \ in question to things that look like files. For example, the Linux GPIO driver\
    \ makes the GPIO hardware look like folders in the file system. If you look in\
    \ the /dev directory you will find files corresponding to each GPIO controller\
    \ installed. You will see at least:\n\n```\n/dev/gpiochip0\n```\n\nThis represents\
    \ the main GPIO controller and all of the GPIO lines it provides. On the Pi 5\
    \ this is represented by:\n\n```\n/dev/gpiochip4\n```\n\nand this is a small but\
    \ irritating difference that means your programs have to be slightly different\
    \ to work on a Pi 5.\n\nTo work with the drivers you basically have to treat them\
    \ as files and read and write data from and to them. lgpio does this for you and\
    \ this allows you to use the drivers by making function calls to the library.\
    \ For example to implement a Blinky program all you have to do is open a GPIO\
    \ chip, claim a line to use as output and start writing data to it:\n\n```python\n\
    import lgpio\n\nGPIOChip = lgpio.gpiochip_open(0)\n\nlgpio.gpio_claim_output(GPIOChip,\
    \ 4)\n\nwhile True:\n    lgpio.gpio_write(GPIOChip, 4, 0)\n    lgpio.gpio_write(GPIOChip,\
    \ 4, 1)\n\nlgpio.gpiochip_close(GPIOChip)\n```\n\nThe first instruction opens\
    \ the “chip” that operates the GPIO lines we are trying to use. There can be more\
    \ than one chip and some offer GPIO lines you can use and some are only for internal\
    \ use. On the Pi 5 the chip is gpiochip4 and on all others it is gpiochip0. If\
    \ you plan to run this program on a Pi 5 change:\n\n```python\nGPIOChip = lgpio.gpiochip_open(0)\n\
    ```\n\nto:\n\n```python\nGPIOChip = lgpio.gpiochip_open(4)\n```\n\nThe open returns\
    \ a reference to the open chip that you have to use in other function calls. The\
    \ claim_output function sets the specified GPIO line, GPIO4 in this case, to be\
    \ an output and “claims” it in the sense that another program using the GPIO lines\
    \ via the driver cannot make use of it. The while loop simply sets the specified\
    \ GPIO line, 4 in this case, to 0 and 1 alternately. Although the close function\
    \ is never called, you should close a GPIO chip when you are finished with it\
    \ – this releases all of the claimed GPIO lines so that other programs can use\
    \ them.\n\nIf you run this on a Pi 5 you will find that the pulses about 1.5μs.\
    \ A Pi 4 is slightly faster at 1μs and a Pi Zero 2W is slower at 2μs. However,\
    \ this is still ten times faster than using GPIO Zero and a raw Pin object.\n\n\
    ## Basic GPIO Functions\n\nThe basic GPIO functions concerned with opening and\
    \ closing a particular GPIO chip are:\n\n- `gpiochip_open` Opens a GPIO chip\n\
    - `gpiochip_close` Closes a GPIO chip\n\nYou have to open a GPIO chip before you\
    \ can work with any GPIO lines and you should close it when finished. Other programs\
    \ can open a GPIO chip while you have it open and make use of it, but they cannot\
    \ use any GPIO lines you have claimed unless you release them, see the line functions\
    \ later, or close the chip.\n\nYou can find out the basic information about a\
    \ GPIO chip using:\n\n- `gpio_get_chip_info` Gets information about a GPIO chip\n\
    \nThis returns a list with a range of information, including what lines the chip\
    \ supports. In most cases you write programs that assume a basic chip configuration\
    \ and this function is really only useful for exploring a new machine.\n\nIn most\
    \ cases you open a GPIO chip to make use of its GPIO lines. You can find out about\
    \ a particular line using:\n\n- `gpio_get_line_info` Gets information about a\
    \ GPIO line\n- `gpio_get_mode` Gets the mode of a GPIO line\n\nThe mode is a number\
    \ that tells you if the line is input or output and what is using it. See the\
    \ documentation for a table of results.\n\nBefore you can use a GPIO line you\
    \ have to claim it. There are three functions that can claim a line for input,\
    \ output and alert:\n\n- `gpio_claim_input` Claims a GPIO for input\n- `gpio_claim_output`\
