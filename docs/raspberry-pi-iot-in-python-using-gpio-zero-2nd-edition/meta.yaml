  - "[PAGE 139]\n\nYou might be thinking that the next thing to do is to create a\
    \ PWMLED custom class. The good news is you don't have to as PWMLED is a standard\
    \ class within GPIO Zero and has an identical set of methods to PWMOutputDevice.\
    \ You can create a flashing LED with almost no effort:\n\n```\nfrom gpiozero import\
    \ PWMLED\npwmLED=PWMLED(4)\npwmLED.pulse(fade_in_time=1,fade_out_time=1,\n   \
    \          n=None,background=False)\n```\n\nIf you want a full on and full off\
    \ period then try:\n\n```\nfrom gpiozero import PWMLED\npwmLED=PWMLED(4)\npwmLED.blink(fade_in_time=1,on_time=2,fade_out_time=1,off_time=2,\n\
    \             n=None,background=False)\n```\n\n# RGBLED\n\nA simple variation\
    \ on the PCWLED is the RGBLED. RGB LEDs are four-pin devices in which a red, a\
    \ green and a blue LED are packaged into a single case. You can switch the three\
    \ LEDs on and off independently. You can see a typical device below complete with\
    \ its connections:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_139_0.png)\n\n\
    RGB LEDs come in two types, common anode (right) and common cathode (left), depending\
    \ on which end of the LEDs makes the connection:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_139_1.png)"
  - '[PAGE 140]


    How to drive such an LED is just a repeat of driving a single LED. You need at
    the very least three current-limiting resistors:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_140_0.png)


    How you wire them up depends on whether the device is common cathode or common
    anode. The diagram on the left is for a common anode arrangement and in this case
    the LED lights up when the GPIO line is low. The diagram on the right is for common
    cathode and in this case the LED lights up when the GPIO line is high. If you
    want brighter LEDs then you will also need three transistors to drive them at
    a higher current. Also, in principle, each of the LEDs has a different forward
    voltage and so if you want them to be the same brightness you need to adjust the
    current-limiting resistors, but in practice this is rarely necessary.


    Once you have the RGB LED wired up all you have to do is create an RGBLED object
    to control it. The simplest constructor call is just:

    RGBLED(red,green,blue)


    where red, green and blue are the GPIO lines controlling the color specified.
    Following on from this you can use the color method to specify which of the RGB
    LEDs is on. For example:


    ```

    from gpiozero import RGBLED


    led = RGBLED(2, 3, 4)

    led.color = (1, 1, 0)

    ```


    turns on the red and green LEDs, making yellow.

    At this point you might be wondering where PWM comes into the picture. The answer
    is that the three LEDs in the RGBLED are PWMLED objects and this means that you
    can specify values between 0 and 1 in the color method. For example:


    ```

    led.color = (0.5, 0.5, 0.5)

    ```


    produces gray with each LED on 50% of the time.'
  - '[PAGE 141]


    If you use `pwm=False` in the constructor, three standard LEDs are used and you
    are restricted to 0 and 1 in the calls to the `color` method.

    As long as you use `pwm=True`, the default, all of the `PWMLED` methods are available
    including `toggle`, `pulse` and `blink`. In each case the three LEDs are varied
    according to the color specified. For example:

    `pulse(fade_in_time=1, fade_out_time=1, on_color=(1, 1, 1), off_color=(0, 0, 0),
    n=None, background=True)`

    will vary each LED from the specified off duty cycle to the specified on duty
    cycle in the specified `fade_in_time` and back to the off color in the `fade_out_time`.

    It is worth knowing a little about how `RGBLED` works. It could make use of the
    `CompositeDevice` class, explained later, to create and manage three `PWMLED`
    devices or three ordinary LEDs, but instead it does the job directly and creates
    a tuple of the required LED objects. That is, assuming `pwm=True`, it creates
    a tuple equivalent to:

    `self._leds=tuple(PWMLED(red), PWMLED(green), PWMLED(blue))`

    The modified methods then work with this tuple of LED devices.


    # Tonal Buzzer


    What if you want to produce not exactly music, but a tone at least. We have already
    looked at Buzzer back in Chapter 5. It is a simple on/off device – it either buzzes
    or it doesn’t – and you can’t modify the frequency. While in most cases it is
    the duty cycle that is important in the use of PWM, you can make use of it here
    to create a variable frequency output. In this case to hear the sound you need
    either a passive buzzer or a small loudspeaker. In either case, you will need
    a transistor driver, or even a full amplifier, to get a reasonable volume.

    A passive buzzer is difficult to buy because they look the same as active buzzers
    and even buzzers that claim to be “passive” are in fact active. The difference
    between them is that when you connect an active buzzer to a power source it starts
    to buzz, usually very loudly, whereas a passive buzzer doesn’t have any sound-generating
    electronics and needs a varying signal to make any sound. Most passive buzzers
    are piezoelectric and while these draw little current, they are not safe to simply
    connect to a GPIO line. There are also electromagnetic buzzers available in the
    same packaging and these have a very low resistance which would effectively short
    out a GPIO line connected directly, so proceed with caution. A small electromagnetic
    loudspeaker also has low resistance and needs to be driven by a transistor.

    As far as the GPIO line is concerned, a passive piezoelectric buzzer looks like
    a capacitor and has to be driven in a way that allows it to charge and discharge.
    You can get away with connecting a piezoelectric buzzer directly, but you risk
    damaging the Pi in the long run and it won’t be very loud.'
  - '[PAGE 142]


    The correct way to do the job is:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_142_0.png)


    It is also worth knowing that piezoelectric buzzers make more noise at high frequency
    and usually have a high resonant frequency.

    If you want to use a small loudspeaker then you need to know that even the smallest
    will draw more current than a GPIO line can safely supply. You can drive a speaker
    with a single transistor, but a push-pull arrangement is better, even if it does
    use two transistors:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_142_1.png)


    Alternatively you can use any audio amplifier you can find – there are many low-cost
    modules available.'
  - "[PAGE 143]\n\nNow we have the buzzer or speaker connected, the software is relatively\
    \ easy. The TonalBuzzer class plus the Tone class gives you multiple ways to specify\
    \ a note. You can construct a Tone object to specify the frequencies you want\
    \ in a number of ways:\n\n+   - from_frequency(440) or Tone(frequency=440)\n \
    \ Specifies a frequency in Hz\n- from_note('A4') or Tone(note='A4')\n  Specifies\
    \ a musical note giving the note name and octave\n- from_midi(69) or Tone(midi=69)\n\
    \  Produces the specified tone\n\nIf you simply use the constructor without saying\
    \ what the specification method is then it does its best to work it out. So Tone(440)\
    \ gives you a note with its frequency set to 440Hz, as does Tone('A4') and Tone(69).\n\
    \nThere are also some useful methods for working with notes:\n\n+   - down(n=m)\
    \ Lowers note by m semitones\n- up(n=m) Raises note by m semitones\n- frequency()\
    \ Returns current frequency\n- note() Returns the nearest note to the current\
    \ frequency\n- midi() Return nearest midi note to the current frequency\n\nUsing\
    \ them and TonalBuzzer we can easily write a program to produce a concert A, i.e.\
    \ the note used to tune orchestras:\n\n```\nfrom gpiozero import TonalBuzzer\n\
    from signal import pause\ntonal=TonalBuzzer(4)\ntonal.play(\"A4\")\npause()\n\
    ```\n\nIf you try this out you will find that you do indeed get a noise that is\
    \ about 440Hz. How pleasant you find the noise depends on the buzzer or speaker\
    \ you are using and it isn't always the case that better equipment produces better\
    \ sound. If you check on the frequency you will find the usual discrepancy between\
    \ the specified and actual frequency. For example, a Pi Zero using rpigpio produces\
    \ a note of 402Hz for A4 which is off by 38Hz, i.e. an error of just less than\
    \ 9%.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_143_0.png)\n\nA Pi 5 using lgpio\
    \ is much more accurate at about 439.9Hz."
- md: "## Uses of PWM – D to A\n\nSo far we have looked at PWM driving devices that\
    \ were happy being switched on and off and hence varying their output. Of course,\
    \ an LED doesn't dim to 50%, it is simply off for half of the time and our eyes\
    \ don't see the flashing as long as it is fast enough. It is possible to arrange\
    \ for a PWM signal to generate a voltage proportional to its duty cycle and remove\
    \ all the switching on and off. If you add a low-pass filter to the output of\
    \ a PWM signal then what you get is the average of the voltage, i.e. a voltage\
    \ that is proportional to the duty cycle.\n\nThis can be looked at in many different\
    \ ways, but again it is the result of the amount of power delivered by a PWM signal.\
    \ You can also think of it as using the filter to remove the high frequency components\
    \ of the signal, leaving only the slower components, due to the modulation of\
    \ the duty cycle.\n\nThe PWM output in this configuration mimics the workings\
    \ of a digital to analog converter. You set the duty cycle d to a value between\
    \ 0 to 1 and you get a voltage output that is 3.3 times dV. The frequency of the\
    \ PWM signal governs how fast you can change the voltage. The usual rule of thumb\
    \ is that you need 10 pulses to occur per conversion, i.e. the maximum frequency\
    \ you can produce is pulse frequency/10. This means that the fastest signal you\
    \ can create using the GPIO pin factory is around 1kHz, which isn't fast enough\
    \ for a great many applications and you can't use it for sound synthesis, in particular.\n\
    \nTo demonstrate the sort of approach that you can take to D to A conversion,\
    \ the following program creates a triangle waveform:\n\n```\nfrom gpiozero import\
    \ PWMOutputDevice\nfrom time import sleep\n\npwm=PWMOutputDevice(4)\npwm.frequency=1000\n\
    steps=8\ndelay=0.001\nwhile True:\n    for d in range(steps):\n        pwm.value=d/steps\n\
    \        sleep(delay)\n\n    for d in range(steps):\n        pwm.value=(steps-d)/steps\n\
    \        sleep(delay)\n```\n\nThis first generates an increasing duty cycle and\
    \ then a decreasing duty cycle with about 8 pulses needed to go from 0 to 1 and\
    \ then back to 1.\n\nTo see the analog waveform, we need to put the digital output\
    \ into a low-pass filter. A simple resistor and capacitor work reasonably well:\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_145_0.png)\n\nThe filter's cutoff is\
    \ 50Hz and might be a little on the high side for a frequency output this low.\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_145_1.png)\n\nYou can see that the\
    \ frequency is around 43Hz and there are still lots of “jaggies” which could be\
    \ further reduced by using a larger capacitor in the filter. There is a particularly\
    \ big step at the start and end of each cycle, due to the jump to a duty cycle\
    \ of 0 and 1. Nothing can be done about this.\n\nYou can create a sine wave, or\
    \ any other waveform you need, using the same techniques, but 200Hz is a practical\
    \ upper limit on what can be managed.\n\nIf you already know that the PWM outputs\
    \ are used to create audio on the Pi, you might be wondering how this is possible?\
    \ The answer is that it uses hardware-generated PWM and can reach much higher\
    \ frequencies.\n\n## What Else Can You Use PWM For?\n\nPWM lines are incredibly\
    \ versatile and it is always worth asking the question \"could I use PWM?\" when\
    \ you are considering almost any problem. The LED example shows how you can use\
    \ PWM as a power controller. You can extend this idea to a computer-controlled\
    \ switch mode power supply. All you need is a capacitor to smooth out the voltage\
    \ and perhaps a transformer to change the voltage.\n\nYou can also use PWM to\
    \ control the speed of a DC motor, the subject of the next chapter, and if you\
    \ add a simple bridge circuit you can control its direction and speed.\n\nFinally,\
    \ you can use a PWM signal as a modulated carrier for data communications. For\
    \ example, most infrared controllers make use of a 38kHz carrier, which is roughly\
    \ a 26μs pulse. This is switched on and off for 1ms and this is well within the\
    \ range that the PWM can manage. So all you have to do is replace the red LED\
    \ in the previous circuit with an infrared LED and you have the start of a remote\
    \ control, or data transmission, link.\n\n## Summary\n\n- PWM, Pulse Width Modulation,\
    \ has a fixed repetition rate, but a variable duty cycle, i.e. the amount of time\
    \ the signal is high or low changes.\n- PWM can be generated by software simply\
    \ by changing the state of a GPIO line correctly, but it can also be generated\
    \ in hardware, so relieving the processor of some work.\n- As well as being a\
    \ way of signaling, PWM can also be used to vary the amount of power or voltage\
    \ transferred. The higher the duty cycle, the more power/voltage.\n- The Pi has\
    \ two hardware PWM lines and these are capable of a range of operational modes,\
    \ but GPIO Zero only supports software-generated PWM at the moment.\n- The fundamental\
    \ PWM class is PWMOutputDevice and, although it seems not to be intended for regular\
    \ use, it is very easy to use it for raw PWM.\n- By varying the duty cycle, you\
    \ can dim an LED using PWMOutputDevice but it isn't very accurate on frequency\
    \ or duty cycle.\n- There is also a PWMLED which can vary the brightness of an\
    \ LED.\n- The RGBLED class uses three PWMLED to create any color.\n- TonalBuzzer\
    \ uses PWM to vary the frequency.\n- PWM can be used to implement a D to A converter\
    \ simply by varying the duty cycle and by varying the output of the D to A you\
    \ can create music.\n\n## Chapter 11\nControlling Motors And Servos\n\nMotors\
    \ form an important class of output devices and they are fairly easy to use, but\
    \ it is important to understand the different types of motor that you can use.\n\
    \nThe simplest division among types of motor are AC and DC. AC motors are generally\
    \ large and powerful and run from mains voltage. As they are more difficult to\
    \ work with, and they work at mains voltages, these aren't used much in IoT applications.\
    \ DC motors generally work on lower voltage and are much more suitable for the\
    \ IoT. In this chapter we will only look at DC motors and how they work thanks\
    \ to pulse width modulation.\n\n## DC Motor\n\nThere are two big classes of DC\
    \ motors – brushed and brushless. All motors work by using a set of fixed magnets,\
    \ the stator, and a set of rotating magnets, the rotor. The important idea is\
    \ that a motor generates a “push” that rotates the shaft by the forces between\
    \ the magnet that makes up the stator and the magnet that makes up the rotor.\
    \ The stronger these magnets are, the stronger the push and the more torque (turning\
    \ force) the motor can produce. To keep the motor turning, one of the two magnetic\
    \ fields has to change to keep the rotor being attracted to a new position.\n\n\
    DC motors differ in how they create the magnetism in each component, either using\
    \ a permanent magnet or an electromagnet. This means there are four possible arrangements:\n\
    \n| | 1 | 2 | 3 | 4 |\n|---|---|---|---|---|\n| **Stator** | Permanent | Permanent\
    \ | Electromagnet | Electromagnet |\n| **Rotor** | Permanent | Electromagnet |\
    \ Permanent | Electromagnet |\n| **Type** | Can't work | Brushed DC | Brushless\
    \ DC | Series or shunt |\n\nArrangement 1 can’t produce a motor because there\
    \ is no easy way of changing the magnetic field. Arrangement 4 produces the biggest\
    \ and most powerful DC motors as used in trains, cars and so on. Arrangement 2,\
    \ Brushed DC, is the most commonly encountered form of “small” DC motor. However,\
    \ arrangement 3, brushless DC, is becoming increasingly popular.\n\nDifferent\
    \ arrangements produce motors which have different torque characteristics – i.e.\
    \ how hard they are to stop at any given speed. Some types of motor are typically\
    \ low torque at any speed, i.e. they spin fast but are easy to stop.\n\nLow torque\
    \ motors are often used with gearboxes which reduce the speed and increase the\
    \ torque. The big problem with gearboxes, apart from extra cost, is backlash.\
    \ The gears don't mesh perfectly and this looseness means that you can turn the\
    \ input shaft and at first the output shaft won't move. Only when the slack in\
    \ the gears has been taken up will the output shaft move. This makes a geared\
    \ motor less useful for precise positioning, although there are ways to improve\
    \ on this using feedback and clever programming.\n\n## Brushed Motors\n\nTo energize\
    \ the electromagnets, a brushed motor supplies current to the armature via a split\
    \ ring or commutator and brushes. As the rotor rotates, the current in the coil\
    \ is reversed and it is always attracted to the other pole of the magnet.\n\n\
    The only problem with this arrangement is that, as the brushes rub on the slip\
    \ ring as the armature rotates, they wear out and cause sparks and hence RF interference.\
    \ The quality of a brushed motor depends very much on the design of the brushes\
    \ and the commutator.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_149_0.png)\n\
    \nVery small, cheap, brushed DC motors, of the sort in the picture below, tend\
    \ to not have brushes that can be changed and when they wear out the motor has\
    \ to be replaced. They also tend to have very low torque and high speed. This\
    \ usually means that they have to be used with a gearbox. If you overload a brushed\
    \ motor then the tendency is to demagnetize the stator magnets. The cheapest devices\
    \ are basically toys.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_149_1.png)"
  mdcn: "## PWM 的用途 – 数模转换\n\n到目前为止，我们已经了解了 PWM 驱动那些乐于被开关控制从而改变其输出的设备。当然，LED 并不会调暗到\
    \ 50%，它只是在一半的时间内关闭，只要闪烁速度足够快，我们的眼睛就察觉不到。可以安排 PWM 信号生成一个与其占空比成比例的电压，并消除所有的开关动作。如果你在\
    \ PWM 信号的输出端添加一个低通滤波器，那么你得到的就是电压的平均值，即一个与占空比成比例的电压。\n\n这可以从许多不同的角度来看待，但它仍然是 PWM\
    \ 信号所传递功率量的结果。你也可以将其视为使用滤波器去除信号的高频分量，只留下由于占空比调制而产生的较慢分量。\n\n这种配置下的 PWM 输出模拟了数模转换器的工作原理。你将占空比\
    \ d 设置为 0 到 1 之间的值，你就会得到一个 3.3 * d 伏特的电压输出。PWM 信号的频率决定了你改变电压的速度。通常的经验法则是每次转换需要\
    \ 10 个脉冲，即你能产生的最大频率是脉冲频率/10。这意味着使用 GPIO 引脚工厂能创建的最快信号大约是 1kHz，这对于许多应用来说不够快，特别是不能用于声音合成。\n\
    \n为了演示数模转换可以采用的方法，以下程序创建了一个三角波形：\n\n```\nfrom gpiozero import PWMOutputDevice\n\
    from time import sleep\n\npwm=PWMOutputDevice(4)\npwm.frequency=1000\nsteps=8\n\
    delay=0.001\nwhile True:\n    for d in range(steps):\n        pwm.value=d/steps\n\
    \        sleep(delay)\n\n    for d in range(steps):\n        pwm.value=(steps-d)/steps\n\
    \        sleep(delay)\n```\n\n这首先生成一个占空比递增的信号，然后是一个占空比递减的信号，大约需要 8 个脉冲从 0 变到 1，然后再变回\
    \ 1。\n\n要看到模拟波形，我们需要将数字输出放入一个低通滤波器。一个简单的电阻和电容就能工作得相当好：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_145_0.png)\n\
    \n滤波器的截止频率是 50Hz，对于如此低的频率输出来说可能有点偏高。\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_145_1.png)\n\
    \n你可以看到频率大约是 43Hz，并且仍然有很多“锯齿”，这可以通过在滤波器中使用更大的电容来进一步减少。在每个周期的开始和结束处有一个特别大的阶跃，这是由于跳变到占空比\
    \ 0 和 1 造成的。对此无能为力。\n\n你可以使用相同的技术创建正弦波或任何你需要的其他波形，但 200Hz 是实际可管理的上限。\n\n如果你已经知道\
    \ PWM 输出用于在树莓派上创建音频，你可能想知道这是如何可能的？答案是它使用硬件生成的 PWM，可以达到更高的频率。\n\n## PWM 还能用于什么？\n\
    \nPWM 线路功能极其强大，在考虑几乎任何问题时，都值得问一句“我能用 PWM 吗？”。LED 示例展示了如何将 PWM 用作功率控制器。你可以将这个想法扩展到计算机控制的开关电源。你只需要一个电容来平滑电压，也许还需要一个变压器来改变电压。\n\
    \n你还可以使用 PWM 来控制直流电机的速度，这是下一章的主题，如果你添加一个简单的桥式电路，你还可以控制其方向和速度。\n\n最后，你可以使用 PWM\
    \ 信号作为数据通信的调制载波。例如，大多数红外遥控器使用 38kHz 的载波，大约是 26μs 的脉冲。它被开关 1ms，这完全在 PWM 可管理的范围内。所以你所要做的就是将前一个电路中的红色\
    \ LED 替换为红外 LED，你就有了一个遥控器或数据传输链路的开端。\n\n## 总结\n\n-   PWM，脉冲宽度调制，具有固定的重复频率，但可变的占空比，即信号处于高电平或低电平的时间量会变化。\n\
    -   PWM 可以通过软件简单地改变 GPIO 线的状态来生成，但也可以在硬件中生成，从而减轻处理器的一些工作。\n-   除了作为一种信号传递方式，PWM\
    \ 还可用于改变传输的功率或电压量。占空比越高，功率/电压越大。\n-   树莓派有两个硬件 PWM 线路，它们能够支持一系列操作模式，但 GPIO Zero\
    \ 目前仅支持软件生成的 PWM。\n-   基本的 PWM 类是 PWMOutputDevice，虽然它似乎不是为常规使用而设计的，但用于原始 PWM 非常容易。\n\
    -   通过改变占空比，你可以使用 PWMOutputDevice 调暗 LED，但它在频率或占空比方面不是很精确。\n-   还有一个 PWMLED，可以改变\
    \ LED 的亮度。\n-   RGBLED 类使用三个 PWMLED 来创建任何颜色。\n-   TonalBuzzer 使用 PWM 来改变频率。\n\
    -   PWM 可以通过简单地改变占空比来实现数模转换器，并且通过改变数模转换器的输出，你可以创建音乐。\n\n## 第 11 章\n控制电机和伺服电机\n\
    \n电机是输出设备的一个重要类别，它们相当容易使用，但了解你可以使用的不同类型的电机很重要。\n\n电机类型最简单的划分是交流和直流。交流电机通常体积大、功率强，由市电电压驱动。由于它们更难操作，并且在市电电压下工作，在物联网应用中使用不多。直流电机通常在较低电压下工作，更适合物联网。在本章中，我们将只关注直流电机以及它们如何通过脉冲宽度调制工作。\n\
    \n## 直流电机\n\n直流电机有两大类——有刷和无刷。所有电机都通过使用一组固定磁铁（定子）和一组旋转磁铁（转子）来工作。重要的概念是，电机通过构成定子的磁铁和构成转子的磁铁之间的力产生一个“推力”来旋转轴。这些磁铁越强，推力就越强，电机就能产生更大的扭矩（转动力）。为了保持电机转动，两个磁场中的一个必须改变，以保持转子被吸引到新的位置。\n\
    \n直流电机在如何为每个部件产生磁性方面有所不同，要么使用永磁体，要么使用电磁铁。这意味着有四种可能的排列方式：\n\n| | 1 | 2 | 3 | 4\
    \ |\n|---|---|---|---|---|\n| **定子** | 永磁体 | 永磁体 | 电磁铁 | 电磁铁 |\n| **转子** | 永磁体\
    \ | 电磁铁 | 永磁体 | 电磁铁 |\n| **类型** | 无法工作 | 有刷直流 | 无刷直流 | 串励或并励 |\n\n排列 1 无法产生电机，因为没有简单的方法来改变磁场。排列\
    \ 4 产生最大、最强大的直流电机，用于火车、汽车等。排列 2，有刷直流，是最常见的“小型”直流电机形式。然而，排列 3，无刷直流，正变得越来越流行。\n\n\
    不同的排列方式产生的电机具有不同的扭矩特性——即在任何给定速度下它们有多难被停止。有些类型的电机在任何速度下通常扭矩都很低，即它们转得快但容易停止。\n\n\
    低扭矩电机通常与齿轮箱一起使用，齿轮箱可以降低速度并增加扭矩。齿轮箱除了增加成本外，最大的问题是齿隙。齿轮不能完美啮合，这种松动意味着你可以转动输入轴，而输出轴起初不会移动。只有当齿轮中的间隙被消除后，输出轴才会移动。这使得齿轮电机不太适合精确定位，尽管有方法可以通过反馈和巧妙的编程来改进这一点。\n\
    \n## 有刷电机\n\n为了给电磁铁通电，有刷电机通过分环或换向器和电刷向电枢提供电流。随着转子的旋转，线圈中的电流被反转，并且总是被磁铁的另一极吸引。\n\
    \n这种排列的唯一问题是，随着电枢的旋转，电刷在滑环上摩擦，它们会磨损并产生火花，从而引起射频干扰。有刷电机的质量在很大程度上取决于电刷和换向器的设计。\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_149_0.png)\n\n非常小、便宜的有刷直流电机，如下图所示的那种，往往没有可更换的电刷，当它们磨损时，电机必须更换。它们也往往具有非常低的扭矩和很高的速度。这通常意味着它们必须与齿轮箱一起使用。如果你使有刷电机过载，那么它往往会使定子磁铁退磁。最便宜的设备基本上是玩具。\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_149_1.png)"
