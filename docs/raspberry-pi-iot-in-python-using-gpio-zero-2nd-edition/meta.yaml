    # Chapter 1

    Why Pi For IoT?


    The Raspberry Pi is a different sort of IoT computer. It isn''t a small, cheap,
    but not-very-powerful, device – it is a cheap, but **more** powerful device. Running
    a full version of Linux and being supported by many different languages, it means
    that we are no longer restricted to assembler or C. Of the many higher-level languages
    available, Python is probably the most popular. The whole idea of writing IoT-style
    programs in Python is relatively new and it has its advantages and disadvantages.
    Python is slow to react, but powerful when roused. It takes time to do simple
    things like notice that a button has been pressed, but it makes implementing complex
    algorithms easier.


    This really is a new approach to the IoT and the Raspberry Pi is ideal for the
    task.


    In this short chapter, we will take a look at the range of devices that are available
    in the Pi family and the reasons for selecting one rather than another to do particular
    jobs. The term IoT - Internet of Things - has become very popular and tends to
    be used in place of older terms such as embedded processing, micro-controllers
    and newer terms such as physical computing. The ideas, however, are related and
    in the rest of this book the term IoT will be used to mean a system being used
    to interface with the real world, usually via custom electronics, even if the
    Internet isn''t explicitly involved.


    # The Raspberry Pi Or A Microcontroller?


    Compared to the Pi, the Arduino and any similar microcontroller is a very low-powered
    computer. The basic Arduino isn''t capable of running Linux, which is a full operating
    system. It simply runs the one program you have written for it. However, the Arduino
    and similar devices have a big advantage – they have dedicated, usually analog,
    I/O lines. The Pi doesn''t have the same variety of I/O lines, but it has enough
    for many jobs and it can be easily expanded with the use of standard expansion
    boards called HATs (Hardware Attached on Top) because of the way they plug in.
    Some HATs are so commonly used that they are considered more or less standard
    and have their own Linux drivers.'
  - '[PAGE 11]


    To make the difference plain, you can use a Pi for almost any job that a desktop
    computer can do, including any server role. An Arduino, on the other hand, isn''t
    up to this sort of work. Sometimes the fact that the Pi is a full computer makes
    it even more suitable for low-level jobs. For example, you want a new door bell?
    Why not use a Pi and have it say hello using a voice synthesizer.


    In short, the Pi gives you more computing power for less money.

    Everything isn''t perfect with the Pi and the IoT. In particular, the use of Linux
    means that you can no longer pretend your program is the only program running.
    Linux is a multitasking operating system and it can suspend any program at any
    time to give another program a chance to run. If you are familiar with microcontroller
    programming then it will come as something of a shock that you do not have complete
    control of the machine. What is more, Linux isn''t the easiest operating system
    to get to grips with if you are a beginner.


    All of these problems and more can be overcome with a little work and it is worthwhile.
    The Pi is a fast and capable IoT computer and would still be a good choice even
    if it cost a lot more. We are entering a new era of embedded computing when the
    device that runs your washing machine is as powerful as your desktop computer.


    # Which Raspberry Pi?


    The Raspberry Pi family has grown over the years and it can be difficult to keep
    track of the differences between the models. As far as the IoT goes, while you
    can use an early Pi 1 or Pi 2, it is much better not to. The modern range of devices
    is more powerful and if you are starting a new project it is better to use one
    of the current models. This said, the very latest Pi 5 is more expensive than
    the Pi 4, which is in turn more expensive than the Pi 3 and they are all currently
    available. They are also available with different amounts of memory and this is
    not something you can upgrade without a soldering iron and plenty of skill – and
    not recommended even then.


    Cost rather than computing power can be an issue in an IoT project and while you
    cannot completely write off earlier models if you have them on hand, the Pi Zero
    range is low-cost. The later models


    All this makes choosing a Pi difficult. My best advice is to use the fastest and
    most powerful Pi you can for development and when you have something working see
    what computing power is actually needed before deploying the finished program.'
