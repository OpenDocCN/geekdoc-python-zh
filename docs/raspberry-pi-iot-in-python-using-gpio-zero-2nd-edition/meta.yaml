    ![](img/39c0a42d027b4a8b43b07050c297f3ff_14_0.png)


    Pi 5 目前是该系列的顶级产品。其规格并不能完全说明其全部性能。它改进了 I/O 连接性，从而加快了 USB 和以太网的速度。它的速度大约是 Pi 4 的两倍，4GB
    内存版本售价 60 美元，8GB 版本售价 80 美元。尽管它物超所值，但每台 60 美元的价格对于物联网部署来说开始显得昂贵。即使最终应用程序可能运行在性能较低的设备上，仍然值得考虑使用它进行软件开发。


    | Pi 5 |

    | --- |

    | 802.11 b/g/n/ac 无线局域网 2.4GHz 和 5GHz。 |

    | 蓝牙 5 |

    | 低功耗蓝牙 (BLE) |

    | 2.4GHz，四核 CPU |

    | 4 或 8GB 内存 |

    | 千兆以太网 |

