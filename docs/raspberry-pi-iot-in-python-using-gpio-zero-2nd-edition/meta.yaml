  md: '# Summary


    +   - The cost of computing hardware has fallen to the point where many applications
    that would have used low-cost and less-powerful microcontrollers can now make
    use of Raspberry Pi hardware, which is powerful enough to run a full version of
    Linux.

    - The smallest member of the Pi family is the Pi Zero. It has a single-core processor
    with a minimal number of connectors. The Pi Zero W has built-in WiFi which makes
    it easy to use in situations where you want connectivity. As well as WiFi, the
    Pi Zero 2W has four cores.

    - The Pi 5 is currently the most powerful of the Pi models. Like the Pi 4, it
    is a quad-core device with up to 8Gb of RAM, but it is at least twice the speed
    of the Pi 4.

    - As neither the Pi 5 or 4 isn''t currently available as a "cut down" model A,
    the Pi 3A+ is still a viable choice for IoT applications.

    - The Compute Module 4 (CM4) is a Pi 4 packaged as a credit card sized industrial
    device. It needs a custom I/O board or a development board to make use of it.
    The corresponding CM 5 should be available sometime in 2024.

    - The Pi 400 is a faster Pi 4 with 4GB of RAM packaged into a keyboard. You can
    use it as an IoT development system. Currently there is no indication if and when
    a Pi 500 will be available.

    - To work with electronics you will need a solderless prototyping board, some
    hookup wires and some components. It''s also good to have a multimeter and preferably
    a logic analyzer. After these basic instruments, you can add what you can afford.

    - With more than 50 million devices sold and a very large community of users,
    the Raspberry Pi is a very stable platform and one you can use with reasonable
    assurance that it will be available in the future.'
