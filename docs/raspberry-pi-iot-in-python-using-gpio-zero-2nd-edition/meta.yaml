- img_proc: true
  md: "If you run the program using the circuit given earlier, you will discover that\
    \ the servo does nothing at all, apart perhaps from vibrating. The reason is that\
    \ the transistor voltage driver is an inverter. When the PWM line is high the\
    \ transistor is fully on and the servo's pulse line is effectively grounded. When\
    \ the PWM line is low the transistor is fully off and the servo's pulse line is\
    \ pulled high by the resistor.\n\nThe obvious solution to this problem is to set\
    \ active_high to False to invert the working of the GPIO line, but Servo doesn't\
    \ support active_high in its constructor. In principle, you can set:\nservo.pwm_device.active_high=False\n\
    after the constructor, but this doesn't work as Servo works directly with the\
    \ pin rather than the value property of PWMOutputDevice, which bypasses active_high.\n\
    \nThe simplest solution is to create a new class and override the value property\
    \ setter:\nfrom gpiozero import Servo\n\n```\nclass ServoInvert(Servo):\n    @Servo.value.setter\n\
    \    def value(self, value):\n        if value is None:\n            self.pwm_device.pin.frequency\
    \ = None\n        elif -1 <= value <= 1:\n            self.pwm_device.pin.frequency\
    \ = int(1 / self.frame_width)\n            self.pwm_device.value = (self._min_dc\
    \ + self._dc_range *\n                                    ((value - self._min_value)\
    \ / self._value_range))\n        else:\n            raise OutputDeviceBadValue(\n\
    \                \"Servo value must be between -1 and 1, or None\")\n```\n\nThe\
    \ only line changed from the original code is:\nself.pwm_device.value = (self._min_dc\
    \ + self._dc_range *\n                        ((value - self._min_value) / self._value_range))\n\
    \nNow you can use ServoInvert with a one-transistor driver:\nservo = ServoInvert(4)\n\
    servo.pwm_device.active_high=False\n\nNotice that in either case if the servo\
    \ doesn't move over its full range when you go from max to min you can adjust\
    \ min_pulse_width and max_pulse_width. The values given are for a typical servo.\n\
    \nAs well as the simple Servo class there is also the AngularServo class:\nAngularServo(pin,initial_angle=0,min_angle=-90,max_angle=90,\n\
    \            min_pulse_width=1/1000, max_pulse_width=2/1000,\n            frame_width=20/1000)"
