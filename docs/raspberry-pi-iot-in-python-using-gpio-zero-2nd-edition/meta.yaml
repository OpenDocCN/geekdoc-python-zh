- md: "## Using Full H-Bridge As Two Half H-Bridges\n\nIt is easy to think of an H-bridge\
    \ as being only for bidirectional control, but each full bridge is composed of\
    \ two half bridges and this means a typical dual full H-bridge can control four\
    \ unidirectional motors:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_158_0.png)\n\
    \nIn this case Forward is now MotorM1 speed control and Reverse is now MotorM2\
    \ speed control. Any enable line has to be set high to allow the two motors to\
    \ be controlled. You can make use of this arrangement in software simply by instantiating\
    \ two uniMotor objects – one on the forward line and one on the reverse:\n\n```\n\
    motorA=uniMotor(4)\nmotorB=uniMotor(14)\nmotorA.speed(0.5)\nmotorB.speed(0.3)\n\
    sleep(10)\n```\n\nHere motorA is connected to GPIO4, which is in turn connected\
    \ to Forward and motorB is connected to GPIO14, which is in turn connected to\
    \ Reverse.\n\n## Controlling a Servo\n\nHobby servos, of the sort used in radio\
    \ control models, are very cheap and easy to use and they connect via a standard\
    \ PWM protocol. Servos are not drive motors, but positioning motors. That is,\
    \ they don't rotate at a set speed, they move to a specified angle or position.\n\
    \nA servo is a motor, usually a brushed DC motor, with a feedback sensor for position,\
    \ usually a simple variable resistor (potentiometer) connected to the shaft. The\
    \ output is usually via a set of gears which reduces the rotation rate and increases\
    \ the torque. The motor turns the gears, and hence the shaft, until the potentiometer\
    \ reaches the desired setting and hence the shaft has the required angle/position.\n\
    \nA basic servo has just three connections, ground, a power line and a signal\
    \ line. The colors used vary, but the power line is usually red, ground is usually\
    \ black or brown and the signal line is white, yellow or orange. If a standard\
    \ J connector is fitted then the wire nearest the notch, pin 3, is Signal, that\
    \ in the middle, pin 2, is 5V and outer, pin 1, is Ground.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_159_0.png)\n\
    \nThe power wire has to be connected to a 5V supply capable of providing enough\
    \ current to run the motor - anything up to 500mA or more depending on the servo.\
    \ In general, you cannot power a full-size servo from the Pi's 5V pin, you need\
    \ a separate power supply. You can power some micro servos directly from the Pi's\
    \ 5V line, but you need to check the specifications. The good news is that the\
    \ servo's signal line generally needs very little current, although it does need\
    \ to be switched between 0 and 5V using a PWM signal.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_159_1.png)\n\
    \nWe can assume that the signal line needs to be driven as a voltage load and\
    \ so the appropriate way to drive the servo is:\n\n- The servo's + line needs\
    \ to be connected to an external 5V power supply, unless it is a micro servo when\
    \ it might be possible to power it from the Pi's 5V line.\n- The 10K resistor\
    \ R1 can be a lot larger for most servos - 47K often works. The 5.6K resistor\
    \ limits the base current to slightly less than 0.5mA.\n\nNotice, however, that\
    \ if you are using a single BJT driver, like the one shown above, the input is\
    \ inverted.\n\nThis is the correct way to drive a servo, but in nearly all cases\
    \ you can drive the servo signal line directly from the 3.3V GPIO line with a\
    \ 1K resistor to limit the current if anything goes wrong with the servo. Some\
    \ servos will even work with their motor connected to 3.3V, but at much reduced\
    \ torque. The Pi cannot supply enough current in this configuration, so use a\
    \ 5V supply for the motor.\n\nNow all we have to do is set the PWM line to produce\
    \ 20ms pulses with pulse widths ranging from 0.5ms to 2.5ms.\n\nThe GPIO Zero\
    \ Servo class makes it easy to work with almost any servo on any GPIO line that\
    \ the pin factory supports:\n\n```\nServo(pin, initial_value=0, min_pulse_width=1/1000,\n\
    \      max_pulse_width=2/1000, frame_width=20/1000)\n```\n\nThe min_pulse_width\
    \ and max_pulse_width can be used to limit the movement of the servo and frame_width\
    \ gives that repeat rate for the signal, which in most cases is 20ms or 50Hz.\n\
    \nThe simplest servo program you can write is something like:\n\n```\nfrom gpiozero\
    \ import Servo\nfrom time import sleep\n\nservo = Servo(4)\n\nwhile True:\n  \
    \  servo.min()\n    sleep(0.5)\n    servo.mid()\n    sleep(0.5)\n    servo.max()\n\
    \    sleep(0.5)\n```\n\nThis moves the servo to three positions, min, mid and\
    \ max, pausing between each. If you want to move the servo to an intermediate\
    \ position, simply set its value property to something in the range -1 to 1 corresponding\
    \ to min to max positions.\n\nIf you run the program using the circuit given earlier,\
    \ you will discover that the servo does nothing at all, apart perhaps from vibrating.\
    \ The reason is that the transistor voltage driver is an inverter. When the PWM\
    \ line is high the transistor is fully on and the servo's pulse line is effectively\
    \ grounded. When the PWM line is low the transistor is fully off and the servo's\
    \ pulse line is pulled high by the resistor.\n\nThe obvious solution to this problem\
    \ is to set active_high to False to invert the working of the GPIO line, but Servo\
    \ doesn't support active_high in its constructor. In principle, you can set:\n\
    servo.pwm_device.active_high=False\nafter the constructor, but this doesn't work\
    \ as Servo works directly with the pin rather than the value property of PWMOutputDevice,\
    \ which bypasses active_high.\n\nThe simplest solution is to create a new class\
    \ and override the value property setter:\n\n```\nfrom gpiozero import Servo\n\
    \nclass ServoInvert(Servo):\n    @Servo.value.setter\n    def value(self, value):\n\
    \        if value is None:\n            self.pwm_device.pin.frequency = None\n\
    \        elif -1 <= value <= 1:\n            self.pwm_device.pin.frequency = int(1\
    \ / self.frame_width)\n            self.pwm_device.value = (self._min_dc + self._dc_range\
    \ *\n                                    ((value - self._min_value) / self._value_range))\n\
    \        else:\n            raise OutputDeviceBadValue(\n                \"Servo\
    \ value must be between -1 and 1, or None\")\n```\n\nThe only line changed from\
    \ the original code is:\nself.pwm_device.value = (self._min_dc + self._dc_range\
    \ *\n                        ((value - self._min_value) / self._value_range))\n\
    \nNow you can use ServoInvert with a one-transistor driver:\nservo = ServoInvert(4)\n\
    servo.pwm_device.active_high=False\n\nNotice that in either case if the servo\
    \ doesn't move over its full range when you go from max to min you can adjust\
    \ min_pulse_width and max_pulse_width. The values given are for a typical servo.\n\
    \nAs well as the simple Servo class there is also the AngularServo class:\nAngularServo(pin,initial_angle=0,min_angle=-90,max_angle=90,\n\
    \            min_pulse_width=1/1000, max_pulse_width=2/1000,\n            frame_width=20/1000)"
  mdcn: "## 将全H桥用作两个半H桥\n\n人们很容易认为H桥仅用于双向控制，但每个全桥都由两个半桥组成，这意味着一个典型的双全H桥可以控制四个单向电机：\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_158_0.png)\n\n在这种情况下，Forward现在是MotorM1的速度控制，Reverse现在是MotorM2的速度控制。必须将任何使能线设置为高电平，才能允许控制这两个电机。你可以在软件中利用这种安排，只需实例化两个uniMotor对象——一个在正向线上，一个在反向线上：\n\
    \n```\nmotorA=uniMotor(4)\nmotorB=uniMotor(14)\nmotorA.speed(0.5)\nmotorB.speed(0.3)\n\
    sleep(10)\n```\n\n这里motorA连接到GPIO4，GPIO4又连接到Forward；motorB连接到GPIO14，GPIO14又连接到Reverse。\n\
    \n## 控制舵机\n\n爱好舵机，即用于无线电遥控模型的那种，非常便宜且易于使用，它们通过标准PWM协议连接。舵机不是驱动电机，而是定位电机。也就是说，它们不是以设定的速度旋转，而是移动到指定的角度或位置。\n\
    \n舵机是一个电机，通常是有刷直流电机，带有一个用于位置的反馈传感器，通常是连接到轴上的简单可变电阻（电位器）。输出通常通过一组齿轮，这降低了转速并增加了扭矩。电机转动齿轮，从而转动轴，直到电位器达到所需设置，因此轴具有所需的角度/位置。\n\
    \n一个基本的舵机只有三个连接：地线、电源线和信号线。使用的颜色各不相同，但电源线通常是红色，地线通常是黑色或棕色，信号线是白色、黄色或橙色。如果安装了标准J型连接器，则最靠近凹口的引脚3是信号线，中间的引脚2是5V，外侧的引脚1是地线。\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_159_0.png)\n\n电源线必须连接到能够提供足够电流来运行电机的5V电源——根据舵机的不同，电流可达500mA或更多。通常，你无法从树莓派的5V引脚为全尺寸舵机供电，你需要一个单独的电源。你可以直接从树莓派的5V线为一些微型舵机供电，但你需要检查规格。好消息是，舵机的信号线通常只需要非常小的电流，尽管它确实需要使用PWM信号在0V和5V之间切换。\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_159_1.png)\n\n我们可以假设信号线需要作为电压负载来驱动，因此驱动舵机的适当方式是：\n\
    \n- 舵机的+线需要连接到外部5V电源，除非是微型舵机，此时可能可以从树莓派的5V线供电。\n- 对于大多数舵机，10K电阻R1可以大得多——47K通常有效。5.6K电阻将基极电流限制在略低于0.5mA。\n\
    \n但请注意，如果你使用的是如上图所示的单个BJT驱动器，输入是反相的。\n\n这是驱动舵机的正确方式，但在几乎所有情况下，你可以直接从3.3V GPIO线驱动舵机信号线，并串联一个1K电阻以在舵机出现任何问题时限制电流。有些舵机甚至可以在其电机连接到3.3V的情况下工作，但扭矩会大大降低。在这种配置下，树莓派无法提供足够的电流，因此请为电机使用5V电源。\n\
    \n现在我们要做的就是设置PWM线以产生20ms的脉冲，脉冲宽度范围从0.5ms到2.5ms。\n\nGPIO Zero的Servo类使得在任何引脚工厂支持的GPIO线上使用几乎任何舵机变得非常简单：\n\
    \n```\nServo(pin, initial_value=0, min_pulse_width=1/1000,\n      max_pulse_width=2/1000,\
    \ frame_width=20/1000)\n```\n\nmin_pulse_width和max_pulse_width可用于限制舵机的运动范围，frame_width给出信号的重复频率，在大多数情况下为20ms或50Hz。\n\
    \n你能编写的最简单的舵机程序类似于：\n\n```\nfrom gpiozero import Servo\nfrom time import sleep\n\
    \nservo = Servo(4)\n\nwhile True:\n    servo.min()\n    sleep(0.5)\n    servo.mid()\n\
    \    sleep(0.5)\n    servo.max()\n    sleep(0.5)\n```\n\n这会将舵机移动到三个位置：最小、中间和最大，并在每个位置之间暂停。如果你想将舵机移动到中间位置，只需将其value属性设置为-1到1范围内的某个值，对应于最小到最大位置。\n\
    \n如果你使用前面给出的电路运行该程序，你会发现舵机完全不动，或者可能只是振动。原因是晶体管电压驱动器是一个反相器。当PWM线为高电平时，晶体管完全导通，舵机的脉冲线实际上被接地。当PWM线为低电平时，晶体管完全关断，舵机的脉冲线被电阻拉高。\n\
    \n解决这个问题的明显方法是将active_high设置为False以反转GPIO线的工作方式，但Servo在其构造函数中不支持active_high。原则上，你可以在构造函数之后设置：\n\
    servo.pwm_device.active_high=False\n但这不起作用，因为Servo直接操作引脚，而不是PWMOutputDevice的value属性，后者会绕过active_high。\n\
    \n最简单的解决方案是创建一个新类并重写value属性的setter：\n\n```\nfrom gpiozero import Servo\n\nclass\
    \ ServoInvert(Servo):\n    @Servo.value.setter\n    def value(self, value):\n\
    \        if value is None:\n            self.pwm_device.pin.frequency = None\n\
    \        elif -1 <= value <= 1:\n            self.pwm_device.pin.frequency = int(1\
    \ / self.frame_width)\n            self.pwm_device.value = (self._min_dc + self._dc_range\
    \ *\n                                    ((value - self._min_value) / self._value_range))\n\
    \        else:\n            raise OutputDeviceBadValue(\n                \"Servo\
    \ value must be between -1 and 1, or None\")\n```\n\n与原始代码相比，唯一改变的行是：\nself.pwm_device.value\
    \ = (self._min_dc + self._dc_range *\n                        ((value - self._min_value)\
    \ / self._value_range))\n\n现在你可以将ServoInvert与单晶体管驱动器一起使用：\nservo = ServoInvert(4)\n\
    servo.pwm_device.active_high=False\n\n请注意，在任何一种情况下，如果舵机在从最大值移动到最小值时没有移动其全部范围，你可以调整min_pulse_width和max_pulse_width。给出的值适用于典型舵机。\n\
    \n除了简单的Servo类，还有AngularServo类：\nAngularServo(pin,initial_angle=0,min_angle=-90,max_angle=90,\n\
    \            min_pulse_width=1/1000, max_pulse_width=2/1000,\n            frame_width=20/1000)"
