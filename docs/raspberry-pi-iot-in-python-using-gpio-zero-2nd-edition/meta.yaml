  md: '# GPIO Modes


    Although GPIO Zero gives you access to devices like LEDs, which means you can
    mostly ignore the basic GPIO lines, you still have to select which one to use
    and this isn''t quite as easy as it looks.

    The available GPIO lines are shown in the following diagram:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_35_0.png)


    You may also notice that many of the pins on the pinout diagrams have two labels.
    For example, GPIO2 is also labeled as SDA1. Many, but not all, of the GPIO lines
    have alternative functions such as connecting SPI devices, more of which later.
    In general, you should avoid using pins which have an alternative function as
    general-purpose I/O lines. The reason is that you might need to use one of the
    special functions later in your project''s development and, if it is is already
    used as a GPIO line, you will not only have to change all the pin assignments,
    which is relatively easy, but also all of the hardware connections, which is harder.
    This is much less of a problem if you restrict yourself to basic GPIO Zero as
    it supports many features via software that works on any pin. However, you may
    want to go outside GPIO Zero and use the alternative functions of the GPIO lines.

    In practice, for general GPIO tasks use:

    GPIO 4, 5, 6, 12, 13, 17, 18, 22, 23, 24, 25, 26 and 27


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_35_1.png)


    > The “preferred” GPIO pins.


    Then use:

    GPIO 2, 3, 9, 7, 8, 16, 10, 11, 14, 15, 19, 20 and 21

    in that order. The reason for the non-sequential order is that some GPIO lines
    work as a group and once you have used one you might as well use the others.'
  merge: -1
  pgno: 35
- img_proc: true
  md: 'This isn''t a definitive rule because the Pi 4/5 offers additional modes for
    many of the GPIO lines. Although the situation is very complicated, don''t worry
    too much as changing which GPIO line is being used in software is easy and, unless
    you have reached a late prototyping stage, it is fairly easy in hardware.


    # Hardware and Software Working Together


    Although Blinky is a very simple program it is typical of the process of working
    with IoT projects and some of the comments made at the start of the chapter should
    make more sense. All IoT projects are a combination of hardware and software.
    Usually you have to connect some device to a set of GPIO lines. In some cases
    you can select which lines you want to use, but in others the lines are fixed
    and you have to use the lines that are specified.

    Once you are happy that the device is connected to the GPIO lines and powered
    properly, you can move on to the software. In most cases you will be able to use
    a GPIO Zero class designed to work with the device. Then all you have to do is
    specify the GPIO pins you have used to connect the device, if they aren''t fixed,
    and then use the methods provided to control the device. In many cases the device
    can be so abstracted from GPIO lines that you can forget that they exist. Even
    the humble LED works in terms of On and Off with no reference to the GPIO line
    being set “high” or “low”. More complicated devices hide the fact that they are
    working with particular GPIO lines almost completely and even the notion of on
    and off or high and low vanishes. However, you need to keep in mind that the inputs
    and outputs of the Pi really are just GPIO lines that change state from high to
    low and low to high.

    In later chapters we look not only at the standard devices that GPIO Zero supports,
    but how to create classes that make new devices easier to work with.'
