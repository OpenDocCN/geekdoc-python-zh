- img_proc: true
  md: "If you use the latest default pin factory, lgpio, then you will find that it\
    \ too has trouble with small and very large values of duty cycle:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_135_0.png)\n\
    \nNote: x axis is set to the duty cycle and y is measured\n\n# How Fast Can You\
    \ Modulate?\n\nFor reasons that will be discussed later, in most cases, the whole\
    \ point is to vary the duty cycle, or the period of the pulse train. This means\
    \ that the next question is how fast can you change the characteristic of a PWM\
    \ line? In other words, how fast can you change the duty cycle? There is no easy\
    \ way to give an exact answer and, in most applications, an exact answer isn't\
    \ of much use. The reason is that for a PWM signal to convey information it generally\
    \ has to deliver a number of complete cycles with a given duty cycle. This is\
    \ because of the way pulses are often averaged in applications.\n\nWe also have\
    \ another problem – synchronization. There is no way to swap from one duty cycle\
    \ to another exactly when a complete duty cycle has just finished. All you can\
    \ do is use a timer to estimate when the pulse is high or low. What this means\
    \ is that there is going to be a glitch when you switch from one duty cycle to\
    \ another. Of course, this glitch becomes less important as you slow the rate\
    \ of duty cycle change and exactly what is usable depends on the application.\
    \ To illustrate the problem consider the following program:\n\n```\npython\nfrom\
    \ gpiozero import PWMOutputDevice\npwm=PWMOutputDevice(4)\npwm.frequency=1000\n\
    while True:\n    pwm.value=0.1\n    pwm.value=0.9\n```"
  merge: -1
  pgno: 135
- img_proc: true
  md: "It generates a 1kHz PWM signal and attempts to change from 10% to 90% duty\
    \ cycle as fast as possible. The result is that the number of pulses you get for\
    \ each duty cycle is very variable:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_136_0.png)\n\
    \nThe conclusion is that, using software-generated PWM, there is no easy way to\
    \ create an accurate waveform that changes its duty cycle in a controllable way\
    \ unless the change is very slow.\n\n# More PWM Methods\n\nReally, all you need\
    \ to use PWM is a way to set the frequency and the duty cycle, but the `PWMOutputDevice`\
    \ has a few more methods which you might want to use.\n\nThe on and off methods\
    \ set the line high and low and stop all PWM output. Setting a frequency or a\
    \ duty cycle starts the output again.\n\nThe toggle method is slightly odd in\
    \ that it changes the output from a duty cycle of D to a duty cycle of 1-D. So,\
    \ for example:\n\n```\npython\nfrom gpiozero import PWMOutputDevice\nfrom time\
    \ import sleep\npwm=PWMOutputDevice(4)\npwm.frequency=1000\npwm.value=0.1\nwhile\
    \ True:\n    sleep(0.5)\n    pwm.toggle()\n```\n\nproduces a signal that has a\
    \ duty cycle of 10% for half a second and then 90% for the next half a second\
    \ and so on.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_136_1.png)"
  merge: -1
  pgno: 136
- img_proc: true
  md: "The pulse method may seem strange, but it makes more sense after we have looked\
    \ at how a PWM signal is used to control the flow of power to a device, an LED\
    \ in particular.\n\n```\npulse(fade_in_time=1, fade_out_time=1, n=None, background=True)\n\
    ```\n\nWhat pulse does is to vary the duty cycle from 0 to 1 and then back to\
    \ 0 again. For example:\n\n```\npwm.pulse(fade_in_time=0.5,fade_out_time=1,n=3,background=False)\n\
    ```\n\nstarts with a duty cycle of 0 and slowly increases it to 1 over half a\
    \ second and then decreases it from 1 to 0 in 1 second. The n=3 means that it\
    \ repeats this three times. If you set the duty cycle to 0, or just leave it out,\
    \ the pulsing continues forever. The background=False makes Python wait for the\
    \ number of pulses to complete. If you set it to True then your program carries\
    \ on at once and the pulsing happens in the background.\n\nThe blink method is\
    \ very similar to pulse but you can specify a full on and full off time. That\
    \ is, the PWM signal starts from a 0% duty cycle, fades in up to 100%, stays at\
    \ 100% for the on_time and then fades out to 0% duty cycle and stays off for the\
    \ specified off_time.\n\n```\nblink(on_time=1, off_time=1, fade_in_time=0, fade_out_time=0,\n\
    \      n=None, background=True)\n```\n\n# Controlling an LED\n\nWhat sorts of\
    \ things do you use PWM for?\nThere are lots of very clever uses for PWM. However,\
    \ there are two use cases which account for most PWM applications - voltage or\
    \ power modulation and signaling to servos. We will look at servos and motors\
    \ in the next chapter. As a first practical example, let's control the brightness\
    \ of an LED.\nThe amount of power delivered to a device by a pulse train is proportional\
    \ to the duty cycle. A pulse train that has a 50% duty cycle is delivering current\
    \ to the load only 50% of the time and this is irrespective of the pulse repetition\
    \ rate. So the duty cycle controls the power, but the period still matters in\
    \ many situations because you want to avoid any flashing or other effects. A higher\
    \ frequency smooths out the power flow at any duty cycle.\nNotice that, as the\
    \ LED when powered by a PWM signal is either full on or full off, there is no\
    \ effect of the change in LED light output with current, the LED is always run\
    \ at the same current."
  merge: -1
  pgno: 137
- img_proc: true
  md: "For a simple example we need to connect a standard LED to the PWM line and\
    \ can use the BJT driver circuit introduced in Chapter 7.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_138_0.png)\n\
    \nAssuming that you have this circuit constructed, or have some similar way of\
    \ driving an LED, then a simple PWM program to modify its brightness from low\
    \ to high and back to low in a loop is:\n\n```\npython\nfrom gpiozero import PWMOutputDevice\n\
    from time import sleep\n\npwm=PWMOutputDevice(4)\npwm.frequency=1000\nsteps=8\n\
    delay=0.01\nwhile True:\n    for d in range(steps):\n        pwm.value=d/steps\n\
    \        sleep(delay)\n\n    for d in range(steps):\n        pwm.value=(steps-d)/steps\n\
    \        sleep(delay)\n```\n\nThe basic idea is to set up a pulse train with a\
    \ period of 1ms. Next, in the for loop, the duty cycle is set to go from 0% to\
    \ 100% and then back down to 0%.\n\nYou can achieve the same result using:\n\n\
    ```\npython\nfrom gpiozero import PWMOutputDevice\npwm=PWMOutputDevice(4)\npwm.frequency=1000\n\
    pwm.pulse(fade_in_time=1,fade_out_time=1,n=None,background=False)\n```"
  merge: -1
  pgno: 138
- img_proc: true
  md: "You might be thinking that the next thing to do is to create a PWMLED custom\
    \ class. The good news is you don't have to as PWMLED is a standard class within\
    \ GPIO Zero and has an identical set of methods to PWMOutputDevice. You can create\
    \ a flashing LED with almost no effort:\n\n```\nfrom gpiozero import PWMLED\n\
    pwmLED=PWMLED(4)\npwmLED.pulse(fade_in_time=1,fade_out_time=1,\n             n=None,background=False)\n\
    ```\n\nIf you want a full on and full off period then try:\n\n```\nfrom gpiozero\
    \ import PWMLED\npwmLED=PWMLED(4)\npwmLED.blink(fade_in_time=1,on_time=2,fade_out_time=1,off_time=2,\n\
    \             n=None,background=False)\n```\n\n# RGBLED\n\nA simple variation\
    \ on the PCWLED is the RGBLED. RGB LEDs are four-pin devices in which a red, a\
    \ green and a blue LED are packaged into a single case. You can switch the three\
    \ LEDs on and off independently. You can see a typical device below complete with\
    \ its connections:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_139_0.png)\n\n\
    RGB LEDs come in two types, common anode (right) and common cathode (left), depending\
    \ on which end of the LEDs makes the connection:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_139_1.png)"
  merge: -1
  pgno: 139
- img_proc: true
  md: 'How to drive such an LED is just a repeat of driving a single LED. You need
    at the very least three current-limiting resistors:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_140_0.png)


    How you wire them up depends on whether the device is common cathode or common
    anode. The diagram on the left is for a common anode arrangement and in this case
    the LED lights up when the GPIO line is low. The diagram on the right is for common
    cathode and in this case the LED lights up when the GPIO line is high. If you
    want brighter LEDs then you will also need three transistors to drive them at
    a higher current. Also, in principle, each of the LEDs has a different forward
    voltage and so if you want them to be the same brightness you need to adjust the
    current-limiting resistors, but in practice this is rarely necessary.


    Once you have the RGB LED wired up all you have to do is create an RGBLED object
    to control it. The simplest constructor call is just:

    RGBLED(red,green,blue)


    where red, green and blue are the GPIO lines controlling the color specified.
    Following on from this you can use the color method to specify which of the RGB
    LEDs is on. For example:


    ```

    from gpiozero import RGBLED


    led = RGBLED(2, 3, 4)

    led.color = (1, 1, 0)

    ```


    turns on the red and green LEDs, making yellow.

    At this point you might be wondering where PWM comes into the picture. The answer
    is that the three LEDs in the RGBLED are PWMLED objects and this means that you
    can specify values between 0 and 1 in the color method. For example:


    ```

    led.color = (0.5, 0.5, 0.5)

    ```


    produces gray with each LED on 50% of the time.'
  merge: -1
  pgno: 140
- img_proc: true
  md: 'If you use `pwm=False` in the constructor, three standard LEDs are used and
    you are restricted to 0 and 1 in the calls to the `color` method.

    As long as you use `pwm=True`, the default, all of the `PWMLED` methods are available
    including `toggle`, `pulse` and `blink`. In each case the three LEDs are varied
    according to the color specified. For example:

    `pulse(fade_in_time=1, fade_out_time=1, on_color=(1, 1, 1), off_color=(0, 0, 0),
    n=None, background=True)`

    will vary each LED from the specified off duty cycle to the specified on duty
    cycle in the specified `fade_in_time` and back to the off color in the `fade_out_time`.

    It is worth knowing a little about how `RGBLED` works. It could make use of the
    `CompositeDevice` class, explained later, to create and manage three `PWMLED`
    devices or three ordinary LEDs, but instead it does the job directly and creates
    a tuple of the required LED objects. That is, assuming `pwm=True`, it creates
    a tuple equivalent to:

    `self._leds=tuple(PWMLED(red), PWMLED(green), PWMLED(blue))`

    The modified methods then work with this tuple of LED devices.


    # Tonal Buzzer


    What if you want to produce not exactly music, but a tone at least. We have already
    looked at Buzzer back in Chapter 5. It is a simple on/off device – it either buzzes
    or it doesn’t – and you can’t modify the frequency. While in most cases it is
    the duty cycle that is important in the use of PWM, you can make use of it here
    to create a variable frequency output. In this case to hear the sound you need
    either a passive buzzer or a small loudspeaker. In either case, you will need
    a transistor driver, or even a full amplifier, to get a reasonable volume.

    A passive buzzer is difficult to buy because they look the same as active buzzers
    and even buzzers that claim to be “passive” are in fact active. The difference
    between them is that when you connect an active buzzer to a power source it starts
    to buzz, usually very loudly, whereas a passive buzzer doesn’t have any sound-generating
    electronics and needs a varying signal to make any sound. Most passive buzzers
    are piezoelectric and while these draw little current, they are not safe to simply
    connect to a GPIO line. There are also electromagnetic buzzers available in the
    same packaging and these have a very low resistance which would effectively short
    out a GPIO line connected directly, so proceed with caution. A small electromagnetic
    loudspeaker also has low resistance and needs to be driven by a transistor.

    As far as the GPIO line is concerned, a passive piezoelectric buzzer looks like
    a capacitor and has to be driven in a way that allows it to charge and discharge.
    You can get away with connecting a piezoelectric buzzer directly, but you risk
    damaging the Pi in the long run and it won’t be very loud.'
  merge: -1
  pgno: 141
- img_proc: true
  md: 'The correct way to do the job is:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_142_0.png)


    It is also worth knowing that piezoelectric buzzers make more noise at high frequency
    and usually have a high resonant frequency.

    If you want to use a small loudspeaker then you need to know that even the smallest
    will draw more current than a GPIO line can safely supply. You can drive a speaker
    with a single transistor, but a push-pull arrangement is better, even if it does
    use two transistors:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_142_1.png)


    Alternatively you can use any audio amplifier you can find – there are many low-cost
    modules available.'
