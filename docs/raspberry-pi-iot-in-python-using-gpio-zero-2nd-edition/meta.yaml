    When you use led.on() you are using one of the methods of the LED class that the
    instance supports.

    All of this is fairly easy and you can simply make use of it at an intuitive level.
    You can create new programs by simply following the lead that GPIO Zero sets and
    accepting that this is just “the way things are done”. A much better idea, however,
    is to use it as an opportunity to learn about Object-Oriented Python. Even if
    you know the basics, there are many advanced techniques used in GPIO Zero and
    understanding them will improve your Python programs.

    If you know all about objects in Python skim read this chapter to make sure you
    haven’t forgotten or missed anything. You are expected to already know the basics
    of Python, such as control statements, if, the while and for loops and functions.


    # Objects


    The idea of an object is relatively old in programming, but it has taken time
    for it to become mainstream.

    When we first started writing programs in higher-level languages, best practice
    was to write a function for whatever you needed to do.

    For example, if you needed to sort an array, you would write a sort function which
    accepted a few parameters that determined the data and the operation:


    ```

    sort(myArray,order)

    ```


    where myArray is the data that you want to sort, and order is a parameter that
    sets the sort order to be used.'
