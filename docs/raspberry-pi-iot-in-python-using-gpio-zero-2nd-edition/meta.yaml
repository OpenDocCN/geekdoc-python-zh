    \ of unidirectional connections.\n- The data lines are MOSI (master output slave\
    \ input) and MISO (master input slave output).\n- In addition, there is a clock\
    \ line, output from master, and a number of select lines, two in the case of the\
    \ Pi.\n- Data is transferred from the master to the slave and from the slave to\
    \ the master on each clock pulse, arranged as a circular buffer.\n- You can test\
    \ the SPI bus using a simple loopback connection.\n- Working with a single slave\
    \ is usually fairly easy, working with multiple slaves can be more of a problem.\n\
    - Making SPI work with any particular device has four steps:\n    i. Discover\
    \ how to connect the device to the SPI pins. This is a matter of identifying pinouts\
    \ and mostly what chip selects are supported.\n    ii. Find out how to configure\
    \ the Pi's SPI bus to work with the device. This is mostly a matter of clock speed\
    \ and mode.\n    iii. Identify the commands that you need to send to the device\
    \ to get it to do something and what data it sends back as a response.\n    iv.\
    \ Find, or work out, the relationship between the raw reading, the voltage and\
    \ the quantity the voltage represents.\n- Implementing any custom device using\
    \ almost any method of connection generally involves a great deal of bit manipulation."
