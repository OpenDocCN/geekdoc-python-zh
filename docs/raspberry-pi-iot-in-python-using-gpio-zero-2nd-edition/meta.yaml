  md: '# Appendix I

    VS Code


    Microsoft’s Visual Studio Code, VS Code, has good Python support, runs on a range
    of platforms including the Raspberry Pi and is possibly a better choice of code
    editor than Thonny, as it has full remote Python development including debugging.
    That is, you can write your program on a desktop, generally a more powerful machine,
    and run it on a Pi connected over SSH and single step and breakpoint it.


    The only problem with this approach is that VS Code has more facilities than you
    need to just run Python, it supports a wide range of languages, and this can make
    it confusing. However, after you have run your first program, it all becomes so
    much easier. If you are going to be doing much programming on Pis, this is worth
    the effort in setting up and mastering it.


    As it is under constant development, it is probably better to consult its website
    to find the latest instructions on how to install it and its various components.


    VS Code doesn’t support remote working on the Pi Zero and Zero W. This presents
    a problem as the device you most want to remote operate with is the Pi Zero/W.
    Even though it works on a Pi Zero 2W, the lack of memory makes it slow. It also
    approaches the problem of remote working in a way that is less useful for IoT
    applications. It keeps all of the programs on the remote device. which makes managing
    code more difficult than if the code is kept on the local device.


    A more useful, but slightly more complicated, approach is to make use of VS Code
    Tasks to provide remote build and debug. This works with all versions of the Pi,
    or indeed any Linux-based device, and it keeps all of the files on the local machine.
    It also works with the Pi Zero/W and is described later.


    # SSH Without a Password


    Before trying to make any of the following work, you need to have set up SSH access
    using a key file. Some of the commands work if you simply supply a password, but
    the debugging commands don’t.


    Using a password to connect over SSH is fine when you are just testing the installation,
    but the number of times you are asked to provide it quickly becomes irritating.
    The solution is to create a key pair to use. If you look up'
  merge: -1
  pgno: 234
- img_proc: true
  md: 'the instructions for doing this, you might conclude that it is very difficult.
    This is because every effort is make to ensure security is enforced. If you simply
    want to use a key as a way of avoiding having to supply a password then you can
    take shortcuts. As long as you keep your private key safe, the setup is secure.


    The first step is generating a key pair on the local machine. As long as you have
    OpenSSH installed, this is easy. The steps described here will work on Windows,
    Mac and Linux. If you are using Windows, start a PowerShell session:


    ```

    cd ~/.ssh

    ssh-keygen -t rsa

    ```


    This generates a default RSA key in the .ssh directory within the current user''s
    home directory. You can provide a name for the key files and in this example the
    name pi is used, although this doesn''t affect what device you can use them for.
    There are advantages in using the default name.


    You will see output something like:


    ```

    Generating public/private rsa key pair.

    Enter file in which to save the key (C:\Users\nuserhome/.ssh/id_rsa): pi

    Enter passphrase (empty for no passphrase):

    Enter same passphrase again:

    Your identification has been saved in pi.

    Your public key has been saved in pi.pub.

    The key fingerprint is:

    SHA256:UtiQ3RMYpluJb+nx8n5pqsbLXHgiYv2hKs1EVof7vqQ user@Rockrose

    The key''s randomart image is:

    +---[RSA 2048]----+

    |        .o+o+..  |

    |       . oBo.o   |

    |        o+ =  .  |

    |       + .= .    |

    |      o oo S     |

    |     ..o+ +      |

    |    +oooo* + .   |

    |   ..E..*oB  +   |

    |    .....*+++    |

    +----[SHA256]-----+

    ```


    If you really are using the keys for security purposes you should supply a passphrase,
    which is requested when the key pair is used. If you are simply using the keys
    to avoid entering a password then leave the passphrase blank for simplicity.


    The key generation will leave two files in the .ssh directory – in this case pi
    and pi.pub. The first is the private key and this you keep to yourself as it is
    what proves that the machine is the one that the public key belongs to. The pi.pub
    file contains the public key and this is the one that has to be copied'
  merge: -1
  pgno: 235
- img_proc: true
  md: "to the remote machine. The remote machine uses the public key to challenge\
    \ the local machine to decode something which can only be done with the private\
    \ key, so proving that the machine is legitimate, or rather that it has the private\
    \ key.\n\nYou can use the public key with as many remote machines as you need\
    \ to. The key identifies you as being allowed to connect to a machine that has\
    \ it using SSH. To make this happen, you have to enter the details of the file\
    \ into .ssh/authorized_keys. You can do this any way you know how to, but the\
    \ public key file has to be copied to ~/.ssh/ on the remote machine and renamed\
    \ authorized_keys. As you have SSH working, the simplest thing to do is:\n\n```\n\
    scp pi.pub pi@192.168.11.151:~/.ssh/authorized_keys\n```\n\nYou might have to\
    \ make the .ssh folder first. You will have to provide the user's password. If\
    \ this works you will find authorized_keys in the .ssh directory. If you want\
    \ to store more public keys in authorized_keys so that more than one user can\
    \ log on, you have to append additional public key files to authorized_keys.\n\
    \nSSH will not use the key file if ~/.ssh or ~ are writable by Group or Others.\
    \ One way of ensuring this is not the case:\n\n```\nchmod 700 ~/.ssh\nchmod 600\
    \ ~/.ssh/authorized_keys\n```\n\nAs long as the permissions are set correctly,\
    \ you should be able to connect without a password using:\n\n```\nssh -i ~/.ssh/pi\
    \ pi@192.168.11.151\n```\n\nIf you don't use -i ~/.ssh/pi to specify the private\
    \ key file, you might be asked for a password as well as the key file. You also\
    \ have to specify the correct user name.\n\nIf you want to log on and not specify\
    \ the key file, i.e. just using:\n\n```\npi@192.168.11.151\n```\n\nthen you need\
    \ to make sure your key files have the correct default names. For protocol 2 the\
    \ keys have to be called id_rsa and id_rsa.pub. If you use these default names\
    \ for RSA keys then the SSH agent will use them automatically. If you use any\
    \ other names, like pi and pi.pub, you will need an Identity file specified in\
    \ .ssh config.\n\nOpen the file config in the C:\\Users\\user\\.ssh directory\
    \ on the local machine (~/.ssh under Linux) and enter:\n\n```\nHost 192.168.11.151\n\
    \    HostName 192.168.11.151\n    User pi\n    PubKeyAuthentication yes\n    IdentityFile\
    \ ~/.ssh/pi\n```"
  merge: -1
  pgno: 236
- img_proc: true
  md: 'Of course, you have to change the IP address, user name and the location of
    the key file to be correct for the machine you are trying to connect to. You can
    enter additional Host specifications for each machine you want to connect to.


    After this you should be able to connect and work with the remote Pi without providing
    a password when using VS Code. You can also just use:

    ssh pi@192.168.11.151

    at the command line.


    Notice that this is low security as we didn''t specify a passphrase to use with
    the private key. If you need security from the outside world, you need to create
    a key with a passphrase and then you need to use the SSH agent to supply it automatically.


    # Remote Python With VS Code


    The easiest way to implement remote development is to use the standard remote
    development add-ins for VS Code on a desktop machine. The programs you develop
    are stored on the remote machine, but you can work with them as if they were on
    the desktop machine. Ideally, you would like to keep the programs on the desktop
    machine and automatically download to the remote machine as required and this
    is what the alternative approach using VS Code tasks does, see later. Notice that
    VS Code remote development add-ins do not work on a Pi Zero, but the VS Code tasks
    work on all Pis.


    First install the up-to-date stable version of VS Code appropriate for the platform
    you are using from the VS Code website. It works under Windows, Debian and Mac
    OS. You can also find versions for other operating systems, but usually without
    installers.


    Once you have VS Code installed to run Python programs you first need to install
    the Microsoft Python extension which automatically installs Pylance:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_237_0.png)


    To run the remote development extension you need to have an OpenSSH client running
    on the development machine. Windows has its own version of OpenSSH client. You
    next need to install the remote development pack. You only need to install Remote
    SSH.'
  merge: -1
  pgno: 237
- img_proc: true
  md: '![](img/39c0a42d027b4a8b43b07050c297f3ff_238_0.png)


    After you have installed Remote SSH you can add the details of the Pi you want
    to use to develop programs on. To do this click on the Remote Explorer icon in
    the left panel and you will see that there are no SSH clients installed. Next
    click on the + that appears when you hover over SSH Targets and enter the details
    for the Pi you want to connect to:

    You specify the host using the format:

    ssh user@ipaddress


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_238_1.png)


    When you press Enter, select a configuration file to use and you are ready to
    connect to the new host. Right-click on the new host and select Connect in this
    window. Next, you will be asked for your password. You will be asked for the password
    each time you connect unless you create a private key and use it for authentication
    as detailed earlier.

    When you open the File Explorer and select Open Folder you will see a list of
    folders stored in your home folder on the host machine. Create a new folder suitable
    for storing your Python programs and create a file called Hello.py in it. The
    new file will open in the editor and you can type in:

    print("Hello World")

    Next select Run, Run Without Debugging and select the Current Python file if asked
    for the run configuration. You will be prompted to install Python extensions on
    the remote machine and to select a Python interpreter to use. As long as you do
    this you should see Hello World appear in the console at the bottom'
  merge: -1
  pgno: 238
- img_proc: true
  md: "of the window. This program has been run on the remote machine. From here on\
    \ you can learn about VS Code and slowly customize it to make your work easier.\n\
    \n# Running With Root Permissions\n\nIoT programs often need root permissions\
    \ to access hardware. The simplest way to do this is to run the program locally\
    \ using sudo. A better way if you want to debug your program is to create a launch.json\
    \ file:\n\n```\n{\n    \"version\": \"0.2.0\",\n    \"configurations\": [\n  \
    \      {\n            \"name\": \"Sudo Python: Current File\",\n            \"\
    type\": \"python\",\n            \"request\": \"launch\",\n            \"program\"\
    : \"${file}\",\n            \"console\": \"integratedTerminal\",\n           \
    \ \"justMyCode\": true,\n            \"sudo\": true\n        }\n    ]\n}\n```\n\
    \nNotice the \"sudo\":true at the end. This runs the Python interpreter using\
    \ sudo. This only works for Python programs. You now have to run the debug using\
    \ the RUN menu.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_239_0.png)\n\n# Local\
    \ Remote Synchronization\n\nIt is important to realize that the Python programs\
    \ you create are stored on the remote host. This means that, if you do nothing\
    \ about it, your entire program could be stored solely on a Pi, waiting for something\
    \ bad to happen to it. Even if you consider this a safe option, you have the problem\
    \ of transferring the program to another Pi if you want to run it there. The best\
    \ solution is to keep a copy of your programs on a machine that you consider safe,\
    \ and share them with any Pi you might want to run them on.\n\nThe most attractive\
    \ option is to use source code management. VS Code supports Git without you having\
    \ to install any extensions. Once you have it all set up this works well, but\
    \ setting it up is a time-consuming process and"
  merge: -1
  pgno: 239
- img_proc: true
  md: 'it requires that you understand how Git, and usually GitHub, works. For small
    and simple projects this is generally more than you need and you could spend a
    lot of valuable programming time learning to use a tool that you barely make use
    of. This said, if you are planning a large project, or a collaborative project,
    then source code management is your best option, even if it does involve additional
    initial work.


    In most cases we can achieve what we need using simpler tools. You can copy a
    single file or folder from a remote machine by drag-and-dropping it from the File
    Explorer to the folder in the local machine. Unfortunately, this doesn''t work
    for remote Linux machines, and this includes Pi OS, so it isn''t a method that
    works for us. However, you can drag-and-drop files and folders from the local
    machine to the File Explorer window on the remote machine. See the next section
    for an automatic way of doing this.


    Now we only have the problem of copying files from the remote machine to the local
    machine. This can be done by selecting a file or folder in the VS Code File Explorer
    and right-clicking to display the context menu. You will see Download in the same
    section as Copy. Selecting this downloads the entire folder and its contents or
    the single file. You can pick where you want the file or folder to be copied to
    and so manually maintain a central copy of anything you are working on.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_240_0.png)'
  merge: -1
  pgno: 240
- img_proc: true
  md: 'An alternative way of saving a remote file on the local machine is to use the
    File, Save As menu option and select the Show Local button.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_241_0.png)


    This allows you to save the file on the local machine under whatever name you
    want to use.


    There are ways of automating the copying of files, but manual copying works well
    and most of the automatic synchronizing methods have their own drawbacks.


    # VS Code Remote Build and Debug Tasks


    An alternative to using VS Code’s own remote development facilities is to use
    custom tasks to copy and compile the program on the remote machine. This has the
    advantage that it works on all versions of the Pi and you automatically keep the
    source of all of the programs on the local machine.


    If you just want to use the tasks for remote debugging or remote running of a
    Python program using VS Code then the steps are given below. The files used have
    been tested on Windows, but they should work on Mac OS and Linux with changes
    to the folders specified. The files are listed at the end of this appendix and
    you can download them from this book’s page on www.iopress.info.


    It is important to know that you need to set up SSH connections without a password
    for many of these steps to work and you might need to login as root for some of
    the programs to work.


    Create the folder that is going to act as the project folder for all of the Python
    programs you are going to work with. In this case it is called GPIOZERO, but there
    is nothing special about this name. The directory structure is important to the
    working of the tasks as they assume that VS Code has the top-level directory,
    i.e. GPIOZERO, open, even though you are working with files in HelloWorld


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_241_1.png)'
  merge: -1
  pgno: 241
- img_proc: true
  md: "Create the .vscode folder in the top-level of the folder. Again, it is important\
    \ that you create the folder in GPIOZERO as the configuration files apply to all\
    \ of the subdirectories.\n\nCreate a test project folder HelloWorld in this case\
    \ and create a simple Hello.py test program.\n\nDownload the three files settings.json,\
    \ tasks.json and launch.json from the I/O Press website, www.iopress.info, or\
    \ type them in from the listings at the end of this appendix, and copy them into\
    \ the .vscode folder.\n\nEdit settings.json in the .vscode folder to read something\
    \ like:\n\n```\n{\n    \"sshUser\": \"pi\",\n    \"sshEndpoint\": \"192.168.11.170\"\
    ,\n    \"remoteDirectory\": \"/home/pi/Documents/\",\n}\n```\n\nChange the user\
    \ name, IP address and the directory you want to use to store your programs in.\n\
    \nIf you haven't already done so, you need to install debugpy, which is the latest\
    \ Python debugger for VS Code. On the remote machine, i.e. the Pi, enter:\n\n\
    ```\npython3 -m pip install debugpy\n```\n\nIf you don't have a virtual environment\
    \ set up you may need to use:\n\n```\npython3 -m pip install debugpy --break-system-packages\n\
    ```\n\nYou have to do this on any machine you want to remote debug on.\n\nTo run\
    \ a program, view the program in the editor and use the menu option Terminal,Run\
    \ Build Task or press Ctrl+Shift+B. You will see the program files being copied\
    \ and then you will see the output of the program in the terminal window. Notice\
    \ that you will not see any graphics and you can't provide input to the program.\
    \ For general-purpose Python programs this would be a problem, but for IoT programs\
    \ it usually isn't. Notice that if you have to provide a password for SSH connections\
    \ you will be asked to supply it. Use the StopRemotePython task to stop all Python\
    \ programs on the remote machine.\n\nTo debug a program, first use the menu option\
    \ Terminal,Run Task and select tunnel. You will see a terminal open and connect\
    \ to the remote computer. You only need to establish a tunnel once and you can\
    \ check if one is already open by the presence of a terminal window labeled Task\
    \ - tunnel. Don't try to open more than one tunnel and note that remote debugging\
    \ won't work unless you have a tunnel to the remote machine open.\n\nYou also\
    \ need to make sure that the workspace folder is present on the remote machine.\
    \ You can use the makeRemoteWorkSpace task to do this."
  merge: -1
  pgno: 242
- img_proc: true
  md: "# The Task Files\n\nBoth of the following files are created in the .vscode\
    \ folder in the top level of the folder that you open in VS Code.\n\n**settings.json**\n\
    This file has to be customized to your IP, user name and folder:\n\n```\njson\n\
    {\n    \"sshUser\": \"pi\",\n    \"sshEndpoint\": \"192.168.11.151\",\n    \"\
    remoteDirectory\": \"/home/pi/Documents/\",\n}\n```\n\n**tasks.json**\n\n```\n\
    json\n{\n    \"version\": \"2.0.0\",\n    \"tasks\": [\n        {\n          \
    \  \"label\": \"copyToRemote\",\n            \"type\": \"shell\",\n          \
    \  \"command\": \"scp -r ${fileDirname} ${config:sshUser}@${config:sshEndpoint}:${config:remoteDirectory}/\"\
    ,\n            \"problemMatcher\": [],\n            \"presentation\": {\n    \
    \            \"showReuseMessage\": false,\n                \"clear\": true\n \
    \           }\n        },\n        {\n            \"label\": \"makeRemoteWorkSpace\"\
    ,\n            \"type\": \"shell\",\n            \"command\": \"ssh ${config:sshUser}@${config:sshEndpoint}\
    \ mkdir ${config:remoteDirectory}\",\n            \"problemMatcher\": [],\n  \
    \          \"presentation\": {\n                \"showReuseMessage\": false,\n\
    \            }\n        },\n        {\n            \"label\": \"RunR\",\n    \
    \        \"type\": \"shell\",\n            \"command\": \"ssh ${config:sshUser}@${config:sshEndpoint}\
    \ python3 ${config:remoteDirectory}${relativeFileDirname}/${fileBasename}\",\n\
    \            \"problemMatcher\": [],\n            \"presentation\": {\n      \
    \          \"showReuseMessage\": false,\n            }\n        }\n    ]\n}\n\
    ```"
  merge: -1
  pgno: 243
- img_proc: true
  md: "```\n},\n{\n    \"label\": \"RunRemote\",\n    \"dependsOrder\": \"sequence\"\
    ,\n    \"dependsOn\": [\n        \"copyToRemote\",\n        \"RunR\"\n    ],\n\
    \    \"problemMatcher\": [],\n    \"group\": {\n        \"kind\": \"build\",\n\
    \        \"isDefault\": true\n    }\n},\n{\n    \"label\": \"StopREmotePython\"\
    ,\n    \"type\": \"shell\",\n    \"command\": \"ssh ${config:sshUser}@${config:sshEndpoint}\
    \ 'pkill python3'\",\n    \"problemMatcher\": [],\n    \"presentation\": {\n \
    \       \"showReuseMessage\": true\n    }\n},\n{\n    \"label\": \"wait\",\n \
    \   \"type\": \"shell\",\n    \"command\": \"timeout 10\"\n},\n```"
  merge: -1
  pgno: 244
- img_proc: true
  md: "```\n{\n    \"label\": \"tunnel\",\n    \"type\": \"shell\",\n    \"command\"\
    : \"ssh -2 -L 5678:localhost:5678\n                ${config:sshUser}@${config:sshEndpoint}\"\
    ,\n    \"problemMatcher\": [],\n    \"presentation\": {\n        \"showReuseMessage\"\
    : false,\n    }\n},\n{\n    \"label\": \"startDebug\",\n    \"type\": \"shell\"\
    ,\n    \"command\":\"ssh -2 ${config:sshUser}@\n                             \
    \   ${config:sshEndpoint}\n        'nohup python3 -m debugpy --listen 0.0.0.0:5678\n\
    \            --wait-for-client\n        ${config:remoteDirectory}${relativeFileDirname}/\n\
    \                ${fileBasename} > /dev/null 2>&1 &'\",\n    \"problemMatcher\"\
    : [],\n    \"presentation\": {\n        \"showReuseMessage\": false,\n    }\n\
    },\n{\n    \"label\": \"copyAndDebug\",\n    \"dependsOrder\": \"sequence\",\n\
    \    \"dependsOn\": [\n        \"copyToRemote\",\n        \"startDebug\",\n  \
    \      \"wait\"\n    ],\n    \"presentation\": {\n        \"showReuseMessage\"\
    : false,\n    },\n},\n]\n}\n```"
  merge: -1
  pgno: 245
- img_proc: true
  md: "To summarize the tasks defined in tasks.json:\n\n+   - **copyToRemote**\n \
    \ Copies the current local directory to the remote machine. For example, if you\
    \ have hello.py open in the editor and it is stored in the HelloWorld directory\
    \ then running this task copies everything in HelloWorld on the local machine\
    \ to the same directory on the remote machine.\n- **makeRemoteWorkSpace**\n  Creates\
    \ the top level project directory on the remote machine. If the local machine's\
    \ top level project directory is GPIO then running this task creates /home/pi/Documents/GPIO.\n\
    - **RunR**\n  Runs the current program on the remote machine. If the current program\
    \ in the editor is hello.py then running this task runs hello.py on the remote\
    \ machine. It doesn't copy the files, for this use RunRemote.\n- **RunRemote**\n\
    \  Uploads the current directory and runs the current Python program. Equivalent\
    \ to copyToRemote followed by RunR.\n- **StopRemotePython**\n  Stops all Python\
    \ programs running on the remote machine.\n- **Wait**\n  Implements a 10-second\
    \ wait. Used internally by copyAndDebug to allow time for the debugger to start.\n\
    - **startDebug**\n  Starts the current program running on the remote under a debugger.\
    \ Used internally.\n- **copyAndDebug**\n  Uses copyToRemote to copy the current\
    \ folder to the remote machine and then uses startDebug to debug the program.\
    \ Used internally.\n\n# Launch and Debug\n\nTo make use of remote debugging you\
    \ need to install debugpy, which is the latest Python debugger for VS Code. On\
    \ the remote machine, i.e. the Pi, enter:\n\n```\npython3 -m pip install debugpy\n\
    ```\n\nIf you don't have a virtual environment set up you may need to use:\n\n\
    ```\npython3 -m pip install debugpy --break-system-packages\n```"
  merge: -1
  pgno: 246
- img_proc: true
  md: "You also need a launch.json file in .vscode:\n\n```\njson\n{\n    \"version\"\
    : \"0.2.0\",\n    \"configurations\": [\n        {\n            \"name\": \"Python:\
    \ Remote Attach\",\n            \"type\": \"python\",\n            \"connect\"\
    : {\n                \"host\": \"localhost\",\n                \"port\": 5678\n\
    \            },\n            \"pathMappings\": [\n                {\n        \
    \            \"localRoot\": \"${workspaceFolder}/${relativeFileDirname}/\",\n\
    \                    \"remoteRoot\": \"${config:remoteDirectory}/${relativeFileDirname}\"\
    \n                }\n            ],\n            \"request\": \"attach\",\n  \
    \          \"preLaunchTask\": \"copyAndDebug\",\n            \"postDebugTask\"\
    : \"StopREmotePython\"\n        }\n    ]\n}\n```"
  merge: -1
