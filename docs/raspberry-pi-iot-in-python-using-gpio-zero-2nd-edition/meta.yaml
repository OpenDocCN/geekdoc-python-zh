  - "[PAGE 61]\n\n# Phased On/Off\n\nThere is a particular problem when you want to\
    \ coordinate the times when devices switch on and off. Consider for a moment two\
    \ LEDs that you want to flash in a phased way – led1 off when led2 is on and vice\
    \ versa. You have to switch each LED as a separate operation and this means that\
    \ there has to be a gap between the two actions. Consider for example the following\
    \ program, which flashes two LEDs as fast as possible:\n\n```\nfrom gpiozero import\
    \ LED\nled1 = LED(4)\nled2 = LED(17)\nwhile True:\n    led1.on()\n    led2.on()\n\
    \    led1.off()\n    led2.off()\n```\n\nInstead of turning on and off together,\
    \ on a Pi Zero there is a delay of about 140μs:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_61_0.png)\n\
    \nOn a Pi 4 the delay is 10μs and on a Pi 5 it is 20μs:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_61_1.png)\n\
    \nThe difference between 20μs and 140μs might not seem like much - and for an\
    \ LED, you would be hard pressed to notice that they weren't coming on at the\
    \ same time. However, if you switch ten LEDs on and off the time difference from\
    \ the first to the last would be about 1.5ms for the Pi Zero, which might be noticeable\
    \ as a flicker."
  - '[PAGE 62]


    There are also situations when you are driving a device in which you need one
    or more signals to have a fixed and exact phase relationship – one on while the
    other is off, say. The best known example of this is motor direction control.
    This is usually achieved using a configuration known as an H-bridge, see Chapter
    11, which has two control lines. Activating one line at a time makes the motor
    turn in two different directions whereas activating them both at the same time
    shorts the power supply out and causes damage. If both of these lines are driven
    by a GPIO line then there will be a short time – 10μs to 150μs – when both lines
    are active. The result is that the power supply is short circuited for this time
    and in most cases damage accumulates over time.


    You cannot assume that things happen at the same time. In fact, it is the rule
    that things do not happen at the same time unless you go to the trouble to make
    sure they do.'
  - '[PAGE 63]


    # Summary


    +   - From the programming point of view, there are only two simple on/off devices,
    LED and Buzzer. They both inherit from `DigitalOutputDevice`.

    - The `blink` method turns the device on and off a given number of times and can
    be run in the background while the program gets on with something else or in the
    foreground when your program will wait.

    - The `toggle` method turns the device on if it is off and off if it is on.

    - The `Buzzer` class is intended to be used with a piezoelectric buzzer, which
    is either on or off and hence either emits a sound or remains silent. It can only
    make one tone, which cannot be varied.

    - A piezo buzzer doesn''t need a driver as it takes very little current.

    - You can create a custom on/off device by inheriting from `DigitalOutputDevice`
    and providing the additional methods that are required. Restricting access to
    any existing inappropriate methods is a more difficult task.

    - You can switch multiple on/off devices at the same time or at coordinated times,
    but there is always a lag between switching devices - 140μs for a Pi Zero and
    10μs to 20μs for a Pi 4/5.'
  - "[PAGE 64]\n\n# Chapter 6\nPins And Pin Factories\n\nGPIO Zero is built on top\
    \ of existing software libraries to the Pi’s hardware – to the GPIO lines hence\
    \ GPIO libraries. You can use these libraries directly but they generally work\
    \ in C and are not easy to get to grips with. To make things easier the GPIO libraries\
    \ are wrapped by GPIO Zero Python classes, the pin factories. Their purpose is\
    \ not only to create pin objects with the characteristics you specify, but to\
    \ also manage the use of GPIO lines, ensuring that you cannot use the same GPIO\
    \ line for two different purposes at the same time, and to provide a certain amount\
    \ of event handling. The reason pin factories are needed is that they cover up\
    \ the differences between the different GPIO libraries and present a single uniform\
    \ Pin object no matter which library you chose to use.\nThat is, in GPIO Zero\
    \ a Pin object allows you to work directly with a GPIO line in the same way irrespective\
    \ of the GPIO library in use.\nAs GPIO Zero selects a default pin factory you\
    \ can mostly ignore the whole issue of pin factories and pins until you need to\
    \ do something that goes outside of the box. So first let’s look at how to use\
    \ a Pin object.\n\n# Raw GPIO Pin\n\nIn the Blinky program we used an LED object\
    \ to turn the LED on and off – why not just reference the GPIO line? In other\
    \ words, why hide the fact that we are working with GPIO lines? The answer is\
    \ that it makes it easier to read programs. If you want to work with the raw GPIO\
    \ line you can, but it isn’t as clear what the program means, i.e. what is the\
    \ GPIO line controlling.\nTo use a pin from the pin factory that GPIO Zero has\
    \ set up for you all you have to do is create a pin, set its function as 'input'\
    \ or 'output' and then use it. For example, the pin equivalent of the blinking\
    \ LED program is:\n\n```\nfrom gpiozero import Device\nfrom time import sleep\n\
    Device()\npin=Device.pin_factory.pin(4)\npin.set_function('output')\nwhile True:\n\
    \    pin.state=1\n    sleep(1)\n    pin.state=0\n    sleep(1)\n```"
  - '[PAGE 65]


    Notice that you have to have a call to the Device constructor to initialize the
    pin_factory before you can use it. The pin factory creates a pin object for GPIO4
    and then we use its methods to control what it does.

    All pin objects have three fundamental methods:

    _get_function

    _set_function

    _get_state

    There is also a set of optional get/set methods which in practice all pin objects
    support. These methods are grouped together to implement properties:


    | Function | Input/Output |

    |---|---|

    | state | 0/1 |

    | pull | Up/down/floating see next chapter |

    | frequency | Frequency of output/none |

    | bounce | Time in seconds/none, see Chapter 7 |

    | edge | Rising/falling/both/none, see Chapter 8 |

    | when_changed | Function called when an edge event occurs |


    There are also three general methods:


    | close | Releases pin and cleans up |

    | output_with_state | Sets pin to output and given state |

    | input_with_pull | Set pin to input with given pull, see Chapter 7 |


    The output_with_state is useful because it sets the initial state of the GPIO
    line, i.e. where things start from. For example:

    pin._set_function(''output'',1)

    sets the pin to output and high.

    You would probably agree that LED.on() is easier to understand than pin._set_state(1),
