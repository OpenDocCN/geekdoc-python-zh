    The SPI Bus


    The Pi offers three standard protocols for connecting more sophisticated devices
    – serial or RS232, Serial Peripheral Interface or SPI, and I2C. Of these, GPIO
    Zero supports only the SPI bus and this is the one we need to look at first.


    As long as you restrict your attention to the devices that GPIO Zero supports,
    then everything is very easy. The good news is that if you are prepared to spend
    a little time understanding how the SPI bus works, you can easily add your own
    custom devices. If you want to use the I2C, or any other bus, then you need to
    look beyond GPIO Zero. You could move to C and interface directly with the hardware
    or, if you want to stay with Python, you could use Linux drivers, in which case
    see *Raspberry Pi IOT in Python with Linux Drivers, 2nd Ed*, ISBN:9781871962864.


    # SPI Bus Basics


    In the configuration most used for the Pi, there is a single master and, at most,
    two slaves.

    The signal lines are:


    +   - MOSI (Master Output Slave Input), i.e. data to the slave

    - MISO (Master Input Slave Output), i.e. data to the master

    - SCLK (Serial Clock), which is always generated by the master'
