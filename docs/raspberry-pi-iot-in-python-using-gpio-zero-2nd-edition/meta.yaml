  md: "# HC-SR04 Distance Sensor\n\nAn ultrasonic distance sensor works by sending\
    \ out a pulse of ultrasonic sound and timing how long it takes to detect an echo.\
    \ There are a number of similar modules on the market, but the HC-SR04 is common\
    \ and inexpensive.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_116_0.png)\n\n\
    However, it needs to work with 5V data lines and this means using a divider to\
    \ shift the voltage to 3.3V. A simpler solution is to use the HC-SR04P, which\
    \ is nearly as cheap and works at 3.3V.\n\nWhichever module you use, there are\
    \ four connections Vcc, Ground, Trig (Trigger) and Echo. You have to connect each\
    \ of Trig and Echo to a GPIO line. The basic operation is that the Trig line is\
    \ set high for a short time and this causes the module to send a pulse. The Echo\
    \ line goes high when a reflected pulse is detected. The time between the two\
    \ events gives you the distance.\n\nThe constructor requires that you specify\
    \ the two pins used as the first two parameters:\n\n```\nDistanceSensor(echo,\
    \ trigger, queue_len=30, max_distance=1,\n    threshold_distance=0.3, partial=False,\
    \ pin_factory=None)\n```\n\nNotice that readings are the smoothed average of 30\
    \ measurements – ultrasonic distance measuring is very noisy. You can also specify\
    \ a max_distance which is use to scale the value parameter. The threshold_distance\
    \ is used to specify a “too close” event via\n\n+   - wait_for_in_range\n- wait_for_out_of_range,\n\
    - when_in_range\n- when_out_of_range.\n\nThe distance property gives an estimate\
    \ of the current distance from 0 to max_distance and value gives a scaled distance\
    \ in the range 0 to 1."
  merge: -1
  pgno: 116
- img_proc: true
  md: "# Source/Values – An Alternative Approach\n\nWe have already seen that events\
    \ are a good way of getting things done simply when it comes to input. They might\
    \ not scale well to more serious applications, but they make simple programs even\
    \ simpler. GPIO Zero also offers a way to “connect” input and output devices.\
    \ This is sophisticated in its implementation, but, as with events, it is very\
    \ easy to use – at least initially. You don’t need to know about, or make use\
    \ of, the source/values approach to programming devices, but it provides another\
    \ approach to the problem of creating a program – declarative programming. This\
    \ is where, instead of writing instructions that tell the machine what to do at\
    \ every step, you simply write something that specifies what you want.\n\nEvery\
    \ GPIO Zero device has a value property, which indicates its current state as\
    \ a zero or one. Input devices have a read-only value property, they are sources\
    \ of data, and output devices have a read/write value property that can be regarded\
    \ as a data sink. You can connect together a data input with a data output using\
    \ the source property. For example:\n\n```\nled.source=button\n```\n\nconnects\
    \ the button’s value to the LED’s value such that any changes in the button’s\
    \ value is communicated to the LED. It is as if you were running:\n\n```\nwhile\
    \ True:\n    led.value=button.value\n```\n\nwhich is more or less what actually\
    \ happens, but as the code is being run in a background thread, your program can\
    \ get on and do something else. The result is that you have “wired up” the button\
    \ to the LED in software and now, every time you press the button, the LED will\
    \ light up and every time you release it, the LED will switch off.\n\nValues are\
    \ updated once every hundredth of a second, so the background program is:\n\n\
    ```\nwhile True:\n    led.value=button.value\n    sleep(0.01)\n```\n\nYou can\
    \ change the rate of update by setting the source_delay property to the time between\
    \ values. For example:\n\n```\nled.source.source_delay=0.5\n```\n\nsets the update\
    \ to once every half a second. You can set the update rate for each device via\
    \ its source_delay property."
  merge: -1
  pgno: 117
- img_proc: true
  md: "Every device also has a values property which converts its value property into\
    \ an iterator. For example, to repeatedly print the value property of the button,\
    \ you can write:\nfor d in button.values:\n    print(d)\n\nThe values property\
    \ is used by the source property to retrieve values. You don't need to know how\
    \ the values property is created to use it, but isn't complicated:\n\n```\n@property\n\
    def values(self):\n    while True:\n        try:\n            yield self.value\n\
    \        except DeviceClosed:\n            break\n```\n\nYou can see that reading\
    \ values creates an infinite loop that keeps returning the value property until\
    \ something goes wrong. This is used to connect two devices together.\nYou can\
    \ take this “wiring” a stage further and make chains of connected value properties.\
    \ For example:\nled1.source=button\nled2.source=led1\nwould result in both LEDs\
    \ turning on when the button was pressed.\nYou can also go beyond zero and one.\
    \ Some input devices return a value between 0 and 1 and some return values outside\
    \ of this range. As long as the input value range and the output value range are\
    \ similar, you can connect them together. For example, the light or the distance\
    \ sensor described earlier outputs a value in the range 0 to 1. There is also\
    \ a PWMLED, which we will meet in detail in the next chapter, which has a value\
    \ that can be set between 0 and 1 to set its brightness level. We can connect\
    \ any of these together. For example:\n\n```\nfrom gpiozero import PWMLED, DistanceSensor\n\
    from signal import pause\n\nled=PWMLED(4)\ndist=DistanceSensor(5,6)\nled.source=dist\n\
    pause\n```\n\nresults in an LED that gets brighter as something moves away from\
    \ the distance sensor.\nWhat if you wanted the LED to get brighter as something\
    \ approached?"
  merge: -1
  pgno: 118
- img_proc: true
  md: "The answer is you can put other objects in the chain of values that can process\
    \ the data. GPIO Zero provides some standard value processing functions including\
    \ the following source functions.\n\n+   - **absoluted(values)**\n  Takes the\
    \ absolute value of each value.\n- **booleanized(values,min,max,hysteresis=0)**\n\
    \  True for values in the range min to max and False otherwise. The hysteresis\
    \ parameter sets the amount of change that is allowed without changing the state.\
    \ That is, if the value is greater than max then the cutoff is max-hysteresis\
    \ and if it is smaller than max has to increase to max plus hysteresis before\
    \ the state is changed.\n- **clamped(value,output_min=0,output_max=1)**\n  Truncates\
    \ values to be in the range output_min to output_max.\n- **inverted(values,input_min=0,input_max=1)**\n\
    \  Inverts the value using input_max minus value plus input_mi\n- **negated(values)**\n\
    \  Swaps True and False.\n- **post_delayed(values,delay)**\n  Waits for delay\
    \ seconds after returning the value.\n- **pre_delayed(values,delay)**\n  Waits\
    \ for delay seconds before returning value\n- **scaled(values,output_min,output_max,input_min=0,input_max=1)**\n\
    \  Re-scales the values using value*(output_max-output_min) divided by(input_max-input_min)\
    \ plus output_min\n- **post_periodic_filtered(values, repeat_after, block)**\n\
    \  After repeat_after items, blocks the next block items from values. So post_periodic_filtered(values,\
    \ 1,1) discards even items.\n- **pre_periodic_filtered(values, block, repeat_after)**\n\
    \  Blocks the next block of items from values and after repeat_after items repeats\
    \ the block. So pre_periodic_filtered(values, 100,0) discards the first 100 values\
    \ and pre_periodic_filtered(values, 1,1) discards all odd values.\n- **quantized(values,\
    \ steps, input_min=0, input_max=1)**\n  Converts to discrete values between input_min\
    \ and input_max using int(value*steps)/steps*(input_max-input_min)+input_min\n\
    - **queued(values, qsize)**\n  Forms a queue of qsize values and only passes them\
    \ on when the queue is full.\n- **smoothed(values, qsize, function)**\n  Forms\
    \ a queue of qsize value and then applies the function specified by function,\
    \ by default average, to them, so reducing them to a single value."
  merge: -1
  pgno: 119
- img_proc: true
  md: 'To return to the problem of making the LED glow brighter as something moves
    closer, you can see that all we need to do is use the inverted function to turn
    0 to 1 into 1 to 0:


    ```

    from gpiozero import PWMLED, DistanceSensor

    from gpiozero.tools import inverted

    from signal import pause

    led=PWMLED(4)

    dist=DistanceSensor(5,6)

    led.source=inverted(dist)

    pause

    ```


    We don''t need to specify the `input_max` and `input_min` parameters because they
    default to 1 and 0.


    As well as functions which can transform the values there are also functions which
    can combine values from multiple sources. Each of these functions accepts any
    number of parameters:


    +   - `all_values(*values)`: Returns True if all of the values are True.

    - `any_values(*values)`: Returns True if any of the values is True.

    - `averaged(*values)`: Returns the average of all the values.

    - `multiplied(*values)`: Returns the product of all the values.

    - `summed(*values)`: Returns the sum of all the values.

    - `zip_values(*values)`: Returns a tuple of all the values.


    For example, if you have distance sensors on the back and front of a robot you
    can set an LED to the average distance using:


    ```

    from gpiozero import PWMLED, DistanceSensor

    from gpiozero.tools import inverted,averaged

    from signal import pause


    led=PWMLED(4)

    front=DistanceSensor(5,6)

    back=DistanceSensor(7,8)

    led.source=averaged(front,back)

    pause

    ```'
  merge: -1
  pgno: 120
- img_proc: true
  md: "# A Custom Combining Function\n\nEven though there are so many combining functions,\
    \ there is usually a need for something specialized. For example, what about a\
    \ function that returns the minimum value? If you take a look at the source code\
    \ for any of the functions listed above, you should have no difficulty in seeing\
    \ how to create your own. In this case, our custom mined function is:\n\n```\n\
    from gpiozero.tools import _normalize\ndef mined(*values):\n    values = [_normalize(v)\
    \ for v in values]\n    for v in zip(*values):\n        yield min(v)\n```\n\n\
    If you are sure that the values are all in standard form, i.e. created by devices\
    \ or functions in GPIO Zero, you can omit the call to _normalize. The core of\
    \ the function simply uses zip to create a tuple of all of the readings and then\
    \ applies the standard Python min function to each tuple, yielding on the result.\n\
    \nYou can replace the min function by max or whatever you need to create your\
    \ own transformation of the data.\n\nOnce you have the mined function you can\
    \ create a program that lights the LED according to the closest approach from\
    \ the back or the front:\n\n```\nfrom gpiozero import PWMLED, DistanceSensor\n\
    from gpiozero.tools import _normalize\n\ndef mined(*values):\n    values = [_normalize(v)\
    \ for v in values]\n    for v in zip(*values):\n        yield min(v)\nfrom signal\
    \ import pause\n\nled=PWMLED(4)\nfront=DistanceSensor(5,6)\nback=DistanceSensor(7,8)\n\
    led.source=mined(front,back)\npause\n```\n\nNow the LED is set to the smallest\
    \ of the readings from the front and back distance sensors."
  merge: -1
  pgno: 121
- img_proc: true
  md: "As well as devices providing streams of data, there are also functions which\
    \ generate values that can be fed to output devices or other functions as data\
    \ sources:\n\n+   - alternating_values(initial_value=False)\n  Alternates between\
    \ True and False.\n- cos_values(period=360) sin_values(period=360)\n  A cosine\
    \ or sine wave which repeats after period values. As the background update occurs\
    \ once every hundredth of a second setting period to 100 gives a 1Hz waveform.\
    \ Notice that the values are between -1 and 1 and if you want a different range\
    \ you need to use scaled.\n- ramping_values(period=360)\n  A triangle wave which\
    \ increases from 0 to 1 and back again every period values.\n- random_values()\n\
    \  Random values between 0 and 1.\n\nThe simplest example of using these functions\
    \ is to make an LED twinkle:\n\n```\nfrom gpiozero import PWMLED\nfrom gpiozero.tools\
    \ import random_values\nfrom signal import pause\nled = PWMLED(4)\nled.source\
    \ = random_values()\npause()\n```\n\nIt is relatively easy to create a custom\
    \ value source. For example, to control PWM, Pulse Width Modulation, which is\
    \ explored in the next chapter, you can produce a cycle of values with period*duty\
    \ set to 1 and the remainder set to 0. For example:\n\nPWM_values(10,0.5)\nrepeatedly\
    \ produces five values of 1 and five of 0.\nThe function is:\n\n```\ndef PWM_values(period=360,duty=0.5):\n\
    \    _ontime=int(period*duty)\n    _offtime=period-_ontime\n    data=[1]*_ontime+[0]*_offtime\n\
    \    while True:\n        for i in range(_ontime):\n            print(1)\n   \
    \         yield 1\n        for i in range(_offtime):\n            print(0)\n \
    \           yield 0\n```\n\nIt is very simple, consisting of two for loops that\
    \ produce _ontime ones and _offtime zeros over and over again."
  merge: -1
  pgno: 122
- img_proc: true
  md: "You can use the same technique to develop your own function. Usually it is\
    \ better first to write a function that produces the sequence of values that you\
    \ want and after you have verified that this works convert it into a generator\
    \ by adding yield.\n\n# Internal Devices\n\nGPIO Zero supports a number of devices\
    \ that are either built into the Pi or derive from information that the Pi can\
    \ supply. These are often useful in source/value chains. The internal device functions\
    \ have changed to support events in GPIO Zero 2. They all work in the same basic\
    \ way in that they return an object that you can use to find the internal device’s\
    \ value, call an event handling routine or use in a source/value chain. There\
    \ is usually a max and min parameter that sets the range that the value property\
    \ will be set to 1. How they work becomes clear when you have seen one of the\
    \ functions in detail:\n\n+   - TimeOfDay(start_time, end_time, utc=True, event_delay=5.0\
    \ pin_factory=None)\n  where utc=True uses UTC instead of local time and event_delay\
    \ is the time between updates.\n  Returns a TimeOfDay object with the following\
    \ properties:\n  - end_time: same as end_time parameter\n  - start_time: same\
    \ as start_time parameter\n  - utc: same as utc parameter\n  - is_active: True\
    \ if time is between start_time and end_time\n  - value: returns 1 when time is\
    \ between start_time and end_time\n  - when_activated: function to run when status\
    \ changes to active\n  - when_deactivated: function to run when status changes\
    \ to deactivate\n\nYou can use TimeOfDay either by setting functions that are\
    \ called when the start_time or end_time is reached or you can use value as a\
    \ data source. The example in the documentation connects an LED to the value so\
    \ as to switch it on for the time interval. Notice that you don’t need a time\
    \ property to return the current time as this is available from the standard Python\
    \ function time."
  merge: -1
  pgno: 123
- img_proc: true
  md: "Once you have seen TimeOfDay the other internal functions are obvious:\n\n\
    +   - PingServer(host, event_delay=10, pin_factory=None)\n  Pings the URL or IP\
    \ address of the server and returns a PingServer object. Activation is defined\
    \ by the host responding and value is 1 if it has returned even a single ping.\n\
    \n+   - CPUTemperature(\n  sensor_file='/sys/class/thermal/thermal_zone0/temp',\n\
    \  min_temp=0.0, max_temp=100.0,\n  threshold=80.0, event_delay=5, pin_factory=None)\n\
    \  Checks the CPU temperature using the default sensor file. The min_temp and\
    \ max_temp set the temperatures for which a 0 and a 1 are returned by value:\n\
    \  value=(temperature-min_temp)/(max_temp-min_temp)\n  and threshold sets the\
    \ critical temperature above which the device is active. You can use the temperature\
    \ property to read the temperature.\n\n+   - LoadAverage(load_average_file='/proc/loadavg',\n\
    \  min_load_average=0.0, max_load_average=1.0,\n  threshold=0.8, minutes=5,event_delay=5,\
    \ pin_factory=None)\n  Gets the average CPU load from the default file. The min_load_average\
    \ and max_load_average set the loads that corresponds to:\n  value=(load_average-min_load_average)/\n\
    \  (max_load_average-min_load_average)\n  a value between 0 and 1 when load_average\
    \ is between max_load_average and min_load_average .\n  Threshold sets the device\
    \ to active if the load exceeds the value. The minutes parameter gives the time\
    \ over which the load is averaged. The load_average property can be used to find\
    \ the current value.\n\n+   - DiskUsage(filesystem='/',threshold=90.0,event_delay=30,\n\
    \  pin_factory=None)\n  Checks the amount of disk space used by the folder specified\
    \ by filesystem and all its sub-folders. If the amount is greater than the threshold\
    \ percentage the device is set to active. The usage property returns the current\
    \ percentage use and value is usage/100."
  merge: -1
  pgno: 124
- img_proc: true
  md: "For example, to turn an LED on when the temperature is too high:\n\n```\nfrom\
    \ gpiozero import LED, CPUTemperature\nfrom signal import pause\nfrom gpiozero.tools\
    \ import booleanized\n\ncpu = CPUTemperature(min_temp=58, max_temp=90)\nprint(cpu.temperature)\n\
    led=LED(4)\nled.source = booleanized(cpu,0,1)\npause()\n```\n\nWe need to use\
    \ the booleanized function to convert the decimal value to an on/off or 0 1 value\
    \ that can be used by the LED.\n\n# A Custom Internal Device\n\nIt is easy to\
    \ add a custom internal device. As an example, let's create a new class that returns\
    \ the fraction of free memory. The /proc/meminfo file gives memory use statistics.\
    \ You can open it and read it or just use the cat command:\n\n```\ncat /proc/meminfo\n\
    MemTotal:        949444 kB\nMemFree:         250276 kB\nMemAvailable:    588716\
    \ kB\nBuffers:          94528 kB\nCached:          355420 kB\nSwapCached:    \
    \        0 kB\nActive:          454272 kB\nInactive:        193148 kB\n```\n\n\
    So to get the free memory we have to read the file and extract the value in the\
    \ second line. The new class is:\n\n```\nimport io\nfrom gpiozero import InternalDevice\n\
    \nclass MemoryFree(InternalDevice):\n    def __init__(self, threshold=0.9, memfile='/proc/meminfo',\n\
    \                 pin_factory=None):\n        super(MemoryFree, self).__init__(pin_factory=pin_factory)\n\
    \        self._fire_events(self.pin_factory.ticks(), None)\n        self.memfile\
    \ = memfile\n        self.threshold = threshold\n        self._totalmem = 0\n\
    \        self._availablemem = 0\n```"
