  md: '# TrafficLightsBuzzer


    ```

    TrafficLightsBuzzer(lights, buzzer, button, *,

    pin_factory=None)

    ```


    A composite consisting of a TrafficLights instance, a buzzer and a button. You
    can control the TrafficLights using the lights attribute, the buzzer via buzzer
    and the button via button.


    For example:


    ```

    tlb=TrafficLightsBuzzer(TrafficLights(4,17,27), Buzzer(22),

    Button(23))

    tlb.lights.red.on()

    tlb.button.wait_for_press()

    tlb.buzzer.on()

    tlb.lights.red.off()

    tlb.lights.green.on()

    tlb.buzzer.off()

    ```


