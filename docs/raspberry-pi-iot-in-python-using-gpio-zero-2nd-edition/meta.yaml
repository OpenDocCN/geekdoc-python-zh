- md: 'Finally, if you are even more serious, then a low-cost pocket oscilloscope
    is also worth investing in to check out the analog nature of the supposedly digital
    signals that microcontrollers put out. However, if you have to choose between
    these two instruments the logic analyzer should be your first acquisition.


    It is worth noting that the Pi can generate signals that are too fast to be reliably
    detected by low-cost oscilloscopes and logic analyzers which work at between 1MHz
    and 25MHz. This can mean that working with pulses much faster than 1 microsecond
    can be difficult as you cannot rely on your instruments.


    ## Safety In Numbers


    A final point to make about the Raspberry Pi and its ecosystem regards the size
    of its user base. According to the Raspberry Pi Foundation, by August 2023 the
    Pi had sold more than 50 million units and while these aren’t all exactly the
    same device they are all compatible enough to ensure that your programs have a
    good chance of running on any of them.


    The large numbers of Pis in the world means that you have a good chance of finding
    the answer to any problem by a simple internet search, although it has to be said
    that the quality of answers available vary from misleading to excellent. Always
    make sure you evaluate what you are being advised in the light of what you know.
    You also need to keep in mind that the advice is also usually offered from a reasonably
    biased point of view. The C programmer will give you an answer that suits a system
    that already uses C, and electronics beginners will offer you solutions that are
    based on “off the shelf” modules when a simple cheap solution is available based
    on a few cheap components. Even when the advice you get is 100% correct, it still
    isn’t necessarily the right advice for you.


    The large numbers of Raspberry Pis in circulation also means that it is unlikely
    that the device will become obsolete. This isn’t something you can assume about
    other less popular single-board computers. It is reasonable to suppose that any
    programs you write today will work into the foreseeable future on a device that
    might not look like today’s Raspberry Pis but will be backward compatible.


    In short, the Raspberry Pi provides a secure and non-threatening environment for
    your development work.


    ## The Book’s Roadmap


    After covering how to get started with Python on the Pi using Thonny we take a
    look at the basic ideas of using Python to work with the GPIO lines and then take
    a detour into object-oriented Python – just enough to understand what GPIO Zero
    is doing.


    From here we look in detail at simple on/off devices and show how to create custom
    devices. Although devices are what you most often use, the lowest-level approach
    is to use the Pin class and gain direct access to a GPIO line via a pin factory.
    The next chapter goes over the sort of basic electronics you need to get started
    with the IoT – it’s not all you will ever need, but we hope it is enough to stop
    you destroying your Pi and whatever you connect to it.


    From here we move on to simple, complex and internal input devices. This is also
    an introduction to GPIO Zero’s ingenious source/values approach to declarative
    programming. We not only look at the basics, but show how to create custom classes
    to work with source/values.


    Chapter 10 marks a shift in topic away from simple devices and GPIO lines to look
    at higher-level protocols – pulse width modulation, PWM, in this case. PWM is
    used for all sorts of things. It is commonly used with servo and DC motors and
    the next chapter deals with motors of all kinds, including unidirectional and
    bidirectional motors, with the help of an H bridge, servos, brushless DC motors
    and stepper motors, including a custom stepper motor device.


    GPIO Zero has a feature whereby you can group different devices into larger compound
    devices. In Chapter 12 we explain the basics of the supplied devices and show
    how to use the idea to improve on the custom stepper motor device introduced earlier.


    The next two chapters are all about the SPI bus. Starting from the basics and
    the supported SPI devices, we move on to consider how the SPI bus works and implement
    a custom SPI device.


    The final chapter is about lgpio which is the library used to implement GPIO Zero
    on all versions of the Pi including the Pi 5.


    ## Summary


    - The cost of computing hardware has fallen to the point where many applications
    that would have used low-cost and less-powerful microcontrollers can now make
    use of Raspberry Pi hardware, which is powerful enough to run a full version of
    Linux.

    - The smallest member of the Pi family is the Pi Zero. It has a single-core processor
    with a minimal number of connectors. The Pi Zero W has built-in WiFi which makes
    it easy to use in situations where you want connectivity. As well as WiFi, the
    Pi Zero 2W has four cores.

    - The Pi 5 is currently the most powerful of the Pi models. Like the Pi 4, it
    is a quad-core device with up to 8GB of RAM, but it is at least twice the speed
    of the Pi 4.

    - As neither the Pi 5 nor the Pi 4 is currently available as a "cut down" model
    A, the Pi 3A+ is still a viable choice for IoT applications.

    - The Compute Module 4 (CM4) is a Pi 4 packaged as a credit card sized industrial
    device. It needs a custom I/O board or a development board to make use of it.
    The corresponding CM5 should be available sometime in 2024.

    - The Pi 400 is a faster Pi 4 with 4GB of RAM packaged into a keyboard. You can
    use it as an IoT development system. Currently there is no indication if and when
    a Pi 500 will be available.

    - To work with electronics you will need a solderless prototyping board, some
    hookup wires and some components. It''s also good to have a multimeter and preferably
    a logic analyzer. After these basic instruments, you can add what you can afford.

    - With more than 50 million devices sold and a very large community of users,
    the Raspberry Pi is a very stable platform and one you can use with reasonable
    assurance that it will be available in the future.


    # Chapter 2


    ## Getting Started With Python And GPIO Zero


    The most difficult part of any project is getting started. Once you have managed
    it, you can''t see what the difficulty was in the first place! In this case it
    is assumed that you have your Pi up and running and can work with it either via
    a screen, keyboard and mouse, a Secure Shell (SSH) connection or using remote
    desktop.


    You can work with Python using a range of different approaches and they each have
    their advantages and disadvantages. In the first instance it is probably best
    to choose the easiest option and in the case of the Pi that is to use Thonny as
    it is already installed and ready to go, as is Python 3. You can use this setup
    on any Pi and use them to develop and run programs, but the Pi Zero struggles
    to keep up.


    A better solution is to use remote development. That is to use another machine
    to create and edit the program and run it on a target machine that is connected
    via SSH. Thonny supports remote development but at the time of writing it doesn''t
    support remote debugging. This makes it less than perfect but it is the simplest
    way to get started with remote development.


    If you move on to be more ambitious you might want to develop Python programs
    using Visual Studio Code (VS Code) running on a desktop Windows, Mac or Linux
    machine. VS Code supports full remote debugging and an extensive range of tools
    to make programming easier. How to get started with VS Code is described in Appendix
    I but, while not difficult, it takes many steps to get it all working and you
    might want to leave it until you need it.


    ## Your First Python Pi Program


    It is assumed that you have your Pi set up and you can work with a desktop, either
    locally or remotely. In most cases the simplest way to get started is to add a
    keyboard, mouse and monitor to a Pi 4 or 5. In this case you are using local development
    i.e. the same machine is being used to develop and test the program.


    An alternative is to use a remote desktop connection VNC or RDP to a Pi that doesn''t
    have a monitor, keyboard and mouse – a so called headless Pi.'
