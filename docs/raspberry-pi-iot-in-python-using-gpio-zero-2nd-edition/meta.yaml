    \ converter with a single differential channel\n- MCP3302\n  12/13-bit analog\
    \ to digital converter with 4 channels (0-3). When operated in differential mode,\
    \ the device outputs a signed 13-bit value which is scaled from -1 to +1. When\
    \ operated in single-ended mode (the default), the device outputs an unsigned\
    \ 12-bit value scaled from 0 to 1.\n- MCP3304\n  12/13-bit analog to digital converter\
    \ with 8 channels (0-7). When operated in differential mode, the device outputs\
    \ a signed 13-bit value which is scaled from -1 to +1. When operated in single-ended\
    \ mode (the default), the device outputs an unsigned 12-bit value scaled from\
    \ 0 to 1.\n\nAll of these devices work in more or less the same way and to demonstrate\
    \ how to use them let's connect up an 8-channel, 12-bit A to D converter using\
    \ the MCP3008. This is often sufficient for many projects.\n\n# The MCP3008\n\n\
    The MCP3008 is available in a number of different packages, but the standard 16-pin\
    \ PDIP is the easiest to work with using a prototyping board. You can buy it from\
