  md: '# D-SUN PIR Motion Sensor


    Infrared motion detectors work by sensing a change in the level of infrared radiation.
    The D-SUN PIR is a standard low-cost module, but you can use any that follow the
    basic design with a three-pin connection – Vcc, Ground and Data. The data line
    is set high when motion is detected. Different devices have different controls
    for sensitivity and usually a setting for repeatable or non-repeatable mode. In
    repeatable mode the output goes high when motion is detected and the device is
    reset after a set time so that it is ready to detect motion again. In non-repeatable
    mode the output is set high as long as motion is detected.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_112_0.png)


    To use the device all you have to do is connect the Vcc pin to 5V, the ground
    pin to ground and the data pin to the GPIO line you want to use.

    You can create a MotionSensor object using the constructor:

    MotionSensor(pin,queue_len=1, sample_rate=10, threshold=0.5, partial=False, pin_factory=None)

    Notice that the default for queue_len is 1, meaning that no smoothing is performed.
    To discover if motion has been detected you can use value or motion_detected which
    compares value to the threshold. You can also use the wait_for_motion, wait_for_no_motion,
    when_motion and when_no_motion events.'
  merge: -1
  pgno: 112
