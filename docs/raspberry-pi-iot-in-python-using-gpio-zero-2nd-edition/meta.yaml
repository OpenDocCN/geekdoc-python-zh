- md: "## Which Pin Factory?\n\nIf you are happy with the default pin factory there\
    \ is no need to get deeply involved in selecting a pin factory and you can skip\
    \ this section and return to it if you ever need to find out more.\n\nThe lower-level\
    \ GPIO libraries interact directly with the hardware and as such they have to\
    \ be written to work with specific versions of the Pi. Until the Pi 5 this wasn't\
    \ difficult as the GPIO implementation was fairly standard. The Pi 5 implements\
    \ GPIO and other I/O in a new way and this means that the existing GPIO libraries\
    \ don't work with it. At the time of writing the only way of using the GPIO and\
    \ other I/O in the same way across all version of the Pi is to use Linux drivers.\
    \ The Linux drivers are uniform across all versions of the Pi and this is why\
    \ they make a good foundation for the default LGPIOFactory. The problem is that\
    \ Linux drivers tend to be slow and there are faster pin libraries. Indeed, speed\
    \ is about the only good reason for using something other than the default.\n\n\
    If GPIO Zero is let down by anything, it is the lack of a really high quality\
    \ high speed GPIO library that works across all versions of the Pi to base a pin\
    \ factory on. As a result each of the alternative pin factories have advantages\
    \ and disadvantages.\n\nFor GPIO Zero 2 the default pin factory was changed to\
    \ be LGPIOFactory, which is currently the only factory that works on all versions\
    \ of the Pi, including the Pi 5. In principle, it should work on any Linux-based\
    \ system as it uses the standard gpiochip devices. For this reason it is advised\
    \ that you use the default pin factory unless you have a good reason not to.\n\
    \nBefore GPIO Zero 2 the default pin factory, and hence the most commonly used,\
    \ was RPiGPIOFactory. However, it doesn't work on the Pi 5 nor does it support\
    \ the SPI bus, I2C, hardware pulse width modulation (PWM) or the 1-wire bus. It\
    \ also isn't undergoing much development and so these features are unlikely to\
    \ be added in the future. It is faster than the new default pin factory and as\
    \ such is sometimes worth using in its place if you are sure that you don't need\
    \ your program to work on a Pi 5.\n\nThe other alternative pin factories are mostly\
    \ only of historical interest and are included here in case you have to deal with\
    \ some old software that makes use of them.\n\nRPIOFactory is faster, doesn't\
    \ load the CPU and supports a clever software implementation of PWM using DMA\
    \ (Direct Memory Access), but it doesn't support the Pi 5, Pi 4 or the Pi Zero\
    \ and it is no longer supplied as part of GPIO Zero 2. No work has been done on\
    \ the project since 2014 and the project's GitHub page notes that it is no longer\
    \ maintained and is looking for a new maintainer.\n\nThe pigpio library also uses\
    \ DMA to create software PWM on any line, but it currently has only experimental\
    \ support for the Pi 4 and no support for the Pi 5. Its use of a daemon to control\
    \ the GPIO lines also seems to have some stability problems. However, the project\
    \ is still on-going and, if you are prepared for slightly more complexity, it\
    \ is worth trying. This pin factory is also the only one that supports remote\
    \ GPIO. It does at least seem to be a well-implemented current project.\n\nThe\
    \ final choice is NativeFactory which is completely Python-based. You can read\
    \ the code to see how it works and it is very educational. Sadly, it isn't fully\
    \ implemented and, while it supports the SPI bus in hardware and software, it\
    \ doesn't support PWM at all.\n\nThere is also MockFactory which creates software\
    \ pins that can be used for testing when a Pi isn't available.\n\nTo summarize:\n\
    \nFor most applications the default LGPIOFactory is the best choice simply because\
    \ it is the default, supports all version of the Pi including the Pi 5 and is\
    \ likely to be the one supported in the future. Its only disadvantage is that\
    \ it is slower than some alternatives.\n\nThe only other pin factory worth considering\
    \ is the RpiGPIOFactory which is faster but it doesn't run on the Pi 5 and isn't\
    \ likely to see much development in the future.\n\nCurrently LGPIOFactory has\
    \ no ability to work with I2C or 1-wire devices. For these you need to work directly\
    \ with Linux Drivers as explained in *Raspberry Pi IOT in Python with Linux Drivers*,\
    \ ISBN:9781871962659.\n\n## Setting a Pin Factory\n\nIf you don't bother to specify\
    \ a pin factory, GPIO Zero will try to locate one for you and if it can't find\
    \ one, because none are installed, it will use the NativeFactory which is always\
    \ available. In most cases this means that LGPIOFactory will be used as it is\
    \ installed by default.\n\nYou can also set the pin factory to use on the command\
    \ line using the export command:\n`export GPIOZERO_PIN_FACTORY = name of pin Factory`\n\
    \nYou can explicitly select a pin factory from within Python by setting Device.pin_factory:\n\
    `Device.pin_factory = factoryClass()`\nwhere `factoryClass` is the name for the\
    \ factory as listed in the table below.\nYou can also read `Device.pin_factory`\
    \ to discover which pin factory is in use.\n\nEach pin factory generates a pin\
    \ class with a specific name but these all work in the same way and have the same\
    \ methods and properties. What this means is that you can treat pins produced\
    \ by any pin factory in the same way.\nThe Factory and Pin classes corresponding\
    \ to each of the options are:\n\n| Name | Factory class | Pin class |\n|---|---|---|\n\
    | lgpio | gpiozero.pins.lgpio.LGPIOFactory | gpiozero.pins.lgpio.LGPIOPin |\n\
    | rpigpio | gpiozero.pins.rpigpio.RPiGPIOFactory | gpiozero.pins.rpigpio.RPiGPIOPin\
    \ |\n| pigpio | gpiozero.pins.pigpio.PiGPIOFactory | gpiozero.pins.pigpio.PiGPIOPin\
    \ |\n| native | gpiozero.pins.native.NativeFactory | gpiozero.pins.native.NativePin\
    \ |\n\nYou can also specify the pin factory as a parameter in each device constructor:\n\
    `LED(7,pin_factory=factoryClass())`\nHowever, this approach has little value and\
    \ you should only ever use a single pin factory in a given program. The best advice\
    \ is to ignore the pin_factory parameter unless you have a good reason not to.\
    \ Set the pin factory at the start of your program and don't change it.\n\nYou\
    \ can also create and use a pin factory object directly:\n`from gpiozero.pins.native\
    \ import NativeFactory`\n`myFactory = NativeFactory()`\n`pin = myFactory.pin(4)`\n\
    \n## How Fast?\n\nA key question for any IoT system is how fast can it operate?\
    \ In this context we need a rough idea how fast GPIO Zero can toggle GPIO lines.\
    \ Notice that this question depends not just on GPIO Zero, but also on the pin\
    \ factory in use. For simplicity, we will look at only lgpio, the default and\
    \ rpigpio, the previous default.\n\nWe can answer this question immediately with\
    \ a simple program:\n\n```\nfrom gpiozero import LED\nled = LED(4)\nwhile True:\n\
    \    led.on()\n    led.off()\n```\n\nIf you run this on a Pi Zero using rpigpio,\
    \ which is the fastest pin factory, the output is 3.6kHz, which means you can\
    \ switch an LED on for 136μs. For a Pi 4 the output is 51kHz and just short of\
    \ 10μs. In other words, the Pi 4 is around ten times faster.\n\nAs LGPIOFactory\
    \ is the only pin factory that works with the Pi 5 we cannot try this with rpigpio,\
    \ but the same program, using lgpio, produces 20μs pulses with a frequency of\
    \ 24kHz.\n\nYou might think that an apparently simpler program:\n\n```\nfrom gpiozero\
    \ import LED\nled = LED(4)\nwhile True:\n    led.toggle()\n```\n\nwould get the\
    \ job done faster, but no. The toggle operation is more complex and the toggle\
    \ method simply hides this. In this case a Pi Zero runs at 1.8kHz and a Pi 4 at\
    \ 24kHz, i.e. this method takes twice as long.\n\nWhat about working with the\
    \ pin directly? This should be faster as it avoids using additional code in GPIO\
    \ Zero. Using the default pin factory:\n\n```\nfrom gpiozero import Device\nDevice()\n\
    pin = Device.pin_factory.pin(4)\npin._set_function(\"output\")\nwhile True:\n\
    \    pin.state=1\n    pin.state=0\n```\n\nIf you try this out using rpigpio on\
    \ a Pi Zero you will find that you get 25kHz and on a Pi 4 300kHz, i.e. more than\
    \ ten times faster than using the LED object. Different pin factories will give\
    \ you different upper limits, but the speed increase using the pin object directly\
    \ should be similar. On a Pi 5, the frequency is 38kHz, which is a consequence\
    \ of the LGPIOFactory being about ten times slower than rpigpio."
  mdcn: "## 选择哪个引脚工厂？\n\n如果你对默认的引脚工厂感到满意，就没有必要深入研究如何选择引脚工厂，你可以跳过本节，等到需要了解更多时再回来查看。\n\
    \n底层的GPIO库直接与硬件交互，因此它们必须针对特定版本的树莓派编写。在树莓派5之前，这并不困难，因为GPIO的实现相当标准。树莓派5以一种新的方式实现了GPIO和其他I/O，这意味着现有的GPIO库无法与之兼容。在撰写本文时，要在所有版本的树莓派上以相同方式使用GPIO和其他I/O，唯一的方法是使用Linux驱动程序。Linux驱动程序在所有版本的树莓派上都是统一的，这就是为什么它们成为默认`LGPIOFactory`的良好基础。问题在于Linux驱动程序往往速度较慢，而存在更快的引脚库。实际上，速度是使用非默认引脚库的唯一充分理由。\n\
    \n如果说GPIO Zero有什么不足，那就是缺乏一个真正高质量、高速的GPIO库，该库需要能在所有版本的树莓派上工作，并作为引脚工厂的基础。因此，每个替代引脚工厂都有其优缺点。\n\
    \n对于GPIO Zero 2，默认引脚工厂更改为`LGPIOFactory`，这是目前唯一能在所有版本的树莓派（包括树莓派5）上工作的工厂。原则上，它应该能在任何基于Linux的系统上工作，因为它使用标准的`gpiochip`设备。因此，建议你使用默认引脚工厂，除非你有充分的理由不这样做。\n\
    \n在GPIO Zero 2之前，默认引脚工厂，也就是最常用的，是`RPiGPIOFactory`。然而，它不能在树莓派5上工作，也不支持SPI总线、I2C、硬件脉宽调制（PWM）或单总线（1-wire）。它也没有进行太多开发，因此这些功能不太可能在未来添加。它比新的默认引脚工厂更快，因此如果你确定不需要你的程序在树莓派5上运行，有时值得用它来替代。\n\
    \n其他替代引脚工厂大多只有历史意义，这里列出它们是为了以防你需要处理一些使用了它们的旧软件。\n\n`RPIOFactory`更快，不会占用CPU，并支持使用DMA（直接内存访问）的巧妙软件PWM实现，但它不支持树莓派5、树莓派4或树莓派Zero，并且它不再作为GPIO\
    \ Zero 2的一部分提供。自2014年以来，该项目没有进行任何工作，其GitHub页面注明该项目已不再维护，并正在寻找新的维护者。\n\n`pigpio`库也使用DMA在任何线路上创建软件PWM，但它目前仅对树莓派4有实验性支持，对树莓派5没有支持。它使用守护进程来控制GPIO线路，这似乎也有一些稳定性问题。然而，该项目仍在进行中，如果你愿意接受稍微复杂一点的设置，它值得一试。这个引脚工厂也是唯一支持远程GPIO的。它至少看起来是一个实现良好的活跃项目。\n\
    \n最后一个选择是`NativeFactory`，它完全基于Python。你可以阅读代码来了解它的工作原理，这非常有教育意义。遗憾的是，它没有完全实现，虽然它在硬件和软件上支持SPI总线，但完全不支持PWM。\n\
    \n还有一个`MockFactory`，它创建软件引脚，可以在没有树莓派时用于测试。\n\n总结如下：\n\n对于大多数应用，默认的`LGPIOFactory`是最佳选择，仅仅因为它是默认的，支持所有版本的树莓派（包括树莓派5），并且很可能是未来会得到支持的那个。它唯一的缺点是比一些替代方案慢。\n\
    \n唯一值得考虑的其他引脚工厂是`RPiGPIOFactory`，它更快，但不能在树莓派5上运行，未来也不太可能有太多开发。\n\n目前，`LGPIOFactory`无法与I2C或单总线设备配合使用。对于这些设备，你需要直接使用Linux驱动程序，如《Raspberry\
    \ Pi IOT in Python with Linux Drivers》（ISBN:9781871962659）中所述。\n\n## 设置引脚工厂\n\n\
    如果你不指定引脚工厂，GPIO Zero会尝试为你定位一个，如果找不到（因为没有安装），它将使用始终可用的`NativeFactory`。在大多数情况下，这意味着将使用`LGPIOFactory`，因为它是默认安装的。\n\
    \n你也可以在命令行上使用`export`命令设置要使用的引脚工厂：\n`export GPIOZERO_PIN_FACTORY = 引脚工厂的名称`\n\n\
    你也可以在Python中通过设置`Device.pin_factory`来显式选择引脚工厂：\n`Device.pin_factory = factoryClass()`\n\
    其中`factoryClass`是下表中列出的工厂名称。\n你也可以读取`Device.pin_factory`来发现当前使用的是哪个引脚工厂。\n\n每个引脚工厂都会生成一个具有特定名称的引脚类，但它们的工作方式都相同，并且具有相同的方法和属性。这意味着你可以以相同的方式处理任何引脚工厂产生的引脚。\n\
    每个选项对应的工厂和引脚类是：\n\n| 名称 | 工厂类 | 引脚类 |\n|---|---|---|\n| lgpio | gpiozero.pins.lgpio.LGPIOFactory\
    \ | gpiozero.pins.lgpio.LGPIOPin |\n| rpigpio | gpiozero.pins.rpigpio.RPiGPIOFactory\
    \ | gpiozero.pins.rpigpio.RPiGPIOPin |\n| pigpio | gpiozero.pins.pigpio.PiGPIOFactory\
    \ | gpiozero.pins.pigpio.PiGPIOPin |\n| native | gpiozero.pins.native.NativeFactory\
    \ | gpiozero.pins.native.NativePin |\n\n你也可以在每个设备构造函数中将引脚工厂指定为参数：\n`LED(7,pin_factory=factoryClass())`\n\
    然而，这种方法价值不大，你应该只在给定的程序中使用单个引脚工厂。最好的建议是忽略`pin_factory`参数，除非你有充分的理由不这样做。在程序开始时设置引脚工厂，不要更改它。\n\
    \n你也可以直接创建和使用引脚工厂对象：\n`from gpiozero.pins.native import NativeFactory`\n`myFactory\
    \ = NativeFactory()`\n`pin = myFactory.pin(4)`\n\n## 速度如何？\n\n任何物联网系统的一个关键问题是它能运行多快？在这个背景下，我们需要大致了解GPIO\
    \ Zero切换GPIO线路的速度。请注意，这个问题不仅取决于GPIO Zero，还取决于所使用的引脚工厂。为简单起见，我们只看默认的`lgpio`和之前的默认`rpigpio`。\n\
    \n我们可以用一个简单的程序立即回答这个问题：\n\n```\nfrom gpiozero import LED\nled = LED(4)\nwhile\
    \ True:\n    led.on()\n    led.off()\n```\n\n如果你在树莓派Zero上使用`rpigpio`（最快的引脚工厂）运行此程序，输出为3.6kHz，这意味着你可以将LED点亮136μs。对于树莓派4，输出为51kHz，略低于10μs。换句话说，树莓派4大约快十倍。\n\
    \n由于`LGPIOFactory`是唯一能在树莓派5上工作的引脚工厂，我们无法用`rpigpio`尝试这个，但使用`lgpio`的相同程序产生20μs的脉冲，频率为24kHz。\n\
    \n你可能认为一个看起来更简单的程序：\n\n```\nfrom gpiozero import LED\nled = LED(4)\nwhile True:\n\
    \    led.toggle()\n```\n\n会更快地完成任务，但并非如此。`toggle`操作更复杂，而`toggle`方法只是隐藏了这一点。在这种情况下，树莓派Zero以1.8kHz运行，树莓派4以24kHz运行，即此方法耗时是前者的两倍。\n\
    \n直接操作引脚呢？这应该更快，因为它避免了使用GPIO Zero中的额外代码。使用默认引脚工厂：\n\n```\nfrom gpiozero import\
    \ Device\nDevice()\npin = Device.pin_factory.pin(4)\npin._set_function(\"output\"\
    )\nwhile True:\n    pin.state=1\n    pin.state=0\n```\n\n如果你在树莓派Zero上使用`rpigpio`尝试此操作，你会发现频率为25kHz，在树莓派4上为300kHz，即比使用`LED`对象快十倍以上。不同的引脚工厂会给出不同的上限，但直接使用引脚对象的速度提升应该是相似的。在树莓派5上，频率为38kHz，这是`LGPIOFactory`比`rpigpio`慢约十倍的结果。"
