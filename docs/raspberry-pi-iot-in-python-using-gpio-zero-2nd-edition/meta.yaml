  - '[PAGE 92]


    # Chapter 8

    Simple Input


    GPIO input is a much more difficult problem than output from the point of view
    of measurement and verification. For output you can see the change in the signal
    on a logic analyzer and know the exact time that it occurred. This makes it possible
    to track down timing problems and fine-tune things with good accuracy. Input,
    on the other hand, is "silent" and unobservable. When did you read the status
    of the line? Usually the timing of the read is with respect to some other action
    that the device has taken. For example, you read the input line 20 μs after setting
    the output line high. In some applications the times are long and/or unimportant,
    but in some they are critical and so we need some strategies for monitoring and
    controlling read events.


    The usual rule of thumb is to assume that it takes as long to read a GPIO line
    as it does to set it.


    One common and very useful trick when you are trying to get the timing of input
    correct is to substitute an output command to a spare GPIO line and monitor it
    with a logic analyzer. Place the output instruction just before the input instruction
    and where you see the line change on the logic analyzer should be close to the
    time that the input would be read in the unmodified program. You can use this
    to debug and fine-tune and then remove the output statement.


    # The Button


    The GPIO Zero library has only one simple input device – the Button, but for a
    simple input device it is surprisingly complicated. This is not its fault, but
    another reflection of the fact that input is hard.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_92_0.png)


    Of course, it doesn''t have to be connected to a button - it can be any device
    that creates a definite high low signal on a GPIO line. The button could be any
    sort of switch that is actuated in any way – a reed switch activated by a magnet,
    a tilt switch activated by angle, and so on.'
  - '[PAGE 93]


    A reed switch is closed by being near a magnet.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_93_0.png)


    A tilt switch is closed by being rotated until a blob of mercury makes a connection.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_93_1.png)


    The Button has a surprising number of possible parameters:

    `Button(pin, pull_up=True, active_state=None, bounce_time=None, hold_time=1, hold_repeat=False)`


    at its simplest, however, you only have to provide the pin number:

    `button = Button(4)`


    This puts the GPIO line, GPIO4 in this case, into input mode and the defaults
    are such that a pull-up is automatically used, see previous chapter. This means
    that you can wire a switch to GPIO4 without the need for any other components.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_93_2.png)


    Ground is pin 6 and GPIO4 is pin 7.

    If you want to use a pull-down arrangement, set `pull_up` to `False` when you
    create the pin.'
  - '[PAGE 94]


    The big question is, how do you deal with input from the switch? It isn''t like
    output, where your program is in 100% control. The button can be pushed at any
    time and your program has to respond to it.


    The simplest way of dealing with the problem is for your program to wait until
    the button is pressed or released:


    ```

    wait_for_press(timeout = None)

    wait_for_release(timeout = None)

    ```


    The timeout can be set to the number of seconds to wait before giving up. The
    default value of None or 0 means your program will wait forever for the button
    to be pressed.


    The use of press and release refer to the mechanical action of the button or switch.
    Of course, if the button is wired with a pull-up then press corresponds to a 0
    and if it is wired as a pull-down then it corresponds to a 1. To let the software
    know which is which, you can use the active_state parameter when creating the
    Button object. If you set this to True then high corresponds to pressed and if
    False, low corresponds to pressed. If pull_up is anything except None, active_state
    is set automatically.


    By default Button isn''t debounced. What this means is that what looks like a
    single press to you might be received as a set of press/release signals. If you
    don''t want to incorporate hardware debounce components then include the bounce_time
    parameter when you create button. This specifies a wait time in seconds before
    its state change will be recognized. For example:


    ```

    button = Button(4,bounce_time=0.25)

    ```


    creates a Button that can only be pressed 4 times per second and hence is effectively
    debounced. Another way to look at this is that the button will only respond to
    the first press in any 0.25s interval.


    # Polling


    The problem with waiting for a button, or whatever else you use as a switch, to
    be pressed is that your program is frozen and nothing else can happen - it just
    sits there waiting for the event. Sometimes this is acceptable because there is
    nothing more for your program to do. More often it is the case that your program
    has got things to do and simply waiting isn''t an option.


    An alternative to waiting for a switch to be pressed is to poll its state. Polling
    is a standard programming technique where, to detect a change of state, the program
    repeatedly checks the state at suitable intervals. You can check the state of
    Button using the is_pressed property or the value property. The difference is
    that value gives you the state of the GPIO line, i.e. 0 (low) or 1 (high) and
    what this means depends on the way the switch is wired, whereas is_pressed always
    gives True when the switch is pressed.'
  - "[PAGE 95]\n\n```\nFor example:\nwhile True:\n    do something\n    if button.is_pressed:\n\
    \        do something about button pressed\n```\n\nIn this case the polling takes\
    \ the form of an infinite loop and the test for the button being pressed occurs\
    \ once per loop. You can see that how often the button press is tested depends\
    \ on the time the loop takes and that how long the loop gets to *do something*\
    \ depends on how often the button is pressed and how long it takes to process\
    \ the changes needed.\n\nThe idea of using a polling loop is often regarded as\
    \ a poor choice, but in practice it is generally the best choice as it uses the\
    \ processor to respond as fast as possible to the button press while allowing\
    \ it to get on with other tasks when it isn't. More sophisticated solutions, such\
    \ as using an interrupt or event are often just a way of hiding a polling loop\
    \ and tend to increase inefficiency. Polling loops are generally the best solution,\
    \ but GPIO Zero does provide an alternative in the form of events.\n\n# Events\
    \ and Interrupts\n\nInterrupts and events do make some aspects of IoT programming\
    \ easier, if not more efficient. But first what are interrupts and events?\nAn\
    \ event is like a latch or a memory that something happened. Imagine that there\
    \ is a flag that will be automatically set when an input line changes state. The\
    \ flag is set without the involvement of software, or at least any software that\
    \ you have control over. It is useful to imagine an entirely hardware-based setting\
    \ of the flag, even if this is not always the case. With the help of an event,\
    \ you can avoid missing an input because the polling loop was busy doing something\
    \ else. Now the polling loop reads the flag rather than the actual state of the\
    \ input line and hence it can detect if the line has changed since it was last\
    \ polled. The polling loop resets the event flag and processes the event. Of course,\
    \ it can't always know exactly when the event happened, but at least it hasn't\
    \ missed it altogether.\n\nA simple event can avoid the loss of a single input,\
    \ but what if there is more than one input while the polling loop is unavailable?\
    \ The most common solution is to create an event queue – that is, a FIFO (first\
    \ in, first out) queue of events as they occur. The polling loop now reads the\
    \ event at the front of the queue, processes it and reads the next. It continues\
    \ like this until the queue is empty, when it simply waits for an event. As long\
    \ as the queue is big enough, an event queue means you don't miss any input, but\
    \ input events are not necessarily processed close to the time that they occurred.\
    \ They should be processed in order, but unless the events are time-stamped the\
    \ program has no idea when they happened."
- md: "An event queue is a common architecture, but to work, or have any advantages,\
    \ it needs either multiple cores, so that events can always be added to the queue\
    \ before another occurs, or it needs the help of hardware, usually in the form\
    \ of interrupts. Notice that an event, or an event queue, cannot increase the\
    \ program’s throughput or its latency, the time to react to an input. In fact,\
    \ an event queue decreases throughput and increases latency due to overheads of\
    \ implementation. All an event system does is to ensure that you do not miss any\
    \ input and that all input gets processed eventually. Interrupts are often confused\
    \ with events but they are very different. An interrupt is a hardware mechanism\
    \ that stops the computer doing whatever it is currently doing and makes it transfer\
    \ its attention to running an interrupt handler. You can think of an interrupt\
    \ as an event flag that, when set, interrupts the current program to run the assigned\
    \ interrupt handler. Using interrupts means the outside world decides when the\
    \ computer should pay attention to input and there is no need for a polling loop.\
    \ Most hardware people think that interrupts are the solution to everything and\
    \ polling is inelegant and only to be used when you can’t use an interrupt. This\
    \ is far from the reality.\n\nThere is a general feeling that real-time programming\
    \ and interrupts go together and if you are not using an interrupt you are probably\
    \ doing something wrong. In fact, the truth is that if you are using an interrupt\
    \ you are probably doing something wrong. So much so that some organizations are\
    \ convinced that interrupts are so dangerous that they are banned. Interrupts\
    \ are only really useful when you have a low-frequency condition that needs to\
    \ be dealt with on a high-priority basis. Interrupts can simplify the logic of\
    \ your program, but rarely does using an interrupt speed things up because the\
    \ overhead involved in interrupt handling is usually quite high. If you have a\
    \ polling loop that takes 100ms to poll all inputs and there is an input that\
    \ demands attention in under 60ms then clearly the polling loop is not going to\
    \ be good enough. Using an interrupt allows the high priority event to interrupt\
    \ the polling loop and be processed in less than 100ms. However, if this happens\
    \ very often the polling loop will cease to work as intended. Notice that an alternative\
    \ is to simply make the polling loop check the input twice per loop.\n\nFor a\
    \ more real-world example, suppose you want to react to a doorbell push button.\
    \ You could write a polling loop that simply checks the button status repeatedly\
    \ and forever, or you could write an interrupt service routine (ISR) to respond\
    \ to the doorbell. The processor would be free to get on with other things until\
    \ the doorbell was pushed, when it would stop what it was doing and transfer its\
    \ attention to the ISR. How good a design this is depends on how much the doorbell\
    \ has to interact with the rest of the program and how many doorbell pushes you\
    \ are expecting. It takes time to respond to the doorbell push and then the ISR\
    \ has to run to completion. What is going to happen if another doorbell push happens\
    \ while the first push is still being processed? Some processors have provision\
    \ for forming a queue of interrupts, but it doesn't help with the fact that the\
    \ process can only handle one interrupt at a time. Of course, the same is true\
    \ of a polling loop, but if you can't handle the throughput of events with a polling\
    \ loop, you can't handle it using an interrupt either, because interrupts add\
    \ the time to transfer to the ISR and back again.\n\nFinally, before you dismiss\
    \ the idea of having a processor do nothing but ask repeatedly \"is the doorbell\
    \ pressed\", consider what else it has to do. If the answer is \"not much\" then\
    \ a polling loop might well be your simplest option. Also, if the processor has\
    \ multiple cores, then the fastest way of dealing with any external event is to\
    \ use one of the cores in a fast polling loop. This can be considered to be a\
    \ software emulation of a hardware interrupt – not to be confused with a software\
    \ interrupt or trap, which is a hardware interrupt triggered by software. If you\
    \ are going to use interrupts to service input then a good design is to use the\
    \ interrupt handler to feed an event queue. This at least lowers the chance that\
    \ input will be missed.\n\nDespite their attraction, interrupts are usually a\
    \ poor choice for anything other than low-frequency events that need to be dealt\
    \ with quickly.\n\n## Asynchronous Buttons\n\nGPIO Zero implements an event-driven\
    \ approach to asynchronous programming that is presented as if it was an interrupt.\
    \ You can specify a function to be called when Button is pressed or released using\
    \ the when_pressed and when_released properties. For example:\n\n```python\nfrom\
    \ gpiozero import Button\nfrom signal import pause\nbutton = Button(4, bounce_time=0.25)\n\
    \ndef pressed():\n    print(\"Button pressed\")\n\ndef released():\n    print(\"\
    Button released\")\n\nbutton.when_pressed = pressed\nbutton.when_released = released\n\
    pause()\n```\n\nNotice that you need the pause at the end of the program to stop\
    \ the program coming to an end. You could just put the program into an infinite\
    \ loop and do other things while waiting for the button press/release. Also notice\
    \ that when_pressed and when_released are assigned as references to the functions\
    \ and the functions are not called until later.\n\nIt is important to realize\
    \ that the pressed and released functions are called asynchronously – i.e. not\
    \ synchronized with anything happening in the program. This may be true, but Python\
    \ only allows one thing to happen at a time and there is no parallelism implied\
    \ by this form of programming. What happens is that a new thread of execution\
    \ is started and this simply waits until the event occurs. When the event occurs\
    \ the event handler is run. When the event handler is run the rest of your program\
    \ is halted. Python is constructed so as to only allow one part of your Python\
    \ code to execute at any one time. This is the so-called Global Interpreter Lock\
    \ or GIL and it means you cannot take advantage of multiple cores to run your\
    \ Python programs in parallel. Instead the operating system chooses which thread\
    \ to run at any given time. The thread that is waiting for the event is only started\
    \ if the event it is waiting for has occurred and then it gets a chance to run\
    \ the event handler. While the event handler is running you can be sure that no\
    \ other part of the Python program is running.\n\nYou may be attracted by the\
    \ idea of event handling. It is easy and this makes it great for beginners. Just\
    \ write what you want to happen when a button is pressed or released and then\
    \ get on with the rest of your program. No polling loop and no waiting. It is\
    \ useful for the beginner, but it isn't a good way to organize things in the long\
    \ run. The problem is that it is the pin factories that are responsible for implementing\
    \ the event handling and they do this in different ways. As already discussed\
    \ in connection with general interrupts and events, this approach slows the overall\
    \ system down and creates problems when events occur at too fast a rate. For example,\
    \ the pressed event handler can be interrupted by a release event and the release\
    \ function will run before the press function ends. If a new button press happens\
    \ after the release, then the press function is run a second time, even if the\
    \ first call to it is still running. However, the subsequent release function\
    \ isn't called until the first press function finishes. This is a mess! Exactly\
    \ what happens when multiple events occur depends on the pin factory that is providing\
    \ the service and this too is unsatisfactory in that you can't know what will\
    \ happen.\n\nIn conclusion, using event handling in GPIO Zero is an easy way to\
    \ produce a demo or get started, but it isn't a good way to implement anything\
    \ beyond the very simple.\n\nThis is the big problem with asynchronous code that\
    \ doesn't use a queue to ensure that multiple events are handled correctly and\
    \ in the correct order. If events and asynchronous code aren't the way to do the\
    \ job what is? The simple answer is the polling loop, but putting order into the\
    \ polling loop so that it is clean and easy to extend is difficult. If you are\
    \ happy with events and basic polling loops skip the next section, which describes\
    \ a way to organize polling loops so that they are easier to work with.\n\n##\
    \ Finite State Machines\n\nIf you are working with an application that requires\
    \ that you deal with a complex set of input and output lines then you need an\
    \ organizing principle to save you from the complexity. When you first start writing\
    \ IoT programs that respond to the outside world, you quickly discover that all\
    \ of your programs take a similar form:\n\n```python\nwhile True:\n    wait for\
    \ some input lines\n    process the input data\n    write some output lines\n\
    \    wait for some input lines\n    read some more input lines\n    write some\
    \ output lines\n```\n\nFor most programmers this is a slightly disturbing discovery\
    \ because programs are not supposed to consist of infinite loops, but IoT programs\
    \ nearly always, in principle if not in practice, take the form of an infinite\
    \ polling loop. Another, and more important problem, is that the way in which\
    \ reading and writing GPIO lines is related can be very complex. So much so that\
    \ it can be difficult to work out exactly when any particular line is read and\
    \ when it is written. We have already seen that events and interrupts are not\
    \ a good alternative and the polling loop is a really good option, but a simple\
    \ polling loop needs organization if it is to avoid evolving into something too\
    \ complex to be understood. So how should you organize a polling loop so that\
    \ what it does is self-evident by looking at the code? There are many answers\
    \ to this according to the system being implemented, and there are no “pure” theoretical\
    \ answers that solve all problems, but the finite state machine, FSM, is a model\
    \ every IoT programmer should know. A finite state machine is a very simple program.\
    \ At any given time, the machine (program) has a record of the current state S.\
    \ At a regular interval, the external world provides an input I which changes\
    \ the state from S to S’ and produces an output O. That’s all there is to an FSM.\
    \ There are variations"
  mdcn: "事件队列是一种常见的架构，但要使其发挥作用或具有任何优势，它要么需要多核，以便在另一个事件发生之前总能将事件添加到队列中；要么需要硬件的帮助，通常以中断的形式。请注意，事件或事件队列无法提高程序的吞吐量或其延迟（即对输入做出反应的时间）。事实上，由于实现的开销，事件队列会降低吞吐量并增加延迟。事件系统所做的只是确保你不会错过任何输入，并且所有输入最终都会得到处理。中断经常与事件混淆，但它们非常不同。中断是一种硬件机制，它会停止计算机当前正在做的任何事情，并使其将注意力转移到运行中断处理程序上。你可以将中断视为一个事件标志，当设置时，它会中断当前程序以运行指定的中断处理程序。使用中断意味着外部世界决定计算机何时应该关注输入，并且不需要轮询循环。大多数硬件人员认为中断是解决一切问题的方案，轮询是不优雅的，只有在无法使用中断时才使用。这远非事实。\n\
    \n人们普遍认为实时编程和中断是相辅相成的，如果你不使用中断，你可能做错了什么。事实上，真相是，如果你使用中断，你可能做错了什么。以至于一些组织确信中断非常危险，因此被禁止使用。中断只有在你需要以高优先级处理低频条件时才真正有用。中断可以简化程序的逻辑，但使用中断很少能加快速度，因为中断处理所涉及的开销通常相当高。如果你有一个轮询循环，需要100毫秒来轮询所有输入，并且有一个输入需要在60毫秒内得到关注，那么显然轮询循环是不够的。使用中断允许高优先级事件中断轮询循环并在不到100毫秒内得到处理。然而，如果这种情况经常发生，轮询循环将无法按预期工作。请注意，一个替代方案是简单地让轮询循环在每次循环中检查输入两次。\n\
    \n举一个更实际的例子，假设你想对门铃按钮做出反应。你可以编写一个轮询循环，简单地重复并永远检查按钮状态，或者你可以编写一个中断服务程序来响应门铃。处理器可以自由地处理其他事情，直到门铃被按下，此时它会停止正在做的事情并将注意力转移到中断服务程序上。这个设计有多好取决于门铃与程序其余部分的交互程度以及你预期的门铃按压次数。响应门铃按压需要时间，然后中断服务程序必须运行完成。如果在第一次按压仍在处理时发生了另一次门铃按压会怎样？一些处理器提供了形成中断队列的功能，但这无助于处理器一次只能处理一个中断的事实。当然，轮询循环也是如此，但如果你无法用轮询循环处理事件的吞吐量，你也无法使用中断来处理，因为中断增加了切换到中断服务程序再返回的时间。\n\
    \n最后，在你摒弃让处理器除了反复询问“门铃是否被按下”之外什么都不做的想法之前，考虑一下它还需要做什么。如果答案是“不多”，那么轮询循环可能是你最简单的选择。此外，如果处理器有多个内核，那么处理任何外部事件的最快方法是使用其中一个内核进行快速轮询循环。这可以被视为硬件中断的软件模拟——不要与软件中断或陷阱混淆，后者是由软件触发的硬件中断。如果你打算使用中断来处理输入，那么一个好的设计是使用中断处理程序来填充事件队列。这至少降低了输入被遗漏的机会。\n\
    \n尽管中断很有吸引力，但对于除了需要快速处理的低频事件之外的任何事情，它们通常都是一个糟糕的选择。\n\n## 异步按钮\n\nGPIO Zero 实现了一种事件驱动的异步编程方法，其呈现方式类似于中断。你可以使用\
    \ `when_pressed` 和 `when_released` 属性指定在按钮按下或释放时调用的函数。例如：\n\n```python\nfrom gpiozero\
    \ import Button\nfrom signal import pause\nbutton = Button(4, bounce_time=0.25)\n\
    \ndef pressed():\n    print(\"Button pressed\")\n\ndef released():\n    print(\"\
    Button released\")\n\nbutton.when_pressed = pressed\nbutton.when_released = released\n\
    pause()\n```\n\n请注意，你需要在程序末尾使用 `pause` 来防止程序结束。你也可以将程序置于无限循环中，在等待按钮按下/释放时执行其他操作。还要注意，`when_pressed`\
    \ 和 `when_released` 被赋值为对函数的引用，这些函数直到稍后才会被调用。\n\n重要的是要认识到，`pressed` 和 `released`\
    \ 函数是异步调用的——即与程序中发生的任何事情都不同步。这可能是真的，但 Python 一次只允许发生一件事，这种编程形式并不意味着并行性。发生的情况是，一个新的执行线程被启动，它只是等待事件发生。当事件发生时，事件处理程序运行。当事件处理程序运行时，你程序的其余部分会暂停。Python\
    \ 的构造方式使得在任何给定时间只允许你的 Python 代码的一部分执行。这就是所谓的全局解释器锁或 GIL，这意味着你无法利用多个内核来并行运行你的 Python\
    \ 程序。相反，操作系统在任何给定时间选择运行哪个线程。等待事件的线程只有在它等待的事件发生时才会启动，然后它才有机会运行事件处理程序。当事件处理程序运行时，你可以确信\
    \ Python 程序的其他部分没有在运行。\n\n你可能会被事件处理的想法所吸引。它很简单，这使得它非常适合初学者。只需编写当按钮按下或释放时你想发生的事情，然后继续处理程序的其余部分。没有轮询循环，没有等待。它对初学者很有用，但从长远来看，这不是组织事情的好方法。问题在于，负责实现事件处理的是引脚工厂，它们以不同的方式实现这一点。正如前面在讨论一般中断和事件时所讨论的，这种方法会减慢整个系统的速度，并在事件发生速率过快时产生问题。例如，按下事件处理程序可能会被释放事件中断，释放函数将在按下函数结束之前运行。如果在释放之后发生了新的按钮按下，那么按下函数将第二次运行，即使对它的第一次调用仍在运行。然而，后续的释放函数直到第一次按下函数完成才会被调用。这是一团糟！当多个事件发生时具体会发生什么取决于提供服务的引脚工厂，这也是不令人满意的，因为你无法知道会发生什么。\n\
    \n总之，在 GPIO Zero 中使用事件处理是制作演示或入门的简单方法，但这不是实现任何超出非常简单功能的好方法。\n\n这就是不使用队列来确保多个事件被正确处理和按正确顺序处理的异步代码的大问题。如果事件和异步代码不是完成这项工作的方法，那什么才是？简单的答案是轮询循环，但将顺序放入轮询循环中使其整洁且易于扩展是困难的。如果你对事件和基本轮询循环感到满意，请跳过下一节，该节描述了一种组织轮询循环的方法，使其更易于使用。\n\
    \n## 有限状态机\n\n如果你正在处理一个需要处理复杂输入和输出线路的应用程序，那么你需要一个组织原则来帮助你应对复杂性。当你第一次开始编写响应外部世界的物联网程序时，你很快就会发现你所有的程序都采取类似的形式：\n\
    \n```python\nwhile True:\n    wait for some input lines\n    process the input\
    \ data\n    write some output lines\n    wait for some input lines\n    read some\
    \ more input lines\n    write some output lines\n```\n\n对于大多数程序员来说，这是一个有点令人不安的发现，因为程序不应该由无限循环组成，但物联网程序几乎总是，即使不是在实践中，也在原则上采取无限轮询循环的形式。另一个更重要的问题是，读取和写入\
    \ GPIO 线路的方式可能非常复杂。以至于很难弄清楚任何特定线路何时被读取以及何时被写入。我们已经看到事件和中断不是一个好的替代方案，轮询循环是一个非常好的选择，但简单的轮询循环需要组织，以避免演变成过于复杂而无法理解的东西。那么，你应该如何组织轮询循环，使其功能通过查看代码就能一目了然？根据正在实现的系统，有许多答案，并且没有解决所有问题的“纯粹”理论答案，但有限状态机（FSM）是每个物联网程序员都应该知道的模型。有限状态机是一个非常简单的程序。在任何给定时间，机器（程序）都有当前状态\
    \ S 的记录。在固定的时间间隔，外部世界提供一个输入 I，将状态从 S 更改为 S' 并产生一个输出 O。这就是 FSM 的全部内容。存在变体"
