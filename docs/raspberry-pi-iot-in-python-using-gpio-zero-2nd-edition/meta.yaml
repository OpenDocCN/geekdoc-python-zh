  md: '# LED Classes


    The simplest of the LED classes is LEDBoard:


    +   ◆ **LEDBoard**

    LEDBoard(*pins, pwm=False, active_high=True,

    initial_value=False, pin_factory=None, **named_pins)

    This is the simplest of the composite LED devices and is just a

    collection of LEDs wired to specified GPIO pins, for example:

    board=LEDBoard(4,17,27)

    In addition to turning all of the LEDs on or off, and setting them to

    toggle, blink and pulse, you can control individual LEDs by

    specifying the device number. For example:

    board.on(1)

    turns on just the first specified LED, i.e. the one connected to GPIO4.

    You can use this in on, off and toggle, but not in pulse or blink.


    +   ◆ **LED Character Displays**

    Two classes methods, LEDCharDisplay and LEDMultiCharDisplay,

    can be used to display information on a multi-segment LED:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_179_0.png)


    These have 7, 9, 14 or 16 linear LED segments which can be turned

    on to form a range of characters:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_179_1.png)'
  merge: -1
  pgno: 179
- img_proc: true
  md: "Each of the segments is assigned a letter and each segment is connected to\
    \ a GPIO line. The constructor is called with the GPIO numbers specified in a\
    \ to n order.\n\n```\nLEDCharDisplay(*pins, dp=pin, font=dict, pwm=False,\n  \
    \  active_high=True, initial_value=\" \", pin_factory=None)\n```\n\nFor example:\n\
    \n```\nchar = LEDCharDisplay(4, 5, 6, 7, 8, 9, 10,\n    active_high=False)\n```\n\
    \nspecifies that a is connected to GPIO4 and b to GPIO5 and so on. You can specify\
    \ if the segment is on when the line is high or low. To display a character you\
    \ simply set the value property. For example:\n\n```\nchar.value=5\n```\n\nwill\
    \ display 5 on the display constructed earlier. The way that this works is that\
    \ the font object defines a mapping from characters to a tuple of segments that\
    \ should be on to display that character. The pattern is defined by a dict which\
    \ is indexed by the character and has a tuple defining the state of the segments\
    \ as a value. For example:\n\n```\nmyFont=LEDCharFont({\"0\":(1,1,1,1,1,1,0)})\n\
    ```\n\ndefines a font for the zero character on a seven segment display. The font\
    \ object is used to set the segments when you assign to value and it is used as\
    \ a lookup when you read value so the character displayed is returned. Default\
    \ font objects are provided for 7- and 14-segment displays.\n\nThe LEDCharDisplay\
    \ only handles a single LED display, i.e. one character. If you want a multi-character\
    \ display then you need to use the LEDMultiCharDisplay class. It is important\
    \ to realize that multi-character displays vary greatly in their design and pin\
    \ outs. The type that LEDMultiCharDisplay assumes is just a collection of single\
    \ LED displays put together with no special drivers. Each separate LED display\
    \ is fed by the same segment driving GPIO lines. An additional GPIO line is used\
    \ to strobe each LED digit on and off. By pulsing the strobe lines fast enough\
    \ and changing the segments synchronously, it looks as if all of the characters\
    \ are displaying all of the time. Usually you need a transistor driver for each\
    \ character in this configuration."
  merge: -1
  pgno: 180
- img_proc: true
  md: "To construct an LEDMultiCharDisplay you first create an LEDCharDisplay that\
    \ represents a single character in the multi-character display. You also specify\
    \ GPIO lines which switch each character on. For example:\n\n```\nchar = LEDCharDisplay(4,\
    \ 5, 6, 7, 8, 9, 10,\n                     active_high=False)\nd = LEDMultiCharDisplay(c,\
    \ 19, 20, 21, 22)\n```\n\ncreates an instance that will control a four-digit display\
    \ with each digit using GPIO 4, 5, 6, 7, 8, 9, 10 respectively to control what\
    \ is displayed and GPIO 19 controls the first digit and so on. You set the display\
    \ using:\n\n```\nd.value = \"1234\"\n```\n\nand you can also include a decimal\
    \ point if the display has one. There is one other property:\n\n```\nd.plex_delay\
    \ = s\n```\n\nsets the multiplexing to s seconds. This is the rate that the individual\
    \ digits are updated and it is usually around 0.005s, i.e. 5ms.\n\n# LEDBarGraph\n\
    \nThis treats the LEDs connected to the specified pins as a bar graph:\n\n```\n\
    LEDBarGraph(*pins, pwm=False, active_high=True,\n           initial_value=0, pin_factory=None)\n\
    ```\n\nSetting a value between -1 and 1 lights up the corresponding proportion\
    \ of the LEDs with negative values, working from the top of the list of pins.\
    \ So:\n\n```\ngraph.value=0.5\n```\n\nsets the first half of the LEDs on and:\n\
    \n```\ngraph.value=-0.5\n```\n\nsets the last half of the LEDs on.\nIt is worth\
    \ knowing that you can get packaged LED Bars with 10 or 20 segments. However,\
    \ you need to keep in mind that allocating even as few as 10 GPIO lines to drive\
    \ such a device might leave you short for other applications.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_181_0.png)"
  merge: -1
  pgno: 181
