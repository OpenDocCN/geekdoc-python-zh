- img_proc: true
  md: 'Roughly speaking, GPIO Zero running on a Pi Zero with rpigpio is of the order
    of 100μs to 20μs and on a Pi 4 10μs to 3μs is its characteristic time. On a Pi
    5 with LGPIOFactory the characteristic time is 40μs to 20μs. On the same machine
    rpigpio is about ten time faster than LGPIOFactory.


    Compare this to the same task programmed directly in C, which has a characteristic
    time of around 0.01us, i.e. 10ns, i.e. at least 100 times faster than the fastest
    pin factory on a Pi 4 and 1000 times faster than lgpio on a Pi 5.


    There is no doubt if you need speed for this sort of task then Python is not the
    language to use. C is a much better choice as outlined in *Raspberry Pi IoT in
    C, Second Edition*, ISBN:9781871962635. This said, there are many applications
    that operate at almost human timescales and for this Python is very adequate and
    much simpler. If you can, use Python and unless speed is an issue use the default
    pin factory.


    # The Problem of Clocks


    Until relatively recently processors, and computer systems in general, used a
    very simple approach to clock frequencies. Each time a clock pulse occurs something
    happens in the system and, for simplicity, clocks were set to run at a fixed maximum
    rate that allowed the system to remain cool. Today''s systems, however, make use
    of multiple clocks which run at variable rates. This allows a system to "sprint",
    i.e. use a higher clock rate for a short time, to keep the temperature increase
    below a set level. If the temperature increases too much then the clock can be
    throttled, i.e. slowed down, until the system is once again within a safe zone.
    Slowing the clock can also be used to reduce power consumption.


    A variable clock rate is good from the point of view of completing tasks, and
    perhaps reducing power consumption, but if you are trying to write programs where
    timing is critical it can be a problem. If you synchronize your program using
    a known change in a timer, which always ticks at the same rate irrespective of
    the system clock, then your program will work in the same way irrespective of
    the speed of the system clock. However, this is not true if the system clock runs
    so slow that the program cannot complete the task in the allotted time.


    The latest version of Pi OS implements the Linux cpufreq kernel driver, but things
    are more complicated with the Pi because it is the GPU that controls things, not
    the CPU. You can find out what the GPU is doing using the vcgencmd command, which
    talks directly to the GPU, whereas the standard Linux commands work with the CPU
    and sometimes give the wrong answer.'
  merge: -1
  pgno: 70
- img_proc: true
  md: 'The vcgencmd is fully documented at the official site, but the important command
    for clock speed is:

    vcgencmd measure_clock arm

    You can substitute other clock names for arm, but this gives you the frequency
    that all of the cores are running at.

    The Linux cpufreq commands are standard, but in some situations the GPU may change
    the clock frequency without Linux being aware of it. The idea is that there are
    a set of "governors" that control how the frequency is varied. For the current
    generation of Pis the default is ondemand, but you can find which the current
    active governor is using:

    sudo cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor

    and you can find out the available governors using:

    sudo cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_available_governors

    The action of the ondemand governor according to the Linux manual is:


    > The cpufreq governor "ondemand" sets the CPU frequency depending on the current
    system load. Load estimation is triggered by the scheduler through the update_util_data->func
    hook; when triggered, cpufreq checks the CPU-usage statistics over the last period
    and the governor sets the CPU accordingly.


    Setting the frequency on the basis of load makes sense for many applications,
    but for an IoT app that needs high speed, even though it doesn''t load the CPU,
    it isn''t ideal.

    Empirically, the Pi Zero seems to regard its single core as being heavily loaded
    all of the time as it always reports 1GHz as its clock rate, but the Pi 4 reports
    it as low as 600MHz given a low load. You can discover the current clock rate
    according to Linux and the max and min frequencies used using:

    cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq

    cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_min_freq

    cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_max_freq

    For the Pi Zero the maximum frequency is 1GHz, for the Pi 4 it is 1.5GHz and for
    the Pi 5 it is 2.4GHz'
  merge: -1
  pgno: 71
- img_proc: true
  md: 'If you need a fixed clock frequency you have to set the governor to a performance
    which sets the clock to the highest possible frequency, usually scaling_max_freq:


    ```

    sudo sh -c "echo performance > /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor"

    ```


    This will run the clock at the highest frequency, but if the CPU temperature goes
    over the maximum the frequency will still be reduced.

    In most cases, you can ignore clock speed variation with load, but you do need
    to keep the effect in mind when searching for explanations of why things aren''t
    happening as fast as you might expect.'
  merge: -1
