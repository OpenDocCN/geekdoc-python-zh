    ![](img/39c0a42d027b4a8b43b07050c297f3ff_238_0.png)


    After you have installed Remote SSH you can add the details of the Pi you want
    to use to develop programs on. To do this click on the Remote Explorer icon in
    the left panel and you will see that there are no SSH clients installed. Next
    click on the + that appears when you hover over SSH Targets and enter the details
    for the Pi you want to connect to:

    You specify the host using the format:

    ssh user@ipaddress


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_238_1.png)


    When you press Enter, select a configuration file to use and you are ready to
    connect to the new host. Right-click on the new host and select Connect in this
    window. Next, you will be asked for your password. You will be asked for the password
    each time you connect unless you create a private key and use it for authentication
    as detailed earlier.

    When you open the File Explorer and select Open Folder you will see a list of
    folders stored in your home folder on the host machine. Create a new folder suitable
    for storing your Python programs and create a file called Hello.py in it. The
    new file will open in the editor and you can type in:

    print("Hello World")

    Next select Run, Run Without Debugging and select the Current Python file if asked
    for the run configuration. You will be prompted to install Python extensions on
    the remote machine and to select a Python interpreter to use. As long as you do
    this you should see Hello World appear in the console at the bottom'
  - "[PAGE 239]\n\nof the window. This program has been run on the remote machine.\
    \ From here on you can learn about VS Code and slowly customize it to make your\
    \ work easier.\n\n# Running With Root Permissions\n\nIoT programs often need root\
    \ permissions to access hardware. The simplest way to do this is to run the program\
    \ locally using sudo. A better way if you want to debug your program is to create\
    \ a launch.json file:\n\n```\n{\n    \"version\": \"0.2.0\",\n    \"configurations\"\
    : [\n        {\n            \"name\": \"Sudo Python: Current File\",\n       \
    \     \"type\": \"python\",\n            \"request\": \"launch\",\n          \
    \  \"program\": \"${file}\",\n            \"console\": \"integratedTerminal\"\
    ,\n            \"justMyCode\": true,\n            \"sudo\": true\n        }\n\
    \    ]\n}\n```\n\nNotice the \"sudo\":true at the end. This runs the Python interpreter\
    \ using sudo. This only works for Python programs. You now have to run the debug\
    \ using the RUN menu.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_239_0.png)\n\
    \n# Local Remote Synchronization\n\nIt is important to realize that the Python\
    \ programs you create are stored on the remote host. This means that, if you do\
    \ nothing about it, your entire program could be stored solely on a Pi, waiting\
    \ for something bad to happen to it. Even if you consider this a safe option,\
    \ you have the problem of transferring the program to another Pi if you want to\
    \ run it there. The best solution is to keep a copy of your programs on a machine\
    \ that you consider safe, and share them with any Pi you might want to run them\
    \ on.\n\nThe most attractive option is to use source code management. VS Code\
    \ supports Git without you having to install any extensions. Once you have it\
    \ all set up this works well, but setting it up is a time-consuming process and"
  - '[PAGE 240]


    it requires that you understand how Git, and usually GitHub, works. For small
    and simple projects this is generally more than you need and you could spend a
    lot of valuable programming time learning to use a tool that you barely make use
    of. This said, if you are planning a large project, or a collaborative project,
    then source code management is your best option, even if it does involve additional
    initial work.


    In most cases we can achieve what we need using simpler tools. You can copy a
    single file or folder from a remote machine by drag-and-dropping it from the File
    Explorer to the folder in the local machine. Unfortunately, this doesn''t work
    for remote Linux machines, and this includes Pi OS, so it isn''t a method that
    works for us. However, you can drag-and-drop files and folders from the local
    machine to the File Explorer window on the remote machine. See the next section
    for an automatic way of doing this.


    Now we only have the problem of copying files from the remote machine to the local
    machine. This can be done by selecting a file or folder in the VS Code File Explorer
    and right-clicking to display the context menu. You will see Download in the same
    section as Copy. Selecting this downloads the entire folder and its contents or
    the single file. You can pick where you want the file or folder to be copied to
    and so manually maintain a central copy of anything you are working on.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_240_0.png)'
  - '[PAGE 241]


    An alternative way of saving a remote file on the local machine is to use the
    File, Save As menu option and select the Show Local button.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_241_0.png)


    This allows you to save the file on the local machine under whatever name you
    want to use.


    There are ways of automating the copying of files, but manual copying works well
    and most of the automatic synchronizing methods have their own drawbacks.


    # VS Code Remote Build and Debug Tasks


    An alternative to using VS Code’s own remote development facilities is to use
    custom tasks to copy and compile the program on the remote machine. This has the
    advantage that it works on all versions of the Pi and you automatically keep the
    source of all of the programs on the local machine.


    If you just want to use the tasks for remote debugging or remote running of a
    Python program using VS Code then the steps are given below. The files used have
    been tested on Windows, but they should work on Mac OS and Linux with changes
    to the folders specified. The files are listed at the end of this appendix and
    you can download them from this book’s page on www.iopress.info.


    It is important to know that you need to set up SSH connections without a password
    for many of these steps to work and you might need to login as root for some of
    the programs to work.


    Create the folder that is going to act as the project folder for all of the Python
    programs you are going to work with. In this case it is called GPIOZERO, but there
    is nothing special about this name. The directory structure is important to the
    working of the tasks as they assume that VS Code has the top-level directory,
    i.e. GPIOZERO, open, even though you are working with files in HelloWorld


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_241_1.png)'
- md: "Create the .vscode folder in the top-level of the folder. Again, it is important\
    \ that you create the folder in GPIOZERO as the configuration files apply to all\
    \ of the subdirectories.\n\nCreate a test project folder HelloWorld in this case\
    \ and create a simple Hello.py test program.\n\nDownload the three files settings.json,\
    \ tasks.json and launch.json from the I/O Press website, www.iopress.info, or\
    \ type them in from the listings at the end of this appendix, and copy them into\
    \ the .vscode folder.\n\nEdit settings.json in the .vscode folder to read something\
    \ like:\n\n```json\n{\n    \"sshUser\": \"pi\",\n    \"sshEndpoint\": \"192.168.11.170\"\
    ,\n    \"remoteDirectory\": \"/home/pi/Documents/\"\n}\n```\n\nChange the user\
    \ name, IP address and the directory you want to use to store your programs in.\n\
    \nIf you haven't already done so, you need to install debugpy, which is the latest\
    \ Python debugger for VS Code. On the remote machine, i.e. the Pi, enter:\n\n\
    ```bash\npython3 -m pip install debugpy\n```\n\nIf you don't have a virtual environment\
    \ set up you may need to use:\n\n```bash\npython3 -m pip install debugpy --break-system-packages\n\
    ```\n\nYou have to do this on any machine you want to remote debug on.\n\nTo run\
    \ a program, view the program in the editor and use the menu option Terminal,\
    \ Run Build Task or press Ctrl+Shift+B. You will see the program files being copied\
    \ and then you will see the output of the program in the terminal window. Notice\
    \ that you will not see any graphics and you can't provide input to the program.\
    \ For general-purpose Python programs this would be a problem, but for IoT programs\
    \ it usually isn't. Notice that if you have to provide a password for SSH connections\
    \ you will be asked to supply it. Use the StopRemotePython task to stop all Python\
    \ programs on the remote machine.\n\nTo debug a program, first use the menu option\
    \ Terminal, Run Task and select tunnel. You will see a terminal open and connect\
    \ to the remote computer. You only need to establish a tunnel once and you can\
    \ check if one is already open by the presence of a terminal window labeled Task\
    \ - tunnel. Don't try to open more than one tunnel and note that remote debugging\
    \ won't work unless you have a tunnel to the remote machine open.\n\nYou also\
    \ need to make sure that the workspace folder is present on the remote machine.\
    \ You can use the makeRemoteWorkSpace task to do this.\n\n## The Task Files\n\n\
    Both of the following files are created in the .vscode folder in the top level\
    \ of the folder that you open in VS Code.\n\n**settings.json**\nThis file has\
    \ to be customized to your IP, user name and folder:\n\n```json\n{\n    \"sshUser\"\
    : \"pi\",\n    \"sshEndpoint\": \"192.168.11.151\",\n    \"remoteDirectory\":\
    \ \"/home/pi/Documents/\"\n}\n```\n\n**tasks.json**\n\n```json\n{\n    \"version\"\
    : \"2.0.0\",\n    \"tasks\": [\n        {\n            \"label\": \"copyToRemote\"\
    ,\n            \"type\": \"shell\",\n            \"command\": \"scp -r ${fileDirname}\
    \ ${config:sshUser}@${config:sshEndpoint}:${config:remoteDirectory}/\",\n    \
    \        \"problemMatcher\": [],\n            \"presentation\": {\n          \
    \      \"showReuseMessage\": false,\n                \"clear\": true\n       \
    \     }\n        },\n        {\n            \"label\": \"makeRemoteWorkSpace\"\
    ,\n            \"type\": \"shell\",\n            \"command\": \"ssh ${config:sshUser}@${config:sshEndpoint}\
    \ mkdir ${config:remoteDirectory}\",\n            \"problemMatcher\": [],\n  \
    \          \"presentation\": {\n                \"showReuseMessage\": false\n\
    \            }\n        },\n        {\n            \"label\": \"RunR\",\n    \
    \        \"type\": \"shell\",\n            \"command\": \"ssh ${config:sshUser}@${config:sshEndpoint}\
    \ python3 ${config:remoteDirectory}${relativeFileDirname}/${fileBasename}\",\n\
    \            \"problemMatcher\": [],\n            \"presentation\": {\n      \
    \          \"showReuseMessage\": false\n            }\n        },\n        {\n\
    \            \"label\": \"RunRemote\",\n            \"dependsOrder\": \"sequence\"\
    ,\n            \"dependsOn\": [\n                \"copyToRemote\",\n         \
    \       \"RunR\"\n            ],\n            \"problemMatcher\": [],\n      \
    \      \"group\": {\n                \"kind\": \"build\",\n                \"\
    isDefault\": true\n            }\n        },\n        {\n            \"label\"\
    : \"StopRemotePython\",\n            \"type\": \"shell\",\n            \"command\"\
    : \"ssh ${config:sshUser}@${config:sshEndpoint} 'pkill python3'\",\n         \
    \   \"problemMatcher\": [],\n            \"presentation\": {\n               \
    \ \"showReuseMessage\": true\n            }\n        },\n        {\n         \
    \   \"label\": \"wait\",\n            \"type\": \"shell\",\n            \"command\"\
    : \"timeout 10\"\n        },\n        {\n            \"label\": \"tunnel\",\n\
    \            \"type\": \"shell\",\n            \"command\": \"ssh -2 -L 5678:localhost:5678\
    \ ${config:sshUser}@${config:sshEndpoint}\",\n            \"problemMatcher\":\
    \ [],\n            \"presentation\": {\n                \"showReuseMessage\":\
    \ false\n            }\n        },\n        {\n            \"label\": \"startDebug\"\
    ,\n            \"type\": \"shell\",\n            \"command\": \"ssh -2 ${config:sshUser}@${config:sshEndpoint}\
    \ 'nohup python3 -m debugpy --listen 0.0.0.0:5678 --wait-for-client ${config:remoteDirectory}${relativeFileDirname}/${fileBasename}\
    \ > /dev/null 2>&1 &'\",\n            \"problemMatcher\": [],\n            \"\
    presentation\": {\n                \"showReuseMessage\": false\n            }\n\
    \        },\n        {\n            \"label\": \"copyAndDebug\",\n           \
    \ \"dependsOrder\": \"sequence\",\n            \"dependsOn\": [\n            \
    \    \"copyToRemote\",\n                \"startDebug\",\n                \"wait\"\
    \n            ],\n            \"presentation\": {\n                \"showReuseMessage\"\
    : false\n            }\n        }\n    ]\n}\n```\n\nTo summarize the tasks defined\
    \ in tasks.json:\n\n- **copyToRemote**: Copies the current local directory to\
    \ the remote machine. For example, if you have hello.py open in the editor and\
    \ it is stored in the HelloWorld directory then running this task copies everything\
    \ in HelloWorld on the local machine to the same directory on the remote machine.\n\
    - **makeRemoteWorkSpace**: Creates the top level project directory on the remote\
    \ machine. If the local machine's top level project directory is GPIO then running\
    \ this task creates /home/pi/Documents/GPIO.\n- **RunR**: Runs the current program\
    \ on the remote machine. If the current program in the editor is hello.py then\
    \ running this task runs hello.py on the remote machine. It doesn't copy the files,\
    \ for this use RunRemote.\n- **RunRemote**: Uploads the current directory and\
    \ runs the current Python program. Equivalent to copyToRemote followed by RunR.\n\
    - **StopRemotePython**: Stops all Python programs running on the remote machine.\n\
    - **Wait**: Implements a 10-second wait. Used internally by copyAndDebug to allow\
    \ time for the debugger to start.\n- **startDebug**: Starts the current program\
    \ running on the remote under a debugger. Used internally.\n- **copyAndDebug**:\
    \ Uses copyToRemote to copy the current folder to the remote machine and then\
    \ uses startDebug to debug the program. Used internally.\n\n## Launch and Debug\n\
    \nTo make use of remote debugging you need to install debugpy, which is the latest\
    \ Python debugger for VS Code. On the remote machine, i.e. the Pi, enter:\n\n\
    ```bash\npython3 -m pip install debugpy\n```\n\nIf you don't have a virtual environment\
    \ set up you may need to use:\n\n```bash\npython3 -m pip install debugpy --break-system-packages\n\
    ```\n\nYou also need a launch.json file in .vscode:\n\n```json\n{\n    \"version\"\
    : \"0.2.0\",\n    \"configurations\": [\n        {\n            \"name\": \"Python:\
    \ Remote Attach\",\n            \"type\": \"python\",\n            \"connect\"\
    : {\n                \"host\": \"localhost\",\n                \"port\": 5678\n\
    \            },\n            \"pathMappings\": [\n                {\n        \
    \            \"localRoot\": \"${workspaceFolder}/${relativeFileDirname}/\",\n\
    \                    \"remoteRoot\": \"${config:remoteDirectory}/${relativeFileDirname}\"\
    \n                }\n            ],\n            \"request\": \"attach\",\n  \
    \          \"preLaunchTask\": \"copyAndDebug\",\n            \"postDebugTask\"\
    : \"StopRemotePython\"\n        }\n    ]\n}\n```\n\n## Index\n\n- A to D: 199,\
    \ 207\n- active buzzer: 142\n- active_high: 162\n- aliasing: 104\n- AllOff: 176\n\
    - AllOn: 176\n- Amps: 75\n- AngularServo: 162\n- Arduino: 11\n- armature: 150\n\
    - AttributeError: 60\n- attributes: 42, 176\n- background: 138\n- backing variable:\
    \ 52\n- base: 80\n- base class: 45\n- BCD: 217, 219\n- beta: 80\n- bidirectional:\
    \ 154\n- Binary Coded Decimal: 217\n- Bipolar Junction Transistor, BJT: 80 f.,\
    \ 84, 91, 152\n- Blinky: 31, 37, 56, 58, 65, 138\n- blocking: 57 f.\n- Bookworm:\
    \ 17\n- bounce: 90\n- brushed motor: 150\n- brushes: 150\n- brushless DC motor:\
    \ 163\n- Bullseye: 17\n- Button: 93, 105, 187\n- ButtonBoard: 187\n- Buzzer: 55,\
    \ 59\n- CamJamKitRobot: 191\n- cat: 126\n- CE: 198\n- chip select line: 209\n\
    - class keyword: 42\n- classes: 39\n- collector: 80\n- combining functions: 122\n\
    - common anode: 141\n- common cathode: 141\n- commutator: 150\n- CompositeDevice:\
    \ 142, 175 f., 192\n- CompositeOutputDevice: 178 f.\n- composition: 175"
