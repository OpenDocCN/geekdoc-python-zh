    \ return values outside of this range. As long as the input value range and the\
    \ output value range are similar, you can connect them together. For example,\
    \ the light or the distance sensor described earlier outputs a value in the range\
    \ 0 to 1. There is also a PWMLED, which we will meet in detail in the next chapter,\
    \ which has a value that can be set between 0 and 1 to set its brightness level.\
    \ We can connect any of these together. For example:\n\n```\nfrom gpiozero import\
    \ PWMLED, DistanceSensor\nfrom signal import pause\n\nled=PWMLED(4)\ndist=DistanceSensor(5,6)\n\
    led.source=dist\npause\n```\n\nresults in an LED that gets brighter as something\
    \ moves away from the distance sensor.\nWhat if you wanted the LED to get brighter\
    \ as something approached?"
  - "[PAGE 119]\n\nThe answer is you can put other objects in the chain of values\
    \ that can process the data. GPIO Zero provides some standard value processing\
    \ functions including the following source functions.\n\n+   - **absoluted(values)**\n\
    \  Takes the absolute value of each value.\n- **booleanized(values,min,max,hysteresis=0)**\n\
    \  True for values in the range min to max and False otherwise. The hysteresis\
    \ parameter sets the amount of change that is allowed without changing the state.\
    \ That is, if the value is greater than max then the cutoff is max-hysteresis\
    \ and if it is smaller than max has to increase to max plus hysteresis before\
    \ the state is changed.\n- **clamped(value,output_min=0,output_max=1)**\n  Truncates\
    \ values to be in the range output_min to output_max.\n- **inverted(values,input_min=0,input_max=1)**\n\
    \  Inverts the value using input_max minus value plus input_mi\n- **negated(values)**\n\
    \  Swaps True and False.\n- **post_delayed(values,delay)**\n  Waits for delay\
    \ seconds after returning the value.\n- **pre_delayed(values,delay)**\n  Waits\
    \ for delay seconds before returning value\n- **scaled(values,output_min,output_max,input_min=0,input_max=1)**\n\
    \  Re-scales the values using value*(output_max-output_min) divided by(input_max-input_min)\
    \ plus output_min\n- **post_periodic_filtered(values, repeat_after, block)**\n\
    \  After repeat_after items, blocks the next block items from values. So post_periodic_filtered(values,\
    \ 1,1) discards even items.\n- **pre_periodic_filtered(values, block, repeat_after)**\n\
    \  Blocks the next block of items from values and after repeat_after items repeats\
    \ the block. So pre_periodic_filtered(values, 100,0) discards the first 100 values\
    \ and pre_periodic_filtered(values, 1,1) discards all odd values.\n- **quantized(values,\
    \ steps, input_min=0, input_max=1)**\n  Converts to discrete values between input_min\
    \ and input_max using int(value*steps)/steps*(input_max-input_min)+input_min\n\
    - **queued(values, qsize)**\n  Forms a queue of qsize values and only passes them\
    \ on when the queue is full.\n- **smoothed(values, qsize, function)**\n  Forms\
    \ a queue of qsize value and then applies the function specified by function,\
    \ by default average, to them, so reducing them to a single value."
  - '[PAGE 120]


    To return to the problem of making the LED glow brighter as something moves closer,
    you can see that all we need to do is use the inverted function to turn 0 to 1
    into 1 to 0:


    ```

    from gpiozero import PWMLED, DistanceSensor

    from gpiozero.tools import inverted

    from signal import pause

    led=PWMLED(4)

    dist=DistanceSensor(5,6)

    led.source=inverted(dist)

    pause

    ```


    We don''t need to specify the `input_max` and `input_min` parameters because they
    default to 1 and 0.


    As well as functions which can transform the values there are also functions which
    can combine values from multiple sources. Each of these functions accepts any
    number of parameters:


    +   - `all_values(*values)`: Returns True if all of the values are True.

    - `any_values(*values)`: Returns True if any of the values is True.

    - `averaged(*values)`: Returns the average of all the values.

    - `multiplied(*values)`: Returns the product of all the values.

    - `summed(*values)`: Returns the sum of all the values.

    - `zip_values(*values)`: Returns a tuple of all the values.


    For example, if you have distance sensors on the back and front of a robot you
    can set an LED to the average distance using:


    ```

    from gpiozero import PWMLED, DistanceSensor

    from gpiozero.tools import inverted,averaged

    from signal import pause


    led=PWMLED(4)

    front=DistanceSensor(5,6)

    back=DistanceSensor(7,8)

    led.source=averaged(front,back)

    pause

    ```'
  - "[PAGE 121]\n\n# A Custom Combining Function\n\nEven though there are so many\
    \ combining functions, there is usually a need for something specialized. For\
    \ example, what about a function that returns the minimum value? If you take a\
    \ look at the source code for any of the functions listed above, you should have\
    \ no difficulty in seeing how to create your own. In this case, our custom mined\
    \ function is:\n\n```\nfrom gpiozero.tools import _normalize\ndef mined(*values):\n\
    \    values = [_normalize(v) for v in values]\n    for v in zip(*values):\n  \
    \      yield min(v)\n```\n\nIf you are sure that the values are all in standard\
    \ form, i.e. created by devices or functions in GPIO Zero, you can omit the call\
    \ to _normalize. The core of the function simply uses zip to create a tuple of\
    \ all of the readings and then applies the standard Python min function to each\
    \ tuple, yielding on the result.\n\nYou can replace the min function by max or\
    \ whatever you need to create your own transformation of the data.\n\nOnce you\
    \ have the mined function you can create a program that lights the LED according\
    \ to the closest approach from the back or the front:\n\n```\nfrom gpiozero import\
    \ PWMLED, DistanceSensor\nfrom gpiozero.tools import _normalize\n\ndef mined(*values):\n\
    \    values = [_normalize(v) for v in values]\n    for v in zip(*values):\n  \
    \      yield min(v)\nfrom signal import pause\n\nled=PWMLED(4)\nfront=DistanceSensor(5,6)\n\
    back=DistanceSensor(7,8)\nled.source=mined(front,back)\npause\n```\n\nNow the\
    \ LED is set to the smallest of the readings from the front and back distance\
    \ sensors."
- md: "## Internal Devices\n\nAs well as devices providing streams of data, there\
    \ are also functions which generate values that can be fed to output devices or\
    \ other functions as data sources:\n\n- `alternating_values(initial_value=False)`:\
    \ Alternates between True and False.\n- `cos_values(period=360)` `sin_values(period=360)`:\
    \ A cosine or sine wave which repeats after period values. As the background update\
    \ occurs once every hundredth of a second setting period to 100 gives a 1Hz waveform.\
    \ Notice that the values are between -1 and 1 and if you want a different range\
    \ you need to use scaled.\n- `ramping_values(period=360)`: A triangle wave which\
    \ increases from 0 to 1 and back again every period values.\n- `random_values()`:\
    \ Random values between 0 and 1.\n\nThe simplest example of using these functions\
    \ is to make an LED twinkle:\n\n```python\nfrom gpiozero import PWMLED\nfrom gpiozero.tools\
    \ import random_values\nfrom signal import pause\nled = PWMLED(4)\nled.source\
    \ = random_values()\npause()\n```\n\nIt is relatively easy to create a custom\
    \ value source. For example, to control PWM, Pulse Width Modulation, which is\
    \ explored in the next chapter, you can produce a cycle of values with period*duty\
    \ set to 1 and the remainder set to 0. For example:\n\n`PWM_values(10,0.5)` repeatedly\
    \ produces five values of 1 and five of 0.\nThe function is:\n\n```python\ndef\
    \ PWM_values(period=360,duty=0.5):\n    _ontime=int(period*duty)\n    _offtime=period-_ontime\n\
    \    data=[1]*_ontime+[0]*_offtime\n    while True:\n        for i in range(_ontime):\n\
    \            print(1)\n            yield 1\n        for i in range(_offtime):\n\
    \            print(0)\n            yield 0\n```\n\nIt is very simple, consisting\
    \ of two for loops that produce _ontime ones and _offtime zeros over and over\
    \ again.\n\nYou can use the same technique to develop your own function. Usually\
    \ it is better first to write a function that produces the sequence of values\
    \ that you want and after you have verified that this works convert it into a\
    \ generator by adding yield.\n\nGPIO Zero supports a number of devices that are\
    \ either built into the Pi or derive from information that the Pi can supply.\
    \ These are often useful in source/value chains. The internal device functions\
    \ have changed to support events in GPIO Zero 2. They all work in the same basic\
    \ way in that they return an object that you can use to find the internal device’s\
    \ value, call an event handling routine or use in a source/value chain. There\
    \ is usually a max and min parameter that sets the range that the value property\
    \ will be set to 1. How they work becomes clear when you have seen one of the\
    \ functions in detail:\n\n- `TimeOfDay(start_time, end_time, utc=True, event_delay=5.0,\
    \ pin_factory=None)`: where utc=True uses UTC instead of local time and event_delay\
    \ is the time between updates.\n  Returns a TimeOfDay object with the following\
    \ properties:\n  - `end_time`: same as end_time parameter\n  - `start_time`: same\
    \ as start_time parameter\n  - `utc`: same as utc parameter\n  - `is_active`:\
    \ True if time is between start_time and end_time\n  - `value`: returns 1 when\
    \ time is between start_time and end_time\n  - `when_activated`: function to run\
    \ when status changes to active\n  - `when_deactivated`: function to run when\
    \ status changes to deactivate\n\nYou can use TimeOfDay either by setting functions\
    \ that are called when the start_time or end_time is reached or you can use value\
    \ as a data source. The example in the documentation connects an LED to the value\
    \ so as to switch it on for the time interval. Notice that you don’t need a time\
    \ property to return the current time as this is available from the standard Python\
    \ function time.\n\nOnce you have seen TimeOfDay the other internal functions\
    \ are obvious:\n\n- `PingServer(host, event_delay=10, pin_factory=None)`: Pings\
    \ the URL or IP address of the server and returns a PingServer object. Activation\
    \ is defined by the host responding and value is 1 if it has returned even a single\
    \ ping.\n\n- `CPUTemperature(sensor_file='/sys/class/thermal/thermal_zone0/temp',\
    \ min_temp=0.0, max_temp=100.0, threshold=80.0, event_delay=5, pin_factory=None)`:\
    \ Checks the CPU temperature using the default sensor file. The min_temp and max_temp\
    \ set the temperatures for which a 0 and a 1 are returned by value:\n  `value=(temperature-min_temp)/(max_temp-min_temp)`\n\
    \  and threshold sets the critical temperature above which the device is active.\
    \ You can use the temperature property to read the temperature.\n\n- `LoadAverage(load_average_file='/proc/loadavg',\
    \ min_load_average=0.0, max_load_average=1.0, threshold=0.8, minutes=5, event_delay=5,\
    \ pin_factory=None)`: Gets the average CPU load from the default file. The min_load_average\
    \ and max_load_average set the loads that corresponds to:\n  `value=(load_average-min_load_average)/(max_load_average-min_load_average)`\n\
    \  a value between 0 and 1 when load_average is between max_load_average and min_load_average.\n\
    \  Threshold sets the device to active if the load exceeds the value. The minutes\
    \ parameter gives the time over which the load is averaged. The load_average property\
    \ can be used to find the current value.\n\n- `DiskUsage(filesystem='/', threshold=90.0,\
    \ event_delay=30, pin_factory=None)`: Checks the amount of disk space used by\
    \ the folder specified by filesystem and all its sub-folders. If the amount is\
    \ greater than the threshold percentage the device is set to active. The usage\
    \ property returns the current percentage use and value is usage/100.\n\nFor example,\
    \ to turn an LED on when the temperature is too high:\n\n```python\nfrom gpiozero\
    \ import LED, CPUTemperature\nfrom signal import pause\nfrom gpiozero.tools import\
    \ booleanized\n\ncpu = CPUTemperature(min_temp=58, max_temp=90)\nprint(cpu.temperature)\n\
    led=LED(4)\nled.source = booleanized(cpu,0,1)\npause()\n```\n\nWe need to use\
    \ the booleanized function to convert the decimal value to an on/off or 0 1 value\
    \ that can be used by the LED.\n\n## A Custom Internal Device\n\nIt is easy to\
    \ add a custom internal device. As an example, let's create a new class that returns\
    \ the fraction of free memory. The /proc/meminfo file gives memory use statistics.\
    \ You can open it and read it or just use the cat command:\n\n```\ncat /proc/meminfo\n\
    MemTotal:        949444 kB\nMemFree:         250276 kB\nMemAvailable:    588716\
    \ kB\nBuffers:          94528 kB\nCached:          355420 kB\nSwapCached:    \
    \        0 kB\nActive:          454272 kB\nInactive:        193148 kB\n```\n\n\
    So to get the free memory we have to read the file and extract the value in the\
    \ second line. The new class is:\n\n```python\nimport io\nfrom gpiozero import\
    \ InternalDevice\n\nclass MemoryFree(InternalDevice):\n    def __init__(self,\
    \ threshold=0.9, memfile='/proc/meminfo',\n                 pin_factory=None):\n\
    \        super(MemoryFree, self).__init__(pin_factory=pin_factory)\n        self._fire_events(self.pin_factory.ticks(),\
    \ None)\n        self.memfile = memfile\n        self.threshold = threshold\n\
    \        self._totalmem = 0\n        self._availablemem = 0\n\n    @property\n\
    \    def free_mem(self):\n        with io.open(self.memfile, 'r') as f:\n    \
    \        self._totalmem = int(f.readline().strip().split()[1])\n            freemem\
    \ = int(f.readline().strip().split()[1])\n            self._availablemem = int(f.readline().strip().split()[1])\n\
    \        return freemem\n\n    @property\n    def value(self):\n        return\
    \ self.free_mem/self._availablemem\n\n    @property\n    def is_active(self):\n\
    \        return self.value < 1-self.threshold\n```\n\nThe constructor lets you\
    \ specify a threshold for memory used rather than free so that the device is active\
    \ if used memory goes above the threshold – this can be easily changed. The freemem\
    \ property opens the file, reads the first three lines and extracts the total\
    \ memory, free memory and available memory. The free memory is returned as the\
    \ result. The value property returns a value between 0 and 1 indicating the percentage\
    \ of free memory and the is_active property is True if memory use exceeds the\
    \ threshold. Notice that the call to fire_events is included just in case event\
    \ support is added to the base class.\n\nUsing this new class we can light an\
    \ LED according to how much free memory there is:\n\n```python\nfrom gpiozero\
    \ import PWMLED\nfrom signal import pause\n\nled = PWMLED(4)\n\nmem = MemoryFree(0.1)\n\
    print(mem.value, flush=True)\nprint(mem.is_active, flush=True)\n\nled.source=mem\n\
    pause()\n```\n\nYou can use similar code to add any internal or non-GPIO based\
    \ devices to GPIO Zero."
  mdcn: "## 内部设备\n\n除了提供数据流的设备外，还有一些函数可以生成值，这些值可以作为数据源馈送到输出设备或其他函数：\n\n- `alternating_values(initial_value=False)`：在\
    \ True 和 False 之间交替。\n- `cos_values(period=360)` `sin_values(period=360)`：余弦或正弦波，在\
    \ period 个值后重复。由于背景更新每百分之一秒发生一次，将 period 设置为 100 可得到 1Hz 的波形。请注意，值在 -1 和 1 之间，如果需要不同的范围，需要使用\
    \ scaled。\n- `ramping_values(period=360)`：三角波，每个 period 值从 0 增加到 1 再返回。\n- `random_values()`：0\
    \ 到 1 之间的随机值。\n\n使用这些函数最简单的例子是让 LED 闪烁：\n\n```python\nfrom gpiozero import PWMLED\n\
    from gpiozero.tools import random_values\nfrom signal import pause\nled = PWMLED(4)\n\
    led.source = random_values()\npause()\n```\n\n创建自定义值源相对容易。例如，要控制 PWM（脉冲宽度调制，将在下一章探讨），你可以生成一个周期值，其中\
    \ period*duty 设置为 1，其余设置为 0。例如：\n\n`PWM_values(10,0.5)` 重复产生五个 1 和五个 0。\n函数如下：\n\
    \n```python\ndef PWM_values(period=360,duty=0.5):\n    _ontime=int(period*duty)\n\
    \    _offtime=period-_ontime\n    data=[1]*_ontime+[0]*_offtime\n    while True:\n\
    \        for i in range(_ontime):\n            print(1)\n            yield 1\n\
    \        for i in range(_offtime):\n            print(0)\n            yield 0\n\
    ```\n\n它非常简单，由两个 for 循环组成，反复产生 _ontime 个 1 和 _offtime 个 0。\n\n你可以使用相同的技术来开发自己的函数。通常最好先编写一个函数来生成你想要的值序列，验证其工作正常后，再通过添加\
    \ yield 将其转换为生成器。\n\nGPIO Zero 支持许多内置在树莓派中或从树莓派可提供的信息中派生的设备。这些在源/值链中通常很有用。内部设备函数已更改以支持\
    \ GPIO Zero 2 中的事件。它们都以相同的基本方式工作，即返回一个对象，你可以使用该对象查找内部设备的值、调用事件处理程序或在源/值链中使用。通常有一个\
    \ max 和 min 参数，用于设置 value 属性将被设置为 1 的范围。当你详细查看其中一个函数时，它们的工作原理就变得清晰了：\n\n- `TimeOfDay(start_time,\
    \ end_time, utc=True, event_delay=5.0, pin_factory=None)`：其中 utc=True 使用 UTC 而不是本地时间，event_delay\
    \ 是更新之间的时间。\n  返回一个 TimeOfDay 对象，具有以下属性：\n  - `end_time`：与 end_time 参数相同\n  -\
    \ `start_time`：与 start_time 参数相同\n  - `utc`：与 utc 参数相同\n  - `is_active`：如果时间在\
    \ start_time 和 end_time 之间，则为 True\n  - `value`：当时间在 start_time 和 end_time 之间时返回\
    \ 1\n  - `when_activated`：状态变为活动时运行的函数\n  - `when_deactivated`：状态变为非活动时运行的函数\n\
    \n你可以通过设置在达到 start_time 或 end_time 时调用的函数来使用 TimeOfDay，也可以将 value 用作数据源。文档中的示例将\
    \ LED 连接到 value，以便在时间间隔内将其打开。请注意，你不需要一个 time 属性来返回当前时间，因为这可以从标准 Python 函数 time\
    \ 中获得。\n\n一旦你了解了 TimeOfDay，其他内部函数就显而易见了：\n\n- `PingServer(host, event_delay=10,\
    \ pin_factory=None)`：Ping 服务器的 URL 或 IP 地址，并返回一个 PingServer 对象。激活定义为主机响应，如果它返回了哪怕一个\
    \ ping，则 value 为 1。\n\n- `CPUTemperature(sensor_file='/sys/class/thermal/thermal_zone0/temp',\
    \ min_temp=0.0, max_temp=100.0, threshold=80.0, event_delay=5, pin_factory=None)`：使用默认传感器文件检查\
    \ CPU 温度。min_temp 和 max_temp 设置 value 返回 0 和 1 的温度：\n  `value=(temperature-min_temp)/(max_temp-min_temp)`\n\
    \  threshold 设置设备激活的临界温度。你可以使用 temperature 属性读取温度。\n\n- `LoadAverage(load_average_file='/proc/loadavg',\
    \ min_load_average=0.0, max_load_average=1.0, threshold=0.8, minutes=5, event_delay=5,\
    \ pin_factory=None)`：从默认文件获取平均 CPU 负载。min_load_average 和 max_load_average 设置对应于以下内容的负载：\n\
    \  `value=(load_average-min_load_average)/(max_load_average-min_load_average)`\n\
    \  当 load_average 在 max_load_average 和 min_load_average 之间时，值在 0 和 1 之间。\n  如果负载超过该值，threshold\
    \ 将设备设置为活动状态。minutes 参数给出负载平均计算的时间段。load_average 属性可用于查找当前值。\n\n- `DiskUsage(filesystem='/',\
    \ threshold=90.0, event_delay=30, pin_factory=None)`：检查由 filesystem 指定的文件夹及其所有子文件夹使用的磁盘空间量。如果使用量超过阈值百分比，则设备设置为活动状态。usage\
    \ 属性返回当前使用百分比，value 为 usage/100。\n\n例如，当温度过高时打开 LED：\n\n```python\nfrom gpiozero\
    \ import LED, CPUTemperature\nfrom signal import pause\nfrom gpiozero.tools import\
    \ booleanized\n\ncpu = CPUTemperature(min_temp=58, max_temp=90)\nprint(cpu.temperature)\n\
    led=LED(4)\nled.source = booleanized(cpu,0,1)\npause()\n```\n\n我们需要使用 booleanized\
    \ 函数将十进制值转换为开/关或 0 1 值，以便 LED 可以使用。\n\n## 自定义内部设备\n\n添加自定义内部设备很容易。例如，让我们创建一个返回空闲内存比例的新类。/proc/meminfo\
    \ 文件提供内存使用统计信息。你可以打开并读取它，或者直接使用 cat 命令：\n\n```\ncat /proc/meminfo\nMemTotal: \
    \       949444 kB\nMemFree:         250276 kB\nMemAvailable:    588716 kB\nBuffers:\
    \          94528 kB\nCached:          355420 kB\nSwapCached:            0 kB\n\
    Active:          454272 kB\nInactive:        193148 kB\n```\n\n因此，要获取空闲内存，我们必须读取文件并提取第二行中的值。新类如下：\n\
    \n```python\nimport io\nfrom gpiozero import InternalDevice\n\nclass MemoryFree(InternalDevice):\n\
    \    def __init__(self, threshold=0.9, memfile='/proc/meminfo',\n            \
    \     pin_factory=None):\n        super(MemoryFree, self).__init__(pin_factory=pin_factory)\n\
    \        self._fire_events(self.pin_factory.ticks(), None)\n        self.memfile\
    \ = memfile\n        self.threshold = threshold\n        self._totalmem = 0\n\
    \        self._availablemem = 0\n\n    @property\n    def free_mem(self):\n  \
    \      with io.open(self.memfile, 'r') as f:\n            self._totalmem = int(f.readline().strip().split()[1])\n\
    \            freemem = int(f.readline().strip().split()[1])\n            self._availablemem\
    \ = int(f.readline().strip().split()[1])\n        return freemem\n\n    @property\n\
    \    def value(self):\n        return self.free_mem/self._availablemem\n\n   \
    \ @property\n    def is_active(self):\n        return self.value < 1-self.threshold\n\
    ```\n\n构造函数允许你指定已用内存的阈值而不是空闲内存，这样如果已用内存超过阈值，设备就会激活——这很容易更改。freemem 属性打开文件，读取前三行并提取总内存、空闲内存和可用内存。空闲内存作为结果返回。value\
    \ 属性返回一个介于 0 和 1 之间的值，表示空闲内存的百分比，如果内存使用超过阈值，is_active 属性为 True。请注意，调用 fire_events\
    \ 只是以防万一基类添加了事件支持。\n\n使用这个新类，我们可以根据空闲内存量来点亮 LED：\n\n```python\nfrom gpiozero import\
    \ PWMLED\nfrom signal import pause\n\nled = PWMLED(4)\n\nmem = MemoryFree(0.1)\n\
    print(mem.value, flush=True)\nprint(mem.is_active, flush=True)\n\nled.source=mem\n\
    pause()\n```\n\n你可以使用类似的代码将任何内部或非 GPIO 设备添加到 GPIO Zero。"
