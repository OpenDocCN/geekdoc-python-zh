- img_proc: true
  md: "Now we have the buzzer or speaker connected, the software is relatively easy.\
    \ The TonalBuzzer class plus the Tone class gives you multiple ways to specify\
    \ a note. You can construct a Tone object to specify the frequencies you want\
    \ in a number of ways:\n\n+   - from_frequency(440) or Tone(frequency=440)\n \
    \ Specifies a frequency in Hz\n- from_note('A4') or Tone(note='A4')\n  Specifies\
    \ a musical note giving the note name and octave\n- from_midi(69) or Tone(midi=69)\n\
    \  Produces the specified tone\n\nIf you simply use the constructor without saying\
    \ what the specification method is then it does its best to work it out. So Tone(440)\
    \ gives you a note with its frequency set to 440Hz, as does Tone('A4') and Tone(69).\n\
    \nThere are also some useful methods for working with notes:\n\n+   - down(n=m)\
    \ Lowers note by m semitones\n- up(n=m) Raises note by m semitones\n- frequency()\
    \ Returns current frequency\n- note() Returns the nearest note to the current\
    \ frequency\n- midi() Return nearest midi note to the current frequency\n\nUsing\
    \ them and TonalBuzzer we can easily write a program to produce a concert A, i.e.\
    \ the note used to tune orchestras:\n\n```\nfrom gpiozero import TonalBuzzer\n\
    from signal import pause\ntonal=TonalBuzzer(4)\ntonal.play(\"A4\")\npause()\n\
    ```\n\nIf you try this out you will find that you do indeed get a noise that is\
    \ about 440Hz. How pleasant you find the noise depends on the buzzer or speaker\
    \ you are using and it isn't always the case that better equipment produces better\
    \ sound. If you check on the frequency you will find the usual discrepancy between\
    \ the specified and actual frequency. For example, a Pi Zero using rpigpio produces\
    \ a note of 402Hz for A4 which is off by 38Hz, i.e. an error of just less than\
    \ 9%.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_143_0.png)\n\nA Pi 5 using lgpio\
    \ is much more accurate at about 439.9Hz."
  merge: -1
  pgno: 143
- img_proc: true
  md: "# Uses of PWM – D to A\n\nSo far we have looked at PWM driving devices that\
    \ were happy being switched on and off and hence varying their output. Of course,\
    \ an LED doesn't dim to 50%, it is simply off for half of the time and our eyes\
    \ don't see the flashing as long as it is fast enough. It is possible to arrange\
    \ for a PWM signal to generate a voltage proportional to its duty cycle and remove\
    \ all the switching on and off. If you add a low-pass filter to the output of\
    \ a PWM signal then what you get is the average of the voltage, i.e. a voltage\
    \ that is proportional to the duty cycle.\n\nThis can be looked at in many different\
    \ ways, but again it is the result of the amount of power delivered by a PWM signal.\
    \ You can also think of it as using the filter to remove the high frequency components\
    \ of the signal, leaving only the slower components, due to the modulation of\
    \ the duty cycle.\n\nThe PWM output in this configuration mimics the workings\
    \ of a digital to analog converter. You set the duty cycle d to a value between\
    \ 0 to 1 and you get a voltage output that is 3.3 times dV. The frequency of the\
    \ PWM signal governs how fast you can change the voltage. The usual rule of thumb\
    \ is that you need 10 pulses to occur per conversion, i.e. the maximum frequency\
    \ you can produce is pulse frequency/10. This means that the fastest signal you\
    \ can create using the GPIO pin factory is around 1kHz, which isn't fast enough\
    \ for a great many applications and you can't use it for sound synthesis, in particular.\n\
    \nTo demonstrate the sort of approach that you can take to D to A conversion,\
    \ the following program creates a triangle waveform:\n\n```\nfrom gpiozero import\
    \ PWMOutputDevice\nfrom time import sleep\n\npwm=PWMOutputDevice(4)\npwm.frequency=1000\n\
    steps=8\ndelay=0.001\nwhile True:\n    for d in range(steps):\n        pwm.value=d/steps\n\
    \        sleep(delay)\n\n    for d in range(steps):\n        pwm.value=(steps-d)/steps\n\
    \        sleep(delay)\n```\n\nThis first generates an increasing duty cycle and\
    \ then a decreasing duty cycle with about 8 pulses needed to go from 0 to 1 and\
    \ then back to 1."
  merge: -1
  pgno: 144
- img_proc: true
  md: 'To see the analog waveform, we need to put the digital output into a low-pass
    filter. A simple resistor and capacitor work reasonably well:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_145_0.png)


    The filter''s cutoff is 50Hz and might be a little on the high side for a frequency
    output this low.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_145_1.png)


    You can see that the frequency is around 43Hz and there are still lots of “jaggies”
    which could be further reduced by using a larger capacitor in the filter. There
    is a particularly big step at the start and end of each cycle, due to the jump
    to a duty cycle of 0 and 1. Nothing can be done about this.

    You can create a sine wave, or any other waveform you need, using the same techniques,
    but 200Hz is a practical upper limit on what can be managed.

    If you already know that the PWM outputs are used to create audio on the Pi, you
    might be wondering how this is possible? The answer is that it uses hardware-generated
    PWM and can reach much higher frequencies.'
  merge: -1
  pgno: 145
- img_proc: true
  md: '# What Else Can You Use PWM For?


    PWM lines are incredibly versatile and it is always worth asking the question
    "could I use PWM?" when you are considering almost any problem. The LED example
    shows how you can use PWM as a power controller. You can extend this idea to a
    computer-controlled switch mode power supply. All you need is a capacitor to smooth
    out the voltage and perhaps a transformer to change the voltage.


    You can also use PWM to control the speed of a DC motor, the subject of the next
    chapter, and if you add a simple bridge circuit you can control its direction
    and speed.


    Finally, you can use a PWM signal as a modulated carrier for data communications.
    For example, most infrared controllers make use of a 38kHz carrier, which is roughly
    a 26μs pulse. This is switched on and off for 1ms and this is well within the
    range that the PWM can manage. So all you have to do is replace the red LED in
    the previous circuit with an infrared LED and you have the start of a remote control,
    or data transmission, link.'
  merge: -1
  pgno: 146
- img_proc: true
  md: '# Summary


    +   - PWM, Pulse Width Modulation, has a fixed repetition rate, but a variable
    duty cycle, i.e. the amount of time the signal is high or low changes.

    - PWM can be generated by software simply by changing the state of a GPIO line
    correctly, but it can also be generated in hardware, so relieving the processor
    of some work.

    - As well as being a way of signaling, PWM can also be used to vary the amount
    of power or voltage transferred. The higher the duty cycle, the more power/voltage.

    - The Pi has two hardware PWM lines and these are capable of a range of operational
    modes, but GPIO Zero only supports software-generated PWM at the moment.

    - The fundamental PWM class is PWMOutputDevice and, although it seems not to be
    intended for regular use, it is very easy to use it for raw PWM.

    - By varying the duty cycle, you can dim an LED using PWMOutputDevice but it isn''t
    very accurate on frequency or duty cycle.

    - There is also a PWMLED which can vary the brightness of an LED.

    - The RGBLED class uses three PWMLED to create any color.

    - TonalBuzzer uses PWM to vary the frequency.

    - PWM can be used to implement a D to A converter simply by varying the duty cycle
    and by varying the output of the D to A you can create music.'
  merge: -1
  pgno: 147
- img_proc: true
  md: '# Chapter 11

    Controlling Motors And Servos


    Motors form an important class of output devices and they are fairly easy to use,
    but it is important to understand the different types of motor that you can use.

    The simplest division among types of motor are AC and DC. AC motors are generally
    large and powerful and run from mains voltage. As they are more difficult to work
    with, and they work at mains voltages, these aren''t used much in IoT applications.
    DC motors generally work on lower voltage and are much more suitable for the IoT.
    In this chapter we will only look at DC motors and how they work thanks to pulse
    width modulation.


    # DC Motor


    There are two big classes of DC motors – brushed and brushless. All motors work
    by using a set of fixed magnets, the stator, and a set of rotating magnets, the
    rotor. The important idea is that a motor generates a “push” that rotates the
    shaft by the forces between the magnet that makes up the stator and the magnet
    that makes up the rotor. The stronger these magnets are, the stronger the push
    and the more torque (turning force) the motor can produce. To keep the motor turning,
    one of the two magnetic fields has to change to keep the rotor being attracted
    to a new position.

    DC motors differ in how they create the magnetism in each component, either using
    a permanent magnet or an electromagnet. This means there are four possible arrangements:


    | | 1 | 2 | 3 | 4 |

    |---|---|---|---|---|

    | **Stator** | Permanent | Permanent | Electromagnet | Electromagnet |

    | **Rotor** | Permanent | Electromagnet | Permanent | Electromagnet |

    | **Type** | Can''t work | Brushed DC | Brushless DC | Series or shunt |


    Arrangement 1 can’t produce a motor because there is no easy way of changing the
    magnetic field. Arrangement 4 produces the biggest and most powerful DC motors
    as used in trains, cars and so on. Arrangement 2, Brushed DC, is the most commonly
    encountered form of “small” DC motor. However, arrangement 3, brushless DC, is
    becoming increasingly popular.'
  merge: -1
  pgno: 148
- img_proc: true
  md: 'Different arrangements produce motors which have different torque characteristics
    – i.e. how hard they are to stop at any given speed. Some types of motor are typically
    low torque at any speed, i.e. they spin fast but are easy to stop.


    Low torque motors are often used with gearboxes which reduce the speed and increase
    the torque. The big problem with gearboxes, apart from extra cost, is backlash.
    The gears don''t mesh perfectly and this looseness means that you can turn the
    input shaft and at first the output shaft won''t move. Only when the slack in
    the gears has been taken up will the output shaft move. This makes a geared motor
    less useful for precise positioning, although there are ways to improve on this
    using feedback and clever programming.


    # Brushed Motors


    To energize the electromagnets, a brushed motor supplies current to the armature
    via a split ring or commutator and brushes. As the rotor rotates, the current
    in the coil is reversed and it is always attracted to the other pole of the magnet.


    The only problem with this arrangement is that, as the brushes rub on the slip
    ring as the armature rotates, they wear out and cause sparks and hence RF interference.
    The quality of a brushed motor depends very much on the design of the brushes
    and the commutator.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_149_0.png)


    Very small, cheap, brushed DC motors, of the sort in the picture below, tend to
    not have brushes that can be changed and when they wear out the motor has to be
    replaced. They also tend to have very low torque and high speed. This usually
    means that they have to be used with a gearbox. If you overload a brushed motor
    then the tendency is to demagnetize the stator magnets. The cheapest devices are
    basically toys.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_149_1.png)'
  merge: -1
  pgno: 149
- img_proc: true
  md: 'Higher quality brushed motors are available and they also come in a variety
    of form factors. For example, the 775 motor measures 66.7mm by 42mm overall with
    a 5mm shaft:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_150_0.png)


    Even these motors tend not to have user serviceable brushes, but they generally
    last a long time due to better construction.


    # Unidirectional Brushed Motor


    A brushed motor can be powered by simply connecting it to a DC supply. Reversing
    the DC supply reverses the direction of the motor. The speed is simply proportional
    to the applied voltage. If all you want is a unidirectional control then all you
    need is a PWM driver that can supply the necessary current and voltage.


    A single transistor solution is workable as long as you include a diode to allow
    the energy stored in the windings to discharge when the motor is rotating, but
    not under power:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_150_1.png)'
  merge: -1
  pgno: 150
- img_proc: true
  md: 'This circuit is simple and will work with motor voltages up to 40V and motor
    currents up to 5A continuous, 8A peak. The only small point to note is that the
    TIP120 is a Darlington pair, i.e. it is two transistors in the same case, and
    as such the base voltage drop is twice the usual 0.6V, i.e. 1.2V, and this has
    to be taken into account when calculating the current-limiting resistor.


    It is sometimes said that the TIP120 and similar are inefficient power controllers
    because, comprising two transistors, they have twice the emitter collector voltage
    you would expect, which means they dissipate more power than necessary. If you
    are running a motor from a battery you might want to use a MOSFET, but as described
    earlier 3.3V is low to switch a MOSFET on and off. One solution is to use a BJT
    to increase the voltage applied to the gate:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_151_0.png)


    The BJT connects the gate to 12V. As the IRFZ44NPBF has a threshold voltage between
    2V and 4V devices should work at 5V and sometimes at 3.3V without the help of
    the BJT, but providing 12V ensures that the MOSFET is fully on. One problem with
    the circuit is that the use of the BJT inverts the signal. When the GPIO line
    is high the BJT is on and the MOSFET is off and vice versa. In other words, GPIO
    line high switches the motor off and low switches it on. This MOSFET can work
    with voltages up to 50V and currents of 40A. The 2N2222 can only work at 30V,
    or 40V in the case of the 2N2222A.'
  merge: -1
  pgno: 151
- img_proc: true
  md: "A third approach to controlling a unidirectional motor is to use half an H-bridge.\
    \ Why this is so-called, and why you might want to do it, will become apparent\
    \ in the next section on bidirectional motors. Half an H-bridge makes use of two\
    \ complementary devices, either an NPN and a PNP BJT or an N- and P-type MOSFET.\
    \ For example:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_152_0.png)\n\nIf the\
    \ GPIO line is high then Q1 is on and Q2 off and the motor runs. If the GPIO line\
    \ is low then Q1 is off and Q2 is on and the motor is braked – it has a resistance\
    \ to rotating because of the back EMF generated when the rotor turns. You probably\
    \ need a BJT to feed the MOSFETs as selected.\nThere is no GPIO Zero class to\
    \ control a unidirectional motor, but it is easy to create one from PWMOutputDevice:\n\
    \n```\npython\nclass uniMotor(PWMOutputDevice):\n    def __init__(self, pin=None,\
    \ active_high=True,\n                 initial_value=0,pin_factory=None):\n   \
    \     super(uniMotor, self).__init__(\n            pin, active_high, initial_value,\n\
    \            pin_factory=pin_factory\n        )\n    def speed(self,value):\n\
    \        self._write(value)\n\nmotor=uniMotor(4)\nmotor.speed(0.5)\nsleep(10)\n\
    ```\n\nWe have simply added a speed method. The inherited methods on and off are\
    \ still useful, but it might be better to block access to pulse and blink. Also\
    \ notice that if you are using the transistor/MOSFET driver, then setting active_high=False\
    \ solves the need to provide an inverted pulse."
  merge: -1
  pgno: 152
- img_proc: true
  md: '# Bidirectional Brushed Motor


    If you want bidirectional control then you need to use an H-bridge:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_153_0.png)


    It is easy to see how this works. If Q1 and Q4 are the only MOSFETs on the motor,
    + is connected to 12V and – to ground. The motor runs in the forward direction.
    If Q2 and Q3 are the only MOSFETs on the motor, + is connected to ground and –
    is connected to 12V. The motor runs in the reverse direction. Of course, if none
    or any one is on the motor is off. If Q1 and Q3, or Q2 and Q4, are on then the
    motor is braked as its windings are shorted out and the back EMF acts as a brake.


    You can arrange to drive the four MOSFETs using four GPIO lines - just make sure
    that they switch on and off in the correct order. Alternatively, you can add a
    NOT gate to each pair so that you switch Q1/Q2 and Q3/ Q4 to opposite states.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_153_1.png)'
  merge: -1
  pgno: 153
- img_proc: true
  md: 'An alternative design is to use complementary MOSFETs:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_154_0.png)


    In this configuration, the first GPIO line drives the motor forward and the second
    drives it in reverse. The effect of setting the two lines is:


    | Forward | Reverse | Motor |

    | :--- | :--- | :--- |

    | Low | Low | Off |

    | Low | High | Reverse |

    | High | Low | Forward |

    | High | High | Braked |


    You can also drive the GPIO lines for Forward/Reverse with a PWM signal and control
    the motor''s speed as well as direction. If you use the MOSFETs shown in the diagram
    then you would also need a BJT to increase the drive voltage to each MOSFET, as
    in the unidirectional case. You also need to include diodes to deal with potential
    reverse voltage on each of the MOSFETs. The most important thing about an H-bridge
    is that Q1/Q2 and Q3/Q4 should never be on together – this would short circuit
    the power supply.


    If working with four BJTs or MOSFETs is more than you want to tackle, the good
    news is that there are chips that implement two H-bridges per device. You can
    also buy low-cost, ready-made, modules with one or more H-bridges.'
  merge: -1
  pgno: 154
- img_proc: true
  md: 'One of the most used devices is the L298 Dual H-bridge which works up to 46V
    and total DC current of 4A.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_155_0.png)


    The block diagram of one of the two H-bridges shows exactly how it works.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_155_1.png)


    You can see that the bridge is made up of four BJTs and there are logic gates
    to allow In1 and In2 to select the appropriate pairs of devices. The only extras
    are AND gates and that the EnA line is used to switch all of the transistors off.
    The line shown as Sense A can be used to detect the speed or load of the motor,
    but is rarely used.

    A typical module based on the L298 can be seen below.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_155_2.png)'
  merge: -1
  pgno: 155
- img_proc: true
  md: 'It is easier to describe how to use this sort of module with a single motor.
    The motor is connected to OUT1 and OUT2. Three GPIO lines are connected to ENA,
    IN1 and IN2. ENA is an enable line, which has to be high for the motor to run
    at all. IN1 and IN2 play the role of direction control lines – which one is forward
    and which is reverse depends on which way round you connect the motor. Putting
    a PWM signal on to ENA controls the speed of the motor and this allows IN1 and
    IN2 to be simple digital outputs.


    Notice that the power connector shows 5V and 12V supplies, but most of these modules
    have a voltage regulator which will reduce the 12V to 5V. In this case you don''t
    have to supply a 5V connection. If you want to use more than 12V then the regulator
    has to be disconnected and you need to arrange for a separate 5V supply – check
    with the module''s documentation. Notice that the transistors in the bridge have
    around a 2V drop, so using 12V results in just 10V being applied to the motor.


    Another very popular H-bridge device is the SN754410 driver. This is suitable
    for smaller, lower powered, motors and it has two complete H-bridges. It can supply
    up to 1A per driver and work from 4.5 to 36V. It has the same set of control lines
    as the L298, i.e. each motor has a Forward/Reverse control line and an Enable.
    You don''t have to use the Enable line; it can be connected to +5V to allow PWM
    to be applied on the Forward/Reverse lines.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_156_0.png)


    # Motor Software


    There is a specific GPIO Zero class, Motor, to control a motor using an H-bridge
    module of this sort. It seems to have been written with the idea that an H-bridge
    would only support the Forward and Reverse control lines and not the Enable. The
    basic constructor is:


    ```

    Motor(forward, backward, pwm=True)

    ```


    The GPIO lines Forward and Reverse have to be connected to the IN1/IN2 or IN3/IN4.
    You also need to connect ENA or ENB to +5V to enable the motor. If you use the
    default pwm=True then the GPIO lines supply a PWM signal with a duty cycle set
    by you to control the motor''s speed. If you don''t use'
  merge: -1
  pgno: 156
- img_proc: true
  md: 'PWM then you can simply turn the motor on and off in the direction you want.
    If you want to use the Enable connection then you have to use:

    Motor(forward, backward,enable=pinnum, pwm=True)

    In this case you have to connect the GPIO line specified by enable to the ENA
    or the ENB line. The Motor class doesn''t use the enable line for a PWM signal,
    it simply sets it high or low. The disadvantage of this arrangement is that three
    GPIO lines are used. The advantage is that you don''t have to arrange for the
    ENA and/or ENB lines to be physically set high.


    Once you have a Motor object:

    motor=Motor(4,14)

    which assumes that you are using GPIO4 and GPIO14 for IN1 and IN2 and have connected
    ENA to 5V, you can use:

    motor.backward(duty)

    motor.forward(duty)

    to set the motor moving in the given direction and a speed specified by the duty
    cycle. You can also use:

    motor.reverse()

    to reverse the direction without changing the speed and:

    motor.stop()

    to stop the motor.


    You can also set the motor''s direction and speed using its value property. This
    can be set to a value in the range -1 to 1 for full reverse to full forward. There
    are H-bridges that use two lines to control Phase and Enable. These map to the
    usual Forward, Reverse and Enable as shown below:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_157_0.png)


    The disadvantage of this arrangement is that you cannot set Forward and Reverse
    to one to put the motor into brake mode. If you do have this sort of controller,
    anything based on the MAX14870/2 for example, then you can use the PhaseEnabledMotor
    class:

    PhaseEnableMotor(phase,enable)

    where phase is the GPIO line use to control direction and enable is the GPIO line
    that generates the PWM signal. This has the same methods as the Motor class and
    is used in the same way. By default it uses PWM for the Enable line unless you
    set pwm=False in the constructor.'
  merge: -1
  pgno: 157
- img_proc: true
  md: '# Using Full H-Bridge As Two Half H-Bridges


    It is easy to think of an H-bridge as being only for bidirectional control, but
    each full bridge is composed of two half bridges and this means a typical dual
    full H-bridge can control four unidirectional motors:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_158_0.png)


    In this case Forward is now MotorM1 speed control and Reverse is now MotorM2 speed
    control. Any enable line has to be set high to allow the two motors to be controlled.
    You can make use of this arrangement in software simply by instantiating two uniMotor
    objects – one on the forward line and one on the reverse:


    ```

    motorA=uniMotor(4)

    motorB=uniMotor(14)

    motorA.speed(0.5)

    motorB.speed(0.3)

    sleep(10)

    ```


    Here motorA is connected to GPIO4, which is in turn connected to Forward and motorB
    is connected to GPIO14, which is in turn connected to Reverse.


    # Controlling a Servo


    Hobby servos, of the sort used in radio control models, are very cheap and easy
    to use and they connect via a standard PWM protocol. Servos are not drive motors,
    but positioning motors. That is, they don''t rotate at a set speed, they move
    to a specified angle or position.


    A servo is a motor, usually a brushed DC motor, with a feedback sensor for position,
    usually a simple variable resistor (potentiometer) connected to the shaft. The
    output is usually via a set of gears which reduces the rotation rate and increases
    the torque. The motor turns the gears, and hence the shaft, until the potentiometer
    reaches the desired setting and hence the shaft has the required angle/position.'
  merge: -1
  pgno: 158
- img_proc: true
  md: 'A basic servo has just three connections, ground, a power line and a signal
    line. The colors used vary, but the power line is usually red, ground is usually
    black or brown and the signal line is white, yellow or orange. If a standard J
    connector is fitted then the wire nearest the notch, pin 3, is Signal, that in
    the middle, pin 2, is 5V and outer, pin 1, is Ground.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_159_0.png)


    The power wire has to be connected to a 5V supply capable of providing enough
    current to run the motor - anything up to 500mA or more depending on the servo.
    In general, you cannot power a full-size servo from the Pi''s 5V pin, you need
    a separate power supply. You can power some micro servos directly from the Pi''s
    5V line, but you need to check the specifications. The good news is that the servo''s
    signal line generally needs very little current, although it does need to be switched
    between 0 and 5V using a PWM signal.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_159_1.png)'
  merge: -1
  pgno: 159
- img_proc: true
  md: "We can assume that the signal line needs to be driven as a voltage load and\
    \ so the appropriate way to drive the servo is:\n\n+   - The servo's + line needs\
    \ to be connected to an external 5V power supply, unless it is a micro servo when\
    \ it might be possible to power it from the Pi's 5V line.\n- The 10K resistor\
    \ R1 can be a lot larger for most servos - 47K often works. The 5.6K resistor\
    \ limits the base current to slightly less than 0.5mA.\n\nNotice, however, that\
    \ if you are using a single BJT driver, like the one shown above, the input is\
    \ inverted.\n\nThis is the correct way to drive a servo, but in nearly all cases\
    \ you can drive the servo signal line directly from the 3.3V GPIO line with a\
    \ 1K resistor to limit the current if anything goes wrong with the servo. Some\
    \ servos will even work with their motor connected to 3.3V, but at much reduced\
    \ torque. The Pi cannot supply enough current in this configuration, so use a\
    \ 5V supply for the motor.\n\nNow all we have to do is set the PWM line to produce\
    \ 20ms pulses with pulse widths ranging from 0.5ms to 2.5ms.\n\nThe GPIO Zero\
    \ Servo class makes it easy to work with almost any servo on any GPIO line that\
    \ the pin factory supports:\n\n```\nServo(pin, initial_value=0, min_pulse_width=1/1000,\n\
    \      max_pulse_width=2/1000, frame_width=20/1000)\n```\n\nThe min_pulse_width\
    \ and max_pulse_width can be used to limit the movement of the servo and frame_width\
    \ gives that repeat rate for the signal, which in most cases is 20ms or 50Hz.\n\
    \nThe simplest servo program you can write is something like:\n\n```\nfrom gpiozero\
    \ import Servo\nfrom time import sleep\n\nservo = Servo(4)\n\nwhile True:\n  \
    \  servo.min()\n    sleep(0.5)\n    servo.mid()\n    sleep(0.5)\n    servo.max()\n\
    \    sleep(0.5)\n```\n\nThis moves the servo to three positions, min, mid and\
    \ max, pausing between each. If you want to move the servo to an intermediate\
    \ position, simply set its value property to something in the range -1 to 1 corresponding\
    \ to min to max positions."
