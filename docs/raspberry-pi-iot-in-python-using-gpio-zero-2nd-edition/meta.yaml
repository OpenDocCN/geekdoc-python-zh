  md: "# Chapter 6\nPins And Pin Factories\n\nGPIO Zero is built on top of existing\
    \ software libraries to the Pi’s hardware – to the GPIO lines hence GPIO libraries.\
    \ You can use these libraries directly but they generally work in C and are not\
    \ easy to get to grips with. To make things easier the GPIO libraries are wrapped\
    \ by GPIO Zero Python classes, the pin factories. Their purpose is not only to\
    \ create pin objects with the characteristics you specify, but to also manage\
    \ the use of GPIO lines, ensuring that you cannot use the same GPIO line for two\
    \ different purposes at the same time, and to provide a certain amount of event\
    \ handling. The reason pin factories are needed is that they cover up the differences\
    \ between the different GPIO libraries and present a single uniform Pin object\
    \ no matter which library you chose to use.\nThat is, in GPIO Zero a Pin object\
    \ allows you to work directly with a GPIO line in the same way irrespective of\
    \ the GPIO library in use.\nAs GPIO Zero selects a default pin factory you can\
    \ mostly ignore the whole issue of pin factories and pins until you need to do\
    \ something that goes outside of the box. So first let’s look at how to use a\
    \ Pin object.\n\n# Raw GPIO Pin\n\nIn the Blinky program we used an LED object\
    \ to turn the LED on and off – why not just reference the GPIO line? In other\
    \ words, why hide the fact that we are working with GPIO lines? The answer is\
    \ that it makes it easier to read programs. If you want to work with the raw GPIO\
    \ line you can, but it isn’t as clear what the program means, i.e. what is the\
    \ GPIO line controlling.\nTo use a pin from the pin factory that GPIO Zero has\
    \ set up for you all you have to do is create a pin, set its function as 'input'\
    \ or 'output' and then use it. For example, the pin equivalent of the blinking\
    \ LED program is:\n\n```\nfrom gpiozero import Device\nfrom time import sleep\n\
    Device()\npin=Device.pin_factory.pin(4)\npin.set_function('output')\nwhile True:\n\
    \    pin.state=1\n    sleep(1)\n    pin.state=0\n    sleep(1)\n```"
  merge: -1
  pgno: 64
- img_proc: true
  md: 'Notice that you have to have a call to the Device constructor to initialize
    the pin_factory before you can use it. The pin factory creates a pin object for
    GPIO4 and then we use its methods to control what it does.

    All pin objects have three fundamental methods:

    _get_function

    _set_function

    _get_state

    There is also a set of optional get/set methods which in practice all pin objects
    support. These methods are grouped together to implement properties:


    | Function | Input/Output |

    |---|---|

    | state | 0/1 |

    | pull | Up/down/floating see next chapter |

    | frequency | Frequency of output/none |

    | bounce | Time in seconds/none, see Chapter 7 |

    | edge | Rising/falling/both/none, see Chapter 8 |

    | when_changed | Function called when an edge event occurs |


    There are also three general methods:


    | close | Releases pin and cleans up |

    | output_with_state | Sets pin to output and given state |

    | input_with_pull | Set pin to input with given pull, see Chapter 7 |


    The output_with_state is useful because it sets the initial state of the GPIO
    line, i.e. where things start from. For example:

    pin._set_function(''output'',1)

    sets the pin to output and high.

    You would probably agree that LED.on() is easier to understand than pin._set_state(1),
    but it isn''t a huge difference.

    GPIO Zero uses the Pin class to build easier-to-use classes that implement the
    functionality of real devices like LEDs. Later this idea becomes even more useful
    as the Pin class is used to build more complicated devices that make use of multiple
    GPIO lines.

    You may notice that the pin''s methods start with an underscore which is the usual
    way of indicating that a method is private and should not be used. This is because
    the Pin class is intended to be used as the basis for other classes like LED and
    so on, rather than being used directly. Later we will'
  merge: -1
  pgno: 65
- img_proc: true
  md: 'discover how to use it to create new, higher-level, classes similar to LED.
    That is, if you want to add a new device to GPIO Zero then at first you might
    use the Pin class to get a prototype working, but after this stage you should
    rewrite the code so that the pins are hidden and the object works in more natural
    terms. For example, if you have a new gas sensor you might first use pin objects
    to get it working, but the final Gas object would have methods like get_reading,
    calibrate and so on with no mention of GPIO lines at all.


    # Which Pin Factory?


    If you are happy with the default pin factory there is no need to get deeply involved
    in selecting a pin factory and you can skip this section and return to it if you
    ever need to find out more.


    The lower-level GPIO libraries interact directly with the hardware and as such
    they have to be written to work with specific versions of the Pi. Until the Pi
    5 this wasn''t difficult as the GPIO implementation was fairly standard. The Pi
    5 implements GPIO and other I/O in a new way and this means that the existing
    GPIO libraries don''t work with it. At the time of writing the only way of using
    the GPIO and other I/O in the same way across all version of the Pi is to use
    Linux drivers. The Linux drivers are uniform across all versions of the Pi and
    this is why they make a good foundation for the default LGPIOFactory. The problem
    is that Linux drivers tend to be slow and there are faster pin libraries. Indeed,
    speed is about the only good reason for using something other than the default.


    If GPIO Zero is let down by anything, it is the lack of a really high quality
    high speed GPIO library that works across all versions of the Pi to base a pin
    factory on. As a result each of the alternative pin factories have advantages
    and disadvantages.


    For GPIO Zero 2 the default pin factory was changed to be LGPIOFactory, which
    is currently the only factory that works on all versions of the Pi, including
    the Pi 5. In principle, it should work on any Linux-based system as it uses the
    standard gpiochip devices. For this reason it is advised that you use the default
    pin factory unless you have a good reason not to.


    Before GPIO Zero 2 the default pin factory, and hence the most commonly used,
    was RPiGPIOFactory. However, it doesn''t work on the Pi 5 nor does it support
    the SPI bus, I2C, hardware pulse width modulation (PWM) or the 1-wire bus. It
    also isn''t undergoing much development and so these features are unlikely to
    be added in the future. It is faster than the new default pin factory and as such
    is sometimes worth using in its place if you are sure that you don''t need your
    program to work on a Pi 5.


    The other alternative pin factories are mostly only of historical interest and
    are included here in case you have to deal with some old software that makes use
    of them.'
