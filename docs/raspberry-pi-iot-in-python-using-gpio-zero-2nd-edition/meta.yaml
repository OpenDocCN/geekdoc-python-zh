  md: '![](img/39c0a42d027b4a8b43b07050c297f3ff_58_0.png)


    The Buzzer object has all of the properties and methods of the LED object. The
    on and off methods now make the buzzer sound but work in exactly the same way.
    The one small change is that blink is now renamed beep. It works in exactly the
    same way but now the buzzer is switched on and off.


    ```

    from gpiozero import Buzzer

    from signal import pause


    buzz = Buzzer(4)

    buzz.beep(on_time=1,off_time=1,n=100)

    print("Program Complete")

    pause()

    ```


    You can see quite clearly that creating a Buzzer class is more about renaming
    things, so that your program can be more understandable, than introducing anything
    new.


    # A Custom On/Off Device


    There are lots of on/off devices other than LED and Buzzer, so how do you arrange
    to work with them?


    One solution is to treat everything as if it was an LED. For example, if you have
    an electric door lock you could write:


    ```

    lock=LED(4)

    lock.on()

    ...

    lock.off()

    ```


    It would work, but it might be confusing in the future when you have forgotten
    the program and are forced to wonder what an LED is doing with a lock and what
    lock.on() means.'
