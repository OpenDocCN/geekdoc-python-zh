  md: "```\n@property\ndef free_mem(self):\n    with io.open(self.memfile, 'r') as\
    \ f:\n        self._totalmem = int(f.readline().strip().split()[1])\n        freemem\
    \ = int(f.readline().strip().split()[1])\n        self._availablemem = \\n   \
    \         int(f.readline().strip().split()[1])\n    return freemem\n\n@property\n\
    def value(self):\n    return self.free_mem/self._availablemem\n\n@property\ndef\
    \ is_active(self):\n    return self.value < 1-self.threshold\n```\n\nThe constructor\
    \ lets you specify a threshold for memory used rather than free so that the device\
    \ is active if used memory goes above the threshold – this can be easily changed.\
    \ The freemem property opens the file, reads the first three lines and extracts\
    \ the total memory, free memory and available memory. The free memory is returned\
    \ as the result. The value property returns a value between 0 and 1 indicating\
    \ the percentage of free memory and the is_active property is True if memory use\
    \ exceeds the threshold. Notice that the call to fire_events is included just\
    \ in case event support is added to the base class.\n\nUsing this new class we\
    \ can light an LED according to how much free memory there is:\n\n```\nfrom gpiozero\
    \ import PWMLED\nfrom signal import pause\n\nled = PWMLED(4)\n\nmem = MemoryFree(0.1)\n\
    print(mem.value, flush=True)\nprint(mem.is_active, flush=True)\n\nled.source=mem\n\
    pause()\n```\n\nYou can use similar code to add any internal or non-GPIO based\
    \ devices to GPIO Zero."
