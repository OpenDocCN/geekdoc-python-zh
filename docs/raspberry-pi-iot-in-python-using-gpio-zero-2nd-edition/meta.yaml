  md: "+   - **Pibrella**\n\n```\nPiBrella(pwm=False, pin_factory=None)\n```\n\nNo\
    \ longer available.\n\n+   - **StatusZero**\n\n```\nStatusZero(*labels, pwm=False,\
    \ active_high=True,\n          initial_value=False, pin_factory=None)\n```\n\n\
    This is a traffic light-like device but with three sets of red/green LEDs that\
    \ can be used to display more general status information beyond stop and start.\
    \ You can specify labels in the constructor for each of the three indicators,\
    \ for example:\n\n```\nstatus=StatusZero(\"Temperature\", \"Humidity\")\nstatus.Temperature.green.on()\n\
    status.Humidity.red.on()\n```\n\nIf you don't specify a label then \"One\", \"\
    Two\" and \"Three\" are used. There are three strips next to the LEDs that allow\
    \ labels to be written using marker pen.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_185_0.png)\n\
    \n+   - **PumpkinPi**\n\n```\nPumpkinPi(*, pwm=False, initial_value=False, pin_factory=None)\n\
    ```\n\nThis Halloween-specific device has a very specific arrangement of LEDs\
    \ with methods to control two natural groups, its periphery (sides) and its eyes.\
    \ The LEDs around the edge of the pumpkin are controlled by sides an LEDBoard\
    \ instance. It has attributes left and right which are also LEDBoards for the\
    \ LEDs on the left and right each of which contains four attributes:\n\ntop, midtop,\
    \ middle, midbottom, bottom\n\nThe two LEDS representing the Pumpkin's eyes are\
    \ controlled by eyes, an LEDBoard that contains:\n\nleft, right"
  merge: -1
  pgno: 185
- img_proc: true
  md: "For example:\npPi=PumpkinPi()\npPi.sides.on()\npPi.eyes.left.on()\nturns on\
    \ all the LEDs around the Pumpkin's edge and its left eye.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_186_0.png)\n\
    \n# General I/O Composite Classes\n\nThere are some general input/output composite\
    \ devices.\n\n+   - **ButtonBoard**\n  ButtonBoard(*pins, pull_up=True, active_state=None,\n\
    \  bounce_time=None, hold_time=1, hold_repeat=False,\n  pin_factory=None, **named_pins)\n\
    \nThis is the input equivalent of the LEDBoard. A set of buttons, each wired to\
    \ a different specified pin, can be used as a group. You can read all of the buttons\
    \ via value, which returns a named tuple of the button states. You can also use\
    \ values to set a source on an output device:\n`leds.source = btns.values`\nNow\
    \ any button pressed lights the corresponding LED in the LEDBoard.\nYou can also\
    \ use other Button methods - wait_for_press, wait_for_release, is_pressed, pressed_time,\
    \ when_pressed and when_released, but these work if any button in the group is\
    \ pressed or released and this is generally not what you want to do. However,\
    \ you can customize actions depending on which button is pressed by testing within\
    \ the event handlers. For example:\n`btns.wait_for_press()`\n`state=btns.values`\n\
    lets you test state to see which button is pressed."
