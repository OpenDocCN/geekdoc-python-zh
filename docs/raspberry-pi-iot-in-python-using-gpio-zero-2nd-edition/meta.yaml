- md: 'Roughly speaking, GPIO Zero running on a Pi Zero with rpigpio is of the order
    of 100μs to 20μs and on a Pi 4 10μs to 3μs is its characteristic time. On a Pi
    5 with LGPIOFactory the characteristic time is 40μs to 20μs. On the same machine
    rpigpio is about ten times faster than LGPIOFactory.


    Compare this to the same task programmed directly in C, which has a characteristic
    time of around 0.01μs, i.e. 10ns, i.e. at least 100 times faster than the fastest
    pin factory on a Pi 4 and 1000 times faster than lgpio on a Pi 5.


    There is no doubt if you need speed for this sort of task then Python is not the
    language to use. C is a much better choice as outlined in *Raspberry Pi IoT in
    C, Second Edition*, ISBN:9781871962635. This said, there are many applications
    that operate at almost human timescales and for this Python is very adequate and
    much simpler. If you can, use Python and unless speed is an issue use the default
    pin factory.


    ## The Problem of Clocks


    Until relatively recently processors, and computer systems in general, used a
    very simple approach to clock frequencies. Each time a clock pulse occurs something
    happens in the system and, for simplicity, clocks were set to run at a fixed maximum
    rate that allowed the system to remain cool. Today''s systems, however, make use
    of multiple clocks which run at variable rates. This allows a system to "sprint",
    i.e. use a higher clock rate for a short time, to keep the temperature increase
    below a set level. If the temperature increases too much then the clock can be
    throttled, i.e. slowed down, until the system is once again within a safe zone.
    Slowing the clock can also be used to reduce power consumption.


    A variable clock rate is good from the point of view of completing tasks, and
    perhaps reducing power consumption, but if you are trying to write programs where
    timing is critical it can be a problem. If you synchronize your program using
    a known change in a timer, which always ticks at the same rate irrespective of
    the system clock, then your program will work in the same way irrespective of
    the speed of the system clock. However, this is not true if the system clock runs
    so slow that the program cannot complete the task in the allotted time.


    The latest version of Pi OS implements the Linux cpufreq kernel driver, but things
    are more complicated with the Pi because it is the GPU that controls things, not
    the CPU. You can find out what the GPU is doing using the vcgencmd command, which
    talks directly to the GPU, whereas the standard Linux commands work with the CPU
    and sometimes give the wrong answer.


    The vcgencmd is fully documented at the official site, but the important command
    for clock speed is:

    `vcgencmd measure_clock arm`

    You can substitute other clock names for arm, but this gives you the frequency
    that all of the cores are running at.

    The Linux cpufreq commands are standard, but in some situations the GPU may change
    the clock frequency without Linux being aware of it. The idea is that there are
    a set of "governors" that control how the frequency is varied. For the current
    generation of Pis the default is ondemand, but you can find which the current
    active governor is using:

    `sudo cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor`

    and you can find out the available governors using:

    `sudo cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_available_governors`

    The action of the ondemand governor according to the Linux manual is:


    > The cpufreq governor "ondemand" sets the CPU frequency depending on the current
    system load. Load estimation is triggered by the scheduler through the update_util_data->func
    hook; when triggered, cpufreq checks the CPU-usage statistics over the last period
    and the governor sets the CPU accordingly.


    Setting the frequency on the basis of load makes sense for many applications,
    but for an IoT app that needs high speed, even though it doesn''t load the CPU,
    it isn''t ideal.

    Empirically, the Pi Zero seems to regard its single core as being heavily loaded
    all of the time as it always reports 1GHz as its clock rate, but the Pi 4 reports
    it as low as 600MHz given a low load. You can discover the current clock rate
    according to Linux and the max and min frequencies used using:

    `cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq`

    `cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_min_freq`

    `cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_max_freq`

    For the Pi Zero the maximum frequency is 1GHz, for the Pi 4 it is 1.5GHz and for
    the Pi 5 it is 2.4GHz.


    If you need a fixed clock frequency you have to set the governor to a performance
    which sets the clock to the highest possible frequency, usually scaling_max_freq:


    ```

    sudo sh -c "echo performance > /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor"

    ```


    This will run the clock at the highest frequency, but if the CPU temperature goes
    over the maximum the frequency will still be reduced.

    In most cases, you can ignore clock speed variation with load, but you do need
    to keep the effect in mind when searching for explanations of why things aren''t
    happening as fast as you might expect.


    ## Summary


    - GPIO Zero uses the idea of a pin factory to allow a variety of direct interfaces
    with the GPIO lines to be used.

    - You should select a single pin factory to be used at the start of your program
    and not change it.

    - The default pin factory, lgpio, is installed by default and is currently the
    best choice.

    - The previous default pin factory rpigpio is about ten times faster than lgpio
    but it doesn''t work on the Pi 5.

    - In most cases, pin objects are constructed by the devices you use such as LEDs
    and you don''t have to interact with the pin factory at all.

    - You can use the pin factory directly to obtain a pin object and work with this
    directly.

    - Working directly with a pin object is approximately ten times faster than working
    with it via a device-derived class.

    - Modern Pis have a variable rate clock, which can be a problem when you are trying
    to run IoT programs at the fastest speed irrespective of what the CPU load is.

    - You can use operating system commands to set the speed governor to a fixed speed,
    usually the maximum possible. However, CPU over-temperature events will still
    reduce the clock speed as a safety precaution.


    ## Chapter 7

    ### Some Electronics


    Now that we have looked at some simple I/O, it is worth spending a little time
    on the electronics of output and input.

    First some basic electronics – how transistors can be used as switches. The approach
    is very simple, but it is enough for the simple circuits that digital electronics
    makes use of. It isn''t enough to design a high quality audio amplifier or similar
    analog device, but it might be all you need.

    The basis of all electronics is Ohm''s law, V = IR, and this prerequisite implies
    an understanding of voltage, current and resistance.


    ## How to Think About Circuits


    For a beginner electronics can seem very abstract, but that''s not how old hands
    think about it. Most understand what is going on in terms of a hydraulic model,
    even if they don''t admit it. The basic idea is that an electric current running
    in a wire is very much like a flow of water in a pipe. The source of the electricity
    plays the role of a pump and the wires, the pipe. The flow of electricity is measured
    in Amps and this is just the amount of electricity that flows per second. The
    flow is governed by how hard the pump is pumping, which is measured by voltage
    and how restrictive the pipe is, the resistance which is measured in Ohms.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_74_0.png)


    It is true that when you are doing electronics you are basically doing plumbing
    with a fluid that you generally can''t see that flows in pipes called wires.


    The only difficult one of these three ideas is the idea of pumping force. We tend
    to think of a pump providing a flow at the location of the pump but there is something,
    “a pumping force” that keeps the water flowing around every part of the circuit.
    In your imagination you have to think of the water being forced ever onward at
    every point in the pipe. In particular when there is constriction in the pipe
    then you might need more pumping force to get the water through. In a sense the
    pump provides the total pressure available and this distributes itself around
    the circuit as needed to push the flow through each restriction.


    In electric circuits the pumping force is called EMF or Electro Motive Force or
    just voltage. We also assume that the force needed to push electricity through
    wires is negligible and resistors are the only place that a voltage is needed
    to make the current flow.


    The relationship between these quantities is characterized by Ohm’s law:

    V=IR or I=V/R or R=V/I

    where V is the voltage in Volts, I is the current in Amps and R is the resistance
    in Ohms.


    It is worth pointing out that we generally work in Volts (V) and milliamps (mA),
    one thousandth of an amp, in Ohm’s law and this automatically gives resistance
    in kilo-ohms (kΩ).


    You can see that if you increase the voltage, the flow, then the current increases.
    If you increase the resistance then the current decreases. Slightly more difficult
    is the idea that for a given resistance you need particular pumping force to achieve
    a given flow. If you know the actual flow and the resistance then you can work
    out the pumping force needed to get that flow.


    The following points should be obvious. The flow through a pipe has to be the
    same at each point in the pipe – otherwise water would backup or need to be introduced.
    The total pressure that the pump provides has to be distributed across each of
    the resistances in the pipe to ensure the same flow. These pressures have to add
    up to the total pressure that the pump provides.


    Slightly less obvious, but you can still understand them in terms of water flow,
    pressures add, currents add and resistances to flow in the same pipe add.'
