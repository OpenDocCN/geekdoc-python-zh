- img_proc: true
  md: "A better and simpler solution is to derive a custom on/off device. You can\
    \ do this using inheritance from DigitalOutputDevice which provides nearly all\
    \ of the methods that LED has – in particular it has on and off methods. In this\
    \ case we can simply pass the constructor parameters to the constructor of DigitalOutputDevice:\n\
    \n```\nclass Lock(DigitalOutputDevice):\n    def __init__(self, *args, **kwargs):\n\
    \        super().__init__(*args, **kwargs)\n```\n\nAt this point Lock is really\
    \ just a copy of DigitalOutputDevice and to customize it to be a Lock class we\
    \ need to add appropriate methods. What we really need are two new methods, lock\
    \ and unlock, and these can be implemented by calling the on and off methods of\
    \ the super class:\n\n```\ndef lock(self):\n    super().on()\ndef unlock(self):\n\
    \    super().off()\n```\n\nNow we have a Lock object that has lock and unlock\
    \ methods that make sense for the device. However, we also still have on, off\
    \ and blink which don't make any sense.\nThe simplest solution is to override\
    \ them with methods that raise an appropriate exception:\n\n```\ndef on(self):\n\
    \    raise AttributeError(\"'Lock' object has no attribute 'on'\")\ndef off(self):\n\
    \    raise AttributeError(\"'Lock' object has no attribute 'off'\")\ndef blink(self):\n\
    \    raise AttributeError(\"'Lock' object has no attribute 'blink'\")\n```\n\n\
    This stops the use of the method calls, but the inappropriate attributes are still\
    \ accessible. That is:\n\n```\nlock.on()\nresults in an exception, but:\nmy0n=lock.on\n\
    works, even if you can't actually call the method.\n```\n\nThis is probably good\
    \ enough for most use cases, but you could take it one step further by customizing\
    \ the constructor. After all, you don't want to allow active_high to be set to\
    \ False and have lock mean unlock and vice versa."
  merge: -1
  pgno: 59
- img_proc: true
  md: "You can check for any keyword parameter using something like:\n\n```\ndef __init__(self,*args,**kwargs):\n\
    \    if 'active_high' in kwargs:\n        raise TypeError(\"active_high not supported\"\
    )\n    super().__init__(*args,**kwargs)\n```\n\nIf you would like a more specific\
    \ error, you could define your own exception class.\nYou can carry on tailoring\
    \ the behavior of Lock to be more lock-like until you have the perfect class.\
    \ It is also a good idea to put your code into a module so that you can import\
    \ Lock.\nThe complete program is:\n\n```\nfrom gpiozero import DigitalOutputDevice\n\
    class Lock(DigitalOutputDevice):\n    def __init__(self,*args,**kwargs):\n   \
    \     if 'active_high' in kwargs:\n            raise TypeError(\"active_high not\
    \ supported\")\n        super().__init__(*args,**kwargs)\n    def lock(self):\n\
    \        super().on()\n    def unlock(self):\n        super().off()\n    def on(self):\n\
    \        raise AttributeError(\"'Lock' object has no attribute 'on'\")\n    def\
    \ off(self):\n        raise AttributeError(\"'Lock' object has no attribute 'off'\"\
    )\n    def blink(self):\n        raise AttributeError(\"'Lock' object has no attribute\
    \ 'blink'\")\n```\n\nUsing Lock is trivial:\n\n```\noffice_door=Lock(4)\n\noffice_door.lock()\n\
    ...\noffice_door.unlock()\n```\n\nYou can use the same ideas to implement a custom\
    \ class for any on/off device you care to use. What is interesting is that in\
    \ practice customizing an existing class using inheritance is often as much about\
    \ changing and restricting what the class can do as it is about extending it,\
    \ which is not what textbooks emphasize most strongly.\nThis completes the software\
    \ and it is worth remarking that simple locks of this sort are the same hardware\
    \ problem as driving a solenoid. As these mostly work with 6 or 12 volts, you\
    \ will need to use a transistor driver and you will need to take account of the\
    \ voltage and the current involved, see the next chapter for more details."
