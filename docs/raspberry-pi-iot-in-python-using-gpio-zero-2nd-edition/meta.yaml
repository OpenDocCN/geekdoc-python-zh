- md: 'This works in the same way as the Servo class, but you can calibrate the servo
    to work in terms of angles. Simply measure the angle from the mid position that
    you get for the max and min servo positions and specify them in min_angle and
    max_angle. For example, if you measure the max position as being 60 degrees from
    the mid position and the min position to be 75 degrees, you could create a calibrated
    AngularServo using:

    servo = AngularServo(4, min_angle=-75, max_angle=60)

    and after this you can use the angle method to move to a specified angle:

    servo.angle(25)

    which moves the servo 25 degrees towards the maximum position.

    The task of calibrating a servo, determining what duty cycle is needed to make
    it move to each of its extreme positions, is something that you should always
    do.


    It is worth mentioning that servos make good low-cost DC motors complete with
    gearboxes. All you have to do is open the servo, unsolder the motor from the control
    circuits and solder two wires to the motor. If you want to use the forward/reverse
    electronics you can remove the end stops on the gearbox, usually on the large
    gearwheel and replace the potentiometer with a pair of equal value resistors –
    2.2kΩ, say.


    ## Brushless DC Motors


    Brushless DC motors are more expensive than brushed DC motors, but they are superior
    in many ways. They don''t fail because of commutator or brush wear and need no
    maintenance. They provide maximum rotational torque at all points of the rotation
    and generally provide more power for the same size and weight. They can also be
    controlled more precisely. The only negative points are higher cost and slightly
    more complex operation. In practice, it is usually better to use a brushed DC
    motor unless you really need something extra.


    A brushless DC motor is basically a brushed motor turned inside out – the stator
    is a set of electromagnets and the rotor is a set of permanent magnets. In some
    designs the permanent magnets are inside the stator in the manner of a brushed
    motor – an inrunner – and sometimes the magnets are outside of the stator – an
    outrunner.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_162_0.png)


    An inrunner – the permanent magnets form the rotor and the coils are switched
    to attract.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_163_0.png)


    An outrunner – the permanent magnets are on the outside of the stator and the
    whole cover rotates.


    A brushless motor works in exactly the same way as a brushed motor. As the coils
    are stationary there is no need for a mechanical commutator, but there is still
    need for commutation – the coils have to be switched on in sequence to create
    a rotating magnetic field which pulls the rotor around with it. This means that
    you have to implement an electronic commutator, which is another name for brushless
    DC motors.


    An electronic commutator has to sense the position of the rotor and change the
    magnetic field generated by the stator to keep the rotor moving. Brushless motors
    differ in the number of magnets they have – the number of poles and the number
    of electromagnets – and the number of phases. The most common is a three-phase
    motor as these are used in radio control modeling. Essentially you need at least
    a driver for each of the phases and a GPIO line to generate the signal. In practice,
    you need two drivers for each phase and they have to be driven from a dual supply
    so that the magnetic field can be positive, zero or negative.


    This would be possible to do with software, but it isn’t easy and with the given
    that GPIO Zero is currently limited to software-generated PWM, this would be too
    slow and unreliable. A more reasonable alternative is to buy a ready-built controller.
    There are two types of brushless motor – with Hall sensors and without. The ones
    with sensors are more expensive, but easier to control because the electronics
    always knows where the rotor is and can apply the correct drive. The ones without
    sensors are controlled by measuring the back EMF from the motor and this is much
    harder. Most of the lower cost speed controllers need motors with Hall sensors.


    The radio control community has taken to using three-phase brushless motors and
    this has resulted in a range of motors and controllers at reasonable prices. The
    problem is that they are intended as high-power, high-speed, unidirectional motors
    for use in quadcopters and model planes.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_164_0.png)


    If you can live with their limitations they provide a good way to couple a Pi
    to a brushless motor. In this case all you need is a three-phase brushless motor
    of the sort used in RC modeling and an ESC (Electronic Speed Controller) of the
    sort shown below:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_164_1.png)


    The three leads on the left go to the three phases of the motor and the red and
    black leads on the right go to a power supply – often a LiPo battery. The small
    three-wire connector in the middle is a standard servo connector and you can use
    it exactly as if the brushless motor was a servo, with a few exceptions. The first
    is that the middle pin 2 supplies 5V rather than accepts it. Don''t connect this
    to anything unless you want a 5V supply. The second problem is that ESCs are intelligent.
    When you first apply power they beep and can be programmed into different modes
    by changing the PWM signal from max to min. Also, to use an ESC you have to arm
    it. This is to avoid radio control modelers from being injured by motors that
    start unexpectedly when the power is applied. The most common arming sequence
    is for the ESC to beep when power is applied. You then have to set the PWM to
    min, when the ESC will beep again. After a few moments you will have control of
    the motor.


    The need for an arming procedure should alert you to the fact that these model
    motors are very powerful. Don''t try working with one loose on the bench as it
    will move fast if switched on and at the very least make a twisted mess of your
    wires. Most importantly of all, don''t run a motor with anything attached until
    you have everything under control.


    ## Stepper Motors


    There is one sort of brushless motor that is easy to use and low cost – the stepper
    motor. This differs from a standard brushless motor in that it isn’t designed
    for continuous high-speed rotation. A stepper motor has an arrangement of magnets
    and coils such that powering some of the coils holds the rotor in a particular
    position. Changing which coils are activated makes the rotor turn until it is
    aligned with the coils and stops moving. Thus the stepper motor moves the rotor
    in discrete steps. This makes driving it much simpler.


    Stepper motors have no brushes and so don''t wear out as fast as brushed motors.
    They also have roughly the same torque at any speed and can be used at low speeds
    without a gearbox. They can remain in a fixed position for a long time without
    burning out, as DC motors would. Unlike a servo, however, if a stepper motor is
    mechanically forced to a new position, it will not return to its original position
    when released. The only disadvantage of a stepper motor is that the continuous
    rotation produced by repeated stepping can make the motor vibrate.


    Stepper motors vary in the size of a step they use – typically 1.8 degrees giving
    200 steps per rotation, although gearing can be used to reduce the step size.
    Another big difference is what the rotor is made up of – permanent magnets or
    soft iron. The first type is called a PM stepper and the second, or VR stepper,
    standing for Variable Reluctance, and they differ in how you drive them. PM steppers
    are easier to understand. There are also hybrid steppers which share the good
    characteristics of both PM and VR stepper motors. These are more expensive and
    generally only used where accuracy of positioning is important.


    They also differ in the number of phases i.e. independent banks of coils they
    have. The diagram below shows a two-phase PM stepper motor with Phase 1 activated:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_165_0.png)'
  mdcn: '其工作原理与Servo类相同，但你可以将舵机校准为以角度为单位工作。只需测量从中间位置到最大和最小舵机位置的角度，并在`min_angle`和`max_angle`中指定它们。例如，如果你测量到最大位置距离中间位置60度，最小位置距离中间位置75度，你可以使用以下方式创建一个校准过的AngularServo：

    servo = AngularServo(4, min_angle=-75, max_angle=60)

    之后，你可以使用`angle`方法移动到指定角度：

    servo.angle(25)

    这将使舵机向最大位置移动25度。

    校准舵机的任务，即确定使其移动到每个极限位置所需的占空比，是你应该始终做的事情。


    值得一提的是，舵机是带有齿轮箱的优质低成本直流电机。你所要做的就是打开舵机，将电机从控制电路上焊下来，然后将两根导线焊接到电机上。如果你想使用正/反转电子设备，你可以移除齿轮箱上的端点挡块（通常在大齿轮上），并用一对等值电阻（例如2.2kΩ）替换电位器。


    ## 无刷直流电机


    无刷直流电机比有刷直流电机更昂贵，但在许多方面更优越。它们不会因为换向器或电刷磨损而失效，且无需维护。它们在旋转的所有点上都提供最大旋转扭矩，并且通常在相同尺寸和重量下提供更大的功率。它们也可以更精确地控制。唯一的缺点是成本更高和操作稍复杂。实际上，除非你确实需要额外的功能，否则通常最好使用有刷直流电机。


    无刷直流电机基本上是一个内外翻转的有刷电机——定子是一组电磁铁，转子是一组永磁体。在某些设计中，永磁体位于定子内部，类似于有刷电机——内转子型；有时磁体位于定子外部——外转子型。


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_162_0.png)


    内转子型——永磁体构成转子，线圈通电以产生吸引力。


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_163_0.png)


    外转子型——永磁体位于定子外部，整个外壳旋转。


    无刷电机的工作原理与有刷电机完全相同。由于线圈是静止的，因此不需要机械换向器，但仍然需要换向——线圈必须按顺序通电以产生旋转磁场，从而带动转子旋转。这意味着你必须实现一个电子换向器，这也是无刷直流电机的另一个名称。


    电子换向器必须感知转子的位置，并改变定子产生的磁场以保持转子运动。无刷电机在磁体数量（极数）和电磁铁数量以及相数上有所不同。最常见的是三相电机，因为它们用于无线电遥控建模。本质上，你需要至少一个每相的驱动器和一个GPIO线来生成信号。实际上，你需要每相两个驱动器，并且它们必须由双电源驱动，以便磁场可以为正、零或负。


    这可以通过软件实现，但并不容易，而且鉴于GPIO Zero目前仅限于软件生成的PWM，这将太慢且不可靠。一个更合理的替代方案是购买现成的控制器。无刷电机有两种类型——带霍尔传感器和不带霍尔传感器的。带传感器的更昂贵，但更容易控制，因为电子设备始终知道转子的位置并可以施加正确的驱动。不带传感器的通过测量电机的反电动势来控制，这要困难得多。大多数低成本速度控制器需要带霍尔传感器的电机。


    无线电遥控社区已经开始使用三相无刷电机，这导致了一系列价格合理的电机和控制器。问题是它们被设计为用于四旋翼飞机和模型飞机的高功率、高速、单向电机。


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_164_0.png)


    如果你能接受它们的局限性，它们提供了一种将树莓派与无刷电机连接的好方法。在这种情况下，你只需要一个用于RC建模的三相无刷电机和一个如下图所示的ESC（电子调速器）：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_164_1.png)


    左侧的三根引线连接到电机的三相，右侧的红色和黑色引线连接到电源——通常是LiPo电池。中间的小型三线连接器是标准的舵机连接器，你可以像使用舵机一样使用它，但有几个例外。首先是中间引脚2提供5V而不是接受5V。除非你需要5V电源，否则不要将其连接到任何东西。第二个问题是ESC是智能的。当你第一次通电时，它们会发出蜂鸣声，并且可以通过将PWM信号从最大值更改为最小值来编程为不同的模式。此外，要使用ESC，你必须对其进行解锁。这是为了防止无线电遥控建模者在通电时被意外启动的电机伤害。最常见的解锁顺序是ESC在通电时发出蜂鸣声。然后你必须将PWM设置为最小值，此时ESC会再次发出蜂鸣声。片刻之后，你将获得对电机的控制权。


    解锁程序的需要应该提醒你，这些模型电机非常强大。不要尝试在工作台上松散地操作一个，因为如果开启，它会快速移动，至少会把你的电线拧成一团乱麻。最重要的是，在你完全控制之前，不要运行任何连接了东西的电机。


    ## 步进电机


    有一种无刷电机易于使用且成本低廉——步进电机。它与标准无刷电机的不同之处在于，它不是为连续高速旋转而设计的。步进电机具有磁体和线圈的排列，使得为某些线圈通电会将转子保持在特定位置。改变哪些线圈被激活会使转子转动，直到它与线圈对齐并停止移动。因此，步进电机以离散的步进移动转子。这使得驱动它简单得多。


    步进电机没有电刷，因此不会像有刷电机那样快速磨损。它们在任何速度下都具有大致相同的扭矩，并且可以在低速下使用而无需齿轮箱。它们可以长时间保持在固定位置而不会像直流电机那样烧毁。然而，与舵机不同的是，如果步进电机被机械力强制移动到新位置，释放后它不会返回到原始位置。步进电机的唯一缺点是，由重复步进产生的连续旋转可能会使电机振动。


    步进电机在它们使用的步进大小上有所不同——通常为1.8度，每转200步，尽管可以使用齿轮来减小步进大小。另一个主要区别是转子的构成——永磁体或软铁。第一种类型称为PM步进电机，第二种称为VR步进电机，代表可变磁阻，它们在驱动方式上有所不同。PM步进电机更容易理解。还有混合步进电机，它们兼具PM和VR步进电机的优点。这些更昂贵，通常仅在定位精度很重要时使用。


    它们在相数（即独立的线圈组）上也有所不同。下图显示了一个两相PM步进电机，其中第1相被激活：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_165_0.png)'
