    \ | 0 | 年份 x10 | | 年份 | | | | 年份 | 00-99 |\n\n你可以看到地址是连续的——读取地址为0x00到0x06，写入地址为0x80到0x86。数据使用BCD（二进制编码十进制）打包到每个字节中。这种编码方式将每个十进制数字表示为一个四位二进制值。例如，月份12的BCD编码为0001和0010，即二进制的1和2。数值59的编码为0101（代表5）和1001（代表9）。在简单的系统中，一个字节总是包含两个BCD数字。然而，如果可能值的范围有限，某些位始终为零，可以重新用于其他用途。例如，月份寄存器只需存储01到12，这意味着我们只需要一位用于十位数字，四位用于个位数字——你可以在表中看到这一点。这允许我们将第7位用作世纪指示器。其工作方式可能令人困惑，因为在某些实现中，bit\
