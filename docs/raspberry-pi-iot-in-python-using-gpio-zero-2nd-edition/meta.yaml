    They share the same pinouts:


    | Label | Description |

    |---|---|

    | GND | Ground (0V) supply |

    | VCC | DS3234 VCC (3.3V) power supply input |

    | SQW | Configurable square-wave output<br>Alarm 1 and/or Alarm 2 interrupt output
    |

    | CLK | SPI clock input |

    | MISO | SPI master in, slave out |

    | MOSI | SPI master out, slave in |

    | SS | SPI active-low chip select CS0 |


    You will recognize these as the standard SPI interface pins with the addition
    of SQW. This can be used to generate a square wave signal at a set frequency from
    1Hz to 192kHz or it can be used as outputs of either of the two alarm timers.
    In this example we won''t use SQW and it can be left unconnected.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_215_0.png)


    Once you have this connected, you can start to write the software. Notice that
    you don''t need to use a backup battery, but if you don''t then the device will
    lose its time setting each time you switch it off. With a battery it will keep
    time for years.


    To find out how to talk to the device, we need to consult its datasheet. This
    lists all of the registers that you can read and write and there are quite a few'
