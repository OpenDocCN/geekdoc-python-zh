    \ The actual implementation of the event is done by the pin factories and their\
    \ pin objects. After all, it is only a pin object that can \"know\" when something\
    \ has changed. When a change is detected, the pin factory calls the `EventsMixin._fire_events`\
    \ method, which in turn calls the functions that you specified. The `EventsMixin`\
    \ first enters the inheritance hierarchy as part of `DigitalInputDevice` and `SmoothedInputDevice`\
    \ and only classes that inherit from one of these two can handle events. Both\
    \ classes have `when_activated` and `when_deactivated` properties which you use\
    \ to set the event handling functions.\n\nIt should be obvious that for an event\
    \ to happen while your program is running there has to be another thread of execution\
    \ involved. Each pin factory provides this additional thread in its own way. For\
    \ example, the `NativeFactory` has a class called `NativeWatchThread` that runs\
    \ on its own thread and waits for a change in a pin's state, either a rising or\
    \ a falling edge. When this happens the appropriate event handlers are called.\n\
    \n## Summary\n\n- There is only one simple input device, Button, but it is easy\
    \ to add custom input devices.\n- Exactly how Button works depends on how you\
    \ set the `pull_up` property.\n- The simplest way of using Button is to `wait_for_press`\
    \ or `wait_for_release`.\n- Button has a simple debounce feature which sets a\
    \ \"dead\" time in which it doesn't respond to any changes.\n- Polling is the\
    \ simplest and fastest way of handling input. It works by repeatedly testing the\
    \ state of the button.\n- The alternative to polling is to use events or interrupts.\
    \ Both seem to be attractive alternatives, but they have serious difficulties\
    \ and tend to slow the system down.\n- Button and other input devices support\
    \ asynchronous events via the `when_pressed` and `when_released` properties. These\
    \ can be set to functions which are called when the event occurs.\n- Asynchronous\
    \ events are a very good way to create simple demos and to get started, but they\
    \ are not efficient and quickly become too complex to understand.\n- One way to\
    \ organize polling so that it remains easy to understand in complex situations,\
    \ is to use a finite state machine (FSM) approach.\n- You can read the state of\
    \ a button state as quickly as 500Hz on a Pi Zero, 10kHz on a Pi 4 and 9kHz on\
    \ a Pi 5.\n- If you try this out you will find that a Pi Zero is reasonable up\
    \ to 5kHz, a Pi5 works to 100kHz and a Pi4 is reasonably reliable up to 200kHz.\n\
    - You can create custom input devices using `DigitalInputDevice` as a base class.\n\
    - Python supports threading, which is used to implement GPIO Zero's events.\n\n\
    # Chapter 9\n## Complex Input Devices\n\nThe input devices we are about to meet\
    \ are not complex in the sense of difficult, they just have more features than\
    \ a simple button. All of the devices inherit from SmoothedInputDevice and the\
    \ general idea is that a single input isn't sufficient to act on. What is required\
    \ is an average reading, so reducing noise.\n\n## SmoothedInputDevice\n\nThe base\
    \ class for all of this set of input devices is SmoothedInputDevice.\n\nSmoothedInputDevice\
    \ has all of the properties of InputDevice and, in addition, it sets up a queue\
    \ of readings. The actual value of the device is obtained by applying a function,\
    \ usually an average, to the readings in the queue. A background thread is used\
    \ to take regular readings and the function is computed when you use a value.\n\
    \nThe constructor has a large number of parameters:\n\n```\nSmoothedInputDevice(pin,\
    \ pull_up=False, active_state=None,\n                    threshold=0.5, queue_len=5,\
    \ sample_wait=0.0,\n                    partial=False, average=median, ignore=None,\n\
    \                    pin_factory=None)\n```\n\nThe parameters concerned with setting\
    \ up the queue are:\n\n- **queue_len**: The length of the queue, i.e. the number\
    \ of readings that the function is applied to. The default is 5.\n- **threshold**:\
    \ The value that is used as a cut-off for the device being activated. If the read\
    \ value is greater than threshold, the device is active.\n- **sample_wait**: The\
    \ time between readings in seconds. The default is 0, which means read as fast\
    \ as possible.\n- **partial**: If True an attempt to read the device returns with\
    \ a value, even if the queue isn't full. If False, the default, a read blocks\
    \ until the queue is full.\n- **ignore**: A set of values that represents non-readings\
    \ and should be ignored in the calculation of the average. Defaults to None.\n\
    - **average**: The function applied to the values in the queue to get the final\
    \ value. It defaults to median, which is the middle value in the queue.\n\nUsing\
    \ a SmoothedInputDevice is just a matter of setting up the degree of smoothing\
    \ needed – i.e. the speed of reading, the number of data points to average, and\
    \ the function that should be used to average them.\n\nIt should be obvious that,\
    \ whatever the SmoothInputDevice is reading, it can't be a single GPIO line that\
    \ returns a 0 or a 1. In most cases averaging this using median would return 0.5.\
    \ However, averaging using average would give you a value that was proportional\
    \ to the ratio of ones to zeros in the measurement interval. In the same way,\
    \ you can create a device which returns a number proportional to the time a GPIO\
    \ line is high.\n\n## Using the TRCT5000 Line Sensor\n\nThe LineSensor device\
    \ makes use of a module based on the TRCT5000 infrared emitter and sensor.\n\n\
    To make this suitable for use with a GPIO line you need to add some electronics:\n\
    \nThe IR diode sends a beam of IR out of the device and if it is reflected back,\
    \ the photo transistor switches on. The LM324 U1 outputs a high signal when the\
    \ voltage from the IR sensor is greater than that set on the potentiometer, R3.\
    \ That is, R3 acts as a sensitivity control.\n\nYou don't need to build the circuit\
    \ because you can buy ready-built modules:\n\nYou simply connect the three pins\
    \ to 3.3V, ground and a GPIO line of your choice. It is worth knowing that some\
    \ modules output high when over a white line and some go low.\n\nOnce you have\
    \ the hardware connected you can create a LineSensor using the constructor:\n\n\
    ```\nLineSensor(pin, queue_len=5, sample_rate=100, threshold=0.5,\n          partial=False,\
    \ pin_factory=None)\n```\n\nYou can read the `value` property to discover if the\
    \ sensor is over a reflective surface or not:\n\n```\nfrom gpiozero import LineSensor\n\
    sensor = LineSensor(4)\nwhile True:\n    if sensor.value > 0.5:\n        print('Line\
    \ detected')\n    else:\n        print('No line detected')\n```\n\nYou can also\
    \ use the `wait_for_line`, `wait_for_no_line`, `when_line` and `when_no_line`\
    \ events.\n\nIn practice, setting the threshold control on the hardware is likely\
    \ to be more important than tuning the software."
  mdcn: "新的 Door 类继承自 DigitalInputDevice，这也是 Button 所继承的类。它的 `__init__` 函数是 Button\
    \ `__init__` 的一个修改版本。`value` 函数根据门是关闭还是打开分别返回 0 或 1。最后，方法的名称被更改为与开关相关的内容。你也可以移除不再合适的方法和属性，但为了简单起见，这里保留了它们。\n\
    \n使用我们新的 Door 类，我们可以这样编写代码：\n\n```\ndoor = Door(4)\nwhile True:\n    door.wait_for_open()\n\
    \    print(\"open\")\n    door.wait_for_close()\n    print(\"closed\")\n```\n\n\
    这与使用 Button 没有区别，但在门传感器的上下文中更容易理解。\n\n这非常容易实现，因此几乎没有理由不为所有简单的数字传感器创建自定义输入类。\n\n\
    ## 线程\n\n你不需要了解其工作原理就能使用 GPIO Zero，因此可以随意跳过这个高级部分，并在需要时再回来查看。\n\n线程通常不是与 Python\
    \ 相关的主题，因为它相对较少需要。然而，GPIO Zero 库大量使用了线程，允许你设置事件处理程序，这些处理程序会在发生某些事情时自动调用。例如，Button\
    \ 类有一个 `when_pressed` 和一个 `when_released` 属性，可以分配给在事件发生时调用的函数：\n\n```\ndef pressed():\n\
    \    print(\"Button pressed\")\n\ndef released():\n    print(\"Button released\"\
    )\n\nbutton.when_pressed = pressed\nbutton.when_released = released\n```\n\nGPIO\
    \ Zero 库中所有事件处理都由一个 mixin 提供——EventsMixin。它有 `when_activated` 和 `when_deactivated`\
    \ 属性，这是 GPIO Zero 中所有事件处理的基础。话虽如此，GPIO Zero 中关于事件的操作并不多。事实上，你所能做的就是在属性中存储函数的引用，然后你的程序继续运行。事件的实际实现由引脚工厂及其引脚对象完成。毕竟，只有引脚对象才能“知道”何时发生了变化。当检测到变化时，引脚工厂会调用\
    \ `EventsMixin._fire_events` 方法，该方法又会调用你指定的函数。`EventsMixin` 首次作为 `DigitalInputDevice`\
    \ 和 `SmoothedInputDevice` 的一部分进入继承层次结构，只有继承自这两个类之一的类才能处理事件。这两个类都有 `when_activated`\
    \ 和 `when_deactivated` 属性，你使用它们来设置事件处理函数。\n\n很明显，为了在程序运行时发生事件，必须涉及另一个执行线程。每个引脚工厂都以自己的方式提供这个额外的线程。例如，`NativeFactory`\
    \ 有一个名为 `NativeWatchThread` 的类，它在自己的线程上运行，并等待引脚状态的变化，无论是上升沿还是下降沿。当这种情况发生时，相应的事件处理程序会被调用。\n\
    \n## 总结\n\n- 只有一个简单的输入设备 Button，但很容易添加自定义输入设备。\n- Button 的确切工作方式取决于你如何设置 `pull_up`\
    \ 属性。\n- 使用 Button 最简单的方法是 `wait_for_press` 或 `wait_for_release`。\n- Button 具有简单的去抖功能，它设置了一个“死区”时间，在此期间不响应任何变化。\n\
    - 轮询是处理输入最简单、最快的方法。它通过反复测试按钮的状态来工作。\n- 轮询的替代方案是使用事件或中断。两者似乎都是有吸引力的替代方案，但它们存在严重的困难，并且往往会减慢系统速度。\n\
    - Button 和其他输入设备通过 `when_pressed` 和 `when_released` 属性支持异步事件。这些可以设置为在事件发生时调用的函数。\n\
    - 异步事件是创建简单演示和入门的好方法，但它们效率不高，并且很快变得过于复杂而难以理解。\n- 在复杂情况下保持轮询易于理解的一种方法是使用有限状态机（FSM）方法。\n\
    - 你可以在 Pi Zero 上以高达 500Hz 的速度读取按钮状态，在 Pi 4 上为 10kHz，在 Pi 5 上为 9kHz。\n- 如果你尝试一下，你会发现\
    \ Pi Zero 在高达 5kHz 时是合理的，Pi5 可以工作到 100kHz，Pi4 在高达 200kHz 时相当可靠。\n- 你可以使用 `DigitalInputDevice`\
    \ 作为基类创建自定义输入设备。\n- Python 支持线程，这被用于实现 GPIO Zero 的事件。\n\n# 第 9 章\n## 复杂输入设备\n\n\
    我们即将遇到的输入设备并非指困难意义上的复杂，它们只是比简单的按钮具有更多的功能。所有设备都继承自 SmoothedInputDevice，其基本思想是单个输入不足以进行操作。需要的是平均读数，从而减少噪声。\n\
    \n## SmoothedInputDevice\n\n这组输入设备的基类是 SmoothedInputDevice。\n\nSmoothedInputDevice\
    \ 具有 InputDevice 的所有属性，此外，它还设置了一个读数队列。设备的实际值是通过对队列中的读数应用一个函数（通常是平均值）来获得的。后台线程用于定期读取，当你使用值时会计算该函数。\n\
    \n构造函数有大量参数：\n\n```\nSmoothedInputDevice(pin, pull_up=False, active_state=None,\n\
    \                    threshold=0.5, queue_len=5, sample_wait=0.0,\n          \
    \          partial=False, average=median, ignore=None,\n                    pin_factory=None)\n\
    ```\n\n与设置队列相关的参数是：\n\n- **queue_len**：队列的长度，即应用函数的读数数量。默认值为 5。\n- **threshold**：用作设备激活截止值的值。如果读取值大于阈值，则设备处于活动状态。\n\
    - **sample_wait**：读数之间的间隔时间（秒）。默认值为 0，表示尽可能快地读取。\n- **partial**：如果为 True，即使队列未满，尝试读取设备也会返回一个值。如果为\
    \ False（默认值），读取会阻塞直到队列满。\n- **ignore**：一组表示非读数的值，在计算平均值时应忽略。默认为 None。\n- **average**：应用于队列中的值以获取最终值的函数。默认为中位数，即队列中的中间值。\n\
    \n使用 SmoothedInputDevice 只需设置所需的平滑程度——即读取速度、要平均的数据点数量以及用于平均它们的函数。\n\n很明显，无论 SmoothInputDevice\
    \ 读取什么，它都不可能是一个返回 0 或 1 的单个 GPIO 线。在大多数情况下，使用中位数对此进行平均将返回 0.5。然而，使用平均值进行平均将给你一个与测量间隔中\
    \ 1 与 0 的比例成比例的值。同样，你可以创建一个设备，返回一个与 GPIO 线高电平时间成比例的数字。\n\n## 使用 TRCT5000 线传感器\n\
    \nLineSensor 设备利用了一个基于 TRCT5000 红外发射器和传感器的模块。\n\n为了使其适合与 GPIO 线一起使用，你需要添加一些电子元件：\n\
    \n红外二极管向设备外发送一束红外光，如果它被反射回来，光电晶体管就会导通。当来自红外传感器的电压大于电位器 R3 设置的电压时，LM324 U1 输出高信号。也就是说，R3\
    \ 充当灵敏度控制。\n\n你不需要构建电路，因为你可以购买现成的模块：\n\n你只需将三个引脚连接到 3.3V、地和你选择的 GPIO 线。值得注意的是，有些模块在经过白线时输出高电平，有些则输出低电平。\n\
    \n一旦硬件连接好，你就可以使用构造函数创建一个 LineSensor：\n\n```\nLineSensor(pin, queue_len=5, sample_rate=100,\
    \ threshold=0.5,\n          partial=False, pin_factory=None)\n```\n\n你可以读取 `value`\
    \ 属性来发现传感器是否在反射表面上：\n\n```\nfrom gpiozero import LineSensor\nsensor = LineSensor(4)\n\
    while True:\n    if sensor.value > 0.5:\n        print('Line detected')\n    else:\n\
    \        print('No line detected')\n```\n\n你也可以使用 `wait_for_line`、`wait_for_no_line`、`when_line`\
    \ 和 `when_no_line` 事件。\n\n实际上，设置硬件上的阈值控制可能比调整软件更重要。"
