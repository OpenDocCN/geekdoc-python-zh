  md: "Although we have been talking about actions, objects have attributes that are\
    \ any type of data. For example:\n\n```\nprint(led.value)\n```\n\nIn this case\
    \ the attribute value is 1 if the LED is on and 0 otherwise. Setting the attribute\
    \ also changes the state of the LED, i.e. to turn it on you would use:\n\n```\n\
    led.value=1\n```\n\nYou can think of this as storage that is local to the instance.\
    \ That is, if you create another LED:\n\n```\nled2=LED(5)\n```\n\nthen it has\
    \ its own value attribute.\nMethods are just attributes that happen to be functions.\n\
    \n# Creating Your Own Objects - Class\n\nUsing objects is easy, but there comes\
    \ a time when you need to create your own objects. Creating a custom object is\
    \ relatively easy, but it can seem involved when you first encounter it.\nFirst\
    \ you have to create a class which gives the definition of the object you want\
    \ to create and then you use it to create as many instances of the class as you\
    \ need. You already know how this works with objects that GPIO Zero provides.\
    \ The LED class defines all of the attributes of any led objects you use it to\
    \ create.\n\n```\nled=LED(4)\n```\n\nThis use of class and instance is a slight\
    \ problem when it comes to naming things. For example, the LED class has the name\
    \ you might want to use for a single instance of the class. This is particularly\
    \ irritating when all you want is a single instance of the class. Then, there\
    \ is even a tendency to think, “Why do I need a class at all? Why can’t I just\
    \ create an object directly?” The answer is you can, but the class/instance approach\
    \ is much more common. In general, use upper case names for classes and lower\
    \ case for instances.\nTo create a custom object you first have to create a custom\
    \ class using the class keyword:\n\n```\nclass MyClass:\n    def myMethod(self):\n\
    \        print(\"myMethod called\")\n```\n\nThis creates MyClass with a single\
    \ method myMethod which simply prints something. Once defined, you can use MyClass\
    \ in the standard way:\n\n```\nmyObject=MyClass()\nmyObject.myMethod()\n```\n\n\
    which prints myMethod called."
