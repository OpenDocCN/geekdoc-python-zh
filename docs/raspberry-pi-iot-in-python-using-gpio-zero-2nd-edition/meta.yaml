    # # Chapter 5

    ## Simple On/Off Devices


    There are only two simple on/off devices – the LED and the Buzzer. In this chapter
    we look at each in turn and learn how to create our own new custom on/off devices.


    # ## On/Off Inheritance


    The inheritance hierarchy for the simple output devices is:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_54_0.png)


    If you don’t know about inheritance then see the previous chapter.

    Knowledge of the inheritance hierarchy is mostly useful in creating your own custom
    classes to extend GPIO Zero. `Device` is the most general and then we have `GPIODevice`
    which corresponds to a single GPIO line used as input or output. `OutputDevice`
    is a general output line, `DigitalOutputDevice` only has two states and finally
    `LED` and `Buzzer` correspond to real devices.


    # ## LED In Detail


    The LED class is the archetypal on/off device. You have already seen how to create
    an LED object associated with a particular GPIO pin:

    `led = LED(4)`

    creates an LED object associated with GPIO4.'
  - "[PAGE 55]\n\nOther things you can specify when creating an LED object are:\n\
    LED(pin, active_high=True, initial_value=False, pin_factory=None)\n\n| Parameter\
    \ | Action |\n| :--- | :--- |\n| active_high | If True the on method sets the\
    \ line high<br>If False the off method sets the line high |\n| initial_value |\
    \ If True the device is initially on<br>If False the device is initially off |\n\
    | pin_factory | The underlying pin factory to use<br>Let GPIO Zero set this |\n\
    \nSo for example:\nled=LED(4, active_high=True, initial_value=True)\ncreates an\
    \ LED associated with GPIO4 that is high when switched on and hence initially\
    \ on.\nThere are only four methods associated with LED. The most commonly used\
    \ are on and off which switch the LED on and off.\nIf you want to make the LED\
    \ flash then you can use:\nblink(on_time, off_time, n, background)\nwhich will\
    \ blink the LED n times, switching on for on_time and off for off_time specified\
    \ in seconds. The background parameter defaults to True and this allows the blinking\
    \ to be performed on another thread in the background. That is, if background\
    \ is False, blink blocks and does not return until the n blinks have been completed,\
    \ which brings your program to a halt. If you want to do other things while the\
    \ LED is flashing then set background to True or accept the default. The LED will\
    \ then flash n times after blink has returned.\nFor example, our original Blinky\
    \ LED program given in Chapter 3:\n\n```\nfrom gpiozero import LED\nfrom time\
    \ import sleep\nled = LED(4)\nwhile True:\n    led.on()\n    sleep(1)\n    led.off()\n\
    \    sleep(1)\n```"
  - '[PAGE 56]


    can be written as:


    ```

    from gpiozero import LED

    from signal import pause

    led = LED(4)

    led.blink(on_time=1,off_time=1,n=100)

    print("Program Complete")

    pause()

    ```


    If you try this out you will discover that the LED keeps flashing for almost 200
    seconds after the program has printed Program Complete. Notice that you need the
    pause at the end of the program because if your program comes to a halt so do
    any threads that the program has created. In short, without pause() you wouldn''t
    see the LED flash at all. The point is that usually when you give a Python instruction
    you only move on to the next instruction when the current instruction has completed.


    This is generally called “blocking” because the current instruction stops the
    next instruction executing before it is complete. The call to blink is non-blocking
    because it returns before it has finished everything you told it to do and the
    next instruction is executed while it is unfinished. Instructions that are non-blocking
    are very useful when working with hardware because it allows your program to get
    on with something else while the hardware is doing something.


    Compare the behavior of the background non-blocking program with a blocking version:


    ```

    from gpiozero import LED

    led = LED(4)

    led.blink(on_time=1,off_time=1,n=100,background=False)

    print("Program Complete")

    ```


    In this case you don''t need the pause() because the program waits for the LED
    to have completed 100 flashes. You will only see the Program Complete message
    after 200 seconds.


    It is interesting that in either case the blink method makes use of a new thread
    to run LED in the background, the only difference is that when background is False
    the main thread waits for the blink thread to complete.'
  - "[PAGE 57]\n\nThe toggle method simply changes the LED from on to off or off to\
    \ on depending on its current state. You can use it to write the Blinky program\
    \ in yet another way:\n\n```\nfrom gpiozero import LED\nfrom time import sleep\n\
    \nled = LED(4)\n\nwhile True:\n    led.toggle()\n    sleep(1)\n    led.toggle()\n\
    \    sleep(1)\n```\n\nThere are also some useful properties. The `is_lit` property\
    \ is true if the LED is currently active and `value` sets and gets the state of\
    \ the LED as a 1 or a 0. Finally we have the `pin` property which returns the\
    \ pin object that the LED is connected to. The Pin object provides lower-level\
    \ access to the GPIO line.\n\n# Buzzer\n\nThe only other standard on/off device\
    \ is the buzzer and it goes on and off in the sense that it is driven by a single\
    \ GPIO line, just like an LED, and makes a sound when the line is high and is\
    \ silent when the line is low. It isn't capable of making different tones, it\
    \ is either on or off.\nThe exact type of buzzer is a piezoelectric buzzer which\
    \ emits a single tone and can be very loud:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_57_0.png)\n\
    \nYou don't need a current-limiting resistor as buzzers take very little current.\
    \ All you have to do is to make sure that it will operate at 3.3 volts. All you\
    \ have to do to use one is connect the negative lead to ground and the positive\
    \ lead to a GPIO line:"
  - '[PAGE 58]


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_58_0.png)


    The Buzzer object has all of the properties and methods of the LED object. The
    on and off methods now make the buzzer sound but work in exactly the same way.
    The one small change is that blink is now renamed beep. It works in exactly the
    same way but now the buzzer is switched on and off.


    ```

    from gpiozero import Buzzer

    from signal import pause


    buzz = Buzzer(4)

    buzz.beep(on_time=1,off_time=1,n=100)

    print("Program Complete")

    pause()

    ```


    You can see quite clearly that creating a Buzzer class is more about renaming
    things, so that your program can be more understandable, than introducing anything
    new.


    # A Custom On/Off Device


    There are lots of on/off devices other than LED and Buzzer, so how do you arrange
    to work with them?


    One solution is to treat everything as if it was an LED. For example, if you have
    an electric door lock you could write:


    ```

    lock=LED(4)

    lock.on()

    ...

    lock.off()

    ```


    It would work, but it might be confusing in the future when you have forgotten
    the program and are forced to wonder what an LED is doing with a lock and what
    lock.on() means.'
  - "[PAGE 59]\n\nA better and simpler solution is to derive a custom on/off device.\
    \ You can do this using inheritance from DigitalOutputDevice which provides nearly\
    \ all of the methods that LED has – in particular it has on and off methods. In\
    \ this case we can simply pass the constructor parameters to the constructor of\
    \ DigitalOutputDevice:\n\n```\nclass Lock(DigitalOutputDevice):\n    def __init__(self,\
    \ *args, **kwargs):\n        super().__init__(*args, **kwargs)\n```\n\nAt this\
    \ point Lock is really just a copy of DigitalOutputDevice and to customize it\
    \ to be a Lock class we need to add appropriate methods. What we really need are\
    \ two new methods, lock and unlock, and these can be implemented by calling the\
    \ on and off methods of the super class:\n\n```\ndef lock(self):\n    super().on()\n\
    def unlock(self):\n    super().off()\n```\n\nNow we have a Lock object that has\
    \ lock and unlock methods that make sense for the device. However, we also still\
    \ have on, off and blink which don't make any sense.\nThe simplest solution is\
    \ to override them with methods that raise an appropriate exception:\n\n```\n\
    def on(self):\n    raise AttributeError(\"'Lock' object has no attribute 'on'\"\
    )\ndef off(self):\n    raise AttributeError(\"'Lock' object has no attribute 'off'\"\
    )\ndef blink(self):\n    raise AttributeError(\"'Lock' object has no attribute\
    \ 'blink'\")\n```\n\nThis stops the use of the method calls, but the inappropriate\
    \ attributes are still accessible. That is:\n\n```\nlock.on()\nresults in an exception,\
    \ but:\nmy0n=lock.on\nworks, even if you can't actually call the method.\n```\n\
    \nThis is probably good enough for most use cases, but you could take it one step\
    \ further by customizing the constructor. After all, you don't want to allow active_high\
    \ to be set to False and have lock mean unlock and vice versa."
- md: "You can check for any keyword parameter using something like:\n\n```python\n\
    def __init__(self, *args, **kwargs):\n    if 'active_high' in kwargs:\n      \
    \  raise TypeError(\"active_high not supported\")\n    super().__init__(*args,\
    \ **kwargs)\n```\n\nIf you would like a more specific error, you could define\
    \ your own exception class.\nYou can carry on tailoring the behavior of Lock to\
    \ be more lock-like until you have the perfect class. It is also a good idea to\
    \ put your code into a module so that you can import Lock.\nThe complete program\
    \ is:\n\n```python\nfrom gpiozero import DigitalOutputDevice\n\nclass Lock(DigitalOutputDevice):\n\
    \    def __init__(self, *args, **kwargs):\n        if 'active_high' in kwargs:\n\
    \            raise TypeError(\"active_high not supported\")\n        super().__init__(*args,\
    \ **kwargs)\n\n    def lock(self):\n        super().on()\n\n    def unlock(self):\n\
    \        super().off()\n\n    def on(self):\n        raise AttributeError(\"'Lock'\
    \ object has no attribute 'on'\")\n\n    def off(self):\n        raise AttributeError(\"\
    'Lock' object has no attribute 'off'\")\n\n    def blink(self):\n        raise\
    \ AttributeError(\"'Lock' object has no attribute 'blink'\")\n```\n\nUsing Lock\
    \ is trivial:\n\n```python\noffice_door = Lock(4)\n\noffice_door.lock()\n...\n\
    office_door.unlock()\n```\n\nYou can use the same ideas to implement a custom\
    \ class for any on/off device you care to use. What is interesting is that in\
    \ practice customizing an existing class using inheritance is often as much about\
    \ changing and restricting what the class can do as it is about extending it,\
    \ which is not what textbooks emphasize most strongly.\nThis completes the software\
    \ and it is worth remarking that simple locks of this sort are the same hardware\
    \ problem as driving a solenoid. As these mostly work with 6 or 12 volts, you\
    \ will need to use a transistor driver and you will need to take account of the\
    \ voltage and the current involved, see the next chapter for more details.\n\n\
    ## Phased On/Off\n\nThere is a particular problem when you want to coordinate\
    \ the times when devices switch on and off. Consider for a moment two LEDs that\
    \ you want to flash in a phased way – led1 off when led2 is on and vice versa.\
    \ You have to switch each LED as a separate operation and this means that there\
    \ has to be a gap between the two actions. Consider for example the following\
    \ program, which flashes two LEDs as fast as possible:\n\n```python\nfrom gpiozero\
    \ import LED\n\nled1 = LED(4)\nled2 = LED(17)\n\nwhile True:\n    led1.on()\n\
    \    led2.on()\n    led1.off()\n    led2.off()\n```\n\nInstead of turning on and\
    \ off together, on a Pi Zero there is a delay of about 140μs:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_61_0.png)\n\
    \nOn a Pi 4 the delay is 10μs and on a Pi 5 it is 20μs:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_61_1.png)\n\
    \nThe difference between 20μs and 140μs might not seem like much - and for an\
    \ LED, you would be hard pressed to notice that they weren't coming on at the\
    \ same time. However, if you switch ten LEDs on and off the time difference from\
    \ the first to the last would be about 1.5ms for the Pi Zero, which might be noticeable\
    \ as a flicker.\n\nThere are also situations when you are driving a device in\
    \ which you need one or more signals to have a fixed and exact phase relationship\
    \ – one on while the other is off, say. The best known example of this is motor\
    \ direction control. This is usually achieved using a configuration known as an\
    \ H-bridge, see Chapter 11, which has two control lines. Activating one line at\
    \ a time makes the motor turn in two different directions whereas activating them\
    \ both at the same time shorts the power supply out and causes damage. If both\
    \ of these lines are driven by a GPIO line then there will be a short time – 10μs\
    \ to 150μs – when both lines are active. The result is that the power supply is\
    \ short circuited for this time and in most cases damage accumulates over time.\n\
    \nYou cannot assume that things happen at the same time. In fact, it is the rule\
    \ that things do not happen at the same time unless you go to the trouble to make\
    \ sure they do.\n\n## Summary\n\n- From the programming point of view, there are\
    \ only two simple on/off devices, LED and Buzzer. They both inherit from `DigitalOutputDevice`.\n\
    - The `blink` method turns the device on and off a given number of times and can\
    \ be run in the background while the program gets on with something else or in\
    \ the foreground when your program will wait.\n- The `toggle` method turns the\
    \ device on if it is off and off if it is on.\n- The `Buzzer` class is intended\
    \ to be used with a piezoelectric buzzer, which is either on or off and hence\
    \ either emits a sound or remains silent. It can only make one tone, which cannot\
    \ be varied.\n- A piezo buzzer doesn't need a driver as it takes very little current.\n\
    - You can create a custom on/off device by inheriting from `DigitalOutputDevice`\
    \ and providing the additional methods that are required. Restricting access to\
    \ any existing inappropriate methods is a more difficult task.\n- You can switch\
    \ multiple on/off devices at the same time or at coordinated times, but there\
    \ is always a lag between switching devices - 140μs for a Pi Zero and 10μs to\
    \ 20μs for a Pi 4/5.\n\n## Chapter 6: Pins And Pin Factories\n\nGPIO Zero is built\
    \ on top of existing software libraries to the Pi’s hardware – to the GPIO lines\
    \ hence GPIO libraries. You can use these libraries directly but they generally\
    \ work in C and are not easy to get to grips with. To make things easier the GPIO\
    \ libraries are wrapped by GPIO Zero Python classes, the pin factories. Their\
    \ purpose is not only to create pin objects with the characteristics you specify,\
    \ but to also manage the use of GPIO lines, ensuring that you cannot use the same\
    \ GPIO line for two different purposes at the same time, and to provide a certain\
    \ amount of event handling. The reason pin factories are needed is that they cover\
    \ up the differences between the different GPIO libraries and present a single\
    \ uniform Pin object no matter which library you chose to use.\nThat is, in GPIO\
    \ Zero a Pin object allows you to work directly with a GPIO line in the same way\
    \ irrespective of the GPIO library in use.\nAs GPIO Zero selects a default pin\
    \ factory you can mostly ignore the whole issue of pin factories and pins until\
    \ you need to do something that goes outside of the box. So first let’s look at\
    \ how to use a Pin object.\n\n### Raw GPIO Pin\n\nIn the Blinky program we used\
    \ an LED object to turn the LED on and off – why not just reference the GPIO line?\
    \ In other words, why hide the fact that we are working with GPIO lines? The answer\
    \ is that it makes it easier to read programs. If you want to work with the raw\
    \ GPIO line you can, but it isn’t as clear what the program means, i.e. what is\
    \ the GPIO line controlling.\nTo use a pin from the pin factory that GPIO Zero\
    \ has set up for you all you have to do is create a pin, set its function as 'input'\
    \ or 'output' and then use it. For example, the pin equivalent of the blinking\
    \ LED program is:\n\n```python\nfrom gpiozero import Device\nfrom time import\
    \ sleep\n\nDevice()\npin = Device.pin_factory.pin(4)\npin.set_function('output')\n\
    \nwhile True:\n    pin.state = 1\n    sleep(1)\n    pin.state = 0\n    sleep(1)\n\
    ```\n\nNotice that you have to have a call to the Device constructor to initialize\
    \ the pin_factory before you can use it. The pin factory creates a pin object\
    \ for GPIO4 and then we use its methods to control what it does.\nAll pin objects\
    \ have three fundamental methods:\n`_get_function`\n`_set_function`\n`_get_state`\n\
    There is also a set of optional get/set methods which in practice all pin objects\
    \ support. These methods are grouped together to implement properties:\n\n| Function\
    \ | Input/Output |\n|---|---|\n| state | 0/1 |\n| pull | Up/down/floating see\
    \ next chapter |\n| frequency | Frequency of output/none |\n| bounce | Time in\
    \ seconds/none, see Chapter 7 |\n| edge | Rising/falling/both/none, see Chapter\
    \ 8 |\n| when_changed | Function called when an edge event occurs |\n\nThere are\
