  md: "# Phased On/Off\n\nThere is a particular problem when you want to coordinate\
    \ the times when devices switch on and off. Consider for a moment two LEDs that\
    \ you want to flash in a phased way – led1 off when led2 is on and vice versa.\
    \ You have to switch each LED as a separate operation and this means that there\
    \ has to be a gap between the two actions. Consider for example the following\
    \ program, which flashes two LEDs as fast as possible:\n\n```\nfrom gpiozero import\
    \ LED\nled1 = LED(4)\nled2 = LED(17)\nwhile True:\n    led1.on()\n    led2.on()\n\
    \    led1.off()\n    led2.off()\n```\n\nInstead of turning on and off together,\
    \ on a Pi Zero there is a delay of about 140μs:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_61_0.png)\n\
    \nOn a Pi 4 the delay is 10μs and on a Pi 5 it is 20μs:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_61_1.png)\n\
    \nThe difference between 20μs and 140μs might not seem like much - and for an\
    \ LED, you would be hard pressed to notice that they weren't coming on at the\
    \ same time. However, if you switch ten LEDs on and off the time difference from\
    \ the first to the last would be about 1.5ms for the Pi Zero, which might be noticeable\
    \ as a flicker."
  merge: -1
  pgno: 61
- img_proc: true
  md: 'There are also situations when you are driving a device in which you need one
    or more signals to have a fixed and exact phase relationship – one on while the
    other is off, say. The best known example of this is motor direction control.
    This is usually achieved using a configuration known as an H-bridge, see Chapter
    11, which has two control lines. Activating one line at a time makes the motor
    turn in two different directions whereas activating them both at the same time
    shorts the power supply out and causes damage. If both of these lines are driven
    by a GPIO line then there will be a short time – 10μs to 150μs – when both lines
    are active. The result is that the power supply is short circuited for this time
    and in most cases damage accumulates over time.


    You cannot assume that things happen at the same time. In fact, it is the rule
    that things do not happen at the same time unless you go to the trouble to make
    sure they do.'
  merge: -1
