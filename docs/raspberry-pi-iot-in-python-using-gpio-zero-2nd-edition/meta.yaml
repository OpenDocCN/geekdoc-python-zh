    To see the analog waveform, we need to put the digital output into a low-pass
    filter. A simple resistor and capacitor work reasonably well:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_145_0.png)


    The filter''s cutoff is 50Hz and might be a little on the high side for a frequency
    output this low.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_145_1.png)


    You can see that the frequency is around 43Hz and there are still lots of “jaggies”
    which could be further reduced by using a larger capacitor in the filter. There
    is a particularly big step at the start and end of each cycle, due to the jump
    to a duty cycle of 0 and 1. Nothing can be done about this.

    You can create a sine wave, or any other waveform you need, using the same techniques,
    but 200Hz is a practical upper limit on what can be managed.

    If you already know that the PWM outputs are used to create audio on the Pi, you
    might be wondering how this is possible? The answer is that it uses hardware-generated
    PWM and can reach much higher frequencies.'
