- img_proc: true
  md: '# Setting a Pin Factory


    If you don''t bother to specify a pin factory, GPIO Zero will try to locate one
    for you and if it can''t find one, because none are installed, it will use the
    NativeFactory which is always available. In most cases this means that LGPIOFactory
    will be used as it is installed by default.


    You can also set the pin factory to use on the command line using the export command:

    `export GPIOZERO_PIN_FACTORY = name of pin Factory`


    You can explicitly select a pin factory from within Python by setting Device.pin_factory:

    `Device.pin_factory = factoryClass()`

    where `factoryClass` is the name for the factory as listed in the table below.

    You can also read `Device.pin_factory` to discover which pin factory is in use.


    Each pin factory generates a pin class with a specific name but these all work
    in the same way and have the same methods and properties. What this means is that
    you can treat pins produced by any pin factory in the same way.

    The Factory and Pin classes corresponding to each of the options are:


    | Name | Factory class | Pin class |

    |---|---|---|

    | lgpio | gpiozero.pins.lgpio.LGPIOFactory | gpiozero.pins.lgpio.LGPIOPin |

    | rpigpio | gpiozero.pins.rpigpio.RPiGPIOFactory | gpiozero.pins.rpigpio.RPiGPIOPin
    |

    | pigpio | gpiozero.pins.pigpio.PiGPIOFactory | gpiozero.pins.pigpio.PiGPIOPin
    |

    | native | gpiozero.pins.native.NativeFactory | gpiozero.pins.native.NativePin
    |


    You can also specify the pin factory as a parameter in each device constructor:

    `LED(7,pin_factory=factoryClass())`

    However, this approach has little value and you should only ever use a single
    pin factory in a given program. The best advice is to ignore the pin_factory parameter
    unless you have a good reason not to. Set the pin factory at the start of your
    program and don''t change it.


    You can also create and use a pin factory object directly:

    `from gpiozero.pins.native import NativeFactory`

    `myFactory = NativeFactory()`

    `pin = myFactory.pin(4)`'
  merge: -1
