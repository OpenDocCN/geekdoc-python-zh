  md: "# Refactoring the Stepper Motor Class\n\nWhen creating custom classes the first\
    \ step is to get something working. This is usually rough and ready and really\
    \ just a proof that things work as you think they do. The next step is to polish\
    \ your creation. In object-oriented programming this is often referred to as “refactoring”\
    \ and it often involves removing code from one class and using it to implement\
    \ a new class. In the case of the stepper motor class we created in Chapter 11,\
    \ we didn't make use of CompositeDevice to contain the component parts of the\
    \ device. This is easy to put right:\n\n```\nfrom gpiozero import DigitalOutputDevice,CompositeDevice\n\
    \nclass StepperBi4(CompositeDevice):\n    def __init__(self, A=None,Am=None,B=None,Bm=None):\n\
    \        if not all(p is not None for p in [A,Am,B,Bm]):\n            raise GPIOPinMissing(\n\
    \                'Four GPIO pins must be provided'\n            )\n        super(StepperUni4,\
    \ self).__init__(DigitalOutputDevice(A),\n                                   \
    \      DigitalOutputDevice(B),DigitalOutputDevice(Am),\n                     \
    \                    DigitalOutputDevice(Bm))\n        self.phase=0\n        self.halfstepSeq\
    \ = [\n            [1,0,0,0],\n            [1,1,0,0],\n            [0,1,0,0],\n\
    \            [0,1,1,0],\n            [0,0,1,0],\n            [0,0,1,1],\n    \
