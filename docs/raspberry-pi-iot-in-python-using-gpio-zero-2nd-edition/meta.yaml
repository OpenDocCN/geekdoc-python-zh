  md: '# Light Sensor


    There are many different types of light sensor, but the LDR, Light Dependent Resistor,
    is one of the simplest.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_113_0.png)


    As its name suggests, it simply changes its resistance according to how much light
    falls on it. Using it to sense the light level is simply a matter of measuring
    its resistance. This can be done directly, and you can also use the resistance
    to change other physical properties of a system. For example, you can charge a
    capacitor to a set voltage and then time how long it takes to discharge through
    the resistor. This is how the `LightSensor` class works. You need to set up the
    simple circuit shown below. What happens is that,


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_113_1.png)


    when a reading is required, the GPIO line is set to low, which discharges the
    capacitor. Then it is set to input, which allows the capacitor to charge through
    the LDR. The GPIO line reads 0 until the capacitor has charged enough to make
    it read 1. The time to read 1 is proportional to the resistance, which in turn
    is proportional to the light falling on it. The only problem we have is that different
    LDRs have different resistances and hence different charge times. You can work
    out the charge times, but the simplest thing to do is to adjust the time by trial
    and error.'
  merge: -1
  pgno: 113
- img_proc: true
  md: "you have the circuit connected to the GPIO line of your choice, you can create\
    \ a LightSensor object using the constructor:\n\n```\nLightSensor(pin, queue_len=5,\
    \ charge_time_limit=0.01,\n           threshold=0.1, partial=False, pin_factory=None)\n\
    ```\n\nThe new element here is the charge_time_limit which is the time in seconds\
    \ it takes the capacitor to charge enough to change the zero input to a one. The\
    \ default should be close to the value you need, but you might have to tune it\
    \ by trial and error to the range of light inputs that you want to work with,\
    \ i.e. what you consider light and what you consider dark. Also notice that by\
    \ default five readings are taken. An LDR changes its resistance slowly in response\
    \ to a sudden light change. You can use the light_detected property to see if\
    \ the light exceeds the threshold or the value property to measure the light level.\
    \ You can also use the wait_for_dark, wait_for_light, when_dark and when_light\
    \ events.\n\n# A Custom Complex Input Device\n\nThe LightSensor class is more\
    \ useful than it appears. As it detects the time it takes for a capacitor to discharge,\
    \ it can be used to measure resistance or capacitance. If the resistor is fixed\
    \ then the time depends on the value of the capacitor. If the capacitor is fixed\
    \ then the time depends on the value of the resistor. Any sensor that varies its\
    \ resistance or capacitance in response to external conditions can be used with\
    \ the LightSensor class. For example, a thermistor is a temperature-dependent\
    \ resistor and can be read using the LightSensor class.\n\nYou can create a presence\
    \ sensor by using a metal plate as one side of a capacitor. As people move closer\
    \ or further away its capacitance changes and hence you can use it with the LightSensor\
    \ class. This is the principle behind many touch sensitive switches.\n\nAs an\
    \ example, we can create a simple moisture sensor. You need to construct two metal\
    \ probes that can be stuck into the soil. The probes have to be non-corrosive\
    \ and we used a pair of metal kebab skewers held in place by being passed through\
    \ a plastic wire connector block, which also makes the task of connecting to the\
    \ skewers easy. The block also holds the skewers apart at a fixed distance and\
    \ makes putting them into the soil easier. Of course, the accuracy of measurement\
    \ depends on the contact with the soil and minimization of movement."
  merge: -1
  pgno: 114
- img_proc: true
  md: "The circuit is exactly the same as for the LightSensor, but with the resistor\
    \ replaced by the moisture sensor:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_115_0.png)\n\
    \nAs there is no difference between this and the LightSensor, you could just use\
    \ the LightSensor class to implement the moisture sensor. However, it is easy\
    \ to modify the name of LightSensor and change some of its methods:\n\n```\npython\n\
    from gpiozero import LightSensor\n\nclass Moisture(LightSensor):\n    def __init__(self,\
    \ pin=None, queue_len=5,\n                 charge_time_limit=0.01, threshold=0.1,\n\
    \                 partial=False, pin_factory=None):\n        super(Moisture, self).__init__(pin,\
    \ threshold=threshold,\n            queue_len=queue_len, charge_time_limit=charge_time_limit,\n\
    \            pin_factory=pin_factory)\n\nMoisture.wait_for_dry=Moisture.wait_for_light\n\
    Moisture.wait_for_wet=Moisture.wait_for_dark\nMoisture.when_dry=Moisture.when_light\n\
    Moisture.when_wet=Moisture.when_dark\n```\n\nThe only real difference is that\
    \ now the resistance of the soil can be in the range 100Ω to 500KΩ, or even higher,\
    \ depending on soil structure and the amount of contact and distance between the\
    \ probes. You can adjust for this by changing the size of the capacitor or you\
    \ can modify charge_time_limit, for example:\n\n```\npython\nmoisture = Moisture(4,\
    \ charge_time_limit = 0.5, threshold = 0.6)\nfor d in moisture.values:\n    print(d)\n\
    ```\n\nYou have to find the appropriate values of both parameters by experiment.\n\
    If you have a raw sensor that works in terms of resistance or capacitance then\
    \ the same procedure will produce a suitable class to work with it."
  merge: -1
