    # Chapter 10

    Pulse Width Modulation


    One way around the problem of getting a fast response from a microcontroller is
    to move the problem away from the processor. In the case of the Pi''s processor
    there are some built-in devices that can use GPIO lines to implement protocols
    without the CPU being involved. In this chapter we take a close look at pulse
    width modulation (PWM) including generating sound and driving LEDs.


    When performing their most basic function, i.e. output, the GPIO lines can be
    set high or low by the processor. How quickly they can be set high or low depends
    on the speed of the processor.


    Using the GPIO line in its Pulse Width Modulation (PWM) mode you can generate
    pulse trains up to 4.8MHz, i.e. pulses just a little more than 0.08μs. The reason
    for the increase in speed, a factor of at least 100, is that the GPIO is connected
    to a pulse generator and, once set to generate pulses of a specific type, the
    pulse generator just gets on with it without needing any intervention from the
    GPIO line or the processor. In fact, the pulse output can continue after your
    program has ended if you forget to reset it.


    Of course, even though the PWM line can generate pulses as short as 0.1μs, it
    can only change the pulses it produces each time that the processor can modify
    them. For example, you can''t use PWM to produce a single 0.1μs pulse because
    you can''t disable the PWM generator in just 0.1μs.


    Hardware-generated PWM sounds like a really good idea, and it is, but there is
    a problem. At the time of writing, none of the pin factories actually support
    the use of hardware for PWM. They all generate PWM signals using software although
    two pin factories, rpio and pigpio, use advanced methods that put minimum load
    on the CPU.


    At the moment the default pin factory, lgpio, supports only software-implemented
    PWM. While this means you can use any pin as a PWM output, the speed is limited
    by how much power the CPU can dedicate to the task.


    The alternatives offer some advantages and some big disadvantages as discussed
    in Chapter 6. pigpio uses DMA to generate PWM signals, but by making use of a
    daemon – a driver that runs all the time in the background. There are suggestions
    that this daemon isn''t 100% stable, it doesn''t support Pi 5 and support for
    Pi 4 is still experimental. However, the project does seem alive and well.'
  - '[PAGE 131]


    I would advise using rpigpio, the previous default pin factory if you can and
    if you really need high-speed PWM then I would suggest moving to C and working
    with the hardware directly. Here we will mostly ignore the hardware PWM features
    of the Pi. If you want to make use of them, see *Raspberry Pi IoT in C, 3rd Ed*:
    ISBN:9781871962840.


    # Some Basic Pi PWM Facts


    There are some facts worth getting clear right from the start, although their
    full significance will only become clear as we progress.

    First what is PWM? The simple answer is that a Pulse Width Modulated signal has
    pulses that repeat at a fixed rate, say, one pulse every millisecond, but the
    width of the pulse can be changed. There are two basic things to specify about
    the pulse train that is generated, its repetition rate and the width of each pulse.
    Usually the repetition rate is set as a simple repeat period and the width of
    each pulse is specified as a percentage of the repeat period, referred to as the
    duty cycle.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_131_0.png)


    So, for example, a 1ms repeat and a 50% duty cycle specifies a 1ms period, which
    is high for 50% of the time, i.e. a pulse width of 0.5ms.

    The two extremes are 100% duty cycle, i.e. the line is always high, and 0% duty
    cycle, i.e. the line is always low. The duty cycle is simply the proportion of
    time the line is set high. Notice it is the duty cycle that carries the information
    in PWM and not the frequency. What this means is that, generally, you select a
    repeat rate and stick to it and what you change as the program runs is the duty
    cycle.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_131_1.png)'
  - '[PAGE 132]


    In many cases PWM is implemented using special PWM-generating hardware that is
    either built into the processor chip or provided by an external chip. The processor
    simply sets the repeat rate by writing to a register and then changing the duty
    cycle by writing to another register. This generally provides the best sort of
    PWM with no load on the processor and, generally, glitch-free operation. You can
    even buy add-on boards that will provide additional channels of PWM without adding
    to the load on the processor.


    The alternative to dedicated PWM hardware is to implement it in software. You
    can quite easily work out how to do this. All you need is to set a timing loop
    to set the line high at the repetition rate and then set it low again according
    to the duty cycle. You can implement this either using interrupts or a polling
    loop and in more advanced ways, such as using a DMA (Direct Memory Access) channel.


    In the case of the Pi, the PWM lines are implemented using special PWM hardware
    but, as already mentioned, at the time of writing, none of the pin factories supports
    using hardware PWM. The standard RPi.GPIO factory supports software-implemented
    PWM on any GPIO pin and this is the factory used in the rest of this chapter.


    As you can guess, there are no PWM inputs, just output. If for some reason you
    need to decode, or respond to, a PWM input then you need to program it using the
    GPIO input lines and the pulse measuring techniques introduced in previous chapters.


    # Using PWM


    The direct way of using PWM is to create an instance of the PWMOutputDevice class,
    yet this is listed as a base class as if it wasn''t to be used in everyday programming.
    This couldn''t be further from the truth and, if you hope to do anything even
    slightly innovative you need to know about PWMOutputDevice. There is no real excuse
    as it is very easy to use.


    If you create an instance, using GPIO4 say:


    ```

    pwm=PWMOutputDevice(4)

    ```


    then there are just two important properties, frequency and value. The frequency
    property sets the PWM repeat rate and value sets the duty cycle as a fraction.
    For example:


    ```

    pwm.frequency=1000

    pwm.value=0.5

    ```


    sets a frequency of 1kHz and a duty cycle of 0.5, i.e. 50%.'
