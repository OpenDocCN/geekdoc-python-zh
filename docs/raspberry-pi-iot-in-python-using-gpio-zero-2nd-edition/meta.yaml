    \ the software."
- md: "## D-SUN PIR Motion Sensor\n\nInfrared motion detectors work by sensing a change\
    \ in the level of infrared radiation. The D-SUN PIR is a standard low-cost module,\
    \ but you can use any that follow the basic design with a three-pin connection\
    \ – Vcc, Ground and Data. The data line is set high when motion is detected. Different\
    \ devices have different controls for sensitivity and usually a setting for repeatable\
    \ or non-repeatable mode. In repeatable mode the output goes high when motion\
    \ is detected and the device is reset after a set time so that it is ready to\
    \ detect motion again. In non-repeatable mode the output is set high as long as\
    \ motion is detected.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_112_0.png)\n\
    \nTo use the device all you have to do is connect the Vcc pin to 5V, the ground\
    \ pin to ground and the data pin to the GPIO line you want to use.\n\nYou can\
    \ create a MotionSensor object using the constructor:\n`MotionSensor(pin, queue_len=1,\
    \ sample_rate=10, threshold=0.5, partial=False, pin_factory=None)`\n\nNotice that\
    \ the default for queue_len is 1, meaning that no smoothing is performed. To discover\
    \ if motion has been detected you can use value or motion_detected which compares\
    \ value to the threshold. You can also use the wait_for_motion, wait_for_no_motion,\
    \ when_motion and when_no_motion events.\n\n## Light Sensor\n\nThere are many\
    \ different types of light sensor, but the LDR, Light Dependent Resistor, is one\
    \ of the simplest.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_113_0.png)\n\n\
    As its name suggests, it simply changes its resistance according to how much light\
    \ falls on it. Using it to sense the light level is simply a matter of measuring\
    \ its resistance. This can be done directly, and you can also use the resistance\
    \ to change other physical properties of a system. For example, you can charge\
    \ a capacitor to a set voltage and then time how long it takes to discharge through\
    \ the resistor. This is how the `LightSensor` class works. You need to set up\
    \ the simple circuit shown below. What happens is that,\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_113_1.png)\n\
    \nwhen a reading is required, the GPIO line is set to low, which discharges the\
    \ capacitor. Then it is set to input, which allows the capacitor to charge through\
    \ the LDR. The GPIO line reads 0 until the capacitor has charged enough to make\
    \ it read 1. The time to read 1 is proportional to the resistance, which in turn\
    \ is proportional to the light falling on it. The only problem we have is that\
    \ different LDRs have different resistances and hence different charge times.\
    \ You can work out the charge times, but the simplest thing to do is to adjust\
    \ the time by trial and error.\n\nWhen you have the circuit connected to the GPIO\
    \ line of your choice, you can create a LightSensor object using the constructor:\n\
    \n```\nLightSensor(pin, queue_len=5, charge_time_limit=0.01,\n           threshold=0.1,\
    \ partial=False, pin_factory=None)\n```\n\nThe new element here is the charge_time_limit\
    \ which is the time in seconds it takes the capacitor to charge enough to change\
    \ the zero input to a one. The default should be close to the value you need,\
    \ but you might have to tune it by trial and error to the range of light inputs\
    \ that you want to work with, i.e. what you consider light and what you consider\
    \ dark. Also notice that by default five readings are taken. An LDR changes its\
    \ resistance slowly in response to a sudden light change. You can use the light_detected\
    \ property to see if the light exceeds the threshold or the value property to\
    \ measure the light level. You can also use the wait_for_dark, wait_for_light,\
    \ when_dark and when_light events.\n\n## A Custom Complex Input Device\n\nThe\
    \ LightSensor class is more useful than it appears. As it detects the time it\
    \ takes for a capacitor to discharge, it can be used to measure resistance or\
    \ capacitance. If the resistor is fixed then the time depends on the value of\
    \ the capacitor. If the capacitor is fixed then the time depends on the value\
    \ of the resistor. Any sensor that varies its resistance or capacitance in response\
    \ to external conditions can be used with the LightSensor class. For example,\
    \ a thermistor is a temperature-dependent resistor and can be read using the LightSensor\
    \ class.\n\nYou can create a presence sensor by using a metal plate as one side\
    \ of a capacitor. As people move closer or further away its capacitance changes\
    \ and hence you can use it with the LightSensor class. This is the principle behind\
    \ many touch sensitive switches.\n\nAs an example, we can create a simple moisture\
    \ sensor. You need to construct two metal probes that can be stuck into the soil.\
    \ The probes have to be non-corrosive and we used a pair of metal kebab skewers\
    \ held in place by being passed through a plastic wire connector block, which\
    \ also makes the task of connecting to the skewers easy. The block also holds\
    \ the skewers apart at a fixed distance and makes putting them into the soil easier.\
    \ Of course, the accuracy of measurement depends on the contact with the soil\
    \ and minimization of movement.\n\nThe circuit is exactly the same as for the\
    \ LightSensor, but with the resistor replaced by the moisture sensor:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_115_0.png)\n\
    \nAs there is no difference between this and the LightSensor, you could just use\
    \ the LightSensor class to implement the moisture sensor. However, it is easy\
    \ to modify the name of LightSensor and change some of its methods:\n\n```python\n\
    from gpiozero import LightSensor\n\nclass Moisture(LightSensor):\n    def __init__(self,\
    \ pin=None, queue_len=5,\n                 charge_time_limit=0.01, threshold=0.1,\n\
    \                 partial=False, pin_factory=None):\n        super(Moisture, self).__init__(pin,\
    \ threshold=threshold,\n            queue_len=queue_len, charge_time_limit=charge_time_limit,\n\
    \            pin_factory=pin_factory)\n\nMoisture.wait_for_dry=Moisture.wait_for_light\n\
    Moisture.wait_for_wet=Moisture.wait_for_dark\nMoisture.when_dry=Moisture.when_light\n\
    Moisture.when_wet=Moisture.when_dark\n```\n\nThe only real difference is that\
    \ now the resistance of the soil can be in the range 100Ω to 500KΩ, or even higher,\
    \ depending on soil structure and the amount of contact and distance between the\
    \ probes. You can adjust for this by changing the size of the capacitor or you\
    \ can modify charge_time_limit, for example:\n\n```python\nmoisture = Moisture(4,\
    \ charge_time_limit = 0.5, threshold = 0.6)\nfor d in moisture.values:\n    print(d)\n\
    ```\n\nYou have to find the appropriate values of both parameters by experiment.\n\
    \nIf you have a raw sensor that works in terms of resistance or capacitance then\
    \ the same procedure will produce a suitable class to work with it.\n\n## HC-SR04\
    \ Distance Sensor\n\nAn ultrasonic distance sensor works by sending out a pulse\
    \ of ultrasonic sound and timing how long it takes to detect an echo. There are\
    \ a number of similar modules on the market, but the HC-SR04 is common and inexpensive.\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_116_0.png)\n\nHowever, it needs to\
    \ work with 5V data lines and this means using a divider to shift the voltage\
    \ to 3.3V. A simpler solution is to use the HC-SR04P, which is nearly as cheap\
    \ and works at 3.3V.\n\nWhichever module you use, there are four connections Vcc,\
    \ Ground, Trig (Trigger) and Echo. You have to connect each of Trig and Echo to\
    \ a GPIO line. The basic operation is that the Trig line is set high for a short\
    \ time and this causes the module to send a pulse. The Echo line goes high when\
    \ a reflected pulse is detected. The time between the two events gives you the\
    \ distance.\n\nThe constructor requires that you specify the two pins used as\
    \ the first two parameters:\n\n```\nDistanceSensor(echo, trigger, queue_len=30,\
    \ max_distance=1,\n    threshold_distance=0.3, partial=False, pin_factory=None)\n\
    ```\n\nNotice that readings are the smoothed average of 30 measurements – ultrasonic\
    \ distance measuring is very noisy. You can also specify a max_distance which\
    \ is use to scale the value parameter. The threshold_distance is used to specify\
    \ a “too close” event via\n\n- wait_for_in_range\n- wait_for_out_of_range\n- when_in_range\n\
    - when_out_of_range\n\nThe distance property gives an estimate of the current\
    \ distance from 0 to max_distance and value gives a scaled distance in the range\
    \ 0 to 1."
  mdcn: "## D-SUN PIR 运动传感器\n\n红外运动探测器通过感知红外辐射水平的变化来工作。D-SUN PIR 是一款标准的低成本模块，但你可以使用任何遵循基本设计、具有三针连接（Vcc、Ground\
    \ 和 Data）的模块。当检测到运动时，数据线会被设置为高电平。不同的设备具有不同的灵敏度控制，通常还有一个可重复或不可重复模式的设置。在可重复模式下，当检测到运动时输出变为高电平，设备在设定时间后重置，以便再次检测运动。在不可重复模式下，只要检测到运动，输出就保持高电平。\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_112_0.png)\n\n要使用该设备，你只需将 Vcc 引脚连接到\
    \ 5V，地线引脚连接到地，数据引脚连接到你想要使用的 GPIO 线。\n\n你可以使用构造函数创建一个 MotionSensor 对象：\n`MotionSensor(pin,\
    \ queue_len=1, sample_rate=10, threshold=0.5, partial=False, pin_factory=None)`\n\
    \n请注意，`queue_len` 的默认值为 1，这意味着不执行平滑处理。要发现是否检测到运动，你可以使用 `value` 或 `motion_detected`，后者将\
    \ `value` 与阈值进行比较。你还可以使用 `wait_for_motion`、`wait_for_no_motion`、`when_motion`\
    \ 和 `when_no_motion` 事件。\n\n## 光传感器\n\n光传感器有很多种类型，但 LDR（光敏电阻）是最简单的一种。\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_113_0.png)\n\
    \n顾名思义，它只是根据照射到其上的光量改变其电阻。使用它来感知光级只需测量其电阻即可。这可以直接完成，你也可以利用电阻来改变系统的其他物理属性。例如，你可以将电容器充电到设定电压，然后计时它通过电阻放电所需的时间。这就是\
    \ `LightSensor` 类的工作原理。你需要搭建如下所示的简单电路。其工作原理是，\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_113_1.png)\n\
    \n当需要读取时，GPIO 线被设置为低电平，这会使电容器放电。然后它被设置为输入模式，允许电容器通过 LDR 充电。GPIO 线读取 0，直到电容器充电足够使其读取为\
    \ 1。读取为 1 的时间与电阻成正比，而电阻又与照射到其上的光量成正比。我们唯一的问题是不同的 LDR 具有不同的电阻，因此充电时间也不同。你可以计算出充电时间，但最简单的方法是通过试错来调整时间。\n\
    \n当你将电路连接到你选择的 GPIO 线时，你可以使用构造函数创建一个 LightSensor 对象：\n\n```\nLightSensor(pin,\
    \ queue_len=5, charge_time_limit=0.01,\n           threshold=0.1, partial=False,\
    \ pin_factory=None)\n```\n\n这里的新元素是 `charge_time_limit`，它是电容器充电足够将零输入变为一所需的时间（以秒为单位）。默认值应该接近你需要的值，但你可能需要通过试错来调整它，以适应你想要处理的光输入范围，即你认为什么是光，什么是暗。还要注意，默认情况下会进行五次读取。LDR\
    \ 在响应突然的光变化时会缓慢改变其电阻。你可以使用 `light_detected` 属性查看光是否超过阈值，或使用 `value` 属性测量光级。你还可以使用\
    \ `wait_for_dark`、`wait_for_light`、`when_dark` 和 `when_light` 事件。\n\n## 自定义复杂输入设备\n\
    \nLightSensor 类比它看起来更有用。因为它检测电容器放电所需的时间，所以它可以用来测量电阻或电容。如果电阻是固定的，那么时间取决于电容器的值。如果电容器是固定的，那么时间取决于电阻的值。任何根据外部条件改变其电阻或电容的传感器都可以与\
    \ LightSensor 类一起使用。例如，热敏电阻是一种温度依赖性电阻，可以使用 LightSensor 类来读取。\n\n你可以通过使用金属板作为电容器的一侧来创建存在传感器。当人们靠近或远离时，其电容会发生变化，因此你可以将其与\
    \ LightSensor 类一起使用。这是许多触摸感应开关背后的原理。\n\n举个例子，我们可以创建一个简单的湿度传感器。你需要制作两个可以插入土壤的金属探针。探针必须是耐腐蚀的，我们使用了一对金属烤肉签，通过穿过塑料电线连接块来固定，这也使得连接签子变得容易。该块还将签子保持在固定距离分开，并使它们更容易插入土壤。当然，测量的准确性取决于与土壤的接触以及最小化移动。\n\
    \n电路与 LightSensor 完全相同，只是用电阻替换为湿度传感器：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_115_0.png)\n\
    \n由于这与 LightSensor 没有区别，你可以直接使用 LightSensor 类来实现湿度传感器。然而，很容易修改 LightSensor 的名称并更改其一些方法：\n\
    \n```python\nfrom gpiozero import LightSensor\n\nclass Moisture(LightSensor):\n\
    \    def __init__(self, pin=None, queue_len=5,\n                 charge_time_limit=0.01,\
    \ threshold=0.1,\n                 partial=False, pin_factory=None):\n       \
    \ super(Moisture, self).__init__(pin, threshold=threshold,\n            queue_len=queue_len,\
    \ charge_time_limit=charge_time_limit,\n            pin_factory=pin_factory)\n\
    \nMoisture.wait_for_dry=Moisture.wait_for_light\nMoisture.wait_for_wet=Moisture.wait_for_dark\n\
    Moisture.when_dry=Moisture.when_light\nMoisture.when_wet=Moisture.when_dark\n\
    ```\n\n唯一的真正区别是现在土壤的电阻范围可能在 100Ω 到 500KΩ 之间，甚至更高，具体取决于土壤结构以及探针之间的接触量和距离。你可以通过改变电容器的大小来调整，或者你可以修改\
    \ `charge_time_limit`，例如：\n\n```python\nmoisture = Moisture(4, charge_time_limit\
    \ = 0.5, threshold = 0.6)\nfor d in moisture.values:\n    print(d)\n```\n\n你必须通过实验找到两个参数的适当值。\n\
    \n如果你有一个基于电阻或电容工作的原始传感器，那么相同的过程将产生一个适合与之配合使用的类。\n\n## HC-SR04 距离传感器\n\n超声波距离传感器通过发送超声波脉冲并计时检测回声所需的时间来工作。市场上有许多类似的模块，但\
    \ HC-SR04 常见且价格低廉。\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_116_0.png)\n\n\
    然而，它需要与 5V 数据线一起工作，这意味着需要使用分压器将电压转换为 3.3V。一个更简单的解决方案是使用 HC-SR04P，它几乎同样便宜，并且可以在\
    \ 3.3V 下工作。\n\n无论你使用哪种模块，都有四个连接：Vcc、Ground、Trig（触发）和 Echo。你必须将 Trig 和 Echo 分别连接到一个\
    \ GPIO 线。基本操作是将 Trig 线设置为高电平一小段时间，这会导致模块发送一个脉冲。当检测到反射脉冲时，Echo 线变为高电平。两个事件之间的时间给出了距离。\n\
    \n构造函数要求你指定用作前两个参数的两个引脚：\n\n```\nDistanceSensor(echo, trigger, queue_len=30, max_distance=1,\n\
    \    threshold_distance=0.3, partial=False, pin_factory=None)\n```\n\n请注意，读数是\
    \ 30 次测量的平滑平均值——超声波距离测量噪声很大。你还可以指定一个 `max_distance`，用于缩放 `value` 参数。`threshold_distance`\
    \ 用于通过以下方式指定“太近”事件：\n\n- wait_for_in_range\n- wait_for_out_of_range\n- when_in_range\n\
    - when_out_of_range\n\n`distance` 属性给出从 0 到 `max_distance` 的当前距离估计值，`value` 给出\
    \ 0 到 1 范围内的缩放距离。"
