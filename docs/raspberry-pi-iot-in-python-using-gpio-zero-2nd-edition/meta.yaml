  md: "# TrafficLights\n\n```\nTrafficLights(red, amber, green, *, yellow=None,\n\
    \    pwm=False, initial_value=False, pin_factory=None)\n```\n\nThis controls a\
    \ simple traffic light device by specifying the pins that the red, amber and green\
    \ LEDs are connected to. You can control the lights using the red, amber, green\
    \ attributes. The attribute yellow can be used as an alternative name for amber.\
    \ You have to provide the code that changes the lights, e.g. green, red/amber,\
    \ red and so on. You can also use PWM to vary the brightness, but it isn't clear\
    \ why you might want to do this.\n\n# I/O Classes For Other devices\n\nThere are\
    \ also some classes that work with off-the-shelf boards made by a number of different\
    \ companies.\n\n# Energenie\n\n```\nEnergenie(socket=n, initial_value=False, pin_factory=None)\n\
    ```\n\nThe Energenie socket controller is an easy way of turning mains voltage\
    \ devices on and off. It makes use of a Pi-mote Hat to connect to an RF controlled\
    \ socket. It is important to notice that the Energenie system isn't standard and\
    \ it doesn't work with other smart sockets. The standard methods are off() and\
    \ on() and you can use the socket property to discover the socket number and value\
    \ to find the state.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_182_0.png)"
  merge: -1
  pgno: 182
