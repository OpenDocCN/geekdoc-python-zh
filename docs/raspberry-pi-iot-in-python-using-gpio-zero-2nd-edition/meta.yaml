- img_proc: true
  md: "The new Door class inherits from DigitalInputDevice, which is the class that\
    \ Button inherits from. Its __init__ function is a modified version of Button\
    \ __init__. The value function returns 0 or 1 according to the door being closed\
    \ or open respectively. Finally the names of the methods are changed to something\
    \ that relates to open and closed. You can also remove methods and properties\
    \ that are no longer appropriate, but in this case they are left for simplicity.\n\
    \nWith our new Door class we can write things like:\n\n```\ndoor = Door(4)\nwhile\
    \ True:\n    door.wait_for_open()\n    print(\"open\")\n    door.wait_for_close()\n\
    \    print(\"closed\")\n```\n\nThis is no different from using Button, but it\
    \ is easier to understand in the context of a door sensor.\n\nThis is so easy\
    \ to do that there is little reason not to create custom input classes for all\
    \ simple digital sensors.\n\n# Threading\n\nYou don't need to know about how this\
    \ works to use GPIO Zero, so feel free to skip this advanced section and return\
    \ to it if and when you need it.\n\nThreading isn't normally a topic covered in\
    \ connection with Python as it is relatively rarely needed. The GPIO Zero library,\
    \ however, makes a lot of use of threading to allow you to set event handlers\
    \ that are automatically called when something happens. For example, the Button\
    \ class has a when_pressed and a when_released attribute that can be assigned\
    \ to functions that are called when the events occur:\n\n```\ndef pressed():\n\
    \    print(\"Button pressed\")\n\ndef released():\n    print(\"Button released\"\
    )\n\nbutton.when_pressed = pressed\nbutton.when_released = released\n```\n\nEvent\
    \ handling in all of the GPIO Zero library is provided by a mixin – EventsMixin.\
    \ This has when_activated and when_deactivated properties which are the basis\
    \ for all event handling in GPIO Zero. This said, not a lot happens regarding\
    \ events in GPIO Zero. In fact, all that you can do is to store references to\
    \ functions in the properties and then your program simply carries on running.\
    \ The actual implementation of the event is done by the pin factories and their\
    \ pin objects. After all, it is only a pin object that can"
  merge: -1
