  md: '# Summary


    +   - Python is an easy language to get started with, but this makes it possible
    to miss that it is an object-oriented language.

    - After using Python for a while, beginners often have to go back and discover
    what makes Python object-oriented when they first encounter, and want to use and
    understand, an object-oriented library like GPIO Zero.

    - Objects are packages of data and code that are related. The methods work on
    the data stored in the objects.

    - Object-oriented code starts from the idea that you can convert object.method()
    into method(object). The self parameter is used to perform this transformation
    in Python.

    - An object is created as an instance of a class, which can be thought of as the
    specification for an object.

    - To create your own classes you need the class keyword. You also need to use
    the __init__ magic method to create data attributes.

    - One class, the derived class, can inherit all of the methods and attributes
    of another class, the base class. This allows for code reuse if a new class is
    essentially just an elaboration of an existing class.

    - Derived classes have to ensure that that their base class instances are properly
    constructed and this usually involves calling the __init__ method of the base
    class using the super function.

    - Python supports multiple inheritance where a derived class can inherit the properties
    and methods of multiple base classes. This can create problems if the base classes
    share attributes or methods with the same name.

    - The mixin is a special, and simple, case of multiple inheritance where all that
    is required is to give a class a set of helper methods.

    - Python doesn''t have virtual classes, which simply act as definitions for the
    minimum set of properties a derived class has to have, but these can be easily
    simulated.

    - Data attributes are simple, but often you need to perform some processing on
    a value when it is accessed. The best way to do this in Python is to use properties.'
  merge: -1
