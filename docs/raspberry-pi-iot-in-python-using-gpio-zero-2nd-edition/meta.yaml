    ```\n\nthe stability of the half step time improves:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_172_0.png)\n\
    \nYou can see now that, at the same frequency, the half step time varies from\
    \ 1.32 to 1.49 ms, which produces a smoother rotation.\n\nThere are many other\
    \ improvements that can be made to StepperBi4 – additional methods for continuous\
    \ rotation, a reverse method and so on, but this is all you need to use a stepper\
    \ motor. You can also produce custom classes for other types of motor. All you\
