  md: '# Chapter 1

    Why Pi For IoT?


    The Raspberry Pi is a different sort of IoT computer. It isn''t a small, cheap,
    but not-very-powerful, device – it is a cheap, but **more** powerful device. Running
    a full version of Linux and being supported by many different languages, it means
    that we are no longer restricted to assembler or C. Of the many higher-level languages
    available, Python is probably the most popular. The whole idea of writing IoT-style
    programs in Python is relatively new and it has its advantages and disadvantages.
    Python is slow to react, but powerful when roused. It takes time to do simple
    things like notice that a button has been pressed, but it makes implementing complex
    algorithms easier.


    This really is a new approach to the IoT and the Raspberry Pi is ideal for the
    task.


    In this short chapter, we will take a look at the range of devices that are available
    in the Pi family and the reasons for selecting one rather than another to do particular
    jobs. The term IoT - Internet of Things - has become very popular and tends to
    be used in place of older terms such as embedded processing, micro-controllers
    and newer terms such as physical computing. The ideas, however, are related and
    in the rest of this book the term IoT will be used to mean a system being used
    to interface with the real world, usually via custom electronics, even if the
    Internet isn''t explicitly involved.


    # The Raspberry Pi Or A Microcontroller?


    Compared to the Pi, the Arduino and any similar microcontroller is a very low-powered
    computer. The basic Arduino isn''t capable of running Linux, which is a full operating
    system. It simply runs the one program you have written for it. However, the Arduino
    and similar devices have a big advantage – they have dedicated, usually analog,
    I/O lines. The Pi doesn''t have the same variety of I/O lines, but it has enough
    for many jobs and it can be easily expanded with the use of standard expansion
    boards called HATs (Hardware Attached on Top) because of the way they plug in.
    Some HATs are so commonly used that they are considered more or less standard
    and have their own Linux drivers.'
  merge: -1
  pgno: 10
- img_proc: true
  md: 'To make the difference plain, you can use a Pi for almost any job that a desktop
    computer can do, including any server role. An Arduino, on the other hand, isn''t
    up to this sort of work. Sometimes the fact that the Pi is a full computer makes
    it even more suitable for low-level jobs. For example, you want a new door bell?
    Why not use a Pi and have it say hello using a voice synthesizer.


    In short, the Pi gives you more computing power for less money.

    Everything isn''t perfect with the Pi and the IoT. In particular, the use of Linux
    means that you can no longer pretend your program is the only program running.
    Linux is a multitasking operating system and it can suspend any program at any
    time to give another program a chance to run. If you are familiar with microcontroller
    programming then it will come as something of a shock that you do not have complete
    control of the machine. What is more, Linux isn''t the easiest operating system
    to get to grips with if you are a beginner.


    All of these problems and more can be overcome with a little work and it is worthwhile.
    The Pi is a fast and capable IoT computer and would still be a good choice even
    if it cost a lot more. We are entering a new era of embedded computing when the
    device that runs your washing machine is as powerful as your desktop computer.


    # Which Raspberry Pi?


    The Raspberry Pi family has grown over the years and it can be difficult to keep
    track of the differences between the models. As far as the IoT goes, while you
    can use an early Pi 1 or Pi 2, it is much better not to. The modern range of devices
    is more powerful and if you are starting a new project it is better to use one
    of the current models. This said, the very latest Pi 5 is more expensive than
    the Pi 4, which is in turn more expensive than the Pi 3 and they are all currently
    available. They are also available with different amounts of memory and this is
    not something you can upgrade without a soldering iron and plenty of skill – and
    not recommended even then.


    Cost rather than computing power can be an issue in an IoT project and while you
    cannot completely write off earlier models if you have them on hand, the Pi Zero
    range is low-cost. The later models


    All this makes choosing a Pi difficult. My best advice is to use the fastest and
    most powerful Pi you can for development and when you have something working see
    what computing power is actually needed before deploying the finished program.'
  merge: -1
  pgno: 11
- img_proc: true
  md: '# Pi Zero Range


    The smallest in the Raspberry Pi family, and the cheapest at $10, is the Pi Zero
    which is about half as fast as a Pi 3, ten times slower than the Pi 4 and twenty
    times slower than the Pi 5. Even though it isn''t as powerful, it is often sufficient
    for IoT tasks and wins on price and power use. The Pi Zero only has a single USB
    connector and no networking. The Pi Zero W, more expensive at $15, has onboard
    WiFi and if you want a connected device it is the obvious choice.


    Both the Pi Zero and the Pi Zero W have a single-core CPU, which means your program
    will be interrupted by the operating system to keep the device working. In many
    applications this doesn''t matter, but if it does then the latest in the family,
    the Pi Zero 2W has a quad-core CPU, costs the same as the Pi Zero W and otherwise
    has the same specification. It is based on the same CPU as the Pi 3 and has a
    very similar overall architecture.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_12_0.png)


    *Pi Zero – small and low cost* *Pi Zero W – with WiFi* *Pi Zero 2W - four cores*


    | Pi Zero | Pi Zero W | Pi Zero 2W |

    | :--- | :--- | :--- |

    | No WiFi | 802.11 b/g/n wireless LAN | 802.11 b/g/n wireless LAN |

    | No Bluetooth | Bluetooth 4.1 | Bluetooth 4.2 |

    | No Bluetooth | Bluetooth Low Energy (BLE) | Bluetooth Low Energy (BLE) |

    | 1GHz, single-core CPU | 1GHz, single-core CPU | 1GHz, quad-core CPU |

    | 512MB RAM | 512MB RAM | 512MB RAM |

    | No Ethernet | No Ethernet | No Ethernet |

    | Micro USB | Micro USB | Micro USB |'
  merge: -1
  pgno: 12
- img_proc: true
  md: '# Going Beyond The Pi Zeros


    The original Raspberry Pis were available as an A or a B sub-type. The As lacked
    multiple USB connectors and a wired network connection and so were slightly cheaper.
    Since the Pi 4 there has only been the B version.

    Another confusing factor is that when the Pi 3 was upgraded to have a quad-core
    processor, making it slightly faster, and doubling its memory, the two models
    were the Pi 3A+ and Pi 3B+.

    These are the only members of the Pi 3 range still readily available and in terms
    of price only the 3A+, costing $25, has any advantage as the 3B+ at $35 costs
    the same as a Pi 4 B with the same amount (1GB) of memory.


    | Pi 3A+ |

    | --- |

    | 802.11 b/g/n/ac wireless LAN 2.4 GHz and 5.0 GHz |

    | Bluetooth 4.2 |

    | Bluetooth Low Energy (BLE) |

    | 1.4GHz, quad-core CPU 64-bit CPU |

    | 512MB RAM |

    | One USB 2 port |

    | No Ethernet |


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_13_0.png)


    Until the arrival of the Pi 5, the Pi 4 was the fastest Pi available. The cheapest
    version with 1GB of RAM is the same price as a 3B+ ($35). At the top end of the
    range the 8GB version costs $75, which is starting to be expensive for IoT applications
    – even so you get a lot of computing power for the money. It also supports dual
    HDMI monitors, making it ideal for development purposes. You can also buy a P400
    ($70) which is a Pi 4 with 4GB of RAM built into a keyboard, ready to use as a
    desktop computer.'
  merge: -1
  pgno: 13
- img_proc: true
  md: '| Pi 4 |

    | --- |

    | 802.11 b/g/n/ac wireless LAN 2.4 GHz and 5.0 GHz |

    | Bluetooth 4.2 |

    | Bluetooth Low Energy (BLE) |

    | 1.8 GHz, quad-core 64-bit CPU |

    | 1, 2, 4 or 8 GB RAM |

    | USB 2 and 3 |

    | Gigabit Ethernet |


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_14_0.png)


    The Pi 5 is currently the top of the range. Its specifications don''t really tell
    the whole story. It has improved I/O connectivity, which speeds up the USB and
    Ethernet. It is roughly twice as fast as the Pi 4 and costs $60 with 4GB of RAM
    and $80 for 8GB. Although it represents excellent value, $60 per unit is starting
    to sound expensive for IoT deployments. It is still worth considering using one
    for software development, even if the application eventually ends up running on
    a less powerful device.


    | Pi 5 |

    | --- |

    | 802.11 b/g/n/ac wireless LAN 2.4GHz and 5GHz. |

    | Bluetooth 5 |

    | Bluetooth Low Energy (BLE) |

    | 2.4GHz, quad-core CPU |

    | 4 or 8GB RAM |

    | Gigabit Ethernet |

    | USB 3 |


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_14_1.png)


    The use of a custom interface chip, the RP1, makes the Pi 5 incompatible with
    all previous Pis from the point of view of peripherals including the GPIO lines.
    If you use GPIO Zero then any differences are hidden by the use of Linux drivers
    which iron out the differences between the Pi 5 and the rest of the range.'
  merge: -1
  pgno: 14
- img_proc: true
  md: 'At the time of writing there is no indication of when a P500 self-contained
    computer version is likely to launch.

    The Compute Module 4, CM4, is a cut down Pi 4. All of the external connectors
    have been removed and signals are only available on a high density connector on
    the bottom of the board. This is a full Pi 4 and the software you write for a
    main Pi model needs little, if any, change to run on it, but you will need to
    design a PCB motherboard for it to use to connect to the outside world. At the
    moment there is no CM5, but one is in the works and should be available sometime
    in 2024.

    The Compute Module is only necessary if you are planning to develop hardware to
    complement the Pi as well as custom software.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_15_0.png)


    *The CM4*


    # ## The Raspberry Pi Pico


    Despite its name, the Pico isn''t in the same family as either the Pi Zeros or
    the Pi 3/4/5s. It is a small device about the same size as the Pi Zero, but it
    is very different in that it uses a custom, two-core, CPU and doesn''t run Linux.
    If you plan to create an IoT program that doesn''t need Linux, then you are probably
    much better off moving to the Pico. It is low-cost and powerful and the fact that
    it doesn''t host an operating system often makes developing code easier than trying
    to fit in with the way an operating system works. On the other hand, if you want
    local user interaction by way of a display, keyboard, touch screen, mouse, etc,
    then the Pico might not be the right choice.

    In short, the Pico is a microcontroller capable of sensing and control tasks and
    communicating via the network, whereas those in the Pi family are full computers
    running Linux capable of sensing and control tasks. The book to get you started
    with the Pico is *Programming The Raspberry Pi Pico/W in MicroPython, 2nd Ed,
    ISBN:9781871962796*,


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_15_1.png)


    *The Pico W*'
  merge: -1
  pgno: 15
- img_proc: true
  md: '# Pi OS


    One additional complication is the choice of operating system for the Pi. The
    latest Pi OS is based on Debian Bookworm and is available in 32- and 64-bit versions
    for the Pi 4 and 5. For all the other Pis, currently the only OS available is
    the “legacy” Debian Bullseye. It is possible that Bookworm will become available
    on these “smaller” Pis in the future, but the main differences between the two
    aren’t important. A bigger difference affects any program planning to make use
    of graphics. Bookworm has taken the big step of using Wayland in place of the
    X graphics system that Bullseye uses. In most cases you can isolate your programs
    from this change by using a suitable graphics library, but if you plan to interact
    at a low level with graphics you need to find out more about Wayland.


    As far as GPIO Zero goes there is no essential differences between the two operating
    system versions.


    # What To Expect


    There are no complete projects in this book – although some examples come very
    close and it is clear that some of them could be used together to create finished
    projects. The focus here is on learning how things work so that you can move on
    and do things that are non-standard. What matters is that you can reason about
    what the processor is doing and how it interacts with the real world in real time.
    This is the key difference between desktop and embedded programming: timing matters
    in embedded programming, but not so much in desktop programming.


    This is a book about understanding the general principle and making things work.
    If you read to the end of this book you will have a good understanding of what
    is going on when you make use of a range of different types of interfacing that
    typically go together to make a complete system.


    # What Do You Need?


    To follow the examples in this book you will need either a Pi Zero/W/2W or a Pi
    3/4/5. You can use an earlier Pi as long as you make allowances for the difference
    in pin assignments and other minor hardware changes.


    It is also worth knowing that while the Pi 4 and Pi 5 are capable of running a
    development environment and running IoT programs, the Pi Zero makes things hard
    work. If you want the simplicity of local development, discussed in Chapter 2,
    use a Pi 4 or 5.


    Whichever model of Pi you use, you need it set up with Pi OS, the new name for
    Raspbian, and you need to know how to connect to it and use it via a serial console.
    You also need to be comfortable with Linux in the sense that while you might not
    know how to do something, you know how to look'
  merge: -1
