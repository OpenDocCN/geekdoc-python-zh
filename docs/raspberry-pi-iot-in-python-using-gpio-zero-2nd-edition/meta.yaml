- img_proc: true
  md: 'It is important to realize that the pressed and released functions are called
    asynchronously – i.e. not synchronized with anything happening in the program.
    This may be true, but Python only allows one thing to happen at a time and there
    is no parallelism implied by this form of programming. What happens is that a
    new thread of execution is started and this simply waits until the event occurs.
    When the event occurs the event handler is run. When the event handler is run
    the rest of your program is halted. Python is constructed so as to only allow
    one part of your Python code to execute at any one time. This is the so-called
    Global Interpreter Lock or GIL and it means you cannot take advantage of multiple
    cores to run your Python programs in parallel. Instead the operating system chooses
    which thread to run at any given time. The thread that is waiting for the event
    is only started if the event it is waiting for has occurred and then it gets a
    chance to run the event handler. While the event handler is running you can be
    sure that no other part of the Python program is running.


    You may be attracted by the idea of event handling. It is easy and this makes
    it great for beginners. Just write what you want to happen when a button is pressed
    or released and then get on with the rest of your program. No polling loop and
    no waiting. It is useful for the beginner, but it isn''t a good way to organize
    things in the long run. The problem is that it is the pin factories that are responsible
    for implementing the event handling and they do this in different ways. As already
    discussed in connection with general interrupts and events, this approach slows
    the overall system down and creates problems when events occur at too fast a rate.
    For example, the pressed event handler can be interrupted by a release event and
    the release function will run before the press function ends. If a new button
    press happens after the release, then the press function is run a second time,
    even if the first call to it is still running. However, the subsequent release
    function isn''t called until the first press function finishes. This is a mess!
    Exactly what happens when multiple events occur depends on the pin factory that
    is providing the service and this too is unsatisfactory in that you can''t know
    what will happen.


    In conclusion, using event handling in GPIO Zero is an easy way to produce a demo
    or get started, but it isn''t a good way to implement anything beyond the very
    simple.'
  merge: -1
  pgno: 98
- img_proc: true
  md: "This is the big problem with asynchronous code that doesn't use a queue to\
    \ ensure that multiple events are handled correctly and in the correct order.\n\
    If events and asynchronous code aren't the way to do the job what is? The simple\
    \ answer is the polling loop, but putting order into the polling loop so that\
    \ it is clean and easy to extend is difficult.\nIf you are happy with events and\
    \ basic polling loops skip the next section, which describes a way to organize\
    \ polling loops so that they are easier to work with.\n\n# Finite State Machines\n\
    \nIf you are working with an application that requires that you deal with a complex\
    \ set of input and output lines then you need an organizing principle to save\
    \ you from the complexity. When you first start writing IoT programs that respond\
    \ to the outside world, you quickly discover that all of your programs take a\
    \ similar form:\n\n```\nwhile True:\n    wait for some input lines\n    process\
    \ the input data\n    write some output lines\n    wait for some input lines\n\
    \    read some more input lines\n    write some output lines\n```\n\nFor most\
    \ programmers this is a slightly disturbing discovery because programs are not\
    \ supposed to consist of infinite loops, but IoT programs nearly always, in principle\
    \ if not in practice, take the form of an infinite polling loop. Another, and\
    \ more important problem, is that the way in which reading and writing GPIO lines\
    \ is related can be very complex. So much so that it can be difficult to work\
    \ out exactly when any particular line is read and when it is written.\nWe have\
    \ already seen that events and interrupts are not a good alternative and the polling\
    \ loop is a really good option, but a simple polling loop needs organization if\
    \ it is to avoid evolving into something too complex to be understood.\nSo how\
    \ should you organize a polling loop so that what it does is self-evident by looking\
    \ at the code?\nThere are many answers to this according to the system being implemented,\
    \ and there are no “pure” theoretical answers that solve all problems, but the\
    \ finite state machine, FSM, is a model every IoT programmer should know.\nA finite\
    \ state machine is a very simple program. At any given time, the machine (program)\
    \ has a record of the current state S. At a regular interval, the external world\
    \ provides an input I which changes the state from S to S’ and produces an output\
    \ O. That’s all there is to an FSM. There are variations"
  merge: -1
  pgno: 99
- img_proc: true
  md: 'on the definition, but this one, referred to as a Mealy machine because its
    outputs depend on both its state and the input, is most suitable for IoT programming.


    Your program simply needs to take the form of a polling loop that implements an
    FSM. It reads the input lines as I and uses this and the current state S to determine
    the new state S'' and the output O. There is some overhead in using this organization,
    but it is usually worth it. Notice that this organization implies that you read
    input once, make changes once, and set outputs once in the loop.


    # FSM Ring Counter


    It is difficult to find a good example of using an FSM to control devices because
    the advantages only really become apparent when things start getting complicated
    and complication is not the ideal ingredient in an example.


    A very common input configuration is the ring counter. A ring counter moves on
    to a new output each time it receives an input and repeats when it reaches the
    last output. For example, if you have three output lines connected to three LEDs
    then initially LED 0 is on, when the user presses the button LED 1 is on and the
    rest off, the next user-press moves on to LED 2 on and another press turns LED
    0 on. You can see that, as the user keeps pressing the button, the LEDs go on
    and off in a repeating sequence.


    A common FSM implementation of a ring counter has a state for each button press
    and release for each LED being on. For three LEDs this means six states and this
    has disadvantages. A better idea is to have three states 0, 1 and 2 corresponding
    to which LED is on. The only complication is that we only want the state to change
    when the button is pressed, not when it is held or released. The solution to this
    is to form a “delta”, i.e. the change in the measurement from one polling to the
    next. This is also often thought of and described as an “edge”. You can see why
    if you think of the plot of the level of the GPIO line. When pressed and released
    the line changes from high to low and there is either a rising or a falling edge
    in the signal. We are not so much interested in the current level, but the change
    from high to low, a falling edge, or the change from low to high, a rising edge.
    In this case we can easily implement software edge detection by taking the difference
    between readings on two different occasions. A rising edge gives a result of one
    and a falling edge gives a result of minus one.


    In general we want events to be as localized in time as possible and this is the
    reason that differences in the system are so often used.'
  merge: -1
  pgno: 100
- img_proc: true
  md: "Implementing all of this is fairly easy:\n\n```\nfrom gpiozero import Button\n\
    from gpiozero import LED\nfrom time import sleep\n\nbutton = Button(4)\nled1=LED(17,initial_value=True)\n\
    led2=LED(27)\nled3=LED(22)\n\nstate=0\nbuttonState=button.value\nwhile True:\n\
    \    buttonNow=button.value\n    buttonDelta=buttonNow-buttonState\n    buttonState=buttonNow\n\
    \    if state==0:\n        if buttonDelta==1:\n            state=1\n         \
    \   led1.off()\n            led2.on()\n            led3.off()\n\n        continue\n\
    \    if state==1:\n        if buttonDelta==1:\n            state=2\n         \
    \   led1.off()\n            led2.on()\n            led3.off()\n        continue\n\
    \    if state==2:\n        if buttonDelta==1:\n            state=0\n         \
    \   led1.on()\n            led2.off()\n            led3.off()\n        continue\n\
    \    sleep(0.1)\n```\n\nFirst we set up the LEDs and single Button with led1 on,\
    \ i.e. we set things up in state 0. Next we start the polling loop which contains\
    \ an if statement for each of the states. Each if statement tests the buttonDelta,\
    \ which is only 1 when the button has changed state from released, i.e. 0, to\
    \ pressed, i.e. 1. If the button is pressed then the state is moved on to the\
    \ next value, i.e. 0→1, 1→2 and 2→0, and the LEDs are set to the appropriate values.\
    \ If you try this out you will find that the LEDs do light up sequentially on\
    \ each button press."
  merge: -1
  pgno: 101
- img_proc: true
  md: "You might think this is more complex than a more “direct” implementation, but\
    \ it is much easier to extend to more complex situations. Ideally, the names of\
    \ the states that we use shouldn’t refer to inputs or outputs, but to the overall\
    \ state of the system. For example, if you were using a Pi to control a nuclear\
    \ reactor you might use a state “CoreMeltdown” in preference to “TempSensorOverLimit”.\
    \ States should be about the consequence of the inputs and the outputs should\
    \ be the consequence of the current state. In the above example the inputs and\
    \ output are too simple to give rise to an abstract concept of “state”.\n\nNotice\
    \ that the polling loop is set up so that the whole thing repeats every 100ms.\
    \ This provides a roughly fixed service time for the sensors. In general, an FSM\
    \ polling loop takes the following form:\n\n+   1. An initial reading and processing\
    \ of the sensors to determine the inputs for this pass through the loop.\n2. A\
    \ set of conditionals which select each possible state.\n3. Each state has a set\
    \ of conditions which change the state and determine the output based on the inputs.\n\
    \n# How Fast Can We Measure?\n\nThe simplest way to find out how quickly we can\
    \ take a measurement is to perform a pulse width measurement. By applying in square\
    \ wave to GPIO4, i.e. pin 7, we can measure the time that the pulse is high using:\n\
    \n```\nfrom gpiozero import Button\nfrom time import perf_counter_ns\n\nbutton\
    \ = Button(4)\nwhile True:\n    button.wait_for_press()\n    button.wait_for_release()\n\
    \    t1=perf_counter_ns()\n    button.wait_for_press()\n    t2=perf_counter_ns()\n\
    \    print((t2-t1)/1000000)\n```\n\nThis first waits for Button to be pressed,\
    \ which means the input has gone low. Then we wait for Button to be released,\
    \ which means the line has gone high, and take the time. Next we wait for the\
    \ press again which means the line has gone low, again taking the time, and the\
    \ time difference gives the time the line was high for. If you try this out and\
    \ feed the input line a square wave from a signal generator, what you will find\
    \ is that the timings are accurate up to 300Hz on a Pi Zero, 6kHz on a Pi 5 and\
    \ to 2kHz on a Pi 4. After this they become increasingly unreliable as transitions\
    \ are missed. Eventually the GPIO Zero implementation of the wait function fails\
    \ as the state changes while it is being executed."
  merge: -1
  pgno: 102
- img_proc: true
  md: "The wait_for_ methods aren't very efficient and using a simple read of the\
    \ button's state is slightly faster:\n\n```\nfrom gpiozero import Button\nfrom\
    \ time import perf_counter_ns\nbutton = Button(4)\nwhile True:\n    while not\
    \ button.value :pass\n    while button.value:pass\n    t1 = perf_counter_ns()\n\
    \    while not button.value :pass\n    t2 = perf_counter_ns()\n    print((t2-t1)/1000000)\n\
    ```\n\nUsing this method you can obtain speeds as high as 500Hz on a Pi Zero,\
    \ 9kHz on a Pi 5 and 10kHz on a Pi 4 if you can tolerate the occasional missed\
    \ pulse.\n\nNotice that in either case, if you try measuring pulse widths much\
    \ shorter than the lower limit that works, you will get results that look as if\
    \ longer pulses are being applied. The reason is simply that the Pi will miss\
    \ the first transition to zero, but will detect a second or third or later transition.\
    \ This is the digital equivalent of the aliasing effect found in the Fourier Transform\
    \ or general signal processing.\n\nHowever you look at it, the maximum input speed\
    \ of no more than 500Hz is low for any IoT system.\n\nIf you don't like the use\
    \ of Button as a general input line, because no button is involved, then, as we\
    \ aren't using any of the additional Button methods, you could create your own\
    \ custom class or simply use DigitalInputDevice:\n\n```\nfrom gpiozero import\
    \ DigitalInputDevice\nfrom time import perf_counter_ns\npulse = DigitalInputDevice(4)\n\
    while True:\n    while not pulse.value :pass\n    while pulse.value:pass\n   \
    \ t1=perf_counter_ns()\n    while not pulse.value :pass\n    t2=perf_counter_ns()\n\
    \    print((t2-t1)/1000000)\n```\n\nThis works at the same speed as the previous\
    \ version."
  merge: -1
  pgno: 103
- img_proc: true
  md: "If you want to try using the pin directly, you will see a big speedup:\n\n\
    ```\nfrom gpiozero import Device\nfrom time import perf_counter_ns\nDevice()\n\
    pulse = Device.pin_factory.pin(4)\npulse.input_with_pull(\"up\")\nwhile True:\n\
    \    while not pulse.state :pass\n    while pulse.state:pass\n    t1=perf_counter_ns()\n\
    \    while not pulse.state :pass\n    t2=perf_counter_ns()\n    print((t2-t1)/1000000)\n\
    ```\n\nThis uses the default pin factory, currently lgpio. If you try this out\
    \ you will find that a Pi Zero is reasonable up to 5kHz, a Pi5 works to 100kHz\
    \ and a Pi4 is reasonably reliable up to 200kHz.\n\nYou can see that for input\
    \ the overhead of running Python is all-important and this is the reason the Pi\
    \ 4/5 can handle a much faster rate of input. You need to keep in mind that all\
    \ of these measurements are “best case”.\n\n# A Custom Simple Input\n\nThe Button\
    \ class gives us just about everything we need to implement a simple input device,\
    \ but occasionally it provides too much and can be misleading. For example, a\
    \ reed switch really is just a simple switch, but it is controlled by a magnet.\
    \ Bring a magnet close to a reed switch and it closes, remove the magnet and it\
    \ opens. There is no sense in which the switch is pressed, released or held in\
    \ the usual sense – it is just open or closed.\n\nWhile you can simply use Button\
    \ to work with a reed switch it is worth creating a simple derived class which\
    \ looks more like a reed switch monitoring a door to its users. In this case the\
    \ “button” is pressed when the door is closed and released when the door is open:\n\
    \n```\nfrom gpiozero import DigitalInputDevice\nclass Door(DigitalInputDevice):\n\
    \    def __init__(self, pin=None, pull_up=True, active_state=None,\n         \
    \        bounce_time=None,pin_factory=None):\n        super(Door, self).__init__(\n\
    \            pin, pull_up=pull_up, active_state=active_state,\n            bounce_time=bounce_time,\
    \ pin_factory=pin_factory)\n    @property\n    def value(self):\n        return\
    \ super(Door, self).value\nDoor.is_closed = Door.is_active\nDoor.when_open = Door.when_deactivated\n\
    Door.when_closed = Door.when_activated\nDoor.wait_for_open = Door.wait_for_inactive\n\
    Door.wait_for_close = Door.wait_for_active\n```"
  merge: -1
