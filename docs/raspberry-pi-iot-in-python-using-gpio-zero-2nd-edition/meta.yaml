  md: "The only possibly confusing part is the use of `self` in the method definition.\
    \ If you refer back to the way a function is converted into a method then it should\
    \ make sense. In Python when you define a method you use `self` as the first parameter.\
    \ When you call the method, Python automatically sets `self` to the name of the\
    \ instance. That is:\n`myObject.myMethod()`\nis converted into:\n`myMethod(myObject)`\n\
    and hence `self` is set to `myObject`. This is the fundamental way that functions\
    \ become methods and is exactly how Python does it. It is worth noting that the\
    \ use of `self` is a convention and not enforced by the system. You could use\
    \ this in JavaScript/C++/Java-style, but your programs would be less readable\
    \ by another Python programmer.\n\nWe now have a basic way of adding method attributes\
    \ to an object, but how do we add data attributes? The key thing is that each\
    \ instance of a class has to have its own copy of the data attributes. The simplest\
    \ way to do this is to make use of the “magic” `__init__` method. It is one of\
    \ Python’s many “magic” methods which are used automatically by the system to\
    \ do fixed things. In this case the system automatically calls `__init__` whenever\
    \ you use a class to create an object. That is when you write:\n`myObject=MyClass()`\n\
    then any `__init__` method you may have defined in `MyClass` is called before\
    \ the object instance is complete.\n\nNow consider what happens if you write:\n\
    python\nclass MyClass:\n    def __init__(self):\n        self.myAttribute1=0\n\
    \nand then create an instance:\n`myObject=MyClass()`\nNow your custom `__init__`\
    \ is called and it creates a new attribute `self.myAttribute`. What do you think\
    \ `self` is set to? As in the case of calling a method, `self` is set to the object\
    \ being created, i.e. `myObject` in this case. The call to `__init__` is equivalent\
    \ to:\n`__init__(myObject)`\nand the attribute creation is the same as:\n`myObject.myAttribute1=0`"
