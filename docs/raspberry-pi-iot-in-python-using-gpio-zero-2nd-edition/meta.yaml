  - '[PAGE 237]


    Of course, you have to change the IP address, user name and the location of the
    key file to be correct for the machine you are trying to connect to. You can enter
    additional Host specifications for each machine you want to connect to.


    After this you should be able to connect and work with the remote Pi without providing
    a password when using VS Code. You can also just use:

    ssh pi@192.168.11.151

    at the command line.


    Notice that this is low security as we didn''t specify a passphrase to use with
    the private key. If you need security from the outside world, you need to create
    a key with a passphrase and then you need to use the SSH agent to supply it automatically.


    # Remote Python With VS Code


    The easiest way to implement remote development is to use the standard remote
    development add-ins for VS Code on a desktop machine. The programs you develop
    are stored on the remote machine, but you can work with them as if they were on
    the desktop machine. Ideally, you would like to keep the programs on the desktop
    machine and automatically download to the remote machine as required and this
    is what the alternative approach using VS Code tasks does, see later. Notice that
    VS Code remote development add-ins do not work on a Pi Zero, but the VS Code tasks
    work on all Pis.


    First install the up-to-date stable version of VS Code appropriate for the platform
    you are using from the VS Code website. It works under Windows, Debian and Mac
    OS. You can also find versions for other operating systems, but usually without
    installers.


    Once you have VS Code installed to run Python programs you first need to install
    the Microsoft Python extension which automatically installs Pylance:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_237_0.png)


    To run the remote development extension you need to have an OpenSSH client running
    on the development machine. Windows has its own version of OpenSSH client. You
    next need to install the remote development pack. You only need to install Remote
    SSH.'
