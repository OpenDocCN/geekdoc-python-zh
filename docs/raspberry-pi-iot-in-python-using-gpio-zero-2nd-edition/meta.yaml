  raw:
  - '[PAGE 76]


    One of the main reasons for understanding electrical flow is that you can use
    Ohm’s law to avoid damaging things. As a current flows through a resistor it gets
    hot. The rule here is that the energy produced is proportional to VI. If you double
    the current, you double the heating effect. Most electronic devices have current
    limits beyond which they are liable to fail. One of the basic tasks in designing
    any electronic circuit is to work out what the current is and, if it is too high,
    add a resistor or lower the voltage to reduce it. To do this you need a good understanding
    of the hydraulic model and be able to use Ohm’s law. There are examples later
    in this chapter.


    It is also worth pointing out that there are devices which do not obey Ohm’s law
    – so called non-Ohmic devices. These are the interesting elements in a circuit
    – LEDs, diodes, transistors and so on, but even these devices can be understood
    in terms of the flow of a fluid.


    This is a lightning introduction to electronics, pun intended, and there is much
    to learn and many mistakes to make, most of which result in blue smoke.


    # Electrical Drive Characteristics


    If you are not very familiar with electronics the important things to know are
    what voltages are being worked with and how much current can flow. The most important
    thing to know about the Pi is that it works with two voltage levels – 0V and 3.3V.
    If you have worked with other logic devices you might be more familiar with 0V
    and 5V as being the low and high levels. The Pi uses a lower output voltage to
    reduce its power consumption, which is beneficial, but you need to keep in mind
    that you may have to use some electronics to convert the 3.3V to other values.
    The same is true of inputs, which must not exceed 3.3V or you risk damaging the
    Pi.


    In output mode a single GPIO line can source and sink 16mA, but the situation
    is a little more complicated than this suggests.


    Unfortunately, the Pi power supply can only supply enough power for all of the
    GPIO lines working at around 3mA each. If you use too much current then the 3.3V
    supply will fail. The safe limit is usually stated as 50mA in total, i.e all of
    the GPIO lines have to keep their current consumption below a total of 50mA. When
    you get close to this limit you might find that current spikes cause strange behavior.
    In addition, no single GPIO line should supply or sink more than 8mA, or 16mA
    if you configure a high drive current, see later.'
  - '[PAGE 77]


    In practice, if you are planning to use more than 3mA from multiple GPIO lines,
    consider using a transistor. If your circuits draw more than 50mA from the 3.3V
    supply rail, consider a separate power supply. You can use the 5V supply with
    a regulator if you need even more 3.3V supply current. How much current the 5V
    pin can source is a difficult question that depends on the USB power supply in
    use, but 2A is a reasonable estimate if there are no other USB devices connected.
    The total of all USB, HDMI, Camera, and 5V pins has to be less than 2.5A. If in
    doubt use a separate power supply.


    Notice that the 16mA limit means that you cannot safely drive a standard 20mA
    red LED without restricting the current to below 16mA. A better solution is to
    use a low-power 2mA LED or use a transistor driver.


    # Driving an LED


    One of the first things you need to know how to do is compute the value of a current-limiting
    resistor. For example, if you just connect an LED across a GPIO line and ground
    then no current will flow when the line is low and the LED is off, but when the
    line is high at 3.3V it is highly likely that the current will exceed the safe
    limit. In most cases nothing terrible will happen as the Pi''s GPIO lines are
    rated very conservatively, but if you keep doing it eventually something will
    fail. The correct thing to do is to use a current-limiting resistor.


    Although this is an essential part of using an LED, it is also something you need
    to keep in mind when connecting any output device. You need to discover the voltage
    that the device needs and the current it uses and calculate a current-limiting
    resistor to make sure that is indeed the current it draws from the GPIO line.


    An LED is a non-linear electronic component – the voltage across it stays more
    or less the same irrespective of the current passing through the device. Compare
    this to a more normal linear, or “Ohmic”, device where the current and voltage
    vary together according to Ohm’s law, V =IR, which means that if the current doubles,
    so does the voltage.


    This is not how an LED behaves. It has a fairly constant voltage drop irrespective
    of the current. (If you are curious, the relationship between current and voltage
    for an LED is exponential, meaning that big changes in the current hardly change
    the voltage across the LED.) When you use an LED you need to look up its forward
    voltage drop, about 1.7V to 2V for a red LED and about 3V for a blue LED, and
    the maximum current, usually 20mA for small LEDs. You don’t have to use the current
    specified, this is the maximum current and maximum brightness.'
  - '[PAGE 78]


    To work out the current-limiting resistor you simply calculate the voltage across
    the resistor and then use Ohm''s law to give you the resistor you need for the
    current required. The LED determines the voltage and the resistor sets the current.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_78_0.png)


    A GPIO line supplies 3.3V and if you assume 1.6V, its forward voltage, across
    the LED that leaves 1.7V across the current-limiting resistor since voltage distributes
    itself across components connected in series. If we restrict the current to 8mA,
    which is very conservative, then the resistor we need is given by:


    R = V/I = 1.7/8 = 0.212


    The result is in kiloOhms, kΩ, because the current is in milliamps, mA. So we
    need at least a 212Ω resistor. In practice, you can use a range of values as long
    as the resistor is around 200Ω – the bigger the resistor the smaller the current,
    but the dimmer the LED. If you were using multiple GPIO lines then keeping the
    current down to 3mA would be better, but that would need a transistor.


    You need to do this sort of calculation when driving other types of output devices.
    The steps are always the same. The 3.3V distributes itself across the output device
    and the resistor in some proportion and we know the maximum current – from these
    values we can compute the resistor needed to keep the actual current below this
    value.'
  - '[PAGE 79]


    # LED BJT Drive


    Often you need to reduce the current drawn from a GPIO line and for this you can
    use a Bipolar Junction Transistor (BJT), a current amplifier which is low in cost
    and easy to use.


    A BJT is a three-terminal device - base, emitter and collector - in which the
    current that flows through the emitter/collector is controlled by the current
    in the base:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_79_0.png)


    The diagram shows an NPN transistor, which is the most common type. This diagram
    is a simplification in that, in reality, the current in the emitter is slightly
    larger than that in the collector because you have to add the current flowing
    in the base.


    In most cases, all you have to know are two additional facts. Firstly, the voltage
    on the base is approximately 0.6V, no matter how much current flows since the
    base is a diode, a nonlinear device just like the LED in the previous section.
    Secondly, the current in the collector/emitter is hfe or β (beta) times the current
    in the base. That is, hfe or beta is the current gain of the transistor and you
    look it up for any transistor you want to use. While you are consulting the data
    sheets, you also need to check the maximum currents and voltages the device will
    tolerate. In most cases, the beta is between 100 and 200 and hence you can use
    a transistor to amplify the GPIO current by at least a factor of 100.


    Notice that, for the emitter/collector current to be non-zero, the base has to
    have a current flowing into it. If the base is connected to ground then the transistor
    is “cut off”, i.e. no current flows. What this means is that when the GPIO line
    is high the transistor is “on” and current is flowing and when the GPIO line is
    low the transistor is “off” and no current flows.'
- md: 'This high-on/low-off behavior is typical of an NPN transistor. A PNP transistor
    works the other way round:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_80_0.png)


    The 0.6V is between the base and the collector and the current flows out of the
    base. What this means is that the transistor is off when the GPIO line is high
    and on when it is low.


    This complementary behavior of NPN and PNP BJTs is very useful and means that
    we can use such transistors in pairs. It is also worth knowing that the diagram
    given above is usually drawn with 0V at the top of the diagram, i.e. flipped vertically,
    to make it look the same as the NPN diagram. Always make sure you know where the
    +V line is.


    ## A BJT Example


    For a simple example we need to connect a standard LED to a GPIO line with a full
    20mA drive. Given that all of the Pi''s GPIO lines work at 3.3V and ideally only
    supply a few milliamps, we need a transistor to drive the LED which typically
    draws 20mA.


    You could use a Field Effect Transistor (FET) of some sort, but for this sort
    of application a BJT works very well and is available in a thru-hole mount, i.e.
    it comes with wires.


    Almost any general purpose NPN transistor will work, but the 2N2222 is very common.
    From its data sheet, you can discover that the max collector current is 800mA
    and beta is at least 50 which makes it suitable for driving a 20mA LED with a
    GPIO current of at most 20/50mA = 0.4mA.


    The circuit is simple but we need two current-limiting resistors:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_81_0.png)


    If you connected the base to the GPIO line directly then the current flowing in
    the base would be unrestricted – it would be similar to connecting the GPIO line
    to ground. R1 restricts the current to 0.39mA, which is very low and, assuming
    that the transistor has a minimum gain (hfe) of 50, this provides just short of
    20mA to power it.


    The calculation is that the GPIO supplies 3.3V and the base has 0.6V across it
    so the voltage across R1 is 3.3 - 0.6V = 2.7V. To limit the current to 0.4mA would
    need a resistor of 2.7/0.4kΩ = 6.7kΩ. The closest preferred value is 6.8kΩ which
    gives a slightly smaller current.


    Without R2 the LED would draw a very large current and burn out. R2 limits the
    current to 20mA. Assuming a forward voltage drop of 1.6V and a current of 20mA
    the resistor is given by (3.3-1.6)/20kΩ = 85Ω. In practice, we could use anything
    in the range 82Ω to 100Ω.


    The calculation just given assumes that the voltage between the collector and
    emitter is zero, but of course in practice it isn''t. Ignoring this results in
    a current less than 20mA, which is erring on the safe side. The data sheet indicates
    that the collector emitter voltage is less than 200mV.


    The point is that you rarely make exact calculations for circuits such as this,
    you simply arrive at acceptable and safe operating conditions. You can also use
    this design to drive something that needs a higher voltage. For example, to drive
    a 5V dip relay, which needs 10mA to activate it, you would use something like:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_82_0.png)


    Notice that in this case the transistor isn''t needed to increase the drive current
    – the GPIO line could provide the 10mA directly. Its purpose is to change the
    voltage from 3.3V to 5V. The same idea works with any larger voltage.


    If you are using the 2N2222 then the pinouts are:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_82_1.png)


    As always, the positive terminal on the LED is the long pin.


    ## MOSFET Driver


    There are many who think that the FET (Field Effect Transistor), or more precisely
    the MOSFET (Metal Oxide Semiconductor FET), is the perfect amplification device
    and we should ignore BJTs. They are simpler to understand and use, but it can
    be more difficult to find one with the characteristics you require.


    Like the BJT, a MOSFET has three terminals called the gate, drain and source.
    The current that you want to control flows between the source and drain and it
    is controlled by the gate. This is analogous to the BJT''s base, collector and
    emitter, but the difference is that it is the voltage on the gate that controls
    the current between the source and drain.


    The gate is essentially a high resistance input and very little current flows
    in it. This makes it an ideal way to connect a GPIO line to a device that needs
    more current or a different voltage. When the gate voltage is low the source drain
    current is very small. When the gate voltage reaches the threshold voltage V<sub>GS(th)</sub>,
    which is different for different MOSFETs, the source drain current starts to increase
    exponentially. Basically when the gate is connected to 0V or below V<sub>GS(th)</sub>
    the MOSFET is off and when it is above V<sub>GS(th)</sub> the MOSFET starts to
    turn on. Don''t think of V<sub>GS(th)</sub> as the gate voltage at which the MOSFET
    turns on, but as the voltage below which it is turned off. The problem is that
    the gate voltage to turn a typical MOSFET fully on is in the region of 10V. Special
    “logic” MOSFETs need a gate voltage around 5V to fully turn on and this makes
    the 3.3V at which the Raspberry Pi''s GPIO lines work a problem. The data sheets
    usually give the fully on resistance and the minimum gate voltage that produces
    it, usually listed as Drain-Source On-State Resistance. For digital work this
    is a more important parameter than the gate threshold voltage.


    You can deal with this problem in one of two ways – ignore it or find a MOSFET
    with a very small V<sub>GS(th)</sub>. In practice, MOSFETs with thresholds low
    enough to work at 3.3V are hard to find and when you do find them they are generally
    only available as surface mount. Ignoring the problem sometimes works if you can
    tolerate the MOSFET not being fully on. If the current is kept low then, even
    though the MOSFET might have a resistance of a few Ohms, the power loss and voltage
    drop may be acceptable.


    What MOSFETs are useful for is in connecting higher voltages to a GPIO line used
    as an input, see later.


    Also notice that this discussion has been in terms of an N-channel MOSFET. A P-channel
    works in the same way, but with all polarities reversed. It is cut off when the
    gate is at the positive voltage and turns on when the gate is grounded. This is
    exactly the same as the NPN versus PNP for the BJT.


    ## MOSFET LED


    A BJT is the easiest way to drive an LED, but as an example of using a common
    MOSFET we can arrange to drive one using a 2N7000, a low-cost, N-channel device
    available in a standard TO92 form factor suitable for experimentation:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_84_0.png)


    Its data sheet states that it has a V<sub>GS(th)</sub> of typically 2V, but it
    could be as low as 0.8V or as high as 3V. Given we are trying to work with a gate
    voltage of 3.3V you can see that in the worst case this is hardly going to work
    – the device will only just turn on. The best you can do is to buy a batch of
    2N7000 and measure their V<sub>GS(th)</sub> to weed out any that are too high.
    This said, the circuit given below does generally work.


    Assuming a V<sub>GS(th)</sub> of 2V and a current of 20mA for the LED, the data
    sheet gives a rough value of 6Ω for the on resistance with a gate voltage of 3V.
    The calculation for the current-limiting resistor is the same as in the BJT case
    and the final circuit is:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_84_1.png)


    Notice that we don''t need a current-limiting resistor for the GPIO line as the
    gate connection is high impedance and doesn''t draw much current. In practice,
    it is usually a good idea to include a current-limiting resistor in the GPIO line
    if you plan to switch it on and off rapidly. The problem is that the gate looks
    like a capacitor and fast changes in voltage can produce high currents. While
    there could be devices labeled 2N7000 that will not work in this circuit due to
    the threshold gate voltage being too high, encountering one is rare.


    A logic-level MOSFET like the IRLZ44 has a resistance of 0.028Ω at 5V compared
    to the 2N2222''s of 6Ω. It also has a V<sub>GS(th)</sub> guaranteed to be between
    1V and 2V.


    ## Setting Drive Type


    The GPIO output can be configured into one of a number of modes, but the most
    important is pull-up/down. Before we get to the code to do the job, it is worth
    spending a moment explaining the three basic output modes, push-pull, pull-up
    and pull-down.


    ## Push-Pull Mode


    In push-pull mode two transistors of opposite polarity, one PNP and one NPN, are
    used:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_85_0.png)


    The circuit behaves like the two-switch equivalent shown on the right. Only one
    of the transistors, or switches, is "closed" at any time. If the input is high
    then Q1 is saturated and the output is connected to ground - exactly as if S1
    was closed. If the input is low then Q2 is saturated, as if S2 was closed, and
    the output is connected to 3.3V. You can see that this pushes the output line
    high with the same "force" as it pulls it low. This is the standard configuration
    for a GPIO output.'
  mdcn: '这种高电平导通/低电平关断的行为是NPN晶体管的典型特征。PNP晶体管的工作方式则相反：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_80_0.png)


    0.6V电压存在于基极和集电极之间，电流从基极流出。这意味着当GPIO线为高电平时晶体管关断，为低电平时导通。


    NPN和PNP双极结型晶体管的这种互补特性非常有用，意味着我们可以成对使用这类晶体管。还值得注意的是，上图通常绘制时将0V置于图表顶部，即垂直翻转，使其看起来与NPN图相同。务必始终确认+V线的位置。


    ## BJT示例


    一个简单的例子是，我们需要将一个标准LED连接到GPIO线，并提供完整的20mA驱动电流。鉴于树莓派所有GPIO线工作在3.3V，且理想情况下仅提供几毫安电流，我们需要一个晶体管来驱动通常需要20mA的LED。


    你可以使用某种场效应晶体管（FET），但对于这类应用，BJT效果非常好，并且有通孔安装版本，即带有引线。


    几乎任何通用NPN晶体管都可以工作，但2N2222非常常见。从其数据手册中，你可以发现其最大集电极电流为800mA，β值至少为50，这使其适合用最大20/50mA
    = 0.4mA的GPIO电流驱动20mA的LED。


    电路很简单，但我们需要两个限流电阻：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_81_0.png)


    如果你将基极直接连接到GPIO线，那么流入基极的电流将不受限制——这类似于将GPIO线接地。R1将电流限制在0.39mA，这非常低，并且假设晶体管的最小增益（hfe）为50，这刚好提供接近20mA的电流来驱动它。


    计算过程是：GPIO提供3.3V，基极上有0.6V压降，因此R1上的电压为3.3 - 0.6V = 2.7V。要将电流限制在0.4mA，需要的电阻为2.7/0.4kΩ
    = 6.7kΩ。最接近的标称值是6.8kΩ，这会给出稍小的电流。


    没有R2，LED会汲取非常大的电流并烧毁。R2将电流限制在20mA。假设正向压降为1.6V，电流为20mA，则电阻为(3.3-1.6)/20kΩ = 85Ω。实际上，我们可以使用82Ω到100Ω范围内的任何电阻。


    刚才的计算假设集电极和发射极之间的电压为零，但当然在实践中并非如此。忽略这一点会导致电流小于20mA，这是偏向安全的做法。数据手册表明集电极-发射极电压小于200mV。


    关键在于，你很少为此类电路进行精确计算，只需达到可接受且安全的工作条件即可。你也可以使用此设计来驱动需要更高电压的设备。例如，要驱动一个需要10mA激活的5V
    DIP继电器，你可以使用类似这样的电路：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_82_0.png)


    注意，在这种情况下，晶体管并非用于增加驱动电流——GPIO线可以直接提供10mA。其目的是将电压从3.3V转换为5V。同样的思路适用于任何更高的电压。


    如果你使用2N2222，其引脚排列如下：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_82_1.png)


    一如既往，LED的正极是较长的引脚。


    ## MOSFET驱动器


    许多人认为FET（场效应晶体管），或者更准确地说MOSFET（金属氧化物半导体场效应晶体管），是完美的放大器件，我们应该忽略BJT。它们更易于理解和使用，但可能更难找到具有所需特性的型号。


    与BJT类似，MOSFET有三个端子，称为栅极、漏极和源极。你想要控制的电流在源极和漏极之间流动，并由栅极控制。这类似于BJT的基极、集电极和发射极，但区别在于，是栅极上的电压控制源极和漏极之间的电流。


    栅极本质上是一个高阻抗输入，流过的电流非常小。这使其成为将GPIO线连接到需要更大电流或不同电压的设备的理想方式。当栅极电压较低时，源极-漏极电流非常小。当栅极电压达到阈值电压V<sub>GS(th)</sub>（不同MOSFET的阈值不同）时，源极-漏极电流开始呈指数增长。基本上，当栅极连接到0V或低于V<sub>GS(th)</sub>时，MOSFET关断；当高于V<sub>GS(th)</sub>时，MOSFET开始导通。不要将V<sub>GS(th)</sub>视为MOSFET导通的栅极电压，而应视为其关断的电压上限。问题在于，使典型MOSFET完全导通的栅极电压在10V左右。特殊的“逻辑”MOSFET需要约5V的栅极电压才能完全导通，这使得树莓派GPIO线工作的3.3V成为一个问题。数据手册通常会给出完全导通电阻和产生该电阻的最小栅极电压，通常列为漏源导通电阻。对于数字应用，这是一个比栅极阈值电压更重要的参数。


    你可以通过两种方式之一来处理这个问题——忽略它，或者找到一个V<sub>GS(th)</sub>非常小的MOSFET。实际上，阈值足够低以在3.3V工作的MOSFET很难找到，即使找到，通常也只有表面贴装封装。如果你能容忍MOSFET不完全导通，忽略这个问题有时是可行的。如果电流保持较低，即使MOSFET可能有几欧姆的电阻，功率损耗和电压降也可能是可接受的。


    MOSFET的用处在于将更高电压连接到用作输入的GPIO线，详见后文。


    另外请注意，本讨论是基于N沟道MOSFET。P沟道的工作方式相同，但所有极性相反。当栅极处于正电压时它截止，当栅极接地时导通。这与BJT的NPN与PNP完全相同。


    ## MOSFET驱动LED


    BJT是驱动LED最简单的方法，但作为使用常见MOSFET的示例，我们可以使用2N7000来驱动一个LED，这是一种低成本的N沟道器件，采用标准TO92封装，适合实验：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_84_0.png)


    其数据手册指出，其V<sub>GS(th)</sub>典型值为2V，但可能低至0.8V或高达3V。鉴于我们试图使用3.3V的栅极电压，你可以看到在最坏情况下这几乎无法工作——器件将勉强导通。你能做的最好的就是购买一批2N7000并测量它们的V<sub>GS(th)</sub>，以剔除任何阈值过高的器件。话虽如此，下面给出的电路通常确实有效。


    假设V<sub>GS(th)</sub>为2V，LED电流为20mA，数据手册给出在栅极电压为3V时，导通电阻约为6Ω。限流电阻的计算与BJT情况相同，最终电路如下：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_84_1.png)


    注意，我们不需要为GPIO线设置限流电阻，因为栅极高阻抗连接不会汲取太多电流。实际上，如果你计划快速开关GPIO线，通常最好在GPIO线中加入限流电阻。问题在于栅极看起来像一个电容器，电压的快速变化会产生大电流。虽然可能存在一些标有2N7000但因阈值栅极电压过高而无法在此电路中工作的器件，但遇到这种情况很少见。


    像IRLZ44这样的逻辑电平MOSFET在5V时的电阻为0.028Ω，而2N2222为6Ω。它还保证V<sub>GS(th)</sub>在1V到2V之间。


    ## 设置驱动类型


    GPIO输出可以配置为多种模式之一，但最重要的是上拉/下拉。在我们编写代码完成此任务之前，值得花点时间解释三种基本输出模式：推挽、上拉和下拉。


    ## 推挽模式


    在推挽模式下，使用两个极性相反的晶体管，一个PNP和一个NPN：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_85_0.png)


    该电路的行为类似于右侧所示的双开关等效电路。在任何时刻，只有一个晶体管或开关是“闭合”的。如果输入为高电平，则Q1饱和，输出连接到地——就像S1闭合一样。如果输入为低电平，则Q2饱和，就像S2闭合一样，输出连接到3.3V。你可以看到，这以与拉低输出线相同的“力”将输出线推高。这是GPIO输出的标准配置。'
