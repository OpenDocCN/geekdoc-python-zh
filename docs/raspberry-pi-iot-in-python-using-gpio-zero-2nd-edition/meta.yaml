  md: '# Chapter 15


    # Using The Lgpio Library


    Although this book is about GPIO Zero, the default pin factory that it uses is
    based on the lgpio library which provides a lower level way of working with the
    hardware. lgpio is a Python library that uses the Linux GPIO and other drivers
    to access the hardware. It lacks any object-oriented features and as such is potentially
    faster and not as abstract. If GPIO Zero is two steps away from the hardware,
    lgpio is at only one remove. What this means is that you can use it to do things
    that aren''t implemented in GPIO Zero and you can use its functions to implement
    objects that do the same job and so extend GPIO Zero in new ways that are still
    reasonably machine-independent.


    lgpio is a large collection of functions and covering them all would take a book
    in its own right. This chapter explains the basic philosophy and organization
    of the library and the principles you need to know to make good use of it.


    # A First Program Blinky


    You don''t need to do anything new to use lgpio as you have already been using
    it as the pin factory for GPIO Zero. Even if you haven''t, the library is installed
    by default on all Pis – you simply have to import it. The Linux drivers that lgpio
    makes use of all follow the same basic idea. They convert the hardware in question
    to things that look like files. For example, the Linux GPIO driver makes the GPIO
    hardware look like folders in the file system. If you look in the /dev directory
    you will find files corresponding to each GPIO controller installed. You will
    see at least:


    ```

    /dev/gpiochip0

    ```


    This represents the main GPIO controller and all of the GPIO lines it provides.
    On the Pi 5 this is represented by:


    ```

    /dev/gpiochip4

    ```


    and this is a small by irritating difference that means your programs have to
    be slightly different to work on a Pi 5.


    To work with the drivers you basically have to treat them as files and read and
    write data from and to them. lgpio does this for you and this allows you to use
    the drivers by making function calls to the library. For example to'
  merge: -1
