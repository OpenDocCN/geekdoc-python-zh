    ```\n\nPutting all this together, we can write a program that rotates the stepper\
    \ at a constant speed:\n\n```python\nfrom gpiozero import DigitalOutputDevice\n\
    from time import sleep\n\nclass StepperBi4():\n    def __init__(self, A=None,Am=None,B=None,Bm=None):\n\
    \        self.phase=0\n        self.gpios=\n            tuple(DigitalOutputDevice(pin)\
