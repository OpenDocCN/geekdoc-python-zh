    首先，从VS Code网站下载适用于你所用平台的最新稳定版本。它可以在Windows、Debian和Mac OS上运行。你也可以找到其他操作系统的版本，但通常没有安装程序。\n\
    \n安装VS Code后，要运行Python程序，你首先需要安装Microsoft Python扩展，它会自动安装Pylance：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_237_0.png)\n\
    \n要运行远程开发扩展，你需要在开发机器上运行OpenSSH客户端。Windows有其自己的OpenSSH客户端版本。接下来，你需要安装远程开发包。你只需要安装Remote\
    \ SSH。\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_238_0.png)\n\n安装Remote SSH后，你可以添加你想要用于开发程序的树莓派的详细信息。为此，请单击左侧面板中的Remote\
    \ Explorer图标，你会看到没有安装SSH客户端。接下来，将鼠标悬停在SSH Targets上时出现的+号，然后输入你要连接的树莓派的详细信息：\n\
    你使用以下格式指定主机：\nssh user@ipaddress\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_238_1.png)\n\
    \n按下回车键后，选择要使用的配置文件，你就可以连接到新主机了。右键单击新主机，然后选择“在此窗口中连接”。接下来，系统会要求你输入密码。除非你创建私钥并使用它进行身份验证（如前所述），否则每次连接时都会要求你输入密码。\n\
    当你打开文件资源管理器并选择“打开文件夹”时，你会看到主机上主文件夹中存储的文件夹列表。创建一个适合存储Python程序的新文件夹，并在其中创建一个名为Hello.py的文件。新文件将在编辑器中打开，你可以输入：\n\
    print(\"Hello World\")\n接下来选择“运行”->“不调试直接运行”，如果被要求选择运行配置，请选择“当前Python文件”。系统会提示你在远程机器上安装Python扩展并选择要使用的Python解释器。只要你这样做，你应该会在窗口底部的控制台中看到“Hello\
    \ World”出现。这个程序是在远程机器上运行的。从这里开始，你可以学习VS Code并慢慢自定义它，使你的工作更轻松。\n\n## 使用Root权限运行\n\
    \n物联网程序通常需要root权限来访问硬件。最简单的方法是使用sudo在本地运行程序。如果你想调试程序，更好的方法是创建一个launch.json文件：\n\
    \n```json\n{\n    \"version\": \"0.2.0\",\n    \"configurations\": [\n       \
    \ {\n            \"name\": \"Sudo Python: Current File\",\n            \"type\"\
    : \"python\",\n            \"request\": \"launch\",\n            \"program\":\
    \ \"${file}\",\n            \"console\": \"integratedTerminal\",\n           \
    \ \"justMyCode\": true,\n            \"sudo\": true\n        }\n    ]\n}\n```\n\
    \n注意末尾的\"sudo\":true。这会使用sudo运行Python解释器。这仅适用于Python程序。现在你必须使用RUN菜单来运行调试。\n\n\
    ![](img/39c0a42d027b4a8b43b07050c297f3ff_239_0.png)\n\n## 本地与远程同步\n\n重要的是要认识到，你创建的Python程序存储在远程主机上。这意味着，如果你不采取任何措施，你的整个程序可能只存储在一个树莓派上，等待着不好的事情发生。即使你认为这是一个安全的选择，当你想在另一个树莓派上运行它时，你仍然面临将程序传输过去的问题。最好的解决方案是在你认为安全的机器上保留程序的副本，并与你可能想要运行它们的任何树莓派共享。\n\
    \n最有吸引力的选项是使用源代码管理。VS Code支持Git，无需你安装任何扩展。一旦设置完成，这工作得很好，但设置过程耗时，并且需要你了解Git以及通常GitHub的工作原理。对于小型和简单的项目，这通常超出了你的需求，你可能会花费大量宝贵的编程时间来学习使用一个你几乎用不到的工具。话虽如此，如果你计划一个大型项目或协作项目，那么源代码管理是你的最佳选择，即使它确实涉及额外的初始工作。\n\
    \n在大多数情况下，我们可以使用更简单的工具来实现所需的功能。你可以通过从文件资源管理器拖放单个文件或文件夹从远程机器复制到本地机器的文件夹。不幸的是，这不适用于远程Linux机器，包括Pi\
    \ OS，所以这不是一种适用于我们的方法。但是，你可以将文件和文件夹从本地机器拖放到远程机器的文件资源管理器窗口。有关自动执行此操作的方法，请参阅下一节。\n\
    \n现在我们只剩下从远程机器复制文件到本地机器的问题。这可以通过在VS Code文件资源管理器中选择一个文件或文件夹，然后右键单击显示上下文菜单来完成。你会在与“复制”相同的区域看到“下载”。选择此选项会下载整个文件夹及其内容或单个文件。你可以选择将文件或文件夹复制到何处，从而手动维护你正在处理的任何内容的中心副本。\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_240_0.png)\n\n将远程文件保存在本地机器上的另一种方法是使用“文件”->“另存为”菜单选项，然后选择“显示本地”按钮。\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_241_0.png)\n\n这允许你将文件以任何你想要使用的名称保存在本地机器上。\n\
    \n有自动化复制文件的方法，但手动复制效果很好，而且大多数自动同步方法都有其自身的缺点。\n\n## VS Code远程构建和调试任务\n\n使用VS Code自身远程开发功能的替代方法是使用自定义任务在远程机器上复制和编译程序。这样做的好处是它适用于所有版本的树莓派，并且你可以自动将所有程序的源代码保留在本地机器上。\n\
    \n如果你只想使用任务通过VS Code进行远程调试或远程运行Python程序，那么步骤如下。所使用的文件已在Windows上测试，但通过更改指定的文件夹，它们应该可以在Mac\
    \ OS和Linux上工作。这些文件列在本附录的末尾，你可以从www.iopress.info上本书的页面下载它们。\n\n重要的是要知道，你需要设置无密码的SSH连接，许多这些步骤才能工作，并且对于某些程序，你可能需要以root身份登录。\n\
    \n创建一个文件夹，作为你将要处理的所有Python程序的项目文件夹。在本例中，它被称为GPIOZERO，但这个名称没有什么特别之处。目录结构对于任务的工作很重要，因为它们假设VS\
    \ Code已打开顶级目录（即GPIOZERO），即使你正在处理HelloWorld中的文件。\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_241_1.png)"
