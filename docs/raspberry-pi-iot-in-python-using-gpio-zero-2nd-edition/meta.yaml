    \ data=(data//10)<<4 |(data%10)\n            words=self._spi.transfer([0x80+i,data])\n\
    \n    def getDateTime(self):\n        datetimelist=[]\n        for i in range(7):\n\
    \            words=self._spi.transfer([i,0x00])\n            if i==3:continue\n\
    \            byte=words[1]\n            data=(byte & 0x0F)+(byte>>4)*10\n    \
    \        datetimelist.insert(0,data)\n        datetimelist[0]+=2000\n        return\
    \ datetime(*datetimelist)\n```\n\nAs an example of using it, the following program\
    \ sets the date and time and then prints the date and time every few seconds:\n\
    \n```\nrtc=DS3234rtc()\nrtc.setDateTime(datetime.today())\nwhile True:\n    t=rtc.getDateTime()\n\
    \    print(t)\n    sleep(1)\n```\n\nYou can create custom classes for other SPI\
    \ devices. The steps are always the same – identify the SPI connections and modes\
    \ and then work out what registers you need to read and write to work with it.\
    \ For complex devices this can seem like a large task and can be difficult to\
    \ get right. Always try the simplest thing you can do to get started."
