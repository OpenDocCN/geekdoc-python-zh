- img_proc: true
  md: '“know” when something has changed. When a change is detected, the pin factory
    calls the `EventsMixin._fire_events` method, which in turn calls the functions
    that you specified.

    The `EventsMixin` first enters the inheritance hierarchy as part of `DigitalInputDevice`
    and `SmoothedInputDevice` and only classes that inherit from one of these two
    can handle events. Both classes have `when_activated` and `when_deactivated` properties
    which you use to set the event handling functions.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_106_0.png)


    It should be obvious that for an event to happen while your program is running
    there has to be another thread of execution involved. Each pin factory provides
    this additional thread in its own way. For example, the `NativeFactory` has a
    class called `NativeWatchThread` that runs on its own thread and waits for a change
    in a pin''s state, either a rising or a falling edge. When this happens the appropriate
    event handlers are called.'
