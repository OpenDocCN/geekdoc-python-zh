- img_proc: true
  md: 'and it all looks complicated. If we are only interested in the date and time,
    then only the first seven are relevant:


    | Address read/write | MSB bit7 | Bit 6 | Bit 5 | Bit 4 | Bit 3 | Bit 2 | Bit
    1 | LSB Bit 0 | Function | Range |

    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    | 0x00 | 0x80 | 0 | Seconds x 10 | | Seconds | | | | Seconds | 00-59 |

    | 0x01 | 0x81 | 0 | Minutes x 10 | | Minutes | | | | Minutes | 00-59 |

    | 0x02 | 0x82 | 0 | 12/24 | AM/PM or Hours x10 | Hours | | | | Hours | 1-12 +AM/PM
    00-23 |

    | 0x03 | 0x83 | 0 | 0 | 0 | 0 | 0 | Day | | Day | 1-7 |

    | 0x04 | 0x84 | 0 | Date x 10 | | Date | | | | Date | 01-31 |

    | 0x05 | 0x85 | Century | 0 | 0 | Month x 10 | Month | | | Month | 01-12 |

    | 0x06 | 0x86 | 0 | Year x10 | | Year | | | | Year | 00-99 |


    You can see that the addresses are sequential - 0x00 to 0x06 for reading and 0x80
    to 0x86 for writing. The data is packed into each byte using BCD, Binary Coded
    Decimal. This codes each decimal digit as a four-bit binary value. For example,
    the month 12 would be coded in BCD as 0001 and 0010, i.e. 1 and 2 in binary. The
    value 59 would be coded as 0101 for 5 and 1001 for 9. In a simple system, a single
    byte would always hold two BCD digits. However, if the range of possible values
    is limited, some bits are always zero and can be reused for something else. For
    example, the month register only has to store from 01 to 12 and this means we
    only need one bit for the tens digit and four for the units digit – and you can
    see that this is the case in the table. This allows us to use bit 7 as a century
    indicator. The way this works can be confusing as in some implementations bit
    7 == 0, meaning 1900, and in others bit 7 == 1 meaning 2000. This isn''t necessary
    as all the century bit does is increment when a century boundary is crossed. What
    this means is that we can leave it at 0, to mean 2000, and wait for it to increment
    to indicate that we have reached 2100.


    The only slightly complicated part is specifying the use of a 12- or 24-hour clock
    in the Hours register. If you set the bit 6 to a 1 then you are selecting a 12-hour
    clock and you only need five bits to represent the number, i.e. from 0 0000 for
    0 hours to 1 0010 for 12 hours. This lets you use bit 5 as an AM/PM indicator.
    On the other hand, if you set bit 6 to 0 then you need an extra bit because now
    hours range from 00 0000 for 0 hours to 10 0100 for 24 hours. The simplest thing
    to do is work with a 24-hour clock then you can simply read the register as a
    simple BCD coding of the two digits that give the hour.'
  merge: -1
  pgno: 216
- img_proc: true
  md: "We are almost ready to start coding. The only additional information we need\
    \ is what clock mode to use. This is surprisingly difficult to discover from the\
    \ datasheet and you have to look at the timing diagrams to work it out. It turns\
    \ out that the device will work in mode 1 or mode 3. It is also worth knowing\
    \ that if you get this wrong, the device will not respond and it will look as\
    \ if you have a dead component.\n\n# The Software\n\nWhen implementing this sort\
    \ of software you generally start out with the simplest functions that initialize\
    \ and read and write the registers. Once you have something that works you move\
    \ on to refactor this into a suitable class. This is what happened in this case,\
    \ but I'm only going to present the final, slightly polished, class.\n\nFirst\
    \ we need to initialize the SPI bus correctly:\n\n```\nclass DS3234rtc(SPIDevice):\n\
    \    def __init__(self):\n        super(DS3234rtc, self).__init__()\n        self.clock_mode=1\n\
    \        self.select_high=False\n        self._spi._interface.max_speed_hz=5000000\n\
    ```\n\nNotice that if you are using software SPI, you need to reduce the frequency\
    \ of the clock.\n\nNext we need a method to set each register of the clock device\
    \ to the current time. Python has a datetime class that will store a complete\
    \ date and time and can be used to get the current date/time. It has nearly all\
    \ the information we need to set the DS3234, but in the wrong format. The idea\
    \ is to use the datetime class to construct a tuple which has the information\
    \ in the same order as the registers:\n\n(seconds,minutes,hours,day,date, month,year)\n\
    \nThe Python datetime object has all of these except for day so we have to add\
    \ it to the tuple.\n\nFirst we convert the datetime object to a tuple:\n\n```\n\
    datetimetuple=dateTime.timetuple()\n```\n\nThis gives us a tuple in the following\
    \ format:\n\n(year,month,date,hours,minutes,seconds)\n\nWe can add the day using\
    \ the isoweekday method and we also need to change the year date to just the last\
    \ two digits, i.e. subtract 2000:\n\n```\ndatetimetuple=(datetimetuple[0]-2000,)+datetimetuple[1:3]+\n\
    \               (dateTime.isoweekday(),)+datetimetuple[3:6]\n```"
  merge: -1
  pgno: 217
- img_proc: true
  md: "Now we have a tuple that contains all the data, but in reverse order. The solution\
    \ is to reverse it:\n\n```\ndatetimetuple=datetimetuple[::-1]\n```\n\nWith the\
    \ data in the right format we can now write it to the device:\n\n```\nfor i in\
    \ range(0,7):\n    data=datetimetuple[i]\n    data=(data//10)<<4 |(data%10)\n\
    \    words=self._spi.transfer([0x80+i,data])\n```\n\nThe only complicated part\
    \ is the instruction:\n\n```\ndata=(data//10)<<4 |(data%10)\n```\n\nwhich performs\
    \ binary to BCD conversion. The easiest way to understand this is via an example.\
    \ If data is 59 then integer division by ten, i.e. data//10, gives 5 or 0101 in\
    \ binary. A left shift by four, i.e. <<4, gives 01010000. The remainder on division\
    \ by 10, i.e. data%10, gives 9 or 1001 and OR-ing this with the previous result\
    \ gives 01011001, which is the BCD representation of 59, i.e. binary 5 in the\
    \ high four bits and binary 9 in the low order bits.\n\nWe also need a method\
    \ to read the data back from the device and this uses the same techniques to convert\
    \ the BCD to binary and then construct a List with everything in the correct order.\
    \ The List is then used to create a datetime object:\n\n```\ndef getDateTime(self):\n\
    \    datetimelist=[]\n    for i in range(7):\n        words=self._spi.transfer([i,0x00])\n\
    \        if i==3:continue\n        byte=words[1]\n        data=(byte & 0x0F)+(byte>>4)*10\n\
    \        datetimelist.insert(0,data)\n    datetimelist[0]+=2000\n    return datetime(*datetimelist)\n\
    ```\n\nThe if statement omits the day register from the List as it isn't used\
    \ in a datetime object. The List is constructed by inserting each item at its\
    \ start, automatically producing it in the reverse order."
  merge: -1
  pgno: 218
- img_proc: true
  md: "Putting all this together gives:\n\n```\nclass DS3234rtc(SPIDevice):\n    def\
    \ __init__(self):\n        super(DS3234rtc, self).__init__()\n        self.clock_mode=1\n\
    \        self.select_high=False\n        self._spi._interface.max_speed_hz=5000000\n\
    \n    def setDateTime(self,dateTime):\n        datetimetuple=dateTime.timetuple()\n\
    \        datetimetuple=(datetimetuple[0]-2000,)+datetimetuple[1:3]+\n        \
    \              (dateTime.isoweekday(),+datetimetuple[3:6]\n        datetimetuple=datetimetuple[::-1]\n\
