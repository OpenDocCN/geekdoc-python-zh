- img_proc: true
  md: "Notice that you can modify and add to inherited attributes, but you cannot\
    \ easily remove them. It is part of the object-oriented philosophy that classes\
    \ get “bigger” as they are inherited – a Point3d object is “bigger” in the sense\
    \ that it generally has more attributes than a Point object.\n\n# The Need For\
    \ Super\n\nThe key idea is that a class inherits everything its super class has,\
    \ but this isn’t quite as simple as it sounds. Consider for a moment a small change\
    \ to the Point3D class based on this idea. As the Point3D class inherits everything\
    \ that the Point class has, we don’t need to redefine the x and y attributes as\
    \ these are inherited:\n\n```\nclass Point3d(Point):\n    def __init__(self,x,y,z):\n\
    \        self.z=z\n    def distance(self):\n        return self.x**2+self.y**2+self.z**2\n\
    ```\n\nIn this version we only define the new z attribute. If you try this out\
    \ you will find that it generates an error reporting that one of x or y isn’t\
    \ defined.\nThe point is that Point3d doesn’t inherit x and y from Point, but\
    \ it does inherit its __init__ function which creates them. That is, to make Point3D\
    \ inherit all of the attributes that Point has, it has to call Point.__init__():\n\
    \n```\nclass Point3d(Point):\n    def __init__(self,x,y,z):\n        Point.__init__(x,y)\n\
    \        self.z=z\n```\n\nIf you try this out you will find it doesn’t work because\
    \ the call to Point.__init__ doesn’t have a value for self. In this case you have\
    \ to explicitly pass a value for self that gives the instance being created.\n\
    So the correct version of calling the super class __init__ function is:\n\n```\n\
    class Point3d(Point):\n    def __init__(self,x,y,z):\n        Point.__init__(self,x,y)\n\
    \        self.z=z\n```\n\nThis creates the x and y attributes as part of any instance\
    \ that Point3d creates.\nIt is generally considered bad practice to call the methods\
    \ belonging to the super using the name of the super class, i.e. Point in this\
    \ example. It works for any super class method you want to call, but Python provides\
    \ the super function to make this easier. The super function automatically returns\
    \ the super class of the class it is called in and when you use it to call a super\
    \ class method, it automatically supplies the self parameter."
