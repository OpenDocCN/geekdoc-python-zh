    ## 第1章

    为什么选择树莓派用于物联网？


    树莓派是一种与众不同的物联网计算机。它不是一个小型、廉价但性能不强的设备——而是一个廉价但**更**强大的设备。它运行完整的 Linux 版本，并支持多种编程语言，这意味着我们不再局限于汇编语言或
    C 语言。在众多可用的高级语言中，Python 可能是最受欢迎的。用 Python 编写物联网风格程序的整体理念相对较新，它有其优缺点。Python 反应较慢，但一旦被唤醒则功能强大。它需要时间来处理简单的事情，比如检测按钮是否被按下，但它使得实现复杂算法变得更容易。


    这确实是物联网的一种新方法，而树莓派非常适合这项任务。


    在本章中，我们将了解树莓派系列中可用的各种设备，以及选择特定型号执行特定任务的原因。物联网（IoT - Internet of Things）这个术语已经变得非常流行，往往被用来替代诸如嵌入式处理、微控制器等旧术语，以及物理计算等新术语。然而，这些概念是相关的，在本书的其余部分，物联网一词将被用来指代用于与现实世界交互的系统，通常是通过定制电子设备，即使没有明确涉及互联网。


    ## 树莓派还是微控制器？


    与树莓派相比，Arduino 和任何类似的微控制器都是计算能力非常低的计算机。基本的 Arduino 无法运行 Linux 这样的完整操作系统。它只是运行你为它编写的一个程序。然而，Arduino
    和类似设备有一个很大的优势——它们有专用的、通常是模拟的 I/O 线路。树莓派没有同样种类的 I/O 线路，但它有足够的 I/O 来完成许多任务，并且可以通过使用称为
    HAT（硬件附加在顶部）的标准扩展板轻松扩展，因为它们的插入方式。一些 HAT 非常常用，以至于它们或多或少被认为是标准的，并且有自己的 Linux 驱动程序。


    为了清楚地说明区别，你可以将树莓派用于几乎任何台式计算机可以完成的工作，包括任何服务器角色。另一方面，Arduino 则无法胜任这类工作。有时，树莓派是一台完整的计算机这一事实甚至使其更适合底层工作。例如，你想要一个新的门铃？为什么不使用树莓派，让它用语音合成器说“你好”呢。


    简而言之，树莓派以更低的成本为你提供了更强大的计算能力。


    树莓派和物联网并非完美无缺。特别是，使用 Linux 意味着你不能再假装你的程序是唯一运行的程序。Linux 是一个多任务操作系统，它可以随时挂起任何程序，以便让另一个程序有机会运行。如果你熟悉微控制器编程，那么你将无法完全控制机器，这可能会让你感到震惊。更重要的是，如果你是初学者，Linux
    并不是最容易掌握的操作系统。


    所有这些问题以及更多问题都可以通过一点努力来克服，而且是值得的。树莓派是一台快速且功能强大的物联网计算机，即使它价格更高，仍然是一个不错的选择。我们正在进入嵌入式计算的新时代，运行你洗衣机的设备将和你的台式计算机一样强大。


    ## 选择哪款树莓派？


    树莓派系列多年来不断壮大，要跟踪不同型号之间的差异可能很困难。就物联网而言，虽然你可以使用早期的 Pi 1 或 Pi 2，但最好不用。现代系列的设备更强大，如果你开始一个新项目，最好使用当前的型号之一。话虽如此，最新的
    Pi 5 比 Pi 4 更贵，而 Pi 4 又比 Pi 3 更贵，而且它们目前都有售。它们还提供不同内存容量的版本，这不是你可以升级的，除非你有烙铁和足够的技能——即使那样也不推荐。


    在物联网项目中，成本而非计算能力可能是一个问题，虽然如果你手头有早期型号，你不能完全排除它们，但 Pi Zero 系列成本较低。后期型号


    所有这些使得选择树莓派变得困难。我最好的建议是使用你能找到的最快、最强大的树莓派进行开发，当你的程序运行起来后，再看看实际需要多少计算能力，然后再部署最终程序。


    ## Pi Zero 系列


    树莓派家族中最小、最便宜的是 Pi Zero，售价 10 美元，速度大约是 Pi 3 的一半，比 Pi 4 慢十倍，比 Pi 5 慢二十倍。尽管它不那么强大，但它通常足以完成物联网任务，并且在价格和功耗方面胜出。Pi
    Zero 只有一个 USB 接口，没有网络功能。Pi Zero W 更贵一些，售价 15 美元，它具有板载 WiFi，如果你想要一个联网设备，它是显而易见的选择。


    Pi Zero 和 Pi Zero W 都是单核 CPU，这意味着你的程序会被操作系统中断以保持设备工作。在许多应用中这并不重要，但如果重要，那么该系列中最新的
    Pi Zero 2W 具有四核 CPU，价格与 Pi Zero W 相同，其他规格也相同。它基于与 Pi 3 相同的 CPU，并且整体架构非常相似。


    ![Pi Zero – 小巧低成本，Pi Zero W – 带 WiFi，Pi Zero 2W - 四核](img/39c0a42d027b4a8b43b07050c297f3ff_12_0.png)


    | 特性 | Pi Zero | Pi Zero W | Pi Zero 2W |

    | :--- | :--- | :--- | :--- |

    | WiFi | 无 WiFi | 802.11 b/g/n 无线局域网 | 802.11 b/g/n 无线局域网 |

    | 蓝牙 | 无蓝牙 | 蓝牙 4.1 | 蓝牙 4.2 |

    | 低功耗蓝牙 | 无蓝牙 | 低功耗蓝牙 (BLE) | 低功耗蓝牙 (BLE) |

    | CPU | 1GHz，单核 CPU | 1GHz，单核 CPU | 1GHz，四核 CPU |

    | 内存 | 512MB 内存 | 512MB 内存 | 512MB 内存 |

    | 以太网 | 无以太网 | 无以太网 | 无以太网 |

    | USB | Micro USB | Micro USB | Micro USB |'
