    # Chapter 2


    # Getting Started With Python And GPIO Zero


    The most difficult part of any project is getting started. Once you have managed
    it, you can''t see what the difficulty was in the first place! In this case it
    is assumed that you have your Pi up and running and can work with it either via
    a screen, keyboard and mouse, a Secure Shell (SSH) connection or using remote
    desktop.


    You can work with Python using a range of different approaches and they each have
    their advantages and disadvantages. In the first instance it is probably best
    to choose the easiest option and in the case of the Pi that is to use Thonny as
    it is already installed and ready to go, as is Python 3. You can use this setup
    on any Pi and use them to develop and run programs, but the Pi Zero struggles
    to keep up.


    A better solution is to use remote development. That is to use another machine
    to create and edit the program and run it on a target machine that is connected
    via SSH. Thonny supports remote development but at the time of writing it doesn''t
    support remote debugging. This makes it less than perfect but it is the simplest
    way to get started with remote development.


    If you move on to be more ambitious you might want to develop Python programs
    using Visual Studio Code (VS Code) running on a desktop Windows, Mac or Linux
    machine. VS Code supports full remote debugging and an extensive range of tools
    to make programming easier. How to get started with VS Code is described in Appendix
    I but, while not difficult, it takes many steps to get it all working and you
    might want to leave it until you need it.


    # Your First Python Pi Program


    It is assumed that you have your Pi set up and you can work with a desktop, either
    locally or remotely. In most cases the simplest way to get started is to add a
    keyboard, mouse and monitor to a Pi 4 or 5. In this case you are using local development
    i.e. the same machine is being used to develop and test the program.


    An alternative is to use a remote desktop connection VNC or RDP to a Pi that doesn''t
    have a monitor, keyboard and mouse – a so called headless Pi.'
- md: 'If you do want to work with a headless Pi then an even easier solution is to
    use remote development via another Pi or a desktop machine – see the next section.

    If you do opt for local development and it is by far the easiest way to get started,
    then you will find that Python, GPIO Zero and the Thonny code editor are already
    installed and ready to use.

    Drop down the main menu and in the Programming sub-menu select Thonny. The IDE
    will open for you:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_23_0.png)


    You can start to program at once. Click the New icon and enter the single line
    program:

    `print("Hello Python World")`

    If you now click the Run icon you will be prompted to save the file, create a
    new directory if you want to and save the file as "hello". Once you have done
    this your program will run and you will see:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_23_1.png)


    Yes, it really is this easy to get started with Python programming on a Raspberry
    Pi, but in many cases you will need to do a little more.


    ## Remote Development


    If you are using Thonny on a powerful enough Pi then developing GPIO Zero programs
    on the machine that is running them works well enough. If you are using a Pi Zero
    then things are not so good. The Pi Zero is only just fast enough to cope with
    running Thonny and if you try to test an IoT program on the same machine you will
    find that the demands made on a single-core processor are too great for many situations.
    The same is true to a lesser extent of the Pi Zero 2W which doesn''t really have
    enough memory to run Thonny and other programs at the same time. Local development
    is really only good on a Pi 4 or Pi 5. Another problem with local development
    is that you generally want to develop an IoT program on one machine and then move
    it to another to try out different configurations. Local development stores the
    program on a single machine and moving it to another machine and running it is
    often a burden.


    A solution to this problem is to use a remote development approach. That is, run
    Thonny on one machine and run the Python programs you create on another. As Python
    is an interpreted language, and hence needs no compile stage, this is particularly
    easy to do. You can connect to the remote machine by SSH, transfer the file from
    the machine running Thonny to the remote machine and then run it. Of course, this
    supposes that you have an SSH connection set up. In most cases what you need is
    a headless Pi with a predefined SSH connection. This is most easy to do when you
    create an SD card with the OS using the Raspberry Pi Imager. You can set up the
    details of the WiFi in the General Tab of the OS Customization:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_24_0.png)


    You can setup the SSH connection on the next tab:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_25_0.png)


    In many cases you need to use public-key authentication to avoid having to type
    in the password each time you make a connection to the machine. Thonny copes well,
    however, with using a password so Use password authentication is a reasonable
    choice. Notice that this means that only the single user setup on the first page
    can connect via SSH, but you can set up other users once the machine has booted.

    Once you have created the SD card, you can boot the Pi without needing a keyboard,
    mouse or monitor. If you want to work with it directly then you need an SSH client
    such as Putty. This lets you connect to the headless machine and use the command
    line. In most cases however you don''t need to do this as Thonny will make the
    SSH connection to the headless Pi for you. To make use of this, Thonny has to
    be in “regular” mode which is also the recommended way to use it.


    Once in regular mode all you need to do is select Run and then select the Interpreter
    tab from the dialog and enter the details of the remote machine and the account
    to use:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_26_0.png)


    You can often use the Host name that you set in the Raspberry Pi Imager in the
    Host field. If this fails you need to use the headless Pi''s IP address, which
    can be difficult to find without help. There are IP address scanners that can
    be used to find the IP address. For example: Advanced IP Scanner at https://www.advanced-ip-scanner.com/.


    As already discussed, the simplest way to get started is to use a username and
    password to connect via SSH. You need to make sure that you can connect to the
    Pi using the specified credentials.


    If everything is specified correctly you should be able to run your program on
    the headless Pi by simply selecting Run. The program will automatically be downloaded
    to the Pi and run remotely.


    So, if you enter:


    ```

    python

    from gpiozero import Device

    Device()

    print(Device.pin_factory.board_info.model)

    ```


    You can run this automatically on the headless Pi and you will see the model type
    displayed in the shell at the bottom of the screen:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_27_0.png)


    You can see and manage the state of the files stored on the local and the remote
    machine by displaying the File window using View, Files


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_27_1.png)


    You can right-click on any file or folder on either machine and transfer them
    to the other machine.


    Finally, you can use Thonny to open a shell to the remote machine and to submit
    commands. To open a shell use Tools.Open system shell. You have to supply the
    user''s password.

    Thonny is easy to get started with and to use, but it lacks a good remote debugger
    and other features that more sophisticated code editors have. Even so for many
    beginners Thonny is the best first choice and you can go a long way using nothing
    more.


    ## Summary


    - The easiest way to create Python programs on a Pi is to run Thonny or one of
    the other IDEs on the Pi itself. This works reasonably well on the Pi 3/4/5, but
    not so well on the Pi Zero.

    - Thonny can also be used for remote development using a headless Pi, i.e. one
    that doesn''t have a keyboard, mouse or monitor connected.

    - Connection to the headless Pi is via SSH. The simplest way of setting up a headless
    machine with SSH is to use the Raspberry Pi Imager and specify a WiFi to connect
    to, a user and to enable SSH.

    - To connect to the remote machine you simply select the Python interpreter to
    use to run the program.

    - Thonny allows you to manage files on both the local and remote machines. It
    also allows you to open a shell to the remote machine that you can use to give
    commands.

    - At the time of writing, Thonny does not support remote debugging. If you want
    more sophisticated support including remote debugging you need to move to VS Code,
    see Appendix I.


    # Chapter 3


    ## Introduction to the GPIO


    GPIO Zero is a sophisticated way to work with devices connected to a Pi, but it
    is all built on some very basic features provided by the GPIO (General Purpose
    IO) lines. It is important to understand how all of this works and in particular
    how it works with GPIO Zero, so in this chapter we look at how to get started
    with the IoT in Python by writing what most people consider to be the “Hello World”
    of IoT or “Blinky”. All this does is to flash an LED at a steady rate – hence
    “Blinky”. It may be simple, but it serves the purpose of getting you to know how
    to control a GPIO line and is a good starting point.


    ## GPIO?


    The term GPIO is used a lot and usually without bothering to define what it means.
    It stands for General Purpose Input Output and it is the fundamental way a device
    like the Pi connects to the outside world. A GPIO line is a pin that can be used
    to connect to another device via a wire. The line can be configured to be an input
    or an output and software can read and write its current state. Some programs
    make use of the GPIO lines raw in that they read and write data directly from
    and to the lines. Other types of output that you will meet later use GPIO lines
    to implement more specialized forms of communication and in this case the software
    doesn’t directly make use of the GPIO lines involved but asks the more sophisticated
    hardware to do the job.


    GPIO Zero, despite its name, is all about moving away from the use of raw GPIO
    lines. It is about increasing the level of abstraction that we are working with.
    For example, you can take a single GPIO line and connect it to an LED and you
    can set the LED on and off by controlling the GPIO line in software. This works
    but an arguably better method is to implement in software an LED object which
    can be programmed in terms like LED.on and LED.off rather than having to consider
    the details of using the GPIO line. Of course a GPIO line is involved in the process
    even if its use is hidden by the software – when you state LED.on a GPIO line
    is set high and the LED connected to it lights up.


    GPIO Zero provides classes to let you work with a range of objects from traffic
    lights to motors and robots. However they all use GPIO lines to do their work.'
  mdcn: '如果你确实想使用无头树莓派，那么更简单的解决方案是通过另一台树莓派或桌面计算机进行远程开发——请参阅下一节。

    如果你选择本地开发，这无疑是入门最简单的方式，你会发现Python、GPIO Zero和Thonny代码编辑器已经安装就绪，随时可用。

    点击主菜单，在编程子菜单中选择Thonny。IDE将会为你打开：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_23_0.png)


    你可以立即开始编程。点击新建图标，输入单行程序：

    `print("Hello Python World")`

    现在点击运行图标，系统会提示你保存文件。如果需要，可以创建一个新目录，并将文件保存为"hello"。完成这些操作后，你的程序将运行，你会看到：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_23_1.png)


    是的，在树莓派上开始Python编程真的就这么简单，但在许多情况下，你需要做更多一点的工作。


    ## 远程开发


    如果你在一台性能足够强的树莓派上使用Thonny，那么在运行程序的机器上开发GPIO Zero程序效果就很好。如果你使用的是树莓派Zero，情况就不那么理想了。树莓派Zero的速度仅够运行Thonny，如果你尝试在同一台机器上测试物联网程序，你会发现单核处理器在许多情况下不堪重负。树莓派Zero
    2W的情况稍好一些，但其内存也不足以同时运行Thonny和其他程序。本地开发实际上只在树莓派4或树莓派5上表现良好。本地开发的另一个问题是，你通常希望在一台机器上开发物联网程序，然后将其转移到另一台机器上以测试不同的配置。本地开发将程序存储在单台机器上，将其转移到另一台机器并运行通常是个负担。


    解决这个问题的一个方法是使用远程开发方式。即，在一台机器上运行Thonny，在另一台机器上运行你创建的Python程序。由于Python是一种解释型语言，无需编译阶段，因此这特别容易实现。你可以通过SSH连接到远程机器，将文件从运行Thonny的机器传输到远程机器，然后运行它。当然，这假设你已经建立了SSH连接。在大多数情况下，你需要一台预设了SSH连接的无头树莓派。当你使用树莓派Imager创建操作系统SD卡时，这是最容易实现的。你可以在操作系统自定义的常规选项卡中设置WiFi的详细信息：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_24_0.png)


    你可以在下一个选项卡中设置SSH连接：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_25_0.png)


    在许多情况下，你需要使用公钥认证，以避免每次连接机器时都输入密码。然而，Thonny能很好地处理密码使用，因此选择使用密码认证是合理的。请注意，这意味着只有在第一页设置的单个用户可以通过SSH连接，但你可以在机器启动后设置其他用户。

    创建SD卡后，你可以无需键盘、鼠标或显示器即可启动树莓派。如果你想直接操作它，则需要一个SSH客户端，如Putty。这使你能够连接到无头机器并使用命令行。然而，在大多数情况下，你不需要这样做，因为Thonny会为你建立到无头树莓派的SSH连接。要使用此功能，Thonny必须处于“常规”模式，这也是推荐的使用方式。


    进入常规模式后，你只需选择运行，然后在对话框中选择解释器选项卡，并输入远程机器和要使用的账户的详细信息：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_26_0.png)


    你通常可以在主机字段中使用在树莓派Imager中设置的主机名。如果这不起作用，你需要使用无头树莓派的IP地址，这在没有帮助的情况下可能很难找到。可以使用IP地址扫描器来查找IP地址。例如：Advanced
    IP Scanner，网址为 https://www.advanced-ip-scanner.com/。


    如前所述，最简单的入门方式是使用用户名和密码通过SSH连接。你需要确保可以使用指定的凭据连接到树莓派。


    如果所有信息都正确指定，你应该能够通过简单地选择运行，在无头树莓派上运行你的程序。程序将自动下载到树莓派并远程运行。


    因此，如果你输入：


    ```

    python

    from gpiozero import Device

    Device()

    print(Device.pin_factory.board_info.model)

    ```


    你可以自动在无头树莓派上运行此程序，你会在屏幕底部的shell中看到显示的型号类型：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_27_0.png)


    你可以通过使用视图、文件显示文件窗口来查看和管理存储在本地和远程机器上的文件状态。


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_27_1.png)


    你可以右键单击任一机器上的任何文件或文件夹，并将它们传输到另一台机器。


    最后，你可以使用Thonny打开到远程机器的shell并提交命令。要打开shell，请使用工具.打开系统shell。你必须提供用户的密码。

    Thonny易于上手和使用，但它缺乏良好的远程调试器和更复杂的代码编辑器所具有的其他功能。即便如此，对于许多初学者来说，Thonny是最佳首选，你可以仅凭此走得很远。


    ## 总结


    - 在树莓派上创建Python程序最简单的方法是在树莓派本身上运行Thonny或其他IDE之一。这在树莓派3/4/5上效果相当好，但在树莓派Zero上效果不佳。

    - Thonny也可用于使用无头树莓派进行远程开发，即没有连接键盘、鼠标或显示器的树莓派。

    - 通过SSH连接到无头树莓派。使用树莓派Imager设置无头机器并启用SSH的最简单方法是指定要连接的WiFi、用户并启用SSH。

    - 要连接到远程机器，你只需选择用于运行程序的Python解释器。

    - Thonny允许你管理本地和远程机器上的文件。它还允许你打开到远程机器的shell，你可以使用它来发出命令。

    - 在撰写本文时，Thonny不支持远程调试。如果你需要更复杂的支持，包括远程调试，你需要转向VS Code，请参阅附录I。


    # 第3章


    ## GPIO简介


    GPIO Zero是一种与连接到树莓派的设备进行交互的复杂方式，但它完全建立在GPIO（通用输入输出）行提供的一些非常基础的功能之上。理解这一切如何工作，特别是它如何与GPIO
    Zero协同工作非常重要，因此在本章中，我们将通过编写大多数人认为是物联网的“Hello World”或“Blinky”程序，来了解如何使用Python开始物联网之旅。这个程序所做的只是以稳定的速率闪烁一个LED——因此得名“Blinky”。它可能很简单，但它能让你了解如何控制GPIO行，并且是一个很好的起点。


    ## GPIO？


    GPIO这个术语经常被使用，但通常没有费心去定义它的含义。它代表通用输入输出，是像树莓派这样的设备与外界连接的基本方式。GPIO行是一个引脚，可以通过导线连接到另一个设备。该行可以配置为输入或输出，软件可以读取和写入其当前状态。有些程序直接使用GPIO行，即直接从行读取数据和向行写入数据。你稍后会遇到的其他类型的输出使用GPIO行来实现更专门形式的通信，在这种情况下，软件并不直接使用涉及的GPIO行，而是要求更复杂的硬件来完成这项工作。


    GPIO Zero，尽管名字如此，其核心在于摆脱对原始GPIO行的使用。它旨在提高我们工作的抽象层次。例如，你可以取一个GPIO行并将其连接到一个LED，你可以通过软件控制GPIO行来设置LED的开关。这可行，但一个可以说更好的方法是在软件中实现一个LED对象，可以使用LED.on和LED.off这样的术语进行编程，而不必考虑使用GPIO行的细节。当然，即使其使用被软件隐藏，GPIO行也参与了这个过程——当你声明LED.on时，一个GPIO行被设置为高电平，连接到它的LED就会亮起。


    GPIO Zero提供了类，让你可以处理从交通灯到电机和机器人的一系列对象。然而，它们都使用GPIO行来完成工作。'
