    \ the same procedure will produce a suitable class to work with it."
  - "[PAGE 116]\n\n# HC-SR04 Distance Sensor\n\nAn ultrasonic distance sensor works\
    \ by sending out a pulse of ultrasonic sound and timing how long it takes to detect\
    \ an echo. There are a number of similar modules on the market, but the HC-SR04\
    \ is common and inexpensive.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_116_0.png)\n\
    \nHowever, it needs to work with 5V data lines and this means using a divider\
    \ to shift the voltage to 3.3V. A simpler solution is to use the HC-SR04P, which\
    \ is nearly as cheap and works at 3.3V.\n\nWhichever module you use, there are\
    \ four connections Vcc, Ground, Trig (Trigger) and Echo. You have to connect each\
    \ of Trig and Echo to a GPIO line. The basic operation is that the Trig line is\
    \ set high for a short time and this causes the module to send a pulse. The Echo\
    \ line goes high when a reflected pulse is detected. The time between the two\
    \ events gives you the distance.\n\nThe constructor requires that you specify\
    \ the two pins used as the first two parameters:\n\n```\nDistanceSensor(echo,\
    \ trigger, queue_len=30, max_distance=1,\n    threshold_distance=0.3, partial=False,\
    \ pin_factory=None)\n```\n\nNotice that readings are the smoothed average of 30\
    \ measurements – ultrasonic distance measuring is very noisy. You can also specify\
    \ a max_distance which is use to scale the value parameter. The threshold_distance\
    \ is used to specify a “too close” event via\n\n+   - wait_for_in_range\n- wait_for_out_of_range,\n\
    - when_in_range\n- when_out_of_range.\n\nThe distance property gives an estimate\
    \ of the current distance from 0 to max_distance and value gives a scaled distance\
    \ in the range 0 to 1."
- md: "## Source/Values – An Alternative Approach\n\nWe have already seen that events\
    \ are a good way of getting things done simply when it comes to input. They might\
    \ not scale well to more serious applications, but they make simple programs even\
    \ simpler. GPIO Zero also offers a way to “connect” input and output devices.\
    \ This is sophisticated in its implementation, but, as with events, it is very\
    \ easy to use – at least initially. You don’t need to know about, or make use\
    \ of, the source/values approach to programming devices, but it provides another\
    \ approach to the problem of creating a program – declarative programming. This\
    \ is where, instead of writing instructions that tell the machine what to do at\
    \ every step, you simply write something that specifies what you want.\n\nEvery\
    \ GPIO Zero device has a value property, which indicates its current state as\
    \ a zero or one. Input devices have a read-only value property, they are sources\
    \ of data, and output devices have a read/write value property that can be regarded\
    \ as a data sink. You can connect together a data input with a data output using\
    \ the source property. For example:\n\n```\nled.source = button\n```\n\nconnects\
    \ the button’s value to the LED’s value such that any changes in the button’s\
    \ value is communicated to the LED. It is as if you were running:\n\n```\nwhile\
    \ True:\n    led.value = button.value\n```\n\nwhich is more or less what actually\
    \ happens, but as the code is being run in a background thread, your program can\
    \ get on and do something else. The result is that you have “wired up” the button\
    \ to the LED in software and now, every time you press the button, the LED will\
    \ light up and every time you release it, the LED will switch off.\n\nValues are\
    \ updated once every hundredth of a second, so the background program is:\n\n\
    ```\nwhile True:\n    led.value = button.value\n    sleep(0.01)\n```\n\nYou can\
    \ change the rate of update by setting the source_delay property to the time between\
    \ values. For example:\n\n```\nled.source.source_delay = 0.5\n```\n\nsets the\
    \ update to once every half a second. You can set the update rate for each device\
    \ via its source_delay property.\n\nEvery device also has a values property which\
    \ converts its value property into an iterator. For example, to repeatedly print\
    \ the value property of the button, you can write:\n\n```\nfor d in button.values:\n\
    \    print(d)\n```\n\nThe values property is used by the source property to retrieve\
    \ values. You don't need to know how the values property is created to use it,\
    \ but it isn't complicated:\n\n```\n@property\ndef values(self):\n    while True:\n\
    \        try:\n            yield self.value\n        except DeviceClosed:\n  \
    \          break\n```\n\nYou can see that reading values creates an infinite loop\
    \ that keeps returning the value property until something goes wrong. This is\
    \ used to connect two devices together.\n\nYou can take this “wiring” a stage\
    \ further and make chains of connected value properties. For example:\n\n```\n\
    led1.source = button\nled2.source = led1\n```\n\nwould result in both LEDs turning\
    \ on when the button was pressed.\n\nYou can also go beyond zero and one. Some\
    \ input devices return a value between 0 and 1 and some return values outside\
    \ of this range. As long as the input value range and the output value range are\
    \ similar, you can connect them together. For example, the light or the distance\
    \ sensor described earlier outputs a value in the range 0 to 1. There is also\
    \ a PWMLED, which we will meet in detail in the next chapter, which has a value\
    \ that can be set between 0 and 1 to set its brightness level. We can connect\
    \ any of these together. For example:\n\n```\nfrom gpiozero import PWMLED, DistanceSensor\n\
    from signal import pause\n\nled = PWMLED(4)\ndist = DistanceSensor(5, 6)\nled.source\
    \ = dist\npause()\n```\n\nresults in an LED that gets brighter as something moves\
    \ away from the distance sensor.\n\nWhat if you wanted the LED to get brighter\
    \ as something approached?\n\nThe answer is you can put other objects in the chain\
    \ of values that can process the data. GPIO Zero provides some standard value\
    \ processing functions including the following source functions.\n\n- **absoluted(values)**:\
    \ Takes the absolute value of each value.\n- **booleanized(values, min, max, hysteresis=0)**:\
    \ True for values in the range min to max and False otherwise. The hysteresis\
    \ parameter sets the amount of change that is allowed without changing the state.\
    \ That is, if the value is greater than max then the cutoff is max-hysteresis\
    \ and if it is smaller than max has to increase to max plus hysteresis before\
    \ the state is changed.\n- **clamped(value, output_min=0, output_max=1)**: Truncates\
    \ values to be in the range output_min to output_max.\n- **inverted(values, input_min=0,\
    \ input_max=1)**: Inverts the value using input_max minus value plus input_min.\n\
    - **negated(values)**: Swaps True and False.\n- **post_delayed(values, delay)**:\
    \ Waits for delay seconds after returning the value.\n- **pre_delayed(values,\
    \ delay)**: Waits for delay seconds before returning value.\n- **scaled(values,\
    \ output_min, output_max, input_min=0, input_max=1)**: Re-scales the values using\
    \ value*(output_max-output_min) divided by (input_max-input_min) plus output_min.\n\
    - **post_periodic_filtered(values, repeat_after, block)**: After repeat_after\
    \ items, blocks the next block items from values. So post_periodic_filtered(values,\
    \ 1, 1) discards even items.\n- **pre_periodic_filtered(values, block, repeat_after)**:\
    \ Blocks the next block of items from values and after repeat_after items repeats\
    \ the block. So pre_periodic_filtered(values, 100, 0) discards the first 100 values\
    \ and pre_periodic_filtered(values, 1, 1) discards all odd values.\n- **quantized(values,\
    \ steps, input_min=0, input_max=1)**: Converts to discrete values between input_min\
    \ and input_max using int(value*steps)/steps*(input_max-input_min)+input_min.\n\
    - **queued(values, qsize)**: Forms a queue of qsize values and only passes them\
    \ on when the queue is full.\n- **smoothed(values, qsize, function)**: Forms a\
    \ queue of qsize value and then applies the function specified by function, by\
    \ default average, to them, so reducing them to a single value.\n\nTo return to\
    \ the problem of making the LED glow brighter as something moves closer, you can\
    \ see that all we need to do is use the inverted function to turn 0 to 1 into\
    \ 1 to 0:\n\n```\nfrom gpiozero import PWMLED, DistanceSensor\nfrom gpiozero.tools\
    \ import inverted\nfrom signal import pause\n\nled = PWMLED(4)\ndist = DistanceSensor(5,\
    \ 6)\nled.source = inverted(dist)\npause()\n```\n\nWe don't need to specify the\
    \ `input_max` and `input_min` parameters because they default to 1 and 0.\n\n\
    As well as functions which can transform the values there are also functions which\
    \ can combine values from multiple sources. Each of these functions accepts any\
    \ number of parameters:\n\n- **all_values(*values)**: Returns True if all of the\
    \ values are True.\n- **any_values(*values)**: Returns True if any of the values\
    \ is True.\n- **averaged(*values)**: Returns the average of all the values.\n\
    - **multiplied(*values)**: Returns the product of all the values.\n- **summed(*values)**:\
    \ Returns the sum of all the values.\n- **zip_values(*values)**: Returns a tuple\
    \ of all the values.\n\nFor example, if you have distance sensors on the back\
    \ and front of a robot you can set an LED to the average distance using:\n\n```\n\
    from gpiozero import PWMLED, DistanceSensor\nfrom gpiozero.tools import inverted,\
    \ averaged\nfrom signal import pause\n\nled = PWMLED(4)\nfront = DistanceSensor(5,\
    \ 6)\nback = DistanceSensor(7, 8)\nled.source = averaged(front, back)\npause()\n\
    ```\n\n## A Custom Combining Function\n\nEven though there are so many combining\
    \ functions, there is usually a need for something specialized. For example, what\
    \ about a function that returns the minimum value? If you take a look at the source\
    \ code for any of the functions listed above, you should have no difficulty in\
    \ seeing how to create your own. In this case, our custom mined function is:\n\
    \n```\nfrom gpiozero.tools import _normalize\n\ndef mined(*values):\n    values\
    \ = [_normalize(v) for v in values]\n    for v in zip(*values):\n        yield\
    \ min(v)\n```\n\nIf you are sure that the values are all in standard form, i.e.\
    \ created by devices or functions in GPIO Zero, you can omit the call to _normalize.\
    \ The core of the function simply uses zip to create a tuple of all of the readings\
    \ and then applies the standard Python min function to each tuple, yielding on\
    \ the result.\n\nYou can replace the min function by max or whatever you need\
    \ to create your own transformation of the data.\n\nOnce you have the mined function\
    \ you can create a program that lights the LED according to the closest approach\
    \ from the back or the front:\n\n```\nfrom gpiozero import PWMLED, DistanceSensor\n\
    from gpiozero.tools import _normalize\n\ndef mined(*values):\n    values = [_normalize(v)\
    \ for v in values]\n    for v in zip(*values):\n        yield min(v)\n\nfrom signal\
    \ import pause\n\nled = PWMLED(4)\nfront = DistanceSensor(5, 6)\nback = DistanceSensor(7,\
    \ 8)\nled.source = mined(front, back)\npause()\n```\n\nNow the LED is set to the\
    \ smallest of the readings from the front and back distance sensors."
  mdcn: "## 源/值 – 一种替代方法\n\n我们已经看到，事件是在处理输入时简化操作的好方法。它们可能无法很好地扩展到更复杂的应用程序，但它们使简单的程序变得更加简单。GPIO\
    \ Zero 还提供了一种“连接”输入和输出设备的方式。其实现很复杂，但与事件一样，它非常易于使用——至少在开始时是这样。你不需要了解或使用源/值方法来编程设备，但它为创建程序的问题提供了另一种方法——声明式编程。在这种方法中，你不是编写告诉机器每一步该做什么的指令，而是简单地编写指定你想要什么的内容。\n\
    \n每个 GPIO Zero 设备都有一个 `value` 属性，它以零或一表示其当前状态。输入设备具有只读的 `value` 属性，它们是数据源，而输出设备具有可读写的\
    \ `value` 属性，可以被视为数据接收器。你可以使用 `source` 属性将数据输入与数据输出连接在一起。例如：\n\n```\nled.source\
    \ = button\n```\n\n将按钮的值连接到 LED 的值，使得按钮值的任何变化都会传递给 LED。就好像你在运行：\n\n```\nwhile\
    \ True:\n    led.value = button.value\n```\n\n这或多或少就是实际发生的情况，但由于代码是在后台线程中运行的，你的程序可以继续做其他事情。结果是你已经在软件中将按钮“连接”到了\
    \ LED，现在，每次按下按钮，LED 就会亮起，每次松开按钮，LED 就会熄灭。\n\n值每百分之一秒更新一次，因此后台程序是：\n\n```\nwhile\
    \ True:\n    led.value = button.value\n    sleep(0.01)\n```\n\n你可以通过将 `source_delay`\
    \ 属性设置为值之间的时间来更改更新速率。例如：\n\n```\nled.source.source_delay = 0.5\n```\n\n将更新设置为每半秒一次。你可以通过每个设备的\
    \ `source_delay` 属性设置其更新速率。\n\n每个设备还有一个 `values` 属性，它将其 `value` 属性转换为一个迭代器。例如，要重复打印按钮的\
    \ `value` 属性，你可以编写：\n\n```\nfor d in button.values:\n    print(d)\n```\n\n`values`\
    \ 属性被 `source` 属性用来检索值。你不需要知道 `values` 属性是如何创建的就可以使用它，但它并不复杂：\n\n```\n@property\n\
    def values(self):\n    while True:\n        try:\n            yield self.value\n\
    \        except DeviceClosed:\n            break\n```\n\n你可以看到，读取值会创建一个无限循环，不断返回\
    \ `value` 属性，直到出现问题。这用于将两个设备连接在一起。\n\n你可以将这种“连接”更进一步，创建连接的值属性链。例如：\n\n```\nled1.source\
    \ = button\nled2.source = led1\n```\n\n将导致按下按钮时两个 LED 都亮起。\n\n你也可以超越零和一。一些输入设备返回\
    \ 0 到 1 之间的值，一些返回超出此范围的值。只要输入值范围和输出值范围相似，你就可以将它们连接在一起。例如，前面描述的光或距离传感器输出 0 到 1\
    \ 范围内的值。还有一个 `PWMLED`，我们将在下一章详细介绍，它的值可以在 0 到 1 之间设置以设置其亮度级别。我们可以将其中任何一个连接在一起。例如：\n\
    \n```\nfrom gpiozero import PWMLED, DistanceSensor\nfrom signal import pause\n\
    \nled = PWMLED(4)\ndist = DistanceSensor(5, 6)\nled.source = dist\npause()\n```\n\
    \n结果是一个 LED，当有物体远离距离传感器时会变得更亮。\n\n如果你希望 LED 在物体靠近时变得更亮怎么办？\n\n答案是，你可以在值链中放入其他对象来处理数据。GPIO\
    \ Zero 提供了一些标准值处理函数，包括以下源函数。\n\n- **absoluted(values)**：取每个值的绝对值。\n- **booleanized(values,\
    \ min, max, hysteresis=0)**：对于 min 到 max 范围内的值为 True，否则为 False。滞后参数设置允许在不改变状态的情况下发生的变化量。也就是说，如果值大于\
    \ max，则截止点为 max-hysteresis，如果小于 max，则必须增加到 max 加上滞后才会改变状态。\n- **clamped(value,\
    \ output_min=0, output_max=1)**：将值截断为 output_min 到 output_max 范围内。\n- **inverted(values,\
    \ input_min=0, input_max=1)**：使用 input_max 减去值再加上 input_min 来反转值。\n- **negated(values)**：交换\
    \ True 和 False。\n- **post_delayed(values, delay)**：在返回值后等待 delay 秒。\n- **pre_delayed(values,\
    \ delay)**：在返回值前等待 delay 秒。\n- **scaled(values, output_min, output_max, input_min=0,\
    \ input_max=1)**：使用 value*(output_max-output_min) 除以 (input_max-input_min) 再加上\
    \ output_min 重新缩放值。\n- **post_periodic_filtered(values, repeat_after, block)**：在\
    \ repeat_after 个项目后，阻止接下来的 block 个项目从值中通过。因此 post_periodic_filtered(values, 1,\
    \ 1) 丢弃偶数项。\n- **pre_periodic_filtered(values, block, repeat_after)**：阻止接下来的 block\
    \ 个项目从值中通过，并在 repeat_after 个项目后重复该块。因此 pre_periodic_filtered(values, 100, 0) 丢弃前\
    \ 100 个值，pre_periodic_filtered(values, 1, 1) 丢弃所有奇数值。\n- **quantized(values, steps,\
    \ input_min=0, input_max=1)**：使用 int(value*steps)/steps*(input_max-input_min)+input_min\
    \ 将值转换为 input_min 和 input_max 之间的离散值。\n- **queued(values, qsize)**：形成一个 qsize\
    \ 大小的值队列，仅在队列满时才传递它们。\n- **smoothed(values, qsize, function)**：形成一个 qsize 大小的值队列，然后应用\
    \ function 指定的函数（默认为平均值）来处理它们，从而将它们减少为单个值。\n\n回到让 LED 在物体靠近时发光更亮的问题，你可以看到我们需要做的就是使用\
    \ `inverted` 函数将 0 到 1 转换为 1 到 0：\n\n```\nfrom gpiozero import PWMLED, DistanceSensor\n\
    from gpiozero.tools import inverted\nfrom signal import pause\n\nled = PWMLED(4)\n\
    dist = DistanceSensor(5, 6)\nled.source = inverted(dist)\npause()\n```\n\n我们不需要指定\
    \ `input_max` 和 `input_min` 参数，因为它们默认为 1 和 0。\n\n除了可以转换值的函数之外，还有可以组合来自多个源的值的函数。每个这些函数都接受任意数量的参数：\n\
    \n- **all_values(*values)**：如果所有值都为 True，则返回 True。\n- **any_values(*values)**：如果任何值为\
    \ True，则返回 True。\n- **averaged(*values)**：返回所有值的平均值。\n- **multiplied(*values)**：返回所有值的乘积。\n\
    - **summed(*values)**：返回所有值的总和。\n- **zip_values(*values)**：返回所有值的元组。\n\n例如，如果你在机器人的后部和前部有距离传感器，你可以使用以下方法将\
    \ LED 设置为平均距离：\n\n```\nfrom gpiozero import PWMLED, DistanceSensor\nfrom gpiozero.tools\
    \ import inverted, averaged\nfrom signal import pause\n\nled = PWMLED(4)\nfront\
    \ = DistanceSensor(5, 6)\nback = DistanceSensor(7, 8)\nled.source = averaged(front,\
    \ back)\npause()\n```\n\n## 一个自定义的组合函数\n\n尽管有这么多组合函数，但通常还是需要一些专门的东西。例如，返回最小值的函数怎么样？如果你查看上面列出的任何函数的源代码，你应该不难看出如何创建自己的函数。在这种情况下，我们的自定义\
    \ `mined` 函数是：\n\n```\nfrom gpiozero.tools import _normalize\n\ndef mined(*values):\n\
    \    values = [_normalize(v) for v in values]\n    for v in zip(*values):\n  \
    \      yield min(v)\n```\n\n如果你确定值都是标准形式，即由 GPIO Zero 中的设备或函数创建的，你可以省略对 `_normalize`\
    \ 的调用。函数的核心只是使用 `zip` 创建所有读数的元组，然后对每个元组应用标准的 Python `min` 函数，并产生结果。\n\n你可以用 `max`\
    \ 或任何你需要的函数替换 `min` 函数来创建你自己的数据转换。\n\n一旦你有了 `mined` 函数，你就可以创建一个程序，根据后部或前部的最接近距离来点亮\
    \ LED：\n\n```\nfrom gpiozero import PWMLED, DistanceSensor\nfrom gpiozero.tools\
    \ import _normalize\n\ndef mined(*values):\n    values = [_normalize(v) for v\
    \ in values]\n    for v in zip(*values):\n        yield min(v)\n\nfrom signal\
    \ import pause\n\nled = PWMLED(4)\nfront = DistanceSensor(5, 6)\nback = DistanceSensor(7,\
    \ 8)\nled.source = mined(front, back)\npause()\n```\n\n现在 LED 被设置为前部和后部距离传感器读数中的最小值。"
