  md: "# Attributes and Properties\n\nA data attribute is the simplest way of allowing\
    \ an object to store data. In this case you can simply use the attribute as if\
    \ it was a variable. For example:\nmyObject.myAttribute = 42\n\nAttributes work\
    \ well but they are the first step on the way to more sophisticated approaches\
    \ to storing data. For example suppose you have a data attribute that is used\
    \ to store the temperature:\nMyObject.temperature = 42\n\nIf this was being used\
    \ to control the temperature of an enclosure via a heater it would be a good idea\
    \ to check that it was set within a reasonable range, 20 to 30 °C say. It would\
    \ also be useful if the temperature could be stored internally in millicentigrade,\
    \ i.e. in thousandths of a centigrade degree, a unit often used by IoT devices.\
    \ With a simple data attribute there is no way to do this, but you can easily\
    \ invent one.\n\nInstead of a data attribute we can create two methods, usually\
    \ called get and set methods:\n\n```\nclass Heater():\n    def __init__(self):\n\
    \        self.temperature=22*1000\n    def setTemperature(self,t):\n        if\
    \ t<20:return\n        if t>30:return\n        self.temperature=t*1000\n    def\
    \ getTemperature(self):\n        return self.temperature/1000\n```\n\nYou can\
    \ see that we now have a get and a set method and the set checks that the value\
    \ is in range and the get converts back to centigrade. This all works, but it\
    \ means you have to use the temperature attribute in an unnatural way:\nheater=Heater()\n\
    heater.setTemperature(31)\nprint(heater.getTemperature())\n\nPython has a better\
    \ way. You can define a property using the @property decorator. Decorators are\
    \ a powerful part of Python and if you want to know more see *Programmer's Python:\
    \ Everything is an Object* but in this case we just want to make use of it."
  merge: -1
  pgno: 50
- img_proc: true
  md: "For example:\n\n```\nclass Heater():\n    def __init__(self):\n        self._temperature=22*1000\n\
    \    @property\n    def temperature(self):\n        return self._temperature/1000\n\
    \    @temperature.setter\n    def temperature(self,t):\n        print(t)\n   \
    \     if t<20:return\n        if t>30:return\n        self._temperature=t*1000\n\
    ```\n\nYou can see that we have a get function and a set function defined in a\
    \ slightly different way. We also need to have a “backing” variable, _temperature,\
    \ because now we have named the getter and setter temperatures. This might seem\
    \ slightly more complicated, but now you can write:\n\n```\nheater=Heater()\n\
    heater.temperature = 31\nprint(heater.temperature)\n```\n\nand the get and set\
    \ functions are used automatically, i.e. the temperature doesn't change because\
    \ it is outside of the range.\n\nProperties are used for all sorts of reasons\
    \ throughout GPIO Zero. For example, in Device you will find:\n\n```\n@property\n\
    def is_active(self):\n    \"\"\"\n    Returns :data:`True` if the device is currently\
    \ active and\n    :data:`False` otherwise. This property is usually derived from\n\
    \    :attr:`value`. Unlike :attr:`value`, this is *always* a boolean.\n    \"\"\
    \"\n    return bool(self.value)\n```\n\nThis allows you to write things like:\n\
    \n```\nif(device.is_active):\n```\n\nwithout having to convert to Boolean values\
    \ or make a comparison."
