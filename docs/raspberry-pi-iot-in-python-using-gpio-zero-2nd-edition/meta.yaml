- img_proc: true
  md: '# Chapter 12

    Working With Compound Devices


    You might well start off with a single GPIO line flashing an LED, but slowly and
    surely you will graduate to more elaborate devices such as a robot that consists
    of a number of flashing LEDs, motors and so on. If what you have created is a
    development on an existing device then you might create a new custom class using
    inheritance and we have seen examples of this in earlier chapters. For example,
    when we wanted to implement a door lock class, the obvious way was to create a
    new class that inherited from the existing LED class. The reason is that both
    the LED and lock share a basic on/off behavior, but in the case of the lock it
    is better called “lock/unlock”.

    Compare this to the problem of building a custom class to control three or more
    separate LEDs. In this case you don’t need to inherit the behavior of a single
    LED, you need multiple instances of the LED class. In this case what you need
    is composition, i.e. combining classes, rather than inheritance. GPIO Zero has
    a class that you can use to create composite devices and this chapter looks at
    how this works in enough detail for you to create your own.


    # Devices That Contain Devices


    The CompositeDevice class is intended to be inherited by your custom classes to
    make it easy to include instances of other classes, but first it makes sense to
    see how to do the job without help.

    If you were implementing a composite device from scratch then the logical thing
    to do is to create a tuple, list or dictionary of the instances you need. For
    example, if you wanted to create a custom TriLED class, you might write in the
    constructor a tuple like:

    self.LEDs=(LED(pin1),LED(pin2),LED(pin3))

    After this you would write the methods that are required using the tuple to access
    the LEDs.'
  merge: -1
  pgno: 174
- img_proc: true
  md: "For example, you might want an AllOn and AllOff method:\n\n```\nfrom gpiozero\
    \ import LED\nfrom time import sleep\nclass TriLED():\n    def __init__(self,\
    \ pin1=None,pin2=None,pin3=None):\n        self.LEDs=(LED(pin1),LED(pin2),LED(pin3))\n\
    \n    def AllOn(self):\n        self.LEDs[0].on()\n        self.LEDs[1].on()\n\
    \        self.LEDs[2].on()\n\n    def AllOff(self):\n        self.LEDs[0].off()\n\
    \        self.LEDs[1].off()\n        self.LEDs[2].off()\n```\n\nA program to make\
    \ use of the new class would be something like:\n\n```\nleds=TriLED(4,17,27)\n\
    while True:\n    leds.AllOn()\n    sleep(0.001)\n    leds.AllOff()\n    sleep(0.001)\n\
    ```\n\nOf course, in a real TriLED application you might have methods for set\
    \ patterns – rotate left, rotate right and so on, but the general idea is the\
    \ same.\n\n# The CompositeDevice\n\nThe CompositeDevice class is designed to help\
    \ with this general pattern of using a tuple of devices. You add the devices in\
    \ the constructor and you can add them as unnamed members of a tuple or as named\
    \ attributes. The difference is that named attributes make it easier to access\
    \ the sub-devices from the outside world. If you specify a device as a positional\
    \ parameter, then it is added to a tuple. If you specify a device as a named parameter\
    \ then attributes with the same name are added. The only slight mystery is how\
    \ do you access the tuple of devices? The answer is that the CompositeDevice class\
    \ itself behaves like a tuple and you can access its contents in the usual way.\
    \ It doesn't achieve this by inheritance. Instead it overrides the __getitem__\
    \ magic method which is called when you use indexing. For example:\n\n```\ncompdev=CompositeDevice(LED(pin1),LED(pin2))\n\
    compdev[1].on()\n```\n\nturns on the LED on pin2."
  merge: -1
  pgno: 175
- img_proc: true
  md: "Named parameters are easier to understand:\ncompdev=CompositeDevice(led1=LED(pin1),led2=LED(pin2))\n\
    compdev.led2.on()\n\nYou should use the first approach for devices that are used\
    \ internally and the second if you want to allow outside access to the component\
    \ devices.\nOf course, if you are creating a custom class for some device, then\
    \ a better idea is to inherit from CompositeDevice rather than create an instance\
    \ so that your custom class inherits the same behavior.\n\nThis is easier to understand\
    \ after an example. The TriLED class can be implemented using CompositeDevice\
    \ inheritance as:\n\n```\nclass TriLED(CompositeDevice):\n    def __init__(self,\
    \ pin1=None,pin2=None,pin3=None):\n        super(TriLED,\nself).__init__(LED(pin1),LED(pin2),LED(pin3))\n\
    \n    def AllOn(self):\n        self[0].on()\n        self[1].on()\n        self[2].on()\n\
    \n    def AllOff(self):\n        self[0].off()\n        self[1].off()\n      \
    \  self[2].off()\n```\n\nNotice that now it is the instance of TriLED that behaves\
    \ as a container for the LEDs:\n\n```\nleds=TriLED(4,17,27)\nwhile True:\n   \
    \ leds[0].on()\n    sleep(0.001)\n    leds[0].off()\n    sleep(0.001)\n```\n\n\
    You can see that there is access to the component LEDs, the LED on pin 4 in this\
    \ case, and, in general, this is to be discouraged – you should provide methods\
    \ that do the things the user wants to do without them having to access the component\
    \ parts. This is an ideal and in some situations direct access to the components\
    \ might be the only way of getting the job done.\nIf you do want to encourage\
    \ access from the outside world then use named parameters:\n\n```\nclass TriLED(CompositeDevice):\n\
    \    def __init__(self, pin1=None,pin2=None,pin3=None):\n        super(TriLED,\
    \ self).__init__(left=LED(pin1),\n                                    middle=LED(pin2),right=LED(pin3))\n\
    ```"
  merge: -1
  pgno: 176
- img_proc: true
  md: "Now you can write the more meaningful:\n\n```\nleds=TriLED(4,17,27)\nwhile\
    \ True:\n    leds.left.on()\n    sleep(0.001)\n    ledsleft.off()\n    sleep(0.001)\n\
    ```\n\nThe CompositeDevice class also brings some extras of its own. The main\
    \ one is value, which returns a named tuple with the current value of each device.\
    \ For example:\n\n```\nleds=TriLED(4,17,27)\nprint(leds.value)\n```\n\ndisplays:\n\
    \n```\nTriLEDValue(device_0=0, device_1=0, device_2=0)\n```\n\nFor unnamed devices\
    \ the class assigns a name, while for named devices the name given is used. You\
    \ can adjust the order in which the devices are listed in the tuple using the\
    \ _order parameter - the underscore at the start of the name is a sure sign that\
    \ you are not expected to need it. For example, changing the call to the constructor\
    \ to:\n\n```\nsuper(TriLED, self).__init__(left=LED(pin1),middle=LED(pin2),\n\
    \                        right=LED(pin3),_order=[\"right\",\"left\",\"middle\"\
    ])\n```\n\nresults in printing:\n\n```\nTriLEDValue(right=0, left=0, middle=0)\n\
    ```\n\nIf you need to create an identical type, the namedtuple attribute provides\
    \ the class of the named tuple used to report the value. This is helpful if you\
    \ are using the CompositeOutputDevice class.\n\n# CompositeOutputDevice\n\nUsually\
    \ a composite device has both input and output devices, but if it only has output\
    \ the CompositeOutputDevice adds a few extra methods to CompositeDevice that are\
    \ useful. In particular:\n\n+   - on() turns all devices on\n- off() turns all\
    \ devices off\n- toggle() turns any on device off and any off device on.\n\nAlso\
    \ the value attribute is modified to allow you to set the state of all of the\
    \ output devices."
  merge: -1
  pgno: 177
- img_proc: true
  md: "The CompositeOutputDevice makes implementing TriLED much easier:\nfrom gpiozero\
    \ import LED, CompositeOutputDevice\nfrom time import sleep\n\n```\nclass TriLED(CompositeOutputDevice):\n\
    \    def __init__(self, pin1=None,pin2=None,pin3=None):\n        super(TriLED,\
    \ self).__init__(left=LED(pin1),\n                                    middle=LED(pin2),right=LED(pin3))\n\
    ```\n\nNotice that now you don't have to define an allOn or allOff as they are\
    \ inherited as on and off.\nIn addition you can now set the state of all of the\
    \ output devices in one operation:\n\n```\nleds=TriLED(4,17,27)\nwhile True:\n\
    \    leds.value=leds.namedtuple(0,1,1)\n    sleep(0.001)\n    leds.value=leds.namedtuple(1,0,0)\n\
    \    sleep(0.001)\n```\n\nThis sets the LED on pin1 low and the other two high\
    \ and then sets pin 1 high and the other two low.\n\n# LEDCollection\n\nDevices\
    \ with sets of LEDs are so common and so easy to make that there is a special\
    \ LEDCollection version of CompositeOutputDevice which creates a tuple of LED\
    \ or PWMLED objects. The default is to create LED objects, but you can change\
    \ this using pwm=True in the constructor. It inherits the on, off and toggle methods\
    \ from CompositeOutputDevice and has an leds attribute which gets or sets the\
    \ LED tuple.\nUsing this we can implement TriLED as:\n\n```\nclass TriLED(LEDCollection):\n\
    \    def __init__(self, pin1=None,pin2=None,pin3=None):\n        super(TriLED,\
    \ self).__init__(left=pin1,\n                                    middle=pin2,right=pin3)\n\
    ```\n\nNotice that now we don't need to specify that we are creating LED objects,\
    \ just the pins used. Once you have an instance of this new class you can use\
    \ it as before.\nThe LEDCollection class is used to implement many of the LED\
    \ classes discussed below."
  merge: -1
  pgno: 178
