    # Chapter 11

    Controlling Motors And Servos


    Motors form an important class of output devices and they are fairly easy to use,
    but it is important to understand the different types of motor that you can use.

    The simplest division among types of motor are AC and DC. AC motors are generally
    large and powerful and run from mains voltage. As they are more difficult to work
    with, and they work at mains voltages, these aren''t used much in IoT applications.
    DC motors generally work on lower voltage and are much more suitable for the IoT.
    In this chapter we will only look at DC motors and how they work thanks to pulse
    width modulation.


    # DC Motor


    There are two big classes of DC motors – brushed and brushless. All motors work
    by using a set of fixed magnets, the stator, and a set of rotating magnets, the
    rotor. The important idea is that a motor generates a “push” that rotates the
    shaft by the forces between the magnet that makes up the stator and the magnet
    that makes up the rotor. The stronger these magnets are, the stronger the push
    and the more torque (turning force) the motor can produce. To keep the motor turning,
    one of the two magnetic fields has to change to keep the rotor being attracted
    to a new position.

    DC motors differ in how they create the magnetism in each component, either using
    a permanent magnet or an electromagnet. This means there are four possible arrangements:


    | | 1 | 2 | 3 | 4 |

    |---|---|---|---|---|

    | **Stator** | Permanent | Permanent | Electromagnet | Electromagnet |

    | **Rotor** | Permanent | Electromagnet | Permanent | Electromagnet |

    | **Type** | Can''t work | Brushed DC | Brushless DC | Series or shunt |


    Arrangement 1 can’t produce a motor because there is no easy way of changing the
    magnetic field. Arrangement 4 produces the biggest and most powerful DC motors
    as used in trains, cars and so on. Arrangement 2, Brushed DC, is the most commonly
    encountered form of “small” DC motor. However, arrangement 3, brushless DC, is
    becoming increasingly popular.'
  - '[PAGE 149]


    Different arrangements produce motors which have different torque characteristics
    – i.e. how hard they are to stop at any given speed. Some types of motor are typically
    low torque at any speed, i.e. they spin fast but are easy to stop.


    Low torque motors are often used with gearboxes which reduce the speed and increase
    the torque. The big problem with gearboxes, apart from extra cost, is backlash.
    The gears don''t mesh perfectly and this looseness means that you can turn the
    input shaft and at first the output shaft won''t move. Only when the slack in
    the gears has been taken up will the output shaft move. This makes a geared motor
    less useful for precise positioning, although there are ways to improve on this
    using feedback and clever programming.


    # Brushed Motors


    To energize the electromagnets, a brushed motor supplies current to the armature
    via a split ring or commutator and brushes. As the rotor rotates, the current
    in the coil is reversed and it is always attracted to the other pole of the magnet.


    The only problem with this arrangement is that, as the brushes rub on the slip
    ring as the armature rotates, they wear out and cause sparks and hence RF interference.
    The quality of a brushed motor depends very much on the design of the brushes
    and the commutator.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_149_0.png)


    Very small, cheap, brushed DC motors, of the sort in the picture below, tend to
    not have brushes that can be changed and when they wear out the motor has to be
    replaced. They also tend to have very low torque and high speed. This usually
    means that they have to be used with a gearbox. If you overload a brushed motor
    then the tendency is to demagnetize the stator magnets. The cheapest devices are
    basically toys.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_149_1.png)'
- md: "Higher quality brushed motors are available and they also come in a variety\
    \ of form factors. For example, the 775 motor measures 66.7mm by 42mm overall\
    \ with a 5mm shaft:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_150_0.png)\n\n\
    Even these motors tend not to have user serviceable brushes, but they generally\
    \ last a long time due to better construction.\n\n## Unidirectional Brushed Motor\n\
    \nA brushed motor can be powered by simply connecting it to a DC supply. Reversing\
    \ the DC supply reverses the direction of the motor. The speed is simply proportional\
    \ to the applied voltage. If all you want is a unidirectional control then all\
    \ you need is a PWM driver that can supply the necessary current and voltage.\n\
    \nA single transistor solution is workable as long as you include a diode to allow\
    \ the energy stored in the windings to discharge when the motor is rotating, but\
    \ not under power:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_150_1.png)\n\n\
    This circuit is simple and will work with motor voltages up to 40V and motor currents\
    \ up to 5A continuous, 8A peak. The only small point to note is that the TIP120\
    \ is a Darlington pair, i.e. it is two transistors in the same case, and as such\
    \ the base voltage drop is twice the usual 0.6V, i.e. 1.2V, and this has to be\
    \ taken into account when calculating the current-limiting resistor.\n\nIt is\
    \ sometimes said that the TIP120 and similar are inefficient power controllers\
    \ because, comprising two transistors, they have twice the emitter collector voltage\
    \ you would expect, which means they dissipate more power than necessary. If you\
    \ are running a motor from a battery you might want to use a MOSFET, but as described\
    \ earlier 3.3V is low to switch a MOSFET on and off. One solution is to use a\
    \ BJT to increase the voltage applied to the gate:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_151_0.png)\n\
    \nThe BJT connects the gate to 12V. As the IRFZ44NPBF has a threshold voltage\
    \ between 2V and 4V devices should work at 5V and sometimes at 3.3V without the\
    \ help of the BJT, but providing 12V ensures that the MOSFET is fully on. One\
    \ problem with the circuit is that the use of the BJT inverts the signal. When\
    \ the GPIO line is high the BJT is on and the MOSFET is off and vice versa. In\
    \ other words, GPIO line high switches the motor off and low switches it on. This\
    \ MOSFET can work with voltages up to 50V and currents of 40A. The 2N2222 can\
    \ only work at 30V, or 40V in the case of the 2N2222A.\n\nA third approach to\
    \ controlling a unidirectional motor is to use half an H-bridge. Why this is so-called,\
    \ and why you might want to do it, will become apparent in the next section on\
    \ bidirectional motors. Half an H-bridge makes use of two complementary devices,\
    \ either an NPN and a PNP BJT or an N- and P-type MOSFET. For example:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_152_0.png)\n\
    \nIf the GPIO line is high then Q1 is on and Q2 off and the motor runs. If the\
    \ GPIO line is low then Q1 is off and Q2 is on and the motor is braked – it has\
    \ a resistance to rotating because of the back EMF generated when the rotor turns.\
    \ You probably need a BJT to feed the MOSFETs as selected.\n\nThere is no GPIO\
    \ Zero class to control a unidirectional motor, but it is easy to create one from\
    \ PWMOutputDevice:\n\n```python\nclass uniMotor(PWMOutputDevice):\n    def __init__(self,\
    \ pin=None, active_high=True,\n                 initial_value=0,pin_factory=None):\n\
    \        super(uniMotor, self).__init__(\n            pin, active_high, initial_value,\n\
    \            pin_factory=pin_factory\n        )\n    def speed(self,value):\n\
    \        self._write(value)\n\nmotor=uniMotor(4)\nmotor.speed(0.5)\nsleep(10)\n\
    ```\n\nWe have simply added a speed method. The inherited methods on and off are\
    \ still useful, but it might be better to block access to pulse and blink. Also\
    \ notice that if you are using the transistor/MOSFET driver, then setting active_high=False\
    \ solves the need to provide an inverted pulse.\n\n## Bidirectional Brushed Motor\n\
    \nIf you want bidirectional control then you need to use an H-bridge:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_153_0.png)\n\
    \nIt is easy to see how this works. If Q1 and Q4 are the only MOSFETs on the motor,\
    \ + is connected to 12V and – to ground. The motor runs in the forward direction.\
    \ If Q2 and Q3 are the only MOSFETs on the motor, + is connected to ground and\
    \ – is connected to 12V. The motor runs in the reverse direction. Of course, if\
    \ none or any one is on the motor is off. If Q1 and Q3, or Q2 and Q4, are on then\
    \ the motor is braked as its windings are shorted out and the back EMF acts as\
    \ a brake.\n\nYou can arrange to drive the four MOSFETs using four GPIO lines\
    \ - just make sure that they switch on and off in the correct order. Alternatively,\
    \ you can add a NOT gate to each pair so that you switch Q1/Q2 and Q3/Q4 to opposite\
    \ states.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_153_1.png)\n\nAn alternative\
    \ design is to use complementary MOSFETs:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_154_0.png)\n\
    \nIn this configuration, the first GPIO line drives the motor forward and the\
    \ second drives it in reverse. The effect of setting the two lines is:\n\n| Forward\
    \ | Reverse | Motor |\n| :--- | :--- | :--- |\n| Low | Low | Off |\n| Low | High\
    \ | Reverse |\n| High | Low | Forward |\n| High | High | Braked |\n\nYou can also\
    \ drive the GPIO lines for Forward/Reverse with a PWM signal and control the motor's\
    \ speed as well as direction. If you use the MOSFETs shown in the diagram then\
    \ you would also need a BJT to increase the drive voltage to each MOSFET, as in\
    \ the unidirectional case. You also need to include diodes to deal with potential\
    \ reverse voltage on each of the MOSFETs. The most important thing about an H-bridge\
    \ is that Q1/Q2 and Q3/Q4 should never be on together – this would short circuit\
    \ the power supply.\n\nIf working with four BJTs or MOSFETs is more than you want\
    \ to tackle, the good news is that there are chips that implement two H-bridges\
    \ per device. You can also buy low-cost, ready-made, modules with one or more\
    \ H-bridges.\n\nOne of the most used devices is the L298 Dual H-bridge which works\
    \ up to 46V and total DC current of 4A.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_155_0.png)\n\
    \nThe block diagram of one of the two H-bridges shows exactly how it works.\n\n\
    ![](img/39c0a42d027b4a8b43b07050c297f3ff_155_1.png)\n\nYou can see that the bridge\
    \ is made up of four BJTs and there are logic gates to allow In1 and In2 to select\
    \ the appropriate pairs of devices. The only extras are AND gates and that the\
    \ EnA line is used to switch all of the transistors off. The line shown as Sense\
    \ A can be used to detect the speed or load of the motor, but is rarely used.\n\
    \nA typical module based on the L298 can be seen below.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_155_2.png)\n\
    \nIt is easier to describe how to use this sort of module with a single motor.\
    \ The motor is connected to OUT1 and OUT2. Three GPIO lines are connected to ENA,\
    \ IN1 and IN2. ENA is an enable line, which has to be high for the motor to run\
    \ at all. IN1 and IN2 play the role of direction control lines – which one is\
    \ forward and which is reverse depends on which way round you connect the motor.\
    \ Putting a PWM signal on to ENA controls the speed of the motor and this allows\
    \ IN1 and IN2 to be simple digital outputs.\n\nNotice that the power connector\
    \ shows 5V and 12V supplies, but most of these modules have a voltage regulator\
    \ which will reduce the 12V to 5V. In this case you don't have to supply a 5V\
    \ connection. If you want to use more than 12V then the regulator has to be disconnected\
    \ and you need to arrange for a separate 5V supply – check with the module's documentation.\
    \ Notice that the transistors in the bridge have around a 2V drop, so using 12V\
    \ results in just 10V being applied to the motor.\n\nAnother very popular H-bridge\
    \ device is the SN754410 driver. This is suitable for smaller, lower powered,\
    \ motors and it has two complete H-bridges. It can supply up to 1A per driver\
    \ and work from 4.5 to 36V. It has the same set of control lines as the L298,\
    \ i.e. each motor has a Forward/Reverse control line and an Enable. You don't\
    \ have to use the Enable line; it can be connected to +5V to allow PWM to be applied\
    \ on the Forward/Reverse lines.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_156_0.png)\n\
    \n## Motor Software\n\nThere is a specific GPIO Zero class, Motor, to control\
    \ a motor using an H-bridge module of this sort. It seems to have been written\
    \ with the idea that an H-bridge would only support the Forward and Reverse control\
    \ lines and not the Enable. The basic constructor is:\n\n```\nMotor(forward, backward,\
    \ pwm=True)\n```\n\nThe GPIO lines Forward and Reverse have to be connected to\
    \ the IN1/IN2 or IN3/IN4. You also need to connect ENA or ENB to +5V to enable\
    \ the motor. If you use the default pwm=True then the GPIO lines supply a PWM\
    \ signal with a duty cycle set by you to control the motor's speed. If you don't\
    \ use"
  mdcn: "更高质量的有刷电机也有供应，并且它们也有多种外形尺寸。例如，775电机的整体尺寸为66.7mm x 42mm，轴径为5mm：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_150_0.png)\n\
    \n即使是这些电机，其电刷通常也不便于用户更换，但由于制造工艺更好，它们通常使用寿命很长。\n\n## 单向有刷电机\n\n只需将有刷电机连接到直流电源即可为其供电。反转直流电源的极性即可反转电机的转向。转速与施加的电压成正比。如果你只需要单向控制，那么你只需要一个能够提供必要电流和电压的PWM驱动器。\n\
    \n只要包含一个二极管，允许电机在旋转但未通电时绕组中储存的能量放电，单晶体管方案是可行的：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_150_1.png)\n\
    \n这个电路很简单，适用于电机电压高达40V、持续电流高达5A（峰值8A）的情况。唯一需要注意的小点是，TIP120是一个达林顿对管，即一个封装内有两个晶体管，因此其基极压降是通常0.6V的两倍，即1.2V，在计算限流电阻时必须考虑这一点。\n\
    \n有时人们说TIP120及类似器件是低效的功率控制器，因为它们由两个晶体管组成，其发射极-集电极电压是预期的两倍，这意味着它们比必要的功耗更大。如果你用电池驱动电机，你可能想使用MOSFET，但如前所述，3.3V对于开关MOSFET来说太低了。一个解决方案是使用BJT来提高施加到栅极的电压：\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_151_0.png)\n\nBJT将栅极连接到12V。由于IRFZ44NPBF的阈值电压在2V到4V之间，器件在5V下应该能工作，有时在3.3V下无需BJT辅助也能工作，但提供12V可确保MOSFET完全导通。该电路的一个问题是使用BJT会反转信号。当GPIO线为高电平时，BJT导通，MOSFET关断，反之亦然。换句话说，GPIO线高电平关闭电机，低电平开启电机。该MOSFET可适用于高达50V的电压和40A的电流。2N2222只能在30V下工作，2N2222A则可在40V下工作。\n\
    \n控制单向电机的第三种方法是使用半个H桥。为什么这样称呼，以及为什么你可能想这样做，将在下一节关于双向电机的部分变得清晰。半个H桥利用两个互补器件，可以是NPN和PNP\
    \ BJT，或者N沟道和P沟道MOSFET。例如：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_152_0.png)\n\
    \n如果GPIO线为高电平，则Q1导通，Q2关断，电机运行。如果GPIO线为低电平，则Q1关断，Q2导通，电机被制动——由于转子转动时产生的反电动势，它具有旋转阻力。你可能需要一个BJT来驱动所选的MOSFET。\n\
    \nGPIO Zero没有专门的类来控制单向电机，但很容易从PWMOutputDevice创建一个：\n\n```python\nclass uniMotor(PWMOutputDevice):\n\
    \    def __init__(self, pin=None, active_high=True,\n                 initial_value=0,pin_factory=None):\n\
    \        super(uniMotor, self).__init__(\n            pin, active_high, initial_value,\n\
    \            pin_factory=pin_factory\n        )\n    def speed(self,value):\n\
    \        self._write(value)\n\nmotor=uniMotor(4)\nmotor.speed(0.5)\nsleep(10)\n\
    ```\n\n我们只是添加了一个speed方法。继承的on和off方法仍然有用，但可能最好阻止访问pulse和blink。还要注意，如果你使用的是晶体管/MOSFET驱动器，那么设置active_high=False可以解决需要提供反向脉冲的问题。\n\
    \n## 双向有刷电机\n\n如果你需要双向控制，那么你需要使用H桥：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_153_0.png)\n\
    \n很容易看出这是如何工作的。如果Q1和Q4是电机上唯一导通的MOSFET，那么+连接到12V，-连接到地。电机正向运行。如果Q2和Q3是电机上唯一导通的MOSFET，那么+连接到地，-连接到12V。电机反向运行。当然，如果没有任何一个或只有一个导通，电机是关闭的。如果Q1和Q3，或者Q2和Q4导通，那么电机被制动，因为其绕组被短路，反电动势起到制动作用。\n\
    \n你可以安排使用四条GPIO线来驱动四个MOSFET——只需确保它们以正确的顺序开关。或者，你可以在每对MOSFET上添加一个非门，这样你就可以将Q1/Q2和Q3/Q4切换到相反的状态。\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_153_1.png)\n\n另一种设计是使用互补MOSFET：\n\n\
    ![](img/39c0a42d027b4a8b43b07050c297f3ff_154_0.png)\n\n在这种配置中，第一条GPIO线驱动电机正向，第二条驱动其反向。设置两条线的效果如下：\n\
    \n| 正向 | 反向 | 电机 |\n| :--- | :--- | :--- |\n| 低 | 低 | 关闭 |\n| 低 | 高 | 反向 |\n|\
    \ 高 | 低 | 正向 |\n| 高 | 高 | 制动 |\n\n你也可以用PWM信号驱动正向/反向的GPIO线，从而同时控制电机的速度和方向。如果你使用图中所示的MOSFET，那么你还需要一个BJT来提高每个MOSFET的驱动电压，就像单向情况一样。你还需要包含二极管来处理每个MOSFET上可能出现的反向电压。H桥最重要的一点是Q1/Q2和Q3/Q4绝不应同时导通——这会导致电源短路。\n\
    \n如果同时处理四个BJT或MOSFET超出了你的能力范围，好消息是有些芯片在一个器件中实现了两个H桥。你也可以购买带有单个或多个H桥的低成本、现成模块。\n\
    \n最常用的器件之一是L298双H桥，它可工作在高达46V的电压和总计4A的直流电流下。\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_155_0.png)\n\
    \n其中一个H桥的框图清楚地展示了其工作原理。\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_155_1.png)\n\
    \n你可以看到该桥由四个BJT组成，并有逻辑门允许In1和In2选择合适的器件对。唯一的额外部分是与门，并且EnA线用于关闭所有晶体管。标记为Sense A的线可用于检测电机的速度或负载，但很少使用。\n\
    \n基于L298的典型模块如下所示。\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_155_2.png)\n\n\
    描述如何使用这种模块控制单个电机会更容易。电机连接到OUT1和OUT2。三条GPIO线连接到ENA、IN1和IN2。ENA是一条使能线，必须为高电平电机才能运行。IN1和IN2充当方向控制线——哪个是正向哪个是反向取决于你连接电机的方式。在ENA上施加PWM信号可以控制电机的速度，这使得IN1和IN2可以作为简单的数字输出。\n\
    \n注意电源连接器显示了5V和12V电源，但大多数此类模块都有一个电压调节器，可以将12V降至5V。在这种情况下，你不必提供5V连接。如果你想使用超过12V的电压，则必须断开调节器，并且需要安排单独的5V电源——请查阅模块文档。注意桥中的晶体管有大约2V的压降，因此使用12V时，实际施加到电机的电压只有10V。\n\
    \n另一个非常流行的H桥器件是SN754410驱动器。它适用于较小、功率较低的电机，并且具有两个完整的H桥。每个驱动器可提供高达1A的电流，工作电压范围为4.5V至36V。它具有与L298相同的控制线，即每个电机有一个正向/反向控制线和一个使能线。你不必使用使能线；它可以连接到+5V，以便在正向/反向线上施加PWM。\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_156_0.png)\n\n## 电机软件\n\n有一个特定的GPIO\
    \ Zero类，Motor，用于使用此类H桥模块控制电机。它似乎是基于H桥只支持正向和反向控制线而不支持使能线的想法编写的。基本构造函数是：\n\n```\n\
    Motor(forward, backward, pwm=True)\n```\n\nGPIO线Forward和Reverse必须连接到IN1/IN2或IN3/IN4。你还需要将ENA或ENB连接到+5V以使能电机。如果你使用默认的pwm=True，那么GPIO线会提供一个PWM信号，其占空比由你设置以控制电机的速度。如果你不使用"
