- img_proc: true
  md: "implement a Blinky program all you have to do is open a GPIO chip, claim a\
    \ line to use as output and start writing data to it:\n\n```\nimport lgpio\n\n\
    GPIOChip = lgpio.gpiochip_open(0)\n\nlgpio.gpio_claim_output(GPIOChip, 4)\n\n\
    while True:\n    lgpio.gpio_write(GPIOChip, 4, 0)\n    lgpio.gpio_write(GPIOChip,\
    \ 4, 1)\n\nlgpio.gpiochip_close(GPIOChip)\n```\n\nThe first instruction opens\
    \ the “chip” that operates the GPIO lines we are trying to use. There can be more\
    \ than one chip and some offer GPIO lines you can use and some are only for internal\
    \ use. On the Pi 5 the chip is gpiochip4 and on all others it is gpiochip0. If\
    \ you plan to run this program on a Pi 5 change:\n\n```\nGPIOChip = lgpio.gpiochip_open(0)\n\
    ```\n\nto:\n\n```\nGPIOChip = lgpio.gpiochip_open(4)\n```\n\nThe open returns\
    \ a reference to the open chip that you have to use in other function calls. The\
    \ claim_output function sets the specified GPIO line, GPIO4 in this case, to be\
    \ an output and “claims” it in the sense that another program using the GPIO lines\
    \ via the driver cannot make use of it. The while loop simply sets the specified\
    \ GPIO line, 4 in this case, to 0 and 1 alternately. Although the close function\
    \ is never called, you should close a GPIO chip when you are finished with it\
    \ – this releases all of the claimed GPIO lines so that other programs can use\
    \ them.\n\nIf you run this on a Pi 5 you will find that the pulses about 1.5μs.\
    \ A Pi 4 is slightly faster at 1μs and a Pi Zero 2W is slower at 2μs. However,\
    \ this is still ten times faster than using GPIO Zero and a raw Pin object.\n\n\
    # Basic GPIO Functions\n\nThe basic GPIO functions concerned with opening and\
    \ closing a particular GPIO chip are:\n\n+   - gpiochip_open Opens a GPIO chip\n\
    - gpiochip_close Closes a GPIO chip\n\nYou have to open a GPIO chip before you\
    \ can work with any GPIO lines and you should close it when finished. Other programs\
    \ can open a GPIO chip"
  merge: -1
  pgno: 223
- img_proc: true
  md: 'while you have it open and make use of it, but they cannot use any GPIO lines
    you have claimed unless you release them, see the line functions later, or close
    the chip.


    You can find out the basic information about a GPIO chip using:


    +   - `gpio_get_chip_info` Gets information about a GPIO chip


    This returns a list with a range of information, including what lines the chip
    supports. In most cases you write programs that assume a basic chip configuration
    and this function is really only useful for exploring a new machine.


    In most cases you open a GPIO chip to make use of its GPIO lines. You can find
    out about a particular line using:


    +   - `gpio_get_line_info` Gets information about a GPIO line

    - `gpio_get_mode` Gets the mode of a GPIO line


    The mode is a number that tells you if the line is input or output and what is
    using it. See the documentation for a table of results.


    Before you can use a GPIO line you have to claim it. There are three functions
    that can claim a line for input, output and alert:


    +   - `gpio_claim_input` Claims a GPIO for input

    - `gpio_claim_output` Claims a GPIO for output

    - `gpio_claim_alert` Claims a GPIO for alerts


    The line can also be configured using the lflags parameter which can be set to
    any of:


    ```

    SET_ACTIVE_LOW

    SET_OPEN_DRAIN

    SET_OPEN_SOURCE

    SET_PULL_UP

    SET_PULL_DOWN

    SET_PULL_NONE

    ```


    Claiming a line for an alert makes it an input that will set an event according
    to how the eFlags parameter is set:


    ```

    RISING_EDGE

    FALLING_EDGE

    BOTH_EDGES

    ```


    Once you have claimed a GPIO line you can use:


    +   - `gpio_read` Reads a GPIO line

    - `gpio_write` Writes a GPIO line

    - `gpio_free` Frees a GPIO'
  merge: -1
  pgno: 224
- img_proc: true
  md: "As another simple example, consider setting two lines out of phase:\nimport\
    \ lgpio\n\nGPIOChip = lgpio.gpiochip_open(4)\n\nlgpio.gpio_claim_output(GPIOChip,\
    \ 4)\nlgpio.gpio_claim_output(GPIOChip, 17)\nwhile True:\n    lgpio.gpio_write(GPIOChip,\
    \ 4, 1)\n    lgpio.gpio_write(GPIOChip, 17, 0)\n    lgpio.gpio_write(GPIOChip,\
    \ 4, 0)\n    lgpio.gpio_write(GPIOChip, 17, 1)\nlgpio.gpiochip_close(GPIOChip)\n\
    \nIf you try this out on a Pi 5 you will find the pulses are 4μs and there is\
    \ a 2μs lag in changing state:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_225_0.png)\n\
    \n# Group GPIO\n\nAs well as single line operations you can work with groups of\
    \ lines:\n\n+   - `group_claim_input` Claims a group of GPIO lines for inputs\n\
    - `group_claim_output` Claims a group of GPIO lines for outputs\n- `group_free`\
    \ Frees a group of GPIO lines\n- `group_read` Reads a group of GPIO lines\n- `group_write`\
    \ Writes a group of GPIO lines\n\nIn each case the function accepts a list of\
    \ lines to claim. The first specified GPIO line is used as the name of the group.\
    \ For example, [4,17] specifies GPIO4 and GPIO17 and from this point on the group\
    \ is referenced by 4. The state of the GPIO group is represented by a binary value\
    \ with each line represented by the corresponding bit. So the GPIO group [4,17]\
    \ is represented by a two-bit number, 00 if both lines are low, 01 if GPIO4 is\
    \ low and GPIO17 is high, 10 if GPIO4 is high and GPIO17 is low and 11 if both"
  merge: -1
  pgno: 225
- img_proc: true
  md: "lines are high. You can also specify a group_mask which has a 1 where the line\
    \ is to be changed and 0 where a line is not to be altered.\nSo for example:\n\
    lgpio.group_claim_output(GPIOChip, [4,17])\nclaims lines GPIO4 and GPIO17 as an\
    \ output group.\nTo write to the groups you would use:\nlgpio.group_write(GPIOChip,\
    \ 4, 2)\nThe 4 identifies the group using the lead GPIO line. The 2 specifies\
    \ the binary value 10 which sets GPIO4 high and GPIO17 low.\nYou can use the group\
    \ functions to implement a phased output:\nimport lgpio\n\nGPIOChip = lgpio.gpiochip_open(4)\n\
    \nlgpio.group_claim_output(GPIOChip, [4,17])\n\nwhile True:\n    lgpio.group_write(GPIOChip,\
    \ 4, 2)\n    lgpio.group_write(GPIOChip, 4, 1)\n\nThis sets the group of lines\
    \ GPIO4 and GPIO17 to 10 and then 01. If you try this out you will find that the\
    \ pulses are fast, but there is still a small lag between the lines being set.\
    \ For a Pi 5 the pulses are 1.5μs and the lag is less than 0.1us, which is much\
    \ better than switching the lines independently.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_226_0.png)"
  merge: -1
  pgno: 226
- img_proc: true
  md: '# The Pulses


    Once you have a GPIO line you can use it to create pulses of any duration you
    care to implement. The lgpio library has done some of the work for you by providing
    a set of functions that will pulse a GPIO line in a particular way. Notice that
    all of these pulses are generated in software. For example, `tx_pwm(handle, gpio,
    pwm_frequency, pwm_duty_cycle, pulse_offset=0, pulse_cycles=0)`


    This starts software timed PWM on an output GPIO and has the parameters:


    +   - `handle`: As returned by gpiochip_open

    - `gpio`: GPIO line to be pulsed

    - `pwm_frequency`: PWM frequency in Hz (0=off, 0.1-10000).

    - `pwm_duty_cycle`: PWM duty cycle in % (0-100).

    - `pulse_offset`: Offset from nominal pulse start position.

    - `pulse_cycles`: Number of cycles to be sent, 0 for infinite.


    So, for example, to send 50 pulses at 1000Hz with a 25% duty cycle using GPIO4
    you would use;

    `lgpio.tx_pwm(GPIOChip, 4, 1000, 25, pulse_cycles=50)`


    There is no need to claim the GPIO line as it is automatically claimed and set
    to output. The PWM is generated in software rather than making any use of the
    Pi''s PWM hardware. An interrupt routine is used to generate the pulses and this
    only runs while the program is running. If you try:

    `import lgpio`

    `GPIOChip = lgpio.gpiochip_open(4)`

    `lgpio.tx_pwm(GPIOChip, 4, 1000, 25, pulse_cycles=50)`


    then you won''t see any pulses output on GPIO4 as the program ends before they
    start being generated. To see the pulses you need to use:

    `import lgpio`

    `GPIOChip = lgpio.gpiochip_open(4)`

    `lgpio.tx_pwm(GPIOChip, 4, 1000, 25, pulse_cycles=50)`

    `while True:`

    `    pass`


    If you don''t specify a `pulse_cycles` then the waveform is generated until the
    program ends. You can modify the waveform being produced by simply using another
    `tx_pwm` function call.'
  merge: -1
  pgno: 227
- img_proc: true
  md: "For example:\n\n```\nimport lgpio\nimport time\n\nGPIOChip = lgpio.gpiochip_open(4)\n\
    lgpio.tx_pwm(GPIOChip, 4, 1000, 25)\ntime.sleep(1)\nlgpio.tx_pwm(GPIOChip, 4,\
    \ 1000, 50)\nwhile True:\n    pass\n```\n\nThis starts the pulse generator at\
    \ 1000Hz with a 25% duty cycle and then after one second changes this to 50% duty\
    \ cycle.\nThe important idea is that the pulse generator maintains a queue of\
    \ pulse instructions. Each pulse function call takes a single slot in the queue\
    \ and as one function call comes to an end, the next one in the queue is started.\
    \ The pulse function returns the number of free spaces in the queue and you can\
    \ check to see how many slots are free using:\n\n```\ntx_room(handle, gpio, kind)\n\
    ```\n\nwhere *kind* is TX_PWM or TX_WAVE.\nFor example:\n\n```\nimport lgpio\n\
    \nGPIOChip = lgpio.gpiochip_open(4)\nlgpio.tx_pwm(GPIOChip, 4, 1000, 25,pulse_cycles=100)\n\
    lgpio.tx_pwm(GPIOChip, 4, 1000, 50,pulse_cycles=100)\nwhile True:\n    pass\n\
    ```\n\nIn this case the first function call adds one item to the queue for 100\
    \ cycles of 1000Hz, 25% duty cycle and the second call adds another item to the\
    \ queue for 100 cycles of 1000Hz with a 50% duty cycle. As before, the program\
    \ has to carry on running for all of the items in the queue to be processed.\n\
    Even though you can, in theory, set the frequency to 10kHz, this is not a good\
    \ idea. Even at 1kHz the pulse generator is interrupted by the operating system\
    \ often enough to be a nuisance:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_228_0.png)"
  merge: -1
  pgno: 228
- img_proc: true
  md: "When the pulse generator is restarted it generates pulses with a shorter period\
    \ to catch up with the pulse stream. As a result you cannot rely on the pulse\
    \ time or the duty cycle. The amount of irregularity depends on the loading of\
    \ the processor.\n\nAs well as specifying frequency and duty cycle, you can specify\
    \ the time the pulse is high and low:\n\n```\ntx_pulse(handle, gpio, pulse_on,\
    \ pulse_off,\n         pulse_offset=0, pulse_cycles=0)\n```\n\nwhere the pulse\
    \ on and off times are in microseconds. For example:\n\n```\nlgpio.tx_pulse(GPIOChip,4,pulse_on=100,pulse_off=100)\n\
    ```\n\ngenerates a pulse train at 5kHz with a 50% duty cycle. This uses the same\
    \ pulse generator and queue as the PWM function.\n\nAs PWM is used to control\
    \ servos, it makes sense to have a special servo related function:\n\n```\ntx_servo(handle,\
    \ gpio, pulse_width, servo_frequency=50,\n         pulse_offset=0, pulse_cycles=0)\n\
    ```\n\nYou can generally ignore the servo_frequency as it is usually 50Hz. The\
    \ pulse_width varies from 500μs to 2500μs, which is the range needed to take a\
    \ servo from its extreme positions. In practice you would have to calibrate the\
    \ servo to discover the exact range to use. For example:\n\n```\nlgpio.tx_servo(GPIOChip,\
    \ 4, 500)\n```\n\nsets a servo connected to GPIO4 to one of its two extreme positions.\n\
    \nThis is simple, but the inaccuracies in the pulse stream referred to in the\
    \ discussion of PWM now become more of a problem. The documentation says:\n\n\
    > The timing jitter will cause the servo to fidget. This may cause it to overheat\
    \ and wear out prematurely.\n\nIn most cases the jitter is small enough not to\
    \ be a worry except for long-term use.\n\nFinally we have\n\n```\ntx_wave(handle,\
    \ gpio, pulses)\n```\n\nwhich can be used to pulse a set of GPIO lines in a complex\
    \ pattern.\n\nThe gpio parameter is a group of GPIO lines and pulses is a list\
    \ of pulse objects."
  merge: -1
  pgno: 229
- img_proc: true
  md: "A pulse object is a container class with the following members:\n\n+   - **group_bits**:\
    \ Levels to set if the corresponding bit in group_mask is set\n- **group_mask**:\
    \ Mask indicating the group GPIO to be updated\n- **pulse_delay**: Delay in microseconds\
    \ before the next pulse\n\nThis works like the PWM queue but using its own queue.\
    \ You can check how much space there is using:\n`tx_room(handle, gpio, kind)`\n\
    with `kind` set to `TX_WAVE`.\nTo pulse GPIO1 and GPIO17 out of phase you could\
    \ use:\n\n```\nimport lgpio\nfrom collections import namedtuple\n\nPulse = namedtuple('Pulse',\
    \ ['group_bits',\n                             'group_mask', 'pulse_delay'])\n\
    \nGPIOChip = lgpio.gpiochip_open(4)\nlgpio.group_claim_output(GPIOChip, [4,17])\n\
    \nlgpio.tx_wave(GPIOChip, 4,[Pulse(1,3,1000),Pulse(2,3,1000),\n              \
    \             Pulse(1,3,1000),Pulse(2,3,1000)] )\n\nwhile True:\n    pass\n```\n\
    \nIn this we first define a named tuple suitable for storing a Pulse specification.\
    \ Then we setup a GPIO group consisting of GPIO4 and GPIO17. The call to `tx_wave`\
    \ changes both lines at the same time – the mask is 3 or 11 in binary. The first\
    \ Pulse sets GPIO4 high and GPIO17 low for 1000μs. The second sets GPIO4 low and\
    \ GPIO17 high for 1000μs and this is repeated once. If you run the program you\
    \ will see:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_230_0.png)"
  merge: -1
  pgno: 230
- img_proc: true
  md: "If you want to keep the pulse trains going then you need a loop to keep the\
    \ queue filled:\n\n```\nimport lgpio\nfrom collections import namedtuple\n\nPulse\
    \ = namedtuple('Pulse', ['group_bits', 'group_mask',\n                       \
    \      'pulse_delay'])\n\nGPIOChip = lgpio.gpiochip_open(4)\nlgpio.group_claim_output(GPIOChip,\
    \ [4,17])\nwhile True:\n    if lgpio.tx_room(GPIOChip,4,lgpio.TX_WAVE)>2:\n  \
    \      lgpio.tx_wave(GPIOChip, 4,\n            [Pulse(1,3,1000),Pulse(2,3,1000)])\n\
    ```\n\nThe if statement checks to see if there is enough room in the queue and\
    \ then adds two Pulse specifications if there is. If you try this out you will\
    \ find that you get a continuous phased pulse stream, but there are still irregularities:\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_231_0.png)\n\n# More lgpio\n\nAs well\
    \ as the basic GPIO functions there are also functions to use the serial port,\
    \ I2C and SPI buses. All three are implemented in hardware and make use of the\
    \ corresponding Linux drivers for the device. This means that they should work\
    \ without glitches but it also means that they are only as good as the Linux drivers.\
    \ The drivers for the Pi family work well enough to make these functions attractive.\
    \ GPIO Zero has an SPI object and this makes it a better choice for this bus.\
    \ However it doesn't provide an object for the I2C or serial interfaces. If you\
    \ are interested in using either then the raw Linux drivers are not difficult\
    \ to use and you can find out more in *Raspberry Pi IOT in Python with Linux Drivers,\
    \ 2nd Ed*, ISBN:9781871962864.\n\nThe lgpio functions are also not difficult but\
    \ they are beyond the scope of this book. If you find that you are contemplating\
    \ making use of them, it may well be a sign that you have outgrown GPIO Zero."
  merge: -1
  pgno: 231
- img_proc: true
  md: '# Summary


    +   - The GPIO Zero library is based on using the lgpio library as its pin factory
    for all versions of the Pi.

    - The lgpio library is installed by default alongside GPIO Zero and as such it
    is tempting to use it directly to increase speed and access missing features.

    - The lgpio library makes use of Linux GPIO drivers and as such is slower than
    direct access to the hardware, but has the advantage of being largely hardware
    independent.

    - Linux drivers are used as if they were files and data is transferred using read
    and write operations. The lgpio library deals with this lower level interaction
    for you and provides functions to deal with the drivers.

    - For a Pi 5 the GPIO driver file name is gpiochip4 and for all other Pis it is
    gpiochip0. This is the only difference in using lgpio with the Pi 5.

    - Before you can use GPIO lines you have to open the GPIO driver and remember
    to close it again when you are finished using the line.

    - Functions are provided to let you configure and use GPIO line objects.

    - There are also functions that work with groups of GPIO line objects.

    - For more sophisticated output you can use the pulse functions which generate
    preset pulse trains from one or more GPIO lines.

    - The most useful of the pulse functions are the PWM function and the servo function.

    - There are also functions that use GPIO lines to work with serial, I2C and SPI
    buses.'
  merge: -1
  pgno: 232
