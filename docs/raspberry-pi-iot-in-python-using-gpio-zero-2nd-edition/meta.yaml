    \ in the standard way:\n\n```\nmyObject=MyClass()\nmyObject.myMethod()\n```\n\n\
    which prints myMethod called."
  - "[PAGE 42]\n\nThe only possibly confusing part is the use of `self` in the method\
    \ definition. If you refer back to the way a function is converted into a method\
    \ then it should make sense. In Python when you define a method you use `self`\
    \ as the first parameter. When you call the method, Python automatically sets\
    \ `self` to the name of the instance. That is:\n`myObject.myMethod()`\nis converted\
    \ into:\n`myMethod(myObject)`\nand hence `self` is set to `myObject`. This is\
    \ the fundamental way that functions become methods and is exactly how Python\
    \ does it. It is worth noting that the use of `self` is a convention and not enforced\
    \ by the system. You could use this in JavaScript/C++/Java-style, but your programs\
    \ would be less readable by another Python programmer.\n\nWe now have a basic\
    \ way of adding method attributes to an object, but how do we add data attributes?\
    \ The key thing is that each instance of a class has to have its own copy of the\
    \ data attributes. The simplest way to do this is to make use of the “magic” `__init__`\
    \ method. It is one of Python’s many “magic” methods which are used automatically\
    \ by the system to do fixed things. In this case the system automatically calls\
    \ `__init__` whenever you use a class to create an object. That is when you write:\n\
    `myObject=MyClass()`\nthen any `__init__` method you may have defined in `MyClass`\
    \ is called before the object instance is complete.\n\nNow consider what happens\
    \ if you write:\npython\nclass MyClass:\n    def __init__(self):\n        self.myAttribute1=0\n\
    \nand then create an instance:\n`myObject=MyClass()`\nNow your custom `__init__`\
    \ is called and it creates a new attribute `self.myAttribute`. What do you think\
    \ `self` is set to? As in the case of calling a method, `self` is set to the object\
    \ being created, i.e. `myObject` in this case. The call to `__init__` is equivalent\
    \ to:\n`__init__(myObject)`\nand the attribute creation is the same as:\n`myObject.myAttribute1=0`"
- md: "Just as whenever you assign to a variable it is created if it doesn't already\
    \ exist, so when you assign to an attribute it is created if it doesn't already\
    \ exist. Using this mechanism `__init__` can create new attributes on the instance\
    \ of the class that it is just creating.\n\nAll of this comes down to two practices\
    \ when you create a new class:\n\n- Create any data attributes within the `__init__`\
    \ function using `self` to reference the object being created, e.g. `self.attribute\
    \ = 0`\n- Create any methods in the body of the class using `self` as the first\
    \ parameter, e.g. `def method(self):`\n\nAs an example we can implement a class\
    \ that represents a 2-D co-ordinate:\n\n```\nclass Point:\n    def __init__(self,x,y):\n\
    \        self.x=x\n        self.y=y\n\n    def sum(self):\n        print(self.x+self.y)\n\
    \n    def distance(self):\n        return self.x**2+self.y**2\n```\n\nNotice that\
    \ in the `__init__` function we create two attributes, x and y and store the values\
    \ of the x and y parameters in them. This is how you can initialize attributes\
    \ with values provided when the object is created. That is:\n\n```\npoint=Point(1,2)\n\
    print(point.x)\n```\n\ndisplays 1. The methods are simple, but notice the use\
    \ of `self` to refer to attributes of the current instance. That is, in the sum\
    \ method `self.x` becomes `point.x` when the function is called. That is:\n\n\
    ```\npoint.sum()\nprint(point.distance())\n```\n\nprints 3 and 5 respectively.\
    \ Notice that distance returns a value but sum doesn't – both are valid methods.\
    \ If you want to call another method from within a method, you have to use `self`\
    \ in the same way as for data attributes, e.g. `self.sum()`.\n\n## Inheritance\n\
    \nVery often you find that the new class you want is very much like an existing\
    \ class. The obvious solution is to copy and paste the text of the old class as\
    \ a starter for the new class. This is workable and it is how most code was “reused”\
    \ in the past, but today we have other ways of doing the same job. Inheritance\
    \ is how object-oriented languages like Python implement reuse.\n\nIf you write:\n\
    `class myNewClass(myOldClass)`\nthen `myNewClass` has all of the attributes of\
    \ `myOldClass` just as if you had used copy and paste. Unlike copy and paste,\
    \ however, the connection between the old and new is live. If you make a change\
    \ to the old class, the change is also made to the new class – they share the\
    \ same base code. The new class is said to “inherit from”, “derive from” or “sub-class”\
    \ the old class, which is its “base class” or “super class”. This sounds useful\
    \ because if you find an error in the base class you can correct it and the correction\
    \ will be inherited by all of the derived classes. This is generally good but\
    \ also dangerous. If the derived classes make any assumptions about the base class,\
    \ then changes could result in all of them breaking. This is often called the\
    \ problem of the “fragile” base class. Even so, many programmers agree that inheritance\
    \ is better than copy and paste programming.\n\nYou can of course add attributes\
    \ to the new class and you can provide replacements, or “override”, methods that\
    \ it inherits. For example, we can create a Point3D class from the Point class:\n\
    \n```\nclass Point3d(Point):\n    def __init__(self,x,y,z):\n        self.x=x\n\
    \        self.y=y\n        self.z=z\n    def distance(self):\n        return self.x**2+self.y**2+self.z**2\n\
    ```\n\nIn this case we have inherited all of the methods of Point, but a new `__init__`\
    \ is used to create x,y and z as data attributes and we have overridden the inherited\
    \ distance method to use the extra z attribute. Notice that you can still use\
    \ the inherited sum method:\n\n```\npoint=Point3d(1,2,3)\nprint(point.x)\npoint.sum()\n\
    print(point.distance())\n```\n\nwhich displays 1, 3 and 14.\n\nNotice that you\
    \ can modify and add to inherited attributes, but you cannot easily remove them.\
    \ It is part of the object-oriented philosophy that classes get “bigger” as they\
    \ are inherited – a Point3d object is “bigger” in the sense that it generally\
    \ has more attributes than a Point object.\n\n## The Need For Super\n\nThe key\
    \ idea is that a class inherits everything its super class has, but this isn’t\
    \ quite as simple as it sounds. Consider for a moment a small change to the Point3D\
    \ class based on this idea. As the Point3D class inherits everything that the\
    \ Point class has, we don’t need to redefine the x and y attributes as these are\
    \ inherited:\n\n```\nclass Point3d(Point):\n    def __init__(self,x,y,z):\n  \
    \      self.z=z\n    def distance(self):\n        return self.x**2+self.y**2+self.z**2\n\
    ```\n\nIn this version we only define the new z attribute. If you try this out\
    \ you will find that it generates an error reporting that one of x or y isn’t\
    \ defined.\nThe point is that Point3d doesn’t inherit x and y from Point, but\
    \ it does inherit its `__init__` function which creates them. That is, to make\
    \ Point3D inherit all of the attributes that Point has, it has to call `Point.__init__()`:\n\
    \n```\nclass Point3d(Point):\n    def __init__(self,x,y,z):\n        Point.__init__(x,y)\n\
    \        self.z=z\n```\n\nIf you try this out you will find it doesn’t work because\
    \ the call to `Point.__init__` doesn’t have a value for self. In this case you\
    \ have to explicitly pass a value for self that gives the instance being created.\n\
    So the correct version of calling the super class `__init__` function is:\n\n\
    ```\nclass Point3d(Point):\n    def __init__(self,x,y,z):\n        Point.__init__(self,x,y)\n\
    \        self.z=z\n```\n\nThis creates the x and y attributes as part of any instance\
    \ that Point3d creates.\nIt is generally considered bad practice to call the methods\
    \ belonging to the super using the name of the super class, i.e. Point in this\
    \ example. It works for any super class method you want to call, but Python provides\
    \ the `super` function to make this easier. The `super` function automatically\
    \ returns the super class of the class it is called in and when you use it to\
    \ call a super class method, it automatically supplies the self parameter.\n\n\
    So the best way to call the super class `__init__` function is to use:\n\n```\n\
    class Point3d(Point):\n    def __init__(self,x,y,z):\n        super().__init__(x,y)\n\
    \        self.z=z\n```\n\nThere are many variations on the use of `super`, but\
    \ this is the most basic and the one you should know.\nYou have to remember that\
    \ the idea that a class inherits everything from its super class is only true\
    \ if you take the trouble to make it true. In general, you have to call the super\
    \ class `__init__` function and you have to make sure you pass the correct parameters\
    \ to it to create the attributes you want.\n\n## Multiple Inheritance – The Mixin\n\
    \nSo far we have regarded the idea of inheritance as a way of getting a starting\
    \ point for a new class that is similar to an existing class. This idea is fundamental\
    \ to the object-oriented philosophy, which goes well beyond simple practical concerns\
    \ and considers that the inheritance of objects is key to the way we should program.\
    \ You start out by creating very general classes and slowly use inheritance to\
    \ derive increasingly more sophisticated and specific classes. This gives rise\
    \ to an inheritance hierarchy. For example, GPIO Zero has a class hierarchy for\
    \ output devices:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_46_0.png)\n\nYou\
    \ can see that Device is at the top of the hierarchy and the classes become more\
    \ specialized as you move down the hierarchy, i.e. move to the right in this rotated\
    \ diagram. Thus Device is inherited by GPIODevice which is in turn inherited by\
    \ OutputDevice, and then by DigitalOutputDevice and finally LED. This sort of\
    \ hierarchy is supposed to be a model of the real world and the way we think about\
    \ the relations between objects in the real world.\n\nThis works well when you\
    \ are working with electronic devices that have obvious relationships, but don't\
    \ let this fool you into thinking that this is the way object hierarchies work\
    \ in the wider world. In the more general case, relationships between things are\
    \ not well modeled by simple inheritance hierarchies and things are much more\
    \ difficult. If you read up on object-oriented programming you will encounter\
    \ many systems of rules, regulations and guidelines. If they make sense to you\
    \ in the situation that you are programming in then by all means follow them,\
    \ but the current state of programming theory is that no-one is in a position\
    \ of authority to tell you how to program – it is all opinion.\n\nIf object-oriented\
    \ programming theory is so problematic, why is it the most dominant method of\
    \ programming? The simple answer is that even if, or perhaps especially if, you\
    \ just regard it as a way of reusing code, then it is remarkably effective. Objects\
    \ are a good way of packaging code that works together and providing it for others\
    \ to use and inheritance is a good way to reuse code. It is also the case that\
    \ objects are easy to use even if they are hard to invent and implement. In this\
    \ sense we rely on other people to create a good set of objects for us to use\
    \ and in this case the inheritance problem is their problem.\n\nSo, if a little\
    \ inheritance is a good thing, why not multiple inheritance? That is, why not\
    \ let a class inherit its attributes from multiple classes? This brings with it\
    \ many problems, but the best known is the “diamond” problem – what happens if\
    \ two base classes have an attribute of the same name? Which version of the attribute\
    \ does the derived class use?\n\nBecause of this simple, but serious problem,\
    \ many object-oriented languages, Java and C# for example, do not allow inheritance\
    \ from more than one class. However, Python does. To solve the diamond problem,\
    \ Python has a set of rules that determines which class attribute is used if there\
    \ is a clash. If you want to know more look up the MRO (Method Order Resolution)\
    \ algorithm in *Programmer's Python: Everything Is An Object, 2nd Ed*, ISBN:978-1871962741,\
    \ but at this stage the best thing is to simply avoid inheriting from classes\
    \ that have attributes with the same name. That is, if you keep things simple,\
    \ multiple inheritance tends to just work.\n\nTo inherit from more than one class\
    \ you simply have to write a list of base classes when you use the class statement.\
    \ For example:\n\n```\nclass myDerivedClass(Base1,Base2, Base3):\n```\n\nFollowing\
    \ this `myDerivedClass` has all the attributes of Base1, Base2 and Base3. If by\
    \ any chance they do have an attribute of the same name, then in this simple situation\
    \ the MRO algorithm reduces to simply taking the first definition reading left\
    \ to right. So if all three classes had a `myAttribute` attribute, the one defined\
    \ in Base1 would be used."
  mdcn: "正如你给一个变量赋值时，如果它不存在就会被创建一样，当你给一个属性赋值时，如果它不存在也会被创建。利用这个机制，`__init__` 可以在它刚刚创建的类的实例上创建新的属性。\n\
    \n所有这些在创建新类时归结为两个实践：\n\n-   在 `__init__` 函数内，使用 `self` 来引用正在创建的对象，从而创建任何数据属性，例如\
    \ `self.attribute = 0`\n-   在类的主体中，使用 `self` 作为第一个参数来创建任何方法，例如 `def method(self):`\n\
    \n举个例子，我们可以实现一个表示二维坐标的类：\n\n```\nclass Point:\n    def __init__(self,x,y):\n \
    \       self.x=x\n        self.y=y\n\n    def sum(self):\n        print(self.x+self.y)\n\
    \n    def distance(self):\n        return self.x**2+self.y**2\n```\n\n注意，在 `__init__`\
    \ 函数中，我们创建了两个属性 x 和 y，并将 x 和 y 参数的值存储在其中。这就是你如何在创建对象时用提供的值来初始化属性。也就是说：\n\n```\n\
    point=Point(1,2)\nprint(point.x)\n```\n\n会显示 1。这些方法很简单，但要注意使用 `self` 来引用当前实例的属性。也就是说，在\
    \ sum 方法中，当函数被调用时，`self.x` 就变成了 `point.x`。也就是说：\n\n```\npoint.sum()\nprint(point.distance())\n\
    ```\n\n分别打印 3 和 5。注意 distance 返回一个值而 sum 没有——两者都是有效的方法。如果你想从一个方法内部调用另一个方法，你必须像处理数据属性一样使用\
    \ `self`，例如 `self.sum()`。\n\n## 继承\n\n你经常会发现，你想要的新类与一个现有的类非常相似。显而易见的解决方案是复制粘贴旧类的文本作为新类的起点。这是可行的，也是过去大多数代码“重用”的方式，但今天我们有其他方法来完成同样的工作。继承是像\
    \ Python 这样的面向对象语言实现重用的方式。\n\n如果你写：\n`class myNewClass(myOldClass)`\n那么 `myNewClass`\
    \ 就拥有 `myOldClass` 的所有属性，就像你使用了复制粘贴一样。然而，与复制粘贴不同的是，新旧类之间的连接是动态的。如果你对旧类进行了更改，更改也会应用到新类——它们共享相同的基础代码。新类被称为“继承自”、“派生自”或“子类化”旧类，而旧类是其“基类”或“超类”。这听起来很有用，因为如果你在基类中发现一个错误，你可以纠正它，而纠正将被所有派生类继承。这通常是好的，但也可能是危险的。如果派生类对基类做了任何假设，那么更改可能会导致它们全部失效。这通常被称为“脆弱”基类问题。即便如此，许多程序员仍然认为继承比复制粘贴编程更好。\n\
    \n当然，你可以向新类添加属性，并且可以提供替换或“重写”它继承的方法。例如，我们可以从 Point 类创建一个 Point3D 类：\n\n```\nclass\
    \ Point3d(Point):\n    def __init__(self,x,y,z):\n        self.x=x\n        self.y=y\n\
    \        self.z=z\n    def distance(self):\n        return self.x**2+self.y**2+self.z**2\n\
    ```\n\n在这个例子中，我们继承了 Point 的所有方法，但使用了一个新的 `__init__` 来创建 x、y 和 z 作为数据属性，并且我们重写了继承的\
    \ distance 方法以使用额外的 z 属性。注意，你仍然可以使用继承的 sum 方法：\n\n```\npoint=Point3d(1,2,3)\n\
    print(point.x)\npoint.sum()\nprint(point.distance())\n```\n\n显示 1、3 和 14。\n\n\
    注意，你可以修改和添加继承的属性，但你不能轻易地移除它们。面向对象哲学的一部分是，类在被继承时会变得“更大”——Point3d 对象在通常比 Point 对象拥有更多属性的意义上是“更大”的。\n\
    \n## 对 Super 的需求\n\n关键思想是，一个类继承其超类的所有内容，但这并不像听起来那么简单。考虑一下基于这个想法对 Point3D 类的一个小改动。由于\
    \ Point3D 类继承了 Point 类的所有内容，我们不需要重新定义 x 和 y 属性，因为它们是被继承的：\n\n```\nclass Point3d(Point):\n\
    \    def __init__(self,x,y,z):\n        self.z=z\n    def distance(self):\n  \
    \      return self.x**2+self.y**2+self.z**2\n```\n\n在这个版本中，我们只定义了新的 z 属性。如果你尝试这个，你会发现它会产生一个错误，报告\
    \ x 或 y 之一未定义。\n关键在于，Point3d 并不是从 Point 继承 x 和 y，而是继承了创建它们的 `__init__` 函数。也就是说，要使\
    \ Point3D 继承 Point 的所有属性，它必须调用 `Point.__init__()`：\n\n```\nclass Point3d(Point):\n\
    \    def __init__(self,x,y,z):\n        Point.__init__(x,y)\n        self.z=z\n\
    ```\n\n如果你尝试这个，你会发现它不起作用，因为对 `Point.__init__` 的调用没有 self 的值。在这种情况下，你必须显式地传递一个\
    \ self 的值，该值给出正在创建的实例。\n因此，调用超类 `__init__` 函数的正确版本是：\n\n```\nclass Point3d(Point):\n\
    \    def __init__(self,x,y,z):\n        Point.__init__(self,x,y)\n        self.z=z\n\
    ```\n\n这会在 Point3d 创建的任何实例中创建 x 和 y 属性。\n通常认为，使用超类的名称（即本例中的 Point）来调用属于超类的方法是一种不好的做法。它适用于你想调用的任何超类方法，但\
    \ Python 提供了 `super` 函数来使这变得更容易。`super` 函数自动返回调用它的类的超类，当你使用它来调用超类方法时，它会自动提供 self\
    \ 参数。\n\n因此，调用超类 `__init__` 函数的最佳方式是使用：\n\n```\nclass Point3d(Point):\n    def\
    \ __init__(self,x,y,z):\n        super().__init__(x,y)\n        self.z=z\n```\n\
    \n`super` 的使用有很多变体，但这是最基本的一种，也是你应该知道的。\n你必须记住，一个类从其超类继承一切的想法只有在你费心让它成立时才成立。通常，你必须调用超类的\
    \ `__init__` 函数，并且必须确保你向它传递正确的参数以创建你想要的属性。\n\n## 多重继承 – Mixin\n\n到目前为止，我们将继承视为获得一个类似于现有类的新类的起点。这个想法是面向对象哲学的基础，它远远超出了简单的实际考虑，并认为对象的继承是我们应该编程的方式的关键。你从创建非常通用的类开始，然后慢慢使用继承来派生出越来越复杂和具体的类。这就产生了一个继承层次结构。例如，GPIO\
    \ Zero 有一个用于输出设备的类层次结构：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_46_0.png)\n\
    \n你可以看到 Device 位于层次结构的顶部，随着你在层次结构中向下移动（即在此旋转图中向右移动），类变得更加专业化。因此，Device 被 GPIODevice\
    \ 继承，GPIODevice 又被 OutputDevice 继承，然后是 DigitalOutputDevice，最后是 LED。这种层次结构应该是现实世界的模型，以及我们思考现实世界中对象之间关系的方式。\n\
    \n当你处理具有明显关系的电子设备时，这很有效，但不要让这使你误以为这就是对象层次结构在更广泛世界中的工作方式。在更一般的情况下，事物之间的关系不能通过简单的继承层次结构很好地建模，事情要困难得多。如果你阅读面向对象编程，你会遇到许多规则、法规和准则系统。如果它们在你编程的情况下对你有意义，那么请务必遵循它们，但编程理论的现状是，没有人处于权威地位来告诉你如何编程——这都是观点。\n\
    \n如果面向对象编程理论如此有问题，为什么它是最主要的编程方法？简单的答案是，即使或者特别是如果你只是将其视为一种重用代码的方式，它也是非常有效的。对象是打包协同工作的代码并提供给他人使用的好方法，而继承是重用代码的好方法。同样，对象即使难以发明和实现，也易于使用。在这个意义上，我们依赖其他人来创建一组供我们使用的好对象，在这种情况下，继承问题是他们的问题。\n\
    \n那么，如果一点继承是好事，为什么不采用多重继承呢？也就是说，为什么不让一个类从多个类继承其属性呢？这带来了许多问题，但最著名的是“菱形”问题——如果两个基类具有同名的属性会发生什么？派生类使用哪个版本的属性？\n\
    \n由于这个简单但严重的问题，许多面向对象语言，例如 Java 和 C#，不允许从多个类继承。然而，Python 允许。为了解决菱形问题，Python 有一套规则来确定在发生冲突时使用哪个类属性。如果你想了解更多，请查阅\
    \ *Programmer's Python: Everything Is An Object, 2nd Ed*（ISBN:978-1871962741）中的\
    \ MRO（方法顺序解析）算法，但在这个阶段，最好的办法是简单地避免从具有同名属性的类继承。也就是说，如果你保持事情简单，多重继承往往就能正常工作。\n\n\
    要从多个类继承，你只需在使用类语句时编写一个基类列表。例如：\n\n```\nclass myDerivedClass(Base1,Base2, Base3):\n\
    ```\n\n这样 `myDerivedClass` 就拥有 Base1、Base2 和 Base3 的所有属性。如果它们碰巧具有同名的属性，那么在这种简单的情况下，MRO\
    \ 算法简化为简单地从左到右读取第一个定义。所以如果所有三个类都有一个 `myAttribute` 属性，那么将使用在 Base1 中定义的那个。"
