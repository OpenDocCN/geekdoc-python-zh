  - '[PAGE 48]


    Multiple inheritance can be very complicated, confusing and error-prone, but there
    is one situation in which it is much easier, the mixin. This is just a base class
    used in multiple inheritance and has nothing new to add to the Python language
    – it is the way you think about it that is different. The normal flow of inheritance
    is that the derived class is a more elaborate version of the base class. An LED
    is a DigitalOutputDevice with some extra attributes specific to the LED object.
    It is the “is a” relationship that motivates the inheritance.


    A mixin isn''t a base class in the same sense. It is just a bundle of methods
    that you want to give a class without implying anything about a theoretical relationship.
    For example, suppose you create a Debug class complete with some useful debugging
    functions such as name() to print the name of the object, create() time of creation,
    etc. You might want to add the Debug class to a class, not because it is a type
    of Debug class, but just because the behavior added by the Debug class is useful.
    For example:


    ```

    class LED(DigitalOutputDevice,Debug):

    ```


    creates an LED class that inherits from DigitalOutputDevice in the sense that
    it “is a” DigitalOutputDevice and inherits some useful methods from the Debug
    mixin. This is a philosophical distinction, but sometimes a useful one. Notice
    that if we add Debug to DigitalOutputDevice then all of the classes that derive
    from it, LED and Buzzer in this case, also inherit Debug. A mixin works from the
    point of view of inheritance in the same way as any other class - it''s how you
    think of it that is different.


    There is one way that mixins often differ, but again it''s a convention. Mixins
    generally only have methods and not data attributes. One reason for this is that
    it means that a derived class doesn''t have to call the mixin''s __init__ method
    and so using it is simpler. However, this is a convention and if your mixin needs
    some data attributes there is no real reason to avoid them and GPIO Zero certainly
    doesn''t.


    GPIO Zero has a number of useful mixins, but they tend to be difficult to understand
    because they do sophisticated things. For example, the HoldMixin adds a set of
    methods and data attributes to implement a when_held event, for example to detect
    when a Button is held down. It can be added to any class that the concept of “holding”
    makes sense.


    # Virtual Base Classes


    If you study GPIO Zero you might be surprised at how many base classes there are.
    It almost certainly wasn''t designed like that from the start and the hierarchy
    was most probably constructed by “refactoring”, that is looking at what the classes
    were doing and taking common code to form simpler base classes. At the top of
    the class hierarchy should be the simplest class with methods that all the derived
    classes need. Some languages have the concept'
  - "[PAGE 49]\n\nof a virtual class, a class that simply defines the attributes that\
    \ any class derived from it has to have. This often serves as the base class for\
    \ a hierarchy as it doesn't even implement the methods it defines, leaving that\
    \ to the next derived class.\n\nPython doesn't have virtual classes, but that\
    \ doesn't stop GPIO Zero from using something that looks like a virtual class.\
    \ If you look at the entire GPIO Zero class hierarchy, you will see that Device\
    \ is the top of the hierarchy:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_49_0.png)\n\
    \nIf you examine the code for Device you will find that, while it does have some\
    \ methods and data attributes, one of its attributes is coded as:\n\n```\n@property\n\
    def value(self):\n    \"\"\"\n    Returns a value representing the device's state.\
    \ Frequently, this is a\n    boolean value, or a number between 0 and 1 but some\
    \ devices use larger\n    ranges (e.g. -1 to +1) and composite devices usually\
    \ use tuples to\n    return the states of all their subordinate components.\n\
    \    \"\"\"\n    raise NotImplementedError\n```\n\nYou can see that this makes\
    \ the class incomplete. It isn't intended to be used to create instances because\
    \ part of the implementation is missing. Instead Device exists to be used as a\
    \ base class for other devices - it is Python's equivalent of a virtual class.\n\
    \nNotice that a virtual class might well be used to create another virtual class\
    \ that is more defined, but still too general to actually be used to create an\
    \ instance. For example Device gives rise to GPIODevice which is slightly more\
    \ specific, but perhaps not developed enough to be used to create an instance."
  - "[PAGE 50]\n\n# Attributes and Properties\n\nA data attribute is the simplest\
    \ way of allowing an object to store data. In this case you can simply use the\
    \ attribute as if it was a variable. For example:\nmyObject.myAttribute = 42\n\
    \nAttributes work well but they are the first step on the way to more sophisticated\
    \ approaches to storing data. For example suppose you have a data attribute that\
    \ is used to store the temperature:\nMyObject.temperature = 42\n\nIf this was\
    \ being used to control the temperature of an enclosure via a heater it would\
    \ be a good idea to check that it was set within a reasonable range, 20 to 30\
    \ °C say. It would also be useful if the temperature could be stored internally\
    \ in millicentigrade, i.e. in thousandths of a centigrade degree, a unit often\
    \ used by IoT devices. With a simple data attribute there is no way to do this,\
    \ but you can easily invent one.\n\nInstead of a data attribute we can create\
    \ two methods, usually called get and set methods:\n\n```\nclass Heater():\n \
    \   def __init__(self):\n        self.temperature=22*1000\n    def setTemperature(self,t):\n\
    \        if t<20:return\n        if t>30:return\n        self.temperature=t*1000\n\
    \    def getTemperature(self):\n        return self.temperature/1000\n```\n\n\
    You can see that we now have a get and a set method and the set checks that the\
    \ value is in range and the get converts back to centigrade. This all works, but\
    \ it means you have to use the temperature attribute in an unnatural way:\nheater=Heater()\n\
    heater.setTemperature(31)\nprint(heater.getTemperature())\n\nPython has a better\
    \ way. You can define a property using the @property decorator. Decorators are\
    \ a powerful part of Python and if you want to know more see *Programmer's Python:\
    \ Everything is an Object* but in this case we just want to make use of it."
  - "[PAGE 51]\n\nFor example:\n\n```\nclass Heater():\n    def __init__(self):\n\
    \        self._temperature=22*1000\n    @property\n    def temperature(self):\n\
    \        return self._temperature/1000\n    @temperature.setter\n    def temperature(self,t):\n\
    \        print(t)\n        if t<20:return\n        if t>30:return\n        self._temperature=t*1000\n\
    ```\n\nYou can see that we have a get function and a set function defined in a\
    \ slightly different way. We also need to have a “backing” variable, _temperature,\
    \ because now we have named the getter and setter temperatures. This might seem\
    \ slightly more complicated, but now you can write:\n\n```\nheater=Heater()\n\
    heater.temperature = 31\nprint(heater.temperature)\n```\n\nand the get and set\
    \ functions are used automatically, i.e. the temperature doesn't change because\
    \ it is outside of the range.\n\nProperties are used for all sorts of reasons\
    \ throughout GPIO Zero. For example, in Device you will find:\n\n```\n@property\n\
    def is_active(self):\n    \"\"\"\n    Returns :data:`True` if the device is currently\
    \ active and\n    :data:`False` otherwise. This property is usually derived from\n\
    \    :attr:`value`. Unlike :attr:`value`, this is *always* a boolean.\n    \"\"\
    \"\n    return bool(self.value)\n```\n\nThis allows you to write things like:\n\
    \n```\nif(device.is_active):\n```\n\nwithout having to convert to Boolean values\
    \ or make a comparison."
  - '[PAGE 52]


    # Summary


    +   - Python is an easy language to get started with, but this makes it possible
    to miss that it is an object-oriented language.

    - After using Python for a while, beginners often have to go back and discover
    what makes Python object-oriented when they first encounter, and want to use and
    understand, an object-oriented library like GPIO Zero.

    - Objects are packages of data and code that are related. The methods work on
    the data stored in the objects.

    - Object-oriented code starts from the idea that you can convert object.method()
    into method(object). The self parameter is used to perform this transformation
    in Python.

    - An object is created as an instance of a class, which can be thought of as the
    specification for an object.

    - To create your own classes you need the class keyword. You also need to use
    the __init__ magic method to create data attributes.

    - One class, the derived class, can inherit all of the methods and attributes
    of another class, the base class. This allows for code reuse if a new class is
    essentially just an elaboration of an existing class.

    - Derived classes have to ensure that that their base class instances are properly
    constructed and this usually involves calling the __init__ method of the base
    class using the super function.

    - Python supports multiple inheritance where a derived class can inherit the properties
    and methods of multiple base classes. This can create problems if the base classes
    share attributes or methods with the same name.

    - The mixin is a special, and simple, case of multiple inheritance where all that
    is required is to give a class a set of helper methods.

    - Python doesn''t have virtual classes, which simply act as definitions for the
    minimum set of properties a derived class has to have, but these can be easily
    simulated.

    - Data attributes are simple, but often you need to perform some processing on
    a value when it is accessed. The best way to do this in Python is to use properties.'
- md: "## Chapter 5\n### Simple On/Off Devices\n\nThere are only two simple on/off\
    \ devices – the LED and the Buzzer. In this chapter we look at each in turn and\
    \ learn how to create our own new custom on/off devices.\n\n### On/Off Inheritance\n\
    \nThe inheritance hierarchy for the simple output devices is:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_54_0.png)\n\
    \nIf you don’t know about inheritance then see the previous chapter.\nKnowledge\
    \ of the inheritance hierarchy is mostly useful in creating your own custom classes\
    \ to extend GPIO Zero. `Device` is the most general and then we have `GPIODevice`\
    \ which corresponds to a single GPIO line used as input or output. `OutputDevice`\
    \ is a general output line, `DigitalOutputDevice` only has two states and finally\
    \ `LED` and `Buzzer` correspond to real devices.\n\n### LED In Detail\n\nThe LED\
    \ class is the archetypal on/off device. You have already seen how to create an\
    \ LED object associated with a particular GPIO pin:\n`led = LED(4)`\ncreates an\
    \ LED object associated with GPIO4.\n\nOther things you can specify when creating\
    \ an LED object are:\n`LED(pin, active_high=True, initial_value=False, pin_factory=None)`\n\
    \n| Parameter | Action |\n| :--- | :--- |\n| active_high | If True the on method\
    \ sets the line high<br>If False the off method sets the line high |\n| initial_value\
    \ | If True the device is initially on<br>If False the device is initially off\
    \ |\n| pin_factory | The underlying pin factory to use<br>Let GPIO Zero set this\
    \ |\n\nSo for example:\n`led=LED(4, active_high=True, initial_value=True)`\ncreates\
    \ an LED associated with GPIO4 that is high when switched on and hence initially\
    \ on.\nThere are only four methods associated with LED. The most commonly used\
    \ are on and off which switch the LED on and off.\nIf you want to make the LED\
    \ flash then you can use:\n`blink(on_time, off_time, n, background)`\nwhich will\
    \ blink the LED n times, switching on for on_time and off for off_time specified\
    \ in seconds. The background parameter defaults to True and this allows the blinking\
    \ to be performed on another thread in the background. That is, if background\
    \ is False, blink blocks and does not return until the n blinks have been completed,\
    \ which brings your program to a halt. If you want to do other things while the\
    \ LED is flashing then set background to True or accept the default. The LED will\
    \ then flash n times after blink has returned.\nFor example, our original Blinky\
    \ LED program given in Chapter 3:\n\n```\nfrom gpiozero import LED\nfrom time\
    \ import sleep\nled = LED(4)\nwhile True:\n    led.on()\n    sleep(1)\n    led.off()\n\
    \    sleep(1)\n```\n\ncan be written as:\n\n```\nfrom gpiozero import LED\nfrom\
    \ signal import pause\nled = LED(4)\nled.blink(on_time=1,off_time=1,n=100)\nprint(\"\
    Program Complete\")\npause()\n```\n\nIf you try this out you will discover that\
    \ the LED keeps flashing for almost 200 seconds after the program has printed\
    \ Program Complete. Notice that you need the pause at the end of the program because\
    \ if your program comes to a halt so do any threads that the program has created.\
    \ In short, without pause() you wouldn't see the LED flash at all. The point is\
    \ that usually when you give a Python instruction you only move on to the next\
    \ instruction when the current instruction has completed.\n\nThis is generally\
    \ called “blocking” because the current instruction stops the next instruction\
    \ executing before it is complete. The call to blink is non-blocking because it\
    \ returns before it has finished everything you told it to do and the next instruction\
    \ is executed while it is unfinished. Instructions that are non-blocking are very\
    \ useful when working with hardware because it allows your program to get on with\
    \ something else while the hardware is doing something.\n\nCompare the behavior\
    \ of the background non-blocking program with a blocking version:\n\n```\nfrom\
    \ gpiozero import LED\nled = LED(4)\nled.blink(on_time=1,off_time=1,n=100,background=False)\n\
    print(\"Program Complete\")\n```\n\nIn this case you don't need the pause() because\
    \ the program waits for the LED to have completed 100 flashes. You will only see\
    \ the Program Complete message after 200 seconds.\n\nIt is interesting that in\
    \ either case the blink method makes use of a new thread to run LED in the background,\
    \ the only difference is that when background is False the main thread waits for\
    \ the blink thread to complete.\n\nThe toggle method simply changes the LED from\
    \ on to off or off to on depending on its current state. You can use it to write\
    \ the Blinky program in yet another way:\n\n```\nfrom gpiozero import LED\nfrom\
    \ time import sleep\n\nled = LED(4)\n\nwhile True:\n    led.toggle()\n    sleep(1)\n\
    \    led.toggle()\n    sleep(1)\n```\n\nThere are also some useful properties.\
    \ The `is_lit` property is true if the LED is currently active and `value` sets\
    \ and gets the state of the LED as a 1 or a 0. Finally we have the `pin` property\
    \ which returns the pin object that the LED is connected to. The Pin object provides\
    \ lower-level access to the GPIO line.\n\n### Buzzer\n\nThe only other standard\
    \ on/off device is the buzzer and it goes on and off in the sense that it is driven\
    \ by a single GPIO line, just like an LED, and makes a sound when the line is\
    \ high and is silent when the line is low. It isn't capable of making different\
    \ tones, it is either on or off.\nThe exact type of buzzer is a piezoelectric\
    \ buzzer which emits a single tone and can be very loud:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_57_0.png)\n\
    \nYou don't need a current-limiting resistor as buzzers take very little current.\
    \ All you have to do is to make sure that it will operate at 3.3 volts. All you\
    \ have to do to use one is connect the negative lead to ground and the positive\
    \ lead to a GPIO line:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_58_0.png)\n\
    \nThe Buzzer object has all of the properties and methods of the LED object. The\
    \ on and off methods now make the buzzer sound but work in exactly the same way.\
    \ The one small change is that blink is now renamed beep. It works in exactly\
    \ the same way but now the buzzer is switched on and off.\n\n```\nfrom gpiozero\
    \ import Buzzer\nfrom signal import pause\n\nbuzz = Buzzer(4)\nbuzz.beep(on_time=1,off_time=1,n=100)\n\
    print(\"Program Complete\")\npause()\n```\n\nYou can see quite clearly that creating\
    \ a Buzzer class is more about renaming things, so that your program can be more\
    \ understandable, than introducing anything new.\n\n### A Custom On/Off Device\n\
    \nThere are lots of on/off devices other than LED and Buzzer, so how do you arrange\
    \ to work with them?\n\nOne solution is to treat everything as if it was an LED.\
    \ For example, if you have an electric door lock you could write:\n\n```\nlock=LED(4)\n\
    lock.on()\n...\nlock.off()\n```\n\nIt would work, but it might be confusing in\
    \ the future when you have forgotten the program and are forced to wonder what\
    \ an LED is doing with a lock and what lock.on() means.\n\nA better and simpler\
    \ solution is to derive a custom on/off device. You can do this using inheritance\
    \ from DigitalOutputDevice which provides nearly all of the methods that LED has\
    \ – in particular it has on and off methods. In this case we can simply pass the\
    \ constructor parameters to the constructor of DigitalOutputDevice:\n\n```\nclass\
    \ Lock(DigitalOutputDevice):\n    def __init__(self, *args, **kwargs):\n     \
    \   super().__init__(*args, **kwargs)\n```\n\nAt this point Lock is really just\
    \ a copy of DigitalOutputDevice and to customize it to be a Lock class we need\
    \ to add appropriate methods. What we really need are two new methods, lock and\
    \ unlock, and these can be implemented by calling the on and off methods of the\
    \ super class:\n\n```\ndef lock(self):\n    super().on()\ndef unlock(self):\n\
    \    super().off()\n```\n\nNow we have a Lock object that has lock and unlock\
    \ methods that make sense for the device. However, we also still have on, off\
    \ and blink which don't make any sense.\nThe simplest solution is to override\
    \ them with methods that raise an appropriate exception:\n\n```\ndef on(self):\n\
    \    raise AttributeError(\"'Lock' object has no attribute 'on'\")\ndef off(self):\n\
    \    raise AttributeError(\"'Lock' object has no attribute 'off'\")\ndef blink(self):\n\
    \    raise AttributeError(\"'Lock' object has no attribute 'blink'\")\n```\n\n\
    This stops the use of the method calls, but the inappropriate attributes are still\
    \ accessible. That is:\n\n```\nlock.on()\nresults in an exception, but:\nmy0n=lock.on\n\
    works, even if you can't actually call the method.\n```\n\nThis is probably good\
    \ enough for most use cases, but you could take it one step further by customizing\
    \ the constructor. After all, you don't want to allow active_high to be set to\
    \ False and have lock mean unlock and vice versa."
  mdcn: "## 第5章\n### 简单的开关设备\n\n只有两种简单的开关设备——LED和蜂鸣器。在本章中，我们将依次介绍它们，并学习如何创建自己的新型自定义开关设备。\n\
    \n### 开关设备的继承关系\n\n简单输出设备的继承层次结构如下：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_54_0.png)\n\
    \n如果你不了解继承，请参阅上一章。\n了解继承层次结构对于创建自己的自定义类以扩展GPIO Zero非常有用。`Device`是最通用的，然后是`GPIODevice`，它对应于用作输入或输出的单个GPIO线路。`OutputDevice`是通用的输出线路，`DigitalOutputDevice`只有两种状态，最后`LED`和`Buzzer`对应于实际设备。\n\
    \n### LED详解\n\nLED类是典型的开关设备。你已经看到了如何创建与特定GPIO引脚关联的LED对象：\n`led = LED(4)`\n创建一个与GPIO4关联的LED对象。\n\
    \n创建LED对象时可以指定的其他参数有：\n`LED(pin, active_high=True, initial_value=False, pin_factory=None)`\n\
    \n| 参数 | 作用 |\n| :--- | :--- |\n| active_high | 如果为True，on方法将线路设置为高电平<br>如果为False，off方法将线路设置为高电平\
    \ |\n| initial_value | 如果为True，设备初始状态为开启<br>如果为False，设备初始状态为关闭 |\n| pin_factory\
    \ | 使用的底层引脚工厂<br>让GPIO Zero自动设置此项 |\n\n例如：\n`led=LED(4, active_high=True, initial_value=True)`\n\
    创建一个与GPIO4关联的LED，开启时为高电平，因此初始状态为开启。\nLED只有四个相关方法。最常用的是on和off，用于开关LED。\n如果你想让LED闪烁，可以使用：\n\
    `blink(on_time, off_time, n, background)`\n这将使LED闪烁n次，开启时间为on_time秒，关闭时间为off_time秒。background参数默认为True，这允许闪烁在后台的另一个线程上执行。也就是说，如果background为False，blink会阻塞，直到n次闪烁完成才返回，这会使你的程序暂停。如果你想在LED闪烁时做其他事情，请将background设置为True或接受默认值。LED将在blink返回后闪烁n次。\n\
    例如，我们在第3章给出的原始Blinky LED程序：\n\n```\nfrom gpiozero import LED\nfrom time import\
    \ sleep\nled = LED(4)\nwhile True:\n    led.on()\n    sleep(1)\n    led.off()\n\
    \    sleep(1)\n```\n\n可以写成：\n\n```\nfrom gpiozero import LED\nfrom signal import\
    \ pause\nled = LED(4)\nled.blink(on_time=1,off_time=1,n=100)\nprint(\"Program\
    \ Complete\")\npause()\n```\n\n如果你尝试这个，你会发现LED在程序打印出Program Complete后还会持续闪烁近200秒。注意你需要在程序末尾加上pause，因为如果你的程序停止了，程序创建的任何线程也会停止。简而言之，没有pause()，你根本看不到LED闪烁。关键在于，通常当你给出一条Python指令时，只有在当前指令完成后才会执行下一条指令。\n\
    \n这通常被称为“阻塞”，因为当前指令在完成之前会阻止下一条指令执行。对blink的调用是非阻塞的，因为它在完成你告诉它要做的所有事情之前就返回了，下一条指令在它未完成时就开始执行。非阻塞指令在处理硬件时非常有用，因为它允许你的程序在硬件执行操作时继续处理其他事情。\n\
    \n比较后台非阻塞程序与阻塞版本的行为：\n\n```\nfrom gpiozero import LED\nled = LED(4)\nled.blink(on_time=1,off_time=1,n=100,background=False)\n\
    print(\"Program Complete\")\n```\n\n在这种情况下，你不需要pause()，因为程序会等待LED完成100次闪烁。你将在200秒后才看到Program\
    \ Complete消息。\n\n有趣的是，在这两种情况下，blink方法都使用一个新线程在后台运行LED，唯一的区别是当background为False时，主线程会等待blink线程完成。\n\
    \ntoggle方法只是根据LED的当前状态将其从开切换到关，或从关切换到开。你可以用另一种方式编写Blinky程序：\n\n```\nfrom gpiozero\
    \ import LED\nfrom time import sleep\n\nled = LED(4)\n\nwhile True:\n    led.toggle()\n\
    \    sleep(1)\n    led.toggle()\n    sleep(1)\n```\n\n还有一些有用的属性。`is_lit`属性在LED当前激活时为真，`value`以1或0的形式设置和获取LED的状态。最后，我们有`pin`属性，它返回LED连接的引脚对象。Pin对象提供对GPIO线路的更低级别访问。\n\
    \n### 蜂鸣器\n\n另一种标准的开关设备是蜂鸣器，它像LED一样由单个GPIO线路驱动，当线路为高电平时发声，为低电平时静音。它不能发出不同的音调，只能开或关。\n\
    确切的蜂鸣器类型是压电蜂鸣器，它发出单一音调，声音可能非常大：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_57_0.png)\n\
    \n你不需要限流电阻，因为蜂鸣器消耗的电流很小。你所要做的就是确保它能在3.3伏电压下工作。使用时只需将负极线接地，正极线连接到GPIO线路：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_58_0.png)\n\
    \nBuzzer对象具有LED对象的所有属性和方法。on和off方法现在使蜂鸣器发声，但工作方式完全相同。一个小小的改变是blink现在重命名为beep。它的工作方式完全相同，但现在蜂鸣器被开关。\n\
    \n```\nfrom gpiozero import Buzzer\nfrom signal import pause\n\nbuzz = Buzzer(4)\n\
    buzz.beep(on_time=1,off_time=1,n=100)\nprint(\"Program Complete\")\npause()\n\
    ```\n\n你可以非常清楚地看到，创建Buzzer类更多的是重命名事物，以便你的程序更易于理解，而不是引入任何新东西。\n\n### 自定义开关设备\n\n\
    除了LED和蜂鸣器，还有很多其他开关设备，那么你如何安排与它们一起工作呢？\n\n一个解决方案是将所有东西都当作LED来处理。例如，如果你有一个电子门锁，你可以写：\n\
    \n```\nlock=LED(4)\nlock.on()\n...\nlock.off()\n```\n\n它会工作，但当你忘记程序并被迫想知道LED在锁上做什么以及lock.on()是什么意思时，它可能会令人困惑。\n\
    \n一个更好、更简单的解决方案是派生一个自定义开关设备。你可以通过继承DigitalOutputDevice来实现这一点，它提供了LED拥有的几乎所有方法——特别是它有on和off方法。在这种情况下，我们可以简单地将构造函数参数传递给DigitalOutputDevice的构造函数：\n\
    \n```\nclass Lock(DigitalOutputDevice):\n    def __init__(self, *args, **kwargs):\n\
    \        super().__init__(*args, **kwargs)\n```\n\n此时，Lock实际上只是DigitalOutputDevice的一个副本，要将其自定义为Lock类，我们需要添加适当的方法。我们真正需要的是两个新方法，lock和unlock，这些可以通过调用父类的on和off方法来实现：\n\
    \n```\ndef lock(self):\n    super().on()\ndef unlock(self):\n    super().off()\n\
    ```\n\n现在我们有了一个Lock对象，它具有对设备有意义的lock和unlock方法。然而，我们仍然有on、off和blink，它们没有任何意义。\n\
    最简单的解决方案是用引发适当异常的方法覆盖它们：\n\n```\ndef on(self):\n    raise AttributeError(\"'Lock'\
    \ object has no attribute 'on'\")\ndef off(self):\n    raise AttributeError(\"\
    'Lock' object has no attribute 'off'\")\ndef blink(self):\n    raise AttributeError(\"\
    'Lock' object has no attribute 'blink'\")\n```\n\n这阻止了方法调用的使用，但不适当的属性仍然可以访问。也就是说：\n\
    \n```\nlock.on()\n会导致异常，但是：\nmy0n=lock.on\n可以工作，即使你实际上不能调用该方法。\n```\n\n这可能对大多数用例来说已经足够好了，但你可以更进一步，自定义构造函数。毕竟，你不希望允许active_high设置为False，使得lock意味着unlock，反之亦然。"
