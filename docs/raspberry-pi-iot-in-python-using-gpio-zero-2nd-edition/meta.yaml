  - "[PAGE 31]\n\n# A First IoT Program\n\nThe purpose of this program is to just\
    \ let you check that everything is working, the functions used will be explained\
    \ in detail later.\nStart a new program called blinky. Then enter the program:\n\
    \n```\nfrom gpiozero import LED\nfrom time import sleep\n\nled = LED(4)\n\nwhile\
    \ True:\n    led.on()\n    sleep(1)\n    led.off()\n    sleep(1)\n```\n\nYou don't\
    \ have to install gpiozero or sleep as they are standard modules on a Pi. Even\
    \ though you don't know much about GPIO Zero just yet, it isn't difficult to understand\
    \ what is going on in the program. First we create an LED Python object associated\
    \ with GPIO4 and then an infinite loop turns the LED on and off with a pause of\
    \ 1 second between each action. The LED on command sets GPIO4 to a high voltage\
    \ and the off command sets it low – on/off or high/low its the same thing.\nIf\
    \ this works, GPIO4 which is Pin 7 on the Pi's connector, is set to be an output\
    \ and then the loop turns it on and off (high voltage then low) with a delay of\
    \ one second.\nThe library uses logical GPIO numbers assigned within the Pi's\
    \ processor. These GPIO lines are brought out to the Pi's connector and the logical\
    \ GPIO numbers don't correspond to the pins on the connector. In this case GPIO4\
    \ is Pin 7 on connector P1.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_31_0.png)"
  - '[PAGE 32]


    If you want to connect an LED to see the "blinking" for real then this is easy
    enough, but you do need a current-limiting resistor - 200Ω is a good choice. The
    reason for the resistor is explained in Chapter 7.

    How you build the circuit is up to you. You can use a prototyping board or just
    a pair of jumper wires. The short pin and/or the flat on the side of the case
    marks the negative connection on the LED - the one that goes to Pin 6.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_32_0.png)


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_32_1.png)


    If you can''t be bothered to go through the ritual of testing "blinky" with a
    real LED, then just connect a logic analyzer to Pin 7 and you will see 1-second
    pulses.'
  - '[PAGE 33]


    # Pin Numbering


    Something that drives every programmer mad is the different ways of referring
    to the numbering of the GPIO pins. There is the physical pin number, i.e. the
    number of the pin on the physical connector, and the logical GPIO number, which
    is assigned deep in the hardware.


    For most of the Pi family the standard 40-pin connector is largely the same:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_33_0.png)


    GPIO Zero works in terms of logical pin numbers so you need to use these diagrams
    to look up which physical pin you have to connect to. So for example, “GPIO4”,
    or just 4, specifies physical pin 7. You can also use the notation “header:pin”
    where header is the name of the connector. So for example, “J8:7” is Pin 7, i.e.
    GPIO4 on modern Pis. Another alternative is to use the notation “BOARDpin” e.g.
    “BOARD7” is Pin 7, i.e. GPIO4. It doesn’t matter how you specify the pin to use,
    it is automatically converted to the GPIO pin number and this is how the pin number
    is returned if you request it.


    If you study the diagrams, you will see that there are many GPIO lines – GPIO1
    to GPIO27. There are other GPIO lines. Some are used internally by the Pi to do
    things like control a status LED and some are simply not brought out to the connector.
    In some cases you can gain access to the lines that are used internally, but in
    most cases this isn’t a good idea as making the physical connection is difficult.'
  - '[PAGE 34]


    The command pinout can be used from the console to see the pins and the general
    configuration of the device you are using:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_34_0.png)


    Finding a pin can be difficult without a printed label and there are a number
    of aids on the market:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_34_1.png)


    *RasPiO® GPIO Ruler from Pimoroni*


    The most common way of doing the job without a label is to count from the top
    or the bottom of the inner or outer column of pins. The following diagram makes
    this slightly easier:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_34_2.png)


    Notice that the pin number is supposed to start from one at each end of the connector
    – its is what makes the counting easier!'
  - '[PAGE 35]


    # GPIO Modes


    Although GPIO Zero gives you access to devices like LEDs, which means you can
    mostly ignore the basic GPIO lines, you still have to select which one to use
    and this isn''t quite as easy as it looks.

    The available GPIO lines are shown in the following diagram:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_35_0.png)


    You may also notice that many of the pins on the pinout diagrams have two labels.
    For example, GPIO2 is also labeled as SDA1. Many, but not all, of the GPIO lines
    have alternative functions such as connecting SPI devices, more of which later.
    In general, you should avoid using pins which have an alternative function as
    general-purpose I/O lines. The reason is that you might need to use one of the
    special functions later in your project''s development and, if it is is already
    used as a GPIO line, you will not only have to change all the pin assignments,
    which is relatively easy, but also all of the hardware connections, which is harder.
    This is much less of a problem if you restrict yourself to basic GPIO Zero as
    it supports many features via software that works on any pin. However, you may
    want to go outside GPIO Zero and use the alternative functions of the GPIO lines.

    In practice, for general GPIO tasks use:

    GPIO 4, 5, 6, 12, 13, 17, 18, 22, 23, 24, 25, 26 and 27


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_35_1.png)


    > The “preferred” GPIO pins.


    Then use:

    GPIO 2, 3, 9, 7, 8, 16, 10, 11, 14, 15, 19, 20 and 21

    in that order. The reason for the non-sequential order is that some GPIO lines
    work as a group and once you have used one you might as well use the others.'
  - '[PAGE 36]


    This isn''t a definitive rule because the Pi 4/5 offers additional modes for many
    of the GPIO lines. Although the situation is very complicated, don''t worry too
    much as changing which GPIO line is being used in software is easy and, unless
    you have reached a late prototyping stage, it is fairly easy in hardware.


    # Hardware and Software Working Together


    Although Blinky is a very simple program it is typical of the process of working
    with IoT projects and some of the comments made at the start of the chapter should
    make more sense. All IoT projects are a combination of hardware and software.
    Usually you have to connect some device to a set of GPIO lines. In some cases
    you can select which lines you want to use, but in others the lines are fixed
    and you have to use the lines that are specified.

    Once you are happy that the device is connected to the GPIO lines and powered
    properly, you can move on to the software. In most cases you will be able to use
    a GPIO Zero class designed to work with the device. Then all you have to do is
    specify the GPIO pins you have used to connect the device, if they aren''t fixed,
    and then use the methods provided to control the device. In many cases the device
    can be so abstracted from GPIO lines that you can forget that they exist. Even
    the humble LED works in terms of On and Off with no reference to the GPIO line
    being set “high” or “low”. More complicated devices hide the fact that they are
    working with particular GPIO lines almost completely and even the notion of on
    and off or high and low vanishes. However, you need to keep in mind that the inputs
    and outputs of the Pi really are just GPIO lines that change state from high to
    low and low to high.

    In later chapters we look not only at the standard devices that GPIO Zero supports,
    but how to create classes that make new devices easier to work with.'
  - '[PAGE 37]


    # Summary


    +   - A first IoT program is particularly easy in GPIO Zero. The standard Blinky
    example only needs an LED object and the use of its on and off methods. All you
    have to do is assign a GPIO line and connect an LED to it.

    - Pin numbering is complicated by the fact that there are GPIO numbers and physical
    pin numbers. The simplest thing to do is to always use the GPIO numbers as assigned
    by the processor and convert these to pin numbers when you connect up.

    - The pinout command used at the Pi console will print a map of the pins.

    - You can buy labels that help find a particular pin or just adopt the technique
    of counting pins from either end on the inside or outside row of the connector.

    - Not all of the GPIO lines that the Pi has are brought out on the main connector.
    Some are used internally and some are simply ignored.

    - Some of the GPIO lines have alternative functions and these are best avoided
    if all you need is a simple GPIO input/output line.

    - All IoT projects are a mix of hardware and software. Usually there is a phase
    where you experimentally connect the hardware and write some instructions just
    to check that you have it connected correctly before moving on to creating the
    real project.'
- md: "## Chapter 4\nPython - Class and Object\n\nAlthough this is not a book designed\
    \ to teach you Python, before we go any further we are making a detour into some\
    \ specific aspects of the language. This is because your first encounter with\
    \ GPIO Zero might have confused you if you don't know about classes and objects.\
    \ Many Python programmers are hardly aware that Python is object-oriented. The\
    \ reason is that Python is designed to be easy to get started with and this means\
    \ that you can immediately start to write a program simply as a few lines of code.\
    \ Later you might learn about functions and organize your code in a better way,\
    \ but there is no real pressure on you to learn about classes and objects which\
    \ are arguably an even better way to organize your code.\n\nThis account is a\
    \ very pragmatic look at the way Python implements objects and it is certainly\
    \ not complete or extensive. If you really want to understand what is going on\
    \ and why it all fits together in a remarkably elegant way you need to read Programmer's\
    \ Python: Everything Is An Object, 2nd Ed, ISBN:978-1871962741 in which Mike James\
    \ looks at the deeper logic of the Python's approach to objects.\n\nGPIO Zero\
    \ is an object-oriented library and as such you cannot avoid using classes and\
    \ objects. When you write:\n\n```python\nfrom gpiozero import LED\nled = LED(4)\n\
    while True:\n    led.on()\n    led.off()\n```\n\nyou are using classes, objects\
    \ and methods. LED is a class that you use to create an object, an instance of\
    \ the LED class. A reference to the new object is stored in the variable led and\
    \ you use this to access the object. Notice that led is not the object, but a\
    \ reference to the object.\n\nThere can be more than one reference to an object.\
    \ For example:\n\n```python\nled1 = LED(4)\nled2 = led\n```\n\nNow both led1 and\
    \ led2 reference the same object. You can think of led2 and led as “pointing”\
    \ at the same object which lives somewhere else in memory. This is a subtle, but\
    \ important, idea.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_39_0.png)\n\nWhen\
    \ you use led.on() you are using one of the methods of the LED class that the\
    \ instance supports. All of this is fairly easy and you can simply make use of\
    \ it at an intuitive level. You can create new programs by simply following the\
    \ lead that GPIO Zero sets and accepting that this is just “the way things are\
    \ done”. A much better idea, however, is to use it as an opportunity to learn\
    \ about Object-Oriented Python. Even if you know the basics, there are many advanced\
    \ techniques used in GPIO Zero and understanding them will improve your Python\
    \ programs.\n\nIf you know all about objects in Python skim read this chapter\
    \ to make sure you haven’t forgotten or missed anything. You are expected to already\
    \ know the basics of Python, such as control statements, if, the while and for\
    \ loops and functions.\n\n## Objects\n\nThe idea of an object is relatively old\
    \ in programming, but it has taken time for it to become mainstream. When we first\
    \ started writing programs in higher-level languages, best practice was to write\
    \ a function for whatever you needed to do. For example, if you needed to sort\
    \ an array, you would write a sort function which accepted a few parameters that\
    \ determined the data and the operation:\n\n```python\nsort(myArray, order)\n\
    ```\n\nwhere myArray is the data that you want to sort, and order is a parameter\
    \ that sets the sort order to be used.\n\nLater on we moved over to object-oriented\
    \ programming where data and the functions that process the data are grouped together\
    \ into entities called objects. In this case functions such as sort became methods\
    \ of the data that they were to operate on.\n\nSo an Array object would have a\
    \ sort method and you would write the sort operation as:\n\n```python\nmyArray.sort(order)\n\
    ```\n\nYou can see that this is a small change from the use of myArray as a parameter\
    \ to the sort function to using myArray as an object with a sort method. You could\
    \ say that the shift from functions to object-oriented programming is all about\
    \ the shift of a parameter from inside the function to outside it.\n\nLooking\
    \ a little deeper, the simplification that this shift brings about is well worth\
    \ it. The sort function can now use the data in myArray more or less by default\
    \ and this makes it possible to create an isolation from the rest of the program.\
    \ It also brings about a complete change in the way that we think about functions.\n\
    \nFor example, you could say that myArray “knows how” to sort itself. Another\
    \ object, myList say, may also “know how” to sort itself using its own sort function,\
    \ which isn’t the same as the Array sort function. This is usually referred to\
    \ as polymorphism – the same function sort changes its form depending on the object\
    \ it belongs to.\n\nSo instead of having to write:\n\n```python\nif A == Array:\n\
    \    ArraySort(A)\nelse:\n    ListSort(A)\n```\n\nwe can just write:\n\n```python\n\
    A.sort()\n```\n\nIt also means that we think about creating not just an array,\
    \ which is a collection of data, but an Array object which is data and code.\n\
    \nIn the case of GPIO Zero there is an even more appropriate interpretation. For\
    \ example:\n\n```python\nled.on()\n```\n\ncan be thought of as the LED object\
    \ “knowing how” to turn itself on. The alternative is to have an on function which\
    \ “knows how” to turn any LED on:\n\n```python\non(led)\n```\n\nYou can see that\
    \ thinking of an LED as something that has built-in actions is a reasonable and\
    \ convenient approach.\n\nAlthough we have been talking about actions, objects\
    \ have attributes that are any type of data. For example:\n\n```python\nprint(led.value)\n\
    ```\n\nIn this case the attribute value is 1 if the LED is on and 0 otherwise.\
    \ Setting the attribute also changes the state of the LED, i.e. to turn it on\
    \ you would use:\n\n```python\nled.value = 1\n```\n\nYou can think of this as\
    \ storage that is local to the instance. That is, if you create another LED:\n\
    \n```python\nled2 = LED(5)\n```\n\nthen it has its own value attribute. Methods\
    \ are just attributes that happen to be functions.\n\n## Creating Your Own Objects\
    \ - Class\n\nUsing objects is easy, but there comes a time when you need to create\
    \ your own objects. Creating a custom object is relatively easy, but it can seem\
    \ involved when you first encounter it. First you have to create a class which\
    \ gives the definition of the object you want to create and then you use it to\
    \ create as many instances of the class as you need. You already know how this\
    \ works with objects that GPIO Zero provides. The LED class defines all of the\
    \ attributes of any led objects you use it to create.\n\n```python\nled = LED(4)\n\
    ```\n\nThis use of class and instance is a slight problem when it comes to naming\
    \ things. For example, the LED class has the name you might want to use for a\
    \ single instance of the class. This is particularly irritating when all you want\
    \ is a single instance of the class. Then, there is even a tendency to think,\
    \ “Why do I need a class at all? Why can’t I just create an object directly?”\
    \ The answer is you can, but the class/instance approach is much more common.\
    \ In general, use upper case names for classes and lower case for instances.\n\
    \nTo create a custom object you first have to create a custom class using the\
    \ class keyword:\n\n```python\nclass MyClass:\n    def myMethod(self):\n     \
    \   print(\"myMethod called\")\n```\n\nThis creates MyClass with a single method\
    \ myMethod which simply prints something. Once defined, you can use MyClass in\
    \ the standard way:\n\n```python\nmyObject = MyClass()\nmyObject.myMethod()\n\
    ```\n\nwhich prints myMethod called.\n\nThe only possibly confusing part is the\
    \ use of `self` in the method definition. If you refer back to the way a function\
    \ is converted into a method then it should make sense. In Python when you define\
    \ a method you use `self` as the first parameter. When you call the method, Python\
    \ automatically sets `self` to the name of the instance. That is:\n`myObject.myMethod()`\n\
    is converted into:\n`myMethod(myObject)`\nand hence `self` is set to `myObject`.\
    \ This is the fundamental way that functions become methods and is exactly how\
    \ Python does it. It is worth noting that the use of `self` is a convention and\
    \ not enforced by the system. You could use this in JavaScript/C++/Java-style,\
    \ but your programs would be less readable by another Python programmer.\n\nWe\
    \ now have a basic way of adding method attributes to an object, but how do we\
    \ add data attributes? The key thing is that each instance of a class has to have\
    \ its own copy of the data attributes. The simplest way to do this is to make\
    \ use of the “magic” `__init__` method. It is one of Python’s many “magic” methods\
    \ which are used automatically by the system to do fixed things. In this case\
    \ the system automatically calls `__init__` whenever you use a class to create\
    \ an object. That is when you write:\n`myObject = MyClass()`\nthen any `__init__`\
    \ method you may have defined in `MyClass` is called before the object instance\
    \ is complete.\n\nNow consider what happens if you write:\n\n```python\nclass\
    \ MyClass:\n    def __init__(self):\n        self.myAttribute1 = 0\n```\n\nand\
    \ then create an instance:\n`myObject = MyClass()`\nNow your custom `__init__`\
    \ is called and it creates a new attribute `self.myAttribute`. What do you think\
    \ `self` is set to? As in the case of calling a method, `self` is set to the object\
    \ being created, i.e. `myObject` in this case. The call to `__init__` is equivalent\
    \ to:\n`__init__(myObject)`\nand the attribute creation is the same as:\n`myObject.myAttribute1\
    \ = 0`"
  mdcn: "## 第四章\nPython - 类与对象\n\n尽管本书并非旨在教授你Python，但在我们继续深入之前，我们先绕道探讨一下这门语言的某些特定方面。这是因为如果你不了解类和对象，你初次接触GPIO\
    \ Zero时可能会感到困惑。许多Python程序员几乎意识不到Python是面向对象的。原因在于Python的设计初衷是易于上手，这意味着你可以立即开始编写程序，只需几行代码即可。之后你可能会学习函数，并以更好的方式组织代码，但并没有真正的压力迫使你去学习类和对象——这可以说是组织代码的更佳方式。\n\
    \n本文对Python实现对象的方式进行了非常务实的探讨，当然这既不完整也不全面。如果你真的想理解其中的原理以及为何这一切能以如此优雅的方式契合在一起，你需要阅读《程序员的Python：一切皆对象》（第二版，ISBN:978-1871962741），Mike\
    \ James在书中深入探讨了Python处理对象的深层逻辑。\n\nGPIO Zero是一个面向对象的库，因此你无法避免使用类和对象。当你编写：\n\n\
    ```python\nfrom gpiozero import LED\nled = LED(4)\nwhile True:\n    led.on()\n\
    \    led.off()\n```\n\n你就是在使用类、对象和方法。LED是一个类，你用它来创建一个对象，即LED类的一个实例。对新对象的引用存储在变量led中，你使用它来访问对象。请注意，led不是对象本身，而是对对象的引用。\n\
    \n一个对象可以有多个引用。例如：\n\n```python\nled1 = LED(4)\nled2 = led\n```\n\n现在led1和led2都引用同一个对象。你可以将led2和led视为“指向”内存中其他地方的同一个对象。这是一个微妙但重要的概念。\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_39_0.png)\n\n当你使用led.on()时，你是在使用该实例所支持的LED类的方法之一。这一切都相当简单，你可以在直觉层面直接使用它。你可以通过遵循GPIO\
    \ Zero设定的模式并接受“事情就是这样做的”来创建新程序。然而，更好的想法是将其作为学习面向对象Python的机会。即使你了解基础知识，GPIO Zero中也使用了许多高级技术，理解它们将提升你的Python程序。\n\
    \n如果你对Python中的对象了如指掌，可以略读本章以确保没有遗忘或遗漏任何内容。你应已掌握Python的基础知识，例如控制语句、if、while和for循环以及函数。\n\
    \n## 对象\n\n对象的概念在编程中相对较老，但它花了很长时间才成为主流。当我们最初开始用高级语言编写程序时，最佳实践是为需要完成的任何任务编写一个函数。例如，如果你需要对数组进行排序，你会编写一个sort函数，该函数接受几个参数来确定数据和操作：\n\
    \n```python\nsort(myArray, order)\n```\n\n其中myArray是你想要排序的数据，order是设置所用排序顺序的参数。\n\
    \n后来我们转向了面向对象编程，其中数据和处理数据的函数被分组到称为对象的实体中。在这种情况下，像sort这样的函数变成了它们要操作的数据的方法。\n\n\
    因此，一个Array对象会有一个sort方法，你可以将排序操作写为：\n\n```python\nmyArray.sort(order)\n```\n\n\
    你可以看到，这与将myArray作为sort函数的参数相比，只是一个小变化，现在myArray是一个具有sort方法的对象。你可以说，从函数到面向对象编程的转变，关键在于将参数从函数内部移到了外部。\n\
    \n深入观察，这种转变带来的简化非常值得。sort函数现在可以或多或少地默认使用myArray中的数据，这使得与程序其余部分的隔离成为可能。它也彻底改变了我们思考函数的方式。\n\
    \n例如，你可以说myArray“知道如何”对自己进行排序。另一个对象，比如myList，可能也“知道如何”使用自己的sort函数（与Array的sort函数不同）对自己进行排序。这通常被称为多态性——同一个函数sort根据其所属对象的不同而改变其形式。\n\
    \n因此，我们不必编写：\n\n```python\nif A == Array:\n    ArraySort(A)\nelse:\n    ListSort(A)\n\
    ```\n\n我们只需编写：\n\n```python\nA.sort()\n```\n\n这也意味着我们思考的不仅是创建一个数组（数据的集合），而是一个Array对象，它是数据和代码的结合。\n\
    \n对于GPIO Zero，有一个更贴切的解释。例如：\n\n```python\nled.on()\n```\n\n可以理解为LED对象“知道如何”打开自己。另一种方式是有一个on函数“知道如何”打开任何LED：\n\
    \n```python\non(led)\n```\n\n你可以看到，将LED视为具有内置动作的东西是一种合理且方便的方法。\n\n尽管我们一直在谈论动作，但对象具有属性，这些属性可以是任何类型的数据。例如：\n\
    \n```python\nprint(led.value)\n```\n\n在这种情况下，如果LED亮着，属性value为1，否则为0。设置属性也会改变LED的状态，即要打开它，你会使用：\n\
    \n```python\nled.value = 1\n```\n\n你可以将其视为实例本地的存储。也就是说，如果你创建另一个LED：\n\n```python\n\
    led2 = LED(5)\n```\n\n那么它有自己的value属性。方法只是碰巧是函数的属性。\n\n## 创建你自己的对象 - 类\n\n使用对象很容易，但总有一天你需要创建自己的对象。创建自定义对象相对容易，但初次接触时可能显得复杂。首先你必须创建一个类，它定义了你想要创建的对象，然后你使用它来创建你需要的该类的任意数量的实例。你已经知道GPIO\
    \ Zero提供的对象是如何工作的。LED类定义了你使用它创建的任何led对象的所有属性。\n\n```python\nled = LED(4)\n```\n\
    \n这种类和实例的使用在命名事物时会带来一点问题。例如，LED类的名称可能正是你想用于该类单个实例的名称。当你只需要该类的单个实例时，这尤其令人恼火。然后，甚至有一种倾向会想，“为什么我需要一个类？为什么我不能直接创建一个对象？”答案是你可以，但类/实例的方式要常见得多。通常，类使用大写名称，实例使用小写名称。\n\
    \n要创建自定义对象，你首先必须使用class关键字创建一个自定义类：\n\n```python\nclass MyClass:\n    def myMethod(self):\n\
    \        print(\"myMethod called\")\n```\n\n这创建了一个MyClass，其中有一个方法myMethod，它只是打印一些内容。一旦定义，你就可以以标准方式使用MyClass：\n\
    \n```python\nmyObject = MyClass()\nmyObject.myMethod()\n```\n\n这会打印myMethod called。\n\
    \n唯一可能令人困惑的部分是在方法定义中使用`self`。如果你回顾函数如何转换为方法的方式，这应该能理解。在Python中，当你定义一个方法时，你使用`self`作为第一个参数。当你调用该方法时，Python会自动将`self`设置为实例的名称。即：\n\
    `myObject.myMethod()`\n被转换为：\n`myMethod(myObject)`\n因此`self`被设置为`myObject`。这是函数成为方法的基本方式，Python正是这样做的。值得注意的是，使用`self`是一种约定，而不是系统强制的。你可以使用JavaScript/C++/Java风格，但你的程序对其他Python程序员来说可读性会降低。\n\
    \n我们现在有了向对象添加方法属性的基本方法，但我们如何添加数据属性呢？关键在于类的每个实例都必须有自己的数据属性副本。最简单的方法是使用“魔法”`__init__`方法。它是Python众多“魔法”方法之一，系统会自动使用它们来执行固定操作。在这种情况下，每当你使用类创建对象时，系统会自动调用`__init__`。也就是说，当你编写：\n\
    `myObject = MyClass()`\n那么在对象实例完成之前，你可能在`MyClass`中定义的任何`__init__`方法都会被调用。\n\n\
    现在考虑如果你编写：\n\n```python\nclass MyClass:\n    def __init__(self):\n        self.myAttribute1\
    \ = 0\n```\n\n然后创建一个实例：\n`myObject = MyClass()`\n现在你的自定义`__init__`被调用，它创建了一个新属性`self.myAttribute`。你认为`self`被设置为什么？就像调用方法的情况一样，`self`被设置为正在创建的对象，即本例中的`myObject`。对`__init__`的调用等同于：\n\
    `__init__(myObject)`\n属性创建等同于：\n`myObject.myAttribute1 = 0`"
