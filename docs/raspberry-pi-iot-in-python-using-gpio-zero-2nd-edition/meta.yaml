    \ - tunnel”的终端窗口来检查隧道是否已打开。不要尝试打开多个隧道，并请注意，除非你打开了到远程机器的隧道，否则远程调试将无法工作。\n\n你还需要确保工作区文件夹存在于远程机器上。你可以使用\
    \ makeRemoteWorkSpace 任务来完成此操作。\n\n## 任务文件\n\n以下两个文件都在你在 VS Code 中打开的文件夹的顶层 .vscode\
    \ 文件夹中创建。\n\n**settings.json**\n此文件必须根据你的 IP、用户名和文件夹进行自定义：\n\n```json\n{\n   \
    \ \"sshUser\": \"pi\",\n    \"sshEndpoint\": \"192.168.11.151\",\n    \"remoteDirectory\"\
    : \"/home/pi/Documents/\"\n}\n```\n\n**tasks.json**\n\n```json\n{\n    \"version\"\
    : \"2.0.0\",\n    \"tasks\": [\n        {\n            \"label\": \"copyToRemote\"\
    ,\n            \"type\": \"shell\",\n            \"command\": \"scp -r ${fileDirname}\
    \ ${config:sshUser}@${config:sshEndpoint}:${config:remoteDirectory}/\",\n    \
    \        \"problemMatcher\": [],\n            \"presentation\": {\n          \
    \      \"showReuseMessage\": false,\n                \"clear\": true\n       \
    \     }\n        },\n        {\n            \"label\": \"makeRemoteWorkSpace\"\
    ,\n            \"type\": \"shell\",\n            \"command\": \"ssh ${config:sshUser}@${config:sshEndpoint}\
    \ mkdir ${config:remoteDirectory}\",\n            \"problemMatcher\": [],\n  \
    \          \"presentation\": {\n                \"showReuseMessage\": false\n\
    \            }\n        },\n        {\n            \"label\": \"RunR\",\n    \
    \        \"type\": \"shell\",\n            \"command\": \"ssh ${config:sshUser}@${config:sshEndpoint}\
    \ python3 ${config:remoteDirectory}${relativeFileDirname}/${fileBasename}\",\n\
    \            \"problemMatcher\": [],\n            \"presentation\": {\n      \
    \          \"showReuseMessage\": false\n            }\n        },\n        {\n\
    \            \"label\": \"RunRemote\",\n            \"dependsOrder\": \"sequence\"\
    ,\n            \"dependsOn\": [\n                \"copyToRemote\",\n         \
    \       \"RunR\"\n            ],\n            \"problemMatcher\": [],\n      \
    \      \"group\": {\n                \"kind\": \"build\",\n                \"\
    isDefault\": true\n            }\n        },\n        {\n            \"label\"\
    : \"StopRemotePython\",\n            \"type\": \"shell\",\n            \"command\"\
    : \"ssh ${config:sshUser}@${config:sshEndpoint} 'pkill python3'\",\n         \
    \   \"problemMatcher\": [],\n            \"presentation\": {\n               \
    \ \"showReuseMessage\": true\n            }\n        },\n        {\n         \
    \   \"label\": \"wait\",\n            \"type\": \"shell\",\n            \"command\"\
    : \"timeout 10\"\n        },\n        {\n            \"label\": \"tunnel\",\n\
    \            \"type\": \"shell\",\n            \"command\": \"ssh -2 -L 5678:localhost:5678\
    \ ${config:sshUser}@${config:sshEndpoint}\",\n            \"problemMatcher\":\
    \ [],\n            \"presentation\": {\n                \"showReuseMessage\":\
    \ false\n            }\n        },\n        {\n            \"label\": \"startDebug\"\
    ,\n            \"type\": \"shell\",\n            \"command\": \"ssh -2 ${config:sshUser}@${config:sshEndpoint}\
    \ 'nohup python3 -m debugpy --listen 0.0.0.0:5678 --wait-for-client ${config:remoteDirectory}${relativeFileDirname}/${fileBasename}\
    \ > /dev/null 2>&1 &'\",\n            \"problemMatcher\": [],\n            \"\
    presentation\": {\n                \"showReuseMessage\": false\n            }\n\
    \        },\n        {\n            \"label\": \"copyAndDebug\",\n           \
    \ \"dependsOrder\": \"sequence\",\n            \"dependsOn\": [\n            \
    \    \"copyToRemote\",\n                \"startDebug\",\n                \"wait\"\
    \n            ],\n            \"presentation\": {\n                \"showReuseMessage\"\
    : false\n            }\n        }\n    ]\n}\n```\n\n总结 tasks.json 中定义的任务：\n\n\
    - **copyToRemote**：将当前本地目录复制到远程机器。例如，如果你在编辑器中打开了 hello.py 并且它存储在 HelloWorld 目录中，那么运行此任务会将本地机器上\
    \ HelloWorld 中的所有内容复制到远程机器上的同一目录。\n- **makeRemoteWorkSpace**：在远程机器上创建顶层项目目录。如果本地机器的顶层项目目录是\
    \ GPIO，那么运行此任务会创建 /home/pi/Documents/GPIO。\n- **RunR**：在远程机器上运行当前程序。如果编辑器中的当前程序是\
    \ hello.py，那么运行此任务会在远程机器上运行 hello.py。它不会复制文件，为此请使用 RunRemote。\n- **RunRemote**：上传当前目录并运行当前\
    \ Python 程序。等同于先执行 copyToRemote 再执行 RunR。\n- **StopRemotePython**：停止远程机器上运行的所有\
    \ Python 程序。\n- **Wait**：实现 10 秒等待。由 copyAndDebug 内部使用，以留出时间让调试器启动。\n- **startDebug**：在调试器下启动当前程序在远程运行。内部使用。\n\
    - **copyAndDebug**：使用 copyToRemote 将当前文件夹复制到远程机器，然后使用 startDebug 调试程序。内部使用。\n\n\
    ## 启动和调试\n\n要利用远程调试，你需要安装 debugpy，这是 VS Code 的最新 Python 调试器。在远程机器（即树莓派）上，输入：\n\
    \n```bash\npython3 -m pip install debugpy\n```\n\n如果你没有设置虚拟环境，可能需要使用：\n\n```bash\n\
    python3 -m pip install debugpy --break-system-packages\n```\n\n你还需要在 .vscode 中有一个\
    \ launch.json 文件：\n\n```json\n{\n    \"version\": \"0.2.0\",\n    \"configurations\"\
    : [\n        {\n            \"name\": \"Python: Remote Attach\",\n           \
    \ \"type\": \"python\",\n            \"connect\": {\n                \"host\"\
    : \"localhost\",\n                \"port\": 5678\n            },\n           \
    \ \"pathMappings\": [\n                {\n                    \"localRoot\": \"\
    ${workspaceFolder}/${relativeFileDirname}/\",\n                    \"remoteRoot\"\
    : \"${config:remoteDirectory}/${relativeFileDirname}\"\n                }\n  \
    \          ],\n            \"request\": \"attach\",\n            \"preLaunchTask\"\
    : \"copyAndDebug\",\n            \"postDebugTask\": \"StopRemotePython\"\n   \
    \     }\n    ]\n}\n```\n\n## 索引\n\n- A 到 D: 199, 207\n- 有源蜂鸣器: 142\n- active_high:\
    \ 162\n- 别名: 104\n- AllOff: 176\n- AllOn: 176\n- 安培: 75\n- AngularServo: 162\n\
    - Arduino: 11\n- 电枢: 150\n- AttributeError: 60\n- 属性: 42, 176\n- 背景: 138\n- 支撑变量:\
    \ 52\n- 基极: 80\n- 基类: 45\n- BCD: 217, 219\n- 贝塔: 80\n- 双向: 154\n- 二进制编码十进制: 217\n\
    - 双极结型晶体管, BJT: 80 f., 84, 91, 152\n- Blinky: 31, 37, 56, 58, 65, 138\n- 阻塞: 57\
    \ f.\n- Bookworm: 17\n- 弹跳: 90\n- 有刷电机: 150\n- 电刷: 150\n- 无刷直流电机: 163\n- Bullseye:\
    \ 17\n- Button: 93, 105, 187\n- ButtonBoard: 187\n- Buzzer: 55, 59\n- CamJamKitRobot:\
    \ 191\n- cat: 126\n- CE: 198\n- 片选线: 209\n- class 关键字: 42\n- 类: 39\n- 集电极: 80\n\
    - 组合函数: 122\n- 共阳极: 141\n- 共阴极: 141\n- 换向器: 150\n- CompositeDevice: 142, 175 f.,\
    \ 192\n- CompositeOutputDevice: 178 f.\n- 组合: 175"
