    big problem is that there is very little documentation to help you get started.
    This book explains the principles so that you can tackle new devices.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_256_2.png)


    # Raspberry Pi IoT in C, Third Edition


    ISBN: 978-1871962840 (Paperback)

    ISBN: 978-1871962154 (Hardback)


    In this book you will find a practical approach to understanding electronic circuits
    and datasheets and translating this to code, specifically using the C programming
    language. The main reason for choosing C is speed, a crucial factor when you are
    writing programs to communicate with the outside world. If you are familiar with
    another programming language, C shouldn''t be hard to pick up. This third edition
    has been brought up-to-date and includes the Pi Zero 2W and the latest OS. An
    entire chapter is devoted to the Pi 5 and it is covered elsewhere in the book
    wherever possible.'
  - '[PAGE 257]


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_257_0.png)


    # Programmer''s Python: Everything is an Object, Second Edition


    ISBN: 978-1871962741

    This book, the first in the *Something Completely Different* series, sets out
    to explain the deeper logic in the approach that Python 3 takes to classes and
    objects. The subject is roughly speaking everything to do with the way Python
    implements objects. That is, in order of sophistication: metaclass, class, object,
    attribute, and all the other facilities such as functions, methods and “magic
    methods” that Python uses to make it all work.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_257_1.png)


    # Programmer''s Python: Everything is Data


    ISBN: 978-1871962598

    Following the *Something Completely Different* philosophy, this book approaches
    data in a distinctly Pythonic way. What we have in Python are data objects that
    are very usable and very extensible. From the unlimited precision integers, referred
    to as bignums, through the choice of a list to play the role of the array, to
    the availability of the dictionary as a built-in data type, Python has powerful
    special features. Complete chapters are devoted on Boolean logic, dates and times,
    regular expressions, bit manipulation, files, pickle and using ctypes.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_257_2.png)


    # Programmer''s Python: Async


    ISBN: 978-1871962765

    For many reasons modern Python programs have to be asynchronous. This book, part
    of the *Something Completely Different* set focuses on all things async. It not
    only covers the latest asyncio in depth, but has all you need to know about the
    many approaches to async that Python provides – threads, processes, locks, communications,
    subprocesses, futures, tasks, schedulers and, of course, asyncio. This is the
    book you need to understand all the options, tradeoffs and gotchas.'
  - '[PAGE 258]


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_258_0.png)


    # Programming the Raspberry Pi Pico/W in MicroPython, Second Edition


    ISBN: 978-1871962802 (Paperback)

    ISBN: 978-1871962062 (Hardback)


    The Raspberry Pi Pico is a remarkable microcontroller. It has a power and sophistication
    that would have been unthinkable just a short time ago. Instead of struggling
    with the machine, you can now focus on a good implementation of your algorithms.
    The original version of this book, which covers getting the most from the Pico
    using MicroPython, predated the launch of the Wifi-enabled Pico W which is covered
    in this second edition.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_258_1.png)


    # Programming The Raspberry Pi Pico/W In C, Second Edition


    ISBN: 978-1871962796 (Paperback)

    ISBN: 978-1871962055 (Hardback)


    This book explains the many reasons for wanting to use C with the Raspberry Pi
    Pico and Pico W, not least of which is the fact that it is much faster. This makes
    it ideal for serious experimentation and delving into parts of the hardware that
    are otherwise inaccessible. Using C is the way to get the maximum from the Pico
    and this book shows you how with many near-complete projects.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_258_2.png)


    # Master the Raspberry Pi Pico in C: WiFi


    ISBN: 978-1871962819 (Paperback)

    ISBN: 978-1871962079 (Hardback)


    At a more advanced level, there is far too much to the Pico to cover in a single
    book and this follow-on title focuses on WiFi using the lwip and mbedtls libraries
    to take your Pico C programming to the next level. For the Pico W it covers TLS/HTTPS
    connections, access point mode, other protocols and using FreeRTOS. Chapters are
    devoted to advanced hardware features such as DMA, watchdog timer and saving power.'
  - '[PAGE 259]


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_259_0.png)


    # Micro:bit IoT In C, Second Edition


    ISBN: 978-1871962673


    The second edition of this book covers V2, the revised version of the micro:bit.
    The other important change is that it now uses the highly popular VS Code for
    offline development and lets you get started the easy way by providing downloadable
    templates for both V1 and V2 of the micro:bit. The micro:bit lacks WiFi connectivity
    but using a low-cost device we enable a connection to the Internet via its serial
    port which allows it to become a server. The book rounds out with a new chapter
    on the micro:bit’s radio and the V2’s sound capabilities


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_259_1.png)


    # Programming the ESP32 in MicroPython


    ISBN: 978-1871962826(Paperback)

    ISBN: 978-1871962093 (Hardback)


    The ESP32 is a remarkable device. It is low cost, but with many different subsystems
    that make it more powerful than you might think. You can use it for simple applications
    because it is cheap, but you can also use it for more sophisticated applications
    because it is capable. The purpose of the book is to reveal what you can do with
    the ESP''s GPIO lines together with widely used sensors, servos and motors and
    ADCs. After covering the GPIO, outputs and inputs, events and interrupts, it gives
    you hands-on experience of PWM (Pulse Width Modulation), the SPI bus, the I2C
    bus and the 1-Wire bus. We also cover direct access to the hardware, adding an
    SD Card reader, sleep states to save power, the RTC, RMT and touch sensors, not
    to mention how to use WiFi.'
