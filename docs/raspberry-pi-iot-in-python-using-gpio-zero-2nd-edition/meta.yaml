  md: '# # Chapter 5

    ## Simple On/Off Devices


    There are only two simple on/off devices – the LED and the Buzzer. In this chapter
    we look at each in turn and learn how to create our own new custom on/off devices.


    # ## On/Off Inheritance


    The inheritance hierarchy for the simple output devices is:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_54_0.png)


    If you don’t know about inheritance then see the previous chapter.

    Knowledge of the inheritance hierarchy is mostly useful in creating your own custom
    classes to extend GPIO Zero. `Device` is the most general and then we have `GPIODevice`
    which corresponds to a single GPIO line used as input or output. `OutputDevice`
    is a general output line, `DigitalOutputDevice` only has two states and finally
    `LED` and `Buzzer` correspond to real devices.


    # ## LED In Detail


    The LED class is the archetypal on/off device. You have already seen how to create
    an LED object associated with a particular GPIO pin:

    `led = LED(4)`

    creates an LED object associated with GPIO4.'
  merge: -1
  pgno: 54
- img_proc: true
  md: "Other things you can specify when creating an LED object are:\nLED(pin, active_high=True,\
    \ initial_value=False, pin_factory=None)\n\n| Parameter | Action |\n| :--- | :---\
    \ |\n| active_high | If True the on method sets the line high<br>If False the\
    \ off method sets the line high |\n| initial_value | If True the device is initially\
    \ on<br>If False the device is initially off |\n| pin_factory | The underlying\
    \ pin factory to use<br>Let GPIO Zero set this |\n\nSo for example:\nled=LED(4,\
    \ active_high=True, initial_value=True)\ncreates an LED associated with GPIO4\
    \ that is high when switched on and hence initially on.\nThere are only four methods\
    \ associated with LED. The most commonly used are on and off which switch the\
    \ LED on and off.\nIf you want to make the LED flash then you can use:\nblink(on_time,\
    \ off_time, n, background)\nwhich will blink the LED n times, switching on for\
    \ on_time and off for off_time specified in seconds. The background parameter\
    \ defaults to True and this allows the blinking to be performed on another thread\
    \ in the background. That is, if background is False, blink blocks and does not\
    \ return until the n blinks have been completed, which brings your program to\
    \ a halt. If you want to do other things while the LED is flashing then set background\
    \ to True or accept the default. The LED will then flash n times after blink has\
    \ returned.\nFor example, our original Blinky LED program given in Chapter 3:\n\
    \n```\nfrom gpiozero import LED\nfrom time import sleep\nled = LED(4)\nwhile True:\n\
    \    led.on()\n    sleep(1)\n    led.off()\n    sleep(1)\n```"
