  md: 'it up and follow the instructions. It is also assumed that you can program
    in Python. The level of Python required to understand the programs isn''t high
    but you should be familiar with using modules and functions.


    As to additional hardware over and above the Pi you will need a solderless prototype
    board and some hookup wires – known as Dupoint wires. You will also need some
    LEDs, a selection of resistors, some 2N2222 or other general purpose transistors
    and any of the sensors used in later chapters. It is probably better to buy what
    you need as you choose to implement one of the projects, but an alternative is
    to buy one of the many "getting started" kits for the Raspberry Pi. You will probably
    still need to buy some extra components, however.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_17_0.png)


    *A solderless prototype board and some Dupoint wires*


    You don''t need to know how to solder, but you will need to be able to hook up
    a circuit on a prototyping board. A multimeter (less than $10) is useful, but
    if you are serious about building IoT devices investing in a logic analyzer (less
    than $50) will repay itself in no time at all. You can get small analyzers that
    plug in via a USB port and use an application to show you what is happening. It
    is only with a multichannel logic analyzer can you have any hope of understanding
    what is happening. Without one and the slight skill involved in using it, you
    are essentially flying blind and left to just guess what might be wrong.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_17_1.png)


    *A Low Cost Logic Analyzer*


    18'
