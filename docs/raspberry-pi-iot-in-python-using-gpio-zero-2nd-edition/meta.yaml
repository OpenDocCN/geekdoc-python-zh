    | 0x00 | 0x80 | 0 | Seconds x 10 | | Seconds | | | | Seconds | 00-59 |

    | 0x01 | 0x81 | 0 | Minutes x 10 | | Minutes | | | | Minutes | 00-59 |

    | 0x02 | 0x82 | 0 | 12/24 | AM/PM or Hours x10 | Hours | | | | Hours | 1-12 +AM/PM
    00-23 |

    | 0x03 | 0x83 | 0 | 0 | 0 | 0 | 0 | Day | | Day | 1-7 |

    | 0x04 | 0x84 | 0 | Date x 10 | | Date | | | | Date | 01-31 |

    | 0x05 | 0x85 | Century | 0 | 0 | Month x 10 | Month | | | Month | 01-12 |

    | 0x06 | 0x86 | 0 | Year x10 | | Year | | | | Year | 00-99 |


    You can see that the addresses are sequential - 0x00 to 0x06 for reading and 0x80
    to 0x86 for writing. The data is packed into each byte using BCD, Binary Coded
    Decimal. This codes each decimal digit as a four-bit binary value. For example,
    the month 12 would be coded in BCD as 0001 and 0010, i.e. 1 and 2 in binary. The
    value 59 would be coded as 0101 for 5 and 1001 for 9. In a simple system, a single
    byte would always hold two BCD digits. However, if the range of possible values
    is limited, some bits are always zero and can be reused for something else. For
    example, the month register only has to store from 01 to 12 and this means we
    only need one bit for the tens digit and four for the units digit – and you can
    see that this is the case in the table. This allows us to use bit 7 as a century
    indicator. The way this works can be confusing as in some implementations bit
    7 == 0, meaning 1900, and in others bit 7 == 1 meaning 2000. This isn''t necessary
    as all the century bit does is increment when a century boundary is crossed. What
    this means is that we can leave it at 0, to mean 2000, and wait for it to increment
    to indicate that we have reached 2100.


    The only slightly complicated part is specifying the use of a 12- or 24-hour clock
    in the Hours register. If you set the bit 6 to a 1 then you are selecting a 12-hour
    clock and you only need five bits to represent the number, i.e. from 0 0000 for
    0 hours to 1 0010 for 12 hours. This lets you use bit 5 as an AM/PM indicator.
    On the other hand, if you set bit 6 to 0 then you need an extra bit because now
    hours range from 00 0000 for 0 hours to 10 0100 for 24 hours. The simplest thing
    to do is work with a 24-hour clock then you can simply read the register as a
    simple BCD coding of the two digits that give the hour.'
