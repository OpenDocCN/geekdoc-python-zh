- img_proc: true
  md: 'RPIOFactory is faster, doesn''t load the CPU and supports a clever software
    implementation of PWM using DMA (Direct Memory Access), but it doesn''t support
    the Pi 5, Pi 4 or the Pi Zero and it is no longer supplied as part of GPIO Zero
    2. No work has been done on the project since 2014 and the project''s GitHub page
    notes that it is no longer maintained and is looking for a new maintainer.


    The pigpio library also uses DMA to create software PWM on any line, but it currently
    has only experimental support for the Pi 4 and no support for the Pi 5. Its use
    of a daemon to control the GPIO lines also seems to have some stability problems.
    However, the project is still on-going and, if you are prepared for slightly more
    complexity, it is worth trying. This pin factory is also the only one that supports
    remote GPIO. It does at least seem to be a well-implemented current project.


    The final choice is NativeFactory which is completely Python-based. You can read
    the code to see how it works and it is very educational. Sadly, it isn''t fully
    implemented and, while it supports the SPI bus in hardware and software, it doesn''t
    support PWM at all.


    There is also MockFactory which creates software pins that can be used for testing
    when a Pi isn''t available.


    To summarize:


    For most applications the default LGPIOFactory is the best choice simply because
    it is the default, supports all version of the Pi including the Pi 5 and is likely
    to be the one supported in the future. Its only disadvantage is that it is slower
    than some alternatives.


    The only other pin factory worth considering is the RpiGPIOFactory which is faster
    but it doesn''t run on the Pi 5 and isn''t likely to see much development in the
    future.


    Currently LGPIOFactory has no ability to work with I2C or 1-wire devices. For
    these you need to work directly with Linux Drivers as explained in *Raspberry
    Pi IOT in Python with Linux Drivers*, ISBN:9781871962659.'
