- img_proc: true
  md: '# Chapter 9

    Complex Input Devices


    The input devices we are about to meet are not complex in the sense of difficult,
    they just have more features than a simple button. All of the devices inherit
    from SmoothedInputDevice and the general idea is that a single input isn''t sufficient
    to act on. What is required is an average reading, so reducing noise.


    # SmoothedInputDevice


    The base class for all of this set of input devices is SmoothedInputDevice.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_108_0.png)


    SmoothedInputDevice has all of the properties of InputDevice and, in addition,
    it sets up a queue of readings. The actual value of the device is obtained by
    applying a function, usually an average, to the readings in the queue. A background
    thread is used to take regular readings and the function is computed when you
    use a value.'
  merge: -1
  pgno: 108
- img_proc: true
  md: "The constructor has a large number of parameters:\n\n```\nSmoothedInputDevice(pin,pull_up=False,\
    \ active_state=None,\n                    threshold=0.5, queue_len=5, sample_wait=0.0,\n\
    \                    partial=False, average=median, ignore=None,\n           \
    \         pin_factory=None)\n```\n\nThe parameters concerned with setting up the\
    \ queue are:\n\n+   - **queue_len**\n  The length of the queue, i.e. the number\
    \ of readings that the function is applied to. The default is 5.\n- **threshold**\n\
    \  The value that is used as a cut-off for the device being activated. If the\
    \ read value is greater than threshold, the device is active.\n- **sample_wait**\n\
    \  The time between readings in seconds. The default is 0, which means read as\
    \ fast as possible.\n- **partial**\n  If True an attempt to read the device returns\
    \ with a value, even if the queue isn't full. If False, the default, a read blocks\
    \ until the queue is full.\n- **ignore**\n  A set of values that represents non-readings\
    \ and should be ignored in the calculation of the average. Defaults to None.\n\
    - **average**\n  The function applied to the values in the queue to get the final\
    \ value. It defaults to median, which is the middle value in the queue.\n\nUsing\
    \ a SmoothedInputDevice is just a matter of setting up the degree of smoothing\
    \ needed – i.e. the speed of reading, the number of data points to average, and\
    \ the function that should be used to average them.\n\nIt should be obvious that,\
    \ whatever the SmoothInputDevice is reading, it can't be a single GPIO line that\
    \ returns a 0 or a 1. In most cases averaging this using median would return 0.5.\
    \ However, averaging using average would give you a value that was proportional\
    \ to the ratio of ones to zeros in the measurement interval. In the same way,\
    \ you can create a device which returns a number proportional to the time a GPIO\
    \ line is high."
  merge: -1
