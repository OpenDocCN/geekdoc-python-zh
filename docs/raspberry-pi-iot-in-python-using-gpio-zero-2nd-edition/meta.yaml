  md: '# Summary


    +   - There are a number of different types of electric motor, but DC brushed
    or brushless motors are the most used in the IoT.

    - Brushed motors can be speed controlled using a single transistor driver and
    a PWM signal. There is no unidirectional motor class in GPIO Zero, but it is easy
    to create one.

    - For bidirectional control you need an H-bridge. The Motor class can be used
    to control the direction and speed of a motor with the help of an H-bridge.

    - Servo motors set their position in response to the duty cycle of a PWM signal.

    - Brushless DC motors are very powerful and best controlled using off-the-shelf
    electronic modules. They are very powerful and thus dangerous if used incorrectly.
    They can be driven using a simple PWM signal.

    - Stepper motors are a special case of a brushless DC motor. They move in discrete
    steps in response to energizing different coils.

    - A unipolar motor has coils that can be driven in the same direction for every
    step. A bipolar motor has coils that need to be driven in reverse for some steps.

    - Bipolar motors need two H-bridges to operate and four GPIO lines.

    - There is no stepper motor class in GPIO Zero, but it is possible to create one.'
  merge: -1
