    care to implement. The lgpio library has done some of the work for you by providing
    a set of functions that will pulse a GPIO line in a particular way. Notice that
    all of these pulses are generated in software. For example, `tx_pwm(handle, gpio,
    pwm_frequency, pwm_duty_cycle, pulse_offset=0, pulse_cycles=0)`


    This starts software timed PWM on an output GPIO and has the parameters:


    +   - `handle`: As returned by gpiochip_open

    - `gpio`: GPIO line to be pulsed

    - `pwm_frequency`: PWM frequency in Hz (0=off, 0.1-10000).

    - `pwm_duty_cycle`: PWM duty cycle in % (0-100).

    - `pulse_offset`: Offset from nominal pulse start position.

    - `pulse_cycles`: Number of cycles to be sent, 0 for infinite.


    So, for example, to send 50 pulses at 1000Hz with a 25% duty cycle using GPIO4
    you would use;

    `lgpio.tx_pwm(GPIOChip, 4, 1000, 25, pulse_cycles=50)`


    There is no need to claim the GPIO line as it is automatically claimed and set
    to output. The PWM is generated in software rather than making any use of the
    Pi''s PWM hardware. An interrupt routine is used to generate the pulses and this
    only runs while the program is running. If you try:

    `import lgpio`

    `GPIOChip = lgpio.gpiochip_open(4)`

    `lgpio.tx_pwm(GPIOChip, 4, 1000, 25, pulse_cycles=50)`


    then you won''t see any pulses output on GPIO4 as the program ends before they
    start being generated. To see the pulses you need to use:

    `import lgpio`

    `GPIOChip = lgpio.gpiochip_open(4)`

    `lgpio.tx_pwm(GPIOChip, 4, 1000, 25, pulse_cycles=50)`

    `while True:`

    `    pass`


    If you don''t specify a `pulse_cycles` then the waveform is generated until the
    program ends. You can modify the waveform being produced by simply using another
    `tx_pwm` function call.'
