  md: 'Multiple inheritance can be very complicated, confusing and error-prone, but
    there is one situation in which it is much easier, the mixin. This is just a base
    class used in multiple inheritance and has nothing new to add to the Python language
    – it is the way you think about it that is different. The normal flow of inheritance
    is that the derived class is a more elaborate version of the base class. An LED
    is a DigitalOutputDevice with some extra attributes specific to the LED object.
    It is the “is a” relationship that motivates the inheritance.


    A mixin isn''t a base class in the same sense. It is just a bundle of methods
    that you want to give a class without implying anything about a theoretical relationship.
    For example, suppose you create a Debug class complete with some useful debugging
    functions such as name() to print the name of the object, create() time of creation,
    etc. You might want to add the Debug class to a class, not because it is a type
    of Debug class, but just because the behavior added by the Debug class is useful.
    For example:


    ```

    class LED(DigitalOutputDevice,Debug):

    ```


    creates an LED class that inherits from DigitalOutputDevice in the sense that
    it “is a” DigitalOutputDevice and inherits some useful methods from the Debug
    mixin. This is a philosophical distinction, but sometimes a useful one. Notice
    that if we add Debug to DigitalOutputDevice then all of the classes that derive
    from it, LED and Buzzer in this case, also inherit Debug. A mixin works from the
    point of view of inheritance in the same way as any other class - it''s how you
    think of it that is different.


    There is one way that mixins often differ, but again it''s a convention. Mixins
    generally only have methods and not data attributes. One reason for this is that
    it means that a derived class doesn''t have to call the mixin''s __init__ method
    and so using it is simpler. However, this is a convention and if your mixin needs
    some data attributes there is no real reason to avoid them and GPIO Zero certainly
    doesn''t.


    GPIO Zero has a number of useful mixins, but they tend to be difficult to understand
    because they do sophisticated things. For example, the HoldMixin adds a set of
    methods and data attributes to implement a when_held event, for example to detect
    when a Button is held down. It can be added to any class that the concept of “holding”
    makes sense.


    # Virtual Base Classes


    If you study GPIO Zero you might be surprised at how many base classes there are.
    It almost certainly wasn''t designed like that from the start and the hierarchy
    was most probably constructed by “refactoring”, that is looking at what the classes
    were doing and taking common code to form simpler base classes. At the top of
    the class hierarchy should be the simplest class with methods that all the derived
    classes need. Some languages have the concept'
