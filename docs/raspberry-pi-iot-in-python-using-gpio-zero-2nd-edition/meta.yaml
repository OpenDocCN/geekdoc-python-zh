    本书是 *Something Completely Different* 系列的第一本，旨在解释 Python 3 在类和对象处理方法背后的深层逻辑。这个主题大致涵盖了
    Python 实现对象的所有方式。也就是说，按复杂程度排序：元类、类、对象、属性，以及 Python 用于使其运作的所有其他设施，如函数、方法和“魔术方法”。


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_257_1.png)


    ## 程序员的 Python：万物皆数据


    ISBN: 978-1871962598


    遵循 *Something Completely Different* 的理念，本书以一种独特的 Pythonic 方式处理数据。我们在 Python 中拥有的是非常可用且非常可扩展的数据对象。从被称为大数的无限精度整数，到选择列表扮演数组的角色，再到字典作为内置数据类型的可用性，Python
    拥有强大的特殊功能。完整的章节专门介绍了布尔逻辑、日期和时间、正则表达式、位操作、文件、pickle 以及使用 ctypes。


