  md: "The toggle method simply changes the LED from on to off or off to on depending\
    \ on its current state. You can use it to write the Blinky program in yet another\
    \ way:\n\n```\nfrom gpiozero import LED\nfrom time import sleep\n\nled = LED(4)\n\
    \nwhile True:\n    led.toggle()\n    sleep(1)\n    led.toggle()\n    sleep(1)\n\
    ```\n\nThere are also some useful properties. The `is_lit` property is true if\
    \ the LED is currently active and `value` sets and gets the state of the LED as\
    \ a 1 or a 0. Finally we have the `pin` property which returns the pin object\
    \ that the LED is connected to. The Pin object provides lower-level access to\
    \ the GPIO line.\n\n# Buzzer\n\nThe only other standard on/off device is the buzzer\
    \ and it goes on and off in the sense that it is driven by a single GPIO line,\
    \ just like an LED, and makes a sound when the line is high and is silent when\
    \ the line is low. It isn't capable of making different tones, it is either on\
    \ or off.\nThe exact type of buzzer is a piezoelectric buzzer which emits a single\
    \ tone and can be very loud:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_57_0.png)\n\
    \nYou don't need a current-limiting resistor as buzzers take very little current.\
    \ All you have to do is to make sure that it will operate at 3.3 volts. All you\
    \ have to do to use one is connect the negative lead to ground and the positive\
    \ lead to a GPIO line:"
