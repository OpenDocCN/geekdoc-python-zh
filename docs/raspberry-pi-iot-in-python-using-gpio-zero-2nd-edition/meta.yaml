  md: "# The Robots\n\nThe biggest of the composite classes are the five robots, all\
    \ of which inherit from Robot.\n\n# Robot\n\n```\nRobot(left=motor, right=motor,\
    \ *, pwm=True,\n      pin_factory=None)\n```\n\nThis is a class to control a two-wheeled\
    \ robot with motors specified. For example:\n`robby=Robot(left=motor(4,17),right=motor(27,22))`\n\
    creates a robot with motors connected to the specified pins via H-bridges – see\
    \ Chapter 11. You can specify a third enable pin if required. Both motors are\
    \ PWM speed controlled by default. Access to each of the motors is provided by\
    \ `left_motor` and `right_motor` and you can use the motors as standard `Motor`\
    \ objects to control the speed and direction of each wheel.\nYou can also specify\
    \ `PhaseEnableMotor` or a custom motor class.\n\nThe Robot class also has some\
    \ methods to do the job directly:\n\n+   - `backward(speed=1, **kwargs)`\n- `forward(speed=1,\
    \ **kwargs)`\n\nDrive the robot backward or forward at the set speed.\n\nYou can\
    \ also use two keyword parameters to move along curves:\n\n+   - `curve_left =c`\n\
    - `curve_right=c`\n\nwhere `c` is between 0 (no curve) and 1(maximum curve)\n\n\
    For hard turns we have:\n\n+   - `left(speed=1)`\n- `right(speed=1)`\n\nMake the\
    \ robot turn left or right by running one motor forward and the other motor backward.\n\
    \nThe final simple methods are:\n\n+   - `reverse()`\n\nReverses each motor’s\
    \ direction.\n- `stop()`\n\nStops the motors."
  merge: -1
  pgno: 189
