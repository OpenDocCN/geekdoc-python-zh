  md: '# Using the TRCT5000 Line Sensor


    The LineSensor device makes use of a module based on the TRCT5000 infrared emitter
    and sensor.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_110_0.png)


    To make this suitable for use with a GPIO line you need to add some electronics:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_110_1.png)


    The IR diode sends a beam of IR out of the device and if it is reflected back,
    the photo transistor switches on. The LM324 U1 outputs a high signal when the
    voltage from the IR sensor is greater than that set on the potentiometer, R3.
    That is, R3 acts as a sensitivity control.'
  merge: -1
  pgno: 110
- img_proc: true
  md: "You don't need to build the circuit because you can buy ready-built modules:\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_111_0.png)\n\nYou simply connect the\
    \ three pins to 3.3V, ground and a GPIO line of your choice. It is worth knowing\
    \ that some modules output high when over a white line and some go low.\n\nOnce\
    \ you have the hardware connected you can create a LineSensor using the constructor:\n\
    \n```\nLineSensor(pin, queue_len=5, sample_rate=100, threshold=0.5,\n        \
    \  partial=False, pin_factory=None)\n```\n\nYou can read the value property to\
    \ discover if the sensor is over a reflective surface or not:\n\n```\nfrom gpiozero\
    \ import LineSensor\nsensor = LineSensor(4)\nwhile True:\n    if sensor.value>0.5:\n\
    \        print('Line detected')\n    else:\n        print('No line detected')\n\
    ```\n\nYou can also use the `wait_for_line`, `wait_for_no_line`, `when_line` and\
    \ `when_no_line` events.\n\nIn practice, setting the threshold control on the\
    \ hardware is likely to be more important than tuning the software."
