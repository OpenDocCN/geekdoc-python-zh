  mdcn: "你可能在想，接下来要做的是创建一个PWMLED自定义类。好消息是，你不必这么做，因为PWMLED是GPIO Zero中的一个标准类，它与PWMOutputDevice具有完全相同的方法集。你可以毫不费力地创建一个闪烁的LED：\n\
    \n```python\nfrom gpiozero import PWMLED\npwmLED = PWMLED(4)\npwmLED.pulse(fade_in_time=1,\
