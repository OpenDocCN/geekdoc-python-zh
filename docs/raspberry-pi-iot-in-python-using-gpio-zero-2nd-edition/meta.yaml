    turn on. Don''t think of V<sub>GS(th)</sub> as the gate voltage at which the MOSFET
    turns on, but as the voltage below which it is turned off. The problem is that
    the gate voltage to turn a typical MOSFET fully on is in the region of 10V. Special
    “logic” MOSFETs need a gate voltage around 5V to fully turn on and this makes
    the 3.3V at which the Raspberry Pi''s GPIO lines work a problem. The data sheets
    usually give the fully on resistance and the minimum gate voltage that produces
    it, usually listed as Drain-Source On-State Resistance. For digital work this
    is a more important parameter than the gate threshold voltage.


    You can deal with this problem in one of two ways – ignore it or find a MOSFET
    with a very small V<sub>GS(th)</sub>. In practice, MOSFETs with thresholds low
    enough to work at 3.3V are hard to find and when you do find them they are generally
    only available as surface mount. Ignoring the problem sometimes works if you can
    tolerate the MOSFET not being fully on. If the current is kept low then, even
    though the MOSFET might have a resistance of a few Ohms, the power loss and voltage
    drop may be acceptable.


    What MOSFETs are useful for is in connecting higher voltages to a GPIO line used
    as an input, see later.


    Also notice that this discussion has been in terms of an N-channel MOSFET. A P-channel
    works in the same way, but with all polarities reversed. It is cut off when the
    gate is at the positive voltage and turns on when the gate is grounded. This is
    exactly the same as the NPN versus PNP for the BJT.'
  - '[PAGE 84]


    # MOSFET LED


    A BJT is the easiest way to drive an LED, but as an example of using a common
    MOSFET we can arrange to drive one using a 2N7000, a low-cost, N-channel device
    available in a standard TO92 form factor suitable for experimentation:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_84_0.png)


    Its data sheet states that it has a V<sub>GS(th)</sub> of typically 2V, but it
    could be as low as 0.8V or as high as 3V. Given we are trying to work with a gate
    voltage of 3.3V you can see that in the worst case this is hardly going to work
    – the device will only just turn on. The best you can do is to buy a batch of
    2N7000 and measure their V<sub>GS(th)</sub> to weed out any that are too high.
    This said, the circuit given below does generally work.


    Assuming a V<sub>GS(th)</sub> of 2V and a current of 20mA for the LED, the data
    sheet gives a rough value of 6Ω for the on resistance with a gate voltage of 3V.
    The calculation for the current-limiting resistor is the same as in the BJT case
    and the final circuit is:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_84_1.png)


    Notice that we don''t need a current-limiting resistor for the GPIO line as the
    gate connection is high impedance and doesn''t draw much current. In'
  - '[PAGE 85]


    practice, it is usually a good idea to include a current-limiting resistor in
    the GPIO line if you plan to switch it on and off rapidly. The problem is that
    the gate looks like a capacitor and fast changes in voltage can produce high currents.
    While there could be devices labeled 2N7000 that will not work in this circuit
    due to the threshold gate voltage being too high, encountering one is rare.


    A logic-level MOSFET like the IRLZ44 has a resistance of 0.028Ω at 5V compared
    to the 2N2222''s of 6Ω. It also has a V<sub>GS(th)</sub> guaranteed to be between
    1V and 2V.


    # Setting Drive Type


    The GPIO output can be configured into one of a number of modes, but the most
    important is pull-up/down. Before we get to the code to do the job, it is worth
    spending a moment explaining the three basic output modes, push-pull, pull-up
    and pull-down.


    # Push-Pull Mode


    In push-pull mode two transistors of opposite polarity, one PNP and one NPN, are
    used:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_85_0.png)


    The circuit behaves like the two-switch equivalent shown on the right. Only one
    of the transistors, or switches, is "closed" at any time. If the input is high
    then Q1 is saturated and the output is connected to ground - exactly as if S1
    was closed. If the input is low then Q2 is saturated, as if S2 was closed, and
    the output is connected to 3.3V. You can see that this pushes the output line
    high with the same "force" as it pulls it low. This is the standard configuration
    for a GPIO output.'
- md: '## Pull-Up Mode


    In pull-up mode one of the transistors is replaced by a resistor:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_86_0.png)


    In this case the circuit is equivalent to having a single switch. When the switch
    is closed, the output line is connected to ground and hence driven low. When the
    switch is open, the output line is pulled high by the resistor. You can see that
    in this case the degree of pull-down is greater than the pull-up, where the current
    is limited by the resistor. The advantage of this mode is that it can be used
    in an AND configuration. If multiple GPIO or other lines are connected to the
    output, then any one of them being low will pull the output line low. Only when
    all of them are off does the resistor succeed in pulling the line high. This is
    used, for example, in a serial bus configuration like the SPI bus.


    ## Pull-Down Mode


    Finally, pull-down mode, which is the best mode for driving general loads, motors,
    LEDs, etc, is exactly the same as pull-up only now the resistor is used to pull
    the output line low.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_86_1.png)


    The line is held high by the transistor and pulled low by the resistor only when
    all the switches are open. Putting this the other way round, the line is high
    if any one switch is closed. This is the OR version of the shared bus idea.


    ## Basic Input Circuit - The Switch


    Now it is time to turn our attention to the electrical characteristics of GPIO
    lines as inputs. One of the most common input circuits is the switch or button.
    Many beginners make the mistake of wiring a GPIO line to a switch something like:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_87_0.png)


    The problem with this is that, if the switch is pressed, the GPIO line is connected
    to ground and will read as zero. The question is, what does it read when the switch
    is open? A GPIO line configured as an input has a very high resistance. It isn''t
    connected to any particular voltage and the voltage on it varies due to the static
    it picks up. The jargon is that the unconnected line is "floating". When the switch
    is open the line is floating and, if you read it, the result, zero or one, depends
    on whatever noise it has picked up.


    The correct way to do the job is to tie the input line either high or low when
    the switch is open using a resistor. A pull-up arrangement would be something
    like:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_87_1.png)


    The value of the resistor used isn''t critical. It simply pulls the GPIO line
    high when the switch isn''t pressed. When it is pressed a current of a little
    more than 0.3mA flows in the resistor. If this is too much increase the resistance
    to 100kΩ or even more - but notice that the higher the resistor value the noisier
    the input to the GPIO and the more it is susceptible to RF interference. Notice
    that this gives a zero when the switch is pressed.


    If you want a switch that pulls the line high instead of low, reverse the logic
    by swapping the positions of the resistor and the switch in the diagram to create
    a pull-down:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_88_0.png)


    Notice that this gives a one when the switch is pressed.


    The good news is that the Raspberry Pi has built-in pull-up and pull-down resistors
    which you can enable in software. This means that you can connect a switch directly
    to the GPIO and set a pull-up or pull-down configuration in software.


    ## Setting Pull Mode


    The GPIO Zero library makes it easy to set the pull mode as the pin object supports
    a pull property. You can set this to any of up, down or floating. In output mode
    floating is push-pull mode. For example:


    ```

    pin.pull="down"

    ```


    Any device that has a pin property can have its pull mode set in the same way
    and many devices include a pull parameter in their constructor. The internal pull-up/pull-down
    resistors are in the range 50kΩ to 65kΩ. There are also external 1.8kΩ pull-ups
    on pins 3 and 5. The only way to remove them is to unsolder them from the board.


    ## Debounce


    Although the switch is the simplest input device, it is very difficult to get
    right. When a user clicks a switch of any sort, the action isn''t clean - the
    switch bounces. What this means is that the logic level on the GPIO line goes
    high then low and high again and bounces between the two until it settles down.
    There are electronic ways of debouncing switches, but software does the job much
    better. All you have to do is insert a delay of a millisecond or so after detecting
    a switch press and read the line again - if it is still low then record a switch
    press. Similarly, when the switch is released, read the state twice with a delay.
    You can vary the delay to modify the perceived characteristics of the switch.


    A more sophisticated algorithm for debouncing a switch is based on the idea of
    integration. All you have to do is read the state multiple times, every few milliseconds
    say, and keep a running sum of values. If you sum ten values each time then a
    total of between 6 and 10 can be taken as an indication that the switch is high.
    A total less than this indicates that the switch is low. You can think of this
    as a majority vote in the time period for the switch being high or low.


    GPIO Zero supports a simple debounce algorithm. After a change in the input has
    been detected, further changes are ignored for a period of time. You can set the
    debounce time using the bounce property. For example:


    ```

    pin.bounce=5/1000

    ```


    sets the bounce time to 5ms which is a reasonable choice for many devices. Notice
    that this means that the bounced switch can only be pressed and released 100 times
    a second. Input devices also often have bounce parameters that can be set in their
    constructors.


    ## The Potential Divider


    If you have an input that is outside of the range of 0V to 3.3V you can reduce
    it using a simple potential divider. In the diagram V is the input from the external
    logic and Vout is the connection to the GPIO input line:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_89_0.png)


    Vout = V R2/(R1+R2)


    You can spend a lot of time working out good values of R1 and R2. For loads that
    take a lot of current you need R1+R2 to be small and divided in the same ratio
    as the voltages. For example, for a 5V device R1=18 or 20KΩ and R2=33KΩ work well
    to drop the voltage to 3.3V.


    A simpler approach that works for a 5V signal is to notice that the ratio R1:R2
    has to be the same as (5-3.3):3.3, i.e. the voltage divides itself across the
    resistors in proportion to their value, which is roughly 1:2. What this means
    is that you can take any resistor and use it for R1 and use two of the same value
    in series for R2 and the Vout will be 3.33333V.


    The problem with a resistive divider is that it can round off fast pulses due
    to the small capacitive effects. This usually isn''t a problem, but if it is then
    the solution is to use a FET or a BJT as an active buffer:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_90_0.png)


    Notice that this is an inverting buffer, the output is low when the input is high,
    but you can usually ignore this and simply correct it in software, i.e. read a
    1 as a low state and a 0 as a high state. The role of R1 is to make sure the FET
    is off when the 5V signal is absent and R2 limits the current in the FET to about
    0.3mA.


    In most cases you should try the simple voltage divider and only move to an active
    buffer if it doesn''t work.


    This very basic look at electronics isn''t all that you need to know, but it is
    enough for you to see some of the problems and find some answers. In general,
    this sort of electronics is all about making sure that voltages and currents are
    within limits. As switching speeds increase you have additional problems, which
    are mainly concerned with making sure that your circuits aren''t slowing things
    down. This is where things get more subtle.


    ## Summary


    - You can get a long way with only a small understanding of electronics, but you
    do need to know enough to protect the Pi and things you connect to it.

    - The maximum current from any GPIO line should be less than 16mA and the total
    current should be less than 50mA.

    - All of the GPIO lines work at 3.3V and you should avoid directly connecting
    any other voltage.

    - You can drive an LED directly from a GPIO line, but only at 16mA rather than
    the nominal 20mA needed for full brightness.

    - Calculating a current-limiting resistor always follows the same steps – find
    out the current in the device, find out the voltage across the device, and work
    out the resistor that supplies that current when the remainder of the voltage
    is applied to it.

    - For any load you connect to a GPIO output you generally need a current-limiting
    resistor.

    - In many cases you need a transistor, a BJT, to increase the current supplied
    by the GPIO line.

    - To use a BJT you need to calculate a current-limiting resistor in the base and,
    generally, one in the collector.

    - MOSFETs are popular alternatives to BJTs, but it is difficult to find a MOSFET
    that works reliably at 3.3V.

    - GPIO output lines can be set to active push-pull mode, where a transistor is
    used to pull the line high or low, or passive pull-up or pull-down mode, where
    one transistor is used and a resistor pulls the line high or low when the transistor
    is inactive.

    - GPIO lines have built-in pull-up and pull-down resistors which can be selected
    or disabled under software control and can be used in input mode.

    - When used as inputs, GPIO lines have a very high resistance and in most cases
    you need pull-up or pull-down resistors to stop the line floating.

    - The built-in pull-up or pull-down resistors can be used in input mode.

    - Mechanical input devices have to be debounced to stop spurious input.

    - If you need to connect an input to something bigger than 3.3V, you need a potential
    divider to reduce the voltage back to 3.3V. You can also use a transistor.'
  mdcn: '## 上拉模式


    在上拉模式下，其中一个晶体管被电阻替代：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_86_0.png)


    在这种情况下，电路等效于一个单开关。当开关闭合时，输出线连接到地，因此被拉低。当开关断开时，输出线被电阻拉高。你可以看到，在这种情况下，下拉的程度大于上拉，因为电流受到电阻的限制。这种模式的优点是可以用于与门配置。如果多个GPIO或其他线连接到输出，那么其中任何一个为低电平都会将输出线拉低。只有当所有开关都断开时，电阻才能成功将线拉高。例如，这在SPI总线等串行总线配置中使用。


    ## 下拉模式


    最后，下拉模式是驱动通用负载、电机、LED等的最佳模式，它与上拉模式完全相同，只是现在电阻用于将输出线拉低。


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_86_1.png)


    该线由晶体管保持高电平，只有当所有开关都断开时才被电阻拉低。换句话说，如果任何一个开关闭合，该线就是高电平。这是共享总线思想的或门版本。


    ## 基本输入电路 - 开关


    现在是时候关注GPIO线作为输入的电气特性了。最常见的输入电路之一是开关或按钮。许多初犯的错误是将GPIO线连接到开关，如下所示：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_87_0.png)


    这样做的问题是，如果开关闭合，GPIO线连接到地，读数为零。问题是，当开关断开时，它读数是多少？配置为输入的GPIO线具有非常高的电阻。它不连接到任何特定电压，其上的电压由于拾取的静电而变化。行话是未连接的线是“浮空的”。当开关断开时，线是浮空的，如果你读取它，结果（零或一）取决于它拾取的任何噪声。


    正确的方法是使用电阻在开关断开时将输入线拉高或拉低。上拉配置如下所示：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_87_1.png)


    所用电阻的值并不关键。它只是在开关未按下时将GPIO线拉高。当按下时，电阻中流过略高于0.3mA的电流。如果这太多，将电阻增加到100kΩ甚至更多——但要注意，电阻值越高，GPIO的输入噪声越大，越容易受到射频干扰。注意，这会在开关闭合时给出零。


    如果你想让开关将线拉高而不是拉低，请通过交换图中电阻和开关的位置来反转逻辑，创建一个下拉：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_88_0.png)


    注意，这会在开关闭合时给出一。


    好消息是，树莓派具有内置的上拉和下拉电阻，你可以在软件中启用它们。这意味着你可以直接将开关连接到GPIO，并在软件中设置上拉或下拉配置。


    ## 设置上拉/下拉模式


    GPIO Zero库使得设置上拉/下拉模式变得容易，因为引脚对象支持`pull`属性。你可以将其设置为`up`、`down`或`floating`中的任何一个。在输出模式下，`floating`是推挽模式。例如：


    ```

    pin.pull="down"

    ```


    任何具有`pin`属性的设备都可以用同样的方式设置其上拉/下拉模式，许多设备在其构造函数中包含一个`pull`参数。内部上拉/下拉电阻在50kΩ到65kΩ范围内。引脚3和5上还有外部1.8kΩ上拉电阻。移除它们的唯一方法是从板上焊下来。


    ## 去抖


    虽然开关是最简单的输入设备，但要正确使用它非常困难。当用户点击任何类型的开关时，动作并不干净——开关会抖动。这意味着GPIO线上的逻辑电平先变高，然后变低，再变高，并在两者之间弹跳，直到稳定下来。有电子方法可以对开关去抖，但软件做得更好。你所要做的就是在检测到开关按下后插入大约一毫秒的延迟，然后再次读取该线——如果它仍然是低电平，则记录一次开关按下。同样，当开关释放时，延迟后读取两次状态。你可以改变延迟来修改开关的感知特性。


    一种更复杂的开关去抖算法基于积分的思想。你所要做的就是多次读取状态，比如每隔几毫秒，并保持一个运行的值总和。如果你每次对十个值求和，那么6到10之间的总和可以被视为开关为高电平的指示。小于此值的总和表示开关为低电平。你可以将其视为在时间段内对开关是高电平还是低电平的多数投票。


    GPIO Zero支持一个简单的去抖算法。在检测到输入变化后，一段时间内的进一步变化将被忽略。你可以使用`bounce`属性设置去抖时间。例如：


    ```

    pin.bounce=5/1000

    ```


    将抖动时间设置为5毫秒，这对于许多设备来说是一个合理的选择。注意，这意味着抖动的开关每秒只能按下和释放100次。输入设备通常也有可以在其构造函数中设置的`bounce`参数。


    ## 分压器


    如果你有一个超出0V到3.3V范围的输入，你可以使用一个简单的分压器来降低它。在图中，V是来自外部逻辑的输入，Vout是连接到GPIO输入线的输出：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_89_0.png)


    Vout = V R2/(R1+R2)


    你可以花很多时间计算R1和R2的良好值。对于消耗大量电流的负载，你需要R1+R2很小，并且按照与电压相同的比例分配。例如，对于5V设备，R1=18或20KΩ和R2=33KΩ可以很好地将电压降低到3.3V。


    对于5V信号，一个更简单的方法是注意到R1:R2的比例必须与(5-3.3):3.3相同，即电压按电阻值的比例分配，大约是1:2。这意味着你可以取任何电阻作为R1，并使用两个相同值的电阻串联作为R2，Vout将是3.33333V。


    电阻分压器的问题是，由于小的电容效应，它可能会使快速脉冲变圆。这通常不是问题，但如果是，解决方案是使用FET或BJT作为有源缓冲器：


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_90_0.png)


    注意，这是一个反相缓冲器，当输入为高电平时输出为低电平，但你通常可以忽略这一点，只需在软件中纠正它，即读取1作为低电平状态，0作为高电平状态。R1的作用是确保在5V信号不存在时FET关闭，R2将FET中的电流限制在约0.3mA。


    在大多数情况下，你应该尝试简单的分压器，只有在它不起作用时才转向有源缓冲器。


    这种非常基础的电子学知识并不是你需要知道的全部，但它足以让你看到一些问题并找到一些答案。总的来说，这种电子学都是关于确保电压和电流在限制范围内。随着开关速度的增加，你会遇到额外的问题，主要是确保你的电路不会拖慢速度。这就是事情变得更加微妙的地方。


    ## 总结


    -   你只需要对电子学有很少的了解就能取得很大进展，但你确实需要知道足够的知识来保护树莓派和你连接到它的东西。

    -   任何GPIO线的最大电流应小于16mA，总电流应小于50mA。

    -   所有GPIO线都在3.3V下工作，你应该避免直接连接任何其他电压。

    -   你可以直接从GPIO线驱动LED，但只能在16mA下，而不是全亮度所需的标称20mA。

    -   计算限流电阻总是遵循相同的步骤——找出设备中的电流，找出设备两端的电压，并计算出当剩余电压施加在其上时提供该电流的电阻。

    -   对于你连接到GPIO输出的任何负载，通常需要一个限流电阻。

    -   在许多情况下，你需要一个晶体管（BJT）来增加GPIO线提供的电流。

    -   要使用BJT，你需要在基极计算一个限流电阻，通常在集电极也需要一个。

    -   MOSFET是BJT的流行替代品，但很难找到在3.3V下可靠工作的MOSFET。

    -   GPIO输出线可以设置为有源推挽模式（使用晶体管将线拉高或拉低）或无源上拉或下拉模式（使用一个晶体管，当晶体管不活动时，电阻将线拉高或拉低）。

    -   GPIO线具有内置的上拉和下拉电阻，可以在软件控制下选择或禁用，并可用于输入模式。

    -   用作输入时，GPIO线具有非常高的电阻，在大多数情况下你需要上拉或下拉电阻来防止线浮空。

    -   内置的上拉或下拉电阻可用于输入模式。

    -   机械输入设备必须去抖以防止虚假输入。

    -   如果你需要将输入连接到大于3.3V的东西，你需要一个分压器将电压降低回3.3V。你也可以使用晶体管。'
