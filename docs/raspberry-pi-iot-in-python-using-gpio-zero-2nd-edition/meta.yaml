    where the pulse on and off times are in microseconds. For example:\n\n```\nlgpio.tx_pulse(GPIOChip,4,pulse_on=100,pulse_off=100)\n\
    ```\n\ngenerates a pulse train at 5kHz with a 50% duty cycle. This uses the same\
