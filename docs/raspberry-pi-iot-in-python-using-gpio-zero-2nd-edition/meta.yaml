    \    def __init__(self, A=None, Am=None, B=None, Bm=None):\n        if not all(p\
    \ is not None for p in [A, Am, B, Bm]):\n            raise GPIOPinMissing(\n \
    \               'Four GPIO pins must be provided'\n            )\n        super(StepperUni4,\
