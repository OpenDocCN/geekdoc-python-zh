    \ PWMLED(green), PWMLED(blue))`\nThe modified methods then work with this tuple\
    \ of LED devices.\n\n## Tonal Buzzer\n\nWhat if you want to produce not exactly\
    \ music, but a tone at least. We have already looked at Buzzer back in Chapter\
    \ 5. It is a simple on/off device – it either buzzes or it doesn’t – and you can’t\
