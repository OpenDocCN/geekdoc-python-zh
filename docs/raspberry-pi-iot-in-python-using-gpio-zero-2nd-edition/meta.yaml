  - "[PAGE 209]\n\nCreate an instance of the SPI Device:\nDev=SPIDevice()\n\nNext\
    \ send some data and receive it right back:\nwords=Dev._spi.transfer([0xAA])\n\
    \nThe hex value AA is useful in testing because it generates the bit sequence\
    \ 10101010, which is easy to see on a logic analyzer.\n\nCheck that the received\
    \ data matches the sent data:\nif words[0]==0xAA:\n    print(\"data received correctly\"\
    )\n\nFinally, close the SPI Device:\nDev.close()\n\nPutting all of this together\
    \ gives us the complete program:\n\n```\nfrom gpiozero import SPIDevice\n\nDev=SPIDevice()\n\
    words=Dev._spi.transfer([0xAA])\nif words[0]==0xAA:\n    print(\"data received\
    \ correctly\")\nDev.close()\n```\n\nIf you run the program and don't get the \"\
    data received correctly\" message then the most likely reason is that you have\
    \ connected the wrong two pins together or not connected them at all.\n\n# Configuring\
    \ the SPI\n\nThere are a set of properties that allow you to configure the SPI\
    \ interface. The reason you need to know how to change the default configuration\
    \ is that not all SPI devices conform to the default.\n\nThere are four modes\
    \ which define the relationship between the data timing and the clock pulse. The\
    \ clock can be either active high or low, which is referred to as clock polarity\
    \ (CPOL) and data can be sampled on the rising or falling edge of the clock, which\
    \ is clock phase (CPHA)."
  - '[PAGE 210]


    All combinations of these two possibilities gives the four modes:


    | SPI Mode* | Clock Polarity CPOL | Clock Edge CPHA | Characteristics |

    | :---: | :---: | :---: | :--- |

    | 0 | 0 | 0 | Clock active high data output on falling edge and sampled on rising
    |

    | 1 | 0 | 1 | Clock active high data output on rising edge and sampled on falling
    |

    | 2 | 1 | 0 | Clock active low data output on falling edge and sampled on rising
    |

    | 3 | 1 | 1 | Clock active low data output on rising edge and sampled on falling
    |


    *The way that the SPI modes are labeled is common but not universal.


    There is often a problem trying to work out what mode a slave device uses. The
    clock polarity is usually easy and the clock phase can sometimes be worked out
    from the data transfer timing diagrams and:


    +   - First clock transition in the middle of a data bit means CPHA=0

    - First clock transition at the start of a data bit means CPHA=1


    You can set the clock mode using:


    ```

    clock_polarity=True or False

    clock_phase=True or False

    ```


    or you can set both using


    ```

    clock_mode= 0, 1, 2 or 3

    ```


    You can also set:


    ```

    lsb_first=True or False

    ```


    but the Pi''s SPI hardware ignores this. To set the sense of the chip select to
    high or low to select, use:


    ```

    select_high=True or False

    ```


    Finally, you can set:


    ```

    bits_per_word=n

    ```


    but again the Pi''s SPI hardware defaults to 8 and cannot be changed.'
  - '[PAGE 211]


    There is one last configuration option which is well hidden and only available
    on the hardware SPI interface:

    `_interface.maxspeed_hz=f`

    where f is the frequency in Hertz. The default is 500000, i.e. 500kHz, and you
    can set it to higher frequencies, but these are not guaranteed. On a Pi 4 you
    can get up to 8MHz, but this doesn''t mean that the device connected to the bus
    will work at this speed.


    # Loopback Revisited


    Now that we know how the SPI interface works and how to configure it, we can return
    to the loopback example, include configuration and examine its output.


    Configuring the SPI interface to clock mode 0, select active low and a clock of
    7kHz:


    `from gpiozero import SPIDevice`


    `Dev=SPIDevice()`


    `Dev.clock_mode=0`

    `Dev.select_high=False`

    `Dev._spi._interface.max_speed_hz=7000`


    `words=Dev._spi.transfer([0xAA])`

    `if words[0]==0xAA:`

    `    print("data received correctly")`


    If you connect a logic analyzer to the four pins involved – 19, 21, 23 and 24
    - you will see the data transfer:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_211_0.png)'
  - '[PAGE 212]


    If you look carefully, you will see the CS0 line go low before the master places
    the first data bit on the MOSI and hence on the MISO lines. The documentation
    states that the CS line is held for at least three core clock cycles before transfer
    starts and held for at least one clock cycle when the transfer is complete. Notice
    that the clock rises in the middle of each data bit, making this a mode 0 transfer.
    You can also see that the clock is measured to be 7.6kHz on a Pi 4, which is the
    closest supported frequency to 7kHz.


    # Implementing the MCP3008


    As an example we can re-implement the MCP3008 SPI interface from first principles.
    The clock rate needs to be reasonably fast, but not so fast that the data starts
    to corrupt. A clock rate of 60kHz seems reasonable. From the data sheet, the chip
    select has to be active low and data is sent most significant bit first by default
    for both the master and the slave. The only puzzle is what mode to use? This is
    listed in the data sheet and it can be mode 0 with clock active high or mode 3
    with clock active low.


    We now have enough information to initialize the slave:


    ```

    Dev=SPIDevice()


    Dev.clock_mode= 0

    Dev.select_high=False

    Dev._spi._interface.max_speed_hz=60000

    ```


    Now we have the SPI initialized and ready to transfer data, but what data do we
    transfer? The SPI bus doesn''t have any standard commands or addressing structure.
    Each device responds to data sent in different ways and sends data back in different
    ways. You simply have to read the data sheet to find out what the commands and
    responses are.


    Reading the data sheet might be initially confusing because it says that what
    you have to do is send five bits to the slave - a start bit; a bit that selects
    its operating mode to single or differential; and a 3-bit channel number. The
    operating mode is 1 for single-ended and 0 for differential.


    So to read Channel 3, i.e. 011, in single-ended mode you would send the slave:


    ```

    11011xxx

    ```


    where xxx means don''t care. The response from the slave is that it holds its
    output in a high impedance state until the sixth clock pulse. It then sends a
    zero bit on the seventh followed by bit 9 of the data on clock eight.


    That is, the slave sends back:


    ```

    xxxxxx0b9

    ```


    where x means indeterminate. The remaining 9 bits are sent back in response to
    the next nine clock pulses. This means you have to transfer'
  - '[PAGE 213]


    three bytes to get all ten bits of data. This all makes reading the data in 8-bit
    chunks confusing.

    The data sheet suggests a different way of doing the job that delivers the data
    more neatly packed into three bytes. It suggests sending a single byte:

    00000001

    The slave transfers random data at the same time, which is ignored. The final
    1 is treated as the start bit. If you now transfer a second byte, with most significant
    bit indicating single or differential mode, then a 3-bit channel address and the
    remaining bits set to 0, the slave will respond with the null and the top two
    bits of the conversion. Now all you have to do to get the final eight bits of
    data is to read a third byte:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_213_0.png)


    This way you get two neat bytes containing the data with all the low order bits
    in their correct positions.

    Using this information we can now write some instructions that read a given channel.
    For example, to read Channel 0 we first send a byte set to 0x01 as the start bit
    and ignore the byte the slave transfers. Next we send 0x80 to select single-ended
    and channel zero and keep the byte the slave sends back as the high order two
    bits. Finally, we send a zero byte so that we get the low order bits from the
    slave:


    ```

    words=Dev._spi.transfer([0x01, 0x80, 0x00])

    ```


    Notice you cannot send the three bytes one at a time using transfer because that
    results in the CS line being deactivated between the transfer of each byte.

    To get the data out of the words list we need to do some bit manipulation:


    ```

    data = (words[1] & 0x03) << 8 | words[2];

    ```


    The first part of the expression extracts the low three bits from the first byte
    the slave sent and as these are the most significant bits they are shifted up
    eight places. The rest of the bits are then ORed with them to give the full 10-bit
    result. To convert to volts we use:


    ```

    volts = data * 3.3 / 1023.0

    ```


    assuming that VREF is 3.3V.'
- md: "If you connect a logic analyzer to the SPI bus you will see something like:\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_214_0.png)\n\nYou can see the commands\
    \ and the response, this case a reading of 3.3V.\nThe complete program is:\n\n\
    ```python\nfrom gpiozero import SPIDevice\nDev=SPIDevice()\nDev.clock_mode= 0\n\
    Dev.select_high=False\nDev._spi._interface.max_speed_hz=60000\n\nwords=Dev._spi.transfer([0x01,\
    \ 0x80, 0x00])\ndata =  (words[1] & 0x03) << 8 |  words[2];\nvolts =  data * 3.3\
    \ / 1023.0\nprint(volts)\nDev.close()\n```\n\n## A Custom SPI Device – DS3234\
    \ Clock\n\nImplementing the MCP3008 is instructive but, given there is already\
    \ a class that will do the job, not particularly useful. Writing a class for a\
    \ new SPI device is instructive and practical. The DS3234 RTC (Real Time Clock)\
    \ is accurate and includes a battery backup that can keep it running for years.\
    \ It is available from a number of sources in slightly different forms:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_214_1.png)\n\
    \nThey share the same pinouts:\n\n| Label | Description |\n|---|---|\n| GND |\
    \ Ground (0V) supply |\n| VCC | DS3234 VCC (3.3V) power supply input |\n| SQW\
    \ | Configurable square-wave output<br>Alarm 1 and/or Alarm 2 interrupt output\
    \ |\n| CLK | SPI clock input |\n| MISO | SPI master in, slave out |\n| MOSI |\
    \ SPI master out, slave in |\n| SS | SPI active-low chip select CS0 |\n\nYou will\
    \ recognize these as the standard SPI interface pins with the addition of SQW.\
    \ This can be used to generate a square wave signal at a set frequency from 1Hz\
    \ to 192kHz or it can be used as outputs of either of the two alarm timers. In\
    \ this example we won't use SQW and it can be left unconnected.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_215_0.png)\n\
    \nOnce you have this connected, you can start to write the software. Notice that\
    \ you don't need to use a backup battery, but if you don't then the device will\
    \ lose its time setting each time you switch it off. With a battery it will keep\
    \ time for years.\n\nTo find out how to talk to the device, we need to consult\
    \ its datasheet. This lists all of the registers that you can read and write and\
    \ there are quite a few and it all looks complicated. If we are only interested\
    \ in the date and time, then only the first seven are relevant:\n\n| Address read/write\
    \ | MSB bit7 | Bit 6 | Bit 5 | Bit 4 | Bit 3 | Bit 2 | Bit 1 | LSB Bit 0 | Function\
    \ | Range |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\
    \ :--- | :--- |\n| 0x00 | 0x80 | 0 | Seconds x 10 | | Seconds | | | | Seconds\
    \ | 00-59 |\n| 0x01 | 0x81 | 0 | Minutes x 10 | | Minutes | | | | Minutes | 00-59\
    \ |\n| 0x02 | 0x82 | 0 | 12/24 | AM/PM or Hours x10 | Hours | | | | Hours | 1-12\
    \ +AM/PM 00-23 |\n| 0x03 | 0x83 | 0 | 0 | 0 | 0 | 0 | Day | | Day | 1-7 |\n| 0x04\
    \ | 0x84 | 0 | Date x 10 | | Date | | | | Date | 01-31 |\n| 0x05 | 0x85 | Century\
    \ | 0 | 0 | Month x 10 | Month | | | Month | 01-12 |\n| 0x06 | 0x86 | 0 | Year\
    \ x10 | | Year | | | | Year | 00-99 |\n\nYou can see that the addresses are sequential\
    \ - 0x00 to 0x06 for reading and 0x80 to 0x86 for writing. The data is packed\
    \ into each byte using BCD, Binary Coded Decimal. This codes each decimal digit\
    \ as a four-bit binary value. For example, the month 12 would be coded in BCD\
    \ as 0001 and 0010, i.e. 1 and 2 in binary. The value 59 would be coded as 0101\
    \ for 5 and 1001 for 9. In a simple system, a single byte would always hold two\
    \ BCD digits. However, if the range of possible values is limited, some bits are\
    \ always zero and can be reused for something else. For example, the month register\
    \ only has to store from 01 to 12 and this means we only need one bit for the\
    \ tens digit and four for the units digit – and you can see that this is the case\
    \ in the table. This allows us to use bit 7 as a century indicator. The way this\
    \ works can be confusing as in some implementations bit 7 == 0, meaning 1900,\
    \ and in others bit 7 == 1 meaning 2000. This isn't necessary as all the century\
    \ bit does is increment when a century boundary is crossed. What this means is\
    \ that we can leave it at 0, to mean 2000, and wait for it to increment to indicate\
    \ that we have reached 2100.\n\nThe only slightly complicated part is specifying\
    \ the use of a 12- or 24-hour clock in the Hours register. If you set the bit\
    \ 6 to a 1 then you are selecting a 12-hour clock and you only need five bits\
    \ to represent the number, i.e. from 0 0000 for 0 hours to 1 0010 for 12 hours.\
    \ This lets you use bit 5 as an AM/PM indicator. On the other hand, if you set\
    \ bit 6 to 0 then you need an extra bit because now hours range from 00 0000 for\
    \ 0 hours to 10 0100 for 24 hours. The simplest thing to do is work with a 24-hour\
    \ clock then you can simply read the register as a simple BCD coding of the two\
    \ digits that give the hour.\n\nWe are almost ready to start coding. The only\
    \ additional information we need is what clock mode to use. This is surprisingly\
    \ difficult to discover from the datasheet and you have to look at the timing\
    \ diagrams to work it out. It turns out that the device will work in mode 1 or\
    \ mode 3. It is also worth knowing that if you get this wrong, the device will\
    \ not respond and it will look as if you have a dead component.\n\n## The Software\n\
    \nWhen implementing this sort of software you generally start out with the simplest\
    \ functions that initialize and read and write the registers. Once you have something\
    \ that works you move on to refactor this into a suitable class. This is what\
    \ happened in this case, but I'm only going to present the final, slightly polished,\
    \ class.\n\nFirst we need to initialize the SPI bus correctly:\n\n```python\n\
    class DS3234rtc(SPIDevice):\n    def __init__(self):\n        super(DS3234rtc,\
    \ self).__init__()\n        self.clock_mode=1\n        self.select_high=False\n\
    \        self._spi._interface.max_speed_hz=5000000\n```\n\nNotice that if you\
    \ are using software SPI, you need to reduce the frequency of the clock.\n\nNext\
    \ we need a method to set each register of the clock device to the current time.\
    \ Python has a datetime class that will store a complete date and time and can\
    \ be used to get the current date/time. It has nearly all the information we need\
    \ to set the DS3234, but in the wrong format. The idea is to use the datetime\
    \ class to construct a tuple which has the information in the same order as the\
    \ registers:\n\n(seconds,minutes,hours,day,date, month,year)\n\nThe Python datetime\
    \ object has all of these except for day so we have to add it to the tuple.\n\n\
    First we convert the datetime object to a tuple:\n\n```python\ndatetimetuple=dateTime.timetuple()\n\
    ```\n\nThis gives us a tuple in the following format:\n\n(year,month,date,hours,minutes,seconds)\n\
    \nWe can add the day using the isoweekday method and we also need to change the\
    \ year date to just the last two digits, i.e. subtract 2000:\n\n```python\ndatetimetuple=(datetimetuple[0]-2000,)+datetimetuple[1:3]+\n\
    \               (dateTime.isoweekday(),)+datetimetuple[3:6]\n```\n\nNow we have\
    \ a tuple that contains all the data, but in reverse order. The solution is to\
    \ reverse it:\n\n```python\ndatetimetuple=datetimetuple[::-1]\n```\n\nWith the\
    \ data in the right format we can now write it to the device:\n\n```python\nfor\
    \ i in range(0,7):\n    data=datetimetuple[i]\n    data=(data//10)<<4 |(data%10)\n\
    \    words=self._spi.transfer([0x80+i,data])\n```\n\nThe only complicated part\
    \ is the instruction:\n\n```python\ndata=(data//10)<<4 |(data%10)\n```\n\nwhich\
    \ performs binary to BCD conversion. The easiest way to understand this is via\
    \ an example. If data is 59 then integer division by ten, i.e. data//10, gives\
    \ 5 or 0101 in binary. A left shift by four, i.e. <<4, gives 01010000. The remainder\
    \ on division by 10, i.e. data%10, gives 9 or 1001 and OR-ing this with the previous\
    \ result gives 01011001, which is the BCD representation of 59, i.e. binary 5\
    \ in the high four bits and binary 9 in the low order bits.\n\nWe also need a\
    \ method to read the data back from the device and this uses the same techniques\
    \ to convert the BCD to binary and then construct a List with everything in the\
    \ correct order. The List is then used to create a datetime object:\n\n```python\n\
    def getDateTime(self):\n    datetimelist=[]\n    for i in range(7):\n        words=self._spi.transfer([i,0x00])\n\
    \        if i==3:continue\n        byte=words[1]\n        data=(byte & 0x0F)+(byte>>4)*10\n\
    \        datetimelist.insert(0,data)\n    datetimelist[0]+=2000\n    return datetime(*datetimelist)\n\
    ```\n\nThe if statement omits the day register from the List as it isn't used\
    \ in a datetime object. The List is constructed by inserting each item at its\
    \ start, automatically producing it in the reverse order."
  mdcn: "如果你将逻辑分析仪连接到SPI总线上，你会看到类似这样的波形：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_214_0.png)\n\
    \n你可以看到命令和响应，在这个例子中是读取到3.3V电压。\n完整的程序如下：\n\n```python\nfrom gpiozero import SPIDevice\n\
    Dev=SPIDevice()\nDev.clock_mode= 0\nDev.select_high=False\nDev._spi._interface.max_speed_hz=60000\n\
    \nwords=Dev._spi.transfer([0x01, 0x80, 0x00])\ndata =  (words[1] & 0x03) << 8\
    \ |  words[2];\nvolts =  data * 3.3 / 1023.0\nprint(volts)\nDev.close()\n```\n\
    \n## 一个自定义SPI设备——DS3234时钟\n\n实现MCP3008很有启发性，但鉴于已有现成的类可以完成此任务，其实用性并不特别强。为新的SPI设备编写一个类则既具启发性又实用。DS3234\
    \ RTC（实时时钟）精度高，并包含一个备用电池，可使其持续运行数年。它有多种略有不同的形式可供选择：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_214_1.png)\n\
    \n它们共享相同的引脚排列：\n\n| 标签 | 描述 |\n|---|---|\n| GND | 接地（0V）电源 |\n| VCC | DS3234 VCC（3.3V）电源输入\
    \ |\n| SQW | 可配置方波输出<br>闹钟1和/或闹钟2中断输出 |\n| CLK | SPI时钟输入 |\n| MISO | SPI主设备输入，从设备输出\
    \ |\n| MOSI | SPI主设备输出，从设备输入 |\n| SS | SPI低电平有效片选 CS0 |\n\n你会认出这些是标准的SPI接口引脚，外加一个SQW引脚。该引脚可用于生成频率从1Hz到192kHz的方波信号，也可用作两个闹钟定时器的输出。在本例中，我们将不使用SQW，可以将其保持未连接状态。\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_215_0.png)\n\n连接好后，你就可以开始编写软件了。请注意，你不需要使用备用电池，但如果不使用，每次关闭设备时它都会丢失时间设置。有了电池，它可以保持时间数年。\n\
    \n要了解如何与设备通信，我们需要查阅其数据手册。手册列出了所有可读写的寄存器，数量相当多，看起来很复杂。如果我们只关心日期和时间，那么只有前七个寄存器是相关的：\n\
    \n| 读/写地址 | MSB bit7 | Bit 6 | Bit 5 | Bit 4 | Bit 3 | Bit 2 | Bit 1 | LSB Bit\
    \ 0 | 功能 | 范围 |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :---\
    \ | :--- | :--- |\n| 0x00 | 0x80 | 0 | 秒 x 10 | | 秒 | | | | 秒 | 00-59 |\n| 0x01\
