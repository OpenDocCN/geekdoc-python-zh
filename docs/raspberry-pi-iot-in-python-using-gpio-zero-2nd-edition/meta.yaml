  - '[PAGE 150]


    Higher quality brushed motors are available and they also come in a variety of
    form factors. For example, the 775 motor measures 66.7mm by 42mm overall with
    a 5mm shaft:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_150_0.png)


    Even these motors tend not to have user serviceable brushes, but they generally
    last a long time due to better construction.


    # Unidirectional Brushed Motor


    A brushed motor can be powered by simply connecting it to a DC supply. Reversing
    the DC supply reverses the direction of the motor. The speed is simply proportional
    to the applied voltage. If all you want is a unidirectional control then all you
    need is a PWM driver that can supply the necessary current and voltage.


    A single transistor solution is workable as long as you include a diode to allow
    the energy stored in the windings to discharge when the motor is rotating, but
    not under power:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_150_1.png)'
  - '[PAGE 151]


    This circuit is simple and will work with motor voltages up to 40V and motor currents
    up to 5A continuous, 8A peak. The only small point to note is that the TIP120
    is a Darlington pair, i.e. it is two transistors in the same case, and as such
    the base voltage drop is twice the usual 0.6V, i.e. 1.2V, and this has to be taken
    into account when calculating the current-limiting resistor.


    It is sometimes said that the TIP120 and similar are inefficient power controllers
    because, comprising two transistors, they have twice the emitter collector voltage
    you would expect, which means they dissipate more power than necessary. If you
    are running a motor from a battery you might want to use a MOSFET, but as described
    earlier 3.3V is low to switch a MOSFET on and off. One solution is to use a BJT
    to increase the voltage applied to the gate:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_151_0.png)


    The BJT connects the gate to 12V. As the IRFZ44NPBF has a threshold voltage between
    2V and 4V devices should work at 5V and sometimes at 3.3V without the help of
    the BJT, but providing 12V ensures that the MOSFET is fully on. One problem with
    the circuit is that the use of the BJT inverts the signal. When the GPIO line
    is high the BJT is on and the MOSFET is off and vice versa. In other words, GPIO
    line high switches the motor off and low switches it on. This MOSFET can work
    with voltages up to 50V and currents of 40A. The 2N2222 can only work at 30V,
    or 40V in the case of the 2N2222A.'
  - "[PAGE 152]\n\nA third approach to controlling a unidirectional motor is to use\
    \ half an H-bridge. Why this is so-called, and why you might want to do it, will\
    \ become apparent in the next section on bidirectional motors. Half an H-bridge\
    \ makes use of two complementary devices, either an NPN and a PNP BJT or an N-\
    \ and P-type MOSFET. For example:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_152_0.png)\n\
    \nIf the GPIO line is high then Q1 is on and Q2 off and the motor runs. If the\
    \ GPIO line is low then Q1 is off and Q2 is on and the motor is braked – it has\
    \ a resistance to rotating because of the back EMF generated when the rotor turns.\
    \ You probably need a BJT to feed the MOSFETs as selected.\nThere is no GPIO Zero\
    \ class to control a unidirectional motor, but it is easy to create one from PWMOutputDevice:\n\
    \n```\npython\nclass uniMotor(PWMOutputDevice):\n    def __init__(self, pin=None,\
    \ active_high=True,\n                 initial_value=0,pin_factory=None):\n   \
    \     super(uniMotor, self).__init__(\n            pin, active_high, initial_value,\n\
    \            pin_factory=pin_factory\n        )\n    def speed(self,value):\n\
    \        self._write(value)\n\nmotor=uniMotor(4)\nmotor.speed(0.5)\nsleep(10)\n\
    ```\n\nWe have simply added a speed method. The inherited methods on and off are\
    \ still useful, but it might be better to block access to pulse and blink. Also\
    \ notice that if you are using the transistor/MOSFET driver, then setting active_high=False\
    \ solves the need to provide an inverted pulse."
  - '[PAGE 153]


    # Bidirectional Brushed Motor


    If you want bidirectional control then you need to use an H-bridge:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_153_0.png)


    It is easy to see how this works. If Q1 and Q4 are the only MOSFETs on the motor,
    + is connected to 12V and – to ground. The motor runs in the forward direction.
    If Q2 and Q3 are the only MOSFETs on the motor, + is connected to ground and –
    is connected to 12V. The motor runs in the reverse direction. Of course, if none
    or any one is on the motor is off. If Q1 and Q3, or Q2 and Q4, are on then the
    motor is braked as its windings are shorted out and the back EMF acts as a brake.


    You can arrange to drive the four MOSFETs using four GPIO lines - just make sure
    that they switch on and off in the correct order. Alternatively, you can add a
    NOT gate to each pair so that you switch Q1/Q2 and Q3/ Q4 to opposite states.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_153_1.png)'
  - '[PAGE 154]


    An alternative design is to use complementary MOSFETs:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_154_0.png)


    In this configuration, the first GPIO line drives the motor forward and the second
    drives it in reverse. The effect of setting the two lines is:


    | Forward | Reverse | Motor |

    | :--- | :--- | :--- |

    | Low | Low | Off |

    | Low | High | Reverse |

    | High | Low | Forward |

    | High | High | Braked |


    You can also drive the GPIO lines for Forward/Reverse with a PWM signal and control
    the motor''s speed as well as direction. If you use the MOSFETs shown in the diagram
    then you would also need a BJT to increase the drive voltage to each MOSFET, as
    in the unidirectional case. You also need to include diodes to deal with potential
    reverse voltage on each of the MOSFETs. The most important thing about an H-bridge
    is that Q1/Q2 and Q3/Q4 should never be on together – this would short circuit
    the power supply.


    If working with four BJTs or MOSFETs is more than you want to tackle, the good
    news is that there are chips that implement two H-bridges per device. You can
    also buy low-cost, ready-made, modules with one or more H-bridges.'
