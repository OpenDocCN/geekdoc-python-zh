    # A Custom SPI Device – DS3234 Clock


    Implementing the MCP3008 is instructive but, given there is already a class that
    will do the job, not particularly useful. Writing a class for a new SPI device
    is instructive and practical. The DS3234 RTC (Real Time Clock) is accurate and
    includes a battery backup that can keep it running for years. It is available
    from a number of sources in slightly different forms:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_214_1.png)'
