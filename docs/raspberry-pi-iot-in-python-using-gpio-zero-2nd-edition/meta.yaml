    ![](img/39c0a42d027b4a8b43b07050c297f3ff_14_1.png)


    使用定制接口芯片 RP1 使得 Pi 5 与所有之前的树莓派在外设（包括 GPIO 引脚）方面不兼容。如果你使用 GPIO Zero，那么任何差异都会被 Linux
    驱动程序所掩盖，这些驱动程序消除了 Pi 5 与该系列其他型号之间的差异。


    在撰写本文时，尚无迹象表明 P500 独立计算机版本何时可能推出。


    计算模块 4 (CM4) 是一款精简版的 Pi 4。所有外部连接器都已移除，信号仅通过板底的高密度连接器提供。这是一个完整的 Pi 4，你为 Pi 主型号编写的软件几乎不需要（如果需要的话）任何更改即可在其上运行，但你需要为其设计一块
    PCB 主板以连接外部世界。目前还没有 CM5，但正在开发中，预计将在 2024 年的某个时候上市。


    只有当你计划开发硬件来补充树莓派以及定制软件时，才需要使用计算模块。


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_15_0.png)


    *CM4*


    ## 树莓派 Pico


    尽管名字如此，Pico 并不属于 Pi Zero 或 Pi 3/4/5 系列。它是一个与 Pi Zero 大小差不多的小型设备，但非常不同的是，它使用定制的双核
    CPU，并且不运行 Linux。如果你计划创建一个不需要 Linux 的物联网程序，那么转向 Pico 可能对你来说要好得多。它成本低且功能强大，而且不托管操作系统的事实通常使开发代码比试图适应操作系统的工作方式更容易。另一方面，如果你想通过显示器、键盘、触摸屏、鼠标等进行本地用户交互，那么
    Pico 可能不是正确的选择。


    简而言之，Pico 是一款能够执行传感和控制任务并通过网络通信的微控制器，而 Pi 系列中的那些是运行 Linux 的完整计算机，能够执行传感和控制任务。帮助你入门
    Pico 的书是 *《Programming The Raspberry Pi Pico/W in MicroPython, 2nd Ed, ISBN:9781871962796》*，


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_15_1.png)


    *Pico W*


    ## Pi OS


    另一个复杂因素是 Pi 的操作系统选择。最新的 Pi OS 基于 Debian Bookworm，提供 32 位和 64 位版本，适用于 Pi 4 和 5。对于所有其他
    Pi，目前唯一可用的操作系统是“旧版” Debian Bullseye。Bookworm 未来可能会在这些“较小”的 Pi 上可用，但两者之间的主要差异并不重要。一个更大的差异影响任何计划利用图形的程序。Bookworm
    迈出了重要一步，使用 Wayland 替代了 Bullseye 使用的 X 图形系统。在大多数情况下，你可以通过使用合适的图形库将你的程序与此更改隔离开来，但如果你计划在底层与图形交互，你需要了解更多关于
    Wayland 的信息。


    就 GPIO Zero 而言，两个操作系统版本之间没有本质区别。


    ## 本书预期


    本书中没有完整的项目——尽管有些示例非常接近，而且很明显其中一些可以组合起来创建完整的项目。这里的重点是学习事物的工作原理，以便你能继续做非标准的事情。重要的是你能够推理处理器正在做什么以及它如何与现实世界实时交互。这是桌面编程和嵌入式编程之间的关键区别：在嵌入式编程中，时序很重要，但在桌面编程中则不然。


    这是一本关于理解一般原理并让事物工作的书。如果你读到本书的末尾，你将很好地理解当你使用一系列通常组合在一起构成完整系统的不同类型的接口时发生了什么。


    ## 你需要什么？


    要跟随本书中的示例，你需要一个 Pi Zero/W/2W 或一个 Pi 3/4/5。你可以使用早期的 Pi，只要考虑到引脚分配和其他次要硬件更改的差异。


    同样值得了解的是，虽然 Pi 4 和 Pi 5 能够运行开发环境和物联网程序，但 Pi Zero 会让事情变得困难。如果你想要第 2 章讨论的本地开发的简单性，请使用
    Pi 4 或 5。


    无论你使用哪种型号的 Pi，你都需要将其设置为 Pi OS（Raspbian 的新名称），并且你需要知道如何通过串行控制台连接到它并使用它。你还需要熟悉 Linux，意思是虽然你可能不知道如何做某事，但你知道如何查找并遵循说明。还假设你能够用
    Python 编程。理解程序所需的 Python 水平不高，但你应该熟悉使用模块和函数。


    除了 Pi 之外，你还需要一个无焊面包板和一些连接线——称为杜邦线。你还需要一些 LED、一系列电阻、一些 2N2222 或其他通用晶体管，以及后面章节中使用的任何传感器。最好在你选择实施某个项目时购买所需的东西，但另一种选择是购买众多的树莓派“入门”套件之一。不过，你可能仍然需要购买一些额外的组件。


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_17_0.png)


    *一个无焊面包板和一些杜邦线*


    你不需要知道如何焊接，但你需要能够在原型板上搭建电路。万用表（不到 10 美元）很有用，但如果你认真构建物联网设备，投资一个逻辑分析仪（不到 50 美元）很快就会物有所值。你可以获得通过
    USB 端口插入的小型分析仪，并使用应用程序向你展示正在发生的情况。只有使用多通道逻辑分析仪，你才有希望理解正在发生的事情。没有它以及使用它所需的轻微技能，你基本上是在盲目飞行，只能猜测可能出了什么问题。


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_17_1.png)


    *一个低成本逻辑分析仪*'
