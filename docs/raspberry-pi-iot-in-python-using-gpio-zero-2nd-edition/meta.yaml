    # ## The Raspberry Pi Pico


    Despite its name, the Pico isn''t in the same family as either the Pi Zeros or
    the Pi 3/4/5s. It is a small device about the same size as the Pi Zero, but it
    is very different in that it uses a custom, two-core, CPU and doesn''t run Linux.
    If you plan to create an IoT program that doesn''t need Linux, then you are probably
    much better off moving to the Pico. It is low-cost and powerful and the fact that
    it doesn''t host an operating system often makes developing code easier than trying
    to fit in with the way an operating system works. On the other hand, if you want
    local user interaction by way of a display, keyboard, touch screen, mouse, etc,
    then the Pico might not be the right choice.

    In short, the Pico is a microcontroller capable of sensing and control tasks and
    communicating via the network, whereas those in the Pi family are full computers
    running Linux capable of sensing and control tasks. The book to get you started
    with the Pico is *Programming The Raspberry Pi Pico/W in MicroPython, 2nd Ed,
    ISBN:9781871962796*,


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_15_1.png)


    *The Pico W*'
  - '[PAGE 16]


    # Pi OS


    One additional complication is the choice of operating system for the Pi. The
    latest Pi OS is based on Debian Bookworm and is available in 32- and 64-bit versions
    for the Pi 4 and 5. For all the other Pis, currently the only OS available is
    the “legacy” Debian Bullseye. It is possible that Bookworm will become available
    on these “smaller” Pis in the future, but the main differences between the two
    aren’t important. A bigger difference affects any program planning to make use
    of graphics. Bookworm has taken the big step of using Wayland in place of the
    X graphics system that Bullseye uses. In most cases you can isolate your programs
    from this change by using a suitable graphics library, but if you plan to interact
    at a low level with graphics you need to find out more about Wayland.


    As far as GPIO Zero goes there is no essential differences between the two operating
    system versions.


    # What To Expect


    There are no complete projects in this book – although some examples come very
    close and it is clear that some of them could be used together to create finished
    projects. The focus here is on learning how things work so that you can move on
    and do things that are non-standard. What matters is that you can reason about
    what the processor is doing and how it interacts with the real world in real time.
    This is the key difference between desktop and embedded programming: timing matters
    in embedded programming, but not so much in desktop programming.


    This is a book about understanding the general principle and making things work.
    If you read to the end of this book you will have a good understanding of what
    is going on when you make use of a range of different types of interfacing that
    typically go together to make a complete system.


