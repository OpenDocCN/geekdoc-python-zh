- md: "## Summary\n\n- There are a number of different types of electric motor, but\
    \ DC brushed or brushless motors are the most used in the IoT.\n- Brushed motors\
    \ can be speed controlled using a single transistor driver and a PWM signal. There\
    \ is no unidirectional motor class in GPIO Zero, but it is easy to create one.\n\
    - For bidirectional control you need an H-bridge. The Motor class can be used\
    \ to control the direction and speed of a motor with the help of an H-bridge.\n\
    - Servo motors set their position in response to the duty cycle of a PWM signal.\n\
    - Brushless DC motors are very powerful and best controlled using off-the-shelf\
    \ electronic modules. They are very powerful and thus dangerous if used incorrectly.\
    \ They can be driven using a simple PWM signal.\n- Stepper motors are a special\
    \ case of a brushless DC motor. They move in discrete steps in response to energizing\
    \ different coils.\n- A unipolar motor has coils that can be driven in the same\
    \ direction for every step. A bipolar motor has coils that need to be driven in\
    \ reverse for some steps.\n- Bipolar motors need two H-bridges to operate and\
    \ four GPIO lines.\n- There is no stepper motor class in GPIO Zero, but it is\
    \ possible to create one.\n\n## Chapter 12\nWorking With Compound Devices\n\n\
    You might well start off with a single GPIO line flashing an LED, but slowly and\
    \ surely you will graduate to more elaborate devices such as a robot that consists\
    \ of a number of flashing LEDs, motors and so on. If what you have created is\
    \ a development on an existing device then you might create a new custom class\
    \ using inheritance and we have seen examples of this in earlier chapters. For\
    \ example, when we wanted to implement a door lock class, the obvious way was\
    \ to create a new class that inherited from the existing LED class. The reason\
    \ is that both the LED and lock share a basic on/off behavior, but in the case\
    \ of the lock it is better called “lock/unlock”.\n\nCompare this to the problem\
    \ of building a custom class to control three or more separate LEDs. In this case\
    \ you don’t need to inherit the behavior of a single LED, you need multiple instances\
    \ of the LED class. In this case what you need is composition, i.e. combining\
    \ classes, rather than inheritance. GPIO Zero has a class that you can use to\
    \ create composite devices and this chapter looks at how this works in enough\
    \ detail for you to create your own.\n\n## Devices That Contain Devices\n\nThe\
    \ CompositeDevice class is intended to be inherited by your custom classes to\
    \ make it easy to include instances of other classes, but first it makes sense\
    \ to see how to do the job without help.\n\nIf you were implementing a composite\
    \ device from scratch then the logical thing to do is to create a tuple, list\
    \ or dictionary of the instances you need. For example, if you wanted to create\
    \ a custom TriLED class, you might write in the constructor a tuple like:\n\n\
    ```python\nself.LEDs=(LED(pin1),LED(pin2),LED(pin3))\n```\n\nAfter this you would\
    \ write the methods that are required using the tuple to access the LEDs.\n\n\
    For example, you might want an AllOn and AllOff method:\n\n```python\nfrom gpiozero\
    \ import LED\nfrom time import sleep\n\nclass TriLED():\n    def __init__(self,\
    \ pin1=None,pin2=None,pin3=None):\n        self.LEDs=(LED(pin1),LED(pin2),LED(pin3))\n\
    \n    def AllOn(self):\n        self.LEDs[0].on()\n        self.LEDs[1].on()\n\
    \        self.LEDs[2].on()\n\n    def AllOff(self):\n        self.LEDs[0].off()\n\
    \        self.LEDs[1].off()\n        self.LEDs[2].off()\n```\n\nA program to make\
    \ use of the new class would be something like:\n\n```python\nleds=TriLED(4,17,27)\n\
    while True:\n    leds.AllOn()\n    sleep(0.001)\n    leds.AllOff()\n    sleep(0.001)\n\
    ```\n\nOf course, in a real TriLED application you might have methods for set\
    \ patterns – rotate left, rotate right and so on, but the general idea is the\
    \ same.\n\n## The CompositeDevice\n\nThe CompositeDevice class is designed to\
    \ help with this general pattern of using a tuple of devices. You add the devices\
    \ in the constructor and you can add them as unnamed members of a tuple or as\
    \ named attributes. The difference is that named attributes make it easier to\
    \ access the sub-devices from the outside world. If you specify a device as a\
    \ positional parameter, then it is added to a tuple. If you specify a device as\
    \ a named parameter then attributes with the same name are added. The only slight\
    \ mystery is how do you access the tuple of devices? The answer is that the CompositeDevice\
    \ class itself behaves like a tuple and you can access its contents in the usual\
    \ way. It doesn't achieve this by inheritance. Instead it overrides the `__getitem__`\
    \ magic method which is called when you use indexing. For example:\n\n```python\n\
    compdev=CompositeDevice(LED(pin1),LED(pin2))\ncompdev[1].on()\n```\n\nturns on\
    \ the LED on pin2.\n\nNamed parameters are easier to understand:\n\n```python\n\
    compdev=CompositeDevice(led1=LED(pin1),led2=LED(pin2))\ncompdev.led2.on()\n```\n\
    \nYou should use the first approach for devices that are used internally and the\
    \ second if you want to allow outside access to the component devices.\n\nOf course,\
    \ if you are creating a custom class for some device, then a better idea is to\
    \ inherit from CompositeDevice rather than create an instance so that your custom\
    \ class inherits the same behavior.\n\nThis is easier to understand after an example.\
    \ The TriLED class can be implemented using CompositeDevice inheritance as:\n\n\
    ```python\nclass TriLED(CompositeDevice):\n    def __init__(self, pin1=None,pin2=None,pin3=None):\n\
    \        super(TriLED, self).__init__(LED(pin1),LED(pin2),LED(pin3))\n\n    def\
    \ AllOn(self):\n        self[0].on()\n        self[1].on()\n        self[2].on()\n\
    \n    def AllOff(self):\n        self[0].off()\n        self[1].off()\n      \
    \  self[2].off()\n```\n\nNotice that now it is the instance of TriLED that behaves\
    \ as a container for the LEDs:\n\n```python\nleds=TriLED(4,17,27)\nwhile True:\n\
    \    leds[0].on()\n    sleep(0.001)\n    leds[0].off()\n    sleep(0.001)\n```\n\
    \nYou can see that there is access to the component LEDs, the LED on pin 4 in\
    \ this case, and, in general, this is to be discouraged – you should provide methods\
    \ that do the things the user wants to do without them having to access the component\
    \ parts. This is an ideal and in some situations direct access to the components\
    \ might be the only way of getting the job done.\n\nIf you do want to encourage\
    \ access from the outside world then use named parameters:\n\n```python\nclass\
    \ TriLED(CompositeDevice):\n    def __init__(self, pin1=None,pin2=None,pin3=None):\n\
    \        super(TriLED, self).__init__(left=LED(pin1),\n                      \
    \              middle=LED(pin2),right=LED(pin3))\n```\n\nNow you can write the\
    \ more meaningful:\n\n```python\nleds=TriLED(4,17,27)\nwhile True:\n    leds.left.on()\n\
    \    sleep(0.001)\n    leds.left.off()\n    sleep(0.001)\n```\n\nThe CompositeDevice\
    \ class also brings some extras of its own. The main one is `value`, which returns\
    \ a named tuple with the current value of each device. For example:\n\n```python\n\
    leds=TriLED(4,17,27)\nprint(leds.value)\n```\n\ndisplays:\n\n```\nTriLEDValue(device_0=0,\
    \ device_1=0, device_2=0)\n```\n\nFor unnamed devices the class assigns a name,\
    \ while for named devices the name given is used. You can adjust the order in\
    \ which the devices are listed in the tuple using the `_order` parameter - the\
    \ underscore at the start of the name is a sure sign that you are not expected\
    \ to need it. For example, changing the call to the constructor to:\n\n```python\n\
    super(TriLED, self).__init__(left=LED(pin1),middle=LED(pin2),\n              \
    \          right=LED(pin3),_order=[\"right\",\"left\",\"middle\"])\n```\n\nresults\
    \ in printing:\n\n```\nTriLEDValue(right=0, left=0, middle=0)\n```\n\nIf you need\
    \ to create an identical type, the `namedtuple` attribute provides the class of\
    \ the named tuple used to report the value. This is helpful if you are using the\
    \ CompositeOutputDevice class.\n\n## CompositeOutputDevice\n\nUsually a composite\
    \ device has both input and output devices, but if it only has output the CompositeOutputDevice\
    \ adds a few extra methods to CompositeDevice that are useful. In particular:\n\
    \n- `on()` turns all devices on\n- `off()` turns all devices off\n- `toggle()`\
    \ turns any on device off and any off device on.\n\nAlso the `value` attribute\
    \ is modified to allow you to set the state of all of the output devices."
