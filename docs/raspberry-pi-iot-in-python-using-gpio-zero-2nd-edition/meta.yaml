    ```python\nlgpio.tx_pwm(GPIOChip, 4, 1000, 25, pulse_cycles=50)\n```\n\nThere\
    \ is no need to claim the GPIO line as it is automatically claimed and set to\
    \ output. The PWM is generated in software rather than making any use of the Pi's\
    \ PWM hardware. An interrupt routine is used to generate the pulses and this only\
    \ runs while the program is running. If you try:\n```python\nimport lgpio\nGPIOChip\
    \ = lgpio.gpiochip_open(4)\nlgpio.tx_pwm(GPIOChip, 4, 1000, 25, pulse_cycles=50)\n\
    ```\nthen you won't see any pulses output on GPIO4 as the program ends before\
    \ they start being generated. To see the pulses you need to use:\n```python\n\
    import lgpio\nGPIOChip = lgpio.gpiochip_open(4)\nlgpio.tx_pwm(GPIOChip, 4, 1000,\
    \ 25, pulse_cycles=50)\nwhile True:\n    pass\n```\n\nIf you don't specify a `pulse_cycles`\
    \ then the waveform is generated until the program ends. You can modify the waveform\
    \ being produced by simply using another `tx_pwm` function call.\n\nFor example:\n\
    ```python\nimport lgpio\nimport time\n\nGPIOChip = lgpio.gpiochip_open(4)\nlgpio.tx_pwm(GPIOChip,\
    \ 4, 1000, 25)\ntime.sleep(1)\nlgpio.tx_pwm(GPIOChip, 4, 1000, 50)\nwhile True:\n\
    \    pass\n```\n\nThis starts the pulse generator at 1000Hz with a 25% duty cycle\
    \ and then after one second changes this to 50% duty cycle.\n\nThe important idea\
    \ is that the pulse generator maintains a queue of pulse instructions. Each pulse\
    \ function call takes a single slot in the queue and as one function call comes\
    \ to an end, the next one in the queue is started. The pulse function returns\
    \ the number of free spaces in the queue and you can check to see how many slots\
    \ are free using:\n```python\ntx_room(handle, gpio, kind)\n```\nwhere *kind* is\
    \ TX_PWM or TX_WAVE.\n\nFor example:\n```python\nimport lgpio\n\nGPIOChip = lgpio.gpiochip_open(4)\n\
    lgpio.tx_pwm(GPIOChip, 4, 1000, 25, pulse_cycles=100)\nlgpio.tx_pwm(GPIOChip,\
    \ 4, 1000, 50, pulse_cycles=100)\nwhile True:\n    pass\n```\n\nIn this case the\
    \ first function call adds one item to the queue for 100 cycles of 1000Hz, 25%\
    \ duty cycle and the second call adds another item to the queue for 100 cycles\
    \ of 1000Hz with a 50% duty cycle. As before, the program has to carry on running\
    \ for all of the items in the queue to be processed.\n\nEven though you can, in\
    \ theory, set the frequency to 10kHz, this is not a good idea. Even at 1kHz the\
    \ pulse generator is interrupted by the operating system often enough to be a\
    \ nuisance:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_228_0.png)\n\nWhen the\
    \ pulse generator is restarted it generates pulses with a shorter period to catch\
    \ up with the pulse stream. As a result you cannot rely on the pulse time or the\
    \ duty cycle. The amount of irregularity depends on the loading of the processor.\n\
    \nAs well as specifying frequency and duty cycle, you can specify the time the\
    \ pulse is high and low:\n```python\ntx_pulse(handle, gpio, pulse_on, pulse_off,\n\
    \         pulse_offset=0, pulse_cycles=0)\n```\nwhere the pulse on and off times\
    \ are in microseconds. For example:\n```python\nlgpio.tx_pulse(GPIOChip, 4, pulse_on=100,\
    \ pulse_off=100)\n```\ngenerates a pulse train at 5kHz with a 50% duty cycle.\
    \ This uses the same pulse generator and queue as the PWM function.\n\nAs PWM\
    \ is used to control servos, it makes sense to have a special servo related function:\n\
    ```python\ntx_servo(handle, gpio, pulse_width, servo_frequency=50,\n         pulse_offset=0,\
    \ pulse_cycles=0)\n```\nYou can generally ignore the servo_frequency as it is\
    \ usually 50Hz. The pulse_width varies from 500μs to 2500μs, which is the range\
    \ needed to take a servo from its extreme positions. In practice you would have\
    \ to calibrate the servo to discover the exact range to use. For example:\n```python\n\
    lgpio.tx_servo(GPIOChip, 4, 500)\n```\nsets a servo connected to GPIO4 to one\
    \ of its two extreme positions.\n\nThis is simple, but the inaccuracies in the\
    \ pulse stream referred to in the discussion of PWM now become more of a problem.\
    \ The documentation says:\n\n> The timing jitter will cause the servo to fidget.\
    \ This may cause it to overheat and wear out prematurely.\n\nIn most cases the\
    \ jitter is small enough not to be a worry except for long-term use.\n\nFinally\
    \ we have\n```python\ntx_wave(handle, gpio, pulses)\n```\nwhich can be used to\
    \ pulse a set of GPIO lines in a complex pattern.\n\nThe gpio parameter is a group\
    \ of GPIO lines and pulses is a list of pulse objects.\n\nA pulse object is a\
    \ container class with the following members:\n\n- **group_bits**: Levels to set\
    \ if the corresponding bit in group_mask is set\n- **group_mask**: Mask indicating\
    \ the group GPIO to be updated\n- **pulse_delay**: Delay in microseconds before\
    \ the next pulse\n\nThis works like the PWM queue but using its own queue. You\
    \ can check how much space there is using:\n```python\ntx_room(handle, gpio, kind)\n\
    ```\nwith `kind` set to `TX_WAVE`.\n\nTo pulse GPIO1 and GPIO17 out of phase you\
    \ could use:\n```python\nimport lgpio\nfrom collections import namedtuple\n\n\
    Pulse = namedtuple('Pulse', ['group_bits',\n                             'group_mask',\
    \ 'pulse_delay'])\n\nGPIOChip = lgpio.gpiochip_open(4)\nlgpio.group_claim_output(GPIOChip,\
    \ [4,17])\n\nlgpio.tx_wave(GPIOChip, 4, [Pulse(1,3,1000), Pulse(2,3,1000),\n \
    \                           Pulse(1,3,1000), Pulse(2,3,1000)])\n\nwhile True:\n\
    \    pass\n```\n\nIn this we first define a named tuple suitable for storing a\
    \ Pulse specification. Then we setup a GPIO group consisting of GPIO4 and GPIO17.\
    \ The call to `tx_wave` changes both lines at the same time – the mask is 3 or\
    \ 11 in binary. The first Pulse sets GPIO4 high and GPIO17 low for 1000μs. The\
    \ second sets GPIO4 low and GPIO17 high for 1000μs and this is repeated once.\
    \ If you run the program you will see:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_230_0.png)"
  mdcn: "作为另一个简单的例子，考虑将两条线路设置为反相：\n```python\nimport lgpio\n\nGPIOChip = lgpio.gpiochip_open(4)\n\
    \nlgpio.gpio_claim_output(GPIOChip, 4)\nlgpio.gpio_claim_output(GPIOChip, 17)\n\
    while True:\n    lgpio.gpio_write(GPIOChip, 4, 1)\n    lgpio.gpio_write(GPIOChip,\
    \ 17, 0)\n    lgpio.gpio_write(GPIOChip, 4, 0)\n    lgpio.gpio_write(GPIOChip,\
    \ 17, 1)\nlgpio.gpiochip_close(GPIOChip)\n```\n\n如果你在树莓派5上尝试这个，你会发现脉冲宽度为4μs，并且状态切换有2μs的延迟：\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_225_0.png)\n\n## GPIO组操作\n\n除了单线操作，你还可以操作一组GPIO线：\n\
    \n- `group_claim_input` 为输入申请一组GPIO线\n- `group_claim_output` 为输出申请一组GPIO线\n- `group_free`\
    \ 释放一组GPIO线\n- `group_read` 读取一组GPIO线\n- `group_write` 写入一组GPIO线\n\n在每种情况下，函数都接受一个要申请的线路列表。第一个指定的GPIO线用作组的名称。例如，[4,17]指定了GPIO4和GPIO17，从此时起，该组通过4来引用。GPIO组的状态由一个二进制值表示，每条线对应一个相应的位。因此，GPIO组[4,17]由一个两位数表示：如果两条线都是低电平，则为00；如果GPIO4为低电平且GPIO17为高电平，则为01；如果GPIO4为高电平且GPIO17为低电平，则为10；如果两条线都是高电平，则为11。你还可以指定一个`group_mask`，其中为1的位表示要更改的线路，为0的位表示不更改的线路。\n\
    \n例如：\n```python\nlgpio.group_claim_output(GPIOChip, [4,17])\n```\n将GPIO4和GPIO17申请为一个输出组。\n\
    \n要写入组，你可以使用：\n```python\nlgpio.group_write(GPIOChip, 4, 2)\n```\n其中4使用主导GPIO线来标识组。2指定了二进制值10，它将GPIO4设置为高电平，GPIO17设置为低电平。\n\
    \n你可以使用组函数来实现相位输出：\n```python\nimport lgpio\n\nGPIOChip = lgpio.gpiochip_open(4)\n\
    \nlgpio.group_claim_output(GPIOChip, [4,17])\n\nwhile True:\n    lgpio.group_write(GPIOChip,\
    \ 4, 2)\n    lgpio.group_write(GPIOChip, 4, 1)\n```\n\n这会将GPIO4和GPIO17这组线路分别设置为10和01。如果你尝试这个，你会发现脉冲很快，但线路设置之间仍然有一个小的延迟。对于树莓派5，脉冲宽度为1.5μs，延迟小于0.1μs，这比独立切换线路要好得多。\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_226_0.png)\n\n## 脉冲\n\n一旦你有了一个GPIO线，你就可以用它来创建任何你想要的持续时间的脉冲。lgpio库通过提供一组以特定方式脉冲GPIO线的函数，为你完成了一些工作。请注意，所有这些脉冲都是在软件中生成的。例如，`tx_pwm(handle,\
    \ gpio, pwm_frequency, pwm_duty_cycle, pulse_offset=0, pulse_cycles=0)`\n\n这会在输出GPIO上启动软件定时的PWM，其参数如下：\n\
    \n- `handle`：由gpiochip_open返回的句柄\n- `gpio`：要脉冲的GPIO线\n- `pwm_frequency`：PWM频率，单位为Hz（0=关闭，0.1-10000）。\n\
    - `pwm_duty_cycle`：PWM占空比，单位为%（0-100）。\n- `pulse_offset`：相对于标称脉冲起始位置的偏移量。\n- `pulse_cycles`：要发送的周期数，0表示无限。\n\
    \n因此，例如，要使用GPIO4发送50个频率为1000Hz、占空比为25%的脉冲，你可以使用：\n```python\nlgpio.tx_pwm(GPIOChip,\
    \ 4, 1000, 25, pulse_cycles=50)\n```\n无需申请GPIO线，因为它会自动申请并设置为输出。PWM是在软件中生成的，而不是使用树莓派的PWM硬件。使用中断例程来生成脉冲，这仅在程序运行时运行。如果你尝试：\n\
    ```python\nimport lgpio\nGPIOChip = lgpio.gpiochip_open(4)\nlgpio.tx_pwm(GPIOChip,\
    \ 4, 1000, 25, pulse_cycles=50)\n```\n那么你将不会在GPIO4上看到任何脉冲输出，因为程序在脉冲开始生成之前就结束了。要看到脉冲，你需要使用：\n\
    ```python\nimport lgpio\nGPIOChip = lgpio.gpiochip_open(4)\nlgpio.tx_pwm(GPIOChip,\
    \ 4, 1000, 25, pulse_cycles=50)\nwhile True:\n    pass\n```\n\n如果你不指定`pulse_cycles`，那么波形将一直生成直到程序结束。你可以通过简单地使用另一个`tx_pwm`函数调用来修改正在产生的波形。\n\
    \n例如：\n```python\nimport lgpio\nimport time\n\nGPIOChip = lgpio.gpiochip_open(4)\n\
    lgpio.tx_pwm(GPIOChip, 4, 1000, 25)\ntime.sleep(1)\nlgpio.tx_pwm(GPIOChip, 4,\
    \ 1000, 50)\nwhile True:\n    pass\n```\n\n这会以1000Hz、25%占空比启动脉冲发生器，然后在一秒钟后将其更改为50%占空比。\n\
    \n重要的概念是，脉冲发生器维护一个脉冲指令队列。每个脉冲函数调用占用队列中的一个槽位，当一个函数调用结束时，队列中的下一个调用就会开始。脉冲函数返回队列中的空闲空间数量，你可以使用以下方式检查有多少槽位空闲：\n\
    ```python\ntx_room(handle, gpio, kind)\n```\n其中*kind*是TX_PWM或TX_WAVE。\n\n例如：\n\
    ```python\nimport lgpio\n\nGPIOChip = lgpio.gpiochip_open(4)\nlgpio.tx_pwm(GPIOChip,\
    \ 4, 1000, 25, pulse_cycles=100)\nlgpio.tx_pwm(GPIOChip, 4, 1000, 50, pulse_cycles=100)\n\
    while True:\n    pass\n```\n\n在这种情况下，第一个函数调用向队列添加一个项目，用于100个周期的1000Hz、25%占空比的脉冲；第二个调用向队列添加另一个项目，用于100个周期的1000Hz、50%占空比的脉冲。和以前一样，程序必须继续运行，以便处理队列中的所有项目。\n\
    \n即使理论上你可以将频率设置为10kHz，但这不是一个好主意。即使在1kHz时，脉冲发生器也会被操作系统频繁中断，以至于成为一种麻烦：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_228_0.png)\n\
    \n当脉冲发生器重新启动时，它会生成周期更短的脉冲以赶上脉冲流。因此，你不能依赖脉冲时间或占空比。不规则的程度取决于处理器的负载。\n\n除了指定频率和占空比，你还可以指定脉冲的高电平和低电平时间：\n\
    ```python\ntx_pulse(handle, gpio, pulse_on, pulse_off,\n         pulse_offset=0,\
    \ pulse_cycles=0)\n```\n其中脉冲的开启和关闭时间以微秒为单位。例如：\n```python\nlgpio.tx_pulse(GPIOChip,\
    \ 4, pulse_on=100, pulse_off=100)\n```\n生成一个频率为5kHz、占空比为50%的脉冲序列。这使用与PWM函数相同的脉冲发生器和队列。\n\
    \n由于PWM用于控制舵机，因此有一个专门的舵机相关函数是有意义的：\n```python\ntx_servo(handle, gpio, pulse_width,\
    \ servo_frequency=50,\n         pulse_offset=0, pulse_cycles=0)\n```\n你通常可以忽略`servo_frequency`，因为它通常是50Hz。`pulse_width`的范围从500μs到2500μs，这是将舵机从其极端位置移动所需的范围。实际上，你需要校准舵机以发现要使用的精确范围。例如：\n\
    ```python\nlgpio.tx_servo(GPIOChip, 4, 500)\n```\n将连接到GPIO4的舵机设置为其两个极端位置之一。\n\n\
    这很简单，但在PWM讨论中提到的脉冲流中的不准确性现在变得更加成问题。文档指出：\n\n> 时序抖动会导致舵机抖动。这可能导致其过热并过早磨损。\n\n在大多数情况下，抖动足够小，除了长期使用外，无需担心。\n\
    \n最后，我们有\n```python\ntx_wave(handle, gpio, pulses)\n```\n可用于以复杂的模式脉冲一组GPIO线。\n\
    \n`gpio`参数是一组GPIO线，`pulses`是一个脉冲对象列表。\n\n脉冲对象是一个容器类，具有以下成员：\n\n- **group_bits**：如果`group_mask`中的相应位被设置，则要设置的电平\n\
    - **group_mask**：指示要更新的GPIO组的掩码\n- **pulse_delay**：下一个脉冲之前的延迟，以微秒为单位\n\n这类似于PWM队列，但使用自己的队列。你可以使用以下方式检查有多少空间：\n\
    ```python\ntx_room(handle, gpio, kind)\n```\n其中`kind`设置为`TX_WAVE`。\n\n要使GPIO1和GPIO17反相脉冲，你可以使用：\n\
    ```python\nimport lgpio\nfrom collections import namedtuple\n\nPulse = namedtuple('Pulse',\
