    \ 0100（24小时）。最简单的方法是使用24小时制，这样你就可以简单地将寄存器读取为表示小时的两个数字的BCD编码。\n\n我们几乎准备好开始编码了。唯一需要的额外信息是使用哪种时钟模式。这从数据手册中发现起来出奇地困难，你必须查看时序图才能弄清楚。结果证明，设备可以在模式1或模式3下工作。同样值得知道的是，如果你弄错了，设备将不会响应，看起来就像你有一个损坏的组件。\n\
