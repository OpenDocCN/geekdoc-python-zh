- img_proc: true
  md: '# MOSFET Driver


    There are many who think that the FET (Field Effect Transistor), or more precisely
    the MOSFET (Metal Oxide Semiconductor FET), is the perfect amplification device
    and we should ignore BJTs. They are simpler to understand and use, but it can
    be more difficult to find one with the characteristics you require.


    Like the BJT, a MOSFET has three terminals called the gate, drain and source.
    The current that you want to control flows between the source and drain and it
    is controlled by the gate. This is analogous to the BJT''s base, collector and
    emitter, but the difference is that it is the voltage on the gate that controls
    the current between the source and drain.


    The gate is essentially a high resistance input and very little current flows
    in it. This makes it an ideal way to connect a GPIO line to a device that needs
    more current or a different voltage. When the gate voltage is low the source drain
    current is very small. When the gate voltage reaches the threshold voltage V<sub>GS(th)</sub>,
    which is different for different MOSFETs, the source drain current starts to increase
    exponentially. Basically when the gate is connected to 0V or below V<sub>GS(th)</sub>
    the MOSFET is off and when it is above V<sub>GS(th)</sub> the MOSFET starts to
    turn on. Don''t think of V<sub>GS(th)</sub> as the gate voltage at which the MOSFET
    turns on, but as the voltage below which it is turned off. The problem is that
    the gate voltage to turn a typical MOSFET fully on is in the region of 10V. Special
    “logic” MOSFETs need a gate voltage around 5V to fully turn on and this makes
    the 3.3V at which the Raspberry Pi''s GPIO lines work a problem. The data sheets
    usually give the fully on resistance and the minimum gate voltage that produces
    it, usually listed as Drain-Source On-State Resistance. For digital work this
    is a more important parameter than the gate threshold voltage.


    You can deal with this problem in one of two ways – ignore it or find a MOSFET
    with a very small V<sub>GS(th)</sub>. In practice, MOSFETs with thresholds low
    enough to work at 3.3V are hard to find and when you do find them they are generally
    only available as surface mount. Ignoring the problem sometimes works if you can
    tolerate the MOSFET not being fully on. If the current is kept low then, even
    though the MOSFET might have a resistance of a few Ohms, the power loss and voltage
    drop may be acceptable.


    What MOSFETs are useful for is in connecting higher voltages to a GPIO line used
    as an input, see later.


    Also notice that this discussion has been in terms of an N-channel MOSFET. A P-channel
    works in the same way, but with all polarities reversed. It is cut off when the
    gate is at the positive voltage and turns on when the gate is grounded. This is
    exactly the same as the NPN versus PNP for the BJT.'
  merge: -1
  pgno: 83
- img_proc: true
  md: '# MOSFET LED


    A BJT is the easiest way to drive an LED, but as an example of using a common
    MOSFET we can arrange to drive one using a 2N7000, a low-cost, N-channel device
    available in a standard TO92 form factor suitable for experimentation:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_84_0.png)


    Its data sheet states that it has a V<sub>GS(th)</sub> of typically 2V, but it
    could be as low as 0.8V or as high as 3V. Given we are trying to work with a gate
    voltage of 3.3V you can see that in the worst case this is hardly going to work
    – the device will only just turn on. The best you can do is to buy a batch of
    2N7000 and measure their V<sub>GS(th)</sub> to weed out any that are too high.
    This said, the circuit given below does generally work.


    Assuming a V<sub>GS(th)</sub> of 2V and a current of 20mA for the LED, the data
    sheet gives a rough value of 6Ω for the on resistance with a gate voltage of 3V.
    The calculation for the current-limiting resistor is the same as in the BJT case
    and the final circuit is:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_84_1.png)


    Notice that we don''t need a current-limiting resistor for the GPIO line as the
    gate connection is high impedance and doesn''t draw much current. In'
  merge: -1
  pgno: 84
- img_proc: true
  md: 'practice, it is usually a good idea to include a current-limiting resistor
    in the GPIO line if you plan to switch it on and off rapidly. The problem is that
    the gate looks like a capacitor and fast changes in voltage can produce high currents.
    While there could be devices labeled 2N7000 that will not work in this circuit
    due to the threshold gate voltage being too high, encountering one is rare.


    A logic-level MOSFET like the IRLZ44 has a resistance of 0.028Ω at 5V compared
    to the 2N2222''s of 6Ω. It also has a V<sub>GS(th)</sub> guaranteed to be between
    1V and 2V.


    # Setting Drive Type


    The GPIO output can be configured into one of a number of modes, but the most
    important is pull-up/down. Before we get to the code to do the job, it is worth
    spending a moment explaining the three basic output modes, push-pull, pull-up
    and pull-down.


    # Push-Pull Mode


    In push-pull mode two transistors of opposite polarity, one PNP and one NPN, are
    used:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_85_0.png)


    The circuit behaves like the two-switch equivalent shown on the right. Only one
    of the transistors, or switches, is "closed" at any time. If the input is high
    then Q1 is saturated and the output is connected to ground - exactly as if S1
    was closed. If the input is low then Q2 is saturated, as if S2 was closed, and
    the output is connected to 3.3V. You can see that this pushes the output line
    high with the same "force" as it pulls it low. This is the standard configuration
    for a GPIO output.'
  merge: -1
  pgno: 85
- img_proc: true
  md: '# Pull-Up Mode


    In pull-up mode one of the transistors is replaced by a resistor:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_86_0.png)


    In this case the circuit is equivalent to having a single switch. When the switch
    is closed, the output line is connected to ground and hence driven low. When the
    switch is open, the output line is pulled high by the resistor. You can see that
    in this case the degree of pull-down is greater than the pull-up, where the current
    is limited by the resistor. The advantage of this mode is that it can be used
    in an AND configuration. If multiple GPIO or other lines are connected to the
    output, then any one of them being low will pull the output line low. Only when
    all of them are off does the resistor succeed in pulling the line high. This is
    used, for example, in a serial bus configuration like the SPI bus.


    # Pull-Down Mode


    Finally, pull-down mode, which is the best mode for driving general loads, motors,
    LEDs, etc, is exactly the same as pull-up only now the resistor is used to pull
    the output line low.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_86_1.png)


    The line is held high by the transistor and pulled low by the resistor only when
    all the switches are open. Putting this the other way round, the line is high
    if any one switch is closed. This is the OR version of the shared bus idea.'
  merge: -1
  pgno: 86
- img_proc: true
  md: '# Basic Input Circuit - The Switch


    Now it is time to turn our attention to the electrical characteristics of GPIO
    lines as inputs. One of the most common input circuits is the switch or button.
    Many beginners make the mistake of wiring a GPIO line to a switch something like:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_87_0.png)


    The problem with this is that, if the switch is pressed, the GPIO line is connected
    to ground and will read as zero. The question is, what does it read when the switch
    is open? A GPIO line configured as an input has a very high resistance. It isn''t
    connected to any particular voltage and the voltage on it varies due to the static
    it picks up. The jargon is that the unconnected line is "floating". When the switch
    is open the line is floating and, if you read it, the result, zero or one, depends
    on whatever noise it has picked up.

    The correct way to do the job is to tie the input line either high or low when
    the switch is open using a resistor. A pull-up arrangement would be something
    like:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_87_1.png)'
  merge: -1
  pgno: 87
- img_proc: true
  md: 'The value of the resistor used isn''t critical. It simply pulls the GPIO line
    high when the switch isn''t pressed. When it is pressed a current of a little
    more than 0.3mA flows in the resistor. If this is too much increase the resistance
    to 100kΩ or even more - but notice that the higher the resistor value the noisier
    the input to the GPIO and the more it is susceptible to RF interference. Notice
    that this gives a zero when the switch is pressed.

    If you want a switch that pulls the line high instead of low, reverse the logic
    by swapping the positions of the resistor and the switch in the diagram to create
    a pull-down:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_88_0.png)


    Notice that this gives a one when the switch is pressed.

    The good news is that the Raspberry Pi has built-in pull-up and pull-down resistors
    which you can enable in software. This means that you can connect a switch directly
    to the GPIO and set a pull-up or pull-down configuration in software.


    # Setting Pull Mode


    The GPIO Zero library makes it easy to set the pull mode as the pin object supports
    a pull property. You can set this to any of up, down or floating. In output mode
    floating is push-pull mode. For example:


    ```

    pin.pull="down"

    ```


    Any device that has a pin property can have its pull mode set in the same way
    and many devices include a pull parameter in their constructor. The internal pull-up/pull-down
    resistors are in the range 50kΩ to 65kΩ. There are also external 1.8kΩ pull-ups
    on pins 3 and 5. The only way to remove them is to unsolder them from the board.'
  merge: -1
  pgno: 88
- img_proc: true
  md: '# Debounce


    Although the switch is the simplest input device, it is very difficult to get
    right. When a user clicks a switch of any sort, the action isn''t clean - the
    switch bounces. What this means is that the logic level on the GPIO line goes
    high then low and high again and bounces between the two until it settles down.
    There are electronic ways of debouncing switches, but software does the job much
    better. All you have to do is insert a delay of a millisecond or so after detecting
    a switch press and read the line again - if it is still low then record a switch
    press. Similarly, when the switch is released, read the state twice with a delay.
    You can vary the delay to modify the perceived characteristics of the switch.


    A more sophisticated algorithm for debouncing a switch is based on the idea of
    integration. All you have to do is read the state multiple times, every few milliseconds
    say, and keep a running sum of values. If you sum ten values each time then a
    total of between 6 and 10 can be taken as an indication that the switch is high.
    A total less than this indicates that the switch is low. You can think of this
    as a majority vote in the time period for the switch being high or low.


    GPIO Zero supports a simple debounce algorithm. After a change in the input has
    been detected, further changes are ignored for a period of time. You can set the
    debounce time using the bounce property. For example:


    ```

    pin.bounce=5/1000

    ```


    sets the bounce time to 5ms which is a reasonable choice for many devices. Notice
    that this means that the bounced switch can only be pressed and released 100 times
    a second. Input devices also often have bounce parameters that can be set in their
    constructors.


    # The Potential Divider


    If you have an input that is outside of the range of 0V to 3.3V you can reduce
    it using a simple potential divider. In the diagram V is the input from the external
    logic and Vout is the connection to the GPIO input line:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_89_0.png)


    Vout = V R2/(R1+R2)'
  merge: -1
  pgno: 89
- img_proc: true
  md: 'You can spend a lot of time working out good values of R1 and R2. For loads
    that take a lot of current you need R1+R2 to be small and divided in the same
    ratio as the voltages. For example, for a 5V device R1=18 or 20KΩ and R2=33KΩ
    work well to drop the voltage to 3.3V.


    A simpler approach that works for a 5V signal is to notice that the ratio R1:R2
    has to be the same as (5-3.3):3.3, i.e. the voltage divides itself across the
    resistors in proportion to their value, which is roughly 1:2. What this means
    is that you can take any resistor and use it for R1 and use two of the same value
    in series for R2 and the Vout will be 3.33333V.


    The problem with a resistive divider is that it can round off fast pulses due
    to the small capacitive effects. This usually isn''t a problem, but if it is then
    the solution is to use a FET or a BJT as an active buffer:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_90_0.png)


    Notice that this is an inverting buffer, the output is low when the input is high,
    but you can usually ignore this and simply correct it in software, i.e. read a
    1 as a low state and a 0 as a high state. The role of R1 is to make sure the FET
    is off when the 5V signal is absent and R2 limits the current in the FET to about
    0.3mA.


    In most cases you should try the simple voltage divider and only move to an active
    buffer if it doesn''t work.


    This very basic look at electronics isn''t all that you need to know, but it is
    enough for you to see some of the problems and find some answers. In general,
    this sort of electronics is all about making sure that voltages and currents are
    within limits. As switching speeds increase you have additional problems, which
    are mainly concerned with making sure that your circuits aren''t slowing things
    down. This is where things get more subtle.'
  merge: -1
  pgno: 90
- img_proc: true
  md: '# Summary


    +   - You can get a long way with only a small understanding of electronics, but
    you do need to know enough to protect the Pi and things you connect to it.

    - The maximum current from any GPIO line should be less than 16mA and the total
    current should be less than 50mA.

    - All of the GPIO lines work at 3.3V and you should avoid directly connecting
    any other voltage.

    - You can drive an LED directly from a GPIO line, but only at 16mA rather than
    the nominal 20mA needed for full brightness.

    - Calculating a current-limiting resistor always follows the same steps – find
    out the current in the device, find out the voltage across the device, and work
    out the resistor that supplies that current when the remainder of the voltage
    is applied to it.

    - For any load you connect to a GPIO output you generally need a current-limiting
    resistor.

    - In many cases you need a transistor, a BJT, to increase the current supplied
    by the GPIO line.

    - To use a BJT you need to calculate a current-limiting resistor in the base and,
    generally, one in the collector.

    - MOSFETs are popular alternatives to BJTs, but it is difficult to find a MOSFET
    that works reliably at 3.3V.

    - GPIO output lines can be set to active push-pull mode, where a transistor is
    used to pull the line high or low, or passive pull-up or pull-down mode, where
    one transistor is used and a resistor pulls the line high or low when the transistor
    is inactive.

    - GPIO lines have built-in pull-up and pull-down resistors which can be selected
    or disabled under software control and can be used in input mode.

    - When used as inputs, GPIO lines have a very high resistance and in most cases
    you need pull-up or pull-down resistors to stop the line floating.

    - The built-in pull-up or pull-down resistors can be used in input mode.

    - Mechanical input devices have to be debounced to stop spurious input.

    - If you need to connect an input to something bigger than 3.3V, you need a potential
    divider to reduce the voltage back to 3.3V. You can also use a transistor.'
  merge: -1
  pgno: 91
- img_proc: true
  md: '# Chapter 8

    Simple Input


    GPIO input is a much more difficult problem than output from the point of view
    of measurement and verification. For output you can see the change in the signal
    on a logic analyzer and know the exact time that it occurred. This makes it possible
    to track down timing problems and fine-tune things with good accuracy. Input,
    on the other hand, is "silent" and unobservable. When did you read the status
    of the line? Usually the timing of the read is with respect to some other action
    that the device has taken. For example, you read the input line 20 μs after setting
    the output line high. In some applications the times are long and/or unimportant,
    but in some they are critical and so we need some strategies for monitoring and
    controlling read events.


    The usual rule of thumb is to assume that it takes as long to read a GPIO line
    as it does to set it.


    One common and very useful trick when you are trying to get the timing of input
    correct is to substitute an output command to a spare GPIO line and monitor it
    with a logic analyzer. Place the output instruction just before the input instruction
    and where you see the line change on the logic analyzer should be close to the
    time that the input would be read in the unmodified program. You can use this
    to debug and fine-tune and then remove the output statement.


    # The Button


    The GPIO Zero library has only one simple input device – the Button, but for a
    simple input device it is surprisingly complicated. This is not its fault, but
    another reflection of the fact that input is hard.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_92_0.png)


    Of course, it doesn''t have to be connected to a button - it can be any device
    that creates a definite high low signal on a GPIO line. The button could be any
    sort of switch that is actuated in any way – a reed switch activated by a magnet,
    a tilt switch activated by angle, and so on.'
  merge: -1
  pgno: 92
- img_proc: true
  md: 'A reed switch is closed by being near a magnet.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_93_0.png)


    A tilt switch is closed by being rotated until a blob of mercury makes a connection.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_93_1.png)


    The Button has a surprising number of possible parameters:

    `Button(pin, pull_up=True, active_state=None, bounce_time=None, hold_time=1, hold_repeat=False)`


    at its simplest, however, you only have to provide the pin number:

    `button = Button(4)`


    This puts the GPIO line, GPIO4 in this case, into input mode and the defaults
    are such that a pull-up is automatically used, see previous chapter. This means
    that you can wire a switch to GPIO4 without the need for any other components.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_93_2.png)


    Ground is pin 6 and GPIO4 is pin 7.

    If you want to use a pull-down arrangement, set `pull_up` to `False` when you
    create the pin.'
  merge: -1
  pgno: 93
- img_proc: true
  md: 'The big question is, how do you deal with input from the switch? It isn''t
    like output, where your program is in 100% control. The button can be pushed at
    any time and your program has to respond to it.


    The simplest way of dealing with the problem is for your program to wait until
    the button is pressed or released:


    ```

    wait_for_press(timeout = None)

    wait_for_release(timeout = None)

    ```


    The timeout can be set to the number of seconds to wait before giving up. The
    default value of None or 0 means your program will wait forever for the button
    to be pressed.


    The use of press and release refer to the mechanical action of the button or switch.
    Of course, if the button is wired with a pull-up then press corresponds to a 0
    and if it is wired as a pull-down then it corresponds to a 1. To let the software
    know which is which, you can use the active_state parameter when creating the
    Button object. If you set this to True then high corresponds to pressed and if
    False, low corresponds to pressed. If pull_up is anything except None, active_state
    is set automatically.


    By default Button isn''t debounced. What this means is that what looks like a
    single press to you might be received as a set of press/release signals. If you
    don''t want to incorporate hardware debounce components then include the bounce_time
    parameter when you create button. This specifies a wait time in seconds before
    its state change will be recognized. For example:


    ```

    button = Button(4,bounce_time=0.25)

    ```


    creates a Button that can only be pressed 4 times per second and hence is effectively
    debounced. Another way to look at this is that the button will only respond to
    the first press in any 0.25s interval.


    # Polling


    The problem with waiting for a button, or whatever else you use as a switch, to
    be pressed is that your program is frozen and nothing else can happen - it just
    sits there waiting for the event. Sometimes this is acceptable because there is
    nothing more for your program to do. More often it is the case that your program
    has got things to do and simply waiting isn''t an option.


    An alternative to waiting for a switch to be pressed is to poll its state. Polling
    is a standard programming technique where, to detect a change of state, the program
    repeatedly checks the state at suitable intervals. You can check the state of
    Button using the is_pressed property or the value property. The difference is
    that value gives you the state of the GPIO line, i.e. 0 (low) or 1 (high) and
    what this means depends on the way the switch is wired, whereas is_pressed always
    gives True when the switch is pressed.'
  merge: -1
  pgno: 94
- img_proc: true
  md: "```\nFor example:\nwhile True:\n    do something\n    if button.is_pressed:\n\
    \        do something about button pressed\n```\n\nIn this case the polling takes\
    \ the form of an infinite loop and the test for the button being pressed occurs\
    \ once per loop. You can see that how often the button press is tested depends\
    \ on the time the loop takes and that how long the loop gets to *do something*\
    \ depends on how often the button is pressed and how long it takes to process\
    \ the changes needed.\n\nThe idea of using a polling loop is often regarded as\
    \ a poor choice, but in practice it is generally the best choice as it uses the\
    \ processor to respond as fast as possible to the button press while allowing\
    \ it to get on with other tasks when it isn't. More sophisticated solutions, such\
    \ as using an interrupt or event are often just a way of hiding a polling loop\
    \ and tend to increase inefficiency. Polling loops are generally the best solution,\
    \ but GPIO Zero does provide an alternative in the form of events.\n\n# Events\
    \ and Interrupts\n\nInterrupts and events do make some aspects of IoT programming\
    \ easier, if not more efficient. But first what are interrupts and events?\nAn\
    \ event is like a latch or a memory that something happened. Imagine that there\
    \ is a flag that will be automatically set when an input line changes state. The\
    \ flag is set without the involvement of software, or at least any software that\
    \ you have control over. It is useful to imagine an entirely hardware-based setting\
    \ of the flag, even if this is not always the case. With the help of an event,\
    \ you can avoid missing an input because the polling loop was busy doing something\
    \ else. Now the polling loop reads the flag rather than the actual state of the\
    \ input line and hence it can detect if the line has changed since it was last\
    \ polled. The polling loop resets the event flag and processes the event. Of course,\
    \ it can't always know exactly when the event happened, but at least it hasn't\
    \ missed it altogether.\n\nA simple event can avoid the loss of a single input,\
    \ but what if there is more than one input while the polling loop is unavailable?\
    \ The most common solution is to create an event queue – that is, a FIFO (first\
    \ in, first out) queue of events as they occur. The polling loop now reads the\
    \ event at the front of the queue, processes it and reads the next. It continues\
    \ like this until the queue is empty, when it simply waits for an event. As long\
    \ as the queue is big enough, an event queue means you don't miss any input, but\
    \ input events are not necessarily processed close to the time that they occurred.\
    \ They should be processed in order, but unless the events are time-stamped the\
    \ program has no idea when they happened."
  merge: -1
  pgno: 95
- img_proc: true
  md: 'An event queue is a common architecture, but to work, or have any advantages,
    it needs either multiple cores. so that events can always be added to the queue
    before another occurs, or it needs the help of hardware, usually in the form of
    interrupts. Notice that an event, or an event queue, cannot increase the program’s
    throughput or its latency, the time to react to an input. In fact, an event queue
    decreases throughput and increases latency due to overheads of implementation.
    All an event system does is to ensure that you do not miss any input and that
    all input gets processed eventually. Interrupts are often confused with events
    but they are very different. An interrupt is a hardware mechanism that stops the
    computer doing whatever it is currently doing and makes it transfer its attention
    to running an interrupt handler. You can think of an interrupt as an event flag
    that, when set, interrupts the current program to run the assigned interrupt handler.
    Using interrupts means the outside world decides when the computer should pay
    attention to input and there is no need for a polling loop. Most hardware people
    think that interrupts are the solution to everything and polling is inelegant
    and only to be used when you can’t use an interrupt. This is far from the reality.


    There is a general feeling that real-time programming and interrupts go together
    and if you are not using an interrupt you are probably doing something wrong.
    In fact, the truth is that if you are using an interrupt you are probably doing
    something wrong. So much so that some organizations are convinced that interrupts
    are so dangerous that they are banned. Interrupts are only really useful when
    you have a low-frequency condition that needs to be dealt with on a high-priority
    basis. Interrupts can simplify the logic of your program, but rarely does using
    an interrupt speed things up because the overhead involved in interrupt handling
    is usually quite high. If you have a polling loop that takes 100ms to poll all
    inputs and there is an input that demands attention in under 60ms then clearly
    the polling loop is not going to be good enough. Using an interrupt allows the
    high priority event to interrupt the polling loop and be processed in less than
    100ms. However, if this happens very often the polling loop will cease to work
    as intended. Notice that an alternative is to simply make the polling loop check
    the input twice per loop.


    For a more real-world example, suppose you want to react to a doorbell push button.
    You could write a polling loop that simply checks the button status repeatedly
    and forever, or you could write an interrupt service routine (ISR) to respond
    to the doorbell. The processor would be free to get on with other things until
    the doorbell was pushed, when it would stop what it was doing and transfer its
    attention to the ISR. How good a design this is depends on how much the doorbell
    has to interact with the rest of the program and how many doorbell pushes you
    are expecting. It takes time to respond to the doorbell push and then the ISR
    has to run to completion. What is going to'
  merge: -1
  pgno: 96
- img_proc: true
  md: "happen if another doorbell push happens while the first push is still being\
    \ processed? Some processors have provision for forming a queue of interrupts,\
    \ but it doesn't help with the fact that the process can only handle one interrupt\
    \ at a time. Of course, the same is true of a polling loop, but if you can't handle\
    \ the throughput of events with a polling loop, you can't handle it using an interrupt\
    \ either, because interrupts add the time to transfer to the ISR and back again.\n\
    \nFinally, before you dismiss the idea of having a processor do nothing but ask\
    \ repeatedly \"is the doorbell pressed\", consider what else it has to do. If\
    \ the answer is \"not much\" then a polling loop might well be your simplest option.\
    \ Also, if the processor has multiple cores, then the fastest way of dealing with\
    \ any external event is to use one of the cores in a fast polling loop. This can\
    \ be considered to be a software emulation of a hardware interrupt – not to be\
    \ confused with a software interrupt or trap, which is a hardware interrupt triggered\
    \ by software. If you are going to use interrupts to service input then a good\
    \ design is to use the interrupt handler to feed an event queue. This at least\
    \ lowers the chance that input will be missed.\n\nDespite their attraction, interrupts\
    \ are usually a poor choice for anything other than low-frequency events that\
    \ need to be dealt with quickly.\n\n# Asynchronous Buttons\n\nGPIO Zero implements\
    \ an event-driven approach to asynchronous programming that is presented as if\
    \ it was an interrupt. You can specify a function to be called when Button is\
    \ pressed or released using the when_pressed and when_released properties. For\
    \ example:\n\n```\nfrom gpiozero import Button\nfrom signal import pause\nbutton\
    \ = Button(4,bounce_time=0.25)\n\ndef pressed():\n    print(\"Button pressed\"\
    )\n\ndef released():\n    print(\"Button released\")\n\nbutton.when_pressed =\
    \ pressed\nbutton.when_released = released\npause()\n```\n\nNotice that you need\
    \ the pause at the end of the program to stop the program coming to an end. You\
    \ could just put the program into an infinite loop and do other things while waiting\
    \ for the button press/release. Also notice that when_pressed and when_released\
    \ are assigned as references to the functions and the functions are not called\
    \ until later."
