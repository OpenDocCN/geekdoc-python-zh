    | 蓝牙 4.2 |

    | 低功耗蓝牙 (BLE) |

    | 1.4GHz，四核 64 位 CPU |

    | 512MB 内存 |

    | 一个 USB 2 端口 |

    | 无以太网 |


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_13_0.png)


    在 Pi 5 到来之前，Pi 4 是可用的最快树莓派。最便宜的 1GB 内存版本与 3B+ 价格相同（35 美元）。在该系列的高端，8GB 版本售价 75
    美元，对于物联网应用来说开始显得昂贵——即便如此，你花这笔钱也能获得强大的计算能力。它还支持双 HDMI 显示器，使其非常适合开发用途。你也可以购买 P400（70
    美元），它是一款内置 4GB 内存的 Pi 4，集成在键盘中，可直接用作台式电脑。


    | Pi 4 |

    | --- |

    | 802.11 b/g/n/ac 无线局域网 2.4 GHz 和 5.0 GHz |

    | 蓝牙 4.2 |

    | 低功耗蓝牙 (BLE) |

    | 1.8 GHz，四核 64 位 CPU |

