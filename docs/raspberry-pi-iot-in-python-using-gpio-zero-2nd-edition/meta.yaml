- md: "## A First IoT Program\n\nThe purpose of this program is to just let you check\
    \ that everything is working, the functions used will be explained in detail later.\n\
    Start a new program called blinky. Then enter the program:\n\n```\nfrom gpiozero\
    \ import LED\nfrom time import sleep\n\nled = LED(4)\n\nwhile True:\n    led.on()\n\
    \    sleep(1)\n    led.off()\n    sleep(1)\n```\n\nYou don't have to install gpiozero\
    \ or sleep as they are standard modules on a Pi. Even though you don't know much\
    \ about GPIO Zero just yet, it isn't difficult to understand what is going on\
    \ in the program. First we create an LED Python object associated with GPIO4 and\
    \ then an infinite loop turns the LED on and off with a pause of 1 second between\
    \ each action. The LED on command sets GPIO4 to a high voltage and the off command\
    \ sets it low – on/off or high/low its the same thing.\nIf this works, GPIO4 which\
    \ is Pin 7 on the Pi's connector, is set to be an output and then the loop turns\
    \ it on and off (high voltage then low) with a delay of one second.\nThe library\
    \ uses logical GPIO numbers assigned within the Pi's processor. These GPIO lines\
    \ are brought out to the Pi's connector and the logical GPIO numbers don't correspond\
    \ to the pins on the connector. In this case GPIO4 is Pin 7 on connector P1.\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_31_0.png)\n\nIf you want to connect\
    \ an LED to see the \"blinking\" for real then this is easy enough, but you do\
    \ need a current-limiting resistor - 200Ω is a good choice. The reason for the\
    \ resistor is explained in Chapter 7.\nHow you build the circuit is up to you.\
    \ You can use a prototyping board or just a pair of jumper wires. The short pin\
    \ and/or the flat on the side of the case marks the negative connection on the\
    \ LED - the one that goes to Pin 6.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_32_0.png)\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_32_1.png)\n\nIf you can't be bothered\
    \ to go through the ritual of testing \"blinky\" with a real LED, then just connect\
    \ a logic analyzer to Pin 7 and you will see 1-second pulses.\n\n## Pin Numbering\n\
    \nSomething that drives every programmer mad is the different ways of referring\
    \ to the numbering of the GPIO pins. There is the physical pin number, i.e. the\
    \ number of the pin on the physical connector, and the logical GPIO number, which\
    \ is assigned deep in the hardware.\n\nFor most of the Pi family the standard\
    \ 40-pin connector is largely the same:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_33_0.png)\n\
    \nGPIO Zero works in terms of logical pin numbers so you need to use these diagrams\
    \ to look up which physical pin you have to connect to. So for example, “GPIO4”,\
    \ or just 4, specifies physical pin 7. You can also use the notation “header:pin”\
    \ where header is the name of the connector. So for example, “J8:7” is Pin 7,\
    \ i.e. GPIO4 on modern Pis. Another alternative is to use the notation “BOARDpin”\
    \ e.g. “BOARD7” is Pin 7, i.e. GPIO4. It doesn’t matter how you specify the pin\
    \ to use, it is automatically converted to the GPIO pin number and this is how\
    \ the pin number is returned if you request it.\n\nIf you study the diagrams,\
    \ you will see that there are many GPIO lines – GPIO1 to GPIO27. There are other\
    \ GPIO lines. Some are used internally by the Pi to do things like control a status\
    \ LED and some are simply not brought out to the connector. In some cases you\
    \ can gain access to the lines that are used internally, but in most cases this\
    \ isn’t a good idea as making the physical connection is difficult.\n\nThe command\
    \ pinout can be used from the console to see the pins and the general configuration\
    \ of the device you are using:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_34_0.png)\n\
    \nFinding a pin can be difficult without a printed label and there are a number\
    \ of aids on the market:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_34_1.png)\n\
    \n*RasPiO® GPIO Ruler from Pimoroni*\n\nThe most common way of doing the job without\
    \ a label is to count from the top or the bottom of the inner or outer column\
    \ of pins. The following diagram makes this slightly easier:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_34_2.png)\n\
    \nNotice that the pin number is supposed to start from one at each end of the\
    \ connector – its is what makes the counting easier!\n\n## GPIO Modes\n\nAlthough\
    \ GPIO Zero gives you access to devices like LEDs, which means you can mostly\
    \ ignore the basic GPIO lines, you still have to select which one to use and this\
    \ isn't quite as easy as it looks.\nThe available GPIO lines are shown in the\
    \ following diagram:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_35_0.png)\n\n\
    You may also notice that many of the pins on the pinout diagrams have two labels.\
    \ For example, GPIO2 is also labeled as SDA1. Many, but not all, of the GPIO lines\
    \ have alternative functions such as connecting SPI devices, more of which later.\
    \ In general, you should avoid using pins which have an alternative function as\
    \ general-purpose I/O lines. The reason is that you might need to use one of the\
    \ special functions later in your project's development and, if it is already\
    \ used as a GPIO line, you will not only have to change all the pin assignments,\
    \ which is relatively easy, but also all of the hardware connections, which is\
    \ harder. This is much less of a problem if you restrict yourself to basic GPIO\
    \ Zero as it supports many features via software that works on any pin. However,\
    \ you may want to go outside GPIO Zero and use the alternative functions of the\
    \ GPIO lines.\nIn practice, for general GPIO tasks use:\nGPIO 4, 5, 6, 12, 13,\
    \ 17, 18, 22, 23, 24, 25, 26 and 27\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_35_1.png)\n\
    \n> The “preferred” GPIO pins.\n\nThen use:\nGPIO 2, 3, 9, 7, 8, 16, 10, 11, 14,\
    \ 15, 19, 20 and 21\nin that order. The reason for the non-sequential order is\
    \ that some GPIO lines work as a group and once you have used one you might as\
    \ well use the others.\n\nThis isn't a definitive rule because the Pi 4/5 offers\
    \ additional modes for many of the GPIO lines. Although the situation is very\
    \ complicated, don't worry too much as changing which GPIO line is being used\
    \ in software is easy and, unless you have reached a late prototyping stage, it\
    \ is fairly easy in hardware.\n\n## Hardware and Software Working Together\n\n\
    Although Blinky is a very simple program it is typical of the process of working\
    \ with IoT projects and some of the comments made at the start of the chapter\
    \ should make more sense. All IoT projects are a combination of hardware and software.\
    \ Usually you have to connect some device to a set of GPIO lines. In some cases\
    \ you can select which lines you want to use, but in others the lines are fixed\
    \ and you have to use the lines that are specified.\nOnce you are happy that the\
    \ device is connected to the GPIO lines and powered properly, you can move on\
    \ to the software. In most cases you will be able to use a GPIO Zero class designed\
    \ to work with the device. Then all you have to do is specify the GPIO pins you\
    \ have used to connect the device, if they aren't fixed, and then use the methods\
    \ provided to control the device. In many cases the device can be so abstracted\
    \ from GPIO lines that you can forget that they exist. Even the humble LED works\
    \ in terms of On and Off with no reference to the GPIO line being set “high” or\
    \ “low”. More complicated devices hide the fact that they are working with particular\
    \ GPIO lines almost completely and even the notion of on and off or high and low\
    \ vanishes. However, you need to keep in mind that the inputs and outputs of the\
    \ Pi really are just GPIO lines that change state from high to low and low to\
    \ high.\nIn later chapters we look not only at the standard devices that GPIO\
    \ Zero supports, but how to create classes that make new devices easier to work\
    \ with.\n\n## Summary\n\n- A first IoT program is particularly easy in GPIO Zero.\
    \ The standard Blinky example only needs an LED object and the use of its on and\
    \ off methods. All you have to do is assign a GPIO line and connect an LED to\
    \ it.\n- Pin numbering is complicated by the fact that there are GPIO numbers\
    \ and physical pin numbers. The simplest thing to do is to always use the GPIO\
    \ numbers as assigned by the processor and convert these to pin numbers when you\
    \ connect up.\n- The pinout command used at the Pi console will print a map of\
    \ the pins.\n- You can buy labels that help find a particular pin or just adopt\
    \ the technique of counting pins from either end on the inside or outside row\
    \ of the connector.\n- Not all of the GPIO lines that the Pi has are brought out\
    \ on the main connector. Some are used internally and some are simply ignored.\n\
    - Some of the GPIO lines have alternative functions and these are best avoided\
    \ if all you need is a simple GPIO input/output line.\n- All IoT projects are\
    \ a mix of hardware and software. Usually there is a phase where you experimentally\
    \ connect the hardware and write some instructions just to check that you have\
    \ it connected correctly before moving on to creating the real project."
  mdcn: "## 第一个物联网程序\n\n本程序的目的只是让你检查一切是否正常工作，所使用的函数将在后面详细解释。\n创建一个名为 `blinky` 的新程序，然后输入以下代码：\n\
    \n```\nfrom gpiozero import LED\nfrom time import sleep\n\nled = LED(4)\n\nwhile\
    \ True:\n    led.on()\n    sleep(1)\n    led.off()\n    sleep(1)\n```\n\n你无需安装\
    \ `gpiozero` 或 `sleep`，因为它们是树莓派上的标准模块。尽管你对 GPIO Zero 还不太了解，但理解程序中的内容并不困难。首先，我们创建一个与\
    \ GPIO4 关联的 LED Python 对象，然后在一个无限循环中，以每次操作间隔 1 秒的方式，控制 LED 的开启和关闭。LED 的 `on` 命令将\
    \ GPIO4 设置为高电压，`off` 命令将其设置为低电压——开/关或高/低是同一回事。\n如果这能正常工作，那么 GPIO4（即树莓派连接器上的引脚\
    \ 7）就被设置为输出，然后循环以一秒的延迟将其开启和关闭（高电压然后低电压）。\n该库使用分配在树莓派处理器内部的逻辑 GPIO 编号。这些 GPIO 线路被引出到树莓派的连接器上，逻辑\
    \ GPIO 编号与连接器上的物理引脚编号并不对应。在这种情况下，GPIO4 是连接器 P1 上的引脚 7。\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_31_0.png)\n\
    \n如果你想连接一个 LED 来实际观察“闪烁”效果，这很容易，但你确实需要一个限流电阻——200Ω 是一个不错的选择。电阻的原因在第 7 章解释。\n如何构建电路取决于你自己。你可以使用原型板，或者只用一对跳线。LED\
    \ 上的短引脚和/或外壳侧面的平面标记了负极连接——即连接到引脚 6 的那一端。\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_32_0.png)\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_32_1.png)\n\n如果你不想费心用真实 LED 来测试“blinky”，那么只需将逻辑分析仪连接到引脚\
    \ 7，你就会看到 1 秒的脉冲。\n\n## 引脚编号\n\n让每个程序员都抓狂的事情之一，就是指代 GPIO 引脚编号的不同方式。有物理引脚编号，即物理连接器上引脚的编号，还有逻辑\
    \ GPIO 编号，这是在硬件深处分配的。\n\n对于大多数树莓派系列，标准的 40 引脚连接器基本相同：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_33_0.png)\n\
    \nGPIO Zero 使用逻辑引脚编号工作，因此你需要使用这些图表来查找你必须连接到的物理引脚。例如，“GPIO4”或简写为 4，指定的是物理引脚 7。你也可以使用“header:pin”的表示法，其中\
    \ header 是连接器的名称。例如，“J8:7”是引脚 7，即现代树莓派上的 GPIO4。另一种替代方法是使用“BOARDpin”表示法，例如“BOARD7”是引脚\
    \ 7，即 GPIO4。无论你如何指定要使用的引脚，它都会自动转换为 GPIO 引脚编号，如果你请求引脚编号，返回的就是这个编号。\n\n如果你研究这些图表，你会看到有许多\
    \ GPIO 线路——GPIO1 到 GPIO27。还有其他 GPIO 线路。有些被树莓派内部用于控制状态 LED 等功能，有些则根本没有引出到连接器。在某些情况下，你可以访问内部使用的线路，但在大多数情况下，这不是一个好主意，因为进行物理连接很困难。\n\
    \n`pinout` 命令可以从控制台使用，以查看你所使用设备的引脚和总体配置：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_34_0.png)\n\
    \n在没有印刷标签的情况下找到引脚可能很困难，市场上有一些辅助工具：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_34_1.png)\n\
    \n*来自 Pimoroni 的 RasPiO® GPIO 尺子*\n\n在没有标签的情况下完成这项工作最常见的方法是从内侧或外侧引脚列的顶部或底部开始计数。下图使这变得稍微容易一些：\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_34_2.png)\n\n请注意，引脚编号应该从连接器的每一端从 1\
    \ 开始——这使得计数更容易！\n\n## GPIO 模式\n\n尽管 GPIO Zero 让你可以访问像 LED 这样的设备，这意味着你基本上可以忽略基本的\
    \ GPIO 线路，但你仍然必须选择使用哪一条，而这并不像看起来那么容易。\n可用的 GPIO 线路如下图所示：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_35_0.png)\n\
    \n你可能还会注意到，引脚图上的许多引脚有两个标签。例如，GPIO2 也标记为 SDA1。许多（但不是全部）GPIO 线路具有替代功能，例如连接 SPI 设备，稍后会详细介绍。一般来说，你应该避免将具有替代功能的引脚用作通用\
    \ I/O 线路。原因是你可能在项目开发的后期需要使用其中一个特殊功能，如果它已经被用作 GPIO 线路，你不仅需要更改所有引脚分配（这相对容易），还需要更改所有硬件连接（这更困难）。如果你将自己限制在基本的\
    \ GPIO Zero 内，这个问题就小得多，因为它通过在任何引脚上工作的软件支持许多功能。然而，你可能想要超出 GPIO Zero 的范围，使用 GPIO\
    \ 线路的替代功能。\n实际上，对于一般的 GPIO 任务，请使用：\nGPIO 4, 5, 6, 12, 13, 17, 18, 22, 23, 24,\
    \ 25, 26 和 27\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_35_1.png)\n\n> “首选”的\
    \ GPIO 引脚。\n\n然后按此顺序使用：\nGPIO 2, 3, 9, 7, 8, 16, 10, 11, 14, 15, 19, 20 和 21。\n\
    非顺序排列的原因是，一些 GPIO 线路作为一组工作，一旦你使用了其中一个，不妨使用其他的。\n\n这不是一个绝对的规则，因为树莓派 4/5 为许多 GPIO\
    \ 线路提供了额外的模式。尽管情况非常复杂，但不必太担心，因为在软件中更改正在使用的 GPIO 线路很容易，而且除非你已经到了后期原型阶段，否则在硬件中更改也相当容易。\n\
    \n## 硬件和软件协同工作\n\n尽管 Blinky 是一个非常简单的程序，但它代表了物联网项目工作流程的典型过程，本章开头的一些评论应该更有意义了。所有物联网项目都是硬件和软件的结合。通常，你必须将一些设备连接到一组\
    \ GPIO 线路。在某些情况下，你可以选择要使用的线路，但在其他情况下，线路是固定的，你必须使用指定的线路。\n一旦你确认设备已正确连接到 GPIO 线路并供电正常，就可以转向软件了。在大多数情况下，你将能够使用为与该设备配合工作而设计的\
    \ GPIO Zero 类。然后，你所要做的就是指定用于连接设备的 GPIO 引脚（如果它们不是固定的），然后使用提供的方法来控制设备。在许多情况下，设备可以与\
    \ GPIO 线路高度抽象，以至于你可以忘记它们的存在。即使是简单的 LED 也以开和关的方式工作，而无需引用 GPIO 线路被设置为“高”或“低”。更复杂的设备几乎完全隐藏了它们与特定\
    \ GPIO 线路工作的事实，甚至开和关或高和低的概念也消失了。然而，你需要记住，树莓派的输入和输出实际上只是状态从高到低、从低到高变化的 GPIO 线路。\n\
    在后面的章节中，我们不仅会探讨 GPIO Zero 支持的标准设备，还会探讨如何创建使新设备更易于使用的类。\n\n## 总结\n\n- 在 GPIO Zero\
    \ 中，第一个物联网程序特别简单。标准的 Blinky 示例只需要一个 LED 对象及其 `on` 和 `off` 方法的使用。你所要做的就是分配一条 GPIO\
    \ 线路并将 LED 连接到它。\n- 引脚编号因存在 GPIO 编号和物理引脚编号而变得复杂。最简单的做法是始终使用处理器分配的 GPIO 编号，并在连接时将它们转换为引脚编号。\n\
    - 在树莓派控制台使用的 `pinout` 命令将打印引脚映射图。\n- 你可以购买标签来帮助找到特定的引脚，或者采用从连接器内侧或外侧行的任一端开始计数引脚的技术。\n\
    - 树莓派拥有的所有 GPIO 线路并非都引出到主连接器上。有些在内部使用，有些则被忽略。\n- 一些 GPIO 线路具有替代功能，如果你只需要简单的 GPIO\
    \ 输入/输出线路，最好避免使用它们。\n- 所有物联网项目都是硬件和软件的混合体。通常有一个阶段，你实验性地连接硬件并编写一些指令，只是为了检查连接是否正确，然后再继续创建真正的项目。"
