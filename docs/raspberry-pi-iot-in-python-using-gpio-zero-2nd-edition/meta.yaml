  md: 'can be written as:


    ```

    from gpiozero import LED

    from signal import pause

    led = LED(4)

    led.blink(on_time=1,off_time=1,n=100)

    print("Program Complete")

    pause()

    ```


    If you try this out you will discover that the LED keeps flashing for almost 200
    seconds after the program has printed Program Complete. Notice that you need the
    pause at the end of the program because if your program comes to a halt so do
    any threads that the program has created. In short, without pause() you wouldn''t
    see the LED flash at all. The point is that usually when you give a Python instruction
    you only move on to the next instruction when the current instruction has completed.


    This is generally called “blocking” because the current instruction stops the
    next instruction executing before it is complete. The call to blink is non-blocking
    because it returns before it has finished everything you told it to do and the
    next instruction is executed while it is unfinished. Instructions that are non-blocking
    are very useful when working with hardware because it allows your program to get
    on with something else while the hardware is doing something.


    Compare the behavior of the background non-blocking program with a blocking version:


    ```

    from gpiozero import LED

    led = LED(4)

    led.blink(on_time=1,off_time=1,n=100,background=False)

    print("Program Complete")

    ```


    In this case you don''t need the pause() because the program waits for the LED
    to have completed 100 flashes. You will only see the Program Complete message
    after 200 seconds.


    It is interesting that in either case the blink method makes use of a new thread
    to run LED in the background, the only difference is that when background is False
    the main thread waits for the blink thread to complete.'
