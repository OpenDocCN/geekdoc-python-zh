    # The Book’s Roadmap


    After covering how to get started with Python on the Pi using Thonny we take a
    look at the basic ideas of using Python to work with the GPIO lines and then take
    a detour into object-oriented Python – just enough to understand what GPIO Zero
    is doing.


    From here we look in detail at simple on/off devices and show how to create custom
    devices. Although devices are what you most often use, the lowest-level approach
    is to use the Pin class and gain direct access to a GPIO line via a pin factory.
    The next chapter goes over the sort of basic electronics you need to get started
    with the IoT – it’s not all you will ever need’, but we hope it is enough to stop
    you destroying your Pi and whatever you connect to it.


    From here we move on to simple, complex and internal input devices. This is also
    an introduction to GPIO Zero’s ingenious source/values approach to declarative
    programming. We not only look at the basics, but show how to create custom classes
    to work with source/values.


    Chapter 10 marks a shift in topic away from simple devices and GPIO lines to look
    at higher-level protocols – pulse width modulation, PWM, in this case. PWM is
    used for all sorts of things PWM it is commonly used with servo and DC motors
    and the next chapter deals with motors of all kinds, including unidirectional
    and bidirectional motors, with the help of an H bridge, servos, brushless DC motors
    and stepper motors, including a custom stepper motor device.


    GPIO Zero has a feature whereby you can group different devices into larger compound
    devices. In Chapter 12 we explain the basics of the supplied devices and show
    how to use the idea to improve on the custom stepper motor device introduced earlier.


    The next two chapters are all about the SPI bus. Starting from the basics and
    the supported SPI devices, we move on to consider how the SPI bus works and implement
    a custom SPI device.


    The final chapter is about lgpio which is the library used to implement GPIO Zero
    on all versions of the Pi including the Pi 5.'
