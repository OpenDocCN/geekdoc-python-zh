  - "[PAGE 43]\n\nJust as whenever you assign to a variable it is created if it doesn't\
    \ already exist, so when you assign to an attribute it is created if it doesn't\
    \ already exist. Using this mechanism `__init__` can create new attributes on\
    \ the instance of the class that it is just creating.\n\nAll of this comes down\
    \ to two practices when you create a new class:\n\n+   - Create any data attributes\
    \ within the `__init__` function using `self` to reference the object being created,\
    \ e.g. `self.attribute = 0`\n- Create any methods in the body of the class using\
    \ `self` as the first parameter, e.g. `def method(self):`\n\nAs an example we\
    \ can implement a class that represents a 2-D co-ordinate:\n\n```\nclass Point:\n\
    \    def __init__(self,x,y):\n        self.x=x\n        self.y=y\n\n    def sum(self):\n\
    \        print(self.x+self.y)\n\n    def distance(self):\n        return self.x**2+self.y**2\n\
    ```\n\nNotice that in the `__init__` function we create two attributes, x and\
    \ y and store the values of the x and y parameters in them. This is how you can\
    \ initialize attributes with values provided when the object is created. That\
    \ is:\n\n```\npoint=Point(1,2)\nprint(point.x)\n```\n\ndisplays 1. The methods\
    \ are simple, but notice the use of `self` to refer to attributes of the current\
    \ instance. That is, in the sum method `self.x` becomes `point.x` when the function\
    \ is called. That is:\n\n```\npoint.sum()\nprint(point.distance())\n```\n\nprints\
    \ 3 and 5 respectively. Notice that distance returns a value but sum doesn't –\
    \ both are valid methods. If you want to call another method from within a method,\
    \ you have to use `self` in the same way as for data attributes, e.g. `self.sum()`."
  - "[PAGE 44]\n\n# Inheritance\n\nVery often you find that the new class you want\
    \ is very much like an existing class. The obvious solution is to copy and paste\
    \ the text of the old class as a starter for the new class. This is workable and\
    \ it is how most code was “reused” in the past, but today we have other ways of\
    \ doing the same job. Inheritance is how object-oriented languages like Python\
    \ implement reuse.\n\nIf you write:\nclass myNewClass(myOldClass)\nthen myNewClass\n\
    \nhas all of the attributes of myOldClass just as if you had used copy and paste.\
    \ Unlike copy and paste, however, the connection between the old and new is live.\
    \ If you make a change to the old class, the change is also made to the new class\
    \ – they share the same base code. The new class is said to “inherit from”, “derive\
    \ from” or “sub-class” the old class, which is its “base class” or “super class”.\
    \ This sounds useful because if you find an error in the base class you can correct\
    \ it and the correction will be inherited by all of the derived classes. This\
    \ is generally good but also dangerous. If the derived classes make any assumptions\
    \ about the base class, then changes could result in all of them breaking. This\
    \ is often called the problem of the “fragile” base class. Even so, many programmers\
    \ agree that inheritance is better than copy and paste programming.\n\nYou can\
    \ of course add attributes to the new class and you can provide replacements,\
    \ or “override”, methods that it inherits. For example, we can create a Point3D\
    \ class from the Point class:\n\n```\nclass Point3d(Point):\n    def __init__(self,x,y,z):\n\
    \        self.x=x\n        self.y=y\n        self.z=z\n    def distance(self):\n\
    \        return self.x**2+self.y**2+self.z**2\n```\n\nIn this case we have inherited\
    \ all of the methods of Point, but a new __init__ is used to create x,y and z\
    \ as data attributes and we have overridden the inherited distance method to use\
    \ the extra z attribute. Notice that you can still use the inherited sum method:\n\
    \n```\npoint=Point3d(1,2,3)\nprint(point.x)\npoint.sum()\nprint(point.distance())\n\
    ```\n\nwhich displays 1, 3 and 14."
  - "[PAGE 45]\n\nNotice that you can modify and add to inherited attributes, but\
    \ you cannot easily remove them. It is part of the object-oriented philosophy\
    \ that classes get “bigger” as they are inherited – a Point3d object is “bigger”\
    \ in the sense that it generally has more attributes than a Point object.\n\n\
    # The Need For Super\n\nThe key idea is that a class inherits everything its super\
    \ class has, but this isn’t quite as simple as it sounds. Consider for a moment\
    \ a small change to the Point3D class based on this idea. As the Point3D class\
    \ inherits everything that the Point class has, we don’t need to redefine the\
    \ x and y attributes as these are inherited:\n\n```\nclass Point3d(Point):\n \
    \   def __init__(self,x,y,z):\n        self.z=z\n    def distance(self):\n   \
    \     return self.x**2+self.y**2+self.z**2\n```\n\nIn this version we only define\
    \ the new z attribute. If you try this out you will find that it generates an\
    \ error reporting that one of x or y isn’t defined.\nThe point is that Point3d\
    \ doesn’t inherit x and y from Point, but it does inherit its __init__ function\
    \ which creates them. That is, to make Point3D inherit all of the attributes that\
    \ Point has, it has to call Point.__init__():\n\n```\nclass Point3d(Point):\n\
    \    def __init__(self,x,y,z):\n        Point.__init__(x,y)\n        self.z=z\n\
    ```\n\nIf you try this out you will find it doesn’t work because the call to Point.__init__\
    \ doesn’t have a value for self. In this case you have to explicitly pass a value\
    \ for self that gives the instance being created.\nSo the correct version of calling\
    \ the super class __init__ function is:\n\n```\nclass Point3d(Point):\n    def\
    \ __init__(self,x,y,z):\n        Point.__init__(self,x,y)\n        self.z=z\n\
    ```\n\nThis creates the x and y attributes as part of any instance that Point3d\
    \ creates.\nIt is generally considered bad practice to call the methods belonging\
    \ to the super using the name of the super class, i.e. Point in this example.\
    \ It works for any super class method you want to call, but Python provides the\
    \ super function to make this easier. The super function automatically returns\
    \ the super class of the class it is called in and when you use it to call a super\
    \ class method, it automatically supplies the self parameter."
  - "[PAGE 46]\n\nSo the best way to call the super class __init__ function is to\
    \ use:\n\n```\nclass Point3d(Point):\n    def __init__(self,x,y,z):\n        super().__init__(x,y)\n\
    \        self.z=z\n```\n\nThere are many variations on the use of super, but this\
    \ is the most basic and the one you should know.\nYou have to remember that the\
    \ idea that a class inherits everything from its super class is only true if you\
    \ take the trouble to make it true. In general, you have to call the super class\
    \ __init__ function and you have to make sure you pass the correct parameters\
    \ to it to create the attributes you want.\n\n# Multiple Inheritance – The Mixin\n\
    \nSo far we have regarded the idea of inheritance as a way of getting a starting\
    \ point for a new class that is similar to an existing class. This idea is fundamental\
    \ to the object-oriented philosophy, which goes well beyond simple practical concerns\
    \ and considers that the inheritance of objects is key to the way we should program.\
    \ You start out by creating very general classes and slowly use inheritance to\
    \ derive increasingly more sophisticated and specific classes. This gives rise\
    \ to an inheritance hierarchy. For example, GPIO Zero has a class hierarchy for\
    \ output devices:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_46_0.png)\n\nYou\
    \ can see that Device is at the top of the hierarchy and the classes become more\
    \ specialized as you move down the hierarchy, i.e. move to the right in this rotated\
    \ diagram. Thus Device is inherited by GPIODevice which is in turn inherited by\
    \ OutputDevice, and then by DigitalOutputDevice and finally LED. This sort of\
    \ hierarchy is supposed to be a model of the real world and the way we think about\
    \ the relations between objects in the real world."
  - '[PAGE 47]


    This works well when you are working with electronic devices that have obvious
    relationships, but don''t let this fool you into thinking that this is the way
    object hierarchies work in the wider world. In the more general case, relationships
    between things are not well modeled by simple inheritance hierarchies and things
    are much more difficult. If you read up on object-oriented programming you will
    encounter many systems of rules, regulations and guidelines. If they make sense
    to you in the situation that you are programming in then by all means follow them,
    but the current state of programming theory is that no-one is in a position of
    authority to tell you how to program – it is all opinion.


    If object-oriented programming theory is so problematic, why is it the most dominant
    method of programming? The simple answer is that even if, or perhaps especially
    if, you just regard it as a way of reusing code, then it is remarkably effective.
    Objects are a good way of packaging code that works together and providing it
    for others to use and inheritance is a good way to reuse code. It is also the
    case that objects are easy to use even if they are hard to invent and implement.
    In this sense we rely on other people to create a good set of objects for us to
    use and in this case the inheritance problem is their problem.


    So, if a little inheritance is a good thing, why not multiple inheritance? That
    is, why not let a class inherit its attributes from multiple classes? This brings
    with it many problems, but the best known is the “diamond” problem – what happens
    if two base classes have an attribute of the same name? Which version of the attribute
    does the derived class use?


    Because of this simple, but serious problem, many object-oriented languages, Java
    and C# for example, do not allow inheritance from more than one class. However,
    Python does. To solve the diamond problem, Python has a set of rules that determines
    which class attribute is used if there is a clash. If you want to know more look
    up the MRO (Method Order Resolution) algorithm in *Programmer''s Python: Everything
    Is An Object, 2nd Ed*, ISBN:978-1871962741, but at this stage the best thing is
    to simply avoid inheriting from classes that have attributes with the same name.
    That is, if you keep things simple, multiple inheritance tends to just work.


    To inherit from more than one class you simply have to write a list of base classes
    when you use the class statement. For example:


    ```

    class myDerivedClass(Base1,Base2, Base3):

    ```


    Following this myDerivedClass has all the attributes of Base1, Base2 and Base3.
    If by any chance they do have an attribute of the same name, then in this simple
    situation the MRO algorithm reduces to simply taking the first definition reading
    left to right. So if all three classes had a myAttribute attribute, the one defined
    in Base1 would be used.'
- md: "Multiple inheritance can be very complicated, confusing and error-prone, but\
    \ there is one situation in which it is much easier, the mixin. This is just a\
    \ base class used in multiple inheritance and has nothing new to add to the Python\
    \ language – it is the way you think about it that is different. The normal flow\
    \ of inheritance is that the derived class is a more elaborate version of the\
    \ base class. An LED is a DigitalOutputDevice with some extra attributes specific\
    \ to the LED object. It is the “is a” relationship that motivates the inheritance.\n\
    \nA mixin isn't a base class in the same sense. It is just a bundle of methods\
    \ that you want to give a class without implying anything about a theoretical\
    \ relationship. For example, suppose you create a Debug class complete with some\
    \ useful debugging functions such as name() to print the name of the object, create()\
    \ time of creation, etc. You might want to add the Debug class to a class, not\
    \ because it is a type of Debug class, but just because the behavior added by\
    \ the Debug class is useful. For example:\n\n```python\nclass LED(DigitalOutputDevice,\
    \ Debug):\n```\n\ncreates an LED class that inherits from DigitalOutputDevice\
    \ in the sense that it “is a” DigitalOutputDevice and inherits some useful methods\
    \ from the Debug mixin. This is a philosophical distinction, but sometimes a useful\
    \ one. Notice that if we add Debug to DigitalOutputDevice then all of the classes\
    \ that derive from it, LED and Buzzer in this case, also inherit Debug. A mixin\
    \ works from the point of view of inheritance in the same way as any other class\
    \ - it's how you think of it that is different.\n\nThere is one way that mixins\
    \ often differ, but again it's a convention. Mixins generally only have methods\
    \ and not data attributes. One reason for this is that it means that a derived\
    \ class doesn't have to call the mixin's `__init__` method and so using it is\
    \ simpler. However, this is a convention and if your mixin needs some data attributes\
    \ there is no real reason to avoid them and GPIO Zero certainly doesn't.\n\nGPIO\
    \ Zero has a number of useful mixins, but they tend to be difficult to understand\
    \ because they do sophisticated things. For example, the HoldMixin adds a set\
    \ of methods and data attributes to implement a `when_held` event, for example\
    \ to detect when a Button is held down. It can be added to any class that the\
    \ concept of “holding” makes sense.\n\n## Virtual Base Classes\n\nIf you study\
    \ GPIO Zero you might be surprised at how many base classes there are. It almost\
    \ certainly wasn't designed like that from the start and the hierarchy was most\
    \ probably constructed by “refactoring”, that is looking at what the classes were\
    \ doing and taking common code to form simpler base classes. At the top of the\
    \ class hierarchy should be the simplest class with methods that all the derived\
    \ classes need. Some languages have the concept of a virtual class, a class that\
    \ simply defines the attributes that any class derived from it has to have. This\
    \ often serves as the base class for a hierarchy as it doesn't even implement\
    \ the methods it defines, leaving that to the next derived class.\n\nPython doesn't\
    \ have virtual classes, but that doesn't stop GPIO Zero from using something that\
    \ looks like a virtual class. If you look at the entire GPIO Zero class hierarchy,\
    \ you will see that Device is the top of the hierarchy:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_49_0.png)\n\
    \nIf you examine the code for Device you will find that, while it does have some\
    \ methods and data attributes, one of its attributes is coded as:\n\n```python\n\
    @property\ndef value(self):\n    \"\"\"\n    Returns a value representing the\
    \ device's state. Frequently, this is a\n    boolean value, or a number between\
    \ 0 and 1 but some devices use larger\n    ranges (e.g. -1 to +1) and composite\
    \ devices usually use tuples to\n    return the states of all their subordinate\
    \ components.\n    \"\"\"\n    raise NotImplementedError\n```\n\nYou can see that\
    \ this makes the class incomplete. It isn't intended to be used to create instances\
    \ because part of the implementation is missing. Instead Device exists to be used\
    \ as a base class for other devices - it is Python's equivalent of a virtual class.\n\
    \nNotice that a virtual class might well be used to create another virtual class\
    \ that is more defined, but still too general to actually be used to create an\
    \ instance. For example Device gives rise to GPIODevice which is slightly more\
    \ specific, but perhaps not developed enough to be used to create an instance.\n\
    \n## Attributes and Properties\n\nA data attribute is the simplest way of allowing\
    \ an object to store data. In this case you can simply use the attribute as if\
    \ it was a variable. For example:\n`myObject.myAttribute = 42`\n\nAttributes work\
    \ well but they are the first step on the way to more sophisticated approaches\
    \ to storing data. For example suppose you have a data attribute that is used\
    \ to store the temperature:\n`MyObject.temperature = 42`\n\nIf this was being\
    \ used to control the temperature of an enclosure via a heater it would be a good\
    \ idea to check that it was set within a reasonable range, 20 to 30 °C say. It\
    \ would also be useful if the temperature could be stored internally in millicentigrade,\
    \ i.e. in thousandths of a centigrade degree, a unit often used by IoT devices.\
    \ With a simple data attribute there is no way to do this, but you can easily\
    \ invent one.\n\nInstead of a data attribute we can create two methods, usually\
    \ called get and set methods:\n\n```python\nclass Heater():\n    def __init__(self):\n\
    \        self.temperature = 22 * 1000\n    def setTemperature(self, t):\n    \
    \    if t < 20: return\n        if t > 30: return\n        self.temperature =\
    \ t * 1000\n    def getTemperature(self):\n        return self.temperature / 1000\n\
    ```\n\nYou can see that we now have a get and a set method and the set checks\
    \ that the value is in range and the get converts back to centigrade. This all\
    \ works, but it means you have to use the temperature attribute in an unnatural\
    \ way:\n```python\nheater = Heater()\nheater.setTemperature(31)\nprint(heater.getTemperature())\n\
    ```\n\nPython has a better way. You can define a property using the `@property`\
    \ decorator. Decorators are a powerful part of Python and if you want to know\
    \ more see *Programmer's Python: Everything is an Object* but in this case we\
    \ just want to make use of it.\n\nFor example:\n\n```python\nclass Heater():\n\
    \    def __init__(self):\n        self._temperature = 22 * 1000\n    @property\n\
    \    def temperature(self):\n        return self._temperature / 1000\n    @temperature.setter\n\
    \    def temperature(self, t):\n        print(t)\n        if t < 20: return\n\
    \        if t > 30: return\n        self._temperature = t * 1000\n```\n\nYou can\
    \ see that we have a get function and a set function defined in a slightly different\
    \ way. We also need to have a “backing” variable, `_temperature`, because now\
    \ we have named the getter and setter temperatures. This might seem slightly more\
    \ complicated, but now you can write:\n\n```python\nheater = Heater()\nheater.temperature\
    \ = 31\nprint(heater.temperature)\n```\n\nand the get and set functions are used\
    \ automatically, i.e. the temperature doesn't change because it is outside of\
    \ the range.\n\nProperties are used for all sorts of reasons throughout GPIO Zero.\
    \ For example, in Device you will find:\n\n```python\n@property\ndef is_active(self):\n\
    \    \"\"\"\n    Returns :data:`True` if the device is currently active and\n\
    \    :data:`False` otherwise. This property is usually derived from\n    :attr:`value`.\
    \ Unlike :attr:`value`, this is *always* a boolean.\n    \"\"\"\n    return bool(self.value)\n\
    ```\n\nThis allows you to write things like:\n\n```python\nif(device.is_active):\n\
    ```\n\nwithout having to convert to Boolean values or make a comparison.\n\n##\
    \ Summary\n\n- Python is an easy language to get started with, but this makes\
    \ it possible to miss that it is an object-oriented language.\n- After using Python\
    \ for a while, beginners often have to go back and discover what makes Python\
    \ object-oriented when they first encounter, and want to use and understand, an\
    \ object-oriented library like GPIO Zero.\n- Objects are packages of data and\
    \ code that are related. The methods work on the data stored in the objects.\n\
    - Object-oriented code starts from the idea that you can convert `object.method()`\
    \ into `method(object)`. The `self` parameter is used to perform this transformation\
    \ in Python.\n- An object is created as an instance of a class, which can be thought\
    \ of as the specification for an object.\n- To create your own classes you need\
    \ the `class` keyword. You also need to use the `__init__` magic method to create\
    \ data attributes.\n- One class, the derived class, can inherit all of the methods\
    \ and attributes of another class, the base class. This allows for code reuse\
    \ if a new class is essentially just an elaboration of an existing class.\n- Derived\
    \ classes have to ensure that their base class instances are properly constructed\
    \ and this usually involves calling the `__init__` method of the base class using\
    \ the `super` function.\n- Python supports multiple inheritance where a derived\
    \ class can inherit the properties and methods of multiple base classes. This\
    \ can create problems if the base classes share attributes or methods with the\
    \ same name.\n- The mixin is a special, and simple, case of multiple inheritance\
    \ where all that is required is to give a class a set of helper methods.\n- Python\
    \ doesn't have virtual classes, which simply act as definitions for the minimum\
    \ set of properties a derived class has to have, but these can be easily simulated.\n\
    - Data attributes are simple, but often you need to perform some processing on\
    \ a value when it is accessed. The best way to do this in Python is to use properties."
  mdcn: "多重继承可能非常复杂、令人困惑且容易出错，但有一种情况要简单得多，那就是混入（mixin）。这只是一个在多重继承中使用的基类，并没有为 Python\
    \ 语言增添任何新东西——不同之处在于你看待它的方式。继承的正常流程是，派生类是基类的更精细版本。LED 是一个具有 LED 对象特定额外属性的 DigitalOutputDevice。正是这种“是一个”的关系驱动了继承。\n\
    \n混入在同样意义上并非基类。它只是一组你希望赋予某个类的方法，而不暗示任何理论上的关系。例如，假设你创建了一个 Debug 类，其中包含一些有用的调试函数，如用于打印对象名称的\
    \ `name()`、创建时间 `create()` 等。你可能想将 Debug 类添加到某个类中，不是因为它是一种 Debug 类，而仅仅是因为 Debug\
    \ 类添加的行为很有用。例如：\n\n```python\nclass LED(DigitalOutputDevice, Debug):\n```\n\n\
    创建了一个 LED 类，它从 DigitalOutputDevice 继承，意味着它“是一个” DigitalOutputDevice，并从 Debug 混入继承了一些有用的方法。这是一种哲学上的区分，但有时很有用。请注意，如果我们把\
    \ Debug 添加到 DigitalOutputDevice，那么所有从它派生的类（在这种情况下是 LED 和 Buzzer）也会继承 Debug。混入在继承方面的工作方式与其他任何类相同——不同之处在于你如何看待它。\n\
    \n混入通常有一个不同之处，但这同样是一种约定。混入通常只有方法而没有数据属性。其中一个原因是，这意味着派生类不必调用混入的 `__init__` 方法，因此使用起来更简单。然而，这是一种约定，如果你的混入需要一些数据属性，没有真正的理由去避免它们，GPIO\
    \ Zero 当然也不会。\n\nGPIO Zero 有许多有用的混入，但它们往往难以理解，因为它们执行的是复杂的操作。例如，HoldMixin 添加了一组方法和数据属性来实现\
    \ `when_held` 事件，例如检测按钮何时被按住。它可以被添加到任何“按住”概念有意义的类中。\n\n## 虚基类\n\n如果你研究 GPIO Zero，你可能会惊讶于基类的数量之多。它几乎肯定不是从一开始就那样设计的，层次结构很可能是通过“重构”构建的，即查看类的功能，并将公共代码提取出来形成更简单的基类。在类层次结构的顶部应该是最简单的类，其方法是所有派生类都需要的。一些语言有虚拟类的概念，一个类仅仅定义了任何从它派生的类必须具有的属性。这通常作为层次结构的基类，因为它甚至不实现它定义的方法，而是留给下一个派生类。\n\
    \nPython 没有虚拟类，但这并不妨碍 GPIO Zero 使用类似虚拟类的东西。如果你查看整个 GPIO Zero 类层次结构，你会看到 Device\
    \ 是层次结构的顶部：\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_49_0.png)\n\n如果你检查 Device\
    \ 的代码，你会发现，虽然它确实有一些方法和数据属性，但其中一个属性的编码方式是：\n\n```python\n@property\ndef value(self):\n\
    \    \"\"\"\n    Returns a value representing the device's state. Frequently,\
    \ this is a\n    boolean value, or a number between 0 and 1 but some devices use\
    \ larger\n    ranges (e.g. -1 to +1) and composite devices usually use tuples\
    \ to\n    return the states of all their subordinate components.\n    \"\"\"\n\
    \    raise NotImplementedError\n```\n\n你可以看到这使得该类不完整。它不打算用于创建实例，因为部分实现缺失了。相反，Device\
    \ 的存在是为了用作其他设备的基类——它是 Python 中虚拟类的等价物。\n\n请注意，虚拟类很可能被用来创建另一个更具体但仍然过于通用而无法实际用于创建实例的虚拟类。例如，Device\
    \ 产生了 GPIODevice，它稍微更具体一些，但可能还不够完善，无法用于创建实例。\n\n## 属性和特性\n\n数据属性是允许对象存储数据的最简单方式。在这种情况下，你可以像使用变量一样简单地使用该属性。例如：\n\
    `myObject.myAttribute = 42`\n\n属性工作得很好，但它们是通往更复杂数据存储方法的第一步。例如，假设你有一个用于存储温度的数据属性：\n\
    `MyObject.temperature = 42`\n\n如果这被用于通过加热器控制外壳的温度，那么检查它是否设置在合理范围内（比如 20 到 30 °C）将是一个好主意。如果温度可以内部以毫摄氏度（即摄氏度的千分之一，物联网设备常用的单位）存储也会很有用。使用简单的数据属性无法做到这一点，但你可以轻松地发明一种方法。\n\
    \n我们可以创建两个方法，通常称为 get 和 set 方法，而不是数据属性：\n\n```python\nclass Heater():\n    def\
    \ __init__(self):\n        self.temperature = 22 * 1000\n    def setTemperature(self,\
    \ t):\n        if t < 20: return\n        if t > 30: return\n        self.temperature\
    \ = t * 1000\n    def getTemperature(self):\n        return self.temperature /\
    \ 1000\n```\n\n你可以看到我们现在有了一个 get 和一个 set 方法，set 检查值是否在范围内，get 将其转换回摄氏度。这一切都有效，但这意味着你必须以不自然的方式使用温度属性：\n\
    ```python\nheater = Heater()\nheater.setTemperature(31)\nprint(heater.getTemperature())\n\
    ```\n\nPython 有一种更好的方法。你可以使用 `@property` 装饰器定义一个特性。装饰器是 Python 的一个强大功能，如果你想了解更多，请参阅\
    \ *《程序员的 Python：一切皆对象》*，但在本例中我们只想利用它。\n\n例如：\n\n```python\nclass Heater():\n \
    \   def __init__(self):\n        self._temperature = 22 * 1000\n    @property\n\
    \    def temperature(self):\n        return self._temperature / 1000\n    @temperature.setter\n\
    \    def temperature(self, t):\n        print(t)\n        if t < 20: return\n\
    \        if t > 30: return\n        self._temperature = t * 1000\n```\n\n你可以看到我们以稍微不同的方式定义了一个\
    \ get 函数和一个 set 函数。我们还需要一个“后备”变量 `_temperature`，因为现在我们将 getter 和 setter 命名为 temperature。这可能看起来稍微复杂一些，但现在你可以这样写：\n\
    \n```python\nheater = Heater()\nheater.temperature = 31\nprint(heater.temperature)\n\
    ```\n\nget 和 set 函数会自动使用，即温度不会改变，因为它超出了范围。\n\n在整个 GPIO Zero 中，特性被用于各种原因。例如，在 Device\
    \ 中你会发现：\n\n```python\n@property\ndef is_active(self):\n    \"\"\"\n    Returns\
    \ :data:`True` if the device is currently active and\n    :data:`False` otherwise.\
    \ This property is usually derived from\n    :attr:`value`. Unlike :attr:`value`,\
    \ this is *always* a boolean.\n    \"\"\"\n    return bool(self.value)\n```\n\n\
    这允许你这样写：\n\n```python\nif(device.is_active):\n```\n\n而无需转换为布尔值或进行比较。\n\n## 总结\n\
    \n- Python 是一门易于上手的语言，但这可能让你忽略它是一门面向对象的语言。\n- 使用 Python 一段时间后，初学者在第一次接触并希望使用和理解像\
    \ GPIO Zero 这样的面向对象库时，往往需要回头去发现是什么让 Python 具有面向对象特性。\n- 对象是相关数据和代码的包。方法作用于存储在对象中的数据。\n\
    - 面向对象代码始于这样一个想法：你可以将 `object.method()` 转换为 `method(object)`。在 Python 中，`self`\
    \ 参数用于执行此转换。\n- 对象是作为类的实例创建的，类可以被视为对象的规范。\n- 要创建自己的类，你需要 `class` 关键字。你还需要使用 `__init__`\
    \ 魔术方法来创建数据属性。\n- 一个类（派生类）可以继承另一个类（基类）的所有方法和属性。如果新类本质上只是现有类的细化，这允许代码重用。\n- 派生类必须确保其基类实例被正确构造，这通常涉及使用\
    \ `super` 函数调用基类的 `__init__` 方法。\n- Python 支持多重继承，其中派生类可以继承多个基类的属性和方法。如果基类共享同名的属性或方法，这可能会产生问题。\n\
    - 混入是多重继承的一个特殊且简单的情况，其中只需要给一个类一组辅助方法。\n- Python 没有虚拟类，虚拟类仅仅作为派生类必须具有的最小属性集的定义，但这些可以很容易地模拟。\n\
    - 数据属性很简单，但通常你需要在访问值时对其进行一些处理。在 Python 中执行此操作的最佳方法是使用特性。"
