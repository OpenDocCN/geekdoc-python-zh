  md: "Later on we moved over to object-oriented programming where data and the functions\
    \ that process the data are grouped together into entities called objects. In\
    \ this case functions such as sort became methods of the data that they were to\
    \ operate on.\n\nSo an Array object would have a sort method and you would write\
    \ the sort operation as:\n\n```\nmyArray.sort(order)\n```\n\nYou can see that\
    \ this is a small change from the use of myArray as a parameter to the sort function\
    \ to using myArray as an object with a sort method. You could say that the shift\
    \ from functions to object-oriented programming is all about the shift of a parameter\
    \ from inside the function to outside it.\n\nLooking a little deeper, the simplification\
    \ that this shift brings about is well worth it. The sort function can now use\
    \ the data in myArray more or less by default and this makes it possible to create\
    \ an isolation from the rest of the program. It also brings about a complete change\
    \ in the way that we think about functions.\n\nFor example, you could say that\
    \ myArray “knows how” to sort itself. Another object, myList say, may also “know\
    \ how” to sort itself using its own sort function, which isn’t the same as the\
    \ Array sort function. This is usually referred to as polymorphism – the same\
    \ function sort changes its form depending on the object it belongs to.\n\nSo\
    \ instead of having to write:\n\n```\nif A==Array:\n    ArraySort(A)\nelse:\n\
    \    ListSort(A)\n```\n\nwe can just write:\n\n```\nA.sort()\n```\n\nIt also means\
    \ that we think about creating not just an array, which is a collection of data,\
    \ but an Array object which is data and code.\n\nIn the case of GPIO Zero there\
    \ is an even more appropriate interpretation. For example:\n\n```\nled.on()\n\
    ```\n\ncan be thought of as the LED object “knowing how” to turn itself on. The\
    \ alternative is to have an on function which “knows how” to turn any LED on:\n\
    \n```\non(led)\n```\n\nYou can see that thinking of an LED as something that has\
    \ built-in actions is a reasonable and convenient approach."
