  - '[PAGE 234]


    # Appendix I

    VS Code


    Microsoft’s Visual Studio Code, VS Code, has good Python support, runs on a range
    of platforms including the Raspberry Pi and is possibly a better choice of code
    editor than Thonny, as it has full remote Python development including debugging.
    That is, you can write your program on a desktop, generally a more powerful machine,
    and run it on a Pi connected over SSH and single step and breakpoint it.


    The only problem with this approach is that VS Code has more facilities than you
    need to just run Python, it supports a wide range of languages, and this can make
    it confusing. However, after you have run your first program, it all becomes so
    much easier. If you are going to be doing much programming on Pis, this is worth
    the effort in setting up and mastering it.


    As it is under constant development, it is probably better to consult its website
    to find the latest instructions on how to install it and its various components.


    VS Code doesn’t support remote working on the Pi Zero and Zero W. This presents
    a problem as the device you most want to remote operate with is the Pi Zero/W.
    Even though it works on a Pi Zero 2W, the lack of memory makes it slow. It also
    approaches the problem of remote working in a way that is less useful for IoT
    applications. It keeps all of the programs on the remote device. which makes managing
    code more difficult than if the code is kept on the local device.


    A more useful, but slightly more complicated, approach is to make use of VS Code
    Tasks to provide remote build and debug. This works with all versions of the Pi,
    or indeed any Linux-based device, and it keeps all of the files on the local machine.
    It also works with the Pi Zero/W and is described later.


    # SSH Without a Password


    Before trying to make any of the following work, you need to have set up SSH access
    using a key file. Some of the commands work if you simply supply a password, but
    the debugging commands don’t.


    Using a password to connect over SSH is fine when you are just testing the installation,
    but the number of times you are asked to provide it quickly becomes irritating.
    The solution is to create a key pair to use. If you look up'
  - '[PAGE 235]


    the instructions for doing this, you might conclude that it is very difficult.
    This is because every effort is make to ensure security is enforced. If you simply
    want to use a key as a way of avoiding having to supply a password then you can
    take shortcuts. As long as you keep your private key safe, the setup is secure.


    The first step is generating a key pair on the local machine. As long as you have
    OpenSSH installed, this is easy. The steps described here will work on Windows,
    Mac and Linux. If you are using Windows, start a PowerShell session:


    ```

    cd ~/.ssh

    ssh-keygen -t rsa

    ```


    This generates a default RSA key in the .ssh directory within the current user''s
    home directory. You can provide a name for the key files and in this example the
    name pi is used, although this doesn''t affect what device you can use them for.
    There are advantages in using the default name.


    You will see output something like:


    ```

    Generating public/private rsa key pair.

    Enter file in which to save the key (C:\Users\nuserhome/.ssh/id_rsa): pi

    Enter passphrase (empty for no passphrase):

    Enter same passphrase again:

    Your identification has been saved in pi.

    Your public key has been saved in pi.pub.

    The key fingerprint is:

    SHA256:UtiQ3RMYpluJb+nx8n5pqsbLXHgiYv2hKs1EVof7vqQ user@Rockrose

    The key''s randomart image is:

    +---[RSA 2048]----+

    |        .o+o+..  |

    |       . oBo.o   |

    |        o+ =  .  |

    |       + .= .    |

    |      o oo S     |

    |     ..o+ +      |

    |    +oooo* + .   |

    |   ..E..*oB  +   |

    |    .....*+++    |

    +----[SHA256]-----+

    ```


    If you really are using the keys for security purposes you should supply a passphrase,
    which is requested when the key pair is used. If you are simply using the keys
    to avoid entering a password then leave the passphrase blank for simplicity.


    The key generation will leave two files in the .ssh directory – in this case pi
    and pi.pub. The first is the private key and this you keep to yourself as it is
    what proves that the machine is the one that the public key belongs to. The pi.pub
    file contains the public key and this is the one that has to be copied'
  - "[PAGE 236]\n\nto the remote machine. The remote machine uses the public key to\
    \ challenge the local machine to decode something which can only be done with\
    \ the private key, so proving that the machine is legitimate, or rather that it\
    \ has the private key.\n\nYou can use the public key with as many remote machines\
    \ as you need to. The key identifies you as being allowed to connect to a machine\
    \ that has it using SSH. To make this happen, you have to enter the details of\
    \ the file into .ssh/authorized_keys. You can do this any way you know how to,\
    \ but the public key file has to be copied to ~/.ssh/ on the remote machine and\
    \ renamed authorized_keys. As you have SSH working, the simplest thing to do is:\n\
    \n```\nscp pi.pub pi@192.168.11.151:~/.ssh/authorized_keys\n```\n\nYou might have\
    \ to make the .ssh folder first. You will have to provide the user's password.\
    \ If this works you will find authorized_keys in the .ssh directory. If you want\
    \ to store more public keys in authorized_keys so that more than one user can\
    \ log on, you have to append additional public key files to authorized_keys.\n\
    \nSSH will not use the key file if ~/.ssh or ~ are writable by Group or Others.\
    \ One way of ensuring this is not the case:\n\n```\nchmod 700 ~/.ssh\nchmod 600\
    \ ~/.ssh/authorized_keys\n```\n\nAs long as the permissions are set correctly,\
    \ you should be able to connect without a password using:\n\n```\nssh -i ~/.ssh/pi\
    \ pi@192.168.11.151\n```\n\nIf you don't use -i ~/.ssh/pi to specify the private\
    \ key file, you might be asked for a password as well as the key file. You also\
    \ have to specify the correct user name.\n\nIf you want to log on and not specify\
    \ the key file, i.e. just using:\n\n```\npi@192.168.11.151\n```\n\nthen you need\
    \ to make sure your key files have the correct default names. For protocol 2 the\
    \ keys have to be called id_rsa and id_rsa.pub. If you use these default names\
    \ for RSA keys then the SSH agent will use them automatically. If you use any\
    \ other names, like pi and pi.pub, you will need an Identity file specified in\
    \ .ssh config.\n\nOpen the file config in the C:\\Users\\user\\.ssh directory\
    \ on the local machine (~/.ssh under Linux) and enter:\n\n```\nHost 192.168.11.151\n\
    \    HostName 192.168.11.151\n    User pi\n    PubKeyAuthentication yes\n    IdentityFile\
    \ ~/.ssh/pi\n```"
- md: "Of course, you have to change the IP address, user name and the location of\
    \ the key file to be correct for the machine you are trying to connect to. You\
    \ can enter additional Host specifications for each machine you want to connect\
    \ to.\n\nAfter this you should be able to connect and work with the remote Pi\
    \ without providing a password when using VS Code. You can also just use:\nssh\
    \ pi@192.168.11.151\nat the command line.\n\nNotice that this is low security\
    \ as we didn't specify a passphrase to use with the private key. If you need security\
    \ from the outside world, you need to create a key with a passphrase and then\
    \ you need to use the SSH agent to supply it automatically.\n\n## Remote Python\
    \ With VS Code\n\nThe easiest way to implement remote development is to use the\
    \ standard remote development add-ins for VS Code on a desktop machine. The programs\
    \ you develop are stored on the remote machine, but you can work with them as\
    \ if they were on the desktop machine. Ideally, you would like to keep the programs\
    \ on the desktop machine and automatically download to the remote machine as required\
    \ and this is what the alternative approach using VS Code tasks does, see later.\
    \ Notice that VS Code remote development add-ins do not work on a Pi Zero, but\
    \ the VS Code tasks work on all Pis.\n\nFirst install the up-to-date stable version\
    \ of VS Code appropriate for the platform you are using from the VS Code website.\
    \ It works under Windows, Debian and Mac OS. You can also find versions for other\
    \ operating systems, but usually without installers.\n\nOnce you have VS Code\
    \ installed to run Python programs you first need to install the Microsoft Python\
    \ extension which automatically installs Pylance:\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_237_0.png)\n\
    \nTo run the remote development extension you need to have an OpenSSH client running\
    \ on the development machine. Windows has its own version of OpenSSH client. You\
    \ next need to install the remote development pack. You only need to install Remote\
    \ SSH.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_238_0.png)\n\nAfter you have\
    \ installed Remote SSH you can add the details of the Pi you want to use to develop\
    \ programs on. To do this click on the Remote Explorer icon in the left panel\
    \ and you will see that there are no SSH clients installed. Next click on the\
    \ + that appears when you hover over SSH Targets and enter the details for the\
    \ Pi you want to connect to:\nYou specify the host using the format:\nssh user@ipaddress\n\
    \n![](img/39c0a42d027b4a8b43b07050c297f3ff_238_1.png)\n\nWhen you press Enter,\
    \ select a configuration file to use and you are ready to connect to the new host.\
    \ Right-click on the new host and select Connect in this window. Next, you will\
    \ be asked for your password. You will be asked for the password each time you\
    \ connect unless you create a private key and use it for authentication as detailed\
    \ earlier.\nWhen you open the File Explorer and select Open Folder you will see\
    \ a list of folders stored in your home folder on the host machine. Create a new\
    \ folder suitable for storing your Python programs and create a file called Hello.py\
    \ in it. The new file will open in the editor and you can type in:\nprint(\"Hello\
    \ World\")\nNext select Run, Run Without Debugging and select the Current Python\
    \ file if asked for the run configuration. You will be prompted to install Python\
    \ extensions on the remote machine and to select a Python interpreter to use.\
    \ As long as you do this you should see Hello World appear in the console at the\
    \ bottom of the window. This program has been run on the remote machine. From\
    \ here on you can learn about VS Code and slowly customize it to make your work\
    \ easier.\n\n## Running With Root Permissions\n\nIoT programs often need root\
    \ permissions to access hardware. The simplest way to do this is to run the program\
    \ locally using sudo. A better way if you want to debug your program is to create\
    \ a launch.json file:\n\n```json\n{\n    \"version\": \"0.2.0\",\n    \"configurations\"\
    : [\n        {\n            \"name\": \"Sudo Python: Current File\",\n       \
    \     \"type\": \"python\",\n            \"request\": \"launch\",\n          \
    \  \"program\": \"${file}\",\n            \"console\": \"integratedTerminal\"\
    ,\n            \"justMyCode\": true,\n            \"sudo\": true\n        }\n\
    \    ]\n}\n```\n\nNotice the \"sudo\":true at the end. This runs the Python interpreter\
    \ using sudo. This only works for Python programs. You now have to run the debug\
    \ using the RUN menu.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_239_0.png)\n\
    \n## Local Remote Synchronization\n\nIt is important to realize that the Python\
    \ programs you create are stored on the remote host. This means that, if you do\
    \ nothing about it, your entire program could be stored solely on a Pi, waiting\
    \ for something bad to happen to it. Even if you consider this a safe option,\
    \ you have the problem of transferring the program to another Pi if you want to\
    \ run it there. The best solution is to keep a copy of your programs on a machine\
    \ that you consider safe, and share them with any Pi you might want to run them\
    \ on.\n\nThe most attractive option is to use source code management. VS Code\
    \ supports Git without you having to install any extensions. Once you have it\
    \ all set up this works well, but setting it up is a time-consuming process and\
    \ it requires that you understand how Git, and usually GitHub, works. For small\
    \ and simple projects this is generally more than you need and you could spend\
    \ a lot of valuable programming time learning to use a tool that you barely make\
    \ use of. This said, if you are planning a large project, or a collaborative project,\
    \ then source code management is your best option, even if it does involve additional\
    \ initial work.\n\nIn most cases we can achieve what we need using simpler tools.\
    \ You can copy a single file or folder from a remote machine by drag-and-dropping\
    \ it from the File Explorer to the folder in the local machine. Unfortunately,\
    \ this doesn't work for remote Linux machines, and this includes Pi OS, so it\
    \ isn't a method that works for us. However, you can drag-and-drop files and folders\
    \ from the local machine to the File Explorer window on the remote machine. See\
    \ the next section for an automatic way of doing this.\n\nNow we only have the\
    \ problem of copying files from the remote machine to the local machine. This\
    \ can be done by selecting a file or folder in the VS Code File Explorer and right-clicking\
    \ to display the context menu. You will see Download in the same section as Copy.\
    \ Selecting this downloads the entire folder and its contents or the single file.\
    \ You can pick where you want the file or folder to be copied to and so manually\
    \ maintain a central copy of anything you are working on.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_240_0.png)\n\
    \nAn alternative way of saving a remote file on the local machine is to use the\
    \ File, Save As menu option and select the Show Local button.\n\n![](img/39c0a42d027b4a8b43b07050c297f3ff_241_0.png)\n\
    \nThis allows you to save the file on the local machine under whatever name you\
    \ want to use.\n\nThere are ways of automating the copying of files, but manual\
    \ copying works well and most of the automatic synchronizing methods have their\
    \ own drawbacks.\n\n## VS Code Remote Build and Debug Tasks\n\nAn alternative\
    \ to using VS Code’s own remote development facilities is to use custom tasks\
    \ to copy and compile the program on the remote machine. This has the advantage\
    \ that it works on all versions of the Pi and you automatically keep the source\
    \ of all of the programs on the local machine.\n\nIf you just want to use the\
    \ tasks for remote debugging or remote running of a Python program using VS Code\
    \ then the steps are given below. The files used have been tested on Windows,\
    \ but they should work on Mac OS and Linux with changes to the folders specified.\
    \ The files are listed at the end of this appendix and you can download them from\
    \ this book’s page on www.iopress.info.\n\nIt is important to know that you need\
    \ to set up SSH connections without a password for many of these steps to work\
    \ and you might need to login as root for some of the programs to work.\n\nCreate\
    \ the folder that is going to act as the project folder for all of the Python\
    \ programs you are going to work with. In this case it is called GPIOZERO, but\
    \ there is nothing special about this name. The directory structure is important\
    \ to the working of the tasks as they assume that VS Code has the top-level directory,\
    \ i.e. GPIOZERO, open, even though you are working with files in HelloWorld\n\n\
    ![](img/39c0a42d027b4a8b43b07050c297f3ff_241_1.png)"
  mdcn: "当然，你必须将IP地址、用户名和密钥文件的位置更改为与你要连接的机器相匹配的正确值。你可以为每个要连接的机器输入额外的主机规范。\n\n完成这些设置后，你应该能够在使用VS\
    \ Code时无需提供密码即可连接并操作远程树莓派。你也可以直接在命令行使用：\nssh pi@192.168.11.151\n\n请注意，这种方式的安全性较低，因为我们没有为私钥指定密码短语。如果你需要防范外部攻击的安全性，你需要创建一个带有密码短语的密钥，然后使用SSH代理来自动提供它。\n\
    \n## 使用VS Code进行远程Python开发\n\n实现远程开发最简单的方法是在桌面计算机上使用VS Code的标准远程开发扩展。你开发的程序存储在远程机器上，但你可以像在桌面计算机上一样操作它们。理想情况下，你希望将程序保留在桌面计算机上，并根据需要自动下载到远程机器，这正是使用VS\
