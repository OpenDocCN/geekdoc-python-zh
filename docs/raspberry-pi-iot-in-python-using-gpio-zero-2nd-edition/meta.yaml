  md: '# Summary


    +   - There is only one simple input device, Button, but it is easy to add custom
    input devices.

    - Exactly how Button works depends on how you set the `pull_up` property.

    - The simplest way of using Button is to `wait_for_press` or `wait_for_release`

    - Button has a simple debounce feature which sets a “dead” time in which it doesn’t
    respond to any changes.

    - Polling is the simplest and fastest way of handling input. It works by repeatedly
    testing the state of the button.

    - The alternative to polling is to use events or interrupts. Both seem to be attractive
    alternatives, but they have serious difficulties and tend to slow the system down.

    - Button and other input devices support asynchronous events via the `when_pressed`
    and `when_released` properties. These can be set to functions which are called
    when the event occurs.

    - Asynchronous events are a very good way to create simple demos and to get started,
    but they are not efficient and quickly become too complex to understand.

    - One way to organize polling so that it remains easy to understand in complex
    situations, is to use a finite state machine (FSM) approach.

    - You can read the state of a button state as quickly as 500Hz on a Pi Zero, 10kHz
    on a Pi 4 and 9kHz on a Pi 5.

    - If you try this out you will find that a Pi Zero is reasonable up to 5kHz, a
    Pi5 works to 100kHz and a Pi4 is reasonably reliable up to 200kHz

    - You can create custom input devices using `DigitalInputDevice` as a base class.

    - Python supports threading, which is used to implement GPIO Zero’s events.'
  merge: -1
