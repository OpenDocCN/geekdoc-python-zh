- img_proc: true
  md: 'Its pinouts are fairly self-explanatory:


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_200_0.png)


    You can see that the analog inputs are on the left and the power and SPI bus connections
    are on the right. The conversion accuracy is claimed to be 10 bits, but how many
    of these bits correspond to reality and how many are noise depends on how you
    design the layout of the circuit.


    You need to take great care if you need high accuracy. For example, you will notice
    that there are two voltage inputs VDD and VREF. VDD is the supply voltage that
    runs the chip and VREF is the reference voltage that is used to compare the input
    voltage. Obviously, if you want highest accuracy, VREF, which has to be lower
    than or equal to VDD, should be set by an accurate low-noise voltage source. However,
    in most applications VREF and VDD are simply connected together and the usual,
    low- quality, supply voltage is used as the reference. If this isn''t good enough
    then you can use anything from a Zener diode to a precision voltage reference
    chip, such as the TL431. At the very least, however, you should add a 1µF capacitor
    connected to the VDD pin and the VREF pin to ground.


    The MC3000 family is a type of A to D called a successive approximation converter.
    You don''t need to know how it works to use it, but it isn''t difficult to understand.
    The idea is that first a voltage equal to VREF/2 is generated and the input voltage
    is compared to this. If it is lower then the most significant bit is a 0 and if
    it is greater than or equal then it is a 1. At the next step the voltage generated
    is VREF/2+VREF/4 and the comparison is repeated to generate the next bit.


    ![](img/39c0a42d027b4a8b43b07050c297f3ff_200_1.png)'
  merge: -1
  pgno: 200
- img_proc: true
  md: 'You can see that successive approximation fits in well with a serial bus as
    each bit can be obtained in the time needed to transmit the previous bit. However,
    the conversion is relatively slow and a sample-and-hold circuit has to be used
    to keep the input to the converter stage fixed. The sample and hold takes the
    form of a 20pF capacitor and a switch. The only reason you need to know about
    this is that the conversion has to be completed in a time that is short compared
    to the discharge time of the capacitor. So, for accuracy, there is a minimum SPI
    clock rate as well as a maximum.


    Also, to charge the capacitor quickly enough for it to follow a changing voltage,
    it needs to be connected to a low-impedance source. In most cases this isn''t
    a problem, but if it is you need to include an op amp.


    If you are using an op amp buffer then you might as well implement an anti-aliasing
    filter to remove frequencies from the signal that are too fast for the A to D
    to respond to. How all this works would take us into the realm of analog electronics
    and signal processing and well beyond the core subject matter of this book.


    You can also use the A to D channels in pairs, i.e. in differential mode, to measure
    the voltage difference between them. For example, in differential mode you measure
    the difference between CH0 and CH1, i.e. what you measure is CH1-CH0. In most
    cases you want to use all eight channels in single-ended mode. In principle, you
    can take 200k samples per second, but only at the upper limit of the supply voltage,
    i.e. V<sub>DD</sub>=5V, falling to 75k samples per second at its lower limit of
    V<sub>DD</sub>=2.7V.


    The SPI clock limits are a maximum of 3.6MHz at 5V and 1.35MHz at 2.7V. The clock
    can go slower, but because of the problem with the sample and hold mentioned earlier,
    it shouldn''t go below 10kHz.


    How fast we can take samples is discussed later in this chapter.'
