  md: '# The Limitations of Source/Values?


    The idea of using declarative programming is a good one and there is no quicker
    way of implementing a demonstration program to connect a Button to an LED, say.
    In this respect using Source/Values is a good way to introduce the basic ideas,
    but it soon becomes clear that things get complicated once you move beyond simple
    demonstrations. This sort of declarative programming rapidly becomes difficult
    to understand as different devices affect each other in ways that can be difficult
    to deduce from the program. What is more, the order in which things happen is
    completely arbitrary and the approach is so inefficient that you can only hope
    to do things that don''t need fast processing. You could say that the Source/Value
    approach has all of the disadvantages of events and interrupts, but even more
    so. This approach to the IoT and physical computing is good to know about, but
    it is not ideal for real-world applications.'
  merge: -1
  pgno: 127
