    \ is a built-in view that displays a form, any validation errors, and redirects\
    \ to a new URL. We will use it in combination with [SingleObjectMixin](https://docs.djangoproject.com/en/4.0/ref/class-based-views/mixins-single-object/#singleobjectmixin)\
    \ which helps us associate the current article with our form. In other words,\
    \ if you have a comment at `articles/4/`, as I do in the screenshots, this will\
