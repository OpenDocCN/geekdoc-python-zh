  md: "To avoid subtle interactions between `DetailView` and `FormMixin` we will instead\
    \ separate the `GET` and `POST` variations into their own dedicated views. We\
    \ can then transform `ArticleDetailView` into a *wrapper view* that combines them.\
    \ This is a very common pattern in more advanced Django development because it\
    \ is often the case that a single URL must behave differently based on the user\
    \ request (`GET`, `POST`, etc) or even the format (returning HTML vs JSON).\n\n\
    Let's start by renaming `ArticleDetailView` into `CommentGet` since it handles\
    \ `GET` requests but not `POST` requests. We'll then create a new `CommentPost`\
    \ view that is empty for now. And we can combine both into a new `ArticleDetailView`\
    \ that subclasses [View](https://docs.djangoproject.com/en/4.0/ref/class-based-views/base/#view),\
    \ the master class-based view upon which all the others classes are built.\n\n\
    # Code\n\n```\npython\n# articles/views.py\nfrom django.views import View  # new\n\
    \n\nclass CommentGet(DetailView):  # new\n    model = Article\n    template_name\
    \ = \"article_detail.html\"\n\n    def get_context_data(self, **kwargs):\n   \
    \     context = super().get_context_data(**kwargs)\n        context[\"form\"]\
    \ = CommentForm()\n        return context\n\n\nclass CommentPost():  # new\n \
    \   pass\n\n\nclass ArticleDetailView(LoginRequiredMixin, View):  # new\n    def\
    \ get(self, request, *args, **kwargs):\n        view = CommentGet.as_view()\n\
    \        return view(request, *args, **kwargs)\n\n    def post(self, request,\
    \ *args, **kwargs):\n        view = CommentPost.as_view()\n        return view(request,\
    \ *args, **kwargs)\n```"
