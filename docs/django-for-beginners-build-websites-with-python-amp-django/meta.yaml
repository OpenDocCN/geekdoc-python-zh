    on. In the words of Django co-creator [Jacob Kaplan-Moss](https://jacobian.org/),
    "Code without tests is broken as designed."


    Testing can be divided into two main categories: unit and integration. *Unit tests*
    check a piece of functionality in isolation, while *Integration tests* check multiple
    pieces linked together. Unit tests run faster and are easier to maintain since
    they focus on only a small piece of code. Integration tests are slower and harder
    to maintain since a failure doesn''t point you in the specific direction of the
    cause. Most developers focus on writing many unit tests and a small amount of
    integration tests.


    The Python standard library contains a built-in testing framework called [unittest](https://docs.python.org/3/library/unittest.html)
    that uses [TestCase](https://docs.python.org/3/library/unittest.html#unittest.TestCase)
    instances and a long list of [assert methods](https://docs.python.org/3/library/unittest.html#assert-methods)
    to check for and report failures.


    Django''s own testing framework provides several extensions on top of Python''s
    `unittest.TestCase` base class. These include a [test client](https://docs.djangoproject.com/en/4.2/topics/testing/tools/#the-test-client)
    for making dummy Web browser requests, a number of Django-specific [additional
    assertions](https://docs.djangoproject.com/en/4.2/topics/testing/tools/#assertions),
    and four test case classes: [SimpleTestCase](https://docs.djangoproject.com/en/4.2/topics/testing/tools/#django.test.SimpleTestCase),
    [TestCase](https://docs.djangoproject.com/en/4.2/topics/testing/tools/#django.test.TestCase),
    [TransactionTestCase](https://docs.djangoproject.com/en/4.2/topics/testing/tools/#django.test.TransactionTestCase),
    and [LiveServerTestCase](https://docs.djangoproject.com/en/4.2/topics/testing/tools/#django.test.LiveServerTestCase).


    Generally speaking, `SimpleTestCase` is used when a database is not necessary
    while `TestCase` is used when you do want to test the database. `TransactionTestCase`
    is useful if you need to directly test [database transactions](https://docs.djangoproject.com/en/4.2/topics/db/transactions/)
    while `LiveServerTestCase` launches a live server thread useful for testing with
    browser-based tools like Selenium.


    One quick note before we proceed: you may notice that the *naming* of methods
    in `unittest` and `django.test` are written in `camelCase` rather than the more
    Pythonic `snake_case` pattern. The reason is that `unittest` is based on the `jUnit`
    testing framework from Java, which does use `camelCase`, so when'
