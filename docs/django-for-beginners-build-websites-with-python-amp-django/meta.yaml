    \  └── wsgi.py\n├── db.sqlite3  # new\n├── manage.py\n└── .venv/\n```\n\nFor now,\
    \ if you execute python manage.py runserver again you should no longer see any\
    \ warnings.\n\n## HTTP Request/Response Cycle\n\n[HTTP (Hypertext Transfer Protocol)](https://example.com)\
    \ was initially created by Tim Berners-Lee in 1989 and is the foundation of the\
    \ World Wide Web. A network protocol is a set of rules for formatting and processing\
    \ data. It is like a common language for computers that allows them to communicate\
    \ with one another even if they are located on opposite sides of the earth and\
    \ have vastly different hardware and software.\n\nHTTP is a request-response protocol\
    \ that works in a client-server computing model. Every time you visit a webpage\
    \ an initial \"request\" is sent by the \"client\" (ie your computer) and a \"\
    response\" is sent back by a \"server.\" The client doesn't have to be a computer\
    \ though, it could also be a mobile phone or any internet-connected device. But\
    \ the process is the same: an HTTP request is sent to a URL by a client and a\
    \ server sends back an HTTP response.\n\nUltimately, all a web framework like\
    \ Django does is accept HTTP requests to a given URL and return a HTTP response\
    \ containing the information necessary to render a webpage. That's it. Generally\
    \ components. This makes it easier for a developer to reason about the code. The\
    \ MVC pattern is widely used among web frameworks including Ruby on Rails, Spring\
    \ (Java), Laravel (PHP), ASP.NET (C#) and many others.\n\nIn the traditional MVC\
    \ pattern there are three major components:\n\n- Model: Manages data and core\
    \ business logic\n- View: Renders data from the model in a particular format\n\
    - Controller: Accepts user input and performs application-specific logic\n\nDjango\
    \ only loosely follows the traditional MVC approach with its own version often\
    \ called **Model-View-Template (MVT)**. This can be initially confusing to developers\
    \ with previous web framework experience. In reality, Django's approach is really\
