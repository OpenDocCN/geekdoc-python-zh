  md: '# # Conclusion


    Congratulations on finishing *Django for Beginners*! After starting from absolute
    zero we''ve now built five different web applications from scratch and covered
    all the major features of Django: templates, views, urls, users, models, security,
    testing, and deployment. You now have the knowledge to go off and build your own
    modern websites with Django.


    As with any new skill, it''s important to practice and apply what you''ve just
    learned. The CRUD (Create-Read-Update-Delete) functionality in our *Blog* and
    *Newspaper* sites is common in many, many other web applications. For example,
    can you make a Todo List web application? A Twitter or Facebook clone? You already
    have all the tools you need. When you''re starting out I believe the best approach
    is to build as many small projects as possible and incrementally add complexity
    and research new things.


