  md: "[forms](https://example.com).\n\nWorking with forms is a challenge and `django-crispy-forms`\
    \ makes it easier to write DRY (Don't-Repeat-Yourself) code. First, stop the local\
    \ server with `Control+c`. Then use `pip` to install the package in our project.\
    \ We'll also install the [Bootstrap5 template pack](https://example.com).\n\n\
    ```\nshell\n(.venv) > python -m pip install django-crispy-forms==1.13.0\n(.venv)\
    \ > python -m pip install crispy-bootstrap5==0.6\n```\n\nAdd the new apps to our\
    \ `INSTALLED_APPS` list in the `django_project/settings.py` file. As the number\
    \ of apps starts to grow, I find it helpful to distinguish between 3rd party apps\
    \ and local apps I've added myself. Here's what the code looks like now.\n\n```\n\
    python\n# django_project/settings.py\nINSTALLED_APPS = [\n    \"django.contrib.admin\"\
    ,\n    \"django.contrib.auth\",\n    \"django.contrib.contenttypes\",\n    \"\
    django.contrib.sessions\",\n    \"django.contrib.messages\",\n    \"django.contrib.staticfiles\"\
    ,\n    # 3rd Party\n    \"crispy_forms\",  # new\n    \"crispy_bootstrap5\", \
    \ # new\n    # Local\n    \"accounts.apps.AccountsConfig\",\n    \"pages.apps.PagesConfig\"\
    ,\n]\n```\n\nAnd then at the bottom of the `settings.py` file add two new lines\
    \ as well.\n\n```\npython\n# django_project/settings.py\nCRISPY_ALLOWED_TEMPLATE_PACKS\
    \ = \"bootstrap5\"  # new\nCRISPY_TEMPLATE_PACK = \"bootstrap5\"  # new\n```"
