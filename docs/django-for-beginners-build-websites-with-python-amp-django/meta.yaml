- img_proc: true
  md: 'the "Password change successful" page.


    ![](img/81ad3fb1f21eb31ec1562330903a439c_201_0.png)


    # Customizing Password Change


    Let''s customize these two password change pages so that they match the look and
    feel of our *Newspaper* site. Because Django already has created the views and
    URLs for us we only need to change the templates. In your text editor create two
    new template files in the `registration` directory:


    +   - `templates/registration/password_change_form.html`

    - `templates/registration/password_change_done.html`


    Update `password_change_form.html` with the following code. At the top we extend
    `base.html`, load crispy forms, and set our page meta title. This is what appears
    in the tab of a web browser but not on the visible webpage itself. The form uses
    `post` since we''re sending data, a `csrf_token` for security reasons, and `{{
    form|crispy }}` to use crispy forms styling. As a final tweak, we include a submit
    button that uses Bootstrap''s `btn btn-success` styling to make it green.


    ```

    html

    <!-- templates/registration/password_change_form.html -->

    {% extends "base.html" %}

    {% load crispy_forms_tags %}


    {% block title %}Password Change{% endblock title %}


    {% block content %}

    <h1>Password change</h1>

    ```'
