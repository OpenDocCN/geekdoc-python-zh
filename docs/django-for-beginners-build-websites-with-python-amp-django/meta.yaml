    \ like *MVTU* would be a more accurate description.\n\nThe Django MVT pattern\
    \ is as follows:\n\n- Model: Manages data and core business logic\n- View: Describes\
    \ *which* data is sent to the user but not its presentation\n- Template: Presents\
    \ the data as HTML with optional CSS, JavaScript, and Static Assets\n- URL Configuration:\
    \ Regular-expression components configured to a View\n\nThis interaction is fundamental\
    \ to Django yet **very confusing** to newcomers so let's map out the order of\
    \ a given HTTP request/response cycle. When you type in a URL, such as `https://djangoproject.com`,\
    \ the first thing that happens within our Django project is a URL pattern (contained\
    \ in `urls.py`) is found that matches it. The URL pattern is linked to a single\
    \ view (contained in `views.py`) which combines the data from the model (stored\
    \ in `models.py`) and the styling from a template (any file ending in `.html`).\
    \ The view then returns a HTTP response to the user.\n\nThe complete Django flow\
    \ looks like this:\n\n| Django request/response cycle |\n|---|\n| HTTP Request\
    \ -> URL -> View -> Model and Template -> HTTP Response |\n\nIf you are brand\
    \ new to web development the distinction between MVC and MVT will not matter much.\
    \ This book demonstrates the Django way of doing things so there won't be confusion.\
    \ However if you are a web developer with previous MVC experience, it can take\
    \ a little while to shift your thinking to the \"Django way\" of doing things\
    \ which is more loosely coupled and allows for easier modifications.\n\n## Create\
    \ An App\n\nDjango uses the concept of projects and apps to keep code clean and\
    \ readable. A single top-level Django project can contain multiple apps. Each\
    \ app controls an isolated piece of functionality. For example, an e-commerce\
    \ site might have one app for user authentication, another app for payments, and\
    \ a third app to power item listing details. That's three distinct apps that all\
    \ live within one top-level project. How and when you split functionality into\
    \ apps is somewhat subjective, but in general, each app should have a clear function.\n\
    \nTo add a new app go to the command line and quit the running server with `Control+c`.\
    \ Then use the `startapp` command followed by the name of our app which will be\
    \ `pages`."
