    from environs import Env  # new


    env = Env()  # new

    env.read_env()  # new

    ```


    Next up, create a new file called `.env` in the root project directory which will
    contain our environment variables. We already know that any file or directory
    starting with a period, `.`, will be treated as a *hidden file* and not displayed
    by default during a directory listing. The file still exists though and needs
    to be added to a `.gitignore` file to avoid being added to our Git source control.


    Go ahead and create a new `.gitignore` file with your text editor in the root
    project directory. Its contents should include our new `.env` file and also the
    `.venv` directory.


    ```


    .gitignore


    .venv

    .env

    ```


    While we''re at it there are several other files and folders that are convenient
    to ignore for Python and Django development. These include all `*.pyc` files and
    the `__pycache__` directory. If you''re on a Mac, there''s no need to track `.DS_Store`
