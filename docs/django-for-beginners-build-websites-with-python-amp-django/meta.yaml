    # # Chapter 10: Bootstrap


    Web development requires a lot of skills. Not only do you have to program the
    website to work correctly, users expect it to look good, too. When you''re creating
    everything from scratch, it can be overwhelming to also add all the necessary
    HTML/CSS for a beautiful site.


    While it''s possible to hand-code all the required CSS and JavaScript for a modern-looking
    website, in practice most developers user a framework like [Bootstrap](https://getbootstrap.com)
    or [TailwindCSS](https://tailwindcss.com). For our project, we''ll use Bootstrap
    which can be extended and customized as needed.


    # ## Pages App


    In the previous chapter we displayed our homepage by including view logic in our
    `urls.py` file. While this approach works, it feels somewhat hackish to me and
    it certainly doesn''t scale as a website grows over time. It is also probably
    somewhat confusing to Django newcomers. Instead, we can and should create a dedicated
    pages app for all our static pages, such as the homepage, a future about page,
    and so on. This will keep our code nice and organized going forward.


    On the command line ,use the `startapp` command to create our new pages app. If
    the server is still running you may need to type `Control+c` first to quit it.


    ```


    Shell

    (.venv) > python manage.py startapp pages

    ```


