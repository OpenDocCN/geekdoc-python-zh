    # ## Conclusion


    Congratulations on building and deploying your second Django project! This time
    we used templates, class-based views, explored URLs more fully, added basic tests,
    and used Heroku. If you feel overwhelmed by the deployment process, don''t worry.
    Deployment *is* hard even with a tool like Heroku. The good news is the steps
    required are the same for most projects so you can refer to a deployment checklist
    to guide you each time you launch a new project.


    The full source code for this chapter is [available on GitHub](https://github.com)
    if you need a reference. In the next chapter we''ll move on to our first database-backed
    project, a *Message Board* website, and see where Django really shines.'
