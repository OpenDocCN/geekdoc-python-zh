    I hope you''re wondering now: how do we set `DATABASE_URL` in production on Heroku?
    It turns out that when Heroku provisions a new PostgreSQL database, it automatically
    creates a configuration variable for it named ... `DATABASE_URL`. Since the `.env`
    file is not committed to production, our Django project on Heroku will instead
    use this PostgreSQL configuration. Pretty elegant, no?


    The last step is to install [Psycopg](https://www.psycopg.org/), a database adapter
    that lets Python apps talk to PostgreSQL databases. If you are on macOS it is
    necessary to install PostgreSQL first via Homebrew and then `psycopg2`.


    ```

