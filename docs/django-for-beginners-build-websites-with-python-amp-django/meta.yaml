    # # Chapter 7: User Accounts


    So far we''ve built a working blog application with forms but we''re missing a
    major piece of most web applications: user authentication.


    Implementing proper user authentication is famously hard; there are many security
    gotchas along the way so you really don''t want to implement this yourself. Fortunately,
    Django comes with a powerful, built-in [user authentication system](user-authentication-system)
    that we can use and customize as needed.


    Whenever you create a new project, by default Django installs the `auth` app,
    which provides us with a [User object](User-object) containing:


    +   - username

    - password

    - email

    - first_name

    - last_name


    We will use this `User` object to implement log in, log out, and sign up in our
    blog application.


    # ## Log In


    Django provides us with a default view for a log in page via [LoginView](LoginView).
    All we need to add are a URL pattern for the auth system, a log in template, and
    a small update to our `django_project/settings.py` file.


    First, update the `django_project/urls.py` file. We''ll place our log in and log
    out pages at the `accounts/` URL. This is a one-line addition on the next-to-last
    line.'
