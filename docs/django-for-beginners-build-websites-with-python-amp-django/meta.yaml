    from .models import CustomUser\n\n\nclass CustomUserAdmin(UserAdmin):\n    add_form\
    \ = CustomUserCreationForm\n    form = CustomUserChangeForm\n    model = CustomUser\n\
    \    list_display = [\n        \"email\",\n        \"username\",\n        \"age\"\
    ,\n        \"is_staff\",\n    ]\n    fieldsets = UserAdmin.fieldsets + ((None,\
