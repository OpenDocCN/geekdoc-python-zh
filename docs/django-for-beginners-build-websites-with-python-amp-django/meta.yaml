- md: "It's time to track our changes with Git and push them up to GitHub. We'll start\
    \ by initializing our directory and checking the status of our changes.\n\n```\n\
    Shell\n(.venv) > git init\n(.venv) > git status\n```\n\nUse `git status` to see\
    \ all our code changes. Notice that the `.venv` directory with our virtual environment\
    \ is included? We don't want that. In your text editor create a new hidden file,\
    \ `.gitignore`, so we can specify what Git will *not* track.\n\n```\n.gitignore\n\
    .venv/\n```\n\nRun `git status` again to confirm these two files are being ignored,\
    \ then use `git add -A` to add the intended files/directories, and finally add\
    \ an initial commit message.\n\n```\nShell\n(.venv) > git status\n(.venv) > git\
    \ add -A\n(.venv) > git commit -m \"initial commit\"\n```\n\nOver on GitHub [create\
    \ a new repo](https://github.com/new) called `pages` and make sure to select the\
    \ \"Private\" radio button. Then click on the \"Create repository\" button.\n\n\
    On the next page, scroll down to where it says \"...or push an existing repository\
    \ from the command line.\" Copy and paste the two commands there into your terminal.\n\
    \nIt should look like the below albeit instead of `wsvincent` as the username\
    \ it will be your GitHub username.\n\n```\nShell\n(.venv) > git remote add origin\
    \ https://github.com/wsvincent/pages.git\n(.venv) > git push -u origin main\n\
    ```\n\n## Local vs Production\n\nTo make our site available on the Internet where\
    \ everyone can see it, we need to deploy our code to an external server and database.\
    \ This is called putting our code into *production*. Local code lives only on\
    \ our computer; production code lives on an external server available to everyone.\n\
    \nThe `startproject` command creates a new project configured for local development\
    \ via the file `django_project/settings.py`. This ease-of-use means when it does\
    \ come time to push the project into production, a number of settings have to\
    \ be changed.\n\nOne of these is the web server. Django comes with its own basic\
    \ server, suitable for local usage, but it *is not* suitable for production. There\
    \ are two options available: [Gunicorn](https://gunicorn.org/) and [uWSGI](https://uwsgi-docs.readthedocs.io/).\
    \ Gunicorn is the simpler to configure and more than adequate for our projects\
    \ so that will be what we use.\n\nFor our hosting provider we will use [Heroku](https://www.heroku.com/)\
    \ because it is free for small projects, widely-used, and has a relatively straightforward\
    \ deployment process.\n\n## Heroku\n\nYou can sign up for a free Heroku account\
    \ on their website. Fill in the registration form and wait for an email with a\
    \ link to confirm your account. This will take you to the password setup page.\
    \ Once configured, you will be directed to the dashboard section of the site.\
    \ Heroku now requires enrolling in multi-factor authentication (MFA), too, which\
    \ can be done with SalesForce or a tool like Google Authenticator.\n\nHeroku may\
    \ also ask about adding a credit card for [account verification](https://example.com).\
    \ This is optional but provides extra benefits even if you use the free tier such\
    \ as adding a custom domain and adding extra add-ons for additional functionality.\n\
    \nNow that you are signed up, it is time to install Heroku's *Command Line Interface\
    \ (CLI)* so we can deploy from the command line. Currently, we are operating within\
    \ a virtual environment for our *Pages* project but we want Heroku available globally,\
    \ that is everywhere on our machine. An easy way to do so is open up a new command\
    \ line tab—`Command+t` on a Mac, `Control+t` on Windows—which is not operating\
    \ in a virtual environment. Anything installed here will be global.\n\nOn Windows,\
    \ see the [Heroku CLI page](https://example.com) to correctly install either the\
    \ 32-bit or 64-bit version. On a Mac, the package manager [Homebrew](https://example.com)\
    \ is used for installation. If not already on your machine, install Homebrew by\
    \ copy and pasting the long command on the Homebrew website into your command\
    \ line and hitting `Return`. It will look something like this:\n\n```\nshell\n\
    % /bin/bash -c \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/\\\n\
    \  install/HEAD/install.sh)\"\n```\n\nNext install the Heroku CLI by copy and\
    \ pasting the following into your command line and hitting `Return`.\n\n```\n\
    shell\n% brew tap heroku/brew && brew install heroku\n```\n\nIf you are on a new\
    \ M1 chip Apple computer you might receive an error with something like `Bad CPU\
    \ type in executable`. Installing [Rosetta 2](https://support.apple.com/en-us/HT211861)\
    \ will solve the issue.\n\nOnce installation is complete you can close the new\
    \ command line tab and return to the initial tab with the `pages` virtual environment\
    \ active.\n\nType the command `heroku login` and use the email and password for\
    \ Heroku you just set.\n\n```\nShell\n(.venv) > heroku login\nEnter your Heroku\
    \ credentials:\nEmail: will@wsvincent.com\nPassword: *******************************\n\
    Logged in as will@wsvincent.com\n```\n\nYou are logged in and ready to go!\n\n\
    ## Deployment Checklist\n\nDeployment typically requires a number of discrete\
    \ steps. It is common to have a \"checklist\" for these since there quickly become\
    \ too many to remember. At this stage, we are intentionally keeping things basic\
    \ however this list will grow in future projects as we add additional security\
    \ and performance features.\n\nHere is the current deployment checklist:\n\n-\
    \ install Gunicorn\n- create a `requirements.txt` file\n- update `ALLOWED_HOSTS`\
    \ in `django_project/settings.py`\n- create a `Procfile`\n- create a `runtime.txt`\
    \ file\n\nThe first item is to install Gunicorn, a production-ready web server\
    \ for our project. Recall that we have been using Django's own lightweight server\
    \ for development purposes but it is not suitable for a live website. Gunicorn\
    \ can be installed using Pip.\n\n```\nShell\n(.venv) > python -m pip install gunicorn==20.1.0\n\
    ```\n\nStep two is to create a `requirements.txt` file containing all the specific\
    \ Python dependencies in our project. That is, every Python package currently\
    \ installed in our virtual environment. This is necessary in case we–or a team\
    \ member–want to recreate the repository from scratch in the future. It also helps\
    \ Heroku recognize that this is a Python project, which simplifies the deployment\
    \ steps.\n\nTo create this file, we will redirect the output of the `pip freeze`\
    \ command to a new file called `requirements.txt`.\n\n```\nShell\n(.venv) > python\
    \ -m pip freeze > requirements.txt\n```\n\nIf you look at the contents of this\
    \ file it contains `Django`, `gunicorn`, `asgiref` and `sqlparse`. That's because\
    \ when we installed Django we *also* end up installing a number of other Python\
    \ modules it depends upon. You do not need to focus too much on the contents of\
    \ this file, just remember that whenever you install a new Python package in your\
    \ virtual environment you should update the `requirements.txt` file to reflect\
    \ it. There are more complicated tools that automate this process but since we\
    \ are using `venv` and keeping things as simple as possible, it must be done manually.\n\
    \nThe third step is to look within `django_project/settings.py` for the [ALLOWED_HOSTS](https://docs.djangoproject.com/en/4.0/ref/settings/#allowed-hosts)\
    \ setting, which represents that host/domain names our Django site can serve.\
    \ This is a security measure to prevent HTTP Host header attacks. For now, we'll\
    \ use the wildcard asterisk, * so that *all* domains are acceptable. Later in\
    \ the book we'll see how to explicitly list the domains that should be allowed\
    \ which is much more secure.\n\n### Code\n\n```\n# django_project/settings.py\n\
    ALLOWED_HOSTS = [\"*\"]\n```\n\nThe fourth step is to create a new `Procfile`\
    \ in the base directory next to the `manage.py` file. The `Procfile` is specific\
    \ to Heroku and provides instructions on how to run the application in their stack.\
    \ We're indicating that for the web function use gunicorn as the server, the WSGI\
    \ config file located at `django_project.wsgi`, and finally the flag `--log-file\
    \ -` makes any logging messages visible to us.\n\n### Procfile\n\n```\nweb: gunicorn\
    \ django_project.wsgi --log-file -\n```\n\nThe final step is to specify which\
    \ Python version should run on Heroku. If not set explicitly this is [currently\
    \ set](https://devcenter.heroku.com/articles/python-support#specifying-a-python-version)\
    \ to the `python-3.9.10` runtime but changes over time. Since we are using Python\
    \ 3.10 we must create a dedicated [runtime.txt](https://devcenter.heroku.com/articles/python-support#specifying-a-python-version)\
    \ file to use it. In your text editor, create this new `runtime.txt` file at the\
    \ project-level meaning it is in the same directory as `manage.py` and the `Procfile`.\n\
    \nTo check the current version of Python run `python --version`.\n\n### Shell\n\
    \n```\n# Windows\n(.venv) > python --version\nPython 3.10.2\n\n# macOS\n```"
  mdcn: "是时候用 Git 跟踪我们的更改并将它们推送到 GitHub 了。我们将从初始化目录并检查更改状态开始。\n\n```\nShell\n(.venv)\
