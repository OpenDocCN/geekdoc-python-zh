    # Code\n\n```\npython\n# articles/views.py\nfrom django.contrib.auth.mixins import\
    \ LoginRequiredMixin, UserPassesTestMixin\nfrom django.views import View\nfrom\
    \ django.views.generic import ListView, DetailView, FormView  # new\nfrom django.views.generic.detail\
    \ import SingleObjectMixin  # new\nfrom django.views.generic.edit import UpdateView,\
    \ DeleteView, CreateView\nfrom django.urls import reverse_lazy, reverse  # new\n\
    \nfrom .forms import CommentForm\nfrom .models import Article\n\n...\nclass CommentPost(SingleObjectMixin,\
    \ FormView):  # new\n    model = Article\n    form_class = CommentForm\n    template_name\
    \ = \"article_detail.html\"\n\n    def post(self, request, *args, **kwargs):\n\
    \        self.object = self.get_object()\n        return super().post(request,\
    \ *args, **kwargs)\n\n    def form_valid(self, form):\n```"
