    The good news is that whatever error you are having, it is likely that you are
    not the first! Copy and pasting your error into a search engine like Google or
    DuckDuckGo will typically bring up something from StackOverflow or a personal
    blog detailing the exact same issue. In fact, experienced programmers often joke
    that the only thing that separates them from junior programmers is their ability
    to Google more quickly towards an answer. There is some truth to this.


    Not everything you read online can be trusted, of course, and with experience
    you will develop the context to see how the pieces of Django and code in general
    fit together.


    What to do if you are stuck on something in this book? As a first step, I recommend
    carefully checking your code against what is in the book. If still stuck, you
    can look at the official source code which is [available on GitHub](https://github.com).
    A common error is subtle white spacing differences that are almost impossible
    to detect to the naked eye. You can try copy and pasting the official source code
    if you suspect this might be the issue.


    The next step is to walk away from the computer for a bit or even sleep on the
    problem. It''s amazing what a small amount of rest and distance will do to your
    mind when it comes to solving problems.


    There are two fantastic online resources where the Django community gathers to
    ask and answer questions. The first is the [official Django Forum](https://forum.djangoproject.com)
    and the second is the [Django Users Google Group](https://groups.google.com/g/django-users).
    Both are a good next step if you need additional help.


