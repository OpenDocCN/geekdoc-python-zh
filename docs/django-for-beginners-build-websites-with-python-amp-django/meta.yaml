    \ remote add origin https://github.com/wsvincent/pages.git\n(.venv) > git push\
    \ -u origin main\n```\n\n## 本地环境 vs 生产环境\n\n为了让我们的网站在互联网上可供所有人访问，我们需要将代码部署到外部服务器和数据库。这被称为将代码投入*生产环境*。本地代码只存在于我们的电脑上；生产代码则位于可供所有人访问的外部服务器上。\n\
    \n`startproject` 命令通过文件 `django_project/settings.py` 创建了一个为本地开发配置的新项目。这种易用性意味着当需要将项目推送到生产环境时，必须更改许多设置。\n\
    \n其中之一是 Web 服务器。Django 自带了基本的服务器，适合本地使用，但它*并不*适合生产环境。有两个可用选项：[Gunicorn](https://gunicorn.org/)\
    \ 和 [uWSGI](https://uwsgi-docs.readthedocs.io/)。Gunicorn 配置更简单，对我们的项目来说完全足够，因此我们将使用它。\n\
    \n对于托管服务提供商，我们将使用 [Heroku](https://www.heroku.com/)，因为它对小项目免费、使用广泛，并且部署过程相对简单。\n\
    \n## Heroku\n\n你可以在其网站上注册免费的 Heroku 账户。填写注册表单，然后等待包含确认账户链接的电子邮件。这将带你进入密码设置页面。配置完成后，你将被引导至网站的仪表板部分。Heroku\
    \ 现在还要求注册多因素身份验证（MFA），可以通过 SalesForce 或 Google Authenticator 等工具完成。\n\nHeroku\
    \ 可能还会要求添加信用卡进行[账户验证](https://example.com)。这是可选的，但即使你使用免费套餐，也能提供额外好处，例如添加自定义域名和添加额外的附加功能。\n\
    \n现在你已经注册完成，是时候安装 Heroku 的*命令行界面（CLI）*了，这样我们就可以从命令行进行部署。目前，我们在 *Pages* 项目的虚拟环境中操作，但我们希望\
    \ Heroku 全局可用，即在机器的任何地方都能使用。一个简单的方法是打开一个新的命令行标签页——Mac 上按 `Command+t`，Windows 上按\
    \ `Control+t`——这个标签页不在虚拟环境中运行。在这里安装的任何内容都将是全局的。\n\n在 Windows 上，请参阅 [Heroku CLI\
    \ 页面](https://example.com) 以正确安装 32 位或 64 位版本。在 Mac 上，使用包管理器 [Homebrew](https://example.com)\
    \ 进行安装。如果尚未安装，请将 Homebrew 网站上的长命令复制粘贴到命令行中并按 `Return` 来安装 Homebrew。它看起来像这样：\n\n\
    ```\nshell\n% /bin/bash -c \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/\\\
    \n  install/HEAD/install.sh)\"\n```\n\n接下来，将以下内容复制粘贴到命令行中并按 `Return` 来安装 Heroku\
    \ CLI。\n\n```\nshell\n% brew tap heroku/brew && brew install heroku\n```\n\n如果你使用的是新款\
    \ M1 芯片的 Apple 电脑，可能会收到类似 `Bad CPU type in executable` 的错误。安装 [Rosetta 2](https://support.apple.com/en-us/HT211861)\
    \ 可以解决这个问题。\n\n安装完成后，你可以关闭新的命令行标签页，返回到 `pages` 虚拟环境激活的初始标签页。\n\n输入命令 `heroku login`，使用你刚刚设置的\
