    even created any core *Newspaper* app features yet! Everything has been about
    setting up custom user accounts and the rest.


    The upside to Django''s approach is that it is incredibly easy to customize any
    piece of our website. The downside is that Django requires a bit more out-of-the-box
    code than some competing web frameworks. As you become more and more experienced
    in web development, the wisdom of Django''s approach will ring true.


