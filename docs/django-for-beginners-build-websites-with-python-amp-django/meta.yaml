    \n## 简介\n\n欢迎阅读 *Django 入门指南*，本书采用基于项目的方式，帮助你学习使用 [Django](https://www.djangoproject.com/)\
    \ Web 框架进行 Web 开发。在本书中，你将构建五个逐步复杂的 Web 应用，从简单的 *Hello, World* 应用开始，依次进阶到 *页面*\
    \ 应用、*留言板* 应用、包含表单和用户账户的 *博客* 应用，最后是一个使用自定义用户模型、邮件集成、外键、授权、权限等功能的 *新闻* 应用。读完本书后，你应该能够自信地使用当前最佳实践从头创建自己的\
    \ Django 项目。\n\nDjango 是一个使用 Python 编程语言编写的免费开源 Web 框架。自 2005 年首次发布以来，Django 一直在持续开发中，如今支撑着世界上许多最大的网站，包括\
    \ Instagram、Pinterest、Bitbucket 和 Disqus。同时，它也足够灵活，成为早期创业公司和副业项目的热门选择。\n\n## 为什么选择\
    \ Django\n\n\"Web 框架\"是一组工具的集合，它将 Web 开发中固有的许多困难和重复性工作抽象化。例如，大多数网站都需要相同的基本功能：连接数据库、设置\
    \ URL 路由、在页面上显示内容、正确处理安全性等等。程序员们多年来没有每次都从头重新创建这些功能，而是在所有主要编程语言中创建了 Web 框架：Python\
    \ 中的 *Django*、Ruby 中的 *Rails*、PHP 中的 *Laravel*，以及许许多多其他框架。\n\nDjango 继承了 Python\
    \ \"自带电池\"的理念，为 Web 开发中的常见任务提供开箱即用的支持，包括：\n\n- 用户认证\n- 测试\n- 数据库模型、表单、URL 路由和模板\n\
    - 管理后台界面\n- 安全性和性能升级\n- 支持多种数据库后端\n\n这种方式让 Web 开发者能够专注于 Web 应用的独特之处，而不必每次都重复造轮子。\n\
    \n相比之下，一些 Web 框架如 [Flask](https://flask.palletsprojects.com/) 采用 *微框架* 方式，仅提供简单网页所需的最低限度功能。Flask\
    \ 比 Django 轻量得多，并允许最大的灵活性，但这需要开发者付出代价。即使构建一个基础网站，也需要添加十几个或更多的第三方包，而这些包可能并非最新版本。而且由此产生的\
    \ Flask 项目结构往往差异很大，使得在不同项目之间切换和在社区内维护最佳实践变得更加困难。\n\nDjango 仍在[积极开发中](https://www.djangoproject.com/weblog/)，保持着每月发布安全/错误修复版本、每\
    \ 8 个月发布一次主要新版本的定期发布节奏。数百万程序员已经使用 Django 构建了他们的网站。当一大群优秀的开发者已经为我们解决了这些问题时，重复相同的代码——以及错误——是没有意义的。\n\
    \nDjango 社区也在不断添加新功能和安全性改进。最重要的是，它是用 Python 编程语言编写的，既可读性极佳又功能强大。简而言之，如果你要从头构建一个网站，Django\
