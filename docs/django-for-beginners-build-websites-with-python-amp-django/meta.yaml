  md: '# # Chapter 11: Password Change and Reset


    In this chapter we will complete the authorization flow of our *Newspaper* app
    by adding password change and password reset functionality. Initially we will
    implement Django''s built-in views and URLs for both password change and password
    reset before then customizing them with our own Bootstrap-powered templates and
    email service.


    # ## Password Change


    Letting users change their passwords is a common feature on many websites. Django
    provides a default implementation that already works at this stage. To try it
    out first click on the "Log In" button to make sure you''re logged in. Then navigate
    to the "Password change" page, which is located at `http://127.0.0.1:8000/accounts/password_change/`.


    ![](img/81ad3fb1f21eb31ec1562330903a439c_200_0.png)


    **Password change**


    Enter in both your old password and a new one. Then click the "Change My Password"
    button. You will be redirected to'
