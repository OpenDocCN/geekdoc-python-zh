    # ## Python Interactive Mode


    From the command line typing either `python` on Windows or `python3` on macOS
    will bring up the Python Interpreter, also known as Python Interactive mode. The
    new prompt of `>>>` indicates that you are now inside Python itself and **not**
    the command line. If you try any of the previous shell commands we ran—`cd`, `ls`,
    `mkdir`—they will each raise errors. What *will* work is actual Python code. For
    example, try out both `1 + 1` and `print("Hello Python!")` making sure to hit
