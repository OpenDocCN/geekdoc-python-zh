  md: '# # Chapter 15: Comments


    There are two ways we could add comments to our *Newspaper* site. The first is
    to create a dedicated *comments* app and link it to *articles*, however that seems
    like over-engineering at this point. Instead, we can simply add an additional
    model called `Comment` to our *articles* app and link it to the `Article` model
    through a foreign key. We will take the simpler approach since it''s always easy
    to add more complexity later.


    The whole structure within Django of one project and multiple smaller apps is
    designed to help the developer reason about the website. The computer doesn''t
    care how the code is structured. Breaking functionality out into smaller pieces
    helps us–and any future teammates–understand the logic in a web application. But
    you don''t need to prematurely optimize. If your eventual comments logic becomes
    quite lengthy then yes, by all means, spin it off into its own `comments` app.
    But the first thing to do is make the code work, then make sure it is performant,
    and lastly structure it so it''s understandable to you or someone else months
    later.


    What do we need to add comments functionality to our website? We already know
    it will involve models, urls, views, templates, and in this case also forms. All
    will be needed for the final solution but the order in which we tackle them is
    largely up to us. That said, many Django developers find that going in this order–models
    -> urls -> views -> templates/forms–works best so that is what we will use here.
    By the end of this chapter, users will be able to add comments to any existing
    article on our website.'
