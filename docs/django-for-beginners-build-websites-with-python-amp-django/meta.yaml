  md: '[HTTP (Hypertext Transfer Protocol)](https://example.com) was initially created
    by Tim Berners-Lee in 1989 and is the foundation of the World Wide Web. A network
    protocol is a set of rules for formatting and processing data. It is like a common
    language for computers that allows them to communicate with one another even if
    they are located on opposite sides of the earth and have vastly different hardware
    and software.


    HTTP is a request-response protocol that works in a client-server computing model.
    Every time you visit a webpage an initial "request" is sent by the "client" (ie
    your computer) and a "response" is sent back by a "server." The client doesn''t
    have to be a computer though, it could also be a mobile phone or any internet-connected
    device. But the process is the same: an HTTP request is sent to a URL by a client
    and a server sends back an HTTP response.


    Ultimately, all a web framework like Django does is accept HTTP requests to a
    given URL and return a HTTP response containing the information necessary to render
    a webpage. That''s it. Generally'
