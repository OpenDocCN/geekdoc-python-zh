  - "[PAGE 263]\n\nWe won't win any design awards for this layout but this is a book\
    \ on Django so outputting the correct content is our goal.\n\n# Comment Form\n\
    \nThe comments are now visible but we need to add a form so users can add them\
    \ in the website itself. On the web forms are a very complicated topic since security\
    \ is essential: any time you are accepting data from a user that will be stored\
    \ in a database you must be extremely cautious. The good news is Django forms\
    \ handle most of this work for us.\n\n[ModelForm](https://docs.djangoproject.com/en/4.0/topics/forms/modelforms/)\
    \ is a helper class designed to translate database models into forms. We can use\
    \ it to create a form called, appropriately enough, `CommentForm`. We *could*\
    \ put this form in our existing `articles/models.py` file but generally the best\
    \ practice is to put all forms in a dedicated `forms.py` file within your app.\
    \ That's the approach we'll use here.\n\nWith your text editor create a new file\
    \ called `articles/forms.py`. At the top import `forms` which has `ModelForm`\
    \ as a module. Then import our model, `Comment`, as well since we'll need to add\
    \ that. And finally create the class `CommentForm` specifying both the underlying\
    \ model and specific fields we wish to expose, which will be comment and author.\n\
    \n```\npython\n# articles/forms.py\nfrom django import forms\n\nfrom .models import\
    \ Comment\n\nclass CommentForm(forms.ModelForm):\n    class Meta:\n        model\
    \ = Comment\n        fields = (\"comment\", \"author\")\n```"
  - "[PAGE 264]\n\nWeb forms can be incredibly complex but Django has thankfully abstracted\
    \ away much of the complexity for us.\n\n# Comment View\n\nCurrently we rely on\
    \ the generic class-based `DetailView` to power our `ArticleDetailView`. It is\
    \ well designed to display individual entries but it is not, by default, configured\
    \ to add additional information like a form. Class-based views are powerful because\
    \ their inheritance structure means that, if we know where to look, there is often\
    \ a specific module we can override to attain our desired outcome.\n\nThe one\
    \ we want in this case is called [get_context_data()](https://docs.djangoproject.com/en/4.0/ref/class-based-views/mixins-single-object/#django.views.generic.detail.SingleObjectMixin.get_context_data).\
    \ It is used to add information to a template by updating the [context](https://docs.djangoproject.com/en/4.0/ref/request-response/#django.template.Context),\
    \ a dictionary object containing all the variable names and values available in\
    \ our template. For performance reasons Django templates are compiled only once\
    \ so anything we want available in the template must be loaded from the beginning\
    \ into the context.\n\nWhat do we want to add in this case? Well, just our `CommentForm`.\
    \ And since context is a dictionary we must assign a variable name as well. How\
    \ about `form`? Here is what the new code looks like in `articles/views.py`.\n\
    \n```\npython\n# articles/views.py\nfrom .forms import CommentForm  # new\n\n\
    class ArticleDetailView(LoginRequiredMixin, DetailView):\n    model = Article\n\
    \    template_name = \"article_detail.html\"\n\n    def get_context_data(self,\
    \ **kwargs):  # new\n        context = super().get_context_data(**kwargs)\n  \
    \      context['form'] = CommentForm()\n        return context\n```"
  - "[PAGE 265]\n\nNear the top of the file we added an import line for `CommentForm`\
    \ and then updated the module for `get_context_data()`. First we pulled all existing\
    \ information into the context by using `super()`, then we added the variable\
    \ name `form` with the value of `CommentForm()`, and finally we returned the updated\
    \ context.\n\n# ## Comment Template\n\nTo display the form in our `article_detail.html`\
    \ template file we'll rely on the `form` variable and also crispy forms. This\
    \ pattern is the same as what we've done before in our other forms. At the top\
    \ load `crispy_form_tags`, create a standard-looking post form which uses a `csrf_token`\
    \ for security, and display our form fields via `{{ form|crispy }}`.\n\nCode\n\
    \n```\n<!-- templates/article_detail.html -->\n{% extends \"base.html\" %}\n{%\
    \ load crispy_forms_tags %} <!-- new! -->\n\n{% block content %}\n<div class=\"\
    article-entry\">\n  <h2>{{ object.title }}</h2>\n  <p>by {{ object.author }} |\
    \ {{ object.date }}</p>\n  <p>{{ object.body }}</p>\n</div>\n\n<hr>\n<h4>Comments</h4>\n\
    {% for comment in article.comment_set.all %}\n  <p>{{ comment.author }} &middot;\
    \ {{ comment }}</p>\n{% endfor %}\n<hr>\n\n<!-- Changes start here! -->\n<h4>Add\
    \ a comment</h4>\n  <form action=\"\" method=\"post\">{% csrf_token %}\n    {{\
    \ form|crispy }}\n    <button class=\"btn btn-success ml-2\" type=\"submit\">Save</button>\n\
    \  </form>\n<!-- Changes end here! -->\n```"
  - "[PAGE 266]\n\n```\nhtml\n<p><a href=\"{% url 'article_edit' article.pk %}\">Edit</a>\
    \ |\n  <a href=\"{% url 'article_delete' article.pk %}\">Delete</a></p>\n<p>Back\
    \ to <a href=\"{% url 'article_list' %}\">All Articles</a>.</p>\n{% endblock content\
    \ %}\n```\n\nIf you refresh the detail page the form is now displayed with familiar\
    \ Bootstrap and crispy forms styling.\n\n![](img/81ad3fb1f21eb31ec1562330903a439c_266_0.png)\n\
    \n# ## Form displayed\n\nSuccess! However we are only half done. If you attempt\
    \ to submit the form you'll receive an error because our view doesn't yet support\
    \ any `POST` methods!\n\n# ## Comment Post View\n\nWhat we ultimately need is\
    \ a view that handles both `GET` and `POST` requests depending upon whether the\
    \ form should be merely displayed or capable of being submitted. We could reach\
    \ for [FormMixin](https://docs.djangoproject.com/en/4.0/ref/class-based-views/mixins-editing/#django.views.generic.edit.FormMixin)\
    \ to combine both into our `ArticleDetailView` but as the [Django docs illustrate\
    \ quite well](https://docs.djangoproject.com/en/4.0/topics/class-based-views/mixins/#using-formmixin-with-detailview),\
    \ there are risks with this approach."
  - "[PAGE 267]\n\nTo avoid subtle interactions between `DetailView` and `FormMixin`\
    \ we will instead separate the `GET` and `POST` variations into their own dedicated\
    \ views. We can then transform `ArticleDetailView` into a *wrapper view* that\
    \ combines them. This is a very common pattern in more advanced Django development\
    \ because it is often the case that a single URL must behave differently based\
    \ on the user request (`GET`, `POST`, etc) or even the format (returning HTML\
    \ vs JSON).\n\nLet's start by renaming `ArticleDetailView` into `CommentGet` since\
    \ it handles `GET` requests but not `POST` requests. We'll then create a new `CommentPost`\
    \ view that is empty for now. And we can combine both into a new `ArticleDetailView`\
    \ that subclasses [View](https://docs.djangoproject.com/en/4.0/ref/class-based-views/base/#view),\
    \ the master class-based view upon which all the others classes are built.\n\n\
    # Code\n\n```\npython\n# articles/views.py\nfrom django.views import View  # new\n\
    \n\nclass CommentGet(DetailView):  # new\n    model = Article\n    template_name\
    \ = \"article_detail.html\"\n\n    def get_context_data(self, **kwargs):\n   \
    \     context = super().get_context_data(**kwargs)\n        context[\"form\"]\
    \ = CommentForm()\n        return context\n\n\nclass CommentPost():  # new\n \
    \   pass\n\n\nclass ArticleDetailView(LoginRequiredMixin, View):  # new\n    def\
    \ get(self, request, *args, **kwargs):\n        view = CommentGet.as_view()\n\
    \        return view(request, *args, **kwargs)\n\n    def post(self, request,\
    \ *args, **kwargs):\n        view = CommentPost.as_view()\n        return view(request,\
    \ *args, **kwargs)\n```"
