  md: "In `django_project/settings.py` we'll add the `accounts` app to our `INSTALLED_APPS`.\
    \ Then at the bottom of the file use the `AUTH_USER_MODEL` config to tell Django\
    \ to use our new custom user model in place of the built-in `User` model. We'll\
    \ call our custom user model `CustomUser`. Since it exists within our `accounts`\
    \ app we should refer to it as `accounts.CustomUser`.\n\n```\npython\n# django_project/settings.py\n\
    INSTALLED_APPS = [\n    \"django.contrib.admin\",\n    \"django.contrib.auth\"\
    ,\n    \"django.contrib.contenttypes\",\n    \"django.contrib.sessions\",\n  \
    \  \"django.contrib.messages\",\n    \"django.contrib.staticfiles\",\n    \"accounts.apps.AccountsConfig\"\
    ,  # new\n]\n...\nAUTH_USER_MODEL = \"accounts.CustomUser\"  # new\n```\n\nNow\
    \ update `accounts/models.py` with a new User model called `CustomUser` that extends\
    \ the existing `AbstractUser`. We also include our a custom field for age here.\n\
    \n```\npython\n# accounts/models.py\nfrom django.contrib.auth.models import AbstractUser\n\
    from django.db import models\n\n\nclass CustomUser(AbstractUser):\n    age = models.PositiveIntegerField(null=True,\
    \ blank=True)\n```\n\nIf you read the [official documentation on custom user models](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#using-a-custom-user-model-when-starting-a-project)\
    \ it recommends using `AbstractBaseUser` not `AbstractUser`. This needlessly complicates\
    \ things in my opinion, especially for beginners.\n\n`AbstractBaseUser` requires\
    \ a very fine level of control and customization. We essentially rewrite Django.\
    \ This *can be*"
  merge: -1
