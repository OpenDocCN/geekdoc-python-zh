    \ issues with our current *Newspaper* website. For one thing we want our newspaper\
    \ to be financially sustainable. With more time we could add a dedicated payments\
    \ app to charge for access, but for now we will require a user to log in to view\
    \ any articles. This is known as *authorization*. It's common to set different\
    \ rules around who is authorized to view areas of your site. Note that this is\
    \ different than **authentication** which is the process of registering and logging-in\
    \ users. Authorization restricts access; authentication enables a user sign up\
    \ and log in flow.\n\nAs a mature web framework, Django has built-in functionality\
