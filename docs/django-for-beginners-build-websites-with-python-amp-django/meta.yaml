    \ [\n    path(\"\", HomePageView.as_view(), name=\"home\"),\n]\n```\n\nAnd we're\
    \ done! Start up the local web server with the command `python manage.py runserver`\
    \ and navigate to `http://127.0.0.1:8000/` to see our new homepage.\n\n## About\
    \ Page\n\nThe process for adding an about page is very similar to what we just\
    \ did. We'll create a new template file, a new view, and a new url route. Start\
    \ by making a new template file called `templates/about.html` and populate it\
    \ with a short HTML headline.\n\n```html\n<!-- templates/about.html -->\n<h1>About\
    \ page</h1>\n```\n\nThen add a new view for the page.\n\n```python\n# pages/views.py\n\
    from django.views.generic import TemplateView\n\n\nclass HomePageView(TemplateView):\n\
    \    template_name = \"home.html\"\n\n\nclass AboutPageView(TemplateView):  #\
    \ new\n    template_name = \"about.html\"\n```\n\nAnd finally import the view\
    \ name and connect it to a URL at `about/`.\n\n```python\n# pages/urls.py\nfrom\
    \ django.urls import path\nfrom .views import HomePageView, AboutPageView  # new\n\
    ```\n\n```python\nurlpatterns = [\n    path(\"about/\", AboutPageView.as_view(),\
    \ name=\"about\"),  # new\n    path(\"\", HomePageView.as_view(), name=\"home\"\
    ),\n]\n```\n\nStart up the web server with `runserver` and navigate to `http://127.0.0.1:8000/about`.\
    \ The new About page is visible.\n\n## Extending Templates\n\nThe real power of\
    \ templates is their ability to be extended. If you think about most websites,\
    \ there is content that is repeated on every page (header, footer, etc). Wouldn't\
    \ it be nice if we, as developers, could have *one canonical place* for our header\
    \ code that would be inherited by all other templates?\n\nWell we can! Let's create\
    \ a `base.html` file containing a header with links to our two pages. We could\
    \ name this file anything but using `base.html` is a common convention. In your\
    \ text editor make this new file called `templates/base.html`.\n\nDjango has a\
    \ minimal templating language for adding links and basic logic in our templates.\
    \ You can see the full list of built-in template tags [here in the official docs](https://docs.djangoproject.com/en/stable/ref/templates/builtins/).\
    \ Template tags take the form of `{% something %}` where the \"something\" is\
    \ the template tag itself. You can even create your own custom template tags,\
    \ though we won't do that in this book.\n\nTo add URL links in our project we\
    \ can use the [built-in url template tag](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#url)\
    \ which takes the URL pattern name as an argument. Remember how we added optional\
    \ URL names to our two routes in `pages/urls.py`? This is why. The `url` tag uses\
    \ these names to automatically create links for us.\n\nThe URL route for our homepage\
    \ is called `home`. To configure a link to it we use the following syntax: `{%\
    \ url 'home' %}`.\n\n```html\n<!-- templates/base.html -->\n<header>\n  <a href=\"\
    {% url 'home' %}\">Home</a> |\n  <a href=\"{% url 'about' %}\">About</a>\n</header>\n\
    \n{% block content %} {% endblock content %}\n```\n\nAt the bottom we've added\
    \ a `block` tag called `content`. Blocks can be overwritten by child templates\
    \ via inheritance. While it's optional to name our closing `endblock`—you can\
    \ just write `{% endblock %}` if you prefer—doing so helps with readability, especially\
    \ in larger template files.\n\nLet's update our `home.html` and `about.html` files\
    \ to extend the `base.html` template. That means we can reuse the same code from\
    \ one template in another template. The Django templating language comes with\
    \ an [extends](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#extends)\
    \ method that we can use for this.\n\n```html\n<!-- templates/home.html -->\n\
    {% extends \"base.html\" %}\n\n{% block content %}\n<h1>Homepage</h1>\n{% endblock\
    \ content %}\n```"
  mdcn: "在后续章节中，模板的使用将支持构建能够承载数百、数千甚至数百万网页的网站，而代码量却极少。\n\n首先需要考虑的是模板在 Django 项目结构中的放置位置。有两种选择。默认情况下，Django\
    \ 的模板加载器会在每个应用中查找相关模板。然而这种结构有些令人困惑：每个应用都需要一个新的 `templates` 目录，另一个与应用同名的目录，然后才是模板文件本身。\n\
    \n因此，在我们的 `pages` 应用中，Django 期望的目录结构如下：\n\n```\nLayout\n└── pages\n    └── templates\n\
    \        └── pages\n            └── home.html\n```\n\n这意味着我们需要创建一个新的 `templates`\
    \ 目录，一个与应用同名的 `pages` 目录，最后才是我们的模板文件 `home.html`。\n\n为什么要采用这种看似重复的方式？简而言之，Django\
    \ 模板加载器希望确保它能找到正确的模板！如果两个不同的应用中都有 `home.html` 文件怎么办？这种结构可以确保不会出现此类冲突。\n\n不过，还有另一种方法，即创建一个项目级别的\
    \ `templates` 目录，将*所有*模板放在其中。通过对 `django_project/settings.py` 文件进行小幅修改，我们可以告诉\
    \ Django *同时*在这个目录中查找模板。这就是我们将要采用的方法。\n\n首先，使用 `Control+c` 命令退出正在运行的服务器。然后创建一个名为\
    \ `templates` 的目录。\n\n```\nShell\n\n(.venv) > mkdir templates\n```\n\n接下来，我们需要更新\
    \ `django_project/settings.py`，告诉 Django 我们新的 `templates` 目录的位置。这是对 `TEMPLATES`\
    \ 下 `\"DIRS\"` 设置的单行修改。\n\n```python\n# django_project/settings.py\nTEMPLATES\
    \ = [\n    {\n        ...\n        \"DIRS\": [BASE_DIR / \"templates\"],  # new\n\
    \        ...\n    },\n]\n```\n\n在 `templates` 目录中创建一个名为 `home.html` 的新文件。你可以在文本编辑器中完成此操作：在\
    \ Visual Studio Code 中，转到屏幕左上角，点击\"File\"，然后点击\"New File\"。确保在正确的位置命名并保存文件。\n\n\
    `home.html` 文件暂时只包含一个简单的标题。\n\n```html\n<!-- templates/home.html -->\n<h1>Homepage</h1>\n\
    ```\n\n好了，我们的模板完成了！下一步是配置 URL 和视图文件。\n\n## 基于类的视图\n\n早期版本的 Django 只提供基于函数的视图，但开发者很快发现自己在不断重复相同的模式。编写一个列出模型中所有对象的视图。编写一个只显示模型中某个详细项目的视图。诸如此类。\n\
    \n引入了基于函数的通用视图来抽象这些模式，并简化常见模式的开发。然而，[没有简单的方法来扩展或自定义这些视图](https://docs.djangoproject.com/en/4.0/topics/class-based-views/)。因此，Django\
    \ 引入了基于类的通用视图，使其易于使用，同时也能扩展涵盖常见用例的视图。\n\n类是 Python 的基础组成部分，但对它们的深入讨论超出了本书的范围。如果你需要入门或复习，我建议查看[官方\
    \ Python 文档](https://docs.python.org/3/tutorial/classes.html)，其中有关类及其用法的优秀教程。\n\
    \n在我们的视图中，我们将使用[内置的 TemplateView](https://docs.djangoproject.com/en/4.0/ref/class-based-views/base/#django.views.generic.base.TemplateView)\
    \ 来显示我们的模板。更新 `pages/views.py` 文件。\n\n```python\n# pages/views.py\nfrom django.views.generic\
    \ import TemplateView\n\n\nclass HomePageView(TemplateView):\n    template_name\
    \ = \"home.html\"\n```\n\n注意，我们将视图命名为 HomePageView 并使用了大写，因为它现在是一个 Python 类。与函数不同，类[应该始终使用大写](https://peps.python.org/pep-0008/#class-names)。`TemplateView`\
    \ 已经包含了显示模板所需的所有逻辑，我们只需要指定模板的名称。\n\n## URL\n\n最后一步是更新我们的 URL。回想一下第 2 章，我们需要在两个位置进行更新。首先，我们更新\
    \ `django_project/urls.py` 文件以指向我们的 pages 应用，然后在 pages 中将视图与 URL 路由匹配。\n\n让我们从\
    \ `django_project/urls.py` 文件开始。\n\n```python\n# django_project/urls.py\nfrom\
    \ django.contrib import admin\nfrom django.urls import path, include  # new\n\n\
    urlpatterns = [\n    path(\"admin/\", admin.site.urls),\n    path(\"\", include(\"\
    pages.urls\")),  # new\n]\n```\n\n这里的代码此时应该看起来很熟悉了。我们在第二行添加了 `include`，将现有 URL\
    \ 指向 pages 应用。接下来创建一个名为 `pages/urls.py` 的文件，并添加以下代码。这个模式与我们在第 2 章中所做的几乎完全相同，只有一个主要区别：使用基于类的视图时，你始终需要在视图名称末尾添加\
    \ `as_view()`。\n\n```python\n# pages/urls.py\nfrom django.urls import path\nfrom\
    \ .views import HomePageView\n\nurlpatterns = [\n    path(\"\", HomePageView.as_view(),\
    \ name=\"home\"),\n]\n```\n\n完成了！使用命令 `python manage.py runserver` 启动本地 Web 服务器，然后访问\
    \ `http://127.0.0.1:8000/` 查看我们的新主页。\n\n## 关于页面\n\n添加关于页面的过程与我们刚才所做的非常相似。我们将创建一个新的模板文件、一个新的视图和一个新的\
    \ URL 路由。首先创建一个名为 `templates/about.html` 的新模板文件，并在其中添加一个简短的 HTML 标题。\n\n```html\n\
    <!-- templates/about.html -->\n<h1>About page</h1>\n```\n\n然后为该页面添加一个新视图。\n\n\
    ```python\n# pages/views.py\nfrom django.views.generic import TemplateView\n\n\
    \nclass HomePageView(TemplateView):\n    template_name = \"home.html\"\n\n\nclass\
    \ AboutPageView(TemplateView):  # new\n    template_name = \"about.html\"\n```\n\
    \n最后导入视图名称，并将其连接到 `about/` 的 URL。\n\n```python\n# pages/urls.py\nfrom django.urls\
    \ import path\nfrom .views import HomePageView, AboutPageView  # new\n```\n\n\
    ```python\nurlpatterns = [\n    path(\"about/\", AboutPageView.as_view(), name=\"\
    about\"),  # new\n    path(\"\", HomePageView.as_view(), name=\"home\"),\n]\n\
    ```\n\n使用 `runserver` 启动 Web 服务器，然后访问 `http://127.0.0.1:8000/about`。新的关于页面就可见了。\n\
    \n## 模板继承\n\n模板的真正强大之处在于它们能够被继承。如果你想想大多数网站，有些内容会在每个页面上重复出现（页眉、页脚等）。作为开发者，如果我们能有一个*唯一权威的位置*来存放页眉代码，然后被所有其他模板继承，那不是很好吗？\n\
    \n我们确实可以！让我们创建一个 `base.html` 文件，其中包含一个带有指向我们两个页面链接的页眉。我们可以给这个文件起任何名字，但使用 `base.html`\
    \ 是一个常见的约定。在你的文本编辑器中创建这个名为 `templates/base.html` 的新文件。\n\nDjango 有一个极简的模板语言，用于在模板中添加链接和基本逻辑。你可以在[官方文档这里](https://docs.djangoproject.com/en/stable/ref/templates/builtins/)查看内置模板标签的完整列表。模板标签的形式为\
    \ `{% something %}`，其中 \"something\" 就是模板标签本身。你甚至可以创建自己的自定义模板标签，不过本书不会涉及。\n\n\
    要在我们的项目中添加 URL 链接，我们可以使用[内置的 url 模板标签](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#url)，它接受\
    \ URL 模式名称作为参数。还记得我们在 `pages/urls.py` 中为两条路由添加的可选 URL 名称吗？这就是原因。`url` 标签使用这些名称自动为我们创建链接。\n\
    \n我们主页的 URL 路由名为 `home`。要配置指向它的链接，我们使用以下语法：`{% url 'home' %}`。\n\n```html\n<!--\
    \ templates/base.html -->\n<header>\n  <a href=\"{% url 'home' %}\">Home</a> |\n\
    \  <a href=\"{% url 'about' %}\">About</a>\n</header>\n\n{% block content %} {%\
    \ endblock content %}\n```\n\n在底部，我们添加了一个名为 `content` 的 `block` 标签。块可以通过继承被子模板覆盖。虽然命名我们的结束\
    \ `endblock` 是可选的——如果你愿意，可以直接写 `{% endblock %}`——但这样做有助于提高可读性，尤其是在较大的模板文件中。\n\n\
    让我们更新 `home.html` 和 `about.html` 文件以继承 `base.html` 模板。这意味着我们可以在一个模板中重用另一个模板的代码。Django\
    \ 模板语言提供了一个 [extends](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#extends)\
    \ 方法，我们可以用它来实现这一点。\n\n```html\n<!-- templates/home.html -->\n{% extends \"base.html\"\
    \ %}\n\n{% block content %}\n<h1>Homepage</h1>\n{% endblock content %}\n```"
