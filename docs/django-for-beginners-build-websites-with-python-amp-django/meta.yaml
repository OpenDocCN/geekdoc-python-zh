    # # Templates


    Every web framework needs a convenient way to generate HTML files and in Django
    the approach is to use *templates*: individual HTML files that can be linked together
    and also include basic logic.


    Recall that in the previous chapter our "Hello, World" site had the phrase hardcoded
    into a `views.py` file. That technically works but doesn''t scale well! A better
    approach is to link a view to a template, thereby separating the information contained
    in each.


    In this chapter we''ll learn how to use templates to more easily create our desired
    homepage and about page. And in'
- md: "future chapters, the use of templates will support building websites that can\
    \ support hundreds, thousands, or even millions of webpages with a minimal amount\
    \ of code.\n\nThe first consideration is where to place templates within the structure\
    \ of a Django project. There are two options. By default, Django's template loader\
    \ will look within each app for related templates. However the structure is somewhat\
    \ confusing: each app needs a new `templates` directory, another directory with\
    \ the same name as the app, and then the template file.\n\nTherefore, in our `pages`\
    \ app, Django would expect the following layout:\n\n```\nLayout\n└── pages\n \
    \   └── templates\n        └── pages\n            └── home.html\n```\n\nThis means\
    \ we would need to create a new `templates` directory, a new directory with the\
    \ name of the app, `pages`, and finally our template itself which is `home.html`.\n\
    \nWhy this seemingly repetitive approach? The short answer is that the Django\
    \ template loader wants to be really sure it finds the correct template! What\
    \ happens if there are `home.html` files within two separate apps? This structure\
    \ makes sure there are no such conflicts.\n\nThere is, however, another approach\
    \ which is to instead create a single project-level `templates` directory and\
    \ place *all* templates within there. By making a small tweak to our `django_project/settings.py`\
    \ file we can tell Django to *also* look in this directory for templates. That\
    \ is the approach we'll use.\n\nFirst, quit the running server with the `Control+c`\
    \ command. Then create a directory called `templates`.\n\n```\nShell\n\n(.venv)\
    \ > mkdir templates\n```\n\nNext we need to update `django_project/settings.py`\
    \ to tell Django the location of our new `templates` directory. This is a one-line\
    \ change to the setting `\"DIRS\"` under `TEMPLATES`.\n\n```python\n# django_project/settings.py\n\
    TEMPLATES = [\n    {\n        ...\n        \"DIRS\": [BASE_DIR / \"templates\"\
    ],  # new\n        ...\n    },\n]\n```\n\nWithin the `templates` directory create\
    \ a new file called `home.html`. You can do this within your text editor: in Visual\
    \ Studio Code go to the top left of your screen, click on \"File\" and then \"\
    New File.\" Make sure to name and save the file in the correct location.\n\nThe\
    \ `home.html` file will have a simple headline for now.\n\n```html\n<!-- templates/home.html\
    \ -->\n<h1>Homepage</h1>\n```\n\nOk, our template is complete! The next step is\
    \ to configure our URL and view files.\n\n## Class-Based Views\n\nEarly versions\
    \ of Django only shipped with function-based views, but developers soon found\
    \ themselves repeating the same patterns over and over again. Write a view that\
    \ lists all objects in a model. Write a view that displays only one detailed item\
    \ from a model. And so on.\n\nFunction-based generic views were introduced to\
    \ abstract these patterns and streamline development of common patterns. However,\
    \ there was [no easy way to extend or customize these views](https://docs.djangoproject.com/en/4.0/topics/class-based-views/).\
    \ As a result, Django introduced class-based generic views that make it easy to\
    \ use and also extend views covering common use cases.\n\nClasses are a fundamental\
    \ part of Python but a thorough discussion of them is beyond the scope of this\
    \ book. If you need an introduction or refresher, I suggest reviewing the [official\
    \ Python docs](https://docs.python.org/3/tutorial/classes.html) which have an\
    \ excellent tutorial on classes and their usage.\n\nIn our view we will use the\
    \ [built-in TemplateView](https://docs.djangoproject.com/en/4.0/ref/class-based-views/base/#django.views.generic.base.TemplateView)\
    \ to display our template. Update the `pages/views.py` file.\n\n```python\n# pages/views.py\n\
    from django.views.generic import TemplateView\n\n\nclass HomePageView(TemplateView):\n\
    \    template_name = \"home.html\"\n```\n\nNote that we've capitalized our view,\
    \ HomePageView, since it's now a Python class. Classes, unlike functions, [should\
    \ always be capitalized](https://peps.python.org/pep-0008/#class-names). The `TemplateView`\
    \ already contains all the logic needed to display our template, we just need\
    \ to specify the template's name.\n\n## URLs\n\nThe last step is to update our\
