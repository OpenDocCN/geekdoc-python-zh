    a "checklist" for these since there quickly become too many to remember. At this
    stage, we are intentionally keeping things basic however this list will grow in
    future projects as we add additional security and performance features.


    Here is the current deployment checklist:


    +   - install Gunicorn

    - create a `requirements.txt` file

    - update `ALLOWED_HOSTS` in `django_project/settings.py`

    - create a `Procfile`

    - create a `runtime.txt` file'
