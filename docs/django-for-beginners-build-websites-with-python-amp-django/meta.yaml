  md: '# # Chapter 16: Deployment


    There is a fundamental tension between the ease-of-use desired in a local Django
    development environment and the security and performance necessary in a production
    environment. Django is designed to make web developers''s lives easier and it
    therefore defaults to a local configuration when the `startproject` command is
    first run. We''ve seen this in the use of SQLite as the file-based database and
    the various configurations in `settings.py` out of the box.


    But as we''ve already seen in our projects, deployment requires additional steps
    for proper security and performance. Here is the complete deployment checklist
    last used for the *Blog* app back in Chapter 7:


    +   - install Gunicorn

    - create a `requirements.txt` file

    - update `ALLOWED_HOSTS` in `django_project/settings.py`

    - create a `Procfile` file

    - create a `runtime.txt` file

    - configure static files, install `whitenoise`, and run `collectstatic`

    - create and update a `.gitignore` file

    - create a new Heroku project, push the code to it, and start a dyno web process


    In truth, though, this list is far from complete. We''ve relied on a number of
    shortcuts in our deployments so far that now need to be fixed. As the [Django
    deployment checklist](https://docs.djangoproject.com/en/4.0/howto/deployment/checklist/)
    notes, at the very minimum, a production environment should also have:


    +   - `DEBUG` set to `False`

    - `SECRET_KEY` actually kept secret'
