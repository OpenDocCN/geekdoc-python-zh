    # ## SQLite vs PostgreSQL'
  - '[PAGE 161]


    So far in this book we have been using the file-based SQLite database preconfigured
    by Django both locally and in deployment. It is much easier to configure and use
    than a server-based database. However, this convenience comes at a cost. Notably
    Heroku has an *ephemeral file system* so any changes to the `db.sqlite3` file
    *in the cloud* will be forgotten whenever a new deployment or server restart occurs.
    On the free tier we are using, server restarts can happen as often as every 24
    hours.


    That means that if you make changes to the database locally and push them to production,
    they will remain. However, if you make updates to the live website such as new
    blog entries or edits, they will not exist for very long. We need a standalone
    database engine to persist our data in the cloud which we''ll cover in our next
    project.


