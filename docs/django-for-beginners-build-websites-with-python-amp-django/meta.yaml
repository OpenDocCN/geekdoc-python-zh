    wsv

    ```


    Sometimes, however, the shell commands on Windows and macOS are completely different.
    A good example is the command for outputting a basic "Hello, World!" message to
    the console. On Windows the command is `Write-Host` while on macOS the command
    is `echo`.


    ```

    Shell

    # Windows

    > Write-Host "Hello, World!"

    Hello, World!


    # macOS

    % echo "Hello, World!"

    Hello, World!

    ```


    A frequent task on the command line is navigating within the computer filesystem.
    On Windows and macOS the command `pwd` (print working directory) outputs the current
    location within the file system.


    ```

    Shell

    # Windows

    > pwd


    Path

    ----

    C:\Users\wsv


    # macOS

    % pwd

    /Users/wsv

    ```


