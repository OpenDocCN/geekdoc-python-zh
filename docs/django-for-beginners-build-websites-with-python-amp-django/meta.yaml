  - "[PAGE 250]\n\n```\npython\n\"title\",\n\"body\",\n)\ntemplate_name = \"article_edit.html\"\
    \n\ndef test_func(self):  # new\n    obj = self.get_object()\n    return obj.author\
    \ == self.request.user\n\nclass ArticleDeleteView(\n  LoginRequiredMixin, UserPassesTestMixin,\
