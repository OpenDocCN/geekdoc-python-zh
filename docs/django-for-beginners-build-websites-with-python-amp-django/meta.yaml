    # ## Conclusion


    With a small amount of code we''ve built a Blog application that allows for creating,
    reading, updating, and deleting blog posts. This core functionality is known by
    the acronym *CRUD: Create-Read-Update-Delete*. While there are multiple ways to
    achieve this same functionality–we could have used function-based views or written
    our own class-based views–we''ve demonstrated how little code it takes in Django
    to make this happen.


    Note, however, a potential security concern: currently *any* user can update or
    delete blog entries, not just the creator! This is not ideal and indeed Django
    comes with built-in features to restrict access based on permissions, which we''ll
    cover in-depth in Chapter 14.


    But for now our Blog application is working and in the next chapter we''ll add
    user accounts so users can sign up, log in, and log out of the web app.'
