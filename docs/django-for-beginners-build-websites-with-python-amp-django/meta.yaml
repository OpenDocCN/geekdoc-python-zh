  md: 'components. This makes it easier for a developer to reason about the code.
    The MVC pattern is widely used among web frameworks including Ruby on Rails, Spring
    (Java), Laravel (PHP), ASP.NET (C#) and many others.


    In the traditional MVC pattern there are three major components:


    +   - Model: Manages data and core business logic

    - View: Renders data from the model in a particular format

    - Controller: Accepts user input and performs application-specific logic


    Django only loosely follows the traditional MVC approach with its own version
    often called **Model-View-Template (MVT)**. This can be initially confusing to
    developers with previous web framework experience. In reality, Django''s approach
    is really it is a 4-part pattern that also incorporates URL Configuration so something
    like *MVTU* would be a more accurate description.


    The Django MVT pattern is as follows:


    +   - Model: Manages data and core business logic

    - View: Describes *which* data is sent to the user but not its presentation

    - Template: Presents the data as HTML with optional CSS, JavaScript, and Static
    Assets

    - URL Configuration: Regular-expression components configured to a View


    This interaction is fundamental to Django yet **very confusing** to newcomers
    so let''s map out the order of a given HTTP request/response cycle. When you type
    in a URL, such as `https://djangoproject.com`, the first thing that happens within
    our Django project is a URL pattern'
  merge: -1
  pgno: 41
- img_proc: true
  md: '(contained in `urls.py`) is found that matches it. The URL pattern is linked
    to a single view (contained in `views.py`) which combines the data from the model
    (stored in `models.py`) and the styling from a template (any file ending in `.html`).
    The view then returns a HTTP response to the user.


    The complete Django flow looks like this:


    | Django request/response cycle |

    |---|

    | HTTP Request -> URL -> View -> Model and Template -> HTTP Response |


    If you are brand new to web development the distinction between MVC and MVT will
    not matter much. This book demonstrates the Django way of doing things so there
    won''t be confusion. However if you are a web developer with previous MVC experience,
    it can take a little while to shift your thinking to the "Django way" of doing
    things which is more loosely coupled and allows for easier modifications.


    # ## Create An App


    Django uses the concept of projects and apps to keep code clean and readable.
    A single top-level Django project can contain multiple apps. Each app controls
    an isolated piece of functionality. For example, an e-commerce site might have
    one app for user authentication, another app for payments, and a third app to
    power item listing details. That''s three distinct apps that all live within one
    top-level project. How and when you split functionality into apps is somewhat
    subjective, but in general, each app should have a clear function.


    To add a new app go to the command line and quit the running server with `Control+c`.
    Then use the `startapp` command followed by the name of our app which will be
    `pages`.'
