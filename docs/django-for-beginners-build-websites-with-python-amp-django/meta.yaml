    \ OK\n  Applying auth.0012_alter_user_first_name_max_length... OK\n  Applying\
    \ sessions.0001_initial... OK\n```\n\nDjango 在这里所做的是创建一个 SQLite 数据库，并迁移它为我们提供的内置应用。这由我们目录中的新文件\
    \ db.sqlite3 表示。\n\n```\n├── django_project\n│   ├── __init__.py\n│   ├── asgi.py\n\
    │   ├── settings.py\n│   ├── urls.py\n│   └── wsgi.py\n├── db.sqlite3  # new\n\
    ├── manage.py\n└── .venv/\n```\n\n现在，如果你再次执行 python manage.py runserver，你应该不再看到任何警告。\n\
    \n## HTTP 请求/响应周期\n\n[HTTP（超文本传输协议）](https://example.com)最初由 Tim Berners-Lee 于\
    \ 1989 年创建，是万维网的基础。网络协议是一套用于格式化和处理数据的规则。它就像计算机的共同语言，即使它们位于地球的两端，拥有截然不同的硬件和软件，也能让它们相互通信。\n\
    \nHTTP 是一种在客户端-服务器计算模型中工作的请求-响应协议。每次你访问网页时，\"客户端\"（即你的计算机）会发送一个初始\"请求\"，\"服务器\"\
    会发回一个\"响应\"。不过，客户端不一定是计算机，它也可以是手机或任何联网设备。但过程是一样的：客户端向 URL 发送 HTTP 请求，服务器发回 HTTP\
    \ 响应。\n\n归根结底，像 Django 这样的 Web 框架所做的只是接受对给定 URL 的 HTTP 请求，并返回包含渲染网页所需信息的 HTTP\
    \ 响应。仅此而已。通常组件。这使开发人员更容易理解代码。MVC 模式被广泛用于 Web 框架，包括 Ruby on Rails、Spring（Java）、Laravel（PHP）、ASP.NET（C#）等。\n\
    \n在传统的 MVC 模式中，有三个主要组件：\n\n- Model（模型）：管理数据和核心业务逻辑\n- View（视图）：以特定格式渲染模型中的数据\n\
    - Controller（控制器）：接受用户输入并执行特定于应用程序的逻辑\n\nDjango 只是松散地遵循传统的 MVC 方法，它自己的版本通常被称为**模型-视图-模板（MVT）**。这对于有先前\
    \ Web 框架经验的开发人员来说最初可能会令人困惑。实际上，Django 的方法实际上是一个 4 部分模式，还包含了 URL 配置，因此像*MVTU*这样的描述会更准确。\n\
    \nDjango 的 MVT 模式如下：\n\n- Model（模型）：管理数据和核心业务逻辑\n- View（视图）：描述向用户发送*哪些*数据，但不描述其呈现方式\n\
    - Template（模板）：将数据呈现为 HTML，可选包含 CSS、JavaScript 和静态资源\n- URL Configuration（URL\
    \ 配置）：配置到视图的正则表达式组件\n\n这种交互是 Django 的基础，但对新手来说**非常令人困惑**，所以让我们梳理一下给定 HTTP 请求/响应周期的顺序。当你输入\
    \ URL，例如`https://djangoproject.com`时，在我们的 Django 项目中首先发生的是找到一个匹配的 URL 模式（包含在`urls.py`中）。该\
    \ URL 模式链接到一个单独的视图（包含在`views.py`中），它将模型中的数据（存储在`models.py`中）和模板中的样式（任何以`.html`结尾的文件）结合起来。然后视图向用户返回\
    \ HTTP 响应。\n\n完整的 Django 流程如下所示：\n\n| Django 请求/响应周期 |\n|---|\n| HTTP 请求 -> URL\
    \ -> 视图 -> 模型和模板 -> HTTP 响应 |\n\n如果你是 Web 开发的新手，MVC 和 MVT 之间的区别不会太大。本书演示了 Django\
    \ 的做事方式，因此不会有困惑。然而，如果你是有先前 MVC 经验的 Web 开发人员，可能需要一段时间才能将你的思维转变为\"Django 方式\"，这种方式更加松散耦合，并且允许更容易的修改。\n\
    \n## 创建一个应用\n\nDjango 使用项目和应用的概念来保持代码的清晰和可读。一个顶级 Django 项目可以包含多个应用。每个应用控制一个独立的功能片段。例如，一个电子商务网站可能有一个用于用户认证的应用，另一个用于支付的应用，以及第三个用于提供商品列表详情的应用。这是三个不同的应用，都存在于一个顶级项目中。如何以及何时将功能拆分为应用有些主观，但一般来说，每个应用应该有明确的功能。\n\
    \n要添加新应用，请转到命令行并使用`Control+c`退出正在运行的服务器。然后使用`startapp`命令，后跟我们应用的名称，即`pages`。"
