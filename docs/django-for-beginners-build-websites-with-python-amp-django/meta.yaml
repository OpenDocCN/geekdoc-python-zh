    \ import LoginRequiredMixin  # new\nfrom django.views.generic import ListView,\
    \ DetailView\n...\n\nclass ArticleCreateView(LoginRequiredMixin, CreateView):\
    \  # new\n    ...\n```\n\nNow return to the homepage at http://127.0.0.1:8000/\
