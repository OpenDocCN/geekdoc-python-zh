  md: 'referred to as "static files." Django provides tremendous flexibility around
    *how* these files are used, but this can lead to quite a lot of confusion for
    newcomers.


    By default, Django will look within each app for a folder called `static`. In
    other words, a folder called `blog/static/`. If you recall, this is similar to
    how `templates` are treated as well.


    As Django projects grow in complexity over time and have multiple apps, it is
    often simpler to reason about static files if they are stored in a single, project-level
    directory instead. That is the approach we will take here.


    Quit the local server with `Control+c` and create a new directory called `static`
    in the same folder as the `manage.py` file.


    ```


    Shell

    (.venv) > mkdir static

    ```


    Then we need to tell Django to look for this new folder when loading static files.
    If you look at the bottom of the `django_project/settings.py` file, there is already
    a single line of configuration:


    ```

    python

    # django_project/settings.py

    STATIC_URL = "/static/"

    ```


    [STATIC_URL](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATIC_URL)
    is the *URL location* of static files in our project, aka at `/static/`.


    By configuring [STATICFILES_DIRS](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATICFILES_DIRS),
    we can tell Django where to look for static files beyond just `app/static` folder.
    In your `django_project/settings.py` file, at the bottom, add the following new
    line which tells Django to look within our newly-created `static` folder for static
    files.'
