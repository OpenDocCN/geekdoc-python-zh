    On the SendGrid website sign up for a free account. Make sure that the email account
    you use for SendGrid **is not** the same email account you have for your superuser
    account on the *Newspaper* project or weird errors may result. On the "Tell Us
    About Yourself" page is a required field for "Company Website". I recommend using
    the URL of your'
