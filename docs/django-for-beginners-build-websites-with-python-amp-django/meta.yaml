    \ 用于应用特定的测试\n- `views.py` 是我们处理 Web 应用请求/响应逻辑的地方\n\n请注意，MVT 模式中的模型、视图和 URL 从一开始就已经存在。唯一缺少的是模板，我们很快就会添加它。\n\
    \n尽管我们的新应用存在于 Django 项目中，但 Django 并不会\"知道\"它的存在，直到我们明确将其添加到 `django_project/settings.py`\
    \ 文件中。在你的文本编辑器中打开该文件，向下滚动到 `INSTALLED_APPS`，你会看到已经有六个内置的 Django 应用。在底部添加 `pages.apps.PagesConfig`。\n\
    \n```\n# django_project/settings.py\nINSTALLED_APPS = [\n    \"django.contrib.admin\"\
    ,\n    \"django.contrib.auth\",\n    \"django.contrib.contenttypes\",\n    \"\
    django.contrib.sessions\",\n    \"django.contrib.messages\",\n    \"django.contrib.staticfiles\"\
    ,\n    \"pages.apps.PagesConfig\",  # new\n]\n```\n\n如果你在文本编辑器中安装了 Black，并设置为\"\
    保存时\"自动格式化，它会将这里所有的单引号 `'` 改为双引号 `\"`。这没问题。如前所述，Django 计划在未来全面采用 Black Python\
    \ 格式化。\n\n你可能会问，`PagesConfig` 是什么？嗯，它是此时 `pages/apps.py` 文件中唯一函数的名称。\n\n```\n\
    # pages/apps.py\nfrom django.apps import AppConfig\n\n\nclass PagesConfig(AppConfig):\n\
    \    default_auto_field = \"django.db.models.BigAutoField\"\n    name = \"pages\"\
    \n```\n\n如果你此时感到困惑，不要担心：内化 Django 项目和应用的结构需要练习。在本书的过程中，我们将构建许多项目和应用，这些模式很快就会变得熟悉。\n\
    \n## Hello, World\n\n在 Django 中，驱动一个单独的动态（即链接到数据库）网页需要四个与 MVT 模式对齐的独立文件：\n\n-\
    \ `models.py`\n- `views.py`\n- `template.html`（任何 HTML 文件都可以）\n- `urls.py`\n\n\
    然而，要创建一个静态网页（不链接到数据库），我们可以将数据硬编码到视图中，因此不需要模型。这就是我们在这里要做的，以保持简单。从第 4 章开始，我们将在所有项目中使用模型。\n\
    \n因此，下一步是创建我们的第一个视图。首先更新 `pages` 应用中的 `views.py` 文件，使其如下所示：\n\n```python\n# pages/views.py\n\
    from django.http import HttpResponse\n\ndef homePageView(request):\n    return\
    \ HttpResponse(\"Hello, World!\")\n```\n\n基本上，我们是在说，每当调用视图函数 `homePageView` 时，返回文本\
    \ \"Hello, World!\"。更具体地说，我们导入了内置的 [HttpResponse](https://docs.djangoproject.com/en/4.0/ref/request-response/#django.http.HttpResponse)\
    \ 方法，以便可以向用户返回响应对象。我们创建了一个名为 `homePageView` 的函数，它接受请求对象并返回带有字符串 \"Hello, World!\"\
    \ 的响应。\n\nDjango 中有两种类型的视图：基于函数的视图（FBVs）和基于类的视图（CBVs）。我们此示例中的代码是基于函数的视图：它相对简单且易于实现，也很明确。Django\
    \ 最初只有基于函数的视图，但随着时间的推移添加了基于类的视图，它们允许更大的代码可重用性，保持 DRY（不要重复自己）原则，并且可以通过混入（mixins）进行扩展。基于类的视图的额外抽象使它们非常强大和简洁，但也使\
    \ Django 新手更难阅读。\n\n由于 Web 开发很快会变得重复，Django 还附带了许多内置的通用基于类的视图（GCBVs）来处理常见用例，例如创建新对象、表单、列表视图、分页等。我们将在本书后面的章节中大量使用\
    \ GCBVs。\n\n因此，从技术上讲，在 Django 中有三种编写视图的方式：基于函数的视图（FBVs）、基于类的视图（CBVs）和通用基于类的视图（GCBVs）。这种定制对高级开发人员有帮助，但对新手来说令人困惑。许多\
    \ Django 开发人员——包括本书作者——倾向于尽可能使用 GCBVs，并在需要时回退到 CBVs 或 FBVs。到本书结束时，你将已经使用过这三种方式，可以自己决定更喜欢哪种方法。\n\
    \n继续，我们需要配置我们的 URL。在你的文本编辑器中，在 `pages` 应用中创建一个名为 `urls.py` 的新文件。然后用以下代码更新它：\n\n\
    ```python\n# pages/urls.py\nfrom django.urls import path\nfrom .views import homePageView\n\
    \nurlpatterns = [\n    path(\"\", homePageView, name=\"home\"),\n]\n```\n\n在第一行，我们从\
    \ Django 导入 `path` 来驱动我们的 URL 模式，在下一行我们导入我们的视图。通过将 `views.py` 文件称为 `.views`，我们告诉\
    \ Django 在当前目录中查找 `views.py` 文件，并从那里导入视图 `homePageView`。\n\n我们的 URL 模式有三个部分：\n\
    \n- 空字符串 \"\" 的 Python 正则表达式\n- 对名为 `homePageView` 的视图的引用\n- 一个可选的[命名 URL 模式](link)，称为\
    \ \"home\"\n\n换句话说，如果用户请求由空字符串 \"\" 表示的主页，Django 应该使用名为 `homePageView` 的视图。\n\n\
    我们*几乎*完成了。最后一步是更新我们的 `django_project/urls.py` 文件。在一个 Django 项目中通常有多个应用，比如这里的 `pages`，它们每个都需要自己专用的\
    \ URL 路径。\n\n```python\n# django_project/urls.py\nfrom django.contrib import admin\n\
    from django.urls import path, include  # new\n\nurlpatterns = [\n    path(\"admin/\"\
    , admin.site.urls),\n    path(\"\", include(\"pages.urls\")),  # new\n]\n```\n\
    \n我们在第二行导入了 `include`，紧挨着 `path`，然后为我们的 `pages` 应用创建了一个新的 URL 模式。现在，每当用户访问主页时，他们将首先被路由到\
    \ `pages` 应用，然后到 `pages/urls.py` 文件中设置的 `homePageView` 视图。\n\n这种需要两个独立的 `urls.py`\
    \ 文件的要求常常让初学者感到困惑。将顶层 `django_project/urls.py` 视为通往每个应用特有 URL 模式的网关。\n\n我们现在有了所有需要的代码。要确认一切按预期工作，重新启动我们的\
    \ Django 服务器：\n\n```\nShell\n# Windows\n(.venv) > python manage.py runserver\n\
    \n# macOS\n(.venv) % python3 manage.py runserver\n```\n\n如果你刷新浏览器访问 `http://127.0.0.1:8000/`，它现在会显示文本\
    \ \"Hello, World!\"\n\n![](img/81ad3fb1f21eb31ec1562330903a439c_48_0.png)\n\n\
    **Hello World 主页**\n\n### Git\n\n在上一章中，我们安装了版本控制系统 Git。让我们在这里使用它。第一步是初始化（或添加）Git\
    \ 到我们的仓库。确保你已经用 `Control+c` 停止了本地服务器，然后运行命令 `git init`。\n\n```\nShell\n(.venv)\
    \ > git init\n```\n\n如果你然后输入 `git status`，你会看到自上次 Git 提交以来的更改列表。由于这是我们的第一次提交，这个列表就是我们到目前为止的所有更改。\n\
    \n```\nShell\n(.venv) > git status\nOn branch main\n\nNo commits yet\n\nUntracked\
