    ## Text Editors


    The command line is where we execute commands for our programs but a text editor
    is where actual code is written. The computer doesn''t care what text editor you
    use–the end result is just code–but a good text editor can provide helpful hints
    and catch typos for you.


    There are many modern text editors available but a very popular one is [Visual
    Studio Code](https://code.visualstudio.com/), which is free, easy to install,
    and enjoys widespread popularity. If you''re not already using a text editor,
    download and install VSCode from the official website.


    An optional-but highly recommended-additional step is to take advantage of the
    large ecosystem of extensions available on VSCode. On Windows, navigate to `File
    -> Preferences -> Extensions` or on macOS `Code -> Preferences -> Extensions`.
    This launches a search bar for the extensions marketplace. Enter "python" which
    will bring up the Microsoft extension as the first result. Install it.


    A second extension to add is [Black](https://github.com/psf/black), which is a
    Python code formatter that has quickly become the default within the Python community.
    To install Black, open a Terminal window within VSCode by going to `Terminal ->
    New Terminal` at the top of the page. In the new terminal window opened at the
    bottom of the page, type `python -m pip install black`. Next, open up the VSCode
    settings by navigating to `File -> Preferences -> Settings` on Windows or `Code
    -> Preferences -> Settings` on macOS. Search for "python formatting provider"
    and select `black` from the dropdown options. Then search for "format on save"
    and enable "Editor: Format on Save". Black will now automatically format your
    code whenever a `*.py` file is saved.


    To confirm this is working, use your text editor to create a new file called `hello.py`
    within the `ch1-setup` directory, located on your Desktop and type in the following
    using single quotes:


    ```

    hello.py

    python

    print(''Hello, World!'')

    ```


    On save, it should be automatically updated to using double quotes which is [Black''s
    default preference](https://black.readthedocs.io/en/stable/the_black_code_style/current_style.html#strings):
    `print("Hello, World!")`. That means everything is working properly.


    ## Install Git


    The final step is to install *Git*, a version control system that is indispensable
    to modern software development. With Git you can collaborate with other developers,
    track all your work via commits, and revert to any previous version of your code
    even if you accidentally delete something important!


    On Windows, navigate to the official website at `https://git-scm.com/` and click
    on the "Download" link which should install the proper version for your computer.
    Save the file and then open your Downloads folder and double click on the file.
    This will launch the Git for Windows installer. Click the "Next" button through
    most of the early defaults as they are fine and can always be updated later as
    needed. There are two exceptions however: under "Choosing the default editor used
    by Git" select VS Code not Vim. And in the section on "Adjusting the name of the
    initial branch in new repositories" select the option to use "main" as opposed
    to "master" as the default branch name. Otherwise the recommended defaults are
    fine and can always be tweaked later if needed.


    To confirm Git is installed on Windows, close all current shell windows and then
    open a new one which will load the changes to our PATH variable. Type in `git
    --version` which should show it is installed.


    ```

    shell

    # Windows

    > git --version

    git version 2.33.1.windows.1

    ```


    On macOS, installing Git via Xcode is currently the easiest option. To check if
    Git is already installed on your computer, type `git --version` in a new terminal
    window.


    ```

    shell

    # macOS

    % git --version

    ```


    If you do not have Git installed, a popup message will ask if you want to install
    it as part of "command line developer tools." Select "Install" which will load
    Xcode and its command line tools package. Or if you do not see the message for
    some reason, type `xcode-select --install` instead to install Xcode directly.


    Be aware that Xcode is a very large package so the initial download may take some
    time. Xcode is primarily designed for building iOS apps but also includes many
    developer features needed on macOS. Once the download is complete close all existing
    terminal shells, open a new window, and type in `git --version` to confirm the
    install worked.


    ```

    shell

    # macOS

    % git --version

    git version 2.30.1 (Apple Git-130)

    ```


    Once Git is installed on your machine we need to do a one-time *system* configuration
    by declaring the name and email address associated with all your Git commits.
    We will also set the default branch name to `main`. Within the command line shell
    type the following two lines. Make sure to update them with your name and email
    address.


    ```

    shell

    > git config --global user.name "Your Name"

    > git config --global user.email "yourname@email.com"

    > git config --global init.defaultBranch main

    ```


    You can always change these configs later if you desire by retyping the same commands
    with a new name or email address.


    ## Conclusion


    Phew! It is no easy task to configure a software development environment. But
    fortunately it is a one-time pain and will pay many dividends down the road. We
    have now learned about the command line, Python interactive mode, installed the
    latest version of Python, Django and Git, and configured our text editor. Everything
    is ready for our first Django app in the next chapter.


