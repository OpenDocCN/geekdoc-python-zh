    # ## 3rd Party Packages


    As we''ve seen in this book, 3rd party packages are a vital part of the Django
    ecosystem especially when it comes to deployment or improvements around user registration.
    It''s not uncommon for a professional Django website to rely on literally dozens
    of such packages.


    However, a word of caution is in order: don''t blindly install and use 3rd party
    packages just because it saves a small amount of time now. Every additional package
    introduces another dependency, another risk that its maintainer won''t fix every
    bug or won''t keep up to date with the latest version of Django. Take the time
    to understand what it is doing.


    If you''d like to view more packages, the [Django Packages](https://djangopackages.org/)
