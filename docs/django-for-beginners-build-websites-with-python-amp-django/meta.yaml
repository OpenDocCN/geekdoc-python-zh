    # # Chapter 13: Newspaper App


    It''s time to build out our *Newspaper* app. We will have an articles page where
    journalists can post articles, set up permissions so only the author of an article
    can edit or delete it, and finally add the ability for other users to write comments
    on each article which will introduce the concept of foreign keys.


    # ## Articles App


    To start create an `articles` app and define the database models. There are no
    hard and fast rules around what to name your apps except that you can''t use the
    name of a built-in app. If you look at the `INSTALLED_APPS` section of `django_project/settings.py`
    you can see which app names are off-limits:


    +   - admin

    - auth

    - contenttypes

    - sessions

    - messages

    - staticfiles


    A general rule of thumb is to use the plural of an app name–posts, payments, users,
    etc.–unless doing so is obviously wrong as in the common case of `blog` where
    the singular makes more sense.


    Start by creating our new `articles` app.


    ```


    Shell

    (.venv) > python manage.py startapp articles

    ```'
