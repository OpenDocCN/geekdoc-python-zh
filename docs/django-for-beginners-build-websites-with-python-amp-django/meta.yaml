    # ## Testing Philosophy


    There''s really no limit to what you can test in an application. For example,
    we *could* also add tests now based on logged-in or logged-out behavior and whether
    the template displays the proper content. But the 80/20 rule of 80% of consequences
    coming from 20% of causes applies to testing as well as most other things in life.
    There''s no sense making as many unit tests as possible to test things that will
    likely never fail, at least for a web application. If we were working on a nuclear
    reactor then it would make sense to have as many tests as possible, but the stakes
    are a bit lower for most websites.


    So while you do always want to add tests around new features, it''s ok to not
    have complete test coverage from the beginning. As errors inevitably arise on
    new Git branches and features, make sure to add a test for each so they don''t
    fail again. This is known as regression testing where tests are re-run each time
    there''s a new change to ensure that previously developed and tested software
    performs as expected.


    Django''s testing suite is well setup for many unit tests and automatic regression
    tests so developers have confidence in the consistency of their projects.


