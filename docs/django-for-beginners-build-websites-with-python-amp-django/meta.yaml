    \n```\n# Windows\n(.venv) > python manage.py runserver\n\n# macOS\n(.venv) % python3\
    \ manage.py runserver\n```\n\n如果你访问`http://127.0.0.1:8000/`，你应该会看到以下图像：\n\n![](img/81ad3fb1f21eb31ec1562330903a439c_38_0.png)\n\
    \n## Django 欢迎页面\n\n请注意，完整的命令行输出将包含额外的信息，包括关于 18 个未应用迁移的警告。从技术上讲，这个警告目前并不重要。Django\
