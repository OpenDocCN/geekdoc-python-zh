    folder called `staticfiles`. And third, we need to set [STATICFILES_STORAGE](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATICFILES_STORAGE),
    which is the *file storage engine* used by `collectstatic`.'
