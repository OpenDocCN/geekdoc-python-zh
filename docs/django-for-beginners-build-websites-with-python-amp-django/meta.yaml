    \  - [Feedback](#feedback)\n\n## Introduction\n\nWelcome to *Django for Beginners*,\
    \ a project-based approach to learning web development with the [Django](https://www.djangoproject.com/)\
    \ web framework. In this book you will build five progressively more complex web\
    \ applications, starting with a simple *Hello, World* app, progressing to a *Pages*\
    \ app, a *Message Board* app, a *Blog* app with forms and user accounts, and finally\
    \ a *Newspaper* app that uses a custom user model, email integration, foreign\
    \ keys, authorization, permissions, and more. By the end of this book you should\
    \ feel confident creating your own Django projects from scratch using current\
    \ best practices.\n\nDjango is a free, open source web framework written in the\
    \ Python programming language. First released in 2005, Django has been in continuous\
    \ development since then and today powers many of the largest websites in the\
    \ world including Instagram, Pinterest, Bitbucket, and Disqus. At the same time,\
    \ it is flexible enough to be a popular choice for early-stage startups and side\
    \ projects.\n\n## Why Django\n\nA \"web framework\" is a collection of tools that\
    \ abstract away much of the difficulty–and repetition–inherent in web development.\
    \ For example, most websites need the same basic functionality: the ability to\
    \ connect to a database, set URL routes, display content on a page, handle security\
    \ properly, and so on. Rather than recreate all of this from scratch, programmers\
    \ over the years have created web frameworks in all the major programming languages:\
    \ *Django* in Python, *Rails* in Ruby, and *Laravel* in PHP among many, many others.\n\
    \nDjango inherited Python's \"batteries-included\" approach and includes out-of-the-box\
    \ support for common tasks in web development, including:\n\n- user authentication\n\
    - testing\n- database models, forms, URL routes, and templates\n- admin interface\n\
    - security and performance upgrades\n- support for multiple database backends\n\
    \nThis approach allows web developers to focus on what makes a web application\
    \ unique rather than reinventing the wheel every time.\n\nIn contrast, some web\
    \ frameworks like [Flask](https://flask.palletsprojects.com/) adopt a *microframework*\
    \ approach of providing only the bare minimum required for a simple web page.\
    \ Flask is far more lightweight than Django and allows for maximum flexibility,\
    \ however this comes at a cost to the developer. To build even a basic website\
    \ requires adding a dozen or more third-party packages, which may or may not be\
    \ up-to-date. And the resulting Flask project structure often varies widely, making\
    \ it more difficult to move between projects and maintain best practices within\
    \ the community.\n\nDjango remains [under active development](https://www.djangoproject.com/weblog/)\
    \ with a regular release schedule of monthly security/bug fixes and a major new\
    \ release every 8 months. Millions of programmers have already used Django to\
    \ build their websites. It doesn't make sense to repeat the same code–and mistakes–when\
    \ a large community of brilliant developers has already solved these problems\
    \ for us.\n\nThe Django community is also constantly adding new features and security\
    \ improvements. And best of all, it's written in the wonderfully readable yet\
    \ still powerful Python programming language. In short, if you're building a website\
    \ from scratch Django is a fantastic choice.\n\n## Why This Book\n\nI wrote this\
    \ book because while Django is extremely well documented there is a severe lack\
    \ of beginner-friendly tutorials available. When I first learned Django years\
    \ ago, I struggled to even complete the [official polls tutorial](https://docs.djangoproject.com/en/4.0/intro/tutorial01/).\
    \ Why was this so hard I remember thinking?\n\nWith more experience, I now recognize\
    \ that the writers of the Django docs faced a difficult choice: they could emphasize\
    \ Django's ease-of-use or its depth, but not both. They choose the latter and\
    \ as a professional developer I appreciate the choice, but as a beginner I found\
    \ it so... frustrating! My goal with this book is to fill in the gaps and showcase\
    \ how beginner-friendly Django really can be.\n\n## Prerequisites\n\n*Django for\
    \ Beginners* is written for Django 4.0 and Python 3.10. All the code examples\
    \ work with these versions. By the time you read this, there may be newer versions\
    \ of both Django and Python available. In general, you should always strive to\
    \ be on the latest version of Django and Python. As both are mature technologies,\
    \ any issues that arise in the future as a result will be relatively minor.\n\n\
    You don't need previous Python or web development experience to complete this\
    \ book. It is intentionally written so that even a total beginner can follow along\
    \ and feel the magic of writing their own web applications from scratch. However,\
    \ if you are serious about a career in web development, you will eventually need\
    \ to invest the time to"
