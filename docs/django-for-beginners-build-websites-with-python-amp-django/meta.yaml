    ```


    This cryptic message means we need to configure SSH keys. This is a one-time thing
    but a bit of a hassle to be honest.


    SSH is a protocol used to ensure private connections with a remote server. Think
    of it as an additional layer of privacy on top of username/password. The process
    involves generating unique SSH keys and storing them on your computer so only
    GitHub can access them.


    First, check whether you have existing SSH keys. Github has [a guide to this](https://docs.github.com/en/authentication/connecting-to-github-with-ssh/checking-for-existing-ssh-keys)
    that works for Mac, Windows, and Linux. If you *don''t* have existing public and
    private keys, you''ll need to generate them. GitHub, again, has [a guide on doing
    this](https://docs.github.com/en/authentication/connecting-to-github-with-ssh/generating-a-new-ssh-key-and-adding-it-to-the-ssh-agent).


    Once complete you should be able to execute the `git push -u origin main` command
    successfully!


    It''s normal to feel overwhelmed and frustrated if you become stuck with SSH keys.
