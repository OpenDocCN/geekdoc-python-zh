    # # Chapter 4: Message Board App


    In this chapter we will use a database for the first time to build a basic *Message
    Board* application where users can post and read short messages. We''ll explore
    Django''s powerful built-in admin interface which provides a visual way to make
    changes to our data. And after adding tests we will push our code to GitHub and
    deploy the app on Heroku.


    Thanks to the powerful Django ORM (Object-Relational Mapper), there is built-in
    support for multiple database backends: PostgreSQL, MySQL, MariaDB, Oracle, and
    SQLite. This means that we, as developers, can write the same Python code in a
    `models.py` file and it will automatically be translated into the correct SQL
    for each database. The only configuration required is to update the [DATABASES](https://docs.djangoproject.com/en/4.0/ref/settings/#databases)
    section of our `django_project/settings.py` file. This is truly an impressive
    feature!


    For local development, Django defaults to using [SQLite](https://www.sqlite.org/index.html)
    because it is file-based and therefore far simpler to use than the other database
    options that require a dedicated server to be running separate from Django itself.


