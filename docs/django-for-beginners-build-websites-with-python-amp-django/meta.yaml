    # Book Structure


    The book begins by demonstrating how to configure a local development environment
    for both Windows and macOS in **Chapter 1**. The command line is covered in depth
    along with Git, text editors, and proper installation of Python and Django.


    In **Chapter 2** we build our first project, a minimal *Hello, World* app that
    demonstrates how to set up new Django projects. Because establishing good software
    practices is important, we''ll also save our work with Git and upload a copy to
    a remote code repository on GitHub.


    In **Chapter 3** we make, test, and deploy a *Pages* app that introduces templates
    and class-based views. Templates are how Django allows for DRY (Don''t Repeat
    Yourself) development with HTML and CSS while class-based views are quite powerful
    yet require a minimal amount of code. We also add our first tests and deploy to
    Heroku''s free tier. Using platform-as-a-service providers like Heroku transforms
    deployment from a painful, time-consuming process into something that takes just
    a few mouse clicks.


    In **Chapter 4** we build our first database-backed project which is a *Message
    Board* app. Django provides a powerful ORM (Object-Relational-Mapper) that translates
    our Python code into the necessary SQL for multiple different backends. We''ll
    explore the built-in admin app which provides a graphical way to interact with
    our data and can be even used as a CMS (Content Management System) similar to'
  - '[PAGE 11]


    Wordpress. Of course, we also write tests for all our code, store a remote copy
    on GitHub, and deploy to Heroku.


    In **Chapters 5-7** we''re ready for a *Blog* app that implements CRUD (Create-Read-Update-Delete)
    functionality. By using Django''s generic class-based views we only have to write
    only a small amount of actual code for this. Then we''ll add forms and integrate
    Django''s built-in user authentication system for sign up, log in, and log out
    functionality.


    The remainder of the book, **Chapters 8-16**, is dedicated to building a robust
    *Newspaper* site, starting with the introduction to custom user models in **Chapter
    8**, a Django best practice that is rarely addressed in tutorials. **Chapter 9**
    covers user authentication, **Chapter 10** adds Bootstrap for styling, and **Chapters
    11-12** implement password reset and change via email. With **Chapters 13-15**
    we add articles and comments along with proper permissions and authorizations.
    We even learn some tricks for customizing the admin to display our growing data.


    **Chapter 16** covers production-ready deployment through the use of environment
    variables and several additional packages. And the **Conclusion** provides an
    overview of the major concepts introduced in the book and a list of recommended
    resources for further learning.


    The book''s structure is very deliberate: each chapter introduces a new concept
    and reinforces past teachings. I highly recommend reading the book in order, even
    if you''re eager to skip ahead. Later chapters won''t cover previous material
    in the same depth as earlier chapters.


    By the end of this book you''ll have a solid understanding of how Django works,
    the ability to build apps on your own,'
