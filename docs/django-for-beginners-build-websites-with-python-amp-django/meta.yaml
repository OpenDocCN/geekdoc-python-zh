    # ## Deployment Checklist


    Deployment typically requires a number of discrete steps. It is common to have
    a "checklist" for these since there quickly become too many to remember. At this
    stage, we are intentionally keeping things basic however this list will grow in
    future projects as we add additional security and performance features.


    Here is the current deployment checklist:


    +   - install Gunicorn

    - create a `requirements.txt` file

    - update `ALLOWED_HOSTS` in `django_project/settings.py`

    - create a `Procfile`

    - create a `runtime.txt` file'
  - '[PAGE 74]


    The first item is to install Gunicorn, a production-ready web server for our project.
    Recall that we have been using Django''s own lightweight server for development
    purposes but it is not suitable for a live website. Gunicorn can be installed
    using Pip.


    ```


    Shell

    (.venv) > python -m pip install gunicorn==20.1.0

    ```


    Step two is to create a `requirements.txt` file containing all the specific Python
    dependencies in our project. That is, every Python package currently installed
    in our virtual environment. This is necessary in case we–or a team member–want
    to recreate the repository from scratch in the future. It also helps Heroku recognize
    that this is a Python project, which simplifies the deployment steps.


    To create this file, we will redirect the output of the `pip freeze` command to
    a new file called `requirements.txt`.


    ```


    Shell

    (.venv) > python -m pip freeze > requirements.txt

    ```


    If you look at the contents of this file it contains `Django`, `gunicorn`, `asgiref`
    and `sqlparse`. That''s because when we installed Django we *also* end up installing
    a number of other Python modules it depends upon. You do not need to focus too
    much on the contents of this file, just remember that whenever you install a new
    Python package in your virtual environment you should update the `requirements.txt`
    file to reflect it. There are more complicated tools that automate this process
    but since we are using `venv` and keeping things as simple as possible, it must
    be done manually.


    The third step is to look within `django_project/settings.py` for the [ALLOWED_HOSTS](https://docs.djangoproject.com/en/4.0/ref/settings/#allowed-hosts)
    setting, which represents that'
  - '[PAGE 75]


    host/domain names our Django site can serve. This is a security measure to prevent
    HTTP Host header attacks. For now, we''ll use the wildcard asterisk, * so that
    *all* domains are acceptable. Later in the book we''ll see how to explicitly list
    the domains that should be allowed which is much more secure.


    # Code


    ```

    # django_project/settings.py

    ALLOWED_HOSTS = ["*"]

    ```


    The fourth step is to create a new `Procfile` in the base directory next to the
    `manage.py` file. The `Procfile` is specific to Heroku and provides instructions
    on how to run the application in their stack. We''re indicating that for the web
    function use gunicorn as the server, the WSGI config file located at `django_project.wsgi`,
    and finally the flag `--log-file -` makes any logging messages visible to us.


    # Procfile


    ```

    web: gunicorn django_project.wsgi --log-file -

    ```


    The final step is to specify which Python version should run on Heroku. If not
    set explicitly this is [currently set](https://devcenter.heroku.com/articles/python-support#specifying-a-python-version)
    to the `python-3.9.10` runtime but changes over time. Since we are using Python
    3.10 we must create a dedicated [runtime.txt](https://devcenter.heroku.com/articles/python-support#specifying-a-python-version)
    file to use it. In your text editor, create this new `runtime.txt` file at the
    project-level meaning it is in the same directory as `manage.py` and the `Procfile`.


    To check the current version of Python run `python --version`.


    # Shell


    ```

    # Windows

    (.venv) > python --version

    Python 3.10.2


    # macOS

    ```'
