    # ## Install Django


    Now that Python is installed and we know how to use virtual environments it is
    time to install Django for the first time. In the `ch1-setup` directory reactivate
    the existing virtual environment.


    ```

    shell

    # Windows

    > .venv\Scripts\Activate.ps1

    (.venv) >


    # macOS

    % source .venv/bin/activate

    (.venv) %

    ```


    Django is hosted on the [Python Package Index (PyPI)](https://pypi.org/), a central
    repository for most Python packages. We will use `pip`, the most popular package
    installer, which comes included with Python 3. To install the latest version of
    Django use the command `python -m pip install django~=4.0.0`.


    The comparison operator `~=` ensures that subsequent security updates for Django,
    such as 4.0.1, 4.0.2, and so on are automatically installed. Note that while it
    *is* possible to use the shorter version of `pip install <package>`, it is a best
    practice to use the longer but more explicit form of `python -m pip install <package>`
    to ensure that the correct version of Python is used. This can be an issue if
    you have multiple versions of Python installed on your computer.


    ```

    shell

    (.venv) > python -m pip install django~=4.0.0

    ```'
