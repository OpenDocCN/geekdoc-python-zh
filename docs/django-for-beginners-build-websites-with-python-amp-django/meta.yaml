  md: '# # Chapter 8: Custom User Model


    Django''s built-in [User model](https://docs.djangoproject.com/en/4.0/ref/contrib/auth/#django.contrib.auth.models.User)
    allows us to start working with users right away, as we just did with our *Blog
    app* in the previous chapters. However, the [official Django documentation](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#using-a-custom-user-model-when-starting-a-project)
    *highly recommends* using a custom user model for new projects. The reason is
    that if you want to make any changes to the User model down the road--for example
    adding an age field--using a custom user model from the beginning makes this quite
    easy. But if you do not create a custom user model, updating the default User
    model in an existing Django project is very, very challenging.


    So **always use a custom user model** for all new Django projects. But the approach
    demonstrated in the official documentation [example](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#a-full-example)
    is actually not what many Django experts recommend. It uses the quite complex
    `AbstractBaseUser` when if we just use `AbstractUser` instead things are far simpler
    and still customizable.


    Thus we will use `AbstractUser` in this chapter where we start a new *Newspaper*
    app properly with environment variables and a custom user model. The choice of
    a newspaper app pays homage to Django''s roots as a web framework built for editors
    and journalists at the Lawrence Journal-World.


