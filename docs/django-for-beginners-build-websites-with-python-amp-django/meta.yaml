    \ the `fields` and setting it automatically via the `form_valid` method instead.\n\
    \n```\npython\n# articles/views.py\nclass ArticleCreateView(CreateView):\n   \
    \ model = Article\n    template_name = \"article_new.html\"\n    fields = (\"\
