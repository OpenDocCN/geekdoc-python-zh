  md: "Create a new file called `accounts/forms.py` and update it with the following\
    \ code to extend the existing `UserCreationForm` and `UserChangeForm` forms.\n\
    \n# Code\n\n```\n# accounts/forms.py\nfrom django.contrib.auth.forms import UserCreationForm,\
    \ UserChangeForm\n\nfrom .models import CustomUser\n\n\nclass CustomUserCreationForm(UserCreationForm):\n\
    \    class Meta(UserCreationForm):\n        model = CustomUser\n        fields\
    \ = UserCreationForm.Meta.fields + (\"age\",)\n\n\nclass CustomUserChangeForm(UserChangeForm):\n\
    \    class Meta:\n        model = CustomUser\n        fields = UserChangeForm.Meta.fields\n\
    ```\n\nFor both new forms we are using the [Meta class](https://docs.djangoproject.com/en/4.0/topics/forms/modelforms/#overriding-the-default-fields)\
    \ to override the default fields by setting the model to our `CustomUser` and\
    \ using the default fields via `Meta.fields` which includes *all* default fields.\
    \ To add our custom `age` field we simply tack it on at the end and it will display\
    \ automatically on our future sign up page. Pretty slick, no?\n\nThe concept of\
    \ fields on a form can be confusing at first so let's take a moment to explore\
    \ it further. Our `CustomUser` model contains all the fields of the default User\
    \ model **and** our additional `age` field which we set.\n\nBut what are these\
    \ default fields? It turns out there [are many](https://github.com/django/django/blob/main/django/contrib/auth/models.py)\
    \ including `username`, `first_name`, `last_name`, `email`, `password`, `groups`,\
    \ and more. Yet when a user signs up for a new account on Django the default form\
    \ only asks for a username, email, and password. This tells us that the default\
    \ setting for"
