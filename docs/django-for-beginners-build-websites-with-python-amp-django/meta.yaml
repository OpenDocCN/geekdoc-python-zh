  md: '+   - a production database, not SQLite


    The question is: how do we balance both of these needs? One environment for local
    development and another for production? Today, the best practice is to use *environment
    variables*, which can be loaded into the codebase at runtime yet not stored in
    the source code. In other words, even if someone had access to your GitHub repo
    and all the source code, they couldn''t do much damage because the environment
    variables representing the most important details would be stored elsewhere!


    In this final chapter we will switch over to environment variables and create
    a deployment checklist suitable for a professional website.


    # ## Environment Variables


    There are multiple ways to work with environment variables in Python but for this
    project we''ll use the [environs](https://github.com/sloria/environs) package.
    It allows us to create a dedicated `.env` file for environment variables as well
    as load a number of Django-specific additional packages to help with configuration.


    On the command line, install `environs[django]`. Note that you''ll probably need
    to add single quotes, `'' ''`, around the package if you''re using Zsh as your
    terminal shell, so run `python -m pip install ''environs[django]==9.3.5''`.


    ```

    Shell

    (.venv) > python -m pip install ''environs[django]==9.3.5''

    ```


    Then, in `django_project/settings.py` there are three lines of imports to add
    near the top of the file.


    Code'
