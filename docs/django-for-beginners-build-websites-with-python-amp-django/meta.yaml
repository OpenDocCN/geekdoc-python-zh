    [HTTP (Hypertext Transfer Protocol)](https://example.com) was initially created
    by Tim Berners-Lee in 1989 and is the foundation of the World Wide Web. A network
    protocol is a set of rules for formatting and processing data. It is like a common
    language for computers that allows them to communicate with one another even if
    they are located on opposite sides of the earth and have vastly different hardware
    and software.


    HTTP is a request-response protocol that works in a client-server computing model.
    Every time you visit a webpage an initial "request" is sent by the "client" (ie
    your computer) and a "response" is sent back by a "server." The client doesn''t
    have to be a computer though, it could also be a mobile phone or any internet-connected
    device. But the process is the same: an HTTP request is sent to a URL by a client
    and a server sends back an HTTP response.


    Ultimately, all a web framework like Django does is accept HTTP requests to a
    given URL and return a HTTP response containing the information necessary to render
    a webpage. That''s it. Generally'
  - '[PAGE 41]


    components. This makes it easier for a developer to reason about the code. The
    MVC pattern is widely used among web frameworks including Ruby on Rails, Spring
    (Java), Laravel (PHP), ASP.NET (C#) and many others.


    In the traditional MVC pattern there are three major components:


    +   - Model: Manages data and core business logic

    - View: Renders data from the model in a particular format

    - Controller: Accepts user input and performs application-specific logic


    Django only loosely follows the traditional MVC approach with its own version
    often called **Model-View-Template (MVT)**. This can be initially confusing to
    developers with previous web framework experience. In reality, Django''s approach
    is really it is a 4-part pattern that also incorporates URL Configuration so something
    like *MVTU* would be a more accurate description.


    The Django MVT pattern is as follows:


    +   - Model: Manages data and core business logic

    - View: Describes *which* data is sent to the user but not its presentation

    - Template: Presents the data as HTML with optional CSS, JavaScript, and Static
    Assets

    - URL Configuration: Regular-expression components configured to a View


    This interaction is fundamental to Django yet **very confusing** to newcomers
    so let''s map out the order of a given HTTP request/response cycle. When you type
    in a URL, such as `https://djangoproject.com`, the first thing that happens within
    our Django project is a URL pattern'
  - '[PAGE 42]


    (contained in `urls.py`) is found that matches it. The URL pattern is linked to
    a single view (contained in `views.py`) which combines the data from the model
    (stored in `models.py`) and the styling from a template (any file ending in `.html`).
    The view then returns a HTTP response to the user.


    The complete Django flow looks like this:


    | Django request/response cycle |

    |---|

    | HTTP Request -> URL -> View -> Model and Template -> HTTP Response |


    If you are brand new to web development the distinction between MVC and MVT will
    not matter much. This book demonstrates the Django way of doing things so there
    won''t be confusion. However if you are a web developer with previous MVC experience,
    it can take a little while to shift your thinking to the "Django way" of doing
    things which is more loosely coupled and allows for easier modifications.


    # ## Create An App


    Django uses the concept of projects and apps to keep code clean and readable.
    A single top-level Django project can contain multiple apps. Each app controls
    an isolated piece of functionality. For example, an e-commerce site might have
    one app for user authentication, another app for payments, and a third app to
    power item listing details. That''s three distinct apps that all live within one
    top-level project. How and when you split functionality into apps is somewhat
    subjective, but in general, each app should have a clear function.


    To add a new app go to the command line and quit the running server with `Control+c`.
    Then use the `startapp` command followed by the name of our app which will be
    `pages`.'
- md: "## Shell\n\n```\n# Windows\n(.venv) > python manage.py startapp pages\n\n#\
    \ macOS\n(.venv) % python3 manage.py startapp pages\n```\n\nIf you look visually\
    \ at the `helloworld` directory Django has created within it a new `pages` directory\
    \ containing the following files:\n\n## Code\n\n```\npages\n├── __init__.py\n\
    ├── admin.py\n├── apps.py\n├── migrations\n│   └── __init__.py\n├── models.py\n\
    ├── tests.py\n└── views.py\n```\n\nLet's review what each new `pages` app file\
    \ does:\n\n- `admin.py` is a configuration file for the built-in Django Admin\
    \ app\n- `apps.py` is a configuration file for the app itself\n- `migrations/`\
    \ keeps track of any changes to our `models.py` file so it stays in sync with\
    \ our database\n- `models.py` is where we define our database models which Django\
    \ automatically translates into database tables\n- `tests.py` is for app-specific\
    \ tests\n- `views.py` is where we handle the request/response logic for our web\
    \ app\n\nNotice that the model, view, and url from the MVT pattern are present\
    \ from the beginning. The only thing missing is a template which we'll add shortly.\n\
    \nEven though our new app exists within the Django project, Django doesn't \"\
    know\" about it until we explicitly add it to the `django_project/settings.py`\
    \ file. In your text editor open the file up and scroll down to `INSTALLED_APPS`\
    \ where you'll see six built-in Django apps already there. Add `pages.apps.PagesConfig`\
    \ at the bottom.\n\n```\n# django_project/settings.py\nINSTALLED_APPS = [\n  \
    \  \"django.contrib.admin\",\n    \"django.contrib.auth\",\n    \"django.contrib.contenttypes\"\
    ,\n    \"django.contrib.sessions\",\n    \"django.contrib.messages\",\n    \"\
    django.contrib.staticfiles\",\n    \"pages.apps.PagesConfig\",  # new\n]\n```\n\
    \nIf you have Black installed in your text editor on \"save\" it will change all\
    \ the single quotes `'` here to double quotes `\"`. That's fine. As noted previously,\
    \ Django has plans to adopt Black Python formatting fully in the future.\n\nWhat\
    \ is `PagesConfig` you might ask? Well, it is the name of the solitary function\
    \ within the `pages/apps.py` file at this point.\n\n```\n# pages/apps.py\nfrom\
    \ django.apps import AppConfig\n\n\nclass PagesConfig(AppConfig):\n    default_auto_field\
    \ = \"django.db.models.BigAutoField\"\n    name = \"pages\"\n```\n\nDon't worry\
    \ if you are confused at this point: it takes practice to internalize how Django\
    \ projects and apps are structured. Over the course of this book we will build\
    \ many projects and apps and the patterns will soon become familiar.\n\n## Hello,\
    \ World\n\nIn Django, four separate files aligning with this MVT pattern are required\
    \ to power one single dynamic (aka linked to a database) webpage:\n\n- `models.py`\n\
    - `views.py`\n- `template.html` (any HTML file will do)\n- `urls.py`\n\nHowever,\
    \ to create a static webpage (not linked to a database) we can hardcode the data\
    \ into a view so the model is not needed. That's what we'll do here to keep things\
    \ simple. From Chapter 4 onwards we'll be using the model in all our projects.\n\
    \nThe next step is therefore to create our first view. Start by updating the `views.py`\
    \ file in our `pages` app to look as follows:\n\n```python\n# pages/views.py\n\
    from django.http import HttpResponse\n\ndef homePageView(request):\n    return\
    \ HttpResponse(\"Hello, World!\")\n```\n\nBasically, we're saying whenever the\
    \ view function `homePageView` is called, return the text \"Hello, World!\" More\
    \ specifically, we've imported the built-in [HttpResponse](https://docs.djangoproject.com/en/4.0/ref/request-response/#django.http.HttpResponse)\
    \ method so we can return a response object to the user. We've created a function\
    \ called `homePageView` that accepts the request object and returns a response\
    \ with the string \"Hello, World!\"\n\nThere are two types of views in Django:\
    \ function-based views (FBVs) and class-based views (CBVs). Our code in this example\
    \ is a function-based view: it is relatively simple to implement and explicit.\
    \ Django originally started with only FBVs but over time added CBVs which allow\
    \ for much greater code reusability, keeps things DRY (Don't-Repeat-Yourself),\
    \ and can be extended via mixins. The additional abstraction of CBVs makes them\
    \ quite powerful and concise, however it also makes them harder to read for Django\
    \ newcomers.\n\nBecause web development quickly becomes repetitive Django also\
    \ comes with a number of built-in generic class-based views (GCBVs) to handle\
    \ common use cases such as creating a new object, forms, list views, pagination,\
    \ and so on. We will be using GCBVs heavily in this book in later chapters.\n\n\
    There are therefore technically three ways to write a view in Django: function-based\
    \ views (FBVs), class-based views (CBVs), and generic class-based views (GCBVs).\
    \ This customization is helpful for advanced developers but confusing for newcomers.\
    \ Many Django developers—including your author—prefer to use GCBVs when possible\
    \ and revert to CBVs or FBVs when required. By the end of this book you will have\
    \ used all three and can make up your own mind on which approach you prefer.\n\
    \nMoving along we need to configure our URLs. In your text editor, create a new\
    \ file called `urls.py` within the `pages` app. Then update it with the following\
    \ code:\n\n```python\n# pages/urls.py\nfrom django.urls import path\nfrom .views\
    \ import homePageView\n\nurlpatterns = [\n    path(\"\", homePageView, name=\"\
    home\"),\n]\n```\n\nOn the top line we import `path` from Django to power our\
    \ URL pattern and on the next line we import our views. By referring to the `views.py`\
    \ file as `.views` we are telling Django to look within the current directory\
    \ for a `views.py` file and import the view `homePageView` from there.\n\nOur\
    \ URL pattern has three parts:\n\n- a Python regular expression for the empty\
    \ string \"\"\n- a reference to the view called `homePageView`\n- an optional\
    \ [named URL pattern](link) called \"home\"\n\nIn other words, if the user requests\
    \ the homepage represented by the empty string \"\", Django should use the view\
    \ called `homePageView`.\n\nWe're *almost* done at this point. The last step is\
    \ to update our `django_project/urls.py` file. It's common to have multiple apps\
    \ within a single Django project, like `pages` here, and they each need their\
    \ own dedicated URL path.\n\n```python\n# django_project/urls.py\nfrom django.contrib\
    \ import admin\nfrom django.urls import path, include  # new\n\nurlpatterns =\
    \ [\n    path(\"admin/\", admin.site.urls),\n    path(\"\", include(\"pages.urls\"\
    )),  # new\n]\n```\n\nWe've imported `include` on the second line next to `path`\
    \ and then created a new URL pattern for our `pages` app. Now whenever a user\
    \ visits the homepage, they will first be routed to the `pages` app and then to\
    \ the `homePageView` view set in the `pages/urls.py` file.\n\nThis need for two\
    \ separate `urls.py` files is often confusing to beginners. Think of the top-level\
    \ `django_project/urls.py` as the gateway to various url patterns distinct to\
    \ each app.\n\nWe have all the code we need now. To confirm everything works as\
    \ expected, restart our Django server:\n\n```\nShell\n# Windows\n(.venv) > python\
    \ manage.py runserver\n\n# macOS\n(.venv) % python3 manage.py runserver\n```\n\
    \nIf you refresh the browser for `http://127.0.0.1:8000/` it now displays the\
    \ text \"Hello, World!\"\n\n![](img/81ad3fb1f21eb31ec1562330903a439c_48_0.png)\n\
    \n**Hello World homepage**\n\n### Git\n\nIn the previous chapter we installed\
    \ the version control system Git. Let's use it here. The first step is to initialize\
    \ (or add) Git to our repository. Make sure you've stopped the local server with\
    \ `Control+c`, then run the command `git init`.\n\n```\nShell\n(.venv) > git init\n\
    ```\n\nIf you then type `git status` you'll see a list of changes since the last\
    \ Git commit. Since this is our first commit, this list is all of our changes\
    \ so far.\n\n```\nShell\n(.venv) > git status\nOn branch main\n\nNo commits yet\n\
    \nUntracked files:\n  (use \"git add <file>...\" to include in what will be committed)\n\
    \n        .venv\n        django_project/\n        db.sqlite3\n        manage.py\n\
    \        pages/\n\nnothing added to commit but untracked files present (use \"\
    git add\"\nto track)\n```\n\nNote that our virtual environment `.venv` is included\
    \ which is *not* a best practice. It should be kept out of Git source control\
    \ since secret information such as API keys and the like are often included in\
    \ it. The solution is to create a new file called `.gitignore` which tells Git\
    \ what to ignore. The period at the beginning indicates this is a \"hidden\" file.\
    \ The file still exists but it is a way to communicate to developers that the\
    \ contents are probably meant for configuration and not source control. In this\
    \ new file, add a single line for `.venv`.\n\n```\n.gitignore\n\n.venv/\n```\n\
    \nIf you run `git status` again you will see that `.venv` is not longer there.\
    \ It has been \"ignored\" by Git.\n\nAt the same time, we *do* want a record of\
    \ packages installed in our virtual environment. The current best practice is\
    \ to create a `requirements.txt` file with this information. The command `pip\
    \ freeze` will output the contents of your current virtual environment and by\
    \ using the `>` operator we can do all this in one step: output the contents into\
    \ a new file called `requirements.txt`. If your server is still running enter\
    \ `Ctrl+c` and `Enter` to exit before entering this command."
