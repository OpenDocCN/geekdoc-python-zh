    (.venv) % python -m pip install psycopg2==2.9.3

    ```


    We can use this approach because Django''s ORM (Object Relational Mapper) translates
    our `models.py` code from Python into the database backend of choice. This works
    *almost* all the time without error. It is possible for weird bugs to creep up
    and it is recommended on a professional project to install PostgreSQL locally,
    too, to avoid them.


