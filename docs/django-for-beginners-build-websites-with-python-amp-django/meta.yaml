  md: "Django imports a module, `models`, to help us build new database models which\
    \ will \"model\" the characteristics of the data in our database. We want to create\
    \ a model to store the textual content of a message board post, which we can do\
    \ as follows:\n\n```\n# posts/models.py\nfrom django.db import models\n\nclass\
    \ Post(models.Model):  # new\n    text = models.TextField()\n```\n\nNote that\
    \ we've created a new database model called `Post` which has the database field\
    \ `text`. We've also specified the *type of content* it will hold, `TextField()`.\
    \ Django provides many [model fields](https://docs.djangoproject.com/en/4.0/topics/db/models/#fields)\
    \ supporting common types of content such as characters, dates, integers, emails,\
    \ and so on.\n\n# ## Activating models\n\nNow that our new model is created we\
    \ need to activate it. Going forward, whenever we create or modify an existing\
    \ model we'll need to update Django in a two-step process:\n\n+   1. First, we\
    \ create a migrations file with the `makemigrations` command. Migration files\
    \ create a reference of any changes to the database models which means we can\
    \ track changes–and debug errors as necessary–over time.\n2. Second, we build\
    \ the actual database with the `migrate` command which executes the instructions\
    \ in our migrations file."
