  md: '# # Introduction


    Welcome to *Django for Beginners*, a project-based approach to learning web development
    with the [Django](https://www.djangoproject.com/) web framework. In this book
    you will build five progressively more complex web applications, starting with
    a simple *Hello, World* app, progressing to a *Pages* app, a *Message Board* app,
    a *Blog* app with forms and user accounts, and finally a *Newspaper* app that
    uses a custom user model, email integration, foreign keys, authorization, permissions,
    and more. By the end of this book you should feel confident creating your own
    Django projects from scratch using current best practices.


    Django is a free, open source web framework written in the Python programming
    language. First released in 2005, Django has been in continuous development since
    then and today powers many of the largest websites in the world including Instagram,
    Pinterest, Bitbucket, and Disqus. At the same time, it is flexible enough to be
    a popular choice for early-stage startups and side projects.


    # ## Why Django


    A "web framework" is a collection of tools that abstract away much of the difficulty–and
    repetition–inherent in web development. For example, most websites need the same
    basic functionality: the ability to connect to a database, set URL routes, display
    content on a page, handle security properly, and so on. Rather than recreate all
    of this from scratch, programmers over the years have created web frameworks in
    all the major programming languages: *Django* in Python, *Rails* in Ruby, and
    *Laravel* in PHP among many, many others.'
  merge: -1
  pgno: 7
- img_proc: true
  md: 'Django inherited Python''s "batteries-included" approach and includes out-of-the
    box support for common tasks in web development, including:


    +   - user authentication

    - testing

    - database models, forms, URL routes, and templates

    - admin interface

    - security and performance upgrades

    - support for multiple database backends


    This approach allows web developers to focus on what makes a web application unique
    rather than reinventing the wheel every time.


    In contrast, some web frameworks like [Flask](https://flask.palletsprojects.com/)
    adopt a *microframework* approach of providing only the bare minimum required
    for a simple web page. Flask is far more lightweight than Django and allows for
    maximum flexibility, however this comes at a cost to the developer. To build even
    a basic website requires adding a dozen or more third-party packages, which may
    or may not be up-to-date. And the resulting Flask project structure often varies
    widely, making it more difficult to move between projects and maintain best practices
    within the community.


    Django remains [under active development](https://www.djangoproject.com/weblog/)
    with a regular release schedule of monthly security/bug fixes and a major new
    release every 8 months. Millions of programmers have already used Django to build
    their websites. It doesn''t make sense to repeat the same code–and mistakes–when
    a large community of brilliant developers has already solved these problems for
    us.


    The Django community is also constantly adding new features and security improvements.
    And best of all, it''s'
  merge: -1
  pgno: 8
- img_proc: true
  md: 'written in the wonderfully readable yet still powerful Python programming language.
    In short, if you''re building a website from scratch Django is a fantastic choice.


    # ## Why This Book


    I wrote this book because while Django is extremely well documented there is a
    severe lack of beginner-friendly tutorials available. When I first learned Django
    years ago, I struggled to even complete the [official polls tutorial](https://docs.djangoproject.com/en/4.0/intro/tutorial01/).
    Why was this so hard I remember thinking?


    With more experience, I now recognize that the writers of the Django docs faced
    a difficult choice: they could emphasize Django''s ease-of-use or its depth, but
    not both. They choose the latter and as a professional developer I appreciate
    the choice, but as a beginner I found it so... frustrating! My goal with this
    book is to fill in the gaps and showcase how beginner-friendly Django really can
    be.


    # ## Prerequisites


    *Django for Beginners* is written for Django 4.0 and Python 3.10. All the code
    examples work with these versions. By the time you read this, there may be newer
    versions of both Django and Python available. In general, you should always strive
    to be on the latest version of Django and Python. As both are mature technologies,
    any issues that arise in the future as a result will be relatively minor.


    You don''t need previous Python or web development experience to complete this
    book. It is intentionally written so that even a total beginner can follow along
    and feel the magic of writing their own web applications from scratch. However,
    if you are serious about a career in web development, you will eventually need
    to invest the time to'
  merge: -1
  pgno: 9
- img_proc: true
  md: 'properly learn Python, HTML, and CSS. A list of recommended resources for further
    study is included in the Conclusion.


    # Book Structure


    The book begins by demonstrating how to configure a local development environment
    for both Windows and macOS in **Chapter 1**. The command line is covered in depth
    along with Git, text editors, and proper installation of Python and Django.


    In **Chapter 2** we build our first project, a minimal *Hello, World* app that
    demonstrates how to set up new Django projects. Because establishing good software
    practices is important, we''ll also save our work with Git and upload a copy to
    a remote code repository on GitHub.


    In **Chapter 3** we make, test, and deploy a *Pages* app that introduces templates
    and class-based views. Templates are how Django allows for DRY (Don''t Repeat
    Yourself) development with HTML and CSS while class-based views are quite powerful
    yet require a minimal amount of code. We also add our first tests and deploy to
    Heroku''s free tier. Using platform-as-a-service providers like Heroku transforms
    deployment from a painful, time-consuming process into something that takes just
    a few mouse clicks.


    In **Chapter 4** we build our first database-backed project which is a *Message
    Board* app. Django provides a powerful ORM (Object-Relational-Mapper) that translates
    our Python code into the necessary SQL for multiple different backends. We''ll
    explore the built-in admin app which provides a graphical way to interact with
    our data and can be even used as a CMS (Content Management System) similar to'
  merge: -1
  pgno: 10
- img_proc: true
  md: 'Wordpress. Of course, we also write tests for all our code, store a remote
    copy on GitHub, and deploy to Heroku.


    In **Chapters 5-7** we''re ready for a *Blog* app that implements CRUD (Create-Read-Update-Delete)
    functionality. By using Django''s generic class-based views we only have to write
    only a small amount of actual code for this. Then we''ll add forms and integrate
    Django''s built-in user authentication system for sign up, log in, and log out
    functionality.


    The remainder of the book, **Chapters 8-16**, is dedicated to building a robust
    *Newspaper* site, starting with the introduction to custom user models in **Chapter
    8**, a Django best practice that is rarely addressed in tutorials. **Chapter 9**
    covers user authentication, **Chapter 10** adds Bootstrap for styling, and **Chapters
    11-12** implement password reset and change via email. With **Chapters 13-15**
    we add articles and comments along with proper permissions and authorizations.
    We even learn some tricks for customizing the admin to display our growing data.


    **Chapter 16** covers production-ready deployment through the use of environment
    variables and several additional packages. And the **Conclusion** provides an
    overview of the major concepts introduced in the book and a list of recommended
    resources for further learning.


    The book''s structure is very deliberate: each chapter introduces a new concept
    and reinforces past teachings. I highly recommend reading the book in order, even
    if you''re eager to skip ahead. Later chapters won''t cover previous material
    in the same depth as earlier chapters.


    By the end of this book you''ll have a solid understanding of how Django works,
    the ability to build apps on your own,'
  merge: -1
  pgno: 11
- img_proc: true
  md: "and the background needed to fully take advantage of additional resources for\
    \ learning intermediate and advanced Django techniques.\n\n# ## Book Layout\n\n\
    There are many code examples in this book, which are denoted as follows:\n\n```\n\
    # This is Python code\nprint(\"Hello, World!\")\n```\n\nFor brevity we will use\
    \ three dots, ..., to denote existing code that remains unchanged in a longer\
    \ code example. For example, in the function below, the previous content is unchanged\
    \ and the `print()` statement has been added. In these cases there will also be\
    \ a comment, `# new`, indicating where the new code has been added.\n\n```\ndef\
    \ make_my_website:\n    ...\n    print(\"All done!\")  # new\n```\n\n# ## Advice\
    \ on Getting Stuck\n\nGetting stuck on an issue is part of being a programmer.\
    \ It happens to everyone at every level. The only thing that changes is the difficulty\
    \ of the question being tackled. Part of learning how to be a better developer\
    \ is accepting this frustration and learning how to find help, ask targeted questions,\
    \ and determine when you need to take a walk around the block to clear your head\
    \ versus being truly stuck on something."
  merge: -1
  pgno: 12
- img_proc: true
  md: 'The good news is that whatever error you are having, it is likely that you
    are not the first! Copy and pasting your error into a search engine like Google
    or DuckDuckGo will typically bring up something from StackOverflow or a personal
    blog detailing the exact same issue. In fact, experienced programmers often joke
    that the only thing that separates them from junior programmers is their ability
    to Google more quickly towards an answer. There is some truth to this.


    Not everything you read online can be trusted, of course, and with experience
    you will develop the context to see how the pieces of Django and code in general
    fit together.


    What to do if you are stuck on something in this book? As a first step, I recommend
    carefully checking your code against what is in the book. If still stuck, you
    can look at the official source code which is [available on GitHub](https://github.com).
    A common error is subtle white spacing differences that are almost impossible
    to detect to the naked eye. You can try copy and pasting the official source code
    if you suspect this might be the issue.


    The next step is to walk away from the computer for a bit or even sleep on the
    problem. It''s amazing what a small amount of rest and distance will do to your
    mind when it comes to solving problems.


    There are two fantastic online resources where the Django community gathers to
    ask and answer questions. The first is the [official Django Forum](https://forum.djangoproject.com)
    and the second is the [Django Users Google Group](https://groups.google.com/g/django-users).
    Both are a good next step if you need additional help.


    # ## Community'
  merge: -1
  pgno: 13
- img_proc: true
  md: 'The success of Django owes as much to its community as it does the technological
    achievement of the framework itself. "Come for the framework, stay for the community"
    is a common saying among Django developers. It extends to the technical development
    of Django, which happens online via the [django-developers](https://groups.google.com/group/django-developers),
    the non-profit [Django Software Foundation](https://www.djangoproject.com/foundation/)
    that oversees Django itself, annual DjangoCon conferences, and local meetups where
    developers gather to share knowledge and insights.


    No matter what your level of technical expertise becoming involved in Django itself
    is a great way to learn, to meet other developers, and to enhance your own reputation.


    # ## Conclusion


    In the next chapter you''ll learn how to properly set up your computer and create
    your first Django project. Let''s begin!'
  merge: -1
  pgno: 14
- img_proc: true
  md: '# # Chapter 1: Initial Set Up


    This chapter covers how to properly configure your Windows or macOS computer to
    work on Django projects. We start with an overview of the *Command Line*, a powerful
    text-only interface that developers use extensively to install and configure Django
    projects. Then we install the latest version of Python, learn how to create dedicated
    virtual environments, and install Django. As a final step, we will explore using
    Git for version control and working with a text editor. By the end of this chapter
    you will have created your first Django project from scratch and more importantly
    be able to create and modify new Django projects in just a few keystrokes.


    # ## The Command Line


    If you have ever seen a television show or movie where a hacker is furiously typing
    into a black window: that''s the command line. It is an alternative to the mouse
    or finger-based graphical user interface familiar to most computer users. An everyday
    computer user will never need to use the command line but software developers
    do because certain tasks can only be done with it. These include running programs,
    installing software, using Git for version control, or connecting to servers in
    the cloud. With a little practice, most developers find that the command line
    is actually a faster and more powerful way to navigate and control a computer.


    Given its minimal user interface–just a blank screen and a blinking cursor–the
    command line is intimidating to newcomers. There is often no feedback after a
    command has run and it is possible to wipe the contents of an entire'
  merge: -1
  pgno: 15
- img_proc: true
  md: 'computer with a single command if you''re not careful: no warning will pop
    up! As a result, the command line must be used with caution. Make sure not to
    blindly copy and paste commands you find online; only rely on trusted resources
    for any command you do not fully understand.


    In practice, multiple terms are used to refer to the command line: Command Line
    Interface (CLI), console, terminal, shell, or prompt. Technically speaking, the
    *terminal* is the program that opens up a new window to access the command line,
    a *console* is a text-based application, the *shell* is the program that runs
    commands on the underlying operating system, and the *prompt* is where commands
    are typed and run. It is easy to be confused by these terms initially but they
    all essentially mean the same thing: the command line is where we run and execute
    text-only commands on our computer.


    On Windows, the built-in terminal and shell are both called *PowerShell*. To access
    it, locate the taskbar on the bottom of the screen next to the Windows button
    and type in "powershell" to launch the app. It will open a new window with a dark
    blue background and a blinking cursor after the > prompt. Here is how it looks
    on my computer.


    ```


    Shell

    PS C:\Users\wsv>

    ```


    Before the prompt is `PS` which refers to PowerShell, the initial `C` directory
    of the Windows operating system, followed by the `Users` directory and the current
    user which, on my personal computers, is `wsv`. Your username will obviously be
    different. At this point, don''t worry about what comes *to the left* of the `>`
    prompt: it varies depending on each computer and can be customized at a later
    date. The shorter prompt of `>` will be used going forward for Windows.'
  merge: -1
  pgno: 16
- img_proc: true
  md: 'On macOS, the built-in terminal is called appropriately enough *Terminal*.
    It can be opened via Spotlight: press the `Command` and `space bar` keys at the
    same time and then type in "terminal." Alternatively, open a new Finder window,
    navigate to the *Applications* directory, scroll down to open the *Utilities*
    directory, and double-click the application called Terminal. This opens a new
    screen with a white background by default and a blinking cursor after the `%`
    prompt. Don''t worry about what comes *to the left* of the `%` prompt. It varies
    by computer and can be customized later on.


    ![](img/81ad3fb1f21eb31ec1562330903a439c_17_0.png)


    If your macOS prompt is `$` instead of `%` that means you are using `Bash` as
    the shell. Starting in 2019, macOS switched from *Bash* to *zsh* as the default
    shell. While most of the commands in this book will work interchangeably, it is
    recommended to look up online how to change to zsh via `System Preferences` if
    your computer still uses Bash.


    # ## Shell Commands


    There are many available shell commands but most developers rely on the same handful
    over and over again and look up more complicated ones as needed.


    In most cases, the commands for Windows (PowerShell) and macOS are similar. For
    example, the command `whoami` returns the computer name/username on Windows and
    just the username on macOS. As with all shell commands, type the command itself
    followed by the `return` key. Note that the `#` symbol represents a comment and
    will not be executed on the command line.


    Shell'
  merge: -1
  pgno: 17
- img_proc: true
  md: '```

    # Windows

    > whoami

    wsv2021/wsv


    # macOS

    % whoami

    wsv

    ```


    Sometimes, however, the shell commands on Windows and macOS are completely different.
    A good example is the command for outputting a basic "Hello, World!" message to
    the console. On Windows the command is `Write-Host` while on macOS the command
    is `echo`.


    ```

    Shell

    # Windows

    > Write-Host "Hello, World!"

    Hello, World!


    # macOS

    % echo "Hello, World!"

    Hello, World!

    ```


    A frequent task on the command line is navigating within the computer filesystem.
    On Windows and macOS the command `pwd` (print working directory) outputs the current
    location within the file system.


    ```

    Shell

    # Windows

    > pwd


    Path

    ----

    C:\Users\wsv


    # macOS

    % pwd

    /Users/wsv

    ```


    You can save your Django code anywhere you like but for convenience we will place
    our code the desktop directory.'
  merge: -1
  pgno: 18
- img_proc: true
  md: 'The command `cd` (change directory) followed by the intended location works
    on both systems.


    ```

    Shell

    # Windows

    > cd onedrive\desktop

    > pwd


    Path

