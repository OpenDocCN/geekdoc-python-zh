    \    UserPassesTestMixin  # new\n)\nfrom django.views.generic import ListView,\
    \ DetailView\nfrom django.views.generic.edit import UpdateView, DeleteView,\n\
    CreateView\nfrom django.urls import reverse_lazy\n\nfrom .models import Article\n\
