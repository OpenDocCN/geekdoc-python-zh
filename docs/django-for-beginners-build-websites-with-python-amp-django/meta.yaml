  - "[PAGE 246]\n\nWe clearly want to set some authorizations so only logged-in users\
    \ can access certain URLs. To do this we can use a *mixin*, which is a special\
    \ kind of multiple inheritance that Django uses to avoid duplicate code and still\
    \ allow customization. For example, the built-in generic [ListView](https://docs.djangoproject.com/en/4.0/ref/class-based-views/generic-display/#listview)\
    \ needs a way to return a template. But so does [DetailView](https://docs.djangoproject.com/en/4.0/ref/class-based-views/generic-display/#detailview)\
    \ and in fact almost every other view. Rather than repeat the same code in each\
    \ big generic view, Django breaks out this functionality into a mixin known as\
    \ [TemplateResponseMixin](https://docs.djangoproject.com/en/4.0/ref/class-based-views/mixins-simple/#templateresponsemixin).\
    \ Both `ListView` and `DetailView` use this mixin to render the proper template.\n\
    \nIf you read the Django source code, which is freely available [on Github](https://github.com/django/django),\
    \ you'll see mixins used all over the place. To restrict view access to only logged\
    \ in users, Django has a [LoginRequired mixin](https://docs.djangoproject.com/en/4.0/topics/auth/default/#the-loginrequired-mixin)\
    \ that we can use. It's powerful and extremely concise.\n\nIn the `articles/views.py`\
    \ file, import `LoginRequiredMixin` at the top and then it add to the `ArticleCreateView`.\
