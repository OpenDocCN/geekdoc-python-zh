    # # Conclusion


    Congratulations on finishing *Django for Beginners*! After starting from absolute
    zero we''ve now built five different web applications from scratch and covered
    all the major features of Django: templates, views, urls, users, models, security,
    testing, and deployment. You now have the knowledge to go off and build your own
    modern websites with Django.


    As with any new skill, it''s important to practice and apply what you''ve just
    learned. The CRUD (Create-Read-Update-Delete) functionality in our *Blog* and
    *Newspaper* sites is common in many, many other web applications. For example,
    can you make a Todo List web application? A Twitter or Facebook clone? You already
    have all the tools you need. When you''re starting out I believe the best approach
    is to build as many small projects as possible and incrementally add complexity
    and research new things.


    # ## Next Steps


    We explored a lot of Django material in this book but there is still much more
    to learn. This is especially true if you want to build large websites that must
    handle thousands or millions of visitors at a time. Django itself is more than
    capable of this. I''ve written a follow-up book called [Django for Professionals](https://djangoforprofessionals.com)
    that tackles many of the challenges around building truly *production-ready* websites
    such as using Docker, a production database locally like PostgreSQL, advanced
    user registration, security, performance, and much more.


    Django is also frequently used to create back-end APIs consumable by either mobile
    apps (iOS/Android) or websites'
  - '[PAGE 291]


    that use a dedicated JavaScript front-end framework such as Vue, React, or Angular.
    Thanks to the power of [Django REST Framework](https://www.django-rest-framework.org/),
    a third-party app that is tightly coupled with Django itself, it is possible to
    transform any existing Django website into an API with a minimal amount of code.
    If you''d like to learn more, I''ve written an entire book on the topic called
    [Django for APIs](https://djangoforapis.com/).


    # ## 3rd Party Packages


    As we''ve seen in this book, 3rd party packages are a vital part of the Django
    ecosystem especially when it comes to deployment or improvements around user registration.
    It''s not uncommon for a professional Django website to rely on literally dozens
    of such packages.


    However, a word of caution is in order: don''t blindly install and use 3rd party
    packages just because it saves a small amount of time now. Every additional package
    introduces another dependency, another risk that its maintainer won''t fix every
    bug or won''t keep up to date with the latest version of Django. Take the time
    to understand what it is doing.


    If you''d like to view more packages, the [Django Packages](https://djangopackages.org/)
    website is a comprehensive resource of all available third party apps. For a more
    curated list of packages the [awesome-django](https://github.com/wsvincent/awesome-django)
    repo is worth a look.


    # ## Learning Resources


    As you become more comfortable with Django and web development in general, you''ll
    find the [official Django documentation](https://docs.djangoproject.com/) and
    [source code](https://github.com/django/django) increasingly valuable. I refer
    to both on an almost daily basis. There is also the'
  - '[PAGE 292]


    [official Django forum](https://forum.djangoproject.com/), a great resource albeit
    underutilized resource for Django-specific questions.


    You might also look at the [DjangoX](https://github.com/wsvincent/djangox) and
    [DRFX](https://github.com/wsvincent/drfx) starter projects to speed up the development
    of new projects.


    If you''re interested in a podcast on Django, I co-host [Django Chat](https://djangochat.com/),
    which features interviews with leading developers and topic deep-dives. And I
    co-write a weekly newsletter, [Django News](https://django-news.com/), filled
    with news, articles, tutorials, and more all about Django.


    # ## Python Books


    Django is, ultimately, just Python so if your Python skills could use improvement
    there are two books in particular I recommend. For beginners and those new to
    Python, it doesn''t get much better than Eric Matthes''s [Python Crash Course](https://nostarch.com/pythoncrashcourse2e).
    For intermediate to advanced developers, [Fluent Python](https://www.oreilly.com/library/view/fluent-python/9781491946237/)
    and [Effective Python](https://effectivepython.com/) are worthy of additional
    study.


    # ## Feedback


    If you purchased this book on Amazon, please consider leaving an honest review.
    For whatever reason, technical readers are often hesitant to write a review yet
    they make make an enormous impact on book sales and help me continue to teach
    Django.


    As a final note, I''d love to hear your thoughts about the book. It is a constant
    work-in-progress and the detailed feedback I receive from readers helps me continue
    to improve it. I try to respond to every email and can be reached at `will@wsvincent.com`.'
  - '[PAGE 293]


    Thank you for reading the book and good luck on your journey with Django!'
