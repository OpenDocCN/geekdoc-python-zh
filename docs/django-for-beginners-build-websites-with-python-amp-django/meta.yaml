    # # Chapter 1: Initial Set Up


    This chapter covers how to properly configure your Windows or macOS computer to
    work on Django projects. We start with an overview of the *Command Line*, a powerful
    text-only interface that developers use extensively to install and configure Django
    projects. Then we install the latest version of Python, learn how to create dedicated
    virtual environments, and install Django. As a final step, we will explore using
    Git for version control and working with a text editor. By the end of this chapter
    you will have created your first Django project from scratch and more importantly
    be able to create and modify new Django projects in just a few keystrokes.


    # ## The Command Line


    If you have ever seen a television show or movie where a hacker is furiously typing
    into a black window: that''s the command line. It is an alternative to the mouse
    or finger-based graphical user interface familiar to most computer users. An everyday
    computer user will never need to use the command line but software developers
    do because certain tasks can only be done with it. These include running programs,
    installing software, using Git for version control, or connecting to servers in
    the cloud. With a little practice, most developers find that the command line
    is actually a faster and more powerful way to navigate and control a computer.


    Given its minimal user interface–just a blank screen and a blinking cursor–the
    command line is intimidating to newcomers. There is often no feedback after a
    command has run and it is possible to wipe the contents of an entire'
