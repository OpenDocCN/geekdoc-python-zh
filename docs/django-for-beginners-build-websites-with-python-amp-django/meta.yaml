    # # Chapter 16: Deployment


    There is a fundamental tension between the ease-of-use desired in a local Django
    development environment and the security and performance necessary in a production
    environment. Django is designed to make web developers''s lives easier and it
    therefore defaults to a local configuration when the `startproject` command is
    first run. We''ve seen this in the use of SQLite as the file-based database and
    the various configurations in `settings.py` out of the box.


    But as we''ve already seen in our projects, deployment requires additional steps
    for proper security and performance. Here is the complete deployment checklist
    last used for the *Blog* app back in Chapter 7:


    +   - install Gunicorn

    - create a `requirements.txt` file

    - update `ALLOWED_HOSTS` in `django_project/settings.py`

    - create a `Procfile` file

    - create a `runtime.txt` file

    - configure static files, install `whitenoise`, and run `collectstatic`

    - create and update a `.gitignore` file

    - create a new Heroku project, push the code to it, and start a dyno web process


    In truth, though, this list is far from complete. We''ve relied on a number of
    shortcuts in our deployments so far that now need to be fixed. As the [Django
    deployment checklist](https://docs.djangoproject.com/en/4.0/howto/deployment/checklist/)
    notes, at the very minimum, a production environment should also have:


    +   - `DEBUG` set to `False`

    - `SECRET_KEY` actually kept secret'
  - '[PAGE 273]


    +   - a production database, not SQLite


    The question is: how do we balance both of these needs? One environment for local
    development and another for production? Today, the best practice is to use *environment
    variables*, which can be loaded into the codebase at runtime yet not stored in
    the source code. In other words, even if someone had access to your GitHub repo
    and all the source code, they couldn''t do much damage because the environment
    variables representing the most important details would be stored elsewhere!


    In this final chapter we will switch over to environment variables and create
    a deployment checklist suitable for a professional website.


    # ## Environment Variables


    There are multiple ways to work with environment variables in Python but for this
    project we''ll use the [environs](https://github.com/sloria/environs) package.
    It allows us to create a dedicated `.env` file for environment variables as well
    as load a number of Django-specific additional packages to help with configuration.


    On the command line, install `environs[django]`. Note that you''ll probably need
    to add single quotes, `'' ''`, around the package if you''re using Zsh as your
    terminal shell, so run `python -m pip install ''environs[django]==9.3.5''`.


    ```

    Shell

    (.venv) > python -m pip install ''environs[django]==9.3.5''

    ```


    Then, in `django_project/settings.py` there are three lines of imports to add
    near the top of the file.


    Code'
  - '[PAGE 274]


    ```

    python

    # django_project/settings.py

    from pathlib import Path

    from environs import Env  # new


    env = Env()  # new

    env.read_env()  # new

    ```


    Next up, create a new file called `.env` in the root project directory which will
    contain our environment variables. We already know that any file or directory
    starting with a period, `.`, will be treated as a *hidden file* and not displayed
    by default during a directory listing. The file still exists though and needs
    to be added to a `.gitignore` file to avoid being added to our Git source control.


    Go ahead and create a new `.gitignore` file with your text editor in the root
    project directory. Its contents should include our new `.env` file and also the
    `.venv` directory.


    ```


    .gitignore


    .venv

    .env

    ```


    While we''re at it there are several other files and folders that are convenient
    to ignore for Python and Django development. These include all `*.pyc` files and
    the `__pycache__` directory. If you''re on a Mac, there''s no need to track `.DS_Store`
    which stores information about folder settings.


    The final file to ignore is our local database contained in `db.sqlite3`. This
    file can become quite large and contains our *entire* database. We do not want
    someone with access to our source code to also have access to all our data. For
    convenience, we have used SQLite as our production database in previous chapters–that
    is, deployed on Heroku–but here we will switch over to production-ready PostgreSQL
    instead for deployment.'
