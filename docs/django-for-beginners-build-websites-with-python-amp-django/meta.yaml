    or framework. We''ll also work with Git for the first time and deploy our code
    to GitHub.


    If you become stuck at any point, complete source code for this and all future
    chapters is available online on [the official GitHub repo](https://github.com/wsvincent/djangoforbeginners)
    for the book.


