    # ## Local vs Production


    To make our site available on the Internet where everyone can see it, we need
    to deploy our code to an external server and database. This is called putting
    our code into *production*. Local code lives only on our computer; production
    code lives on an external server available to everyone.


    The `startproject` command creates a new project configured for local development
    via the file `django_project/settings.py`. This ease-of-use means when it does
    come time to push the project into production, a number of settings have to be
    changed.


    One of these is the web server. Django comes with its own basic server, suitable
    for local usage, but it *is not* suitable for production. There are two options
    available: [Gunicorn](https://gunicorn.org/) and [uWSGI](https://uwsgi-docs.readthedocs.io/).
    Gunicorn is the simpler to configure and more than adequate for our projects so
    that will be what we use.


    For our hosting provider we will use [Heroku](https://www.heroku.com/) because
    it is free for small projects, widely-used, and has a relatively straightforward
    deployment process.


    # ## Heroku


    You can sign up for a free Heroku account on their website. Fill in the registration
    form and wait for an email with a link to confirm your account. This will take
    you to the password setup page. Once configured, you will be directed to the dashboard
    section of the site. Heroku now requires enrolling'
  - '[PAGE 72]


    in multi-factor authentication (MFA), too, which can be done with SalesForce or
    a tool like Google Authenticator.


    Heroku may also ask about adding a credit card for [account verification](https://example.com).
    This is optional but provides extra benefits even if you use the free tier such
    as adding a custom domain and adding extra add-ons for additional functionality.


    Now that you are signed up, it is time to install Heroku''s *Command Line Interface
    (CLI)* so we can deploy from the command line. Currently, we are operating within
    a virtual environment for our *Pages* project but we want Heroku available globally,
