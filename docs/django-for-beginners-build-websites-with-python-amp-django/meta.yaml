  md: "# # Model\n\nLet's begin by adding another table to our existing database called\
    \ `comment`. This model will have a many-to-one foreign key relationship to `Article`:\
    \ one article can have many comments, but not the other way around. Traditionally\
    \ the name of the foreign key field is simply the model it links to, so this field\
    \ will be called `article`. The other two fields will be `comment` and `author`.\n\
    \nOpen up the file `articles/models.py` and underneath the existing code add the\
    \ following. Note that we are including both a `__str__` and `get_absolute_url`\
    \ method as a best practice.\n\n```\n# articles/models.py\n...\nclass Comment(models.Model):\
    \  # new\n    article = models.ForeignKey(Article, on_delete=models.CASCADE)\n\
    \    comment = models.CharField(max_length=140)\n    author = models.ForeignKey(\n\
    \        settings.AUTH_USER_MODEL,\n        on_delete=models.CASCADE,\n    )\n\
    \n    def __str__(self):\n        return self.comment\n\n    def get_absolute_url(self):\n\
    \        return reverse(\"article_list\")\n```\n\nSince we've updated our models\
    \ it's time to make a new migration file and then apply it. Note that by adding\
    \ `articles` at the end of the `makemigrations` command–which is optional–we are\
    \ specifying we want to use just the `articles` app here. This is a good habit\
    \ to use. For example, what if we made changes to models in two different apps?\
    \ If we **did not** specify an app, then both apps's changes would be incorporated\
    \ in the same migrations file which makes it"
