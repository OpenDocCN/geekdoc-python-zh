    # ## Conclusion


    We''ve now built, tested, and deployed our first database-driven app. While it''s
    deliberately quite basic, we learned how to create a database model, update it
    with the admin panel, and then display the contents on a web page. That''s the
    good news. The bad news is that if you check your Heroku site in a few days, it''s
    likely whatever posts you''ve added will be deleted! This is related to how Heroku
    handles SQLite, but really it''s an indication that we should be using a production
    database like PostgreSQL for deployments, even if we still want to stick with
    SQLite locally. This is covered in Chapter 16!


    In the next section, we''ll learn how to deploy with PostgreSQL and build a *Blog*
    application so that users can create, edit, and delete posts on their own. No
    admin access required! We''ll also add styling via CSS so the site looks better.'
