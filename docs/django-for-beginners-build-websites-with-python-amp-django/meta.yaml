    If we step back for a moment, what are the two ways in which we would interact
    with our new `CustomUser` model? One case is when a user signs up for a new account
    on our website. The other is within the `admin` app which allows us, as superusers,
    to modify existing users. So we''ll need to update the two built-in forms for
    this functionality: [UserCreationForm](#) and [UserChangeForm](#).'
