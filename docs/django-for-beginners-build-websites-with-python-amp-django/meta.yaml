    ANYTHING is a variable so it can have almost any name we desire. In practice,
    however, most developers will name the environment variable to match the name
    of the setting it replaces. We will do the same so `DEBUG=True`.


    One more best practice we will adopt is to set a default value, in this case `False`,
    meaning that if an environment variable can''t be found, our production setting
    will be used. It''s a best practice to default to production settings since they
    are more secure and if something goes wrong in our code, we won''t default to
    exposing all our secrets out in the open.


    The final `django_project/settings.py` line therefore looks as follows:


    ```

    python

    # django_project/settings.py

    DEBUG = env.bool("DEBUG", default=False)

    ```


    If you refresh the webpage at `http://127.0.0.1:8000/debug`, you''ll see the full
    error page is back again. Everything is working properly.


