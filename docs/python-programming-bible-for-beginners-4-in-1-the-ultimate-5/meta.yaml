    This set comprehension evaluates the length of each word, creating a set of unique
    lengths. It''s a testament to Python''s ability to simplify operations on data,
    preserving uniqueness without the need for explicit loops or conditionals. Lastly,
    generator comprehensions offer a memory-efficient way to work with large datasets.
    They are like list comprehensions, but instead of creating a list, they return
