  md: 'Integrity ensures that data remains unchanged, unaltered from its original
    form. Python''s **hashlib** library is a sentinel of integrity, offering hashing
    algorithms to verify the authenticity of data. Hashing is like a digital fingerprint,
    a unique representation of data. If the data changes, so does its fingerprint.


    ```

    import hashlib


    message = "The quick brown fox jumps over the lazy dog"

    hash_object = hashlib.sha256(message.encode())

    hex_dig = hash_object.hexdigest()

    print(f"SHA256 Hash: {hex_dig}")

