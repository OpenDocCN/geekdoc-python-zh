    cipher_text = cipher_suite.encrypt(text.encode())

    print(f"Encrypted: {cipher_text}")


    # Decrypt the message

    plain_text = cipher_suite.decrypt(cipher_text).decode()

    print(f"Decrypted: {plain_text}")

    ```


    Encryption is the art of obfuscation, transforming data into a form unreadable
    without the correct key. Through these simple lines of Python code, we wield the
    power to protect the confidentiality of data.


    # Integrity: Hashing with Python'
  - '[PAGE 111]


    Integrity ensures that data remains unchanged, unaltered from its original form.
    Python''s **hashlib** library is a sentinel of integrity, offering hashing algorithms
    to verify the authenticity of data. Hashing is like a digital fingerprint, a unique
    representation of data. If the data changes, so does its fingerprint.


    ```

    import hashlib


    message = "The quick brown fox jumps over the lazy dog"

    hash_object = hashlib.sha256(message.encode())

    hex_dig = hash_object.hexdigest()

    print(f"SHA256 Hash: {hex_dig}")

    ```


    In cybersecurity, maintaining integrity is paramount. A single alteration can
    mean the difference between secure data and a potential security breach. Hashing
    with Python provides a simple yet effective means to ensure that data remains
    as intended.'
