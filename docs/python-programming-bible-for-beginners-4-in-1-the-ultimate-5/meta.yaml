  mdcn: "## 处理客户端与广播消息\n\n服务器启动并开始监听后，下一步是接受传入的客户端连接并进行管理。这时就需要引入线程，允许多个客户端同时连接并与服务器交互：\n\
    \n```python\nclients = []\nnicknames = []\n\ndef broadcast(message):\n    for\
    \ client in clients:\n        client.send(message)\n\ndef handle(client):\n  \
