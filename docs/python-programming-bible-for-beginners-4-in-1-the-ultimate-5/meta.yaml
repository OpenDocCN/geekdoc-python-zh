    # Confidentiality: Encryption with Python


    Confidentiality is about keeping secrets, ensuring that information is accessible
    only to those who are meant to see it. In Python, the **cryptography** library
    offers robust encryption capabilities to secure data. Encrypting data with Python
    is akin to sealing a letter in an envelope, visible only to the recipient who
    possesses the key.


    ```

    from cryptography.fernet import Fernet


    # Generate a key

    key = Fernet.generate_key()

    cipher_suite = Fernet(key)


    # Encrypt a message

    text = "The quick brown fox jumps over the lazy dog"

    cipher_text = cipher_suite.encrypt(text.encode())

    print(f"Encrypted: {cipher_text}")


    # Decrypt the message

    plain_text = cipher_suite.decrypt(cipher_text).decode()

    print(f"Decrypted: {plain_text}")

    ```


    Encryption is the art of obfuscation, transforming data into a form unreadable
    without the correct key. Through these simple lines of Python code, we wield the
    power to protect the confidentiality of data.


