    a floating-point number. Thus, 3.5 + 4 evaluates to 7.5, which is of type float.


    3. B) list = [1, 2, 3]

    Explanation: Lists in Python are defined by square brackets. Option A defines
    a tuple, option C defines a set, and option D defines a string.


    4. B) languages.insert(0, "Python")

    Explanation: The insert() method inserts an item at a specified position within
    the list. append() adds to the end, add() is not a list method, and push() is
    used in other languages like JavaScript.


    5. A) 2

    Explanation: The modulo operator % returns the remainder of the division between
    the numbers. Hence, 8 divided by 3 leaves a remainder of 2.


    6. A) It prints "25"

    Explanation: The ** operator in Python is used to calculate powers. Thus, x **
    y calculates 5 to the power of 2, which is 25.


    7. B) def

    Explanation: In Python, the def keyword is used to define a function. This is
    part of Python''s syntax for function declaration.


