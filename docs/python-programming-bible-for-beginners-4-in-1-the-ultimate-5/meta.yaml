    \ text)\nif match:\n    year, month, day = match.groups()\n```\n\nHere, the pattern\
    \ captures the year, month, and day from a date string, demonstrating how regex\
    \ can parse and deconstruct complex formats.\n\n# The Power and Peril of Regex\n\
    \nWhile regular expressions are undeniably powerful, they also come with a word\
