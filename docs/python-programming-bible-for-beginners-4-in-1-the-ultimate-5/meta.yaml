    ### 准备工作


    在我们开始之前，请确保你的计算机上已安装 Python。如果你已经按照前一小节的步骤操作，那么一切就绪。否则，请花点时间从官方网站安装 Python。选择推荐给初学者的版本，因为它将具有最新的功能，同时保持稳定性。

    安装后，你还需要一个文本编辑器——一个你可以编写和编辑 Python 代码的地方。虽然有很多选择，从简单的编辑器如记事本或 TextEdit，到更复杂的集成开发环境（IDE）如
    PyCharm 或 Visual Studio Code，选择权在你。选择一个感觉舒适的，因为它将成为你编码旅程中的伙伴。


    ### 编写你的第一个脚本


    打开你的文本编辑器，准备编写你的前几行 Python 代码。你的任务是创建一个脚本，在屏幕上显示消息 "Hello, World!"。输入以下行：


    ```

    print("Hello, World!")

    ```


    这行代码告诉 Python 显示引号内的文本。**print()** 函数是 Python 的内置函数之一，它允许你将信息输出到屏幕。

    用有意义的名称和 **.py** 扩展名保存你的文件，例如 **hello_world.py**。这个扩展名至关重要，因为它表明你的文件包含 Python
    代码。


    ### 运行你的脚本


    脚本编写并保存后，是时候让它活起来了。打开计算机上的命令行界面（CLI）。在 Windows 上，这可能是命令提示符或 PowerShell；在 macOS
    或 Linux 上，是终端。

    导航到保存 **hello_world.py** 文件的目录。如果你不熟悉在 CLI 中导航目录，请记住 **cd**（更改目录）是你的好帮手。进入正确的目录后，输入以下命令：


    ```

    python hello_world.py

    ```


    按 Enter 键，如果一切顺利，你将在屏幕上看到消息 "Hello, World!" 被打印出来。恭喜！你刚刚执行了你的第一个 Python 脚本。


    ### 对你的第一个脚本的思考


    你所完成的事情在编程的宏大图景中可能看起来很小，但它是一个重要的第一步。通过编写和运行你的 "Hello, World!" 脚本，你已经开始理解编写、保存和执行
    Python 代码的工作流程。这个过程是你今后在 Python 中所做一切的基础。

    这个简单的脚本也向你介绍了 Python 中函数的概念。你用来显示消息的 **print()** 函数，是函数在 Python 中执行特定任务的一个基本例子。随着你的进步，你将学习许多其他函数，甚至如何创建自己的函数。


    ### 下一步


    当你继续前进时，请记住这种成就感。编程是一段充满挑战和学习机会的旅程。会有沮丧和困惑的时刻，但也会有清晰和成功的时刻。你编写的每一行代码都建立在前一行的基础上，逐渐增加复杂性和能力。

    你的 "Hello, World!" 脚本不仅仅是一个传统。它象征着你学习 Python 的承诺和你创造伟大事物的潜力。所以，花点时间庆祝这个成就。你已经迈出了进入编程世界的第一步，前方的道路充满可能性。

