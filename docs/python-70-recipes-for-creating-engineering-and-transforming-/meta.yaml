  md: "10. Let's replace missing values with medians:\n\n```\nX_train = imputer.transform(X_train)\n\
    X_test = imputer.transform(X_test)\n```\n\n> SimpleImputer() returns NumPy arrays.\
    \ We can transform the array into a dataframe using pd.DataFrame(X_train, columns\
    \ = ['A2', 'A3', 'A8', 'A11', 'A15']). Be mindful of the order of the variables.\n\
    \nFinally, let's perform median imputation using MeanMedianImputer() from Feature-engine.\
    \ First, we need to load and divide the dataset, just like we did in step 2 and\
    \ step 3. Next, we need to create an imputation transformer.\n\n11. Let's set\
    \ up a median imputation transformer using MeanMedianImputer() from Feature-engine\
    \ specifying the variables to impute:\n\n```\nmedian_imputer = MeanMedianImputer(imputation_method='median',\n\
    \                                       variables=['A2', 'A3', 'A8', 'A11', 'A15'])\n\
    ```\n\n> To perform mean imputation, change the imputation method, as follows:\n\
    MeanMedianImputer(imputation_method='mean').\n\n12. Let's fit the median imputer\
    \ so that it learns the median values for each of the specified variables:\n\n\
    ```\nmedian_imputer.fit(X_train)\n```\n\n13. Let's inspect the learned medians:\n\
    \n```\nmedian_imputer.imputer_dict_\n```\n\nWith the previous command, we can\
    \ visualize the median values stored in a dictionary in the imputer_dict_ attribute:\n\
    \n```\n{'A2': 28.835, 'A3': 2.75, 'A8': 1.0, 'A11': 0.0, 'A15': 6.0}\n```\n\n\
    14. Finally, let's replace the missing values with the median:\n\n```\nX_train\
    \ = median_imputer.transform(X_train)\nX_test = median_imputer.transform(X_test)\n\
    ```"
