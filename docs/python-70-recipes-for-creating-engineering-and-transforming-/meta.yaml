  md: '# Performing multivariate imputation by chained equations


    Multivariate imputation methods, as opposed to univariate imputation, use the
    entire set of variables to estimate the missing values. In other words, the missing
    values of a variable are modeled based on the other variables in the dataset.
    **Multivariate imputation by chained equations (MICE)** is a multiple imputation
    technique that models each variable with missing values as a function of the remaining
    variables and uses that estimate for imputation. MICE has the following basic
    steps:


    +   1. A simple univariate imputation is performed for every variable with missing
    data, for example, median imputation.

    2. One specific variable is selected, say, `var_1`, and the missing values are
    set back to missing.

    3. A model that''s used to predict `var_1` is built based on the remaining variables
    in the dataset.

    4. The missing values of `var_1` are replaced with the new estimates.

    5. Repeat *step 2* to *step 4* for each of the remaining variables.


    Once all the variables have been modeled based on the rest, a cycle of imputation
    is concluded. *Step 2* to *step 4* are performed multiple times, typically 10
    times, and the imputation values after each round are retained. The idea is that,
    by the end of the cycles, the distribution of the imputation parameters should
    have converged.


    > Each variable with missing data can be modeled based on the remaining variable
    by using multiple approaches, for example, linear regression, Bayes, decision
    trees, k-nearest neighbors, and random forests.


    In this recipe, we will implement MICE using scikit-learn.


    # Getting ready


    To learn more about MICE, take a look at the following links:


    +   - *A multivariate technique for multiplying imputing missing values using
    a sequence of regression models*: http://citeseerx.ist.psu.edu/viewdoc/download?doi=10.1.1.405.4540rep=rep1type=pdf'
