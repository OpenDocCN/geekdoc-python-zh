    \ a dataframe:\n\npython\nboston_dataset = load_boston()\ndata = pd.DataFrame(boston_dataset.data,\n\
    \                    columns=boston_dataset.feature_names)\ndata['MEDV'] = boston_dataset.target\n\
    \nThe boundaries for the intervals, that is, the quantiles, should be learned\
    \ using variables in the train set, and then used to discretize the variables\
    \ in train and test sets.\n\n+   3. Let's divide the data into train and test\
