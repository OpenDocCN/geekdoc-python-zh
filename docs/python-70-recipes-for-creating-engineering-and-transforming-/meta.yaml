    ```\n\n> Remember that you can check the percentage of missing values using `X_train.isnull().mean()`.\n\
    \n+   4. Let's loop over five numerical variables, calculate the IQR, determine\
    \ the value of the 75th quantile plus 1.5 times the IQR, and replace the missing\
    \ observations in the train and test sets with that value:\n\n```\nfor var in\
