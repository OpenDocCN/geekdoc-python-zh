    # Creating binary variables through one-hot encoding


    In one-hot encoding, we represent a categorical variable as a group of binary
    variables, where each binary variable represents one category. The binary variable
    indicates whether the category is present in an observation (1) or not (0). The
    following table shows the one-hot encoded representation of the **Gender** variable
    with the categories of **Male** and **Female**:


    | Gender | Female | Male |

    | :--- | :---: | :---: |

    | Female | 1 | 0 |

    | Male | 0 | 1 |

    | Male | 0 | 1 |

    | Female | 1 | 0 |

    | Female | 1 | 0 |'
  merge: -1
  pgno: 108
- img_proc: false
  md: 'As shown in the table, from the **Gender** variable, we can derive the binary
    variable of **Female**, which shows the value of **1** for females, or the binary
    variable of **Male**, which takes the value of **1** for the males in the dataset.


    For the categorical variable of **Color** with the values of **red**, **blue**,
    and **green**, we can create three variables called red, blue, and green. These
    variables will take the value of **1** if the observation is red, blue, or green,
    respectively, or 0 otherwise.


    A categorical variable with *k* unique categories can be encoded in *k*-1 binary
    variables. For **Gender**, *k* is 2 as it contains two labels (male and female),
    therefore, we need to create only one binary variable (*k* - 1 = 1) to capture
    all of the information. For the color variable, which has three categories (*k*=3;
    red, blue, and green), we need to create two (*k* - 1 = 2) binary variables to
    capture all the information, so that the following occurs:


    +   - If the observation is red, it will be captured by the variable **red** (red
    = 1, blue = 0).

    - If the observation is blue, it will be captured by the variable **blue** (red
    = 0, blue = 1).

    - If the observation is green, it will be captured by the combination of **red**
    and **blue** (red = 0, blue = 0).


    There are a few occasions in which we may prefer to encode the categorical variables
    with *k* binary variables:


    +   - When training decision trees, as they do not evaluate the entire feature
    space at the same time

    - When selecting features recursively

    - When determining the importance of each category within a variable


    In this recipe, we will learn how to perform one-hot encoding using pandas, scikit-learn,
    and Feature-engine.


