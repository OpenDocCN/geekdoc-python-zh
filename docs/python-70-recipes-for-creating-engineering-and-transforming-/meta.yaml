  md: '# # 4 Transforming Numerical Variables


    Linear and logistic regression assume that the variables are normally distributed.
    If they are not, we can often apply a mathematical transformation to change their
    distribution into Gaussian, and sometimes even unmask linear relationships between
    variables and their targets. This means that transforming variables may improve
    the performance of linear machine learning models. Commonly used mathematical
    transformations include the logarithm, reciprocal, power, square and cube root
    transformations, as well as the Box-Cox and Yeo-Johnson transformations. In this
    chapter, we will learn how to implement all of these operations on the variables
    in our dataset using the NumPy, SciPy, scikit-learn, and Feature-engine libraries.


    This chapter will cover the following recipes:


    +   - Transforming variables with the logarithm

    - Transforming variables with the reciprocal function

    - Using square and cube root to transform variables

    - Using power transformations on numerical variables

    - Performing Box-Cox transformation on numerical variables

    - Performing Yeo-Johnson transformation on numerical variables


    # ## Technical requirements


    In this chapter, we will use the pandas, NumPy, Matplotlib, SciPy and scikit-learn
    Python libraries. These libraries are bundled in the free Anaconda Python distribution
    (https://www.anaconda.com/distribution/), which you can install as described in
    the *Technical Requirements* section of *Chapter 1, Foreseeing Variable Problems
    when Building ML Models*.'
  merge: -1
  pgno: 153
- img_proc: false
