    # There''s more...


    You can also perform one-hot encoding of the five most popular categories using
    scikit-learn''s `OneHotEncoder()` function. To do this, you need to pass a list
    of lists or an array of values to the `categories` argument where each list or
    each row of the array holds the top five categories expected in the relevant variable.
    You can find more details on the scikit-learn website at https://scikit-learn.org/stable/modules/generated/sklearn.preprocessing.OneHotEncoder.html.


    # Replacing categories with ordinal numbers


    Ordinal encoding consists of replacing the categories with digits from 1 to k
    (or 0 to k-1, depending on the implementation), where k is the number of distinct
    categories of the variable. The numbers are assigned arbitrarily. Ordinal encoding
    is better suited for non-linear machine learning models, which can navigate through
    the arbitrarily assigned digits to try and find patterns that relate to the target.


    In this recipe, we will perform ordinal encoding using pandas, scikit-learn, and
    Feature-engine.


