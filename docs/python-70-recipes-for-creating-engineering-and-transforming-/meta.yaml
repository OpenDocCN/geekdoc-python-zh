    # Pinpointing rare categories in categorical variables


    Different labels appear in a variable with different frequencies. Some categories
    of a variable appear a lot, that is, they are very common among the observations,
    whereas other categories appear only in a few observations. In fact, categorical
    variables often contain a few dominant labels that account for the majority of
    the observations and a large number of labels that appear only seldom. Categories
    that appear in a tiny proportion of the observations are rare. Typically, we consider
    a label to be rare when it appears in less than 5% or 1% of the population. In
    this recipe, we will learn how to identify infrequent labels in a categorical
    variable.


