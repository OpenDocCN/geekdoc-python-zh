    the number of bins. Finally, we captured the interval limits in a list, utilizing
    the minimum and maximum values, and the interval width within a list comprehension.


    To discretize the `LSTAT` variable, we used the pandas `cut()` method and the
    interval limits that we created with the list comprehension, to allocate the variable
    values into each interval. We then used pandas'' `value_counts()` method to count
    the number of observations per interval.'
