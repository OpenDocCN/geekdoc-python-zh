    In this recipe, we identified outliers in the numerical variables of the Boston
    House Prices dataset from scikit-learn using boxplots and the IQR proximity rule.
    To proceed with this recipe, we loaded the dataset from scikit-learn and created
    a boxplot for one of its numerical variables as an example. Next, we created a
    function to identify the boundaries using the IQR proximity rule and used the
    function to determine the boundaries of the numerical RM variable. Finally, we
    identified the values of RM that were higher or lower than those boundaries, that
    is, the outliers.


    To load the data, we imported the dataset from `sklearn.datasets` and used `load_boston()`.
    Next, we captured the data in a dataframe using pandas `DataFrame()`, indicating
    that the data was stored in the `data` attribute and that the variable names were
    stored in the `feature_names` attribute. To retain only the `RM`, `LSTAT`, and
    `CRIM` variables, we passed the column names in double brackets `[[]]` at the
    back of pandas `DataFrame()`.


    To display the boxplot, we used seaborn''s `boxplot()` method and passed the pandas
    Series with the `RM` variable as an argument. In the boxplot displayed after *step
    3*, the IQR is delimited by the rectangle, and the upper and lower boundaries
    corresponding to either, the 75th quantile plus 1.5 times the IQR, or the 25th
    quantile minus 1.5 times the IQR. This is indicated by the whiskers. The outliers
    are the asterisks lying outside the whiskers.


    To identify those outliers in our dataframe, in *step 4*, we created a function
    to find the boundaries according to the IQR proximity rule. The function took
    the dataframe and the variable as arguments and calculated the IQR and the boundaries
    using the formula described in the *Getting ready* section of this recipe. With
    the pandas `quantile()` method, we calculated the values for the 25th (0.25) and
    75th quantiles (0.75). The function returned the upper and lower boundaries for
    the `RM` variable.


    To find the outliers of `RM`, we used NumPy''s `where()` method, which produced
    a boolean vector with `True` if the value was an outlier. Briefly, `where()` scanned
    the rows of the `RM` variable, and if the value was bigger than the upper boundary,
    it assigned `True`, whereas if the value was smaller, the second `where()` nested
    inside the first one and checked whether the value was smaller than the lower
