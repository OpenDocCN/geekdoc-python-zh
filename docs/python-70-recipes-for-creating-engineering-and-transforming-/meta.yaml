    # Performing Box-Cox transformation on numerical variables


    The Box-Cox transformation belongs to the power family of functions and is defined
    by $\frac{X^\lambda - 1}{\lambda}$ if $X > 0$ or $log(X)$ if $X = 0$, where $X$
    is the variable and $\lambda$ is the transformation parameter. In the Box-Cox
    transformation, several values of $\lambda$ are considered and the $\lambda$ that
    returns the best transformation is selected. In this recipe, we will perform Box-Cox
    transformation using SciPy, scikit-learn, and Feature-engine.


    > The Box-Cox transformation can only be used on positive variables. If your variables
    have negative values, try the Yeo-Johnson transformation, which is described in
    the next recipe, *Performing Yeo-Johnson transformation on numerical variables*.


    # How to do it...


    Let''s begin by importing the necessary libraries and getting the dataset ready:


    +   1. Import the required Python libraries and classes:


    ```

    import numpy as np

    import pandas as pd

    import scipy.stats as stats

    from sklearn.datasets import load_boston

    from sklearn.preprocessing import PowerTransformer

    from feature_engine.variable_transformers import BoxCoxTransformer

    ```'
