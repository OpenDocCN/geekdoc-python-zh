  md: '# See also


    To learn more about Feature-engine''s `RareLabelCategoricalEncoder()` categorical
    encoder, visit: https://feature-engine.readthedocs.io/en/latest/encoders/RareLabelCategoricalEncoder.html.


    # Performing binary encoding


    Binary encoding is an alternative categorical encoding technique that uses binary
    code, that is, a sequence of zeroes and ones, to represent the different categories
    of the variable. How does it work? First, the categories are arbitrarily replaced
    by ordinal numbers, as shown in the intermediate step of the following table.
    Then, those numbers are converted into binary code. For example, the integer 1
    can be represented as the sequence 01, the integer 2 as 10, the integer 3 as 00,
    and 4 as 11. The digits in the two positions of the binary string become the columns,
    which are the encoded representation of the original variable:


    | Color | Intermediate step | 1st | 2nd |

    |---|---|---|---|

    | Blue | 1 | 0 | 1 |

    | Red | 2 | 1 | 0 |

    | Green | 3 | 0 | 0 |

    | Yellow | 4 | 1 | 1 |


    Binary encoding encodes the data in fewer dimensions than one-hot encoding. In
    our example, the color variable would be encoded into *k-1* categories, that is,
    three variables by one-hot encoding, but with binary encoding, we can represent
    the variable with only two variables. More generally, we determine the number
    of binary features needed to encode a variable as *log2(number of distinct categories)*;
    in our example, *log2(4) = 2* binary features. Also, the derived features are
    binary, which is suitable for linear models. But, the derived features **lack
    human interpretability**, therefore, the use of this technique in organizations
    is questionable.


    In this recipe, we will learn how to perform binary encoding using the Category
    Encoders Python package.


    # Getting ready


    In this recipe, we will implement binary encoding using the open source package,
    Category Encoders, which you can install with pip as described in the *Technical
    requirements* section.'
