  md: "# Getting ready\n\nIn this recipe, we will learn how to identify outliers using\
    \ boxplots and the **inter-quartile range (IQR)** proximity rule. According to\
    \ the IQR proximity rule, a value is an outlier if it falls outside these boundaries:\n\
    \n$$Upper\\ boundary = 75th\\ quantile + (IQR * 1.5)$$\n\n$$Lower\\ boundary =\
    \ 25th\\ quantile - (IQR * 1.5)$$\n\nHere, IQR is given by the following equation:\n\
    \n$$IQR = 75th\\ quantile - 25th\\ quantile$$\n\n> Typically, we calculate the\
    \ IQR proximity rule boundaries by multiplying the IQR by 1.5. However, it is\
    \ also common practice to find extreme values by multiplying the IQR by 3.\n\n\
    # How to do it...\n\nLet's begin by importing the necessary libraries and preparing\
    \ the dataset:\n\n+   1. Import the required Python libraries and the dataset:\n\
    \npython\nimport pandas as pd\nimport numpy as np\nimport matplotlib.pyplot as\
    \ plt\nimport seaborn as sns\nfrom sklearn.datasets import load_boston\n\n+  \
    \ 2. Load the Boston House Prices dataset from scikit-learn and retain three of\
    \ its variables in a dataframe:\n\npython\nboston_dataset = load_boston()\nboston\
    \ = pd.DataFrame(boston_dataset.data,\n    columns=boston_dataset.feature_names)[['RM',\
    \ 'LSTAT', 'CRIM']]\n\n+   3. Make a boxplot for the RM variable:\n\npython\n\
    sns.boxplot(y=boston['RM'])\nplt.title('Boxplot')"
