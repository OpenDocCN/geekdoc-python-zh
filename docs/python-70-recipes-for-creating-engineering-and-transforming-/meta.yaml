  md: '# How it works...


    In this recipe, we quantified and displayed the amount and percentage of missing
    data of a publicly available dataset.


    To load data from the `txt` file into a dataframe, we used the pandas `read_csv()`
    method. To load only certain columns from the original data, we created a list
    with the column names and passed this list to the `usecols` argument of `read_csv()`.
    Then, we used the `head()` method to display the top five rows of the dataframe,
    along with the variable names and some of their values.


    To identify missing observations, we used pandas `isnull()`. This created a boolean
    vector per variable, with each vector indicating whether the value was missing
    (`True`) or not (`False`) for each row of the dataset. Then, we used the pandas
    `sum()` and `mean()` methods to operate over these boolean vectors and calculate
    the total number or the percentage of missing values, respectively. The `sum()`
    method sums the `True` values of the boolean vectors to find the total number
    of missing values, whereas the `mean()` method takes the average of these values
    and returns the percentage of missing data, expressed as decimals.


    To display the percentages of the missing values in a bar plot, we used pandas
    `isnull()` and `mean()`, followed by `plot.bar()`, and modified the plot by adding
    axis legends and a title with the `xlabel()`, `ylabel()`, and `title()` Matplotlib
    methods.


    # Determining cardinality in categorical variables


    The number of unique categories in a variable is called cardinality. For example,
    the cardinality of the `Gender` variable, which takes values of `female` and `male`,
    is 2, whereas the cardinality of the `Civil status` variable, which takes values
    of `married`, `divorced`, `singled`, and `widowed`, is 4. In this recipe, we will
    learn how to quantify and create plots of the cardinality of categorical variables
    using pandas and Matplotlib.


    # Getting ready


    In this recipe, we will use the KDD-CUP-98 dataset from the UCI Machine Learning
    Repository. To download this dataset, follow the instructions in the *Technical
    requirements* section of this chapter.'
