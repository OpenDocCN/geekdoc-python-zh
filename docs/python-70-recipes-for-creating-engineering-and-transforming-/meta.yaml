    # How it works...


    In this recipe, we performed one-hot encoding of the five most popular categories
    using pandas, NumPy and Feature-engine.


    First, we loaded the data and, with `train_test_split()`, we separated the dataset
    into train and test sets, indicating the predictors by dropping the target from
