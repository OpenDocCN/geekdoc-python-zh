  md: '# 5 Performing Variable Discretization


    Discretization, or binning, is the process of transforming continuous variables
    into discrete variables by creating a set of contiguous intervals, also called
    bins, that span the range of the variable values. Discretization is used to change
    the distribution of skewed variables and to minimize the influence of outliers,
    and hence improve the performance of some machine learning models.


    How does discretization minimize the effect of outliers? Discretization places
    outliers into the lower or higher intervals, together with the remaining *inlier*
    values of the distribution. Hence, these outlier observations no longer differ
    from the rest of the values at the tails of the distribution, as they are now
    all together in the same interval or bin. Also, if sorting observations across
    bins with equal frequency, discretization spreads the values of a skewed variable
    more homogeneously across the value range.


    In this chapter, we will discuss supervised and unsupervised approaches to transform
    continuous variables into discrete ones. Unsupervised discretization methods do
    not use any information, other than the variable distribution, to create the contiguous
    bins. Supervised methods, on the other hand, use target information to create
    the intervals.


    This chapter will cover the following recipes:


    +   - Dividing the variable into intervals of equal width

    - Sorting the variable values in intervals of equal frequency

    - Performing discretization followed by categorical encoding

    - Allocating the variable values in arbitrary intervals

    - Performing discretization with k-means clustering

    - Using decision trees for discretization'
