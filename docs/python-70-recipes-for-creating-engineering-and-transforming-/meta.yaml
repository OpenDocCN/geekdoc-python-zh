    # Encoding with the Weight of Evidence


    The **Weight of Evidence (WoE)** was developed primarily for credit and financial
    industries to facilitate variable screening and exploratory analysis and to build
    more predictive linear models to evaluate the risk of loan default; that is, to
    predict how likely money lent to a person or institution is to be lost.


    The WoE is computed from the basic odds ratio:


    $$WoE = \log\left(\frac{p(Y=1)}{p(Y=0)}\right)$$


    Here, $p(Y=1)$ is the probability of an event occurring. Therefore, the WoE takes
    the following values:


    +   - $WoE = 0$ if $p(1) / p(0) = 1$, that is, if the outcome is random

    - $WoE > 0$ if $p(1) > p(0)$

    - $WoE < 0$ if $p(0) > p(1)$'
