    # How it works...


    We replaced the missing values in the Credit Approval Data Set with the median
    estimates of the variables using pandas, scikit-learn, and Feature-engine. Since
    the mean or median values should be learned from the train set variables, we divided
    the dataset into train and test sets. To do so, in step 3, we used scikit-learn''s
    `train_test_split()` function, which takes the dataset with predictor variables,
    the target, the percentage of observations to retain in the test set, and a `random_state`
    value for reproducibility as arguments. To obtain a dataset with predictor variables
    only, we used pandas `drop()` with the target variable A16 as an argument. To
    obtain the target, we sliced the dataframe on the target column, A16. By doing
    this, we obtained a train set with 70% of the original observations and a test
    set with 30% of the original observations.


    We calculated the percentage of missing data for each variable using pandas `isnull()`,
    followed by pandas `mean()`, which we described in the *Quantifying missing data*
    recipe in Chapter 1, *Foreseeing Variable Problems When Building ML Models*. To
    impute missing data with pandas in multiple numerical variables, in step 5 we
    created a `for` loop over the A2, A3, A8, A11, and A15 variables. For each variable,
    we calculated the median with pandas'' `median()` in the train set and used this
    value to replace the missing values with pandas'' `fillna()` in the train and
    test sets.


    To replace the missing values using scikit-learn, we divided the Credit Approval
    data into train and test sets, keeping only the numerical variables. Next, we
    created an imputation transformer using `SimpleImputer()` and set the `strategy`
    argument to median. With the `fit()` method, `SimpleImputer()` learned the median
    of each variable in the train set and stored them in its `statistics_` attribute.
    Finally, we replaced the missing values using the `transform()` method of `SimpleImputer()`
    in the train and test sets.


    To replace missing values via Feature-engine, we set up `MeanMedianImputer()`
    with `imputation_method` set to median and passed the names of the variables to
    impute in a list to the `variables` argument. With the `fit()` method, the transformer
    learned and stored the median values of the specified variables in a dictionary
    in its `imputer_dict_` attribute. With the `transform()` method, the missing values
    were replaced by the median in the train and test sets.'
