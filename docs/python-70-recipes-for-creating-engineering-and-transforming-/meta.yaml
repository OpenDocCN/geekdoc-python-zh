  md: '# Performing one-hot encoding of frequent categories


    One-hot encoding represents each category of a categorical variable with a binary
    variable. Hence, one-hot encoding of highly cardinal variables or datasets with
    multiple categorical features can expand the feature space dramatically. To reduce
    the number of binary variables, we can perform one-hot encoding **of the most
    frequent categories** only. One-hot encoding of top categories is equivalent to
    treating the remaining, less frequent categories as a single, unique category,
    which we will discuss in the *Grouping rare or infrequent categories* recipe toward
    the end of this chapter.


    > For more details on variable cardinality and frequency, visit the *Determining
    cardinality in categorical variables* recipe and the *Pinpointing rare categories
    in categorical variables* recipe in *Chapter 1, Foreseeing Variable Problems in
    Building ML Models*.


    In this recipe, we will learn how to implement one-hot encoding of the most popular
    categories using pandas and Feature-engine.


    # Getting ready


    In the winning solution of the KDD 2009 cup, http://www.mtome.com/Publications/CiML/CiML-v3-book.pdf,
    the authors limit one-hot encoding to the 10 most frequent categories of each
    variable. Check the *Winning the KDD Cup Orange Challenge with Ensemble Selection*
    article for more details. The number of top categories to encode is arbitrarily
    set by the user. In this recipe, we will encode the **five** most frequent categories.


    # How to do it...


    Let''s first import the necessary Python libraries and get the dataset ready:


    +   1. Import the required Python libraries, functions, and classes:


    ```

    import pandas as pd

    import numpy as np

    from sklearn.model_selection import train_test_split

    from feature_engine.categorical_encoders import OneHotCategoricalEncoder

    ```'
