  md: '# Technical requirements


    We will use the following Python libraries: pandas, NumPy, Matplotlib, scikit-learn,
    and Feature-engine. In the *Technical requirements* section of *Chapter 1, Foreseeing
    Variable Problems in Building ML Models*, you will find instructions on how to
    install these libraries. To install Feature-engine, you can use `pip: pip install
    feature-engine`. Throughout the recipes, we will use the Boston House Prices dataset
    from scikit-learn, which contains no missing data.


    > To perform discretization in your own datasets, make sure you impute missing
    data with any of the techniques covered in *Chapter 2, Imputing Missing Data*.


    # Dividing the variable into intervals of equal width


    In equal-width discretization, the variable values are sorted into intervals of
    the same width. The number of intervals is decided arbitrarily and the width is
    determined by the range of values of the variable and the number of bins to create,
    so for the variable X, the interval width is given as follows:


    $$Width = \frac{Max(X) - Min(X)}{Bins}$$


    For example, if the values of the variable vary between 0 and 100, we can create
    five bins like this: *width* = (100-0) / 5 = 20; the bins will be 0-20, 20-40,
    40-60, 80-100. The first and final bins (0-20 and 80-100) can be expanded to accommodate
    outliers, that is, values under 0 or greater than 100 would be placed in those
    bins as well, by extending the limits to minus and plus infinity.


    In this recipe, we will carry out equal-width discretization using pandas, scikit-learn,
    and Feature-engine.'
