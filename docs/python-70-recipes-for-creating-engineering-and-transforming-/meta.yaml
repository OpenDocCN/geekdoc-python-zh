  md: "If the percentage of missing values is high, frequent category imputation may\
    \ distort the original distribution of categories.\n\n# How to do it...\n\nTo\
    \ begin, let's make a few imports and prepare the data:\n\n+   1. Let's import\
    \ `pandas` and the required functions and classes from scikit-learn and Feature-engine:\n\
    \n```\nimport pandas as pd\nfrom sklearn.model_selection import train_test_split\n\
    from sklearn.impute import SimpleImputer\nfrom feature_engine.missing_data_imputers\
    \ import FrequentCategoryImputer\n```\n\n+   2. Let's load the dataset:\n\n```\n\
    data = pd.read_csv('creditApprovalUCI.csv')\n```\n\n+   3. Frequent categories\
    \ should be calculated using the train set variables, so let's separate the data\
    \ into train and test sets and their respective targets:\n\n```\nX_train, X_test,\
    \ y_train, y_test = train_test_split(\n    data.drop('A16', axis=1), data['A16'],\
    \ test_size=0.3,\n    random_state=0)\n```\n\nRemember that you can check the\
    \ percentage of missing values in the train set with `X_train.isnull().mean()`.\n\
    \n+   4. Let's replace missing values with the frequent category, that is, the\
