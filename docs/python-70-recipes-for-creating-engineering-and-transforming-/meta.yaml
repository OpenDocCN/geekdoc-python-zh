  md: '# Identifying a normal distribution


    Linear models assume that the independent variables are normally distributed.
    Failure to meet this assumption may produce algorithms that perform poorly. We
    can determine whether a variable is normally distributed with histograms and Q-Q
    plots. In a Q-Q plot, the quantiles of the independent variable are plotted against
    the expected quantiles of the normal distribution. If the variable is normally
    distributed, the dots in the Q-Q plot should fall along a 45 degree diagonal.
    In this recipe, we will learn how to evaluate normal distributions using histograms
    and Q-Q plots.


    # How to do it...


    Let''s begin by importing the necessary libraries:


    +   1. Import the required Python libraries and modules:


    ```

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    import seaborn as sns

    import scipy.stats as stats

    ```


    To proceed with this recipe, let''s create a toy dataframe with a single variable,
    x, that follows a normal distribution.


    +   2. Create a variable, x, with 200 observations that are normally distributed:


    ```

    np.random.seed(29)

    x = np.random.randn(200)

    ```


    > Setting the seed for reproducibility using `np.random.seed()` will help you
    get the outputs shown in this recipe.


    +   3. Create a dataframe with the x variable:


    ```

    data = pd.DataFrame([x]).T

    data.columns = [''x'']

    ```'
