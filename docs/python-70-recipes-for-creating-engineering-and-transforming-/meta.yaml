    variable, which were stored in the `lambda_dict_`, and transformed the desired
    variables using the `transform()` method. Feature-engine''s `BoxCoxTransformer()`
    can take the entire dataframe as input, but it will only transform the indicated
    variables, returning the entire dataframe with the subset of the variables that
    were transformed.


    # See also


    For more details on the classes and methods that were used in this recipe, take
    a look at the following links:


    +   - `scipy.stats.boxcox()`: https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.boxcox.html

    - Scikit-learn''s `PowerTransformer()`: https://scikit-learn.org/stable/modules/generated/sklearn.preprocessing.PowerTransformer.html.

    - Feature-engine''s `BoxCoxTransformer()`: https://feature-engine.readthedocs.io/en/latest/vartransformers/BoxCoxTransformer.html


    # Performing Yeo-Johnson transformation on numerical variables


    The Yeo-Johnson transformation is an extension of the Box-Cox transformation and
    can be used on variables with zero and negative values, as well as positive values.
    These transformations can be defined as follows:


    +   - $\frac{(X + 1)^\lambda - 1}{\lambda}$ ; if $\lambda$ is not 0 and X >= zero

    - $\ln(X + 1)$; if $\lambda$ is zero and X >= zero

    - $\frac{(-X + 1)^{2-\lambda} - 1}{2 - \lambda}$ ; if $\lambda$ is not 2 and X
    is negative

    - $-\ln(-X + 1)$; if $\lambda$ is 2 and X is negative


    In this recipe, we will perform the Yeo-Johnson transformation using SciPy, scikit-learn,
    and Feature-engine.'
