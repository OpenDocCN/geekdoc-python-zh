  md: "This allows for a direct visualization of the predictive power of the category\
    \ in the variable: the higher the WoE, the more likely the event will occur, and\
    \ in fact, if the W0E is positive, the event is likely to occur.\n\nLogistic regression\
    \ models a binary response, $Y$, based off $X$ predictor variables, assuming that\
    \ there is a linear relationship between $X$ and the log of odds of $Y$:\n\n$$log\\\
    left(\\frac{p(Y=1)}{p(Y=0)}\\right) = b0 + b1X1 + b2X2+...+bnXn$$\n\nHere, log\
    \ ($p(Y=1)/p(Y=0)$) is the log of odds. As you can see, the WoE encodes the categories\
    \ in the same scale, that is, the log of odds, as the outcome of the logistic\
    \ regression. Therefore, by using WoE, the predictors are prepared and coded in\
    \ the same scale, and the parameters in the logistic regression, that is, the\
    \ coefficients, can be directly compared.\n\nIn this recipe, we will perform WoE\
