    \ ['A3', 'A8', 'A9', 'A10']:\n    data.loc[values, var] = np.nan\n```\n\nWith\
    \ `random.randint()`, we extracted random digits between 0 and the number of observations\
    \ in the dataset, which is given by `len(data)`, and used these digits as the\
    \ indices of the dataframe where we introduce the NumPy NaN values.\n\n> Setting\
