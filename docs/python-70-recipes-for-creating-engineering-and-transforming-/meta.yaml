  md: "You can check the size of the returned datasets using pandas' shape:\n`X_train.shape`,\
    \ `X_test.shape`.\n\n4. Let's check the percentage of missing values in the train\
    \ set:\n\n`X_train.isnull().mean()`\n\nThe following output shows the percentage\
    \ of missing values for each variable:\n\n```\nA1     0.008282\nA2     0.022774\n\
    A3     0.140787\nA4     0.008282\nA5     0.008282\nA6     0.008282\nA7     0.008282\n\
    A8     0.140787\nA9     0.140787\nA10    0.140787\nA11    0.000000\nA12    0.000000\n\
    A13    0.000000\nA14    0.014493\nA15    0.000000\ndtype: float64\n```\n\n5. Let's\
    \ replace the missing values with the median in five numerical variables using\
    \ `pandas`:\n\n```\nfor var in ['A2', 'A3', 'A8', 'A11', 'A15']:\n    value =\
    \ X_train[var].median()\n    X_train[var] = X_train[var].fillna(value)\n    X_test[var]\
    \ = X_test[var].fillna(value)\n```\n\nNote how we calculate the median using the\
    \ train set and then use this value to replace the missing data in the train and\
    \ test sets.\n\nTo impute missing data with the mean, we use `pandas' mean()`:\
    \ `value = X_train[var].mean()`.\n\nIf you run the code in *step 4* after imputation,\
    \ the percentage of missing values for the `A2`, `A3`, `A8`, `A11`, and `A15`\
    \ variables should be 0."
