    # How it works...


    In this recipe, we grouped infrequent categories using pandas and Feature-engine.


    We first loaded the dataset and divided it into train and test sets. Next, we
    determined the percentage of observations per category of the A7 variable. With
    pandas'' `value_counts()` method, we counted the observations per category of
    A7 and then divided these values by the total number of observations, determined
    using Python''s built-in `len` method, to obtain the percentage of observations
    per category.


    Next, we created a function that took as arguments a dataframe, a categorical
    variable, and a tolerance, which is the minimum frequency for a category **not**
    to be considered rare. In the function, we used pandas'' `value_counts()` method
    and Python''s `len()` function to create a pandas Series with the categories in
    the index and the frequency of observations as values. Next, with a list comprehension
    over the preceding pandas Series, we captured the categories with a frequency
    higher than the indicated tolerance. In the list comprehension, we first sliced
    the Series selecting only the categories above the indicated tolerance with pandas''
    `loc` method, and next, using pandas'' `index`, we retained the category names
    in a list.


    With the preceding function, we captured the frequent categories of A7 in a list
    and then, using NumPy''s `where()` method, we searched each row of A7, and if
    the observation was one of the frequent categories in the list, which we checked
    using pandas'' `isin()` method, it was kept; otherwise, its original value was
    replaced with ''Rare''.


    We automated the preceding steps for multiple categorical variables using Feature-engine.
    To do this, we called Feature-engine''s `RareLabelCategoricalEncoder()` categorical
    encoder, and indicated first the minimum frequency to retain a category by setting
    `tol` to 0.05, and second, that we only wanted to group rare labels if the variable
    had at least four different categories by setting `n_categories` to 4. With the
    `fit()` method, the transformer identified the categorical variables and then
    it learned and stored the frequent categories per variable. With the `transform()`
    method, we replaced categories not present in those lists with the string, Rare.'
