  md: "# How to do it...\n\nTo complete this recipe, we need to import the necessary\
    \ tools and load the data:\n\n+   1. Let's import pandas, the `train_test_split`\
    \ function from scikit-learn, and the `EndTailImputer` function from Feature-engine:\n\
    \n```\nimport pandas as pd\nfrom sklearn.model_selection import train_test_split\n\
    from feature_engine.missing_data_imputers import EndTailImputer\n```\n\n+   2.\
    \ Let's load the dataset:\n\n```\ndata = pd.read_csv('creditApprovalUCI.csv')\n\
    ```\n\nThe values at the end of the distribution should be calculated from the\
