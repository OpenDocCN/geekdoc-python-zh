  md: "The pandas' `fillna()` returns a new dataset with imputed values by default.\
    \ We can set the `inplace` argument to `True` to replace missing data in the original\
    \ dataframe: `X_train[var].fillna(inplace=True)`.\n\nNow, let's impute missing\
    \ values by the median using scikit-learn so that we can store learned parameters.\n\
    \n6. To do this, let's separate the original dataset into train and test sets,\
    \ keeping only the numerical variables:\n\n```\nX_train, X_test, y_train, y_test\
    \ = train_test_split(\n    data[['A2', 'A3', 'A8', 'A11', 'A15']], data['A16'],\n\
    \    test_size=0.3, random_state=0)\n```\n\n`SimpleImputer()` from scikit-learn\
    \ will impute **all** variables in the dataset. Therefore, if we use mean or median\
    \ imputation and the dataset contains categorical variables, we will get an error.\n\
    \n7. Let's create a median imputation transformer using `SimpleImputer()` from\
    \ scikit-learn:\n\n```\nimputer = SimpleImputer(strategy='median')\n```\n\nTo\
    \ perform mean imputation, we should set the `strategy` to `mean`: `imputer =\
    \ SimpleImputer(strategy = 'mean')`.\n\n8. Let's fit the `SimpleImputer()` to\
    \ the train set so that it learns the median values of the variables:\n\n```\n\
    imputer.fit(X_train)\n```\n\n9. Let's inspect the learned median values:\n\n```\n\
    imputer.statistics_\n```\n\nThe imputer stores median values in the `statistics_`\
