  md: "# Performing mean or median imputation\n\nMean or median imputation consists\
    \ of replacing missing values with the variable mean or median. This can only\
    \ be performed in numerical variables. The mean or the median is calculated using\
    \ a train set, and these values are used to impute missing data in train and test\
    \ sets, as well as in future data we intend to score with the machine learning\
    \ model. Therefore, we need to store these mean and median values. Scikit-learn\
    \ and Feature-engine transformers learn the parameters from the train set and\
    \ store these parameters for future use. So, in this recipe, we will learn how\
    \ to perform mean or median imputation using the scikit-learn and Feature-engine\
    \ libraries and pandas for comparison.\n\n> Use mean imputation if variables are\
    \ normally distributed and median imputation otherwise. Mean and median imputation\
    \ may distort the distribution of the original variables if there is a high percentage\
    \ of missing data.\n\n# How to do it...\n\nLet's begin this recipe:\n\n+   1.\
    \ First, we'll import pandas and the required functions and classes from scikit-learn\
    \ and Feature-engine:\n\n    python\n    import pandas as pd\n    from sklearn.model_selection\
    \ import train_test_split\n    from sklearn.impute import SimpleImputer\n    from\
    \ feature_engine.missing_data_imputers import MeanMedianImputer\n    \n\n2. Let's\
    \ load the dataset:\n\n    python\n    data = pd.read_csv('creditApprovalUCI.csv')\n\
    \    \n\n3. In mean and median imputation, the mean or median values should be\
    \ calculated using the variables in the train set; therefore, let's separate the\
    \ data into train and test sets and their respective targets:\n\n    python\n\
    \    X_train, X_test, y_train, y_test = train_test_split(\n        data.drop('A16',\
    \ axis=1), data['A16'], test_size=0.3,\n        random_state=0)"
  merge: -1
