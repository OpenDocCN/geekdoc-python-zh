    \ data**. When trying the recipes in your own dataset, make sure you impute the\
    \ missing values with any of the techniques we covered in Chapter 2, Imputing\
    \ Missing Data.\n\n# Transforming variables with the logarithm\n\nThe logarithm\
    \ function is commonly used to transform variables. It has a strong effect on\
