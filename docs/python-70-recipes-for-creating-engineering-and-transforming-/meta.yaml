  md: "# Sorting the variable values in intervals of equal frequency\n\nEqual-frequency\
    \ discretization divides the values of the variable into intervals that carry\
    \ the same proportion of observations. The interval width is determined by quantiles,\
    \ and therefore different intervals may have different widths. In summary, equal-frequency\
    \ discretization using quantiles consists of dividing the continuous variable\
    \ into $N$ quantiles, with $N$ to be defined by the user. This discretization\
    \ technique is particularly useful for skewed variables as it spreads the observations\
    \ over the different bins equally. In this recipe, we will perform equal-frequency\
    \ discretization using pandas, scikit-learn, and Feature-engine.\n\n# How to do\
    \ it...\n\nLet's first import the necessary Python libraries and get the dataset\
    \ ready:\n\n+   1. Import the required Python libraries and classes:\n\npython\n\
