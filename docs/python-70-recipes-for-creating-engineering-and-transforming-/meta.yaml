  md: '# How it works...


    In this recipe, we performed a one-hot encoding of categorical variables using
    pandas and scikit-learn.


    We loaded the dataset and separated it into train and test sets using scikit-learn''s
    `train_test_split()` function. Next, we used pandas'' `get_dummies()` function
    on the A4 variable, setting `drop_first=True` to drop the first binary variable
    and hence obtain *k-1* binary variables. Next, we used `get_dummies()` on all
    of the categorical variables of the dataset, which returned a dataframe with binary
    variables representing the categories of the different features.


    > One-hot encoding expands the feature space. We created, from 9 original categorical
    variables, 36 binary ones.


    Finally, we performed one-hot encoding using `OneHotEncoder()` from scikit-learn,
    setting the `categories=''auto''` argument so that the transformer learns the
    categories to encode from the train set; `drop=''first''` so that the transformer
    drops the first binary variable, returning *k-1* binary features per categorical
    variable; and `sparse=False` so that the transformer returns a NumPy array (the
    default is to return a sparse matrix). With the `fit()` method, `OneHotEncoder()`
    learned the categories to encode from the train set and with the `transform()`
    method, it returned the binary variables in a NumPy array.


    The beauty of pandas'' `get_dummies()` function is that it returns feature names
    that clearly indicate which variable and which category each feature represents.
    On the downside, `get_dummies()` does not persist the information learned from
    the train set to the test set. Contrarily, scikit-learn''s `OneHotEncoder()` function
    can persist the information from the train set, but it returns a NumPy array,
    where the information about the meaning of the features is lost.


    > Scikit-learn''s `OneHotEncoder()` function will create binary indicators from
    all variables in the dataset, so be mindful not to pass numerical variables when
    fitting or transforming your datasets.'
