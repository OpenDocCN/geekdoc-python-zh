    \ is: \" << length << \"\\n\";\n}\n```\n\nSTEP 9 Using the available operations\
    \ that come with the string function, you can manipulate the contents of a string.\
    \ For example, to remove characters from a string you could use:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\n\nint main ()\n{\n    string strg (\"Here\
    \ is a long sentence in a string.\");\n    cout << strg << '\\n';\n\n    strg.erase\
    \ (10,5);\n    cout << strg << '\\n';\n\n    strg.erase (strg.begin()+8);\n  \
    \  cout << strg << '\\n';\n\n    strg.erase (strg.begin()+9, strg.end()-9);\n\
    \    cout << strg << '\\n';\n}\n```\n\nSTEP 10 It's worth spending some time playing\
    \ around with the numbers, which are the character positions in the string. Occasionally,\
    \ it can be hit and miss whether you get it right, so practice makes perfect.\
    \ Take a look at the screenshot to see the result of the code.\n\n![](img/588364e02a77f179099fae91a1713f0a_72_3.png)"
  - "[PAGE 73]\n\n# C++ Maths\n\nProgramming is mathematical in nature and as you\
    \ might expect, there’s plenty of built-in scope for some quite intense maths.\
    \ C++ has a lot to offer someone who’s implementing mathematical models into their\
    \ code. It can be extremely complex or relatively simple.\n\n# C++ = MC²\n\nThe\
    \ basic mathematical symbols apply in C++ as they do in most other programming\
    \ languages. However, by using the C++ Math Library, you can also calculate square\
    \ roots, powers, trig and more.\n\nSTEP 1 C++’s mathematical operations follow\
    \ the same patterns as those taught in school, in that multiplication and division\
    \ take precedence over addition and subtraction. You can alter that though. For\
    \ now, create a new file and enter:\n\n```\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n    float numbers = 100;\n\n    numbers = numbers +\
    \ 10; // This adds 10 to the initial 100\n\n    cout << numbers << \"\\n\";\n\n\
    \    numbers = numbers - 10; // This subtracts 10 from the new 110\n\n    cout\
    \ << numbers << \"\\n\";\n}\n```\n\nSTEP 3 Multiplication and division can be\
    \ applied as such:\n\n```\n#include <iostream>\nusing namespace std;\n\nint main\
    \ ()\n{\n    float numbers = 100;\n\n    numbers = numbers * 10; // This multiplies\
    \ 100 by 10\n\n    cout << numbers << \"\\n\";\n\n    numbers = numbers / 10;\
    \ // And this divides 1000 by 10\n\n    cout << numbers << \"\\n\";\n}\n```\n\n\
    ![](img/588364e02a77f179099fae91a1713f0a_73_0.png)\n\n![](img/588364e02a77f179099fae91a1713f0a_73_1.png)\n\
    \nSTEP 2 While simple, it does get the old maths muscle warmed up. Note that we\
    \ used a float for the numbers variable. While you can happily use an integer,\
    \ if you suddenly started to use decimals, you would need to change to a float\
    \ or a double, depending on the accuracy needed. Run the code and see the results.\n\
    \nSTEP 4 Again, execute the simple code and see the results. While not particularly\
    \ interesting, it’s a start into C++ maths. We used a float here, so you can play\
    \ around with the code and multiply by decimal places, as well as divide, add\
    \ and subtract.\n\n![](img/588364e02a77f179099fae91a1713f0a_73_2.png)\n\n![](img/588364e02a77f179099fae91a1713f0a_73_3.png)"
  - "[PAGE 74]\n\n# C++ Maths\n\nSTEP 5 The interesting maths content comes when you\
    \ call upon the C++ Math Library. Within this header are dozens of mathematical\
    \ functions along with further operations. Everything from computing cosine to\
    \ arc tangent with two parameters, to the value of PI. You can call the header\
    \ with:\n\n```\n#include <iostream>\n#include <cmath>\nusing namespace std;\n\n\
    int main ()\n{\n}\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_74_0.png)\n\
    \nSTEP 8 Calculating powers of numbers can be done with:\n\n```\n#include <iostream>\n\
    #include <cmath>\nusing namespace std;\n\nint main ()\n{\n    float number = 12;\n\
    \n    cout << number << \" to the power of 2 is \" << pow(number, 2) << \"\\n\"\
    ;\n    cout << number << \" to the power of 3 is \" << pow(number, 3) << \"\\\
    n\";\n    cout << number << \" to the power of .08 is \" << pow(number, 0.8) <<\
    \ \"\\n\";\n}\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_74_1.png)\n\nSTEP\
    \ 6 Start by getting the square root of a number:\n\n```\n#include <iostream>\n\
    #include <cmath>\nusing namespace std;\n\nint main ()\n{\n    float number = 134;\n\
    \n    cout << \"The square root of \" << number << \" is: \" << sqrt(number) <<\
    \ \"\\n\";\n}\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_74_2.png)\n\nSTEP\
    \ 9 Here we created a float called number with the value of 12, and the pow(variable,\
    \ power) is where the calculation happens. Of course, you can calculate powers\
    \ and square roots without using variables. For example, pow(12, 2) outputs the\
    \ same value as the first cout line in the code.\n\n![](img/588364e02a77f179099fae91a1713f0a_74_3.png)\n\
    \nSTEP 7 Here we created a new float called number and used the sqrt(number) function\
    \ to display the square root of 134, the value of the variable, number. Build\
    \ and run the code, and your answer reads 11.5758.\n\n![](img/588364e02a77f179099fae91a1713f0a_74_4.png)\n\
    \nSTEP 10 The value of Pi is also stored in the cmath header library. It can be\
    \ called up with the M_PI function. Enter cout << M_PI; into the code and you\
    \ get 3.14159; or you can use it to calculate:\n\n```\n#include <iostream>\n#include\
    \ <cmath>\nusing namespace std;\n\nint main ()\n{\n    double area, radius = 1.5;\n\
    \n    area = M_PI * radius * radius;\n\n    cout << area << \"\\n\";\n}\n```\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_74_5.png)"
