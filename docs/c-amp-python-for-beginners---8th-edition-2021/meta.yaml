    ![](img/588364e02a77f179099fae91a1713f0a_54_4.png)


    **STEP 8** Before you can execute the C++ file you need to compile it. In Linux
    it''s common to use g++, an open source C++ compiler; as you''re now in the same
    folder as the C++ file, enter: **g++ helloworld.cpp** in the Terminal and press
    Return.


    ![](img/588364e02a77f179099fae91a1713f0a_54_1.png)


    **STEP 9** It takes a short time while the code is compiled by g++ but providing
    there are no mistakes or errors in the code you are returned to the command prompt.
    The compiling of the code has created a new file. If you enter: ls into the Terminal
    you can see that alongside your C++ file is a.out.


    ![](img/588364e02a77f179099fae91a1713f0a_54_3.png)


    **STEP 10** The a.out file is the compiled C++ code. To run the code enter: **./a.out**
    and press Return. The words ''Hello World!'' appear on the screen. However, a.out
    isn''t very friendly. To name it something else post-compiling, you can recompile
    with: **g++ helloworld.cpp -o helloworld**. This creates an output file called
    helloworld which can be run with: **./helloworld**.


    ![](img/588364e02a77f179099fae91a1713f0a_54_5.png)


    ## Other C++ IDEs to Install


    If you want to try a different approach to working with your C++ code, then there
    are plenty of options available to you. Windows is the most prolific platform
    for C++ IDEs but there are plenty for Mac and Linux users too.


    ### DEVELOPING C++


    Here are ten great C++ IDEs that are worth looking into. You can install one or
    all of them if you like, but find the one that works best for you.


    **ECLIPSE** Eclipse is a hugely popular C++ IDE that offers the programmer a wealth
    of features. It has a great, clean interface, is easy to use and available for
    Windows, Linux and Mac. Head over to **www.eclipse.org/downloads/** to download
    the latest version. If you''re stuck, click the Need Help link for more information.


    **CODELITE** CodeLite is a free and open source IDE that''s regularly updated
    and available for Windows, Linux and macOS. It''s lightweight, uncomplicated and
    extremely powerful. You can find out more information as well as how to download
    and install it at **www.codelite.org/**.


    ![](img/588364e02a77f179099fae91a1713f0a_55_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_55_1.png)


    **GNAT** The GNAT Programming Studio (GPS) is a powerful and intuitive IDE that
    supports testing, debugging and code analysis. The Community Edition is free,
    whereas the Pro version costs; however, the Community Edition is available for
    Windows, Mac, Linux and even the Raspberry Pi. You can find it at **www.adacore.com/download**.


    **NETBEANS** Another popular choice is NetBeans. This is another excellent IDE
    that''s packed with features and a pleasure to use. NetBeans IDE includes project
    based templates for C++ that give you the ability to build applications with dynamic
    and static libraries. Find out more at **www.netbeans.org/features/cpp/index.html**.


    ![](img/588364e02a77f179099fae91a1713f0a_55_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_55_3.png)


    **VISUAL STUDIO** Microsoft''s Visual Studio is a mammoth C++ IDE that allows
    you to create applications for Windows, Android, iOS and the web. The Community
    version is free to download and install but the other versions allow a free trial
    period. Go to www.visualstudio.com/ to see what it can do for you.


    **ANJUTA** The Anjuta DevStudio is a Linux-only IDE that features some of the
    more advanced features you would normally find in a paid software development
    studio. There''s a GUI designer, source editor, app wizard, interactive debugger
    and much more. Go to www.anjuta.org/ for more information.


    ![](img/588364e02a77f179099fae91a1713f0a_56_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_56_1.png)


    **QT CREATOR** This cross-platform IDE is designed to create C++ applications
    for desktop and mobile environments. It comes with a code editor and integrated
    tools for testing and debugging, as well as deploying to you chosen platform.
    It''s not free but there is a trial period on offer before requiring purchasing:
    www.qt.io/qt-features-libraries-apis-tools-and-ide/.


    **MONODEVELOP** This excellent IDE allows developers to write C++ code for desktop
    and web applications across all the major platforms. There''s an advanced text
    editor, integrated debugger and a configurable workbench to help you create your
    code. It''s available for Windows, Mac and Linux and is free to download and use:
    www.monodevelop.com/.


    ![](img/588364e02a77f179099fae91a1713f0a_56_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_56_3.png)


    **DEV C++** Bloodshed Dev C++, despite its colourful name, is an older IDE that
    is for Windows systems only. However, many users praise its clean interface and
    uncomplicated way of coding and compiling. Although there''s not been much updating
    for some time, it''s certainly one to consider if you want something different:
    www.bloodshed.net/devcpp.html.


    **U++** Ultimate++ is a cross-platform C++ IDE that boats a rapid development
    of code through the smart and aggressive use of C++. For the novice, it''s a beast
    of an IDE but behind its complexity is a beauty that would make a developer''s
    knees go wobbly. Find out more at www.ultimatepp.org/index.html.


    ![](img/588364e02a77f179099fae91a1713f0a_56_4.png)


    ![](img/588364e02a77f179099fae91a1713f0a_56_5.png)


    ![](img/588364e02a77f179099fae91a1713f0a_57_0.png)


    ## C++ Fundamentals


    Within this section you can begin to understand the structure of C++ code and
    how to compile and execute that code. These are the fundamentals of C++, which
    teach you the basics such as using comments, variables, data types, strings and
    how to use C++ mathematics.


    These are the building blocks of a C++ program. With them, you can form your own
    code, produce an output to the screen and store and retrieve data.


    ## Your First C++ Program


    You may have followed the Mac and Linux examples previously but you’re going to
    be working exclusively in Windows and Code::Blocks from here on. Let’s begin by
    writing your first C++ program and taking the first small step into a larger coding
    world.


    ### HELLO, WORLD!


    It’s traditional in programming for the first code to be entered to output the
    words ‘Hello, World!’ to the screen. Interestingly, this dates back to 1968 using
    a language called BCPL.


    **STEP 1** As mentioned, we’re using Windows 10 and the latest version of Code::Blocks
    for the rest of the C++ code in this book. Begin by launching Code::Blocks. When
    open, click on File > New > Empty File or press Ctrl+Shift+N on the keyboard.


    **STEP 2** Now you can see a blank screen, with the tab labelled *Untitled1, and
    the number one in the top left of the main Code::Blocks window. Begin by clicking
    in the main window, so the cursor is next to the number one, and entering:

    `#include <iostream>`


    **STEP 3** At the moment it doesn’t look like much, and it makes even less sense,
    but we’ll get to that in due course. Now click on File > Save File As. Create
    or find a suitable location on your hard drive and in the File Name box, call
    it helloworld.cpp. Click the Save as type box and select C/C++ files. Click the
    Save button.


    ![](img/588364e02a77f179099fae91a1713f0a_59_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_59_1.png)


    **STEP 4** You can see that Code::Blocks has now changed the colour coding, recognising
    that the file is now C++ code. This means that code can be auto-selected from
    the Code::Blocks repository. Delete the #include <iostream> line and re-enter
    it. You can see the auto-select boxes appearing.


    ![](img/588364e02a77f179099fae91a1713f0a_59_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_59_3.png)'
