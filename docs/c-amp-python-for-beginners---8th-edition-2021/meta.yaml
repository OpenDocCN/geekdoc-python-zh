    this book, unless otherwise stated.


    ![](img/588364e02a77f179099fae91a1713f0a_26_2.png)


    STEP 9 If you click the OK button, the file will be overwritten with the new code
    entries, and executed, with the output in the Shell. It''s not a problem with
    just these few lines but if you were to edit a larger file, overwriting can become
    an issue. Instead, use File > Save As from within the Editor to create a backup.


    ![](img/588364e02a77f179099fae91a1713f0a_26_3.png)


    STEP 7 If you open the file location of the saved Python code, you can see that
    it ends in a .py extension. This is the default Python file name. Any code you
    create will be whatever.py and any code downloaded from the many Internet Python
    resource sites will be .py. Just ensure that the code is written for Python 3.


    ![](img/588364e02a77f179099fae91a1713f0a_26_4.png)


    STEP 10 Now create a new file. Close the Editor, and open a new instance (File
    > New File from the Shell). Enter the following and save it as hello.py:


    ```

    a="Python"

    b="is"

    c="cool!"

    print(a, b, c)

    ```


    You will use this code in the next tutorial.


    ![](img/588364e02a77f179099fae91a1713f0a_26_5.png)


    ## Executing Code from the Command Line


    Although we’re working from the GUI IDLE throughout this book, it’s worth taking
    a look at Python’s command line handling. We already know there’s a command line
    version of Python but it’s also used to execute code.


    ### COMMAND THE CODE


    Using the code we created in the previous tutorial, the one we named hello.py,
    let’s see how you can run code that was made in the GUI at the command line level.


    **STEP 1** Python, in Linux, comes with two possible ways of executing code via
    the command line. One of the ways is with Python 2, whilst the other uses the
    Python 3 libraries and so on. First though, drop into the command line or Terminal
    on your operating system.


    **STEP 3** Now you’re at the command line we can start Python. For Python 3 you
    need to enter the command `python3` and press Enter. This will put you into the
    command line version of the Shell, with the familiar three right-facing arrows
    as the cursor (>>>).


    ![](img/588364e02a77f179099fae91a1713f0a_27_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_27_1.png)


    **STEP 2** Just as before, we’re using a Raspberry Pi; Windows users will need
    to click the Start button and search for CMD, then click the Command Line returned
    search; and macOS users can get access to their command line by clicking Go >
    Utilities > Terminal.


    ![](img/588364e02a77f179099fae91a1713f0a_27_2.png)


    **STEP 4** From here you’re able to enter the code you’ve looked at previously,
    such as:


    ```

    python

    a=2

    print(a)

    ```


    You can see that it works exactly the same.


    ![](img/588364e02a77f179099fae91a1713f0a_27_3.png)


    STEP 5 Now enter: exit() to leave the command line Python session and return you
    back to the command prompt. Enter the folder where you saved the code from the
    previous tutorial and list the available files within; hopefully you should see
    the hello.py file.


    ![](img/588364e02a77f179099fae91a1713f0a_28_0.png)


    STEP 8 The result of running Python 3 code from the Python 2 command line is quite
    obvious. Whilst it doesn''t error out in any way, due to the differences between
    the way Python 3 handles the Print command over Python 2, the result isn''t as
    we expected. Using Sublime for the moment, open the hello.py file.


    ![](img/588364e02a77f179099fae91a1713f0a_28_1.png)


    STEP 6 From within the same folder as the code you''re going to run, enter the
    following into the command line:


