- md: '## How to Set Up C++ in Windows


    Windows users have a wealth of choice when it comes to programming in C++. There
    are plenty of IDEs and compilers available, including Visual Studio from Microsoft.
    However, in our opinion, the best C++ IDE to begin with is Code::Blocks.


    ### CODE::BLOCKS


    Code::Blocks is a free C++, C and Fortran IDE that''s feature rich and easily
    extendible with plug-ins. It''s easy to use, comes with a compiler and has a vibrant
    community behind it.


    **STEP 1** Start by visiting the Code::Blocks download site, at www.codeblocks.org/downloads.
    From there, click on the ''Download the binary releases'' link to be taken to
    the latest downloadable version for Windows.


    **STEP 2** You can see that there are several Windows versions available. The
    one you want to download has ''mingw-setup.exe'' at the end of the current version
    number. At the time of writing this is: codeblocks-17.12mingw-setup.exe. The difference
    is that the mingw-setup version includes a C++ compiler and debugger from TDM-GCC
    (a compiler suite).


    **STEP 3** When you''ve located the file, click on the Sourceforge.net link at
    the end of the line and a download notification window appears; click on Save
    File to start the download and save the executable to your PC. Locate the downloaded
    Code::Blocks installer and double-click to start. Follow the on-screen instructions
    to begin the installation.


    **STEP 4** Once you''ve agreed to the licencing terms, there is a choice of installation
    options available. You can opt for a smaller install, missing out on some of the
    components but we would recommend you opt for the Full option as default.


    **STEP 5** Next choose an install location for the Code::Blocks files. It''s your
    choice, but the default will generally suffice, unless of course you have any
    special requirements. When you click Next, the install begins; when it''s finished
    a notification pops up asking you if you want to start Code::Blocks now, so click
    Yes.


    **STEP 6** The first time Code::Blocks loads it runs an auto-detect for any C++
    compilers you may already have installed on your system. If you don''t have any,
    click on the first detected option, GNU GCC Compiler, and click the Default button
    to set it as the system''s C++ compiler. Click OK when you''re ready to continue.


    **STEP 7** When the program starts another message appears, informing you that
    Code::Blocks is currently not the default application for C++ files. You have
    a couple of options: to leave everything as it is or allow Code::Blocks to associate
    all C++ file types. Again, we would recommend you opt for the last choice to associate
    Code::Blocks with every supported file type.


    **STEP 8** Before you start using Code::Blocks it''s worth explaining exactly
    why you need the added compiler. First, a compiler is a separate program that
    reads through your C++ code and checks it against the latest acceptable programming
    standards; this is why you need the most recently available compiler. This is
    currently C++17, with C++20 underway.


    **STEP 9** Essentially, computers work and understand only binary, ones and zeros,
    or Machine Language. Programming in binary isn''t effective for human beings.
    For example, to output the words "Hello World!" to the screen in C++ would appear
    in binary as:


    ```

    01100011 01101111 01110101 01110100 00100000

    00111100 00111100 00100000 00100010 01001000

    01100101 01101100 01101100 01101111 00100000

    01010111 01101111 01110010 01101100 01100100

    00100001 00100010 00111011

    ```


    **STEP 10** The compiler therefore takes what you''ve entered as C++ code and
    translates that to Machine Language. To execute C++ code the IDE ''builds'' the
    code, checking for errors, then passes it through the compiler to check standardisation
    and convert it to ones and zeros for the computer to act upon. It''s rather clever
    stuff, when you stop to think about it.


    ## How to Set Up C++ on a Mac


    To begin C++ coding on a Mac you first need to install Apple’s Xcode. This is
    a free, full featured IDE that’s designed to create native Apple apps. However,
    you can also use it to create C++ code relatively easily.


    ### XCODE


    Apple’s Xcode is primarily designed for users to develop apps for macOS, iOS,
    tvOS and watchOS applications in Swift or Objective-C but you can use it for C++
    too.


    **STEP 1** Start by opening the App Store on your Mac, Apple Menu > App Store.
    In the Search box enter ‘Xcode’ and press Return. There are many suggestions filling
    the App Store window but it’s the first option, Xcode, that you need to click
    on.


    **STEP 2** Take a moment to browse through the app’s information, including the
    compatibility, to ensure you have the correct version of macOS. Xcode requires
    macOS 10.12.6 or later to install and work.


    **STEP 3** When you’re ready, click on the Get button which then turns into Install
    App. Enter your Apple ID and Xcode begins to download and install. It may take
    some time depending on the speed of your Internet connection.


    **STEP 4** When the installation is complete, click on the Open button to launch
    Xcode. Click Agree to the licence terms and enter your password to allow Xcode
    to make changes to the system. When that is done, Xcode begins to install additional
    components.


    **STEP 5** With everything now installed, including the additional components,
    Xcode launches, displaying the version number along with three choices and any
    recent projects that you’ve worked on; with a fresh install though, this is blank.


    **STEP 6** Start by clicking on Create New Xcode Project; this opens a template
    window to choose which platform you’re developing code for. Click the macOS tab,
    then click the Command Line Tool option. Click Next to continue.


    **STEP 7** Fill in the various fields but ensure that the Language option at the
    bottom is set to C++; simply choose it from the drop-down list. When you’ve filled
    in the Fields, and made sure that C++ is the chosen language, click on the Next
    button to continue.


    **STEP 8** The next step asks where to create a Git Repository for all your future
    code. Choose a location on your Mac, or a network location, and click the Create
    button. When you’ve done all that, you can start to code. The left-hand pane details
    the files used in the C++ program you’re coding. Click on the main.cpp file in
    the list.


    **STEP 9** You can see that Xcode has automatically completed a basic Hello World
    program for you. While it may not make much sense at present, you will discover
    more as you progress, the content is just Xcode utilising what’s available on
    the Mac.


    **STEP 10** When you want to run the code, click on Product > Run. You may be
    asked to enable Developer Mode on the Mac; this is to authorise Xcode to perform
    functions without needing your password every session. When the program executes,
    the output is displayed at the bottom of the Xcode window.


    ## How to Set Up C++ in Linux


    Linux is a great C++ coding environment. Most Linux distros already have the essential
    components preinstalled, such as a compiler and the text editors are excellent
    for entering code into, including colour coding; and there’s tons of extra software
    available to help you out.


    ### LINUX++


    If you’re not familiar with Linux, then we recommend taking a look at one of our
    Linux titles from the BDM Publications range. If you have a Raspberry Pi, the
    commands used below work just fine and for this example we’re using Linux Mint.


    **STEP 1** The first step is to ensure Linux is ready for your C++ code, so check
    the system and software are up to date. Open a Terminal and enter: **sudo apt-get
    update && sudo apt-get upgrade**. Then press Return and enter your password. These
    commands update the entire system and any installed software.


    **STEP 2** Most Linux distros come preinstalled with all the necessary components
    to start coding in C++; however, it’s always worth checking to see if everything
    is present. Still within the Terminal, enter: **sudo apt-get install build-essential**
    and press Return. If you have the right components nothing is installed; if you’re
    missing some then they are installed by the command.


    **STEP 3** Amazingly, that’s it. Everything is already for you to start coding.
    Here’s how to get your first C++ program up and running. In Linux Mint the main
    text editor is Xed, which you can launch by clicking on the Menu and typing Xed
    into the search bar. Click on the Text Editor button in the right-hand pane to
    open it.


    **STEP 4** In Xed, or any other text editor you may be using, enter the lines
    of code that make up your C++ Hello World program. It’s a little different to
    what the Mac produced:


    ```

    #include <iostream>

    int main()

    {

    //My first C++ program

    std::cout << "Hello World!\n";

    }

    ```'
