  md: "# Why C++?\n\nC++ is one of the most popular programming languages available\
    \ today. Originally called C with Classes, the language was renamed C++ in 1983.\
    \ It’s an extension of the original C language and is a general purpose object-oriented\
    \ (OOP) environment.\n\n# C EVERYTHING\n\nDue to how complex the language can\
    \ be, and its power and performance, C++ is often used to develop games, programs,\
    \ device drivers and even entire operating systems.\n\nDating back to 1979, the\
    \ start of the golden era of home computing, C++, or rather C with Classes, was\
    \ the brainchild of Danish computer scientist Bjarne Stroustrup while working\
    \ on his PhD thesis. Stroustrup’s plan was to further the original C language,\
    \ which was widely used since the early seventies.\n\ncomputing labs and by regular\
    \ people who didn’t have access to the mainframes and large computing data centres.\n\
    \nC++’s impact in the digital world is immense. Many of the programs, applications,\
    \ games and even operating systems are coded using C++. For example, all of Adobe’s\
    \ major applications, such as Photoshop, InDesign and so on, are developed in\
    \ C++. You will find that the browser you surf the Internet with is written in\
    \ C++, as well as Windows 10, Microsoft Office and the backbone to Google’s search\
    \ engine. Apple’s macOS is written largely in C++ (with some\n\nC++ proved to\
    \ be popular among the developers of the ’80s, since it was a much easier environment\
    \ to get to grips with and more importantly, it was 99% compatible with the original\
    \ C language. This meant that it could be used beyond the mainstream\n\nC++ code\
    \ is much faster than that of Python.\n\n```\n#include<iostream>\nusing namespace\
    \ std;\nvoid main()\n{\n    char ch;\n    cout<<\"Enter a charater to check it\
    \ is vowel or not\";\n    cin>>ch;\n    switch(ch)\n    {\n        case 'a': case\
    \ 'A':\n            cout<<ch<<\" is a Vowel\";\n            break;\n        case\
    \ 'e': case 'E':\n            cout<<ch<<\" is a Vowel\";\n            break;\n\
    \        case 'i': case 'I':\n            cout<<ch<<\" is a Vowel\";\n       \
    \     break;\n        case 'o': case 'O':\n            cout<<ch<<\" is a Vowel\"\
    ;\n            break;\n        case 'u': case 'U':\n            cout<<ch<<\" is\
    \ a Vowel\";\n            break;\n    }\n}\n```"
