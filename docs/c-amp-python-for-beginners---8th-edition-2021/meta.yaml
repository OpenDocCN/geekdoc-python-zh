    \nThen, from the C++ 2011 standard, using curly brackets:\n\n```\nint result {a+b};\n\
    ```\n\n![](img/588364e02a77f179099fae91a1713f0a_68_1.png)\n\nSTEP 7 You can create\
    \ global variables, which are variables that are declared outside any function\
    \ and used in any function within the entire code. What you've used so far are\
    \ local variables: variables used inside the function. For example:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\nint StartLives = 3;\n\nint main ()\n{\n  \
    \  startLives = StartLives - 1;\n    cout << StartLives;\n}\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_68_2.png)\n\
