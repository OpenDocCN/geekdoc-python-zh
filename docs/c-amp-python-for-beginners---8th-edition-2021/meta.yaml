    \n![](img/588364e02a77f179099fae91a1713f0a_70_0.png)\n\nTo be honest, if you're\
    \ creating code that needs to be accurate to more than fifteen decimal places,\
    \ then you wouldn't be using C++, you would use some scientific specific language\
    \ with C++ as the connective tissue between the two languages.\n\nYou can create\
    \ your own data types, using an alias-like system called typedef. For example:\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_70_1.png)\n\n![](img/588364e02a77f179099fae91a1713f0a_70_2.png)\n\
    \nAgain, build and run the code; as you can see from the command line window,\
    \ the number represented by the variable PI is different to the number you've\
    \ told C++ to use in the variable. The output reads the value of PI as 3.141592653589793115998,\
    \ with the numbers going awry from the fifteenth decimal place.\n\n![](img/588364e02a77f179099fae91a1713f0a_70_3.png)\n\
    \n```\n#include <iostream>\nusing namespace std;\ntypedef int metres;\n\nint main()\n\
    {\n    metres distance;\n    distance = 15;\n    cout << \"distance in metres\
    \ is: \" << distance;\n}\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_70_4.png)\n\
    \nThis code when executed creates a new int data type called metres. Then, in\
    \ the main code block, there's a new variable called distance, which is an integer;\
    \ so you're basically telling the compiler that there's another name for int.\
    \ We assigned the value 15 to distance and displayed the output: distance in metres\
    \ is 15.\n\nIt might sound a little confusing to begin with but the more you use\
    \ C++ and create your own code, the easier it becomes."
- md: "## Strings\n\nStrings are objects that represent and hold sequences of characters.\
    \ For example, you could have a universal greeting in your code ‘Welcome’ and\
    \ assign that as a string to be called up wherever you like in the program.\n\n\
    ### STRING THEORY\n\nThere are different ways in which you can create a string\
    \ of characters, which historically are all carried over from the original C language,\
    \ and are still supported by C++.\n\n**STEP 1** To create a string you use the\
    \ char function. Open a new C++ file and begin with the usual header:\n\n```cpp\n\
    #include <iostream>\nusing namespace std;\n\nint main ()\n{\n}\n```\n\n**STEP\
    \ 2** It’s easy to confuse a string with an array. Here’s an array, which can\
    \ be terminated with a null character:\n\n```cpp\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n    char greet[8] = {'W', 'e', 'l', 'c', 'o', 'm', 'e',\
    \ '\\0'};\n    cout << greet << \"\\n\";\n}\n```\n\n**STEP 3** Build and run the\
    \ code, and ‘Welcome’ appears on the screen. While this is perfectly fine, it’s\
    \ not a string. A string is a class, which defines objects that can be represented\
    \ as a stream of characters and doesn’t need to be terminated like an array. The\
    \ code can therefore be represented as:\n\n```cpp\n#include <iostream>\nusing\
    \ namespace std;\n\nint main ()\n{\n    char greet[] = \"Welcome\";\n    cout\
    \ << greet << \"\\n\";\n}\n```\n\n**STEP 4** In C++ there’s also a string function,\
    \ which works in much the same way. Using the greeting code again, you can enter:\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string\
    \ greet = \"Welcome\";\n    cout << greet << \"\\n\";\n}\n```\n\n**STEP 5** There\
    \ are also many different operations that you can apply with the string function.\
    \ For instance, to get the length of a string you can use:\n\n```cpp\n#include\
    \ <iostream>\nusing namespace std;\n\nint main ()\n{\n    string greet = \"Welcome\"\
    ;\n    cout << \"The length of the string is: \";\n    cout << greet.size() <<\
    \ \"\\n\";\n}\n```\n\n**STEP 6** You can see that we used greet.size() to output\
    \ the length, the number of characters there are, of the contents of the string.\
    \ Naturally, if you call your string something other than greet, then you need\
    \ to change the command to reflect this. It's always stringname.operation. Build\
    \ and run the code to see the results.\n\n**STEP 7** You can of course add strings\
    \ together, or rather combine them to form longer strings:\n\n```cpp\n#include\
    \ <iostream>\nusing namespace std;\n\nint main ()\n{\n    string greet1 = \"Hello\"\
    ;\n    string greet2 = \", world!\";\n    string greet3 = greet1 + greet2;\n\n\
    \    cout << greet3 << \"\\n\";\n}\n```\n\n**STEP 8** Just as you might expect,\
    \ you can mix in an integer and store something to do with the string. In this\
    \ example, we created int length, which stores the result of string.size() and\
    \ outputs it to the user:\n\n```cpp\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n    int length;\n    string greet1 = \"Hello\";\n    string\
    \ greet2 = \", world!\";\n    string greet3 = greet1 + greet2;\n\n    length =\
    \ greet3.size();\n\n    cout << \"The length of the combined strings is: \" <<\
    \ length << \"\\n\";\n}\n```\n\n**STEP 9** Using the available operations that\
    \ come with the string function, you can manipulate the contents of a string.\
    \ For example, to remove characters from a string you could use:\n\n```cpp\n#include\
    \ <iostream>\nusing namespace std;\n\nint main ()\n{\n    string strg (\"Here\
    \ is a long sentence in a string.\");\n    cout << strg << '\\n';\n\n    strg.erase\
    \ (10,5);\n    cout << strg << '\\n';\n\n    strg.erase (strg.begin()+8);\n  \
    \  cout << strg << '\\n';\n\n    strg.erase (strg.begin()+9, strg.end()-9);\n\
    \    cout << strg << '\\n';\n}\n```\n\n**STEP 10** It's worth spending some time\
    \ playing around with the numbers, which are the character positions in the string.\
    \ Occasionally, it can be hit and miss whether you get it right, so practice makes\
    \ perfect. Take a look at the screenshot to see the result of the code.\n\n##\
    \ C++ Maths\n\nProgramming is mathematical in nature and as you might expect,\
    \ there’s plenty of built-in scope for some quite intense maths. C++ has a lot\
    \ to offer someone who’s implementing mathematical models into their code. It\
    \ can be extremely complex or relatively simple.\n\n### C++ = MC²\n\nThe basic\
    \ mathematical symbols apply in C++ as they do in most other programming languages.\
    \ However, by using the C++ Math Library, you can also calculate square roots,\
    \ powers, trig and more.\n\n**STEP 1** C++’s mathematical operations follow the\
    \ same patterns as those taught in school, in that multiplication and division\
    \ take precedence over addition and subtraction. You can alter that though. For\
    \ now, create a new file and enter:\n\n```cpp\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n    float numbers = 100;\n\n    numbers = numbers +\
    \ 10; // This adds 10 to the initial 100\n\n    cout << numbers << \"\\n\";\n\n\
    \    numbers = numbers - 10; // This subtracts 10 from the new 110\n\n    cout\
    \ << numbers << \"\\n\";\n}\n```\n\n**STEP 2** While simple, it does get the old\
    \ maths muscle warmed up. Note that we used a float for the numbers variable.\
    \ While you can happily use an integer, if you suddenly started to use decimals,\
    \ you would need to change to a float or a double, depending on the accuracy needed.\
    \ Run the code and see the results.\n\n**STEP 3** Multiplication and division\
    \ can be applied as such:\n\n```cpp\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n    float numbers = 100;\n\n    numbers = numbers * 10; // This\
    \ multiplies 100 by 10\n\n    cout << numbers << \"\\n\";\n\n    numbers = numbers\
    \ / 10; // And this divides 1000 by 10\n\n    cout << numbers << \"\\n\";\n}\n\
    ```\n\n**STEP 4** Again, execute the simple code and see the results. While not\
    \ particularly interesting, it’s a start into C++ maths. We used a float here,\
    \ so you can play around with the code and multiply by decimal places, as well\
    \ as divide, add and subtract.\n\n**STEP 5** The interesting maths content comes\
    \ when you call upon the C++ Math Library. Within this header are dozens of mathematical\
    \ functions along with further operations. Everything from computing cosine to\
    \ arc tangent with two parameters, to the value of PI. You can call the header\
    \ with:\n\n```cpp\n#include <iostream>\n#include <cmath>\nusing namespace std;\n\
    \nint main ()\n{\n}\n```\n\n**STEP 6** Start by getting the square root of a number:\n\
    \n```cpp\n#include <iostream>\n#include <cmath>\nusing namespace std;\n\nint main\
    \ ()\n{\n    float number = 134;\n\n    cout << \"The square root of \" << number\
    \ << \" is: \" << sqrt(number) << \"\\n\";\n}\n```\n\n**STEP 7** Here we created\
    \ a new float called number and used the sqrt(number) function to display the\
    \ square root of 134, the value of the variable, number. Build and run the code,\
    \ and your answer reads 11.5758.\n\n**STEP 8** Calculating powers of numbers can\
    \ be done with:\n\n```cpp\n#include <iostream>\n#include <cmath>\nusing namespace\
    \ std;\n\nint main ()\n{\n    float number = 12;\n\n    cout << number << \" to\
    \ the power of 2 is \" << pow(number, 2) << \"\\n\";\n    cout << number << \"\
    \ to the power of 3 is \" << pow(number, 3) << \"\\n\";\n    cout << number <<\
    \ \" to the power of .08 is \" << pow(number, 0.8) << \"\\n\";\n}\n```\n\n**STEP\
    \ 9** Here we created a float called number with the value of 12, and the pow(variable,\
    \ power) is where the calculation happens. Of course, you can calculate powers\
    \ and square roots without using variables. For example, pow(12, 2) outputs the\
    \ same value as the first cout line in the code.\n\n**STEP 10** The value of Pi\
    \ is also stored in the cmath header library. It can be called up with the M_PI\
    \ function. Enter cout << M_PI; into the code and you get 3.14159; or you can\
    \ use it to calculate:\n\n```cpp\n#include <iostream>\n#include <cmath>\nusing\
    \ namespace std;\n\nint main ()\n{\n    double area, radius = 1.5;\n\n    area\
    \ = M_PI * radius * radius;\n\n    cout << area << \"\\n\";\n}\n```"
  mdcn: "## 字符串\n\n字符串是表示并保存字符序列的对象。例如，你可以在代码中设置一个通用问候语‘Welcome’，并将其作为字符串赋值，以便在程序中任意位置调用。\n\
    \n### 字符串理论\n\n创建字符串有多种方式，这些方式历史上都源自最初的C语言，并且至今仍被C++支持。\n\n**步骤 1** 要创建字符串，你需要使用\
    \ `char` 函数。打开一个新的C++文件，并以通常的头文件开始：\n\n```cpp\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n}\n```\n\n**步骤 2** 字符串和数组很容易混淆。这是一个数组，可以用空字符终止：\n\n\
    ```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    char\
    \ greet[8] = {'W', 'e', 'l', 'c', 'o', 'm', 'e', '\\0'};\n    cout << greet <<\
    \ \"\\n\";\n}\n```\n\n**步骤 3** 构建并运行代码，‘Welcome’会出现在屏幕上。虽然这完全没问题，但它不是一个字符串。字符串是一个类，它定义了可以表示为字符流的对象，并且不需要像数组那样终止。因此，代码可以表示为：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    char\
    \ greet[] = \"Welcome\";\n    cout << greet << \"\\n\";\n}\n```\n\n**步骤 4** 在C++中，还有一个\
    \ `string` 函数，其工作方式非常相似。再次使用问候语代码，你可以输入：\n\n```cpp\n#include <iostream>\nusing\
    \ namespace std;\n\nint main ()\n{\n    string greet = \"Welcome\";\n    cout\
    \ << greet << \"\\n\";\n}\n```\n\n**步骤 5** 使用 `string` 函数还可以应用许多不同的操作。例如，要获取字符串的长度，你可以使用：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string\
    \ greet = \"Welcome\";\n    cout << \"The length of the string is: \";\n    cout\
    \ << greet.size() << \"\\n\";\n}\n```\n\n**步骤 6** 你可以看到我们使用了 `greet.size()` 来输出字符串内容的长度，即字符的数量。当然，如果你将字符串命名为\
    \ `greet` 以外的其他名称，那么你需要更改命令以反映这一点。格式始终是 `字符串名.操作`。构建并运行代码以查看结果。\n\n**步骤 7** 你当然可以将字符串相加，或者更准确地说，将它们组合成更长的字符串：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string\
    \ greet1 = \"Hello\";\n    string greet2 = \", world!\";\n    string greet3 =\
    \ greet1 + greet2;\n\n    cout << greet3 << \"\\n\";\n}\n```\n\n**步骤 8** 正如你可能预期的那样，你可以混合使用整数并存储与字符串相关的内容。在这个例子中，我们创建了\
    \ `int length`，它存储 `string.size()` 的结果并将其输出给用户：\n\n```cpp\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n    int length;\n    string greet1 = \"\
    Hello\";\n    string greet2 = \", world!\";\n    string greet3 = greet1 + greet2;\n\
    \n    length = greet3.size();\n\n    cout << \"The length of the combined strings\
    \ is: \" << length << \"\\n\";\n}\n```\n\n**步骤 9** 使用 `string` 函数提供的可用操作，你可以操作字符串的内容。例如，要从字符串中删除字符，你可以使用：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string\
    \ strg (\"Here is a long sentence in a string.\");\n    cout << strg << '\\n';\n\
    \n    strg.erase (10,5);\n    cout << strg << '\\n';\n\n    strg.erase (strg.begin()+8);\n\
    \    cout << strg << '\\n';\n\n    strg.erase (strg.begin()+9, strg.end()-9);\n\
    \    cout << strg << '\\n';\n}\n```\n\n**步骤 10** 值得花些时间尝试不同的数字，这些数字代表字符串中的字符位置。有时，能否正确操作可能有些碰运气，因此熟能生巧。查看截图以了解代码的运行结果。\n\
    \n## C++ 数学\n\n编程本质上是数学性的，正如你可能预期的那样，它提供了大量内置的、相当复杂的数学功能。C++为那些在代码中实现数学模型的人提供了很多可能性。它可以极其复杂，也可以相对简单。\n\
    \n### C++ = MC²\n\n基本的数学符号在C++中的应用与在大多数其他编程语言中相同。然而，通过使用C++数学库，你还可以计算平方根、幂、三角函数等等。\n\
    \n**步骤 1** C++的数学运算遵循与学校教授的相同模式，即乘法和除法优先于加法和减法。不过，你可以改变这一点。现在，创建一个新文件并输入：\n\n\
    ```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    float\
    \ numbers = 100;\n\n    numbers = numbers + 10; // This adds 10 to the initial\
    \ 100\n\n    cout << numbers << \"\\n\";\n\n    numbers = numbers - 10; // This\
    \ subtracts 10 from the new 110\n\n    cout << numbers << \"\\n\";\n}\n```\n\n\
    **步骤 2** 虽然简单，但它确实能让你的数学思维热身。注意我们使用了 `float` 作为 `numbers` 变量的类型。虽然你可以愉快地使用整数，但如果你突然开始使用小数，你就需要根据所需的精度更改为\
    \ `float` 或 `double`。运行代码并查看结果。\n\n**步骤 3** 乘法和除法可以这样应用：\n\n```cpp\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n    float numbers = 100;\n\n    numbers\
    \ = numbers * 10; // This multiplies 100 by 10\n\n    cout << numbers << \"\\\
    n\";\n\n    numbers = numbers / 10; // And this divides 1000 by 10\n\n    cout\
    \ << numbers << \"\\n\";\n}\n```\n\n**步骤 4** 再次执行这段简单的代码并查看结果。虽然不是特别有趣，但这是进入C++数学运算的开始。我们在这里使用了\
    \ `float`，所以你可以尝试修改代码，进行小数乘法，以及除法、加法和减法。\n\n**步骤 5** 当你调用C++数学库时，有趣的数学内容就来了。在这个头文件中，有数十个数学函数以及更多操作。从计算余弦到带两个参数的反正切，再到PI的值，应有尽有。你可以通过以下方式调用该头文件：\n\
    \n```cpp\n#include <iostream>\n#include <cmath>\nusing namespace std;\n\nint main\
    \ ()\n{\n}\n```\n\n**步骤 6** 首先，获取一个数的平方根：\n\n```cpp\n#include <iostream>\n#include\
    \ <cmath>\nusing namespace std;\n\nint main ()\n{\n    float number = 134;\n\n\
    \    cout << \"The square root of \" << number << \" is: \" << sqrt(number) <<\
    \ \"\\n\";\n}\n```\n\n**步骤 7** 这里我们创建了一个新的 `float` 变量 `number`，并使用 `sqrt(number)`\
    \ 函数来显示134（变量 `number` 的值）的平方根。构建并运行代码，你的答案是11.5758。\n\n**步骤 8** 计算数的幂可以这样做：\n\
    \n```cpp\n#include <iostream>\n#include <cmath>\nusing namespace std;\n\nint main\
    \ ()\n{\n    float number = 12;\n\n    cout << number << \" to the power of 2\
    \ is \" << pow(number, 2) << \"\\n\";\n    cout << number << \" to the power of\
    \ 3 is \" << pow(number, 3) << \"\\n\";\n    cout << number << \" to the power\
    \ of .08 is \" << pow(number, 0.8) << \"\\n\";\n}\n```\n\n**步骤 9** 这里我们创建了一个值为12的\
    \ `float` 变量 `number`，而 `pow(变量, 幂)` 就是进行计算的地方。当然，你也可以不使用变量来计算幂和平方根。例如，`pow(12,\
    \ 2)` 输出的值与代码中第一个 `cout` 行的值相同。\n\n**步骤 10** Pi的值也存储在 `cmath` 头文件库中。可以通过 `M_PI`\
    \ 函数调用它。在代码中输入 `cout << M_PI;`，你会得到3.14159；或者你可以用它来计算：\n\n```cpp\n#include <iostream>\n\
    #include <cmath>\nusing namespace std;\n\nint main ()\n{\n    double area, radius\
    \ = 1.5;\n\n    area = M_PI * radius * radius;\n\n    cout << area << \"\\n\"\
    ;\n}\n```"
