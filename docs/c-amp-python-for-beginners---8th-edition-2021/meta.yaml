    # 初识 Python


    ![](img/588364e02a77f179099fae91a1713f0a_5_0.png)


    # 初识 Python


    有许多不同的编程语言可供学习和使用。有些复杂且功能强大，有些则非常基础，仅用作操作系统的辅助工具。Python 介于两者之间，兼具易用性和强大的功能，允许用户创建小型实用工具、一系列出色的游戏以及高性能的计算任务。


    然而，Python 的意义远不止是另一种编程语言。它背后有一个充满活力的社区，分享知识、代码和项目创意，以及为未来版本修复错误。正是得益于这个社区，这门语言得以成长和繁荣，现在轮到你投身其中，学习如何用
    Python 编程了。


    本书的前半部分帮助你开始使用最新版本的 Python，并在此基础上指导你如何使用该语言一些最常用和有趣的功能。不久之后，你将能够编写自己的实用系统工具、文字冒险游戏，甚至控制一个角色在屏幕上移动。


    # 为什么选择 Python？


    现代计算机有许多不同的编程语言可供选择，一些较旧的 8 位和 16 位计算机也有可用的语言。其中一些语言是为科学工作设计的，另一些则用于移动平台等。那么，为什么要在众多语言中选择
    Python 呢？


    ## PYTHON 的力量


    自从最早的家用计算机问世以来，爱好者、用户和专业人士就一直工作到深夜，埋头于一堆过热的电路中，试图创造出类似魔法的东西。


    这些编程先驱们开辟了一个新的领域，编写了让字母 ''A'' 在屏幕上滚动的小程序。对于习惯了超高清图形和开放世界多人在线游戏的一代人来说，这听起来可能并不十分令人兴奋。然而，四十多年前，这却是极其耀眼的成就。


    无论你使用的是 Android 设备、iOS 设备、PC、Mac、Linux、智能电视、游戏机、MP3 播放器、内置 GPS 设备的汽车、机顶盒，还是成千上万其他联网和“智能”设备，它们背后都是编程。


    自然，这些卧室里的程序员帮助奠定了我们今天使用的每一项数字技术的基础。有些人后来成为顶级软件公司的首席开发人员，而另一些人则将可用硬件推向极限，创立了不断给我们带来惊喜的数十亿英镑的游戏帝国。


    所有上述数字设备都需要指令来告诉它们该做什么，并允许与之交互。这些指令构成了设备的编程核心，而这个核心可以使用多种编程语言来构建。


    当今使用的语言因情况、平台、设备用途以及设备将如何与其


    ![](img/588364e02a77f179099fae9a1713f0a_7_0.png)


    C++ 通常用于更复杂的程序、操作系统、游戏等。'
