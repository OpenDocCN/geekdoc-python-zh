    ![](img/588364e02a77f179099fae91a1713f0a_26_0.png)


    STEP 8 Let''s extend the code and enter a few examples from the previous tutorial:


    ```

    a=2

    b=2

    name="David"

    surname="Hayward"

    print(name, surname)

