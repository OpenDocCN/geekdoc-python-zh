    software companies, whereas others pushed the available hardware to its limits
    and founded the billion pound gaming empire that continually amazes us.


    All those aforementioned digital devices need instructions to tell them what to
    do, and allow them to be interacted with. These instructions form the programming
    core of the device and that core can be built using a variety of programming languages.


    The languages in use today differ depending on the situation, the platform, the
    device''s use and how the device will interact with its


    ![](img/588364e02a77f179099fae91a1713f0a_7_0.png)


    C++ is usually reserved for more complex programs, operating systems, games and
    so on.'
- md: "# Why Python?\n\nOperating systems, such as Windows, macOS and such are usually\
    \ a combination of C++, C#, assembly and some form of visual-based language. Games\
    \ generally use C++ whilst web pages can use a plethora of available languages\
    \ such as HTML, Java, Python and so on.\n\nPython was created over twenty six\
    \ years ago and has evolved to become an ideal beginner's language for learning\
    \ how to program a computer. It's perfect for the hobbyist, enthusiast, student,\
    \ teacher and those who simply need to create their own unique interaction between\
    \ either themselves or a piece of external hardware and the computer itself.\n\
    \nMore general-purpose programming is used to create programs, apps, software\
    \ or whatever else you want to call them. They're widely used across all hardware\
    \ platforms and suit virtually every conceivable application. Some operate faster\
    \ than others and some are easier to learn and use than others. Python is one\
    \ such general-purpose language.\n\nPython is free to download, install and use\
    \ and is available for Linux, Windows, macOS, MS-DOS, OS/2, BeOS, IBM i-series\
    \ machines, and even RISC OS. It has been voted one of the top five programming\
    \ languages in the world and is continually evolving ahead of the hardware and\
    \ Internet development curve.\n\nPython is what's known as a High-Level Language,\
    \ in that it 'talks' to the hardware and operating system using a variety of arrays,\
    \ variables, objects, arithmetic, subroutines, loops and countless more interactions.\
    \ Whilst it's not as streamlined as a Low-Level Language, which can deal directly\
    \ with memory addresses, call stacks and registers, its benefit is that it's universally\
    \ accessible and easy to learn.\n\nSo to answer the question: why python? Simply\
    \ put, it's free, easy to learn, exceptionally powerful, universally accepted,\
    \ effective and a superb learning and educational tool.\n\n```java\n//file: Invoke.java\n\
    import java.lang.reflect.*;\n\nclass Invoke {\n    public static void main( String\
    \ [] args ) {\n        try {\n            Class c = Class.forName( args[0] );\n\
    \            Method m = c.getMethod( args[1], new Class [] { } );\n          \
    \  Object ret = m.invoke( null, null );\n            System.out.println(\n   \
    \             \"Invoked static method: \" + args[1]\n                + \" of class:\
    \ \" + args[0]\n                + \" with no args\\nResults: \" + ret );\n   \
    \     } catch ( ClassNotFoundException e ) {\n            // Class.forName(  )\
    \ can't find the class\n        } catch ( NoSuchMethodException e2 ) {\n     \
    \       // that method doesn't exist\n        } catch ( IllegalAccessException\
    \ e3 ) {\n            // we don't have permission to invoke that method\n    \
    \    } catch ( InvocationTargetException e4 ) {\n            // an exception occured\
    \ while invoking that method\n            System.out.println(\n              \
    \  \"Method threw an: \" + e4.\n                getTargetException(  ));\n   \
    \     }\n    }\n}\n```\n\n```basic\n40 LET py=15\n70 FOR w=1 TO 10\n71 CLS\n75\
    \ LET by=INT (RND*25)\n80 LET bx=0\n90 FOR d=1 TO 20\n100 PRINT AT px,py; \" U\
    \ \"\n110 PRINT AT bx,by;\"o\"\n120 IF INKEY$=\"p\" THEN LET py=py+1\n130 IF INKEY$=\"\
    o\" THEN LET py=py-1\n135 FOR n=1 TO 100: NEXT n\n140 IF py<2 THEN LET py=2\n\
    150 IF py>27 THEN LET py=27\n180 LET bx=bx+1\n185 PRINT AT bx-1,by;\" \"\n190\
    \ NEXT d\n200 IF (by-1) =py THEN LET s=s+1\n210 PRINT AT 10,10;\"score=\";s\n\
    220 FOR v=1 TO 1000: NEXT v\n300 NEXT w\n0 OK, 0:1\n```\n\nBASIC was once the\
    \ starter language that early 8-bit home computer users learned.\n\n```python\n\
    print(HANGMAN[0])\nattempts = len(HANGMAN) - 1\n\nwhile (attempts != 0 and \"\
    -\" in word_guessed):\n    print((\"\\nYou have {} attempts remaining\").format(attempts))\n\
