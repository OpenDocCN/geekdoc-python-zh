    # IT''S ALL MATHS, MAN


    You can get some really impressive results with the mathematical powers of Python;
    as with most, if not all, programming languages, maths is the driving force behind
    the code.


    **STEP 1** Open up the GUI version of Python 3, as mentioned you can use either
