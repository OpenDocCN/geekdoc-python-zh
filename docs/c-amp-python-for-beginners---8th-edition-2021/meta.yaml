    \ BC,512 ;(bottom two-thirds)\nLDIR\nLD BC,31\nLD A,0\nXOR A\nR8621: IN E, (C)\n\
    OR E\nDJNZ R8621 ;$-03\nAND 20h\nJR NZ,R862F ;$+07\nLD A, 0\nLD (KEMP),A\nR862F:\
    \ LD IY,T846E\nCALL C92DC\nJR NZ,L8684\nXOR A\nLD (EUGHGT),A\n```\n\n## C++ COMMENTS\n\
    \nCommenting in C++ involves using a double forward slash '//', or a forward slash\
    \ and an asterisk, '/*'. You've already seen some brief examples but this is how\
    \ they work.\n\n**STEP 1** Using the Hello World code as an example, you can easily\
    \ comment on different sections of the code using the double forward slash:\n\n\
    ```\n//My first C++ program\ncout << \"Hello, world!\\n\";\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_66_0.png)\n\
    \n**STEP 2** However, you can also add comments to the end of a line of code,\
    \ to describe in a better way what's going on:\n\n```\ncout << \"Hello, world!\\\
    n\"; //This line outputs the words 'Hello, world!'. The \\n denotes a new line.\n\
    ```\n\nNote, you don't have to put a semicolon at the end of a comment. This is\
    \ because it's a line in the code that's ignored by the compiler.\n\n![](img/588364e02a77f179099fae91a1713f0a_66_2.png)\n\
    \n**STEP 3** You can comment out several lines by using the forward slash and\
    \ asterisk:\n\n```\n/* This comment can\n    cover several lines\n    without\
    \ the need to add more slashes */\n```\n\nJust remember to finish the block comment\
    \ with the opposite asterisk and forward slash.\n\n![](img/588364e02a77f179099fae91a1713f0a_66_4.png)\n\
    \n**STEP 4** Be careful when commenting, especially with block comments. It's\
    \ very easy to forget to add the closing asterisk and forward slash and thus negate\
    \ any code that falls inside the comment block.\n\n![](img/588364e02a77f179099fae91a1713f0a_66_1.png)\n\
    \n**STEP 5** Obviously if you try and build and execute the code it errors out,\
    \ complaining of a missing curly bracket '}' to finish off the block of code.\
    \ If you've made the error a few times, then it can be time consuming to go back\
    \ and rectify. Thankfully, the colour coding in Code::Blocks helps identify comments\
    \ from code.\n\n![](img/588364e02a77f179099fae91a1713f0a_66_3.png)\n\n**STEP 6**\
    \ If you're using block comments, it's good practise in C++ to add an asterisk\
    \ to each new line of the comment block. This also helps you to remember to close\
    \ the comment block off before continuing with the code:\n\n```\n/* This comment\
    \ can\n * cover several lines\n * without the need to add more slashes */\n```\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_66_5.png)"
