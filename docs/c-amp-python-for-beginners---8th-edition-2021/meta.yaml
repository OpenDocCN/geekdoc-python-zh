  md: '# Working with Variables


    We''ve seen some examples of variables in our Python code already but it''s always
    worth going through the way they operate and how Python creates and assigns certain
    values to a variable.


    # VARIOUS VARIABLES


    You''ll be working with the Python 3 IDLE Shell in this tutorial. If you haven''t
    already, open Python 3 or close down the previous IDLE Shell to clear up any old
    code.


    **STEP 1** In some programming languages you''re required to use a dollar sign
    to denote a string, which is a variable made up of multiple characters, such as
    a name of a person. In Python this isn''t necessary. For example, in the Shell
    enter: `name="David Hayward"` (or use your own name, unless you''re also called
    David Hayward).


    **STEP 3** You''ve seen previously that variables can be concatenated using the
    plus symbol between the variable names. In our example we can use: `print (name
    + ": " + title)`. The middle part between the quotations allows us to add a colon
    and a space, as variables are connected without spaces, so we need to add them
    manually.


    ![](img/588364e02a77f179099fae91a1713f0a_33_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_33_1.png)


    **STEP 2** You can check the type of variable in use by issuing the `type ()`
    command, placing the name of the variable inside the brackets. In our example,
    this would be: `type (name)`. Add a new string variable: `title="Descended from
    Vikings"`.


    **STEP 4** You can also combine variables within another variable. For example,
    to combine both name and title variables into a new variable we use:


    `character=name + ": " + title`


    Then output the content of the new variable as:


    `print (character)`


    Numbers are stored as different variables:


    `age=44`

    `Type (age)`


    Which, as we know, are integers.


    ![](img/588364e02a77f179099fae91a1713f0a_33_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_33_3.png)'
