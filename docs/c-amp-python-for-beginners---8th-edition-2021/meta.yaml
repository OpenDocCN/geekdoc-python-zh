  md: "# Data Types\n\nVariables, as we've seen, store information that the programmer\
    \ can then later call up, and manipulate if required. Variables are simply reserved\
    \ memory locations that store the values the programmer assigns, depending on\
    \ the data type used.\n\n# THE VALUE OF DATA\n\nThere are many different data\
    \ types available for the programmer in C++, such as an integer, floating point,\
    \ Boolean, character and so on. It's widely accepted that there are seven basic\
    \ data types, often called Primitive Built-in Types; however, you can create your\
    \ own data types should the need ever arise within your code.\n\nThe seven basic\
    \ data types are:\n\n| TYPE | COMMAND |\n|---|---|\n| Integer | `Integer` |\n\
    | Floating Point | `float` |\n| Character | `char` |\n| Boolean | `bool` |\n|\
    \ Double Floating Point | `double` |\n| Wide Character | `wchar_t` |\n| No Value\
    \ | `void` |\n\nThese basic types can also be extended using the following modifiers:\
    \ Long, Short, Signed and Unsigned. Basically this means the modifiers can expand\
    \ the minimum and maximum range values for each data type. For example, the int\
    \ data type has a default value range of -2147483648 to 2147483647, a fair value,\
    \ you would agree.\n\nNow, if you were to use one of the modifiers, the range\
    \ alters:\n\nUnsigned int = 0 to 4294967295\nSigned int = -2147483648 to 2147483647\n\
    Short int = -32768 to 32767\nUnsigned Short int = 0 to 65,535\nSigned Short int\
    \ = -32768 to 32767\nLong int = -2147483647 to 2147483647\nSigned Long int = -2147483647\
    \ to 2147483647\nUnsigned Long int = 0 to 4294967295\n\nNaturally you can get\
    \ away with using the basic type without the modifier, as there's plenty of range\
    \ provided with each data type. However, it's considered good C++ programming\
    \ practise to use the modifiers when possible.\n\nThere are issues when using\
    \ the modifiers though. Double represents a double-floating point value, which\
    \ you can use for\n\nincredibly accurate numbers but those numbers are only accurate\
    \ up to the fifteenth decimal place. There's also the problem when displaying\
    \ such numbers in C++ using the cout function, in that cout by default only outputs\
    \ the first five decimal places. You can combat that by adding a cout.precision\
    \ () function and adding a value inside the brackets, but even then you're still\
    \ limited by the accuracy of the double data type. For example, try this code:\n\
    \n```\n#include <iostream>\nusing namespace std;\ndouble PI = 3.141592653589793238463;\n\
    \nint main()\n{\n    cout << PI;\n}\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_69_0.png)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_69_1.png)\n\nBuild and run the code\
    \ and as you can see the output is only 3.14159, representing cout's limitations\
    \ in this example.\n\nYou can alter the code including the aforementioned cout.precision\
    \ function, for greater accuracy. Take precision all the way up to 22 decimal\
    \ places, with the following code:\n\n```\n#include <iostream>\nusing namespace\
    \ std;\ndouble PI = 3.141592653589793238463;\n\nint main()\n{\n```"
