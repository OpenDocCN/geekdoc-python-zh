    步骤 6 这就是你编写绝大多数 Python 代码的方式。将其输入到编辑器中，按 F5，保存代码，然后在 Shell 中查看输出。有时情况会有所不同，这取决于你是否请求了单独的窗口，但本质上这就是这个过程。除非另有说明，这将是我们贯穿本书使用的过程。


