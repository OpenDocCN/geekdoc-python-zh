    \ of the many frustrating areas of programming, regardless of whether you’re a\
    \ professional or just starting out.\n\nIn short, all code should be commented\
    \ in such a manner as to effectively describe the purpose of a line, section,\
    \ or individual elements. You should get into the habit of commenting as much\
    \ as possible, by imagining that someone who doesn’t know anything about programming\
    \ can pick up your code and understand what it’s going to do simply by reading\
    \ your comments.\n\nIn a professional environment, comments are vital to the success\
    \ of the code and ultimately, the company. In an organisation, many programmers\
    \ work in teams alongside engineers, other developers, hardware analysts and so\
    \ on. If you’re a part of the team that’s writing a bespoke piece of software\
    \ for the company, then your comments help save a lot of time should something\
    \ go wrong, and another team member has to pick up and follow the trail to pinpoint\
    \ the issue.\n\nPlace yourself in the shoes of someone whose job it is to find\
    \ out what’s wrong with a program. The program has in excess of 800,000 lines\
    \ of code, spread across several different modules. You can soon appreciate the\
    \ need for a little help from the original programmers in the form of a good comment.\n\
    \nThe best comments are always concise and link the code logically, detailing\
    \ what happens when the program hits this line or section. You don’t need to comment\
    \ on every line. Something along the lines of: if x==0 doesn’t require you to\
    \ comment that if x equals zero then do something; that’s going to be obvious\
