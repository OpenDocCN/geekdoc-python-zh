    你现在有两个变量，分别包含名字和姓氏，你可以独立地打印它们。


    ![](img/588364e02a77f179099fae91a1713f0a_24_1.png)


    步骤 9 如果我们像之前一样使用 + 符号，名字在 Shell 中的输出将不会正确显示。试试看：

    print(name+surname)

    你需要在两者之间加一个空格，将它们定义为两个独立的值，而不是你进行数学运算的对象。


    ![](img/588364e02a77f179099fae91a1713f0a_24_3.png)


