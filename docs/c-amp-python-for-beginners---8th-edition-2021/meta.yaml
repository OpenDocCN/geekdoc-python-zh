  md: '# How to Set Up C++ on a Mac


    To begin C++ coding on a Mac you first need to install Apple’s Xcode. This is
    a free, full featured IDE that’s designed to create native Apple apps. However,
    you can also use it to create C++ code relatively easily.


    # XCODE


    Apple’s Xcode is primarily designed for users to develop apps for macOS, iOS,
    tvOS and watchOS applications in Swift or Objective-C but you can use it for C++
    too.


    STEP 1 Start by opening the App Store on your Mac, Apple Menu > App Store. In
    the Search box enter ‘Xcode’ and press Return. There are many suggestions filling
    the App Store window but it’s the first option, Xcode, that you need to click
    on.


    STEP 3 When you’re ready, click on the Get button which then turns into Install
    App. Enter your Apple ID and Xcode begins to download and install. It may take
    some time depending on the speed of your Internet connection.


    ![](img/588364e02a77f179099fae91a1713f0a_51_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_51_1.png)


    STEP 2 Take a moment to browse through the app’s information, including the compatibility,
    to ensure you have the correct version of macOS. Xcode requires macOS 10.12.6
    or later to install and work.


    STEP 4 When the installation is complete, click on the Open button to launch Xcode.
    Click Agree to the licence terms and enter your password to allow Xcode to make
    changes to the system. When that is done, Xcode begins to install additional components.


    ![](img/588364e02a77f179099fae91a1713f0a_51_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_51_3.png)'
