    STEP 7 Naturally, since this is Python 3 code, using the syntax and layout that''s
    unique to Python 3, it only works when you use the python3 command. If you like,
    try the same with Python 2 by entering:


    ```

    python hello.py

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_28_4.png)


    STEP 10 Save the hello.py file and drop back to the command line. Now execute
    the newly saved code with:


    ```

    python3 hello.py

    ```


    The result will be the original Python is cool! statement, together with the added
    input command asking you for your name, and displaying it in the command window.


    ![](img/588364e02a77f179099fae91a1713f0a_28_5.png)


    ## Numbers and Expressions


    We''ve seen some basic mathematical expressions with Python, simple addition and
    the like. Let''s expand on that now and see just how powerful Python is as a calculator.
    You can work within the IDLE Shell or in the Editor, whichever you like.


    ### IT''S ALL MATHS, MAN


    You can get some really impressive results with the mathematical powers of Python;
    as with most, if not all, programming languages, maths is the driving force behind
    the code.


    **STEP 1** Open up the GUI version of Python 3, as mentioned you can use either
    the Shell or the Editor. For the time being, you''re going to use the Shell just
    to warm our maths muscle, which we believe is a small gland located at the back
    of the brain (or not).


    **STEP 3** You can use all the usual mathematical operations: divide, multiply,
    brackets and so on. Practise with a few, for example:


    ```

    1/2

    6/2

    2+2*3

    (1+2)+(3*4)

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_29_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_29_1.png)


    **STEP 2** In the Shell enter the following:


    ```

    2+2

    54356+34553245

    99867344*27344484221

    ```


    You can see that Python can handle some quite large numbers.


    **STEP 4** You''ve no doubt noticed, division produces a decimal number. In Python
    these are called floats, or floating point arithmetic. However, if you need an
    integer as opposed to a decimal answer, then you can use a double slash:


    ```

    1//2

    6//2

    ```


    And so on.


    ![](img/588364e02a77f179099fae91a1713f0a_29_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_29_3.png)


    STEP 5 You can also use an operation to see the remainder left over from division.
    For example:


    ```

    10/3

    ```


    Will display 3.333333333, which is of course 3.3-recurring. If you now enter:


    ```

    10%3

    ```


    This will display 1, which is the remainder left over from dividing 10 into 3.


    ![](img/588364e02a77f179099fae91a1713f0a_30_0.png)


    STEP 8 This will be displayed as ''0b11'', converting the integer into binary
    and adding the prefix 0b to the front. If you want to remove the 0b prefix, then
    you can use:


    ```

    format(3, ''b'')

    ```


    The Format command converts a value, the number 3, to a formatted representation
    as controlled by the format specification, the ''b'' part.


    ![](img/588364e02a77f179099fae91a1713f0a_30_1.png)


    STEP 6 Next up we have the power operator, or exponentiation if you want to be
    technical. To work out the power of something you can use a double multiplication
    symbol or double-star on the keyboard:


    ```

    2**3

    10**10

    ```


    Essentially, it''s 2x2x2 but we''re sure you already know the basics behind maths
    operators. This is how you would work it out in Python.


    ![](img/588364e02a77f179099fae91a1713f0a_30_2.png)


    STEP 9 A Boolean Expression is a logical statement that will either be true or
    false. We can use these to compare data and test to see if it''s equal to, less
    than or greater than. Try this in a New File:


    ```

    a = 6

    b = 7

    print(1, a == 6)

    print(2, a == 7)

    print(3, a == 6 and b == 7)

    print(4, a == 7 and b == 7)

    print(5, not a == 7 and b == 7)

    print(6, a == 7 or b == 7)

    print(7, a == 7 or b == 6)

    print(8, not (a == 7 and b == 6))

    print(9, not a == 7 and b == 6)

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_30_3.png)


    STEP 7 Numbers and expressions don''t stop there. Python has numerous built-in
    functions to work out sets of numbers, absolute values, complex numbers and a
    host of mathematical expressions and Pythagorean tongue-twisters. For example,
    to convert a number to binary, use:


    ```

    bin(3)

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_30_4.png)


    STEP 10 Execute the code from Step 9, and you can see a series of True or False
    statements, depending on the result of the two defining values: 6 and 7. It''s
    an extension of what you''ve looked at, and an important part of programming.


    ![](img/588364e02a77f179099fae91a1713f0a_30_5.png)'
