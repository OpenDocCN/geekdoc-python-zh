    Web 创建应用程序。社区版可以免费下载和安装，但其他版本提供免费试用期。访问 www.visualstudio.com/ 查看它能为你做什么。


    **ANJUTA** Anjuta DevStudio 是一个仅限 Linux 的 IDE，具有一些通常在付费软件开发工作室中才能找到的高级功能。它包含图形用户界面设计器、源代码编辑器、应用程序向导、交互式调试器等等。访问
