  - '[PAGE 9]


    # Equipment You Will Need


    You can learn Python with very little hardware or initial financial investment.
    You don''t need an incredibly powerful computer and any software that''s required
    is freely available.


    # WHAT WE''RE USING


    Thankfully, Python is a multi-platform programming language available for Windows,
    macOS, Linux, Raspberry Pi and more. If you have one of those systems, then you
    can easily start using Python.


    ![](img/588364e02a77f179099fae91a1713f0a_9_0.png)


    # COMPUTER


    Obviously you''re going to need a computer in order to learn how to program in
    Python and to test your code. You can use Windows (from XP onward) on either a
    32 or 64-bit processor, an Apple Mac or Linux installed PC.


    # AN IDE


    An IDE (Integrated Developer Environment) is used to enter and execute Python
    code. It enables you to inspect your program code and the values within the code,
    as well as offering advanced features. There are many different IDEs available,
    so find the one that works for you and gives the best results.


    # PYTHON SOFTWARE


    macOS and Linux already come with Python preinstalled as part of the operating
    system, as does the Raspberry Pi. However, you need to ensure that you''re running
    the latest version of Python. Windows users need to download and install Python,
    which we''ll cover shortly.


    ![](img/588364e02a77f179099fae91a1713f0a_9_1.png)


    # TEXT EDITOR


    Whilst a text editor is an ideal environment to enter code into, it''s not an
    absolute necessity. You can enter and execute code directly from the IDLE but
    a text editor, such as Sublime Text or Notepad++, offers more advanced features
    and colour coding when entering code.


    # INTERNET ACCESS


    Python is an ever evolving environment and as such new versions often introduce
    new concepts or change existing commands and code structure to make it a more
    efficient language. Having access to the Internet will keep you up-to-date, help
    you out when you get stuck and give access to Python''s immense number of modules.


    ![](img/588364e02a77f179099fae91a1713f0a_9_2.png)


    # TIME AND PATIENCE


    Despite what other books may lead you to believe, you won''t become a programmer
    in 24-hours. Learning to code in Python takes time, and patience. You may become
    stuck at times and other times the code will flow like water. Understand you''re
    learning something entirely new, and you will get there.'
  - '[PAGE 10]


    # THE RASPBERRY PI


    Why use a Raspberry Pi? The Raspberry Pi is a tiny computer that’s very cheap
    to purchase but offers the user a fantastic learning platform. Its main operating
    system, Raspbian, comes preinstalled with the latest Python along with many Modules
    and extras.


    # RASPBERRY PI


    The Raspberry Pi 3 is the latest version, incorporating a more powerful CPU, more
    memory, Wi-Fi and Bluetooth support. You can pick up a Pi for around £32 or as
    a part of kit for £50+, depending on the kit you’re interested in.


    ![](img/588364e02a77f179099fae91a1713f0a_10_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_10_1.png)


    # FUZE PROJECT


    The FUZE is a learning environment built on the latest model of the Raspberry
    Pi. You can purchase the workstations that come with an electronics kit and even
    a robot arm for you to build and program. You can find more information on the
    FUZE at www.fuze.co.uk.


    # RASPBIAN


    The Raspberry Pi’s main operating system is a Debian-based Linux distribution
    that comes with everything you need in a simple to use package. It’s streamlined
    for the Pi and is an ideal platform for hardware and software projects, Python
    programming and even as a desktop computer.


    # BOOKS


    We have several great coding titles available via www. bdmpublications.com. Our
    Pi books cover how to buy your first Raspberry Pi, set it up and use it; there
    are some great step-by-step project examples and guides to get the most from the
    Raspberry Pi too.


    ![](img/588364e02a77f179099fae91a1713f0a_10_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_10_3.png)'
- md: '# Getting to Know Python


    Python is the greatest computer programming language ever created. It enables
    you to fully harness the power of a computer, in a language that’s clean and easy
    to understand.


    # WHAT IS PROGRAMMING?


    It helps to understand what a programming language is before you try to learn
    one, and Python is no different. Let’s take a look at how Python came about and
    how it relates to other languages.


    A programming language is a list of instructions that a computer follows. These
    instructions can be as simple as displaying your name or playing a music file,
    or as complex as building a whole virtual world. Python is a programming language
    conceived in the late 1980s by Guido van Rossum at Centrum Wiskunde & Informatica
    (CWI) in the Netherlands as a successor to the ABC language.


    # PROGRAMMING RECIPES


    Programs are like recipes for computers. A recipe to bake a cake could go like
    this:


    Put 100 grams of self-raising flour in a bowl.

    Add 100 grams of butter to the bowl.

    Add 100 millilitres of milk.

    Bake for half an hour.


    ![](img/588364e02a77f179099fae91a1713f0a_11_0.png)


    **Guido van Rossum, the father of Python.**


    ![](img/588364e02a77f179099fae91a1713f0a_11_1.png)


    # CODE


    Just like a recipe, a program consists of instructions that you follow in order.
    A program that describes a cake might run like this:


    ```

    bowl = []

    flour = 100

    butter = 50

    milk = 100

    bowl.append([flour,butter,milk])

    cake.cook(bowl)

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_11_2.png)


    # PROGRAM COMMANDS


    You might not understand some of the Python commands, like bowl.append and cake.cook(bowl).
    The first is a list, the second an object; we’ll look at both in this book. The
    main thing to know is that it’s easy to read commands in Python. Once you learn
    what the commands do, it’s easy to figure out how a program works.


    ![](img/588364e02a77f179099fae91a1713f0a_11_3.png)


    ![](img/588364e02a77f179099fae91a1713f0a_11_4.png)


    # HIGH-LEVEL LANGUAGES


    Computer languages that are easy to read are known as “high-level”. This is because
    they fly high above the hardware (also referred to as “the metal”). Languages
    that “fly close to the metal,” like Assembly, are known as “low-level”. Low-level
    languages commands read a bit like this: `msg db ,0xa len equ $ - msg`.


    ![](img/588364e02a77f179099fae91a1713f0a_12_0.png)


    # ZEN OF PYTHON


    Python lets you access all the power of a computer in a language that humans can
    understand. Behind all this is an ethos called “The Zen of Python.” This is a
    collection of 20 software principles that influences the design of the language.
    Principles include “Beautiful is better than ugly” and “Simple is better than
    complex.” Type `import this` into Python and it will display all the principles.


    ![](img/588364e02a77f179099fae91a1713f0a_12_1.png)


    # PYTHON 3 VS PYTHON 2


    In a typical computing scenario, Python is complicated somewhat by the existence
    of two active versions of the language: Python 2 and Python 3.


    # WORLD OF PYTHON


    When you visit the Python Download page you’ll notice that there are two buttons
    available: one for Python 3.6.2 and the other for Python 2.7.13; correct at the
    time of writing (remember Python is frequently updated so you may see different
    version numbers).


    # PYTHON 3.X


    In 2008 Python 3 arrived with several new and enhanced features. These features
    provide a more stable, effective and efficient programming environment but sadly,
    most (if not all) of these new features are not compatible with Python 2 scripts,
    modules and tutorials. Whilst not popular at first, Python 3 has since become
    the cutting edge of Python programming.


    ![](img/588364e02a77f179099fae91a1713f0a_12_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_12_3.png)


    # PYTHON 2.X


    So why two? Well, Python 2 was originally launched in 2000 and has since then
    adopted quite a large collection of modules, scripts, users, tutorials and so
    on. Over the years Python 2 has fast become one of the first go to programming
    languages for beginners and experts to code in, which makes it an extremely valuable
    resource.


    # 3.X WINS


    Python 3’s growing popularity has meant that it’s now prudent to start learning
    to develop with the new features and begin to phase out the previous version.
    Many development companies, such as SpaceX and NASA use Python 3 for snippets
    of important code.


    ![](img/588364e02a77f179099fae91a1713f0a_12_4.png)


    ![](img/588364e02a77f179099fae91a1713f0a_12_5.png)


    # How to Set Up Python in Windows


    Windows users can easily install the latest version of Python via the main Python
    Downloads page. Whilst most seasoned Python developers may shun Windows as the
    platform of choice for building their code, it’s still an ideal starting point
    for beginners.


    # INSTALLING PYTHON 3.X


    Microsoft Windows doesn’t come with Python preinstalled as standard, so you’re
    going to have to install it yourself manually. Thankfully, it’s an easy process
    to follow.


    **STEP 1** Start by opening your web browser to **www.python.org/downloads/**.
    Look for the button detailing the download link for Python 3.x.x (in our case
    this is Python 3.6.2 but as mentioned you may see later versions of 3).


    **STEP 2** Click the download button for version 3.x, and save the file to your
    Downloads folder. When the file is downloaded, double-click the executable and
    the Python installation wizard will launch. From here you have two choices: Install
    Now and Customise Installation. We recommend opting for the Customise Installation
    link.


    **STEP 3** Choosing the Customise option allows you to specify certain parameters,
    and whilst you may stay with the defaults, it’s a good habit to adopt as sometimes
    (not with Python, thankfully) installers can include unwanted additional features.
    On the first screen available, ensure all boxes are ticked and click the Next
    button.


    ![](img/588364e02a77f179099fae91a1713f0a_13_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_13_1.png)


    **STEP 4** The next page of options include some interesting additions to Python.
    Ensure the Associate file with Python, Create Shortcuts, Add Python to Environment
    Variables, Precompile Standard Library and Install for All Users options are ticked.
    These make using Python later much easier. Click Install when you’re ready to
    continue.


    ![](img/588364e02a77f179099fae91a1713f0a_13_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_13_3.png)


    **STEP 5** You may need to confirm the installation with the Windows authentication
    notification. Simply click Yes and Python will begin to install. Once the installation
    is complete the final Python wizard page will allow you to view the latest release
    notes, and follow some online tutorials.


    **STEP 6** Before you close the install wizard window, however, it''s best to
    click on the link next to the shield detailed Disable Path Length Limit. This
    will allow Python to bypass the Windows 260 character limitation, enabling you
    to execute Python programs stored in deep folders arrangements. Again, click Yes
    to authenticate the process; then you can Close the installation window.


    **STEP 7** Windows 10 users will now find the installed Python 3.x within the
    Start button Recently Added section. The first link, Python 3.6 (32-bit) will
    launch the command line version of Python when clicked (more on that in a moment).
    To open the IDLE, type IDLE into Windows start.


    **STEP 8** Clicking on the IDLE (Python 3.6 32-bit) link will launch the Python
    Shell, where you can begin your Python programming journey. Don''t worry if your
    version is newer, as long as it''s Python 3.x our code will work inside your Python
    3 interface.


    ![](img/588364e02a77f179099fae91a1713f0a_14_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_14_1.png)


    **STEP 9** If you now click on the Windows Start button again, and this time type:
    CMD, you''ll be presented with the Command Prompt link. Click it to get to the
    Windows command line environment. To enter Python within the command line, you
    need to type: python and press Enter.


    ![](img/588364e02a77f179099fae91a1713f0a_14_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_14_3.png)


    **STEP 10** The command line version of Python works in much the same way as the
    Shell you opened in Step 8; note the three left-facing arrows (>>>). Whilst it''s
    a perfectly fine environment, it''s not too user-friendly, so leave the command
    line for now. Enter: exit() to leave and close the Command Prompt window.


    ![](img/588364e02a77f179099fae91a1713f0a_14_4.png)


    ![](img/588364e02a77f179099fae91a1713f0a_14_5.png)'
  mdcn: '# 初识 Python


    Python 是有史以来最伟大的计算机编程语言。它能让你以一种简洁易懂的语言，充分发挥计算机的强大功能。


    # 什么是编程？


    在尝试学习编程语言之前，先理解什么是编程语言会很有帮助，Python 也不例外。让我们来看看 Python 是如何诞生的，以及它与其他语言的关系。


    编程语言是计算机遵循的一系列指令。这些指令可以简单到显示你的名字或播放音乐文件，也可以复杂到构建一个完整的虚拟世界。Python 是一种编程语言，由荷兰数学与计算机科学研究中心（CWI）的吉多·范罗苏姆在
    20 世纪 80 年代末构想出来，作为 ABC 语言的后继者。


    # 编程食谱


    程序就像是计算机的食谱。一个烤蛋糕的食谱可能是这样的：


    将 100 克自发粉放入碗中。

    向碗中加入 100 克黄油。

    加入 100 毫升牛奶。

    烘烤半小时。


    ![](img/588364e02a77f179099fae91a1713f0a_11_0.png)


    **Python 之父，吉多·范罗苏姆。**


    ![](img/588364e02a77f179099fae91a1713f0a_11_1.png)


    # 代码


    就像食谱一样，程序由一系列按顺序执行的指令组成。一个描述蛋糕的程序可能这样运行：


    ```

    bowl = []

    flour = 100

    butter = 50

    milk = 100

    bowl.append([flour,butter,milk])

    cake.cook(bowl)

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_11_2.png)


    # 程序命令


    你可能不理解一些 Python 命令，比如 `bowl.append` 和 `cake.cook(bowl)`。前者是一个列表，后者是一个对象；我们将在本书中介绍这两者。主要需要知道的是，Python
    的命令易于阅读。一旦你了解了这些命令的作用，就很容易弄清楚程序是如何工作的。


    ![](img/588364e02a77f179099fae91a1713f0a_11_3.png)


    ![](img/588364e02a77f179099fae91a1713f0a_11_4.png)


    # 高级语言


    易于阅读的计算机语言被称为“高级语言”。这是因为它们远离硬件（也称为“金属层”）。而“贴近金属层”运行的语言，如汇编语言，则被称为“低级语言”。低级语言的命令读起来有点像这样：`msg
    db ,0xa len equ $ - msg`。


    ![](img/588364e02a77f179099fae91a1713f0a_12_0.png)


    # Python 之禅


    Python 让你能够以人类可理解的语言访问计算机的所有强大功能。这一切背后是一种被称为“Python 之禅”的理念。这是一套包含 20 条软件原则的集合，影响着该语言的设计。原则包括“优美优于丑陋”和“简洁优于复杂”。在
    Python 中输入 `import this`，它将显示所有原则。


    ![](img/588364e02a77f179099fae91a1713f0a_12_1.png)


    # Python 3 与 Python 2


    在典型的计算场景中，由于存在两个活跃的 Python 版本：Python 2 和 Python 3，情况变得有些复杂。


    # Python 的世界


    当你访问 Python 下载页面时，你会注意到有两个可用按钮：一个用于 Python 3.6.2，另一个用于 Python 2.7.13；这是撰写本文时的正确版本（请记住
    Python 经常更新，因此你可能会看到不同的版本号）。


    # Python 3.X


    2008 年，Python 3 带来了一些新的和增强的功能。这些功能提供了更稳定、更高效和更有效的编程环境，但遗憾的是，这些新功能大多（如果不是全部的话）与
    Python 2 的脚本、模块和教程不兼容。虽然起初并不流行，但 Python 3 后来已成为 Python 编程的前沿。


    ![](img/588364e02a77f179099fae91a1713f0a_12_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_12_3.png)


    # Python 2.X


    那么为什么有两个版本呢？嗯，Python 2 最初于 2000 年发布，此后积累了大量的模块、脚本、用户、教程等等。多年来，Python 2 迅速成为初学者和专家首选的编程语言之一，这使其成为极其宝贵的资源。


    # 3.X 胜出


    Python 3 日益增长的受欢迎程度意味着，现在开始学习使用新特性进行开发并逐步淘汰旧版本是明智之举。许多开发公司，如 SpaceX 和 NASA，都使用
    Python 3 来编写重要的代码片段。


    ![](img/588364e02a77f179099fae91a1713f0a_12_4.png)


    ![](img/588364e02a77f179099fae91a1713f0a_12_5.png)


    # 如何在 Windows 中设置 Python


    Windows 用户可以轻松地通过 Python 主下载页面安装最新版本的 Python。尽管许多经验丰富的 Python 开发者可能回避使用 Windows
    作为构建代码的首选平台，但它仍然是初学者的理想起点。


    # 安装 Python 3.X


    Microsoft Windows 默认不预装 Python，因此你需要手动安装。幸运的是，这是一个简单的过程。


    **步骤 1** 首先，打开你的网络浏览器，访问 **www.python.org/downloads/**。找到详细说明 Python 3.x.x 下载链接的按钮（在我们的例子中是
    Python 3.6.2，但如前所述，你可能会看到更新的 3.x 版本）。


    **步骤 2** 点击版本 3.x 的下载按钮，并将文件保存到你的“下载”文件夹。文件下载完成后，双击可执行文件，Python 安装向导将启动。在这里你有两个选择：立即安装和自定义安装。我们建议选择自定义安装链接。


    **步骤 3** 选择自定义选项允许你指定某些参数，虽然你可能保持默认设置，但养成这个习惯是好的，因为有时（幸运的是 Python 不会）安装程序可能包含不需要的附加功能。在第一个可用的屏幕上，确保所有框都已勾选，然后单击“下一步”按钮。


    ![](img/588364e02a77f179099fae91a1713f0a_13_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_13_1.png)


    **步骤 4** 下一页选项包括一些对 Python 有趣的补充。确保勾选“将文件与 Python 关联”、“创建快捷方式”、“将 Python 添加到环境变量”、“预编译标准库”和“为所有用户安装”选项。这些使得以后使用
    Python 更加容易。准备好继续时，单击“安装”。


    ![](img/588364e02a77f179099fae91a1713f0a_13_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_13_3.png)


    **步骤 5** 你可能需要通过 Windows 身份验证通知来确认安装。只需单击“是”，Python 将开始安装。安装完成后，最终的 Python 向导页面将允许你查看最新的发行说明，并关注一些在线教程。


    **步骤 6** 然而，在关闭安装向导窗口之前，最好单击盾牌图标旁边的链接，该链接详细说明为“禁用路径长度限制”。这将允许 Python 绕过 Windows
    的 260 字符限制，使你能够执行存储在深层文件夹结构中的 Python 程序。同样，单击“是”以验证该过程；然后你可以关闭安装窗口。


    **步骤 7** Windows 10 用户现在可以在“开始”按钮的“最近添加”部分中找到已安装的 Python 3.x。第一个链接 Python 3.6
    (32-bit) 在单击时将启动 Python 的命令行版本（稍后会详细介绍）。要打开 IDLE，请在 Windows 开始菜单中输入 IDLE。


    **步骤 8** 单击 IDLE (Python 3.6 32-bit) 链接将启动 Python Shell，在这里你可以开始你的 Python 编程之旅。如果你的版本更新，不用担心，只要它是
    Python 3.x，我们的代码就能在你的 Python 3 界面中运行。


    ![](img/588364e02a77f179099fae91a1713f0a_14_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_14_1.png)


    **步骤 9** 如果你现在再次单击 Windows 开始按钮，这次输入：CMD，你将看到命令提示符链接。单击它进入 Windows 命令行环境。要在命令行中进入
    Python，你需要输入：python 并按 Enter 键。


    ![](img/588364e02a77f179099fae91a1713f0a_14_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_14_3.png)


    **步骤 10** Python 的命令行版本的工作方式与你在步骤 8 中打开的 Shell 非常相似；注意三个向左的箭头（>>>）。虽然它是一个完全可用的环境，但不太用户友好，所以现在先离开命令行。输入：exit()
    以退出并关闭命令提示符窗口。


