- md: "## Using Comments\n\nWhen writing your code, the flow of it, what each variable\
    \ does, how the overall program will operate and so on is all inside your head.\
    \ Another programmer could follow the code line by line but over time, it can\
    \ become difficult to read.\n\n## COMMENTS!\n\nProgrammers use a method of keeping\
    \ their code readable by commenting on certain sections. If a variable is used,\
    \ the programmer comments on what it's supposed to do, for example. It's just\
    \ good practice.\n\n**STEP 1** Start by creating a new instance of the IDLE Editor\
    \ (File > New File) and create a simple variable and print command:\n\n```\na=10\n\
    print(\"The value of A is,\", a)\n```\n\nSave the file and execute the code.\n\
    \n**STEP 2** Running the code will return the line: The value of A is, 10 into\
    \ the IDLE Shell window, which is what we expected. Now, add some of the types\
    \ of comments you'd normally see within code:\n\n```\n# Set the start value of\
    \ A to 10\na=10\n# Print the current value of A\nprint(\"The value of A is,\"\
    , a)\n```\n\n**STEP 3** Resave the code and execute it. You can see that the output\
    \ in the IDLE Shell is still the same as before, despite the extra lines being\
    \ added. Simply put, the hash symbol (#) denotes a line of text the programmer\
    \ can insert to inform them, and others, of what's going on without the user being\
    \ aware.\n\n**STEP 4** Let's assume that the variable A that we've created is\
    \ the number of lives in a game. Every time the player dies, the value is decreased\
    \ by 1. The programmer could insert a routine along the lines of:\n\n```\na=a-1\n\
    print(\"You've just lost a life!\")\nprint(\"You now have\", a, \"lives left!\"\
    )\n```\n\n**STEP 5** Whilst we know that the variable A is lives, and that the\
    \ player has just lost one, a casual viewer or someone checking the code may not\
    \ know. Imagine for a moment that the code is twenty thousand lines long, instead\
    \ of just our seven. You can see how handy comments are.\n\n**STEP 6** Essentially,\
    \ the new code together with comments could look like:\n\n```\n# Set the start\
    \ value of A to 10\na=10\n# Print the current value of A\nprint(\"The value of\
    \ A is, \", a)\n# Player lost a life!\na=a-1\n# Inform player, and display current\
    \ value of A (lives)\nprint(\"You've just lost a life!\")\nprint(\"You now have\"\
    , a, \"lives left!\")\n```\n\n**STEP 7** You can use comments in different ways.\
    \ For example, Block Comments are a large section of text that details what's\
    \ going on in the code, such as telling the code reader what variables you're\
    \ planning on using:\n\n```\n# This is the best game ever, and has been\n# developed\
    \ by a crack squad of Python experts\n# who haven't slept or washed in weeks.\
    \ Despite\n# being very smelly, the code at least\n# works really well.\n```\n\
    \n**STEP 8** Inline comments are comments that follow a section of code. Take\
    \ our examples from above, instead of inserting the code on a separate line, we\
    \ could use:\n\n```\na=10 # Set the start value of A to 10\nprint(\"The value\
    \ of A is, \", a) # Print the current value of A\na=a-1 # Player lost a life!\n\
    print(\"You've just lost a life!\")\nprint(\"You now have\", a, \"lives left!\"\
    ) # Inform player, and display current value of A (lives)\n```\n\n**STEP 9** The\
    \ comment, the hash symbol, can also be used to comment out sections of code you\
    \ don't want to be executed in your program. For instance, if you wanted to remove\
    \ the first print statement, you would use:\n\n```\n# print(\"The value of A is,\
    \ \", a)\n```\n\n**STEP 10** You also use three single quotes to comment out a\
    \ Block Comment or multi-line section of comments. Place them before and after\
    \ the areas you want to comment for them to work:\n\n```\n'''\nThis is the best\
    \ game ever, and has been developed\nby a crack squad of Python experts who haven't\n\
    slept or washed in weeks. Despite being very\nsmelly, the code at least works\
    \ really well.\n'''\n```\n\n## Working with Variables\n\nWe've seen some examples\
    \ of variables in our Python code already but it's always worth going through\
    \ the way they operate and how Python creates and assigns certain values to a\
    \ variable.\n\n## VARIOUS VARIABLES\n\nYou'll be working with the Python 3 IDLE\
    \ Shell in this tutorial. If you haven't already, open Python 3 or close down\
    \ the previous IDLE Shell to clear up any old code.\n\n**STEP 1** In some programming\
    \ languages you're required to use a dollar sign to denote a string, which is\
    \ a variable made up of multiple characters, such as a name of a person. In Python\
    \ this isn't necessary. For example, in the Shell enter: `name=\"David Hayward\"\
    ` (or use your own name, unless you're also called David Hayward).\n\n**STEP 2**\
    \ You can check the type of variable in use by issuing the `type()` command, placing\
    \ the name of the variable inside the brackets. In our example, this would be:\
    \ `type(name)`. Add a new string variable: `title=\"Descended from Vikings\"`.\n\
    \n**STEP 3** You've seen previously that variables can be concatenated using the\
    \ plus symbol between the variable names. In our example we can use: `print(name\
    \ + \": \" + title)`. The middle part between the quotations allows us to add\
    \ a colon and a space, as variables are connected without spaces, so we need to\
    \ add them manually.\n\n**STEP 4** You can also combine variables within another\
    \ variable. For example, to combine both name and title variables into a new variable\
    \ we use:\n\n```\ncharacter=name + \": \" + title\n```\n\nThen output the content\
    \ of the new variable as:\n\n```\nprint(character)\n```\n\nNumbers are stored\
    \ as different variables:\n\n```\nage=44\ntype(age)\n```\n\nWhich, as we know,\
    \ are integers.\n\n**STEP 5** However, you can't combine both strings and integer\
    \ type variables in the same command, as you would a set of similar variables.\
    \ You need to either turn one into the other or vice versa. When you do try to\
    \ combine both, you get an error message:\n\n```\nprint(name + age)\n```\n\n**STEP\
    \ 6** This is a process known as TypeCasting. The Python code is:\n\n```\nprint(character\
    \ + \" is \" + str(age) + \" years old.\")\n```\n\nor you can use:\n\n```\nprint(character,\
    \ \"is\", age, \"years old.\")\n```\n\nNotice again that in the last example,\
    \ you don't need the spaces between the words in quotes as the commas treat each\
    \ argument to print separately.\n\n```\n>>> print(name + age)\nTraceback (most\
    \ recent call last):\n  File \"<pyshell#18>\", line 1, in <module>\n    print(name\
    \ + age)\nTypeError: Can't convert 'int' object to str implicitly\n>>> print(character\
    \ + \" is \" + str(age) + \" years old.\")\nDavid Hayward: Descended from Vikings\
    \ is 44 years old.\n>>> print(character, \"is\", age, \"years old.\")\nDavid Hayward:\
    \ Descended from Vikings is 44 years old.\n>>>\n```\n\n**STEP 7** Another example\
    \ of TypeCasting is when you ask for input from the user, such as a name. For\
    \ example, enter:\n\n```\nage= input(\"How old are you? \")\n```\n\nAll data stored\
    \ from the Input command is stored as a string variable.\n\n**STEP 8** This presents\
    \ a bit of a problem when you want to work with a number that's been inputted\
    \ by the user, as age + 10 won't work due to being a string variable and an integer.\
    \ Instead, you need to enter:\n\n```\nint(age) + 10\n```\n\nThis will TypeCast\
    \ the age string into an integer that can be worked with.\n\n**STEP 9** The use\
    \ of TypeCasting is also important when dealing with floating point arithmetic;\
    \ remember: numbers that have a decimal point in them. For example, enter:\n\n\
    ```\nshirt=19.99\n```\n\nNow enter `type(shirt)` and you'll see that Python has\
    \ allocated the number as a 'float', because the value contains a decimal point.\n\
    \n**STEP 10** When combining integers and floats Python usually converts the integer\
    \ to a float, but should the reverse ever be applied it's worth remembering that\
    \ Python doesn't return the exact value. When converting a float to an integer,\
    \ Python will always round down to the nearest integer, called truncating; in\
    \ our case instead of 19.99 it becomes 19."
  mdcn: "## 使用注释\n\n编写代码时，代码的流程、每个变量的作用、整个程序的运行方式等等，都只存在于你的脑海中。另一个程序员可以逐行阅读代码，但随着时间的推移，代码可能会变得难以阅读。\n\
    \n## 注释！\n\n程序员使用一种方法来保持代码的可读性，即对某些部分进行注释。例如，如果使用了一个变量，程序员会注释说明它的预期作用。这是一种良好的实践。\n\
    \n**步骤 1** 首先创建一个新的 IDLE 编辑器实例（文件 > 新建文件），并创建一个简单的变量和打印命令：\n\n```\na=10\nprint(\"\
    The value of A is,\", a)\n```\n\n保存文件并执行代码。\n\n**步骤 2** 运行代码将在 IDLE Shell 窗口中返回一行：The\
    \ value of A is, 10，这正是我们预期的结果。现在，添加一些你通常在代码中看到的注释类型：\n\n```\n# Set the start\
    \ value of A to 10\na=10\n# Print the current value of A\nprint(\"The value of\
    \ A is,\", a)\n```\n\n**步骤 3** 重新保存代码并执行它。你可以看到，尽管添加了额外的行，IDLE Shell 中的输出仍然与之前相同。简单来说，井号（#）表示程序员可以插入一行文本，以告知自己和其他人代码的运行情况，而用户不会察觉。\n\
    \n**步骤 4** 假设我们创建的变量 A 是游戏中生命数。每次玩家死亡，该值就减少 1。程序员可以插入类似这样的代码：\n\n```\na=a-1\n\
    print(\"You've just lost a life!\")\nprint(\"You now have\", a, \"lives left!\"\
    )\n```\n\n**步骤 5** 虽然我们知道变量 A 代表生命数，并且玩家刚刚失去一条命，但一个随意的查看者或检查代码的人可能不知道。想象一下，如果代码有两万行，而不是我们这七行。你就能看出注释有多方便了。\n\
    \n**步骤 6** 本质上，带有注释的新代码可能如下所示：\n\n```\n# Set the start value of A to 10\na=10\n\
    # Print the current value of A\nprint(\"The value of A is, \", a)\n# Player lost\
    \ a life!\na=a-1\n# Inform player, and display current value of A (lives)\nprint(\"\
    You've just lost a life!\")\nprint(\"You now have\", a, \"lives left!\")\n```\n\
    \n**步骤 7** 你可以以不同的方式使用注释。例如，块注释是大段的文本，详细说明代码中发生的事情，比如告诉代码阅读者你计划使用哪些变量：\n\n```\n\
    # This is the best game ever, and has been\n# developed by a crack squad of Python\
    \ experts\n# who haven't slept or washed in weeks. Despite\n# being very smelly,\
    \ the code at least\n# works really well.\n```\n\n**步骤 8** 行内注释是跟在代码段后面的注释。以我们上面的例子为例，我们不是将注释放在单独的行上，而是可以使用：\n\
    \n```\na=10 # Set the start value of A to 10\nprint(\"The value of A is, \", a)\
    \ # Print the current value of A\na=a-1 # Player lost a life!\nprint(\"You've\
    \ just lost a life!\")\nprint(\"You now have\", a, \"lives left!\") # Inform player,\
    \ and display current value of A (lives)\n```\n\n**步骤 9** 注释符号（井号）也可以用来注释掉你不想在程序中执行的代码段。例如，如果你想移除第一个打印语句，你可以使用：\n\
    \n```\n# print(\"The value of A is, \", a)\n```\n\n**步骤 10** 你也可以使用三个单引号来注释掉一个块注释或多行注释。将它们放在你想要注释的区域的前后即可生效：\n\
    \n```\n'''\nThis is the best game ever, and has been developed\nby a crack squad\
    \ of Python experts who haven't\nslept or washed in weeks. Despite being very\n\
    smelly, the code at least works really well.\n'''\n```\n\n## 使用变量\n\n我们已经在 Python\
    \ 代码中看到了一些变量的例子，但回顾一下它们的工作方式以及 Python 如何创建变量并为其赋值总是值得的。\n\n## 各种变量\n\n在本教程中，你将使用\
    \ Python 3 IDLE Shell。如果你还没有打开，请打开 Python 3 或关闭之前的 IDLE Shell 以清除任何旧代码。\n\n**步骤\
    \ 1** 在某些编程语言中，你需要使用美元符号来表示字符串，字符串是由多个字符组成的变量，例如一个人的名字。在 Python 中这没有必要。例如，在 Shell\
    \ 中输入：`name=\"David Hayward\"`（或使用你自己的名字，除非你也叫 David Hayward）。\n\n**步骤 2** 你可以通过发出\
    \ `type()` 命令来检查正在使用的变量类型，将变量名放在括号内。在我们的例子中，这将是：`type(name)`。添加一个新的字符串变量：`title=\"\
    Descended from Vikings\"`。\n\n**步骤 3** 你之前已经看到，变量可以使用变量名之间的加号进行连接。在我们的例子中，我们可以使用：`print(name\
    \ + \": \" + title)`。引号之间的中间部分允许我们添加一个冒号和一个空格，因为变量连接时没有空格，所以我们需要手动添加它们。\n\n**步骤\
    \ 4** 你也可以将变量组合到另一个变量中。例如，要将 name 和 title 变量组合成一个新变量，我们使用：\n\n```\ncharacter=name\
    \ + \": \" + title\n```\n\n然后输出新变量的内容：\n\n```\nprint(character)\n```\n\n数字存储为不同的变量：\n\
    \n```\nage=44\ntype(age)\n```\n\n我们知道，这是整数。\n\n**步骤 5** 然而，你不能像处理一组相似变量那样，在同一个命令中组合字符串和整数类型的变量。你需要将其中一个转换为另一个，反之亦然。当你尝试同时组合两者时，你会得到一条错误消息：\n\
    \n```\nprint(name + age)\n```\n\n**步骤 6** 这个过程被称为类型转换。Python 代码是：\n\n```\nprint(character\
    \ + \" is \" + str(age) + \" years old.\")\n```\n\n或者你可以使用：\n\n```\nprint(character,\
    \ \"is\", age, \"years old.\")\n```\n\n再次注意，在最后一个例子中，你不需要在引号内的单词之间添加空格，因为逗号将 print\
    \ 的每个参数视为单独处理。\n\n```\n>>> print(name + age)\nTraceback (most recent call last):\n\
    \  File \"<pyshell#18>\", line 1, in <module>\n    print(name + age)\nTypeError:\
    \ Can't convert 'int' object to str implicitly\n>>> print(character + \" is \"\
    \ + str(age) + \" years old.\")\nDavid Hayward: Descended from Vikings is 44 years\
    \ old.\n>>> print(character, \"is\", age, \"years old.\")\nDavid Hayward: Descended\
    \ from Vikings is 44 years old.\n>>>\n```\n\n**步骤 7** 类型转换的另一个例子是当你向用户请求输入时，例如姓名。例如，输入：\n\
    \n```\nage= input(\"How old are you? \")\n```\n\n从 Input 命令存储的所有数据都作为字符串变量存储。\n\
    \n**步骤 8** 当你想处理用户输入的数字时，这会带来一点问题，因为 age + 10 无法工作，原因是它是一个字符串变量和一个整数。相反，你需要输入：\n\
    \n```\nint(age) + 10\n```\n\n这将把 age 字符串类型转换为可以使用的整数。\n\n**步骤 9** 在处理浮点数运算时，类型转换的使用也很重要；记住：带有小数点的数字。例如，输入：\n\
    \n```\nshirt=19.99\n```\n\n现在输入 `type(shirt)`，你会看到 Python 将该数字分配为 'float'，因为该值包含一个小数点。\n\
    \n**步骤 10** 当组合整数和浮点数时，Python 通常会将整数转换为浮点数，但如果反过来应用，值得记住的是 Python 不会返回精确值。当将浮点数转换为整数时，Python\
    \ 总是向下舍入到最接近的整数，称为截断；在我们的例子中，19.99 变成了 19。"
