    \ in chosen_word:\n```\n\nJava 是一种强大的语言，用于网页、机顶盒、电视甚至汽车。\n\nPython 是对 BASIC 的一种更现代的诠释，它易于学习，是理想的初学者编程语言。\n\
    \n# 你将需要的设备\n\n你可以用很少的硬件或初始财务投资来学习 Python。你不需要一台功能极其强大的计算机，任何所需的软件都是免费可用的。\n\n\
    ## 我们使用的工具\n\n值得庆幸的是，Python 是一种多平台编程语言，适用于 Windows、macOS、Linux、Raspberry Pi 等。如果你拥有其中一种系统，那么你可以轻松开始使用\
    \ Python。\n\n![](img/588364e02a77f179099fae91a1713f0a_9_0.png)\n\n## 计算机\n\n显然，你需要一台计算机来学习如何用\
    \ Python 编程并测试你的代码。你可以使用 Windows（从 XP 开始）在 32 位或 64 位处理器上，或者使用 Apple Mac 或安装了\
    \ Linux 的 PC。\n\n## IDE\n\nIDE（集成开发环境）用于输入和执行 Python 代码。它使你能够检查程序代码和代码中的值，并提供高级功能。有许多不同的\
    \ IDE 可用，因此请找到适合你并能提供最佳结果的 IDE。\n\n## Python 软件\n\nmacOS 和 Linux 已经预装了 Python\
    \ 作为操作系统的一部分，Raspberry Pi 也是如此。但是，你需要确保你运行的是最新版本的 Python。Windows 用户需要下载并安装 Python，我们稍后会介绍。\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_9_1.png)\n\n## 文本编辑器\n\n虽然文本编辑器是输入代码的理想环境，但它不是绝对必要的。你可以直接从\
    \ IDLE 输入和执行代码，但文本编辑器（如 Sublime Text 或 Notepad++）在输入代码时提供更多高级功能和颜色编码。\n\n## 互联网访问\n\
    \nPython 是一个不断发展的环境，因此新版本通常会引入新概念或更改现有命令和代码结构，使其成为更高效的语言。访问互联网将使你保持最新状态，在你遇到困难时提供帮助，并提供对\
    \ Python 海量模块的访问。\n\n![](img/588364e02a77f179099fae91a1713f0a_9_2.png)\n\n## 时间和耐心\n\
    \n尽管其他书籍可能让你相信，但你不会在 24 小时内成为一名程序员。学习用 Python 编程需要时间和耐心。你有时可能会卡住，有时代码会像流水一样顺畅。要明白你正在学习全新的东西，你最终会成功的。\n\
    \n## 树莓派\n\n为什么使用树莓派？树莓派是一台微型计算机，购买价格非常便宜，但为用户提供了一个极好的学习平台。其主要操作系统 Raspbian 预装了最新的\
    \ Python 以及许多模块和附加组件。\n\n## 树莓派\n\n树莓派 3 是最新版本，集成了更强大的 CPU、更多内存、Wi-Fi 和蓝牙支持。你可以花大约\
    \ 32 英镑购买一个 Pi，或者作为套件的一部分购买，价格在 50 英镑以上，具体取决于你感兴趣的套件。\n\n![](img/588364e02a77f179099fae91a1713f0a_10_0.png)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_10_1.png)\n\n## FUZE 项目\n\nFUZE 是一个基于最新款树莓派构建的学习环境。你可以购买带有电子套件甚至机械臂的工作站，供你构建和编程。你可以在\
    \ www.fuze.co.uk 上找到更多关于 FUZE 的信息。\n\n## Raspbian\n\n树莓派的主要操作系统是一个基于 Debian 的\
    \ Linux 发行版，它在一个易于使用的软件包中提供了你需要的一切。它为 Pi 进行了优化，是硬件和软件项目、Python 编程甚至作为台式计算机的理想平台。\n\
    \n## 书籍\n\n我们通过 www.bdmpublications.com 提供几本优秀的编程书籍。我们的 Pi 书籍涵盖了如何购买你的第一个树莓派、设置和使用它；还有一些很棒的分步项目示例和指南，帮助你充分利用树莓派。\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_10_2.png)\n\n![](img/588364e02a77f179099fae91a1713f0a_10_3.png)"
