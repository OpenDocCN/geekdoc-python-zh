    ## C++ 基础


    在本节中，你将开始理解 C++ 代码的结构以及如何编译和执行该代码。这些是 C++ 的基础知识，教你诸如使用注释、变量、数据类型、字符串以及如何使用 C++
    数学运算等基础内容。


    这些是 C++ 程序的构建块。有了它们，你可以构建自己的代码，向屏幕输出内容，并存储和检索数据。


