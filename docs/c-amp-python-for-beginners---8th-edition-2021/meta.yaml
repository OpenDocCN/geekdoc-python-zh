    **步骤 8** 下一步询问在哪里为所有未来的代码创建 Git 仓库。在你的 Mac 上或网络位置选择一个位置，然后点击“创建”按钮。完成所有这些操作后，你就可以开始编码了。左侧窗格详细列出了你正在编写的
