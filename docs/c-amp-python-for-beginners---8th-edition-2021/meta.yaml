    步骤 9 如果你点击确定按钮，文件将被新的代码条目覆盖并执行，输出结果在 Shell 中。对于这几行代码来说这没什么问题，但如果你要编辑一个更大的文件，覆盖可能会成为一个问题。相反，请使用编辑器中的“文件
    > 另存为”来创建一个备份。


    ![](img/588364e02a77f179099fae91a1713f0a_26_3.png)


    步骤 7 如果你打开已保存的 Python 代码的文件位置，你会看到它以 .py 扩展名结尾。这是默认的 Python 文件名。你创建的任何代码都将是 whatever.py，从众多互联网
    Python 资源站点下载的任何代码也将是 .py。只需确保代码是为 Python 3 编写的。


    ![](img/588364e02a77f179099fae91a1713f0a_26_4.png)


    步骤 10 现在创建一个新文件。关闭编辑器，打开一个新的实例（从 Shell 中选择“文件 > 新建文件”）。输入以下内容并将其保存为 hello.py：


    ```

    a="Python"

    b="is"

    c="cool!"

    print(a, b, c)

    ```


    你将在下一个教程中使用这段代码。


    ![](img/588364e02a77f179099fae91a1713f0a_26_5.png)


    ## 从命令行执行代码


    尽管我们在本书中一直使用 GUI IDLE，但了解一下 Python 的命令行处理是值得的。我们已经知道有一个命令行版本的 Python，但它也用于执行代码。


    ### 命令代码


    使用我们在上一个教程中创建的代码，也就是我们命名为 hello.py 的那个，让我们看看如何在命令行级别运行在 GUI 中创建的代码。


    **步骤 1** 在 Linux 中，Python 有两种通过命令行执行代码的可能方式。一种方式是使用 Python 2，而另一种使用 Python 3 库等等。不过首先，进入你操作系统上的命令行或终端。


    **步骤 3** 现在你在命令行中，我们可以启动 Python。对于 Python 3，你需要输入命令 `python3` 并按回车键。这将把你带入命令行版本的
    Shell，熟悉的三个向右箭头作为光标（>>>）。


    ![](img/588364e02a77f179099fae91a1713f0a_27_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_27_1.png)


    **步骤 2** 和之前一样，我们使用的是树莓派；Windows 用户需要点击开始按钮并搜索 CMD，然后点击搜索到的命令行；macOS 用户可以通过点击“前往
    > 实用工具 > 终端”来访问他们的命令行。


    ![](img/588364e02a77f179099fae91a1713f0a_27_2.png)


    **步骤 4** 从这里你可以输入之前看过的代码，例如：


    ```

    python

    a=2

    print(a)

    ```


    你可以看到它的工作方式完全相同。


    ![](img/588364e02a77f179099fae91a1713f0a_27_3.png)


    步骤 5 现在输入：exit() 以离开命令行 Python 会话并返回到命令提示符。进入你保存上一个教程代码的文件夹，并列出其中可用的文件；你应该能看到
    hello.py 文件。


    ![](img/588364e02a77f179099fae91a1713f0a_28_0.png)


    步骤 8 从 Python 2 命令行运行 Python 3 代码的结果是相当明显的。虽然它没有以任何方式报错，但由于 Python 3 处理 Print
    命令的方式与 Python 2 不同，结果并非我们所预期的。暂时使用 Sublime，打开 hello.py 文件。


    ![](img/588364e02a77f179099fae91a1713f0a_28_1.png)


    步骤 6 在与你要运行的代码相同的文件夹内，在命令行中输入以下内容：


    ```

    python3 hello.py

    ```


    这将执行我们创建的代码，提醒你一下，代码是：


    ```

    a="Python"

    b="is"

    c="cool!"

    print(a, b, c)

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_28_2.png)


    步骤 9 由于 Sublime Text 不适用于树莓派，你将暂时离开树莓派，使用 Sublime 作为一个例子，说明你不一定需要使用 Python IDLE。打开
    hello.py 文件，将其修改为包含以下内容：


    ```

    name=input("What is your name? ")

    print("Hello,", name)

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_28_3.png)


    步骤 7 自然，由于这是 Python 3 代码，使用了 Python 3 独有的语法和布局，它只有在你使用 python3 命令时才有效。如果你愿意，可以尝试使用
    Python 2 输入以下内容：


    ```

    python hello.py

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_28_4.png)


    步骤 10 保存 hello.py 文件并返回到命令行。现在使用以下命令执行新保存的代码：


    ```

    python3 hello.py

    ```


    结果将是原始的 Python is cool! 语句，加上添加的 input 命令，该命令会询问你的名字，并在命令窗口中显示它。


    ![](img/588364e02a77f179099fae91a1713f0a_28_5.png)


    ## 数字和表达式


    我们已经看到了一些使用 Python 的基本数学表达式，比如简单的加法等等。现在让我们扩展一下，看看 Python 作为计算器有多么强大。你可以在 IDLE
    Shell 或编辑器中工作，随你喜欢。


    ### 这都是数学，伙计


    你可以利用 Python 的数学能力获得一些非常令人印象深刻的结果；与大多数（如果不是全部）编程语言一样，数学是代码背后的驱动力。


    **步骤 1** 打开 Python 3 的 GUI 版本，如前所述，你可以使用 Shell 或编辑器。目前，你将使用 Shell 来热身我们的数学肌肉，我们相信这是位于大脑后部的一个小腺体（或者不是）。


    **步骤 3** 你可以使用所有常见的数学运算：除法、乘法、括号等等。用几个例子练习一下，例如：


    ```

    1/2

    6/2

    2+2*3

    (1+2)+(3*4)

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_29_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_29_1.png)


    **步骤 2** 在 Shell 中输入以下内容：


    ```

    2+2

    54356+34553245

    99867344*27344484221

    ```


    你可以看到 Python 可以处理一些相当大的数字。


    **步骤 4** 你无疑已经注意到，除法会产生一个十进制数。在 Python 中，这些被称为浮点数或浮点运算。但是，如果你需要一个整数而不是十进制答案，那么你可以使用双斜杠：


    ```

    1//2

    6//2

    ```


    等等。


    ![](img/588364e02a77f179099fae91a1713f0a_29_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_29_3.png)


    步骤 5 你还可以使用一个运算来查看除法后剩下的余数。例如：


    ```

    10/3

    ```


    将显示 3.333333333，这当然是 3.3 循环。如果你现在输入：


    ```

    10%3

    ```


    这将显示 1，这是 10 除以 3 后剩下的余数。


    ![](img/588364e02a77f179099fae91a1713f0a_30_0.png)


    步骤 8 这将显示为 ''0b11''，将整数转换为二进制并在前面添加前缀 0b。如果你想移除 0b 前缀，那么你可以使用：


    ```

    format(3, ''b'')

    ```


    Format 命令将一个值（数字 3）转换为由格式规范（''b'' 部分）控制的格式化表示。


    ![](img/588364e02a77f179099fae91a1713f0a_30_1.png)


    步骤 6 接下来我们有幂运算符，或者如果你要技术一点的话，叫乘方。要计算某物的幂，你可以使用键盘上的双乘号或双星号：


    ```

    2**3

    10**10

    ```


    本质上，它是 2x2x2，但我们相信你已经知道数学运算符背后的基础知识。这就是你在 Python 中计算它的方式。


    ![](img/588364e02a77f179099fae91a1713f0a_30_2.png)


    步骤 9 布尔表达式是一个逻辑语句，它要么为真，要么为假。我们可以用它们来比较数据并测试它是否等于、小于或大于。在新文件中尝试这个：


    ```

    a = 6

    b = 7

    print(1, a == 6)

    print(2, a == 7)

    print(3, a == 6 and b == 7)

    print(4, a == 7 and b == 7)

    print(5, not a == 7 and b == 7)

    print(6, a == 7 or b == 7)

    print(7, a == 7 or b == 6)

    print(8, not (a == 7 and b == 6))

    print(9, not a == 7 and b == 6)

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_30_3.png)


    步骤 7 数字和表达式不止于此。Python 有许多内置函数来计算数字集合、绝对值、复数以及大量的数学表达式和毕达哥拉斯绕口令。例如，要将一个数字转换为二进制，请使用：


    ```

    bin(3)

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_30_4.png)


    步骤 10 执行步骤 9 中的代码，你可以看到一系列 True 或 False 语句，这取决于两个定义值 6 和 7 的结果。这是你所学内容的延伸，也是编程的重要组成部分。


    ![](img/588364e02a77f179099fae91a1713f0a_30_5.png)'
