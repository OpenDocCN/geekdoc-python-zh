    \ 4Dh\nDEFB 32h, 4Ch, 99h, 32h, 5Bh, 5Ch, 32h, 5Bh, 57h, 32h, 33h, 0Dh, 32h, 33h\n\
    DEFB 32h, 33h, 32h, 33h, 32h, 33h, 32h, 33h, 32h, 33h, 32h, 33h, 32h, 33h\nDEFB\
    \ 66h, 67h, 32h, 72h, 73h, 4Ch, 4Dh, 4Dh, 32h, 66h, 67h, 66h, 67h, 66h\nDEFB 19h,\
    \ 80h, 0, 19h, 80h, 81h, 32h, 80h, 0CBh, 0FFh\n;\nT855C:\nDEFB 80h, 72h, 66h,\
    \ 60h, 56h, 66h, 56h, 56h, 51h, 56h, 51h, 51h, 56h, 66h\nDEFB 56h, 56h, 80h, 72h,\
