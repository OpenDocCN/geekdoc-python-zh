    \ import Hello\n\nHello(\"David\")\n```\n\nPress F5 to save and execute the code.\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_38_3.png)\n\nSTEP 2 Let's now expand\
    \ the function to accept a variable, the user's name for example. Edit your script\
    \ to read:\n\n```\ndef Hello(name):\n    print (\"Hello\", name)\n\nHello(\"David\"\
    )\n```\n\nThis will now accept the variable name, otherwise it prints Hello David.\
    \ In the Shell, enter: name=(\"Bob\"), then: Hello(name). Your function can now\
    \ pass variables through it.\n\n![](img/588364e02a77f179099fae91a1713f0a_38_4.png)\n\
    \nSTEP 4 What you've just done is import the Hello function from the saved Hello.py\
    \ program and then used it to say hello to David. This is how modules and functions\
    \ work: you import the module then use the function. Try this one, and modify\
    \ it for extra credit:\n\n```\ndef add(a, b):\n    result = a + b\n    return\
    \ result\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_38_5.png)"
- md: "## Conditions and Loops\n\nConditions and loops are what makes a program interesting;\
    \ they can be simple or rather complex. How you use them depends greatly on what\
    \ the program is trying to achieve; they could be the number of lives left in\
    \ a game or just displaying a countdown.\n\n## TRUE CONDITIONS\n\nKeeping conditions\
    \ simple to begin with makes learning to program a more enjoyable experience.\
    \ Let's start then by checking if something is TRUE, then doing something else\
    \ if it isn't.\n\nSTEP 1 Let's create a new Python program that will ask the user\
    \ to input a word, then check it to see if it's a four-letter word or not. Start\
    \ with File > New File, and begin with the input variable:\nword=input(\"Please\
    \ enter a four-letter word: \")\n\n![](img/588364e02a77f179099fae91a1713f0a_39_0.png)\n\
    \nSTEP 2 Now we can create a new variable, then use the len function and pass\
    \ the word variable through it to get the total number of letters the user has\
    \ just entered:\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_39_2.png)\n\nSTEP 3 Now you can use\
    \ an if statement to check if the word_length variable is equal to four and print\
    \ a friendly confirmation if it applies to the rule:\nword=input(\"Please enter\
    \ a four-letter word: \")\nword_length=len(word)\nif word_length == 4:\n    print\
    \ (word, \"is a four-letter word. Well done.\")\nThe double equal sign (==) means\
    \ check if something is equal to something else.\n\n![](img/588364e02a77f179099fae91a1713f0a_39_1.png)\n\
    \nSTEP 4 The colon at the end of IF tells Python that if this statement is true\
    \ do everything after the colon that's indented. Next, move the cursor back to\
    \ the beginning of the Editor:\nword=input(\"Please enter a four-letter word:\
    \ \")\nword_length=len(word)\nif word_length == 4:\n    print (word, \"is a four-letter\
    \ word. Well done.\")\nelse:\n    print (word, \"is not a four-letter word.\"\
    )\n\n![](img/588364e02a77f179099fae91a1713f0a_39_3.png)\n\nSTEP 5 Press F5 and\
    \ save the code to execute it. Enter a four-letter word in the Shell to begin\
    \ with, you should have the returned message that it's the word is four letters.\
    \ Now press F5 again and rerun the program but this time enter a five-letter word.\
    \ The Shell will display that it's not a four-letter word.\n\nSTEP 6 Now expand\
    \ the code to include another condition. Eventually, it could become quite complex.\
    \ We've added a condition for three-letter words:\n\n```\nword=input(\"Please\
    \ enter a four-letter word: \")\nword_length=len(word)\nif word_length == 4:\n\
    \    print (word, \"is a four-letter word. Well done.\")\nelif word_length ==\
    \ 3:\n    print (word, \"is a three-letter word. Try again.\")\nelse:\n    print\
    \ (word, \"is not a four-letter word.\")\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_40_0.png)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_40_1.png)\n\n## LOOPS\n\nA loop looks\
    \ quite similar to a condition but they are somewhat different in their operation.\
    \ A loop will run through the same block of code a number of times, usually with\
    \ the support of a condition.\n\nSTEP 1 Let's start with a simple While statement.\
    \ Like IF, this will check to see if something is TRUE, then run the indented\
    \ code:\n\n```\nx = 1\nwhile x < 10:\n    print (x)\n    x = x + 1\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_40_2.png)\n\
    \nSTEP 2 The difference between if and while is when while gets to the end of\
    \ the indented code, it goes back and checks the statement is still true. In our\
    \ example x is less than 10. With each loop it prints the current value of x,\
    \ then adds one to that value. When x does eventually equal 10 it stops.\n\nSTEP\
    \ 3 The For loop is another example. For is used to loop over a range of data,\
    \ usually a list stored as variables inside square brackets. For example:\n\n\
    ```\nwords=[\"Cat\", \"Dog\", \"Unicorn\"]\nfor word in words:\n    print (word)\n\
    ```\n\n![](img/588364e02a77f179099fae91a1713f0a_40_3.png)\n\nSTEP 4 The For loop\
    \ can also be used in the countdown example by using the range function:\n\n```\n\
    for x in range (1, 10):\n    print (x)\n```\n\nThe x=x+1 part isn't needed here\
    \ because the range function creates a list between the first and last numbers\
    \ used.\n\n![](img/588364e02a77f179099fae91a1713f0a_40_4.png)\n\n![](img/588364e02a77f179099fae91a1713f0a_40_5.png)\n\
    \n## Python Modules\n\nWe've mentioned modules previously, (the Math module) but\
    \ as modules are such a large part of getting the most from Python, it's worth\
    \ dedicating a little more time to them. In this instance we're using the Windows\
    \ version of Python 3.\n\n## MASTERING MODULES\n\nThink of modules as an extension\
    \ that's imported into your Python code to enhance and extend its capabilities.\
    \ There are countless modules available and as we've seen, you can even make your\
    \ own.\n\nSTEP 1 Although good, the built-in functions within Python are limited.\
    \ The use of modules, however, allows us to make more sophisticated programs.\
    \ As you are aware, modules are Python scripts that are imported, such as import\
    \ math.\n\nSTEP 2 Some modules, especially on the Raspberry Pi, are included by\
    \ default, the math module being a prime example. Sadly, other modules aren't\
    \ always available. A good example on non-Pi platforms is the pygame module, which\
    \ contains many functions to help create games. Try: `import pygame`.\n\nSTEP\
    \ 3 The result is an error in the IDLE Shell, as the pygame module isn't recognised\
    \ or installed in Python. To install a module we can use PIP (Pip Installs Packages).\
    \ Close down the IDLE Shell and drop into a command prompt or Terminal session.\
    \ At an elevated admin command prompt, enter: `pip install pygame`\n\n![](img/588364e02a77f179099fae91a1713f0a_41_0.png)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_41_1.png)\n\nSTEP 4 The PIP installation\
    \ requires an elevated status due it installing components at different locations.\
    \ Windows users can search for CMD via the Start button and right-click the result\
    \ then click Run as Administrator. Linux and Mac users can use the Sudo command,\
    \ with sudo pip install package.\n\n![](img/588364e02a77f179099fae91a1713f0a_41_2.png)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_41_3.png)\n\nSTEP 5 Close the command\
    \ prompt or Terminal and relaunch the IDLE Shell. When you now enter: `import\
    \ pygame`, the module will be imported into the code without any problems. You'll\
    \ find that most code downloaded or copied from the Internet will contain a module,\
    \ mainstream or unique, these are usually the source of errors in execution due\
    \ to them being missing.\n\n![](img/588364e02a77f179099fae91a1713f0a_42_0.png)\n\
    \nSTEP 6 The modules contain the extra code needed to achieve a certain result\
    \ within your own code, as we've previously experimented with. For example:\n\n\
    ```\nimport random\n```\n\nBrings in the code from the random number generator\
    \ module. You can then use this module to create something like:\n\n```\nfor i\
    \ in range(10):\n    print(random.randint(1, 25))\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_2.png)\n\
    \nSTEP 7 This code, when saved and executed, will display ten random numbers from\
    \ 1 to 25. You can play around with the code to display more or less, and from\
    \ a greater or lesser range. For example:\n\n```\nimport random\n\nfor i in range(25):\n\
    \    print(random.randint(1, 100))\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_4.png)\n\
    \nSTEP 8 Multiple modules can be imported within your code. To extend our example,\
    \ use:\n\n```\nimport random\nimport math\n\nfor i in range(5):\n    print(random.randint(1,\
    \ 25))\n\nprint(math.pi)\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_1.png)\n\
    \nSTEP 9 The result is a string of random numbers followed by the value of Pi\
    \ as pulled from the math module using the `print(math.pi)` function. You can\
    \ also pull in certain functions from a module by using the from and import commands,\
    \ such as:\n\n```\nfrom random import randint\n\nfor i in range(5):\n    print(randint(1,\
    \ 25))\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_3.png)\n\nSTEP 10 This\
    \ helps create a more streamlined approach to programming. You can also use `import\
    \ module*`, which will import everything defined within the named module. However,\
    \ it's often regarded as a waste of resources but it works nonetheless. Finally,\
    \ modules can be imported as aliases:\n\n```\nimport math as m\n\nprint(m.pi)\n\
    ```\n\nOf course, adding comments helps to tell others what's going on.\n\n![](img/588364e02a77f179099fae91a1713f0a_42_5.png)"
  mdcn: "## 条件与循环\n\n条件与循环是让程序变得有趣的关键；它们可以很简单，也可以相当复杂。如何使用它们很大程度上取决于程序想要实现的目标；它们可以是游戏中剩余的生命数，或者仅仅是一个倒计时显示。\n\
    \n## 真值条件\n\n从简单的条件开始，能让学习编程的过程更加愉快。那么，让我们从检查某件事是否为**真**开始，如果不是，则执行其他操作。\n\n步骤\
    \ 1 让我们创建一个新的 Python 程序，它将要求用户输入一个单词，然后检查它是否是一个四字母单词。从“文件 > 新建文件”开始，并从 `input`\
    \ 变量开始：\n`word=input(\"Please enter a four-letter word: \")`\n\n![](img/588364e02a77f179099fae91a1713f0a_39_0.png)\n\
    \n步骤 2 现在我们可以创建一个新变量，然后使用 `len` 函数并将 `word` 变量传递给它，以获取用户刚刚输入的字母总数：\n`word=input(\"\
    Please enter a four-letter word: \")`\n`word_length=len(word)`\n\n![](img/588364e02a77f179099fae91a1713f0a_39_2.png)\n\
    \n步骤 3 现在你可以使用 `if` 语句来检查 `word_length` 变量是否等于四，如果符合规则，则打印一条友好的确认信息：\n`word=input(\"\
    Please enter a four-letter word: \")`\n`word_length=len(word)`\n`if word_length\
    \ == 4:`\n`    print (word, \"is a four-letter word. Well done.\")`\n双等号 (`==`)\
    \ 表示检查某物是否等于另一物。\n\n![](img/588364e02a77f179099fae91a1713f0a_39_1.png)\n\n步骤 4\
    \ `IF` 末尾的冒号告诉 Python，如果此语句为真，则执行冒号后所有缩进的内容。接下来，将光标移回编辑器的开头：\n`word=input(\"Please\
    \ enter a four-letter word: \")`\n`word_length=len(word)`\n`if word_length ==\
    \ 4:`\n`    print (word, \"is a four-letter word. Well done.\")`\n`else:`\n` \
    \   print (word, \"is not a four-letter word.\")`\n\n![](img/588364e02a77f179099fae91a1713f0a_39_3.png)\n\
    \n步骤 5 按 F5 并保存代码以执行它。首先在 Shell 中输入一个四字母单词，你应该会收到返回的消息，表明该单词是四个字母。现在再次按 F5 并重新运行程序，但这次输入一个五字母单词。Shell\
    \ 将显示它不是一个四字母单词。\n\n步骤 6 现在扩展代码以包含另一个条件。最终，它可能变得相当复杂。我们添加了一个针对三字母单词的条件：\n\n```\n\
    word=input(\"Please enter a four-letter word: \")\nword_length=len(word)\nif word_length\
    \ == 4:\n    print (word, \"is a four-letter word. Well done.\")\nelif word_length\
    \ == 3:\n    print (word, \"is a three-letter word. Try again.\")\nelse:\n   \
    \ print (word, \"is not a four-letter word.\")\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_40_0.png)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_40_1.png)\n\n## 循环\n\n循环看起来与条件非常相似，但它们在操作上有些不同。循环会多次运行同一段代码块，通常是在条件的支持下。\n\
    \n步骤 1 让我们从一个简单的 `While` 语句开始。与 `IF` 类似，它将检查某件事是否为**真**，然后运行缩进的代码：\n\n```\nx =\
    \ 1\nwhile x < 10:\n    print (x)\n    x = x + 1\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_40_2.png)\n\
    \n步骤 2 `if` 和 `while` 之间的区别在于，当 `while` 到达缩进代码的末尾时，它会返回并检查语句是否仍然为真。在我们的例子中，`x`\
    \ 小于 10。每次循环时，它都会打印 `x` 的当前值，然后将该值加一。当 `x` 最终等于 10 时，它就会停止。\n\n步骤 3 `For` 循环是另一个例子。`For`\
    \ 用于遍历一系列数据，通常是存储在方括号内的变量列表。例如：\n\n```\nwords=[\"Cat\", \"Dog\", \"Unicorn\"]\n\
    for word in words:\n    print (word)\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_40_3.png)\n\
    \n步骤 4 `For` 循环也可以通过使用 `range` 函数用于倒计时示例：\n\n```\nfor x in range (1, 10):\n  \
    \  print (x)\n```\n\n这里不需要 `x=x+1` 部分，因为 `range` 函数在第一个和最后一个数字之间创建了一个列表。\n\n![](img/588364e02a77f179099fae91a1713f0a_40_4.png)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_40_5.png)\n\n## Python 模块\n\n我们之前提到过模块（Math\
    \ 模块），但由于模块是充分利用 Python 的重要组成部分，值得花更多时间来介绍它们。在这个例子中，我们使用的是 Windows 版本的 Python\
    \ 3。\n\n## 掌握模块\n\n将模块视为导入到你的 Python 代码中以增强和扩展其功能的扩展。有无数的模块可用，正如我们所看到的，你甚至可以制作自己的模块。\n\
    \n步骤 1 虽然很好，但 Python 内置的功能是有限的。然而，模块的使用使我们能够制作更复杂的程序。如你所知，模块是导入的 Python 脚本，例如\
    \ `import math`。\n\n步骤 2 一些模块，尤其是在树莓派上，默认就包含在内，`math` 模块就是一个主要例子。遗憾的是，其他模块并不总是可用。在非树莓派平台上的一个好例子是\
    \ `pygame` 模块，它包含许多帮助创建游戏的函数。尝试：`import pygame`。\n\n步骤 3 结果是在 IDLE Shell 中出现错误，因为\
    \ `pygame` 模块未被识别或未安装在 Python 中。要安装模块，我们可以使用 PIP（Pip Installs Packages）。关闭 IDLE\
    \ Shell 并进入命令提示符或终端会话。在提升权限的管理员命令提示符下，输入：`pip install pygame`\n\n![](img/588364e02a77f179099fae91a1713f0a_41_0.png)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_41_1.png)\n\n步骤 4 PIP 安装需要提升权限，因为它会在不同位置安装组件。Windows\
    \ 用户可以通过“开始”按钮搜索 CMD，然后右键单击结果并单击“以管理员身份运行”。Linux 和 Mac 用户可以使用 `Sudo` 命令，即 `sudo\
    \ pip install package`。\n\n![](img/588364e02a77f179099fae91a1713f0a_41_2.png)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_41_3.png)\n\n步骤 5 关闭命令提示符或终端并重新启动 IDLE\
    \ Shell。当你现在输入：`import pygame` 时，该模块将毫无问题地导入到代码中。你会发现大多数从互联网下载或复制的代码都会包含一个模块，无论是主流的还是独特的，这些通常是执行错误的来源，因为它们缺失了。\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_42_0.png)\n\n步骤 6 模块包含在你自己的代码中实现特定结果所需的额外代码，正如我们之前实验过的那样。例如：\n\
    \n```\nimport random\n```\n\n引入了来自随机数生成器模块的代码。然后你可以使用这个模块来创建类似这样的东西：\n\n```\n\
    for i in range(10):\n    print(random.randint(1, 25))\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_2.png)\n\
    \n步骤 7 此代码在保存并执行后，将显示十个从 1 到 25 的随机数。你可以调整代码以显示更多或更少的数字，以及从更大或更小的范围中获取。例如：\n\n\
    ```\nimport random\n\nfor i in range(25):\n    print(random.randint(1, 100))\n\
    ```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_4.png)\n\n步骤 8 可以在你的代码中导入多个模块。为了扩展我们的示例，使用：\n\
    \n```\nimport random\nimport math\n\nfor i in range(5):\n    print(random.randint(1,\
    \ 25))\n\nprint(math.pi)\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_1.png)\n\
    \n步骤 9 结果是一串随机数，后面跟着使用 `print(math.pi)` 函数从 `math` 模块中提取的 Pi 值。你也可以使用 `from` 和\
    \ `import` 命令从模块中引入特定函数，例如：\n\n```\nfrom random import randint\n\nfor i in range(5):\n\
    \    print(randint(1, 25))\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_3.png)\n\
    \n步骤 10 这有助于创建更精简的编程方法。你也可以使用 `import module*`，这将导入命名模块中定义的所有内容。然而，这通常被认为是浪费资源，但它仍然有效。最后，模块可以作为别名导入：\n\
    \n```\nimport math as m\n\nprint(m.pi)\n```\n\n当然，添加注释有助于告诉其他人发生了什么。\n\n![](img/588364e02a77f179099fae91a1713f0a_42_5.png)"
