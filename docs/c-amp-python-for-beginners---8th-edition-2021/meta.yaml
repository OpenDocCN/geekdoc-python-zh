    \ # check the input is a letter. Also checks a\n            print(\"That is not\
    \ a letter. Please try again.\")\n            continue\n        elif len(player_guess)\
    \ > 1: # check the input is only one letter\n            print(\"That is more\
    \ than one letter. Please try again.\")\n            continue\n        elif player_guess\
    \ in guessed_letters: # check it letter hasn't been guessed\n            print(\"\
    You have already guessed that letter. Please try again.\")\n            continue\n\
    \        else:\n            pass\n\n    guessed_letters.append(player_guess)\n\
    \n    for letter in range(len(chosen_word)):\n        if player_guess == chosen_word[letter]:\n\
    \            word_guessed[letter] = player_guess # replace all letters in the\
    \ chosen\n\n    if player_guess not in chosen_word:\n```\n\nJava is a powerful\
    \ language that's used in web pages, set-top boxes, TVs and even cars.\n\nPython\
    \ is a more modern take on BASIC, it's easy to learn and makes for an ideal beginner's\
    \ programming language.\n\n# Equipment You Will Need\n\nYou can learn Python with\
    \ very little hardware or initial financial investment. You don't need an incredibly\
    \ powerful computer and any software that's required is freely available.\n\n\
    ## WHAT WE'RE USING\n\nThankfully, Python is a multi-platform programming language\
    \ available for Windows, macOS, Linux, Raspberry Pi and more. If you have one\
    \ of those systems, then you can easily start using Python.\n\n![](img/588364e02a77f179099fae91a1713f0a_9_0.png)\n\
    \n## COMPUTER\n\nObviously you're going to need a computer in order to learn how\
    \ to program in Python and to test your code. You can use Windows (from XP onward)\
    \ on either a 32 or 64-bit processor, an Apple Mac or Linux installed PC.\n\n\
    ## AN IDE\n\nAn IDE (Integrated Developer Environment) is used to enter and execute\
    \ Python code. It enables you to inspect your program code and the values within\
    \ the code, as well as offering advanced features. There are many different IDEs\
    \ available, so find the one that works for you and gives the best results.\n\n\
    ## PYTHON SOFTWARE\n\nmacOS and Linux already come with Python preinstalled as\
    \ part of the operating system, as does the Raspberry Pi. However, you need to\
    \ ensure that you're running the latest version of Python. Windows users need\
    \ to download and install Python, which we'll cover shortly.\n\n![](img/588364e02a77f179099fae91a1713f0a_9_1.png)\n\
    \n## TEXT EDITOR\n\nWhilst a text editor is an ideal environment to enter code\
    \ into, it's not an absolute necessity. You can enter and execute code directly\
    \ from the IDLE but a text editor, such as Sublime Text or Notepad++, offers more\
    \ advanced features and colour coding when entering code.\n\n## INTERNET ACCESS\n\
    \nPython is an ever evolving environment and as such new versions often introduce\
    \ new concepts or change existing commands and code structure to make it a more\
    \ efficient language. Having access to the Internet will keep you up-to-date,\
    \ help you out when you get stuck and give access to Python's immense number of\
    \ modules.\n\n![](img/588364e02a77f179099fae91a1713f0a_9_2.png)\n\n## TIME AND\
    \ PATIENCE\n\nDespite what other books may lead you to believe, you won't become\
    \ a programmer in 24-hours. Learning to code in Python takes time, and patience.\
    \ You may become stuck at times and other times the code will flow like water.\
    \ Understand you're learning something entirely new, and you will get there.\n\
    \n## THE RASPBERRY PI\n\nWhy use a Raspberry Pi? The Raspberry Pi is a tiny computer\
    \ that’s very cheap to purchase but offers the user a fantastic learning platform.\
    \ Its main operating system, Raspbian, comes preinstalled with the latest Python\
    \ along with many Modules and extras.\n\n## RASPBERRY PI\n\nThe Raspberry Pi 3\
    \ is the latest version, incorporating a more powerful CPU, more memory, Wi-Fi\
    \ and Bluetooth support. You can pick up a Pi for around £32 or as a part of kit\
    \ for £50+, depending on the kit you’re interested in.\n\n![](img/588364e02a77f179099fae91a1713f0a_10_0.png)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_10_1.png)\n\n## FUZE PROJECT\n\nThe\
    \ FUZE is a learning environment built on the latest model of the Raspberry Pi.\
    \ You can purchase the workstations that come with an electronics kit and even\
    \ a robot arm for you to build and program. You can find more information on the\
    \ FUZE at www.fuze.co.uk.\n\n## RASPBIAN\n\nThe Raspberry Pi’s main operating\
    \ system is a Debian-based Linux distribution that comes with everything you need\
    \ in a simple to use package. It’s streamlined for the Pi and is an ideal platform\
    \ for hardware and software projects, Python programming and even as a desktop\
    \ computer.\n\n## BOOKS\n\nWe have several great coding titles available via www.bdmpublications.com.\
    \ Our Pi books cover how to buy your first Raspberry Pi, set it up and use it;\
    \ there are some great step-by-step project examples and guides to get the most\
    \ from the Raspberry Pi too.\n\n![](img/588364e02a77f179099fae91a1713f0a_10_2.png)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_10_3.png)"
