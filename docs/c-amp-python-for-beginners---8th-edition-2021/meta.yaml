  md: '# OS SPECIFIC NEEDS


    C++ will work in any operating system but getting all the necessary pieces together
    can be confusing to a newcomer. Here are some OS specifics for C++.


    # LINUX


    Linux users are lucky in that they already have a compiler and text editor built
    into their operating system. Any text editor allows you to type out your C++ code,
    when it''s saved with a .cpp extension, use g++ to compile it.


    ![](img/588364e02a77f179099fae91a1713f0a_48_0.png)


    # WINDOWS


    We have mentioned previously that a good IDE is Microsoft''s Visual Studio. However,
    a better IDE and compiler is Code::Blocks, which is regularly kept up to date
    with a new release twice a year. Otherwise Windows users can enter their code
    in Notepad++, then compile it with MinGW as used by Code::Blocks.


    ![](img/588364e02a77f179099fae91a1713f0a_48_1.png)


    # RASPBERRY PI


    The Raspberry Pi''s operating system is Raspbian, which is Linux based. Therefore,
    you''re able to write your code out using a text editor, then compile it with
    g++ as you would in any other Linux distro.


    ![](img/588364e02a77f179099fae91a1713f0a_48_2.png)


    # MAC


    Mac owners will need to download and install Xcode to be able to compile their
    C++ code natively. Other options for the macOS include Netbeans, Eclipse or Code::Blocks.
    Note: the latest Code::Blocks isn''t available for Mac due to a lack of Mac developers.


    ![](img/588364e02a77f179099fae91a1713f0a_48_3.png)'
