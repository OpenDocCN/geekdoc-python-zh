    ```

    a=2

    b=2

    name="David"

    surname="Hayward"

    print(name, surname)

    print (a+b)

    ```


    If you press F5 now you''ll be asked to save the file, again, as it''s been modified
    from before.


    ![](img/588364e02a77f179099fae91a1713f0a_26_1.png)


    STEP 6 This is how the vast majority of your Python code will be conducted. Enter
    it into the Editor, hit F5, save the code and look at the output in the Shell.
    Sometimes things will differ, depending on whether you''ve requested a separate
