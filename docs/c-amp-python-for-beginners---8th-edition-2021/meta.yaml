  md: '# # Your First C++ Program


    You may have followed the Mac and Linux examples previously but you’re going to
    be working exclusively in Windows and Code::Blocks from here on. Let’s begin by
    writing your first C++ program and taking the first small step into a larger coding
    world.


    # ## HELLO, WORLD!


    It’s traditional in programming for the first code to be entered to output the
    words ‘Hello, World!’ to the screen. Interestingly, this dates back to 1968 using
    a language called BCPL.


    **STEP 1** As mentioned, we’re using Windows 10 and the latest version of Code::Blocks
    for the rest of the C++ code in this book. Begin by launching Code::Blocks. When
    open, click on File > New > Empty File or press Ctrl+Shift+N on the keyboard.


    **STEP 3** At the moment it doesn’t look like much, and it makes even less sense,
    but we’ll get to that in due course. Now click on File > Save File As. Create
    or find a suitable location on your hard drive and in the File Name box, call
    it helloworld.cpp. Click the Save as type box and select C/C++ files. Click the
    Save button.


    ![](img/588364e02a77f179099fae91a1713f0a_59_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_59_1.png)


    **STEP 2** Now you can see a blank screen, with the tab labelled *Untitled1, and
    the number one in the top left of the main Code::Blocks window. Begin by clicking
    in the main window, so the cursor is next to the number one, and entering:

    `#include <iostream>`


    **STEP 4** You can see that Code::Blocks has now changed the colour coding, recognising
    that the file is now C++ code. This means that code can be auto-selected from
    the Code::Blocks repository. Delete the #include <iostream> line and re-enter
    it. You can see the auto-select boxes appearing.


    ![](img/588364e02a77f179099fae91a1713f0a_59_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_59_3.png)'
