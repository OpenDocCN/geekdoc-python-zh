    # Using Comments


    While comments may seem like a minor element to the many lines of code that combine
    to make a game, application or even an entire operating system, in actual fact
    they’re probably one of the most important factors.


    # THE IMPORTANCE OF COMMENTING


    Comments inside code are basically human readable descriptions that detail what
    the code is doing at that particular point. They don’t sound especially important
    but code without comments is one of the many frustrating areas of programming,
    regardless of whether you’re a professional or just starting out.


    In short, all code should be commented in such a manner as to effectively describe
    the purpose of a line, section, or individual elements. You should get into the
    habit of commenting as much as possible, by imagining that someone who doesn’t
    know anything about programming can pick up your code and understand what it’s
    going to do simply by reading your comments.


    In a professional environment, comments are vital to the success of the code and
    ultimately, the company. In an organisation, many programmers work in teams alongside
    engineers, other developers, hardware analysts and so on. If you’re a part of
    the team that’s writing a bespoke piece of software for the company, then your
    comments help save a lot of time should something go wrong, and another team member
    has to pick up and follow the trail to pinpoint the issue.


    Place yourself in the shoes of someone whose job it is to find out what’s wrong
    with a program. The program has in excess of 800,000 lines of code, spread across
    several different modules. You can soon appreciate the need for a little help
    from the original programmers in the form of a good comment.


    The best comments are always concise and link the code logically, detailing what
    happens when the program hits this line or section. You don’t need to comment
    on every line. Something along the lines of: if x==0 doesn’t require you to comment
    that if x equals zero then do something; that’s going to be obvious to the reader.
    However, if x equalling zero is something that drastically changes the program
    for the user, such as, they’ve run out of lives, then it certainly needs to commented
    on.


    Even if the code is your own, you should write comments as if you were going to
    publicly share it with others. This way you can return to that code and always
    understand what it was you did or where it was you went wrong or what worked brilliantly.


    Comments are good practise and once you understand how to add a comment where
    needed, you soon do it as if it’s second nature.


