    # Getting Started with Python


    Getting started with Python may seem a little daunting at first but the language
    has been designed with simplicity in mind. Like most things, you need to start
    slowly, learn how to get a result and how to get what you want from the code.


    In this section, we cover variables, numbers and expressions, user input, conditions
    and loops; and the types of errors you may well come across in your time with
    Python.'
- md: '## Starting Python for the First Time


    We’re going to be using the Raspberry Pi as our Python 3 hardware platform. The
    latest version of Raspbian comes preinstalled with Python 3, version 3.4.2 to
    be exact, so as long as you have a version 3 Shell, all our code will work.


    ## STARTING PYTHON


    We’re not going to go into the details of getting the Raspberry Pi up and running,
    there’s plenty of material already available on that subject. However, once you’re
    ready, fire up your Pi and get ready for coding.


    **STEP 1** With the Raspbian desktop loaded, click on the Menu button followed
    by Programming > Python 3 (IDLE). This opens the Python 3 Shell. Windows and Mac
    users can find the Python 3 IDLE Shell from within the Windows Start button menu
    and via Finder.


    **STEP 2** The Shell is where you can enter code and see the responses and output
    of code you’ve programmed into Python. This is a kind of sandbox, where you’re
    able to try out some simple code and processes.


    **STEP 3** For example, in the Shell enter: 2+2 After pressing Enter, the next
    line displays the answer: 4. Basically, Python has taken the ‘code’ and produced
    the relevant output.


    ![](img/588364e02a77f179099fae91a1713f0a_21_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_21_1.png)


    **STEP 4** The Python Shell acts very much like a calculator, since code is basically
    a series of mathematical interactions with the system. Integers, which are the
    infinite sequence of whole numbers can easily be added, subtracted, multiplied
    and so on.


    ![](img/588364e02a77f179099fae91a1713f0a_21_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_21_3.png)


    While that''s very interesting, it''s not particularly exciting. Instead, try
    this:


    print("Hello everyone!")


    Just like the code we entered in Sublime in the Installing a Text Editor section
    of this book.


    ![](img/588364e02a77f179099fae91a1713f0a_22_0.png)


    The Python IDLE is a configurable environment. If you don''t like the way the
    colours are represented, then you can always change them via Options > Configure
    IDLE and clicking on the Highlighting tab. However, we don''t recommend that,
    as you won''t be seeing the same as our screenshots.


    ![](img/588364e02a77f179099fae91a1713f0a_22_1.png)


    This is a little more like it, since you''ve just produced your first bit of code.
    The Print command is fairly self-explanatory, it prints things. Python 3 requires
    the brackets as well as quote marks in order to output content to the screen,
    in this case the ''Hello everyone!'' bit.


    ```

    >>> print("Hello everyone!")

    Hello everyone!

    >>> |

    ```


    Just like most programs available, regardless of the operating system, there are
    numerous shortcut keys available. We don''t have room for them all here but within
    the Options > Configure IDLE and under the Keys tab, you can see a list of the
    current bindings.


    ![](img/588364e02a77f179099fae91a1713f0a_22_2.png)


    You may have noticed the colour coding within the Python IDLE. The colours represent
    different elements of Python code. They are:


    - Black – Data and Variables

    - Green – Strings

    - Purple – Functions

    - Orange – Commands

    - Blue – User Functions

    - Dark Red – Comments

    - Light Red – Error Messages


    | Colour | Use for | Examples |

    | :--- | :--- | :--- |

    | Black | Data & variables | 23.6 area |

    | Green | Strings | "Hello World" |

    | Purple | Functions | len() print() |

    | Orange | Commands | if for else |

    | Blue | User functions | get_area() |

    | Dark red | Comments | #Remember VAT |

    | Light red | Error messages | SyntaxError: |


    The Python IDLE is a power interface and one that''s actually been written in
    Python using one of the available GUI toolkits. If you want to know the many ins
    and outs of the Shell, we recommend you take a few moments to view www.docs.python.org/3/library/idle.html,
    which details many of the IDLE''s features.


    ![](img/588364e02a77f179099fae91a1713f0a_22_3.png)


    ## Your First Code


    Essentially, you''ve already written your first piece of code with the ''print("Hello
    everyone!")'' function from the previous tutorial. However, let''s expand that
    and look at entering your code and playing around with some other Python examples.


    ## PLAYING WITH PYTHON


    With most languages, computer or human, it''s all about remembering and applying
    the right words to the right situation. You''re not born knowing these words,
    so you need to learn them.


    STEP 1 If you''ve closed Python 3 IDLE, reopen it in whichever operating system
    version you prefer. In the Shell, enter the familiar following:

    print("Hello")


    ![](img/588364e02a77f179099fae91a1713f0a_23_0.png)


    STEP 2 Just as predicted, the word Hello appears in the Shell as blue text, indicating
    output from a string. It''s fairly straightforward and doesn''t require too much
    explanation. Now try:

    print("2+2")


    ![](img/588364e02a77f179099fae91a1713f0a_23_2.png)


    STEP 3 You can see that instead of the number 4, the output is the 2+2 you asked
    to be printed to the screen. The quotation marks are defining what''s being outputted
    to the IDLE Shell; to print the total of 2+2 you need to remove the quotes:

    print(2+2)


    ![](img/588364e02a77f179099fae91a1713f0a_23_1.png)


    STEP 4 You can continue as such, printing 2+2, 464+2343 and so on to the Shell.
    An easier way is to use a variable, which is something we will cover in more depth
    later. For now, enter:

    a=2

    b=2


    ![](img/588364e02a77f179099fae91a1713f0a_23_3.png)


    STEP 5 What you have done here is assign the letters a and b two values: 2 and
    2. These are now variables, which can be called upon by Python to output, add,
    subtract, divide and so on for as long as their numbers stay the same. Try this:

    print(a)

    print(b)


    ![](img/588364e02a77f179099fae91a1713f0a_24_0.png)


    STEP 6 The output of the last step displays the current values of both a and b
    individually, as you''ve asked them to be printed separately. If you want to add
    them up, you can use the following:

    print(a+b)

    This code simply takes the values of a and b, adds them together and outputs the
    result.


    ![](img/588364e02a77f179099fae91a1713f0a_24_2.png)


    STEP 7 You can play around with different kinds of variables and the Print function.
    For example, you could assign variables for someone''s name:

    name="David"

    print(name)


    ![](img/588364e02a77f179099fae91a1713f0a_24_4.png)


    STEP 8 Now let''s add a surname:

    surname="Hayward"

    print(surname)

    You now have two variables containing a first name and a surname and you can print
    them independently.


    ![](img/588364e02a77f179099fae91a1713f0a_24_1.png)


    STEP 9 If we were to apply the same routine as before, using the + symbol, the
    name wouldn''t appear correctly in the output in the Shell. Try it:

    print(name+surname)

    You need a space between the two, defining them as two separate values and not
    something you mathematically play around with.


    ![](img/588364e02a77f179099fae91a1713f0a_24_3.png)


    STEP 10 In Python 3 you can separate the two variables with a space using a comma:

    print(name, surname)

    Alternatively, you can add the space yourself:

    print(name+" "+surname)

    The use of the comma is much neater, as you can see.

    Congratulations, you''ve just taken your first steps into the wide world of Python.


    ![](img/588364e02a77f179099fae91a1713f0a_24_5.png)


    ## Saving and Executing Your Code


    Whilst working in the IDLE Shell is perfectly fine for small code snippets, it’s
    not designed for entering longer program listings. In this section you’re going
    to be introduced to the IDLE Editor, where you will be working from now on.


    ## EDITING CODE


    You will eventually reach a point where you have to move on from inputting single
    lines of code into the Shell. Instead, the IDLE Editor will allow you to save
    and execute your Python code.


    **STEP 1** First, open the Python IDLE Shell and when it’s up, click on File >
    New File. This will open a new window with Untitled as its name. This is the Python
    IDLE Editor and within it you can enter the code needed to create your future
    programs.


    **STEP 2** The IDLE Editor is, for all intents and purposes, a simple text editor
    with Python features, colour coding and so on; much in the same vein as Sublime.
    You enter code as you would within the Shell, so taking an example from the previous
    tutorial, enter:


    `print("Hello everyone!")`


    **STEP 3** You can see that the same colour coding is in place in the IDLE Editor
    as it is in the Shell, enabling you to better understand what’s going on with
    your code. However, to execute the code you need to first save it. Press F5 and
    you get a Save…Check box open.


    ![](img/588364e02a77f179099fae91a1713f0a_25_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_25_1.png)


    **STEP 4** Click on the OK button in the Save box and select a destination where
    you’ll save all your Python code. The destination can be a dedicated folder called
    Python or you can just dump it wherever you like. Remember to keep a tidy drive
    though, to help you out in the future.


    ![](img/588364e02a77f179099fae91a1713f0a_25_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_25_3.png)'
  mdcn: '## 初次启动 Python


    我们将使用树莓派作为 Python 3 的硬件平台。最新版本的 Raspbian 系统预装了 Python 3，具体版本是 3.4.2，因此只要你拥有版本
    3 的 Shell，我们所有的代码都能正常运行。


    ## 启动 Python


    我们不会详细介绍如何设置和运行树莓派，因为这方面的资料已经非常丰富。不过，一旦你准备好了，就启动你的树莓派，准备开始编码吧。


    **步骤 1** 当 Raspbian 桌面加载完成后，点击菜单按钮，然后选择 编程 > Python 3 (IDLE)。这将打开 Python 3 Shell。Windows
    和 Mac 用户可以在 Windows 开始菜单或通过 Finder 找到 Python 3 IDLE Shell。


    **步骤 2** Shell 是你输入代码并查看你编写的代码的响应和输出的地方。这是一个沙盒环境，你可以在这里尝试一些简单的代码和流程。


    **步骤 3** 例如，在 Shell 中输入：2+2 按下回车键后，下一行会显示答案：4。基本上，Python 接收了这段“代码”并产生了相应的输出。


    ![](img/588364e02a77f179099fae91a1713f0a_21_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_21_1.png)


    **步骤 4** Python Shell 的行为非常像一个计算器，因为代码本质上是一系列与系统的数学交互。整数，即无限的整数序列，可以轻松地进行加、减、乘等运算。


    ![](img/588364e02a77f179099fae91a1713f0a_21_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_21_3.png)


    虽然这很有趣，但并不特别令人兴奋。相反，试试这个：


    print("Hello everyone!")


    就像我们在本书“安装文本编辑器”部分在 Sublime 中输入的代码一样。


    ![](img/588364e02a77f179099fae91a1713f0a_22_0.png)


    Python IDLE 是一个可配置的环境。如果你不喜欢颜色的显示方式，你总是可以通过 选项 > 配置 IDLE 并点击 高亮 选项卡来更改它们。但是，我们不建议这样做，因为这样你就看不到和我们截图一样的内容了。


    ![](img/588364e02a77f179099fae91a1713f0a_22_1.png)


    这有点像样了，因为你刚刚生成了你的第一段代码。Print 命令相当不言自明，它就是打印东西。Python 3 需要括号和引号才能将内容输出到屏幕，在这个例子中就是
    ''Hello everyone!'' 这部分。


    ```

    >>> print("Hello everyone!")

    Hello everyone!

    >>> |

    ```


    就像大多数可用的程序一样，无论操作系统如何，都有许多快捷键可用。我们这里没有空间全部列出，但在 选项 > 配置 IDLE 下的 键 选项卡中，你可以看到当前绑定的列表。


    ![](img/588364e02a77f179099fae91a1713f0a_22_2.png)


    你可能已经注意到了 Python IDLE 中的颜色编码。这些颜色代表了 Python 代码的不同元素。它们是：


    - 黑色 – 数据和变量

    - 绿色 – 字符串

    - 紫色 – 函数

    - 橙色 – 命令

    - 蓝色 – 用户函数

    - 深红色 – 注释

    - 浅红色 – 错误消息


    | 颜色 | 用途 | 示例 |

    | :--- | :--- | :--- |

    | 黑色 | 数据和变量 | 23.6 area |

    | 绿色 | 字符串 | "Hello World" |

    | 紫色 | 函数 | len() print() |

    | 橙色 | 命令 | if for else |

    | 蓝色 | 用户函数 | get_area() |

    | 深红色 | 注释 | #Remember VAT |

    | 浅红色 | 错误消息 | SyntaxError: |


    Python IDLE 是一个强大的界面，它实际上是使用可用的 GUI 工具包之一用 Python 编写的。如果你想了解 Shell 的许多细节，我们建议你花点时间查看
    www.docs.python.org/3/library/idle.html，其中详细介绍了 IDLE 的许多功能。


    ![](img/588364e02a77f179099fae91a1713f0a_22_3.png)


    ## 你的第一段代码


    本质上，你已经通过上一教程中的 ''print("Hello everyone!")'' 函数编写了你的第一段代码。然而，让我们扩展一下，看看如何输入你的代码并尝试一些其他的
    Python 示例。


    ## 玩转 Python


    对于大多数语言，无论是计算机语言还是人类语言，关键都在于记住并正确应用合适的词语到合适的场景。你并非生来就知道这些词语，所以你需要学习它们。


    步骤 1 如果你已经关闭了 Python 3 IDLE，请在你喜欢的操作系统版本中重新打开它。在 Shell 中，输入熟悉的以下内容：

    print("Hello")


    ![](img/588364e02a77f179099fae91a1713f0a_23_0.png)


    步骤 2 正如预期的那样，单词 Hello 以蓝色文本出现在 Shell 中，表示这是一个字符串的输出。这相当直接，不需要太多解释。现在试试：

    print("2+2")


    ![](img/588364e02a77f179099fae91a1713f0a_23_2.png)


    步骤 3 你可以看到，输出的不是数字 4，而是你要求打印到屏幕上的 2+2。引号定义了输出到 IDLE Shell 的内容；要打印 2+2 的总和，你需要去掉引号：

    print(2+2)


    ![](img/588364e02a77f179099fae91a1713f0a_23_1.png)


    步骤 4 你可以继续这样做，将 2+2、464+2343 等打印到 Shell。一个更简单的方法是使用变量，这是我们稍后将更深入介绍的内容。现在，输入：

    a=2

    b=2


    ![](img/588364e02a77f179099fae91a1713f0a_23_3.png)


    步骤 5 你在这里做的是将字母 a 和 b 赋予两个值：2 和 2。这些现在是变量，只要它们的数值保持不变，Python 就可以随时调用它们来进行输出、加法、减法、除法等操作。试试这个：

    print(a)

    print(b)


    ![](img/588364e02a77f179099fae91a1713f0a_24_0.png)


    步骤 6 上一步的输出分别显示了 a 和 b 的当前值，因为你要求它们分别打印。如果你想将它们相加，可以使用以下代码：

    print(a+b)

    这段代码简单地获取 a 和 b 的值，将它们相加并输出结果。


    ![](img/588364e02a77f179099fae91a1713f0a_24_2.png)


    步骤 7 你可以尝试不同类型的变量和 Print 函数。例如，你可以为某人的名字分配变量：

    name="David"

    print(name)


