    JR NZ,R862F ;$+07\nLD A, 0\nLD (KEMP),A\nR862F: LD IY,T846E\nCALL C92DC\nJR NZ,L8684\n\
    XOR A\nLD (EUGHGT),A\n```\n\n## C++ 注释\n\n在 C++ 中注释涉及使用双斜杠 `//`，或者一个斜杠和一个星号 `/*`。你已经看过一些简单的例子，但这就是它们的工作方式。\n\
    \n**步骤 1** 以 Hello World 代码为例，你可以使用双斜杠轻松地为代码的不同部分添加注释：\n\n```\n//我的第一个 C++ 程序\n\
    cout << \"Hello, world!\\n\";\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_66_0.png)\n\
    \n**步骤 2** 然而，你也可以在代码行的末尾添加注释，以更好地描述正在发生的事情：\n\n```\ncout << \"Hello, world!\\\
    n\"; //此行输出单词 'Hello, world!'。\\n 表示换行。\n```\n\n请注意，你不必在注释末尾加分号。这是因为它是代码中被编译器忽略的一行。\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_66_2.png)\n\n**步骤 3** 你可以使用斜杠和星号注释掉多行：\n\
    \n```\n/* 此注释可以\n    覆盖多行\n    而无需添加更多斜杠 */\n```\n\n只需记住用相反的星号和斜杠结束块注释。\n\n![](img/588364e02a77f179099fae91a1713f0a_66_4.png)\n\
    \n**步骤 4** 添加注释时要小心，尤其是块注释。很容易忘记添加结束的星号和斜杠，从而使注释块内的任何代码失效。\n\n![](img/588364e02a77f179099fae91a1713f0a_66_1.png)\n\
    \n**步骤 5** 显然，如果你尝试构建并执行代码，它会出错，抱怨缺少一个花括号 `}` 来结束代码块。如果你犯了几次这样的错误，那么回去纠正可能会很耗时。幸运的是，Code::Blocks\
    \ 中的颜色编码有助于区分注释和代码。\n\n![](img/588364e02a77f179099fae91a1713f0a_66_3.png)\n\n\
    **步骤 6** 如果你使用块注释，在 C++ 中，一个好的做法是在注释块的每一新行前添加一个星号。这也有助于你记住在继续编写代码之前关闭注释块：\n\n\
    ```\n/* 此注释可以\n * 覆盖多行\n * 而无需添加更多斜杠 */\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_66_5.png)"
