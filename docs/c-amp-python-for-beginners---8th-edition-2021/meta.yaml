  md: "# User Input\n\nSTEP 5 You don't always have to include quoted text within\
    \ the input command. For example, you can ask the user their name, and have the\
    \ input in the line below:\n\n```\nprint(\"Hello. What's your name?\")\nname=input()\n\
    ```\n\n![](img/588364e02a77f179099fae91a1713f0a_36_0.png)\n\nSTEP 8 What you've\
    \ created here is a condition, which we will cover soon. In short, we're using\
    \ the input from the user and measuring it against a condition. So, if the user\
    \ enters David as their name, the guard will allow them to pass unhindered. Else,\
    \ if they enter a name other than David, the guard challenges them to a fight.\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_36_1.png)\n\nSTEP 6 The code from the\
    \ previous step is often regarded as being a little neater than having a lengthy\
    \ amount of text in the input command, but it's not a rule that's set in stone,\
    \ so do as you like in these situations. Expanding on the code, try this:\n\n\
    ```\nprint(\"Halt! Who goes there?\")\nname=input()\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_36_2.png)\n\
    \nSTEP 9 Just as you learned previously, any input from a user is automatically\
    \ a string, so you need to apply a TypeCast in order to turn it into something\
    \ else. This creates some interesting additions to the input command. For example:\n\
    \n```\n# Code to calculate rate and distance\nprint(\"Input a rate and a distance\"\
    )\nrate = float(input(\"Rate: \"))\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_36_3.png)\n\
    \nSTEP 7 It's a good start to a text adventure game, perhaps? Now you can expand\
    \ on it and use the raw input from the user to flesh out the game a little:\n\n\
    ```\nif name==\"David\":\n    print(\"Welcome, good sir. You may pass.\")\nelse:\n\
    \    print(\"I know you not. Prepare for battle!\")\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_36_4.png)\n\
    \nSTEP 10 To finalise the rate and distance code, we can add:\n\n```\ndistance\
    \ = float(input(\"Distance: \"))\nprint(\"Time:\", (distance / rate))\n```\n\n\
    Save and execute the code and enter some numbers. Using the float(input element,\
    \ we've told Python that anything entered is a floating point number rather than\
    \ a string.\n\n![](img/588364e02a77f179099fae91a1713f0a_36_5.png)"
