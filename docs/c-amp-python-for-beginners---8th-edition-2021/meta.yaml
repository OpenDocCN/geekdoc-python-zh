- md: "## Variables\n\nVariables differ slightly when using C++ as opposed to Python.\
    \ In Python, you can simply state that ‘a’ equals 10 and a variable is assigned.\
    \ However, in C++ a variable has to be declared with its type before it can be\
    \ used.\n\n## THE DECLARATION OF VARIABLES\n\nYou can declare a C++ variable by\
    \ using statements within the code. There are several distinct types of variables\
    \ you can declare. Here’s how it works.\n\nSTEP 1 Open up a new, blank C++ file\
    \ and enter the usual code headers:\n\n```\n#include <iostream>\nusing namespace\
    \ std;\n\nint main()\n{\n}\n```\n\nSTEP 2 Start simple by creating two variables,\
    \ a and b, with one having a value of 10 and the other 5. You can use the data\
    \ type int to declare these variables. Within the curly brackets, enter:\n\n```\n\
    int a;\nint b;\n\na = 10;\nb = 5;\n```\n\nSTEP 3 You can build and run the code\
    \ but it won’t do much, other than store the values 10 and 5 to the integers a\
    \ and b. To output the contents of the variables, add:\n\n```\ncout << a;\ncout\
    \ << \"\\n\";\ncout << b;\n```\n\nThe cout << \"\\n\"; part simply places a new\
    \ line between the output of 10 and 5.\n\nSTEP 4 Naturally you can declare a new\
    \ variable, call it result and output some simple arithmetic:\n\n```\nint result;\n\
    \nresult = a + b;\ncout << result;\n```\n\nInsert the above into the code as per\
    \ the screenshot.\n\nSTEP 5 You can assign a value to a variable as soon as you\
    \ declare it. The code you've typed in could look like this, instead:\n\n```\n\
    int a = 10;\nint b = 5;\nint result = a + b;\ncout << result;\n```\n\nSTEP 6 Specific\
    \ to C++, you can also use the following to assign values to a variable as soon\
    \ as you declare them:\n\n```\nint a (10);\nint b (5);\n```\n\nThen, from the\
    \ C++ 2011 standard, using curly brackets:\n\n```\nint result {a+b};\n```\n\n\
    STEP 7 You can create global variables, which are variables that are declared\
    \ outside any function and used in any function within the entire code. What you've\
    \ used so far are local variables: variables used inside the function. For example:\n\
    \n```\n#include <iostream>\nusing namespace std;\nint StartLives = 3;\n\nint main\
    \ ()\n{\n    startLives = StartLives - 1;\n    cout << StartLives;\n}\n```\n\n\
    STEP 8 The previous step creates the variable StartLives, which is a global variable.\
    \ In a game, for example, a player's lives go up or down depending on how well\
    \ or how bad they're doing. When the player restarts the game, the StartLives\
    \ returns to its default state: 3. Here we've assigned 3 lives, then subtracted\
    \ 1, leaving 2 lives left.\n\nSTEP 9 The modern C++ compiler is far more intelligent\
    \ than most programmers give it credit. While there are numerous data types you\
    \ can declare for variables, you can in fact use the auto feature:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\nauto pi = 3.141593;\n\nint main()\n{\n   \
    \ double area, radius = 1.5;\n    area = pi * radius * radius;\n    cout << area;\n\
    }\n```\n\nSTEP 10 A couple of new elements here: first, auto won't work unless\
    \ you go to Settings > Compiler and tick the box labelled 'Have G++ follow the\
    \ C++11 ISO C++ Language Standard [-std=c++11]'. Then, the new data type, double,\
    \ which means double-precision floating point value. Enable C++11, then build\
    \ and run the code. The result should be 7.06858.\n\n## Data Types\n\nVariables,\
    \ as we've seen, store information that the programmer can then later call up,\
    \ and manipulate if required. Variables are simply reserved memory locations that\
    \ store the values the programmer assigns, depending on the data type used.\n\n\
    ## THE VALUE OF DATA\n\nThere are many different data types available for the\
    \ programmer in C++, such as an integer, floating point, Boolean, character and\
    \ so on. It's widely accepted that there are seven basic data types, often called\
    \ Primitive Built-in Types; however, you can create your own data types should\
    \ the need ever arise within your code.\n\nThe seven basic data types are:\n\n\
    | TYPE | COMMAND |\n|---|---|\n| Integer | `Integer` |\n| Floating Point | `float`\
    \ |\n| Character | `char` |\n| Boolean | `bool` |\n| Double Floating Point | `double`\
    \ |\n| Wide Character | `wchar_t` |\n| No Value | `void` |\n\nThese basic types\
    \ can also be extended using the following modifiers: Long, Short, Signed and\
    \ Unsigned. Basically this means the modifiers can expand the minimum and maximum\
    \ range values for each data type. For example, the int data type has a default\
    \ value range of -2147483648 to 2147483647, a fair value, you would agree.\n\n\
    Now, if you were to use one of the modifiers, the range alters:\n\nUnsigned int\
    \ = 0 to 4294967295\nSigned int = -2147483648 to 2147483647\nShort int = -32768\
    \ to 32767\nUnsigned Short int = 0 to 65,535\nSigned Short int = -32768 to 32767\n\
    Long int = -2147483647 to 2147483647\nSigned Long int = -2147483647 to 2147483647\n\
    Unsigned Long int = 0 to 4294967295\n\nNaturally you can get away with using the\
    \ basic type without the modifier, as there's plenty of range provided with each\
    \ data type. However, it's considered good C++ programming practise to use the\
    \ modifiers when possible.\n\nThere are issues when using the modifiers though.\
    \ Double represents a double-floating point value, which you can use for incredibly\
    \ accurate numbers but those numbers are only accurate up to the fifteenth decimal\
    \ place. There's also the problem when displaying such numbers in C++ using the\
    \ cout function, in that cout by default only outputs the first five decimal places.\
    \ You can combat that by adding a cout.precision () function and adding a value\
    \ inside the brackets, but even then you're still limited by the accuracy of the\
    \ double data type. For example, try this code:\n\n```\n#include <iostream>\n\
    using namespace std;\ndouble PI = 3.141592653589793238463;\n\nint main()\n{\n\
    \    cout << PI;\n}\n```\n\nBuild and run the code and as you can see the output\
    \ is only 3.14159, representing cout's limitations in this example.\n\nYou can\
    \ alter the code including the aforementioned cout.precision function, for greater\
    \ accuracy. Take precision all the way up to 22 decimal places, with the following\
    \ code:\n\n```\n#include <iostream>\nusing namespace std;\ndouble PI = 3.141592653589793238463;\n\
    \nint main()\n{\n    cout.precision(22);\n    cout << PI;\n}\n```\n\nThis is mainly\
    \ due to the conversion from binary in the compiler and that the IEEE 754 double\
    \ precision standard occupies 64-bits of data, of which 52-bits are dedicated\
    \ to the significant (the significant digits in a floating-point number) and roughly\
    \ 3.5-bits are taken holding the values 0 to 9. If you divide 53 by 3.5, then\
    \ you arrive at 15.142857 recurring, which is 15-digits of precision.\n\nTo be\
    \ honest, if you're creating code that needs to be accurate to more than fifteen\
    \ decimal places, then you wouldn't be using C++, you would use some scientific\
    \ specific language with C++ as the connective tissue between the two languages.\n\
    \nYou can create your own data types, using an alias-like system called typedef.\
    \ For example:\n\n```\n#include <iostream>\nusing namespace std;\ntypedef int\
    \ metres;\n\nint main()\n{\n    metres distance;\n    distance = 15;\n    cout\
    \ << \"distance in metres is: \" << distance;\n}\n```\n\nThis code when executed\
    \ creates a new int data type called metres. Then, in the main code block, there's\
    \ a new variable called distance, which is an integer; so you're basically telling\
    \ the compiler that there's another name for int. We assigned the value 15 to\
    \ distance and displayed the output: distance in metres is 15.\n\nIt might sound\
    \ a little confusing to begin with but the more you use C++ and create your own\
    \ code, the easier it becomes."
  mdcn: "## 变量\n\n使用 C++ 与 Python 时，变量略有不同。在 Python 中，你可以简单地声明 'a' 等于 10，变量就被赋值了。然而，在\
    \ C++ 中，变量必须先声明其类型才能使用。\n\n## 变量的声明\n\n你可以通过在代码中使用语句来声明一个 C++ 变量。你可以声明几种不同类型的变量。以下是具体操作方法。\n\
    \n步骤 1 打开一个新的空白 C++ 文件，输入通常的代码头：\n\n```\n#include <iostream>\nusing namespace\
    \ std;\n\nint main()\n{\n}\n```\n\n步骤 2 从简单开始，创建两个变量 a 和 b，一个值为 10，另一个为 5。你可以使用数据类型\
    \ `int` 来声明这些变量。在花括号内输入：\n\n```\nint a;\nint b;\n\na = 10;\nb = 5;\n```\n\n步骤\
    \ 3 你可以构建并运行代码，但它除了将值 10 和 5 存储到整数 a 和 b 中之外，不会做太多事情。要输出变量的内容，请添加：\n\n```\ncout\
    \ << a;\ncout << \"\\n\";\ncout << b;\n```\n\n`cout << \"\\n\";` 部分只是在 10 和 5\
    \ 的输出之间放置一个新行。\n\n步骤 4 自然，你可以声明一个新变量，称之为 result，并输出一些简单的算术运算：\n\n```\nint result;\n\
    \nresult = a + b;\ncout << result;\n```\n\n按照截图将上述内容插入代码中。\n\n步骤 5 你可以在声明变量的同时为其赋值。你输入的代码可以改为这样：\n\
    \n```\nint a = 10;\nint b = 5;\nint result = a + b;\ncout << result;\n```\n\n\
    步骤 6 C++ 特有的是，你也可以使用以下方式在声明变量时立即为其赋值：\n\n```\nint a (10);\nint b (5);\n```\n\n\
    然后，根据 C++ 2011 标准，使用花括号：\n\n```\nint result {a+b};\n```\n\n步骤 7 你可以创建全局变量，即在任何函数外部声明并在整个代码中的任何函数中使用的变量。到目前为止，你使用的都是局部变量：在函数内部使用的变量。例如：\n\
    \n```\n#include <iostream>\nusing namespace std;\nint StartLives = 3;\n\nint main\
    \ ()\n{\n    startLives = StartLives - 1;\n    cout << StartLives;\n}\n```\n\n\
    步骤 8 上一步创建了变量 `StartLives`，这是一个全局变量。例如，在游戏中，玩家的生命值会根据其表现好坏而增减。当玩家重新开始游戏时，`StartLives`\
    \ 会恢复到其默认状态：3。这里我们分配了 3 条生命，然后减去 1，剩下 2 条生命。\n\n步骤 9 现代 C++ 编译器比大多数程序员所认为的要智能得多。虽然你可以为变量声明多种数据类型，但实际上你可以使用\
    \ `auto` 功能：\n\n```\n#include <iostream>\nusing namespace std;\nauto pi = 3.141593;\n\
    \nint main()\n{\n    double area, radius = 1.5;\n    area = pi * radius * radius;\n\
    \    cout << area;\n}\n```\n\n步骤 10 这里有几个新元素：首先，除非你转到“设置 > 编译器”并勾选标有“让 G++ 遵循\
    \ C++11 ISO C++ 语言标准 [-std=c++11]”的框，否则 `auto` 不会起作用。然后，新的数据类型 `double`，表示双精度浮点值。启用\
    \ C++11，然后构建并运行代码。结果应该是 7.06858。\n\n## 数据类型\n\n正如我们所看到的，变量存储程序员稍后可以调用并在需要时操作的信息。变量只是保留的内存位置，用于存储程序员根据所用数据类型分配的值。\n\
    \n## 数据的值\n\nC++ 中程序员可以使用许多不同的数据类型，例如整数、浮点数、布尔值、字符等。普遍认为有七种基本数据类型，通常称为原始内置类型；但是，如果代码中需要，你可以创建自己的数据类型。\n\
    \n七种基本数据类型是：\n\n| 类型 | 命令 |\n|---|---|\n| 整数 | `Integer` |\n| 浮点数 | `float` |\n\
    | 字符 | `char` |\n| 布尔值 | `bool` |\n| 双精度浮点数 | `double` |\n| 宽字符 | `wchar_t` |\n\
    | 无值 | `void` |\n\n这些基本类型也可以使用以下修饰符进行扩展：Long、Short、Signed 和 Unsigned。基本上，这意味着修饰符可以扩展每种数据类型的最小和最大范围值。例如，`int`\
    \ 数据类型的默认值范围是 -2147483648 到 2147483647，这是一个相当大的值，你同意吧。\n\n现在，如果你使用其中一个修饰符，范围会改变：\n\
    \n无符号 int = 0 到 4294967295\n有符号 int = -2147483648 到 2147483647\n短整型 int = -32768\
    \ 到 32767\n无符号短整型 int = 0 到 65,535\n有符号短整型 int = -32768 到 32767\n长整型 int = -2147483647\
    \ 到 2147483647\n有符号长整型 int = -2147483647 到 2147483647\n无符号长整型 int = 0 到 4294967295\n\
    \n自然，你可以不使用修饰符而直接使用基本类型，因为每种数据类型都提供了足够的范围。然而，尽可能使用修饰符被认为是良好的 C++ 编程实践。\n\n但是，使用修饰符时存在一些问题。`double`\
    \ 表示双精度浮点值，你可以用于极其精确的数字，但这些数字仅精确到小数点后第十五位。在 C++ 中使用 `cout` 函数显示此类数字时也存在问题，因为 `cout`\
    \ 默认只输出前五位小数。你可以通过添加 `cout.precision()` 函数并在括号内添加一个值来解决这个问题，但即便如此，你仍然受到 `double`\
    \ 数据类型精度的限制。例如，尝试这段代码：\n\n```\n#include <iostream>\nusing namespace std;\ndouble\
    \ PI = 3.141592653589793238463;\n\nint main()\n{\n    cout << PI;\n}\n```\n\n\
    构建并运行代码，如你所见，输出仅为 3.14159，这代表了 `cout` 在此示例中的局限性。\n\n你可以修改代码，包括前面提到的 `cout.precision`\
    \ 函数，以获得更高的精度。使用以下代码将精度提高到 22 位小数：\n\n```\n#include <iostream>\nusing namespace\
    \ std;\ndouble PI = 3.141592653589793238463;\n\nint main()\n{\n    cout.precision(22);\n\
    \    cout << PI;\n}\n```\n\n这主要是由于编译器中的二进制转换以及 IEEE 754 双精度标准占用 64 位数据，其中 52 位用于有效数字（浮点数中的有效数字），大约\
    \ 3.5 位用于保存 0 到 9 的值。如果你将 53 除以 3.5，你会得到 15.142857 循环，即 15 位精度。\n\n老实说，如果你创建的代码需要精确到小数点后十五位以上，那么你不会使用\
    \ C++，你会使用某种科学专用语言，并以 C++ 作为两种语言之间的连接纽带。\n\n你可以使用一个类似别名的系统 `typedef` 来创建自己的数据类型。例如：\n\
    \n```\n#include <iostream>\nusing namespace std;\ntypedef int metres;\n\nint main()\n\
    {\n    metres distance;\n    distance = 15;\n    cout << \"distance in metres\
    \ is: \" << distance;\n}\n```\n\n这段代码执行时创建了一个新的 `int` 数据类型，称为 `metres`。然后，在主代码块中，有一个名为\
    \ `distance` 的新变量，它是一个整数；所以你基本上是在告诉编译器 `int` 有另一个名字。我们将值 15 赋给 `distance` 并显示输出：distance\
    \ in metres is 15。\n\n起初可能听起来有点令人困惑，但你使用 C++ 并创建自己的代码越多，它就变得越容易。"
