    第 8 步 再次注意颜色编码的变化。在上一步的行尾按回车键，然后输入：

    std::cout << "Hello, world!\n";


    ![](img/588364e02a77f179099fae91a1713f0a_60_1.png)


    第 9 步 和之前一样，Code::Blocks 会自动补全你正在输入的代码，包括在你输入第一个引号时放置一个闭合引号。不要忘记行末的分号；这是 C++ 程序中最重要的元素之一，我们将在下一节告诉你原因。现在，将光标向下移动到闭合花括号并按回车键。


    ![](img/588364e02a77f179099fae91a1713f0a_60_3.png)


    第 10 步 这就是你目前需要做的全部。它可能看起来并不十分惊人，但 C++ 最好分小块吸收。目前不要执行代码，因为你需要先了解 C++ 程序的结构；然后你就可以构建并运行代码了。现在，点击保存，那个单独的软盘图标。


    ![](img/588364e02a77f179099fae91a1713f0a_60_5.png)


    ## C++ 程序的结构


    C++ 有非常明确的结构和做事方式。遗漏任何东西，哪怕是一个小小的分号，你的整个程序都将无法编译和执行。许多专业程序员都曾因结构松散而栽跟头。


    ### #INCLUDE <C++ 结构>


    学习编程的基础知识，你会开始理解程序的结构。不同语言的命令可能不同，但你将开始了解代码是如何工作的。


    C++ 是由丹麦学生 Bjarne Stroustrup 在 1979 年发明的，作为他博士论文的一部分。最初 C++ 被称为带类的 C，它在已经流行的 C
    编程语言的基础上增加了特性，同时通过新的结构使其成为更用户友好的环境。


    ### #INCLUDE


    C++ 程序的结构相当精确。每个 C++ 代码都以一个指令开始：**#include <>**。该指令指示预处理器包含一段标准 C++ 代码。例如：**#include
    <iostream>** 包含 iostream 头文件以支持输入/输出操作。


    ![](img/588364e02a77f179099fae91a1713f0a_61_0.png)


    C++ 的发明者 Bjarne Stroustrup。


    ![](img/588364e02a77f179099fae91a1713f0a_61_1.png)


    ### INT MAIN()


    **int main()** 启动一个函数的声明，该函数是一组名为 ''main'' 的代码语句。所有 C++ 代码都从 main 函数开始，无论它在代码中的实际位置如何。


    ![](img/588364e02a77f179099fae91a1713f0a_61_2.png)


    ### 花括号


    左花括号（curly brackets）可能是你以前没有遇到过的，特别是如果你习惯使用 Python。左花括号表示主函数的开始，并包含属于该函数的所有代码。


    ![](img/588364e02a77f179099fae91a1713f0a_61_3.png)


    ### 注释


    以双斜杠开头的行是注释。这意味着它们不会在代码中执行，并且会被编译器忽略。注释旨在帮助你或查看你代码的其他程序员解释正在发生什么。有两种类型的注释：/* 用于多行注释，//
    用于单行注释。


    ![](img/588364e02a77f179099fae91a1713f0a_62_0.png)


    ### <<


    这里使用的两个尖括号是插入运算符。这意味着尖括号后面的任何内容都将被插入到 `std::cout` 语句中。在本例中，它们是单词 ''Hello, world''，当你编译和执行代码时，它们将显示在屏幕上。


    ![](img/588364e02a77f179099fae91a1713f0a_62_1.png)


    ### STD


    虽然 **std** 代表完全不同的东西，但在 C++ 中它表示 Standard（标准）。它是 C++ 标准命名空间的一部分，涵盖了许多不同的语句和命令。你可以省略代码中的
    `std::` 部分，但必须在开头声明：`using namespace std;`，不能两者都用。例如：


    ```

    #include <iostream>

    using namespace std;

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_62_2.png)


    ### 输出


    接下来，"Hello, world!" 部分是我们希望在代码执行时出现在屏幕上的内容。你可以输入任何你喜欢的内容，只要它在引号内。括号不是必需的，但有些编译器坚持要求使用它们。`\n`
    部分表示要插入一个新行。


    ```

    //My first C++ program

    cout << "Hello, world!\n"

    ```


    ### COUT


    在这个例子中，我们使用 `cout`，它是标准命名空间的一部分，因此它出现在那里，因为你要求 C++ 从该特定命名空间使用它。Cout 意思是 Character
    OUTput（字符输出），它将某些内容显示或打印到屏幕上。如果我们省略 `std::`，则必须在代码开头声明它，如前所述。


    ![](img/588364e02a77f179099fae91a1713f0a_62_3.png)


    ### ; 和 }


    最后，你可以看到函数代码块内的行（注释除外）都以分号结尾。这标志着语句的结束，C++ 中的所有语句都必须在末尾有一个分号，否则编译器将无法构建代码。最后一行有闭合花括号，表示主函数的结束。


    ![](img/588364e02a77f179099fae91a1713f0a_62_4.png)


    ## 编译和执行


    你已经创建了你的第一个 C++ 程序，现在你理解了其结构背后的基础知识。让我们实际动起来，编译并执行（或者如果你愿意，运行）程序，看看它是什么样子。


    ### 来自 C++ 的问候


    从 Code::Blocks 编译和执行 C++ 代码非常简单；只需点击一个图标并查看结果。以下是操作方法。


    **第 1 步** 如果你还没有，请打开 Code::Blocks，并加载你之前保存的 Hello World 代码。确保没有可见的错误，例如 `std::cout`
    行末尾缺少分号。


    **第 2 步** 如果你的代码看起来与我们截图中的类似，那么请查看屏幕顶部的菜单栏。在最顶部菜单的 Fortran 条目下，你可以看到一组图标：一个黄色齿轮、一个绿色播放按钮和一个齿轮/播放按钮组合。这些是构建、运行、构建并运行功能。


    **第 3 步** 首先点击构建图标，即黄色齿轮。此时，你的代码已经通过 Code::Blocks 编译器运行并检查了任何错误。你可以通过查看底部窗格来查看构建的结果。任何关于代码质量的消息都会显示在这里。


    ![](img/588364e02a77f179099fae91a1713f0a_63_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_63_1.png)


    **第 4 步** 现在点击运行图标，即绿色播放按钮。一个命令行框出现在你的屏幕上，显示文字：Hello, world!，后面是执行代码所花费的时间，并要求你按任意键继续。干得好，你刚刚编译并执行了你的第一个
    C++ 程序。


    ![](img/588364e02a77f179099fae91a1713f0a_63_2.png)


