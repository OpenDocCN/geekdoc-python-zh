  md: '# Variables


    Variables differ slightly when using C++ as opposed to Python. In Python, you
    can simply state that ‘a’ equals 10 and a variable is assigned. However, in C++
    a variable has to be declared with its type before it can be used.


    # THE DECLARATION OF VARIABLES


    You can declare a C++ variable by using statements within the code. There are
    several distinct types of variables you can declare. Here’s how it works.


    STEP 1 Open up a new, blank C++ file and enter the usual code headers:


    ```

    #include <iostream>

    using namespace std;


    int main()

    {

    }

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_67_0.png)


    STEP 3 You can build and run the code but it won’t do much, other than store the
    values 10 and 5 to the integers a and b. To output the contents of the variables,
    add:


    ```

    cout << a;

    cout << "\n";

    cout << b;

    ```


    The cout << "\n"; part simply places a new line between the output of 10 and 5.


    ![](img/588364e02a77f179099fae91a1713f0a_67_1.png)


    STEP 2 Start simple by creating two variables, a and b, with one having a value
    of 10 and the other 5. You can use the data type int to declare these variables.
    Within the curly brackets, enter:


    ```

    int a;

    int b;


    a = 10;

    b = 5;

    ```


    ![](img/588364e02a77f179099fae91a1713f0a_67_2.png)


    STEP 4 Naturally you can declare a new variable, call it result and output some
    simple arithmetic:


    ```

    int result;


    result = a + b;

    cout << result;

    ```


    Insert the above into the code as per the screenshot.


