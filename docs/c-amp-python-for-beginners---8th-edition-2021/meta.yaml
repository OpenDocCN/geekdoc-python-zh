    你最终会达到一个点，必须从在 Shell 中输入单行代码转向使用 IDLE 编辑器。IDLE 编辑器将允许你保存和执行你的 Python 代码。


    **步骤 1** 首先，打开 Python IDLE Shell，当它启动后，点击 文件 > 新建文件。这将打开一个名为“未命名”的新窗口。这就是 Python
    IDLE 编辑器，你可以在其中输入创建未来程序所需的代码。


    **步骤 2** IDLE 编辑器在所有方面都是一个简单的文本编辑器，具有 Python 特性、颜色编码等；与 Sublime 非常相似。你像在 Shell
