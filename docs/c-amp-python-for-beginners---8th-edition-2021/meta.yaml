  md: "# Python Modules\n\n**STEP 5** Close the command prompt or Terminal and relaunch\
    \ the IDLE Shell. When you now enter: `import pygame`, the module will be imported\
    \ into the code without any problems. You'll find that most code downloaded or\
    \ copied from the Internet will contain a module, mainstream of unique, these\
    \ are usually the source of errors in execution due to them being missing.\n\n\
    ![](img/588364e02a77f179099fae91a1713f0a_42_0.png)\n\n**STEP 8** Multiple modules\
    \ can be imported within your code. To extend our example, use:\n\n```\npython\n\
    import random\nimport math\n\nfor I in range(5):\n    print(random.randint(1,\
    \ 25))\n\nprint(math.pi)\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_1.png)\n\
    \n**STEP 6** The modules contain the extra code needed to achieve a certain result\
    \ within your own code, as we've previously experimented with. For example:\n\n\
    ```\npython\nimport random\n```\n\nBrings in the code from the random number generator\
    \ module. You can then use this module to create something like:\n\n```\npython\n\
    for i in range(10):\n    print(random.randint(1, 25))\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_2.png)\n\
    \n**STEP 9** The result is a string of random numbers followed by the value of\
    \ Pi as pulled from the math module using the `print(math.pi)` function. You can\
    \ also pull in certain functions from a module by using the from and import commands,\
    \ such as:\n\n```\npython\nfrom random import randint\n\nfor i in range(5):\n\
    \    print(randint(1, 25))\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_3.png)\n\
    \n**STEP 7** This code, when saved and executed, will display ten random numbers\
    \ from 1 to 25. You can play around with the code to display more or less, and\
    \ from a great or lesser range. For example:\n\n```\npython\nimport random\n\n\
    for i in range(25):\n    print(random.randint(1, 100))\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_4.png)\n\
    \n**STEP 10** This helps create a more streamlined approach to programming. You\
    \ can also use `import module*`, which will import everything defined within the\
    \ named module. However, it's often regarded as a waste of resources but it works\
    \ nonetheless. Finally, modules can be imported as aliases:\n\n```\npython\nimport\
    \ math as m\n\nprint(m.pi)\n```\n\nOf course, adding comments helps to tell others\
    \ what's going on.\n\n![](img/588364e02a77f179099fae91a1713f0a_42_5.png)"
