    **步骤 8** 在执行 C++ 文件之前，你需要先编译它。在 Linux 中，通常使用 g++，一个开源的 C++ 编译器；由于你现在与 C++ 文件位于同一文件夹中，请在终端中输入：**g++
    helloworld.cpp** 并按回车键。


    ![](img/588364e02a77f179099fae91a1713f0a_54_1.png)


    **步骤 9** 代码由 g++ 编译需要一点时间，但只要代码中没有错误，你就会返回到命令提示符。代码的编译创建了一个新文件。如果你在终端中输入：ls，你可以看到在你的
    C++ 文件旁边有一个 a.out 文件。


