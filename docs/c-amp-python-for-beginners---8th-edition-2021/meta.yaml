  md: '# Why C++?


    ![](img/588364e02a77f179099fae91a1713f0a_46_0.png)


    Microsoft''s Visual Studio is a great, free environment to learn C++ in.


    other languages mixed in depending on the function) and the likes of NASA, SpaceX
    and even CERN use C++ for various applications, programs, controls and umpteen
    other computing tasks.


    C++ is also extremely efficient and performs well across the board as well as
    being an easier addition to the core C language. This higher level of performance
    over other languages, such as Python, BASIC and such, makes it an ideal development
    environment for modern computing, hence the aforementioned companies using it
    so widely.


    While Python is a great programming language to learn, C++ puts the developer
    in a much wider world of coding. By mastering C++, you can find yourself developing
    code for the likes of Microsoft, Apple and so on. Generally, C++ developers enjoy
    a higher salary than programmers of some other languages and due to its versatility,
    the C++ programmer can move between jobs and companies without the need to relearn
    anything specific. However, Python is an easier language to begin with. If you''re
    completely new to programming then we would recommend you begin with Python and
    spend some time getting to grips with programming structure and the many ways
    and means in which you find a solution to a problem through programming. Once
    you can happily power up your computer and whip out a Python program with one
    hand tied behind your back, then move on to C++. Of course, there''s nothing stopping
    you from jumping straight into C++; if you feel up to the task, go for it.


    Getting to use C++ is as easy as Python, all you need is the right set of tools
    in which to communicate with the computer in C++ and you can start your journey.
    A C++ IDE is free of charge, even the immensely powerful Visual Studio from Microsoft
    is freely available to download and use. You can get into C++ from any operating
    system, be it macOS, Linux, Windows or even mobile platforms.


    Just like Python, to answer the question of Why C++ is the answer is because it''s
    fast, efficient and developed by most of the applications you regularly use. It''s
    cutting edge and a fantastic language to master.


    ![](img/588364e02a77f179099fae91a1713f0a_46_1.png)


    Indeed, the operating system you''re using is written in C++.


    ![](img/588364e02a77f179099fae91a1713f0a_46_2.png)'
