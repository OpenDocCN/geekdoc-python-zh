    \ conditions. Eventually, it could become quite complex. We've added a condition\
    \ for three-letter words:\n\n```\nword=input(\"Please enter a four-letter word:\
    \ \")\nword_length=len(word)\nif word_length == 4:\n    print (word, \"is a four-letter\
    \ word. Well done.\")\nelif word_length == 3:\n    print (word, \"is a three-letter\
    \ word. Try again.\")\nelse:\n    print (word, \"is not a four-letter word.\"\
    )\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_40_0.png)\n\n![](img/588364e02a77f179099fae91a1713f0a_40_1.png)\n\
    \n# LOOPS\n\nA loop looks quite similar to a condition but they are somewhat different\
    \ in their operation. A loop will run through the same block of code a number\
    \ of times, usually with the support of a condition.\n\nSTEP 1 Let's start with\
    \ a simple While statement. Like IF, this will check to see if something is TRUE,\
    \ then run the indented code:\n\nSTEP 3 The For loop is another example. For is\
    \ used to loop over a range of data, usually a list stored as variables inside\
    \ square brackets. For example:\n\n```\nx = 1\nwhile x < 10:\n    print (x)\n\
    \    x = x + 1\n```\n\n```\nwords=[\"Cat\", \"Dog\", \"Unicorn\"]\nfor word in\
    \ words:\n    print (word)\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_40_2.png)\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_40_3.png)\n\nSTEP 2 The difference\
    \ between if and while is when while gets to the end of the indented code, it\
    \ goes back and checks the statement is still true. In our example x is less than\
    \ 10. With each loop it prints the current value of x, then adds one to that value.\
    \ When x does eventually equal 10 it stops.\n\nSTEP 4 The For loop can also be\
    \ used in the countdown example by using the range function:\n\n```\nfor x in\
    \ range (1, 10):\n    print (x)\n```\n\nThe x=x+1 part isn't needed here because\
    \ the range function creates a list between the first and last numbers used.\n\
    \n![](img/588364e02a77f179099fae91a1713f0a_40_4.png)\n\n![](img/588364e02a77f179099fae91a1713f0a_40_5.png)"
  - '[PAGE 41]


    # Python Modules


    We''ve mentioned modules previously, (the Math module) but as modules are such
    a large part of getting the most from Python, it''s worth dedicating a little
    more time to them. In this instance we''re using the Windows version of Python
    3.


    # MASTERING MODULES


    Think of modules as an extension that''s imported into your Python code to enhance
    and extend its capabilities. There are countless modules available and as we''ve
    seen, you can even make your own.


    STEP 1 Although good, the built-in functions within Python are limited. The use
    of modules, however, allows us to make more sophisticated programs. As you are
    aware, modules are Python scripts that are imported, such as import math.


    STEP 3 The result is an error in the IDLE Shell, as the pygame module isn''t recognised
    or installed in Python. To install a module we can use PIP (Pip Installs Packages).
    Close down the IDLE Shell and drop into a command prompt or Terminal session.
    At an elevated admin command prompt, enter: `pip install pygame`


    ![](img/588364e02a77f179099fae91a1713f0a_41_0.png)


    ![](img/588364e02a77f179099fae91a1713f0a_41_1.png)


    STEP 2 Some modules, especially on the Raspberry Pi, are included by default,
    the math module being a prime example. Sadly, other modules aren''t always available.
    A good example on non-Pi platforms is the pygame module, which contains many functions
    to help create games. Try: `import pygame`.


    STEP 4 The PIP installation requires an elevated status due it installing components
    at different locations. Windows users can search for CMD via the Start button
    and right-click the result then click Run as Administrator. Linux and Mac users
    can use the Sudo command, with sudo pip install package.


    ![](img/588364e02a77f179099fae91a1713f0a_41_2.png)


    ![](img/588364e02a77f179099fae91a1713f0a_41_3.png)'
  - "[PAGE 42]\n\n# Python Modules\n\n**STEP 5** Close the command prompt or Terminal\
    \ and relaunch the IDLE Shell. When you now enter: `import pygame`, the module\
    \ will be imported into the code without any problems. You'll find that most code\
    \ downloaded or copied from the Internet will contain a module, mainstream of\
    \ unique, these are usually the source of errors in execution due to them being\
    \ missing.\n\n![](img/588364e02a77f179099fae91a1713f0a_42_0.png)\n\n**STEP 8**\
    \ Multiple modules can be imported within your code. To extend our example, use:\n\
    \n```\npython\nimport random\nimport math\n\nfor I in range(5):\n    print(random.randint(1,\
    \ 25))\n\nprint(math.pi)\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_1.png)\n\
    \n**STEP 6** The modules contain the extra code needed to achieve a certain result\
    \ within your own code, as we've previously experimented with. For example:\n\n\
    ```\npython\nimport random\n```\n\nBrings in the code from the random number generator\
    \ module. You can then use this module to create something like:\n\n```\npython\n\
    for i in range(10):\n    print(random.randint(1, 25))\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_2.png)\n\
    \n**STEP 9** The result is a string of random numbers followed by the value of\
    \ Pi as pulled from the math module using the `print(math.pi)` function. You can\
    \ also pull in certain functions from a module by using the from and import commands,\
    \ such as:\n\n```\npython\nfrom random import randint\n\nfor i in range(5):\n\
    \    print(randint(1, 25))\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_3.png)\n\
    \n**STEP 7** This code, when saved and executed, will display ten random numbers\
    \ from 1 to 25. You can play around with the code to display more or less, and\
    \ from a great or lesser range. For example:\n\n```\npython\nimport random\n\n\
    for i in range(25):\n    print(random.randint(1, 100))\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_42_4.png)\n\
    \n**STEP 10** This helps create a more streamlined approach to programming. You\
    \ can also use `import module*`, which will import everything defined within the\
    \ named module. However, it's often regarded as a waste of resources but it works\
    \ nonetheless. Finally, modules can be imported as aliases:\n\n```\npython\nimport\
    \ math as m\n\nprint(m.pi)\n```\n\nOf course, adding comments helps to tell others\
    \ what's going on.\n\n![](img/588364e02a77f179099fae91a1713f0a_42_5.png)"
- md: "## Say Hello to C++\n\nC++ is a high level programming language that’s used\
    \ in a multitude of technologies. Everything from your favourite mobile app, console\
    \ and PC game to entire operating systems, all are developed using C++ and a collection\
    \ of software development kits and custom libraries.\n\nC++ is the driving force\
    \ behind most of what you use on a daily basis, which makes it a complex and extraordinarily\
    \ powerful language to get to grips with. In this section, we look at how to install\
    \ a C++ IDE and compiler on your computer.\n\n## Why C++?\n\nC++ is one of the\
    \ most popular programming languages available today. Originally called C with\
    \ Classes, the language was renamed C++ in 1983. It’s an extension of the original\
    \ C language and is a general purpose object-oriented (OOP) environment.\n\n##\
    \ C EVERYTHING\n\nDue to how complex the language can be, and its power and performance,\
    \ C++ is often used to develop games, programs, device drivers and even entire\
    \ operating systems.\n\nDating back to 1979, the start of the golden era of home\
    \ computing, C++, or rather C with Classes, was the brainchild of Danish computer\
    \ scientist Bjarne Stroustrup while working on his PhD thesis. Stroustrup’s plan\
    \ was to further the original C language, which was widely used since the early\
    \ seventies.\n\nC++ proved to be popular among the developers of the ’80s, since\
    \ it was a much easier environment to get to grips with and more importantly,\
    \ it was 99% compatible with the original C language. This meant that it could\
    \ be used beyond the mainstream computing labs and by regular people who didn’t\
    \ have access to the mainframes and large computing data centres.\n\nC++’s impact\
    \ in the digital world is immense. Many of the programs, applications, games and\
    \ even operating systems are coded using C++. For example, all of Adobe’s major\
    \ applications, such as Photoshop, InDesign and so on, are developed in C++. You\
    \ will find that the browser you surf the Internet with is written in C++, as\
    \ well as Windows 10, Microsoft Office and the backbone to Google’s search engine.\
    \ Apple’s macOS is written largely in C++ (with some other languages mixed in\
    \ depending on the function) and the likes of NASA, SpaceX and even CERN use C++\
    \ for various applications, programs, controls and umpteen other computing tasks.\n\
    \nC++ is also extremely efficient and performs well across the board as well as\
    \ being an easier addition to the core C language. This higher level of performance\
    \ over other languages, such as Python, BASIC and such, makes it an ideal development\
    \ environment for modern computing, hence the aforementioned companies using it\
    \ so widely.\n\nC++ code is much faster than that of Python.\n\n```cpp\n#include<iostream>\n\
    using namespace std;\nvoid main()\n{\n    char ch;\n    cout<<\"Enter a charater\
    \ to check it is vowel or not\";\n    cin>>ch;\n    switch(ch)\n    {\n      \
    \  case 'a': case 'A':\n            cout<<ch<<\" is a Vowel\";\n            break;\n\
    \        case 'e': case 'E':\n            cout<<ch<<\" is a Vowel\";\n       \
    \     break;\n        case 'i': case 'I':\n            cout<<ch<<\" is a Vowel\"\
    ;\n            break;\n        case 'o': case 'O':\n            cout<<ch<<\" is\
    \ a Vowel\";\n            break;\n        case 'u': case 'U':\n            cout<<ch<<\"\
    \ is a Vowel\";\n            break;\n    }\n}\n```\n\nWhile Python is a great\
    \ programming language to learn, C++ puts the developer in a much wider world\
    \ of coding. By mastering C++, you can find yourself developing code for the likes\
    \ of Microsoft, Apple and so on. Generally, C++ developers enjoy a higher salary\
    \ than programmers of some other languages and due to its versatility, the C++\
    \ programmer can move between jobs and companies without the need to relearn anything\
    \ specific. However, Python is an easier language to begin with. If you're completely\
    \ new to programming then we would recommend you begin with Python and spend some\
    \ time getting to grips with programming structure and the many ways and means\
    \ in which you find a solution to a problem through programming. Once you can\
    \ happily power up your computer and whip out a Python program with one hand tied\
    \ behind your back, then move on to C++. Of course, there's nothing stopping you\
    \ from jumping straight into C++; if you feel up to the task, go for it.\n\nGetting\
    \ to use C++ is as easy as Python, all you need is the right set of tools in which\
    \ to communicate with the computer in C++ and you can start your journey. A C++\
    \ IDE is free of charge, even the immensely powerful Visual Studio from Microsoft\
    \ is freely available to download and use. You can get into C++ from any operating\
    \ system, be it macOS, Linux, Windows or even mobile platforms.\n\nJust like Python,\
    \ to answer the question of Why C++ is the answer is because it's fast, efficient\
    \ and developed by most of the applications you regularly use. It's cutting edge\
    \ and a fantastic language to master.\n\nIndeed, the operating system you're using\
    \ is written in C++.\n\n## Equipment Needed\n\nYou don't need to invest a huge\
    \ amount of money in order to learn C++ and you don't need an entire computing\
    \ lab at your disposal either. Providing you have a fairly modern computer, everything\
    \ else is freely available.\n\n## C++ SETUPS\n\nMost, if not all, operating systems\
    \ have C++ in their code, so it stands to reason that you can learn to program\
    \ in C++ no matter what OS you're currently using.\n\n### COMPUTER\n\nUnless you\
    \ fancy writing out your C++ code by hand on a sheet of paper (which is something\
    \ many older coders used to do), a computer is an absolute must have component.\
    \ PC users can have any recent Linux distro or Windows OS, Mac users the latest\
    \ macOS.\n\n### AN IDE\n\nJust as with Python, an IDE is used to enter and execute\
    \ your C++ code. Many IDEs come with extensions and plugins that help make it\
    \ work better, or add an extra level of functionality. Often, an IDE provides\
    \ enhancements depending on the core OS being used, such as being enhanced for\
    \ Windows 10.\n\n### COMPILER\n\nA compiler is a program that converts the C++\
    \ language into binary, so that the computer can understand. While some IDEs come\
    \ with a compiler built in, others don't. Code::Blocks is our favourite IDE that\
    \ comes with a C++ compiler as part of the package. More on this later.\n\n###\
    \ TEXT EDITOR\n\nSome programmers much prefer to use a text editor to assemble\
    \ their C++ code before running it through a compiler. Essentially you can use\
    \ any text editor to write code, just save it with a .cpp extension. However,\
    \ Notepad++ is one of the best code text editors available.\n\n### INTERNET ACCESS\n\
    \nWhile it's entirely possible to learn how to code on a computer that's not attached\
    \ to the Internet, it's extraordinarily difficult. You need to install relevant\
    \ software, keep it up to date, install any extras or extensions and look for\
    \ help when coding. All of these require access to the Internet.\n\n### TIME AND\
    \ PATIENCE\n\nYes, as with Python, you're going to need to set aside significant\
    \ time to spend on learning how to code in C++. Sadly, unless you're a genius,\
    \ it's not going to happen overnight, or even a week. A good C++ coder has spent\
    \ many years honing their craft, so be patient, start small and keep learning.\n\
    \n## OS SPECIFIC NEEDS\n\nC++ will work in any operating system but getting all\
    \ the necessary pieces together can be confusing to a newcomer. Here are some\
    \ OS specifics for C++.\n\n### LINUX\n\nLinux users are lucky in that they already\
    \ have a compiler and text editor built into their operating system. Any text\
    \ editor allows you to type out your C++ code, when it's saved with a .cpp extension,\
    \ use g++ to compile it.\n\n### WINDOWS\n\nWe have mentioned previously that a\
    \ good IDE is Microsoft's Visual Studio. However, a better IDE and compiler is\
    \ Code::Blocks, which is regularly kept up to date with a new release twice a\
    \ year. Otherwise Windows users can enter their code in Notepad++, then compile\
    \ it with MinGW as used by Code::Blocks.\n\n### RASPBERRY PI\n\nThe Raspberry\
    \ Pi's operating system is Raspbian, which is Linux based. Therefore, you're able\
    \ to write your code out using a text editor, then compile it with g++ as you\
    \ would in any other Linux distro.\n\n### MAC\n\nMac owners will need to download\
    \ and install Xcode to be able to compile their C++ code natively. Other options\
    \ for the macOS include Netbeans, Eclipse or Code::Blocks. Note: the latest Code::Blocks\
    \ isn't available for Mac due to a lack of Mac developers."
  mdcn: "## 向 C++ 问好\n\nC++ 是一种高级编程语言，被广泛应用于众多技术领域。从你喜爱的移动应用、主机和电脑游戏，到整个操作系统，所有这些都使用\
    \ C++ 以及一系列软件开发工具包和自定义库进行开发。\n\nC++ 是你日常使用的大部分技术背后的驱动力，这使得它成为一门复杂且功能异常强大的语言，需要深入掌握。在本节中，我们将介绍如何在你的计算机上安装\
    \ C++ IDE 和编译器。\n\n## 为什么选择 C++？\n\nC++ 是当今最受欢迎的编程语言之一。它最初被称为“带类的 C”，于 1983 年更名为\
    \ C++。它是对原始 C 语言的扩展，是一个通用的面向对象编程环境。\n\n## 一切皆 C\n\n由于该语言的复杂性、强大的功能和高性能，C++ 常被用于开发游戏、程序、设备驱动程序，甚至整个操作系统。\n\
    \nC++ 的历史可以追溯到 1979 年，即家庭计算黄金时代的开端。C++，或者更准确地说是“带类的 C”，是丹麦计算机科学家本贾尼·斯特劳斯特鲁普在攻读博士学位时的创意。斯特劳斯特鲁普的计划是扩展自七十年代初就广泛使用的原始\
    \ C 语言。\n\nC++ 在八十年代的开发者中广受欢迎，因为它是一个更容易掌握的环境，更重要的是，它与原始 C 语言有 99% 的兼容性。这意味着它不仅可以在主流计算实验室中使用，也可以被那些无法接触大型机和大型计算数据中心的普通人使用。\n\
    \nC++ 在数字世界中的影响是巨大的。许多程序、应用程序、游戏甚至操作系统都是用 C++ 编写的。例如，Adobe 的所有主要应用程序，如 Photoshop、InDesign\
    \ 等，都是用 C++ 开发的。你会发现你用来上网的浏览器是用 C++ 编写的，Windows 10、Microsoft Office 以及 Google\
    \ 搜索引擎的核心也是如此。Apple 的 macOS 主要用 C++ 编写（根据功能混合使用其他语言），而 NASA、SpaceX 甚至 CERN 等机构也使用\
    \ C++ 进行各种应用程序、程序、控制以及无数其他计算任务。\n\nC++ 也极其高效，在各方面表现出色，并且是核心 C 语言的更易上手的扩展。这种相对于\
    \ Python、BASIC 等其他语言的更高性能，使其成为现代计算的理想开发环境，因此上述公司才会如此广泛地使用它。\n\nC++ 代码比 Python\
    \ 代码快得多。\n\n```cpp\n#include<iostream>\nusing namespace std;\nvoid main()\n{\n\
    \    char ch;\n    cout<<\"Enter a charater to check it is vowel or not\";\n \
    \   cin>>ch;\n    switch(ch)\n    {\n        case 'a': case 'A':\n           \
    \ cout<<ch<<\" is a Vowel\";\n            break;\n        case 'e': case 'E':\n\
    \            cout<<ch<<\" is a Vowel\";\n            break;\n        case 'i':\
    \ case 'I':\n            cout<<ch<<\" is a Vowel\";\n            break;\n    \
    \    case 'o': case 'O':\n            cout<<ch<<\" is a Vowel\";\n           \
    \ break;\n        case 'u': case 'U':\n            cout<<ch<<\" is a Vowel\";\n\
    \            break;\n    }\n}\n```\n\n虽然 Python 是一门很好的入门编程语言，但 C++ 能将开发者带入一个更广阔的编码世界。通过掌握\
    \ C++，你可能会发现自己在为 Microsoft、Apple 等公司开发代码。通常，C++ 开发者的薪资高于使用其他某些语言的程序员，而且由于其多功能性，C++\
    \ 程序员可以在不同的工作和公司之间转换，而无需重新学习任何特定的东西。然而，Python 是一门更容易上手的语言。如果你是编程新手，我们建议你从 Python\
    \ 开始，花些时间掌握编程结构，以及通过编程解决问题的多种方式和手段。一旦你能轻松地启动计算机，并且能游刃有余地编写 Python 程序，那么就可以转向 C++\
    \ 了。当然，没有什么能阻止你直接跳入 C++；如果你觉得准备好了，那就去尝试吧。\n\n使用 C++ 和使用 Python 一样简单，你只需要一套合适的工具来用\
    \ C++ 与计算机交流，就可以开始你的旅程了。C++ IDE 是免费的，即使是 Microsoft 功能极其强大的 Visual Studio 也可以免费下载和使用。你可以从任何操作系统开始学习\
    \ C++，无论是 macOS、Linux、Windows 甚至是移动平台。\n\n就像 Python 一样，要回答“为什么选择 C++”这个问题，答案是因为它快速、高效，并且被你经常使用的大多数应用程序所开发。它处于技术前沿，是一门值得掌握的绝佳语言。\n\
    \n事实上，你正在使用的操作系统就是用 C++ 编写的。\n\n## 所需设备\n\n你不需要投入大量资金来学习 C++，也不需要一个完整的计算实验室供你使用。只要你有一台相当现代的计算机，其他一切都是免费可用的。\n\
    \n## C++ 环境设置\n\n大多数（如果不是全部）操作系统都在其代码中使用了 C++，因此，无论你当前使用什么操作系统，你都可以学习用 C++ 编程。\n\
    \n### 计算机\n\n除非你愿意在纸上手写 C++ 代码（这是许多老一辈程序员过去常做的事），否则计算机是绝对必需的组件。PC 用户可以使用任何较新的\
    \ Linux 发行版或 Windows 操作系统，Mac 用户则使用最新的 macOS。\n\n### IDE\n\n与 Python 一样，IDE 用于输入和执行你的\
    \ C++ 代码。许多 IDE 附带扩展和插件，有助于使其工作得更好，或增加额外的功能级别。通常，IDE 会根据所使用的核心操作系统提供增强功能，例如针对\
    \ Windows 10 进行了优化。\n\n### 编译器\n\n编译器是一种将 C++ 语言转换为二进制代码的程序，以便计算机能够理解。虽然一些 IDE\
    \ 内置了编译器，但另一些则没有。Code::Blocks 是我们最喜欢的 IDE，它自带 C++ 编译器。稍后会详细介绍。\n\n### 文本编辑器\n\n\
    一些程序员更喜欢使用文本编辑器来组装他们的 C++ 代码，然后再通过编译器运行。本质上，你可以使用任何文本编辑器来编写代码，只需将其保存为 .cpp 扩展名即可。然而，Notepad++\
    \ 是目前最好的代码文本编辑器之一。\n\n### 互联网访问\n\n虽然完全可以在没有连接互联网的计算机上学习编程，但这极其困难。你需要安装相关软件，保持其更新，安装任何额外的组件或扩展，并在编码时寻求帮助。所有这些都需要访问互联网。\n\
    \n### 时间和耐心\n\n是的，就像 Python 一样，你需要投入大量时间来学习如何用 C++ 编程。遗憾的是，除非你是天才，否则这不会在一夜之间，甚至一周内发生。一个优秀的\
    \ C++ 程序员花费了多年时间来磨练他们的技能，所以要有耐心，从小处着手，不断学习。\n\n### 操作系统特定需求\n\nC++ 可以在任何操作系统中工作，但将所有必要的组件组合在一起可能会让新手感到困惑。以下是一些针对\
    \ C++ 的操作系统特定说明。\n\n### LINUX\n\nLinux 用户很幸运，因为他们的操作系统已经内置了编译器和文本编辑器。任何文本编辑器都允许你输入\
    \ C++ 代码，当保存为 .cpp 扩展名时，使用 g++ 来编译它。\n\n### WINDOWS\n\n我们之前提到过，一个好的 IDE 是 Microsoft\
    \ 的 Visual Studio。然而，一个更好的 IDE 和编译器是 Code::Blocks，它每年会定期更新两次。否则，Windows 用户可以在\
