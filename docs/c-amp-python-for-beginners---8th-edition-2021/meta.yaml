    **步骤 9** 你可以看到 Xcode 已经自动为你完成了一个基本的 Hello World 程序。虽然目前可能不太明白，但随着你的学习深入，你会发现更多内容，这只是
    Xcode 利用了 Mac 上可用的资源。


    **步骤 10** 当你想运行代码时，点击“产品” > “运行”。你可能会被要求在 Mac 上启用开发者模式；这是为了授权 Xcode 执行功能，而无需每次会话都输入密码。程序执行后，输出会显示在
    Xcode 窗口的底部。


    ## 如何在 Linux 中设置 C++


    Linux 是一个很棒的 C++ 编码环境。大多数 Linux 发行版已经预装了必要的组件，例如编译器，文本编辑器也非常适合输入代码，包括语法高亮；而且有大量额外的软件可供你使用。


    ### LINUX++


    如果你不熟悉 Linux，我们建议你看看 BDM Publications 系列中的一本 Linux 书籍。如果你有树莓派，下面使用的命令同样适用，本示例中我们使用的是
    Linux Mint。


    **步骤 1** 第一步是确保 Linux 已为你的 C++ 代码做好准备，因此请检查系统和软件是否为最新。打开终端并输入：**sudo apt-get update
    && sudo apt-get upgrade**。然后按回车键并输入你的密码。这些命令会更新整个系统和所有已安装的软件。


    **步骤 2** 大多数 Linux 发行版都预装了开始 C++ 编程所需的所有必要组件；不过，检查一下所有组件是否齐全总是值得的。仍在终端中，输入：**sudo
    apt-get install build-essential** 并按回车键。如果你有正确的组件，则不会安装任何东西；如果你缺少某些组件，该命令会安装它们。


    **步骤 3** 令人惊讶的是，就是这样。一切都已准备就绪，你可以开始编码了。以下是如何让你的第一个 C++ 程序运行起来。在 Linux Mint 中，主要的文本编辑器是
    Xed，你可以通过点击菜单并在搜索栏中输入 Xed 来启动它。点击右侧窗格中的“文本编辑器”按钮将其打开。


    **步骤 4** 在 Xed 或你可能使用的任何其他文本编辑器中，输入构成你的 C++ Hello World 程序的代码行。它与 Mac 生成的略有不同：


    ```

    #include <iostream>

    int main()

    {

    //My first C++ program

    std::cout << "Hello World!\n";

    }

    ```'
