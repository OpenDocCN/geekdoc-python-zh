    \n## 使用注释\n\n虽然注释对于构成游戏、应用程序甚至整个操作系统的众多代码行来说似乎是一个次要元素，但实际上它们可能是最重要的因素之一。\n\n###\
    \ 注释的重要性\n\n代码中的注释基本上是人类可读的描述，详细说明了代码在特定点正在做什么。它们听起来可能不是特别重要，但没有注释的代码是编程中许多令人沮丧的领域之一，无论你是专业人士还是刚刚入门。\n\
    \n简而言之，所有代码都应该以有效描述一行、一个部分或单个元素目的的方式进行注释。你应该养成尽可能多地添加注释的习惯，想象一个对编程一无所知的人可以拿起你的代码，仅仅通过阅读你的注释就能理解它要做什么。\n\
    \n在专业环境中，注释对于代码的成功以及最终公司的成功至关重要。在一个组织中，许多程序员与工程师、其他开发人员、硬件分析师等组成团队工作。如果你是为公司编写定制软件的团队的一员，那么你的注释有助于节省大量时间，以防出现问题，而其他团队成员必须接手并追踪线索以定位问题。\n\
    \n设身处地为那些负责找出程序问题的人着想。该程序有超过 80 万行代码，分布在几个不同的模块中。你很快就会理解，从原始程序员那里获得一些帮助（以良好注释的形式）是多么必要。\n\
    \n最好的注释总是简洁的，并将代码逻辑地联系起来，详细说明当程序执行到这一行或这一部分时会发生什么。你不需要对每一行都进行注释。像 `if x==0` 这样的语句不需要你注释说“如果\
    \ x 等于零，那么做某事”；这对读者来说是显而易见的。然而，如果 x 等于零会极大地改变用户对程序的体验，例如，他们用完了生命，那么这肯定需要注释。\n\n\
    即使代码是你自己的，你也应该像打算公开与他人分享一样编写注释。这样，当你再次回到那段代码时，总能理解你做了什么，或者哪里出错了，或者什么效果很好。\n\n\
    注释是良好的实践，一旦你理解了如何在需要的地方添加注释，你很快就会做得像第二天性一样自然。\n\n![](img/588364e02a77f179099fae91a1713f0a_65_0.png)\n\
