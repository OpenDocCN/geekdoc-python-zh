    functions to work out sets of numbers, absolute values, complex numbers and a
    host of mathematical expressions and Pythagorean tongue-twisters. For example,
    to convert a number to binary, use:

    bin(3)


    ![](img/588364e02a77f179099fae91a1713f0a_30_4.png)


    STEP 10 Execute the code from Step 9, and you can see a series of True or False
    statements, depending on the result of the two defining values: 6 and 7. It''s
    an extension of what you''ve looked at, and an important part of programming.


