  md: "# Data Types\n\n```\ncout.precision(22);\ncout << PI;\n}\n```\n\nThis is mainly\
    \ due to the conversion from binary in the compiler and that the IEEE 754 double\
    \ precision standard occupies 64-bits of data, of which 52-bits are dedicated\
    \ to the significant (the significant digits in a floating-point number) and roughly\
    \ 3.5-bits are taken holding the values 0 to 9. If you divide 53 by 3.5, then\
    \ you arrive at 15.142857 recurring, which is 15-digits of precision.\n\n![](img/588364e02a77f179099fae91a1713f0a_70_0.png)\n\
    \nTo be honest, if you're creating code that needs to be accurate to more than\
    \ fifteen decimal places, then you wouldn't be using C++, you would use some scientific\
    \ specific language with C++ as the connective tissue between the two languages.\n\
    \nYou can create your own data types, using an alias-like system called typedef.\
    \ For example:\n\n![](img/588364e02a77f179099fae91a1713f0a_70_1.png)\n\n![](img/588364e02a77f179099fae91a1713f0a_70_2.png)\n\
    \nAgain, build and run the code; as you can see from the command line window,\
    \ the number represented by the variable PI is different to the number you've\
    \ told C++ to use in the variable. The output reads the value of PI as 3.141592653589793115998,\
    \ with the numbers going awry from the fifteenth decimal place.\n\n![](img/588364e02a77f179099fae91a1713f0a_70_3.png)\n\
    \n```\n#include <iostream>\nusing namespace std;\ntypedef int metres;\n\nint main()\n\
    {\n    metres distance;\n    distance = 15;\n    cout << \"distance in metres\
    \ is: \" << distance;\n}\n```\n\n![](img/588364e02a77f179099fae91a1713f0a_70_4.png)\n\
    \nThis code when executed creates a new int data type called metres. Then, in\
    \ the main code block, there's a new variable called distance, which is an integer;\
    \ so you're basically telling the compiler that there's another name for int.\
    \ We assigned the value 15 to distance and displayed the output: distance in metres\
    \ is 15.\n\nIt might sound a little confusing to begin with but the more you use\
    \ C++ and create your own code, the easier it becomes."
  merge: -1
