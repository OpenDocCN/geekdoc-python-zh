    Queue after dequeue: [78, 54]\nQueue size: 2\n```\n\n## 将列表用作栈和队列\n\n栈是一种 LIFO（“后进先出”）数据结构，分别使用\
    \ `push()` 和 `pop()` 函数来添加和移除元素。栈中最近添加的元素位于顶部，因此是第一个可以从栈中移除的元素。\n\n以下代码块演示了如何在\
    \ Python 中创建一个栈，以及如何从栈中移除和追加项目。创建一个 Python 列表（将用作栈）：\n\n```\n>>> s = [1,2,3,4]\n\
