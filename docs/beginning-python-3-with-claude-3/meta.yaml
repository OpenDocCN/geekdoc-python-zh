    # Player of Games (PoG)


    The DeepMind team at Google devised the general-purpose PoG (player of games)
    algorithm that is based on the following techniques:


    +   - CFR (counterfactual regret minimization)

    - CVPN (counterfactual value-and-policy network)

    - GT-CFT (growing tree CFR)

    - CVPN


    The counterfactual value-and-policy network (CVPN) is a neural network that calculates
    the counterfactuals for each state belief in the game. This is key to evaluating
    the different variants of the game at any given time.


    Growing tree CFR (GT-CFR) is a variation of CFR that is optimized for game-trees
    trees that grow over time. GT-CFR is based on two fundamental phases, which is
    discussed in more detail here:


