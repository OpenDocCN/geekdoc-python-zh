    # Do LLMs Understand Language?


    As a whimsical and partially related analogy, consider the following story that
    involves a two chess grand masters, a confidence man, and a twelve-year-old boy
    who are traveling on a cross-Atlantic ship during the early 1900s.


    When the ship was several hours from its destination, the confidence man made
    an audacious bet that in the span of two hours he could train the young boy to
    play chess so that the matches would result in either a draw or win for the boy.
    Conditionally the grand masters and the boy were required to play in a closet-like
    cloaked area, and the three participants were not permitted to communicate in
    any manner with each other.


    The grand masters accepted the challenge, expecting that they would leverage their
    tremendous knowledge over the young competitor. As the games progressed, the grand
    masters were shocked by the speed and sophistication of the chess moves of the
    boy. Their confidence was quickly replaced by concern and then by desperation.
    Eventually one grand master offered a draw and the other grand master conceded
    the match.


    The deception was exceedingly simple: whenever one grand master made a chess move,
    the boy would make the same chess move against the *other* grand master, which
    effectively meant that the grand masters were competing against each other. Fortunately
    for the confidence man, the ship reached its destination, and he managed to collect
    the reward and the boy and then disembark before the chess grand masters realized
    that they had been swindled.


    The point of the preceding story is that the boy made extremely intelligent chess
    moves but did not necessarily understand the logic for making those chess moves.
    Hence, if a human being does not understand the logic behind an action, it suggests
    that it''s even less likely for an LLM to have a human-level understanding of
    the reasons for its recommendations.


    # Caveats Regarding LLMs


    Although LLMs are capable of impressive (astonishing?) results, keep in mind the
    following points:


    +   - smaller models can outperform larger models (in some tasks)

    - models generate false results (“hallucinating”)

    - some models process long documents and others are more conversational

    - the increasing relevance of vector databases

    - most models are not trained on up-to-date datasets (only up to a certain point
    in time)'
