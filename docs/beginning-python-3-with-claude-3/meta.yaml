  md: '# CHAPTER 1


    # INTRODUCTION TO PYTHON


    This chapter contains an introduction to Python, with information about useful
    tools for installing Python modules, basic Python constructs, and how to work
    with some data types in Python.

    The first part of this chapter covers how to install Python, some Python environment
    variables, and how to use the Python interpreter. Readers will see Python code
    samples and also how to save Python code in text files that they can launch from
    the command line. The second part of this chapter shows how to work with simple
    data types, such as numbers, fractions, and strings. The final part of this chapter
    discusses exceptions and how to use them in Python scripts.

    **Note:** The Python files in this book are for Python 3.x.


    # TOOLS FOR PYTHON


    The Anaconda Python distribution available for Windows, Linux, and Mac, and it''s
    downloadable here: http://continuum.io/downloads

    Anaconda is well-suited for modules such as numpy and scipy, and for Windows users,
    Anaconda appears to be a better alternative.


    # easy_install and pip


    Both easy_install and pip are very easy to use when one needs to install Python
    modules. Whenever one needs to install a Python module (and there are many in
    this book), use either easy_install or pip with the following syntax:


    ```

    easy_install <module-name>

    pip install <module-name>

    ```'
