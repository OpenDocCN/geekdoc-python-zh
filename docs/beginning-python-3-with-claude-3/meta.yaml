- md: '## OpenAI


    In addition, OpenAI developed `DALL-E` that generates images from text. OpenAI
    initially did not permit users to upload images that contained realistic faces.
    Later (Q4/2022) OpenAI changed its policy to allow users to upload faces into
    its online system. Check the OpenAI Web page (https://openai.com/) for more details.
    Incidentally, diffusion models have superseded the benchmarks of `DALL-E`.


    OpenAI has also released a public beta of `Embeddings`, which is a data format
    that is suitable for various types of tasks with machine learning, as described
    here: https://beta.openai.com/docs/guides/embeddings


    OpenAI is the creator of `Codex` that provides a set of models that were trained
    on NLP. The initial release of Codex was in private beta, and more information
    is accessible here: https://beta.openai.com/docs/engines/instruct-series-beta


    OpenAI provides four models that are collectively called their Instruct models,
    which support the ability of GPT-3 to generate natural language. These models
    will be deprecated in early January 2024 and replaced with updated versions of
    GPT-3, ChatGPT, and GPT-4.


    To learn more about the features and services that OpenAI offers, navigate to
    the following link: https://platform.openai.com/overview


    ## COHERE


    Cohere is a start-up and a competitor of OpenAI, and its home page is here: https://cohere.ai/


    Cohere develops cutting-edge NLP technology that is commercially available for
    multiple industries. Cohere is focused on models that perform textual analysis
    instead of models for text generation (such as GPT-based models). The founding
    team of Cohere is impressive: CEO Aidan Gomez is one of the co-inventors of the
    transformer architecture, and CTO Nick Frosst is a protege of Geoff Hinton.


    ## HUGGING FACE


    Hugging Face is a popular community-based repository for open-source NLP technology,
    and its home page is here: https://github.com/huggingface


    Unlike OpenAI or Cohere, Hugging Face does not build its own NLP models. Instead,
    Hugging Face is a platform that manages a plethora of open-source NLP models that
    customers can fine-tune and then deploy those fine-tuned models. Indeed, Hugging
    Face has become the eminent location for people to collaborate on NLP models,
    and sometimes described as “GitHub for machine learning and NLP.”


    ### Hugging Face Libraries


    Hugging Face provides three important libraries: datasets, tokenizers, and transformers.
    The Accelerate library supports PyTorch models. The datasets library provides
    an assortment of libraries for NLP. The tokenizers library enables users to convert
    text data to numeric values.


    Perhaps the most impressive library is the transformers library that provides
    an enormous set of pretrained BERT-based models in order to perform a wide variety
    of NLP tasks. The Github repository is here: https://github.com/huggingface/transformers


    ### Hugging Face Model Hub


    Hugging Face provides a model hub that provides a plethora of models that are
    accessible online. Moreover, the Web site supports online testing of its models,
    which includes the following tasks:


    - masked word completion with BERT

    - name entity recognition with Electra

    - natural language inference with RoBERTa

    - question answering with DistilBERT

    - summarization with BART

    - text generation with GPT-2

    - translation with T5


    Navigate to the following link to see the text generation capabilities of "write
    with transformer": https://transformer.huggingface.co


    ## META AI


    Meta AI is an AI assistant that is built with Llama 3. Meta AI can be used with
    multiple products (such as WhatsApp and Messenger) from Meta, and it is also available
    on mobile phones. The following prompt was given to Meta AI:


    ```

    Please provide a detailed description of MetaAI.

    Meta AI

    ```


    **Meta AI: Your Friendly AI Assistant**

    I''m Meta AI, an AI assistant developed by Meta Platforms Inc. My primary function
    is to understand and respond to human input in a helpful and engaging manner.
    I can answer questions, provide information, and even generate text based on a
    given prompt.


    **Key Features:**

    1. **Natural Language Processing (NLP):** I''m trained on a massive dataset of
    text from various sources, allowing me to understand and process human language.

    2. **Knowledge Base**: I have access to a vast knowledge base that I can draw
    upon to answer questions and provide information.

    3. **Contextual Understanding**: I can understand the context of a conversation
    or question, enabling me to provide more accurate and relevant responses.

    4. **Text Generation**: I can generate text based on a prompt, topic, or style.

    5. **Conversational Interface**: I''m designed to engage in natural-sounding conversations,
    using a human-like tone and language.


    **Capabilities:**


    - Answering questions on various topics, from science and history to entertainment
    and culture

    - Generating text summaries, articles, or creative writing

    - Offering suggestions and ideas for creative projects

    - Providing definitions and explanations for complex terms and concepts

    - Conversing on various topics, from news and current events to hobbies and interests


    **Limitations:**


    - While I strive to provide accurate and helpful responses, I''m not perfect and
    may make mistakes or not fully understand certain contexts.

    - My knowledge base is vast but not exhaustive, so I may not always have the answer
    to a specific question.

    - I''m a machine, so while I can generate text, I don''t have personal experiences
    or emotions like humans do.


    **Overall**, I''m here to assist and provide helpful information, answer questions,
    and engage in conversation to the best of my abilities. Feel free to ask me anything!


    ## AI21


    AI21 is a company that provides proprietary large language models via API to support
    the applications of its customers. The current SOTA model of AI21 is called Jurassic-1
    (roughly the same size as GPT-3), and AI21 also creates its own applications on
    top of Jurassic-1 and other models. The current application suite of AI21 involves
    tools that can augment reading and writing.


    Primer is an older competitor in this space, founded two years before the invention
    of the transformer. The company primarily serves clients in government and defense.


    ## ANTHROPIC AND CLAUDE 3


    Anthropic was created in 2021 by former employees of OpenAI and its home page
    is here: https://www.anthropic.com/


    Anthropic has significant financial support from an assortment of companies, including
    Google and Salesforce. As this book goes to print, Anthropic released Claude 3
    as a competitor to ChatGPT, and it''s available in three versions: Opus, Sonnet,
    and Haiku (Opus is the most powerful version).


    Claude 3 Opus has a high degree of comprehension and expert level knowledge in
    fields such as mathematics. Opus is currently available in many countries for
    a monthly subscription of USD 20.


    Claude 3 Sonnet is twice as fast as earlier versions of Claude (i.e., Claude 2
    and Claude 2.1), along with improved reasoning capabilities, and it''s well-suited
    for fast answers to queries. In addition, Sonnet is freely available.


    Claude 3 Haiku the most cost effective as well as the fastest version of Claude
    3, and it''s available on a per-token basis.


    Other aspects of Claude 3 to keep in mind when comparing Claude 3 with other LLMs.
    For example, Claude 3 is more likely to respond to prompts then earlier versions.
    Second, Claude 3 is less likely to respond with incorrect results and more likely
    to indicate that it lacks information regarding a prompt. In addition, Claude
    3 currently provides a 200K context window, and is likely to support one million
    tokens in future iterations of Claude 3.


    ## SUMMARY


    This chapter started with an introduction to generative AI and several components
    of generative AI, including LLMs such as ChatGPT, Gemini, Claude 3, Meta AI, DALLE-3,
    and so forth. Readers also learned about the difference between generative AI
    versus Conversational AI, AGI (Artificial General Intelligence), and several branches
    of machine learning, such as deep learning, natural language processing, and reinforcement
    learning.


    Readers also acquired a basic understanding of LLMs and their role in generative
    AI, and in the final section of this chapter, they were introduced to creating
    generative AI applications, which included a rudimentary Python code sample.'
