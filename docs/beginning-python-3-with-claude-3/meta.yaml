  md: 'Hallucinations in large language models (LLMs) refer to the generation of text
    or responses that are not based on the input prompt, context, or training data.
    Hallucinations can be problematic as they can lead to inaccurate, misleading,
    or even harmful responses. Here are some types of hallucinations that can occur
    in LLMs:


    # ### 1. Context Hallucinations:


    The model generates text that is not supported by the input context or prompt.
    For example, if the prompt is “What is the capital of France?,” the model might
    respond with “The capital of France is Berlin” (which is incorrect).


    # ### 2. Knowledge Hallucinations:


    The model generates information that is not present in its training data or knowledge
    base. For instance, if the model is asked about a fictional event, it might provide
    a detailed description of the event as if it were real.


    # ### 3. Common Sense Hallucinations:


    The model generates responses that defy common sense or real-world logic. For
    example, if asked about the color of the sky, the model might respond with “The
    sky is plaid.”


    # ### 4. Over-Imagination Hallucinations:


    The model generates overly elaborate or fantastical responses that are not grounded
    in reality. For instance, if asked to describe a simple object, the model might
    create an elaborate, fictional backstory for the object.


    # ### 5. Mode Collapse Hallucinations:


    The model generates repetitive or identical responses to different prompts, indicating
    a collapse of the model''s ability to generate diverse responses.


    # ### 6. Adversarial Hallucinations:


    The model generates responses that are intentionally misleading or harmful, often
    as a result of adversarial attacks or prompts designed to exploit the model''s
    vulnerabilities.


    # ### 7. Linguistic Hallucinations:


    The model generates text that is grammatically correct but semantically nonsensical.
    For example, “Colorless green ideas sleep furiously” is a famous example of linguistic
    hallucination.'
