    \ with that data. In addition, they learned how to generate a scatterplot from\
    \ data in a Pandas Dataframe.\n\n## CHAPTER 5\n\n## THE GENERATIVE AI LANDSCAPE\n\
    \nThis chapter provides a fast-paced introduction to generative AI that highlights\
    \ some of the important features of generative AI.\n\nThe first section of this\
    \ chapter introduces readers to generative AI, including key features and techniques.\
    \ It also explores the difference between conversational AI and generative AI.\n\
    \nThe second section of this chapter discusses generative AI models, such as Dall-E,\
    \ ChatGPT, and GPT-4. Readers will also learn about generative AI versus machine\
    \ learning (ML), deep learning (DL), and natural language processing (NLP).\n\n\
    The third section of this chapter poses open-ended types of questions regarding\
    \ artificial general intelligence (AGI), and a brief comparison of AGI versus\
    \ generative AI. The fourth part of this chapter introduces large language models\
    \ (LLMs), along with various facets of LLMs, such as their cost, size versus performance,\
    \ and emergent abilities.\n\nThe fifth section of this chapter introduces readers\
    \ to the concept of hallucinations, which is an important topic: All LLMs suffer\
    \ from hallucinations. In fact, LLMs can unintentionally generate non-sensical\
    \ and even hilarious responses to prompts.\n\nThe final section of this chapter\
    \ starts with a brief introduction to several companies that make significant\
    \ contributions in AI and NLP. Indeed, readers will become very familiar with\
    \ these companies if they plan to pursue a career in NLP.\n\nOne detail to keep\
    \ in mind: The term *prompt* in this chapter refers to any text-based string that\
    \ one provides to a large language model (LLM), and the response from the LLM\
    \ is a text-based string that is called a *completion*.\n\n## WHAT IS GENERATIVE\
    \ AI?\n\n*Generative AI* refers to a subset of artificial intelligence models\
    \ and techniques that are designed to generate new data samples that are similar\
    \ in nature to a given set of input data. The goal is to produce content or data\
    \ that wasn't part of the original training set but is coherent, contextually\
    \ relevant, and in the same style or structure.\n\nGenerative AI stands apart\
    \ in its ability to create and innovate, as opposed to merely analyzing or classifying.\
    \ The advancements in this field have led to breakthroughs in creative domains\
    \ and practical applications, making it a cutting-edge area of AI research and\
    \ development.\n\n### Key Features of Generative AI\n\nThe following bullet list\
    \ contains key features of generative AI, followed by a brief description for\
    \ each bullet item:\n\n-   **Data generation**: refers to the ability to create\
    \ new data points that are not part of the training data but resemble it. This\
    \ can include text, images, music, videos, or any other form of data.\n-   **Synthesis**:\
    \ means that generative models can blend various inputs to generate outputs that\
    \ incorporate features from each input, like merging the styles of two images.\n\
    -   **Learning distributions**: indicates generative AI models aim to learn the\
    \ probability distribution of the training data so they can produce new samples\
    \ from that distribution.\n\n### Popular Techniques in Generative AI\n\n*Generative\
    \ adversarial networks (GANs)*: GANs consist of two networks, a generator and\
    \ a discriminator, that are trained simultaneously. The generator tries to produce\
    \ fake data, while the discriminator tries to distinguish between real data and\
    \ fake data. Over time, the generator gets better at producing realistic data.\n\
    \n*Variational autoencoders (VAEs)*: VAEs are probabilistic models that learn\
    \ to encode and decode data in a manner that the encoded representations can be\
    \ used to generate new data samples.\n\n*Recurrent neural networks (RNNs)*: Used\
    \ primarily for sequence generation, such as text or music.\n\n### What Makes\
    \ Generative AI Different\n\n*Creation versus classification*: While most traditional\
    \ AI models aim to classify input data into predefined categories, generative\
    \ models aim to create new data."
