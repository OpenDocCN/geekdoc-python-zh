    # WHAT ARE LLMS?


    LLM is an acronym for large language model, which is based on the transformer
    architecture (not discussed in this book). In simple terms, LLMs take unstructured
    data as input and attempt to produce useful output, and in many cases LLMs are
    reasonably successful.


    Keep in mind that there are various types of LLMs, including text to text, text
    to image, text to audio, and text -to video. This book focuses on text-to-text
    LLMs, and readers can perform an Internet search to find information about other
    types of LLMs. In addition, there is a non-step race (marathon?) among several
    of the top AI companies to create LLMs that are faster, cheaper, and more accurate
    than their predecessors.


    LLMs are known for their size, which is typically at least ten billion parameters
    (BERT has “only” 1.5 billion parameters). Moreover, they involve very large data
    sets for the training step, which can require weeks of training time at a cost
    of millions of dollars. Unfortunately, there is an associated environment cost:
    according to the following article, the carbon footprint of training GPT-3 is
    comparable to a car making a round trip to the moon:


    https://www.theregister.com/2020/11/04/gpt3_carbon_footprint_estimate/


    Outside of BERT and the BERT family, one well-known LLM that generated tremendous
    interest is GPT-3 that consists of 175B parameters, which is almost twelve times
    larger than BERT. There are models that are much larger: 540B parameters as well
    as more than 1.2 trillion parameters (such as Switch and DAO). The next LLM that
    created tremendous excitement was ChatGPT, which was followed by GPT-4, and soon
    will be succeeded by GPT-5.


    # What Is the Purpose of LLMs?


