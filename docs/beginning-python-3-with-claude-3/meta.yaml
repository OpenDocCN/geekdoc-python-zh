    var1 = 123\nvar2 = 456.78\nprint \"type var1: \",type(var1)\nprint \"type var2:\
    \ \",type(var2)\n```\n\nThe output of the preceding code block is here:\n\n```\n\
    type var1: <type 'int'>\ntype var2: <type 'float'>\n```\n\n## SUMMARY\n\nThis\
    \ chapter showed how to work with various Python data structures. In particular,\
