- md: "Be sure to read the caveat regarding the `eval()` function that is mentioned\
    \ earlier in this chapter.\n\n## COMMAND-LINE ARGUMENTS\n\nPython provides a `getopt`\
    \ module to parse command-line options and arguments, and the Python `sys` module\
    \ provides access to any command-line arguments via the `sys.argv`. This serves\
    \ two purposes:\n\n1. `sys.argv` is the list of command-line arguments.\n2. `len(sys.argv)`\
    \ is the number of command-line arguments.\n\nHere `sys.argv[0]` is the program\
    \ name, so if the Python program is called `test.py`, it matches the value of\
    \ `sys.argv[0]`.\n\nNow readers can provide input values for a Python program\
    \ on the command line instead of providing input values by prompting users for\
    \ their input. As an example, consider the script `test.py` shown here:\n\n```python\n\
    #!/usr/bin/python\nimport sys\nprint('Number of arguments:', len(sys.argv), 'arguments')\n\
    print('Argument List:', str(sys.argv))\n```\n\nRun the previous as follows:\n\n\
    ```\npython test.py arg1 arg2 arg3\n```\n\nThis will produce following result:\n\
    \n```\nNumber of arguments: 4 arguments.\nArgument List: ['test.py', 'arg1', 'arg2',\
    \ 'arg3']\n```\n\nThe ability to specify input values from the command line provides\
    \ useful functionality. For example, suppose that one has a custom Python class\
    \ that contains the methods `add` and `subtract` to add and subtract a pair of\
    \ numbers.\n\nOne can use command-line arguments in order to specify which method\
    \ to execute on a pair of numbers, as shown here:\n\n```\npython MyClass add 3\
    \ 5\npython MyClass subtract 3 5\n```\n\nThis functionality is very useful because\
    \ users can programmatically execute different methods in a Python class, which\
    \ means that they can write unit tests for their code as well.\n\nListing 1.14\
    \ displays the contents of `hello.py` that shows users how to use `sys.argv` to\
    \ check the number of command line parameters.\n\n## LISTING 1.14: hello.py\n\n\
    ```python\nimport sys\n\ndef main():\n    if len(sys.argv) >= 2:\n        name\
    \ = sys.argv[1]\n    else:\n        name = 'World'\n    print('Hello', name)\n\
    \n# Standard boilerplate to invoke the main() function\nif __name__ == '__main__':\n\
    \    main()\n```\n\nListing 1.14 defines the `main()` function that checks the\
    \ number of command-line parameters: If this value is at least 2, then the variable\
    \ `name` is assigned the value of the second parameter (the first parameter is\
    \ `hello.py`), otherwise `name` is assigned the value `Hello`. The `print()` statement\
    \ then prints the value of the variable `name`.\n\nThe final portion of Listing\
    \ 1.14 uses conditional logic to determine whether or not to execute the `main()`\
    \ function.\n\n## SUMMARY\n\nThis chapter explained how to work with numbers and\
    \ perform arithmetic operations on numbers. Readers then learned how to work with\
    \ strings and use string operations. They also learned how to use the try/except\
    \ construct to handle exceptions that might occur in their Python code. The next\
    \ chapter shows how to work with conditional statements, loops, and user-defined\
    \ functions in Python.\n\n## CHAPTER 2\n\n## CONDITIONAL LOGIC, LOOPS, AND FUNCTIONS\n\
    \nThis chapter introduces readers to various ways to perform conditional logic\
    \ in Python, as well as control structures and user-defined functions in Python.\
    \ Virtually every Python program that performs useful calculations requires some\
    \ type of conditional logic or control structure (or both). Although the syntax\
    \ for these Python features is slightly different from other languages, the functionality\
    \ will be familiar.\n\nThe first part of this chapter contains code samples that\
    \ illustrate how to handle if-else conditional logic in Python, as well as if-elsif-else\
    \ statements. The second part of this chapter discusses loops and while statements\
    \ in Python. This section contains an assortment of examples (comparing strings,\
    \ computing numbers raised to different exponents, and so forth) that illustrate\
    \ various ways that one can use loops and while statements in Python.\n\nThe third\
    \ part of this chapter contains examples that involve nested loops and recursion.\
    \ The final part of this chapter introduces readers to user-defined Python functions.\n\
    \n## PRECEDENCE OF OPERATORS IN PYTHON\n\nWhen one has an expression involving\
    \ numbers, they might remember that multiplication (“*”) and division (“/”) have\
    \ higher precedence than addition (“+”) or subtraction (“-”). Exponentiation has\
    \ even higher precedence than these four arithmetic operators.\n\nInstead of relying\
    \ on precedence rules, it’s simpler (as well as safer) to use parentheses. For\
    \ example, (x/y)+10 is clearer than x/y+10, even though they are equivalent expressions.\n\
    \nAs another example, the following two arithmetic expressions are the equivalent,\
    \ but the second is less error prone than the first:\n\n```\nx/y+3*z/8+x*y/z-3*x\n\
    (x/y) + (3*z) /8+ (x*y) / z- (3*x)\n```\n\nIn any case, the following Web site\
    \ contains precedence rules for operators in Python:\n\nhttp://www.mathcs.emory.edu/~valerie/courses/fall10/155/resources/op_precedence.html\n\
    \n## PYTHON RESERVED WORDS\n\nEvery programming language has a set of reserved\
    \ words: a set of words that cannot be used as identifiers, and Python is no exception.\
    \ The Python reserved words are: and, exec, not, assert, finally, or, break, for,\
    \ pass, class, from, print, continue, global, raise, def, if, return, del, import,\
    \ try, elif, in, while, else, is, with, except, lambda, and yield.\n\nIf one inadvertently\
    \ uses a reserved word as a variable, they will see an “invalid syntax” error\
    \ message instead of a “reserved word” error message. For example, suppose they\
    \ create a Python script test1.py with the following code:\n\n```python\nbreak\
    \ = 2\nprint('break =', break)\n```\n\nIf they run the preceding Python code,\
    \ they will see the following output:\n\n```\nFile \"test1.py\", line 2\n    break\
    \ = 2\n          ^\nSyntaxError: invalid syntax\n```\n\nA quick inspection of\
    \ the Python code reveals the fact that they are attempting to use the reserved\
    \ word break as a variable.\n\n## WORKING WITH LOOPS IN PYTHON\n\nPython supports\
    \ for loops, while loops, and range() statements. The following subsections illustrate\
    \ how one can use each of these constructs.\n\n### Python for Loops\n\nPython\
    \ supports the for loop whose syntax is slightly different from other languages\
    \ (such as JavaScript and Java). The following code block shows how to use a `for`\
    \ loop in Python in order to iterate through the elements in a list:\n\n```python\n\
    >>> x = ['a', 'b', 'c']\n>>> for w in x:\n...     print(w)\n...\na\nb\nc\n```\n\
    \nThe preceding code snippet prints three letters on three separate lines. Users\
    \ can force the output to be displayed on the same line (which will “wrap” if\
    \ they specify a large enough number of characters) by appending a comma “,” in\
    \ the print statement, as shown here:\n\n```python\n>>> x = ['a', 'b', 'c']\n\
    >>> for w in x:\n...     print(w, end=' ')\n...\na b c\n```\n\nOne can use this\
    \ type of code when they want to display the contents of a text file in a single\
    \ line instead of multiple lines.\n\nPython also provides the built-in `reversed()`\
    \ function that reverses the direction of the loop, as shown here:\n\n```python\n\
    >>> a = [1, 2, 3, 4, 5]\n>>> for x in reversed(a):\n...     print(x)\n5\n4\n3\n\
    2\n1\n```\n\nNote that reversed iteration only works if the size of the current\
    \ object can be determined or if the object implements a `__reversed__()` “magic”\
    \ method.\n\n### A `for` Loop With `try/except` in Python\n\nListing 2.1 displays\
    \ the contents of `string_to_nums.py` that illustrates how to calculate the sum\
    \ of a set of integers that have been converted from strings.\n\n## LISTING 2.1:\
    \ string_to_nums.py\n\n```python\nline = '1 2 3 4 10e abc'\nsum = 0\ninvalidStr\
    \ = \"\"\nprint('String of numbers:',line)\n\nfor str in line.split(\" \"):\n\
    \    try:\n        sum = sum + eval(str)\n    except:\n        invalidStr = invalidStr\
    \ + str + ' '\n\nprint('sum:', sum)\nif(invalidStr != \"\"):\n    print('Invalid\
    \ strings:',invalidStr)\nelse:\n    print('All substrings are valid numbers')\n\
    ```\n\nListing 2.1 initializes the variables `line`, `sum`, and `invalidStr`,\
    \ and then displays the contents of line. The next portion of Listing 2.1 splits\
    \ the contents of `line` into words, and then uses a `try` block in order to add\
    \ the numeric value of each word to the variable `sum`. If an exception occurs,\
    \ the contents of the current `str` is appended to the variable `invalidStr`.\n\
    \nWhen the loop has finished execution, Listing 2.1 displays the sum of the numeric\
    \ words, followed by the list of words that are not numbers. The output from Listing\
    \ 2.1 is here:\n\n```\nString of numbers: 1 2 3 4 10e abc\nsum: 10\nInvalid strings:\
    \ 10e abc\n```\n\n### Numeric Exponents in Python\n\nListing 2.2 displays the\
    \ contents of `nth_exponent.py` that illustrates how to calculate intermediate\
    \ powers of a set of integers.\n\n## LISTING 2.2: nth_exponent.py\n\n```python\n\
    maxPower = 4\nmaxCount = 4\n\ndef pwr(num):\n    prod = 1\n    for n in range(1,maxPower+1):\n\
    \        prod = prod*num\n        print(num,'to the power',n, 'equals',prod)\n\
    \    print('-------------')\n\nfor num in range(1,maxCount+1):\n    pwr(num)\n\
    ```\n\nListing 2.2 contains a function called `pwr()` that accepts a numeric value.\
    \ This function contains a loop that prints the value of that number raised to\
    \ the power `n`, where `n` ranges between 1 and `maxPower+1`."
  mdcn: "请务必阅读本章前面提到的关于 `eval()` 函数的注意事项。\n\n## 命令行参数\n\nPython 提供了一个 `getopt` 模块来解析命令行选项和参数，而\
    \ Python 的 `sys` 模块则通过 `sys.argv` 提供对任何命令行参数的访问。这有两个用途：\n\n1.  `sys.argv` 是命令行参数的列表。\n\
    2.  `len(sys.argv)` 是命令行参数的数量。\n\n这里 `sys.argv[0]` 是程序名，因此如果 Python 程序名为 `test.py`，它就与\
    \ `sys.argv[0]` 的值匹配。\n\n现在，读者可以在命令行上为 Python 程序提供输入值，而不是通过提示用户输入来提供输入值。例如，考虑下面显示的脚本\
    \ `test.py`：\n\n```python\n#!/usr/bin/python\nimport sys\nprint('Number of arguments:',\
    \ len(sys.argv), 'arguments')\nprint('Argument List:', str(sys.argv))\n```\n\n\
    按如下方式运行上述脚本：\n\n```\npython test.py arg1 arg2 arg3\n```\n\n这将产生以下结果：\n\n```\n\
    Number of arguments: 4 arguments.\nArgument List: ['test.py', 'arg1', 'arg2',\
    \ 'arg3']\n```\n\n从命令行指定输入值的能力提供了有用的功能。例如，假设有一个自定义的 Python 类，其中包含 `add` 和 `subtract`\
    \ 方法，用于对一对数字进行加法和减法运算。\n\n可以使用命令行参数来指定对一对数字执行哪个方法，如下所示：\n\n```\npython MyClass\
    \ add 3 5\npython MyClass subtract 3 5\n```\n\n此功能非常有用，因为用户可以以编程方式执行 Python 类中的不同方法，这意味着他们也可以为代码编写单元测试。\n\
    \n清单 1.14 显示了 `hello.py` 的内容，向用户展示如何使用 `sys.argv` 来检查命令行参数的数量。\n\n## 清单 1.14：hello.py\n\
    \n```python\nimport sys\n\ndef main():\n    if len(sys.argv) >= 2:\n        name\
    \ = sys.argv[1]\n    else:\n        name = 'World'\n    print('Hello', name)\n\
    \n# Standard boilerplate to invoke the main() function\nif __name__ == '__main__':\n\
    \    main()\n```\n\n清单 1.14 定义了 `main()` 函数，该函数检查命令行参数的数量：如果该值至少为 2，则将变量 `name`\
    \ 赋值为第二个参数的值（第一个参数是 `hello.py`），否则将 `name` 赋值为 `Hello`。然后 `print()` 语句打印变量 `name`\
    \ 的值。\n\n清单 1.14 的最后部分使用条件逻辑来确定是否执行 `main()` 函数。\n\n## 总结\n\n本章解释了如何处理数字以及对数字执行算术运算。然后读者学习了如何处理字符串和使用字符串操作。他们还学习了如何使用\
    \ try/except 结构来处理 Python 代码中可能出现的异常。下一章将展示如何在 Python 中使用条件语句、循环和用户定义函数。\n\n##\
    \ 第 2 章\n\n## 条件逻辑、循环和函数\n\n本章向读者介绍在 Python 中执行条件逻辑的各种方式，以及 Python 中的控制结构和用户定义函数。几乎每一个执行有用计算的\
    \ Python 程序都需要某种类型的条件逻辑或控制结构（或两者兼有）。尽管这些 Python 特性的语法与其他语言略有不同，但其功能将是熟悉的。\n\n\
    本章的第一部分包含代码示例，说明如何在 Python 中处理 if-else 条件逻辑以及 if-elsif-else 语句。本章的第二部分讨论 Python\
    \ 中的循环和 while 语句。本节包含各种示例（比较字符串、计算数字的不同次幂等），说明在 Python 中使用循环和 while 语句的各种方式。\n\
    \n本章的第三部分包含涉及嵌套循环和递归的示例。本章的最后一部分向读者介绍用户定义的 Python 函数。\n\n## PYTHON 中的运算符优先级\n\n\
    当有一个涉及数字的表达式时，人们可能记得乘法（“*”）和除法（“/”）的优先级高于加法（“+”）或减法（“-”）。幂运算的优先级甚至高于这四种算术运算符。\n\
    \n与其依赖优先级规则，不如使用括号更简单（也更安全）。例如，(x/y)+10 比 x/y+10 更清晰，即使它们是等价的表达式。\n\n再举一个例子，以下两个算术表达式是等价的，但第二个比第一个更不容易出错：\n\
    \n```\nx/y+3*z/8+x*y/z-3*x\n(x/y) + (3*z) /8+ (x*y) / z- (3*x)\n```\n\n无论如何，以下网站包含\
    \ Python 中运算符的优先级规则：\n\nhttp://www.mathcs.emory.edu/~valerie/courses/fall10/155/resources/op_precedence.html\n\
    \n## PYTHON 保留字\n\n每种编程语言都有一组保留字：一组不能用作标识符的词，Python 也不例外。Python 的保留字是：and, exec,\
    \ not, assert, finally, or, break, for, pass, class, from, print, continue, global,\
    \ raise, def, if, return, del, import, try, elif, in, while, else, is, with, except,\
    \ lambda, and yield。\n\n如果不慎将保留字用作变量，他们将看到“语法错误”错误消息，而不是“保留字”错误消息。例如，假设他们创建了一个包含以下代码的\
    \ Python 脚本 test1.py：\n\n```python\nbreak = 2\nprint('break =', break)\n```\n\n\
    如果他们运行上述 Python 代码，他们将看到以下输出：\n\n```\nFile \"test1.py\", line 2\n    break = 2\n\
    \          ^\nSyntaxError: invalid syntax\n```\n\n快速检查 Python 代码会发现，他们正试图将保留字\
    \ break 用作变量。\n\n## 在 PYTHON 中使用循环\n\nPython 支持 for 循环、while 循环和 range() 语句。以下小节说明如何使用这些结构中的每一种。\n\
    \n### Python for 循环\n\nPython 支持 for 循环，其语法与其他语言（如 JavaScript 和 Java）略有不同。以下代码块展示了如何在\
    \ Python 中使用 `for` 循环来遍历列表中的元素：\n\n```python\n>>> x = ['a', 'b', 'c']\n>>> for\
    \ w in x:\n...     print(w)\n...\na\nb\nc\n```\n\n前面的代码片段在三个单独的行上打印三个字母。用户可以通过在\
    \ print 语句中添加逗号“,”来强制输出显示在同一行（如果指定足够多的字符，将会“换行”），如下所示：\n\n```python\n>>> x = ['a',\
    \ 'b', 'c']\n>>> for w in x:\n...     print(w, end=' ')\n...\na b c\n```\n\n当希望在单行而不是多行中显示文本文件的内容时，可以使用这种类型的代码。\n\
    \nPython 还提供了内置的 `reversed()` 函数，用于反转循环的方向，如下所示：\n\n```python\n>>> a = [1, 2,\
    \ 3, 4, 5]\n>>> for x in reversed(a):\n...     print(x)\n5\n4\n3\n2\n1\n```\n\n\
    请注意，只有当当前对象的大小可以确定，或者该对象实现了 `__reversed__()` “魔法”方法时，反转迭代才有效。\n\n### 带有 `try/except`\
    \ 的 Python `for` 循环\n\n清单 2.1 显示了 `string_to_nums.py` 的内容，说明如何计算一组从字符串转换而来的整数的和。\n\
    \n## 清单 2.1：string_to_nums.py\n\n```python\nline = '1 2 3 4 10e abc'\nsum = 0\n\
    invalidStr = \"\"\nprint('String of numbers:',line)\n\nfor str in line.split(\"\
    \ \"):\n    try:\n        sum = sum + eval(str)\n    except:\n        invalidStr\
    \ = invalidStr + str + ' '\n\nprint('sum:', sum)\nif(invalidStr != \"\"):\n  \
    \  print('Invalid strings:',invalidStr)\nelse:\n    print('All substrings are\
    \ valid numbers')\n```\n\n清单 2.1 初始化变量 `line`、`sum` 和 `invalidStr`，然后显示 line 的内容。清单\
    \ 2.1 的下一部分将 `line` 的内容拆分为单词，然后使用 `try` 块将每个单词的数值添加到变量 `sum` 中。如果发生异常，则将当前 `str`\
    \ 的内容附加到变量 `invalidStr`。\n\n当循环执行完毕后，清单 2.1 显示数字单词的总和，后面跟着不是数字的单词列表。清单 2.1 的输出如下：\n\
    \n```\nString of numbers: 1 2 3 4 10e abc\nsum: 10\nInvalid strings: 10e abc\n\
    ```\n\n### Python 中的数字指数\n\n清单 2.2 显示了 `nth_exponent.py` 的内容，说明如何计算一组整数的中间幂。\n\
    \n## 清单 2.2：nth_exponent.py\n\n```python\nmaxPower = 4\nmaxCount = 4\n\ndef pwr(num):\n\
    \    prod = 1\n    for n in range(1,maxPower+1):\n        prod = prod*num\n  \
    \      print(num,'to the power',n, 'equals',prod)\n    print('-------------')\n\
    \nfor num in range(1,maxCount+1):\n    pwr(num)\n```\n\n清单 2.2 包含一个名为 `pwr()`\
    \ 的函数，该函数接受一个数值。此函数包含一个循环，打印该数字的 `n` 次幂的值，其中 `n` 的范围在 1 到 `maxPower+1` 之间。"
