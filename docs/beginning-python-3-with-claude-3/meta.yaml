  md: 'The fifth section of this chapter shows how to manipulate the contents of DataFrames
    with various operations. In particular, readers will also see code samples that
    illustrate how to create Pandas DataFrames from CSV (comma-separated value) files,
    Excel spreadsheets, and data that is retrieved from a URL.


    # WHAT IS NUMPY?


    NumPy is a Python module that provides many convenience methods and also better
    performance. NumPy provides a core library for scientific computing in Python,
    with performant multidimensional arrays and good vectorized math functions, along
    with support for linear algebra and random numbers.


    NumPy is modeled after MatLab, with support for lists, arrays, and so forth. NumPy
    is easier to use than Matlab, and it''s common in TensorFlow code as well as Python
    code.


    # Useful NumPy Features


    The NumPy package provides the ndarray object that encapsulates multidimensional
    arrays of homogeneous data types. Many ndarray operations are performed in compiled
    code in order to improve performance.


    Keep in mind the following important differences between NumPy arrays and the
    standard Python sequences:


    +   - NumPy arrays have a fixed size, whereas Python lists can expand dynamically.
    Whenever you modify the size of an ndarray, a new array is created and the original
    array is deleted.

    - NumPy arrays are homogeneous, which means that the elements in a NumPy array
    must have the same data type. Except for NumPy arrays of objects, the elements
    in NumPy arrays of any other data type must have the same size in memory.

    - NumPy arrays support more efficient execution (and require less code) of various
    types of operations on large numbers of data.

    - Many scientific Python-based packages rely on NumPy arrays, and knowledge of
    NumPy arrays is becoming increasingly important.


    Now that readers have a general idea about NumPy, the chapter will delve into
    some examples that illustrate how to work with NumPy arrays, which is the topic
    of the next section.


    # WHAT ARE NUMPY ARRAYS?


    An array is a set of consecutive memory locations used to store data. Each item
    in the array is called an element. The number of elements in an array is called
    the dimension of the array. A typical array declaration is shown here:


    ```

    arr1 = np.array([1,2,3,4,5])

    ```'
