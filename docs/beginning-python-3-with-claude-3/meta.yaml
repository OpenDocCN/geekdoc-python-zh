    `np.zeros()` requires less execution time. You could also use `np.full(size, 0)`,
    but this method is the slowest of all three methods.


    The `reshape()` method and the `linspace()` method are very useful for changing
    the dimensions of an array and generating a list of numeric values, respectively.
