  md: "# Using a while loop to Find Prime Numbers\n\nListing 2.12 displays the contents\
    \ of `divisors3.py` that contains a `while` loop, conditional logic, and the `%`\
    \ (modulus) operator in order to count the number of prime factors of any integer\
    \ greater than 1. If there is only one divisor for a number, then that number\
    \ is a prime number.\n\n# LISTING 2.12: divisors3.py\n\n```\ndef divisors(num):\n\
    \    count = 1\n    div = 2\n    while(div < num):\n        if(num % div == 0):\n\
    \            count = count + 1\n        div = div + 1\n    return count\n\nresult\
    \ = divisors(12)\n\nif(result == 1):\n    print('12 is prime')\nelse:\n    print('12\
    \ is not prime')\n```\n\n# USER-DEFINED FUNCTIONS IN PYTHON\n\nPython provides\
    \ built-in functions and also enables users to define their own functions. One\
    \ can define functions to provide the required functionality. Here are simple\
    \ rules to define a function in Python:\n\n+   - Function blocks begin with the\
    \ keyword `def` followed by the function name and parentheses.\n- Any input arguments\
    \ should be placed within these parentheses.\n- The first statement of a function\
    \ can be an optional statement - the documentation string of the function or docstring.\n\
    - The code block within every function starts with a colon (`:`) and is indented.\n\
    - The statement `return [expression]` exits a function, optionally passing back\
    \ an expression to the caller. A return statement with no arguments is the same\
    \ as `return None`.\n- If a function does not specify return statement, the function\
    \ automatically returns `None`, which is a special type of value in Python.\n\n\
    A very simple custom Python function is here:\n\n```\n>>> def func():\n...   \
    \  print 3\n...\n>>> func()\n3\n```"
