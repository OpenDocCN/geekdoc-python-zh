    \ `string2`，因此 `str4` 的值等于 `string2`。\n\n## 局部变量和全局变量\n\nPython 变量可以是局部的或全局的。如果满足以下条件，则\
    \ Python 变量是函数局部的：\n\n- 是函数的参数\n- 位于函数内语句的左侧\n- 绑定到控制结构（如 for、with 和 except）\n\
    \n在函数中引用但不是局部变量（根据前面的列表）的变量是非局部变量。用户可以使用以下代码片段将变量指定为非局部变量：\n\n```\nnonlocal z\n\
    ```\n\n可以使用以下语句将变量显式声明为全局变量：\n\n```\nglobal z\n```\n\n以下代码块说明了全局变量与局部变量的行为：\n\n\
    ```\nglobal z\nz = 3\n\ndef changeVar(z):\n    z = 4\n    print('z in function:',\
    \ z)\n\nprint('first global z:', z)\n\nif __name__ == '__main__':\n    changeVar(z)\n\
    \    print('second global z:', z)\n```\n\n前面代码块的输出如下：\n\n```\nfirst global z:\
    \ 3\nz in function: 4\nsecond global z: 3\n```\n\n### 未初始化变量和值 None\n\nPython\
    \ 区分未初始化变量和值 `None`。前者是尚未赋值的变量，而值 `None` 表示“无值”。集合和方法通常返回值 `None`，并且可以在条件逻辑中测试值\
    \ `None`。\n\n## 变量的作用域\n\n变量的可访问性或作用域取决于该变量的定义位置。Python 提供两种作用域：全局和局部，并且有一个额外的“转折”，即全局实际上是模块级作用域（即当前文件），因此可以在不同文件中拥有同名变量，它们将被区别对待。\n\
    \n局部变量很简单：它们在函数内部定义，只能在定义它们的函数内部访问。任何不是局部变量的变量都具有全局作用域，这意味着这些变量仅在定义它们的文件中是“全局”的，并且可以在文件中的任何位置访问。\n\
    \n关于变量，有两种情况需要考虑。首先，假设两个文件（即模块）`file1.py` 和 `file2.py` 有一个名为 x 的变量，并且 `file1.py`\
    \ 还导入了 `file2.py`。现在的问题是如何区分两个不同模块中的 x。例如，假设 `file2.py` 包含以下两行代码：\n\n```\nx =\
    \ 3\nprint('unscoped x in file2:',x)\n```\n\n假设 `file1.py` 包含以下代码：\n\n```\nimport\
