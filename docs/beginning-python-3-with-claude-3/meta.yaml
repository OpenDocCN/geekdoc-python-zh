    df[df[\"size\"] == 7]\n```\n\n选择数据框中“height”列的第一行：\n\n```python\ndf.loc([0], ['height'])\n\
    ```\n\n## 总结\n\n本章向读者介绍了 Pandas，用于创建带标签的数据框并显示 Pandas 数据框的元数据。接着，读者学习了如何从各种数据源（如随机数和硬编码数据值）创建\
    \ Pandas 数据框。\n\n读者还学习了如何读取 Excel 电子表格并对其数据执行数值计算，例如数值列中的最小值、平均值和最大值。然后，你看到了如何从存储在文件中的数据创建\
    \ Pandas 数据框。接着，读者学习了如何调用 Web 服务检索数据并用该数据填充 Pandas 数据框。此外，他们还学习了如何根据 Pandas 数据框中的数据生成散点图。\n\
    \n## 第 5 章\n\n## 生成式 AI 概览\n\n本章对生成式 AI 进行了快速介绍，重点突出了生成式 AI 的一些重要特性。\n\n本章第一节向读者介绍了生成式\
    \ AI，包括关键特性和技术。它还探讨了对话式 AI 与生成式 AI 之间的区别。\n\n本章第二节讨论了生成式 AI 模型，例如 Dall-E、ChatGPT\
    \ 和 GPT-4。读者还将了解生成式 AI 与机器学习（ML）、深度学习（DL）和自然语言处理（NLP）的对比。\n\n本章第三节提出了关于通用人工智能（AGI）的开放式问题，并简要比较了\
    \ AGI 与生成式 AI。本章第四节介绍了大语言模型（LLMs），以及 LLMs 的各个方面，例如其成本、规模与性能，以及涌现能力。\n\n本章第五节向读者介绍了“幻觉”这一概念，这是一个重要的话题：所有\
    \ LLMs 都存在幻觉问题。事实上，LLMs 可能会无意中对提示生成无意义甚至滑稽的回应。\n\n本章最后一节首先简要介绍了几家在 AI 和 NLP 领域做出重大贡献的公司。确实，如果读者计划在\
    \ NLP 领域发展职业生涯，他们会对这些公司非常熟悉。\n\n一个需要记住的细节：本章中的术语 *prompt* 指的是提供给大语言模型（LLM）的任何基于文本的字符串，而\
    \ LLM 的回应是一个基于文本的字符串，称为 *completion*。\n\n## 什么是生成式 AI？\n\n*生成式 AI* 指的是人工智能模型和技术的一个子集，旨在生成与给定输入数据集性质相似的新数据样本。其目标是生成不属于原始训练集但连贯、上下文相关且风格或结构一致的内容或数据。\n\
    \n生成式 AI 的独特之处在于其创造和创新的能力，而不仅仅是分析或分类。该领域的进步已在创意领域和实际应用中取得突破，使其成为人工智能研究与开发的前沿领域。\n\
    \n### 生成式 AI 的关键特性\n\n以下要点列表包含生成式 AI 的关键特性，每个要点后附有简要说明：\n\n-   **数据生成**：指创建不属于训练数据但与之相似的新数据点的能力。这可以包括文本、图像、音乐、视频或任何其他形式的数据。\n\
    -   **合成**：意味着生成模型可以融合各种输入，生成融合了每个输入特征的输出，例如合并两张图像的风格。\n-   **学习分布**：表明生成式 AI\
    \ 模型旨在学习训练数据的概率分布，以便能够从该分布中生成新的样本。\n\n### 生成式 AI 中的流行技术\n\n*生成对抗网络（GANs）*：GANs\
    \ 由两个网络组成，一个生成器和一个判别器，它们同时进行训练。生成器试图生成假数据，而判别器试图区分真实数据和假数据。随着时间的推移，生成器在生成逼真数据方面会变得更好。\n\
    \n*变分自编码器（VAEs）*：VAEs 是概率模型，它们学习以一种方式编码和解码数据，使得编码表示可用于生成新的数据样本。\n\n*循环神经网络（RNNs）*：主要用于序列生成，例如文本或音乐。\n\
    \n### 生成式 AI 的不同之处\n\n*创造与分类*：虽然大多数传统 AI 模型旨在将输入数据分类到预定义的类别中，但生成模型旨在创造新的数据。"
