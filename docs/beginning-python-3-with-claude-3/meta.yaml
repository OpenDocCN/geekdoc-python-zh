    \ WHILE LOOPS\n\nOne can define a while loop to iterate through a set of numbers,\
    \ as shown in the following examples:\n\n```\n>>> x = 0\n>>> while x < 5:\n...\
    \     print(x)\n...     x = x + 1\n...\n0\n1\n2\n3\n4\n5\n```\n\nPython uses indentation\
    \ instead of curly braces that are used in other languages such as JavaScript\
    \ and Java. Although Python lists are not discussed until Chapter 3, readers can\
    \ probably understand the following simple code block that contains a variant\
    \ of the preceding loop that they can use when working with lists:\n\n```\nlst\
    \ = [1,2,3,4]\n\nwhile lst:\n    print('list:',lst)\n    print('item:',lst.pop())\n\
    ```\n\nThe preceding while loop terminates when the lst variable is empty, and\
    \ there is no need to explicitly test for an empty list. The output from the preceding\
    \ code is here:\n\n```\nlist: [1, 2, 3, 4]\nitem: 4\nlist: [1, 2, 3]\nitem: 3\n\
    list: [1, 2]\nitem: 2\nlist: [1]\nitem: 1\n```\n\nThis concludes the examples\
    \ that use the `split()` function in order to process words and characters in\
    \ a text string. The next part of this chapter shows examples of using conditional\
    \ logic in Python code.\n\n## CONDITIONAL LOGIC IN PYTHON\n\nAnyone who has written\
    \ code in other programming languages, has undoubtedly seen `if/then/else` (or\
    \ `if-elseif-else`) conditional statements. Although the syntax varies between\
    \ languages, the logic is essentially the same. The following example shows how\
    \ to use `if/elif` statements in Python:\n\n```\n>>> x = 25\n>>> if x < 0:\n...\
    \     print('negative')\n... elif x < 25:\n...     print('under 25')\n... elif\
    \ x == 25:\n...     print('exactly 25')\n... else:\n...     print('over 25')\n\
    ...\nexactly 25\n```\n\nThe preceding code block illustrates how to use multiple\
    \ conditional statements, and the output is exactly what one would expect.\n\n\
    ## THE BREAK/CONTINUE/PASS STATEMENTS\n\nThe `break` statement in Python enables\
    \ users to perform an “early exit” from a loop, whereas the `continue` statement\
    \ essentially returns to the top of the loop and continues with the next value\
    \ of the loop variable. The `pass` statement is essentially a “do nothing” statement.\n\
    Listing 2.9 displays the contents of `break_continue_pass.py` that illustrates\
    \ the use of these three statements.\n\n### LISTING 2.9: break_continue_pass.py\n\
    \n```\nprint('first loop')\nfor x in range(1,4):\n    if(x == 2):\n        break\n\
    \    print(x)\n\nprint('second loop')\nfor x in range(1,4):\n    if(x == 2):\n\
    \        continue\n    print(x)\n\nprint('third loop')\nfor x in range(1,4):\n\
    \    if(x == 2):\n        pass\n    print(x)\n```\n\nThe output of Listing 2.9\
    \ is here:\n\n```\nfirst loop\n1\nsecond loop\n1\n3\nthird loop\n1\n2\n3\n```\n\
    \n## COMPARISON AND BOOLEAN OPERATORS\n\nPython supports a variety of Boolean\
    \ operators, such as `in`, `not in`, `is`, `is not`, `and`, `or`, and `not`. The\
    \ next several sections discuss these operators and provide some examples of how\
    \ to use them.\n\n### The in/not in/is/is not Comparison Operators\n\nThe `in`\
    \ and `not in` operators are used with sequences to check whether a value occurs\
    \ or does not occur in a sequence. The operators `is` and `is not` determine whether\
    \ or not two objects are the same object, which is important only matters for\
    \ mutable objects such as lists. All comparison operators have the same priority,\
    \ which is lower than that of all numerical operators. Comparisons can also be\
    \ chained. For example, `a < b == c` tests whether a is less than b and moreover\
    \ b equals c.\n\n### The and, or, and not Boolean Operators\n\nThe Boolean operators\
    \ `and`, `or`, and `not` have lower priority than comparison operators. The Boolean\
    \ `and` and `or` are binary operators whereas the Boolean `or` operator is a unary\
    \ operator. Here are some examples:\n\n- `A and B` can only be true if both A\
    \ and B are true\n- `A or B` is true if either A or B is true\n- `not (A)` is\
    \ true if and only if A is false\n\nOne can also assign the result of a comparison\
    \ or other Boolean expression to a variable, as shown here:\n\n```\n>>> string1,\
    \ string2, string3 = '', 'b', 'cd'\n>>> str4 = string1 or string2 or string3\n\
    >>> str4\n'b'\n```\n\nThe preceding code block initializes the variables `string1`,\
    \ `string2`, and `string3`, where `string1` is an empty string. Next, `str4` is\
    \ initialized via the or operator, and since the first nonnull value is `string2`,\
    \ the value of `str4` is equal to `string2`.\n\n## LOCAL AND GLOBAL VARIABLES\n\
    \nPython variables can be local or global. A Python variable is local to a function\
    \ if the following are true:\n\n- a parameter of the function\n- on the left-side\
    \ of a statement in the function\n- bound to a control structure (such as for,\
    \ with, and except)\n\nA variable that is referenced in a function but is not\
    \ local (according to the previous list) is a nonlocal variable. Users can specify\
    \ a variable as nonlocal with this snippet:\n\n```\nnonlocal z\n```\n\nA variable\
    \ can be explicitly declared as global with this statement:\n\n```\nglobal z\n\
    ```\n\nThe following code block illustrates the behavior of a global versus a\
    \ local variable:\n\n```\nglobal z\nz = 3\n\ndef changeVar(z):\n    z = 4\n  \
    \  print('z in function:', z)\n\nprint('first global z:', z)\n\nif __name__ ==\
    \ '__main__':\n    changeVar(z)\n    print('second global z:', z)\n```\n\nThe\
    \ output from the preceding code block is here:\n\n```\nfirst global z: 3\nz in\
    \ function: 4\nsecond global z: 3\n```\n\n### Uninitialized Variables and the\
    \ Value None\n\nPython distinguishes between an uninitialized variable and the\
    \ value `None`. The former is a variable that has not been assigned a value, whereas\
    \ the value `None` is a value that indicates “no value.” Collections and methods\
    \ often return the value `None`, and one can test for the value `None` in conditional\
    \ logic.\n\n## SCOPE OF VARIABLES\n\nThe accessibility or scope of a variable\
    \ depends on where that variable has been defined. Python provides two scopes:\
    \ global and local, with the added “twist” that global is actually module-level\
    \ scope (i.e., the current file), and therefore one can have a variable with the\
    \ same name in different files and they will be treated differently.\n\nLocal\
    \ variables are straightforward: they are defined inside a function, and they\
    \ can only be accessed inside the function where they are defined. Any variables\
    \ that are not local variables have global scope, which means that those variables\
    \ are “global” *only* with respect to the file where it has been defined, and\
    \ they can be accessed anywhere in a file.\n\nThere are two scenarios to consider\
    \ regarding variables. First, suppose two files (aka modules) `file1.py` and `file2.py`\
    \ have a variable called x, and `file1.py` also imports `file2.py`. The question\
    \ now is how to disambiguate between the x in the two different modules. As an\
    \ example, suppose that `file2.py` contains the following two lines of code:\n\
    \n```\nx = 3\nprint('unscoped x in file2:',x)\n```\n\nSuppose that `file1.py`\
    \ contains the following code:\n\n```\nimport file2 as file2\n\nx = 5\nprint('unscoped\
    \ x in file1:',x)\nprint('scoped x from file2:',file2.x)\n```\n\nLaunch `file1.py`\
    \ from the command line and the following output will appear:\n\n```\nunscoped\
    \ x in file2: 3\nunscoped x in file1: 5\nscoped x from file2: 3\n```\n\nThe second\
    \ scenario involves a program contains a local variable and a global variable\
    \ with the same name. According to the earlier rule, the local variable is used\
    \ in the function where it is defined, and the global variable is used outside\
    \ of that function.\n\nThe following code block illustrates the use of a global\
    \ and local variable with the same name:\n\n```\n#!/usr/bin/python\n# a global\
    \ variable:\ntotal = 0;\n\ndef sum(x1, x2):\n    # this total is local:\n    total\
    \ = x1+x2;\n    print(\"Local total : \", total)\n    return total\n\n# invoke\
    \ the sum function\nsum(2,3);\nprint(\"Global total : \", total)\n```\n\nWhen\
    \ the above code is executed, it produces following result:\n\n```\nLocal total\
    \ :    5\nGlobal total :   0\n```\n\nWhat about unscoped variables, such as specifying\
    \ the variable x without a module prefix? The answer consists of the following\
    \ sequence of steps that Python will perform:\n\n1. Check the local scope for\
    \ the name.\n2. Ascend the enclosing scopes and check for the name.\n3. Perform\
    \ step #2 until the global scope (i.e., module level).\n4. If x still hasn't been\
    \ found, Python checks __builtins__.\n\n```\nPython 2.7.5 (default, Dec  2 2013,\
    \ 18:34:31)\n[GCC 4.2.1 Compatible Apple LLVM 4.2 (clang-425.0.28)] on darwin\n\
    Type \"help\", \"copyright\", \"credits\" or \"license\" for more information.\n\
    >>> x = 1\n>>> g = globals()\n>>> g\n{'g': {...}, '__builtins__': <module '__builtin__'\
    \ (built-in)>, '__package__': None, 'x': 1, '__name__': '__main__', '__doc__':\
    \ None}\n>>> g.pop('x')\n1\n>>> x\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nNameError: name 'x' is not defined\n```\n\n\
    > **Note:** One can access the dicts that Python uses to track local and global\
    \ scope by invoking locals() and globals() respectively.\n\n## PASS BY REFERENCE\
    \ VERSUS VALUE\n\nAll parameters (arguments) in the Python language are passed\
    \ by reference. Thus, if one changes what a parameter refers to within a function,\
    \ the change is reflected in the calling function. For example:\n\n```\ndef changeme(mylist):\n\
    \    #This changes a passed list into this function\n    mylist.append([1,2,3,4])\n\
    ```"
