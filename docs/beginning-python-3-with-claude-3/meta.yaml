  md: '# ORDERED DICTIONARIES


    Regular Python dictionaries iterate over key/value pairs in arbitrary order. Python
    2.7 introduced a new OrderedDict class in the collections module. The OrderedDict
    API provides the same interface as regular dictionaries but iterates over keys
    and values in a guaranteed order depending on when a key was first inserted:


    ```

    >>> from collections import OrderedDict

    >>> d = OrderedDict([(''first'', 1),

    ...                 (''second'', 2),

    ...                 (''third'', 3)])

    >>> d.items()

    [(''first'', 1), (''second'', 2), (''third'', 3)]

    ```


    If a new entry overwrites an existing entry, the original insertion position is
    left unchanged:


    ```

    >>> d[''second''] = 4

    >>> d.items()

    [(''first'', 1), (''second'', 4), (''third'', 3)]

    ```


    Deleting an entry and reinserting it will move it to the end:


    ```

    >>> del d[''second'']

    >>> d[''second''] = 5

    >>> d.items()

    [(''first'', 1), (''third'', 3), (''second'', 5)]

    ```


    # Sorting Dictionaries


    Python enables you to support the entries in a dictionary. For example, one can
    modify the code in the preceding section to display the alphabetically sorted
    words and their associated word count.


    # Python Multidictionaries


    Users can define entries in a Python dictionary so that the entries reference
    lists or other types of Python structures. Listing 3.12 displays the contents
    of multi_dictionary1.py that illustrates how to define more complex dictionaries.


    # LISTING 3.12: multi_dictionary1.py


    ```

    from collections import defaultdict


    d = {''a'' : [1, 2, 3], ''b'' : [4, 5]}

    print ''firsts:'',d


    d = defaultdict(list)

    ```'
