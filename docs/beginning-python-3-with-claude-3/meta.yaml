    \ letters in a string, as well as code for a stack and a queue.\n\n# CHAPTER 4\n\
    \n## INTRODUCTION TO NUMPY AND PANDAS\n\nApproximately 50% of this chapter starts\
    \ with a quick introduction to the Python NumPy package, followed by a quick introduction\
    \ to Pandas and some of its useful features. The Pandas package for Python provides\
    \ a rich and powerful set of APIs for managing datasets. These APIs are very useful\
    \ for machine learning and deep learning tasks that involve dynamically “slicing\
    \ and dicing” subsets of datasets.\n\nThe first section contains examples of working\
    \ arrays in NumPy, and contrasts some of the APIs for lists with the same APIs\
    \ for arrays. In addition, you will see how easy it is to compute the exponent-related\
    \ values (square, cube, and so forth) of elements in an array.\n\nThe second section\
    \ introduces subranges, which are very useful (and frequently used) for extracting\
    \ portions of datasets in machine learning tasks. In particular, readers will\
    \ see code samples that handle negative (-1) subranges for vectors as well as\
    \ for arrays, because they are interpreted one way for vectors and a different\
    \ way for arrays.\n\nThe third section (“Other Useful NumPy Methods”) of this\
    \ chapter delves into other NumPy methods, including the reshape() method, which\
    \ is extremely useful (and very common) when working with images files: some TensorFlow\
    \ APIs require converting a 2D array of (R, G, B) values into a corresponding\
    \ one-dimensional vector.\n\nThe fourth section of this chapter briefly describes\
    \ Pandas and some of its useful features. This section contains code samples that\
    \ illustrate some nice features of DataFrames and a brief discussion of series,\
    \ which are two of the main features of Pandas. Note that Pandas material is discussed\
    \ after the NumPy material, which includes a discussion various types of DataFrames\
    \ that one can create, such as numeric and Boolean DataFrames. In addition, readers\
    \ will see examples of creating DataFrames with NumPy functions and random numbers.\n\
    \nThe fifth section of this chapter shows how to manipulate the contents of DataFrames\
    \ with various operations. In particular, readers will also see code samples that\
    \ illustrate how to create Pandas DataFrames from CSV (comma-separated value)\
    \ files, Excel spreadsheets, and data that is retrieved from a URL.\n\n## WHAT\
    \ IS NUMPY?\n\nNumPy is a Python module that provides many convenience methods\
    \ and also better performance. NumPy provides a core library for scientific computing\
    \ in Python, with performant multidimensional arrays and good vectorized math\
    \ functions, along with support for linear algebra and random numbers.\n\nNumPy\
    \ is modeled after MatLab, with support for lists, arrays, and so forth. NumPy\
    \ is easier to use than Matlab, and it's common in TensorFlow code as well as\
    \ Python code.\n\n### Useful NumPy Features\n\nThe NumPy package provides the\
    \ ndarray object that encapsulates multidimensional arrays of homogeneous data\
    \ types. Many ndarray operations are performed in compiled code in order to improve\
    \ performance.\n\nKeep in mind the following important differences between NumPy\
