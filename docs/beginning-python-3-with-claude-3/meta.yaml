    # Explanation:


    RandomNumberQueue class:

    This class defines a queue data structure that can hold a random set of numbers.

    The __init__ method initializes the queue with a specified maximum size.

    The enqueue method adds an element to the back of the queue, checking for overflow.

    The dequeue method removes and returns the element from the front of the queue,
    checking for underflow.

    The is_empty method returns “True” if the queue is empty and “False” otherwise.

    The size method returns the number of elements in the queue.

    The generate_random_numbers method enqueues a specified number of random integers
    to the queue.

    The __str__ method returns a string representation of the queue.


