  - "[PAGE 25]\n\n10 • Beginning Python 3 with Claude 3\n\nUsers should check the\
    \ online documentation and also experiment with `help()` and `dir()` when they\
    \ need additional information about a particular function or module.\n\n# COMPILE\
    \ TIME AND RUNTIME CODE CHECKING\n\nPython performs some compile-time checking,\
    \ but most checks (including type, name, and so forth) are *deferred* until code\
    \ execution. Consequently, if Python code references a user-defined function that\
    \ does not exist, the code will compile successfully. In fact, the code will fail\
    \ with an exception *only* when the code execution path references the nonexistent\
    \ function.\n\nAs a simple example, consider the following Python function `myFunc`\
    \ that references the nonexistent function called `DoesNotExist`:\n\n```\ndef\
    \ myFunc(x):\n    if x == 3:\n        print(DoesNotExist(x))\n    else:\n    \
    \    print('x: ', x)\n```\n\nThe preceding code will only fail when the `myFunc`\
    \ function is passed the value 3, after which Python raises an error.\n\nChapter\
    \ 2 explains how to define and invoke user-defined functions, along with an explanation\
    \ of the difference between local versus global variables in Python.\n\nNow that\
    \ readers understand some basic concepts (such as how to use the Python interpreter)\
    \ and how to launch custom Python modules, the next section discusses primitive\
    \ data types in Python.\n\n# SIMPLE DATA TYPES IN PYTHON\n\nPython supports primitive\
    \ data types, such as numbers (integers, floating point numbers, and exponential\
    \ numbers), strings, and dates. Python also supports more complex data types,\
    \ such as lists (or arrays), tuples, and dictionaries, all of which are discussed\
    \ in Chapter 3. The next several sections discuss some of the Python primitive\
    \ data types, along with code snippets that show how to perform various operations\
    \ on those data types.\n\n# WORKING WITH NUMBERS\n\nPython provides arithmetic\
    \ operations for manipulating numbers a straightforward manner that is similar\
    \ to other programming languages. The following examples involve arithmetic operations\
    \ on integers:\n\n```\n>>> 2+2\n4\n```"
- md: "## Working with Other Bases\n\nNumbers in Python are in base 10 (the default),\
    \ but one can easily convert numbers to other bases. For example, the following\
    \ code block initializes the variable x with the value 1234, and then displays\
    \ that number in base 2, 8, and 16, respectively:\n\n```\n>>> x = 1234\n>>> bin(x)\n\
    '0b10011010010'\n>>> oct(x)\n'0o2322'\n>>> hex(x)\n'0x4d2'\n```\n\nUse the `format()`\
    \ function to suppress the `0b`, `0o`, or `0x` prefixes, as shown here:\n\n```\n\
    >>> format(x, 'b')\n'10011010010'\n>>> format(x, 'o')\n'2322'\n>>> format(x, 'x')\n\
    '4d2'\n```\n\nNegative integers are displayed with a negative sign:\n\n```\n>>>\
    \ x = -1234\n>>> format(x, 'b')\n'-10011010010'\n>>> format(x, 'x')\n'-4d2'\n\
    ```\n\n## The chr() Function\n\nThe Python `chr()` function takes a positive integer\
    \ as a parameter and converts it to its corresponding alphabetic value (if one\
    \ exists). The letters A through Z have decimal representation of 65 through 91\
    \ (which corresponds to hexadecimal 41 through 5b), and the lowercase letters\
    \ a through z have decimal representation 97 through 122 (hexadecimal 61 through\
    \ 7b).\n\nHere is an example of using the `chr()` function to print uppercase\
    \ A:\n\n```\n>>> x = chr(65)\n>>> x\n'A'\n```\n\nThe following code block prints\
    \ the ASCII values for a range of integers:\n\n```\nresult = \"\"\nfor x in range(65,\
    \ 91):\n    print(x, chr(x))\n    result = result + chr(x) + ' '\nprint(\"result:\
    \ \", result)\n```\n\nNote: Python 2 uses ASCII strings whereas Python 3 uses\
    \ UTF-8.\n\nOne can represent a range of characters with the following line:\n\
    \n```\nfor x in range(65, 91):\n```\n\nHowever, the following equivalent code\
    \ snippet is more intuitive:\n\n```\nfor x in range(ord('A'), ord('Z')):\n```\n\
    \nTo display the result for lowercase letters, change the preceding range from\
    \ `(65, 91)` to either of the following statements:\n\n```\nfor x in range(97,\
    \ 123):\nfor x in range(ord('a'), ord('z')):\n```\n\n## The round() Function in\
    \ Python\n\nThe Python `round()` function enables users to round decimal values\
    \ to the nearest precision:\n\n```\n>>> round(1.23, 1)\n1.2\n>>> round(-3.42,\
    \ 1)\n-3.4\n```\n\n## Formatting Numbers in Python\n\nPython allows users to specify\
    \ the number of decimal places of precision to use when printing decimal numbers,\
    \ as shown here:\n\n```\n>>> x = 1.23456\n>>> format(x, '0.2f')\n'1.23'\n>>> format(x,\
    \ '0.3f')\n'1.235'\n>>> 'value is {:0.3f}'.format(x)\n'value is 1.235'\n>>> from\
    \ decimal import Decimal\n>>> a = Decimal('4.2')\n>>> b = Decimal('2.1')\n>>>\
    \ a + b\nDecimal('6.3')\n>>> print(a + b)\n6.3\n>>> (a + b) == Decimal('6.3')\n\
    True\n>>> x = 1234.56789\n>>> # Two decimal places of accuracy\n>>> format(x,\
    \ '0.2f')\n'1234.57'\n>>> # Right justified in 10 chars, one-digit accuracy\n\
    >>> format(x, '>10.1f')\n'    1234.6'\n>>> # Left justified\n>>> format(x, '<10.1f')\n\
    '1234.6     '\n>>> # Centered\n>>> format(x, '^10.1f')\n'  1234.6   '\n>>> # Inclusion\
    \ of thousands separator\n>>> format(x, ',')\n'1,234.56789'\n>>> format(x, '0,.1f')\n\
    '1,234.6'\n```\n\n## WORKING WITH FRACTIONS\n\nPython supports the `Fraction()`\
    \ function (which is defined in the `fractions` module) that accepts two integers\
    \ that represent the numerator and the denominator (which must be nonzero) of\
    \ a fraction. Several examples of defining and manipulating fractions in Python\
    \ are shown here:\n\n```\n>>> from fractions import Fraction\n>>> a = Fraction(5,\
    \ 4)\n>>> b = Fraction(7, 16)\n>>> print(a + b)\n27/16\n>>> print(a * b)\n35/64\n\
    >>> # Getting numerator/denominator\n>>> c = a * b\n>>> c.numerator\n35\n>>> c.denominator\n\
    64\n>>> # Converting to a float\n>>> float(c)\n0.546875\n>>> # Limiting the denominator\
    \ of a value\n>>> print(c.limit_denominator(8))\n4\n>>> # Converting a float to\
    \ a fraction\n>>> x = 3.75\n>>> y = Fraction(*x.as_integer_ratio())\n>>> y\nFraction(15,\
    \ 4)\n```\n\nBefore delving into Python code samples that work with strings, the\
    \ next section briefly discusses Unicode and UTF-8, both of which are character\
    \ encodings.\n\n## UNICODE AND UTF-8\n\nA Unicode string consists of a sequence\
    \ of numbers that are between 0 and 0x10ffff, where each number represents a group\
    \ of bytes. An encoding is the manner in which a Unicode string is translated\
    \ into a sequence of bytes. Among the various encodings, UTF-8 (“Unicode transformation\
    \ format”) is perhaps the most common, and it’s also the default encoding for\
    \ many systems. The digit 8 in UTF-8 indicates that the encoding uses 8-bit numbers,\
    \ whereas UTF-16 uses 16-bit numbers (but this encoding is less common).\n\nThe\
    \ ASCII character set is a subset of UTF-8, so a valid ASCII string can be read\
    \ as a UTF-8 string without any re-encoding required. In addition, a Unicode string\
    \ can be converted into a UTF-8 string.\n\n## WORKING WITH UNICODE\n\nPython supports\
    \ Unicode, which means that users can render characters in different languages.\
    \ Unicode data can be stored and manipulated in the same way as strings. Create\
    \ a Unicode string by prepending the letter “u,” as shown here:\n\n```\n>>> u'Hello\
    \ from Python!'\nu'Hello from Python!'\n```\n\nSpecial characters can be included\
    \ in a string by specifying their Unicode value. For example, the following Unicode\
    \ string embeds a space (which has the Unicode value 0x0020) in a string:\n\n\
    ```\n>>> u'Hello\\u0020from Python!'\nu'Hello from Python!'\n```\n\nListing 1.1\
    \ displays the contents of `unicode1.py` that illustrates how to display a string\
    \ of characters in Japanese and another string of characters in Chinese (Mandarin).\n\
    \n### LISTING 1.1: unicode1.py\n\n```\nchinese1 = u'\\u5c07\\u63a2\\u8a0e HTML5\
    \ \\u53ca\\u5176\\u4ed6'\nhiragana = u'D3 \\u306F \\u304B\\u3063\\u3053\\u3044\\\
    u3043 \\n\\u3067\\u3059!'\n\nprint('Chinese:', chinese1)\nprint('Hiragana:', hiragana)\n\
    ```\n\nThe output of Listing 1.1 is here:\n\n```\nChinese: 将探讨 HTML5 及其他\nHiragana:\
    \ D3 は かっこいい です!\n```\n\nThe next portion of this chapter shows how to “slice\
    \ and dice” text strings with built-in Python functions.\n\n## WORKING WITH STRINGS\n\
    \nUsers can concatenate two strings using the “+” operator. The following example\
    \ prints a string and then concatenates two single-letter strings:\n\n```\n>>>\
    \ 'abc'\n'abc'\n>>> 'a' + 'b'\n'ab'\n```\n\nUse “+” or “*” to concatenate strings,\
    \ as shown here:\n\n```\n>>> 'a' + 'a' + 'a'\n'aaa'\n>>> 'a' * 3\n'aaa'\n```\n\
    \nAssign strings to variables and print them using the `print()` command:\n\n\
    ```\n>>> print('abc')\nabc\n>>> x = 'abc'\n>>> print(x)\nabc\n>>> y = 'def'\n\
    >>> print(x + y)\nabcdef\n```\n\n\"Unpack\" the letters of a string and assign\
    \ them to variables, as shown here:\n\n```\n>>> str = \"World\"\n>>> x1, x2, x3,\
    \ x4, x5 = str\n>>> x1\n'W'\n>>> x2\n'o'\n>>> x3\n'r'\n>>> x4\n'l'\n>>> x5\n'd'\n\
    ```\n\nThe preceding code snippets show how easy it is to extract the letters\
    \ in a text string, and in Chapter 3 users will learn how to \"unpack\" other\
    \ Python data structures.\n\nExtract substrings of a string as shown in the following\
    \ examples:\n\n```\n>>> x = \"abcdef\"\n>>> x[0]\n'a'\n>>> x[-1]\n'f'\n>>> x[1:3]\n\
    'bc'\n>>> x[0:2] + x[5:]\n'abf'\n```\n\nHowever, an error will occur if one attempts\
    \ to \"subtract\" two strings:\n\n```\n>>> 'a' - 'b'\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: unsupported operand\
    \ type(s) for -: 'str' and 'str'\n```"
  mdcn: "## 处理其他进制\n\nPython 中的数字默认是十进制（base 10），但可以轻松转换为其他进制。例如，以下代码块将变量 `x` 初始化为值\
    \ 1234，然后分别以二进制、八进制和十六进制显示该数字：\n\n```\n>>> x = 1234\n>>> bin(x)\n'0b10011010010'\n\
    >>> oct(x)\n'0o2322'\n>>> hex(x)\n'0x4d2'\n```\n\n使用 `format()` 函数可以省略 `0b`、`0o`\
    \ 或 `0x` 前缀，如下所示：\n\n```\n>>> format(x, 'b')\n'10011010010'\n>>> format(x, 'o')\n\
    '2322'\n>>> format(x, 'x')\n'4d2'\n```\n\n负整数会显示负号：\n\n```\n>>> x = -1234\n>>>\
    \ format(x, 'b')\n'-10011010010'\n>>> format(x, 'x')\n'-4d2'\n```\n\n## chr()\
    \ 函数\n\nPython 的 `chr()` 函数接受一个正整数作为参数，并将其转换为对应的字母值（如果存在）。字母 A 到 Z 的十进制表示为 65\
    \ 到 91（对应十六进制 41 到 5b），小写字母 a 到 z 的十进制表示为 97 到 122（十六进制 61 到 7b）。\n\n以下是使用 `chr()`\
    \ 函数打印大写字母 A 的示例：\n\n```\n>>> x = chr(65)\n>>> x\n'A'\n```\n\n以下代码块打印一系列整数的 ASCII\
    \ 值：\n\n```\nresult = \"\"\nfor x in range(65, 91):\n    print(x, chr(x))\n  \
    \  result = result + chr(x) + ' '\nprint(\"result: \", result)\n```\n\n注意：Python\
    \ 2 使用 ASCII 字符串，而 Python 3 使用 UTF-8。\n\n可以用以下代码表示一个字符范围：\n\n```\nfor x in range(65,\
    \ 91):\n```\n\n然而，以下等效的代码片段更直观：\n\n```\nfor x in range(ord('A'), ord('Z')):\n\
    ```\n\n要显示小写字母的结果，请将前面的范围从 `(65, 91)` 改为以下任一语句：\n\n```\nfor x in range(97, 123):\n\
    for x in range(ord('a'), ord('z')):\n```\n\n## Python 中的 round() 函数\n\nPython\
    \ 的 `round()` 函数允许用户将十进制值四舍五入到最接近的精度：\n\n```\n>>> round(1.23, 1)\n1.2\n>>> round(-3.42,\
    \ 1)\n-3.4\n```\n\n## Python 中的数字格式化\n\nPython 允许用户在打印十进制数字时指定要使用的小数位数精度，如下所示：\n\
    \n```\n>>> x = 1.23456\n>>> format(x, '0.2f')\n'1.23'\n>>> format(x, '0.3f')\n\
    '1.235'\n>>> 'value is {:0.3f}'.format(x)\n'value is 1.235'\n>>> from decimal\
    \ import Decimal\n>>> a = Decimal('4.2')\n>>> b = Decimal('2.1')\n>>> a + b\n\
    Decimal('6.3')\n>>> print(a + b)\n6.3\n>>> (a + b) == Decimal('6.3')\nTrue\n>>>\
    \ x = 1234.56789\n>>> # 两位小数精度\n>>> format(x, '0.2f')\n'1234.57'\n>>> # 右对齐，宽度10，一位小数精度\n\
    >>> format(x, '>10.1f')\n'    1234.6'\n>>> # 左对齐\n>>> format(x, '<10.1f')\n'1234.6\
    \     '\n>>> # 居中对齐\n>>> format(x, '^10.1f')\n'  1234.6   '\n>>> # 包含千位分隔符\n>>>\
    \ format(x, ',')\n'1,234.56789'\n>>> format(x, '0,.1f')\n'1,234.6'\n```\n\n##\
    \ 处理分数\n\nPython 支持 `Fraction()` 函数（定义在 `fractions` 模块中），该函数接受两个整数，分别表示分数的分子和分母（分母必须非零）。以下是在\
    \ Python 中定义和操作分数的一些示例：\n\n```\n>>> from fractions import Fraction\n>>> a = Fraction(5,\
    \ 4)\n>>> b = Fraction(7, 16)\n>>> print(a + b)\n27/16\n>>> print(a * b)\n35/64\n\
    >>> # 获取分子/分母\n>>> c = a * b\n>>> c.numerator\n35\n>>> c.denominator\n64\n>>>\
    \ # 转换为浮点数\n>>> float(c)\n0.546875\n>>> # 限制值的分母\n>>> print(c.limit_denominator(8))\n\
    4\n>>> # 将浮点数转换为分数\n>>> x = 3.75\n>>> y = Fraction(*x.as_integer_ratio())\n>>>\
    \ y\nFraction(15, 4)\n```\n\n在深入探讨处理字符串的 Python 代码示例之前，下一节将简要讨论 Unicode 和 UTF-8，它们都是字符编码。\n\
    \n## UNICODE 和 UTF-8\n\nUnicode 字符串由一系列介于 0 到 0x10ffff 之间的数字组成，每个数字代表一组字节。编码是将\
    \ Unicode 字符串转换为字节序列的方式。在各种编码中，UTF-8（“Unicode 转换格式”）可能是最常见的，也是许多系统的默认编码。UTF-8\
    \ 中的数字 8 表示编码使用 8 位数字，而 UTF-16 使用 16 位数字（但这种编码不太常见）。\n\nASCII 字符集是 UTF-8 的子集，因此有效的\
    \ ASCII 字符串可以作为 UTF-8 字符串读取，无需重新编码。此外，Unicode 字符串可以转换为 UTF-8 字符串。\n\n## 处理 Unicode\n\
    \nPython 支持 Unicode，这意味着用户可以渲染不同语言的字符。Unicode 数据可以像字符串一样存储和操作。通过在字符串前添加字母“u”来创建\
    \ Unicode 字符串，如下所示：\n\n```\n>>> u'Hello from Python!'\nu'Hello from Python!'\n\
    ```\n\n可以通过指定 Unicode 值将特殊字符包含在字符串中。例如，以下 Unicode 字符串在字符串中嵌入了一个空格（其 Unicode 值为\
    \ 0x0020）：\n\n```\n>>> u'Hello\\u0020from Python!'\nu'Hello from Python!'\n```\n\
    \n清单 1.1 展示了 `unicode1.py` 的内容，该文件说明了如何显示一串日文字符和另一串中文（普通话）字符。\n\n### 清单 1.1: unicode1.py\n\
    \n```\nchinese1 = u'\\u5c07\\u63a2\\u8a0e HTML5 \\u53ca\\u5176\\u4ed6'\nhiragana\
    \ = u'D3 \\u306F \\u304B\\u3063\\u3053\\u3044\\u3043 \\n\\u3067\\u3059!'\n\nprint('Chinese:',\
    \ chinese1)\nprint('Hiragana:', hiragana)\n```\n\n清单 1.1 的输出如下：\n\n```\nChinese:\
    \ 将探讨 HTML5 及其他\nHiragana: D3 は かっこいい です!\n```\n\n本章的下一部分将展示如何使用 Python 内置函数“切分”文本字符串。\n\
    \n## 处理字符串\n\n用户可以使用“+”运算符连接两个字符串。以下示例打印一个字符串，然后连接两个单字母字符串：\n\n```\n>>> 'abc'\n\
    'abc'\n>>> 'a' + 'b'\n'ab'\n```\n\n使用“+”或“*”连接字符串，如下所示：\n\n```\n>>> 'a' + 'a'\
    \ + 'a'\n'aaa'\n>>> 'a' * 3\n'aaa'\n```\n\n将字符串赋值给变量并使用 `print()` 命令打印它们：\n\n\
    ```\n>>> print('abc')\nabc\n>>> x = 'abc'\n>>> print(x)\nabc\n>>> y = 'def'\n\
