  md: '# CHAPTER 3


    # PYTHON DATA STRUCTURES


    Chapters 1 and 2 taught readers how to work with numbers and strings, as well
    as control structures in Python. In this chapter, readers will learn about Python
    collections, such as lists (or arrays), sets, tuples, and dictionaries. They will
    see many short code blocks that will help them rapidly learn how to work with
    these data structures in Python. After readers have finished this chapter, they
    will be in a better position to create more complex Python modules using one or
