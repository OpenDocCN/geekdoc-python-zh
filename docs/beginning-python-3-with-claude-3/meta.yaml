    # COMMAND-LINE ARGUMENTS


    Python provides a `getopt` module to parse command-line options and arguments,
    and the Python `sys` module provides access to any command-line arguments via
    the `sys.argv`. This serves two purposes:


    +   1. `sys.argv` is the list of command-line arguments.

    2. `len(sys.argv)` is the number of command-line arguments.


    Here `sys.argv[0]` is the program name, so if the Python program is called `test.py`,
    it matches the value of `sys.argv[0]`.


    Now readers can provide input values for a Python program on the command line
    instead of providing input values by prompting users for their input. As an example,
    consider the script `test.py` shown here:


    ```

    #!/usr/bin/python

    import sys

    print(''Number of arguments:'', len(sys.argv), ''arguments'')

    print(''Argument List:'', str(sys.argv))

    ```


    Run the previous as follows:


    ```

    python test.py arg1 arg2 arg3

    ```


    This will produce following result:


    ```

    Number of arguments: 4 arguments.

    Argument List: [''test.py'', ''arg1'', ''arg2'', ''arg3'']

    ```


    The ability to specify input values from the command line provides useful functionality.
    For example, suppose that one has a custom Python class that contains the methods
    `add` and `subtract` to add and subtract a pair of numbers.


    One can use command-line arguments in order to specify which method to execute
    on a pair of numbers, as shown here:


    ```

    python MyClass add 3 5

    python MyClass subtract 3 5

    ```


    This functionality is very useful because users can programmatically execute different
    methods in a Python class, which means that they can write unit tests for their
    code as well.


    Listing 1.14 displays the contents of `hello.py` that shows users how to use `sys.argv`
    to check the number of command line parameters.'
