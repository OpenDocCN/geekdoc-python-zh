    2.  人类能动性与监督：\n    -   通用人工智能能在多大程度上控制世界，也取决于其开发和部署过程中人类能动性和监督的水平。\n    -   如果通用人工智能是在强大的人类治理、伦理准则和控制机制下开发和实施的，它就不太可能获得不受约束的控制权。\n\
