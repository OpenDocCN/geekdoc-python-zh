    \n        Returns:\n            bool: True if column exists, False otherwise\n\
    \        \"\"\"\n        if self.data is None:\n            self.logger.error(\"\
    No data loaded. Please read CSV file first\")\n            return False\n\n  \
    \      if column not in self.data.columns:\n            self.logger.error(f\"\
    Column '{column}' not found in data\")\n            return False\n\n        return\
    \ True\n\n    def compute_mean(self,\n                target_column: str,\n  \
    \              filter_column: Optional[str] = None,\n                filter_value:\
    \ Optional[any] = None) -> Optional[float]:\n        \"\"\"\n        Compute mean\
    \ of target_column, optionally filtered by filter_column == filter_value.\n\n\
    \        Args:\n            target_column (str): Column to compute mean for\n\
    \            filter_column (str, optional): Column to filter on\n            filter_value\
    \ (any, optional): Value to filter by\n\n        Returns:\n            float or\
    \ None: Computed mean or None if error occurs\n        \"\"\"\n        try:\n\
    \            # Validate target column\n            if not self.validate_column(target_column):\n\
    \                return None\n\n            # Create filtered dataset if filter\
    \ is provided\n            if filter_column and filter_value:\n              \
    \  if not self.validate_column(filter_column):\n                    return None\n\
    \n                filtered_data = self.data[self.data[filter_column] == filter_value]\n\
    \                self.logger.info(f\"Filtered data contains {len(filtered_data)}\
    \ rows\")\n\n                if filtered_data.empty:\n                    self.logger.warning(f\"\
    No data found for {filter_column} = {filter_value}\")\n                    return\
    \ None\n            else:\n                filtered_data = self.data\n\n     \
    \       # Compute mean\n            mean_value = filtered_data[target_column].mean()\n\
    \            self.logger.info(f\"Computed mean: {mean_value:.2f}\")\n\n      \
    \      return mean_value\n\n        except TypeError:\n            self.logger.error(f\"\
