- md: "## TEXT ALIGNMENT\n\nPython provides the methods `ljust()`, `rjust()`, and\
    \ `center()` for aligning text. The `ljust()` and `rjust()` functions left justify\
    \ and right justify a text string, respectively, whereas the `center()` function\
    \ will center a string. An example is shown in the following code block:\n\n```\n\
    text = 'Hello World'\ntext.ljust(20)\n'Hello World         '\n>>> text.rjust(20)\n\
    '         Hello World'\n>>> text.center(20)\n'    Hello World     '\n```\n\nOne\
    \ can use the Python `format()` function to align text. Use the `<`, `>`, or `^`\
    \ characters, along with a desired width, in order to right justify, left justify,\
    \ and center the text, respectively. The following examples illustrate how to\
    \ specify text justification:\n\n```\n>>> format(text, '>20')\n'         Hello\
    \ World'\n>>>\n>>> format(text, '<20')\n'Hello World         '\n>>>\n>>> format(text,\
    \ '^20')\n'    Hello World     '\n>>>\n```\n\nIncidentally, one can use the `str()`\
    \ function with modules and user-defined classes. An example involving the Python\
    \ built-in module `sys` is here:\n\n```\n>>> import sys\n>>> print(str(sys))\n\
    <module 'sys' (built-in)>\n```\n\nThe following code snippet illustrates how to\
    \ use the `write()` function to display a string:\n\n```\nimport sys\nwrite =\
    \ sys.stdout.write\nwrite('123')\nwrite('123456789')\n```\n\nThe output is here:\n\
    \n```\n1233\n1234567899\n```\n\n## WORKING WITH DATES\n\nPython provides a rich\
    \ set of date-related functions. Listing 1.7 displays the contents of the Python\
    \ script date_time2.py that displays various date-related values, such as the\
    \ current date and time; the day of the week, month, and year; and the time in\
    \ seconds since the epoch.\n\n### LISTING 1.7: date_time2.py\n\n```\nimport time\n\
    import datetime\n\nprint(\"Time in seconds since the epoch: %s\" %time.time())\n\
    print(\"Current date and time: \" , datetime.datetime.now())\nprint(\"Or like\
    \ this: \" ,datetime.datetime.now().strftime(\"%y-%m-%d-%H-%M\"))\n\nprint(\"\
    Current year: \", datetime.date.today().strftime(\"%Y\"))\nprint(\"Month of year:\
    \ \", datetime.date.today().strftime(\"%B\"))\nprint(\"Week number of the year:\
    \ \", datetime.date.today().strftime(\"%W\"))\nprint(\"Weekday of the week: \"\
    , datetime.date.today().strftime(\"%w\"))\nprint(\"Day of year: \", datetime.date.today().strftime(\"\
    %j\"))\nprint(\"Day of the month : \", datetime.date.today().strftime(\"%d\"))\n\
    print(\"Day of week: \", datetime.date.today().strftime(\"%A\"))\n```\n\nListing\
    \ 1.8 displays the output generated by running the code in Listing 1.7.\n\n###\
    \ LISTING 1.8: datetime2.out\n\n```\nTime in seconds since the epoch: 1375144195.66\n\
    Current date and time:  2013-07-29 17:29:55.664164\nOr like this:  13-07-29-17-29\n\
    Current year:  2013\nMonth of year:  July\nWeek number of the year:  30\nWeekday\
    \ of the week:  1\nDay of year:  210\nDay of the month :  29\nDay of week:  Monday\n\
    ```\n\nPython also enables users to perform arithmetic calculations with date-related\
    \ values, as shown in the following code block:\n\n```\n>>> from datetime import\
    \ timedelta\n>>> a = timedelta(days=2, hours=6)\n>>> b = timedelta(hours=4.5)\n\
    >>> c = a + b\n>>> c.days\n2\n>>> c.seconds\n37800\n>>> c.seconds / 3600\n10.5\n\
    >>> c.total_seconds() / 3600\n58.5\n```\n\n### Converting Strings to Dates\n\n\
    Listing 1.9 displays the contents of `string2date.py` that illustrates how to\
    \ convert a string to a date, and also how to calculate the difference between\
    \ two dates.\n\n### LISTING 1.9: string2date.py\n\n```\nfrom datetime import datetime\n\
    \ntext = '2014-08-13'\ny = datetime.strptime(text, '%Y-%m-%d')\nz = datetime.now()\n\
    diff = z - y\nprint('Date difference:',diff)\n```\n\nThe output from Listing 1.9\
    \ is shown here:\n\nDate difference: -210 days, 18:58:40.197130\n\n## EXCEPTION\
    \ HANDLING IN PYTHON\n\nUnlike JavaScript, users cannot add a number and a string\
    \ in Python. However, one can detect an illegal operation using the `try/except`\
    \ construct in Python, which is similar to the `try/catch` construct in languages\
    \ such as JavaScript and Java.\n\nAn example of a `try/except` block is here:\n\
    \n```\ntry:\n    x = 4\n    y = 'abc'\n    z = x + y\nexcept:\n    print 'cannot\
    \ add incompatible types:', x, y\n```\n\nWhen one runs the preceding code in Python,\
    \ the `print()` statement in the `except` code block is executed because the variables\
    \ `x` and `y` have incompatible types.\n\nEarlier in the chapter readers also\
    \ saw that subtracting two strings throws an exception:\n\n```\n>>> 'a' - 'b'\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: unsupported operand type(s) for -: 'str' and 'str'\n```\n\nA simple\
    \ way to handle this situation is to use a `try/except` block:\n\n```\n>>> try:\n\
    ...     print('a' - 'b')\n... except TypeError:\n...     print('TypeError exception\
    \ while trying to subtract two strings')\n... except:\n...     print('Exception\
    \ while trying to subtract two strings')\n...\n```\n\nThe output from the preceding\
    \ code block is here:\n\nTypeError exception while trying to subtract two strings\n\
    \nThe preceding code block specifies the finer-grained exception called `TypeError`,\
    \ followed by a generic `except` code block to handle all other exceptions that\
    \ might occur during the execution of Python code. This style is similar to the\
    \ exception handling in Java code.\n\nListing 1.10 displays the contents of `exception1.py`\
    \ that illustrates how to handle various types of exceptions.\n\n### LISTING 1.10:\
    \ exception1.py\n\n```\nimport sys\n\ntry:\n    f = open('myfile.txt')\n    s\
    \ = f.readline()\n    i = int(s.strip())\nexcept IOError as err:\n    print(\"\
    I/O error: {0}\".format(err))\nexcept ValueError:\n    print(\"Could not convert\
    \ data to an integer.\")\nexcept:\n    print(\"Unexpected error:\", sys.exc_info()[0])\n\
    \    raise\n```\n\nListing 1.10 contains a `try` block followed by three `except`\
    \ statements. If an error occurs in the `try` block, the first `except` statement\
    \ is compared with the type of exception that occurred. If there is a match, then\
    \ the subsequent print statement is executed, and the program terminates. If not,\
    \ a similar test is performed with the second `except` statement. If neither `except`\
    \ statement matches the exception, the third `except` statement handles the exception,\
    \ which involves printing a message and then “raising” an exception. Note that\
    \ one can also specify multiple exception types in a single statement, as shown\
    \ here:\n\n```\nexcept (NameError, RuntimeError, TypeError):\n    print('One of\
    \ three error types occurred')\n```\n\nThe preceding code block is more compact,\
    \ but one does not know which of the three error types occurred. Python allows\
    \ users to define custom exceptions, but this topic is beyond the scope of this\
    \ book.\n\n## HANDLING USER INPUT\n\nPython enables users to read user input from\
    \ the command line via the `input()` function or the `raw_input()` function. Typically,\
    \ one assigns user input to a variable, which will contain all characters that\
    \ users enter from the keyboard. User input terminates when users press the `<return>`\
    \ key (which is included with the input characters). Listing 1.11 displays the\
    \ contents of `user_input1.py` that prompts users for their name and then uses\
    \ interpolation to display a response.\n\n### LISTING 1.11: user_input1.py\n\n\
    ```\nuserInput = input(\"Enter your name: \")\nprint (\"Hello %s, my name is Python\"\
    \ % userInput)\n```\n\nThe output of Listing 1.11 is here (assume that the user\
    \ entered the word Dave):\n\n```\nHello Dave, my name is Python\n```\n\nThe `print()`\
    \ statement in Listing 1.11 uses string interpolation via `%s`, which substitutes\
    \ the value of the variable after the `%` symbol. This functionality is obviously\
    \ useful when one wants to specify something that is determined at run-time.\n\
    \nUser input can cause exceptions (depending on the operations that the code performs),\
    \ so it’s important to include exception-handling code.\n\nListing 1.12 displays\
    \ the contents of `user_input2.py` that prompts users for a string and attempts\
    \ to convert the string to a number in a `try/except` block.\n\n### LISTING 1.12:\
    \ user_input2.py\n\n```\nuserInput = input(\"Enter something: \")\n\ntry:\n  \
    \  x = 0 + eval(userInput)\n    print('you entered the number:', userInput)\n\
    except:\n    print(userInput, 'is a string')\n```\n\nListing 1.12 adds the number\
    \ 0 to the result of converting a user's input to a number. If the conversion\
    \ was successful, a message with the user's input is displayed. If the conversion\
    \ failed, the `except` code block consists of a `print` statement that displays\
    \ a message.\n\n**Note:** This code sample uses the `eval()` function, which should\
    \ be avoided so that the code does not evaluate arbitrary (and possibly destructive)\
    \ commands.\n\nListing 1.13 displays the contents of `user_input3.py` that prompts\
    \ users for two numbers and attempts to compute their sum in a pair of `try/except`\
    \ blocks.\n\n### LISTING 1.13: user_input3.py\n\n```\nsum = 0\n\nmsg = 'Enter\
    \ a number:'\nval1 = input(msg)\n\ntry:\n    sum = sum + eval(val1)\nexcept:\n\
    \    print(val1, 'is a string')\n\nmsg = 'Enter a number:'\nval2 = input(msg)\n\
    \ntry:\n    sum = sum + eval(val2)\nexcept:\n    print(val2, 'is a string')\n\n\
    print('The sum of', val1, 'and', val2, 'is', sum)\n```\n\nListing 1.13 contains\
    \ two `try` blocks, each of which is followed by an `except` statement. The first\
    \ `try` block attempts to add the first user-supplied number to the variable `sum`,\
    \ and the second `try` block attempts to add the second user-supplied number to\
    \ the previously entered number. An error message occurs if either input string\
    \ is not a valid number; if both are valid numbers, a message is displayed containing\
    \ the input numbers and their sum."
  mdcn: "## 文本对齐\n\nPython 提供了 `ljust()`、`rjust()` 和 `center()` 方法用于对齐文本。`ljust()`\
    \ 和 `rjust()` 函数分别对文本字符串进行左对齐和右对齐，而 `center()` 函数则将字符串居中。以下代码块展示了一个示例：\n\n```\n\
    text = 'Hello World'\ntext.ljust(20)\n'Hello World         '\n>>> text.rjust(20)\n\
    '         Hello World'\n>>> text.center(20)\n'    Hello World     '\n```\n\n可以使用\
    \ Python 的 `format()` 函数来对齐文本。使用 `<`、`>` 或 `^` 字符，并指定所需的宽度，可以分别实现右对齐、左对齐和居中对齐。以下示例说明了如何指定文本对齐方式：\n\
    \n```\n>>> format(text, '>20')\n'         Hello World'\n>>>\n>>> format(text,\
    \ '<20')\n'Hello World         '\n>>>\n>>> format(text, '^20')\n'    Hello World\
    \     '\n>>>\n```\n\n顺便提一下，可以将 `str()` 函数用于模块和用户定义的类。这里有一个涉及 Python 内置模块 `sys`\
    \ 的示例：\n\n```\n>>> import sys\n>>> print(str(sys))\n<module 'sys' (built-in)>\n\
    ```\n\n以下代码片段展示了如何使用 `write()` 函数来显示字符串：\n\n```\nimport sys\nwrite = sys.stdout.write\n\
    write('123')\nwrite('123456789')\n```\n\n输出如下：\n\n```\n1233\n1234567899\n```\n\
    \n## 处理日期\n\nPython 提供了丰富的日期相关函数。清单 1.7 展示了 Python 脚本 `date_time2.py` 的内容，该脚本显示了各种与日期相关的值，例如当前日期和时间；星期几、月份和年份；以及自纪元以来的秒数。\n\
    \n### 清单 1.7：date_time2.py\n\n```\nimport time\nimport datetime\n\nprint(\"Time\
    \ in seconds since the epoch: %s\" %time.time())\nprint(\"Current date and time:\
    \ \" , datetime.datetime.now())\nprint(\"Or like this: \" ,datetime.datetime.now().strftime(\"\
    %y-%m-%d-%H-%M\"))\n\nprint(\"Current year: \", datetime.date.today().strftime(\"\
    %Y\"))\nprint(\"Month of year: \", datetime.date.today().strftime(\"%B\"))\nprint(\"\
    Week number of the year: \", datetime.date.today().strftime(\"%W\"))\nprint(\"\
    Weekday of the week: \", datetime.date.today().strftime(\"%w\"))\nprint(\"Day\
    \ of year: \", datetime.date.today().strftime(\"%j\"))\nprint(\"Day of the month\
    \ : \", datetime.date.today().strftime(\"%d\"))\nprint(\"Day of week: \", datetime.date.today().strftime(\"\
    %A\"))\n```\n\n清单 1.8 展示了运行清单 1.7 中代码生成的输出。\n\n### 清单 1.8：datetime2.out\n\n```\n\
    Time in seconds since the epoch: 1375144195.66\nCurrent date and time:  2013-07-29\
    \ 17:29:55.664164\nOr like this:  13-07-29-17-29\nCurrent year:  2013\nMonth of\
    \ year:  July\nWeek number of the year:  30\nWeekday of the week:  1\nDay of year:\
    \  210\nDay of the month :  29\nDay of week:  Monday\n```\n\nPython 还允许用户对日期相关的值执行算术计算，如以下代码块所示：\n\
    \n```\n>>> from datetime import timedelta\n>>> a = timedelta(days=2, hours=6)\n\
    >>> b = timedelta(hours=4.5)\n>>> c = a + b\n>>> c.days\n2\n>>> c.seconds\n37800\n\
    >>> c.seconds / 3600\n10.5\n>>> c.total_seconds() / 3600\n58.5\n```\n\n### 将字符串转换为日期\n\
    \n清单 1.9 展示了 `string2date.py` 的内容，该脚本说明了如何将字符串转换为日期，以及如何计算两个日期之间的差值。\n\n### 清单\
    \ 1.9：string2date.py\n\n```\nfrom datetime import datetime\n\ntext = '2014-08-13'\n\
    y = datetime.strptime(text, '%Y-%m-%d')\nz = datetime.now()\ndiff = z - y\nprint('Date\
    \ difference:',diff)\n```\n\n清单 1.9 的输出如下：\n\nDate difference: -210 days, 18:58:40.197130\n\
    \n## Python 中的异常处理\n\n与 JavaScript 不同，在 Python 中不能将数字和字符串相加。但是，可以使用 Python 中的\
    \ `try/except` 结构来检测非法操作，这类似于 JavaScript 和 Java 等语言中的 `try/catch` 结构。\n\n以下是一个\
    \ `try/except` 块的示例：\n\n```\ntry:\n    x = 4\n    y = 'abc'\n    z = x + y\nexcept:\n\
    \    print 'cannot add incompatible types:', x, y\n```\n\n当在 Python 中运行前面的代码时，`except`\
    \ 代码块中的 `print()` 语句会被执行，因为变量 `x` 和 `y` 的类型不兼容。\n\n在本章前面，读者还看到减去两个字符串会抛出异常：\n\n\
    ```\n>>> 'a' - 'b'\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nTypeError: unsupported operand type(s) for -: 'str' and 'str'\n\
    ```\n\n处理这种情况的一个简单方法是使用 `try/except` 块：\n\n```\n>>> try:\n...     print('a' -\
    \ 'b')\n... except TypeError:\n...     print('TypeError exception while trying\
    \ to subtract two strings')\n... except:\n...     print('Exception while trying\
    \ to subtract two strings')\n...\n```\n\n前面代码块的输出如下：\n\nTypeError exception while\
    \ trying to subtract two strings\n\n前面的代码块指定了更细粒度的异常类型 `TypeError`，随后是一个通用的 `except`\
    \ 代码块，用于处理 Python 代码执行过程中可能发生的其他所有异常。这种风格类似于 Java 代码中的异常处理。\n\n清单 1.10 展示了 `exception1.py`\
    \ 的内容，该脚本说明了如何处理各种类型的异常。\n\n### 清单 1.10：exception1.py\n\n```\nimport sys\n\ntry:\n\
    \    f = open('myfile.txt')\n    s = f.readline()\n    i = int(s.strip())\nexcept\
    \ IOError as err:\n    print(\"I/O error: {0}\".format(err))\nexcept ValueError:\n\
    \    print(\"Could not convert data to an integer.\")\nexcept:\n    print(\"Unexpected\
    \ error:\", sys.exc_info()[0])\n    raise\n```\n\n清单 1.10 包含一个 `try` 块，后面跟着三个\
    \ `except` 语句。如果 `try` 块中发生错误，则将第一个 `except` 语句与发生的异常类型进行比较。如果匹配，则执行后续的 `print`\
    \ 语句，然后程序终止。如果不匹配，则对第二个 `except` 语句执行类似的测试。如果两个 `except` 语句都不匹配该异常，则第三个 `except`\
    \ 语句处理该异常，这包括打印一条消息，然后“引发”一个异常。注意，也可以在单个语句中指定多个异常类型，如下所示：\n\n```\nexcept (NameError,\
    \ RuntimeError, TypeError):\n    print('One of three error types occurred')\n\
    ```\n\n前面的代码块更紧凑，但无法知道具体发生了三种错误类型中的哪一种。Python 允许用户定义自定义异常，但这个主题超出了本书的范围。\n\n##\
    \ 处理用户输入\n\nPython 允许用户通过 `input()` 函数或 `raw_input()` 函数从命令行读取用户输入。通常，将用户输入赋值给一个变量，该变量将包含用户从键盘输入的所有字符。当用户按下\
    \ `<return>` 键（该键包含在输入字符中）时，用户输入结束。清单 1.11 展示了 `user_input1.py` 的内容，该脚本提示用户输入姓名，然后使用插值显示响应。\n\
    \n### 清单 1.11：user_input1.py\n\n```\nuserInput = input(\"Enter your name: \")\n\
    print (\"Hello %s, my name is Python\" % userInput)\n```\n\n清单 1.11 的输出如下（假设用户输入了单词\
    \ Dave）：\n\n```\nHello Dave, my name is Python\n```\n\n清单 1.11 中的 `print()` 语句使用了通过\
    \ `%s` 进行的字符串插值，它将 `%` 符号后面的变量值替换进去。当需要指定在运行时确定的内容时，此功能显然很有用。\n\n用户输入可能导致异常（取决于代码执行的操作），因此包含异常处理代码非常重要。\n\
    \n清单 1.12 展示了 `user_input2.py` 的内容，该脚本提示用户输入一个字符串，并在 `try/except` 块中尝试将该字符串转换为数字。\n\
    \n### 清单 1.12：user_input2.py\n\n```\nuserInput = input(\"Enter something: \")\n\
    \ntry:\n    x = 0 + eval(userInput)\n    print('you entered the number:', userInput)\n\
    except:\n    print(userInput, 'is a string')\n```\n\n清单 1.12 将数字 0 与用户输入转换为数字的结果相加。如果转换成功，则显示包含用户输入的消息。如果转换失败，`except`\
    \ 代码块包含一个 `print` 语句，显示一条消息。\n\n**注意：** 此代码示例使用了 `eval()` 函数，应避免使用，以防止代码执行任意（且可能具有破坏性的）命令。\n\
    \n清单 1.13 展示了 `user_input3.py` 的内容，该脚本提示用户输入两个数字，并在一对 `try/except` 块中尝试计算它们的和。\n\
    \n### 清单 1.13：user_input3.py\n\n```\nsum = 0\n\nmsg = 'Enter a number:'\nval1\
    \ = input(msg)\n\ntry:\n    sum = sum + eval(val1)\nexcept:\n    print(val1, 'is\
    \ a string')\n\nmsg = 'Enter a number:'\nval2 = input(msg)\n\ntry:\n    sum =\
    \ sum + eval(val2)\nexcept:\n    print(val2, 'is a string')\n\nprint('The sum\
    \ of', val1, 'and', val2, 'is', sum)\n```\n\n清单 1.13 包含两个 `try` 块，每个 `try` 块后面都跟着一个\
    \ `except` 语句。第一个 `try` 块尝试将用户提供的第一个数字加到变量 `sum` 上，第二个 `try` 块尝试将用户提供的第二个数字加到先前输入的数字上。如果任一输入字符串不是有效的数字，则会出现错误消息；如果两者都是有效的数字，则显示一条包含输入数字及其和的消息。"
