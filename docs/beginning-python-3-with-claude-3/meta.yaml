    \n以下代码块说明了同名全局变量和局部变量的使用：\n\n```\n#!/usr/bin/python\n# a global variable:\ntotal\
    \ = 0;\n\ndef sum(x1, x2):\n    # this total is local:\n    total = x1+x2;\n \
    \   print(\"Local total : \", total)\n    return total\n\n# invoke the sum function\n\
    sum(2,3);\nprint(\"Global total : \", total)\n```\n\n执行上述代码时，会产生以下结果：\n\n```\n\
    Local total :    5\nGlobal total :   0\n```\n\n那么未限定作用域的变量呢，例如指定变量 x 而没有模块前缀？答案包括\
    \ Python 将执行的以下步骤序列：\n\n1. 在局部作用域中检查该名称。\n2. 向上遍历封闭作用域并检查该名称。\n3. 重复步骤 #2 直到全局作用域（即模块级别）。\n\
    4. 如果 x 仍未找到，Python 会检查 `__builtins__`。\n\n```\nPython 2.7.5 (default, Dec  2\
