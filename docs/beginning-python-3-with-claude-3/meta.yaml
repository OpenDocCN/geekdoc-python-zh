    - 3. 对抗性训练：此技术涉及在包含幻觉示例的数据集上训练模型，这有助于模型学习区分准确信息和幻觉信息。\n- 4. 输入提示工程：此技术涉及设计具体、清晰和简洁的输入提示，这有助于减少产生幻觉的可能性。\n\
