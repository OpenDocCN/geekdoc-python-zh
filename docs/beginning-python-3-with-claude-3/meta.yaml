    A queue is a FIFO ("First In First Out") data structure with `insert()` and `pop()`
    functions for inserting and removing elements, respectively. The most recently
    added element in a queue is in the top position, and therefore the last element
    that can be removed from the queue.


    The following code block illustrates how to create a queue and also insert and
    append items to a queue in Python.


    Create a Python list (which will be used as a queue):


    ```

    >>> q = [1,2,3,4]

    ```


    Insert 5 at the beginning of the queue:


    ```

    >>> q.insert(0,5)

    >>> q

    [5, 1, 2, 3, 4]

    ```


    Remove the last element from the queue:


    ```

    >>> q.pop(0)

    1

    >>> q

    [5, 2, 3, 4]

    ```


    The preceding code uses `q.insert(0, 5)` to insert in the beginning and `q.pop()`
    to remove from the end. It''s important to keep in mind that the `insert()` operation
    is slow in Python: insert at 0 requires copying all the elements in underlying
    array down one space. Therefore, use `collections.deque` with `coll.appendleft()`
    and `coll.pop()`, where `coll` is an instance of the `Collection` class.


    The next section shows how to use tuples in Python.'
