    \ <= useful for regression\nnp.mean()\nnp.std()\n```\n\nThe np.linspace() method\
    \ generates a set of equally spaced numbers between a lower bound and an upper\
    \ bound. The np.mean() and np.std() methods calculate the mean and standard deviation,\
    \ respectively, of a set of numbers. Listing 4.18 displays the contents of sample_mean_std.py\
    \ that illustrates how to calculate statistical values from a NumPy array.\n\n\
    ### LISTING 4.18: sample_mean_std.py\n\n```\nimport numpy as np\n\nx2 = np.arange(8)\n\
    print('mean = ',x2.mean())\nprint('std = ',x2.std())\n\nx3 = (x2 - x2.mean())/x2.std()\n\
    print('x3 mean = ',x3.mean())\nprint('x3 std = ',x3.std())\n```\n\nListing 4.18\
