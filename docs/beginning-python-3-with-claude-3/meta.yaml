    \ value=None)\n```\n\n检查数据框中的空值（NANs）：\n\n```python\npd.isnull(object)\n```\n\n\
    删除数据框中的一个特征列：\n\n```python\ndf.drop('feature_variable_name', axis=1)\n```\n\n\
    将数据框中的对象类型转换为浮点数：\n\n```python\npd.to_numeric(df[\"feature_name\"], errors='coerce')\n\
    ```\n\n将数据框中的数据转换为 NumPy 数组：\n\n```python\ndf.as_matrix()\n```\n\n显示数据框的前 n 行：\n\
    \n```python\ndf.head(n)\n```\n\n通过特征名获取数据框中的数据：\n\n```python\ndf.loc[feature_name]\n\
    ```\n\n对数据框应用函数：将数据框中“height”列的所有值乘以 3：\n\n```python\ndf[\"height\"].apply(lambda\
    \ height: 3 * height)\n```\n\n或者：\n\n```python\ndef multiply(x):\n    return x\
    \ * 3\ndf[\"height\"].apply(multiply)\n```\n\n将数据框的第四列重命名为“height”：\n\n```python\n\
    df.rename(columns = {df.columns[3]:'height'}, inplace=True)\n```\n\n获取数据框中“first”列的唯一条目：\n\
    \n```python\ndf[\"first\"].unique()\n```\n\n从现有数据框创建包含“first”和“last”列的新数据框：\n\n\
    ```python\nnew_df = df[[\"name\", \"size\"]]\n```\n\n对数据框中的数据进行排序：\n\n```python\n\
