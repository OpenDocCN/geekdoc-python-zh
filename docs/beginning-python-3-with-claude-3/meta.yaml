    # SAVING CODE IN A MODULE


    Earlier readers learned how to launch the Python interpreter from the command
    line and then enter Python commands. However, everything that is typed in the
    Python interpreter is only valid for the current session: If one exits the interpreter
    and then launches the interpreter again, previous definitions are no longer valid.
    Fortunately, Python enables users to store code in a text file, as discussed in
    the next section.


    A module in Python is a text file that contains Python statements. In the previous
    section, users saw how the Python interpreter enables them to test code snippets
    whose definitions are valid for the current session. If one wants to retain the
    code snippets and other definitions, they should place them in a text file so
    they can execute that code outside of the Python interpreter.


    The outermost statements in a Python are executed from top to bottom when the
    module is imported for the first time, which will then set up its variables and
    functions.


    A Python module can be run directly from the command line, as shown here:


    ```

    python first.py

    ```


    As an illustration, place the following two statements in a text file called first.py:


    ```

    x = 3

    print(x)

    ```'
