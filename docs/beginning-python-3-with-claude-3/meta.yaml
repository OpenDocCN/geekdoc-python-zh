- md: "## Checking for Keys in a Dictionary\n\nYou can easily check for the presence\
    \ of a key in a Python dictionary as follows:\n\n```\n>>> 'x' in dict1\nTrue\n\
    >>> 'z' in dict1\nFalse\n```\n\nUse square brackets for finding or setting a value\
    \ in a dictionary. For example, `dict['abc']` finds the value associated with\
    \ the key 'abc'. One can use strings, numbers, and tuples work as key values,\
    \ and you can use any type as the value.\n\nIf you access a value that is not\
    \ in the `dict`, Python throws a `KeyError`. Consequently, use the \"in\" operator\
    \ to check if the key is in the dict. Alternatively, use `dict.get(key)` which\
    \ returns the value or `None` if the key is not present. One can even use the\
    \ expression `get(key, not-found-string)` to specify the value to return if a\
    \ key is not found.\n\n## Deleting Keys From a Dictionary\n\nLaunch the Python\
    \ interpreter and enter the following commands:\n\n```\n>>> MyDict = {'x' : 5,\
    \ 'y' : 7}\n>>> MyDict['z'] = 13\n>>> MyDict\n{'y': 7, 'x': 5, 'z': 13}\n>>> del\
    \ MyDict['x']\n>>> MyDict\n{'y': 7, 'z': 13}\n>>> MyDict.keys()\n['y', 'z']\n\
    >>> MyDict.values()\n[13, 7]\n>>> 'z' in MyDict\nTrue\n```\n\n## Iterating Through\
    \ a Dictionary\n\nThe following code snippet shows users how to iterate through\
    \ a dictionary:\n\n```\nMyDict = {'x' : 5, 'y' : 7, 'z' : 13}\n\nfor key, value\
    \ in MyDict.iteritems():\n    print key, value\n```\n\nThe output from the preceding\
    \ code block is here:\n\n```\ny 7\nx 5\nz 13\n```\n\n## Interpolating Data From\
    \ a Dictionary\n\nThe % operator substitutes values from a Python dictionary into\
    \ a string by name. Listing 3.11 contains an example of doing so.\n\n### LISTING\
    \ 3.11: interpolate_dict1.py\n\n```\nhash = {}\nhash['beverage'] = 'coffee'\n\
    hash['count'] = 3\n\n# %d for int, %s for string\ns = 'Today I drank %(count)d\
    \ cups of %(beverage)s' % hash\nprint('s:', s)\n```\n\nThe output from the preceding\
    \ code block is here:\n\n```\nToday I drank 3 cups of coffee\n```\n\n## DICTIONARY\
    \ FUNCTIONS AND METHODS\n\nPython provides various functions and methods for a\
    \ Python dictionary, such as cmp(), len(), and str() that compare two dictionaries,\
    \ return the length of a dictionary, and display a string representation of a\
    \ dictionary, respectively.\nUsers can also manipulate the contents of a Python\
    \ dictionary using the functions clear() to remove all elements, copy() to return\
    \ a shall copy, get() to retrieve the value of a key, items() to display the (key,value)\
    \ pairs of a dictionary, keys() to displays the keys of a dictionary, and values()\
    \ to return the list of values of a dictionary.\n\n## DICTIONARY FORMATTING\n\n\
    The % operator works conveniently to substitute values from a dict into a string\
    \ by name:\n\n```\n#create a dictionary\n>>> h = {}\n#add a key/value pair\n>>>\
    \ h['item'] = 'beer'\n>>> h['count'] = 4\n#interpolate using %d for int, %s for\
    \ string\n>>> s = 'I want %(count)d bottles of %(item)s' % h\n>>> s\n'I want 4\
    \ bottles of beer'\n```\n\nThe next section shows how to create an ordered Python\
    \ dictionary.\n\n## ORDERED DICTIONARIES\n\nRegular Python dictionaries iterate\
    \ over key/value pairs in arbitrary order. Python 2.7 introduced a new OrderedDict\
    \ class in the collections module. The OrderedDict API provides the same interface\
    \ as regular dictionaries but iterates over keys and values in a guaranteed order\
    \ depending on when a key was first inserted:\n\n```\n>>> from collections import\
    \ OrderedDict\n>>> d = OrderedDict([('first', 1),\n...                 ('second',\
    \ 2),\n...                 ('third', 3)])\n>>> d.items()\n[('first', 1), ('second',\
    \ 2), ('third', 3)]\n```\n\nIf a new entry overwrites an existing entry, the original\
    \ insertion position is left unchanged:\n\n```\n>>> d['second'] = 4\n>>> d.items()\n\
    [('first', 1), ('second', 4), ('third', 3)]\n```\n\nDeleting an entry and reinserting\
    \ it will move it to the end:\n\n```\n>>> del d['second']\n>>> d['second'] = 5\n\
    >>> d.items()\n[('first', 1), ('third', 3), ('second', 5)]\n```\n\n## Sorting\
    \ Dictionaries\n\nPython enables you to support the entries in a dictionary. For\
    \ example, one can modify the code in the preceding section to display the alphabetically\
    \ sorted words and their associated word count.\n\n## Python Multidictionaries\n\
    \nUsers can define entries in a Python dictionary so that the entries reference\
    \ lists or other types of Python structures. Listing 3.12 displays the contents\
    \ of multi_dictionary1.py that illustrates how to define more complex dictionaries.\n\
    \n### LISTING 3.12: multi_dictionary1.py\n\n```\nfrom collections import defaultdict\n\
    \nd = {'a' : [1, 2, 3], 'b' : [4, 5]}\nprint 'firsts:',d\n\nd = defaultdict(list)\n\
    d['a'].append(1)\nd['a'].append(2)\nd['b'].append(4)\nprint 'second:',d\n\nd =\
    \ defaultdict(set)\nd['a'].add(1)\nd['a'].add(2)\nd['b'].add(4)\nprint 'third:',d\n\
    ```\n\nListing 3.12 starts by defining the dictionary d and printing its contents.\
    \ The next portion of Listing 3.12 specifies a list-oriented dictionary, and then\
    \ modifies the values for the keys a and b. The final portion of Listing 3.12\
    \ specifies a set-oriented dictionary, and then modifies the values for the keys\
    \ a and b as well.\n\nThe output from Listing 3.12 is here:\n\n```\nfirst: {'a':\
    \ [1, 2, 3], 'b': [4, 5]}\nsecond: defaultdict(<type 'list'>, {'a': [1, 2], 'b':\
    \ [4]})\nthird: defaultdict(<type 'set'>, {'a': set([1, 2]), 'b': set([4])})\n\
    ```\n\nThe next section discusses other Python sequence types that have not been\
    \ discussed in previous sections of this chapter.\n\n## OTHER SEQUENCE TYPES IN\
    \ PYTHON\n\nPython supports 7 sequence types: str, unicode, list, tuple, bytearray,\
    \ buffer, and xrange.\n\nOne can iterate through a sequence and retrieve the position\
    \ index and corresponding value at the same time using the enumerate() function.\n\
    \n```\n>>> for i, v in enumerate(['x', 'y', 'z']):\n...     print i, v\n...\n\
    0 x\n1 y\n2 z\n```\n\nBytearray objects are created with the built-in function\
    \ bytearray(). Although buffer objects are not directly supported by Python syntax,\
    \ users can create them via the built-in buffer() function.\n\nObjects of type\
    \ xrange are created with the xrange() function. An xrange object is similar to\
    \ a buffer in the sense that there is no specific syntax to create them. Moreover,\
    \ xrange objects do not support operations such as slicing, concatenation, or\
    \ repetition.\n\nAt this point readers have seen all the Python types that they\
    \ will encounter in the remaining chapters of this book, so it makes sense to\
    \ discuss mutable and immutable types in Python, which is the topic of the next\
    \ section.\n\n## MUTABLE AND IMMUTABLE TYPES IN PYTHON\n\nPython represents its\
