    \ install, whereas modules with code written in C are usually faster but more\
    \ difficult in terms of installation.\n\n## virtualenv\n\nThe `virtualenv` tool\
    \ enables users to create isolated Python environments, and its home page is here:\
    \ http://www.virtualenv.org/en/latest/virtualenv.html\n\n`virtualenv` addresses\
    \ the problem of preserving the correct dependencies and versions (and indirectly\
    \ permissions) for different applications. Python novices might not need `virtualenv`\
    \ right now, but keep this tool in mind.\n\n## IPython\n\nAnother very good tool\
    \ is `IPython` (which won a Jolt award), and its home page is here:\n\nhttp://ipython.org/install.html\n\
    \nTwo very nice features of `IPython` are tab expansion and “?,” and an example\
    \ of tab expansion is shown here:\n\n```\npython\nPython 3.12.5 (v3.12.5:ff3bc82f7c9,\
    \ Aug  7 2024, 05:32:06)\n[Clang 13.0.0 (clang-1300.0.29.30)] on darwin\nType\
    \ \"help\", \"copyright\", \"credits\" or \"license\" for more information.\n\n\
    IPython 0.13.2 -- An enhanced Interactive Python.\n?             -> Introduction\
    \ and overview of IPython's features.\n%quickref -> Quick reference.\nhelp   \
    \   -> Python's own help system.\nobject?   -> Details about 'object', use 'object??'\
    \ for extra details.\n\nIn [1]: di\n%dirs    dict     dir      divmod\n```\n\n\
    In the preceding session, type the characters `di`, and IPython will respond with\
    \ the following line that contains all the functions that start with the letters\
    \ `di`:\n\n```\n%dirs    dict     dir      divmod\n```\n\nEnter a question mark\
    \ (“?”), and `ipython` provides textual assistance, the first part of which is\
    \ here:\n\n```\nIPython -- An enhanced Interactive Python\n=========================================\n\
    \nIPython offers a combination of convenient shell features,\nspecial commands\
    \ and a history mechanism for both input\n(command history) and output (results\
    \ caching, similar\nto Mathematica). It is intended to be a fully compatible replacement\
    \ for the standard Python interpreter, while offering vastly improved functionality\
    \ and flexibility.\n```\n\nThe next section shows how to check whether or not\
    \ Python is installed, and also shows where Python can be downloaded.\n\n## PYTHON\
    \ INSTALLATION\n\nBefore downloading anything, check if Python is already installed\
    \ by typing the following command in a command shell:\n\n`python -V`\n\nThe output\
    \ for the Macbook used in this book is here:\n\n`Python 3.12.5`\n\n**Note:** Install\
    \ Python 3.9 (or as close as possible to this version) so that the same version\
    \ of Python that was used to test the Python files in this book is used.\n\nTo\
    \ install Python, navigate to the Python home page and select the downloads link\
    \ or navigate directly to this Web site:\n\n`http://www.python.org/download/`\n\
    \nIn addition, PythonWin is available for Windows, and its home page is here:\n\
    \n`http://www.cgl.ucsf.edu/Outreach/pc204/pythonwin.html`\n\nUse any text editor\
    \ that can create, edit, and save Python scripts and save them as plain text files\
    \ (don't use Microsoft Word).\n\nAfter Python is installed and configured, users\
    \ are ready to work with the Python scripts in this book.\n\n## SETTING THE PATH\
    \ ENVIRONMENT VARIABLE (WINDOWS ONLY)\n\nThe `PATH` environment variable specifies\
    \ a list of directories that are searched whenever one specifies an executable\
    \ program from the command line. A very good guide to setting up the environment\
    \ so that the Python executable is always available in every command shell is\
    \ to follow the instructions here:\n\n`http://www.blog.pythonlibrary.org/2011/11/24/python-101-setting-up-python-on-windows/`\n\
    \n## LAUNCHING PYTHON ON A MACHINE\n\nThere are three different ways to launch\
    \ Python:\n\n- Use the Python interactive interpreter.\n- Launch Python scripts\
    \ from the command line.\n- Use an IDE.\n\nThe next section shows how to launch\
    \ the Python interpreter from the command line, and later in this chapter readers\
    \ will learn how to launch Python scripts from the command line and they will\
    \ also learn about Python IDEs.\n\n**Note:** The emphasis in this book is to launch\
    \ Python scripts from the command line or to enter code in the Python interpreter.\n\
    \n## The Python Interactive Interpreter\n\nLaunch the Python interactive interpreter\
    \ from the command line by opening a command shell and typing the following command:\n\
    \n```\npython\n```\n\nReaders will see the following prompt (or something similar):\n\
    \n```\nPython 3.12.5 (v3.12.5:ff3bc82f7c9, Aug  7 2024, 05:32:06)\n[Clang 13.0.0\
    \ (clang-1300.0.29.30)] on darwin\nType \"help\", \"copyright\", \"credits\" or\
    \ \"license\" for more information.\n>>>\n```\n\nType the expression 2 + 7 at\
    \ the prompt:\n\n```\n>>> 2 + 7\n```\n\nPython displays the following result:\n\
    \n```\n9\n>>>\n```\n\nPress `ctrl-d` to exit the Python shell.\n\nLaunch any Python\
    \ script from the command line by preceding it with the word “python.” For example,\
    \ if there is a Python script `myscript.py` that contains Python commands, launch\
    \ the script as follows:\n\n```\npython myscript.py\n```\n\nAs a simple illustration,\
    \ suppose that the Python script `myscript.py` contains the following Python code:\n\
    \n```\nprint('Hello World from Python')\nprint('2 + 7 = ', 2+7)\n```\n\nWhen the\
    \ user launches the preceding Python script, they will see the following output:\n\
    \n```\nHello World from Python\n2 + 7 =  9\n```\n\n## PYTHON IDENTIFIERS\n\nA\
    \ Python identifier is the name of a variable, function, class, module, or other\
    \ Python object, and a valid identifier conforms to the following rules:\n\n-\
    \ It starts with a letter A to Z or a to z or an underscore (_).\n- It contains\
    \ zero or more letters, underscores, and digits (0 to 9).\n\n**Note:** Python\
    \ identifiers cannot contain characters such as @, $, and %.\n\nPython is a case-sensitive\
    \ language, so `Abc` and `abc` are different identifiers in Python.\n\nIn addition,\
    \ Python has the following naming convention:\n\n- Class names start with an uppercase\
    \ letter and all other identifiers with a lowercase letter.\n- An initial underscore\
    \ is used for private identifiers.\n- Two initial underscores are used for strongly\
    \ private identifiers.\n\nA Python identifier with two initial underscore and\
    \ two trailing underscore characters indicates a language-defined special name.\n\
    \n## LINES, INDENTATION, AND MULTILINES\n\nUnlike other programming languages\
    \ (such as Java or Objective-C), Python uses indentation instead of curly braces\
    \ for code blocks. Indentation must be consistent in a code block, as shown here:\n\
    \n```\nif True:\n    print(\"ABC\")\n    print(\"DEF\")\nelse:\n    print(\"ABC\"\
    )\n    print(\"DEF\")\n```\n\nMulti-line statements in Python can terminate with\
    \ a new line or the backslash (\"\\\") character, as shown here:\n\n```\ntotal\
    \ = x1 + \\\n        x2 + \\\n        x3\n```\n\nObviously one can place x1, x2,\
    \ and x3 on the same line, so there is no reason to use three separate lines;\
    \ however, this functionality is available in case one needs to add a set of variables\
    \ that do not fit on a single line.\n\nOne can specify multiple statements in\
    \ one line by using a semicolon (\";\") to separate each statement, as shown here:\n\
    \n```\na=10; b=5; print(a); print(a+b)\n```"
