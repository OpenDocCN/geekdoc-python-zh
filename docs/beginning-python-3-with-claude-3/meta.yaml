    communication and help preserve endangered languages, promoting cultural exchange
    and understanding.


    Social Good Initiatives: Generative AI can be leveraged to address social issues,
    such as generating awareness campaigns for humanitarian causes or providing personalized
    recommendations for social services.


    ## Potential Impact:


    The real-world use cases of generative AI have the potential to bring about significant
    positive changes. They can enhance human creativity, improve decision-making,
    increase efficiency, and solve complex problems in various domains. Generative
    AI can drive innovation, foster economic growth, and improve the overall quality
    of life for people worldwide.


    It is important to approach the development and deployment of generative AI with
    caution and ethical considerations. Addressing biases, ensuring privacy and security,
    and establishing governance frameworks are crucial to mitigate potential risks
    and ensure that the benefits of generative AI are widely accessible and beneficial
    to society.


    ## DEEPMIND


    DeepMind has made significant contributions to AI, which includes the creation
    of various AI systems. DeepMind was established in 2010 and became a subsidiary
    of Google in 2014, and its home page is here: https://deepmind.com/


    DeepMind created the 280GB language model Gopher that significantly outperforms
    its competitors, including GPT-3, J1-Jumbo, and MT-NLG. DeepMind also developed
    AlphaFold that solved a protein folding task in thirty minutes that had eluded
    researchers for ten years. Moreover, DeepMind made AlphaFold available for free
    for everyone in July 2021. DeepMind has made significant contributions in the
    development of world caliber AI game systems, some of which are discussed in the
    next section.


    ## DeepMind and Games


    DeepMind is the force behind the AI systems StarCraft and AlphaGo that defeated
    the best human players in Go (which is considerably more difficult than chess).
    These games provide “perfect information,” whereas games with “imperfect information”
    (such as Poker) have posed a challenge for ML models.


    AlphaGo Zero (the successor of AlphaGo) mastered the game through self-play in
    less time and with less computing power. AlphaGo Zero exhibited extraordinary
    performance by defeating AlphaGo 100–0. Another powerful system is AlphaZero that
    also used a self-play technique learned to play Go, chess, and shogi, and also
    achieved SOTA performance results.


    By way of comparison, ML models that use tree search are well-suited for games
    with perfect information. By contrast, games with imperfect information (such
    as Poker) involve hidden information that can be leveraged to devise counter strategies
    to counteract the strategies of opponents. In particular, AlphaStar is capable
    of playing against the best players of StarCraft II, and also became the first
    AI to achieve SOTA results in a game that requires “strategic capability in an
    imperfect information world.”


    ## Player of Games (PoG)


    The DeepMind team at Google devised the general-purpose PoG (player of games)
    algorithm that is based on the following techniques:


    - CFR (counterfactual regret minimization)

    - CVPN (counterfactual value-and-policy network)

    - GT-CFT (growing tree CFR)

    - CVPN


    The counterfactual value-and-policy network (CVPN) is a neural network that calculates
    the counterfactuals for each state belief in the game. This is key to evaluating
    the different variants of the game at any given time.


    Growing tree CFR (GT-CFR) is a variation of CFR that is optimized for game-trees
    trees that grow over time. GT-CFR is based on two fundamental phases, which is
    discussed in more detail here:


    https://medium.com/syncedreview/deepminds-pog-excels-in-perfect-and-imperfect-information-games-advancing-research-on-general-9dbad5c04221


    ## OPENAI


    OpenAI is an AI research company that has made significant contributions to AI,
    including DALL-E and ChatGPT, and its home page is here: https://openai.com/api/


    OpenAI was founded in San Francisco by Elon Musk and Sam Altman (and others),
    and one of its stated goals is to develop AI that benefits humanity. Given Microsoft’s
    massive investments in and deep alliance with the organization, OpenAI might be
    viewed as an arm of Microsoft. OpenAI is the creator of the GPT-x series of LLMs
    as well as ChatGPT that was made available on November 11, 2022.


    OpenAI made GPT-3 commercially available via API for use across applications,
    charging on a per-word basis. GPT-3 was announced in July 2020 and was available
    through a beta program. In November 2021 OpenAI made GPT-3 open to everyone, and
    more details are accessible here:'
  mdcn: '## 医疗保健：


    药物发现与设计：生成式AI可用于通过生成具有所需特性的分子结构来识别潜在的候选药物。这加速了药物发现过程，从而更快地开发出疾病治疗方法。


    医学影像分析：生成模型可以帮助从医学影像（如MRI扫描或X光片）中检测和诊断医疗状况。这有助于医疗专业人员做出更准确的诊断并改善患者护理。


    个性化医疗：生成式AI可以分析患者数据，提供个性化的治疗计划和建议。通过考虑个体的遗传变异和健康史，生成式AI能够实现更精确、更有效的医疗保健。


    ## 气候与环境：


    气候建模与预测：生成式AI模型可以分析大量气候数据，以预测和模拟复杂的气候模式。这有助于理解气候变化、极端天气事件，并制定缓解策略。


    可持续资源管理：生成式AI可以通过生成高效的分配计划来优化自然资源（如水或能源）的使用。这有助于减少浪费、提高可持续性并保护环境。


    生物多样性保护：生成模型可以帮助识别和分类动植物物种，支持生物多样性保护工作。它们还可以生成栖息地恢复计划，以促进生态平衡。


    ## 创意产业：


    内容生成：生成式AI可以以非凡的创造力和原创性创作文本、图像甚至音乐。这项技术可以帮助作家、艺术家、音乐家和内容创作者制作独特且引人入胜的内容。


    艺术与设计：生成式AI模型可以生成具有美感的艺术作品、设计或建筑概念。它们可以激发人类创作者的灵感，并引领创新的艺术风格和潮流。


    视频与游戏开发：生成式AI可用于创建逼真的动画、生成游戏环境或开发非玩家角色，从而增强游戏玩家的沉浸式体验。


    ## 教育：


    个性化学习：生成式AI可以根据个别学生的需求调整教育内容，提供定制的课程、练习题和反馈。这种个性化方法提高了学习成果和参与度。


    语言学习：生成模型可以通过生成互动和情境化的语言学习材料来促进语言习得。它们可以为学生提供量身定制的练习、对话和反馈。


    虚拟辅导：生成式AI可以驱动虚拟导师，为学生提供个性化的指导和解释，补充传统教学方法。


    ## 金融与经济：


    欺诈检测与预防：生成式AI模型可以分析金融数据中的模式，以检测欺诈活动，如信用卡欺诈或洗钱。这有助于保护个人和组织免受财务损失。


    投资策略：生成式AI可以生成洞察并识别金融市场的模式，辅助投资决策。它可以分析大量数据以预测市场趋势并优化投资组合。


    风险评估与管理：生成模型可以通过生成概率场景并提供风险缓解策略来评估和管理金融风险，如信用风险或市场风险。


    ## 交通与物流：


    自动驾驶汽车：生成式AI可以增强自动驾驶汽车的感知和决策能力，提高其识别物体、预测轨迹和做出安全驾驶决策的能力。


    路线优化：生成模型可以为物流公司和运输公司优化配送路线，减少行驶距离、燃料消耗和配送时间。


    交通流优化：生成式AI可以分析交通模式并提出改进建议，以减少拥堵并优化城市地区的交通流。


    语言翻译与保护：生成模型可以促进跨语言交流，并帮助保护濒危语言，促进文化交流与理解。


    社会公益项目：生成式AI可用于解决社会问题，例如为人道主义事业生成宣传活动，或为社会服务提供个性化建议。


    ## 潜在影响：


    生成式AI的实际应用案例有可能带来重大的积极变化。它们可以增强人类创造力、改善决策、提高效率，并解决各个领域的复杂问题。生成式AI可以推动创新、促进经济增长，并提高全球人民的整体生活质量。


    在开发和部署生成式AI时，谨慎行事并考虑伦理因素非常重要。解决偏见、确保隐私和安全以及建立治理框架对于减轻潜在风险并确保生成式AI的益处广泛可及且有益于社会至关重要。


    ## DEEPMIND


    DeepMind对AI做出了重大贡献，包括创建了各种AI系统。DeepMind成立于2010年，于2014年成为谷歌的子公司，其主页在这里：https://deepmind.com/


    DeepMind创建了280GB的语言模型Gopher，其性能显著优于竞争对手，包括GPT-3、J1-Jumbo和MT-NLG。DeepMind还开发了AlphaFold，该模型在三十分钟内解决了一个蛋白质折叠任务，而这个问题曾困扰研究人员十年之久。此外，DeepMind于2021年7月免费向所有人开放了AlphaFold。DeepMind在开发世界级AI游戏系统方面做出了重大贡献，其中一些将在下一节讨论。


    ## DeepMind与游戏


    DeepMind是AI系统StarCraft和AlphaGo背后的驱动力，这些系统在围棋（比国际象棋难得多）中击败了最优秀的人类玩家。这些游戏提供“完全信息”，而具有“不完全信息”的游戏（如扑克）则对机器学习模型构成了挑战。


    AlphaGo Zero（AlphaGo的后续版本）通过自我对弈，在更短的时间内、使用更少的计算能力掌握了这款游戏。AlphaGo Zero以100-0击败AlphaGo，展现了非凡的性能。另一个强大的系统是AlphaZero，它同样使用自我对弈技术学会了下围棋、国际象棋和将棋，并取得了最先进的性能结果。


    相比之下，使用树搜索的机器学习模型非常适合具有完全信息的游戏。相反，具有不完全信息的游戏（如扑克）涉及隐藏信息，这些信息可以被利用来制定反制策略以对抗对手的策略。特别是，AlphaStar能够与《星际争霸II》的最佳玩家对战，并成为第一个在需要“在不完全信息世界中具备战略能力”的游戏中取得最先进成果的AI。


    ## 游戏玩家（PoG）


    谷歌的DeepMind团队设计了通用的PoG（游戏玩家）算法，该算法基于以下技术：


    -   CFR（反事实遗憾最小化）

    -   CVPN（反事实价值与策略网络）

    -   GT-CFT（增长树CFR）

    -   CVPN


    反事实价值与策略网络（CVPN）是一种神经网络，用于计算游戏中每个状态信念的反事实值。这是在任何给定时间评估游戏不同变体的关键。


    增长树CFR（GT-CFR）是CFR的一种变体，针对随时间增长的游戏树进行了优化。GT-CFR基于两个基本阶段，此处有更详细的讨论：


    https://medium.com/syncedreview/deepminds-pog-excels-in-perfect-and-imperfect-information-games-advancing-research-on-general-9dbad5c04221


    ## OPENAI


    OpenAI是一家AI研究公司，对AI做出了重大贡献，包括DALL-E和ChatGPT，其主页在这里：https://openai.com/api/


    OpenAI由埃隆·马斯克和萨姆·奥特曼（等人）在旧金山创立，其宣称的目标之一是开发有益于人类的AI。鉴于微软对该组织的巨额投资和深度联盟，OpenAI可能被视为微软的一个分支。OpenAI是GPT-x系列大型语言模型以及ChatGPT的创造者，后者于2022年11月11日发布。


    OpenAI通过API将GPT-3商业化，供各种应用程序使用，并按单词收费。GPT-3于2020年7月宣布，并通过Beta计划提供。2021年11月，OpenAI向所有人开放了GPT-3，更多详情可在此处访问：'
