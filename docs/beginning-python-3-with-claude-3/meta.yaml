    The preceding code snippet prints three letters on three separate lines. Users
    can force the output to be displayed on the same line (which will “wrap” if they
    specify a large enough number of characters) by appending a comma “,” in the print
    statement, as shown here:


    ```

    >>> x = [''a'', ''b'', ''c'']

    >>> for w in x:

    ...     print(w, end='' '')

    ...

    a b c

    ```


    One can use this type of code when they want to display the contents of a text
    file in a single line instead of multiple lines.


    Python also provides the built-in `reversed()` function that reverses the direction
    of the loop, as shown here:


    ```

    >>> a = [1, 2, 3, 4, 5]

    >>> for x in reversed(a):

    ...     print(x)

    5

    4

    3

    2

    1

    ```


    Note that reversed iteration only works if the size of the current object can
    be determined or if the object implements a `__reversed__()` “magic” method.


