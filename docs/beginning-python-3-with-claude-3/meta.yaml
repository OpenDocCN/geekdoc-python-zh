  md: '# Emergent Abilities of LLMs


    Emergent abilities of LLMs refers to abilities that are present in larger models
    that do not exist in smaller models. In simplified terms, as models increase in
    size, there is a discontinuous “jump” whereby emergent abilities manifest themselves
    in a larger model with no apparent or clear-cut reason.


    The interesting aspect of emergent abilities is the possibility of expanding capabilities
    of language models through additional scaling. More detailed information is accessible
    in the paper titled “Emergent Abilities of Large Language Models” that can be
    found here: https://arxiv.org/abs/2206.07682


    According to Nobel prize-winning physicist Philip Anderson, he stated in his 1972
    essay called “More Is Different”: “Emergence is when quantitative changes in a
    system result in qualitative changes in behavior.” (http://www.lanais.famaf.unc.edu.ar/cursos/em/Anderson-MoreDifferent-1972.pdf)


    Interestingly, the preceding authors describe a scenario in which few-shot prompting
    is considered emergent (quoted from their arxiv paper):


    > “The ability to perform a task via few-shot prompt-ing is emergent when a model
    has random performance until a certain scale, after which performance increases
    to well-above random.”


    Be sure to examine table 1 in the preceding paper provides details regarding “Few-shot
    prompting abilities” (e.g., truthfulness, MMLU benchmark) as well as “Augmented
    prompting abilities” (e.g., chain of thought and instruction following).


    Note that emergent abilities *cannot* be predicted by extrapolation of the behavior
    of smaller models because (by definition) emergent abilities are not present in
    smaller models. No doubt there will be more research that explores the extent
    to which further model scaling can lead to more emergent abilities in LLMs.


