    \n## 大语言模型的涌现能力\n\n大语言模型的涌现能力指的是存在于较大模型中而较小模型所不具备的能力。简而言之，随着模型规模的增加，会出现不连续的“跃迁”，使得涌现能力在较大的模型中显现，而没有明显或清晰的原因。\n\
    \n涌现能力的有趣之处在于，通过额外的扩展，有可能扩展语言模型的能力。更详细的信息可在题为《大语言模型的涌现能力》的论文中找到，链接如下：https://arxiv.org/abs/2206.07682\n\
