    # NUMPY AND THE “NORM” OF VECTORS


    The “norm” of a vector (or an array of numbers) is the length of a vector, which
    is the square root of the dot product of a vector with itself. NumPy also provides
    the “sum” and “square” functions that can be used to calculate the norm of a vector.


    Listing 4.15 displays the contents of `array_norm.py` that illustrates how to
    calculate the magnitude (“norm”) of a NumPy array of numbers.


