  md: '# CHAPTER 2


    # CONDITIONAL LOGIC, LOOPS, AND FUNCTIONS


    This chapter introduces readers to various ways to perform conditional logic in
    Python, as well as control structures and user-defined functions in Python. Virtually
    every Python program that performs useful calculations requires some type of conditional
    logic or control structure (or both). Although the syntax for these Python features
    is slightly different from other languages, the functionality will be familiar.


    The first part of this chapter contains code samples that illustrate how to handle
    if-else conditional logic in Python, as well as if-elsif-else statements. The
    second part of this chapter discusses loops and while statements in Python. This
    section contains an assortment of examples (comparing strings, computing numbers
    raised to different exponents, and so forth) that illustrate various ways that
    one can use loops and while statements in Python.


    The third part of this chapter contains examples that involve nested loops and
    recursion. The final part of this chapter introduces readers to user-defined Python
    functions.


    # PRECEDENCE OF OPERATORS IN PYTHON


    When one has an expression involving numbers, they might remember that multiplication
    (“*”) and division (“/”) have higher precedence than addition (“+”) or subtraction
    (“-”). Exponentiation has even higher precedence than these four arithmetic operators.


    Instead of relying on precedence rules, it’s simpler (as well as safer) to use
    parentheses. For example, (x/y)+10 is clearer than x/y+10, even though they are
    equivalent expressions.'
