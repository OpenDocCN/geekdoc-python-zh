  md: "# PYTHON IDENTIFIERS\n\nA Python identifier is the name of a variable, function,\
    \ class, module, or other Python object, and a valid identifier conforms to the\
    \ following rules:\n\n+   - It starts with a letter A to Z or a to z or an underscore\
    \ (_).\n- It contains zero or more letters, underscores, and digits (0 to 9).\n\
    \n**Note:** Python identifiers cannot contain characters such as @, $, and %.\n\
    \nPython is a case-sensitive language, so `Abc` and `abc` are different identifiers\
    \ in Python.\n\nIn addition, Python has the following naming convention:\n\n+\
    \   - Class names start with an uppercase letter and all other identifiers with\
    \ a lowercase letter\n- An initial underscore is used for private identifiers.\n\
    - Two initial underscores are used for strongly private identifiers.\n\nA Python\
    \ identifier with two initial underscore and two trailing underscore characters\
    \ indicates a language-defined special name.\n\n# LINES, INDENTATION, AND MULTILINES\n\
    \nUnlike other programming languages (such as Java or Objective-C), Python uses\
    \ indentation instead of curly braces for code blocks. Indentation must be consistent\
    \ in a code block, as shown here:\n\n```\nif True:\n    print(\"ABC\")\n    print(\"\
    DEF\")\nelse:\n    print(\"ABC\")\n    print(\"DEF\")\n```\n\nMulti-line statements\
    \ in Python can terminate with a new line or the backslash (\"\") character, as\
    \ shown here:\n\n```\ntotal = x1 + \\n        x2 + \\n        x3\n```\n\nObviously\
    \ one can place x1, x2, and x3 on the same line, so there is no reason to use\
    \ three separate lines; however, this functionality is available in case one needs\
    \ to add a set of variables that do not fit on a single line.\n\nOne can specify\
    \ multiple statements in one line by using a semicolon (\";\") to separate each\
    \ statement, as shown here:\n\n```\na=10; b=5; print(a); print(a+b)\n```"
