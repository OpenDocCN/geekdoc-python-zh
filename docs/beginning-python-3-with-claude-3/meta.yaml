    \n## ChatGPT-3 和 GPT-4 是生成式人工智能的一部分吗？\n\nChatGPT-3 和 GPT-4 都是大型语言模型，被认为是生成式人工智能的例子。它们属于一类被称为“Transformer”的模型，特别擅长处理数据序列，例如与文本相关的任务。\n\
