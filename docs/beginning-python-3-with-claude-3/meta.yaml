    \n```\nlst = [1,2,3,4]\n\nwhile lst:\n    print('list:',lst)\n    print('item:',lst.pop())\n\
    ```\n\n前面的 while 循环在 `lst` 变量为空时终止，无需显式测试空列表。前面代码的输出如下：\n\n```\nlist: [1, 2, 3,\
    \ 4]\nitem: 4\nlist: [1, 2, 3]\nitem: 3\nlist: [1, 2]\nitem: 2\nlist: [1]\nitem:\
    \ 1\n```\n\n至此，使用 `split()` 函数处理文本字符串中的单词和字符的示例就结束了。本章的下一部分将展示在 Python 代码中使用条件逻辑的示例。\n\
    \n## PYTHON 中的条件逻辑\n\n任何在其他编程语言中编写过代码的人，无疑都见过 `if/then/else`（或 `if-elseif-else`）条件语句。虽然语法因语言而异，但逻辑本质上是相同的。以下示例展示了如何在\
    \ Python 中使用 `if/elif` 语句：\n\n```\n>>> x = 25\n>>> if x < 0:\n...     print('negative')\n\
    ... elif x < 25:\n...     print('under 25')\n... elif x == 25:\n...     print('exactly\
    \ 25')\n... else:\n...     print('over 25')\n...\nexactly 25\n```\n\n前面的代码块说明了如何使用多个条件语句，输出完全符合预期。\n\
    \n## BREAK/CONTINUE/PASS 语句\n\nPython 中的 `break` 语句允许用户从循环中“提前退出”，而 `continue`\
    \ 语句本质上是返回到循环顶部并继续处理循环变量的下一个值。`pass` 语句本质上是一个“什么都不做”的语句。\n清单 2.9 展示了 `break_continue_pass.py`\
    \ 的内容，说明了这三个语句的用法。\n\n### 清单 2.9: break_continue_pass.py\n\n```\nprint('first\
    \ loop')\nfor x in range(1,4):\n    if(x == 2):\n        break\n    print(x)\n\
    \nprint('second loop')\nfor x in range(1,4):\n    if(x == 2):\n        continue\n\
    \    print(x)\n\nprint('third loop')\nfor x in range(1,4):\n    if(x == 2):\n\
    \        pass\n    print(x)\n```\n\n清单 2.9 的输出如下：\n\n```\nfirst loop\n1\nsecond\
    \ loop\n1\n3\nthird loop\n1\n2\n3\n```\n\n## 比较和布尔运算符\n\nPython 支持多种布尔运算符，例如 `in`、`not\
    \ in`、`is`、`is not`、`and`、`or` 和 `not`。接下来的几个小节将讨论这些运算符，并提供一些使用示例。\n\n### in/not\
    \ in/is/is not 比较运算符\n\n`in` 和 `not in` 运算符用于序列，以检查某个值是否出现在序列中或未出现在序列中。`is` 和\
    \ `is not` 运算符用于确定两个对象是否是同一个对象，这对于可变对象（如列表）很重要。所有比较运算符具有相同的优先级，低于所有数值运算符。比较也可以链式进行。例如，`a\
    \ < b == c` 测试 a 是否小于 b，并且 b 等于 c。\n\n### and、or 和 not 布尔运算符\n\n布尔运算符 `and`、`or`\
    \ 和 `not` 的优先级低于比较运算符。布尔 `and` 和 `or` 是二元运算符，而布尔 `not` 运算符是一元运算符。以下是一些示例：\n\n\
    - `A and B` 只有在 A 和 B 都为真时才为真\n- `A or B` 在 A 或 B 为真时为真\n- `not (A)` 当且仅当 A 为假时为真\n\
    \n也可以将比较或其他布尔表达式的结果赋值给变量，如下所示：\n\n```\n>>> string1, string2, string3 = '', 'b',\
