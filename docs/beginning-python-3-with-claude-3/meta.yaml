  md: '# CHAPTER 4


    # INTRODUCTION TO NUMPY AND PANDAS


    Approximately 50% of this chapter starts with a quick introduction to the Python
    NumPy package, followed by a quick introduction to Pandas and some of its useful
    features. The Pandas package for Python provides a rich and powerful set of APIs
    for managing datasets. These APIs are very useful for machine learning and deep
    learning tasks that involve dynamically “slicing and dicing” subsets of datasets.


    The first section contains examples of working arrays in NumPy, and contrasts
    some of the APIs for lists with the same APIs for arrays. In addition, you will
    see how easy it is to compute the exponent-related values (square, cube, and so
    forth) of elements in an array.


    The second section introduces subranges, which are very useful (and frequently
    used) for extracting portions of datasets in machine learning tasks. In particular,
    readers will see code samples that handle negative (-1) subranges for vectors
    as well as for arrays, because they are interpreted one way for vectors and a
    different way for arrays.


    The third section (“Other Useful NumPy Methods”) of this chapter delves into other
    NumPy methods, including the reshape() method, which is extremely useful (and
    very common) when working with images files: some TensorFlow APIs require converting
    a 2D array of (R, G, B) values into a corresponding one-dimensional vector.


    The fourth section of this chapter briefly describes Pandas and some of its useful
    features. This section contains code samples that illustrate some nice features
    of DataFrames and a brief discussion of series, which are two of the main features
    of Pandas. Note that Pandas material is discussed after the NumPy material, which
    includes a discussion various types of DataFrames that one can create, such as
    numeric and Boolean DataFrames. In addition, readers will see examples of creating
    DataFrames with NumPy functions and random numbers.'
