  md: "# SCOPE OF VARIABLES\n\nThe accessibility or scope of a variable depends on\
    \ where that variable has been defined. Python provides two scopes: global and\
    \ local, with the added “twist” that global is actually module-level scope (i.e.,\
    \ the current file), and therefore one can have a variable with the same name\
    \ in different files and they will be treated differently.\n\nLocal variables\
    \ are straightforward: they are defined inside a function, and they can only be\
    \ accessed inside the function where they are defined. Any variables that are\
    \ not local variables have global scope, which means that those variables are\
    \ “global” *only* with respect to the file where it has been defined, and they\
    \ can be accessed anywhere in a file.\n\nThere are two scenarios to consider regarding\
    \ variables. First, suppose two files (aka modules) `file1.py` and `file2.py`\
    \ have a variable called x, and `file1.py` also imports `file2.py`. The question\
    \ now is how to disambiguate between the x in the two different modules. As an\
    \ example, suppose that `file2.py` contains the following two lines of code:\n\
    \n```\nx = 3\nprint('unscoped x in file2:',x)\n```\n\nSuppose that `file1.py`\
    \ contains the following code:\n\n```\nimport file2 as file2\n\nx = 5\nprint('unscoped\
    \ x in file1:',x)\nprint('scoped x from file2:',file2.x)\n```\n\nLaunch `file1.py`\
    \ from the command line and the following output will appear:\n\n```\nunscoped\
    \ x in file2: 3\nunscoped x in file1: 5\nscoped x from file2: 3\n```\n\nThe second\
    \ scenario involves a program contains a local variable and a global variable\
    \ with the same name. According to the earlier rule, the local variable is used\
    \ in the function where it is defined, and the global variable is used outside\
    \ of that function.\n\nThe following code block illustrates the use of a global\
    \ and local variable with the same name:\n\n```\n#!/usr/bin/python\n# a global\
    \ variable:\ntotal = 0;\n\ndef sum(x1, x2):\n    # this total is local:\n    total\
    \ = x1+x2;\n```"
