  md: '# WORKING WITH FRACTIONS


    Python supports the `Fraction()` function (which is defined in the `fractions`
    module) that accepts two integers that represent the numerator and the denominator
    (which must be nonzero) of a fraction. Several example of defining and manipulating
    fractions in Python are shown here:


    ```

    >>> from fractions import Fraction

    >>> a = Fraction(5, 4)

    >>> b = Fraction(7, 16)

    >>> print(a + b)

    27/16

    >>> print(a * b) 35/64

    >>> # Getting numerator/denominator

    >>> c = a * b

    >>> c.numerator

    35

    >>> c.denominator 64

    >>> # Converting to a float >>> float(c)

    0.546875

    >>> # Limiting the denominator of a value

    >>> print(c.limit_denominator(8))

    4

    >>> # Converting a float to a fraction >>> x = 3.75

    >>> y = Fraction(*x.as_integer_ratio())

    >>> y

    Fraction(15, 4)

    ```


    Before delving into Python code samples that work with strings, the next section
    briefly discusses Unicode and UTF-8, both of which are character encodings.


    # UNICODE AND UTF-8


    A Unicode string consists of a sequence of numbers that are between 0 and 0x10ffff,
    where each number represents a group of bytes. An encoding is the manner in which
    a Unicode string is translated into a sequence of bytes. Among the various encodings,
    UTF-8 (“Unicode transformation format”) is perhaps the most common, and it’s also
    the default encoding for many systems. The digit 8 in UTF-8 indicates that the
    encoding uses 8-bit numbers, whereas UTF-16 uses 16-bit numbers (but this encoding
    is less common).


    The ASCII character set is a subset of UTF-8, so a valid ASCII string can be read
    as a UTF-8 string without any re-encoding required. In addition, a Unicode string
    can be converted into a UTF-8 string.'
