    ## Chapter 1. Introduction to Robust Python


    > **A NOTE FOR EARLY RELEASE READERS**


    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    This will be the 1st chapter of the final book. Please note that the GitHub repo
    will be made active later on.


    If you have comments about how we might improve the content and/or examples in
    this book, or if you notice missing material within this chapter, please reach
    out to the author at *pat@kudzera.com*.


    This book is all about making your Python better. To help you manage your codebase,
    no matter how large it is. To provide a toolbox of tips, tricks and strategies
    to build maintainable code. This book will guide you towards less bugs and happier
    developers. You’ll be taking a hard look at how you write code, and learn the
    implications of your decisions. When discussing how code is written, I am reminded
    of these wise words from C.A.R. Hoare:


    > *There are two ways of constructing a software design: One way is to make it
    so simple that there are obviously no deficiencies, and the other way is to make
    it so complicated that there are no obvious deficiencies. The first method is
    far more difficult.*¹


    This book is about developing systems the first way. It will be more difficult,
    yes, but have no fear. I will be your guide on your journey to leveling up your
    Python game such that, as C.A.R. Hoare says above, *there are obviously no deficiencies*
    in your code. Ultimately, this is a book all about writing *robust* Python.


    In this chapter I’m going to cover what *robustness* means and why you should
    care about it. I’ll go through how your communication method implies certain benefits
    and drawbacks, and how best to represent your intentions. The Zen of Python states
    that *there should be one-- and preferably only one — obvious way to do it*. You’ll
    learn how to evaluate if your code is the obvious way or not, and what you can
    do to fix it. First, I need to talk basics. What is *robustness* in the first
    place?


    ## Robustness


    ### What Does “Robust” Mean?


    Every book needs at least one dictionary definition, so I’ll get this out of the
    way nice and early in the book. Merriam-Webster offers many definitions for *robustness*
    ²:


    1. having or exhibiting strength or vigorous health

    2. having or showing vigor, strength, or firmness

    3. strongly formed or constructed

    4. capable of performing without failure under a wide range of conditions


    These are fantastic descriptions of what we are aiming for. We want a *healthy*
    system, one that stays bug-free for years. We want our software to *exhibit strength*;
    it should be obvious that this code will stand the test of time. We want a *strongly
    constructed* system, one that is built upon solid foundations. Crucially, we want
    a system that is *capable of performing without failure*; we don’t want the system
    to be fragile or brittle as conditions change.


    It is common to think of a software like a skyscraper, some grand structure that
    stands as a bulwark against all change and a paragon of immortality. The truth
    is, unfortunately messier. Software systems constantly evolve. Bugs are fixed,
    user interfaces get tweaked, features are added, removed, and then re-added. Frameworks
    shift, components go out of date, security bugs arise. Software changes. It is
    more akin to handling sprawl with city planning than it is building a static building.
    With ever changing codebases, how can you make your code robust? How can you build
    a strong foundation that is resilient to bugs?


    The truth is, you have to accept the change. Your code will be split apart, stitched
    together and reworked. New use cases will alter huge swaths of code. And that’s
    okay. Embrace it. Understand that it’s not enough that your code can easily be
    changed; it might be best for it to be deleted and rewritten as it goes out of
    date. That doesn’t diminish its value; it will still have a long life in primetime.
    Your job is to make it easy to rewrite parts of the system. Once you start to
    accept the ephemeral nature of your code, you start to realize that it’s not enough
    to write bug-free code for the present; you need to enable the codebase’s future
    owners to be able to change your code with confidence. That is what this book
    is about.


    You are going to learn to build strong systems. This strength doesn’t come from
    rigidity, like a bar of iron. It instead comes from flexibility. Your code needs
    to be strong like a tall willow tree, swaying in the wind, flexing, but not breaking.
    Your software will need to handle situations you would never dream of. Your codebase
    needs to be able to adapt to new circumstances, and it won’t always be you maintaining
    it. Those future maintainers need to know they are working in a healthy codebase.
    Your codebase needs to communicate it’s strength. You must write Python code in
    a way that reduces failure, even as future maintainers tear it apart and reconstruct
    it.


    Writing robust code means deliberately thinking about the future. You want future
    maintainers to look at your code and understand your intentions easily, not curse
    your name during late night debugging sessions. You must convey your thoughts,
    your reasoning, and cautions. Future Developers need to bend your code into new
    shapes, and do it without worrying that each change knocks over a teetering house
    of cards.


    Put simply, you don’t want your systems to fail, especially when the unexpected
    happens. Testing and quality assurance are huge parts of this, but neither of
    those bake quality completely in. They are more suited to illuminating gaps in
    expectations and offering a safety net. Instead, you must make your software stand
    the test of time. In order to do that, you must write *clean and maintainable*
    code.


    Clean code expresses its intent clearly and concisely, in that order. When you
    look at a line of code and say to yourself “ah, that makes complete sense”, that’s
    an indicator of clean code. The more you have to step through a debugger, the'
