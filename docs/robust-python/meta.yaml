  md: 'This feels, well, tedious. Because any value can be `None` in Python, it seems
    like you need to engage in defensive programming and do an `is None` check before
    every dereference. This is overkill; most developers will trace through the call
    stack and ensure that no `None` values are returned to the caller. That leaves
    calls to external systems and maybe a scant few calls in your codebase that you
    always have to wrap with `None` checking. This is error-prone; you cannot expect
    every developer to ever touch your codebase to know instinctively where to check
    for `None`. Furthermore, the original assumptions you’ve made when writing (e.g.
    this function will never return `None`) can be broken in the future, and now your
    code has a bug. And herein lies your problem: counting on manual intervention
    to catch error cases is unreliable.


    > ## EXCEPTIONS


    A valiant attempt at solving the billion-dollar problem is exceptions. Anytime
    something goes wrong in your system, throw an exception! When an exception is
    thrown, that function stops executing and the exception gets passed up the call
    chain, until either a) some code catches it in an appropriate `except` block,
    or b) nobody catches it and it terminates the program. This will not help your
    robustness problems. You still rely on manual intervention to catch errors (by
    someone writing an appropriate `except` block). If that manual intervention isn’t
    applied, the program crashes and the user will have a bad time.


    This should not come as a surprise; dereferencing `None` values throws an exception,
    so it’s the exact same behavior. In order to be able to detect exceptions through
    static analysis, you typically need support in the language for checked exceptions:
    exceptions that are part of your type signature that tell your static analysis
    tools what exceptions to expect. Python does not support any sort of checked exception
    at the time of this writing and I am doubtful it ever will, due to the verbosity
    and viral nature of checked exceptions.


    The reason this is so tricky (and so costly) is that `None` is treated as a special
    case. It exists outside the normal type hierarchy. Every variable can be assigned
    to `None`. In order to combat this, you need to find a way of representing `None`'
