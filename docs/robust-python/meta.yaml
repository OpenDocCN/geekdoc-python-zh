    \ `is None` 检查。这是过度的；大多数开发者会跟踪调用栈，并确保没有 `None` 值返回给调用者。这就留下了对外部系统的调用，以及您代码库中可能少数几个您总是需要用\
    \ `None` 检查包装的调用。这很容易出错；您不能期望每个接触您代码库的开发者都本能地知道在哪里检查 `None`。此外，您在编写时做出的原始假设（例如，这个函数永远不会返回\
