    \ bool\n\n@dataclass\nclass Snack:\n    name: Literal[\"Pretzel\", \"Hotdog\"\
    ]\n    condiments: Set[Literal[\"Mustard\", \"Ketchup\"]]\n```\n\nNow, if I try\
