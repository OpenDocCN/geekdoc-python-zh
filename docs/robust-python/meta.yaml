    \ if it were something like this:\n\n```\ndef adjust_recipe(recipe, servings):\n\
    \    old_servings = recipe.pop(0)\n    factor = servings / old_servings\n    return\
    \ ({\"servings\": servings} |\n            {ingredient: (amount*factor, unit)}\n\
    \            for ingredient, amount, unit in recipe)\n```\n\nThose who favor clean\
    \ code probably prefer the second version (I certainly do). No raw loops. Variables\
    \ do not mutate. I’m returning a dictionary instead of a list of tuples. All these\
    \ changes can be seen as positive, depending on the circumstances. But I may have\
    \ just introduced three subtle bugs.\n\n1. In the first example, I was clearing\
    \ the original recipe out. Even if it’s just one area of calling code that is\
    \ relying on this behavior, I broke assumptions.\n2. By returning a dictionary,\
    \ I have removed the ability to have duplicate ingredients in a list. This might\
    \ have an effect on recipes that have multiple parts (such as a main dish and\
    \ a sauce) that both use the same ingredient.\n3. If any of the ingredients are\
    \ named “servings” you’ve just introduced a collision with naming.\n\nWhether\
    \ these are bugs or not depends on two inter-related things: the author’s intent\
    \ and calling code. The author intended to solve a problem, but I am unsure of\
    \ why they wrote the code the way they did. Why are they popping elements? Why\
    \ is servings a tuple inside the list? Why is a list used? Presumably, the author\
    \ knew why, and communicated it locally to their peers. Their peers wrote calling\
    \ code based on those assumptions, but as time wore on, that intent became lost.\
    \ Without communication to the future, I am left with two options of maintaining\
    \ this code:\n\n1. Look at all calling code and confirm that this behavior is\
    \ not relied upon before implementing. Good luck if this is a public API for a\
    \ library with external callers. I spend a lot of time doing this, which frustrates\
    \ me.\n2. Make the change and wait to see what the fallout is (customer complaints,\
    \ broken tests, etc.). If I’m lucky, nothing bad will happen. If I’m not, I spend\
    \ a lot of time, which frustrates me.\n\nNeither option feels good in a maintenance\
    \ setting (especially if I have to modify this code). I don’t want to waste time;\
    \ I want to deal with my current task quickly and move on to the next one. It\
    \ gets worse if I consider how to call this code. Think about how you interact\
    \ with previously unseen code. You might see other examples of calling code, copy\
    \ them to fit your use case, and never realize that you needed to pass a specific\
    \ string called servings as your first element of"
  mdcn: "你越是需要查看大量其他代码才能弄清楚发生了什么，越是需要停下来盯着代码看，代码就越不干净。如果巧妙的技巧会让其他开发者难以阅读代码，那么干净的代码就不会偏爱这种技巧。正如C.A.R.\
    \ Hoare之前所说，你不希望你的代码变得如此晦涩，以至于难以通过视觉检查来理解它。\n\n可维护的代码，顾名思义，就是易于维护的代码。维护工作从第一次提交后立即开始，一直持续到没有任何开发者再关注这个项目为止。开发者们会修复错误、添加功能、阅读代码、提取代码用于其他库等等。可维护的代码让这些任务变得顺畅无阻。软件的生命周期长达数年，甚至数十年，因此你需要*今天*就关注可维护性。\n\
    \n你不希望成为系统故障的原因，无论你是否正在积极开发它们。你需要主动采取措施，让你的系统经得起时间的考验。你需要一个测试策略作为你的安全网，但你也需要能够避免一开始就掉入陷阱。因此，考虑到所有这些，我从软件的角度提出我对健壮性的定义：\n\
    \n> 健壮的软件具有弹性且无差错，尽管它处于不断变化之中\n\n## 为什么健壮性很重要？\n\n为了让软件实现其预期功能，投入了大量的精力。开发里程碑难以预测。几乎每次你都在构建全新的东西，这无济于事。人为因素，如用户体验、可访问性和文档，只会增加复杂性。现在再加上测试，以确保你覆盖了已知和未知行为的一部分，你面对的就是漫长的开发周期。\n\
    \n软件的目的是提供价值。尽早交付全部价值符合利益相关者的利益。鉴于某些开发计划的不确定性，满足期望往往带来额外的压力。我们都曾经历过不切实际的时间表或截止日期带来的困境。不幸的是，许多使软件极其健壮的工具只会增加我们的开发周期。\n\
    \n这并不意味着健壮的代码不重要或“不值得”。确实，立即交付价值与使代码健壮之间存在内在的张力。如果你的软件“足够好”，为什么还要增加更多复杂性？要回答这个问题，请考虑这段软件将被迭代的频率。交付软件价值通常不是一个静态的过程；一个系统提供价值后就再也不修改的情况很少见。软件本质上是不断演进的。代码库需要准备好频繁且长期地交付价值。这就是健壮的软件工程实践发挥作用的地方。如果你不能在不损害质量的前提下快速、无痛地交付功能，你就需要重新评估技术，使你的代码更具可维护性。\n\
    \n如果你的系统延迟交付或出现故障，会产生实时成本。思考一下你的代码库。问问自己，如果一年后因为有人无法理解你的代码而导致代码崩溃，会发生什么？你会损失多少价值？你的价值可能以金钱、时间甚至生命来衡量。问问自己，如果价值没有按时交付会发生什么？后果是什么？如果这些问题的答案令人担忧，好消息是，你正在做的工作很有价值。但这也强调了消除未来错误的重要性。\n\
    \n你需要考虑未来的开发者。多个开发者同时在同一个代码库上工作。许多软件项目将比大多数开发者更长久。你需要找到一种方式与现在和未来的开发者沟通，而无需亲自在场解释。未来的开发者将基于*你的*决策进行构建。每一个错误的线索、每一个兔子洞、每一次为了琐事而进行的冒险都会拖慢他们的速度，从而阻碍价值的传递。你需要对后来者有同理心。你需要设身处地为他们着想。这本书是你思考协作者和维护者的入口。你需要编写持久的代码。编写持久代码的第一步是能够通过你的代码进行沟通。你需要确保未来的开发者理解你的意图。\n\
    \n## 你的意图是什么？\n\n为什么你应该努力编写干净的代码？为什么你应该如此关注健壮性？这些答案的核心在于沟通。你交付的不是静态系统；软件会随着时间演进和增长。维护者也会随时间变化。你编写代码的目标是交付价值，但也是以其他开发者能够同样快速交付价值的方式编写代码。为了做到这一点，你需要能够在从未见过未来维护者的情况下，传达推理和意图。\n\
    \n让我们看一个假设遗留系统中的代码块。我让你估算一下你理解这段代码在做什么需要多长时间。如果你不熟悉这里的所有概念，或者你觉得这段代码很复杂（它是故意这样设计的！），也没关系。\n\
    \n```\n# Take a meal recipe and change the number of servings\n# by adjusting\
    \ each ingredient\n# A recipe's first element is the number of servings, and the\
    \ remainder\n# of elements is (name, amount, unit), such as (\"flour\", 1.5, \"\
    cup\")\ndef adjust_recipe(recipe, servings):\n    new_recipe = [servings]\n  \
    \  old_servings = recipe[0]\n    factor = servings / old_servings\n    recipe.pop(0)\n\
    \    while recipe:\n        ingredient, amount, unit = recipe.pop(0)\n       \
    \ # please only use numbers that will be easily measurable\n        new_recipe.append((ingredient,\
    \ amount * factor, unit))\n    return new_recipe\n```\n\n这个函数接受一个食谱，并调整每种成分以处理新的份数。然而，这段代码引发了许多问题。\n\
    \n- `pop` 是干什么用的？\n- `recipe[0]` 表示什么？为什么那是旧的份数？\n- 为什么我需要为那些容易测量的数字添加注释？\n\n\
    这确实是一些有问题的Python代码。如果你觉得需要重写它，我不会怪你。如果它像下面这样，看起来会好很多：\n\n```\ndef adjust_recipe(recipe,\
    \ servings):\n    old_servings = recipe.pop(0)\n    factor = servings / old_servings\n\
    \    return ({\"servings\": servings} |\n            {ingredient: (amount*factor,\
    \ unit)}\n            for ingredient, amount, unit in recipe)\n```\n\n喜欢干净代码的人可能更喜欢第二个版本（我当然也是）。没有原始的循环。变量不会改变。我返回的是一个字典而不是元组列表。根据情况，所有这些变化都可以被视为积极的。但我可能刚刚引入了三个微妙的错误。\n\
    \n1. 在第一个例子中，我清空了原始食谱。即使只有一个调用代码依赖于这种行为，我也破坏了假设。\n2. 通过返回字典，我移除了在列表中拥有重复成分的能力。这可能会影响那些有多个部分（例如主菜和酱汁）且都使用相同成分的食谱。\n\
    3. 如果任何成分被命名为“servings”，你就引入了命名冲突。\n\n这些是否是错误取决于两个相互关联的因素：作者的意图和调用代码。作者打算解决一个问题，但我不确定他们为什么以这种方式编写代码。他们为什么要弹出元素？为什么份数是列表中的一个元组？为什么使用列表？大概作者知道原因，并在本地向他们的同行传达了这一点。他们的同行基于这些假设编写了调用代码，但随着时间的推移，这种意图变得模糊不清。没有与未来的沟通，我在维护这段代码时只剩下两个选择：\n\
    \n1. 查看所有调用代码，并在实施之前确认没有依赖这种行为。如果这是一个有外部调用者的公共API，祝你好运。我花了很多时间做这件事，这让我很沮丧。\n2.\
    \ 做出更改，然后等待看看会有什么后果（客户投诉、测试失败等）。如果我幸运的话，什么坏事都不会发生。如果我不幸运，我会花很多时间，这让我很沮丧。\n\n在维护环境中，这两种选择都不好（尤其是如果我必须修改这段代码）。我不想浪费时间；我想快速处理当前任务，然后继续下一个任务。如果我考虑如何调用这个代码，情况会更糟。想想你如何与以前未见过的代码交互。你可能会看到其他调用代码的例子，将它们复制以适应你的用例，却从未意识到你需要传递一个名为servings的特定字符串作为你的第一个元素。"
