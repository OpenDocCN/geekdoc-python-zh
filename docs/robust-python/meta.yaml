  md: 'These hex-strings display the actual memory of a Python object. You’ll find
    pointers to the next and previous object in a linked list (for garbage collection
    purposes), a reference count, a type, and the actual data itself. You can see
    the bytes at the end of each returned value to see the number or string (look
