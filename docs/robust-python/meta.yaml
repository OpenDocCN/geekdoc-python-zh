    \ `None` 如此糟糕。\n\n> **注意**\n\nC.A.R. Hoare 承认空引用是出于便利而诞生的，这一点尤其具有启发性。它向您展示了走捷径如何在开发周期的后期导致各种痛苦。想想您今天的短期决策将如何对明天的维护产生不利影响。\n\
