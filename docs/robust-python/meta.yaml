    Datetimes support addition and subtraction, but not of other datetimes. We only
    add time deltas (such as adding a day or subtracting a year). Multiplying and
    dividing really don’t make sense for a datetime. Similarly, rounding dates is
    not a supported operation in the standard library. However, datetimes do offer
    comparison and string formatting operations with similar semantics to an integer.
    So even though datetime is at heart an integer, it contains a constrained subset
    of operations.'
