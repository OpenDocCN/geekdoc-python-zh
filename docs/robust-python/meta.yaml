    Within half a second of saving my file, new errors have shown up in my “Problems”
    pane, telling me that I’ve just broken assumptions in calling code. I don’t have
    to wait to run a typechecker manually, or wait for a CI process to yell at me;
    my errors show up right in my editor. If that doesn’t lead me to finding errors
    earlier, I don’t know what will.


    ## Wrap-up


    There’s a wealth of options at your disposal, and you need to be comfortable with
    advanced configuration to get the most out of your tool. You can control severity
    options, reporting, or even use different typecheckers to reap benefits. As you
    evaluate tools and options, ask yourself how strict you want your typecheckers
    to be. As you increase the scope of errors that can be caught, you will increase
    the amount of time and effort needed to make your codebase compliant. However,
