    *Final*

    Use to prevent variables from being rebound to a new value.


    Let’s start with handling null references with `Optional` types.


    # Optional Type


    Null references is often referred to as the “billion dollar mistake”, coined by
    C.A.R. Hoare:


    > I call it my billion-dollar mistake. It was the invention of the null reference
    in 1965. At that time, I was designing the first comprehensive type system for
    references in an object oriented language. My goal was to ensure that all use
    of references should be absolutely safe, with checking performed automatically
    by the compiler. But I couldn’t resist the temptation to put in a null reference,
    simply because it was so easy to implement. This has led to innumerable errors,
    vulnerabilities, and system crashes, which have probably caused a billion dollars
    of pain and damage in the last forty years. ¹


    While null references started in Algol, they would pervade countless other languages.
    C and C++ are often derided for null pointer dereference (which produces a segmentation
    fault or other program-halting crash). Java was well-known for having to catch
    `NullPointerException` throughout your code. It’s not a stretch to say that these
    sorts of bugs have a price tag measured in the billions - think of the developer
    time, customer loss, and system failures due to accidental null pointers or references.


    So, why does this matter in Python? C.A.R Hoare’s quote is about object oriented
    compiled languages back in the 60s; Python must be better by now, right?. I regret
    to inform you that this billion-mistake is in Python as well. It appears to us
    under a different name: `None`. I will show you a way to avoid the'
