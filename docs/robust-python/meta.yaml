    adhere to the *Law of Least Surprise*. When someone reads through the codebase,
    they should almost never be surprised at behavior or implementation (and when
    they are surprised, there should be a great comment near the code to explain why
    it is that way). This is why communicating intent is paramount. Clear and clean
    code lowers chances for miscommunication.


    > **NOTE**


    The *Law Of Least Surprise*, also known as the *Law of Least Astonishment* states
    that a program should always respond to the user in the way that astonishes them
    the least⁴. Surprising behavior leads to confusion. Confusion leads to misplaced
    assumptions. Misplaced assumptions lead to bugs. And that is how you get unreliable
    software.


    Bear in mind, you can write completely correct code and still surprise someone
    in the future. There was one nasty bug I was chasing early in my career that crashed
    due to corrupted memory. Putting the code under a debugger or putting too many
    print statements in affected timing such that the bug would not manifest (a true
    “heisenbug⁵“). There were literally thousands of lines of code that related to
    this bug.


    So I had to do a manual bisect, splitting the code in half, see which half actually
    had the crash by removing the other half, and then do it all over again in that
    code half. After two weeks of tearing my hair out, I finally decided to inspect
    an innocuous sounding function called getEvent. It turns out that this function
    was actually *setting* an event with invalid data. Needless to say, I was very
    surprised.'
  - '[PAGE 24]


    The function was completely correct in what it was doing, but because I missed
    the intent of the code, I overlooked the bug for at least three days. Surprising
    your readers will cost their time.


    A lot of this surprise ends up coming from complexity. There are two types of
    complexity: *necessary complexity* and *accidental complexity*. Necessary complexity
    is the complexity inherent in your domain. Deep learning models are necessarily
    complex - they are not something you browse through the inner workings of and
    understand in a few minutes. Optimizing Object-Relational Mapping is necessarily
    complex - there is a large variety of possible user inputs that have to be accounted
    for. You won’t be able to remove necessary complexity, so your best bet is to
    make sure it doesn’t sprawl across your codebase.


    In contrast, accidental complexity is the complexity that produces superfluous,
    wasteful or confusing statements in code. It’s what happens when a system evolves
    over time and developers are jamming features in without re-evaluating old code
    to see if their original assertions hold true. I once worked on a project where
    adding a single command line option (and associated means of programmatically
    setting it) touched no fewer than 10 files. Why would adding one simple value
    ever need to require changes all over the codebase?


    You know you have accidental complexity if you’ve ever experienced the following:


    +   - Things that sound simple (adding users, changing a UI control, etc.) are
    non-trivial to implement

    - Difficulty onboarding new developers into understanding your codebase. New developers
    on a project are your best indicators of how maintainable your code is right now
    - no need to wait years.

    - Estimates for adding functionality are always high, and you slip the schedule
    anyway.


    Remove accidental complexity and isolate your necessary complexity wherever possible.
    Those will be the stumbling blocks for your future collaborators. These sources
    of complexity compound miscommunication, as they obscure and diffuse intent throughout
    the codebase.'
  - '[PAGE 25]


    > ### DISCUSSION TOPIC


    What accidental complexities do you have in your codebase? How challenging would
    it be to understand simple concepts if you were dropped into the codebase with
    no communication to other developers? What can you do to simplify those complexities
    (especially if they are in often-changing code)?


    Throughout the rest of the book, I will look at different techniques in Python
    to make our systems more robust. This book is broken up into 4 parts


    # *Part 1*


    I’ll start with types in Python. Types are fundamental to the language, but are
    not often delved into. The types you choose matter, as these convey a very specific
    intent. I’ll talk about type annotations and what specific annotations communicate
    to the developer. I’ll also go over typecheckers and how those help catch bugs
    early.


    # *Part 2*


    After talking about how to think about Python’s types, I’ll focus on how to create
    your own types. I’ll talk about enumerations, dataclasses and classes in depth.
    I’ll explore how making certain design choices in designing a type can increase
    or decrease the robustness of your code.


    # *Part 3*


    Now that you’ve learned how to communicate your intentions, I’ll focus on how
    to enable users to change your code effortlessly. You will learn how to take that
    strong foundation, and let others build with confidence. I’ll cover extensibility,
    dependencies, and architectural patterns that allow you to modify your system
    with minimal impact.


    # *Part 4*


    Lastly, I’ll explore about how to build a safety net, so that you can gently catch
    your future collaborators when they do fall. Their confidence will increase, knowing
    that they have a strong, robust system that they can fearlessly adapt to their
    use case. I’ll cover a variety of static analysis and testing tools that will
    help you catch rogue behavior.'
  - '[PAGE 26]


    # Wrap-up


    Robust code matters. Clean code matters. Your code needs to be maintainable for
    the entire lifetime of the codebase, and in order to do that, you need to put
    active foresight into what you are communicating and how. You need to clearly
    embody your knowledge as close to the code as possible. It will feel like a burden
    to continuously look forward, but with practice it becomes natural, and you start
    reaping the gains as you work in your own codebase.


    Every abstraction, every line, and every choice in a codebase communicates something,
    whether intentional or not. I encourage you to think about each line of code you
    are writing and ask yourself “What will a future developer learn from this?”.
    You owe it to future maintainers to be able to deliver value at the same speed
    that you can today. Otherwise, your codebase will get bloated, schedules will
    slip, and complexity will grow. It is your job as a developer to mitigate that
    risk.


    Look for potential hotspots, such as incorrect abstractions (such as collections
    or iteration) or accidental complexity. These are prime areas where communication
    can break down over time. If these are areas that change often, these are a priority
    to address now.


    In the next chapter, you’re going to take what you learned from this chapter,
    and apply it to a fundamental Python concept: types. The types you choose express
    your intent to future developers, and picking the correct type is just as important
    as picking the correct abstraction.


    +   1. 1980 Turing Award Lecture “The Emperor’s Old Clothes”

    2. https://www.merriam-webster.com/dictionary/robust

    3. Yak-Shaving describes the situation where you frequently have to solve unrelated
    problems before you can even begin to tackle the original problem to solve. You
    can learn about the origins of the term at https://seths.blog/2005/03/dont_shave_that/

    4. Geoffry James, The Tao of Programming

    5. A bug that displays different behavior when being observed. SIGSOFT ’83: Proceedings
    of the ACM SIGSOFT/SIGPLAN software engineering symposium on High-level debugging'
- md: "## Chapter 2. Introduction to Python Types\n\n> **A NOTE FOR EARLY RELEASE\
    \ READERS**\n\nWith Early Release ebooks, you get books in their earliest form—the\
    \ author’s raw and unedited content as they write—so you can take advantage of\
    \ these technologies long before the official release of these titles.\n\nThis\
    \ will be the 2nd chapter of the final book. Please note that the GitHub repo\
    \ will be made active later on.\n\nIf you have comments about how we might improve\
    \ the content and/or examples in this book, or if you notice missing material\
    \ within this chapter, please reach out to the author at *pat@kudzera.com*.\n\n\
    Welcome to Part 1, where I will focus on *types* in Python. Types model behavior\
    \ of your program. Beginner programmers understand that there are different types\
    \ in Python, such as *float* or *string*. But what is a type? How does mastering\
    \ types make your codebase stronger? Types are a fundamental underpinning of any\
    \ programming language, but, unfortunately, most introductory texts gloss over\
    \ just how types benefit your codebase (or if misused, those same types increase\
    \ complexity).\n\nTell me if you’ve seen this before:\n\n```\n>>>type(3.14)\n\
    <class 'float'>\n\n>>>type(\"This is another boring example\")\n<class 'str'>\n\
    \n>>> type([\"Even\", \"more\", \"boring\", \"examples\"])\n<class 'list'>\n```\n\
    \nThis could be pulled from almost any beginner’s guide to Python. You learn about\
    \ ints, strings, floats, bools, and all sorts of things the language offers. And\
    \ about ints, strings, floats, bools, and all sorts of things the language offers.\
    \ And then, boom, you move on, because let’s face it, this Python is not flashy.\
    \ You want to dive into the cool stuff, like functions and loops and dictionaries,\
    \ and I don’t blame you. But it’s a shame that many tutorials never revisit types\
    \ and give them their proper due. As users dig deeper, they may discover type\
    \ annotations (which I cover in the next chapter) or start writing classes, but\
    \ often miss out on the fundamental discussion about when to use types appropriately.\n\
    \nThat’s where I’ll start. To write maintainable Python, you must be aware of\
    \ the nature of types and be deliberate about using them. I’ll start by talking\
    \ about what a type actually is and why that matters. I’ll then move on to how\
    \ the Python language’s decisions about its type system affects the robustness\
    \ of your codebase.\n\n## What’s In a Type?\n\nI want you to pause and answer\
    \ a question: Without mentioning numbers, strings, text, or booleans, how would\
    \ you explain what a type is?\n\nIt’s not a simple answer for everyone. It’s even\
    \ harder to explain what the benefits are, especially in a language like Python\
    \ where you do not have to explicitly declare types of variables.\n\nI consider\
    \ a type to have a very simple definition: a communication method. Types convey\
    \ information. They provide a representation that users and computers can reason\
    \ about. I break the representation down into two different facets:\n\n*Mechanical\
    \ Representation*\n    Types communicate behaviors and constraints to the Python\
    \ language itself\n\n*Semantic Representation*\n    Types communicate behaviors\
    \ and constraints to other developers\n\nLet’s go learn a little more about each\
    \ representation:\n\n## Mechanical Representation\n\nAt its core, computers are\
    \ all about binary code. Your processor doesn’t speak Python, all it sees are\
    \ the presence or absence of electrical current on circuits going through it.\
    \ Same goes for what’s in your computer memory.\n\nSuppose your memory looked\
    \ like the following\n\n00110010100001001000010100100100010010001000001010100101\n\
    010101010000001111111100100101001111101001001010010001\n0010100`010100000100000101010100``101001001001000101010001010010\n\
    010101010010010010010000111101010110101101001010111`\n\nLooks like a bunch of\
    \ gibberish. Let’s zoom in on the part that I’ve bolded:\n\n*01010000 01000001\
    \ 01010100*\n\nThere is no way to tell exactly what this number means by itself.\
    \ Depending on computer architecture it is plausible that this could represent\
    \ the number 5259604 or 5521744. It could also be the string “PAT”. Without any\
    \ sort of context, you can’t know for certain. This is why computers need types.\
    \ Type information gives Python what it needs to know to make sense of all the\
    \ ones and zeroes. Let’s see it in action:\n\n```\nfrom ctypes import string_at\n\
    from sys import getsizeof\nfrom binascii import hexlify\n\na = 0b01010000_01000001_01010100\n\
    print(a)\n>>> 5259604\n\n# prints out the memory of the variable\nprint(hexlify(string_at(id(a),\
    \ getsizeof(a))))\n>>> b'0100000000000000607c054995550000010000000000000054415000'\n\
    \ntext = \"PAT\"\nprint(hexlify(string_at(id(text), getsizeof(text))))\n>>>b'0100000000000000a00f0649955500000300000000000000375c9f1f02acdbe4e\n\
    5379218b77f00000000000000000000050415400'\n```\n\n> NOTE\nI am running CPython\
    \ 3.9.0 on a little-endian machine, so if you see different results, don’t worry,\
    \ there are subtle things that can change your answers. (This code is not guaranteed\
    \ to run on other Python implementations such as Jython or PyPy).\n\nThese hex-strings\
    \ display the actual memory of a Python object. You’ll find pointers to the next\
    \ and previous object in a linked list (for garbage collection purposes), a reference\
    \ count, a type, and the actual data itself. You can see the bytes at the end\
    \ of each returned value to see the number or string (look for the bytes 0x544150\
    \ or 0x504154). The important part of this is that there is a type encoded into\
    \ that memory. When Python looks at a variable, it knows exactly what type everything\
    \ is at runtime (such as when you use the `type()` function.)\n\nIt’s easy to\
    \ think that this is the only reason for types - the computer needs to know how\
    \ to interpret various blobs of memory. It is important to be aware of how Python\
    \ uses types, as it has some implications for writing robust code, but even more\
    \ important is the second representation: semantic representation.\n\n## Semantic\
    \ Representation\n\nWhile the first definition of types is great for lower-level\
    \ programming, it’s the second definition that applies to every developer. Types,\
    \ in addition to having a mechanical representation, also manifest a semantic\
    \ representation. A semantic representation is a communication tool; the types\
    \ you choose communicate information across time and space to a future developer.\n\
    \nTypes tell a user what behaviors they can expect about that entity. These behaviors\
    \ are the operations that you associate with that type (plus any pre-conditions\
    \ or post-conditions). They are the boundaries, constraints, and freedoms that\
    \ a user interacts with whenever they use that type. Types used correctly have\
    \ low barriers to understanding; they become natural to use. Conversely, types\
    \ used poorly are a hindrance.\n\nConsider the lowly int. Take a minute to think\
    \ about what behaviors an integer has in Python. Here’s a quick (non-comprehensive)\
    \ list I came up with:\n\n- Constructible from integers, floats, or strings\n\
    - Mathematical operations such as addition, subtraction, division, multiplication,\
    \ exponentiation and negation\n- Relational comparison such as <, >, ==, and !=\n\
    - Bitwise operations (manipulating individual bits of a number) such as &, |,\
    \ ^, ~, and shifting\n- Convertible to a string using str or repr functions\n\
    - Able to be rounded through ceil, floor, round methods (even though these return\
    \ the integer itself, these are supported methods).\n\nAn **int** has many behaviors.\
    \ You can view the full list if you type `help(int)` into your REPL.\n\nNow consider\
    \ a datetime:\n\n```\n>>> import datetime\n>>> datetime.datetime.now()\ndatetime.datetime(2020,\
    \ 9, 8, 22, 19, 28, 838667)\n```\n\nA datetime is not that different from an int.\
    \ Typically it’s represented as a number of seconds or milliseconds from some\
    \ epoch of time (such as January 1st, 1970). But think about the behaviors a datetime\
    \ has:\n\n- Constructible from a **string, or a set of integers representing day/month/year/etc**\n\
    - Mathematical Operations such as addition and subtraction of **Time Deltas**\n\
    - Relational comparison\n- **No bitwise operations available**\n- Convertible\
    \ to a string using str or repr functions\n- **Is not** able to be rounded through\
    \ ceil, floor, round methods\n\nDatetimes support addition and subtraction, but\
    \ not of other datetimes. We only add time deltas (such as adding a day or subtracting\
    \ a year). Multiplying and dividing really don’t make sense for a datetime. Similarly,\
    \ rounding dates is not a supported operation in the standard library. However,\
    \ datetimes do offer comparison and string formatting operations with similar\
    \ semantics to an integer. So even though datetime is at heart an integer, it\
    \ contains a constrained subset of operations."
  mdcn: "## 第二章 Python 类型简介\n\n> **致早期版本读者的说明**\n\n通过早期版本电子书，您可以在书籍的最初阶段获取内容——即作者撰写时未经编辑的原始内容——从而在这些书籍正式发布之前就能利用这些技术。\n\
    \n这将是最终书籍的第二章。请注意，GitHub 仓库将在稍后激活。\n\n如果您对如何改进本书内容和/或示例有意见，或者发现本章中有遗漏的内容，请通过 *pat@kudzera.com*\
    \ 联系作者。\n\n欢迎来到第一部分，我将重点介绍 Python 中的*类型*。类型对程序的行为进行建模。初级程序员知道 Python 中有不同的类型，比如\
    \ *float* 或 *string*。但类型是什么？掌握类型如何使你的代码库更强大？类型是任何编程语言的基本支柱，但不幸的是，大多数入门书籍都忽略了类型如何使你的代码库受益（或者如果误用，这些类型会增加复杂性）。\n\
    \n告诉我你是否见过这个：\n\n```\n>>>type(3.14)\n<class 'float'>\n\n>>>type(\"This is another\
    \ boring example\")\n<class 'str'>\n\n>>> type([\"Even\", \"more\", \"boring\"\
    , \"examples\"])\n<class 'list'>\n```\n\n这几乎可以从任何 Python 入门指南中找到。你学习了整数、字符串、浮点数、布尔值以及语言提供的所有东西。然后，砰，你继续前进，因为让我们面对现实，这个\
    \ Python 并不花哨。你想深入研究很酷的东西，比如函数、循环和字典，我不怪你。但遗憾的是，许多教程从未重新审视类型并给予它们应有的重视。随着用户深入挖掘，他们可能会发现类型注解（我将在下一章介绍）或开始编写类，但通常错过了关于何时适当使用类型的基本讨论。\n\
    \n这就是我要开始的地方。要编写可维护的 Python，你必须了解类型的本质并有意识地使用它们。我将首先讨论类型到底是什么以及为什么这很重要。然后我将讨论\
    \ Python 语言对其类型系统的决策如何影响代码库的健壮性。\n\n## 类型中有什么？\n\n我想让你停下来回答一个问题：不提及数字、字符串、文本或布尔值，你如何解释类型是什么？\n\
    \n对每个人来说，这都不是一个简单的答案。解释其好处甚至更难，尤其是在像 Python 这样的语言中，你不必显式声明变量的类型。\n\n我认为类型有一个非常简单的定义：一种通信方法。类型传达信息。它们提供了一种用户和计算机可以推理的表示。我将这种表示分解为两个不同的方面：\n\
    \n*机械表示*\n    类型向 Python 语言本身传达行为和约束\n\n*语义表示*\n    类型向其他开发人员传达行为和约束\n\n让我们进一步了解每种表示：\n\
    \n## 机械表示\n\n从本质上讲，计算机都是关于二进制代码的。你的处理器不会说 Python，它看到的只是电路中电流的有无。计算机内存中的内容也是如此。\n\
    \n假设你的内存看起来像这样\n\n00110010100001001000010100100100010010001000001010100101\n010101010000001111111100100101001111101001001010010001\n\
    0010100`010100000100000101010100``101001001001000101010001010010\n010101010010010010010000111101010110101101001010111`\n\
    \n看起来像一堆乱码。让我们放大我加粗的部分：\n\n*01010000 01000001 01010100*\n\n仅凭这个数字本身无法确切知道它的含义。根据计算机体系结构，它可能代表数字\
    \ 5259604 或 5521744。它也可能是字符串“PAT”。没有任何上下文，你无法确定。这就是为什么计算机需要类型。类型信息为 Python 提供了理解所有\
    \ 1 和 0 所需的信息。让我们看看它的实际应用：\n\n```\nfrom ctypes import string_at\nfrom sys import\
    \ getsizeof\nfrom binascii import hexlify\n\na = 0b01010000_01000001_01010100\n\
    print(a)\n>>> 5259604\n\n# prints out the memory of the variable\nprint(hexlify(string_at(id(a),\
    \ getsizeof(a))))\n>>> b'0100000000000000607c054995550000010000000000000054415000'\n\
    \ntext = \"PAT\"\nprint(hexlify(string_at(id(text), getsizeof(text))))\n>>>b'0100000000000000a00f0649955500000300000000000000375c9f1f02acdbe4e\n\
    5379218b77f00000000000000000000050415400'\n```\n\n> 注意\n我在小端机器上运行 CPython 3.9.0，所以如果你看到不同的结果，不要担心，有一些细微的东西可能会改变你的答案。（此代码不保证在其他\
    \ Python 实现（如 Jython 或 PyPy）上运行）。\n\n这些十六进制字符串显示了 Python 对象的实际内存。你会发现链表中下一个和上一个对象的指针（用于垃圾回收目的）、引用计数、类型和实际数据本身。你可以看到每个返回值末尾的字节，以查看数字或字符串（查找字节\
    \ 0x544150 或 0x504154）。重要的是，内存中编码了一个类型。当 Python 查看变量时，它在运行时确切地知道所有内容的类型（例如，当你使用\
    \ `type()` 函数时）。\n\n很容易认为这是类型的唯一原因——计算机需要知道如何解释各种内存块。了解 Python 如何使用类型很重要，因为它对编写健壮的代码有一些影响，但更重要的是第二种表示：语义表示。\n\
    \n## 语义表示\n\n虽然类型的第一种定义非常适合底层编程，但第二种定义适用于每个开发人员。类型除了具有机械表示外，还表现出语义表示。语义表示是一种通信工具；你选择的类型跨越时间和空间向未来的开发人员传达信息。\n\
    \n类型告诉用户他们可以对该实体有什么样的行为。这些行为是你与该类型关联的操作（加上任何前置条件或后置条件）。它们是用户在使用该类型时交互的边界、约束和自由。正确使用的类型理解门槛低；它们变得自然易用。相反，使用不当的类型则是一种障碍。\n\
    \n考虑一下简单的整数。花一分钟思考一下 Python 中整数有什么行为。这是我想到的一个快速（非全面）列表：\n\n- 可从整数、浮点数或字符串构造\n\
    - 数学运算，如加法、减法、除法、乘法、幂运算和取反\n- 关系比较，如 <、>、== 和 !=\n- 位运算（操作数字的各个位），如 &、|、^、~ 和移位\n\
    - 可以使用 str 或 repr 函数转换为字符串\n- 能够通过 ceil、floor、round 方法进行四舍五入（尽管这些方法返回整数本身，但它们是受支持的方法）。\n\
    \n一个 **int** 有许多行为。你可以在 REPL 中输入 `help(int)` 来查看完整列表。\n\n现在考虑一个 datetime：\n\n\
    ```\n>>> import datetime\n>>> datetime.datetime.now()\ndatetime.datetime(2020,\
    \ 9, 8, 22, 19, 28, 838667)\n```\n\ndatetime 与 int 并没有太大不同。通常它表示为从某个时间纪元（如 1970\
    \ 年 1 月 1 日）开始的秒数或毫秒数。但想想 datetime 有什么行为：\n\n- 可从**字符串或表示日/月/年等的一组整数构造**\n- 数学运算，如**时间增量**的加法和减法\n\
    - 关系比较\n- **没有位运算可用**\n- 可以使用 str 或 repr 函数转换为字符串\n- **不能**通过 ceil、floor、round\
    \ 方法进行四舍五入\n\nDatetime 支持加法和减法，但不是与其他 datetime 进行。我们只添加时间增量（例如添加一天或减去一年）。乘法和除法对\
    \ datetime 来说确实没有意义。同样，四舍五入日期在标准库中不是受支持的操作。但是，datetime 确实提供了与整数类似语义的比较和字符串格式化操作。所以即使\
    \ datetime 本质上是一个整数，它包含了一个受约束的操作子集。"
