    \ other, for a total of 22. This is an example of a *sum type*, since I’m adding\
    \ the number of representable states together rather than multiplying.\n\n22 total\
    \ representable states. Compare that with the 144 states when all the fields were\
    \ lumped in a single entity. I’ve reduced my representable state space by almost\
    \ 85%. I’ve made it impossible to mix and match fields that are incompatible with\
    \ each other. It becomes much harder to make a mistake, and there are far fewer\
    \ combinations to test. Anytime you use a sum type, such as a Union, you are dramatically\
    \ decreasing the number of possible representable states.\n\n## Literal Types\n\
    \nWhen calculating the number of representable states, I made some assumptions\
    \ in the last section. I limited the number of values that were possible, but\
