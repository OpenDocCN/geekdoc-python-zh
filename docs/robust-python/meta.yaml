    \ for a developer who is creating the snack to check this code. As it stands,\
    \ you have no way of catching this sort of error other than manually inspecting\
    \ every use case, which is intractable for large code bases. By allowing an illegal\
    \ state to be representable, you open the door to fragile code.\n\nTo rememdy\
    \ this, I need to make this illegal state unrepresentable. To do that, I’ll rework\
    \ my example and use a `Union`:\n\n```\nfrom dataclasses import dataclass\nfrom\
    \ typing import Union, Set\n\n@dataclass\nclass Error:\n    error_code: int\n\
    \    disposed_of: bool\n\n@dataclass\nclass Snack:\n    name: str\n    condiments:\
    \ Set[str]\n\nsnack: Union[Snack, Error] = Snack(\"Hotdog\", {\"Mustard\", \"\
    Ketchup\"})\n\nsnack = Error(5, True)\n```\n\nIn this case, `snack` can be either\
    \ a `Snack` (which is just a name and condiments) or an `Error` (which is just\
    \ a number and a boolean). With the use of a `Union`, how many representable states\
    \ are there now?\n\nFor `Snack`, there are 3 names and 4 possible list values,\
    \ which is a total of 12 representable states. For `ErrorCode`, I can remove the\
