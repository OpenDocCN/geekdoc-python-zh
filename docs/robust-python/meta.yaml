    Quite a few developers dream of the days where they can work in a completely *greenfield*
    project. A green-field project is one that is brand new, where you have a blank
    slate with your code’s architecture, design, and modularity. However, most projects
    soon become *brown-field*, or legacy code. These projects have been around the
    block a bit; much of the architecture and design has been solidified. Making big
    sweeping changes will impact real users. However, the word brown-field is often
    seen as derogatory, especially when it feels like you are slogging through a big
    ball of mud.


    However, not all brownfield projects are a punishment to work in. Michael Feathers,
    author of *Working Effectively With Legacy Code* has this to say:


    > *In a well-maintained system, it might take a while to figure out how to make
    a change, but once you do, the change is usually easy and you feel much more comfortable
    with the system. In a legacy system, it can take a long time to figure out what
    to do, and the change is difficult also.*¹


    Brownfield projects can absolutely be in a well-maintained state. It’s true that
    they are complex at first, but once you get past the initial hurdle of understanding,
    it becomes easy to change. Unmaintainable code is where the real problem lies.
    This is why robustness is paramount. Writing robust code eases the transition
    from green-field to brown-field through maintainability.


    Most of the type annotations strategies that I’ve shown in the first part of this
    book are easier to adopt when a project is new. To adopt these practices in a
    mature project is more challenging. It is not impossible, but the cost may be
    higher. This is the heart of engineering: making smart decisions about trade-offs.


    ## Trade-offs


    Every decision you make involves a trade-off. Lots of developers focus on the
    classic time vs. space trade-off in algorithms. But there are plenty of other
    trade-offs, often involving intangible qualities. I’ve already covered the benefits
    of a typechecker quite extensively throughout this first part of the book:

    - A typechecker increases communication and reduce the chances of bugs.

    - A typechecker provide a safety net for making changes and increase the robustness
    of your codebase.

    - A typechecker allows you to deliver functionality faster,


    But what are the costs? Adopting type annotations is not free, and they only get
    worse the larger your codebase is. These costs include:


    - First you need buy-in. Depending on culture, it might take some time convincing
    an organization to adopt typechecking

    - Once you have buy-in there is an initial cost of adoption. Developers don’t
    start type annotating their code overnight, and it takes time before they grok
    it. They need to learn it and experiment before they are on board.

    - It takes time and effort to adopt tooling. You need some centralized checking
    of some fashion, and developers need to familiarize themselves with running the
    tooling as part of their workflows.

    - It will take time to write type annotations in your codebase.

    - As type annotations are checked, developers will have to get used to the slowdown
    in fighting the typechecker. There is additional cognitive overload in thinking
    about types.


    Developer time is expensive, and it is easy to focus on what else those developers
    could be doing. Adopting type annotations is not free. Worse, with a large enough
    codebase, these costs can easily dwarf the initial benefit you get from typechecking.
    The problem is fundamentally a chicken-and-egg conundrum. You won’t see benefits
    for annotating types until you have written enough types in your codebase. However,
    it is tough to get buy-in for writing types when the benefit isn’t there early
    on. You can model your value as such:

    Value = (Total Benefits) - (Total Costs)

    Your benefits and costs will follow a curve; they are not linear functions. I’ve
    outlined the basic shapes of the curves in Figure 7-1.


    ![](img/b136c318777181835dbab42f383e392c_116_0.png)


    Figure 7-1. Cost and Benefit Curves Over Time


    I’ve purposely left off the range, because the scale will change depending on
    the size of your codebase, but the shapes remain the same. Your costs will start
    out high, but get easier as adoption increases. Your benefits will start off low,
    but as you annotate your codebase, you will see more value. You won’t see a return
    on investment until these two curves meet. To maximize value, you need to reach
    that intersection as early as possible.


    ## Breaking Even Earlier


    To maximize the benefits of type annotations, you need to either get value earlier,
    or decrease your costs earlier. The intersection of these two curves is a break-even
    point; this is where the amount of effort that you’re expending is paid back by
    the value you are receiving. You want to reach this point as fast as sustainably
    possible to make your type annotations a positive impact. Here are some strategies
    to do that.


    ## Finding Your Pain Points


    One of the best ways to produce value is to reduce the pain you are currently
    experiencing. Ask yourself, where do you currently lose time in your process?
    Where do you lose money? Take a look at your test failures and customer bugs.
    These error cases incur real costs; you should be doing root cause analysis. If
    you find that a common root cause that can be fixed by type annotations, you have
    a solid case for type annotation adoption. Here are specific bug classes you need
    to keep an eye out for:


    - Any error surrounding None

    - Invalid attribute access, such as trying to access variables of functions on
    the wrong type

    - Errors surrounding type conversions such as ints vs strings, bytes vs strings,
    or lists vs tuples.


    Also, talk to the people who have to work in the codebase itself. Root out the
    areas that are a constant source of confusion. If developers have trouble with
    certain parts of the codebase today, it’s very likely that future developers will
    struggle too. Don’t forget to talk to those who are invested in your codebase,
    but maybe don’t directly work in it, such as your tech support, product management
    and QA. They often have a unique perspective on painful areas of the codebase
    that might not be apparent when looking through the code. Try to put these costs
    into concrete terms, such as time or money. This will be invaluable in evaluating
    where type annotations will be of benefit.


