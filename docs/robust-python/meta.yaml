- md: "Developers working in a statically typed language don't need to put in as much\
    \ care to ensure collections are homogeneous; the static type system does that\
    \ for them already. The challenge in Python is due to Python's dynamically typed\
    \ nature. It is much easier for a developer to create a heterogeneous collection\
    \ without any warnings from the language itself.\n\nHeterogeneous collection types\
    \ still have a lot of uses; don't assume that you should use homogeneity for every\
    \ collection type because it is easier to reason about. Tuples, for example, are\
    \ often heterogeneous.\n\nSuppose that I represent a **Cookbook** as a tuple.\n\
    \n```python\nCookbook = tuple[str, int] # name, page count\n```\n\nI am describing\
    \ specific fields for this tuple: name and page count. This is a prime example\
    \ of a heterogeneous collection:\n\n- Each field (name and page count) will always\
    \ be in the same order.\n- All names are strings; all page counts are integers.\n\
    - Iterating over the tuple is rare, since I won't treat both types the same.\n\
    - Name and page count are fundamentally different types, and should not be treated\
    \ as equivalent.\n\nWhen accessing a tuple, you will typically index to the specific\
    \ field you want:\n\n```python\nfood_lab: Cookbook = (\"The Food Lab\", 958)\n\
    odd_bits: Cookbook = (\"Odd Bits\", 248)\n\nprint(food_lab[0])\n>>> \"The Food\
    \ Lab\"\n\nprint(odd_bits[1])\n>>> 248\n```\n\nHowever, in many codebases, tuples\
    \ like these soon become burdensome. Developers tire of writing cookbook[0] whenever\
    \ they want a name. A better thing to do would be to find some way to name these\
    \ fields. A first choice might be a dictionary.\n\n```python\nfood_lab = {\n \
    \   \"name\": \"The Food Lab\",\n    \"page_count\": 958\n}\n```\n\nNow, they\
    \ can refer to fields as `food_lab['name']` and `food_lab['page_count']`. The\
    \ problem is, dictionaries are typically meant to be a homogeneous mapping from\
    \ key to a value. However, when dictionaries are used to represent data that is\
    \ heterogeneous, you run into similar problems as above when writing a valid type\
    \ annotation. I cannot write a meaningful type to represent this data. If I wanted\
    \ to try to use a type system to represent this dictionary, I end up with the\
    \ following:\n\n```python\ndef print_cookbook(cookbook: dict[str, Union[str, int]]):\n\
    \    # ...\n```\n\nThis approach has the following problems:\n\n- Large dictionaries\
    \ may have many different types of values. Writing a `Union` is quite cumbersome.\n\
    - It is tedious for a user to handle every case for every dictionary access (since\
    \ I indicate that the dictionary is homogeneous, I convey to developers that they\
    \ need to treat every value as the same type, meaning typechecks for every value\
    \ access. I know that the `name` is always a `string` and the `page_count` is\
    \ always an `int`, but a consumer of this type would not know that.\n- Developers\
    \ do not have any indication what keys are available in the dictionary. They must\
    \ search all the code from dictionary creation time to the current access to see\
    \ what fields have been added.\n- As the dictionary grows, developers have a tendency\
    \ to use `Any` as the type of the value. Using `Any` defeats the purpose of the\
    \ typechecker in this case.\n\n> **NOTE**\n\n`Any` can be used for valid type\
    \ annotations; it merely indicates that you are making zero assumptions what the\
    \ type is. For instance, if you wanted to copy a list, the type signature would\
    \ be `def copy(coll: list[Any]) -> list[Any]`. Of course, you could also do `def\
    \ copy(coll: list) -> list` as well, and it means the same thing.\n\nThese problems\
    \ all stem from heterogeneous data in homogeneous data collections. You either\
    \ pass the burden onto the caller, or abandon type annotations completely. In\
    \ some cases, you want the caller to explicitly check each type on each value\
    \ access, but in other cases, this is overcomplicated and tedious. So, how can\
    \ you explain your reasoning with heterogeneous types, especially in cases where\
    \ keeping data in a dictionary is natural, such as API interactions or user-configurable\
    \ data. For these cases, you should use a *TypedDict*.\n\n## TypedDict\n\nTypedDict,\
    \ introduced in Python 3.8, is for the scenarios where you absolutely must store\
    \ heterogeneous data in a dictionary. These scenarios are typically when you can’t\
    \ avoid heterogeneous data. JSON APIs, YAML, TOML, XML and CSVs all have easy-to-use\
    \ Python modules that convert these data formats into a dictionary and are naturally\
    \ heterogeneous. Which means the data that gets returned has all the same problems\
    \ as listed in the previous section. Your typechecker won’t help out much and\
    \ users won’t know what keys and values are available.\n\n> **TIP**\n\nIf you\
    \ have full control of the dictionary, meaning you create it in code you own and\
    \ handle it in code you own, you should consider using a dataclass or a class\
    \ instead.\n\nFor example, suppose I want to augment my digital cookbook app to\
    \ provide nutritional information for the recipes listed. I decide to use the\
    \ Spoonacular API¹ and write some code to get nutritional information:\n\n```python\n\
    nutrition_information = get_nutrition_from_spoonacular(recipe_name)\n# print grams\
    \ of fat in recipe\nprint(nutrition_information[\"fat\"][\"value\"])\n```\n\n\
    If you were reviewing the code, how would you know that this code is right? If\
    \ you wanted to also print out the calories, how do you access the data? What\
    \ guarantees do you have about the fields inside of this dictionary? To answer\
    \ these questions, you have two options:\n\n- Look up the API documentation (if\
    \ any) and confirm that the right fields are being used. In this option, you hope\
    \ that the documentation is actually complete and correct.\n- Run the code and\
    \ print out the returned dictionary. In this option, you hope that test responses\
    \ are pretty identical to production responses.\n\nThe problem is that you are\
    \ requiring every reader, reviewer and maintainer to do one of these two steps\
    \ in order to understand the code. If they don’t, you will not get good code review\
    \ feedback and developers will run the risk of using the response incorrectly.\
    \ This leads to incorrect assumptions and brittle code. **TypedDict** allows you\
    \ to encode what you’ve learned about that API directly into your type system.\n\
    \n```python\nfrom typing import TypedDict\n\nclass Range(TypedDict):\n    min:\
    \ float\n    max: float\n\nclass NutritionInformation(TypedDict):\n    value:\
    \ int\n    unit: str\n    confidenceRange95Percent: Range\n    standardDeviation:\
    \ float\n\nclass RecipeNutritionInformation(TypedDict):\n    recipes_used: int\n\
    \    calories: NutritionInformation\n    fat: NutritionInformation\n    protein:\
    \ NutritionInformation\n    carbs: NutritionInformation\n\nnutrition_information:\
    \ RecipeNutritionInformation = get_nutrition_from_spoonacular(recipe_name)\n```\n\
    \nNow it is incredibly apparent exactly what data types you can rely upon. If\
    \ the API ever changes, a developer can update all the **TypedDict** classes and\
    \ let the typechecker catch any incongruities. Your typechecker now completely\
    \ understands your dictionary, and readers of your code can reason about responses\
    \ without having to do any external searching. Even better, these `TypedDict`\
    \ collections can be as arbitrarily complex as you need them to be. You’ll see\
    \ that I nested `TypedDict` instances for reusability purposes, but you can also\
    \ embed your own custom types, `Unions` and `Optionals` to reflect the possibilities\
    \ that an API can return. And while I’ve mostly been talking about API, remember\
    \ that these benefits apply to any heterogeneous dictionary, such as when reading\
    \ JSON or YAML.\n\n> **NOTE**\n\n`TypedDict` is only for the type-checker’s benefit.\
    \ There is no run-time validation at all; the run-time type is just a dictionary.\n\
    \nSo far, I’ve been teaching you how to deal with built-in collection types: lists/sets/dictionaries\
    \ for homogeneous collections and tuples/TypedDict for heterogeneous collections.\
