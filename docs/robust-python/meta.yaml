    \    mustard = dispense_mustard()\n    hotdog.add_condiments(ketchup, mustard)\n\
    \    return hotdog\n```\n\n`None` values truly are a billion dollar mistake. If\
    \ they slip through, programs can crash, users are frustrated, and money is lost.\
    \ Use `Optional` types to tell other developers to beware of `None`, and benefit\
    \ from the automated checking of your tools.\n\n> ### DISCUSSION TOPIC\nHow often\
