    \ and typechecking today.\n\n> ### DISCUSSION TOPIC\n> Has your codebase had an\
    \ error slip through that could have been caught by typecheckers?\n> How much\
    \ do those errors cost you? How many times has it been a code review or an integration\
    \ test that caught the bug? How about bugs that made it to production?\n\n## When\
    \ To Use\n\nNow, before you go adding types to everything, I need to talk about\
    \ the cost. Adding types is simple, but can be overdone. As users try to test\
    \ and play around with code, they may start fighting the typechecker because they\
    \ feel bogged down when writing all the type annotations. There is an adoption\
    \ cost for users who are just getting started with type hinting. I also mentioned\
    \ that I don’t type annotate everything. I won’t annotate all my variables, especially\
    \ if the type is obvious. I also won’t typically type annotate parameters for\
    \ every small private method in a class.\n\nWhen should you use typecheckers?\n\
    \n- Functions that you expect other modules or users to call (e.g. public API,\
    \ library entry points, etc.)\n- Code that you want to highlight where a type\
    \ is complicated (e.g. a dictionary of strings mapped to lists of objects) or\
    \ unintuitive.\n- Areas where mypy complains that you need a type (typically when\
    \ assigning to an empty collection - it’s easier to go along with the tool than\
    \ against it.)\n\nTypecheckers will infer types for any value that it can, so\
    \ even if you don’t fill in all types, you still reap the benefits.\n\n## Wrap-up\n\
    \nThere was consternation in the Python community when type hinting was introduced.\
    \ Developers were afraid that Python was becoming a statically typed language\
    \ like Java or C++. Developers felt that adding types everywhere would slow them\
    \ down and destroy the benefits of the dynamically typed language they fell in\
    \ love with.\n\nHowever, type hints are just that: hints. They are completely\
    \ optional. I don’t recommend them for small scripts, or any piece of code that\
    \ isn’t going to live a very long time. But if your code needs to be maintainable\
    \ for the long term, type hints are invaluable. They serve as a communication\
    \ method, make your environment smarter, and detect errors when combined with\
    \ typecheckers. They protect the original author’s intent. When annotating types,\
    \ you decrease the burden a reader has in understanding your code. You reduce\
    \ the need to read the implementation of a function to know what its doing. Code\
    \ is complicated, and you should be minimizing how much code a developer needs\
    \ to read. By using well thought out types, you reduce surprise and increase reading\
    \ comprehension.\n\nThe typechecker is also a confidence builder. Remember, in\
    \ order for your code to be robust it has to be easy to change, rewrite and delete\
    \ if needed. The typechecker can allow developers to do that with less trepidation.\
    \ If something was relying on a type or field that got changed or deleted, the\
    \ typechecker will flag the offending code as incompatible. Automated tooling\
    \ makes you and your future collaborator’s jobs simpler: less bugs will make it\
    \ to production and features will get delivered quicker.\n\nIn the next chapter,\
    \ you're going to go beyond basic type annotations and learn how to build a vocabulary\
    \ of all new types. These types will help you constrain behavior in your codebase,\
    \ limiting the ways things can go wrong. I've only scratched the surface of how\
    \ useful type annotations can be.\n\n> 1 A Language Creators' Conversation, PuPPy\
    \ Annual Benefit 2019, https://www.youtube.com/watch?v=csL8DLXGNlU"
  mdcn: "检查器会找出并提醒你。事实上，在大多数开发环境中，可以实时进行这种分析，在你输入时就通知错误。（虽然不能读心，但这已经是工具能尽早捕获错误的极限了，已经相当不错了。）\n\
    \n## 练习：找出错误\n\n这里有一些 mypy 在我的代码中捕获错误的更多例子。我希望你查看每个代码片段中的错误，并计时你找到错误或放弃需要多长时间，然后查看片段下方列出的输出，看看你是否找对了。\n\
    \n```python\ndef read_file_and_reverse_it(filename: str) -> str:\n    with open(filename)\
    \ as f:\n        # Convert bytes back into str\n        return f.read().encode(\"\
    utf-8\")[::-1]\n```\n\n```\nmypy chapter3/invalid_example1.py\nchapter3/invalid_example1.py:3:\
    \ error: Incompatible return value type\n(got \"bytes\", expected \"str\")\nFound\
    \ 1 error in 1 file (checked 1 source file)\n```\n\n哎呀，我返回的是字节，而不是字符串。我调用了 `encode`\
    \ 而不是 `decode`，把返回类型搞混了。在将 Python 2.7 代码迁移到 Python 3 时，我犯这个错误的次数多得数不清。感谢类型检查器。\n\
    \n这是另一个例子：\n\n```python\nfrom typing import List\n# takes a list and adds the\
    \ doubled values\n# to the end\n# [1,2,3] => [1,2,3,2,4,6]\ndef add_doubled_values(my_list:\
    \ List[int]):\n    my_list.update([x*2 for x in my_list])\n\nadd_doubled_values([1,2,3])\n\
    ```\n\n```\nmypy chapter3/invalid_example2.py\nchapter3/invalid_example2.py:6:\
    \ error: \"List[int]\" has no attribute\n\"update\"\nFound 1 error in 1 file (checked\
    \ 1 source file)\n```\n\n又一个无心之失，我在列表上调用了 `update` 而不是 `extend`。在集合类型之间切换时（这里是从提供\
    \ `update` 方法的 `set` 切换到没有该方法的 `list`），这类错误很容易发生。\n\n最后一个例子来收尾：\n\n```python\n\
    # The restaurant is named differently in different\n# in different parts of the\
    \ world\ndef get_restaurant_name(city: str) -> str:\n    if city in ITALY_CITIES:\n\
    \        return \"Trattoria Viafore\"\n    if city in GERMANY_CITIES:\n      \
    \  return \"Pat's Kantine\"\n    if city in US_CITIES:\n        return \"Pat's\
    \ Place\"\n    return None\n\nif get_restaurant_name('Boston'):\n    print(\"\
    Location Found\")\n```\n\n```\nchapter3/invalid_example3.py:14: error: Incompatible\
    \ return value type\n(got \"None\", expected \"str\")\nFound 1 error in 1 file\
    \ (checked 1 source file)\n```\n\n这个很微妙。当期望字符串值时，我返回了 `None`。如果所有代码都只是像上面那样有条件地检查餐厅名称来做决策，测试会通过，一切看起来都没问题。即使对于否定情况也是如此，因为在\
    \ `if` 语句中检查 `None` 是完全可以的（它是假值）。这是 Python 动态类型特性反过来坑我们的一个例子。\n\n然而，几个月后，某个开发者会开始尝试将这个返回值当作字符串使用，一旦需要添加新城市，代码就会开始尝试操作\
    \ `None` 值，从而引发异常。这不够健壮；存在一个潜伏的代码错误，随时可能爆发。但有了类型检查器，你就可以不再担心这个，并尽早捕获这些错误。\n\n\
    > **警告**\n> 有了类型检查器，你还需要测试吗？当然需要。类型检查器捕获的是一类特定的错误——类型不兼容的错误。还有很多其他类别的错误需要你去测试。将类型检查器视为你查找错误工具库中的一种工具。\n\
    \n在所有这些例子中，类型检查器都发现了一个潜伏的错误。无论这个错误是否会被测试、代码审查或客户发现都无关紧要；类型检查器更早地捕获了它，从而节省了时间和金钱。类型检查器开始让我们获得静态类型语言的好处，同时仍然允许\
    \ Python 运行时保持动态类型。这真正是两全其美。\n\n在本章开头，你会看到 Guido van Rossum 的一句引言。Guido van Rossum\
    \ 是 Python 编程语言的创造者。在 Dropbox 工作时，他发现大型代码库在没有安全网的情况下举步维艰。他成为了推动类型提示进入语言的坚定支持者。如果你想让你的代码传达意图并捕获错误，今天就开始采用类型注解和类型检查吧。\n\
    \n> ### 讨论话题\n> 你的代码库是否曾出现过本可以被类型检查器捕获的错误？\n> 这些错误让你付出了多少代价？有多少次是代码审查或集成测试捕获了错误？那些进入生产环境的错误呢？\n\
    \n## 何时使用\n\n现在，在你开始给所有东西添加类型之前，我需要谈谈成本。添加类型很简单，但也可能做过头。当用户尝试测试和试用代码时，他们可能会开始与类型检查器作斗争，因为编写所有类型注解让他们感到拖沓。对于刚开始接触类型提示的用户来说，存在一个采用成本。我也提到过我不会给所有东西都加类型注解。我不会注解我所有的变量，尤其是当类型很明显的时候。我也通常不会为类中的每个小私有方法注解参数。\n\
    \n你应该在什么时候使用类型检查器？\n\n- 你期望其他模块或用户调用的函数（例如，公共 API、库入口点等）。\n- 你想要强调类型复杂（例如，字符串映射到对象列表的字典）或不直观的代码。\n\
    - mypy 抱怨你需要类型的地方（通常是在赋值给空集合时——顺应工具比对抗它更容易）。\n\n类型检查器会为它能推断的任何值推断类型，所以即使你没有填写所有类型，你仍然能获得好处。\n\
    \n## 总结\n\n当类型提示被引入时，Python 社区曾有过一阵恐慌。开发者担心 Python 正在变成像 Java 或 C++ 那样的静态类型语言。开发者觉得到处添加类型会拖慢他们的速度，并破坏他们所钟爱的动态类型语言的好处。\n\
    \n然而，类型提示仅仅是提示。它们是完全可选的。我不推荐在小脚本或任何不会长期存在的代码中使用它们。但如果你的代码需要长期维护，类型提示是无价的。它们作为一种沟通方式，让你的环境更智能，并在与类型检查器结合时检测错误。它们保护了原始作者的意图。在注解类型时，你减轻了读者理解代码的负担。你减少了阅读函数实现以了解其功能的需要。代码是复杂的，你应该尽量减少开发者需要阅读的代码量。通过使用深思熟虑的类型，你减少了意外并提高了阅读理解力。\n\
    \n类型检查器也是信心的建立者。记住，为了让你的代码健壮，它必须易于更改、重写和在需要时删除。类型检查器可以让开发者更少担忧地做到这一点。如果有东西依赖于被更改或删除的类型或字段，类型检查器会将有问题的代码标记为不兼容。自动化工具让你和你未来的合作者的工作更简单：更少的错误会进入生产环境，功能也会更快交付。\n\
    \n在下一章，你将超越基本的类型注解，学习如何构建一个全新的类型词汇表。这些类型将帮助你约束代码库中的行为，限制出错的方式。我仅仅触及了类型注解有用性的皮毛。\n\
    \n> 1 语言创造者的对话，PuPPy 2019 年度慈善活动，https://www.youtube.com/watch?v=csL8DLXGNlU"
