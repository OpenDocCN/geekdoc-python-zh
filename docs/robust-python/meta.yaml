    workflow? How ephemeral is the knowledge? Is it easy to search for information?

    - Maintenance Cost: How accurate is the information? How often does it need to
    be updated? What goes wrong if this information is out of date?

    - Production Cost: How much time and money went into producing the communication?


    In Figure 1-1, I plotted some common communication methods’ cost and proximity
    required.'
