    `Literal`s were introduced in Python 3.8, and they are an invaluable way of restricting
    possible values of a variable.


    # Annotated Types


    What if I wanted to get even deeper and specify more complex constraints? It would
    be tedious to write hundreds of literals, and some constraints aren’t able to
    be modelled by `Literal` types. There’s no way with a literal to constrain a string
    to a certain size or to match a specific regex. This is where `Annotated` comes
    in. With `Annotated`, you can specify arbitrary metadata alongside your type annotation.


    ```

    x: Annotated[int, ValueRange(3,5)]

    y: Annotated[str, MatchesRegex(''[0-9]{4}'')]

    ```


    Unfortunately, the above code will not run, as `ValueRange` and `MatchesRegex`
    are not built-in types; they are arbitrary expressions. You will need to write
    your own metadata as part of an `Annotated` variable. Secondly, there are no tools
    that will typecheck this for you. The best you can do until such a tool exists
    is write dummy annotations or use strings to describe your constraints. At this
    point, `Annotated` is best served as a communication method.


    # NewType'
- md: "While waiting for tooling to support Annotated, there is another way to represent\
    \ more complicated constraints: **NewType**. **NewType** allows you to, well,\
    \ create a new type.\n\nSuppose I want to separate my hot-dog stand code to handle\
    \ two separate cases: a hotdog in its unprepared form, and a hotdog that is ready\
    \ to be served (a prepared hotdog). However, some functions should only be operating\
    \ on the hot dog in one case or the other.\n\nFor example:\n\n- An unprepared\
    \ hot dog needs to be put into a bun and can have condiments dispensed on top\
    \ of it.\n- A prepared hot dog needs to be put on a plate, given napkins, and\
    \ served to a customer.\n\nFor example, our plating function might look something\
    \ like this:\n\n```python\nclass HotDog:\n    # ... snip hot dog class implementation\
    \ ...\n\ndef place_on_plate(hotdog: HotDog):\n    # note, this should only accept\
    \ prepared hot dogs.\n    # ...\n```\n\nHowever, nothing in the language prevents\
    \ us from passing in an unprepared hot dog. If a developer makes a mistake and\
    \ passes an unprepared hot dog to this function, customers will be quite surprised\
    \ to just see their order with no bun or condiments come out of the machine.\n\
    \nRather than relying on developers to catch these errors whenever they happen,\
    \ you need a way for your typechecker to catch this. To do that, you can use **NewType**.\n\
    \n```python\nfrom typing import NewType\n\nclass HotDog:\n    '''Used to represent\
    \ an unprepared hot dog'''\n    # ... snip hot dog class implementation ...\n\n\
    PreparedHotDog = NewType(HotDog)\n```\n\n```python\ndef place_on_plate(hotdog:\
    \ PreparedHotDog):\n    # ...\n```\n\nA NewType takes an existing type and creates\
    \ a brand new type that has all the same fields and methods as the existing type.\
    \ In this case, I am creating a type PreparedHotDog that is distinct from HotDog;\
    \ they are not interchangeable. What’s beautiful about this is that this type\
    \ restricts implicit type conversions. You cannot use a HotDog anywhere you are\
    \ expecting a PreparedHotDog (you can use a PreparedHotDog in place of HotDog,\
    \ though). In the above example, I am restricting place_on_plate to only take\
    \ PreparedHotDog values as an argument. This prevents developers from invalidating\
    \ assumptions. If a developer were to pass a HotDog to this method, the typechecker\
    \ will yell at them:\n\n```\ncode_examples/chapter4/invalid/newtype.py:10: error:\
    \ Argument 1 to\n\"place_on_plate\" has incompatible type \"HotDog\"; expected\n\
    \"PreparedHotDog\"\n```\n\nIt is important to stress the one-way nature of this\
    \ type conversion. As a developer, you can control when your old type becomes\
    \ your new type. For example, I’ll modify a function from earlier in the chapter:\n\
    \n```python\ndef create_hot_dog() -> PreparedHotDog:\n    bun = dispense_bun()\n\
    \    if bun is None:\n        print(\"Bun could not be dispensed\")\n        return\n\
    \    hotdog = dispense_hotdog()\n    hotdog.place_in_bun(bun)\n    ketchup = dispense_ketchup()\n\
    \    mustard = dispense_mustard()\n    hotdog.add_condiments(ketchup, mustard)\n\
    \    return PreparedHotDog(hotdog)\n```\n\nNotice how I’m explicitly returning\
    \ a PreparedHotDog instead of a normal hotdog. This acts as a “blessed” function;\
    \ it is the only sanctioned way that I want developers to create a PreparedHotDog.\
    \ Any user trying to use a method that takes a PreparedHotDog needs to create\
    \ a hot dog using create_hot_dog first.\n\nIt is important to notify users that\
    \ the only way to create your new type is through a set of “blessed” functions.\
    \ You don’t want users creating your new type in any circumstance other than a\
    \ predetermined method, as that defeats the purpose.\n\n```python\ndef make_snack():\n\
    \    place_on_place(PreparedHotDog(HotDog))\n```\n\nUnfortunately, Python has\
    \ no great way of telling users this, other than a comment.\n\n```python\nfrom\
    \ typing import NewType\n# NOTE: Only create PreparedHotDog using create_hot_dog\
    \ method.\nPreparedHotDog = NewType(HotDog)\n```\n\nStill, NewType is applicable\
    \ to many real-world scenarios. For example, these are all scenarios that I’ve\
    \ run into that a NewType would solve.\n\n- Separating a str from a SanitizedString,\
    \ to catch bugs like SQL injection vulnerabilities. By making SanitizedString\
    \ a NewType, I made sure that only properly sanitized strings were operated upon,\
    \ eliminating the chance of SQL injection.\n- Tracking a User object and LoggedInUser\
    \ separately. By restricting Users with NewType from LoggedInUser, I wrote functions\
    \ that only applicable to users that were logged in.\n- Tracking an integer that\
    \ should represent a valid User ID. By restricting the User ID to a NewType, I\
    \ could make sure that some functions were only operating on IDs that were valid,\
    \ without having to check if statements.\n\nIn XREF HERE, you’ll see how you can\
    \ use classes and invariants to do something very similar, with a much stronger\
    \ guarantee of avoiding illegal states. However, NewType is still a useful pattern\
    \ to be aware of, and is much more lightweight than a full-blown class.\n\n##\
    \ TYPE ALIASES\n\nNewType is not the same as a type alias. A type alias just provides\
    \ another name for a type and is completely interchangeable with the old type.\n\
    \nFor example:\n`IdOrName = Union[str, int]`\n\nIf a function expects `IDOrName`,\
    \ it can take either an `IDOrName`, or a `Union[str, int]` and it will typecheck\
    \ just fine, where a `NewType` will only work if a `IDOrName` is passed in.\n\n\
    I have found type aliases to be very helpful when I start nesting complex types,\
    \ such as `Union[Dict[int, User], List[Dict[str, User]]]`. It’s much easier to\
    \ give it a conceptual name, such as `IDOrNameLookup`, to simplify types.\n\n\
    ## Final Types\n\nFinally (pun intended), you may want to restrict a type from\
    \ changing its value. That’s where `Final` comes in. `Final`, introduced in Python\
    \ 3.8, indicates to a typechecker that a variable cannot be bound to another value.\
    \ For instance, I want to start franchising out my hot dog stand, but I don’t\
    \ want the name to be changed by accident.\n\n```python\nVENDOR_NAME: Final =\
    \ \"Viafore's Auto-Dog\"\n```\n\nIf a developer accidentally changed the name\
    \ later on, they would see an error.\n\n```python\ndef display_vendor_information():\n\
    \    vendor_info = \"Auto-Dog v1.0\"\n    # whoops, copy-paste error, this code\
    \ should be vendor_info +=\n    VENDOR_NAME\n    VENDOR_NAME += VENDOR_NAME\n\
    \    print(vendor_info)\n\ncode_examples/chapter4/invalid/final.py:3: error: Cannot\
    \ assign to\nfinal name \"VENDOR_NAME\"\nFound 1 error in 1 file (checked 1 source\
    \ file)\n```\n\nIn general, `Final` is best used when the variable's scope spans\
    \ a large amount of code, such as a module. It is difficult for developers to\
    \ keep track of all the uses of a variable in such large scopes; letting the typechecker\
    \ catch immutability guarantees is a boon in these cases.\n\n> **WARNING**\n\n\
    `Final` will not error out when mutating an object through a function. It only\
    \ prevents the variable from being rebound (set to a new value).\n\n## Wrap-up\n\
    \nYou've learned about many different ways to constrain your types in this chapter.\
    \ All of them serve a specific purpose, from handling `None` with `Optional` to\
    \ restricting to specific values with `Literal` to preventing a variable from\
    \ being rebound with `Final`. By using these techniques, you'll be able to encode\
    \ assumptions and restrictions directly into your codebase, preventing future\
    \ readers from needing to guess about your logic. Typecheckers will use these\
    \ advanced type annotations to provide you with stricter guarantees about your\
    \ code, which will give maintainers confidence when working in your codebase.\
    \ With this confidence, they will make less mistakes, and your codebase will become\
    \ more robust because of it.\n\nIn the next chapter, you'll move on from type\
    \ annotating single values, and learn how to properly annotate collection types.\
    \ Collection types pervade most of Python; you must take care to express your\
    \ intentions for them as well. You need to be well versed in all the ways you\
    \ can represent a collection, including in cases where you must create your own.\n\
    \n1 Null References: The Billion Dollar Mistake (QCon London 2009)"
  mdcn: "在等待工具支持 `Annotated` 的同时，还有另一种方式来表示更复杂的约束：**NewType**。**NewType** 允许你，嗯，创建一个新类型。\n\
    \n假设我想将我的热狗摊代码分开处理两种不同的情况：未准备好的热狗，以及准备好可以供应的热狗（已准备好的热狗）。然而，某些函数应该只处理其中一种状态的热狗。\n\
    \n例如：\n\n-   未准备好的热狗需要放入面包中，并且可以在上面添加调味品。\n-   已准备好的热狗需要放在盘子上，配上餐巾纸，然后提供给顾客。\n\
    \n例如，我们的装盘函数可能看起来像这样：\n\n```python\nclass HotDog:\n    # ... 省略热狗类实现 ...\n\ndef\
    \ place_on_plate(hotdog: HotDog):\n    # 注意，这里应该只接受已准备好的热狗。\n    # ...\n```\n\n\
    然而，语言本身并不阻止我们传入未准备好的热狗。如果开发者犯了错误，将未准备好的热狗传给这个函数，顾客会非常惊讶地看到他们的订单没有面包或调味品就从机器里出来了。\n\
    \n与其依赖开发者在每次发生错误时捕获它们，你需要一种让类型检查器捕获这些错误的方法。为此，你可以使用 **NewType**。\n\n```python\n\
    from typing import NewType\n\nclass HotDog:\n    '''用于表示未准备好的热狗'''\n    # ...\
    \ 省略热狗类实现 ...\n\nPreparedHotDog = NewType(HotDog)\n```\n\n```python\ndef place_on_plate(hotdog:\
    \ PreparedHotDog):\n    # ...\n```\n\n`NewType` 接受一个现有类型并创建一个全新的类型，该类型具有与现有类型相同的所有字段和方法。在这种情况下，我创建了一个与\
    \ `HotDog` 不同的类型 `PreparedHotDog`；它们不可互换。美妙之处在于，这种类型限制了隐式类型转换。你不能在任何期望 `PreparedHotDog`\
    \ 的地方使用 `HotDog`（不过，你可以在期望 `HotDog` 的地方使用 `PreparedHotDog`）。在上面的例子中，我将 `place_on_plate`\
    \ 限制为只接受 `PreparedHotDog` 值作为参数。这防止了开发者破坏假设。如果开发者将 `HotDog` 传给这个方法，类型检查器会向他们发出警告：\n\
    \n```\ncode_examples/chapter4/invalid/newtype.py:10: error: Argument 1 to\n\"\
    place_on_plate\" has incompatible type \"HotDog\"; expected\n\"PreparedHotDog\"\
    \n```\n\n必须强调这种类型转换的单向性。作为开发者，你可以控制你的旧类型何时变成新类型。例如，我将修改本章前面的一个函数：\n\n```python\n\
    def create_hot_dog() -> PreparedHotDog:\n    bun = dispense_bun()\n    if bun\
    \ is None:\n        print(\"Bun could not be dispensed\")\n        return\n  \
    \  hotdog = dispense_hotdog()\n    hotdog.place_in_bun(bun)\n    ketchup = dispense_ketchup()\n\
    \    mustard = dispense_mustard()\n    hotdog.add_condiments(ketchup, mustard)\n\
    \    return PreparedHotDog(hotdog)\n```\n\n注意我如何显式地返回一个 `PreparedHotDog` 而不是普通的热狗。这充当了一个“受认可”的函数；这是我希望开发者创建\
    \ `PreparedHotDog` 的唯一认可方式。任何尝试使用接受 `PreparedHotDog` 的方法的用户都需要首先使用 `create_hot_dog`\
    \ 创建一个热狗。\n\n重要的是要通知用户，创建你的新类型的唯一方式是通过一组“受认可”的函数。你不希望用户在预定的方法之外以任何其他方式创建你的新类型，因为这违背了目的。\n\
    \n```python\ndef make_snack():\n    place_on_place(PreparedHotDog(HotDog))\n```\n\
    \n不幸的是，Python 没有很好的方式来告诉用户这一点，除了注释。\n\n```python\nfrom typing import NewType\n\
    # 注意：仅使用 create_hot_dog 方法创建 PreparedHotDog。\nPreparedHotDog = NewType(HotDog)\n\
    ```\n\n尽管如此，`NewType` 仍然适用于许多现实世界的场景。例如，以下都是我遇到过的 `NewType` 可以解决的场景。\n\n-   将\
    \ `str` 与 `SanitizedString` 分开，以捕获诸如 SQL 注入漏洞之类的错误。通过将 `SanitizedString` 设为 `NewType`，我确保只有经过适当清理的字符串才会被操作，从而消除了\
    \ SQL 注入的可能性。\n-   分别跟踪 `User` 对象和 `LoggedInUser`。通过使用 `NewType` 限制 `User` 与 `LoggedInUser`，我编写了仅适用于已登录用户的函数。\n\
    -   跟踪一个应表示有效用户 ID 的整数。通过将用户 ID 限制为 `NewType`，我可以确保某些函数只对有效的 ID 进行操作，而无需检查 `if`\
    \ 语句。\n\n在 XREF HERE 中，你将看到如何使用类和不变式来实现非常相似的功能，并提供更强的避免非法状态的保证。然而，`NewType` 仍然是一个值得了解的有用模式，并且比完整的类轻量得多。\n\
    \n## 类型别名\n\n`NewType` 与类型别名不同。类型别名只是为类型提供另一个名称，并且与旧类型完全可互换。\n\n例如：\n`IdOrName\
    \ = Union[str, int]`\n\n如果一个函数期望 `IDOrName`，它可以接受 `IDOrName` 或 `Union[str, int]`，并且类型检查将正常进行，而\
    \ `NewType` 只有在传入 `IDOrName` 时才有效。\n\n我发现当我开始嵌套复杂类型时，类型别名非常有帮助，例如 `Union[Dict[int,\
    \ User], List[Dict[str, User]]]`。给它一个概念性的名称，例如 `IDOrNameLookup`，以简化类型要容易得多。\n\n\
    ## Final 类型\n\n最后（双关语），你可能希望限制一个类型不改变其值。这就是 `Final` 的用武之地。`Final` 在 Python 3.8\
    \ 中引入，向类型检查器表明一个变量不能被绑定到另一个值。例如，我想开始特许经营我的热狗摊，但我不希望名称被意外更改。\n\n```python\nVENDOR_NAME:\
    \ Final = \"Viafore's Auto-Dog\"\n```\n\n如果开发者后来不小心更改了名称，他们会看到一个错误。\n\n```python\n\
    def display_vendor_information():\n    vendor_info = \"Auto-Dog v1.0\"\n    #\
    \ 哎呀，复制粘贴错误，这段代码应该是 vendor_info +=\n    VENDOR_NAME\n    VENDOR_NAME += VENDOR_NAME\n\
    \    print(vendor_info)\n\ncode_examples/chapter4/invalid/final.py:3: error: Cannot\
    \ assign to\nfinal name \"VENDOR_NAME\"\nFound 1 error in 1 file (checked 1 source\
    \ file)\n```\n\n通常，`Final` 最适合用于变量作用域跨越大量代码的情况，例如模块。在如此大的作用域中，开发者很难跟踪变量的所有使用情况；让类型检查器捕获不可变性保证在这些情况下是一个福音。\n\
    \n> **警告**\n\n`Final` 在通过函数修改对象时不会报错。它只防止变量被重新绑定（设置为新值）。\n\n## 总结\n\n在本章中，你学习了许多不同的方式来约束你的类型。它们都有特定的目的，从使用\
    \ `Optional` 处理 `None`，到使用 `Literal` 限制为特定值，再到使用 `Final` 防止变量被重新绑定。通过使用这些技术，你将能够将假设和限制直接编码到你的代码库中，防止未来的读者需要猜测你的逻辑。类型检查器将使用这些高级类型注解为你提供关于代码的更严格保证，这将使维护者在处理你的代码库时充满信心。有了这种信心，他们会犯更少的错误，你的代码库也会因此变得更加健壮。\n\
    \n在下一章中，你将从注解单个值转向学习如何正确注解集合类型。集合类型遍布 Python 的大部分；你必须注意表达你对它们的意图。你需要精通所有表示集合的方式，包括在必须创建自己的集合的情况下。\n\
    \n1 Null References: The Billion Dollar Mistake (QCon London 2009)"
