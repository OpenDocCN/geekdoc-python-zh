    [RemoteCodeExecution] sink(s)\",\n        \"concise_description\":\n         \
    \   \"Possible shell injection [5001]: Data from [UserControlled] source(s) may\
    \ reach \" +\n            \"[RemoteCodeExecution] sink(s)\",\n        \"inference\"\
    : null,\n        \"define\": \"insecure.create_recipe\"\n    }\n]\n```\n\nIn order\
    \ to fix this, I either need to make this data flow impossible, or run tainted\
