    \ code so obtuse that it will be difficult to visually inspect it to understand\
    \ it.\n\nMaintainable code is code that, well, can be easily maintained. Maintenance\
    \ starts immediately after the first commit and continues until there is not a\
    \ single developer looking at the project anymore. Developers will be fixing bugs,\
    \ adding features, reading code, extracting code for use in other libraries, etc.\
    \ Maintainable code makes these tasks frictionless. Software lives for years,\
    \ if not decades, so you need to focus on maintainability *today*.\n\nYou don't\
    \ want to be the reason systems fail, whether you are actively working on them\
    \ or not. You need to be proactive in making your system stand the test of time.\
    \ You need a testing strategy to be your safety net, but you also need to be able\
    \ to avoid falling in the first place. So with all that in mind, I offer my definition\
    \ of robustness in terms of software:\n\n> Robust software is resilient and error-free,\
    \ in spite of constant change\n\n## Why Does Robustness Matter?\n\nA lot of energy\
    \ goes into making software do what it is supposed to. Development milestones\
    \ are not easily predicted. It doesn't help that you build something brand-new\
    \ just about every time. Human factors such as UX, accessibility and documentation\
    \ only increase the complexity. Now add in testing to ensure that you've covered\
    \ a slice of known and unknown behaviors, and you are looking at lengthy cycles.\n\
    \nThe purpose of software is to provide value. It is in stakeholder's interests\
    \ to deliver that full value as early as possible. Given the uncertainty around\
    \ some development schedules, there is often extra pressure to meet expectations.\
    \ We've all been on the wrong end of an unrealistic schedule or deadline. Unfortunately,\
    \ many of the tools to make software incredibly robust only add onto our development\
    \ cycle.\n\nThis does not mean that robust code is unimportant or \"not worth\
    \ it\". It's true that there is an inherent tension between immediate delivery\
    \ of value and making code robust. If your software is \"good enough\", why add\
    \ even more complexity? To answer that, consider how often that piece of software\
    \ will be iterated upon. Delivering software value is typically not a static exercise;\
    \ it’s rare that a system provides value and is never modified again. Software\
    \ is ever-evolving by its very nature. The codebase needs to be prepared to deliver\
    \ value frequently, and for long periods of time. This is where robust software\
    \ engineering practices come into play. If you can’t painlessly deliver features\
    \ quickly and without compromising quality, you need to re-evaluate techniques\
    \ to make your code more maintainable.\n\nIf you deliver your system late, or\
    \ broken, there are real-time costs that are incurred. Think through your codebase.\
    \ Ask yourself what happens if your code breaks a year from now because someone\
    \ wasn’t able to understand your code. How much value do you lose? Your value\
    \ might be measured in money, time, or even lives. Ask yourself what happens if\
    \ the value isn’t delivered on time? What are the repercussions? If the answers\
    \ to these questions are scary, good news, the work you’re doing is valuable.\
    \ But it also underscores why it’s so important to eliminate future errors.\n\n\
    You need to consider future developers. Multiple developers work on the same codebase\
    \ simultaneously. Many software projects will outlast most of those developers.\
    \ You need to find a way to communicate to the present and future developers,\
    \ without having the benefit of being there in person to explain. Future developers\
    \ will be building off of *your* decisions. Every false trail, every rabbit hole,\
    \ and every yak-shaving³ adventure will slow them down, which impedes value. You\
    \ need empathy for those who come after you. You need to step into your shoes.\
    \ This book is your gateway to thinking about your collaborators and maintainers.\
    \ You need to write code that lasts. The first step to making code that lasts\
    \ is being able to communicate through your code. You need to make sure future\
    \ developers understand your intent.\n\n## What’s Your Intent?\n\nWhy should you\
    \ strive to write clean code? Why should you care so much about robustness? The\
    \ heart of these answers lies in communication. You’re not delivering static systems;\
    \ software evolves and grows over time. Maintainers change over time. Your goal,\
    \ when writing code, is to deliver value, but it’s also to write your code in\
    \ such a way that other developers can deliver value just as quickly. In order\
    \ to do that, you need to be able to communicate reasoning and intent without\
    \ ever meeting your future maintainers.\n\nLet’s take a look at a code block found\
    \ in a hypothetical legacy system. I want you to estimate how long it takes for\
    \ you to understand what this code is doing. It’s okay if you’re not familiar\
    \ with all the concepts here, or if you feel like this code is convoluted (it\
    \ intentionally is!).\n\n```\n# Take a meal recipe and change the number of servings\n\
    # by adjusting each ingredient\n# A recipe's first element is the number of servings,\
    \ and the remainder\n# of elements is (name, amount, unit), such as (\"flour\"\
    , 1.5, \"cup\")\ndef adjust_recipe(recipe, servings):\n    new_recipe = [servings]\n\
    \    old_servings = recipe[0]\n    factor = servings / old_servings\n    recipe.pop(0)\n\
    \    while recipe:\n        ingredient, amount, unit = recipe.pop(0)\n       \
    \ # please only use numbers that will be easily measurable\n        new_recipe.append((ingredient,\
    \ amount * factor, unit))\n    return new_recipe\n```\n\nThis function takes a\
    \ recipe, and adjusts every ingredient to handle a new number of servings. However,\
    \ this code breeds many questions.\n\n- What is the `pop` for?\n- What does `recipe[0]`\
    \ signify? Why is that the old servings?\n- Why do I need a comment for numbers\
