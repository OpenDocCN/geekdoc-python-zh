- md: "your list.\n\nThese are the sort of decisions that will make you scratch your\
    \ head. We’ve all seen them in larger codebases. They aren’t written maliciously,\
    \ but organically over time with the best intentions. Functions start simple,\
    \ but as use cases grow and multiple developers contribute, that code tends to\
    \ morph and obscure original intent. This is a sure sign that maintainability\
    \ is suffering. You need to express intent in your code upfront.\n\nSo what if\
    \ the original author made use of better naming patterns and better type usage?\
    \ What would that code look like?\n\n```python\n# Take a meal recipe and change\
    \ the number of servings\n# recipe should be a Recipe class\ndef adjust_recipe(recipe,\
    \ servings):\n    new_ingredients = list(recipe.ingredients)\n    recipe.clear_ingredients()\n\
    \n    for ingredient in new_ingredients:\n        ingredient.adjust_proportion(Fraction(servings,\n\
    \            recipe.servings))\n    return Recipe(servings, new_ingredients)\n\
    ```\n\nThis looks much better, and expresses original intent clearly. The original\
    \ developer encoded their ideas directly into the code. From this snippet, you\
    \ know the following is true:\n\n-   I am using a `Recipe` class. This allows\
    \ me to abstract away certain operations. Presumably, inside the class itself,\
    \ there is an invariant that allows for duplicate ingredients. (I’ll talk more\
    \ about classes and invariants in Chapter 5.) This provides a common vocabulary\
    \ that makes the function’s behavior more explicit.\n-   Servings are now an explicit\
    \ part of a recipe class, rather than needing to be the first element of the list,\
    \ which was handled as a special case. This greatly simplifies calling code, and\
    \ prevents inadvertent collisions.\n-   It is very apparent that I want to clear\
    \ out ingredients on the old recipe. No ambiguous reason for why I needed to do\
    \ a `.pop(0)`.\n-   Ingredients are a separate class, and handle fractions rather\
    \ than an explicit float. It’s clearer for all involved that I am dealing with\
    \ fractional units, and can easily do things such as `limit_denominator()`, which\
    \ can be called when people want to restrict measuring units (instead of relying\
    \ on a comment).\n\nI’ve replaced fields with types, such as a recipe type and\
    \ an ingredient type. I’ve also defined operations (`clear_ingredients`, `adjust_proportion`)\
    \ to communicate my intent. By making these changes, I’ve made the code’s behavior\
    \ crystal clear to future readers. They no longer have to come talk to me to understand\
    \ the code. Instead, they comprehend what I’m doing without ever talking to me.\
    \ This is *asynchronous communication* at its finest.\n\n## Asynchronous Communication\n\
    \nIt’s weird talking about asynchronous communication in a Python book without\
    \ mentioning `async` and `await`. But I’m afraid I have to talk about asynchronous\
    \ communication in a much more complex place: *the real world*.\n\nAsynchronous\
    \ communication means that producing information and consuming that information\
    \ are independent of each other. There is a time gap between the production and\
    \ consumption. It might be a few hours, as is the case of collaborators in different\
    \ time zones. Or it might be years, as future maintainers try to do a deep dive\
    \ into the inner workings of code. You can’t predict when somebody will need to\
    \ understand your logic. You might not even be working on that codebase (or for\
    \ that company) by the time they consume the information you produced.\n\nContrast\
    \ that with *synchronous communication*. Synchronous communication is when people\
    \ talk face-to-face (in-person or otherwise) and share knowledge. This form of\
    \ direct communication is one of the best ways to express your thoughts, but unfortunately,\
    \ it doesn’t scale, and you won’t always be around to answer questions.\n\nIn\
    \ order to evaluate how appropriate each method of communication is when trying\
    \ to understand intentions, I’ll look at two axes: proximity and cost.\n\nProximity\
    \ is how close in time the communicators need to be in order for that communication\
    \ to be fruitful. Some methods of communication excel with real-time transfer\
    \ of information. Other methods of communication excel at communicating years\
    \ later.\n\nCost is the measure of effort to communicate. You must weigh the time\
    \ and money expended to communicate with the value provided. Your future consumers\
    \ then have to weigh the cost of consuming the information with the value they\
    \ are trying to deliver. Writing code and not providing any other communication\
    \ channels is your baseline; you have to do this to produce value. To evaluate\
    \ additional communication channel’s cost, here is what I factor in:\n\n-   Discoverability:\
    \ How easy was it to find this information outside of a normal workflow? How ephemeral\
    \ is the knowledge? Is it easy to search for information?\n-   Maintenance Cost:\
    \ How accurate is the information? How often does it need to be updated? What\
    \ goes wrong if this information is out of date?\n-   Production Cost: How much\
    \ time and money went into producing the communication?\n\nIn Figure 1-1, I plotted\
    \ some common communication methods’ cost and proximity required.\n\n![Figure\
    \ 1-1. Plotting Cost and Proximity of Communication Methods](img/b136c318777181835dbab42f383e392c_14_0.png)\n\
    \nFigure 1-1. Plotting Cost and Proximity of Communication Methods\n\nThere are\
    \ 4 quadrants that make up the cost/proximity graph.\n\n## Low Cost, High Proximity\
    \ Required\n\nThese are cheap to produce and consume, but are not scalable across\
    \ time. Direct communication and instant messaging are great examples of these\
    \ methods. Treat these as snapshots of information in time; they are only valuable\
    \ when the user is actively listening. Don’t rely on these methods to communicate\
    \ to the future.\n\n## High-cost, High Proximity Required\n\nThese are costly\
    \ events, and often only happen once (such as meetings or conferences). There\
    \ should be a lot of value delivered through these events at the time of communication,\
    \ because they do not provide much value to the future. How many times have you\
    \ been to a meeting that felt like a waste of time? This is direct loss of value\
    \ you are feeling. Talks require a multiplicative cost for each attendee (time\
    \ spent, hosting space, logistics, etc.). Code reviews are rarely looked at once\
    \ they are done.\n\n## High Cost, Low Proximity Required\n\nThese are costly,\
    \ but that cost can be paid back over time in value delivered, due to the low\
    \ proximity needed. Emails and agile boards contain a wealth of information, but\
    \ are not discoverable by others. These are great for bigger concepts that don’t\
    \ need frequent updates. It becomes a nightmare to try and sift through all the\
    \ noise just to find the nugget of information you are looking for. Video recordings\
    \ and design documentation are great for understanding snapshots in time, but\
    \ are costly to keep updated. Don’t rely on these communication methods to understand\
    \ day-to-day decisions.\n\n## Low Cost, Low Proximity Required\n\nThese are cheap\
    \ to create, and are easily consumable. Code comments, version control history\
    \ and project READMES all fall into this category, since they are adjacent to\
    \ the source code we write. Users can view this communication years after it was\
    \ produced. Anything that is in a developer’s workflow will become easily discoverable.\
    \ These communication methods are a natural fit for the first place someone will\
    \ look after the source code. However, your code is one of your best documentation\
    \ tools, as it is the living record and single source of truth for your system.\n\
    \n> ### DISCUSSION TOPIC\n\nThis plot was created based on generalized use cases\
    \ - think about the communication paths you and your organization uses. Where\
    \ would you plot them on the graph? How easy is it to consume accurate information?\
    \ How costly is it to produce information? Your answers to these questions may\
    \ result in a slightly different graph, but the single source of truth will be\
    \ in the executable software you deliver.\n\nLow cost, low proximity communication\
    \ methods are the best tool for communicating to the future. You should strive\
    \ to minimize the cost of production and of consumption of communication. You\
    \ have to write software to deliver value anyway, so the lowest cost option is\
    \ making your code your primary communication tool. Your codebase becomes the\
    \ best possible option for expressing your decisions, opinions, and workarounds\
    \ clearly.\n\nHowever, for this assertion to hold true, the code has to be cheap\
    \ to consume as well. Your intent has to come across clearly in your code. Your\
    \ goal is to minimize the time needed for a reader of your code to understand\
    \ it. Ideally, a reader does not need to read your implementation, but just your\
    \ function signature. Through the use of good types, comments and variable names,\
    \ it should be crystal clear what your code does.\n\n> ### SELF-DOCUMENTING CODE\n\
    \nThe wrong response to this plot is “Self-documenting code is all I need!” Every\
    \ communication path provides value that code alone won’t be able to. Version\
    \ control will give you a history of changes. Design Documents discuss sweeping\
    \ ideals that are not local to any one code file. Meetings (when done right) can\
    \ be an important event for synchronizing plan execution. You should absolutely\
    \ strive for code to be self-documenting, but realize that just handles *what*\
    \ the code is doing. Don’t disparage any other communication path.\n\nThe other\
    \ quadrants of communication are still valuable. Design"
  mdcn: "你的列表。\n\n这些都是会让你挠头的决策。我们在大型代码库中都见过它们。它们并非恶意编写，而是随着时间推移，在良好初衷下有机地演变而来。函数起初很简单，但随着用例增长和多位开发者的贡献，代码往往会变形并模糊了原始意图。这无疑是可维护性受损的明确信号。你需要在代码中预先表达意图。\n\
    \n那么，如果原作者使用了更好的命名模式和更好的类型用法会怎样？那段代码会是什么样子？\n\n```python\n# Take a meal recipe\
    \ and change the number of servings\n# recipe should be a Recipe class\ndef adjust_recipe(recipe,\
    \ servings):\n    new_ingredients = list(recipe.ingredients)\n    recipe.clear_ingredients()\n\
    \n    for ingredient in new_ingredients:\n        ingredient.adjust_proportion(Fraction(servings,\n\
    \            recipe.servings))\n    return Recipe(servings, new_ingredients)\n\
    ```\n\n这看起来好多了，并且清晰地表达了原始意图。原开发者将他们的想法直接编码到了代码中。从这段代码片段中，你知道以下几点是真实的：\n\n-   我正在使用一个\
    \ `Recipe` 类。这使我能够抽象掉某些操作。可以推测，在类本身内部，存在一个允许重复食材的不变量。（我将在第5章更详细地讨论类和不变量。）这提供了一个共同的词汇表，使函数的行为更加明确。\n\
    -   现在，份量是食谱类的一个显式部分，而不需要作为列表的第一个元素来处理，后者曾被当作特殊情况处理。这极大地简化了调用代码，并防止了无意的冲突。\n-\
    \   很明显，我想清除旧食谱上的食材。没有模糊的理由解释为什么我需要执行 `.pop(0)`。\n-   食材是一个单独的类，并处理分数而不是显式的浮点数。对于所有相关方来说，我正在处理分数单位这一点更加清晰，并且可以轻松地执行诸如\
    \ `limit_denominator()` 之类的操作，当人们想要限制计量单位时可以调用它（而不是依赖注释）。\n\n我用类型替换了字段，例如食谱类型和食材类型。我还定义了操作（`clear_ingredients`、`adjust_proportion`）来传达我的意图。通过做出这些改变，我使代码的行为对未来读者来说变得一清二楚。他们不再需要来找我来理解代码。相反，他们无需与我交谈就能理解我在做什么。这是*异步沟通*的绝佳体现。\n\
    \n## 异步沟通\n\n在一本 Python 书中谈论异步沟通而不提及 `async` 和 `await` 是很奇怪的。但我恐怕不得不在一个更复杂的环境中谈论异步沟通：*现实世界*。\n\
    \n异步沟通意味着信息的产生和信息的消费彼此独立。在生产和消费之间存在时间间隔。可能是几个小时，就像不同时区的协作者那样。也可能是几年，就像未来的维护者试图深入研究代码的内部工作原理时那样。你无法预测何时会有人需要理解你的逻辑。当他们消费你产生的信息时，你可能甚至已经不在那个代码库（或那家公司）工作了。\n\
    \n与之相对的是*同步沟通*。同步沟通是人们面对面（亲自或其他方式）交谈并分享知识。这种直接沟通的形式是表达思想的最佳方式之一，但不幸的是，它无法扩展，而且你不会总是在场回答问题。\n\
    \n为了评估在试图理解意图时每种沟通方法的适用性，我将考察两个维度：接近度和成本。\n\n接近度是指沟通者需要在时间上多接近才能使沟通富有成效。有些沟通方法擅长实时信息传递。其他沟通方法则擅长在多年后进行沟通。\n\
    \n成本是沟通所需努力的衡量。你必须权衡沟通所花费的时间和金钱与所提供的价值。你未来的消费者则必须权衡消费信息的成本与他们试图传递的价值。编写代码而不提供任何其他沟通渠道是你的基线；你必须这样做才能产生价值。为了评估额外沟通渠道的成本，我考虑以下因素：\n\
    \n-   可发现性：在正常工作流程之外找到这些信息有多容易？知识的持久性如何？信息是否易于搜索？\n-   维护成本：信息有多准确？需要多久更新一次？如果信息过时会出什么问题？\n\
    -   生产成本：生产沟通投入了多少时间和金钱？\n\n在图 1-1 中，我绘制了一些常见沟通方法的成本和所需的接近度。\n\n![图 1-1. 绘制沟通方法的成本和接近度](img/b136c318777181835dbab42f383e392c_14_0.png)\n\
    \n图 1-1. 绘制沟通方法的成本和接近度\n\n成本/接近度图由 4 个象限组成。\n\n## 低成本，高接近度要求\n\n这些方法生产成本低，消费成本也低，但无法跨时间扩展。直接沟通和即时消息是这些方法的绝佳例子。将它们视为时间点上的信息快照；它们仅在用户积极倾听时才有价值。不要依赖这些方法向未来沟通。\n\
    \n## 高成本，高接近度要求\n\n这些是昂贵的事件，通常只发生一次（例如会议或会议）。在沟通时应该通过这些事件传递大量价值，因为它们对未来提供的价值不大。你有多少次参加过感觉浪费时间的会议？这就是你感受到的价值直接损失。演讲需要为每位参与者付出乘数成本（花费的时间、举办场地、后勤等）。代码审查完成后很少再被查看。\n\
    \n## 高成本，低接近度要求\n\n这些方法成本高昂，但由于所需的接近度低，其成本可以随着时间的推移通过传递的价值来偿还。电子邮件和敏捷看板包含大量信息，但不易被他人发现。这些方法非常适合不需要频繁更新的更大概念。试图从所有噪音中筛选出你正在寻找的信息片段会变成一场噩梦。视频录像和设计文档非常适合理解时间点上的快照，但保持更新的成本很高。不要依赖这些沟通方法来理解日常决策。\n\
    \n## 低成本，低接近度要求\n\n这些方法创建成本低，且易于消费。代码注释、版本控制历史和项目 README 都属于这一类，因为它们与我们编写的源代码相邻。用户可以在信息产生多年后查看这些沟通。任何在开发者工作流程中的内容都将变得易于发现。这些沟通方法非常适合人们在查看源代码后首先寻找的地方。然而，你的代码是你最好的文档工具之一，因为它是系统的活记录和唯一真实来源。\n\
    \n> ### 讨论主题\n\n此图是基于通用用例创建的——思考一下你和你的组织使用的沟通路径。你会将它们绘制在图上的哪个位置？消费准确信息有多容易？生产信息的成本有多高？你对这些问题的答案可能会导致一个略有不同的图表，但唯一的真实来源将是你交付的可执行软件中。\n\
    \n低成本、低接近度的沟通方法是向未来沟通的最佳工具。你应该努力最小化沟通的生产和消费成本。无论如何你都必须编写软件来传递价值，因此最低成本的选择是让你的代码成为你的主要沟通工具。你的代码库成为清晰表达你的决策、意见和解决方法的最佳选择。\n\
    \n然而，为了使这一主张成立，代码也必须易于消费。你的意图必须在代码中清晰地传达出来。你的目标是最大限度地减少代码读者理解它所需的时间。理想情况下，读者不需要阅读你的实现，而只需阅读你的函数签名。通过使用良好的类型、注释和变量名，你的代码功能应该一清二楚。\n\
    \n> ### 自文档化代码\n\n对此图的错误反应是“自文档化代码就是我所需要的一切！”每条沟通路径都提供了代码本身无法提供的价值。版本控制将为你提供变更历史。设计文档讨论的是不局限于任何单个代码文件的广泛理想。会议（如果做得正确）可以是同步计划执行的重要事件。你绝对应该努力使代码自文档化，但要意识到这仅处理了代码*正在做什么*。不要贬低任何其他沟通路径。\n\
    \n其他沟通象限仍然有价值。设计"
