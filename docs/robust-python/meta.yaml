  md: "```\ndef serve(snack):\n    # if something went wrong, return early\n    if\
    \ snack.disposed_of:\n        return\n    # ...\n```\n\nIn this case, a developer\
    \ is checking `disposed_of` without checking for the non-zero error code first.\
    \ This is a logic bomb waiting to happen. This code will work completely fine\
    \ as long as `disposed_of` is true *and* the error code is non-zero. If a valid\
    \ snack ever sets the `disposed_of` flag to `True` erroneously, this code will\
