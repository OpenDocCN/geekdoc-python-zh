    \ Python 代码时遇到的一些常见错误？\n\n## 集合\n\n当你选择一个集合时，你是在传达特定的信息。你必须为手头的任务选择正确的集合。否则，维护者会从你的代码中推断出错误的意图。\n\
    \n考虑这段代码，它接收一个食谱书列表，并统计每位作者出现的次数：\n\n```python\ndef create_author_count(cookbooks:\
