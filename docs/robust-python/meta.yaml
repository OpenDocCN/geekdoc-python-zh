  - "[PAGE 20]\n\nJSON or YAML\n\n+   - Operations on a sequence that specifically\
    \ deal with fixed chunks ( such as always splitting after the third element, or\
    \ checking for a specific character in a fixed-format string)\n- Performance reasons\
    \ for a specific collection type\n\nIn contrast, *dynamic indexing* is whenever\
    \ you index into a collection with a variable that is not known until runtime.\
    \ This is the most appropriate choice for lists, and dictionaries. You'll see\
    \ this when iterating over collections or searching for a specific element with\
    \ a `index()` function..\n\nThese are basic collections, but there are more ways\
    \ to express intent. Here are some special collection types that are even more\
    \ expressive in communicating to the future:\n\n*frozenset*\n\na set that is immutable.\n\
    \n*OrderedDict*\n\na dictionary that preserves order of elements based on insertion\
    \ time\n\n*defaultdict*\n\nA dictionary that provides a default value if the key\
    \ is missing. For example, I could rewrite my earlier example as follows:\n\n\
    ```\nfrom collections import defaultdict\ndef create_author_count(cookbooks: List[Cookbook]):\n\
    \    counter = defaultdict(lambda: 0)\n    for cookbook in cookbooks:\n      \
    \  counter[cookbook.author] += 1\n    return counter\n```\n\nThis introduces a\
    \ new behavior for end users - if they query the dictionary for a value that doesn't\
    \ exist, they will receive a 0. This might be beneficial in some use cases, but\
    \ if it not, you just return `dict(counter)` instead."
  - "[PAGE 21]\n\n# Counter\n\na special type of dictionary used for counting how\
    \ many times an element appears. This greatly simplifies our above code to the\
    \ following:\n\n```\nfrom collections import Counter\ndef create_author_count(cookbooks:\
    \ List[Cookbook]):\n    return Counter(book.author for book in cookbooks)\n```\n\
    \n> **NOTE**\nBuilt-in dictionaries are also ordered from CPython 3.6 and Python\
    \ 3.7 onwards.\n\nTake a minute to reflect on that last example. Notice how using\
    \ a Counter gives us much more concise code without sacrificing readability. If\
    \ your readers are familiar with Counter, the meaning of this function (and how\
    \ the implementation works) is immediately apparent. This is a great example of\
    \ communicating intent to the future through better selection of collection types.\
    \ I’ll continue to explore collections further in Chapter 5.\n\nThere are plenty\
    \ more types to explore, such as array, bytes, ranges and more. Whenever you come\
    \ across a new collection type, built-in or otherwise, ask yourself how it differs\
    \ from other collections and what it conveys to future readers.\n\n# Iteration\n\
    \nIteration is another example where the abstraction you choose dictates the intent\
    \ you convey.\n\nHow many times have you seen code like this?\n\n```\ntext = \"\
    This is some generic text\"\nindex = 0\nwhile index < len(text):\n    print(text[index])\n\
    \    index += 1\n```\n\nThis simple code prints each character on a separate line.\
    \ This is perfectly fine"
- md: "for a first pass at Python for this problem, but the solution quickly evolves\
    \ into the more Pythonic:\n\n```\nfor character in text:\n    print(character)\n\
    ```\n\nor even more simply:\n\n```\nprint(\"\\n\".join(text))\n```\n\nTake a moment\
    \ and reflect on why these last two options are preferable. In the `join()` case,\
    \ it is because I am using a named abstraction of a loop (which again, communicates\
    \ intent clearly). But even the for loop is clearer than the while loop. It’s\
    \ because the for loop is the more appropriate choice for my use case. Just like\
    \ collection types, the looping construct you select explicitly communicates different\
    \ concepts. Here’s a list of looping constructs and what they convey:\n\n*For-loops*\n\
    \n    For loops are used for iterating over each element in a collection or range\
    \ and performing an action/side effect\n\n*While-loops*\n\n    While loops are\
    \ used for iterating until a certain condition occurs\n\n*Comprehensions*\n\n\
    \    Comprehensions are used for transforming one collection into another (normally\
    \ does not have side effects, especially if the comprehension is lazy)\n\n*Recursion*\n\
    \n    Recursion is used when the sub-structure of a collection is identical to\
    \ the structure of a collection (for example, each child of a tree is also a tree).\n\
    \nYou want each line of your codebase to deliver value. Furthermore, you want\
    \ each line to clearly communicate what that value is to future developers. This\
    \ drives a need to minimize any amount of boilerplate, scaffolding, and superfluous\
    \ code. In the example above, I am iterating over each element and performing\
    \ a side-effect (printing an element), which makes the for loop an ideal looping\
    \ construct. I am not wasting code. In contrast, the while loop requires us to\
    \ explicitly track looping until a certain condition occurs. In other words, I\
    \ need to track a specific condition, and mutate a variable every iteration. This\
    \ distracts from the value the loop provides, and provides unwanted cognitive\
    \ burden.\n\n## Law of Least Surprise\n\nDistractions from intent are bad, but\
    \ there’s a class of communication that is even worse: when code actively surprises\
    \ your future collaborators. You want to adhere to the *Law of Least Surprise*.\
    \ When someone reads through the codebase, they should almost never be surprised\
    \ at behavior or implementation (and when they are surprised, there should be\
    \ a great comment near the code to explain why it is that way). This is why communicating\
    \ intent is paramount. Clear and clean code lowers chances for miscommunication.\n\
    \n> **NOTE**\n\nThe *Law Of Least Surprise*, also known as the *Law of Least Astonishment*\
    \ states that a program should always respond to the user in the way that astonishes\
    \ them the least⁴. Surprising behavior leads to confusion. Confusion leads to\
    \ misplaced assumptions. Misplaced assumptions lead to bugs. And that is how you\
    \ get unreliable software.\n\nBear in mind, you can write completely correct code\
    \ and still surprise someone in the future. There was one nasty bug I was chasing\
    \ early in my career that crashed due to corrupted memory. Putting the code under\
    \ a debugger or putting too many print statements in affected timing such that\
    \ the bug would not manifest (a true “heisenbug⁵“). There were literally thousands\
    \ of lines of code that related to this bug.\n\nSo I had to do a manual bisect,\
    \ splitting the code in half, see which half actually had the crash by removing\
    \ the other half, and then do it all over again in that code half. After two weeks\
    \ of tearing my hair out, I finally decided to inspect an innocuous sounding function\
    \ called getEvent. It turns out that this function was actually *setting* an event\
    \ with invalid data. Needless to say, I was very surprised.\n\nThe function was\
    \ completely correct in what it was doing, but because I missed the intent of\
    \ the code, I overlooked the bug for at least three days. Surprising your readers\
    \ will cost their time.\n\nA lot of this surprise ends up coming from complexity.\
    \ There are two types of complexity: *necessary complexity* and *accidental complexity*.\
    \ Necessary complexity is the complexity inherent in your domain. Deep learning\
    \ models are necessarily complex - they are not something you browse through the\
    \ inner workings of and understand in a few minutes. Optimizing Object-Relational\
    \ Mapping is necessarily complex - there is a large variety of possible user inputs\
    \ that have to be accounted for. You won’t be able to remove necessary complexity,\
    \ so your best bet is to make sure it doesn’t sprawl across your codebase.\n\n\
    In contrast, accidental complexity is the complexity that produces superfluous,\
    \ wasteful or confusing statements in code. It’s what happens when a system evolves\
    \ over time and developers are jamming features in without re-evaluating old code\
    \ to see if their original assertions hold true. I once worked on a project where\
    \ adding a single command line option (and associated means of programmatically\
    \ setting it) touched no fewer than 10 files. Why would adding one simple value\
    \ ever need to require changes all over the codebase?\n\nYou know you have accidental\
    \ complexity if you’ve ever experienced the following:\n\n- Things that sound\
    \ simple (adding users, changing a UI control, etc.) are non-trivial to implement\n\
    - Difficulty onboarding new developers into understanding your codebase. New developers\
    \ on a project are your best indicators of how maintainable your code is right\
    \ now - no need to wait years.\n- Estimates for adding functionality are always\
    \ high, and you slip the schedule anyway.\n\nRemove accidental complexity and\
    \ isolate your necessary complexity wherever possible. Those will be the stumbling\
    \ blocks for your future collaborators. These sources of complexity compound miscommunication,\
    \ as they obscure and diffuse intent throughout the codebase.\n\n> ### DISCUSSION\
    \ TOPIC\n\nWhat accidental complexities do you have in your codebase? How challenging\
    \ would it be to understand simple concepts if you were dropped into the codebase\
    \ with no communication to other developers? What can you do to simplify those\
    \ complexities (especially if they are in often-changing code)?\n\nThroughout\
    \ the rest of the book, I will look at different techniques in Python to make\
    \ our systems more robust. This book is broken up into 4 parts\n\n## *Part 1*\n\
    \nI’ll start with types in Python. Types are fundamental to the language, but\
    \ are not often delved into. The types you choose matter, as these convey a very\
    \ specific intent. I’ll talk about type annotations and what specific annotations\
    \ communicate to the developer. I’ll also go over typecheckers and how those help\
    \ catch bugs early.\n\n## *Part 2*\n\nAfter talking about how to think about Python’s\
    \ types, I’ll focus on how to create your own types. I’ll talk about enumerations,\
    \ dataclasses and classes in depth. I’ll explore how making certain design choices\
    \ in designing a type can increase or decrease the robustness of your code.\n\n\
    ## *Part 3*\n\nNow that you’ve learned how to communicate your intentions, I’ll\
    \ focus on how to enable users to change your code effortlessly. You will learn\
    \ how to take that strong foundation, and let others build with confidence. I’ll\
    \ cover extensibility, dependencies, and architectural patterns that allow you\
    \ to modify your system with minimal impact.\n\n## *Part 4*\n\nLastly, I’ll explore\
    \ about how to build a safety net, so that you can gently catch your future collaborators\
    \ when they do fall. Their confidence will increase, knowing that they have a\
    \ strong, robust system that they can fearlessly adapt to their use case. I’ll\
    \ cover a variety of static analysis and testing tools that will help you catch\
    \ rogue behavior.\n\n## Wrap-up\n\nRobust code matters. Clean code matters. Your\
    \ code needs to be maintainable for the entire lifetime of the codebase, and in\
    \ order to do that, you need to put active foresight into what you are communicating\
    \ and how. You need to clearly embody your knowledge as close to the code as possible.\
    \ It will feel like a burden to continuously look forward, but with practice it\
    \ becomes natural, and you start reaping the gains as you work in your own codebase.\n\
    \nEvery abstraction, every line, and every choice in a codebase communicates something,\
    \ whether intentional or not. I encourage you to think about each line of code\
    \ you are writing and ask yourself “What will a future developer learn from this?”.\
    \ You owe it to future maintainers to be able to deliver value at the same speed\
    \ that you can today. Otherwise, your codebase will get bloated, schedules will\
    \ slip, and complexity will grow. It is your job as a developer to mitigate that\
    \ risk.\n\nLook for potential hotspots, such as incorrect abstractions (such as\
    \ collections or iteration) or accidental complexity. These are prime areas where\
    \ communication can break down over time. If these are areas that change often,\
    \ these are a priority to address now.\n\nIn the next chapter, you’re going to\
    \ take what you learned from this chapter, and apply it to a fundamental Python\
    \ concept: types. The types you choose express your intent to future developers,\
    \ and picking the correct type is just as important as picking the correct abstraction.\n\
    \n1. 1980 Turing Award Lecture “The Emperor’s Old Clothes”\n2. https://www.merriam-webster.com/dictionary/robust\n\
    3. Yak-Shaving describes the situation where you frequently have to solve unrelated\
    \ problems before you can even begin to tackle the original problem to solve.\
    \ You can learn about the origins of the term at https://seths.blog/2005/03/dont_shave_that/\n\
    4. Geoffry James, The Tao of Programming\n5. A bug that displays different behavior\
    \ when being observed. SIGSOFT ’83: Proceedings of the ACM SIGSOFT/SIGPLAN software\
    \ engineering symposium on High-level debugging"
  mdcn: "对于这个问题，Python的初步实现可能是这样的，但解决方案很快会演变成更符合Python风格的写法：\n\n```\nfor character\
    \ in text:\n    print(character)\n```\n\n或者更简洁地：\n\n```\nprint(\"\\n\".join(text))\n\
    ```\n\n花点时间思考一下为什么后两种方案更优。在`join()`的例子中，是因为我使用了一个命名的循环抽象（这再次清晰地传达了意图）。但即使是for循环也比while循环更清晰。这是因为for循环是针对我的用例更合适的选择。就像集合类型一样，你选择的循环结构明确地传达了不同的概念。以下是一些循环结构及其传达的含义：\n\
    \n*For循环*\n\n    For循环用于遍历集合或范围中的每个元素并执行一个操作/副作用\n\n*While循环*\n\n    While循环用于迭代直到某个条件发生\n\
    \n*列表推导式*\n\n    列表推导式用于将一个集合转换为另一个集合（通常没有副作用，特别是当推导式是惰性求值时）\n\n*递归*\n\n    递归用于集合的子结构与集合结构相同的情况（例如，树的每个子节点也是一棵树）。\n\
    \n你希望代码库的每一行都能提供价值。此外，你还希望每一行都能清晰地向未来的开发者传达这个价值是什么。这驱动了对最小化任何样板代码、脚手架和多余代码的需求。在上面的例子中，我遍历每个元素并执行一个副作用（打印一个元素），这使得for循环成为理想的循环结构。我没有浪费代码。相比之下，while循环要求我们显式地跟踪循环直到某个条件发生。换句话说，我需要跟踪一个特定的条件，并在每次迭代中修改一个变量。这分散了循环提供的价值，并带来了不必要的认知负担。\n\
    \n## 最小惊讶原则\n\n偏离意图的干扰是糟糕的，但有一类沟通甚至更糟：当代码主动让你未来的协作者感到惊讶。你需要遵循*最小惊讶原则*。当有人阅读代码库时，他们几乎不应该对行为或实现感到惊讶（当他们惊讶时，代码附近应该有一个很好的注释来解释为什么是这样）。这就是为什么传达意图至关重要。清晰简洁的代码降低了误解的可能性。\n\
    \n> **注意**\n\n*最小惊讶原则*，也称为*最小惊奇原则*，指出程序应该总是以最不令用户惊讶的方式做出响应⁴。令人惊讶的行为会导致困惑。困惑会导致错误的假设。错误的假设会导致bug。这就是你得到不可靠软件的方式。\n\
    \n请记住，你可以编写完全正确的代码，但仍然会让未来的人感到惊讶。在我职业生涯早期，我曾追踪过一个因内存损坏而崩溃的讨厌bug。将代码放在调试器下或添加过多的print语句会影响时序，导致bug无法显现（一个真正的“海森bug⁵”）。与这个bug相关的代码实际上有数千行。\n\
    \n所以我不得不进行手动二分查找，将代码分成两半，通过移除另一半来查看哪一半确实有崩溃，然后在那一半代码中重复这个过程。经过两周的抓狂之后，我终于决定检查一个听起来无害的函数，名为getEvent。结果发现这个函数实际上是在用无效数据*设置*一个事件。不用说，我非常惊讶。\n\
    \n这个函数在它所做的事情上是完全正确的，但由于我忽略了代码的意图，我至少忽略了这个bug三天。让你的读者惊讶会浪费他们的时间。\n\n很多这种惊讶最终源于复杂性。复杂性有两种类型：*必要复杂性*和*意外复杂性*。必要复杂性是你的领域固有的复杂性。深度学习模型必然是复杂的——你无法在几分钟内浏览其内部工作原理并理解它。优化对象关系映射必然是复杂的——需要考虑大量可能的用户输入。你无法消除必要复杂性，所以你最好的选择是确保它不会在你的代码库中蔓延。\n\
    \n相比之下，意外复杂性是产生多余、浪费或令人困惑的代码语句的复杂性。当系统随时间演变，开发者在不重新评估旧代码以查看其原始断言是否仍然成立的情况下强行添加功能时，就会发生这种情况。我曾经参与过一个项目，添加一个简单的命令行选项（以及相关的编程设置方式）涉及不少于10个文件。为什么添加一个简单的值需要在整个代码库中进行更改？\n\
    \n如果你经历过以下情况，你就知道你有意外复杂性：\n\n- 听起来很简单的事情（添加用户、更改UI控件等）实现起来并不简单\n- 新开发者难以理解你的代码库。项目中的新开发者是你当前代码可维护性的最佳指标——无需等待多年。\n\
    - 添加功能的估算总是很高，而且你仍然会错过进度。\n\n尽可能消除意外复杂性并隔离你的必要复杂性。这些将成为你未来协作者的绊脚石。这些复杂性来源会加剧误解，因为它们在代码库中模糊和扩散了意图。\n\
    \n> ### 讨论主题\n\n你的代码库中有哪些意外复杂性？如果你被投入到代码库中而没有与其他开发者沟通，理解简单概念会有多大的挑战？你能做些什么来简化这些复杂性（特别是如果它们在经常更改的代码中）？\n\
    \n在本书的其余部分，我将探讨Python中使我们的系统更健壮的不同技术。本书分为4个部分\n\n## *第1部分*\n\n我将从Python中的类型开始。类型是语言的基础，但通常不被深入探讨。你选择的类型很重要，因为它们传达了非常具体的意图。我将讨论类型注解以及特定注解向开发者传达的内容。我还将介绍类型检查器以及它们如何帮助及早发现bug。\n\
    \n## *第2部分*\n\n在讨论了如何思考Python的类型之后，我将重点介绍如何创建你自己的类型。我将深入探讨枚举、数据类和类。我将探索在设计类型时做出某些设计选择如何增加或减少代码的健壮性。\n\
    \n## *第3部分*\n\n既然你已经学会了如何传达你的意图，我将重点介绍如何让用户轻松更改你的代码。你将学习如何利用坚实的基础，让其他人有信心地构建。我将涵盖可扩展性、依赖关系和架构模式，这些允许你以最小的影响修改你的系统。\n\
    \n## *第4部分*\n\n最后，我将探讨如何构建一个安全网，以便在你未来的协作者跌倒时能够温柔地接住他们。他们的信心会增加，因为他们知道他们有一个强大、健壮的系统，可以无所畏惧地适应他们的用例。我将涵盖各种静态分析和测试工具，这些工具将帮助你捕捉异常行为。\n\
    \n## 总结\n\n健壮的代码很重要。简洁的代码很重要。你的代码需要在整个代码库的生命周期内保持可维护性，为了做到这一点，你需要积极地预见你正在传达什么以及如何传达。你需要尽可能清晰地将你的知识体现在代码中。持续向前看会感觉像是一种负担，但通过练习它会变得自然，当你在自己的代码库中工作时，你开始收获成果。\n\
    \n代码库中的每一个抽象、每一行和每一个选择都在传达某些东西，无论是否有意。我鼓励你思考你正在编写的每一行代码，并问自己“未来的开发者会从中学到什么？”。你有责任让未来的维护者能够以你今天的速度提供价值。否则，你的代码库会变得臃肿，进度会延误，复杂性会增长。作为开发者，你的工作就是减轻这种风险。\n\
    \n寻找潜在的热点，例如不正确的抽象（如集合或迭代）或意外复杂性。这些是随着时间的推移沟通可能中断的主要领域。如果这些是经常更改的领域，那么现在就是优先处理的领域。\n\
    \n在下一章中，你将运用本章所学的内容，并将其应用于一个基本的Python概念：类型。你选择的类型向未来的开发者表达了你的意图，选择正确的类型与选择正确的抽象同样重要。\n\
    \n1. 1980年图灵奖演讲“皇帝的新衣”\n2. https://www.merriam-webster.com/dictionary/robust\n\
    3. Yak-Shaving描述了你经常不得不解决不相关的问题，然后才能开始处理原始问题的情况。你可以在https://seths.blog/2005/03/dont_shave_that/了解该术语的起源\n\
    4. Geoffry James，《编程之道》\n5. 一种在被观察时表现出不同行为的bug。SIGSOFT ’83：ACM SIGSOFT/SIGPLAN软件工程研讨会关于高级调试的会议录"
