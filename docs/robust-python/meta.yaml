- md: "## Type Annotate New Code Only\n\nConsider leaving your current, un-annotated\
    \ code the way it is and annotate code based on these two rules:\n\n- 1. Annotate\
    \ any new code that you write\n- 2. Annotate any old code that you change\n\n\
    Throughout time, you’ll build out your type annotations in all code except code\
    \ that hasn’t been changed in a long time. Code that hasn’t been changing is relatively\
    \ stable, and is probably not read too often. Type annotating it is not likely\
    \ to gain you much benefit.\n\n## Type Annotate From The Bottom Up\n\nYour codebase\
    \ may depend on common areas of code. These are your core libraries and utilities\
    \ that serve as a foundation upon which everything else is built upon. Type annotating\
    \ these parts of your codebase makes your benefit less about depth and more about\
    \ breadth. Because so many other pieces sit atop this foundation, they will all\
    \ reap the benefits of typechecking. New code will quite often depend on these\
    \ utilities as well, so your new code will have an extra layer of protection.\n\
