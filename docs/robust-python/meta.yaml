  md: 'care about it. I’ll go through how your communication method implies certain
    benefits and drawbacks, and how best to represent your intentions. The Zen of
    Python states that *there should be one-- and preferably only one — obvious way
    to do it*. You’ll learn how to evaluate if your code is the obvious way or not,
    and what you can do to fix it. First, I need to talk basics. What is *robustness*
    in the first place?


    # Robustness


    # What Does “Robust” Mean?


    Every book needs at least one dictionary definition, so I’ll get this out of the
    way nice and early in the book. Merriam-Webster offers many definitions for *robustness*
    ²:


    +   1. having or exhibiting strength or vigorous health

    2. having or showing vigor, strength, or firmness

    3. strongly formed or constructed

    4. capable of performing without failure under a wide range of conditions


    These are fantastic descriptions of what we are aiming for. We want a *healthy*
    system, one that stays bug-free for years. We want our software to *exhibit strength*;
    it should be obvious that this code will stand the test of time. We want a *strongly
    constructed* system, one that is built upon solid foundations. Crucially, we want
    a system that is *capable of performing without failure*; we don’t want the system
    to be fragile or brittle as conditions change.


    It is common to think of a software like a skyscraper, some grand structure that
    stands as a bulwark against all change and a paragon of immortality. The truth
    is, unfortunately messier. Software systems constantly evolve. Bugs are fixed,
    user interfaces get tweaked, features are added, removed, and then re-added. Frameworks
    shift, components go out of date, security bugs arise. Software changes. It is
    more akin to handling sprawl with city planning than it is building a static building.
    With ever changing codebases, how can you make your code robust? How can you build
    a strong foundation that is resilient to bugs?'
  merge: -1
  pgno: 5
- img_proc: true
  md: 'The truth is, you have to accept the change. Your code will be split apart,
    stitched together and reworked. New use cases will alter huge swaths of code.
    And that’s okay. Embrace it. Understand that it’s not enough that your code can
    easily be changed; it might be best for it to be deleted and rewritten as it goes
