    \ and inspect/modify them so that they can be trusted. Pysa allows you decorate\
    \ functions with `@sanitize` to specify your sanitizers.⁴\n\nThis was admittedly\
    \ a simple example, but Pysa allows you to annotate your codebase to catch more\
    \ complicated problems (such as SQL injection and cookie mismanagement). To learn\
    \ everything that Pysa can do (as well as built-in common security flaws), check\
    \ out the [complete documentation](https://pysa.pyre.dev/).\n\n## Pyright\n\n\
    [Pyright](https://github.com/microsoft/pyright) is a typechecker designed by Microsoft.\
    \ I have found it to be the most configurable of typecheckers I’ve come across.\
    \ If you would like more control than your current typechecker, explore the [Pyre\
    \ configuration documentation](https://pyre-check.org/docs/configuration/) for\
    \ all that you can do. However, Pyright has an additional awesome feature: VS\
    \ Code Integration.\n\nVS Code (also built by Microsoft) is an immensely popular\
    \ code editor for developers. Microsoft leveraged the ownership of both tools\
    \ to create a VS Code extension called [Pylance](https://marketplace.visualstudio.com/items?itemName=ms-python.vscode-pylance).\
    \ You can install Pylance from your VS Code Extensions browser. Pylance is built\
