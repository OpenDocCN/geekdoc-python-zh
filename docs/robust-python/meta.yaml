    At its core, computers are all about binary code. Your processor doesn’t speak
    Python, all it sees are the presence or absence of electrical current on circuits
    going through it. Same goes for what’s in your computer memory.


    Suppose your memory looked like the following


    00110010100001001000010100100100010010001000001010100101

    010101010000001111111100100101001111101001001010010001

    0010100`010100000100000101010100``101001001001000101010001010010

    010101010010010010010000111101010110101101001010111`


    Looks like a bunch of gibberish. Let’s zoom in on the part that I’ve bolded:


    *01010000 01000001 01010100*


    There is no way to tell exactly what this number means by itself. Depending on
    computer architecture it is plausible that this could represent the number 5259604
    or 5521744. It could also be the string “PAT”. Without any sort of context, you
    can’t know for certain. This is why computers need types. Type information gives
    Python what it needs to know to make sense of all the ones and zeroes. Let’s see
    it in action:


    ```

    from ctypes import string_at

    from sys import getsizeof

    from binascii import hexlify


    a = 0b01010000_01000001_01010100

    print(a)

    >>> 5259604


    # prints out the memory of the variable

    print(hexlify(string_at(id(a), getsizeof(a))))

    >>> b''0100000000000000607c054995550000010000000000000054415000''


    text = "PAT"

    print(hexlify(string_at(id(text), getsizeof(text))))

    >>>b''0100000000000000a00f0649955500000300000000000000375c9f1f02acdbe4e

    5379218b77f00000000000000000000050415400''

    ```


    > NOTE

    I am running CPython 3.9.0 on a little-endian machine, so if you see different
    results, don’t worry, there are subtle things that can change your answers. (This
    code is not guaranteed to run on other Python implementations such as Jython or
    PyPy).'
  - '[PAGE 30]


    These hex-strings display the actual memory of a Python object. You’ll find pointers
    to the next and previous object in a linked list (for garbage collection purposes),
    a reference count, a type, and the actual data itself. You can see the bytes at
    the end of each returned value to see the number or string (look for the bytes
    0x544150 or 0x504154). The important part of this is that there is a type encoded
    into that memory. When Python looks at a variable, it knows exactly what type
    everything is at runtime (such as when you use the `type()` function.)


    It’s easy to think that this is the only reason for types - the computer needs
    to know how to interpret various blobs of memory. It is important to be aware
    of how Python uses types, as it has some implications for writing robust code,
    but even more important is the second representation: semantic representation.


    # Semantic Representation


    While the first definition of types is great for lower-level programming, it’s
    the second definition that applies to every developer. Types, in addition to having
    a mechanical representation, also manifest a semantic representation. A semantic
    representation is a communication tool; the types you choose communicate information
    across time and space to a future developer.


    Types tell a user what behaviors they can expect about that entity. These behaviors
    are the operations that you associate with that type (plus any pre-conditions
    or post-conditions). They are the boundaries, constraints, and freedoms that a
    user interacts with whenever they use that type. Types used correctly have low
    barriers to understanding; they become natural to use. Conversely, types used
    poorly are a hindrance.


    Consider the lowly int. Take a minute to think about what behaviors an integer
    has in Python. Here’s a quick (non-comprehensive) list I came up with:


    +   - Constructible from integers, floats, or strings

    - Mathematical operations such as addition, subtraction, division, multiplication,
    exponentiation and negation

    - Relational comparison such as <, >, ==, and !='
  - '[PAGE 31]


    +   - Bitwise operations (manipulating individual bits of a number) such as &,
    |, ^, ~, and shifting

    - Convertible to a string using str or repr functions

    - Able to be rounded through ceil, floor, round methods (even though these return
    the integer itself, these are supported methods).


    An **int** has many behaviors. You can view the full list if you if you type `help(int)`
    into your REPL.


    Now consider a datetime:


    ```

    >>> import datetime

    >>> datetime.datetime.now()

    datetime.datetime(2020, 9, 8, 22, 19, 28, 838667)

    ```


    A datetime is not that different from an int. Typically it’s represented as a
    number of seconds or milliseconds from some epoch of time (such as January 1st,
    1970). But think about the behaviors a datetime has:


    +   - Constructible from a **string, or a set of integers representing day/month/year/etc**

    - Mathematical Operations such as addition and subtraction of **Time Deltas**

    - Relational comparison

    - **No bitwise operations available**

    - Convertible to a string using str or repr functions

    - **Is not** able to be rounded through ceil, floor, round methods


    Datetimes support addition and subtraction, but not of other datetimes. We only
    add time deltas (such as adding a day or subtracting a year). Multiplying and
    dividing really don’t make sense for a datetime. Similarly, rounding dates is
    not a supported operation in the standard library. However, datetimes do offer
    comparison and string formatting operations with similar semantics to an integer.
    So even though datetime is at heart an integer, it contains a constrained subset
    of operations.'
- md: '## Typing Systems


    As discussed earlier in the chapter, a type system aims to give a user some way
    to model the behaviors and constraints in the language. Programming languages
    set expectations about how their specific type system works, both during code
    construction and runtime.


    ### Strong vs. Weak


    Typing systems are classified on a spectrum from weak to strong.


    Languages towards the stronger side of the spectrum tend to restrict the use of
    operations to the types that support them. In other words, if you break the semantic
    representation of the type, you are told (sometimes quite loudly) through a compiler
    error or a runtime error. Languages such as Haskell, TypeScript, Rust are all
    considered strongly typed. Proponents advocate strongly typed languages because
    errors are more apparent when building or running code.


    In contrast, languages towards the weaker side of the spectrum will not restrict
    the use of operations to the types that support them. Types are often coerced
    into a different type to make sense of an operation. Languages such as JavaScript,
    Perl, and older versions of C are weakly typed. Proponents advocate the speed
    in which it takes to quickly iterate on code, without fighting the language along
    the way.


    Python falls towards the stronger side of the spectrum. There are very few implicit
    conversions that happen between types. It is noticeable when you perform illegal
    operations:


    ```python

    >>> [] + {}

    TypeError: can only concatenate list (not "dict") to list


    >>> {} + []

    TypeError: unsupported operand type(s) for +: ''dict'' and list

    ```


    Contrast that with a weakly typed language, such as JavaScript:


    ```javascript

    >>> [] + {}

    "[object Object]"


    >>> {} + []

    0

    ```


    In terms of robustness, a strongly typed language such as Python certainly helps
    us out. While errors still will show up at runtime instead of at development time,
    they still will show up in a very obvious `TypeError` exception. This reduces
    the time taken to debug issues significantly, again allowing you to deliver incremental
    value quicker.


    > **ARE WEAKLY-TYPED LANGUAGES INHERENTLY NOT ROBUST?**

    >

    > Codebases in weakly-typed languages can absolutely be robust; by no means am
    I dumping on those languages. Consider the sheer amount of production-grade JavaScript
    that the world runs on. However, a weakly typed language requires extra care to
    be robust. Developers come to rely very heavily on linters, tests, and other tools
    to improve maintainability. I’ll talk more about this in Part 4 of this book,
    Building a Safety Net.


    ### Dynamic vs. Static


    There is another typing spectrum I need to discuss: static vs dynamic typing.
    This is fundamentally a difference in handling mechanical representation of types.


    Languages that offer static typing embed their typing information in variables
    during build time. Developers may explicitly add type information to variables
    or some tool such as a compiler infers types for the developer. Variables do not
    change their type at runtime (hence the name static.) Proponents of static typing
    tout the ability to write safe code out of the gate and to benefit from a strong
    safety net.


    Dynamic typing, on the other hand, embeds type information with the value or variable
    itself. Variables can change types at runtime quite easily, because there is no
    type information tied to that variable. Proponents of dynamic typing advocate
    the flexibility and speed that it takes to develop; there’s nowhere near as much
    fighting with compilers.


    Python is a dynamically typed language. As you saw during the discussion about
    mechanical representation, you saw that there was type information embedded inside
    the values of a variable. Python has no qualms about changing the type of a variable
    at runtime:


    ```python

    >>> a = 5

    >>> a = "string"

    >>> a

    "string"


    >>> a = tuple()

    ()

    ```


    Unfortunately, the ability to change types at runtime is a hindrance to robust
    code in many cases. You cannot make strong assumptions about a variable throughout
    its lifetime. As assumptions are broken, it’s easy to write unstable assumptions
    on top of them, leading to a ticking logic bomb in your code.


    ---


    > **NOTE**

    >

    > *Semantics* refers to the meaning of an operation. While `str(int)` and `str(datetime.datetime.now())`
    will return different formatted strings, the meaning is the same: I am creating
    a string from a value.

    >

    > Datetimes also support their own behaviors, to further distinguish them from
    integers. These include:

    >

    > - Changing values based on time zones

    > - Being able to control the format of strings

    > - Finding what weekday it is

    >

    > Again, if you''d like a full list of behaviors, type `import datetime; help(datetime.datetime)`
    into your REPL.

    >

    > Datetimes are more specific than an integer. They convey a more specific use
    case than just a plain old number. When you choose to use a more specific type,
    you are telling future contributors that there are operations that are possible
    and constraints to be aware of that aren’t present in the less specific type.

    >

    > Let''s dive into how this ties into robust code. Say you inherit a codebase
    that handles the opening and closing of a completely automated kitchen. You need
    to add in functionality to extend a kitchen''s hours on holidays.

    >

    > ```python

    > def close_kitchen_if_past_cutoff_time(point_in_time):

    >     if point_in_time >= closing_time():

    >         close_kitchen()

    >         log_time_closed(point_in_time)

    > ```

    >

    > You know you need to be operating on `point_in_time`, but how do you get started?
    What type are you even dealing with? Is it a string, integer, datetime, or some
    custom class? What operations are you allowed to perform on `point_in_time`? You
    didn''t write this code, and you have no history with it. The same problems exist
    if you want to call the code as well. You have no idea what is legal to pass into
    this function.

    >

    > If you make a wrong assumption one way or the other, and that code makes it
    to production, you’ve made the code less robust. Maybe that code doesn’t lie on
    a codepath that is executed often. Maybe some other bug is hiding this code from
    being run. Maybe there aren’t a whole lot of tests around this piece of code,
    and it becomes a runtime error later on. No matter what, there is a bug lurking
    in the code, and you’ve decreased maintainability.

    >

    > Responsible developers do their best to not have bugs hit production. They will
    search for tests, documentation (with a grain of salt, of course — documentation
    can go out of date quickly), or calling code. They will look at `closing_time()`
    and `log_time_closed()` to see what types they expect or provide, and plan accordingly.
    This is a correct path in this case, but I still consider it a suboptimal path.
    While an error won’t reach production, they are still expending time in looking
    through the code, which prevents value from being delivered as quickly. With such
    a small example, you would be forgiven for thinking that this isn’t that big a
    problem if it happens once. But beware of “death by a thousand cuts”: any one
    slice isn’t too detrimental on its own, but thousands piled up and strewn across
    a codebase will leave you limping along, trying to deliver code.

    >

    > The root cause is that the semantic representation was not clear for the parameter.
    So as you write code, do what you can to express your intent through types. You
    can do it as a comment where needed, but I recommend using type annotations (supported
    in Python 3.5+) to explain parts of your code.

    >

    > ```python

    > def close_kitchen_if_past_cutoff_time(point_in_time: datetime.datetime):

    >     if point_in_time >= closing_time():

    >         close_kitchen()

    >         log_time_closed(point_in_time)

    > ```

    >

    > All I need to do is put in a `: <type>` after my variables in the function signature.
    Most of my code examples in this book will annotate the types to make it clear
    what type I’m expecting.

    >

    > Now, as developers come across this code, they will know what’s expected of
    `point_in_time`. They don’t have to look through other methods, tests or documentation
    to know how to manipulate the variable. They have a crystal-clear clue on what
    to do, and they can get right to work performing the modifications they need to
    do. You are conveying semantic representation to future developers, without ever
    directly talking to them.

    >

    > Furthermore, as developers use a type more and more, they become familiar with
    it. They won’t need to look up documentation or `help()` to use that type when
    they come across it. You begin to create a vocabulary of well-known types across
    your codebase. This lessens the burden of maintenance. When a developer is modifying
    existing code, they want to focus on the changes they need to make, without getting
    bogged down.

    >

    > Semantic representation of a type is extremely important, and the rest of Part
    1 of this book will be dedicated to covering how you can use types to your advantage.
    Before I move on though, I need to talk about some fundamental choices Python
    has made as a language, and how they impact codebase robustness.

    >

    > **DISCUSSION TOPIC**

    >

    > Think about types used in your codebase. Pick a few and ask yourself what their
    semantic representations are. Enumerate their constraints, use cases and behaviors.
    Could you be using these types in more places? Are there places where you are
    misusing types?'
  mdcn: '## 类型系统


    正如本章前面所讨论的，类型系统旨在为用户提供某种方式来建模语言中的行为和约束。编程语言对其特定类型系统的工作方式设定了期望，无论是在代码构建期间还是运行时。


    ### 强类型与弱类型


    类型系统根据从弱到强的谱系进行分类。


    倾向于强类型谱系的语言倾向于将操作限制在支持它们的类型上。换句话说，如果你破坏了类型的语义表示，你会通过编译器错误或运行时错误被告知（有时声音很大）。像 Haskell、TypeScript、Rust
    这样的语言都被认为是强类型的。支持者强烈主张使用强类型语言，因为在构建或运行代码时，错误会更加明显。


    相反，倾向于弱类型谱系的语言不会将操作限制在支持它们的类型上。类型通常会被强制转换为不同的类型以理解操作。像 JavaScript、Perl 和旧版本的 C
    这样的语言是弱类型的。支持者主张快速迭代代码的速度，而无需与语言本身作斗争。


    Python 倾向于强类型谱系。类型之间发生的隐式转换非常少。当你执行非法操作时，这一点很明显：


    ```python

    >>> [] + {}

    TypeError: can only concatenate list (not "dict") to list


    >>> {} + []

    TypeError: unsupported operand type(s) for +: ''dict'' and list

    ```


    与弱类型语言（如 JavaScript）相比：


    ```javascript

    >>> [] + {}

    "[object Object]"


    >>> {} + []

    0

    ```


    在健壮性方面，像 Python 这样的强类型语言确实对我们有帮助。虽然错误仍然会在运行时而不是开发时显示，但它们仍然会以非常明显的 `TypeError`
    异常显示。这显著减少了调试问题的时间，再次让你能够更快地交付增量价值。


    > **弱类型语言天生就不健壮吗？**

    >

    > 弱类型语言的代码库完全可以是健壮的；我绝不是在贬低这些语言。想想世界上运行的大量生产级 JavaScript。然而，弱类型语言需要额外的注意才能保持健壮。开发者严重依赖
    linters、测试和其他工具来提高可维护性。我将在本书的第 4 部分“构建安全网”中更详细地讨论这一点。


    ### 动态类型与静态类型


    我需要讨论另一个类型谱系：静态类型与动态类型。这本质上是处理类型机械表示方式的差异。


    提供静态类型的语言在构建时将类型信息嵌入到变量中。开发者可以显式地向变量添加类型信息，或者某些工具（如编译器）为开发者推断类型。变量在运行时不会改变其类型（因此得名静态）。静态类型的支持者宣扬能够从一开始就编写安全代码，并受益于强大的安全网。


    另一方面，动态类型将类型信息嵌入到值或变量本身中。变量在运行时可以很容易地改变类型，因为没有类型信息绑定到该变量。动态类型的支持者倡导开发的灵活性和速度；与编译器的斗争要少得多。


    Python 是一种动态类型语言。正如你在讨论机械表示时所看到的，你看到变量的值内部嵌入了类型信息。Python 对于在运行时改变变量的类型毫无顾虑：


    ```python

    >>> a = 5

    >>> a = "string"

    >>> a

    "string"


    >>> a = tuple()

    ()

    ```


    不幸的是，在许多情况下，在运行时改变类型的能力是健壮代码的障碍。你无法在整个生命周期中对变量做出强烈的假设。当假设被打破时，很容易在它们之上编写不稳定的假设，导致代码中出现定时逻辑炸弹。


    ---


    > **注意**

    >

    > *语义*指的是操作的含义。虽然 `str(int)` 和 `str(datetime.datetime.now())` 会返回不同格式的字符串，但含义是相同的：我正在从一个值创建一个字符串。

    >

    > 日期时间还支持它们自己的行为，以进一步区分它们与整数。这些包括：

    >

    > - 根据时区更改值

    > - 能够控制字符串的格式

    > - 查找是星期几

    >

    > 同样，如果你想获得完整的行为列表，请在你的 REPL 中输入 `import datetime; help(datetime.datetime)`。

    >

    > 日期时间比整数更具体。它们传达的用例比一个普通的数字更具体。当你选择使用更具体的类型时，你是在告诉未来的贡献者，存在一些可能的操作和需要注意的约束，而这些在较不具体的类型中是不存在的。

    >

    > 让我们深入探讨这如何与健壮的代码联系起来。假设你继承了一个处理完全自动化厨房开关门的代码库。你需要添加在节假日延长厨房营业时间的功能。

    >

    > ```python

    > def close_kitchen_if_past_cutoff_time(point_in_time):

    >     if point_in_time >= closing_time():

    >         close_kitchen()

    >         log_time_closed(point_in_time)

    > ```

    >

    > 你知道你需要对 `point_in_time` 进行操作，但你该如何开始？你甚至在处理什么类型？它是字符串、整数、日期时间还是某个自定义类？你被允许对
    `point_in_time` 执行哪些操作？你没有编写这段代码，而且你对它没有任何历史记录。如果你想调用这段代码，同样的问题也存在。你不知道传递什么给这个函数是合法的。

    >

    > 如果你做出了错误的假设，并且这段代码进入了生产环境，你就降低了代码的健壮性。也许这段代码不在经常执行的代码路径上。也许其他一些 bug 阻止了这段代码运行。也许这段代码周围没有很多测试，后来变成了运行时错误。无论如何，代码中潜伏着一个
    bug，你降低了可维护性。

    >

    > 负责任的开发者尽最大努力不让 bug 进入生产环境。他们会搜索测试、文档（当然要持保留态度——文档可能很快过时）或调用代码。他们会查看 `closing_time()`
    和 `log_time_closed()` 以了解它们期望或提供什么类型，并相应地进行规划。在这种情况下，这是一个正确的路径，但我仍然认为这是一个次优的路径。虽然错误不会到达生产环境，但他们仍然花费时间查看代码，这阻碍了价值的快速交付。对于这样一个小例子，如果它只发生一次，你会被原谅认为这不是什么大问题。但要警惕“千刀万剐”：任何一刀本身都不会造成太大损害，但成千上万刀堆积并散布在代码库中，会让你步履蹒跚，试图交付代码。

    >

    > 根本原因是参数的语义表示不清晰。因此，当你编写代码时，尽你所能通过类型来表达你的意图。你可以在需要时将其作为注释，但我建议使用类型注解（Python 3.5+
    支持）来解释代码的某些部分。

    >

    > ```python

    > def close_kitchen_if_past_cutoff_time(point_in_time: datetime.datetime):

    >     if point_in_time >= closing_time():

    >         close_kitchen()

    >         log_time_closed(point_in_time)

    > ```

    >

    > 我需要做的就是在函数签名中的变量后面加上 `: <type>`。本书中的大多数代码示例都会注解类型，以清楚地表明我期望的类型。

    >

    > 现在，当开发者遇到这段代码时，他们会知道对 `point_in_time` 的期望。他们不必查看其他方法、测试或文档来知道如何操作变量。他们有一个非常清晰的线索知道该做什么，并且可以立即开始执行他们需要的修改。你正在向未来的开发者传达语义表示，而无需直接与他们交谈。

    >

    > 此外，随着开发者越来越多地使用一种类型，他们会变得熟悉它。当他们遇到该类型时，他们将不需要查阅文档或 `help()` 来使用它。你开始在代码库中创建一个众所周知的词汇表。这减轻了维护的负担。当开发者修改现有代码时，他们希望专注于他们需要进行的更改，而不会陷入困境。

    >

    > 类型的语义表示极其重要，本书第一部分的其余部分将专门介绍如何利用类型为你服务。不过，在我继续之前，我需要讨论 Python 作为一门语言做出的一些基本选择，以及它们如何影响代码库的健壮性。

    >

    > **讨论主题**

    >

    > 思考你代码库中使用的类型。挑选几个，问问自己它们的语义表示是什么。列举它们的约束、用例和行为。你能在更多地方使用这些类型吗？是否存在你误用类型的地方？'
