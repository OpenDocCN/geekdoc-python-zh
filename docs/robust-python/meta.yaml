  md: 'Figure 1-1. Plotting Cost and Proximity of Communication Methods


    There are 4 quadrants that make up the cost/proximity graph.


    # Low Cost, High Proximity Required


    These are cheap to produce and consume, but are not scalable across time. Direct
    communication and instant messaging are great examples of these methods. Treat
    these as snapshots of information in time; they are only valuable when the user
    is actively listening. Don’t rely on these methods to communicate to the future.


    # High-cost, High Proximity Required


    These are costly events, and often only happen once (such as meetings or conferences).
    There should be a lot of value delivered through these events at the time of communication,
    because they do not provide much value to the future. How many times have you
    been to a meeting that felt like a waste of time? This is direct loss of value
    you are feeling. Talks require a multiplicative cost for each attendee (time spent,
    hosting space, logistics, etc.). Code reviews are rarely looked at once they are
    done.


    # High Cost, Low Proximity Required


    These are costly, but that cost can be paid back over time in value delivered,
    due to the low proximity needed. Emails and agile boards contain a wealth of information,
    but are not discoverable by others. These are great for bigger concepts that don’t
    need frequent updates. It becomes a nightmare to try and sift through all the
    noise just to find the nugget of information you are looking for. Video recordings
    and design documentation are great for understanding snapshots in time, but are
    costly to keep updated. Don’t rely on these communication methods to understand
    day-to-day decisions.


    # Low Cost, Low Proximity Required


    These are cheap to create, and are easily consumable. Code comments, version control
    history and project READMES all fall into this category, since they are adjacent
    to the source code we write. Users can view this communication years after it
    was produced. Anything that is in a developer’s workflow will become easily discoverable.
    These communication methods'
