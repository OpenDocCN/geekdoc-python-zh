  md: 'When running mypy, mypy looks in your current directory for a configuration
    file named `mypy.ini`. This file will define which options you have set up for
    the project. Some options will be global, applied to every file, and other options
    will be per-module. A sample `mypy.ini` file might look as follows:


    ```

    # Global options:


    [mypy]

    python_version = 3.9

    warn_return_any = True


    # Per-module options:


    [mypy-mycode.foo.*]

    disallow_untyped_defs = True


    [mypy-mycode.bar]

    warn_return_any = False


    [mypy-somelibrary]

    ignore_missing_imports = True

    ```


    > TIP

    You can use the `--config-file` command line option to specify config files in
    different places. Also, mypy will look for configuration files in specific home
    directories if it can''t find a local config file, in case you want the same settings
    across multiple projects. For more information, check out the [mypy documentation](https://mypy.readthedocs.io/en/stable/config_file.html).


    I''ll cover some of the important options that you need to be aware of; they will
    help you control the behavior you want out of your typechecker. As a note, I won''t
    cover too much more about the configuration file. Most options that I''ll talk
    about work in both a configuration file and on the command line, and for the sake
    of simplicity, I''ll show you how to run the commands on mypy invocations.


