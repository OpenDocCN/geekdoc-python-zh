    # Wrap-up


    Type annotations are incredibly useful, but there is no denying their cost. The
    larger the codebase, the higher the cost will be for practically adopting type
    annotations. Every codebase is different; you need to evaluate the value and cost
    of type annotations for your specific scenario. If type annotations are too costly
    to adopt, consider three strategies to get past that hurdle:


    *Find Pain Points*


    If you can eliminate entire classes of pain points through type annotations, such
    as errors, broken tests or unclear code, you will save time and money. You target
    the areas that hurt the most, and by lessening that pain, you are making it easier
    for developers to deliver value over time (which is a sure sign of maintainable
    code).


    *Target Code Strategically*


