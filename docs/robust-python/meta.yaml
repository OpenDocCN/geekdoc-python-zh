    \ using create_hot_dog method.\nPreparedHotDog = NewType(HotDog)\n```\n\nStill,\
    \ NewType is applicable to many real-world scenarios. For example, these are all\
    \ scenarios that I’ve run into that a NewType would solve.\n\n+   - Separating\
    \ a str from a SanitizedString, to catch bugs like SQL injection vulnerabilities.\
    \ By making SanitizedString a NewType, I made sure that only properly sanitized\
    \ strings were operated upon, eliminating the chance of SQL injection.\n- Tracking\
    \ a User object and LoggedInUser separately. By restricting Users with NewType\
    \ from LoggedInUser, I wrote functions that only applicable to users that were\
    \ logged in.\n- Tracking an integer that should represent a valid User ID. By\
    \ restricting the User ID to a NewType, I could make sure that some functions\
    \ were only operating on IDs that were valid, without having to check if statements.\n\
    \nIn XREF HERE, you’ll see how you can use classes and invariants to do something\
    \ very similar, with a much stronger guarantee of avoiding illegal states. However,\
    \ NewType is still a useful pattern to be aware of, and is much more lightweight\
    \ than a full-blown class."
  - "[PAGE 72]\n\n# TYPE ALIASES\n\nNewType is not the same as a type alias. A type\
    \ alias just provides another name for a type and is completely interchangeable\
    \ with the old type.\n\nFor example\n`IdOrName = Union[str, int]`\n\nIf a function\
    \ expects `IDOrName`, it can take either an `IDOrName`, or a `Union[str, int]`\
    \ and it will typecheck just fine, where a `NewType` will only work if a `IDOrName`\
    \ is passed in.\n\nI have found type aliases to be very helpful when I start nesting\
    \ complex types, such as `Union[Dict[int, User], List[Dict[str, User]]]`. It’s\
    \ much easier to give it a conceptual name, such as `IDOrNameLookup`, to simplify\
    \ types.\n\n# Final Types\n\nFinally (pun intended), you may want to restrict\
    \ a type from changing it’s value. That’s where `Final` comes in. `Final`, introduced\
    \ in Python 3.8, indicates to a typechecker that a variable cannot be bound to\
    \ another value. For instance, I want to start franchising out my hot dog stand,\
    \ but I don’t want the name to be changed by accident.\n\n```\nVENDOR_NAME: Final\
    \ = \"Viafore's Auto-Dog\"\n```\n\nIf a developer accidentally changed the name\
    \ later on, they would see an error.\n\n```\ndef display_vendor_information():\n\
    \    vendor_info = \"Auto-Dog v1.0\"\n    # whoops, copy-paste error, this code\
    \ should be vendor_info +=\n    VENDOR_NAME\n    VENDOR_NAME += VENDOR_NAME\n\
    \    print(vendor_info)\n\ncode_examples/chapter4/invalid/final.py:3: error: Cannot\
    \ assign to\nfinal name \"VENDOR_NAME\"\nFound 1 error in 1 file (checked 1 source\
    \ file)\n```"
  - '[PAGE 73]


    In general, `Final` is best used when the variable''s scope spans a large amount
    of code, such as a module. It is difficult for developers to keep track of all
    the uses of a variable in such large scopes; letting the typechecker catch immutability
    guarantees is a boon in these cases.


    > **WARNING**


    `Final` will not error out when mutating an object through a function. It only
    prevents the variable from being rebound (set to a new value)


    # Wrap-up


    You''ve learned about many different ways to constrain your types in this chapter.
    All of them serve a specific purpose, from handling `None` with `Optional` to
    restricting to specific values with `Literal` to preventing a varible from being
    rebound with `Final`. By using these techniques, you''ll be able to encode assumptions
    and restrictions directly into your codebase, preventing future readers from needing
    to guess about your logic. Typecheckers will use these advanced type annotations
    to provide you with stricter guarantees about your code, which will give maintainers
    confidence when working in your codebase. With this confidence, they will make
    less mistakes, and your codebase will become more robust because of it.


    In the next chapter, you''ll move on from type annotating single values, and learn
    how to properly annotate collection types. Collection types pervade most of Python;
    you must take care to express your intentions for them as well. You need to be
    well versed in all the ways you can represent a collection, including in cases
    where you must create your own.


    1 Null References: The Billion Dollar Mistake (QCon London 2009)'
- md: "## Chapter 5. Collection Types\n\n> ### A NOTE FOR EARLY RELEASE READERS\n\n\
    With Early Release ebooks, you get books in their earliest form—the author’s raw\
    \ and unedited content as they write—so you can take advantage of these technologies\
    \ long before the official release of these titles.\n\nThis will be the 5th chapter\
    \ of the final book. Please note that the GitHub repo will be made active later\
    \ on.\n\nIf you have comments about how we might improve the content and/or examples\
    \ in this book, or if you notice missing material within this chapter, please\
    \ reach out to the author at *pat@kudzera.com*.\n\nYou can’t go very far in Python\
    \ without encountering *collection types*. Collection types store a grouping of\
    \ data, such as a list of users, or a lookup between restaurant or address. Whereas\
    \ other types (ints, floats, bools) may focus on a single value, collections may\
    \ store any arbitrary amount of data. In Python, you will encounter common collection\
    \ types such as dictionaries, lists, and sets (oh, my!). Even a string is a type\
    \ of collection; it contains a sequence of characters. However, collections can\
    \ be difficult to reason about when reading about new code. Different collection\
    \ types have different behaviors.\n\nBack in [Chapter 1](#), I went over some\
    \ of the differences between the collections, where I talked about mutability,\
    \ iterability, and indexing requirements. However, picking the right collection\
    \ is just the first step. You must understand the implications your collection\
    \ implies, and ensure that users can reason about it. You also need to recognize\
    \ when the standard collection types aren’t cutting it, and you need to roll your\
    \ own. But the first step, is knowing how to communicate your collection choices\
    \ to the future. For that, I’ll turn to my old friend: type annotations.\n\n##\
    \ Annotating Collections\n\nI’ve covered type annotations for non-collection types,\
    \ and now you need to know how to annotate collection types. Fortunately, these\
    \ annotations don’t differ too much from the annotations you’ve already learned.\n\
    \nTo illustrate this, suppose I’m building a digital cookbook app. I want to organize\
    \ all my cookbooks digitally so I can search them by cuisine, ingredient or author.\
    \ One of the questions I might have about a cookbook collection is how many books\
    \ from each author I have:\n\n```python\ndef count_authors(cookbooks: list) ->\
    \ dict:\n    counter = defaultdict(lambda: 0)\n    for book in cookbooks:\n  \
    \      counter[book.author] += 1\n    return counter\n```\n\nThis function has\
    \ been annotated; it takes in a list of cookbooks and will return a dictionary.\
    \ Unfortunately, while this tells me what collections to expect, it doesn’t tell\
    \ me how to use the collections at all. There is nothing telling me what the elements\
    \ inside the collection are. For instance, how do I know what type the cookbook\
    \ is? If you were reviewing this code, how do you know that the use of `book.author`\
    \ is legitimate? Even if you do the digging to make sure `book.author` is right,\
    \ this code is not future-proof. If the underlying type changes, such as removing\
    \ the `author` field, this code will break. I need a way to catch this with my\
    \ typechecker.\n\nI’ll do this by encoding more information with my types by using\
    \ bracket syntax to indicate information about the types *inside* the collection.\n\
    \n```python\nAuthorToCountMapping = dict[str, int]\ndef count_authors(cookbooks:\
    \ list[Cookbook]) -> AuthorToCountMapping:\n    counter = defaultdict(lambda:\
    \ 0)\n    for book in cookbooks:\n        counter[book.author] += 1\n    return\
    \ counter\n```\n\n> WARNING\nIn Python 3.8 and earlier, built-in collection types\
    \ such as `list`, `dict` and `set` did not allow this bracket syntax, such as\
    \ `list[Cookbook]` or `dict[str, int]`. Instead, you needed to use type annotations\
    \ from the typing module:\n\n```python\nfrom typing import Dict, List\nAuthorToCountMapping\
    \ = Dict[str, int]\ndef count_authors(cookbooks: List[Cookbook]) -> AuthorToCountMapping:\n\
    \    # ...\n```\n\nI can indicate the exact types expected in the collection.\
    \ The cookbooks list contains Cookbook objects and the return value of the function\
    \ is returning a dictionary mapping strings (keys) to ints (values). Note that\
    \ I’m using a type alias to give more meaning to my return value. Mapping from\
    \ a string to an int does not tell the user the context of the type. Instead,\
    \ I create a type alias named AuthorToCountMapping to make it clear how this dictionary\
    \ relates to the problem domain.\n\nYou need to think through what types are contained\
    \ in collection in order to be effective in type hinting it. In order to do that,\
    \ you need to think about homogeneous and heterogeneous collections.\n\n## Homogeneous\
    \ vs. Heterogeneous Collections\n\nHomogeneous collections are collections where\
    \ every value in the collection has the same type. In contrast, heterogeneous\
    \ collections have values that may have different types within them. From a usability\
    \ standpoint, your lists, sets and dictionaries should nearly always be homogenous.\
    \ Users need a way to reason about your collections, and they can’t if they don’t\
    \ have the guarantee that every value is the same type. If you make a list, set\
    \ or dictionary a heterogeneous collection, you are indicating to the user that\
    \ they need to take care to handle special cases. Suppose I want to resurrect\
    \ an example from Chapter 1 for adjusting recipes for my cookbook app.\n\n```python\n\
    # Take a meal recipe and change the number of servings\n# by adjusting each ingredient\n\
    # A recipe's first element is the number of servings, and the remainder\n# of\
    \ elements is (name, amount, unit), such as (\"flour\", 1.5, \"cup\")\ndef adjust_recipe(recipe,\
    \ servings):\n    new_recipe = [servings]\n    old_servings = recipe[0]\n    factor\
    \ = servings / old_servings\n    recipe.pop(0)\n    while recipe:\n        ingredient,\
    \ amount, unit = recipe.pop(0)\n        # please only use numbers that will be\
    \ easily measurable\n        new_recipe.append((ingredient, amount * factor, unit))\n\
    \    return new_recipe\n```\n\nAt the time, I mentioned how parts of this code\
    \ were ugly, and one of the things made this tough to work with was the fact that\
    \ the first element of the recipe list was a special case: an integer representing\
    \ the servings. This contrasts from the rest of the list elements which are tuples\
    \ representing actual ingredients, such as (\"flour\", 1.5, \"cup\"). This highlights\
    \ the troubles of a heterogeneous collection. For every use of your collection,\
    \ the user needs to remember to handle the special case. This is predicated on\
    \ the assumption that the developer even knew about the special case in the first\
    \ place. There’s no way in the type system to represent that a specific element\
    \ needs to be handled differently. Therefore, a typechecker will not catch when\
    \ a developer forgets. This leads to brittle code down the road.\n\nWhen talking\
    \ about homogeneity, it’s important to talk about what a *single type* means.\
    \ When I mention single type, I’m not necessarily referring to a concrete type\
    \ in Python; rather, I’m referring to a set of behaviors that define that type.\
    \ A single type indicates that a consumer must operate on every value of that\
    \ type in the exact same way. For the cookbook list, the single type is a Cookbook.\
    \ For the dictionary example, the key’s single type is a string and the value’s\
    \ single type is an integer. For heterogeneous collections, this will not always\
    \ be the case. What do you do if you must have different types in your collection\
    \ and there is no relation between them?\n\nConsider what my ugly code from Chapter\
    \ 1 communicates:\n\n```python\n# Take a meal recipe and change the number of\
    \ servings\n# by adjusting each ingredient\n# A recipe's first element is the\
    \ number of servings, and the remainder\n# of elements is (name, amount, unit),\
    \ such as (\"flour\", 1.5, \"cup\")\ndef adjust_recipe(recipe, servings):\n  \
    \  # ...\n```\n\nThere is a lot of information in the comment, but comments have\
    \ no guarantee of being correct. They also won’t protect developers if they accidentally\
    \ break assumptions. This code does not communicate intention adequately to future\
    \ collaborators. Those future collaborators won’t be able to reason about your\
    \ code. The last thing you want to burden them with is having to go through the\
    \ codebase, looking for invocations and implementations to work out how to use\
    \ your collection. Ultimately, you need a way to reconcile the first element (an\
    \ integer) with the remainder of the elements, which are tuples? To answer this,\
    \ I’ll use a Union (and some type aliases to make the code more readable).\n\n\
    ```python\nIngredient = tuple[str, int, str] # (name, quantity, units)\nRecipe\
    \ = list[Union[int, Ingredient]] # the list can be servings or ingredients\ndef\
    \ adjust_recipe(recipe: Recipe, servings):\n    # ...\n```\n\nThis takes a heterogeneous\
    \ collection (items could be a integer or an ingredient) and allows developers\
    \ to reason about the collection as if it were homogeneous. The developer needs\
    \ to treat every single value as the same: it is either an integer or an Ingredient\
    \ before operating on it. While needing more code to handle the typechecks, you\
    \ can rest easier knowing that your typechecker will catch users not checking\
    \ for special cases. Bear in mind, this is not perfect by any means; it’d be better\
    \ if there was no special case in the first place and that servings was passed\
    \ to the function another way. But for the cases where you absolutely must handle\
    \ special cases, represent them as a type so that the typechecker benefits you.\n\
    \nThis can go too far, though. The more special cases of types you handle, the\
    \ more code a developer has to write every time they use that type, and the more\
    \ unwieldy the codebase becomes.\n\nAt the far end of the spectrum lies the Any\
    \ type. Any can be used to indicate that all types are valid in this context.\
    \ This sounds appealing to get around special cases, but it also means that the\
    \ consumers of your collection have no clue what to do with the values in the\
    \ collection, defeating the purpose of type annotations in the first place.\n\n\
    > WARNING\nDevelopers working in a statically typed language don’t need to put\
    \ in as much care to ensure"
  mdcn: "## 第五章 集合类型\n\n> ### 给早期版本读者的说明\n\n通过早期版本电子书，你可以在书籍的最初阶段获取内容——即作者撰写时未经编辑的原始内容——从而在这些书籍正式发布之前就能利用这些技术。\n\
    \n这将是最终书籍的第五章。请注意，GitHub 仓库将在稍后激活。\n\n如果你对我们如何改进本书的内容和/或示例有意见，或者你发现本章中有遗漏的内容，请通过\
    \ *pat@kudzera.com* 联系作者。\n\n在 Python 中，你无法避开*集合类型*。集合类型存储一组数据，例如用户列表，或餐厅与地址之间的查找关系。其他类型（整数、浮点数、布尔值）可能专注于单个值，而集合可以存储任意数量的数据。在\
    \ Python 中，你会遇到常见的集合类型，如字典、列表和集合（哦，天哪！）。甚至字符串也是一种集合类型；它包含一系列字符。然而，在阅读新代码时，集合可能难以理解。不同的集合类型具有不同的行为。\n\
    \n回到[第一章](#)，我讨论了集合之间的一些差异，包括可变性、可迭代性和索引要求。然而，选择正确的集合只是第一步。你必须理解你的集合所隐含的含义，并确保用户能够理解它。你还需要认识到标准集合类型何时不够用，并需要自己创建。但第一步是知道如何向未来传达你的集合选择。为此，我将求助于我的老朋友：类型注解。\n\
    \n## 注解集合\n\n我已经介绍了非集合类型的类型注解，现在你需要知道如何注解集合类型。幸运的是，这些注解与你已经学过的注解没有太大区别。\n\n为了说明这一点，假设我正在构建一个数字食谱应用。我想将所有食谱数字化组织，以便按菜系、食材或作者进行搜索。关于食谱集合，我可能有的一个问题是我有多少本来自每位作者的书：\n\
    \n```python\ndef count_authors(cookbooks: list) -> dict:\n    counter = defaultdict(lambda:\
    \ 0)\n    for book in cookbooks:\n        counter[book.author] += 1\n    return\
    \ counter\n```\n\n这个函数已经注解了；它接收一个食谱列表并返回一个字典。不幸的是，虽然这告诉了我期望的集合类型，但它完全没有告诉我如何使用这些集合。没有任何信息告诉我集合内部的元素是什么。例如，我怎么知道食谱的类型是什么？如果你在审查这段代码，你怎么知道使用\
    \ `book.author` 是合法的？即使你深入挖掘以确保 `book.author` 是正确的，这段代码也不是面向未来的。如果底层类型发生变化，例如删除\
    \ `author` 字段，这段代码就会出错。我需要一种方法，通过类型检查器来捕获这个问题。\n\n我将通过使用括号语法来编码更多信息，以指示集合*内部*类型的详细信息。\n\
    \n```python\nAuthorToCountMapping = dict[str, int]\ndef count_authors(cookbooks:\
    \ list[Cookbook]) -> AuthorToCountMapping:\n    counter = defaultdict(lambda:\
    \ 0)\n    for book in cookbooks:\n        counter[book.author] += 1\n    return\
    \ counter\n```\n\n> 警告\n在 Python 3.8 及更早版本中，内置集合类型如 `list`、`dict` 和 `set` 不允许使用这种括号语法，例如\
    \ `list[Cookbook]` 或 `dict[str, int]`。相反，你需要使用来自 typing 模块的类型注解：\n\n```python\n\
    from typing import Dict, List\nAuthorToCountMapping = Dict[str, int]\ndef count_authors(cookbooks:\
    \ List[Cookbook]) -> AuthorToCountMapping:\n    # ...\n```\n\n我可以指定期望集合中的确切类型。食谱列表包含\
    \ Cookbook 对象，函数的返回值返回一个将字符串（键）映射到整数（值）的字典。注意，我使用了一个类型别名来为返回值赋予更多含义。从字符串到整数的映射并没有告诉用户类型的上下文。相反，我创建了一个名为\
    \ AuthorToCountMapping 的类型别名，以明确这个字典如何与问题领域相关联。\n\n你需要思考集合中包含哪些类型，以便有效地进行类型提示。为此，你需要考虑同构集合和异构集合。\n\
    \n## 同构集合与异构集合\n\n同构集合是集合中的每个值都具有相同类型的集合。相比之下，异构集合中的值可能具有不同的类型。从可用性的角度来看，你的列表、集合和字典几乎都应该是同构的。用户需要一种方法来理解你的集合，如果他们不能保证每个值都是相同的类型，他们就无法做到这一点。如果你将列表、集合或字典设为异构集合，你就是在向用户表明他们需要小心处理特殊情况。假设我想从第一章中恢复一个例子，用于调整我的食谱应用中的食谱。\n\
    \n```python\n# 接收一个食谱并调整每种食材的数量来改变份数\n# 食谱的第一个元素是份数，其余元素是（名称，数量，单位），例如（\"面粉\"\
    ，1.5，\"杯\"）\ndef adjust_recipe(recipe, servings):\n    new_recipe = [servings]\n\
    \    old_servings = recipe[0]\n    factor = servings / old_servings\n    recipe.pop(0)\n\
    \    while recipe:\n        ingredient, amount, unit = recipe.pop(0)\n       \
    \ # 请只使用易于测量的数字\n        new_recipe.append((ingredient, amount * factor, unit))\n\
    \    return new_recipe\n```\n\n当时，我提到这段代码有些部分很丑陋，其中一个让代码难以处理的事实是食谱列表的第一个元素是一个特殊情况：一个表示份数的整数。这与列表其余元素形成对比，其余元素是表示实际食材的元组，例如（\"\
    面粉\"，1.5，\"杯\"）。这突出了异构集合的麻烦。对于集合的每次使用，用户都需要记住处理特殊情况。这基于开发者首先知道特殊情况的假设。在类型系统中没有办法表示某个特定元素需要被区别对待。因此，当开发者忘记时，类型检查器不会捕获。这会导致代码在未来变得脆弱。\n\
    \n在讨论同构性时，重要的是要讨论*单一类型*的含义。当我提到单一类型时，我并不一定指的是 Python 中的具体类型；相反，我指的是定义该类型的一组行为。单一类型表明消费者必须以完全相同的方式操作该类型的每个值。对于食谱列表，单一类型是\
    \ Cookbook。对于字典示例，键的单一类型是字符串，值的单一类型是整数。对于异构集合，情况并非总是如此。如果你必须在集合中包含不同的类型，并且它们之间没有关系，你该怎么办？\n\
    \n考虑一下我第一章中的丑陋代码传达了什么：\n\n```python\n# 接收一个食谱并调整每种食材的数量来改变份数\n# 食谱的第一个元素是份数，其余元素是（名称，数量，单位），例如（\"\
    面粉\"，1.5，\"杯\"）\ndef adjust_recipe(recipe, servings):\n    # ...\n```\n\n注释中包含大量信息，但注释不能保证正确。如果开发者意外破坏了假设，它们也不会保护开发者。这段代码没有向未来的协作者充分传达意图。那些未来的协作者将无法理解你的代码。你最不想让他们负担的就是必须遍历代码库，寻找调用和实现来弄清楚如何使用你的集合。最终，你需要一种方法来协调第一个元素（一个整数）和其余元素（元组）？为了回答这个问题，我将使用\
    \ Union（以及一些类型别名使代码更具可读性）。\n\n```python\nIngredient = tuple[str, int, str] # （名称，数量，单位）\n\
    Recipe = list[Union[int, Ingredient]] # 列表可以是份数或食材\ndef adjust_recipe(recipe:\
    \ Recipe, servings):\n    # ...\n```\n\n这接受一个异构集合（项目可以是整数或食材），并允许开发者像处理同构集合一样理解该集合。开发者需要将每个值都视为相同：在操作之前，它要么是整数，要么是\
    \ Ingredient。虽然需要更多代码来处理类型检查，但你可以更放心地知道你的类型检查器会捕获未检查特殊情况的用户。请记住，这绝非完美；如果一开始就没有特殊情况，并且份数以另一种方式传递给函数，那会更好。但对于那些你绝对必须处理特殊情况的情况，将它们表示为一种类型，以便类型检查器能为你所用。\n\
    \n然而，这可能会走得太远。你处理的类型特殊情况越多，开发者每次使用该类型时需要编写的代码就越多，代码库就变得越笨重。\n\n在光谱的另一端是 Any 类型。Any\
    \ 可以用来表示所有类型在此上下文中都是有效的。这听起来很吸引人，可以绕过特殊情况，但它也意味着你的集合的消费者不知道如何处理集合中的值，这违背了类型注解的初衷。\n\
    \n> 警告\n在静态类型语言中工作的开发者不需要投入同样多的精力来确保"
