    start diving into the meat of improving our codebase


    # Duck Typing


    I feel like it is some unwritten law that whenever someone mentions duck typing,
    someone must reply with:


    > _If it walks like a duck and it quacks like a duck, then it must be a duck._


    My problem with this saying is that I find it completely unhelpful for explaining
    what duck typing actually is. It’s catchy, concise, and crucially, only comprehensible
    to those who already understand duck typing. When I was younger, I just nodded
    politely, afraid that I was missing something profound by this simple phrase.
    It wasn’t until later on that I truly understood the power of duck typing'
  - "[PAGE 38]\n\nDuck typing is the ability to use objects and entities in a programming\
    \ language as long as it adheres to some interface. It is a wonderful thing in\
    \ Python, and most people use it without even knowing it. Let’s look at a simple\
    \ example to illustrate what I’m talking about.\n\n```\ndef print_items(items):\n\
    \    for item in items:\n        print(item)\n\nprint_items([1,2,3])\nprint_items({4,\
    \ 5, 6})\nprint_items({\"A\": 1, \"B\": 2, \"C\": 3})\n```\n\nIn all three invocations\
    \ of `print_items`, we loop through the collection and print each item. Think\
    \ about how this works. `print_items` has absolutely no knowledge of what type\
    \ it will receive. It just receives a type at run-time and operates upon it. It’s\
    \ not introspecting each argument and deciding to do different things based on\
    \ the type. The truth is much simpler. Instead, all `print_items` is doing is\
    \ checking that whatever is passed in can be iterated upon (by calling an `__iter__`\
    \ method). If the attribute `__iter__` exists, it’s called and the returned iterator\
    \ is looped over.\n\nWe can verify this with a simple code example:\n\n```\n>>>for\
    \ x in 5:\n>>>    print(x)\n\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nTypeError: 'int' object is not iterable\n```\n\nDuck typing\
    \ is what makes this possible. As long as a type supports the variables and methods\
    \ expected by a function (based on what’s actually used), you can use that type\
    \ in that function freely.\n\nHere’s another example:\n\n```\n>>>def double_value(value):\n\
    >>>    return value + value\n\n>>>double_value(5)\n```"
  - '[PAGE 39]


    ```

    >>> double_value("abc")

    "abcabc"

    ```


    It doesn’t matter that we’re passing an integer in one place or a string in another;
    both support the + operator, so either will work just fine. Any object that supports
    the + operator can be passed in. We can even do it with a list:


    ```

    >>> double_value([1, 2, 3])

    [1, 2, 3, 1, 2, 3]

    ```


    So how does this play into robustness? It turns out that duck typing is a double-edged
    sword. It can increase robustness because it increases composability (we’ll learn
    more about composability in XREF HERE). Building up a library of solid abstractions
    able to handle a multitude of types lessens the need for complex special cases.
    However, if duck typing is overused, you start to break down assumptions that
    a developer can rely upon. When updating code, it’s not simple enough to just
    make the changes; you must look at all calling code and make sure that the types
    passed into your function satisfy your new changes as well.


    With all this in mind, it might be best to reword the idiom at the beginning of
    this chapter as such:


    > If it walks like a duck, and quacks like a duck, and you are looking for things
    that walk and quack like ducks, then you can treat it as if it were a duck


    Doesn’t quite roll off the tongue as well, does it?


    DISCUSSION TOPIC

    Do you use duck typing in your codebase? Are there places where you can pass in
    types that don’t match what the code is looking for, but things still work? Do
    you think these increase or decrease robustness for your use cases?


    # Wrap-up


    Types are a pillar of clean, maintainable code and serve as a communication tool'
