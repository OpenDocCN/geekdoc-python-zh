    nutrition[\"arugula\"] = get_nutrition_information(\"arugula\")\nprint(nutrition.get(\"\
    rocket\", \"No Ingredient Found\"))\n```\n\nThe get function on a dictionary tries\
    \ to get the key, and if not found, will return the second argument (in this case\
