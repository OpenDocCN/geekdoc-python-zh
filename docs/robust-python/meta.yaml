    Choosing a collection tells readers about your specific intentions. Here’s a list
    of common collection types, and the intentions they convey:


    # List


    This is a collection to be iterated over. It is *mutable*: able to be changed
    at any time. Very rarely do you expect to be retrieving specific elements from
    the middle of the list (using a static list index). There may be duplicate elements.
    The cookbooks on a shelf might be stored in a list.


    # String


    An immutable collection of characters. The name of a cookbook would be a string.


    # Generators


    A collection to be iterated over, and never indexed into. Each element access
    is performed lazily, so it may take time and/or resources through each loop iteration.
    They are great for computationally expensive or infinite collections. An online
    database of recipes might be returned as a generator; you don’t want to fetch
    all the recipes in the world when the user is only going to look at the first
    ten results of a search.


    # Tuple


    Tuples are immutable collections. You do not expect it to change, so it is more
    likely to extract specific elements from the middle of the tuple (either through
    indices or unpacking). It is very rarely iterated over. The information about
    a specific cookbook might be represented as a tuple, such as `(cookbook_name,
    author, pagecount)`'
