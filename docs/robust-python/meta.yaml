  md: "Duck typing is the ability to use objects and entities in a programming language\
    \ as long as it adheres to some interface. It is a wonderful thing in Python,\
    \ and most people use it without even knowing it. Let’s look at a simple example\
    \ to illustrate what I’m talking about.\n\n```\ndef print_items(items):\n    for\
    \ item in items:\n        print(item)\n\nprint_items([1,2,3])\nprint_items({4,\
    \ 5, 6})\nprint_items({\"A\": 1, \"B\": 2, \"C\": 3})\n```\n\nIn all three invocations\
    \ of `print_items`, we loop through the collection and print each item. Think\
    \ about how this works. `print_items` has absolutely no knowledge of what type\
    \ it will receive. It just receives a type at run-time and operates upon it. It’s\
    \ not introspecting each argument and deciding to do different things based on\
    \ the type. The truth is much simpler. Instead, all `print_items` is doing is\
    \ checking that whatever is passed in can be iterated upon (by calling an `__iter__`\
    \ method). If the attribute `__iter__` exists, it’s called and the returned iterator\
    \ is looped over.\n\nWe can verify this with a simple code example:\n\n```\n>>>for\
    \ x in 5:\n>>>    print(x)\n\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nTypeError: 'int' object is not iterable\n```\n\nDuck typing\
    \ is what makes this possible. As long as a type supports the variables and methods\
    \ expected by a function (based on what’s actually used), you can use that type\
    \ in that function freely.\n\nHere’s another example:\n\n```\n>>>def double_value(value):\n\
    >>>    return value + value\n\n>>>double_value(5)\n```"
