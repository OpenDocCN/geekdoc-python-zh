    I have a name, the condiments that can go on top, an error code in case something
    goes wrong, and if something does go wrong, a boolean to track if I have disposed
    of the item correctly or not. How many different combinations of values can be
    put into this dictionary? Potentially infinite right? The `name` alone could be
    anything from valid values (“hotdog”, “pretzel”) to invalid values (“samosa”,
    “kimchi”, “poutine”) to absurd (“12345”, “”, “(╯°□°)╯︵ ┻━┻”). Condiments has a
    similar problem. As it stands, there is no way to compute the possible options.


    For the sake of simplicity, I will artificially constrain this type:


    +   - The name can be one of three values: hotdog, pretzel or veggie burger

    - The condiments can be empty, mustard, ketchup or both

    - There are 6 error codes (0-6) (0 indicates success)

    - disposed_of is only true or false


    Now how many different values can be represented in this combination of fields?
    The answer is 144, which is a grossly large number. I achieve this by the following:


    3 possible types for name * 4 possible types for condiments * 6 error codes *
    2 boolean values for if the entry has been disposed of = 3*4*6*2 = 144. If you
    were to accept that any of these values could be `None`, the total balloons to
    280. While you should always think about `None` while coding (see earlier in this
    chapter about `Optional`), for this thought exercise, I’m going to ignore `None`
    values.


    This sort of operation is known as a *product type*; the number of representable
    states is determined by the product of possible values. The problem is, not all
    of these states are valid. The variable `disposed_of` should only be set to `True`
    if an error code is set to non-zero. Developers will make this assumption, and
    trust that the illegal state never shows up. However, one innocent mistake can
    bring your whole system crashing to a halt. Consider the following code:'
