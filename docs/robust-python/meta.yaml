    # # Chapter 6. Customizing Your Typechecker


    > ### A NOTE FOR EARLY RELEASE READERS


    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    This will be the 6th chapter of the final book. Please note that the GitHub repo
    will be made active later on.


    If you have comments about how we might improve the content and/or examples in
    this book, or if you notice missing material within this chapter, please reach
    out to the author at pat@kudzera.com.


    Typecheckers are one of your best resources for building robust codebases. Jukka
    Lehtosalo, the lead developer of mypy, offers a beautifully concise definition
    of typecheckers: *In essence, [a typechecker] provides verified documentation.*<sup>1</sup>
    Type annotations provide documentation about your codebase, allowing other developers
    the ability to reason about your intentions. And typecheckers use those annotations
    to verify that the documentation matches the behavior.


    As such, a typechecker is invaluable. The wise sage Confucius once said *The mechanic,
    who wishes to do his work well, must first sharpen his tools.*<sup>2</sup> This
    chapter is all about sharpening your typechecker usage. Great coding techniques
    can get you far, but its your surrounding tooling that takes you to the next level.
    Don’t stop with just learning your editor, compiler, or operating system. Learn
    your typechecker too. I will show you some of the more useful options to get the
    most out of your tools.


    # ## Configuring Your Typechecker'
- md: "I will focus on one of the most popular typecheckers out there: mypy. Mypy\
    \ offers quite a few configuration options to control the typechecker’s *strictness*,\
    \ or amount of errors reported. The stricter you make your typechecker, the more\
    \ type annotations you need to write, providing better documentation and creating\
    \ fewer bugs. However, make the typechecker too strict, and you will find the\
    \ minimum bar for developing code too high, incurring high costs to make changes.\
    \ Mypy configuration options are what controls these strictness levels. I’ll go\
    \ through the different options available to you, and you can decide where that\
    \ bar lies for you and your codebase.\n\nFirst, you need to install mypy (if you\
    \ haven’t already). The easiest way is through pip on the command line:\n\n```\n\
    pip install mypy\n```\n\nOnce you have mypy installed, you can control configuration\
    \ through one of three ways:\n\n*Command Line*\n\nWhen instantiating mypy from\
    \ a terminal, you can pass various options to configure behavior. This is great\
    \ for exploring new checks in your codebase.\n\n*Inline Configuration*\n\nYou\
    \ can specify configuration values at the top of a file to indicate any options\
    \ you may want to set. For example:\n\n```\n# mypy: disallow-any-generics\n```\n\
    \nat the top of your file will tell mypy to explicitly look for `Any` values in\
    \ generics and fail if it finds any.\n\n*Configuration File*\n\nYou can set up\
    \ a configuration file to use the same options every time mypy runs. This is extremely\
    \ useful when needing to share the same options across a team. This file is typically\
    \ stored in version control alongside the code.\n\n## Configuring Mypy\n\nWhen\
    \ running mypy, mypy looks in your current directory for a configuration file\
    \ named `mypy.ini`. This file will define which options you have set up for the\
    \ project. Some options will be global, applied to every file, and other options\
    \ will be per-module. A sample `mypy.ini` file might look as follows:\n\n```\n\
    # Global options:\n\n[mypy]\npython_version = 3.9\nwarn_return_any = True\n\n\
    # Per-module options:\n\n[mypy-mycode.foo.*]\ndisallow_untyped_defs = True\n\n\
    [mypy-mycode.bar]\nwarn_return_any = False\n\n[mypy-somelibrary]\nignore_missing_imports\
    \ = True\n```\n\n> TIP\nYou can use the `--config-file` command line option to\
    \ specify config files in different places. Also, mypy will look for configuration\
    \ files in specific home directories if it can't find a local config file, in\
    \ case you want the same settings across multiple projects. For more information,\
    \ check out the [mypy documentation](https://mypy.readthedocs.io/en/stable/config_file.html).\n\
    \nI'll cover some of the important options that you need to be aware of; they\
    \ will help you control the behavior you want out of your typechecker. As a note,\
    \ I won't cover too much more about the configuration file. Most options that\
    \ I'll talk about work in both a configuration file and on the command line, and\
    \ for the sake of simplicity, I'll show you how to run the commands on mypy invocations.\n\
    \n## Catching Dynamic Behavior\n\nAs mentioned before, Python's dynamically typed\
    \ nature will make maintenance hard on long-living code bases. When dynamically\
    \ typed, every variable is essentially an `Any` type. `Any` indicates that literally\
    \ any type would work for the annotated code. There is not much value to be had\
    \ in most of these cases; the typechecker won’t flag any problems, and you aren’t\
    \ communicating anything special to future developers.\n\nMypy comes with a set\
    \ of flags that you can turn on to flag instances of the `Any` type.\n\nFor instance,\
    \ you can turn on the `--disallow-any-expr` option to flag any expression that\
    \ has an `Any` type. The following code will fail with that option turned on:\n\
    \n```\nfrom typing import Any\nx: Any = 1\ny = x + 1\n\ntest.py:4: error: Expression\
    \ has type \"Any\"\nFound 1 error in 1 file (checked 1 source file)\n```\n\nAnother\
    \ option I like for disallowing `Any` in type declarations such as in collections\
    \ is `--disallow-any-generics`. This catches the use of `Any` for anything using\
    \ a generic, such as collection types. The following code fails to typecheck with\
    \ this option turned on.\n\n```\nx: list = [1,2,3,4]\n```\n\nYou would need to\
    \ use `list[int]` explicitly to get this code to work.\nCheck out all the ways\
    \ to disable the use of `Any` in the [mypy dynamic typing documentation](https://mypy.readthedocs.io/en/stable/dynamic_typing.html).\n\
    \nBe careful with disabling `Any` too broadly, though. There is a valid use case\
    \ of `Any` that you don’t want to flag erroneously. `Any` should be reserved for\
    \ when you absolutely don’t care what type something is, and that it is up to\
    \ the caller to verify the type. A prime example is a heterogeneous key-value\
    \ store (perhaps a general-purpose cache).\n\n## Requiring Types\n\nAn expression\
    \ is *untyped* if there is no type annotation. In these cases, mypy treats the\
    \ result of that expression as an `Any` type if it can’t otherwise infer the type.\
    \ However, the above checks for disallowing `Any` will not catch where a function\
    \ is left untyped. There is a separate set of flags for checking for untyped functions.\n\
    \nThis code will not error out in a typechecker unless the `--disallow-untyped-defs`\
    \ option is set.\n\n```\ndef plus_four(x):\n    return x + 4\n```\n\nWith that\
    \ option set, you receive the following error:\n\n```\ntest.py:4: error: Function\
    \ is missing a type annotation\n```\n\nIf this is too severe for you, you might\
    \ want to check out `--disallow-incomplete-defs`, which only flags functions if\
    \ they are partly annotated, or `--disallow-untyped-calls`, which only flags calls\
    \ from annotated functions to unannotated functions. You’ll find all the different\
    \ options concerning untyped functions in the [mypy documentation](https://mypy.readthedocs.io/).\n\
    \n## Handling None/Optional\n\nIn [Chapter 4](https://realpython.com/python-type-checking/#chapter-4),\
    \ you learned how easy it was to make the “billion-dollar mistake” when using\
    \ `None` values. If you turn on no other options, make sure that you have `--strict-optional`\
    \ turned on in your typechecker to catch these costly errors. You absolutely want\
    \ to be checking that your use of `None` is not hiding any latent bugs.\n\nWhen\
    \ using `--strict-optional`, you must explicitly perform `is None` checks, otherwise\
    \ your code will fail typechecking.\n\nIf `--strict-optional` is set (the default\
    \ is different depending on the mypy version, so be sure to double check), this\
    \ code should fail:\n\n```\nfrom typing import Optional\nx: Optional[int] = None\n\
    print(x+5)\n```\n\n```\ntest.py:3: error: Unsupported operand types for + (\"\
    None\" and \"int\")\ntest.py:3: note: Left operand is of type \"Optional[int]\"\
    \n```\n\nIt's worth noting that mypy also treats `None` values as `Optional` implicitly.\
    \ I recommend turning this off, so that you are being more explicit in your code.\
    \ For example:\n\n```python\ndef foo(x: int = None) -> None:\n    print(x)\n```\n\
    \nThe parameter `x` is implicitly converted to an `Optional[int]`, since `None`\
    \ is a valid value for it. If you were to do any integer operations upon `x`,\
    \ the typechecker would flag it. However, it's better to be more explicit and\
    \ express that a value can be `None` (to disambiguate for future readers).\n\n\
    You can set `--no-implicit-optional` in order to get an error, forcing you to\
    \ specify `Optional`. If you were to typecheck the above code with this option\
    \ set, you would see:\n\n```\ntest.py:2: error: Incompatible default for argument\
    \ \"x\"\n        (default has type \"None\", argument has type \"int\")\n```\n\
    \n## Mypy Reporting\n\nIf a typechecker fails in the forest and nobody is around\
    \ to see it, does it print an error message? How do you know that mypy is actually\
    \ checking your files, and that it will actually catch errors? Thankfully, mypy\
    \ comes with some built-in reporting techniques.\n\nFirst, you can get a HTML\
    \ report about how many lines of code mypy was able to check by passing in `--html-report`\
    \ to mypy. This produces a HTML file that will provide a table that looks similar\
    \ to Figure 6-1:\n\n| Module | Imprecise | LOC |\n|---|---|---|\n| mypy.sharedparse\
    \ | 0.00% imprecise | 114 LOC |\n| mypy.sitepkgs | 3.13% imprecise | 32 LOC |\n\
    | mypy.solve | 3.90% imprecise | 77 LOC |\n| mypy.split_namespace | 38.24% imprecise\
    \ | 34 LOC |\n| mypy.state | 0.00% imprecise | 18 LOC |\n\nFigure 6-1. HTML report\
    \ from running mypy on the mypy source code"
  mdcn: "我将重点介绍目前最受欢迎的类型检查器之一：mypy。Mypy 提供了相当多的配置选项来控制类型检查器的*严格程度*，或报告的错误数量。你设置的类型检查器越严格，就需要编写越多的类型注解，从而提供更好的文档并减少\
    \ bug。然而，如果类型检查器过于严格，你会发现开发代码的最低门槛太高，导致修改成本高昂。Mypy 的配置选项正是用来控制这些严格程度的。我将介绍不同的可用选项，你可以根据你和你的代码库来决定这个门槛在哪里。\n\
    \n首先，你需要安装 mypy（如果尚未安装）。最简单的方法是通过命令行使用 pip：\n\n```\npip install mypy\n```\n\n\
    安装 mypy 后，你可以通过以下三种方式之一来控制配置：\n\n*命令行*\n\n从终端启动 mypy 时，你可以传递各种选项来配置行为。这对于在代码库中探索新的检查非常有用。\n\
    \n*内联配置*\n\n你可以在文件顶部指定配置值，以指示你可能想要设置的任何选项。例如：\n\n```\n# mypy: disallow-any-generics\n\
    ```\n\n放在文件顶部将告诉 mypy 显式查找泛型中的 `Any` 值，如果找到则报错。\n\n*配置文件*\n\n你可以设置一个配置文件，以便每次运行\
    \ mypy 时都使用相同的选项。当需要在团队中共享相同的选项时，这非常有用。此文件通常与代码一起存储在版本控制中。\n\n## 配置 Mypy\n\n运行\
    \ mypy 时，mypy 会在当前目录中查找名为 `mypy.ini` 的配置文件。此文件将定义你为项目设置的选项。一些选项是全局的，应用于每个文件，而其他选项是针对每个模块的。一个示例\
    \ `mypy.ini` 文件可能如下所示：\n\n```\n# 全局选项：\n\n[mypy]\npython_version = 3.9\nwarn_return_any\
    \ = True\n\n# 每个模块的选项：\n\n[mypy-mycode.foo.*]\ndisallow_untyped_defs = True\n\n\
    [mypy-mycode.bar]\nwarn_return_any = False\n\n[mypy-somelibrary]\nignore_missing_imports\
    \ = True\n```\n\n> 提示\n你可以使用 `--config-file` 命令行选项来指定不同位置的配置文件。此外，如果找不到本地配置文件，mypy\
    \ 会在特定的主目录中查找配置文件，以防你希望在多个项目中使用相同的设置。更多信息，请查看 [mypy 文档](https://mypy.readthedocs.io/en/stable/config_file.html)。\n\
    \n我将介绍一些你需要了解的重要选项；它们将帮助你控制从类型检查器中获得的行为。请注意，我不会过多介绍配置文件。我将讨论的大多数选项在配置文件和命令行中都有效，为了简单起见，我将向你展示如何在\
    \ mypy 调用中运行这些命令。\n\n## 捕获动态行为\n\n如前所述，Python 的动态类型特性会使长期维护的代码库变得困难。当使用动态类型时，每个变量本质上都是\
    \ `Any` 类型。`Any` 表示任何类型都可以用于注解的代码。在大多数情况下，这没有太多价值；类型检查器不会标记任何问题，你也无法向未来的开发者传达任何特殊信息。\n\
    \nMypy 提供了一组标志，你可以打开它们来标记 `Any` 类型的实例。\n\n例如，你可以打开 `--disallow-any-expr` 选项来标记任何具有\
    \ `Any` 类型的表达式。打开该选项后，以下代码将失败：\n\n```\nfrom typing import Any\nx: Any = 1\ny =\
    \ x + 1\n\ntest.py:4: error: Expression has type \"Any\"\nFound 1 error in 1 file\
    \ (checked 1 source file)\n```\n\n另一个我喜欢的选项是 `--disallow-any-generics`，用于禁止在类型声明（如集合）中使用\
    \ `Any`。这会捕获在任何使用泛型（如集合类型）的地方使用 `Any` 的情况。打开此选项后，以下代码将无法通过类型检查。\n\n```\nx: list\
    \ = [1,2,3,4]\n```\n\n你需要显式使用 `list[int]` 才能使此代码正常工作。\n查看 [mypy 动态类型文档](https://mypy.readthedocs.io/en/stable/dynamic_typing.html)\
    \ 中所有禁用 `Any` 的方法。\n\n不过，请小心不要过于宽泛地禁用 `Any`。`Any` 有一个有效的用例，你不希望错误地标记它。`Any` 应保留用于你绝对不关心某个类型是什么，并且由调用者负责验证类型的情况。一个典型的例子是异构键值存储（可能是通用缓存）。\n\
    \n## 要求类型\n\n如果没有类型注解，则表达式是*无类型的*。在这些情况下，如果 mypy 无法推断类型，则会将该表达式的结果视为 `Any` 类型。但是，上述禁用\
    \ `Any` 的检查不会捕获未类型化的函数。有一组单独的标志用于检查未类型化的函数。\n\n除非设置了 `--disallow-untyped-defs`\
    \ 选项，否则此代码在类型检查器中不会报错。\n\n```\ndef plus_four(x):\n    return x + 4\n```\n\n设置该选项后，你会收到以下错误：\n\
    \n```\ntest.py:4: error: Function is missing a type annotation\n```\n\n如果这对你来说太严格，你可能需要查看\
    \ `--disallow-incomplete-defs`（仅标记部分注解的函数）或 `--disallow-untyped-calls`（仅标记从注解函数调用未注解函数的情况）。你可以在\
    \ [mypy 文档](https://mypy.readthedocs.io/) 中找到所有关于未类型化函数的不同选项。\n\n## 处理 None/Optional\n\
    \n在[第 4 章](https://realpython.com/python-type-checking/#chapter-4)中，你了解到使用 `None`\
    \ 值时很容易犯“十亿美元的错误”。如果你没有打开其他选项，请确保在类型检查器中打开 `--strict-optional` 以捕获这些代价高昂的错误。你绝对希望检查你对\
    \ `None` 的使用是否隐藏了任何潜在的 bug。\n\n使用 `--strict-optional` 时，你必须显式执行 `is None` 检查，否则你的代码将无法通过类型检查。\n\
    \n如果设置了 `--strict-optional`（默认值因 mypy 版本而异，因此请务必仔细检查），此代码应该失败：\n\n```\nfrom typing\
    \ import Optional\nx: Optional[int] = None\nprint(x+5)\n```\n\n```\ntest.py:3:\
    \ error: Unsupported operand types for + (\"None\" and \"int\")\ntest.py:3: note:\
    \ Left operand is of type \"Optional[int]\"\n```\n\n值得注意的是，mypy 也会隐式地将 `None`\
    \ 值视为 `Optional`。我建议关闭此功能，以便在代码中更加明确。例如：\n\n```python\ndef foo(x: int = None)\
    \ -> None:\n    print(x)\n```\n\n参数 `x` 被隐式转换为 `Optional[int]`，因为 `None` 是其有效值。如果你对\
    \ `x` 执行任何整数操作，类型检查器会标记它。然而，最好更明确地表达一个值可以是 `None`（以便为未来的读者消除歧义）。\n\n你可以设置 `--no-implicit-optional`\
    \ 以获取错误，强制你指定 `Optional`。如果你使用此选项对上述代码进行类型检查，你会看到：\n\n```\ntest.py:2: error: Incompatible\
    \ default for argument \"x\"\n        (default has type \"None\", argument has\
    \ type \"int\")\n```\n\n## Mypy 报告\n\n如果一个类型检查器在森林中失败了，而周围没有人看到它，它会打印错误消息吗？你怎么知道\
    \ mypy 实际上正在检查你的文件，并且它会实际捕获错误？值得庆幸的是，mypy 附带了一些内置的报告技术。\n\n首先，你可以通过向 mypy 传递 `--html-report`\
    \ 来获取关于 mypy 能够检查多少行代码的 HTML 报告。这会生成一个 HTML 文件，其中提供一个类似于图 6-1 的表格：\n\n| 模块 | 不精确\
    \ | 代码行数 |\n|---|---|---|\n| mypy.sharedparse | 0.00% 不精确 | 114 行 |\n| mypy.sitepkgs\
    \ | 3.13% 不精确 | 32 行 |\n| mypy.solve | 3.90% 不精确 | 77 行 |\n| mypy.split_namespace\
    \ | 38.24% 不精确 | 34 行 |\n| mypy.state | 0.00% 不精确 | 18 行 |\n\n图 6-1. 在 mypy 源代码上运行\
    \ mypy 生成的 HTML 报告"
