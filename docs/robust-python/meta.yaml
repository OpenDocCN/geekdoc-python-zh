    exactly what type everything is at runtime (such as when you use the `type()`
    function.)


    It’s easy to think that this is the only reason for types - the computer needs
    to know how to interpret various blobs of memory. It is important to be aware
    of how Python uses types, as it has some implications for writing robust code,
    but even more important is the second representation: semantic representation.


    # Semantic Representation


    While the first definition of types is great for lower-level programming, it’s
    the second definition that applies to every developer. Types, in addition to having
    a mechanical representation, also manifest a semantic representation. A semantic
    representation is a communication tool; the types you choose communicate information
    across time and space to a future developer.


    Types tell a user what behaviors they can expect about that entity. These behaviors
    are the operations that you associate with that type (plus any pre-conditions
    or post-conditions). They are the boundaries, constraints, and freedoms that a
    user interacts with whenever they use that type. Types used correctly have low
    barriers to understanding; they become natural to use. Conversely, types used
    poorly are a hindrance.


    Consider the lowly int. Take a minute to think about what behaviors an integer
    has in Python. Here’s a quick (non-comprehensive) list I came up with:


    +   - Constructible from integers, floats, or strings

    - Mathematical operations such as addition, subtraction, division, multiplication,
    exponentiation and negation

    - Relational comparison such as <, >, ==, and !='
