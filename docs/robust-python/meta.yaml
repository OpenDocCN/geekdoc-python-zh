    \n## 修改现有类型\n\n泛型对于创建你自己的集合类型很有用，但如果你只是想调整现有集合（如列表或字典）的某些行为呢？完全重写集合的所有语义将是繁琐且容易出错的。幸运的是，有方法可以让这变得轻而易举。让我们回到我们的食谱应用。我之前写过获取营养信息的代码，但现在我想将所有这些营养信息存储在一个字典中。然而，我遇到了一个问题：同一种食材根据你来自的地方，名称可能非常不同。以一种深色绿叶蔬菜为例，它在沙拉中很常见。美国厨师可能称之为“芝麻菜”，而欧洲人可能称之为“火箭菜”。这甚至还没有开始涵盖英语以外语言的名称。为了应对这个问题，我想创建一个类似字典的对象，它能自动处理这些别名：\n\
    \n```python\nnutrition = NutritionalInformation()\nnutrition[\"arugula\"] = get_nutrition_information(\"\
    arugula\")\nprint(nutrition[\"rocket\"]) # arugula == rocket\n```\n\n那么，我如何编写\
    \ `NutritionalInformation` 来使其行为像字典一样呢？\n\n许多开发者的第一个本能是继承字典。如果你不擅长子类化，别担心，我将在后面的章节中更深入地讲解。现在，只需将子类化视为一种表达“我希望我的子类的行为与父类完全相同”的方式。\n\
    \n```python\nclass NutritionalInformation(dict): ❶\n    def __getitem__(self,\
    \ key): ❷\n        try:\n            return super().__getitem__(key) ❸\n     \
    \   except KeyError:\n            pass\n        for alias in get_aliases(key):\n\
    \            try: ❹\n                return super().__getitem__(alias)\n     \
    \       except KeyError:\n                pass\n        raise KeyError(f\"Could\
    \ not find {key} or any of its aliases\") ❺\n```\n\n- ❶ `(dict)` 语法表示我们是从字典子类化。\n\
    - ❷ `__getitem__` 是当你使用方括号检查字典中的键时被调用的方法。（`nutrition[\"rocket\"]` 调用 `__getitem__(nutrition,\
    \ \"rocket\")`）。\n- ❸ 如果找到键，则使用父字典的键检查。\n- ❹ 对于每个别名，检查它是否在字典中。\n- ❺ 如果没有找到键（无论是传入的键还是其任何别名），则抛出\
    \ `KeyError`。\n\n我们重写了 `__getitem__` 函数，而且它确实有效！\n\n如果我在上面的代码片段中尝试访问 `nutrition[\"\
    rocket\"]`，我会得到与 `nutrition[\"arugula\"]` 相同的营养信息。太棒了！于是你将其部署到生产环境，然后收工。\n\n但是（总有一个“但是”），随着时间的推移，一个开发者向你抱怨说，有时字典不工作。你花了一些时间调试，但对你来说它总是有效的。你寻找竞态条件、线程问题、API\
    \ 欺骗或任何其他不确定性，但完全没有发现潜在的 bug。最后，你终于有时间和那位开发者坐在一起，看看他们在做什么。\n\n他们终端上显示的是以下代码：\n\
    \n```python\n# arugula == rocket\nnutrition = NutritionalInformation()\nnutrition[\"\
    arugula\"] = get_nutrition_information(\"arugula\")\nprint(nutrition.get(\"rocket\"\
    , \"No Ingredient Found\"))\n```\n\n字典的 `get` 函数尝试获取键，如果未找到，则返回第二个参数（在本例中为“No\
    \ Ingredient Found”）。每当执行这行代码时，你看到的就是：“No Ingredient Found”。问题就在这里：当从字典子类化并重写方法时，你无法保证这些方法会从字典中的每个其他方法中被调用。内置集合类型在构建时考虑了性能；许多方法使用内联代码以提高速度。这意味着重写一个方法，比如\
    \ `__getitem__`，在大多数字典方法中不会被使用。这当然违反了我们在第 1 章讨论的“最小惊讶原则”。\n\n> 注意\n> 如果你只是添加方法，那么从内置集合子类化是可以的，但由于未来的修改可能会犯同样的错误，我仍然更喜欢使用其他方法之一来构建自定义集合。\n\
    \n所以重写 `dict` 是行不通的。相反，我将使用 `collections` 模块中的类型。在这种情况下，有一个方便的类型叫做 `UserDict`。`UserDict`\
    \ 正好符合我的用例：我可以从 `UserDict` 子类化，重写关键方法，并获得我期望的行为。\n\n```python\nfrom collections\
    \ import UserDict\nclass NutritionalInformation(UserDict):\n    def __getitem__(self,\
    \ key):\n        try:\n```"
