    type annotations if they don''t want to. If your code contradicts a type annotation,
    it is probably an error, and you''re still relying on humans to catch bugs. I
    want to do better. I want a computer to find these sorts of bugs for me.


    I showed this snippet when talking about dynamic typing back in [Chapter 2](#):


    ```

    a: int = 5

    a = "string"

    a

    >>> "string"

    ```


    Herein lies the challenge: How do type annotations make your codebase robust,
    when you can''t trust that developers will follow their guidance? In order to
    be robust, you want your code to stand the test of time. To do that, you need
    some sort of tool that can check all your type annotations and flags if anything
    is amiss. That tool is called a typechecker.


    Typecheckers are what allow the type annotations to transcend from communication
    method to a safety net. It is a form of static analysis. *Static analysis tools*
    are tools that run on your source code, and don''t impact your runtime at all.
    You''ll learn more about static analysis tools in XREF HERE, but for now, I will
    just explain typecheckers.


