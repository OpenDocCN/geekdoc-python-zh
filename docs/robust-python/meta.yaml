    # Benefits


    As with every decision you make, you need to weigh the costs and benefits. Thinking
    about types up front helps your deliberate design process, but are there other
    benefits type annotations provide? I’ll show you how type annotations really pull
    their weight through tooling.


    # Autocomplete


    I’ve mainly talked about communication to other developers, but your Python environment
    benefits from type annotations as well. Since Python is dynamically-typed, it
    is difficult to know what operations are available. With type annotations, many
    Python-aware code editors will autocomplete your variable’s operations.


