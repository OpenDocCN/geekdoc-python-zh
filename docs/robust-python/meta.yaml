    > **A NOTE FOR EARLY RELEASE READERS**


    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    This will be the 1st chapter of the final book. Please note that the GitHub repo
    will be made active later on.


    If you have comments about how we might improve the content and/or examples in
    this book, or if you notice missing material within this chapter, please reach
    out to the author at *pat@kudzera.com*.


    This book is all about making your Python better. To help you manage your codebase,
    no matter how large it is. To provide a toolbox of tips, tricks and strategies
    to build maintainable code. This book will guide you towards less bugs and happier
    developers. You’ll be taking a hard look at how you write code, and learn the
    implications of your decisions. When discussing how code is written, I am reminded
    of these wise words from C.A.R. Hoare:


    > *There are two ways of constructing a software design: One way is to make it
    so simple that there are obviously no deficiencies, and the other way is to make
    it so complicated that there are no obvious deficiencies. The first method is
    far more difficult.*¹


    This book is about developing systems the first way. It will be more difficult,
    yes, but have no fear. I will be your guide on your journey to leveling up your
    Python game such that, as C.A.R. Hoare says above, *there are obviously no deficiencies*
    in your code. Ultimately, this is a book all about writing *robust* Python.


    In this chapter I’m going to cover what *robustness* means and why you should'
