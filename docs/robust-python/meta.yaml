    it is that way). This is why communicating intent is paramount. Clear and clean
    code lowers chances for miscommunication.


    > **NOTE**


    The *Law Of Least Surprise*, also known as the *Law of Least Astonishment* states
    that a program should always respond to the user in the way that astonishes them
    the least⁴. Surprising behavior leads to confusion. Confusion leads to misplaced
    assumptions. Misplaced assumptions lead to bugs. And that is how you get unreliable
    software.


    Bear in mind, you can write completely correct code and still surprise someone
