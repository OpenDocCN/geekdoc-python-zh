  - "[PAGE 32]\n\n> **NOTE**\n\n*Semantics* refers to the meaning of an operation.\
    \ While `str(int)` and `str(datetime.datetime.now())` will return different formatted\
    \ strings, the meaning is the same: I am creating a string from a value.\n\nDatetimes\
    \ also support their own behaviors, to further distinguish them from integers.\
    \ These include\n\n+   - Changing values based on time zones\n- Being able to\
    \ control the format of strings\n- Finding what weekday it is\n\nAgain, if you'd\
    \ like a full list of behaviors, type `import datetime; help(datetime.datetime)`\
    \ into your REPL.\n\nDatetimes are more specific than an integer. They convey\
    \ a more specific use case than just a plain old number. When you choose to use\
    \ a more specific type, you are telling future contributors that there are operations\
    \ that are possible and constraints to be aware of that aren't present in the\
    \ less specific type.\n\nLet's dive into hhow this ties into robust code. Say\
    \ you inherit a codebase that handles the opening and closing of an completely\
    \ automated kitchen. You need to add in functionality to extend a kitchen's hours\
    \ on holidays.\n\n```\ndef close_kitchen_if_past_cutoff_time(point_in_time):\n\
    \    if point_in_time >= closing_time():\n        close_kitchen()\n        log_time_closed(point_in_time)\n\
    ```\n\nYou know you need to be operating on `point_in_time`, but how do you get\
    \ started? What type are you even dealing with? Is it a string, integer, datetime,\
    \ or some custom class? What operations are you allowed to perform on `point_in_time`?\
    \ You didn't write this code, and you have no history with it. The same problems\
    \ exist if you want to call the code as well. You have no idea what is legal to\
    \ pass into this function."
  - "[PAGE 33]\n\nIf you make a wrong assumption one way or the other, and that code\
    \ makes it to production, you’ve made the code less robust. Maybe that code doesn’t\
    \ lie on a codepath that is executed often. Maybe some other bug is hiding this\
    \ code from being run. Maybe there aren’t a whole lot of tests around this piece\
    \ of code, and it becomes a runtime error later on. No matter what, there is a\
    \ bug lurking in the code, and you’ve decreased maintainability.\n\nResponsible\
    \ developers do their best to not have bugs hit production. They will search for\
    \ tests, documentation (with a grain of salt, of course — documentation can go\
    \ out of date quickly), or calling code. They will look at `closing_time()` and\
    \ `log_time_closed()` to see what types they expect or provide, and plan accordingly.\
    \ This is a correct path in this case, but I still consider it a suboptimal path.\
    \ While an error won’t reach production, they are still expending time in looking\
    \ through the code, which prevents value from being delivered as quickly. With\
    \ such a small example, you would be forgiven for thinking that this isn’t that\
    \ big a problem if it happens once. But beware of “death by a thousand cuts”:\
    \ any one slice isn’t too detrimental on its own, but thousands piled up and strewn\
    \ across a codebase will leave you limping along, trying to deliver code.\n\n\
    The root cause is that the semantic representation was not clear for the parameter.\
    \ So as you write code, do what you can to express your intent through types.\
    \ You can do it as a comment where needed, but I recommend using type annotations\
    \ (supported in Python 3.5+) to explain parts of your code.\n\n```\ndef close_kitchen_if_past_cutoff_time(point_in_time:\
    \ datetime.datetime):\n    if point_in_time >= closing_time():\n        close_kitchen()\n\
    \        log_time_closed(point_in_time)\n```\n\nAll I need to do is put in a :\
    \ <type> after my variables in the function signature. Most of my code examples\
    \ in this book will annotate the types to make it clear what type I’m expecting.\n\
    \nNow, as developers come across this code, they will know what’s expected of\
    \ `point_in_time`. They don’t have to look through other methods, tests or documentation\
    \ to know how to manipulate the variable. They have a crystal-clear clue on what\
    \ to do, and they can get right to work performing the"
  - '[PAGE 34]


    modifications they need to do. You are conveying semantic representation to future
    developers, without ever directly talking to them.


    Furthermore, as developers use a type more and more, they become familiar with
    it. They won’t need to look up documentation or `help()` to use that type when
    they come across it. You begin to create a vocabulary of well-known types across
    your codebase. This lessens the burden of maintenance. When a developer is modifying
    existing code, they want to focus on the changes they need to make, without getting
    bogged down.


    Semantic representation of a type is extremely important, and the rest of Part
    1 of this book will be dedicated to covering how you can use types to your advantage.
    Before I move on though, I need to talk about some fundamental choices Python
    has made as a language, and how they impact codebase robustness.


    > ### DISCUSSION TOPIC


    Think about types used in your codebase. Pick a few and ask yourself what their
    semantic representations are. Enumerate their constraints, use cases and behaviors.
    Could you be using these types in more places? Are there places where you are
    misusing types?


    # ## Typing Systems


    As discussed earlier in the chapter, a type system aims to give a user some way
    to model the behaviors and constraints in the language. Programming languages
    set expectations about how their specific type system works, both during code
    construction and runtime.


    # ### Strong vs. Weak


    Typing systems are classified on a spectrum from weak to strong.


    Languages towards the stronger side of the spectrum tend to restrict the use of
    operations to the types that support them. In other words, if you break the semantic
    representation of the type, you are told (sometimes quite loudly) through a compiler
    error or a runtime error. Languages such as Haskell, TypeScript, Rust are all
    considered strongly typed. Proponents advocate strongly'
  - '[PAGE 35]


    typed languages because errors are more apparent when building or running code.


    In contrast, languages towards the weaker side of the spectrum will not restrict
    the use of operations to the types that support them. Types are often coerced
    into a different type to make sense of an operation. Languages such as JavaScript,
    Perl, and older versions of C are weakly typed. Proponents advocate the speed
    in which it takes to quickly iterate on code, without fighting language along
    the way.


    Python falls towards the stronger side of the spectrum. There are very few implicit
    conversions that happen between types. It is noticeable when you perform illegal
    operations:


    ```

    >>> [] + {}

    TypeError: can only concatenate list (not "dict") to list


    >>> {} + []

    TypeError: unsupported operand type(s) for +: ''dict'' and list

    ```


    Contrast that with a weakly typed language, such as JavaScript:


    ```

    >>> [] + {}

    "[object Object]"


    >>> {} + []

    0

    ```


    In terms of robustness, a strongly typed language such as Python certainly helps
    us out. While errors still will show up at runtime instead of at development time,
    they still will show up in a very obvious `TypeError` exception. This reduces
    the time taken to debug issues significantly, again allowing you to deliver incremental
    value quicker.


    > ### ARE WEAKLY-TYPED LANGUAGES INHERENTLY NOT ROBUST?


    Codebases in weakly-typed languages can absolutely be robust; by no means am I
    dumping on those languages. Consider the sheer amount of production-grade JavaScript
    that the world runs on. However, a weakly typed language'
  - '[PAGE 36]


    > requires extra care to be robust. Developers come to rely very heavily on linters,
    tests, and other tools to improve maintainability. I’ll talk more about this in
    Part 4 of this book, Building a Safety Net.


    # Dynamic vs. Static


    There is another typing spectrum I need to discuss: static vs dynamic typing.
    This is fundamentally a difference in handling mechanical representation of types.


    Languages that offer static typing embed their typing information in variables
    during build time. Developers may explicitly add type information to variables
    or some tool such as a compiler infers types for the developer. Variables do not
    change their type at runtime (hence the name static.) Proponents of static typing
    tout the ability to write safe code out of the gate and to benefit from a strong
    safety net.


    Dynamic typing, on the other hand, embeds type information with the value or variable
    itself. Variables can change types at runtime quite easily, because there is no
    type information tied to that variable. Proponents of dynamic typing advocate
    the flexibility and speed that it takes to develop; there’s nowhere near as much
    fighting with compilers.


    Python is a dynamically typed language. As you saw during the discussion about
    mechanical representation, you saw that there was type information embedded inside
    the values of a variable. Python has no qualms about changing the type of a variable
    at runtime:


    ```

    >>>a = 5

    >>>a = "string"

    >>>a

    "string"


    >>>a = tuple()

    ()

    ```


    Unfortunately, the ability to change types at runtime is a hindrance to robust
    code in many cases. You cannot make strong assumptions about a variable throughout
    its lifetime. As assumptions are broken, it’s easy to write unstable assumptions
    on top of them, leading to a ticking logic bomb in your code.'
- md: "## ARE DYNAMICALLY-TYPED LANGUAGES INHERENTLY NOT ROBUST?\n\nJust like weakly\
    \ typed languages, it is still absolutely possible to write robust code in a dynamically\
    \ typed language. You just have to work a little harder for it. You will have\
    \ to make more deliberate decisions to make your codebase more maintainable. On\
    \ the flip side, being statically typed doesn’t guarantee robustness either; one\
    \ can do the bare minimum with types and see little benefit.\n\nTo make things\
    \ worse, the type annotations I showed earlier have no effect on this behavior\
    \ at runtime:\n\n```python\n>>> a: int = 5\n>>> a = \"string\"\n>>> a\n\"string\"\
    \n```\n\nNo errors, no warnings, no anything. But hope is not lost, and you have\
    \ plenty of strategies to make code more robust. (Otherwise, this would be quite\
    \ the short book). We will discuss one last thing as a contributor to robust code,\
    \ and then start diving into the meat of improving our codebase.\n\n## Duck Typing\n\
    \nI feel like it is some unwritten law that whenever someone mentions duck typing,\
    \ someone must reply with:\n\n> _If it walks like a duck and it quacks like a\
    \ duck, then it must be a duck._\n\nMy problem with this saying is that I find\
    \ it completely unhelpful for explaining what duck typing actually is. It’s catchy,\
    \ concise, and crucially, only comprehensible to those who already understand\
    \ duck typing. When I was younger, I just nodded politely, afraid that I was missing\
    \ something profound by this simple phrase. It wasn’t until later on that I truly\
    \ understood the power of duck typing.\n\nDuck typing is the ability to use objects\
    \ and entities in a programming language as long as it adheres to some interface.\
    \ It is a wonderful thing in Python, and most people use it without even knowing\
    \ it. Let’s look at a simple example to illustrate what I’m talking about.\n\n\
    ```python\ndef print_items(items):\n    for item in items:\n        print(item)\n\
    \nprint_items([1, 2, 3])\nprint_items({4, 5, 6})\nprint_items({\"A\": 1, \"B\"\
    : 2, \"C\": 3})\n```\n\nIn all three invocations of `print_items`, we loop through\
    \ the collection and print each item. Think about how this works. `print_items`\
    \ has absolutely no knowledge of what type it will receive. It just receives a\
    \ type at run-time and operates upon it. It’s not introspecting each argument\
    \ and deciding to do different things based on the type. The truth is much simpler.\
    \ Instead, all `print_items` is doing is checking that whatever is passed in can\
    \ be iterated upon (by calling an `__iter__` method). If the attribute `__iter__`\
    \ exists, it’s called and the returned iterator is looped over.\n\nWe can verify\
    \ this with a simple code example:\n\n```python\n>>> for x in 5:\n...     print(x)\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: 'int' object is not iterable\n```\n\nDuck typing is what makes this\
    \ possible. As long as a type supports the variables and methods expected by a\
    \ function (based on what’s actually used), you can use that type in that function\
    \ freely.\n\nHere’s another example:\n\n```python\n>>> def double_value(value):\n\
    ...     return value + value\n\n>>> double_value(5)\n10\n>>> double_value(\"abc\"\
    )\n\"abcabc\"\n```\n\nIt doesn’t matter that we’re passing an integer in one place\
    \ or a string in another; both support the `+` operator, so either will work just\
    \ fine. Any object that supports the `+` operator can be passed in. We can even\
    \ do it with a list:\n\n```python\n>>> double_value([1, 2, 3])\n[1, 2, 3, 1, 2,\
    \ 3]\n```\n\nSo how does this play into robustness? It turns out that duck typing\
    \ is a double-edged sword. It can increase robustness because it increases composability\
    \ (we’ll learn more about composability in XREF HERE). Building up a library of\
    \ solid abstractions able to handle a multitude of types lessens the need for\
    \ complex special cases. However, if duck typing is overused, you start to break\
    \ down assumptions that a developer can rely upon. When updating code, it’s not\
    \ simple enough to just make the changes; you must look at all calling code and\
    \ make sure that the types passed into your function satisfy your new changes\
    \ as well.\n\nWith all this in mind, it might be best to reword the idiom at the\
    \ beginning of this chapter as such:\n\n> If it walks like a duck, and quacks\
    \ like a duck, and you are looking for things that walk and quack like ducks,\
    \ then you can treat it as if it were a duck.\n\nDoesn’t quite roll off the tongue\
    \ as well, does it?\n\n### DISCUSSION TOPIC\n\nDo you use duck typing in your\
    \ codebase? Are there places where you can pass in types that don’t match what\
    \ the code is looking for, but things still work? Do you think these increase\
    \ or decrease robustness for your use cases?\n\n## Wrap-up\n\nTypes are a pillar\
    \ of clean, maintainable code and serve as a communication tool to other developers.\
    \ If you take care with types, you communicate a great deal, creating less burden\
    \ for future maintainers. The rest of Part 1 will show you how to use types to\
    \ enhance a codebase’s robustness.\n\nRemember, Python is dynamically and strongly\
    \ typed. The strongly typed nature will be a boon for us; Python will notify us\
    \ about errors when we use incompatible types. But its dynamically typed nature\
    \ is something we will have to overcome in order to write better types. These\
    \ language choices shape how Python code is written, and we’ll be referring back\
    \ often to them throughout the book.\n\nIn the next chapter, we’re going to talk\
    \ about type annotations, which is how we can be explicit about the type we use.\
    \ Type annotations serve a crucial role: our primary communication method of behaviors\
    \ to future developers. They help overcome the limitations of a dynamically-typed\
    \ language and allow you to enforce intentions throughout a codebase.\n\n# Chapter\
    \ 3. Type Annotations\n\n> **A NOTE FOR EARLY RELEASE READERS**\n\nWith Early\
    \ Release ebooks, you get books in their earliest form—the author’s raw and unedited\
    \ content as they write—so you can take advantage of these technologies long before\
    \ the official release of these titles.\n\nThis will be the 3rd chapter of the\
    \ final book. Please note that the GitHub repo will be made active later on.\n\
    \nIf you have comments about how we might improve the content and/or examples\
    \ in this book, or if you notice missing material within this chapter, please\
    \ reach out to the author at *pat@kudzera.com*.\n\nPython is a dynamically-typed\
    \ language; types can be changed at runtime. This is an obstacle when trying to\
    \ write robust code. Since types are embedded in the value itself, developers\
    \ have a very tough time knowing what type they are working with. Sure, that name\
    \ looks like a string today, but what happens if someone makes it `bytes`? Assumptions\
    \ about types are built on shaky grounds with dynamically typed languages. Hope\
    \ is not lost, though. In Python 3.5, a brand-new feature was introduced: type\
    \ annotations.\n\nType annotations bring your ability to write robust code to\
    \ a whole new level. Guido van Rossum, creator of Python, says it best:\n\n> *I’ve\
    \ learned a painful lesson that for small programs dynamic typing is great. For\
    \ large programs you have to have a more disciplined approach and it helps if\
    \ the language actually gives you that discipline, rather than telling you “Well,\
    \ you can do whatever you want”*¹\n\nType annotations are the more disciplined\
    \ approach, the extra bit of care you need to wrangle larger codebases. In this\
    \ chapter, you’ll learn how to use type annotations, why they are so important,\
    \ and how to utilize a tool called a type checker to enforce your intentions throughout\
    \ your codebase.\n\n## Type Annotations\n\nIn Chapter 2, you got your first glance\
    \ at a type annotation:\n\n```python\ndef close_kitchen_if_past_close(point_in_time:\
    \ datetime.datetime): ①\n    if point_in_time >= closing_time():\n        close_kitchen()\n\
    \        log_time_closed(point_in_time)\n```\n\n① The type annotation here is:\
    \ `datetime.datetime`\n\nType annotations are an additional syntax notifying the\
    \ user of an expected type of your variables. These annotations serve as *type\
    \ hints*; they provide hints to the reader, but they are not actually used by\
    \ the Python language. In fact, you are completely free to ignore the hints:\n\
    \n```python\n# CustomDateTime offers all the same functionality with\n# datetime.datetime.\
    \ I'm using it here for its better\n# logging facilities\nclose_kitchen_if_past_close(CustomDateTime(\"\
    now\")) # no error\n```\n\n> ### WARNING\n\nIt should be a rare case where you\
    \ go against a type hint. The author very clearly intended a specific use case.\
    \ If you go against that use case, and the code changes, you don’t have any protections\
    \ that you can work with the changed method.\n\nPython will not throw any error\
    \ at runtime in this scenario. As a matter of fact, it won’t use the type annotations\
    \ at all during runtime. There is no checking or cost for using these when Python\
    \ executes. These type annotations still serve a crucial purpose: informing your\
    \ readers of the expected type. Maintainers of code will know what types they\
    \ are allowed to use when changing your implementation. Calling code will also\
    \ benefit, as developers will know exactly what type to pass in. By implementing\
    \ type annotations, you reduce friction.\n\nPut yourself in your future maintainer’s\
    \ shoes. Wouldn’t it be nice to come across code that is intuitive to use? You\
    \ wouldn’t have to dig through function after function to determine usage. You\
    \ wouldn’t assume a wrong type and then need to deal with the fallout of exceptions\
    \ and wrong behavior."
  mdcn: "## 动态类型语言天生就不健壮吗？\n\n就像弱类型语言一样，在动态类型语言中编写健壮的代码仍然是完全可能的。你只需要为此付出更多努力。你必须做出更审慎的决策，以使你的代码库更具可维护性。另一方面，静态类型也不能保证健壮性；一个人可能只使用类型做最基本的事情，而几乎看不到任何好处。\n\
    \n更糟糕的是，我之前展示的类型注解在运行时对这种行为没有任何影响：\n\n```python\n>>> a: int = 5\n>>> a = \"string\"\
    \n>>> a\n\"string\"\n```\n\n没有错误，没有警告，什么都没有。但希望并未破灭，你有很多策略可以让代码更健壮。（否则，这本书就太短了）。我们将讨论最后一个有助于编写健壮代码的要点，然后开始深入探讨改进代码库的核心内容。\n\
    \n## 鸭子类型\n\n我觉得这就像是一条不成文的法则：每当有人提到鸭子类型，就一定会有人回应：\n\n> _如果它走起来像鸭子，叫起来也像鸭子，那它一定就是鸭子。_\n\
    \n我对这句话的问题在于，我发现它对于解释鸭子类型到底是什么完全没有帮助。它朗朗上口、简洁，而且关键的是，只有那些已经理解鸭子类型的人才能理解。我年轻的时候，只是礼貌地点头，生怕自己错过了这句简单话语背后的深刻含义。直到后来，我才真正理解了鸭子类型的力量。\n\
    \n鸭子类型是指在编程语言中，只要对象或实体遵循某种接口，就可以使用它们的能力。在 Python 中，这是一件美妙的事情，大多数人甚至在不知不觉中就在使用它。让我们看一个简单的例子来说明我在说什么。\n\
    \n```python\ndef print_items(items):\n    for item in items:\n        print(item)\n\
    \nprint_items([1, 2, 3])\nprint_items({4, 5, 6})\nprint_items({\"A\": 1, \"B\"\
    : 2, \"C\": 3})\n```\n\n在所有三次调用 `print_items` 中，我们都遍历集合并打印每个项目。想想这是如何工作的。`print_items`\
    \ 完全不知道它将接收什么类型。它只是在运行时接收一个类型并对其进行操作。它不会内省每个参数并根据类型决定做不同的事情。事实要简单得多。相反，`print_items`\
    \ 所做的只是检查传入的任何内容是否可以被迭代（通过调用 `__iter__` 方法）。如果存在 `__iter__` 属性，它就会被调用，并对返回的迭代器进行循环。\n\
    \n我们可以通过一个简单的代码示例来验证这一点：\n\n```python\n>>> for x in 5:\n...     print(x)\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError:\
    \ 'int' object is not iterable\n```\n\n鸭子类型使得这成为可能。只要一个类型支持函数所期望的变量和方法（基于实际使用的内容），你就可以在该函数中自由使用该类型。\n\
    \n这里还有另一个例子：\n\n```python\n>>> def double_value(value):\n...     return value\
    \ + value\n\n>>> double_value(5)\n10\n>>> double_value(\"abc\")\n\"abcabc\"\n\
    ```\n\n无论我们是在一个地方传递整数，还是在另一个地方传递字符串，这都无关紧要；两者都支持 `+` 运算符，所以两者都可以正常工作。任何支持 `+`\
    \ 运算符的对象都可以传入。我们甚至可以用列表来做：\n\n```python\n>>> double_value([1, 2, 3])\n[1, 2, 3,\
    \ 1, 2, 3]\n```\n\n那么，这如何影响健壮性呢？事实证明，鸭子类型是一把双刃剑。它可以增加健壮性，因为它增加了可组合性（我们将在 XREF\
    \ HERE 中了解更多关于可组合性的内容）。构建一个能够处理多种类型的可靠抽象库，可以减少对复杂特殊情况的需求。然而，如果鸭子类型被滥用，你就会开始破坏开发者可以依赖的假设。在更新代码时，仅仅做出更改是不够的；你必须查看所有调用代码，并确保传入你函数的类型也满足你的新更改。\n\
    \n考虑到所有这些，也许最好将本章开头的这个习语重新表述如下：\n\n> 如果它走起来像鸭子，叫起来也像鸭子，而你正在寻找走起来和叫起来都像鸭子的东西，那么你就可以把它当作鸭子来对待。\n\
    \n这话说起来就不那么顺口了，对吧？\n\n### 讨论主题\n\n你在你的代码库中使用鸭子类型吗？有没有一些地方你可以传入与代码期望不匹配的类型，但事情仍然能正常工作？你认为这些对于你的用例是增加还是减少了健壮性？\n\
