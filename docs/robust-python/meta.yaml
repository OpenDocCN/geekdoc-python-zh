    \n## 自底向上进行类型注解\n\n你的代码库可能依赖于一些公共代码区域。这些是你的核心库和工具，它们构成了其他所有内容的基础。对代码库的这些部分进行类型注解，使你的收益更侧重于广度而非深度。因为许多其他部分都建立在这个基础之上，它们都将从类型检查中受益。新代码也经常会依赖这些工具，因此你的新代码将获得额外的保护层。\n\
