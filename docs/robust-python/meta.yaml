  - '[PAGE 15]


    Figure 1-1. Plotting Cost and Proximity of Communication Methods


    There are 4 quadrants that make up the cost/proximity graph.


    # Low Cost, High Proximity Required


    These are cheap to produce and consume, but are not scalable across time. Direct
    communication and instant messaging are great examples of these methods. Treat
    these as snapshots of information in time; they are only valuable when the user
    is actively listening. Don’t rely on these methods to communicate to the future.


    # High-cost, High Proximity Required


    These are costly events, and often only happen once (such as meetings or conferences).
    There should be a lot of value delivered through these events at the time of communication,
    because they do not provide much value to the future. How many times have you
    been to a meeting that felt like a waste of time? This is direct loss of value
    you are feeling. Talks require a multiplicative cost for each attendee (time spent,
    hosting space, logistics, etc.). Code reviews are rarely looked at once they are
    done.


    # High Cost, Low Proximity Required


    These are costly, but that cost can be paid back over time in value delivered,
    due to the low proximity needed. Emails and agile boards contain a wealth of information,
    but are not discoverable by others. These are great for bigger concepts that don’t
    need frequent updates. It becomes a nightmare to try and sift through all the
    noise just to find the nugget of information you are looking for. Video recordings
    and design documentation are great for understanding snapshots in time, but are
    costly to keep updated. Don’t rely on these communication methods to understand
    day-to-day decisions.


    # Low Cost, Low Proximity Required


    These are cheap to create, and are easily consumable. Code comments, version control
    history and project READMES all fall into this category, since they are adjacent
    to the source code we write. Users can view this communication years after it
    was produced. Anything that is in a developer’s workflow will become easily discoverable.
    These communication methods'
  - '[PAGE 16]


    are a natural fit for the first place someone will look after the source code.
    However, your code is one of your best documentation tools, as it is the living
    record and single source of truth for your system.


    > ### DISCUSSION TOPIC


    This plot was created based on generalized use cases - think about the communication
    paths you and your organization uses. Where would you plot them on the graph?
    How easy is it to consume accurate information? How costly is it to produce information?
    Your answers to these questions may result in a slightly different graph, but
    the single source of truth will be in the executable software you deliver.


    Low cost, low proximity communication methods are the best tool for communicating
    to the future. You should strive to minimize the cost of production and of consumption
    of communication. You have to write software to deliver value anyway, so the lowest
    cost option is making your code your primary communication tool. Your codebase
    becomes the best possible option for expressing your decisions, opinions, and
    workarounds clearly.


    However, for this assertion to hold true, the code has to be cheap to consume
    as well. Your intent has to come across clearly in your code. Your goal is to
    minimize the time needed for a reader of your code to understand it. Ideally,
    a reader does not need to read your implementation, but just your function signature.
    Through the use of good types, comments and variable names, it should be crystal
    clear what your code does.


    > ### SELF-DOCUMENTING CODE


    The wrong response to this plot is “Self-documenting code is all I need!” Every
    communication path provides value that code alone won’t be able to. Version control
    will give you a history of changes. Design Documents discuss sweeping ideals that
    are not local to any one code file. Meetings (when done right) can be an important
    event for synchronizing plan execution. You should absolutely strive for code
    to be self-documenting, but realize that just handles *what* the code is doing.
    Don’t disparage any other communication path.


    The other quadrants of communication are still valuable. Design'
- md: "> documentation absolutely has a place for big picture decisions. Talks are\
    \ an incredibly effective way of sharing your ideas across large audiences. Meetings\
    \ (when done effectively) are essential to act as a sync point between interconnected\
    \ teams. Do not discount these methods, but understand that each communication\
    \ method is tailored for specific use cases. This book focuses on what you can\
    \ do in your code, but do not rely on just code to communicate your intent.\n\n\
    ## Examples of Intent In Python\n\nNow that I’ve talked through what intent is\
    \ and how it matters, let’s look at examples through a Python lens. How can you\
    \ make sure that you are correctly expressing your intentions? Consider some common\
    \ mistakes you come across when reading Python code?\n\n## Collections\n\nWhen\
    \ you pick a collection, you are communicating specific information. You must\
    \ pick the right collection for the task at hand. Otherwise, maintainers will\
    \ infer the wrong intention from your code.\n\nConsider this code that takes a\
    \ list of cookbooks and provides a count of how many times an author shows up:\n\
    \n```python\ndef create_author_count(cookbooks: List[Cookbook]):\n    counter\
    \ = {}\n    for cookbook in cookbooks:\n        if cookbook.author not in counter:\n\
    \            counter[cookbook.author] = 0\n        counter[cookbook.author] +=\
    \ 1\n    return counter\n```\n\nWhat does my use of collections tell you? Why\
    \ am I not passing a dictionary or a set? Why am I not returning a list? Based\
    \ on my current usage of collections, here’s what you can assert:\n\n- I pass\
    \ in a list of cookbooks. There can be duplicate cookbooks in this list (I might\
    \ be counting a shelf of cookbooks in a store with multiple copies).\n- I am returning\
    \ a dictionary. Users can look up a specific author, or iterate over the entire\
    \ dictionary. I do not have to worry about duplicate authors in the returned collection.\n\
    \nWhat if I wanted no duplicates in the list? A list communicates the wrong intention.\
    \ Instead, I should have chosen a set to communicate that this code absolutely\
    \ will not handle duplicates.\n\nChoosing a collection tells readers about your\
    \ specific intentions. Here’s a list of common collection types, and the intentions\
    \ they convey:\n\n### List\n\nThis is a collection to be iterated over. It is\
    \ *mutable*: able to be changed at any time. Very rarely do you expect to be retrieving\
    \ specific elements from the middle of the list (using a static list index). There\
    \ may be duplicate elements. The cookbooks on a shelf might be stored in a list.\n\
    \n### String\n\nAn immutable collection of characters. The name of a cookbook\
    \ would be a string.\n\n### Generators\n\nA collection to be iterated over, and\
    \ never indexed into. Each element access is performed lazily, so it may take\
    \ time and/or resources through each loop iteration. They are great for computationally\
    \ expensive or infinite collections. An online database of recipes might be returned\
    \ as a generator; you don’t want to fetch all the recipes in the world when the\
    \ user is only going to look at the first ten results of a search.\n\n### Tuple\n\
    \nTuples are immutable collections. You do not expect it to change, so it is more\
    \ likely to extract specific elements from the middle of the tuple (either through\
    \ indices or unpacking). It is very rarely iterated over. The information about\
    \ a specific cookbook might be represented as a tuple, such as `(cookbook_name,\
    \ author, pagecount)`.\n\n### Set\n\nAn iterable collection that contains no duplicates.\
    \ You cannot rely on ordering of elements. The ingredients in a cookbook might\
    \ be stored as a set.\n\n### Dictionary\n\nA mapping from keys to values. Keys\
    \ are unique across the dictionary. Dictionaries are typically iterated over,\
    \ or indexed into using dynamic keys. A cookbook’s index is a great example of\
    \ a key to value mapping (from topic to page number.)\n\nDo not use the wrong\
    \ collection for your purposes. Too many times have I come across a list that\
    \ should not have had duplicates or a dictionary that wasn’t actually being used\
    \ to map keys to values. Every time there is a disconnect between what you intend\
    \ and what is in code, you create a maintenance burden. Maintainers must pause,\
    \ work out what you really meant, and then work around their faulty assumptions.\n\
    \n> **DYNAMIC VS. STATIC INDEXING**\n>\n> Depending on the collection type you\
    \ are using, you may or may not want to use a *static index*. A static index is\
    \ when you always have the same index into the collection, regardless of collection,\
    \ such as `my_list[4]` or `my_dict[\"Python\"]`. In general, lists, and dictionaries\
    \ will not often need a use case for this. You have no guarantee that the collection\
    \ has the element you are looking for at that index, due to their dynamic nature.\
    \ If you are looking for specific fields in these types of collections, this is\
    \ a good sign that you need a user-defined type (explored in later sections).\
    \ It is safe to use a static index into tuples, since they are fixed size. Sets\
    \ and generators are never indexed into.\n>\n> Exceptions to this rule include:\n\
    >\n> * Getting the first or last element of a sequence (`my_list[0]` or `my_list[-1]`)\n\
    > * Using a dictionary as an intermediate data type such as reading JSON or YAML\n\
    > * Operations on a sequence that specifically deal with fixed chunks (such as\
    \ always splitting after the third element, or checking for a specific character\
    \ in a fixed-format string)\n> * Performance reasons for a specific collection\
    \ type\n>\n> In contrast, *dynamic indexing* is whenever you index into a collection\
    \ with a variable that is not known until runtime. This is the most appropriate\
    \ choice for lists, and dictionaries. You'll see this when iterating over collections\
    \ or searching for a specific element with an `index()` function.\n\nThese are\
    \ basic collections, but there are more ways to express intent. Here are some\
    \ special collection types that are even more expressive in communicating to the\
    \ future:\n\n- *frozenset*: a set that is immutable.\n- *OrderedDict*: a dictionary\
    \ that preserves order of elements based on insertion time.\n- *defaultdict*:\
    \ A dictionary that provides a default value if the key is missing. For example,\
    \ I could rewrite my earlier example as follows:\n\n```python\nfrom collections\
    \ import defaultdict\ndef create_author_count(cookbooks: List[Cookbook]):\n  \
    \  counter = defaultdict(lambda: 0)\n    for cookbook in cookbooks:\n        counter[cookbook.author]\
    \ += 1\n    return counter\n```\n\nThis introduces a new behavior for end users\
    \ - if they query the dictionary for a value that doesn't exist, they will receive\
    \ a 0. This might be beneficial in some use cases, but if it is not, you just\
    \ return `dict(counter)` instead.\n\n### Counter\n\nA special type of dictionary\
    \ used for counting how many times an element appears. This greatly simplifies\
    \ our above code to the following:\n\n```python\nfrom collections import Counter\n\
    def create_author_count(cookbooks: List[Cookbook]):\n    return Counter(book.author\
    \ for book in cookbooks)\n```\n\n> **NOTE**\n>\n> Built-in dictionaries are also\
    \ ordered from CPython 3.6 and Python 3.7 onwards.\n\nTake a minute to reflect\
    \ on that last example. Notice how using a Counter gives us much more concise\
    \ code without sacrificing readability. If your readers are familiar with Counter,\
    \ the meaning of this function (and how the implementation works) is immediately\
    \ apparent. This is a great example of communicating intent to the future through\
    \ better selection of collection types. I’ll continue to explore collections further\
    \ in Chapter 5.\n\nThere are plenty more types to explore, such as array, bytes,\
    \ ranges and more. Whenever you come across a new collection type, built-in or\
    \ otherwise, ask yourself how it differs from other collections and what it conveys\
    \ to future readers.\n\n## Iteration\n\nIteration is another example where the\
    \ abstraction you choose dictates the intent you convey.\n\nHow many times have\
    \ you seen code like this?\n\n```python\ntext = \"This is some generic text\"\n\
    index = 0\nwhile index < len(text):\n    print(text[index])\n    index += 1\n\
    ```\n\nThis simple code prints each character on a separate line. This is perfectly\
    \ fine."
