    > With typechecker available, do you even need tests? You certainly do. Typecheckers
    catch a specific class of errors - those of incompatible types. There are plenty
    of other classes of errors that you still need to test for. Treat typecheckers
    as just one tool in your arsenal of finding bugs.


    In all of these examples, typecheckers found a bug just waiting to happen. It
    doesn’t matter if the bug would have been caught by tests, or by code review,
    or by customers; typecheckers catch it earlier, which saves time and money. Typecheckers
    start giving us the benefit of a statically-typed language, while still allowing
    the Python runtime to remain dynamically-typed. This truly is the best of both
    worlds.


    At the beginning of the chapter, you’ll find a quote from Guido van Rossum. Guido
    van Rossum is the creator of the Python programming language. While working at
    Dropbox he found that large codebases struggled without having a safety net. He
    became a huge proponent for driving type hinting into the language. If you want
    your code to communicate intent and catch errors, start adopting type annotations
    and typechecking today.


    > ### DISCUSSION TOPIC

    Has your codebase had an error slip through that could have been caught by typecheckers?

    How much do those errors cost you? How many times has it been a code review or
    an integration test that caught the bug? How about bugs that made it to production?


