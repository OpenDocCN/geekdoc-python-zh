    \n# model for raw_input\ndef input(__prompt = ...) -> TaintSource[UserControlled]:\
    \ ...\n\n# model for os.system\ndef os.system(command: TaintSink[RemoteCodeExecution]):\
    \ ...\n```\n\nThese stubs tell pysa through type annotations about where your\
    \ taint sources and sinks are in your system.\nFinally, you need to tell pyre\
