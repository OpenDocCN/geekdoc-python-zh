  - "[PAGE 95]\n\nI will focus on one of the most popular typecheckers out there:\
    \ mypy. Mypy offers quite a few configuration options to control the typechecker’s\
    \ *strictness*, or amount of errors reported. The stricter you make your typechecker,\
    \ the more type annotations you need to write, providing better documentation\
    \ and creating fewer bugs. However, make the typechecker too strict, and you will\
    \ find the minimum bar for developing code too high, incurring high costs to make\
    \ changes. Mypy configuration options are what controls these strictness levels.\
    \ I’ll go through the different options available to you, and you can decide where\
    \ that bar lies for you and your codebase.\n\nFirst, you need to install mypy\
    \ (if you haven’t already). The easiest way is through pip on the commandline:\n\
    \n```\npip install mypy\n```\n\nOnce you have mypy installed, you you can control\
    \ configuration through one of three ways:\n\n*Command Line*\n\n    When instantiating\
    \ mypy from a terminal, you can pass various options to configure behavior. This\
    \ is great for exploring new checks in your codebase\n\n*Inline Configuration*\n\
    \n    You can specify configuration values at the top of a file to indicate any\
    \ options you may want to set. For example:\n\n```\n# mypy: disallow-any-generics`\n\
    ```\n\nat the top of your file will tell mypy to explicitly look for Any values\
    \ in a generics and fail if it finds any.\n\n*Configuration File*\n\n    You can\
    \ set up a configuration file to use the same options every time mypy runs. This\
    \ is extremely useful when needing to share the same options across a team. This\
    \ file is typically stored in version control alongside the code.\n\n# Configuring\
    \ Mypy"
  - '[PAGE 96]


    When running mypy, mypy looks in your current directory for a configuration file
    named `mypy.ini`. This file will define which options you have set up for the
    project. Some options will be global, applied to every file, and other options
    will be per-module. A sample `mypy.ini` file might look as follows:


    ```

    # Global options:


    [mypy]

    python_version = 3.9

    warn_return_any = True


    # Per-module options:


    [mypy-mycode.foo.*]

    disallow_untyped_defs = True


    [mypy-mycode.bar]

    warn_return_any = False


    [mypy-somelibrary]

    ignore_missing_imports = True

    ```


    > TIP

    You can use the `--config-file` command line option to specify config files in
    different places. Also, mypy will look for configuration files in specific home
    directories if it can''t find a local config file, in case you want the same settings
    across multiple projects. For more information, check out the [mypy documentation](https://mypy.readthedocs.io/en/stable/config_file.html).


    I''ll cover some of the important options that you need to be aware of; they will
    help you control the behavior you want out of your typechecker. As a note, I won''t
    cover too much more about the configuration file. Most options that I''ll talk
    about work in both a configuration file and on the command line, and for the sake
    of simplicity, I''ll show you how to run the commands on mypy invocations.


    # Catching Dynamic Behavior


    As mentioned before, Python''s dynamically typed nature will make maintenance
    hard on long-living code bases. When dynamically typed, every variable is essentially
    an `Any` type. `Any` indicates that literally any type would work for the'
