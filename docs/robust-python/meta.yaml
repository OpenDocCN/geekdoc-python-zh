    \ this were entered, it would print out the entire home directory (the command\
    \ becomes `touch ~/food_data/carrots; ls ~;.json`). Based on input, a malicious\
    \ user could enter in arbitrary commands on your server (this is known as remote\
    \ code execution, or RCE), which is a huge security risk.\n\nPysa provides tools\
    \ to check this. I can specify that anything coming from `input()` is potentially\
    \ tainted data (known as a taint source), and anything passed to `os.system` should\
    \ not be tainted (known as a taint sink). With this information, I need to build\
    \ a *taint model*, which is a set of rules for detecting potential security holes.\
    \ First, I must specify a `taint.config` file:\n\n```\n{\n  sources: [\n    {\n\
    \      name: \"UserControlled\",\n      comment: \"use to annotate user input\"\
    \n    }\n  ],\n\n  sinks: [\n    {\n      name: \"RemoteCodeExecution\",\n   \
    \   comment: \"use to annotate execution of code\"\n    }\n  ],\n\n  features:\
    \ [],\n\n  rules: [\n    {\n      name: \"Possible shell injection\",\n      code:\
    \ 5001,\n      sources: [ \"UserControlled\" ],\n      sinks: [ \"RemoteCodeExecution\"\
    \ ],\n      message_format: \"Data from [{$sources}] source(s) may reach [{$sinks}]\
    \ sink(s)\"\n    }\n  ]\n}\n```\n\n1. Specify an annotation for user controlled\
    \ input\n2. Specify an annotation for Remote Code Execution flaws\n3. Specify\
    \ a rule that makes any tainted data from UserControlled sources an error if it\
    \ ends up in a RemoteCodeExecution sink.\n\nFrom there, I must specify a taint\
