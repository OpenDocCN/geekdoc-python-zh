    class Snack:\n    name: Literal[\"Pretzel\", \"Hotdog\"]\n    condiments: Set[Literal[\"\
    Mustard\", \"Ketchup\"]]\n```\n\nNow, if I try to instantiate these dataclasses\
    \ with wrong values:\n\n```python\nError(0, False)\nSnack(\"Not Valid\", set())\n\
