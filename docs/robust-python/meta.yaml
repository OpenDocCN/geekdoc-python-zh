    \ states.\n\n# Literal Types\n\nWhen calculating the number of representable states,\
    \ I made some assumptions in the last section. I limited the number of values\
    \ that were possible, but that’s a bit of a cheat, isn’t it? As I said before,\
    \ there are almost an infinite number of values possible. Fortunately, there is\
    \ a way to limit the values through Python: `Literals`. `Literal` types allow\
    \ you to restrict the variable to a very specific set of values.\n\nI’ll change\
    \ my earlier `Snack` class to employ `Literal` values:\n\n```\nfrom typing import\
    \ Literal, Set\n@dataclass\nclass Error:\n    error_code: Literal[1,2,3,4,5]\n\
    \    disposed_of: bool\n\n@dataclass\nclass Snack:\n    name: Literal[\"Pretzel\"\
    , \"Hotdog\"]\n    condiments: Set[Literal[\"Mustard\", \"Ketchup\"]]\n```\n\n\
    Now, if I try to instantiate these dataclasses with wrong values:\n\n```\nError(0,\
    \ False)\nSnack(\"Not Valid\", set())\nSnack(\"Pretzel\", {\"Mustard\", \"Relish\"\
    })\n```"
