  md: "```\npython\nfrom typing import Union\ndef dispense_snack(user_input: str)\
    \ -> Union[HotDog, Pretzel, str]:\n    if user_input == \"Hotdog\":\n        return\
    \ dispense_hotdog()\n    elif user_input == \"Pretzel\":\n        return dispense_pretzel()\n\
    \    return \"ERROR: Invalid User Input\"\n```\n\nYou will find Unions very useful\
    \ in a variety of situations:\n\n+   - Handling disparate types returned based\
    \ on user input (as above)\n- Handling error return types a la Optionals, but\
    \ with more information, such as a string or error code.\n- Handling different\
    \ user input (such as if a user is able to supply a list or a string.)\n- Returning\
    \ different types, say for backwards compatibility (returning an old version of\
    \ an object or a new version of an object depending on requested operation)\n\
    - And any other case where you may legitimately have more than one value represented.\n\
    \nUsing a `Union` offers much of the same benefit as an `Optional`. First, you\
    \ reap the same communication advantages. A developer encountering a `Union` knows\
    \ that they must be able to handle more than one type in their calling code. Furthermore,\
    \ a typechecker is just as aware of `Union` as it is `Optional`.\n\nSuppose you\
    \ had code that called the `dispense_snack` function but were only expecting a\
    \ `Hotdog` or a `string` to be returned:\n\n```\npython\nfrom typing import Optional,\
    \ Union\ndef place_order() -> Optional[HotDog]:\n    order = get_order()\n   \
    \ result = dispense_snack(order.name)\n    if isinstance(result, str):\n     \
    \   print(\"An error occurred\" + result)\n        return None\n    # Return our\
    \ HotDog\n    return result\n```"
