- md: "## As Easy as ABC\n\nAbstract Base Classes in the `collections.abc` module\
    \ provide another grouping of classes that you can override to create your own\
    \ collections. These Abstract Base Classes (or ABCs) is a class that is intended\
    \ to be subclassed, and require the subclass to implement very specific functions.\
    \ For the `collections.abc`, these ABCs are all centered on custom collections.\
    \ In order to create a custom collection, you must override specific functions,\
    \ depending on the type you want to emulate. You can find a full list of required\
    \ functions to implement at the `collections.abc`'s module documentation.² Once\
    \ you implement these required functions though, the ABC fills in other functions\
    \ automatically.\n\n> **NOTE**\n\nIn contrast to the `User*` classes, there is\
    \ no built in storage, such as `self.data`, inside these classes. You must provide\
    \ your own storage.\n\nLet's look at a `collections.abc.Set`, since there is no\
    \ `UserSet` elsewhere in collections. I want to create a custom set that automatically\
    \ handles aliases of ingredients (such as rocket and arugula). In order to create\
    \ this custom set, I need to implement three methods:\n\n- `__contains__`: This\
    \ is for membership checks: `\"arugula\" in ingredients`.\n- `__iter__`: This\
    \ is for iterating: `for ingredient in ingredients`\n- `__len__`: This is for\
    \ checking the length: `len(ingredients)`\n\nOnce these three methods are defined,\
    \ methods like relational operations, equality operations and set operations (union,\
    \ intersection, difference, disjoint) will just work. That's the beauty of `collections.abc`.\
    \ Once you define a select few methods, the rest come for free. Here it is in\
    \ action:\n\n```python\nimport collections\n\nclass AliasedIngredients(collections.abc.Set):\n\
    \    def __init__(self, ingredients: set[str]):\n        self.ingredients = ingredients\n\
    \n    def __contains__(self, value: str):\n        return value in self.ingredients\
    \ or any(alias in\n            self.ingredients for alias in get_aliases(value))\n\
    \n    def __iter__(self):\n        return iter(self.ingredients)\n\n    def __len__(self):\n\
    \        return len(self.ingredients)\n```\n\n```python\ningredients = AliasedIngredients({'arugula',\
    \ 'eggplant', 'pepper'})\nfor ingredient in ingredients:\n    print(ingredient)\n\
    >>> 'arugula'\n'eggplant'\n'pepper'\n\nprint(len(ingredients))\n>>> 3\n\nprint('arugula'\
    \ in ingredients)\n>>> True\n\nprint('rocket' in ingredients)\n>>> True\n\nlist(ingredients\
    \ | AliasedIngredients({'garlic'}))\n>>>['pepper', 'arugula', 'eggplant', 'garlic']\n\
    ```\n\nThat’s not the only cool thing about `collections.abc`, though. Using `collections.abc`\
    \ in type annotations can help you write more generic code. Take this code from\
    \ all the way back in Chapter 2:\n\n```python\ndef print_items(items):\n    for\
    \ item in items:\n        print(item)\n\nprint_items([1,2,3])\nprint_items({4,\
    \ 5, 6})\nprint_items({\"A\": 1, \"B\": 2, \"C\": 3})\n```\n\nI talked about how\
    \ duck typing can be both a boon and a curse for robust code. It’s great that\
    \ I can write a single function that can take so many different types, but communicating\
    \ intent through type annotations becomes challenging. Fortunately, I can use\
    \ the `collections.abc` classes to provide type hints:\n\n```python\ndef print_items(items:\
    \ collections.abc.Iterable):\n    for item in items:\n        print(item)\n```\n\
    \nIn this case, I am indicating that items are simply iterable through the **Iterable**\
    \ ABC. As long as the parameter supports an `__iter__` method (and most collections\
    \ do), this code will typecheck.\n\nAs of Python 3.9, there are 25 different ABCs\
    \ for you to use. Check them all out in the Python documentation³.\n\n## Wrap-up\n\
    \nYou can’t go far without running into collections in Python. Lists, dictionaries,\
    \ and sets are commonplace, and it’s imperative that you provide hints to the\
    \ future about what collection types you’re working with. Consider if your collections\
    \ are homogeneous or heterogeneous, and what that tells future readers. For the\
    \ cases where you do use heterogeneous collections, provide enough information\
    \ for other developers to reason about them, such as a TypedDict. Once you learn\
    \ the techniques to allow other developers to reason about your collections, your\
    \ codebase becomes so much more understandable.\n\nAlways think through your options\
    \ when creating new collections:\n\n- If you are just extending a type, such as\
    \ adding new methods, you can subclass directly from collections such as list\
    \ or dictionary. However, beware the rough edges, as there is some surprising\
    \ Python behavior if a user ever overrides a built-in method.\n- If you are looking\
    \ to change out a small part of a list, dictionary or string, use `collections.UserList`,\
    \ `collections.UserDict`, or `collections.UserString`, respectively. Remember\
    \ to reference `self.data` to access the storage of the respective type.\n- If\
    \ you need to write a more complicated class with the interface of another collection\
    \ type, use `collections.abc`. You will need to provide your own storage for the\
    \ data inside the class and implement all required methods, but once you do, you\
    \ can customize that collection to your heart’s content.\n\n> ### DISCUSSION TOPIC\n\
    \nLook through your use of collections and generics in your codebase, and assess\
    \ how much information is conveyed to future developers. How many custom collection\
    \ types are in your codebase? What can a new developer tell about the collection\
    \ types by just looking at type signatures and names? Are there collections you\
    \ could be defining more generically? What about other types using generics?\n\
    \nNow, type annotations don’t reach their full potential without the aid of a\
    \ typechecker. In the next chapter, I’m going to focus on the typechecker itself.\
    \ You’ll learn how to effectively configure a typechecker, generate reports, and\
    \ evaluate different checkers. The more you know about a tool, the more effectively\
    \ you can wield it. This is especially true for your typechecker.\n\n1. https://rapidapi.com/spoonacular/api/recipe-food-nutrition?endpoint=59b3d500e4b0b0cacf7c5aaa\n\
    2. https://docs.python.org/3/library/collections.abc.html#module-collections.abc\n\
    3. https://docs.python.org/3/library/collections.abc.html#module-collections.abc\n\
    \n# Chapter 6. Customizing Your Typechecker\n\n> ### A NOTE FOR EARLY RELEASE\
    \ READERS\n\nWith Early Release ebooks, you get books in their earliest form—the\
    \ author’s raw and unedited content as they write—so you can take advantage of\
    \ these technologies long before the official release of these titles.\n\nThis\
    \ will be the 6th chapter of the final book. Please note that the GitHub repo\
    \ will be made active later on.\n\nIf you have comments about how we might improve\
    \ the content and/or examples in this book, or if you notice missing material\
    \ within this chapter, please reach out to the author at pat@kudzera.com.\n\n\
    Typecheckers are one of your best resources for building robust codebases. Jukka\
    \ Lehtosalo, the lead developer of mypy, offers a beautifully concise definition\
    \ of typecheckers: *In essence, [a typechecker] provides verified documentation.*<sup>1</sup>\
    \ Type annotations provide documentation about your codebase, allowing other developers\
    \ the ability to reason about your intentions. And typecheckers use those annotations\
    \ to verify that the documentation matches the behavior.\n\nAs such, a typechecker\
    \ is invaluable. The wise sage Confucius once said *The mechanic, who wishes to\
    \ do his work well, must first sharpen his tools.*<sup>2</sup> This chapter is\
    \ all about sharpening your typechecker usage. Great coding techniques can get\
    \ you far, but its your surrounding tooling that takes you to the next level.\
    \ Don’t stop with just learning your editor, compiler, or operating system. Learn\
    \ your typechecker too. I will show you some of the more useful options to get\
    \ the most out of your tools.\n\n## Configuring Your Typechecker"
  mdcn: "## 简单如ABC\n\n`collections.abc` 模块中的抽象基类提供了另一组你可以重写以创建自定义集合的类。这些抽象基类（或称ABC）是设计为被继承的类，并要求子类实现非常特定的函数。对于\
    \ `collections.abc`，这些ABC都围绕自定义集合展开。要创建自定义集合，你必须重写特定的函数，具体取决于你想要模拟的类型。你可以在 `collections.abc`\
    \ 的模块文档中找到需要实现的完整函数列表。² 一旦你实现了这些必需的函数，ABC会自动填充其他函数。\n\n> **注意**\n\n与 `User*` 类不同，这些类内部没有内置的存储，例如\
    \ `self.data`。你必须提供自己的存储。\n\n让我们看看 `collections.abc.Set`，因为集合中没有其他地方的 `UserSet`。我想创建一个自定义集合，自动处理食材的别名（例如芝麻菜和火箭菜）。为了创建这个自定义集合，我需要实现三个方法：\n\
    \n- `__contains__`：用于成员检查：`\"arugula\" in ingredients`。\n- `__iter__`：用于迭代：`for\
    \ ingredient in ingredients`\n- `__len__`：用于检查长度：`len(ingredients)`\n\n一旦定义了这三个方法，关系操作、相等操作和集合操作（并集、交集、差集、不相交）等方法就会自动生效。这就是\
    \ `collections.abc` 的美妙之处。一旦你定义了少数几个方法，其余的就会免费提供。以下是实际应用：\n\n```python\nimport\
    \ collections\n\nclass AliasedIngredients(collections.abc.Set):\n    def __init__(self,\
    \ ingredients: set[str]):\n        self.ingredients = ingredients\n\n    def __contains__(self,\
    \ value: str):\n        return value in self.ingredients or any(alias in\n   \
    \         self.ingredients for alias in get_aliases(value))\n\n    def __iter__(self):\n\
    \        return iter(self.ingredients)\n\n    def __len__(self):\n        return\
    \ len(self.ingredients)\n```\n\n```python\ningredients = AliasedIngredients({'arugula',\
    \ 'eggplant', 'pepper'})\nfor ingredient in ingredients:\n    print(ingredient)\n\
    >>> 'arugula'\n'eggplant'\n'pepper'\n\nprint(len(ingredients))\n>>> 3\n\nprint('arugula'\
    \ in ingredients)\n>>> True\n\nprint('rocket' in ingredients)\n>>> True\n\nlist(ingredients\
    \ | AliasedIngredients({'garlic'}))\n>>>['pepper', 'arugula', 'eggplant', 'garlic']\n\
    ```\n\n然而，这并不是 `collections.abc` 唯一的酷炫之处。在类型注解中使用 `collections.abc` 可以帮助你编写更通用的代码。看看这段来自第2章的代码：\n\
    \n```python\ndef print_items(items):\n    for item in items:\n        print(item)\n\
    \nprint_items([1,2,3])\nprint_items({4, 5, 6})\nprint_items({\"A\": 1, \"B\":\
    \ 2, \"C\": 3})\n```\n\n我曾谈到鸭子类型对于健壮代码来说既是福音也是诅咒。我可以编写一个函数来处理许多不同类型，这很棒，但通过类型注解来传达意图就变得具有挑战性。幸运的是，我可以使用\
    \ `collections.abc` 类来提供类型提示：\n\n```python\ndef print_items(items: collections.abc.Iterable):\n\
    \    for item in items:\n        print(item)\n```\n\n在这种情况下，我通过 **Iterable** ABC\
    \ 表明 items 是可迭代的。只要参数支持 `__iter__` 方法（大多数集合都支持），这段代码就能通过类型检查。\n\n截至Python 3.9，有25个不同的ABC可供你使用。请在Python文档³中查看它们。\n\
    \n## 总结\n\n在Python中，你几乎无法避开集合。列表、字典和集合都很常见，你必须为未来的开发者提供关于你正在使用的集合类型的提示。考虑你的集合是同构的还是异构的，以及这告诉了未来的读者什么。对于你确实使用异构集合的情况，提供足够的信息让其他开发者能够理解它们，例如TypedDict。一旦你学会了让其他开发者理解你的集合的技术，你的代码库就会变得更容易理解。\n\
    \n在创建新集合时，始终考虑你的选择：\n\n- 如果你只是扩展一个类型，例如添加新方法，你可以直接从集合（如列表或字典）继承子类。但是，要小心粗糙的边缘，因为如果用户重写了内置方法，Python会有一些令人惊讶的行为。\n\
    - 如果你想要更改列表、字典或字符串的一小部分，请分别使用 `collections.UserList`、`collections.UserDict` 或\
    \ `collections.UserString`。记住引用 `self.data` 来访问相应类型的存储。\n- 如果你需要编写一个具有另一个集合类型接口的更复杂的类，请使用\
    \ `collections.abc`。你需要为类内部的数据提供自己的存储并实现所有必需的方法，但一旦完成，你就可以随心所欲地自定义该集合。\n\n> ###\
    \ 讨论主题\n\n查看你在代码库中对集合和泛型的使用，评估向未来开发者传达了多少信息。你的代码库中有多少自定义集合类型？新开发者仅通过查看类型签名和名称就能了解集合类型吗？是否有你可以更通用地定义的集合？其他使用泛型的类型呢？\n\
    \n现在，类型注解在没有类型检查器的帮助下无法发挥其全部潜力。在下一章中，我将专注于类型检查器本身。你将学习如何有效地配置类型检查器、生成报告以及评估不同的检查器。你对工具了解得越多，就能越有效地使用它。这对于你的类型检查器尤其如此。\n\
    \n1. https://rapidapi.com/spoonacular/api/recipe-food-nutrition?endpoint=59b3d500e4b0b0cacf7c5aaa\n\
    2. https://docs.python.org/3/library/collections.abc.html#module-collections.abc\n\
    3. https://docs.python.org/3/library/collections.abc.html#module-collections.abc\n\
    \n# 第6章. 自定义你的类型检查器\n\n> ### 给早期发布读者的说明\n\n通过早期发布电子书，你可以在书籍的最早形式中获取内容——作者在写作过程中的原始未编辑内容——因此你可以在这些书籍正式发布之前很久就利用这些技术。\n\
    \n这将是最终书籍的第6章。请注意，GitHub仓库将在稍后激活。\n\n如果你对我们如何改进本书的内容和/或示例有意见，或者你注意到本章中缺少材料，请通过\
    \ pat@kudzera.com 联系作者。\n\n类型检查器是构建健壮代码库的最佳资源之一。mypy的首席开发者Jukka Lehtosalo对类型检查器给出了一个简洁而优美的定义：*本质上，[类型检查器]提供了经过验证的文档。*<sup>1</sup>\
    \ 类型注解提供了关于你代码库的文档，允许其他开发者理解你的意图。而类型检查器使用这些注解来验证文档是否与行为匹配。\n\n因此，类型检查器是无价的。圣人孔子曾说\
    \ *工欲善其事，必先利其器。*<sup>2</sup> 本章将重点介绍如何优化你的类型检查器使用。优秀的编码技巧可以让你走得很远，但真正让你更上一层楼的是你周围的工具。不要仅仅满足于学习你的编辑器、编译器或操作系统。也要学习你的类型检查器。我将向你展示一些更有用的选项，以充分利用你的工具。\n\
    \n## 配置你的类型检查器"
