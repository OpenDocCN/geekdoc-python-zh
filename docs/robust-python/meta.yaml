  - "[PAGE 84]\n\nConsider the innocuous reverse list function.\n\n```\ndef reverse(coll:\
    \ list) -> list:\n    return coll[::-1]\n```\n\nTo achieve this, I use a generic,\
    \ which is done with a TypeVar in Python.\n\n```\nfrom typing import TypeVar\n\
    T = TypeVar('T')\ndef reverse(coll: list[T]) -> list[T]:\n    return coll[::-1]\n\
    ```\n\nThis says that for a type “T”, reverse takes in a list of elements of type\
    \ “T”, and returns a list of elements of type “T”. I can’t mix types: a list of\
    \ integers will never be able to become a list of strings if those lists aren’t\
    \ using the same TypeVar.\n\nI can use this sort of pattern to define entire classes.\
    \ Suppose I want to integrate a cookbook recommender service into the cookbook\
    \ collection app. I want to be able to recommend cookbooks or recipes based on\
    \ your ratings. To do this, I want to store each of these information into a graph.\
    \ A graph is a data structure that contains a series of entities known as nodes,\
    \ and tracks relationships between those nodes, known as edges. However, I don’t\
    \ want to write separate code for a cookbook graph and a recipe graph. So I define\
    \ a graph class that can be used for generic types. In my example, I’ll use T\
    \ for my node type and W for my edges.\n\n```\nfrom collections import defualtdict\n\
    from typing import Generic, TypeVar\n\nT = TypeVar(\"T\")\nW = TypeVar(\"W\")\n\
    \n# directed graph\nclass Graph(Generic[T, W]):\n    def __init__(self):\n   \
    \     self.edges: dict[T, list[W]] = defaultdict(list)\n\n    def add_relation(self,\
    \ node: T, to: W):\n        self.edges[node].append(to)\n\n    def get_relations(self,\
    \ node: T) -> list[W]:\n        return self.edges[node]\n```"
