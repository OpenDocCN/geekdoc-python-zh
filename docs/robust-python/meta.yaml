  md: "inside your type hierarchy. You need `Optional` types.\n\n*Optional types*\
    \ offer you two choices: either you have a value or you don't. In other words,\
    \ it is optional to set the variable to a value.\n\n```\nfrom typing import Optional\n\
    maybe_a_string: Optional[str] = \"abcdef\" # This has a value\nmaybe_a_string:\
    \ Optional[str] = None     # This is the absence of a value\n```\n\nThis code\
    \ indicates that the variable `maybe_a_string` may optionally contain a string.\
    \ That code typechecks just fine, whether there is a string value bound to `maybe_a_string`\
    \ or a `None` value.\n\nAt first glance, it's not apparent what this buys you.\
    \ You still need to use `None` to represent the absence of a value. I have good\
    \ news for you, though. There are three benefits I associate with `Optional` types.\n\
    \nFirst, you communicate your intent more clearly. If a developer sees an `Optional`\
    \ type in a type signature, they view that as a big red flag that they should\
    \ expect `None` as a possibility.\n\n```\ndef dispense_bun() -> Optional[Bun]:\n\
    \    # ...\n```\n\nIf you notice a function returning an `Optional` value, take\
    \ heed and check for `None` Values.\n\nSecondly, you are able to further distinguish\
    \ the absence of value from an empty value. Consider the innocuous list. What\
    \ happens if you make a function call and receive an empty list? Was it just that\
    \ no results were provided back to you? Or was it that an error occurred and you\
    \ need to take explicit action? If you are receiving a raw list, you don't know\
    \ without trawling through source code. However, if you use an `Optional`, you\
    \ are conveying one of three possibilities:\n\n+   - A list with elements - valid\
    \ data to be operated on\n- A list with no elements - no error occurred, but no\
    \ data was available (provided that no data is not an error condition)"
