  md: 'development cycles. The longer a tool takes to provide useful feedback to developers,
    the less often developers will run the tool, thus defeating the purpose. It is
    in everyone’s interest for typecheckers to run as fast as possible, so that developers
    are getting type errors at near real-time.


    In order to speed up mypy even more, you may want to consider a *remote cache*.
    A remote cache provides a way of caching your mypy typechecks somewhere accessible
    to your entire team. This way, you can cache results based on specific commit
    IDs in your version control, and share typechecker information. Building this
    system is outside the scope of this book, but the [remote cache documentation](https://mypy.readthedocs.io/en/stable/remote_cache.html)
    in mypy will provide a solid start.


    You also want to consider mypy in daemon mode. Daemon mode is when mypy runs as
    a standalone process, and keeps previous mypy state in memory rather than on a
    file system (or across a network link). You can start a mypy daemon by running
    `dmypy run -- mypy-flags <mypy-files>`. Once the daemon is running, you can run
    the exact same command to check the files again.


    For instance, I ran mypy on the mypy source code itself. My initial run took 23
    seconds. Subsequent typechecks on my system took between 16 and 18 seconds. This
    is *technically* faster, but I would not consider it fast. When I use the mypy
    daemon, though, my subsequent runs ended up being under half a second. With times
    like that, I can run my typechecker much more often to get feedback faster. Check
    out more about dmypy in the [mypy daemon mode documentation](https://mypy.readthedocs.io/en/stable/mypy_daemon.html).


    # Alternative Typecheckers


    Mypy is very configurable, and it’s wealth of options will let you decide on the
    exact behavior you are looking for, but it won’t meet all of your needs all the
    time. It isn’t the only typechecker out there. I’d like to introduce two other
    type-checkers to you: pyre (written by Facebook) and pyright (written by Microsoft).


    # Pyre


    You can install Pyre with through pip:


    ```

    pip install pyre-check

    ```'
