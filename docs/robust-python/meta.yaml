    \ in Python 3.8, and they are an invaluable way of restricting possible values\
    \ of a variable.\n\n## Annotated Types\n\nWhat if I wanted to get even deeper\
    \ and specify more complex constraints? It would be tedious to write hundreds\
    \ of literals, and some constraints aren’t able to be modelled by `Literal` types.\
