    def schedule_restaurant_open(open_time, workers_needed):\n```\n\n让我们暂时忽略实现细节，因为我希望先关注第一印象。你认为可以传入什么参数？停下来，闭上眼睛，在继续阅读之前，问问自己哪些合理的类型可以被传入。`open_time`\
    \ 是一个 datetime 对象，一个自纪元以来的秒数，还是一个包含小时的字符串？`workers_needed` 是一个名字列表，一个 `Worker`\
    \ 对象列表，还是其他什么？如果你猜错了，或者不确定，你需要去查看实现或调用代码，而我之前已经说过这既耗时又令人沮丧。\n\n让我提供一个实现，你可以看看你猜得有多接近。\n\
    \n```python\nimport datetime\nimport random\n\ndef schedule_restaurant_open(open_time:\
    \ datetime.datetime,\n    workers_needed: int):\n    workers = find_workers_available_for_time(open_time)\n\
    \    # use random.sample to pick X available workers\n    # where X is the number\
    \ of workers needed.\n    for worker in random.sample(workers, workers_needed):\n\
    \        worker.schedule(open_time)\n```\n\n你可能猜到了 `open_time` 是一个 datetime 对象，但你是否考虑过\
    \ `workers_needed` 可能是一个整数？一旦你看到类型注解，你就能更清楚地了解发生了什么。这减少了认知负担，并降低了维护者的摩擦。\n\n>\
    \ 警告\n\n这无疑是朝着正确方向迈出的一步，但不要止步于此。如果你看到这样的代码，考虑将变量重命名为 `number_of_workers_needed`，以反映这个整数的确切含义。在下一章中，我还将探讨类型别名，它提供了另一种表达方式。\n\
    \n到目前为止，我展示的所有示例都集中在参数上，但你也可以注解*返回类型*。\n\n考虑 `schedule_restaurant_open` 函数。在那段代码片段中，我调用了\
    \ `find_workers_available_for_time`。它返回一个名为 `workers` 的变量。假设你想更改代码，选择那些最久没有工作的员工，而不是随机抽样？你有任何迹象表明\
    \ `workers` 的类型是什么吗？\n\n如果你只看函数签名，你会看到以下内容：\n\n```python\ndef find_workers_available_for_time(open_time:\
    \ datetime.datetime):\n```\n\n这里没有任何东西能帮助我们更快地完成工作。你可以猜测，然后测试会告诉我们，对吧？也许它是一个名字列表？与其让测试失败，也许你应该去查看实现。\n\
    \n```python\ndef find_workers_available_for_time(open_time: datetime.datetime):\n\
    \    workers = worker_database.get_all_workers()\n    available_workers = [worker\
    \ for worker in workers\n                         if is_available(worker)]\n \
    \   if available_workers:\n        return available_workers\n\n    # fall back\
    \ to workers who listed they are available in\n    # in an emergency\n    emergency_workers\
    \ = [worker for worker in get_emergency_workers()\n                         if\
    \ is_available(worker)]\n\n    if emergency_workers:\n        return emergency_workers\n\
    \n    # Schedule the owner to open, they will find someone else\n    return [OWNER]\n\
    ```\n\n哦不，这里没有任何东西告诉你应该期望什么类型。这段代码中有三个不同的返回语句，你希望它们都返回相同的类型（当然，每个 if 语句都通过单元测试来确保它们是一致的，对吧？对吧？）你需要深入挖掘。你需要查看\
    \ `worker_database`。你需要查看 `is_available` 和 `get_emergency_workers`。你需要查看 OWNER\
    \ 变量。所有这些都需要保持一致，否则你需要在原始代码中处理特殊情况。\n\n如果这些函数也没有确切地告诉你需要什么怎么办？如果你必须通过多个函数调用更深入地挖掘怎么办？你必须经过的每一层都是你需要记在脑中的另一层抽象。每一条信息都会导致认知过载。你承受的认知过载越多，就越有可能发生错误。\n\
    \n所有这些都可以通过注解返回类型来避免。返回类型通过在函数声明末尾放置 `-> <type>` 来注解。如果你遇到这个函数签名：\n\n```python\n\
    def find_workers_available_for_time(open_time: datetime.datetime) -> list[str]:\n\
    ```\n\n你现在知道你确实应该将 workers 视为一个字符串列表。无需挖掘数据库、函数调用或模块。\n\n最后，你可以在需要时注解变量。\n\n```python\n\
    workers: list[str] = find_workers_available_for_time(open_time)\nnumbers: list[int]\
    \ = []\nratio: float = get_ratio(5,3)\n```\n\n大多数时候，我不会费心去注解变量，除非我想在代码中传达一些特定的东西（例如，一个与预期不同的类型）。我不想过于深入地在所有东西上都放上类型注解的领域——缺乏冗长性正是许多开发者最初被\
    \ Python 吸引的原因。类型可能会使你的代码变得杂乱，尤其是当类型显而易见时。\n\n```python\nnumber: int = 0\ntext:\
    \ str = \"useless\"\nvalues: list[float] = [1.2, 3.4, 6.0]\nworker: Worker = Worker()\n\
    ```\n\n这些类型注解都没有提供比 Python 本身已经提供的更有用的价值。这段代码的读者知道 \"useless\" 是一个字符串。记住，类型注解用于类型提示；你是在为未来提供注释以改善沟通。你不需要在每个地方都陈述显而易见的事情。\n\
    \n## PYTHON 3.5 之前的类型注解\n\n如果你不幸无法使用更高版本的 Python，希望并未破灭。对于类型注解，甚至对于 Python 2.7，也有替代语法。\n\
    \n要编写注解，你需要在注释中进行：\n\n```python\nratio = get_ratio(5,3) # type: float\ndef get_workers(open):\
    \ # type: (datetime.datetime) -> List[str]\n```\n\n这更容易被忽略，因为类型在视觉上并不靠近变量本身。如果你有能力升级到\
    \ Python 3.5，考虑这样做并使用更新的类型注解方法。\n\n## 好处\n\n与你做出的每个决定一样，你需要权衡成本和收益。提前考虑类型有助于你的深思熟虑的设计过程，但类型注解还提供其他好处吗？我将通过工具展示类型注解如何真正发挥其价值。\n\
    \n## 自动补全\n\n我主要谈论的是与其他开发者的沟通，但你的 Python 环境也从类型注解中受益。由于 Python 是动态类型的，很难知道有哪些操作可用。有了类型注解，许多支持\
    \ Python 的代码编辑器会自动补全你的变量操作。\n\n在图 3-1 中，你会看到一个截图，展示了 VSCode 检测到一个 datetime 并提供自动补全我的变量。\n\
    \n```python\ndef find_workers_available_for_time(open_time: datetime.datetime):\n\
    \    workers = worker_database.get_all_workers()\n    available_workers = [worker\
    \ for worker in workers\n                         if is_available(worker)]\n \
    \   if available_workers:\n        return available_workers\n```\n\n![](img/b136c318777181835dbab42f383e392c_47_0.png)\n\
    \n## 类型检查器\n\n在整本书中，我一直在谈论类型如何传达意图，但遗漏了一个关键细节：如果程序员不愿意，没有人必须遵守这些类型注解。如果你的代码与类型注解相矛盾，那可能是一个错误，而你仍然依赖人类来捕获错误。我想做得更好。我想让计算机为我找到这类错误。\n\
    \n我在[第 2 章](#)讨论动态类型时展示了这段代码片段：\n\n```python\na: int = 5\na = \"string\"\na\n\
    >>> \"string\"\n```\n\n挑战在于：当开发者可能不遵循其指导时，类型注解如何使你的代码库变得健壮？为了健壮，你希望你的代码经得起时间的考验。为此，你需要某种工具来检查你所有的类型注解，并标记任何异常。这个工具被称为类型检查器。\n\
    \n类型检查器使类型注解从沟通方法转变为安全网。它是一种静态分析的形式。*静态分析工具*是运行在你的源代码上，完全不影响你的运行时的工具。你将在 XREF\
    \ HERE 中了解更多关于静态分析工具的信息，但现在，我将只解释类型检查器。\n\n首先，我需要安装一个。我将使用 mypy，一个非常流行的类型检查器。\n\
    \n```bash\npip install mypy\n```\n\n现在我将创建一个名为 `invalid_type.py` 的文件，其中包含不正确的行为：\n\
    \n```python\na: int = 5\na = \"string\"\n```\n\n如果我在命令行上对那个文件运行 mypy，我会得到一个错误：\n\
    \n```bash\nmypy invalid_type.py\n\nchapter3/invalid_type.py:2: error: Incompatible\
    \ types in assignment\n(expression has type \"str\", variable has type \"int\"\
    )\nFound 1 error in 1 file (checked 1 source file)\n```\n\n就这样，我的类型注解成为了抵御错误的第一道防线。每当你犯了一个错误并违背了作者的意图，类型检查器都会发现并提醒你。事实上，在大多数开发环境中"
