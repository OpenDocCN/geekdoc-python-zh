  md: "# # Union Types\n\nOptional types are great, but what if you want to communicate\
    \ error messages with specific information attached?\n\n```\npython\ndef dispense_hotdog()\
    \ -> HotDog:\n    if not are_ingredients_available():\n        throw RuntimeError(\"\
    Not all ingredients available\")\n    if order_interrupted():\n        throw RuntimeError(\"\
    Order interrupted\")\n    return create_hot_dog()\n```\n\nIf I convert this code\
    \ to use Optional, I lose information: the error messages are no longer returned.\
    \ In these situations. Instead of an Optional, I can instead use a Union. Unions\
    \ are versatile. If Optional lets you choose between a type and None, Union allows\
    \ you to choose between any two types.\n\nIn the example above, I choose to return\
    \ a HotDog or a string instead of throwing an exception.\n\n```\npython\nfrom\
    \ typing import Union\ndef dispense_hotdog() -> Union[HotDog, str]:\n    if not\
    \ are_ingredients_available():\n        return \"Not all ingredients available\"\
    \n    if order_interrupted():\n        return \"Order interrupted\"\n    return\
    \ create_hot_dog()\n```\n\n> **NOTE**\n\nOptional is just a specialized version\
    \ of a Union. Optional[int] is the same exact thing as Union[int, None].\n\nUnions\
    \ can be used for more than error handling as well. If you can return more than\
    \ one type, you can indicate that with a Union as well. Suppose you want your\
    \ hot dog stand to get into the lucrative pretzel business too. Instead of trying\
    \ to deal with weird class inheritance (we’ll cover more about inheritance in\
    \ Part 2) that don’t belong between hot dogs and pretzels, you simply can return\
    \ a Union of the two (plus a string for catching errors)."
