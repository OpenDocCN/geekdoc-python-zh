  md: 'With mypy, you can tell the typechecker to ignore certain classes of errors
    or modules through configuration. Here’s a sample mypy file, which globally warns
    if Any types are returned, and sets config options on a per module basis:


    ```

    # Global options:


    [mypy]

    python_version = 3.9

    warn_return_any = True


    # Per-module options:


    [mypy-mycode.foo.*]

    disallow_untyped_defs = True


    [mypy-mycode.bar]

    warn_return_any = False


    [mypy-somelibrary]

    ignore_missing_imports = True

    ```


    Using this format, you can pick and choose which errors your type checker tracks.
    You can mask all of your existing errors, while focusing on fixing new errors.
    Be as specific as possible in defining what errors get ignored; you don’t want
    to mask new errors that show up in unrelated parts of the code.


    To be even more specific, mypy will ignore any line commented with `# type: ignore`.


    ```

    # typechecks just fine

    a: int = "not an int" # type: ignore

    ```


    > **WARNING**


    `# type: ignore` should not be an excuse to be lazy! When writing new code, don’t
    ignore type errors and fix them as you go.


    Your first goal for adopting type annotations is to get a completely clean run
    of your typechecker. If there are errors, you either need to fix them with annotations
    (recommended), or accept that not all errors can be fixed soon, and ignore them.'
