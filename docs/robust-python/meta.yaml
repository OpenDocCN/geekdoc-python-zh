- md: "## Speeding up Mypy\n\nOne of the common complaints about mypy is the speed\
    \ in which it takes to typecheck large codebases. By default, mypy *incrementally*\
    \ checks files. That is, it uses a cache (typically a `.mypy_cache` folder, but\
    \ this is also configurable) to only check what has changed since last typecheck.\
    \ This does speed up typechecking, but as your codebase gets larger, your typechecker\
    \ will take longer to run, no matter what. This is detrimental for fast feedback\
    \ during development cycles. The longer a tool takes to provide useful feedback\
    \ to developers, the less often developers will run the tool, thus defeating the\
    \ purpose. It is in everyone’s interest for typecheckers to run as fast as possible,\
    \ so that developers are getting type errors at near real-time.\n\nIn order to\
    \ speed up mypy even more, you may want to consider a *remote cache*. A remote\
    \ cache provides a way of caching your mypy typechecks somewhere accessible to\
    \ your entire team. This way, you can cache results based on specific commit IDs\
    \ in your version control, and share typechecker information. Building this system\
    \ is outside the scope of this book, but the [remote cache documentation](https://mypy.readthedocs.io/en/stable/remote_cache.html)\
    \ in mypy will provide a solid start.\n\nYou also want to consider mypy in daemon\
    \ mode. Daemon mode is when mypy runs as a standalone process, and keeps previous\
    \ mypy state in memory rather than on a file system (or across a network link).\
    \ You can start a mypy daemon by running `dmypy run -- mypy-flags <mypy-files>`.\
    \ Once the daemon is running, you can run the exact same command to check the\
    \ files again.\n\nFor instance, I ran mypy on the mypy source code itself. My\
    \ initial run took 23 seconds. Subsequent typechecks on my system took between\
    \ 16 and 18 seconds. This is *technically* faster, but I would not consider it\
    \ fast. When I use the mypy daemon, though, my subsequent runs ended up being\
    \ under half a second. With times like that, I can run my typechecker much more\
    \ often to get feedback faster. Check out more about dmypy in the [mypy daemon\
    \ mode documentation](https://mypy.readthedocs.io/en/stable/mypy_daemon.html).\n\
    \n## Alternative Typecheckers\n\nMypy is very configurable, and it’s wealth of\
    \ options will let you decide on the exact behavior you are looking for, but it\
    \ won’t meet all of your needs all the time. It isn’t the only typechecker out\
    \ there. I’d like to introduce two other type-checkers to you: pyre (written by\
    \ Facebook) and pyright (written by Microsoft).\n\n## Pyre\n\nYou can install\
    \ Pyre with through pip:\n\n```\npip install pyre-check\n```\n\nPyre runs very\
    \ similarly to mypy’s daemon mode. A separate process will run, from which you\
    \ can ask for typechecking results. To typecheck your code, you need to set up\
    \ pyre (by running `pyre init`) in your project directory, and then run `pyre`\
    \ to start the daemon. From here, the information you receive is pretty similar\
    \ to mypy. However, there are two features that set Pyre apart from other typecheckers:\
    \ Codebase querying and the Python Static Analyzer framework (Pysa).\n\n### Codebase\
    \ Querying\n\nOnce the pyre daemon is running, there are a lot of cool queries\
    \ you can make to inspect your codebase. I’ll use the mypy codebase as an example\
    \ codebase for all of the following queries.\n\nFor instance, I can learn about\
    \ the attributes of any class in my codebase:\n\n```\npyre query \"attributes(mypy.errors.CompileError)\"\
    \ ❶\n\n{\n    \"response\": {\n        \"attributes\": [\n            {\n    \
    \            \"name\": \"__init__\", ❷\n                \"annotation\": \"BoundMethod[typing.Callable(mypy.errors.CompileError.__init__)[[Named(self,\
    \ mypy.errors.CompileError), Named(messages, typing.List[str]), Named(use_stdout,\
    \ bool, default), Named(module_with_blocker, typing.Optional[str], default)],\
    \ None], mypy.errors.CompileError]\",\n                \"kind\": \"regular\",\n\
    \                \"final\": false\n            },\n            {\n           \
    \     \"name\": \"messages\", ❸\n                \"annotation\": \"typing.List[str]\"\
    ,\n                \"kind\": \"regular\",\n                \"final\": false\n\
    \            },\n            {\n                \"name\": \"module_with_blocker\"\
    , ❹\n                \"annotation\": \"typing.Optional[str]\",\n             \
    \   \"kind\": \"regular\",\n                \"final\": false\n            },\n\
    \            {\n                \"name\": \"use_stdout\", ❺\n                \"\
    annotation\": \"bool\",\n                \"kind\": \"regular\",\n            \
    \    \"final\": false\n            }\n        ]\n    }\n}\n```\n\n1. Pyre query\
    \ for attributes\n2. Describing the constructor\n3. A list of strings for messages\n\
    4. An Optional String describing a module with blocker\n5. A flag indicating printing\
    \ to a screen\n\nLook at all this information I can find out about the attributes\
    \ in a class. I can see their type annotations to understand how the tool sees\
    \ these attributes. This is incredibly handy in exploring classes as well.\n\n\
    Another cool query is the callees of any function.\n\n```\npyre query \"callees(mypy.errors.remove_path_prefix)\"\
    \n{\n    \"response\": {\n        \"callees\": [\n            {\n            \
    \    \"kind\": \"function\",\n                \"target\": \"len\"\n          \
    \  },\n            {\n                \"kind\": \"method\",\n                \"\
    is_optional_class_attribute\": false,\n                \"direct_target\": \"str.__getitem__\"\
    ,\n                \"class_name\": \"str\",\n                \"dispatch\": \"\
    dynamic\"\n            },\n            {\n                \"kind\": \"method\"\
    ,\n                \"is_optional_class_attribute\": false,\n                \"\
    direct_target\": \"str.startswith\",\n                \"class_name\": \"str\"\
    ,\n                \"dispatch\": \"dynamic\"\n            },\n            {\n\
    \                \"kind\": \"method\",\n                \"is_optional_class_attribute\"\
    : false,\n                \"direct_target\": \"slice.__init__\",\n           \
    \     \"class_name\": \"slice\",\n                \"dispatch\": \"static\"\n \
    \           }\n        ]\n    }\n}\n```\n\n1. Calls the length function\n2. Calls\
    \ the string.getitem function (such as `str[0]`)\n3. Calls the `startswith` function\
    \ on a string\n4. Initializes a list slice (such as `str[3:8]`)\n\nThe typechecker\
    \ needs to store all this information to do its job. It’s a huge bonus that you\
    \ can query the information as well. I could write a whole extra book on what\
    \ you can do with this information, but for now, check out the pyre query documentation³.\
    \ You will learn about different queries you can execute, such as observing class\
    \ hierarchies, call graphs, and more. These queries allow you to learn more about\
    \ your codebase or to build new tools to better understand your codebase (and\
    \ catch other types of errors that a typechecker can’t - such as temporal dependencies,\
    \ which I’ll cover in Part 3).\n\n### Python Static Analyzer (Pysa)\n\nPysa (pronounced\
    \ like the Leaning Tower of Pisa), is a static code analyzer built into Pyre.\
    \ Pysa specializes in a type of security static analysis known as *taint analysis*.\
    \ Taint analysis is the tracking of potentially tainted data, such as user supplied\
    \ input. The tainted data is tracked for the entire lifecycle of the data; pyre\
    \ makes sure that any tainted data cannot propagate to a system in an insecure\
    \ fashion.\n\nLet me walk through the process to catch a simple security flaw\
    \ (modified from the [Pyre documentation](https://pyre-check.org/)). Consider\
    \ the case where a user creates a new recipe in a filesystem."
  mdcn: "## 加速 Mypy\n\n关于 mypy 的一个常见抱怨是它对大型代码库进行类型检查所需的速度。默认情况下，mypy *增量式*地检查文件。也就是说，它使用一个缓存（通常是\
    \ `.mypy_cache` 文件夹，但这也是可配置的）来仅检查自上次类型检查以来发生更改的内容。这确实加快了类型检查的速度，但随着代码库变大，无论怎样，你的类型检查器运行时间都会变长。这对开发周期中的快速反馈是有害的。工具为开发者提供有用反馈所需的时间越长，开发者运行该工具的频率就越低，从而违背了初衷。让类型检查器尽可能快地运行符合每个人的利益，这样开发者就能近乎实时地获得类型错误。\n\
    \n为了进一步加速 mypy，你可能需要考虑使用*远程缓存*。远程缓存提供了一种将你的 mypy 类型检查结果缓存到整个团队都可访问的位置的方式。这样，你可以根据版本控制中的特定提交\
    \ ID 来缓存结果，并共享类型检查器信息。构建这个系统超出了本书的范围，但 mypy 中的[远程缓存文档](https://mypy.readthedocs.io/en/stable/remote_cache.html)将提供一个坚实的起点。\n\
    \n你还需要考虑 mypy 的守护进程模式。守护进程模式是指 mypy 作为独立进程运行，并将之前的 mypy 状态保存在内存中，而不是文件系统（或网络链接）上。你可以通过运行\
    \ `dmypy run -- mypy-flags <mypy-files>` 来启动 mypy 守护进程。守护进程运行后，你可以运行完全相同的命令来再次检查文件。\n\
    \n例如，我在 mypy 源代码本身上运行了 mypy。我第一次运行花了 23 秒。在我的系统上，后续的类型检查耗时在 16 到 18 秒之间。这*技术上*更快了，但我不会认为它很快。然而，当我使用\
    \ mypy 守护进程时，我后续的运行时间最终都不到半秒。有了这样的速度，我可以更频繁地运行类型检查器以更快地获得反馈。在 [mypy 守护进程模式文档](https://mypy.readthedocs.io/en/stable/mypy_daemon.html)中了解更多关于\
    \ dmypy 的信息。\n\n## 替代类型检查器\n\nMypy 非常可配置，其丰富的选项将让你决定你所寻求的确切行为，但它不会总是满足你所有的需求。它并不是唯一的类型检查器。我想向你介绍另外两个类型检查器：pyre（由\
    \ Facebook 编写）和 pyright（由 Microsoft 编写）。\n\n## Pyre\n\n你可以通过 pip 安装 Pyre：\n\n\
    ```\npip install pyre-check\n```\n\nPyre 的运行方式与 mypy 的守护进程模式非常相似。一个单独的进程将运行，你可以从中请求类型检查结果。要对你的代码进行类型检查，你需要在项目目录中设置\
    \ pyre（通过运行 `pyre init`），然后运行 `pyre` 来启动守护进程。从这里开始，你收到的信息与 mypy 非常相似。然而，有两个特性使\
    \ Pyre 与其他类型检查器区分开来：代码库查询和 Python 静态分析器框架（Pysa）。\n\n### 代码库查询\n\n一旦 pyre 守护进程运行起来，你就可以进行许多很酷的查询来检查你的代码库。我将使用\
    \ mypy 代码库作为以下所有查询的示例代码库。\n\n例如，我可以了解代码库中任何类的属性：\n\n```\npyre query \"attributes(mypy.errors.CompileError)\"\
    \ ❶\n\n{\n    \"response\": {\n        \"attributes\": [\n            {\n    \
    \            \"name\": \"__init__\", ❷\n                \"annotation\": \"BoundMethod[typing.Callable(mypy.errors.CompileError.__init__)[[Named(self,\
    \ mypy.errors.CompileError), Named(messages, typing.List[str]), Named(use_stdout,\
    \ bool, default), Named(module_with_blocker, typing.Optional[str], default)],\
    \ None], mypy.errors.CompileError]\",\n                \"kind\": \"regular\",\n\
    \                \"final\": false\n            },\n            {\n           \
    \     \"name\": \"messages\", ❸\n                \"annotation\": \"typing.List[str]\"\
    ,\n                \"kind\": \"regular\",\n                \"final\": false\n\
    \            },\n            {\n                \"name\": \"module_with_blocker\"\
    , ❹\n                \"annotation\": \"typing.Optional[str]\",\n             \
    \   \"kind\": \"regular\",\n                \"final\": false\n            },\n\
    \            {\n                \"name\": \"use_stdout\", ❺\n                \"\
    annotation\": \"bool\",\n                \"kind\": \"regular\",\n            \
    \    \"final\": false\n            }\n        ]\n    }\n}\n```\n\n1. Pyre 查询属性\n\
    2. 描述构造函数\n3. 用于消息的字符串列表\n4. 描述带有阻塞器的模块的可选字符串\n5. 指示打印到屏幕的标志\n\n看看我能找到的关于类中属性的所有信息。我可以看到它们的类型注解，以了解工具如何看待这些属性。这在探索类时也非常方便。\n\
    \n另一个很酷的查询是任何函数的被调用者。\n\n```\npyre query \"callees(mypy.errors.remove_path_prefix)\"\
    \n{\n    \"response\": {\n        \"callees\": [\n            {\n            \
    \    \"kind\": \"function\",\n                \"target\": \"len\"\n          \
    \  },\n            {\n                \"kind\": \"method\",\n                \"\
    is_optional_class_attribute\": false,\n                \"direct_target\": \"str.__getitem__\"\
    ,\n                \"class_name\": \"str\",\n                \"dispatch\": \"\
    dynamic\"\n            },\n            {\n                \"kind\": \"method\"\
    ,\n                \"is_optional_class_attribute\": false,\n                \"\
    direct_target\": \"str.startswith\",\n                \"class_name\": \"str\"\
    ,\n                \"dispatch\": \"dynamic\"\n            },\n            {\n\
    \                \"kind\": \"method\",\n                \"is_optional_class_attribute\"\
    : false,\n                \"direct_target\": \"slice.__init__\",\n           \
    \     \"class_name\": \"slice\",\n                \"dispatch\": \"static\"\n \
    \           }\n        ]\n    }\n}\n```\n\n1. 调用长度函数\n2. 调用字符串.getitem 函数（例如 `str[0]`）\n\
    3. 在字符串上调用 `startswith` 函数\n4. 初始化一个列表切片（例如 `str[3:8]`）\n\n类型检查器需要存储所有这些信息才能完成其工作。你也能查询这些信息是一个巨大的优势。我可以写一整本额外的书来介绍你可以用这些信息做什么，但现在，请查看\
    \ pyre 查询文档³。你将了解可以执行的不同查询，例如观察类层次结构、调用图等。这些查询允许你更多地了解你的代码库，或者构建新的工具来更好地理解你的代码库（并捕获类型检查器无法捕获的其他类型的错误——例如时间依赖性，我将在第\
    \ 3 部分介绍）。\n\n### Python 静态分析器 (Pysa)\n\nPysa（发音类似于比萨斜塔）是 Pyre 内置的静态代码分析器。Pysa\
    \ 专门从事一种称为*污点分析*的安全静态分析。污点分析是跟踪潜在受污染数据（如用户提供的输入）的过程。受污染的数据在其整个生命周期中都会被跟踪；pyre\
    \ 确保任何受污染的数据都不会以不安全的方式传播到系统。\n\n让我演示一下捕获一个简单安全漏洞的过程（修改自 [Pyre 文档](https://pyre-check.org/)）。考虑用户在文件系统中创建新配方的情况。"
