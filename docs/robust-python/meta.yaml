    ```

    x: list = [1,2,3,4]

    ```


    You would need to use `list[int]` explicitly to get this code to work.

    Check out all the ways to disable the use of `Any` in the [mypy dynamic typing
    documentation](https://mypy.readthedocs.io/en/stable/dynamic_typing.html).


    Be careful with disabling `Any` too broadly, though. There is a valid use case
