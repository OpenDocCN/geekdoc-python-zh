- md: "## Chapter 4. Constraining Types\n\n> ### A NOTE FOR EARLY RELEASE READERS\n\
    \nWith Early Release ebooks, you get books in their earliest form—the author’s\
    \ raw and unedited content as they write—so you can take advantage of these technologies\
    \ long before the official release of these titles.\n\nThis will be the 4th chapter\
    \ of the final book. Please note that the GitHub repo will be made active later\
    \ on.\n\nIf you have comments about how we might improve the content and/or examples\
    \ in this book, or if you notice missing material within this chapter, please\
    \ reach out to the author at *pat@kudzera.com*.\n\nMany developers learn the basic\
    \ type annotations and call it a day. But I’m far from done. There is a wealth\
    \ of advanced type annotations that are invaluable. These advanced type annotations\
    \ allow you to constrain types, further restricting what they can represent. Your\
    \ goal is to make illegal states unrepresentable. Developers should physically\
    \ not be able to create types that are contradictory or otherwise invalid in your\
    \ system. You can’t have errors in your code if it’s impossible to create the\
    \ error in the first place. You can use type annotations to achieve this very\
    \ goal, saving time and money. In this chapter I’ll teach you six different techniques:\n\
    \n- *Optional*: Use to replace null references in your codebase\n- *Union*: Use\
    \ to present a selection of types\n- *Literal*: Use to restrict developers to\
    \ very specific values\n- *Annotated*: Use to provide additional description of\
    \ your types\n- *NewType*: Use to restrict a type to a specific context\n- *Final*:\
    \ Use to prevent variables from being rebound to a new value.\n\nLet’s start with\
    \ handling null references with `Optional` types.\n\n## Optional Type\n\nNull\
    \ references is often referred to as the “billion dollar mistake”, coined by C.A.R.\
    \ Hoare:\n\n> I call it my billion-dollar mistake. It was the invention of the\
    \ null reference in 1965. At that time, I was designing the first comprehensive\
    \ type system for references in an object oriented language. My goal was to ensure\
    \ that all use of references should be absolutely safe, with checking performed\
    \ automatically by the compiler. But I couldn’t resist the temptation to put in\
    \ a null reference, simply because it was so easy to implement. This has led to\
    \ innumerable errors, vulnerabilities, and system crashes, which have probably\
    \ caused a billion dollars of pain and damage in the last forty years. ¹\n\nWhile\
    \ null references started in Algol, they would pervade countless other languages.\
    \ C and C++ are often derided for null pointer dereference (which produces a segmentation\
    \ fault or other program-halting crash). Java was well-known for having to catch\
    \ `NullPointerException` throughout your code. It’s not a stretch to say that\
    \ these sorts of bugs have a price tag measured in the billions - think of the\
    \ developer time, customer loss, and system failures due to accidental null pointers\
    \ or references.\n\nSo, why does this matter in Python? C.A.R Hoare’s quote is\
    \ about object oriented compiled languages back in the 60s; Python must be better\
    \ by now, right?. I regret to inform you that this billion-mistake is in Python\
    \ as well. It appears to us under a different name: `None`. I will show you a\
    \ way to avoid the costly `None` mistake, but first, let’s talk about why `None`\
    \ is so bad.\n\n> **NOTE**\n\nIt is especially illuminating that C.A.R. Hoare\
    \ admitted that null references were born out of convenience. It goes to show\
    \ you how taking the quicker path can lead to all sorts of pain later in your\
    \ development lifecycle. Think how your short-term decisions today will adversely\
    \ affect your maintenance tomorrow.\n\nLet’s consider some code that runs an automated\
    \ hot dog stand. I want my system to take a bun, put the hotdog in the bun, and\
    \ then squirt ketchup and mustard through automated dispensers, as described in\
    \ Figure 4-1. What could go wrong?\n\n![](img/b136c318777181835dbab42f383e392c_56_0.png)\n\
    \n```python\ndef create_hot_dog():\n    bun = dispense_bun()\n    hotdog = dispense_hotdog()\n\
    \    hotdog.place_in_bun(bun)\n    ketchup = dispense_ketchup()\n    mustard =\
    \ dispense_mustard()\n    hotdog.add_condiments(ketchup, mustard)\n    return\
    \ hotdog\n```\n\nPretty straightforward, no? Unfortunately, there’s no way to\
    \ really tell. It’s easy to think through the happy path, or the control flow\
    \ of the program when everything goes right, but when talking about robust code,\
    \ you need to consider error conditions. If this were an automated stand with\
    \ no manual intervention, what errors can you think of?\n\nHere’s my non-comprehensive\
    \ list of errors I can think of:\n\n- Out of ingredients (buns, hotdog, or ketchup/mustard)\n\
    - Order cancelled mid-process.\n- Condiments get jammed\n- Power gets interrupted\n\
    - Customer doesn’t want ketchup or mustard, and tries to move the bun mid-process\n\
    - Rival vendor switches the ketchup out with catsup. Chaos ensues.\n\nNow, your\
    \ system is state-of-the-art and will detect all of these conditions, but it does\
