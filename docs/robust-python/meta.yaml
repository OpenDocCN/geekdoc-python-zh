    \ is pretty similar to mypy. However, there are two features that set Pyre apart\
    \ from other typecheckers: Codebase querying and the Python Static Analyzer framework\
    \ (Pysa).\n\n# Codebase Querying\n\nOnce the pyre daemon is running, there are\
    \ a lot of cool queries you can make to inspect your codebase. I’ll use the mypy\
