- md: '# Starting Python for the First Time


    The Raspberry Pi offers one of the best all-round solutions on which to learn
    and code, in particular, Python. Raspbian, the Pi''s recommended OS, come pre-installed
    with the latest stable version of Python 3, which makes it a superb coding platform.


    ## STARTING PYTHON


    Everything you need to begin programming with Python is available from the Raspberry
    Pi desktop. However, if you want, drop into the Terminal and update the system
    with: sudo apt-get update.


    **STEP 1** With the Raspbian desktop loaded, click on the Menu button followed
    by Programming > Python 3 (IDLE). This opens the Python 3 Shell. Windows and Mac
    users can find the Python 3 IDLE Shell from within the Windows Start button menu
    and via Finder.


    **STEP 2** The Shell is where you can enter code and see the responses and output
    of code you’ve programmed into Python. This is a kind of sandbox, where you’re
    able to try out some simple code and processes.


    **STEP 3** For example, in the Shell enter: 2+2 After pressing Enter, the next
    line displays the answer: 4. Basically, Python has taken the ‘code’ and produced
    the relevant output.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_33_0.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_33_1.png)


    **STEP 4** The Python Shell acts very much like a calculator, since code is basically
    a series of mathematical interactions with the system. Integers, which are the
    infinite sequence of whole numbers can easily be added, subtracted, multiplied
    and so on.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_33_2.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_33_3.png)


    ```

    python

    >>> 2+2

    4

    >>> 8+6

    14

    >>> 23453+64545522

    64568975

    >>> 98778642342-12343

    98778629999

    >>> 1287437*43534

    56047282358

    ```


    While that''s very interesting, it''s not particularly exciting. Instead, try
    this:


    `print("Hello everyone!")`


    Just enter it into the IDLE as you''ve done in the previous steps.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_34_0.png)


    This is a little more like it, since you''ve just produced your first bit of code.
    The Print command is fairly self-explanatory, it prints things. Python 3 requires
    the brackets as well as quote marks in order to output content to the screen,
    in this case the ''Hello everyone!'' bit.


    ```

    print("Hello everyone!")

    ```


    You may have noticed the colour coding within the Python IDLE. The colours represent
    different elements of Python code. They are:


    - Black – Data and Variables

    - Green – Strings

    - Purple – Functions

    - Orange – Commands

    - Blue – User Functions

    - Dark Red – Comments

    - Light Red – Error Messages


    | Colour | Use for | Examples |

    |---|---|---|

    | Black | Data & variables | 23.6 area |

    | Green | Strings | "Hello World" |

    | Purple | Functions | len() print() |

    | Orange | Commands | if for else |

    | Blue | User functions | get_area() |

    | Dark red | Comments | #Remember VAT |

    | Light red | Error messages | SyntaxError: |


    The Python IDLE is a configurable environment. If you don''t like the way the
    colours are represented, then you can always change them via Options > Configure
    IDLE and clicking on the Highlighting tab. However, we don''t recommend that,
    as you won''t be seeing the same as our screenshots.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_34_1.png)


    Just like most programs available, regardless of the operating system, there are
    numerous shortcut keys available. We don''t have room for them all here but within
    the Options > Configure IDLE and under the Keys tab, you can see a list of the
    current bindings.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_34_2.png)


    The Python IDLE is a power interface and one that''s actually been written in
    Python using one of the available GUI toolkits. If you want to know the many ins
    and outs of the Shell, we recommend you take a few moments to view www.docs.python.org/3/library/idle.html,
    which details many of the IDLE''s features.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_34_3.png)


    # Your First Code


    Essentially, you''ve already written your first piece of code with the ''print("Hello
    everyone!")'' function from the previous tutorial. However, let''s expand that
    and look at entering your code and playing around with some other Python examples.


    ## PLAYING WITH PYTHON


    With most languages, computer or human, it''s all about remembering and applying
    the right words to the right situation. You''re not born knowing these words,
    so you need to learn them.


    **STEP 1** If you''ve closed Python 3 IDLE, reopen it in whichever operating system
    version you prefer. In the Shell, enter the familiar following:

    `print("Hello")`


    ![](img/2a94c98fce5df994fcecd950a995b8c9_35_0.png)


    **STEP 2** Just as predicted, the word Hello appears in the Shell as blue text,
    indicating output from a string. It''s fairly straightforward and doesn''t require
    too much explanation. Now try:

    `print("2+2")`


    ![](img/2a94c98fce5df994fcecd950a995b8c9_35_2.png)


    **STEP 3** You can see that instead of the number 4, the output is the 2+2 you
    asked to be printed to the screen. The quotation marks are defining what''s being
    outputted to the IDLE Shell; to print the total of 2+2 you need to remove the
    quotes:

    `print(2+2)`


    ![](img/2a94c98fce5df994fcecd950a995b8c9_35_1.png)


    **STEP 4** You can continue as such, printing 2+2, 464+2343 and so on to the Shell.
    An easier way is to use a variable, which is something we will cover in more depth
    later. For now, enter:

    `a=2`

    `b=2`


    ![](img/2a94c98fce5df994fcecd950a995b8c9_35_3.png)


    **STEP 5** What you have done here is assign the letters a and b two values: 2
    and 2. These are now variables, which can be called upon by Python to output,
    add, subtract, divide and so on for as long as their numbers stay the same. Try
    this:


    ```

    print(a)

    print(b)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_36_0.png)


    **STEP 6** The output of the last step displays the current values of both a and
    b individually, as you''ve asked them to be printed separately. If you want to
    add them up, you can use the following:


    ```

    print(a+b)

    ```


    This code simply takes the values of a and b, adds them together and outputs the
    result.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_36_2.png)


    **STEP 7** You can play around with different kinds of variables and the Print
    function. For example, you could assign variables for someone''s name:


    ```

    name="David"

    print(name)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_36_4.png)


    **STEP 8** Now let''s add a surname:


    ```

    surname="Hayward"

    print(surname)

    ```


    You now have two variables containing a first name and a surname and you can print
    them independently.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_36_1.png)


    **STEP 9** If we were to apply the same routine as before, using the + symbol,
    the name wouldn''t appear correctly in the output in the Shell. Try it:


    ```

    print(name+surname)

    ```


    You need a space between the two, defining them as two separate values and not
    something you mathematically play around with.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_36_3.png)


    **STEP 10** In Python 3 you can separate the two variables with a space using
    a comma:


    ```

    print(name, surname)

    ```


    Alternatively, you can add the space yourself:


    ```

    print(name+" "+surname)

    ```


    The use of the comma is much neater, as you can see. Congratulations, you''ve
    just taken your first steps into the wide world of Python.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_36_5.png)


    # Saving and Executing Your Code


    While working in the IDLE Shell is perfectly fine for small code snippets, it’s
    not designed for entering longer program listings. In this section you’re going
    to be introduced to the IDLE Editor, where you will be working from now on.


    ## EDITING CODE


    You will eventually reach a point where you have to move on from inputting single
    lines of code into the Shell. Instead, the IDLE Editor will allow you to save
    and execute your Python code.


    **STEP 1** First, open the Python IDLE Shell and when it’s up, click on File >
    New File. This will open a new window with Untitled as its name. This is the Python
    IDLE Editor and within it you can enter the code needed to create your future
    programs.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_37_0.png)


    **STEP 2** The IDLE Editor is, for all intents and purposes, a simple text editor
    with Python features, colour coding and so on; much in the same vein as Sublime.
    You enter code as you would within the Shell, so taking an example from the previous
    tutorial, enter:


    ```

    print("Hello everyone!")

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_37_1.png)


    **STEP 3** You can see that the same colour coding is in place in the IDLE Editor
    as it is in the Shell, enabling you to better understand what’s going on with
    your code. However, to execute the code you need to first save it. Press F5 and
    you get a Save…Check box open.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_37_2.png)


    **STEP 4** Click on the OK button in the Save box and select a destination where
    you’ll save all your Python code. The destination can be a dedicated folder called
    Python or you can just dump it wherever you like. Remember to keep a tidy drive
    though, to help you out in the future.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_37_3.png)'
  mdcn: '# 初次启动 Python


    树莓派提供了学习和编码的最佳全面解决方案之一，特别是用于 Python。树莓派推荐的操作系统 Raspbian 预装了最新的稳定版 Python 3，这使其成为一个出色的编码平台。


    ## 启动 Python


    使用 Python 开始编程所需的一切都可在树莓派桌面上找到。不过，如果你想操作，可以打开终端并使用以下命令更新系统：`sudo apt-get update`。


    **步骤 1** 加载 Raspbian 桌面后，依次点击菜单按钮，选择 Programming > Python 3 (IDLE)。这将打开 Python
    3 交互式解释器。Windows 和 Mac 用户可以在 Windows 的开始菜单中或通过 Finder 找到 Python 3 IDLE 交互式解释器。


    **步骤 2** 交互式解释器是你输入代码并查看已编程代码的响应和输出的地方。这是一种沙盒环境，你可以在此尝试一些简单的代码和流程。


    **步骤 3** 例如，在交互式解释器中输入：`2+2`，按下回车后，下一行将显示答案：`4`。基本上，Python 处理了“代码”并产生了相关的输出。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_33_0.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_33_1.png)


    **步骤 4** Python 交互式解释器的功能非常像计算器，因为代码本质上是与系统进行的一系列数学交互。整数，即连续的无限整数序列，可以轻松地进行加、减、乘等运算。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_33_2.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_33_3.png)


    ```

    python

    >>> 2+2

    4

    >>> 8+6

    14

    >>> 23453+64545522

    64568975

    >>> 98778642342-12343

    98778629999

    >>> 1287437*43534

    56047282358

    ```


    虽然这很有趣，但并不特别令人兴奋。试试这个：


    `print("Hello everyone!")`


    只需像之前的步骤一样将其输入到 IDLE 中。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_34_0.png)


    这有点意思了，因为你刚刚生成了你的第一行代码。`print` 命令相当不言自明，它就是打印东西。Python 3 需要使用括号和引号才能将内容输出到屏幕，在本例中是
    ''Hello everyone!'' 部分。


    ```

    print("Hello everyone!")

    ```


    你可能已经注意到了 Python IDLE 中的颜色编码。这些颜色代表 Python 代码的不同元素。它们是：


    - 黑色 – 数据和变量

    - 绿色 – 字符串

    - 紫色 – 函数

    - 橙色 – 命令

    - 蓝色 – 用户自定义函数

    - 深红色 – 注释

    - 浅红色 – 错误信息


    | 颜色 | 用于 | 示例 |

    |---|---|---|

    | 黑色 | 数据和变量 | `23.6` `area` |

    | 绿色 | 字符串 | `"Hello World"` |

    | 紫色 | 函数 | `len()` `print()` |

    | 橙色 | 命令 | `if` `for` `else` |

    | 蓝色 | 用户自定义函数 | `get_area()` |

    | 深红色 | 注释 | `#Remember VAT` |

    | 浅红色 | 错误信息 | `SyntaxError:` |


    Python IDLE 是一个可配置的环境。如果你不喜欢颜色的显示方式，可以随时通过 Options > Configure IDLE 并点击 Highlighting
    选项卡来更改它们。但是，我们不建议这样做，因为你的界面将与我们的截图不同。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_34_1.png)


    就像大多数可用的程序一样，无论操作系统如何，都有大量的快捷键可用。我们这里无法一一列举，但在 Options > Configure IDLE 下的 Keys
    选项卡中，你可以看到当前快捷键绑定的列表。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_34_2.png)


    Python IDLE 是一个强大的接口，并且它实际上是使用 Python 编写的，利用了其中一个可用的 GUI 工具包。如果你想知道交互式解释器的许多细节，我们建议你花一些时间查看
    www.docs.python.org/3/library/idle.html，其中详细介绍了 IDLE 的许多特性。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_34_3.png)


    # 你的第一行代码


    本质上，你已经在上一个教程中使用 ''print("Hello everyone!")'' 函数编写了你的第一行代码。然而，让我们扩展一下，看看如何输入你的代码并尝试一些其他的
    Python 示例。


    ## 玩转 Python


    对于大多数语言，无论是计算机语言还是人类语言，关键都在于记住并正确应用合适的词汇。你并非天生就知道这些词汇，所以你需要学习它们。


    **步骤 1** 如果你已经关闭了 Python 3 IDLE，请在你喜欢的任何操作系统版本中重新打开它。在交互式解释器中，输入熟悉的命令：

    `print("Hello")`


    ![](img/2a94c98fce5df994fcecd950a995b8c9_35_0.png)


    **步骤 2** 正如预期的那样，单词 Hello 以蓝色文本出现在交互式解释器中，表示这是一个字符串输出。这相当直接，不需要太多解释。现在试试：

    `print("2+2")`


    ![](img/2a94c98fce5df994fcecd950a995b8c9_35_2.png)


    **步骤 3** 你可以看到输出的不是数字 4，而是你要求打印到屏幕上的字符串 "2+2"。引号定义了输出到交互式解释器的内容；要打印 2+2 的计算结果，你需要去掉引号：

    `print(2+2)`


    ![](img/2a94c98fce5df994fcecd950a995b8c9_35_1.png)


    **步骤 4** 你可以继续这样操作，打印 2+2、464+2343 等等。一种更简单的方法是使用变量，这是我们将稍后深入介绍的内容。现在，请输入：

    `a=2`

    `b=2`


    ![](img/2a94c98fce5df994fcecd950a995b8c9_35_3.png)


    **步骤 5** 你在这里做的是将字母 `a` 和 `b` 赋予两个值：2 和 2。它们现在是变量，Python 可以调用它们来输出、相加、相减、相除等等，只要它们的值保持不变。试试这个：


    ```

    print(a)

    print(b)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_36_0.png)


    **步骤 6** 上一步的输出分别显示了 `a` 和 `b` 的当前值，因为你要求它们分别打印。如果你想将它们相加，可以使用以下代码：


    ```

    print(a+b)

    ```


    这段代码简单地获取 `a` 和 `b` 的值，将它们相加并输出结果。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_36_2.png)


    **步骤 7** 你可以尝试不同类型的变量和 `print` 函数。例如，你可以为一个人的名字分配变量：


    ```

    name="David"

    print(name)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_36_4.png)


    **步骤 8** 现在我们来添加姓氏：


    ```

    surname="Hayward"

    print(surname)

    ```


    你现在有了两个变量，一个包含名字，一个包含姓氏，你可以分别打印它们。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_36_1.png)


    **步骤 9** 如果我们像之前一样使用 `+` 号，姓名将不会在交互式解释器的输出中正确显示。试试看：


    ```

    print(name+surname)

    ```


    你需要在两者之间加一个空格，将它们定义为两个单独的值，而不是用于数学运算的内容。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_36_3.png)


    **步骤 10** 在 Python 3 中，你可以使用逗号来分隔两个变量，并在它们之间添加空格：


    ```

    print(name, surname)

    ```


    或者，你可以自己添加空格：


    ```

    print(name+" "+surname)

    ```


    如你所见，使用逗号的方式简洁得多。恭喜，你刚刚迈出了进入 Python 广阔世界的第一步。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_36_5.png)


    # 保存并执行你的代码


    虽然在 IDLE 交互式解释器中处理小代码片段完全没问题，但它并非为输入较长的程序清单而设计。在本节中，你将被介绍 IDLE 编辑器，从现在开始你将在此进行操作。


    ## 编辑代码


    你最终会达到一个必须从交互式解释器中输入单行代码的阶段前进的地步。相反，IDLE 编辑器将允许你保存和执行你的 Python 代码。


    **步骤 1** 首先，打开 Python IDLE 交互式解释器，当它启动后，点击 File > New File。这将打开一个新窗口，标题为 Untitled。这就是
    Python IDLE 编辑器，你可以在其中输入创建未来程序所需的代码。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_37_0.png)


    **步骤 2** IDLE 编辑器本质上是一个带有 Python 特性、颜色编码等的简单文本编辑器；与 Sublime 非常相似。你在其中输入代码的方式与在交互式解释器中相同，因此，举上一个教程的例子，输入：


    ```

    print("Hello everyone!")

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_37_1.png)


    **步骤 3** 你可以看到，IDLE 编辑器中的颜色编码与交互式解释器中相同，这使你能够更好地理解你的代码。但是，要执行代码，你需要先保存它。按 F5，你会看到一个
    Save... 对话框。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_37_2.png)


    **步骤 4** 在 Save 对话框中单击 OK 按钮，并选择你将保存所有 Python 代码的目标位置。目标位置可以是一个名为 Python 的专用文件夹，也可以随意存放。但请记住保持驱动器整洁，以便将来帮助你。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_37_3.png)'
