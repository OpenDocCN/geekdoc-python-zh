  md: 'Linux is a remarkably versatile and powerful operating system. It’s used throughout
    the programming and engineering world, in science, space exploration, education,
    gaming and everything else in between. It’s the OS of choice for high-performance
    servers, it’s the backbone of the Internet and it powers the fastest supercomputers
    in the world.


    Knowing how to use Linux, and how it’s structured, is key to being able to create
    better Python content. The Raspberry Pi, for example, uses a Linux-based OS and,
    as such, makes for an excellent coding platform. Regardless of whether you’re
    using a Pi, like us, or a Linux Mint or Ubuntu, these pages will prove invaluable
