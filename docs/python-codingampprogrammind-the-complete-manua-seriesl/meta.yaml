    6. **160** Python 术语表\n\n## 入门\n\n![img](img/2a94c98fce5df994fcecd950a995b8c9_5_0.png)\n\
    \n```\npython\nmirror_ob.select=1\nmodifier_ob.select=1\nbpy.context.scene.objects.active\n\
    print(\"Selected\" + str(modifier_ob))\n```\n\n![img](img/2a94c98fce5df994fcecd950a995b8c9_6_0.png)\n\
    \nPython 是一种高级、通用的编程语言，由 Guido van Rossum 在八十年代末开发，基于多种其他语言，同时是流行的 ABC 语言的后继者。\n\
    \n它的设计旨在以人类可读的方式工作，因此无需深入研究晦涩的机器代码、十六进制字符，甚至二进制的 0 和 1，就能阅读和理解。它清晰、逻辑性强、全面、强大且功能丰富，同时易于遵循和学习。\n\
    \n你会发现 Python 位于世界上一些最有趣和最前沿技术的核心。它是将超级计算机算法连接在一起的代码；它被用于太空工业、科学和工程领域。人工智能，以及\
    \ Alexa、Siri、Cortana 和 Google Assistant 等，都利用 Python 实现其强大的语音识别技术。它简直是一门令人惊叹、用途广泛且不可思议的语言。\n\
    \n那么，让我们开始探索成为 Python 程序员需要什么。\n\n- 8. 成为一名程序员\n- 10. 编码简史\n- 12. 你能用 Python 做什么？\n\
    - 14. Python 数字概览\n- 16. 为什么选择 Python？\n- 18. 在树莓派上使用 Python\n- 20. 使用虚拟机\n- 22.\
    \ 创建编码平台\n\n## 成为一名程序员\n\n程序员、开发者、编码员，这些都是对同一职业的称呼，即创建代码的人。他们创建代码的目的可以是任何东西，从电子游戏到国际空间站上的关键部件。那么，你如何成为一名程序员呢？\n\
    \n![img](img/2a94c98fce5df994fcecd950a995b8c9_7_0.png)\n\n![img](img/2a94c98fce5df994fcecd950a995b8c9_8_0.png)\n\
    \n自 80 年代编程以来，时代已经改变，但核心价值依然存在。\n\n> > 你的编码冒险能走多远，取决于你自己！\n\n```\nc\n#include<stdio.h>\n\
    #include<dos.h>\n#include<conio.h>\n#include<math.h>\nvoid getup()\n{\n    textcolor(BLACK);\n\
    \    textbackground(15);\n    clrscr();\n    window(10,2,70,3);\n    cprintf(\"\
    Press X to Exit, Press Space to Jump\");\n    window(62,2,80,3);\n    cprintf(\"\
    SCORE : \");\n    window(1,25,80,25);\n    for(int x=0;x<79;x++)\n        cprintf(\"\
    ─\");\n    textcolor(0);\n}\nint t,speed=40;\nvoid ds(int jump=0)\n{\n    static\
    \ int a=1;\n    if(jump==0)\n        t=0;\n    else if(jump==2)\n        t--;\n\
    \    else t++;\n    window(2,15-t,18,25);\n    cprintf(\"     \");\n    cprintf(\"\
    \    ▀▄█▄▀\");\n    cprintf(\"     \");\n    cprintf(\"    ████\");\n    cprintf(\"\
    \   ████████\");\n    cprintf(\"  ██████████\");\n    cprintf(\" █████████████\"\
    );\n    cprintf(\"████████████████\");\n    if(jump==1 || jump==2){\n        cprintf(\"\
    \  ██  ██  \");\n        cprintf(\"    ██    \");\n    }else if(a==1)\n    {\n\
    \        cprintf(\"  ██  ██  \");\n        cprintf(\"    ██    \");\n        a=2;\n\
    \    }\n    else if(a==2)\n    {\n        cprintf(\"  ██  ██  \");\n        cprintf(\"\
    \    ██    \");\n        a=1;\n    }\n    cprintf(\"          \");\n    delay(speed);\n\
    }\nvoid obj()\n```\n\n能够遵循逻辑模式并看到最终结果，是程序员最宝贵的技能之一。\n\n## 不仅仅是代码\n\n对于那些年纪足够大、记得\
    \ 80 年代家庭计算黄金时代的人来说，当时的计算世界与今天截然不同。你可以整机购买的 8 位计算机（而不是套件形式，需要你自己焊接零件）是梦想之物；能拥有一台，就像把纯粹的幸福装在一个大塑料盒里。然而，当时计算机提供的新技术并非重点，更重要的是，你第一次可以控制“电视”上显示的内容。\n\
    \n许多用户没有仅仅玩当时成千上万款可用的游戏之一，而是决定创建自己的内容、自己的游戏；或者只是创建一些能帮助他们完成作业或管理家庭财务的东西。8 位家用计算机的简单性意味着，用几行\
    \ BASIC 代码创建一些东西是可行的，于是第一代家庭培养的程序员诞生了。\n\n从那时起，编程呈指数级发展。没过多久，卧室里的编码员就成了过去式，庞大的设计师、编码员、艺术家和音乐家团队参与制作一款游戏。这当然导致程序员不再仅仅是能在屏幕上制作一个精灵并让它在按键时移动的人。\n\
    \n自然，时间在流逝，我们使用的技术也在进步。然而，编程的基本原理保持不变；但成为一名程序员究竟需要什么？\n\n任何程序员，无论他们在做什么，最普遍的特质就是能够看到逻辑模式。我们的意思是，能够从逻辑上遵循某件事从开始到结束，并设想预期的结果。虽然你可能觉得自己不是这样的人，但通过训练你的大脑以这种方式思考是可能的。是的，这需要时间，但一旦你开始以这种特定的方式思考，你就能够构建和遵循代码。\n\
    \n仅次于逻辑的是对数学的理解。你不必达到天才水平，但你需要理解数学的基础。数学是关于解决问题的，而代码大多属于数学的范畴。\n\n能够看到大局对现代程序员来说无疑是有益的。毫无疑问，作为一名程序员，你将成为其他程序员团队的一部分，并且很可能是一个更大的设计师团队的一部分，他们都在创造最终产品。虽然你可能只需要创建最终产品的一小部分，但能够理解其他人都在做什么，将帮助你创造出比仅仅锁在自己的编码隔间里更好的东西。\n\
    \n最后，成为一名优秀的程序员还需要一定程度的创造力。不过，你同样不需要是创意天才，只需要有想象力，能够看到最终产品以及用户将如何与之交互。\n\n当然，成为一名程序员还涉及更多，包括学习实际的代码本身。然而，只要有时间、耐心和学习的决心，任何人都可以成为一名程序员。无论你是想成为三A级电子游戏团队的一员，还是仅仅想创建一个自动化程序让你的计算生活更轻松，你的编码冒险能走多远，取决于你自己！"
