  md: "# Hangman Game Script\n\n```\n    |\n=========,  `\n\n+---+\n|   |\nO   |\n\
    /|\\  |\n/ \\  |\n    |\n=========']\n\nclass Hangman:\n    def __ __init__ __\
    \ (self,word):\n        self.word = word\n        self.missed _ letters = []\n\
    \        self.guessed _ letters = []\n\n    def guess(self,letter):\n        if\
    \ letter in self.word and letter not in self.\n        guessed _ letters:\n  \
    \          self.guessed _ letters.append(letter)\n        elif letter not in self.word\
    \ and letter not in\n        self.missed _ letters:\n            self.missed _\
    \ letters.append(letter)\n        else:\n            return False\n        return\
    \ True\n\n    def hangman _ over(self):\n        return self.hangman _ won() or\
    \ (len(self.missed _\n        letters) == 6)\n\n    def hangman _ won(self):\n\
    \        if '_' not in self.hide _ word():\n            return True\n        return\
    \ False\n\n    def hide _ word(self):\n        rtn = ''\n        for letter in\
    \ self.word:\n            if letter not in self.guessed _ letters:\n         \
    \       rtn += '_'\n            else:\n                rtn += letter\n       \
    \ return rtn\n\n    def print _ game _ status(self):\n        print (board[len(self.missed\
    \ _ letters)])\n        print ('Word: ' + self.hide _ word())\n        print ('Letters\
    \ Missed: ',)\n        for letter in self.missed _ letters:\n            print\
    \ (letter,)\n        print ()\n        print ('Letters Guessed: ',)\n        for\
    \ letter in self.guessed _ letters:\n            print (letter,)\n        print\
    \ ()\n\ndef rand _ word():\n    bank = 'ability about above absolute accessible\n\
    \    accommodation accounting beautiful bookstore\n    calculator clever engaged\
    \ engineer enough\n    handsome refrigerator opposite socks interested\n    strawberry\
    \ backgammon anniversary confused\n    dangerous entertainment exhausted impossible\n\
    \    overweight temperature vacation scissors\n    accommodation appointment decrease\
    \ development\n    earthquake environment brand environment necessary\n    luggage\
    \ responsible ambassador circumstance\n    congratulate frequent'.split()\n  \
    \  return bank[random.randint(0,len(bank))]\n\ndef main():\n    game = Hangman(rand\
    \ _ word())\n    while not game.hangman _ over():\n        game.print _ game _\
    \ status()\n        user _ input = input('\\nEnter a letter: ')\n        game.guess(user\
    \ _ input)\n\n    game.print _ game _ status()\n    if game.hangman _ won():\n\
    \        print ('\\nCongratulations! You have won!!')\n    else:\n        print\
    \ ('\\nSorry, you have lost.')\n        print ('The word was ' + game.word)\n\n\
    \    print ('\\nGoodbye!\\n')\n\nif __ name __ == '__ __ main __':\n    main()\n\
    ```\n\n# QUIT()\n\nSince this is the last example in our Python code repository,\
    \ we thought we'd go out with a bang and feature the hangman gallows being drawn\
    \ with each incorrect guess of the word. Don't worry if it looks misaligned in\
    \ the text here, this is merely due to the differences between using the Python\
