  md: "# Python Graphics\n\nWhile dealing with text on the screen, either as a game\
    \ or in a program, is great, there will come a time when a bit of graphical representation\
    \ wouldn’t go amiss. Python 3 has numerous ways in which to include graphics and\
    \ they’re surprisingly powerful too.\n\n# GOING GRAPHICAL\n\nYou can draw simple\
    \ graphics, lines, squares and so on, or you can use one of the many Python modules\
    \ available, to bring out some spectacular effects.\n\n**STEP 1** One of the best\
    \ graphical modules to begin learning Python graphics is Turtle. The Turtle module\
    \ is, as the name suggests, based on the turtle robots used in many schools, that\
    \ can be programmed to draw something on a large piece of paper on the floor.\
    \ The Turtle module can be imported with: `import turtle`.\n\n**STEP 3** The command\
    \ `turtle.circle(50)` is what draws the circle on the screen, with 50 being the\
    \ size. You can play around with the sizes if you like, going up to 100, 150 and\
    \ beyond; you can draw an arc by entering: `turtle.circle(50, 180)`, where the\
    \ size is 50, but you’re telling Python to only draw 180° of the circle.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_81_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_81_1.png)\n\n**STEP 2** Let’s begin\
    \ by drawing a simple circle. Start a New File, then enter the following code:\n\
    \n```\npython\nimport turtle\n\nturtle.circle(50)\nturtle.getscreen()._root.mainloop()\n\
    ```\n\nAs usual press F5 to save the code and execute it. A new window will now\
    \ open up and the ‘Turtle’ will draw a circle.\n\n**STEP 4** The last part of\
    \ the circle code tells Python to keep the window where the drawing is taking\
    \ place to remain open, so the user can click to close it. Now, let’s make a square:\n\
    \n```\npython\nimport turtle\n\nprint(\"Drawing a square...\")\n\nfor t in range(4):\n\
    \    turtle.forward(100)\n    turtle.left(90)\nturtle.getscreen()._root.mainloop()\n\
    ```\n\nYou can see that we’ve inserted a loop to draw the sides of the square.\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_81_2.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_81_3.png)"
  merge: -1
