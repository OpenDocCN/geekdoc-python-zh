  md: '# PYTHON-POWERED GAMES


    Some good examples of the types of games in which Python is used are the following:


    +   - **Battlefield 2** – Python is used for the game’s add-ons and functionality
    of the player elements.

    - **The Sims** – AI, and many of the game’s interactions.

    - **Civilisation** – Python is used throughout the Civ games, controlling movement
    and the non-player AI.

    - **Eve Online** – Utilises Python for floating point number calculations and
    other tasks.

    - **World of Tanks** – Python is used to control AI objects and detail the large
    amount of graphical data.


    In particular, it’s worth noting that Python’s use in games is due to its ability
    to automate repetitive tasks quickly. While another programming language may be
    faster at drawing the graphics on the screen, Python can quickly repeat resizing
    hundreds of textures in batches. There’s also Python’s excellent and sizeable
    libraries that can be tweaked for certain tasks, specifically in-game tasks freeing
    up other components to deliver the performance that modern games need.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_86_0.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_86_1.png)


    # KEEP ON GAMING


    In short, while Python may not be the ideal language with which to create a modern
    game entirely, its use is often behind the scenes, in areas where other programming
    languages will struggle. Python can be used as the glue that sticks elements of
    game technologies together, creating complex AI or simply designing a dialog box.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_86_2.png)'
