  md: "# Pygame Module\n\nWe’ve had a brief look at the Pygame module already but\
    \ there’s a lot more to it that needs exploring. Pygame was developed to help\
    \ Python programmers create either graphical or text-based games.\n\n# PYGAMING\n\
    \nPygame isn’t an inherent module to Python but those using the Raspberry Pi will\
    \ already have it installed. Everyone else will need to use: **pip install pygame**\
    \ from the command prompt.\n\n**STEP 1** Naturally you need to load up the Pygame\
    \ modules into memory before you’re able to utilise them. Once that’s done Pygame\
    \ requires the user to initialise it prior to any of the functions being used:\n\
    \n```\nimport pygame\npygame.init()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_99_0.png)\n\
    \n**STEP 3** Sadly you can’t close the newly created Pygame window without closing\
    \ the Python IDLE Shell, which isn’t very practical. For this reason, you need\
    \ to work in the editor (New > File) and create a True/False while loop:\n\n```\n\
    import pygame\nfrom pygame.locals import *\npygame.init()\n\ngamewindow=pygame.display.set_mode((800,600))\n\
    pygame.display.set_caption(\"Adventure Game\")\n\nrunning=True\n\nwhile running:\n\
    \    for event in pygame.event.get():\n        if event.type==QUIT:\n        \
    \    running=False\n            pygame.quit()\n```\n\n**STEP 2** Let’s create\
    \ a simple game ready window, and give it a title:\n\n```\ngamewindow=pygame.display.set_mode((800,600))\n\
    pygame.display.set_caption(\"Adventure Game\")\n```\n\nYou can see that after\
    \ the first line is entered, you need to click back into the IDLE Shell to continue\
    \ entering code; also, you can change the title of the window to anything you\
    \ like.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_99_1.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_99_2.png)"
