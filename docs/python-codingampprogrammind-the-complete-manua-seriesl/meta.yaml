    # # Python in Focus: Stitching Black Holes


    One of the biggest scientific, engineering and space-based projects came to a
    head in 2019, revealing humanity’s first glimpse at the universe’s most elusive
    object: a black hole. But what’s that got to do with Python?


    Imaging a black hole is pretty difficult. The very nature of a black hole means
    that nothing can escape its immense gravitational field, even light itself. To
    quote the Wikipedia entry for a black hole:


    > > “A black hole is a region of spacetime exhibiting gravitational acceleration
    so strong that nothing—no particles or even electromagnetic radiation such as
    light—can escape from it. The theory of general relativity predicts that a sufficiently
    compact mass can deform spacetime to form a black hole. The boundary of the region
    from which no escape is possible is called the event horizon. Although the event
    horizon has an enormous effect on the fate and circumstances of an object crossing
    it, no locally detectable features appear to be observed. In many ways, a black
    hole acts like an ideal black body, as it reflects no light. Moreover, quantum
    field theory


    in curved spacetime predicts that event horizons emit Hawking radiation, with
    the same spectrum as a black body of a temperature inversely proportional to its
    mass. This temperature is on the order of billionths of a kelvin for black holes
    of stellar mass, making it essentially impossible to observe.”


    Not that long ago a black hole was just a collection of theories and mathematics
    written down on paper, speculated only by the brightest minds of our time. However,
    as with most things scientific, our understanding of the universe and our abilities
    to read it have greatly improved and, with the culmination of years of hard work
    by a collaboration of observatories, scientists and engineers, we got our first
    image of a black hole.


    # ## EVENT HORIZON TELESCOPE


    One of the problems regarding the imaging of such an object is angular resolution.
    In Astronomy, the size of the objects in the night sky is referred to by the amount
    of the sky they take up - units of arc. An arc, or arc second, is a measurement
    (1/3600 of a degree) that describes the size of an angle in degrees, designated
    by the symbol °. A full circle is divided into 360° and a right-angle measures
    90°. One degree can be divided into 60 arcminutes (abbreviated 60 arcmin or 60’).
    An arcminute can also be divided into 60 arcseconds (abbreviated 60 arcsec or
    60”).


    For example, looking at the moon, which is roughly 31 arcminutes, imagine drawing
    a line from you to one side of the moon and another to the opposite side of the
    moon, the angle between the two lines is the angular size, or angular resolution.


    The black hole at the centre of the Messier 87 galaxy, the one that was imaged,
    is 55 million light years from Earth and has an angular size of 40 microarc seconds,
    or one millionth of an arcsecond. So, in order to see it, we would need a telescope
    with a diameter of around 8Km, which simply isn''t possible as a single unit.


    This is where the Event Horizon Telescope project comes into play. Using a network
    of eight radio telescopes, scientists were able to take images of the black hole
    over a period of around six months. Critically timed, using atomic clocks, the
    telescopes imaged the area of sky containing the black hole and collected the
    data, swapping from one telescope array to the next as the Earth rotated.


