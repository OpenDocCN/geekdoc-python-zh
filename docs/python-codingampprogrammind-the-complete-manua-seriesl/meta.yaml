    此外，猜数字游戏的代码确实提供了一些空间，可以以不同的方式整合到你的代码中。我们的意思是，该代码可用于检索一个范围内的随机数，这反过来可以为你提供一个冒险游戏中角色创建定义函数的起点。\n\
    \n想象一下用Python编写的文字冒险游戏的开头，玩家为他们的角色命名。下一步是掷虚拟的随机骰子来决定该角色的战斗评级、力量、耐力和运气值。然后，这些值可以作为一组变量带入游戏中，根据玩家角色所处的情况进行增减。\n\
    \n然后，玩家可以决定是保留他们的掷骰结果，还是为了获得更好的数值而重新尝试。有多种方法可以将此代码实现到基本的冒险游戏中。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_114_2.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_114_3.png)\n\n# 随机数生成器\n\n用户输入和操作该输入的能力是任何编程语言的重要元素。它将一个好程序与一个伟大的程序区分开来，后者允许用户交互并看到交互的结果。\n\
    \n# RNDNUMGEN.PY\n\n它可能很简单，但这段小代码会要求用户输入两组数字，一个起始值和一个结束值。然后，代码将从这两组数字之间随机抽取一个数字并显示出来。\n\
    \n```\nfrom random import *\n\nprint(\"\\n>>>>>>>>>>Random Number Generator<<<<<<<<<<\\\
    n\")\nnmb1=int(input(\"Enter the start number: \"))\nnmb2=int(input(\"Enter the\
    \ last number: \"))\n\nx = randint(nmb1, nmb2)\nprint(\"\\nThe random number between\"\
    ,nmb1,\"and\",nmb2,\"is:\\n\")\nprint(x)\n```\n\n# 更多输入\n\n虽然代码易于理解，但如果你提示用户提供更多输入，它可能会更有趣。也许你可以为他们的数字提供加法、减法、乘法元素。如果你觉得有挑战性，可以尝试将代码通过Tkinter窗口，甚至是第128页可用的Ticker窗口来实现。\n\
    \n例如，代码可以编辑成这样：\n\n此外，代码的核心可以用于文字冒险游戏，其中角色与某物战斗，他们的生命值以及敌人的生命值会减少一个随机数。这可以与第90页猜数字游戏中的先前代码混合使用，我们在那里定义了冒险游戏角色的属性。\n\
    \n```\nfrom random import *\nimport turtle\n\nprint(\"\\n>>>>>>>>>>Random Turtle\
    \ Image<<<<<<<<<<\\n\")\nnmb1=int(input(\"Enter the start number: \"))\nnmb2=int(input(\"\
    Enter the second number: \"))\nnmb3=int(input(\"Enter the third number: \"))\n\
    nmb4=int(input(\"Enter the fourth number: \"))\n\nturtle.forward(nmb1)\nturtle.left(90)\n\
    turtle.forward(nmb2)\nturtle.left(90)\nturtle.forward(nmb3)\nturtle.left(90)\n\
    turtle.forward(nmb4)\nturtle.left(90)\n```\n\n你还可以将Turtle模块引入代码中，并可能为绘制形状、对象或其他东西设置一些定义规则，这些规则基于用户输入的随机值。这需要一点计算，但效果肯定非常有趣。\n\
    \n虽然它还有些粗糙，但你可以轻松地使其更合适。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_115_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_115_1.png)\n\n# # 随机密码生成器\n\n我们总是被告知我们的密码不够安全；那么，这里有一个解决方案，你可以将其应用到你未来的程序中。下面的随机密码生成器代码每次执行时都会创建一个由12个字母（大小写）和数字组成的字符串。\n\
    \n```\npython\nimport string\nimport random\n\ndef randompassword():\n    chars=string.ascii_uppercase\
    \ + string.ascii_lowercase + string.digits\n    size= 8\n    return ''.join(random.choice(chars)\
    \ for x in range(size,20))\n\nprint(randompassword())\n\n```\n\n# ## 安全密码\n\n\
    你可以做很多事情来修改此代码并进一步改进它。首先，你可以增加生成密码显示的字符数，也许还可以包含特殊字符，如符号和标志。然后，你可以将选定的密码输出到一个文件，然后使用之前的随机数生成器作为文件密码安全地压缩它，并将其发送给用户作为他们的新密码。\n\
    \n此代码的一个有趣方面是能够引入循环并打印任意数量的随机密码。假设你有一个包含50名用户的公司列表，你负责每月为他们生成一个随机密码。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_116_0.png)\n\
    \n添加一个循环来打印五十次密码非常容易，例如：\n\n```\npython\nimport string\nimport random\n\ndef randompassword():\n\
    \    chars=string.ascii_uppercase + string.ascii_lowercase + string.digits\n \
    \   size= 4\n    return ''.join(random.choice(chars) for x in range(size,20))\n\
    \nn=0\nwhile n<50:\n    print(randompassword())\n    n=n+1\n\n```\n\n这将基于之前随机选择的字符输出五十个随机密码。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_116_1.png)\n\n# # 文本转二进制转换器\n\n虽然它可能看起来不太令人兴奋，但这个文本转二进制转换器实际上相当有趣。它只使用两行代码，因此非常容易插入到你自己的脚本中。\n\
    \n# ## TXT2BIN.PY\n\n我们自然使用format函数将用户输入的文本字符串转换为其二进制等效值。如果你想检查其准确性，可以将二进制数插入在线转换器中。\n\
    \n```\npython\ntext=input(\"Enter text to convert to Binary: \")\nprint(' '.join(format(ord(x),\
    \ 'b') for x in text))\n\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_117_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_117_1.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_117_2.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_117_3.png)\n\n# 1000010 1101001 1101110\
    \ 1100001 1110010 1111001\n\n文本转二进制转换器确实提供了一些改进和增强的空间。它有许多用途：可以用于密码或秘密词脚本，作为冒险游戏的一部分，或者仅仅是一种展示某人名字的新颖方式。\n\
    \n关于改进，你可以使用第100页的动画文本选项，在Pygame窗口中显示二进制转换。你还可以询问用户是否想再试一次，甚至询问他们是否想将二进制输出保存到文件中。\n\
    \n关于将输出的二进制转换渲染到带有旋转文本的Pygame窗口，你可以使用：\n\n```\npython\nimport pygame\npygame.init()\n\
    BLACK = (0, 0, 0)\nWHITE = (255, 255, 255)\nBLUE = (0, 0, 255)\nGREEN = (0, 255,\
    \ 0)\nRED = (255, 0, 0)\nprint(\">>>>>>>>>>>>Text to Binary Convertor<<<<<<<<<<<<\\\
    n\")\nconversion=input(\"Enter text to convert to Binary: \")\nsize = (600, 400)\n\
    screen = pygame.display.set_mode(size)\n\n```\n\n```\npython\npygame.display.set_caption(\"\
    Binary Conversion\")\ndone = False\nclock = pygame.time.Clock()\ntext_rotate_degrees\
    \ = 0\nBinary=(' '.join(format(ord(x), 'b') for x in conversion))\nwhile not done:\n\
    \    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n\
    \            done = True\n    screen.fill(WHITE)\n    font = pygame.font.SysFont('Calibri',\
    \ 25, True, False)\n    text = font.render(Binary, True, BLACK)\n    text = pygame.transform.rotate(text,\
    \ text_rotate_degrees)\n    text_rotate_degrees += 1\n    screen.blit(text, [100,\
    \ 50])\n    pygame.display.flip()\n    clock.tick(60)\npygame.quit()\nprint('\
    \ '.join(format(ord(x), 'b') for x in conversion))\n\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_118_0.png)"
