    6. **160** Glossary of Python Terms\n\n## Getting Started\n\n![img](img/2a94c98fce5df994fcecd950a995b8c9_5_0.png)\n\
    \n```\npython\nmirror_ob.select=1\nmodifier_ob.select=1\nbpy.context.scene.objects.active\n\
    print(\"Selected\" + str(modifier_ob))\n```\n\n![img](img/2a94c98fce5df994fcecd950a995b8c9_6_0.png)\n\
    \nPython is a high-level, general-purpose programming language that was developed\
    \ by Guido van Rossum in the late eighties and is based upon a number of other\
    \ languages, while being the successor to the popular ABC language.\n\nIt has\
    \ been devised to work on a human level, so it’s readable and understandable without\
    \ needing to delve into obscure volumes of machine code, hexadecimal characters,\
    \ or even ones and zeros. It’s clear, logical, comprehensive, powerful and functional,\
    \ yet also easy to follow and learn.\n\nYou will find Python at the heart of some\
    \ of the most interesting and cutting-edge technologies in the world. It’s the\
    \ code that binds supercomputer algorithms together; it’s used in the space industry,\
    \ and in science and engineering. AI, and the likes of Alexa and Siri, Cortana\
    \ and the Google Assistant all utilise Python for their powerful voice recognition\
    \ technology. It’s simply an amazing, versatile and incredible language to learn.\n\
    \nSo let’s get started and explore what you need to become a Python programmer.\n\
    \n- 8. Being a Programmer\n- 10. A Brief History of Coding\n- 12. What can You\
    \ Do with Python?\n- 14. Python in Numbers\n- 16. Why Python?\n- 18. Python on\
    \ the Pi\n- 20. Using Virtual Machines\n- 22. Creating a Coding Platform\n\n##\
    \ Being a Programmer\n\nProgrammer, developer, coder, they’re all titles for the\
    \ same occupation, someone who creates code. What they’re creating the code for\
    \ can be anything from a video game to a critical element on-board the International\
    \ Space Station. How do you become a programmer though?\n\n![img](img/2a94c98fce5df994fcecd950a995b8c9_7_0.png)\n\
    \n![img](img/2a94c98fce5df994fcecd950a995b8c9_8_0.png)\n\nTimes have changed since\
    \ programming in the ‘80s, but the core values still remain.\n\n> > It’s up to\
    \ you how far to take your coding adventure!\n\n```\nc\n#include<stdio.h>\n#include<dos.h>\n\
    #include<conio.h>\n#include<math.h>\nvoid getup()\n{\n    textcolor(BLACK);\n\
    \    textbackground(15);\n    clrscr();\n    window(10,2,70,3);\n    cprintf(\"\
    Press X to Exit, Press Space to Jump\");\n    window(62,2,80,3);\n    cprintf(\"\
    SCORE : \");\n    window(1,25,80,25);\n    for(int x=0;x<79;x++)\n        cprintf(\"\
    ─\");\n    textcolor(0);\n}\nint t,speed=40;\nvoid ds(int jump=0)\n{\n    static\
    \ int a=1;\n    if(jump==0)\n        t=0;\n    else if(jump==2)\n        t--;\n\
    \    else t++;\n    window(2,15-t,18,25);\n    cprintf(\"     \");\n    cprintf(\"\
    \    ▀▄█▄▀\");\n    cprintf(\"     \");\n    cprintf(\"    ████\");\n    cprintf(\"\
    \   ████████\");\n    cprintf(\"  ██████████\");\n    cprintf(\" █████████████\"\
    );\n    cprintf(\"████████████████\");\n    if(jump==1 || jump==2){\n        cprintf(\"\
    \  ██  ██  \");\n        cprintf(\"    ██    \");\n    }else if(a==1)\n    {\n\
    \        cprintf(\"  ██  ██  \");\n        cprintf(\"    ██    \");\n        a=2;\n\
    \    }\n    else if(a==2)\n    {\n        cprintf(\"  ██  ██  \");\n        cprintf(\"\
    \    ██    \");\n        a=1;\n    }\n    cprintf(\"          \");\n    delay(speed);\n\
    }\nvoid obj()\n```\n\nBeing able to follow a logical pattern and see an end result\
    \ is one of the most valued skills of a programmer.\n\n## MORE THAN CODE\n\nFor\
    \ those of you old enough to remember the ‘80s, the golden era of home computing,\
    \ the world of computing was a very different scene to how it is today. 8-bit\
    \ computers that you could purchase as a whole, as opposed to being in kit form\
    \ and you having to solder the parts together, were the stuff of dreams; and getting\
    \ your hands on one was sheer bliss contained within a large plastic box. However,\
    \ it wasn’t so much the new technology that computers then offered, moreover it\
    \ was the fact that for the first time ever, you could control what was being\
    \ viewed on the ‘television’.\n\nInstead of simply playing one of the thousands\
    \ of games available at the time, many users decided they wanted to create their\
    \ own content, their own games; or simply something that could help them with\
    \ their homework or home finances. The simplicity of the 8-bit home computer meant\
    \ that creating something from a few lines of BASIC code was achievable and so\
    \ the first generation of home-bred programmer was born.\n\nFrom that point on,\
    \ programming expanded exponentially. It wasn’t long before the bedroom coder\
    \ was a thing of the past and huge teams of designers, coders, artists and musicians\
    \ were involved in making a single game. This of course led to the programmer\
    \ becoming more than simply someone who could fashion a sprite on the screen and\
    \ make it move at the press of a key.\n\nNaturally, time has moved on and with\
    \ it the technology that we use. However, the fundamentals of programming remain\
    \ the same; but what exactly does it take to be a programmer?\n\nThe single most\
    \ common trait of any programmer, regardless of what they’re doing, is the ability\
    \ to see a logical pattern. By this we mean someone who can logically follow something\
    \ from start to finish and envisage the intended outcome. While you may not feel\
    \ you’re such a person, it is possible to train your brain into this way of thinking.\
    \ Yes, it takes time but once you start to think in this particular way you will\
    \ be able to construct and follow code.\n\nSecond to logic is an understanding\
    \ of mathematics. You don’t have to be at a genius level but you do need to understand\
    \ the rudiments of maths. Maths is all about being able to solve a problem and\
    \ code mostly falls under the umbrella of mathematics.\n\nBeing able to see the\
    \ big picture is certainly beneficial for the modern programmer. Undoubtedly,\
    \ as a programmer, you will be part of a team of other programmers, and more than\
    \ likely part of an even bigger team of designers, all of whom are creating a\
    \ final product. While you may only be expected to create a small element of that\
    \ final product, being able to understand what everyone else is doing will help\
    \ you create something that’s ultimately better than simply being locked in your\
    \ own coding cubicle.\n\nFinally, there’s also a level of creativity needed to\
    \ be a good programmer. Again though, you don’t need to be a creative genius,\
    \ just have the imagination to be able to see the end product and how the user\
    \ will interact with it.\n\nThere is of course a lot more involved in being a\
    \ programmer, including learning the actual code itself. However, with time, patience\
    \ and the determination to learn, anyone can become a programmer. Whether you\
    \ want to be part of a triple-A video game team or simply create an automated\
    \ routine to make your computing life easier, it’s up to you how far to take your\
    \ coding adventure!"
