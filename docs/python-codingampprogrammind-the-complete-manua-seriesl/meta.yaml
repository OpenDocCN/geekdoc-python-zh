  md: '# Saving and Executing Your Code


    While working in the IDLE Shell is perfectly fine for small code snippets, it’s
    not designed for entering longer program listings. In this section you’re going
    to be introduced to the IDLE Editor, where you will be working from now on.


    # EDITING CODE


    You will eventually reach a point where you have to move on from inputting single
    lines of code into the Shell. Instead, the IDLE Editor will allow you to save
    and execute your Python code.


    **STEP 1** First, open the Python IDLE Shell and when it’s up, click on File >
    New File. This will open a new window with Untitled as its name. This is the Python
    IDLE Editor and within it you can enter the code needed to create your future
    programs.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_37_0.png)


    **STEP 2** The IDLE Editor is, for all intents and purposes, a simple text editor
    with Python features, colour coding and so on; much in the same vein as Sublime.
    You enter code as you would within the Shell, so taking an example from the previous
    tutorial, enter:


    ```

    print("Hello everyone!")

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_37_1.png)


    **STEP 3** You can see that the same colour coding is in place in the IDLE Editor
    as it is in the Shell, enabling you to better understand what’s going on with
    your code. However, to execute the code you need to first save it. Press F5 and
    you get a Save…Check box open.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_37_2.png)


    **STEP 4** Click on the OK button in the Save box and select a destination where
    you’ll save all your Python code. The destination can be a dedicated folder called
    Python or you can just dump it wherever you like. Remember to keep a tidy drive
    though, to help you out in the future.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_37_3.png)'
  merge: -1
