    )` again to recreate the file. This time, however, enter: `print(poem.read())`\n\
    This time, the `\\n` entries are removed in favour of new lines and readable text.\n\
    \n```python\npoem=open(\"/home/pi/Documents/Poem.txt\")\nprint(poem.read())\n\
    ```\n\n### STEP 5\nJust as with lists, tuples, dictionaries and so on, you're\
    \ able to index individual characters of the text. For example:\n\n```python\n\
    poem.read(5)\n# Displays the first five characters, whilst again entering:\npoem.read(5)\n\
    # Will display the next five. Entering (1) will display one character at a time.\n\
    ```\n\n### STEP 6\nSimilarly, you can display one line of text at a time by using\
    \ the readline() function. For example:\n\n```python\npoem=open(\"/home/pi/Documents/Poem.txt\"\
    )\npoem.readline()\n# Will display the first line of the text with:\npoem.readline()\n\
    # Displaying the next line of text once more.\n```\n\n### STEP 7\nYou may have\
    \ guessed that you can pass the readline() function into a variable, thus allowing\
