    # Editing Text Files


    A text file in Linux can be anything from a simple set of instructions on how
    to use an app, to some complex Python, C++ or other programming language code.
    Text files can be used for scripting, automated executable files, as well as configuration
    files too.


    # THE JOY OF TEXT


    To be able to edit or create a text file, you need a good text editor. Linux has
    many but here are some in action on the Raspberry Pi.


    STEP 1 The first text editor for the Raspberry Pi is the default desktop environment
    app: Leafpad. To use, you can either double-click an existing text file or click
    the Raspberry Pi menu icon (in the top left of the desktop) and from the Accessories
    menu, choose Text Editor.


    STEP 3 Vi is the original Unix command but in this case it launches VIM, the new
    Linux version of Vi. Although simple looking, Vi is considered, even by today''s
    standards, to be one of the most widely used text editors, There''s a lot you
    can do with it, so check out the man pages for more Vi information.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_153_0.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_153_1.png)


    STEP 2 From the Terminal there are even more options, although using the correct
    command, you can launch any of the desktop apps via the Terminal. One of the simplest,
    and a classic text editor that''s carried over from the Unix days, is vi. In the
    Terminal, enter: vi.


    STEP 4 Nano is another favourite, and simple, text editor available for Linux.
    Enter: nano into the Terminal to launch it. You can use Nano for editing code,
    creating scripts or writing your own help files. To exit Nano, press Ctrl + X,
    followed by Y to save the file or N to exit without saving.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_153_2.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_153_3.png)'
