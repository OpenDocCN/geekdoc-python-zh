  mdcn: "# 处理数据\n\n## Python聚焦：游戏\n\n尽管Python并非总是被视为开发游戏的理想编程语言，但近年来它已取得长足进步，如今已成为众多游戏作品的重要贡献元素之一。\n\
    \n电子游戏产业每年创造约1400亿美元的产值，且这一数字正在快速增长。这与Commodore 64和ZX Spectrum的8位机时代相去甚远——那些曾吞噬我们零花钱的街机游戏，以及雅达利精心打造的木纹家庭游戏机。如今，这一切都由程序员、图形设计师、音乐家、公关团队、项目管理和开发平台共同协作完成。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_85_0.png)\n\n## 游戏编程\n\n从零开始，使用原始代码编写游戏已成为过去式。如今大多数游戏都借助一系列开发工具创建。这些工具包括现成引擎，如虚幻引擎，也有些是围绕原创产品定制构建的，例如Bethesda为《上古卷轴》和《辐射》系列游戏开发的世界生成引擎。虽然也有从头编写的范例，但这类案例已较为罕见。那么Python在其中扮演什么角色呢？\n\
    \nPython的局限性在于性能。虽然大多数游戏对运行平台的性能要求极高，Python的代码虽优秀，但其设计初衷并非为了应对《战地》或《使命召唤》系列这类快节奏游戏的要求。这类游戏通常使用C++或其他底层编程语言开发。但这并不意味着Python在游戏开发领域受到冷落，事实上恰恰相反。\n\
    \n## 构建工具\n\n在游戏产业中，Python主要用于开发供游戏开发者使用的内建工具，或帮助连接不同代码模块间的空隙。例如，用Python编写的游戏内工具可供设计师创建游戏关卡、角色物品栏的特定元素，甚至能生成玩家与游戏非玩家角色之间的对话。\n\
    \n你还会发现Python可用于控制游戏AI（人工智能），这赋予了游戏中的角色某种生命感。以热门游戏《模拟人生》为例，其中包含玩家角色之外的其他角色。这些模拟市民会根据玩家的选择决定其行为模式，这涉及使用Python编码的高级人工智能。\n\
    \n其他案例还包括许多开放世界游戏——玩家的出现将改变村庄、城镇甚至城市居民的行为模式。在中世纪村庄的市场摊位上随意炸毁几辆汽车会影响其他司机的行为；在市集摊位上上下跳跃会引发周围居民的反应。这一切都源于游戏主代码中与游戏开发引擎并行编写的Python代码。\n\
    \n```\nMONITOR FOR 6802 1.4   9-14-80  TSC ASSEMBLER  PAGE   2\n\nC000       \
    \            ORG      ROM+$0000 BEGIN MONITOR\nC000 8E 00 70  START   LDS    \
    \  #STACK\n                       ****************************\n             \
    \          * FUNCTION: INITA - Initialize ACIA\n                       * INPUT:\
    \ none\n                       * OUTPUT: none\n                       * CALLS:\
    \ none\n                       * DESTROYS: acc A\n\n0013           RESETA  EQU\
    \      %00010011\n0011           CTLREG  EQU      %00010001\n\nC003 86 13    \
    \ INITA   LDA A    #RESETA      RESET ACIA\nC005 B7 80 04          STA A    ACIA\n\
    C008 86 11             LDA A    #CTLREG      SET 8 BITS AND 2 STOP\nC00A B7 80\
    \ 04          STA A    ACIA\n\nC00D 7E C0 F1          JMP      SIGNON       GO\
    \ TO START OF MONITOR\n                       ****************************\n \
    \                      * FUNCTION: INCH - Input character\n                  \
    \     * INPUT: none\n                       * OUTPUT: char in acc A\n        \
    \               * DESTROYS: acc A\n                       * CALLS: none\n    \
    \                   * DESCRIPTION: Gets 1 character from terminal\n```\n\n## Python驱动的游戏\n\
    \n以下是应用Python的典型游戏案例：\n\n- **《战地2》** – Python用于游戏附加组件和玩家元素功能。\n- **《模拟人生》** –\
    \ 人工智能及游戏中的众多交互功能。\n- **《文明》系列** – Python贯穿整个《文明》游戏系列，控制单位移动与非玩家角色AI。\n- **《星战前夜》**\
    \ – 利用Python进行浮点数计算及其他任务。\n- **《坦克世界》** – Python用于控制AI对象并处理大量图形数据。\n\n特别值得注意的是，Python在游戏中的应用源于其快速自动化重复任务的能力。虽然其他编程语言在屏幕图形渲染方面可能更快，但Python能批量快速调整数百个纹理尺寸。此外，Python拥有优秀且庞大的库体系，可针对特定任务（尤其是游戏任务）进行优化，释放其他组件以提供现代游戏所需的性能表现。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_86_0.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_86_1.png)\n\
    \n## 持续探索游戏开发\n\n总而言之，虽然Python并非完全创建现代游戏的理想语言，但它常作为幕后工具应用于其他编程语言难以胜任的领域。Python可作为连接游戏技术元素的黏合剂，用于构建复杂人工智能或设计对话框界面。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_86_2.png)\n\n# 使用模块\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_87_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_88_0.png)\n\nPython模块是包含类、函数和全局变量必要代码的源文件。你可以通过绑定和引用模块扩展功能，创建更出色的Python程序。\n\
    \n你是否好奇如何优化模块使用，为代码增添亮点？请继续阅读，了解如何运用这些模块打造包含图形、动画和操作系统专用命令的精彩程序。\n\n- 90 日历模块\n\
    - 92 操作系统模块\n- 94 使用数学模块\n- 96 随机数模块\n- 98 图形界面模块\n- 100 Pygame模块\n- 104 基础动画\n\
    - 106 创建自定义模块\n- 108 Python聚焦：人工智能\n\n## 日历模块\n\n除时间模块外，日历模块在代码中运行时能生成有趣的结果。它不仅能以类似时间模块的格式显示日期，还可以调用日历墙式的显示界面。\n\
    \n### 处理日期\n\n日历模块已内置于Python 3中。若因特殊原因未安装，可通过Windows管理员权限执行`pip install calendar`，或在Linux/macOS系统中使用`sudo\
    \ pip install calendar`安装。\n\n**步骤1** 启动Python 3并输入：`import calendar`以调用该模块及其内置函数。加载完成后输入：\n\
    \n`sep=calendar.TextCalendar(calendar.SUNDAY)`\n`sep.prmonth(2019, 9)`\n\n**步骤3**\
    \ 日历模块包含多个可用于编写代码的实用函数。例如，可以计算两个特定年份之间的闰年数量：\n\n`leaps=calendar.leapdays(1900,\
    \ 2019)`\n`print(leaps)`\n\n结果为29，从1904年开始计算。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_89_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_89_1.png)\n\n**步骤2** 可以看到2019年9月的日期以日历墙形式显示。当然你可以将第二行的`2019,\
    \ 9`修改为任意年份月份，例如生日（1973, 6）。第一行将TextCalendar配置为从周日开始计算；也可选择从周一开始。\n\n**步骤4** 甚至可将该示例改造为可交互的实用Python代码：\n\
    \n`import calendar`\n`print(\">>>>>>>>>>闰年计算器<<<<<<<<<<\\n\")`\n`y1=int(input(\"\
    请输入起始年份：\"))`\n`y2=int(input(\"请输入结束年份：\"))`\n`leaps=calendar.leapdays(y1, y2)`\n\
    `print(\"在\", y1, \"年至\", y2, \"年之间共有\", leaps, \"个闰年\")`\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_89_2.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_89_3.png)"
