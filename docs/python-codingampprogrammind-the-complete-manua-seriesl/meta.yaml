  md: "# Working with Data\n\n# # Python in Focus: Gaming\n\nAlthough not always considered\
    \ as the ideal programming language for developing games, Python has come a long\
    \ way in recent years and is now one of the contributing elements to a huge number\
    \ of titles.\n\nThe video game industry generates something in the region of $140\
    \ billion each year, and that number is growing fast. It's a long way from the\
    \ 8-bit days of the Commodore 64 and ZX Spectrum; the arcade titles that used\
    \ to devour our pocket money and the wood panelled home consoles that Atari lovingly\
    \ developed. These days, it's all about teams of coders, graphic artists, musicians,\
    \ PR, projects and development platforms.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_85_0.png)\n\
    \n# ## GAME CODE\n\nCoding a game from scratch, using raw code, has become something\
    \ of the past. Most games these days are created using a range of development\
    \ tools. These tools can be off-the-shelf engines, such as the Unreal Engine,\
    \ while others are custom built around an original product, such as the world\
    \ generating engine that Bethesda use for the Skyrim and Fallout series of games.\
    \ Others examples can be coded from the ground up, but these are generally few\
    \ and far between. So where does Python fit into all this?\n\nThe limiting factor\
    \ with Python is performance. While most games require a huge degree of performance\
    \ from the platform for which they are written, Python's code, which is good,\
    \ isn't really designed to cope with the fast-paced formula on which games such\
    \ as Battlefield or the Call of Duty series are based. These games are often coded\
    \ with C++, or some other form of low-level programming language. But that doesn't\
    \ mean Python is left out in the cold when it comes to game development, in fact\
    \ it's quite the opposite.\n\n# ## BUILDING TOOLS\n\nIn the game industry, Python\
    \ is mostly limited to the development of in-game tools used by the developers\
    \ of the game, or to help bridge the gaps between different areas of code. For\
    \ example, in-game tools coded in Python can be used by designers to create levels\
    \ for the game, or specific elements that would make up a character's inventory,\
    \ or even creating dialog between the player and non-playing characters in the\
    \ game.\n\nYou will also find that Python can be used to control the game's AI\
    \ (Artificial Intelligence), which will give the characters in a game a certain\
    \ element of life. As an example, the popular Sims games consist of characters\
    \ other than the one the gamer controls. These Sims will go about their business\
    \ with their actions determined by the player's choices, this involves an advanced\
    \ form of Artificial Intelligence that is coded using Python.\n\nOther examples\
    \ include many of the available open world games, where the introduction of the\
    \ player will change the course of a village's, Town's, or even city's inhabitant's\
    \ behaviour. Blow up a few cars in the middle of the street and it'll affect the\
    \ way the other drivers behave; jump up and down on top of a market stall in the\
    \ middle of a medieval village and the folk around you will react. This, again,\
    \ is all down to Python code written within the main code of the game, alongside\
    \ the game development engine.\n\n```\n\nMONITOR FOR 6802 1.4   9-14-80  TSC ASSEMBLER\
    \  PAGE   2\n\nC000                   ORG      ROM+$0000 BEGIN MONITOR\nC000 8E\
    \ 00 70  START   LDS      #STACK\n                       ****************************\n\
    \                       * FUNCTION: INITA - Initialize ACIA\n                \
    \       * INPUT: none\n                       * OUTPUT: none\n               \
    \        * CALLS: none\n                       * DESTROYS: acc A\n\n0013     \
    \      RESETA  EQU      %00010011\n0011           CTLREG  EQU      %00010001\n\
    \nC003 86 13     INITA   LDA A    #RESETA      RESET ACIA\nC005 B7 80 04     \
    \     STA A    ACIA\nC008 86 11             LDA A    #CTLREG      SET 8 BITS AND\
    \ 2 STOP\nC00A B7 80 04          STA A    ACIA\n\nC00D 7E C0 F1          JMP \
    \     SIGNON       GO TO START OF MONITOR\n                       ****************************\n\
    \                       * FUNCTION: INCH - Input character\n                 \
    \      * INPUT: none\n                       * OUTPUT: char in acc A\n       \
    \                * DESTROYS: acc A\n                       * CALLS: none\n   \
    \                    * DESCRIPTION: Gets 1 character from terminal\n```"
