    互联网时代带来了大量新的编程语言，并让人们能够以更好的方式获取学习编程所需的工具和知识。用户不仅可以学习如何编码，还可以自由地分享自己的代码，并获取其他代码来改进自己的作品。


    第一种真正的计算机代码是汇编语言（ASM）或区域汇编语言。ASM特定于其运行的机器架构。1951年，编程语言被统称为自动代码。不久之后，IPL、FORTRAN和ALGOL
    58等语言相继开发出来。


