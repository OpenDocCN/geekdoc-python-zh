    # # PI 4-EVER!


    Introduced on 24th June 2019, the Raspberry Pi 4 Model B is a significant leap
    in terms of Pi performance and hardware specifications. It was also one of the
    quickest models, aside from the original Pi, to sell out.


    With a new 1.5GHz, 64-bit, quad-core ARM Cortex-A72 processor, and a choice of
    1GB, 2GB, or 4GB memory versions, the Pi 4 is one-step closer to becoming a true
    desktop computer. In addition, the Pi 4 was launched with the startling decision
