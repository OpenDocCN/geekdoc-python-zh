    \n## Pygame Module\n\nWe’ve had a brief look at the Pygame module already but\
    \ there’s a lot more to it that needs exploring. Pygame was developed to help\
    \ Python programmers create either graphical or text-based games.\n\n### Pygame\n\
    \nPygame isn’t an inherent module to Python but those using the Raspberry Pi will\
    \ already have it installed. Everyone else will need to use: **pip install pygame**\
    \ from the command prompt.\n\n### STEP 1\nNaturally you need to load up the Pygame\
    \ modules into memory before you’re able to utilise them. Once that’s done Pygame\
    \ requires the user to initialise it prior to any of the functions being used:\n\
    \n```\nimport pygame\npygame.init()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_99_0.png)\n\
    \n### STEP 2\nLet’s create a simple game ready window, and give it a title:\n\n\
    ```\ngamewindow=pygame.display.set_mode((800,600))\npygame.display.set_caption(\"\
    Adventure Game\")\n```\n\nYou can see that after the first line is entered, you\
    \ need to click back into the IDLE Shell to continue entering code; also, you\
    \ can change the title of the window to anything you like.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_99_1.png)\n\
    \n### STEP 3\nSadly you can’t close the newly created Pygame window without closing\
    \ the Python IDLE Shell, which isn’t very practical. For this reason, you need\
    \ to work in the editor (New > File) and create a True/False while loop:\n\n```\n\
    import pygame\nfrom pygame.locals import *\npygame.init()\n\ngamewindow=pygame.display.set_mode((800,600))\n\
    pygame.display.set_caption(\"Adventure Game\")\n\nrunning=True\n\nwhile running:\n\
    \    for event in pygame.event.get():\n        if event.type==QUIT:\n        \
    \    running=False\n            pygame.quit()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_99_2.png)\n\
    \n### STEP 4\nIf the Pygame window still won't close don't worry, it's just a\
    \ discrepancy between the IDLE (which is written with Tkinter) and the Pygame\
    \ module. If you run your code via the command line, it closes perfectly well.\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_100_0.png)\n\n### STEP 5\nYou're going\
    \ to shift the code around a bit now, running the main Pygame code within a while\
    \ loop; it makes it neater and easier to follow. We've downloaded a graphic to\
    \ use and we need to set some parameters for pygame:\n\n```\nimport pygame\npygame.init()\n\
    \nrunning=True\n\nwhile running:\n    gamewindow=pygame.display.set_mode((800,600))\n\
    \    pygame.display.set_caption(\"Adventure Game\")\n    black=(0,0,0)\n    white=(255,255,255)\n\
    \    img=pygame.image.load(\"/home/pi/Downloads/sprite1.png\")\n\n    def sprite(x,y):\n\
    \        gamewindow.blit(img, (x,y))\n\n    x=(800*0.45)\n    y=(600*0.8)\n\n\
    \    gamewindow.fill(white)\n    sprite(x,y)\n    pygame.display.update()\n\n\
    \    for event in pygame.event.get():\n        if event.type==pygame.QUIT:\n \
    \           running=False\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_100_1.png)\n\
    \n### STEP 6\nLet's quickly go through the code changes. We've defined two colours,\
    \ black and white together with their respective RGB colour values. Next we've\
    \ loaded the downloaded image called sprite1.png and allocated it to the variable\
    \ img; and also defined a sprite function and the Blit function will allow us\
    \ to eventually move the image.\n\n```\nimport pygame\nfrom pygame.locals import\
    \ *\npygame.init()\n\nrunning=True\n\nwhile running:\n    gamewindow=pygame.display.set_mode((800,600))\n\
    \    pygame.display.set_caption(\"Adventure Game\")\n    black=(0,0,0)\n    white=(255,255,255)\n\
    \    img=pygame.image.load(\"/home/pi/Downloads/sprite1.png\")\n\n    def sprite(x,y):\n\
    \        gamewindow.blit(img, (x,y))\n\n    x=(800*0.45)\n    y=(600*0.8)\n\n\
    \    gamewindow.fill(white)\n    sprite(x,y)\n    pygame.display.update()\n\n\
    \    for event in pygame.event.get():\n        if event.type==QUIT:\n        \
    \    running=False\n            pygame.quit()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_100_2.png)\n\
    \n## Using Modules\n\n### STEP 7\nNow we can change the code around again, this\
    \ time containing a movement option within the while loop, and adding the variables\
    \ needed to move the sprite around the screen:\n\n```\nimport pygame\nfrom pygame.locals\
    \ import *\npygame.init()\n\nrunning=True\n\ngamewindow=pygame.display.set_mode((800,600))\n\
    pygame.display.set_caption(\"Adventure Game\")\nblack=(0,0,0)\nwhite=(255,255,255)\n\
    img=pygame.image.load(\"/home/pi/Downloads/sprite1.png\")\n\ndef sprite(x,y):\n\
    \    gamewindow.blit(img, (x,y))\n\nx=(800*0.45)\ny=(600*0.8)\nxchange=0\nimgspeed=0\n\
    \nwhile running:\n    for event in pygame.event.get():\n        if event.type==QUIT:\n\
    \            running=False\n\n        if event.type == pygame.KEYDOWN:\n     \
    \       if event.key==pygame.K_LEFT:\n                xchange=-5\n           \
    \ elif event.key==pygame.K_RIGHT:\n                xchange=5\n        if event.type==pygame.KEYUP:\n\
    \            if event.key==pygame.K_LEFT or event.key==pygame.K_RIGHT:\n     \
    \           xchange=0\n\n    x += xchange\n\n    gamewindow.fill(white)\n    sprite(x,y)\n\
    \    pygame.display.update()\n\npygame.quit()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_101_0.png)\n\
    \n### STEP 8\nCopy the code down and using the left and right arrow keys on the\
    \ keyboard you can move your sprite across the bottom of the screen. Now, it looks\
    \ like you have the makings of a classic arcade 2D scroller in the works.\n\n\
    ![](img/2a94c98fce5df994fcecd950a995b8c9_101_1.png)"
