    # Working with Variables


    STEP 5 However, you can''t combine both strings and integer type variables in
    the same command, as you would a set of similar variables. You need to either
    turn one into the other or vice versa. When you do try to combine both, you get
    an error message:


    ```

    print (name + age)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_0.png)


    STEP 8 This presents a bit of a problem when you want to work with a number that''s
    been inputted by the user, as age + 10 won''t work due to being a string variable
    and an integer. Instead, you need to enter:


    ```

    int(age) + 10

    ```


    This will TypeCast the age string into an integer that can be worked with.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_1.png)


    STEP 6 This is a process known as TypeCasting. The Python code is:


    ```

    print (character + " is " + str(age) + " years old.")

    ```


    or you can use:


    ```

    print (character, "is", age, "years old.")

    ```


    Notice again that in the last example, you don''t need the spaces between the
    words in quotes as the commas treat each argument to print separately.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_2.png)


    STEP 9 The use of TypeCasting is also important when dealing with floating point
    arithmetic; remember: numbers that have a decimal point in them. For example,
    enter:


    ```

    shirt=19.99

    ```


    Now enter type(shirt) and you''ll see that Python has allocated the number as
    a ''float'', because the value contains a decimal point.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_3.png)


    STEP 7 Another example of TypeCasting is when you ask for input from the user,
    such as a name. for example, enter:


    ```

    age= input ("How old are you? ")

    ```


    All data stored from the Input command is stored as a string variable.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_4.png)


    STEP 10 When combining integers and floats Python usually converts the integer
    to a float, but should the reverse ever be applied it''s worth remembering that
    Python doesn''t return the exact value. When converting a float to an integer,
    Python will always round down to the nearest integer, called truncating; in our
    case instead of 19.99 it becomes 19.


