    \  - 打印一个字符串直到被中断\n\n## Python 术语表\n\n就像大多数技术一样，Python 包含许多令人困惑的词语和缩写。因此，为了您的理智，这里提供一个方便的术语表，帮助您在对话转向\
    \ Python 编程时掌握其含义。\n\n**参数 (Argument)**\nPython 用于执行更详细命令的详细额外信息。也可在命令提示符中用于指定特定的运行时事件。\n\
    \n**表达式 (Expression)**\n本质上，是产生某个值的 Python 代码。\n\n**代码块 (Block)**\n用于描述分组在一起的一个或多个代码段。\n\
    \n**浮点数 (Float)**\nPython 中使用的一种不可变的浮点数。\n\n**中断 (Break)**\n可用于退出 `for` 或 `while`\
    \ 循环的命令。例如，如果按下某个键退出程序，`Break` 将退出循环。\n\n**函数 (Function)**\nPython 中用于定义一系列语句的结构，程序员可以随时调用或引用它们。\n\
    \n**类 (Class)**\n类提供了一种将数据和功能捆绑在一起的方式。它们用于将变量和函数封装成一个单一实体。\n\n**GitHub**\n一个基于\
    \ Web 的版本控制和协作门户，专为软件开发人员设计，以便更好地管理源代码。\n\n**注释 (Comments)**\n注释是程序员插入的真实世界文字部分，用于帮助记录代码中发生的事情。它们可以是单行或多行，由\
    \ `#` 或 `\"\"\"` 定义。\n\n**全局变量 (Global Variable)**\n在程序中任何地方都可使用的变量。\n\n**Debian**\n\
    一种基于 Linux 的发行版，构成了 Debian 项目。该环境为用户提供了一个友好的图形用户界面 (GUI) 进行交互，同时也支持终端命令和其他形式的系统级管理。\n\
    \n**图形界面 (Graphics)**\n指与程序、游戏或操作系统进行视觉交互的使用方式。旨在让用户更容易地管理相关程序。\n\n**Def**\n用于在\
    \ Python 中定义函数或方法。\n\n**GUI (Graphical User Interface)**\n图形用户界面。大多数现代操作系统使用的界面，使用户能够与系统的核心程序进行交互。一个友好、易于使用的图形桌面环境。\n\
    \n**字典 (Dictionaries)**\nPython 中的字典是一种由键和值对组成的数据结构。\n\n**高级语言 (High-Level Language)**\n\
    一种设计为易于人类阅读的编程语言。\n\n**发行版 (Distro)**\n也称 Distribution，是一种使用 Linux 内核作为其核心的操作系统，但在呈现给终端用户方面有所不同。\n\
    \n**IDLE**\n代表 Integrated Development Environment（集成开发环境）或 Integrated Development\
    \ and Learning Environment（集成开发与学习环境）。\n\n**编辑器 (Editor)**\n一个独立的程序，或 Python 图形版本的一部分，允许用户输入准备执行的代码。\n\
    \n**不可变 (Immutable)**\n指在创建后无法更改的事物。\n\n**异常 (Exceptions)**\n用作从代码块的正常流程中中断的一种方式，以处理程序中任何潜在的错误或异常情况。\n\
    \n**导入 (Import)**\n在 Python 中用于包含模块及其附带的所有代码、函数和变量。\n\n**缩进 (Indentation)**\n\
    Python 使用缩进来分隔代码块。缩进相隔四个空格，并且通常在代码中使用冒号后自动创建。\n\n**整数 (Integer)**\n一种数字数据类型，必须是整数而非小数。\n\
    \n**Python**\n一种易于学习和使用的出色编程语言，同时功能足够强大以供享受。\n\n**交互式 Shell (Interactive Shell)**\n\
    Python Shell，在启动 Python 图形版本时显示。\n\n**随机数 (Random)**\n一个 Python 模块，它使用梅森旋转算法 (Mersenne\
    \ Twister) PRNG 实现伪随机字符生成器。\n\n**内核 (Kernel)**\n操作系统的核心，负责处理数据处理、内存分配、输入和输出，并在硬件和程序之间处理信息。\n\
    \n**范围 (Range)**\n一个函数，用于返回由传入参数定义的整数列表。\n\n**Linux**\n一种以 UNIX 为模型的开源操作系统。由芬兰学生\
    \ Linus Torvalds 于 1991 年开发。\n\n**根用户 (Root)**\n系统本身使用的最低级用户账户。Root 是总体系统管理员，可以在系统中做任何事情，去任何地方。\n\
    \n**列表 (Lists)**\n一种 Python 数据类型，包含值的集合，可以是任何类型，并且可以轻松修改。\n\n**集合 (Sets)**\n集合是无序但唯一的数据类型的集合。\n\
    \n**局部变量 (Local Variable)**\n在函数内部定义的变量，仅在该函数内部可用。\n\n**字符串 (Strings)**\n字符串可以存储可修改的字符。字符串的内容是字母数字，可以用单引号或双引号括起来。\n\
    \n**循环 (Loop)**\n一段重复自身直到满足特定条件的代码。循环可以包含整个代码，也可以只包含部分代码。\n\n**终端 (Terminal)**\n\
    也称控制台 (Console) 或 Shell。操作系统的命令行接口，即 Linux，但在 macOS 中也可用。从那里可以执行代码和浏览文件系统。\n\n\
    **模块 (Module)**\n一个包含各种函数的 Python 文件，可在另一个程序中使用，以进一步扩展代码的功能。\n\n**Tkinter**\n\
    一个旨在与图形环境交互的 Python 模块，特别是 tk-GUI（工具包图形用户界面）。\n\n**操作系统 (Operating System)**\n\
    也称 OS。在初始启动序列完成后加载到计算机中的程序。OS 管理所有其他程序、图形用户界面 (GUI)、输入和输出以及与用户的物理硬件交互。\n\n**Try**\n\
    一个 `try` 坵允许抛出异常，因此任何错误都可以根据程序员的指令被捕获和处理。\n\n**输出 (Output)**\n从程序发送到屏幕、打印机或其他外部外围设备的数据。\n\
    \n**元组 (Tuples)**\n一种不可变的 Python 数据类型，包含字母或数字的有序集合。\n\n**PIP**\nPip Installs Packages。一个包管理系统，用于安装和管理用\
    \ Python 编写的模块和其他软件。\n\n**UNIX**\n一种在 70 年代贝尔实验室研究中心设计的多任务、多用户操作系统。使用 C 语言和汇编语言编写。\n\
    \n**Print**\n用于将某些内容的输出显示到屏幕的函数。\n\n**变量 (Variables)**\n已分配计算机内存中存储位置的数据项。\n\n\
    **提示符 (Prompt)**\nPython 或命令行中用户输入命令的元素。在 Python 的交互式 shell 中，它表示为 `>>>`。\n\n\
    **X**\n也称 X11 或 X-windows。用于基于 Linux 系统的图形桌面，结合视觉增强工具来管理核心操作系统。\n\n**Pygame**\n\
    一个为编写游戏而设计的 Python 模块。它包括图形和声音库，最早于 2000 年 10 月开发。\n\n**Python 之禅 (Zen of Python)**\n\
    当您在 IDLE 中输入：`import this` 时，Python 之禅会显示。"
