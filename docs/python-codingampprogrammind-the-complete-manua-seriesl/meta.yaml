- md: "## Calendar Module\n\nSTEP 5 You can also create a program that will display\
    \ all the days, weeks and months within a given year:\n\n```python\nimport calendar\n\
    year=int(input(\"Enter the year to display: \"))\nprint(calendar.prcal(year))\n\
    ```\n\nWe’re sure you’ll agree that’s quite a handy bit of code to have to hand.\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_90_0.png)\n\nSTEP 6 Interestingly we\
    \ can also list the number of days in a month by using a simple for loop:\n\n\
    ```python\nimport calendar\ncal=calendar.TextCalendar(calendar.SUNDAY)\nfor i\
    \ in cal.itermonthdays(2019, 6):\n    print(i)\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_90_1.png)\n\
    \nSTEP 7 You can see that, at the outset, the code produced some zeros. This is\
    \ due to the starting day of the week, Sunday in this case, plus overlapping days\
    \ from the previous month. Meaning the counting of the days will start on Saturday\
    \ 1st June 2019 and will total 30, as the output correctly displays.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_90_2.png)\n\
    \nSTEP 8 You’re also able to print the individual months, or days, of the week:\n\
    \n```python\nimport calendar\nfor name in calendar.month_name:\n    print(name)\n\
    import calendar\nfor name in calendar.day_name:\n    print(name)\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_90_3.png)\n\
    \nSTEP 9 The Calendar module also allows us to write the functions in HTML, so\
    \ that you can display it on a website. Let’s start by creating a new file:\n\n\
    ```python\nimport calendar\ncal=open(\"/home/pi/Documents/cal.html\", \"w\")\n\
    c=calendar.HTMLCalendar(calendar.SUNDAY)\ncal.write(c.formatmonth(2019, 1))\n\
    cal.close()\n```\n\nThis code will create an HTML file called cal, open it with\
    \ a browser and it displays the calendar for January 2019.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_90_4.png)\n\
    \nSTEP 10 Of course, you can modify that to display a given year as a web page\
    \ calendar:\n\n```python\nimport calendar\nyear=int(input(\"Enter the year to\
    \ display as a webpage: \"))\ncal=open(\"/home/pi/Documents/cal.html\", \"w\"\
    )\ncal.write(calendar.HTMLCalendar(calendar.MONDAY).formatyear(year))\ncal.close()\n\
    ```\n\nThis code asks the user for a year and then creates the necessary webpage.\
    \ Remember to change your file destination.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_90_5.png)\n\
    \n## OS Module\n\nThe OS module allows you to interact directly with the built-in\
    \ commands found in your operating system. Commands vary depending on the OS you're\
    \ running, as some will work with Windows whereas others will work with Linux\
    \ and macOS.\n\n### INTO THE SYSTEM\n\nOne of the primary features of the OS module\
    \ is the ability to list, move, create, delete and otherwise interact with files\
    \ stored on the system, making it the perfect module for backup code.\n\nSTEP\
    \ 1 You can start the OS module with some simple functions to see how it interacts\
    \ with the operating system environment that Python is running on. If you're using\
    \ Linux or the Raspberry Pi, try this:\n\n```python\nimport os\nhome=os.getcwd()\n\
    print(home)\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_91_0.png)\n\nSTEP\
    \ 2 The returned result from printing the variable home is the current user's\
