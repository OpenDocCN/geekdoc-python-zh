    and code, in particular, Python. Raspbian, the Pi''s recommended OS, come pre-installed
    with the latest stable version of Python 3, which makes it a superb coding platform.


    # ## STARTING PYTHON


    Everything you need to begin programming with Python is available from the Raspberry
    Pi desktop. However, if you want, drop into the Terminal and update the system
    with: sudo apt-get update.


    **STEP 1** With the Raspbian desktop loaded, click on the Menu button followed
    by Programming > Python 3 (IDLE). This opens the Python 3 Shell. Windows and Mac
    users can find the Python 3 IDLE Shell from within the Windows Start button menu
    and via Finder.


    **STEP 3** For example, in the Shell enter: 2+2 After pressing Enter, the next
    line displays the answer: 4. Basically, Python has taken the ‘code’ and produced
    the relevant output.


