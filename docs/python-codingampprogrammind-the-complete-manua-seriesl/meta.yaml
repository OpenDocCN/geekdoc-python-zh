    `mythical_creatures.remove("Nessie")`


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_64_4.png)


    ### 步骤 10


    基于此，你可以创建一个程序，将某人的姓名和年龄存储为一个列表：

    `name=input("What''s your name? ")`

    `lname=list(name)`

    `age=int(input("How old are you: "))`

    `lage=[age]`

    `user = lname + lage`

    合并后的姓名和年龄列表称为 `user`，可以通过在 Shell 中输入 `user` 来调用。尝试一下，看看你能做什么。


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_64_5.png)


    ## 元组


    元组与列表非常相似。然而，列表可以被更新、删除或以某种方式更改，而元组则保持不变。这被称为不可变，它们非常适合存储固定的数据项。


    ### 不可变的元组


    拥有元组的原因取决于程序的预期用途。通常，元组是为某些特殊用途保留的，但它们也用于例如冒险游戏中存储非玩家角色名称。


    ### 步骤 1


    元组的创建方式与列表相同，但在此情况下你使用圆括号而不是方括号。例如：


    ```python

    months= ("January", "February", "March", "April",

    "May", "June")

    months

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_65_0.png)


    ### 步骤 3


    你可以将分组的元组创建为包含多组数据的列表。例如，这里有一个名为 `NPC`（非玩家角色）的元组，包含冒险游戏中角色的名称和战斗评级：


    ```python

    NPC= [("Conan", 100), ("Belit", 80), ("Valeria",

    95)]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_65_1.png)


    ### 步骤 2


    就像列表一样，命名元组中的项目可以根据其在数据范围中的位置进行索引，即：


    ```python

    months[0]

    months[5]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_65_2.png)


    ### 步骤 4


    可以通过在 Shell 中输入 `NPC` 来整体访问这些数据项；或者可以根据它们的位置 `NPC[0]` 进行索引。你还可以索引 `NPC` 列表中的单个元组：


    ```python

    NPC[0][1]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_65_3.png)


    ### 步骤 5


    值得注意的是，当引用列表中的多个元组时，索引方式与常规略有不同。你可能期望角色 Valeria 的 95 战斗评级是 `NPC[4][5]`，但事实并非如此。实际上是：`NPC[2][1]`


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_66_0.png)


    ### 步骤 6


    当然，这意味着索引遵循以下方式：

    - 0, 0

    - 0, 1

    - 1

    - 1, 0

    可以想象，当你需要处理大量元组数据时，这会变得有点混乱。


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_66_1.png)


    ### 步骤 7


    然而，元组利用了一个称为“解包”的特性，其中存储在元组中的数据项被分配给变量。首先创建一个包含两个项目（名称和战斗评级）的元组：`NPC=("Conan",
    100)`


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_66_2.png)


    ### 步骤 8


    现在将元组解包到两个对应的变量中：`(name, combat_rating)=NPC` 你现在可以通过输入 `name` 和 `combat_rating`
    来检查值。


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_66_3.png)


    ### 步骤 9


    记住，与列表一样，你也可以使用负数索引元组，负数从数据列表的末尾开始倒数。对于我们的示例，使用包含多个数据项的元组，你可以通过以下方式引用 Valeria
    角色：`NPC[2][-0]`


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_66_4.png)


    ### 步骤 10


    你可以使用 `max` 和 `min` 函数来查找由数字组成的元组中的最高值和最低值。例如：`numbers=(10.3, 23, 45.2, 109.3,
    6.1, 56.7, 99)` 数字可以是整数和浮点数。要输出最高值和最低值，请使用：`print(max(numbers))` `print(min(numbers))`


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_66_5.png)


    ## 字典


    列表非常有用，但 Python 中的字典是迄今为止处理数据项更技术性的方式。一开始可能有点难以掌握，但你很快就能将它们应用到自己的代码中。


    ### 键值对


    字典就像一个列表，但每个数据项都成对出现，这些被称为键和值。键部分必须是唯一的，可以是数字或字符串，而值可以是任何你喜欢的数据项。


    ### 步骤 1


    假设你想在 Python 中创建一个电话簿。你会创建字典名称，并在花括号中输入数据，用冒号分隔键和值 `Key:Value`。例如：


    ```

    phonebook={"Emma": 1234, "Daniel": 3456, "Hannah": 6789}

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_67_0.png)


    ### 步骤 2


    就像大多数列表、元组等一样，字符串需要用引号（单引号或双引号）括起来，而整数则可以不加引号。记住，值可以是字符串或整数，你只需要将相关的值用引号括起来：


    ```

    phonebook2={"David": "0987 654 321"}

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_67_1.png)


    ### 步骤 3


    与列表和元组一样，你可以通过给字典一个名称来检查其内容：在本例中是 `phonebook`。这将显示你输入的数据项，其方式类似于列表，你现在无疑已经熟悉了。


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_67_2.png)


    ### 步骤 4


    使用字典的好处在于，你可以输入键来索引值。使用前面步骤中的电话簿示例，你可以输入：

    `phonebook["Emma"]`

    `phonebook["Hannah"]`


