- md: "## Working with Data\n\n## Writing to Files\n\nThe ability to read external\
    \ files within Python is certainly handy but writing to a file is better still.\
    \ Using the write() function, you’re able to output the results of a program to\
    \ a file, that you can then read() back into Python.\n\n### WRITE AND CLOSE\n\n\
    The write() function is slightly more complex than read(). Along with the filename\
    \ you must also include an access mode which determines whether the file in question\
    \ is in read or write mode.\n\nSTEP 1 Start by opening IDLE and enter the following:\n\
    `t=open (\"/home/pi/Documents/text.txt\", \"w\")`\nChange the destination from\
    \ /home/pi/Documents to your own system. This code will create a text file called\
    \ text.txt in write mode using the variable 't'. If there's no file of that name\
    \ in the location, it will create one. If one already exits, it will overwrite\
    \ it, so be careful.\n\n```\n>>> t=open(\"/home/pi/Documents/text.txt\",\"w\"\
    )\n>>>\n```\n\nSTEP 2 You can now write to the text file using the write() function.\
    \ This works opposite to read(), writing lines instead of reading them. Try this:\n\
    `t.write(\"You awake in a small, square room. A single table stands to one side,\
    \ there is a locked door in front of you.\")`\nNote the 109. It’s the number of\
    \ characters you’ve entered.\n\n```\n>>> t.write(\"You awake in a small, square\
    \ room. A single table stands to one side, there is a locked door in front of\
    \ you.\")\n109\n>>>\n```\n\nSTEP 3 However, the actual text file is still blank\
    \ (you can check by opening it up). This is because you’ve written the line of\
    \ text to the file object but not committed it to the file itself. Part of the\
    \ write() function is that you need to commit the changes to the file; you can\
    \ do this by entering:\n`t.close()`\n\n```\n>>> t.close()\n>>> |\n```\n\nSTEP\
    \ 4 If you now open the text file with a text editor, you can see that the line\
    \ you created has been written to the file. This gives us the foundation for some\
    \ interesting possibilities: perhaps the creation of your own log file or even\
    \ the beginning of an adventure game.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_77_0.png)\n\
    \nSTEP 5 To expand this code, you can reopen the file using 'a', for access or\
    \ append mode. This will add any text at the end of the original line instead\
    \ of wiping the file and creating a new one. For example:\n\n```\nt=open(\"/home/pi/Documents/text.txt\"\
    ,\"a\")\nt.write(\"\\n\")\nt.write(\" You stand and survey your surroundings.\
    \ On top of the table is some meat, and a cup of water.\\n\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_78_0.png)\n\
    \nSTEP 6 You can keep extending the text line by line, ending each with a new\
    \ line (\\n). When you're done, finish the code with t.close() and open the file\
    \ in a text editor to see the results:\n\n```\nt.write(\"The door is made of solid\
    \ oak with iron strips. It's bolted from the outside, locking you in. You are\
    \ a prisoner!.\\n\")\nt.close()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_78_2.png)\n\
    \nSTEP 7 There are various types of file access to consider using the open() function.\
    \ Each depends on how the file is accessed and even the position of the cursor.\
    \ For example, r+ opens a file in read and write and places the cursor at the\
    \ start of the file.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_78_4.png)\n\n\
    STEP 8 You can pass variables to a file that you've created in Python. Perhaps\
    \ you want the value of Pi to be written to a file. You can call Pi from the Math\
    \ module, create a new file and pass the output of Pi into the new file:\n\n```\n\
    import math\nprint(\"Value of Pi is: \",math.pi)\nprint(\"\\nWriting to a file\
    \ now...\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_78_1.png)\n\nSTEP\
    \ 9 Now let's create a variable called pi and assign it the value of Pi:\npi=math.pi\n\
    You also need to create a new file in which to write Pi to:\nt=open(\"/home/pi/Documents/pi.txt\"\
    ,\"w\")\nRemember to change your file location to your own particular system setup.\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_78_3.png)\n\nSTEP 10 To finish, you\
    \ can use string formatting to call the variable and write it to the file, then\
    \ commit the changes and close the file:\nt.write(\"Value of Pi is: {}\".format(pi))\n\
    t.close()\nYou can see from the results that you're able to pass any variable\
    \ to a file.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_78_5.png)\n\n## Exceptions\n\
    \nWhen coding, you'll naturally come across some issues that are out of your control.\
    \ Let's assume you ask a user to divide two numbers and they try to divide by\
    \ zero. This will create an error and break your code.\n\n### EXCEPTIONAL OBJECTS\n\
    \nRather than stop the flow of your code, Python includes exception objects which\
    \ handle unexpected errors in the code. You can combat errors by creating conditions\
    \ where exceptions may occur.\n\nSTEP 1 You can create an exception error by simply\
    \ trying to divide a number by zero. This will report back with the ZeroDivisionError:\
    \ Division by zero message, as seen in the screenshot. The ZeroDivisionError part\
    \ is the exception class, of which there are many.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_79_0.png)\n\
    \nSTEP 2 Most exceptions are raised automatically when Python comes across something\
    \ that's inherently wrong with the code. However, you can create your own exceptions\
    \ that are designed to contain the potential error and react to it, as opposed\
    \ to letting the code fail.\n\nSTEP 3 You can use the functions raise exception\
    \ to create our own error handling code within Python. Let's assume your code\
    \ has you warping around the cosmos, too much however results in a warp core breach.\
    \ To stop the game from exiting due to the warp core going supernova, you can\
    \ create a custom exception:\n\n```\nraise Exception(\"warp core breach\")\n```\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_79_1.png)\n\nSTEP 4 To trap any errors\
    \ in the code you can encase the potential error within a try: block. This block\
    \ consists of try, except, else, where the code is held within try:, then if there's\
    \ an exception do something, else do something else.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_79_2.png)\n\
    \n```\ntry:\n    Insert your operations here ---->\nexcept Exception 1:\n    If\
    \ there is an exception do this ---->\nexcept Exception 2:\n    If there is another\
    \ exception do this ---->\nelse:\n    If there is no exception, then do this ---->\n\
    ```\n\nSTEP 5 For example, use the divide by zero error. You can create an exception\
    \ where the code can handle the error without Python quitting due to the problem:\n\
    \n```\ntry:\n    a=int(input(\"Enter the first number: \"))\n    b=int(input(\"\
    Enter the second number: \"))\n    print(a/b)\nexcept ZeroDivisionError:\n   \
    \ print(\"You have tried to divide by zero!\")\nelse:\n    print(\"You didn't\
    \ divide by zero. Well done!\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_0.png)\n\
    \nSTEP 6 You can use exceptions to handle a variety of useful tasks. Using an\
    \ example from our previous tutorials, let's assume you want to open a file and\
    \ write to it:\n\n```\ntry:\n    txt = open(\"/home/pi/Documents/textfile.txt\"\
    , \"r\")\n    txt.write(\"This is a test. Normal service will shortly resume!\"\
    )\nexcept IOError:\n    print (\"Error: unable to write the file. Check permissions\"\
    )\nelse:\n    print (\"Content written to file successfully. Have a nice day.\"\
    )\n    txt.close()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_2.png)\n\
    \nSTEP 7 Obviously this won't work due to the file textfile.txt being opened as\
    \ read only (the \"r\" part). So in this case rather than Python telling you that\
    \ you're doing something wrong, you've created an exception using the IOError\
    \ class informing the user that the permissions are incorrect.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_4.png)\n\
    \nSTEP 8 Naturally, you can quickly fix the issue by changing the \"r\" read only\
    \ instance with a \"w\" for write. This, as you already know, will create the\
    \ file and write the content then commit the changes to the file. The end result\
    \ will report a different set of circumstances, in this case, a successful execution\
    \ of the code.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_1.png)\n\nSTEP 9\
    \ You can also use a finally: block, which works in a similar fashion but you\
    \ can't use else with it. To use our example from Step 6:\n\n```\ntry:\n    txt\
    \ = open(\"/home/pi/Documents/textfile.txt\", \"r\")\n    try:\n        txt.write(\"\
    This is a test. Normal service will shortly resume!\")\n    finally:\n       \
    \ print (\"Content written to file successfully. Have a nice day.\")\n       \
    \ txt.close()\nexcept IOError:\n    print (\"Error: unable to write the file.\
    \ Check permissions\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_3.png)\n\
    \nSTEP 10 As before an error will occur as you've used the \"r\" read-only permission.\
    \ If you change it to a \"w\", then the code will execute without the error being\
    \ displayed in the IDLE Shell. Needless to say, it can be a tricky getting the\
    \ exception code right the first time. Practise though, and you will get the hang\
    \ of it.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_5.png)"
  mdcn: "## 处理数据\n\n## 写入文件\n\n在 Python 中读取外部文件的功能固然便捷，但写入文件则更进一步。通过使用 `write()` 函数，你可以将程序的输出结果保存到文件中，之后再用\
    \ `read()` 函数将内容读回 Python。\n\n### 写入与关闭\n\n`write()` 函数比 `read()` 稍微复杂一些。除了文件名，你还需要指定一个访问模式，它决定了文件是以读取还是写入模式打开。\n\
    \n步骤 1 启动 IDLE 并输入以下内容：\n`t=open (\"/home/pi/Documents/text.txt\", \"w\")`\n将目标路径\
    \ `/home/pi/Documents` 改为你自己系统中的路径。这段代码将创建一个名为 text.txt 的文本文件，并以写入模式使用变量 't'。如果该位置没有同名文件，它会创建一个；如果已经存在同名文件，它会将其覆盖，所以请小心。\n\
    \n```\n>>> t=open(\"/home/pi/Documents/text.txt\",\"w\")\n>>>\n```\n\n步骤 2 你现在可以使用\
    \ `write()` 函数向文本文件写入内容。它与 `read()` 的工作方式相反，是写入行而非读取行。试试这个：\n`t.write(\"You awake\
    \ in a small, square room. A single table stands to one side, there is a locked\
    \ door in front of you.\")`\n注意数字 109，它表示你输入的字符数。\n\n```\n>>> t.write(\"You awake\
    \ in a small, square room. A single table stands to one side, there is a locked\
    \ door in front of you.\")\n109\n>>>\n```\n\n步骤 3 然而，实际的文本文件此时仍然是空白的（你可以打开它检查一下）。这是因为你将这行文本写入了文件对象，但尚未将其提交到文件本身。`write()`\
    \ 函数的一部分要求是你需要将更改提交到文件；你可以通过输入以下命令来完成：\n`t.close()`\n\n```\n>>> t.close()\n>>>\
    \ |\n```\n\n步骤 4 如果你现在用文本编辑器打开该文本文件，你会看到你创建的那一行已经写入了文件。这为我们提供了一些有趣可能性的基础：也许是创建你自己的日志文件，甚至是一款冒险游戏的开端。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_77_0.png)\n\n步骤 5 要扩展这段代码，你可以使用 'a'，即访问或追加模式重新打开文件。这将在原始文本的末尾添加任何新文本，而不是清空文件并创建新文件。例如：\n\
    \n```\nt=open(\"/home/pi/Documents/text.txt\",\"a\")\nt.write(\"\\n\")\nt.write(\"\
    \ You stand and survey your surroundings. On top of the table is some meat, and\
    \ a cup of water.\\n\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_78_0.png)\n\
    \n步骤 6 你可以逐行扩展文本，每行以换行符（`\\n`）结束。完成后，以 `t.close()` 结束代码，并在文本编辑器中打开文件查看结果：\n\n\
    ```\nt.write(\"The door is made of solid oak with iron strips. It's bolted from\
    \ the outside, locking you in. You are a prisoner!.\\n\")\nt.close()\n```\n\n\
    ![](img/2a94c98fce5df994fcecd950a995b8c9_78_2.png)\n\n步骤 7 使用 `open()` 函数时，需要考虑多种文件访问类型。每种类型取决于文件的访问方式，甚至取决于光标的位置。例如，`r+`\
    \ 以读写模式打开文件，并将光标置于文件开头。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_78_4.png)\n\
    \n步骤 8 你可以将在 Python 中创建的变量传递给文件。也许你想将圆周率 Pi 的值写入文件。你可以从 math 模块调用 Pi，创建一个新文件，然后将\
    \ Pi 的输出传递到新文件中：\n\n```\nimport math\nprint(\"Value of Pi is: \",math.pi)\nprint(\"\
    \\nWriting to a file now...\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_78_1.png)\n\
    \n步骤 9 现在让我们创建一个名为 pi 的变量并将其赋值为 Pi 的值：\npi=math.pi\n你还需要创建一个新文件以便写入 Pi：\nt=open(\"\
    /home/pi/Documents/pi.txt\",\"w\")\n记得将文件路径改为你自己系统的具体设置。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_78_3.png)\n\
    \n步骤 10 最后，你可以使用字符串格式化来调用变量并将其写入文件，然后提交更改并关闭文件：\nt.write(\"Value of Pi is: {}\"\
    .format(pi))\nt.close()\n从结果中你可以看到，能够将任何变量传递到文件中。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_78_5.png)\n\
    \n## 异常\n\n编写代码时，你自然会遇到一些无法控制的问题。假设你要求用户输入两个数字进行除法运算，而他们试图除以零。这将导致错误并中断你的代码。\n\
    \n### 异常对象\n\nPython 并不会让代码流程因错误而停止，而是包含了异常对象来处理代码中的意外错误。你可以通过创建可能发生异常的条件来应对错误。\n\
    \n步骤 1 你可以通过简单地尝试将一个数字除以零来创建一个异常错误。如屏幕截图所示，系统会报告 \"ZeroDivisionError: Division\
    \ by zero\" 消息。ZeroDivisionError 部分是异常类，这样的类有很多。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_79_0.png)\n\
    \n步骤 2 大多数异常是在 Python 遇到代码中固有的错误时自动抛出的。然而，你可以创建自己的异常，旨在包含潜在错误并做出反应，而不是让代码直接失败。\n\
    \n步骤 3 你可以使用 `raise exception` 函数在 Python 内部创建我们自己的错误处理代码。假设你的代码让你在宇宙中跃迁，然而过度跃迁会导致曲速核心破裂。为了防止游戏因曲速核心发生超新星爆发而退出，你可以创建一个自定义异常：\n\
    \n```\nraise Exception(\"warp core breach\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_79_1.png)\n\
    \n步骤 4 为了捕获代码中的任何错误，你可以将潜在的错误包裹在一个 `try:` 代码块中。这个代码块由 `try`、`except`、`else` 组成，代码放在\
    \ `try:` 内，然后如果有异常则执行某些操作，否则执行其他操作。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_79_2.png)\n\
    \n```\ntry:\n    在此处插入你的操作 ---->\nexcept Exception 1:\n    如果出现异常，则执行此操作 ---->\n\
    except Exception 2:\n    如果出现另一个异常，则执行此操作 ---->\nelse:\n    如果没有异常，则执行此操作 ---->\n\
    ```\n\n步骤 5 例如，使用除以零的错误。你可以创建一个异常，让代码能够处理错误，而不会导致 Python 因问题退出：\n\n```\ntry:\n\
    \    a=int(input(\"Enter the first number: \"))\n    b=int(input(\"Enter the second\
    \ number: \"))\n    print(a/b)\nexcept ZeroDivisionError:\n    print(\"You have\
    \ tried to divide by zero!\")\nelse:\n    print(\"You didn't divide by zero. Well\
    \ done!\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_0.png)\n\n步骤 6\
    \ 你可以使用异常来处理各种有用的任务。以我们之前教程中的一个例子为例，假设你想打开一个文件并写入内容：\n\n```\ntry:\n    txt = open(\"\
    /home/pi/Documents/textfile.txt\", \"r\")\n    txt.write(\"This is a test. Normal\
    \ service will shortly resume!\")\nexcept IOError:\n    print (\"Error: unable\
    \ to write the file. Check permissions\")\nelse:\n    print (\"Content written\
    \ to file successfully. Have a nice day.\")\n    txt.close()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_2.png)\n\
    \n步骤 7 显然这不会起作用，因为文件 textfile.txt 是以只读模式（\"r\" 部分）打开的。所以，在这种情况下，不是 Python 告诉你做错了什么，而是你使用\
    \ IOError 类创建了一个异常，通知用户权限不正确。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_4.png)\n\
    \n步骤 8 自然地，你可以通过将 \"r\" 只读实例更改为 \"w\" 来快速修复问题。正如你已经知道的，这将创建文件、写入内容，然后将更改提交到文件。最终结果将报告一组不同的情况，在本例中，是代码的成功执行。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_80_1.png)\n\n步骤 9 你也可以使用 `finally:`\
    \ 代码块，它的工作方式类似，但不能与 `else` 一起使用。以我们步骤 6 中的示例为例：\n\n```\ntry:\n    txt = open(\"\
    /home/pi/Documents/textfile.txt\", \"r\")\n    try:\n        txt.write(\"This\
    \ is a test. Normal service will shortly resume!\")\n    finally:\n        print\
    \ (\"Content written to file successfully. Have a nice day.\")\n        txt.close()\n\
    except IOError:\n    print (\"Error: unable to write the file. Check permissions\"\
    )\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_3.png)\n\n步骤 10 如前所述，由于你使用了\
    \ \"r\" 只读权限，错误仍然会发生。如果你将其改为 \"w\"，那么代码将执行，而不会在 IDLE Shell 中显示错误。不用说，第一次正确编写异常代码可能有些棘手。但通过练习，你会掌握它的。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_80_5.png)"
