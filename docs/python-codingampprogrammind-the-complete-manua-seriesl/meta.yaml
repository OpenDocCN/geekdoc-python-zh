    # Creating and Deleting Files


    Being able to create and delete a file is an everyday computing skill. However,
    when using the Linux Terminal, there’s an element of care required, chiefly because
    any deleted files aren’t placed in the system recycle bin.


    # CREATING FILES


    Once you learn to recognise the files and directories that make up Raspbian OS,
    it’s time to discover how to make your own. Knowing how to make, edit and delete
    files and directories is essential if you want to make your own projects.


    **STEP 1** We’re going to create a file using a command called Touch. Touch is
    an interesting command that reaches out to a file, or directory, and updates it
    (this changes the system time as if you’d just opened the file). You can see Touch
    in access using “ls –l” and checking the time next to a directory (such as Scratch).


    **STEP 3** If you try to touch a file that doesn’t exist, you create a blank file
    with that name. Try it now. Type `touch testfile` and `ls -l` to view the files.
    You’ll now have a new file in your home directory called “testfile”. Notice that
    the size of the file is 0, because it has nothing in it.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi     0 May 13 11:10 testfile

    pi@raspberrypi ~ $ _

    ```


    **STEP 2** Now enter: `touch Scratch` and `ls -l` again and notice that the time
    has changed. It now matches the current time. You might be wondering what this
    has to do with creating files or directories. Touch has a second, more popular,
    use, which is to create files.


    **STEP 4** A quick word about file names: remember that Linux is case sensitive,
    so if you now enter: `touch Testfile` (with a capital T), it doesn’t update ‘testfile’;
    instead, it creates a second file called ‘Testfile’. Enter: `ls -l` to see both
    files. This is confusing, so most people stick with using lowercase letters at
