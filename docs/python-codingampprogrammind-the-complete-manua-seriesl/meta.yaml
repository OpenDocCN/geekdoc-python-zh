    另一个改进领域是代码本身。目前计算只执行一次，你可以将其封装在一个 `while` 循环中，这样一旦给出结果，用户就会被送回主菜单。也许，改进“无效输入”部分也值得考虑。\n\
    \n## 猜词游戏脚本\n\n猜词游戏非常适合用 Python 编程实现。它可以极其复杂，显示图形、剩余猜测次数、庞大的随机词库以及无数其他元素。它也可以相当简单。这里我们结合了两者。\n\
