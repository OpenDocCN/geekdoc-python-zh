    \ like in these situations. Expanding on the code, try this:\n\n```python\nprint(\"\
    Halt! Who goes there?\")\nname=input()\n```\n\n### STEP 7\n\nIt's a good start\
    \ to a text adventure game, perhaps? Now you can expand on it and use the raw\
