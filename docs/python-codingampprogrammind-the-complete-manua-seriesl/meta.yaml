  md: "# Pygame Module\n\nSTEP 4 If the Pygame window still won't close don't worry,\
    \ it's just a discrepancy between the IDLE (which is written with Tkinter) and\
    \ the Pygame module. If you run your code via the command line, it closes perfectly\
    \ well.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_100_0.png)\n\nSTEP 5 You're\
    \ going to shift the code around a bit now, running the main Pygame code within\
    \ a while loop; it makes it neater and easier to follow. We've downloaded a graphic\
    \ to use and we need to set some parameters for pygame:\n\n```\nimport pygame\n\
    pygame.init()\n\nrunning=True\n\nwhile running:\n    gamewindow=pygame.display.set_mode((800,600))\n\
    \    pygame.display.set_caption(\"Adventure Game\")\n    black=(0,0,0)\n    white=(255,255,255)\n\
    \    img=pygame.image.load(\"/home/pi/Downloads/sprite1.png\")\n\n    def sprite(x,y):\n\
    \        gamewindow.blit(img, (x,y))\n\n    x=(800*0.45)\n    y=(600*0.8)\n\n\
    \    gamewindow.fill(white)\n    sprite(x,y)\n    pygame.display.update()\n\n\
    \    for event in pygame.event.get():\n        if event.type==pygame.QUIT:\n \
    \           running=False\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_100_1.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_100_2.png)\n\nSTEP 6 Let's quickly\
    \ go through the code changes. We've defined two colours, black and white together\
    \ with their respective RGB colour values. Next we've loaded the downloaded image\
    \ called sprite1.png and allocated it to the variable img; and also defined a\
    \ sprite function and the Blit function will allow us to eventually move the image.\n\
    \n```\nimport pygame\nfrom pygame.locals import *\npygame.init()\n\nrunning=True\n\
    \nwhile running:\n    gamewindow=pygame.display.set_mode((800,600))\n    pygame.display.set_caption(\"\
    Adventure Game\")\n    black=(0,0,0)\n    white=(255,255,255)\n    img=pygame.image.load(\"\
    /home/pi/Downloads/sprite1.png\")\n\n    def sprite(x,y):\n        gamewindow.blit(img,\
    \ (x,y))\n\n    x=(800*0.45)\n    y=(600*0.8)\n\n    gamewindow.fill(white)\n\
    \    sprite(x,y)\n    pygame.display.update()\n\n    for event in pygame.event.get():\n\
    \        if event.type==QUIT:\n            running=False\n            pygame.quit()\n\
    ```"
