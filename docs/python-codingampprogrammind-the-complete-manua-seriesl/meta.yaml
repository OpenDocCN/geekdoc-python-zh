  md: "# Using the Man Pages\n\nLinux comes with man (manual) pages that explain each\
    \ command and show you all the options you can use. Once you get the hang of reading\
    \ the man pages, you'll be able to find and do just about anything in Linux.\n\
    \n# HEY, MAN!\n\nThe man pages are one of the best features of Linux, and as a\
    \ built-in tool it's invaluable for both beginner and senior level Linux administrators.\
    \ Let's see how it works.\n\nSTEP 1 Linux has a built-in manual, known as man\
    \ for short. Using the man command you can obtain information on all the Linux\
    \ commands we've talked about. Simply enter: man and the name of the command you\
    \ want to learn more about. Start by entering: man ls in the command line.\n\n\
    STEP 3 Most commands are pretty easy to figure out how to use, so what you spend\
    \ most of the time in the man pages is looking under the Description. Here you\
    \ will see all the options and the letters used to activate them. Most man pages\
    \ are longer than a single page, so press any key, such as the space bar, to move\
    \ to the next page of content.\n\n```\npi@raspberrypi ~ $ man ls\n```\n\n```\n\
    -g like -l, but do not list owner\n--group-directories-first\n    group directories\
    \ before files.\n    augment with a --sort option, but any use of --sort=none\
    \ (-U) disables grouping\n-G, --no-group\n    in a long listing, don't print group\
    \ names\n-h, --human-readable\n    with -l, print sizes in human readable format\
    \ (e.g., 1K 234M 2G)\n--si likewise, but use powers of 1000 not 1024\n-H, --dereference-command-line\n\
    \    follow symbolic links listed on the command line\n--dereference-command-line-symlink-to-dir\n\
    \    follow each command line symbolic link that points to a directory\n--hide=PATTERN\n\
    \    do not list implied entries matching shell PATTERN (overridden by -a or -A)\n\
    --indicator-style=WORD\n    append indicator with style WORD to entry names: none\
    \ (default), slash (-p), file-type (--file-type)\n-i, --inode\n    print the index\
    \ number of each file\n-I, --ignore=PATTERN\n    do not list implied entries matching\
    \ shell PATTERN\n```\n\nSTEP 2 The man pages are a bit more detailed than you\
    \ might be used to. First you have a name, which tells you what the command is\
    \ called; in this case \"list directory contents\" and then the synopsis shows\
    \ you how it works. In this case: \"ls [OPTION].. [FILE..]\". So you enter: ls\
    \ followed by options (such as -la) and the file or directory to list.\n\n```\n\
    LS(1)                     User Commands                     LS(1)\n\nNAME\n  \
    \     ls - list directory contents\n\nSYNOPSIS\n       ls [OPTION]... [FILE]...\n\
    \nDESCRIPTION\n       List information about the FILEs (the current directory\
    \ by default).  Sort entries alphabetically.\n\n       Mandatory arguments to\
    \ long options are mandatory for short options too.\n\n       -a, --all\n    \
    \          do not ignore entries starting with .\n\n       -A, --almost-all\n\
    \              do not list implied . and ..\n\n       --author\n             \
    \ with -l, print the author of each file\n\n       -b, --escape\n            \
    \  print C-style escapes for nongraphic characters\n\n       --block-size=SIZE\n\
    \              scale sizes by SIZE before printing them.  E.g., `--block-size=M'\
    \ prints sizes in units of\n              1,048,576 bytes.  See SIZE format below.\n\
    \n       -B, --ignore-backups\n              do not list implied entries ending\
    \ with ~\n\n       -c     with -lt: sort by, and show, ctime (time of last modification\
    \ of file status information)\n              with -l: show ctime and sort by name\
    \ otherwise: sort by ctime, newest first\n\n       -C     list entries by columns\n\
    \n       --color[=WHEN]\n              colorize the output.  WHEN defaults to\
    \ `always' or can be `never' or `auto'.  More info\n              below.\n\n \
    \      -d, --directory\n              list directory entries instead of contents,\
    \ and do not dereference symbolic links\n\n       -D, --dired\n              generate\
    \ output designed for Emacs' dired mode\n\n       -f     do not sort, enable -aU,\
    \ disable -ls --color\n\n       -F, --classify\n              append indicator\
    \ (one of */=>@|) to entries\n\n       --file-type\n              likewise, except\
    \ do not append `*'\n\n       --format=WORD\n              across -x, commas -m,\
    \ horizontal -x, long -l, single-column -1, verbose -l, vertical -C\n\n      \
    \ --full-time\n              like -l --time-style=full-iso\n\nManual page ls(1)\
    \ line 1 (press h for help or q to quit)\n```\n\nSTEP 4 Press the H key while\
    \ looking at a man page to view the commands you can use to control the view.\
    \ This is called the Summary of Less Commands (the less command is something we'll\
    \ come to when we look at editing text). For now realise that you can move back\
    \ and forward with Z and W. Press Q to quit this help screen and return to the\
    \ man page.\n\n```\nSUMMARY OF LESS COMMANDS\n\nCommands marked with * may be\
    \ preceded by a number, N.\nNotes in parentheses indicate the behavior if N is\
    \ given.\n\nh H                 Display this help.\nq :q Q :Q ZZ       Exit.\n\
    \n                           MOVING\n\ne ^E j ^N CR *     Forward one line  (or\
    \ N lines).\ny ^Y k ^K ^P *     Backward one line  (or N lines).\nf ^F ^V SPACE\
    \ *    Forward one window (or N lines).\nb ^B ESC-v *       Backward one window\
    \ (or N lines).\nz                  * Forward one window (and set window to N).\n\
    w                  * Backward one window (and set window to N).\nESC-SPACE * \
    \       Forward one window, but don't stop at end-of-file.\nd ^D *           \
    \  Forward one half-window (and set half-window to N).\nu ^U *             Backward\
    \ one half-window (and set half-window to N).\nESC-) RightArrow * Left one half\
    \ screen width (or N positions).\nESC-( LeftArrow *  Right one half screen width\
    \ (or N positions).\nF                  Forward forever; like \"tail -f\".\nr\
    \ ^R ^L            Repaint screen.\nR                  Repaint screen, discarding\
    \ buffered input.\n\n    Default \"window\" is the screen height.\n    Default\
    \ \"half-window\" is half of the screen height.\n\n                          \
    \ SEARCHING\n\n/pattern          * Search forward for (N-th) matching line.\n\
    ?pattern          * Search backward for (N-th) matching line.\n```"
