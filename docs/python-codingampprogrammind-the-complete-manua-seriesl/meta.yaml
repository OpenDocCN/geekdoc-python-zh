    # Calendar Module


    Beyond the Time module, the Calendar module can produce some interesting results
    when executed within your code. It does far more than simply display the date
    in the Time module-like format, you can actually call up a wall calendar type
    display.


    # WORKING WITH DATES


    The Calendar module is built into Python 3. However, if for some reason it''s
    not installed you can add it using `pip install calendar` as a Windows administrator,
    or `sudo pip install calendar` for Linux and macOS.


    **STEP 1** Launch Python 3 and enter: `import calendar` to call up the module
    and its inherent functions. Once it''s loaded into memory, start by entering:


    `sep=calendar.TextCalendar(calendar.SUNDAY)`

    `sep.prmonth(2019, 9)`


    **STEP 3** There are numerous functions within the Calendar module that may be
    of interest to you when forming your own code. For example, you can display the
    number of leap years between two specific years:


    `leaps=calendar.leapdays(1900, 2019)`

    `print(leaps)`


    The result is 29, starting from 1904 onward.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_89_0.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_89_1.png)


    **STEP 2** You can see that the days of September 2019 are displayed in a wall
    calendar fashion. Naturally you can change the 2019, 9 part of the second line
    to any year and month you want, a birthday for example (1973, 6). The first line
    configures TextCalendar to start its weeks on a Sunday; you can opt for Monday
    if you prefer.


    **STEP 4** You could even fashion that particular example into a piece of working,
    user interactive Python code:


    `import calendar`

    `print(">>>>>>>>>>Leap Year Calculator<<<<<<<<<<\n")`

    `y1=int(input("Enter the first year: "))`

    `y2=int(input("Enter the second year: "))`

    `leaps=calendar.leapdays(y1, y2)`

    `print("Number of leap years between", y1, "and", y2, "is:", leaps)`


    ![](img/2a94c98fce5df994fcecd950a995b8c9_89_2.png)


