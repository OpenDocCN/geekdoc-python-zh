    # Using Comments


    When writing your code, the flow, what each variable does, how the overall program
    will operate and so on is all inside your head. Another programmer could follow
    the code line by line but over time, it can become difficult to read.


    # #COMMENTS!


    Programmers use a method of keeping their code readable by commenting on certain
    sections. If a variable is used, the programmer comments on what it''s supposed
    to do, for example. It''s just good practise.


    **STEP 1** Start by creating a new instance of the IDLE Editor (File > New File)
    and create a simple variable and print command:


    ```

    a=10

    print("The value of A is,", a)

    ```


    Save the file and execute the code.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_43_0.png)


    **STEP 2** Running the code will return the line: The value of A is, 10 into the
    IDLE Shell window, which is what we expected. Now, add some of the types of comments
    you''d normally see within code:


    ```

    # Set the start value of A to 10

    a=10

    # Print the current value of A

    print("The value of A is,", a)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_43_1.png)


    **STEP 3** Resave the code and execute it. You can see that the output in the
    IDLE Shell is still the same as before, despite the extra lines being added. Simply
    put, the hash symbol (#) denotes a line of text the programmer can insert to inform
    them, and others, of what''s going on without the user being aware.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_43_2.png)


    **STEP 4** Let''s assume that the variable A that we''ve created is the number
    of lives in a game. Every time the player dies, the value is decreased by 1. The
    programmer could insert a routine along the lines of:


    ```

    a=a-1

    print("You''ve just lost a life!")

    print("You now have", a, "lives left!")

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_43_3.png)'
