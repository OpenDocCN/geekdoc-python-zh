    phonebook["David"] = "0987 654 321"

    phonebook

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_68_0.png)


    # ### STEP 8


    Next, you need to define the user inputs and variables: one for the person''s
    name, the other for their phone number (let''s keep it simple to avoid lengthy
    Python code):


    ```

    python

    name=input("Enter name: ")

    number=int(input("Enter phone number: "))

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_68_1.png)


    # ### STEP 6


    You can also remove items from a dictionary by issuing the del command followed
    by the item''s key; the value will be removed as well, since both work as a pair
    of data items:


    ```

