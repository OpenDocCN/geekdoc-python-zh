  md: "# Combining What You Know So Far\n\nBased on what you've looked at over this\
    \ section, let's combine it all and come up with a piece of code that can easily\
    \ be applied into a real-world situation; or at the very least, something which\
    \ you can incorporate into your programs.\n\n# LOGGING IN\n\nFor this example,\
    \ let's look to a piece of code that creates user logins and then allows them\
    \ to log into the system and write the time they logged in at. You can even include\
    \ an option to quit the program by pressing 'q'.\n\nSTEP 1 Begin by importing\
    \ the Time module, creating a new dictionary to handle the usernames and passwords\
    \ and creating a variable to evaluate the current status of the program:\n\n```\n\
    import time\nusers = {}\nstatus = \"\"\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_83_0.png)\n\
    \nSTEP 3 The global status statement separates a local variable from one that\
    \ can be called throughout the code, this way you can use the q=quit element without\
    \ it being changed inside the function. We've also referenced some newly defined\
    \ functions: oldUser and newUser which we'll get to next.\n\n```\ndef mainMenu():\n\
    \    global status\n    status = input(\"Do you have a login account? y/n? Or\
    \ press q to quit.\")\n    if status == \"y\":\n        oldUser()\n    elif status\
    \ == \"n\":\n        newUser()\n    elif status == \"q\":\n        quit()\n```\n\
    \nSTEP 2 Next you need to define some functions. You can begin by creating the\
    \ main menu, where all users will return to after selecting the available options:\n\
    \n```\ndef mainMenu():\n    global status\n    status = input(\"Do you have a\
    \ login account? y/n? Or press q to quit.\")\n    if status == \"y\":\n      \
    \  oldUser()\n    elif status == \"n\":\n        newUser()\n    elif status ==\
    \ \"q\":\n        quit()\n```\n\nSTEP 4 The newUser function is next:\n\n```\n\
    def newUser():\n    createLogin = input(\"Create a login name: \")\n    if createLogin\
    \ in users:\n        print (\"\\nLogin name already exists!\\n\")\n    else:\n\
    \        createPassw = input(\"Create password: \")\n        users[createLogin]\
    \ = createPassw\n        print(\"\\nUser created!\\n\")\n        logins=open(\"\
    /home/pi/Documents/logins.txt\", \"a\")\n        logins.write(\"\\n\" + createLogin\
    \ + \" \" + createPassw)\n        logins.close()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_83_1.png)\n\
    \nThis creates a new user and password, and writes the entries into a file called\
    \ logins.txt.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_83_2.png)"
