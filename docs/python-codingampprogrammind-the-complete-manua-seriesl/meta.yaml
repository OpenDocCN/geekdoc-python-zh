    \ in many schools, that can be programmed to draw something on a large piece of\
    \ paper on the floor. The Turtle module can be imported with: `import turtle`.\n\
    \n**STEP 3** The command `turtle.circle(50)` is what draws the circle on the screen,\
    \ with 50 being the size. You can play around with the sizes if you like, going\
