    # Using the Filesystem


    To master Linux, it’s important to understand how the filesystem works. What’s
    more, it’s also important to become familiar with the Terminal, or shell. This
    command line environment may appear daunting at first, but with practise, it soon
    becomes easy to use.


    # GETTING AROUND


    To drop into the Terminal, click on the fourth icon from the left along the top
    of the Raspberry Pi desktop, the one with a right-facing arrow and an underscore.
    This is the shell, or Terminal.


    STEP 1 First, you’re going to look at directories and the directory path. A directory
    is the same thing as a folder, however in Linux it’s always called a directory.
    These are placed inside each other using a “/” character. So when you see /home/pi
    it means the pi directory is inside the home directory. Enter: clear and press
    return to clean the screen. Now enter: pwd. This stands for Print Working Directory
    and displays /home/pi.


    STEP 3 Enter: ls to view the contents of the current directory. You should see
    Desktop, Documents, and Downloads and Scratch in Blue. You may also see other
    items depending on how much you have used your Raspberry Pi. The colour code is
    worth knowing: directories are blue while most files are white. As you go on you’ll
    see other colours: executable files (programs) are bright green, archived files
    are red and so on. Blue and white are the two you need to know to get started.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_139_0.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_139_1.png)


    STEP 2 When you log in to your Raspberry Pi, you don’t start at the base of the
    hard drive, known as the ‘root’ (also known as the topmost directory). Instead
    you begin inside your user directory, which is named ‘pi’ by default and is itself
    in a directory called ‘home’. Directories are indicated by the ‘/’ symbol. So,
    “/home/pi” tells you that in the root is a directory called home, and the next
    “/” says that inside “home” is a directory called “pi”. That’s where you start.


    STEP 4 Now you’re going to move from the pi directory into the Documents directory.
    Enter: cd Documents. Note the capital “D”. Linux is case sensitive, which means
    you have to enter the exact name including correct capitalisation. The cd command
    stands for change directory. Now enter: pwd again to view the directory path.
    It will display /home/pi/ Documents. Enter: ls to view the files inside the Documents
    directory.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_139_2.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_139_3.png)'
- md: '## ABSOLUTE VS RELATIVE PATHS


    It is important to know the difference between the working directory, root directory
    and home. There are also two types of path: Absolute and Relative. These are easier
    to understand than they sound. Let''s take a look...


    **STEP 1**

    By default, commands like "ls" use the working directory. This is the current
    directory that you''re looking at and is set to your home directory by default
    (/users/pi). Using "pwd" (Print Working Directory) lets you know what the working
    directory is, and using "cd" changes the working directory.


    ```

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    **STEP 2**

    The root directory is always ''/''. Entering: `ls /` lists the contents of root,
    and entering: `cd /` switches to the root directory. This is important because
    there is a difference between "ls Documents/Pictures" and "ls /Documents/Pictures".
    The first command lists the contents of the Pictures directory in Documents inside
    the working directory (which, if you are in the home directory, will work).


    ```

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $ ls Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png

    pi@raspberrypi:~ $

    ```


    **STEP 3**

    The second command ("ls /Documents/Pictures") attempts to list the content of
    Pictures in a directory called Documents inside the root directory (because the
    path started with ''/'', which is root). There is typically no Documents directory
    in root, so you will get a "No such file or directory" error. Starting a path
    with ''/'' is known as an "absolute path", while starting without the ''/'' is
    known as a "relative path" because it is relative to your working directory.


    ```

    pi@raspberrypi ~ $ ls /

    bin  boot  dev  etc  home  lib  lost+found  media  mnt  opt  proc

    pi@raspberrypi ~ $ ls /Documents/Pictures

    ls: cannot access /Documents/Pictures: No such file or directory

    pi@raspberrypi ~ $

    ```


    **STEP 4**

    There is also an absolute path shortcut to your user directory, and that is the
    tilde "~" character. Entering: `ls ~` always lists the contents of your home directory,
    while "cd ~" moves straight to your home directory, no matter what your working
    directory is. You can also use this shortcut wherever you are: enter: `ls ~/Documents/Pictures`
    to display the contents of the Pictures.


    ```

    pi@raspberrypi:~ $ cd ~

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $ ls ~/Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png

    pi@raspberrypi:~ $

    ```


    **STEP 5**

    How do you get back up to the pi directory? By using a command `cd ..`. In Linux
    two dots means the directory above, also known as the parent directory. Incidentally,
    a single dot "." is used for the same directory. You never use `cd .` to switch
    to the same directory but it''s worth knowing because some commands need you to
    specify the current directory.


    ```

    pi@raspberrypi ~/Documents $ pwd

    /home/pi/Documents

    pi@raspberrypi ~/Documents $ cd ..

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    **STEP 6**

    The "ls" and "cd" commands can also be used with more complex paths. Enter: `ls
    Documents/Pictures` to view the contents of a Pictures directory inside your Documents
    directory. You can switch to this directory using `cd Documents/Pictures`; use
    `cd ../..` to move back up two parent directories.


    ```

    pi@raspberrypi ~ $ ls Documents/Pictures

    LEGO  LucyHattersley.jpg  raspberry_pi_2_photographs

    pi@raspberrypi ~ $ cd Documents/Pictures

    pi@raspberrypi ~/Documents/Pictures $ pwd

    /home/pi/Documents/Pictures

    pi@raspberrypi ~/Documents/Pictures $ cd ../..

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ## Listing and Moving Files


    Admittedly, using the desktop GUI to list and move files is much easier than using
    the Terminal and keyboard. However, it''s an important skill that you will appreciate
    as you advance with the Raspberry Pi and Linux.


    ## LOOKING AT FILES


    Operating systems are built on files and folders, or directories if you prefer.
    While you''re used to viewing your own files, most operating systems keep other
    files out of sight. In Raspbian, you have access to every file in the system.


    **STEP 1**

    We''ve already looked at "ls", which lists the files in the working directory,
    but you are more likely to use a command like `ls -l`. The bit after the command
    (the ''-lah'') is known as the argument. This is an option that modifies the behaviour
    of the command.


    **STEP 2**

    The "-l" argument lists files and directories in long format. Each file and directory
    is now on a single line, and before each file is a lot of text. First you''ll
    see lots of letters and dashes, like ''drwxr-xr-x''. Don''t worry about these
    for now; they are known as ''permissions'' and we''ll come to those later.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    -rw-r--r-- 1 pi pi    0 May 11 20:56 articles.txt

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 Apr 21 14:50 Documents

    drwx------ 2 pi pi 4096 Apr 21 15:23 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    -rw-r--r-- 1 pi pi    0 May 11 20:56 names.txt

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $

    ```


    **STEP 3**

    After the permission letters come a single number. This is the number of files
    in the item. If it''s a file then it''ll be 1, but if it''s a directory it''ll
    be at least 2. This is because each directory contains two hidden files; one with
    a single dot (.) and one with two dots (..). Directories containing files or other
    directories will have a higher number.


    **STEP 4**

    Next you''ll see the word "pi" listed twice on each line. This refers to the user
    rather than the name of your computer (your default username is "pi"). The first
    is the owner of the file, and the second is the group. Typically these will both
    be the same and you''ll see either ''pi'' or ''root''. You can enter: `ls -l /`
    to view the files and directories in the root directory that belong to the root
    account.


    ```

    pi@raspberrypi ~ $ ls -l

    total 28

    -rw-r--r-- 1 pi pi    0 May 11 20:56 articles.txt

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 Apr 21 14:50 Documents

    drwx------ 2 pi pi 4096 Apr 21 15:23 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    -rw-r--r-- 1 pi pi    0 May 11 20:56 names.txt

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    drwxr-xr-x 3 pi pi 4096 May 11 21:15 test

    pi@raspberrypi ~ $ ls -l /

    total 74

    drwxr-xr-x  2 root root  4096 Jan  1  1970 bin

    drwxr-xr-x  3 root root  2048 Jan  1  1970 boot

    drwxr-xr-x 12 root root  3280 May 11 09:03 dev

    drwxr-xr-x 109 root root  4096 May 11 09:03 etc

    drwxr-xr-x  3 root root  4096 Jan  1  1970 home

    drwxr-xr-x 12 root root  4096 Jan  1  1970 lib

    drwx------  2 root root 16384 Feb 15 11:21 lost+found

    drwxr-xr-x  3 root root  4096 May 11 07:42 media

    drwxr-xr-x  2 root root  4096 Jan 11 00:02 mnt

    drwxr-xr-x  6 root root  4096 Jan  1  1970 opt

    ```


    **STEP 5**

    The next number relates to the size of the file, in bytes. In Linux each text
    file is made up of letters and each letter takes up a byte, so our names.txt file
    has 37 bytes and 37 characters in the document. Files and directories can be extremely
    large and hard to determine, so use `ls -lh`. The "h" argument humanises the number,
    making it easier to read.


    ```

    pi@raspberrypi ~ $ ls -lh

    total 32K

    -rw-r--r-- 1 pi pi 0 May 11 20:56 articles.txt

    drwxr-xr-x 2 pi pi 4.0K Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4.0K Apr 21 14:50 Documents

    drwx------ 2 pi pi 4.0K Apr 21 15:23 Downloads

    drwxr-xr-x 3 pi pi 4.0K Apr 17 18:48 indiecity

    ```


    **STEP 6**

    Finally, you should be aware that there are many hidden files in Linux. These
    are listed using the "-a" argument. Hidden files and directories begin with a
    dot (.), so you should never start a file or directory with a dot, unless you
    want to hide it. Typically, you can combine all three arguments together into
    the command `ls -lah`.


    ```

    pi@raspberrypi ~ $ ls -lah

    total 520K

    drwxr-xr-x 33 pi pi 4.0K May 11 21:14 .

    drwxr-xr-x 3 root root 4.0K Jan 1 1970 ..

    drwx------ 2 pi pi 4.0K Apr 20 14:31 .aptitude

    -rw-r--r-- 1 pi pi 0 May 11 20:56 articles.txt

    -rw------- 1 pi pi 8.7K May 11 09:03 .bash_history

    -rw-r--r-- 1 pi pi 220 Feb 15 14:05 .bash_logout

    -rw-r--r-- 1 pi pi 3.2K Feb 15 14:05 .bashrc

    drwxr-xr-x 10 pi pi 4.0K Apr 21 17:08 .cache

    drwxr-xr-x 20 pi pi 4.0K Apr 21 13:33 .config

    drwx------ 3 pi pi 4.0K Feb 16 14:16 .dbus

    drwxr-xr-x 2 pi pi 4.0K Apr 21 17:55 Desktop

    -rw-r--r-- 1 pi pi 35 Apr 17 12:17 .dmrc

    drwxr-xr-x 5 pi pi 4.0K Apr 21 14:50 Documents

    drwx------ 2 pi pi 4.0K Apr 21 15:23 Downloads

    drwxr-xr-x 2 pi pi 4.0K Apr 20 13:45 .dreamchess

    drwxr-xr-x 2 pi pi 4.0K Apr 21 18:15 .fontconfig

    ```


    ## SOME COMMON DIRECTORIES


    Now that you know how to view the contents of your hard drive you''ll start to
    notice a lot of directories with names like bin, sbin, var and dev. These are
    the files and directories that you are kept away from on a Mac, and won''t encounter
    on a Windows PC.


    **STEP 1**

    Enter: `ls -lah /` to view all of the files and directories, including the hidden
    items, in the root directory of your hard drive. Here you will see all the items
    that make up your Raspbian OS (which is a version of Linux). It''s worth taking
    the time to know some of them.


    ```

    pi@raspberrypi ~ $ ls -lah /

    total 82K

    drwxr-xr-x 22 root root 4.0K May 11 21:23 .

    drwxr-xr-x 22 root root 4.0K May 11 21:23 ..

    drwxr-xr-x  2 root root root 4.0K Jan  1  1970 bin

    drwxr-xr-x  3 root root root 2.0K Jan  1  1970 boot

    drwxr-xr-x 12 root root root 3.3K May 11 09:03 dev

    drwxr-xr-x 109 root root root 4.0K May 11 09:03 etc

    drwxr-xr-x  3 root root root 4.0K Jan  1  1970 home

    drwxr-xr-x 12 root root root 4.0K Jan  1  1970 lib

    drwx------  2 root root root 16K Feb 15 11:21 lost+found

    drwxr-xr-x  3 root root root 4.0K May 11 07:42 media

    drwxr-xr-x  2 root root root 4.0K Jan 11 00:02 mnt

    drwxr-xr-x  6 root root root 4.0K Jan  1  1970 opt

    dr-xr-xr-x 85 root root root    0 Jan  1  1970 proc

    drwx------  9 root root root 4.0K May 11 07:36 root

    drwxr-xr-x 10 root root root  460 May 11 09:03 run

    drwxr-xr-x  2 root root root 4.0K Jan  1  1970 sbin

    drwxr-xr-x  2 root root root 4.0K Jun 20 2012 selinux

    ```


    **STEP 2**

    Bin is a directory that stores binaries. This is the Linux way of saying programs
    or applications. Sbin is for system binaries, which are the programs that make
    up your system. Dev contains references to your devices: hard drive, keyboard,
    mouse and so on. Etc contains your system configuration files.


    ```

    pi@raspberrypi ~ $ ls /bin

    bash bzip2 chgrp dash domainname fgconsole gz

    d bunzip2 bzgrep chmod date dumpkeys fgrep gzi

    bzcat bzip2 chown dd echo findmnt hos

    bzcmp bzip2recover chvt df ed fuser ip

    bzdiff bzless con2fbmap dir egrep fusermount kbd

    bzegrep bzmore cp dmesg false grep kil

    bzexe cat cpio dnsdomainname fbset gunzip kmo

    pi@raspberrypi ~ $

    ```


    **STEP 3**

    Entering: `ls /home` displays the contents of your home directory, which contains
    pi; the directory that you start in. So, entering: `ls /home/pi` is the same as
    just "ls" from the default home directory. This is where you are expected to place
    most of the documents you create. Don''t confuse home with "usr"; the /usr directory
    is where you find program tools and libraries.


    ```

    pi@raspberrypi ~ $ ls

    articles.txt Desktop Documents Downloads indiecity names.txt python_games

    pi@raspberrypi ~ $ ls /home/pi

    articles.txt Desktop Documents Downloads indiecity names.txt python_games

    pi@raspberrypi ~ $

    ```


    **STEP 4**

    Lib is a directory that contains libraries of code that are referred to by other
    programs (different programs share files in Lib). "Var" is short for various,
    which is mostly files used by the system, but you may need to work with items
    here. Finally there is a directory called "tmp", which is for temporary files;
    files placed here are on your system for the short term and can be deleted from
    the system.


    ```

    pi@raspberrypi ~ $ ls /var

    backups cache lib local lock log mail opt run spool swap tmp ww

    pi@raspberrypi ~ $

    ```'
  mdcn: '## 绝对路径与相对路径


    了解工作目录、根目录和主目录之间的区别非常重要。路径有两种类型：绝对路径和相对路径。这些概念比听起来更容易理解。让我们来看看……


    **步骤 1**

    默认情况下，像"ls"这样的命令会使用工作目录。这是你当前正在查看的目录，默认设置为主目录（/users/pi）。使用"pwd"（打印工作目录）命令可以让你知道当前的工作目录是什么，而使用"cd"命令可以更改工作目录。


    ```

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    **步骤 2**

    根目录始终是''/''。输入：`ls /`会列出根目录的内容，输入：`cd /`会切换到根目录。这很重要，因为"ls Documents/Pictures"和"ls
    /Documents/Pictures"之间有区别。第一个命令列出工作目录内的 Documents 目录中的 Pictures 目录的内容（如果你在主目录中，这将会有效）。


    ```

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $ ls Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png

    pi@raspberrypi:~ $

    ```


    **步骤 3**

    第二个命令（"ls /Documents/Pictures"）尝试列出根目录中名为 Documents 的目录内的 Pictures 的内容（因为路径以''/''开头，表示根目录）。通常根目录下没有
    Documents 目录，所以你会得到"没有那个文件或目录"的错误。以''/''开头的路径被称为"绝对路径"，而不以''/''开头的路径被称为"相对路径"，因为它是相对于你的工作目录的。


    ```

    pi@raspberrypi ~ $ ls /

    bin  boot  dev  etc  home  lib  lost+found  media  mnt  opt  proc

    pi@raspberrypi ~ $ ls /Documents/Pictures

    ls: cannot access /Documents/Pictures: No such file or directory

    pi@raspberrypi ~ $

    ```


    **步骤 4**

    还有一个指向你的用户目录的绝对路径快捷方式，那就是波浪号"~"字符。输入：`ls ~`总是列出你的主目录的内容，而"cd ~"会直接移动到你的主目录，无论你的工作目录是什么。你也可以在任何地方使用这个快捷方式：输入：`ls
    ~/Documents/Pictures`来显示 Pictures 的内容。


    ```

    pi@raspberrypi:~ $ cd ~

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $ ls ~/Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png

    pi@raspberrypi:~ $

    ```


    **步骤 5**

    如何返回到 pi 目录？通过使用命令 `cd ..`。在 Linux 中，两个点表示上级目录，也称为父目录。顺便说一下，单个点"."用于表示当前目录。你从不会使用
    `cd .` 切换到同一目录，但了解一下是值得的，因为有些命令需要你指定当前目录。


    ```

    pi@raspberrypi ~/Documents $ pwd

    /home/pi/Documents

    pi@raspberrypi ~/Documents $ cd ..

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    **步骤 6**

    "ls"和"cd"命令也可以与更复杂的路径一起使用。输入：`ls Documents/Pictures`可以查看 Documents 目录内的 Pictures
    目录的内容。你可以使用 `cd Documents/Pictures` 切换到此目录；使用 `cd ../..` 向上移动两个父目录。


    ```

    pi@raspberrypi ~ $ ls Documents/Pictures

    LEGO  LucyHattersley.jpg  raspberry_pi_2_photographs

    pi@raspberrypi ~ $ cd Documents/Pictures

    pi@raspberrypi ~/Documents/Pictures $ pwd

    /home/pi/Documents/Pictures

    pi@raspberrypi ~/Documents/Pictures $ cd ../..

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ## 列出和移动文件


    诚然，使用桌面图形界面列出和移动文件比使用终端和键盘要容易得多。然而，这是一项重要的技能，随着你在树莓派和 Linux 方面的进步，你会欣赏到它的价值。


    ## 查看文件


    操作系统建立在文件和文件夹（或者你更喜欢称之为目录）之上。虽然你习惯于查看自己的文件，但大多数操作系统会将其他文件隐藏起来。在 Raspbian 中，你可以访问系统中的每一个文件。


    **步骤 1**

    我们已经看过了"ls"，它列出工作目录中的文件，但你更可能使用像 `ls -l` 这样的命令。命令之后的部分（例如 ''-lah''）被称为参数。这是一个修改命令行为的选项。


    **步骤 2**

    "-l"参数以长格式列出文件和目录。每个文件和目录现在各占一行，并且在每个文件前面有很多文本。首先你会看到很多字母和破折号，比如''drwxr-xr-x''。现在不用担心这些；它们被称为"权限"，我们稍后会讲到。


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    -rw-r--r-- 1 pi pi    0 May 11 20:56 articles.txt

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 Apr 21 14:50 Documents

    drwx------ 2 pi pi 4096 Apr 21 15:23 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    -rw-r--r-- 1 pi pi    0 May 11 20:56 names.txt

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $

    ```


    **步骤 3**

    权限字母之后是一个单独的数字。这是该项中的文件数量。如果它是一个文件，那么数字将是 1，但如果它是一个目录，数字至少是 2。这是因为每个目录包含两个隐藏文件；一个带有单点（.），一个带有两个点（..）。包含文件或其他目录的目录会有更高的数字。


    **步骤 4**

    接下来你会看到每行中列出两次"pi"这个词。这指的是用户，而不是你的计算机名称（你的默认用户名是"pi"）。第一个是文件的所有者，第二个是所属的组。通常这两个是相同的，你会看到''pi''或''root''。你可以输入：`ls
    -l /`来查看属于根账户的根目录中的文件和目录。


    ```

    pi@raspberrypi ~ $ ls -l

    total 28

    -rw-r--r-- 1 pi pi    0 May 11 20:56 articles.txt

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 Apr 21 14:50 Documents

    drwx------ 2 pi pi 4096 Apr 21 15:23 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    -rw-r--r-- 1 pi pi    0 May 11 20:56 names.txt

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    drwxr-xr-x 3 pi pi 4096 May 11 21:15 test

    pi@raspberrypi ~ $ ls -l /

    total 74

    drwxr-xr-x  2 root root  4096 Jan  1  1970 bin

    drwxr-xr-x  3 root root  2048 Jan  1  1970 boot

    drwxr-xr-x 12 root root  3280 May 11 09:03 dev

    drwxr-xr-x 109 root root  4096 May 11 09:03 etc

    drwxr-xr-x  3 root root  4096 Jan  1  1970 home

    drwxr-xr-x 12 root root  4096 Jan  1  1970 lib

    drwx------  2 root root 16384 Feb 15 11:21 lost+found

    drwxr-xr-x  3 root root  4096 May 11 07:42 media

    drwxr-xr-x  2 root root  4096 Jan 11 00:02 mnt

    drwxr-xr-x  6 root root  4096 Jan  1  1970 opt

    ```


    **步骤 5**

    下一个数字与文件的大小（以字节为单位）相关。在 Linux 中，每个文本文件由字母组成，每个字母占据一个字节，所以我们的 names.txt 文件有 37
    个字节，文档中有 37 个字符。文件和目录可能非常大且难以确定，所以使用 `ls -lh`。"h"参数使数字更人性化，更易于阅读。


    ```

    pi@raspberrypi ~ $ ls -lh

    total 32K

    -rw-r--r-- 1 pi pi 0 May 11 20:56 articles.txt

    drwxr-xr-x 2 pi pi 4.0K Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4.0K Apr 21 14:50 Documents

    drwx------ 2 pi pi 4.0K Apr 21 15:23 Downloads

    drwxr-xr-x 3 pi pi 4.0K Apr 17 18:48 indiecity

    ```


    **步骤 6**

    最后，你应该知道 Linux 中有很多隐藏文件。这些文件使用"-a"参数列出。隐藏文件和目录以点（.）开头，所以你不应该以点开头命名文件或目录，除非你想隐藏它。通常，你可以将所有三个参数组合到命令
    `ls -lah` 中。


    ```

    pi@raspberrypi ~ $ ls -lah

    total 520K

    drwxr-xr-x 33 pi pi 4.0K May 11 21:14 .

    drwxr-xr-x  3 root root 4.0K Jan  1 1970 ..

    drwx------ 2 pi pi 4.0K Apr 20 14:31 .aptitude

    -rw-r--r-- 1 pi pi 0 May 11 20:56 articles.txt

    -rw------- 1 pi pi 8.7K May 11 09:03 .bash_history

    -rw-r--r-- 1 pi pi 220 Feb 15 14:05 .bash_logout

    -rw-r--r-- 1 pi pi 3.2K Feb 15 14:05 .bashrc

    drwxr-xr-x 10 pi pi 4.0K Apr 21 17:08 .cache

    drwxr-xr-x 20 pi pi 4.0K Apr 21 13:33 .config

    drwx------ 3 pi pi 4.0K Feb 16 14:16 .dbus

    drwxr-xr-x 2 pi pi 4.0K Apr 21 17:55 Desktop

    -rw-r--r-- 1 pi pi 35 Apr 17 12:17 .dmrc

    drwxr-xr-x 5 pi pi 4.0K Apr 21 14:50 Documents

    drwx------ 2 pi pi 4.0K Apr 21 15:23 Downloads

    drwxr-xr-x 2 pi pi 4.0K Apr 20 13:45 .dreamchess

    drwxr-xr-x 2 pi pi 4.0K Apr 21 18:15 .fontconfig

    ```


    ## 一些常见的目录


    既然你知道了如何查看硬盘驱动器的内容，你就会开始注意到很多名为 bin、sbin、var 和 dev 的目录。这些是 Mac 上你看不到，在 Windows
    PC 上也不会遇到的文件和目录。


    **步骤 1**

    输入：`ls -lah /` 以查看硬盘驱动器根目录中的所有文件和目录，包括隐藏的项目。在这里，你将看到组成你的 Raspbian 操作系统（一个 Linux
    版本）的所有项目。花点时间了解其中一些是值得的。


    ```

    pi@raspberrypi ~ $ ls -lah /

    total 82K

    drwxr-xr-x 22 root root 4.0K May 11 21:23 .

    drwxr-xr-x 22 root root 4.0K May 11 21:23 ..

    drwxr-xr-x  2 root root root 4.0K Jan  1  1970 bin

    drwxr-xr-x  3 root root root 2.0K Jan  1  1970 boot

    drwxr-xr-x 12 root root root 3.3K May 11 09:03 dev

    drwxr-xr-x 109 root root root 4.0K May 11 09:03 etc

    drwxr-xr-x  3 root root root 4.0K Jan  1  1970 home

    drwxr-xr-x 12 root root root 4.0K Jan  1  1970 lib

    drwx------  2 root root root 16K Feb 15 11:21 lost+found

    drwxr-xr-x  3 root root root 4.0K May 11 07:42 media

    drwxr-xr-x  2 root root root 4.0K Jan 11 00:02 mnt

    drwxr-xr-x  6 root root root 4.0K Jan  1  1970 opt

    dr-xr-xr-x 85 root root root    0 Jan  1  1970 proc

    drwx------  9 root root root 4.0K May 11 07:36 root

    drwxr-xr-x 10 root root root  460 May 11 09:03 run

    drwxr-xr-x  2 root root root 4.0K Jan  1  1970 sbin

    drwxr-xr-x  2 root root root 4.0K Jun 20 2012 selinux

    ```


    **步骤 2**

    Bin 是一个存储二进制文件的目录。这是 Linux 对程序或应用程序的说法。Sbin 用于系统二进制文件，这些是构成你系统的程序。Dev 包含对你的设备的引用：硬盘驱动器、键盘、鼠标等。Etc
    包含你的系统配置文件。


    ```

    pi@raspberrypi ~ $ ls /bin

    bash bzip2 chgrp dash domainname fgconsole gz

    d bunzip2 bzgrep chmod date dumpkeys fgrep gzi

    bzcat bzip2 chown dd echo findmnt hos

    bzcmp bzip2recover chvt df ed fuser ip

    bzdiff bzless con2fbmap dir egrep fusermount kbd

    bzegrep bzmore cp dmesg false grep kil

    bzexe cat cpio dnsdomainname fbset gunzip kmo

    pi@raspberrypi ~ $

    ```


    **步骤 3**

    输入：`ls /home` 会显示你的主目录的内容，其中包含 pi；这是你开始时的目录。因此，输入：`ls /home/pi` 等同于仅从默认主目录运行"ls"。这是期望你放置大部分创建文档的地方。不要将
    home 与"usr"混淆；/usr 目录是你找到程序工具和库的地方。


    ```

    pi@raspberrypi ~ $ ls

    articles.txt Desktop Downloads indiecity names.txt python_games

    pi@raspberrypi ~ $ ls /home/pi

    articles.txt Desktop Downloads indiecity names.txt python_games

    pi@raspberrypi ~ $

    ```


    **步骤 4**

    Lib 是一个包含其他程序引用的代码库的目录（不同的程序共享 Lib 中的文件）。"Var"是 various 的缩写，主要是系统使用的文件，但你可能需要处理这里的项目。最后，有一个名为"tmp"的目录，用于临时文件；放在这里的文件在你的系统上是短期的，可以从系统中删除。


    ```

    pi@raspberrypi ~ $ ls /var

    backups cache lib local lock log mail opt run spool swap tmp ww

    pi@raspberrypi ~ $

    ```'
