    \ find C++, or some other language, that's supporting the performance and overall\
    \ program in which the AI and ML are working.\n\nWhile it's easy to portray a\
    \ bleak AI future, let's not forget the many great instances of AI we currently\
    \ enjoy: optical character recognition, handwriting recognition, image processing,\
    \ helping people with visual and hearing disabilities, advancements in space exploration,\
    \ engineering improvements, conservation, pharmaceutical and drug improvements\
    \ and greater freedom for those limited in their ability to travel. It's not all\
