    \ modules can be imported as aliases:\n\n```\nimport math as m\n\nprint(m.pi)\n\
    ```\n\nOf course, adding comments helps to tell others what's going on.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_54_5.png)"
- md: "## Python Errors\n\nIt goes without saying that you’ll eventually come across\
    \ an error in your code, where Python declares it’s not able to continue due to\
    \ something being missed out, wrong or simply unknown. Being able to identify\
    \ these errors makes for a good programmer.\n\n### DEBUGGING\n\nErrors in code\
    \ are called bugs and are perfectly normal. They can often be easily rectified\
    \ with a little patience. The important thing is to keep looking, experimenting\
    \ and testing. Eventually your code will be bug free.\n\n### STEP 1\n\nCode isn’t\
    \ as fluid as the written word, no matter how good the programming language is.\
    \ Python is certainly easier than most languages but even it is prone to some\
    \ annoying bugs. The most common are typos by the user and whilst easy to find\
    \ in simple dozen-line code, imagine having to debug multi-thousand line code.\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_55_0.png)\n\n### STEP 2\n\nThe most\
    \ common of errors is the typo, as we’ve mentioned. The typos are often at the\
    \ command level: mistyping the print command for example. However, they also occur\
    \ when you have numerous variables, all of which have lengthy names. The best\
    \ advice is to simply go through the code and check your spelling.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_55_1.png)\n\
    \n### STEP 3\n\nThankfully Python is helpful when it comes to displaying error\
    \ messages. When you receive an error, in red text from the IDLE Shell, it will\
    \ define the error itself along with the line number where the error has occurred.\
    \ Whilst in the IDLE Editor this is a little daunting for lots of code; text editors\
    \ help by including line numbering.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_55_2.png)\n\
    \n### STEP 4\n\nSyntax errors are probably the second most common errors you’ll\
    \ come across as a programmer. Even if the spelling is correct, the actual command\
    \ itself is wrong. In Python 3 this often occurs when Python 2 syntaxes are applied.\
    \ The most annoying of these is the print function. In Python 3 we use `print(\"\
    words\")`, whereas Python2 uses `print \"words\"`.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_55_3.png)\n\
    \n### STEP 5\n\nPesky brackets are also a nuisance in programming errors, especially\
    \ when you have something like:\n\n```\nprint(balanced_check(input()))\n```\n\n\
    Remember that for every ‘(‘ there must be an equal number of ‘)’.\n\n```\nimport\
    \ sys\n\ndef balanced_check(data):\n    stack = []\n    characters = list(data)\n\
    \n    for character in characters:\n        reference = {\n            '(': ')',\n\
    \            '{': '}',\n            '[': ']'\n        }\n        if character\
    \ in reference.keys():\n            stack.append(character)\n        elif character\
    \ in reference.values() and len(stack) > 0:\n            char = stack.pop()\n\
    \            if reference.get(char) != character:\n                return \"NO\"\
    \n        else:\n            return \"NO\"\n    return \"YES\"\n```\n\n### STEP\
    \ 6\n\nThere are thousands of online Python resources, code snippets and lengthy\
    \ discussions across forums on how best to achieve something. Whilst 99 per cent\
    \ of it is good code, don’t always be lured into copying and pasting random code\
    \ into your editor. More often than not, it won’t work and the worst part is that\
    \ you haven’t learnt anything.\n\n```\ntry:\n    some_code()\nexcept:\n    print(\"\
    Unexpected error:\", sys.exc_info()[0])\n```\n\nThe problem with a bare except\
    \ is that it will catch all exceptions, including ones you really don’t want to\
    \ be ignoring (like KeyboardInterrupt and SystemExit). It would be much better\
    \ if your except block only caught the specific exception you expect, and let\
    \ all others bubble up as normal.\n\nA few other general comments on your code:\n\
    - In line 200, you have this construction:\n```\nfor letter in range(len(chosen_word)):\n\
    \    if player_guess == chosen_word[letter]:\n        word_guessed[letter] = player_guess\n\
    ```\nYou’re looping over the index variable, but also using the list element.\
    \ It would be better to write:\n```\nfor idx, letter in enumerate(chosen_word):\n\
    \    if player_guess == letter:\n```\n\n### STEP 7\n\nIndents are a nasty part\
    \ of Python programming that a lot of beginners fall foul of. Recall the IF loop\
    \ from the Conditions and Loops section, where the colon means everything indented\
    \ following the statement is to be executed as long as it’s true? Missing the\
    \ indent, or having too much of indent, will come back with an error.\n\n```\n\
    word_input(\"Please enter a four-letter word: \")\nword_length = len(word)\nif\
    \ word_length == 4:\n    print(\"word is a four-letter word. Well done.\")\nelse:\n\
    \    print(\"word is not a four-letter word.\")\n\nSyntaxError: expected an indented\
    \ block\n```\n\n### STEP 8\n\nAn excellent way to check your code step-by-step\
    \ is to use Python Tutor’s Visualise web page, found at www.pythontutor.com/visualize.html#mode=edit.\
    \ Simply paste your code into the editor and click the Visualise Execution button\
    \ to run the code line-by-line. This helps to clear bugs and any misunderstandings.\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_56_0.png)\n\n### STEP 9\n\nPlanning\
    \ makes for good code. Whilst a little old school, it’s a good habit to plan what\
    \ your code will do before sitting down to type it out. List the variables that\
    \ will be used and the modules too; then write out a script for any user interaction\
    \ or outputs.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_56_1.png)\n\n### STEP\
    \ 10\n\nPurely out of interest, the word debugging in computing terms comes from\
    \ Admiral Grace Hopper, who back in the ‘40s was working on a monolithic Harvard\
    \ Mark II electromechanical computer. According to legend Hopper found a moth\
    \ stuck in a relay, thus stopping the system from working. Removal of the moth\
    \ was hence called debugging.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_56_2.png)\n\
    \n## Combining What You Know So Far\n\nWe've reached the end of this section so\
    \ let's take a moment to combine everything we've looked at so far, and apply\
    \ it to writing a piece of code. This code can then be used and inserted into\
    \ your own programs in future; either part of it or as a whole.\n\n## PLAYING\
    \ WITH PI\n\nFor this example we're going to create a program that will calculate\
    \ the value of Pi to a set number of decimal places, as described by the user.\
    \ It combines much of what we've learnt, and a little more.\n\n### STEP 1\n\n\
    Start by opening Python and creating a New File in the Editor. First we need to\
    \ get hold of an equation that can accurately calculate Pi without rendering the\
    \ computer's CPU useless for several minutes. The recommended calculation used\
    \ in such circumstances is the Chudnovsky Algorithm, you can find more information\
    \ about it at en.wikipedia.org/wiki/Chudnovsky_algorithm.\n\n### STEP 2\n\nYou\
    \ can utilise the Chudnovsky Algorithm to create your own Python script based\
    \ on the calculation. Begin by importing some important modules and functions\
    \ within the modules:\n\n```\npython\nfrom decimal import Decimal, getcontext\n\
    import math\n```\n\nThis uses the decimal and getcontext functions from the Decimal\
    \ module, both of which deal with large decimal place numbers and naturally the\
    \ Math module.\n\n### STEP 3\n\nNow you can insert the Pi calculation algorithm\
    \ part of the code. This is a version of the Chudnovsky Algorithm:\n\n```\npython\n\
    def calc(n):\n    t = Decimal(0)\n    pi = Decimal(0)\n    deno = Decimal(0)\n\
    \    k = 0\n    for k in range(n):\n        t = (Decimal(-1)**k)*(math.factorial(Decimal(6)*k))*(13591409+545140134*k)\n\
    \        deno = math.factorial(3*k)*(math.factorial(k)**Decimal(3))*(640320**(3*k))\n\
    \        pi += Decimal(t)/Decimal(deno)\n    pi = pi * Decimal(12)/Decimal(640320**Decimal(1.5))\n\
    \    pi = 1/pi\n    return str(pi)\n```\n\n### STEP 4\n\nThe previous step defines\
    \ the rules that make up the algorithm and creates the string that will eventually\
    \ display the value of Pi, according the Chudnovsky brothers' algorithm. You have\
    \ no doubt already surmised that it would be handy to actually output the value\
    \ of Pi to the screen. To rectify that you can add:\n\n```\npython\nprint(calc(1))\n\
    ```\n\n### STEP 5\n\nYou can save and execute the code at this point if you like.\
    \ The output will print the value of Pi to 27 decimal places: **3.141592653589734207668453591**.\
    \ Whilst pretty impressive on its own, you want some user interaction, to ask\
    \ the user as to how many places Pi should be calculated.\n\n### STEP 6\n\nYou\
    \ can insert an input line before the Pi calculation Def command. It needs to\
    \ be an integer, as it will otherwise default to a string. We can call it numberofdigits\
    \ and use the getcontext function:\n\n```\npython\nnumberofdigits = int(input(\"\
    please enter the number of decimal places to calculate Pi to: \"))\ngetcontext().prec\
    \ = numberofdigits\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_57_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_57_1.png)"
  mdcn: "## Python 错误\n\n不言而喻，你最终会在代码中遇到错误，Python 会因为某些内容缺失、错误或单纯未知而宣告无法继续。能够识别这些错误是成为优秀程序员的关键。\n\
    \n### 调试\n\n代码中的错误被称为 bug，这非常正常。只要有耐心，它们通常很容易纠正。重要的是要持续寻找、实验和测试。最终你的代码将不再有 bug。\n\
    \n### 步骤 1\n\n无论编程语言有多优秀，代码都不如文字流畅。Python 肯定比大多数语言更容易，但它也难免会有一些令人烦恼的 bug。最常见的是用户打错字，虽然在几十行的简单代码中很容易发现，但想象一下调试成千上万行代码的情景。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_55_0.png)\n\n### 步骤 2\n\n如我们提到的，最常见的错误是打错字。这些错误通常出现在命令层面：例如错误地输入\
    \ print 命令。然而，当你有很多名称冗长的变量时，它们也会出现。最好的建议是简单地浏览代码并检查拼写。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_55_1.png)\n\
    \n### 步骤 3\n\n幸运的是，Python 在显示错误信息方面很有帮助。当你从 IDLE Shell 收到红色文本的错误信息时，它会定义错误本身以及发生错误的行号。虽然在\
    \ IDLE Editor 中，面对大量代码时这有点令人望而生畏；但文本编辑器通过包含行号来提供帮助。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_55_2.png)\n\
    \n### 步骤 4\n\n语法错误可能是作为程序员你会遇到的第二常见的错误。即使拼写正确，实际命令本身也是错误的。在 Python 3 中，这通常发生在应用\
    \ Python 2 语法时。其中最恼人的是 print 函数。在 Python 3 中我们使用 `print(\"words\")`，而 Python 2\
    \ 使用 `print \"words\"`。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_55_3.png)\n\
    \n### 步骤 5\n\n烦人的括号在编程错误中也是一个麻烦，尤其是当你遇到这样的情况时：\n\n```\nprint(balanced_check(input()))\n\
    ```\n\n记住，每个 `(` 必须有相同数量的 `)`。\n\n```\nimport sys\n\ndef balanced_check(data):\n\
    \    stack = []\n    characters = list(data)\n\n    for character in characters:\n\
    \        reference = {\n            '(': ')',\n            '{': '}',\n       \
    \     '[': ']'\n        }\n        if character in reference.keys():\n       \
    \     stack.append(character)\n        elif character in reference.values() and\
    \ len(stack) > 0:\n            char = stack.pop()\n            if reference.get(char)\
    \ != character:\n                return \"NO\"\n        else:\n            return\
    \ \"NO\"\n    return \"YES\"\n```\n\n### 步骤 6\n\n在线 Python 资源、代码片段以及论坛上关于如何最好地实现某些功能的冗长讨论数以千计。虽然其中\
    \ 99% 是好的代码，但不要总是被诱惑将随机代码复制粘贴到编辑器中。很多时候它行不通，最糟糕的是你什么都没学到。\n\n```\ntry:\n    some_code()\n\
    except:\n    print(\"Unexpected error:\", sys.exc_info()[0])\n```\n\n裸 `except`\
    \ 的问题在于它会捕获所有异常，包括你确实不想忽略的异常（如 `KeyboardInterrupt` 和 `SystemExit`）。如果你的 `except`\
    \ 块只捕获你预期的特定异常，并让所有其他异常正常冒泡，那会好得多。\n\n关于你的代码还有几个其他通用注释：\n- 在第 200 行，你有这样的构造：\n\
    ```\nfor letter in range(len(chosen_word)):\n    if player_guess == chosen_word[letter]:\n\
    \        word_guessed[letter] = player_guess\n```\n你在遍历索引变量的同时也在使用列表元素。更好的写法是：\n\
    ```\nfor idx, letter in enumerate(chosen_word):\n    if player_guess == letter:\n\
    ```\n\n### 步骤 7\n\n缩进是 Python 编程中一个令人讨厌的部分，许多初学者都容易出错。回顾“条件与循环”部分中的 IF 循环，其中冒号意味着语句后所有缩进的内容只要条件为真就会被执行？缺少缩进或缩进过多都会返回错误。\n\
    \n```\nword_input(\"Please enter a four-letter word: \")\nword_length = len(word)\n\
    if word_length == 4:\n    print(\"word is a four-letter word. Well done.\")\n\
    else:\n    print(\"word is not a four-letter word.\")\n\nSyntaxError: expected\
    \ an indented block\n```\n\n### 步骤 8\n\n逐步检查代码的一个极好方法是使用 Python Tutor 的可视化网页，网址为\
    \ www.pythontutor.com/visualize.html#mode=edit。只需将代码粘贴到编辑器中，然后单击“Visualise Execution”按钮即可逐行运行代码。这有助于清除\
    \ bug 和任何误解。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_56_0.png)\n\n### 步骤 9\n\
    \n计划造就好代码。虽然有点老派，但在坐下来打字之前计划好代码要做什么是一个好习惯。列出将要使用的变量和模块；然后为任何用户交互或输出编写脚本。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_56_1.png)\n\
    \n### 步骤 10\n\n纯粹出于兴趣，计算术语中的“调试”（debugging）一词源自海军上将 Grace Hopper，她在 20 世纪 40 年代从事于一台大型哈佛\
    \ Mark II 机电计算机的工作。根据传说，Hopper 发现一只飞蛾卡在了一个继电器中，从而阻止了系统运行。因此，移除这只飞蛾被称为调试（debugging，字面意思是“移除虫子”）。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_56_2.png)\n\n## 综合运用你迄今所学的知识\n\n我们已经到达本节的最后，因此让我们花点时间将我们迄今为止所看到的所有内容结合起来，并将其应用于编写一段代码。然后这段代码可以在将来使用并插入到你自己的程序中；无论是部分使用还是整体使用。\n\
    \n## 玩转圆周率\n\n在这个示例中，我们将创建一个程序，该程序将根据用户设定的精度计算圆周率 Pi 的值。它结合了我们所学的许多知识，以及一点更多内容。\n\
    \n### 步骤 1\n\n首先打开 Python 并在编辑器中创建一个新文件。我们需要找到一个能在几分钟内完成而不使计算机 CPU 彻底无用的准确计算 Pi\
    \ 的方程。在这种情况下推荐的计算是丘德诺夫斯基算法，你可以在 en.wikipedia.org/wiki/Chudnovsky_algorithm 上找到更多信息。\n\
    \n### 步骤 2\n\n你可以利用丘德诺夫斯基算法基于该计算创建你自己的 Python 脚本。首先导入一些重要的模块和模块内的函数：\n\n```\n\
    python\nfrom decimal import Decimal, getcontext\nimport math\n```\n\n这使用了 Decimal\
    \ 模块中的 `decimal` 和 `getcontext` 函数，它们都处理多位小数的数字，当然还有 Math 模块。\n\n### 步骤 3\n\n\
    现在你可以插入计算 Pi 的代码部分。这是丘德诺夫斯基算法的一个版本：\n\n```\npython\ndef calc(n):\n    t = Decimal(0)\n\
    \    pi = Decimal(0)\n    deno = Decimal(0)\n    k = 0\n    for k in range(n):\n\
    \        t = (Decimal(-1)**k)*(math.factorial(Decimal(6)*k))*(13591409+545140134*k)\n\
    \        deno = math.factorial(3*k)*(math.factorial(k)**Decimal(3))*(640320**(3*k))\n\
    \        pi += Decimal(t)/Decimal(deno)\n    pi = pi * Decimal(12)/Decimal(640320**Decimal(1.5))\n\
    \    pi = 1/pi\n    return str(pi)\n```\n\n### 步骤 4\n\n上一步定义了构成算法的规则，并根据丘德诺夫斯基兄弟的算法创建了最终将显示\
    \ Pi 值的字符串。你可能已经推测出，实际上将 Pi 的值输出到屏幕会很方便。为了纠正这一点，你可以添加：\n\n```\npython\nprint(calc(1))\n\
    ```\n\n### 步骤 5\n\n如果你愿意，此时可以保存并执行代码。输出将打印 Pi 的值到 27 位小数：**3.141592653589734207668453591**。虽然本身已经相当令人印象深刻，但你想要一些用户交互，询问用户应该将\
    \ Pi 计算到多少位小数。\n\n### 步骤 6\n\n你可以在 Pi 计算的定义命令之前插入一行输入。它需要是一个整数，否则默认会是字符串。我们可以称它为\
    \ `numberofdigits` 并使用 `getcontext` 函数：\n\n```\npython\nnumberofdigits = int(input(\"\
    please enter the number of decimal places to calculate Pi to: \"))\ngetcontext().prec\
    \ = numberofdigits\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_57_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_57_1.png)"
