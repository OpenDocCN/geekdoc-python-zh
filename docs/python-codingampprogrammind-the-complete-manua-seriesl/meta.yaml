  md: '# Using the Math Module


    One of the most used modules you will come across is the Math module. As we''ve
    mentioned previously in this book, mathematics is the backbone of programming
    and there''s an incredible number of uses the Math module can have in your code.


    # E = MC^2


    The Math module provides access to a plethora of mathematical functions, from
    simply displaying the value of Pi, to helping you create complex 3D shapes.


    STEP 1 The Math module is built-in to Python 3; so there''s no need to PIP install
    it. As with the other modules present, you can import the module''s function by
    simply entering import math into the Shell, or as part of your code in the Editor.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_93_0.png)


    STEP 3 As you will no doubt be aware by now, if you know the name of the individual
    functions within the module you can specifically import them. For instance, the
    Floor and Ceil functions round down and up a float: from math import floor, ceil
    floor(1.2) # returns 1 ceil(1.2) # returns 2


    ![](img/2a94c98fce5df994fcecd950a995b8c9_93_1.png)


    STEP 2 Importing the Math module will give you access to the module''s code. From
    there, you can call up any of the available functions within Math by using math,
    followed by the name of the function in question. For example, enter: math.sin(2)
    This displays the sine of 2.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_93_2.png)


    STEP 4 The Math module can also be renamed as you import it, as with the other
    modules on offer within Python. This often saves time, but don''t forget to make
    a comment to show someone else looking at your code what you''ve done: import
    math as m m.trunc(123.45) # Truncate removes the fraction


    ![](img/2a94c98fce5df994fcecd950a995b8c9_93_3.png)'
  merge: -1
  pgno: 93
