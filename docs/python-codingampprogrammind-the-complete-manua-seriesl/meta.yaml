  md: "# STEP 6\n\nInterestingly, you can also use a function within the Random module\
    \ to shuffle the items in the list, thus adding a little more randomness into\
    \ the equation:\n\n```\nrandom.shuffle(lst)\nprint(lst)\n```\n\nThis way, you\
    \ can keep shuffling the list before displaying a random item from it.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_96_0.png)\n\
    \n# STEP 9\n\nLet's use an example piece of code which flips a virtual coin ten\
    \ thousand times and counts how many times it will land on heads or tails:\n\n\
    ```\nimport random\noutput={\"Heads\":0, \"Tails\":0}\ncoin=list(output.keys())\n\
    for i in range(10000):\n    output[random.choice(coin)]+=1\n\nprint(\"Heads:\"\
    , output[\"Heads\"])\nprint(\"Tails:\", output[\"Tails\"])\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_96_1.png)\n\
    \n# STEP 7\n\nUsing shuffle, you can create an entirely random list of numbers.\
    \ For example, within a given range:\n\n```\nimport random\nlst=[[i] for I in\
    \ range(20)]\nrandom.shuffle(lst)\nprint(lst)\n```\n\nKeep shuffling the list\
    \ and you can have a different selection of items from 0 to 20 every time.\n\n\
    ![](img/2a94c98fce5df994fcecd950a995b8c9_96_2.png)\n\n# STEP 10\n\nHere's an interesting\
    \ piece of code. Using a text file containing 466 thousand words, you can pluck\
    \ a user generated number of words from the file (text file found at: www.github.com/dwyl/english-words):\n\
    \n```\nimport random\n\nprint(\">>>>Random Word Finder<<<<<\")\nprint(\"\\nUsing\
    \ a 466K English word text file I can pick any words at random.\\n\")\n\nwds=int(input(\"\
    \\nHow many words shall I choose? \"))\n\nwith open(\"/home/pi/Downloads/words.txt\"\
    , \"rt\") as f:\n    words = f.readlines()\n    words = [w.rstrip() for w in words]\n\
    \nprint(\"---------------------\")\nfor w in random.sample(words, wds):\n    print(w)\n\
    print(\"---------------------\")\n```\n\n# STEP 8\n\nYou can also select a random\
    \ number from a given range in steps, using the start, stop, step loop:\n\n```\n\
    import random\nfor i in range(10):\n    print(random.randrange(0, 200, 7))\n```\n\
    \nResults will vary but you get the general idea as to how it works.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_96_3.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_96_4.png)"
