    ![image](img/2a94c98fce5df994fcecd950a995b8c9_61_0.png)


    Data is everything; it can topple governments, change election results, and tell
    us the secrets of the universe. Over these coming pages we look at how you can
    create lists, tuples, dictionaries and multi-dimensional lists, and then how you
    can use them to forge exciting and useful programs.


    In addition, you will learn how you can use the date and time functions, write
    to files to your system and even create graphical user interfaces that will take
    your coding skills to new levels and into new project ideas.


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_62_0.png)


    -   64 Lists

