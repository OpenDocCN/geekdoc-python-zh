    )\n        time.sleep(5)\n        exit()\n\nif __name__ == \"__main__\":\n   \
    \ start()\n```\n\n## Adventure Time\n\nThis, as you can see, is just the beginning\
    \ of the adventure and takes up a fair few lines of code. When you expand it,\
    \ and weave the story along, you'll find that you can repeat certain instances\
    \ such as a chance meeting with an enemy or the like.\n\nWe've created each of\
    \ the two encounters as a defined set of functions, along with a list of possible\
    \ choices under the cmdlist list, and cmd variable, of which is also a defined\
    \ function. Expanding on this is quite easy, just map out each encounter and choice\
