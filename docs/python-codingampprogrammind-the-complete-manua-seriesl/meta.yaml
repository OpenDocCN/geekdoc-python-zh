    ![](img/2a94c98fce5df994fcecd950a995b8c9_94_4.png)


    STEP 10: The wealth of mathematical functions available through the Math module
    is vast and covers everything from factors to infinity, powers to trigonometry
    and angular conversion to constants. Look up https://docs.python.org/3/library/math.html#
    for a list of available Math module functions.


