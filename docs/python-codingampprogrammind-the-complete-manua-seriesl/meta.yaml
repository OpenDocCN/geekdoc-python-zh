    ```


    # DISK COMMANDS


    Learn the two commands that enable you to view your disk space and the files on
    it: `df` (disk free space) and `du` (disk usage). With these two commands you
    can view the file usage on your SD card.


    STEP 1 Start by entering: `df` in the command line. It returns a list of the volumes
    contained on your SD card. You might be wondering what a volume is. It''s best
    to think of your SD card as the drive. This contains partitions, which is where
    you split one drive to act like two or more drives. And each partition can contain
    volumes, which are storage spaces.


    STEP 3 Now enter: `du`. You should see lots of text fly up the screen. This is
    the disk usage for the files contained in your home directory and their sub-directories.
    As with `df`, it is better to use `du` with the "-h" option to humanise the output.
    If you want to slow down the output, you''ll also need to pipe it through `less`.
    Enter: `df -h | less` to view the files and their respective usage one page at
    a time.


    ```

    pi@raspberrypi ~ $ df

    Filesystem     1K-blocks   Used Available Use% Mounted on

    rootfs          6581636 3484164   2740096  56% /

    /dev/root       6581636 3484164   2740096  56% /

    devtmpfs         437856       0    437856   0% /dev

    tmpfs             88432     260     88172   1% /run

    tmpfs              5120       0      5120   0% /run/lock

    tmpfs            176860       0    176860   0% /run/shm

    /dev/mmcblk0p5    60479   14536     45943  25% /boot

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ df -h

    Filesystem      Size  Used Avail Use% Mounted on

    rootfs          6.3G  3.4G  2.7G  56% /

    /dev/root       6.3G  3.4G  2.7G  56% /

    devtmpfs        428M     0  428M   0% /dev

    tmpfs            87M  260K   87M   1% /run

    tmpfs           5.0M     0  5.0M   0% /run/lock

    tmpfs           173M     0  173M   0% /run/shm

    /dev/mmcblk0p5   60M   15M   45M  25% /boot

    pi@raspberrypi ~ $

    ```


    STEP 2 Enter: `df -h` to get the list in human readable form. The first two lines
    should read "rootfs" and "/dev/root" and have matching Size, Used, Avail and Use%
    listings. This is the main drive, and is an indication of how much space you have
    used, and have free, on your Raspbian OS. The other volumes are for booting and
    initialising devices (you can ignore these for now).


    STEP 4 You don''t typically enter: `du` on its own; most of the time you want
