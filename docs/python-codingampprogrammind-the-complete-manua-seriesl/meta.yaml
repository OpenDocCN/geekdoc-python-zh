    Inactive(file):  29844 kB\nUnevictable:         0 kB\nMlocked:             0 kB\n\
    SwapTotal:      102396 kB\nSwapFree:       102396 kB\nDirty:              36 kB\n\
    Writeback:           0 kB\nAnonPages:       11132 kB\nMapped:           7464 kB\n\
    Shmem:             260 kB\nSlab:            10304 kB\nSReclaimable:     4512 kB\n\
    SUnreclaim:       5872 kB\nKernelStack:       672 kB\nPageTables:        564 kB\n\
    NFS_Unstable:        0 kB\nBounce:              0 kB\nWritebackTmp:        0 kB\n\
    CommitLimit:    544548 kB\nCommitted_AS:    43712 kB\nVmallocTotal:   1171456\
    \ kB\nVmallocUsed:      3880 kB\nVmallocChunk:    922360 kB\npi@raspberrypi ~\
    \ $ cat /proc/partitions\nmajor minor  #blocks  name\n\n 179        0    7761920\
    \ mmcblk0\n 179        1     835890 mmcblk0p1\n 179        2          1 mmcblk0p2\n\
    ```\n\nSTEP 4 Enter: `uname -a` to view some more detailed information. Here you'll\
    \ see the kernel name, hostname and kernel version (3.18.7-v7 on ours). If you\
