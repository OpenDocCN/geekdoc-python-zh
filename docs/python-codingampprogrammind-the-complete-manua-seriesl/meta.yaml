    # Copying, Moving and Renaming Files


    Taking command of the Terminal is essential when learning how your Raspberry Pi’s
    operating system works. The copying, moving and renaming of files is equally important,
    as you’ll be doing a lot of this throughout your Pi projects.


    # USING THE MOVE COMMAND


    In Linux, renaming a file is simply moving it from one name to another and copying
    a file is moving it without deleting the original. Don’t panic, it’s quite easy
    to master.


    **STEP 1** Before we can move anything around, we need to have a few test items
    in our home directory. Enter: `touch testfile` and `mkdir testdir` to create a
    test file and test directory in your home directory. Enter: `ls` to check that
    they are both present.


    **STEP 3** Enter: `mv testfile testdir` and press return to move the testfile
    document into the testdir directory. Enter: `ls` to see that it’s no longer in
    the home directory, and `ls testdir` to see the testfile now sitting in the testdir
    directory. Now enter: `mkdir newparent` to create a new directory.


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ mkdir testdir

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scra

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scra

    pi@raspberrypi ~ $ mv testfile testdir

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scra

    pi@raspberrypi ~ $ ls testdir

    testfile

    pi@raspberrypi ~ $

    ```


    **STEP 2** Files and directories are moved using the `mv` command. This is different
    to the commands we’ve looked at so far because it has two arguments (remember
    Linux command line is command, option, argument). The first argument is the source
    (the file or directory to be moved) and the second is the destination.


    **STEP 4** Directories with files are moved in the same way. Enter: `mv testdir
    newparent` to move the testdir directory inside the newparent directory. Let’s
    move into the directory to find the file. Enter: `cd /newparent/testdir` and enter:
    `ls` to view the testfile sitting inside the directory.


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scra

    pi@raspberrypi ~ $ mv testfile testdir

    ```


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scra

    pi@raspberrypi ~ $ mkdir newparent

    pi@raspberrypi ~ $ mv testdir newparent

    pi@raspberrypi ~ $ cd newparent/testdir

    pi@raspberrypi ~/newparent/testdir $ ls

    testfile

    pi@raspberrypi ~/newparent/testdir $

    ```'
- md: "## Copying, Moving and Renaming Files\n\nSTEP 5 Files and directories can be\
    \ moved up using the double dot (“..”) as an argument. Enter: `ls -la` to view\
    \ your testfile and the single and double dot files. The single dot is the current\
    \ directory and the double dot is the parent directory. Enter: `mv testfile ..`\
    \ to move the testfile up into the newparent directory. Enter: `cd ..` to move\
    \ up to the parent directory.\n\n```bash\npi@raspberrypi ~/newparent $ cd ~\n\
    pi@raspberrypi ~ $ ls\nDesktop Documents Downloads indiecity newparent python_\n\
    pi@raspberrypi ~ $ mv newparent/testfile newparent/testdir/\npi@raspberrypi ~\
    \ $ ls newparent/testdir\ntestfile\npi@raspberrypi ~ $\n```\n\nSTEP 6 You can\
    \ also move files using longer paths. Enter: `cd ~` to return to the home directory\
    \ and `mv newparent/testfile newparent/testdir/testfile` to move the testfile\
    \ from its current location back inside the testdir directory. Enter: `ls newparent/testdir`\
    \ to view the file back in its current directory.\n\n```bash\npi@raspberrypi ~/newparent\
    \ $ cd ~\npi@raspberrypi ~ $ ls\nDesktop Documents Downloads indiecity newparent\
    \ python_\npi@raspberrypi ~ $ mv newparent/testfile newparent/testdir/\npi@raspberrypi\
    \ ~ $ ls newparent/testdir\ntestfile\npi@raspberrypi ~ $\n```\n\n## RENAMING FILES\
    \ AND DIRECTORIES\n\nThe mv command isn't used just to move files; it also serves\
    \ the purpose of renaming files (effectively it moves it from its old name to\
    \ a new name). Let's see how to use mv to rename items.\n\nSTEP 1 Let's start\
    \ by making a new test file called “names”. Enter: `touch testfile` and then `ls`\
    \ to make sure the testfile is present. We're going to turn this into a file that\
    \ contains the names of some people. So let's call it something more appropriate,\
    \ like “names”.\n\n```bash\npi@raspberrypi ~ $ ls\nDesktop Documents Downloads\
    \ indiecity newparent python_\npi@raspberrypi ~ $ touch testfile\npi@raspberrypi\
    \ ~ $ ls\nDesktop Documents Downloads indiecity newparent python_\npi@raspberrypi\
    \ ~ $ mv testfile names\npi@raspberrypi ~ $ ls\nDesktop Documents Downloads indiecity\
    \ names python_\npi@raspberrypi ~ $\n```\n\nSTEP 2 Enter: `mv testfile names`\
    \ and `ls`. Now we can see the new “names” file in our directory. The mv command\
    \ can also be used to rename directories. We should still have our newparent directory\
    \ in our home directory. Enter: `mv newparent people` to rename the newparent\
    \ directory. Enter: `ls` to view it.\n\n```bash\npi@raspberrypi ~ $ touch testfile\n\
    pi@raspberrypi ~ $ ls\nDesktop Documents Downloads indiecity newparent python_\n\
    pi@raspberrypi ~ $ mv newparent people\npi@raspberrypi ~ $ ls\nDesktop Documents\
    \ Downloads indiecity people python_\npi@raspberrypi ~ $\n```\n\nSTEP 3 You can\
    \ rename directories inside other directories using paths. Let's rename the testdir\
    \ directory, which is now inside the people directory. Enter: `mv names/testdir\
    \ names/friends`. Now enter: `mv names people/friends` to move the names file\
    \ inside the friends directory.\n\n```bash\npi@raspberrypi ~ $ ls\nDesktop Documents\
    \ Downloads indiecity names people python_\npi@raspberrypi ~ $ mv people/testdir\
    \ people/friends\npi@raspberrypi ~ $\n```\n\nSTEP 4 It is easy to overwrite files\
    \ using the mv command, so if you have files with the same name use the “-n” option,\
    \ which stands for “no overwrite”. Enter: `touch testfile` to create a new file\
    \ and `mv -n testfile people/friends`. There's no error report though, enter:\
    \ `ls` and you'll find testfile still there.\n\n```bash\npi@raspberrypi ~ $ touch\
    \ testfile\npi@raspberrypi ~ $ mv -n testfile people/friends\npi@raspberrypi ~\
    \ $ ls\nDesktop Documents Downloads indiecity people python_\npi@raspberrypi ~\
    \ $ ls people/friends\nnames testfile\npi@raspberrypi ~ $\n```\n\n## Useful System\
    \ and Disk Commands\n\nUnderstanding these core Linux commands will enable you\
    \ to not only master the inner workings of your Raspberry Pi but also to transfer\
    \ those skills to other Linux distros, such as Ubuntu or Linux Mint.\n\n## LOTS\
    \ OF LINUX\n\nLinux is a huge and versatile command line language and there are\
    \ hundreds of commands you can learn and use. Here are a few that can help you\
    \ get more from your Raspberry Pi.\n\nSTEP 1 The Raspberry Pi is a great little\
    \ computer, so let's start by getting some information. Enter: `cat /proc/cpuinfo`\
    \ to view some details on your Raspberry Pi processors. If you have a Raspberry\
    \ Pi 3 you will see four processors, along with the model name and other info.\n\
    \n```\npi@raspberrypi ~ $ cat /proc/cpuinfo\nprocessor\t: 0\nmodel name\t: ARMv7\
    \ Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t: half thumb fastmult vfp\
    \ edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\nCPU implementer\t\
    : 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t: 0xc07\nCPU revision\t\
    : 5\n\nprocessor\t: 1\nmodel name\t: ARMv7 Processor rev 5 (v7l)\nBogoMIPS\t:\
    \ 38.40\nFeatures\t: half thumb fastmult vfp edsp neon vfpv3 tls vfpv4 idiva idivt\
    \ vfpd32 lpae evtstrm\nCPU implementer\t: 0x41\nCPU architecture: 7\nCPU variant\t\
    : 0x0\nCPU part\t: 0xc07\nCPU revision\t: 5\n\nprocessor\t: 2\nmodel name\t: ARMv7\
    \ Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t: half thumb fastmult vfp\
    \ edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\nCPU implementer\t\
    : 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t: 0xc07\nCPU revision\t\
    : 5\n```\n\nSTEP 2 Remember that cat is used to list the contents of a text file,\
    \ which is what cpuinfo is. There are other text files with system info available.\
    \ Try `cat /proc/meminfo` to get information about your memory, `cat /proc/partitions`\
    \ for information about your SD card, and `cat /proc/version` shows which version\
    \ of Raspberry Pi you are using.\n\n```\npi@raspberrypi ~ $ cat /proc/meminfo\n\
    MemTotal:       884304 kB\nMemFree:        704576 kB\nMemAvailable:   834088 kB\n\
    Buffers:         11660 kB\nCached:          56340 kB\nSwapCached:          0 kB\n\
    Active:          49148 kB\nInactive:        30072 kB\nActive(anon):    11256 kB\n\
    Inactive(anon):    220 kB\nActive(file):    37892 kB\nInactive(file):  29844 kB\n\
    Unevictable:         0 kB\nMlocked:             0 kB\nSwapTotal:      102396 kB\n\
    SwapFree:       102396 kB\nDirty:              36 kB\nWriteback:           0 kB\n\
    AnonPages:       11132 kB\nMapped:           7464 kB\nShmem:             260 kB\n\
    Slab:            10304 kB\nSReclaimable:     4512 kB\nSUnreclaim:       5872 kB\n\
    KernelStack:       672 kB\nPageTables:        564 kB\nNFS_Unstable:        0 kB\n\
    Bounce:              0 kB\nWritebackTmp:        0 kB\nCommitLimit:    544548 kB\n\
    Committed_AS:    43712 kB\nVmallocTotal:   1171456 kB\nVmallocUsed:      3880\
    \ kB\nVmallocChunk:    922360 kB\npi@raspberrypi ~ $ cat /proc/partitions\nmajor\
    \ minor  #blocks  name\n\n 179        0    7761920 mmcblk0\n 179        1    \
    \ 835890 mmcblk0p1\n 179        2          1 mmcblk0p2\n```\n\nSTEP 3 Enter: `uname`\
    \ to view the name of the operating system's kernel, this is the element that\
    \ sits between the interface and hardware. Just as you would suspect, the response\
    \ from the command is Linux, as Raspbian is a Linux distro, which in itself is\
    \ based on another Linux distro called Debian. While it may sound complicated,\
    \ it actually demonstrates how versatile Linux is.\n\n```\npi@raspberrypi ~ $\
    \ uname\nLinux\npi@raspberrypi ~ $\n```\n\nSTEP 4 Enter: `uname -a` to view some\
    \ more detailed information. Here you'll see the kernel name, hostname and kernel\
    \ version (3.18.7-v7 on ours). If you have a Raspberry Pi 2 you'll see SMP (symmetric\
    \ multiprocessing), followed by the system date, CPU architecture and operating\
    \ system (GNU/Linux).\n\n```\npi@raspberrypi ~ $ uname\nLinux\npi@raspberrypi\
    \ ~ $ uname -a\nLinux raspberrypi 3.18.7-v7+ #755 SMP PREEMPT Thu Feb 12 17:14:31\
    \ GMT 2015 armv7l GNU/Linux\npi@raspberrypi ~ $\n```\n\nSTEP 5 Enter: `vcgencmd\
    \ measure_temp` to view the current operating system temperature of your Raspberry\
    \ Pi. Enter: `vcgencmd get_mem arm` to view the RAM available, and `vcgencmd get_mem\
    \ gpu` to view the memory available to the graphics chip. Finally try `lsusb`\
    \ to view a list of attached USB devices.\n\nSTEP 6 One command you might be wondering\
    \ about is how to switch off or restart your Raspberry Pi from the command line.\
    \ Don't just hit the power switch. Enter: `sudo shutdown -h now` to shut down\
    \ the Raspberry Pi (the “-h” option stands for “halt”), or enter: `sudo shutdown\
    \ -r now` to restart your Raspberry Pi.\n\n```\npi@raspberrypi ~ $ vcgencmd measure_temp\n\
    temp=36.9'C\npi@raspberrypi ~ $ vcgencmd get_mem arm\narm=880M\npi@raspberrypi\
    \ ~ $ vcgencmd get_mem gpu\ngpu=128M\npi@raspberrypi ~ $ lsusb\nBus 001 Device\
    \ 002: ID 0424:9514 Standard Microsystems Corp.\nBus 001 Device 001: ID 1d6b:0002\
    \ Linux Foundation 2.0 root hub\nBus 001 Device 003: ID 0424:ec00 Standard Microsystems\
    \ Corp.\nBus 001 Device 004: ID 04d9:1503 Holtek Semiconductor, Inc. Shortboard\
    \ Lefty\nBus 001 Device 005: ID 1a40:0101 Terminus Technology Inc. 4-Port HUB\n\
    Bus 001 Device 006: ID 276d:1105\npi@raspberrypi ~ $\n```\n\n```\npi@raspberrypi\
    \ ~ $ sudo shutdown -r now\n\nBroadcast message from root@raspberrypi (tty1) (Thu\
    \ May 14 12:20:29 2015):\n\nThe system is going down for reboot NOW!\n-\n```\n\
    \n## DISK COMMANDS\n\nLearn the two commands that enable you to view your disk\
    \ space and the files on it: `df` (disk free space) and `du` (disk usage). With\
    \ these two commands you can view the file usage on your SD card.\n\nSTEP 1 Start\
    \ by entering: `df` in the command line. It returns a list of the volumes contained\
    \ on your SD card. You might be wondering what a volume is. It's best to think\
    \ of your SD card as the drive. This contains partitions, which is where you split\
    \ one drive to act like two or more drives. And each partition can contain volumes,\
    \ which are storage spaces.\n\nSTEP 2 Enter: `df -h` to get the list in human\
    \ readable form. The first two lines should read “rootfs” and “/dev/root” and\
    \ have matching Size, Used, Avail and Use% listings. This is the main drive, and\
    \ is an indication of how much space you have used, and have free, on your Raspbian\
    \ OS. The other volumes are for booting and initialising devices (you can ignore\
    \ these for now).\n\n```\npi@raspberrypi ~ $ df\nFilesystem     1K-blocks   Used\
    \ Available Use% Mounted on\nrootfs          6581636 3484164   2740096  56% /\n\
    /dev/root       6581636 3484164   2740096  56% /\ndevtmpfs         437856    \
    \   0    437856   0% /dev\ntmpfs             88432     260     88172   1% /run\n\
    tmpfs              5120       0      5120   0% /run/lock\ntmpfs            176860\
    \       0    176860   0% /run/shm\n/dev/mmcblk0p5    60479   14536     45943 \
    \ 25% /boot\npi@raspberrypi ~ $\n```\n\n```\npi@raspberrypi ~ $ df -h\nFilesystem\
    \      Size  Used Avail Use% Mounted on\nrootfs          6.3G  3.4G  2.7G  56%\
    \ /\n/dev/root       6.3G  3.4G  2.7G  56% /\ndevtmpfs        428M     0  428M\
    \   0% /dev\ntmpfs            87M  260K   87M   1% /run\ntmpfs           5.0M\
    \     0  5.0M   0% /run/lock\ntmpfs           173M     0  173M   0% /run/shm\n\
    /dev/mmcblk0p5   60M   15M   45M  25% /boot\npi@raspberrypi ~ $\n```\n\nSTEP 3\
    \ Now enter: `du`. You should see lots of text fly up the screen. This is the\
    \ disk usage for the files contained in your home directory and their sub-directories.\
    \ As with `df`, it is better to use `du` with the “-h” option to humanise the\
    \ output. If you want to slow down the output, you'll also need to pipe it through\
    \ `less`. Enter: `du -h | less` to view the files and their respective usage one\
    \ page at a time.\n\n```\npi@raspberrypi ~ $ du -h | less\n22M    ./.minecraft/games/com.mojang/minecraftWorlds/world\n\
    22M    ./.minecraft/games/com.mojang/minecraftWorlds\n22M    ./.minecraft/games/com.mojang\n\
    22M    ./.minecraft/games\n4.0K   ./.pulse\n16K    ./.config/gedit\n8.0K   ./.config/libfm\n\
    1.4M   ./.config/epiphany/adblock\n1.5M   ./.config/epiphany\n8.0K   ./.config/lxsession/LXDE-pi\n\
    12K    ./.config/lxsession\n8.0K   ./.config/dconf\n8.0K   ./.config/rncbc.org\n\
    8.0K   ./.config/lxterminal\n8.0K   ./.config/uk.ac.cam.cl\n8.0K   ./.config/IndieCity\n\
    ```\n\nSTEP 4 You don't typically enter: `du` on its own; most of the time you\
    \ want to view the disk usage of a specific directory. Enter: `du -h python_games`\
    \ to view how much space the python_games directory (installed alongside Raspbian)\
    \ takes up. It should be 1.8M. If you want a more comprehensive breakdown of the\
    \ files contained, use the “-a” option (all). Enter: `du -ha python_games` to\
    \ view all the files contained and their disk usage.\n\n```\npi@raspberrypi ~\
    \ $ ls\nDesktop  Documents  Downloads  indiecity  people  python_games  Scratch\
    \  testfile\npi@raspberrypi ~ $ du -h python_games\n1.8M    python_games\npi@raspberrypi\
    \ ~ $ du -ha python_games\n12K     python_games/RedSelector.png\n12K     python_games/4row_board.png\n\
    12K     python_games/Star.png\n28K     python_games/4row_humanwinner.png\n12K\
    \     python_games/Wall_Block_Tall.png\n8.0K    python_games/princess.png\n12K\
    \     python_games/Selector.png\n8.0K    python_games/4row_black.png\n4.0K   \
    \ python_games/catanimation.py\n20K     python_games/flippy.py\n36K     python_games/match3.wav\n\
    24K     python_games/starpusher.py\n```"
  mdcn: "## 复制、移动和重命名文件\n\n**步骤 5** 可以使用双点（“..”）作为参数来向上移动文件和目录。输入：`ls -la` 以查看您的 testfile\
    \ 以及单点和双点文件。单点表示当前目录，双点表示父目录。输入：`mv testfile ..` 将 testfile 向上移动到新的父目录（newparent）中。输入：`cd\
    \ ..` 移动到父目录。\n\n```bash\npi@raspberrypi ~/newparent $ cd ~\npi@raspberrypi ~\
    \ $ ls\nDesktop Documents Downloads indiecity newparent python_\npi@raspberrypi\
    \ ~ $ mv newparent/testfile newparent/testdir/\npi@raspberrypi ~ $ ls newparent/testdir\n\
    testfile\npi@raspberrypi ~ $\n```\n\n**步骤 6** 您也可以使用更长的路径来移动文件。输入：`cd ~` 返回主目录，并输入\
    \ `mv newparent/testfile newparent/testdir/testfile` 将 testfile 从其当前位置移回 testdir\
    \ 目录内。输入：`ls newparent/testdir` 查看文件是否已回到其当前目录。\n\n```bash\npi@raspberrypi ~/newparent\
    \ $ cd ~\npi@raspberrypi ~ $ ls\nDesktop Documents Downloads indiecity newparent\
    \ python_\npi@raspberrypi ~ $ mv newparent/testfile newparent/testdir/\npi@raspberrypi\
    \ ~ $ ls newparent/testdir\ntestfile\npi@raspberrypi ~ $\n```\n\n## 重命名文件和目录\n\
    \nmv 命令不仅用于移动文件；它也用于重命名文件（实际上是将文件从其旧名称移动到一个新名称）。让我们看看如何使用 mv 来重命名项目。\n\n**步骤 1**\
    \ 让我们首先创建一个名为“names”的新测试文件。输入：`touch testfile`，然后输入 `ls` 以确保 testfile 存在。我们将把它变成一个包含一些人名的文件。所以让我们给它一个更合适的名称，比如“names”。\n\
    \n```bash\npi@raspberrypi ~ $ ls\nDesktop Documents Downloads indiecity newparent\
    \ python_\npi@raspberrypi ~ $ touch testfile\npi@raspberrypi ~ $ ls\nDesktop Documents\
    \ Downloads indiecity newparent python_\npi@raspberrypi ~ $ mv testfile names\n\
    pi@raspberrypi ~ $ ls\nDesktop Documents Downloads indiecity names python_\npi@raspberrypi\
    \ ~ $\n```\n\n**步骤 2** 输入：`mv testfile names` 和 `ls`。现在我们可以在目录中看到新的“names”文件。mv\
    \ 命令也可以用来重命名目录。我们的主目录中应该仍然有 newparent 目录。输入：`mv newparent people` 将 newparent\
    \ 目录重命名。输入：`ls` 查看它。\n\n```bash\npi@raspberrypi ~ $ touch testfile\npi@raspberrypi\
    \ ~ $ ls\nDesktop Documents Downloads indiecity newparent python_\npi@raspberrypi\
    \ ~ $ mv newparent people\npi@raspberrypi ~ $ ls\nDesktop Documents Downloads\
    \ indiecity people python_\npi@raspberrypi ~ $\n```\n\n**步骤 3** 您可以使用路径重命名其他目录内的目录。让我们重命名\
    \ testdir 目录，它现在在 people 目录内。输入：`mv names/testdir names/friends`。然后输入：`mv names\
    \ people/friends` 将 names 文件移动到 friends 目录内。\n\n```bash\npi@raspberrypi ~ $ ls\n\
    Desktop Documents Downloads indiecity names people python_\npi@raspberrypi ~ $\
    \ mv people/testdir people/friends\npi@raspberrypi ~ $\n```\n\n**步骤 4** 使用 mv\
    \ 命令很容易覆盖文件，因此如果您有同名文件，请使用“-n”选项，它代表“不覆盖”。输入：`touch testfile` 创建一个新文件，并输入 `mv\
    \ -n testfile people/friends`。虽然没有错误报告，但输入：`ls` 会发现 testfile 仍然存在。\n\n```bash\n\
    pi@raspberrypi ~ $ touch testfile\npi@raspberrypi ~ $ mv -n testfile people/friends\n\
    pi@raspberrypi ~ $ ls\nDesktop Documents Downloads indiecity people python_\n\
    pi@raspberrypi ~ $ ls people/friends\nnames testfile\npi@raspberrypi ~ $\n```\n\
    \n## 实用的系统和磁盘命令\n\n理解这些核心 Linux 命令将使您不仅能掌握树莓派的内部工作原理，还能将这些技能转移到其他 Linux 发行版，例如\
    \ Ubuntu 或 Linux Mint。\n\n## 大量的 Linux 命令\n\nLinux 是一种庞大而多功能的命令行语言，有数百个命令可供您学习和使用。以下是一些能帮助您更好地利用树莓派的命令。\n\
    \n**步骤 1** 树莓派是一台很棒的小电脑，让我们首先获取一些信息。输入：`cat /proc/cpuinfo` 查看您的树莓派处理器的一些详细信息。如果您使用的是树莓派\
    \ 3，您将看到四个处理器，以及型号名称和其他信息。\n\n```\npi@raspberrypi ~ $ cat /proc/cpuinfo\nprocessor\t\
    : 0\nmodel name\t: ARMv7 Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t\
    : half thumb fastmult vfp edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\n\
    CPU implementer\t: 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t:\
    \ 0xc07\nCPU revision\t: 5\n\nprocessor\t: 1\nmodel name\t: ARMv7 Processor rev\
    \ 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t: half thumb fastmult vfp edsp neon vfpv3\
    \ tls vfpv4 idiva idivt vfpd32 lpae evtstrm\nCPU implementer\t: 0x41\nCPU architecture:\
    \ 7\nCPU variant\t: 0x0\nCPU part\t: 0xc07\nCPU revision\t: 5\n\nprocessor\t:\
    \ 2\nmodel name\t: ARMv7 Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t\
    : half thumb fastmult vfp edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\n\
    CPU implementer\t: 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t:\
    \ 0xc07\nCPU revision\t: 5\n```\n\n**步骤 2** 请记住，`cat` 用于列出文本文件的内容，而 cpuinfo 就是这样一个文件。还有其他包含系统信息的文本文件可用。尝试\
    \ `cat /proc/meminfo` 获取有关内存的信息，`cat /proc/partitions` 获取有关 SD 卡的信息，`cat /proc/version`\
    \ 显示您正在使用的树莓派版本。\n\n```\npi@raspberrypi ~ $ cat /proc/meminfo\nMemTotal:     \
    \  884304 kB\nMemFree:        704576 kB\nMemAvailable:   834088 kB\nBuffers: \
    \        11660 kB\nCached:          56340 kB\nSwapCached:          0 kB\nActive:\
    \          49148 kB\nInactive:        30072 kB\nActive(anon):    11256 kB\nInactive(anon):\
    \    220 kB\nActive(file):    37892 kB\nInactive(file):  29844 kB\nUnevictable:\
    \         0 kB\nMlocked:             0 kB\nSwapTotal:      102396 kB\nSwapFree:\
    \       102396 kB\nDirty:              36 kB\nWriteback:           0 kB\nAnonPages:\
    \       11132 kB\nMapped:           7464 kB\nShmem:             260 kB\nSlab:\
    \            10304 kB\nSReclaimable:     4512 kB\nSUnreclaim:       5872 kB\n\
    KernelStack:       672 kB\nPageTables:        564 kB\nNFS_Unstable:        0 kB\n\
    Bounce:              0 kB\nWritebackTmp:        0 kB\nCommitLimit:    544548 kB\n\
    Committed_AS:    43712 kB\nVmallocTotal:   1171456 kB\nVmallocUsed:      3880\
    \ kB\nVmallocChunk:    922360 kB\npi@raspberrypi ~ $ cat /proc/partitions\nmajor\
    \ minor  #blocks  name\n\n 179        0    7761920 mmcblk0\n 179        1    \
    \ 835890 mmcblk0p1\n 179        2          1 mmcblk0p2\n```\n\n**步骤 3** 输入：`uname`\
    \ 查看操作系统内核的名称，这是位于接口和硬件之间的元素。正如您所预料的，该命令的响应是 Linux，因为 Raspbian 是一个 Linux 发行版，而它本身又基于另一个名为\
    \ Debian 的 Linux 发行版。虽然这听起来可能很复杂，但它实际上展示了 Linux 的多功能性。\n\n```\npi@raspberrypi\
    \ ~ $ uname\nLinux\npi@raspberrypi ~ $\n```\n\n**步骤 4** 输入：`uname -a` 查看更详细的信息。在这里您将看到内核名称、主机名和内核版本（我们的版本是\
    \ 3.18.7-v7）。如果您使用的是树莓派 2，您会看到 SMP（对称多处理），然后是系统日期、CPU 架构和操作系统（GNU/Linux）。\n\n\
    ```\npi@raspberrypi ~ $ uname\nLinux\npi@raspberrypi ~ $ uname -a\nLinux raspberrypi\
    \ 3.18.7-v7+ #755 SMP PREEMPT Thu Feb 12 17:14:31 GMT 2015 armv7l GNU/Linux\n\
    pi@raspberrypi ~ $\n```\n\n**步骤 5** 输入：`vcgencmd measure_temp` 查看树莓派当前的操作系统温度。输入：`vcgencmd\
    \ get_mem arm` 查看可用的 RAM，并输入 `vcgencmd get_mem gpu` 查看图形芯片可用的内存。最后尝试 `lsusb` 查看连接的\
    \ USB 设备列表。\n\n**步骤 6** 您可能想知道如何从命令行关闭或重启树莓派。不要只是直接关闭电源开关。输入：`sudo shutdown -h\
    \ now` 关闭树莓派（“-h”选项代表“halt”，即停机），或者输入：`sudo shutdown -r now` 重启树莓派。\n\n```\npi@raspberrypi\
    \ ~ $ vcgencmd measure_temp\ntemp=36.9'C\npi@raspberrypi ~ $ vcgencmd get_mem\
    \ arm\narm=880M\npi@raspberrypi ~ $ vcgencmd get_mem gpu\ngpu=128M\npi@raspberrypi\
    \ ~ $ lsusb\nBus 001 Device 002: ID 0424:9514 Standard Microsystems Corp.\nBus\
    \ 001 Device 001: ID 1d6b:0002 Linux Foundation 2.0 root hub\nBus 001 Device 003:\
    \ ID 0424:ec00 Standard Microsystems Corp.\nBus 001 Device 004: ID 04d9:1503 Holtek\
    \ Semiconductor, Inc. Shortboard Lefty\nBus 001 Device 005: ID 1a40:0101 Terminus\
    \ Technology Inc. 4-Port HUB\nBus 001 Device 006: ID 276d:1105\npi@raspberrypi\
    \ ~ $\n```\n\n```\npi@raspberrypi ~ $ sudo shutdown -r now\n\nBroadcast message\
    \ from root@raspberrypi (tty1) (Thu May 14 12:20:29 2015):\n\nThe system is going\
    \ down for reboot NOW!\n-\n```\n\n## 磁盘命令\n\n学习两个命令，使您可以查看磁盘空间及其上的文件：`df`（磁盘空闲空间）和\
    \ `du`（磁盘使用情况）。使用这两个命令，您可以查看 SD 卡上的文件使用情况。\n\n**步骤 1** 首先在命令行中输入：`df`。它返回 SD 卡上包含的卷列表。您可能想知道什么是卷。最好将您的\
    \ SD 卡视为驱动器。它包含分区，即您将一个驱动器划分成像两个或更多驱动器一样工作的部分。每个分区可以包含卷，也就是存储空间。\n\n**步骤 2** 输入：`df\
    \ -h` 以人类可读的形式获取列表。前两行应该显示为“rootfs”和“/dev/root”，并且大小、已用、可用和使用率%列表相匹配。这是主驱动器，它表示您的\
    \ Raspbian 操作系统上已使用和空闲的空间量。其他卷用于启动和初始化设备（您现在可以忽略这些）。\n\n```\npi@raspberrypi ~\
    \ $ df\nFilesystem     1K-blocks   Used Available Use% Mounted on\nrootfs    \
    \      6581636 3484164   2740096  56% /\n/dev/root       6581636 3484164   2740096\
    \  56% /\ndevtmpfs         437856       0    437856   0% /dev\ntmpfs         \
    \    88432     260     88172   1% /run\ntmpfs              5120       0      5120\
    \   0% /run/lock\ntmpfs            176860       0    176860   0% /run/shm\n/dev/mmcblk0p5\
    \    60479   14536     45943  25% /boot\npi@raspberrypi ~ $\n```\n\n```\npi@raspberrypi\
    \ ~ $ df -h\nFilesystem      Size  Used Avail Use% Mounted on\nrootfs        \
    \  6.3G  3.4G  2.7G  56% /\n/dev/root       6.3G  3.4G  2.7G  56% /\ndevtmpfs\
    \        428M     0  428M   0% /dev\ntmpfs            87M  260K   87M   1% /run\n\
    tmpfs           5.0M     0  5.0M   0% /run/lock\ntmpfs           173M     0  173M\
    \   0% /run/shm\n/dev/mmcblk0p5   60M   15M   45M  25% /boot\npi@raspberrypi ~\
    \ $\n```\n\n**步骤 3** 现在输入：`du`。您应该会看到大量的文本在屏幕上滚动。这是您主目录及其子目录中包含的文件的磁盘使用情况。与 `df`\
    \ 类似，最好将 `du` 与“-h”选项一起使用，以使输出更人性化。如果您想减慢输出速度，还需要将其通过 `less` 管道传输。输入：`du -h |\
    \ less` 逐页查看文件及其相应的使用情况。\n\n```\npi@raspberrypi ~ $ du -h | less\n22M    ./.minecraft/games/com.mojang/minecraftWorlds/world\n\
    22M    ./.minecraft/games/com.mojang/minecraftWorlds\n22M    ./.minecraft/games/com.mojang\n\
    22M    ./.minecraft/games\n4.0K   ./.pulse\n16K    ./.config/gedit\n8.0K   ./.config/libfm\n\
    1.4M   ./.config/epiphany/adblock\n1.5M   ./.config/epiphany\n8.0K   ./.config/lxsession/LXDE-pi\n\
    12K    ./.config/lxsession\n8.0K   ./.config/dconf\n8.0K   ./.config/rncbc.org\n\
