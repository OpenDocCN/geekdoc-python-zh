    \ 2019)`\n`print(leaps)`\n\nThe result is 29, starting from 1904 onward.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_89_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_89_1.png)\n\n**STEP 2** You can see\
    \ that the days of September 2019 are displayed in a wall calendar fashion. Naturally\
    \ you can change the 2019, 9 part of the second line to any year and month you\
