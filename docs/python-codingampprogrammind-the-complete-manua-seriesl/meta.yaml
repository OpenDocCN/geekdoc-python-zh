  - "[PAGE 79]\n\n# Exceptions\n\nWhen coding, you'll naturally come across some issues\
    \ that are out of your control. Let's assume you ask a user to divide two numbers\
    \ and they try to divide by zero. This will create an error and break your code.\n\
    \n# EXCEPTIONAL OBJECTS\n\nRather than stop the flow of your code, Python includes\
    \ exception objects which handle unexpected errors in the code. You can combat\
    \ errors by creating conditions where exceptions may occur.\n\nSTEP 1 You can\
    \ create an exception error by simply trying to divide a number by zero. This\
    \ will report back with the ZeroDivisionError: Division by zero message, as seen\
    \ in the screenshot. The ZeroDivisionError part is the exception class, of which\
    \ there are many.\n\nSTEP 3 You can use the functions raise exception to create\
    \ our own error handling code within Python. Let's assume your code has you warping\
    \ around the cosmos, too much however results in a warp core breach. To stop the\
    \ game from exiting due to the warp core going supernova, you can create a custom\
    \ exception:\n\n```\nraise Exception(\"warp core breach\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_79_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_79_1.png)\n\nSTEP 2 Most exceptions\
    \ are raised automatically when Python comes across something that's inherently\
    \ wrong with the code. However, you can create your own exceptions that are designed\
    \ to contain the potential error and react to it, as opposed to letting the code\
    \ fail.\n\nSTEP 4 To trap any errors in the code you can encase the potential\
    \ error within a try: block. This block consists of try, except, else, where the\
    \ code is held within try:, then if there's an exception do something, else do\
    \ something else.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_79_2.png)\n\n```\n\
    try:\n    Insert your operations here ---->\nexcept Exception 1:\n    If there\
    \ is an exception do this ---->\nexcept Exception 2:\n    If there is another\
    \ exception do this ---->\nelse:\n    If there is no exception, then do this ---->\n\
    ```"
  - "[PAGE 80]\n\n# Exceptions\n\nSTEP 5 For example, use the divide by zero error.\
    \ You can create an exception where the code can handle the error without Python\
    \ quitting due to the problem:\n\n```\ntry:\n    a=int(input(\"Enter the first\
    \ number: \"))\n    b=int(input(\"Enter the second number: \"))\n    print(a/b)\n\
    except ZeroDivisionError:\n    print(\"You have tried to divide by zero!\")\n\
    else:\n    print(\"You didn't divide by zero. Well done!\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_0.png)\n\
    \nSTEP 8 Naturally, you can quickly fix the issue by changing the \"r\" read only\
    \ instance with a \"w\" for write. This, as you already know, will create the\
    \ file and write the content then commit the changes to the file. The end result\
    \ will report a different set of circumstances, in this case, a successful execution\
    \ of the code.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_1.png)\n\nSTEP 6\
    \ You can use exceptions to handle a variety of useful tasks. Using an example\
    \ from our previous tutorials, let's assume you want to open a file and write\
    \ to it:\n\n```\ntry:\n    txt = open(\"/home/pi/Documents/textfile.txt\", \"\
    r\")\n    txt.write(\"This is a test. Normal service will shortly resume!\")\n\
    except IOError:\n    print (\"Error: unable to write the file. Check permissions\"\
    )\nelse:\n    print (\"Content written to file successfully. Have a nice day.\"\
    )\n    txt.close()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_2.png)\n\
    \nSTEP 9 You can also use a finally: block, which works in a similar fashion but\
    \ you can't use else with it. To use our example from Step 6:\n\n```\ntry:\n \
    \   txt = open(\"/home/pi/Documents/textfile.txt\", \"r\")\n    try:\n       \
    \ txt.write(\"This is a test. Normal service will shortly resume!\")\n    finally:\n\
    \        print (\"Content written to file successfully. Have a nice day.\")\n\
    \        txt.close()\nexcept IOError:\n    print (\"Error: unable to write the\
    \ file. Check permissions\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_3.png)\n\
    \nSTEP 7 Obviously this won't work due to the file textfile.txt being opened as\
    \ read only (the \"r\" part). So in this case rather than Python telling you that\
    \ you're doing something wrong, you've created an exception using the IOError\
    \ class informing the user that the permissions are incorrect.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_4.png)\n\
    \nSTEP 10 As before an error will occur as you've used the \"r\" read-only permission.\
    \ If you change it to a \"w\", then the code will execute without the error being\
    \ displayed in the IDLE Shell. Needless to say, it can be a tricky getting the\
    \ exception code right the first time. Practise though, and you will get the hang\
    \ of it.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_80_5.png)"
- md: "## Python Graphics\n\nWhile dealing with text on the screen, either as a game\
    \ or in a program, is great, there will come a time when a bit of graphical representation\
    \ wouldn’t go amiss. Python 3 has numerous ways in which to include graphics and\
    \ they’re surprisingly powerful too.\n\n## GOING GRAPHICAL\n\nYou can draw simple\
    \ graphics, lines, squares and so on, or you can use one of the many Python modules\
    \ available, to bring out some spectacular effects.\n\n**STEP 1** One of the best\
    \ graphical modules to begin learning Python graphics is Turtle. The Turtle module\
    \ is, as the name suggests, based on the turtle robots used in many schools, that\
    \ can be programmed to draw something on a large piece of paper on the floor.\
    \ The Turtle module can be imported with: `import turtle`.\n\n**STEP 2** Let’s\
    \ begin by drawing a simple circle. Start a New File, then enter the following\
    \ code:\n\n```python\nimport turtle\n\nturtle.circle(50)\nturtle.getscreen()._root.mainloop()\n\
    ```\n\nAs usual press F5 to save the code and execute it. A new window will now\
    \ open up and the ‘Turtle’ will draw a circle.\n\n**STEP 3** The command `turtle.circle(50)`\
    \ is what draws the circle on the screen, with 50 being the size. You can play\
    \ around with the sizes if you like, going up to 100, 150 and beyond; you can\
    \ draw an arc by entering: `turtle.circle(50, 180)`, where the size is 50, but\
    \ you’re telling Python to only draw 180° of the circle.\n\n**STEP 4** The last\
    \ part of the circle code tells Python to keep the window where the drawing is\
    \ taking place to remain open, so the user can click to close it. Now, let’s make\
    \ a square:\n\n```python\nimport turtle\n\nprint(\"Drawing a square...\")\n\n\
    for t in range(4):\n    turtle.forward(100)\n    turtle.left(90)\nturtle.getscreen()._root.mainloop()\n\
    ```\n\nYou can see that we’ve inserted a loop to draw the sides of the square.\n\
    \n**STEP 5** You can add a new line to the square code to add some colour:\n`turtle.color(\"\
    Red\")`\nThen you can even change the character to an actual turtle by entering:\n\
    `turtle.shape(\"turtle\")`\nYou can also use the command `turtle.begin_fill()`,\
    \ and `turtle.end_fill()` to fill in the square with the chosen colours; red outline,\
    \ yellow fill in this case.\n\n**STEP 6** You can see that the Turtle module can\
    \ draw out some pretty good shapes and become a little more complex as you begin\
    \ to master the way it works. Enter this example:\nIt's a different method, but\
    \ very effective.\n\n```python\nfrom turtle import *\ncolor('red', 'yellow')\n\
    begin_fill()\nwhile True:\n    forward(200)\n    left(170)\n    if abs(pos())\
    \ < 1:\n        break\nend_fill()\ndone()\n```\n\n**STEP 7** Another way in which\
    \ you can display graphics is by using the Pygame module. There are numerous ways\
    \ in which pygame can help you output graphics to the screen but for now let's\
    \ look at displaying a predefined image. Start by opening a browser and finding\
    \ an image, then save it to the folder where you save your Python code.\n\n**STEP\
    \ 8** Now let's get the code by importing the Pygame module:\n\n```python\nimport\
    \ pygame\npygame.init()\n\nimg = pygame.image.load(\"RPi.png\")\n\nwhite = (255,\
    \ 255, 255)\nw = 900\nh = 450\nscreen = pygame.display.set_mode((w, h))\nscreen.fill((white))\n\
    \nscreen.fill((white))\nscreen.blit(img, (0,0))\npygame.display.flip()\n\nwhile\
    \ True:\n    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n\
    \            pygame.quit()\n```\n\n**STEP 9** In the previous step you imported\
    \ pygame, initiated the pygame engine and asked it to import our saved Raspberry\
    \ Pi logo image, saved as RPi.png. Next you defined the background colour of the\
    \ window to display the image and the window size as per the actual image dimensions.\
    \ Finally you have a loop to close the window.\n\n```python\nw = 900\nh = 450\n\
    screen = pygame.display.set_mode((w, h))\nscreen.fill((white))\n\nscreen.fill((white))\n\
    screen.blit(img, (0,0))\npygame.display.flip()\n\nwhile True:\n    for event in\
    \ pygame.event.get():\n        if event.type == pygame.QUIT:\n            pygame.quit()\n\
    ```\n\n**STEP 10** Press F5 to save and execute the code and your image will be\
    \ displayed in a new window. Have a play around with the colours, sizes and so\
    \ on and take time to look up the many functions within the Pygame module too.\n\
    \n## Combining What You Know So Far\n\nBased on what you've looked at over this\
    \ section, let's combine it all and come up with a piece of code that can easily\
    \ be applied into a real-world situation; or at the very least, something which\
    \ you can incorporate into your programs.\n\n## LOGGING IN\n\nFor this example,\
    \ let's look to a piece of code that creates user logins and then allows them\
    \ to log into the system and write the time they logged in at. You can even include\
    \ an option to quit the program by pressing 'q'.\n\n**STEP 1** Begin by importing\
    \ the Time module, creating a new dictionary to handle the usernames and passwords\
    \ and creating a variable to evaluate the current status of the program:\n\n```python\n\
    import time\nusers = {}\nstatus = \"\"\n```\n\n**STEP 2** Next you need to define\
    \ some functions. You can begin by creating the main menu, where all users will\
    \ return to after selecting the available options:\n\n```python\ndef mainMenu():\n\
    \    global status\n    status = input(\"Do you have a login account? y/n? Or\
    \ press q to quit.\")\n    if status == \"y\":\n        oldUser()\n    elif status\
    \ == \"n\":\n        newUser()\n    elif status == \"q\":\n        quit()\n```\n\
    \n**STEP 3** The global status statement separates a local variable from one that\
    \ can be called throughout the code, this way you can use the q=quit element without\
    \ it being changed inside the function. We've also referenced some newly defined\
    \ functions: oldUser and newUser which we'll get to next.\n\n```python\ndef mainMenu():\n\
    \    global status\n    status = input(\"Do you have a login account? y/n? Or\
    \ press q to quit.\")\n    if status == \"y\":\n        oldUser()\n    elif status\
    \ == \"n\":\n        newUser()\n    elif status == \"q\":\n        quit()\n```\n\
    \n**STEP 4** The newUser function is next:\n\n```python\ndef newUser():\n    createLogin\
    \ = input(\"Create a login name: \")\n    if createLogin in users:\n        print\
    \ (\"\\nLogin name already exists!\\n\")\n    else:\n        createPassw = input(\"\
    Create password: \")\n        users[createLogin] = createPassw\n        print(\"\
    \\nUser created!\\n\")\n        logins=open(\"/home/pi/Documents/logins.txt\"\
    , \"a\")\n        logins.write(\"\\n\" + createLogin + \" \" + createPassw)\n\
    \        logins.close()\n```\n\nThis creates a new user and password, and writes\
    \ the entries into a file called logins.txt.\n\n**STEP 5** You will need to specify\
    \ your own location for the logins.txt file, since we're using a Raspberry Pi.\
    \ Essentially, this adds the username and password inputs from the user to the\
    \ existing users{} dictionary, so the key and value structure remains: each user\
    \ is the key, the password is the value.\n\n```python\ndef newUser():\n    createLogin\
    \ = input(\"Create a login name: \")\n    if createLogin in users:\n        print\
    \ (\"\\nLogin name already exists!\\n\")\n    else:\n        createPassw = input(\"\
    Create password: \")\n        users[createLogin] = createPassw\n        print(\"\
    \\nUser created!\\n\")\n        logins=open(\"/home/pi/Documents/logins.txt\"\
    , \"a\")\n        logins.write(\"\\n\" + createLogin + \" \" + createPassw)\n\
    \        logins.close()\n```\n\n**STEP 6** Now to create the oldUser function:\n\
    \n```python\ndef oldUser():\n    login = input(\"Enter login name: \")\n    passw\
    \ = input(\"Enter password: \")\n    # check if user exists and login matches\
    \ password\n    if login in users and users[login] == passw:\n        print (\"\
    \\nLogin successful!\\n\")\n        print (\"User:\", login, \"accessed the system\
    \ on:\", time.asctime())\n    else:\n        print (\"\\nUser doesn't exist or\
    \ wrong password!\\n\")\n```\n\n**STEP 7** There's a fair bit happening here.\
    \ There are login and passw variables, which are then matched to the users dictionary.\
    \ If there's a match, then you have a successful login and the time and date of\
    \ the login is outputted. If they don't match, then you print an error and the\
    \ process starts again.\n\n```python\ndef oldUser():\n    login = input(\"Enter\
    \ login name: \")\n    passw = input(\"Enter password: \")\n    # check if user\
    \ exists and login matches password\n    if login in users and users[login] ==\
    \ passw:\n        print (\"\\nLogin successful!\\n\")\n        print (\"User:\"\
    , login, \"accessed the system on:\", time.asctime())\n    else:\n        print\
    \ (\"\\nUser doesn't exist or wrong password!\\n\")\n```\n\n**STEP 8** Finally,\
    \ you need to continually check that the 'q' key hasn't been pressed to exit the\
    \ program. We can do this with:\n\n```python\nwhile status != \"q\":\n    status\
    \ = displayMenu()\n```\n\n**STEP 9** Although a seemingly minor two lines, the\
    \ while loop is what keeps the program running. At the end of every function it's\
    \ checked against the current value of status. If that global value isn't 'q'\
    \ then the program continues. If it's equal to 'q' then the program can quit.\n\
    \n```python\nwhile status != \"q\":\n    status = displayMenu()\n```\n\n**STEP\
    \ 10** You can now create users, then log in with their names and passwords, with\
    \ the logins.txt file being created to store the login data and successful logins\
    \ being time-stamped. Now it's up to you to further improve the code. Perhaps\
    \ you can import the list of created users from a previous session and display\
    \ a graphic upon a successful login?"
  mdcn: "## Python 图形\n\n虽然在屏幕上处理文本——无论是用于游戏还是程序——很棒，但有时加点图形表示也不会错。Python 3 包含了多种引入图形的方式，而且它们功能强大得惊人。\n\
    \n## 走向图形化\n\n你可以绘制简单的图形，如线条、正方形等，或者你可以使用众多可用的 Python 模块之一，来呈现一些惊人的效果。\n\n**步骤\
    \ 1** 开始学习 Python 图形的最佳模块之一是 Turtle。顾名思义，Turtle 模块基于许多学校使用的海龟机器人，这些机器人可以在地面上的大张纸上编程绘制图形。可以通过\
    \ `import turtle` 导入 Turtle 模块。\n\n**步骤 2** 让我们从绘制一个简单的圆开始。新建一个文件，然后输入以下代码：\n\n\
    ```python\nimport turtle\n\nturtle.circle(50)\nturtle.getscreen()._root.mainloop()\n\
    ```\n\n像往常一样，按 F5 保存并执行代码。现在将打开一个新窗口，'海龟' 会画出一个圆。\n\n**步骤 3** 命令 `turtle.circle(50)`\
    \ 用于在屏幕上绘制圆形，其中 50 是尺寸。如果你愿意，可以尝试不同的大小，比如 100、150 甚至更大；你可以通过输入 `turtle.circle(50,\
    \ 180)` 来绘制一段弧线，这里尺寸是 50，但你告诉 Python 只绘制圆的 180 度。\n\n**步骤 4** 圆形代码的最后部分告诉 Python\
    \ 保持绘制所在的窗口打开，以便用户可以点击关闭它。现在，让我们来画一个正方形：\n\n```python\nimport turtle\n\nprint(\"\
    Drawing a square...\")\n\nfor t in range(4):\n    turtle.forward(100)\n    turtle.left(90)\n\
    turtle.getscreen()._root.mainloop()\n```\n\n你可以看到我们插入了一个循环来绘制正方形的边。\n\n**步骤 5**\
    \ 你可以在正方形代码中添加新行以添加颜色：\n`turtle.color(\"Red\")`\n然后，你甚至可以通过输入以下命令将角色更改为真正的海龟：\n\
    `turtle.shape(\"turtle\")`\n你还可以使用命令 `turtle.begin_fill()` 和 `turtle.end_fill()`\
    \ 用选定的颜色填充正方形；本例中为红色轮廓，黄色填充。\n\n**步骤 6** 你可以看到，Turtle 模块可以绘制出一些相当不错的形状，并且随着你开始掌握其工作方式，它会变得稍微复杂一些。输入这个例子：\n\
    这是一种不同的方法，但非常有效。\n\n```python\nfrom turtle import *\ncolor('red', 'yellow')\n\
    begin_fill()\nwhile True:\n    forward(200)\n    left(170)\n    if abs(pos())\
    \ < 1:\n        break\nend_fill()\ndone()\n```\n\n**步骤 7** 另一种显示图形的方法是使用 Pygame\
    \ 模块。Pygame 有多种方式可以帮助你将图形输出到屏幕上，但现在让我们看看如何显示一个预定义的图像。首先，打开浏览器并找到一张图片，然后将其保存到你保存\
    \ Python 代码的文件夹中。\n\n**步骤 8** 现在，我们通过导入 Pygame 模块来获取代码：\n\n```python\nimport pygame\n\
    pygame.init()\n\nimg = pygame.image.load(\"RPi.png\")\n\nwhite = (255, 255, 255)\n\
    w = 900\nh = 450\nscreen = pygame.display.set_mode((w, h))\nscreen.fill((white))\n\
    \nscreen.fill((white))\nscreen.blit(img, (0,0))\npygame.display.flip()\n\nwhile\
    \ True:\n    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n\
    \            pygame.quit()\n```\n\n**步骤 9** 在上一步中，你导入了 pygame，初始化了 pygame 引擎，并让它导入我们保存的树莓派\
    \ Logo 图片（保存为 RPi.png）。接下来，你定义了显示图像的窗口背景色，以及根据实际图像尺寸定义的窗口大小。最后，你有一个循环来关闭窗口。\n\n\
    ```python\nw = 900\nh = 450\nscreen = pygame.display.set_mode((w, h))\nscreen.fill((white))\n\
    \nscreen.fill((white))\nscreen.blit(img, (0,0))\npygame.display.flip()\n\nwhile\
    \ True:\n    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n\
    \            pygame.quit()\n```\n\n**步骤 10** 按 F5 保存并执行代码，你的图像将显示在一个新窗口中。玩玩颜色、大小等等，也花点时间查阅\
    \ Pygame 模块中的众多函数。\n\n## 综合运用\n\n基于本节所学内容，让我们将它们结合起来，编写一段可以轻松应用于现实世界的代码；或者至少，一段你可以整合到自己程序中的代码。\n\
    \n## 用户登录\n\n在这个示例中，让我们看一段创建用户登录，然后允许他们登录系统并记录登录时间的代码。你甚至可以包含一个通过按 'q' 退出程序的选项。\n\
    \n**步骤 1** 首先导入 Time 模块，创建一个新字典来处理用户名和密码，并创建一个变量来评估程序的当前状态：\n\n```python\nimport\
    \ time\nusers = {}\nstatus = \"\"\n```\n\n**步骤 2** 接下来，你需要定义一些函数。你可以从创建主菜单开始，所有用户选择可用选项后都会返回此处：\n\
    \n```python\ndef mainMenu():\n    global status\n    status = input(\"Do you have\
    \ a login account? y/n? Or press q to quit.\")\n    if status == \"y\":\n    \
    \    oldUser()\n    elif status == \"n\":\n        newUser()\n    elif status\
    \ == \"q\":\n        quit()\n```\n\n**步骤 3** `global status` 语句将局部变量与可在整个代码中调用的变量分开，这样你就可以使用\
    \ q=quit 元素，而它不会在函数内部被更改。我们还引用了一些新定义的函数：oldUser 和 newUser，接下来我们会讲到它们。\n\n```python\n\
    def mainMenu():\n    global status\n    status = input(\"Do you have a login account?\
    \ y/n? Or press q to quit.\")\n    if status == \"y\":\n        oldUser()\n  \
    \  elif status == \"n\":\n        newUser()\n    elif status == \"q\":\n     \
    \   quit()\n```\n\n**步骤 4** 接下来是 newUser 函数：\n\n```python\ndef newUser():\n  \
    \  createLogin = input(\"Create a login name: \")\n    if createLogin in users:\n\
    \        print (\"\\nLogin name already exists!\\n\")\n    else:\n        createPassw\
    \ = input(\"Create password: \")\n        users[createLogin] = createPassw\n \
    \       print(\"\\nUser created!\\n\")\n        logins=open(\"/home/pi/Documents/logins.txt\"\
    , \"a\")\n        logins.write(\"\\n\" + createLogin + \" \" + createPassw)\n\
    \        logins.close()\n```\n\n这将创建一个新用户和密码，并将条目写入名为 logins.txt 的文件。\n\n**步骤\
    \ 5** 由于我们使用的是树莓派，你需要指定 logins.txt 文件的自己的路径。本质上，这会将用户输入的用户名和密码添加到现有的 users{} 字典中，因此键值结构保持不变：每个用户是键，密码是值。\n\
    \n```python\ndef newUser():\n    createLogin = input(\"Create a login name: \"\
    )\n    if createLogin in users:\n        print (\"\\nLogin name already exists!\\\
    n\")\n    else:\n        createPassw = input(\"Create password: \")\n        users[createLogin]\
    \ = createPassw\n        print(\"\\nUser created!\\n\")\n        logins=open(\"\
    /home/pi/Documents/logins.txt\", \"a\")\n        logins.write(\"\\n\" + createLogin\
    \ + \" \" + createPassw)\n        logins.close()\n```\n\n**步骤 6** 现在创建 oldUser\
    \ 函数：\n\n```python\ndef oldUser():\n    login = input(\"Enter login name: \")\n\
    \    passw = input(\"Enter password: \")\n    # check if user exists and login\
    \ matches password\n    if login in users and users[login] == passw:\n       \
    \ print (\"\\nLogin successful!\\n\")\n        print (\"User:\", login, \"accessed\
    \ the system on:\", time.asctime())\n    else:\n        print (\"\\nUser doesn't\
    \ exist or wrong password!\\n\")\n```\n\n**步骤 7** 这里发生了相当多的事情。有 login 和 passw\
    \ 变量，然后它们与 users 字典进行匹配。如果匹配成功，那么你就成功登录了，并且会输出登录的日期和时间。如果不匹配，那么会打印一个错误信息，然后过程重新开始。\n\
    \n```python\ndef oldUser():\n    login = input(\"Enter login name: \")\n    passw\
    \ = input(\"Enter password: \")\n    # check if user exists and login matches\
    \ password\n    if login in users and users[login] == passw:\n        print (\"\
    \\nLogin successful!\\n\")\n        print (\"User:\", login, \"accessed the system\
    \ on:\", time.asctime())\n    else:\n        print (\"\\nUser doesn't exist or\
    \ wrong password!\\n\")\n```\n\n**步骤 8** 最后，你需要持续检查 'q' 键是否被按下以退出程序。我们可以这样实现：\n\
    \n```python\nwhile status != \"q\":\n    status = displayMenu()\n```\n\n**步骤 9**\
    \ 虽然看起来只有两行，但 while 循环是让程序保持运行的关键。在每个函数结束时，它都会与 status 的当前值进行检查。如果这个全局值不是 'q'，程序就继续运行。如果等于\
    \ 'q'，程序就可以退出。\n\n```python\nwhile status != \"q\":\n    status = displayMenu()\n\
    ```\n\n**步骤 10** 你现在可以创建用户，然后使用他们的名字和密码登录，logins.txt 文件将被创建来存储登录数据，成功的登录会被记录时间戳。现在就由你来进一步改进代码了。也许你可以从之前的会话中导入已创建用户的列表，并在登录成功时显示一个图形？"
