    ```\n\nThe output is fun to view, and easily incorporated into your own code."
  mdcn: "## 日期与时间\n\n处理数据时，能够获取时间通常非常方便。例如，你可能想为条目添加时间戳，或者查看用户在何时登录了系统以及持续了多长时间。幸运的是，得益于\
    \ Time 模块，获取日期和时间是件很容易的事。\n\n## 时间大师\n\nTime 模块包含一些函数，可以帮助你检索当前系统时间、从字符串中读取日期、格式化时间与日期等等。\n\
    \n### 第一步\n首先你需要导入 Time 模块。它是 Python 3 的内置模块，所以你不需要进入命令行提示符使用 `pip install` 来安装它。一旦导入，你只需一个简单的命令就能调用当前的时间和日期：\n\
    \n```python\nimport time\ntime.asctime()\n```\n\n### 第二步\n时间函数被分为九个元组，这些元组被划分为带索引的项，与其他任何元组一样，如下图所示。\n\
    \n| 索引 | 字段          | 值                                  |\n|-------|----------------|-----------------------------------------|\n\
    | 0     | 四位数年份   | 2016                                    |\n| 1     | 月份  \
    \        | 1 到 12                                 |\n| 2     | 日期            |\
    \ 1 到 31                                 |\n| 3     | 小时           | 0 到 23  \
    \                               |\n| 4     | 分钟         | 0 到 59             \
    \                    |\n| 5     | 秒         | 0 到 61（60 或 61 是闰秒）    |\n| 6  \
    \   | 星期几    | 0 到 6（0 代表星期一）                   |\n| 7     | 一年中的第几天    | 1 到\
    \ 366（儒略日）                  |\n| 8     | 夏令时标志 | -1, 0, 1, -1 表示由库来确定夏令时 |\n\n\
    ### 第三步\n你可以通过输入 `time.localtime()` 来查看时间的呈现结构。\n输出结果如下所示：`time.struct_time(tm_year=2017,\
    \ tm_mon=9, tm_mday=7, tm_hour=9, tm_min=6, tm_sec=13, tm_wday=3, tm_yday=250,\
    \ tm_isdst=0)` 显然，这取决于你当前的时间，而不是本书编写的时间。\n\n### 第四步\nTime 模块内置了许多函数。其中一个最常见的是\
    \ `.strftime()`。借助它，你能够传入各种各样的参数，因为它会将时间元组转换为字符串。例如，要显示当前是星期几，你可以使用：`time.strftime('%A')`\n\
    \n```python\ntime.strftime('%A')\n```\n\n### 第五步\n这自然意味着你可以将各种函数融入到你自己的代码中，例如：\n\
    \n```python\ntime.strftime(\"%a\")\ntime.strftime(\"%B\")\ntime.strftime(\"%b\"\
    )\ntime.strftime(\"%H\")\ntime.strftime(\"%H%M\")\n```\n\n### 第八步\n你在上一节结尾看到过，在计算圆周率到用户指定的小数位数的代码中，你可以为\
    \ Python 中的特定事件计时。取出上面的代码并稍作修改，加入：`start_time=time.time()`\n然后是：`endtime=time.time()-start_time`\n\
    \n### 第六步\n注意最后两个条目，即 `%H` 和 `%H%M`，如你所见，它们分别代表小时和分钟。如最后一个条目所示，将它们输入为 `%H%M` 并不能在\
    \ Shell 中正确显示时间。你可以用以下命令轻松修正：`time.strftime(\"%H:%M\")`\n\n### 第九步\n输出结果将类似于下面的截图。计时器函数需要放置在输入语句的两侧，因为那时变量名正在被创建，时间长短取决于用户登录花了多久。然后，持续时间会作为\
    \ `endtime` 变量显示在代码的最后一行。\n\n### 第七步\n这意味着你将能够显示当前时间或事件发生的时间，比如用户输入其姓名的时候。在编辑器中尝试此代码：\n\
    \n```python\nimport time\nname=input(\"Enter login name: \")\nprint(\"Welcome\"\
    , name, \"\\n\")\nprint(\"User:\", name, \"logged in at\", time.strftime(\"%H:%M\"\
    ))\n```\n\n尝试进一步扩展它，加入日期、月份、年份等等。\n\n### 第十步\nTime 模块能做的事情很多；其中一些也相当复杂，例如显示自 1970\
    \ 年 1 月 1 日以来的秒数。如果你想更深入地了解 Time 模块，那么在 Shell 中输入：`help(time)` 以显示当前 Python 版本中\
    \ Time 模块的帮助文件。\n\n## 打开文件\n\n在 Python 中，你可以在程序中读取文本文件和二进制文件。你也可以写入文件，这是我们接下来要探讨的内容。读写文件使你能够输出和存储程序中的数据。\n\
    \n## 打开、读取与写入\n\n首先，在你系统的文本编辑器中输入一些文本。文本编辑器是最佳选择，而不是文字处理器，因为文字处理器包含背景格式和其他元素。在我们的示例中，我们有一首罗伯特·E·霍华德的诗《西米里安人》。你需要将文件保存为\
    \ `poem.txt`。\n\n你使用 `open()` 函数将文件作为对象传递给一个变量。你可以任意命名文件对象，但你需要告诉 Python 你打开的文本文件的名称和位置：\n\
    \n```python\npoem=open(\"/home/pi/Documents/Poem.txt\")\n```\n\n如果你现在在 Shell 中输入\
    \ `poem`，你会得到关于你刚刚请求打开的文本文件的一些信息。现在，你可以使用 `poem` 变量来读取文件内容：`poem.read()`\n\n如果你第二次输入\
    \ `poem.read()`，你会注意到文本已从文件中移除。你需要再次输入 `poem=open(\"/home/pi/Documents/Poem.txt\"\
    )` 来重新创建文件对象。然而这次，输入：`print(poem.read())`\n这次，`\\n` 条目被移除，取而代之的是换行符和可读文本。\n\n\
    ```python\npoem=open(\"/home/pi/Documents/Poem.txt\")\nprint(poem.read())\n```\n\
    \n### 第五步\n就像列表、元组、字典等等一样，你可以索引文本的单个字符。例如：\n\n```python\npoem.read(5)\n# 显示前五个字符，而再次输入：\n\
    poem.read(5)\n# 将显示接下来的五个。输入 (1) 则会一次显示一个字符。\n```\n\n### 第六步\n类似地，你可以使用 `readline()`\
    \ 函数一次显示一行文本。例如：\n\n```python\npoem=open(\"/home/pi/Documents/Poem.txt\")\npoem.readline()\n\
    # 将显示文本的第一行，再次使用：\npoem.readline()\n# 将再次显示文本的下一行。\n```\n\n### 第七步\n你可能已经猜到，你可以将\
    \ `readline()` 函数传递给一个变量，从而允许你在需要时再次调用它：\n\n```python\npoem=open(\"/home/pi/Documents/Poem.txt\"\
    )\nline=poem.readline()\nline\n```\n\n### 第八步\n进一步扩展，你可以使用 `readlines()` 来获取文本的所有行，并将它们存储为多个列表。这些列表随后可以存储为一个变量：\n\
    \n```python\npoem=open(\"/home/pi/Documents/Poem.txt\")\nlines=poem.readlines()\n\
    lines[0]\nlines[1]\nlines[2]\n```\n\n### 第九步\n你也可以使用 `for` 语句将文本行读取出来：\n\n```python\n\
    for lines in lines:\n    print(lines)\n# 由于这是 Python，还有其他方法可以产生相同的输出：\npoem=open(\"\
    /home/pi/Documents/Poem.txt\")\nfor lines in poem:\n    print(lines)\n```\n\n\
    ### 第十步\n让我们假设你想像旧式点阵打印机那样，一次打印一个字符。你可以将 Time 模块与你在这里学习的内容结合使用。试试这个：\n\n```python\n\
    import time\npoem=open(\"/home/pi/Documents/Poem.txt\")\nlines=poem.read()\nfor\
    \ lines in lines:\n    print(lines, end=\"\")\n    time.sleep(.15)\n```\n\n这种输出效果很有趣，也易于融入你自己的代码中。"
