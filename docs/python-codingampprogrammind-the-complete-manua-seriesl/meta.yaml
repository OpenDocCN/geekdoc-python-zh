    \    with open(\"/home/pi/Downloads/words.txt\", \"rt\") as f:\n        bank=f.readlines()\n\
    \    return bank[random.randint(0,len(bank)-1)]\n```\n\n## 理解 Linux\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_135_0.png)\n\
