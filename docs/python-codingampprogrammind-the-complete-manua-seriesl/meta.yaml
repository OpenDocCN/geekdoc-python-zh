  md: "# # ABSOLUTE VS RELATIVE PATHS\n\nIt is important to know the difference between\
    \ the working directory, root directory and home. There are also two types of\
    \ path: Absolute and Relative. These are easier to understand than they sound.\
    \ Let's take a look...\n\nSTEP 5\n\nHow do you get back up to the pi directory?\
    \ By using a command \"cd ..\". In Linux two dots means the directory above, also\
    \ known as the parent directory. Incidentally, a single dot \".\" is used for\
    \ the same directory. You never use \"cd .\" to switch to the same directory but\
    \ it's worth knowing because some commands need you to specify the current directory.\n\
    \n```\n\npi@raspberrypi ~/Documents $ pwd\n/home/pi/Documents\npi@raspberrypi\
    \ ~/Documents $ cd ..\npi@raspberrypi ~ $ pwd\n/home/pi\npi@raspberrypi ~ $\n\n\
    ```\n\nSTEP 6\n\nThe \"ls\" and \"cd\" commands can also be used with more complex\
    \ paths. Enter: ls Documents/Pictures to view the contents of a Pictures directory\
    \ inside your Documents directory. You can switch to this directory using cd Documents/Pictures;\
    \ use cd ../.. to move back up two parent directories.\n\n```\n\npi@raspberrypi\
    \ ~ $ ls Documents/Pictures\nLEGO  LucyHattersley.jpg  raspberry_pi_2_photographs\n\
    pi@raspberrypi ~ $ cd Documents/Pictures\npi@raspberrypi ~/Documents/Pictures\
    \ $ pwd\n/home/pi/Documents/Pictures\npi@raspberrypi ~/Documents/Pictures $ cd\
    \ ../..\npi@raspberrypi ~ $ pwd\n/home/pi\npi@raspberrypi ~ $\n\n```\n\nSTEP 1\n\
    \nBy default, commands like \"ls\" use the working directory. This is the current\
    \ directory that you're looking at and is set to your home directory by default\
    \ (/users/pi). Using \"pwd\" (Print Working Directory) lets you know what the\
    \ working directory is, and using \"cd\" changes the working directory.\n\n```\n\
    \npi@raspberrypi ~ $ pwd\n/home/pi\npi@raspberrypi ~ $\n\n```\n\nSTEP 3\n\nThe\
    \ second command (\"ls /Documents/Pictures\") attempts to list the content of\
    \ Pictures in a directory called Documents inside the root directory (because\
    \ the path started with '/', which is root). There is typically no Documents directory\
    \ in root, so you will get a \"No such file or directory\" error. Starting a path\
    \ with '/' is known as an \"absolute path\", while starting without the '/' is\
    \ known as a \"relative path\" because it is relative to your working directory.\n\
    \n```\n\npi@raspberrypi ~ $ ls /\nbin  boot  dev  etc  home  lib  lost+found \
    \ media  mnt  opt  proc\npi@raspberrypi ~ $ ls /Documents/Pictures\nls: cannot\
    \ access /Documents/Pictures: No such file or directory\npi@raspberrypi ~ $\n\n\
    ```\n\nSTEP 2\n\nThe root directory is always '/'. Entering: ls / lists the contents\
    \ of root, and entering: cd / switches to the root directory. This is important\
    \ because there is a difference between \"ls Documents/Pictures\" and \"ls /Documents/Pictures\"\
    . The first command lists the contents of the Pictures directory in Documents\
    \ inside the working directory (which, if you are in the home directory, will\
    \ work).\n\n```\n\npi@raspberrypi:~ $ pwd\n/home/pi\npi@raspberrypi:~ $ ls Documents/Pictures\n\
    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png\npi@raspberrypi:~ $ \n\n```\n\
    \nSTEP 4\n\nThere is also an absolute path shortcut to your user directory, and\
    \ that is the tilde \"~\" character. Entering: ls ~ always lists the contents\
    \ of your home directory, while \"cd ~\" moves straight to your home directory,\
    \ no matter what your working directory is. You can also use this shortcut wherever\
    \ you are: enter: ls ~/Documents/Pictures to display the contents of the Pictures.\n\
    \n```\n\npi@raspberrypi:~ $ cd ~\npi@raspberrypi:~ $ pwd\n/home/pi\npi@raspberrypi:~\
    \ $ ls ~/Documents/Pictures\nBDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png\n\
    pi@raspberrypi:~ $ \n\n```"
