  md: '# # Python Errors


    It goes without saying that you’ll eventually come across an error in your code,
    where Python declares it’s not able to continue due to something being missed
    out, wrong or simply unknown. Being able to identify these errors makes for a
    good programmer.


    # ## DEBUGGING


    Errors in code are called bugs and are perfectly normal. They can often be easily
    rectified with a little patience. The important thing is to keep looking, experimenting
    and testing. Eventually your code will be bug free.


    # ### STEP 1


    Code isn’t as fluid as the written word, no matter how good the programming language
    is. Python is certainly easier than most languages but even it is prone to some
    annoying bugs. The most common are typos by the user and whilst easy to find in
    simple dozen-line code, imagine having to debug multi-thousand line code.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_55_0.png)


    # ### STEP 2


    The most common of errors is the typo, as we’ve mentioned. The typos are often
    at the command level: mistyping the print command for example. However, they also
    occur when you have numerous variables, all of which have lengthy names. The best
    advice is to simply go through the code and check your spelling.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_55_1.png)


    # ### STEP 3


    Thankfully Python is helpful when it comes to displaying error messages. When
    you receive an error, in red text from the IDLE Shell, it will define the error
    itself along with the line number where the error has occurred. Whilst in the
    IDLE Editor this is a little daunting for lots of code; text editors help by including
    line numbering.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_55_2.png)


    # ### STEP 4


    Syntax errors are probably the second most common errors you’ll come across as
    a programmer. Even if the spelling is correct, the actual command itself is wrong.
    In Python 3 this often occurs when Python 2 syntaxes are applied. The most annoying
    of these is the print function. In Python 3 we use `print("words")`, whereas Python2
    uses `print "words"`.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_55_3.png)'
