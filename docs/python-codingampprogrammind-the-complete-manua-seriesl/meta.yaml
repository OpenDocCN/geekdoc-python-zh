- md: '# How to Set Up Python in Windows


    Windows users can easily install the latest version of Python via the main Python
    Downloads page. Whilst most seasoned Python developers may shun Windows as the
    platform of choice for building their code, it’s still an ideal starting point
    for beginners.


    ## INSTALLING PYTHON 3.X


    Microsoft Windows doesn’t come with Python preinstalled as standard, so it will
    be necessary to install it yourself manually. Thankfully, it’s an easy process
    to follow.


    **STEP 1** Start by opening your web browser to www.python.org/downloads/. Look
    for the button detailing the Download link for Python 3.x. Python is regularly
    updated, changing the last digit for each bug fix and update. Therefore, don’t
    worry if you see Python 3.8, or more, as long as it’s Python 3, the code in this
    book will work fine.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_29_0.png)


    **STEP 2** Click the Download button for version 3.x and save the file to your
    Downloads folder. When the file is downloaded, double-click the executable and
    the Python installation wizard will launch. From here, you have two choices: Install
    Now and Customise Installation. We recommend opting for the Customise Installation
    link.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_29_1.png)


    **STEP 3** Choosing the Customise option allows you to specify certain parameters,
    and whilst you may stay with the defaults, it’s a good habit to adopt as, sometimes
    (not with Python, thankfully), installers can include unwanted additional features.
    On the first screen available, ensure all boxes are ticked and click the Next
    button.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_29_2.png)


    **STEP 4** The next page of options include some interesting additions to Python.
    Ensure the Associate file with Python, Create Shortcuts, Add Python to Environment
    Variables, Precompile Standard Library and Install for All Users options are ticked.
    These make using Python later much easier. Click Install when you’re ready to
    continue.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_29_3.png)


    **STEP 5** You may need to confirm the installation with the Windows authentication
    notification. Simply click Yes and Python will begin to install. Once the installation
    is complete, the final Python wizard page will allow you to view the latest release
    notes and follow some online tutorials.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_0.png)


    **STEP 6** Before you close the install wizard window however, it''s best to click
    on the link next to the shield detailed Disable Path Length Limit. This will allow
    Python to bypass the Windows 260 character limitation, enabling you to execute
    Python programs stored in deep folders arrangements. Click Yes again, to authenticate
    the process, then you can Close the installation window.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_1.png)


    **STEP 7** Windows 10 users can now find the installed Python 3.x within the Start
    button Recently Added section. The first link, Python 3.x (32-bit) will launch
    the command line version of Python when clicked (more on that in a moment). To
    open the IDLE, type IDLE into Windows start.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_2.png)


    **STEP 8** Clicking on the IDLE (Python 3.x 32-bit) link will launch the Python
    Shell, where you can begin your Python programming journey. Don''t worry if your
    version is newer, as long as it''s Python 3.x our code works inside your Python
    3 interface.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_3.png)


    **STEP 9** If you now click on the Windows Start button again, and this time type:
    CMD, you''ll be presented with the Command Prompt link. Click it to get to the
    Windows command line environment. To enter Python within the command line, you
    need to type: `python` and press Enter.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_4.png)


    **STEP 10** The command line version of Python works in much the same way as the
    Shell you opened in Step 8; note the three left-facing arrows (>>>). Whilst it''s
    a perfectly fine environment, it''s not too user-friendly, so leave the command
    line for now. Enter: `exit()` to leave and close the Command Prompt window.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_5.png)


    ## How to Set Up Python in Linux


    While the Raspberry Pi’s operating system contains the latest, stable version
    of Python, other Linux distros don’t come with Python 3 pre-installed. If you’re
    not going down the Pi route, then here’s how to check and install Python for Linux.


    ### PYTHON PENGUIN


    Linux is such a versatile operating system that it’s often difficult to nail down
    just one-way of doing something. Different distributions go about installing software
    in different ways, so for this particular tutorial we will stick to Linux Mint.


    ### STEP 1


    First you need to ascertain which version of Python is currently installed in
    your Linux system. To begin with, drop into a Terminal session from your distro’s
    menu, or hit the Ctrl+Alt+T keys.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_0.png)


    ### STEP 2


    Next, enter: python --version into the Terminal screen. You should have the output
    relating to version 2.x of Python in the display. Most Linux distro come with
    both Python 2 and 3 by default, as there’s plenty of code out there still available
    for Python 2. Now enter: python3 --version.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_1.png)


    ### STEP 3


    In our case we have both Python 2 and 3 installed. As long as Python 3.x.x is
    installed, then the code in our tutorials will work. It’s always worth checking
    to see if the distro has been updated with the latest versions, enter: sudo apt-get
    update && sudo apt-get upgrade to update the system.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_2.png)


    ### STEP 4


    Once the update and upgrade completes, enter: python3 --version again to see if
    Python 3.x is updated, or even installed. As long as you have Python 3.x, you’re
    running the most recent major version, the numbers after the 3. indicate patches
    plus further updates. Often they’re unnecessary, but they can contain vital new
    elements.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_3.png)


    ### STEP 5


    However, if you want the latest, cutting edge version, you’ll need to build Python
    from source. Start by entering these commands into the Terminal:


    ```

    sudo apt-get install build-essential checkinstall

    sudo apt-get install libreadline-gplv2-dev libncursesw5-dev libssl-dev libsqlite3-dev
    tk-dev libgdbm-dev libc6-dev libbz2-dev

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_4.png)


    ### STEP 6


    Open up your Linux web browser and go to the Python download page: https://www.python.org/downloads.
    Click on the Downloads, followed by the button under the Python Source window.
    This opens a download dialogue box, choose a location, then start the download
    process.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_0.png)


    ### STEP 7


    In the Terminal, go to the Downloads folder by entering: `cd Downloads/`. Then
    unzip the contents of the downloaded Python source code with: `tar -xvf Python-3.Y.Y.tar.xz`
    (replace the Y’s with the version numbers you’ve downloaded). Now enter the newly
    unzipped folder with: `cd Python-3.Y.Y/`.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_2.png)


    ### STEP 8


    Within the Python folder, enter:


    ```

    ./configure

    sudo make altinstall

    ```


    This could take a while, depending on the speed of your computer. Once finished,
    enter: `python3.7 --version` to check the latest installed version. You now have
    Python 3.7 installed, alongside older Python 3.x.x and Python 2.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_4.png)


    ### STEP 9


    For the GUI IDLE, you’ll need to enter the following command into the Terminal:

    `sudo apt-get install idle3`

    The IDLE can then be started with the command: `idle3`. Note, that IDLE runs a
    different version to the one you installed from source.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_1.png)


    ### STEP 10


    You’ll also need PIP (Pip Installs Packages), which is a tool to help you install
    more modules and extras.

    Enter: `sudo apt-get install python3-pip`

    Once PIP is installed, check for the latest update with:

    `pip3 install --upgrade pip`

    When complete, close the Terminal and Python 3.x will be available via the Programming
    section in your distro’s menu.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_3.png)


    ## PYTHON ON macOS


    Installation of Python on macOS can be done in much the same way as the Windows
    installation. Simply go to the Python webpage, hover your mouse pointer over the
    Downloads link and select Mac OS X from the options. You will then be guided to
    the Python releases for Mac versions, along with the necessary installers for
    macOS 64-bit for OS X 10.9 and later.'
  mdcn: '# 如何在Windows中设置Python


    Windows用户可以轻松地通过Python官方网站的下载页面安装最新版的Python。尽管许多经验丰富的Python开发者可能不愿将Windows作为编写代码的首选平台，但它仍是初学者的理想起点。


    ## 安装Python 3.X


    微软Windows操作系统默认并未预装Python，因此需要手动安装。幸运的是，这个过程很简单。


    **步骤 1** 首先，打开网页浏览器，访问 www.python.org/downloads/。找到标明Python 3.x下载链接的按钮。Python会定期更新，每次错误修复和更新都会改变末位数字。因此，如果你看到Python
    3.8或更高版本，无需担心，只要是Python 3，本书中的代码都能正常工作。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_29_0.png)


    **步骤 2** 点击3.x版本的“Download”按钮，并将文件保存到“下载”文件夹。文件下载完成后，双击可执行文件，Python安装向导将会启动。在这里，你有两个选择：“立即安装”和“自定义安装”。我们推荐选择“自定义安装”链接。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_29_1.png)


    **步骤 3** 选择“自定义安装”选项允许你指定某些参数。虽然你可以保持默认设置，但这是一个值得养成的好习惯，因为有时（幸运的是Python不会如此）安装程序可能会包含不需要的附加功能。在第一个可用的屏幕中，确保所有复选框都已勾选，然后点击“下一步”按钮。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_29_2.png)


    **步骤 4** 下一页的选项包括一些对Python有用的附加功能。确保勾选了“将文件与Python关联”、“创建快捷方式”、“将Python添加到环境变量”、“预编译标准库”和“为所有用户安装”选项。这些将使你以后使用Python更加容易。准备继续时，点击“安装”。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_29_3.png)


    **步骤 5** 你可能需要通过Windows用户账户控制通知确认安装。只需点击“是”，Python就会开始安装。安装完成后，最终的Python向导页面将允许你查看最新的发行说明并学习一些在线教程。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_0.png)


    **步骤 6** 然而，在关闭安装向导窗口之前，最好点击“禁用路径长度限制”链接（位于盾牌图标旁边）。这将允许Python绕过Windows的260字符路径限制，使你能够执行存储在深层文件夹结构中的Python程序。再次点击“是”以确认操作，然后就可以“关闭”安装窗口了。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_1.png)


    **步骤 7** Windows 10用户现在可以在“开始”按钮的“最近添加”部分找到已安装的Python 3.x。第一个链接“Python 3.x (32-bit)”点击后将启动Python的命令行版本（稍后详述）。要打开IDLE，在Windows开始菜单中键入“IDLE”。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_2.png)


    **步骤 8** 点击“IDLE (Python 3.x 32-bit)”链接将启动Python Shell，你可以在这里开始你的Python编程之旅。如果你的版本更新，无需担心，只要它是Python
    3.x，我们的代码就能在你的Python 3界面中运行。


    ![](img/2a94c98fce5df94fcecd950a995b8c9_30_3.png)


    **步骤 9** 如果你再次点击Windows“开始”按钮，这次输入：CMD，你将看到“命令提示符”链接。点击它进入Windows命令行环境。要在命令行中进入Python，你需要输入：`python`
    然后按回车键。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_4.png)


    **步骤 10** Python的命令行版本的工作方式与你在步骤8中打开的Shell非常相似；注意三个向左的箭头（>>>）。虽然它是一个功能完备的环境，但用户友好性不佳，所以暂时离开命令行吧。输入：`exit()`
    以退出并关闭“命令提示符”窗口。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_5.png)


    ## 如何在Linux中设置Python


    虽然树莓派的操作系统包含了最新的稳定版Python，但其他Linux发行版并未预装Python 3。如果你不打算使用树莓派路线，那么下面将介绍如何检查和安装Linux的Python。


    ### PYTHON 企鹅


    Linux是一个如此多用途的操作系统，以至于很难确定做事的单一方式。不同的发行版以不同的方式安装软件，因此在本教程中，我们将坚持使用Linux Mint。


    ### 步骤 1


    首先，你需要确定你的Linux系统当前安装的Python版本。首先，从发行版的菜单中打开一个终端会话，或按Ctrl+Alt+T键。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_0.png)


    ### 步骤 2


    接下来，在终端屏幕中输入：`python --version`。屏幕上应该会显示与Python 2.x版本相关的输出。大多数Linux发行版默认同时安装了Python
    2和3，因为仍然有大量适用于Python 2的代码。现在输入：`python3 --version`。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_1.png)


    ### 步骤 3


    在我们的案例中，Python 2和3都已安装。只要安装了Python 3.x.x，我们教程中的代码就能工作。始终值得检查发行版是否已更新到最新版本，输入：`sudo
    apt-get update && sudo apt-get upgrade` 以更新系统。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_2.png)


    ### 步骤 4


    更新和升级完成后，再次输入：`python3 --version` 以查看Python 3.x是否已更新，或者甚至是否已安装。只要你有Python 3.x，你就是在运行最新的主要版本，3.之后的数字表示补丁和进一步的更新。通常它们不是必需的，但可能包含重要的新元素。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_3.png)


    ### 步骤 5


    然而，如果你想要最新的、前沿的版本，你需要从源码构建Python。首先在终端中输入以下命令：


    ```

    sudo apt-get install build-essential checkinstall

    sudo apt-get install libreadline-gplv2-dev libncursesw5-dev libssl-dev libsqlite3-dev
    tk-dev libgdbm-dev libc6-dev libbz2-dev

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_4.png)


    ### 步骤 6


    打开你的Linux网页浏览器，访问Python下载页面：https://www.python.org/downloads。点击“Downloads”，然后点击“Python
    Source”窗口下的按钮。这会打开一个下载对话框，选择一个位置，然后开始下载过程。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_0.png)


    ### 步骤 7


    在终端中，通过输入：`cd Downloads/` 进入“下载”文件夹。然后解压下载的Python源码：`tar -xvf Python-3.Y.Y.tar.xz`（用你下载的版本号替换Y）。现在进入新解压的文件夹：`cd
    Python-3.Y.Y/`。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_2.png)


    ### 步骤 8


    在Python文件夹内，输入：


    ```

    ./configure

    sudo make altinstall

    ```


    这可能需要一些时间，取决于你计算机的速度。完成后，输入：`python3.7 --version` 以检查最新安装的版本。现在你已安装了Python 3.7，同时还保留了旧的Python
    3.x.x和Python 2。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_4.png)


    ### 步骤 9


    对于图形界面IDLE，你需要在终端中输入以下命令：

    `sudo apt-get install idle3`

    然后可以使用命令启动IDLE：`idle3`。请注意，IDLE运行的版本与你从源码安装的版本不同。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_1.png)


    ### 步骤 10


    你还需要PIP（Pip安装包），这是一个帮助你安装更多模块和扩展的工具。

    输入：`sudo apt-get install python3-pip`

    PIP安装完成后，使用以下命令检查最新更新：

    `pip3 install --upgrade pip`

    完成后，关闭终端，Python 3.x将通过发行版菜单中的“编程”部分提供。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_3.png)


    ## macOS上的Python


    在macOS上安装Python的过程与Windows安装非常相似。只需访问Python网页，将鼠标指针悬停在“Downloads”链接上，然后从选项中选择“Mac
    OS X”。你将被引导到适用于Mac版本的Python发布页面，以及适用于macOS 64位（针对OS X 10.9及更高版本）的必要安装程序。'
