  md: '# Getting Started


    # Python on the Pi


    If you’re considering on which platform to install and use Python, then give some
    thought to one of the best coding bases available: the Raspberry Pi. The Pi has
    many advantages for the coder: it’s cheap, easy to use, and extraordinarily flexible.


    # THE POWER OF PI


    While having a far more powerful coding platform on which to write and test your
    code is ideal, it’s not often feasible. Most of us are unable to jump into a several
    hundred-pound investment when we’re starting off and this is where the Raspberry
    Pi can help out.


    The Raspberry Pi is a fantastic piece of modern hardware that has created, or
    rather re-created, the fascination we once all had about computers, how they work,
    how to code and foundation level electronics. Thanks to its unique mix of hardware
    and custom software, it has proved itself to be an amazing platform on which to
    learn how to code; specifically, using Python.


    kits available will provide the Pi with a pre-loaded SD card (with the latest
    Raspbian OS), a case, power socket and cables, this is a good idea as you could,
    with very little effort, leave the Pi plugged into the wall under a desk, while
    still being able to connect to it and code.


    While you’re able, with ease, to use the Raspberry Pi to learn to code with other
    programming languages, it’s Python that has been firmly pushed to the forefront.
    The Raspberry Pi uses Raspbian as its recommended, default operating system. Raspbian
    is a Linux OS, or to be more accurate, it’s a Debian-based distribution of Linux.
    This means that there’s already a built-in element of Python programming, as opposed
    to a fresh installation of Windows 10, which has no Python-specific base. However,
    the Raspberry Pi Foundation has gone the extra mile to include a vast range of
    Python modules, extensions and even examples, out of the box. So, essentially,
    all you need to do is buy a Raspberry Pi, follow the instructions on how to set
    one up (by using one of our excellent Raspberry Pi guides found at www.bdmpublications.com)
    and you can start coding with Python as soon as the desktop has loaded.


    The main advantage is, of course, the extra content that the Raspberry Pi Foundation
    has included out of the box. The reason for this is that the Raspberry Pi’s goal
    is to help educate the user, whether that’s coding, electronics, or some other
    aspect of computing. To achieve that goal the Pi Foundation includes different
    IDEs for the user to compile Python code on; as well as both Python 2 and Python
    3, there’s even a Python library that allows you to communicate with Minecraft.


    Significantly, there’s a lot more to the Raspberry Pi, which makes it an excellent
    choice for someone who is starting to learn how to code in Python. The Pi is remarkably
    easy to set up as a headless node. This means that, with a few tweaks here and
    there, you’re able to remotely connect to the Raspberry Pi from any other computer,
    or device, on your home network. For example, once you’ve set up the remote connectivity
    options, you can simply plug the Pi into the power socket anywhere in your house
    within range of your wireless router. As long as the Pi is connected, you will
    be able to remotely access the desktop from Windows or macOS as easily as if you
    were sitting in front of the Pi with a keyboard and mouse.


    There are other advantages, such as being able to combine Python code with Scratch
    (an Object-Oriented programming language developed by MIT, for children to understand
    how coding works) and being able to code the GPIO connection on the Pi to further
    control any attached robotics or electronics projects. Raspbian also includes
    a Sense HAT Emulator (a HAT is a hardware attached piece of circuitry that offers
    different electronics, robotics and motorisation projects to the Pi), which can
    be accessed via Python code.


    Using this method saves a lot of money, as you don’t need another keyboard, mouse
    and monitor, plus, you won’t need to allocate sufficient space to accommodate
    those extras either. If you’re pushed for space and money, then for around £60,
    buying one of the many


    Consequently, the Raspberry Pi is an excellent coding base, as well as a superb
    project foundation. It is for these, and many other, reasons we’ve used the Raspberry
    Pi as our main Python codebase throughout this title. While the code is written
    and performed on a Pi, you’re also able to use it in Windows, other versions of
    Linux and macOS. If the code requires a specific operating system, then, don’t
    worry; we will let you know in the text.


    Everything you need to learn to code with Python is included with the OS!


