    ## Glossary of Python Terms\n\nJust like most technology, Python contains many\
    \ confusing words and acronyms. Here then, for your own sanity, is a handy glossary\
    \ to help you keep on top of what’s being said when the conversation turns to\
    \ Python programming.\n\n**Argument**\nThe detailed extra information used by\
    \ Python to perform more detailed commands. Can also be used in the command prompt\
    \ to specify a certain runtime event.\n\n**Expression**\nEssentially, Python code\
    \ that produces a value of something.\n\n**Block**\nUsed to describe a section\
    \ or sections of code that are grouped together.\n\n**Float**\nAn immutable floating\
    \ point number used in Python.\n\n**Break**\nA command that can be used to exit\
    \ a for or while loop. For example, if a key is pressed to quit the program, Break\
    \ will exit the loop.\n\n**Function**\nUsed in Python to define a sequence of\
    \ statements that can be called or referenced at any time by the programmer.\n\
    \n**Class**\nA class provides a means of bundling data and functionality together.\
    \ They are used to encapsulate variables and functions into a single entity.\n\
    \n**GitHub**\nA web-based version control and collaboration portal designed for\
    \ software developers to better manage source code.\n\n**Comments**\nA comment\
    \ is a section of real world wording inserted by the programmer to help document\
    \ what’s going on in the code. They can be single line or multi-line and are defined\
    \ by a # or \"\"\".\n\n**Global Variable**\nA variable that is useable anywhere\
    \ in the program.\n\n**Debian**\nA Linux-based distro or distribution that forms\
    \ the Debian Project. This environment offers the user a friendly and stable GUI\
    \ to interact with along with Terminal commands and other forms of system level\
    \ administration.\n\n**Graphics**\nThe use of visual interaction with a program,\
    \ game or operating system. Designed to make it easier for the user to manage\
    \ the program in question.\n\n**Def**\nUsed to define a function or method in\
    \ Python.\n\n**GUI**\nGraphical User Interface. The interface which most modern\
    \ operating systems use to enable the user to interact with the core programming\
    \ of the system. A friendly, easy to use graphical desktop environment.\n\n**Dictionaries**\n\
    A dictionary in Python is a data structure that consists of key and value pairs.\n\
    \n**High-Level Language**\nA programming language that’s designed to be easy for\
    \ people to read.\n\n**Distro**\nAlso Distribution, an operating system that uses\
    \ the Linux Kernel as its core but offers something different in its presentation\
    \ to the end user.\n\n**IDLE**\nStands for Integrated Development Environment\
    \ or Integrated Development and Learning Environment.\n\n**Editor**\nAn individual\
    \ program, or a part of the graphical version of Python, that enables the user\
    \ to enter code ready for execution.\n\n**Immutable**\nSomething that cannot be\
    \ changed after it is created.\n\n**Exceptions**\nUsed as a means of breaking\
    \ from the normal flow of a code block in order to handle any potential errors\
    \ or exceptional conditions within the program.\n\n**Import**\nUsed in Python\
    \ to include modules together with all the accompanying code, functions and variables\
    \ they contain.\n\n**Indentation**\nPython uses indentation to delimit blocks\
    \ of code. The indents are four spaces apart, and are often created automatically\
    \ after a colon is used in the code.\n\n**Integer**\nA number data type that must\
    \ be a whole number and not a decimal.\n\n**Python**\nAn awesome programming language\
    \ that’s easy to learn and use, whilst still being powerful enough to enjoy.\n\
    \n**Interactive Shell**\nThe Python Shell, which is displayed whenever you launch\
    \ the graphical version of Python.\n\n**Random**\nA Python module that implements\
    \ a pseudo-random character generator using the Mersenne Twister PRNG.\n\n**Kernel**\n\
    The core of an operating system, which handles data processing, memory allocation,\
    \ input and output, and processes information between the hardware and programs.\n\
    \n**Range**\nA function that used to return a list of integers, defined by the\
    \ arguments passed through it.\n\n**Linux**\nAn open source operating system that’s\
    \ modelled on UNIX. Developed in 1991 by Finnish student Linus Torvalds.\n\n**Root**\n\
    The bottom level user account used by the system itself. Root is the overall system\
    \ administrator and can go anywhere, and do anything, on the system.\n\n**Lists**\n\
    A Python data type that contains collections of values, which can be of any type\
    \ and can readily be modified.\n\n**Sets**\nSets are a collection of unordered\
    \ but unique data types.\n\n**Local Variable**\nA variable that’s defined inside\
    \ a function and is only useable inside that function.\n\n**Strings**\nStrings\
    \ can store characters that can be modified. The contents of a string are alphanumerical\
    \ and can be enclosed by either single or double quote marks.\n\n**Loop**\nA piece\
    \ of code that repeats itself until a certain condition is met. Loops can encase\
    \ the entire code or just sections of it.\n\n**Terminal**\nAlso Console or Shell.\
    \ The command line interface to the operating system, namely Linux, but also available\
    \ in macOS. From there you can execute code and navigate the filesystem.\n\n**Module**\n\
    A Python file that contains various functions that can be used within another\
    \ program to further extend the effectiveness of the code.\n\n**Tkinter**\nA Python\
    \ module designed to interact with the graphical environment, specifically the\
    \ tk-GUI (Tool Kit Graphical User Interface).\n\n**Operating System**\nAlso OS.\
    \ The program that’s loaded into the computer after the initial boot sequence\
    \ has completed. The OS manages all the other programs, graphical user interface\
    \ (GUI), input and output and physical hardware interactions with the user.\n\n\
    **Try**\nA try block allows exceptions to be raised, so any errors can be caught\
    \ and handled according to the programmer’s instructions.\n\n**Output**\nData\
    \ that is sent from the program to a screen, printer or other external peripheral.\n\
    \n**Tuples**\nAn immutable Python data type that contains an ordered set of either\
    \ letters or numbers.\n\n**PIP**\nPip Installs Packages. A package management\
    \ system used to install and manage modules and other software written in Python.\n\
    \n**UNIX**\nA multitasking, multiuser operating system designed in the ‘70s at\
    \ the Bell Labs Research Centre. Written in C and assembly language.\n\n**Print**\n\
    A function used to display the output of something to the screen.\n\n**Variables**\n\
    A data item that has been assigned a storage location in the computer’s memory.\n\
    \n**Prompt**\nThe element of Python, or the Command Line, where the user enters\
    \ their commands. In Python it’s represented as >>> in the interactive shell.\n\
    \n**X**\nAlso X11 or X-windows. The graphical desktop used in Linux-based systems,\
    \ combining visual enhancements and tools to manage the core operating system.\n\
    \n**Pygame**\nA Python module that’s designed for writing games. It includes graphics\
    \ and sound libraries and was first developed in October 2000.\n\n**Zen of Python**\n\
    When you enter: `import this` into the IDLE, the Zen of Python is displayed."
