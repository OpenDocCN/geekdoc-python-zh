  md: '# ## STEP 6


    Open up your Linux web browser and go to the Python download page: https://www.python.org/downloads.
    Click on the Downloads, followed by the button under the Python Source window.
    This opens a download dialogue box, choose a location, then start the download
    process.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_0.png)


    # ## STEP 9


    For the GUI IDLE, you’ll need to enter the following command into the Terminal:

    `sudo apt-get install idle3`

    The IDLE can then be started with the command: `idle3`. Note, that IDLE runs a
    different version to the one you installed from source.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_1.png)


    # ## STEP 7


    In the Terminal, go to the Downloads folder by entering: `cd Downloads/`. Then
    unzip the contents of the downloaded Python source code with: `tar -xvf Python-3.Y.Y.tar.xz`
    (replace the Y’s with the version numbers you’ve downloaded). Now enter the newly
    unzipped folder with: `cd Python-3.Y.Y/`.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_2.png)


    # ## STEP 10


    You’ll also need PIP (Pip Installs Packages), which is a tool to help you install
    more modules and extras.

    Enter: `sudo apt-get install python3-pip`

    Once PIP is installed, check for the latest update with:

    `pip3 install --upgrade pip`

    When complete, close the Terminal and Python 3.x will be available via the Programming
    section in your distro’s menu.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_3.png)


    # ## STEP 8


    Within the Python folder, enter:


    ./configure

    sudo make altinstall


    This could take a while, depending on the speed of your computer.

    Once finished, enter: `python3.7 --version` to check the latest installed version.
    You now have Python 3.7 installed, alongside older Python 3.x.x and Python 2.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_32_4.png)


    > > **PYTHON ON macOS**

    > Installation of Python on macOS can be done in much the same way as the Windows
    installation. Simply go to the Python webpage, hover your mouse pointer over the
    Downloads link and select Mac OS X from the options. You will then be guided to
    the Python releases for Mac versions, along with the necessary installers for
    macOS 64-bit for OS X 10.9 and later.'
