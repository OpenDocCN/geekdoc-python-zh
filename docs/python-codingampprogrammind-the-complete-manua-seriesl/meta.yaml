  - "[PAGE 51]\n\n# Conditions and Loops\n\nConditions and loops are what make a program\
    \ interesting; they can be simple or rather complex. How you use them depends\
    \ greatly on what the program is trying to achieve; they could be the number of\
    \ lives left in a game or just displaying a countdown.\n\n# TRUE CONDITIONS\n\n\
    Keeping conditions simple to begin with makes learning to program a more enjoyable\
    \ experience. Let's start then by checking if something is TRUE, then doing something\
    \ else if it isn't.\n\nSTEP 1 Let's create a new Python program that will ask\
    \ the user to input a word, then check it to see if it's a four-letter word or\
    \ not. Start with File > New File, and begin with the input variable:\n\n```\n\
    word=input(\"Please enter a four-letter word: \")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_51_0.png)\n\
    \nSTEP 3 Now you can use an if statement to check if the word_length variable\
    \ is equal to four and print a friendly conformation if it applies to the rule:\n\
    \n```\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    if word_length == 4:\n    print (word, \"is a four-letter word. Well done.\")\n\
    ```\n\nThe double equal sign (==) means check if something is equal to something\
    \ else.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_51_1.png)\n\nSTEP 2 Now we\
    \ can create a new variable, then use the len function and pass the word variable\
    \ through it to get the total number of letters the user has just entered:\n\n\
    ```\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    ```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_51_2.png)\n\nSTEP 4 The colon\
    \ at the end of IF tells Python that if this statement is true do everything after\
    \ the colon that's indented. Next, move the cursor back to the beginning of the\
    \ Editor:\n\n```\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    if word_length == 4:\n    print (word, \"is a four-letter word. Well done.\")\n\
    else:\n    print (word, \"is not a four-letter word.\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_51_3.png)"
  - "[PAGE 52]\n\n# # Conditions and Loops\n\n**STEP 5** Press F5 and save the code\
    \ to execute it. Enter a four-letter word in the Shell to begin with, you should\
    \ have the returned message that it's the word is four letters. Now press F5 again\
    \ and rerun the program but this time enter a five-letter word. The Shell will\
    \ display that it's not a four-letter word.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_52_0.png)\n\
    \n**STEP 6** Now expand the code to include another conditions. Eventually, it\
    \ could become quite complex. We've added a condition for three-letter words:\n\
    \n```\npython\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    if word_length == 4:\n    print (word, \"is a four-letter word. Well done.\")\n\
    elif word_length == 3:\n    print (word, \"is a three-letter word. Try again.\"\
    )\nelse:\n    print (word, \"is not a four-letter word.\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_52_1.png)\n\
    \n# # LOOPS\n\nA loop looks quite similar to a condition but they are somewhat\
    \ different in their operation. A loop will run through the same block of code\
    \ a number of times, usually with the support of a condition.\n\n**STEP 1** Let's\
    \ start with a simple While statement. Like IF, this will check to see if something\
    \ is TRUE, then run the indented code:\n\n```\npython\nx = 1\nwhile x < 10:\n\
    \    print (x)\n    x = x + 1\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_52_2.png)\n\
    \n**STEP 3** The For loop is another example. For is used to loop over a range\
    \ of data, usually a list stored as variables inside square brackets. For example:\n\
    \n```\npython\nwords=[\"Cat\", \"Dog\", \"Unicorn\"]\nfor word in words:\n   \
    \ print (word)\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_52_3.png)\n\n\
    **STEP 2** The difference between if and while is when while gets to the end of\
    \ the indented code, it goes back and checks the statement is still true. In our\
    \ example x is less than 10. With each loop it prints the current value of x,\
    \ then adds one to that value. When x does eventually equal 10 it stops.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_52_4.png)\n\
    \n**STEP 4** The For loop can also be used in the countdown example by using the\
    \ range function:\n\n```\npython\nfor x in range (1, 10):\n    print (x)\n```\n\
    \nThe x=x+1 part isn't needed here because the range function creates a list between\
    \ the first and last numbers used.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_52_5.png)"
