    \ 10 Of course, you can modify that to display a given year as a web page calendar:\n\
    \n```\nimport calendar\nyear=int(input(\"Enter the year to display as a webpage:\
    \ \"))\ncal=open(\"/home/pi/Documents/cal.html\", \"w\")\ncal.write(calendar.HTMLCalendar(calendar.MONDAY).formatyear(year))\n\
    cal.close()\n```\n\nThis code asks the user for a year and then creates the necessary\
    \ webpage. Remember to change your file destination.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_90_5.png)"
