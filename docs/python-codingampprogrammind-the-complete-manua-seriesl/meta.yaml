- md: "## Simple Python Calculator\n\nSometimes the simplest code can be the most\
    \ effective. Take for example, this Simple Python Calculator script. It's based\
    \ on the Create Your Own Modules section seen earlier but doesn't utilise any\
    \ external modules.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_132_0.png)\n\n\
    ### CALCULATOR.PY\n\nWe created some function definitions to begin with, then\
    \ lead on to the user menu and inputs. It's an easy piece of code to follow and\
    \ as such can also be expanded well too.\n\n```python\nprint(\"----------Simple\
    \ Python Calculator----------\\n\")\n\ndef add(x, y):\n    return x + y\n\ndef\
    \ subtract(x, y):\n    return x - y\n\ndef multiply(x, y):\n    return x * y\n\
    \ndef divide(x, y):\n    return x / y\n\nprint(\"Select operation.\\n\")\nprint(\"\
    1.Add\")\nprint(\"2.Subtract\")\nprint(\"3.Multiply\")\nprint(\"4.Divide\")\n\n\
    choice = input(\"\\nEnter choice (1/2/3/4):\")\n\nnum1 = int(input(\"\\nEnter\
    \ first number: \"))\nnum2 = int(input(\"Enter second number: \"))\n\nif choice\
    \ == '1':\n    print(num1,\"+\",num2,\"=\", add(num1,num2))\n\nelif choice ==\
    \ '2':\n    print(num1,\"-\",num2,\"=\", subtract(num1,num2))\n\nelif choice ==\
    \ '3':\n    print(num1,\"*\",num2,\"=\", multiply(num1,num2))\n\nelif choice ==\
    \ '4':\n    print(num1,\"/\",num2,\"=\", divide(num1,num2))\nelse:\n    print(\"\
    Invalid input\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_132_1.png)\n\
    \n### Improved Calculations\n\nThe obvious contender for improvement here is using\
    \ the Create Your Own Modules route and extracting the function definitions as\
    \ a module. You can then call the module and focus on the body of the code.\n\n\
    The other area of improvement is code itself. Where there's just a single shot\
    \ at making a calculation, you could encase it in a while loop, so once a value\
    \ is presented the user is sent back to the main menu. Perhaps, improvement to\
    \ the Invalid Input section is worth looking into as well.\n\n## Hangman Game\
    \ Script\n\nHangman is a great game to program into Python. It can be extremely\
    \ complex, displaying graphics, the number of guesses left in the secret word,\
    \ a huge bank of available words picked at random and countless other elements.\
    \ It can also be quite simple. Here we have a mix between the two.\n\n### HANGMAN.PY\n\
    \nWe've made a Hangman game board (the gallows) out of characters that can be\
    \ displayed in the IDLE Shell, along with a huge bank of words to randomly choose\
    \ from.\n\n```python\nimport random\n\nboard = ['''\n>>>>>>>>>>Hangman<<<<<<<<<<\n\
    \n+---+\n|   |\n|\n|\n|\n========''', '''\n\n+---+\n|   |\nO   |\n|\n|\n========''',\
    \ '''\n\n+---+\n|   |\nO   |\n|   |\n|\n========''', '''\n\n+---+\n|   |\nO  \
    \ |\n|   |\n|   \n========''', '''\n\n+---+\n|   |\nO   |\n|\\ |\n|   \n========''',\
    \ '''\n\n+---+\n|   |\nO   |\n|\\| |\n|   \n========''', '''\n\n+---+\n|   |\n\
    O   |\n|\\|/|\n|   \n========''', '''\n\n+---+\n|   |\nO   |\n|\\|/|\n|/  \n========''',\
    \ '''\n\n+---+\n|   |\nO   |\n|\\|/|\n|/ \\\n========''']\n\nclass Hangman:\n\
    \    def __init__(self,word):\n        self.word = word\n        self.missed_letters\
    \ = []\n        self.guessed_letters = []\n\n    def guess(self,letter):\n   \
    \     if letter in self.word and letter not in self.guessed_letters:\n       \
    \     self.guessed_letters.append(letter)\n        elif letter not in self.word\
    \ and letter not in self.missed_letters:\n            self.missed_letters.append(letter)\n\
    \        else:\n            return False\n        return True\n\n    def hangman_over(self):\n\
    \        return self.hangman_won() or (len(self.missed_letters) == 6)\n\n    def\
    \ hangman_won(self):\n        if '_' not in self.hide_word():\n            return\
    \ True\n        return False\n\n    def hide_word(self):\n        rtn = ''\n \
    \       for letter in self.word:\n            if letter not in self.guessed_letters:\n\
    \                rtn += '_'\n            else:\n                rtn += letter\n\
    \        return rtn\n\n    def print_game_status(self):\n        print(board[len(self.missed_letters)])\n\
    \        print('Word: ' + self.hide_word())\n        print('Letters Missed: ',)\n\
    \        for letter in self.missed_letters:\n            print(letter,)\n    \
    \    print()\n        print('Letters Guessed: ',)\n        for letter in self.guessed_letters:\n\
    \            print(letter,)\n        print()\n\ndef rand_word():\n    bank = 'ability\
