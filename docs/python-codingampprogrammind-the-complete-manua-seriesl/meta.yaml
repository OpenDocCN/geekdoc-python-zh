  - "[PAGE 113]\n\n# # Number Guessing Game\n\nThis is a simple little piece of code\
    \ but it makes good use of the Random module, print and input, and a while loop.\
    \ The number of guesses can be increased from 5 and the random number range can\
    \ easily be altered too.\n\n# ## NUMBERGUESS.PY\n\nCopy the code and see if you\
    \ can beat the computer within five guesses. It's an interesting bit of code that\
    \ can be quite handy when your implementing a combination of the Random module\
    \ alongside a while loop.\n\n```\npython\nimport random\n\nguessesUsed = 0\nName=input('Hello!\
    \ What is your name? ')\nnumber = random.randint(1, 30)\nprint('Greetings, ` +\
    \ Name + `, I\\'m thinking of a number between 1 and 30.')\nwhile guessesUsed\
    \ < 5:\n    guess=int(input('Guess the number within 5 guesses...'))\n    guessesUsed\
    \ = guessesUsed + 1\n    if guess < number:\n        print('Too low, try again.')\n\
    \    if guess > number:\n        print('Too high, try again.')\n    if guess ==\
    \ number:\n        break\nif guess == number:\n    guessesUsed = str(guessesUsed)\n\
    \    print('Well done, ` + Name + `! You guessed correctly in ` + guessesUsed\
    \ + ` guesses.')\n\nif guess != number:\n    number = str(number)\n    print('Sorry,\
    \ out of guesses. The number I was thinking of is ` + number)\n\n```\n\nAlthough\
    \ this is a reasonably easy to follow program, there are some elements to the\
    \ code that are worth pointing out. To begin with, you need to import the Random\
    \ module, as you're using random numbers within the code.\n\nThis section of the\
    \ code creates the variables for the number of guesses used, along with the name\
    \ of the player, and also sets up the random number between 1 and 30. If you want\
    \ a wider range of random number selection, then increase the `number=random.randint(1,\
    \ 30)` end value of 30; don't make it too high though or the player will never\
    \ be able to guess it. If the player guesses too low or too high, they are given\
    \ the appropriate output and asked to try again, while the number of guesses is\
    \ less than five. You can also increase the number of guesses from 5 by altering\
    \ the `while guessesUsed < 5:` value.\n\nIf the player guessed the correct number\
    \ then they are given a 'well done' output, along with how many guesses they used\
    \ up. If the player runs out of guesses, then the game over output is displayed\
    \ instead, along with revealing the number the computer was thinking of. Remember,\
    \ if you do alter the values of the random number chosen by the computer, or the\
    \ number of guesses the player can take, then along with the variable values,\
    \ you also need to amend the instructions given in the print statements at the\
    \ start of the code."
- md: "# Number Guessing Game\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_114_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_114_1.png)\n\n# Code Improvements\n\
    \nSince this is such a simple script to apply to a situation, there's plenty of\
    \ room to mess around with it and make it more interesting. Perhaps you can include\
    \ an option to take score, the best out of three rounds. Maybe an elaborate way\
    \ to congratulate the player for getting a 'hole in one' correct guess on their\
    \ first try.\n\nFor example, as per the screenshot provided, you could use something\
    \ along the lines of:\n\n```\npython\nEndurance=0\nCR=0\nLuck=0\nEndurance = random.randint(1,\
    \ 15)\nCR = random.randint(1, 20)\nLuck = random.randint(1, 10)\nprint(\"Your\
    \ character's stats are as follows:\\n\")\nprint(\"Endurance:\", Endurance)\n\
    print(\"Combat Rating:\", CR)\nprint(\"Luck:\", Luck)\n\n```\n\nMoreover, the\
    \ number guessing game code does offer some room for implementing into your code\
    \ in a different manner. What we mean by this is, the code can be used to retrieve\
    \ a random number between a range, which in turn can give you the start of a character\
    \ creation defined function within an adventure game.\n\nImagine the start of\
    \ a text adventure written in Python, where the player names their character.\
    \ The next step is to roll the virtual random dice to decide what that character's\
    \ combat rating, strength, endurance and luck values are. These can then be carried\
    \ forward into the game under a set of variables that can be reduced or increased\
    \ depending on the circumstances the player's character ends up in.\n\nThe player\
    \ can then decide to either stick with their roll or try again for the hope of\
    \ better values being picked. There's ample ways in which to implement this code\
    \ into a basic adventure game.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_114_2.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_114_3.png)\n\n# Random Number Generator\n\
    \nUser input and the ability to manipulate that input are important elements with\
    \ any programming language. It’s what separates a good program from a great program,\
    \ one that allows the user to interact and see the results of that interaction.\n\
    \n# RNDNUMGEN.PY\n\nIt might be simple but this little piece of code will ask\
    \ the user for two sets of numbers, a start and a finish. The code will then pluck\
    \ out a random number between the two sets and display it.\n\n```\nfrom random\
    \ import *\n\nprint(\"\\n>>>>>>>>>>Random Number Generator<<<<<<<<<<\\n\")\nnmb1=int(input(\"\
    Enter the start number: \"))\nnmb2=int(input(\"Enter the last number: \"))\n\n\
    x = randint(nmb1, nmb2)\nprint(\"\\nThe random number between\",nmb1,\"and\",nmb2,\"\
    is:\\n\")\nprint(x)\n```\n\n# More Input\n\nWhile an easy code to follow, it could\
    \ be more interesting if you prompt the user for more input. Perhaps you can provide\
    \ them with addition, subtraction, multiplication elements with their numbers.\
    \ If you’re feeling clever, see if you can pass the code through a Tkinter window\
    \ or even the Ticker window that’s available on Page 128.\n\nFor example, the\
    \ code could be edited to this:\n\nFurthermore, the core of the code can be used\
    \ in a text adventure game, where the character fights something and their health,\
    \ along with the enemy’s, is reduced by a random number. This can be mixed with\
    \ the previous code from Page 90’s Number Guessing Game, where we defined the\
    \ stats for the adventure game’s character.\n\n```\nfrom random import *\nimport\
    \ turtle\n\nprint(\"\\n>>>>>>>>>>Random Turtle Image<<<<<<<<<<\\n\")\nnmb1=int(input(\"\
    Enter the start number: \"))\nnmb2=int(input(\"Enter the second number: \"))\n\
    nmb3=int(input(\"Enter the third number: \"))\nnmb4=int(input(\"Enter the fourth\
    \ number: \"))\n\nturtle.forward(nmb1)\nturtle.left(90)\nturtle.forward(nmb2)\n\
    turtle.left(90)\nturtle.forward(nmb3)\nturtle.left(90)\nturtle.forward(nmb4)\n\
    turtle.left(90)\n```\n\nYou can also introduce the Turtle module into the code\
    \ and perhaps set some defined rules for drawing a shape, object or something\
    \ based on a user inputted random value from a range of numbers. It takes a little\
    \ working out but the effect is certainly really interesting.\n\nWhilst it’s a\
    \ little rough around the edges, you can easily make it more suitable.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_115_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_115_1.png)\n\n# # Random Password Generator\n\
    \nWe’re always being told that our passwords aren’t secure enough; well here’s\
    \ a solution for you to implement into your own future programs. The random password\
    \ generator code below will create a 12-letter string of words (both cases) and\
    \ numbers each time it’s executed.\n\n```\npython\nimport string\nimport random\n\
    \ndef randompassword():\n    chars=string.ascii_uppercase + string.ascii_lowercase\
    \ + string.digits\n    size= 8\n    return ''.join(random.choice(chars) for x\
    \ in range(size,20))\n\nprint(randompassword())\n\n```\n\n# ## Secure Passwords\n\
    \nThere’s plenty you can do to modify this code and improve it further. For one,\
    \ you can increase the number of characters the generated password displays and\
    \ perhaps you can include special characters too, such as signs and symbols. Then,\
    \ you can output the chosen password to a file, then securely compress it using\
    \ the previous random number generator as a file password and send it to a user\
    \ for their new password.\n\nAn interesting aspect to this code is the ability\
    \ to introduce a loop and print any number of random passwords. Let’s assume you\
    \ have a list of 50 users for a company and you’re in charge of generating a random\
    \ password for them each month.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_116_0.png)\n\
    \nAdding a loop to print a password fifty times is extremely easy, for example:\n\
    \n```\npython\nimport string\nimport random\n\ndef randompassword():\n    chars=string.ascii_uppercase\
    \ + string.ascii_lowercase + string.digits\n    size= 4\n    return ''.join(random.choice(chars)\
    \ for x in range(size,20))\n\nn=0\nwhile n<50:\n    print(randompassword())\n\
    \    n=n+1\n\n```\n\nThis will output fifty random passwords based on the previous\
    \ random selection of characters.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_116_1.png)\n\
    \n# # Text to Binary Convertor\n\nWhile it may not seem too exciting, this text\
    \ to binary convertor is actually quite good fun. It also only uses two lines\
    \ of code, so it’s extremely easy to insert into your own script.\n\n# ## TXT2BIN.PY\n\
    \nNaturally we’re using the format function to convert the user’s entered text\
    \ string into its binary equivalent. If you want to check its accuracy, you can\
    \ plug the binary into an online convertor.\n\n```\npython\ntext=input(\"Enter\
    \ text to convert to Binary: \")\nprint(' '.join(format(ord(x), 'b') for x in\
    \ text))\n\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_117_0.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_117_1.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_117_2.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_117_3.png)\n\
    \n# 1000010 1101001 1101110 1100001 1110010 1111001\n\nThe text to binary convertor\
    \ does offer some room for improvement and enhancement. There are many uses: it\
    \ could be utilised in a password or secret word script, as part of an adventure\
    \ game or just a novel way to display someone's name.\n\nWith regards to improvements,\
    \ you could display the binary conversion in a Pygame window, using the animated\
    \ text options from page 100. You could also ask the user if they wanted to have\
    \ another go, or even ask if they wanted the binary output to be saved to a file.\n\
    \nWith regards to rendering the outputted binary conversion to a Pygame window,\
    \ complete with rotating text, you can use:\n\n```\npython\nimport pygame\npygame.init()\n\
    BLACK = (0, 0, 0)\nWHITE = (255, 255, 255)\nBLUE = (0, 0, 255)\nGREEN = (0, 255,\
    \ 0)\nRED = (255, 0, 0)\nprint(\">>>>>>>>>>>>Text to Binary Convertor<<<<<<<<<<<<\\\
    n\")\nconversion=input(\"Enter text to convert to Binary: \")\nsize = (600, 400)\n\
    screen = pygame.display.set_mode(size)\n\n```\n\n```\npython\npygame.display.set_caption(\"\
    Binary Conversion\")\ndone = False\nclock = pygame.time.Clock()\ntext_rotate_degrees\
    \ = 0\nBinary=(' '.join(format(ord(x), 'b') for x in conversion))\nwhile not done:\n\
    \    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n\
    \            done = True\n    screen.fill(WHITE)\n    font = pygame.font.SysFont('Calibri',\
    \ 25, True, False)\n    text = font.render(Binary, True, BLACK)\n    text = pygame.transform.rotate(text,\
    \ text_rotate_degrees)\n    text_rotate_degrees += 1\n    screen.blit(text, [100,\
    \ 50])\n    pygame.display.flip()\n    clock.tick(60)\npygame.quit()\nprint('\
    \ '.join(format(ord(x), 'b') for x in conversion))\n\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_118_0.png)"
  mdcn: "# 猜数字游戏\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_114_0.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_114_1.png)\n\
    \n# 代码改进\n\n由于这是一个非常简单的脚本，可以应用于各种场景，因此有很大的空间可以对其进行修改，使其更有趣。也许你可以加入一个计分选项，比如三局两胜制。或者设计一种精巧的方式来祝贺玩家在第一次尝试时就“一杆进洞”猜对了数字。\n\
