  md: '# How to Set Up Python in Linux


    While the Raspberry Pi’s operating system contains the latest, stable version
    of Python, other Linux distros don’t come with Python 3 pre-installed. If you’re
    not going down the Pi route, then here’s how to check and install Python for Linux.


    # PYTHON PENGUIN


    Linux is such a versatile operating system that it’s often difficult to nail down
    just one-way of doing something. Different distributions go about installing software
    in different ways, so for this particular tutorial we will stick to Linux Mint.


    # STEP 1


    First you need to ascertain which version of Python is currently installed in
    your Linux system. To begin with, drop into a Terminal session from your distro’s
    menu, or hit the Ctrl+Alt+T keys.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_0.png)


    # STEP 2


    Next, enter: python --version into the Terminal screen. You should have the output
    relating to version 2.x of Python in the display. Most Linux distro come with
    both Python 2 and 3 by default, as there’s plenty of code out there still available
    for Python 2. Now enter: python3 --version.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_1.png)


    # STEP 3


    In our case we have both Python 2 and 3 installed. As long as Python 3.x.x is
    installed, then the code in our tutorials will work. It’s always worth checking
    to see if the distro has been updated with the latest versions, enter: sudo apt-get
    update && sudo apt-get upgrade to update the system.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_2.png)


    # STEP 4


    Once the update and upgrade completes, enter: python3 --version again to see if
    Python 3.x is updated, or even installed. As long as you have Python 3.x, you’re
    running the most recent major version, the numbers after the 3. indicate patches
    plus further updates. Often they’re unnecessary, but they can contain vital new
    elements.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_3.png)


    # STEP 5


    However, if you want the latest, cutting edge version, you’ll need to build Python
    from source. Start by entering these commands into the Terminal:


    ```

    sudo apt-get install build-essential checkinstall

    sudo apt-get install libreadline-gplv2-dev libncursesw5-dev libssl-dev libsqlite3-dev
    tk-dev libgdbm-dev libc6-dev libbz2-dev

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_31_4.png)'
