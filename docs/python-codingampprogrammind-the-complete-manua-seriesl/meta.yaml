  md: '# Opening Files


    In Python you can read text and binary files in your programs. You can also write
    to file, which is something we will look at next. Reading and writing to files
    enables you to output and store data from your programs.


    # OPEN, READ AND WRITE


    Start by entering some text into your system’s text editor. The text editor is
    best, not a word processor, as word processors include background formatting and
    other elements. In our example, we have the poem The Cimmerian, by Robert E Howard.
    You need to save the file as poem.txt.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_75_0.png)


    You use the open() function to pass the file into a variable as an object. You
    can name the file object anything you like, but you will need to tell Python the
    name and location of the text file you’re opening:


    ```

    poem=open("/home/pi/Documents/Poem.txt")

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_75_1.png)


    If you now enter poem into the Shell, you will get some information regarding
    the text file you’ve just asked to be opened. You can now use the poem variable
    to read the contents of the file:


    ```

