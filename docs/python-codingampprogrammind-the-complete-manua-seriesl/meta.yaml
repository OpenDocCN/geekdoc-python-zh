    \        return self.hangman_won() or (len(self.missed_letters) == 6)\n\n    def\
    \ hangman_won(self):\n        if '_' not in self.hide_word():\n            return\
    \ True\n        return False\n\n    def hide_word(self):\n        rtn = ''\n \
    \       for letter in self.word:\n            if letter not in self.guessed_letters:\n\
    \                rtn += '_'\n            else:\n                rtn += letter\n\
    \        return rtn\n\n    def print_game_status(self):\n        print(board[len(self.missed_letters)])\n\
    \        print('Word: ' + self.hide_word())\n        print('Letters Missed: ',)\n\
    \        for letter in self.missed_letters:\n            print(letter,)\n    \
    \    print()\n        print('Letters Guessed: ',)\n        for letter in self.guessed_letters:\n\
    \            print(letter,)\n        print()\n\ndef rand_word():\n    bank = 'ability\
    \ about above absolute accessible accommodation accounting beautiful bookstore\
    \ calculator clever engaged engineer enough handsome refrigerator opposite socks\
    \ interested strawberry backgammon anniversary confused dangerous entertainment\
    \ exhausted impossible overweight temperature vacation scissors appointment decrease\
    \ development earthquake environment necessary luggage responsible ambassador\
    \ circumstance congratulate frequent'.split()\n    return bank[random.randint(0,len(bank)-1)]\n\
    \ndef main():\n    game = Hangman(rand_word())\n    while not game.hangman_over():\n\
    \        game.print_game_status()\n        user_input = input('\\nEnter a letter:\
    \ ')\n        game.guess(user_input)\n\n    game.print_game_status()\n    if game.hangman_won():\n\
    \        print('\\nCongratulations! You have won!!')\n    else:\n        print('\\\
    nSorry, you have lost.')\n        print('The word was ' + game.word)\n\n    print('\\\
    nGoodbye!\\n')\n\nif __name__ == '__main__':\n    main()\n```\n\n### QUIT()\n\n\
    由于这是我们 Python 代码库中的最后一个示例，我们决定以精彩的方式收尾，展示猜词游戏中的绞刑架会随着每次错误的猜测而逐步绘制出来。如果这里的文本看起来有些错位，请不要担心，这仅仅是因为使用\
    \ Python IDLE 编辑器与将代码粘贴到文字处理器（其格式化方式不同）之间的差异造成的。\n\n你可以做很多事情来改进、增强和扩展我们在此展示的内容。你可以添加一个程序，如果用户输入数字或字符则返回错误。你可以为一次性猜出整个单词（而不是逐个字母猜测）的人增加额外分数，也许还可以在游戏失败时添加肖邦的《葬礼进行曲》；或者在获胜时添加一些庆祝性的内容。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_134_0.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_134_1.png)\n\
