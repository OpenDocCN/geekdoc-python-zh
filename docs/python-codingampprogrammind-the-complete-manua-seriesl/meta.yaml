- md: "## Basic GUI File Browser\n\nHere's a helpful and interesting piece of code.\
    \ It's an extremely basic file browser that's presented in a graphical user interface\
    \ using the Tkinter module. There's a lot you can learn from this code and implement\
    \ into your own programs.\n\n## FILEBROWSER.PY\n\nTkinter is the main module in\
    \ use here but we're also using idlelib, so you may need to pip install any extras\
    \ if the dependencies fail when you execute the code.\n\n```python\nfrom tkinter\
    \ import Tk\nfrom idlelib.TreeWidget import ScrolledCanvas, FileTreeItem, TreeNode\n\
    import os\n\nroot = Tk()\nroot.title(\"File Browser\")\n\nsc = ScrolledCanvas(root,\
    \ bg=\"white\",\n                    highlightthickness=0, takefocus=1)\nsc.frame.pack(expand=1,\
    \ fill=\"both\", side=\"left\")\n\nitem = FileTreeItem(os.getcwd())\nnode = TreeNode(sc.canvas,\
    \ None, item)\nnode.expand()\n\nroot.mainloop()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_119_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_119_1.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_119_2.png)\n\
    \n## Advanced Filing\n\nWhen executed, the code will display the current directory's\
    \ contents. If you want to see the contents of another directory, you can run\
    \ the code from a command line within the chosen directory; just remember to call\
    \ the code from where it's located on your system, as per the second screenshot.\
    \ You can also double-click any of the file names shown in the directory tree\
    \ and rename them.\n\nThis is an interesting piece of code and one that you can\
    \ insert into your own programs. You can extend the code to include a user specified\
    \ directory to browse, perhaps your own unique file icons too. If you're using\
    \ Linux, create an alias to execute the code and then you can run it from wherever\
    \ you are in the system.\n\nWindows users may have some trouble with the above\
    \ code, an alternative can be achieved by using the following:\n\n```python\n\
    from tkinter import *\nfrom tkinter import ttk\nfrom tkinter.filedialog import\
    \ askopenfilename\n\nroot = Tk()\n\ndef OpenFile():\n    name = askopenfilename(initialdir=\"\
    C:/\",\n                           filetypes =((\"Text File\", \"*.txt\"),(\"\
    All Files\",\"*.*\")),\n                           title = \"Choose a file.\"\n\
    \                           )\n    print (name)\n    try:\n        with open(name,'r')\
    \ as UseFile:\n            print(UseFile.read())\n    except:\n        print(\"\
    No files opened\")\n\nTitle = root.title( \"File Opener\")\nlabel = ttk.Label(root,\
    \ text =\"File Open\",foreground=\"red\",font=(\"Helvetica\", 16))\nlabel.pack()\n\
    \nmenu = Menu(root)\nroot.config(menu=menu)\n\nfile = Menu(menu)\n\nfile.add_command(label\
    \ = 'Open', command = OpenFile)\nfile.add_command(label = 'Exit', command = lambda:exit())\n\
    \nmenu.add_cascade(label = 'File', menu = file)\n\nroot.mainloop()\n```\n\nIt's\
    \ not quite the same but this code allows you to open files in your system via\
    \ the familiar Windows Explorer. It's worth experimenting with to see what you\
    \ can do with it.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_120_0.png)\n\n##\
    \ Mouse Controlled Turtle\n\n### MOUSETURTLE.PY\n\nWe've already seen the Turtle\
    \ module being controlled by the user via the keyboard but now we thought we'd\
    \ see how the user can use their mouse as a drawing tool within Python. We have\
    \ two possible code examples here, pick which works best for you.\n\nThe first\
    \ piece of code presents the standard Turtle window. Press Space and then click\
    \ anywhere on the screen for the Turtle to draw to the mouse pointer. The second\
    \ allows you to click the Turtle and drag it around the screen; but be warned,\
    \ it can crash Python.\n\n1st Code Example:\n\n```python\nfrom turtle import Screen,\
    \ Turtle\n\nscreen = Screen()\nyertle = Turtle()\n\ndef k101():\n    screen.onscreenclick(click_handler)\n\
    \ndef click_handler(x, y):\n    screen.onscreenclick(None)  # disable event inside\
    \ event handler\n    yertle.setheading(yertle.towards(x, y))\n    yertle.goto(x,\
    \ y)\n    screen.onscreenclick(click_handler)  # reenable event on event handler\
    \ exit\n\nscreen.onkey(k101, \" \")  # space turns on mouse drawing\n\nscreen.listen()\n\
    \nscreen.mainloop()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_121_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_121_1.png)\n\n2nd Code Example:\n\n\
    ```python\nfrom turtle import *\nshape(\"circle\")\npencolor(\"blue\")\nwidth(2)\n\
    ondrag(goto)\nlisten()\n```\n\n> ### Ninja TurtleMouse\n\nThis code utilises some\
    \ interesting skills. Obviously it will stretch your Python Turtle skills to come\
    \ up with any improvements, which is great, but it could make for a nice piece\
    \ of code to insert into something a young child will use. Therefore it can be\
    \ a fantastic project for a younger person to get their teeth into; or perhaps\
    \ even as part of a game where the main character is tasked to draw a skull and\
    \ crossbones or something similar.\n\n## Python Alarm Clock\n\nEver taken a quick\
    \ break from working at the computer, then suddenly realised many minutes later\
    \ that you've spent all that time on Facebook? Introducing the Python alarm clock\
    \ code, where you can drop into the command prompt and tell the code how many\
    \ minutes until the alarm goes off.\n\n### ALARMCLOCK.PY\n\nThis code is designed\
    \ for use in the command prompt, be that Windows, Linux or macOS. There are some\
    \ instructions on how to use it in the main print section but essentially it's:\
    \ python3 AlarmClock.py 10 (to go off in ten minutes).\n\n```python\nimport sys\n\
    import string\nfrom time import sleep\n\nsa = sys.argv\nlsa = len(sys.argv)\n\
    if lsa != 2:\n    print (\"Usage: [ python3 ] AlarmClock.py duration_in_minutes\"\
