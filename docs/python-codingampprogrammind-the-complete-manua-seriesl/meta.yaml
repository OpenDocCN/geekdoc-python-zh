- md: "## Pygame Modules\n\n**STEP 9** You can now implement a few additions and utilise\
    \ some previous tutorial code. The new elements are the Subprocess module, of\
    \ which one function allows us to launch a second Python script from within another;\
    \ and we’re going to create a New File called pygametxt.py:\n\n```\nimport pygame\n\
    import time\nimport subprocess\npygame.init()\nscreen = pygame.display.set_mode((800,\
    \ 250))\nclock = pygame.time.Clock()\n\nfont = pygame.font.Font (None, 25)\n\n\
    pygame.time.set_timer(pygame.USEREVENT, 200)\n\ndef text_generator(text):\n  \
    \  tmp = ''\n    for letter in text:\n        tmp += letter\n        if letter\
    \ != ' ':\n            yield tmp\n\nclass DynamicText(object):\n    def __init__(self,\
    \ font, text, pos, autoreset=False):\n        self.done = False\n        self.font\
    \ = font\n        self.text = text\n        self._gen = text_generator(self.text)\n\
    \        self.pos = pos\n        self.autoreset = autoreset\n        self.update()\n\
    \n    def reset(self):\n        self._gen = text_generator(self.text)\n      \
    \  self.done = False\n        self.update()\n\n    def update(self):\n       \
    \ if not self.done:\n            try: self.rendered = self.font.render(next(self._gen),\
    \ True, (0, 128, 0))\n            except StopIteration:\n                self.done\
    \ = True\n                time.sleep(10)\n                subprocess.Popen(\"\
    python3 /home/pi/Documents/Python\\ Code/pygame1.py 1\", shell=True)\n\n    def\
    \ draw(self, screen):\n        screen.blit(self.rendered, self.pos)\n\ntext=(\"\
    A long time ago, a barbarian strode from the frozen north. Sword in hand...\"\
    )\nmessage = DynamicText(font, text, (65, 120), autoreset=True)\n\nwhile True:\n\
    \    for event in pygame.event.get():\n        if event.type == pygame.QUIT: break\n\
    \        if event.type == pygame.USEREVENT: message.update()\n    else:\n    \
    \    screen.fill(pygame.color.Color('black'))\n        message.draw(screen)\n\
    \        pygame.display.flip()\n        clock.tick(60)\n        continue\n   \
    \ break\npygame.quit()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_102_0.png)\n\
    \n**STEP 10** When you run this code it will display a long, narrow Pygame window\
    \ with the intro text scrolling to the right. After a pause of ten seconds, it\
    \ then launches the main game Python script where you can move the warrior sprite\
    \ around. Overall the effect is quite good but there’s always room for improvement.\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_102_1.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_102_2.png)\n\
    \n## Basic Animation\n\nPython's modules make it relatively easy to create shapes,\
    \ or display graphics and animate them accordingly. Animation though, can be a\
    \ tricky element to get right in code. There are many different ways of achieving\
    \ the same end result and we'll show you one such example here.\n\n## LIGHTS,\
    \ CAMERA, ACTION\n\nThe Tkinter module is an ideal starting point for learning\
    \ animation within Python. Naturally, there are better custom modules out there,\
    \ but Tkinter does the job well enough to get a grasp on what's needed.\n\n**STEP\
    \ 1** Let's make a bouncing ball animation. First, we will need to create a canvas\
    \ (window) and the ball to animate:\n\n```\nfrom tkinter import *\nimport time\n\
    \ngui = Tk()\ngui.geometry(\"800x600\")\ngui.title(\"Pi Animation\")\ncanvas =\
    \ Canvas(gui,\nwidth=800,height=600,bg='white')\ncanvas.pack()\n\nball1 = canvas.create_oval(5,5,60,60,\
    \ fill='red')\n\ngui.mainloop()\n```\n\n**STEP 2** Save and Run the code. You\
    \ will see a blank window appear, with a red ball sitting in the upper left corner\
    \ of the window. While this is great, it's not very animated. Let's add the following\
    \ code:\n\n```\na = 5\nb = 5\n\nfor x in range(0,100):\n    canvas.move(ball1,a,b)\n\
    \    gui.update()\n    time.sleep(.01)\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_103_0.png)\n\
    \n**STEP 3** Insert the new code between the `ball1 = canvas.create_oval(5,5,60,60,\
    \ fill='red')` line and the `gui.mainloop()` line. Save it and Run. You will now\
    \ see the ball move from the top left corner of the animation window, down to\
    \ the bottom right corner. You can alter the speed in which the ball traverses\
    \ the window by altering the `time.sleep(.01)` line. Try (.05).\n\n**STEP 4**\
    \ The `canvas.move(ball1,a,b)` line is the part that moves the ball from one corner\
    \ to the other; obviously with both a and b equalling 5. We can change things\
    \ around a bit already, such as the size and colour of the ball, with the line:\
    \ `ball1 = canvas.create_oval(5,5,60,60, fill='red')` and we can change the values\
    \ of a and b to something else.\n\n```\nball1 = canvas.create_oval(7,7,60,60,\
    \ fill='red')\n\na = 8\nb = 3\n\nfor x in range(0,100):\n    canvas.move(ball1,a,b)\n\
    \    gui.update()\n    time.sleep(.05)\n```\n\n**STEP 5** Let’s see if we can\
    \ animate the ball so that it bounces around the window until you close the program.\n\
    \n```\nxa = 5\nya = 10\nwhile True:\n    canvas.move(ball1,xa,ya)\n    pos=canvas.coords(ball1)\n\
    \    if pos[3] >= 600 or pos[1] <= 0:\n        ya = -ya\n    if pos[2] >= 800\
    \ or pos[0] <= 0:\n        xa = -xa\n    gui.update()\n    time.sleep(.025)\n\
    ```\n\n**STEP 6** Remove the code you entered in Step 2 and insert the code from\
    \ Step 5 in its place; again, between the `ball1 = canvas.create_oval(5,5,60,60,\
    \ fill='red')` and the `gui.mainloop()` lines. Save the code and Run it as normal.\
    \ If you've entered the code correctly, then you will see the red ball bounce\
    \ off the edges of the window until you close the program.\n\n**STEP 7** The bouncing\
    \ animation takes place within the While True loop. First, we have the values\
    \ of xa and ya before the loop, both of 5 and 10. The `pos=canvas.coords(ball1)`\
    \ line takes the value of the ball's location in the window. When it reaches the\
    \ limits of the window, 800 or 600, it will make the values negative; moving the\
    \ ball around the screen.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_104_0.png)\n\
    \n**STEP 8** Pygame, however, is a much better module at producing higher-end\
    \ animations. Begin by creating a New File and entering:\n\n```\nimport pygame\n\
    from random import randrange\n\nMAX_STARS = 250\nSTAR_SPEED = 2\n\ndef init_stars(screen):\n\
    \    \"\"\" Create the starfield \"\"\"\n    global stars\n    stars = []\n  \
    \  for i in range(MAX_STARS):\n        # A star is represented as a list with\
    \ this\n        # format: [X,Y]\n        star = [randrange(0,screen.get_width()\
    \ - 1),\n                randrange(0,screen.get_height() - 1)]\n        stars.append(star)\n\
    \ndef move_and_draw_stars(screen):\n    \"\"\" Move and draw the stars \"\"\"\n\
    \    global stars\n    for star in stars:\n        star[1] += STAR_SPEED\n   \
    \     if star[1] >= screen.get_height():\n            star[1] = 0\n          \
    \  star[0] = randrange(0,639)\n        screen.set_at(star, (255,255,255))\n```\n\
    \n**STEP 9** Now add the following:\n\n```\ndef main():\n    pygame.init()\n \
    \   screen = pygame.display.set_mode((640,480))\n    pygame.display.set_caption(\"\
    Starfield Simulation\")\n    clock = pygame.time.Clock()\n    init_stars(screen)\n\
    \    while True:\n        # Lock the framerate at 50 FPS\n        clock.tick(50)\n\
    \        # Handle events\n        for event in pygame.event.get():\n         \
    \   if event.type == pygame.QUIT:\n                return\n        screen.fill((0,0,0))\n\
    \        move_and_draw_stars(screen)\n        pygame.display.flip()\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_104_1.png)\n\
    \n**STEP 10** Save and Run the code. You will agree that the simulated starfield\
    \ code looks quite impressive. Imagine this as the beginning of some game code,\
    \ or even the start to a presentation? Using a combination of Pygame and Tkinter,\
    \ your Python animations will look fantastic.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_104_2.png)\n\
    \n## Create Your Own Modules\n\nLarge programs can be much easier to manage if\
    \ you break them up into smaller parts and import the parts you need as modules.\
    \ Learning to build your own modules also makes it easier to understand how they\
    \ work.\n\n## BUILDING MODULES\n\nModules are Python files, containing code, that\
    \ you save using a .py extension. These are then imported into Python using the\
    \ now familiar import command.\n\n**STEP 1** Let's start by creating a set of\
    \ basic mathematics functions. Multiply a number by two, three and square or raise\
    \ a number to an exponent (power). Create a New File in the IDLE and enter:\n\n\
    ```\ndef timestwo(x):\n    return x * 2\n\ndef timesthree(x):\n    return x *\
    \ 3\n\ndef square(x):\n    return x * x\n\ndef power(x,y):\n    return x ** y\n\
    ```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_105_0.png)\n\n**STEP 2** Under\
    \ the above code, enter functions to call the code:\n\n```\nprint (timestwo(2))\n\
    print (timesthree(3))\nprint (square(4))\nprint (power(5,3))\n```\n\nSave the\
    \ program as basic_math.py and execute it to get the results.\n\n**STEP 3** Now\
    \ you're going to take the function definitions out of the program and into a\
    \ separate file. Highlight the function definitions and choose Edit > Cut. Choose\
    \ File > New File and use Edit > Paste in the new window. You now have two separate\
    \ files, one with the function definitions, the other with the function calls.\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_105_1.png)\n\n**STEP 4** If you now\
    \ try and execute the basic_math.py code again, the error 'NameError: name 'timestwo'\
