    \ This code, when saved and executed, will display ten random numbers from 1 to\
    \ 25. You can play around with the code to display more or less, and from a greater\
    \ or lesser range. For example:\n\n```\nimport random\n\nfor i in range(25):\n\
    \    print(random.randint(1, 100))\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_54_2.png)\n\
    \n**STEP 8** Multiple modules can be imported within your code. To extend our\
    \ example, use:\n\n```\nimport random\nimport math\n\nfor i in range(5):\n   \
    \ print(random.randint(1, 25))\n\nprint(math.pi)\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_54_3.png)\n\
    \n**STEP 9** The result is a string of random numbers followed by the value of\
    \ Pi as pulled from the Math module using the print(math.pi) function. You can\
    \ also pull in certain functions from a module by using the from and import commands,\
    \ such as:\n\n```\nfrom random import randint\n\nfor i in range(5):\n    print(randint(1,\
    \ 25))\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_54_4.png)\n\n**STEP 10**\
    \ This helps create a more streamlined approach to programming. You can also use\
    \ `import module*`, which will import everything defined within the named module.\
    \ However, it's often regarded as a waste of resources but it works nonetheless.\
    \ Finally, modules can be imported as aliases:\n\n```\nimport math as m\n\nprint(m.pi)\n\
    ```\n\nOf course, adding comments helps to tell others what's going on.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_54_5.png)"
  mdcn: "## 条件和循环\n\n条件和循环是让程序变得有趣的部分；它们可以很简单，也可以相当复杂。如何使用它们很大程度上取决于程序想要实现的目标；它们可以表示游戏中剩余的生命数，也可以仅仅显示一个倒计时。\n\
    \n## 真值条件\n\n从简单的条件开始学习编程会让学习过程更愉快。那么我们从检查某物是否为 **真** 开始，如果是假则执行其他操作。\n\n**步骤\
    \ 1** 让我们创建一个新的 Python 程序，它将要求用户输入一个单词，然后检查它是否是一个四字母单词。从 `File > New File` 开始，并从\
    \ `input` 变量入手：\n\n```\nword=input(\"Please enter a four-letter word: \")\n```\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_51_0.png)\n\n**步骤 2** 现在我们可以创建一个新变量，然后使用\
    \ `len` 函数并将 `word` 变量传入其中，以获取用户刚刚输入的单词的总字母数：\n\n```\nword=input(\"Please enter\
    \ a four-letter word: \")\nword_length=len(word)\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_51_2.png)\n\
    \n**步骤 3** 现在你可以使用一个 `if` 语句来检查 `word_length` 变量是否等于四，并在满足条件时打印一条友好的确认信息：\n\n\
    ```\nword=input(\"Please enter a four-letter word: \")\nword_length=len(word)\n\
    if word_length == 4:\n    print (word, \"is a four-letter word. Well done.\")\n\
    ```\n\n双等号 (`==`) 表示检查某物是否等于另一物。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_51_1.png)\n\
    \n**步骤 4** IF 末尾的冒号告诉 Python，如果此语句为真，则执行冒号后缩进的所有内容。接下来，将光标移回编辑器开头：\n\n```\nword=input(\"\
    Please enter a four-letter word: \")\nword_length=len(word)\nif word_length ==\
    \ 4:\n    print (word, \"is a four-letter word. Well done.\")\nelse:\n    print\
    \ (word, \"is not a four-letter word.\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_51_3.png)\n\
    \n**步骤 5** 按 `F5` 并保存代码以执行它。首先在 Shell 中输入一个四字母单词，你应该会收到消息确认该单词是四个字母。现在再次按 `F5`\
    \ 并重新运行程序，但这次输入一个五字母单词。Shell 将显示它不是一个四字母单词。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_52_0.png)\n\
    \n**步骤 6** 现在扩展代码以包含另一个条件。最终，它可能会变得相当复杂。我们添加了一个针对三字母单词的条件：\n\n```\nword=input(\"\
    Please enter a four-letter word: \")\nword_length=len(word)\nif word_length ==\
    \ 4:\n    print (word, \"is a four-letter word. Well done.\")\nelif word_length\
    \ == 3:\n    print (word, \"is a three-letter word. Try again.\")\nelse:\n   \
    \ print (word, \"is not a four-letter word.\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_52_1.png)\n\
    \n## 循环\n\n循环看起来与条件相似，但它们的操作方式有些不同。循环会多次运行同一段代码块，通常是在条件的支持下。\n\n**步骤 1** 让我们从一个简单的\
    \ `While` 语句开始。像 `IF` 一样，它将检查某物是否为 **真**，然后运行缩进的代码：\n\n```\nx = 1\nwhile x < 10:\n\
    \    print (x)\n    x = x + 1\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_52_2.png)\n\
    \n**步骤 2** `if` 和 `while` 之间的区别在于，当 `while` 到达缩进代码的末尾时，它会返回并检查语句是否仍然为真。在我们的例子中，x\
    \ 小于 10。每次循环时，它打印 x 的当前值，然后将该值加一。当 x 最终等于 10 时，它就会停止。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_52_4.png)\n\
    \n**步骤 3** `For` 循环是另一个例子。`For` 用于遍历一系列数据，通常是存储在方括号内作为变量的列表。例如：\n\n```\nwords=[\"\
    Cat\", \"Dog\", \"Unicorn\"]\nfor word in words:\n    print (word)\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_52_3.png)\n\
    \n**步骤 4** `For` 循环也可以通过使用 `range` 函数在倒计时示例中使用：\n\n```\nfor x in range (1, 10):\n\
    \    print (x)\n```\n\n这里不需要 `x=x+1` 部分，因为 `range` 函数在所使用的第一个和最后一个数字之间创建一个列表。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_52_5.png)\n\n## Python 模块\n\n我们之前提到过模块（`Math`\
    \ 模块），但由于模块是充分利用 Python 的重要组成部分，值得花更多时间来了解它们。在这个例子中，我们使用的是 Windows 版本的 Python\
    \ 3。\n\n### 精通模块\n\n可以将模块视为导入到 Python 代码中以增强和扩展其功能的扩展。有无数模块可用，而且正如我们所见，你甚至可以制作自己的模块。\n\
    \n**步骤 1** 虽然很好，但 Python 中的内置函数是有限的。然而，模块的使用使我们能够编写更复杂的程序。如你所知，模块是导入的 Python 脚本，例如\
    \ `import math`。\n\n```\nPython 3.6.2 (v3.6.2:5fd33b5, Jul  8 2017, 04:14:34)\
    \ [MSC v.1900 32 bit (Intel)] on win32\nType \"copyright\", \"credits\" or \"\
    license()\" for more information.\n>>> import math\n>>> \n```\n\n**步骤 2** 一些模块，尤其是在树莓派上，默认包含在内，`Math`\
    \ 模块就是一个典型的例子。遗憾的是，其他模块并不总是可用。在非树莓派平台上的一个很好的例子是 `Pygame` 模块，它包含许多帮助创建游戏的函数。试试：`import\
    \ pygame`。\n\n```\nPython 3.6.2 (v3.6.2:5fd33b5, Jul  8 2017, 04:14:34) [MSC v.1900\
    \ 32 bit (Intel)] on win32\nType \"copyright\", \"credits\" or \"license()\" for\
    \ more information.\n>>> import pygame\nTraceback (most recent call last):\n \
    \ File \"<pyshell#1>\", line 1, in <module>\n    import pygame\nModuleNotFoundError:\
    \ No module named 'pygame'\n>>> \n```\n\n**步骤 3** 结果是在 IDLE Shell 中出现错误，因为 `Pygame`\
    \ 模块未被识别或未在 Python 中安装。要安装一个模块，我们可以使用 PIP (Pip Installs Packages)。关闭 IDLE Shell\
    \ 并进入命令提示符或终端会话。在提升权限的管理员命令提示符下，输入：\n\n```\nC:\\Users\\david>pip install pygame\n\
    ```\n\n**步骤 4** PIP 安装需要提升权限状态，因为它在不同位置安装组件。Windows 用户可以通过“开始”按钮搜索 `CMD`，右键单击结果，然后点击“以管理员身份运行”。Linux\
    \ 和 Mac 用户可以使用 `Sudo` 命令，即 `sudo pip install package`。\n\n```\nMicrosoft Windows\
    \ [Version 10.0.15063]\n(c) 2017 Microsoft Corporation. All rights reserved.\n\
    \nC:\\WINDOWS\\system32>pip install pygame\nCollecting pygame\n  Using cached\
    \ pygame-1.9.3-cp36-cp36m-win32.whl\nInstalling collected packages: pygame\nSuccessfully\
    \ installed pygame-1.9.3\n\nC:\\WINDOWS\\system32>\n```\n\n**步骤 5** 关闭命令提示符或终端并重新启动\
    \ IDLE Shell。当你现在输入：`import pygame` 时，该模块将毫无问题地导入到代码中。你会发现大多数从网上下载或复制的代码都会包含一个模块，无论是主流的还是独特的，这些通常是执行时出错的原因，因为它们缺失了。\n\
    \n```\nimport pygame\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_54_0.png)\n\
    \n**步骤 6** 模块包含在你自己的代码中实现特定结果所需的额外代码，正如我们之前实验过的那样。例如：\n\n```\nimport random\n\
    ```\n\n引入随机数生成器模块的代码。然后你可以使用此模块来创建类似以下的内容：\n\n```\nfor i in range(10):\n    print(random.randint(1,\
    \ 25))\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_54_1.png)\n\n**步骤 7**\
    \ 此代码在保存并执行后，将显示十个 1 到 25 之间的随机数。你可以随意调整代码以显示更多或更少的数字，以及更大或更小的范围。例如：\n\n```\n\
    import random\n\nfor i in range(25):\n    print(random.randint(1, 100))\n```\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_54_2.png)\n\n**步骤 8** 可以在你的代码中导入多个模块。为了扩展我们的示例，使用：\n\
    \n```\nimport random\nimport math\n\nfor i in range(5):\n    print(random.randint(1,\
    \ 25))\n\nprint(math.pi)\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_54_3.png)\n\
    \n**步骤 9** 结果是一系列随机数，后跟使用 `print(math.pi)` 函数从 `Math` 模块提取的 Pi 值。你还可以通过使用 `from`\
    \ 和 `import` 命令从模块中导入特定函数，例如：\n\n```\nfrom random import randint\n\nfor i in range(5):\n\
    \    print(randint(1, 25))\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_54_4.png)\n\
    \n**步骤 10** 这有助于创建更精简的编程方法。你也可以使用 `import module*`，这将导入命名模块中定义的所有内容。然而，它通常被视为浪费资源，但无论如何它都有效。最后，模块可以作为别名导入：\n\
    \n```\nimport math as m\n\nprint(m.pi)\n```\n\n当然，添加注释有助于告诉其他人发生了什么。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_54_5.png)"
