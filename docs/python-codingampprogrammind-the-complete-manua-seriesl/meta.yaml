- md: "## Using the Man Pages\n\nLinux comes with man (manual) pages that explain\
    \ each command and show you all the options you can use. Once you get the hang\
    \ of reading the man pages, you'll be able to find and do just about anything\
    \ in Linux.\n\n## HEY, MAN!\n\nThe man pages are one of the best features of Linux,\
    \ and as a built-in tool it's invaluable for both beginner and senior level Linux\
    \ administrators. Let's see how it works.\n\n### STEP 1\n\nLinux has a built-in\
    \ manual, known as man for short. Using the man command you can obtain information\
    \ on all the Linux commands we've talked about. Simply enter: man and the name\
    \ of the command you want to learn more about. Start by entering: man ls in the\
    \ command line.\n\n### STEP 3\n\nMost commands are pretty easy to figure out how\
    \ to use, so what you spend most of the time in the man pages is looking under\
    \ the Description. Here you will see all the options and the letters used to activate\
    \ them. Most man pages are longer than a single page, so press any key, such as\
    \ the space bar, to move to the next page of content.\n\n```\npi@raspberrypi ~\
    \ $ man ls\n```\n\n```\n-g like -l, but do not list owner\n--group-directories-first\n\
    \    group directories before files.\n    augment with a --sort option, but any\
    \ use of --sort=none (-U) disables grouping\n-G, --no-group\n    in a long listing,\
    \ don't print group names\n-h, --human-readable\n    with -l, print sizes in human\
    \ readable format (e.g., 1K 234M 2G)\n--si likewise, but use powers of 1000 not\
    \ 1024\n-H, --dereference-command-line\n    follow symbolic links listed on the\
    \ command line\n--dereference-command-line-symlink-to-dir\n    follow each command\
    \ line symbolic link that points to a directory\n--hide=PATTERN\n    do not list\
    \ implied entries matching shell PATTERN (overridden by -a or -A)\n--indicator-style=WORD\n\
    \    append indicator with style WORD to entry names: none (default), slash (-p),\
    \ file-type (--file-type)\n-i, --inode\n    print the index number of each file\n\
    -I, --ignore=PATTERN\n    do not list implied entries matching shell PATTERN\n\
    ```\n\n### STEP 2\n\nThe man pages are a bit more detailed than you might be used\
    \ to. First you have a name, which tells you what the command is called; in this\
    \ case \"list directory contents\" and then the synopsis shows you how it works.\
    \ In this case: \"ls [OPTION].. [FILE..]\". So you enter: ls followed by options\
    \ (such as -la) and the file or directory to list.\n\n```\nLS(1)             \
    \        User Commands                     LS(1)\n\nNAME\n       ls - list directory\
    \ contents\n\nSYNOPSIS\n       ls [OPTION]... [FILE]...\n\nDESCRIPTION\n     \
    \  List information about the FILEs (the current directory by default).  Sort\
    \ entries alphabetically.\n\n       Mandatory arguments to long options are mandatory\
    \ for short options too.\n\n       -a, --all\n              do not ignore entries\
    \ starting with .\n\n       -A, --almost-all\n              do not list implied\
    \ . and ..\n\n       --author\n              with -l, print the author of each\
    \ file\n\n       -b, --escape\n              print C-style escapes for nongraphic\
    \ characters\n\n       --block-size=SIZE\n              scale sizes by SIZE before\
    \ printing them.  E.g., `--block-size=M' prints sizes in units of\n          \
    \    1,048,576 bytes.  See SIZE format below.\n\n       -B, --ignore-backups\n\
    \              do not list implied entries ending with ~\n\n       -c     with\
    \ -lt: sort by, and show, ctime (time of last modification of file status information)\n\
    \              with -l: show ctime and sort by name otherwise: sort by ctime,\
    \ newest first\n\n       -C     list entries by columns\n\n       --color[=WHEN]\n\
    \              colorize the output.  WHEN defaults to `always' or can be `never'\
    \ or `auto'.  More info\n              below.\n\n       -d, --directory\n    \
    \          list directory entries instead of contents, and do not dereference\
    \ symbolic links\n\n       -D, --dired\n              generate output designed\
    \ for Emacs' dired mode\n\n       -f     do not sort, enable -aU, disable -ls\
    \ --color\n\n       -F, --classify\n              append indicator (one of */=>@|)\
    \ to entries\n\n       --file-type\n              likewise, except do not append\
    \ `*'\n\n       --format=WORD\n              across -x, commas -m, horizontal\
    \ -x, long -l, single-column -1, verbose -l, vertical -C\n\n       --full-time\n\
    \              like -l --time-style=full-iso\n\nManual page ls(1) line 1 (press\
    \ h for help or q to quit)\n```\n\n### STEP 4\n\nPress the H key while looking\
    \ at a man page to view the commands you can use to control the view. This is\
    \ called the Summary of Less Commands (the less command is something we'll come\
    \ to when we look at editing text). For now realise that you can move back and\
    \ forward with Z and W. Press Q to quit this help screen and return to the man\
    \ page.\n\n```\nSUMMARY OF LESS COMMANDS\n\nCommands marked with * may be preceded\
    \ by a number, N.\nNotes in parentheses indicate the behavior if N is given.\n\
    \nh H                 Display this help.\nq :q Q :Q ZZ       Exit.\n\n       \
    \                    MOVING\n\ne ^E j ^N CR *     Forward one line  (or N lines).\n\
    y ^Y k ^K ^P *     Backward one line  (or N lines).\nf ^F ^V SPACE *    Forward\
    \ one window (or N lines).\nb ^B ESC-v *       Backward one window (or N lines).\n\
    z                  * Forward one window (and set window to N).\nw            \
    \      * Backward one window (and set window to N).\nESC-SPACE *        Forward\
    \ one window, but don't stop at end-of-file.\nd ^D *             Forward one half-window\
    \ (and set half-window to N).\nu ^U *             Backward one half-window (and\
    \ set half-window to N).\nESC-) RightArrow * Left one half screen width (or N\
    \ positions).\nESC-( LeftArrow *  Right one half screen width (or N positions).\n\
    F                  Forward forever; like \"tail -f\".\nr ^R ^L            Repaint\
    \ screen.\nR                  Repaint screen, discarding buffered input.\n\n \
    \   Default \"window\" is the screen height.\n    Default \"half-window\" is half\
    \ of the screen height.\n\n                           SEARCHING\n\n/pattern  \
    \        * Search forward for (N-th) matching line.\n?pattern          * Search\
    \ backward for (N-th) matching line.\n```\n\n### STEP 5\n\nScroll to the bottom\
    \ of the man page to discover more information. Typically you will find the author's\
    \ name and information on reporting bugs, including web links that can be useful\
    \ for more information. Press Q to exit the man page and return to the command\
    \ line.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_152_0.png)\n\n### STEP 6\n\
    \nThe man command can be used for just about every command you use in Linux. You\
    \ can even enter: man man to get information on using the man tool. From now on,\
    \ whenever you come across a new command in this book, such as “nano” or “chmod”,\
    \ take time to enter: `man nano` or `man chmod` and read the instructions.\n\n\
    ![](img/2a94c98fce5df994fcecd950a995b8c9_152_1.png)\n\n## USING MAN OPTIONS\n\n\
    Because man doesn’t change anything, like mv or mkdir, it is tempting not to see\
    \ it as a command. But it is, and like all other commands it has options. These\
    \ can be very handy to learn.\n\n### STEP 1\n\nEntering: `man man` enables you\
    \ to view some of the options, but sometimes you’ll just want a quick overview.\
    \ Fortunately man has a built-in help option that quickly lists the options. Press\
    \ Q if you’re in a man page and enter: `man -h` at the command line.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_152_2.png)\n\
    \n### STEP 2\n\nIf you’re fast you may have noticed the start of the text flew\
    \ up off the page. This is because the “man -h” option doesn’t use the less command\
    \ by default (less is what enables you to move down text one screen at a time).\
    \ We’ll look into pipes (“|”) later on, but for now just use “man -h | less” to\
    \ read long text one page at a time.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_152_3.png)\n\
    \n### STEP 3\n\nOne of the most powerful man options is the -k option, which is\
    \ for “apropos”. This enables you to search a wider range of man pages than the\
    \ exact command. Enter: `man -k directory` to view all of the man pages relating\
    \ to directories (“man -k directory | less” to view one page at a time). Here\
    \ you’ll find commands like “ls”, “mkdir” and “cd” along with their description.\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_152_4.png)\n\n### STEP 4\n\nEntering\
    \ the man page for all the commands you come across can be a little long-winded,\
    \ although ultimately productive. If you simply want to know what a command does\
    \ you can read just the description using the “whatis” command. Enter: `whatis\
    \ pwd` to read the description of the “pwd” command (“print name of current/working\
    \ directory”).\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_152_5.png)"
  mdcn: "## 使用手册页\n\nLinux 自带手册页（man pages），用于解释每个命令并展示所有可用的选项。一旦你掌握了阅读手册页的技巧，就能在\
    \ Linux 中找到并执行几乎任何操作。\n\n## 嘿，手册！\n\n手册页是 Linux 最棒的功能之一，作为内置工具，它对初学者和资深 Linux\
    \ 管理员都极具价值。让我们看看它是如何工作的。\n\n### 第 1 步\n\nLinux 有一个内置手册，简称 man。使用 man 命令，你可以获取我们讨论过的所有\
    \ Linux 命令的信息。只需输入：man 加上你想了解的命令名称。首先在命令行中输入：man ls。\n\n### 第 3 步\n\n大多数命令都很容易弄清楚如何使用，因此你在手册页中花费的大部分时间是在“描述”部分下查找。在这里，你会看到所有选项以及用于激活它们的字母。大多数手册页都超过一页，因此请按任意键（如空格键）移动到下一页内容。\n\
    \n```\npi@raspberrypi ~ $ man ls\n```\n\n```\n-g like -l, but do not list owner\n\
    --group-directories-first\n    group directories before files.\n    augment with\
    \ a --sort option, but any use of --sort=none (-U) disables grouping\n-G, --no-group\n\
    \    in a long listing, don't print group names\n-h, --human-readable\n    with\
    \ -l, print sizes in human readable format (e.g., 1K 234M 2G)\n--si likewise,\
    \ but use powers of 1000 not 1024\n-H, --dereference-command-line\n    follow\
    \ symbolic links listed on the command line\n--dereference-command-line-symlink-to-dir\n\
    \    follow each command line symbolic link that points to a directory\n--hide=PATTERN\n\
    \    do not list implied entries matching shell PATTERN (overridden by -a or -A)\n\
    --indicator-style=WORD\n    append indicator with style WORD to entry names: none\
    \ (default), slash (-p), file-type (--file-type)\n-i, --inode\n    print the index\
    \ number of each file\n-I, --ignore=PATTERN\n    do not list implied entries matching\
    \ shell PATTERN\n```\n\n### 第 2 步\n\n手册页比你可能习惯的要详细一些。首先有一个名称，告诉你这个命令叫什么；在本例中是“列出目录内容”，然后是概要，向你展示它如何工作。在本例中：“ls\
    \ [选项]... [文件...]”。因此你输入：ls，后跟选项（如 -la）以及要列出的文件或目录。\n\n```\nLS(1)            \
    \         User Commands                     LS(1)\n\nNAME\n       ls - list directory\
    \ contents\n\nSYNOPSIS\n       ls [OPTION]... [FILE]...\n\nDESCRIPTION\n     \
    \  List information about the FILEs (the current directory by default).  Sort\
    \ entries alphabetically.\n\n       Mandatory arguments to long options are mandatory\
    \ for short options too.\n\n       -a, --all\n              do not ignore entries\
    \ starting with .\n\n       -A, --almost-all\n              do not list implied\
    \ . and ..\n\n       --author\n              with -l, print the author of each\
    \ file\n\n       -b, --escape\n              print C-style escapes for nongraphic\
    \ characters\n\n       --block-size=SIZE\n              scale sizes by SIZE before\
    \ printing them.  E.g., `--block-size=M' prints sizes in units of\n          \
    \    1,048,576 bytes.  See SIZE format below.\n\n       -B, --ignore-backups\n\
    \              do not list implied entries ending with ~\n\n       -c     with\
    \ -lt: sort by, and show, ctime (time of last modification of file status information)\n\
    \              with -l: show ctime and sort by name otherwise: sort by ctime,\
    \ newest first\n\n       -C     list entries by columns\n\n       --color[=WHEN]\n\
    \              colorize the output.  WHEN defaults to `always' or can be `never'\
    \ or `auto'.  More info\n              below.\n\n       -d, --directory\n    \
    \          list directory entries instead of contents, and do not dereference\
    \ symbolic links\n\n       -D, --dired\n              generate output designed\
    \ for Emacs' dired mode\n\n       -f     do not sort, enable -aU, disable -ls\
    \ --color\n\n       -F, --classify\n              append indicator (one of */=>@|)\
    \ to entries\n\n       --file-type\n              likewise, except do not append\
    \ `*'\n\n       --format=WORD\n              across -x, commas -m, horizontal\
    \ -x, long -l, single-column -1, verbose -l, vertical -C\n\n       --full-time\n\
    \              like -l --time-style=full-iso\n\nManual page ls(1) line 1 (press\
    \ h for help or q to quit)\n```\n\n### 第 4 步\n\n在查看手册页时按 H 键，可以查看用于控制视图的命令。这称为\
    \ Less 命令摘要（less 命令是我们稍后在查看文本编辑时会遇到的）。现在要知道，你可以用 Z 和 W 前后移动。按 Q 退出此帮助屏幕并返回手册页。\n\
    \n```\nSUMMARY OF LESS COMMANDS\n\nCommands marked with * may be preceded by a\
    \ number, N.\nNotes in parentheses indicate the behavior if N is given.\n\nh H\
    \                 Display this help.\nq :q Q :Q ZZ       Exit.\n\n           \
    \                MOVING\n\ne ^E j ^N CR *     Forward one line  (or N lines).\n\
    y ^Y k ^K ^P *     Backward one line  (or N lines).\nf ^F ^V SPACE *    Forward\
    \ one window (or N lines).\nb ^B ESC-v *       Backward one window (or N lines).\n\
    z                  * Forward one window (and set window to N).\nw            \
    \      * Backward one window (and set window to N).\nESC-SPACE *        Forward\
    \ one window, but don't stop at end-of-file.\nd ^D *             Forward one half-window\
    \ (and set half-window to N).\nu ^U *             Backward one half-window (and\
    \ set half-window to N).\nESC-) RightArrow * Left one half screen width (or N\
    \ positions).\nESC-( LeftArrow *  Right one half screen width (or N positions).\n\
    F                  Forward forever; like \"tail -f\".\nr ^R ^L            Repaint\
    \ screen.\nR                  Repaint screen, discarding buffered input.\n\n \
    \   Default \"window\" is the screen height.\n    Default \"half-window\" is half\
    \ of the screen height.\n\n                           SEARCHING\n\n/pattern  \
    \        * Search forward for (N-th) matching line.\n?pattern          * Search\
    \ backward for (N-th) matching line.\n```\n\n### 第 5 步\n\n滚动到手册页底部以发现更多信息。通常你会找到作者姓名和报告错误的信息，包括可用于获取更多信息的网页链接。按\
    \ Q 退出手册页并返回命令行。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_152_0.png)\n\n###\
    \ 第 6 步\n\nman 命令可用于你在 Linux 中使用的几乎所有命令。你甚至可以输入：man man 来获取有关使用 man 工具的信息。从现在起，每当你在本书中遇到新命令，如“nano”或“chmod”，请花时间输入：`man\
    \ nano` 或 `man chmod` 并阅读说明。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_152_1.png)\n\
    \n## 使用手册选项\n\n因为 man 不会改变任何东西，比如 mv 或 mkdir，所以很容易不把它看作一个命令。但它确实是，而且像所有其他命令一样，它也有选项。这些选项非常方便学习。\n\
    \n### 第 1 步\n\n输入：`man man` 使你可以查看一些选项，但有时你只想要一个快速概览。幸运的是，man 有一个内置帮助选项，可以快速列出选项。如果你在手册页中，按\
    \ Q 退出，然后在命令行输入：`man -h`。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_152_2.png)\n\
    \n### 第 2 步\n\n如果你够快，你可能注意到文本的开头飞快地翻页了。这是因为“man -h”选项默认不使用 less 命令（less 是让你一次向下移动一屏文本的命令）。我们稍后会介绍管道（“|”），但现在只需使用“man\
    \ -h | less”来一次阅读一页长文本。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_152_3.png)\n\
    \n### 第 3 步\n\n最强大的 man 选项之一是 -k 选项，用于“apropos”。这使你可以搜索比精确命令更广泛的手册页范围。输入：`man\
    \ -k directory` 查看所有与目录相关的手册页（“man -k directory | less”一次查看一页）。在这里，你会找到像“ls”、“mkdir”和“cd”这样的命令及其描述。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_152_4.png)\n\n### 第 4 步\n\n为你遇到的每个命令输入手册页可能有点冗长，尽管最终很有成效。如果你只想知道一个命令的作用，可以使用“whatis”命令只阅读描述。输入：`whatis\
    \ pwd` 来阅读“pwd”命令的描述（“打印当前/工作目录的名称”）。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_152_5.png)"
