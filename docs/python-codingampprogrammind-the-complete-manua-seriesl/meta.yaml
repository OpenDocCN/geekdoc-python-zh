    # # PI 4-EVER!


    Introduced on 24th June 2019, the Raspberry Pi 4 Model B is a significant leap
    in terms of Pi performance and hardware specifications. It was also one of the
    quickest models, aside from the original Pi, to sell out.


    With a new 1.5GHz, 64-bit, quad-core ARM Cortex-A72 processor, and a choice of
    1GB, 2GB, or 4GB memory versions, the Pi 4 is one-step closer to becoming a true
    desktop computer. In addition, the Pi 4 was launched with the startling decision
    to include dual-monitor support, in the form of a pair of two micro-HDMI ports.
    You''ll also find a pair of USB 3.0 ports, Bluetooth 5.0, and a GPU that''s capable
    of handing 4K resolutions and OpenGL ES 3.0 graphics. In short, the Pi 4 is the
    most powerful of the current Raspberry Pi models. However, the different memory
    versions have an increased cost. The 1GB version costs £34, 2GB is £44, and the
    4GB version will set you back £54. Remember to also factor in one or two micro-HDMI
    cables with your order.


    # # RASPBIAN BUSTER


    In addition to releasing the Pi 4, the Raspberry Pi team also compiled a new version
    of the Raspbian operating system, codenamed Buster. In conjunction with the new
