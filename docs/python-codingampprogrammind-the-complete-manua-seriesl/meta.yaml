    \n![](img/2a94c98fce5df994fcecd950a995b8c9_106_5.png)\n\n# 聚焦Python：人工智能\n\n人工智能（AI）和机器学习（ML）是IT行业的新兴热门话题。人工智能正迅速成为过去所描绘的那种正在运作的科幻，而其背后正是Python。\n\
    \n尽管人工智能和机器学习如此接近，但这两种技术之间存在明显区别。人工智能指的是研究如何训练计算机去完成那些人类能做得更好、更快的工作。而机器学习则是计算机从其经验中学习的能力，因此其结果和性能最终将变得更加准确和卓越。\n\
    \n虽然它们不同，但本质上都在讨论同一个要素：训练一个系统去学习和独立做事。据说人工智能导向智慧，而机器学习导向知识，得益于Python，这两者之间的差距每天都在缩小。\n\
    \n```python\nimport keras\nfrom keras.datasets import mnist\nfrom keras.models\
