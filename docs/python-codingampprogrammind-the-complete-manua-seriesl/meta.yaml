    # Lists


    Lists are one of the most common types of data structures you will come across
    in Python. A list is simply a collection of items, or data if you prefer, that
    can be accessed as a whole, or individually if wanted.


    # WORKING WITH LISTS


    Lists are extremely handy in Python. A list can be strings, integers and also
    variables. You can even include functions in lists, and lists within lists.


    # STEP 1


    A list is a sequence of data values called items. You create the name of your
    list followed by an equals sign, then square brackets and the items separated
    by commas; note that strings use quotes:


    ```

    numbers = [1, 4, 7, 21, 98, 156]

    mythical_creatures = ["Unicorn", "Balrog", "Vampire", "Dragon", "Minotaur"]

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_63_0.png)


    # STEP 3


    You can also access, or index, the last item in a list by using the minus sign
    before the item number [-1], or the second to last item with [-2] and so on. Trying
    to reference an item that isn''t in the list, such as [10] will return an error:


    ```

    numbers[-1]

    mythical_creatures[-4]

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_63_1.png)


    # STEP 2


    Once you''ve defined your list you can call each by referencing its name, followed
    by a number. Lists start the first item entry as 0, followed by 1, 2, 3 and so
    on. For example:


    ```

    numbers

    numbers[3]

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_63_2.png)


    # STEP 4


    Slicing is similar to indexing but you can retrieve multiple items in a list by
    separating item numbers with a colon. For example:


    ```

    numbers[1:3]

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_63_3.png)'
