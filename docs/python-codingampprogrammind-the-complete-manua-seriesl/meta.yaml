  md: '# ## How to Set Up Python in Windows


    # ### STEP 5


    You may need to confirm the installation with the Windows authentication notification.
    Simply click Yes and Python will begin to install. Once the installation is complete,
    the final Python wizard page will allow you to view the latest release notes and
    follow some online tutorials.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_0.png)


    # ### STEP 6


    Before you close the install wizard window however, it''s best to click on the
    link next to the shield detailed Disable Path Length Limit. This will allow Python
    to bypass the Windows 260 character limitation, enabling you to execute Python
    programs stored in deep folders arrangements. Click Yes again, to authenticate
    the process, then you can Close the installation window.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_1.png)


    # ### STEP 7


    Windows 10 users can now find the installed Python 3.x within the Start button
    Recently Added section. The first link, Python 3.x (32-bit) will launch the command
    line version of Python when clicked (more on that in a moment). To open the IDLE,
    type IDLE into Windows start.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_2.png)


    # ### STEP 8


    Clicking on the IDLE (Python 3.x 32-bit) link will launch the Python Shell, where
    you can begin your Python programming journey. Don''t worry if your version is
    newer, as long as it''s Python 3.x our code works inside your Python 3 interface.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_3.png)


    # ### STEP 9


    If you now click on the Windows Start button again, and this time type: CMD, you''ll
    be presented with the Command Prompt link. Click it to get to the Windows command
    line environment. To enter Python within the command line, you need to type: `python`
    and press Enter.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_4.png)


    # ### STEP 10


    The command line version of Python works in much the same way as the Shell you
    opened in Step 8; note the three left-facing arrows (>>>). Whilst it''s a perfectly
    fine environment, it''s not too user-friendly, so leave the command line for now.
    Enter: `exit()` to leave and close the Command Prompt window.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_30_5.png)'
