  md: "STEP 5 Let’s see if we can animate the ball so that it bounces around the window\
    \ until you close the program.\n\n```\npython\nxa = 5\nya = 10\nwhile True:\n\
    \    canvas.move(ball1,xa,ya)\n    pos=canvas.coords(ball1)\n    if pos[3] >=\
    \ 600 or pos[1] <= 0:\n        ya = -ya\n    if pos[2] >= 800 or pos[0] <= 0:\n\
    \        xa = -xa\n    gui.update()\n    time.sleep(.025)\n```\n\nSTEP 6 Remove\
    \ the code you entered in Step 2 and insert the code from Step 5 in its place;\
    \ again, between the `ball1 = canvas.create_oval(5,5,60,60, fill='red')` and the\
    \ `gui.mainloop()` lines. Save the code and Run it as normal. If you've entered\
    \ the code correctly, then you will see the red ball bounce off the edges of the\
    \ window until you close the program.\n\nSTEP 7 The bouncing animation takes place\
    \ within the While True loop. First, we have the values of xa and xy before the\
    \ loop, both of 5 and 10. The `pos=canvas.coords(ball1)` line takes the value\
    \ of the ball's location in the window. When it reaches the limits of the window,\
    \ 800 or 600, it will make the values negative; moving the ball around the screen.\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_104_0.png)\n\nSTEP 8 Pygame, however,\
    \ is a much better module at producing higher-end animations. Begin by creating\
    \ a New File and entering:\n\n```\npython\nimport pygame\nfrom random import randrange\n\
    \nMAX_STARS = 250\nSTAR_SPEED = 2\n\ndef init_stars(screen):\n    \"\"\" Create\
    \ the starfield \"\"\"\n    global stars\n    stars = []\n    for i in range(MAX_STARS):\n\
    \        # A star is represented as a list with this\n        # format: [X,Y]\n\
    \        star = [randrange(0,screen.get_width() - 1),\n                randrange(0,screen.get_height()\
    \ - 1)]\n        stars.append(star)\n\ndef move_and_draw_stars(screen):\n    \"\
    \"\" Move and draw the stars \"\"\"\n    global stars\n    for star in stars:\n\
    \        star[1] += STAR_SPEED\n        if star[1] >= screen.get_height():\n \
    \           star[1] = 0\n            star[0] = randrange(0,639)\n        screen.set_at(star,\
    \ (255,255,255))\n```\n\nSTEP 9 Now add the following:\n\n```\npython\ndef main():\n\
    \    pygame.init()\n    screen = pygame.display.set_mode((640,480))\n    pygame.display.set_caption(\"\
    Starfield Simulation\")\n    clock = pygame.time.Clock()\n    init_stars(screen)\n\
    \    while True:\n        # Lock the framerate at 50 FPS\n        clock.tick(50)\n\
    \        # Handle events\n        for event in pygame.event.get():\n         \
    \   if event.type == pygame.QUIT:\n                return\n        screen.fill((0,0,0))\n\
    \        move_and_draw_stars(screen)\n        pygame.display.flip()\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_104_1.png)\n\
    \nSTEP 10 Save and Run the code. You will agree that the simulated starfield code\
    \ looks quite impressive. Imagine this as the beginning of some game code, or\
    \ even the start to a presentation? Using a combination of Pygame and Tkinter,\
    \ your Python animations will look fantastic.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_104_2.png)"
