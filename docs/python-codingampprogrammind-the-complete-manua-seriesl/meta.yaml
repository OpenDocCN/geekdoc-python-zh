  md: '# Using Virtual Machines


    Using virtual machines removes the need to dual-boot. Dual-booting is having two,
    or more, physical operating systems installed on the same, or multiple, hard drives
    on a single computer. As the computer powers up, you’re given the option to choose
    which OS you want to boot into. While this sounds like a more ideal scenario it
    isn’t always as straight forward as it sounds, as all the operating systems that
    are booted into will have full access to the computer’s entire system resources.


    # ADVANTAGES FOR CODERS


    For the coder, having a virtual machine setup offers many advantages, the most
    popular being cross-platform code. Meaning if you write code within Windows 10,
    then with an installation of a Linux distro in a hypervisor, you’re able to quickly
    and effortlessly power up the virtual machine and test your code in a completely
    different operating system. From this, you’re able to iron out any bugs, tweak
    the code so it works better on a different platform and expand the reach of your
    code to non-Windows users.


    The problems with dual-booting come when one of the operating systems is updated.
    Most updates cover security patching, or bug fixing, however, some updates can
    alter the core - the kernel, of the OS. When these changes are applied, the update
    may alter the way in which the OS starts up, meaning the initial boot choice you
    made could be overwritten, leaving you without the ability to access the other
    operating systems installed on the computer. To rectify this, you’ll need to access
    the Master Boot Record and alter the configuration to re-allow booting into the
    other systems. There’s also the danger of possibly overwriting the first installed
    OS, or overwriting data and more often than not, most operating systems don’t
    play well when running side-by-side. Indeed, while good, dual-booting has more
    than its fair share of problems. In contrast, using a virtual machine environment,
    while still problematic at times, takes out some of the more nasty and disastrous
    aspects of using multiple operating systems on a single computer.


    The advantage of being able to configure a development environment, in specific
    ways for specific projects, is quite invaluable. Using a virtual machine setup
    greatly reduces the uncertainties that are inherent to having multiple versions
    of programming languages, libraries, IDEs and modules installed, to support the
    many different projects you may become involved in as a coder. Elements of code
    that ‘talk’ directly to specifics of an operating system can easily be overcome,
    without the need to clutter up your main, host system with cross-platform libraries,
    which in turn may have an effect on other libraries within the IDE.


    Another element to consider is stability. If you’re writing code that could potentially
    cause some instability to the core OS during its development phase, then executing
    and testing that code on a virtual machine makes more sense than testing it on
    your main computer; where having to repeatedly reboot, or reset something due
    to the code’s instabilities, can become inefficient and just plain annoying.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_20_0.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_20_1.png)


    The virtual machine environment can be viewed as a sandbox, where you’re able
    to test unsecure, or unstable code without it causing harm, or doing damage, to
    your main, working computer. Viruses and malware can be isolated within the VM
    without infecting the main computer, you’re able to set up anonymity Internet
    use within the VM and you’re able to install third-party software without it slowing
    down your main computer.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_20_2.png)


    # GOING VIRTUAL


    While you’re at the early stages of coding, using a virtual machine may seem a
    little excessive. However, it’s worth looking into because coding in Linux can
    often be easier than coding in Windows, as some versions of Linux have IDEs pre-installed.
    Either way, virtualisation of an operating system is how many of the professional
    and successful coders and developers work, so getting used to it early on in your
    skill set is advantageous.


    To start, look at installing VirtualBox. Then consider taking a look at our Linux
    titles, https://bdmpublications.com/?s=linux&post_type=product, to learn how to
    install Linux in a virtual environment and how best to utilise the operating system.'
