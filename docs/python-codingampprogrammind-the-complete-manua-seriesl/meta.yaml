  md: '# Executing Code from the Command Line


    Although we''re working from the GUI IDLE throughout this book, it''s worth taking
    a look at Python''s command line handling. We already know there''s a command
    line version of Python but it''s also used to execute code.


    # COMMAND THE CODE


    Using the code we created in the previous tutorial, the one we named hello.py,
    let''s see how you can run code that was made in the GUI at the command line level.


    # STEP 1


    Python, in Linux, comes with two possible ways of executing code via the command
    line. One of the ways is with Python 2, whilst the other uses the Python 3 libraries
    and so on. First though, drop into the command line or Terminal on your operating
    system.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_39_0.png)


    # STEP 2


    Just as before, we''re using a Raspberry Pi: Windows users will need to click
    the Start button and search for CMD, then click the Command Line returned search;
    and macOS users can get access to their command line by clicking Go > Utilities
    > Terminal.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_39_1.png)


    # STEP 3


    Now you''re at the command line we can start Python. For Python 3 you need to
    enter the command python3 and press Enter. This will put you into the command
    line version of the Shell, with the familiar three right-facing arrows as the
    cursor (>>>).


    ![](img/2a94c98fce5df994fcecd950a995b8c9_39_2.png)


    # STEP 4


    From here you''re able to enter the code you''ve looked at previously, such as:


    ```

    a=2

    print(a)

    ```


    You can see that it works exactly the same.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_39_3.png)'
