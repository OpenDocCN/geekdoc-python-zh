    \ into the adventure, they can keep playing.\n\nThere's also room in the adventure\
    \ for a set of variables designed for combat, luck, health, endurance and even\
    \ an inventory or amount of gold earned. Each successful combat situation can\
    \ reduce the main character's health but increase their combat skills or endurance.\
    \ Plus, they could loot the body and gain gold, or earn gold through quests.\n\
    \nFinally, how about introducing the Random module. This will enable you to include\
    \ an element of chance in the game. For example, in combat, when you strike an\
    \ enemy you will do a random amount of damage as will they. You could even work\
    \ out the maths behind improving the chance of a better hit based on your or your\
    \ opponent's combat skills, current health, strength and endurance. You could\
    \ create a game of dice in the inn, to see if you win or lose gold (again, improve\
    \ the chances of winning by working out your luck factor into the equation).\n\
    \nNeedless to say, your text adventure can grow exponentially and prove to be\
    \ a work of wonder. Good luck, and have fun with your adventure.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_130_0.png)\n\
    \n## Python Scrolling Ticker Script\n\nYou may be surprised to hear that one of\
    \ the snippets of code we’re often asked for is some form of scrolling ticker.\
    \ Whilst we’ve covered various forms of scrolling text previously, the ticker\
    \ is something that seems to keep cropping up. So, here it is.\n\n## Ticker Time\n\
    \nThe obvious improvements to the Ticker code lie in the speed of the text and\
    \ what the text will display. Otherwise you can change the background colour of\
    \ the ticker window, the font and the font colour, along with the geometry of\
    \ the Tkinter window if you want to.\n\nYet another interesting element that could\
    \ be introduced is one of the many text to Speech modules available for Python\
    \ 3. You could pip install one, import it, then as the ticker displays the text,\
    \ the text to speech function will read out the variable at the same time, since\
    \ the entire text is stored in the variable labelled ‘s’.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_131_0.png)\n\
    \nThe ticker example can be used for system warnings, perhaps something that will\
    \ display across your work or home network detailing the shutting down of a server\
    \ over the weekend for maintenance; or even just to inform everyone as to what’s\
    \ happening. We’re sure you will come up with some good uses for it.\n\n## TICKER.PY\n\
    \nWe’re using Tkinter here along with the Time module to determine the speed the\
    \ text is displayed across the window.\n\n```python\nimport time\nimport tkinter\
    \ as tk\n\nroot = tk.Tk()\ncanvas = tk.Canvas(root, root.title(\"Ticker Code\"\
    ),\n    height=80, width=600, bg=\"yellow\")\ncanvas.pack()\nfont = ('courier',\
    \ 48, 'bold')\ntext_width = 15\n\n#Text blocks insert here....\n\ns1 = \"This\
    \ is a scrolling ticker example. As you\n    can see, it's quite long but can\
    \ be a lot longer if\n    necessary... \"\ns2 = \"We can even extend the length\
    \ of the ticker\n    message by including more variables... \"\ns3 = \"The variables\
    \ are within the s-values in\n    the code. \"\ns4 = \"Don't forget to concatenate\
    \ them all before the\n    For loop, and rename the 'spacer' s-variable too.\"\
    \n\n# pad front and end of text with spaces\ns5 = ' ' * text_width\n# concatenate\
    \ it all\ns = s5 + s1 + s2 + s3 + s4 + s5\nx = 1\ny = 2\ntext = canvas.create_text(x,\
    \ y, anchor='nw', text=s,\n    font=font)\ndx = 1\ndy = 0  # use horizontal movement\
    \ only\n\n# the pixel value depends on dx, font and length of text\npixels = 9000\n\
    \nfor p in range(pixels):\n    # move text object by increments dx, dy\n    #\
    \ -dx --> right to left\n    canvas.move(text, -dx, dy)\n    canvas.update()\n\
    \    # shorter delay --> faster movement\n    time.sleep(0.005)\n    #print(k)\
    \  # test, helps with pixel value\n\nroot.mainloop()\n```"
  mdcn: "## 文本冒险脚本\n\n文本冒险是提升Python编程技能并同时获得乐趣的绝佳方式。我们创建的这个示例将引导你踏上制作经典文本冒险游戏的旅程；最终的结局则由你决定。\n\
    \n## ADVENTURE.PY\n\n冒险游戏首先只使用了Time模块，在打印函数之间创建停顿。其中有一个帮助系统可供扩展，故事本身也可以扩展。\n\n\
    ```python\nimport time\n\nprint(\"\\n\" * 200)\nprint(\">>>>>>>>>>>>>Awesome Adventure<<<<<<<<<<<<\"\
    )\nprint(\"\\n\" * 3)\ntime.sleep(3)\nprint(\"\\nA long time ago, a warrior strode\
    \ forth from the frozen north.\")\ntime.sleep(1)\nprint(\"Does this warrior have\
    \ a name?\")\nname=input(\"> \")\nprint(name, \"the barbarian, sword in hand and\
    \ looking for adventure!\")\ntime.sleep(1)\nprint(\"However, evil is lurking nearby....\"\
    )\ntime.sleep(1)\nprint(\"A pair of bulbous eyes regards the hero...\")\ntime.sleep(1)\n\
    print(\"Will\", name, \"prevail, and win great fortune...\")\ntime.sleep(1)\n\
    print(\"Or die by the hands of great evil...?\")\ntime.sleep(1)\nprint(\"\\n\"\
    \ *3)\nprint(\"Only time will tell....\")\ntime.sleep(1)\nprint('...')\ntime.sleep(1)\n\
    print('...')\ntime.sleep(1)\nprint('...')\ntime.sleep(1)\nprint('...')\ntime.sleep(5)\n\
    print(\"\\n\" *200)\n\nprint('''        You find yourself at a small inn. There’s\
    \ little gold in your purse but your sword is sharp, and you’re ready for adventure.\n\
    \            With you are three other customers.\n            A ragged looking\
    \ man, and a pair of dangerous looking guards.''')\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_129_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_129_1.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_129_2.png)\n\
    \n```python\ndef start():\n    print(\"\\n -----------\")\n    print(\"Do you\
    \ approach the...\")\n    print(\"\\n\")\n    print(\"1. Ragged looking man\"\
    )\n    print(\"2. Dangerous looking guards\")\n\n    cmdlist=[\"1\", \"2\"]\n\
    \    cmd=getcmd(cmdlist)\n\n    if cmd == \"1\":\n        ragged()\n    elif cmd\
    \ == \"2\":\n        guards()\n\ndef ragged():\n    print(\"\\n\" * 200)\n   \
    \ print('''        You walk up to the ragged looking man and greet him.\n    \
    \        He smiles a toothless grin and with a strange accent, says.\n       \
    \     \"Buy me a cup of wine, and I’ll tell you of great treasure....\"''')\n\
    \    time.sleep(2)\n\ndef guards():\n    print(\"\\n\" *200)\n    print('''  \
    \          You walk up to the dangerous looking guards and greet them.\n     \
    \       The guards look up from their drinks and snarl at you.\n            \"\
    What do you want, barbarian?\" One guard reaches for the hilt of his sword.''')\n\
    \    time.sleep(2)\n\ndef getcmd(cmdlist):\n    cmd = input(name+\">\")\n    if\
    \ cmd in cmdlist:\n        return cmd\n    else:\n        print(\"Bad command,\
    \ try again.\")\n        return getcmd(cmdlist)\n```\n\n```python\nif cmd == \"\
    1\":\n    ragged()\nelif cmd == \"2\":\n    guards()\n\ndef ragged():\n    print(\"\
    \\n\" * 200)\n    print('''You walk up to the ragged looking man and\n    greet\
    \ him.\n    He smiles a toothless grin and, with a strange\n    accent, says.\n\
    \    \"Buy me a cup of wine, and I'll tell you of\n    great treasure...''')\n\
    \    time.sleep(2)\n\ndef guards():\n    print(\"\\n\" * 200)\n    print('''You\
    \ walk up to the dangerous looking guards\n    and greet them.\n    The guards\
    \ look up from their drinks and\n    snarl at you.\n    \"What do you want, barbarian?\"\
    \ One guard reaches\n    for the hilt of his sword...''')\n    time.sleep(2)\n\
    ```\n\n```python\ndef getcmd(cmdlist):\n    cmd = input(name+\">\")\n    if cmd\
    \ in cmdlist:\n        return cmd\n    elif cmd == \"help\":\n        print(\"\
    \\nEnter your choices as detailed in\n        the game.\")\n        print(\"or\
    \ enter 'quit' to leave the game\")\n        return getcmd(cmdlist)\n    elif\
    \ cmd == \"quit\":\n        print(\"\\n-----------\")\n        time.sleep(1)\n\
    \        print(\"Sadly you return to your homeland without\n        fame or fortune...\"\
    )\n        time.sleep(5)\n        exit()\n\nif __name__ == \"__main__\":\n   \
    \ start()\n```\n\n## 冒险时光\n\n如你所见，这只是冒险的开始，已经占用了相当多的代码行。当你扩展它，并编织故事时，你会发现你可以重复某些场景，比如与敌人的偶遇等。\n\
    \n我们将两次遭遇都定义为一组函数，同时在`cmdlist`列表和`cmd`变量下提供了一系列可能的选择，`cmd`本身也是一个定义好的函数。扩展这个结构非常简单，只需规划好每次遭遇和选择，并围绕它创建一个定义好的函数。只要用户不在冒险中输入`quit`，他们就可以一直玩下去。\n\
    \n冒险中还有空间设置一组变量，用于战斗、运气、生命值、耐力，甚至是一个物品栏或获得的金币数量。每次成功的战斗情况都可以减少主角的生命值，但增加他们的战斗技能或耐力。此外，他们可以搜刮尸体获得金币，或通过任务赚取金币。\n\
    \n最后，考虑引入Random模块如何？这将使你能够在游戏中加入随机元素。例如，在战斗中，当你攻击敌人时，你会造成随机伤害，敌人也是如此。你甚至可以根据你或对手的战斗技能、当前生命值、力量和耐力，计算出提高更好命中率的数学公式。你可以在旅馆里创建一个骰子游戏，看看你是赢还是输金币（同样，通过将你的运气因素纳入计算来提高获胜几率）。\n\
    \n不用说，你的文本冒险游戏可以呈指数级增长，并证明是一件奇妙的作品。祝你好运，享受你的冒险吧。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_130_0.png)\n\
    \n## Python滚动字幕脚本\n\n你可能会惊讶地发现，我们经常被要求提供的代码片段之一就是某种形式的滚动字幕。虽然我们之前已经介绍过各种形式的滚动文本，但字幕似乎一直不断出现。所以，这就是了。\n\
    \n## 字幕时光\n\n对字幕代码的明显改进在于文本的速度和文本将显示的内容。否则，你可以更改字幕窗口的背景颜色、字体和字体颜色，以及Tkinter窗口的几何形状（如果你愿意的话）。\n\
    \n另一个可以引入的有趣元素是Python 3可用的众多文本转语音模块之一。你可以通过`pip install`安装一个，导入它，然后当字幕显示文本时，文本转语音函数会同时读出变量，因为整个文本都存储在标记为`s`的变量中。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_131_0.png)\n\n字幕示例可用于系统警告，例如显示在你的工作或家庭网络上，详细说明周末为维护而关闭服务器；或者只是告知每个人正在发生的事情。我们相信你会想出一些好的用途。\n\
    \n## TICKER.PY\n\n我们在这里使用Tkinter和Time模块来确定文本在窗口中显示的速度。\n\n```python\nimport time\n\
    import tkinter as tk\n\nroot = tk.Tk()\ncanvas = tk.Canvas(root, root.title(\"\
    Ticker Code\"),\n    height=80, width=600, bg=\"yellow\")\ncanvas.pack()\nfont\
    \ = ('courier', 48, 'bold')\ntext_width = 15\n\n#Text blocks insert here....\n\
    \ns1 = \"This is a scrolling ticker example. As you\n    can see, it's quite long\
    \ but can be a lot longer if\n    necessary... \"\ns2 = \"We can even extend the\
    \ length of the ticker\n    message by including more variables... \"\ns3 = \"\
    The variables are within the s-values in\n    the code. \"\ns4 = \"Don't forget\
    \ to concatenate them all before the\n    For loop, and rename the 'spacer' s-variable\
    \ too.\"\n\n# pad front and end of text with spaces\ns5 = ' ' * text_width\n#\
    \ concatenate it all\ns = s5 + s1 + s2 + s3 + s4 + s5\nx = 1\ny = 2\ntext = canvas.create_text(x,\
    \ y, anchor='nw', text=s,\n    font=font)\ndx = 1\ndy = 0  # use horizontal movement\
    \ only\n\n# the pixel value depends on dx, font and length of text\npixels = 9000\n\
    \nfor p in range(pixels):\n    # move text object by increments dx, dy\n    #\
    \ -dx --> right to left\n    canvas.move(text, -dx, dy)\n    canvas.update()\n\
    \    # shorter delay --> faster movement\n    time.sleep(0.005)\n    #print(k)\
    \  # test, helps with pixel value\n\nroot.mainloop()\n```"
