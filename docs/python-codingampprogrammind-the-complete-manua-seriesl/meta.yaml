    # Splitting and Joining Strings


    When dealing with data in Python, especially from a user’s input, you will undoubtedly
    come across long sets of strings. A useful skill to learn in Python programming
    is being able to split those long strings for better readability.


    ## STRING THEORIES


    You’ve already looked at some list functions, using .insert, .remove, and .pop
    but there are also functions that can be applied to strings.


    **STEP 1** The main tool in the string function arsenal is .split(). With it you’re
    able to split apart a string of data, based on the argument within the brackets.
    For example, here’s a string with three items, each separated by a space:


    ```python

    text="Daniel Hannah Emma"

    ```


    **STEP 3** Note that the text.split part has the brackets, quotes, then a space
    followed by closing quotes and brackets. The space is the separator, indicating
    that each list item entry is separated by a space. Likewise, CSV (Comma Separated
    Value) content has a comma, so you’d use:


    ```python

    text="January,February,March,April,May,June"

    months=text.split(",")

    months

    ```


    ```

    >>> text="Daniel Hannah Emma"

    >>> names=text.split(" ")

    >>> names

    [''Daniel'', ''Hannah'', ''Emma'']

    >>>

    ```


    ```

    >>> text="January,February,March,April,May,June"

    >>> months=text.split(",")

    >>> months

    [''January'', ''February'', ''March'', ''April'', ''May'', ''June'']

    >>>

    ```


    **STEP 2** Now let’s turn the string into a list and split the content accordingly:


    ```python

    names=text.split(" ")

    ```


    Then enter the name of the new list, names, to see the three items.


    **STEP 4** You’ve previously seen how you can split a string into individual letters
    as a list, using a name:


    ```python

    name=list("David")

    name

    ```


    The returned value is ‘D’, ‘a’, ‘v’, ‘i’, ‘d’. Whilst it may seem a little useless
    under ordinary circumstances, it could be handy for creating a spelling game for
    example.


    ```

    >>> text="Daniel Hannah Emma"

    >>> names=text.split(" ")

    >>> names

    [''Daniel'', ''Hannah'', ''Emma'']

    >>>

    ```


    ```

    >>> name=list("David")

    >>> name

    [''D'', ''a'', ''v'', ''i'', ''d'']

    >>>

    ```


    # Splitting and Joining Strings


    **STEP 5** The opposite of the .split function is .join, where you will have separate
    items in a string and can join them all together to form a word or just a combination
    of items, depending on the program you’re writing. For instance:


    ```python

    alphabet="".join(["a","b","c","d","e"])

    alphabet

    ```


    This will display ''abcde'' in the Shell.


    **STEP 6** You can therefore apply .join to the separated name you made in Step
    4, combining the letters again to form the name:


    ```python

    name="".join(name)

    name

    ```


    We’ve joined the string back together, and retained the list called name, passing
    it through the .join function.


    **STEP 7** A good example of using the .join function is when you have a list
    of words you want to combine into a sentence:


    ```python

    list=["Conan", "raised", "his", "mighty", "sword", "and", "struck", "the", "demon"]

    text=" ".join(list)

    text

    ```


    Note the space between the quotes before the .join function (where there were
    no quotes in Step 6’s .join).


    **STEP 8** As with the .split function, the separator doesn’t have to be a space,
    it can also be a comma, a full stop, a hyphen or whatever you like:


    ```python

    colours=["Red", "Green", "Blue"]

    col=",".join(colours)

    col

    ```


    **STEP 9** There’s some interesting functions you apply to a string, such as .capitalize
    and .title. For example:


    ```python

    title="conan the cimmerian"

    title.capitalize()

    title.title()

    ```


    **STEP 10** You can also use logic operators on strings, with the ‘in’ and ‘not
    in’ functions. These enable you to check if a string contains (or does not contain)
    a sequence of characters:


    ```python

    message="Have a nice day"

    "nice" in message

    "bad" not in message

    "day" not in message

    "night" in message

    ```


    # Formatting Strings


    When you work with data, creating lists, dictionaries and objects you may often
    want to print out the results. Merging strings with data is easy especially with
    Python 3, as earlier versions of Python tended to complicate matters.


    ## STRING FORMATTING


    Since Python 3, string formatting has become a much neater process, using the
    .format function combined with curly brackets. It’s a more logical and better
    formed approach than previous versions.


    ### STEP 1


    The basic formatting in Python is to call each variable into the string using
    the curly brackets:


    ```python

    name="Conan"

    print("The barbarian hero of the Hyborian Age is: {}".format(name))

    ```


    ### STEP 2


    Remember to close the print function with two sets of brackets, as you’ve encased
    the variable in one, and the print function in another. You can include multiple
    cases of string formatting in a single print function:


    ```python

    name="Conan"

    place="Cimmeria"

    print("{} hailed from the North, in a cold land known as {}".format(name, place))

    ```


    ### STEP 3


