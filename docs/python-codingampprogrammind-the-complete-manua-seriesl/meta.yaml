    bzcmp bzip2recover chvt df ed fuser ip

    bzdiff bzless con2fbmap dir egrep fusermount kbd

    bzegrep bzmore cp dmesg false grep kil

    bzexe cat cpio dnsdomainname fbset gunzip kmo

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls /var

    backups cache lib local lock log mail opt run spool swap tmp ww

    pi@raspberrypi ~ $

    ```'
- md: '## Creating and Deleting Files


    Being able to create and delete a file is an everyday computing skill. However,
    when using the Linux Terminal, there’s an element of care required, chiefly because
    any deleted files aren’t placed in the system recycle bin.


    ## CREATING FILES


    Once you learn to recognise the files and directories that make up Raspbian OS,
    it’s time to discover how to make your own. Knowing how to make, edit and delete
    files and directories is essential if you want to make your own projects.


    ### STEP 1

    We’re going to create a file using a command called Touch. Touch is an interesting
    command that reaches out to a file, or directory, and updates it (this changes
    the system time as if you’d just opened the file). You can see Touch in access
    using “ls -l” and checking the time next to a directory (such as Scratch).


    ### STEP 3

    If you try to touch a file that doesn’t exist, you create a blank file with that
    name. Try it now. Type `touch testfile` and `ls -l` to view the files. You’ll
    now have a new file in your home directory called “testfile”. Notice that the
    size of the file is 0, because it has nothing in it.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi     0 May 13 11:10 testfile

    pi@raspberrypi ~ $ _

    ```


    ### STEP 2

    Now enter: `touch Scratch` and `ls -l` again and notice that the time has changed.
    It now matches the current time. You might be wondering what this has to do with
    creating files or directories. Touch has a second, more popular, use, which is
    to create files.


    ### STEP 4

    A quick word about file names: remember that Linux is case sensitive, so if you
    now enter: `touch Testfile` (with a capital T), it doesn’t update ‘testfile’;
    instead, it creates a second file called ‘Testfile’. Enter: `ls -l` to see both
    files. This is confusing, so most people stick with using lowercase letters at
    all times.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $ touch Scratch

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi     0 May 13 11:08 testfile

    pi@raspberrypi ~ $ touch Testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi     0 May 13 11:08 testfile

    -rw-r--r-- 1 pi pi     0 May 13 11:10 Testfile

    pi@raspberrypi ~ $ _

    ```


    ### STEP 5

    Another important thing to know is never to use a space in your file names. If
    you try to enter: touch test file, you create a document called “test” and another
    called “file”. Technically there are ways to create files containing a space but
    you should always use an underscore character ("_") instead of a space, such as
    “touch test_file”.


    ```

    pi@raspberrypi ~ $ touch test file

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:15 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    -rw-r--r-- 1 pi pi    0 May 13 11:12 Testfile

    pi@raspberrypi ~ $ _

    ```


    ### STEP 6

    Here are some other files names to avoid: #%&{}[]<>*?/$!"'':@+|=. The full stop
    (.) is used to create an extension to a file; usually used to indicate a file
    type, such as textfile.txt or compressedfile.zip, and starting a file with a full
    stop makes it invisible. Don’t use full stop in place of a space though; stick
    to underscores.


    ```

    pi@raspberrypi ~ $ touch don''t.use{odd}symbols&in<filenames>or=you''ll^confu

    ```


    ## REMOVING FILES


    We''ve created some files that we don''t want, so how do we go about removing
    them? It turns out that deleting files in your Raspberry Pi is really easy, which
    may be a problem, so be careful.


    ### STEP 1

    Enter: ls -l to view the files in your home directory. If you''ve followed the
    steps before then you should have three files: “test”, “testfile”, and “Testfile”.
    We''re going to get rid of these items because they were created as an example.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:15 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    -rw-r--r-- 1 pi pi    0 May 13 11:46 Testfile

    pi@raspberrypi ~ $ _

    ```


    ### STEP 2

    To get rid of files you use the “rm” command. Enter: rm Testfile to delete the
    file called “Testfile” (with the uppercase “T”). Enter: ls -l and you''ll find
    it''s gone. Where is it? It''s not in the Trash or Recycle Bin, like on a Mac
    or Windows PC. It''s deleted completely and cannot be recovered. Bear this in
    mind and always think before deleting files.


    ```

    pi@raspberrypi ~ $ rm Testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:15 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    pi@raspberrypi ~ $ _

    ```


    ### STEP 3

    We''re going to use a wildcard (*) to delete our next two files, but again this
    is something you really need to do with care. First use “ls” to list the files
    and make sure it''s the one you want to delete. Enter: ls test* to view files
    that match the word “test” and any other characters. The “*” character is called
    a “wildcard” and it means any characters here.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Desktop

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Documents

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Downloads

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 file

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Scratch

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 test

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 testfile

    pi@raspberrypi ~ $ ls test*

    test  testfile

    pi@raspberrypi ~ $ _

    ```


    ### STEP 4

    We see that “ls test*” matches two files: “test” and “testfile”, but not the file
    called “file”. That''s because it didn''t match the “test” part of “test*”. Check
    carefully over groups of files you want to remove (remember you can''t recover
    them) and replace the “ls” with “rm”. Enter: rm test* to remove both files. Finally
    enter: rm file to get rid of the confusing file.


    ```

    pi@raspberrypi ~ $ rm test*

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Desktop

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Documents

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Downloads

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 file

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Scratch

    pi@raspberrypi ~ $ rm file

    pi@raspberrypi ~ $ _

    ```'
  mdcn: '## 创建和删除文件


    能够创建和删除文件是一项日常的计算技能。但是，使用 Linux 终端时需要格外小心，主要是因为任何已删除的文件都不会放入系统回收站。


    ## 创建文件


    一旦你学会识别组成 Raspbian 操作系统的文件和目录，就该探索如何创建自己的了。知道如何创建、编辑和删除文件和目录，对于创建自己的项目至关重要。


    ### 第1步

    我们将使用名为 `Touch` 的命令来创建一个文件。`Touch` 是一个有趣的命令，它会接触一个文件或目录并更新它（这会改变系统时间，就像你刚刚打开了该文件一样）。你可以通过使用
    `ls -l` 命令并检查目录（例如 Scratch）旁的时间来查看 Touch 的访问时间。


    ### 第3步

    如果你尝试对一个不存在的文件执行 touch 操作，你将创建一个具有该名称的空白文件。现在试试看。输入 `touch testfile` 和 `ls -l`
    来查看文件。现在你的主目录中会有一个名为 "testfile" 的新文件。注意文件大小为 0，因为它里面什么都没有。


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi     0 May 13 11:10 testfile

    pi@raspberrypi ~ $ _

    ```


    ### 第2步

    现在输入：`touch Scratch` 然后再次输入 `ls -l`，注意时间已经改变了。它现在匹配当前时间。你可能想知道这与创建文件或目录有什么关系。Touch
    有第二个更常见的用途，就是创建文件。


    ### 第4步

    简要说明一下文件名：记住 Linux 区分大小写，所以如果你现在输入：`touch Testfile`（首字母大写的 T），它不会更新 "testfile"；而是会创建第二个名为
    "Testfile" 的文件。输入：`ls -l` 可以查看两个文件。这很容易混淆，所以大多数人坚持始终使用小写字母。


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $ touch Scratch

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi     0 May 13 11:08 testfile

    pi@raspberrypi ~ $ touch Testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi     0 May 13 11:08 testfile

    -rw-r--r-- 1 pi pi     0 May 13 11:10 Testfile

    pi@raspberrypi ~ $ _

    ```


    ### 第5步

    另一个需要知道的重要事项是：文件名中永远不要使用空格。如果你尝试输入：`touch test file`，你会创建一个名为 "test" 的文档和另一个名为
    "file" 的文档。从技术上讲，有办法创建包含空格的文件，但你应该始终使用下划线字符（"_"）代替空格，例如 "touch test_file"。


    ```

    pi@raspberrypi ~ $ touch test file

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:15 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    -rw-r--r-- 1 pi pi    0 May 13 11:12 Testfile

    pi@raspberrypi ~ $ _

    ```


    ### 第6步

    以下是一些需要避免的其他文件名：#%&{}[]<>*?/$!"'':@+|=。句点（.）用于创建文件扩展名；通常用于指示文件类型，例如 textfile.txt
    或 compressedfile.zip，并且以句点开头的文件会变成隐藏文件。但不要用句点代替空格；坚持使用下划线。


    ```

    pi@raspberrypi ~ $ touch don''t.use{odd}symbols&in<filenames>or=you''ll^confu

    ```


    ## 删除文件


    我们已经创建了一些不需要的文件，那么我们该如何删除它们呢？事实证明，在你的树莓派上删除文件非常容易，这可能是个问题，所以要小心。


    ### 第1步

    输入：`ls -l` 以查看主目录中的文件。如果你之前按照步骤操作，那么你应该有三个文件："test"、"testfile" 和 "Testfile"。我们将删除这些项目，因为它们是作为示例创建的。


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:15 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    -rw-r--r-- 1 pi pi    0 May 13 11:46 Testfile

    pi@raspberrypi ~ $ _

    ```


    ### 第2步

    要删除文件，你需要使用 `rm` 命令。输入：`rm Testfile` 以删除名为 "Testfile"（首字母大写的 "T"）的文件。输入：`ls -l`
    你会发现它不见了。它去哪了？它不像 Mac 或 Windows 电脑那样在回收站或垃圾桶里。它被完全删除并且无法恢复。记住这一点，删除文件前一定要三思。


    ```

    pi@raspberrypi ~ $ rm Testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:15 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    pi@raspberrypi ~ $ _

    ```


    ### 第3步

    我们将使用通配符（*）来删除接下来的两个文件，但这同样需要非常小心。首先使用 `ls` 列出文件，确保你要删除的是正确的文件。输入：`ls test*` 以查看匹配
    "test" 及任何其他字符的文件。`*` 字符被称为 "通配符"，它表示此处匹配任意字符。


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Desktop

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Documents

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Downloads

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 file

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Scratch

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 test

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 testfile

    pi@raspberrypi ~ $ ls test*

    test  testfile

    pi@raspberrypi ~ $ _

    ```


    ### 第4步

    我们看到 `ls test*` 匹配了两个文件："test" 和 "testfile"，但不匹配名为 "file" 的文件。这是因为它不匹配 "test*"
    中的 "test" 部分。仔细检查要删除的文件组（记住你无法恢复它们），然后将 `ls` 替换为 `rm`。输入：`rm test*` 以删除这两个文件。最后输入：`rm
    file` 以删除那个令人困惑的文件。


    ```

    pi@raspberrypi ~ $ rm test*

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Desktop

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Documents

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Downloads

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 file

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 indiecity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Scratch

    pi@raspberrypi ~ $ rm file

    pi@raspberrypi ~ $ _

    ```'
