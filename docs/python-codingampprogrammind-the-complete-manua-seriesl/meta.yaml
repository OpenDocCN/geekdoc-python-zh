  md: "# Useful System and Disk Commands\n\nUnderstanding these core Linux commands\
    \ will enable you to not only master the inner workings of your Raspberry Pi but\
    \ also to transfer those skills to other Linux distros, such as Ubuntu or Linux\
    \ Mint.\n\n# LOTS OF LINUX\n\nLinux is a huge and versatile command line language\
    \ and there are hundreds of commands you can learn and use. Here are a few that\
    \ can help you get more from your Raspberry Pi.\n\nSTEP 1 The Raspberry Pi is\
    \ a great little computer, so let's start by getting some information. Enter:\
    \ `cat /proc/cpuinfo` to view some details on your Raspberry Pi processors. If\
    \ you have a Raspberry Pi 3 you will see four processors, along with the model\
    \ name and other info.\n\n```\npi@raspberrypi ~ $ cat /proc/cpuinfo\nprocessor\t\
    : 0\nmodel name\t: ARMv7 Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t\
    : half thumb fastmult vfp edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\n\
    CPU implementer\t: 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t:\
    \ 0xc07\nCPU revision\t: 5\n\nprocessor\t: 1\nmodel name\t: ARMv7 Processor rev\
    \ 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t: half thumb fastmult vfp edsp neon vfpv3\
    \ tls vfpv4 idiva idivt vfpd32 lpae evtstrm\nCPU implementer\t: 0x41\nCPU architecture:\
    \ 7\nCPU variant\t: 0x0\nCPU part\t: 0xc07\nCPU revision\t: 5\n\nprocessor\t:\
    \ 2\nmodel name\t: ARMv7 Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t\
    : half thumb fastmult vfp edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\n\
    CPU implementer\t: 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t:\
    \ 0xc07\nCPU revision\t: 5\n```\n\nSTEP 3 Enter: `uname` to view the name of the\
    \ operating system's kernel, this is the element that sits between the interface\
    \ and hardware. Just as you would suspect, the response from the command is Linux,\
    \ as Raspbian is a Linux distro, which in itself is based on another Linux distro\
    \ called Debian. While it may sound complicated, it actually demonstrates how\
    \ versatile Linux is.\n\n```\npi@raspberrypi ~ $ uname\nLinux\npi@raspberrypi\
    \ ~ $\n```\n\nSTEP 2 Remember that cat is used to list the contents of a text\
    \ file, which is what cpuinfo is. There are other text files with system info\
    \ available. Try \"cat /proc/meminfo\" to get information about your memory, \"\
    cat /proc/partitions\" for information about your SD card, and \"cat /proc/version\"\
    \ shows which version of Raspberry Pi you are using.\n\n```\npi@raspberrypi ~\
    \ $ cat /proc/meminfo\nMemTotal:       884304 kB\nMemFree:        704576 kB\n\
    MemAvailable:   834088 kB\nBuffers:         11660 kB\nCached:          56340 kB\n\
