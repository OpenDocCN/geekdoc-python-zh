  md: "# # Python Modules\n\nWe’ve mentioned modules previously, (the Math module)\
    \ but as modules are such a large part of getting the most from Python, it’s worth\
    \ dedicating a little more time to them. In this instance we’re using the Windows\
    \ version of Python 3.\n\n# ## MASTERING MODULES\n\nThink of modules as an extension\
    \ that’s imported into your Python code to enhance and extend its capabilities.\
    \ There are countless modules available and as we’ve seen, you can even make your\
    \ own.\n\n# ### STEP 1\n\nAlthough good, the built-in functions within Python\
    \ are limited. The use of modules, however, allows us to make more sophisticated\
    \ programs. As you are aware, modules are Python scripts that are imported, such\
    \ as import math.\n\n```\npython\nPython 3.6.2 (v3.6.2:5fd33b5, Jul  8 2017, 04:14:34)\
    \ [MSC v.1900 32 bit (Intel)] on win32\nType \"copyright\", \"credits\" or \"\
    license()\" for more information.\n>>> import math\n>>> \n\n```\n\n# ### STEP\
    \ 3\n\nThe result is an error in the IDLE Shell, as the Pygame module isn’t recognised\
    \ or installed in Python. To install a module we can use PIP (Pip Installs Packages).\
    \ Close down the IDLE Shell and drop into a command prompt or Terminal session.\
    \ At an elevated admin command prompt, enter:\n\n```\n\nC:\\Users\\david>pip install\
    \ pygame\n\n```\n\n# ### STEP 2\n\nSome modules, especially on the Raspberry Pi,\
    \ are included by default, the Math module being a prime example. Sadly, other\
    \ modules aren’t always available. A good example on non-Pi platforms is the Pygame\
    \ module, which contains many functions to help create games. Try: import pygame.\n\
    \n```\npython\nPython 3.6.2 (v3.6.2:5fd33b5, Jul  8 2017, 04:14:34) [MSC v.1900\
    \ 32 bit (Intel)] on win32\nType \"copyright\", \"credits\" or \"license()\" for\
    \ more information.\n>>> import pygame\nTraceback (most recent call last):\n \
    \ File \"<pyshell#1>\", line 1, in <module>\n    import pygame\nModuleNotFoundError:\
    \ No module named 'pygame'\n>>> \n\n```\n\n# ### STEP 4\n\nThe PIP installation\
    \ requires an elevated status due it installing components at different locations.\
