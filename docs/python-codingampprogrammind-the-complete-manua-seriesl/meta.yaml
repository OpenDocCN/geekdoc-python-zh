    \n# STEP 7 You may have guessed that you can pass the readline() function into\
    \ a variable, thus allowing you to call it again when needed:\n\n```\npoem=open(\"\
    /home/pi/Documents/Poem.txt\")\nline=poem.readline()\nline\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_76_2.png)\n\
    \n# STEP 8 Extending this further, you can use readlines() to grab all the lines\
