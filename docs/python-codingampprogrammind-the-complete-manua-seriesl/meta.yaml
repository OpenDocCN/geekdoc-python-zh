    \ 180)`, where the size is 50, but you’re telling Python to only draw 180° of\
    \ the circle.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_81_0.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_81_1.png)\n\
    \n**STEP 2** Let’s begin by drawing a simple circle. Start a New File, then enter\
