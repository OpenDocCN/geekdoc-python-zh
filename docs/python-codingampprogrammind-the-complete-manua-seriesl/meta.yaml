  md: "# Combining What You Know So Far\n\nSTEP 5 You will need to specify your own\
    \ location for the logins.txt file, since we're using a Raspberry Pi. Essentially,\
    \ this adds the username and password inputs from the user to the existing users{}\
    \ dictionary, so the key and value structure remains: each user is the key, the\
    \ password is the value.\n\n```\ndef newUser():\n    createLogin = input(\"Create\
    \ a login name: \")\n    if createLogin in users:\n        print (\"\\nLogin name\
    \ already exists!\\n\")\n    else:\n        createPassw = input(\"Create password:\
    \ \")\n        users[createLogin] = createPassw\n        print(\"\\nUser created!\\\
    n\")\n        logins=open(\"/home/pi/Documents/logins.txt\", \"a\")\n        logins.write(\"\
    \\n\" + createLogin + \" \" + createPassw)\n        logins.close()\n```\n\nSTEP\
    \ 6 Now to create the oldUser function:\n\n```\ndef oldUser():\n    login = input(\"\
    Enter login name: \")\n    passw = input(\"Enter password: \")\n    # check if\
    \ user exists and login matches password\n    if login in users and users[login]\
    \ == passw:\n        print (\"\\nLogin successful!\\n\")\n        print (\"User:\"\
    , login, \"accessed the system on:\", time.asctime())\n    else:\n        print\
    \ (\"\\nUser doesn't exist or wrong password!\\n\")\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_84_0.png)\n\
    \nSTEP 7 There's a fair bit happening here. There are login and passw variables,\
    \ which are then matched to the users dictionary. If there's a match, then you\
    \ have a successful login and the time and date of the login is outputted. If\
    \ they don't match, then you print an error and the process starts again.\n\n\
    ```\ndef oldUser():\n    login = input(\"Enter login name: \")\n    passw = input(\"\
    Enter password: \")\n    # check if user exists and login matches password\n \
    \   if login in users and users[login] == passw:\n        print (\"\\nLogin successful!\\\
    n\")\n        print (\"User:\", login, \"accessed the system on:\", time.asctime())\n\
    \    else:\n        print (\"\\nUser doesn't exist or wrong password!\\n\")\n\
    ```\n\nSTEP 8 Finally, you need to continually check that the 'q' key hasn't been\
    \ pressed to exit the program. We can do this with:\n\n```\nwhile status != \"\
    q\":\n    status = displayMenu()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_84_1.png)\n\
    \nSTEP 9 Although a seemingly minor two lines, the while loop is what keeps the\
    \ program running. At the end of every function it's checked against the current\
    \ value of status. If that global value isn't 'q' then the program continues.\
    \ If it's equal to 'q' then the program can quit.\n\n```\nwhile status != \"q\"\
    :\n    status = displayMenu()\n```\n\nSTEP 10 You can now create users, then log\
    \ in with their names and passwords, with the logins.txt file being created to\
    \ store the login data and successful logins being time-stamped. Now it's up to\
    \ you to further improve the code. Perhaps you can import the list of created\
    \ users from a previous session and display a graphic upon a successful login?\n\
