  md: "# STEP 5\n\nPesky brackets are also a nuisance in programming errors, especially\
    \ when you have something like:\n\n```\nprint(balanced_check(input()))\n```\n\n\
    Remember that for every ‘(‘ there must be an equal number of ‘)’.\n\n```\nimport\
    \ sys\n\ndef balanced_check(data):\n    stack = []\n    characters = list(data)\n\
    \n    for character in characters:\n        reference = {\n            '(': ')',\n\
    \            '{': '}',\n            '[': ']'\n        }\n        if character\
    \ in reference.keys():\n            stack.append(character)\n        elif character\
    \ in reference.values() and len(stack) > 0:\n            char = stack.pop()\n\
    \            if reference.get(char) != character:\n                return \"NO\"\
    \n        else:\n            return \"NO\"\n    return \"YES\"\n```\n\n# STEP\
    \ 6\n\nThere are thousands of online Python resources, code snippets and lengthy\
    \ discussions across forums on how best to achieve something. Whilst 99 per cent\
    \ of it is good code, don’t always be lured into copying and pasting random code\
    \ into your editor. More often than not, it won’t work and the worst part is that\
    \ you haven’t learnt anything.\n\n```\ntry:\n    some_code()\nexcept:\n    print(\"\
    Unexpected error:\", sys.exc_info()[0])\n\nThe problem with a bare except is that\
    \ it will catch all exceptions, including ones you really don’t want to be ignoring\
    \ (like KeyboardInterrupt and SystemExit). It would be much better if your except\
    \ block only caught the specific exception you expect, and let all others bubble\
    \ up as normal.\n\nA few other general comments on your code:\n- In line 200,\
    \ you have this construction:\nfor letter in range(len(chosen_word)):\n    if\
    \ player_guess == chosen_word[letter]:\n        word_guessed[letter] = player_guess\n\
    \nYou’re looping over the index variable, but also using the list element. It\
    \ would be better to write:\nfor idx, letter in enumerate(chosen_word):\n    if\
    \ player_guess == letter:\n```\n\n# STEP 7\n\nIndents are a nasty part of Python\
    \ programming that a lot of beginners fall foul of. Recall the IF loop from the\
    \ Conditions and Loops section, where the colon means everything indented following\
    \ the statement is to be executed as long as it’s true? Missing the indent, or\
    \ having too much of indent, will come back with an error.\n\n```\nword_input(\"\
    Please enter a four-letter word: \")\nword_length = len(word)\nif word_length\
    \ == 4:\n    print(\"word is a four-letter word. Well done.\")\nelse:\n    print(\"\
    word is not a four-letter word.\")\n\nSyntaxError: expected an indented block\n\
    ```\n\n# STEP 8\n\nAn excellent way to check your code step-by-step is to use\
    \ Python Tutor’s Visualise web page, found at www.pythontutor.com/visualize.html#mode=edit.\
    \ Simply paste your code into the editor and click the Visualise Execution button\
    \ to run the code line-by-line. This helps to clear bugs and any misunderstandings.\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_56_0.png)\n\n# STEP 9\n\nPlanning makes\
    \ for good code. Whilst a little old school, it’s a good habit to plan what your\
    \ code will do before sitting down to type it out. List the variables that will\
    \ be used and the modules too; then write out a script for any user interaction\
    \ or outputs.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_56_1.png)\n\n# STEP\
    \ 10\n\nPurely out of interest, the word debugging in computing terms comes from\
    \ Admiral Grace Hopper, who back in the ‘40s was working on a monolithic Harvard\
    \ Mark II electromechanical computer. According to legend Hopper found a moth\
    \ stuck in a relay, thus stopping the system from working. Removal of the moth\
    \ was hence called debugging.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_56_2.png)"
