  md: "# # Python Digital Clock\n\nThere is already a clock displayed on the desktop\
    \ of most operating systems but it's always handy to have one on top of the currently\
    \ open window. To that end, why not create a Python digital clock that can be\
    \ a companion desktop widget for you.\n\nThis is a surprisingly handy little script\
    \ and one that we've used in the past instead of relying on a watch or even the\
    \ clock in the system tray of the operating system.\n\n```\npython\nimport time\n\
    import tkinter as tk\n\ndef tick(time1=''):\n    # get the current time from the\
    \ PC\n    time2 = time.strftime('%H:%M:%S')\n    if time2 != time1:\n        time1\
    \ = time2\n        clock.config(text=time2)\n    clock.after(200, tick)\n\nroot\
    \ = tk.Tk()\nclock = tk.Label(root, font=('arial', 20, 'bold'), bg='green')\n\
    clock.pack(fill='both', expand=1)\ntick()\nroot.mainloop()\n\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_125_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_125_1.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_125_2.png)"
