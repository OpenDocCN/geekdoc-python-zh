    \ %H and %H%M, as you can see these are the hours and minutes and as the last\
    \ entry indicates, entering them as %H%M doesn't display the time correctly in\
    \ the Shell. You can easily rectify this with: `time.strftime(\"%H:%M\")`\n\n\
    ### STEP 9\nThe output will look similar to the screenshot below. The timer function\
    \ needs to be either side of the input statement, as that's when the variable\
    \ name is being created, depending on how long the user took to log in. The length\
    \ of time is then displayed on the last line of the code as the endtime variable.\n\
    \n### STEP 7\nThis means you're going to be able to display either the current\
