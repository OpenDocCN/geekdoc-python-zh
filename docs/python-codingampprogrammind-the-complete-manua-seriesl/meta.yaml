- md: '## Using Comments


    When writing your code, the flow, what each variable does, how the overall program
    will operate and so on is all inside your head. Another programmer could follow
    the code line by line but over time, it can become difficult to read.


    ## COMMENTS!


    Programmers use a method of keeping their code readable by commenting on certain
    sections. If a variable is used, the programmer comments on what it''s supposed
    to do, for example. It''s just good practice.


    **STEP 1** Start by creating a new instance of the IDLE Editor (File > New File)
    and create a simple variable and print command:


    ```

    a=10

    print("The value of A is,", a)

    ```


    Save the file and execute the code.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_43_0.png)


    **STEP 2** Running the code will return the line: The value of A is, 10 into the
    IDLE Shell window, which is what we expected. Now, add some of the types of comments
    you''d normally see within code:


    ```

    # Set the start value of A to 10

    a=10

    # Print the current value of A

    print("The value of A is,", a)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_43_1.png)


    **STEP 3** Resave the code and execute it. You can see that the output in the
    IDLE Shell is still the same as before, despite the extra lines being added. Simply
    put, the hash symbol (#) denotes a line of text the programmer can insert to inform
    them, and others, of what''s going on without the user being aware.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_43_2.png)


    **STEP 4** Let''s assume that the variable A that we''ve created is the number
    of lives in a game. Every time the player dies, the value is decreased by 1. The
    programmer could insert a routine along the lines of:


    ```

    a=a-1

    print("You''ve just lost a life!")

    print("You now have", a, "lives left!")

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_43_3.png)


    **STEP 5** Whilst we know that the variable A is lives, and that the player has
    just lost one, a casual viewer or someone checking the code may not know. Imagine
    for a moment that the code is twenty thousand lines long, instead of just our
    seven. You can see how handy comments are.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_44_0.png)


    **STEP 6** Essentially, the new code together with comments could look like:


    ```

    # Set the start value of A to 10

    a=10

    # Print the current value of A

    print("The value of A is,", a)

    # Player lost a life!

    a=a-1

    # Inform player, and display current value of A (lives)

    print("You''ve just lost a life!")

    print("You now have", a, "lives left!")

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_44_1.png)


    **STEP 7** You can use comments in different ways. For example, Block Comments
    are a large section of text that details what''s going on in the code, such as
    telling the code reader what variables you''re planning on using:


    ```

    # This is the best game ever, and has been developed by a crack squad of Python
    experts who haven''t slept or washed in weeks. Despite being very smelly, the
    code at least works really well.

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_44_2.png)


    **STEP 8** Inline comments are comments that follow a section of code. Take our
    examples from above, instead of inserting the code on a separate line, we could
    use:


    ```

    a=10 # Set the start value of A to 10

    print("The value of A is,", a) # Print the current value of A

    a=a-1 # Player lost a life!

    print("You now have", a, "lives left!") # Inform player, and display current value
    of A (lives)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_44_3.png)


    **STEP 9** The comment, the hash symbol, can also be used to comment out sections
    of code you don''t want to be executed in your program. For instance, if you wanted
    to remove the first print statement, you would use:


    ```

    # print("The value of A is,", a)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_44_4.png)


    **STEP 10** You also use three single quotes to comment out a Block Comment or
    multi-line section of comments. Place them before and after the areas you want
    to comment for them to work:


    ```

    ''''''

    This is the best game ever, and has been developed by a crack squad of Python
    experts who haven''t slept or washed in weeks. Despite being very smelly, the
    code at least works really well.

    ''''''

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_44_5.png)


    ## Working with Variables


    We''ve seen some examples of variables in our Python code already but it''s always
    worth going through the way they operate and how Python creates and assigns certain
    values to a variable.


    ## VARIOUS VARIABLES


    You''ll be working with the Python 3 IDLE Shell in this tutorial. If you haven''t
    already, open Python 3 or close down the previous IDLE Shell to clear up any old
    code.


    ### STEP 1


    In some programming languages you''re required to use a dollar sign to denote
    a string, which is a variable made up of multiple characters, such as a name of
    a person. In Python this isn''t necessary. For example, in the Shell enter: name="David
    Hayward" (or use your own name, unless you''re also called David Hayward).


    ```

    Python 3.4.2 Shell

    ...

    >>> name = "David Hayward"

    >>> print(name)

    David Hayward

    >>>

    ```


    ### STEP 2


    You can check the type of variable in use by issuing the type() command, placing
    the name of the variable inside the brackets. In our example, this would be: type(name).
    Add a new string variable: title="Descended from Vikings".


    ```

    Python 3.4.2 Shell

    ...

    >>> name = "David Hayward"

    >>> print(name)

    David Hayward

    >>> type(name)

    <class ''str''>

    >>> title = "Descended from Vikings"

    >>>

    ```


    ### STEP 3


    You''ve seen previously that variables can be concatenated using the plus symbol
    between the variable names. In our example we can use: print(name + ": " + title).
    The middle part between the quotations allows us to add a colon and a space, as
    variables are connected without spaces, so we need to add them manually.


    ```

    Python 3.4.2 Shell

    ...

    >>> name = "David Hayward"

    >>> print(name)

    David Hayward

    >>> type(name)

    <class ''str''>

    >>> title = "Descended from Vikings"

    >>> print(name + ": " + title)

    David Hayward: Descended from Vikings

    >>>

    ```


    ### STEP 4


    You can also combine variables within another variable. For example, to combine
    both name and title variables into a new variable we use:

    character = name + ": " + title

    Then output the content of the new variable as:

    print(character)

    Numbers are stored as different variables:

    age = 44

    type(age)

    Which, as we know, are integers.


    ```

    Python 3.4.2 Shell

    ...

    >>> name = "David Hayward"

    >>> print(name)

    David Hayward

    >>> type(name)

    <class ''str''>

    >>> title = "Descended from Vikings"

    >>> print(name + ": " + title)

    David Hayward: Descended from Vikings

    >>> character = name + ": " + title

    >>> print(character)

    David Hayward: Descended from Vikings

    >>> age = 44

    >>> type(age)

    <class ''int''>

    >>>

    ```


    ### STEP 5


    However, you can''t combine both strings and integer type variables in the same
    command, as you would a set of similar variables. You need to either turn one
    into the other or vice versa. When you do try to combine both, you get an error
    message:


    ```

    print(name + age)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_0.png)


    ### STEP 6


    This is a process known as TypeCasting. The Python code is:


    ```

    print(character + " is " + str(age) + " years old.")

    ```


    or you can use:


    ```

    print(character, "is", age, "years old.")

    ```


    Notice again that in the last example, you don''t need the spaces between the
    words in quotes as the commas treat each argument to print separately.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_2.png)


    ### STEP 7


    Another example of TypeCasting is when you ask for input from the user, such as
    a name. For example, enter:


    ```

    age = input("How old are you? ")

    ```


    All data stored from the Input command is stored as a string variable.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_4.png)


    ### STEP 8


    This presents a bit of a problem when you want to work with a number that''s been
    inputted by the user, as age + 10 won''t work due to being a string variable and
    an integer. Instead, you need to enter:


    ```

    int(age) + 10

    ```


    This will TypeCast the age string into an integer that can be worked with.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_1.png)


    ### STEP 9


    The use of TypeCasting is also important when dealing with floating point arithmetic;
    remember: numbers that have a decimal point in them. For example, enter:


    ```

    shirt = 19.99

    ```


    Now enter type(shirt) and you''ll see that Python has allocated the number as
    a ''float'', because the value contains a decimal point.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_3.png)


    ### STEP 10


    When combining integers and floats Python usually converts the integer to a float,
    but should the reverse ever be applied it''s worth remembering that Python doesn''t
    return the exact value. When converting a float to an integer, Python will always
    round down to the nearest integer, called truncating; in our case instead of 19.99
    it becomes 19.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_5.png)'
  mdcn: '## 使用注释


    编写代码时，程序流程、每个变量的作用、整体程序的运行方式等信息都存在于你的脑海中。其他程序员可能逐行理解代码，但随着时间的推移，代码会变得越来越难以阅读。


    ## 注释！


    程序员通过为特定代码段添加注释来保持代码的可读性。例如，如果使用了某个变量，程序员会注释说明该变量的预期作用。这是一种良好的编程实践。


    **步骤 1** 首先，创建一个新的 IDLE 编辑器实例（文件 > 新建文件），创建一个简单的变量和打印命令：


    ```

    a=10

    print("The value of A is,", a)

    ```


    保存文件并执行代码。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_43_0.png)


    **步骤 2** 运行代码后，IDLE 交互式窗口将返回这行内容：`The value of A is, 10`，这与我们的预期相符。现在，添加一些代码中常见的注释类型：


    ```

    # 将 A 的初始值设为 10

    a=10

    # 打印 A 的当前值

    print("The value of A is,", a)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_43_1.png)


    **步骤 3** 重新保存代码并执行。你可以看到，尽管添加了额外的行，IDLE 交互式窗口的输出与之前仍然相同。简而言之，井号符号 (`#`) 表示一行文本，程序员可以插入这些文本，向自己或其他人说明代码的功能，而用户不会感知到。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_43_2.png)


    **步骤 4** 假设我们创建的变量 `A` 代表游戏中玩家的生命值。每次玩家死亡，该值就减少 1。程序员可以插入一段类似这样的代码：


    ```

    a=a-1

    print("You''ve just lost a life!")

    print("You now have", a, "lives left!")

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_43_3.png)


    **步骤 5** 虽然我们知道变量 `A` 是生命值，并且玩家刚刚失去一条生命，但普通的查看者或检查代码的人可能并不清楚。试想一下，如果代码有两万行，而不是我们这短短的七行。你就能看出注释有多方便。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_44_0.png)


    **步骤 6** 本质上，加上注释的新代码可能如下所示：


    ```

    # 将 A 的初始值设为 10

    a=10

    # 打印 A 的当前值

    print("The value of A is,", a)

    # 玩家失去了一条生命！

    a=a-1

    # 通知玩家，并显示 A (生命值) 的当前值

    print("You''ve just lost a life!")

    print("You now have", a, "lives left!")

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_44_1.png)


    **步骤 7** 你可以用不同的方式使用注释。例如，`块注释`是详细描述代码功能的大段文本，比如告诉代码阅读者你计划使用哪些变量：


    ```

    # 这是有史以来最棒的游戏，由一群几周没睡觉也没洗澡的Python专家团队开发。尽管他们味道很大，但至少代码运行得非常好。

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_44_2.png)


    **步骤 8** `行内注释`是跟随在代码段之后的注释。以我们上面的例子为例，我们不必将注释放在单独的行，可以这样使用：


    ```

    a=10 # 将 A 的初始值设为 10

    print("The value of A is,", a) # 打印 A 的当前值

    a=a-1 # 玩家失去了一条生命！

    print("You now have", a, "lives left!") # 通知玩家，并显示 A (生命值) 的当前值

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_44_3.png)


    **步骤 9** 注释符号——井号 (`#`)，也可以用来“注释掉”你不想在程序中执行的代码段。例如，如果你想移除第一个打印语句，可以这样做：


    ```

    # print("The value of A is,", a)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_44_4.png)


    **步骤 10** 你也可以使用三个单引号来注释一个`块注释`或多行注释。将它们放在要注释区域的前面和后面即可生效：


    ```

    ''''''

    这是有史以来最棒的游戏，由一群几周没睡觉也没洗澡的Python专家团队开发。尽管他们味道很大，但至少代码运行得非常好。

    ''''''

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_44_5.png)


    ## 使用变量


    我们已经在 Python 代码中见过一些变量的例子了，但回顾一下它们的工作原理，以及 Python 如何创建变量并为其赋值，总是值得的。


    ## 各种变量


    在本教程中，你将使用 Python 3 IDLE 交互式窗口。如果尚未打开，请打开 Python 3 或关闭之前的 IDLE 交互式窗口以清除旧代码。


    ### 步骤 1


    在某些编程语言中，你需要使用美元符号 (`$`) 来表示字符串，这是一种由多个字符组成的变量，例如一个人的名字。在 Python 中则没有必要。例如，在交互式窗口中输入：`name="David
    Hayward"`（或使用你自己的名字，除非你也叫 David Hayward）。


    ```

    Python 3.4.2 Shell

    ...

    >>> name = "David Hayward"

    >>> print(name)

    David Hayward

    >>>

    ```


    ### 步骤 2


    你可以通过输入 `type()` 命令来检查正在使用的变量类型，将变量名放在括号内。在我们的例子中，就是 `type(name)`。添加一个新的字符串变量：`title="Descended
    from Vikings"`。


    ```

    Python 3.4.2 Shell

    ...

    >>> name = "David Hayward"

    >>> print(name)

    David Hayward

    >>> type(name)

    <class ''str''>

    >>> title = "Descended from Vikings"

    >>>

    ```


    ### 步骤 3


    之前你已经看到，变量可以使用加号 (`+`) 连接。在我们的例子中，可以使用：`print(name + ": " + title)`。引号中间的部分允许我们添加一个冒号和一个空格，因为变量连接时不会自动添加空格，所以我们需要手动添加。


    ```

    Python 3.4.2 Shell

    ...

    >>> name = "David Hayward"

    >>> print(name)

    David Hayward

    >>> type(name)

    <class ''str''>

    >>> title = "Descended from Vikings"

    >>> print(name + ": " + title)

    David Hayward: Descended from Vikings

    >>>

    ```


    ### 步骤 4


    你也可以将变量组合成另一个新变量。例如，要将 `name` 和 `title` 两个变量组合成一个新变量，我们可以使用：

    `character = name + ": " + title`

    然后输出新变量的内容：

    `print(character)`

    数字存储为不同的变量：

    `age = 44`

    `type(age)`

    我们知道，这些是整数。


    ```

    Python 3.4.2 Shell

    ...

    >>> name = "David Hayward"

    >>> print(name)

    David Hayward

    >>> type(name)

    <class ''str''>

    >>> title = "Descended from Vikings"

    >>> print(name + ": " + title)

    David Hayward: Descended from Vikings

    >>> character = name + ": " + title

    >>> print(character)

    David Hayward: Descended from Vikings

    >>> age = 44

    >>> type(age)

    <class ''int''>

    >>>

    ```


    ### 步骤 5


    然而，你不能像处理一组相似变量那样，在同一命令中组合字符串和整数类型的变量。你需要将其中一个转换为另一个的类型。当你尝试组合两者时，会得到一条错误信息：


    ```

    print(name + age)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_0.png)


    ### 步骤 6


    这个过程被称为`类型转换`（TypeCasting）。Python 代码如下：


    ```

    print(character + " is " + str(age) + " years old.")

    ```


    或者你可以使用：


    ```

    print(character, "is", age, "years old.")

    ```


    再次注意，在最后一个例子中，你不需要在引号内的单词之间添加空格，因为逗号会将 `print` 的每个参数分开处理。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_2.png)


    ### 步骤 7


    `类型转换`的另一个例子是当你从用户那里获取输入时，比如一个名字。例如，输入：


    ```

    age = input("How old are you? ")

    ```


    从 `input` 命令存储的所有数据都以字符串变量的形式存储。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_4.png)


    ### 步骤 8


    当你想处理用户输入的数字时，这会带来一些问题，因为 `age + 10` 无法工作，原因在于一个是字符串变量，另一个是整数。相反，你需要输入：


    ```

    int(age) + 10

    ```


    这将把 `age` 字符串类型转换为可以进行操作的整数类型。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_1.png)


    ### 步骤 9


    在处理浮点数运算时，`类型转换`也很重要；请记住：带有小数点的数字。例如，输入：


    ```

    shirt = 19.99

    ```


    现在输入 `type(shirt)`，你会看到 Python 将该数字分配为 `''float''` 类型，因为该值包含小数点。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_3.png)


    ### 步骤 10


    当组合整数和浮点数时，Python 通常会将整数转换为浮点数，但如果反过来转换，值得记住的是 Python 不会返回精确的值。将浮点数转换为整数时，Python
    总是向下舍入到最接近的整数，这称为截断；在我们这个例子中，19.99 会变成 19。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_46_5.png)'
