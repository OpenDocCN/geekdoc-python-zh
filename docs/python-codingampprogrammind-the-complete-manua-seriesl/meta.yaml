    \n![](img/2a94c98fce5df994fcecd950a995b8c9_58_2.png)\n\n## Python in Focus: Stitching\
    \ Black Holes\n\nOne of the biggest scientific, engineering and space-based projects\
    \ came to a head in 2019, revealing humanity’s first glimpse at the universe’s\
    \ most elusive object: a black hole. But what’s that got to do with Python?\n\n\
    Imaging a black hole is pretty difficult. The very nature of a black hole means\
    \ that nothing can escape its immense gravitational field, even light itself.\
    \ To quote the Wikipedia entry for a black hole:\n\n> > “A black hole is a region\
    \ of spacetime exhibiting gravitational acceleration so strong that nothing—no\
    \ particles or even electromagnetic radiation such as light—can escape from it.\
    \ The theory of general relativity predicts that a sufficiently compact mass can\
    \ deform spacetime to form a black hole. The boundary of the region from which\
    \ no escape is possible is called the event horizon. Although the event horizon\
    \ has an enormous effect on the fate and circumstances of an object crossing it,\
    \ no locally detectable features appear to be observed. In many ways, a black\
    \ hole acts like an ideal black body, as it reflects no light. Moreover, quantum\
    \ field theory in curved spacetime predicts that event horizons emit Hawking radiation,\
    \ with the same spectrum as a black body of a temperature inversely proportional\
    \ to its mass. This temperature is on the order of billionths of a kelvin for\
    \ black holes of stellar mass, making it essentially impossible to observe.”\n\
    \nNot that long ago a black hole was just a collection of theories and mathematics\
    \ written down on paper, speculated only by the brightest minds of our time. However,\
    \ as with most things scientific, our understanding of the universe and our abilities\
    \ to read it have greatly improved and, with the culmination of years of hard\
    \ work by a collaboration of observatories, scientists and engineers, we got our\
    \ first image of a black hole.\n\n### EVENT HORIZON TELESCOPE\n\nOne of the problems\
    \ regarding the imaging of such an object is angular resolution. In Astronomy,\
    \ the size of the objects in the night sky is referred to by the amount of the\
    \ sky they take up - units of arc. An arc, or arc second, is a measurement (1/3600\
    \ of a degree) that describes the size of an angle in degrees, designated by the\
    \ symbol °. A full circle is divided into 360° and a right-angle measures 90°.\
    \ One degree can be divided into 60 arcminutes (abbreviated 60 arcmin or 60’).\
    \ An arcminute can also be divided into 60 arcseconds (abbreviated 60 arcsec or\
    \ 60”).\n\nFor example, looking at the moon, which is roughly 31 arcminutes, imagine\
    \ drawing a line from you to one side of the moon and another to the opposite\
    \ side of the moon, the angle between the two lines is the angular size, or angular\
    \ resolution.\n\nThe black hole at the centre of the Messier 87 galaxy, the one\
    \ that was imaged, is 55 million light years from Earth and has an angular size\
    \ of 40 microarc seconds, or one millionth of an arcsecond. So, in order to see\
    \ it, we would need a telescope with a diameter of around 8Km, which simply isn't\
    \ possible as a single unit.\n\nThis is where the Event Horizon Telescope project\
    \ comes into play. Using a network of eight radio telescopes, scientists were\
    \ able to take images of the black hole over a period of around six months. Critically\
    \ timed, using atomic clocks, the telescopes imaged the area of sky containing\
    \ the black hole and collected the data, swapping from one telescope array to\
    \ the next as the Earth rotated.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_59_0.png)\n\
    \n## BIG DATA AND PYTHON\n\n## RESULTS\n\nThis data was then collated across all\
    \ the telescope arrays to the tune of over a thousand hard drives, which came\
    \ to an astonishing 5 Petabytes of raw data. The problem now was collating all\
    \ that data into a workable form and presenting it as an image.\n\nThe end result\
    \ is, of course, the image of the black hole at the centre of the M87 galaxy that’s\
    \ surrounded by a ring of burning gasses. The resolution isn’t great, as the team\
    \ have since admitted, but, as they also state, give it a couple of years and\
    \ they’ll be able to increase the image resolution significantly.\n\nKatie Bouman,\
    \ a Ph.D. in electrical engineering and computer science from MIT, was pivotal\
    \ in creating the Python code that was able to stitch all that data together and\
    \ form the eventual, historic image of a black hole.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_60_1.png)\n\
    \nAll this is thanks to some clever Python code and some very brilliant scientists\
    \ and engineers.\n\nBouman used a number of Python libraries to achieve the result,\
    \ Numpy, Scipy, Pandas, Jupyter, Matplotlib and Astropy, plus some unique custom\
    \ Python code – which can be found on Github at https://github.com/achael/eht-imaging.\n\
    \n```python\nfrom os import path, makedirs\n\n# set as true if you want to use\
    \ a model image, false will load the specified image\nmakeModel = True\n# path\
    \ to a sample image\nsampleimage = '../models/rowan_m87.txt'\n\n# path to array\
    \ file for loading STROs and site locations\narray = '../arrays/EHT2017_m87.txt'\n\
    \n# parameters for model image\nnpix = 120\nfov = 200*eh.RADPERUAS\nsource = 'M87'\n\
    ra = 19.414182210498385\ndec = -29.041700372736311\ntbl = 0.0\nrf = 230000000000.0\n\
    mjd = 57850\n\nring_radius = 22*eh.RADPERUAS # the radius of the ring\nring_width\
    \ = 10*eh.RADPERUAS # the width of the ring\nnonun_frac = 0.5 # defines how much\
    \ brighter the brighter location is on the ring\ntheta_nonun_rad = 2/0 # defines\
    \ the angle of the brightest location\nfracpol = 0.4 # fractional polarization\
    \ on model image\ncorr = 5 * eh.RADPERUAS # the coherence length of the polarization\n\
    \n# parameters for simulated data\nadd_th_noise = True # if there are no sefds\
    \ in obs_orig it will use the sigma for each data point\nphasecal = False # if\
    \ False then add random phases to simulate atmosphere\nampcal = False # if False\
    \ then add random gain errors\nstabilize_scan_phase = True # if true then add\
    \ a single phase error for each scan to act similar to adhoc phasing\nstabilize_scan_amp\
    \ = True # if true then add a single gain error at each scan\njones = True # apply\
    \ jones matrix for including noise in the measurements (including leakage)\ninv_jones\
    \ = False # do not invert the jones matrix\nfrcal = True # True if you do not\
    \ include effects of field rotation\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_60_2.png)"
  mdcn: "## 整合目前所学内容\n\n步骤7 现在你可以执行代码了，程序会询问用户想要将圆周率计算到多少位小数，并在 IDLE Shell 中输出结果。尝试设置为1000位，但不要设得太高，否则计算机在计算圆周率时可能会卡住。\n\
    \n步骤8 编程的一部分是能够修改代码，使其更具表现力。让我们加入一个元素，用于计时计算机计算圆周率小数位所需的时间，并以不同颜色显示信息。为此，请打开命令行并导入\
    \ Colorama 模块（RPi 用户已经安装了该模块）：\n\n```\npip install colorama\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_58_0.png)\n\
    \n步骤9 现在我们需要导入 Colorama 模块（它将以不同颜色输出文本）、Fore 函数（用于指定前景色、墨水颜色）以及 Time 模块来启动一个虚拟秒表，以查看我们的计算耗时多久：\n\
    \n```\nimport time\nimport colorama\nfrom colorama import Fore\n```\n\n步骤10 为了完成我们的代码，我们需要在计算开始时初始化\
    \ Colorama 模块并启动时间函数，并在计算结束时记录时间。最终结果是一行彩色文字，显示处理过程耗时多久（在终端或命令行中）：\n\n```\nfrom\
    \ decimal import Decimal, getcontext\nimport math\nimport time\nimport colorama\n\
    from colorama import Fore\ncolorama.init()\n\nnumberofdigits = int(input(\"please\
    \ enter the number of decimal places to calculate Pi to: \"))\ngetcontext().prec\
    \ = numberofdigits\n\nstart_time = time.time()\ndef calc(n):\n    t = Decimal(0)\n\
    \    pi = Decimal(0)\n    deno = Decimal(0)\n    k = 0\n    for k in range(n):\n\
    \        t = (Decimal(-1)**k)*(math.factorial(Decimal(6)*k))*(13591409+545140134*k)\n\
    \        deno = math.factorial(3*k)*(math.factorial(k)**Decimal(3))*(640320**(3*k))\n\
    \        pi += Decimal(t)/Decimal(deno)\n    pi = pi * Decimal(12)/Decimal(640320**Decimal(1.5))\n\
    \    pi = 1/pi\n    return str(pi)\n\nprint(calc(1))\nprint(Fore.RED + \"\\nTime\
    \ taken:\", time.time() - start_time)\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_58_1.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_58_2.png)\n\n## Python聚焦：缝合黑洞\n\n2019年，一项规模最大的科学、工程和太空项目达到高潮，首次向人类展示了宇宙中最难以捉摸的天体：黑洞。但这跟Python有什么关系呢？\n\
    \n给黑洞成像相当困难。黑洞的本质意味着任何东西，甚至是光本身，都无法逃脱其巨大的引力场。引用维基百科上关于黑洞的条目：\n\n> > “黑洞是时空的一个区域，其引力加速度如此之强，以至于任何东西——任何粒子甚至像光一样的电磁辐射——都无法从中逃脱。广义相对论预测，足够致密的质量可以使时空变形从而形成黑洞。无法逃脱的区域边界被称为事件视界。尽管事件视界对穿过它的物体的命运和状况有巨大影响，但似乎没有观测到任何局部可探测的特征。在许多方面，黑洞的作用就像一个理想的黑体，因为它不反射任何光。此外，弯曲时空中的量子场论预测，事件视界会发出霍金辐射，其光谱与温度与其质量成反比的黑体相同。对于恒星质量的黑洞，这个温度在十亿分之一开尔文量级，使得观测基本上不可能。”\n\
    \n不久之前，黑洞还只是写在纸上的理论和数学集合，仅由我们时代最聪明的头脑进行推测。然而，与大多数科学事物一样，我们对宇宙的理解以及解读它的能力已大大提高，并且随着众多天文台、科学家和工程师多年共同努力的最终成果，我们得到了第一张黑洞图像。\n\
    \n### 事件视界望远镜\n\n给这样一个物体成像的问题之一是角分辨率。在天文学中，夜空中物体的大小是用它们在天空中占据的量来表示的——单位是弧。一个弧或弧秒是一种测量（1度的1/3600），用于描述以度为单位的角度大小，符号为°。一个完整的圆被分成360°，一个直角是90°。一度可以分成60角分（缩写为60\
    \ arcmin 或 60’）。一个角分也可以分成60角秒（缩写为60 arcsec 或 60”）。\n\n例如，看着大约31角分大小的月亮，想象从你这里画一条线到月亮的一侧，再画一条线到月亮的另一侧，这两条线之间的角度就是其角大小或角分辨率。\n\
    \n位于M87星系中心的那个被拍摄到的黑洞，距离地球5500万光年，其角大小为40微角秒，即百万分之一角秒。因此，为了看到它，我们需要一台直径约为8公里的望远镜，而作为一个单独的设备这显然是不可能的。\n\
    \n这就是事件视界望远镜项目发挥作用的地方。通过使用一个由八台射电望远镜组成的网络，科学家们能够在大约六个月的时间内拍摄黑洞的图像。利用原子钟进行关键计时，望远镜拍摄了包含黑洞的天空区域并收集数据，随着地球的旋转，数据从一组望远镜阵列切换到另一组。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_59_0.png)\n\n## 大数据与Python\n\n## 结果\n\
    \n然后，所有望远镜阵列的数据被汇总，涉及超过一千个硬盘，总共达到了惊人的5PB原始数据。现在的问题是将所有数据整理成可用的形式，并以图像的形式呈现。\n\n\
    最终结果当然是M87星系中心黑洞的图像，其周围环绕着一圈燃烧的气体。该团队后来承认，分辨率不是很高，但他们也表示，再过几年，他们就能显著提高图像分辨率。\n\
    \n麻省理工学院电气工程与计算机科学博士凯蒂·布曼（Katie Bouman）在创建能够将所有数据拼接在一起并形成最终具有历史意义的黑洞图像的Python代码方面发挥了关键作用。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_60_1.png)\n\n这一切都归功于一些巧妙的Python代码以及一些非常杰出的科学家和工程师。\n\
    \n布曼使用了多个Python库来实现这一结果，包括Numpy、Scipy、Pandas、Jupyter、Matplotlib和Astropy，以及一些独特的自定义Python代码——可在Github上找到：https://github.com/achael/eht-imaging。\n\
    \n```python\nfrom os import path, makedirs\n\n# set as true if you want to use\
    \ a model image, false will load the specified image\nmakeModel = True\n# path\
    \ to a sample image\nsampleimage = '../models/rowan_m87.txt'\n\n# path to array\
    \ file for loading STROs and site locations\narray = '../arrays/EHT2017_m87.txt'\n\
    \n# parameters for model image\nnpix = 120\nfov = 200*eh.RADPERUAS\nsource = 'M87'\n\
    ra = 19.414182210498385\ndec = -29.041700372736311\ntbl = 0.0\nrf = 230000000000.0\n\
    mjd = 57850\n\nring_radius = 22*eh.RADPERUAS # the radius of the ring\nring_width\
    \ = 10*eh.RADPERUAS # the width of the ring\nnonun_frac = 0.5 # defines how much\
    \ brighter the brighter location is on the ring\ntheta_nonun_rad = 2/0 # defines\
    \ the angle of the brightest location\nfracpol = 0.4 # fractional polarization\
    \ on model image\ncorr = 5 * eh.RADPERUAS # the coherence length of the polarization\n\
    \n# parameters for simulated data\nadd_th_noise = True # if there are no sefds\
    \ in obs_orig it will use the sigma for each data point\nphasecal = False # if\
    \ False then add random phases to simulate atmosphere\nampcal = False # if False\
    \ then add random gain errors\nstabilize_scan_phase = True # if true then add\
    \ a single phase error for each scan to act similar to adhoc phasing\nstabilize_scan_amp\
    \ = True # if true then add a single gain error at each scan\njones = True # apply\
    \ jones matrix for including noise in the measurements (including leakage)\ninv_jones\
    \ = False # do not invert the jones matrix\nfrcal = True # True if you do not\
    \ include effects of field rotation\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_60_2.png)"
