    \ break\npygame.quit()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_102_0.png)\n\
    \n**步骤 10** 运行此代码时，它将显示一个狭长的 Pygame 窗口，介绍文字向右滚动。暂停十秒后，它会启动主游戏 Python 脚本，你可以在其中移动战士精灵。总体效果相当不错，但总有改进的空间。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_102_1.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_102_2.png)\n\
    \n## 基础动画\n\nPython 的模块使得创建形状、显示图形并相应地制作动画变得相对容易。然而，动画在代码中可能是一个棘手的元素。实现相同最终结果的方法有很多种，我们将在此向你展示其中一种。\n\
    \n## 灯光、摄像机、开拍\n\nTkinter 模块是学习 Python 动画的理想起点。当然，市面上有更好的自定义模块，但 Tkinter 足以胜任，让你掌握所需知识。\n\
    \n**步骤 1** 让我们制作一个弹跳球动画。首先，我们需要创建一个画布（窗口）和要制作动画的球：\n\n```\nfrom tkinter import\
    \ *\nimport time\n\ngui = Tk()\ngui.geometry(\"800x600\")\ngui.title(\"Pi Animation\"\
    )\ncanvas = Canvas(gui,\nwidth=800,height=600,bg='white')\ncanvas.pack()\n\nball1\
    \ = canvas.create_oval(5,5,60,60, fill='red')\n\ngui.mainloop()\n```\n\n**步骤 2**\
    \ 保存并运行代码。你将看到一个空白窗口出现，一个红球位于窗口的左上角。虽然这很棒，但动画效果不强。让我们添加以下代码：\n\n```\na = 5\nb\
    \ = 5\n\nfor x in range(0,100):\n    canvas.move(ball1,a,b)\n    gui.update()\n\
    \    time.sleep(.01)\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_103_0.png)\n\
    \n**步骤 3** 将新代码插入 `ball1 = canvas.create_oval(5,5,60,60, fill='red')` 行和 `gui.mainloop()`\
    \ 行之间。保存并运行。现在你将看到球从动画窗口的左上角移动到右下角。你可以通过修改 `time.sleep(.01)` 行来改变球穿越窗口的速度。试试 (.05)。\n\
    \n**步骤 4** `canvas.move(ball1,a,b)` 行是使球从一个角移动到另一个角的部分；显然 a 和 b 都等于 5。我们已经可以稍微改变一些东西，比如球的大小和颜色，使用行：`ball1\
    \ = canvas.create_oval(5,5,60,60, fill='red')`，我们还可以将 a 和 b 的值改为其他值。\n\n```\n\
    ball1 = canvas.create_oval(7,7,60,60, fill='red')\n\na = 8\nb = 3\n\nfor x in\
    \ range(0,100):\n    canvas.move(ball1,a,b)\n    gui.update()\n    time.sleep(.05)\n\
    ```\n\n**步骤 5** 让我们看看是否能让球动画化，使其在窗口中弹跳，直到你关闭程序。\n\n```\nxa = 5\nya = 10\nwhile\
    \ True:\n    canvas.move(ball1,xa,ya)\n    pos=canvas.coords(ball1)\n    if pos[3]\
    \ >= 600 or pos[1] <= 0:\n        ya = -ya\n    if pos[2] >= 800 or pos[0] <=\
    \ 0:\n        xa = -xa\n    gui.update()\n    time.sleep(.025)\n```\n\n**步骤 6**\
    \ 删除你在步骤 2 中输入的代码，并将步骤 5 中的代码插入其位置；同样，在 `ball1 = canvas.create_oval(5,5,60,60,\
    \ fill='red')` 和 `gui.mainloop()` 行之间。保存代码并正常运行。如果你正确输入了代码，那么你将看到红球在窗口边缘弹跳，直到你关闭程序。\n\
    \n**步骤 7** 弹跳动画发生在 While True 循环中。首先，我们在循环前有 xa 和 ya 的值，分别为 5 和 10。`pos=canvas.coords(ball1)`\
    \ 行获取球在窗口中位置的值。当它达到窗口的极限，800 或 600 时，它将使值变为负数；使球在屏幕上移动。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_104_0.png)\n\
    \n**步骤 8** 然而，Pygame 是一个更好的模块，用于制作更高级的动画。首先创建一个新文件并输入：\n\n```\nimport pygame\n\
    from random import randrange\n\nMAX_STARS = 250\nSTAR_SPEED = 2\n\ndef init_stars(screen):\n\
    \    \"\"\" Create the starfield \"\"\"\n    global stars\n    stars = []\n  \
    \  for i in range(MAX_STARS):\n        # A star is represented as a list with\
    \ this\n        # format: [X,Y]\n        star = [randrange(0,screen.get_width()\
    \ - 1),\n                randrange(0,screen.get_height() - 1)]\n        stars.append(star)\n\
    \ndef move_and_draw_stars(screen):\n    \"\"\" Move and draw the stars \"\"\"\n\
    \    global stars\n    for star in stars:\n        star[1] += STAR_SPEED\n   \
    \     if star[1] >= screen.get_height():\n            star[1] = 0\n          \
    \  star[0] = randrange(0,639)\n        screen.set_at(star, (255,255,255))\n```\n\
    \n**步骤 9** 现在添加以下内容：\n\n```\ndef main():\n    pygame.init()\n    screen = pygame.display.set_mode((640,480))\n\
    \    pygame.display.set_caption(\"Starfield Simulation\")\n    clock = pygame.time.Clock()\n\
    \    init_stars(screen)\n    while True:\n        # Lock the framerate at 50 FPS\n\
    \        clock.tick(50)\n        # Handle events\n        for event in pygame.event.get():\n\
    \            if event.type == pygame.QUIT:\n                return\n        screen.fill((0,0,0))\n\
    \        move_and_draw_stars(screen)\n        pygame.display.flip()\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_104_1.png)\n\
    \n**步骤 10** 保存并运行代码。你会同意模拟星空代码看起来相当令人印象深刻。想象一下，这是某个游戏代码的开始，甚至是演示文稿的开始？结合使用 Pygame\
    \ 和 Tkinter，你的 Python 动画将看起来非常棒。\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_104_2.png)\n\
    \n## 创建你自己的模块\n\n如果你将大型程序分解成更小的部分，并将需要的部分作为模块导入，那么管理起来会容易得多。学习构建自己的模块也更容易理解它们的工作原理。\n\
    \n## 构建模块\n\n模块是包含代码的 Python 文件，使用 .py 扩展名保存。然后使用现在熟悉的 import 命令将它们导入 Python。\n\
    \n**步骤 1** 让我们从创建一组基本的数学函数开始。将一个数字乘以二、三，平方或将数字提升到指数（幂）。在 IDLE 中创建一个新文件并输入：\n\n\
    ```\ndef timestwo(x):\n    return x * 2\n\ndef timesthree(x):\n    return x *\
    \ 3\n\ndef square(x):\n    return x * x\n\ndef power(x,y):\n    return x ** y\n\
    ```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_105_0.png)\n\n**步骤 2** 在上述代码下方，输入调用代码的函数：\n\
    \n```\nprint (timestwo(2))\nprint (timesthree(3))\nprint (square(4))\nprint (power(5,3))\n\
    ```\n\n将程序保存为 `basic_math.py` 并执行以获取结果。\n\n**步骤 3** 现在你将把函数定义从程序中取出，放入一个单独的文件中。突出显示函数定义并选择\
    \ Edit > Cut。选择 File > New File 并在新窗口中使用 Edit > Paste。你现在有两个单独的文件，一个包含函数定义，另一个包含函数调用。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_105_1.png)\n\n**步骤 4** 如果你现在尝试再次执行\
    \ `basic_math.py` 代码，将显示错误 'NameError: name 'timestwo' is not defined'。这是由于代码不再有权访问函数定义。\n\
    \n```\nTraceback (most recent call last):\n  File \"/home/pi/Documents/Python\
    \ Code/basic_math.py\", line 3, in <module>\n    print (timestwo(2))\nNameError:\
    \ name 'timestwo' is not defined\n>>> |\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_105_2.png)\n\
    \n**步骤 5** 返回包含函数定义的新创建窗口，然后单击 File > Save As。将其命名为 **minimath.py** 并将其保存在与原始\
    \ **basic_math.py** 程序相同的位置。现在关闭 minimath.py 窗口，这样 basic_math.py 窗口就保持打开状态。\n\n\
    ![](img/2a94c98fce5df994fcecd950a995b8c9_105_3.png)"
