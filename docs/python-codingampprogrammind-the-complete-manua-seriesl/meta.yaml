    ### 步骤 3


    你也可以通过在项目编号前使用负号来访问或索引列表中的最后一个项目，例如 `[-1]`，或者用 `[-2]` 访问倒数第二个项目，以此类推。尝试引用列表中不存在的项目，例如
    `[10]`，将会返回一个错误：


    ```

    numbers[-1]

    mythical_creatures[-4]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_63_1.png)


    ### 步骤 2


    一旦定义了列表，你就可以通过引用其名称后跟一个数字来调用每个项目。列表的第一个项目索引为 0，然后是 1、2、3，依此类推。例如：


    ```

    numbers

    numbers[3]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_63_2.png)


    ### 步骤 4


    切片类似于索引，但你可以通过用冒号分隔项目编号来检索列表中的多个项目。例如：


    ```

    numbers[1:3]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_63_3.png)


    ### 步骤 5


    你可以更新现有列表中的项目、删除项目，甚至将列表连接在一起。例如，要连接两个列表，你可以使用：

    `everything = numbers + mythical_creatures`

    然后查看合并后的列表：

    `everything`


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_64_0.png)


    ### 步骤 8


    你可以通过在 Shell 中输入 `dir(list)` 来查看列表可以执行哪些操作。输出是可用的函数，例如，`insert` 和 `pop` 用于在特定位置添加和删除项目。要在索引
    4 处插入数字 62：

    `numbers.insert(4, 62)`

    要删除它：

    `numbers.pop(4)`


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_64_1.png)


    ### 步骤 6


    可以通过输入以下内容向列表添加项目：

    `numbers=numbers+[201]`

    或者对于字符串：

    `mythical_creatures=mythical_creatures+["Griffin"]`

    或者使用 `append` 函数：

    `mythical_creatures.append("Nessie")`

    `numbers.append(278)`


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_64_2.png)


    ### 步骤 9


    你还可以使用 `list` 函数将字符串分解为其组成部分。例如：

    `list("David")`

    将名字 David 分解为 ''D'', ''a'', ''v'', ''i'', ''d''。然后可以将其传递给一个新列表：

    `name=list("David Hayward")`

    `name`

    `age=[44]`

    `user = name + age`

    `user`


