  md: "# Hangman Game Script\n\nHangman is a great game to program into Python. It\
    \ can be extremely complex, displaying graphics, the number of guesses left in\
    \ the secret word, a huge bank of available words picked at random and countless\
    \ other elements. It can also be quite simple. Here we have a mix between the\
    \ two.\n\n# HANGMAN.PY\n\nWe've made a Hangman game board (the gallows) out of\
    \ characters that can be displayed in the IDLE Shell, along with a huge bank of\
    \ words to randomly choose from.\n\n```\nimport random\n\nboard = ['''\n>>>>>>>>>>Hangman<<<<<<<<<<\n\
    \n+---+\n|   |\n|\n|\n|\n========''', '''\n\n+---+\n|   |\nO   |\n|\n|\n========''',\
    \ '''\n\n+---+\n|   |\nO   |\n|   |\n|\n========''', '''\n\n+---+\n|   |\nO  \
    \ |\n|   |\n|   \n========''', '''\n\n+---+\n|   |\nO   |\n|\\ |\n|   \n========''',\
    \ '''\n\n+---+\n|   |\nO   |\n|\\| |\n|   \n========''', '''\n\n+---+\n|   |\n\
    O   |\n|\\|/|\n|   \n========''', '''\n\n+---+\n|   |\nO   |\n|\\|/|\n|/  \n========''',\
    \ '''\n\n+---+\n|   |\nO   |\n|\\|/|\n|/ \\\n========''']\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_133_0.png)\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_133_1.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_133_2.png)"
