    -   76 Opening Files

    -   78 Writing to Files

    -   80 Exceptions

    -   82 Python Graphics

    -   84 Combining What You Know So Far

    -   86 Python in Focus: Gaming


    ## Lists


    Lists are one of the most common types of data structures you will come across
    in Python. A list is simply a collection of items, or data if you prefer, that
    can be accessed as a whole, or individually if wanted.


    ### WORKING WITH LISTS


    Lists are extremely handy in Python. A list can be strings, integers and also
    variables. You can even include functions in lists, and lists within lists.


    ### STEP 1


    A list is a sequence of data values called items. You create the name of your
    list followed by an equals sign, then square brackets and the items separated
    by commas; note that strings use quotes:


    ```

    numbers = [1, 4, 7, 21, 98, 156]

    mythical_creatures = ["Unicorn", "Balrog", "Vampire", "Dragon", "Minotaur"]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_63_0.png)


    ### STEP 3


    You can also access, or index, the last item in a list by using the minus sign
    before the item number [-1], or the second to last item with [-2] and so on. Trying
    to reference an item that isn''t in the list, such as [10] will return an error:


    ```

    numbers[-1]

    mythical_creatures[-4]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_63_1.png)


    ### STEP 2


    Once you''ve defined your list you can call each by referencing its name, followed
    by a number. Lists start the first item entry as 0, followed by 1, 2, 3 and so
    on. For example:


    ```

    numbers

    numbers[3]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_63_2.png)


    ### STEP 4


    Slicing is similar to indexing but you can retrieve multiple items in a list by
    separating item numbers with a colon. For example:


    ```

    numbers[1:3]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_63_3.png)


    ### STEP 5


    You can update items within an existing list, remove items and even join lists
    together. For example, to join two lists you can use:

    everything = numbers + mythical_creatures

    Then view the combined list with:

    everything


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_64_0.png)


    ### STEP 8


    You can view what can be done with lists by entering dir(list) into the Shell.
    The output is the available functions, for example, insert and pop are used to
    add and remove items at certain positions. To insert the number 62 at item index
    4:

    numbers.insert(4, 62)

    To remove it:

    numbers.pop(4)


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_64_1.png)


    ### STEP 6


    Items can be added to a list by entering:

    numbers=numbers+[201]

    Or for strings:

    mythical_creatures=mythical_creatures+["Griffin"]

    Or by using the append function:

    mythical_creatures.append("Nessie")

    numbers.append(278)


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_64_2.png)


    ### STEP 9


    You also use the list function to break a string down into its components. For
    example:

    list("David")

    Breaks the name David into ''D'', ''a'', ''v'', ''i'', ''d''. This can then be
    passed to a new list:

    name=list("David Hayward")

    name

    age=[44]

    user = name + age

    user


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_64_3.png)


    ### STEP 7


    Removal of items can be done in two ways. The first is by the item number:

    del numbers[7]

    Alternatively, by item name:

    mythical_creatures.remove("Nessie")


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_64_4.png)


    ### STEP 10


    Based on that, you can create a program to store someone''s name and age as a
    list:

    name=input("What''s your name? ")

    lname=list(name)

    age=int(input("How old are you: "))

    lage=[age]

    user = lname + lage

    The combined name and age list is called user, which can be called by entering
    user into the Shell. Experiment and see what you can do.


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_64_5.png)


    ## Tuples


    Tuples are very much identical to lists. However, where lists can be updated,
    deleted or changed in some way, a tuple remains a constant. This is called immutable
    and they''re perfect for storing fixed data items.


    ### THE IMMUTABLE TUPLE


    Reasons for having tuples vary depending on what the program is intended to do.
    Normally, a tuple is reserved for something special but they''re also used for
    example, in an adventure game, where non-playing character names are stored.


    ### STEP 1


    A tuple is created the same way as a list but in this instance you use curved
    brackets instead of square brackets. For example:


    ```python

    months= ("January", "February", "March", "April",

    "May", "June")

    months

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_65_0.png)


    ### STEP 3


    You can create grouped tuples into lists that contain multiple sets of data. For
    instance, here is a tuple called NPC (Non-Playable Characters) containing the
    character name and their combat rating for an adventure game:


    ```python

    NPC= [("Conan", 100), ("Belit", 80), ("Valeria",

    95)]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_65_1.png)


    ### STEP 2


    Just as with lists, the items within a named tuple can be indexed according to
    their position in the data range, i.e.:


    ```python

    months[0]

    months[5]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_65_2.png)


    ### STEP 4


    Each of these data items can be accessed as a whole by entering NPC into the Shell;
    or they can be indexed according to their position NPC[0]. You can also index
    the individual tuples within the NPC list:


    ```python

    NPC[0][1]

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_65_3.png)


    ### STEP 5


    It''s worth noting that when referencing multiple tuples within a list, the indexing
    is slightly different from the norm. You would expect the 95 combat rating of
    the character Valeria to be NPC[4][5], but it''s not. It''s actually: `NPC[2][1]`


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_66_0.png)


    ### STEP 6


    This means of course that the indexing follows thus:

    - 0, 0

    - 0, 1

    - 1

    - 1, 0

    Which as you can imagine, gets a little confusing when you''ve got a lot of tuple
    data to deal with.


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_66_1.png)


    ### STEP 7


    Tuples though utilise a feature called unpacking, where the data items stored
    within a tuple are assigned variables. First create the tuple with two items (name
    and combat rating): `NPC=("Conan", 100)`


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_66_2.png)


    ### STEP 8


    Now unpack the tuple into two corresponding variables: `(name, combat_rating)=NPC`
    You can now check the values by entering name and combat_rating.


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_66_3.png)


    ### STEP 9


    Remember, as with lists, you can also index tuples using negative numbers which
    count backwards from the end of the data list. For our example, using the tuple
    with multiple data items, you would reference the Valeria character with: `NPC[2][-0]`


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_66_4.png)


    ### STEP 10


    You can use the max and min functions to find the highest and lowest values of
    a tuple composed of numbers. For example: `numbers=(10.3, 23, 45.2, 109.3, 6.1,
    56.7, 99)` The numbers can be integers and floats. To output the highest and lowest,
    use: `print(max(numbers))` `print(min(numbers))`


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_66_5.png)


    ## Dictionaries


    Lists are extremely useful but dictionaries in Python are by far the more technical
    way of dealing with data items. They can be tricky to get to grips with at first
    but you''ll soon be able to apply them to your own code.


    ### KEY PAIRS


    A dictionary is like a list but instead each data item comes as a pair, these
    are known as Key and Value. The Key part must be unique and can either be a number
    or string whereas the Value can be any data item you like.


    ### STEP 1


    Let’s say you want to create a phonebook in Python. You would create the dictionary
    name and enter the data in curly brackets, separating the key and value by a colon
    Key:Value. For example:


    ```

    phonebook={"Emma": 1234, "Daniel": 3456, "Hannah": 6789}

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_67_0.png)


    ### STEP 2


    Just as with most lists, tuples and so on, strings need be enclosed in quotes
    (single or double), whilst integers can be left open. Remember that the value
    can be either a string or an integer, you just need to enclose the relevant one
    in quotes:


    ```

    phonebook2={"David": "0987 654 321"}

    ```


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_67_1.png)


    ### STEP 3


    As with lists and tuples, you can check the contents of a dictionary by giving
    the dictionary a name: phonebook, in this example. This will display the data
    items you’ve entered in a similar fashion to a list, which you’re no doubt familiar
    with by now.


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_67_2.png)


    ### STEP 4


    The benefit of using a dictionary is that you can enter the key to index the value.
    Using the phonebook example from the previous steps, you can enter:

    phonebook["Emma"]

    phonebook["Hannah"]


    ![image](img/2a94c98fce5df994fcecd950a995b8c9_67_3.png)'
