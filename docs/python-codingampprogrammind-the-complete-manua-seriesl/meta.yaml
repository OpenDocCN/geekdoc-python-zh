    \ and enter some numbers. Using the float(input element, we've told Python that\
    \ anything entered is a floating point number rather than a string.\n\n## Creating\
    \ Functions\n\nNow that you've mastered the use of variables and user input, the\
    \ next step is to tackle functions. You've already used a few functions, such\
    \ as the print command but Python enables you to define your own functions.\n\n\
    ### FUNKY FUNCTIONS\n\nA function is a command that you enter into Python to do\
    \ something. It's a little piece of self-contained code that takes data, works\
