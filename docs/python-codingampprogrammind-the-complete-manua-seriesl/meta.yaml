    \nYou’re looping over the index variable, but also using the list element. It\
    \ would be better to write:\nfor idx, letter in enumerate(chosen_word):\n    if\
    \ player_guess == letter:\n```\n\n# STEP 7\n\nIndents are a nasty part of Python\
    \ programming that a lot of beginners fall foul of. Recall the IF loop from the\
    \ Conditions and Loops section, where the colon means everything indented following\
