    \ the many libraries and customisation of the language. These frameworks make\
    \ creating AI and ML easy for intelligent coders, cutting down on the development\
    \ time in other languages and, thanks to Python's easy to read code and complex\
    \ algorithms, these developers can devote significant time to improving the performance\
    \ and accuracy of AI.\n\nEvery time we ask one of these digital assistants for\
    \ something, the Python-driven AI code is reading our voice, determining what\
    \ it is we're asking by plucking out key words and acting on them. If we ask for\
    \ a thirty second countdown, it'll start the device's stopwatch function; if we\
    \ ask for dinner suggestions, it'll open a specific set of web pages, and if we\
    \ ask it to play some music, it'll interrogate the available music apps to select\
    \ what it is we wanted. All the time, the AI code is being trained to listen more\
    \ intently, while the ML is learning from the AI results so that its accuracy\
    \ is improved for future questions and requests.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_107_0.png)\n\
    \n## BEYOND THE SMARTPHONE\n\nConsider Google, social media and the content you\
    \ look up. How many times have you entered a search string into Google, such as\
