    # A Brief History of Coding


    It''s easy to think that programming a machine to automate a process, or calculate
    a value, is a modern concept that''s only really happened in the last fifty years
    or so. However, that assumption is quite wrong, coding has actually been around
    for quite some time.


    ```

    01000011 01101111 01100100 01101001 01101110 01100111

    ```


    Essentially all forms of coding are made up of ones and zeros - on or off states.
    This works for both a modern computer and even the oldest known computational
    device.


    It''s difficult to pinpoint an exact start of when humans began to ''program''
    a device. However, it''s widely accepted that the Antikythera Mechanism is possibly
    the first ''coded'' artefact. It''s dated to about 87 BC and is an ancient Greek
    analogue computer and orrery used to predict astronomical positions.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_9_0.png)


    The Banū Mūsā brothers, three Persian scholars who worked in the House of Wisdom
    in Baghdad, published the Book of Ingenious Devices in around 850 AD. Among the
    inventions listed was a mechanical musical instrument: a hydro-powered organ that
    played interchangeable cylinders automatically.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_9_1.png)


    Joseph Marie Jacquard invents a programmable loom, which used cards with punched
    holes to create the textile design. However, it is thought that he based his design
    on a previous automated weaving process from 1725, by Basile Bouchon.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_9_2.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_9_3.png)


    Ada Lovelace translated the memoirs of the Italian mathematician, Francis Mencler,
    regarding Charles Babbage''s Analytical Engine. She made copious notes within
    her writing, detailing a method of calculating Bernoulli Numbers using the engine.
    This is recognised as the first computer program. Not bad, considering there were
    no computers available at the time.'
