  - '[PAGE 142]


    # Listing and Moving Files


    STEP 5 The next number relates to the size of the file, in bytes. In Linux each
    text file is made up of letters and each letter takes up a byte, so our names.txt
    file has 37 bytes and 37 characters in the document. Files and directories can
    be extremely large and hard to determine, so use “ls –lh”. The “h” argument humanises
    the number, making it easier to read.


    STEP 6 Finally, you should be aware that there are many hidden files in Linux.
    These are listed using the “-a” argument. Hidden files and directories begin with
    a dot (.), so you should never start a file or directory with a dot, unless you
    want to hide it. Typically, you can combine all three arguments together into
    the command “ls –lah”.


    ```

    pi@raspberrypi ~ $ ls -l

    total 32

