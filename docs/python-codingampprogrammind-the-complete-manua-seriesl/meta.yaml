  md: "# Python Graphics\n\nSTEP 5 You can add a new line to the square code to add\
    \ some colour:\n`turtle.color(\"Red\")`\nThen you can even change the character\
    \ to an actual turtle by entering:\n`turtle.shape(\"turtle\")`\nYou can also use\
    \ the command `turtle.begin_fill()`, and `turtle.end_fill()` to fill in the square\
    \ with the chosen colours; red outline, yellow fill in this case.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_82_0.png)\n\
    \nSTEP 6 You can see that the Turtle module can draw out some pretty good shapes\
    \ and become a little more complex as you begin to master the way it works. Enter\
    \ this example:\nIt's a different method, but very effective.\n\n```\npython\n\
    from turtle import *\ncolor('red', 'yellow')\nbegin_fill()\nwhile True:\n    forward(200)\n\
    \    left(170)\n    if abs(pos()) < 1:\n        break\nend_fill()\ndone()\n```\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_82_1.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_82_2.png)\n\
    \nSTEP 7 Another way in which you can display graphics is by using the Pygame\
    \ module. There are numerous ways in which pygame can help you output graphics\
    \ to the screen but for now let's look at displaying a predefined image. Start\
    \ by opening a browser and finding an image, then save it to the folder where\
    \ you save your Python code.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_82_3.png)\n\
    \nSTEP 8 Now let's get the code by importing the Pygame module:\n\n```\npython\n\
    import pygame\npygame.init()\n\nimg = pygame.image.load(\"RPi.png\")\n\nwhite\
    \ = (255, 255, 255)\nw = 900\nh = 450\nscreen = pygame.display.set_mode((w, h))\n\
    screen.fill((white))\n\nscreen.fill((white))\nscreen.blit(img, (0,0))\npygame.display.flip()\n\
    \nwhile True:\n    for event in pygame.event.get():\n        if event.type ==\
    \ pygame.QUIT:\n            pygame.quit()\n```\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_82_4.png)\n\
    \nSTEP 9 In the previous step you imported pygame, initiated the pygame engine\
    \ and asked it to import our saved Raspberry Pi logo image, saved as RPi.png.\
    \ Next you defined the background colour of the window to display the image and\
    \ the window size as per the actual image dimensions. Finally you have a loop\
    \ to close the window.\n\n```\npython\nw = 900\nh = 450\nscreen = pygame.display.set_mode((w,\
    \ h))\nscreen.fill((white))\n\nscreen.fill((white))\nscreen.blit(img, (0,0))\n\
    pygame.display.flip()\n\nwhile True:\n    for event in pygame.event.get():\n \
    \       if event.type == pygame.QUIT:\n            pygame.quit()\n```\n\nSTEP\
    \ 10 Press F5 to save and execute the code and your image will be displayed in\
    \ a new window. Have a play around with the colours, sizes and so on and take\
    \ time to look up the many functions within the Pygame module too.\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_82_5.png)"
