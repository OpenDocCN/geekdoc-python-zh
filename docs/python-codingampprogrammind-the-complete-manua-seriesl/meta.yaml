    \ (x_test, y_test) = mnist.load_data()\n```\n\n## 应用\n\n人工智能和机器学习在当今科技领域广泛存在。就在几年前，我们大多数人还将人工智能与一群超级智能杀手机器人的崛起联系在一起，而现在你会惊讶于家中乃至随身携带的物品中，人工智能的众多应用实例。\n\
    \n让我们从人工智能和机器学习最显而易见的应用开始：智能手机。这些设备已渗透到我们现代世界的大部分角落，2019年全球覆盖率已达55亿，并预计在2020年底超过60亿，人工智能和机器学习正取得突飞猛进的进步就不足为奇了。\n\
    \n随着几乎全球人口都在智能手机的覆盖范围内，这些设备背后的代码已被开发得能考虑到个体差异。这些设备被设计成能够学习用户需要或使用设备的目的。常用号码被推到列表顶部，应用内和游戏内广告根据我们的浏览和搜索偏好以及其他已安装应用进行定制。甚至我们的声音、指纹和面容都由人工智能和机器学习存储和分析，以便识别我们是谁。\n\
    \n## 数字助手\n\n数字助手的兴起是人工智能和机器学习编程的推动力之一。Siri、Cortana、Alexa和Google助手都是用Python编写的，旨在倾听、学习并回应我们对它们的请求。得益于Python众多的库和高度可定制性，实现这种程度的人工智能出人意料地简单。这些框架使得智能程序员能够轻松创建人工智能和机器学习，减少了在其他语言中的开发时间，并且得益于Python易读的代码和复杂的算法，这些开发者可以投入大量时间来提高人工智能的性能和准确性。\n\
    \n每当我们向这些数字助手下达指令时，由Python驱动的人工智能代码正在读取我们的声音，通过提取关键词来判断我们所求，并据此行动。如果我们要求一个30秒倒计时，它会启动设备的秒表功能；如果我们请求晚餐建议，它会打开一系列特定的网页；如果我们让它播放音乐，它会查询可用的音乐应用来选择我们想听的内容。与此同时，人工智能代码被训练得听得更专注，而机器学习则从人工智能的结果中学习，以便提高未来回答问题和请求的准确性。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_107_0.png)\n\n## 超越智能手机\n\n想想谷歌、社交媒体和你查阅的内容。你有多少次在谷歌输入一串搜索内容，比如“Mk1\
    \ Ford Escort的汽车零件”，然后打开Facebook时，突然发现一个“福特Escort车主群”的推荐？这就是人工智能和机器学习注入你的日常计算任务中的例子。\n\
    \n人工智能和机器学习协同工作的另一个例子是Gmail最近新增的句子自动补全功能。如果你经常用“See you soon”（再见）或“All the best”（祝一切顺利）来结束邮件，那么输入“See”或“All”就会提示机器学习部分自动为你填充剩余的词语。与此同时，机器学习在不断学习，而人工智能则告诉它哪些地方需要改进。\n\
    \n人脸识别是人工智能和机器学习的另一个元素，一段时间以来一直备受大众媒体的关注。在整个2019年，智能手机和监控录像中的人脸识别系统都取得了显著进步。控制这种级别人工智能的机构现在能够从拥挤的街道上辨认出个体，虽然这对治安来说很好，但也对我们的隐私构成了潜在威胁。毕竟，谁在监视监视者呢？\n\
    \n特斯拉在自动驾驶汽车方面的工作意味着它们正日益成为常态，而正是Python及其背后的人工智能和机器学习工作——请原谅这个双关语——在推动着这一进程。在这种情况下，Python承担了大量繁重的工作，提供了旨在实现人工智能和机器学习的连接组件和库。在后台，你通常会发现C++或其他语言，在支持人工智能和机器学习运行的整体程序和性能。\n\
    \n虽然描绘一个黯淡的人工智能未来很容易，但我们不要忘记我们目前享受的许多优秀人工智能实例：光学字符识别、手写识别、图像处理、帮助视觉和听障人士、太空探索的进步、工程改进、环境保护、制药和药物改进，以及为行动受限者带来更大的出行自由。这一切并不全是关于两个人工智能机器人争论消灭人类。\n\
    \n## 人工智能的未来\n\n我们最终是否会创造出真正的人工智能、杀手机器人和具有自我意识的仿生人，尚存争议。关于人工智能的发展存在大量支持和反对的论点，许多人认为人工智能将是人类可能创造的最糟糕的未来——甚至比核战争更糟。然而，目前我们仍处于人工智能发展的早期阶段，但随着Python的持续进步和库的完善，我们拥有一个每小时都在变得更聪明的人工智能系统可能为时不远。\n\
    \n![](img/2a94c98fce5df994fcecd950a995b8c9_108_0.png)\n\n![](img/2a94c98fce5df994fcecd950a995b8c9_108_1.png)"
