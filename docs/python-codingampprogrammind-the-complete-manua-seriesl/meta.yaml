  - '[PAGE 27]


    # Getting to Know Python


    Python is the greatest computer programming language ever created. It enables
    you to fully harness the power of a computer, in a language that’s clean and easy
    to understand.


    # WHAT IS PROGRAMMING?


    It helps to understand what a programming language is before you try to learn
    one, and Python is no different. Let’s take a look at how Python came about and
    how it relates to other languages.


    # PYTHON


    A programming language is a list of instructions that a computer follows. These
    instructions can be as simple as displaying your name or playing a music file,
    or as complex as building a whole virtual world. Python is a programming language
    conceived in the late 1980s by Guido van Rossum at Centrum Wiskunde & Informatica
    (CWI) in the Netherlands as a successor to the ABC language.


    # PROGRAMMING RECIPES


    Programs are like recipes for computers. A recipe to bake a cake could go like
    this:


    Put 100 grams of self-raising flour in a bowl.

    Add 100 grams of butter to the bowl.

    Add 100 millilitres of milk.

    Bake for half an hour.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_27_0.png)


    # CODE


    Just like a recipe, a program consists of instructions that you follow in order.
    A program that describes a cake might run like this:


    ```

    bowl = []

    flour = 100

    butter = 50

    milk = 100

    bowl.append([flour,butter,milk])

    cake.cook(bowl)

    ```


    ![](img/2a94c98fce5df994fcecd950a995b8c9_27_1.png)


    Guido van Rossum, the father of Python.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_27_2.png)


    # PROGRAM COMMANDS


    You might not understand some of the Python commands, like bowl.append and cake.cook(bowl).
    The first is a list, the second an object; we’ll look at both in this book. The
    main thing to know is that it’s easy to read commands in Python. Once you learn
    what the commands do, it’s easy to figure out how a program works.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_27_3.png)'
  - '[PAGE 28]


    # HIGH-LEVEL LANGUAGES


    Computer languages that are easy to read are known as “high-level”. This is because
    they fly high above the hardware (also referred to as “the metal”). Languages
    that “fly close to the metal,” like Assembly, are known as “low-level”. Low-level
    languages commands read a bit like this: msg db , 0xa len equ $ - msg.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_28_0.png)


    # ZEN OF PYTHON


    Python lets you access all the power of a computer in a language that humans can
    understand. Behind all this is an ethos called “The Zen of Python.” This is a
    collection of 20 software principles that influences the design of the language.
    Principles include “Beautiful is better than ugly” and “Simple is better than
    complex.” Type import this into Python and it will display all the principles.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_28_1.png)


    # PYTHON 3 VS PYTHON 2


    In a typical computing scenario, Python is complicated somewhat by the existence
    of two active versions of the language: Python 2 and Python 3.


    # WORLD OF PYTHON


    Python 3.7 is the newest release of the programming language. However, if you
    dig a little deeper into the Python site, and investigate Python code online,
    you will undoubtedly come across Python 2. Although you can run Python 3 and Python
    2 alongside each other, it’s not recommended. Always opt for the latest stable
    release as posted by the Python website.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_28_2.png)


    # PYTHON 3.X


    In 2008 Python 3 arrived with several new and enhanced features. These features
    provide a more stable, effective and efficient programming environment but sadly,
    most (if not all) of these new features are not compatible with Python 2 scripts,
    modules and tutorials. Whilst not popular at first, Python 3 has since become
    the cutting edge of Python programming.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_28_3.png)


    # PYTHON 2.X


    So why two? Well, Python 2 was originally launched in 2000 and has since then
