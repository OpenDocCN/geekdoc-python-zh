  md: '# Equipment You Will Need


    You can learn Python with very little hardware or initial financial investment.
    You don''t need an incredibly powerful computer and any software that''s required
    is freely available.


    # WHAT WE''RE USING


    Thankfully, Python is a multi-platform programming language available for Windows,
    macOS, Linux, Raspberry Pi and more. If you have one of those systems, then you
    can easily start using Python.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_25_0.png)


    # COMPUTER


    Obviously you''re going to need a computer in order to learn how to program in
    Python and to test your code. You can use Windows (from XP onward) on either a
    32 or 64-bit processor, an Apple Mac or Linux installed PC.


    # AN IDE


    An IDE (Integrated Developer Environment) is used to enter and execute Python
    code. It enables you to inspect your program code and the values within the code,
    as well as offering advanced features. There are many different IDEs available,
    so find the one that works for you and gives the best results.


    # PYTHON SOFTWARE


    macOS and Linux already come with Python preinstalled as part of the operating
    system, as does the Raspberry Pi. However, you need to ensure that you''re running
    the latest version of Python. Windows users need to download and install Python,
    which we''ll cover shortly.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_25_1.png)


    # TEXT EDITOR


    Whilst a text editor is an ideal environment to enter code into, it''s not an
    absolute necessity. You can enter and execute code directly from the IDLE but
    a text editor, such as Sublime Text or Notepad++, offers more advanced features
    and colour coding when entering code.


    # INTERNET ACCESS


    Python is an ever evolving environment and as such new versions often introduce
    new concepts or change existing commands and code structure to make it a more
    efficient language. Having access to the Internet will keep you up-to-date, help
    you out when you get stuck and give access to Python''s immense number of modules.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_25_2.png)


    # TIME AND PATIENCE


    Despite what other books may lead you to believe, you won''t become a programmer
    in 24-hours. Learning to code in Python takes time, and patience. You may become
    stuck at times and other times the code will flow like water. Understand you''re
    learning something entirely new, and you will get there.'
