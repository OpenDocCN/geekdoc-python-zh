    # Useful System and Disk Commands


    STEP 5 Enter: `vcgencmd measure_temp` to view the current operating system temperature
    of your Raspberry Pi. Enter: `vcgencmd get_mem arm` to view the RAM available,
    and `vcgencmd get_mem gpu` to view the memory available to the graphics chip.
    Finally try `lsusb` to view a list of attached USB devices.


    STEP 6 One command you might be wondering about is how to switch off or restart
    your Raspberry Pi from the command line. Don''t just hit the power switch. Enter:
    `sudo shutdown -h now` to shut down the Raspberry Pi (the "-h" option stands for
    "halt"), or enter: `sudo shutdown -r now` to restart your Raspberry Pi.


