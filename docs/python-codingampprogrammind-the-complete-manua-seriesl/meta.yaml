    # Create and Remove Directories


    Creating, moving and deleting directories aren''t as easy in the Terminal as they
    are within a desktop interface. You need to tell Linux to move the directories
    inside other directories, a process known as recursion. Sounds complex but you
    should quickly get the hang of it.


    # MANAGING FILES AND DIRECTORIES


    Now that you know how to create files, you''ll want to learn how to make directories,
    which are the same thing as folders, as well as move items around. If you are
    more used to working with a desktop interface, this can take a bit of getting
    used to.


    **STEP 1** Enter: `ls` to quickly view all the directories currently in in the
    home location. Directories are created using the “mkdir” command (make directory).
    Enter: `mkdir testdir` to create a new directory in your home directory. Enter:
    `ls` again to see it.


    **STEP 3** Like touch, you can create multiple directories at once with the mkdir
    command. Enter: `mkdir testdir2 testdir3` and enter: `ls`. You''ll now find several
    directories called testdir. Also, like files, you should know this means you can''t
    (and really shouldn''t) create directories with spaces. As with files, use an
    underscore ("_") character instead of a space.


    ```

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indiecity python_games Scra

    pi@raspberrypi ~ $ mkdir testdir

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indiecity python_games Scra

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ mkdir testdir2 testdir3

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indiecity python_games Scra

    pi@raspberrypi ~ $ _

    ```


    **STEP 2** The “mkdir” command is different to touch, in that it doesn''t update
    the timestamp if you use it with a directory that already exists. Enter: `mkdir
    testdir` again and you''ll get the error “mkdir: cannot create directory ‘testdir’:
    File exists”.


    **STEP 4** You can create directories inside of each other using the directory
    path. Enter: `mkdir Documents/photos` to create a new directory called “photos”
    inside your documents directory. The directory has to already exist, though, try
    to enter: `mkdir articles/reports` and you''ll get an error because there is no
    articles directory.


