- md: '## What is Linux?


    The Raspberry Pi operating system is Raspbian, which is a Linux operating system;
    but what exactly is Linux? Where did it come from and what does it do? In a world
    where Windows and macOS have supremacy of the desktop, it’s easy to overlook it,
    but there’s more to Linux than you might imagine.


    Linux is a surprisingly powerful, fast, secure and capable operating system. It’s
    used as the OS of choice for the Raspberry Pi, in the form of Raspbian OS, as
    well as in some of the most unlikely places.


    Despite only enjoying a 1.96% share (according to netmarketshare.com) of the total
    desktop operating system market, Linux has a dedicated following of enthusiasts,
    users and contributors. It was created in 1991 by University of Helsinki student,
    Linus Torvalds, who had become frustrated with the limitations and licensing of
    the popular educational system Minix, a miniature version of the Unix operating
    system, in use at the time.


    Torvalds needed a system that could mirror Unix’s performance and features, without
    the licensing cost. Thus was born Linux, the Unix-like operating system which
    used freely available code from the GNU project. This enabled users around the
    world to utilise the power of the Unix-like system, completely free of charge,
    an ethos that still holds today: Linux is free to download, install and use.


    Unix itself was released in the early ‘70s, as a multi-tasking, modular-designed
    operating system originally developed for programmers who needed a stable platform
    to code on. However, its performance, power and portability meant that it soon
    became the system of choice for companies and universities where high-end computing
    tasks were needed.


    Linux is much like any other operating system, such as Windows or macOS in that
    it manages the computer hardware, provides an interface for the user to access
    that hardware and comes with programs for productivity, communications, gaming,
    science, education and more. Linux can be broken up into a number of significant
    elements:


    ### BOOTLOADER

    The bootloader is the software that initialises and boots up your computer. It
    loads up the various modules the OS uses to begin to access the hardware in the
    system. You can modify a bootloader to load more than one OS installed on the
    system.


    ### GRAPHICAL SERVER

    This is a module within Linux that provides a graphical output to your monitor.
    It’s referred to as the X server or simply just X. X is an application that manages
    one or more graphical displays and one or more input devices (keyboard, mouse,
    etc.) connected to the computer.


    ### DAEMONS

    Daemons are background services that start as the operating system is booting.
    These can enable printing, sound, networking and so on. They run unobtrusively
    rather than under the direct control of the user, often waiting to be activated
    by an event or condition.


    ### KERNEL

    The kernel is the core of the system and the single element that is actually called
    Linux. The Linux kernel manages the computer processor, memory, storage and any
    peripherals you have attached to your computer. It provides the basic services
    for all other parts of the OS.


    ### DESKTOP ENVIRONMENT

    The Desktop Environment, or DE, is the main Graphical User Interface (GUI) that
    users interact with. It’s the desktop, that includes Internet browsers, productivity,
    games and whatever program or app you’re using. There are countless DEs available.
    Raspbian uses PIXEL.


    ### PROGRAMS/APPLICATIONS

    With Linux being an open source, free operating system, it also makes use of the
    tens of thousands of freely available applications. The likes of LibreOffice,
    GIMP and Python are just the tip of the iceberg.


    ## SHELL


    The Linux shell is a command-line interface environment that a Linux user can
    use to enter commands to the OS that directly affect it. Within the shell you
    can add new users, reboot the system, create and delete files and folders, and
    much more. BASH (Bourne Again Shell) is the most popular shell used in Linux,
    although more are available. The shell is also known as the Terminal, and it''s
    where you''re going to work from through this section of the book.


    ![Tux, the Linux mascot (Linus likes penguins).](img/2a94c98fce5df994fcecd950a995b8c9_138_0.png)


    ![Linus Torvalds, the creator of the Linux kernel.](img/2a94c98fce5df994fcecd950a995b8c9_138_1.png)


    Linux is used throughout the world, in a number of basic and quite unique uses.
    While it may look radically different from one environment to the next, the actual
    Linux kernel, can be found in modern smart TVs, in-car entertainment systems and
    GPS, supercomputers, IoT devices and the Raspberry Pi. It''s used by NASA, both
    in the command centre and on-board the ISS. Linux servers power the backbone of
    the Internet, along with most of the websites you visit daily. Android utilises
    components of the Linux kernel, as do set top boxes, games consoles and even your
    fridge, freezer, oven and washing machine.


    Linux isn''t just a free to use operating system. It''s stable, powerful and fast,
    easily customised and requires very little maintenance. However, it''s more than
    just performance stats; Linux means freedom from the walled garden approach of
    other operating systems. It''s a lively community of like-minded individuals who
    want more from their computers without the shackles of price or conformity. Linux
    means choice.


    Raspbian on the Raspberry Pi, is the Linux distribution of choice.


    ![A Desktop Environment can be as complex or as simple as the user desires.](img/2a94c98fce5df994fcecd950a995b8c9_138_2.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_138_3.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_138_4.png)


    A Desktop Environment can be as complex or as simple as the user desires.


    ## Using the Filesystem


    To master Linux, it’s important to understand how the filesystem works. What’s
    more, it’s also important to become familiar with the Terminal, or shell. This
    command line environment may appear daunting at first, but with practise, it soon
    becomes easy to use.


    ## GETTING AROUND


    To drop into the Terminal, click on the fourth icon from the left along the top
    of the Raspberry Pi desktop, the one with a right-facing arrow and an underscore.
    This is the shell, or Terminal.


    **STEP 1** First, you’re going to look at directories and the directory path.
    A directory is the same thing as a folder, however in Linux it’s always called
    a directory. These are placed inside each other using a “/” character. So when
    you see /home/pi it means the pi directory is inside the home directory. Enter:
    clear and press return to clean the screen. Now enter: pwd. This stands for Print
    Working Directory and displays /home/pi.


    **STEP 3** Enter: ls to view the contents of the current directory. You should
    see Desktop, Documents, and Downloads and Scratch in Blue. You may also see other
    items depending on how much you have used your Raspberry Pi. The colour code is
    worth knowing: directories are blue while most files are white. As you go on you’ll
    see other colours: executable files (programs) are bright green, archived files
    are red and so on. Blue and white are the two you need to know to get started.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_139_0.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_139_1.png)


    **STEP 2** When you log in to your Raspberry Pi, you don’t start at the base of
    the hard drive, known as the ‘root’ (also known as the topmost directory). Instead
    you begin inside your user directory, which is named ‘pi’ by default and is itself
    in a directory called ‘home’. Directories are indicated by the ‘/’ symbol. So,
    “/home/pi” tells you that in the root is a directory called home, and the next
    “/” says that inside “home” is a directory called “pi”. That’s where you start.


    **STEP 4** Now you’re going to move from the pi directory into the Documents directory.
    Enter: cd Documents. Note the capital “D”. Linux is case sensitive, which means
    you have to enter the exact name including correct capitalisation. The cd command
    stands for change directory. Now enter: pwd again to view the directory path.
    It will display /home/pi/Documents. Enter: ls to view the files inside the Documents
    directory.


    ![](img/2a94c98fce5df994fcecd950a995b8c9_139_2.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_139_3.png)'
  mdcn: '## 什么是Linux？


    树莓派的操作系统是Raspbian，这是一种Linux操作系统；但Linux到底是什么？它从何而来，又有什么作用？在Windows和macOS主导桌面的世界里，人们很容易忽视它，但Linux远比你想象的更加强大。


    Linux是一个功能惊人强大、快速、安全且能力全面的操作系统。它不仅作为树莓派的首选操作系统（以Raspbian OS的形式），也被用于一些意想不到的地方。


    尽管根据netmarketshare.com的数据，Linux在桌面操作系统市场中仅占1.96%的份额，但它却拥有忠实的爱好者、用户和贡献者群体。它于1991年由赫尔辛基大学学生Linus
    Torvalds创建，当时他对流行的教育系统Minix（一个当时使用的Unix操作系统微缩版本）的局限性和许可证问题感到不满。


    Torvalds需要一个能够镜像Unix性能和功能的系统，且无需支付许可证费用。于是Linux应运而生，这是一个类Unix操作系统，它使用了GNU项目中自由可用的代码。这使得世界各地的用户能够完全免费地使用类Unix系统的强大功能，这一理念至今仍然成立：Linux可免费下载、安装和使用。


    Unix本身在70年代早期发布，最初是为程序员开发的多任务、模块化操作系统，它为程序员提供了一个稳定的编程平台。然而，其性能、强大功能和可移植性意味着它很快成为公司和大学进行高端计算任务时的首选系统。


    Linux与其他任何操作系统（如Windows或macOS）非常相似，因为它管理计算机硬件，为用户提供访问这些硬件的接口，并附带用于生产力、通信、游戏、科学、教育等方面的程序。Linux可以分为几个重要的组成部分：


    ### 引导加载程序

    引导加载程序是初始化并启动计算机的软件。它加载操作系统用来开始访问系统硬件的各种模块。你可以修改引导加载程序以加载安装在系统上的多个操作系统。


    ### 图形服务器

    这是Linux中的一个模块，负责向显示器提供图形输出。它被称为X服务器或简称X。X是一个管理一个或多个图形显示以及连接到计算机的一个或多个输入设备（键盘、鼠标等）的应用程序。


    ### 守护进程

    守护进程是在操作系统启动时启动的后台服务。它们可以启用打印、声音、网络等功能。它们通常在后台静默运行，而不是在用户的直接控制下，常常等待由某个事件或条件激活。


    ### 内核

    内核是系统的核心，也是唯一真正被称为Linux的组件。Linux内核管理计算机处理器、内存、存储以及连接到计算机的所有外围设备。它为操作系统的所有其他部分提供基本服务。


    ### 桌面环境

    桌面环境（DE）是用户与之交互的主要图形用户界面（GUI）。它就是桌面，包含了互联网浏览器、生产力软件、游戏以及你正在使用的任何程序或应用。有无数的桌面环境可供选择。Raspbian使用的是PIXEL。


    ### 程序/应用程序

    Linux是一个开源的、免费的操作系统，它也利用了成千上万的自由可用的应用程序。像LibreOffice、GIMP和Python这样的软件只是冰山一角。


    ## Shell


    Linux shell是一个命令行界面环境，Linux用户可以使用它向操作系统输入直接影响它的命令。在shell中，你可以添加新用户、重启系统、创建和删除文件及文件夹等等。BASH（Bourne
    Again Shell）是Linux中最流行的shell，尽管还有更多其他shell可选。shell也被称为终端，你将通过本书的这一部分在此进行工作。


    ![Tux, the Linux mascot (Linus likes penguins).](img/2a94c98fce5df994fcecd950a995b8c9_138_0.png)


    ![Linus Torvalds, the creator of the Linux kernel.](img/2a94c98fce5df994fcecd950a995b8c9_138_1.png)


    Linux在全球范围内被用于许多基础且相当独特的用途。虽然不同环境下的Linux看起来可能大相径庭，但实际的Linux内核可以在现代智能电视、车载娱乐系统和GPS、超级计算机、物联网设备以及树莓派中找到。NASA在控制中心和国际空间站（ISS）上都使用Linux。Linux服务器驱动着互联网的骨干网，以及你日常访问的大多数网站。Android利用了Linux内核的组件，机顶盒、游戏机甚至你的冰箱、冰柜、烤箱和洗衣机也是如此。


    Linux不仅仅是一个免费使用的操作系统。它稳定、强大、快速，易于定制，并且几乎不需要维护。然而，它不仅仅关乎性能数据；Linux意味着从其他操作系统的围墙花园方法中解放出来。它是一个充满活力的社区，由志同道合的人组成，他们希望摆脱价格或一致性的束缚，从计算机中获得更多。Linux意味着选择。


    树莓派上的Raspbian是首选的Linux发行版。


    ![A Desktop Environment can be as complex or as simple as the user desires.](img/2a94c98fce5df994fcecd950a995b8c9_138_2.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_138_3.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_138_4.png)


    桌面环境可以根据用户的意愿变得复杂或简单。


    ## 使用文件系统


    要精通Linux，理解文件系统的工作原理非常重要。此外，熟悉终端（或shell）也很重要。这个命令行环境起初可能看起来令人生畏，但经过练习后，很快就会变得容易使用。


    ### 浏览目录


    要进入终端，请点击树莓派桌面顶部从左数第四个图标，那个带有向右箭头和下划线的图标。这就是shell或终端。


    **步骤 1** 首先，你将了解目录和目录路径。目录与文件夹是同一回事，但在Linux中它总是被称为目录。这些目录使用“/”字符相互嵌套。所以当你看到/home/pi时，意味着pi目录在home目录内部。输入：clear
    并按回车以清屏。现在输入：pwd。这代表打印当前工作目录，会显示/home/pi。


    **步骤 3** 输入：ls 以查看当前目录的内容。你应该会看到Desktop、Documents、Downloads和Scratch（显示为蓝色）。根据你的树莓派使用情况，你可能还会看到其他项目。颜色编码值得了解：目录是蓝色的，而大多数文件是白色的。随着学习的深入，你会看到其他颜色：可执行文件（程序）是亮绿色的，归档文件是红色的等等。蓝色和白色是入门时需要知道的两种颜色。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_139_0.png)


    ![](img/2a94c98fce5df994fcecd950a995b8c9_139_1.png)


    **步骤 2** 当你登录到树莓派时，你并不是从硬盘驱动器的基部（称为“根”，也称为顶级目录）开始的。相反，你开始于你的用户目录内，该目录默认名为“pi”，而它本身又在一个名为“home”的目录中。目录由“/”符号指示。所以，“/home/pi”告诉你，在根目录中有一个名为home的目录，而下一个“/”表示在“home”内部有一个名为“pi”的目录。这就是你的起始位置。


    **步骤 4** 现在你将从pi目录移动到Documents目录。输入：cd Documents。注意大写的“D”。Linux区分大小写，这意味着你必须输入完全正确的名称，包括正确的大小写。cd命令代表更改目录。现在再次输入：pwd
    以查看目录路径。它将显示/home/pi/Documents。输入：ls 以查看Documents目录内的文件。


    ![](img/2a94c98fce5df994fcecd950a995b8c9_139_2.png)


