  md: 'Many important properties of numbers are related to congruences. A theorem
    due to Pierre de Fermat asserts that for every prime number $p$, if $a$ is not
    $p$-congruent with 0, then


    $$a^p \equiv a \pmod{p}$$


    or equivalently:


    # **Theorem 6.3** (Fermat Congruence Theorem)


    $$a^{p-1} \equiv 1 \pmod{p}$$


    Fermat did not give any proof of this fact, but Euler proved it and generalized
    it in terms of the function $\varphi$ introduced by him, such that $\varphi(n)$
    is the number of elements of the set $\{k | MCD(n, k) = 1\}$ (the set of numbers
    coprime with $n$). Euler''s generalization of Fermat''s is the following.


    # **Theorem 6.4** (Euler Theorem) *For any $a$ coprime with $m$:*


    $$a^{\varphi(m)} \equiv 1 \pmod{m}$$


    this generalizes the result of Fermat because when $p$ is prime, of course $\varphi(p)
    = p - 1$. Leibniz proved it by using Newton''s binomial formula.


    Congruences can be seen as equations between remainder functions, as Python notation
    puts in evidence, moreover, they can be also considered as "cycle equations".
    when a modulus $m$ is seen as a point of a circle and the values $1, 2, \dots,
    m - 1$, called also residues of the m-congruence, as points at the same distance
    on the circle, determining a partition of the round angle in $m$ equal angles
    of $2\pi/m$. In fact, for any integer $k$:


    $$km \equiv 0, \quad km + 1 \equiv 1 \dots km + (m - 1) \equiv m - 1 \pmod{m}$$


    in circle representation, two numbers are $m$-congruent when, in the circle arrangement
    of angles $2\pi/m$ they are located on the same point of the circle. In other
    words, congruences correspond to "circular counting".


    An algebraic congruence is given by a condition:


    $$P(x, y, \dots) \equiv 0 \pmod{m}$$


    A linear congruence is an algebraic congruence for a polynomial of degree 1, given
    by a condition:


    $$a * x \equiv b \pmod{m}$$


    A binomial congruence is an algebraic congruence of a monomial with a constant
    (without no loss of generality, the monomial coefficient can be assumed 1), given
    by a condition:'
