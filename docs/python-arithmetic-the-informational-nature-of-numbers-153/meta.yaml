    \ primlist(n):\n    if n == 1:\n        return []\n    if n == 2:\n        return\
    \ [2]\n    else:\n        pp = primlist(n-1)\n        if erathostene(n, pp):\n\
    \            pp.append(n)\n        return pp\nn = int(input(\"Numero: \"))\nres\
    \ = primlist(n)\nprint(\"Primi: \", res)\n```\n\n表6.2展示了一个程序，用于生成小于或等于给定数 $n$\
    \ 的素数。然而，这个程序效率不高，因为当 $n$ 非常大时，递归调用在计算上变得难以承受。通过添加表6.3中的程序，素数列表可以轻松扩展到100000。\n\
