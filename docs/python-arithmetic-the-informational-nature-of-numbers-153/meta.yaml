  - '[PAGE 18]


    A programming language is always relative to a set of programs acting at many
    levels and in many different software and hardware platforms that can make a given
    language “understood” by a machine by producing observable behaviors. These programs
    play roles of interpreting, compiling, assembling, at different levels of translations,
    decoding, and encoding, according to different strategies. In this ambit, concepts,
    terminologies, algorithms, tools, specifications, and notations were developed
    that constitute a complex network of metalanguages on which the theory and practice
    of programming languages developed since the middle of the 20th century, with
    the first programming languages as Fortran, Algol, and Cobol, under a constant
    pressure toward better adequacy to the theories and technologies in continuous
    evolution.


    A programming language is used for giving commands to a machine; for describing
    algorithms that are realized by a machine; for organizing data that are stored
    in a machine to be accessed, extended, and modified keeping an internal coherence;
    for transmitting data between machines along a network of connections; for acquiring
    data from external sources, according to formats that are functional to further
    elaborations.


    The first programming languages were procedural, that is, based on assignments
    of values to variables, which through a concatenation of assignments controlled
    by conditions and iterations were able to provide the results as values of some
    variables at the end of a computation. Then the functional paradigm emerged, where
    programs were conceived as a composition of functions to input arguments, giving
    the required results. Then logical paradigm was based on relations and logical
    connectives, where starting from some basic statements complex relations were
    derived according to inferential mechanisms of a logical nature. When final relations
    were satisfied, the required results for a given problem were obtained. In the
    meantime, the notion of abstract data structure, suggested by functional and logical
    paradigms, in combination with a more abstract notion of variable produced the
    idea of an object, as the core of any process of data elaboration, which was the
    epicenter of object-oriented programming.


    This is a very simplified reconstruction of the main ideas leading to the development
    of programming languages. Many different classifications, parameters, and principles
    of design and analysis were elaborated, which is very difficult to collocate in
    a simple, unified, and systematic schema for an intrinsic heterogeneity of aspects,
    a variety of perspectives, and different contexts of applications. Abstract machines,
    abstract syntax, abstract data type, operational semantics, denotational semantics,
    action semantics, type checker, polymorphism, dynamical typing, exception handling,
    garbage collector, static analysis, process analysis, specification and scripting,
    parallelism and concurrency, ... are typical terms of programming. We mentioned
    them, without explaining them, in a casual order, just to suggest the complexity
    of the process within which a programming language has to be collocated.


    Finally, any user has to bear in her/his mind that a correct use of a language
    has to refer to the computational resources related to the given language. This
    means that a program can be formally correct, within an intended semantics, but
    it can produce an incorrect behavior or an error message. It depends on the way
    the statements'
- md: "of the program are processed at the many levels of translation that they produce\
    \ in the machine where the program is running. In other words, programming correctly\
    \ in a given language means learning the right ways to express the computations\
    \ to obtain what are the expected results. Hence, programming is an art, as Donald\
    \ Knuth explains in perfect terms in his fundamental books [12]. Of course, it\
    \ is an art based on a very complex background from which the theory of computation\
    \ emerged in the 20th century.\n\nPrograms shown in this book were realized, and\
    \ tested within IDLE, a Python’s “Integrated Development and Learning Environment“\
    \ (version 3.8.1 running on a Mac Book Pro, Apple M1, Pro 16 GB, 2021).\n\nPython\
    \ code is a text that can be executed by producing some changes in the state of\
    \ the executing machine. In this statement, several concepts are introduced that\
    \ deserve a further explanation. In this context, a machine is a device able to\
    \ receive a text encoding a sequence of actions and realize these actions. An\
    \ action is the passage from one state to another state of the machine. In turn,\
    \ a state can be expressed by an association of value to a list of variables.\
    \ Let us represent a state as a sequence of assignments each one of which associates\
    \ a value to a variable. A variable is put on the left of the equality sign and\
    \ the assigned value to the right of it:\n\n$x_1 = v_1, x_2 = v_2, \\dots, x_n\
    \ = v_n$\n\nThis simple schema can be more complex when many levels of variables\
    \ are considered and values are organized in complex structures constructed from\
    \ basic types. We do not enter now into further complications and can rely on\
    \ this schematic picture for having an initial idea of a basic model on which\
    \ to ground our intuition.\n\nA command is a request for action, while an instruction\
    \ is the encoding of a command, which can be part of a text organized in statements\
    \ following syntactical rules of construction. The simplest command is an assignment\
    \ having the form “variable = expressions” meaning that in the current state,\
    \ the expression is evaluated and the value is assigned to the variable.\n\nPython\
    \ instructions are organized into three main kinds of structures: conditions,\
    \ cycles or iterations, and function definitions. A condition controlling an assignment\
    \ has the following form.\n\n```\nif x == 0:\n    y = 1\n```\n\nwhere equality\
    \ is denoted by two equality symbols (for distinguishing conditions from assignments)\
    \ and other relations can be considered instead of equality.\n\nThe following\
    \ text expresses an iteration where the condition is the membership to “range(10)”,\
    \ which are values from 0 to 10 (excluded):\n\n```\nfor i in range(10):\n    n\
    \ = n + 1\n```\n\nexecuting this code corresponds to increment $n$ of ten units\
    \ (comments to code are written after #).\n\n```\ndividend = 3273\ndivisor = 131\n\
    quotient = 0\nwhile dividend >= divisor:\n    dividend = dividend - divisor\n\
    \    quotient = quotient + 1\nprint(quotient)\nprint(dividend) # dividend at the\
    \ end of while cycle coincides with the remainder\n```\n\nthe execution of this\
    \ code concludes by printing the result of division 3273 : 131 and its rest, because\
    \ when the while-condition does not hold the value of the dividend corresponds\
    \ to the rest and the value of the quotient gives the number of times 131 is comprised\
    \ in 3273.\n\nNow, we could define a function with the following code:\n\n```\n\
    def division(dividend, divisor):\n    quotient = 0\n    while dividend >= divisor:\n\
    \        dividend = dividend - divisor\n        quotient = quotient + 1\n    return\
    \ quotient, dividend\nresult = division(3273, 131)\nprint(result[0])\nprint(result[1])\n\
    ```\n\nwhen this definition is given, the expression $division(3273, 131)$ denotes\
    \ the execution of the code above when the values 3273 and 131 are given to the\
    \ variables $dividend$ and $divisor$, respectively. Therefore, the assignment\
    \ $result = division(3273, 131)$ associates to the variable \"result\" the values\
    \ of variables listed after \"return\", where $result[0]$ selects the first value,\
    \ while $result[1]$ selects the second one.\n\nSome points of the previous discussion\
    \ need to be clarified. First, Python texts are written in lines beginning at\
    \ different horizontal positions (column numbers). This is a way adopted by Python\
    \ for expressing **blocks**. A block is a list of instructions that are assigned\
    \ the same level of execution. This means that these instructions require to be\
    \ executed in the order they are written, by considering the sequence as a single\
    \ instruction transforming the state of the executing machines before the execution\
    \ of the first instruction into the state obtained after the execution of the\
    \ last instruction. A block of instruction at level $i$ ($i$ can also be identified\
    \ by the number of space characters preceding the beginning of instructions) that\
    \ is controlled by a condition has to be entirely executed when the condition\
    \ holds. This rule does not apply if, in the middle of the block, a “break” instruction\
    \ occurs, because in that case when it is encountered, then the exit from the\
    \ block immediately occurs.\n\nSecond, in the coding text, some words are **keywords:\
    \ “if, for, while, range, in, def, return, …”**. all the sequences of letters\
    \ different from keywords are variables that can be used in assignments or function\
    \ definitions. If a function “fun” does not have arguments, then it has to be\
    \ defined as “fun()”. Digits and sequences of digits denote numbers (in decimal\
    \ notation). When a character is considered a pure symbol with no numeric meaning\
    \ or no variable function, it has to be quoted. For example “a” is the first letter\
    \ of our alphabet in itself while “alpha” is the string of characters “a”, “l”,\
    \ “p”, “h”, “a” concatenated in a word. The operation of concatenation puts letters\
    \ in finite sequences, called also **strings** therefore:\n\n“a” + “l” + “p” +\
    \ “h” + “a” = “alpha”\n\nand:\n\n“alpha” + “beta” = “alphabeta”\n\nOn strings\
    \ also the selection of substrings is defined, such that:\n\n“alpha”[2] = “p”\n\
    \nand:\n\n“alpha”[2 : 4] = “ph”\n\nthat is, the letter of position 2 is selected\
    \ (positions are numbered from 0 to len(“alpha”)-1 and len(“alpha”) is the number\
    \ of positions of “alpha”). On numbers, the operations +, *, -, /, % are defined\
    \ (sum, product, difference, division, integer remainder). When a variable n having\
    \ an integer as value has to be considered as a string then “str(n)” denotes the\
    \ string of digits denoting the value of n. Conversely, “int(w)” is the integer\
    \ denoted by the string w.\n\nInstruction **if** can have many (optional) alternatives:\n\
    \n```\nif condition₁:\n    instruction₁\nelif condition₂:\n    instruction₂\n\
    else:\n    instruction₃\n```\n\nwith a number, even null, of “elif” or “else”\
    \ lines expressing alternatives to the first if condition (else applies when all\
    \ the cases of the previous alternatives fail).\n\nFor-instructions are also called\
    \ **definite iterations**, and while-instructions are also called **indefinite\
    \ iterations**. An expression consisting of a function applied to some arguments\
    \ is called **a function call**.\n\nPrimitive values of Python are integers, strings,\
    \ float (integers plus a decimal part less than 1), bytes, and truth or Boolean\
    \ values (True and False are the constants denoting truth values). A condition\
    \ gives a truth value as a result and holds when its truth value is True. None\
    \ represents the undefined value. For example, if we forget the return instruction\
    \ in the definition of a function, when we call it we obtain None.\n\nIn Python,\
    \ the types bytes and bool, and the related encoding functions, are closely tied\
    \ to how the language handles data and the representation of information: bytes\
    \ is an immutable data type in Python that represents a sequence of bytes. A bit\
    \ is a binary digit (0 or 1), bytes are 8-bit data units and can represent values\
    \ ranging from 0 to 255. A bytes object is created using the syntax b'...' or\
    \ the bytes() function. Binary data is represented using the 0b prefix followed\
    \ by a sequence of binary digits (0 and 1).\n\nASCII (American Standard Code for\
    \ Information Interchange) is a set of characters and their corresponding numeric\
    \ representations used for character encoding in computing. The ASCII representation\
    \ of a character is obtained using the “ord()” function and vice versa using the\
    \ “chr()” function. Conversions between data types are given by appropriate conversion\
    \ functions. For instance, we can convert a string to bytes using “encode()” or\
    \ convert bytes to a string using “decode()”. Python use also UNICODE (UTF8 standard\
    \ mostly), which extends ASCII for the internal representation of data. When we\
    \ say character we mean a printable character, represented on a screen or on paper\
    \ with a set of graphical elements that’s called a glyph, though the exact details\
    \ of a graphical realization will depend on the font being used. Most Python code\
    \ doesn’t need to worry about glyphs; figuring out the correct glyph to display\
    \ is generally the job of a GUI toolkit or a terminal’s font renderer. A “code\
    \ point” is the internal representation of a character according to a specific\
    \ encoding. For completeness, we also mention non-printable characters, which\
    \ do not correspond to a glyph, but have a correspondence, possibly in combination\
    \ with others, in terms of action, at some level of execution, when they are decoded\
    \ in specific contexts of their occurrence.\n\nA command is a text directly producing\
    \ an action, in a suitable context, while an instruction is a text corresponding\
    \ to an action within the larger text of a program, when it is interpreted (or\
    \ compiled, in the more general cases). Some texts can be commands or instructions,\
    \ depending on their contexts of use.\n\n“print” is a command or an instruction\
    \ producing a value given in exit to an interaction device (a line of the screen,\
    \ for example), while “input(x)” means that a value put on the input device is\
    \ assigned to variable x (input is given, for example, by the keyboard characters\
    \ visualized on the screen).\n\nThe programs that are given in this book were\
    \ developed by Python 3.8.1 (Mac OS Monterey) in the IDLE environment (Integrated\
    \ Development Language Environment). Programs are organized in files called modules\
    \ with the extension “.py”. When a module is open in a window, the command RUN\
