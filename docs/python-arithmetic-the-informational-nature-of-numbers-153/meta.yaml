    \ A formalized mathematical theory is defined by: i) a formal language of formulae"
  - '[PAGE 97]


    written according to a well-defined syntax; ii) a set of initial formulae expressing
    the axioms of the theory; iii) a finite set of deduction rules using which the
    theorems of the theory are generated starting from the axioms. A theory is coherent
    or consistent if no two theorems express a proposition and the negation of it.
    It is complete if all the propositions that are logical consequences of the axioms
    are also theorems of the theory.


    First-order Predicate Logic FOL was the language in which PA was expressed [15,
    16]. This language was designed by Gottlob Frege in a fundamental work at the
    end of the 1800s [17]. The basic notions of FOL are predicates and individuals
    on which predicates express relations: $P(a, b)$ is an atomic formula expressing
    that a relation denoted by $P$ holds between two individuals denoted by constants
    $a, b$. In this way properties end relations on any finite sequence of individuals
    can be expressed (properties are expressed by predicates with only one argument).


    The **Negation** of $P(a, b)$:


    $\neg\mathbf{P(a, b)}$


    indicates the opposite of $P(a, b)$, i.e., its non-validity. The **Disjunction**
    is a proposition:


    $\mathbf{P(a, b)} \vee \mathbf{P(b, a)}$


    indicating that at least one of the two propositions connected by $\vee$ is true,
    while the **Conjunction**:


    $\mathbf{P(a, b)} \wedge \mathbf{P(b, a)}$


    indicates that both propositions connected by $\wedge$ are true.


    $\mathbf{P(a, b)} \rightarrow \mathbf{P(b, a)}$


    is the **Implication** read as “if P(a, b), then P(b, a)” and is equivalent to:


    $\neg\mathbf{P(a, b)} \vee \mathbf{P(b, a)}$


    and finally:


    $\mathbf{P(a, b)} \leftrightarrow \mathbf{P(b, a)}$


    is the logical **Equivalence** equal to $(\mathbf{P(a, b)} \rightarrow \mathbf{P(b,
    a)}) \wedge (\mathbf{P(b, a)} \rightarrow \mathbf{P(a, b)})$.


    The symbols $\neg, \vee, \wedge, \rightarrow, \leftrightarrow$ are called **connectives**
    (negation, disjunction, conjunction, implication, equivalence). Symbols $\forall$
    and $\exists$ are called **quantifiers** (universal, existential).


    If we consider an individual variable $x$ (ranging over individuals), then:


    $\forall x P(x, b)$


    asserts that, for every value $a$ taken by $x$, $P(a, b)$ holds, while'
  - '[PAGE 98]


    $\exists x P(x, b)$


    asserts that there exists a value $a$ of $x$ for which $P(a, b)$ holds.


    A FOL logical calculus, based on Frege''s system was determined to be able to
    deduce theorems of PA in a sense very close to arithmetic calculations. A mathematical
    notion of interpretation and model of a theory given in FOL was given by assigning
    meanings to predicates, individual constants, and variables over a specified domain
    of objects (we do not enter into the details). Then, a formal definition of logical
    consequence was given by asserting that a formula $\varphi$ is a logical consequence
    of a set of formulae $\Phi$, when any model of all formulae $\Phi$ is also a model
    of $\varphi$.


    In 1930 Kurt Gödel proved that FOL is complete, in the sense that all the theorems
    that are logical consequences of axioms given in FOL are theorems. FOL Completeness
    is strongly based on the important property of FOL, known as compactness. Namely,
    a FOL theory has a model, that is its axioms are true under an interpretation
    of its symbols, if and only if all finite subsets of axioms have a model (not
    necessarily the same model for all the subsets).


    Nevertheless, in 1931 Gödel proved the incompleteness of Peano Arithmetic PA because
    there are true arithmetic propositions that cannot be deduced as theorems of PA
    [17]. This means that PA does not express completely arithmetic. The weak point
    of this inadequacy is the induction principle that requires a powerful logic to
    be completely formally expressed.


    However, despite the incompleteness of PA, a very strong connection between FOL
    and arithmetic was discovered by Tholaf Skolem in 1920 (but partial results were
    already obtained by Löwenheim and Tarski). Any FOL theory that is consistent has
    a model. This result follows from the mathematical definition of a FOL model.
    Skolem proved the following theorem under the hypothesis of FOL with finite or
    denumerable symbols for predicates, individual constants, and variables.


    > **Theorem 6.6** (Skolem Theorem) *if a FOL theory has a model, then it has an
    arithmetic model, that is, a model where individuals are natural numbers and predicates
    are interpreted as relations over numbers.*


    Skolem theorem has a deep arithmetic relevance and raises several questions that
    are very important in many applications of logic. One of them is the so-called
    Skolem paradox [16]. Let us consider a FOL theory of real numbers, describing
    the properties of operations on reals, their ordering, and their continuity (axioms
    of an ordered and continuous field). Without entering into the details of these
    axioms, what happens is that according to Skolem theorem, these axioms have an
    arithmetic model. It seems absurd because we know that reals are a set that cannot
    be put in 1-to-1 correspondence with natural numbers. But this phenomenon sheds
    a new light on the mathematical meaning of our concepts, and for example, makes
    it possible to extend reals into hyperreal numbers that extend real numbers with
    infinite and infinitesimal numbers.


    This rapid incursion in logic is of course too concentrated for a complete understanding
    of its implications but intends only to sketch the expressive power and the'
