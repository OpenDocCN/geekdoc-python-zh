  md: 'of a Diophantine equation. In other words, one of the oldest subjects of one
    of the oldest mathematical theories is intimately linked with the mathematical
    theory at the basis of modern computer science. The sense of this book connecting
    arithmetic to a modern programming language is rooted just in this link. Arithmetic
    deals with numbers and number calculations, and computability deals with computation
    in the most general sense of information elaboration over symbolic structures.
    These two things are not different but result in two faces of the same coin. The
    next chapter will consider symbolic computation, now we go back to Diophantine
    equations.


    Any Diophantine equations can be expressed in the form:


    ```

    $$P(x, y, z \dots) = 0$$

    ```


    where $P(x, y, z \dots)$ is a polynomial of variables $x, y, z \dots$, with integer
    coefficients (sometimes also rational coefficients are considered).


    Any Diophantine equation determines, for any variable $x$ of $P$ a set:


    ```

    $$\{x \in \mathbb{Z} \mid \exists y, \dots z \in \mathbb{Z} \ P(x, y, z \dots)
    = 0\}$$

    ```


    that is said to be a Diophantine set. Sometimes it is better to consider the set
    of values that the polynomial $P$ assumes when its variables assume integer values
    (in $\mathbb{Z}$ or even in a subset of $\mathbb{Z}$): $\{P(x, y, z \dots) \mid
    x, y \dots z \in \mathbb{Z}\}$ in this case, we say more precisely the set is
    polynomially Diophantine for $P$, while in the former case, it is Diophantine
    for $P$ and the variable $x$ of $P$ (this notion extends naturally to any group
    of variables, by considering sets of finite sequences of integers). Shortly we
    can say that a set is Diophantine in two different ways, “per variable” or “per
    value”.


    The following theorem shows that the two ways of defining Diophantine sets are
    equivalent.


    > **Theorem 6.1** (Diophantine Set Theorem) *A set of integers $D$ is Diophantine
    for a polynomial $P$ if it is Diophantine for the polynomial $P - v$ and variable
    $v$, where $v$ is not a variable of $P$. Vice versa. If $D$ is Diophantine for
    a polynomial $P$ and variable $x$ of $P$, then it is Diophantine for the polynomial
    $P + x$.*


    > *Proof* It is obvious that when $P$ assumes a value $a$, then $P - v = 0$ has
    a solution for $v = a$. Vice versa if $P = 0$ when $x = a$ and some values of
    the other variables of $P$, then $P + x$ assumes the value $a$ when $P = 0$. In
    conclusion, the two notions of the Diophantine set coincide. $\square$


    Many arithmetic properties can be formulated in terms of Diophantine equations.
    One of the most famous is given by Pythagoras’ equation related to his theorem:


    ```

    $$x^2 + y^2 = z^2$$

    ```


    It has been known since ancient cultures that 3, 4, 5 is a solution of this equation.
    Of course, if $a, b, c$ is a solution, then for any integer $k$, $ka, kb, kc$
    is a solution too, therefore Pythagoras’ equation has infinite solutions.'
