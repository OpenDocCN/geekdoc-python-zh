  md: 'A programming language is always relative to a set of programs acting at many
    levels and in many different software and hardware platforms that can make a given
    language “understood” by a machine by producing observable behaviors. These programs
    play roles of interpreting, compiling, assembling, at different levels of translations,
    decoding, and encoding, according to different strategies. In this ambit, concepts,
    terminologies, algorithms, tools, specifications, and notations were developed
    that constitute a complex network of metalanguages on which the theory and practice
    of programming languages developed since the middle of the 20th century, with
    the first programming languages as Fortran, Algol, and Cobol, under a constant
    pressure toward better adequacy to the theories and technologies in continuous
    evolution.


    A programming language is used for giving commands to a machine; for describing
    algorithms that are realized by a machine; for organizing data that are stored
    in a machine to be accessed, extended, and modified keeping an internal coherence;
    for transmitting data between machines along a network of connections; for acquiring
    data from external sources, according to formats that are functional to further
    elaborations.


    The first programming languages were procedural, that is, based on assignments
    of values to variables, which through a concatenation of assignments controlled
    by conditions and iterations were able to provide the results as values of some
    variables at the end of a computation. Then the functional paradigm emerged, where
    programs were conceived as a composition of functions to input arguments, giving
    the required results. Then logical paradigm was based on relations and logical
    connectives, where starting from some basic statements complex relations were
    derived according to inferential mechanisms of a logical nature. When final relations
    were satisfied, the required results for a given problem were obtained. In the
    meantime, the notion of abstract data structure, suggested by functional and logical
    paradigms, in combination with a more abstract notion of variable produced the
    idea of an object, as the core of any process of data elaboration, which was the
    epicenter of object-oriented programming.


    This is a very simplified reconstruction of the main ideas leading to the development
    of programming languages. Many different classifications, parameters, and principles
    of design and analysis were elaborated, which is very difficult to collocate in
    a simple, unified, and systematic schema for an intrinsic heterogeneity of aspects,
    a variety of perspectives, and different contexts of applications. Abstract machines,
    abstract syntax, abstract data type, operational semantics, denotational semantics,
    action semantics, type checker, polymorphism, dynamical typing, exception handling,
    garbage collector, static analysis, process analysis, specification and scripting,
    parallelism and concurrency, ... are typical terms of programming. We mentioned
    them, without explaining them, in a casual order, just to suggest the complexity
    of the process within which a programming language has to be collocated.


    Finally, any user has to bear in her/his mind that a correct use of a language
    has to refer to the computational resources related to the given language. This
    means that a program can be formally correct, within an intended semantics, but
    it can produce an incorrect behavior or an error message. It depends on the way
    the statements'
