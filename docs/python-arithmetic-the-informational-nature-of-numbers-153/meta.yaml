    \nConsider an arithmetical operation with arguments of a million digits. How can\
    \ we compute the result? The algorithms presented above run on suitable machines,\
    \ those capable of hosting an interpreter of Python language. Thus, given the\
    \ physical limitation of any device, there are limitations in the sizes of the\
    \ structures that can be managed by our programs, and even if data can be memorized\
    \ on files that are external to the elaboration unit of the machine, also the\
    \ sizes of these structures cannot exceed some limits. Of course, technology is\
    \ always increasing these limits, but in any moment some limits exist. Given this\
    \ situation, it is interesting to define conditions that allow us to fragment\
    \ the arguments of an operation in small parts and apply to them usual algorithms,\
    \ in such a way that concatenating the results obtained on fragments we get exactly\
    \ what operation should return on the whole arguments. These conditions are easy\
    \ in the case of addition and subtraction, so we leave to the reader the details\
    \ of their formulation.\n\nThe following theorems are easy consequences of Stevin\
    \ algorithms (Tables 4.14 and 4.15).\n\n> Theorem 4.4 (Division concatenation)\
    \ Let $\\beta\\gamma$ be a dividend that is concatenation of numerals $\\beta$\
    \ and $\\gamma$. Division $\\beta\\gamma : \\delta$ can be computed by a first\
    \ division $\\beta : \\delta$. Then, let $\\theta$ and $\\rho$ be, respectively,\
    \ the quotient and the remainder od this division (surely, $len(\\rho) \\le len(\\\
