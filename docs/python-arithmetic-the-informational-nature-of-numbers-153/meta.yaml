  md: 'name, and some general aspects of its nature, certain variables of its state
    and their respective types of values.


    A “class” is the definition of a type of object with a common structure and the
    operations acting on it together with some general conditions. These conditions
    are what care about the operations, ignoring specific details due to the way operations
    are implemented. Just these operations are called “methods”, which are expressed
    as the “attributes” of objects are, by using a dot notation such as:


    *object.attribute.*


    An attribute selects a variable characteristic of the object (age, city, profession,
    language, ...). Therefore if “name” is a key of the object, something specific
    to its identity, then *name.age* expresses the value of its age. The same notation
    is adapted for a method such as “year-report” that associates to “name” some relevant
    information about the activity of the object in the current year, by updating,
    at the same time, the values of some particular variables of the object. Possibly
    additional parameters can be put inside parentheses following the attribute or
    the method.


    When a class is defined, a special instruction provides the creation of an object
    of the class, also called an instance of the class. When an object is created,
    it can be altered during a computation given by the execution of a program. An
    object can be also destroyed, by losing its state and the data related to it.


    In this book, we do not use objects and methods in our Python arithmetical algorithms,
    but this brief incursion on this topic, apart of a reason of completeness, is
    useful for explaining some notation choices, and for showing the potentiality
    of Python programming. In any case, what it is important to remark here is that
    the notion of an object is so general and expressive that any entity in Python
    is an object. Everything, from variables to functions, to classes too is an object,
    and this, of course, represents a powerful conceptual unification.


    Given any object *w*, the command “dir(w)” will provide the set of attributes
    and methods that can be applied to it. For example if *w* = [1, 2, 3], the command
    “dir(w)” gives operations, or built-in functions and methods that can be applied
    to the object. Many of them have “dunder” format (double underscore format), with
    two underscores before and after the name such as ''__add__'', ''__class__'',
    ''__contains__'', ...


    More information about some specific classes, operations, functions, or methods
    can be obtained by the command “help()”.


    An important difference between operations and functions from one side and methods
    on the other side has to be remarked. An operation or a function are denotative
    instrument taking arguments and giving results. However, arguments are only read
    but are not altered by the reading. Differently, methods when applied to an object
    change its state. An assignment “new = object. method” provides a copy of the
    object in the state obtained after the application of the method to it.'
