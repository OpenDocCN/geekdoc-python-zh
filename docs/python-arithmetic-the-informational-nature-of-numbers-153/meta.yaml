    \ or for any errors or omissions that may have been made. The publisher remains\
    \ neutral with regard to jurisdictional claims in published maps and institutional\
    \ affiliations.\n\nThis Springer imprint is published by the registered company\
    \ Springer Nature Switzerland AG\nThe registered company address is: Gewerbestrasse\
    \ 11, 6330 Cham, Switzerland\n\nIf disposing of this product, please recycle the\
    \ paper.\n\nThe book is dedicated to my grandparents and grandchildren.\n\n##\
    \ Preface\n\nThe book wants to introduce the programming language Python starting\
    \ from the most familiar algorithms of elementary arithmetic by putting in evidence,\
    \ at the same time, some deep aspects of numbers, which are present just at the\
    \ beginning of their learning, as the counting process on which the whole arithmetic\
    \ is based on. For example, simple Python programs reveal that a counting process\
    \ directly related to a number system elaborated by Archimedes of Syracuse is\
    \ strictly related to our decimal system and the notion of zero.\n\nThe link between\
    \ Python and Arithmetic is related to the Arithmetization of mathematics, a long\
    \ process going from Leonardo Fibonacci’s introduction in Europe of decimal representation,\
    \ up to the mathematical logic, from which computability theory emerged. Python\
    \ is a synthesis of the mathematical notation developed along this process. This\
    \ is the reason for its natural adequacy in expressing basic arithmetic algorithms.\
    \ The notion of function on which Python is based is essentially due to Leonard\
    \ Euler and then formalized by Alonzo Church in 1930 years.\n\nIn conclusion,\
    \ “Python Arithmetic”, is a reflection on the deep connection between programming,\
    \ arithmetic and logic.\n\nThe book provides concrete examples, suggesting the\
    \ importance of mathematical tradition for a deep understanding of the main ideas\
    \ underlying the most modern information technology.\n\nVerona, Italy\n\nVincenzo\
    \ Manca\n\n**Acknowledgments** I express my gratitude to the students and colleagues\
    \ at the Department of Computer Science of the University of Verona, from 2002\
    \ to 2019.\n\n## Contents\n\n- 1 The Origins of Digital Age\n  - 1.1 Digits, Arithmetic,\
    \ and Cybernetics\n  - References\n- 2 Mathematical Notation and Python\n  - 2.1\
    \ From Ars Analytica to Python Expressions\n  - 2.2 Python Essentials\n  - 2.3\
    \ Python Data Structures\n    - 2.3.1 Lists\n    - 2.3.2 Object Oriented Programming\n\
    \    - 2.3.3 Tuples, Sets, and Dictionaries\n  - References\n- 3 Counting Algorithms\
    \ in Python\n  - 3.1 Decimal Counting Algorithm\n  - 3.2 Periodical Counting\n\
    \  - 3.3 X-Counting Algorithm\n  - 3.4 Lexicographic Counting Algorithm\n  - 3.5\
    \ The Principle of Periodical Counting\n  - References\n- 4 Arithmetic Operations\n\
    \  - 4.1 Addition and Subtraction\n  - 4.2 Multiplication and Division\n  - 4.3\
    \ Operations by Tables\n  - 4.4 Operation Concatenations\n- 5 Square Root Algorithms\n\
    \  - 5.1 Simple Square Root Algorithms\n  - 5.2 Bombelli’s Square Root Algorithm\n\
    \  - 5.3 Newton and Interpolation Algorithms\n  - 5.4 Square Root Algorithm and\
    \ π\n  - 5.5 Square Root and Logarithms\n  - Reference\n- 6 Primality, Equations,\
    \ Congruences\n  - 6.1 Prime Numbers\n    - 6.1.1 Asymptotic Analysis and Prime\
    \ Distribution\n    - 6.1.2 2Log Random Informational Test\n  - 6.2 Diophantine\
    \ Equations\n  - 6.3 Congruences and Arithmetic Encoding\n  - 6.4 Arithmetic and\
