- md: '## Chapter 1

    The Origins of Digital Age


    Key statement


    > The perspective of the book is presented. Numbers cannot exist without numerals
    and, conversely, numerals presuppose numbers. However, the two concepts are different
    and this fact is crucial for a deep understanding of important aspects of arithmetic.
    The situation is similar to the difference between data and information. In a
    sense, numbers are pure information and digits are the data by which information
    is represented.


    ## 1.1 Digits, Arithmetic, and Cybernetics


    The book is a gentle introduction to Python using arithmetic, and vice versa,
    with a historical perspective encompassing programming languages within the wider
    process of development of mathematical notation. The revisitation of typical algorithms
    that are the core of elementary mathematical knowledge, helps to grasp their essence
    and to clarify some assumptions that are often taken for granted but are very
    profound and of a very general nature.


    Our age, since the middle of the 20th century, can be described as the “digital
    age” and the attribute “digital” often expresses the new perspective of symbolic
    representation and information processing. However, decimal numerals appear in
    the sixth century AD, in Europe after the publication of the book “Liber Abaci”
    by Leonardo Pisano (1202). There is a close connection between the digits in number
    representation and their universal use in the representation of any kind of information.
    Arithmetic is the bridge that connects these two epochal achievements, which can
    be emphatically identified with “Fibonacci’s abacus” (number symbol algorithms)
    and Von Neumann’s EDVAC (Electronic Discrete Variable Automatic Computer) [1].
    This is the main philosophical and historical thesis behind the present book,
    and its content is a way to support this thesis.


    Digits introduce a new kind of algorithms in arithmetical concepts, and the basic
    methods that children learn in elementary school are examples of dealing with
    numbers by working out their digital representations. Arithmetic was a central
    theme in Greek mathematics, but numbers were directly related to the length of
    segments. When fixing a segment of unitary length, the numbers 1, 2, 3 ..., are
    the integer ratio of segments with that of unitary length. These numbers are called
    “arithmoi” by the Greeks and differ from the numbers denoting fractions, which
    are called “meroi”, and from the numbers denoting ratios that cannot be expressed
    by integers or fractions, which were discovered around the fifth century BC in
    the Pythagorean school, and are called “logoi”. In Greek arithmetic, there is
    no relationship between calculations with numbers and their names (in the various
    Greek alphabetical notation systems).


    Indu-Arabic numerals emerged around the fifth and sixth centuries AD in a wide
    cultural area with mutual influences from Indian, Iranian and Arabic cultures,
    even if important Greek suggestions from the great mathematician Archimedes of
    Syracuse (Magna Grecia) certainly provided impulses and anticipations for the
    definition of the modern decimal system of numbers based on zero [2].


    The numerals provided a natural unification of all kinds of Greek numbers and
    promoted the new trend of modern mathematics in which arithmetic became the core
    of mathematics. This trend, often referred to as the “arithmetization of mathematics”,
    will give rise to the Cartesian discovery of analytical geometry, which represents
    a real revolution compared to Greek mathematics. Analytical geometry expresses
    points and spatial concepts by numbers, variables, and equations. This revolution
    was followed by other revolutions (logarithms, infinitesimals, probabilities,
    functions). The digital perspective was realized through the development of algebra,
    from the equations to the general structures, which emerged as forms given by
    operations on entities of an abstract nature. This abstract perspective led, in
    the second half of the 19th century, to a turn towards fundamental and logical
    bases aimed at the search for general concepts on which to build sound theories
    for the whole of mathematics. In this context, the central role of arithmetic
    becomes even more crucial than in the past, and Peano’s arithmetic is an axiomatic
    theory formally representable in a particular system of mathematical logic, from
    which the theory of computability takes its first steps to provide answers to
    the questions of soundness, completeness and decidability of arithmetic. In mathematical
    logic, theories become objects of investigation.


    The term “program” is understood as “a formula expressing an algorithm” that is
    executed by an automaton, and, symmetrically, an automaton is a device capable
    of executing an algorithm expressed by a program.


    Python is one of the newest languages for writing programs, so the deep connection
    between programs and numbers is clear from the history briefly sketched so far.
    But two more reasons support the idea of an intrinsic complementarity between
    programming and arithmetic.


    The first is pedagogical. Indeed, arithmetic is the natural environment in which
    every human being with a basic culture first tries out, albeit informally and
    often implicitly, algorithms for calculating the four basic operations with numbers.


    The second motivation is also historical because Python is in a sense the language
    of mathematics, a notation of this basic language defined along a process that
    ranges from decimal digits, operations, variables, parentheses, equations, sequences,
    sets, and functions, to the typical forms of organization of a calculation through
    conditions, cycles, and recursion.


    Finally, the main motivation stated in the core statement above is the starting
    point for our further discussion. Numbers need expressions to denote them. Expressions
    are not intrinsic because others can replace them, but they are necessary. When
    these expressions are constructed over a finite set of symbols (digits), after
    a first sequence of numbers, these symbols and no other are continuously repeated
    in the following numbers.


    The first mathematician to define a systematic system for generating numbers was
    Archimedes of Syracuse in the third century B.C. The Archimedean system, which
    was defined in a book with the Latin title Arenarius, was not intended to define
    all numbers, but only very large numbers [2–4]. However, it can be considered
    the first system with the three main characteristics of a counting system that
    have the most important properties for complete arithmetic adequacy: creativity,
    infinity, and recursion. Creativity means that each numeral is new for numerals
    that precede it; infinity means that after any numeral there is always another
    numeral; recursion means that after an initial sequence of numerals coinciding
    with the digits of the system, digits repeat regularly in all subsequent numerals.
    Since the numerals are finite expressions of digits, their lengths increase along
    their generation. A strong motivation to write this book came from a simple Python
    program giving an enumeration directly deduced from Archimedes’ system. As will
    be shown in Chap. 3, a translation of this enumeration in a more readable form
    is the best way to explain that modern positional number systems are rooted in
    the periodical method introduced by Archimedes in the “Arenarius” [2, 4].


    In conclusion, the trend that since Archimedes goes to digits, arithmetization,
    algebra, and then to mathematical logic and computability (from which programming
    languages stem) is an **informational trend** and this is the essential thesis
    of the book, stressed by the subtitle: “The informational nature of numbers”.


    In the second chapter, Python is briefly introduced by linking this language to
    standard mathematical notation, which took its current form throughout a long
    process that extends from the introduction of decimal numerals to the 18th century,
    particularly within Euler’s notational and conceptual framework.


    The following chapters introduce the core of arithmetic by providing the Python
    representations of all the concepts and algorithms presented. The complementarity
    between Python and arithmetic is the common leitmotif of these chapters. The essence
    of algorithms for numbers is fully expressed by a few lines of Python statements,
    while these lines become very natural and simple examples of Python constructs
    with very general applications in an enormous number of applications.


    The last chapter gives an interpreter of the first programming language, the Turing
    machine, and the general notion of Python iterator is linked to symbolic computation
    and counting algorithms given in the second chapter.'
  mdcn: '## 第一章

    数字时代的起源


    核心陈述


    > 本书的视角由此展开：数字不能脱离数符而存在，反之，数符也预设了数字。然而，这两个概念是不同的，这一事实对于深刻理解算术的重要方面至关重要。这种情况类似于数据与信息之间的区别。从某种意义上说，数字是纯粹的信息，而数位则是表示信息的数据。


    ## 1.1 数位、算术与控制论


    本书通过算术温和地引入Python，反之亦然，并从历史视角出发，将编程语言置于数学符号发展的更广阔进程中。对作为基础数学知识核心的典型算法的重新审视，有助于把握其本质，并澄清一些常被视为理所当然但实则非常深刻且具有普遍性的假设。


    自20世纪中叶以来，我们的时代可以被描述为“数字时代”，而“数字”这一属性常常表达了符号表示和信息处理的新视角。然而，十进制数符出现在公元六世纪，是在莱昂纳多·皮萨诺（Leonardo
    Pisano，1202年）的著作《算盘书》（Liber Abaci）在欧洲出版之后。数位在数字表示中的作用与其在表示任何类型信息中的普遍应用之间存在着密切联系。算术是连接这两个划时代成就的桥梁，这两个成就可以明确地认定为“斐波那契算盘”（数字符号算法）和冯·诺依曼的EDVAC（电子离散变量自动计算机）[1]。这是本书背后主要的哲学和历史论点，其内容正是支持这一论点的方式。


    数位在算术概念中引入了一种新的算法，儿童在小学学习的基本方法就是通过处理数字的数位表示来处理数字的例子。算术是希腊数学的核心主题，但数字直接与线段的长度相关。当确定一个单位长度的线段时，数字1、2、3……就是与该单位长度线段成整数比的线段。希腊人称这些数字为“arithmoi”，它们不同于表示分数的数字（称为“meroi”），也不同于表示无法用整数或分数表示的比例的数字（这些数字大约在公元前五世纪的毕达哥拉斯学派中被发现，称为“logoi”）。在希腊算术中，数字的计算与其名称（在各种希腊字母符号系统中）之间没有关系。


    印度-阿拉伯数符大约在公元五、六世纪出现在一个广泛的文化区域，受到印度、伊朗和阿拉伯文化的相互影响，尽管来自大数学家阿基米德（来自大希腊的叙拉古）的重要希腊建议无疑为基于零的现代十进制数字系统的定义提供了动力和预见[2]。


    数符为所有类型的希腊数字提供了自然的统一，并促进了现代数学的新趋势，其中算术成为数学的核心。这一趋势通常被称为“数学的算术化”，它将催生笛卡尔解析几何的发现，与希腊数学相比，这是一场真正的革命。解析几何通过数字、变量和方程来表达点和空间概念。这场革命之后又发生了其他革命（对数、无穷小、概率、函数）。数字视角是通过代数的发展实现的，从方程到一般结构，这些结构表现为对抽象实体进行运算所给出的形式。这种抽象视角在19世纪下半叶导致了向基础和逻辑基础的转变，旨在寻找一般概念，以此为基础为整个数学构建健全的理论。在这种背景下，算术的核心作用变得比过去更加关键，而皮亚诺算术是一种可以在特定的数学逻辑系统中形式化表示的公理化理论，可计算性理论正是从这里迈出了第一步，以回答算术的健全性、完备性和可判定性问题。在数学逻辑中，理论本身成为了研究的对象。


    “程序”一词被理解为“表达算法的公式”，由自动机执行；对称地，自动机是一种能够执行由程序表达的算法的设备。


    Python是编写程序的最新语言之一，因此从目前简要勾勒的历史中可以清楚地看到程序与数字之间的深刻联系。但还有两个理由支持编程与算术之间存在内在互补性的观点。


    第一个是教学上的。确实，算术是每个具有基本文化的人首先尝试（尽管是非正式且常常是隐含地）进行数字四则运算算法的自然环境。


    第二个动机也是历史性的，因为Python在某种意义上是数学的语言，是一种沿着从十进制数位、运算、变量、括号、方程、序列、集合和函数，到通过条件、循环和递归来组织计算的典型形式的过程所定义的基本语言的符号表示。


    最后，上述核心陈述中陈述的主要动机是我们进一步讨论的起点。数字需要表达式来表示它们。表达式并非内在的，因为其他表达式可以替代它们，但它们是必要的。当这些表达式构建在有限的符号集（数位）之上时，在第一个数字序列之后，这些符号（而非其他符号）会在后续数字中不断重复。


    第一位定义系统化数字生成体系的数学家是公元前三世纪的叙拉古的阿基米德。阿基米德体系在一本拉丁名为《数沙者》（Arenarius）的书中定义，并非旨在定义所有数字，而只是非常大的数字[2–4]。然而，它可以被视为第一个具有计数系统三个主要特征的系统，这些特征对于完全的算术充分性具有最重要的属性：创造性、无限性和递归性。创造性意味着每个数符对于其前面的数符来说都是新的；无限性意味着在任何数符之后总是存在另一个数符；递归性意味着在与系统数位一致的初始数符序列之后，数位在所有后续数符中规律地重复。由于数符是数位的有限表达式，它们的长度随着生成过程而增加。撰写本书的一个强烈动机来自一个简单的Python程序，该程序给出了一个直接从阿基米德体系推导出的枚举。正如第3章将展示的，将这种枚举翻译成更可读的形式，是解释现代位置数制植根于阿基米德在《数沙者》中引入的周期性方法的最佳方式[2,
    4]。


    总之，自阿基米德以来，从数位、算术化、代数，到数理逻辑和可计算性（编程语言由此衍生）的趋势，是一种**信息趋势**，这是本书的核心论点，由副标题“数字的信息本质”所强调。


    第二章简要介绍了Python，将这种语言与标准数学符号联系起来，后者在漫长的过程中形成了当前的形式，这个过程从十进制数符的引入一直延伸到18世纪，特别是在欧拉的符号和概念框架内。


    接下来的章节通过提供所有概念和算法的Python表示来介绍算术的核心。Python与算术之间的互补性是这些章节的共同主题。数字算法的本质完全由几行Python语句表达，而这些语句在Python构造中变得非常自然和简单，这些构造在大量应用中具有非常广泛的用途。


    最后一章给出了第一种编程语言——图灵机的解释器，并将Python迭代器的一般概念与第二章给出的符号计算和计数算法联系起来。'
