    , res[1])\n```\n\n算术基本定理指出，任何自然数都可以唯一地表示为一组素数的乘积。特别地，1 是空素数集的乘积。这个定理由勒让德证明。有许多证明方法，但没有一个是简单的。这些证明中使用的一个关键性质是：如果\
    \ $n = p \\times q$，那么 $k$ 整除 $n$ 当且仅当它整除 $p$ 或 $q$。\n\n### 6.1.1 渐近分析与素数分布\n\n\
    让我们回顾一些关于无限（长度）序列的“渐近”概念，这些概念指的是当索引值趋近无穷时序列的性质 [8]。定义在数上的性质 $P$ 自然地扩展到数列。如果一个性质对序列的所有元素都成立，那么它对有限序列成立。对于无限序列\
    \ $(a_n|n \\in \\mathbb{N})$，定义性质 $P$ 在序列上“最终”成立是有用的。当存在一个索引 $n_0$，使得 $P$ 对所有\
    \ $n > n_0$ 的 $a_n$ 都成立时，就发生了这种情况。\n\n一个数列是（大小上）无限的，当对于每个数 $L$，该序列都“最终”大于 $L$。类似地，一个序列是（大小上）无穷小的，当它“最终”小于任何固定数。在下文中，序列总是假定长度无限，而无限序列指的是大小上无限。\n\
    \n当一个序列是（大小上）无限的，那么该序列肯定最终大于零，那么非零元素序列 $(a_n|n \\in \\mathbb{N})$ 的倒数序列就是无穷小的。无限和无穷小序列可以根据它们的增加或减少速度进行比较。比较是通过它们各自元素的比率来确定的，简而言之，如果\
    \ $\\{a_n\\}$ 和 $\\{b_n\\}$ 是两个无限序列，那么如果 $\\{a_n/b_n\\}$ 是无限的，或者等价地，如果 $\\{b_n/a_n\\\
    }$ 是无穷小的，那么 $\\{a_n\\}$ 具有比 $\\{b_n\\}$ 更大的（渐近）无限阶。\n\n对称地，当两个无穷小序列的比率是无穷小时，那么分子序列具有比分母序列更大的无穷小阶。在这种情况下，我们说\
    \ $\\{b_n\\}$ 是 $\\{a_n\\}$ 的一个零点，并使用小“o”符号，写作 $\\{b_n\\} = o(\\{a_n\\})$。使用这种符号，无穷小对应于\
    \ $o(1)$ 序列。\n\n序列以及更一般函数的渐近分析表明，无穷不是一个简单的概念，可以考虑多种无穷（和无穷小）。从某种意义上说，这种分析从不同的角度揭示了康托尔关于无穷集合已经发现的内容，即引入了超限序数和基数。由数学家保罗·巴赫曼和埃德蒙·兰道引入的渐近分析，指的是无穷的动力学方面，而不是康托尔考虑的排序和数量方面。这种分析在算法分析中非常有用。数学家和计算机科学家唐纳德·克努特成功地将渐近分析应用于算法复杂度的评估\
    \ [9]。\n\n一个非常有趣的现象，由中世纪数学家尼科尔·奥雷姆发现，即一个序列 $\\{a_n\\}$ 可以是无穷小的，但它的部分和 $\\{\\sum_{j=1}^n\
    \ a_j\\}$ 可以提供一个无限序列。也就是说，表现出这种现象的一个序列是调和序列 $\\{\\frac{1}{n}\\}$。\n\n当我们考虑序列和中的渐近性质时，那些具有较小（较小无限，或较小无穷小）阶的项可以被丢弃，而不影响序列的渐近性质。当两个序列的比率是\
    \ $1 + o(1)$ 时，它们是渐近等价的。\n\n素数最被研究的方面之一是它们在数中的分布。勒让德和高斯猜想，当 $n$ 趋近无穷时，以下比率成立，其中\
    \ $\\pi_n$ 是 $n$ 以内的素数个数（lg 是自然对数）：\n\n$$\\pi_n = \\frac{n}{\\lg n}$$\n\n1859年，伯纳德·黎曼引入了复数上的\
    \ $\\zeta$ 函数，表明分布的更好估计与一个关于零点的猜想有关"
