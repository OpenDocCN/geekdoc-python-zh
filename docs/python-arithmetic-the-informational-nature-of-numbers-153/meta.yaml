    \nThe fundamental theorem of arithmetic says that any natural number can be expressed\
    \ in a unique way as the product of a set of prime numbers. In particular 1 is\
    \ the product of the empty set of primes. This theorem was proved by Legendre.\
    \ Many proofs are available, but none of them is trivial. A crucial property used\
    \ in these proofs is that if $n = p \\times q$, then $k$ divides $n$ if and only\
    \ if it divides either $p$ or $q$.\n\n### 6.1.1 Asymptotic Analysis and Prime\
    \ Distribution\n\nLet us recall some “asymptotic” notions about infinite (in length)\
    \ sequences, which refer to the properties of sequences for values of indices\
    \ approaching infinite [8]. A property $P$ defined on numbers extends naturally\
    \ to number sequences. The property holds for a finite sequence if it holds for\
    \ all the elements of the sequence. In the case of infinite sequences $(a_n|n\
    \ \\in \\mathbb{N})$ it is useful to define when a property $P$ on numbers holds\
    \ “definitively” on the sequence. This happens when there exists an index $n_0$\
    \ such that $P$ holds on every $a_n$ with $n > n_0$.\n\nA sequence of numbers\
    \ is infinite (in size) when for every number $L$ the sequence is “definitely”\
    \ greater than $L$. Analogously a sequence is infinitesimal (in size) when it\
    \ is “definitely” less than any fixed number. In the following, a sequence is\
    \ always assumed infinite in length, and an infinite sequence is intended to be\
    \ infinite in size.\n\nWhen a sequence is infinite (in size), then surely the\
    \ sequence is definitely greater than zero, and then the sequence of the inverses\
    \ of non-zero elements of elements $(a_n|n \\in \\mathbb{N})$, is infinitesimal.\
    \ Infinite and infinitesimal sequences can be compared according to their speed\
    \ of increase or decrease, respectively. The comparison is determined through\
    \ the ratio of their respective elements, say shortly $\\{a_n\\}$ and $\\{b_n\\\
    }$ two infinite sequences, then $\\{a_n\\}$ has greater (asymptotic) infinite\
    \ order than $\\{b_n\\}$ if $\\{a_n/b_n\\}$ is infinite, or equivalently, if $\\\
    {b_n/a_n\\}$ is infinitesimal.\n\nSymmetrically, when the ratio between two infinitesimal\
    \ sequences is infinitesimal, then the sequence at the numerator has a greater\
    \ infinitesimal order than the sequence at the denominator. In this case, we say\
    \ that $\\{b_n\\}$ is a zero of $\\{a_n\\}$ and use the little “o” notation, by\
    \ writing $\\{b_n\\} = o(\\{a_n\\})$. Using this notation infinitesimal correspond\
    \ to $o(1)$ sequences.\n\nAsymptotic analysis of sequences and more generally\
    \ functions shows that infinity is not a simple concept and many kinds of infinite\
    \ (and infinitesimal) can be considered. In a sense, this analysis reveals according\
    \ to a different perspective what Cantor already discovered about infinite sets,\
    \ introducing transfinite ordinals and cardinal numbers. Asymptotic analysis,\
    \ introduced by mathematicians Paul Bachmann and Edmund Landau refers to the dynamics\
    \ aspect of the infinite, rather than those of ordering and numerousness considered\
    \ by Cantor. This kind of analysis is very useful in the analysis of algorithms.\
    \ The mathematician and computer scientist Donald Knuth successfully applied asymptotic\
    \ analysis in the evaluation of the complexity of algorithms [9].\n\nA very interesting\
    \ phenomenon, discovered by the medieval mathematician Nicole d’Oresme, is that\
    \ a sequence $\\{a_n\\}$ can be infinitesimal, but its partial sums $\\{\\sum_{j=1}^n\
    \ a_j\\}$ can provide an infinite sequence. Namely, a sequence exhibiting a such\
    \ phenomenon is the harmonic sequence $\\{\\frac{1}{n}\\}$.\n\nWhen we consider\
    \ asymptotic properties of sequences in a sum of them those that have smaller\
    \ (smaller infinite, or smaller infinitesimal respectively) order can be discarded\
    \ without affecting the asymptotic properties of the sequence. Two sequences are\
    \ asymptotically equivalent when their ratio: is $1 + o(1)$.\n\nOne of the most\
