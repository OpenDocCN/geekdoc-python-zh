    \ 49X 4X1 511\n\n## 3.5 周期性计数原理\n\n本章介绍的所有计数算法都具有共同的结构。它们是周期性的，并且基于具有相似递推模式的后继函数“succ”：(i)\
    \ 一个初始条件，根据该条件，第一个数字与数字字母表的第一个数字一致；(ii) 一个中间循环条件，根据该条件，如果一个数字以非最后一个数字结尾，则“succ”将其替换为字母表中的下一个数字；最后\
    \ (iii) 一个结束循环条件，根据该条件，“succ”对数字的适当部分调用“succ”，并根据特定计数特有的特定机制转换数字的剩余部分。然而，在任何情况下，递推都在计数过程中确定了一个新的循环。\n\
    \n所有计数算法都是创造性的、无限的和递推的。这些条件共同意味着，在生成数字的过程中，随着计数的进行，数字必须增加其长度。\n\n在下一章中，我们将展示计数完全决定了数字上的所有运算。此外，在几乎所有运算中（除了字典序跳过计数），通常的十进制\
    \ Stevin 算法可以完全扩展到它们 [6]。\n\n位置系统中基数表示定理提供了一个通用公式，用于给出由给定位置表示所表示的数字。这个结果的本质是周期性的结果，如下定理所示。\n\
    \n如果一个周期性计数算法的非数字数字可以由两部分表示：(i) 一个末尾数字 $x$，和 (ii) 一个阶分量 $\\alpha$，它是一个较小的数字，表示给定数字之前的阶数，我们写作\
    \ $(\\alpha, x)$，则该算法是**单调的**。\n\n由 Python 程序给出的计数算法都是单调周期性计数（除了跳过字典序计数）。在所有这些算法中，succ\
    \ 函数的结构都基于数字的两部分。如果一个数字不是字母表的最后一个，则 succ 将其替换为下一个数字；如果是最后一个，则将其替换为第一个数字，并且 succ\
    \ 应用于数字的阶部分，因为在计数中完成了一个新的阶。\n\n以下定理是单调周期性计数中数字结构的简单推论。只需考虑双括号给出与其所包围的数字相关的数字，并且如果\
    \ $p$ 是数字的个数，则每个阶包含 $p$ 个数字。因此，以下定理成立。\n\n**定理 3.1** *(周期性计数定理)* 给定一个在 $p$ 个数字上的周期性单调计数算法，以下等式成立：\n\
    \n$[[\\alpha x]] = [[\\alpha]]p + [[x]].$ (3.1)\n\n如果我们迭代地应用上述定理的递推方程，我们得到基数为\
