    # 5.3 Newton and Interpolation Algorithms


    Let us consider a number that is not a perfect square. It is easy to get an approximate
    value of its square root by the following simple method. From the rightmost digit,
    we decompose the digits of the given number in consecutive pairs up to the leftmost
    side, where possibly only one digit is available. For example, if the number is
    3452189 we get: 3 45 21 89 and the corresponding square roots are: 1 6 4 9. When
    we concatenate these digits we get as approximate square root of 3452189 the value
    1649. Now we consider the division 3452189: 1649, which provides 2093 (ignoring
    the remainder). Newton’s method consists of approaching a better approximation
    by considering the average of the two values $(1649 + 2093)/2 = 1821$. This value
    is a better evaluation because its square is 3316041, which is closer to 3452189,
    concerning the squares of the previous two values. However, we can go on by repeating
    the procedure, by division 3452189: 1821 = 1895, which has 3591025 as a square.
    The method goes on until an error under a given threshold is obtained. Table 5.5
    shows the Python program of this method, giving 1858.0067276519749 as a value
    approximated to the 15 decimal digits.'
