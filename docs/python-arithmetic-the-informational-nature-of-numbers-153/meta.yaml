- img_proc: true
  md: '$D(x) = succ(f_{ord(x)}(x))$


    the function $D$, by definition, is different from any function $f_i$ on the argument
    $x$ such that $ord(x) = i$ (having the same order as the function $f_i$). The
    term “diagonal” comes from the arrangement, on infinite rows, of the images of
    functions (in the order of the arguments). Namely, $D$ is an alteration of the
    diagonal of this planar arrangement. Of course, $D$ is a computable function because
    constructed through computable functions, but differs from any function of the
    list. In other words, a computable function is missing in any list of computable
    functions when all of them are total functions. This proves the following theorem.


    **Theorem 7.3** (Partial Computability) *If a class of computable functions includes
    any computable function (is complete), then it has to include also partial functions.*


    The partiality asserted by the above theorem is intrinsic, that is, in general,
    we cannot establish when a function is defined or not on a given argument. Namely,
    if we could do it, any function would be easily transformed into a total one.
    This means that partiality is undecidable, and partiality is the true origin of
    the undecidability in computability.


    To summarize, a comprehensive definition of computable functions must encompass
    partial functions that lack defined values without any possibility of determining,
    in a computable general way, whether on a given argument a given function will
    provide a definite result. This is what Turing discovered in his famous paper
    in 1936, the undecidability of “Halting Problem” for Turing machines, providing
    the ultimate reason for Gödel incompleteness of Peano arithmetic.


    Therefore, the general notion of computability gives a deep understanding of the
    limitations of logical formal systems in describing theories rich enough to express
    arithmetic.


    As it was already noticed, the argument of the proof of the Partial Computability
    theorem is very general. It is essentially the same as the proof of the impossibility
    of a 1-to-1 correspondence between a set and its power set (Cantor), and occurs
    in many contexts of logic (Russel’s paradox), arithmetic (Gödel’s theorem), and
    computability. At the basis of the diagonal argument, there is a mechanism of
    reflexivity, that is, the possibility of having objects and their representation
    at the same level. When self-representation is possible, then an incompleteness
    has to be paid for escaping from the contradiction, and this phenomenon is common
    to logical self-reference, arithmetic encoding, and recursive schemata of computation.
    Maybe, it belongs to more general situations involving life, mind, and consciousness.'
