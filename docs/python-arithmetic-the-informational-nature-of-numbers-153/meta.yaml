  md: '# Chapter 2

    Mathematical Notation and Python


    Key statement


    > Python is a language that condenses classical mathematical notation into an
    essential style of algorithmic notation. However, the terms and concepts on which
    Python is built have a history of eight centuries, essentially between two famous
    “Leonardos”: Leonardo Fibonacci (also known as Leonardo Pisano) and Leonard Euler,
    who gave a near-final framework to basic mathematical notation.


    # 2.1 From Ars Analytica to Python Expressions


    The Liber Abaci was published in 1202. The influence of this book on mathematical
    thinking was enormous. Its message was essentially that we can work with numbers
    by manipulating the digits of their representations. A number representation using
    digits is a “numeral”, therefore calculations with numbers reduce to calculations
    with numerals. This view was completely new and certainly had a catalytic effect
    on the new algebraic trend of the algebraic school that flourished in the north-central
    regions of Italy (Scipione del Ferro, Antonio Maria del Fiore, Federico Fontana
    (called Tartaglia), Gerolamo Cardano and Lodovico Ferrari were the most famous
    names) and which investigated methods for solving algebraic equations of the third
    and fourth degree, described in the book Algebra by Rafael Bombelli, published
    in 1572 (and certainly studied by Goffred Leibniz). In particular, the formulas
    discovered by Italian algebraists introduce a new number, which was later designated
    “i” by Leonard Euler and represents the imaginary square root of −1 ( i² = −1).
    The book “Isagoge in artem analyticem”, which was published in 1591 by the French
    mathematician François Viète [1], should be seen in this context. In it, he develops
    his ars analytica or ars speciosa, in which number manipulations are extended
    to symbolic forms containing letters that refer to generic numbers, i.e. numbers
    without a'
  merge: -1
  pgno: 13
- img_proc: true
  md: 'specific value or *indeterminate*. This term is a new term for **variable**,
    even though historical traces of an analogous term can be found in Arabic mathematics
    to denote the unknown values of algebraic equations (and variables for geometric
    units were common in Greek mathematics). Equations of the first and second degree,
    in which the unknown value occurs raised to the first or second power, were known
    since Babylonian mathematics, but in Arabic mathematics, these equations were
    systematically studied. In the context of equations or analytical expressions,
    a term such as $2a$ stands for any number multiplied by 2, i.e. any even number,
    where 2 is the coefficient and $a$ is the literal part. In this case, $2a$ and
    $3a$ are general numbers, but they can be summed to give $5a$ and can be multiplied
    to give $6a^2$. Literal expressions are thus numbers in the broader sense of this
    term, and in this passage lies the germ of the algebraic perspective that in the
    next centuries will lead to the abstract structures of modern algebra up to the
    most general and abstract concepts that were developed in the 20th century.


    In Bombelli’s algebra, we also find parentheses, which form the basis of mathematical
    expressions, but their introduction goes back to the “General trattato di numeri
    e misure” by Nicolò Tartaglia from 1556 [2].


    In 1585, the Flemish mathematician Simon Stevin published another fundamental
    book entitled “De Thiende”, which means “The Tenth” in English. In this book,
    the decimal system that we use is defined in all its important aspects: the algorithms
    of the four arithmetic operations are presented for decimal representation, and
    a notation corresponding to our decimal point (or comma) is presented, which allows
    the algorithms given for integer numbers to be extended to fractions [3]. This
