- md: 'In all chapters, a historical perspective is always taken, as this is an essential
    way to recognize the deeper reasons for the development of ideas and their inner
    logic [5–8]. The lack of this perspective often leads to a superficiality that
    prevents a true understanding of cultural phenomena. For example, machine learning
    seems to be a recent panacea and novelty in information technology. However, a
    closer analysis reveals that its essence is strongly linked to the same spirit
    of Gauss and Legendre’s least-minimum-square method (and optimization methods
    in general). This means that great ideas often recur in new forms that realize
    general principles in different contexts. Restoring these connections enables
    us to grasp the essence of things and thus gain a deep understanding of their
    functions and possibilities.


    Basic mathematical concepts are assumed. However, we will revisit them in the
    following chapters as they arise in the course of our discussions.


    ## References


    1. von Neumann, J.: First Draft of a Report on the EDVAC. Moore School of Electrical
    Engineering University of Pennsylvania (1945)

    2. Manca, V.: The Archimedean origin of modern positional number systems. Algorithms
    (2024)

    3. Heath, W.: The Works of Archimedes. Dover Publications (2002)

    4. Manca, V.: Lezioni Archimede. Biblioteca Alagoniana, Quad. N. 6, Siracusa (2020)

    5. Cajori, F: A History of Mathematical Notation. Dover Publications (1993)

    6. Kline, M.: Mathematical Thought from Ancient to Modern Times, 3 Vol. Oxford
    University Press (1990)

    7. Manca, V.: Il Paradiso di Cantor. Edizioni Nuova Cultura (2022)

    8. Manca, V.: Arithmoi. VillaHermosa Publishing (2023)


    ## Chapter 2

    ## Mathematical Notation and Python


    **Key statement**


    > Python is a language that condenses classical mathematical notation into an
    essential style of algorithmic notation. However, the terms and concepts on which
    Python is built have a history of eight centuries, essentially between two famous
    “Leonardos”: Leonardo Fibonacci (also known as Leonardo Pisano) and Leonard Euler,
    who gave a near-final framework to basic mathematical notation.


    ### 2.1 From Ars Analytica to Python Expressions


    The Liber Abaci was published in 1202. The influence of this book on mathematical
    thinking was enormous. Its message was essentially that we can work with numbers
    by manipulating the digits of their representations. A number representation using
    digits is a “numeral”, therefore calculations with numbers reduce to calculations
    with numerals. This view was completely new and certainly had a catalytic effect
    on the new algebraic trend of the algebraic school that flourished in the north-central
    regions of Italy (Scipione del Ferro, Antonio Maria del Fiore, Federico Fontana
    (called Tartaglia), Gerolamo Cardano and Lodovico Ferrari were the most famous
    names) and which investigated methods for solving algebraic equations of the third
    and fourth degree, described in the book Algebra by Rafael Bombelli, published
    in 1572 (and certainly studied by Gottfried Leibniz). In particular, the formulas
    discovered by Italian algebraists introduce a new number, which was later designated
    “i” by Leonard Euler and represents the imaginary square root of −1 ( i² = −1).
    The book “Isagoge in artem analyticem”, which was published in 1591 by the French
    mathematician François Viète [1], should be seen in this context. In it, he develops
    his ars analytica or ars speciosa, in which number manipulations are extended
    to symbolic forms containing letters that refer to generic numbers, i.e. numbers
    without a specific value or *indeterminate*. This term is a new term for **variable**,
    even though historical traces of an analogous term can be found in Arabic mathematics
    to denote the unknown values of algebraic equations (and variables for geometric
    units were common in Greek mathematics). Equations of the first and second degree,
    in which the unknown value occurs raised to the first or second power, were known
    since Babylonian mathematics, but in Arabic mathematics, these equations were
    systematically studied. In the context of equations or analytical expressions,
    a term such as $2a$ stands for any number multiplied by 2, i.e. any even number,
    where 2 is the coefficient and $a$ is the literal part. In this case, $2a$ and
    $3a$ are general numbers, but they can be summed to give $5a$ and can be multiplied
    to give $6a^2$. Literal expressions are thus numbers in the broader sense of this
    term, and in this passage lies the germ of the algebraic perspective that in the
    next centuries will lead to the abstract structures of modern algebra up to the
    most general and abstract concepts that were developed in the 20th century.


    In Bombelli’s algebra, we also find parentheses, which form the basis of mathematical
    expressions, but their introduction goes back to the “General trattato di numeri
    e misure” by Nicolò Tartaglia from 1556 [2].


    In 1585, the Flemish mathematician Simon Stevin published another fundamental
    book entitled “De Thiende”, which means “The Tenth” in English. In this book,
    the decimal system that we use is defined in all its important aspects: the algorithms
    of the four arithmetic operations are presented for decimal representation, and
    a notation corresponding to our decimal point (or comma) is presented, which allows
    the algorithms given for integer numbers to be extended to fractions [3]. This
    notation makes it possible to unify the three different types of numbers of the
    Greeks (arithmoi, meroi, logoi). Meroi are numbers with finite digits after the
    decimal point, or infinite but with a finite period, while logoi have infinite
    and non-periodic digits after the decimal point.


    In the middle of 1700, we had: a decimal system, parentheses, variables, arithmetical
    operations (with the related algorithms for computing them), and an algorithm
    for computing root square, due to Rafael Bombelli, which extended with Stevin
    decimal notation gives infinite non-periodical digits. Any square root of an integer
    number that is not a square (4, 9, 16, 25, . . . ) has an infinite non-periodical
    sequence of digits.


    The symbol for equality was introduced in 1557 by the Welsh mathematician Robert
    Recorde, but equations were an old subject present in ancient mathematics and
    widely considered in Fibonacci’s *Liber Abaci*. In conclusion, the most of Python
    notational apparatus is available, but some important aspects are missing, so
    other crucial steps of our historical journey are needed for its conclusion.


    In 1614, John Napier introduced logarithms [4]. The value $\lg(n)$ is the exponent
    such that $e^{\lg(n)} = n$. However, this is not Napier’s original definition.
    The form was due to Leonard Euler when he discovered that Napier’s logarithms
    corresponded to the exponents of the special number $e$. The number “e” is characterized
    as the limit of the infinite sequence $(1 + \frac{1}{n})^n$ which was introduced
    by Gottfried Wilhelm von Leibniz in the context of infinitesimal analysis. Logarithms
    were a great revolution in computations and in many theoretical advancements extending
    the notion of mathematical function. In 1637 René Descartes introduced coordinates,
    which reduce points to numbers and geometrical relations to algebraic equations.
    Analytical geometry, which in the name links to Viète’s *ars analytica* is an
    epochal passage toward the arithmetization of mathematics.


    Leonard Euler moved a crucial step toward a general notion of function based on
    variables [5]. This notion will be further extended in the following two centuries,
    but for its use in programming, where functions are essential, Euler’s notion
    is completely adequate. A function is individuated by a mathematical expression
    built with numbers, variables, and operations. Just this idea was further elaborated,
    in the context of mathematical logic, by Alonzo Church, around 1920, who introduced
    lambda expressions, essentially, mathematical expressions where the particular
    variables occurring in a given expression are made irrelevant on its definition
    (replacing coherently them with other variables does not change the denoted function).


