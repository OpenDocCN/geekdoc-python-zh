    # 6.2 Diophantine Equations


    In the strict arithmetic context, the term equation means Diophantine equation,
    after the Greek mathematician Diophantus in the II century AD, who investigated
    several types of equations on integers with integers coefficients. This subject
    is one of the most central in arithmetic and probably is the oldest and the youngest
    too, if we consider that, after Diophantus, and the modern number theorists, the
    solvability of Diophantine equations was the tenth problem in the list of the
    23 problems posed by David Hilbert in 1900, at the international mathematical
    conference in Paris. This problem was a leading subject relating arithmetic with
    the new perspective of computability theory at the origin of computer science.


    The question about the Diophantine equation concerns the possibility of deciding
    if a given equation is solvable or not. The problem was solved, in 1971 by Jurij
    Vladimirovič Matijasevič, based on previous results by Julia Robinson, Martin
    Davis, and Hilary Putnam, by answering that it is not solvable. The reader could
    be confused by this way of presenting the result, which seems paradoxical because
    its solution affirms that the problem is without a solution. However, despite
    the negative answer to the problem, the result has very strong positive relevance
    for arithmetic, because the Diophantine equations are equivalent to the characterization
    of computability given by Turing, which we will consider in more detail in the
    next chapter. Any set or function defined using a Turing machine is Diophantine,
    that is, it corresponds with the values that a certain variable assumes in the
    set of the solutions'
