  md: '# Theorem 5.1 (Bombelli’s Algorithm Correctness) *Bombelli’s algorithm is correct,
    that is, if $N$ is the argument taken as input and $q$ is the result and $r$ is
    the remainder, then:*


    $$N - r = q^2$$


    **Proof** The correctness relies on the formula $(a + b)^2 = a^2 + b^2 + 2ab$.
    In fact, at a given step if the partial result is $a$ the digit $b$ is determined
    such that $N - a^2 = b^2 + 2ab$, in fact the right member of this equation can
    be expressed by the product $2ab \times b$, which is exactly the condition used
    by the algorithm for finding digit $b$. $\square$


    Bombelli’s algorithm can be easily extended to rational numbers, and when all
    digits are lowered and we want to go to search for digits after decimal dot, it
    is enough, instead of lowering digits, to add pairs of zeros. The following is
    the value of $\sqrt{2}$ found with the extension of Bombelli’s algorithm shown
    in Table 5.4, with 300 decimal digits after the decimal dot.


    1.4142135623730950488016887242096980785696718753769480731766797379907

