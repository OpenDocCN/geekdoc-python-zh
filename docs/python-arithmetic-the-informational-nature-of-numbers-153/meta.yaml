  md: '# 5.4 Square Root Algorithm and π


    In the work “Dimensio circuli” (Latin title for “The Size of Circle”), Archimedes
    gives an approximate evaluation of π, the ratio between the circle and its diameter.
    The method of Archimedes is geometric. He starts by inscribing a regular hexagon
    in the circle of radius 1, then a method is given for halving the edge of a hexagon
    by obtaining a polygon of 12, and then 24, and so on, according to the rule of
    polygons with 6 × 2ⁿ edges. In this way the perimeter approaches the value of
    the circle, whence its ratio with the diameter approaches π. The same method is
    applied to a hexagon that is circumscribed to the circle. Along this way, Archimedes
    establishes the famous inequality 3 + 10/71 < π < 3 + 1/7. If we translate the
    geometrical arguments of Archimedes in modern algebraic language the method of
    halving the hexagon edge gives the following recurrent equation. Some important
    facts deserve attention. First, the crucial role of the square root in Archimedes’
    method appears; secondly, the importance of the number 6 in the circle partition
    is evident. When two radii form an angle of 60 degrees, the cord of the associated
    arc is equal to the radius, because the triangle, having as edges two radii and
    the relative cord, has 3 angles of 60 degrees; Third, the following rule gives
    the cord of the half angle of the previous one. It is the basis of trigonometry,
    which will be developed many centuries later, by Indian and Arabic mathematicians.
    The sinus of an angle α will coincide with the half of the cord of angle 2α; finally,
    the method of doubling the number of polygon edges is recurrent, and π evaluation
    is an infinite method of approximation [1] (Tables 5.6, 5.7, 5.8 and 5.9).


    An analogous recurrent equation is given for the circumscribed hexagon.


