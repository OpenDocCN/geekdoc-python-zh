    frac{(i + j + 1)(i + j)}{2} + i$$\n\n## 6.4 算术与逻辑\n\n皮亚诺算术 PA 是一个公理系统，一般逻辑概念在此基础上得以表述，它催生了一种新的数学视角，即数学理论本身也成为数学研究的对象。一个形式化的数学理论由以下部分定义：i)\
    \ 一个根据明确语法规则书写的形式化公式语言；ii) 一组表达理论公理的初始公式；iii) 一个有限的演绎规则集，利用这些规则可以从公理出发生成理论的定理。如果一个理论中没有两个定理分别表达一个命题及其否定，则该理论是协调的或一致的。如果所有作为公理逻辑推论的命题也都是该理论的定理，则该理论是完备的。\n\
    \n一阶谓词逻辑 FOL 是表达 PA 的语言 [15, 16]。这种语言由戈特洛布·弗雷格在 19 世纪末的一部基础性著作中设计 [17]。FOL 的基本概念是谓词和个体，谓词在个体上表达关系：$P(a,\
    \ b)$ 是一个原子公式，表示由常量 $a, b$ 指称的两个个体之间存在由 $P$ 指称的关系。通过这种方式，可以表达任意有限个体序列上的属性和关系（属性由只有一个参数的谓词表达）。\n\
    \n$P(a, b)$ 的**否定**：\n\n$\\neg\\mathbf{P(a, b)}$\n\n表示 $P(a, b)$ 的反面，即其不成立。**析取**是一个命题：\n\
    \n$\\mathbf{P(a, b)} \\vee \\mathbf{P(b, a)}$\n\n表示由 $\\vee$ 连接的两个命题中至少有一个为真，而**合取**：\n\
    \n$\\mathbf{P(a, b)} \\wedge \\mathbf{P(b, a)}$\n\n表示由 $\\wedge$ 连接的两个命题都为真。\n\
    \n$\\mathbf{P(a, b)} \\rightarrow \\mathbf{P(b, a)}$\n\n是**蕴含**，读作“如果 P(a, b)，那么\
    \ P(b, a)”，等价于：\n\n$\\neg\\mathbf{P(a, b)} \\vee \\mathbf{P(b, a)}$\n\n最后：\n\n\
    $\\mathbf{P(a, b)} \\leftrightarrow \\mathbf{P(b, a)}$\n\n是逻辑**等价**，等于 $(\\mathbf{P(a,\
    \ b)} \\rightarrow \\mathbf{P(b, a)}) \\wedge (\\mathbf{P(b, a)} \\rightarrow\
    \ \\mathbf{P(a, b)})$。\n\n符号 $\\neg, \\vee, \\wedge, \\rightarrow, \\leftrightarrow$\
    \ 称为**联结词**（否定、析取、合取、蕴含、等价）。符号 $\\forall$ 和 $\\exists$ 称为**量词**（全称量词、存在量词）。\n\n\
    如果我们考虑一个个体变量 $x$（取值范围为个体），那么：\n\n$\\forall x P(x, b)$\n\n断言对于 $x$ 所取的每一个值 $a$，$P(a,\
    \ b)$ 都成立，而\n\n$\\exists x P(x, b)$\n\n断言存在一个 $x$ 的值 $a$，使得 $P(a, b)$ 成立。\n\n\
    基于弗雷格系统的 FOL 逻辑演算被确定为能够以非常接近算术计算的方式推导出 PA 的定理。通过为谓词、个体常量和变量在指定的对象域上赋予含义（我们不深入细节），给出了\
    \ FOL 中给定理论的解释和模型的数学概念。然后，通过断言一个公式 $\\varphi$ 是公式集 $\\Phi$ 的逻辑推论，当且仅当 $\\Phi$\
    \ 中所有公式的任何模型也是 $\\varphi$ 的模型时，给出了逻辑推论的形式化定义。\n\n1930 年，库尔特·哥德尔证明了 FOL 是完备的，其意义在于，所有作为\
    \ FOL 中给定公理的逻辑推论的定理都是定理。FOL 的完备性强烈依赖于 FOL 的一个重要性质，称为紧致性。即，一个 FOL 理论有模型，也就是说其公理在对其符号的某种解释下为真，当且仅当其所有有限公理子集都有模型（不一定所有子集共享同一个模型）。\n\
    \n然而，1931 年哥德尔证明了皮亚诺算术 PA 的不完全性，因为存在一些真实的算术命题无法作为 PA 的定理被推导出来 [17]。这意味着 PA 并未完全表达算术。这种不完全性的薄弱环节在于归纳原理，它需要强大的逻辑才能被完全形式化地表达。\n\
    \n尽管 PA 是不完全的，但托拉尔夫·斯科伦在 1920 年发现了 FOL 与算术之间非常强的联系（尽管勒文海姆和塔斯基已经获得了部分结果）。任何一致的\
    \ FOL 理论都有一个模型。这个结果源于 FOL 模型的数学定义。斯科伦在假设 FOL 的谓词、个体常量和变量具有有限或可数符号的前提下，证明了以下定理。\n\
    \n> **定理 6.6**（斯科伦定理）*如果一个 FOL 理论有一个模型，那么它有一个算术模型，即一个个体是自然数且谓词被解释为数上关系的模型。*\n\n\
    斯科伦定理具有深刻的算术意义，并提出了许多在逻辑的许多应用中非常重要的问题。其中之一是所谓的斯科伦悖论 [16]。让我们考虑一个实数的 FOL 理论，它描述了实数上的运算性质、它们的序关系以及连续性（一个有序连续域的公理）。不深入这些公理的细节，根据斯科伦定理，这些公理有一个算术模型。这似乎很荒谬，因为我们知道实数集无法与自然数建立一一对应关系。但这一现象为我们概念的数学意义投射了新的光芒，例如，它使得将实数扩展为超实数成为可能，超实数通过引入无穷大和无穷小数扩展了实数。\n\
    \n这次对逻辑的快速探索当然过于浓缩，无法完全理解其全部含义，但旨在勾勒出其表达能力以及"
