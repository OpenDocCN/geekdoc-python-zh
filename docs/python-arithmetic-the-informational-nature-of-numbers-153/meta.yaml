  md: 'A periodical counting algorithm is **monotone** if its numerals that are not
    digits can be represented by two parts: (i) a final digit $x$, and (ii) an order
    component $\alpha$, which is a smaller numeral denoting the number of orders before
    the given numeral, which we write $(\alpha, x)$.


    The counting algorithms given by Python programs are all monotone periodical counting
    (apart from skip lexicographic counting). In all of them, the structure of succ
    function is based on the two parts of numerals. If a digit is not the last of
    the alphabet, then succ replaces it with the following digit, if it is the last,
    then it is replaced with the first one, and succ is applied to the order part
    of the numeral because in the counting a new order was completed.


    The following theorem is an easy consequence of the structure of numerals in monotone
    periodical counting. It is enough to consider that double brackets give the number
    associated with the numeral they enclose, and if $p$ is the number of digits,
    then any order contains $p$ numerals. Therefore the following theorem holds.


    **Theorem 3.1** *(Periodical Counting Theorem)* Given a periodical monotone counting
    algorithm over $p$ digits, the following equation holds:


    $[[\alpha x]] = [[\alpha]]p + [[x]].$ (3.1)


    If we apply iteratively the recurrent equation of the theorem above, we get the
    following classical formula of Base Representation of a positional system of base
    $b$, where $[[d]]_\alpha$ is the value $[[d]] \times b^i$ of digit $d$ in the
    numeral $\alpha$ ($i$ is the number of digits of $\alpha$ at the right of $d$).


    $[[\alpha]] = \sum_{d \in \alpha} [[d_\alpha]]$


    or, more explicitly, if $\alpha = d_n d_{n-1} \dots d_0$:


    $[[\alpha]] = \sum_{i=0}^{n} [[d_i]] \times b^i.$


