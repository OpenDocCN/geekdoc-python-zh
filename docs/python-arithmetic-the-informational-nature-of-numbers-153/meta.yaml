- md: "## 7.2 Post Systems\n\nA Post system is essentially a set of theorems. These\
    \ theorems are consequences of some initial assertions, called axioms. Euclid's\
    \ geometry and Peano's arithmetic are famous examples of axiomatic theories. Theorems\
    \ are obtained from the axioms by applying deductive rules, based on certain mechanisms\
    \ of logical inference. In a sense, we can recognize in the schema of an axiomatic\
    \ theory the basic schema of counting algorithms, where zero corresponds to the\
    \ set of axioms and the successor function corresponds to the deductive rules\
    \ applied to enlarge the set of theorems obtained at a given step (axioms are\
    \ the theorems at step 0).\n\nA Post system, on a given alphabet of symbols, is\
    \ given by an initial set $L_0$ of strings over the alphabet, and a finite set\
    \ of inference rules generating a language $L \\supset L_0$. Any rule has some\
    \ patterns called premises of the rule, and one conclusion. Premises and the conclusion\
    \ are strings over the alphabet of the system and over some variables ranging\
    \ on the strings of the alphabet, where the variables of the conclusion have to\
    \ occur in some premise. These rules generate strings of $L$ in the following\
    \ manner. Values are assigned to the variables of premises, and if the resulting\
    \ strings are in $L$, the string obtained by the conclusion, when its variables\
    \ have the same values as the premises, is generated in $L$.\n\nFor example, the\
    \ Post system of alphabet $\\{a, b, c\\}$ with only one axiom $abc$ and the following\
    \ rule (premises as numerator and conclusion as the denominator) with variables\
    \ $x, y$:\n\n$$\\frac{xby}{axbbyc}$$\n\ngenerates the set of strings having the\
    \ form $a^n b^n c^n$, with $n \\in \\mathbb{N}$ ($s^n$ means $n$ concatenated\
    \ occurrences of symbol $s$).\n\nPost systems are equivalent to Turing machines\
    \ because the following theorem holds.\n\n**Theorem 7.2** (Post-Turing Equivalence)\
    \ *A set is recursively enumerable if and only if it is generated by a Post system.*\n\
    \nThe proof of this theorem easily follows by translating the instructions of\
    \ a Turing machine program into rules of Post that transform the content of the\
    \ tape (a right movement instruction $qabq'R$ becomes $xqay/xbqy$).\n\nIt is worthwhile\
    \ to remark that Chomsky's grammar, later introduced by Noam Chomsky, is a particular\
    \ case of Post systems, which played an essential role in formal languages [4]\
    \ and the syntax of programming languages.\n\nTable 7.2 shows a Python program\
    \ generating the language of the Post system given above.\n\n**Table 7.2** A Python\
    \ program generating $a^n b^n c^n$ language\n\n```python\ndef post(steps):\n \
    \   language = [\"abc\"]\n    for i in range(steps):\n        xxx = language[-1]\n\
    \        j = xxx.index(\"b\")\n        yyy = \"a\"+xxx[:j]+\"b\"+xxx[j:]+\"c\"\
    \n        language.append(yyy)\n        print(yyy)\nn = int(input(\"Steps: \"\
    ))\npost(n)\n```\n\n## 7.3 Python Iterators\n\nAt the beginning of our discourse,\
    \ we presented the counting algorithms based on number representation systems.\
    \ Now, in conclusion, we find the same concept in the notion of a formal system\
    \ and language generation. The general computation mechanism behind this common\
    \ and general schema at the origin of numbers is represented in Python by the\
    \ concept of iterator. It is an object assuming an initial state and evolving\
    \ through a function that transforms the current state into the next. Table 7.3\
    \ expresses in terms of iterators the counting algorithm of Archimedes given in\
    \ Chap. 2. We do not enter the details of the single statements of the program,\
    \ which are relative to the specific mechanisms of realization and description\
    \ of Python class and object definition, but it is clear that the program expresses\
    \ the general schema of iteration, which can be applied to any structure (in the\
    \ specific case they are lists). In the case of deductive systems, from an initial\
    \ set of axioms theorems are generated at each iteration; in the case of a formal\
    \ language, starting from initial phrases, new expressions are generated. The\
    \ same mental image of a wheel running, and producing new structures from preceding\
    \ ones, remains the invariant of this universal schema common to any generative\
    \ process.\n\n**Table 7.3** A Python iterator for Archimedes' counting algorithm\n\
    \n```python\ndef succ(n):\n    if n == []:\n        return 1\n    for i in range(9):\n\
    \        if n == i:\n            return i+1\n    if n == 9:\n        return [1]\n\
    \    if len(n) > 1 and n[1] < 9:\n        n[1] = n[1]+1\n        return n\n  \
    \  if len(n) > 1 and n[1] == 9:\n        n[0] = [succ(n[0][0])]\n        return\
    \ n[0]\n    if not n in range(10) and len(n) == 1:\n        n = [n, 1]\n     \
    \   return n\n```\n\n```python\nclass ArchimedesIterator:\n    def __iter__(self):\n\
    \        self.current = []\n        return self\n    def __next__(self):\n   \
    \     self.current = succ(self.current)\n```\n\n```python\niterator = ArchimedesIterator()\n\
    iterator = iter(iterator)\nfor c in range(100):\n    x = next(iterator)\n    print(x,\
    \ end=' ')\nprint()\n```\n\n## 7.4 Arithmetic, Computability and Logic\n\nIn the\
    \ last section of the previous Chapter, we outlined the link between arithmetic\
    \ and logic. Here we will try to explain that in the relationship between numbers\
    \ and formulae (expressing propositions), the essence of computations appears\
    \ in its full generality. Any representation system involves two kinds of entities:\
    \ the objects on which the system is intended to speak and the propositions asserting\
    \ the relationships held among the represented objects. This intrinsic duality\
    \ of any representation that is informally concerned with things and facts about\
    \ them implies a sort of mirror effect between two levels of reality. In other\
    \ words, information can be elaborated at two different but related levels, that\
    \ of objects and that of propositions on objects, which are objects too. This\
    \ duality is the same between the deductive systems of logic and the formal systems\
    \ elaborating formulae as pure symbolic forms disregarding during the computation\
    \ the intended meanings and focusing exclusively on their symbolic structure.\
    \ Namely, this was the perspective behind the definition of computation models\
    \ such as the Turing machine.\n\nA basic phenomenon of any computation model is\
    \ that computable functions defined through it need to be partial functions. The\
    \ informal argument that shows it is a transposition of Cantor's argument about\
    \ the impossibility of having a 1-to-1 correspondence between natural numbers\
    \ and real numbers (represented by infinite sequences of digits). Namely, assume\
    \ that computable functions are functions everywhere defined. They are enumerable\
    \ because they are expressed by programs, that are strings and can be enumerated.\
    \ Let $f_i$ be the function having order $i$ and $ord(x)$ the order of string\
    \ $x$, while $succ(x)$ is the successor of string $x$. Then, let us consider the\
    \ (diagonal) function $D$ such that\n\n$$D(x) = succ(f_{ord(x)}(x))$$\n\nthe function\
    \ $D$, by definition, is different from any function $f_i$ on the argument $x$\
    \ such that $ord(x) = i$ (having the same order as the function $f_i$). The term\
    \ “diagonal” comes from the arrangement, on infinite rows, of the images of functions\
    \ (in the order of the arguments). Namely, $D$ is an alteration of the diagonal\
    \ of this planar arrangement. Of course, $D$ is a computable function because\
    \ constructed through computable functions, but differs from any function of the\
    \ list. In other words, a computable function is missing in any list of computable\
    \ functions when all of them are total functions. This proves the following theorem.\n\
    \n**Theorem 7.3** (Partial Computability) *If a class of computable functions\
    \ includes any computable function (is complete), then it has to include also\
    \ partial functions.*\n\nThe partiality asserted by the above theorem is intrinsic,\
    \ that is, in general, we cannot establish when a function is defined or not on\
    \ a given argument. Namely, if we could do it, any function would be easily transformed\
    \ into a total one. This means that partiality is undecidable, and partiality\
    \ is the true origin of the undecidability in computability.\n\nTo summarize,\
    \ a comprehensive definition of computable functions must encompass partial functions\
    \ that lack defined values without any possibility of determining, in a computable\
    \ general way, whether on a given argument a given function will provide a definite\
    \ result. This is what Turing discovered in his famous paper in 1936, the undecidability\
    \ of “Halting Problem” for Turing machines, providing the ultimate reason for\
    \ Gödel incompleteness of Peano arithmetic.\n\nTherefore, the general notion of\
    \ computability gives a deep understanding of the limitations of logical formal\
    \ systems in describing theories rich enough to express arithmetic.\n\nAs it was\
    \ already noticed, the argument of the proof of the Partial Computability theorem\
    \ is very general. It is essentially the same as the proof of the impossibility\
    \ of a 1-to-1 correspondence between a set and its power set (Cantor), and occurs\
    \ in many contexts of logic (Russel’s paradox), arithmetic (Gödel’s theorem),\
    \ and computability. At the basis of the diagonal argument, there is a mechanism\
    \ of reflexivity, that is, the possibility of having objects and their representation\
    \ at the same level. When self-representation is possible, then an incompleteness\
    \ has to be paid for escaping from the contradiction, and this phenomenon is common\
    \ to logical self-reference, arithmetic encoding, and recursive schemata of computation.\
    \ Maybe, it belongs to more general situations involving life, mind, and consciousness."
  mdcn: "## 7.2 Post 系统\n\nPost 系统本质上是一组定理。这些定理是某些初始断言（称为公理）的推论。欧几里得几何和皮亚诺算术是公理化理论的著名例子。定理是通过应用演绎规则从公理中获得的，这些规则基于特定的逻辑推理机制。从某种意义上说，我们可以在公理化理论的模式中识别出计数算法的基本模式，其中零对应于公理集，后继函数对应于应用于扩大在给定步骤获得的定理集的演绎规则（公理是第\
    \ 0 步的定理）。\n\n在给定的符号字母表上，Post 系统由字母表上的字符串的初始集 $L_0$ 和一个有限的推理规则集给出，这些规则生成一个语言 $L\
    \ \\supset L_0$。任何规则都有一些模式，称为规则的前提，以及一个结论。前提和结论是系统字母表上的字符串，以及一些在字母表字符串上取值的变量，其中结论的变量必须出现在某个前提中。这些规则以以下方式生成\
    \ $L$ 中的字符串。为前提的变量赋值，如果生成的字符串在 $L$ 中，则当结论的变量与前提具有相同的值时，通过结论获得的字符串就在 $L$ 中生成。\n\
    \n例如，字母表为 $\\{a, b, c\\}$ 的 Post 系统，只有一个公理 $abc$ 和以下规则（前提作为分子，结论作为分母），变量为 $x,\
    \ y$：\n\n$$\\frac{xby}{axbbyc}$$\n\n生成具有形式 $a^n b^n c^n$ 的字符串集，其中 $n \\in \\mathbb{N}$（$s^n$\
    \ 表示符号 $s$ 的 $n$ 次连接出现）。\n\nPost 系统等价于图灵机，因为以下定理成立。\n\n**定理 7.2**（Post-图灵等价性）*一个集合是递归可枚举的，当且仅当它由一个\
    \ Post 系统生成。*\n\n该定理的证明很容易通过将图灵机程序的指令翻译成 Post 规则来完成，这些规则转换磁带的内容（一个向右移动指令 $qabq'R$\
    \ 变成 $xqay/xbqy$）。\n\n值得注意的是，诺姆·乔姆斯基后来引入的乔姆斯基文法是 Post 系统的一个特例，它在形式语言 [4] 和编程语言的语法中发挥了重要作用。\n\
    \n表 7.2 显示了一个生成上述 Post 系统语言的 Python 程序。\n\n**表 7.2** 生成 $a^n b^n c^n$ 语言的 Python\
    \ 程序\n\n```python\ndef post(steps):\n    language = [\"abc\"]\n    for i in range(steps):\n\
    \        xxx = language[-1]\n        j = xxx.index(\"b\")\n        yyy = \"a\"\
    +xxx[:j]+\"b\"+xxx[j:]+\"c\"\n        language.append(yyy)\n        print(yyy)\n\
    n = int(input(\"Steps: \"))\npost(n)\n```\n\n## 7.3 Python 迭代器\n\n在我们论述的开始，我们介绍了基于数字表示系统的计数算法。现在，作为结论，我们在形式系统和语言生成的概念中发现了相同的概念。这个共同且通用的模式背后的通用计算机制，在\
    \ Python 中由迭代器的概念表示。它是一个对象，假设一个初始状态，并通过一个将当前状态转换为下一个状态的函数进行演化。表 7.3 以迭代器的形式表达了第\
    \ 2 章中给出的阿基米德计数算法。我们不深入程序的单个语句的细节，这些细节与 Python 类和对象定义的具体实现和描述机制有关，但很明显，该程序表达了迭代的通用模式，该模式可以应用于任何结构（在特定情况下是列表）。在演绎系统的情况下，从初始公理集开始，每次迭代都会生成定理；在形式语言的情况下，从初始短语开始，生成新的表达式。一个轮子转动并从先前的结构产生新结构的相同心理图像，仍然是这个适用于任何生成过程的通用模式的不变性。\n\
    \n**表 7.3** 阿基米德计数算法的 Python 迭代器\n\n```python\ndef succ(n):\n    if n == []:\n\
    \        return 1\n    for i in range(9):\n        if n == i:\n            return\
    \ i+1\n    if n == 9:\n        return [1]\n    if len(n) > 1 and n[1] < 9:\n \
    \       n[1] = n[1]+1\n        return n\n    if len(n) > 1 and n[1] == 9:\n  \
    \      n[0] = [succ(n[0][0])]\n        return n[0]\n    if not n in range(10)\
    \ and len(n) == 1:\n        n = [n, 1]\n        return n\n```\n\n```python\nclass\
    \ ArchimedesIterator:\n    def __iter__(self):\n        self.current = []\n  \
    \      return self\n    def __next__(self):\n        self.current = succ(self.current)\n\
    ```\n\n```python\niterator = ArchimedesIterator()\niterator = iter(iterator)\n\
    for c in range(100):\n    x = next(iterator)\n    print(x, end=' ')\nprint()\n\
    ```\n\n## 7.4 算术、可计算性与逻辑\n\n在上一章的最后一节，我们概述了算术与逻辑之间的联系。在这里，我们将试图解释，在数字与公式（表达命题）之间的关系中，计算的本质以其完全的普遍性出现。任何表示系统都涉及两种实体：系统旨在谈论的对象，以及断言所表示对象之间关系的命题。这种任何表示的内在二元性，非正式地涉及事物及其事实，意味着两个现实层次之间的一种镜像效应。换句话说，信息可以在两个不同但相关的层次上进行阐述，即对象层次和关于对象的命题层次，而这些命题本身也是对象。这种二元性与逻辑的演绎系统和形式系统之间是相同的，后者将公式作为纯粹的符号形式进行阐述，在计算过程中忽略预期的含义，完全专注于它们的符号结构。也就是说，这正是图灵机等计算模型定义背后的视角。\n\
    \n任何计算模型的一个基本现象是，通过它定义的可计算函数必须是部分函数。证明这一点的非正式论证是康托尔关于自然数与实数（由无限数字序列表示）之间不可能存在一一对应关系的论证的转置。也就是说，假设可计算函数是处处定义的函数。它们是可枚举的，因为它们由程序表达，而程序是字符串，可以被枚举。设\
    \ $f_i$ 是第 $i$ 个函数，$ord(x)$ 是字符串 $x$ 的序号，而 $succ(x)$ 是字符串 $x$ 的后继。然后，让我们考虑（对角线）函数\
    \ $D$，使得\n\n$$D(x) = succ(f_{ord(x)}(x))$$\n\n根据定义，函数 $D$ 在参数 $x$ 上与任何函数 $f_i$\
    \ 不同，其中 $ord(x) = i$（与函数 $f_i$ 具有相同的序号）。术语“对角线”来自于函数图像（按参数顺序）在无限行上的排列。也就是说，$D$\
    \ 是这个平面排列的对角线的改变。当然，$D$ 是一个可计算函数，因为它是通过可计算函数构造的，但与列表中的任何函数都不同。换句话说，当所有可计算函数都是全函数时，任何可计算函数列表中都缺少一个可计算函数。这证明了以下定理。\n\
    \n**定理 7.3**（部分可计算性）*如果一个可计算函数类包含任何可计算函数（是完备的），那么它也必须包含部分函数。*\n\n上述定理所断言的部分性是内在的，也就是说，通常我们无法确定一个函数在给定参数上是否定义。也就是说，如果我们能做到这一点，任何函数都可以很容易地转换为全函数。这意味着部分性是不可判定的，而部分性是可计算性中不可判定性的真正起源。\n\
    \n总之，可计算函数的综合定义必须包含部分函数，这些函数缺乏定义值，无法以可计算的通用方式确定在给定参数上给定函数是否会提供确定的结果。这正是图灵在他 1936\
    \ 年的著名论文中发现的，图灵机的“停机问题”的不可判定性，为皮亚诺算术的哥德尔不完备性提供了最终原因。\n\n因此，可计算性的一般概念深刻理解了逻辑形式系统在描述足够丰富以表达算术的理论方面的局限性。\n\
    \n正如已经注意到的，部分可计算性定理的证明论证非常普遍。它本质上与证明集合与其幂集之间不可能存在一一对应关系（康托尔）相同，并且出现在逻辑（罗素悖论）、算术（哥德尔定理）和可计算性的许多背景中。在对角线论证的基础中，存在一种反身性机制，即在同一层次上拥有对象及其表示的可能性。当自我表示成为可能时，那么为了逃避矛盾，就必须付出不完备性的代价，而这种现象在逻辑自指、算术编码和计算的递归模式中是共同的。也许，它属于涉及生命、心灵和意识的更普遍情况。"
