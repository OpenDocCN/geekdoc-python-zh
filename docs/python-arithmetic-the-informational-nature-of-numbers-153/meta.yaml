    # Chapter 7

    Symbolic Computation


    Key statement


    > Numbers are the basis of computations, but computations are realized through
    numerals, which are symbolic structures. Computing with symbolic structures without
    any arithmetical interpretation is the topic of computability. Python programs
    for these systems are given in this chapter.


    # 7.1 Turing Machines


    Turing Machine is a symbolic computation model defined by Alan Mathison Turing
    in a famous paper of 1936 that was the origin of the theory of computability.
    The initial intention of Turing was to define computable real numbers, that is
    sequences of decimal digits that are infinite, but generated by a finite number
    of rules manipulating symbols. In the same paper Turing shows many crucial aspects
    of any class of computable functions that is complete, that is, including any
    possible computable function (over a given set of symbols). Turing’s model became
    the main reference for any other computation model, for its simplicity and for
    its natural universality, that is, the capability of expressing the other computation
    models that in the same years were defined in many different contexts of mathematical
    logic (Recursive functions, Lambda calculus, Diophantine polynomials, Post Systems,
    Combinatory Logic, Register machines, Markov Algorithms, ...) [1–4]. The same
    year of the publication of Turing’s paper, Alonzo Church, in a paper showing the
    equivalence between Turing machines and Lambda calculus, proposed a thesis, called
    Turing-Church thesis, expressing the universality of the Turing model, which can
    be synthetically expressed by the following statement.


    Thesis 7.1 (Turing-Church) Any computable function is Turing computable.'
  - '[PAGE 101]


    Of course, a function $f$ is Turing computable, if there exists a Turing machine
    that starting with a representation of an input $x$ (in the domain of the function)
    provides, after a finite number of steps, the representation of $f(x)$ as output.


    The main results of Turing''s paper are the following.


    +   (1) Turing computable functions include necessarily partial functions, that
    is, functions that, for some values, do not provide any result.

    (2) Turing machines can be represented by the strings of their programs (see later
    on). There exists a Turing machine generating the programs of all Turing machines.

    (3) No Turing machine can establish, in a finite number of steps, if a given Turing
    computable function provides a result in correspondence to a given argument.

    (4) A set generated by a Turing machine is said to be recursively enumerable.
    A set $A$ is recursive if its (always definite) characteristic function ($f_A(x)
    = 1$, if $x \in A$, $f_A(x) = 0$ if $x \notin A$) is Turing computable. There
    exist recursively enumerable sets that are not recursive. Moreover, a function
    is Turing computable if and only if its graphic is a recursively enumerable set
    (the graphic is the set of pairs $(x, f(x))$ with $x$ ranging in the domain of
    $f$).


    The last result is an "undecidability" result. It can be shown that Turing''s
    undecidability can completely explain the limitation results discovered by Kurt
    Gödel about arithmetic.


    A Turing machine is defined by a tape of cells on which the input is put that
    is transformed during the computation. Symbols put on the tape belong to a finite
    alphabet including a symbol $B$ called the blank symbol that is present in any
    cell where no other symbol of the alphabet is present. The input is assumed on
    contiguous cells of a finite portion of the tape (one symbol per cell), outside
    of which no symbol different from the blank can occur. Hence, a finite portion
    of the tape is always between two extreme symbols different from the blank. If
    no symbol different from a blank occurs on the tape, then the tape is empty, or
    equivalently the empty string is on the tape.


    A Turing machine is, at any time, in an internal state belonging to a finite set
    of states and is reading the symbol put in one cell of the tape. At the beginning
    of any computation, the machine is in its initial state and is reading the leftmost
    cell of the tape where is present a symbol different from the blank.


    The program of a Turing machine is a list of instructions. Any instruction is
    a quintuple $qabq''Y$ telling that if the machine is in the state $q$ reading
    the symbol $a$, then the symbol $a$ is replaced by $b$, the state $q''$ is assumed
    and the move $Y$ is realized, where $Y$ can be either $R$ or $L$, meaning that
    the machine moves to read the cell to the Right or the Left, respectively, to
    the cell where it was reading before to execute the instruction. When the machine
    is in the state $q$ reading a symbol $a$, but no instruction starts with $qa$,
    then no instruction of the program is applicable and the machine halts the computation.
    In this case, the output is given by the content of the tape when the machine
    halts.


