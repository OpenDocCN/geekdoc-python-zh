  md: 'In all chapters, a historical perspective is always taken, as this is an essential
    way to recognize the deeper reasons for the development of ideas and their inner
    logic [5–8]. The lack of this perspective often leads to a superficiality that
    prevents a true understanding of cultural phenomena. For example, machine learning
    seems to be a recent panacea and novelty in information technology. However, a
    closer analysis reveals that its essence is strongly linked to the same spirit
    of Gauss and Legendre’s least-minimum-square method (and optimization methods
    in general). This means that great ideas often recur in new forms that realize
    general principles in different contexts. Restoring these connections enables
    us to grasp the essence of things and thus gain a deep understanding of their
    functions and possibilities.


    Basic mathematical concepts are assumed. However, we will revisit them in the
    following chapters as they arise in the course of our discussions.


