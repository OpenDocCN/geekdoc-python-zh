    Leonard Euler moved a crucial step toward a general notion of function based on
    variables [5]. This notion will be further extended in the following two centuries,
    but for its use in programming, where functions are essential, Euler’s notion
    is completely adequate. A function is individuated by a mathematical expression
    built with numbers, variables, and operations. Just this idea was further elaborated,
    in the context of mathematical logic, by Alonzo Church, around 1920, who introduced
    lambda expressions, essentially, mathematical expressions where the particular
    variables occurring in a given expression are made irrelevant on its definition
    (replacing coherently them with other variables does not change the denoted function).


    An important aspect of the functional notation introduced by Euler is the “application”.
    A function $f$ applies to arguments and produces a result, therefore $f(a)$ is
    the result of $f$ when it is applied to $a$ as argument. In this case, parentheses
    enclose the argument, and the symbol of function is put on the left of the open
    parenthesis. This was a new way of using parentheses, concerning their preceding
    use in aggregating symbols by defining the order of application of operations.
    Application and Aggregation are the two ways of using parentheses in Python. As
