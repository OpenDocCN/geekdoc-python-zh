    Now, let us express the general aspect of a counting algorithm. In the following
    chapters, we will see that the same principles hold in other systems, and recognizing
    these general principles in other counting algorithms, will help to understand
    the essence of numerals and numbers too.


    A counting algorithm generates one after one, a numeral for each number. What
    is essential is not the form of numerals, but three crucial properties:


    +   (1) Creativity: Any numeral has to be distinct from the numerals generated
    before it.

    (2) Infinity: Any numeral has always a numeral following it;

    (3) Recurrence: after the numerals coinciding with digits, in the following numerals
    digits always periodically recur and only digits occur.


    Any system of expressions with the three properties above is adequate for representing
    numbers. Two numerals of different counting algorithms that occur at the same
    step of generation of the relative counting processes are equivalent because they
    represent the same number.


    A definition of a number is the following.

    The number represented by a given numeral is the set of numbers represented by
    the numerals preceding the given numeral.


    Again we find in this definition a recurrence, where something is defined by itself.
    This could seem to be tautological, but it is not the case.


    This definition corresponds to two characterizations of numbers due to John von
    Neumann and Giuseppe Peano, respectively.


    According to von Neumann, a number coincides with the set of numbers less than
    it. In this way, the notion of zero naturally arises because, before the first
    number, of course, no numbers exist. Therefore, the empty set coincides with 0,
    the set having zero as the only element is 1, and the set having zero and 1 as
    elements is 2.


    0 = ∅'
