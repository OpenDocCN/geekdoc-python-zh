  - '[PAGE 6]


    # Preface


    The book wants to introduce the programming language Python starting from the
    most familiar algorithms of elementary arithmetic by putting in evidence, at the
    same time, some deep aspects of numbers, which are present just at the beginning
    of their learning, as the counting process on which the whole arithmetic is based
    on. For example, simple Python programs reveal that a counting process directly
    related to a number system elaborated by Archimedes of Syracuse is strictly related
    to our decimal system and the notion of zero.


    The link between Python and Arithmetic is related to the Arithmetization of mathematics,
    a long process going from Leonardo Fibonacci’s introduction in Europe of decimal
    representation, up to the mathematical logic, from which computability theory
    emerged. Python is a synthesis of the mathematical notation developed along this
    process. This is the reason for its natural adequacy in expressing basic arithmetic
    algorithms. The notion of function on which Python is based is essentially due
    to Leonard Euler and then formalized by Alonzo Church in 1930 years.


    In conclusion, “Python Arithmetic”, is a reflection on the deep connection between
    programming, arithmetic and logic.


    The book provides concrete examples, suggesting the importance of mathematical
    tradition for a deep understanding of the main ideas underlying the most modern
    information technology.


    Verona, Italy


    Vincenzo Manca


    **Acknowledgments** I express my gratitude to the students and colleagues at the
    Department of Computer Science of the University of Verona, from 2002 to 2019.'
