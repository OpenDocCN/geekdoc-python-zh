    In 1930 Kurt Gödel proved that FOL is complete, in the sense that all the theorems
    that are logical consequences of axioms given in FOL are theorems. FOL Completeness
    is strongly based on the important property of FOL, known as compactness. Namely,
    a FOL theory has a model, that is its axioms are true under an interpretation
    of its symbols, if and only if all finite subsets of axioms have a model (not
    necessarily the same model for all the subsets).


    Nevertheless, in 1931 Gödel proved the incompleteness of Peano Arithmetic PA because
    there are true arithmetic propositions that cannot be deduced as theorems of PA
