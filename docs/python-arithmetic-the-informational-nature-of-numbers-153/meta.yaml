  mdcn: "## 5.4 平方根算法与圆周率π\n\n在著作《圆的度量》（拉丁文标题为“Dimensio circuli”）中，阿基米德给出了圆周率π（圆与其直径之比）的近似值。阿基米德的方法是几何的。他首先在半径为1的圆内接一个正六边形，然后给出了一种将六边形边长减半的方法，从而得到12边形，接着是24边形，依此类推，遵循边数为6\
    \ × 2ⁿ的多边形规则。这样，多边形的周长逐渐逼近圆的周长，其与直径的比值也就逼近π。同样的方法也应用于外切于圆的六边形。沿着这条思路，阿基米德建立了著名的不等式：3\
    \ + 10/71 < π < 3 + 1/7。如果我们将阿基米德的几何论证转化为现代代数语言，那么减半六边形边长的方法会给出以下递推方程。有几个重要事实值得注意。首先，平方根在阿基米德方法中的关键作用显现出来；其次，数字6在圆分割中的重要性显而易见。当两条半径形成60度角时，对应弧的弦长等于半径，因为由两条半径和相应弦构成的三角形有三个60度角；第三，以下规则给出了前一个角的一半的弦长。这是三角学的基础，而三角学将在许多世纪后由印度和阿拉伯数学家发展起来。一个角α的正弦值将等于角2α弦长的一半；最后，增加多边形边数的方法是递推的，而π的计算是一种无限逼近方法[1]（表5.6、5.7、5.8和5.9）。\n\
    \n对于外切六边形，给出了类似的递推方程。\n\n## 5.5 平方根与对数\n\n笛卡尔坐标、纳皮尔对数、牛顿和莱布尼茨的无穷小量是17世纪的三大数学革命。所有这些关键概念都与算术概念相关。笛卡尔平面基于两条直线——x轴和y轴，它们有一个公共点（平面的原点），以及一个单位线段，在两条轴上给出两个无限的整数值序列，在整数端点之间的区间内包含有理数和无理数点（正负号取决于赋予轴的方向）。\n\
    \n纳皮尔对数通过两个数列获得：一个覆盖给定线段的等差数列，以及一个公比非常接近1的等比数列，使得两个数列能够以良好的近似度同步，其优势在于等差数列上数字的乘法对应于等比数列相应元素的加法。\n\
    \n无穷小量是由自然数索引的无限数列，随着索引值的增加，数列中数字的绝对值减小并趋近于零。当通常的算术运算扩展到这些数列时，它们可以被视为数字。为了正确扩展，必须有一个重要的警告。一个定义在无限数列元素上的性质，如果存在一个索引$n_0$，使得对于所有索引大于$n_0$的元素该性质始终成立，那么该性质在该数列上就是确定的。因此，无穷小量要么确定地等于零，要么确定地不等于零。这个条件确保了“零积”规则，即两个数的乘积为零当且仅当其中一个因子为零。事实上，这样，如果零由任何确定为零的数列来表示，那么之前的零积规则就可以安全地扩展到无穷小量。\n\
    \n纳皮尔于1614年引入了对数，也在1619年由与纳皮尔合作的亨利·布里格斯编辑出版的一部遗作中再次引入。1624年，布里格斯出版了《对数算术》一书，其中给出了第一张以10为底的十进制对数表，精确到小数点后第14位。他用于获得对数表的第一种方法是重复开平方法。布里格斯的想法如下。考虑一个数$x$。然后我们考虑$\\\
    sqrt{10}$，接着是$\\sqrt{\\sqrt{10}}$，依此类推，得到一个非常接近1的数。通过这种方法，他发现经过54步后，$\\log_{10}(1.000000000000001)\
    \ = 0.00000, 00000, 00000, 04342, 94481, 90325$。接近1的数的对数可以通过乘以$\\log_{10}(1.000000000000001)$来获得。然后，通过对给定数$x$应用重复开平方，可以得到一个合适的数的以10为底的对数。\n\
    \n表5.5 一个根据牛顿法计算平方根的Python程序\n\n```python\ndef square(k):\n    for i in range(10):\n\
    \        if i**2 < k and (i+1)**2 >= k:\n            return i\n\ndef int_root_square(n):\n\
    \    m = str(n)\n    if len(m)%2 == 0:\n        pairs = []\n    if len(m)%2 ==\
    \ 1:\n        pairs = [int(m[0])]\n        m = m[1:]\n    ll = int(len(m)/2)\n\
    \    for i in range(ll):\n        pairs.append(m[:2])\n        m = m[2:]\n   \
    \ roots = []\n    for i in range(len(pairs)):\n        el = square(int(pairs[i]))\n\
    \        roots.append(str(el))\n    root = int(\"\".join(roots))\n    return root\n\
    \ndef newton_root(n, error):\n    q = int_root_square(n)\n    while abs(q**2 -\
    \ n) >= error:\n        m = n/q\n        q = (q+m)/2\n    return q,abs(q**2 -\
    \ n)\nn = int(input(\"Number: \"))\nerror = float(input(\"Error: \"))\nres = newton_root(n,\
    \ error)\nprint(\"Square Root: \", res[0])\nprint(\"Final Error: \", res[1])\n\
    ```\n\n插值法很直接。它与牛顿法的起始方式相同，但通过增加小数位来获得近似值，从而使误差减小。这个想法非常通用，可以通过测试相对于给定方程的误差来应用于近似一大类函数。在平方根的情况下，需要满足的方程是二次方程$x^2\
    \ = N$，其中$N$是我们要找平方根的数，$x$是当前测试误差的值，误差需低于给定阈值。\n\n表5.6 一个通过插值法计算平方根的Python程序\n\
    \n```python\ndef square(k):\n    for i in range(10):\n        if i**2 < k and\
    \ (i+1)**2 >= k:\n            return i\n\ndef int_root_square(n):\n    m = str(n)\n\
    \    if len(m)%2 == 0:\n        pairs = []\n    if len(m)%2 == 1:\n        pairs\
    \ = [int(m[0])]\n        m = m[1:]\n    ll = int(len(m)/2)\n    for i in range(ll):\n\
    \        pairs.append(m[:2])\n        m = m[2:]\n    roots = []\n    for i in\
    \ range(len(pairs)):\n        el = square(int(pairs[i]))\n        roots.append(str(el))\n\
    \    root = int(\"\".join(roots))\n    return root\n\ndef root(n, error):\n  \
    \  rq = float(int_root_square(n))\n    print(rq)\n    d = 1.0\n    while n  >\
    \ rq**2 and  abs(float(n) - rq**2)  >= error:\n        rq = rq + d\n        print(rq)\n\
    \        print(rq**2 - float(n))\n        if rq**2 == n:\n            return rq\n\
    \        if rq**2 > n:\n            rq = rq-d\n            d = d*0.1\n    while\
    \ n  < rq**2 and  abs(float(n) - rq**2)  >= error:\n        rq = rq - d\n    \
    \    print(rq)\n        print(rq**2 - float(n))\n        if rq**2 == n:\n    \
    \        return rq\n        if rq**2 < n:\n            rq = rq+d\n           \
    \ d = d*0.1\n    return rq,float(n) - rq**2\nn = int(input(\"Numero: \"))\nerror\
    \ = float(input(\"Error: \"))\nres = root(n, error)\nprint(\"Square Root: \",\
    \ res[0])\nprint(\"Final Error: \",res[1])\n```\n\n表5.7 阿基米德通过内接多边形计算π的方法\n\n\
    $L_0 := 1$\n\n$L_{n+1} = L_n / \\sqrt{2 + \\sqrt{4 - L_n^2}}$\n\n$\\pi = \\lim_{n\
    \ \\to \\infty} 3 \\times 2^n L_n$\n\n表5.8 阿基米德通过外切多边形计算π的方法\n\n$L_0 = 1$\n\n\
    $L_{n+1} = \\sqrt{3} L_n / (\\sqrt{L_n^2 + 3} + \\sqrt{3})$\n\n$\\pi = \\lim_{n\
    \ \\to \\infty} 3 \\times 2^n L_n$\n\n表5.9 一个根据阿基米德内接多边形法计算$\\pi = 3.1415926535897922$（100步内）的Python程序\n\
    \n```python\ndef archimedes_pi(steps):\n    side = 1\n    for i in range(steps):\n\
    \        side = side / (2 + (4 - (side**2))**.5)**.5\n    ratio = side * 3 * (2**steps)\n\
    \    return ratio\nn = int(input(\"Steps: \"))\nres = archimedes_pi(n)\nprint(res)\n\
    ```"
