  md: '# 6.1 Prime Numbers


    Natural numbers with the sum, and product (difference and division are the inverse
    operations of sum and product, respectively) satisfy the properties of commutativity
    and associativity of both operations plus the distributivity of the product to
    the sum. These properties hold also for rational numbers, real numbers, and complex
    numbers. Therefore, the same basic algebraic framework remains in the extensions
    of natural numbers $\mathbb{N}$ into integers $\mathbb{Z}$, rationals $\mathbb{Q}$,
    reals $\mathbb{R}$, and complex numbers $\mathbb{C}$. For example, why the product
    of two negative integers is positive? This rule is due to the conservation of
    distributive property because it is easy to show that it is the only way to ensure
    that $n - (n + k) * m = -k * m$. Analogously, why numbers cannot be divided by
    0, or why the product of two numbers is zero only if one of the two factors is
    zero? Again, we can show these facts as a consequence of extending correctly the
    algebraic structure outlined above, which in the case of reals or complexes has
    even richer and more complete algebraic coherence (the structure of continuous,
    and complete ordered field, in the case of reals). Natural numbers are linearly
    ordered, that is, any two numbers $n, m$ or $m$ follow $n$ in the generation of
    numbers or vice-versa $n$ follows $m$. The ordering relation is denoted by signs
    $<$, and $>$, where the number at the side of the vertex is the minor one. Symbols
    $\le$ and $\ge$ denote “less than or equal” and “greater than or equal” relations.


    Power and exponential operations are based on the function $x^y$ that can be naturally
    extended to all kinds of numbers. Usually, in powers the value of the exponent
    is fixed and the value of the base is variable, in this case, the inverse operation
    is the root (for any exponent), while an exponential is an operation where the
    basis is fixed and the exponent is variable, and in this case, the inverse operation
    is the logarithm (for any base). The connection between circular functions (sine,
    cosine, tangent, cotangent, arcsine, arccosine, arctangent, ...) and exponential
    functions, within the system of complex numbers, was an achievement of Euler,
    enormously enlarging the horizons of mathematics.


    The basic relation between natural numbers is divisibility. A number $n$ is divisible
    by $m$, or $m$ is a factor of $n$ if the division $n : m$ has a null remainder.
    In Python divisibility is easily expressed by the condition:


    ```

    n%m == 0

    ```


    Given two numbers $n, m$ their maximum common divisor MCD is the greatest number
    that is a factor of them. Table 6.1 shows a Python program giving Euclid’s algorithm
    that provides the MCD of two given numbers.


