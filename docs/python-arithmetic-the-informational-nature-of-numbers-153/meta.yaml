    \ 48X 491 492 493 494 495 496 497 498 499 49X 4X1 511\n\n## 3.5 The Principle\
    \ of Periodical Counting\n\nAll the counting algorithms presented in this chapter\
    \ have a common structure. They are periodical and are based on successor functions\
    \ “succ” with similar recurrent patterns: (i) an initial condition according to\
    \ which the first numeral coincides with the first digit of an alphabet of digits;\
    \ (ii) a middle cycle condition according to which, if a numeral ends with a digit\
    \ that is not the last, then “succ” replaces it by the next digit in the alphabet;\
    \ and finally (iii) an end cycle condition, according to which “succ” recalls\
    \ “succ” on a proper part of the numeral, and transforms the remaining part of\
    \ the numeral according to specific mechanisms that are proper of the particular\
    \ counting. However, in any case, the recurrence determines a new cycle in the\
    \ counting process.\n\nAll the counting algorithms are creative, infinite, and\
    \ recurrent. These conditions together imply that numerals have to increase their\
    \ length as the counting goes on in the generation of numerals.\n\nIn the next\
    \ chapter, we will show that counting determines completely all the operations\
    \ on numbers. Moreover, in almost all of them (apart from the lexicographic skip\
    \ counting) the usual decimal Stevin algorithms can be completely extended to\
    \ them [6].\n\nThe theorem of base representation in positional systems provides\
    \ a general formula giving the number represented by a given positional representation.\
    \ The nature of this result is a consequence of the periodicity as the following\
    \ theorem shows.\n\nA periodical counting algorithm is **monotone** if its numerals\
    \ that are not digits can be represented by two parts: (i) a final digit $x$,\
    \ and (ii) an order component $\\alpha$, which is a smaller numeral denoting the\
    \ number of orders before the given numeral, which we write $(\\alpha, x)$.\n\n\
    The counting algorithms given by Python programs are all monotone periodical counting\
    \ (apart from skip lexicographic counting). In all of them, the structure of succ\
    \ function is based on the two parts of numerals. If a digit is not the last of\
    \ the alphabet, then succ replaces it with the following digit, if it is the last,\
    \ then it is replaced with the first one, and succ is applied to the order part\
    \ of the numeral because in the counting a new order was completed.\n\nThe following\
    \ theorem is an easy consequence of the structure of numerals in monotone periodical\
    \ counting. It is enough to consider that double brackets give the number associated\
    \ with the numeral they enclose, and if $p$ is the number of digits, then any\
    \ order contains $p$ numerals. Therefore the following theorem holds.\n\n**Theorem\
    \ 3.1** *(Periodical Counting Theorem)* Given a periodical monotone counting algorithm\
    \ over $p$ digits, the following equation holds:\n\n$[[\\alpha x]] = [[\\alpha]]p\
    \ + [[x]].$ (3.1)\n\nIf we apply iteratively the recurrent equation of the theorem\
    \ above, we get the following classical formula of Base Representation of a positional\
    \ system of base $b$, where $[[d]]_\\alpha$ is the value $[[d]] \\times b^i$ of\
    \ digit $d$ in the numeral $\\alpha$ ($i$ is the number of digits of $\\alpha$\
    \ at the right of $d$).\n\n$[[\\alpha]] = \\sum_{d \\in \\alpha} [[d_\\alpha]]$\n\
    \nor, more explicitly, if $\\alpha = d_n d_{n-1} \\dots d_0$:\n\n$[[\\alpha]]\
    \ = \\sum_{i=0}^{n} [[d_i]] \\times b^i.$\n\n## References\n\n1. Peano, G.: Formulario\
    \ Mathematico. Edizioni Cremonese (1960)\n2. Cantor, G.: Contributions to the\
    \ Founding of the Theory of Transfinite Numbers. Dover Publications (1915)\n3.\
    \ Heijnoort, van J.: From Frege to Gödel. A Source Book in Mathematical Logic\
    \ (1979–1931). Harvard University Press (1967)\n4. Church, A.: Introduction to\
    \ Mathematical Logic. Princeton University Press (1956)\n5. Manca, V.: The Archimedean\
    \ origin of modern positional number systems. Algorithms (2024)\n6. Manca, V.:\
    \ On the Lexicographic Representation of Numbers. Cornell University Library ArXiv.org,\
    \ pp. 1–15 (2015)"
