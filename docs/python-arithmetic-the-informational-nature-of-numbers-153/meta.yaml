- md: "## Chapter 5\nSquare Root Algorithms\n\n**Key statement**\n\nSquare root algorithms\
    \ are important from many points of view. They provide the first examples of irrational\
    \ numbers. Stevin division gives all possible rational numbers in decimal notation.\
    \ Square roots of a number that is not a square is always an irrational number,\
    \ and √2 is the first known irrational number, discovered by a scholar of Pythagoras’\
    \ school (V century BC). The square root is a determinant in Archimedes’ evaluation\
    \ of π, and finally, the computation of decimal logarithms by Henry Brigg was\
    \ based on the square root.\n\n## 5.1 Simple Square Root Algorithms\n\nLet us\
    \ start with two very intuitive algorithms based on the fact that the square root\
    \ of a number is approximated by the maximum number whose square does not exceed\
    \ the given number. Table 5.1 shows a Python program computing the root corresponding\
    \ to any power, by using the simple idea of the inverse power.\nTable 5.2 shows\
    \ a Python program computing the square root based on the following formula.\n\
    \n$$n^2 = \\sum_{1}^{n} (2n + 1)$$\n\nthat immediately follows from $(n + 1)^2\
    \ = n^2 + n + 1$.\n\nTable 5.1 A Python program for square root as the inverse\
    \ of the power\n\n```python\ndef inverse_root(n,k):\n    remainder = n\n    for\
    \ j in range(n):\n        cc = j**k\n        if cc >= n:\n            remainder\
    \ = n - ((j-1)**k)\n            break\n    return j-1, remainder\nn = int(input(\"\
    Number: \"))\nk = int(input(\"Power: \"))\nres = inverse_root(n,k)\nprint(\"Root:\
    \ \", res[0])\nprint(\"Remainder: \", res[1])\n```\n\nTable 5.2 A Python program\
    \ for square root based on odd numbers sum\n\n```python\ndef figurate_root(n):\n\
    \    remainder = n\n    for j in range(n):\n        q = sum([(2*i)+1 for i in\
    \ range(j)])\n        if q >= n:\n            remainder = n - ((j-1)**2)\n   \
    \         break\n    return j-1, remainder\nn = int(input(\"Number: \"))\nres\
    \ = figurate_root(n)\nprint(\"Square root: \", res[0])\nprint(\"Remainder: \"\
    , res[1])\n```\n\n## 5.2 Bombelli’s Square Root Algorithm\n\nBombelli’s square\
