  - '[PAGE 27]


    name, and some general aspects of its nature, certain variables of its state and
    their respective types of values.


    A “class” is the definition of a type of object with a common structure and the
    operations acting on it together with some general conditions. These conditions
    are what care about the operations, ignoring specific details due to the way operations
    are implemented. Just these operations are called “methods”, which are expressed
    as the “attributes” of objects are, by using a dot notation such as:


    *object.attribute.*


    An attribute selects a variable characteristic of the object (age, city, profession,
    language, ...). Therefore if “name” is a key of the object, something specific
    to its identity, then *name.age* expresses the value of its age. The same notation
    is adapted for a method such as “year-report” that associates to “name” some relevant
    information about the activity of the object in the current year, by updating,
    at the same time, the values of some particular variables of the object. Possibly
    additional parameters can be put inside parentheses following the attribute or
    the method.


    When a class is defined, a special instruction provides the creation of an object
    of the class, also called an instance of the class. When an object is created,
    it can be altered during a computation given by the execution of a program. An
    object can be also destroyed, by losing its state and the data related to it.


    In this book, we do not use objects and methods in our Python arithmetical algorithms,
    but this brief incursion on this topic, apart of a reason of completeness, is
    useful for explaining some notation choices, and for showing the potentiality
    of Python programming. In any case, what it is important to remark here is that
    the notion of an object is so general and expressive that any entity in Python
    is an object. Everything, from variables to functions, to classes too is an object,
    and this, of course, represents a powerful conceptual unification.


    Given any object *w*, the command “dir(w)” will provide the set of attributes
    and methods that can be applied to it. For example if *w* = [1, 2, 3], the command
    “dir(w)” gives operations, or built-in functions and methods that can be applied
    to the object. Many of them have “dunder” format (double underscore format), with
    two underscores before and after the name such as ''__add__'', ''__class__'',
    ''__contains__'', ...


    More information about some specific classes, operations, functions, or methods
    can be obtained by the command “help()”.


    An important difference between operations and functions from one side and methods
    on the other side has to be remarked. An operation or a function are denotative
    instrument taking arguments and giving results. However, arguments are only read
    but are not altered by the reading. Differently, methods when applied to an object
    change its state. An assignment “new = object. method” provides a copy of the
    object in the state obtained after the application of the method to it.'
  - '[PAGE 28]


    # 2.3.3 Tuples, Sets, and Dictionaries


    Tuples are sequences of elements grouped inside parentheses and separated by commas.
    This is a very essential data structure. It is static in the sense that cannot
    change components and size. The elements of a tuple can be selected by positions
    as in strings and lists.


    Sets are expressions built by elements enclosed in braces and separated by commas
    (at many possible levels. They are different from lists in two main features:
    the order of the elements is irrelevant, and the multiplicity of their occurrences
    does not matter. In fact, given a list such as $[a, a, a, b, b]$ the set associated
    to it, and denoted by “$set([a, a, a, b, b])$” is $\{a, b\}$. The empty set is
    $\{\}$ or “$set()$”. Analogously, $set(a, b, \dots, p, q, r)$ is $\{a, b, c, \dots,
    p, q, r\}$. applying operation $set()$ to a structure $S$, a list, a tuple, a
    string, we get the set of components of the structure (in the case of a string,
    the characters occurring in the string). The operation $add$ is used to add elements
    to a given set. Moreover, usual set-theoretic operations of union, intersection,
    difference, and symmetric difference (union minus intersection) are available
    on sets, denoted by $|$, $\&$, $-$ and $\wedge$ respectively. The membership of
    an element to a set is denoted by “in”, returning a boolean value as a result.


    Dictionaries are finite functions, that is pairs associating a value to certain
    given arguments. “$dict()$” is the empty dictionary and by an equation such as
    “$dict(value) = imagine$,” a new association is added to the dictionary. For example,
    the following equations will define a dictionary.


    ```

    dict() = chapters

    chapters("ch1") = 22

    chapters("ch2") = 12

    chapters("ch3") = 30

    chapters("ch4") = 15

    ```


    the value associated with the variable “chapters” is the following:


    ```

    {"ch1" : 22, "ch2" : 12, , "ch3" : 30, "ch4" : 15}.

    ```


    The values that are arguments of a dictionary are called keys. The attribute “.keys()”
    provides the set of keys of a dictionary. and “$haskey()$” is a method that when
    applied to a dictionary returns a boolean value (True if the key is present in
    the dictionary). Any immutable object can be the value of a dictionary, and anything
    can be the image of a key. An immutable object is an object where any accessible
    component of it cannot be changed by any operation. Numbers, strings, and tuples
    are immutable, while lists, sets, and dictionaries are mutable.


    We conclude this short presentation of Python by remarking that any Python object
    has a type. The notion of type is similar to that of class, but it is focused
    on the operations and relations that are defined for the object. Integer, float,
    complex, string, bytes, and bool are primitive types, while list, tuple, set,
    dict, and file are types of structures built on primitive types. An important
    aspect of Python is that variables are used without declaring their types, which
    are deduced by the interpreter of the language from the context of the use of
    the variable. This is a big advantage of flexibility and simplicity in the construction
    of Python statements (elementary texts composing programs).'
