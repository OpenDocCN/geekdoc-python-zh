  md: 'the author in the context of genomic sequences, but it can be applied to any
    kind of sequence [10–13]. Irrational numbers pass the 2Log random test, while
    sequences of prime numbers represented by difference do not pass the test.


    The test can be easily realized by a Python program, and it is interesting in
    itself, apart from any application to arithmetic. The test is based on the notions
    of repeat and hapax of a string. A repeat of a string is a substring that occurs
    more than once in the string, while a hapax (terminology from literary analysis)
    is a substring that occurs once in the string. We say that the Hapax Bound $HB$
    of a string is the length such that all the substrings of length equal to or greater
    than $HB$ that occur in the string are hapaxes.


    The test claims that in a random string, $HB$ is close to $2 \log_m(n)$ where
    $m$ is the number of different symbols occurring in the string and $n$ is the
    length of the string. Randomness is not a 0/1 property, hence the degree of randomness
    of a string is given by the level of closeness to the $2 \log_m(n)$ value required
    for random strings (measured in some way). The test was validated in many situations
    and a theoretical motivation was given in terms of de Bruijn graphs that are structure
    very important in the analysis of genomic sequences.


    Here we do not enter the motivation and validation of the test but will describe
    the algorithm for realizing the test and the Python program computing this algorithm.


    The algorithm realizing the 2Log random test is based on the data structure of
    the suffix array. The suffix array of a given string is the list of all the suffixes
    of the string put in weak lexicographic order with the position where the suffix
    begins in the string. The weak lexicographic order means that strings are compared
    according to the leftmost symbol where they disagree, the string where the disagreement
    symbol precedes the corresponding of other string, in the order over the alphabet
    of symbols, precedes the other one. In Python, the function “sorted” realizes
    this ordering of the elements of a list of strings.


    Any substring of a given string is the prefix of some suffix. This simple observation
    is the key to the method. In fact when suffixes are put in the lexicographic order,
    then if a substring of length $k$ occurs more than once, we have two consecutive
    positions in the suffix array having the same prefix of length $k$. If this happens
    then $k$ cannot be the $HB$ of the string. Therefore, the test is realized by
    searching for the first value of $k$ such that in the suffix array, no consecutive
    sequences have the same prefix $k$. This is exactly what is realized by the Python
    program given in Table 6.5.


