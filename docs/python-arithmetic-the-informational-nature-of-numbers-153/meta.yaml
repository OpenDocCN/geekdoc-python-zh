    1 = {0}


    2 = {0, 1}


    3 = {0, 1, 2}


    and so on, which corresponds to our definition given by using counting algorithms.
    The approach of Peano is, in a sense, the reverse side of the von Neumann approach.
    Namely, Peano axioms for the set $\mathbb{N}$ of natural numbers say that [1]:


    (1) $0 \in \mathbb{N}$ (zero)


    (2) $x \in \mathbb{N} \rightarrow succ(x) \in \mathbb{N}$ (successor)


    (3) $x \neq y \rightarrow succ(x) \neq succ(y)$ (successor injectivity)


    (4) $x \neq 0 \rightarrow \exists y \in \mathbb{N}(x = succ(y))$ (successor surjectivity
    in $\mathbb{N} - \{0\}$)


    (5) $(S \subseteq \mathbb{N} \wedge 0 \in S \wedge (x \in S \rightarrow succ(x)
    \in S)) \rightarrow S = \mathbb{N}$ (Induction Principle)


    Injectivity and surjectivity are general properties of functions. A function from
    a set $A$ of arguments to a set $B$ of images is injective, when distinct arguments
    have distinct images, while it is surjective when all the elements of $B$ are
    images of elements in $A$. The induction principle essentially says that zero
    and successor provide all the numbers and no number exists that cannot be obtained
    by applying the succ function starting from zero. The passage from the usual arithmetic
    to the transfinite arithmetic introduced by Georg Cantor is obtained by enlarging
    the induction principle [2]. This passage is very natural in the context of set
    theory because numbers are sets, the set of all natural numbers, in this case
    denoted by $\omega$, is the first transfinite number and after it a new succession
    of infinite ordinal numbers can be generated, going up at many levels of infinity.
    However, this rapid mention of Cantor set theory wants to remark that arithmetic
    is connected to the notion of class and whence to the set theory that results
    to be the universal theory where any other mathematical theory can be expressed.


    This intuition goes back to Gottlob Frege [3], who defined a number as the class
    of all classes that can be each other put in a 1-to-1 correspondence between them.
    This definition was demonstrated not completely reliable, by Bertrand Russell
    in 1901, for a paradox found in Frege''s informal notion of class. To fix this
    inadequacy, axiomatic set theory was developed. However, Frege''s intuition was
    very important, and it is related to the von Neumann idea, which escapes from
    Frege''s definition limits by using a recurrent version of Frege''s intuition.
    Other important contributions of Frege were predicate calculus, which is the basis
    of mathematical logic, and a generalization of Euler''s idea of function on entities
    of a general nature that can be different from numbers. The further generalization
    of the concept of function is due to Peter Gustav Lejeune Dirichlet, who gave
    a crucial contribution to the arithmetic, by a generalization of Euclid''s theorem
    about the infinity of prime numbers. Namely, Dirichlet proved, by using analytical
    methods on complex numbers, that any arithmetic progression $(a_n|n \in \mathbb{N})$
    of type $a_n = bn + c$ where numbers $b, c$ are relatively prime contains infinite
    prime numbers (but not only prime numbers).


    Dirichlet''s generalization of function is properly stated within set theory,
    because a function $f$ from a set $A$ to a set $B$ is, in its most general setting,
    a set of pairs $(x, y)$ such that $x \in A$ and $y \in B$ and for any $x \in A$
    there exists only one $y \in B$ such that $(x, y) \in f$. But the link between
    functions and sets is even deeper, because the first ideas leading Cantor to his
    notion of abstract set, or set of points, were elaborated when Cantor was studying
    some specific aspects of the functions defined through infinite series of sines
    and cosines (trigonometric series). The abstract notion of set is also the beginning
    of abstract notions of space, defined on sets, and abstract algebraic systems
    too. This means that the Cartesian revolution reducing geometry to algebra extends
    toward a further abstraction level of spaces at many, possibly infinite dimensions,
    and spaces where general notions of continuity, distances, angles, and other spatial
    concepts can be developed that enlarge the horizon of mathematical representation.


    In the context of mathematical logic, Alonzo Church, in 1920 years introduced
    lambda-abstraction that provides a rigorous notation to Euler''s idea of a function
    as a relationship between the values assigned to some variables and the corresponding
    values assumed by a mathematical expression where these variables occur [4]. In
    fact, given a set of constant values, variables ranging in certain sets including
    the elements denoted by the constants, and certain operations defined on these
    sets, if $E(x, y, \ldots, z)$ is an algebraic expression built from these constants,
    variables, and operations, then


    $$\lambda x, y, \ldots z.E(x, y, \ldots, z)$$


    denotes the function associated with the expression $E(x, y, \ldots, z)$, where
    the lambda part on the left of the dot wants to abstract from the particular variables
    that occur in $E(x, y, \ldots, z)$. If $u, v, \ldots w$ are other variables with
    the same variability ranges as the variables $x, y, \ldots, z$, respectively,
    and $a, b, \ldots c$ are constants denoting elements in the ranges of variables,
    then the following equations, by Church called $\alpha$ and $\beta$ rules express
    the meaning of lambda-abstraction:


    $$\lambda x, y, \ldots z.E(x, y, \ldots, z) = \lambda u, v, \ldots w.E(u, v, \ldots,
    w)$$


    $$(\lambda x, y, \ldots z.E(x, y, \ldots, z))(a, b, \ldots) = E(a, b, \ldots,
    c).$$


    What is important for our discussion is that numbers can be defined as special
    functions defined by lambda expressions, and moreover any computation on numbers
    can be completely expressed by a suitable lambda expression. In other words, Python,
    and any other programming language are forms, surely more readable, of lambda
    expressions. In particular, Church proved in 1936 that any Turing machine, which
    is essentially a program of a very basic programming language, is completely equivalent
    to a lambda expression, and also the converse relation holds. This digression
    wants to remark on the cruciality of functions, which are the core of Python language.


    ## 3.2 Periodical Counting


    The decimal counting algorithm belongs to a class of counting algorithms based
    on the notion of a period. We will show that decimal counting is a particular
    periodical counting and the periodical counting algorithms can be defined that
    do not have any representation of zero. Moreover, from the algorithms that we
    give it appears clearly that zero is a natural consequence of periodical counting.


    The first systematic method for generating numerals by a periodical process is
    due to Archimedes from Syracuse in the third century BC. The method outlined by
    Archimedes intended to define numerals denoting very large numbers without any
    limit, but in his original formulation, the system was not complete, because some
    numbers had no numeral corresponding to them. However, it is very simple to consider
    the numerals generated by Archimedes'' method and consider them as denoting, according
    to their order any natural number. In the following, we present this enumeration,
    without entering the details of the original system, which was conceived to give
    a numerical evaluation of the size of the universe in terms of sand grain contained
    in it (the Latin title of the book where Archimedes explains his method is "Arenarius",
    referring to the Latin name for sand).


    Archimedes'' periodical counting does not consider zero and is based on orders
    and periods. Python list notation will be very useful for denoting Archimedes
    numerals. The first order is that of some initial symbols, let us denote them
    by 1, 2, 3, 4, 5, 6, 7, 8, 9. After 9 we can say that we complete the first order,
    and express this by putting [1] as the end of the first order, which is thus given
    by:


    1, 2, 3, 4, 5, 6, 7, 8, 9, [1]


    after the first order, we can continue with the other 9 following orders:


    ```

    1, 2, 3, 4, 5, 6, 7, 8, 9, [1]

    [1]1, [1]2, [1]3, [1]4, [1]5, [1]6, [1]7, [1]8, [1]9, [2]

    [2]1, [2]2, [2]3, [2]4, [2]5, [2]6, [2]7, [2]8, [2]9, [3]

    ...........

    [9]1, [9]2, [9]3, [9]4, [9]5, [9]6, [9]7, [9]8, [9]9, [[1]]

    ```


    these 10 orders provide the first period ending with the numeral [[1]] denoting
    100. After numeral [[1]], Archimedes generates the second period that consists
    of 10 first periods similar to that one given above, where all the numerals are
    prefixed by [[1]],'
  mdcn: '## 3.1 十进制计数算法


    1 = {0}


    2 = {0, 1}


    3 = {0, 1, 2}


    依此类推，这与我们使用计数算法给出的定义相对应。从某种意义上说，皮亚诺的方法是冯·诺依曼方法的反面。也就是说，自然数集 $\mathbb{N}$ 的皮亚诺公理指出
    [1]：


    (1) $0 \in \mathbb{N}$（零）


    (2) $x \in \mathbb{N} \rightarrow succ(x) \in \mathbb{N}$（后继）


    (3) $x \neq y \rightarrow succ(x) \neq succ(y)$（后继单射性）


    (4) $x \neq 0 \rightarrow \exists y \in \mathbb{N}(x = succ(y))$（在 $\mathbb{N}
    - \{0\}$ 中的后继满射性）


    (5) $(S \subseteq \mathbb{N} \wedge 0 \in S \wedge (x \in S \rightarrow succ(x)
    \in S)) \rightarrow S = \mathbb{N}$（归纳原理）


    单射性和满射性是函数的一般性质。一个从参数集 $A$ 到像集 $B$ 的函数是单射的，当不同的参数有不同的像；而它是满射的，当 $B$ 中的所有元素都是 $A$
    中元素的像。归纳原理本质上说明，零和后继提供了所有的数，并且不存在无法通过从零开始应用 succ 函数得到的数。从通常的算术到格奥尔格·康托尔引入的超限算术的过渡，是通过扩展归纳原理实现的
    [2]。这种过渡在集合论的背景下非常自然，因为数就是集合，在这种情况下，所有自然数的集合（记为 $\omega$）是第一个超限数，在其之后可以生成一个新的无限序数序列，上升到许多无穷层次。然而，对康托尔集合论的这一简要提及旨在说明，算术与类的概念相关联，进而与集合论相关联，而集合论被证明是任何其他数学理论都可以在其中表达的通用理论。


    这一直觉可以追溯到戈特洛布·弗雷格 [3]，他将一个数定义为所有可以彼此建立一一对应关系的类的类。这个定义被伯特兰·罗素在1901年证明并非完全可靠，因为他发现了弗雷格非正式类概念中的一个悖论。为了修正这一缺陷，公理化集合论得以发展。然而，弗雷格的直觉非常重要，并且它与冯·诺依曼的思想相关，后者通过使用弗雷格直觉的递归版本，摆脱了弗雷格定义的局限性。弗雷格的其他重要贡献包括谓词演算（这是数理逻辑的基础）以及对欧拉关于实体函数思想的推广，这些实体可以不同于数。函数概念的进一步推广归功于彼得·古斯塔夫·勒热纳·狄利克雷，他通过对欧几里得关于素数无限性定理的推广，对算术做出了关键贡献。也就是说，狄利克雷使用复数上的分析方法证明，任何形如
    $a_n = bn + c$（其中 $b, c$ 互质）的等差数列 $(a_n|n \in \mathbb{N})$ 都包含无限多个素数（但不仅仅是素数）。


    狄利克雷的函数推广是在集合论框架内恰当陈述的，因为从集合 $A$ 到集合 $B$ 的函数 $f$，在其最一般的形式下，是一组对 $(x, y)$ 的集合，其中
    $x \in A$ 且 $y \in B$，并且对于任何 $x \in A$，存在唯一的 $y \in B$ 使得 $(x, y) \in f$。但函数与集合之间的联系甚至更深，因为康托尔形成其抽象集合或点集概念的最初想法，是在他研究通过正弦和余弦的无穷级数（三角级数）定义的函数的某些特定方面时形成的。集合的抽象概念也是抽象空间概念（定义在集合上）以及抽象代数系统的起点。这意味着将几何归结为代数的笛卡尔革命，扩展到了更高抽象层次的空间，这些空间具有许多（可能是无限的）维度，并且在这些空间中可以发展出连续性、距离、角度和其他空间概念的一般概念，从而扩大了数学表示的视野。


    在数理逻辑的背景下，阿隆佐·邱奇在1920年代引入了 lambda 抽象，它为欧拉关于函数的思想（即赋予某些变量的值与包含这些变量的数学表达式所取的相应值之间的关系）提供了一种严格的符号表示
    [4]。事实上，给定一组常数值、在某些集合（包括由常数表示的元素）中变化的变量，以及在这些集合上定义的某些运算，如果 $E(x, y, \ldots, z)$
    是由这些常数、变量和运算构建的代数表达式，那么


    $$\lambda x, y, \ldots z.E(x, y, \ldots, z)$$


    表示与表达式 $E(x, y, \ldots, z)$ 相关联的函数，其中点左侧的 lambda 部分旨在抽象出 $E(x, y, \ldots, z)$
    中出现的特定变量。如果 $u, v, \ldots w$ 是与变量 $x, y, \ldots, z$ 分别具有相同变化范围的其他变量，并且 $a, b,
    \ldots c$ 是表示变量范围中元素的常数，那么以下等式（邱奇称之为 $\alpha$ 和 $\beta$ 规则）表达了 lambda 抽象的含义：


    $$\lambda x, y, \ldots z.E(x, y, \ldots, z) = \lambda u, v, \ldots w.E(u, v, \ldots,
    w)$$


    $$(\lambda x, y, \ldots z.E(x, y, \ldots, z))(a, b, \ldots) = E(a, b, \ldots,
    c).$$


    对我们讨论而言重要的是，数可以被定义为由 lambda 表达式定义的特殊函数，而且任何对数的计算都可以完全由一个合适的 lambda 表达式来表达。换句话说，Python
    以及任何其他编程语言都是 lambda 表达式的形式，当然更具可读性。特别是，邱奇在1936年证明，任何图灵机（本质上是一种非常基础的编程语言的程序）都与一个
    lambda 表达式完全等价，并且反之亦然。这一离题旨在强调函数的关键性，函数是 Python 语言的核心。


    ## 3.2 周期性计数


    十进制计数算法属于一类基于周期概念的计数算法。我们将证明十进制计数是一种特殊的周期性计数，并且可以定义没有任何零表示的周期性计数算法。此外，从我们给出的算法可以清楚地看出，零是周期性计数的自然结果。


    通过周期性过程生成数字符号的第一个系统方法归功于公元前三世纪叙拉古的阿基米德。阿基米德概述的方法旨在定义表示非常大的数且没有上限的数字符号，但在他的原始表述中，该系统并不完整，因为某些数没有对应的数字符号。然而，考虑阿基米德方法生成的数字符号，并根据它们的顺序将它们视为表示任何自然数，这是非常简单的。下面，我们将介绍这种枚举，而不深入原始系统的细节，该系统旨在以包含的沙粒数量来评估宇宙的大小（阿基米德解释其方法的书的拉丁文标题是“Arenarius”，指的是沙子的拉丁名称）。


    阿基米德的周期性计数不考虑零，并且基于阶和周期。Python 列表表示法对于表示阿基米德数字符号将非常有用。第一阶是一些初始符号，我们用 1, 2, 3,
    4, 5, 6, 7, 8, 9 表示它们。在 9 之后，我们可以说我们完成了第一阶，并通过放置 [1] 作为第一阶的结束来表示这一点，因此第一阶由以下给出：


    1, 2, 3, 4, 5, 6, 7, 8, 9, [1]


    在第一阶之后，我们可以继续其他 9 个后续阶：


    ```

    1, 2, 3, 4, 5, 6, 7, 8, 9, [1]

    [1]1, [1]2, [1]3, [1]4, [1]5, [1]6, [1]7, [1]8, [1]9, [2]

    [2]1, [2]2, [2]3, [2]4, [2]5, [2]6, [2]7, [2]8, [2]9, [3]

    ...........

    [9]1, [9]2, [9]3, [9]4, [9]5, [9]6, [9]7, [9]8, [9]9, [[1]]

    ```


    这 10 个阶提供了第一个周期，以表示 100 的数字符号 [[1]] 结束。在数字符号 [[1]] 之后，阿基米德生成了第二个周期，该周期由 10 个类似于上述第一个周期的周期组成，其中所有数字符号都以
    [[1]] 为前缀，'
