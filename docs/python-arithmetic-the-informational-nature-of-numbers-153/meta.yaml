    \ of Cantor's argument about the impossibility of having a 1-to-1 correspondence\
    \ between natural numbers and real numbers (represented by infinite sequences\
    \ of digits). Namely, assume that computable functions are functions everywhere\
    \ defined. They are enumerable because they are expressed by programs, that are\
    \ strings and can be enumerated. Let $f_i$ be the function having order $i$ and\
