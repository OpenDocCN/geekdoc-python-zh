    \ efficient ways of computing all these operations are based on operation tables\
    \ giving the results of operations only for numbers expressed by digits. The division\
    \ provides the decimal representation of any rational number.\n\n## 4.1 Addition\
    \ and Subtraction\n\nIn Table 4.1 is given the Python program for predecessor.\
    \ For clarity, we report here also the algorithm computing the successor function\
    \ in Table 4.2.\n\nThe operation of addition or sum of two numbers $n, m$ consists\
    \ of counting $m$ times the successor following the number $n$. This operation\
    \ is denoted by $+$ and is commutative, that is $n + m = m + n$. This means that\
    \ it is more efficient to count the successor starting from the greater of two\
    \ given numbers. To count correctly the number of applications of the successor,\
    \ it is useful to use the predecessor function. In this way when the successor\
    \ is applied to $n$ the predecessor is applied to $m$ and $m$ is updated to $m\
    \ - 1$. The computation halts when $m$ becomes equal to zero. This algorithm is\
    \ expressed by the Python program shown in Table 4.3.\n\nThe operation of subtraction,\
    \ denoted by the minus sign $-$, given two numbers $n, m$ with $n \\geq m$, can\
    \ provide $n - m$ by applying the predecessor to $n$ many times equal to $m$.\
    \ Therefore, if the predecessor is applied also to $m$ when it is applied to $n$\
    \ and the values of two arguments are both updated at any application, then when\
