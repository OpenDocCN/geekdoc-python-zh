  md: '# Chapter 5

    Square Root Algorithms


    **Key statement**


    Square root algorithms are important from many points of view. They provide the
    first examples of irrational numbers. Stevin division gives all possible rational
    numbers in decimal notation. Square roots of a number that is not a square is
    always an irrational number, and √2 is the first known irrational number, discovered
    by a scholar of Pythagoras’ school (V century BC). The square root is a determinant
    in Archimedes’ evaluation of π , and finally, the computation of decimal logarithms
    by Henry Brigg was based on the square root.


    # 5.1 Simple Square Root Algorithms


    Let us start with two very intuitive algorithms based on the fact that the square
    root of a number is approximated by the maximum number whose square does not exceed
    the given number. Table 5.1 shows a Python program computing the root corresponding
    to any power, by using the simple idea of the inverse power.

    Table 5.2 shows a Python program computing the square root based on the following
    formula.


    $$n^2 = \sum_{1}^{n} (2n + 1)$$


    that immediately follows from $(n + 1)^2 = n^2 + n + 1$.'
