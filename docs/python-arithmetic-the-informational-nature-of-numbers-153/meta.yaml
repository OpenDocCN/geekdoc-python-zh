    \ when $p$ is prime, of course $\\varphi(p) = p - 1$. Leibniz proved it by using\
    \ Newton's binomial formula.\n\nCongruences can be seen as equations between remainder\
    \ functions, as Python notation puts in evidence, moreover, they can be also considered\
    \ as \"cycle equations\". when a modulus $m$ is seen as a point of a circle and\
    \ the values $1, 2, \\dots, m - 1$, called also residues of the m-congruence,\
    \ as points at the same distance on the circle, determining a partition of the\
    \ round angle in $m$ equal angles of $2\\pi/m$. In fact, for any integer $k$:\n\
    \n$$km \\equiv 0, \\quad km + 1 \\equiv 1 \\dots km + (m - 1) \\equiv m - 1 \\\
    pmod{m}$$\n\nin circle representation, two numbers are $m$-congruent when, in\
    \ the circle arrangement of angles $2\\pi/m$ they are located on the same point\
    \ of the circle. In other words, congruences correspond to \"circular counting\"\
    .\n\nAn algebraic congruence is given by a condition:\n\n$$P(x, y, \\dots) \\\
    equiv 0 \\pmod{m}$$\n\nA linear congruence is an algebraic congruence for a polynomial\
    \ of degree 1, given by a condition:\n\n$$a * x \\equiv b \\pmod{m}$$\n\nA binomial\
    \ congruence is an algebraic congruence of a monomial with a constant (without\
    \ no loss of generality, the monomial coefficient can be assumed 1), given by\
    \ a condition:\n\n$$x^n \\equiv b \\pmod{m}$$\n\nA quadratic congruence is a binomial\
    \ congruence of degree 2. Gauss developed a beautiful theory of quadratic congruences.\n\
    \nThe order of a number $a$ for a prime modulus $p$ is the minimum value of the\
    \ exponent $n$ such that:\n\n$$a^n \\equiv 1 \\pmod{p}$$\n\nIt was shown that\
    \ such a value exists for any number $a$ and it has to be a divisor of $p - 1$.\
    \ This fact follows from Fermat's theorem.\n\nWhen the order of $a$ is exactly\
    \ equal to $p - 1$ $a$ is called a primitive root of $p$. Legendre proved that\
    \ for any number that is not p-congruent with 0 a primitive root always exists.\
    \ Given a primitive root $a$ of a modulus $p$, the powers $a, a^2, a^2, \\dots,\
    \ a^{p-1}$ surely provide all the residues of the p-congruence, because no power\
    \ less than $p - 1$ can be congruent with 1 (by the definition of the primitive\
    \ root). In this case, the exponent associated with the residue is called its\
    \ index, and by using indices the products of residues can be obtained by summing\
    \ their relative indices (a property analogous to that of logarithms).\n\nIn Tables\
    \ 6.8 and 6.9 Python programs are given for computing simple linear and algebraic\
    \ congruences.\n\nAn important class of generators of pseudo-casual numbers, LCG,\
    \ is based on linear congruences, with recurrence formulas of type:\n\n$$A_{n+1}\
    \ = bA_n + c \\equiv (m)$$\n\nand some conditions of adequacy were individuated\
    \ for LCG generators: $m$ and $c$ need to be coprime; $m$ very large (like $2^{32}$)\
    \ and $b - 1$ has to be divisible by all prime factors of $n$, and $b - 1$ divisible\
    \ by 4 if 4 is a factor of $m$ [14].\n\nIn some cases is required to find a number\
    \ satisfying system of congruences. For example:\n\n$$x \\equiv 1 \\pmod{2} \\\
    quad x \\equiv 2 \\pmod{3} \\quad x \\equiv 4 \\pmod{5}$$\n\nis satisfied for\
    \ $x = 29$. A general solution can be obtained by using Euler's $\\varphi$ function,\
    \ where $\\varphi(n)$ is the number of $m$ such that $MCD(n, m) = 1$. It is easy\
    \ to show that ($\\prod$ is the product of a sequence of factors):\n\n$$\\varphi(n)\
    \ = n \\prod_{p|n} \\left(1 - \\frac{1}{p}\\right)$$\n\n\"Chinese Remainder Theorem\"\
    \ ensures the existence of a solution to this kind of congruence [7].\n\n## **Theorem\
    \ 6.5** (Chinese Remainder Theorem) *For any sequence of coprime moduli $m_1,\
    \ m_2, \\dots m_k$, for every sequence $a_1, a_2, \\dots a_k$ of numbers, and\
    \ for any number $a$ there exist a value $x$, with $a < x < a + m_1 m_2 \\dots\
    \ m_k$, such that: $a_i \\equiv (m_i)$, for $i = 1, 2, \\dots k$.*\n\nThis theorem\
    \ is the basis on a famous arithmetic encoding, defined by Kurt Gödel in 1930,\
    \ in terms of $\\beta$ function. We refer to book [7] for more details.\n\nTable\
    \ 6.10 shows a Python program solving the system of congruences above.\n\nThe\
    \ program shown in Table 6.10 provides a list of 180 solutions. It appears clearly\
    \ that all the solutions are of type $29 + 30k$ for $k \\ge 0$ (30 is the least\
    \ common multiple of moduli). The solution obtained by the general method based\
    \ on Euler $\\varphi$ is 5399. Some solutions are below reported.\n\n[29, 59,\
    \ 89, 119, 149, 179, 209, 239, 269, 299, 329, 359, 389, 419, 449, 479, 509, 539,\
    \ 569, 599, 629, 659, 689, 719, 749, 779, 809, 839, 869, 899, 929, 959, 989]\n\
    \nAnother encoding schema introduced by Gödel is based on the fundamental theorem\
    \ of factorization. In fact, any sequence of $k$ numbers $a_1, a_2, \\dots a_k$\
    \ put as exponents of the first $k$ prime numbers $p_1, p_2, \\dots p_k$ provides\
    \ the number:\n\n$$p_1^{a_1} p_2^{a_2} \\dots p_k^{a_k}$$\n\nthat is univocally\
    \ associated with the sequence. Any syntactical property of the sequence is in\
    \ this way translated in a suitable arithmetic property. In other words, arithmetic\
    \ encodes the syntax of any language, and in particular of a language expressing\
    \ arithmetic. This characteristic was the basis of the incompleteness Gödel’s\
    \ theorem given in his famous paper in 1931. The reflexive nature of arithmetic\
    \ is the main reason of the incompleteness of any axiomatic arithmetic theory\
    \ (the impossibility of deducing effectively all the consequences of the axioms).\
    \ This reflexivity is based on primality.\n\nEncoding based on congruences and\
    \ prime numbers is theoretically very important, but it becomes computationally\
    \ prohibitive when the size of sequences and components exceeds some values. A\
    \ class of arithmetic encoding of sequences is based on enumeration. This method\
    \ was introduced by Cantor in the proof that rational numbers are 1-to-1 with\
    \ natural numbers. According to this encoding, a 1-to-1 correspondence between\
    \ pairs of numbers and numbers is obtained through a counting algorithm where\
    \ any pair is once counted and all pairs are counted. This idea can be realized\
    \ in many ways, but the essence is that of associating to any pair a positive\
    \ integer measure $\\mu$, for example, the sum of components, and then counting\
    \ first the pairs $(i, j)$ such that $\\mu(i, j) \\le m_1$, then the pairs such\
    \ that $m_1 < \\mu(i, j) \\le m_2$, such that $m_2 < \\mu(i, j) \\le m_3$ and\
    \ so on, for $0 < m_1 < m_2 < m_3 \\dots$ (Within pairs of each class, a specific\
    \ internal order is adopted). Then, the encoding of a pair is the step at which\
    \ it is generated. In general, methods of this kind are based on partitions of\
    \ the infinite set that has to be encoded in finite classes. It can be applied\
    \ to any kind of finite structure, in particular to the infinite set of finite\
    \ sequences of numbers.\n\nCantor’s original encoding was based on the arrangement\
    \ of pairs over an (infinite) square, counting from the leftmost uppermost pair\
    \ of the square, by proceeding to count pairs of diagonals of increasing length.\n\
    \n### **Table 6.8** A Python program computing solutions of linear congruences\n\
    \n```python\ndef congr_lin(k,a,b):\n    for i in range(k):\n        if (a*i)%k\
