  md: 'Question Q1 had a beautiful solution in 1837 by Dirichlet, who provided one
    of the most spectacular proofs in number theory, by using analytical methods (on
    complex numbers). Moreover, the solution is particularly simple and elegant. The
    following theorem holds.


    **Theorem 6.2** (Dirichlet Theorem) *Any arithmetical progression $an + b$ where
    $a, b$ are coprime gives infinite values that are prime numbers.*


    According to the theorem above, linear polynomials with one variable can provide
    infinite prime, but not only this. What is even more impressive is that, if we
    consider the different values of $b$ that are relatively prime with $a$ by Dirichlet''s
    proof results that all prime numbers are uniformly distributed among the different
    linear polynomials relative to the different values of $b$ that are prime with
    $a$.


    Q2: Do exist Diophantine polynomials that provide all prime numbers?


    Question Q2 has a positive answer, given by Matijasevič''s proof. The polynomial
    of this already mentioned theorem (of degree 25 with 26 variables) generates integer
    values where those with positive signs are all the prime numbers. However, no
    polynomial is known so far giving all and only primes.


    The other two questions very investigated and so far open can be expressed by
    equations, even if not Diophantine equations in the strict sense. The first one
    is the famous Goldbach Conjecture, posed to Euler by a mathematician of his time.
    The conjecture asserts that, for any $n > 1$ there exist $i, j \in \mathbb{N}$
    such that:


    $$2n = p_i + p_j$$


    where $\{p_i\}$ is the sequence of primes. The other question is that of "Twin
    Primes" asserting that The following equation holds for infinite values of $i
    \in \mathbb{N}$


    $$p_{i+1} = p_i + 2$$


    Both these questions remain open questions about primes.


    # 6.3 Congruences and Arithmetic Encoding


    The concept of congruence is crucial in number theory. Two numbers $n, m$ are
    congruent modulus $k$ when divided by $k$ they give the same remainder. The usual
    notation for denoting this relation, according to Gauss is the following:


    $$n \equiv m \pmod{k}$$


    in words, we say that $n$ is $k$-congruent with $m$. In Python, this condition
    becomes:


    ```

    n%k == m%k

    ```'
