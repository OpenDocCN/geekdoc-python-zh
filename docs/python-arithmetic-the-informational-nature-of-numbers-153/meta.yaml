    different from 1. If a number is a product of numbers, those of them different
    from 1 or from the number are said to be proper factors of the number (any number
    is a factor of itself). Any number prime has no proper factor, while a number
    that is not prime has surely proper factors (smaller than itself). Two numbers
    are said to be'
