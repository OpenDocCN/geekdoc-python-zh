- md: '## 2.3 Python Data Structures


    Table 2.4 Python basic keywords


    | |

    |---|

    | if, elif, else |

    | for |

    | while |

    | break |

    | pass |

    | in |

    | range |

    | def |

    | return |

    | print |

    | input |

    | int, str |

    | True, False |

    | not, and, or |


    Table 2.5 Python primitive types


    | |

    |---|

    | int |

    | string |

    | float |

    | complex |

    | bytes |

    | bool |


    Simple Python programs are interpreted by an interpreter executing the elementary
    actions associated with the instructions. However, especially in the case of recursive
    calls, the flux of execution is not simple to trace, therefore, programming experience
    helps in finding the bugs in programs. In some cases, a definition may be logically
    correct, but it does not meet the interpretation procedure, therefore the experience
    suggests how to express statements correctly and coherently to the dynamics of
    the available Python interpreter (Tables 2.4 and 2.5).


    The main components of a programming language are (1) the control structure, and
    (2) the data structures. The first one was considered in the preceding section.
    It deals with the way instructions are organized for defining the sequence of
    actions required by the execution of an algorithm. These actions performed essentially
    data transformations. However, data, starting from some basic types (integers,
    float, string, byte, boolean) are aggregated into structures expressing relations
    among parts. In Python, there are five main kinds of structures in which data
    are organized: lists, tuples, sets, dictionaries, and files. In this section,
    we give a brief overview of the main properties of these structures (Table 2.6).


    Table 2.6 Python operations, relations, equations


