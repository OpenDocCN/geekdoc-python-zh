    \ is definitively true on the sequence if there exists an index $n_0$ such that\
    \ for all the elements of indices greater than $n_0$ the property always holds.\
    \ Then, infinitesimals need to be either definitively equal to zero or definitively\
    \ different from zero. This condition ensures the rule of \"null product\" according\
    \ to which the product of two numbers is zero only if one of two factors is zero.\
    \ In fact, in this way, if zero is represented by any definitively null sequence,\
