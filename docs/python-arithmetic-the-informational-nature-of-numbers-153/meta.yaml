    ### 2.3.1 Lists


    A list is an expression built by elements and brackets, possibly, at different
    levels of aggregation, and with no restriction about the types of the aggregated
    elements. The following are examples of lists:


    ```

    [1, 2, “a”, “b”, 3, 4, “x”, “y”]

    [[[0, 1], “a”], [[0, 2], “b”], True, 0.5]

    ```


    Lists can be concatenated with operation +. For example:


    ```

    [1, 2, “a”, “b”, 3, 4, “x”, “y”] = [1, 2, “a”, “b”] + [3, 4, “x”, “y”]

    ```


    Moreover, their elements and portions can be accessed by indices. For example,
    given the following assignment:


    ```

    w = [1, 2, “a”, “b”, 3, 4, “x”, “y”]

    w[2] = “a”, w[2 : 5] = [“a”, “b”, 3]

    ```


    len(w) = 8 and the last element has index −1, that is, w[−1] = y. The notation
    w[: i] is the portion of w from its first position up to position i − 1. Analogously
    w[i :] is the portion of w from position i to its last position. Moreover, a special
    feature of lists is that assignments can change portions of a structure. For example,
    the following assignment:


    w[: 1] = [“prefix”, “code”]


    transforms w into:


    w = [“prefix”, “code”, 1, 2, “a”, “b”, 3, 4, “x”, “y”]


    Given the assignment:


    s = [[[0, 1], “a”], [[0, 2], “b”], True, 0.5]


    then a following assignment:


    s[1][1] = “xxx”


    will transform s into:


    [[[0, 1], “a”], [[0, 2], “xxx”], True, 0.5].


