    ## 第2章

    ## 数学符号与Python


    **核心陈述**


    > Python是一种将经典数学符号凝练为算法符号核心风格的语言。然而，Python所依据的术语和概念拥有八个世纪的历史，本质上介于两位著名的“莱昂纳多”之间：莱昂纳多·斐波那契（又称比萨的莱昂纳多）和莱昂纳德·欧拉，后者为基本数学符号奠定了近乎最终的框架。


    ### 2.1 从分析术到Python表达式


    《算盘书》于1202年出版。这本书对数学思维的影响巨大。其核心信息是，我们可以通过操作数字的表示形式来处理数字。使用数字的数字表示称为“数词”，因此数字计算简化为数词计算。这一观点是全新的，无疑对在意大利中北部地区蓬勃发展的代数学派的新代数趋势起到了催化作用（西皮奥内·德尔·费罗、安东尼奥·玛丽亚·德尔·菲奥雷、费德里科·丰塔纳（又称塔尔塔利亚）、杰罗拉莫·卡尔达诺和洛多维科·费拉里是最著名的名字），该学派研究了求解三次和四次代数方程的方法，这些方法在拉斐尔·邦贝利1572年出版的《代数学》一书中有所描述（戈特弗里德·莱布尼茨肯定研究过此书）。特别是，意大利代数学家发现的公式引入了一个新数字，后来被莱昂纳德·欧拉指定为“i”，代表-1的虚数平方根（i²
    = -1）。法国数学家弗朗索瓦·韦达[1]于1591年出版的著作《分析术导论》应在此背景下理解。他在其中发展了他的分析术或符号术，将数字操作扩展到包含字母的符号形式，这些字母指代通用数字，即没有特定值或*不定*的数字。这个术语是**变量**的新术语，尽管在阿拉伯数学中可以找到类似术语的历史痕迹，用于表示代数方程的未知值（几何单位的变量在希腊数学中很常见）。一次和二次方程（其中未知值以一次或二次幂出现）自巴比伦数学以来就已为人所知，但在阿拉伯数学中，这些方程得到了系统研究。在方程或解析表达式的语境中，诸如$2a$这样的项代表任何乘以2的数字，即任何偶数，其中2是系数，$a$是文字部分。在这种情况下，$2a$和$3a$是通用数字，但它们可以相加得到$5a$，也可以相乘得到$6a^2$。因此，文字表达式是更广义上的数字，这一段落蕴含了代数视角的萌芽，在接下来的几个世纪里，它将引领现代代数的抽象结构，直至20世纪发展出的最普遍和抽象的概念。


    在邦贝利的代数学中，我们还发现了括号，它们构成了数学表达式的基础，但其引入可追溯至尼科洛·塔尔塔利亚1556年的《数字与度量通论》[2]。


    1585年，佛兰芒数学家西蒙·斯特文出版了另一本基础著作，题为《论十分之一》，英文意为“The Tenth”。在这本书中，我们使用的十进制系统在所有重要方面都得到了定义：为十进制表示法呈现了四则算术运算的算法，并引入了与我们小数点（或逗号）对应的符号，使得为整数给出的算法可以扩展到分数[3]。这种符号使得统一希腊人的三种不同数字类型（数、部分、比例）成为可能。部分是小数点后有有限位数字的数字，或者是无限但周期有限的数字，而比例的小数点后数字是无限且非周期的。


    在18世纪中叶，我们拥有了：十进制系统、括号、变量、算术运算（及其相关计算算法），以及由拉斐尔·邦贝利提出的计算平方根的算法，该算法与斯特文的十进制符号结合，给出了无限非周期数字。任何非完全平方数（4,
    9, 16, 25, ...）的平方根都有一个无限非周期的数字序列。


    等号由威尔士数学家罗伯特·雷科德于1557年引入，但方程是古代数学中的一个古老主题，在斐波那契的《算盘书》中得到了广泛讨论。总之，Python的大部分符号体系已经具备，但缺少一些重要方面，因此需要我们历史之旅的其他关键步骤来完成其构建。


    1614年，约翰·纳皮尔引入了对数[4]。值$\lg(n)$是使得$e^{\lg(n)} = n$的指数。然而，这并非纳皮尔的原始定义。这种形式归功于莱昂纳德·欧拉，他发现纳皮尔的对数对应于特殊数字$e$的指数。数字“e”被定义为无穷序列$(1
    + \frac{1}{n})^n$的极限，该序列由戈特弗里德·威廉·冯·莱布尼茨在无穷小分析的背景下引入。对数在计算和许多理论进步中是一场伟大的革命，扩展了数学函数的概念。1637年，勒内·笛卡尔引入了坐标，将点简化为数字，将几何关系简化为代数方程。解析几何，其名称与韦达的*分析术*相关联，是数学算术化进程中的划时代一步。


    莱昂纳德·欧拉朝着基于变量的函数一般概念迈出了关键一步[5]。这一概念将在接下来的两个世纪中进一步扩展，但对于其在编程中的使用（函数在其中至关重要），欧拉的概念是完全足够的。函数通过由数字、变量和运算构成的数学表达式来确定。正是这一思想在1920年左右，由阿隆佐·邱奇在数学逻辑的背景下进一步阐述，他引入了lambda表达式，本质上是数学表达式，其中给定表达式中出现的特定变量在其定义中变得无关紧要（用其他变量一致地替换它们不会改变所指的函数）。


    欧拉引入的函数符号的一个重要方面是“应用”。函数$f$应用于参数并产生结果，因此$f(a)$是$f$应用于参数$a$时的结果。在这种情况下，括号括起参数，函数符号放在左括号的左侧。这是一种使用括号的新方式，不同于之前通过定义运算应用顺序来聚合符号的用法。应用和聚合是Python中使用括号的两种方式。正如我们将展示的，方括号和花括号是其他类型的符号聚合和选择。下表总结了上述讨论中考虑的主要数学概念（表2.1）。


    至此，我们已具备下一节介绍Python所需的一切。以下表格列出了一些基础数学著作以及数学符号列表，包括其引入日期和作者。一些著作或符号在上述讨论中未提及，但肯定与算术和编程关系的一般背景相关（表2.2和表2.3）。


    **表2.1 基本数学表示体系**


    | | |

    |---|---|

    | 数字 | |

    | 数词 | |

    | 运算 | |

    | 括号 | |

    | 变量 | |

    | 方程 | |

    | 函数 | |'
