    \ the string. Therefore, the test is realized by searching for the first value\
    \ of $k$ such that in the suffix array, no consecutive sequences have the same\
    \ prefix $k$. This is exactly what is realized by the Python program given in\
    \ Table 6.5.\n\nAbout the 2Log test, let us discuss something strange that suggests\
    \ further investigation into the true notion of randomness. As we already mentioned,\
    \ the string of the first 300 digits of $\\sqrt{2}$ resulted in random according\
