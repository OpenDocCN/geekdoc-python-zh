    # Chapter 3

    Counting Algorithms in Python


    Key statement


    A counting algorithm is realized by a function “succ” that applies to a numeral
    and provides the numeral of the following number. If we apply succ to an initial
    element, denoted by [], we get the numeral of number one, then applying again
    “succ” to it we get the numeral of two, and so on. Therefore, 1000 applications
