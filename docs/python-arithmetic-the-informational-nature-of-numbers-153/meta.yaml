    and:\n\n$$\\sqrt{2} - 1 = x$$\n\ntherefore:\n\n$$\\sqrt{2} = 1 + \\frac{1}{\\\
    frac{1}{\\sqrt{2}-1}}$$\n\nbut:\n\n$$\\frac{1}{\\sqrt{2}-1} = \\sqrt{2} + 1$$\n\
    \nwhence:\n\n$$\\sqrt{2} = 1 + \\frac{1}{1 + \\sqrt{2}}$$\n\nand, by replacing\
    \ $\\sqrt{2}$ in the right member with the left member of the above equation:\n\
    \n$$\\sqrt{2} = 1 + \\frac{1}{1 + 1 + \\frac{1}{1+\\sqrt{2}}}$$\n\nthat is:\n\n\
    $$\\sqrt{2} = 1 + \\frac{1}{2 + \\frac{1}{1+\\sqrt{2}}}$$\n\nand this process\
    \ continues indefinitely, providing what is called an infinite “continued fraction”:\n\
    \n$$\\sqrt{2} = 1 + \\frac{1}{2 + \\frac{1}{2+ ...}}$$\n\ntransforming at any\
    \ step the term 1 of the innermost denominator into 2 and the term $\\sqrt{2}$\
    \ into $\\frac{1}{1+\\sqrt{2}}$, which can be expressed more concisely by:\n\n\
    $$\\sqrt{2} = [1 + \\frac{1}{2+} + \\frac{1}{2+} + \\dots]$$\n\nNow the general\
    \ remark consists in comparing the 300 decimal digits of $\\sqrt{2}$ that do not\
    \ express any underlying rule, giving also a positive 2Log random test, and a\
    \ so perfectly symmetric and regular form of $\\sqrt{2}$ as a continued fraction.\
    \ In other words, the same thing appears random or perfectly ruled, depending\
    \ on the perspective for which it is considered. This suggests that randomness\
    \ is a notion that needs to refer to a theory within which a given object is represented,\
    \ in this sense is an informational concept and a further comprehension of randomness\
    \ can be obtained by finding new links among information, representation, and\
    \ knowledge. Pseudo-randomness, that is random objects generated through deterministic\
