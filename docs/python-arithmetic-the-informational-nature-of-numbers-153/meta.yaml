  mdcn: "## 第六章\n素数、方程与同余\n\n## 核心陈述\n\n数论是算术的高级分支，专门研究素数、同余、丢番图方程、连分数、算术编码等具体问题——这些只是该理论中最著名的几个章节。其主题是整个数学中最深奥、最困难的部分，充满了未解之谜和智力挑战。数论也是最古老的数学学科之一，因为毕达哥拉斯、欧几里得、阿基米德和埃拉托斯特尼都曾被这些领域的探索所吸引。然而，古代最著名的数论学家无疑是亚历山大的丢番图（公元二世纪），而现代数论正是从斐波那契、帕乔利、邦贝利、韦达和费马研究的丢番图著作中迈出第一步的，费马可被视为现代数论的奠基人。长期以来，数论一直被视为纯粹的理论学科，直到19世纪末，它才被公认为密码学及其在信息传输相关应用中的强大工具。沿着费马、梅森、笛卡尔、沃利斯、牛顿、莱布尼茨、欧拉、拉格朗日、勒让德、高斯、雅可比、狄利克雷、黎曼、阿达马、拉马努金、图埃（此处并未穷尽所有）的足迹，众多伟大的数学家活跃在数论领域。在狄利克雷的一项基本发现之后，人们认识到该理论与数学所有最重要的分支密切相关，特别是复数分析揭示了本质的数论性质。本章将从Python算法的角度探讨该理论的一些基本概念，这些算法常常以非常简洁高效的方式表达重要事实。（[1–7]是专门或部分致力于数论的优秀著作）。\n\
    \n## 6.1 素数\n\n自然数在加法和乘法（减法和除法分别是加法和乘法的逆运算）下满足交换律、结合律以及乘法对加法的分配律。这些性质同样适用于有理数、实数和复数。因此，从自然数\
    \ $\\mathbb{N}$ 扩展到整数 $\\mathbb{Z}$、有理数 $\\mathbb{Q}$、实数 $\\mathbb{R}$ 和复数 $\\\
    mathbb{C}$ 时，相同的基本代数框架依然成立。例如，为什么两个负整数的乘积是正数？这一规则源于分配律的保持，因为很容易证明这是确保 $n - (n\
    \ + k) * m = -k * m$ 成立的唯一方式。类似地，为什么数不能被0整除，或者为什么两个数的乘积为零当且仅当其中一个因子为零？同样，我们可以证明这些事实是正确扩展上述代数结构的结果，对于实数或复数，这种结构甚至具有更丰富、更完整的代数一致性（在实数情况下，是连续且完备的有序域结构）。自然数是线性有序的，即任何两个数\
    \ $n, m$ 在数的生成过程中，要么 $m$ 跟随 $n$，要么 $n$ 跟随 $m$。序关系用符号 $<$ 和 $>$ 表示，其中顶点所在一侧的数较小。符号\
    \ $\\le$ 和 $\\ge$ 分别表示“小于等于”和“大于等于”关系。\n\n幂运算和指数运算基于函数 $x^y$，该函数可以自然地扩展到所有类型的数。通常，在幂运算中，指数的值是固定的，底数的值是可变的，此时逆运算是开方（对于任意指数）；而指数运算中，底数是固定的，指数是可变的，此时逆运算是对数（对于任意底数）。圆函数（正弦、余弦、正切、余切、反正弦、反余弦、反正切……）与指数函数在复数系统内的联系是欧拉的一项成就，极大地拓展了数学的视野。\n\
    \n自然数之间的基本关系是整除性。如果除法 $n : m$ 的余数为零，则数 $n$ 可被 $m$ 整除，或者说 $m$ 是 $n$ 的因子。在Python中，整除性很容易用条件表示：\n\
    \n```\nn%m == 0\n```\n\n给定两个数 $n, m$，它们的最大公约数（MCD）是能同时整除它们的最大数。表6.1展示了一个Python程序，实现了欧几里得算法，用于计算两个给定数的最大公约数。\n\
    \n在自然数集合中，素数在整个数系中扮演着关键角色。如果一个数不是两个不同于1的数的乘积，则该数是素数。如果一个数是若干数的乘积，那么其中不同于1或该数本身的那些数被称为该数的真因子（任何数都是自身的因子）。素数没有真因子，而非素数必然有真因子（小于其自身）。如果两个数中任何一个都不是另一个的真因子，则称这两个数互质。素数有无穷多个。这一事实为欧几里得所知，并有许多证明方法。最简单的是反证法。如果素数是有限集，且\
    \ $P$ 是它们的乘积，那么 $P + 1$ 不能被任何素数整除（任何这样的除法都会余1），因此 $P + 1$ 也必须是素数，但这不可能，因为它不同于最初假设的有限素数集中的任何元素（这些元素的乘积是\
    \ $P$）。\n\n素数很容易通过递归定义，因为2是素数，并且如果给定一个素数列表 $L$，其中 $p_m$ 是最大元素，那么一个大于 $p_m$ 的数\
    \ $q$ 可以被添加到 $L$ 中（作为新的最大素数），前提是 $L$ 中没有任何元素是 $q$ 的因子。此外，有一个更简单的条件成立，因为要添加 $q$，只需验证\
    \ $L$ 中所有满足 $p \\le \\sqrt{q}$ 的素数 $p$ 都不是 $q$ 的因子。如果 $q = p \\times p'$，那么两个因子\
    \ $p, p'$ 中至少有一个小于或等于 $\\sqrt{q}$，否则 $p \\times p' > q$，即 $p$ 和 $p'$ 不可能是 $q$\
    \ 的因子。\n\n表6.1 一个计算最大公约数的欧几里得算法的Python程序\n\n```\ndef euclid_mcd(n,m):\n    while\
    \ n%m !=0:\n        r = n%m\n        n = m\n        m = r\n    return m\nn = int(input(\"\
    First number: \"))\nm = int(input(\"Second number \"))\nres = euclid_mcd(n, m)\n\
    print(\"MCD: \" ,res)\n```\n\n表6.2 一个生成素数的Python程序，本质上基于埃拉托斯特尼筛法\n\n```\ndef erathostene(n,\
    \ ll):\n    pp = []\n    qq = []\n    for k in ll:\n        if n % k == 0:\n \
    \           pp.append(False)\n        else: pp.append(True)\n        qq.append(True)\n\
