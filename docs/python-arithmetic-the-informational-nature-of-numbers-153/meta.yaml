  - "[PAGE 94]\n\nthat is univocally associated with the sequence. Any syntactical\
    \ property of the sequence is in this way translated in a suitable arithmetic\
    \ property. In other words, arithmetic encodes the syntax of any language, and\
    \ in particular of a language expressing arithmetic. This characteristic was the\
    \ basis of the incompleteness Gödel’s theorem given in his famous paper in 1931.\
    \ The reflexive nature of arithmetic is the main reason of the incompleteness\
    \ of any axiomatic arithmetic theory (the impossibility of deducing effectively\
    \ all the consequences of the axioms). This reflexivity is based on primality.\n\
    \nEncoding based on congruences and prime numbers is theoretically very important,\
    \ but it becomes computationally prohibitive when the size of sequences and components\
    \ exceeds some values. A class of arithmetic encoding of sequences is based on\
    \ enumeration. This method was introduced by Cantor in the proof that rational\
    \ numbers are 1-to-1 with natural numbers. According to this encoding, a 1-to-1\
    \ correspondence between pairs of numbers and numbers is obtained through a counting\
    \ algorithm where any pair is once counted and all pairs are counted. This idea\
    \ can be realized in many ways, but the essence is that of associating to any\
    \ pair a positive integer measure $\\mu$, for example, the sum of components,\
    \ and then counting first the pairs $(i, j)$ such that $\\mu(i, j) \\le m_1$,\
    \ then the pairs such that $m_1 < \\mu(i, j) \\le m_2$, such that $m_2 < \\mu(i,\
    \ j) \\le m_3$ and so on, for $0 < m_1 < m_2 < m_3 \\dots$ (Within pairs of each\
    \ class, a specific internal order is adopted). Then, the encoding of a pair is\
    \ the step at which it is generated. In general, methods of this kind are based\
    \ on partitions of the infinite set that has to be encoded in finite classes.\
    \ It can be applied to any kind of finite structure, in particular to the infinite\
    \ set of finite sequences of numbers.\n\nCantor’s original encoding was based\
    \ on the arrangement of pairs over an (infinite) square, counting from the leftmost\
    \ uppermost pair of the square, by proceeding to count pairs of diagonals of increasing\
    \ length.\n\n**Table 6.10** A Python program solving the system of congruences\
    \ given above\n\n```\npython\ndef chinese_remainder(n1,n2,n3,m1,m2,m3,n):\n  \
