    # 3.4 Lexicographic Counting Algorithm


    The last kind of counting we consider is based on the lexicographic enumeration
    of strings over a given alphabet. In this case, numerals are the strings and the
    successor function of a numeral is the string immediately following it according
    to the ordering such that a shorter string precedes any longer one, and when strings
    have the same length the first symbols where they differ are compared (symbols
    are considered in a given order) and the string with the preceding symbol will
    precede the other string.


