    \ 1-to-1 with natural numbers. According to this encoding, a 1-to-1 correspondence\
    \ between pairs of numbers and numbers is obtained through a counting algorithm\
    \ where any pair is once counted and all pairs are counted. This idea can be realized\
    \ in many ways, but the essence is that of associating to any pair a positive\
