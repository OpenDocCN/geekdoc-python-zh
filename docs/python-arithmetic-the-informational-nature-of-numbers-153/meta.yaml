    is essentially a set of theorems. These theorems are consequences of some initial
    assertions, called axioms. Euclid''s geometry and Peano''s arithmetic are famous
    examples of axiomatic theories. Theorems are obtained by the axioms by applying
    deductive rules, based on certain mechanisms of logical inference. In a sense,
    we can recognize in the schema of an axiomatic theory the basic schema of counting
    algorithms, where zero corresponds to the set of axioms and the successor function
    corresponds the the deductive rules applied to enlarge the set of theorems obtained
    at a given step (axioms are the theorems at step 0).


    A Post system, on a given alphabet of symbols, is given by an initial set $L_0$
    of strings over the alphabet, and a finite set of inference rules generating a
    language $L \supset L_0$. Any rule has some patterns called premises of the rule,
    and one conclusion. Premises and the conclusion are strings over the alphabet
    of the systems and over some variables ranging on the strings of the alphabet,
    where the variables of the conclusion have to occur in some premise. These rules
    generate strings of $L$ in the following manner. Values are assigned to the variables
    of premises, and if the resulting strings are in $L$, the string obtained by the
    conclusion, when its variables have the same values as the premises, is generated
    in $L$.


    For example, the Post system of alphabet $\{a, b, c\}$ with only one axion $abc$
    and the following rule (premises as numerator and conclusion as the denominator)
    with variables $x, y$:


    $$\frac{xby}{axbbyc}$$


    generates the set of strings having the form $a^n b^n c^n$, with $n \in \mathbb{N}$
    ($s^n$ means $n$ concatenated occurrences of symbol $s$).


    Post systems are equivalent to Turing machines because the following theorem holds.


    **Theorem 7.2** (Post-Turing Equivalence) *A set is recursively enumerable if
    and only if it is generated by a Post system.*


    The proof of this theorem easily follows by translating the instructions of a
    Turing machine program into rules of Post that transform the content of the tape
    (a right movement instruction $qabq''R$ becomes $xqay/xbqy$).


    It is worthwhile to remark that Chomsky''s grammar, later introduced by Noam Chomsky,
    is a particular case of Post systems, which played an essential role in formal
    languages [4] and the syntax of programming languages.


    Table 7.2 shows a Python program generating the language of the Post system given
    above.


