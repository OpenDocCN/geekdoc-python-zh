    list $L$ of primes is given with $p_m$ as the maximum element, a number $q$ greater
    than $p_m$ can be added to $L$ (as new maximum prime) if no element of $L$ is
    a factor of $q$. Moreover, an easier condition holds, because, for adding $q$,
    it is enough to verify that no prime $p \le \sqrt{q}$ in $L$ is a factor of $q$.
