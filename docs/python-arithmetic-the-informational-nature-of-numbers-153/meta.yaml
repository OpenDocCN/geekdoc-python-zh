    \ In any division two possibilities can occur: either the remainder of the division\
    \ at some step is zero, or it is never equal to zero. In this second case, surely\
    \ there is a step where a remainder already obtained in a preceding step occurs\
    \ again, and all the digits of the quotient obtained from the first occurrence\
    \ of this remainder up to the step immediately before its second occurrence repeat\
    \ forever. The sequence of digits that infinitely repeat is called \"period\"\
    , and the fraction dividend/divisor is completely determined by the quotient given\
    \ in the form $\\alpha.\\beta[\\gamma]$, where $\\alpha$ is the sequence of digits\
    \ before decimal dot, $\\beta$ is the sequence of digits after decimal dot and\
    \ before the period, also called anti period, and $[\\gamma]$ demotes the infinite\
    \ sequence of digits where $\\gamma$ is infinitely concatenated with itself.\n\
    \n**Proof** The proof of the theorem follows directly from the fact that any remainder\
    \ has to be less than the divisor. This means that at most $d - 1$ cases can occur\
    \ for the resulting remainder of a division of divisor $d$. Therefore, when at\
    \ most $d$ steps occur, surely a remainder already obtained has to occur again,\
    \ according to the Pigeonhole Principle, where remainders are the objects and\
    \ steps are cells. When a remainder already obtained occurs again, then the steps\
    \ between these two occurrences necessarily repeat, and the quotient digits obtained\
    \ in these steps are the period of division. When the period is long $d - 1$ we\
    \ say that the period is maximal (Table 4.11).\n\n## Table 4.8 A Python program\
