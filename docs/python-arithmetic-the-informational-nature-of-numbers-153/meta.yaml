- md: '## 2.3.3 Tuples, Sets, and Dictionaries


    Tuples are sequences of elements grouped inside parentheses and separated by commas.
    This is a very essential data structure. It is static in the sense that cannot
    change components and size. The elements of a tuple can be selected by positions
    as in strings and lists.


    Sets are expressions built by elements enclosed in braces and separated by commas
    (at many possible levels). They are different from lists in two main features:
    the order of the elements is irrelevant, and the multiplicity of their occurrences
    does not matter. In fact, given a list such as $[a, a, a, b, b]$ the set associated
    to it, and denoted by “$set([a, a, a, b, b])$” is $\{a, b\}$. The empty set is
    $\{\}$ or “$set()$”. Analogously, $set(a, b, \dots, p, q, r)$ is $\{a, b, c, \dots,
    p, q, r\}$. Applying operation $set()$ to a structure $S$, a list, a tuple, a
    string, we get the set of components of the structure (in the case of a string,
    the characters occurring in the string). The operation $add$ is used to add elements
    to a given set. Moreover, usual set-theoretic operations of union, intersection,
    difference, and symmetric difference (union minus intersection) are available
    on sets, denoted by $|$, $\&$, $-$ and $\wedge$ respectively. The membership of
    an element to a set is denoted by “in”, returning a boolean value as a result.


    Dictionaries are finite functions, that is pairs associating a value to certain
    given arguments. “$dict()$” is the empty dictionary and by an equation such as
    “$dict(value) = imagine$,” a new association is added to the dictionary. For example,
    the following equations will define a dictionary.


    ```

    dict() = chapters

    chapters("ch1") = 22

    chapters("ch2") = 12

    chapters("ch3") = 30

    chapters("ch4") = 15

    ```


    The value associated with the variable “chapters” is the following:


    ```

    {"ch1" : 22, "ch2" : 12, "ch3" : 30, "ch4" : 15}.

    ```


    The values that are arguments of a dictionary are called keys. The attribute “.keys()”
    provides the set of keys of a dictionary, and “$haskey()$” is a method that when
    applied to a dictionary returns a boolean value (True if the key is present in
    the dictionary). Any immutable object can be the value of a dictionary, and anything
    can be the image of a key. An immutable object is an object where any accessible
    component of it cannot be changed by any operation. Numbers, strings, and tuples
    are immutable, while lists, sets, and dictionaries are mutable.


    We conclude this short presentation of Python by remarking that any Python object
    has a type. The notion of type is similar to that of class, but it is focused
    on the operations and relations that are defined for the object. Integer, float,
    complex, string, bytes, and bool are primitive types, while list, tuple, set,
    dict, and file are types of structures built on primitive types. An important
    aspect of Python is that variables are used without declaring their types, which
    are deduced by the interpreter of the language from the context of the use of
    the variable. This is a big advantage of flexibility and simplicity in the construction
    of Python statements (elementary texts composing programs).


    A conclusive warning about this chapter is reasonable. These introductory pages
    on Python are not a manual of a programming language. They are essentially an
    introduction to the aspects of Python that we use in the following chapters. In
    a sense, they can be seen as an invitation to Python, which continues in the next
    chapters, using applications of Python to arithmetic. At the same time, Python
    is seen as an invitation to the basic algorithmic aspects of arithmetic. The reader
    can find in [6–11] more systematic and complete introductions to Python.


    However, an important perspective of this introduction, which for many aspects
    is original, consists in explaining that any programming language, in our case
    Python, has to be considered in the wide context of the mathematical language,
    which has a millenary history and is an important part within the symbolic activities
    of human civilizations.


