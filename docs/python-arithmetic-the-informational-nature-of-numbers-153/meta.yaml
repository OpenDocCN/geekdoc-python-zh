    Number2: \"))\nn3 = int(input(\"Number3: \"))\nchinese_remainder(n1,n2,n3,m1,m2,m3,n)\n\
    res = chinese_remainder(n1,n2,n3,m1,m2,m3,n)\nprint(res)\n```"
