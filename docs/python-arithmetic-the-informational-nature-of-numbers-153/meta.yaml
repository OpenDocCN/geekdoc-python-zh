  md: 'Primitive values of Python are integers, strings, float (integers plus a decimal
    part less than 1), bytes, and truth or Boolean values (True and False are the
    constants denoting truth values). A condition gives a truth value as a result
    and holds when its truth value is True. None represents the undefined value. For
    example, if we forget the return instruction in the definition of a function,
    when we call it we obtain None.


    In Python, the types bytes and bool, and the related encoding functions, are closely
    tied to how the language handles data and the representation of information: bytes
    is an immutable data type in Python that represents a sequence of bytes. A bit
    is a binary digit (0 or 1), bytes are 8-bit data units and can represent values
    ranging from 0 to 255. A bytes object is created using the syntax b''...'' or
    the bytes() function. Binary data is represented using the 0b prefix followed
    by a sequence of binary digits (0 and 1).


    ASCII (American Standard Code for Information Interchange) is a set of characters
    and their corresponding numeric representations used for character encoding in
    computing. The ASCII representation of a character is obtained using the “ord()”
    function and vice versa using the “chr()” function. Conversions between data types
    are given by appropriate conversion functions. For instance, we can convert a
    string to bytes using “encode()” or convert bytes to a string using “decode()”.
    Python use also UNICODE (UTF8 standard mostly), which extends ASCII for the internal
    representation of data. When we say character we mean a printable character, represented
    on a screen or on paper with a set of graphical elements that’s called a glyph,
    though the exact details of a graphical realization will depend on the font being
    used. Most Python code doesn’t need to worry about glyphs; figuring out the correct
    glyph to display is generally the job of a GUI toolkit or a terminal’s font renderer.
    A “code point” is the internal representation of a character according to a specific
    encoding. For completeness, we also mention non-printable characters, which do
    not correspond to a glyph, but have a correspondence, possibly in combination
    with others, in terms of action, at some level of execution, when they are decoded
    in specific contexts of their occurrence.


    A command is a text directly producing an action, in a suitable context, while
    an instruction is a text corresponding to an action within the larger text of
    a program, when it is interpreted (or compiled, in the more general cases). Some
    texts can be commands or instructions, depending on their contexts of use.


    “print” is a command or an instruction producing a value given in exit to an interaction
    device (a line of the screen, for example), while “input(x)” means that a value
    put on the input device is assigned to variable x (input is given, for example,
    by the keyboard characters visualized on the screen).


    The programs that are given in this book were developed by Python 3.8.1 (Mac OS
    Monterey) in the IDLE environment (Integrated Development Language Environment).
    Programs are organized in files called modules with the extension “.py”. When
    a module is open in a window, the command RUN (in the upper bar of IDLE) opens
    an interaction window where the input and output appear, with messages of error
    in the case of wrong execution. Writing programs, such as .py files, have IDLE
    online assistance for avoiding basic syntax errors and inaccuracies.'
