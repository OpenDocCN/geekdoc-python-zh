    \ by Gottlob Frege in a fundamental work at the end of the 1800s [17]. The basic\
    \ notions of FOL are predicates and individuals on which predicates express relations:\
    \ $P(a, b)$ is an atomic formula expressing that a relation denoted by $P$ holds\
    \ between two individuals denoted by constants $a, b$. In this way properties\
    \ and relations on any finite sequence of individuals can be expressed (properties\
    \ are expressed by predicates with only one argument).\n\nThe **Negation** of\
    \ $P(a, b)$:\n\n$\\neg\\mathbf{P(a, b)}$\n\nindicates the opposite of $P(a, b)$,\
    \ i.e., its non-validity. The **Disjunction** is a proposition:\n\n$\\mathbf{P(a,\
    \ b)} \\vee \\mathbf{P(b, a)}$\n\nindicating that at least one of the two propositions\
    \ connected by $\\vee$ is true, while the **Conjunction**:\n\n$\\mathbf{P(a, b)}\
    \ \\wedge \\mathbf{P(b, a)}$\n\nindicates that both propositions connected by\
    \ $\\wedge$ are true.\n\n$\\mathbf{P(a, b)} \\rightarrow \\mathbf{P(b, a)}$\n\n\
    is the **Implication** read as “if P(a, b), then P(b, a)” and is equivalent to:\n\
    \n$\\neg\\mathbf{P(a, b)} \\vee \\mathbf{P(b, a)}$\n\nand finally:\n\n$\\mathbf{P(a,\
    \ b)} \\leftrightarrow \\mathbf{P(b, a)}$\n\nis the logical **Equivalence** equal\
    \ to $(\\mathbf{P(a, b)} \\rightarrow \\mathbf{P(b, a)}) \\wedge (\\mathbf{P(b,\
    \ a)} \\rightarrow \\mathbf{P(a, b)})$.\n\nThe symbols $\\neg, \\vee, \\wedge,\
    \ \\rightarrow, \\leftrightarrow$ are called **connectives** (negation, disjunction,\
    \ conjunction, implication, equivalence). Symbols $\\forall$ and $\\exists$ are\
    \ called **quantifiers** (universal, existential).\n\nIf we consider an individual\
    \ variable $x$ (ranging over individuals), then:\n\n$\\forall x P(x, b)$\n\nasserts\
    \ that, for every value $a$ taken by $x$, $P(a, b)$ holds, while\n\n$\\exists\
    \ x P(x, b)$\n\nasserts that there exists a value $a$ of $x$ for which $P(a, b)$\
    \ holds.\n\nA FOL logical calculus, based on Frege's system was determined to\
    \ be able to deduce theorems of PA in a sense very close to arithmetic calculations.\
    \ A mathematical notion of interpretation and model of a theory given in FOL was\
    \ given by assigning meanings to predicates, individual constants, and variables\
    \ over a specified domain of objects (we do not enter into the details). Then,\
    \ a formal definition of logical consequence was given by asserting that a formula\
    \ $\\varphi$ is a logical consequence of a set of formulae $\\Phi$, when any model\
    \ of all formulae $\\Phi$ is also a model of $\\varphi$.\n\nIn 1930 Kurt Gödel\
    \ proved that FOL is complete, in the sense that all the theorems that are logical\
    \ consequences of axioms given in FOL are theorems. FOL Completeness is strongly\
    \ based on the important property of FOL, known as compactness. Namely, a FOL\
    \ theory has a model, that is its axioms are true under an interpretation of its\
