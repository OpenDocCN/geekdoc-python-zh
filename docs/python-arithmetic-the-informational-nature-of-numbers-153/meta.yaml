  md: 'due to Peter Gustav Lejeune Dirichlet, who gave a crucial contribution to the
    arithmetic, by a generalization of Euclid''s theorem about the infinity of prime
    numbers. Namely, Dirichlet proved, by using analytical methods on complex numbers,
    that any arithmetic progression $(a_n|n \in \mathbb{N})$ of type $a_n = bn + c$
    where numbers $b, c$ are relatively prime contains infinite prime numbers (but
    not only prime numbers).


    Dirichlet''s generalization of function is properly stated within set theory,
    because a function $f$ from a set $A$ to a set $B$ is, in its most general setting,
    a set of pairs $(x, y)$ such that $x \in A$ and $y \in B$ and for any $x \in A$
    there exists only one $y \in B$ such that $(x, y) \in f$. But the link between
    functions and sets is even deeper, because the first ideas leading Cantor to his
    notion of abstract set, or set of points, were elaborated when Cantor was studying
    some specific aspects of the functions defined through infinite series of sines
    and cosines (trigonometric series). The abstract notion of set is also the beginning
    of abstract notions of space, defined on sets, and abstract algebraic systems
    too. This means that the Cartesian revolution reducing geometry to algebra extends
    toward a further abstraction level of spaces at many, possibly infinite dimensions,
    and spaces where general notions of continuity, distances, angles, and other spatial
    concepts can be developed that enlarge the horizon of mathematical representation.


    In the context of mathematical logic, Alonzo Church, in 1920 years introduced
    lambda-abstraction that provides a rigorous notation to Euler''s idea of a function
    as a relationship between the values assigned to some variables and the corresponding
    values assumed by a mathematical expression where these variables occur [4]. In
    fact, given a set of constant values, variables ranging in certain sets including
    the elements denoted by the constants, and certain operations defined on these
    sets, if $E(x, y, \ldots, z)$ is an algebraic expression built from these constants,
    variables, and operations, then


    $$\lambda x, y, \ldots z.E(x, y, \ldots, z)$$


    denotes the function associated with the expression $E(x, y, \ldots, z)$, where
    the lambda part on the left of the dot wants to abstract from the particular variables
    that occur in $E(x, y, \ldots, z)$. If $u, v, \ldots w$ are other variables with
    the same variability ranges as the variables $x, y, \ldots, z$, respectively,
    and $a, b, \ldots c$ are constants denoting elements in the ranges of variables,
    then the following equations, by Church called $\alpha$ and $\beta$ rules express
    the meaning of lambda-abstraction:


    $$\lambda x, y, \ldots z.E(x, y, \ldots, z) = \lambda u, v, \ldots w.E(u, v, \ldots,
    w)$$


    $$(\lambda x, y, \ldots z.E(x, y, \ldots, z))(a, b, \ldots) = E(a, b, \ldots,
    c).$$


    What is important for our discussion is that numbers can be defined as special
    functions defined by lambda expressions, and moreover any computation on numbers
    can be completely expressed by a suitable lambda expression. In other words, Python,
    and any other programming language are forms, surely more readable, of lambda
    expressions. In particular, Church proved in 1936 that any Turing machine, which
    is'
