- md: "second period, and so on) associated with the digit. For example, 3°°4°5 is\
    \ the numeral of the second period, at the third sub-period prime, in the fourth\
    \ order in the fifth position of that order. In this case, the numeral is cycle-complete,\
    \ because all levels of cycles are present in it. This means that circles can\
    \ be avoided by associating implicitly to any digit many circles equal to the\
    \ number of digits from it to the rightmost digit. However, if a numeral, such\
    \ as 3°°5, is cycle-incomplete because a one-circled digit is missing, then the\
    \ idea of zero solves this inadequacy by keeping the correspondence between the\
    \ positions of digits and numbers of circles. Zero is a symbol making explicit\
    \ the absence of the digit in a position/cycle level. In this way, the numeral\
    \ 3°°5 becomes 305, and the cycle level can be always assigned correctly to any\
    \ digit of the numeral.\n\nTable 3.3 is the program that provides the circled\
    \ enumeration, while Table 3.4 provides its translation into words.\n\nCircled\
    \ enumeration, obtained as a direct translation of Archimedean counting, deserves\
    \ a reflection on the role of Python in the comprehension of the counting mechanism.\
    \ Python programs shown in Tables 3.2 and 3.3 were the true motivation to write\
    \ the present book. Namely, these programs give strong evidence for the historical\
    \ importance of Archimedes' enumeration system [5]. The list representation of\
    \ numerals used in the program Table 3.2 is directly deduced by Archimedes' idea\
    \ of orders and periods. We start from an initial order of $p$ digits, and then\
    \ $p$ orders provide the first period ($p$ different numerals are generated for\
    \ any numeral of the first order). The second period has $p$ first periods as\
    \ sub-periods. In general, a period of level $i + 1$ has $p$ orders for any numeral\
    \ of level $i$. The Python program Table 3.2 expresses the counting mechanism\
    \ corresponding to this schema of orders and periods.\n\nThe following translation\
    \ program represents the mechanism in terms of a cycle notation with circles as\
    \ exponents of digits, by expressing essentially the linguistic forms of numerals\
    \ of many languages, according to the usual decimal notation. This is a straightforward\
    \ proof of the common basis between the Archimedean system and the modern positional\
    \ systems with zero. Namely, as we already noticed the passage from circles as\
    \ exponents to the digit zero is very intuitive. Thus, Archimedes anticipated\
    \ of many centuries an epochal discovery, and the essence of positional systems\
    \ is in their periodical nature [5], as the theorem of the next section will show.\
    \ Therefore, the generation of circled enumeration through two simple Python programs\
    \ is more eloquent than any theoretical and historical analysis.\n\n## 3.3 X-Counting\
    \ Algorithm\n\nArchimedean counting is strictly related to counting where zero\
    \ is not present, but a symbol X for ten is available. Table 3.5 is the Python\
    \ program of the successor for an X-counting algorithm.\n\nThe first 1000 numerals\
    \ of X-counting are given below.\n\n### Table 3.3 Python program translating the\
    \ Archimedean numerals represented by lists in a circled-based enumeration\n\n\
    ```python\n## Archimedes' Counting\ndef succ(n):\n    if n == []:\n        return\
    \ 1\n    for i in range(9):\n        if n == i:\n            return i+1\n    if\
    \ n == 9:\n        return [1]\n    if len(n) > 1 and n[1] < 9:\n        n[1] =\
    \ n[1]+1\n        return n\n    if len(n) > 1 and n[1] == 9:\n        n[0] = [succ(n[0][0])]\n\
    \        return n[0]\n    if not n in range(10) and len(n) == 1:\n        n =\
    \ [n, 1]\n        return n\n\ndef translate(n):\n    if n == [1]:\n        return\
    \ \"1°\"\n    if n == [2]:\n        return \"2°\"\n    if n == [3]:\n        return\
    \ \"3°\"\n    if n == [4]:\n        return \"4°\"\n    if n == [5]:\n        return\
    \ \"5°\"\n    if n == [6]:\n        return \"6°\"\n    if n == [7]:\n        return\
    \ \"7°\"\n    if n == [8]:\n        return \"8°\"\n    if n == [9]:\n        return\
    \ \"9°\"\n    if len(n) > 1 and n[1] in range(10):\n        m = translate(n[0])\
    \ + str(n[1])\n        return m\n    if len(n) == 1 and len(n[0]) > 1:\n     \
    \   m = translate(n[0][0])+\"°\" + translate([n[0][1]])\n        return m\n  \
    \  if len(n) == 1 and len(n[0]) == 1:\n        return translate(n[0])+\"°\"\n\n\
    def count(ll):\n    for i in range(1,10):\n        print(i, end = \" \")\n   \
