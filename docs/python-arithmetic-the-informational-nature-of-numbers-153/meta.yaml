    \ a geometric one with a ratio very close to the unit, in such a way that the\
    \ two progressions can be synchronized with a good approximation, with the advantage\
    \ that the multiplications on numbers of the arithmetic progression correspond\
    \ to sums of the corresponding elements of the geometric progression.\n\nInfinitesimals\
    \ are infinite sequences of numbers indexed by natural numbers such that for increasing\
    \ values of the indices the numbers of the sequence decrease their absolute values\
    \ approaching zero. Such sequences can be considered numbers when usual arithmetical\
    \ operations are extended to them. An important warning is necessary for having\
