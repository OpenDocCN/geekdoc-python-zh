    \ symbols for predicates, individual constants, and variables.\n\n> **Theorem\
    \ 6.6** (Skolem Theorem) *if a FOL theory has a model, then it has an arithmetic\
    \ model, that is, a model where individuals are natural numbers and predicates\
    \ are interpreted as relations over numbers.*\n\nSkolem theorem has a deep arithmetic\
    \ relevance and raises several questions that are very important in many applications\
