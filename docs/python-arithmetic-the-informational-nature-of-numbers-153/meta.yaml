    \ - 7.2 Post Systems\n  - 7.3 Python Iterators\n  - 7.4 Arithmetic, Computability\
    \ and Logic\n  - References\n- Index"
  mdcn: "大数据研究 153\n\nVincenzo Manca\n\n## Python 算术\n\n数字的信息本质\n\n![](img/91a834191624ed3fb862c63b86d8b589_0_0.png)\n\
    \n## 大数据研究\n\n第 153 卷\n\n**丛书编辑**\nJanusz Kacprzyk，波兰科学院，华沙，波兰\n\n“大数据研究”（SBD）丛书旨在快速、高质量地发布大数据各个领域的新进展和发展。其目的是涵盖嵌入在工程、计算机科学、物理学、经济学和生命科学领域的大数据理论、研究、开发和应用。本丛书的书籍涉及对来自传感器或其他物理仪器以及模拟、众包、社交网络或其他互联网交易（如电子邮件或视频点击流等）的最新数字源生成的大型、复杂和/或分布式数据集的分析和理解。本丛书包含大数据领域的专著、讲义和编辑卷，涵盖计算智能领域，包括神经网络、进化计算、软计算、模糊系统，以及人工智能、数据挖掘、现代统计学和运筹学，以及自组织系统。对贡献者和读者都特别有价值的是其短暂的出版周期和全球发行，这使得研究成果能够广泛而迅速地传播。\n\
    \n本丛书的书籍经过单盲同行评审流程。\n\n由 SCOPUS、EI Compendex、SCIMAGO 和 zbMATH 索引。\n\n本系列出版的所有书籍均提交至\
    \ Web of Science 进行评审。\n\nVincenzo Manca\n\n## Python 算术\n\n数字的信息本质\n\n![](img/91a834191624ed3fb862c63b86d8b589_3_0.png)\n\
    \nVincenzo Manca\n计算机科学系\n维罗纳大学\n维罗纳，意大利\n\nISSN 2197-6503\n大数据研究\nISBN 978-3-031-66544-8\n\
    https://doi.org/10.1007/978-3-031-66545-5\n\nISSN 2197-6511 (电子版)\nISBN 978-3-031-66545-5\
    \ (电子书)\n\n© 编者（如适用）和作者，根据与 Springer Nature Switzerland AG 2024 签订的独家许可协议\n\n\
    本作品受版权保护。所有权利均由出版商独家许可，无论涉及材料的全部还是部分，特别是翻译、重印、插图重用、朗诵、广播、在微缩胶片或任何其他物理方式上复制，以及信息存储和检索、电子改编、计算机软件，或通过现在已知或未来开发的类似或不同方法进行传输的权利。\n\
    在本出版物中使用通用描述性名称、注册名称、商标、服务标志等，即使没有具体声明，也并不意味着这些名称不受相关保护性法律法规的约束，因此可以自由使用。\n出版商、作者和编辑有理由相信，本书中的建议和信息在出版之日是真实和准确的。无论是出版商还是作者或编辑，对于本文所含材料或可能存在的任何错误或遗漏，均不提供任何明示或暗示的保证。出版商对已出版地图中的管辖权主张和机构隶属关系保持中立。\n\
    \n本 Springer 印记由注册公司 Springer Nature Switzerland AG 出版\n注册公司地址为：Gewerbestrasse\
    \ 11, 6330 Cham, Switzerland\n\n如果处置本产品，请回收纸张。\n\n本书献给我的祖父母和孙辈。\n\n## 前言\n\n本书旨在从最熟悉的初等算术算法入手介绍\
    \ Python 编程语言，同时揭示数字的一些深层方面，这些方面在学习之初就已存在，例如整个算术所基于的计数过程。例如，简单的 Python 程序揭示了与叙拉古的阿基米德所阐述的数制直接相关的计数过程，与我们的十进制系统和零的概念密切相关。\n\
    \nPython 与算术的联系与数学的算术化有关，这是一个漫长的过程，从莱昂纳多·斐波那契在欧洲引入十进制表示法，到数学逻辑，可计算性理论正是从数学逻辑中产生的。Python\
    \ 是沿此过程发展的数学符号的综合。这就是它在表达基本算术算法方面具有天然适应性的原因。Python 所基于的函数概念本质上归功于莱昂纳多·欧拉，后来在 1930\
    \ 年代由阿隆佐·邱奇形式化。\n\n总之，“Python 算术”是对编程、算术和逻辑之间深层联系的思考。\n\n本书提供了具体的例子，表明数学传统对于深刻理解最现代信息技术背后的主要思想的重要性。\n\
    \n维罗纳，意大利\n\nVincenzo Manca\n\n**致谢** 我向 2002 年至 2019 年间维罗纳大学计算机科学系的学生和同事们表示感谢。\n\
    \n## 目录\n\n- 1 数字时代的起源\n  - 1.1 数字、算术与控制论\n  - 参考文献\n- 2 数学符号与 Python\n  - 2.1\
    \ 从分析术到 Python 表达式\n  - 2.2 Python 基础\n  - 2.3 Python 数据结构\n    - 2.3.1 列表\n \
    \   - 2.3.2 面向对象编程\n    - 2.3.3 元组、集合和字典\n  - 参考文献\n- 3 Python 中的计数算法\n  - 3.1\
    \ 十进制计数算法\n  - 3.2 周期性计数\n  - 3.3 X-计数算法\n  - 3.4 字典序计数算法\n  - 3.5 周期性计数原理\n \
    \ - 参考文献\n- 4 算术运算\n  - 4.1 加法和减法\n  - 4.2 乘法和除法\n  - 4.3 表运算\n  - 4.4 运算连接\n\
    - 5 平方根算法\n  - 5.1 简单平方根算法\n  - 5.2 邦贝利的平方根算法\n  - 5.3 牛顿和插值算法\n  - 5.4 平方根算法与\
    \ π\n  - 5.5 平方根与对数\n  - 参考文献\n- 6 素性、方程、同余\n  - 6.1 素数\n    - 6.1.1 渐近分析与素数分布\n\
    \    - 6.1.2 2Log 随机信息测试\n  - 6.2 丢番图方程\n  - 6.3 同余与算术编码\n  - 6.4 算术与逻辑\n  - 参考文献\n\
    - 7 符号计算\n  - 7.1 图灵机\n  - 7.2 波斯特系统\n  - 7.3 Python 迭代器\n  - 7.4 算术、可计算性与逻辑\n\
    \  - 参考文献\n- 索引"
