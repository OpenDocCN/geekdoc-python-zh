- md: "Studies in Big Data 153\n\nVincenzo Manca\n\n## Python Arithmetic\n\nThe Informational\
    \ Nature of Numbers\n\n![](img/91a834191624ed3fb862c63b86d8b589_0_0.png)\n\n##\
    \ Studies in Big Data\n\nVolume 153\n\n**Series Editor**\nJanusz Kacprzyk, Polish\
    \ Academy of Sciences, Warsaw, Poland\n\nThe series “Studies in Big Data” (SBD)\
    \ publishes new developments and advances in the various areas of Big Data– quickly\
    \ and with a high quality. The intent is to cover the theory, research, development\
    \ and applications of Big Data, as embedded in the fields of engineering, computer\
    \ science, physics, economics and life sciences. The books of the series refer\
    \ to the analysis and understanding of large, complex and/or distributed data\
    \ sets generated from recent digital sources coming from sensors or other physical\
    \ instruments as well as simulations, crowd sourcing, social networks or other\
    \ internet transactions, such as emails or video click streams and other. The\
    \ series contains monographs, lecture notes and edited volumes in Big Data spanning\
    \ the areas of computational intelligence including neural networks, evolutionary\
    \ computation, soft computing, fuzzy systems, as well as artificial intelligence,\
    \ data mining, modern statistics and Operations research, as well as self-organizing\
    \ systems. Of particular value to both the contributors and the readership are\
    \ the short publication timeframe and the world-wide distribution, which enable\
    \ both wide and rapid dissemination of research output.\n\nThe books of this series\
    \ are reviewed in a single blind peer review process.\n\nIndexed by SCOPUS, EI\
    \ Compendex, SCIMAGO and zbMATH.\n\nAll books published in the series are submitted\
    \ for consideration in Web of Science.\n\nVincenzo Manca\n\n## Python Arithmetic\n\
    \nThe Informational Nature of Numbers\n\n![](img/91a834191624ed3fb862c63b86d8b589_3_0.png)\n\
    \nVincenzo Manca\nDepartment of Computer Science\nUniversity of Verona\nVerona,\
    \ Italy\n\nISSN 2197-6503\nStudies in Big Data\nISBN 978-3-031-66544-8\nhttps://doi.org/10.1007/978-3-031-66545-5\n\
    \nISSN 2197-6511 (electronic)\nISBN 978-3-031-66545-5 (eBook)\n\n© The Editor(s)\
