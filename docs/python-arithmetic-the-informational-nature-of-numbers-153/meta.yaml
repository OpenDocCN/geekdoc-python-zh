    \nIt is easy to verify that the X-counting algorithm is equivalent to the Archimedean\
    \ counting algorithm. In fact, in X-numerals the cycle level of a digit corresponds\
    \ to the number of X occurring to the right of the digit. Even in this case the\
    \ function “succ” is defined by recurrence (lines 14–21 of Table 3.5).\n\n## 3.4\
    \ Lexicographic Counting Algorithm\n\nThe last kind of counting we consider is\
    \ based on the lexicographic enumeration of strings over a given alphabet. In\
    \ this case, numerals are the strings and the successor function of a numeral\
    \ is the string immediately following it according to the ordering such that a\
    \ shorter string precedes any longer one, and when strings have the same length\
    \ the first symbols where they differ are compared (symbols are considered in\
    \ a given order) and the string with the preceding symbol will precede the other\
    \ string.\n\nThe program in Table 3.6 shows the Python program computing the successor\
    \ of the lexicographic counting. We remark that the successor function of this\
    \ counting is similar to that of X-counting.\n\nThe first 500 strings over digits\
    \ {1, 2, 3, 4, 5, 6, 7, 8, 9, X} in lexical order are given below. This counting\
    \ is the most economical. In fact, in 1000 steps it uses a proper fraction of\
    \ all possible strings shorter than 3, while X-numeration or even decimal numeration\
