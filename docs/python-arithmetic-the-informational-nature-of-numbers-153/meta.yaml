    Initial state: \"))\nturing(program, state, tape)\n```\n\n### 7.2 波斯特系统\n\n在1940年代初，美国数学家埃米尔·波斯特写了几篇论文，他在其中引入了一类符号系统，旨在表达数学逻辑演绎系统的本质。这些系统在数学中非常常见，它们定义理论，表示对某类对象成立的断言。一个理论"
