    # GEOSYNC


    Satellites orbit the Earth with an orbital period based on their distance from
    the Earth. The International Space Station is about 410 km up, and it takes about
    an hour and a half to complete each orbit, whereas the Moon is about 385,000 km
    away, and it takes roughly 27 days to complete one orbit.


    Geosynchronous satellites orbit between these two extremes, at an altitude of
    about 35,786 km, where each orbit takes exactly one day. They are located above
    the equator, orbiting in the same direction that the Earth spins, with the result
    that they appear to stay in one spot above the Earth all the time.


    This program asks for the location on the Earth of an antenna that is to be aimed
    at a geosynchronous satellite located at some specific longitude above the equator,
    and calculates how to aim it. Azimuth is the angle away from north along the horizon,
    where east is 90 degrees, south is 180 degrees, and so on. Elevation angle is
    up from the horizon, where 90 degrees would be directly overhead.


    The sign of longitudes should match Google Maps locations. So west longitudes,
    such as in all of North America, are negative numbers, and satellites with a west
    longitude location are also to be entered as negative numbers.


    For example, an antenna located in Roswell, NM is at 33.376 degrees north, and
    104.508 degrees west. The goal is to aim it at the GOES-15 weather satellite located
    at 127.8 degrees west longitude. Edit these values into the main part of the program
    (below the function definition, where the code is not indented) as shown in the
    example.


    The program calculates that the antenna should be aimed south-west at 218.0 degrees
    azimuth, and at an elevation of 43.8 degrees up from the horizon.'
