  md: '# FUTURVAL


    Saving up for something you want to purchase in the future is a great way to make
    your money go further. The money accumulates at some interest rate, instead of
    having to pay out interest on a loan, so you basically save in two ways. This
    program lets you experiment to see just how much you''ll save, and to help you
    stay on target as you invest in yourself.


    You are prompted for the amount of money you can provide each month, the annual
    interest rate that the money will accumulate more value, and the number of years
    to tally the total. The future value is output. In the example shown, $50 is put
    away each month, at an accumulating annual interest rate of 7%, and the future
    value after 3 years, totalling $1996.50 is output.


    ![](img/8936d0646085e4f7f233755960035de6_123_0.png)


    ```

    dp=float(input("\nMonthly deposit: "))

    ir=float(input("Interest rate: "))

    yr=float(input("Years: "))

    ir/=1200

    mo=yr*12

    fv=dp*((ir+1)**mo-1)/ir

    print("\nFuture value: ${:,.2f}".format(fv))

    ```'
