  - '[PAGE 29]


    # DELTAWYE


    When you run this program, nothing happens. Okay, a little explanation is in order.
    As explained early in this book, a simple and straightforward way to add powerful
    functions to your calculator is to simply define functions in a program that you
    can use over and over while working on some relevant problems. In this case, two
    functions are defined at run time, delta() and wye(), and they remain in the shell
    ready for your use.


    You can type in these functions along with the parentheses that follow them, but
    a nice quick way to access them is to choose 4:Vars from the Tools menu. Choose
    a function from the list that shows, then you''ll be able to type in its parameters.


    ![](img/8936d0646085e4f7f233755960035de6_29_0.png)


    The delta() function converts resistances in a wye configuration to an equivalent
    delta configuration. The wye() function does the exact opposite conversion to
    output a wye configuration equivalent to a delta delta configuration you pass
    to it.'
  - '[PAGE 30]


    Both of these functions also work for complex number impedances, as demonstrated
    in the examples. This is a powerful feature for more advanced electronics analysis.


    The delta configuration is called that because the three resistors are arranged
    in a triangle, although circuit diagrams often show them in more of a pi arrangement,
    as shown here on the left. Notice that if you "pull together" the bottoms of RB
    and RC, a triangle, or "delta" is formed.


    ![](img/8936d0646085e4f7f233755960035de6_30_0.png)


    Similarly, the wye configuration is often shown as more of a "T" arrangement,
    as shown here on the right. Just imagine the center point between R1, R2, and
    R3 pulled down a bit and you''ll see the "Y", or wye shape.


    The delta() function uses the following equations to find values for RA, RB, and
    RC that form an equivalent set of resistances, or impedances, when given R1, R2,
    and R3.'
  - '[PAGE 31]


    $$RA = \frac{R1 \cdot R2 + R1 \cdot R3 + R2 \cdot R3}{R1}$$


    $$RB = \frac{R1 \cdot R2 + R1 \cdot R3 + R2 \cdot R3}{R2}$$


    $$RC = \frac{R1 \cdot R2 + R1 \cdot R3 + R2 \cdot R3}{R3}$$


    The wye() function uses the following equations to find values for R1, R2, and
    R3 that form an equivalent set of resistances, or impedances, when given RA, RB,
    and RC.'
- md: "## FREQWAVE\n\nThe electromagnetic spectrum covers a wide range of phenomena,\
    \ such as radio waves, x-rays, visible light, infra-red light, microwaves, and\
    \ so on. Each of these features falls into a band of frequencies, each frequency\
    \ has a specific wavelength, and they all travel in free space at the speed of\
    \ light.\n\nFrequency in hertz and wavelength in meters are the exact inverse\
    \ of each other. They are both a function of the speed of light. Here's the simplest\
    \ equation that ties all this together, where C is the speed of light:\n\n![](img/8936d0646085e4f7f233755960035de6_35_0.png)\n\
    \nMost of the time, wavelength and frequency are expressed in engineering notation,\
    \ where the power of ten is a multiple of three. This notation converts easily\
    \ to prefixes such as kilo, Mega, nano, and others, making it easier to grasp\
    \ the magnitude of the value. The first two functions in this program, named logb()\
    \ and eng(), work together to format numbers into engineering notation with any\
    \ desired number of significant digits. You might want to isolate these functions\
    \ into a file for use in other programs you create.\n\n```\nfrom math import *\n\
    \ndef logb(x,b):\n    return log(x)/log(b)\n\ndef eng(x,d):\n    x=abs(x)\n  \
    \  if x==0:\n        return \"0.0\"\n    exp=floor(logb(x,10))\n    mant=x/10**exp\n\
    \    r = round(mant,d-1)\n    x = r*pow(10.0,exp)\n    p = int(floor(logb(x,10)))\n\
    \    p3 = p//3\n    value=x/pow(10.0,3*p3)\n    s=\"{:f}\".format(value)\n   \
    \ if s[d]!=\".\":\n        s=s[0:d+1]\n    else:\n        s=s[0:d]\n    if p3!=0:\n\
    \        return \"{}e{:d}\".format(s,3*p3)\n    else:\n        return \"{}\".format(s)\n\
    ```\n\n```\nc,f,w=299792458,0,0\nprint(\"\\nEnter known value...\")\nf=input(\"\
    Frequency: \")\nf=float(f) if f else 0\nif f==0:\n    w=input(\"Wavelength (m):\
    \ \")\n    w=float(w) if w else 0\nif w!=0:\n    f=c/w\nif f!=0:\n    w=c/f\n\
    digits=5\nprint(\"\\nFrequency:\")\nprint(\"{} Hz\".format(eng(f,digits)))\nprint(\"\
    \\nWavelength:\")\nprint(\"{} meters\".format(eng(w,digits)))\n```\n\nThis program\
    \ prompts for a frequency, then for a wavelength if you skip frequency by pressing\
    \ [enter] without entering a number. The unknown value in either case is calculated,\
    \ both values are formatted into engineering notation, and the results are output\
    \ to your calculator's display.\n\nTwo example runs are shown, the first where\
    \ a frequency is the known, and second where a wavelength is the known value.\
    \ In the first example the frequency of the Helium \"People's Network\" for the\
    \ Internet of Things (IOT) is entered to calculate its wavelength. 915 megahertz\
    \ has a wavelength of a little less than a third of a meter.\n\n![](img/8936d0646085e4f7f233755960035de6_37_0.png)\n\
    \nIn this second example we skip the frequency input and then enter 5 to calculate\
    \ the frequency when the wavelength is exactly 5 meters. The frequency is just\
    \ a tad less than 60 megahertz.\n\nNote that the variable named digits, near the\
    \ end of the program, is set to five. Change this value if you want higher or\
    \ lower precision in your answers.\n\n![](img/8936d0646085e4f7f233755960035de6_38_0.png)\n\
    \nFor easy reference, here's a list of the metric prefixes for the various engineering\
    \ notation powers of ten:\n\n| Symbol | Name | Value | Symbol | Name | Value |\n\
    | :--- | :--- | :--- | :--- | :--- | :--- |\n| Y | Yotta | 10^24 | y | yocto |\
    \ 10^-24 |\n| Z | Zetta | 10^21 | z | zepto | 10^-21 |\n| E | Exa | 10^18 | a\
    \ | atto | 10^-18 |\n| P | Peta | 10^15 | f | femto | 10^-15 |\n| T | Tera | 10^12\
    \ | p | pico | 10^-12 |\n| G | Giga | 10^9 | n | nano | 10^-9 |\n| M | Mega |\
    \ 10^6 | μ | micro | 10^-6 |\n| k | kilo | 10^3 | m | milli | 10^-3 |\n\n## LED_RES\n\
    \nLEDs are awesome. Once you know how to power them properly, you can light up\
    \ all kinds of fun artwork, gadgets, and inventions in any color and blinking\
    \ patterns imaginable. For example, the author invented a brake light for bicycles\
    \ that requires no wiring to the brakes at all, instead relying on an accelerometer\
    \ chip to determine when to flash bright red LEDs to indicate deceleration. Check\
    \ out LucidBrakes online.\n\nAn LED is a special type of diode, where current\
    \ flows easily in one direction through it, and not in the other direction. To\
    \ light up an LED you need to use a resistor to limit the amount of current allowed\
    \ to flow in the \"easy\" direction. This program helps you calculate the size\
    \ of that resistor. It also helps determine the current and power requirements,\
    \ to make sure no magic smoke is emitted from anything!\n\nThe standard way to\
    \ wire up an LED is with a resistor in series, and a voltage source powering them\
    \ both:\n\n![](img/8936d0646085e4f7f233755960035de6_40_0.png)\n\nHere are the\
    \ equations that tie together all the calculations we'll need in the program,\
    \ where Vs is the source voltage, Vf is the forward voltage across the LED, Vr\
    \ is the voltage across the resistor, i is the current in amps through everything,\
    \ Wr is the watts of power in the resistor, and Wf is the watts of power in the\
    \ LED.\n\n$V_s = V_r + V_f$\n\n$V_r = R \\times i$\n\n$W_r = i \\times V_r$\n\n\
    $W_f = i \\times V_f$\n\nHere's the program listing:\n\n```\ndef led_resistor(Vs,Vf,i):\n\
    \    r=(Vs-Vf)/i\n    Rw=(Vs-Vf)*i\n    Lw=Vf*i\n    return [r,Rw,Lw]\n\ndef led_current(Vs,Vf,r):\n\
    \    i=(Vs-Vf)/r\n    Rw=(Vs-Vf)*i\n    Lw=Vf*i\n    return [i,Rw,Lw]\n\nVs=float(input(\"\
    \\nSource Vs: \"))\nVf=float(input(\"LED Vf: \"))\nprint(\"\\nNow enter one of\
    \ these two...\")\ni=input(\"\\nCurrent in amps: \")\ni=float(i) if i else 0\n\
    r=input(\"LED resistor in ohms: \")\nr=float(r) if r else 0\nif i:\n    r,Rw,Lw=led_resistor(Vs,Vf,i)\n\
    else:\n    i,Rw,Lw=led_current(Vs,Vf,r)\nprint(\"\\nVs: \",Vs)\nprint(\"Vf: \"\
    ,Vf)\nprint(\"R: {} ohms\".format(r))\nprint(\"i: {} amps\".format(i))\nprint(\"\
    Rw: {} watts\".format(Rw))\nprint(\"Lw: {} watts\".format(Lw))\n```\n\nThe following\
    \ two example runs first find the approximate value for a resistor when the current\
    \ is known, and the second example calculates the current when a standard resistor\
    \ is selected for the circuit.\n\nIn both cases you enter the source voltage and\
    \ the LED forward voltage (this Vf varies for LED types), and then enter either\
    \ the current in amps or the resistor value in ohms.\n\n![](img/8936d0646085e4f7f233755960035de6_42_0.png)\n\
    \n![](img/8936d0646085e4f7f233755960035de6_43_0.png)\n\nFor a circuit powered\
    \ with 12 volts, an LED with a forward voltage drop of 2.4 volts with 25 mA of\
    \ current through it requires an approximate resistor size of 384 ohms.\n\nThe\
    \ next run, with a voltage source of 9 volts and an LED forward voltage drop of\
    \ 2.3 volts and a standard resistor value of 270 ohms, results in a current of\
    \ about 24.8 milliamps."
  mdcn: "## FREQWAVE\n\n电磁波谱涵盖了广泛的现象，例如无线电波、X射线、可见光、红外光、微波等。这些现象中的每一种都属于一个频段，每个频率都有一个特定的波长，并且它们在自由空间中都以光速传播。\n\
    \n以赫兹为单位的频率和以米为单位的波长互为精确的倒数。它们都是光速的函数。以下是将所有这些联系在一起的最简单方程，其中C是光速：\n\n![](img/8936d0646085e4f7f233755960035de6_35_0.png)\n\
    \n大多数情况下，波长和频率以工程记数法表示，其中10的幂是3的倍数。这种记数法可以轻松转换为千、兆、纳等前缀，从而更容易理解数值的大小。本程序中的前两个函数，名为`logb()`和`eng()`，协同工作，将数字格式化为具有任意所需有效位数的工程记数法。你可能希望将这些函数单独放入一个文件中，以便在你创建的其他程序中使用。\n\
    \n```\nfrom math import *\n\ndef logb(x,b):\n    return log(x)/log(b)\n\ndef eng(x,d):\n\
    \    x=abs(x)\n    if x==0:\n        return \"0.0\"\n    exp=floor(logb(x,10))\n\
    \    mant=x/10**exp\n    r = round(mant,d-1)\n    x = r*pow(10.0,exp)\n    p =\
    \ int(floor(logb(x,10)))\n    p3 = p//3\n    value=x/pow(10.0,3*p3)\n    s=\"\
    {:f}\".format(value)\n    if s[d]!=\".\":\n        s=s[0:d+1]\n    else:\n   \
    \     s=s[0:d]\n    if p3!=0:\n        return \"{}e{:d}\".format(s,3*p3)\n   \
    \ else:\n        return \"{}\".format(s)\n```\n\n```\nc,f,w=299792458,0,0\nprint(\"\
    \\nEnter known value...\")\nf=input(\"Frequency: \")\nf=float(f) if f else 0\n\
    if f==0:\n    w=input(\"Wavelength (m): \")\n    w=float(w) if w else 0\nif w!=0:\n\
    \    f=c/w\nif f!=0:\n    w=c/f\ndigits=5\nprint(\"\\nFrequency:\")\nprint(\"\
    {} Hz\".format(eng(f,digits)))\nprint(\"\\nWavelength:\")\nprint(\"{} meters\"\
    .format(eng(w,digits)))\n```\n\n此程序会提示输入频率，如果你通过按[回车]键而不输入数字来跳过频率输入，则会提示输入波长。无论哪种情况，未知值都会被计算出来，两个值都会被格式化为工程记数法，结果会输出到你的计算器显示屏上。\n\
    \n示例运行展示了两次，第一次是已知频率，第二次是已知波长。在第一个示例中，输入了氦“人民网络”物联网的频率来计算其波长。915兆赫的波长略小于三分之一米。\n\
    \n![](img/8936d0646085e4f7f233755960035de6_37_0.png)\n\n在第二个示例中，我们跳过频率输入，然后输入5，以计算波长恰好为5米时的频率。频率略低于60兆赫。\n\
    \n请注意，程序末尾附近名为`digits`的变量被设置为五。如果你希望答案具有更高或更低的精度，请更改此值。\n\n![](img/8936d0646085e4f7f233755960035de6_38_0.png)\n\
    \n为方便参考，以下是各种工程记数法10的幂对应的公制前缀列表：\n\n| 符号 | 名称 | 值 | 符号 | 名称 | 值 |\n| :--- | :---\
    \ | :--- | :--- | :--- | :--- |\n| Y | Yotta | 10^24 | y | yocto | 10^-24 |\n\
    | Z | Zetta | 10^21 | z | zepto | 10^-21 |\n| E | Exa | 10^18 | a | atto | 10^-18\
    \ |\n| P | Peta | 10^15 | f | femto | 10^-15 |\n| T | Tera | 10^12 | p | pico\
