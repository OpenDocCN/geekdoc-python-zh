  md: '# WNDCHILL


    When the wind blows, the air feels colder due to faster draining of heat from
    your body. There''s a standard calculation for this wind chill factor, and this
    program handles it for you.


    Enter the actual air temperature in degrees F, and the wind speed in miles per
    hour. The wind chill index is output. For example, at 30 mph, a real air temperature
    of 25 F feels the same as 8 F.


    ![](img/8936d0646085e4f7f233755960035de6_197_0.png)


    ```

    f=float(input("\nTemp (F): "))

    w=float(input("Wind (mph): "))

    v=w**.16

    wc=35.74+.6215*f-35.75*v+.4275*f*v

    print("\nWind Chill Index:",round(wc))

    ```'
