  md: '# WET_BULB


    Recent news headlines talk about the dangers of people overheating and even dying
    around the planet as climate change causes an increasing number of excessive heat
    events. It is a real problem. Air temperature is one thing to be concerned about,
    but even more important is what''s called wet bulb temperature, the combined effect
    of temperature and relative humidity.


    We sweat to cool off. As water evaporates from a surface, its temperature drops.
    With low relative humidity the cooling effect is greater, and with higher relative
    humidity the evaporation is slowed down and it''s harder to cool off. A hot but
    dry desert can be less dangerous to human life than a hot, humid, urban environment!


    A psychrometer measures wet bulb temperature. A small tube of wet cloth is wrapped
    around the bulb end of a thermometer, and it is swung through the air to maximize
    evaporation. There''s a limit to how much cooler this thermometer can get due
    to evaporation, and that is the wet bulb temperature. The wet bulb temperature
    is a function of both the actual air temperature and relative humidity.


    Now here''s the dangerous thing. If the wet bulb temperature is higher than body
    temperature, no matter how much you sweat or how fast a fan you have blowing on
    you, it''s impossible to cool down from evaporation. That''s why it''s important
    to know the wet bulb temperature when it''s hot!


    There''s a very complicated math formula for calculating wet bulb temperature
    when air temperature and relative humidity are known. Unlike with most algorithms,
    this equation was actually discovered by an artificial intelligence program. The
    story is way too complicated to go into here, but if you''re interested search
    around on the Internet to learn more. This program uses the equation to calculate
    wet bulb temperature. Additionally, if you know any two of the three factors;
    air temperature, relative humidity, and wet bulb temperature, this program will
    calculate the third unknown.


    Three functions are demonstrated when you run this program, all using the same
    set of numbers. If the air temperature is 30C, and the relative'
