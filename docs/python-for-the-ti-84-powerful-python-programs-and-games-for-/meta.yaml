- md: "# Python for the TI-84\n\nPowerful Python programs and games for the TI-84\
    \ Plus CE Python graphing calculator\n\nby John Clark Craig\n\n![](img/8936d0646085e4f7f233755960035de6_0_0.png)\n\
    \n# Table of Contents\n\nAcknowledgements\n\n[Introduction](Introduction)\n\n\
    # Programs\n\n[1. Calendar Functions](1.%20Calendar%20Functions)\n\n- CALENDAR\n\
    - DATE\n- DATEPLUS\n- DAYSDATS\n- JULIAN\n\n[2. Electronics](2.%20Electronics)\n\
    \n- AVGPKRMS\n- BRIDGE\n- DELTAWYE\n- FREQWAVE\n- LED_RES\n- OHMSLAW\n- PARALLEL\n\
    - RCTIMING\n- SERIES\n- ZROUND\n\n[3 Games and Chance](3%20Games%20and%20Chance)\n\
    \n- DECKCRDS\n- DICE\n- DIGITS\n- FACTCBPM\n- HEADSROW\n- HUNT_DIR\n- HUNT_DIS\n\
    - JUMBLE\n- MAZE\n- MEMORY\n- MNTYHALL\n- PI_BUFFN\n- PI_DARTS\n- RNDBYTE\n- WORDPERM\n\
    \n# 4. GPS and Navigation\n\n- GPS_AREA\n- GPS_DIST\n- MIDPOINT\n- NAVIGATE\n\n\
    # 5. Money and Finance\n\n- DEPOSITS\n- FUTURVAL\n- INTEREST\n- MONTHS\n- PAYMENTS\n\
    - PRNCIPAL\n\n# 6. Numerical Calculations\n\n- BINHXDEC\n- BINSRCH\n- FACTORS\n\
    - FIBONACC\n- GCD_LCM\n- GLDRATIO\n- NEWTON\n- PRIMES\n- QUADRATC\n- REC_POLR\n\
    - SIMULTEQ\n- VECTORS\n\n# 7. Other Useful Programs\n\n- CONCRETE\n- CRICKETS\n\
    - LASERDIS\n- MPH\n- SECRET\n- WAIT_KEY\n- WET_BULB\n- WNDCHILL\n\n# 8. Plane\
    \ Geometry\n\n- ARCS\n- AREA_3P\n- AREA_3S\n- AREA_PTS\n- CIRCLE3P\n- DISTANCE\n\
    - DIVLINE\n- LINE_2P\n- LINSLOPE\n- TRANSFRM\n- TRIANG3P\n- TRIANGLE\n\n# 9. Space\
    \ Geometry\n\n- COORD_3D\n- DIVLIN3D\n- ROTATE3D\n- TRIANG3D\n- VOLUME4P\n\n#\
    \ 10. Space Sciences\n\n- GEOSYNC\n- MOON\n- PENNIES\n- RADIOISO\n- RELATVTY\n\
    - SPACEANG\n- STN_GRAV\n- SUN_ELEV\n- SUBSOLAR\n\n[About the Author](About the\
    \ Author)\n\n[Other Books By John Clark Craig](Other Books By John Clark Craig)\n\
    \n# Introduction\n\n# Why Python?\n\nPython, the world's most popular programming\
    \ language, is an ideal language for handheld calculators. The syntax is concise,\
    \ easy to read, and easy to understand, even for beginners. The language is non-proprietary,\
    \ so it runs everywhere, even on desktop and laptop computers with only minor\
    \ modifications from what you'll find in this book, and even then only in a very\
    \ few cases.\n\nPython handles number crunching well, and with its lists, strings,\
    \ and other data structures, it powerfully handles a very wide variety of programming\
    \ tasks. But perhaps the biggest advantage of learning Python via your programmable\
    \ calculator is that this knowledge will be applicable and useful no matter what\
    \ computers or systems you might work with in the future. Learn it once and you'll\
    \ have a new life skill of great value.\n\n# Python in your calculator\n\nMost\
    \ of the number crunching that takes place in Python programs is straightforward\
    \ and easy to understand. When it comes to interacting with the user to request\
    \ input and output (commonly referred to as I/O) there are some optional approaches,\
    \ and understanding some of these make it easier for you to make shorter programs,\
    \ or longer but more user friendly programs, depending on your style and programming\
    \ goals. The programs in this book use several of these approaches, and it's important\
    \ to know that you can change these programs if you prefer one type of programming\
    \ over another.\n\nAn excellent way to leverage Python in your calculator is to\
    \ simply define functions in a \"program\" file. When you run the program, nothing\
    \ visibly happens. But the function definitions are effectively added to your\
    \ calculator's toolbox, ready for your use while working in the shell. For example,\
    \ here's a very short program that defines a function named add().\n\n```\ndef\
    \ add(x, y):\n    return x+y\n```\n\nAfter you run this program, in the shell\
    \ you can type something like \"add(3,4)\" to get 7, or to add any two numbers\
    \ or variables together. Or, rather than type the function names yourself, on\
    \ your TI-84 CE Plus Python calculator, you can select \"4:vars...\" from the\
    \ [Tools] menu to access a quick list of functions your program has defined. More\
    \ complicated functions can add some powerful new capabilities to your computation\
    \ toolbox!\n\nMany of the programs in this book were created as sets of function\
    \ definitions in this way. This keeps the programs very short and easier to enter.\
    \ In some cases, the programs also printed some instructions and reminders on\
    \ how to use the functions, for easy reference. Take a look at the vectors program\
    \ near the end of chapter 6 for a good example of how to add helpful instructions,\
    \ while just defining functions for later use in the shell.\n\nThe standard way\
    \ to create standalone programs in most programming languages is to prompt the\
    \ user for input data, and then to process that data in a meaningful way to create\
    \ output for the user. Throughout this book there are several programs where you\
    \ are asked to type data in response to a prompt at run time, and then the calculations\
    \ begin. Take a look at the primes program, also in chapter 6, for an example\
    \ where the program asks you to enter the starting point to look for primes, and\
    \ the number of those primes to find.\n\nThere are a few other useful I/O tricks\
    \ presented in several of the programs in this book. It is sometimes useful to\
    \ ask for a number, but to let the user simply press [enter] without entering\
    \ a number if they don't know the value. This is actually a tricky thing to do,\
    \ as a simple assignment to a variable after an input() function call can fail\
    \ if nothing is input. Take a close look at the program ARCS, in chapter 8 for\
    \ an example where any combination of two of four variables can be entered, and\
    \ the missing ones will be calculated. Here's a pair of code lines where an angle\
    \ is entered, or a value of zero is put in place if the user simply presses [enter].\n\
    \n```\na=input(\"Angle (deg): \")\na=float(a) if a else 0\n```\n\nFinally, note\
    \ that the Python shell itself provides a powerful calculation environment. Rather\
    \ than edit and save a program, sometimes it's faster and more efficient to simply\
    \ type calculations line-by-line interactively in the shell. Several of the keys\
    \ on your TI-84 Plus CE Python calculator are redefined when in the Python environment,\
    \ and learning how to leverage them can provide some really cool results. For\
    \ example, the [2nd][ans] key enters an underscore in the Python shell, and it\
    \ turns out the underscore is a special temporary variable that contains the results\
    \ of the last calculation. Here's a quick example that results from first entering\
    \ 3 and pressing the x-squared key, then using [2nd][ans] to triple the result.\n\
    \n![](img/8936d0646085e4f7f233755960035de6_8_0.png)\n\n# Learn by Examples\n\n\
    There are many, many resources online and in other books to learn the intricacies\
    \ of the Python language. The goal of this book isn't to duplicate all this information.\
    \ Instead, there's a lot of short, useful programs that you can use \"right out\
    \ of the box\", and in putting them to use you'll learn a lot about Python indirectly.\n\
    \nIf you are looking for an absolute beginner's tutorial to help you get up to\
    \ speed with programming in Python on your TI-84 Plus CE Python calculator, there's\
    \ an excellent web site by Texas Instruments titled \"10 Minutes of Code: Python\"\
    . I strongly recommend taking a look at these skill building lessons. Here is\
    \ the link:\n\n[https://education.ti.com/en/activities/ti-codes/python/84](https://education.ti.com/en/activities/ti-codes/python/84)\n\
    \nWhenever you find a command that looks a little mysterious, I strongly suggest\
    \ you Google it for more information. In my opinion, this is a better way to learn\
    \ a lot of Python programming techniques, by using and experiencing the commands\
    \ in action.\n\nFor example, it took me awhile to stumble upon Python's useful\
    \ zip() function. I used it several places in the vectors program to create extremely\
    \ concise and powerful vector functions. Do a Google search on \"Python zip\"\
    , learn how it works, and then you'll gain a really good understanding of how\
    \ several of the vector functions work for 2d, 3d, or even bigger vectors.\n\n\
    Any TI-84 calculator is a very powerful learning tool, but with the addition of\
    \ Python in your TI-84 Plus CE Python calculator, its mind-expanding capabilities\
    \ are truly awesome!"
  mdcn: "# 适用于 TI-84 的 Python\n\n适用于 TI-84 Plus CE Python 图形计算器的强大 Python 程序与游戏\n\n\
    作者：约翰·克拉克·克雷格\n\n![](img/8936d0646085e4f7f233755960035de6_0_0.png)\n\n# 目录\n\n\
    致谢\n\n[引言](Introduction)\n\n# 程序\n\n[1. 日历功能](1.%20Calendar%20Functions)\n\n-\
    \ CALENDAR\n- DATE\n- DATEPLUS\n- DAYSDATS\n- JULIAN\n\n[2. 电子学](2.%20Electronics)\n\
    \n- AVGPKRMS\n- BRIDGE\n- DELTAWYE\n- FREQWAVE\n- LED_RES\n- OHMSLAW\n- PARALLEL\n\
    - RCTIMING\n- SERIES\n- ZROUND\n\n[3. 游戏与概率](3%20Games%20and%20Chance)\n\n- DECKCRDS\n\
    - DICE\n- DIGITS\n- FACTCBPM\n- HEADSROW\n- HUNT_DIR\n- HUNT_DIS\n- JUMBLE\n-\
    \ MAZE\n- MEMORY\n- MNTYHALL\n- PI_BUFFN\n- PI_DARTS\n- RNDBYTE\n- WORDPERM\n\n\
    # 4. GPS 与导航\n\n- GPS_AREA\n- GPS_DIST\n- MIDPOINT\n- NAVIGATE\n\n# 5. 金钱与金融\n\
    \n- DEPOSITS\n- FUTURVAL\n- INTEREST\n- MONTHS\n- PAYMENTS\n- PRNCIPAL\n\n# 6.\
    \ 数值计算\n\n- BINHXDEC\n- BINSRCH\n- FACTORS\n- FIBONACC\n- GCD_LCM\n- GLDRATIO\n\
    - NEWTON\n- PRIMES\n- QUADRATC\n- REC_POLR\n- SIMULTEQ\n- VECTORS\n\n# 7. 其他实用程序\n\
    \n- CONCRETE\n- CRICKETS\n- LASERDIS\n- MPH\n- SECRET\n- WAIT_KEY\n- WET_BULB\n\
    - WNDCHILL\n\n# 8. 平面几何\n\n- ARCS\n- AREA_3P\n- AREA_3S\n- AREA_PTS\n- CIRCLE3P\n\
    - DISTANCE\n- DIVLINE\n- LINE_2P\n- LINSLOPE\n- TRANSFRM\n- TRIANG3P\n- TRIANGLE\n\
    \n# 9. 空间几何\n\n- COORD_3D\n- DIVLIN3D\n- ROTATE3D\n- TRIANG3D\n- VOLUME4P\n\n\
    # 10. 空间科学\n\n- GEOSYNC\n- MOON\n- PENNIES\n- RADIOISO\n- RELATVTY\n- SPACEANG\n\
    - STN_GRAV\n- SUN_ELEV\n- SUBSOLAR\n\n[关于作者](About the Author)\n\n[约翰·克拉克·克雷格的其他著作](Other\
    \ Books By John Clark Craig)\n\n# 引言\n\n# 为何选择 Python？\n\nPython 是全球最受欢迎的编程语言，也是手持计算器的理想语言。其语法简洁、易于阅读和理解，即使对初学者也是如此。该语言非专有，因此可在任何地方运行，甚至在台式机和笔记本电脑上也只需对本书中的代码进行极小的修改即可运行，而且这种情况非常罕见。\n\
    \nPython 擅长数值计算，并且凭借其列表、字符串和其他数据结构，它能强大地处理各种各样的编程任务。但或许通过可编程计算器学习 Python 最大的优势在于，无论你将来使用何种计算机或系统，这些知识都将适用且有用。学一次，你将获得一项极具价值的新生活技能。\n\
    \n# 你计算器中的 Python\n\nPython 程序中进行的大多数数值计算都是直接且易于理解的。当涉及到与用户交互以请求输入和输出（通常称为 I/O）时，有几种可选的方法，理解其中一些方法可以让你编写更短的程序，或者更长但更用户友好的程序，这取决于你的风格和编程目标。本书中的程序使用了其中几种方法，重要的是要知道，如果你偏好某种编程方式而非另一种，你可以修改这些程序。\n\
    \n在计算器中利用 Python 的一个绝佳方法是在“程序”文件中简单地定义函数。当你运行程序时，表面上什么也不会发生。但函数定义实际上被添加到了你的计算器工具箱中，随时可以在\
    \ shell 中使用。例如，这是一个定义了名为 `add()` 函数的非常简短的程序。\n\n```\ndef add(x, y):\n    return\
    \ x+y\n```\n\n运行此程序后，在 shell 中你可以输入类似 \"add(3,4)\" 的内容得到 7，或者将任意两个数字或变量相加。或者，你不必自己输入函数名，在你的\
    \ TI-84 CE Plus Python 计算器上，你可以从 [Tools] 菜单中选择 \"4:vars...\" 来快速访问你的程序已定义的函数列表。更复杂的函数可以为你的计算工具箱添加一些强大的新功能！\n\
    \n本书中的许多程序都是以这种方式作为一组函数定义创建的。这使得程序非常简短且更容易输入。在某些情况下，程序还会打印一些关于如何使用函数的说明和提醒，以便于参考。请查看第\
    \ 6 章末尾的向量程序，这是一个很好的例子，展示了如何添加有用的说明，同时仅为后续在 shell 中使用而定义函数。\n\n在大多数编程语言中，创建独立程序的标准方式是提示用户输入数据，然后以有意义的方式处理这些数据，为用户创建输出。在本书中，有几个程序要求你在运行时输入数据以响应提示，然后计算开始。请查看第\
    \ 6 章中的质数程序，这是一个程序要求你输入查找质数的起始点以及要查找的质数数量的例子。\n\n本书的几个程序中还介绍了一些其他有用的 I/O 技巧。有时询问一个数字是有用的，但如果用户不知道该值，可以让他们简单地按\
    \ [enter] 而不输入数字。这实际上是一件棘手的事情，因为在 `input()` 函数调用后，如果未输入任何内容，简单的变量赋值可能会失败。请仔细查看第\
    \ 8 章中的程序 ARCS，这是一个可以输入四个变量中任意两个的组合，而缺失的变量将被计算出来的例子。这里有一对代码行，其中输入一个角度，或者如果用户只是按\
    \ [enter]，则放入零值。\n\n```\na=input(\"Angle (deg): \")\na=float(a) if a else 0\n\
    ```\n\n最后，请注意 Python shell 本身提供了一个强大的计算环境。有时，与其编辑和保存程序，不如在 shell 中逐行交互式地输入计算更快、更高效。在\
    \ Python 环境中，你的 TI-84 Plus CE Python 计算器上的几个键被重新定义，学习如何利用它们可以提供一些非常酷的结果。例如，[2nd][ans]\
    \ 键在 Python shell 中输入一个下划线，而下划线是一个特殊的临时变量，包含上次计算的结果。这是一个快速示例，首先输入 3 并按 x 平方键，然后使用\
    \ [2nd][ans] 将结果乘以三。\n\n![](img/8936d0646085e4f7f233755960035de6_8_0.png)\n\n\
    # 通过示例学习\n\n网上和其它书籍中有许多资源可以学习 Python 语言的复杂细节。本书的目标并非复制所有这些信息。相反，这里有很多简短、有用的程序，你可以“开箱即用”，在使用它们的过程中，你将间接地学到很多关于\
    \ Python 的知识。\n\n如果你正在寻找一个绝对初学者的教程，以帮助你快速掌握在 TI-84 Plus CE Python 计算器上使用 Python\
    \ 编程，德克萨斯仪器公司有一个名为 \"10 Minutes of Code: Python\" 的优秀网站。我强烈建议你看看这些技能培养课程。以下是链接：\n\
    \n[https://education.ti.com/en/activities/ti-codes/python/84](https://education.ti.com/en/activities/ti-codes/python/84)\n\
    \n每当你发现一个看起来有点神秘的命令时，我强烈建议你用谷歌搜索更多信息。在我看来，这是学习许多 Python 编程技巧的更好方法，通过在实践中使用和体验这些命令。\n\
    \n例如，我花了一段时间才偶然发现 Python 有用的 `zip()` 函数。我在向量程序中的几个地方使用了它来创建极其简洁和强大的向量函数。在谷歌上搜索\
    \ \"Python zip\"，了解它的工作原理，然后你将真正理解几个向量函数如何处理二维、三维甚至更大向量的工作原理。\n\n任何 TI-84 计算器都是非常强大的学习工具，但随着你的\
    \ TI-84 Plus CE Python 计算器中 Python 的加入，其拓展思维的能力确实令人敬畏！"
