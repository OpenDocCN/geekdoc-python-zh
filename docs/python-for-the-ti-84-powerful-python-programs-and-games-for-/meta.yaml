  md: "# Introduction\n\n# Why Python?\n\nPython, the world's most popular programming\
    \ language, is an ideal language for handheld calculators. The syntax is concise,\
    \ easy to read, and easy to understand, even for beginners. The language is non-proprietary,\
    \ so it runs everywhere, even on desktop and laptop computers with only minor\
    \ modifications from what you'll find in this book, and even then only in a very\
    \ few cases.\n\nPython handles number crunching well, and with its lists, strings,\
    \ and other data structures, it powerfully handles a very wide variety of programming\
    \ tasks. But perhaps the biggest advantage of learning Python via your programmable\
    \ calculator is that this knowledge will be applicable and useful no matter what\
    \ computers or systems you might work with in the future. Learn it once and you'll\
    \ have a new life skill of great value.\n\n# Python in your calculator\n\nMost\
    \ of the number crunching that takes place in Python programs is straightforward\
    \ and easy to understand. When it comes to interacting with the user to request\
    \ input and output (commonly referred to as I/O) there are some optional approaches,\
    \ and understanding some of these make it easier for you to make shorter programs,\
    \ or longer but more user friendly programs, depending on your style and programming\
    \ goals. The programs in this book use several of these approaches, and it's important\
    \ to know that you can change these programs if you prefer one type of programming\
    \ over another.\n\nAn excellent way to leverage Python in your calculator is to\
    \ simply define functions in a \"program\" file. When you run the program, nothing\
    \ visibly happens. But the function definitions are effectively added to your\
    \ calculator's toolbox, ready for your use while working in the shell. For example,\
    \ here's a very short program that defines a function named add().\n\n```\ndef\
    \ add(x, y):\n    return x+y\n```"
  merge: -1
  pgno: 6
- img_proc: true
  md: 'After you run this program, in the shell you can type something like "add(3,4)"
    to get 7, or to add any two numbers or variables together. Or, rather than type
    the function names yourself, on your TI-84 CE Plus Python calculator, you can
    select "4:vars..." from the [Tools] menu to access a quick list of functions your
    program has defined. More complicated functions can add some powerful new capabilities
    to your computation toolbox!


    Many of the programs in this book were created as sets of function definitions
    in this way. This keeps the programs very short and easier to enter. In some cases,
    the programs also printed some instructions and reminders on how to use the functions,
    for easy reference. Take a look at the vectors program near the end of chapter
    6 for a good example of how to add helpful instructions, while just defining functions
    for later use in the shell.


    The standard way to create standalone programs in most programming languages is
    to prompt the user for input data, and then to process that data in a meaningful
    way to create output for the user. Throughout this book there are several programs
    where you are asked to type data in response to a prompt at run time, and then
    the calculations begin. Take a look at the primes program, also in chapter 6,
    for an example where the program asks you to enter the starting point to look
    for primes, and the number of those primes to find.


    There are a few other useful I/O tricks presented in several of the programs in
    this book. It is sometimes useful to ask for a number, but to let the user simply
    press [enter] without entering a number if they don''t know the value. This is
    actually a tricky thing to do, as a simple assignment to a variable after an input()
    function call can fail if nothing is input. Take a close look at the program ARCS,
    in chapter 8 for an example where any combination of two of four variables can
    be entered, and the missing ones will be calculated. Here''s a pair of code lines
    where an angle is entered, or a value of zero is put in place if the user simply
    presses [enter].


    ```

    a=input("Angle (deg): ")

    a=float(a) if a else 0

    ```'
  merge: -1
  pgno: 7
- img_proc: true
  md: 'Finally, note that the Python shell itself provides a powerful calculation
    environment. Rather than edit and save a program, sometimes it''s faster and more
    efficient to simply type calculations line-by-line interactively in the shell.
    Several of the keys on your TI-84 Plus CE Python calculator are redefined when
    in the Python environment, and learning how to leverage them can provide some
    really cool results. For example, the [2nd][ans] key enters an underscore in the
    Python shell, and it turns out the underscore is a special temporary variable
    that contains the results of the last calculation. Here''s a quick example that
    results from first entering 3 and pressing the x-squared key, then using [2nd][ans]
    to triple the result.


    ![](img/8936d0646085e4f7f233755960035de6_8_0.png)'
  merge: -1
  pgno: 8
- img_proc: true
  md: '# Learn by Examples


    There are many, many resources online and in other books to learn the intricacies
    of the Python language. The goal of this book isn''t to duplicate all this information.
    Instead, there''s a lot of short, useful programs that you can use "right out
    of the box", and in putting them to use you''ll learn a lot about Python indirectly.


