    # MPH


    Your TI-84 Plus CE Python calculator has a clock on board (not all calculators
    can tell date and time.) By using the monotonic() function in the ti\_matplotlib
    module, you can create a type of stopwatch. You press [clear] to start timing
    as you pass a mile marker in the automobile you are riding in, and press the [clear]
    key a second time when you pass the next mile marker. A little math in the program
    then calculates the average miles per hour.


    Two important details to note. First, don''t drive and run Python at the same
    time! Let someone else do the driving while you check their speed. Second, this
    provides the average speed while traveling the mile. It is quite possible to drive
    40 miles per hour for part of the mile, and 60 miles per hour the rest of the
    mile, and average out at 50 miles per hour. Just keep that in mind.


    A challenge to consider is to modify the program for metric measurements. Just
    how fast is the car going in km/h over a 1 km (or a 1 miles distance if there
    are only mile markers) stretch of road?


    I chose the monotonic() function in the ti\_matplotlib since I was already using
    that module to display text messages in the center of the display. There''s also
    a monotonic() function in the time module, and it behaves slightly differently.
    These modules are fresh from the team at Texas Instruments at the time this book
    was being written, and there''s always the chance they could change things up
    over time. The disp\_wait() function in the ti\_system module provides an alternate
    way to wait for a press of the [clear] key. You can see an example of this function
    in the WORDPERM program later in a later chapter.


    Here''s a sample run, where the mile took approximately 60 seconds.'
