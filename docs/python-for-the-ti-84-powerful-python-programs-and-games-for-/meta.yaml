  md: '# SUBSOLAR


    This program calculates the exact location on the Earth where the Sun is directly
    overhead at the zenith. The Sun is always shining somewhere, so this spot is constantly
    wandering all the way around the planet every 24 hours, although it takes a slightly
    different path every day.


    To demonstrate the subsolar() function, an exact date and time, including the
    timezone offset from Greenwich, is passed to the function in a list. The latitude
    and longitude of the Sun''s zenith point on the Earth is returned in a list. The
    accuracy of the Sun''s position using this algorithm is within about 0.01 degree
    of its true location.


    For example, on the 4th of July, 2022 at 12:50:00 pm in Denver, CO (time zone
    offset is -6 hours from Greenwich) the Sun will be located at about 22.82 degrees
    north latitude and 101.37 degrees west longitude. A quick check on Google Maps
    shows this spot to be in the middle of Mexico, just north of San Luis Potosi.


    ```

    >>> # Shell Reinitialized

    >>> # Running SUBSOLAR

    >>> from SUBSOLAR import *

    When:

    (2022, 7, 4, 12, 50, 0, -6)

    Sun lat: 22.82

    Sun lon: -101.37

    >>> |

    ```'
  merge: -1
  pgno: 274
- img_proc: true
  md: "```\nfrom math import *\n\ndef subsolar(when):\n    ye,mo,da,ho,mi,se,tz=when\n\
    \    ta=pi*2\n    ut=ho-tz+mi/60+se/3600\n    t=367*ye-7*(ye+(mo+9)//12)//4\n\
    \    dn=t+275*mo//9+da-730531.5+ut/24\n    sl=dn*0.01720279239+4.894967873\n \
    \   sa=dn*0.01720197034+6.240040768\n    t=sl+0.03342305518*sin(sa)\n    ec=t+0.0003490658504*sin(2*sa)\n\
    \    ob=0.4090877234-0.000000006981317008*dn\n    st=4.894961213+6.300388099*dn\n\
    \    ra=atan2(cos(ob)*sin(ec),cos(ec))\n    de=asin(sin(ob)*sin(ec))\n    la=degrees(de)\n\
    \    lo= degrees(ra-st)%360\n    lo=lo-360 if lo>180 else lo\n    return [round(la,2),round(lo,2)]\n\
    \nwhen=(2022,7,4,12,50,0,-6)\nla,lo=subsolar(when)\nprint(\"When:\\n\",when)\n\
    print(\"Sun lat: \",la)\nprint(\"Sun lon: \",lo)\n```"
