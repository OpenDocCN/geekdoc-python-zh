    \ 方向。柱坐标使用 x、y 平面中的半径和角度来确定点正下方的点，以及 z 值表示从 x、y 平面到该点的距离。球坐标使用从原点出发的径向距离，以及两个角度来确定\
    \ x、y 平面中的角度和偏离 z 轴的角度。\n\n在这个程序中，变量 x、y、z 指的是沿各自轴的距离。r 和 th（半径和 theta 的缩写）是柱坐标的半径和角度，rh、th、ph（rho、theta、phi\
    \ 的缩写）用于球坐标，其中 rho 是距离，theta 和 phi 是角度。\n\n提供了六个函数，允许从三种坐标系中的任何一种转换到其他任何一种。传入三个已知的坐标值，等效的坐标值将以列表形式返回。注意示例源代码中，三个返回值直接从返回的列表赋值给单独的变量。这是\
