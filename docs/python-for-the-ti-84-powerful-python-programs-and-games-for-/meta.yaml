  md: '# 9.

    Space Geometry


    The previous chapter presented several programs to work with lines, arcs, triangles,
    and other constructs in a two-dimensional plane. This chapter extends those concepts
    into three dimensions.


    3D games require rotations around each of the three axes in order to move characters
    and objects around in space. There are powerful ways to accomplish this using
    matrices, but even the matrix math depends on the ability to mathematically combine
    rotations around each axis.


    You''ll find functions to do these rotations in this chapter. In two dimensions,
    a set of three points determines a triangle. This is true with sets of three space
    points as well. Also, in three dimensions a set of four space points determines
    a tetrahedron-like volume. You''ll find programs to do these calculations in this
    chapter.'
