    3 grid, with a few of them missing. You need to figure out what the missing digits
    are. Around the edges of the game are clue numbers. They''re located at both ends
    of each row and column, and they are the result of secretly adding or subtracting
    the digits in the given row or column, in the order presented towards each clue.


