- md: "## 9. Space Geometry\n\nThe previous chapter presented several programs to\
    \ work with lines, arcs, triangles, and other constructs in a two-dimensional\
    \ plane. This chapter extends those concepts into three dimensions.\n\n3D games\
    \ require rotations around each of the three axes in order to move characters\
    \ and objects around in space. There are powerful ways to accomplish this using\
    \ matrices, but even the matrix math depends on the ability to mathematically\
    \ combine rotations around each axis.\n\nYou'll find functions to do these rotations\
    \ in this chapter. In two dimensions, a set of three points determines a triangle.\
    \ This is true with sets of three space points as well. Also, in three dimensions\
    \ a set of four space points determines a tetrahedron-like volume. You'll find\
    \ programs to do these calculations in this chapter.\n\n## COORD_3D\n\nThere are\
    \ three common coordinate systems used to designate a point's location in space.\
    \ Cartesian coordinates use x,y,z values, similar to x,y in a plane but extended\
    \ into space with a z direction. Cylindrical coordinates use a radius and angle\
    \ in the x,y plane to determine a point directly \"below\" the point, and a z\
    \ value for the distance to it from the x,y plane. Spherical coordinates use a\
    \ radial distance from the origin, and two angles to determine the angle in the\
    \ x,y plane and the angle away from the z axis.\n\nIn this program the variables\
    \ x,y,z refer to distances along their respective axes. r and th (short for radius\
    \ and theta) are the radius and angle for cylindrical coordinates, and rh, th,\
    \ ph (short for rho, theta, phi) are used for spherical coordinates, where rho\
    \ is a distance and theta and phi are angles.\n\nSix functions are provided, allowing\
    \ conversions from any of the three coordinate systems to any of the others. Pass\
    \ the three known coordinate values and the equivalent coordinate values will\
    \ be returned in a list. Notice in the example source code that the three returned\
    \ values are assigned directly from the returned list into separate variables.\
    \ This is a very nice feature of Python, allowing functions to effectively return\
    \ multiple values.\n\n![](img/8936d0646085e4f7f233755960035de6_231_0.png)\n\n\
    Cartesian\n\n![](img/8936d0646085e4f7f233755960035de6_232_0.png)\n\nCylindrical\n\
    \n![](img/8936d0646085e4f7f233755960035de6_233_0.png)\n\n### Spherical\n\nFor\
    \ example, convert cartesian coordinates 3,4,5 to the other coordinate systems.\
    \ When the program starts you are prompted to choose the known coordinate system,\
    \ in this case Cartesian. As shown, enter a 1 to select that system, then enter\
    \ 3, 4, and 5 as prompted for x, y, and z.\n\n![](img/8936d0646085e4f7f233755960035de6_234_0.png)\n\
    \n![](img/8936d0646085e4f7f233755960035de6_234_1.png)\n\nAfter entering the final\
    \ z value, the other two coordinate system equivalent values are calculated and\
    \ all three systems are displayed sequentially.\n\n![](img/8936d0646085e4f7f233755960035de6_235_0.png)\n\
    \n![](img/8936d0646085e4f7f233755960035de6_236_0.png)\n\n![](img/8936d0646085e4f7f233755960035de6_236_1.png)\n\
    \n```python\nfrom math import *\nfrom ti_system import *\n\ndef car_to_cyl(x,y,z):\n\
    \    ra=(x*x+y*y)**.5\n    th=degrees(atan2(y,x))\n    return[ra,th,z]\n\ndef\
    \ cyl_to_car(ra,th,z):\n    th=radians(th)\n    x=ra*cos(th)\n    y=ra*sin(th)\n\
    \    return [x,y,z]\n\ndef car_to_sph(x,y,z):\n    rh=(x*x+y*y+z*z)**.5\n    th=degrees(atan2(y,x))\n\
    \    ph=degrees(acos(z/rh))\n    return [rh,th,ph]\n\ndef sph_to_car(rh,th,ph):\n\
    \    th=radians(th)\n    ph=radians(ph)\n    x=rh*sin(ph)*cos(th)\n    y=rh*sin(ph)*sin(th)\n\
    \    z=rh*cos(ph)\n    return [x,y,z]\n\ndef cyl_to_sph(ra,th,z):\n    rh=(ra*ra+z*z)**.5\n\
    \    ph=degrees(atan2(ra,z))\n    return [rh,th,ph]\n\ndef sph_to_cyl(rh,th,ph):\n\
    \    ph=radians(ph)\n    ra=rh*sin(ph)\n    z=rh*cos(ph)\n    return [ra,th,z]\n\
    \ndisp_clr()\nprint(\"1. car->\")\nprint(\"2. cyl->\")\nprint(\"3. sph->\")\n\
    print()\nn=int(input(\"? \"))\ndisp_clr()\nif n==1:\n    x=float(input(\"x: \"\
    ))\n    y=float(input(\"y: \"))\n    z=float(input(\"z: \"))\n    ra,th,z=car_to_cyl(x,y,z)\n\
    \    rh,th,ph=car_to_sph(x,y,z)\nif n==2:\n    ra=float(input(\"ra: \"))\n   \
    \ th=float(input(\"th: \"))\n    z=float(input(\"z: \"))\n    x,y,z=cyl_to_car(ra,th,z)\n\
    \    rh,th,ph=cyl_to_sph(ra,th,z)\nif n==3:\n    rh=float(input(\"rh: \"))\n \
    \   th=float(input(\"th: \"))\n    ph=float(input(\"ph: \"))\n    x,y,z=sph_to_car(rh,th,ph)\n\
    \    ra,th,z=sph_to_cyl(rh,th,ph)\ndisp_clr()\nprint(\"Cartesian\\n\")\nprint(\"\
    x: \",x)\nprint(\"y: \",y)\nprint(\"z: \",z)\nprint(\"\\nPress [clear] to continue\"\
    )\ndisp_wait()\nprint(\"Cylindrical\\n\")\nprint(\"ra: \",ra)\nprint(\"th: \"\
    ,th)\nprint(\"z: \",z)\nprint(\"\\nPress [clear] to continue\")\ndisp_wait()\n\
    print(\"Spherical\\n\")\nprint(\"rh: \",rh)\nprint(\"th: \",th)\nprint(\"ph: \"\
    ,ph)\nprint(\"\\nPress [clear] to end\")\ndisp_wait()\n```\n\n## DIVLIN3D\n\n\
    The DIVLINE program presented earlier split a line segment in a plane into n smaller\
    \ segments. This program does the same for a line in space defined by two x,y,z\
    \ points. The two space coordinates are edited directly in the code, which makes\
    \ the program shorter and makes it easier to review and edit the given data.\n\
    \nFor example, given the space points [3,2,-2] and [9,5,17] that define a line\
    \ segment in space, the program splits this into three smaller segments of equal\
    \ length, outputting the coordinates at the ends of each segment. The original\
    \ end points are included in the output.\n\n![](img/8936d0646085e4f7f233755960035de6_239_0.png)\n\
    \n```python\ndef divide_line(p1,p2,n):\n    pts=[]\n    for i in range(n+1):\n\
    \        x=p1[0]+(p2[0]-p1[0])*i/n\n        y=p1[1]+(p2[1]-p1[1])*i/n\n      \
    \  z=p1[2]+(p2[2]-p1[2])*i/n\n        pts.append([x,y,z])\n    return pts\n\n\
    p1=[3,2,-2]\np2=[9,5,17]\nsegs=3\npts=divide_line(p1,p2,segs)\nprint(\"\\n{} segments\\\
    n\".format(segs))\nfor pt in pts:\n    print(pt)\n```\n\n## ROTATE3D\n\nThis program\
    \ inputs a 3-dimensional space point and rotates it around each of the three axes\
    \ by some angle in degrees.\n\nThere are three functions in this program, one\
    \ for rotating a space point around each axis. For demonstrating these functions,\
    \ the point 3,4,5 is rotated around each axis by 45 degrees, and the new location\
    \ in each case is output.\n\nThese functions are at the core of many 3D graphics\
    \ and other programs. I've used these functions to rotate antennas on the Earth\
