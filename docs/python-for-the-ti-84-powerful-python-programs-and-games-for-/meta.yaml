    \    lo=lo-360 if lo>180 else lo\n    return [round(la,2),round(lo,2)]\n\nwhen=(2022,7,4,12,50,0,-6)\n\
    la,lo=subsolar(when)\nprint(\"When:\\n\",when)\nprint(\"Sun lat: \",la)\nprint(\"\
    Sun lon: \",lo)\n```\n\n## 关于作者\n\n## 约翰·克拉克·克雷格\n\n约翰·克拉克·克雷格撰写了多本关于编程主题的书籍，主要涵盖了\
    \ BASIC 和 Visual Basic 语言随时间演变的各个版本。\n\n如今，他的重点是 Python，这是世界上最流行且易于学习的语言，既适合首次向年轻人介绍编程，又足够强大，能够应对最具挑战性的工程、网页设计、游戏、机器人和机器学习……实际上涵盖了当今所有热门的编程领域。\n\
    \n除了写作，约翰的软件项目还控制和监控了大型太阳能项目，帮助风能工程师为风力涡轮机设计更好的塔架，监控阿拉斯加的天然气和石油项目，协助训练美国奥运队的运动员，参与设计人工膝关节置换部件，提供了一个用于简化使用\
    \ OpenSCAD 进行 3D 设计的 Python 库，甚至为基于科学的 UFO 现象研究提供了工具。\n\n约翰居住在科罗拉多州，如今正在帮助他的妻子开发软件工具，这些工具帮助她协助房主通过在屋顶安装太阳能板来节省大量资金。（参见\
    \ [Solar-Proud.com](http://Solar-Proud.com)）\n\n约翰对 Python 编程语言充满热情，以及它如何能够以如此多样化的方式被用来帮助他人让世界变得更美好，一次一行代码。\n\
    \n## 约翰·克拉克·克雷格的其他著作\n\n要获取约翰·克拉克·克雷格所有书籍的完整列表，请访问他的网站 [JohnClarkCraig.com](http://JohnClarkCraig.com)\n\
