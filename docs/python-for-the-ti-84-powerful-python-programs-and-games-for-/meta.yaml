  md: '# DEPOSITS


    This short program helps you save for a goal by calculating how much money to
    put away in an interest bearing account, and for how long, in order to reach your
    goal.


    For example, perhaps you want to get a new gaming laptop that costs $1000, and
    you want it one year from today. As shown, you should start putting away $80.69
    each month in an account if it earns 7% interest.


    ![](img/8936d0646085e4f7f233755960035de6_122_0.png)


    ```

    fv=float(input("\nDollars goal: "))

    ir=float(input("Interest rate: "))

    mo=float(input("Months: "))

    ir/=1200

    dp=fv/((ir+1)**mo-1)*ir

    s="\nMonthly deposits: ${:.2f}"

    print(s.format(dp))

    ```'
