  md: '# MIDPOINT


    This program finds the latitude and longitude at a point halfway between two other
    locations on the Earth. Call up your friend a state or two away and have them
    meet you at the exact midpoint, just for fun.


    This program is also great for checking if the Earth is flat or round. Seriously.
    Consider that the Sun''s elevation angle can be easily measured with a simple
    meter stick on a sunny day (see the program SUN_ELEV later in this book). I won''t
    go into all the details here, but note that the elevation angle of the Sun as
    measured from three equidistant points on the Earth, will provide all the information
    you need. If the Earth is flat, the elevation angles will behave one way, and
    if the Earth is round the angles will behave another way. (Hint: it is round,
    but feel free to check for yourself an excellent way to discover the truth!)


    Let''s find the latitude and longitude of the point halfway between the Golden
    Gate Bridge in San Francisco, and the Gateway Arch in St. Louis.


    Here''s the location of one corner of the arch, as we used in the GPS_DIST program:


    ```

    la1=38.625412


    lo1=-90.184555

    ```


    And here''s the Golden Gate Bridge coordinate from the same program:


    ```

    la2=37.820142


    lo2=-122.478709

    ```


    Let''s plug those coordinates into the program, find the midpoint on the Earth,
    and then look up that point on Google Maps to see what''s there:'
