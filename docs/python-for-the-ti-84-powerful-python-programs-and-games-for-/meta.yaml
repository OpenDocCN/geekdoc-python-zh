    ```\n\nAnd here's the Golden Gate Bridge coordinate from the same program:\n\n\
    ```\nla2=37.820142\nlo2=-122.478709\n```\n\nLet's plug those coordinates into\
    \ the program, find the midpoint on the Earth, and then look up that point on\
    \ Google Maps to see what's there:"
