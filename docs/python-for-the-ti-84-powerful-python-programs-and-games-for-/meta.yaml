    # SPACEANG


    What is the angle between two stars in the night sky? What is the angular velocity
    of the International Space Station as it passes directly overhead? It turns out
    there are a lot of reasons to calculate the angle between two space directions
    that are expressed in azimuth and elevation (or right ascension and declination,
    or latitude and longitude for that matter).


    It''s easy to find an angle between two directions in a plane, but it gets complicated
    when the third dimension is added. As the elevation angle increases towards the
    zenith (the point straight up overhead) the distance between azimuth angles decreases.
    The azimuth lines get squeezed closer together as you look higher, until they
    merge at the zenith. The math in this program handles this complication nicely,
    so the angle between two stars is calculated the same whether they are located
    close to the horizon one night, or higher in the sky the next.


    For example, the top of one mountain is measured by an observer to be at an azimuth
    of 121.5 degrees and an elevation of 18.7 degrees. From the same location a second
    mountain top is at an azimuth of 173.4 degrees and an elevation of 9.1 degrees.
    What is the angle between the two mountain peaks? Edit these values into the program,
    as shown in the code below, and you''ll find the answer is about 51.1 degrees.'
