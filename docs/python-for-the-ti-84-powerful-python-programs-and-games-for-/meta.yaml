    # GPS_DIST


    Distance between two points in a plane is found using the Pythagorean Theorem,
    but distances on the surface of a sphere, such as the Earth, is more complicated.
    This program accurately calculates the distance between any two locations given
    their latitude and longitude coordinates, also referred to as GPS coordinates.


    The algorithm uses several trigonometric functions, so the math module is imported
    at the top of the listing. The sin() and cos() functions in Python assume all
    angles are in radians, so the radians() function in the math module is used to
    convert latitude and longitude from standard degrees to radians. (Yes, there is
    a degrees() function as well, but it''s not used in this program.)


    The distance() function is at the heart of this program. Inputs are latitude and
    longitude for two points on the Earth, and output is the kilometers between the
    two points. The constant 6371 is the radius of the Earth in kilometers.


