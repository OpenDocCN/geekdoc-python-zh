  md: '# RADIOISO


    The rate of radioactive decay in a sample is proportional to the number of radioactive
    atoms in the sample. The heart of the required calculations involves differential
    equations, which you can read about online if interested. Perhaps you''ve heard
    of carbon-14 dating of ancient organic materials? This is how they do the math
    for that! But this program works with any radioisotope with a known half-life.
    For example, rocks returned from the Moon containing radioactive isotopes have
    allowed an estimation of its age.


    This program works with four parameters; the starting activity of a sample, its
    half-life, elapsed time, and the ending activity of the sample. You input any
    combination of three of these parameters and the fourth is calculated.


    For example, an isotope of chromium with a half-life of 667.2 hours has a starting
    activity of 200 microcuries. What will its activity be exactly 24 hours later?


    ![](img/8936d0646085e4f7f233755960035de6_260_0.png)'
