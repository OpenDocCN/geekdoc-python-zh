  - '[PAGE 272]


    # SUN_ELEV


    This program provides a simple way for you to measure the Sun''s elevation angle.
    Use a meter or yard stick and measure its shadow on a flat surface. Plug the numbers
    in and the elevation angle is calculated using the atan() function in the math
    module.


    ![](img/8936d0646085e4f7f233755960035de6_272_0.png)


    Be sure to use the same units for the object''s height and the shadow length.
    For example, if a meter stick''s shadow is 134 cm (1 meter is 100 cm) then the
    angle of elevation of the Sun is about 36.7 degrees.


    The atan() function, like the rest of the trigonometric functions in the math
    module, assumes all angles to be in radians. The degrees() function is used to
    convert the radians elevation angle to degrees.'
