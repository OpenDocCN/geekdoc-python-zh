    # 4.

    GPS and Navigation


    Latitudes and Longitudes are a lot of fun, especially when a high percentage of
    people now own smartphones with GPS chips that tell them exactly where they are
    at all times. Also, Google (and other) maps provide a great way to determine the
    location of any point on the Earth that you zoom in to.


    This chapter lets you use such coordinates on the Earth''s surface to calculate
    distances, directions, and even the land area defined by three or more coordinates.


    These calculations are not as simple as distances, directions, and areas given
    cartesian coordinates in an x,y plane. This is because the Earth is a sphere,
    causing lines of longitude to be "squeezed together" the closer you get to the
    north or south poles. But your TI-84 Plus CE Python calculator is very capable
    of working out all the math to get the job done. Python makes it easy.'
  - '[PAGE 104]


    # GPS_AREA


    Finding an area on the surface of the Earth given several latitude and longitude
    coordinates at the corners of the area is more complicated than you might at first
    think. This program greatly simplifies the process.


    The first complication occurs when finding the distance between any two GPS coordinates.
    The distance between lines of longitude, that is how far east or west a point
    is from another, varies depending on the latitude. This is explained in more detail
    in the program GPS_DIST.


    This program "walks around" the polygon, connecting the first coordinate in the
    list sequentially with coordinates around the edges of the polygon to form small
    triangles. The sum of the areas of these triangles is the area of the whole figure
    defined by the list of coordinates. Here we''ll use the distance and direction
    angle between any two coordinates to calculate the area of the various triangular
    areas in the polygon.


    The triangles program elsewhere in this book demonstrates how to find all the
    parts of a triangle in a plane, including its area, given any combination of three
    of its sides and angles. The side-angle-side function is borrowed from that program
    to find the areas of small triangles.


    The really cool thing is that even if the polygon shape defined by the coordinates
    has concavities, the program automatically adds and subtracts the areas correctly.
    This works because the angle between the selected pairs of points and the first
    point is usually positive during the "walk around". But with a concavity, one
    or more of the angles is negative, and the area of the small triangle is then
    calculated as a negative. It all works out, where the overlapping areas add and
    subtract correctly and automatically to get an accurate total area.


    First, let''s look at a fairly simple example. The Pentagon building in Arlington,
    Virginia has five sides, and five GPS coordinates on its corners. Google Maps
    lets us find the latitude and longitude of any point on the map (zoom in and right-click
    on a point and select "What''s here?" from the popup menu.) Here are the corner
    coordinates I found, in standard latitude,'
