  - '[PAGE 8]


    Finally, note that the Python shell itself provides a powerful calculation environment.
    Rather than edit and save a program, sometimes it''s faster and more efficient
    to simply type calculations line-by-line interactively in the shell. Several of
    the keys on your TI-84 Plus CE Python calculator are redefined when in the Python
    environment, and learning how to leverage them can provide some really cool results.
    For example, the [2nd][ans] key enters an underscore in the Python shell, and
    it turns out the underscore is a special temporary variable that contains the
    results of the last calculation. Here''s a quick example that results from first
    entering 3 and pressing the x-squared key, then using [2nd][ans] to triple the
    result.


    ![](img/8936d0646085e4f7f233755960035de6_8_0.png)'
  - '[PAGE 9]


    # Learn by Examples


    There are many, many resources online and in other books to learn the intricacies
    of the Python language. The goal of this book isn''t to duplicate all this information.
    Instead, there''s a lot of short, useful programs that you can use "right out
    of the box", and in putting them to use you''ll learn a lot about Python indirectly.


    If you are looking for an absolute beginner''s tutorial to help you get up to
    speed with programming in Python on your TI-84 Plus CE Python calculator, there''s
    an excellent web site by Texas Instruments titled "10 Minutes of Code: Python".
    I strongly recommend taking a look at these skill building lessons. Here is the
    link:


    [https://education.ti.com/en/activities/ti-codes/python/84](https://education.ti.com/en/activities/ti-codes/python/84)


    Whenever you find a command that looks a little mysterious, I strongly suggest
    you Google it for more information. In my opinion, this is a better way to learn
    a lot of Python programming techniques, by using and experiencing the commands
    in action.


    For example, it took me awhile to stumble upon Python''s useful zip() function.
    I used it several places in the vectors program to create extremely concise and
    powerful vector functions. Do a Google search on "Python zip", learn how it works,
    and then you''ll gain a really good understanding of how several of the vector
    functions work for 2d, 3d, or even bigger vectors.


    Any TI-84 calculator is a very powerful learning tool, but with the addition of
    Python in your TI-84 Plus CE Python calculator, its mind-expanding capabilities
    are truly awesome!'
- md: "## 1. Calendar Functions\n\nHow old are you today?\n\nNext time someone asks\
    \ you this question, you can answer with the exact number of days rather than\
    \ just rounding off to the number of years. Then, to impress them even more, be\
    \ sure to casually mention the day of the week you were born.\n\nThese are the\
    \ types of questions the programs in this chapter will let you answer with ease.\n\
    \n## CALENDAR\n\nThis program creates a nice one-month, single-page calendar for\
    \ any month over a several-century period of time.\n\nAt the heart of this program\
    \ is a function that returns the Julian Day Number for any date in the range of\
    \ years from 1582 to 4000. This function, named jd(), is explained in more detail\
    \ later in this chapter, but here it is used to determine the number of days in\
    \ any given month, and the day of the week for any date. From this information\
    \ we can format all the days in a given month into an easy-to-read one-month calendar.\n\
    \nWilbur and Orville Wright's first heavier than air flight took place on the\
    \ morning of December 17, 1903, at Kitty Hawk, North Carolina. We can run this\
    \ program to see the full one-month layout of December, 1903 and easily determine\
    \ that the 17th was a Thursday.\n\n![](img/8936d0646085e4f7f233755960035de6_11_0.png)\n\
    \n![](img/8936d0646085e4f7f233755960035de6_12_0.png)\n\n```python\nimport ti_matplotlib\
    \ as plt\n```\n\n```python\ndef jd(m,d,y):\n    if m<3:\n        y-=1\n      \
    \  m+=12\n    a=int(y/100)\n    b=2-a+int(a/4)\n    e=int(365.25*(y+4716))\n \
    \   f=int(30.6001*(m+1))\n    return b+d+e+f-1524.5\n```\n\n```python\n# Get month\
    \ and year\nm=int(input(\"\\nMonth (1-12): \"))\ny=int(input(\"Year (1582-4000):\
    \ \"))\nd1=int(jd(m,1,y))\ndw=(d1+2)%7\nm2=m+1 if m<12 else 1\ny2=y if m<12 else\
    \ y+1\nd2=int(jd(m2,1,y2))\ndm=d2-d1\nmo=[\"Jan\",\"Feb\",\"Mar\",\"Apr\",\"May\"\
    ,\"Jun\",\n    \"Jul\",\"Aug\",\"Sep\",\"Oct\",\"Nov\",\"Dec\"]\n```\n\n```python\n\
    # Month, Year caption\nplt.cls()\ns=\"{} {}\".format(mo[m-1],y)\nplt.text_at(3,s,\"\
    center\")\n```\n\n```python\n# Days of the week\ns=\"Su Mo Tu We Th Fr Sa\"\n\
    plt.text_at(4,s,\"center\")\n```\n\n```python\n# Prep first row\ns=\" \"*(3*dw-1)\
    \ if dw else \"\"\n```\n\n```python\n# Rows of day numbers\nr=5\nfor d in range(1,dm+1):\n\
    \    ds=len(s)\n    if ds==20:\n        plt.text_at(r,s,\"center\")\n        s=\"\
    {:2d}\".format(d)\n        r+=1\n    elif ds:\n        s+=\"{:3d}\".format(d)\n\
    \    else:\n        s+=\"{:2d}\".format(d)\ns+=\" \"*20\nplt.text_at(r,s[:20],\"\
    center\")\nplt.show_plot()\n```\n\n## DATE\n\nThis program uses the Julian Day\
    \ Number function to calculate the day of the week and the day of the year for\
    \ a date in the range of years from 1582 to 4000. The jd() function is described\
    \ in more detail elsewhere in this chapter.\n\nFor example, December 17, 1903\
    \ (the day Orville and Wilbur made their first heavier-than-air flight) was a\
    \ Thursday, and it was the 351st day of the year, as shown in the following output\
    \ in the Python Shell.\n\n![](img/8936d0646085e4f7f233755960035de6_14_0.png)\n\
    \nThe day of the year is found by subtracting the Julian Day Number for December\
    \ 31 of the previous year from the selected day's Julian Day Number.\n\n```python\n\
    def jd(m,d,y):\n    if m<3:\n        y-=1\n        m+=12\n    a=int(y/100)\n \
    \   b=2-a+int(a/4)\n    e=int(365.25*(y+4716))\n    f=int(30.6001*(m+1))\n   \
    \ return b+d+e+f-1524.5\n```\n\n```python\nm=int(input(\"\\nMonth (1-12): \"))\n\
    d=int(input(\"Day (1-31): \"))\ny=int(input(\"Year (1582-4000): \"))\ndj=int(jd(m,d,y))\n\
    dn=(dj+2)%7\ndw=[\"Sun\",\"Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\"]\nprint(\"\
    \\n{}/{}/{}\\n\".format(m,d,y))\nprint(\"Day of week: \",dw[dn])\ndy=dj-int(jd(12,31,y-1))\n\
    print(\"Day of year: \",dy)\n```\n\n## DATEPLUS\n\nThis program calculates a date\
    \ that is a given number of days added to a starting date. For example, the Wright\
    \ brother's first flight occurred on December 17, 1903. What was the date 40,000\
    \ days in the future from that day? As shown in the output, June 22, 2013 is the\
    \ date \"way out in the future\" from the day people first took to the air.\n\n\
    ![](img/8936d0646085e4f7f233755960035de6_16_0.png)\n\nIn case you're wondering,\
    \ yes you can add a negative number of days to find an earlier date.\n\nTo perform\
    \ this calculation the starting date is converted to its Julian Day Number using\
    \ the jd() function, the number of days is added to create a second Julian Day\
    \ Number, and the mdy() function converts that number back to a date. The Julian\
    \ Day Number automatically takes care of leap years, varying numbers of days in\
    \ the months, and all those details. These two functions are described in more\
    \ detail in the julian.py program in this chapter.\n\n```python\nfrom math import\
    \ *\n\ndef jd(m,d,y):\n    if m<3:\n        y-=1\n        m+=12\n    a=int(y/100)\n\
    \    b=2-a+int(a/4)\n    e=int(365.25*(y+4716))\n    f=int(30.6001*(m+1))\n  \
    \  return b+d+e+f-1524.5\n\ndef mdy(jd):\n    z=int(jd+.5)\n    f=jd+.5-z\n  \
    \  if z<2299161:\n        a=z\n    else:\n        t=int((z-1867216.25)/36524.25)\n\
    \        a=z+1+t-int(t/4)\n    b=a+1524\n    c=int((b-122.1)/365.25)\n    g=int(365.25*c)\n\
    \    e=int((b-g)/30.6001)\n    d=int(b-g-int(30.6001*e)+f)\n    if e<14:\n   \
    \     m=e-1\n    else:\n        m=e-13\n    if m>2:\n        y=c-4716\n    else:\n\
    \        y=c-4715\n    return [m,d,y]\n\nm=int(input(\"\\nMonth (1-12): \"))\n\
    d=int(input(\"Day (1-31): \"))\ny=int(input(\"Year (1582-4000): \"))\nn=int(input(\"\
    \\nNumber of days: \"))\nm,d,y=mdy(jd(m,d,y)+n)\nprint(\"\\n{0}/{1}/{2}\\n\".format(m,d,y))\n\
    ```\n\n## DAYSDATS\n\nHow many days will you have been on the Earth on your next\
    \ birthday? This kind of question is easy to answer with this program. Two dates\
    \ are input, they are converted to Julian Day Numbers, and the difference between\
    \ them is output as the number of days between the two dates.\n\nThe jd() function\
    \ is at the core of this program. It is described in more detail in the julian.py\
    \ program presented in this chapter.\n\nThe sample calculation finds the number\
    \ of days from the day Orville and Wilbur made their first flight (December 17,\
    \ 1903) and the date of Y2K, or January 1, 2000. The result is 35,079 days to\
    \ be exact.\n\n![](img/8936d0646085e4f7f233755960035de6_18_0.png)\n\n![](img/8936d0646085e4f7f233755960035de6_19_0.png)\n\
    \n```python\ndef jd(m,d,y):\n    if m<3:\n        y-=1\n        m+=12\n    a=int(y/100)\n\
    \    b=2-a+int(a/4)\n    e=int(365.25*(y+4716))\n    f=int(30.6001*(m+1))\n  \
    \  return b+d+e+f-1524.5\n```\n\n```python\nprint(\"\\nFirst date\")\nm1=int(input(\"\
    Month (1-12): \"))\nd1=int(input(\"Day (1-31): \"))\ny1=int(input(\"Year (1582-4000):\
    \ \"))\nprint(\"\\nSecond date\")\nm2=int(input(\"Month (1-12): \"))\nd2=int(input(\"\
    Day (1-31): \"))\ny2=int(input(\"Year (1582-4000): \"))\nnd=int(abs(jd(m1,d1,y1)-jd(m2,d2,y2)))\n\
    print(\"\\n{}/{}/{}\".format(m1,d1,y1))\nprint(\"{}/{}/{}\".format(m2,d2,y2))\n\
    print(\"Days between: \",nd)\n```\n\n## JULIAN\n\nThis program demonstrates two\
    \ functions that are very useful for a variety of calendar calculations. All other\
    \ programs in this chapter use one or both of these functions.\n\njd() calculates\
    \ the Julian Day Number for a given date in the year range 1582 to 4000. This\
    \ is an absolute day number used by astronomers and others to clearly designate\
    \ the sequence for each day, without regard to leap years and other such complications.\n\
    \nNote that for historical reasons, each astronomical day begins at noon Greenwich\
    \ time, so there's an extra \".5\" on these Julian Day Numbers. In the programs\
    \ presented here we add and subtract whole days to find relative dates, and this\
    \ extra fractional part doesn't really matter. For astronomical calculations this\
    \ fractional part does become important.\n\nThe mdy() function provides a way\
    \ to convert a Julian Day Number back to a triplet of numbers for the month, day,\
    \ and year for that date. This makes it easy to add and subtract days to get a\
    \ new date accurately, without having to do any complicated adjustments for the\
    \ number of days in each month, or for leap years.\n\nThe example code inputs\
    \ a date and outputs its Julian Day Number. Next, any Julian Day Number is input\
    \ and the calendar date for that day is output. As shown, December 17, 1903 has\
    \ Julian Day Number 2,416,465.5 and Julian Day Number 2,500,000.5 will fall on\
    \ September 1 in the year 2132."
