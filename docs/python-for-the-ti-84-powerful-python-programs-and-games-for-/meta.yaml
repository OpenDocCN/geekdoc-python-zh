  md: '# RNDBYTE


    The random module provides several types of pseudorandom numbers. This program
    calls the getrandbits(8) function to generate random integers containing 8 bits.
    In other words, calling this function this way returns random bytes.


    This short program simply adds up all the random bytes and divides by the number
    of bytes. The average should be approximately 127.5. You might at first think
    the average should be 128, since a byte can hold 256 unique values in 8 bits.
    That is true, but those values run from 0 when no bits are set, up to 255 when
    all the bits are set to 1. The average of these values is 127.5.


    ![](img/8936d0646085e4f7f233755960035de6_97_0.png)


    The actual average calculated from 10,000 bytes won''t be exactly 127.5, but if
    you run this program several times you should see averages that kind of average
    out to about 127.5. More or less.


