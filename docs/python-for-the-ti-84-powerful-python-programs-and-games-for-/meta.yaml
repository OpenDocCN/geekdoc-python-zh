    This program finds all the factors of an integer. The factors() function is passed
    an integer, and it returns a list of all its prime factors.


    For example, the prime factors of 16 are four 2s, the prime factors of 12345 are
    3, 5, and 823, and the prime factors of 123454321 are 41, 41, 271, and 271:


    ![](img/8936d0646085e4f7f233755960035de6_136_0.png)


    When I first created this program, the factors were found by dividing by all numbers
    from 2 to the given number to find those that would divide evenly. This worked
    great for relatively small integers, but it slowed way down for numbers in the
    tens of thousands or greater. To speed things up (a lot!) I borrowed the next_prime()
    and is_prime() functions from elsewhere in this book, checking for divisibility
    by prime numbers, and only up to the square root of the given integer. This added
    a little length to the code listing, but the much speedier results were worth
    it.'
