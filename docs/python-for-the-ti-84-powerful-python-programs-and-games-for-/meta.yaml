  mdcn: "## PI_DARTS\n\n一个类似的使用随机数计算圆周率的程序是 PI_DARTS。\n\n想象一个特殊的飞镖盘，它是一个正方形，里面有一个刚好触及正方形边缘的圆。\n\
    \n如果你完全随机地向这个飞镖盘投掷飞镖，使得每一平方英寸被击中的机会都与其他任何一平方英寸相同，那么圆内命中次数与总投掷次数的比率可以提供圆周率值的估计。这很容易理解，因为该比率取决于圆和正方形的面积，而圆的面积是使用圆周率值计算的。\n\
    \n## $Area = \\pi * r^2$\n\n为了简化程序，我们可以只使用上图的右上角部分，即整个圆和正方形的总面积。这简化了数学计算，允许高效生成\
    \ 0 到 1 之间的随机数，并且也更容易检查左下角圆心的距离。\n\n这个程序是蒙特卡洛模拟的另一个例子，其中大量的随机试验提供了一个值的估计。程序会无限循环，或者直到你按下\
    \ [2nd] [quit]，以先发生者为准。每统计 1000 支飞镖后，显示会更新圆周率的估计值。\n\n就像布丰投针实验一样，这不是计算或估计圆周率值的非常高效的方法，它只是具有启发性，并且看看它是如何工作的很有趣。\n\
    \n```python\nfrom random import *\nimport ti_matplotlib as plt\n\ndef red(): plt.color(255,\
    \ 0, 0)\ndef green(): plt.color(0, 99, 0)\ndef blue(): plt.color(0, 0, 255)\n\
    def black(): plt.color(0, 0, 0)\ndef white(): plt.color(255,255,255)\n\nplt.cls()\n\
    plt.window(-.4, 1.4, -.1, 1.05)\nhits=0\ndarts=0\nwhile True:\n    x=random()\n\
    \    y=random()\n    darts+=1\n    if x*x+y*y<1:\n        hits+=1\n        red()\n\
    \    else:\n        blue()\n        plt.plot(x,y,\".\")\n    if darts%1000==0:\n\
    \        white()\n        p=round(4*hits/darts,6)\n        s=\"Darts: {} Pi: {}\"\
    .format(darts,p)\n        black()\n        plt.text_at(12,s,\"center\")\n```\n\
    \n请注意，程序中定义了几个单行函数来设置用于指示命中、未命中和其他细节的各种颜色。这是使你自己的图形程序更易于阅读和维护的好方法。\n\n## RNDBYTE\n\
    \n`random` 模块提供了几种类型的伪随机数。这个程序调用 `getrandbits(8)` 函数来生成包含 8 位的随机整数。换句话说，以这种方式调用此函数会返回随机字节。\n\
    \n这个简短的程序只是将所有随机字节相加，然后除以字节数。平均值应该大约是 127.5。你可能一开始会认为平均值应该是 128，因为一个字节可以在 8 位中容纳\
    \ 256 个唯一值。这是正确的，但这些值从没有位被设置时的 0，一直到所有位都被设置为 1 时的 255。这些值的平均值是 127.5。\n\n从 10,000\
    \ 个字节计算出的实际平均值不会正好是 127.5，但如果你多次运行这个程序，你应该会看到平均值大致平均到 127.5 左右。或多或少。\n\n```python\n\
    from random import *\nn=10000\nx=0\nprint(\"working...\")\nfor i in range(n):\n\
    \    x+=getrandbits(8)\nprint(n,x/n)\n```\n\n## WORDPERM\n\n这个程序处理一个长度最多为 5 个字符的单词中的字母，并显示所有可能的排列，即不重复的重新排列。例如，我的名字\
    \ JOHN 可以排列成 24 种不同的排列。\n\n我的姓氏 CRAIG 有五个字符，其字母的排列结果是 120 个唯一的序列。如你所见，随着单词长度的增加，排列数量迅速增加。对于\
    \ N 个字符，排列数量是 N!（阶乘）。一个六个字符的单词将有 720 种组合，所以我将程序限制为仅处理五个字符的单词。如果你愿意，可以更改代码以允许超过\
    \ 5 个字符，但要准备好处理大量输出！\n\n以下是 \"craig\" 输出屏幕序列的开始部分。\n\n```python\nfrom ti_system\
    \ import *\n\ndef perm(s):\n    if len(s)==1:\n        return [s]\n    b=[]\n\
    \    for i in range(len(s)):\n        m=s[i]\n        c=s[:i]+s[i+1:]\n      \
    \  for j in perm(c):\n            b.append(m+j)\n    return b\n\nwhile 1:\n  \
    \  s=input(\"\\nWord? \")\n    if s==\"\":\n        break\n    if len(s)>5:\n\
    \        print(\"5 chars max\\n\")\n    else:\n        p=perm(s.upper())\n   \
    \     u=\"\"\n        r=0\n        for t in p:\n            u+=t+\" \"\n     \
    \       if len(u)>25:\n                if r%8==0:\n                    if r:\n\
    \                        print(\"\\n[clear] to continue\")\n                 \
    \       disp_wait()\n                        disp_clr()\n                print(u)\n\
    \                u=\"\"\n                r+=1\n        print(u)\n```\n\n该程序会循环询问下一个单词，次数随你所愿，直到你在提示符下直接按\
    \ [enter] 键。\n\n请注意，这个循环使用的是 \"while 1:\" 而不是 \"while True:\"。两者工作方式相同，但在代码清单中，数字\
    \ 1 比值 True 更短。Python 会测试你放在 \"while\" 之后的任何内容的 \"真值\"，数字 1 通过了这个测试。然而，为了可读性，我建议在大多数情况下使用值\
    \ True 可能是更好的选择。\n\n## 4. GPS 和导航\n\n经纬度非常有趣，尤其是现在拥有智能手机的人比例很高，这些手机带有 GPS 芯片，可以随时告诉他们确切的位置。此外，Google（和其他）地图提供了一种很好的方式来确定你放大到的地球上任何点的位置。\n\
    \n本章让你使用地球表面上的此类坐标来计算距离、方向，甚至是由三个或更多坐标定义的陆地面积。\n\n这些计算不像在 x,y 平面中使用笛卡尔坐标给出的距离、方向和面积那么简单。这是因为地球是一个球体，导致经线在靠近北极或南极时被“挤压在一起”。但你的\
    \ TI-84 Plus CE Python 计算器非常有能力完成所有数学计算来完成这项工作。Python 使其变得容易。\n\n## GPS_AREA\n\
    \n在地球表面上，给定区域角上的几个经纬度坐标来查找面积，比你最初想象的要复杂。这个程序极大地简化了这个过程。\n\n第一个复杂情况出现在查找任何两个 GPS\
    \ 坐标之间的距离时。经线之间的距离，即一个点相对于另一个点向东或向西的距离，取决于纬度。这在程序 GPS_DIST 中有更详细的解释。\n\n该程序围绕多边形“行走”，将列表中的第一个坐标依次与多边形边缘周围的坐标连接起来，形成小三角形。这些三角形面积的总和就是由坐标列表定义的整个图形的面积。这里我们将使用任何两个坐标之间的距离和方向角来计算多边形中各个三角形区域的面积。\n\
    \n本书其他地方的三角形程序演示了如何在平面中找到三角形的所有部分，包括其面积，给定其任意三条边和角的组合。边角边函数借用了该程序来查找小三角形的面积。\n\
    \n真正酷的是，即使坐标定义的多边形形状有凹陷，程序也能自动正确地加减面积。这是因为在“行走”过程中，所选点对与第一个点之间的角度通常是正的。但对于凹陷处，一个或多个角度是负的，然后小三角形的面积就被计算为负值。这一切都解决了，重叠的区域会自动正确地加减，从而得到准确的总面积。\n\
    \n首先，让我们看一个相当简单的例子。弗吉尼亚州阿灵顿的五角大楼有五个边，其角上有五个 GPS 坐标。Google 地图让我们可以找到地图上任何点的经纬度（放大并右键单击一个点，然后从弹出菜单中选择“这是哪里？”）。以下是我找到的角坐标，采用标准纬度，"
