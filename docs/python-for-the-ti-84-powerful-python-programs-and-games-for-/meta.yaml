    # BRIDGE


    Balanced bridge circuits, also called Wheatstone bridges, are used in electronics
    for precision measurements and for other purposes. A common calculation is to
    find the value of one leg of a balanced bridge when the other three legs are known.
    For example, in the following figure we can calculate a value for R4 when R1,
    R2, and R3 are known. These values cause the ammeter across the middle to read
    zero amps. Similarly, a voltmeter across these same two nodes would read zero
    volts.


    ![](img/8936d0646085e4f7f233755960035de6_26_0.png)


    Here''s the equation relating the four resistors:


    $R1 \times R3 = R2 \times R4$


    Note that the bridge() function uses variables z1 to z3 instead of R1 to R3. This
    is because of an awesome feature of Python, where a variable can just as easily
    contain a complex number as it can a real number. In circuit'
  - "[PAGE 27]\n\nanalysis, complex numbers are very useful for AC circuits containing\
    \ capacitors and inductors in addition to resistors. And yes, AC bridge circuits\
    \ do follow all the same math rules when working with these components, using\
    \ complex numbers for their respective impedances\n\nThe following example calculates\
    \ the value of the 4th leg resistance when the first three resistors are 2700,\
    \ 3900, and 5600 ohms, and it solves a second time for complex impedances of 4+3j,\
    \ 5+0j, and 3-7j.\n\n![](img/8936d0646085e4f7f233755960035de6_27_0.png)\n\nAs\
    \ shown, the 4th resistor in the first case should be approximately 3877 ohms,\
    \ and the impedance in the second case should be 6.6-3.8j ohms.\n\n```\ndef bridge(z1,z2,z3):\n\
    \    return z1*z3/z2\n```\n\n```\nr1=2700\nr2=3900 # opposite the unknown\nr3=5600\n\
    r4=bridge(r1,r2,r3)\nprint(\"r1: \",r1)\nprint(\"r2: \",r2)\nprint(\"r3: \",r3)\n\
    ```"
