    ## VECTORS\n\n如果你处理向量，这个程序会非常有用。九个不同的函数涵盖了同时处理一个、两个或三个向量（二维或三维）的所有基础操作。\n\n这些函数通常非常简短高效。运行程序时，函数会被定义，并显示一条简短的指令作为如何开始的提示。只需输入\
    \ `v()` 即可运行一个显示所有九个向量函数列表的函数。你可以随时输入此命令来刷新记忆，了解有哪些可用函数以及每个函数需要的参数。\n\n![](img/8936d0646085e4f7f233755960035de6_166_0.png)\n\
