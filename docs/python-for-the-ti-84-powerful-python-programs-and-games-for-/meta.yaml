    \ if s else 0\ns=input(\"RMS: \")\nrms=float(s) if s else 0\navg,peak,rms=ac_voltages(avg,peak,rms)\n\
    print(\"\\nAvg: \",avg)\nprint(\"Peak: \",peak)\nprint(\"RMS: \",rms)\n```"
