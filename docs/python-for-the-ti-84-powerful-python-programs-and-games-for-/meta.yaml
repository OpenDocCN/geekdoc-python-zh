  md: '# WAIT_KEY


    The ti_system module provides some useful functions for controlling your programs,
    such as wait_key(). wait_key() returns a unique number for any key pressed. For
    example, if the [enter] key is pressed, wait_key() returns 5.


    This is clear enough, but it''s hard to guess exactly what number will be returned
    when the various keys are pressed. For example, the [prgm] key returns 45, but
    the [vars] key next to it returns 53.


