    \ outline of the lake was, with just four points to define it, our calculation\
    \ is pretty good!\n\nThis program works well for land areas that aren't too large.\
    \ The Earth is not flat, so the curve of the Earth's surface does affect calculated\
    \ areas if they are very large, say hundreds of kilometers on edge.\n\n## GPS_DIST\n\
    \nDistance between two points in a plane is found using the Pythagorean Theorem,\
    \ but distances on the surface of a sphere, such as the Earth, is more complicated.\
    \ This program accurately calculates the distance between any two locations given\
    \ their latitude and longitude coordinates, also referred to as GPS coordinates.\n\
    \nThe algorithm uses several trigonometric functions, so the math module is imported\
    \ at the top of the listing. The sin() and cos() functions in Python assume all\
    \ angles are in radians, so the radians() function in the math module is used\
    \ to convert latitude and longitude from standard degrees to radians. (Yes, there\
    \ is a degrees() function as well, but it's not used in this program.)\n\nThe\
    \ distance() function is at the heart of this program. Inputs are latitude and\
    \ longitude for two points on the Earth, and output is the kilometers between\
    \ the two points. The constant 6371 is the radius of the Earth in kilometers.\n\
    \nFor example, the Gateway Arch in St. Louis is visible on Google Maps, and we\
    \ can carefully zoom in and click to find the coordinates at back corners of the\
    \ Arch where the metal meets the concrete. Those are the pair of coordinates in\
    \ the program listing. Another coordinate is at the Golden Gate Bridge in San\
    \ Francisco, so we can measure a greater distance as well.\n\nThe St. Louis Arch\
    \ is officially 630 feet tall and 630 feet wide. This program calculates the width\
    \ as 629.9 feet, which is probably more accurate than it should be, but I'll take\
    \ it! The air (straight-line) distance between San Francisco and St. Louis is\
    \ listed as 1745 km, and this program finds the distance between the Arch and\
    \ the Bridge as 1744.7 miles, which is also an amazingly similar result:\n\n![](img/8936d0646085e4f7f233755960035de6_114_0.png)\n\
    \n```python\nfrom math import *\n\ndef distance(pt1,pt2):\n    la1=radians(pt1[0])\n\
    \    lo1=radians(pt1[1])\n    la2=radians(pt2[0])\n    lo2=radians(pt2[1])\n \
    \   r=6371\n    t1=sin(la1)*sin(la2)\n    t2=cos(la1)*cos(la2)*cos(lo2-lo1)\n\
    \    km=acos(t1+t2)*r\n    return km\n\n#Arch width\npt1=(38.625412,-90.184555)\n\
    pt2=(38.623767,-90.185227)\nkm=distance(pt1,pt2)\nprint()\nprint(\"Arch Meters:\\\
    n\",km*1000)\nprint(\"Arch Feet:\\n\",km*3280.84)\n\n#Arch to Golden Gate Bridge\n\
    pt2=(37.820142,-122.478709)\nkm=distance(pt1,pt2)\nprint()\nprint(\"Arch-Bridge\
    \ km:\\n\",km)\nprint(\"Arch-Bridge miles:\\n\",km*.621371)\n```\n\n## MIDPOINT\n\
    \nThis program finds the latitude and longitude at a point halfway between two\
    \ other locations on the Earth. Call up your friend a state or two away and have\
    \ them meet you at the exact midpoint, just for fun.\n\nThis program is also great\
    \ for checking if the Earth is flat or round. Seriously. Consider that the Sun's\
