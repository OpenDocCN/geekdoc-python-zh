    \n```\nfrom math import *\n\ndef add(v1, v2):\n    return [a + b for a, b in zip(v1,\
    \ v2)]\n\ndef sub(v1, v2):\n    return [a - b for a, b in zip(v1, v2)]\n\ndef\
    \ dot(v1, v2):\n    return sum([a * b for a, b in zip(v1, v2)])\n\ndef ang(v1,\
    \ v2):\n    m1 = sum(i * i for i in v1) ** .5\n    m2 = sum(i * i for i in v2)\
    \ ** .5\n    d = sum([a * b for a, b in zip(v1, v2)])\n    return degrees(acos(d\
    \ / m1 / m2))\n\ndef cross(v1, v2):\n    a, b, c = v1\n    d, e, f = v2\n    return\
    \ [b * f - c * e, c * d - a * f, a * e - b * d]\n\ndef stp(v1, v2, v3):\n    a,\
    \ b, c = v1\n    d, e, f = v2\n    g, h, i = v3\n    p = a * e * i + b * f * g\
    \ + c * d * h\n    m = a * f * h + b * d * i + c * e * g\n    return p - m\n\n\
    def mul(v, n):\n    return [i * n for i in v]\n\ndef mag(v):\n    return sum(i\
    \ * i for i in v) ** .5\n\ndef unit(v):\n    m = mag(v)\n    return [i / m for\
    \ i in v]\n\ndef v():\n    print(\"add(v,v)\")\n    print(\"sub(v,v)\")\n    print(\"\
    dot(v,v)\")\n    print(\"ang(v,v)\")\n    print(\"cross(v,v)\")\n    print(\"\
    stp(v,v,v)\")\n    print(\"mul(v,n)\")\n    print(\"mag(v)\")\n    print(\"unit(v)\\\
    n\")\n\nprint(\"\\nv() to list functions\")\n```\n\n## 7. Other Useful Programs\n\
