  md: "![](img/8936d0646085e4f7f233755960035de6_134_0.png)\n\nThe roots() function\
    \ breaks down the large interval into many smaller intervals, based on the step\
    \ size argument. The function is called for the end points of these smaller intervals.\
    \ Whenever the two returned values don't have the same sign, the function root()\
    \ is called to use a binary search to find the \"exact\" root in that interval.\n\
    \nThe binary search cuts the interval between x1 and x2 in half, calculates y\
    \ at that midpoint, then determines if a root must lie somewhere to the left or\
    \ to the right of that midpoint. The value of x1 is replaced with the midpoint\
    \ value in one case, and x2 is replaced otherwise. The search is repeated within\
    \ this tighter interval, over and over, until the difference between x1 and x2\
    \ approaches zero, at the root value of x.\n\nEdit the function at the top of\
    \ the listing, and the call to roots() at the end of the listing to find roots\
    \ for your own functions.\n\n```\ndef f(x):\n    return 0.7*x**3-7*x**2+3*x+17\n\
    \ndef roots(xmin,xmax,steps):\n```"
