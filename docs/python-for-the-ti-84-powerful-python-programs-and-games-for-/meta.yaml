- md: "It's important not to burn out the resistor or the LED in your circuit.\n\n\
    Resistors have a stated wattage, and they'll be okay if Wres is less than this\
    \ value. In our example the resistor is heated with about 0.17 watts of power,\
    \ so a standard quarter watt (0.25 watts) resistor should work fine. LEDs have\
    \ a stated maximum current, which you can also check with these results.\n\n##\
    \ OHMSLAW\n\nThe subject of electricity and electronics is full of equations and\
    \ formulas, but by far the two most important equations are what we call \"Ohm's\
    \ Law\". If you learn only how to work with the following two simple equations,\
    \ you'll know enough to be considered an electronics whiz by most everyone you\
    \ know.\n\nThe first equation states that voltage (Electromagnetic force) is equal\
    \ to current in amps (I) times resistance in ohms (R). The second equation states\
    \ that wattage (Power) is equal to current in amps times voltage.\n\nIt's easy\
    \ to algebraically rearrange these two equations to calculate the unknowns when\
    \ any two values are known. This program prompts you to enter any two of these\
    \ four values, the other two quantities will be calculated, and all four values\
    \ will be output.\n\nThis program defines a function named ohms_law(), prints\
    \ some instructions for your review, and then stops. From then on you call the\
    \ new function to calculate all four values when any two are known.\n\nYou can\
    \ type the names of the functions, or you can select them from the Tools menu\
    \ through the 4:Vars option.\n\nFor example, consider a 60 watt light bulb powered\
    \ by standard household 117 volts. Enter zeros for the two unknowns, current and\
    \ resistance, and the function will find these values. The current is about half\
    \ an amp, and the resistance of the bulb is about 228 ohms.\n\n```python\ndef\
    \ ohms_law(p,i,e,r):\n    if p and i:\n        e=p/i\n        r=p/(i*i)\n    elif\
    \ p and e:\n        i=p/e\n        r=(e*e)/p\n    elif p and r:\n        i=math.sqrt(p/r)\n\
    \        e=math.sqrt(p*r)\n    elif i and e:\n        p=i*e\n        r=e/i\n \
    \   elif i and r:\n        p=i*i*r\n        e=i*r\n    elif e and r:\n       \
    \ p=(e*e)/r\n        i=e/r\n    else:\n        pass\n    return ([p,i,e,r])\n\
    ```\n\n```python\nprint(\"\\nohms_law(p,i,e,r)\")\nprint(\"Pass two known values,\
    \ and zeros\")\nprint(\"for the other two unknowns.\")\n```\n\n## PARALLEL\n\n\
    Resistors in parallel can be replaced with a single equivalent resistor, a technique\
    \ often used in circuit analysis. The same equation works for impedances in parallel\
    \ too, so this one program works for resistances or complex number impedances\
    \ alike.\n\nThe equivalent resistance (or impedance) is calculated with the following\
    \ formula:\n\nHere's a sketch showing how the multiple resistors are wired in\
    \ parallel:\n\nThe program defines a function named parallel(), and prints two\
    \ lines of instructions. Note that a single list of values is passed to this function,\
    \ allowing any number of parallel resistances or impedances to be processed. Just\
    \ add two or more to the list and pass the list to this function. The example\
    \ shows how square brackets define a list.\n\n```python\ndef parallel(zlist):\n\
    \    zp=sum(1/z for z in zlist)\n    return 1/zp\n```\n\n```python\nprint(\"\\\
    nParallel (R or Z)\")\nprint(\"parallel(list)\")\n```\n\nThe first example finds\
    \ a single resistor equal to three resistors in parallel, and the second example\
    \ repeats the calculation for a list of two complex number impedances.\n\nBe sure\
    \ to \"wrap\" the three resistor values into a list using square brackets, as\
    \ shown. This function expects just one argument, the list, and passing it three\
    \ separate numbers causes an error.\n\nThe result shows that resistors of 300,\
    \ 400, and 500 ohms in parallel can be replaced with one resistor of about 128\
    \ ohms.\n\nThe next example calculates the equivalent impedance for two impedances\
    \ in parallel, the first at 300+400j, and the second at 500-600j. As shown here,\
    \ the equivalent impedance is approximately 453+138j.\n\n```\n>>> # Shell Reinitialized\n\
    >>> # Running PARALLEL\n>>> from PARALLEL import *\n\nParallel (R or Z)\nparallel(list)\n\
    >>> parallel([300+400j,500-600j])\n(452.9411764705882+138.2352941176471j)\n>>>\
    \ |\n```\n\n## RCTIMING\n\nMany common timing circuits are based on an R-C charging\
    \ configuration, the basics of which are shown here:\n\nCapacitor C1 starts out\
    \ with a voltage at Vi the same as V1. This starting voltage V1 is often zero,\
    \ but it can be any voltage. When the input voltage switches to some other voltage\
    \ V2, the capacitor starts to charge up as current flows into (or out of) it through\
    \ R1. It takes time for the voltage at Vi to ramp up (or down) all the way to\
    \ V2, and the details of this charging time is what this program is all about.\n\
    \nThere are six variables in this calculation; the starting applied voltage V1,\
    \ the new applied voltage V2, the instantaneous voltage Vi, the number of seconds\
    \ S since the applied voltage was changed, and the values for resistance R and\
    \ capacitance C that determine the changing rate of the instantaneous voltage.\
    \ The bigger the resistor, the slower the capacitor will charge. The greater the\
    \ difference between the two input voltages the faster the voltage across the\
    \ capacitor will change. And so on. Here is the equation that relates all these\
    \ parameters:\n\nThis program defines a function named rc_timing() that algebraically\
    \ isolates each variable in this equation to find its value when all the other\
    \ variables are known. A second function, named rc() is designed for no other\
    \ purpose than to make entry and display of the results simpler and better. You\
    \ can use either function to get the same results, but I suggest using rc().\n\
    \n```python\nfrom math import *\n\ndef rc_timing(v1,v2,vi,C,R,t):\n    if not\
    \ t:\n        tmp=-log((v2-vi)/(v2-v1))\n        t=tmp*R*C\n    elif not R:\n\
    \        tmp=-log((v2-vi)/(v2-v1))\n        R=t/C/tmp\n    elif not C:\n     \
    \   tmp=-log((v2-vi)/(v2-v1))\n        C=t/R/tmp\n    elif not vi:\n        tmp=exp(-t/R/C)\n\
    \        vi=v2-tmp*(v2-v1)\n    elif not v2:\n        tmp=exp(-t/R/C)\n      \
    \  v2=(tmp*v1-vi)/(tmp-1)\n    elif not v1:\n        tmp=exp(-t/R/C)\n       \
    \ v1=(vi+v2*(tmp-1))/tmp\n    return [v1,v2,vi,C,R,t]\n\ndef rc(v1,v2,vi,C,R,t):\n\
    \    v1,v2,vi,C,R,t=rc_timing(v1,v2,vi,C,R,t)\n    print(\"v1: \",v1)\n    print(\"\
    v2: \",v2)\n    print(\"vi: \",vi)\n    print(\"C: \",C)\n    print(\"R: \",R)\n\
    \    print(\"t: \",t)\n\nprint(\"\\nrc(v1,v2,vi,C,R,t)\")\nprint(\"Pass 0 for\
    \ the unknown\")\n```\n\nWhen you run this program the two functions are defined\
    \ but no further action is taken. You can then type into the shell the rc() function,\
    \ passing all six parameters. Any one, and only one, of the arguments should be\
    \ zero, and its value will be calculated using the other five arguments.\n\nFor\
    \ example, starting with V1 at 0 volts, then applying V2 of 5 volts, how long\
    \ will it take voltage Vi to rise to 4 volts when the resistor is 47K ohms and\
    \ the capacitor is 6.8 microfarads? Now here's the tricky part; only the unknown\
    \ value, in this case the elapsed time t, should be entered as zero. So, be sure\
    \ to set V1, the starting voltage, to a tiny value very near zero. The answer\
    \ will be accurate enough, as long as a very small value is entered for V1. The\
    \ example shown uses V1 = 0.001 volts.\n\nIn summary, in this example we find\
    \ that it takes about 0.514 seconds for a capacitor's voltage to rise from 0 to\
    \ 4 volts after 5 volts is applied across a 47K ohm resistor, when the capacitor\
    \ is 6.8 microFarads.\n\n## SERIES\n\nResistors in series can be replaced with\
    \ a single resistor calculated as the sum of the resistances. Here's the formula:\n\
    \nThis formula is also valid for complex number impedances connected in series,\
    \ and the sample code shows both a set of resistors and a set of impedances converted\
    \ to equivalent single values by calling the series() function.\n\n```python\n\
    def series(zlist):\n    zs=sum(z for z in zlist)\n    return zs\n\nprint(\"\\\
    nSeries (R or Z)\")\nprint(\"series(list)\\n\")\n```\n\nThe program defines the\
    \ series() function, then prints reminder instructions for its use. In the shell,\
    \ pass a list of resistances and/or impedances to the series() function. The resulting\
    \ total resistance, or impedance, is output as a result.\n\nFor example, three\
    \ resistors are wired in series. They are 300, 400, and 500 ohms. What is the\
    \ total resistance of the circuit?"
  mdcn: "避免烧毁电路中的电阻器或LED非常重要。\n\n电阻器有标称功率，只要实际功率Wres小于该值，它们就能正常工作。在我们的示例中，电阻器的功耗约为0.17瓦，因此标准的四分之一瓦（0.25瓦）电阻器应该可以正常工作。LED有标称最大电流，你也可以用这些结果来验证。\n\
    \n## 欧姆定律\n\n电学和电子学的主题充满了方程和公式，但迄今为止最重要的两个方程就是我们所说的“欧姆定律”。如果你只学会如何运用以下两个简单的方程，你所掌握的知识就足以让你在大多数认识的人眼中成为电子高手。\n\
    \n第一个方程指出，电压（电磁力）等于以安培为单位的电流（I）乘以以欧姆为单位的电阻（R）。第二个方程指出，功率（瓦特数）等于以安培为单位的电流乘以电压。\n\
    \n当已知任意两个值时，通过代数方法重新排列这两个方程来计算未知量是很容易的。这个程序会提示你输入这四个值中的任意两个，另外两个量将被计算出来，并且所有四个值都会被输出。\n\
    \n这个程序定义了一个名为`ohms_law()`的函数，打印一些供你查看的说明，然后停止。之后，你可以调用这个新函数，在已知任意两个值的情况下计算所有四个值。\n\
    \n你可以输入函数的名称，也可以通过工具菜单中的4:Vars选项选择它们。\n\n例如，考虑一个由标准家用117伏电压供电的60瓦灯泡。为两个未知数（电流和电阻）输入零，函数将找到这些值。电流约为半安培，灯泡的电阻约为228欧姆。\n\
    \n```python\ndef ohms_law(p,i,e,r):\n    if p and i:\n        e=p/i\n        r=p/(i*i)\n\
    \    elif p and e:\n        i=p/e\n        r=(e*e)/p\n    elif p and r:\n    \
    \    i=math.sqrt(p/r)\n        e=math.sqrt(p*r)\n    elif i and e:\n        p=i*e\n\
    \        r=e/i\n    elif i and r:\n        p=i*i*r\n        e=i*r\n    elif e\
    \ and r:\n        p=(e*e)/r\n        i=e/r\n    else:\n        pass\n    return\
    \ ([p,i,e,r])\n```\n\n```python\nprint(\"\\nohms_law(p,i,e,r)\")\nprint(\"Pass\
    \ two known values, and zeros\")\nprint(\"for the other two unknowns.\")\n```\n\
    \n## 并联\n\n并联的电阻器可以用一个等效电阻器来替代，这是电路分析中常用的技术。同样的方程也适用于并联的阻抗，因此这个程序同样适用于电阻或复数阻抗。\n\
    \n等效电阻（或阻抗）使用以下公式计算：\n\n下面是一个示意图，展示了多个电阻器如何并联连接：\n\n该程序定义了一个名为`parallel()`的函数，并打印两行说明。请注意，一个值列表被传递给此函数，允许处理任意数量的并联电阻或阻抗。只需将两个或更多值添加到列表中，并将列表传递给此函数。示例展示了如何用方括号定义一个列表。\n\
    \n```python\ndef parallel(zlist):\n    zp=sum(1/z for z in zlist)\n    return\
    \ 1/zp\n```\n\n```python\nprint(\"\\nParallel (R or Z)\")\nprint(\"parallel(list)\"\
    )\n```\n\n第一个示例找到一个与三个并联电阻等效的电阻，第二个示例对一个包含两个复数阻抗的列表重复计算。\n\n务必使用方括号将三个电阻值“包装”成一个列表，如图所示。此函数只期望一个参数，即列表，传递三个单独的数字会导致错误。\n\
    \n结果显示，300、400和500欧姆的电阻并联可以用一个约128欧姆的电阻替代。\n\n下一个示例计算两个并联阻抗的等效阻抗，第一个为300+400j，第二个为500-600j。如图所示，等效阻抗约为453+138j。\n\
    \n```\n>>> # Shell Reinitialized\n>>> # Running PARALLEL\n>>> from PARALLEL import\
    \ *\n\nParallel (R or Z)\nparallel(list)\n>>> parallel([300+400j,500-600j])\n\
    (452.9411764705882+138.2352941176471j)\n>>> |\n```\n\n## RC定时\n\n许多常见的定时电路基于R-C充电配置，其基本原理如下所示：\n\
    \n电容器C1的初始电压Vi与V1相同。这个初始电压V1通常为零，但也可以是任何电压。当输入电压切换到另一个电压V2时，电容器开始通过R1充电（或放电）。电压Vi需要时间才能上升（或下降）到V2，而这个充电时间的细节正是本程序的核心。\n\
    \n此计算中有六个变量：初始施加电压V1、新的施加电压V2、瞬时电压Vi、自施加电压改变以来的秒数S，以及决定瞬时电压变化率的电阻R和电容C的值。电阻越大，电容器充电越慢。两个输入电压之间的差值越大，电容器两端的电压变化就越快。依此类推。以下是关联所有这些参数的方程：\n\
    \n该程序定义了一个名为`rc_timing()`的函数，该函数通过代数方法分离此方程中的每个变量，以便在已知所有其他变量时求出其值。第二个函数名为`rc()`，其唯一目的是使结果的输入和显示更简单、更好。你可以使用任一函数获得相同的结果，但我建议使用`rc()`。\n\
    \n```python\nfrom math import *\n\ndef rc_timing(v1,v2,vi,C,R,t):\n    if not\
    \ t:\n        tmp=-log((v2-vi)/(v2-v1))\n        t=tmp*R*C\n    elif not R:\n\
    \        tmp=-log((v2-vi)/(v2-v1))\n        R=t/C/tmp\n    elif not C:\n     \
    \   tmp=-log((v2-vi)/(v2-v1))\n        C=t/R/tmp\n    elif not vi:\n        tmp=exp(-t/R/C)\n\
    \        vi=v2-tmp*(v2-v1)\n    elif not v2:\n        tmp=exp(-t/R/C)\n      \
    \  v2=(tmp*v1-vi)/(tmp-1)\n    elif not v1:\n        tmp=exp(-t/R/C)\n       \
    \ v1=(vi+v2*(tmp-1))/tmp\n    return [v1,v2,vi,C,R,t]\n\ndef rc(v1,v2,vi,C,R,t):\n\
    \    v1,v2,vi,C,R,t=rc_timing(v1,v2,vi,C,R,t)\n    print(\"v1: \",v1)\n    print(\"\
    v2: \",v2)\n    print(\"vi: \",vi)\n    print(\"C: \",C)\n    print(\"R: \",R)\n\
    \    print(\"t: \",t)\n\nprint(\"\\nrc(v1,v2,vi,C,R,t)\")\nprint(\"Pass 0 for\
    \ the unknown\")\n```\n\n当你运行此程序时，两个函数被定义，但不会采取进一步操作。然后你可以在shell中输入`rc()`函数，并传递所有六个参数。其中一个且仅一个参数应为零，其值将使用其他五个参数计算出来。\n\
    \n例如，从V1为0伏开始，然后施加V2为5伏，当电阻为47K欧姆，电容为6.8微法时，电压Vi上升到4伏需要多长时间？现在这里有个关键点；只有未知值（在这种情况下是经过的时间t）应输入为零。因此，请务必将起始电压V1设置为一个非常接近零的微小值。只要为V1输入一个非常小的值，答案就足够精确。所示示例使用V1\
    \ = 0.001伏。\n\n总之，在这个示例中，我们发现当电容器为6.8微法时，在47K欧姆电阻两端施加5伏电压后，电容器的电压从0上升到4伏大约需要0.514秒。\n\
    \n## 串联\n\n串联的电阻器可以用一个计算为电阻之和的单个电阻器来替代。公式如下：\n\n此公式也适用于串联连接的复数阻抗，示例代码展示了通过调用`series()`函数将一组电阻和一组阻抗转换为等效的单个值。\n\
    \n```python\ndef series(zlist):\n    zs=sum(z for z in zlist)\n    return zs\n\
    \nprint(\"\\nSeries (R or Z)\")\nprint(\"series(list)\\n\")\n```\n\n该程序定义了`series()`函数，然后打印其使用提醒说明。在shell中，将一个电阻和/或阻抗的列表传递给`series()`函数。结果的总电阻或阻抗将作为结果输出。\n\
    \n例如，三个电阻器串联连接。它们分别是300、400和500欧姆。电路的总电阻是多少？"
