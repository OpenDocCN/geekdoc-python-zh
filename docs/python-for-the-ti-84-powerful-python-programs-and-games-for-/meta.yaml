  md: '# RELATVTY


    At very high velocity, what is called relativistic velocity, space and time start
    to get really weird. We don''t notice the effects normally, because even the fastest
    spacecraft we have moves at only a tiny fraction of the speed of light. If it
    could move at the speed of light, it would orbit the Earth seven times every second.


    At the heart of several relativistic calculations is gamma, a value calculated
    from a velocity V as compared to the speed of light C. Here''s the formula for
    gamma:


    ![](img/8936d0646085e4f7f233755960035de6_263_0.png)


    This program lets you input a velocity as a fraction of the speed of light. The
    actual velocity and the value of gamma is then calculated, and the distortion
    of time, length and mass is described. For example, if a spaceship could travel
    at 95% of the speed of light, here''s what we''d observe from Earth:'
