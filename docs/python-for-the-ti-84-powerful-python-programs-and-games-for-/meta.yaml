    \ is found at 0,1,2 as shown here:\n\n![](img/8936d0646085e4f7f233755960035de6_111_0.png)\n\
    \nNotice that this triangle is too big, covering more area than the overall lake\
    \ outline. That's okay though, as the next triangle, at 0,2,3 is \"backwards\"\
    , in that the order of its points is clockwise instead of counter-clockwise, automatically\
    \ resulting in a negative area.\n\n![](img/8936d0646085e4f7f233755960035de6_111_1.png)\n\
    \nNo matter how complicated the list of coordinates gets, as long as they are\
    \ in the correct \"walk around\" order for the entire polygon, all the areas add\
    \ up correctly, both positive and negative, no matter how they overlap.\n\n![](img/8936d0646085e4f7f233755960035de6_112_0.png)\n\
    \n6.289 square kilometers is about 1,554 acres. A quick check on the Internet\
