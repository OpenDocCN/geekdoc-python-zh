  md: '# CRICKETS


    Next time you''re out for an evening walk and you hear a chorus of crickets chirping
    in synchrony, count the number of chirps per minute, then whip out your TI-84
    Plus CE Python calculator to amaze whomever you''re walking with by telling them
    the air temperature.


    There are numerous sites on the Internet where you can find the formula for chirps
    per minute to air temperature. Most of them agree for the most part, although
    I''ve seen a couple formulas that differ slightly. I chose the original Dolbear''s
    Law formula, as explained on Wikipedia. Simply subtract 40 from the chirps per
    minute, divide the result by 4 and add 50 to get the air temperature in degrees
    Fahrenheit.


    This program uses the ti_plotlib module to generate a Python graph for easy reference
    when you''re out on that walk.


    ![](img/8936d0646085e4f7f233755960035de6_175_0.png)


    The grid lines along the x axis span chirp rates from 50 to 200, and along'
