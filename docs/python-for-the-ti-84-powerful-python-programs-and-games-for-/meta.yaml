    \ MNTYHALL\n\nHave you heard of the famous Monty Hall puzzle? It's a doozy, and\
    \ it baffled some top minds when it was first discussed.\n\nSo, Monty shows you\
    \ three doors, and states there's a car behind one of them. You guess one of the\
    \ doors. Before opening your door to see if you won, Monty opens one of the other\
    \ two doors, where nothing is behind that door. Then he asks if you want to switch\
    \ with the last door before the big reveal. Should you switch? Will it make any\
    \ difference?\n\nMany people say that since there are two unopened doors left,\
    \ there's a fifty-fifty chance the car is behind either one. So it won't matter\
    \ if you switch before Monty opens your door. But it turns out that is wrong!\n\
    \nThis program performs a Monte Carlo simulation (this Monte is unrelated to the\
    \ other Monty, or to the Full Monty for that matter, but that's another story.)\
    \ The program simulates you being asked 1000 times by Monty if you want to switch,\
    \ and it tallies the number of times you win the car if you do switch and again\
    \ if you don't switch.\n\nIf you do switch, your odds of winning are 2 times out\
    \ of 3, and if you don't switch your odds are 1 out of 3. In summary, make that\
    \ switch!\n\nIf this result baffles you, read up on the Internet about the \"\
    Monty Hall Problem\", or watch any of the several Youtube videos that cover the\
    \ subject. Meanwhile, have fun simulating a bunch of wins with your TI-84 Plus\
    \ CE Python calculator!\n\n![](img/8936d0646085e4f7f233755960035de6_89_0.png)\n\
    \n```python\nfrom random import *\n\ngames=1000\n\nfor n in range(2):\n    if\
    \ n:\n        switch=True\n    else:\n        switch=False\n    wins=0\n    for\
    \ i in range(games):\n        doors=[False,False,False]\n        doors[randrange(3)]=True\n\
    \        choice1=randrange(3)\n        monty_opens=randrange(3)\n        while\
    \ monty_opens==choice1:\n            monty_opens=randrange(3)\n        if switch==False:\n\
    \            if doors[choice1]==True:\n                wins+=1\n        else:\n\
    \            if doors[choice1]==False:\n                wins+=1\n    if switch:\n\
    \        s=\"does\"\n    else:\n        s=\"does not\"\n    print(\"\\nWin percent\
    \ when contestant\")\n    print(\"{} swap last 2 doors:\".format(s))\n    print(round(100*wins/games,2))\n\
    ```\n\n## PI_BUFFN\n\nThe value of pi can be calculated in many ways, including\
    \ simulating real-world randomness with random numbers. A guy named Georges-Louis\
    \ de Buffon came up with a cool method along these lines, way back in the 18th\
    \ century, way before the first Texas Instruments calculator was thought of. He\
    \ suggested dropping needles randomly on a floor marked with parallel lines with\
    \ fixed spacing, and counting the number of needles that touched one of the lines\
    \ when it came to rest as compared to the total number dropped.\n\nThere are many\
    \ places on the Internet where you can read up on all the math involved in this\
    \ process, all leading to an estimate of the value of pi. It really is ingenious.\
    \ With your TI-84 Plus CE Python calculator you can simulate dropping thousands\
    \ of needles in just seconds, a good feature since this method really is slow\
    \ to converge accurately on the value of pi. You'd have to have a lot of patience\
    \ to use real needles!\n\nThe program asks how many needles you want to drop.\
    \ Try 1,000 or perhaps 10,000 needles for reasonable run times. Try more if you\
    \ can let your calculator sit on a shelf and run for a long time, or less if you\
    \ just want to see some crude estimates of pi. Here's the result of choosing 1,000\
    \ needles:"
