    # AVGPKRMS


    Homes in the United States are supplied with electrical power in the form of a
    sine wave with an effective voltage of about 117 volts. This effective voltage
    provides the same power in watts to a resistive load as would a DC voltage of
    117 volts. Effective voltage is also called RMS, which stands for "Root-Mean-Squared",
    because of the way it is mathematically derived.


    Most of the time we use the effective voltage value, because it is the value that
    allows quick calculation of power to a circuit. But there are two other ways to
    measure a sine wave voltage. The peak voltage, at the very top point of the sine
    wave, provides a "Peak" voltage value, and the average magnitude of the voltage
    over time, without regard to polarity, provides the "Average" voltage value.


    Here are the two main conversion equations. All the relationships between Peak,
    Average, and RMS voltages can be figured out by algebraically working with these
    two:


    ![](img/8936d0646085e4f7f233755960035de6_24_0.png)


    This program provides the conversions between these three ways to describe a pure
    sine wave voltage. Enter the one known value when prompted for it, and just press
    [enter] to skip the other two. The program determines which value you''ve entered,
    calculates the other two, and outputs all three for easy reference.


    As shown in this sample run, a standard U.S. house wiring voltage of 117 V (RMS)
    has a peak voltage of about 165 V, and an average voltage over'
  - "[PAGE 25]\n\ntime of about 105 V.\n\n![](img/8936d0646085e4f7f233755960035de6_25_0.png)\n\
    \n```\nfrom math import *\n\ndef ac_voltages(avg,peak,rms):\n    if avg:\n   \
    \     peak=pi*avg/2\n        rms=peak/sqrt(2)\n    elif peak:\n        avg=peak*2/pi\n\
    \        rms=peak/sqrt(2)\n    elif rms:\n        peak=rms*sqrt(2)\n        avg=peak*2/pi\n\
    \    return [avg,peak,rms]\n\nprint(\"\\n\\nInput one AC voltage type\\n\")\n\
    s=input(\"Average: \")\navg=float(s) if s else 0\ns=input(\"Peak: \")\npeak=float(s)\
    \ if s else 0\ns=input(\"RMS: \")\nrms=float(s) if s else 0\navg,peak,rms=ac_voltages(avg,peak,rms)\n\
    print(\"\\nAvg: \",avg)\nprint(\"Peak: \",peak)\nprint(\"RMS: \",rms)\n```"
