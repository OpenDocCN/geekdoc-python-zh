  md: '# LED_RES


    LEDs are awesome. Once you know how to power them properly, you can light up all
    kinds of fun artwork, gadgets, and inventions in any color and blinking patterns
    imaginable. For example, the author invented a brake light for bicycles that requires
    no wiring to the brakes at all, instead relying on an accelerometer chip to determine
    when to flash bright red LEDs to indicate deceleration. Check out LucidBrakes
    online.


    An LED is a special type of diode, where current flows easily in one direction
    through it, and not in the other direction. To light up an LED you need to use
    a resistor to limit the amount of current allowed to flow in the "easy" direction.
    This program helps you calculate the size of that resistor. It also helps determine
    the current and power requirements, to make sure no magic smoke is emitted from
    anything!


    The standard way to wire up an LED is with a resistor in series, and a voltage
    source powering them both:'
