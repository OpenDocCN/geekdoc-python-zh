    \ is flat, the elevation angles will behave one way, and if the Earth is round\
    \ the angles will behave another way. (Hint: it is round, but feel free to check\
    \ for yourself an excellent way to discover the truth!)\n\nLet's find the latitude\
    \ and longitude of the point halfway between the Golden Gate Bridge in San Francisco,\
