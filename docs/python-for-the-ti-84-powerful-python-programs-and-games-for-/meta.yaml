  md: '# FACTCBPM


    This program creates three functions that come in handy for statistics and probability
    challenges. The fact() function returns the factorial of an integer, perm() calculates
    the number of permutations of n things taken r at a time, and comb() returns the
    number of combinations of n things taken r at a time.


    For this program I decided to enter the values of n and r directly in the code,
    rather than prompting for the numbers using input(). To try other values, enter
    the editor mode and change the lines where n and r are set. For the example that
    follows these values are set to 52 and 5. I used 52 because it''s the number of
    cards in a standard deck of playing cards.


    There''s more than one way to program the factorial function. Many sources show
    how to use recursion, an efficient and compact concept that''s useful for many
    other programming tasks. I chose to use a loop to multiply all the numbers from
    1 to n together, because this is fast and doesn''t eat up a whole bunch of memory
    as can happen with recursion.


    The fact() function demonstrates how integers in Python are not limited in size,
    other than any limitations inherent in the machine''s memory or speed considerations.
    The example calculates the factorial of 70, returning a truly huge numerical result,
    and this is something most other calculators and other programming languages won''t
    let you do. Python is awesome!'
  merge: -1
  pgno: 71
- img_proc: true
  md: "![](img/8936d0646085e4f7f233755960035de6_72_0.png)\n\n```\ndef fact(n):\n \
    \   if n<0:\n        return 0\n    if n<2:\n        return 1\n    fact=1\n   \
    \ for i in range(n):\n        fact*=(i+1)\n    return fact\n\ndef perm(n,r):\n\
    \    return fact(n)//fact(n-r)\n\ndef comb(n,r):\n    return perm(n,r)//fact(r)\n\
    \nprint(\"fact(5): \",fact(5))\nprint(\"fact(20): \",fact(20))\nprint(\"fact(70):\
    \ \",fact(70))\nprint()\n\nn,r=52,5\nprint(\"n={}, r={}\".format(n,r))\nprint(\"\
    comb(n,r): \",comb(n,r))\nprint(\"perm(n,r): \",perm(n,r))\n```"
