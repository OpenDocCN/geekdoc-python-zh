    \n```\nfrom math import *\n\ndef ac_voltages(avg,peak,rms):\n    if avg:\n   \
    \     peak=pi*avg/2\n        rms=peak/sqrt(2)\n    elif peak:\n        avg=peak*2/pi\n\
    \        rms=peak/sqrt(2)\n    elif rms:\n        peak=rms*sqrt(2)\n        avg=peak*2/pi\n\
    \    return [avg,peak,rms]\n\nprint(\"\\n\\nInput one AC voltage type\\n\")\n\
