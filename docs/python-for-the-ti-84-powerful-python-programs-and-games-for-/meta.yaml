    \ the number of trials, or the target number of heads in a row. Be careful though,\
    \ as the program can take a long time to run if larger numbers are used.\n\n```\n\
    from random import *\n\ngoal=7\ntrials=200\ntally=0\n\ndef flips():\n    n=0\n\
