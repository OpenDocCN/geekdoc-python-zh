    \n![](img/8936d0646085e4f7f233755960035de6_168_1.png)\n\n标记为 \"v\" 的参数期望一个表示向量的数字\
    \ Python 列表。在大多数情况下，你可以使用二维、三维或更高维度的向量。请注意，`cross()` 和 `stp()` 函数仅适用于三维。\n\n举一个实际的例子，我们将一个二维向量设为\
    \ [3,4]，另一个设为 [5,-2]。然后 `add()` 函数求出这两个向量的和为 [8,2]。\n\n![](img/8936d0646085e4f7f233755960035de6_169_0.png)\n\
    \n你也可以在函数调用中直接传递向量列表，而不是先将它们存储在变量中。两种方法都完全可行。以下是计算三维向量 [3,4,-5] 的模，以及计算空间中两个三维向量之间角度（以度为单位）的示例。\n\
    \n![](img/8936d0646085e4f7f233755960035de6_170_0.png)\n\n```\nfrom math import\
    \ *\n\ndef add(v1, v2):\n    return [a + b for a, b in zip(v1, v2)]\n\ndef sub(v1,\
    \ v2):\n    return [a - b for a, b in zip(v1, v2)]\n\ndef dot(v1, v2):\n    return\
    \ sum([a * b for a, b in zip(v1, v2)])\n\ndef ang(v1, v2):\n    m1 = sum(i * i\
    \ for i in v1) ** .5\n    m2 = sum(i * i for i in v2) ** .5\n    d = sum([a *\
    \ b for a, b in zip(v1, v2)])\n    return degrees(acos(d / m1 / m2))\n\ndef cross(v1,\
    \ v2):\n    a, b, c = v1\n    d, e, f = v2\n    return [b * f - c * e, c * d -\
    \ a * f, a * e - b * d]\n\ndef stp(v1, v2, v3):\n    a, b, c = v1\n    d, e, f\
    \ = v2\n    g, h, i = v3\n    p = a * e * i + b * f * g + c * d * h\n    m = a\
    \ * f * h + b * d * i + c * e * g\n    return p - m\n\ndef mul(v, n):\n    return\
    \ [i * n for i in v]\n\ndef mag(v):\n    return sum(i * i for i in v) ** .5\n\n\
    def unit(v):\n    m = mag(v)\n    return [i / m for i in v]\n\ndef v():\n    print(\"\
    add(v,v)\")\n    print(\"sub(v,v)\")\n    print(\"dot(v,v)\")\n    print(\"ang(v,v)\"\
    )\n    print(\"cross(v,v)\")\n    print(\"stp(v,v,v)\")\n    print(\"mul(v,n)\"\
    )\n    print(\"mag(v)\")\n    print(\"unit(v)\\n\")\n\nprint(\"\\nv() to list\
    \ functions\")\n```\n\n## 7. 其他实用程序\n\n本章介绍了一些创建起来很有趣，但不太适合其他章节的程序。一个具体的例子是计算混凝土立方码数的程序。另一个令人不寒而栗的例子是计算风寒指数。甚至还有一个我不会在这里透露的秘密程序。自己去发现吧！\n\
