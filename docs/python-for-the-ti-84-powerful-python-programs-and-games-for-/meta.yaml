  md: "# GCD_LCM\n\nThis program finds the GCD (greatest common divisor) and the LCM\
    \ (least common multiple) of two integers. The GCD of two integers is the largest\
    \ positive integer that divides evenly into both. The LCM of two integers is the\
    \ smallest positive integer that is a multiple of both. It turns out that the\
    \ product of the two original numbers is the same as the product of the LCM and\
    \ the GCD.\n\nFor example, given the integers 24 and 56, we find their GCD is\
    \ 8, and their LCM is 168.\n\n![](img/8936d0646085e4f7f233755960035de6_141_0.png)\n\
    \n```\ndef gcd(a,b):\n    while 1:\n        c=a-b*int(a/b)\n        a,b=b,c\n\
    \        if not c:\n            return a\n\ndef lcm(a,b):\n    return int(abs(a*b/gcd(a,b)))\n\
    ```"
  merge: -1
