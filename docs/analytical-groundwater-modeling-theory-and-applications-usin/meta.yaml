    } = \\int_0^\\infty \\Delta h e^{-pt} \\mathrm{d}t = \\frac{\\Delta h}{p} \\qquad\
    \ (5.56)$$\n\nThe solution to differential equation (5.55) with transformed boundary\
    \ conditions results in an equation for $\\bar{h}(x, p)$; this solution is referred\
    \ to as the Laplace domain solution. The ultimate interest is of course a function\
    \ $h(x, t)$, which is obtained through what is called the back-transformation\
    \ or the inverse Laplace transformation. Several approaches exist to find the\
    \ inverse transform (e.g., Bruggeman, 1999), but they are often difficult or even\
    \ impossible to carry out analytically. This has spurred the development of several\
    \ approximate algorithms to perform the back-transformation. The Stehfest algorithm\
    \ is one of the most popular methods and is used here (Stehfest, 1970).\n\nThe\
    \ Stehfest approximation of the inverse transformation is a weighted mean of the\
    \ solution in the Laplace domain for a number of values of the Laplace parameter\
    \ $p_k$ ($k = 1, \\dots, M$). Hence, the application of the Stehfest approximation\
    \ requires evaluation of $\\bar{h}(x, p)$ for a number of values of the Laplace\
    \ parameter $p$ to compute the value of the head at location $x$ and time $t$.\
    \ The number of terms in the approximation is $M$, which must be even. The Stehfest\
    \ formula is\n\n$$h(x, t) = \\frac{\\ln 2}{t} \\sum_{k=1}^M V_k \\bar{h}(x, p_k)\
    \ \\qquad (5.57)$$\n\nwhere $M$ is the number of terms, $V_k$ is the weight for\
    \ term $k$, and $p_k$ is the Laplace parameter $k$ computed as\n\n$$p_k = \\frac{k\
    \ \\ln 2}{t} \\qquad (5.58)$$\n\nIn theory, the approximation is more accurate\
    \ when more terms are used, but machine accuracy is quickly causing a problem.\
    \ The summation in Eq. (5.57) consists of the summation of increasingly larger\
    \ positive and negative numbers. For large values of the index $k$ in the summation,\
    \ these numbers are so large that they only differ beyond the 16th digit. Python\
    \ normally only keeps track of 16 digits, which means that the sum of a positive\
    \ and negative number that only differ beyond the 16th digit essentially results\
    \ in garbage. Luckily, it is fairly obvious when too many terms are used, as the\
    \ result is obviously wrong.\n\nThe formula for the parameters $V_k$ is rather\
    \ lengthy\n\n$$V_k = (-1)^{k+M/2} \\sum_{j=\\mathrm{int}[(k+1)/2]}^{\\min(k, M/2)}\
    \ \\frac{j^{M/2}(2j)!}{\\left(\\frac{M}{2}-j\\right)! j! (j-1)! (k-j)! (2j-k)!}\
    \ \\qquad (5.59)$$\n\nThe formula for $V_k$ is implemented in the routine below\
    \ (adopted from the mpmath package by Johansson et al., 2013).\n\n```python\n\
    # coefficients V_k\nfrom scipy.special import factorial as fac\ndef stehfest_coef(M):\n\
    \    assert M % 2 == 0, 'M must be even' # make sure M is even\n    M2 = int(M\
    \ / 2)\n    V = np.zeros(M)\n    for k in range(1, M + 1):\n        z = np.zeros(min(k,\
    \ M2) + 1)\n        for j in range(int((k + 1) / 2), min(k, M2) + 1):\n      \
    \      z[j] = j ** M2 * fac(2 * j) / \\\n                   (fac(M2 - j) * fac(j)\
