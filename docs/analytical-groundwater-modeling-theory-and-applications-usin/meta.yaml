    Next, the boundary condition on the right side is modified by adding a layer with
    a resistance between the aquifer and the river (Figure 1.13). This resistance
    represents the low-permeable sediments that typically make up the river bed. In
    reality, the inflow occurs along the wet perimeter of the river, but to simplify
    the mathematical treatment, the leaky river bed is approximated here as a vertical
    section between the aquifer and the river with width $w_h$ and horizontal hydraulic
    conductivity $k_h$. The specific discharge through the layer is computed with
    Darcy''s law as


    $$q_x = -k_h \frac{h_L - h_R}{w_h} = \frac{h_L - h_R}{c} \quad (1.41)$$


    where $h_L$ is the head in the aquifer at $x = L$, $h_R$ is the water level in
    the river, and $c$ is referred to as the hydraulic resistance of the river bed
    and is defined as


    $$c = \frac{w_h}{k_h} \quad (1.42)$$


    Note that $c$ has the dimension time. The discharge vector into the river is obtained
    through multiplication of $q_x$ by the saturated thickness in the leaky layer,
    which is approximated here as $H$.


    $$Q_x|_{x=L} = H \frac{h_L - h_R}{c} = C(h_L - h_R) \quad (1.43)$$


    where $C = H/c$ is called the river bed conductance. This boundary condition represents
    a relation between the head and the flow and is referred to as a Robin boundary
    condition or a type 3 boundary condition.


    For this modified problem, the flow into the river is known upfront from continuity
    of flow and is equal to the total recharge $NL$ so that


    $$Q_x|_{x=L} = C(h_L - h_R) = NL \quad (1.44)$$'
