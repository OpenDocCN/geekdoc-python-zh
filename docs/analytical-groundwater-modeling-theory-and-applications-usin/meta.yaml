  md: 'The flow below the sea is governed by the differential equation for semi-confined
    flow


    $$\frac{\mathrm{d}Q_x}{\mathrm{d}x} = \frac{h - h^*}{c}$$


    Substitution of Eq. (4.37) for $Q_x$ in Eq. (4.38) and rearrangement of terms
    gives


    $$\frac{\mathrm{d}^2(h - h^*)^2}{\mathrm{d}x^2} = \frac{2(h - h^*)}{k\alpha c}$$


    The boundary conditions are that the discharge vector equals $U$ at the coastline


    $$Q_x|_{x=0} = U$$


    and that the head equals $h^*$ at the tip of the interface, which is at the a
    priori unknown location $x = x_{\text{tip}}$


    $$h|_{x=x_{\text{tip}}} = h^*$$


    The solution to Eq. (4.39) with boundary condition (4.41) is


    $$h = h^* + \frac{(x - x_{\text{tip}})^2}{6k\alpha c} \quad 0 \le x \le x_{\text{tip}}$$


    It is easy to check this solution by substituting the function and its second
    derivative in the differential equation (4.39) and by evaluating the boundary
    conditions. An expression for the discharge vector is obtained from differentiation
    and substitution in Eq. (4.37), which gives


    $$Q_x = -\frac{(x - x_{\text{tip}})^3}{18k\alpha c^2} \quad 0 \le x \le x_{\text{tip}}$$


    Finally, application of boundary condition (4.40) gives


    $$x_{\text{tip}} = (18k\alpha c^2 U)^{1/3}$$


    Note that this means that the outflow zone has a finite length and depends on
    the parameters of the aquifer and leaky layer, the density difference, and the
    total outflow into the sea. This is contrary to regular semi-confined flow (no
    interface), where the outflow zone is theoretically infinitely long and 95% of
    the water leaks through the semi-confining layer over a distance of three times
    the leakage factor ($\lambda = \sqrt{kHc}$), independent of the total outflow
    (Chapter 2).


    The head $h_0$ at $x = 0$ is obtained from Eq. (4.42) as


    $$h_0 = h^* + \frac{x_{\text{tip}}^2}{6k\alpha c}$$


    Solution (4.42) is only valid if the toe of the interface is not below the sea,
    which means that


    $$h_0 < -z_b/\alpha$$


    Using that $z_b = z_t - H = -\alpha h^* - H$ and after some algebra, this gives
    the following condition for $U$


    $$U \le \frac{kH^2\sqrt{2/3}}{\alpha\lambda}$$


