    $$Q_{r_3} = \frac{Nr}{2} - \frac{Q}{2\pi} \frac{1}{r} \quad (6.34)$$


    Comparison of the three solutions $\Phi_1$, $\Phi_2$, and $\Phi_3$ (Eqs. 6.25,
    6.29, and 6.33) reveals that the third solution is the sum of the first two solutions
    except for the additive constant. Addition of multiple solutions to obtain another
    solution is an example of the principle of superposition, which is applicable
    to all linear differential equations, including the equations of Laplace and Poisson.
    The sum of the potentials of the first two problems satisfies the differential
    equation of the third problem


    $$\nabla^2 \Phi_3 = \nabla^2(\Phi_1 + \Phi_2) = \nabla^2 \Phi_1 + \nabla^2 \Phi_2
    = 0 - N = -N \quad (6.35)$$


    Similarly, the boundary condition at the well is satisfied by the sum of the two
    potentials. Finally, the value of the sum of the two potentials at $r = R$ is
    a constant


    $$\Phi_1|_{r=R} = \Phi_2|_{r=R} = 2\Phi_R \quad (6.36)$$


    This is not the value specified in the boundary condition ($\Phi_3|_{r=R} = \Phi_R$),
    but this is easily corrected by modification of the additive constant. In this
    example of superposition, two radially symmetric solutions were added such that
    the resulting solution is also two-dimensional radially symmetric flow, because
    the radial symmetry is about the same point (the center of the island).


    The flow rate and direction at the island''s perimeter depend on the relative
    magnitudes of the well discharge and the total recharge on the island. As an example,
    the head is computed for the case of unconfined flow in the code below. Two solutions
    are shown: the case for which the well pumps half the total areal recharge on
    the island and the case for which the well pumps exactly all the areal recharge
    on the island (Figure 6.5).


    ```

    # parameters

    k = 5 # hydraulic conductivity, m/d

    zb = 0 # bottom elevation of aquifer, m

    N = 0.001 # areal recharge, m/d

    R = 200 # radius of the island, m

    hR = 10 # head at edge of island, m

    rw = 0.3 # well radius, m

    Qhalf = 0.5 * N * np.pi * R ** 2 # discharge is half total recharge, m^3/d

    Qtotal = N * np.pi * R ** 2 # discharge equals total recharge, m^3/d

    ```


    ```

    # solution

    r = np.linspace(rw, R, 400)

    PhiR = 0.5 * k * (hR - zb) ** 2

    Phi2 = -0.25 * N * (r ** 2 - R ** 2) + PhiR

    Phi3 = Phi2 + Qhalf / (2 * np.pi) * np.log(r / R)

    hhalf = zb + np.sqrt(2 * Phi3 / k)

    Phi3 = Phi2 + Qtotal / (2 * np.pi) * np.log(r / R)

    htotal = zb + np.sqrt(2 * Phi3 / k)

    ```


    ```

    # basic plot head for half total discharge

    plt.plot(-r, hhalf, ''C0'', label=''Q = half total recharge'')

    plt.plot(r, hhalf, ''C0'')

    plt.xticks(np.arange(-200, 201, 50), np.abs(np.arange(-200, 201, 50)))

    plt.legend();

    ```


    ![](img/ca724f426a6249bf916ffe68c7fbe382_118_0.png)


    As expected, the drawdown is much larger for the latter case than for the former
    case. Note that for the latter case, the flow at the perimeter of the island is
    zero and thus the slope of the water table is zero there. In the former case,
    there is still outflow across the island perimeter. Inflow occurs along the perimeter
    once the well discharge exceeds the total recharge on the island. The maximum
    discharge of the well is reached when the water level in the well (at $r = r_w$)
    is at the bottom of the aquifer.


    **Exercise 6.1:** Consider the case of a well at the center of a circular island
    with recharge where the discharge of the well is equal to half the total recharge
    on the island, using the example values above. Compute the distance $r_d$ from
    the center of the well to the water divide by setting $Q_r|_{r=r_d} = 0$. Compare
    the total recharge on a circle with radius $r_d$ to the discharge of the well.


    **Exercise 6.2:** Consider the case of a well at the center of a circular island
    with recharge where the discharge of the well is equal to half the total recharge
    on the island, using the example values above. Compute the total flow into the
    well at $r = r_w$ by integrating $Q_r$ around the well radius, and compare your
    answer to the discharge of the well. Is boundary condition (6.24) a good approximation?


    **Exercise 6.3:** For the example given above of a well at the center of a circular
    unconfined island with recharge, compute the maximum discharge of the well by
    setting the head at the well equal to the bottom of the aquifer.


    ## 6.2 Wells near rivers and impermeable boundaries


    In the previous section, the superposition principle was applied to obtain the
    solution for a well pumping at the center of a circular island with recharge.
    Here, solutions are presented for pumping wells near a surface water boundary
    (e.g., river, stream, canal, or lake) and an impermeable boundary. All boundaries
    are approximated as long and straight; areal recharge is not simulated. Solutions
    for the discharge potential, the discharge vector, and the stream function are
    obtained through superposition and the method of images.


    The general solution for the discharge potential of well number $n$ with discharge
    $Q_n$ is obtained from the Thiem equation (6.25) by removing the constant part
    $\Phi_R - \frac{Q}{2\pi} \ln(R)$ (an appropriate constant is added later depending
    on the boundary condition)


    $$\Phi = \frac{Q_n}{2\pi} \ln(r_n) = \frac{Q_n}{4\pi} \ln(r_n^2)$$


    where $r_n$ is the radial distance from point $(x_n, y_n)$ to well $n$


    $$r_n = \sqrt{(x - x_n)^2 + (y - y_n)^2} \quad (6.38)$$


    The $x$- and $y$-components of the discharge vector of well $n$ are obtained as


    $$Q_x = -\frac{\partial \Phi}{\partial x} = -\frac{Q_n}{2\pi} \frac{x - x_n}{r_n^2}
    \quad (6.39)$$

    $$Q_y = -\frac{\partial \Phi}{\partial y} = -\frac{Q_n}{2\pi} \frac{y - y_n}{r_n^2}
    \quad (6.40)$$


    **Exercise 6.4:** A well is pumping at an unknown, steady rate in a confined aquifer
    with transmissivity $T = 1200 \text{ m}^2/\text{day}$. Near the pumping well are
    two observation wells. Observation well $A$ is located 8 m from the pumping well,
    and observation well $B$ is located 24 m from the pumping well. The heads in these
    wells are $h_A = 134.2 \text{ m}$ and $h_B = 134.3 \text{ m}$. Assuming that without
    the well pumping there is no hydraulic gradient in the aquifer, what is the pumping
    rate of the well?


    The stream function for a well is derived next. A single well in a homogeneous,
    isotropic aquifer of infinite extent results in circular equipotentials. Streamlines
    are straight lines to the well. As such, the stream function is a function of
    $\theta$ only, where $\theta$ is the angle measured in counterclockwise direction
    with respect to the positive horizontal axis in a local coordinate system centered
    at the well (see the left graph of Figure 6.6). The stream function for well $n$
    is


    $$\Psi = \frac{Q_n}{2\pi} \theta_n \quad (6.41)$$


    where


    $$\theta_n = \arctan \left( \frac{y - y_n}{x - x_n} \right) \quad (6.42)$$


    where $\theta$ is measured in radians and not degrees.


    Eight streamlines are plotted in Figure 6.6. The total discharge between each
    two consecutive streamlines is $Q/8$. The angle $\theta$ is measured with respect
    to the positive $x$-axis and jumps from $\pi$ to $-\pi$ along the negative $x$-axis
    when going in the counterclockwise (the mathematically positive) direction. As
    a result, the stream function jumps across the negative $x$-axis, from $Q/2$ to
    $-Q/2$. This jump is unavoidable. It can be chosen differently; for example, $\theta$
    can vary from 0 to $2\pi$, but then the stream function will jump along the positive
    $x$-axis. The line along which the stream function jumps is called the branch
    cut. It appears that the contouring routine plots a thicker line along the branch
    cut. This is because all the stream function values that are contoured fall between
    the values computed at the grid points just above the negative $x$-axis and the
    values computed at the grid points just below the negative $x$-axis. The thick
    line is less pronounced when more grid points are used.


    A plot with both equipotentials and streamlines is called a flow net (Figure 6.6).
    Equipotentials and streamlines always cross at right angles, unless the aquifer
    is anisotropic. It is common to use the same increments $\Delta \Phi = \Delta
    \Psi$ when constructing a flow net. Note that in the code below, the angle $\theta$
    is computed with the `np.arctan2` function, which computes the arctan function
    given a value of $y$ and $x$ (in that order) and returns the corresponding angle
    in the range $-\pi$ to $+\pi$. Before creating a contour plot, a subplot is created
    where the scale is set equal in the $x$- and $y$-directions using the `aspect`
    keyword so that, e.g., a circle indeed looks like a circle and not an ellipse.'
