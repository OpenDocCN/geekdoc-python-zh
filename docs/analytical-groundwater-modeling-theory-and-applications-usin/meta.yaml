    # 10.4 Spatially varying head at the top of the aquifer


    The water table in an unconfined aquifer is sometimes very roughly approximated
    as a subdued replica of the topographic surface. This makes some intuitive sense,
    because groundwater often discharges at a low point in the landscape. Groundwater
    that recharges below the topographic highs has to take a relatively long path
    to the discharge area in the topographic lows, which necessitates a hydraulic
    head gradient, and thus a mounding of the water table. It turns out, however,
    that the water table and the topographic surface are poorly correlated or even
    uncorrelated in many unconfined aquifers (Haitjema and Mitchell-Bruker, 2005).
    Nonetheless, an undulating water table may be a useful approximation to conceptualize
    regional flow patterns.


    In this section, flow systems are investigated where the head at the top of the
    aquifer is specified to consist of one or more sinusoidal functions, approximating
    a subdued sequence of topographic highs and lows. The problem is discussed here
    because it resembles the famous solution of Toth (1963), which is often used to
    investigate nested flow domains in basin-scale'
  - '[PAGE 202]


    models. As this is a problem where the head is specified at the top of the aquifer,
    it must be verified that the resulting flow through the top of the aquifer is
    hydrologically realistic.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_202_0.png)


    Consider steady two-dimensional flow in the vertical plane (Figure 10.13). The
    hydraulic conductivity is $k$, and the bottom of the aquifer is horizontal at
    $z = -H$. The aquifer is a distance $L$ long, and the thickness of the aquifer
    is approximated as constant and equal to $H$. The flow is governed by Laplace''s
    equation (10.4). The lateral boundaries and the base of the aquifer are impermeable


    $$q_x|_{x=0,z} = q_x|_{x=L,z} = q_z|_{x,z=-H} = 0 \quad (10.36)$$


    The head $h$ at the top of the aquifer is specified to vary periodically as a
    cosine with amplitude $a$ and period $p = 2L/n$, where $n$ is an arbitrary integer


    $$h|_{x,z=0} = a \cos(2\pi x/p) \quad (10.37)$$


    In terms of the specific discharge potential, the boundary conditions are


    $$\frac{\partial \phi}{\partial x}\bigg|_{x=0,z} = \frac{\partial \phi}{\partial
    x}\bigg|_{x=L,z} = \frac{\partial \phi}{\partial z}\bigg|_{x,z=-H} = 0 \quad (10.38)$$


    and


    $$\phi|_{x,z=0} = A \cos(2\pi x/p) \quad (10.39)$$


    where $A = ka$.

    The solution for the specific discharge potential is obtained from separation
    of variables as (e.g., Craig, 2008)


    $$\phi = \frac{A \cos(2\pi x/p) \cosh[2\pi(z + H)/p]}{\cosh(2\pi H/p)} \quad (10.40)$$


    The corresponding complex potential is


    $$\omega = A \frac{\cos[2\pi(\zeta + Hi)/p]}{\cosh(2\pi H/p)} \quad (10.41)$$


    where $\zeta = x + iz$. The complex specific discharge is obtained as


    $$q_x - iq_z = -\frac{d\omega}{d\zeta} = \frac{2\pi A}{p} \frac{\sin[2\pi(\zeta
    + Hi)/p]}{\cosh(2\pi H/p)} \quad (10.42)$$


    The vertical flux at the top of the aquifer is a cosine function, just like the
    head


    $$q_z = \frac{-2\pi A}{p} \frac{\cos(2\pi x/p) \sinh[2\pi(z + H)/p]}{\cosh(2\pi
    H/p)} \quad (10.43)$$'
