    \n## 8.3 用于模拟面状补给的面积汇\n\n具有指定补给量的有界区域称为面积汇。面积汇是本章开发的解析单元代码中添加的最后一种解析单元类型。运行本节示例需要前面各节定义的所有解析单元类：Model、Element、HeadEquation、Constant、UniformFlow、Well、HeadWell、LineSink\
    \ 和 HeadLineSink。\n\n本节讨论具有均匀补给的圆形面积汇。也存在矩形面积汇或由任意闭合多边形界定的面积汇（例如，Strack, 2017），但它们的方程要复杂得多，超出了本书的范围。圆形面积汇对于模拟降水产生的面状补给非常有用。只要面积汇覆盖整个模型区域，并且模型区域内的水头由例如指定水头的线汇固定（如本节末尾的示例所示），其圆形几何形状通常不是问题。\n\
    \n考虑一个以 $(x, y) = (x_a, y_a)$ 为中心、半径为 $R$ 的圆形面积汇。在面积汇内部，补给是均匀的，等于 $N$。注意，对于进入含水层的水，$N$\
    \ 为正值（这与井和线汇相反，对于离开含水层的水，流量 $Q$ 和单位长度流量 $\\sigma$ 为正值）。面积汇内部的控制微分方程为\n\n$$\\nabla^2\
    \ \\Phi = \\frac{d^2 \\Phi}{dr^2} + \\frac{1}{r} \\frac{d \\Phi}{dr} = -N \\quad\
    \ r \\leq R \\qquad (8.11)$$\n\n其中 $r = \\sqrt{(x - x_a)^2 + (y - y_a)^2}$ 是局部径向坐标。在面积汇外部，面状补给等于零，控制微分方程为拉普拉斯方程（方程6.11）。面积汇内部的解已经推导出（方程6.29）为\n\
    \n$$\\Phi = -\\frac{1}{4} N (r^2 - R^2) \\quad r \\leq R \\qquad (8.12)$$\n\n\
    在面积汇外部，解等于注入率为 $N \\pi R^2$ 且在 $r = R$ 处势函数为零的注入井的解\n\n$$\\Phi = -\\frac{N R^2}{2}\
    \ \\ln(r/R) \\quad r \\geq R \\qquad (8.13)$$\n\n注意，势函数（因此水头）和流量向量在面积汇的边界上是连续的。流函数在面积汇内部不存在，因为流函数仅在面状补给为零时存在，并且在面积汇外部不使用。\n\
    \nAreaSink 类定义如下。输入参数包括：添加面积汇的模型、面积汇中心的位置、面积汇内部的均匀补给量以及面积汇的半径。AreaSink 类存储所有输入参数，并包含\
    \ omegainf 函数，其中实部是上述定义的势函数（方程 (8.12) 和 (8.13)，其中 $N = 1$），虚部等于零。\n\n```python\n\
    class AreaSink(Element):\n\n    def __init__(self, model, xc=0, yc=0, N=0.001,\
    \ R=100):\n        Element.__init__(self, model, N)\n        self.xc, self.yc\
    \ = xc, yc\n        self.R = R\n\n    def omegainf(self, x, y):\n        r = np.atleast_1d(np.sqrt((x\
    \ - self.xc) ** 2 + (y - self.yc) ** 2))\n        phi = np.zeros(r.shape)\n  \
    \      phi[r < self.R] = -0.25 * (r[r < self.R] ** 2 - self.R ** 2)\n        phi[r\
    \ >= self.R] = -self.R ** 2 / 2 * np.log(r[r >= self.R] / self.R)\n        return\
    \ phi + 0j\n```\n\n作为第一个示例，考虑两个相邻面积汇的合成案例。一个是补给区，另一个是排泄区。总补给量等于总排泄量，因此流场是对称的，该问题可用于验证解的实现。图8.5左侧显示了水头的等值线，右侧显示了穿过两个面积汇中心的剖面图。注意，最高和最低水头并不在面积汇的中心。\n\
    \n```python\n# 参数和模型\nml = Model(T=100) # 导水系数，单位：m^2/d\nrf = Constant(ml, xc=0,\
    \ yc=0, hc=20)\nas1 = AreaSink(ml, xc=-500, yc=0, N=0.001, R=500) # 补给，单位：m/d\n\
    as2 = AreaSink(ml, xc=500, yc=0, N=-0.001, R=500) # 排泄，单位：m/d\n\n# 求解\nml.solve()\n\
