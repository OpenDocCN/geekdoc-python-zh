  md: 'aquifer is a semi-confined aquifer (Figure 6.12). The case for a two-aquifer
    system, where water is flowing through both aquifers, is presented in the next
    section. Recall that solutions for semi-confined flow and two-aquifer flow were
    written in terms of heads in Chapter 2 as the discharge potentials defined in
    Table (6.1 ) cannot be used.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_127_0.png)


    The differential equation for steady radially symmetric semi-confined flow is


    ```

    $$\nabla^2 h = \frac{d^2 h}{dr^2} + \frac{1}{r} \frac{dh}{dr} = \frac{h - h^*}{cT}$$

    ```


    where $T$ is the transmissivity of the aquifer, $h^*$ is the constant head above
    the semi-confining layer, and $c$ is the resistance to vertical flow of the semi-confining
    layer (see Chapter 2). A solution is sought for radial flow to a fully penetrating
    well with discharge $Q$. The boundary condition at the well is the same as that
    for a well in confined flow


    ```

    $$\lim_{r \to 0} -2\pi r Q_r = Q$$

    ```


    The boundary condition at infinity is that the head is equal to the fixed head
    $h^*$ in the top aquifer


    ```

    $$h|_{r=\infty} = h^*$$

    ```


    The solution is (De Glee, 1930)


    ```

    $$h = h^* - \frac{Q}{2\pi T} K_0(r/\lambda)$$

    ```


    where the leakage factor is $\lambda = \sqrt{cT}$ (see Chapter 2) and $K_0$ is
    the modified Bessel function of the second kind and order 0. The Bessel function
    $K_0(r/\lambda)$ approaches zero for $r$ approaching infinity. In practice, $K_0$
    can be approximated as zero for $r > 4\lambda$, as will be shown later.


    The main difference between the solutions for pumping in a confined aquifer and
    pumping in a semi-confined aquifer is that in a confined aquifer, all water pumped
    by the well comes from infinity (and hence the head keeps increasing toward infinity),
    while in a semi-confined aquifer, all water pumped by the well comes from the
    overlying aquifer by leakage through the semi-confining layer.


    The radial component of the discharge vector is obtained from differentiation


    ```

    $$Q_r = -T \frac{dh}{dr} = \frac{-Q}{2\pi \lambda} K_1(r/\lambda)$$

    ```'
