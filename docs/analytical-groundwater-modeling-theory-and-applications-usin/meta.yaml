    # Chapter 4


    # Steady one-dimensional flow in coastal aquifers


    The salinity ($C_s$) of groundwater in coastal aquifers ranges from almost zero
    for freshwater to $C_s = 36$ g/L for intruded seawater. Because freshwater has
    a lower density ($\rho_f = 1000$ kg/m$^3$) than seawater ($\rho_s = 1025$ kg/m$^3$),
    fresh groundwater tends to float on top of saline groundwater. The water density
    $\rho$ at 20$^\circ$C may be computed from the salinity using the empirical formula


    $$\rho = \rho_f + 0.7C_s \qquad (4.1)$$


    where $C_s$ is in g/L and $\rho$ in kg/m$^3$. This approximation is reasonable
    for salt concentrations up to the salinity of seawater.


    In coastal aquifers, the freshwater is separated from the saltwater by a brackish
    transition zone. When the transition zone is relatively thin, that is, much thinner
    than the thickness of the freshwater lens, it can be approximated by an interface.
    An interface is a boundary between fluids that do not mix. Replacing the transition
    zone (in which there is mixing) by an interface greatly simplifies the mathematical
    treatment of variable-density flow problems and provides a means to develop analytical
    solutions for coastal aquifer flow. The location where the interface is at the
    top of the aquifer is called the tip of the interface, while the point where the
    interface is at the bottom of the aquifer is called the toe of the interface (Figure
    4.1).


    ![](img/ca724f426a6249bf916ffe68c7fbe382_71_0.png)


    *Figure 4.1* Steady interface in a coastal aquifer, where $h$ is the head in the
    freshwater zone above sea level and $z_i$ is the elevation of the interface with
    respect to sea level.


    Steady interface flow means that the interface has reached a steady-state position,
    the saltwater is at rest, and only the freshwater is flowing. When the saltwater
    is at rest and an observation well is screened in the saltwater, the saltwater
    rises to exactly the sea level; this is called the saltwater head. As the saltwater
    is not flowing, the saltwater head in the saltwater is the same everywhere. After
    all, Darcy''s law states that water moves from a high head to a low head. When
    the Dupuit approximation is adopted for flow in the freshwater zone, the depth
    of the interface may be computed from the head in the freshwater as explained
    in the following.


    Consider steady interface flow as depicted in Figure 4.1. The elevation of the
    interface $z_i$ is measured with respect to the sea level (i.e., $z_i$ is negative).
    An observation well has its opening'
