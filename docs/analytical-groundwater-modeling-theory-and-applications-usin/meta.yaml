    \ sections, are required to run the examples in this section.\n\nIn this section,\
    \ circular area-sinks are discussed with a uniform recharge. Rectangular area-sinks\
    \ or area-sinks bounded by an arbitrary closed polygon also exist (e.g., Strack,\
    \ 2017), but their equations are significantly more complicated and beyond the\
    \ scope of this book. Circular area-sinks are very useful for the simulation of\
    \ areal recharge from precipitation. Their circular geometry is commonly not a\
    \ problem as long as the area-sink covers the entire model area, and heads are\
    \ fixed inside the model area by, e.g., head-specified line-sinks, as shown in\
    \ the example at the end of this section.\n\nConsider a circular area-sink of\
    \ radius $R$ centered at $(x, y) = (x_a, y_a)$. Inside the area-sink, the recharge\
    \ is uniform and equal to $N$. Note that $N$ is positive for water entering the\
    \ aquifer (this is opposite to wells and line-sinks where the discharge $Q$ and\
    \ discharge per unit length $\\sigma$ are positive for water leaving the aquifer).\
    \ The governing differential equation inside the area-sink is\n\n$$\\nabla^2 \\\
    Phi = \\frac{d^2 \\Phi}{dr^2} + \\frac{1}{r} \\frac{d \\Phi}{dr} = -N \\quad r\
    \ \\leq R \\qquad (8.11)$$\n\nwhere $r = \\sqrt{(x - x_a)^2 + (y - y_a)^2}$ is\
    \ a local radial coordinate. The areal recharge equals zero outside the area-sink,\
    \ where the governing differential equation is the Laplace equation (Eq. 6.11).\
    \ The solution inside the area-sink was already derived (Eq. 6.29) as\n\n$$\\\
    Phi = -\\frac{1}{4} N (r^2 - R^2) \\quad r \\leq R \\qquad (8.12)$$\n\nOutside\
    \ the area-sink, the solution is equal to the solution for an injection well with\
    \ injection rate $N \\pi R^2$ and zero potential at $r = R$\n\n$$\\Phi = -\\frac{N\
    \ R^2}{2} \\ln(r/R) \\quad r \\geq R \\qquad (8.13)$$\n\nNote that the potential\
    \ (and hence the head) and the discharge vector are continuous across the edge\
    \ of the area-sink. The stream function doesn't exist inside the area-sink, as\
    \ the stream function exists only when the areal recharge equals zero, and is\
    \ not used outside the area-sink.\n\nThe AreaSink class is defined below. Input\
    \ arguments are the model that the area-sink is added to, the location of the\
    \ center of the area-sink, the uniform recharge inside the area-sink, and the\
    \ radius of the area-sink. The AreaSink class stores all input arguments and includes\
    \ the omegainf function, where the real part is the potential defined above (Eqs.\
    \ (8.12) and (8.13) with $N = 1$) and the imaginary part equals zero.\n\n```\n\
