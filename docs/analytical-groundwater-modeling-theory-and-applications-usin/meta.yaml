    discharge vector (Eq. 10.2) into the continuity equation (Eq. 10.1) gives Laplace’s
    equation


    $$\frac{\partial^2 \phi}{\partial x^2} + \frac{\partial^2 \phi}{\partial z^2}
    = 0 \qquad (10.4)$$


    For two-dimensional steady flow in the vertical plane governed by Laplace’s equation,
    there is also a stream function, which is written as $\psi$ [L$^2$/T], as was
    done for flow in a vertical cross section in Chapters 1–4. The specific discharge
    potential and stream function are combined in a complex potential


    $$\omega = \phi + i\psi \qquad (10.5)$$


    The complex specific discharge may be obtained from $\omega$ as


    $$q_x - iq_z = -\frac{d\omega}{d\zeta} \qquad (10.6)$$


    where $\zeta = x + iz$ is the complex coordinate in a vertical cross section.


    ## 10.1 Vertical anisotropy


    The hydraulic conductivity is often anisotropic, where the vertical component
    of the hydraulic conductivity is smaller than the horizontal component. One of
    the main reasons for vertical anisotropy is that aquifers often consist of alternating
    layers of somewhat coarser and somewhat finer material. The average value of the
    hydraulic conductivity in the horizontal direction is dictated by the hydraulic
    conductivity of the coarser layers, while the average value in the vertical direction
    is dictated by the hydraulic conductivity of the finer layers. In practice, it
    is popular to use an anisotropy factor of 10 (the vertical hydraulic conductivity
    is 10 times smaller than the horizontal hydraulic conductivity), but a good reason
    for this number does not exist. For the case that the hydraulic conductivity is
    anisotropic with $k_x$ in the $x$-direction and $k_z$ in the $z$-direction, Darcy’s
    law becomes


    $$q_x = -k_x \frac{\partial h}{\partial x} \qquad q_z = -k_z \frac{\partial h}{\partial
    z} \qquad (10.7)$$


    Substitution of these equations for $q_x$ and $q_z$ in the continuity equation
    (10.1) gives


    $$\frac{\partial}{\partial x} \left( k_x \frac{\partial h}{\partial x} \right)
    + \frac{\partial}{\partial z} \left( k_z \frac{\partial h}{\partial z} \right)
    = 0 \qquad (10.8)$$


    This equation may be transformed into Laplace’s equation by a change of variables


    $$\tilde{x} = x\sqrt{k_z/k_x} \qquad \tilde{z} = z \qquad (10.9)$$


    which gives


    $$\frac{\partial^2 h}{\partial \tilde{x}^2} + \frac{\partial^2 h}{\partial \tilde{z}^2}
    = 0 \qquad (10.10)$$


    The use of $\tilde{k}$ ensures that the net discharge in the isotropic transformed
    domain is the same as the net discharge in the original anisotropic domain. For
    example, the net flux $Q_{\text{net}}$ across a small section $\Delta z$ in the
    anisotropic domain equals


    $$Q_{\text{net}} = -k_x \frac{\partial h}{\partial x} \Delta z \quad (10.12)$$


    and is equal to the net flux across the same section in the transformed isotropic
    domain


    $$\tilde{Q}_{\text{net}} = -\tilde{k} \frac{\partial h}{\partial \tilde{x}} \Delta
    \tilde{z} = -\sqrt{k_x k_z} \frac{\partial h}{\partial x} \frac{1}{\sqrt{k_z/k_x}}
    \Delta z = -k_x \frac{\partial h}{\partial x} \Delta z = Q_{\text{net}} \quad
    (10.13)$$


    The same holds in the $z$-direction.


    In summary, an anisotropic problem may be solved with standard methods for Laplace''s
    equation, provided that the $x$-direction of the flow field is squeezed according
    to Eq. (10.9) and the isotropic hydraulic conductivity (Eq. 10.11) is used in
    the transformed domain. A complex specific discharge potential in the transformed
    potential may be defined as $\tilde{\omega} = \tilde{\phi} + i\tilde{\psi}$, where
    $\phi = \tilde{k}h$ and $\tilde{\psi} = \psi$.


    As a simple example, consider a rectangular domain with length $L$ and height
    $B$ (Figure 10.1). The head at the origin in the lower left-hand corner equals
    zero. The flow is uniform, and the head gradients in the $x$- and $z$-directions
    are equal: $\partial h/\partial x = \partial h/\partial z = a$. As such, the head
    varies linearly along the boundaries (Figure 10.1). The hydraulic conductivity
    in the $x$- and $z$-directions is $k_x$ and $k_z$, respectively.


    The flow is uniform in both the anisotropic physical domain and the isotropic
    transformed domain. In the physical domain, $q_x = -k_x a$ and $q_z = -k_z a$.
    In the transformed domain, $\tilde{q}_x$ and $\tilde{q}_z$ are


    $$\tilde{q}_x = -\tilde{k} \frac{\partial h}{\partial \tilde{x}} = -\tilde{k}
    \frac{\partial h}{\partial x} \frac{\partial x}{\partial \tilde{x}} = -\frac{\tilde{k}a}{\sqrt{k_z/k_x}}
    \quad (10.14)$$

    $$\tilde{q}_z = -\tilde{k}a \quad (10.15)$$


    The solution for the (uniform) complex specific discharge potential in the transformed
    domain is Eq. (7.19)


    $$\tilde{\omega} = -(\tilde{q}_x - \tilde{q}_z i)\tilde{\zeta} \quad (10.16)$$


    where $\tilde{\zeta} = \tilde{x} + i\tilde{z}$ is the complex coordinate in the
    transformed domain.


    An example flow field is shown in Figure 10.1. The flow field is shown in both
    the transformed domain and the problem domain. Note that the streamlines and head
    contours intersect at right angles in the transformed domain, where the hydraulic
    conductivity $\tilde{k}$ is isotropic, but don''t intersect at right angles in
    the problem domain, where the hydraulic conductivity is anisotropic.


    ```python

    # parameters

    L = 1000 # length of domain, m

    B = 300 # width of domain, m

    kx = 5 # hydraulic conductivity in x-direction, m/d

    kz = 1 # hydraulic conductivity in z-direction, m/d

    a = -0.002 # head gradient in x- and z-directions

    ```


    ```python

    # solution

    kt = np.sqrt(kx * kz)

    qxt = -kt * a / np.sqrt(kz / kx)

    qzt = -kt * a

    xg, zg = np.meshgrid(np.linspace(0, L, 10), np.linspace(0, B, 10))

    xt = xg * np.sqrt(kz / kx)

    zt = zg

    zetat = xt + 1j * zt

    omt = -(qxt - 1j * qzt) * zetat

    h = omt.real / kt

    psi = omt.imag

    ```


    ```python

    # basic flow net

    plt.subplot(121, aspect=1) # problem domain

    plt.contour(xg, zg, h, 10)

    plt.contour(xg, zg, psi, 10);

    plt.subplot(122, aspect=1) # transformed domain

    plt.contour(xt, zt, h, 20)

    plt.contour(xt, zt, psi, 20);

    ```


    ![](img/ca724f426a6249bf916ffe68c7fbe382_190_0.png)


    Figure 10.1 Example for uniform flow in an anisotropic aquifer; boundary conditions
    (upper left), flow net in squeezed transformed domain (lower right), and flow
    net in problem domain (lower left).


    ## 10.2 Flow to a partially penetrating stream


    A typical approximation in the development of analytical solutions is that a stream
    fully cuts through the aquifer. Most streams, however, penetrate only part of
    the aquifer. Such streams are called partially penetrating streams. In this section,
    the flow field around a narrow partially penetrating stream is investigated. A
    solution is presented for two-dimensional flow in the vertical plane and compared
    to the Dupuit solution.


    The flow system consists of a confined aquifer with hydraulic conductivity $k$
    and thickness $H$ and is penetrated by a narrow stream over a distance $d$ (Figure
    10.2). The water level in the stream equals $h_s$. The width of the stream is
    approximated as negligible (even though it has a small width in the figure). The
    flow near infinity on the left equals $Q_x = U_L$, while the flow near infinity
    on the right equals $Q_x = U_R$, so that the boundary conditions are


    $$\lim_{x \to -\infty} Q_x = U_L \quad (10.17)$$

    $$\lim_{x \to \infty} Q_x = U_R \quad (10.18)$$

    $$h|_{x=0, -d \le z \le 0} = h_s \quad (10.19)$$


    The solution to the stated problem is obtained with conformal mapping. A conformal
    mapping is a coordinate transformation (a change of variables) for which the Laplace
    equation is invariant. Some boundary conditions, including a specified head boundary
    and an impermeable boundary, are also invariant to a conformal transformation.
    The utility of a conformal mapping is to simplify the problem domain without altering
    the differential equation or boundary conditions. An analytic solution is then
    obtained in the simplified domain. The problem domain is also referred to as the
    physical plane, and the simplified transformed domain is called the reference
    plane.


    A conformal mapping solution is often written in parametric form as $\omega(\tau)$
    and $\zeta(\tau)$, where $\tau$ is the reference plane. Here, the reference plane
    $\tau = \xi + i\eta$ is chosen as the quarter plane $\xi \ge 0$ and $\eta \ge
    0$, as shown in Figure 10.2 (note that $\xi$ (xi) and $\zeta$ (zeta) look similar,
    but $\xi$ has a double squiggle and $\zeta$ just a single squiggle). The top and
    bottom of the aquifer correspond to the positive real axis of $\tau$ (note the
    corresponding green, red, and purple sections in the $\zeta$ and $\tau$ planes),
    while the partially penetrating stream corresponds to the positive imaginary axis
    in the $\tau$ plane (the blue section).


    One of the characteristics of a conformal mapping is that there are three degrees
    of freedom to make a mapping unique; the locations of three boundary points can
    be chosen in the reference plane. Here, it is chosen that point 1 corresponds
    to $\tau = 1$, point 2 corresponds to $\tau = \infty$, and point 4 corresponds
    to $\tau = 0$. Point 3 is located on the imaginary axis in the $\tau$ plane, and
    point 5 is located between $\tau = 0$ and $\tau = 1$ on the real axis in the $\tau$
    plane, but their exact locations are determined by the mapping.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_191_0.png)


    The solution for $\zeta$ as a function of $\tau$, referred to in conformal mapping
    jargon as the map of $\tau$ onto $\zeta$, is


    $$\zeta = x + iz = -\frac{H}{\pi} \ln \left( \frac{\tau - 1}{\tau + 1} \right)
    + \frac{H}{\pi} \ln \left( \frac{\tau - \lambda}{\tau + \lambda} \right) \quad
    (10.20)$$


    where


    $$\lambda = \left( -\mu + \sqrt{\mu^2 + 1} \right)^2 \quad (10.21)$$


    and


    $$\mu = \tan \left( \frac{\pi d}{2H} \right) \quad (10.22)$$


