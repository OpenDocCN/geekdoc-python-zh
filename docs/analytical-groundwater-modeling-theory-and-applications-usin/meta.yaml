  md: 'the discharge varies around zero, for example sinusoidally as


    $$Q(t) = A \sin(2\pi t / \tau)$$


    where $A$ and $\tau$ are the amplitude and period of the sinusoidal discharge.
    The boundary condition at the well is approximated as


    $$\lim_{r \to 0} -2\pi r Q_r = A \sin(2\pi t / \tau)$$


    while the boundary condition at infinity is (9.8). There is no initial condition:
    The well has been pumping with the sinusoidal discharge (Eq. 9.23) for a long
    time. Flow in the aquifer is governed by the diffusion equation (9.5).


    The solution for the stated problem is obtained using separation of variables:
    The solution is written as a function of the radial distance $r$ multiplied by
    a function of the time $t$. The analysis is easiest conducted in terms of complex
    variables. The head solution corresponding to boundary condition (9.23) is the
    imaginary part of the complex solution (Bruggeman, 1999)


    $$h = -\frac{A}{2\pi T} \Im \left[ \mathrm{K}_0 \left( \frac{r}{\mu} \sqrt{i}
    \right) e^{2\pi i t / \tau} \right]$$


    where the characteristic length $\mu$ is defined as


    $$\mu = \sqrt{\frac{T}{S} \frac{\tau}{2\pi}}$$


    Note that $\mu$ has the dimension of length. The corresponding radial component
    of the discharge vector is


    $$Q_r = -\frac{A}{2\pi} \Im \left[ \frac{\sqrt{i}}{\mu} \mathrm{K}_1 \left( \frac{r}{\mu}
    \sqrt{i} \right) e^{2\pi i t / \tau} \right]$$


    The sinusoidal head variation is largest at the well and decreases with distance
    from the well. Discharge variations with a short period damp out at a shorter
    distance from the well than variations with a longer period. It is noted that
    taking the real part of the complex function in Eq. (9.25) results in the solution
    for the case that the sine function in Eq. (9.23) is replaced by a cosine function.


    In the example below, the solution is plotted for a sinusoidal well discharge
    with a period of 1 year in an unconfined aquifer where the transmissivity is again
    approximated as constant. The function `kv` of the `scipy.special` package is
    used to compute the modified Bessel functions of complex argument, because the
    functions `k0` and `k1` only accept real arguments. In the left graph of Figure
    9.4, the head variation is plotted at the well and at distances $r = \mu$ and
    $r = 2\mu$. The amplitude of the head variation at $r = 2\mu$ is negligible compared
    to the head variation at the well. In the right graph of Figure 9.4, the total
    flow in the aquifer $Q_{\text{tot}} = 2\pi r Q_r$ is plotted. The amplitude of
    the total flow equals $A$ at the well and slowly decreases to less than $0.05A$
    at $r = 6\mu$.


    ```

    # parameters

    T = 100 # transmissivity, m^2/d

    S = 1e-1 # storage coefficient, -

    tau = 365 # period, d

    A = 200 # amplitude of discharge function, m^3/d

    rw = 0.3 # radius of well, m

    ```'
