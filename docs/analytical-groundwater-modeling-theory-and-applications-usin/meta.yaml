    \ are separated by a leaky layer with resistance $c$ (Figure 6.14). The storage\
    \ in the leaky layer is neglected. The transient equivalent of the system of two\
    \ linked differential equations (6.63) is\n\n$$\\nabla^2 h_0 = \\frac{S_0}{T_0}\
    \ \\frac{\\partial h_0}{\\partial t} + \\frac{h_0 - h_1}{c T_0}$$\n$$\\nabla^2\
    \ h_1 = \\frac{S_1}{T_1} \\frac{\\partial h_1}{\\partial t} + \\frac{h_1 - h_0}{c\
    \ T_1}$$\n(9.52)\n\nA well starts pumping with a discharge $Q$ at time $t = 0$\
    \ in aquifer 1 (the bottom aquifer). The boundary conditions are\n\n$$\\lim_{r\
