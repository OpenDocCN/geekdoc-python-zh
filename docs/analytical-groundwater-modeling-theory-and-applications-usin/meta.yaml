  md: "The variation of the head after the well is turned off is called the recovery\
    \ phase, as the head (slowly) comes back to its original position. For large time,\
    \ $E_1$ may again be represented with the first two terms of the series representation\
    \ of $E_1$ (Eq. 9.13), which results in\n\n$$h \\approx -\\frac{Q}{4\\pi T} \\\
    ln\\left(\\frac{t - t_1}{t - t_0}\\right) \\quad t \\gg t_1 \\quad (9.22)$$\n\n\
    This is an important and somewhat surprising result, as the recovery after the\
    \ well has been turned off for a little while does not depend on the storage coefficient\
    \ $S$. In the example below, two solutions are plotted for a well that pumps for\
    \ one day and is then turned off, but the storage coefficients differ. The head\
    \ response is quite different during pumping, but the two curves quickly approach\
    \ each other during the recovery phase, even though the storage coefficients are\
    \ different. The approximate formula (9.22) is also plotted for the recovery phase\
    \ in Figure 9.2.\n\n```\n# parameters\nt0 = 0 # time pump starts, d\nt1 = 1 #\
    \ time pump is turned off, d\nS = [1E-3, 1E-4] # storage coefficients, -\nr =\
    \ 100 # m\n```\n\n```\n# solution\nt = np.linspace(1e-6, 2, 200)\nh = np.zeros((2,\
    \ len(t)))\nfor i in range(2):\n    h[i] = -Q / (4 * np.pi * T) * exp1(S[i] *\
    \ r ** 2 / (4 * T * (t - t0)))\n    h[i, t > t1] -= -Q / (4 * np.pi * T) * exp1(\n\
    \        S[i] * r ** 2 / (4 * T * (t[t > t1] - t1)))\ntapprox = np.linspace(t1\
    \ + 0.01, 2, 100)\nhapprox = Q / (4 * np.pi * T) * np.log((tapprox - t1) / (tapprox\
    \ - t0))\n```\n\n```\n# basic plot\nplt.plot(t, h[0])\nplt.plot(t, h[1])\nplt.plot(tapprox,\
    \ happrox);\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_172_0.png)\n\n**Figure\
    \ 9.2** Head at $r = 100$ m for a well that pumps for 1 day and is then turned\
    \ off; results are shown for two different storage coefficients, and for the approximate\
    \ solution during the recovery phase (Eq. 9.22).\n\nThe Theis solution is very\
    \ useful to estimate aquifer parameters from a pumping test, also called an aquifer\
    \ test. During a pumping test, a well is turned on and the head (drawdown)"
