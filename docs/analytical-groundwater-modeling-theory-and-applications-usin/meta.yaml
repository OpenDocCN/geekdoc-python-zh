- md: '## Chapter 4


    ## Steady one-dimensional flow in coastal aquifers


    The salinity ($C_s$) of groundwater in coastal aquifers ranges from almost zero
    for freshwater to $C_s = 36$ g/L for intruded seawater. Because freshwater has
    a lower density ($\rho_f = 1000$ kg/m$^3$) than seawater ($\rho_s = 1025$ kg/m$^3$),
    fresh groundwater tends to float on top of saline groundwater. The water density
    $\rho$ at 20$^\circ$C may be computed from the salinity using the empirical formula


    $$\rho = \rho_f + 0.7C_s \qquad (4.1)$$


    where $C_s$ is in g/L and $\rho$ in kg/m$^3$. This approximation is reasonable
    for salt concentrations up to the salinity of seawater.


    In coastal aquifers, the freshwater is separated from the saltwater by a brackish
    transition zone. When the transition zone is relatively thin, that is, much thinner
    than the thickness of the freshwater lens, it can be approximated by an interface.
    An interface is a boundary between fluids that do not mix. Replacing the transition
    zone (in which there is mixing) by an interface greatly simplifies the mathematical
    treatment of variable-density flow problems and provides a means to develop analytical
    solutions for coastal aquifer flow. The location where the interface is at the
    top of the aquifer is called the tip of the interface, while the point where the
    interface is at the bottom of the aquifer is called the toe of the interface (Figure
    4.1).


    ![](img/ca724f426a6249bf916ffe68c7fbe382_71_0.png)


    *Figure 4.1* Steady interface in a coastal aquifer, where $h$ is the head in the
    freshwater zone above sea level and $z_i$ is the elevation of the interface with
    respect to sea level.


    Steady interface flow means that the interface has reached a steady-state position,
    the saltwater is at rest, and only the freshwater is flowing. When the saltwater
    is at rest and an observation well is screened in the saltwater, the saltwater
    rises to exactly the sea level; this is called the saltwater head. As the saltwater
    is not flowing, the saltwater head in the saltwater is the same everywhere. After
    all, Darcy''s law states that water moves from a high head to a low head. When
    the Dupuit approximation is adopted for flow in the freshwater zone, the depth
    of the interface may be computed from the head in the freshwater as explained
    in the following.


    Consider steady interface flow as depicted in Figure 4.1. The elevation of the
    interface $z_i$ is measured with respect to the sea level (i.e., $z_i$ is negative).
    An observation well has its opening at the interface and is filled with freshwater.
    The freshwater rises to elevation $h$ above sea level so that the pressure $p_f$
    at the bottom of the observation well is


    $$p_f = \rho_f g(h - z_i)$$


    where $\rho_f$ is the density of freshwater. Just to the right of the freshwater
    observation well is a second observation well, which also has its opening at the
    interface but is filled with saltwater. The saltwater in the second observation
    well rises up to sea level ($z = 0$) (Figure 4.1). The pressure $p_s$ at the bottom
    of the second observation well is


    $$p_s = \rho_s g(0 - z_i)$$


    The pressures at the bottoms of both observation wells must be equal ($p_f = p_s$
    since they are at the same elevation and the interface is not moving). Setting
    Eq. (4.2) and Eq. (4.3) equal and rearrangement of terms leads to an expression
    for the elevation of the interface $z_i$ as a function of the head $h$ above sea
    level in the freshwater


    $$z_i = -\alpha h$$


    where


    $$\alpha = \frac{\rho_f}{\rho_s - \rho_f}$$


    Relation (4.4) is known as the Ghyben–Herzberg equation (e.g., Post et al., 2018).
    Using the density values for freshwater and seawater provided above gives $\alpha
    = 40$. In words: If the head in the freshwater at a location is 1 m above sea
    level, the steady interface at that location is 40 m below sea level.


    Note that the Ghyben–Herzberg relation holds for the case that the freshwater
    flow is steady and the saltwater is at rest. The head $h$ in Eq. (4.4) is the
    head in the freshwater at the interface. When the Dupuit approximation is adopted
    (i.e., the resistance to flow in the vertical direction is neglected and the vertical
    head distribution is approximated as hydrostatic), the elevation of the interface
    may be computed from the head at any elevation in the freshwater with the Ghyben–Herzberg
    equation (4.4).


    ### 4.1 Confined interface flow


    Consider steady interface flow in a confined coastal aquifer as shown in Figure
    4.2. The elevations of the top and bottom of the aquifer are $z_t$ and $z_b$,
    respectively. The thickness of the aquifer is $H = z_t - z_b$. Flow problems in
    coastal aquifers are commonly broken up into a part near the coast where the interface
    is present and a part upstream of the interface toe where there is no interface.
    The flow in both parts may be solved simultaneously by defining an appropriate
    discharge potential such that the flow may be computed in both parts of the aquifer
    as


    $$Q_x = -\frac{d\Phi}{dx}$$


    This was first done by Strack (1976), and these discharge potentials are also
    referred to as Strack potentials. Separate discharge potentials must be defined
    for the two parts of the flow system. Note that this approach is similar to the
    approach for combined confined/unconfined flow (Section 3.3), where separate discharge
    potentials were defined for the confined and the unconfined parts of the flow
    system.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_73_0.png)


    *Figure 4.2* Interface flow toward the coast in a confined aquifer.


    First, consider the interface flow part. The elevation of the tip of the interface
    is at the top of the aquifer $z_{\text{tip}} = z_t$, which corresponds to a head
    $h_{\text{tip}} = -z_t/\alpha$. The elevation of the toe of the interface is $z_{\text{toe}}
    = z_b$, which corresponds to a head $h_{\text{toe}} = -z_b/\alpha$. Between the
    tip and the toe, the thickness of the freshwater zone is equal to $z_t - z_i =
    z_t + \alpha h$. The discharge vector may be written as


    $$Q_x = -k(z_t + \alpha h)\frac{dh}{dx} = -k\alpha(h + z_t/\alpha)\frac{dh}{dx}
    = -\frac{d\Phi}{dx} \qquad (4.7)$$


    so that the discharge potential is


    $$\Phi = \frac{1}{2}k\alpha(h + z_t/\alpha)^2 \qquad -z_t/\alpha \le h \le -z_b/\alpha
    \qquad (4.8)$$


    The potential $\Phi_{\text{toe}}$ at the toe is obtained by substituting the head
    $h_{\text{toe}}$ for $h$ in Eq. (4.8)


    $$\Phi_{\text{toe}} = \frac{kH^2}{2\alpha} \qquad (4.9)$$


    Upstream of the toe, the flow is regular confined flow so that the saturated thickness
    is equal to $H$ and the discharge vector may be written as


    $$Q_x = -kH\frac{dh}{dx} = -\frac{d\Phi}{dx} \qquad (4.10)$$


    where the discharge potential is


    $$\Phi = kHh + C_c \qquad h \ge -z_b/\alpha \qquad (4.11)$$


    The constant $C_c$ is chosen such that the discharge potential at the toe (where
    $h_{\text{toe}} = -z_b/\alpha$) is equal to $\Phi_{\text{toe}}$ (Eq. 4.9)


    $$\Phi_{\text{toe}} = -kHz_b/\alpha + C_c = \frac{kH^2}{2\alpha} \qquad (4.12)$$


    which gives


    $$C_c = \frac{\frac{1}{2}kH^2 + kHz_b}{\alpha} \qquad (4.13)$$


    With this choice for $C_c$, the potential is continuous when it transitions from
    regular confined flow to confined interface flow at the toe.


    Now that steady confined interface flow is written as potential flow, any potential
    flow solution may be used that fulfills the differential equation for steady one-dimensional
    potential flow (Eq. 3.5)


    $$\frac{d^2\Phi}{dx^2} = -N \qquad (4.14)$$


    Head-specified boundary conditions need to be transformed into discharge potentials
    using either Eq. (4.8) or (4.11), depending on the value of the head. Once a solution
    is obtained in terms of the discharge potential, the head may be computed by the
    inverse of Eq. (4.8) or (4.11)


    $$h = \sqrt{\frac{2\Phi}{k\alpha}} - \frac{z_t}{\alpha} \quad \Phi \le \Phi_{\text{toe}}$$


    $$h = \frac{\Phi - C_c}{kH} \quad \Phi \ge \Phi_{\text{toe}}$$


    Finally, the elevation $z_i$ of the interface may be computed from the head as


    $$z_i = -\alpha h \quad h_{\text{tip}} \le h \le h_{\text{toe}}$$


    As an example, consider uniform flow toward the coast at a rate $Q_x = U$ as shown
    in Figure 4.2 ($Q_x$ is constant because the recharge $N = 0$). The origin of
    the coordinate system is chosen at the coastline, and the aquifer extends toward
    negative infinity. The elevation of the top of the confined aquifer is $z_t$ with
    respect to the sea level. The head at the coastline is $-z_t/\alpha$, which is
    equivalent to an interface elevation of $z_i = z_t$. The corresponding discharge
    potential at the coastline is obtained by substituting $h = -z_t/\alpha$ in the
    equation for the discharge potential (Eq. 4.8), which gives $\Phi = 0$. Hence,
    the boundary conditions are


    $$\Phi|_{x=0} = 0$$


    $$Q_x = -\frac{d\Phi}{dx} = U$$


    The solution for the potential that fulfills the differential equation (4.14)
    with $N = 0$ and the boundary conditions is


    $$\Phi = -Ux$$


    The location of the toe is found at the position where $\Phi = \Phi_{\text{toe}}$,
    which gives


    $$x_{\text{toe}} = -\frac{\Phi_{\text{toe}}}{U} = -\frac{kH^2}{2\alpha U}$$


    Note that for a given value of $U$, the location of the toe is a function only
    of the aquifer parameters $k$ and $H$, and the factor $\alpha$, which is a function
    of the densities of freshwater and saltwater. The toe location is not a function
    of the sea level. And hence, the location of the toe remains where it is when
    the sea level rises, provided that the discharge toward the coast remains $U$.
    The heads in the aquifer increase with the sea level rise, of course.


    In the example that follows, the location of the interface and the stream function
    are computed and plotted (Figure 4.3).


    ```

    # parameters

    k = 10 # hydraulic conductivity, m/d

    zt = -10 # top of aquifer, m

    zb = -30 # bottom of aquifer, m

    rhof = 1000 # density of freshwater, kg/m^3

    rhos = 1025 # density of saltwater, kg/m^3

    U = 0.4 # flow toward the coast, m^2/d

    H = zt - zb # aquifer thickness, m

    ```'
