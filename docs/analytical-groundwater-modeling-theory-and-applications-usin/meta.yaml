  md: 'formed by a semi-confining layer with resistance $c$ (Figure 6.12). Storage
    in the semi-confining layer is neglected. The head $h^*$ above the semi-confining
    layer is fixed to zero. Vertical leakage $q_z$ through the semi-confining layer
    is computed as Eq. (2.2)


    $$q_z = \frac{h - 0}{c} \quad (9.28)$$


    so that the governing differential equation for radial flow is


    $$\frac{\partial^2 h}{\partial r^2} + \frac{1}{r} \frac{\partial h}{\partial r}
    = \frac{S}{T} \frac{\partial h}{\partial t} + \frac{h}{cT} \quad (9.29)$$


    A well starts pumping with discharge $Q$ at time $t = t_0$. Initially, the head
    change caused by the well in the aquifer is equal to zero everywhere. The initial
    and boundary conditions are the same as those for the Theis solutions (9.6, 9.7,
    and 9.8).


    The solution to this problem was first obtained by Hantush and Jacob (1955) and
    is referred to as the Hantush function


    $$h = -\frac{Q}{4\pi T} \int_u^\infty \frac{1}{\tau} \exp\left(-\tau - \frac{r^2}{4\lambda^2
    \tau}\right) d\tau \quad (9.30)$$


    where $\lambda = \sqrt{Tc}$ is the leakage factor and $u$ is defined as for the
    Theis well


    $$u = \frac{Sr^2}{4T(t - t_0)} \quad (9.31)$$


    The solution for the case that the head above the semi-confining layer is equal
    to $h^*$ rather than zero is obtained by simply adding a constant $h^*$ to the
    solution. Note that this is allowed because $h = h^*$ is a particular solution
    to the differential equation


    $$\frac{\partial^2 h}{\partial r^2} + \frac{1}{r} \frac{\partial h}{\partial r}
    = \frac{S}{T} \frac{\partial h}{\partial t} + \frac{h - h^*}{cT} \quad (9.32)$$


    The seemingly easy integral in the equation for the head (Eq. 9.30) cannot be
    integrated analytically, nor is it included in the special functions of the `scipy.special`
    package; early literature included tabulated values. The easiest way to compute
    the integral with Python is to use numerical integration using, e.g., the `quad`
    function of the `scipy.integrate` package. The `quad` function returns a number
    of items, of which the first one is the computed integral. In the example code
    below, the head is first plotted as a function of $r$ and then plotted as a function
    of $t$ (Figure 9.5). The solution for a well in a semi-confined aquifer (Hantush)
    is compared to the solution for a well in a confined aquifer (Theis). The Hantush
    and Theis heads are similar for early times when most of the water pumped by the
    well comes from storage. The Hantush and Theis heads deviate when a significant
    amount of water pumped by the well comes from leakage through the semi-confining
    layer. The Hantush solution approaches the steady state solution for a well in
    a semi-confined aquifer in approximately one day for the parameters used in the
    example below. The Theis solution does not reach steady state, as explained in
    Section 9.1.


