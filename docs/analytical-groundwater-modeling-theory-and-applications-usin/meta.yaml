  md: "The difference $\\varepsilon$ between the observed head $h_o$ and the modeled\
    \ head $h_m$, also called the residual or error, is computed as\n\n$$\\varepsilon\
    \ = h_o - h_m \\qquad (5.50)$$\n\nThe optimal parameters $A$ and $a$ are found\
    \ by minimizing the sum of squared errors, which is referred to as the objective\
    \ function\n\n$$F_{\\text{obj}} = \\sum \\varepsilon^2 \\qquad (5.51)$$\n\nThe\
    \ first argument of the Python function for the objective function must be an\
    \ array with the parameters. The final keyword argument is `return_heads`. When\
    \ this keyword argument is set to `True`, the method returns the modeled heads\
    \ rather than the sum of the squared errors, which is useful to compute the modeled\
    \ heads after the parameters are estimated.\n\n```\npython\ndef fobj(p, delt=delt,\
    \ recharge=recharge, hobs=h0, return_heads=False):\n    A, a = p\n    ntime =\
    \ len(recharge)\n    b = simpleresponse(A, a, delt, ntime + 1)\n    hm = np.zeros(ntime\
    \ + 1)\n    for n in range(1, ntime + 1):\n        hm[n] = np.sum(recharge[0:n]\
    \ * b[n - 1::-1])\n    if return_heads:\n        return hm\n    rv = np.sum((hobs\
    \ - hm) ** 2)\n    return rv\n```\n\nThe parameters that minimize the objective\
    \ function may be found with a number of methods. Here, the `fmin` function of\
    \ the `scipy.optimize` package is used, which applies the simplex algorithm (see\
    \ the `fmin` documentation).\n\n```\npython\nfrom scipy.optimize import fmin\n\
    A, a = fmin(fobj, [300, 50], disp=0)\nprint(f'Estimated parameters A: {A:.2f}\
    \ d, a: {a:.2f} d')\nhm = fobj([A, a], return_heads=True) # compute modeled heads\n\
    ```\n\nEstimated parameters A: 629.89 d, a: 53.03 d\n\nThe modeled heads $h_m$\
    \ fit the observed heads $h_o$ very well (Figure 5.13).\n\n```\npython\n# basic\
