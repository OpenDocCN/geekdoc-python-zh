  - '[PAGE 49]


    The head and flow below the river are solved first. The boundary conditions are


    $$Q_x|_{x=-L} = U_L \quad Q_x|_{x=L} = U_R$$


    The hyperbolic form of the solution (Eq. 2.9) is used for the head solution below
    the river


    $$h - h^* = A \sinh(x/\lambda) + B \cosh(x/\lambda)$$


    with the corresponding solution for the discharge vector (Eq. 2.10)


    $$Q_x = -\frac{AT}{\lambda} \cosh(x/\lambda) - \frac{BT}{\lambda} \sinh(x/\lambda)$$


    Substitution of the boundary conditions (Eq. 2.27) in Eq. (2.29) gives


    $$A = \frac{-\lambda(U_L + U_R)}{2T \cosh(L/\lambda)} \quad B = \frac{\lambda(U_L
    - U_R)}{2T \sinh(L/\lambda)}$$


    The solutions for the head to the left and to the right of the river are simple
    linear functions, because the aquifer is confined. The solution below the river
    is used to compute the head $h_0 = h|_{x=-L}$ in the aquifer at the left river
    bank and the head $h_1 = h|_{x=L}$ in the aquifer at the right river bank. Once
    $h_0$ and $h_1$ are known, the solutions in the confined parts of the aquifer
    to the left and right of the river can be written as


    $$h = -\frac{U_L}{T}(x + L) + h_0 \quad x \le -L$$

    $$h = -\frac{U_R}{T}(x - L) + h_1 \quad x \ge L$$


    An example is shown for the case that the width of the river is twice the leakage
    factor and the inflow at the left river bank is twice the inflow at the right
    river bank (Figure 2.9).


