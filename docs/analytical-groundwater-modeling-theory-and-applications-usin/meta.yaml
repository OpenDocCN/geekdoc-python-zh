- md: '## Preface


    The importance of groundwater as a water supply source can hardly be overstated.
    Groundwater exists everywhere in the subsurface. Extraction of water from aquifers
    supports livelihoods, agriculture, and a variety of economic activities worldwide.
    Groundwater is an integral part of the hydrological cycle where it sustains ecosystems,
    such as wetlands and estuaries, and provides the base flow of streams and rivers
    of all sizes. The flow of water through the subsurface constitutes a major transport
    pathway for dissolved substances and plays a key role in the planetary cycle of
    many chemical elements.


    Groundwater resources have come under enormous stress in many parts of the world.
    Concerns over the quantity and quality of groundwater are the result of past and
    ongoing mismanagement. Overexploitation has resulted in significant lowering of
    water levels. Unsustainable pumping in coastal areas has resulted in seawater
    intrusion. And careless disposal and handling of chemicals at the land surface
    has resulted in contamination that threatens precious resources. Addressing these
    problems is possible only with adequate understanding of the flow in the subsurface.


    The investigation of groundwater systems relies first and foremost on measurements.
    Due to the difficulty and costs involved in obtaining these, data is commonly
    available at a few points only, which severely limits the knowledge of the three-dimensional
    system under investigation. It is sometimes possible to predict future developments
    based on measured time series, but it is rarely possible to make predictions from
    measured time series for new interventions in the system or when anthropogenic,
    environmental, or climatic changes alter the system’s response.


    Groundwater models are essential to gain understanding of the behavior of groundwater
    systems and to evaluate management scenarios that cannot be tested at full scale
    in the field. Groundwater models, like all models, are simplified versions of
    a complex reality. It is an important skill for every modeler to decide how a
    system can be simplified without losing the essence. It is unfortunately often
    appealing to add complexity to models because it exists, even though it doesn’t
    affect the outcome significantly.


    The essence of a groundwater flow problem is captured in a set of equations called
    the mathematical model. Simple models can often be solved analytically. Before
    the advent of grid-based methods, groundwater solutions were necessarily simplified
    until they could be solved, for example by deriving an analytic solution to the
    mathematical model. Analytic solutions give insight into the flow of groundwater
    that is more difficult to obtain with grid-based solutions. It is often forgotten
    that analytic solutions have benefited from the advent of computer technology,
    just like grid-based methods. Especially the development of high-level programming
    languages makes it easy to evaluate analytic solutions and visualize their results.


    Models play an important role in solving the formidable water problems of our
    planet, as they are used as instruments to better understand, manage, and protect
    our water resources. The authors hope that the knowledge contained in this book
    contributes to better groundwater models and, ultimately, better-informed management
    decisions in the future.


    ## About this book


    This book provides a fresh treatment of the fundamentals of groundwater flow and
    is intended as both training material for the next generation of university students
    and a useful resource for practitioners who want to re-familiarize themselves
    with the basics while simultaneously learning about the capabilities of Python.
    Programming skills were part of groundwater modeling in the early days of the
    personal computer age. Classic books from, e.g., Bear and Verruijt (1987) and
    Strack (1989) already included computer code (on paper or floppy disks), but that
    was before high-level computer languages such as Python conquered the world. The
    example programs developed in this book may serve as templates that can be modified
    and extended to simulate settings or processes not covered in this book. The focus
    is on the fundamentals of the quantitative methods used to simulate, understand,
    and solve groundwater problems.


    The premise of this book is that any groundwater modeler needs a fundamental understanding
    of the theory on which mathematical models of groundwater flow are based. Even
    when a modeler primarily makes grid-based models, it is important to understand
    the main approximations that form the basis of the mathematical model, their range
    of applicability, and the main consequences for the flow field. Insight in fundamental
    flow systems forms the backbone of any good modeler. This book provides detailed
    descriptions of analytic solutions of many fundamental groundwater problems. Mathematical
    derivations are included for the simpler problems. The solutions of more complicated
    problems are presented without derivation, but their validity is verified.


    The structure of this book is such that the theoretical treatments of the modeling
    methods are exemplified by short pieces of Python computer code that demonstrate
    the implementation of the theory. Python is an open-source programming language
    that has rapidly gained popularity within science and engineering and is likely
    going to remain one of the most popular programming languages over the next decades.
    Its simple yet powerful syntax and interactive workflow make learning and using
    Python a breeze. The development of powerful packages for scientific computing
    and visualization have made it easier than ever to evaluate, explore, and visualize
    both simple and complicated groundwater solutions. Python is a great language
    to write scripts to evaluate groundwater models. Scripts may be combined with
    output and explanations (including mathematical equations) in Jupyter Notebooks,
    resulting in executable documents that are a full, transparent and reproducible
    record of a model or analysis.


    All code examples presented in this book are available as Jupyter Notebooks from
    www.github.com/pythongroundwaterbook, which facilitates easy exploration of the
    examples in this book. Even though the notebooks save the reader from having to
    do a lot of typing, there are important benefits to entering the code examples
    from the printed book into one''s own notebook or Python interpreter. As one types,
    one takes much better notice of the subtle details contained in the code fragments.
    Especially when errors occur, one is forced to analyze their cause, which may
    take some time but at the reward of a deeper understanding and a more lasting
    learning experience. Therefore, especially novice students are encouraged to use
    this method and not immediately trust that they understand the worked examples
    in the notebooks. Hands-on exercises are provided and commonly require short Python
    scripts to be solved. Numerical answers to selected exercises are included at
    the end of the book.


    This book starts with a brief introduction of the principles of groundwater flow.
    This chapter is assigned number 0 to remind the reader that Python uses a zero-based
    numbering system. All other numbering in this book starts at 1. The remainder
    of this book consists of two parts, each consisting of five chapters. The first
    part concerns one-dimensional flow while the second part concerns two-dimensional
    flow. A variety of flow systems are discussed, including confined, unconfined,
    semi-confined, and multi-aquifer flow. Both steady and transient flow are considered.
    Most examples include evaluation of both the head and the flow, sometimes including
    travel times. Special attention is paid to interface flow in coastal aquifers.


    For each solution, at least three code blocks are presented. The first code block
    contains the parameter values used in the example. The second code block contains
    the solution. And the third code block contains a few basic commands to produce
    visual output, which resemble the presented figures. The visual output appears
    right below the third code block, or on the next page if the output does not fit
    on the page. The exact code to produce the final figures included in this book
    is not provided as it contains some detailed (and repetitive) commands to make
    the figures look nice for the book. For those groundwater engineers and hydrogeologists
    that are not familiar with Python programming, or need a refresher of some of
    the programming concepts, a short primer on Python programming is included in
    the Appendix of this book.'
  mdcn: '## 前言


    地下水作为供水水源的重要性怎么强调都不为过。地下水广泛存在于地表之下。从含水层中取水支撑着全球范围内的生计、农业和各种经济活动。地下水是水文循环不可或缺的一部分，它维持着湿地和河口等生态系统，并为大小河流提供基流。水流经地下构成了溶解物质的主要传输途径，并在许多化学元素的全球循环中扮演着关键角色。


    在世界许多地区，地下水资源承受着巨大的压力。对地下水数量和质量的担忧源于过去和持续的管理不善。过度开采导致水位显著下降。沿海地区不可持续的抽水导致了海水入侵。而在地表随意处置和处理化学品则造成了污染，威胁着宝贵的资源。只有充分理解地下水流，才有可能解决这些问题。


    地下水系统的调查首先依赖于测量。由于获取这些数据的难度和成本，数据通常仅在少数点可用，这严重限制了对所研究三维系统的了解。有时可以根据测量的时间序列预测未来的发展，但当人为、环境或气候变化改变了系统的响应时，很少能根据测量的时间序列对系统的新干预措施进行预测。


    地下水模型对于理解地下水系统的行为以及评估无法在现场进行全规模测试的管理方案至关重要。地下水模型，如同所有模型一样，是对复杂现实的简化版本。对于每个建模者来说，决定如何在不失去本质的情况下简化系统是一项重要技能。不幸的是，人们常常倾向于增加模型的复杂性，仅仅因为它存在，即使它对结果没有显著影响。


    地下水流动问题的本质体现在一组称为数学模型的方程中。简单的模型通常可以通过解析方法求解。在基于网格的方法出现之前，地下水解决方案必须被简化直到可以求解，例如通过推导数学模型的解析解。解析解提供了对地下水流动的洞察，这比基于网格的解决方案更难获得。人们常常忘记，解析解也受益于计算机技术的发展，就像基于网格的方法一样。特别是高级编程语言的发展使得评估解析解和可视化其结果变得容易。


    模型在解决我们星球严峻的水问题方面发挥着重要作用，因为它们被用作更好地理解、管理和保护我们水资源的工具。作者希望本书所包含的知识有助于建立更好的地下水模型，并最终在未来做出更明智的管理决策。


    ## 关于本书


    本书对地下水流动的基础知识进行了全新的阐述，既可作为下一代大学生的培训材料，也可供希望重新熟悉基础知识同时了解Python能力的从业人员使用。在个人计算机时代的早期，编程技能是地下水建模的一部分。例如，Bear和Verruijt（1987年）以及Strack（1989年）的经典著作已经包含了计算机代码（在纸上或软盘上），但那是在Python等高级计算机语言征服世界之前。本书中开发的示例程序可以作为模板，经过修改和扩展，可以模拟本书未涵盖的设置或过程。重点在于用于模拟、理解和解决地下水问题的定量方法的基础知识。


    本书的前提是，任何地下水建模者都需要对地下水流动数学模型所依据的理论有基本的理解。即使建模者主要制作基于网格的模型，理解构成数学模型基础的主要近似值、其适用范围以及对流场的主要后果也很重要。对基本流动系统的洞察构成了任何优秀建模者的骨干。本书详细描述了许多基本地下水问题的解析解。对于较简单的问题，包含了数学推导。更复杂问题的解决方案在没有推导的情况下给出，但验证了其有效性。


    本书的结构使得建模方法的理论阐述通过简短的Python计算机代码片段来示例说明，这些代码展示了理论的实现。Python是一种开源编程语言，在科学和工程领域迅速普及，并且很可能在未来几十年内继续成为最受欢迎的编程语言之一。其简单而强大的语法和交互式工作流程使得学习和使用Python变得轻而易举。强大的科学计算和可视化软件包的开发使得评估、探索和可视化简单和复杂的地下水解决方案比以往任何时候都更容易。Python是编写脚本以评估地下水模型的绝佳语言。脚本可以与输出和解释（包括数学方程）在Jupyter
    Notebooks中结合，形成可执行文档，这是模型或分析的完整、透明和可重现的记录。


    本书中呈现的所有代码示例均可从www.github.com/pythongroundwaterbook获取为Jupyter Notebooks，这便于轻松探索本书中的示例。尽管笔记本让读者免于大量输入，但将印刷书籍中的代码示例输入到自己的笔记本或Python解释器中具有重要的好处。在输入时，人们会更好地注意到代码片段中包含的微妙细节。特别是当出现错误时，人们被迫分析其原因，这可能需要一些时间，但会带来更深入的理解和更持久的学习体验。因此，特别鼓励新手学生使用这种方法，不要立即相信自己理解了笔记本中的示例。本书提供了实践练习，通常需要编写简短的Python脚本来解决。部分练习的数值答案包含在本书末尾。


    本书首先简要介绍了地下水流动的原理。本章编号为0，以提醒读者Python使用从零开始的编号系统。本书中的所有其他编号均从1开始。本书的其余部分由两部分组成，每部分包含五章。第一部分涉及一维流动，而第二部分涉及二维流动。讨论了各种流动系统，包括承压、无承压、半承压和多含水层流动。同时考虑了稳定流和非稳定流。大多数示例包括对水头和流量的评估，有时还包括运移时间。特别关注沿海含水层中的界面流。


    对于每个解决方案，至少呈现三个代码块。第一个代码块包含示例中使用的参数值。第二个代码块包含解决方案。第三个代码块包含一些基本命令以产生视觉输出，类似于所呈现的图形。视觉输出显示在第三个代码块正下方，或者如果输出不适合该页面，则显示在下一页。本书中包含的最终图形的确切代码未提供，因为它包含一些详细（且重复）的命令，以使图形在书中看起来美观。对于那些不熟悉Python编程或需要复习某些编程概念的地下水工程师和水文地质学家，本书的附录中包含了一个简短的Python编程入门。'
