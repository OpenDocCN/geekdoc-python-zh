    \n## 7.4 A well in uniform background flow near a river with a leaky stream bed\n\
    \nThe solution for a well in a uniform background flow near a long and straight\
    \ river segment in direct contact with the aquifer is modified to include a leaky\
    \ stream bed below the river. All boundary conditions are the same as for the\
    \ solution in the previous section, except for the boundary condition along the\
    \ river. The river has a leaky stream bed so that there is a hydraulic resistance\
    \ between the river and the aquifer (Figure 7.8). Therefore, the pumping well\
    \ on one side of the river results in a drawdown on the other side of the river,\
    \ unlike in the previous section. The pumping well may capture water from the\
    \ other side of the river, which can have major implications for a safe groundwater\
    \ supply, e.g., when there is a contamination on the other side of the river (e.g.,\
    \ Harr, 1996).\n\nThe river has a small width $B$, and the stream bed has a resistance\
    \ to vertical flow $c$. Leakage to or from the river is approximated as occurring\
    \ along the centerline of the stream, and the width of the stream is neglected\
    \ in the solution. This approximation may be reasonable when the stream is narrow\
    \ relative to the aquifer thickness and the leakage factor ($\\sqrt{kHc}$). The\
    \ vertical specific discharge through the leaky stream bed may be written as\n\
    \n$$q_z = \\frac{h - h_0}{c} \\qquad (7.33)$$\n\nThe inflow $\\sigma$ $[L^2/T]$\
    \ from the aquifer into the river per unit length of river is obtained as\n\n\
    $$\\sigma(y) = Bq_z = B\\frac{h|_{x=0,y} - h_0}{c} = \\frac{C}{T}(\\Phi|_{x=0,y}\
    \ - \\Phi_0) \\qquad (7.34)$$\n\nwhere the conductance of the stream bed is defined\
    \ as $C = B/c$. The boundary condition along the river is obtained from continuity\
    \ of flow as\n\n$$\\sigma = Q_x|_{x=0^-,y} - Q_x|_{x=0^+,y} = \\frac{C}{T}(\\\
    Phi|_{x=0,y} - \\Phi_0) \\qquad (7.35)$$\n\nwhere $x = 0^-$ and $x = 0^+$ are\
    \ the $x$-locations just to the left and right of the centerline of the river,\
    \ respectively. The second boundary condition along the river is that the head\
    \ in the aquifer on the left side of the river is equal to the head in the aquifer\
    \ on the right side of the river, or in terms of the discharge potential (recall\
    \ that the width $B$ of the river is neglected in the solution)\n\n$$\\Phi|_{x=0^-,\
    \ y} = \\Phi|_{x=0^+, y} \\qquad (7.36)$$\n\nThe uniform background flow on both\
