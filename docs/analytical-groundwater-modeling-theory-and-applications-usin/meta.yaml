    The flow in a semi-confined aquifer is governed by the Poisson equation (1.8),
    where the infiltration rate $N$ is a function of the head difference across the
    semi-confining layer. Substitution of $N = -q_z$ in Eq. (1.8) gives


    $$\frac{d^2h}{dx^2} = \frac{h - h^*}{cT}$$


    For the case that $h^*$ is a constant, this equation can be rewritten as


    $$\frac{d^2(h - h^*)}{dx^2} = \frac{h - h^*}{\lambda^2}$$


    where


    $$\lambda = \sqrt{cT}$$


    is referred to as the leakage factor [L] and is a characteristic length of the
    system, as will be explained later.


    Differential equation (2.5) is a second-order linear ordinary differential equation
    known as the modified Helmholtz equation. The general solution is


    $$h - h^* = Ae^{-x/\lambda} + Be^{x/\lambda}$$


    where $A$ and $B$ are constants to be determined from boundary conditions. The
    general solution for the discharge vector is


    $$Q_x = \frac{AT}{\lambda}e^{-x/\lambda} - \frac{BT}{\lambda}e^{x/\lambda}$$


    Alternatively, the general solution may be written as


    $$h - h^* = A \sinh(x/\lambda) + B \cosh(x/\lambda)$$


    with the corresponding discharge vector


    $$Q_x = -\frac{AT}{\lambda} \cosh(x/\lambda) - \frac{BT}{\lambda} \sinh(x/\lambda)$$


    It depends on the problem whether the formulation in terms of exponential functions
    is more convenient, or the formulation in terms of hyperbolic functions.


    # 2.1 Flow from a canal to a drained area


    Consider one-dimensional flow from a canal into a polder. The aquifer is semi-confined
    and semi-infinite and is bounded on the left by a fully penetrating canal with
    water level $h_0$, as shown in Figure 2.2; the head in the polder is fixed to
    $h^*$. The governing differential equation is the modified Helmholtz equation,
    as derived above. The boundary conditions are


    $$h|_{x=0} = h_0$$

    $$h|_{x \to \infty} = h^*$$


    Application of the second boundary condition gives $B = 0$, after which application
    of the first boundary condition gives $A = h_0 - h^*$ so that the solution for
    $h$ becomes


    $$h = h^* + (h_0 - h^*)e^{-x/\lambda}$$'
