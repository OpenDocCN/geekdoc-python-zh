    and the initial condition is


    $$h_0|_{r,t=0} = h_1|_{r,t=0} = 0$$


    A solution is obtained using Laplace transforms, as explained in Section 5.4.
    The solution procedure is a bit more complicated, however, as the system of two
    linked differential equations needs to be broken down into the solution of two
    unlinked differential equations. This unlinking is more difficult than for steady
    flow (Section 6.4) and requires the solution of an eigenvalue problem.


    The Laplace-transformed system of differential equations is


    $$\nabla^2 \overline{h}_0 = \frac{S_0 p}{T_0} \overline{h}_0 + \frac{\overline{h}_0
    - \overline{h}_1}{c T_0}$$

    $$\nabla^2 \overline{h}_1 = \frac{S_1 p}{T_1} \overline{h}_1 + \frac{\overline{h}_1
    - \overline{h}_0}{c T_1}$$


    which may be written in matrix form as


    $$\nabla^2 \begin{pmatrix} \overline{h}_0 \ \overline{h}_1 \end{pmatrix} = \begin{pmatrix}
    \frac{S_0 c p + 1}{c T_0} & \frac{-1}{c T_0} \ \frac{-1}{c T_1} & \frac{S_1 c
    p + 1}{c T_1} \end{pmatrix} \begin{pmatrix} \overline{h}_0 \ \overline{h}_1 \end{pmatrix}$$


    The matrix on the right-hand side of the matrix equation is called the system
    matrix **A** and is written as


    $$\mathbf{A} = \begin{pmatrix} \frac{S_0 c p + 1}{c T_0} & \frac{-1}{c T_0} \
    \frac{-1}{c T_1} & \frac{S_1 c p + 1}{c T_1} \end{pmatrix} = \mathbf{V} \mathbf{W}
    \mathbf{V}^{-1}$$


    where **W** is a diagonal matrix with the eigenvalues of matrix **A** on the diagonal


    $$\mathbf{W} = \begin{pmatrix} w_0 & 0 \ 0 & w_1 \end{pmatrix}$$


    and **V** is a matrix with the corresponding eigenvectors $\vec{u} = \begin{pmatrix}
    u_0 \ u_1 \end{pmatrix}$ and $\vec{v} = \begin{pmatrix} v_0 \ v_1 \end{pmatrix}$
    as its columns


    $$\mathbf{V} = \begin{pmatrix} u_0 & v_0 \ u_1 & v_1 \end{pmatrix}$$


    The boundary conditions in the Laplace domain are


    $$\lim_{r \to 0} -2\pi r \overline{Q}_{r_0} = 0$$

    $$\lim_{r \to 0} -2\pi r \overline{Q}_{r_1} = \frac{Q}{p}$$

    $$\overline{h}_0|_{r=\infty} = \overline{h}_1|_{r=\infty} = 0$$


    The solution in the Laplace domain is


    $$\begin{pmatrix} \overline{h}_0 \ \overline{h}_1 \end{pmatrix} = -\frac{Q}{2\pi
    T_1 p} \left[ b_0 \mathbf{K}_0 (r \sqrt{w_0}) \begin{pmatrix} u_0 \ u_1 \end{pmatrix}
    + b_1 \mathbf{K}_0 (r \sqrt{w_1}) \begin{pmatrix} v_0 \ v_1 \end{pmatrix} \right]$$'
