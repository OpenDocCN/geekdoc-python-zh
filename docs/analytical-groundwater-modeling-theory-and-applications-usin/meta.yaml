- md: '## Acknowledgement


    The authors wish to thank Erik Anderson and Michael Teubner for reading and commenting
    on a draft of the entire book. The groundwater theory presented in this book is
    based on the principles of groundwater flow that were taught by Prof. Arnold Verruijt
    at the Delft University of Technology and Prof. Otto Strack at the University
    of Minnesota. Lastly, the authors thank the developers of Python, the numpy-scipy-matplotlib
    stack (Harris et al., 2020; Virtanen et al., 2020; Hunter, 2007), and Project
    Jupyter (Kluyver et al., 2016) for the development of a remarkable, invaluable,
    and enjoyable programming language and ecosystem for exploratory computing.


    ## Authors


    **Mark Bakker** is a groundwater engineer and a professor at the faculty of Civil
    Engineering and Geosciences of the Delft University of Technology. He has taught
    groundwater and Python classes for more than two decades and is the originator
    and co-developer of many Python-based open-source modeling tools, including Timml,
    Ttim, Pastas, and Flopy.


    **Vincent Post** is a hydrogeologist with research interests in coastal hydrogeology
    and groundwater quality. After a career in academia and research he founded Edinsi
    Groundwater in 2021. Python has become indispensable in his everyday professional
    life, and he actively promotes its use in hydrogeology by teaching courses and
    developing Python-based tools.


    ## Chapter 0


    ## Basics of groundwater flow


    Groundwater is defined as the water beneath the water table, where the pores are
    fully saturated with water. The flow of groundwater forms the subsurface part
    of the hydrological cycle. The main source of groundwater is precipitation (rain
    or snow) that reaches the water table after infiltrating into the soil. The resulting
    increase in groundwater volume is called recharge, sometimes called meteoric recharge
    to emphasize that the water originates from atmospheric precipitation.


    Natural groundwater discharge occurs where groundwater reaches the land surface,
    for example in springs, swamps, and wetlands, or directly into rivers, lakes,
    seas, or oceans. Shallow groundwater can also be extracted by vegetation or through
    evaporation directly at the soil surface. In many inhabited areas, significant
    amounts of water are extracted through pumping wells.


    ### 0.1 Hydraulic head


    Groundwater may be reached by digging or drilling a hole in the ground. The level
    to which water rises in a borehole is called the hydraulic head, or simply the
    head. A piezometer is an observation well specifically designed to measure the
    head and consists of a pipe with a slotted screen at the bottom. The water level
    in a piezometer rises to a height such that the weight of the water column in
    the piezometer equals the pressure of the groundwater directly adjacent to the
    well screen. In a well-constructed piezometer (i.e., one that has no leaks or
    internal flow), the pressure distribution with depth is hydrostatic


    $$p = \rho g(h - z)$$


    where $p$ [M/L/T$^2$] is the pressure with respect to the atmosphere in the groundwater
    at the elevation of the well screen, $\rho$ [M/L$^3$] is the (mean) density of
    the water in the piezometer, $g$ [L/T$^2$] is the gravitational acceleration,
    $h$ [L] is the head, and $z$ [L] is the elevation of the well screen (positive
    upward) with respect to a reference level. Equation (0.1) can be rewritten as
    (Figure 0.1)


    $$h = z + \frac{p}{\rho g}$$


    The term $z$ is also referred to as the elevation head, and the term $p/(\rho
    g)$ as the pressure head. The pressure $p$ equals zero at the water table so that
    the hydraulic head is equal to the elevation head, $h = z$. Comparing water levels
    from different wells requires all water levels to be expressed with respect to
    a common reference level or datum (e.g., mean sea level).


    **Exercise 0.1:** Consider a piezometer of which the top is 20 m above the datum.
    The well screen is 30 m below the top of the piezometer. A pressure sensor is
    lowered into the piezometer to a depth of 10 m below the top of the piezometer
    and records an absolute pressure of $p_{\text{abs}} = 180$ kPa. The piezometer
    is filled with freshwater with a density $\rho = 1000$ kg/m$^3$. The atmospheric
    pressure is measured to be 101 kPa. Use $g = 9.8$ m/s$^2$. Compute the head in
    the well.


    ### 0.2 Darcy''s experiment


    In 1856, the French engineer Henry Darcy published the results of a series of
    experiments on the flow of water through a column packed with different kinds
    of sand (Darcy, 1856). The experiments consisted of a soil column of length $L$
    and cross-sectional area $A$ (Figure 0.2). Darcy measured the discharge $Q$ through
    the column and the difference $\Delta h$ in the head of the water between two
    measurement ports.


    The experiments revealed that there is a linear relationship between the discharge
    $Q$ through the soil column and the hydraulic head drop $\Delta h$ over distance
    $L$, which can be expressed as


    $$Q = kA \frac{\Delta h}{L}$$


    The proportionality constant $k$ was introduced because the relationship between
    the discharge and the head gradient differed between types of sand. Nowadays,
    $k$ is known as the hydraulic conductivity, which has the dimensions L/T. Darcy''s
    law is not a physical law, but an empirical relation. It became known as a law
    because it performs remarkably well over a large range of flow conditions.


    ### 0.3 Representative elementary volume


    Water particles move through small openings in the subsurface, along convoluted
    pathways caused by the irregular shape of the pore space. The simulation of groundwater
    flow at this microscopic scale requires knowledge of the three-dimensional shape
    of the entire pore space, which is not feasible. A different approach is required
    for larger spatial scales, called the macroscopic scale. At the macroscopic scale,
    the net movement of groundwater through the subsurface is approximated using parameters
    that are a representative average of the behavior at the microscopic scale. This
    is what Darcy established empirically: The friction and viscous forces that work
    against the flow of water are captured by the hydraulic conductivity $k$. This
    parameter thus represents the effective action of the processes at the microscopic
    scale, without detailed knowledge of the pore geometry at this scale.


    The variables for the macroscopic description of groundwater flow are associated
    with a spatial scale that is representative of the system considered. The volume
    for which a macroscopic property is valid is called the representative elementary
    volume (REV). The REV must not be too small, because it will not form a representative
    average. In the extreme, an REV smaller than the size of a pore or soil particle
    either represents an opening between soil particles or a soil particle itself,
    but not the average of many of these combined. The size of an REV must therefore
    exceed a multiple of the representative pore size. Conversely, an REV must not
    be too large either as it may no longer be suited to resolve the spatial variability
    of the subsurface at the macroscopic level. If the properties of the subsurface
    vary over a few meters, the REV must be significantly smaller than a few meters
    to capture this variability in a model. The REV relevant to practical groundwater
    problems varies. For unconsolidated sands, with a pore and grain size on the order
    of tenths of a millimeter, an REV of a few centimeters already captures the average
    behavior.


    ### 0.4 Hydraulic conductivity and porosity


    The hydraulic conductivity $k$ is a measure of how easy a fluid can flow through
    the subsurface. The hydraulic conductivity is not just a property of the subsurface,
    but also a property of the fluid that flows through the subsurface and may be
    written as


    $$k = \frac{\kappa \rho g}{\mu}$$


    where $\kappa$ [L$^2$] is the intrinsic permeability that depends on the porous
    medium, while the density, $\rho$, and the dynamic viscosity, $\mu$ [M/L/T], are
    properties of the fluid that flows through the subsurface. This means that warmer
    water will have a higher hydraulic conductivity than colder water, even when it
    flows through the same subsurface, as the viscosity of warmer water is smaller
    than the viscosity of colder water. Typical values of the hydraulic conductivity
    of water through different materials are presented in Table 0.1.


    Table 0.1 Hydraulic conductivity ranges of different materials


    | Material | $k$ (m/d) |

    | :--- | :--- |

    | Clay | < 0.0001 |

    | Sandy clay | 0.0001 – 0.001 |

    | Peat | 0.0001 – 0.01 |

    | Silt | 0.001 – 0.01 |

    | Very fine sand | 0.1 – 1 |

    | Fine sand | 1 – 10 |

    | Coarse sand | 10 – 100 |

    | Sand with gravel | 100 – 1000 |

    | Gravel | > 1000 |


    Source: Modified from Verruijt (1970).'
  mdcn: '## 致谢


    作者衷心感谢 Erik Anderson 和 Michael Teubner 对全书初稿的审阅与评论。本书所呈现的地下水理论，基于 Arnold Verruijt
    教授在代尔夫特理工大学以及 Otto Strack 教授在明尼苏达大学所教授的地下水流动原理。最后，作者感谢 Python、numpy-scipy-matplotlib
    技术栈（Harris 等人，2020；Virtanen 等人，2020；Hunter，2007）以及 Project Jupyter（Kluyver 等人，2016）的开发者们，他们开发了一种卓越、宝贵且令人愉悦的编程语言和探索性计算生态系统。


    ## 作者


    **Mark Bakker** 是一名地下水工程师，也是代尔夫特理工大学土木工程与地球科学学院的教授。他教授地下水和 Python 课程已有二十多年，并且是许多基于
    Python 的开源建模工具的发起者和共同开发者，包括 Timml、Ttim、Pastas 和 Flopy。


    **Vincent Post** 是一名水文地质学家，研究兴趣集中在沿海水文地质和地下水质量领域。在学术界和研究领域工作多年后，他于 2021 年创立了 Edinsi
    Groundwater 公司。Python 已成为他日常专业工作中不可或缺的工具，他通过授课和开发基于 Python 的工具，积极推广其在水文地质学中的应用。


    ## 第 0 章


    ## 地下水流基础


    地下水被定义为位于地下水位以下、孔隙完全被水饱和的水。地下水流动构成了水文循环的地下部分。地下水的主要来源是降水（雨或雪），它们在渗入土壤后到达地下水位。由此导致的地下水体积增加被称为补给，有时也称为大气降水补给，以强调其水源来自大气降水。


    天然地下水排泄发生在地下水到达地表的地方，例如在泉水、沼泽和湿地中，或者直接排入河流、湖泊、海洋或大洋。浅层地下水也可以被植被吸收或通过土壤表面直接蒸发。在许多有人居住的地区，大量的水通过抽水井被抽取。


    ### 0.1 水头


    通过挖掘或钻孔可以到达地下水。水在钻孔中上升的水位被称为水头，或简称水头。测压管是一种专门设计用于测量水头的观测井，由一根底部带有开缝滤水管的管道组成。测压管中的水位会上升到一定高度，使得测压管内水柱的重量等于紧邻井筛处的地下水压力。在一个构造良好的测压管（即没有泄漏或内部流动）中，压力随深度的分布是静水压力分布


    $$p = \rho g(h - z)$$


    其中 $p$ [M/L/T$^2$] 是相对于大气压的地下水压力，位于井筛高程处；$\rho$ [M/L$^3$] 是测压管中水的（平均）密度；$g$ [L/T$^2$]
    是重力加速度；$h$ [L] 是水头；$z$ [L] 是相对于参考基准面的井筛高程（向上为正）。公式 (0.1) 可以改写为（图 0.1）


    $$h = z + \frac{p}{\rho g}$$


    项 $z$ 也被称为位置水头，项 $p/(\rho g)$ 被称为压力水头。在地下水位处，压力 $p$ 等于零，因此水头等于位置水头，即 $h = z$。比较不同井的水位时，需要将所有水位表示为相对于共同参考基准面或基准面（例如平均海平面）的值。


    **练习 0.1：** 考虑一个测压管，其顶部位于基准面以上 20 米处。井筛位于测压管顶部以下 30 米处。将一个压力传感器放入测压管中，深度为顶部以下
    10 米，记录到的绝对压力为 $p_{\text{abs}} = 180$ kPa。测压管内充满淡水，密度 $\rho = 1000$ kg/m$^3$。测得大气压为
    101 kPa。使用 $g = 9.8$ m/s$^2$。计算井中的水头。


    ### 0.2 达西实验


    1856 年，法国工程师亨利·达西发表了关于水流通过填充不同种类沙子的土柱的一系列实验结果（Darcy, 1856）。实验包括一个长度为 $L$、横截面积为
    $A$ 的土柱（图 0.2）。达西测量了通过土柱的流量 $Q$ 以及两个测量端口之间水头的差值 $\Delta h$。


    实验揭示，通过土柱的流量 $Q$ 与距离 $L$ 上的水头损失 $\Delta h$ 之间存在线性关系，可以表示为


    $$Q = kA \frac{\Delta h}{L}$$


    引入比例常数 $k$ 是因为流量与水头梯度之间的关系因沙子类型而异。如今，$k$ 被称为水力传导系数，其量纲为 L/T。达西定律不是物理定律，而是一个经验关系式。它之所以被称为定律，是因为它在广泛的流动条件下表现得非常出色。


    ### 0.3 代表性单元体积


    水粒子通过地下微小的孔隙移动，沿着由孔隙空间不规则形状引起的曲折路径。在微观尺度上模拟地下水流动需要了解整个孔隙空间的三维形状，这是不可行的。对于更大的空间尺度，即宏观尺度，需要采用不同的方法。在宏观尺度上，地下水通过地下的净运动使用代表微观尺度行为平均值的参数来近似。这正是达西通过经验建立的：阻碍水流的摩擦力和粘性力被水力传导系数
    $k$ 所捕获。因此，该参数代表了微观尺度过程的有效作用，而无需详细了解该尺度的孔隙几何形状。


    用于宏观描述地下水流动的变量与所考虑系统的代表性空间尺度相关联。宏观性质有效的体积被称为代表性单元体积（REV）。REV 不能太小，因为它无法形成代表性的平均值。极端情况下，小于孔隙或土壤颗粒尺寸的
    REV 要么代表土壤颗粒之间的空隙，要么代表土壤颗粒本身，而不是许多此类组合的平均值。因此，REV 的尺寸必须超过代表性孔隙尺寸的倍数。反之，REV 也不能太大，因为它可能不再适合在宏观层面解析地下的空间变异性。如果地下的性质在几米范围内变化，REV
    必须显著小于几米，以便在模型中捕捉这种变异性。与实际地下水问题相关的 REV 大小各不相同。对于孔隙和颗粒尺寸在十分之几毫米量级的松散沙子，几厘米的 REV
    就能捕捉其平均行为。


    ### 0.4 水力传导系数与孔隙率


    水力传导系数 $k$ 是衡量流体通过地下流动难易程度的指标。水力传导系数不仅是地下的属性，也是流经地下的流体的属性，可以写为


    $$k = \frac{\kappa \rho g}{\mu}$$


    其中 $\kappa$ [L$^2$] 是取决于多孔介质的固有渗透率，而密度 $\rho$ 和动力粘度 $\mu$ [M/L/T] 是流经地下的流体的属性。这意味着，即使流经相同的地下，较暖的水也会比较冷的水具有更高的水力传导系数，因为较暖的水的粘度小于较冷的水的粘度。表
    0.1 列出了水通过不同材料的水力传导系数的典型值。


    表 0.1 不同材料的水力传导系数范围


    | 材料 | $k$ (m/d) |

    | :--- | :--- |

    | 粘土 | < 0.0001 |

    | 砂质粘土 | 0.0001 – 0.001 |

    | 泥炭 | 0.0001 – 0.01 |

    | 粉砂 | 0.001 – 0.01 |

    | 极细砂 | 0.1 – 1 |

    | 细砂 | 1 – 10 |

    | 粗砂 | 10 – 100 |

    | 含砾石的砂 | 100 – 1000 |

    | 砾石 | > 1000 |


    来源：改编自 Verruijt (1970)。'
