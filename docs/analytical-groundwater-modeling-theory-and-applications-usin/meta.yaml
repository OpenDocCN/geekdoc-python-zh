    \ 3.8 中流线的高程在底板高程突变处发生跳跃。水头梯度的跳跃和流线的跳跃都是 Dupuit–Forchheimer 近似的结果，这意味着流线可以上下移动而不会损失能量。实际上，如第\
    \ 10.3 节所示，水头和流线在底板台阶处的过渡是平滑的。\n\n```python\n# 求解\nx = np.hstack((np.linspace(0,\
    \ L0 - 1e-6, 100), np.linspace(L0 + 1e-6, L, 100)))\nphi = np.empty_like(x)\n\
    phi[x < L0] = -U * x[x < L0] + phi0\nphi[x >= L0] = -U * (x[x >= L0] - L) + phiL\n\
    h = np.zeros_like(phi)\nh[x < L0] = np.sqrt(2 * phi[x < L0] / k) + z0\nh[x >=\
    \ L0] = np.sqrt(2 * phi[x >= L0] / k) + z1\n#\npsi = np.zeros((2, len(x)))\npsi[1]\
    \ = -U\nxg = np.zeros_like(psi)\nxg[:] = x\nzg = np.zeros_like(xg)\nzg[0, :100]\
    \ = z0\nzg[0, 100:] = z1\nzg[1] = h\n```\n\n```python\n# 基本流线图\nplt.subplot(111,\
    \ aspect=25)\nplt.contour(xg, zg, psi, np.linspace(-U, 0, 4), colors='C1', linestyles='-')\n\
    plt.plot(x, h, 'C0')\nplt.plot(x, zg[0], 'k');\n```\n\n## 3.3 承压/无压混合流与面状补给\n\n\
    到目前为止，本章已分别推导了承压流（或导水系数恒定的水流）和无压流的解。本节考虑一种情况，即水流在含水层某处从承压流转变为无压流。考虑两条平行河流之间的承压含水层中的水流，含水层厚度为\
    \ $H$（图 3.9）；河流与含水层直接接触。两河相距 $L$，面状补给均匀且等于 $N$。左河水位 $h_0$ 高于含水层顶板，右河水位 $h_L$ 低于含水层顶板。因此，地下水在左河附近为承压流，在右河附近为无压流，并在含水层某处由承压流转变为无压流。\n\
    \n解决此问题的一种方法是，为含水层承压部分的水头写一个解，为无压部分的水头写另一个解，然后尝试找到水流由承压转变为无压的点。这是可行的，但使用流量势提供了一种更简便的方法。流量势已在无压流中定义，但尚未在承压流中定义。对于承压流，流量矢量可写为\n\
    \n$$Q_x = -kH \\frac{dh}{dx} = -\\frac{d}{dx}(kHh) = -\\frac{d\\Phi}{dx} \\quad\
    \ (3.30)$$\n\n其中 $k$ 和 $H$ 均为常数。承压流的流量势定义为\n\n$$\\Phi = kHh + C \\quad (3.31)$$\n\
    \n其中 $C$ 是任意常数。当水流完全承压时，常数 $C$ 可设为零；但当水流在含水层部分区域承压、部分区域无压时，常数 $C$ 必须选择不同的值，如下所述。\n\
    \n既然承压流和无压流都已表述为势流，流量矢量可写为公式 (3.3)，控制微分方程为泊松方程 (3.5)，一维稳态势流的通解为公式 (3.6)。这意味着流量势是\
    \ $x$ 的连续函数，无论水流是承压还是无压。流量势必须转换为也是 $x$ 的连续函数的水头（因为水头在没有物理屏障的情况下不能突然跳跃）。这通过适当选择公式\
    \ (3.31) 中的常数 $C$ 来实现。在水流由承压转变为无压的点，含水层中的水头等于 $z_b + H$。该点的势称为过渡势 $\\Phi_t$，可由无压流的势（公式\
    \ (3.2)）计算得出\n\n$$\\Phi_t = \\frac{1}{2}kH^2$$\n\n选择常数 $C$ 使得承压流的流量势给出相同的过渡势\n\
    \n$$\\Phi_t = kH(z_b + H) + C = \\frac{1}{2}kH^2$$\n\n因此\n\n$$C = -\\frac{1}{2}kH^2\
    \ - kHz_b$$\n\n一旦计算出流量势作为 $x$ 的函数，就使用适当的公式将其转换为水头。如果水流是承压的，\n\n$$h = \\frac{\\\
    Phi - C}{kH} \\quad \\Phi \\geq \\Phi_t$$\n\n如果水流是无压的，\n\n$$h = z_b + \\sqrt{2\\\
    Phi/k} \\quad \\Phi \\leq \\Phi_t$$\n\n作为示例，求解第 1.2 节的问题，但现在含水层厚度固定为 $H$，而含水层的饱和厚度可能随水头变化。边界条件为\n\
    \n$$\\Phi|_{x=0} = \\Phi_0 = kHh_0 + C$$\n$$\\Phi|_{x=L} = \\Phi_L = \\frac{1}{2}k(h_L\
    \ - z_b)^2$$\n\n将边界条件应用于通解 (3.6) 得到\n\n$$\\Phi = -\\frac{N}{2}(x^2 - Lx) + \\\
    frac{(\\Phi_L - \\Phi_0)x}{L} + \\Phi_0$$\n\n水头解由公式 (3.35) 或 (3.36) 从势得到。与第 1.2\
    \ 节相同参数的结果如图 3.10 所示。注意，水流仅在右河附近的一小段含水层内为无压流。\n\n```python\n# 参数\nL = 1000 # 含水层长度，m\n\
    H = 10 # 含水层厚度，m\nzb = -5 # 含水层底板，m\nk = 10 # 渗透系数，m/d\nh0 = 6 # 左边界指定水头，m\nhL\
    \ = 4 # 右边界指定水头，m\nN = 0.001 # 面状补给，m/d\n```\n\n```python\n# 求解\nC = -0.5 * k\
    \ * H**2 - k * H * zb\nphi0 = k * H * h0 + C\nphi1 = 0.5 * k * (hL - zb)**2\n\
    phit = 0.5 * k * H**2 # 过渡势\nx = np.linspace(0, L, 400)\nphi = -N / 2 * (x **\
    \ 2 - L * x) + (phi1 - phi0) * x / L + phi0\nh = np.zeros_like(phi)\nh[phi >=\
    \ phit] = (phi[phi > phit] - C) / (k * H)\nh[phi <= phit] = zb + np.sqrt(2 * phi[phi\
    \ <= phit] / k)\nQx = N * (x - L / 2) - (phi1 - phi0) / L\nhapprx = -N / (2 *\
    \ k * H) * (x ** 2 - L * x) + (hL - h0) * x / L + h0\nQxapprx = N * (x - L / 2)\
    \ - k * H * (hL - h0) / L\n```\n\n```python\n# 基本绘图\nplt.subplot(121)\nplt.plot(x,\
    \ h, 'C0')\nplt.plot(x, happrx, 'C0--')\nplt.subplot(122)\nplt.plot(x, Qx, 'C1')\n\
    plt.plot(x, Qxapprx, 'C1--')\n```\n\n流入左河的通量现在略高于第 1.2 节，而流入右河的通量略低，因此两条河流的总出流量仍等于\
    \ NL。\n\n下面创建了流函数的等值线图（图 3.11）。饱和区的顶部在承压区由含水层顶板形成，在无压区由地下水位形成。\n\n```python\n\
    print(f'流入左河的通量: {-Qx[0]:.3f} m^2/d')\nprint(f'流入右河的通量: {Qx[-1]:.3f} m^2/d')\n\
    ```\n\n流入左河的通量: 0.305 m^2/d\n流入右河的通量: 0.695 m^2/d\n\n```python\n# 求解\npsi = np.zeros((2,\
    \ len(x)))\npsi[1] = -Qx\nxg = np.zeros_like(psi)\nxg[:] = x\nzg = np.zeros_like(psi)\n\
    zg[0] = zb\nzg[1] = H + zb\nzg[1, h < H + zb] = h[h < H + zb]\n```\n\n```python\n\
    # 基本流线图\nplt.subplot(111, aspect=25)\nplt.contour(xg, zg, psi, 20, colors='C1',\
    \ linestyles='-')\nplt.plot(xg[0], zg[1], 'C0');\n```\n\n练习 3.5：考虑 $h_0 = h_L\
