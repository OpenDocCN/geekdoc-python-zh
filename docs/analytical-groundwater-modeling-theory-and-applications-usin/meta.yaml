- md: "## 2.4 Flow to a river in a two-aquifer system\n\nMany aquifers are bounded\
    \ at the bottom by a leaky layer with another aquifer below. Solutions for one-dimensional\
    \ steady flow in such a two-aquifer system can be written as the sum of the solution\
    \ for confined flow (Chapter 1) and the solution for semi-confined flow, as will\
    \ be shown in the following.\n\nIn what follows, the transmissivity of the top\
    \ aquifer (aquifer 0) is $T_0$ and the transmissivity of the bottom aquifer (aquifer\
    \ 1) is $T_1$. The resistance of the leaky layer between the two aquifers is $c$.\
    \ The recharge from rainfall to the top aquifer is equal to $N$. The vertical\
    \ flow $q_z$ through the leaky layer from aquifer 1 (the bottom aquifer) to aquifer\
    \ 0 (the top aquifer) is\n\n$$q_z = \\frac{h_1 - h_0}{c} \\qquad (2.33)$$\n\n\
    The head in the two-aquifer system is governed by a system of two differential\
    \ equations\n\n$$\\frac{d^2 h_0}{dx^2} = \\frac{h_0 - h_1}{c T_0} - \\frac{N}{T_0}$$\n\
    $$\\frac{d^2 h_1}{dx^2} = \\frac{h_1 - h_0}{c T_1} \\qquad (2.34)$$\n\nwhere $h_0$\
    \ and $h_1$ are the heads in the top and bottom aquifers, respectively.\n\nThe\
    \ solution to the system of two differential equations (2.34) is obtained as follows.\
    \ Addition of the first differential equation multiplied by $T_0$ and the second\
    \ differential equation multiplied by $T_1$ gives\n\n$$\\frac{d^2 (T_0 h_0 + T_1\
    \ h_1)}{dx^2} = -N \\qquad (2.35)$$\n\nThis is Poisson's differential equation\
    \ (1.8), which has the general solution\n\n$$T_0 h_0 + T_1 h_1 = -Nx^2 + A'x +\
    \ B' \\qquad (2.36)$$\n\nwhere $A'$ and $B'$ are arbitrary constants. Subtraction\
    \ of the second differential equation from the first differential equation gives,\
    \ after a bit of algebra,\n\n$$\\frac{d^2 (h_0 - h_1)}{dx^2} = \\frac{h_0 - h_1}{\\\
    lambda^2} - \\frac{N}{T_0} \\qquad (2.37)$$\n\nwhere\n\n$$\\lambda = \\sqrt{\\\
    frac{c T_0 T_1}{T_0 + T_1}} \\qquad (2.38)$$\n\nThis is the modified Helmholtz\
    \ equation (2.5) with an additional constant $(-N/T_0)$ on the right-hand side.\
    \ The general solution is\n\n$$h_0 - h_1 = C' e^{-x/\\lambda} + D' e^{x/\\lambda}\
    \ + \\frac{N \\lambda^2}{T_0} \\qquad (2.39)$$\n\nwhere $C'$ and $D'$ are arbitrary\
    \ constants. Expressions for $h_0$ and $h_1$ are obtained by combining Eqs. (2.36)\
    \ and (2.39), which gives\n\n$$h_0 = -\\frac{N}{2T} x^2 + Ax + B + C T_1 e^{-x/\\\
    lambda} + D T_1 e^{x/\\lambda} + \\frac{T_1 N \\lambda^2}{T_0 T}$$\n$$h_1 = -\\\
    frac{N}{2T} x^2 + Ax + B - C T_0 e^{-x/\\lambda} - D T_0 e^{x/\\lambda} - \\frac{N\
    \ \\lambda^2}{T} \\qquad (2.40)$$\n\nwhere $A$, $B$, $C$, and $D$ are parameters\
    \ that must be determined from boundary conditions.\n\nAs a first application,\
    \ consider flow to a river in a two-aquifer system; areal recharge is neglected.\
    \ The river is narrow and in direct contact with the top aquifer, but not the\
    \ bottom aquifer, as shown in Figure 2.11. The boundary condition at the river\
    \ is\n\n$$h_0|_{x=0} = h_r$$\n\nwhere $h_r$ is the river stage. Far away to the\
    \ left of the river, the heads in the two aquifers are equal and the head gradient\
    \ is $dh_0/dx = dh_1/dx = G_L$ so that the discharge vector $Q_{x_0}$ in the top\
    \ aquifer is\n\n$$Q_{x_0}|_{x=-\\infty} = U_{L_0} = -T_0 G_L$$\n\nand the discharge\
    \ vector $Q_{x_1}$ in the bottom aquifer is\n\n$$Q_{x_1}|_{x=-\\infty} = U_{L_1}\
    \ = -T_1 G_L$$\n\nThe head gradient far to the right is $G_R$ so that the discharge\
    \ vector is\n\n$$Q_{x_0}|_{x=\\infty} = U_{R_0} = -T_0 G_R$$\n\nand the discharge\
    \ vector $Q_{x_1}$ in the bottom aquifer is\n\n$$Q_{x_1}|_{x=\\infty} = U_{R_1}\
    \ = -T_1 G_R$$\n\nAn amount $\\sigma$ $[L^2/T]$ flows from the aquifer into the\
    \ river per meter river normal to the plane of flow. The discharge $\\sigma$ is\
    \ obtained from continuity of flow\n\n$$\\sigma = U_{L_0} + U_{L_1} - (U_{R_0}\
    \ + U_{R_1})$$\n\nApplication of the stated boundary conditions to the general\
    \ solution (2.40) gives\n\n$$h_0 = -\\frac{U_{L_0}}{T_0}x - \\frac{T_1 \\lambda}{T_0\
    \ T} \\frac{\\sigma}{2} (e^{x/\\lambda} - 1) + h_r$$\n$$h_1 = -\\frac{U_{L_1}}{T_1}x\
    \ + \\frac{\\lambda}{T} \\frac{\\sigma}{2} \\left(e^{x/\\lambda} + \\frac{T_1}{T_0}\\\
    right) + h_r$$\n$$x \\leq 0$$\n\n$$h_0 = -\\frac{U_{R_0}}{T_0}x - \\frac{T_1 \\\
    lambda}{T_0 T} \\frac{\\sigma}{2} \\left( e^{-x/\\lambda} - 1 \\right) + h_r$$\n\
    $$h_1 = -\\frac{U_{R_1}}{T_1}x + \\frac{\\lambda}{T} \\frac{\\sigma}{2} \\left(\
    \ e^{-x/\\lambda} + \\frac{T_1}{T_0} \\right) + h_r$$\n$$x \\ge 0$$\n$$(2.48)$$\n\
    \nThe corresponding expressions for the discharge vector are\n\n$$Q_{x0} = U_{L_0}\
    \ + \\frac{T_1}{T} \\frac{\\sigma}{2} e^{x/\\lambda}$$\n$$Q_{x1} = U_{L_1} - \\\
    frac{T_1}{T} \\frac{\\sigma}{2} e^{x/\\lambda}$$\n$$x \\le 0$$\n$$(2.49)$$\n\n\
    $$Q_{x0} = U_{R_0} - \\frac{T_1}{T} \\frac{\\sigma}{2} e^{-x/\\lambda}$$\n$$Q_{x1}\
    \ = U_{R_1} + \\frac{T_1}{T} \\frac{\\sigma}{2} e^{-x/\\lambda}$$\n$$x \\ge 0$$\n\
    $$(2.50)$$\n\nThe leakage factor $\\lambda$ (Eq. 2.38) for a two-aquifer system\
    \ plays the same role as for semi-confined flow: A distance $3\\lambda$ from the\
    \ river, the heads and gradients in the aquifers are approximately equal.\n\n\
    In the example below, the transmissivity (and hence the flow) in the bottom aquifer\
    \ is twice the transmissivity of the top aquifer. The flow is toward the river\
    \ from both sides, but the flow from the left is four times as large as that from\
    \ the right (Figure 2.12).\n\n```\n# parameters\nk0 = 10 # hydraulic conductivity\
    \ aquifer 0, m/d\nk1 = 20 # hydraulic conductivity aquifer 1, m/d\nH0 = 10 # thickness\
    \ aquifer 0, m\nH1 = 10 # thickness aquifer 1, m\nHstar = 2 # thickness leaky\
    \ layer\nkstar = 0.01 # hydraulic conductivity leaky layer, m/d\nhr = 5 # head\
    \ in river, m\nGL = -0.002 # head gradient far away to the left, -\nGR = 0.0005\
    \ # head gradient far away to the right, -\n```\n\n```\n# solution\nT0 = k0 *\
    \ H0\nT1 = k1 * H1\nc = Hstar / kstar\nT = T0 + T1\nUL0 = -T0 * GL\nUL1 = -T1\
    \ * GL\nUR0 = -T0 * GR\nUR1 = -T1 * GR\nσ = UL0 + UL1 - (UR0 + UR1)\nλ = np.sqrt(c\
    \ * T0 * T1 / T)\nprint(f'leakage factor: {λ:.2f} m')\n#\nx = np.linspace(-4 *\
    \ λ, 4 * λ, 401)\ndef hmaq(x):\n    if x <= 0:\n        h0 = -UL0 / T0 * x - T1\
    \ / T0 * λ / T * σ / 2 * (np.exp(x / λ) - 1) + hr\n        h1 = -UL1 / T1 * x\
    \ + λ / T * σ / 2 * (np.exp(x / λ) + T1 / T0) + hr\n    else:\n        h0 = -UR0\
    \ / T0 * x - T1 / T0 * λ / T * σ / 2 * (np.exp(-x / λ) - 1) + hr\n        h1 =\
    \ -UR1 / T1 * x + λ / T * σ / 2 * (np.exp(-x / λ) + T1 / T0) + hr\n    return\
    \ h0, h1\n\nhmaqvec = np.vectorize(hmaq) # vectorized version of hmaq function\n\
    h0, h1 = hmaqvec(x)\n\ndef disxmaq(x):\n    if x <= 0:\n        Qx0 = UL0 + T1\
    \ / T * σ / 2 * np.exp(x / λ)\n        Qx1 = UL1 - T1 / T * σ / 2 * np.exp(x /\
    \ λ)\n    else:\n        Qx0 = UR0 - T1 / T * σ / 2 * np.exp(-x / λ)\n       \
    \ Qx1 = UR1 + T1 / T * σ / 2 * np.exp(-x / λ)\n    return Qx0, Qx1\n\ndisxmaqvec\
    \ = np.vectorize(disxmaq) # vectorized version of disxmaq function\nQx0, Qx1 =\
    \ disxmaqvec(x)\n```\n\nleakage factor: 115.47 m\n\n```\n# basic plot\nplt.subplot(121)\n\
    plt.plot(x, h0, 'C0', label='$h_0$')\nplt.plot(x, h1, 'C0--', label='$h_1$')\n\
    plt.legend()\nplt.subplot(122)\nplt.plot(x, Qx0, 'C1', label='$Q_{x_0}$')\nplt.plot(x,\
    \ Qx1, 'C1--', label='$Q_{x_1}$')\nplt.legend();\n```\n\nA contour plot of the\
    \ stream function is shown in Figure 2.13. Note that part of the water coming\
    \ from the left in the bottom aquifer flows past the river before it leaks to\
    \ the top aquifer and flows to the river. There is a stagnation point in the bottom\
    \ aquifer ($Q_{x_1} = 0$) to the right of the river as can also be seen from the\
    \ right graph of Figure 2.12.\n\n```\n# solution\nz = [0, H1, H1 + Hstar, H1 +\
    \ Hstar + H0]\npsi = np.zeros((len(z), len(x)))\npsi[1] = Qx1\npsi[2] = Qx1\n\
    psi[3] = Qx1 + Qx0\n```\n\n```\n# basic streamline plot\nplt.subplot(111, aspect=10)\n\
    plt.contour(x, z, psi, np.arange(-1, 1, 0.05))\nplt.axhspan(H1, H1 + Hstar, color=[.8,\
    \ .8, .8]);\n```\n\nThe stated problem is fully defined by only three values:\
    \ the gradients $G_L$ and $G_R$ far away to the left and right of the river, respectively,\
    \ and the head in the river $h_r$. $G_L$ may be obtained from the head in one\
    \ of the aquifers on the left of the river, and $G_R$ may be obtained from the\
    \ head in one of the aquifers on the right side of the river. For example, if\
    \ the head is $h_d$ in the top aquifer at $x = -d$, substitution in Eq. (2.47)\
    \ gives\n\n$$G_L = \\frac{h_r - h_d}{d} - \\frac{T_1 \\lambda \\sigma}{T_0 T 2}\
    \ \\frac{(e^{-d/\\lambda} - 1)}{d}$$\n\n## 2.5 Areal recharge between two rivers\
    \ in a two-aquifer system\n\nThe solution for flow between two rivers with areal\
    \ recharge $N$ in a single aquifer (Section 1.2) is expanded to two aquifers,\
    \ where the rivers cut through the top aquifer, but not the bottom aquifer (see\
    \ Figure 2.14). The two-aquifer solution is used to investigate when the leaky\
    \ layer and the aquifer below it have a significant effect on the head in the\
    \ top aquifer or when the bottom of the top aquifer may be approximated as impermeable.\
    \ The origin is chosen halfway between the two rivers, and the distance between\
    \ the two rivers is $2L$. The heads in the two rivers are equal to $h_L$ so that\
