    where $z_b$ is the elevation of the bottom of the aquifer. Substitution of Eq.
    (5.63) for $Q_x$ in Eq. (5.62) gives


    $$\frac{\partial^2 \Phi}{\partial x^2} = S \frac{\partial h}{\partial t} - N \quad
    (5.65)$$


    This differential equation is known as the Boussinesq equation and is a nonlinear
    differential equation in terms of the head, because $\Phi$ includes a term $h^2$.
    This equation is notoriously difficult to solve analytically, even though it may
    not look all that complicated at first sight.


    The differential equation has to be linearized to solve it analytically. First,
    consider the derivative of $\Phi$ (Eq. 5.64) with respect to time


    $$\frac{\partial \Phi}{\partial t} = k(h - z_b) \frac{\partial h}{\partial t}
    \quad (5.66)$$


    Differential equation (5.65) may now be written as


    $$\frac{\partial^2 \Phi}{\partial x^2} = \frac{S}{k(h - z_b)} \frac{\partial \Phi}{\partial
    t} - N \quad (5.67)$$


    This equation is linearized by approximating the saturated thickness in front
    of the time derivative by a constant value $\bar{H}$


    $$\frac{\partial^2 \Phi}{\partial x^2} \approx \frac{S}{k\bar{H}} \frac{\partial
    \Phi}{\partial t} - N \quad (5.68)$$


    Differential equation (5.68) is a linear differential equation in terms of $\Phi$.
    The solution for the discharge potential may be written as the sum of a steady
    solution and a transient solution.


    The problem of Section 5.1 is repeated, but now using the linearized Boussinesq
    equation for unconfined transient flow (Eq. 5.68). A semi-infinite aquifer is
    bounded by a canal at $x = 0$. Initially, the head is equal to $h_0$ so that the
    initial steady discharge potential equals


    $$\Phi|_{x,t=0} = \Phi_0 = \frac{1}{2}k(h_0 - z_b)^2 \quad (5.69)$$


    At time $t = 0$, the head in the canal is raised by $\Delta h$ (Figure 5.2) so
    that the discharge potential increases by an amount $\Delta \Phi$


    $$\Delta \Phi = \frac{1}{2}k(h_0 + \Delta h - z_b)^2 - \Phi_0 \quad (5.70)$$


    The boundary condition of the transient solution at $x = 0$ is


    $$\Phi|_{x=0,t>0} = \Delta \Phi \quad (5.71)$$


    while the head at infinity remains equal to $h_0$


    $$\Phi|_{x \to \infty,t} = 0 \quad (5.72)$$


    The transient solution for the discharge potential is (compare Eq. 5.14)


    $$\Phi(x, t) = \Delta \Phi \text{ erfc}(u) \quad (5.73)$$


    where $u$ is


    $$u = \sqrt{\frac{S_p x^2}{4k\bar{H}t}} \quad (5.74)$$'
