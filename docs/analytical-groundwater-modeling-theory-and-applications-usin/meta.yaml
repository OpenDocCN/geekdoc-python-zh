    \    if x <= 0:\n        h0 = -UL0 / T0 * x - T1 / T0 * λ / T * σ / 2 * (np.exp(x\
    \ / λ) - 1) + hr\n        h1 = -UL1 / T1 * x + λ / T * σ / 2 * (np.exp(x / λ)\
    \ + T1 / T0) + hr\n    else:\n        h0 = -UR0 / T0 * x - T1 / T0 * λ / T * σ\
