    # 6.5 Wells in a two-aquifer system


    In the previous section, the problem was solved for a well that pumps from the
    bottom aquifer of a two-aquifer system where the head in the top aquifer is constant
    and fixed. Here, a solution is presented for flow to a well in a two-aquifer systems
    where water flows in both aquifers. The well is screened in the bottom aquifer.
    The aquifers are numbered 0 and 1 from the top (see Figure 6.14). The transmissivities
    of the top and bottom aquifers are $T_0$ and $T_1$, respectively, and the resistance
    of the leaky layer between the aquifers is $c$.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_129_1.png)


    The flow in the two-aquifer system is governed by a system of two coupled differential
    equations (see Section 2.4)


    ```

    $$\nabla^2 h_0 = \frac{h_0 - h_1}{c T_0}$$

    $$\nabla^2 h_1 = \frac{h_1 - h_0}{c T_1}$$

    ```


    where $h_0$ and $h_1$ are the heads in the top and bottom aquifers, respectively.
    A well is pumping with a discharge $Q$ in aquifer 1


    ```

    $$\lim_{r \to 0} -2\pi r Q_{r,1} = Q$$

    ```'
