    \n# Taylor & Francis\n\nTaylor & Francis Group\n\nhttp://taylorandfrancis.com\n\
    \n# 第 6 章\n\n## 向井的稳态二维流\n\n许多三维地下水流问题可以通过采用 Dupuit-Forchheimer 近似，近似为水平面内的二维流。特别令人感兴趣的是包含井的问题。本章介绍了抽水井、注水井以及靠近河流和不透水边界的井的解。根据问题类型，展示了不同的求解技术。对于均质承压和非承压含水层，解是用排泄势来表述的，因此同一个势解可以用于承压流、非承压流和界面流。对于没有面状入渗的问题，使用水平面内的流函数。半承压含水层和双层含水层系统中向井流动的解是用水头来表述的。\n\
    \n![](img/ca724f426a624bf916ffe68c7fbe382_111_0.png)\n\n水平面内二维流的排泄矢量由两个分量组成：$x$\
    \ 方向的 $Q_x$ 和 $y$ 方向的 $Q_y$（图 6.1）。水平 $x, y$ 平面内稳态二维流的连续性方程可以写成\n\n$$\\frac{\\\
    partial Q_x}{\\partial x} + \\frac{\\partial Q_y}{\\partial y} = N$$\n\n其中 $N$\
    \ 是面状补给。注意，这个方程与一维稳态流的连续性方程（式 1.5）仅相差一项 $\\partial Q_y/\\partial y$。\n\n稳态承压流、非承压流和界面流可以表述为势流，其中排泄矢量是排泄势的负梯度\n\
    \n$$Q_x = -\\frac{\\partial \\Phi}{\\partial x} \\quad Q_y = -\\frac{\\partial\
    \ \\Phi}{\\partial y}$$\n\n因此，稳态势流的微分方程变为二维泊松方程\n\n$$\\nabla^2 \\Phi = \\frac{\\\
    partial^2 \\Phi}{\\partial x^2} + \\frac{\\partial^2 \\Phi}{\\partial y^2} = -N$$\n\
    \n96 地下水解析建模\n\n表 6.1 不同类型流动的排泄势定义\n\n| 流动类型 | 排泄势 | 条件 | 章节 |\n| :--- | :---\
    \ | :--- | :--- |\n| 承压流 | $\\Phi = kHh$ | $h \\ge z_t$ | 3.3 |\n| 非承压流 | $\\\
    Phi = \\frac{1}{2}k(h - z_b)^2$ | $h \\ge z_b$ | 3.1 |\n| 承压/非承压流 | $\\Phi = kHh\
    \ - (\\frac{1}{2}kH^2 + kHz_b)$ | $h \\ge z_t$ | 3.3 |\n| | $\\Phi = \\frac{1}{2}k(h\
    \ - z_b)^2$ | $z_b \\le h \\le z_t$ | 3.3 |\n| 承压界面流 | $\\Phi = kHh + (\\frac{1}{2}kH^2\
    \ + kHz_b)/\\alpha$ | $h \\ge -z_b/\\alpha$ | 4.1 |\n| | $\\Phi = \\frac{1}{2}k\\\
    alpha(h + z_t/\\alpha)^2$ | $-z_t/\\alpha \\le h \\le -z_b/\\alpha$ | 4.1 |\n\
    | 非承压界面流 | $\\Phi = \\frac{1}{2}k(h - z_b)^2 - \\frac{1}{2}k(\\alpha + 1)z_b^2/\\\
    alpha$ | $h \\ge -z_b/\\alpha$ | 4.2 |\n| | $\\Phi = \\frac{1}{2}k(\\alpha + 1)h^2$\
    \ | $0 \\le h \\le -z_b/\\alpha$ | 4.2 |\n\n其中 $k$ 是含水层的渗透系数，$z_b$ 和 $z_t$ 是含水层底部和顶部的高程，$H$\
    \ 是含水层厚度，$\\alpha = \\rho_f/(\\rho_s - \\rho_f)$，其中 $\\rho_f$ 和 $\\rho_s$ 分别是淡水和咸水的密度。对于界面流，所有水头和高程都是相对于海平面测量的。\n\
    \n在没有面状补给（$N = 0$）的情况下，这个微分方程被称为二维拉普拉斯方程。不同流动类型的排泄势与水头之间的关系总结在表 6.1 中。\n\n在均质、各向同性含水层中，向抽水井的流动在没有任何其他流动特征的情况下是径向对称的。因此，水头和流动仅是到井的径向距离的函数。通过考虑一个环形区域（图\
    \ 6.2）的水量平衡，推导了径向坐标下的连续性方程。环形的内半径为 $r$，外半径为 $r + \\Delta r$，$Q_r$ 是排泄矢量的径向分量（即，远离井为正）。对于稳态流，连续性方程为\n\
