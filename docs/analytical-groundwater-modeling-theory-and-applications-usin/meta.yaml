    # 6.1 Radially symmetric flow on a circular island


    Radial flow problems and solutions are important in groundwater engineering because
    they represent the local flow field around pumping wells. In this section, solutions
    are presented for radially symmetric two-dimensional flow on a circular island.
    The head is fixed along the perimeter of the island, the areal recharge on the
    island is uniform, and a pumping well is located at the center of the island.
    The head and flow are a function only of the radial coordinate $r$. The problem
