  md: 'The constant $C_u$ is chosen such that the potential is continuous at the point
    where the flow changes from unconfined interface flow to regular unconfined flow,
    which is at the toe of the interface. The head at the toe is equal to $h_{toe}
    = -z_b/\alpha$, and the potential at the toe of the interface may be computed
    with Eq. (4.23) as


    $$\Phi_{toe} = \frac{1}{2}k \frac{\alpha + 1}{\alpha^2} z_b^2 \qquad (4.26)$$


    Constant $C_u$ is obtained by setting the discharge potential (Eq. 4.25) equal
    to $\Phi_{toe}$, with $h = -z_b/\alpha$ at the toe


    $$\Phi_{toe} = \frac{1}{2}k \left(-\frac{z_b}{\alpha} - z_b\right)^2 + C_u = \frac{1}{2}k
    \frac{\alpha + 1}{\alpha^2} z_b^2 \qquad (4.27)$$


    so that


    $$C_u = -\frac{1}{2}k \frac{\alpha + 1}{\alpha} z_b^2 \qquad (4.28)$$


    As for confined interface flow, head-specified boundary conditions need to be
    transformed into discharge potentials using either Eq. (4.23) or (4.25), depending
    on the value of the head. Once a solution is obtained in terms of the discharge
    potential, the head may be computed with the inverse of Eq. (4.23) or (4.25)


    $$h = \sqrt{\frac{2\Phi}{k(\alpha + 1)}} \quad \Phi \leq \Phi_{toe} \qquad (4.29)$$

    $$h = \sqrt{\frac{2(\Phi - C_u)}{k}} + z_b \quad \Phi \geq \Phi_{toe} \qquad (4.30)$$


    As an example, consider unconfined interface flow in a cross section of a long
    strip island. The distance between the two shores (i.e., the width of the island)
    is $L$, and the infiltration rate is equal to $N$. The origin of the coordinate
    system is chosen at the left coast (Figure 4.5). At both coasts, the head is equal
    to sea level


    $$h|_{x=0} = h|_{x=L} = 0 \qquad (4.31)$$


    ![](img/ca724f426a6249bf916ffe68c7fbe382_77_0.png)


    The corresponding boundary conditions in terms of potentials are


    $$\Phi|_{x=0} = \Phi|_{x=L} = 0 \qquad (4.32)$$


    The potential as a function of $x$ for this case was derived in Section 3.3. Substitution
    of boundary conditions (4.32) in Eq. (3.39) gives


    $$\Phi = -\frac{N}{2}(x^2 - Lx) \qquad (4.33)$$


    The interface reaches the bottom of the aquifer when the potential at the center
    of the island is larger than the potential at the toe $\Phi_{toe}$ (Eq. 4.26).
    In the example below, the solution is plotted for two values of the recharge $N$:
    one value for which the interface doesn''t reach the bottom of the aquifer and
    one value for which the interface reaches the bottom of the aquifer (Figure 4.6).'
