    \ - z_1)^2 \\qquad (3.27)$$\n\nwhich are transformed in the following expressions\
    \ for $h^-$ and $h^+$.\n\n$$h^- = \\sqrt{\\frac{2(-UL_0 + \\Phi_0)}{k}} + z_0\
