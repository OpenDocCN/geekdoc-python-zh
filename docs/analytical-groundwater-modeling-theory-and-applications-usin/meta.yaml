  md: '# Chapter 6


    # Steady two-dimensional flow to wells


    Many three-dimensional groundwater flow problems can be approximated as two-dimensional
    in the horizontal plane through adoption of the Dupuit–Forchheimer approximation.
    Of particular interest are problems that include wells. In this chapter, solutions
    are presented for extraction wells, injection wells, and wells near rivers and
    impermeable boundaries. Different solution techniques are demonstrated, depending
    on the type of problem. For homogeneous confined and unconfined aquifers, solutions
    are formulated in terms of a discharge potential so that the same potential solution
    can be used for confined flow, unconfined flow, and interface flow. The stream
    function is used in the horizontal plane for problems without areal infiltration.
    Solutions for flow to wells in semi-confined aquifers and two-aquifer systems
    are formulated in terms of heads.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_111_0.png)


    The discharge vector for two-dimensional flow in the horizontal plane consists
    of two components: $Q_x$ in the $x$-direction and $Q_y$ in the $y$-direction (Figure
    6.1). Continuity of flow for steady two-dimensional flow in the horizontal $x,
    y$ plane may be written as


    $$\frac{\partial Q_x}{\partial x} + \frac{\partial Q_y}{\partial y} = N$$


    where $N$ is the areal recharge. Note that this equation differs from the continuity
    of flow equation for one-dimensional steady flow (Eq. 1.5) only by the additional
    term $\partial Q_y/\partial y$.


    Steady confined, unconfined, and interface flows may be formulated as potential
    flow, where the discharge vector is minus the gradient of the discharge potential


    $$Q_x = -\frac{\partial \Phi}{\partial x} \quad Q_y = -\frac{\partial \Phi}{\partial
    y}$$


    so that the differential equation for steady potential flow becomes the two-dimensional
    Poisson equation


    $$\nabla^2 \Phi = \frac{\partial^2 \Phi}{\partial x^2} + \frac{\partial^2 \Phi}{\partial
    y^2} = -N$$'
