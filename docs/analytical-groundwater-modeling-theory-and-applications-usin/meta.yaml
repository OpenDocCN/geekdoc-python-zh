    \ leaky layer between the aquifers is $c$.\n\nThe flow in the two-aquifer system\
    \ is governed by a system of two coupled differential equations (see Section 2.4)\n\
    \n$$\\nabla^2 h_0 = \\frac{h_0 - h_1}{c T_0}$$\n$$\\nabla^2 h_1 = \\frac{h_1 -\
