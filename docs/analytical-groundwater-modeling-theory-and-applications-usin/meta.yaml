  md: 'Differentiation of $q_x$ and substitution of the result in Eq. (1.28) gives


    $$\frac{\partial q_z}{\partial z} = -\frac{N}{H}$$


    which can be integrated to give


    $$q_z = -\frac{Nz}{H} + C$$


    The constant of integration is obtained from the condition that at the impermeable
    base of the aquifer ($z = z_b$), the vertical component of flow is zero so that
    $C = Nz_b/H$ and


    $$q_z = -\frac{N(z - z_b)}{H}$$


    Note that the boundary condition at the top of the aquifer $q_z|_{z=z_b+H} = -N$
    is also satisfied, and that $q_z$ decreases with depth according to a simple linear
    function. Expressions (1.29) and (1.32) are used below to create a streamplot
    for approximate two-dimensional flow in the vertical plane (Figure 1.8).


    ```

    # solution

    xg, zg = np.meshgrid(np.linspace(0, L, 10), np.linspace(zb, zb + H, 5))

    qx = (N * (xg - L / 2) - T * (hL - h0) / L) / H

    qz = - N * (zg - zb) / H

    ```


    ```

    # basic streamplot

    plt.subplot(111, aspect=25)

    plt.streamplot(xg, zg, qx, qz, color=''C1'');

