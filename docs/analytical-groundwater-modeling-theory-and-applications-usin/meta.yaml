  md: 'Head-specified boundary conditions need to be transformed into discharge potentials
    using either Eq. (4.8) or (4.11), depending on the value of the head. Once a solution
    is obtained in terms of the discharge potential, the head may be computed by the
    inverse of Eq. (4.8) or (4.11)


    $$h = \sqrt{\frac{2\Phi}{k\alpha}} - \frac{z_t}{\alpha} \quad \Phi \le \Phi_{\text{toe}}$$


    $$h = \frac{\Phi - C_c}{kH} \quad \Phi \ge \Phi_{\text{toe}}$$


    Finally, the elevation $z_i$ of the interface may be computed from the head as


    $$z_i = -\alpha h \quad h_{\text{tip}} \le h \le h_{\text{toe}}$$


    As an example, consider uniform flow toward the coast at a rate $Q_x = U$ as shown
    in Figure 4.2 ($Q_x$ is constant because the recharge $N = 0$). The origin of
    the coordinate system is chosen at the coastline, and the aquifer extends toward
    negative infinity. The elevation of the top of the confined aquifer is $z_t$ with
    respect to the sea level. The head at the coastline is $-z_t/\alpha$, which is
    equivalent to an interface elevation of $z_i = z_t$. The corresponding discharge
    potential at the coastline is obtained by substituting $h = -z_t/\alpha$ in the
    equation for the discharge potential (Eq. 4.8), which gives $\Phi = 0$. Hence,
    the boundary conditions are


    $$\Phi|_{x=0} = 0$$


    $$Q_x = -\frac{d\Phi}{dx} = U$$


    The solution for the potential that fulfills the differential equation (4.14)
    with $N = 0$ and the boundary conditions is


    $$\Phi = -Ux$$


    The location of the toe is found at the position where $\Phi = \Phi_{\text{toe}}$,
    which gives


    $$x_{\text{toe}} = -\frac{\Phi_{\text{toe}}}{U} = -\frac{kH^2}{2\alpha U}$$


    Note that for a given value of $U$, the location of the toe is a function only
    of the aquifer parameters $k$ and $H$, and the factor $\alpha$, which is a function
    of the densities of freshwater and saltwater. The toe location is not a function
    of the sea level. And hence, the location of the toe remains where it is when
    the sea level rises, provided that the discharge toward the coast remains $U$.
    The heads in the aquifer increase with the sea level rise, of course.


    In the example that follows, the location of the interface and the stream function
    are computed and plotted (Figure 4.3).


    ```

    # parameters

    k = 10 # hydraulic conductivity, m/d

    zt = -10 # top of aquifer, m

    zb = -30 # bottom of aquifer, m

    rhof = 1000 # density of freshwater, kg/m^3

    rhos = 1025 # density of saltwater, kg/m^3

    U = 0.4 # flow toward the coast, m^2/d

    H = zt - zb # aquifer thickness, m

    ```'
