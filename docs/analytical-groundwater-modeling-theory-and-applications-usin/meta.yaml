    # 4.3 Combined confined/semi-confined interface flow


    Sections 4.1 and 4.2 dealt with interface flow to coastlines that were approximated
    as vertical. Here, the bottom of the sea is approximated as horizontal and separated
    from the aquifer by a leaky layer with resistance c (Figure 4.9). This means that
    flow in the part of the aquifer below the sea is semi-confined; the thickness
    of the leaky layer is neglected. As in Section 4.1, flow toward the coast is uniform
    at a rate Q_x = U, the origin of the coordinate system is chosen at the coast
    line, and the aquifer extends toward negative infinity. The top and bottom of
    the aquifer are z_t and z_b, respectively. Below the land, the aquifer is confined.
    The length of the outflow zone below the sea is unknown upfront. The sea bottom
    extends toward positive infinity (or at least beyond the point where the groundwater
    flow terminates).


    ![](img/ca724f426a6249bf916ffe68c7fbe382_80_1.png)


    Figure 4.9 Interface flow toward a sea that is separated from the aquifer by a
    leaky layer.


    The flow problem now consists of three parts: confined flow upstream of the interface
    toe, confined interface flow between the toe and the coast line, and semi-confined
    interface flow below the sea. The flow below the land can be solved with the discharge
    potential for confined interface flow derived in Section 4.1. The discharge potential
    cannot be used for the semi-confined flow section below the sea.


    An expression for the flow in the semi-confined part is derived below. It is assumed
    that the toe of the interface is below the land (a condition is derived later).
    Just as for confined interface flow, the discharge vector below the sea can be
    written as (see Eq. 4.7)


    $$Q_x = -k(ah + z_t)\frac{dh}{dx}$$


    In the sea, the freshwater head h* at elevation z_t is


    $$h^* = -z_t/\alpha$$


    so that Q_x may be written as


    $$Q_x = -k\alpha(h - h^*)\frac{dh}{dx}$$'
