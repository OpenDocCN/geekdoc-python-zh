  md: 'The total flow $Q_{\text{tot}}$ in the aquifer toward the well as a function
    of the radial distance $r$ may be computed as $-Q_r$ multiplied by the circumference
    of a circle with radius $r$


    $$Q_{\text{tot}} = -2\pi r Q_r \tag{6.59}$$


    Substitution of Eq. (6.57) for $Q_r$ using Eq. (6.58) shows that boundary condition
    (Eq. 6.54) is indeed fulfilled


    $$Q_{\text{tot}} = -2\pi r \frac{-Q}{2\pi \lambda} \frac{\lambda}{r} = Q \quad
    r/\lambda \ll 0 \tag{6.60}$$


    The head near the well may be approximated as


    $$h = h^* + \frac{Q}{2\pi T} \ln\left(\frac{r}{1.123\lambda}\right) \quad (r/\lambda
    \ll 1) \tag{6.61}$$


    where it is used that (Abramowitz and Stegun, 1965)


    $$\mathrm{K}_0(r/\lambda) \approx -\ln\left(\frac{r e^\gamma}{2\lambda}\right)
    \approx -\ln\left(\frac{r}{1.123\lambda}\right) \quad (r/\lambda \ll 1) \tag{6.62}$$


    where $\gamma = 0.5772...$ is Euler''s constant. Note that Eq. (6.61) is the Thiem
    solution (6.25) where the head is equal to $h^*$ at a distance of $R = 1.123\lambda$;
    the approximate formula gives accurate results near the well. The Bessel functions
    $\mathrm{K}_0$ and $\mathrm{K}_1$ are available as k0 and k1 in the scipy.special
    package.


    The solution for a well (Eq. 6.56) and the approximate formula (6.61) near the
    well are plotted in the left graph of Figure 6.13. In the right graph, $Q_{\text{tot}}$
    is plotted as a function of $r/\lambda$. Note that $Q_{\text{tot}}/Q$ is indeed
    equal to 1 at the well and reduces to $Q_{\text{tot}}/Q = 0.05$ at $r = 4\lambda$.
    For practical purposes, the effect of the well may be neglected beyond a distance
    of $4\lambda$.


