    In this solution, the flow is approximated as one-dimensional, and both $h$ and
    $Q_x$ are functions of $x$ only. In a vertical cross section, however, the flow
    must be two-dimensional. After all, water infiltrates the aquifer at the top and
    discharges into the rivers to the left and right (see Figure 1.5). This leads
    to an apparent contradiction: How can water flow vertically in a one-dimensional
    solution?


    To resolve this contradiction, consider Darcy''s law for the vertical component
    of the specific discharge


    $$q_z = -k_z \frac{\partial h}{\partial z} \qquad (1.26)$$


    where $k_z$ is the hydraulic conductivity in the vertical direction. As the Dupuit-Forchheimer
    approximation is adopted, the head $h$ is a function of $x$ only, so $\partial
    h/\partial z = 0$. This means that $q_z$ is also equal to zero, except for the
    case that the vertical hydraulic conductivity $k_z$ is infinitely large; the product
    of a term that goes to zero and a term that goes to infinity can result in a finite
    number (under certain mathematical conditions). Although this may seem strange
    at first (the vertical hydraulic conductivity is, of course, a finite number),
    this result can be interpreted to mean that the resistance to vertical flow is
    neglected (e.g., Strack, 1984). In other words, the energy it takes to flow vertically
    within an aquifer can be neglected with respect to the energy it takes to flow
    horizontally. This is often a good approximation, as groundwater commonly travels
    large distances horizontally (order of kilometers), but only small distances vertically
    (order of meters).


    The vertical component of the flow cannot be computed from Darcy''s law (as $k_z
    = \infty$ causes all kinds of troubles), but can be obtained from continuity of
    flow. A differential equation for continuity of flow in the vertical $x, z$ plane
    may be derived by considering a vertical aquifer section that is $\Delta x$ long
    and $\Delta z$ high. The fluxes on the four sides are shown in Figure 1.7. Application
    of the volume balance for steady flow (In - Out = 0) gives


    $$[q_x(x + \Delta x, z) - q_x(x, z)]\Delta z \Delta t + [q_z(x, z + \Delta z)
    - q_z(x, z)]\Delta x \Delta t = 0 \qquad (1.27)$$


    Division by $\Delta x \Delta z \Delta t$ and taking the limit for $\Delta x$ and
    $\Delta z$ going to zero gives


    $$\frac{\partial q_x}{\partial x} + \frac{\partial q_z}{\partial z} = 0 \qquad
    (1.28)$$


    In mathematical terms, the divergence of the specific discharge vector equals
    zero for steady flow in the vertical plane.


    The horizontal component $q_x$ is obtained from the discharge vector (Eq. 1.25)
    as


    $$q_x = \frac{Q_x}{H} = -k \frac{dh}{dx} = \frac{N}{H} \left( x - \frac{L}{2}
    - \frac{T}{N} \frac{h_L - h_0}{L} \right) \qquad (1.29)$$'
