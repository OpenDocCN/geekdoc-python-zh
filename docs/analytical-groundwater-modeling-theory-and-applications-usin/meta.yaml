    The third approach to verify the solution is to check the water balance. The total
    inflow into the aquifer over a period $\Delta t$ can be computed and compared
    to the increase in the storage of water in the aquifer. The total inflow can be
    computed through integration of $Q_x$ at $x = 0$. $Q_x$ at $x = 0$ may be obtained
