    \n因此Q_x可以写为\n\n$$Q_x = -k\\alpha(h - h^*)\\frac{dh}{dx}$$\n\n海底下方的水流受半受限流的微分方程控制\n\
    \n$$\\frac{\\mathrm{d}Q_x}{\\mathrm{d}x} = \\frac{h - h^*}{c}$$\n\n将公式(4.37)中的$Q_x$代入公式(4.38)并重新整理各项，得到\n\
    \n$$\\frac{\\mathrm{d}^2(h - h^*)^2}{\\mathrm{d}x^2} = \\frac{2(h - h^*)}{k\\\
