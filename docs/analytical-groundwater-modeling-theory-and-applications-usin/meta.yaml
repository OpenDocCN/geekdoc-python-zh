  md: 'where $A_w$ is the cross-sectional area of the well screen at the level of
    the water table in the well ($A_w = \pi r_w^2$ for wells with a constant well
    radius). The inflow $Q_{\text{in}}$ consists of the inflow integrated along the
    well screen


    $$Q_{\text{in}} = -2\pi r_w Q_r|_{r=r_w}$$


    while the outflow is equal to the discharge of the well


    $$Q_{\text{out}} = Q \quad t \ge 0$$


    Substitution of Eq. (9.39) for $h_w$, Eq. (9.41) for $Q_{\text{in}}$, and Eq.
    (9.42) for $Q_{\text{out}}$ in the water balance inside the well gives


    $$A_w \left[ \frac{\partial h}{\partial t}\bigg|_{r=r_w} + \frac{c_w}{H} \frac{\partial
    Q_r}{\partial t}\bigg|_{r=r_w} \right] = -2\pi r_w Q_r|_{r=r_w} - Q \quad t \ge
    0$$


    The governing differential equation for flow in the aquifer is the diffusion equation
    (9.5). The Laplace transform of the diffusion equation is the modified Helmholtz
    equation


    $$\frac{d^2 \bar{h}}{dr^2} + \frac{1}{r} \frac{d\bar{h}}{dr} = \frac{Sp}{T} \bar{h}
    = w\bar{h}$$


    where


    $$w = Sp/T$$


    The Laplace transform of the water balance inside the well (Eq. 9.43) is


    $$A_w p \bar{h}|_{r=r_w} + \left( \frac{A_w c_w p}{H} + 2\pi r_w \right) \bar{Q}_r|_{r=r_w}
    = -\frac{Q}{p}$$


    The general solution to the Laplace-transformed diffusion equation in radial coordinates
    (Eq. 9.44), for the case that $\bar{h}$ equals zero far away, is


    $$\bar{h} = B K_0(r\sqrt{w})$$


    where $B$ is a parameter to be determined from the boundary conditions. The corresponding
    discharge vector in the Laplace domain is


    $$\bar{Q}_r = -T \frac{d\bar{h}}{dr} = -BT\sqrt{w}K_1(r\sqrt{w})$$


    Substitution of the equations for $\bar{h}$ and $\bar{Q}_r$ in the Laplace-transformed
    water balance (Eq. 9.46) gives


    $$B = -\frac{Q}{p} \frac{1}{A_w p K_0(r_w\sqrt{w}) + \left( \frac{A_w c_w p}{H}
    + 2\pi r_w \right) T\sqrt{w}K_1(r_w\sqrt{w})}$$


    Back-transformation of the Laplace-transformed solution to the time domain is
    again carried out using the Stehfest algorithm (see Section 5.4). Note that for
    the case that wellbore storage is neglected, the cross-sectional area $A_w$ is
    set to zero in the water balance equation (9.40), which means that ($\pi r_w^2
    = 0$) and $B$ reduces to


    $$B = -\frac{Q}{p} \frac{1}{2\pi r_w T\sqrt{w}K_1(r_w\sqrt{w})}$$'
