    ## 0.8 Dupuit and Forchheimer


    All groundwater flow is three-dimensional, but for modeling purposes, flow may
    be approximated as one-dimensional or two-dimensional. At the regional scale,
    most aquifers are relatively thin in comparison with their areal extent and are
    therefore referred to as shallow aquifers. Flow is predominantly horizontal in
    such aquifers and may be approximated as two-dimensional in the horizontal plane.
    The amount of horizontal flow is described by the discharge vector $\vec{Q} =
    (Q_x, Q_y)$. The discharge vector is the total flow in the aquifer integrated
    over the saturated thickness $H$ of the aquifer. In other words, it is the discharge
    per unit width of aquifer. The components of the discharge vector may be computed
    as


    $$Q_x = Hq_x = -kH \frac{\partial h}{\partial x} \qquad Q_y = Hq_y = -kH \frac{\partial
    h}{\partial y} \qquad (0.12)$$


    where the hydraulic conductivity is horizontally isotropic ($k_x = k_y = k$).
    The dimensions of the discharge vector are $L^2/T$. This approximation was first
    proposed by Dupuit (1863) and Forchheimer (1886), so it is referred to as Dupuit
    flow or Dupuit–Forchheimer flow.


    The Dupuit–Forchheimer approximation essentially means that the pressure distribution
    is hydrostatic in an aquifer. This is very convenient, because that means that
    the head $h$ does not depend on the vertical coordinate in an aquifer. The Dupuit–Forchheimer
    approximation does not mean, however, that flow is horizontal. Water can still
    flow vertically, but the resistance to vertical flow is neglected within an aquifer;
    a detailed analysis is given in Chapter 1. The accuracy of the Dupuit–Forchheimer
    approximation is further explored in Chapter 10.


    ## 0.9 Groundwater models


    Groundwater models are needed to gain an understanding of how groundwater flows
    and to try to make predictions, because most phenomena or proposed interventions
    cannot be tested at full scale in the field. Groundwater models are mathematical
    solutions to the differential equation that describes flow in an aquifer system.
    The differential equation is obtained through the combination of a mass balance
    equation and Darcy’s law, yielding a differential equation in terms of the hydraulic
    head. A mathematical model of a groundwater problem consists of a differential
    equation and a set of mathematical boundary conditions, which are derived from
    boundaries and conditions of the physical groundwater system. In this book, the
    mathematical problem is solved analytically.


    In each of the upcoming chapters, analytical solutions are presented for a wide
    range of flow problems. Chapters 1–5 deal with flow systems that may be approximated
    as one-dimensional in the horizontal direction. This is followed by solutions
    to two-dimensional flow systems in the horizontal plane in Chapters 6–9, including
    flow systems that are radially symmetric (e.g., flow near a pumping well). Finally,
    Chapter 10 deals with two-dimensional flow in the vertical plane, including a
    comparison with one-dimensional Dupuit–Forchheimer solutions.


    # Chapter 1


    ## Steady one-dimensional flow with constant transmissivity


    The study of one-dimensional groundwater flow problems gives basic insights that
    are quickly lost in the analysis of two-dimensional or three-dimensional flow
    fields. Groundwater flow fields can be approximated as one-dimensional if the
    flow in one direction dominates the flow in the other directions, e.g., near coast
    lines, lake shores, rivers, or drainage ditches. Especially at the regional scale,
    the flow tends to be essentially horizontal because the length of the flow paths
    in the horizontal direction (on the order of kilometers) is much larger than the
    water movement in the vertical direction (on the order of tens of meters or less).


    The steady mass balance states that


    Mass in – Mass out = 0 (1.1)


    The mass balance of a fluid reduces to a volume balance when the density of the
    fluid is approximated as constant. The steady volume balance is


    Volume in – Volume out = 0 (1.2)


    The volume balance for steady one-dimensional groundwater flow in an aquifer is
    derived by considering a small section of the aquifer that is Δx long and Δy =
    1 wide in the direction normal to the plane of flow. The inflow consists of horizontal
    flow from the left, Qx(x), and recharge at the top, N [L/T]. The outflow consists
    of horizontal flow at the right, Qx(x + Δx) (see Figure 1.1). The discharge vector
    Qx is the discharge per unit width of the aquifer, so the dimensions are L²/T,
    while the recharge is the discharge per unit area with dimensions L/T.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_25_0.png)


    The volume balance is written for the time period Δt. Substitution of the appropriate
    volumes in the volume balance equation (1.2) gives


    Qx(x)Δt + NΔxΔt – Qx(x + Δx)Δt = 0 (1.3)


    Division by Δx and Δt and rearrangement of terms gives


    Qx(x + Δx) – Qx(x) / Δx = N (1.4)


    In the limit for $\Delta x \to 0$, this gives the differential form of the continuity
    equation for steady one-dimensional horizontal flow


    $$\frac{dQ_x}{dx} = N \tag{1.5}$$


    The term $dQ_x/dx$ is also known in mathematics as the one-dimensional divergence
    of the discharge vector. The divergence is the mathematical equivalent of outflow
    minus inflow of a flow field.


    The transmissivity of an aquifer is approximated as constant in all but the last
    solution in this chapter. An aquifer with a constant transmissivity may be a confined
    aquifer with horizontal top and bottom and constant hydraulic conductivity $k$.
    Or it can be an unconfined aquifer where the saturated thickness is approximated
    as constant. Either way, the Dupuit–Forchheimer approximation is adopted so that
    the head is approximated as constant in the vertical direction. The horizontal
    flow is distributed equally over the aquifer thickness $H$ so that the discharge
    vector $Q_x$, the integrated specific discharge over the thickness of the aquifer,
    may be written as


    $$Q_x = Hq_x = -T\frac{dh}{dx} \tag{1.6}$$


    where $T = kH$ is the transmissivity of the aquifer and $q_x$ is given by Darcy''s
    law (Eq. 0.9). The continuity equation for this problem is (1.5). Substitution
    of Eq. (1.6) for $Q_x$ in Eq. (1.5) gives


    $$\frac{d}{dx}\left(T\frac{dh}{dx}\right) = -N \tag{1.7}$$


    Because the transmissivity $T$ is assumed constant, the differential equation
    simplifies to


    $$\frac{d^2h}{dx^2} = -\frac{N}{T} \tag{1.8}$$


    This is a second-order linear ordinary differential equation known as the Poisson
    equation. The general solution is obtained by integrating Eq. (1.8) twice, which
    gives, for the case that $N$ is constant,


    $$h = -\frac{N}{2T}x^2 + Ax + B \tag{1.9}$$


    where $A$ and $B$ are integration constants that need to be determined from boundary
    conditions.


    ### 1.1 Flow between two rivers


    The first problem that is solved is for confined flow between two long and parallel
    rivers that fully penetrate the aquifer (Figure 1.2). The rivers are a distance
    $L$ apart, and there is no areal recharge ($N = 0$). The rivers are in direct
    contact with the aquifer so that the head in the aquifer at the river is equal
    to the head in the river. The head at $x = 0$ is $h_0$, and the head at $x = L$
    is $h_L$.


    $$h|_{x=0} = h_0 \tag{1.10}$$

    $$h|_{x=L} = h_L \tag{1.11}$$


    ![](img/ca724f426a6249bf916ffe68c7fbe382_27_0.png)


    Application of the boundary conditions to the general solution (1.9) gives


    $$A = \frac{h_L - h_0}{L}$$ (1.12)

    $$B = h_0$$ (1.13)


    so that the solution for the head becomes a straight line


    $$h = \frac{(h_L - h_0)x}{L} + h_0$$ (1.14)


    The discharge vector $Q_x$ is obtained by differentiating Eq. (1.14) with respect
    to $x$ and inserting the result into Eq. (1.6)


    $$Q_x = -T \frac{dh}{dx} = -T \frac{h_L - h_0}{L}$$ (1.15)


    Note that $Q_x$ is constant throughout the flow field.


    The solution is computed below and plotted in Figure 1.3. Note that the porosity
    $n$ and elevation $z_b$ of the bottom of the aquifer are defined but not used
    here. They will be used when visualizing the flow field and computing the travel
    time in the following.


    ```

    # parameters

    L = 1000 # aquifer length, m

    H = 10 # aquifer thickness, m

    zb = -6 # aquifer bottom, m

    k = 10 # hydraulic conductivity, m/d

    n = 0.3 # porosity, -

    T = k * H # transmissivity, m^2/d

    h0 = 6 # specified head at the left boundary, m

    hL = 4 # specified head at the right boundary, m

    ```


    ```

    # solution

    x = np.linspace(0, L, 100)

    h = (hL - h0) * x / L + h0

    Qx = - T * (hL - h0) / L * np.ones_like(x)

    ```


    ```

    # basic plot

    plt.subplot(121)

    plt.plot(x, h)

    plt.subplot(122)

    plt.plot(x, Qx);

    ```


    The flow field in a vertical cross section may be visualized using the streamplot
    function of matplotlib, which takes as input a two-dimensional grid of points,
