    \ T 2} \\frac{(e^{-d/\\lambda} - 1)}{d}$$\n\n## 2.5 双含水层系统中两条河流之间的面状补给\n\n单含水层中两条河流之间具有面状补给\
    \ $N$ 的水流解（第 1.2 节）被扩展到两个含水层，其中河流切穿上层含水层，但不切穿下层含水层（见图 2.14）。双含水层解用于研究弱透水层及其下方的含水层何时对上层含水层中的水头有显著影响，或者上层含水层底部何时可以近似为不透水。原点选在两条河流的中间，两条河流之间的距离为\
