    # 6.2 Wells near rivers and impermeable boundaries


    In the previous section, the superposition principle was applied to obtain the
    solution for a well pumping at the center of a circular island with recharge.
    Here, solutions are presented for pumping wells near a surface water boundary
    (e.g., river, stream, canal, or lake) and an impermeable boundary. All boundaries
    are approximated as long and straight; areal recharge is not simulated. Solutions
    for the discharge potential, the discharge vector, and the stream function are
    obtained through superposition and the method of images.


    The general solution for the discharge potential of well number $n$ with discharge
    $Q_n$ is obtained from the Thiem equation (6.25) by removing the constant part
    $\Phi_R - \frac{Q}{2\pi} \ln(R)$ (an appropriate constant is added later depending
    on the boundary condition)


    $$\Phi = \frac{Q_n}{2\pi} \ln(r_n) = \frac{Q_n}{4\pi} \ln(r_n^2)$$'
