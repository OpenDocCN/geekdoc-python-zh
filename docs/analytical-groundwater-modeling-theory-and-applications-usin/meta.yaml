    The next example considers one-dimensional steady flow to a long and straight
    river with width $2L$. A vertical cross section normal to the river is shown in
    Figure 2.8. The origin of the coordinate system is chosen in the middle of the
    river. The flow is confined to the left and right of the river and semi-confined
    below the river. The resistance of the leaky river bed is $c$, and the water level
    in the river is $h^*$. The transmissivity of the aquifer is $T$. The flow is uniform
    and equal to $Q_x = U_L$ in the aquifer to the left of the river, and the flow
    is uniform and equal to $Q_x = U_R$ in the aquifer to the right of the river.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_48_2.png)'
