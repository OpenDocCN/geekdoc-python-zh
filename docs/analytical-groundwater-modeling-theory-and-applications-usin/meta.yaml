    # 8.2 Line-sinks for modeling rivers and streams


    Pumping wells are sometimes referred to as point-sinks because they take water
    out at a point (fully penetrating wells take water out over the entire aquifer
    thickness, which is a point in the two-dimensional horizontal plane). Line-sinks
    take out water along a line segment and may be used to simulate groundwater flow
    to or from sections of narrow rivers, streams, or canals. The analytic element
    code developed in the previous section is extended to include line-sinks. All
    analytic element classes Model, Element, HeadEquation, Constant, UniformFlow,
    Well, and HeadWell, defined in the previous section, are required to run the examples
    in this section.


    The complex potential for a line-sink with uniform inflow may be obtained by integrating
    the complex potential for a point-sink (a well) along a line, which gives (e.g.,
    Strack, 2017)


    $$\Omega = \frac{\sigma L}{4\pi}[(Z + 1) \ln(Z + 1) - (Z - 1) \ln(Z - 1)]$$ (8.8)


    where $\sigma$ is the inflow into the line-sink (the discharge per unit length
    of line-sink, positive for taking water out of the aquifer), $L$ is the length
    of the line-sink, and $Z$ is defined as


    $$Z = \frac{2\zeta - (\zeta_0 + \zeta_1)}{\zeta_1 - \zeta_0}$$ (8.9)


    where $\zeta$ is the complex coordinate, and $\zeta_0$ and $\zeta_1$ are the complex
    coordinates of the end points of the line-sink. Note that $Z = -1$ at $\zeta =
    \zeta_0$ and $Z = +1$ at $\zeta = \zeta_1$. The total discharge $Q$ of the line-sink
    is $Q = \sigma L$.


    Line-sinks are added to the analytic element code for wells and uniform flow developed
    in Section 8.1. Input arguments are the model to which the element is added, the
    coordinates of the endpoints, and the inflow $\sigma$. The LineSink class has
    one function: the omegainf function, which implements Eq. (8.8) for $\sigma =
    1$. The complex potential for a line-sink is singular at the end points, where
    the variable $Z$ equals either $-1$ or $+1$, but the discharge potential is finite


    $$\lim_{Z \to -1} (Z + 1) \ln(Z + 1) = \lim_{Z \to 1} (Z - 1) \ln(Z - 1) = 0$$
    (8.10)


    The value of $(Z - 1)$ or $(Z + 1)$ is set to $10^{-12}$ when their absolute value
    is smaller than $10^{-12}$ using the np.where function in the code below.'
