  md: '# 2.4 Flow to a river in a two-aquifer system


    Many aquifers are bounded at the bottom by a leaky layer with another aquifer
    below. Solutions for one-dimensional steady flow in such a two-aquifer system
    can be written as the sum of the solution for confined flow (Chapter 1) and the
    solution for semi-confined flow, as will be shown in the following.


    In what follows, the transmissivity of the top aquifer (aquifer 0) is $T_0$ and
    the transmissivity of the bottom aquifer (aquifer 1) is $T_1$. The resistance
    of the leaky layer between the two aquifers is $c$. The recharge from rainfall
    to the top aquifer is equal to $N$. The vertical flow $q_z$ through the leaky
    layer from aquifer 1 (the bottom aquifer) to aquifer 0 (the top aquifer) is


    $$q_z = \frac{h_1 - h_0}{c} \qquad (2.33)$$


    The head in the two-aquifer system is governed by a system of two differential
    equations


    $$\frac{d^2 h_0}{dx^2} = \frac{h_0 - h_1}{c T_0} - \frac{N}{T_0}$$

    $$\frac{d^2 h_1}{dx^2} = \frac{h_1 - h_0}{c T_1} \qquad (2.34)$$


    where $h_0$ and $h_1$ are the heads in the top and bottom aquifers, respectively.


    The solution to the system of two differential equations (2.34) is obtained as
    follows. Addition of the first differential equation multiplied by $T_0$ and the
    second differential equation multiplied by $T_1$ gives


    $$\frac{d^2 (T_0 h_0 + T_1 h_1)}{dx^2} = -N \qquad (2.35)$$


    This is Poisson''s differential equation (1.8), which has the general solution


    $$T_0 h_0 + T_1 h_1 = -Nx^2 + A''x + B'' \qquad (2.36)$$


    where $A''$ and $B''$ are arbitrary constants. Subtraction of the second differential
    equation from the first differential equation gives, after a bit of algebra,


    $$\frac{d^2 (h_0 - h_1)}{dx^2} = \frac{h_0 - h_1}{\lambda^2} - \frac{N}{T_0} \qquad
    (2.37)$$


    where


    $$\lambda = \sqrt{\frac{c T_0 T_1}{T_0 + T_1}} \qquad (2.38)$$


    This the modified Helmholtz equation (2.5) with an additional constant $(-N/T_0)$
    on the right-hand side. The general solution is


    $$h_0 - h_1 = C'' e^{-x/\lambda} + D'' e^{x/\lambda} + \frac{N \lambda^2}{T_0}
    \qquad (2.39)$$


    where $C''$ and $D''$ are arbitrary constants. Expressions for $h_0$ and $h_1$
    are obtained by combining Eqs. (2.36) and (2.39), which gives


    $$h_0 = -\frac{N}{2T} x^2 + Ax + B + C T_1 e^{-x/\lambda} + D T_1 e^{x/\lambda}
    + \frac{T_1 N \lambda^2}{T_0 T}$$

    $$h_1 = -\frac{N}{2T} x^2 + Ax + B - C T_0 e^{-x/\lambda} - D T_0 e^{x/\lambda}
    - \frac{N \lambda^2}{T} \qquad (2.40)$$


    where $A$, $B$, $C$, and $D$ are parameters that must be determined from boundary
    conditions.'
