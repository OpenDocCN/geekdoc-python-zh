    The response to a series of recharge events of equal length $\Delta t$ is computed
    using superposition. For example, if the recharge in the first three periods is
    $N_0$, $N_1$, and $N_2$, then the head at $t = 0$, $\Delta t$, $2\Delta t$, and
    $3\Delta t$ can be computed as


    $h|_{x,0} = 0$

    $h|_{x,\Delta t} = N_0 b|_{x,\Delta t}$

    $h|_{x,2\Delta t} = N_0 b|_{x,2\Delta t} + N_1 b|_{x,\Delta t}$

    $h|_{x,3\Delta t} = N_0 b|_{x,3\Delta t} + N_1 b|_{x,2\Delta t} + N_2 b|_{x,\Delta
    t}$


    A general equation for the head $h_n$ at the beginning of period $n$ is


    $h_n = \sum_{j=0}^{n-1} N_j b_{n-1-j}$


    where $h_n = h|_{x,n\Delta t}$ and $b_{n-1-j} = b|_{x,(n-1-j)\Delta t}$. Implementation
    of the summation in Python requires extra attention because in mathematical notation,
    the upper limit in a summation is included, while in Python, the upper limit is
    excluded.'
- md: "As an example, consider the following four years of recharge values (in mm/d)\
    \ for monthly periods (the recharge is constant during each month). These recharge\
    \ values are from an area with a temperate climate with a shallow water table.\
    \ The recharge is highest in the fall and winter and can become negative in the\
    \ spring and summer months when vegetation draws water from the water table.\n\
    \n```python\n# four years of monthly recharge data\ndelt = 365 / 12 # approximate\
    \ length of 1 month, d\nrecharge = 0.001 * np.array( # convert recharge from mm/d\
    \ to m/d\n[ 1.2, 1.5, 0.8, -1.2, 0.2, -2.9, -0.6, 2.8, 1.2, 0.9, 3.8,\n1.8, 1.9,\
    \ 1.8, -0.6, -1.3, -2.5, 0.6, 0.9, 1.8, -0.3, 0.8,\n-0.2, 3.8, 2.8, 0.3, -0.5,\
    \ 0.3, -1.1, 1.5, 1. , -1.5, 0.1,\n1.5, 1. , 4. , 1.3, 1.3, 0.3, -1.1, 0.6, -0.8,\
    \ -1.2, -1.6,\n1.3, 1.4, 2.4, 2.6])\nntime = len(recharge) # number of months\n\
    ```\n\nA function is written for the discrete block response b(x, n, Δt), which\
    \ is the head response for a unit of recharge during a block of length Δt. The\
    \ discrete block response returns the head at ntime equal intervals Δt.\n\n```python\n\
    # discrete block response\ndef bresponse(x, ntime, delt, T=T, S=S, L=L, nterms=10):\n\
    \    t = np.linspace(delt, ntime * delt, ntime)\n    return head(x, t, T, S, L,\
    \ 1, nterms) - \\\n           head(x, t - delt, T, S, L, 1, nterms)\n```\n\nThe\
    \ head is computed and plotted at two points in the aquifer through the application\
    \ of Eq. (5.48) in Figure 5.12. Note that the unit block response is computed\
    \ only once at each location. The yearly head variation halfway between the two\
    \ rivers (x = 0) is almost 2 m, while the head variation closer to the river is\
    \ much smaller. The highest heads occur around January, and the lowest heads around\
    \ July. The computed head in the first months (shown by a dashed line) is not\
    \ very realistic as it is based on recharge since the beginning of the first year\
    \ only, while the head also depends on the recharge in the previous year. After\
    \ t95 = 152 days (the memory of this system), the effect of the previous year\
    \ is negligible.\n\n```python\n# solution\nh0 = np.zeros(ntime + 1) # head at\
    \ x=0\nh400 = np.zeros(ntime + 1) # head at x=400\nb0 = bresponse(0, ntime, delt,\
    \ T, S, L)\nb400 = bresponse(400, ntime, delt, T, S, L)\nfor n in range(1, len(recharge)\
    \ + 1):\n    h0[n] = np.sum(recharge[0:n] * b0[n - 1::-1])\n    h400[n] = np.sum(recharge[0:n]\
    \ * b400[n - 1::-1])\n```\n\n```python\n# basic plot recharge data and head response\n\
    plt.subplot(211)\ntime = np.linspace(0, ntime * delt, ntime + 1)\nplt.step(time[:-1],\
    \ 1000 * recharge, where='post'); # plt.stairs in mpl>=3.4\nplt.grid()\nplt.subplot(212)\n\
    plt.plot(time, h0, label='$x=0$ m')\nplt.plot(time, h400, label='$x=400$ m')\n\
    plt.legend();\n```\n\nFigure 5.12 Four years of monthly varying recharge (top)\
    \ and the resulting transient head variation for recharge between two rivers;\
    \ the head is dashed for part of series before $t = t_{95}$.\n\nThe head shown\
    \ in Figure 5.12 is computed with Eq. (5.48), which is based on the exact solution\
    \ (5.40). As a final example, it is investigated whether the head variation at\
    \ $x = 0$ shown in Figure 5.12 can be simulated accurately with the simplified\
    \ step response function\n\n$s(t) = A (1 - e^{-t/a})$ (5.49)\n\nThe functional\
    \ form of the simplified step response is the same as Eq. (5.44), but the parameters\
    \ $A$ and $a$ are now simply fitting parameters. In other words, the head at $x\
    \ = 0$ shown in Figure 5.12 is treated as the observed head in an observation\
    \ well and the parameters $A$ and $a$ are obtained by performing a least squares\
    \ fit. First, a function is written for the discrete block response corresponding\
    \ to the simplified step response (5.49).\n\n```python\ndef simplebresponse(A,\
    \ a, delt, nstep):\n    t = np.linspace(0, nstep * delt, nstep + 1)\n    hstep\
    \ = A * (1 - np.exp(-t / a))\n    return hstep[1:] - hstep[:-1]\n```\n\nThe difference\
    \ $\\varepsilon$ between the observed head $h_o$ and the modeled head $h_m$, also\
    \ called the residual or error, is computed as\n\n$$\\varepsilon = h_o - h_m \\\
    qquad (5.50)$$\n\nThe optimal parameters $A$ and $a$ are found by minimizing the\
    \ sum of squared errors, which is referred to as the objective function\n\n$$F_{\\\
    text{obj}} = \\sum \\varepsilon^2 \\qquad (5.51)$$\n\nThe first argument of the\
    \ Python function for the objective function must be an array with the parameters.\
    \ The final keyword argument is `return_heads`. When this keyword argument is\
    \ set to `True`, the method returns the modeled heads rather than the sum of the\
    \ squared errors, which is useful to compute the modeled heads after the parameters\
    \ are estimated.\n\n```python\ndef fobj(p, delt=delt, recharge=recharge, hobs=h0,\
    \ return_heads=False):\n    A, a = p\n    ntime = len(recharge)\n    b = simpleresponse(A,\
    \ a, delt, ntime + 1)\n    hm = np.zeros(ntime + 1)\n    for n in range(1, ntime\
    \ + 1):\n        hm[n] = np.sum(recharge[0:n] * b[n - 1::-1])\n    if return_heads:\n\
    \        return hm\n    rv = np.sum((hobs - hm) ** 2)\n    return rv\n```\n\n\
    The parameters that minimize the objective function may be found with a number\
    \ of methods. Here, the `fmin` function of the `scipy.optimize` package is used,\
    \ which applies the simplex algorithm (see the `fmin` documentation).\n\n```python\n\
    from scipy.optimize import fmin\nA, a = fmin(fobj, [300, 50], disp=0)\nprint(f'Estimated\
    \ parameters A: {A:.2f} d, a: {a:.2f} d')\nhm = fobj([A, a], return_heads=True)\
    \ # compute modeled heads\n```\n\nEstimated parameters A: 629.89 d, a: 53.03 d\n\
    \nThe modeled heads $h_m$ fit the observed heads $h_o$ very well (Figure 5.13).\n\
    \n```python\n# basic plot modeled heads\nplt.plot(h0, 'C1.', label='observed')\n\
    plt.plot(hm, 'C0', label='modeled')\nplt.legend();\n```\n\nThe procedure discussed\
    \ above, where a model of heads in an observation well is created with an approximate\
    \ response function, is known as time series analysis. Time series analysis is\
    \ a powerful and increasingly popular method to analyze heads measured in observation\
