    # Python primer


    The aim of this primer is to provide an introduction to Python’s computational
    capabilities. This primer is not intended to be a general introduction to computer
    programming, but a basic introduction to understand the code examples in this
    book, geared toward novice Python users. Readers already skilled at programming
    in Python will probably choose to skip this appendix, although some parts may
    be useful as a refresher.


    Python is an open-source, object-oriented programming language used for both stand-alone
    programs and scripting applications. It was initially developed by Guido van Rossum,
    who named it after Monty Python’s Flying Circus. Over the past decades, Python
    has become extremely popular as a programming language in science and engineering.
    This is not only because it is one of the easiest programming languages to learn,
    but also because it has many extensions that make Python a programming language
    that can be used for an enormous range of applications. Other advantages are that
    it is open source and runs on all major operating systems.


    Python consists of the core language and comes with a comprehensive standard library.
    In addition, there are many third-party packages (or libraries) for tasks that
    are not included in the standard library. Both Python and third-party packages
    are being developed and updated regularly. The code in this book is written in
    Python 3.8, but it is expected that most, if not all, examples will work with
    newer versions.


    Python is an interpreted language, which means that it is not necessary to compile
    it into binary machine code before a program can be run. Instead, the commands
    are typed (or read from a script) in an interpreter, which may be embedded in
    a web browser, as is the case when using Jupyter Notebooks.


    Users that want to run the code examples in this book on their own computer must
    first install Python and all the required extensions and tools. In principle,
    one can download the core programming language and standard library from python.org
    and then download and install everything else that is required, but it is much
    better and easier to download one of the so-called Python distributions, which
    includes Python and a whole suite of extensions that are pre-packaged into a single
    installer. The Anaconda distribution is the recommended distribution to use because
    it is very comprehensive. All packages used in the code examples in this book
    (and many more) are included in the Anaconda distribution. Another advantage of
    Anaconda is that it is easy to update packages and that Anaconda usually installs
    without major hassles. To install Anaconda, go to the web site www.anaconda.com/products/individual
    and download the installer for your operating system. Once downloaded, double-click
    on the installer and choose next or I agree a couple of times until Anaconda is
    installed (unless you have a very strict system administrator).


    Jupyter Notebooks (or simply “notebooks”) provide a way to execute Python code
    in a web browser. A notebook consists of cells, which either have text or code.
    The code cells can easily be recognized as they are preceded by In [ ] : or In
    [n] : where n is a counter. To see what a code fragment does, position your cursor
    in one of the code cells of a notebook (either'
