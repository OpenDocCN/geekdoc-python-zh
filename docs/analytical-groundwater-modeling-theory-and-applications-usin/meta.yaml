  md: 'Solutions to the two-dimensional diffusion equation are difficult to derive
    mathematically, even for many cases of radially symmetric flow. Mathematical solution
    techniques to obtain exact solutions include similarity solutions, separation
    of variables, and a variety of transform techniques (Laplace, Hankel, and Fourier).
    In the following, several solutions for transient flow to wells are presented
    rather than derived. The solutions are discussed, programmed, and visualized as
    in the other chapters. The mathematical correctness of the presented solutions
    may be verified through differentiation of the solution and substitution into
    the differential equation (either analytically or numerically), and by verifying
    that the boundary conditions and initial conditions are met.


    All solutions presented in this chapter are for the head change caused by a transient
    well, which allows for the superposition of transient solutions in time, and for
    the superposition of steady solutions and transient solutions. Transient flow
    solutions are presented for wells in confined, unconfined, semi-confined, and
    two-aquifer systems, including the estimation of aquifer parameters from pumping
    tests. The last two sections concern the effect of wellbore storage and skin effect,
    and transient pumping in a two-aquifer system. These problems are solved in the
    Laplace domain, and the solution in the physical domain is obtained through a
    numerical back-transformation.


    # 9.1 Wells in confined and unconfined aquifers


    In this section, a solution is presented for transient flow to a well in an aquifer
    with constant transmissivity $T$ and storage coefficient $S$. The governing differential
    equation is (9.5). The well starts pumping with discharge $Q$ at time $t = t_0$.
    The boundary condition at the well is approximated as (similar to boundary condition
    (6.24))


    $$\lim_{r \to 0} -2\pi r Q_r = Q \quad t \ge t_0$$


    Initially, the head change in the aquifer caused by the transient well is, of
    course, equal to zero


    $$h|_{r,t=t_0} = 0$$


    The second boundary condition is that the head change caused by the well at infinity
    is zero at all time


    $$h|_{r=\infty,t} = 0$$


    The solution for the head is a function of the radial distance, $r$, from the
    well and time and is known as the Theis solution (Theis, 1935)


    $$h = -\frac{Q}{4\pi T} \mathrm{E}_1(u) \quad t \ge t_0$$


    where


    $$u = \frac{Sr^2}{4T(t - t_0)}$$


    and $\mathrm{E}_1$ is the exponential integral defined as


    $$\mathrm{E}_1(u) = \int_u^\infty \frac{\exp(-s)}{s} ds$$'
