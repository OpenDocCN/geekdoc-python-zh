  md: 'specified head and an additive constant which is also computed from a specified-head
    condition. The free parameters of the head-specified elements are computed by
    building a system of equations for all head-specified conditions and solving for
    all free parameters simultaneously. This procedure is illustrated by solving a
    problem with uniform flow, two wells, and a constant.


    Consider an aquifer with uniform flow $U$ in the positive $x$-direction with two
    wells and a real constant $C$ (Figure 8.2). The first well is located at $(x,
    y) = (0, 0)$ and has a specified discharge $Q$. The second well is located at
    $(x, y) = (a, b)$ and has a discharge $P$. The radius of both wells is $r_w$.
    The complex potential for this problem is obtained from superposition of the complex
    potential of uniform flow (Eq. 7.19), the complex potentials for two wells (Eq.
    7.21), and a real constant $C$


    $$\Omega = -U\zeta + \frac{Q}{2\pi} \ln(\zeta) + \frac{P}{2\pi} \ln(\zeta - (a
    + ib)) + C$$


    The discharge $Q$ of the first well is specified, but the discharge $P$ of the
    second well is unknown and must be computed such that the head equals $h_w$ at
    the second well. Furthermore, the head at $(x, y) = (a, 0)$ is known to be $h_0$.
    This gives two equations for the two unknown parameters $C$ and $P$.


    The parameters $P$ and $C$ are obtained from the system of two linear equations


    $$\Phi|_{\zeta=a} = \Phi_0$$

    $$\Phi|_{\zeta=a+r_w+ib} = \Phi_w$$


    where $\Phi_0$ and $\Phi_w$ are the potential equivalents of $h_0$ and $h_w$,
    respectively. Note that the head at the well is specified at $(x, y) = (a + r_w,
    b)$, which is referred to as the collocation point; specification at another point
    on the well screen may result in a slightly different solution, but the difference
    is commonly negligible. Substitution of the real part of the complex potential
    (Eq. 8.4) for $\Phi$ in Eq. (8.5) and rearrangement of terms gives the following
    system of two equations in two unknowns


    $$\frac{P}{2\pi} \ln(b) + C = \Phi_0 + Ua - \frac{Q}{2\pi} \ln(a)$$

    $$\frac{P}{2\pi} \ln(r_w) + C = \Phi_w + U(a + r_w) - \frac{Q}{2\pi} \ln(d)$$


    where $d = \sqrt{(a + r_w)^2 + b^2}$ is the distance between the well with specified
    discharge and the collocation point on the well screen of the head-specified well.
    In matrix form, the system of equations is


    $$\begin{pmatrix} \frac{1}{2\pi} \ln(b) & 1 \ \frac{1}{2\pi} \ln(r_w) & 1 \end{pmatrix}
    \begin{pmatrix} P \ C \end{pmatrix} = \begin{pmatrix} \Phi_0 + Ua - \frac{Q}{2\pi}
    \ln(a) \ \Phi_w + U(a + r_w) - \frac{Q}{2\pi} \ln(d) \end{pmatrix}$$


    The unknown free parameters $P$ and $C$ are obtained by solving this system of
    two linear equations.


    The `solve` method of the `Model` class, as defined above, counts the number of
    elements with an unknown parameter and stores them in a separate list called `esolve`,
    builds the matrix and the right-hand side of the system of equations, solves the
    system, and stores the computed parameters for the corresponding head-specified
    elements (in this case the values of $P$ and $C$). The `solve` method loops through
    all elements in the `esolve` list and calls their `equation` function, which returns
    one row for the matrix and one right-hand side value. The `equation` method of
    the `Constant` element (not yet defined) returns the first row of the matrix and
    the'
