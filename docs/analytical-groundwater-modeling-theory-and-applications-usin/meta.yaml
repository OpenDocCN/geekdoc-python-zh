- md: "## 9.4 Wells with wellbore storage and skin effect\n\nThe previous solutions\
    \ for transient flow to a well were based on two approximations: The boundary\
    \ condition at the well was approximated by taking the limit for the well radius\
    \ going to zero (Eq. 9.6), and the water level in the well is approximated by\
    \ the head at the well radius in the aquifer. The first approximation neglects\
    \ the storage of the water inside the well, which is referred to as wellbore storage.\
    \ The second approximation neglects the resistance of the well screen, which is\
    \ referred to as the skin effect. Both are taken into account in this section.\n\
    \nConsider radial flow to a well in a confined aquifer with transmissivity $T$\
    \ and storage coefficient $S$. The well starts pumping with discharge $Q$ at time\
    \ $t = 0$. The radius of the well screen is $r_w$ (see Figure 9.7). The resistance\
    \ to flow through the well screen is equal to $c_w$ so that the radial component\
    \ of the discharge vector right at the well screen may be written as\n\n$$Q_r|_{r=r_w}\
    \ = H \\frac{h_w - h|_{r=r_w}}{c_w} \\qquad (9.38)$$\n\nwhere $h_w$ is the water\
    \ level inside the well. Conversely, the water level in the well may be written\
    \ as\n\n$$h_w = h|_{r=r_w} + \\frac{c_w}{H} Q_r|_{r=r_w} \\qquad (9.39)$$\n\n\
    ![](img/ca724f426a6249bf916ffe68c7fbe382_180_1.png)\n\nFigure 9.7 Vertical cross\
    \ section through a well with wellbore storage and skin effect. The head in the\
    \ aquifer at the well screen is higher than the water level $h_w$ in the well\
    \ because of the skin effect.\n\nThe water balance for water inside the well is\n\
    \n$$A_w \\frac{dh_w}{dt} = Q_{\\text{in}} - Q_{\\text{out}} \\qquad (9.40)$$\n\
    \nwhere $A_w$ is the cross-sectional area of the well screen at the level of the\
    \ water table in the well ($A_w = \\pi r_w^2$ for wells with a constant well radius).\
    \ The inflow $Q_{\\text{in}}$ consists of the inflow integrated along the well\
    \ screen\n\n$$Q_{\\text{in}} = -2\\pi r_w Q_r|_{r=r_w}$$\n\nwhile the outflow\
    \ is equal to the discharge of the well\n\n$$Q_{\\text{out}} = Q \\quad t \\ge\
    \ 0$$\n\nSubstitution of Eq. (9.39) for $h_w$, Eq. (9.41) for $Q_{\\text{in}}$,\
    \ and Eq. (9.42) for $Q_{\\text{out}}$ in the water balance inside the well gives\n\
    \n$$A_w \\left[ \\frac{\\partial h}{\\partial t}\\bigg|_{r=r_w} + \\frac{c_w}{H}\
    \ \\frac{\\partial Q_r}{\\partial t}\\bigg|_{r=r_w} \\right] = -2\\pi r_w Q_r|_{r=r_w}\
    \ - Q \\quad t \\ge 0$$\n\nThe governing differential equation for flow in the\
    \ aquifer is the diffusion equation (9.5). The Laplace transform of the diffusion\
    \ equation is the modified Helmholtz equation\n\n$$\\frac{d^2 \\bar{h}}{dr^2}\
    \ + \\frac{1}{r} \\frac{d\\bar{h}}{dr} = \\frac{Sp}{T} \\bar{h} = w\\bar{h}$$\n\
    \nwhere\n\n$$w = Sp/T$$\n\nThe Laplace transform of the water balance inside the\
    \ well (Eq. 9.43) is\n\n$$A_w p \\bar{h}|_{r=r_w} + \\left( \\frac{A_w c_w p}{H}\
    \ + 2\\pi r_w \\right) \\bar{Q}_r|_{r=r_w} = -\\frac{Q}{p}$$\n\nThe general solution\
    \ to the Laplace-transformed diffusion equation in radial coordinates (Eq. 9.44),\
    \ for the case that $\\bar{h}$ equals zero far away, is\n\n$$\\bar{h} = B K_0(r\\\
    sqrt{w})$$\n\nwhere $B$ is a parameter to be determined from the boundary conditions.\
    \ The corresponding discharge vector in the Laplace domain is\n\n$$\\bar{Q}_r\
    \ = -T \\frac{d\\bar{h}}{dr} = -BT\\sqrt{w}K_1(r\\sqrt{w})$$\n\nSubstitution of\
    \ the equations for $\\bar{h}$ and $\\bar{Q}_r$ in the Laplace-transformed water\
    \ balance (Eq. 9.46) gives\n\n$$B = -\\frac{Q}{p} \\frac{1}{A_w p K_0(r_w\\sqrt{w})\
    \ + \\left( \\frac{A_w c_w p}{H} + 2\\pi r_w \\right) T\\sqrt{w}K_1(r_w\\sqrt{w})}$$\n\
    \nBack-transformation of the Laplace-transformed solution to the time domain is\
    \ again carried out using the Stehfest algorithm (see Section 5.4). Note that\
    \ for the case that wellbore storage is neglected, the cross-sectional area $A_w$\
    \ is set to zero in the water balance equation (9.40), which means that ($\\pi\
    \ r_w^2 = 0$) and $B$ reduces to\n\n$$B = -\\frac{Q}{p} \\frac{1}{2\\pi r_w T\\\
    sqrt{w}K_1(r_w\\sqrt{w})}$$\n\nwhich is the solution when the boundary condition\
    \ at the well screen is\n\n$-2\\pi r_w Q_r|_{r=r_w} = Q \\quad t \\geq 0$\n\n\
    In the example below, the head change is compared for a well without wellbore\
    \ storage (boundary condition 9.51), a well with wellbore storage but no skin\
    \ effect, and a well with both wellbore storage and skin effect (Figure 9.8).\
    \ For the values of the example, wellbore storage and skin effect have an effect\
    \ on the head during the first few hours of pumping ($t < 0.1$ d). For the case\
    \ with skin effect, the head inside the well starts to differ from the head just\
    \ outside the well after a few minutes of pumping ($t > 0.002$ d).\n\n```python\n\
    # parameters\nT = 200 # transmissivity, m^2/d\nS = 0.005 # storage coefficient\
    \ of aquifer, -\nH = 10 # aquifer thickness, m\nQ = 800 # discharge of well, m^3/d\n\
    rw = 0.3 # well radius, m\ncw = 0.02 # resistance of well screen, d\n```\n\n```python\n\
    # solution\nfrom scipy.special import k0, k1\ndef hbar_wbs_res(p, r, T, S, Q,\
    \ rw, cw, H): # hbar\n    sqrtw = np.sqrt(S * p / T)\n    Aw = np.pi * rw ** 2\n\
    \    B = -Q / p * 1 / (p * Aw * k0(rw * sqrtw) +\n                      (2 * np.pi\
    \ * rw + Aw * p * cw / H) *\n                      T * sqrtw * k1(rw * sqrtw))\n\
    \    hbar = B * k0(r * sqrtw)\n    return hbar\n\ndef Qrbar_wbs_res(p, r, T, S,\
    \ Q, rw, cw, H): # Qrbar\n    sqrtw = np.sqrt(S * p / T)\n    Aw = np.pi * rw\
    \ ** 2\n    B = -Q / p * 1 / (p * Aw * k0(rw * sqrtw) +\n                    \
    \  (2 * np.pi * rw + Aw * p * cw / H) *\n                      T * sqrtw * k1(rw\
    \ * sqrtw))\n    Qrbar = T * sqrtw * B * k1(r * sqrtw)\n    return Qrbar\n\ndef\
    \ hwbar_wbs_res(p, r, T, S, Q, rw, cw, H): # hbar inside well\n    # r is not\
    \ used, but Stehfest routine requires it\n    hrw = hbar_wbs_res(p, rw, T, S,\
    \ Q, rw, cw, H)\n    Qrw = Qrbar_wbs_res(p, rw, T, S, Q, rw, cw, H)\n    return\
    \ cw * Qrw / H + hrw\n\n# import stehfest_coef and stehfest from Section 5.4\n\
    t = np.logspace(-3, 0, 100)\nht = htheis(rw, t, T, S, Q) # function from Section\
    \ 9.1\nhw = stehfest(0, t, hwbar_wbs_res, T=T, S=S, Q=Q, rw=rw, cw=cw, H=H)\n\
    hwbs = stehfest(rw, t, hbar_wbs_res, T=T, S=S, Q=Q, rw=rw, cw=0, H=H)\nhwbsres\
    \ = stehfest(rw, t, hbar_wbs_res, T=T, S=S, Q=Q, rw=rw, cw=cw, H=H)\n```\n\n```python\n\
    # plot of head at well\nplt.semilogx(t, ht, label='x wbs, x skin')\nplt.semilogx(t,\
    \ hwbs[0], label=f'v wbs, x sin')\n```\n\nrw = 0.3 # radius of well, m\nlab =\
    \ np.sqrt(c * T) # leakage factor, m\nprint(f'leakage factor: {lab:.2f} m')\n\n\
    leakage factor: 447.21 m\n\n```python\n# solution\nfrom scipy.integrate import\
    \ quad\n\ndef integrand(tau, r, T, lab):\n    return 1 / tau * np.exp(-tau - r\
    \ ** 2 / (4 * lab ** 2 * tau))\n\ndef hantush(r, t, T, S, c, Q):\n    lab = np.sqrt(T\
    \ * c)\n    u = S * r ** 2 / (4 * T * t)\n    F = quad(integrand, u, np.inf, args=(r,\
    \ T, lab))[0]\n    return -Q / (4 * np.pi * T) * F\n\nhantushvec = np.vectorize(hantush)\
    \ # vectorized version of hantush function\n```\n\n```python\n# basic plot for\
    \ one value of r and one value of t\nplt.subplot(121)\nr = np.linspace(rw, 2 *\
    \ lab, 100)\nt = 6 / 24\nplt.plot(r, hantushvec(r, t, T, S, c, Q), label='Hantush')\n\
    plt.plot(r, theis(r, t, T, S, Q), label='Theis') # theis func from Section 9.1\n\
    plt.legend()\nplt.subplot(122)\nt = np.linspace(0.01, 2, 100)\nr = lab # evaluate\
    \ head at r=lambda\nplt.plot(t, hantushvec(r, t, T, S, c, Q), label='Hantush')\n\
    plt.plot(t, theis(r, t, T, S, Q), '--', label='Theis')\nplt.legend();\n```\n\n\
    ![](img/ca724f426a6249bf916ffe68c7fbe382_178_0.png)\n\n**Exercise 9.8:** Consider\
    \ a 7-hour pumping test in a leaky aquifer with discharge $Q = 24466$ m$^3$/d\
    \ (USBR, 1995, Texas Hill project, Table 9.5). The data in an observation well\
