    # 3.1 Areal recharge between an impermeable boundary and a river


    Consider uniform recharge at a rate $N$ on an unconfined aquifer bounded on the
    left by an impermeable boundary and on the right by a river (see Figure 3.2).
    The problem is the same as in Section 1.3, but now the transmissivity is a function
    of the head $h$ in the aquifer rather than approximated as constant. The length
    of the aquifer is $L$, and the elevation of the aquifer bottom is $z_b$. The boundary
    conditions are


    ```

    $$\left.\frac{dh}{dx}\right|_{x=0} = 0$$

    $$h|_{x=L} = h_L$$

    ```


    where $h_L$ is the head in the river at $x = L$.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_60_0.png)


    The boundary conditions in terms of heads (Eqs. 3.8 and 3.9) are converted to
    boundary conditions in terms of the discharge potential for unconfined flow


    ```

    $$\left.\frac{d\Phi}{dx}\right|_{x=0} = 0$$

    $$\Phi|_{x=L} = \Phi_L = \frac{1}{2}k(h_L - z_b)^2$$

    ```'
