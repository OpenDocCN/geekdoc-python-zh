    \n$$h = z_b + \\sqrt{\\Delta \\Phi \\operatorname{erfc}(u) + \\Phi_0}$$\n\n下面重新求解第\
    \ 5.1 节的例子。储水项中的线性化饱和厚度近似为 $\\bar{H} = h_0 + \\frac{1}{2} \\Delta h$。将线性化布西涅斯克方程的解与第\
    \ 5.1 节中使用 $T = k\\bar{H}$ 的恒定导水系数解（5.14）进行比较（图 5.16）。对于示例中使用的数值，在 $x = 0$ 处的饱和厚度增加了\
    \ 20%。比较显示，用两种方法计算的水头之间只有很小的差异，这意味着饱和厚度增加 20% 的影响很小。当饱和厚度的相对变化更剧烈时，两种方法计算的水头差异会增大，如下文练习所探讨的。\n\
    \n```python\n# parameters\nk = 10 # hydraulic conductivity, m\nzb = 0 # aquifer\
    \ base, m\nSp = 0.2 # phreatic storage coefficient, -\nh0 = 10 # initial head\
    \ and canal level, m\ndelh = 2 # change in canal level, m\nHt = h0 + 0.5 * delh\
    \ # linearized saturated thickness, m\n```\n\n```python\nfrom scipy.special import\
    \ erfc\ndef h_unconfined(x, t, k, H, S, zb, h0, delh):\n    pot0 = 0.5 * k * (h0\
    \ - zb) ** 2\n    delpot = 0.5 * k * (h0 + delh - zb) ** 2 - pot0\n    u = np.sqrt(S\
    \ * x ** 2 / (4 * k * H * t))\n    pot = delpot * erfc(u) + pot0\n    return zb\
    \ + np.sqrt(2 * pot / k)\n```\n\n```python\n# basic plot head\nx = np.linspace(1e-12,\
    \ 400, 100)\nfor t in [1, 10, 100]:\n    h = h_edelman(x, t, k * Ht, Sp, delh)\
    \ + h0 # from Section 5.1\n    plt.plot(x, h)\n    hun = h_unconfined(x, t, k,\
    \ Ht, Sp, zb, h0, delh)\n    plt.plot(x, hun)\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_109_0.png)\n\
