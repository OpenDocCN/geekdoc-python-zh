  md: "is measured in one or more nearby observation wells and/or the pumping well\
    \ itself. The Theis solution is fitted to the observed heads to estimate the transmissivity\
    \ $T$ and the storage coefficient $S$ of the aquifer.\n\nKruseman and De Ridder\
    \ (1990) described a pumping test at the *Oude Korendijk* in The Netherlands in\
    \ their famous book on pumping tests. The objective of the pumping test was to\
    \ determine the transmissivity and storage coefficient of the aquifer. The discharge\
    \ of the well during the pumping test was 788 m$^3$/day. The observed drawdown\
    \ (in meters) and the observation time (in minutes) after pumping started are\
    \ given below for an observation well located 30 m from the pumping well. Kruseman\
    \ and De Ridder (1990) also reported drawdown in two additional wells, but only\
    \ one observation well is used here to demonstrate the approach. Time is converted\
    \ to days, and drawdown is converted to heads.\n\n```\n# Data at Oude Korendijk\
    \ taken from Kruseman and de Ridder (1990)\nrobs = 30 # distance to observation\
    \ well, m\nQ = 788 # discharge of well, m^3/d\ntime = np.array(\n    [0.1 , 0.25,\
    \ 0.5 , 0.7 , 1. , 1.4 , 1.9 , 2.33, 2.8 ,\n     3.36, 4. , 5.35, 6.8 , 8.3 ,\
    \ 8.7 , 10. , 13.1, 18. ,\n     27. , 33. , 41. , 48. , 59. , 80. , 95. , 139.,\
    \ 181. ,\n     245., 300., 360., 480., 600., 728., 830.]) # in minutes\ndrawdown\
    \ = np.array(\n    [0.04 , 0.08, 0.13, 0.18, 0.23 , 0.28 , 0.33 , 0.36 , 0.39\
    \ ,\n     0.42 , 0.45, 0.5 , 0.54, 0.57 , 0.58 , 0.6 , 0.64 , 0.68 ,\n     0.742,\
    \ 0.753, 0.779, 0.793, 0.819, 0.855, 0.873, 0.915, 0.935,\n     0.966, 0.99, 1.007,\
    \ 1.05, 1.053, 1.072, 1.088]) # in meters\ntobs = time / 24 / 60 # convert observation\
    \ time to days\nhobs = -drawdown # convert drawdown to heads\n```\n\nThe values\
    \ of the transmissivity and the storage coefficient are estimated using a least\
    \ squares approach by minimizing the sum of squared differences between the modeled\
    \ heads and the observed heads (similar to the approach in Section 5.3). The objective\
    \ function `fobj` returns the sum of squared errors and takes five input arguments:\
    \ an array of the parameters $T$ and $S$, the observed heads, observation times,\
    \ distance to observation well, and discharge of the well. When the keyword argument\
    \ `return_heads` is set to True, the function `fobj` returns the modeled heads\
    \ rather than the sum of squared errors.\n\n```\ndef fobj(p, ho, to, ro, Q, return_heads=False):\n\
    \    T, S = p\n    hm = htheis(ro, to, T, S, Q)\n    if return_heads:\n      \
    \  return hm\n    rv = np.sum((ho - hm) ** 2)\n    return rv\n```\n\nThe `fmin`\
    \ function of the `scipy.optimize` package is used to find the parameters that\
    \ minimize the objective function. The four arguments `ho`, `to`, `ro`, and `Q`\
    \ of `fobj` are passed by `fmin` to the objective function `fobj` with the `args`\
    \ keyword argument of `fmin`. The `fmin` function does not estimate the uncertainty\
    \ of the estimated parameters, but that is not a problem here as standard procedures\
    \ to estimate the uncertainty are commonly based on certain statistical requirements\
    \ between the modeled and observed heads that are violated in many pumping test\
    \ analyses (e.g., the differences between the observed and modeled heads are not\
    \ independent). The observed heads and fitted curve are plotted on the same graph\
    \ in Figure 9.3. The left plot has a linear time axis. The right plot has a semi-log\
    \ axis, which makes it easier to see the head variation at early time."
