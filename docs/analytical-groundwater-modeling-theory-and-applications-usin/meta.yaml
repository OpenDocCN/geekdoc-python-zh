    \nIn this section, circular area-sinks are discussed with a uniform recharge.\
    \ Rectangular area-sinks or area-sinks bounded by an arbitrary closed polygon\
    \ also exist (e.g., Strack, 2017), but their equations are significantly more\
    \ complicated and beyond the scope of this book. Circular area-sinks are very\
    \ useful for the simulation of areal recharge from precipitation. Their circular\
    \ geometry is commonly not a problem as long as the area-sink covers the entire\
