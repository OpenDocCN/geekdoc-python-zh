    # 2.2 Flow between a lake and a drained area


    One-dimensional flow is modeled between a lake and a drained area, as shown in
    Figure 2.4. Both the lake and drained area are separated from the aquifer by a
    semi-confining layer, which has a resistance $c_0$ below the lake and a resistance
    $c_1$ below the drained area. The lake and drained area are separated by a dike
    of negligible width (the vertical black line at $x = 0$ in the figure). The water
    level in the lake is $h_0^*$, while the water level in the drained area is $h_1^*$.
    The semi-confined aquifer extends to infinity on both sides. The transmissivity
    of the aquifer is constant and equal to $T$.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_45_0.png)


    Separate differential equations are written for the part of the aquifer below
    the lake and the part below the drained area


    $$\frac{d^2(h - h_0^*)}{dx^2} = \frac{h - h_0^*}{\lambda_0^2} \quad x \leq 0$$


    $$\frac{d^2(h - h_1^*)}{dx^2} = \frac{h - h_1^*}{\lambda_1^2} \quad x \geq 0$$


    (2.16)


    where $\lambda_0 = \sqrt{c_0 T}$ and $\lambda_1 = \sqrt{c_1 T}$.


    The boundary conditions are that the head approaches $h_0^*$ far to the left and
    $h_1^*$ far to the right


    $$h|_{x \to -\infty} = h_0^* \quad h|_{x \to +\infty} = h_1^*$$


    (2.17)'
