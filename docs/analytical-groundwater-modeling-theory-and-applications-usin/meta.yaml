    # 10.3 Flow over a step in the base


    The effect of a jump in the base on the flow and head distribution in an unconfined
    aquifer was investigated in Section 3.2 using a Dupuit solution. Here, the effect
    of a jump in the base on the flow and head distribution is investigated for confined
    flow using a solution for two-dimensional flow in the vertical plane. The two-dimensional
    flow solution is compared to the Dupuit solution, and the effect of a vertically
    anisotropy hydraulic conductivity is investigated. The solution is obtained with
    conformal mapping, and here, the function $\zeta(\tau)$ cannot be inverted analytically
    to get an expression for $\tau(\zeta)$, which complicates the evaluation of the
    function.


    Consider two-dimensional flow in the vertical plane in a confined aquifer with
    an impermeable top and an impermeable bottom. The base is piecewise horizontal
    and jumps at $x = 0$ (see Figure 10.9). The aquifer thickness is equal to $H_L$
    for $x \le 0$ and equal to $H_R$ for $x \ge 0$. The hydraulic conductivity is
    homogeneous and isotropic and equal to $k$. The flow is equal to $Q_x = U$ from
    the left to the right


    $$\lim_{x \to -\infty} q_x H_L = \lim_{x \to \infty} q_x H_R = U \qquad (10.31)$$


    The stream function is chosen to equal $\psi = 0$ along the base of the aquifer,
    which means that $\psi = -U$ along the top of the aquifer. As a reference, the
    head is equal to zero at the origin


    $$h_{x=0, z=0} = 0 \qquad (10.32)$$


    A solution to the stated problem is again sought in parametric form as $\omega(\tau)$
    and $\zeta(\tau)$, where the reference plane $\tau$ is chosen as the quarter plane
    shown in Figure 10.9. Point 1 is'
  - '[PAGE 198]


    chosen to correspond to $\tau = \infty$, point 2 corresponds to $\tau = 0$, and
    point 4 corresponds to $\tau = 1$. Point 3 corresponds to $\tau = \lambda$, where
    the value of $\lambda$ is determined by the mapping. The top of the aquifer and
    the horizontal portions of the bottom of the aquifer correspond to the positive
    real axis of $\tau$ (note the corresponding red, purple, and brown sections in
    the $\zeta$ and $\tau$ planes), while the vertical part of the bottom of the aquifer
    corresponds to the positive imaginary axis in the $\tau$ plane (green).


    ![](img/ca724f426a6249bf916ffe68c7fbe382_198_0.png)


    The solution for the stated problem is


    ```

    $$\zeta = \frac{-H_R}{\pi} \ln \frac{\tau - \lambda}{\tau + \lambda} + \frac{H_L}{\pi}
    \ln \frac{\tau - 1}{\tau + 1} + (H_R - H_L)i \quad (10.33)$$

    $$\omega = \frac{-U}{\pi} \ln[(\tau - 1)(\tau + 1)] + \frac{U}{\pi} \ln[(\tau
    - \lambda)(\tau + \lambda)/\lambda^2] \quad (10.34)$$

    ```


    where $\lambda = H_L/H_R$. Note the similarity between Eqs. (10.33) and (10.20),
    but for this case, as is common in conformal mapping, the solution $\zeta(\tau)$
    cannot be inverted to obtain a solution $\tau(\zeta)$. The solutions (10.33) and
    (10.34) are evaluated by selecting a value of $\tau$ and evaluating both the complex
    potential $\omega$ and the corresponding complex coordinate $\zeta$.


    A flow net is created as follows. A grid is defined in the $\tau$ plane, and both
    the complex coordinate $\zeta = x + iz$ and the complex potential $\omega$ are
    computed for each grid point. A contour plot is created using the regular contour
    function of matplotlib by passing it the computed irregular grid of $x$ and $z$
    together with either the computed head or stream function.


    All points along the top of the aquifer (between points 3 and 4) correspond to
    the real axis of $\tau$ between $\xi = \lambda$ (point 3) and $\xi = 1$ (point
    4). Some points that are far apart along the top of the aquifer in the $\zeta$
    plane are very close together in the $\tau$ plane. This phenomenon is called the
    crowding effect in conformal mapping. As a result, a regularly spaced grid in
    the $\tau$ plane results in an irregular grid in the $\zeta$ plane where some
    points may be very far apart. An accurate contour plot is obtained by defining
    an irregularly spaced grid in the $\tau$ plane consisting of three segments in
    the $\xi$ direction, from point 2 to 3, point 3 to 4, and point 4 to a large value;
    two segments are used in the $\eta$ plane. Note that neither $\zeta$ nor $\omega$
    can be computed easily at points 3 and 4, as the logarithms in the solution cannot
    be evaluated at those points. The solution exists in the limit, of course. As
    a practical solution, the solution is evaluated up to a small distance from points
    3 and 4, rather than mathematically taking the limit and programming the result.


    An example flow net is shown in Figure 10.10. The streamlines for the Dupuit solution
    are horizontal lines that jump at the base (compare Figure 3.8) and are shown
    with dashed lines in Figure 10.10. Note that the Dupuit streamlines are a good
    approximation of the two-dimensional streamlines beyond one aquifer thickness
    from the jump in the base. Similarly, the vertical head variation becomes negligible
    at approximately one aquifer thickness from the jump in the base.'
- md: "## 10.4 Spatially varying head at the top of the aquifer\n\nThe water table\
    \ in an unconfined aquifer is sometimes very roughly approximated as a subdued\
    \ replica of the topographic surface. This makes some intuitive sense, because\
    \ groundwater often discharges at a low point in the landscape. Groundwater that\
    \ recharges below the topographic highs has to take a relatively long path to\
    \ the discharge area in the topographic lows, which necessitates a hydraulic head\
    \ gradient, and thus a mounding of the water table. It turns out, however, that\
    \ the water table and the topographic surface are poorly correlated or even uncorrelated\
    \ in many unconfined aquifers (Haitjema and Mitchell-Bruker, 2005). Nonetheless,\
    \ an undulating water table may be a useful approximation to conceptualize regional\
    \ flow patterns.\n\nIn this section, flow systems are investigated where the head\
    \ at the top of the aquifer is specified to consist of one or more sinusoidal\
    \ functions, approximating a subdued sequence of topographic highs and lows. The\
    \ problem is discussed here because it resembles the famous solution of Toth (1963),\
    \ which is often used to investigate nested flow domains in basin-scale models.\
    \ As this is a problem where the head is specified at the top of the aquifer,\
    \ it must be verified that the resulting flow through the top of the aquifer is\
    \ hydrologically realistic.\n\nConsider steady two-dimensional flow in the vertical\
    \ plane (Figure 10.13). The hydraulic conductivity is $k$, and the bottom of the\
    \ aquifer is horizontal at $z = -H$. The aquifer is a distance $L$ long, and the\
    \ thickness of the aquifer is approximated as constant and equal to $H$. The flow\
    \ is governed by Laplace's equation (10.4). The lateral boundaries and the base\
    \ of the aquifer are impermeable\n\n$$q_x|_{x=0,z} = q_x|_{x=L,z} = q_z|_{x,z=-H}\
    \ = 0 \\quad (10.36)$$\n\nThe head $h$ at the top of the aquifer is specified\
    \ to vary periodically as a cosine with amplitude $a$ and period $p = 2L/n$, where\
    \ $n$ is an arbitrary integer\n\n$$h|_{x,z=0} = a \\cos(2\\pi x/p) \\quad (10.37)$$\n\
    \nIn terms of the specific discharge potential, the boundary conditions are\n\n\
    $$\\frac{\\partial \\phi}{\\partial x}\\bigg|_{x=0,z} = \\frac{\\partial \\phi}{\\\
    partial x}\\bigg|_{x=L,z} = \\frac{\\partial \\phi}{\\partial z}\\bigg|_{x,z=-H}\
    \ = 0 \\quad (10.38)$$\n\nand\n\n$$\\phi|_{x,z=0} = A \\cos(2\\pi x/p) \\quad\
    \ (10.39)$$\n\nwhere $A = ka$.\n\nThe solution for the specific discharge potential\
    \ is obtained from separation of variables as (e.g., Craig, 2008)\n\n$$\\phi =\
    \ \\frac{A \\cos(2\\pi x/p) \\cosh[2\\pi(z + H)/p]}{\\cosh(2\\pi H/p)} \\quad\
    \ (10.40)$$\n\nThe corresponding complex potential is\n\n$$\\omega = A \\frac{\\\
    cos[2\\pi(\\zeta + Hi)/p]}{\\cosh(2\\pi H/p)} \\quad (10.41)$$\n\nwhere $\\zeta\
    \ = x + iz$. The complex specific discharge is obtained as\n\n$$q_x - iq_z = -\\\
    frac{d\\omega}{d\\zeta} = \\frac{2\\pi A}{p} \\frac{\\sin[2\\pi(\\zeta + Hi)/p]}{\\\
    cosh(2\\pi H/p)} \\quad (10.42)$$\n\nThe vertical flux at the top of the aquifer\
    \ is a cosine function, just like the head\n\n$$q_z = \\frac{-2\\pi A}{p} \\frac{\\\
    cos(2\\pi x/p) \\sinh[2\\pi(z + H)/p]}{\\cosh(2\\pi H/p)} \\quad (10.43)$$\n\n\
    # parameters\nk = 10 # hydraulic conductivity, m/d\nHL = 10 # aquifer thickness\
    \ on left side, m\nHR = 20 # aquifer thickness on right side, m\nU = 0.1 # flow\
    \ from left to right, m^2/d\n\n# solution\ndef zetafunc(tau, HR=HR, HL=HL):\n\
    \    lab = HL / HR\n    zeta = -HR / np.pi * np.log((tau - lab) / (tau + lab))\
    \ + \\\n           HL / np.pi * np.log((tau - 1) / (tau + 1)) + \\\n         \
    \  (HR - HL) * 1j\n    return zeta\n\ndef omegafunc(tau, U=U, HR=HR, HL=HL):\n\
    \    lab = HL / HR\n    omega = -U / np.pi * np.log((tau - 1) * (tau + 1)) + \\\
    \n           U / np.pi * np.log((tau - lab) * (tau + lab) / lab ** 2)\n    return\
    \ omega\n\n# grid\nd = 1e-14 # small offset\nlab = HL / HR\nxi1 = np.linspace(0,\
    \ lab - d, 400)\nxi2 = np.linspace(lab + d, 1 - d, 400)\nxi3 = np.linspace(1 +\
    \ d, 40, 400)\neta1 = np.linspace(0, 1, 400)\neta2 = np.linspace(1, 40, 400)\n\
    xi, eta = np.meshgrid(np.hstack((xi1, xi2, xi3)), np.hstack((eta1, eta2)))\nzeta\
    \ = zetafunc(xi + eta * 1j)\nomega = omegafunc(xi + eta * 1j)\n\n# basic plot\n\
    plt.subplot(111, aspect=1, xlim=(-20, 20))\nplt.contour(zeta.real, zeta.imag,\
    \ omega.real / k, np.arange(-0.1, 0.1, 0.002))\nplt.contour(zeta.real, zeta.imag,\
    \ omega.imag, np.arange(-0.1, 0, 0.02))\nplt.plot([-40, 0, 0, 40], [10, 10, 0,\
    \ 0], 'k');\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_199_0.png)\n\nFigure 10.10\
    \ Flow net for confined flow with a jump in the base; head contour interval $\\\
    Delta h = 2$ mm.\n\n**Exercise 10.2:** Verify that the conformal mapping solution\
    \ for $\\zeta$ (Eq. 10.33) is correct by evaluating the solution at (or very close\
    \ to) all corner points.\n\nComputation of the complex potential at a specific\
    \ complex coordinate $\\zeta^* = x^* + iz^*$ in the aquifer requires a numerical\
    \ approach to find the corresponding value of the parameter $\\tau$.\n\nFor example,\
    \ $\\tau$ can be found by minimizing the function\n\n$$f(\\tau) = (x^* - x(\\\
    tau))^2 + (z^* - z(\\tau))^2 \\qquad (10.35)$$\n\nMinimization can be carried\
    \ out with a standard nonlinear minimization routine such as the fmin function\
    \ of scipy.optimize. fmin searches for an array of real variables that minimizes\
    \ a function, so $\\xi$ and $\\eta$ must be entered as an array of length 2 rather\
    \ than as one complex variable. This approach is implemented below to compute\
    \ the head at $(x, z) = (-50, 20)$.\n\ndef findtau(tauvec, x, z):\n    tau = tauvec[0]\
    \ + tauvec[1] * 1j\n    zetastar = zetafunc(tau)\n    return ((zetastar.real -\
    \ x) ** 2 + (zetastar.imag - z) ** 2)\n\nfrom scipy.optimize import fmin\nxi0,\
    \ eta0 = fmin(findtau, (1, 1), args=(-50, 20), disp=0)\ntau0 = xi0 + eta0 * 1j\n\
    print(f'tau: {tau0}')\nprint(f'zeta: {zetafunc(tau0)}')\n\ntau: (0.9999999664789975+1.245910302309445e-11j)\n\
    zeta: (-49.99698501153817+19.99881690414834j)\n\nNext, two examples are presented\
    \ for the case of a vertically anisotropic hydraulic conductivity. In the first\
    \ example, the vertical anisotropy is the popular value of $k_z = k_x/10$. The\
    \ corresponding flow net is shown in Figure 10.11. It can be seen from the flow\
    \ net that it takes about three ($\\sim \\sqrt{k_x/k_z}$) aquifer thicknesses\
    \ downstream of the jump in the base before the streamlines of the Dupuit solution\
    \ are a reasonable approximation of the streamlines of the two-dimensional solution.\
    \ At the jump in the base, the difference between the head at the top of the aquifer\
    \ and the head at the bottom of the jump is 2 cm.\n\n# additional parameters anisotropic\
    \ case 1\nkx = 10 # horizontal hydraulic conductivity, m/d\nkz = 1 # vertical\
    \ hydraulic conductivity, m/d\n\n# solution anisotropic case\nktilde = np.sqrt(kx\
    \ * kz)\nzetaaniso = zetafunc(xi + eta * 1j)\nomeganiso = omegafunc(xi + eta *\
    \ 1j)\nxg = zetaaniso.real / np.sqrt(kz / kx)\nzg = zetaaniso.imag\nh = omeganiso.real\
    \ / ktilde\npsi = omeganiso.imag\n\n# basic plot anisotropic case\nplt.subplot(111,\
    \ aspect=1, xlim=(-20, 60))\nplt.contour(xg, zg, h, np.arange(-0.1, 0.1, 0.002))\n\
    plt.contour(xg, zg, psi, np.arange(-0.1, 0, 0.02))\nplt.plot([-40, 0, 0, 40],\
    \ [10, 10, 0, 0], 'k');\n\nThe second example of vertical anisotropy is for the\
    \ case that the vertical hydraulic conductivity is 100 times larger than the horizontal\
    \ hydraulic conductivity. The much larger vertical than horizontal hydraulic conductivity\
    \ approaches the Dupuit approximation (in which the vertical resistance to flow\
    \ is completely neglected). The two solutions should thus be very similar. The\
    \ flow net is shown in Figure 10.12; the code to produce the flow net is the same\
    \ as that for Figure 10.11 and is not repeated here. The head contours are indeed\
    \ almost vertical, even near the jump in base, and the streamlines are horizontal\
    \ and almost jump down vertically at the jump in the base.\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_201_0.png)\n\
    \nFigure 10.11 Flow net for confined flow with a jump in the base and vertical\
    \ anisotropy $k_x/k_z = 10$; head contour interval $\\Delta h = 2$ mm.\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_201_1.png)\n\
    \nFigure 10.12 Flow net for confined flow with a jump in the base and vertical\
    \ anisotropy $k_z = 100k_x$, which approaches the Dupuit approximation; head contour\
    \ interval $\\Delta h = 2$ mm.\n\n**Exercise 10.3:** Compute the head drop between\
    \ $(x, z) = (-50, 20)$ and $(x, z) = (50, 20)$ for the two-dimensional isotropic\
    \ solution.\n\n**Exercise 10.4:** Compute the head drop between $x = -50$ and\
    \ $x = 50$ for the Dupuit solution, and compute the additional head drop across\
    \ the jump for the two-dimensional solution (previous exercise) as compared to\
    \ the Dupuit solution for the isotropic case.\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_202_0.png)"
  mdcn: "## 10.4 含水层顶部空间变化的水头\n\n非承压含水层中的地下水位有时被粗略地近似为地表形态的减弱复制品。这在直觉上是合理的，因为地下水通常在地形低点排泄。在地形高点下方补给的地下水必须经过相对较长的路径才能到达地形低点的排泄区，这需要一个水力水头梯度，从而形成地下水位的隆起。然而，事实证明，在许多非承压含水层中，地下水位与地表形态的相关性很差，甚至不相关（Haitjema\
    \ and Mitchell-Bruker, 2005）。尽管如此，起伏的地下水位可能是一个有用的概念化近似，用于理解区域流模式。\n\n在本节中，我们研究的是含水层顶部水头被指定为由一个或多个正弦函数组成的流动系统，以近似地形高低起伏的序列。之所以在此讨论这个问题，是因为它类似于著名的\
    \ Toth (1963) 解，该解常用于研究盆地尺度模型中的嵌套流动域。由于这是一个在含水层顶部指定水头的问题，因此必须验证由此产生的通过含水层顶部的水流在水文上是否现实。\n\
    \n考虑垂直平面内的稳态二维流动（图 10.13）。水力传导系数为 $k$，含水层底部在 $z = -H$ 处水平。含水层长度为 $L$，其厚度近似为常数且等于\
    \ $H$。流动由拉普拉斯方程（10.4）控制。侧边界和含水层底部是不透水的\n\n$$q_x|_{x=0,z} = q_x|_{x=L,z} = q_z|_{x,z=-H}\
    \ = 0 \\quad (10.36)$$\n\n含水层顶部的水头 $h$ 被指定为周期性变化，为振幅为 $a$、周期为 $p = 2L/n$ 的余弦函数，其中\
    \ $n$ 是任意整数\n\n$$h|_{x,z=0} = a \\cos(2\\pi x/p) \\quad (10.37)$$\n\n就比流量势而言，边界条件为\n\
    \n$$\\frac{\\partial \\phi}{\\partial x}\\bigg|_{x=0,z} = \\frac{\\partial \\\
    phi}{\\partial x}\\bigg|_{x=L,z} = \\frac{\\partial \\phi}{\\partial z}\\bigg|_{x,z=-H}\
    \ = 0 \\quad (10.38)$$\n\n以及\n\n$$\\phi|_{x,z=0} = A \\cos(2\\pi x/p) \\quad (10.39)$$\n\
    \n其中 $A = ka$。\n\n比流量势的解通过分离变量法获得（例如，Craig, 2008）\n\n$$\\phi = \\frac{A \\cos(2\\\
    pi x/p) \\cosh[2\\pi(z + H)/p]}{\\cosh(2\\pi H/p)} \\quad (10.40)$$\n\n相应的复势为\n\
    \n$$\\omega = A \\frac{\\cos[2\\pi(\\zeta + Hi)/p]}{\\cosh(2\\pi H/p)} \\quad\
    \ (10.41)$$\n\n其中 $\\zeta = x + iz$。复比流量为\n\n$$q_x - iq_z = -\\frac{d\\omega}{d\\\
    zeta} = \\frac{2\\pi A}{p} \\frac{\\sin[2\\pi(\\zeta + Hi)/p]}{\\cosh(2\\pi H/p)}\
    \ \\quad (10.42)$$\n\n含水层顶部的垂直通量是一个余弦函数，与水头一样\n\n$$q_z = \\frac{-2\\pi A}{p} \\\
    frac{\\cos(2\\pi x/p) \\sinh[2\\pi(z + H)/p]}{\\cosh(2\\pi H/p)} \\quad (10.43)$$\n\
    \n# 参数\nk = 10 # 水力传导系数，m/d\nHL = 10 # 左侧含水层厚度，m\nHR = 20 # 右侧含水层厚度，m\nU = 0.1\
    \ # 从左到右的流量，m^2/d\n\n# 解\ndef zetafunc(tau, HR=HR, HL=HL):\n    lab = HL / HR\n\
    \    zeta = -HR / np.pi * np.log((tau - lab) / (tau + lab)) + \\\n           HL\
    \ / np.pi * np.log((tau - 1) / (tau + 1)) + \\\n           (HR - HL) * 1j\n  \
    \  return zeta\n\ndef omegafunc(tau, U=U, HR=HR, HL=HL):\n    lab = HL / HR\n\
    \    omega = -U / np.pi * np.log((tau - 1) * (tau + 1)) + \\\n           U / np.pi\
    \ * np.log((tau - lab) * (tau + lab) / lab ** 2)\n    return omega\n\n# 网格\nd\
    \ = 1e-14 # 小偏移量\nlab = HL / HR\nxi1 = np.linspace(0, lab - d, 400)\nxi2 = np.linspace(lab\
    \ + d, 1 - d, 400)\nxi3 = np.linspace(1 + d, 40, 400)\neta1 = np.linspace(0, 1,\
    \ 400)\neta2 = np.linspace(1, 40, 400)\nxi, eta = np.meshgrid(np.hstack((xi1,\
    \ xi2, xi3)), np.hstack((eta1, eta2)))\nzeta = zetafunc(xi + eta * 1j)\nomega\
    \ = omegafunc(xi + eta * 1j)\n\n# 基本绘图\nplt.subplot(111, aspect=1, xlim=(-20,\
    \ 20))\nplt.contour(zeta.real, zeta.imag, omega.real / k, np.arange(-0.1, 0.1,\
    \ 0.002))\nplt.contour(zeta.real, zeta.imag, omega.imag, np.arange(-0.1, 0, 0.02))\n\
    plt.plot([-40, 0, 0, 40], [10, 10, 0, 0], 'k');\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_199_0.png)\n\
    \n图 10.10 底部有突变的承压流的流网；水头等值线间距 $\\Delta h = 2$ mm。\n\n**练习 10.2：** 通过在所有角点（或非常接近角点）处评估解，验证\
    \ $\\zeta$ 的保角映射解（公式 10.33）是正确的。\n\n计算含水层中特定复坐标 $\\zeta^* = x^* + iz^*$ 处的复势需要数值方法来找到对应的参数\
    \ $\\tau$ 值。\n\n例如，可以通过最小化函数来找到 $\\tau$\n\n$$f(\\tau) = (x^* - x(\\tau))^2 + (z^*\
    \ - z(\\tau))^2 \\qquad (10.35)$$\n\n最小化可以使用标准的非线性最小化程序进行，例如 scipy.optimize 的\
    \ fmin 函数。fmin 搜索使函数最小化的实变量数组，因此 $\\xi$ 和 $\\eta$ 必须作为长度为 2 的数组输入，而不是作为一个复变量。下面实现了这种方法来计算\
    \ $(x, z) = (-50, 20)$ 处的水头。\n\ndef findtau(tauvec, x, z):\n    tau = tauvec[0]\
    \ + tauvec[1] * 1j\n    zetastar = zetafunc(tau)\n    return ((zetastar.real -\
    \ x) ** 2 + (zetastar.imag - z) ** 2)\n\nfrom scipy.optimize import fmin\nxi0,\
    \ eta0 = fmin(findtau, (1, 1), args=(-50, 20), disp=0)\ntau0 = xi0 + eta0 * 1j\n\
    print(f'tau: {tau0}')\nprint(f'zeta: {zetafunc(tau0)}')\n\ntau: (0.9999999664789975+1.245910302309445e-11j)\n\
    zeta: (-49.99698501153817+19.99881690414834j)\n\n接下来，给出两个垂直各向异性水力传导系数的例子。在第一个例子中，垂直各向异性是常用的值\
    \ $k_z = k_x/10$。相应的流网如图 10.11 所示。从流网可以看出，在底部突变下游大约三个（$\\sim \\sqrt{k_x/k_z}$）含水层厚度处，Dupuit\
    \ 解的流线才成为二维解流线的合理近似。在底部突变处，含水层顶部的水头与突变底部的水头之差为 2 cm。\n\n# 各向异性情况 1 的附加参数\nkx =\
    \ 10 # 水平水力传导系数，m/d\nkz = 1 # 垂直水力传导系数，m/d\n\n# 各向异性情况的解\nktilde = np.sqrt(kx\
    \ * kz)\nzetaaniso = zetafunc(xi + eta * 1j)\nomeganiso = omegafunc(xi + eta *\
    \ 1j)\nxg = zetaaniso.real / np.sqrt(kz / kx)\nzg = zetaaniso.imag\nh = omeganiso.real\
    \ / ktilde\npsi = omeganiso.imag\n\n# 各向异性情况的基本绘图\nplt.subplot(111, aspect=1,\
    \ xlim=(-20, 60))\nplt.contour(xg, zg, h, np.arange(-0.1, 0.1, 0.002))\nplt.contour(xg,\
    \ zg, psi, np.arange(-0.1, 0, 0.02))\nplt.plot([-40, 0, 0, 40], [10, 10, 0, 0],\
    \ 'k');\n\n第二个垂直各向异性的例子是垂直水力传导系数比水平水力传导系数大 100 倍的情况。垂直水力传导系数远大于水平水力传导系数，接近 Dupuit\
    \ 近似（其中完全忽略了垂直流动阻力）。因此，这两个解应该非常相似。流网如图 10.12 所示；生成流网的代码与图 10.11 相同，此处不再重复。水头等值线确实是几乎垂直的，即使在底部突变附近也是如此，流线是水平的，并且在底部突变处几乎垂直地向下跳跃。\n\
    \n![](img/ca724f426a6249bf916ffe68c7fbe382_201_0.png)\n\n图 10.11 底部有突变且垂直各向异性\
    \ $k_x/k_z = 10$ 的承压流的流网；水头等值线间距 $\\Delta h = 2$ mm。\n\n![](img/ca724f426a624f426a6249bf916ffe68c7fbe382_201_1.png)\n\
    \n图 10.12 底部有突变且垂直各向异性 $k_z = 100k_x$（接近 Dupuit 近似）的承压流的流网；水头等值线间距 $\\Delta h\
    \ = 2$ mm。\n\n**练习 10.3：** 计算二维各向同性解在 $(x, z) = (-50, 20)$ 和 $(x, z) = (50, 20)$\
    \ 之间的水头降。\n\n**练习 10.4：** 计算 Dupuit 解在 $x = -50$ 和 $x = 50$ 之间的水头降，并计算二维解（上一个练习）与各向同性情况下的\
    \ Dupuit 解相比，在突变处的额外水头降。\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_202_0.png)"
