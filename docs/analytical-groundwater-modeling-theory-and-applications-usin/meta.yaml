    The travel time for water that enters at the top of the aquifer and leaves the
    aquifer at the left or right river can again be computed from the horizontal component
    of the velocity vector $v_x = q_x/n$ (since $v_x$ is not a function of the vertical
    coordinate), as was done in the previous section. This gives the travel time $t_{tr}(x_0,
    x_1)$ from location $x = x_0$ to location $x = x_1$


    $$t_{tr}(x_0, x_1) = \int_{x_0}^{x_1} \frac{dx}{v_x} = \frac{nH}{N} \ln \left[
    \frac{v_x|_{x=x_1}}{v_x|_{x=x_0}} \right] \quad (1.33)$$


    Similarly, the travel time from the top of the aquifer $z_b + H$ to elevation
    $z$ is obtained from the vertical component of the velocity vector $v_z = q_z/n$,
    which gives


    $$t_{tr}(z) = \int_{z_b+H}^{z} \frac{dz}{v_z} = \frac{nH}{N} \ln \left( \frac{H}{z
    - z_b} \right) \quad (1.34)$$


    The travel time from the top of the aquifer to elevation $z$ is only a function
    of $z$. That is an interesting result, famously obtained by Vogel (1967), because
    it means that all water at a certain depth has the same age for the case of uniform
    recharge.


    Exercise 1.6: Compute how long it takes for water that enters the aquifer at the
    top of the aquifer halfway between the water divide and the right river to flow
    to the right river. Use the parameters of the example and a porosity $n = 0.3$.
    Compute the travel time in two ways: using the equation for the travel time from
    $x_0$ to $x_1$, and the equation for the travel time from the top of the aquifer
    to the halfway thickness of the aquifer. They should, of course, give the same
    answer.


    ## 1.3 Areal recharge between an impermeable boundary and a river


    The problem of the previous section is modified by replacing the river on the
    left side by an impermeable boundary (see Figure 1.11). The two boundary conditions
    become


    $$\left. \frac{dh}{dx} \right|_{x=0} = 0 \quad (1.35)$$

    $$h|_{x=L} = h_L \quad (1.36)$$


    The boundary condition at $x = L$ is referred to as a fixed-head or Dirichlet
    boundary condition. The boundary condition at $x = 0$ is referred to as a specified-flux
    or Neumann boundary condition. The Dirichlet and Neumann boundary conditions are
    also referred to as type 1 and type 2 boundary conditions, respectively. In physical
    terms, the impermeable boundary can represent a water divide or a rock mass with
    very low permeability.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_35_0.png)


    The general solution to the differential equation is again Eq. (1.9), of which
    the derivative with respect to $x$ is


    $$\frac{dh}{dx} = -\frac{N}{T}x + A \quad (1.37)$$


    Application of boundary condition Eq. (1.35) at $x = 0$ gives


    $$A = 0 \quad (1.38)$$


    so that application of boundary condition (1.36) leads to the following solution


    $$h = -\frac{N}{2T}(x^2 - L^2) + h_L \quad (1.39)$$


    and


    $$Q_x = -T\frac{dh}{dx} = Nx \quad (1.40)$$


    All the recharge flows to the river on the right, so the outflow into the right
    river is $NL$. An example is provided below (Figure 1.12). Note that the line
    for the head function is horizontal at the left boundary, indicating the no-flow
    condition. The saturated thickness is approximated as constant and equal to $H
    = 10$ m in the example below, but the distance between the head and the bottom
    of the aquifer ($z_b = -5$ m) varies from 14 m on the left side to 9 m on the
    right side. The question can be raised whether it is reasonable to approximate
    the saturated thickness as constant if it varies by this much. This question is
    addressed in Chapter 3.


    ```python

    # parameters

    L = 1000 # aquifer length, m

    H = 10 # approximate saturated aquifer thickness, m

    zb = -5 # aquifer bottom, m

    k = 10 # hydraulic conductivity, m/d

    T = k * H # transmissivity, m^2/d

    hL = 4 # specified head at the right boundary, m

    N = 0.001 # areal recharge, m/d

    ```


    ```python

    # solution

    x = np.linspace(0, L, 100)

    h = -N / (2 * T) * (x ** 2 - L ** 2) + hL

    Qx = N * x

    ```'
