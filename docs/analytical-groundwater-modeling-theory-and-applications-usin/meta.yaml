  - "[PAGE 173]\n\nis measured in one or more nearby observation wells and/or the\
    \ pumping well itself. The Theis solution is fitted to the observed heads to estimate\
    \ the transmissivity $T$ and the storage coefficient $S$ of the aquifer.\n\nKruseman\
    \ and De Ridder (1990) described a pumping test at the *Oude Korendijk* in The\
    \ Netherlands in their famous book on pumping tests. The objective of the pumping\
    \ test was to determine the transmissivity and storage coefficient of the aquifer.\
    \ The discharge of the well during the pumping test was 788 m$^3$/day. The observed\
    \ drawdown (in meters) and the observation time (in minutes) after pumping started\
    \ are given below for an observation well located 30 m from the pumping well.\
    \ Kruseman and De Ridder (1990) also reported drawdown in two additional wells,\
    \ but only one observation well is used here to demonstrate the approach. Time\
    \ is converted to days, and drawdown is converted to heads.\n\n```\n# Data at\
    \ Oude Korendijk taken from Kruseman and de Ridder (1990)\nrobs = 30 # distance\
    \ to observation well, m\nQ = 788 # discharge of well, m^3/d\ntime = np.array(\n\
    \    [0.1 , 0.25, 0.5 , 0.7 , 1. , 1.4 , 1.9 , 2.33, 2.8 ,\n     3.36, 4. , 5.35,\
    \ 6.8 , 8.3 , 8.7 , 10. , 13.1, 18. ,\n     27. , 33. , 41. , 48. , 59. , 80.\
    \ , 95. , 139., 181. ,\n     245., 300., 360., 480., 600., 728., 830.]) # in minutes\n\
    drawdown = np.array(\n    [0.04 , 0.08, 0.13, 0.18, 0.23 , 0.28 , 0.33 , 0.36\
    \ , 0.39 ,\n     0.42 , 0.45, 0.5 , 0.54, 0.57 , 0.58 , 0.6 , 0.64 , 0.68 ,\n\
    \     0.742, 0.753, 0.779, 0.793, 0.819, 0.855, 0.873, 0.915, 0.935,\n     0.966,\
    \ 0.99, 1.007, 1.05, 1.053, 1.072, 1.088]) # in meters\ntobs = time / 24 / 60\
    \ # convert observation time to days\nhobs = -drawdown # convert drawdown to heads\n\
    ```\n\nThe values of the transmissivity and the storage coefficient are estimated\
    \ using a least squares approach by minimizing the sum of squared differences\
    \ between the modeled heads and the observed heads (similar to the approach in\
    \ Section 5.3). The objective function `fobj` returns the sum of squared errors\
    \ and takes five input arguments: an array of the parameters $T$ and $S$, the\
    \ observed heads, observation times, distance to observation well, and discharge\
    \ of the well. When the keyword argument `return_heads` is set to True, the function\
    \ `fobj` returns the modeled heads rather than the sum of squared errors.\n\n\
    ```\ndef fobj(p, ho, to, ro, Q, return_heads=False):\n    T, S = p\n    hm = htheis(ro,\
    \ to, T, S, Q)\n    if return_heads:\n        return hm\n    rv = np.sum((ho -\
    \ hm) ** 2)\n    return rv\n```\n\nThe `fmin` function of the `scipy.optimize`\
    \ package is used to find the parameters that minimize the objective function.\
    \ The four arguments `ho`, `to`, `ro`, and `Q` of `fobj` are passed by `fmin`\
    \ to the objective function `fobj` with the `args` keyword argument of `fmin`.\
    \ The `fmin` function does not estimate the uncertainty of the estimated parameters,\
    \ but that is not a problem here as standard procedures to estimate the uncertainty\
    \ are commonly based on certain statistical requirements between the modeled and\
    \ observed heads that are violated in many pumping test analyses (e.g., the differences\
    \ between the observed and modeled heads are not independent). The observed heads\
    \ and fitted curve are plotted on the same graph in Figure 9.3. The left plot\
    \ has a linear time axis. The right plot has a semi-log axis, which makes it easier\
    \ to see the head variation at early time."
- md: "## 9.1 Wells with a periodic discharge\n\nThe discharge of a well may vary\
    \ through time periodically. For example, in an aquifer storage and recovery (ASR)\
    \ system, water is injected into the aquifer during times of abundant water availability\
    \ and pumped out of the aquifer during times of water scarcity. For an ASR well,\
    \ the discharge varies around zero, for example sinusoidally as\n\n$$Q(t) = A\
    \ \\sin(2\\pi t / \\tau)$$\n\nwhere $A$ and $\\tau$ are the amplitude and period\
    \ of the sinusoidal discharge. The boundary condition at the well is approximated\
    \ as\n\n$$\\lim_{r \\to 0} -2\\pi r Q_r = A \\sin(2\\pi t / \\tau)$$\n\nwhile\
    \ the boundary condition at infinity is (9.8). There is no initial condition:\
    \ The well has been pumping with the sinusoidal discharge (Eq. 9.23) for a long\
    \ time. Flow in the aquifer is governed by the diffusion equation (9.5).\n\nThe\
    \ solution for the stated problem is obtained using separation of variables: The\
    \ solution is written as a function of the radial distance $r$ multiplied by a\
    \ function of the time $t$. The analysis is easiest conducted in terms of complex\
    \ variables. The head solution corresponding to boundary condition (9.23) is the\
    \ imaginary part of the complex solution (Bruggeman, 1999)\n\n$$h = -\\frac{A}{2\\\
    pi T} \\Im \\left[ \\mathrm{K}_0 \\left( \\frac{r}{\\mu} \\sqrt{i} \\right) e^{2\\\
    pi i t / \\tau} \\right]$$\n\nwhere the characteristic length $\\mu$ is defined\
    \ as\n\n$$\\mu = \\sqrt{\\frac{T}{S} \\frac{\\tau}{2\\pi}}$$\n\nNote that $\\\
    mu$ has the dimension of length. The corresponding radial component of the discharge\
    \ vector is\n\n$$Q_r = -\\frac{A}{2\\pi} \\Im \\left[ \\frac{\\sqrt{i}}{\\mu}\
    \ \\mathrm{K}_1 \\left( \\frac{r}{\\mu} \\sqrt{i} \\right) e^{2\\pi i t / \\tau}\
    \ \\right]$$\n\nThe sinusoidal head variation is largest at the well and decreases\
    \ with distance from the well. Discharge variations with a short period damp out\
    \ at a shorter distance from the well than variations with a longer period. It\
    \ is noted that taking the real part of the complex function in Eq. (9.25) results\
    \ in the solution for the case that the sine function in Eq. (9.23) is replaced\
    \ by a cosine function.\n\nIn the example below, the solution is plotted for a\
    \ sinusoidal well discharge with a period of 1 year in an unconfined aquifer where\
    \ the transmissivity is again approximated as constant. The function `kv` of the\
    \ `scipy.special` package is used to compute the modified Bessel functions of\
    \ complex argument, because the functions `k0` and `k1` only accept real arguments.\
    \ In the left graph of Figure 9.4, the head variation is plotted at the well and\
    \ at distances $r = \\mu$ and $r = 2\\mu$. The amplitude of the head variation\
    \ at $r = 2\\mu$ is negligible compared to the head variation at the well. In\
    \ the right graph of Figure 9.4, the total flow in the aquifer $Q_{\\text{tot}}\
    \ = 2\\pi r Q_r$ is plotted. The amplitude of the total flow equals $A$ at the\
    \ well and slowly decreases to less than $0.05A$ at $r = 6\\mu$.\n\n```python\n\
    # parameters\nT = 100 # transmissivity, m^2/d\nS = 1e-1 # storage coefficient,\
    \ -\ntau = 365 # period, d\nA = 200 # amplitude of discharge function, m^3/d\n\
    rw = 0.3 # radius of well, m\n```\n\n```python\nmu = np.sqrt(T * tau / (S * 2\
    \ * np.pi))\nprint(f'characteristic length mu: {mu:.2f} m')\n```\n\ncharacteristic\
    \ length mu: 241.02 m\n\n```python\n# solution\nfrom scipy.special import kv\n\
    def hsinwell(r, t):\n    hcomplex = -A / (2 * np.pi * T) * kv(0, r * np.sqrt(1j)\
    \ / mu) * \\\n              np.exp(2 * np.pi * 1j * t / tau)\n    return hcomplex.imag\n\
    \ndef Qrsinwell(r, t):\n    Qrcomplex = -A / (2 * np.pi) * np.sqrt(1j) / mu *\
    \ \\\n                kv(1, r * np.sqrt(1j) / mu) * np.exp(2 * np.pi * 1j * t\
    \ / tau)\n    return Qrcomplex.imag\n```\n\n```python\n# basic plot\nt = np.linspace(0,\
    \ 2 * tau, 100)\nplt.subplot(121)\nplt.plot(t, hsinwell(rw, t), label='$r=r_w$')\n\
    plt.plot(t, hsinwell(mu, t), label='$r=\\mu$')\nplt.plot(t, hsinwell(2 * mu, t),\
    \ label='$r=2\\mu$')\nplt.legend()\nplt.subplot(122)\nplt.plot(t, Qrsinwell(rw,\
    \ t) * 2 * np.pi * rw, label='$r=r_w$')\nplt.plot(t, Qrsinwell(3 * mu, t) * 2\
    \ * np.pi * 3 * mu, 'C3', label='$r=3\\mu$')\nplt.plot(t, Qrsinwell(6 * mu, t)\
    \ * 2 * np.pi * 6 * mu, 'C4', label='$r=6\\mu$')\nplt.legend();\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_176_0.png)\n\
    \n**Figure 9.4:** Results of pumping test analysis; linear time axis (left) and\
    \ log-scaled time axis (right).\n\n**Exercise 9.7:** Use numerical derivatives\
    \ to verify that $Q_r$ as programmed is indeed $Q_r = -T\\partial h/\\partial\
    \ r$ for several values of $r$ and $t$.\n\n## 9.3 Wells in a semi-confined aquifer\n\
    \nThe solution for steady flow to a well in a semi-confined aquifer was presented\
    \ in Section 6.4. In this section, the equivalent solution is presented for transient\
    \ flow. Consider a semi-confined aquifer with transmissivity $T$ and storage coefficient\
    \ $S$. The top of the aquifer is formed by a semi-confining layer with resistance\
    \ $c$ (Figure 6.12). Storage in the semi-confining layer is neglected. The head\
    \ $h^*$ above the semi-confining layer is fixed to zero. Vertical leakage $q_z$\
    \ through the semi-confining layer is computed as Eq. (2.2)\n\n$$q_z = \\frac{h\
    \ - 0}{c} \\quad (9.28)$$\n\nso that the governing differential equation for radial\
    \ flow is\n\n$$\\frac{\\partial^2 h}{\\partial r^2} + \\frac{1}{r} \\frac{\\partial\
    \ h}{\\partial r} = \\frac{S}{T} \\frac{\\partial h}{\\partial t} + \\frac{h}{cT}\
    \ \\quad (9.29)$$\n\nA well starts pumping with discharge $Q$ at time $t = t_0$.\
    \ Initially, the head change caused by the well in the aquifer is equal to zero\
    \ everywhere. The initial and boundary conditions are the same as those for the\
    \ Theis solutions (9.6, 9.7, and 9.8).\n\nThe solution to this problem was first\
    \ obtained by Hantush and Jacob (1955) and is referred to as the Hantush function\n\
    \n$$h = -\\frac{Q}{4\\pi T} \\int_u^\\infty \\frac{1}{\\tau} \\exp\\left(-\\tau\
    \ - \\frac{r^2}{4\\lambda^2 \\tau}\\right) d\\tau \\quad (9.30)$$\n\nwhere $\\\
    lambda = \\sqrt{Tc}$ is the leakage factor and $u$ is defined as for the Theis\
    \ well\n\n$$u = \\frac{Sr^2}{4T(t - t_0)} \\quad (9.31)$$\n\nThe solution for\
    \ the case that the head above the semi-confining layer is equal to $h^*$ rather\
    \ than zero is obtained by simply adding a constant $h^*$ to the solution. Note\
    \ that this is allowed because $h = h^*$ is a particular solution to the differential\
    \ equation\n\n$$\\frac{\\partial^2 h}{\\partial r^2} + \\frac{1}{r} \\frac{\\\
    partial h}{\\partial r} = \\frac{S}{T} \\frac{\\partial h}{\\partial t} + \\frac{h\
