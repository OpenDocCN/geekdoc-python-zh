    # 5.5 Unconfined flow with variable transmissivity


    So far in this chapter, the transmissivity of an aquifer has been approximated
    as constant, even when the flow was unconfined. This is a reasonable approximation
    when the variation of the saturated thickness is not too large, as was shown in
    Chapter 3 for steady unconfined flow. In this section, an alternative formulation
    for transient unconfined flow is presented and the accuracy of the constant transmissivity
    approximation is assessed.


    The one-dimensional continuity equation for transient unconfined flow is given
    by Eq. (5.5) as


    $$\frac{\partial Q_x}{\partial x} = -S_p \frac{\partial h}{\partial t} + N \qquad
    (5.62)$$


    where $S_p$ is the phreatic storage (or specific yield). $Q_x$ may be written
    in terms of the discharge potential for unconfined flow as Eq. (3.3)


    $$Q_x = -\frac{\mathrm{d}\Phi}{\mathrm{d}x} \qquad (5.63)$$


    where $\Phi$ is given by Eq. (3.2)


    $$\Phi = \frac{1}{2}k(h - z_b)^2 \qquad (5.64)$$'
