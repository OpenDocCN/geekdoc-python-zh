    \ of the aquifer is equal to $z_0$ for the left part of the aquifer (length $L_0$)\
    \ and is equal to $z_1$ for the right part of the aquifer (length $L_1$). The\
    \ head is $h_0$ at $x = 0$, and the head is $h_L$ at $x = L$. These conditions\
    \ are transformed to conditions in terms of the discharge potential\n\n$$\\Phi|_{x=0}\
    \ = \\Phi_0 = \\frac{1}{2}k(h_0 - z_0)^2 \\qquad (3.20)$$\n$$\\Phi|_{x=L} = \\\
    Phi_L = \\frac{1}{2}k(h_L - z_1)^2 \\qquad (3.21)$$\n\nAs for the solution of,\
    \ e.g., Section 1.4, the head and flux are continuous at $x = L_0$.\n\n$$h^- =\
    \ h^+ \\qquad (3.22)$$\n$$Q_x^- = Q_x^+ \\qquad (3.23)$$\n\nwhere the superscripts\
    \ $-$ and $+$ are used as shorthand for evaluation just to the left and right\
    \ of $x = L_0$, respectively.\n\nThe flow from the left river to the right river\
    \ is equal to $U$, which is unknown upfront. Application of boundary conditions\
    \ (3.20) and (3.21) gives equations for the discharge potential for the left and\
    \ right parts that still contain the unknown flux $U$\n\n$$\\Phi = -Ux + \\Phi_0\
    \ \\qquad 0 \\le x \\le L_0 \\qquad (3.24)$$\n$$\\Phi = -U(x - L) + \\Phi_L \\\
    qquad L_0 \\le x \\le L \\qquad (3.25)$$\n\nwhere $L = L_0 + L_1$. The discharge\
    \ $U$ is obtained from condition (3.22) as follows. The discharge potentials $\\\
