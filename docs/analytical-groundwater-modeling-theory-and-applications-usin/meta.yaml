    在此解中，流动被近似为一维流动，$h$ 和 $Q_x$ 都只是 $x$ 的函数。然而，在垂直剖面中，流动必须是二维的。毕竟，水从顶部入渗含水层，并向左右两侧的河流排泄（见图
    1.5）。这导致了一个明显的矛盾：在一维解中，水如何能垂直流动？


    为了解决这个矛盾，考虑比流量垂直分量的达西定律：


    $$q_z = -k_z \frac{\partial h}{\partial z} \qquad (1.26)$$


    其中 $k_z$ 是垂直方向的水力传导系数。由于采用了杜普伊-福希海默近似，水头 $h$ 仅是 $x$ 的函数，因此 $\partial h/\partial
    z = 0$。这意味着 $q_z$ 也等于零，除非垂直水力传导系数 $k_z$ 为无穷大；一个趋于零的项与一个趋于无穷大的项的乘积在特定数学条件下可以得到一个有限值。尽管这起初可能看起来很奇怪（垂直水力传导系数当然是一个有限值），但这个结果可以解释为垂直流动的阻力被忽略了（例如，Strack,
    1984）。换句话说，在含水层内垂直流动所需的能量相对于水平流动所需的能量可以忽略不计。这通常是一个很好的近似，因为地下水通常水平流动距离很大（公里量级），但垂直流动距离很小（米量级）。


    流动的垂直分量不能从达西定律计算（因为 $k_z = \infty$ 会导致各种问题），但可以从流动的连续性获得。通过考虑一个长度为 $\Delta x$、高度为
    $\Delta z$ 的垂直含水层剖面，可以推导出垂直 $x, z$ 平面内流动连续性的微分方程。四个侧面的通量如图 1.7 所示。应用稳态流动的体积平衡（流入
    - 流出 = 0）得到：


    $$[q_x(x + \Delta x, z) - q_x(x, z)]\Delta z \Delta t + [q_z(x, z + \Delta z)
    - q_z(x, z)]\Delta x \Delta t = 0 \qquad (1.27)$$


    除以 $\Delta x \Delta z \Delta t$ 并取 $\Delta x$ 和 $\Delta z$ 趋于零的极限，得到：


    $$\frac{\partial q_x}{\partial x} + \frac{\partial q_z}{\partial z} = 0 \qquad
    (1.28)$$


    用数学术语来说，对于垂直平面内的稳态流动，比流量矢量的散度等于零。


    水平分量 $q_x$ 由流量矢量（公式 1.25）获得：


    $$q_x = \frac{Q_x}{H} = -k \frac{dh}{dx} = \frac{N}{H} \left( x - \frac{L}{2}
    - \frac{T}{N} \frac{h_L - h_0}{L} \right) \qquad (1.29)$$'
