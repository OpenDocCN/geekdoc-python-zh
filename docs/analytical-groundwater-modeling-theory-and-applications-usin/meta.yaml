    # 6.3 Wells near an inhomogeneity boundary


    Hydraulic properties always vary at least a little bit throughout an aquifer.
    A common approach to representing varying aquifer properties is to divide the
    aquifer up into zones of different, but homogeneous properties; each zone is referred
    to as an inhomogeneity. Inside an inhomogeneity, the hydraulic conductivity, base
    elevation, and/or thickness of the aquifer may be different from its surroundings.
    As such, the transmissivity of the aquifer is referred to as piecewise constant.


    The boundary conditions at the inhomogeneity boundary are that both the head and
    the normal component of flow are continuous across it. As a result, the component
    of flow parallel to the inhomogeneity boundary jumps. This is a direct consequence
    of the condition that the head is continuous. For example, consider an inhomogeneity
    boundary along the $y$-axis, as shown in Figure 6.10. The transmissivity to the
    left of the boundary is $T_L$, and the transmissivity to the right of the boundary
    is $T_R$. The head is the same on either side of the inhomogeneity boundary, which
    means that also the head gradient $\partial h/\partial y$ is continuous across
    the boundary. As a result, the component of the discharge vector parallel to the
    boundary, in this case $Q_y$, is $Q_y^- = -T_L \partial h/\partial y$ on the left
    side of the boundary and $Q_y^+ = -T_R \partial h/\partial y$ on the right side
    of the boundary. The jump in the component of flow parallel to the inhomogeneity
    boundary is referred to as a shear flow.


    The direction of a streamline changes abruptly when it crosses an inhomogeneity
    boundary. This is a direct consequence of the shear flow along the boundary. For
    example, consider one point on the inhomogeneity boundary along the $y$-axis of
    Figure 6.10. The flow just to the left of the boundary is $(Q_x^-, Q_y^-)$, and
    the flow just to the right of the boundary is $(Q_x^+, Q_y^+)$. The angle $\theta^-$
    between $\vec{Q}^-$ and the normal to the boundary is


    $$\tan(\theta^-) = Q_y^- / Q_x^- \qquad (6.46)$$


    Similarly, the angle $\theta^+$ between $\vec{Q}^+$ and the normal to the boundary
    is


    $$\tan(\theta^+) = Q_y^+ / Q_x^+ \qquad (6.47)$$


    Since $Q_x^- = Q_x^+$, this gives


    $$\frac{\tan(\theta^-)}{\tan(\theta^+)} = \frac{T_L}{T_R} \qquad (6.48)$$'
