    Phi = -\\frac{N R^2}{2} \\ln(r/R) \\quad r \\geq R \\qquad (8.13)$$\n\nNote that\
    \ the potential (and hence the head) and the discharge vector are continuous across\
    \ the edge of the area-sink. The stream function doesn't exist inside the area-sink,\
