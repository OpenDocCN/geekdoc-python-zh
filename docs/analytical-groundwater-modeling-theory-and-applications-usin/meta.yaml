- md: "## A.4 The matplotlib package for visualization\n\nThe main package for plotting\
    \ in Python is called matplotlib. It is a comprehensive plotting package that\
    \ is highly versatile and can be used to make fantastic plots and animations.\
    \ The gallery on the matplotlib web page is a great resource to discover many\
    \ of the matplotlib capabilities.\nMost of matplotlib's plotting capabilities\
    \ are available in the subpackage pyplot, which is commonly renamed as plt in\
    \ the Python community. All figures can be included inline in a notebook (rather\
    \ than in a separate window) with the IPython magic command %matplotlib inline.\
    \ IPython magic commands are preceded with a %. They are not standard Python commands\
    \ and only work within IPython environments. They are intended to provide functionality\
    \ that makes programming a little easier.\n\n```python\n%matplotlib inline\nimport\
    \ matplotlib.pyplot as plt\n```\n\nThe following two lines of code compute sin(x)\
    \ for 100 values of x between 0 and π, and then plot sin(x) vs. x.\n\n```python\n\
    x = np.linspace(0, np.pi, 100)\nplt.plot(x, np.sin(x));\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_226_0.png)\n\
    \nThe plot function has many, many options, as may be seen from the documentation.\
    \ A more complex graph with multiple lines, labels along the axes, and a legend\
    \ is shown below. matplotlib uses a different color for each line that is plotted.\
    \ The default colors are called C0, C1, C2, etc. Alternatively, a different color\
    \ can be specified.\n\n```python\nx = np.linspace(0, 2 * np.pi, 200)\ny1 = np.sin(x)\n\
    y2 = np.cos(x)\nplt.plot(x, y1, '--', label='sin(x)')  # plotted with default\
    \ color C0\nplt.plot(x, y2, color='purple', lw=2, label='cos(x)')  # linewidth\
    \ (lw) is 2\nplt.xlabel('x-axis')\nplt.ylabel('y-axis')\nplt.legend(); # selects\
    \ best spot for legend unless loc is specified\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_227_0.png)\n\
    \nMost matplotlib functions return a handle to the plot item that is created.\
    \ For example, the plt.plot function returns a list with a handle to the line\
    \ that is plotted\n\n```python\na = plt.plot([1, 2, 3], label='hello')\nprint(a)\n\
    ```\n\n[<matplotlib.lines.Line2D object at 0x116b51c40>]\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_227_1.png)\n\
    \nThe cryptic statement such as [<matplotlib.lines.Line2D at 0x10a9063d0>] is\
    \ a list with a handle to the memory location of the line that was plotted. For\
    \ example, the command plt.xlabel adds a text object and returns a handle to this\
    \ object. The properties of the item that the handle refers to can be modified\
    \ with the plt.setp command (although this is not done frequently in this book).\
    \ In the following example, the setp function is used to increase the line width\
    \ and color of the plotted line.\n\n```python\na = plt.plot([1, 2, 3])\nplt.setp(a,\
    \ color='hotpink', lw=4);\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_227_2.png)\n\
    \n212 Appendix A\n\nFigures can be saved to a file using `plt.savefig('/mydirectory/myfigure1.png')`\
    \ where `mydirectory` is the directory name. Forward slashes must be used to separate\
    \ directory names. The file type is inferred from the file extension (png, eps,\
    \ and svg).\n\nTwo-dimensional data can be visualized with a contour plot. For\
    \ example, consider the following function for the head $h$ as a function of the\
    \ horizontal coordinates $x$ and $y$\n\n$$h = \\frac{2}{\\pi} \\ln(x^2 + y^2)\
    \ - 0.01x - 5$$\n\nA contour plot of the head is created in a window with lower-left\
    \ corner $(x, y) = (-200, -200)$ and upper-right corner $(x, y) = (400, 200)$.\
    \ A grid of $(x, y)$ values is defined first using the `np.meshgrid` function,\
    \ which creates the two-dimensional arrays `x` and `y`. The head is computed at\
    \ each $(x, y)$ location. Before contouring, a figure is created with `plt.subplot`\
    \ and using the keyword `aspect=1` to make sure that the horizontal and vertical\
    \ axes have the same scale (so that a circle looks like a circle rather than an\
    \ ellipse). The head values are contoured with the `plt.contour` function; 20\
    \ head values are contoured.\n\n```python\nx, y = np.meshgrid(np.linspace(-200,\
    \ 400, 100), np.linspace(-200, 200, 100))\nh = 2 / np.pi * np.log(x ** 2 + y **\
    \ 2) - 0.01 * x - 5\nplt.subplot(111, aspect=1)\nplt.contour(x, y, h, 20);  #\
    \ draw 20 contour lines\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_228_0.png)\n\
    \nThe head values that are contoured can be specified with a list or array. First,\
    \ the minimum and maximum values of the computed head are found with the `np.min`\
    \ and `np.max` functions.\n\n```python\nprint('min:', np.min(h))\nprint('max:',\
    \ np.max(h))\n```\n\nmin: -4.1046611143428455\nmax: 4.18729839195133\n\nThe head\
    \ is contoured for values from -3 m up to 6 m with steps of 0.5 m. The handle\
    \ that is returned by the `plt.contour` function is stored and passed to the `plt.clabel`\
    \ function to plot labels along the contours. The format of the labels is specified\
    \ as `fmt='%.1f'`, which stands for floating point numbers with 1 decimal place.\n\
    \n```python\nplt.subplot(111, aspect=1)\ncs = plt.contour(x, y, h, np.arange(-3,\
    \ 6, 0.5), colors='C0')\nplt.clabel(cs, fmt='%.1f');\n```\n\nThe color of all\
    \ contour lines is specified as `colors='C0'`, and the contour lines for negative\
    \ values are, by default, dashed. This latter behavior can be overridden by specifying\
    \ the keyword argument `linestyles='-'` of `plt.contour` or by changing the value\
    \ of the default matplotlib parameter `contour.negative_linestyle` (see the matplotlib\
    \ documentation).\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_229_0.png)\n\n##\
    \ A.5 Functions\n\nFunctions are defined in Python with the def command. Functions\
    \ may be stored in files, or they can be typed in code cells in the notebook or\
    \ at the Python prompt in a console. The following function is implemented in\
    \ the Python function func_one below.\n\n$f(x) = \\cos(x) \\quad x < 0$\n$f(x)\
    \ = \\exp(-x) \\quad x \\geq 0$\n\n```python\ndef func_one(x):\n    if x < 0:\n\
    \        rv = np.cos(x)\n    else:\n        rv = np.exp(-x)\n    return rv\n```\n\
    \nThe name of the function is func_one (it is proper Python coding style to use\
    \ lowercase letters for functions and to separate words by underscores). The function\
    \ returns the value of the variable rv that is computed inside the function. Typing\
    \ func_one( followed by [Shift][Tab] in a code cell displays the input arguments\
    \ of the function (and any documentation, if provided). Calling the function returns\
    \ the desired values\n\n```python\nprint(func_one(1))\nprint(func_one(-1))\n```\n\
    \n0.36787944117144233\n0.5403023058681398\n\nThe function func_one cannot be called\
    \ with an array because of the if-else construct, which only works for single\
    \ numbers. There are two approaches to make func_one work on an input array. The\
    \ first and easiest way is to create a new function that vectorizes the func_one\
    \ function. The new function takes an array as its argument and simply calls the\
    \ func_one function for every value of the array and then returns an array. A\
    \ function may be vectorized with the np.vectorize function, which takes as input\
    \ argument a function to be vectorized and returns a function.\n\n```python\n\
    func_two = np.vectorize(func_one)\nfunc_two(np.arange(-2, 3)) # func_two can be\
    \ called with an array\n```\n\narray([-0.41614684, 0.54030231, 1. , 0.36787944,\
    \ 0.13533528])\n\nThe use of np.vectorize is easy, but not very fast. Behind the\
    \ scenes, the func_two function simply creates a loop and loops over all the values\
    \ in the array. Alternatively, the func_one function can be rewritten to accept\
    \ an array as input argument. The"
