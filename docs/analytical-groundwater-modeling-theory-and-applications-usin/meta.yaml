    ## 1.2 Areal recharge between two rivers


    The transmissivity of an unconfined aquifer may be approximated as constant and
    equal to $kH$ if the variation of the saturated thickness, caused by the change
    in water table elevation, is small compared to the total saturated thickness.
    In the following example, an unconfined aquifer is bounded on the left and right
    sides by two long parallel rivers that fully penetrate the aquifer (Figure 1.5).
    The rivers are a distance $L$ apart and in direct contact with the aquifer so
    that


    $$h|_{x=0} = h_0 \quad (1.20)$$

    $$h|_{x=L} = h_L \quad (1.21)$$


    Because $T$ is approximated as constant, the general equation (1.8) is still applicable
    and the integration constants for $N > 0$ are


    $$A = \frac{h_L - h_0}{L} + \frac{N}{2T}L \quad (1.22)$$

    $$B = h_0 \quad (1.23)$$


    so that the solution becomes


    $$h = -\frac{N}{2T}(x^2 - Lx) + \frac{(h_L - h_0)x}{L} + h_0 \quad (1.24)$$


    The discharge vector $Q_x$ is obtained by differentiation of Eq. (1.24) in combination
    with Eq. (1.6).


    $$Q_x = -T\frac{dh}{dx} = N\left(x - \frac{L}{2}\right) - T\frac{h_L - h_0}{L}
    \quad (1.25)$$


    The solution is computed below.


    ```python

    # parameters

    L = 1000 # aquifer length, m

    H = 10 # saturated thickness, m

    zb = -5 # aquifer bottom, m

    k = 10 # hydraulic conductivity, m/d

    n = 0.3 # porosity, -

    T = k * H # transmissivity, m^2/d

    h0 = 6 # specified head at the left boundary, m

    hL = 4 # specified head at the right boundary, m

    N = 0.001 # areal recharge, m/d

    ```


    ```python

    # solution

    x = np.linspace(0, L, 100)

    h = -N / (2 * T) * (x ** 2 - L * x) + (hL - h0) * x / L + h0

    Qx = N * (x - L / 2) - T * (hL - h0) / L

    ```


    ```python

    # basic plot

    plt.subplot(121)

    plt.plot(x, h)

    plt.subplot(122)

    plt.plot(x, Qx);

    ```


    Note that there is a groundwater divide between the two rivers (Figure 1.6). Part
    of the recharge flows to the left river, and part of the recharge flows to the
    right river. The discharge into the left river ($x = 0$) and the right river ($x
    = L$) are computed below. The flow into the left river plus the flow into the
    right river is exactly equal to the total recharge: $NL = 1$ m$^2$/d. At the water
    divide, the head gradient equals zero so that $Q_x = 0$.


    ```python

    print(f''discharge into left river: {-Qx[0]:.3f} m^2/d'')

    print(f''discharge into right river: {Qx[-1]:.3f} m^2/d'')

    ```


    discharge into left river: 0.300 m^2/d

    discharge into right river: 0.700 m^2/d


