    The slopes of the streamlines change at the toe of the interface in Figure 4.3.
    This is a consequence of the Dupuit approximation. The tip of the interface is
    at the top of the aquifer at the coastline. This means that there is no gap for
    the freshwater to discharge into the sea. That is rather unrealistic and a consequence
    of adoption of the Dupuit approximation. For a coastline with a vertical beach
    face, as shown here with a dotted line, there is always a vertical outflow zone.
    The freshwater head varies along a vertical outflow zone, because the pressure
    distribution in the saltwater is hydrostatic, so that the freshwater head in the
