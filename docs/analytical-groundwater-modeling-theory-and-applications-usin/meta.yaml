  md: '# Chapter 2


    # Steady one-dimensional semi-confined flow


    In semi-confined aquifers, the aquifer is capped by a leaky layer consisting of
    a low-permeable material such as peat, shale, or clay. This is in contrast to
    the confined aquifers considered in the previous chapter, which are capped by
    a layer that may be approximated as impermeable. The low-permeable layer is referred
    to as a semi-confining layer or a leaky layer. In what follows, the head above
    the leaky layer is fixed to a constant level $h^*$ (Figure 2.1). This can correspond
    to the head in an aquifer above the semi-confining layer, or the water level of
    a surface water body. The fixed head $h^*$ can also represent the mean water table
    in a drained area, where the water table is fixed by means of ditches or tile
    drains; such drained areas are sometimes referred to as polders. The fixed head
    $h^*$ in the drained area can be in the low-permeable top layer (Figure 2.1) or
    in a permeable layer separated from the aquifer by a leaky layer (Figure 2.2).


    ![](img/ca724f426a6249bf916ffe68c7fbe382_41_0.png)


    The specific discharge through the leaky layer is approximated as vertical and
    may be computed with Darcy''s law (Eq. 0.9) as


    $$q_z = -k^* \frac{\partial h}{\partial z} \approx -k^* \frac{h^* - h}{H^*}$$
    (2.1)


    where $h$ is the head in the aquifer, $h^*$ is the specified head at the top of
    the leaky layer, $k^*$ is the vertical hydraulic conductivity of the leaky layer,
    and $H^*$ is either the thickness of the leaky layer (left situation of Figure
    2.1) or the distance between the drainage level and the bottom of the low-permeable
    layer (right situation of Figure 2.1).


    The specific discharge through the leaky layer is positive for upward flow (in
    the positive $z$ direction) and may be written in the form


    $$q_z = \frac{h - h^*}{c}$$ (2.2)


    where $c$ [T] is the resistance to vertical flow of the leaky layer defined as


    $$c = H^* / k^*$$ (2.3)'
