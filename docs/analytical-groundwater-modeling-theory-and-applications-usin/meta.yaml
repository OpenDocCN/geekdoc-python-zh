  md: 'a more lasting learning experience. Therefore, especially novice students are
    encouraged to use this method and not immediately trust that they understand the
    worked examples in the notebooks. Hands-on exercises are provided and commonly
    require short Python scripts to be solved. Numerical answers to selected exercises
    are included at the end of the book.


    This book starts with a brief introduction of the principles of groundwater flow.
    This chapter is assigned number 0 to remind the reader that Python uses a zero-based
    numbering system. All other numbering in this book starts at 1. The remainder
    of this book consists of two parts, each consisting of five chapters. The first
    part concerns one-dimensional flow while the second part concerns two-dimensional
    flow. A variety of flow systems are discussed, including confined, unconfined,
    semi-confined, and multi-aquifer flow. Both steady and transient flow are considered.
    Most examples include evaluation of both the head and the flow, sometimes including
    travel times. Special attention is paid to interface flow in coastal aquifers.


    For each solution, at least three code blocks are presented. The first code block
