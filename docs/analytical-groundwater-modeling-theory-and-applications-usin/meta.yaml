    The total inflow over a period $\Delta t$ is


    $$Q_{\text{in}} = \int_{t_0}^{t_0+\Delta t} Q_x|_{x=0,t} = 2\Delta h \sqrt{\frac{ST\Delta
    t}{\pi}}$$ (5.24)


    The total increase in the storage may be computed through numerical integration
    along $x$ of the head in the aquifer at $t = \Delta t$ and multiplication by the
    storage coefficient. The integration may be carried out, for example, by using
    the quad method of scipy.integrate. The total increase in storage must equal the
    total inflow, as is verified below.


    ```

    delt = 10 # time period for which water balance is checked

    Qin = 2 * delh * np.sqrt(S * T * delt / (np.pi))

    from scipy.integrate import quad

    stored = S * quad(h_edelman, 1e-12, np.infty, args=(delt, T, S, delh, 0))[0]

    print(f''total inflow from river  : {Qin:.6f} m^3'')

    print(f''total increase in storage: {stored:.6f} m^3'')

    ```


    total inflow from river  : 3.191538 m^3

    total increase in storage: 3.191538 m^3


    As the governing differential equation (5.8) is linear, solutions may be superimposed
    through time. For example, if the water level in the river is raised by $\Delta
    h_0$ at time $t_0$ and then again by another $\Delta h_1$ at time $t_1$ (where
    $t_1 > t_0$), then the transient solution is


    $h(x,t) = \Delta h_0 \text{erfc}(u_0) \quad t_0 \le t \le t_1$ (5.25)

    $h(x,t) = \Delta h_0 \text{erfc}(u_0) + \Delta h_1 \text{erfc}(u_1) \quad t \ge
    t_1$ (5.26)


    where


    $u_0 = \sqrt{\frac{Sx^2}{4T(t-t_0)}} \quad u_1 = \sqrt{\frac{Sx^2}{4T(t-t_1)}}$
    (5.27)


    Consider the following sequence of four steps delh in the river level starting
    at four different times t0.


    ```

    delh = np.array([1, 1, -2, 1]) # sequence of river stage changes, m

    t0 = np.array([0, 10, 20, 30]) # sequence of times of changes, d

    ```


    The transient solution is obtained through superposition of four changes in the
    river level. A loop is used to compute and plot the head vs. time at 10 and 100
    m from the river (Figure 5.5).'
- md: "## 5.2 Periodic changes in surface water level\n\nPeriodic head variations\
    \ in an aquifer may be caused by, e.g., tides, seasonal fluctuations, or the periodic\
    \ operation of dams. The surface water level variation is approximated here as\
    \ a sinusoidal fluctuation with one specific amplitude and one specific period.\
    \ Surface water level variations can commonly be expressed as a combination of\
    \ several sinusoidal fluctuations with their own amplitude and period; the response\
    \ to such a combined variation may be computed through superposition.\n\nConsider\
    \ one-dimensional flow in a semi-infinite aquifer (see Figure 5.6). There is no\
    \ areal recharge and no flow at infinity\n\n$$\\frac{\\partial h}{\\partial x}\\\
    bigg|_{x \\to \\infty, t} = 0 \\quad (5.32)$$\n\nThe transmissivity $T$ of the\
    \ aquifer is approximated as constant. The aquifer is bounded by open water at\
    \ $x = 0$, which fluctuates as\n\n$$h|_{x=0, t} = A \\cos\\left(\\frac{2\\pi(t\
    \ - t_p)}{\\tau}\\right) \\quad (5.33)$$\n\nwhere $A$ is the amplitude of the\
    \ fluctuation, $t_p$ is the time of the peak, and $\\tau$ is the period of the\
    \ fluctuation. There is no initial condition; that is, the head at $x = 0$ has\
    \ fluctuated as (5.33) forever (in practice, for a long time).\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_93_0.png)\n\
    \nThe solution to the stated problem may be obtained with separation of variables\
    \ and was first published by Forchheimer (1919, p. 1229). It turns out that the\
    \ head response in the aquifer may be written in the same form as the head variation\
    \ in the surface water, but the amplitude $B$ of the variation is smaller than\
    \ $A$ and the peak arrives $t_s$ later (Jacob, 1950, p. 365)\n\n$$h(x, t) = B\
    \ \\cos[2\\pi(t - t_p - t_s)/\\tau]$$\n\nThe amplitude $B$ of the head variation\
    \ dampens with distance as\n\n$$B = A \\exp\\left(-x\\sqrt{\\frac{S\\pi}{T\\tau}}\\\
    right)$$\n\nand the time shift $t_s$ of the peak is\n\n$$t_s = x\\sqrt{\\frac{S\\\
    tau}{4\\pi T}}$$\n\nNote that both the amplitude $B$ and the phase shift $t_s$\
    \ are a function of the diffusivity $T/S$. This means that when the amplitude\
    \ and peak time of a tidal response are measured to estimate aquifer parameters,\
    \ only the aquifer diffusivity can be estimated, not the individual values of\
    \ $S$ or $T$. Estimation of (combinations of) aquifer parameters from the tidal\
    \ response is also referred to as the tidal method (e.g., Ferris, 1952; Carr and\
    \ Van Der Kamp, 1969).\n\nEquation (5.35) shows that the amplitude $B$ dampens\
    \ out more quickly for shorter tidal periods than for longer tidal periods. The\
    \ characteristic length $\\mu$ is introduced as\n\n$$\\mu = \\sqrt{\\frac{T\\\
    tau}{S\\pi}}$$\n\nso that the amplitude may be written as\n\n$$B = A e^{-x/\\\
    mu}$$\n\nAt a distance of $x = 3\\mu$, the amplitude has dampened to 5% of the\
    \ amplitude at $x = 0$. This result may be used as a rule of thumb to assess whether\
    \ periodic fluctuations in surface water levels need to be taken into account\
    \ when considering the head and flow in an aquifer. If the area of interest is\
    \ farther away from a surface water body than $3\\mu$, periodic fluctuations of\
    \ the surface water level with a period of $\\tau$ may be neglected.\n\nAs an\
    \ example, consider an aquifer bounded by a tidal river. The head in the aquifer\
    \ is plotted at four different times during one tidal period (Figure 5.7). The\
    \ amplitude in the river is set to 1 m. The head variation is bounded by the amplitude\
    \ $B$, which is shown with the dashed line.\n\n```python\n# parameters\nT = 1000\
    \ # transmissivity, m^2/d\nS = 0.1 # storage coefficient, -\ntau = 0.5 # tidal\
    \ period, d\ntp = 0 # time of peak at canal, d\nmu = np.sqrt(T * tau / (S * np.pi))\
    \ # characteristic length, m\nprint(f'characteristic length: {mu:.2f} m')\n```\n\
    \ncharacteristic length: 39.89 m\n\n```python\n# solution for unit amplitude\n\
    def head(x, t, tau, S, T, tp=0, t0=0):\n    B = np.exp(-x * np.sqrt(S * np.pi\
    \ / (T * tau)))\n    ts = x * np.sqrt(S * tau / (4 * np.pi * T))\n    return B\
    \ * np.cos(2 * np.pi * (t - tp - ts) / tau)\n```\n\n```python\n# basic plot\n\
    x = np.linspace(0, 200, 100)\nfor t in np.arange(0, tau, tau / 4):\n    h = head(x,\
    \ t, tau, S, T, tp)\n    plt.plot(x, h)\nplt.plot(x, np.exp(-x / mu), 'k--')\n\
    plt.plot(x, -np.exp(-x / mu), 'k--');\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_95_0.png)\n\
    \nNatural tidal fluctuations consist of a number of tidal components, each with\
    \ its own period and phase lag. As an example, the response is presented to a\
    \ tidal fluctuation consisting of two components. The first component is a semidiurnal\
    \ component with a period of 745 minutes (referred to as component M2 in the system\
    \ of tides); the amplitude of M2 is 1 m. The second component is a diurnal component\
    \ with a period of 1549 minutes (referred to as component O1). The amplitude of\
    \ O1 is 0.4 m, and the phase lag compared to M2 is 100 minutes. The solution is\
    \ obtained through superposition of two solutions (5.34). The head fluctuation\
    \ is computed at the shoreline and in three observation wells at three different\
    \ distances from the coast line (Figure 5.8).\n\nThe presence of just two components\
    \ causes the head fluctuation to become already quite complicated. Note that the\
    \ limits of the vertical axes vary between the four graphs in Figure 5.8. The\
    \ head fluctuates more than 2 m at the coast, while the variation at $x = 300$\
    \ m is only 5 mm. Component M2 damps out quicker than O1 as the period of M2 is\
    \ smaller than the period of O1. The tidal fluctuation has two clear peaks near\
    \ the coast, while there is only one clear peak farther away from the coast.\n\
    \n```python\n# parameters\ntau1 = 745 / (24 * 60) # M2 period, d\ntau2 = 1549\
    \ / (24 * 60) # O1 period, d\ntp1 = 0 # time of peak M2, d\ntp2 = 100 / (24 *\
    \ 60) # time of peak of O1, d\nmu1 = np.sqrt(T * tau1 / (S * np.pi)) # characteristic\
    \ length M2, m\nmu2 = np.sqrt(T * tau2 / (S * np.pi)) # characteristic length\
    \ O1, m\nprint(f'characteristic length M2: {mu1:.2f} m')\nprint(f'characteristic\
    \ length O1: {mu2:.2f} m')\n```\n\ncharacteristic length M2: 40.58 m\ncharacteristic\
    \ length O1: 58.52 m\n\nAn interesting practical application is the analysis of\
    \ the passage of a flood wave in the river. The river stage is raised by $\\Delta\
    \ h$ for a period of $\\Delta t$, after which the level goes back to the initial\
    \ level. The head rise in the aquifer is obtained from superposition as\n\n$$h(x,\
    \ t) = \\Delta h[\\text{erfc}(u_0) - \\text{erfc}(u_1)] \\quad t \\ge \\Delta\
    \ t \\tag{5.28}$$\n\nwhere\n\n$$u_0 = \\sqrt{\\frac{Sx^2}{4Tt}} \\quad u_1 = \\\
    sqrt{\\frac{Sx^2}{4T(t - \\Delta t)}} \\tag{5.29}$$\n\nThe analysis of the groundwater\
    \ response to a flood wave to estimate aquifer properties is sometimes referred\
    \ to as the flood wave method. In this case, solution (5.28) may be fitted to\
    \ estimate the aquifer diffusivity.\n\nThe groundwater response to a flood wave\
    \ declines with the distance from the river. The distance from the river where\
    \ the response is negligible (for example, a fraction of $\\Delta h$) may be computed\
    \ from solution (5.28), but that requires a numerical root-finding procedure.\
    \ In practice, the distance where the maximum head response is a fraction $\\\
    alpha$ of the height of the flood wave may be estimated with\n\n$$x \\approx \\\
    sqrt{\\frac{T \\Delta t}{S \\alpha}} \\tag{5.30}$$\n\nFor example, a maximum response\
    \ of $0.01 \\Delta h$ ($\\alpha = 0.01$) is reached at $x \\approx 10\\sqrt{T\\\
    Delta t/S}$. The time at which the maximum occurs is\n\n$$t_{\\text{peak}} = \\\
    frac{Sx^2}{6T} \\quad (5.31)$$\n\nThe assessment of the accuracy of the approximate\
    \ formula (5.30) is part of the exercises below.\n\n**Exercise 5.4:** Consider\
    \ a flood wave that passes through the river with $\\Delta h = 2$ m and $\\Delta\
    \ t = 10$ d. Other parameters are as in the example. Use the approximate formula\
    \ (5.30) to estimate the location where the head response is $0.01 \\Delta h$.\
    \ At this location, plot the head variation vs. time. Make sure that time varies\
    \ from 0 to $5t_{\\text{peak}}$. Assess whether the approximate formula works\
    \ reasonably well by computing the actual maximum head at the location computed\
    \ with the approximate formula.\n\n**Exercise 5.5:** For the flood wave of the\
    \ previous exercise, compute and plot the total amount of water stored in the\
    \ aquifer (on one side of the river) vs. time, for time going from 0 to $10\\\
    Delta t$. How much water is stored in the river bank at $t = \\Delta t = 10$ d?\
    \ And how much at $t = 4\\Delta t = 40$ d?\n\n```python\n# solution\nt = np.linspace(1e-3,\
    \ 40, 400) # start just after t=0\nh10 = np.zeros(len(t))\nh100 = np.zeros(len(t))\n\
    for i in range(len(t0)):\n    h10[t > t0[i]] += h_edelman(10, t[t > t0[i]], T,\
    \ S, delh[i], t0[i])\n    h100[t > t0[i]] += h_edelman(100, t[t > t0[i]], T, S,\
    \ delh[i], t0[i])\n```\n\n```python\n# basic plot head (bottom graph)\nplt.plot(t,\
    \ h10, label='x=10 m')\nplt.plot(t, h100, label='x=100 m')\nplt.legend();\n```\n\
    \n![](img/ca724f426a6249bf916ffe68c7fbe382_92_0.png)"
  mdcn: "## 5.2 地表水位的周期性变化\n\n含水层中的周期性水头变化可能由潮汐、季节性波动或水坝的周期性运行等原因引起。此处将地表水位变化近似为具有特定振幅和特定周期的正弦波动。地表水位变化通常可以表示为多个具有各自振幅和周期的正弦波动的组合；对这种组合变化的响应可以通过叠加原理计算。\n\
    \n考虑一个半无限含水层中的一维流动（见图5.6）。没有面状补给，且在无穷远处没有流动：\n\n$$\\frac{\\partial h}{\\partial\
    \ x}\\bigg|_{x \\to \\infty, t} = 0 \\quad (5.32)$$\n\n含水层的导水系数 $T$ 近似为常数。含水层在\
    \ $x = 0$ 处以开放水体为界，其波动为：\n\n$$h|_{x=0, t} = A \\cos\\left(\\frac{2\\pi(t - t_p)}{\\\
    tau}\\right) \\quad (5.33)$$\n\n其中 $A$ 是波动的振幅，$t_p$ 是峰值时间，$\\tau$ 是波动的周期。没有初始条件；也就是说，$x\
    \ = 0$ 处的水头自古以来（实际上是很长时间以来）一直按照式(5.33)波动。\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_93_0.png)\n\
    \n所述问题的解可以通过分离变量法获得，并由Forchheimer首次发表（1919, p. 1229）。结果表明，含水层中的水头响应可以写成与地表水水头变化相同的形式，但变化的振幅\
    \ $B$ 小于 $A$，且峰值到达时间延迟了 $t_s$（Jacob, 1950, p. 365）：\n\n$$h(x, t) = B \\cos[2\\\
    pi(t - t_p - t_s)/\\tau]$$\n\n水头变化的振幅 $B$ 随距离衰减，其关系为：\n\n$$B = A \\exp\\left(-x\\\
    sqrt{\\frac{S\\pi}{T\\tau}}\\right)$$\n\n峰值的时间偏移 $t_s$ 为：\n\n$$t_s = x\\sqrt{\\\
    frac{S\\tau}{4\\pi T}}$$\n\n注意，振幅 $B$ 和相位偏移 $t_s$ 都是导压系数 $T/S$ 的函数。这意味着，当测量潮汐响应的振幅和峰值时间来估算含水层参数时，只能估算出含水层的导压系数，而无法单独得到\
    \ $S$ 或 $T$ 的值。根据潮汐响应估算含水层参数（的组合）也被称为潮汐法（例如，Ferris, 1952; Carr and Van Der Kamp,\
    \ 1969）。\n\n式(5.35)表明，对于较短的潮汐周期，振幅 $B$ 比较长的潮汐周期衰减得更快。引入特征长度 $\\mu$：\n\n$$\\mu\
    \ = \\sqrt{\\frac{T\\tau}{S\\pi}}$$\n\n这样振幅可以写成：\n\n$$B = A e^{-x/\\mu}$$\n\n\
    在距离 $x = 3\\mu$ 处，振幅已衰减至 $x = 0$ 处振幅的5%。这个结果可以作为一个经验法则，用于评估在考虑含水层中的水头和流动时，是否需要考虑地表水位的周期性波动。如果研究区域距离地表水体的距离大于\
    \ $3\\mu$，则可以忽略周期为 $\\tau$ 的地表水位周期性波动。\n\n例如，考虑一个以潮汐河流为界的含水层。在一个潮汐周期内的四个不同时间点绘制了含水层中的水头（图5.7）。河流中的振幅设为1米。水头变化被振幅\
    \ $B$ 所限定，图中用虚线表示。\n\n```python\n# parameters\nT = 1000 # transmissivity, m^2/d\n\
    S = 0.1 # storage coefficient, -\ntau = 0.5 # tidal period, d\ntp = 0 # time of\
    \ peak at canal, d\nmu = np.sqrt(T * tau / (S * np.pi)) # characteristic length,\
    \ m\nprint(f'characteristic length: {mu:.2f} m')\n```\n\ncharacteristic length:\
    \ 39.89 m\n\n```python\n# solution for unit amplitude\ndef head(x, t, tau, S,\
    \ T, tp=0, t0=0):\n    B = np.exp(-x * np.sqrt(S * np.pi / (T * tau)))\n    ts\
    \ = x * np.sqrt(S * tau / (4 * np.pi * T))\n    return B * np.cos(2 * np.pi *\
    \ (t - tp - ts) / tau)\n```\n\n```python\n# basic plot\nx = np.linspace(0, 200,\
    \ 100)\nfor t in np.arange(0, tau, tau / 4):\n    h = head(x, t, tau, S, T, tp)\n\
    \    plt.plot(x, h)\nplt.plot(x, np.exp(-x / mu), 'k--')\nplt.plot(x, -np.exp(-x\
    \ / mu), 'k--');\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_95_0.png)\n\n\
    天然的潮汐波动由多个潮汐分量组成，每个分量都有自己的周期和相位滞后。例如，这里展示了对一个由两个分量组成的潮汐波动的响应。第一个分量是半日分量，周期为745分钟（在潮汐系统中称为M2分量）；M2的振幅为1米。第二个分量是全日分量，周期为1549分钟（称为O1分量）。O1的振幅为0.4米，与M2相比的相位滞后为100分钟。解是通过叠加两个解(5.34)得到的。计算了在海岸线以及距离海岸线三个不同距离的三个观测井中的水头波动（图5.8）。\n\
    \n仅仅两个分量的存在就使得水头波动变得相当复杂。注意图5.8中四个图的纵轴范围各不相同。在海岸处，水头波动超过2米，而在 $x = 300$ 米处的变化仅为5毫米。由于M2的周期小于O1的周期，M2分量比O1分量衰减得更快。潮汐波动在靠近海岸处有两个明显的峰值，而在远离海岸处只有一个明显的峰值。\n\
    \n```python\n# parameters\ntau1 = 745 / (24 * 60) # M2 period, d\ntau2 = 1549\
    \ / (24 * 60) # O1 period, d\ntp1 = 0 # time of peak M2, d\ntp2 = 100 / (24 *\
    \ 60) # time of peak of O1, d\nmu1 = np.sqrt(T * tau1 / (S * np.pi)) # characteristic\
    \ length M2, m\nmu2 = np.sqrt(T * tau2 / (S * np.pi)) # characteristic length\
    \ O1, m\nprint(f'characteristic length M2: {mu1:.2f} m')\nprint(f'characteristic\
    \ length O1: {mu2:.2f} m')\n```\n\ncharacteristic length M2: 40.58 m\ncharacteristic\
    \ length O1: 58.52 m\n\n一个有趣的实际应用是分析河流中洪水波的传播。河流水位在 $\\Delta t$ 时间内升高了 $\\Delta\
    \ h$，之后水位恢复到初始水平。含水层中的水头上升通过叠加得到：\n\n$$h(x, t) = \\Delta h[\\text{erfc}(u_0) -\
    \ \\text{erfc}(u_1)] \\quad t \\ge \\Delta t \\tag{5.28}$$\n\n其中\n\n$$u_0 = \\\
    sqrt{\\frac{Sx^2}{4Tt}} \\quad u_1 = \\sqrt{\\frac{Sx^2}{4T(t - \\Delta t)}} \\\
    tag{5.29}$$\n\n分析地下水对洪水波的响应以估算含水层性质的方法有时被称为洪水波法。在这种情况下，可以拟合解(5.28)来估算含水层的导压系数。\n\
    \n地下水对洪水波的响应随着与河流距离的增加而减弱。响应可以忽略不计（例如，为 $\\Delta h$ 的一小部分）的距离可以从解(5.28)计算，但这需要数值求根过程。在实践中，最大水头响应为洪水波高度\
    \ $\\alpha$ 倍的距离可以用下式估算：\n\n$$x \\approx \\sqrt{\\frac{T \\Delta t}{S \\alpha}}\
    \ \\tag{5.30}$$\n\n例如，最大响应为 $0.01 \\Delta h$（$\\alpha = 0.01$）的位置大约在 $x \\approx\
    \ 10\\sqrt{T\\Delta t/S}$ 处。最大值出现的时间为：\n\n$$t_{\\text{peak}} = \\frac{Sx^2}{6T}\
    \ \\quad (5.31)$$\n\n评估近似公式(5.30)的准确性是下面练习的一部分。\n\n**练习5.4：** 考虑一个通过河流的洪水波，$\\\
    Delta h = 2$ 米，$\\Delta t = 10$ 天。其他参数与示例相同。使用近似公式(5.30)估算水头响应为 $0.01 \\Delta\
    \ h$ 的位置。在该位置，绘制水头随时间的变化图。确保时间从0变化到 $5t_{\\text{peak}}$。通过计算近似公式所确定位置的实际最大水头，评估近似公式是否合理有效。\n\
    \n**练习5.5：** 对于上一个练习中的洪水波，计算并绘制含水层（河流一侧）中储存的总水量随时间的变化，时间从0到 $10\\Delta t$。在 $t\
    \ = \\Delta t = 10$ 天时，河岸储存了多少水？在 $t = 4\\Delta t = 40$ 天时呢？\n\n```python\n# solution\n\
    t = np.linspace(1e-3, 40, 400) # start just after t=0\nh10 = np.zeros(len(t))\n\
    h100 = np.zeros(len(t))\nfor i in range(len(t0)):\n    h10[t > t0[i]] += h_edelman(10,\
    \ t[t > t0[i]], T, S, delh[i], t0[i])\n    h100[t > t0[i]] += h_edelman(100, t[t\
    \ > t0[i]], T, S, delh[i], t0[i])\n```\n\n```python\n# basic plot head (bottom\
    \ graph)\nplt.plot(t, h10, label='x=10 m')\nplt.plot(t, h100, label='x=100 m')\n\
    plt.legend();\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_92_0.png)"
