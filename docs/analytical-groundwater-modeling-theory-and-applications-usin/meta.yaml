  md: "Here, some of the functionalities of scipy are demonstrated, including root-finding,\
    \ minimization, special functions, and numerical integration.\n\nThe function\
    \ fsolve from the scipy.optimize package can be used to find the root or roots\
    \ of a function. In the code cell below, the root of the function $f(x) = e^{x/5}\
    \ - 2$ is found numerically using the fsolve function (it can, for this case,\
    \ also be computed analytically, of course). A starting value for the numerical\
    \ search must be supplied. The closer the starting value to the root, the more\
    \ likely (and the quicker) fsolve finds the root.\n\n```\ndef ffunc(x):\n    return\
    \ np.exp(x / 5) - 2\n\nfrom scipy.optimize import fsolve\nxroot = fsolve(ffunc,\
    \ x0=0) # start searching at x0=0\nprint(f'root={xroot}, function value={ffunc(xroot)}')\n\
    ```\n\nroot=[3.4657359], function value=[2.7533531e-14]\n\nNext, three points\
    \ are found where $f(x)$ intersects the function $g(x) = \\sin(x)$. The function\
    \ fdiff computes the difference between $f(x)$ and $g(x)$, and fsolve is used\
    \ to find three roots of fdiff for three different starting locations; that is,\
    \ fsolve finds three points where the two functions intersect.\n\n```\ndef gfunc(x):\n\
    \    return 3 * np.sin(x)\n\ndef fdiff(x):\n    return ffunc(x) - gfunc(x)\n\n\
    x_intersect = fsolve(fdiff, np.array([3, 6, 9])) # 3 starting points\nx = np.linspace(0,\
    \ 3 * np.pi)\nplt.plot(x, ffunc(x), label=\"f(x)\")\nplt.plot(x, gfunc(x), label=\"\
    g(x)\")\nplt.plot(x_intersect, ffunc(x_intersect), 'k.')\nplt.legend();\n```\n\
    \n![](img/ca724f426a6249bf916ffe68c7fbe382_233_0.png)\n\nThe minimum of a function\
    \ may be found with the fmin function of scipy.optimize. The code cell below finds\
    \ the x-location where the difference between the functions $g(x)$ and $h(x) =\
    \ e^{x/5} + 2$ is the smallest, starting the search at $x = 1.5$.\n\n```\ndef\
    \ hfunc(x):\n    return np.exp(x/5) + 2\n\ndef fdiff(x):\n    return hfunc(x)\
    \ - gfunc(x)\n```"
