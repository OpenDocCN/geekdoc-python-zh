    The flow field in a vertical cross section may be visualized using the streamplot
    function of matplotlib, which takes as input a two-dimensional grid of points,
    and for each grid'
- md: 'point, the horizontal and vertical components of the specific discharge vector.
    The horizontal component of the specific discharge vector $q_x$ is computed from
    the discharge vector $Q_x$ as


    $$q_x = \frac{Q_x}{H} = -k \frac{h_L - h_0}{L}$$


    and does not vary in the vertical direction. The vertical component of the specific
    discharge vector $q_z$ equals zero. The streamplot function draws lines in the
    direction of the flow and adds arrows to indicate the direction of flow. For this
    case with constant flow, a small grid of 2 by 2 is sufficient. The vertical exaggeration
    is set with the aspect keyword of the subplot function. The vertical exaggeration
    is noted as “VE” in the label of the vertical axis (Figure 1.4).


    ```python

    # solution

    xg, zg = np.meshgrid(np.linspace(0, L, 2), np.linspace(zb, zb + H, 2))

    qx = -k * (hL - h0) / L * np.ones_like(xg)

    qz = np.zeros_like(xg)

    ```


    ```python

    # basic streamplot

    plt.subplot(111, aspect=25)

    plt.streamplot(xg, zg, qx, qz, color=''C1'', density=0.2);

    ```


    The (average) velocity in the horizontal direction $v_x$ is obtained through division
    of $q_x$ by the porosity $n$ (obviously, the velocity in the vertical direction
    $v_z$ is zero). For this simple problem, the (average) travel time from the left
    river to the right river can be computed as $L/v_x$. More formally, the travel
    time can be obtained from the definition of the horizontal velocity vector


    $$v_x = \frac{q_x}{n} = \frac{dx}{dt}$$


    Integration gives the travel time $t_{\text{tr}}$


    $$\int_{0}^{t_{\text{tr}}} dt = \int_{0}^{L} \frac{dx}{v_x} = \int_{0}^{L} -\frac{Ln}{k(h_L
    - h_0)} dx \quad (1.18)$$


    which gives


    $$t_{\text{tr}} = \frac{L^2 n}{k(h_0 - h_L)} = \frac{L}{v_x} \quad (1.19)$$


    ```python

