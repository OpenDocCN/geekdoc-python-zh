    ![](img/ca724f426a6249bf916ffe68c7fbe382_32_0.png)


    A second method to visualize the two-dimensional flow field in a vertical cross
    section is to compute and contour the stream function. The stream function is
    a function that is constant along streamlines. The difference of the stream function
    values between two points is equal to the amount of water flowing between the
    two points, and the value of the stream function increases to the right when looking
    in the direction of flow.


    The stream function in a vertical cross section is denoted with the small Greek
    letter psi, $\psi$ [$L^2/T$]. Here, $\psi$ is arbitrarily set to zero along the
    impermeable base of the aquifer, as the impermeable base is a streamline. As a
    result, the stream function value along the top of the aquifer is equal to $\psi
    = -Q_x$ so that the difference between the stream function values along the bottom
    and top of the aquifer is always equal to the discharge $Q_x$ in the aquifer.
    The stream function value along the top of the aquifer is $-Q_x$ and not $Q_x$,
    because of the convention that the stream function increases to the right when
    looking in the direction of flow.'
