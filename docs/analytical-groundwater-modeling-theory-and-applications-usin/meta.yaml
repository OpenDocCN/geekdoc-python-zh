    One approach to solving this problem is to write one solution for the head in
    the confined part of the aquifer and a separate solution for the head in the unconfined
    part and then try to find the point where flow changes from confined to unconfined.
    This is possible, but the use of the discharge potential provides an easier way.
    The discharge potential was already defined for unconfined flow, but not yet for
    confined flow. For confined flow, the discharge vector may be written as


    $$Q_x = -kH \frac{dh}{dx} = -\frac{d}{dx}(kHh) = -\frac{d\Phi}{dx} \quad (3.30)$$


    where both $k$ and $H$ are constant. The discharge potential for confined flow
    is defined as


    $$\Phi = kHh + C \quad (3.31)$$


    where $C$ is an arbitrary constant. When the flow is purely confined, the constant
    $C$ can be set to zero, but when the flow is confined in parts of the aquifer
    and unconfined in other parts of the aquifer, the constant $C$ must be picked
    differently, as explained in the following.


    Now that both confined flow and unconfined flow are formulated as potential flow,
    the discharge vector may be written as Eq. (3.3), the governing differential equation
    is the Poisson equation (3.5), and the general solution for one-dimensional steady
    potential flow is Eq. (3.6). This means that the discharge potential is a continuous
    function of $x$, irrespective of whether the flow is confined or unconfined. The
    discharge potential must be converted to a head that is also a continuous function
    of $x$ (as the head cannot suddenly jump up or down without a physical barrier
    to flow). This is achieved by proper selection of the constant $C$ in Eq. (3.31).
    At the point where the flow transitions from confined to unconfined, the head
    in the aquifer'
