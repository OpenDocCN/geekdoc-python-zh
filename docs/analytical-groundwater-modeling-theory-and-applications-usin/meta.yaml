    \ $u < 0.1$ 时给出良好的结果，对于这种情况和该位置，这对应于 $t > 0.01$ 天。\n\n```python\n# parameters\n\
    T = 200 # transmissivity, m^2/d\nS = 2E-3 # storage coefficient, -\nrw = 0.3 #\
