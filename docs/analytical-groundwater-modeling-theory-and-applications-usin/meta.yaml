    ![](img/ca724f426a6249bf916ffe68c7fbe382_86_0.png)


    In the limit for $\Delta x \rightarrow 0$ and $\Delta t \rightarrow 0$, the volume
    balance turns into the differential equation for transient one-dimensional horizontal
    transient flow


    $$\frac{\partial Q_x}{\partial x} = -S \frac{\partial h}{\partial t} + N \quad
    (5.5)$$


    The discharge vector for transient flow is the same as that for steady flow (Eq.
    1.6)


    $$Q_x = -T \frac{\partial h}{\partial x} \quad (5.6)$$


    Recall that for confined flow, $T$ is the constant transmissivity of the aquifer.
    For unconfined flow, the head-dependent transmissivity is approximated by a constant
    effective transmissivity $T = kH$, where the saturated thickness $H$ is approximated
    as constant.


    Substitution of Eq. (5.6) for $Q_x$ in Eq. (5.5) gives


    $$\frac{\partial^2 h}{\partial x^2} = \frac{S}{T} \frac{\partial h}{\partial t}
    - \frac{N}{T} \quad (5.7)$$


    When the areal recharge equals zero, the governing differential equation reduces
    to


    $$\frac{\partial^2 h}{\partial x^2} = \frac{S}{T} \frac{\partial h}{\partial t}
    \quad (5.8)$$


    This equation is known as the diffusion equation; the term $T/S$ is also referred
    to as the aquifer diffusivity. The diffusion equation governs the transient behavior
    of many other physical processes.


    Solutions for transient groundwater flow are, not surprisingly, more difficult
    to obtain than those for steady flow. Common mathematical approaches include similarity
    solutions, separation of variables, Fourier series, and Laplace transforms. An
    introduction into many of these mathematical solution techniques for hydrological
    applications may be found in, e.g., Bruggeman (1999). In this chapter, solutions
    are presented without derivation. Verification of the solutions is discussed and
    part of the exercises. Solutions are presented for three problems: the response
    to a change in the surface water level in a semi-infinite aquifer (Section 5.1),
    the tidal response in a semi-infinite aquifer (Section 5.2), and the response
    to transient recharge between two parallel rivers (Section 5.3). The problem of
    Section 5.1 is resolved using the Laplace transform approach in Section 5.4, and
    a brief introduction into the (numerical) evaluation of Laplace transform solutions
    is presented. In the final section of this chapter, a solution to the Boussinesq
    equation for transient unconfined flow is presented.


    # 5.1 Step changes in surface water level


    Changes in river stage propagate as head changes in aquifers that are in contact
    with the river, which is important for understanding surface water–groundwater
    interactions. The following example considers one-dimensional transient flow in
    a semi-infinite aquifer as shown in'
