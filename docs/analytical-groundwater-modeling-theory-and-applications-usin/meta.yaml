    \ rise in the aquifer is obtained from superposition as\n\n$$h(x, t) = \\Delta\
    \ h[\\text{erfc}(u_0) - \\text{erfc}(u_1)] \\quad t \\ge \\Delta t \\tag{5.28}$$\n\
    \nwhere\n\n$$u_0 = \\sqrt{\\frac{Sx^2}{4Tt}} \\quad u_1 = \\sqrt{\\frac{Sx^2}{4T(t\
    \ - \\Delta t)}} \\tag{5.29}$$\n\nThe analysis of the groundwater response to\
    \ a flood wave to estimate aquifer properties is sometimes referred to as the\
    \ flood wave method. In this case, solution (5.28) may be fitted to estimate the\
    \ aquifer diffusivity.\n\nThe groundwater response to a flood wave declines with\
    \ the distance from the river. The distance from the river where the response\
    \ is negligible (for example, a fraction of $\\Delta h$) may be computed from\
    \ solution (5.28), but that requires a numerical root-finding procedure. In practice,\
    \ the distance where the maximum head response is a fraction $\\alpha$ of the\
    \ height of the flood wave may be estimated with\n\n$$x \\approx \\sqrt{\\frac{T\
    \ \\Delta t}{S \\alpha}} \\tag{5.30}$$"
