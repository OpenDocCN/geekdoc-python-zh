    A second method to visualize the two-dimensional flow field in a vertical cross
    section is to compute and contour the stream function. The stream function is
    a function that is constant along streamlines. The difference of the stream function
    values between two points is equal to the amount of water flowing between the
    two points, and the value of the stream function increases to the right when looking
    in the direction of flow.


    The stream function in a vertical cross section is denoted with the small Greek
    letter psi, $\psi$ [$L^2/T$]. Here, $\psi$ is arbitrarily set to zero along the
    impermeable base of the aquifer, as the impermeable base is a streamline. As a
    result, the stream function value along the top of the aquifer is equal to $\psi
    = -Q_x$ so that the difference between the stream function values along the bottom
    and top of the aquifer is always equal to the discharge $Q_x$ in the aquifer.
    The stream function value along the top of the aquifer is $-Q_x$ and not $Q_x$,
    because of the convention that the stream function increases to the right when
    looking in the direction of flow.


    A contour plot of the stream function is shown in Figure 1.9. It is created by
    defining an array psi of the stream function. The stream function is computed
    at a number of points along the bottom and top of the aquifer. The contouring
    routine interpolates linearly between the stream function computed along the top
    and bottom of the aquifer. This is exactly correct for this problem, as this means
    that the discharge is divided equally over the vertical. The amount of flow between
    two adjacent streamlines is always the same when a constant contouring interval
    is used (this is not the case for the lines obtained with the streamplot function
    used previously), so when two streamlines are closer together, water flows faster.
    In this case, the flow between two adjacent streamlines is $NL/20$, as 20 contour
    intervals are plotted. The streamlines are evenly spaced every 50 m at the top
    of the aquifer, as the inflow is equal to $q_z = -N$ there and $L = 1000$ m. The
    vertical streamline that goes through the water divide is the dividing streamline
    and corresponds to a stream function value $\psi = 0$ (as this streamline continues
    along the bottom of the aquifer). The outflow to the right river is more than
    twice the outflow to the left river. Note that, indeed, the stream function increases
    to the right when looking in the direction of flow. The inflow along the top of
    the aquifer is uniform and equal to $N$. The outflow into the rivers is also uniform
    in the vertical direction. This means, for example, that water that enters the
    aquifer halfway between the water divide and the river flows into the river at
    an elevation exactly equal to the middle of the aquifer.


