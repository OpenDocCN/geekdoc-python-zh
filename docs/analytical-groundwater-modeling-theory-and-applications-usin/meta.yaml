    \ with either the computed head or stream function.\n\nAll points along the top\
    \ of the aquifer (between points 3 and 4) correspond to the real axis of $\\tau$\
    \ between $\\xi = \\lambda$ (point 3) and $\\xi = 1$ (point 4). Some points that\
    \ are far apart along the top of the aquifer in the $\\zeta$ plane are very close\
    \ together in the $\\tau$ plane. This phenomenon is called the crowding effect\
    \ in conformal mapping. As a result, a regularly spaced grid in the $\\tau$ plane\
    \ results in an irregular grid in the $\\zeta$ plane where some points may be\
    \ very far apart. An accurate contour plot is obtained by defining an irregularly\
    \ spaced grid in the $\\tau$ plane consisting of three segments in the $\\xi$\
    \ direction, from point 2 to 3, point 3 to 4, and point 4 to a large value; two\
    \ segments are used in the $\\eta$ plane. Note that neither $\\zeta$ nor $\\omega$\
    \ can be computed easily at points 3 and 4, as the logarithms in the solution\
    \ cannot be evaluated at those points. The solution exists in the limit, of course.\
    \ As a practical solution, the solution is evaluated up to a small distance from\
    \ points 3 and 4, rather than mathematically taking the limit and programming\
    \ the result.\n\nAn example flow net is shown in Figure 10.10. The streamlines\
    \ for the Dupuit solution are horizontal lines that jump at the base (compare\
    \ Figure 3.8) and are shown with dashed lines in Figure 10.10. Note that the Dupuit\
    \ streamlines are a good approximation of the two-dimensional streamlines beyond\
    \ one aquifer thickness from the jump in the base. Similarly, the vertical head\
    \ variation becomes negligible at approximately one aquifer thickness from the\
    \ jump in the base."
