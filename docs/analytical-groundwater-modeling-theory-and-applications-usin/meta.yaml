    The head is contoured for values from -3 m up to 6 m with steps of 0.5 m. The
    handle that is returned by the `plt.contour` function is stored and passed to
    the `plt.clabel` function to plot labels along the contours. The format of the
    labels is specified as `fmt=''%.1f''`, which stands for floating point numbers
    with 1 decimal place.


    ```

    plt.subplot(111, aspect=1)

    cs = plt.contour(x, y, h, np.arange(-3, 6, 0.5), colors=''C0'')

    plt.clabel(cs, fmt=''%.1f'');

    ```


    The color of all contour lines is specified as `colors=''C0''`, and the contour
