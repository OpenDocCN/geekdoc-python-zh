    $$Q_x|_{x=0,t} = \Delta h \sqrt{\frac{ST}{\pi(t-t_0)}}$$ (5.23)


    The total inflow over a period $\Delta t$ is


    $$Q_{\text{in}} = \int_{t_0}^{t_0+\Delta t} Q_x|_{x=0,t} = 2\Delta h \sqrt{\frac{ST\Delta
    t}{\pi}}$$ (5.24)


    The total increase in the storage may be computed through numerical integration
    along $x$ of the head in the aquifer at $t = \Delta t$ and multiplication by the
    storage coefficient. The integration may be carried out, for example, by using
    the quad method of scipy.integrate. The total increase in storage must equal the
    total inflow, as is verified below.


