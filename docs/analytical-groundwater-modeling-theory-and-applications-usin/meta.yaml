    interface $z_i$ is related to the head $h_i$ along the interface according to
    the Ghyben–Herzberg equation (Chapter 4)


    $$z_i = -\alpha h_i$$


    where


    $$\alpha = \frac{\rho_f}{\rho_s - \rho_f}$$


    ![](img/ca724f426a6249bf916ffe68c7fbe382_207_0.png)


    The stated problem is known as Glover’s problem (Glover, 1959). The complex potential
    solution used here is obtained from Bruggeman (1999, Eq. 910.01) as


    $$\omega = \sqrt{-2kU\zeta/\alpha}$$


    where $\zeta = x + iz$ is the complex coordinate. The solution for the complex
    potential can be inverted, which gives


    $$\zeta = \frac{-\omega^2\alpha}{2kU}$$


    The specific discharge potential along the interface equals $\phi_i = -kz_i/\alpha$,
    and the stream function is equal to $U$. An equation for the elevation of the
    interface as a function of $x$ may be obtained by substituting $\omega = -k\alpha
    z_i + Ui$ for $\omega$ and $x + iz_i$ for $\zeta$ in Eq. (10.50), which gives,
    after some algebra,


    $$z_i = -\sqrt{\frac{U^2\alpha^2}{k^2} - \frac{2U\alpha x}{k}}$$


    The tip of the interface is the point where the interface intersects the sea bottom
    (Figure 10.17). The location of the tip of the interface $x_{\text{tip}}$ is obtained
    by setting $z_i = 0$ in Eq. (10.52) and solving for $x$, which gives


    $$x_{\text{tip}} = \frac{U\alpha}{2k}$$


    This means that the outflow zone is wider for a larger value of the flow toward
    the coast $U$.


    In the example below, a flow net is computed by specifically computing the locations
    of the streamlines and equipotentials, as $\zeta$ is known as a function of $\omega$
    (Eq. 10.51). For the chosen parameters, the interface is already 7 m deep at a
    distance of 14 m inland from the coastline (Figure 10.18). The length of the outflow
    face is just 0.8 m.


    ```

    # parameters

    k = 10 # hydraulic conductivity, m/d

    rhof = 1000 # density freshwater, kg/m^3

    ```'
