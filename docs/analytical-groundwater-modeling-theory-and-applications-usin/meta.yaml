    # Chapter 7


    # Steady two-dimensional flow to wells in uniform background flow


    Groundwater always moves in some direction inside an aquifer (although sometimes
    imperceptibly slow) prior to the installation of a well. This is referred to as
    the background flow. In the previous chapter, wells were pumping in aquifers where
    there was no flow in the absence of the wells. In this chapter, solutions are
    presented for the case that the background flow is uniform. A number of cases
    of wells in an otherwise uniform flow are considered, including wells near rivers
    and streams, and wells near the coast. The latter problems are solved through
    the use of a complex potential, which is a convenient and efficient way to combine
    the discharge potential and stream function into one complex function. Special
    attention is paid to the location of stagnation points (points of zero flow) in
    the flow field.


    # 7.1 A single well in uniform background flow


    The discharge potential for uniform flow at a rate $U$ in the $x$-direction and
    $V$ in the $y$-direction is


    $$\Phi = -Ux - Vy \tag{7.1}$$


    so that indeed


    $$Q_x = -\frac{\partial \Phi}{\partial x} = U \quad Q_y = -\frac{\partial \Phi}{\partial
    y} = V \tag{7.2}$$


    The corresponding stream function is


    $$\Psi = Vx - Uy \tag{7.3}$$


    which also gives


    $$Q_x = -\frac{\partial \Psi}{\partial y} = U \quad Q_y = \frac{\partial \Psi}{\partial
    x} = V \tag{7.4}$$


    **Exercise 7.1:** Consider uniform flow in a confined aquifer with $T = 200 \text{
    m}^2/\text{d}$. The head is measured at three locations: $h(0, 0) = 20 \text{
    m}$, $h(100, 0) = 19.8 \text{ m}$, and $h(0, 100) = 19.9 \text{ m}$. Compute the
    $x$- and $y$-components of the uniform flow, and make a flow net.


    The potential and stream function for a well pumping with a discharge $Q$ located
    at $(x_w, y_w)$ in an otherwise uniform flow field $U$ in the $x$-direction (i.e.,
    $Q_y = 0$) may be obtained by superposition of the solution for uniform flow (Eqs.
    7.1 and 7.3) and the solution for a well'
