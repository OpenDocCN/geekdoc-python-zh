  md: '![](img/ca724f426a6249bf916ffe68c7fbe382_125_0.png)


    This means that when water flows from higher transmissivity to lower transmissivity
    ($T_R < T_L$, as shown in Figure 6.10), the angle between the discharge vector
    and the normal to the boundary decreases. It is said that the discharge vector
    is refracted toward the normal.


    As an example, consider a well pumping near an inhomogeneity boundary along the
    $y$-axis, as discussed above. The well is located at $(x, y) = (-d, 0)$ and is
    numbered well 0. The solution for an inhomogeneity boundary is obtained with the
    method of images by placing an image well at $(x, y) = (d, 0)$ and choosing the
    discharge of the image well such that the boundary conditions along the inhomogeneity
    boundary are met. The solution for the head is (e.g., Strack, 2017, Section 8.10)


    $$h = \frac{Q}{2\pi T_L} \ln\left(\frac{r_0}{r_1}\right) + \frac{Q}{\pi(T_L +
    T_R)} \ln(r_1) \quad x \le 0 \quad (6.49)$$

    $$h = \frac{Q}{\pi(T_L + T_R)} \ln(r_0) \quad x \ge 0 \quad (6.50)$$


    where $r_0 = \sqrt{(x+d)^2 + y^2}$ and $r_1 = \sqrt{(x-d)^2 + y^2}$. The solution
    for the stream function is


    $$\Psi = \frac{Q}{2\pi}(\theta_0 - \theta_1) + \frac{QT_L}{\pi(T_L + T_R)}\theta_1
    \quad x \le 0 \quad (6.51)$$

    $$\Psi = \frac{QT_R}{\pi(T_L + T_R)}\theta_0 \quad x \ge 0 \quad (6.52)$$


    where $\theta_0 = \arctan(y/(x+d))$ and $\theta_1 = \arctan(-y/(d-x))$. Note that
    $\theta_0$ varies from $-\pi$ to $\pi$, while $\theta_1$ varies from 0 to $2\pi$.


    An example is shown for both the case that $T_R = T_L/5$ and the case that $T_R
    = 5T_L$ (Figure 6.11). The total discharge that the well pumps from the zone on
    the right, where $T = T_R$, is $T_RQ/(T_L + T_R)$. For the case that $T_R$ is
    small relative to $T_L$, the inhomogeneity boundary starts to represent an impermeable
