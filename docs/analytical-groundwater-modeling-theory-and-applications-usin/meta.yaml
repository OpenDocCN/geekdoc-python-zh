    # 1.2 Areal recharge between two rivers


    The transmissivity of an unconfined aquifer may be approximated as constant and
    equal to $kH$ if the variation of the saturated thickness, caused by the change
    in water table elevation, is small compared to the total saturated thickness.
    In the following example, an unconfined aquifer is bounded on the left and right
    sides by two long parallel rivers that fully penetrate the aquifer (Figure 1.5).
    The rivers are a distance $L$ apart and in direct contact with the aquifer so
    that


    $$h|_{x=0} = h_0 \quad (1.20)$$

    $$h|_{x=L} = h_L \quad (1.21)$$


    ![](img/ca724f426a6249bf916ffe68c7fbe382_29_0.png)


    Because $T$ is approximated as constant, the general equation (1.8) is still applicable
    and the integration constants for $N > 0$ are


    $$A = \frac{h_L - h_0}{L} + \frac{N}{2T}L \quad (1.22)$$

    $$B = h_0 \quad (1.23)$$


    so that the solution becomes


    $$h = -\frac{N}{2T}(x^2 - Lx) + \frac{(h_L - h_0)x}{L} + h_0 \quad (1.24)$$


    The discharge vector $Q_x$ is obtained by differentiation of Eq. (1.24) in combination
    with Eq. (1.6).


    $$Q_x = -T\frac{dh}{dx} = N\left(x - \frac{L}{2}\right) - T\frac{h_L - h_0}{L}
    \quad (1.25)$$


    The solution is computed below.'
