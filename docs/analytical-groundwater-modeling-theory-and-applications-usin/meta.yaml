    ## 6.4 半承压含水层中的井\n\n接下来的两节将讨论双层含水层系统中下层含水层的稳定流向井的问题。两个含水层由一个弱透水层分隔。在本节中，上层含水层的水头是固定的，例如由沟渠和排水系统维持，因此下层含水层是一个半承压含水层（图\
    \ 6.12）。双层含水层系统中水流同时流经两个含水层的情况将在下一节介绍。回顾一下，半承压流和双层含水层流的解在第 2 章中是用水头表示的，因为表 (6.1)\
    \ 中定义的流量势不能使用。\n\n半承压径向对称稳定流的微分方程为\n\n$$\\nabla^2 h = \\frac{d^2 h}{dr^2} + \\\
    frac{1}{r} \\frac{dh}{dr} = \\frac{h - h^*}{cT}$$\n\n其中 $T$ 是含水层的导水系数，$h^*$ 是半承压层上方的恒定水头，$c$\
    \ 是半承压层的垂向流动阻力（见第 2 章）。寻求一口完全贯穿、流量为 $Q$ 的井的径向流解。井处的边界条件与承压流中井的边界条件相同\n\n$$\\lim_{r\
    \ \\to 0} -2\\pi r Q_r = Q$$\n\n无穷远处的边界条件是水头等于上层含水层的恒定水头 $h^*$\n\n$$h|_{r=\\infty}\
    \ = h^*$$\n\n解为（De Glee, 1930）\n\n$$h = h^* - \\frac{Q}{2\\pi T} K_0(r/\\lambda)$$\n\
    \n其中越流系数 $\\lambda = \\sqrt{cT}$（见第 2 章），$K_0$ 是第二类零阶修正贝塞尔函数。贝塞尔函数 $K_0(r/\\lambda)$\
    \ 在 $r$ 趋近于无穷大时趋近于零。实际上，当 $r > 4\\lambda$ 时，$K_0$ 可近似为零，后文将展示这一点。\n\n承压含水层抽水与半承压含水层抽水的解的主要区别在于，在承压含水层中，井抽取的所有水都来自无穷远处（因此水头在无穷远处持续增加），而在半承压含水层中，井抽取的所有水都来自上层含水层，通过半承压层的越流补给。\n\
