    \ b_0 \\ b_1 \\end{pmatrix} = \\begin{pmatrix} 0 \\ 1 \\end{pmatrix} \\quad (9.64)$$\n\
    \nThe Python implementation of the solution makes use of the `eig` function of\
    \ the `linalg` subpackage of `numpy`. The `eig` function returns the array $[w_0,\
    \ w_1]$ of eigenvalues and the two-dimensional array $\\mathbf{V}$ with the eigenvectors.\n\
    \nIn the example below, the top aquifer is unconfined so that the storage coefficient\
    \ $S_0$ represents the phreatic storage of the top aquifer. The head is computed\
    \ and plotted in an observation well near the well (Figure 9.9). The head responds\
    \ very quickly in the bottom aquifer, but it takes approximately one day before\
    \ the head in the unconfined top aquifer starts to respond. The head in the bottom\
    \ aquifer starts to go down again when the head in the top aquifer starts to go\
    \ down. This delayed response of the water table can be seen especially well in\
    \ a semi-log plot. For early times (in this case, for the first day), the head\
    \ response is similar to a Hantush well, as the head in the top aquifer varies\
    \ very little at early time.\n\n```\n# parameters\nT0 = 100 # transmissivity top\
