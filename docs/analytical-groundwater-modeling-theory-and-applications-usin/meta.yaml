  md: "function has both regular arguments and keyword arguments, the keyword arguments\
    \ must always come after the regular arguments. These rules are illustrated in\
    \ the following example where the function `test` has one regular and two keyword\
    \ arguments.\n\n```\ndef test(x, y=7, z=100):\n    print(x, y, z)\n\ntest(3)\n\
    test(3, y=8) # or test(3, 8), but better to specify keyword\ntest(3, z=-1)\ntest(3,\
    \ z=-1, y=8) # keyword arguments may be in any order\ntest(x=3) # regular arguments\
    \ may also be called with their name\n```\n\n3 7 100\n3 8 100\n3 7 -1\n3 8 -1\n\
    3 7 100\n\nIf a function takes no arguments, its definition must still include\
    \ the parentheses. Similarly, calling a function also requires adding the parentheses.\n\
    \n```\ndef test():\n    print('Hello')\ntest()\n```\n\nHello\n\nIf a variable\
    \ is used inside a function, but the variable is not explicitly passed to the\
    \ function with a regular argument or a keyword argument, Python will search for\
    \ this variable in the memory outside the function. This is generally considered\
    \ sloppy programming, but it is sometimes done in short scripts, also in this\
    \ book. So the following function works, but is not optimal.\n\n```\nvelo = 0.05\
    \ # defined outside the function\n\ndef printflow(x):\n    print(f'the velocity\
    \ at x={x} is {velo} m/d')\n\nprintflow(100)\n```\n\nthe velocity at x=100 is\
    \ 0.05 m/d\n\nIt is better to pass all variables to the function\n\n```\ndef printflow(x,\
    \ velo):\n    print(f'the velocity at x={x} is {velo} m/d')\n\nprintflow(x=100,\
    \ velo=0.05)\n```\n\nthe velocity at x=100 is 0.05 m/d\n\nIt can be useful to\
    \ define a function in such a way that any keyword argument may be passed to it,\
    \ even if it is not known a priori or explicitly defined. This is useful if the\
    \ function calls another function. The code cell below demonstrates how this works\
    \ by defining a function `kwargs_demo` that creates a figure with a fixed layout,\
