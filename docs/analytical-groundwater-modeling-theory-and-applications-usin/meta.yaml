    \ = x_{\\text{tip}}$\n\n$$h|_{x=x_{\\text{tip}}} = h^*$$\n\n公式(4.39)在边界条件(4.41)下的解为\n\
    \n$$h = h^* + \\frac{(x - x_{\\text{tip}})^2}{6k\\alpha c} \\quad 0 \\le x \\\
    le x_{\\text{tip}}$$\n\n通过将函数及其二阶导数代入微分方程(4.39)并验证边界条件，可以很容易地检验这个解。通过对公式(4.37)进行微分和代入，可以得到流量矢量的表达式\n\
    \n$$Q_x = -\\frac{(x - x_{\\text{tip}})^3}{18k\\alpha c^2} \\quad 0 \\le x \\\
    le x_{\\text{tip}}$$\n\n最后，应用边界条件(4.40)得到\n\n$$x_{\\text{tip}} = (18k\\alpha c^2\
