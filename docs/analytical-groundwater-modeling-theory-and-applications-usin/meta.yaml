    # 9.5 Wells in a two-aquifer system


    The solution for steady flow to a well in the bottom aquifer of a two-aquifer
    system was presented in Section 6.5. In this section, the transient equivalent
    is presented. The solution is used to investigate the transient head response
    in a two-aquifer system. When the top aquifer is unconfined, the head response
    in the top aquifer will be significantly slower than the head response in the
    bottom aquifer, also referred to as the delayed response of the water table. The
    solution is quite complicated as it involves solving a system of two coupled differential
    equations using the Laplace transform method. Although the equations are a bit
    longer, the Python script of the solution is relatively short.


    Consider transient flow in a two-aquifer system. The top aquifer has index 0,
    and the bottom aquifer has index 1. The transmissivity of each aquifer is again
    approximated as constant in both space and time. The storage coefficients of the
    top and bottom aquifers are $S_0$ and $S_1$, respectively. The two aquifers are
    separated by a leaky layer with resistance $c$ (Figure 6.14). The storage in the
    leaky layer is neglected. The transient equivalent of the system of two linked
    differential equations (6.63) is


    $$\nabla^2 h_0 = \frac{S_0}{T_0} \frac{\partial h_0}{\partial t} + \frac{h_0 -
    h_1}{c T_0}$$

    $$\nabla^2 h_1 = \frac{S_1}{T_1} \frac{\partial h_1}{\partial t} + \frac{h_1 -
    h_0}{c T_1}$$

    (9.52)


    A well starts pumping with a discharge $Q$ at time $t = 0$ in aquifer 1 (the bottom
    aquifer). The boundary conditions are


    $$\lim_{r \to 0} -2\pi r Q_{r_0} = 0$$

    $$\lim_{r \to 0} -2\pi r Q_{r_1} = Q \quad t \ge 0$$

    (9.53)

    $$h_0|_{r=\infty, t} = h_1|_{r=\infty, t} = 0$$

    (9.54)'
