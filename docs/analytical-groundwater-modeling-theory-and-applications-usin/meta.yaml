  md: '**Exercise 7.6:** Repeat Exercise 7.4, but with complex variables.


    **Exercise 7.7:** Consider two extraction wells with equal discharge $Q$. One
    well is located at $(x, y) = (0, -50)$, and the other well, at $(x, y) = (0, 50)$.
    The two wells are located in an otherwise uniform flow from west to east; the
    gradient far away is $\partial h/\partial x = -0.002$. The transmissivity of the
    aquifer is $T = 200 \text{ m}^2/\text{d}$. Compute the minimum discharge $Q_{\text{min}}$
    so that no part of the background uniform flow passes between the two wells. Note
    that there are two stagnation points on the $x$-axis when $Q > Q_{\text{min}}$.
    Draw the capture zone envelopes for two cases: $Q = Q_{\text{min}}$ and $Q = 200
    \text{ m}^3/\text{d}$.


    Pumping wells that are located near rivers intercept groundwater that is on its
    way to the river. When the discharge of the pumping well is large enough, part
    of the water pumped from the well may originate from the river or from the other
    side of the river. Either way, the flow in the river is depleted. In this section,
    wells are considered that are pumping near long and straight river sections, while
    the background flow is uniform and toward the river on both sides of the river.
    The aquifer is confined and has transmissivity $T$. A well with discharge $Q$
    is located at $(x, y) = (-d, 0)$, and the river runs along the $y$-axis. The river
    stage is $h_0$, which corresponds to a potential $\Phi_0 = Th_0$. The river is
    in direct contact with the aquifer so the boundary condition along the $y$-axis
    is


    $$\Phi|_{x=0,y} = \Phi_0 \qquad (7.26)$$


    The background flow is uniform and normal to the river, but potentially different
    on either side of the river


    $$Q_x = U_L \qquad x \le 0 \qquad (7.27)$$

    $$Q_x = U_R \qquad x \ge 0 \qquad (7.28)$$


    Note that because the river is in direct contact with the aquifer, the flow on
    the right side of the river remains uniform (Eq. 7.28) even if there is a well
    on the left side. In the next section, the bottom of the river is formed by a
    leaky stream bed.


    The solution for the complex potential is obtained through the method of images
    and superposition as


    $$\Omega = -U_L \zeta + \frac{Q}{2\pi} \ln \left( \frac{\zeta + d}{d - \zeta}
    \right) + \Phi_0 \qquad x \le 0 \qquad (7.29)$$


    and the corresponding complex discharge is


    $$W = -\frac{d\Omega}{d\zeta} = U_L - \frac{Q}{2\pi} \left( \frac{1}{\zeta + d}
    - \frac{1}{\zeta - d} \right) \qquad x \le 0 \qquad (7.30)$$


    The critical discharge of the well is defined as the maximum discharge at which
    the well doesn''t draw any water from the river into the aquifer. When the well
    pumps at the critical discharge, the discharge vector at the point on the river
    closest to the well equals zero so that the point $(x, y) = (0, 0)$ is a stagnation
    point. An equation for the stagnation point(s) in the flow field may be obtained
    by setting $W = 0$ (Eq. 7.30) and solving for $\zeta$, which gives the complex
    locations $\zeta_s$ of the stagnation points as


    $$\zeta_s = \pm \sqrt{d^2 - \frac{Qd}{\pi U_L}} \qquad (7.31)$$


    According to this equation, there are always two stagnation points, except for
    the case that the argument of the square root equals zero, which means the stagnation
    point is at the origin. The corresponding critical discharge $Q_{\text{cr}}$ is


    $$Q_{\text{cr}} = \pi U_L d \qquad (7.32)$$'
