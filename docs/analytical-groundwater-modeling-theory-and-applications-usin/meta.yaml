  - "[PAGE 234]\n\n```\nfrom scipy.optimize import fmin\nxmin = fmin(fdiff, 1.5)\n\
    \nplt.plot(x, hfunc(x), label=\"h(x)\")\nplt.plot(x, gfunc(x), label=\"g(x)\"\
    )\nplt.plot(xmin, hfunc(xmin), 'C0.')\nplt.plot(xmin, gfunc(xmin), 'C1.')\nplt.legend();\n\
    ```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_234_0.png)\n\nTwo other subpackages\
    \ of the scipy package are scipy.special for special functions and scipy.integrate\
    \ for numerical integration. As an example, consider the exponential integral\
    \ defined as\n\n$$E_1(u) = \\int_u^\\infty \\frac{e^{-s}}{s} ds \\qquad (A.1)$$\n\
    \nE₁ is available as exp1 from the scipy.special package, but can also be evaluated\
    \ using numerical integration. The quad function of the scipy.integrate package\
    \ is used and takes as input the function to integrate and the lower and upper\
    \ limits of the integration; use np.inf for ∞. Note that quad returns two values:\
    \ the outcome of the numerical integration and an error estimate. The results\
    \ of the numerical integration and the special function are compared below for\
    \ E₁(1).\n\n```\nfrom scipy.integrate import quad\nfrom scipy.special import exp1\n\
    \ndef integrand(s):\n    return np.exp(-s) / s\n\nE1num = quad(integrand, 1, np.inf)[0]\
    \ # numerical integration\n\nprint('E1(1) from numerical integration:', E1num)\n\
    print('E1(1) from special function      :', exp1(1))\n```\n\nE1(1) from numerical\
    \ integration: 0.21938393439551238\nE1(1) from special function      : 0.21938393439552062"
