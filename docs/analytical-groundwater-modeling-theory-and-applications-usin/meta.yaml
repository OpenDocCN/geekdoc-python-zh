    # 7.2 Well capture zones


    All water inside the capture zone envelope of a well is eventually captured by
    the well, but this can take a (very) long time. In groundwater management, it
    is important to delineate the zone that is captured by the well within a certain
    time period. For example, all the water in the 5-year capture zone reaches the
    well within 5 years. The capture zone for a certain time period can be computed
    by integrating time along a streamline from the well against the flow. For a single
    well in an otherwise uniform flow field, this can be done analytically, as was
    shown by Bear and Jacobs (1965). For more complicated settings, the integration
    is conducted numerically. In this section, the analytical solution is discussed
    first, followed by the numerical solution.


    Consider a well with discharge $Q$ located at the origin in an otherwise uniform
    flow field with $Q_x = U$ and $Q_y = 0$. The stream function for this problem
    is given by Eq. (7.6). The stream function equals zero along the capture zone
    envelope (see previous section) so that an equation for the capture zone envelope
    can be written as


    $$\Psi = -Uy + \frac{Q}{2\pi}\theta = 0 \quad (7.13)$$


    Using that $y = r \sin\theta$ gives an expression for the radial distance from
    the well toward the capture zone envelope


    $$r = \frac{Q}{2\pi} \frac{\theta}{U \sin(\theta)} \quad (7.14)$$


    This means that for any angle $\theta$, a distance $r$ to the capture zone envelope
    can be computed with the above formula. The corresponding $x, y$ coordinates of
    the capture zone envelope are computed with


    $$x = r \cos(\theta) \quad y = r \sin(\theta) \quad (7.15)$$


    The travel time $t$ from location $(x, y)$ inside the capture zone envelope to
    the well can be computed with the following equation (Bear and Jacobs, 1965)


    $$t = -\frac{nHx}{U} - \frac{QnH}{2\pi U^2} \ln \left[ \frac{\sin(\theta - 2\pi
    Uy/Q)}{\sin(\theta)} \right] \quad (7.16)$$'
