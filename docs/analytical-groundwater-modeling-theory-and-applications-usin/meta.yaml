    \ parameters are given in the script below. A contour plot of the head for the\
    \ entire model is shown in the left graph of Figure 8.4, while a contour plot\
    \ of the area around the well is shown in the right graph of Figure 8.4.\n\n```\n\
    # parameters and model\nhriver = 10 # head in river, m\nml = Model(T=100) # transmissivity,\
