    \quad (5.43)$$


    where it is used that $\frac{4}{2\pi} \approx \frac{1}{2}$ and $\frac{8}{\pi^3}
    \approx \frac{1}{8}$. The head may now be approximated as


    $$h \approx \frac{-N}{2T} \left(x^2 - \frac{1}{4}L^2\right) (1 - e^{-t/\tau})
    \quad (5.44)$$


    It follows that at time $t = \tau$, the head has reached $1 - e^{-1} = 63\%$ of
    its final value, and at time $t = 3\tau$, the head has reached 95% of its final
    value. Hence, the characteristic time $t_{95}$ may be approximated as


    $$t_{95} \approx \frac{3SL^2}{\pi^2 T} \quad (5.45)$$


    Equation (5.45) is a reasonable approximation of $t_{95}$ for the entire aquifer,
    as is explored in the exercise below. The characteristic time $t_{95}$ is also
    referred to as the memory of the system, as the head is back to its original value
    $t_{95}$ after a recharge event ends. For the parameters used here, the value
    of $t_{95}$ may be computed as


    ```

    t95 = 3 * S * L**2 / (np.pi**2 * T)

    print(f''The memory of the system is: {t95:0.0f} d'')

    ```


