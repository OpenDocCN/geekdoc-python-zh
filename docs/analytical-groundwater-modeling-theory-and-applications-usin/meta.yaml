  md: 'by rewriting the approximate formula for large time (Eq. 9.14) in the form
    of the Thiem equation (Eq. 6.25)


    $$h \approx \frac{Q}{2\pi T} \ln(r/R) \quad r \leq R$$


    where the distance $R$ is a function of time


    $$R = \sqrt{4T(t-t_0)e^{-\gamma}/S}$$


    The distance $R$ may be used as an approximation of the distance at which the
    drawdown may be neglected.


    **Exercise 9.4:** Plot the head vs. $r$ at time $t = 1$ d for $r$ varying from
    $r_w$ to 600 m using the parameters of the example. On the same graph, plot the
    approximate formula (9.15).


    Even though the head of the Theis solution by itself does not approach the steady-state
    head of a steady well, the difference between the head at two locations does approach
    a constant value. This was already shown in Figure 9.1, where the difference in
    the head between $r = r_w$ and $r = 20$ m approaches a constant value for $t >
    0.01$ d ($u < 0.1$) for this case. Similarly, the discharge vector approaches
    the steady solution for small $u$. The radial component of the discharge vector
    $Q_r$ of the Theis solution may be obtained from Eq. (9.9) as


    $$Q_r = -T \frac{\partial h}{\partial r} = -T \frac{dh}{du} \frac{\partial u}{\partial
    r} = -\frac{Q}{2\pi} \frac{1}{r} e^{-u}$$


    When time is large, $u$ approaches zero and $Q_r$ approaches the steady discharge
    vector


    $$Q_r = -\frac{Q}{2\pi} \frac{1}{r}$$


    **Exercise 9.5:** Compute the steady head difference between $r = r_w$ and $r
    = 20$ m, and compare your answer to the difference obtained with the transient
    solution for time varying from $t = 0.01$ to $t = 1$ d.


    In practice, there is always a water source closer than infinity, and if that
    source is included in the solution, the transient solution approaches a steady
    solution for large time. For example, consider a well at $(x, y) = (-d, 0)$ near
    a large and straight river with a constant head $h_0$ along $x = 0$. The steady
    solution may be obtained with the method of images (Section 6.2). A transient
    solution may also be obtained with the method of images as


    $$h = -\frac{Q}{4\pi T} \left[ \text{E}_1 \left( \frac{S r_1^2}{4T(t-t_0)} \right)
    - \text{E}_1 \left( \frac{S r_2^2}{4T(t-t_0)} \right) \right] + h_0$$


    where $r_1^2 = (x+d)^2 + y^2$ and $r_2^2 = (x+d)^2 + y^2$. For large time, $\text{E}_1$
    may again be represented with the first two terms of the series representation
    (Eq. 9.13). Substitution of these terms for $\text{E}_1$ into Eq. (9.19) and some
    algebra leads to the steady solution


    $$h = \frac{Q}{2\pi T} \ln \frac{r_1}{r_2} + h_0$$


    Transient solutions may be superimposed in time as well as in space. For example,
    consider a well with a discharge $Q$ operating from $t = t_0$ to $t = t_1$ and
    with zero discharge after $t_1$. For the period $t > t_1$, the head function consists
    of two Theis wells, one with discharge $Q$ starting at $t = t_0$ and one with
    discharge $-Q$ starting at $t = t_1$


    $$h = -\frac{Q}{4\pi T} \left[ \text{E}_1 \left( \frac{S r^2}{4T(t-t_0)} \right)
    - \text{E}_1 \left( \frac{S r^2}{4T(t-t_1)} \right) \right] \quad t \geq t_1$$'
