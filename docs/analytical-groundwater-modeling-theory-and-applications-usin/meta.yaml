    \ well returns the second row of the matrix and the second value of the right-hand\
    \ side vector.\n\nThe equation function is stored in a separate mix-in class HeadEquation,\
    \ as it is the same for all head-specified elements. Each element that uses this\
    \ mix-in class must store the location of the collocation point where the head\
    \ is specified as xc and yc, and the specified value of the discharge potential\
    \ at the collocation point as pc. The equation function starts out with a row\
    \ of the matrix that is an empty list and a right-hand side value that is equal\
    \ to the specified discharge potential pc. The equation function then loops through\
    \ all the elements in the model. If an element has an unknown parameter (nunknowns==1),\
    \ its potential influence function potinf is evaluated at the collocation point\
    \ and is stored as the next value in the row of the matrix. If an element does\
    \ not have an unknown parameter, its potential function is evaluated at the collocation\
    \ point and the returned value is subtracted from the right-hand side value.\n\
    \n```\nclass HeadEquation:\n\n    def equation(self):\n        row = []\n    \
    \    rhs = self.pc\n        for e in self.model.elements:\n            if e.nunknowns\
    \ == 1:\n                row.append(e.potinf(self.xc, self.yc))\n            else:\n\
    \                rhs -= e.potential(self.xc, self.yc)\n        return row, rhs\n\
    ```\n\nThe HeadWell class for head-specified wells can now be derived from both\
    \ the Well class and the HeadEquation class. Input arguments are the model to\
    \ which the element is added, the location of the well, the radius, and the specified\
    \ head. The xc and yc locations of the collocation point are stored, as well as\
    \ the specified potential pc at the collocation point. The number of unknowns\
    \ parameters nunknowns is set to 1. All other attributes and functions are inherited\
    \ from the Well and HeadEquation classes.\n\n```\nclass HeadWell(Well, HeadEquation):\n\
    \n    def __init__(self, model, xw, yw, rw, hw):\n        Well.__init__(self,\
    \ model, xw, yw, 0, rw)\n        self.xc, self.yc = xw + rw, yw\n        self.pc\
    \ = self.model.T * hw\n        self.nunknowns = 1\n```\n\nThe Constant class is\
    \ derived from the Element class and the HeadEquation class. Input arguments are\
    \ the model to which the element is added and the location and value of the specified\
    \ head. The omegainf function of the Constant class is simply equal to 1. The\
    \ Constant element is also referred to as the reference point.\n\n```\nclass Constant(Element,\
    \ HeadEquation):\n\n    def __init__(self, model, xc, yc, hc):\n        Element.__init__(self,\
    \ model, p=0)\n        self.xc, self.yc = xc, yc\n        self.pc = self.model.T\
    \ * hc\n        self.nunknowns = 1\n```"
