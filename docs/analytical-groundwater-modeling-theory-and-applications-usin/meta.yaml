    # 10.4 Spatially varying head at the top of the aquifer


    The water table in an unconfined aquifer is sometimes very roughly approximated
    as a subdued replica of the topographic surface. This makes some intuitive sense,
    because groundwater often discharges at a low point in the landscape. Groundwater
    that recharges below the topographic highs has to take a relatively long path
    to the discharge area in the topographic lows, which necessitates a hydraulic
    head gradient, and thus a mounding of the water table. It turns out, however,
    that the water table and the topographic surface are poorly correlated or even
    uncorrelated in many unconfined aquifers (Haitjema and Mitchell-Bruker, 2005).
    Nonetheless, an undulating water table may be a useful approximation to conceptualize
    regional flow patterns.


    In this section, flow systems are investigated where the head at the top of the
    aquifer is specified to consist of one or more sinusoidal functions, approximating
    a subdued sequence of topographic highs and lows. The problem is discussed here
    because it resembles the famous solution of Toth (1963), which is often used to
    investigate nested flow domains in basin-scale'
  merge: -1
  pgno: 201
