  md: "The inflow is uniform along a line-sink, which results in a head that varies\
    \ along the line-sink (right graph of Figure 8.3). This means that a finite ditch\
    \ with a uniform head cannot be modeled with a single line-sink of uniform inflow.\
    \ Such a ditch must be simulated with a string of multiple line-sinks, as the\
    \ inflow near the ends of the ditch is larger than in the middle of the ditch.\n\
    \nThe free parameter of a line-sink is the inflow $\\sigma$ into the line-sink\
    \ per unit length of line-sink. When a line-sink is used to simulate the segment\
    \ of a surface water feature, the inflow (negative when it is outflow) may be\
    \ computed from a specified-head condition. Here, the head is specified at the\
    \ center of the line-sink (the collocation point). In the code below, the HeadLineSink\
    \ class is derived from the LineSink and HeadEquation classes. Input arguments\
    \ are the model to which the element is added, coordinates of the endpoints, and\
    \ the specified head at the center of the line-sink. As for all head-specified\
    \ elements, the location of the collocation point is stored as xc and yc, and\
    \ the potential at the collocation point as pc. The number of unknowns is set\
    \ to 1.\n\n```\nclass HeadLineSink(LineSink, HeadEquation):\n\n    def __init__(self,\
    \ model, x0=0, y0=0, x1=1, y1=1, hc=1):\n        LineSink.__init__(self, model,\
    \ x0, y0, x1, y1, 0)\n        self.xc = 0.5 * (x0 + x1)\n        self.yc = 0.5\
    \ * (y0 + y1)\n        self.pc = self.model.T * hc\n        self.nunknowns = 1\n\
    ```\n\nStrings of line-sinks may be used to simulate narrow rivers or streams.\
    \ A stream needs to be subdivided into line-sinks based on three criteria: The\
    \ string of line-sinks must represent the geometry of the stream, and the line-sinks\
    \ must be short enough to simulate both the variation in river stage and the variation\
    \ of the inflow or outflow along the stream. Recall that the inflow is uniform\
    \ for each line-sink. In the current implementation of head-specified line-sinks,\
    \ the head in the aquifer is set equal to the specified head at the center of\
    \ the line-sink, which means that the aquifer is in direct contact with the stream.\
    \ Alternatively, the resistance of a leaky stream bed may be taken into account\
    \ by specifying condition (7.34) of Section 7.4, but that is beyond the scope\
    \ of this book (see, e.g., Haitjema, 1995).\n\nAs an example of a curved stream,\
