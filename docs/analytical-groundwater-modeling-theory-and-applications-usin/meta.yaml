    ## Steady two-dimensional flow to wells in uniform background flow


    Groundwater always moves in some direction inside an aquifer (although sometimes
    imperceptibly slow) prior to the installation of a well. This is referred to as
    the background flow. In the previous chapter, wells were pumping in aquifers where
    there was no flow in the absence of the wells. In this chapter, solutions are
    presented for the case that the background flow is uniform. A number of cases
    of wells in an otherwise uniform flow are considered, including wells near rivers
    and streams, and wells near the coast. The latter problems are solved through
    the use of a complex potential, which is a convenient and efficient way to combine
    the discharge potential and stream function into one complex function. Special
    attention is paid to the location of stagnation points (points of zero flow) in
    the flow field.


    ### 7.1 A single well in uniform background flow


    The discharge potential for uniform flow at a rate $U$ in the $x$-direction and
    $V$ in the $y$-direction is


    $$\Phi = -Ux - Vy \tag{7.1}$$


    so that indeed


    $$Q_x = -\frac{\partial \Phi}{\partial x} = U \quad Q_y = -\frac{\partial \Phi}{\partial
    y} = V \tag{7.2}$$


    The corresponding stream function is


    $$\Psi = Vx - Uy \tag{7.3}$$


    which also gives


    $$Q_x = -\frac{\partial \Psi}{\partial y} = U \quad Q_y = \frac{\partial \Psi}{\partial
    x} = V \tag{7.4}$$


    **Exercise 7.1:** Consider uniform flow in a confined aquifer with $T = 200 \text{
    m}^2/\text{d}$. The head is measured at three locations: $h(0, 0) = 20 \text{
    m}$, $h(100, 0) = 19.8 \text{ m}$, and $h(0, 100) = 19.9 \text{ m}$. Compute the
    $x$- and $y$-components of the uniform flow, and make a flow net.


    The potential and stream function for a well pumping with a discharge $Q$ located
    at $(x_w, y_w)$ in an otherwise uniform flow field $U$ in the $x$-direction (i.e.,
    $Q_y = 0$) may be obtained by superposition of the solution for uniform flow (Eqs.
    7.1 and 7.3) and the solution for a well (Eqs. 6.37 and 6.41)


    $$\Phi = -Ux + \frac{Q}{2\pi} \ln(r) + C \tag{7.5}$$

    $$\Psi = -Uy + \frac{Q}{2\pi} \theta \tag{7.6}$$


    where $r = \sqrt{(x - x_w)^2 + (y - y_w)^2}$, $\theta = \arctan[(y - y_w)/(x -
    x_w)]$, and $C$ is a constant to be determined from additional boundary conditions.
    The corresponding components of the discharge vector are (independent of the value
    of $C$)


    $$Q_x = -\frac{\partial \Phi}{\partial x} = U - \frac{Q}{2\pi} \frac{x - x_w}{r^2}
    \tag{7.7}$$

    $$Q_y = -\frac{\partial \Phi}{\partial y} = -\frac{Q}{2\pi} \frac{y - y_w}{r^2}
    \tag{7.8}$$


    The well captures part of the background flow. The capture zone envelope is the
    dividing streamline that bounds the area of the aquifer that is (eventually) captured.
    The capture zone envelope goes through the point downstream of the well where
    $Q_x = Q_y = 0$. This point is referred to as a stagnation point. The location
    of the stagnation point $(x_s, y_s)$ is found by setting $Q_x = 0$ along the line
    $y = y_w$ ($Q_y = 0$ along the entire line $y = y_w$)


    $$Q_x|_{x=x_s, y=y_w} = U - \frac{Q}{2\pi} \frac{1}{(x_s - x_w)} = 0 \tag{7.9}$$


    where it is used that $r^2 = (x_s - x_w)^2$ along the line $y = y_w$. The $x$-location
    of the stagnation point is obtained as


    $$x_s = x_w + \frac{Q}{2\pi U} \tag{7.10}$$


    The flow field for a well in uniform background flow is shown in the left graph
    of Figure 7.1. The stagnation point is at the green cross. For this case, $\Psi
    = -Uy_w$ at the stagnation point, where $\theta = 0$ and $y = y_w$. The streamline
    representing the capture zone envelope (shown in black) goes through the stagnation
    point so that $\Psi = -Uy_w$ along the entire capture zone envelope for this case.
    The width $w$ of the capture zone far upstream of the well may be obtained from
    continuity of flow, as the amount of flow between the two dividing streamlines
    must equal the discharge of the well, $Uw = Q$, so that


    $$w = Q/U \tag{7.11}$$


    A close-up of the flow around the stagnation point is shown in the right graph
    of Figure 7.1. Two parts of the streamline representing the capture zone envelope
    are directed toward the stagnation point, while the other two parts are directed
    away from the stagnation point. One of the latter two parts flows to the well,
    and the other part flows away from the well.


    ```python

    # parameters

    xw = 0 # x-location of well, m

    yw = 0 # y-location of well, m

    Q = 80 # discharge of well, m^3/d

    U = 0.5 # uniform flow in x-direction, m^2/d

    ```


    ```python

    # solution

    xs = xw + Q / (2 * np.pi * U)

    xg, yg = np.meshgrid(np.linspace(-200, 100, 100), np.linspace(-100, 100, 100))

    psi = Q / (2 * np.pi) * np.arctan2(yg, xg) - U * yg

    ```


    ```python

    # basic streamline plot, left graph

    plt.subplot(111, aspect=1)

    plt.contour(xg, yg, psi, 10, colors=''C1'', linestyles=''-'')

    plt.contour(xg, yg, psi, [-U * yw], colors=''k'', linestyles=''-'') # envelope

    plt.plot(xs, 0, ''C2x''); # stagnation point

    ```


    ![](img/ca724f426a6249bf916ffe68c7fbe382_135_0.png)


    **Exercise 7.2:** Consider a well located in a field of uniform background flow.
    The uniform flow is directed in the positive x-direction, and the head drop is
    1 m every 1000 m. The transmissivity of the aquifer is constant and equal to T
    = 200 m²/d. A contaminated area is located near the well as shown in Figure 7.2.
    Compute the maximum discharge of the well such that the well does not capture
    any water that flows through the contaminated area. Plot the capture zone envelope
    to verify your answer.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_135_1.png)


    **Exercise 7.3:** Consider an extraction well and an injection well with equal,
    but opposite discharge Q = 200 m³/d. The injection well is located at (x, y) =
    (-50, 0), and the extraction well, at (x, y) = (50, 0). The two wells are located
    in an otherwise uniform flow from west to east; the gradient far away is ∂h/∂x
    = -0.002. The transmissivity of the aquifer is T = 200 m²/d. Compute the locations
    of the two stagnation points, and draw the capture zone envelope.


    **Exercise 7.4:** Consider two extraction wells with equal discharge $Q = 100
    \text{ m}^3/\text{d}$. One well is located at $(x, y) = (-50, 0)$, and the other
    well, at $(x, y) = (50, 0)$. The two wells are located in an otherwise uniform
    flow from west to east; the gradient far away is $\partial h/\partial x = -0.002$.
    The transmissivity of the aquifer is $T = 200 \text{ m}^2/\text{d}$. Compute the
    locations of the two stagnation points, and draw the capture zone envelopes.


    The average path of a water particle in the aquifer is referred to as a pathline.
    Unlike streamlines, pathlines can be computed for steady flow with and without
    areal infiltration and for transient flow. For steady two-dimensional flow without
    infiltration, pathlines and streamlines coincide. For most cases of two-dimensional
    flow, pathlines cannot be computed analytically, but can be computed through numerical
    integration of the horizontal velocity vector $\vec{v} = (v_x, v_y)$


    $$\frac{\mathrm{d}x}{\mathrm{d}t} = v_x$$

    $$\frac{\mathrm{d}y}{\mathrm{d}t} = v_y$$

    \tag{7.12}


    This is a system of two ordinary first-order differential equations, which can
    be integrated with a standard routine, for example the `solve_ivp` of `scipy.integrate`.
    Numerical integration results in an array of coordinates of the pathline including
    the travel time. Application of `solve_ivp` is discussed in some detail in the
    following.


    The `solve_ivp` function requires three input arguments:


    - 1. `fun(t, y)`, the function to be integrated, where for the case under consideration
    here, `t` is time and `y` is an array of $x, y$ coordinates (not to be confused
    with the $y$-coordinates of the problem).

    - 2. `t_span`, a two-tuple with the beginning and end times of the integration.

    - 3. `y0`, an array with starting locations $x, y$.


    In addition, `solve_ivp` has many keyword arguments to control, for example, the
    algorithm and accuracy of the numerical integration. Two keyword arguments are
    used here:


    - 1. `t_eval`, which is an array with all times for which the integration is computed
    and returned. All values must be between the beginning and end times defined in
    `t_span`.

    - 2. `events`, which is a list of functions to deal with pathlines that terminate
    before the end time of the integration is reached, for example when a pathline
    terminates at a well. Each function represents an event (e.g., the pathline has
    reached a well). Each event function takes `t` and `y` as input, just like the
    velocity function, and returns a continuous function that equals zero when the
    event occurs. For a well, the function returns the distance to the well minus
    the radius of the well so that it returns zero when the pathline is at the radius
    of the well. In addition, the function has an attribute `terminal` which is set
    to `True` so that the `solve_ivp` routine knows to terminate the integration when
    this event occurs (it is a bit unusual to specify an attribute for a function,
    but it is proper Python and quite useful here). If the `terminal` attribute is
    not set, the integration continues after the event occurs. This may be useful,
    e.g., when it is of interest when a pathline crosses a line.


    The `solve_ivp` function returns an object with a number of attributes, including:


    - 1. `t`, an array with the time points for which $(x, y)$ values are returned.

    - 2. `y`, a 2D array with the computed $(x, y)$ coordinates of the pathline.'
