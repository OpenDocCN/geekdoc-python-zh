    # 7.4 A well in uniform background flow near a river with a leaky stream bed


    The solution for a well in a uniform background flow near a long and straight
    river segment in direct contact with the aquifer is modified to include a leaky
    stream bed below the river. All boundary conditions are the same as for the solution
    in the previous section, except for the boundary condition along the river. The
    river has a leaky stream bed so that there is a hydraulic resistance between the
    river and the aquifer (Figure 7.8). Therefore, the pumping well on one side of
    the river results in a drawdown on the other side of the river, unlike in the
    previous section. The pumping well may capture water from the other side of the
    river, which can have major implications for a safe groundwater supply, e.g.,
    when there is a contamination on the other side of the river (e.g., Harr, 1996).


    The river has a small width $B$, and the stream bed has a resistance to vertical
    flow $c$. Leakage to or from the river is approximated as occurring along the
    centerline of the stream, and the width of the stream is neglected in the solution.
    This approximation may be reasonable when the stream is narrow relative to the
    aquifer thickness and the leakage factor ($\sqrt{kHc}$). The vertical specific
    discharge through the leaky stream bed may be written as


    $$q_z = \frac{h - h_0}{c} \qquad (7.33)$$


    The inflow $\sigma$ $[L^2/T]$ from the aquifer into the river per unit length
    of river is obtained as


    $$\sigma(y) = Bq_z = B\frac{h|_{x=0,y} - h_0}{c} = \frac{C}{T}(\Phi|_{x=0,y} -
    \Phi_0) \qquad (7.34)$$


    where the conductance of the stream bed is defined as $C = B/c$. The boundary
    condition along the river is obtained from continuity of flow as


    $$\sigma = Q_x|_{x=0^-,y} - Q_x|_{x=0^+,y} = \frac{C}{T}(\Phi|_{x=0,y} - \Phi_0)
    \qquad (7.35)$$'
  - '[PAGE 146]


    where $x = 0^-$ and $x = 0^+$ are the $x$-locations just to the left and right
    of the centerline of the river, respectively. The second boundary condition along
    the river is that the head in the aquifer on the left side of the river is equal
    to the head in the aquifer on the right side of the river, or in terms of the
    discharge potential (recall that the width $B$ of the river is neglected in the
    solution)


    $$\Phi|_{x=0^-, y} = \Phi|_{x=0^+, y} \qquad (7.36)$$


    The uniform background flow on both sides of the river is the same as Eqs. (7.27)
    and (7.28), as shown in Figure 7.8.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_146_0.png)


    The complex potential solution for the stated problem is obtained from Bakker
    and Anderson (2003). The complex potential is


    $$\Omega = \frac{Q}{2\pi} \ln \frac{\zeta + d}{d - \zeta} - \frac{Q}{2\pi} \exp(Z_0)\mathrm{E}_1(Z_0)
    - U_L \zeta + A \qquad x \le 0 \qquad (7.37)$$

    $$\Omega = -\frac{Q}{2\pi} \exp(Z_1)\mathrm{E}_1(Z_1) - U_R \zeta + A \qquad x
    \ge 0 \qquad (7.38)$$


    where


    $$Z_0 = -\frac{C}{2T}(\zeta - d) \qquad (7.39)$$

    $$Z_1 = \frac{C}{2T}(\zeta + d) \qquad (7.40)$$

    $$A = \frac{T}{C}(U_L - U_R) + \Phi_0 \qquad (7.41)$$


    and $\mathrm{E}_1$ is the exponential integral, which is available as exp1 in
    the scipy.special package. The corresponding complex discharge vector is


    $$W = -\frac{Q}{2\pi} \left[ \frac{1}{\zeta + d} + \frac{C}{2T} \exp(Z_0)\mathrm{E}_1(Z_0)
    \right] + U_L \qquad x \le 0 \qquad (7.42)$$

    $$W = -\frac{Q}{2\pi} \left[ \frac{1}{\zeta + d} - \frac{C}{2T} \exp(Z_1)\mathrm{E}_1(Z_1)
    \right] + U_R \qquad x \ge 0 \qquad (7.43)$$


    The complex potential is implemented in a Python function in the code below.


    ```

