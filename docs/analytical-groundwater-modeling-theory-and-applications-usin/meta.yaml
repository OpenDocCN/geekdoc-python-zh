    this solution approach is to demonstrate the principle of superposition.


    The differential equation for the discharge potential in terms of $r$ is given
    by Eq. (6.8). The general solution to this differential equation is


    $$\Phi = -\frac{1}{4}Nr^2 + A\ln r + B$$


    where $A$ and $B$ are constants to be evaluated from boundary conditions. The
    corresponding radial component of the discharge vector is


    $$Q_r = -\frac{\mathrm{d}\Phi}{\mathrm{d}r} = \frac{1}{2}Nr - \frac{A}{r}$$


    ![](img/ca724f426a6249bf916ffe68c7fbe382_115_0.png)


    First, consider flow to a pumping well at the center of a circular island of radius
    $R$; the radius of the well is $r_w$. The discharge potential that is the solution
    for this problem is referred to as $\Phi_1$. The head is fixed to $h_R$ at the
    perimeter of the island ($r = R$). The corresponding discharge potential is computed
    with the appropriate equation from Table 6.1 and is referred to as $\Phi_R$


    $$\Phi_1|_{r=R} = \Phi_R$$


    The discharge of the well is $Q$ [L$^3$/T] and is positive for extracting water
    from the aquifer. The discharge is equal to the total flow into the well, which
    is the product of the discharge vector $Q_r$ (Eq. 6.21) at the perimeter of the
    well and the circumference of the well, resulting in the boundary condition


    $$Q = -2\pi r_w Q_{r_1}|_{r=r_w}$$


    Note the minus sign, as $Q_r$ is defined as positive in the positive $r$ direction,
    and the discharge $Q$ of the well is positive for pumping water out of the aquifer.
    A slightly simpler boundary condition is


    $$Q = \lim_{r_w \to 0} -2\pi r_w Q_{r_1}|_{r=r_w}$$


