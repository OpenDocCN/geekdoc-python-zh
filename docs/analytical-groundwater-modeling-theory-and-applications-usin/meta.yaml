    \ times, the solution is plotted using three terms in the series (dashed lines),\
    \ which is not sufficient as a distinct wiggle is visible, especially for $t =\
    \ 1$ d. For later times, the dashed solution represents only one term in the series\
    \ solution, which is indistinguishable from the solution with ten or more terms.\n\
    \n```\n# parameters\nL = 1000 # aquifer length, m\nS = 0.1 # storage coefficient,\
    \ -\nT = 200 # transmissivity, m^2/d\nN = 0.001 # recharge rate, m/d\n```\n\n\
    ```\n# solution\ndef head(x, t, T=T, S=S, L=L, N=N, nterms=10):\n    h = 0\n \
    \   for n in range(nterms):\n        h += (-1)**n / (2 * n + 1)**3 * \\n     \
