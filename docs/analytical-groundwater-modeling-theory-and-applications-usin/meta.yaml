    The travel time for water that enters at the top of the aquifer and leaves the
    aquifer at the left or right river can again be computed from the horizontal component
    of the velocity vector $v_x = q_x/n$ (since $v_x$ is not a function of the vertical
    coordinate), as was done in the previous section. This gives the travel time $t_{tr}(x_0,
    x_1)$ from location $x = x_0$ to location $x = x_1$


    $$t_{tr}(x_0, x_1) = \int_{x_0}^{x_1} \frac{dx}{v_x} = \frac{nH}{N} \ln \left[
    \frac{v_x|_{x=x_1}}{v_x|_{x=x_0}} \right] \quad (1.33)$$


    Similarly, the travel time from the top of the aquifer $z_b + H$ to elevation
    $z$ is obtained from the vertical component of the velocity vector $v_z = q_z/n$,
    which gives


    $$t_{tr}(z) = \int_{z_b+H}^{z} \frac{dz}{v_z} = \frac{nH}{N} \ln \left( \frac{H}{z
    - z_b} \right) \quad (1.34)$$


    The travel time from the top of the aquifer to elevation $z$ is only a function
    of $z$. That is an interesting result, famously obtained by Vogel (1967), because
    it means that all water at a certain depth has the same age for the case of uniform
