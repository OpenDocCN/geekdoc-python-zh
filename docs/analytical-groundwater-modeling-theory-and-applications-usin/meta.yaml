    \ independent of the total outflow (Chapter 2).\n\nThe head $h_0$ at $x = 0$ is\
    \ obtained from Eq. (4.42) as\n\n$$h_0 = h^* + \\frac{x_{\\text{tip}}^2}{6k\\\
