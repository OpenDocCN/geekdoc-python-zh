    \ label='modeled')\nplt.legend();\n```\n\nThe procedure discussed above, where\
    \ a model of heads in an observation well is created with an approximate response\
    \ function, is known as time series analysis. Time series analysis is a powerful\
    \ and increasingly popular method to analyze heads measured in observation wells.\
    \ See, for example, Bakker and Schaars (2019) and Collenteur et al. (2019).\n\n\
