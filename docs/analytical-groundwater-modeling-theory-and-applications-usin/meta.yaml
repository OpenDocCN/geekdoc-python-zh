    and the discharge vector $Q_{x_1}$ in the bottom aquifer is


    $$Q_{x_1}|_{x=-\infty} = U_{L_1} = -T_1 G_L$$


    The head gradient far to the right is $G_R$ so that the discharge vector is


    $$Q_{x_0}|_{x=\infty} = U_{R_0} = -T_0 G_R$$


    and the discharge vector $Q_{x_1}$ in the bottom aquifer is


    $$Q_{x_1}|_{x=\infty} = U_{R_1} = -T_1 G_R$$


    An amount $\sigma$ $[L^2/T]$ flows from the aquifer into the river per meter river
    normal to the plane of flow. The discharge $\sigma$ is obtained from continuity
    of flow


    $$\sigma = U_{L_0} + U_{L_1} - (U_{R_0} + U_{R_1})$$


