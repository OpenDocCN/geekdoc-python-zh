    \ water, but the amplitude $B$ of the variation is smaller than $A$ and the peak\
    \ arrives $t_s$ later (Jacob, 1950, p. 365)\n\n$$h(x, t) = B \\cos[2\\pi(t - t_p\
    \ - t_s)/\\tau]$$\n\nThe amplitude $B$ of the head variation dampens with distance\
    \ as\n\n$$B = A \\exp\\left(-x\\sqrt{\\frac{S\\pi}{T\\tau}}\\right)$$\n\nand the\
    \ time shift $t_s$ of the peak is\n\n$$t_s = x\\sqrt{\\frac{S\\tau}{4\\pi T}}$$\n\
    \nNote that both the amplitude $B$ and the phase shift $t_s$ are a function of\
    \ the diffusivity $T/S$. This means that when the amplitude and peak time of a\
    \ tidal response are measured to estimate aquifer parameters, only the aquifer\
    \ diffusivity can be estimated, not the individual values of $S$ or $T$. Estimation\
    \ of (combinations of) aquifer parameters from the tidal response is also referred\
    \ to as the tidal method (e.g., Ferris, 1952; Carr and Van Der Kamp, 1969).\n\n\
    Equation (5.35) shows that the amplitude $B$ dampens out more quickly for shorter\
    \ tidal periods than for longer tidal periods. The characteristic length $\\mu$\
    \ is introduced as\n\n$$\\mu = \\sqrt{\\frac{T\\tau}{S\\pi}}$$\n\nso that the\
    \ amplitude may be written as\n\n$$B = A e^{-x/\\mu}$$\n\nAt a distance of $x\
    \ = 3\\mu$, the amplitude has dampened to 5% of the amplitude at $x = 0$. This\
    \ result may be used as a rule of thumb to assess whether periodic fluctuations\
    \ in surface water levels need to be taken into account when considering the head\
    \ and flow in an aquifer. If the area of interest is farther away from a surface\
    \ water body than $3\\mu$, periodic fluctuations of the surface water level with\
    \ a period of $\\tau$ may be neglected.\n\nAs an example, consider an aquifer\
    \ bounded by a tidal river. The head in the aquifer is plotted at four different\
