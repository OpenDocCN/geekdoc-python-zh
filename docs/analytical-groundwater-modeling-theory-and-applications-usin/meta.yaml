- md: "## Chapter 8\n\n## Analytic element modeling of steady two-dimensional flow\n\
    \nPumping wells form an important part of the two-dimensional solutions that have\
    \ been discussed so far. The principle of superposition allows for the solution\
    \ of problems with an arbitrary number of wells, and the method of images allows\
    \ for the simulation of straight specified-head and no-flow boundaries. The organization\
    \ of solutions with multiple wells becomes cumbersome when the number of wells\
    \ grows. The analytic element method is a modeling technique that facilitates\
    \ the superposition of many solutions, including wells.\n\nThe analytic element\
    \ method is based on the superposition of analytic solutions (e.g., Strack, 2003).\
    \ Each analytic solution represents a feature in the aquifer and has at least\
    \ one free parameter. For example, the solution for a pumping well is an analytic\
    \ element and the free parameter is the discharge of the well. The free parameter\
    \ of an analytic element may either be specified or computed from specified conditions.\
    \ For example, the discharge of a well may be computed from the head specified\
    \ at a point, referred to as the collocation point. All unknown free parameters\
    \ in a model must be computed simultaneously as, e.g., the discharge of one well\
    \ may affect the head at another well and vice versa.\n\nIn this chapter, the\
    \ principles of the analytic element are discussed. Python code for the analytic\
    \ element method is developed using an object-oriented design based on Bakker\
    \ and Kelson (2009). The analytic element program presented in this chapter includes\
    \ uniform flow, wells, line-sinks for the modeling of river segments, and area-sinks\
    \ for the modeling of areal recharge. Many advanced analytic elements exist for\
    \ the simulation of steady single-layer flow, e.g., for the simulation of impermeable\
    \ boundaries or inhomogeneity boundaries (e.g., Haitjema, 1995; Strack, 2017).\
    \ In addition, formulations exist for both steady and transient multi-layer flow\
    \ (Bakker and Strack, 2003; Fitts, 2010; Bakker, 2013a). Computer programs for\
    \ analytic element modeling of groundwater flow include Gflow (Haitjema, 1995)\
    \ for steady single layer flow, and TimML (Bakker, 2021), TTim (Bakker, 2013b),\
    \ and AnAgSim (Fitts, 2021) for steady and transient multi-aquifer flow.\n\n###\
    \ 8.1 Uniform flow and wells\n\nIn this section, an analytic element code is developed\
    \ to simulate wells, uniform flow, and a constant. The complex potential is written\
    \ as\n\n$$\\Omega = -Q_u e^{-i\\theta} \\zeta + \\sum_{m=1}^{M} \\frac{Q_m}{2\\\
    pi} \\ln(\\zeta - \\zeta_m) + \\sum_{n=1}^{N} \\frac{P_n}{2\\pi} \\ln(\\zeta -\
    \ \\zeta_n) + C$$\n\nwhere $Q_u$ is the magnitude of the uniform flow (the parameter),\
    \ $\\theta$ is the direction of uniform flow, $M$ is the number of wells with\
    \ a specified discharge, $N$ is the number of wells with a head-specified condition,\
    \ and $P_n$ is the discharge of head-specified well $n$, which is unknown upfront.\
    \ The real constant $C$ is also a priori unknown and is computed from a specified-head\
    \ condition. The transmissivity is approximated as constant throughout the model.\n\
    \nThe analytic element code is developed using object-oriented programming; an\
    \ introduction to object-oriented programming for Python may be found in, e.g.,\
    \ Lutz (2013). The analytic element code consists of a `Model` class and a number\
    \ of `Element` classes. The `Model` class stores the transmissivity of the aquifer\
    \ and a Python list called `elements` which contains all the elements in the model;\
    \ the `element` list is initially empty. The `Model` class has a function `omega`\
    \ to compute the complex potential at a point caused by all analytic elements\
    \ in the model (Eq. 8.1). In addition, the `Model` class has separate `potential`,\
