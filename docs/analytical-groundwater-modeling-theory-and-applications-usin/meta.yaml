    Two-dimensional data can be visualized with a contour plot. For example, consider
    the following function for the head $h$ as a function of the horizontal coordinates
    $x$ and $y$


    $$h = \frac{2}{\pi} \ln(x^2 + y^2) - 0.01x - 5$$


    A contour plot of the head is created in a window with lower-left corner $(x,
    y) = (-200, -200)$ and upper-right corner $(x, y) = (400, 200)$. A grid of $(x,
    y)$ values is defined first using the `np.meshgrid` function, which creates the
    two-dimensional arrays `x` and `y`. The head is computed at each $(x, y)$ location.
    Before contouring, a figure is created with `plt.subplot` and using the keyword
    `aspect=1` to make sure that the horizontal and vertical axes have the same scale
    (so that a circle looks like a circle rather than an ellipse). The head values
    are contoured with the `plt.contour` function; 20 head values are contoured.


    ```

    x, y = np.meshgrid(np.linspace(-200, 400, 100), np.linspace(-200, 200, 100))

    h = 2 / np.pi * np.log(x ** 2 + y ** 2) - 0.01 * x - 5

    plt.subplot(111, aspect=1)

    plt.contour(x, y, h, 20);  # draw 20 contour lines

    ```


    ![](img/ca724f426a6249bf916ffe68c7fbe382_228_0.png)


    The head values that are contoured can be specified with a list or array. First,
    the minimum and maximum values of the computed head are found with the `np.min`
    and `np.max` functions.


