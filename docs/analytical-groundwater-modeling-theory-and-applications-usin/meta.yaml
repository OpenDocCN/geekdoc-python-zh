  md: 'and continuity requires that the head and flow are continuous across $x = 0$
    (see also the conditions at $x = L_0$ in Section 1.4)


    $$h_{x=0^-} = h_{x=0^+} \quad Q_x|_{x=0^-} = Q_x|_{x=0^+} \tag{2.18}$$


    where the superscripts $-$ and $+$ stand for evaluation just to the left and just
    to the right of $x = 0$, respectively.


    The solutions for the head below the lake and drained area are written as


    $$h = h_0^* + A_0 e^{-x/\lambda_0} + B_0 e^{x/\lambda_0} \quad x \le 0$$

    $$h = h_1^* + A_1 e^{-x/\lambda_1} + B_1 e^{x/\lambda_1} \quad x \ge 0 \tag{2.19}$$


    Application of the first two boundary conditions gives $A_0 = 0$ and $B_1 = 0$,
    after which application of the two continuity conditions gives the following two
    equations


    $$h_0^* + B_0 = h_1^* + A_1$$

    $$-T \frac{B_0}{\lambda_0} = T \frac{A_1}{\lambda_1} \tag{2.20}$$


    Solving for the two remaining unknowns $A_1$ and $B_0$ gives


    $$A_1 = \lambda_1 \gamma \quad B_0 = -\lambda_0 \gamma \tag{2.21}$$


    where the dimensionless head difference $\gamma$ is


    $$\gamma = \frac{h_0^* - h_1^*}{\lambda_0 + \lambda_1} \tag{2.22}$$


    The solution for the head now becomes


    $$h = h_0^* - \lambda_0 \gamma e^{x/\lambda_0} \quad x \le 0$$

    $$h = h_1^* + \lambda_1 \gamma e^{-x/\lambda_1} \quad x \ge 0 \tag{2.23}$$


    Note that for the case of equal resistance values (so that $\lambda_0 = \lambda_1$),
    the head in the aquifer at $x = 0$ is $(h_0^* + h_1^*)/2$ as is to be expected
    from symmetry when the aquifer properties are the same on both sides of the dike.


    The discharge vector is obtained as


    $$Q_x = -T \frac{dh}{dx} \tag{2.24}$$


    which gives


    $$Q_x = T \gamma e^{x/\lambda_0} \quad x \le 0$$

    $$Q_x = T \gamma e^{-x/\lambda_1} \quad x \ge 0 \tag{2.25}$$


    The total flow $Q_0$ from the lake to the drained area is


    $$Q_0 = Q_x|_{x=0} = T \gamma = T \frac{h_0^* - h_1^*}{\lambda_0 + \lambda_1}
    \tag{2.26}$$'
