    \n简化阶跃响应的函数形式与公式 (5.44) 相同，但参数 $A$ 和 $a$ 现在只是拟合参数。换句话说，图 5.12 中显示的 $x = 0$ 处的水头被视为观测井中的观测水头，参数\
    \ $A$ 和 $a$ 通过执行最小二乘拟合获得。首先，编写一个函数用于计算与简化阶跃响应 (5.49) 对应的离散块响应。\n\n```python\n\
    def simplebresponse(A, a, delt, nstep):\n    t = np.linspace(0, nstep * delt,\
    \ nstep + 1)\n    hstep = A * (1 - np.exp(-t / a))\n    return hstep[1:] - hstep[:-1]\n\
    ```\n\n观测水头 $h_o$ 与模拟水头 $h_m$ 之间的差值 $\\varepsilon$（也称为残差或误差）计算如下：\n\n$$\\varepsilon\
    \ = h_o - h_m \\qquad (5.50)$$\n\n最优参数 $A$ 和 $a$ 通过最小化误差平方和来找到，这被称为目标函数：\n\n$$F_{\\\
    text{obj}} = \\sum \\varepsilon^2 \\qquad (5.51)$$\n\n目标函数的 Python 函数的第一个参数必须是包含参数的数组。最后一个关键字参数是\
    \ `return_heads`。当此关键字参数设置为 `True` 时，该方法返回模拟的水头而不是误差平方和，这在参数估计后计算模拟水头时很有用。\n\n\
    ```python\ndef fobj(p, delt=delt, recharge=recharge, hobs=h0, return_heads=False):\n\
    \    A, a = p\n    ntime = len(recharge)\n    b = simpleresponse(A, a, delt, ntime\
    \ + 1)\n    hm = np.zeros(ntime + 1)\n    for n in range(1, ntime + 1):\n    \
    \    hm[n] = np.sum(recharge[0:n] * b[n - 1::-1])\n    if return_heads:\n    \
    \    return hm\n    rv = np.sum((hobs - hm) ** 2)\n    return rv\n```\n\n最小化目标函数的参数可以通过多种方法找到。这里使用\
    \ `scipy.optimize` 包的 `fmin` 函数，它应用单纯形算法（参见 `fmin` 文档）。\n\n```python\nfrom scipy.optimize\
    \ import fmin\nA, a = fmin(fobj, [300, 50], disp=0)\nprint(f'Estimated parameters\
    \ A: {A:.2f} d, a: {a:.2f} d')\nhm = fobj([A, a], return_heads=True) # 计算模拟水头\n\
    ```\n\n估计参数 A: 629.89 d, a: 53.03 d\n\n模拟水头 $h_m$ 与观测水头 $h_o$ 拟合得非常好（图 5.13）。\n\
    \n```python\n# 基本绘图：模拟水头\nplt.plot(h0, 'C1.', label='observed')\nplt.plot(hm,\
    \ 'C0', label='modeled')\nplt.legend();\n```\n\n上述过程，即使用近似响应函数创建观测井水头模型，被称为时间序列分析。时间序列分析是一种强大且日益流行的方法，用于分析观测井中测量的水头。例如，参见\
    \ Bakker and Schaars (2019) 和 Collenteur et al. (2019)。\n\n**练习 5.7：** 使用精确解和提供的四年月度补给数据，计算\
    \ $x = 250$ m 处四年的月度水头，创建一个合成数据集。对合成数据集应用时间序列分析，使用指数响应函数 (5.49)。报告拟合的 $A$ 和 $a$\
    \ 值。将模拟水头和观测（合成）水头绘制在同一张图中。\n\n图 5.13 使用近似响应函数拟合模型与通过精确解获得的四年月度变化补给响应观测值的拟合。\n\
    \n## 5.4 使用拉普拉斯变换的解\n\n如前所述，有多种数学方法可以获得瞬态地下水流问题的解。其中一种方法是拉普拉斯变换，最初用于推导，例如第 5.1\
    \ 节中的解。在拉普拉斯变换方法中，控制偏微分方程被转换为所谓的拉普拉斯域中的常微分方程。拉普拉斯域中常微分方程的解比原始偏微分方程的解容易得多。困难在于从拉普拉斯域到时间域的逆变换，这需要求解一个复杂的积分。幸运的是，当解析积分繁琐或不可能时，有几种算法可以进行数值积分。有整本书专门介绍拉普拉斯变换，包括包含数学函数变换的有用表格。Bruggeman\
    \ (1999) 为具有数学倾向的地下水工程师或水文地质学家提供了一个很好的介绍。这里通过演示如何求解第 5.1 节中初始水头等于零的情况下的问题，给出一个非常简要的介绍。\n\
    \n拉普拉斯变换是一种积分变换，用符号 $\\mathcal{L}$ 表示，定义为：\n\n$$\\mathcal{L}\\{h\\} = \\bar{h}(x,\
    \ p) = \\int_0^\\infty h(x, t) e^{-pt} dt \\qquad (5.52)$$\n\n其中 $\\bar{h}$ 是拉普拉斯变换后的水头，它是\
    \ $x$ 和拉普拉斯变换参数 $p$ 的函数，但不是时间的函数。关于 $x$ 的导数的变换很简单：\n\n$$\\mathcal{L}\\left\\{\\\
    frac{\\partial h}{\\partial x}\\right\\} = \\frac{\\partial \\bar{h}}{\\partial\
    \ x} \\qquad \\mathcal{L}\\left\\{\\frac{\\partial^2 h}{\\partial x^2}\\right\\\
    } = \\frac{\\partial^2 \\bar{h}}{\\partial x^2} \\qquad (5.53)$$\n\n而关于时间的导数的变换是：\n\
    \n$$\\mathcal{L}\\left\\{\\frac{\\partial h}{\\partial t}\\right\\} = p\\bar{h}\
    \ \\qquad (5.54)$$\n\n将拉普拉斯变换规则应用于无补给的一维瞬态流的控制微分方程 (5.8)，得到：\n\n$$\\frac{d^2 \\\
    bar{h}}{dx^2} = \\frac{pS}{T} \\bar{h} \\qquad (5.55)$$\n\n这确实是一个常微分方程。公式 (5.55)\
    \ 是修正的亥姆霍兹方程 (2.5)，该方程在第 2 章中用于稳定半承压流。"
