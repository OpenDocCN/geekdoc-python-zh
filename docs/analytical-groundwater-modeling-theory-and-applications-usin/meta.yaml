    # Chapter 5


    ## Transient one-dimensional flow


    All solutions presented so far in this book were for steady flow: The head and
    flow were a function of $x$, but not of time. In nature, all flows are transient
    and they vary in response to forcings such as rainfall, evaporation, transpiration,
    atmospheric pressure changes, tidal fluctuations, and geological processes (e.g.,
    loading, tectonic stress, and heating). In addition to these natural processes,
    there is groundwater pumping and injection, which are anthropogenic forcings.
    The degree to which the approximation of steady state is justified depends on
    the system under consideration and the objective of the investigation. For example,
    groundwater fluctuations may be small, or fluctuations may not be of interest
    when the objective is to study the long-term average situation. It is up to the
    modeler to assess whether or not temporal fluctuations are of importance. Transient
    analytic solutions can be very useful for that purpose because they can be used
    to quickly determine how long it takes before a steady state is reached.


    This chapter deals with one-dimensional transient flow, which means that the head
    and flow are a function of both $x$ and time $t$. Transient solutions involving
    pumping are considered in Chapter 9. The focus here is on problems where heads
    vary as a result of changes in surface water levels or groundwater recharge.


    As a starting point, the differential equation for one-dimensional transient flow
    is derived. The transient groundwater mass balance states that


    Mass in $-$ Mass out $=$ Increase in mass


    The groundwater mass balance reduces to a volume balance when the groundwater
    density is approximated as constant. The volume balance is


    Volume in $-$ Volume out $=$ Increase in volume


    The volume balance for one-dimensional flow in an aquifer is derived by considering
    a small section of aquifer that is $\Delta x$ long and $\Delta y = 1$ wide in
    the direction normal to the plane of flow. Inflow consists of horizontal flow
    from the left, $Q_x(x, t)$ [L$^2$/T], and recharge at the top, $N$ [L/T]. Outflow
    consists of horizontal flow at the right, $Q_x(x + \Delta x, t)$ (Figure 5.1).
    The increase in volume equals the increase in head multiplied by the storage coefficient
    $S$ and $\Delta x \Delta y$ (where $\Delta y = 1$). Recall from Section 0.6 that
    the storage coefficient is equal to the phreatic storage $S = S_p$ for unconfined
    flow and the product of the specific storage $S_s$ and the aquifer thickness $H$
    ($S = S_s H$) for confined flow. Further, recall that the discharge vector $Q_x$
    is the discharge per unit width of aquifer.


    The volume balance is written for a period $\Delta t$. Substitution of the appropriate
    volumes in Eq. (5.2) gives


    $Q_x(x, t)\Delta t + N\Delta x\Delta t - Q_x(x + \Delta x, t)\Delta t = S\Delta
    x[h(x, t + \Delta t) - h(x, t)]$


    Division by $\Delta x\Delta t$ and rearrangement of terms gives


    $\frac{Q_x(x + \Delta x, t) - Q_x(x, t)}{\Delta x} = N - S\frac{h(x, t + \Delta
    t) - h(x, t)}{\Delta t}$


    DOI: 10.1201/9781315206134-5


    ![](img/ca724f426a6249bf916ffe68c7fbe382_86_0.png)


    In the limit for $\Delta x \rightarrow 0$ and $\Delta t \rightarrow 0$, the volume
    balance turns into the differential equation for transient one-dimensional horizontal
    transient flow


    $$\frac{\partial Q_x}{\partial x} = -S \frac{\partial h}{\partial t} + N \quad
    (5.5)$$


    The discharge vector for transient flow is the same as that for steady flow (Eq.
    1.6)


    $$Q_x = -T \frac{\partial h}{\partial x} \quad (5.6)$$


    Recall that for confined flow, $T$ is the constant transmissivity of the aquifer.
    For unconfined flow, the head-dependent transmissivity is approximated by a constant
    effective transmissivity $T = kH$, where the saturated thickness $H$ is approximated
    as constant.


    Substitution of Eq. (5.6) for $Q_x$ in Eq. (5.5) gives


    $$\frac{\partial^2 h}{\partial x^2} = \frac{S}{T} \frac{\partial h}{\partial t}
    - \frac{N}{T} \quad (5.7)$$


    When the areal recharge equals zero, the governing differential equation reduces
    to


    $$\frac{\partial^2 h}{\partial x^2} = \frac{S}{T} \frac{\partial h}{\partial t}
    \quad (5.8)$$


    This equation is known as the diffusion equation; the term $T/S$ is also referred
    to as the aquifer diffusivity. The diffusion equation governs the transient behavior
    of many other physical processes.


    Solutions for transient groundwater flow are, not surprisingly, more difficult
    to obtain than those for steady flow. Common mathematical approaches include similarity
    solutions, separation of variables, Fourier series, and Laplace transforms. An
    introduction into many of these mathematical solution techniques for hydrological
    applications may be found in, e.g., Bruggeman (1999). In this chapter, solutions
    are presented without derivation. Verification of the solutions is discussed and
    part of the exercises. Solutions are presented for three problems: the response
    to a change in the surface water level in a semi-infinite aquifer (Section 5.1),
    the tidal response in a semi-infinite aquifer (Section 5.2), and the response
    to transient recharge between two parallel rivers (Section 5.3). The problem of
    Section 5.1 is resolved using the Laplace transform approach in Section 5.4, and
    a brief introduction into the (numerical) evaluation of Laplace transform solutions
    is presented. In the final section of this chapter, a solution to the Boussinesq
    equation for transient unconfined flow is presented.


    ## 5.1 Step changes in surface water level


    Changes in river stage propagate as head changes in aquifers that are in contact
    with the river, which is important for understanding surface water–groundwater
    interactions. The following example considers one-dimensional transient flow in
    a semi-infinite aquifer as shown in Figure 5.2. The aquifer is bounded on the
    left by a fully penetrating river that is in direct contact with the aquifer.
    Initially, the head in the aquifer is equal to the river stage $h_0$ everywhere.
    At time $t = t_0$, the stage in the river is raised by an amount $\Delta h$.


    The solution is split into a steady part $h_s$ that is only a function of $x$
    and a transient part $h_t$ that is a function of $x$ and $t$


    $$h = h_s + h_t \tag{5.9}$$


    The boundary conditions for the steady part are


    $$h_s|_{x=0} = h_s|_{x \to \infty} = h_0 \tag{5.10}$$


    The steady solution is easy: $h_s = h_0$.


    The boundary conditions for the transient solution are


    $$h_t|_{x=0, t>0} = \Delta h \tag{5.11}$$

    $$h_t|_{x \to \infty, t} = 0 \tag{5.12}$$


    and the initial condition is


    $$h_t|_{x, t=0} = 0 \tag{5.13}$$


    Note that the sum of the boundary conditions of the steady and transient solutions
    gives the boundary condition of the stated problem; the same holds for the initial
    condition. In essence, the transient solution represents the head change in the
    aquifer caused by the change in the river stage. The remainder of this section
    is concerned with the transient part of the solution, and the subscript $t$ is
    dropped.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_87_0.png)


    The solution for the stated transient problem was obtained as a similarity solution
    by Edelman (1947) and is referred to as the Edelman solution. Bruggeman (1999)
    obtained the same result using the Laplace transform method. The Edelman solution
    is


    $$h(x, t) = \Delta h \, \text{erfc}(u) \tag{5.14}$$


    where


    $$u = \sqrt{\frac{S x^2}{4 T (t - t_0)}} \tag{5.15}$$


    and erfc is the complimentary error function defined as


    $$\text{erfc}(u) = \int_u^\infty \frac{2}{\sqrt{\pi}} e^{-\tau^2} \, d\tau \tag{5.16}$$


    The complementary error function is available in the `scipy.special` package.
    An equation for the flux in the aquifer is obtained with Darcy''s law


    $$Q_x = -T \frac{\partial h}{\partial x} = -T \Delta h \frac{\partial \text{erfc}(u)}{\partial
    x} \tag{5.17}$$'
