    \ Section 1.2 is extended to include transient recharge. The rivers are a distance\
    \ $L$ apart; the origin of the coordinate system is chosen halfway between the\
    \ two rivers (Figure 5.9). Initially, the head in the aquifer is at steady state,\
    \ so the initial transient head equals zero. The rivers are in direct contact\
    \ with the aquifer and the river stages are fixed so that the boundary conditions\
    \ and initial condition of the transient head are\n\n$h|_{x=-L/2,t} = h|_{x=L/2,t}\
    \ = h|_{x,t=0} = 0$ (5.39)\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_96_1.png)\n\
    \nAt time $t = 0$, areal recharge starts at a constant and uniform rate $N$. The\
    \ solution for the head in the aquifer as a function of time can be obtained with\
    \ separation of variables and results in the following infinite series (Bruggeman,\
    \ 1999, solution 133.16)\n\n$h = \\frac{-N}{2T} \\left(x^2 - \\frac{1}{4}L^2\\\
    right) - \\frac{4NL^2}{\\pi^3 T} \\sum_{n=0}^{\\infty} \\frac{(-1)^n}{(2n+1)^3}\
    \ \\cos\\left[\\frac{(2n+1)\\pi x}{L}\\right] \\exp\\left[-\\frac{(2n+1)^2 \\\
    pi^2 T t}{S L^2}\\right]$ (5.40)"
  - "[PAGE 97]\n\nNote that for large times, the exponential term in the solution\
    \ goes to zero and the head approaches the steady state solution $\\frac{-N}{2T}\
    \ \\left(x^2 - \\frac{1}{4}L^2\\right)$, which is Eq. (1.24) for the case that\
    \ the heads in the river are set to zero and the origin of the coordinate system\
    \ is halfway between the two rivers.\n\nIn the following example, the head is\
    \ plotted vs. $x$ at three early times and at three late times (Figure 5.10).\
    \ For the early times, the solution is plotted using three terms in the series\
    \ (dashed lines), which is not sufficient as a distinct wiggle is visible, especially\
    \ for $t = 1$ d. For later times, the dashed solution represents only one term\
    \ in the series solution, which is indistinguishable from the solution with ten\
    \ or more terms.\n\n```\n# parameters\nL = 1000 # aquifer length, m\nS = 0.1 #\
    \ storage coefficient, -\nT = 200 # transmissivity, m^2/d\nN = 0.001 # recharge\
    \ rate, m/d\n```\n\n```\n# solution\ndef head(x, t, T=T, S=S, L=L, N=N, nterms=10):\n\
    \    h = 0\n    for n in range(nterms):\n        h += (-1)**n / (2 * n + 1)**3\
    \ * \\n             np.cos(((2 * n + 1) * np.pi * x) / L) * \\n             np.exp(-((2\
    \ * n + 1)**2 * np.pi**2 * T * t) / (S * L**2))\n    h = -N / (2 * T) * (x**2\
    \ - L**2/4) - 4 * N * L**2 / (np.pi**3 * T) * h\n    return h\n```\n\n```\n# basic\
    \ head plot\nplt.subplot(121) # early time\nx = np.linspace(-L / 2, L / 2, 100)\n\
    for t in [1, 2, 3]:\n    plt.plot(x, head(x, t, nterms=3), '--')\n    plt.plot(x,\
