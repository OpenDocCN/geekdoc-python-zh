  md: "np.atleast_1d function can be used to make sure that the input argument x is\
    \ at least a one-dimensional array (so a scalar is converted to an array). The\
    \ np.empty(x.shape) function is used to create an empty array of the same shape\
    \ as x. Conditional statements are used to fill the array, which is returned at\
    \ the end of the function.\n\n```\ndef func_one_array(x):  # fancy function that\
    \ works on arrays\n    x = np.atleast_1d(x)\n    f = np.empty(x.shape) # return\
    \ value is now called f\n    f[x < 0] = np.cos(x[x < 0])\n    f[x >= 0] = np.exp(-x[x\
    \ >= 0])\n    return f\n```\n\nThe func_one_array function is used, and a graph\
