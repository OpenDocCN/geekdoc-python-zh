    \             110, 120, 150, 180, 210, 240, 270, 300, 360, 420]) # minutes\nh\
    \ = np.array([-0.94, -1.23, -1.54, -1.61, -1.82, -2.05, -2.18, -2.32, -2.43,\n\
    \              -2.55, -2.63, -2.72, -2.8 , -2.84, -2.89, -2.91, -2.94, -2.97,\n\
    \              -3.03, -3.07, -3.11, -3.13, -3.15, -3.17, -3.15, -3.18]) # m\n\
    ```\n\nAs an example, the solution for transient flow to a well that starts pumping\
    \ at $t_0 = 0$ in a semi-confined aquifer is repeated here using a Laplace transform\
    \ solution following the procedure explained in Section 5.4. The same procedure\
    \ is used to solve the transient flow problems in the next two sections. The Laplace\
    \ transform of the differential equation (9.29) is\n\n$$\\nabla^2 \\bar{h} = \\\
    frac{Sp}{T} \\bar{h} + \\frac{\\bar{h}}{cT} = w \\bar{h}$$ (9.33)\n\nwhere $\\\
    bar{h}$ is the Laplace-transformed head, $p$ is the Laplace transform parameter,\
    \ and\n\n$$w = \\frac{Scp + 1}{cT}$$ (9.34)\n\nBoundary conditions (9.6) and (9.8)\
    \ transform to\n\n$$\\lim_{r \\to 0} -2\\pi r \\bar{Q}_r = \\frac{Q}{p}$$ (9.35)\n\
    $$\\bar{h}|_{r=\\infty} = 0$$ (9.36)\n\nThe radial flow problem in the Laplace\
    \ domain is mathematically analogous to a steady well in a semi-confined aquifer\
    \ (Section 6.4), and the solution is\n\n$$\\bar{h} = -\\frac{Q}{2\\pi Tp} \\mathbf{K}_0(r\\\
    sqrt{w})$$ (9.37)\n\nBack-transformation to the time domain is conducted numerically\
    \ using the Stehfest algorithm (see Section 5.4). The example below shows that\
    \ the Hantush solution using numerical integration of Eq. (9.30) is virtually\
