    \n## 5.4 Solutions with Laplace transforms\n\nAs mentioned, there are various\
    \ mathematical approaches to obtain solutions for transient groundwater flow problems.\
    \ One of these approaches is the Laplace transform, which was originally applied\
    \ to derive, e.g., the solution in Section 5.1. In the Laplace transform method,\
    \ the governing partial differential equation is transformed into an ordinary\
    \ differential equation in what is called the Laplace domain. The solution to\
    \ the ordinary differential equation in the Laplace domain is much easier than\
    \ the solution to the original partial differential equation. The difficulty lies\
    \ in the back-transformation from the Laplace domain to the time domain, which\
    \ requires the solution of a complicated integral. Luckily, there are several\
    \ algorithms to carry out the integration numerically when analytic integration\
    \ is cumbersome or impossible. There are entire books written on Laplace transformations,\
    \ including useful tables with transformations of mathematical functions. A nice\
    \ introduction for the mathematically inclined groundwater engineer or hydrogeologist\
    \ is given by Bruggeman (1999). Here, a very brief introduction is given by demonstrating\
    \ how to solve the problem of Section 5.1 for the case that the initial head equals\
    \ zero.\n\nThe Laplace transform is an integral transform, indicated with the\
    \ symbol $\\mathcal{L}$, and is defined as\n\n$$\\mathcal{L}\\{h\\} = \\bar{h}(x,\
    \ p) = \\int_0^\\infty h(x, t) e^{-pt} dt \\qquad (5.52)$$\n\nwhere $\\bar{h}$\
    \ is the Laplace-transformed head, which is a function of $x$ and the Laplace\
    \ transform parameter $p$, but not of time. The transforms of derivatives with\
    \ respect to $x$ are simple\n\n$$\\mathcal{L}\\left\\{\\frac{\\partial h}{\\partial\
    \ x}\\right\\} = \\frac{\\partial \\bar{h}}{\\partial x} \\qquad \\mathcal{L}\\\
    left\\{\\frac{\\partial^2 h}{\\partial x^2}\\right\\} = \\frac{\\partial^2 \\\
    bar{h}}{\\partial x^2} \\qquad (5.53)$$\n\nwhile transformation of the derivative\
    \ with respect to time is\n\n$$\\mathcal{L}\\left\\{\\frac{\\partial h}{\\partial\
    \ t}\\right\\} = p\\bar{h} \\qquad (5.54)$$\n\nApplication of the Laplace transformation\
    \ rules to the governing differential equation (5.8) for transient one-dimensional\
    \ flow without recharge gives\n\n$$\\frac{d^2 \\bar{h}}{dx^2} = \\frac{pS}{T}\
    \ \\bar{h} \\qquad (5.55)$$\n\nwhich is indeed an ordinary differential equation.\
    \ Eq. (5.55) is the modified Helmholtz equation (2.5), which was introduced in\
    \ Chapter 2 for steady semi-confined flow."
