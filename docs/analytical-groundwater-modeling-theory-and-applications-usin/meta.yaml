    \n![](img/ca724f426a6249bf916ffe68c7fbe382_80_1.png)\n\n图4.9 通过弱透水层与含水层隔开的海域的界面流。\n\
    \n流动问题现在由三部分组成：界面趾上游的受限流、趾与海岸线之间的受限界面流，以及海底下方的半受限界面流。陆地下方的水流可以使用第4.1节推导的受限界面流的流量势来求解。流量势不能用于海底下方的半受限流段。\n\
    \n下面推导半受限部分水流的表达式。假设界面趾位于陆地下方（稍后将推导一个条件）。与受限界面流一样，海底下方的流量矢量可以写为（见公式4.7）\n\n$$Q_x\
