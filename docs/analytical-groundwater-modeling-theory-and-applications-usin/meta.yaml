    $$x \\le 0$$\n$$(2.49)$$\n\n$$Q_{x0} = U_{R_0} - \\frac{T_1}{T} \\frac{\\sigma}{2}\
    \ e^{-x/\\lambda}$$\n$$Q_{x1} = U_{R_1} + \\frac{T_1}{T} \\frac{\\sigma}{2} e^{-x/\\\
    lambda}$$\n$$x \\ge 0$$\n$$(2.50)$$\n\n双含水层系统的越流系数 $\\lambda$（公式 2.38）与半承压流中的作用相同：在距离河流\
    \ $3\\lambda$ 处，含水层中的水头和梯度近似相等。\n\n在下面的例子中，下层含水层的导水系数（因此流量）是上层含水层的两倍。水流从两侧流向河流，但左侧的流量是右侧的四倍（图\
