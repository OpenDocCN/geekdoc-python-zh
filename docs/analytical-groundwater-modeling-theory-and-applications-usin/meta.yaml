    \ 10.8 所示。流网的代码与图 10.4 的相同，此处不再重复。\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_197_0.png)\n\
    \n**练习 10.1：** 绘制图 10.8 中三种情况下含水层顶部和底部水头随 $x$ 的变化（类似于图 10.7），并添加使用有效电导 $C$ 的 Dupuit\
    \ 解。\n\n## 10.3 底部台阶上的流动\n\n第 3.2 节使用 Dupuit 解研究了底部突变对无压含水层中流动和水头分布的影响。此处，使用垂直平面内二维流动的解，研究了底部突变对承压流动中流动和水头分布的影响。将二维流动解与\
    \ Dupuit 解进行比较，并研究了垂直各向异性水力传导系数的影响。该解通过保角映射获得，并且此处函数 $\\zeta(\\tau)$ 无法解析反演以获得\
    \ $\\tau(\\zeta)$ 的表达式，这增加了函数求值的复杂性。\n\n考虑一个具有不透水顶部和不透水底部的承压含水层中垂直平面内的二维流动。底部是分段水平的，并在\
    \ $x = 0$ 处发生突变（见图 10.9）。对于 $x \\le 0$，含水层厚度等于 $H_L$；对于 $x \\ge 0$，等于 $H_R$。水力传导系数是均质且各向同性的，等于\
    \ $k$。从左到右的流量等于 $Q_x = U$\n\n$$\\lim_{x \\to -\\infty} q_x H_L = \\lim_{x \\to\
    \ \\infty} q_x H_R = U \\qquad (10.31)$$\n\n流函数选择为沿含水层底部等于 $\\psi = 0$，这意味着沿含水层顶部\
    \ $\\psi = -U$。作为参考，原点处的水头等于零\n\n$$h_{x=0, z=0} = 0 \\qquad (10.32)$$\n\n再次以参数形式\
    \ $\\omega(\\tau)$ 和 $\\zeta(\\tau)$ 寻求所述问题的解，其中参考平面 $\\tau$ 选择为图 10.9 所示的四分之一平面。点\
    \ 1 对应 $\\tau = \\infty$，点 2 对应 $\\tau = 0$，点 4 对应 $\\tau = 1$。点 3 对应 $\\tau =\
    \ \\lambda$，其中 $\\lambda$ 的值由映射确定。含水层顶部和底部的水平部分对应于 $\\tau$ 的正实轴（注意 $\\zeta$ 和\
    \ $\\tau$ 平面中相应的红色、紫色和棕色部分），而底部的垂直部分对应于 $\\tau$ 平面中的正虚轴（绿色）。\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_198_0.png)\n\
    \n所述问题的解为\n\n$$\\zeta = \\frac{-H_R}{\\pi} \\ln \\frac{\\tau - \\lambda}{\\tau\
    \ + \\lambda} + \\frac{H_L}{\\pi} \\ln \\frac{\\tau - 1}{\\tau + 1} + (H_R - H_L)i\
    \ \\quad (10.33)$$\n\n$$\\omega = \\frac{-U}{\\pi} \\ln[(\\tau - 1)(\\tau + 1)]\
    \ + \\frac{U}{\\pi} \\ln[(\\tau - \\lambda)(\\tau + \\lambda)/\\lambda^2] \\quad\
    \ (10.34)$$\n\n其中 $\\lambda = H_L/H_R$。注意方程 (10.33) 和 (10.20) 之间的相似性，但对于这种情况，正如保角映射中常见的，解\
    \ $\\zeta(\\tau)$ 无法反演以获得解 $\\tau(\\zeta)$。解 (10.33) 和 (10.34) 通过选择一个 $\\tau$\
    \ 值并同时计算复势 $\\omega$ 和相应的复坐标 $\\zeta$ 来求值。\n\n流网创建如下：在 $\\tau$ 平面中定义一个网格，并为每个网格点计算复坐标\
    \ $\\zeta = x + iz$ 和复势 $\\omega$。使用 matplotlib 的常规等高线函数创建等高线图，将计算出的不规则 $x$ 和\
    \ $z$ 网格以及计算出的水头或流函数传递给它。\n\n沿含水层顶部（点 3 和点 4 之间）的所有点对应于 $\\tau$ 的实轴上介于 $\\xi =\
    \ \\lambda$（点 3）和 $\\xi = 1$（点 4）之间的部分。在 $\\zeta$ 平面中沿含水层顶部相距很远的一些点在 $\\tau$ 平面中非常接近。这种现象在保角映射中称为拥挤效应。因此，$\\\
    tau$ 平面中的规则间距网格会导致 $\\zeta$ 平面中的不规则网格，其中一些点可能相距很远。通过在 $\\tau$ 平面中定义一个不规则间距的网格来获得准确的等高线图，该网格在\
    \ $\\xi$ 方向上包含三个段：从点 2 到 3，点 3 到 4，以及点 4 到一个较大的值；在 $\\eta$ 方向上使用两个段。注意，在点 3 和点\
    \ 4 处，$\\zeta$ 和 $\\omega$ 都无法轻松计算，因为解中的对数在这些点处无法求值。当然，解在极限情况下存在。作为实际解决方案，解被计算到距离点\
    \ 3 和点 4 一个小距离处，而不是在数学上取极限并编程实现结果。\n\n一个示例流网如图 10.10 所示。Dupuit 解的流线是水平线，在底部发生突变（与图\
    \ 3.8 比较），并在图 10.10 中用虚线表示。注意，Dupuit 流线在距离底部突变超过一个含水层厚度的地方是二维流线的良好近似。类似地，垂直水头变化在距离底部突变约一个含水层厚度处变得可以忽略不计。"
