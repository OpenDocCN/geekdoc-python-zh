    h = ml.head(xg, yg)\n\n# 基本绘图\nplt.subplot(121, aspect=1)\nplt.contour(xg, yg,\
    \ h, 20)\nplt.subplot(122)\nplt.plot(xg[0], h[50]);\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_165_0.png)\n\
    \n**练习 8.6：** 使用解析单元法复制第6.1节的最终示例，针对井抽水量为岛上一半补给量的情况。将导水系数近似为 $k(h_R - z_b)$。在同一张图上绘制恒定导水系数的解析单元解和第6.1节无压流的精确解。\n\
