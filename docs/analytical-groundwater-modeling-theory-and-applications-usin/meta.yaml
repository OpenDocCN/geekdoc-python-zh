    # 5.2 Periodic changes in surface water level


    Periodic head variations in an aquifer may be caused by, e.g., tides, seasonal
    fluctuations, or the periodic operation of dams. The surface water level variation
    is approximated here as a sinusoidal fluctuation with one specific amplitude and
    one specific period. Surface water level variations can commonly be expressed
    as a combination of several sinusoidal fluctuations with their own amplitude and
    period; the response to such a combined variation may be computed through superposition.


    Consider one-dimensional flow in a semi-infinite aquifer (see Figure 5.6). There
    is no areal recharge and no flow at infinity


    $$\frac{\partial h}{\partial x}\bigg|_{x \to \infty, t} = 0 \quad (5.32)$$


    The transmissivity $T$ of the aquifer is approximated as constant. The aquifer
    is bounded by open water at $x = 0$, which fluctuates as


    $$h|_{x=0, t} = A \cos\left(\frac{2\pi(t - t_p)}{\tau}\right) \quad (5.33)$$


    where $A$ is the amplitude of the fluctuation, $t_p$ is the time of the peak,
    and $\tau$ is the period of the fluctuation. There is no initial condition; that
    is, the head at $x = 0$ has fluctuated as (5.33) forever (in practice, for a long
    time).


    ![](img/ca724f426a6249bf916ffe68c7fbe382_93_0.png)


    The solution to the stated problem may be obtained with separation of variables
    and was first published by Forchheimer (1919, p. 1229). It turns out that the
    head response in the'
