    the imaginary part is the stream function


    $$\Omega = \Phi + i\Psi$$


    In mathematical terms, this means that the stream function is the harmonic conjugate
    of the discharge potential (Strack, 1989). The complex potential $\Omega$ is a
    function of the complex coordinate $\zeta = x + iy$, where $i$ is the imaginary
    unit ($i^2 = -1$). The letter $j$ is used for the imaginary unit in Python, but
    $i$ is used in the mathematical equations in this book. The negative derivative
    of the complex potential is the complex discharge


    $$W(\zeta) = -\frac{d\Omega}{d\zeta} = Q_x - iQ_y$$


    Note that the imaginary part of the complex discharge is minus the component of
    the discharge vector in the $y$-direction.


    The introduction of complex variables makes it easy to compute the discharge potential
    and stream function simultaneously and allows for the use of sophisticated tools,
    including conformal mapping (see Chapter 10), to solve groundwater flow problems.
    More information on the application of complex variables in solving groundwater
    flow problems can be found in, e.g., Polubarinova-Kochina (1962), Harr (1962),
    Verruijt (1970), and Strack (1989).


    The complex potential for uniform flow is


    $$\Omega = -W_u\zeta$$


    where $W_u$ is the uniform complex discharge


    $$W = W_u = U - iV$$


    The complex potential for a well is


    $$\Omega = \frac{Q}{2\pi} \ln(\zeta - \zeta_w)$$


    where $Q$ is the discharge of the well and $\zeta_w = x_w + iy_w$ is the complex
    coordinate of the well location. The validity of Eq. (7.21) is shown by writing
