    96 Analytical Groundwater Modeling


    Table 6.1 Definition of the discharge potential for different types of flow


    | Flow Type | Discharge potential | Condition | Section |

    | :--- | :--- | :--- | :--- |

    | Confined flow | $\Phi = kHh$ | $h \ge z_t$ | 3.3 |

    | Unconfined flow | $\Phi = \frac{1}{2}k(h - z_b)^2$ | $h \ge z_b$ | 3.1 |

    | Confined/unconfined flow | $\Phi = kHh - (\frac{1}{2}kH^2 + kHz_b)$ | $h \ge
    z_t$ | 3.3 |

    | | $\Phi = \frac{1}{2}k(h - z_b)^2$ | $z_b \le h \le z_t$ | 3.3 |

    | Confined interface flow | $\Phi = kHh + (\frac{1}{2}kH^2 + kHz_b)/\alpha$ |
    $h \ge -z_b/\alpha$ | 4.1 |

    | | $\Phi = \frac{1}{2}k\alpha(h + z_t/\alpha)^2$ | $-z_t/\alpha \le h \le -z_b/\alpha$
    | 4.1 |

    | Unconfined interface flow | $\Phi = \frac{1}{2}k(h - z_b)^2 - \frac{1}{2}k(\alpha
    + 1)z_b^2/\alpha$ | $h \ge -z_b/\alpha$ | 4.2 |

    | | $\Phi = \frac{1}{2}k(\alpha + 1)h^2$ | $0 \le h \le -z_b/\alpha$ | 4.2 |


    where $k$ is the hydraulic conductivity of the aquifer, $z_b$ and $z_t$ are the
    elevations of the bottom and top of the aquifer, $H$ is the aquifer thickness,
    and $\alpha = \rho_f/(\rho_s - \rho_f)$, where $\rho_f$ and $\rho_s$ are the densities
    of freshwater and saltwater, respectively. For interface flow, all heads and elevations
    are measured with respect to the sea level.


    In the absence of areal recharge ($N = 0$), this differential equation is referred
    to as the two-dimensional Laplace equation. The relationships between the discharge
    potential and head for different flow types are summarized in Table 6.1.


    Flow to a pumping well in a homogeneous, isotropic aquifer is radially symmetric
    in the absence of any other flow features. As a result, the head and flow are
    a function only of the radial distance to the well. The continuity equation in
    terms of radial coordinates is derived by considering the water balance for an
    annulus (Figure 6.2). The inner radius of the annulus is $r$, the outer radius
    is $r + \Delta r$, and $Q_r$ is the radial component of the discharge vector (i.e.,
    positive away from the well). For steady flow, the continuity equation is


    Inflow - Outflow = 0 (6.4)


    Inflow equals areal recharge on the annulus and inflow along the inner radius.
    Outflow equals outflow along the outer radius so that the continuity equation
    becomes


    $(\pi(r + \Delta r)^2 - \pi r^2)N + 2\pi r Q_r|_r - 2\pi(r + \Delta r)Q_r|_{r+\Delta
    r} = 0$ (6.5)


    Division by $2\pi \Delta r$ and taking the limit for $\Delta r \to 0$ gives


    $Nr - \frac{d(rQ_r)}{dr} = 0$ (6.6)


    Application of the product rule for differentiation and using that the radial
    component of the discharge vector is


    $Q_r = -\frac{d\Phi}{dr}$ (6.7)


    gives the differential equation for steady potential flow in radial coordinates


    $\frac{d^2\Phi}{dr^2} + \frac{1}{r}\frac{d\Phi}{dr} = -N$ (6.8)


    Note that this equation is consistent with Eq. (6.3) because the Laplacian in
    terms of polar coordinates $r, \theta$ is


    $\nabla^2\Phi = \frac{d^2\Phi}{dr^2} + \frac{1}{r}\frac{d\Phi}{dr} + \frac{1}{r^2}\frac{d^2\Phi}{d\theta^2}$
    (6.9)'
- md: '## 6.1 Radially symmetric flow on a circular island


    Radial flow problems and solutions are important in groundwater engineering because
    they represent the local flow field around pumping wells. In this section, solutions
    are presented for radially symmetric two-dimensional flow on a circular island.
    The head is fixed along the perimeter of the island, the areal recharge on the
    island is uniform, and a pumping well is located at the center of the island.
    The head and flow are a function only of the radial coordinate $r$. The problem
    is depicted for unconfined flow in Figure 6.4, but is equally valid for any of
    the flow types listed in Table 6.1. The solution is derived as follows. First,
    the solution is derived for flow to a well at the center of a circular island
    without recharge ($N = 0$). Second, the solution is derived for flow on a circular
    island with uniform recharge, but no well ($Q = 0$). And third, the first two
    solutions are combined to solve the problem for flow to a well at the center of
    a circular island with uniform recharge. The purpose of this solution approach
    is to demonstrate the principle of superposition.


    The differential equation for the discharge potential in terms of $r$ is given
    by Eq. (6.8). The general solution to this differential equation is


    $$\Phi = -\frac{1}{4}Nr^2 + A\ln r + B$$


    where $A$ and $B$ are constants to be evaluated from boundary conditions. The
    corresponding radial component of the discharge vector is


    $$Q_r = -\frac{\mathrm{d}\Phi}{\mathrm{d}r} = \frac{1}{2}Nr - \frac{A}{r}$$


    First, consider flow to a pumping well at the center of a circular island of radius
    $R$; the radius of the well is $r_w$. The discharge potential that is the solution
    for this problem is referred to as $\Phi_1$. The head is fixed to $h_R$ at the
    perimeter of the island ($r = R$). The corresponding discharge potential is computed
    with the appropriate equation from Table 6.1 and is referred to as $\Phi_R$


    $$\Phi_1|_{r=R} = \Phi_R$$


    The discharge of the well is $Q$ [L$^3$/T] and is positive for extracting water
    from the aquifer. The discharge is equal to the total flow into the well, which
    is the product of the discharge vector $Q_r$ (Eq. 6.21) at the perimeter of the
    well and the circumference of the well, resulting in the boundary condition


    $$Q = -2\pi r_w Q_{r_1}|_{r=r_w}$$


    Note the minus sign, as $Q_r$ is defined as positive in the positive $r$ direction,
    and the discharge $Q$ of the well is positive for pumping water out of the aquifer.
    A slightly simpler boundary condition is


    $$Q = \lim_{r_w \to 0} -2\pi r_w Q_{r_1}|_{r=r_w}$$


    This condition often produces accurate results as the radius of the well is commonly
    much smaller than the horizontal scale of the groundwater problem being considered.
    Note that for this special case of a well at the center of a circular island without
    areal recharge, Eq. (6.23) is valid for any $r$, not just at $r_w$.


    Application of boundary conditions (6.22) and (6.24) to general solution (6.20),
    using $N = 0$, results in the solution for the discharge potential


    $$\Phi_1 = \frac{Q}{2\pi} \ln (r/R) + \Phi_R$$


    This is the potential form of the well-known Thiem equation (Thiem, 1906). The
    corresponding radial component of the discharge vector is


    $$Q_{r_1} = -\frac{d\Phi_1}{dr} = -\frac{Q}{2\pi} \frac{1}{r}$$


    Note that $Q$ has the dimensions of a discharge (e.g., $m^3/d$), while $Q_r$ is
    the radial component of the discharge vector with dimensions of discharge per
    unit length (e.g., $m^2/d$).


    Neither the discharge potential (and thus the head), nor the discharge vector
    can be calculated at the well, where $r = 0$. In mathematical terms, such a point
    is called a singularity. The discharge potential (Eq. 6.25), the corresponding
    head, and the discharge vector (Eq. 6.26) have no physical meaning at the center
    of the well. These equations were derived for flow in the aquifer, but the aquifer
    stops at the well screen. Inside the well, the head is equal to the head in the
    aquifer just outside the well screen, provided the resistance to flow of the well
    screen is negligible. The head inside the well is computed by evaluating the head
    at the radius of the well ($r = r_w$).


    Next, consider uniform recharge on the island and no pumping well; this solution
    is referred to as $\Phi_2$. As in the previous solution, the head (and thus the
    potential) is fixed at the perimeter of the island


    $$\Phi_2|_{r=R} = \Phi_R$$


    The second boundary condition is obtained from symmetry: The gradient of the head
    is zero at the center of the island, and hence, the flow is zero


    $$Q_{r_2}|_{r=0} = 0$$


    Application of these boundary conditions to the general solution (6.20) results
    in


    $$\Phi_2 = -\frac{1}{4}N(r^2 - R^2) + \Phi_R$$


    The total amount of groundwater flow in the aquifer at the perimeter of the island
    is equal to the total recharge on the island, as is to be expected from continuity
    of flow


    $$2\pi R Q_{r_2}|_{r=R} = N\pi R^2$$


    The flow at the perimeter is outflow, which is opposite to the first solution,
    in which flow at the perimeter is inflow.


    Finally, consider both a pumping well with discharge $Q$ at the center of the
    island and uniform recharge $N$ on the island. This problem contains both features
    of the first two solutions: recharge and a pumping well. The solution is referred
    to as $\Phi_3$. The boundary conditions are


    $$\Phi_3|_{r=R} = \Phi_R$$


    and


    $$\lim_{r_w \to 0} -2\pi r_w Q_{r_3}|_{r=r_w} = Q$$


    In radial coordinates, there is no dependence on $\theta$ so that the derivative
    with respect to $\theta$ drops out.


    In Chapters 1–4, the stream function was computed in the vertical plane for one-dimensional
    Dupuit–Forchheimer flow. Recharge entered the vertical plane through the boundaries,
    and flow in the vertical plane was divergence-free (Eq. 1.28). The lower case
    symbol $\psi$ [L$^2$/T] was used for the stream function in the vertical plane.


    The stream function also exists for steady two-dimensional Dupuit flow in the
    horizontal plane if the flow is divergence-free. In the horizontal plane, flow
    is divergence-free if the areal recharge $N$ equals zero


    $$\frac{\partial Q_x}{\partial x} + \frac{\partial Q_y}{\partial y} = 0 \qquad
    (6.10)$$


    so that the discharge potential is governed by Laplace’s equation


    $$\nabla^2 \Phi = 0 \qquad (6.11)$$


    In the horizontal plane, the upper case symbol $\Psi$ is used for the stream function,
    which has dimensions L$^3$/T.


    For two-dimensional flow in the horizontal plane, the components of the discharge
    vector can be obtained from the stream function, as is explained in the following.
    Recall that the stream function is defined by three characteristics: The stream
    function is a function that is constant along streamlines, the difference of the
    stream function values between two points is equal to the amount of water flowing
    between the two points, and the value of the stream function increases to the
    right when looking in the direction of flow. Consider points $A$, $B$, and $C$
    shown in Figure 6.3. Water flows from left to right across $AB$. The component
    of the discharge vector normal to $AB$ is $Q_x$, the distance between $A$ and
    $B$ is $\Delta y$, and the difference in the stream function between $A$ and $B$
    is $\Delta \Psi$ so that


    $$Q_x \Delta y = \Delta \Psi = \Psi(x, y) - \Psi(x, y + \Delta y) \qquad (6.12)$$


    hence


    $$Q_x = -\frac{\Psi(x, y + \Delta y) - \Psi(x, y)}{\Delta y} \qquad (6.13)$$


    In the limit for $\Delta y$ to zero, this gives


    $$Q_x = -\frac{\partial \Psi}{\partial y} \qquad (6.14)$$


    Similarly, water flows from bottom to top across $BC$. The component of the discharge
    vector normal to $BC$ is $Q_y$, the distance between $B$ and $C$ is $\Delta x$,
    and the difference in the stream function between $B$ and $C$ is $\Delta \Psi$,
    so that


    $$Q_y \Delta x = \Delta \Psi = \Psi(x + \Delta x, y) - \Psi(x, y) \qquad (6.15)$$


    and hence


    $$Q_y = \frac{\partial \Psi}{\partial x} \qquad (6.16)$$


    Comparison of Eqs. (6.14) and (6.16) with Eq. (6.2) gives


    $$\frac{\partial \Phi}{\partial x} = \frac{\partial \Psi}{\partial y}$$

    $$\frac{\partial \Phi}{\partial y} = -\frac{\partial \Psi}{\partial x}$$


    This set of two equations is known as the Cauchy–Riemann conditions. Since the
    discharge potential and stream function fulfill the Cauchy–Riemann conditions,
    they can be combined into a complex potential, as is explained in Section 7.3.


    The discharge potential is a single-valued function, which means that the discharge
    potential has only one value at a point. A mathematical definition of a single-valued
    function is (e.g., Strack, 1989)


    $$\frac{\partial^2 \Phi}{\partial x \partial y} = \frac{\partial^2 \Phi}{\partial
    y \partial x}$$


    Application of the Cauchy–Riemann conditions (6.17) to replace $\Phi$ by $\Psi$
    in Eq. (6.18) gives


    $$\frac{\partial^2 \Psi}{\partial x^2} + \frac{\partial^2 \Psi}{\partial y^2}
    = 0$$


    This is a nice result, because it means that the stream function is governed by
    Laplace’s equation, just like the discharge potential (Eq. 6.11). Recall that
    the stream function in the horizontal plane only exists when the areal recharge
    $N$ equals zero.'
  mdcn: '## 6.1 圆形岛屿上的径向对称流


    径向流问题及其解在地下水工程中非常重要，因为它们代表了抽水井周围的局部流场。本节将介绍圆形岛屿上径向对称二维流的解。岛屿周边的水头固定，岛上的面状补给均匀，且在岛屿中心有一口抽水井。水头和流量仅是径向坐标
    $r$ 的函数。该问题在图 6.4 中针对无压流进行了描述，但同样适用于表 6.1 中列出的任何流型。解的推导过程如下：首先，推导圆形岛屿中心无补给（$N
    = 0$）时流向一口井的解。其次，推导有均匀补给但无井（$Q = 0$）时圆形岛屿上的流解。第三，将前两个解组合起来，求解有均匀补给时流向圆形岛屿中心一口井的问题。这种解法的目的是演示叠加原理。


    以 $r$ 表示的排泄势微分方程由公式 (6.8) 给出。该微分方程的通解为


    $$\Phi = -\frac{1}{4}Nr^2 + A\ln r + B$$


    其中 $A$ 和 $B$ 是待由边界条件确定的常数。相应的排泄矢量径向分量为


    $$Q_r = -\frac{\mathrm{d}\Phi}{\mathrm{d}r} = \frac{1}{2}Nr - \frac{A}{r}$$


    首先，考虑流向位于半径为 $R$ 的圆形岛屿中心的一口抽水井；井的半径为 $r_w$。该问题的解所对应的排泄势记为 $\Phi_1$。在岛屿周边（$r =
    R$）水头固定为 $h_R$。相应的排泄势由表 6.1 中的适当公式计算，并记为 $\Phi_R$


    $$\Phi_1|_{r=R} = \Phi_R$$


    井的流量为 $Q$ [L$^3$/T]，从含水层抽水时为正。流量等于流入井的总流量，即排泄矢量 $Q_r$（公式 6.21）在井周边的值与井周长的乘积，由此得到边界条件


    $$Q = -2\pi r_w Q_{r_1}|_{r=r_w}$$


    注意负号，因为 $Q_r$ 定义为沿正 $r$ 方向为正，而井的流量 $Q$ 在从含水层抽水时为正。一个稍微简单的边界条件是


    $$Q = \lim_{r_w \to 0} -2\pi r_w Q_{r_1}|_{r=r_w}$$


    这个条件通常能产生准确的结果，因为井的半径通常远小于所考虑的地下水问题的水平尺度。注意，对于圆形岛屿中心无面状补给的井这一特殊情况，公式 (6.23) 对任何
    $r$ 都有效，而不仅限于 $r_w$。


    将边界条件 (6.22) 和 (6.24) 应用于通解 (6.20)，并令 $N = 0$，得到排泄势的解


    $$\Phi_1 = \frac{Q}{2\pi} \ln (r/R) + \Phi_R$$


    这是著名的泰姆方程（Thiem, 1906）的势形式。相应的排泄矢量径向分量为


    $$Q_{r_1} = -\frac{d\Phi_1}{dr} = -\frac{Q}{2\pi} \frac{1}{r}$$


    注意 $Q$ 的量纲是流量（例如 $m^3/d$），而 $Q_r$ 是排泄矢量的径向分量，其量纲是单位长度的流量（例如 $m^2/d$）。


    在井处（$r = 0$），既无法计算排泄势（因此也无法计算水头），也无法计算排泄矢量。在数学术语中，这样的点称为奇点。排泄势（公式 6.25）、相应的水头以及排泄矢量（公式
    6.26）在井中心没有物理意义。这些公式是为含水层中的流动推导的，但含水层在井筛管处终止。在井内，只要井筛管的流动阻力可以忽略不计，水头就等于井筛管外紧邻处含水层的水头。井内的水头通过计算井半径处（$r
    = r_w$）的水头来确定。


    接下来，考虑岛上有均匀补给但无抽水井的情况；这个解记为 $\Phi_2$。与前一个解类似，水头（因此势）在岛屿周边是固定的


    $$\Phi_2|_{r=R} = \Phi_R$$


    第二个边界条件由对称性得到：岛屿中心的水头梯度为零，因此流量为零


    $$Q_{r_2}|_{r=0} = 0$$


    将这些边界条件应用于通解 (6.20) 得到


    $$\Phi_2 = -\frac{1}{4}N(r^2 - R^2) + \Phi_R$$


    根据流量连续性，岛屿周边含水层中的地下水总流量等于岛上的总补给量，这是预期的结果


    $$2\pi R Q_{r_2}|_{r=R} = N\pi R^2$$


    周边的流量是流出，这与第一个解相反，在第一个解中周边的流量是流入。


    最后，考虑岛屿中心有一口流量为 $Q$ 的抽水井，且岛上有均匀补给 $N$ 的情况。这个问题包含了前两个解的特征：补给和抽水井。这个解记为 $\Phi_3$。边界条件为


    $$\Phi_3|_{r=R} = \Phi_R$$


    以及


    $$\lim_{r_w \to 0} -2\pi r_w Q_{r_3}|_{r=r_w} = Q$$


    在径向坐标中，不依赖于 $\theta$，因此对 $\theta$ 的导数项消失。


    在第 1-4 章中，流函数是在垂直平面内针对一维 Dupuit-Forchheimer 流计算的。补给通过边界进入垂直平面，垂直平面内的流动是无散的（公式
    1.28）。小写符号 $\psi$ [L$^2$/T] 用于表示垂直平面内的流函数。


    如果流动是无散的，流函数也存在于水平面内的稳态二维 Dupuit 流中。在水平面内，当面状补给 $N$ 等于零时，流动是无散的


    $$\frac{\partial Q_x}{\partial x} + \frac{\partial Q_y}{\partial y} = 0 \qquad
    (6.10)$$


    因此排泄势由拉普拉斯方程控制


    $$\nabla^2 \Phi = 0 \qquad (6.11)$$


    在水平面内，大写符号 $\Psi$ 用于表示流函数，其量纲为 L$^3$/T。


    对于水平面内的二维流，排泄矢量的分量可以从流函数获得，如下所述。回顾流函数由三个特征定义：流函数是沿流线为常数的函数，两点之间流函数值的差等于两点之间流动的水量，并且沿流动方向看时，流函数值向右增加。考虑图
    6.3 中的点 $A$、$B$ 和 $C$。水从左向右流过 $AB$。垂直于 $AB$ 的排泄矢量分量为 $Q_x$，$A$ 和 $B$ 之间的距离为 $\Delta
    y$，$A$ 和 $B$ 之间的流函数差为 $\Delta \Psi$，因此


    $$Q_x \Delta y = \Delta \Psi = \Psi(x, y) - \Psi(x, y + \Delta y) \qquad (6.12)$$


    因此


    $$Q_x = -\frac{\Psi(x, y + \Delta y) - \Psi(x, y)}{\Delta y} \qquad (6.13)$$


    当 $\Delta y$ 趋近于零时，取极限得到


    $$Q_x = -\frac{\partial \Psi}{\partial y} \qquad (6.14)$$


    类似地，水从下向上流过 $BC$。垂直于 $BC$ 的排泄矢量分量为 $Q_y$，$B$ 和 $C$ 之间的距离为 $\Delta x$，$B$ 和 $C$
    之间的流函数差为 $\Delta \Psi$，因此


    $$Q_y \Delta x = \Delta \Psi = \Psi(x + \Delta x, y) - \Psi(x, y) \qquad (6.15)$$


    因此


    $$Q_y = \frac{\partial \Psi}{\partial x} \qquad (6.16)$$


    将公式 (6.14) 和 (6.16) 与公式 (6.2) 比较得到


    $$\frac{\partial \Phi}{\partial x} = \frac{\partial \Psi}{\partial y}$$

    $$\frac{\partial \Phi}{\partial y} = -\frac{\partial \Psi}{\partial x}$$


    这组两个方程被称为柯西-黎曼条件。由于排泄势和流函数满足柯西-黎曼条件，它们可以组合成复势，如第 7.3 节所述。


    排泄势是单值函数，这意味着在一点处排泄势只有一个值。单值函数的数学定义是（例如，Strack, 1989）


    $$\frac{\partial^2 \Phi}{\partial x \partial y} = \frac{\partial^2 \Phi}{\partial
    y \partial x}$$


    将柯西-黎曼条件 (6.17) 应用于公式 (6.18)，用 $\Psi$ 替换 $\Phi$，得到


    $$\frac{\partial^2 \Psi}{\partial x^2} + \frac{\partial^2 \Psi}{\partial y^2}
    = 0$$


    这是一个很好的结果，因为它意味着流函数由拉普拉斯方程控制，就像排泄势（公式 6.11）一样。回顾水平面内的流函数仅在面状补给 $N$ 等于零时存在。'
