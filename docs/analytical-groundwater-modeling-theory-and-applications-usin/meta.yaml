    right) - \\frac{4NL^2}{\\pi^3 T} \\cos \\left[\\frac{\\pi x}{L}\\right] e^{-t/\\\
    tau}$$\n\nwhere\n\n$$\\tau = \\frac{SL^2}{\\pi^2 T}$$"
