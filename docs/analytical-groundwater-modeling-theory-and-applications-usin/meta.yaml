    \n$\\nabla^2\\Phi = \\frac{d^2\\Phi}{dr^2} + \\frac{1}{r}\\frac{d\\Phi}{dr} +\
    \ \\frac{1}{r^2}\\frac{d^2\\Phi}{d\\theta^2}$ (6.9)"
