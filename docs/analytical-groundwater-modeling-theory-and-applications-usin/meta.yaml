  md: 'at the interface and is filled with freshwater. The freshwater rises to elevation
    $h$ above sea level so that the pressure $p_f$ at the bottom of the observation
    well is


    $$p_f = \rho_f g(h - z_i)$$


    where $\rho_f$ is the density of freshwater. Just to the right of the freshwater
    observation well is a second observation well, which also has its opening at the
    interface but is filled with saltwater. The saltwater in the second observation
    well rises up to sea level ($z = 0$) (Figure 4.1). The pressure $p_s$ at the bottom
    of the second observation well is


    $$p_s = \rho_s g(0 - z_i)$$


    The pressures at the bottoms of both observation wells must be equal ($p_f = p_s$
    since they are at the same elevation and the interface is not moving). Setting
    Eq. (4.2) and Eq. (4.3) equal and rearrangement of terms leads to an expression
    for the elevation of the interface $z_i$ as a function of the head $h$ above sea
    level in the freshwater


    $$z_i = -\alpha h$$


    where


    $$\alpha = \frac{\rho_f}{\rho_s - \rho_f}$$


    Relation (4.4) is known as the Ghyben–Herzberg equation (e.g., Post et al., 2018).
    Using the density values for freshwater and seawater provided above gives $\alpha
    = 40$. In words: If the head in the freshwater at a location is 1 m above sea
    level, the steady interface at that location is 40 m below sea level.


    Note that the Ghyben–Herzberg relation holds for the case that the freshwater
    flow is steady and the saltwater is at rest. The head $h$ in Eq. (4.4) is the
    head in the freshwater at the interface. When the Dupuit approximation is adopted
    (i.e., the resistance to flow in the vertical direction is neglected and the vertical
    head distribution is approximated as hydrostatic), the elevation of the interface
    may be computed from the head at any elevation in the freshwater with the Ghyben–Herzberg
    equation (4.4).


    # 4.1 Confined interface flow


    Consider steady interface flow in a confined coastal aquifer as shown in Figure
    4.2. The elevations of the top and bottom of the aquifer are $z_t$ and $z_b$,
    respectively. The thickness of the aquifer is $H = z_t - z_b$. Flow problems in
    coastal aquifers are commonly broken up into a part near the coast where the interface
    is present and a part upstream of the interface toe where there is no interface.
    The flow in both parts may be solved simultaneously by defining an appropriate
    discharge potential such that the flow may be computed in both parts of the aquifer
    as


    $$Q_x = -\frac{d\Phi}{dx}$$


    This was first done by Strack (1976), and these discharge potentials are also
    referred to as Strack potentials. Separate discharge potentials must be defined
    for the two parts of the flow system. Note that this approach is similar to the
    approach for combined confined/unconfined flow (Section 3.3), where separate discharge
    potentials were defined for the confined and the unconfined parts of the flow
    system.'
