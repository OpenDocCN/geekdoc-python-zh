    \nFigure 4.9 Interface flow toward a sea that is separated from the aquifer by\
    \ a leaky layer.\n\nThe flow problem now consists of three parts: confined flow\
    \ upstream of the interface toe, confined interface flow between the toe and the\
    \ coast line, and semi-confined interface flow below the sea. The flow below the\
    \ land can be solved with the discharge potential for confined interface flow\
    \ derived in Section 4.1. The discharge potential cannot be used for the semi-confined\
    \ flow section below the sea.\n\nAn expression for the flow in the semi-confined\
    \ part is derived below. It is assumed that the toe of the interface is below\
    \ the land (a condition is derived later). Just as for confined interface flow,\
    \ the discharge vector below the sea can be written as (see Eq. 4.7)\n\n$$Q_x\
    \ = -k(ah + z_t)\\frac{dh}{dx}$$\n\nIn the sea, the freshwater head h* at elevation\
    \ z_t is\n\n$$h^* = -z_t/\\alpha$$\n\nso that Q_x may be written as\n\n$$Q_x =\
    \ -k\\alpha(h - h^*)\\frac{dh}{dx}$$\n\nThe flow below the sea is governed by\
    \ the differential equation for semi-confined flow\n\n$$\\frac{\\mathrm{d}Q_x}{\\\
    mathrm{d}x} = \\frac{h - h^*}{c}$$\n\nSubstitution of Eq. (4.37) for $Q_x$ in\
    \ Eq. (4.38) and rearrangement of terms gives\n\n$$\\frac{\\mathrm{d}^2(h - h^*)^2}{\\\
    mathrm{d}x^2} = \\frac{2(h - h^*)}{k\\alpha c}$$\n\nThe boundary conditions are\
    \ that the discharge vector equals $U$ at the coastline\n\n$$Q_x|_{x=0} = U$$\n\
    \nand that the head equals $h^*$ at the tip of the interface, which is at the\
