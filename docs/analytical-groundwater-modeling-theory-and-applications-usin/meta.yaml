  md: '![](img/ca724f426a6249bf916ffe68c7fbe382_73_0.png)


    Figure 4.2 Interface flow toward the coast in a confined aquifer.


    First, consider the interface flow part. The elevation of the tip of the interface
    is at the top of the aquifer $z_{\text{tip}} = z_t$, which corresponds to a head
    $h_{\text{tip}} = -z_t/\alpha$. The elevation of the toe of the interface is $z_{\text{toe}}
    = z_b$, which corresponds to a head $h_{\text{toe}} = -z_b/\alpha$. Between the
    tip and the toe, the thickness of the freshwater zone is equal to $z_t - z_i =
    z_t + \alpha h$. The discharge vector may be written as


    $$Q_x = -k(z_t + \alpha h)\frac{dh}{dx} = -k\alpha(h + z_t/\alpha)\frac{dh}{dx}
    = -\frac{d\Phi}{dx} \qquad (4.7)$$


    so that the discharge potential is


    $$\Phi = \frac{1}{2}k\alpha(h + z_t/\alpha)^2 \qquad -z_t/\alpha \le h \le -z_b/\alpha
    \qquad (4.8)$$


    The potential $\Phi_{\text{toe}}$ at the toe is obtained by substituting the head
    $h_{\text{toe}}$ for $h$ in Eq. (4.8)


    $$\Phi_{\text{toe}} = \frac{kH^2}{2\alpha} \qquad (4.9)$$


    Upstream of the toe, the flow is regular confined flow so that the saturated thickness
    is equal to $H$ and the discharge vector may be written as


    $$Q_x = -kH\frac{dh}{dx} = -\frac{d\Phi}{dx} \qquad (4.10)$$


    where the discharge potential is


    $$\Phi = kHh + C_c \qquad h \ge -z_b/\alpha \qquad (4.11)$$


    The constant $C_c$ is chosen such that the discharge potential at the toe (where
    $h_{\text{toe}} = -z_b/\alpha$) is equal to $\Phi_{\text{toe}}$ (Eq. 4.9)


    $$\Phi_{\text{toe}} = -kHz_b/\alpha + C_c = \frac{kH^2}{2\alpha} \qquad (4.12)$$


    which gives


    $$C_c = \frac{\frac{1}{2}kH^2 + kHz_b}{\alpha} \qquad (4.13)$$


    With this choice for $C_c$, the potential is continuous when it transitions from
    regular confined flow to confined interface flow at the toe.


    Now that steady confined interface flow is written as potential flow, any potential
    flow solution may be used that fulfills the differential equation for steady one-dimensional
    potential flow (Eq. 3.5)


    $$\frac{d^2\Phi}{dx^2} = -N \qquad (4.14)$$'
