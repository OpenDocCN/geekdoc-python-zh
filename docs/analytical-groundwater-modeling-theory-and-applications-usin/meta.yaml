    # 3.2 Flow over a step in the aquifer base


    The problem of unconfined flow between two parallel rivers without areal recharge
    is considered, but this time, there is a step in the base of the aquifer as shown
    in Figure 3.6. The base of the aquifer is equal to $z_0$ for the left part of
    the aquifer (length $L_0$) and is equal to $z_1$ for the right part of the aquifer
    (length $L_1$). The head is $h_0$ at $x = 0$, and the head is $h_L$ at $x = L$.
    These conditions are transformed to conditions in terms of the discharge potential


    $$\Phi|_{x=0} = \Phi_0 = \frac{1}{2}k(h_0 - z_0)^2 \qquad (3.20)$$

    $$\Phi|_{x=L} = \Phi_L = \frac{1}{2}k(h_L - z_1)^2 \qquad (3.21)$$


    As for the solution of, e.g., Section 1.4, the head and flux are continuous at
    $x = L_0$.


    $$h^- = h^+ \qquad (3.22)$$

    $$Q_x^- = Q_x^+ \qquad (3.23)$$


    where the superscripts $-$ and $+$ are used as shorthand for evaluation just to
    the left and right of $x = L_0$, respectively.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_64_0.png)


    The flow from the left river to the right river is equal to $U$, which is unknown
    upfront. Application of boundary conditions (3.20) and (3.21) gives equations
    for the discharge potential for the left and right parts that still contain the
    unknown flux $U$


    $$\Phi = -Ux + \Phi_0 \qquad 0 \le x \le L_0 \qquad (3.24)$$

    $$\Phi = -U(x - L) + \Phi_L \qquad L_0 \le x \le L \qquad (3.25)$$


    where $L = L_0 + L_1$. The discharge $U$ is obtained from condition (3.22) as
    follows. The discharge potentials $\Phi^-$ and $\Phi^+$ at $x = L_0$ are


    $$\Phi^- = -UL_0 + \Phi_0 = \frac{1}{2}k(h^- - z_0)^2 \qquad (3.26)$$

    $$\Phi^+ = -U(L_0 - L) + \Phi_L = \frac{1}{2}k(h^+ - z_1)^2 \qquad (3.27)$$'
