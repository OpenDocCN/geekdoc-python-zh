  md: 'The second boundary condition is that the head is fixed to $h_R$ at $r = R$
    in aquifer 0


    $$h_0|_{r=R} = h_R \quad (6.65)$$


    The solution for the head in each aquifer is a combination of the solution for
    a well in a confined aquifer (Eq. 6.37) and the solution for a well in a semi-confined
    aquifer (Eq. 6.56)


    $$h_0 = \frac{Q}{2\pi(T_0 + T_1)} [\ln(r/R) + K_0(r/\lambda) - K_0(R/\lambda)]
    + h_R$$

    $$h_1 = \frac{Q}{2\pi(T_0 + T_1)} \left[ \ln(r/R) - \frac{T_0 K_0(r/\lambda)}{T_1}
    - K_0(R/\lambda) \right] + h_R \quad (6.66)$$


    where


    $$\lambda = \sqrt{\frac{c T_0 T_1}{T_0 + T_1}} \quad (6.67)$$


    The corresponding radial components of the discharge vector are


    $$Q_{r,0} = -\frac{T_0 Q}{2\pi(T_0 + T_1)} \left[ \frac{1}{r} - \frac{K_1(r/\lambda)}{\lambda}
    \right]$$

    $$Q_{r,1} = -\frac{T_1 Q}{2\pi(T_0 + T_1)} \left[ \frac{1}{r} + \frac{T_0 K_1(r/\lambda)}{T_1
    \lambda} \right] \quad (6.68)$$


    Near the well, all flow is in aquifer 1, as can be seen from taking the limit
    and using that $K_1(r/\lambda) \approx \lambda/r$ for small $r$


    $$\lim_{r \to 0} 2\pi r Q_{r,0} = 0$$

    $$\lim_{r \to 0} 2\pi r Q_{r,1} = Q \quad (6.69)$$


    Far away from the well (in practice, beyond $4\lambda$), the flow is distributed
    between the two aquifers according to their transmissivities


    $$\lim_{r \to \infty} 2\pi r Q_{r,0} = -\frac{T_0}{T_0 + T_1} Q$$

