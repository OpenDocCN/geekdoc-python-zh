  md: 'This is the potential form of the well-known Thiem equation (Thiem, 1906).
    The corresponding radial component of the discharge vector is


    $$Q_{r_1} = -\frac{d\Phi_1}{dr} = -\frac{Q}{2\pi} \frac{1}{r}$$


    Note that $Q$ has the dimensions of a discharge (e.g., $m^3/d$), while $Q_r$ is
    the radial component of the discharge vector with dimensions of discharge per
    unit length (e.g., $m^2/d$).


    Neither the discharge potential (and thus the head), nor the discharge vector
    can be calculated at the well, where $r = 0$. In mathematical terms, such a point
    is called a singularity. The discharge potential (Eq. 6.25), the corresponding
    head, and the discharge vector (Eq. 6.26) have no physical meaning at the center
    of the well. These equations were derived for flow in the aquifer, but the aquifer
    stops at the well screen. Inside the well, the head is equal to the head in the
    aquifer just outside the well screen, provided the resistance to flow of the well
    screen is negligible. The head inside the well is computed by evaluating the head
    at the radius of the well ($r = r_w$).


    Next, consider uniform recharge on the island and no pumping well; this solution
    is referred to as $\Phi_2$. As in the previous solution, the head (and thus the
    potential) is fixed at the perimeter of the island


    $$\Phi_2|_{r=R} = \Phi_R$$


    The second boundary condition is obtained from symmetry: The gradient of the head
    is zero at the center of the island, and hence, the flow is zero


    $$Q_{r_2}|_{r=0} = 0$$


    Application of these boundary conditions to the general solution (6.20) results
    in


    $$\Phi_2 = -\frac{1}{4}N(r^2 - R^2) + \Phi_R$$


    The total amount of groundwater flow in the aquifer at the perimeter of the island
    is equal to the total recharge on the island, as is to be expected from continuity
    of flow


    $$2\pi R Q_{r_2}|_{r=R} = N\pi R^2$$


    The flow at the perimeter is outflow, which is opposite to the first solution,
    in which flow at the perimeter is inflow.


    Finally, consider both a pumping well with discharge $Q$ at the center of the
    island and uniform recharge $N$ on the island. This problem contains both features
    of the first two solutions: recharge and a pumping well. The solution is referred
    to as $\Phi_3$. The boundary conditions are


    $$\Phi_3|_{r=R} = \Phi_R$$


    and


    $$\lim_{r_w \to 0} -2\pi r_w Q_{r_3}|_{r=r_w} = Q$$'
