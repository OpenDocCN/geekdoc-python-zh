    水平方向的（平均）流速 $v_x$ 通过将 $q_x$ 除以孔隙度 $n$ 获得（显然，垂直方向的流速 $v_z$ 为零）。对于这个简单问题，从左侧河流到右侧河流的（平均）行程时间可以计算为
    $L/v_x$。更正式地说，行程时间可以从水平速度矢量的定义获得：


    $$v_x = \frac{q_x}{n} = \frac{dx}{dt}$$


    积分得到行程时间 $t_{\text{tr}}$：


    $$\int_{0}^{t_{\text{tr}}} dt = \int_{0}^{L} \frac{dx}{v_x} = \int_{0}^{L} -\frac{Ln}{k(h_L
    - h_0)} dx \quad (1.18)$$


    得出：


    $$t_{\text{tr}} = \frac{L^2 n}{k(h_0 - h_L)} = \frac{L}{v_x} \quad (1.19)$$


