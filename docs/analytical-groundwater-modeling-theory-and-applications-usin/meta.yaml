- md: "## Chapter 9\n\n## Transient two-dimensional flow\n\nAll two-dimensional solutions\
    \ presented so far were for steady flow: The head and flow are a function of $x$\
    \ and $y$, but not of time $t$. In this chapter, wells are considered with a discharge\
    \ that varies through time. Both the head and flow are a function of $x$, $y$,\
    \ and $t$. The changes in head and flow caused by transient wells are discussed\
    \ for a variety of settings.\n\nContinuity of flow for two-dimensional transient\
    \ flow in the horizontal $x$, $y$ plane may be written as\n\n$$\\frac{\\partial\
    \ Q_x}{\\partial x} + \\frac{\\partial Q_y}{\\partial y} = -S \\frac{\\partial\
    \ h}{\\partial t} + N \\qquad (9.1)$$\n\nwhere $N$ is the areal recharge and $S$\
    \ is the storage coefficient, which is equal to the phreatic storage $S = S_p$\
    \ for unconfined flow and the product of the specific storage $S_s$ and aquifer\
    \ thickness $H$ ($S = S_s H$) for confined flow (see Chapter 5). Note that this\
    \ equation differs from the continuity of flow equation for one-dimensional transient\
    \ flow (Eq. 5.5) only by the additional term $\\partial Q_y / \\partial y$.\n\n\
    The components of the discharge vector are written in terms of the derivatives\
    \ of the head as\n\n$$Q_x = -T \\frac{\\partial h}{\\partial x} \\qquad Q_y =\
    \ -T \\frac{\\partial h}{\\partial y} \\qquad (9.2)$$\n\nwhere the transmissivity\
    \ is approximated as constant, also for unconfined flow (see Chapter 5). Substitution\
    \ of Eq. (9.2) for $Q_x$ and $Q_y$ in Eq. (9.1) gives the differential equation\
    \ for two-dimensional transient flow\n\n$$\\nabla^2 h = \\frac{S}{T} \\frac{\\\
    partial h}{\\partial t} - \\frac{N}{T} \\qquad (9.3)$$\n\nThe discharge potential\
    \ is not very useful for transient flow (except for the alternative formulation\
    \ for unconfined flow discussed in Section 5.5), and the stream function and complex\
    \ potential are only valid for flow governed by the Laplace equation, so they\
    \ are not used here. For the case that areal recharge is negligible ($N = 0$),\
    \ Eq. (9.3) reduces to the two-dimensional diffusion equation\n\n$$\\nabla^2 h\
    \ = \\frac{S}{T} \\frac{\\partial h}{\\partial t} \\qquad (9.4)$$\n\nIf, in addition,\
    \ the flow is radially symmetric, the differential equation becomes (compare Eq.\
    \ (6.8))\n\n$$\\frac{\\partial^2 h}{\\partial r^2} + \\frac{1}{r} \\frac{\\partial\
    \ h}{\\partial r} = \\frac{S}{T} \\frac{\\partial h}{\\partial t} \\qquad (9.5)$$\n\
    \nSolutions to the two-dimensional diffusion equation are difficult to derive\
    \ mathematically, even for many cases of radially symmetric flow. Mathematical\
    \ solution techniques to obtain exact solutions include similarity solutions,\
    \ separation of variables, and a variety of transform techniques (Laplace, Hankel,\
    \ and Fourier). In the following, several solutions for transient flow to wells\
    \ are presented rather than derived. The solutions are discussed, programmed,\
    \ and visualized as in the other chapters. The mathematical correctness of the\
    \ presented solutions may be verified through differentiation of the solution\
    \ and substitution into the differential equation (either analytically or numerically),\
    \ and by verifying that the boundary conditions and initial conditions are met.\n\
    \nAll solutions presented in this chapter are for the head change caused by a\
    \ transient well, which allows for the superposition of transient solutions in\
    \ time, and for the superposition of steady solutions and transient solutions.\
    \ Transient flow solutions are presented for wells in confined, unconfined, semi-confined,\
    \ and two-aquifer systems, including the estimation of aquifer parameters from\
    \ pumping tests. The last two sections concern the effect of wellbore storage\
    \ and skin effect, and transient pumping in a two-aquifer system. These problems\
    \ are solved in the Laplace domain, and the solution in the physical domain is\
    \ obtained through a numerical back-transformation.\n\n## 9.1 Wells in confined\
    \ and unconfined aquifers\n\nIn this section, a solution is presented for transient\
    \ flow to a well in an aquifer with constant transmissivity $T$ and storage coefficient\
    \ $S$. The governing differential equation is (9.5). The well starts pumping with\
    \ discharge $Q$ at time $t = t_0$. The boundary condition at the well is approximated\
    \ as (similar to boundary condition (6.24))\n\n$$\\lim_{r \\to 0} -2\\pi r Q_r\
    \ = Q \\quad t \\ge t_0$$\n\nInitially, the head change in the aquifer caused\
    \ by the transient well is, of course, equal to zero\n\n$$h|_{r,t=t_0} = 0$$\n\
    \nThe second boundary condition is that the head change caused by the well at\
    \ infinity is zero at all time\n\n$$h|_{r=\\infty,t} = 0$$\n\nThe solution for\
    \ the head is a function of the radial distance, $r$, from the well and time and\
    \ is known as the Theis solution (Theis, 1935)\n\n$$h = -\\frac{Q}{4\\pi T} \\\
    mathrm{E}_1(u) \\quad t \\ge t_0$$\n\nwhere\n\n$$u = \\frac{Sr^2}{4T(t - t_0)}$$\n\
    \nand $\\mathrm{E}_1$ is the exponential integral defined as\n\n$$\\mathrm{E}_1(u)\
    \ = \\int_u^\\infty \\frac{\\exp(-s)}{s} ds$$\n\nThe head starts to decrease after\
    \ the well starts pumping. The drop in head is also referred to as the drawdown.\
    \ So a drawdown of, e.g., 1 m means that $h = -1$ m. The head is a function only\
    \ of the dimensionless parameter $u$. Hence, if a certain drawdown is reached\
    \ at a distance $r_1$ after a time period $\\Delta t_1$ of pumping, the same drawdown\
    \ is reached at a distance $2r_1$ after a time period $4\\Delta t_1$ of pumping,\
    \ as both combinations of time and radial distance result in the same value of\
    \ $u$\n\n$$u = \\frac{Sr_1^2}{4T\\Delta t_1} = \\frac{S(2r_1)^2}{4T(4\\Delta t_1)}$$\n\
    \n**Exercise 9.1:** A well starts pumping at time $t = 0$ in a confined aquifer.\
    \ After 1 day of pumping, the drawdown is 1 m at a distance of $r_1 = 20$ m from\
    \ the well. Compute at what time (in days) after pumping started the drawdown\
    \ is 1 m at a distance of $r_2 = 60$ m from the well.\n\n**Exercise 9.2:** Consider\
    \ a well with discharge $Q = 300$ m$^3$/d that is screened in a confined aquifer\
    \ with transmissivity $T = 500$ m$^2$/d and storage coefficient $S = 0.2$. At\
    \ what distance from the well is the drawdown 0.2 m after 1 day of pumping? Hint:\
    \ use the `fsolve` function of `scipy.optimize`.\n\n**Exercise 9.3:** Consider\
    \ a well with discharge $Q = 300$ m$^3$/d and radius $r_w = 0.3$ m. The well has\
    \ been pumping in an aquifer with $T = 500$ m$^2$/d and $S = 0.2$ for 1 day. Compute\
    \ the water removed from storage by evaluating the integral $\\int_{r_w}^{\\infty}\
    \ Sh 2\\pi r dr$ using a numerical integration function from `scipy.integrate`.\
    \ Compare your answer to the total amount of water removed from the aquifer by\
    \ the well.\n\nThe function $E_1$ is available as `exp1` from the `scipy.special`\
    \ package, but there also exists a series representation, which is useful for\
    \ the evaluation of limiting cases (e.g., large time). The series representation\
    \ is (e.g., Abramowitz and Stegun, 1965)\n\n$$E_1(u) = -\\gamma - \\ln u - \\\
    sum_{n=1}^{\\infty} \\frac{(-u)^n}{n \\cdot n!}$$\n\nwhere $\\gamma = 0.5772...$\
    \ is Euler's constant, available from `numpy` as `euler_gamma`. The series for\
    \ $E_1$ converges quickly when $u < 1$. Only the first two terms are needed when\
    \ $u$ is small, in which case the formula for the head may be approximated as\n\
    \n$$h \\approx \\frac{Q}{4\\pi T} \\left[ \\gamma + \\ln \\left( \\frac{Sr^2}{4T(t\
    \ - t_0)} \\right) \\right] \\quad u < 0.1$$\n\nNote that $u$ is small when $r$\
    \ is small or when $t$ is large, or both.\n\nThe head inside the well is computed\
    \ by evaluating the Theis solution at the well radius $r_w$. Four curves are shown\
    \ in the graphs of Figure 9.1: the head $h_w$ inside the well, the head $h_{20}$\
    \ at $r = 20$ m, the difference $h_w - h_{20}$, and the head $h_{20}$ computed\
    \ with the approximate formula (9.14). The time axis is linear in the left graph\
    \ and log-scaled in the right graph. The difference $h_w - h_{20}$ becomes constant\
    \ after $\\sim 0.01$ d for this case. The approximate formula results in a straight\
    \ line in the graph with a log-scaled time axis, as can also be seen from Eq.\
    \ (9.14). The approximate formula gives good results for $u < 0.1$, which corresponds\
    \ to $t > 0.01$ d for this case and at this location.\n\n```python\n# parameters\n\
