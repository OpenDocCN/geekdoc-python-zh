    the arctan2 function.


    The method of images is an application of the superposition principle. Wells (or
    other singularities) are placed outside of the problem domain, and symmetry is
    used to satisfy conditions specified along boundaries. A well near a river with
    constant head is simulated by adding an image well on the other side of the river.
    The discharge of the image well must be equal, but opposite in sign to the discharge
    of the well, and the image well must be located at the “image location” of the
    well, that is, the same distance from the river, but on the other side. The solution
    for multiple wells near a river may be obtained in the same fashion, as long as
    a corresponding image well is added for each well.


    A well near an impermeable rock formation (an impermeable or no-flow boundary)
    may be simulated by adding an image well with the same discharge on the other
    side of the impermeable boundary. An example of a well near an impermeable boundary
    along $x = 0$ is shown in Figure 6.8. The code for the solution and basic plot
    is the same as the code above, and is not repeated. Only the values of the discharge
    Q are changed.


