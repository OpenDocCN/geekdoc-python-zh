    \n## 8.2 Line-sinks for modeling rivers and streams\n\nPumping wells are sometimes\
    \ referred to as point-sinks because they take water out at a point (fully penetrating\
    \ wells take water out over the entire aquifer thickness, which is a point in\
    \ the two-dimensional horizontal plane). Line-sinks take out water along a line\
    \ segment and may be used to simulate groundwater flow to or from sections of\
    \ narrow rivers, streams, or canals. The analytic element code developed in the\
    \ previous section is extended to include line-sinks. All analytic element classes\
    \ Model, Element, HeadEquation, Constant, UniformFlow, Well, and HeadWell, defined\
    \ in the previous section, are required to run the examples in this section.\n\
    \nThe complex potential for a line-sink with uniform inflow may be obtained by\
    \ integrating the complex potential for a point-sink (a well) along a line, which\
    \ gives (e.g., Strack, 2017)\n\n$$\\Omega = \\frac{\\sigma L}{4\\pi}[(Z + 1) \\\
    ln(Z + 1) - (Z - 1) \\ln(Z - 1)]$$ (8.8)\n\nwhere $\\sigma$ is the inflow into\
    \ the line-sink (the discharge per unit length of line-sink, positive for taking\
    \ water out of the aquifer), $L$ is the length of the line-sink, and $Z$ is defined\
    \ as\n\n$$Z = \\frac{2\\zeta - (\\zeta_0 + \\zeta_1)}{\\zeta_1 - \\zeta_0}$$ (8.9)\n\
    \nwhere $\\zeta$ is the complex coordinate, and $\\zeta_0$ and $\\zeta_1$ are\
    \ the complex coordinates of the end points of the line-sink. Note that $Z = -1$\
    \ at $\\zeta = \\zeta_0$ and $Z = +1$ at $\\zeta = \\zeta_1$. The total discharge\
    \ $Q$ of the line-sink is $Q = \\sigma L$.\n\nLine-sinks are added to the analytic\
    \ element code for wells and uniform flow developed in Section 8.1. Input arguments\
    \ are the model to which the element is added, the coordinates of the endpoints,\
    \ and the inflow $\\sigma$. The LineSink class has one function: the omegainf\
    \ function, which implements Eq. (8.8) for $\\sigma = 1$. The complex potential\
    \ for a line-sink is singular at the end points, where the variable $Z$ equals\
    \ either $-1$ or $+1$, but the discharge potential is finite\n\n$$\\lim_{Z \\\
    to -1} (Z + 1) \\ln(Z + 1) = \\lim_{Z \\to 1} (Z - 1) \\ln(Z - 1) = 0$$ (8.10)\n\
    \nThe value of $(Z - 1)$ or $(Z + 1)$ is set to $10^{-12}$ when their absolute\
    \ value is smaller than $10^{-12}$ using the np.where function in the code below.\n\
    \n```python\nclass LineSink(Element):\n\n    def __init__(self, model, x0=0, y0=0,\
    \ x1=1, y1=1, sigma=1):\n        Element.__init__(self, model, sigma)\n      \
    \  self.z0 = x0 + y0 * 1j\n        self.z1 = x1 + y1 * 1j\n        self.L = np.abs(self.z1\
    \ - self.z0)\n\n    def omegainf(self, x, y):\n        zeta = x + y * 1j\n   \
    \     Z = (2 * zeta - (self.z0 + self.z1)) / (self.z1 - self.z0)\n        Zp1\
    \ = np.where(np.abs(Z + 1) < 1e-12, 1e-12, Z + 1)\n        Zm1 = np.where(np.abs(Z\
    \ - 1) < 1e-12, 1e-12, Z - 1)\n        return self.L / (4 * np.pi) * (Zp1 * np.log(Zp1)\
    \ - Zm1 * np.log(Zm1))\n```\n\nAs a first example, the flow net for a single line-sink\
    \ is computed and plotted in the left graph of Figure 8.3. The branch cut starts\
    \ at the first point of the line-sink and extends to infinity in the same direction\
    \ as the line-sink. The variation of the head along the line-sink is plotted in\
    \ the right graph of Figure 8.3.\n\n```python\n# parameters and model\nml = Model(T=100)\
    \ # transmissivity, m^2/d\nls1 = LineSink(ml, x0=-200, y0=-150, x1=200, y1=150,\
    \ sigma=0.1) # sigma, m^2/d\n```\n\n```python\n# solution\nxg, yg = np.meshgrid(np.linspace(-400,\
    \ 400, 100), np.linspace(-300, 300, 100))\nh = ml.head(xg, yg)\npsi = ml.streamfunction(xg,\
    \ yg)\nxs, ys = np.linspace(-200, 200, 100), np.linspace(-150, 150, 100)\nhs =\
    \ ml.head(xs, ys) # head along line-sink\n```\n\n```python\n# basic plot\nplt.subplot(121,\
    \ aspect=1)\nplt.contour(xg, yg, h, 10)\nplt.contour(xg, yg, psi, 20)\nplt.plot([-200,\
    \ 200], [-150, 150], 'k')\nplt.subplot(122)\nplt.plot(np.sqrt((xs + 200) **2 +\
    \ (ys + 150) ** 2), hs);\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_161_0.png)\n\
    \nThe inflow is uniform along a line-sink, which results in a head that varies\
    \ along the line-sink (right graph of Figure 8.3). This means that a finite ditch\
    \ with a uniform head cannot be modeled with a single line-sink of uniform inflow.\
    \ Such a ditch must be simulated with a string of multiple line-sinks, as the\
    \ inflow near the ends of the ditch is larger than in the middle of the ditch.\n\
    \nThe free parameter of a line-sink is the inflow $\\sigma$ into the line-sink\
    \ per unit length of line-sink. When a line-sink is used to simulate the segment\
    \ of a surface water feature, the inflow (negative when it is outflow) may be\
    \ computed from a specified-head condition. Here, the head is specified at the\
    \ center of the line-sink (the collocation point). In the code below, the HeadLineSink\
    \ class is derived from the LineSink and HeadEquation classes. Input arguments\
    \ are the model to which the element is added, coordinates of the endpoints, and\
    \ the specified head at the center of the line-sink. As for all head-specified\
    \ elements, the location of the collocation point is stored as xc and yc, and\
    \ the potential at the collocation point as pc. The number of unknowns is set\
    \ to 1.\n\n```python\nclass HeadLineSink(LineSink, HeadEquation):\n\n    def __init__(self,\
    \ model, x0=0, y0=0, x1=1, y1=1, hc=1):\n        LineSink.__init__(self, model,\
    \ x0, y0, x1, y1, 0)\n        self.xc = 0.5 * (x0 + x1)\n        self.yc = 0.5\
    \ * (y0 + y1)\n        self.pc = self.model.T * hc\n        self.nunknowns = 1\n\
    ```\n\nStrings of line-sinks may be used to simulate narrow rivers or streams.\
    \ A stream needs to be subdivided into line-sinks based on three criteria: The\
    \ string of line-sinks must represent the geometry of the stream, and the line-sinks\
    \ must be short enough to simulate both the variation in river stage and the variation\
    \ of the inflow or outflow along the stream. Recall that the inflow is uniform\
    \ for each line-sink. In the current implementation of head-specified line-sinks,\
    \ the head in the aquifer is set equal to the specified head at the center of\
    \ the line-sink, which means that the aquifer is in direct contact with the stream.\
    \ Alternatively, the resistance of a leaky stream bed may be taken into account\
    \ by specifying condition (7.34) of Section 7.4, but that is beyond the scope\
    \ of this book (see, e.g., Haitjema, 1995).\n\nAs an example of a curved stream,\
    \ consider a well pumping near a meandering stream. The stream is approximated\
    \ with a sine function around the x-axis as $y = 50 \\sin(\\pi x/400)$. A head-specified\
