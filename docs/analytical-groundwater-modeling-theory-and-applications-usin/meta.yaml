    # 4.2 Unconfined interface flow


    Consider steady unconfined interface flow in a coastal aquifer as shown in Figure
    4.4. The head and elevations are again measured with respect to sea level. The
    bottom of the aquifer is at $z = z_b$. As for confined flow, unconfined flow in
    coastal aquifers may consist of a part near the shore where the interface is present
    and a part of the aquifer farther inland where there is no interface. The problem
    is again solved in terms of a discharge potential in both parts of the aquifer.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_76_0.png)


    First, consider the freshwater zone above the interface. The water table is a
    distance $h$ above sea level, and the elevation of the interface is obtained with
    the Ghyben–Herzberg equation (4.4) as $z_i = -\alpha h$ so that the total thickness
    of the freshwater zone is equal to $h - z_i = (1+\alpha)h$. The discharge vector
    may be written as


    $$Q_x = -k(\alpha + 1)h \frac{dh}{dx} = -\frac{d\Phi}{dx} \qquad (4.22)$$


    where the discharge potential for unconfined interface flow is


    $$\Phi = \frac{1}{2}k(\alpha + 1)h^2 \qquad 0 \le h \le -z_b/\alpha \qquad (4.23)$$


    Second, consider the part of the flow upstream of the toe, where the flow is unconfined
    without an interface. The saturated thickness is equal to $h - z_b$ (recall that
    the head is measured with respect to the sea level) so that the discharge vector
    may be written as


    $$Q_x = -k(h - z_b)\frac{dh}{dx} = -\frac{d\Phi}{dx} \qquad (4.24)$$


    where the discharge potential is


    $$\Phi = \frac{1}{2}k(h - z_b)^2 + C_u \qquad h \ge -z_b/\alpha \qquad (4.25)$$'
