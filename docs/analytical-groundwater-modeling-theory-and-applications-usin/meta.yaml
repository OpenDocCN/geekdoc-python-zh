    \    plt.plot(x, head(x, t, nterms=1) , '--') # just 1 term is enough\n    plt.plot(x,\
    \ head(x, t, nterms=10))\nplt.plot(x, head(x, 0, nterms=0), 'k'); # 0 terms gives\
    \ steady solution\n```\n\nAt early times, the graph on the left shows that the\
    \ head in the middle part of the aquifer rises at a rate $N/S = 0.01$ m/d, as\
    \ discharge to the rivers does not have any draining effect on the middle part\
    \ yet. When time progresses from 1 to 2 to 3 days, a larger and larger section\
