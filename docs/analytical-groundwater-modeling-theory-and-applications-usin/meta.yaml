  - '[PAGE 150]


    # 7.5 A well in uniform background flow near the coast


    The solutions in the previous sections concerned the capture zone of a well in
    uniform background flow near a straight river. The critical discharge of the well
    was derived such that the well does not capture water from the river or from the
    other side of the river. In this section, the straight river is replaced by a
    straight and vertical coastal boundary and the maximum discharge of the well is
    determined such that the well does not pump any saltwater. In other words, the
    maximum discharge is determined such that the interface does not reach the well.
    It turns out that this maximum discharge is quite a bit smaller than the maximum
    discharge for a well near a river (Section 7.3).


    Consider a well in a coastal aquifer. The coastline is located along the line
    $x = 0$. The well is located at $(x, y) = (-d, 0)$, has a discharge $Q$, and has
    a radius $r_w$. In the absence of the well, the flow toward the coast is uniform
    and equal to $Q_x = U$. The aquifer is unconfined, the hydraulic conductivity
    is $k$, and the elevation of the bottom of the aquifer is $z_b$ with respect to
    sea level. The density of the seawater is $\rho_s$. The sea is in direct contact
    with the aquifer (no seabed resistance) so that the head along the coastline is
    equal to sea level. The solution for the complex potential is identical to the
    solution for a well near a river in direct contact with the aquifer (Eq. 7.29).
    For this case of unconfined interface flow, the potential at the toe of the interface
    is Eq. (4.26)


    $$\Phi_{\text{toe}} = \frac{1}{2} k \frac{\alpha + 1}{\alpha^2} z_b^2$$


    In the absence of pumping, the toe of the interface is located at (Eq. 4.21)


    $$x_{\text{toe}} = -\frac{\Phi_{\text{toe}}}{U}$$


    First, consider the case that the discharge of the well is half the critical discharge
    for a well near a river (Eq. 7.32). A flow net is constructed showing that indeed
    the stagnation point is still far from the coast line for this value of $Q$ (Figure
    7.11). The toe of the interface in the absence of pumping is plotted with a black
    dashed line, while the contour line representing $\Phi_{\text{toe}}$ for the case
    with pumping is plotted with a black solid line. It turns out that there are two
    contour lines where the potential is equal to $\Phi_{\text{toe}}$. One contour
    line runs from north to south and curves toward the well: This is the location
    of the toe of the interface during pumping. A second black contour is present
    around the well. This is because the discharge potential at the well is below
    $\Phi_{\text{toe}}$, but this does not mean that the well pumps saltwater. The
    black contour line around the well is not connected to the black contour line
    near the coast, which means that there is no way for the saltwater to reach the
    well. This is further illustrated in the right graph of Figure 7.11, where the
    potential is plotted as a function of $x$ along the line $y = 0$. When converting
    the potential to a head, the values of the potential inside the closed black contour
    around the well must be converted to a head using the formula for unconfined flow
    rather than for unconfined interface flow.


    ```

    # parameters

    rw = 0.3 # radius of well, m

    k = 40 # hydraulic conductivity, m/d

    zb = -20 # elevation of bottom of aquifer, m

    rhof = 1000 # density of freshwater, kg/m^3

    rhos = 1025 # density of saltwater, kg/m^3

    U = 1 # uniform flow in x-direction, m^2/d

    d = 1000 # distance of well from coast line, m

    Qcr = np.pi * U * d # critical discharge for well near river, m^3/d

    ```'
