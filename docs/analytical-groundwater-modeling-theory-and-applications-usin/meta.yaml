    # 10.5 Interface flow toward the coast


    Several solutions for interface flow in coastal aquifers were discussed in this
    book so far (Chapter 4 and Section 7.5), all based on the Dupuit approximation.
    The width of the outflow zone at the coast was zero for all presented Dupuit solutions,
    except for the solution with a resistance layer along the sea bottom (Section
    4.3). In Chapter 4, it was claimed that the resulting interface was, nevertheless,
    a good approximation, even though the flow near the coast has a significant vertical
    component. In this and the following section, Dupuit interface solutions are compared
    to solutions for two-dimensional flow in the vertical plane, and it is investigated
    how wide the outflow zone below the sea is.


    Consider steady two-dimensional interface flow in the vertical plane in a confined
    coastal aquifer. The aquifer is so deep that the interface does not reach the
    bottom of the aquifer; the saltwater is at rest (Figure 10.17). The density of
    the freshwater is $\rho_f$, the density of the saltwater is $\rho_s$, and the
    hydraulic conductivity of the aquifer is isotropic and equal to $k$. The sea bottom
    is horizontal and at the same elevation as the top of the confined aquifer. The
    origin of the coordinate system is chosen at the coastline at the top of the aquifer.
    The flow toward the coast is constant and equal to $Q_x = U$. The stream function
    along the top of the aquifer is chosen to equal $\psi = 0$ so that the stream
    function along the interface equals $\psi = U$.


    This problem is known as a free boundary problem. The location of the interface
    is a free boundary because it is unknown prior to solving the problem. There are
    two conditions specified along the interface: The interface is an impermeable
    boundary, and the elevation of the'
