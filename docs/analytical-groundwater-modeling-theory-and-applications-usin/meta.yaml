  - '[PAGE 59]


    # Chapter 3


    # Steady one-dimensional unconfined flow with variable saturated thickness


    In the previous chapters, the saturated thickness of the aquifer was approximated
    as constant. The approximation of a constant saturated thickness gives reasonable
    results when the variation of the saturated thickness is not too large. In this
    chapter, solutions are derived for unconfined flow with a saturated thickness
    that varies with the head. The Dupuit–Forchheimer approximation is adopted so
    that the head is equal to the elevation of the water table and the horizontal
    flow is distributed uniformly over the saturated thickness (Figure 3.1).


    ![](img/ca724f426a6249bf916ffe68c7fbe382_59_0.png)


    The elevation of the base of the aquifer is denoted as $z_b$ so that the saturated
    thickness is equal to $h - z_b$ (Figure 3.1) and the discharge vector can be written
    as


    $$Q_x = -k(h - z_b)\frac{dh}{dx} = -\frac{d}{dx}\left(\frac{1}{2}k(h - z_b)^2\right)
    \quad (3.1)$$


    where it is used that the elevation of the base of the aquifer and the hydraulic
    conductivity are constant.


    While it is possible to obtain a solution for unconfined flow in terms of the
    head $h$, it is more convenient to solve unconfined flow problems using a discharge
    potential. The discharge potential for unconfined flow $\Phi$ is introduced as


    $$\Phi = \frac{1}{2}k(h - z_b)^2 \quad (3.2)$$


    so that the discharge vector can be written as


    $$Q_x = -\frac{d\Phi}{dx} \quad (3.3)$$


    Flow fields where the discharge vector $Q_x$ may be written as minus the derivative
    of a discharge potential are referred to as potential flow. Potential flow solutions
    exist in many fields, including fluid mechanics and heat transport.


    Discharge potentials are an abstract quantity that cannot be measured in the field.
    Groundwater problems are, of course, not formulated in terms of discharge potentials,
    but in terms of heads. To be able to use a potential solution, boundary conditions
    in terms of heads must be'
  - '[PAGE 60]


    converted to boundary conditions in terms of discharge potentials. After a potential
    solution is evaluated, the computed potential must be converted back to a head.
    The use of discharge potentials makes it possible to solve fairly complicated
    problems, including unconfined flow and interface flow in coastal aquifers (Chapter
    4).


    The continuity equation for one-dimensional flow is still Eq. (1.5)


    ```

    $$\frac{dQ_x}{dx} = N$$

    ```


    Substitution of Eq. (3.3) for $Q_x$ into the continuity equation gives


    ```

    $$\frac{d^2\Phi}{dx^2} = -N$$

    ```


    The general solution to this second-order ordinary differential equation may be
    written as


    ```

    $$\Phi = -\frac{N}{2}x^2 + Ax + B$$

    ```


    where the constants $A$ and $B$ need to be determined from the boundary conditions.
    Once a solution for the discharge potential is found, the solution for the head
    is obtained with the inverse of Eq. (3.2)


    ```

    $$h = z_b + \sqrt{2\Phi/k}$$

    ```


    # 3.1 Areal recharge between an impermeable boundary and a river


    Consider uniform recharge at a rate $N$ on an unconfined aquifer bounded on the
    left by an impermeable boundary and on the right by a river (see Figure 3.2).
    The problem is the same as in Section 1.3, but now the transmissivity is a function
    of the head $h$ in the aquifer rather than approximated as constant. The length
    of the aquifer is $L$, and the elevation of the aquifer bottom is $z_b$. The boundary
    conditions are


    ```

    $$\left.\frac{dh}{dx}\right|_{x=0} = 0$$

    $$h|_{x=L} = h_L$$

    ```


    where $h_L$ is the head in the river at $x = L$.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_60_0.png)


    The boundary conditions in terms of heads (Eqs. 3.8 and 3.9) are converted to
    boundary conditions in terms of the discharge potential for unconfined flow


    ```

    $$\left.\frac{d\Phi}{dx}\right|_{x=0} = 0$$

    $$\Phi|_{x=L} = \Phi_L = \frac{1}{2}k(h_L - z_b)^2$$

    ```'
