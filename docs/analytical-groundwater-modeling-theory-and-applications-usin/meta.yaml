  md: "and passing them on to the plot function, all of matplotlib's plot keyword\
    \ arguments become available for use with the `kwargs_demo` function.\n\n```\n\
    def kwargs_demo(x, y, **kwargs):\n    plt.figure()\n    plt.plot(x, y, **kwargs)\n\
    \    plt.grid(True)\n    plt.xlabel(\"x\")\n    plt.ylabel(\"y\")\n\nx = np.linspace(0,\
    \ 4 * np.pi)\ny = np.cos(x)\nkwargs_demo(x, y, color='C2', ls='--', lw=4);\n```\n\
    \n![](img/ca724f426a6249bf916ffe68c7fbe382_232_0.png)\n\nPython code or functions\
    \ can be defined in a separate file with extension `.py`. Such a file can contain\
    \ one or many function definitions. Storing functions this way avoids the need\
    \ of having to define them repeatedly, and it allows functions to be shared and\
    \ distributed easily. A set of functions that perform a similar task is called\
    \ a *package*. Packages can consist of many different files and can have a complex\
    \ structure, which is not discussed here.\n\nThere are many different ways to\
    \ import packages. Using the `numpy` package as an example, the most basic syntax\
    \ is `import numpy` after which any function in `numpy` can be called as `numpy.function_name()`.\
    \ Alternatively, all of `numpy`'s functionality may be imported with `from numpy\
    \ import *`. This allows `numpy`'s functions to be called without prefixing `numpy`\
    \ to the function name. However, importing libraries this way is generally discouraged\
    \ as any relation between the functions and packages is lost. A better way is\
    \ to use `import numpy as np` (as used before and as is standard practice in the\
    \ Python community). This makes it possible to write compact code while maintaining\
    \ the relationship between the package and everything defined in it. This is important\
    \ for programs that rely on multiple packages, as similar names may exist across\
    \ packages. By prefixing the package name to a function name, the programmer has\
    \ certainty that the intended function indeed gets called.\n\nPackages can also\
    \ have subpackages. The `pyplot` subpackage of `matplotlib` was already imported\
    \ earlier using `import matplotlib.pyplot as plt`. Another example of a subpackage\
    \ is the `linalg` package of `numpy`, which is a collection of functions that\
    \ deal with linear algebra. If the `numpy` package is imported with `import numpy\
    \ as np`, the functions in the `linalg` subpackage can be called `np.linalg.function_name()`.\n\
    \n# A.6 The `scipy` package for scientific computing\n\nThe three main Python\
    \ packages for exploratory computing are `numpy`, `matplotlib`, and `scipy`. The\
    \ `numpy` and `matplotlib` packages were already discussed in previous examples."
