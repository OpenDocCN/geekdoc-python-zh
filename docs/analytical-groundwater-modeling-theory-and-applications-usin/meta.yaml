    \ value of the array and then returns an array. A function may be vectorized with\
    \ the np.vectorize function, which takes as input argument a function to be vectorized\
    \ and returns a function.\n\n```\nfunc_two = np.vectorize(func_one)\nfunc_two(np.arange(-2,\
