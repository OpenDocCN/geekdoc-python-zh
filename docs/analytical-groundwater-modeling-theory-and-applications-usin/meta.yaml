  md: '# Chapter 0


    # Basics of groundwater flow


    Groundwater is defined as the water beneath the water table, where the pores are
    fully saturated with water. The flow of groundwater forms the subsurface part
    of the hydrological cycle. The main source of groundwater is precipitation (rain
    or snow) that reaches the water table after infiltrating into the soil. The resulting
    increase in groundwater volume is called recharge, sometimes called meteoric recharge
    to emphasize that the water originates from atmospheric precipitation.


    Natural groundwater discharge occurs where groundwater reaches the land surface,
    for example in springs, swamps, and wetlands, or directly into rivers, lakes,
    seas, or oceans. Shallow groundwater can also be extracted by vegetation or through
    evaporation directly at the soil surface. In many inhabited areas, significant
    amounts of water are extracted through pumping wells.


    # 0.1 Hydraulic head


    Groundwater may be reached by digging or drilling a hole in the ground. The level
    to which water rises in a borehole is called the hydraulic head, or simply the
    head. A piezometer is an observation well specifically designed to measure the
    head and consists of a pipe with a slotted screen at the bottom. The water level
    in a piezometer rises to a height such that the weight of the water column in
    the piezometer equals the pressure of the groundwater directly adjacent to the
    well screen. In a well-constructed piezometer (i.e., one that has no leaks or
    internal flow), the pressure distribution with depth is hydrostatic


    $$p = \rho g(h - z)$$


    where $p$ [M/L/T$^2$] is the pressure with respect to the atmosphere in the groundwater
    at the elevation of the well screen, $\rho$ [M/L$^3$] is the (mean) density of
    the water in the piezometer, $g$ [L/T$^2$] is the gravitational acceleration,
    $h$ [L] is the head, and $z$ [L] is the elevation of the well screen (positive
    upward) with respect to a reference level. Equation (0.1) can be rewritten as
    (Figure 0.1)


    $$h = z + \frac{p}{\rho g}$$


    The term $z$ is also referred to as the elevation head, and the term $p/(\rho
    g)$ as the pressure head. The pressure $p$ equals zero at the water table so that
    the hydraulic head is equal to the elevation head, $h = z$. Comparing water levels
    from different wells requires all water levels to be expressed with respect to
    a common reference level or datum (e.g., mean sea level).


    **Exercise 0.1:** Consider a piezometer of which the top is 20 m above the datum.
    The well screen is 30 m below the top of the piezometer. A pressure sensor is
    lowered into the piezometer to a'
  merge: -1
  pgno: 17
- img_proc: true
