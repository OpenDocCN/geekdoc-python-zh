    in terms of the discharge potential for unconfined flow as Eq. (3.3)


    $$Q_x = -\frac{\mathrm{d}\Phi}{\mathrm{d}x} \qquad (5.63)$$


    where $\Phi$ is given by Eq. (3.2)


    $$\Phi = \frac{1}{2}k(h - z_b)^2 \qquad (5.64)$$'
