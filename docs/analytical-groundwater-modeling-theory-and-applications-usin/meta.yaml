    \ = h_L$$\n\nThe horizontal flow below the rivers in the bottom aquifer is approximated\
    \ as zero, which is the case when discharge into the rivers is the same from both\
    \ sides of the river\n\n$$\\frac{dh_1}{dx}\\bigg|_{x=-L} = \\frac{dh_1}{dx}\\\
    bigg|_{x=L} = 0$$\n\nApplication of the boundary conditions (2.52) and (2.53)\
    \ to the general solution for flow in a two-aquifer system (2.40), but using hyperbolic\
    \ sine and cosine functions rather than"
  mdcn: "## 2.4 双含水层系统中流向河流的水流\n\n许多含水层的底部被一个弱透水层所限制，其下方是另一个含水层。这种双含水层系统中一维稳定流的解，可以表示为承压流（第1章）的解与半承压流的解之和，如下文所示。\n\
    \n下文中，上层含水层（含水层0）的导水系数为 $T_0$，下层含水层（含水层1）的导水系数为 $T_1$。两个含水层之间弱透水层的阻力为 $c$。降雨对上层含水层的补给量为\
    \ $N$。通过弱透水层从含水层1（下层含水层）流向含水层0（上层含水层）的垂向流量 $q_z$ 为\n\n$$q_z = \\frac{h_1 - h_0}{c}\
    \ \\qquad (2.33)$$\n\n双含水层系统中的水头由两个微分方程组成的方程组控制\n\n$$\\frac{d^2 h_0}{dx^2} = \\\
    frac{h_0 - h_1}{c T_0} - \\frac{N}{T_0}$$\n$$\\frac{d^2 h_1}{dx^2} = \\frac{h_1\
    \ - h_0}{c T_1} \\qquad (2.34)$$\n\n其中 $h_0$ 和 $h_1$ 分别是上层和下层含水层中的水头。\n\n方程组 (2.34)\
    \ 的解法如下。将第一个微分方程乘以 $T_0$，第二个微分方程乘以 $T_1$，然后相加得到\n\n$$\\frac{d^2 (T_0 h_0 + T_1\
    \ h_1)}{dx^2} = -N \\qquad (2.35)$$\n\n这是泊松微分方程 (1.8)，其通解为\n\n$$T_0 h_0 + T_1\
    \ h_1 = -Nx^2 + A'x + B' \\qquad (2.36)$$\n\n其中 $A'$ 和 $B'$ 是任意常数。将第一个微分方程减去第二个微分方程，经过一些代数运算后得到\n\
    \n$$\\frac{d^2 (h_0 - h_1)}{dx^2} = \\frac{h_0 - h_1}{\\lambda^2} - \\frac{N}{T_0}\
    \ \\qquad (2.37)$$\n\n其中\n\n$$\\lambda = \\sqrt{\\frac{c T_0 T_1}{T_0 + T_1}}\
    \ \\qquad (2.38)$$\n\n这是修正的亥姆霍兹方程 (2.5)，其右侧增加了一个常数项 $(-N/T_0)$。其通解为\n\n$$h_0 -\
    \ h_1 = C' e^{-x/\\lambda} + D' e^{x/\\lambda} + \\frac{N \\lambda^2}{T_0} \\\
    qquad (2.39)$$\n\n其中 $C'$ 和 $D'$ 是任意常数。通过联立方程 (2.36) 和 (2.39) 可以得到 $h_0$ 和 $h_1$\
    \ 的表达式，即\n\n$$h_0 = -\\frac{N}{2T} x^2 + Ax + B + C T_1 e^{-x/\\lambda} + D T_1\
    \ e^{x/\\lambda} + \\frac{T_1 N \\lambda^2}{T_0 T}$$\n$$h_1 = -\\frac{N}{2T} x^2\
    \ + Ax + B - C T_0 e^{-x/\\lambda} - D T_0 e^{x/\\lambda} - \\frac{N \\lambda^2}{T}\
    \ \\qquad (2.40)$$\n\n其中 $A$, $B$, $C$, 和 $D$ 是必须根据边界条件确定的参数。\n\n作为第一个应用，考虑双含水层系统中流向河流的水流；忽略面状补给。河流狭窄且与上层含水层直接接触，但不与下层含水层接触，如图\
