    \ hydraulic conductivity ($k_x$ and $k_z$), but not of the flow toward the stream\
    \ ($U_R - U_L$). Once $C$ is known, the head $h_0$ at $x = 0$ in the Dupuit solution\
    \ can be computed for any combination of $U_R$ and $U_L$ as\n\n$$h_0 = h_s + (U_L\
