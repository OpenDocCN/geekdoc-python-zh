    # 10.6 Interface flow below a strip island


    Two-dimensional steady interface flow in the vertical plane is further explored
    by considering interface flow in a cross section of a strip island; the saltwater
    is at rest. The distance between the two shores (i.e., the width of the island)
    is $2L$, and the infiltration rate is equal to $N$ (Figure 10.20). The flow is
    unconfined, but the small variation in the phreatic surface is neglected and the
    top of the aquifer is approximated as horizontal at the same elevation as the
    sea bottom. The origin of the coordinate system is chosen at the top of the aquifer
    in the center of the island. The sea bottom is horizontal, and the head along
    the sea bottom is set equal to zero


    $h|_{x>L,z=0} = h|_{x<-L,z=0} = 0$


    The stream function along the interface is set equal to zero.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_210_1.png)


    Figure 10.20 Two-dimensional interface flow in a vertical cross section of a strip
    island.


    The complex specific discharge potential solution for the stated problem is obtained
    from Bruggeman (1999, Eq. 910.03), modified for the coordinate system chosen here.
    The solution has the following form


    $\omega^2 + 2iN\zeta\omega + kN\zeta^2/\alpha - N(N + k/\alpha)L^2 = 0$


    Note that Eq. (10.59) is a second-order polynomial in $\omega$. A solution for
    $\omega$ for a given value of $\zeta$ is obtained using the standard formula for
    the root of a parabola, which gives


    $\omega = -iN\zeta + \sqrt{N^2(L^2 - \zeta^2) + Nk(L^2 - \zeta^2)/\alpha}$


    The specific discharge potential along the interface equals $\phi_i = -kz_i\alpha$
    so that an equation for the elevation of the interface as a function of $x$ may
    be obtained by substituting $\omega = -kz_i\alpha$'
