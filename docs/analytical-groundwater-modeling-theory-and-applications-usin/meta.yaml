    \ while longer line-sinks with a length of 200 m are used farther away. All other\
    \ parameters are given in the script below. A contour plot of the head for the\
    \ entire model is shown in the left graph of Figure 8.4, while a contour plot\
    \ of the area around the well is shown in the right graph of Figure 8.4.\n\n```python\n\
    # parameters and model\nhriver = 10 # head in river, m\nml = Model(T=100) # transmissivity,\
    \ m^2/d\nrf = Constant(ml, xc=0, yc=1000, hc=hriver + 2)\nw = HeadWell(ml, xw=0,\
    \ yw=100, rw=0.3, hw=hriver - 2)\nxls = np.linspace(-1600, 1600, 101) # x-locations\
    \ of line-sinks, m\nxls = np.hstack((np.arange(-1600, -400, 200),\n```"
  mdcn: "def omegainf(self, x, y):\n    return np.ones_like(x, dtype='complex')\n\n\
