- md: "## 5.3 Areal recharge between two rivers\n\nThe solution for steady recharge\
    \ between two parallel rivers in an aquifer with constant transmissivity $T$ that\
    \ was presented in Section 1.2 is extended to include transient recharge. The\
    \ rivers are a distance $L$ apart; the origin of the coordinate system is chosen\
    \ halfway between the two rivers (Figure 5.9). Initially, the head in the aquifer\
    \ is at steady state, so the initial transient head equals zero. The rivers are\
    \ in direct contact with the aquifer and the river stages are fixed so that the\
    \ boundary conditions and initial condition of the transient head are\n\n$h|_{x=-L/2,t}\
    \ = h|_{x=L/2,t} = h|_{x,t=0} = 0$ (5.39)\n\nAt time $t = 0$, areal recharge starts\
    \ at a constant and uniform rate $N$. The solution for the head in the aquifer\
    \ as a function of time can be obtained with separation of variables and results\
    \ in the following infinite series (Bruggeman, 1999, solution 133.16)\n\n$h =\
    \ \\frac{-N}{2T} \\left(x^2 - \\frac{1}{4}L^2\\right) - \\frac{4NL^2}{\\pi^3 T}\
    \ \\sum_{n=0}^{\\infty} \\frac{(-1)^n}{(2n+1)^3} \\cos\\left[\\frac{(2n+1)\\pi\
    \ x}{L}\\right] \\exp\\left[-\\frac{(2n+1)^2 \\pi^2 T t}{S L^2}\\right]$ (5.40)\n\
    \nNote that for large times, the exponential term in the solution goes to zero\
    \ and the head approaches the steady state solution $\\frac{-N}{2T} \\left(x^2\
    \ - \\frac{1}{4}L^2\\right)$, which is Eq. (1.24) for the case that the heads\
    \ in the river are set to zero and the origin of the coordinate system is halfway\
    \ between the two rivers.\n\nIn the following example, the head is plotted vs.\
    \ $x$ at three early times and at three late times (Figure 5.10). For the early\
    \ times, the solution is plotted using three terms in the series (dashed lines),\
    \ which is not sufficient as a distinct wiggle is visible, especially for $t =\
    \ 1$ d. For later times, the dashed solution represents only one term in the series\
    \ solution, which is indistinguishable from the solution with ten or more terms.\n\
    \n```python\n# parameters\nL = 1000 # aquifer length, m\nS = 0.1 # storage coefficient,\
    \ -\nT = 200 # transmissivity, m^2/d\nN = 0.001 # recharge rate, m/d\n```\n\n\
    ```python\n# solution\ndef head(x, t, T=T, S=S, L=L, N=N, nterms=10):\n    h =\
    \ 0\n    for n in range(nterms):\n        h += (-1)**n / (2 * n + 1)**3 * \\\n\
    \             np.cos(((2 * n + 1) * np.pi * x) / L) * \\\n             np.exp(-((2\
    \ * n + 1)**2 * np.pi**2 * T * t) / (S * L**2))\n    h = -N / (2 * T) * (x**2\
    \ - L**2/4) - 4 * N * L**2 / (np.pi**3 * T) * h\n    return h\n```\n\n```python\n\
    # basic head plot\nplt.subplot(121) # early time\nx = np.linspace(-L / 2, L /\
    \ 2, 100)\nfor t in [1, 2, 3]:\n    plt.plot(x, head(x, t, nterms=3), '--')\n\
    \    plt.plot(x, head(x, t, nterms=10))\nplt.subplot(122) # late time\nfor t in\
    \ [40, 80, 160]:\n    plt.plot(x, head(x, t, nterms=1) , '--') # just 1 term is\
    \ enough\n    plt.plot(x, head(x, t, nterms=10))\nplt.plot(x, head(x, 0, nterms=0),\
    \ 'k'); # 0 terms gives steady solution\n```\n\nAt early times, the graph on the\
    \ left shows that the head in the middle part of the aquifer rises at a rate $N/S\
    \ = 0.01$ m/d, as discharge to the rivers does not have any draining effect on\
    \ the middle part yet. When time progresses from 1 to 2 to 3 days, a larger and\
    \ larger section of the aquifer drains toward the rivers. The head at $t = 160$\
    \ d approaches the steady state solution, as shown in the right graph.\n\nThe\
    \ characteristic time $t_{95}$ of the system is defined here as the time it takes\
    \ for the head to reach 95% of the steady state level. An approximate equation\
    \ for $t_{95}$ is obtained by first approximating the solution (5.40) with the\
    \ first term in the series solution\n\n$$h \\approx \\frac{-N}{2T} \\left(x^2\
    \ - \\frac{1}{4}L^2\\right) - \\frac{4NL^2}{\\pi^3 T} \\cos \\left[\\frac{\\pi\
    \ x}{L}\\right] e^{-t/\\tau}$$\n\nwhere\n\n$$\\tau = \\frac{SL^2}{\\pi^2 T}$$\n\
    \nThe cosine term may be further simplified with the first two terms of its Taylor\
    \ series ($\\cos(x) \\approx 1 - x^2/2$)\n\n$$-\\frac{4NL^2}{\\pi^3 T} \\cos\\\
    left[\\frac{\\pi x}{L}\\right] \\approx -\\frac{4NL^2}{\\pi^3 T} \\left(1 - \\\
    frac{\\pi^2 x^2}{2L^2}\\right) \\approx \\frac{N}{2T} \\left(x^2 - \\frac{1}{4}L^2\\\
    right) \\quad (5.43)$$\n\nwhere it is used that $\\frac{4}{2\\pi} \\approx \\\
    frac{1}{2}$ and $\\frac{8}{\\pi^3} \\approx \\frac{1}{8}$. The head may now be\
    \ approximated as\n\n$$h \\approx \\frac{-N}{2T} \\left(x^2 - \\frac{1}{4}L^2\\\
    right) (1 - e^{-t/\\tau}) \\quad (5.44)$$\n\nIt follows that at time $t = \\tau$,\
    \ the head has reached $1 - e^{-1} = 63\\%$ of its final value, and at time $t\
    \ = 3\\tau$, the head has reached 95% of its final value. Hence, the characteristic\
    \ time $t_{95}$ may be approximated as\n\n$$t_{95} \\approx \\frac{3SL^2}{\\pi^2\
    \ T} \\quad (5.45)$$\n\nEquation (5.45) is a reasonable approximation of $t_{95}$\
    \ for the entire aquifer, as is explored in the exercise below. The characteristic\
    \ time $t_{95}$ is also referred to as the memory of the system, as the head is\
    \ back to its original value $t_{95}$ after a recharge event ends. For the parameters\
    \ used here, the value of $t_{95}$ may be computed as\n\n```python\nt95 = 3 *\
    \ S * L**2 / (np.pi**2 * T)\nprint(f'The memory of the system is: {t95:0.0f} d')\n\
    ```\n\nThe memory of the system is: 152 d\n\n**Exercise 5.6:** Compute the memory\
    \ of the system $t_{95}$ using 10 terms in the solution for 20 equally spaced\
    \ points between the two rivers, and plot the memory of the system vs. $x$; use\
    \ the `fsolve` method from `scipy.optimize` to find $t_{95}$, similar to the use\
    \ of `fsolve` in Section 3.2. In the same graph, plot $t_{95}$ according to Eq.\
    \ (5.45).\n\nSolution (5.40) is known as a step response: It is the response to\
    \ a step in the recharge from zero to $N$. The unit step response is the response\
    \ to a unit step in the recharge from zero to one. In addition to the unit step\
    \ response, there is the unit block response, which is the response to a unit\
    \ of recharge per day for a period $\\Delta t$ and zero after that; $\\Delta t$\
    \ is referred to as the length of the block. The block response $b$ is obtained\
    \ through superposition of two step responses\n\n$b(x, t) = s(x, t) \\quad 0 \\\
    le t \\le \\Delta t$\n$b(x, t) = s(x, t) - s(x, t - \\Delta t) \\quad t \\ge \\\
    Delta t$\n\nwhere $s(x, t)$ is the unit step response starting at $t = 0$, and\
    \ $s(x, t - \\Delta t)$ is the unit step response starting at $t = \\Delta t$.\
    \ The unit step response $s(x, t)$ is computed with Eq. (5.40) by setting the\
    \ recharge $N$ to 1.\n\nThe step response and block response are plotted at two\
    \ locations in Figure 5.11. This represents the head response in an observation\
    \ well at the specified value of $x$. The block response is the same as the step\
    \ response during the length of the block $\\Delta t$. The dotted lines in the\
    \ corresponding colors represent the final steady levels of the step responses.\
    \ The black dashed line indicates the head rise in the absence of the rivers (i.e.,\
    \ the head rise is $N/S = 0.01$ m/d). The head in the observation well farthest\
    \ away from the rivers (in this case, at $x = 0$) follows the dashed line for\
    \ the longest period, up to ~20 days.\n\nThe memory of the system is indicated\
    \ with the vertical lines representing the $t_{95}$ times for the step response\
    \ and the block response; the latter is obtained as $t_{95}$ after the block recharge\
    \ has ended. Note that for this case, the memory of the system is 152 days, and\
    \ the head in the aquifer is approximately back to its original value 152 days\
    \ after the end of the recharge event.\n\n```python\n# plot step recharge and\
    \ response and block recharge and response at x=0\nx = 0\ndelt = 365 / 12\nt =\
    \ np.linspace(0, 210, 211)\nplt.subplot(221)\nplt.plot([0, 210], [1, 1])\nplt.subplot(222)\n\
    plt.plot([0, 30, 30, 210], [1, 1, 0, 0])\nplt.subplot(223)\nh = N * head(x, t,\
    \ N=1)\nplt.plot(t, h)\nplt.subplot(224)\nh[t > delt] -= N * head(x, t[t > delt]\
    \ - delt, N=1)\nplt.plot(t, h);\n```\n\nThe response to a series of recharge events\
    \ of equal length $\\Delta t$ is computed using superposition. For example, if\
    \ the recharge in the first three periods is $N_0$, $N_1$, and $N_2$, then the\
    \ head at $t = 0$, $\\Delta t$, $2\\Delta t$, and $3\\Delta t$ can be computed\
    \ as\n\n$h|_{x,0} = 0$\n$h|_{x,\\Delta t} = N_0 b|_{x,\\Delta t}$\n$h|_{x,2\\\
    Delta t} = N_0 b|_{x,2\\Delta t} + N_1 b|_{x,\\Delta t}$\n$h|_{x,3\\Delta t} =\
    \ N_0 b|_{x,3\\Delta t} + N_1 b|_{x,2\\Delta t} + N_2 b|_{x,\\Delta t}$\n\nA general\
