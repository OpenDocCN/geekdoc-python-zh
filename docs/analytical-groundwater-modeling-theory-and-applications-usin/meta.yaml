  md: '# 7.5 A well in uniform background flow near the coast


    The solutions in the previous sections concerned the capture zone of a well in
    uniform background flow near a straight river. The critical discharge of the well
    was derived such that the well does not capture water from the river or from the
    other side of the river. In this section, the straight river is replaced by a
    straight and vertical coastal boundary and the maximum discharge of the well is
    determined such that the well does not pump any saltwater. In other words, the
    maximum discharge is determined such that the interface does not reach the well.
    It turns out that this maximum discharge is quite a bit smaller than the maximum
    discharge for a well near a river (Section 7.3).


    Consider a well in a coastal aquifer. The coastline is located along the line
    $x = 0$. The well is located at $(x, y) = (-d, 0)$, has a discharge $Q$, and has
    a radius $r_w$. In the absence of the well, the flow toward the coast is uniform
    and equal to $Q_x = U$. The aquifer is unconfined, the hydraulic conductivity
    is $k$, and the elevation of the bottom of the aquifer is $z_b$ with respect to
    sea level. The density of the seawater is $\rho_s$. The sea is in direct contact
    with the aquifer (no seabed resistance) so that the head along the coastline is
    equal to sea level. The solution for the complex potential is identical to the
    solution for a well near a river in direct contact with the aquifer (Eq. 7.29).
    For this case of unconfined interface flow, the potential at the toe of the interface
    is Eq. (4.26)


    $$\Phi_{\text{toe}} = \frac{1}{2} k \frac{\alpha + 1}{\alpha^2} z_b^2$$


    In the absence of pumping, the toe of the interface is located at (Eq. 4.21)


    $$x_{\text{toe}} = -\frac{\Phi_{\text{toe}}}{U}$$


