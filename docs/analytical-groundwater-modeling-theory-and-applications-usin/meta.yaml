    \ \\quad x = 0$$\n\n$$\\psi = N L \\quad \\text{在} \\quad x = L$$\n\n流函数的解为\n\n\
    $$\\psi = N x + \\sum_{n=1}^{\\infty} A_n \\sinh\\left(\\frac{n \\pi x}{L}\\right)\
    \ \\cos\\left(\\frac{n \\pi z}{L}\\right)$$\n\n系数 $A_n$ 由界面处的边界条件确定。界面的高程由流线 $\\\
    psi = N L$ 得到。\n\n界面高程的解为\n\n$$z_i = -\\sqrt{\\frac{N\\alpha}{k_x}L^2 - \\frac{N\\\
