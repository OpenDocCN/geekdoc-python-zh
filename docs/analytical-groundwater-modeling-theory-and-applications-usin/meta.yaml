    # A.1 Basics


    There are a few things that are worth mentioning upfront about Python, as they
    form typical traps for novice users. First of all, Python is case sensitive, so
    a variable with the name avariable is not the same as Avariable or AVARIABLE.
    Second, systematic indentation is not only good coding style, but it is a feature
    of the Python language. Third, Python starts counting at zero (for those who have
    trouble getting used to this, it may help to remember that the first hour of a
    day also starts at zero, or that you don''t turn one until one year after you
    were born). All three aspects will become clear in the examples that follow.


    Because Python is an interpreted language, one of its uses is as a basic calculator.
    For example, to compute 6 * 12, type


    ```

    6 * 2

    ```


