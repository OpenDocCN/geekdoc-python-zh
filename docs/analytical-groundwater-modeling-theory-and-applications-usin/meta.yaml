    # 第 5 章


    ## 瞬态一维流动


    本书迄今为止介绍的所有解都是针对稳定流的：水头和流量是 $x$ 的函数，但不是时间的函数。在自然界中，所有流动都是瞬态的，它们会响应降雨、蒸发、蒸腾、大气压变化、潮汐波动和地质过程（例如，负载、构造应力和加热）等驱动力而变化。除了这些自然过程外，还有地下水开采和回灌，这些是人为驱动力。稳态近似的合理性取决于所考虑的系统和研究目标。例如，地下水波动可能很小，或者当目标是研究长期平均情况时，波动可能不被关注。模型构建者需要评估时间波动是否重要。瞬态解析解对此非常有用，因为它们可用于快速确定达到稳态所需的时间。


    本章讨论一维瞬态流动，这意味着水头和流量是 $x$ 和时间 $t$ 的函数。涉及开采的瞬态解将在第 9 章中考虑。这里的重点是水头因地表水位或地下水补给变化而变化的问题。


    作为起点，推导了一维瞬态流动的微分方程。瞬态地下水质量平衡指出


    流入质量 $-$ 流出质量 $=$ 质量增加


    当地下水密度近似为常数时，地下水质量平衡简化为体积平衡。体积平衡为


    流入体积 $-$ 流出体积 $=$ 体积增加


    通过考虑含水层中一个长度为 $\Delta x$、垂直于流动平面方向宽度为 $\Delta y = 1$ 的小段，推导了含水层中一维流动的体积平衡。流入包括来自左侧的水平流量
    $Q_x(x, t)$ [L$^2$/T] 和顶部的补给量 $N$ [L/T]。流出包括右侧的水平流量 $Q_x(x + \Delta x, t)$（图 5.1）。体积增加等于水头增加乘以储水系数
    $S$ 和 $\Delta x \Delta y$（其中 $\Delta y = 1$）。回顾第 0.6 节，储水系数对于无压流等于潜水储水系数 $S =
    S_p$，对于承压流等于比储水系数 $S_s$ 与含水层厚度 $H$ 的乘积（$S = S_s H$）。此外，回顾流量向量 $Q_x$ 是单位含水层宽度的流量。


    体积平衡是针对时间段 $\Delta t$ 写出的。将相应的体积代入公式 (5.2) 得到


    $Q_x(x, t)\Delta t + N\Delta x\Delta t - Q_x(x + \Delta x, t)\Delta t = S\Delta
    x[h(x, t + \Delta t) - h(x, t)]$


    除以 $\Delta x\Delta t$ 并重新排列各项得到


    $\frac{Q_x(x + \Delta x, t) - Q_x(x, t)}{\Delta x} = N - S\frac{h(x, t + \Delta
    t) - h(x, t)}{\Delta t}$


    DOI: 10.1201/9781315206134-5


    ![](img/ca724f426a6249bf916ffe68c7fbe382_86_0.png)


    在 $\Delta x \rightarrow 0$ 和 $\Delta t \rightarrow 0$ 的极限下，体积平衡变为瞬态一维水平流动的微分方程


    $$\frac{\partial Q_x}{\partial x} = -S \frac{\partial h}{\partial t} + N \quad
    (5.5)$$


    瞬态流动的流量向量与稳定流的相同（公式 1.6）


    $$Q_x = -T \frac{\partial h}{\partial x} \quad (5.6)$$


    回顾对于承压流，$T$ 是含水层的恒定导水系数。对于无压流，与水头相关的导水系数近似为恒定的有效导水系数 $T = kH$，其中饱和厚度 $H$ 近似为常数。


    将公式 (5.6) 中的 $Q_x$ 代入公式 (5.5) 得到


    $$\frac{\partial^2 h}{\partial x^2} = \frac{S}{T} \frac{\partial h}{\partial t}
    - \frac{N}{T} \quad (5.7)$$


    当面状补给等于零时，控制微分方程简化为


    $$\frac{\partial^2 h}{\partial x^2} = \frac{S}{T} \frac{\partial h}{\partial t}
    \quad (5.8)$$


    该方程被称为扩散方程；项 $T/S$ 也被称为含水层扩散系数。扩散方程控制着许多其他物理过程的瞬态行为。


    毫不奇怪，瞬态地下水流动的解比稳定流的解更难获得。常见的数学方法包括相似解、分离变量、傅里叶级数和拉普拉斯变换。许多这些数学求解技术在水文应用中的介绍可以在例如
    Bruggeman (1999) 中找到。本章中，解在不推导的情况下给出。解的验证在部分练习中讨论。给出了三个问题的解：半无限含水层中对地表水位变化的响应（第
    5.1 节）、半无限含水层中的潮汐响应（第 5.2 节）以及两条平行河流之间对瞬态补给的响应（第 5.3 节）。第 5.1 节的问题在第 5.4 节中使用拉普拉斯变换方法解决，并简要介绍了拉普拉斯变换解的（数值）求值。本章最后一节给出了瞬态无流布西涅斯克方程的一个解。


    ## 5.1 地表水位的阶跃变化


    河流水位的变化会以水头变化的形式在与河流接触的含水层中传播，这对于理解地表水-地下水相互作用非常重要。以下示例考虑了如图 5.2 所示的半无限含水层中的一维瞬态流动。含水层左侧以一条完全贯穿的河流为界，该河流与含水层直接接触。最初，含水层中的水头处处等于河流水位
    $h_0$。在时间 $t = t_0$ 时，河流水位升高了 $\Delta h$。


    解被分为一个仅是 $x$ 函数的稳态部分 $h_s$ 和一个 $x$ 和 $t$ 函数的瞬态部分 $h_t$


    $$h = h_s + h_t \tag{5.9}$$


    稳态部分的边界条件为


    $$h_s|_{x=0} = h_s|_{x \to \infty} = h_0 \tag{5.10}$$


    稳态解很简单：$h_s = h_0$。


    瞬态解的边界条件为


    $$h_t|_{x=0, t>0} = \Delta h \tag{5.11}$$

    $$h_t|_{x \to \infty, t} = 0 \tag{5.12}$$


    初始条件为


    $$h_t|_{x, t=0} = 0 \tag{5.13}$$


    注意，稳态解和瞬态解的边界条件之和给出了所述问题的边界条件；初始条件也是如此。本质上，瞬态解表示由河流水位变化引起的含水层中的水头变化。本节的其余部分关注解的瞬态部分，并省略下标
    $t$。


    ![](img/ca724f426a6249bf916ffe68c7fbe382_87_0.png)


    所述瞬态问题的解由 Edelman (1947) 作为相似解获得，被称为 Edelman 解。Bruggeman (1999) 使用拉普拉斯变换方法得到了相同的结果。Edelman
    解为


    $$h(x, t) = \Delta h \, \text{erfc}(u) \tag{5.14}$$


    其中


    $$u = \sqrt{\frac{S x^2}{4 T (t - t_0)}} \tag{5.15}$$


    erfc 是互补误差函数，定义为


    $$\text{erfc}(u) = \int_u^\infty \frac{2}{\sqrt{\pi}} e^{-\tau^2} \, d\tau \tag{5.16}$$


    互补误差函数在 `scipy.special` 包中可用。使用达西定律可以得到含水层中通量的方程


    $$Q_x = -T \frac{\partial h}{\partial x} = -T \Delta h \frac{\partial \text{erfc}(u)}{\partial
    x} \tag{5.17}$$'
