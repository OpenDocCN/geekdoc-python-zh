    # 9.4 Wells with wellbore storage and skin effect


    The previous solutions for transient flow to a well were based on two approximations:
    The boundary condition at the well was approximated by taking the limit for the
    well radius going to zero (Eq. 9.6), and the water level in the well is approximated
    by the head at the well radius in the aquifer. The first approximation neglects
    the storage of the water inside the well, which is referred to as wellbore storage.
    The second approximation neglects the resistance of the well screen, which is
    referred to as the skin effect. Both are taken into account in this section.


    Consider radial flow to a well in a confined aquifer with transmissivity $T$ and
    storage coefficient $S$. The well starts pumping with discharge $Q$ at time $t
    = 0$. The radius of the well screen is $r_w$ (see Figure 9.7). The resistance
    to flow through the well screen is equal to $c_w$ so that the radial component
    of the discharge vector right at the well screen may be written as


    $$Q_r|_{r=r_w} = H \frac{h_w - h|_{r=r_w}}{c_w} \qquad (9.38)$$


    where $h_w$ is the water level inside the well. Conversely, the water level in
    the well may be written as


    $$h_w = h|_{r=r_w} + \frac{c_w}{H} Q_r|_{r=r_w} \qquad (9.39)$$


    ![](img/ca724f426a6249bf916ffe68c7fbe382_180_1.png)


    Figure 9.7 Vertical cross section through a well with wellbore storage and skin
    effect. The head in the aquifer at the well screen is higher than the water level
    $h_w$ in the well because of the skin effect.


    The water balance for water inside the well is


    $$A_w \frac{dh_w}{dt} = Q_{\text{in}} - Q_{\text{out}} \qquad (9.40)$$'
