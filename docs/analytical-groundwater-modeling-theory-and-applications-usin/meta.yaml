- md: "## Chapter 2\n\n## Steady one-dimensional semi-confined flow\n\nIn semi-confined\
    \ aquifers, the aquifer is capped by a leaky layer consisting of a low-permeable\
    \ material such as peat, shale, or clay. This is in contrast to the confined aquifers\
    \ considered in the previous chapter, which are capped by a layer that may be\
    \ approximated as impermeable. The low-permeable layer is referred to as a semi-confining\
    \ layer or a leaky layer. In what follows, the head above the leaky layer is fixed\
    \ to a constant level $h^*$ (Figure 2.1). This can correspond to the head in an\
    \ aquifer above the semi-confining layer, or the water level of a surface water\
    \ body. The fixed head $h^*$ can also represent the mean water table in a drained\
    \ area, where the water table is fixed by means of ditches or tile drains; such\
    \ drained areas are sometimes referred to as polders. The fixed head $h^*$ in\
    \ the drained area can be in the low-permeable top layer (Figure 2.1) or in a\
    \ permeable layer separated from the aquifer by a leaky layer (Figure 2.2).\n\n\
    ![](img/ca724f426a6249bf916ffe68c7fbe382_41_0.png)\n\nThe specific discharge through\
    \ the leaky layer is approximated as vertical and may be computed with Darcy's\
    \ law (Eq. 0.9) as\n\n$$q_z = -k^* \\frac{\\partial h}{\\partial z} \\approx -k^*\
    \ \\frac{h^* - h}{H^*}$$ (2.1)\n\nwhere $h$ is the head in the aquifer, $h^*$\
    \ is the specified head at the top of the leaky layer, $k^*$ is the vertical hydraulic\
    \ conductivity of the leaky layer, and $H^*$ is either the thickness of the leaky\
    \ layer (left situation of Figure 2.1) or the distance between the drainage level\
    \ and the bottom of the low-permeable layer (right situation of Figure 2.1).\n\
    \nThe specific discharge through the leaky layer is positive for upward flow (in\
    \ the positive $z$ direction) and may be written in the form\n\n$$q_z = \\frac{h\
    \ - h^*}{c}$$ (2.2)\n\nwhere $c$ [T] is the resistance to vertical flow of the\
    \ leaky layer defined as\n\n$$c = H^* / k^*$$ (2.3)\n\nThe flow in a semi-confined\
    \ aquifer is governed by the Poisson equation (1.8), where the infiltration rate\
    \ $N$ is a function of the head difference across the semi-confining layer. Substitution\
    \ of $N = -q_z$ in Eq. (1.8) gives\n\n$$\\frac{d^2h}{dx^2} = \\frac{h - h^*}{cT}$$\n\
    \nFor the case that $h^*$ is a constant, this equation can be rewritten as\n\n\
    $$\\frac{d^2(h - h^*)}{dx^2} = \\frac{h - h^*}{\\lambda^2}$$\n\nwhere\n\n$$\\\
    lambda = \\sqrt{cT}$$\n\nis referred to as the leakage factor [L] and is a characteristic\
    \ length of the system, as will be explained later.\n\nDifferential equation (2.5)\
    \ is a second-order linear ordinary differential equation known as the modified\
    \ Helmholtz equation. The general solution is\n\n$$h - h^* = Ae^{-x/\\lambda}\
    \ + Be^{x/\\lambda}$$\n\nwhere $A$ and $B$ are constants to be determined from\
    \ boundary conditions. The general solution for the discharge vector is\n\n$$Q_x\
    \ = \\frac{AT}{\\lambda}e^{-x/\\lambda} - \\frac{BT}{\\lambda}e^{x/\\lambda}$$\n\
    \nAlternatively, the general solution may be written as\n\n$$h - h^* = A \\sinh(x/\\\
    lambda) + B \\cosh(x/\\lambda)$$\n\nwith the corresponding discharge vector\n\n\
    $$Q_x = -\\frac{AT}{\\lambda} \\cosh(x/\\lambda) - \\frac{BT}{\\lambda} \\sinh(x/\\\
    lambda)$$\n\nIt depends on the problem whether the formulation in terms of exponential\
    \ functions is more convenient, or the formulation in terms of hyperbolic functions.\n\
    \n## 2.1 Flow from a canal to a drained area\n\nConsider one-dimensional flow\
    \ from a canal into a polder. The aquifer is semi-confined and semi-infinite and\
    \ is bounded on the left by a fully penetrating canal with water level $h_0$,\
    \ as shown in Figure 2.2; the head in the polder is fixed to $h^*$. The governing\
    \ differential equation is the modified Helmholtz equation, as derived above.\
    \ The boundary conditions are\n\n$$h|_{x=0} = h_0$$\n$$h|_{x \\to \\infty} = h^*$$\n\
    \nApplication of the second boundary condition gives $B = 0$, after which application\
    \ of the first boundary condition gives $A = h_0 - h^*$ so that the solution for\
    \ $h$ becomes\n\n$$h = h^* + (h_0 - h^*)e^{-x/\\lambda}$$\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_43_0.png)\n\
    \nFigure 2.2 Semi-confined flow from a canal to a polder.\n\nWater flows from\
    \ the canal into the semi-confined aquifer and then through the leaky layer into\
    \ the overlying polder (provided that the head in the canal is larger than the\
    \ head in the polder). The discharge vector in the aquifer is\n\n$$Q_x = -T \\\
    frac{dh}{dx} = \\frac{T(h_0 - h^*)}{\\lambda} e^{-x/\\lambda}$$\n\nAn example\
    \ solution is shown below (Figure 2.3). Equations (2.12) and (2.13) for $h$ and\
    \ $Q_x$ are implemented in Python functions so that they can easily be reused\
    \ later on in this section.\n\n```python\n# parameters\nhstar = 0 # head above\
    \ leaky layer, m\nh0 = 1 # specified head at the left boundary, m\nk = 10 # hydraulic\
    \ conductivity, m/d\nH = 40 # aquifer thickness, m\nc = 100 # resistance of leaky\
    \ layer, d\nT = k * H # transmissivity, m^2/d\nlab = np.sqrt(c * T) # leakage\
    \ factor, m\nprint(f'the leakage factor is: {lab:.0f} m')\n```\n\nthe leakage\
    \ factor is: 200 m\n\n```python\n# solution\ndef head(x):\n    return (h0 - hstar)\
    \ * np.exp(-x / lab) + hstar\n\ndef disvec(x):\n    return k * H * (h0 - hstar)\
    \ / lab * np.exp(-x / lab)\n\nx = np.linspace(0, 5 * lab, 100)\nh = head(x)\n\
    Qx = disvec(x)\n```\n\n```python\n# basic plot\nplt.subplot(121)\nplt.plot(x,\
    \ h, 'C0')\nplt.subplot(122)\nplt.plot(x, Qx, 'C1');\n```\n\nThe total discharge\
    \ per meter length of canal normal to the plane of flow is called $Q_0$ and is\
    \ obtained by evaluating $Q_x$ at $x = 0$, which gives $Q_0 = T(h_0 - h^*)/\\\
    lambda$. The discharge vector $Q_x$ in the aquifer decreases with distance from\
    \ the canal, as groundwater discharges across the leaky layer into the drainage\
    \ system of the polder. At a distance $x = \\lambda$, $Q_x$ has reduced to $e^{-1}Q_0\
    \ = 0.37Q_0$, and at a distance $x = 3\\lambda$, $Q_x$ has reduced to only $e^{-3}Q_0\
    \ = 0.05Q_0$. Hence, 95% of the water that flows from the canal into the aquifer\
    \ has discharged into the polder within a distance of $3\\lambda$ from the canal.\
    \ That is why the leakage factor $\\lambda$ is a characteristic\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_44_0.png)\n\
    \nlength of the system. Similarly, the difference between the head in the aquifer\
    \ and the head in the polder reduces from $h_0 - h^*$ at the canal ($x = 0$) to\
    \ only $0.05(h_0 - h^*)$ at $x = 3\\lambda$. Roughly speaking, three times the\
    \ leakage factor away from the canal, the head in the aquifer is approximately\
    \ equal to the head $h^*$ above the semi-confined aquifer.\n\nSeveral checks may\
    \ be conducted to verify that the solution and its Python implementation (the\
    \ functions head and disvec) are correct. First, it is verified that the solution\
    \ meets the boundary conditions in Eq. (2.11).\n\n```python\n# Verify boundary\
    \ conditions\nprint(f'head at x=0: {head(0):.0f} m')\nprint(f'head at x=infinity:\
    \ {head(np.inf):.0f} m')\n```\n\nhead at x=0: 1 m\nhead at x=infinity: 0 m\n\n\
    Second, it is verified that the solution meets the governing differential equation\
    \ (2.5) using an accurate numerical approximation of the second derivative\n\n\
    $$\\frac{d^2h}{dx^2} \\approx \\frac{h(x - \\Delta x) - 2h(x) + h(x + \\Delta\
    \ x)}{(\\Delta x)^2}$$ (2.14)\n\nwhere $\\Delta x$ is a suitably small increment.\n\
    \n```python\n# Verify differential equation\nx = 200 # example point where deq\
    \ is checked\ndelx = 0.001\nleft_side = (head(x - delx) - 2 * head(x) + head(x\
    \ + delx)) / delx ** 2\nright_side = (head(x) - hstar) / lab ** 2\nprint(f'left_side\
    \ of deq : {left_side}')\nprint(f'right_side of deq: {right_side}')\n```\n\nleft_side\
    \ of deq : 9.196976513692334e-06\nright_side of deq: 9.196986029286058e-06\n\n\
    Third and final, it is checked that the specific discharge is indeed $Q_x = -Tdh/dx$\
    \ using the numerical derivative\n\n$$\\frac{dh}{dx} \\approx \\frac{h(x + \\\
    Delta x) - h(x - \\Delta x)}{2\\Delta x}$$ (2.15)\n\n```python\n# Verify Qx\n\
    Qx = disvec(x)\nQxnum = -T * (head(x + delx) - head(x - delx)) / (2 * delx)\n\
    print(f'Qx exact            : {Qx} m^2/d')\nprint(f'Qx numerical derivative: {Qxnum}\
    \ m^2/d')\n```\n\nQx exact            : 0.7357588823428847 m^2/d\nQx numerical\
    \ derivative: 0.7357588823531103 m^2/d\n\nIt is important to perform the above\
    \ three checks to verify a solution. If the solution is correct (and correctly\
    \ programmed), the solution and the approximation using numerical derivatives\
    \ must be approximately equal. The number of significant digits that match depends\
    \ on the size of the increment $\\Delta x$ and on machine accuracy.\n\n**Exercise\
    \ 2.1:** Consider the case of the example, but this time the resistance $c$ is\
    \ unknown. The head in the aquifer is measured in an observation well at $x =\
    \ 100$ m, where the head is 0.5 m. Compute the resistance of the leaky layer and\
    \ the leakage factor.\n\n**Exercise 2.2:** Verify that the total flux from the\
    \ canal into the aquifer ($Q_0$) is equal to the integrated leakage through the\
    \ leaky layer by analytic integration of $q_z$.\n\n## 2.2 Flow between a lake\
    \ and a drained area\n\nOne-dimensional flow is modeled between a lake and a drained\
    \ area, as shown in Figure 2.4. Both the lake and drained area are separated from\
    \ the aquifer by a semi-confining layer, which has a resistance $c_0$ below the\
    \ lake and a resistance $c_1$ below the drained area. The lake and drained area\
    \ are separated by a dike of negligible width (the vertical black line at $x =\
    \ 0$ in the figure). The water level in the lake is $h_0^*$, while the water level\
    \ in the drained area is $h_1^*$. The semi-confined aquifer extends to infinity\
    \ on both sides. The transmissivity of the aquifer is constant and equal to $T$.\n\
    \n![](img/ca724f426a6249bf916ffe68c7fbe382_45_0.png)\n\nSeparate differential\
    \ equations are written for the part of the aquifer below the lake and the part\
    \ below the drained area\n\n$$\\frac{d^2(h - h_0^*)}{dx^2} = \\frac{h - h_0^*}{\\\
    lambda_0^2} \\quad x \\leq 0$$\n\n$$\\frac{d^2(h - h_1^*)}{dx^2} = \\frac{h -\
    \ h_1^*}{\\lambda_1^2} \\quad x \\geq 0$$\n\n(2.16)\n\nwhere $\\lambda_0 = \\\
    sqrt{c_0 T}$ and $\\lambda_1 = \\sqrt{c_1 T}$.\n\nThe boundary conditions are\
    \ that the head approaches $h_0^*$ far to the left and $h_1^*$ far to the right\n\
    \n$$h|_{x \\to -\\infty} = h_0^* \\quad h|_{x \\to +\\infty} = h_1^*$$\n\n(2.17)"
