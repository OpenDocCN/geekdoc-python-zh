  mdcn: "## 第9章\n\n## 瞬态二维流动\n\n迄今为止介绍的所有二维解都是针对稳定流的：水头和流量是 $x$ 和 $y$ 的函数，但不是时间 $t$\
    \ 的函数。在本章中，我们考虑流量随时间变化的井。水头和流量都是 $x$、$y$ 和 $t$ 的函数。我们将讨论在各种设置下，由瞬态井引起的水头和流量变化。\n\
    \n水平 $x$、$y$ 平面上二维瞬态流动的连续性方程可以写为\n\n$$\\frac{\\partial Q_x}{\\partial x} + \\\
    frac{\\partial Q_y}{\\partial y} = -S \\frac{\\partial h}{\\partial t} + N \\\
    qquad (9.1)$$\n\n其中 $N$ 是面状补给量，$S$ 是储水系数，对于无压流，它等于潜水储水系数 $S = S_p$；对于承压流，它等于比储水系数\
    \ $S_s$ 与含水层厚度 $H$ 的乘积（$S = S_s H$）（见第5章）。请注意，该方程与一维瞬态流动的连续性方程（公式5.5）相比，仅多了一项\
    \ $\\partial Q_y / \\partial y$。\n\n流量矢量的分量用水头的导数表示为\n\n$$Q_x = -T \\frac{\\partial\
    \ h}{\\partial x} \\qquad Q_y = -T \\frac{\\partial h}{\\partial y} \\qquad (9.2)$$\n\
    \n其中导水系数近似为常数，对于无压流也是如此（见第5章）。将公式 (9.2) 中的 $Q_x$ 和 $Q_y$ 代入公式 (9.1)，得到二维瞬态流动的微分方程\n\
    \n$$\\nabla^2 h = \\frac{S}{T} \\frac{\\partial h}{\\partial t} - \\frac{N}{T}\
    \ \\qquad (9.3)$$\n\n流量势对于瞬态流不太有用（除了第5.5节讨论的无压流的替代公式），流函数和复势仅适用于由拉普拉斯方程控制的流动，因此这里不使用它们。当面状补给可忽略不计（$N\
    \ = 0$）时，公式 (9.3) 简化为二维扩散方程\n\n$$\\nabla^2 h = \\frac{S}{T} \\frac{\\partial h}{\\\
    partial t} \\qquad (9.4)$$\n\n此外，如果流动是径向对称的，则微分方程变为（与公式 (6.8) 比较）\n\n$$\\frac{\\\
    partial^2 h}{\\partial r^2} + \\frac{1}{r} \\frac{\\partial h}{\\partial r} =\
    \ \\frac{S}{T} \\frac{\\partial h}{\\partial t} \\qquad (9.5)$$\n\n二维扩散方程的解在数学上很难推导，即使是许多径向对称流动的情况也是如此。获得精确解的数学解法包括相似解、分离变量法和各种变换技术（拉普拉斯变换、汉克尔变换和傅里叶变换）。下面将介绍几个瞬态井流的解，而不是推导它们。这些解将像其他章节一样进行讨论、编程和可视化。所给解的数学正确性可以通过对解进行微分并代入微分方程（解析或数值地）来验证，并通过验证满足边界条件和初始条件来确认。\n\
    \n本章介绍的所有解都是针对瞬态井引起的水头变化，这允许在时间上叠加瞬态解，以及叠加稳定解和瞬态解。介绍了承压、无压、半承压和双层含水层系统中井的瞬态流解，包括从抽水试验估算含水层参数。最后两节涉及井筒储水和表皮效应的影响，以及双层含水层系统中的瞬态抽水。这些问题在拉普拉斯域中求解，物理域中的解通过数值反变换获得。\n\
    \n## 9.1 承压和无压含水层中的井\n\n本节介绍了一个在具有恒定导水系数 $T$ 和储水系数 $S$ 的含水层中，井的瞬态流解。控制微分方程是 (9.5)。井在时间\
    \ $t = t_0$ 时开始以流量 $Q$ 抽水。井处的边界条件近似为（类似于边界条件 (6.24)）\n\n$$\\lim_{r \\to 0} -2\\\
    pi r Q_r = Q \\quad t \\ge t_0$$\n\n最初，由瞬态井引起的含水层中的水头变化当然等于零\n\n$$h|_{r,t=t_0}\
    \ = 0$$\n\n第二个边界条件是，井在无穷远处引起的水头变化在所有时间都为零\n\n$$h|_{r=\\infty,t} = 0$$\n\n水头的解是距井的径向距离\
    \ $r$ 和时间的函数，被称为泰斯解（Theis, 1935）\n\n$$h = -\\frac{Q}{4\\pi T} \\mathrm{E}_1(u)\
    \ \\quad t \\ge t_0$$\n\n其中\n\n$$u = \\frac{Sr^2}{4T(t - t_0)}$$\n\n$\\mathrm{E}_1$\
    \ 是指数积分，定义为\n\n$$\\mathrm{E}_1(u) = \\int_u^\\infty \\frac{\\exp(-s)}{s} ds$$\n\
    \n水头在井开始抽水后开始下降。水头的下降也称为降深。因此，例如，1米的降深意味着 $h = -1$ 米。水头仅是无量纲参数 $u$ 的函数。因此，如果在抽水时间\
    \ $\\Delta t_1$ 后，在距离 $r_1$ 处达到某个降深，那么在抽水时间 $4\\Delta t_1$ 后，在距离 $2r_1$ 处将达到相同的降深，因为时间和径向距离的这两种组合导致相同的\
    \ $u$ 值\n\n$$u = \\frac{Sr_1^2}{4T\\Delta t_1} = \\frac{S(2r_1)^2}{4T(4\\Delta\
    \ t_1)}$$\n\n**练习 9.1：** 一口井在承压含水层中于时间 $t = 0$ 开始抽水。抽水1天后，在距井 $r_1 = 20$ 米处降深为1米。计算在抽水开始后多少时间（以天计），在距井\
    \ $r_2 = 60$ 米处降深为1米。\n\n**练习 9.2：** 考虑一口流量为 $Q = 300$ m$^3$/d 的井，位于导水系数 $T =\
    \ 500$ m$^2$/d、储水系数 $S = 0.2$ 的承压含水层中。抽水1天后，距井多远处降深为0.2米？提示：使用 `scipy.optimize`\
    \ 的 `fsolve` 函数。\n\n**练习 9.3：** 考虑一口流量为 $Q = 300$ m$^3$/d、半径为 $r_w = 0.3$ 米的井。该井在\
    \ $T = 500$ m$^2$/d、$S = 0.2$ 的含水层中已抽水1天。通过使用 `scipy.integrate` 的数值积分函数计算积分 $\\\
    int_{r_w}^{\\infty} Sh 2\\pi r dr$，计算从储水中移除的水量。将你的答案与井从含水层中移除的总水量进行比较。\n\n函数 $E_1$\
    \ 可以从 `scipy.special` 包中作为 `exp1` 获得，但也存在一个级数表示，这对于评估极限情况（例如，大时间）很有用。级数表示为（例如，Abramowitz\
    \ and Stegun, 1965）\n\n$$E_1(u) = -\\gamma - \\ln u - \\sum_{n=1}^{\\infty} \\\
    frac{(-u)^n}{n \\cdot n!}$$\n\n其中 $\\gamma = 0.5772...$ 是欧拉常数，可以从 `numpy` 中作为\
    \ `euler_gamma` 获得。当 $u < 1$ 时，$E_1$ 的级数收敛很快。当 $u$ 较小时，只需要前两项，此时水头的公式可以近似为\n\n\
    $$h \\approx \\frac{Q}{4\\pi T} \\left[ \\gamma + \\ln \\left( \\frac{Sr^2}{4T(t\
    \ - t_0)} \\right) \\right] \\quad u < 0.1$$\n\n请注意，当 $r$ 较小或 $t$ 较大，或两者兼有时，$u$\
    \ 较小。\n\n井内的水头通过在井半径 $r_w$ 处计算泰斯解得到。图9.1的图中显示了四条曲线：井内水头 $h_w$、$r = 20$ 米处的水头 $h_{20}$、差值\
    \ $h_w - h_{20}$，以及使用近似公式 (9.14) 计算的水头 $h_{20}$。时间轴在左图中是线性的，在右图中是对数刻度的。对于这种情况，在\
