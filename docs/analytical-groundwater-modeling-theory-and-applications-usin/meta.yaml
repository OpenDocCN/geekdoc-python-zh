    \ = 0.3 \\text{ m}$，$h_0 = 10 \\text{ m}$。\n\n## 6.3 靠近非均质边界的井\n\n含水层的水力性质在整个含水层中总会有些变化。表示含水层性质变化的一种常见方法是将含水层划分为具有不同但均质性质的区域；每个区域称为一个非均质体。在非均质体内部，含水层的水力传导系数、底板高程和/或厚度可能与周围不同。因此，含水层的导水系数被称为分段常数。\n\
    \n非均质边界处的边界条件是，水头和流量的法向分量在边界两侧连续。因此，平行于非均质边界的流量分量会发生跳跃。这是水头连续条件的直接结果。例如，考虑一个沿\
    \ $y$ 轴的非均质边界，如图 6.10 所示。边界左侧的导水系数为 $T_L$，右侧的导水系数为 $T_R$。非均质边界两侧的水头相同，这意味着水头梯度\
    \ $\\partial h/\\partial y$ 在边界两侧也是连续的。因此，平行于边界的流量向量分量，在本例中为 $Q_y$，在边界左侧为 $Q_y^-\
    \ = -T_L \\partial h/\\partial y$，在边界右侧为 $Q_y^+ = -T_R \\partial h/\\partial y$。平行于非均质边界的流量分量的跳跃被称为剪切流。\n\
    \n当流线穿过非均质边界时，其方向会发生突变。这是边界上剪切流的直接结果。例如，考虑图 6.10 中 $y$ 轴上非均质边界上的一个点。边界左侧的流量为 $(Q_x^-,\
    \ Q_y^-)$，右侧的流量为 $(Q_x^+, Q_y^+)$。$\\vec{Q}^-$ 与边界法线之间的夹角 $\\theta^-$ 为\n\n$$\\\
    tan(\\theta^-) = Q_y^- / Q_x^- \\qquad (6.46)$$\n\n类似地，$\\vec{Q}^+$ 与边界法线之间的夹角\
    \ $\\theta^+$ 为\n\n$$\\tan(\\theta^+) = Q_y^+ / Q_x^+ \\qquad (6.47)$$\n\n由于 $Q_x^-\
    \ = Q_x^+$，可得\n\n$$\\frac{\\tan(\\theta^-)}{\\tan(\\theta^+)} = \\frac{T_L}{T_R}\
    \ \\qquad (6.48)$$\n\n这意味着当水流从高导水系数区域流向低导水系数区域（$T_R < T_L$，如图 6.10 所示）时，流量向量与边界法线之间的夹角减小。可以说流量向量向法线方向折射。\n\
