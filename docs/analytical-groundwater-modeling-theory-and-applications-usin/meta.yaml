    \n## 8.2 用于模拟河流和溪流的线汇\n\n抽水井有时被称为点汇，因为它们在一点取水（完全贯穿井在整个含水层厚度上取水，这在二维水平面上是一个点）。线汇沿一条线段取水，可用于模拟地下水流入或流出狭窄河流、溪流或运河的河段。上一节开发的解析单元代码被扩展以包含线汇。运行本节示例需要上一节定义的所有解析单元类`Model`、`Element`、`HeadEquation`、`Constant`、`UniformFlow`、`Well`和`HeadWell`。\n\
    \n具有均匀流入的线汇的复势可以通过沿一条线对点汇（井）的复势进行积分得到，这给出（例如，Strack, 2017）\n\n$$\\Omega = \\frac{\\\
    sigma L}{4\\pi}[(Z + 1) \\ln(Z + 1) - (Z - 1) \\ln(Z - 1)]$$ (8.8)\n\n其中$\\sigma$是线汇的流入量（线汇单位长度的流量，从含水层取水时为正），$L$是线汇的长度，$Z$定义为\n\
    \n$$Z = \\frac{2\\zeta - (\\zeta_0 + \\zeta_1)}{\\zeta_1 - \\zeta_0}$$ (8.9)\n\
    \n其中$\\zeta$是复坐标，$\\zeta_0$和$\\zeta_1$是线汇端点的复坐标。注意在$\\zeta = \\zeta_0$处$Z = -1$，在$\\\
    zeta = \\zeta_1$处$Z = +1$。线汇的总流量$Q$为$Q = \\sigma L$。\n\n线汇被添加到第8.1节开发的井和均匀流的解析单元代码中。输入参数是添加该单元的模型、端点的坐标和流入量$\\\
    sigma$。`LineSink`类有一个函数：`omegainf`函数，它实现了$\\sigma = 1$时的公式(8.8)。线汇的复势在端点处是奇异的，其中变量$Z$等于$-1$或$+1$，但流量势是有限的\n\
    \n$$\\lim_{Z \\to -1} (Z + 1) \\ln(Z + 1) = \\lim_{Z \\to 1} (Z - 1) \\ln(Z -\
    \ 1) = 0$$ (8.10)\n\n当$(Z - 1)$或$(Z + 1)$的绝对值小于$10^{-12}$时，在下面的代码中使用`np.where`函数将其值设置为$10^{-12}$。\n\
    \n```python\nclass LineSink(Element):\n\n    def __init__(self, model, x0=0, y0=0,\
    \ x1=1, y1=1, sigma=1):\n        Element.__init__(self, model, sigma)\n      \
    \  self.z0 = x0 + y0 * 1j\n        self.z1 = x1 + y1 * 1j\n        self.L = np.abs(self.z1\
    \ - self.z0)\n\n    def omegainf(self, x, y):\n        zeta = x + y * 1j\n   \
    \     Z = (2 * zeta - (self.z0 + self.z1)) / (self.z1 - self.z0)\n        Zp1\
    \ = np.where(np.abs(Z + 1) < 1e-12, 1e-12, Z + 1)\n        Zm1 = np.where(np.abs(Z\
    \ - 1) < 1e-12, 1e-12, Z - 1)\n        return self.L / (4 * np.pi) * (Zp1 * np.log(Zp1)\
    \ - Zm1 * np.log(Zm1))\n```\n\n作为第一个示例，计算并绘制了单个线汇的流网，如图8.3的左图所示。分支切割从线汇的第一个点开始，并沿与线汇相同的方向延伸到无穷远。沿水头的变化绘制在图8.3的右图中。\n\
    \n```python\n# parameters and model\nml = Model(T=100) # transmissivity, m^2/d\n\
    ls1 = LineSink(ml, x0=-200, y0=-150, x1=200, y1=150, sigma=0.1) # sigma, m^2/d\n\
    ```\n\n```python\n# solution\nxg, yg = np.meshgrid(np.linspace(-400, 400, 100),\
    \ np.linspace(-300, 300, 100))\nh = ml.head(xg, yg)\npsi = ml.streamfunction(xg,\
    \ yg)\nxs, ys = np.linspace(-200, 200, 100), np.linspace(-150, 150, 100)\nhs =\
    \ ml.head(xs, ys) # head along line-sink\n```\n\n```python\n# basic plot\nplt.subplot(121,\
    \ aspect=1)\nplt.contour(xg, yg, h, 10)\nplt.contour(xg, yg, psi, 20)\nplt.plot([-200,\
    \ 200], [-150, 150], 'k')\nplt.subplot(122)\nplt.plot(np.sqrt((xs + 200) **2 +\
    \ (ys + 150) ** 2), hs);\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_161_0.png)\n\
    \n流入量沿一条线汇是均匀的，这导致水头沿线汇变化（图8.3的右图）。这意味着具有均匀水头的有限沟渠不能用单个均匀流入的线汇来模拟。这样的沟渠必须用一串多个线汇来模拟，因为沟渠两端附近的流入量大于沟渠中部的流入量。\n\
    \n线汇的自由参数是线汇单位长度的流入量$\\sigma$。当线汇用于模拟地表水特征的河段时，流入量（流出时为负）可以从指定水头条件计算。这里，水头在线汇的中心（配置点）处指定。在下面的代码中，`HeadLineSink`类派生自`LineSink`和`HeadEquation`类。输入参数是添加该单元的模型、端点的坐标和线汇中心指定的水头。与所有指定水头的单元一样，配置点的位置存储为`xc`和`yc`，配置点的势存储为`pc`。未知数的数量设置为1。\n\
    \n```python\nclass HeadLineSink(LineSink, HeadEquation):\n\n    def __init__(self,\
    \ model, x0=0, y0=0, x1=1, y1=1, hc=1):\n        LineSink.__init__(self, model,\
    \ x0, y0, x1, y1, 0)\n        self.xc = 0.5 * (x0 + x1)\n        self.yc = 0.5\
    \ * (y0 + y1)\n        self.pc = self.model.T * hc\n        self.nunknowns = 1\n\
    ```\n\n一串线汇可用于模拟狭窄的河流或溪流。溪流需要根据三个标准细分为线汇：线汇串必须代表溪流的几何形状，并且线汇必须足够短以模拟河流水位的变化以及沿溪流的流入或流出变化。回想一下，每个线汇的流入量是均匀的。在当前指定水头线汇的实现中，含水层中的水头被设置为等于线汇中心指定的水头，这意味着含水层与溪流直接接触。或者，可以通过指定第7.4节的条件(7.34)来考虑透水河床的阻力，但这超出了本书的范围（例如，参见Haitjema,\
    \ 1995）。\n\n作为弯曲溪流的示例，考虑一口井在蜿蜒的溪流附近抽水。溪流用围绕x轴的正弦函数近似为$y = 50 \\sin(\\pi x/400)$。一个指定水头井位于$(x,\
    \ y) = (0, 100)$，其水头比河流水头低2 m。在$(x, y) = (0, 1000)$处，水头固定为比河流水位高2 m。从$x = -1600$\
    \ m到$x = 1600$ m的一段溪流被模拟，这在井的左右两侧足够远，以至于进一步延伸不会显著影响井周围区域的水头。靠近井的溪流使用长度为50 m的较短线汇表示，而较远的地方使用长度为200\
    \ m的较长线汇。所有其他参数在下面的脚本中给出。整个模型的水头等值线图如图8.4的左图所示，而井周围区域的等值线图如图8.4的右图所示。\n\n```python\n\
    # parameters and model\nhriver = 10 # head in river, m\nml = Model(T=100) # transmissivity,\
