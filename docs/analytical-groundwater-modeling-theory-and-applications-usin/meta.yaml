    text{tip}}$$\n\nFinally, application of boundary condition (4.40) gives\n\n$$x_{\\\
    text{tip}} = (18k\\alpha c^2 U)^{1/3}$$\n\nNote that this means that the outflow\
    \ zone has a finite length and depends on the parameters of the aquifer and leaky\
    \ layer, the density difference, and the total outflow into the sea. This is contrary\
    \ to regular semi-confined flow (no interface), where the outflow zone is theoretically\
    \ infinitely long and 95% of the water leaks through the semi-confining layer\
