    depth of 10 m below the top of the piezometer and records an absolute pressure
    of $p_{\text{abs}} = 180$ kPa. The piezometer is filled with freshwater with a
    density $\rho = 1000$ kg/m$^3$. The atmospheric pressure is measured to be 101
    kPa. Use $g = 9.8$ m/s$^2$. Compute the head in the well.


    # 0.2 Darcy''s experiment


    In 1856, the French engineer Henry Darcy published the results of a series of
    experiments on the flow of water through a column packed with different kinds
    of sand (Darcy, 1856). The experiments consisted of a soil column of length $L$
    and cross-sectional area $A$ (Figure 0.2). Darcy measured the discharge $Q$ through
    the column and the difference $\Delta h$ in the head of the water between two
    measurement ports.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_18_1.png)


    The experiments revealed that there is a linear relationship between the discharge
    $Q$ through the soil column and the hydraulic head drop $\Delta h$ over distance
    $L$, which can be expressed as


    $$Q = kA \frac{\Delta h}{L}$$


    The proportionality constant $k$ was introduced because the relationship between
    the discharge and the head gradient differed between types of sand. Nowadays,
    $k$ is known as the hydraulic conductivity, which has the dimensions L/T. Darcy''s
    law is not a physical law, but an empirical relation. It became known as a law
    because it performs remarkably well over a large range of flow conditions.


    # 0.3 Representative elementary volume


    Water particles move through small openings in the subsurface, along convoluted
    pathways caused by the irregular shape of the pore space. The simulation of groundwater
    flow at this microscopic scale requires knowledge of the three-dimensional shape
    of the entire pore space,'
  merge: -1
  pgno: 18
- img_proc: true
  md: 'which is not feasible. A different approach is required for larger spatial
    scales, called the macroscopic scale. At the macroscopic scale, the net movement
    of groundwater through the subsurface is approximated using parameters that are
    a representative average of the behavior at the microscopic scale. This is what
    Darcy established empirically: The friction and viscous forces that work against
    the flow of water are captured by the hydraulic conductivity $k$. This parameter
    thus represents the effective action of the processes at the microscopic scale,
    without detailed knowledge of the pore geometry at this scale.


    The variables for the macroscopic description of groundwater flow are associated
    with a spatial scale that is representative of the system considered. The volume
    for which a macroscopic property is valid is called the representative elementary
    volume (REV). The REV must not be too small, because it will not form a representative
    average. In the extreme, an REV smaller than the size of a pore or soil particle
    either represents an opening between soil particles or a soil particle itself,
    but not the average of many of these combined. The size of an REV must therefore
    exceed a multiple of the representative pore size. Conversely, an REV must not
    be too large either as it may no longer be suited to resolve the spatial variability
    of the subsurface at the macroscopic level. If the properties of the subsurface
    vary over a few meters, the REV must be significantly smaller than a few meters
    to capture this variability in a model. The REV relevant to practical groundwater
    problems varies. For unconsolidated sands, with a pore and grain size on the order
    of tenths of a millimeter, an REV of a few centimeters already captures the average
    behavior.


    # 0.4 Hydraulic conductivity and porosity


    The hydraulic conductivity $k$ is a measure of how easy a fluid can flow through
    the subsurface. The hydraulic conductivity is not just a property of the subsurface,
    but also a property of the fluid that flows through the subsurface and may be
    written as


    $$k = \frac{\kappa \rho g}{\mu}$$


    where $\kappa$ [L$^2$] is the intrinsic permeability that depends on the porous
    medium, while the density, $\rho$, and the dynamic viscosity, $\mu$ [M/L/T], are
    properties of the fluid that flows through the subsurface. This means that warmer
    water will have a higher hydraulic conductivity than colder water, even when it
    flows through the same subsurface, as the viscosity of warmer water is smaller
    than the viscosity of colder water. Typical values of the hydraulic conductivity
    of water through different materials are presented in Table 0.1.


    Table 0.1 Hydraulic conductivity ranges of different materials


    | Material | $k$ (m/d) |

    | :--- | :--- |

    | Clay | < 0.0001 |

    | Sandy clay | 0.0001 – 0.001 |

    | Peat | 0.0001 – 0.01 |

    | Silt | 0.001 – 0.01 |

    | Very fine sand | 0.1 – 1 |

    | Fine sand | 1 – 10 |

    | Coarse sand | 10 – 100 |

    | Sand with gravel | 100 – 1000 |

    | Gravel | > 1000 |


    Source: Modified from Verruijt (1970).'
  merge: -1
  pgno: 19
- img_proc: true
  md: 'The porosity, $n$, of the subsurface is defined as the ratio of the volume
    of pores, $V_p$, to the total volume, $V_t$.


    $$n = \frac{V_p}{V_t}$$


    The porosity does not appear in the equation for the hydraulic conductivity (Eq.
    0.4), but the intrinsic permeability $\kappa$ depends on the characteristics of
    the subsurface, including the pore volume, the pore size distribution, the connectivity
    between pores, the shape of the pores, and the roughness of the subsurface material.
    The porosity therefore partially determines the intrinsic permeability $\kappa$
    and thus indirectly influences $k$ as well.


    **Exercise 0.2:** Compute the hydraulic conductivity (in m/d) of freshwater flowing
    through sand in winter when the infiltrating water has a temperature of $5^\circ\text{C}$
    and in summer when the infiltrating water has a temperature of $20^\circ\text{C}$.
    Given: $\kappa = 2 \cdot 10^{-11}\text{ m}^2$, $\mu = 1.5 \cdot 10^{-3}\text{
    Ns/m}^2$ at $5^\circ\text{C}$, and $\mu = 1 \cdot 10^{-3}\text{ Ns/m}^2$ at $20^\circ\text{C}$.


    # 0.5 Aquifers and aquitards


    The subsurface consists of layers of varying permeability. The permeable layers
    are referred to as aquifers. Sediments such as sand or gravel tend to form good
    aquifers, as their pores are relatively wide and well connected, so that water
    can flow with relative ease. Layers with a lower permeability are called aquitards,
    leaky layers, or semi-confining layers. Truly impermeable layers do not exist
    in nature, but if the hydraulic conductivity is so low that flow through them
    is negligible, they are sometimes called aquicludes or confining layers.


    ![](img/ca724f426a6249bf916ffe68c7fbe382_20_0.png)


    An aquifer is unconfined when the saturated domain is bounded at the top by the
    water table, also called the phreatic surface (Figure 0.3). Confined aquifers
    are separated from other aquifers, or the land surface, by an aquitard. Flow is
    referred to as confined when the head is above the top of the aquifer (Figure
    0.3). The head in confined aquifers can drop below the top of the aquifer, resulting
    in unconfined flow (see Section 3.3). Artesian conditions exist when the head
    in a confined aquifer is higher than the elevation of the land surface, which
    means that groundwater flows freely to the surface if a well is installed, without
    the need for a pump.


    In systems consisting of multiple aquifers separated by aquitards, groundwater
    may move from one aquifer to another through aquitards. This is referred to as
    multi-aquifer or inter-aquifer flow. Flow in aquitards can often be approximated
    as vertical. The larger the thickness of an aquitard, the more difficult it is
    for water to flow across it. The ratio of the thickness of an aquitard to its
    vertical hydraulic conductivity is called the hydraulic resistance and is a measure
    of the (im)permeability of a leaky layer. Flow in aquifers tends to be predominantly
    horizontal. The larger the thickness of an aquifer, the more water it can transmit.
    The ability'
  merge: -1
  pgno: 20
- img_proc: true
  md: 'of an aquifer to transmit water in the horizontal direction is called the transmissivity,
    which is the product of the hydraulic conductivity and the aquifer thickness.


    A groundwater modeler must always decide about the base of the groundwater flow
    system, which is commonly formed by a low-permeable layer that leaks so little
    water that it can be neglected for the problem of interest. While it is common
    to refer to the bottom of the system as the impermeable base, it must be realized
    that there is always some exchange of water across the bottom boundary of the
    system considered. Ideally, a confining unit can be defined that serves as the
    base of the model, and in this case, a better term for the base of the model is
    the basal aquitard. For very thick aquifer systems (like in sedimentary basins
    and deltas, which can be many kilometers deep), this is not always feasible, and
    a pragmatic choice must be made.


    # 0.6 Storage and transient flow


    When there are no significant changes in head (and thus flow) through time, the
    flow is said to be steady. Analyses of steady flow are appropriate when long-term,
    average conditions are of interest, for example for the delineation of wellhead
    protection areas for water supply wells, or when an end situation is of interest,
    as for the dewatering of an aquifer for a construction project. When the heads
    do not change with time, the storage volume remains constant in time, which implies
    that the inflow and outflow of water are equal in the system considered.


    In reality, groundwater flow is always transient. Transient flow occurs because
    boundary conditions and system stresses change through time, for example changing
    aquifer recharge, changing river levels, or varying pumping rates of wells. A
    specific application of transient flow analysis is the evaluation of aquifer properties
    by induced stresses, such as pumping tests.


    The storage in an unconfined aquifer increases when the water table rises. As
    an example, consider a column within an unconfined aquifer with constant horizontal
    cross-sectional surface area $A$. When the water table is raised $\Delta h$, the
    volume of water in the column increases by an amount


    $$\Delta V = SA\Delta h$$


    where $S$ [-] is the storativity or storage coefficient of the unconfined aquifer.
    When the porous medium above the water table is completely dry before the rise,
    the storativity of the unconfined aquifer is equal to the porosity. In reality,
    the storativity is always smaller than the porosity, as there is always soil water
    present above the water table. The storativity of an unconfined aquifer is referred
    to as the phreatic storage coefficient or the more cryptic specific yield and
    is represented by the variable $S_p$. Typical values of the phreatic storage for
    different materials are presented in Table 0.2.


    Storage in a confined aquifer is physically more complicated. In a confined aquifer,
    all pores are entirely filled with water. Additional water can nevertheless be
    stored through expansion of the pore space and, albeit only to a small extent,
    compression of the water. When the head


    Table 0.2 Phreatic storage of different materials


