  md: 'The head starts to decrease after the well starts pumping. The drop in head
    is also referred to as the drawdown. So a drawdown of, e.g., 1 m means that $h
    = -1$ m. The head is a function only of the dimensionless parameter $u$. Hence,
    if a certain drawdown is reached at a distance $r_1$ after a time period $\Delta
    t_1$ of pumping, the same drawdown is reached at a distance $2r_1$ after a time
    period $4\Delta t_1$ of pumping, as both combinations of time and radial distance
    result in the same value of $u$


    $$u = \frac{Sr_1^2}{4T\Delta t_1} = \frac{S(2r_1)^2}{4T(4\Delta t_1)}$$


    **Exercise 9.1:** A well starts pumping at time $t = 0$ in a confined aquifer.
    After 1 day of pumping, the drawdown is 1 m at a distance of $r_1 = 20$ m from
    the well. Compute at what time (in days) after pumping started the drawdown is
    1 m at a distance of $r_2 = 60$ m from the well.


    **Exercise 9.2:** Consider a well with discharge $Q = 300$ m$^3$/d that is screened
    in a confined aquifer with transmissivity $T = 500$ m$^2$/d and storage coefficient
    $S = 0.2$. At what distance from the well is the drawdown 0.2 m after 1 day of
    pumping? Hint: use the `fsolve` function of `scipy.optimize`.


    **Exercise 9.3:** Consider a well with discharge $Q = 300$ m$^3$/d and radius
    $r_w = 0.3$ m. The well has been pumping in an aquifer with $T = 500$ m$^2$/d
    and $S = 0.2$ for 1 day. Compute the water removed from storage by evaluating
    the integral $\int_{r_w}^{\infty} Sh 2\pi r dr$ using a numerical integration
    function from `scipy.integrate`. Compare your answer to the total amount of water
    removed from the aquifer by the well.


    The function $E_1$ is available as `exp1` from the `scipy.special` package, but
    there also exists a series representation, which is useful for the evaluation
    of limiting cases (e.g., large time). The series representation is (e.g., Abramowitz
    and Stegun, 1965)


    $$E_1(u) = -\gamma - \ln u - \sum_{n=1}^{\infty} \frac{(-u)^n}{n \cdot n!}$$


    where $\gamma = 0.5772...$ is Euler''s constant, available from `numpy` as `euler_gamma`.
    The series for $E_1$ converges quickly when $u < 1$. Only the first two terms
    are needed when $u$ is small, in which case the formula for the head may be approximated
    as


    $$h \approx \frac{Q}{4\pi T} \left[ \gamma + \ln \left( \frac{Sr^2}{4T(t - t_0)}
    \right) \right] \quad u < 0.1$$


    Note that $u$ is small when $r$ is small or when $t$ is large, or both.


    The head inside the well is computed by evaluating the Theis solution at the well
    radius $r_w$. Four curves are shown in the graphs of Figure 9.1: the head $h_w$
    inside the well, the head $h_{20}$ at $r = 20$ m, the difference $h_w - h_{20}$,
    and the head $h_{20}$ computed with the approximate formula (9.14). The time axis
    is linear in the left graph and log-scaled in the right graph. The difference
    $h_w - h_{20}$ becomes constant after $\sim 0.01$ d for this case. The approximate
    formula results in a straight line in the graph with a log-scaled time axis, as
    can also be seen from Eq. (9.14). The approximate formula gives good results for
    $u < 0.1$, which corresponds to $t > 0.01$ d for this case and at this location.


    ```

    # parameters

    T = 200 # transmissivity, m^2/d

    S = 2E-3 # storage coefficient, -

    rw = 0.3 # radius of well, m

    ```'
