    ```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_186_0.png)\n\n图 9.9 双含水层系统中底部含水层抽水井附近观测井的降深。顶部含水层为无压含水层；线性时间轴（左）和对数时间轴（右）。\n\
    \n# 第 10 章\n\n## 垂直平面内的稳态二维流\n\n到目前为止，本书中的解都是基于 Dupuit 近似推导的。这意味着忽略了含水层中垂直方向的流动阻力。因此，水头在垂直方向上没有变化。含水层内部的垂直流动分量是根据流动连续性计算的。对于许多以水平流动为主的地下水问题，这是一个非常好的近似。但是，当然存在一些流动情况，其中含水层中的垂直流动确实起着重要作用。此类问题可能包括流向部分贯穿的河流或井的流动、顶部或底部不规则的含水层中的流动，以及流向湖泊或海洋底部的流动。对于此类问题，就会出现\
