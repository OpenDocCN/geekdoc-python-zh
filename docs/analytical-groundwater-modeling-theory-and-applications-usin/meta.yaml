    \ < 0$），这导致在含水层底部出现一个滞点。对于情况 2，右侧的水流远离河流，但流量不大（$0 \\leq U_R \\leq \\lambda U_L$）。结果，只有部分从左侧流向河流的水被河流捕获，其余部分则从河流下方流向右侧。在含水层顶部存在一个滞点，并且水在整个河流边界上流入河流。对于情况\
