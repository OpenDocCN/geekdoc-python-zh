  md: "```\nfor j in range(int((k + 1) / 2), min(k, M2) + 1):\n    z[j] = j ** M2\
    \ * fac(2 * j) / \\n           (fac(M2 - j) * fac(j) * fac(j - 1) * fac(k - j)\
    \ * fac(2 * j - k))\nV[k - 1] = (-1) ** (k + M2) * np.sum(z)\nreturn V\n```\n\n\
    The Stehfest algorithm (5.57) is implemented in the routine below. The first two\
    \ input arguments are the $x$ locations and times $t$ for which the function is\
    \ computed. Both input arguments $x$ and $t$ may be arrays. The next input argument\
    \ is a Python implementation of the Laplace-transformed function that can be called\
    \ as `func(p, x, keyword_arguments)`, where `keyword_arguments` can be an arbitrary\
    \ number of keyword arguments. The next input argument is the keyword argument\
    \ $M = 12$, which is the default number of terms used in the Stehfest algorithm.\
    \ Finally, an arbitrary number of keyword arguments may be supplied. These keyword\
    \ arguments are passed to the function `func` of the Laplace-transformed solution\
    \ (the `keyword_arguments` mentioned above). The `stehfest` function returns a\
    \ two-dimensional array with shape (`len(x)`, `len(t)`). Note that the parameters\
    \ $V_k$ are only a function of $M$, so they are computed only once. The Laplace\
    \ parameters $p_k$ must be computed separately for each time with Eq. (5.58).\n\
    \n```\n# Stehfest algorithm\ndef stehfest(x, t, func, M=12, **kwargs):\n    t\
    \ = np.atleast_1d(t)\n    x = np.atleast_1d(x)\n    f = np.zeros((len(x), len(t)))\n\
    \    V = stehfest_coef(M)\n    for i in range(len(t)):\n        p = np.arange(1,\
    \ M + 1) * np.log(2) / t[i]\n        for j in range(len(x)):\n            fbar\
    \ = func(p, x[j], **kwargs)\n            f[j, i] = np.log(2) / t[i] * np.sum(V\
    \ * fbar)\n    return f\n```\n\nIn the code blocks that follow, the transient\
    \ problem of Section 5.1 (the groundwater response to a change $\\Delta h$ in\
    \ the river stage in a semi-infinite confined aquifer) is resolved using Laplace\
    \ transforms. The differential equation in the Laplace domain is (5.55), and the\
    \ boundary conditions are\n\n$$\\bar{h}|_{x=0} = \\frac{\\Delta h}{p}$$\n\n$$\\\
    bar{h}|_{x\\to\\infty} = 0$$\n\nMathematically, this is the same as the problem\
    \ solved in Section 2.1. The solution is\n\n$$\\bar{h} = \\frac{\\Delta h}{p}\
    \ \\exp(-x\\sqrt{pS/T})$$\n\nThe solution in the time domain is obtained with\
    \ the Stehfest algorithm, and the Stehfest solution is compared to the exact solution.\n\
    \n```\n# parameters\nT = 100 # transmissivity, m^2/d\nS = 0.2 # storage coefficient,\
    \ -\ndelh = 2 # increase in river level, m\n```\n\n```\n# Laplace-transformed\
    \ solution\ndef hbar(p, x, T=100, S=1e-3, delh=2):\n    return delh / p * np.exp(-x\
    \ * np.sqrt(p * S / T))\n```"
