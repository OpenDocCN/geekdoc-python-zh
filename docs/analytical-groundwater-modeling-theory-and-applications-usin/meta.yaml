    It is common practice to draw contours of the head and streamlines on the same
    plot, as they form what is called a flow net where the streamlines cross the head
    contours at right angles, as will be demonstrated for two-dimensional solutions
    in later chapters. This is only the case when the hydraulic conductivity is isotropic.
    Here, the solution for flow in the vertical plane is based on the Dupuit–Forchheimer
    approximation, which is equivalent to the case where the vertical hydraulic conductivity
    is much larger than the horizontal hydraulic conductivity so that the head contours
    and streamlines don’t form a flow net.


