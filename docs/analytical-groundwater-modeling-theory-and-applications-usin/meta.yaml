  md: "upfront. The real constant $C$ is also a priori unknown and is computed from\
    \ a specified-head condition. The transmissivity is approximated as constant throughout\
    \ the model.\n\nThe analytic element code is developed using object-oriented programming;\
    \ an introduction to object-oriented programming for Python may be found in, e.g.,\
    \ Lutz (2013). The analytic element code consists of a `Model` class and a number\
    \ of `Element` classes. The `Model` class stores the transmissivity of the aquifer\
    \ and a Python list called `elements` which contains all the elements in the model;\
    \ the `element` list is initially empty. The `Model` class has a function `omega`\
    \ to compute the complex potential at a point caused by all analytic elements\
    \ in the model (Eq. 8.1). In addition, the `Model` class has separate `potential`,\
    \ `streamfunction`, and `head` functions. Finally, the `Model` class has a `solve`\
    \ method, which computes the parameters of all head-specified elements in the\
    \ model. This function is included here, but will be explained later on.\n\n```\n\
    class Model:\n\n    def __init__(self, T):\n        self.T = T\n        self.elements\
    \ = [] # list of all elements\n\n    def omega(self, x, y):\n        omega = 0\
    \ + 0j\n        for e in self.elements:\n            omega += e.omega(x, y)\n\
    \        return omega\n\n    def potential(self, x, y):\n        return self.omega(x,\
    \ y).real\n\n    def streamfunction(self, x, y):\n        return self.omega(x,\
    \ y).imag\n\n    def head(self, x, y):\n        return self.potential(x, y) /\
    \ self.T\n\n    def solve(self):\n        esolve = [e for e in self.elements if\
    \ e.nunknowns == 1]\n        nunknowns = len(esolve)\n        matrix = np.zeros((nunknowns,\
    \ nunknowns))\n        rhs = np.zeros(nunknowns)\n        for irow in range(nunknowns):\n\
    \            matrix[irow], rhs[irow] = esolve[irow].equation()\n        solution\
    \ = np.linalg.solve(matrix, rhs)\n        for irow in range(nunknowns):\n    \
    \        esolve[irow].parameter = solution[irow]\n```\n\nThe `Element` class is\
    \ the base class of all analytic elements. It stores the model that the element\
    \ is added to, the value of the parameter (e.g., the discharge of a well), and\
    \ the number of unknown parameters of an element, which is zero by default, and\
    \ it adds the element to the specified model by adding it to the `elements` list\
    \ of the model. The `Element` class has three functions that are the same for\
    \ all elements: `omega`, `potential`, and `potinf`. The `omega` function computes\
    \ the complex potential of an element by returning the product of the influence\
    \ function `omegainf` of the element and the `parameter` of the element. Every\
    \ element must implement its own `omegainf`, the complex potential influence function,\
    \ which is the complex potential for the case that the parameter of the element\
    \ equals one. The `potential` function"
