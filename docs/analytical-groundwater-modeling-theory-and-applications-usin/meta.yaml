    \ Stehfest algorithm (Figure 9.6).\n\n```python\n# Laplace transform solution\n\
    from scipy.special import k0\ndef hbar(p, r, T, S, c, Q):\n    w = (S * c * p\
    \ + 1) / (c * T)\n    return -Q / (2 * np.pi * T * p) * k0(r * np.sqrt(w))\n\n\
    t = np.linspace(1e-3, 1, 100)\nh = stehfest(250, t, hbar, T=T, S=S, c=c, Q=Q)\
    \ # stehfest func from Section 5.4\nh_hantush = hantushvec(250, t, T, S, c, Q)\n\
    ```\n\n```python\n# basic plot\nplt.plot(t, h[0], label='Stehfest')\nplt.plot(t,\
    \ h_hantush, '--', label='Hantush')\nplt.legend();\n```\n\n![](img/ca724f426a6249bf916ffe68c7fbe382_180_0.png)\n\
