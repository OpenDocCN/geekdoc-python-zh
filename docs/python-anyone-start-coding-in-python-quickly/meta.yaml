    \n遵循我们之前日常生活中的例子：\n\n```\nif it rains:\n    I will bring an umbrella with me\n\
    ```\n\n这可以很容易地转换为符合 Python 语法的形式：\n\n```\nif isRaining == True :\n    bringUmbrella\
    \ = True\n```\n\n关键字 if 后面的条件首先被求值，如果求值结果为 True，则属于此（if 分支）的语句被执行——即，通过上面显示的赋值语句将\
    \ bringUmbrella 设置为 True。在日常生活中，如前所述，这通常被描述为如果这样，那么那样。这是一种基于条件是否为真的决策类型。通常会涉及一些逻辑运算符来给我们真或假的评估，正如早期关于逻辑运算符的章节所见。\n\
    \n这是编码中的一项基本能力。我们在编程中几乎总是需要根据某些条件执行一些任务。因此，我们有了 if 语句的最基本形式，其中在待求值的条件末尾有一个冒号 :，如果条件为真，则要执行的语句是\
    \ if 语句后缩进的语句。\n\n如果你熟悉其他语言，通常会有某种分隔符来界定要执行的语句（例如，{ 在语句前，} 来关闭块。）在 Python 中，使用缩进代替，因此此\
    \ if 语句要执行的所有语句都在 if 语句后缩进一级。\n\n现在让我们看下面的一些示例：\n\n```\n>>> isRaining=True\n>>>\
    \ bringUmbrella=True\n>>> if isRaining :\n...     bringUmbrella=True\n...\n>>>\
    \ bringUmbrella\nTrue\n>>> bringUmbrella=False\n>>> isRaining=False\n>>> if isRaining\
    \ :\n...     bringUmbrella=True\n...\n>>> bringUmbrella\nFalse\n```\n\n如你所见，第一个示例使用了我们之前介绍\
    \ if 语句时开始的内容，其中检查 isRaining 是 True 还是 False，如果是 True，则将 True 赋值给 bringUmbrella。"
