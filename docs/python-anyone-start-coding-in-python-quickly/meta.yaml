    # Chapter 8 Functions


    # Define and use functions


    Function is used in many programming languages. In different languages it might
    be called subroutine, procedure, or some other name but it more or less serves
    the same purpose. A function performs some specific task and it may or may not
    return a value to the caller of the function. So while coding, there could be
    some functionality we need and it’s already coded in some library (module) or
    Python already has it built in for us, such as the len() function call which we
    used multiple times already; or maybe some functionality is needed in multiple
    places in our code so that instead of repeating the same group of statements again
    and again, we simply code it once as a function so that we can use it and call
    it multiple times.


    This way of coding is fundamental in computer programming languages. The concept
    is to code these “building blocks”, very similar in building construction, so
    that we can use them to form more complex structures. In computer science, this
    technique has its root in “divide and conquer”, in that simpler tasks are done
    in various functions, and they can be called later in more complex function codes
    - pretty much a layered approach to gradually build up the complexity of the software.
    But in each of these functions, once built, we don’t need to concern ourselves
    to its implementation details. We simply treat it as some component which we could
    use in our bigger architecture.


    So how do we define functions? It starts off with the keyword def followed by
    the name of the function. The function name in a way is like any variable name,
    as functions, just like variables, could be evaluated to be of some values, as
    we will see in a bit. Also like variable names, we should not use reserved keywords
    for function names (Python will let you use them but you will have to deal with
    the unexpected and mostly undesirable outcome – so better safe than sorry – just
    avoid them.) And of course, to make your code clear to viewers (including yourself),
    each of these names should be unique and, as much as possible, meaningful thus
    self-documenting.'
  - '[PAGE 120]


    After the keyword def and the name of the function, we have a pair of parentheses
    (). Inside the parentheses, there may be one or more arguments, which are values
    we pass into the function to be used inside the function body of statements. All
    of these forms the header of the function and it ends with a colon `:`. In the
    next line, with indentation, it starts the body of the function where we really
    define how the function should perform.


    Let''s look at some examples:


    ```

    >>>

    >>> import math

    >>>

    >>> def myMax ( inList ) :

    ...     maxItem = -math.inf

    ...     for item in inList :

    ...         if item > maxItem :

    ...             maxItem = item

    ...     return maxItem

    ...

    >>>

    >>> myMax ( [2, 10, 31, 5, -4, -18, 9, 25] )

    31

    >>>

    >>> def myMin ( inList ) :

    ...     minItem = math.inf

    ...     for item in inList :

    ...         if item < minItem :

    ...             minItem = item

    ...     return minItem

    ...

    >>> myMin ( [2, 10, 31, 5, -4, -18, 9, 25] )

    -18

    >>>

    ```


    As you can see, we start off with importing math module – if you are in the same
    Python session and that you had imported math module before, then you don’t need
    to do this again. We did it anyway just to make it clear and Python would not
    give error even if we had done it before in the same session.'
  - '[PAGE 121]


    So in the examples, we defined the myMax() function to find the max item in a
    list. Very similar to what we did before, only that now we coded it in a function
    and the return value of the function is the max item which we got out of the list
    which was passed into the function as argument. Similarly, myMin() returns the
    min item from the incoming list. The results are, of course, exactly like what
    we obtained before in earlier examples.


    # Parameters/Arguments


    In the two functions we just created, we are taking in a list of items to work
    on. Let’s use myMax() to illustrate: in the function header the variable inList
    is the parameter for this one-parameter function; and when we later called the
    function with the statement myMax ( [2, 10, 31, 5, -4, -18, 9, 25] ) , the list
    of items as a whole is considered the argument for the function call. There might
    be confusion to see these two terms used interchangeably, but the distinction
    is really based on where you are looking at the variable: if you are looking at
    it from the function, then it’s a one-parameter function with the parameter name
    inList ; whereas if you are looking at the calling statement, it’s calling the
    function myMax() with the list of items as the argument to the function.


    # Pass By Value/Reference?


    Now we saw how to pass arguments into functions as their parameters, we want to
    look into more details of how they are passed.


    In many programming languages, if when a function is called, there are two different
    ways to pass the arguments: pass by value, or pass by reference (sometimes they
    are described as call by value, or call by reference.) What is the difference
    between them? In call by value, the value of the argument is copied into the parameter
    of the function – thus whatever is done to the parameter has no effect on the
    value of the variable in the caller. Whereas in call by reference situation, the
    caller argument value could get modified in the callee (the function which is
    called) as the callee function has a direct reference (handle) of the argument.
    (This paragraph here describes the function calling intricacies of many programming
    languages, as contrasting to the'
  - '[PAGE 122]


    following paragraph which describes the function calling details in Python which
    uses a very different mechanism.)


    In the Python world, calling a function is known as call by object reference.
    So if the argument is a number or string or something that is immutable, then
    the value of the object cannot be modified (so in some sense like call by value
    as the value of the argument object is not changed.) Yet if the argument is a
    modifiable (mutable) object, then the effect is like call by reference since the
    value of the argument in the caller function could be modified in the callee function.


    So let’s look at two examples to demonstrate how Python handles the call by value
    vs. call by reference, or rather how Python call by object reference works:'
  - '[PAGE 123]


    ```

    >>> # call-by-value effect demo

    >>> myString = ''spam, egg''

    >>> def passString (inString) :

    ...     inString = ''spam, egg, ham''

    ...     print( ''In the function called: '', inString )

    ...

    >>> # calling the passString()

    >>> passString(myString)

    In the function called:  spam, egg, ham

    >>>

    >>> # myString value not changed

    >>> myString

    ''spam, egg''

    >>>

    >>> # call-by-reference effect demo

    >>> myList = [''spam'', ''egg'']

    >>> def passList (inList) :

    ...     inList.append(''ham'')

    ...     print( ''In the function called: '', inList )

    ...

    >>> # calling the passList()

    >>> passList(myList)

    In the function called:  [''spam'', ''egg'', ''ham'']

    >>>

    >>> # myList value is modified

    >>> myList

    [''spam'', ''egg'', ''ham'']

    >>>

    ```


    So we see that in the first example, a string literal is used as argument. Since
    string literal is immutable thus when it’s passed to the function passString(),
    its value is copied (a new instance is created, in object language lingo) and
    changed inside the function (here we only printed out the value after the modification
    – but as an exercise, you can certainly add a print statement before the modification
    to see the value passed in.) But the original argument value is not changed (it
    cannot be modified as it’s immutable.) Whereas in the second example, a list is
    used as argument. List is mutable in Python so when it’s passed'
  - '[PAGE 124]


    into the function passList() as an object reference, the original copy is used
    in the append() operation thus the value is changed as seen.


    So there you go. We have just looked at the details of passing variables from
    caller to callee. But in what we have just covered, an interesting concept was
    involved – in that a copy of the string literal object was created inside the
    function that gets called. And the local variable inString in the function passString()
    was used in the print() statement. So now let’s dive into the variable scope and
    then local variable vs. global variable a bit.


    # Scope


    What is the scope of a variable? The scope of a variable is where the variable
    could be accessed or where it is effective. Like in the previous example, the
    string literal was not modifiable thus a local copy was made and then gets modified.
    Thus the scope of this local copy is only inside the function passString(). On
    the other hand, when we are modifying the value of myList, although we used the
    variable inList, but it is an object reference to variable myList thus we are
    able to access this variable which is outside of the local scope of the function
    passList(). With this distinction, we are ready to look at a bit more of local
    vs. global variables in the following section.


    # Local/Global Variables


    What is a local variable? As seen in the previous section, the scope of a local
    variable is just inside the function where it is defined – although in the previous
    example, it’s not really explicitly declared but we will now look at some examples
    with explicit use of local variables vs. global variables:'
