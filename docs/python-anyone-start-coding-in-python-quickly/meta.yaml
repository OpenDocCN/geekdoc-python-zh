- md: "## Lists\n\nNow that we have string down pat, we are moving on to some Python\
    \ data structures. First let’s talk about lists which could be used as arrays,\
    \ which you might have seen in many other languages. And we will deal with the\
    \ difference between lists and arrays a bit later, as there is no built-in array\
    \ support in Python thus we are relying upon some library import as you will see\
    \ shortly down the road.\n\nNow back to list, like a string, a list is a sequence\
    \ of values. In a string, the values are characters; in a list, they can be any\
    \ type. The values in a list are called elements or sometimes items. A simple\
    \ way to create a list is to use the square brackets such as in the following\
    \ example:\n\n```\n>>>\n>>> myList=['spam', 'egg']\n>>> print(myList)\n['spam',\
    \ 'egg']\n>>>\n>>>\n```\n\nHow do we address the elements of a list? You guessed\
    \ it – use the same [] operator just as we did with strings. In fact, list can\
    \ be used to index into the characters of a string (note that character in Python\
    \ is actually considered as a string of size 1.) However, a distinction here to\
    \ be pointed out is that elements in a list are mutable, meaning, the elements\
    \ could be modified; as opposed to string where characters in it cannot be modified\
    \ (immutable as mentioned before.)\n\nHere are some examples showing accessing\
    \ the list elements, using the list we just built above:\n\n```\n>>>\n>>> print(myList[0])\n\
    spam\n>>> idx=1\n>>> print(myList[idx])\negg\n>>> print(myList[-1])\negg\n>>>\
    \ print(myList[2])\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nIndexError: list index out of range\n>>>\n```\n\nAs you can\
    \ see, we first used index 0, and then used some variable idx for the value of\
    \ the index. We then also used a negative index which will just be counted backwards\
    \ from the end of the list. And finally we used an index 2 which is too large\
    \ thus resulted in an IndexError – as there are only 2 elements at the index position\
    \ 0 and 1.\n\n## Arrays (Not Built-In)\n\nSo that’s list. There is something similar\
    \ to list, at least in some ways, and you might have seen it in other languages,\
    \ which is called array. Python actually does not have support of built-in array.\
    \ Contrary to some of the places you might see explanations of Python arrays,\
    \ but they are actually lists as we have just seen. But Python does have library\
    \ which you can import to support arrays. Just like the following examples show:\n\
    \n```\n>>> import array as arr\n>>> myArray = arr.array('i', [1, 2, 3])\n>>> print(myArray)\n\
    array('i', [1, 2, 3])\n>>> myArray[1]=0\n>>> print(myArray)\narray('i', [1, 0,\
    \ 3])\n>>> len(myArray)\n3\n>>>\n```\n\nAs you can see that we have imported the\
    \ array library (you can of course import some other library which supports array\
    \ data type.) We then created a variable myArray using the array() method from\
    \ the library to assign the 3 elements to it. In this example we then also made\
    \ some change to the 2nd element of the array and print it out again. And then\
    \ in the end, we used a len() method to tells us the length of the array – in\
    \ this case the length of myArray is 3, meaning there are 3 elements at the position\
    \ with indices 0, 1, and 2.\n\nPython has a set of built-in methods that you can\
    \ use on lists/arrays.\n\n| Method | Description |\n| :--- | :--- |\n| append()\
    \ | Adds an element at the end of the list |\n| clear() | Removes all the elements\
    \ from the list |\n| copy() | Returns a copy of the list |\n| count() | Returns\
    \ the number of elements with the specified value |\n| extend() | Add the elements\
    \ of a list (or any iterable), to the end of the current list |\n| index() | Returns\
    \ the index of the first element with the specified value |\n| insert() | Adds\
    \ an element at the specified position |\n| pop() | Removes the element at the\
    \ specified position |\n| remove() | Removes the first item with the specified\
    \ value |\n| reverse() | Reverses the order of the list |\n| sort() | Sorts the\
    \ list |\n\nSo now you might be wondering why we have both list and array – they\
    \ seem to be very similar if not just the same. Good observation. In fact, they\
    \ are very similar but not the same. The difference is a bit involved. They both\
    \ can be used to hold a sequence of items. However, as in the example we just\
    \ saw, when creating the myArray , we indicated that the type has to be integer\
    \ – indicated by the parameter ‘i’, whereas in lists, we never mentioned anything\
    \ about type. So yes, you probably guessed, type does not really matter to list\
    \ elements as you can see from the following example\n\n```\n>>> myList = [1,\
    \ 'a', 2, 'here should be character b']\n>>> print(myList)\n[1, 'a', 2, 'here\
    \ should be character b']\n>>> myList[3] = 'b'\n>>> print(myList)\n[1, 'a', 2,\
    \ 'b']\n>>> print(myArray)\narray('i', [1, 0, 3])\n>>> myArray[1]='a'\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError:\
    \ an integer is required (got type str)\n>>>\n```\n\nIn here, we have a list of\
    \ mixed-type elements of both integers and characters (even a string initially\
    \ before modification.) But when we try to modify an integer element of the array\
    \ to a character, we got an error message indicating TypeError.\n\nA major confusion\
    \ here could be that if instead of using myList as the variable name, I use myFakeArray\
    \ as the variable name and then I mix in different element types, thus wrongly\
    \ conclude that it's an array with mixed-type elements, as you might have seen\
    \ in many places. This is obviously a misconception and now that you have read\
    \ this book, you know better.\n\nThe following is a table of the type codes for\
    \ array from Python Software Foundation @Python.org\n\n| Type code | C Type |\
    \ Python Type | Minimum size in bytes | Notes |\n| :--- | :--- | :--- | :--- |\
    \ :--- |\n| 'b' | signed char | int | 1 | |\n| 'B' | unsigned char | int | 1 |\
    \ |\n| 'u' | wchar_t | Unicode character | 2 | (1) |\n| 'h' | signed short | int\
    \ | 2 | |\n| 'H' | unsigned short | int | 2 | |\n| 'i' | signed int | int | 2\
    \ | |\n| 'I' | unsigned int | int | 2 | |\n| 'l' | signed long | int | 4 | |\n\
    | 'L' | unsigned long | int | 4 | |\n| 'q' | signed long long | int | 8 | |\n\
    | 'Q' | unsigned long long | int | 8 | |\n| 'f' | float | float | 4 | |\n| 'd'\
    \ | double | float | 8 | |\n\nNotes: 1. It can be 16 bits or 32 bits depending\
    \ on the platform.\n\nYou might still be wondering why we have both list and array\
    \ as mentioned earlier that many coders/authors simply use list in place of array.\
    \ But there is a performance penalty if your intention is to have, like our example\
    \ earlier, all integer elements in an array – in this case, if you use list instead,\
    \ Python actually does not know that all elements are of the same type thus causing\
    \ some extra work which could have been avoided by the efficient array. Array\
    \ also stores all of its elements in contiguous memory locations which usually\
    \ also makes accessing elements efficient. (We will talk more about array efficiency\
    \ in the advanced Python Anyone, which succeeds this book, when we learned more\
    \ about some other data collection types. As there are other sequence data types\
    \ in Python such as sets and tuples among others which are useful in data science\
    \ but are not covered in this book.)\n\n## Exercises:\n\nMultiple Choice:\n\n\
    4.1 This is the first index in a list.\n\n- -1000\n- –1\n- 0\n- 1\n\n4.2 This\
    \ is the last index in a list.\n\n- -1\n- 0\n- 1000\n- The size of the list minus\
    \ one\n\n4.3 When using list followed by * operator and then an integer, what\
    \ does this operator * do?\n\n- multiplication\n- repetition\n- exponentiation\n\
    - Nothing\n\n4.4 This list method adds an item to the end of an existing list.\n\
    \n- add\n- add_to\n- follow\n- append\n\n4.5 Which method is used to remove an\
    \ item at a specific index in a list?\n\n- remove\n- delete\n- del\n- pop\n\n\
    4.6 This term refers to an individual item of a list.\n\n- Member\n- cell\n- element\n\
    - slot\n\n4.7 This is a number that identifies an item in a list.\n\n- identifier\n\
    - element\n- index\n- pointer\n\n4.8 Which function returns the length of a list?\n\
    \n- Length()"
  mdcn: "## 列表\n\n既然我们已经掌握了字符串，接下来我们来探讨一些Python的数据结构。首先让我们谈谈列表，它可以被用作数组，这在许多其他语言中你可能已经见过。我们稍后会讨论列表和数组之间的区别，因为Python没有内置的数组支持，所以我们需要依赖一些库导入，你很快就会看到。\n\
    \n现在回到列表，和字符串一样，列表是一个值的序列。在字符串中，值是字符；在列表中，值可以是任何类型。列表中的值被称为元素，有时也称为项。创建列表的一种简单方法是使用方括号，如下例所示：\n\
    \n```\n>>>\n>>> myList=['spam', 'egg']\n>>> print(myList)\n['spam', 'egg']\n>>>\n\
    >>>\n```\n\n我们如何访问列表的元素呢？你猜对了——使用与字符串相同的`[]`运算符。事实上，列表可以用来索引字符串的字符（注意，在Python中，字符实际上被视为大小为1的字符串。）然而，这里需要指出的一个区别是，列表中的元素是可变的，意味着元素可以被修改；而字符串中的字符则不能被修改（如前所述，是不可变的。）\n\
    \n以下是一些示例，展示如何访问列表元素，使用我们刚刚创建的列表：\n\n```\n>>>\n>>> print(myList[0])\nspam\n>>>\
    \ idx=1\n>>> print(myList[idx])\negg\n>>> print(myList[-1])\negg\n>>> print(myList[2])\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    IndexError: list index out of range\n>>>\n```\n\n如你所见，我们首先使用了索引0，然后使用了一个变量`idx`作为索引的值。接着我们还使用了一个负索引，它会从列表末尾开始倒数。最后我们使用了一个索引2，它太大了，因此导致了`IndexError`——因为只有索引位置0和1处有2个元素。\n\
    \n## 数组（非内置）\n\n以上就是列表。有一种与列表类似的东西，至少在某些方面相似，你可能在其他语言中见过，它被称为数组。Python实际上并不支持内置的数组。与你可能在某些地方看到的关于Python数组的解释相反，它们实际上就是我们刚刚看到的列表。但是Python确实有一个库可以导入来支持数组。就像下面的例子所示：\n\
    \n```\n>>> import array as arr\n>>> myArray = arr.array('i', [1, 2, 3])\n>>> print(myArray)\n\
    array('i', [1, 2, 3])\n>>> myArray[1]=0\n>>> print(myArray)\narray('i', [1, 0,\
