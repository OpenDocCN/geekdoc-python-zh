  md: '# Chapter 7 Repetition/Looping


    Now that we learned about conditional branching, we are taking on another big
    fundamental technique which helps us construct our coding logic, and that is looping.
    It repeats the same set of statements for multiple times. In each of the iteration,
    usually some counter is checked and modified to make sure that we are controlling
    how many times we are repeating through; sometimes we don’t use counters but we
    check for some exit condition to see if we stay in the loop.


    So first let’s look at some very simple example:


    ```

    >>>

    >>> counter = 5

    >>> while counter > 0 :

    ...     print(counter)

    ...     counter = counter - 1

    ...

    5

    4

    3

    2

    1

    >>>

    ```


    As you can see, we have a counter with a starting initial value of 5, and then
    we have this while loop which checks if the counter is greater than 0; if True
    , we will print the counter and decrement the counter by one (using counter =
    counter – 1 .) This code segment produced the next 5 lines of printout displaying
