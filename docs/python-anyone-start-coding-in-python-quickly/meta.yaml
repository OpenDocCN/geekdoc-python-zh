  mdcn: "## 无限循环\n\n如你所见，当输入行以 `#` 号开头时，我们使用 `continue` 语句“跳”到当前迭代的末尾，从而跳过 `print()`\
    \ 语句。否则，根据代码逻辑，每一行输入都会被重复打印出来。\n\n```python\n>>> while True :\n...     inputLine\
    \ = input()\n...     if inputLine == 'exit' :\n...         break\n...     if inputLine[0]\
    \ == '#' :\n...         continue\n...     print(inputLine)\n...\nSo here we have\
    \ added another if statement\nSo here we have added another if statement\nto check\
    \ if the inputLine starts with the # sign\nto check if the inputLine starts with\
    \ the # sign\nto signify that this line is a comment\nto signify that this line\
    \ is a comment\n# thus we will not print this line\nbut all others are printed\n\
    but all others are printed\nexit\n>>>\n```\n\n我们已经看过一些涉及无限循环的例子，比如使用 `while True`\
    \ 的那些。在其中，由于 `while` 循环的条件始终为 `True`（`True` 当然总是被求值为 `True`），它就是一个无限循环；我们还看到了如何使用\
    \ `break` 语句来结束循环。然而，在编码实践中，有时会犯一些逻辑错误，导致无意的无限循环，从而在运行时产生不停执行的情况。请看下面的例子：\n\n\
    ```python\n>>> \n>>> counter = 0\n>>> while counter != 5 :\n...     counter =\
    \ counter + 2\n...\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 2, in <module>\nKeyboardInterrupt\n>>> \n>>> counter = 10\n>>> while counter\
    \ > 0 :\n...     counter = counter + 1\n...\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 2, in <module>\nKeyboardInterrupt\n>>> \n```\n\n在第一个例子中，我们有一些不良的编码实践。我们在\
    \ `while` 条件中使用了 `!=`，并且计数器在每次迭代中增加 2。因此，计数器永远不会等于 5。事实上，计数器从 0 变到 2、4，然后是 6、8……所以这是一个永远不会结束的无限循环。为了退出，我们必须使用\
    \ `Ctrl-c`（同时按住 Control 键并按下 c 键），从而显示 `Traceback` 消息，表明发生了键盘中断。\n\n在第二个例子中，我们使用了\
    \ `>` 运算符，但存在一些编码逻辑错误：我们在每次迭代中将计数器增加 1，但循环的条件是“`counter > 0`”；因此计数器将始终大于 0，从而再次形成无限循环。\n\
    \n所以你可以从这些例子中看到，每次我们都需要使用 `CTRL-c` 键盘中断来跳出循环，否则循环显然会永远进行下去。这些只是许多可能形成无意无限循环的情况中的几个例子，因此在运行时它会成为一个挂起的进程，因为它只是永远循环。\n\
    \n## 搜索\n\n好了，关于无限循环就讲到这里，现在让我们看看我们使用循环的目的。一个常见的应用是搜索。例如，我们可能想要搜索一个字符串并找出某个特定字符出现的次数。我们可能还想要遍历一个列表并找到特定的项目，或者多个项目，如下例所示：\n\
    \n```python\n>>>\n>>> myString = 'spam, egg, and ham'\n>>> strLen = len(myString)\n\
    >>> strLen\n18\n>>> i = 0 # index into myString\n>>> charCount = 0 # counter of\
    \ a specific character occurrence\n>>>\n>>> while i < strLen :\n...     if myString[i]\
    \ == 'a' :\n...         charCount += 1\n...     i += 1\n...\n>>> charCount\n3\n\
    >>>\n>>> myList = ['spam', 'egg', 'ham', 'pasta', 'ramen', 'noodles']\n>>> len(myList)\n\
    6\n>>> for item in myList :\n...     if item == 'spam' or item == 'egg' :\n...\
    \         print(item)\n...\nspam\negg\n>>>\n```\n\n在第一个例子中，我们使用 `while` 循环在字符串中搜索字符\
    \ ‘a’ 并计算其出现次数。\n\n在第二个例子中，我们通过 `for` 循环遍历一个列表，搜索 ‘spam’ 和 ‘egg’，并在找到时打印出来。这里有一个小细节：我们使用了\
    \ `+=` 运算符（我们在前一章见过），例如在 `charCount += 1` 语句中，而不是使用经典的 `charCount = charCount\
    \ + 1`。（随着你编码越来越熟练，你可能更倾向于使用这些简写形式。但两种方式都可以。）\n\n## 计数\n\n在前面搜索字符串中字符的例子中，我们也计算了出现次数，因此展示了如何使用\
    \ `while` 循环进行计数。我们也可以遍历一个列表并计算项目数量，如下例所示：\n\n```python\n>>>\n>>> myList = ['spam',\
    \ 'egg', 'ham', 'pasta', 'ramen', 'noodle']\n>>> len(myList)\n6\n>>> count = 0\n\
    >>> for item in myList :\n...     count += 1\n...\n>>> count\n6\n>>>\n```\n\n\
    在这个例子中，我们展示了列表项目的计数是 6，就像函数 `len(myList)` 所显示的那样。\n\n## 最大值/最小值\n\n我们还想演示使用循环遍历数字列表以找到最大值/最小值，如下例所示：\n\
    \n```python\n>>> import math\n>>> listOfNumbers = [2, 10, 31, 5, -4, -18, 9, 25]\n\
    >>> maxNumber = -math.inf # make max the very smallest\n>>>                  \
    \   # as negative infinity\n>>> for numberItem in listOfNumbers :\n...     if\
    \ numberItem > maxNumber :\n...         maxNumber = numberItem\n...\n>>> maxNumber\n\
    31\n>>> minNumber = math.inf # make min the very largest\n>>>                \
    \     # as infinity\n>>> for numberItem in listOfNumbers :\n...     if numberItem\
    \ < minNumber :\n...         minNumber = numberItem\n...\n>>> minNumber\n-18\n\
    >>>\n```\n\n从这两个例子（一个用于找到数字列表中的最大数，另一个用于找到最小数）中，我们使用了数学库的无穷大，即 `math.inf`，来为我们提供可能的最大数字，而\
    \ `-math.inf` 用于可能的最小数字。逻辑非常简单：首先将绝对最小的数字赋值给 `maxNumber`，然后在遍历数字列表时，如果某个数字项大于当前的\
    \ `maxNumber`，就用它替换 `maxNumber`；至于最小值，我们首先将绝对最大的数字赋值给 `minNumber`，然后在遍历列表时用更小的数字项替换它。结果显示结果符合预期。\n\
    \n## 练习：\n\n7.1 编写一个程序，提示用户输入数字，直到用户输入“done”。用户完成后，显示数字的个数、总和以及平均值。\n\n7.2 如果你使用了\
    \ `while` 循环，现在尝试使用 `for` 循环来解决与第 1 题相同的问题；但如果你使用了 `for` 循环，现在尝试切换到 `while` 循环。\n\
    \n7.3 编写一个程序，提示用户输入并将它们放入一个列表。一旦用户输入“done”，显示这些数字的最大值和最小值。\n\n7.4 如果你使用了 `while`\
    \ 循环，现在尝试使用 `for` 循环来解决与第 3 题相同的问题；但如果你使用了 `for` 循环，现在尝试切换到 `while` 循环。\n\n7.5\
