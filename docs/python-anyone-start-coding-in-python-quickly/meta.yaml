    # Factorial calculation


    So we will go through the looping code to solve the factorial calculation and
    then the recursion as well. We know that factorial is basically multiplying the
    number we have at hand with the numbers below it all the way down to 1. So that
    factorial(x) is the result of multiplying x with x-1, then x-2, all the way down
    to 1 – that is, x! = x*(x-1)*(x-2)...3*2*1 (x! is the math notation of x factorial.)


    Here an interesting observation is that factorial(x) is simply x*factorial(x-1)
    and that forms the basis for our recursive iteration, with its base case being
    factorial(1), which is just 1.


    So the following are the code to illustrate the solutions using looping vs. recursion:'
  merge: -1
  pgno: 144
- img_proc: true
  md: '```

    >>> x = 5

    >>> def loopingFactorial( x ) :

    ...     fac = 1

    ...     while( x > 0 ) :

    ...         fac = fac * x

    ...         x -= 1

    ...     return fac

    ...

    >>> res = loopingFactorial(5)

    >>> res

    120

    >>>

    ```


    ```

    >>> def recursiveFactorial( x ) :

    ...     if(x == 1) :

    ...         return 1

    ...     else :

    ...         return x * recursiveFactorial(x - 1)

    ...

    >>> res = recursiveFactorial(5)

    >>> res

    120

    >>>

    ```


    So there we have it- calculation of factorial implemented in both ways. As you
    can see, if some ways, once recognizing that the base case is 1 and that each
    recursive call is reducing the problem by 1 (that is, going from x to x-1 in each
    iteration), it''s arguably simpler to code the recursive solution.


    Now if we dissect a bit more into the recursive factorial calculation function,
    we know that from definition of factorial, 0! Is 1, and 1! Is 1 as well. So in
    each of the recursive iteration, we first check to see if x is 1, as if it reaches
    1 we know that 1! is 1 thus we simply return 1; otherwise, the else branch is
    taken and we return the value of x multiplied by the factorial of x-1. Please
    note that the'
