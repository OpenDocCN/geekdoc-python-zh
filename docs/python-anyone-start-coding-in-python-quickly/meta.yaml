    你可能见过一些较旧的字符串格式化方法，所以我们在此仅作提及。有一个运算符 `%`（取模），通常用于取模计算（返回除法中的余数）。这个 `%` 可以用于字符串格式化，形式为
    `string` % <values>，字符串中的 `%s` 会被相应的值替换，如以下示例所示：


