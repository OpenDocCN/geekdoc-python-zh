    # Formatted string literals


    To format a string literal, simply use an f (or F) in front of the string before
    the quote, and then use {} to include substitutions for variables or literal values,
    such as in the following example:


    ```

    >>>

    >>> thisYear = 2021

    >>> bookTitle = ''Python Anyone''

    >>> f''The book {bookTitle} is written in year {thisYear}''

    ''The book Python Anyone is written in year 2021''

    >>>

    >>> f''The book "{bookTitle}" is written in year {thisYear}''

    ''The book "Python Anyone" is written in year 2021''

    >>>

    ```


    So we have displayed a simple sentence and then used the single quote/double quote
    to quote the book title in the displayed message – a technique mentioned before.


    An alternative way is to use str.format() . So here we use the common practice
    of object oriented programming. We treat the string as an object (although a literal),
    and then attached to it the method format to control the output display, in some
    way a similar fashion as we just did using `f` or `F` in front of the string,
    such as the following examples show:'
