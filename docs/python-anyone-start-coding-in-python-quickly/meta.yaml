- md: "## Interactive Mode vs. Script Mode For Python (Or Any Interpretive Language)\n\
    \nNow let's go through a bit of how we use the downloaded package for Python coding.\n\
    \nThere are two modes in using the installed package– interactive mode and script\
    \ mode:\n\n1. Interactive mode\n   a. Like what you've seen from the IDLE example,\
    \ one way to do it is to use the Python IDLE Shell (again, shell is like the command/console\
    \ window) and code in it.\n   b. Or you can use the command window (on Windows\
    \ 10), and invoke the Python as shown earlier. Then you can start Python coding\
    \ in this shell just as what you did in IDLE Shell.\n2. As for the script mode,\
    \ you will need to create a file (script file) and then execute the file as the\
    \ following figures show (the code and then run result):\n\n![](img/b52ff7adacf4e0b514b791444be82d81_23_0.png)\n\
    \n![](img/b52ff7adacf4e0b514b791444be82d81_24_0.png)\n\nSo you see that we have\
    \ a script file named my.py (the .py extension tells us that it’s a Python script.)\
    \ To execute this script, we invoke the command python.exe (you also see that\
    \ I’ve put myself in the Python installation directory where I can access this\
    \ command – you don’t have to as you can set up your operating system platform\
    \ to search your command in this directory via a setup called PATH if you’re curious\
    \ – which can be easily done by editing the system environment variable Path on\
    \ Windows 10.) (You probably also noticed that we are printing out “Spam and eggs”\
    \ instead of “Hello World” as before so as to be more in sync with the Python\
    \ spirit.)\n\nNow let’s have some comparison of the two modes:\n\n1. In interactive\
    \ mode, you code directly in the shell and have these advantages:\n   a. When\
    \ you have a short script and want the gratification of immediate results.\n \
    \  b. Direct interaction with the interpreter thus work faster to simply type\
    \ some Python code/command, press the enter key, and get the results.\n   c. Great\
    \ way for beginners to start practicing Python.\n   d. To exit the shell as shown\
    \ in previous snapshot, you click CTRL-z (the Control key and z simultaneously)\
    \ and then click enter.\n\nYet the trade-offs are:\n   a. Sometimes it’s harder\
    \ if you need to use the previous commands (you might have to use some cumbersome\
    \ way to edit if there is any or you will have to retype the whole line.)\n  \
    \ b. It gets tedious to run through some longer pieces of code.\n\n2. Script mode,\
    \ you edit your entire piece of code in the script file thus have the following\
    \ advantages:\n   a. You see the “big picture” of editing the entire piece of\
    \ code.\n   b. Depending on your editor of choice, you usually have a far easier\
    \ experience editing your code.\n\nAnd the tradeoffs are obviously the opposite\
    \ of the advantages of the interactive mode. So when the code is short with just\
    \ a few lines, you’d rather use the interactive mode so as to avoid creating a\
    \ separate .py script file.\n\n## Coding And Debugging\n\nWe all know what coding\
    \ is: to write the instructions in some specific computer languages which can\
    \ be then translated into some language which the machine could understand thus\
    \ to carry out what you want it to do.\n\nBut why debugging is mentioned here?\
    \ Well, debugging actually is a very important part of coding. In fact, for a\
    \ coder, more time is probably spent in debugging than coding - actually substantially\
    \ more time.\n\nNow let's look at some of the errors we could run into while coding.\
    \ There are syntax errors and runtime errors; whereas in runtime errors there\
    \ are fatal errors and non-fatal errors.\n\nSo there are different occasions we\
    \ could encounter syntax errors. It could happen if we are using some IDE (e.g.\
    \ IDLE) which detects the syntax error (and it usually gives us some hint in fixing\
    \ it; although the hints are usually very useful, sometimes it could be off thus\
    \ more elaborated human intervention is needed.)\n\nThere are some common syntax\
    \ errors and the error messages could sometimes get a bit tricky for troubleshooting\
    \ as seen in the following example:\n\n![](img/b52ff7adacf4e0b514b791444be82d81_27_0.png)\n\
    \nThe above example shows that there is a missing comma at the end of the “eggs...”\
    \ line, yet the error message is showing SyntaxError for the next line. This is\
    \ expected as the interpreter is not troubled by the missing comma as it processes\
    \ the line until the next “ham...” line is read and being processed. So in general,\
    \ you can check the lines starting from where the SyntaxError is pointed out and\
    \ go backwards. Usually it’s the immediate previous line but sometimes it could\
    \ be a bit earlier in the code.\n\nHere is another example:\n\n![](img/b52ff7adacf4e0b514b791444be82d81_28_0.png)\n\
    \nIn this above example, there is an unexpected space (indent) in front of “y=...”\
    \ and the error is correctly pointed out but the message accompanying it might\
    \ be a bit confusing. So is the “line 1” for the line number as the error is clearly\
    \ on line 2. So the error could be in previous line(s) or the following line(s),\
    \ but the good news is that it usually should be fairly close to the line number\
    \ pointed out by the IDE.\n\nIn general, error messages show you where the problem\
    \ was discovered by the interpreter, but not necessarily where it was caused.\
    \ But anyhow, it usually gives you a pretty good idea of how to troubleshoot your\
    \ code. Although from time to time, we might still need to put in “debugging lines”\
    \ such as printing out the values of certain variables so as to make sure the\
    \ code logic is indeed going the way we design it to. Just as per Larry Greenfield\
    \ of The Linux Users’ Guide, “One of Linus’s earlier projects was a program that\
    \ would switch between printing AAAA and BBBB. This later evolved to Linux.”\n\
    \nA key takeaway here is that debugging is like learning how to walk, you will\
    \ stumble many times and yet it is because of the repetition in practice, your\
    \ debugging muscle becomes stronger and not only then you can code and debug faster\
    \ but also indirectly you will be able to write better code with much experience\
    \ in this coding and debugging cycle.\n\n## Popular IDEs Which Are Very Capable\
    \ For Python Coding\n\nNow let’s look at some of the IDEs, other than IDLE, for\
    \ Python coding. That’s right, we are not confined to using IDLE although it came\
    \ with Python. If you are to have more experience on different programming languages,\
    \ perhaps down the road for some, you most likely will develop preference of some\
    \ IDE(s).\n\nOne of the popular free IDE is actually from Microsoft and that’s\
    \ called Visual Studio. Visual Studio has a few different versions but the community\
    \ version is free and you can get it at https://visualstudio.microsoft.com/downloads/\n\
    \nThere are also a couple of other popular ones. One is Eclipse (https://www.eclipse.org/ide/)\
    \ and the other is NetBeans (https://netbeans.org/).\n\nIn fact, in this cloud\
    \ computing world, there are also a few popular online IDEs. One is called OnlineGDB\
    \ (https://www.onlinegdb.com/) and another one called CodingGround at https://www.tutorialspoint.com/codingground.htm.\
    \ Both of them can just be simply accessed through a web browser (without downloading\
    \ and installation.)\n\nI am sure there are many others which are probably as\
    \ good as any which are mentioned here. Overtime, I hope you will develop more\
    \ expertise of some IDE(s) while enjoying coding (probably in Python) along the\
    \ way.\n\n## Python Specific Extensions For “Compilation”\n\nWithout getting into\
    \ much details, although Python is a great language, it’s not as fast as C or\
    \ Java – the other two popular languages. There are many efforts to change that.\
    \ Since this is a topic that’s beyond the scope of this book, however, I will\
    \ just touch it lightly so that we have some knowledge of these efforts.\n\nAmong\
    \ the many efforts, there are two major areas which are worked on to speed up\
    \ Python execution: one is to have some code optimization such that it will run\
    \ faster; the other is to make the Python executable run faster using a different\
    \ runtime than the one we have been using (the interpreter from Python.org.)\n\
    \nIn optimizing the Python runtime, not like the CPython mentioned in Chapter\
    \ 1, PyPy uses the just-in-time (JIT) technique just like Java to speed up the\
    \ performance – also as explained in Chapter 1.\n\nThere are also other extensions\
    \ such as Cython (C extensions for Python) which you can search about if interested.\n\
    \nBut one popular extension is Numba which takes advantage of optimization in\
    \ both aforementioned areas. It uses JIT compilation and also optimized libraries\
    \ such as NumPy to accelerate the execution.\n\nAfter you have gone through this\
    \ book and feel comfortable, you are certainly free to explore these extensions.\
    \ In fact, in the future should you get into more advanced Python coding, you\
    \ are encouraged to take advantage of these extensions to realize more benefit\
    \ of Python programming.\n\n## Exercises:\n\n2.1 Use your Python IDE as a tip\
    \ calculator, if the bill total of the meal is $32.87, what will be the 15% tip\
    \ amount? And what will be the final total?\n\n2.2 Use Python print() to print\
    \ “Hello World!” interactively. Then write a Python script to print “CS102 Intro\
    \ to Python”"
  mdcn: "## Python（或任何解释型语言）的交互模式与脚本模式\n\n现在我们来了解一下如何使用下载的包进行Python编码。\n\n使用已安装的包有两种模式——交互模式和脚本模式：\n\
    \n1. 交互模式\n   a. 正如你在IDLE示例中看到的，一种方法是使用Python IDLE Shell（同样，shell类似于命令/控制台窗口）并在其中编码。\n\
    \   b. 或者你可以使用命令窗口（在Windows 10上），并如前所述调用Python。然后你可以在这个shell中开始Python编码，就像你在IDLE\
    \ Shell中所做的那样。\n2. 至于脚本模式，你需要创建一个文件（脚本文件），然后按照下图所示执行该文件（代码和运行结果）：\n\n![](img/b52ff7adacf4e0b514b791444be82d81_23_0.png)\n\
    \n![](img/b52ff7adacf4e0b514b791444be82d81_24_0.png)\n\n所以你看，我们有一个名为my.py的脚本文件（.py扩展名告诉我们它是一个Python脚本）。要执行这个脚本，我们调用命令python.exe（你也可以看到我把自己放在了Python安装目录中，这样我就可以访问这个命令——你不必这样做，因为你可以设置你的操作系统平台通过一个名为PATH的设置来搜索这个目录中的命令，如果你好奇的话——这可以通过编辑Windows\
    \ 10上的系统环境变量Path轻松完成。）（你可能还注意到我们打印的是“Spam and eggs”而不是之前的“Hello World”，以便更符合Python的精神。）\n\
    \n现在让我们对这两种模式进行一些比较：\n\n1. 在交互模式下，你直接在shell中编码，具有以下优点：\n   a. 当你有一个简短的脚本并希望立即看到结果时。\n\
    \   b. 与解释器直接交互，因此只需输入一些Python代码/命令，按回车键，即可获得结果，工作更快。\n   c. 对于初学者开始练习Python来说是一个很好的方式。\n\
    \   d. 要退出shell，如前面的快照所示，你可以点击CTRL-z（同时按Control键和z键），然后点击回车。\n\n然而，权衡之处在于：\n \
    \  a. 有时如果你需要使用之前的命令，可能会更困难（你可能不得不使用一些繁琐的方法来编辑，或者你将不得不重新输入整行。）\n   b. 运行一些较长的代码会变得乏味。\n\
    \n2. 脚本模式，你在脚本文件中编辑整个代码，因此具有以下优点：\n   a. 你可以看到编辑整个代码的“大局”。\n   b. 根据你选择的编辑器，你通常会有更轻松的代码编辑体验。\n\
    \n而权衡之处显然是交互模式优点的反面。所以当代码很短，只有几行时，你宁愿使用交互模式，以避免创建单独的.py脚本文件。\n\n## 编码与调试\n\n我们都知道编码是什么：用某种特定的计算机语言编写指令，然后这些指令可以被翻译成机器能够理解的语言，从而执行你想要它做的事情。\n\
    \n但为什么这里要提到调试呢？嗯，调试实际上是编码中非常重要的一部分。事实上，对于一个编码者来说，花在调试上的时间可能比编码更多——实际上要多得多。\n\n\
    现在让我们看看在编码过程中可能遇到的一些错误。有语法错误和运行时错误；而在运行时错误中，有致命错误和非致命错误。\n\n所以我们在不同场合都可能遇到语法错误。如果我们使用某个IDE（例如IDLE），它检测到语法错误（通常会给我们一些修复提示；虽然这些提示通常很有用，但有时可能不准确，因此需要更详细的人工干预。）\n\
    \n有一些常见的语法错误，错误信息有时可能有点棘手，难以排查，如下例所示：\n\n![](img/b52ff7adacf4e0b514b791444be82d81_27_0.png)\n\
    \n上面的例子显示在“eggs...”行末尾缺少一个逗号，但错误信息却显示下一行有SyntaxError。这是预期的，因为解释器在处理该行时并不受缺少逗号的影响，直到读取并处理下一行“ham...”时才会发现。所以一般来说，你可以从SyntaxError指出的行开始，向前检查。通常是紧邻的前一行，但有时可能是代码中更早的位置。\n\
    \n这里是另一个例子：\n\n![](img/b52ff7adacf4e0b514b791444be82d81_28_0.png)\n\n在上面的例子中，“y=...”前面有一个意外的空格（缩进），错误被正确地指出了，但伴随它的信息可能有点令人困惑。所以“line\
    \ 1”指的是行号，但错误明显在第2行。所以错误可能在前一行或后几行，但好消息是它通常应该相当接近IDE指出的行号。\n\n一般来说，错误信息显示的是解释器发现问题的位置，而不一定是导致问题的原因。但无论如何，它通常能给你一个关于如何排查代码的很好的思路。尽管有时，我们可能仍然需要插入“调试行”，例如打印某些变量的值，以确保代码逻辑确实按照我们设计的方式进行。正如《Linux用户指南》的Larry\
    \ Greenfield所说，“Linus早期的项目之一是一个在打印AAAA和BBBB之间切换的程序。这后来演变成了Linux。”\n\n这里的一个关键要点是，调试就像学习走路，你会绊倒很多次，但正是因为实践中的重复，你的调试能力会变得更强，这样你不仅能更快地编码和调试，而且间接地，通过在这个编码和调试周期中的丰富经验，你将能够编写出更好的代码。\n\
    \n## 非常适合Python编码的流行IDE\n\n现在让我们看看除了IDLE之外，用于Python编码的一些IDE。没错，我们并不局限于使用IDLE，尽管它是随Python一起提供的。如果你要获得更多不同编程语言的经验，也许将来对某些人来说，你很可能会对某些IDE产生偏好。\n\
    \n一个流行的免费IDE实际上来自微软，叫做Visual Studio。Visual Studio有几个不同的版本，但社区版是免费的，你可以在https://visualstudio.microsoft.com/downloads/获取。\n\
    \n还有其他几个流行的IDE。一个是Eclipse（https://www.eclipse.org/ide/），另一个是NetBeans（https://netbeans.org/）。\n\
    \n事实上，在这个云计算世界里，也有一些流行的在线IDE。一个叫做OnlineGDB（https://www.onlinegdb.com/），另一个叫做CodingGround，网址是https://www.tutorialspoint.com/codingground.htm。两者都可以通过网络浏览器直接访问（无需下载和安装。）\n\
    \n我相信还有许多其他可能和这里提到的任何IDE一样好的IDE。随着时间的推移，我希望你在享受编码（可能用Python）的过程中，能对某些IDE发展出更多的专业知识。\n\
    \n## 用于“编译”的Python特定扩展\n\n不深入细节，虽然Python是一门很棒的语言，但它不如C或Java快——另外两种流行的语言。有许多努力在改变这一点。由于这是一个超出本书范围的话题，我将只是简单提及，以便我们对这些努力有所了解。\n\
    \n在众多努力中，有两个主要领域致力于加速Python执行：一个是进行一些代码优化，使其运行更快；另一个是使用不同于我们一直使用的运行时（来自Python.org的解释器）来使Python可执行文件运行更快。\n\
    \n在优化Python运行时方面，不像第1章提到的CPython，PyPy使用了像Java一样的即时（JIT）技术来提高性能——正如第1章所解释的。\n\n\
    还有其他扩展，例如Cython（Python的C扩展），如果你感兴趣可以搜索一下。\n\n但一个流行的扩展是Numba，它利用了上述两个领域的优化。它使用JIT编译和优化的库（如NumPy）来加速执行。\n\
    \n在你读完本书并感到自如之后，你当然可以自由探索这些扩展。事实上，将来如果你进入更高级的Python编码，鼓励你利用这些扩展来实现Python编程的更多好处。\n\
    \n## 练习：\n\n2.1 使用你的Python IDE作为小费计算器，如果一餐的账单总额是32.87美元，15%的小费是多少？最终总额是多少？\n\n\
    2.2 使用Python print()交互式地打印“Hello World!”。然后编写一个Python脚本来打印“CS102 Intro to Python”"
