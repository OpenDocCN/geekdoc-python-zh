    (as demanded in software engineering) not only for future maintenance (such as
    adding some functionality or fixing some bugs) but also for the current development
    job at hand as the solution is being constructed. As the development could last
    for quite some time among many coders and from time to time everyone will have
    to rely on quickly going through some finished code to understand what it’s doing.


    So as we dive into object-oriented programming, it works wonders for larger problems
    and larger solutions. We carry on with our gradebook example to illustrate how
    OOP is used and the potential benefits.


    So if gradebook is an object, which consists of two members: courseName and studentsList.
    With a bit of analysis, we see that courseName is a string, which is an object
