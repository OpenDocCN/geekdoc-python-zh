    1.234\n>>> '%07.4f' % myFloat\n'01.2340'\n>>> '%06.4f' % myFloat\n'1.2340'\n>>>\
    \ '%05.4f' % myFloat\n'1.2340'\n```\n\nIt is worth pointing out that in the above\
    \ examples, the padding is pretty obvious with leading 0s; but the last example\
    \ we not only do not need padding but we actually have more characters than the\
    \ width specified, thus the outcome is the same as the previous example above\
    \ it – in that we have 6 total characters (5 digits and 1 decimal point.) In the\
    \ last example we specified only 5 characters which is 1 short of our total actual\
    \ characters hence was ignored.\n\n## The - Flag\n\nThis – flag is for justification.\
    \ So if we have a numerical value that’s shorter than the specified width, it’s\
    \ usually displayed as right-justified. We can use the – flag to make it left-justified\
    \ instead, as shown in the following examples:\n\n```\n>>> myInt\n17\n>>> '%5d'\
    \ % myInt\n'   17'\n>>> '%-5d' % myInt\n'17   '\n>>> myFloat\n1.234\n>>> '%10.5f'\
    \ % myFloat\n'   1.23400'\n>>> '%-10.5f' % myFloat\n'1.23400   '\n```\n\n## The\
    \ + Flag\n\nThe + flag is to add a leading + sign in front of the numeric values,\
    \ as we usually don't have the + sign in front of positive values, such as the\
    \ following examples show:\n\n```\n>>> myInt\n17\n>>> '%d' % myInt\n'17'\n>>>\
    \ '%+d' % myInt\n'+17'\n```\n\nSome interesting outcomes of using these flags\
    \ are shown below. So it could get messy at times and we always need to be vigilant\
    \ in verifying the results.\n\n```\n>>> myInt\n17\n>>> myNegativeInt = -5\n>>>\
    \ '% d' % myInt\n' 17'\n>>> '% d' % myNegativeInt\n'-5'\n```\n\nAs you can see,\
    \ we have a space before the type d and thus in the case of myInt, which is 17,\
    \ we have a space displayed before the value; but when the value is negative,\
    \ as in myNegativeInt, it turns out that we don't have a space before the value\
    \ -5 in our display.\n\nOk, enough of the flags, now let's deal with the next\
    \ format specifier.\n\n## Width Specifier\n\nThe next optional specifier is width,\
    \ which we have actually used a bit already, although just for numeric values,\
    \ but they could be used on strings as well.\n\n```\n%[<flags>][<width>][.<precision>]<type>\
    \ % values\n```\n\nSo let's just dive into some examples:\n\n```\n>>> myInt\n\
    17\n>>> '%5d' % myInt\n'   17'\n>>> '%5s' % 'egg'\n'  egg'\n>>> '%-5s' % 'egg'\n\
    'egg  '\n>>> '%-5s' % 'spam, egg, and ham'\n'spam, egg, and ham'\n```\n\nAgain,\
    \ as shown above in the last example, you cannot use the width specifier to 'cut'\
    \ short the value display, thus the entire string 'spam, egg, and ham' was displayed\
    \ although the width specified is only 5.\n\n## Precision Specifier\n\nAs you\
    \ probably guessed, this precision specifier is specifically for floating point\
    \ values, but it also controls the exponentials, and surprise, the strings.\n\n\
    So for numeric values, precision determines the number of digits after the decimal\
    \ point as shown in the following examples:\n\n```\n>>> myFloat\n1.234\n>>> '%.2f'\
    \ % myFloat\n'1.23'\n>>> '%.2e' % myFloat\n'1.23e+00'\n```\n\nAs for strings,\
    \ it's pretty straightforward that the values will be truncated or padded to the\
    \ specified precision, as shown in the following examples:\n\n```\n>>> myString\
    \ = 'spam, egg, and ham'\n>>> '%s' % myString\n'spam, egg, and ham'\n>>> '%.4s'\
    \ % myString\n'spam'\n>>> '%8.4s' % myString\n'    spam'\n>>> '%25.25s' % myString\n\
    '         spam, egg, and ham'\n```\n\nAlright, enough for this older style of\
    \ formatting, although it should be useful as it is still widely used.\n\n## Exercises:\n\
    \n5.1 Write Python code to input student data, each line per student, where student\
    \ name is the first item in each line, and the student test scores follow. Store\
    \ all data in variables to be used in the next exercise, in the same IDE session.\n\
    \n- Bill 95 83 89\n- Steve 88 85 98\n- Karen 99 79 82\n- Jane 65 98 98\n\n5.2\
    \ Now continue with the previous exercise, write Python code to display student\
    \ name only on a single line.\n\n- Bill 95 83 89\n- Steve 88 85 98\n- Karen 99\
    \ 79 82\n- Jane 65 98 98\n\n5.3 Write Python code to input school data, each line\
    \ per school, where school acronym is the first item in each line, and the full\
    \ school name follow. Store all data in variables to be used in the next exercise,\
    \ in the same IDE session.\n\n- SBVC San Bernardino Valley College\n- CSULA Cal\
    \ State University Los Angeles\n- CCC Contra Costa College\n- UCB University of\
    \ California Berkeley\n\n5.4 Now continue with the previous exercise, write Python\
    \ code to display school acronym only on a single line.\n\n- SBVC San Bernardino\
    \ Valley College\n- CSULA Cal State University Los Angeles\n- CCC Contra Costa\
    \ College\n- UCB University of California Berkeley\n\n## Chapter 6 If This Then\
    \ That - Decision and Branching\n\nNow that we have the basics of Python, let’s\
    \ proceed to the logic of coding. Don’t fret - the logic in coding is very similar\
    \ to our daily life’s logic – which we all use all the time, most of the time\
    \ without knowing and with very little attention paid to them. For instance, “if\
    \ it rains”, “I will bring an umbrella with me.” This is logic, and the formal\
    \ equivalent is if “this”, then “that.” We all learned a bit about this formal\
    \ form in math; and oftentimes it is described even a bit more formally as If\
    \ A then B, or if A -> B (or simply A-> B with if implied for A.)\n\n## Conditional\
    \ Statement Using if\n\nIn coding logic, there is no difference when it comes\
    \ to logic; just some syntactic differences. So once you mastered the logic, it’s\
    \ the same in all other coding languages. In Python we have the following syntax\
    \ structure:\n\n```\nif condition A is met :\n    Do something\n```\n\nTo follow\
    \ the everyday life example we had earlier:\n\n```\nif it rains:\n    I will bring\
    \ an umbrella with me\n```\n\nThis could be translated easily to adhere to Python\
    \ syntax:\n\n```\nif isRaining == True :\n    bringUmbrella = True\n```\n\nThe\
    \ condition follows the keyword if is evaluated first, and if the evaluation turns\
    \ out to be True, the statement belongs to this (if branch) is executed – that\
    \ is, bringUmbrella is set to True via the assignment statement shown above. In\
    \ daily life, as indicated earlier, this is usually described as if this then\
    \ that. This is a type of decision making based on if the condition is true or\
    \ not. Oftentimes some logical operator is involved to give us the true or false\
    \ evaluation, as seen in early chapter regarding logical operators.\n\nThis is\
    \ a fundamental capability in coding. We almost always need to perform some tasks\
    \ in programming based on certain conditions. So there we have the very basic\
    \ form of the if statement, where we have the colon : at the end of the condition\
    \ to be evaluated, and if the condition is true, the statement(s) to be executed\
    \ is the indented statement(s) after the if statement.\n\nIf you are familiar\
    \ with some other languages, there is usually some sort of delimiters for the\
    \ statement(s) to be executed (for example, { to precede the statement(s) and\
    \ } to close the block.) In Python, indentation is used instead so all the statements\
    \ to be executed for this if statement is indented one level after the if statement.\n\
    \nNow let's check out some examples below:\n\n```\n>>> isRaining=True\n>>> bringUmbrella=True\n\
    >>> if isRaining :\n...     bringUmbrella=True\n...\n>>> bringUmbrella\nTrue\n\
    >>> bringUmbrella=False\n>>> isRaining=False\n>>> if isRaining :\n...     bringUmbrella=True\n\
    ...\n>>> bringUmbrella\nFalse\n```\n\nAs you can see, the first example is using\
    \ what we started in introducing the if statement earlier where isRaining is checked\
    \ to see if it's True or False, and if it's True then we assign True to bringUmbrella."
