    \ of the stacks of a post and placing it on top of another stack of another post,\
    \ or on a post with no disk.\n- No disk may be placed on top of a smaller disk.\n\
    \nAccording to the legend, when the priests finished moving, the world will end.\
    \ But if the priests were able to move one disk per second, using the smallest\
