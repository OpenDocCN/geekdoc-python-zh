    In Time) compiler if you are interested in this area of technologies.'
- md: "In the Java world, each hardware platform/architecture has a different Java\
    \ bytecode interpreter specifically written for the targeted hardware. It interprets\
    \ the Java bytecode for execution. This way, Java achieves its goal of **Write\
    \ once, run anywhere** (WORA), or sometimes **Write once, run everywhere** (WORE)\
    \ such that once coding is done, there is none or very minimum porting effort\
    \ to make it run on different platforms.\n\nBut the extra layer of Java bytecode\
    \ that is executed by an interpreter often slows down the execution vs. the same\
    \ code that is compiled into native machine code. This problem is somewhat alleviated\
    \ by [just-in-time (JIT) compilers](https://en.wikipedia.org/wiki/Just-in-time_compilation)\
    \ - A JIT compiler may translate the frequently used portion of Java bytecode\
    \ into native machine code while executing the program thus making the code execution\
    \ much faster.\n\nAnd specifically to Python, since it’s an interpreted language,\
    \ It has the inherent slowness in performance. There is effort made just few years\
    \ ago to translate Python code into bytecode, which are low-level instructions\
    \ that could be executed by the interpreter (very similar to the Java situation\
    \ described earlier and perhaps inspired by it.) So instead of executing the code\
    \ directly, bytecode is executed in a virtual machine, which is simply the specific\
    \ Python interpreter behind the scene. With this performance enhancement, converting\
    \ to CPython or the likes is avoided thus the cumbersomeness is no more. Yet as\
    \ long as the Python bytecode and the virtual machine is the same version/compatible,\
    \ the source code could be executed anywhere (be it Windows, MacOS, etc.) thus\
    \ achieving effortless portability.\n\n## Diagram of interpretation vs. compilation\n\
    \n![](img/b52ff7adacf4e0b514b791444be82d81_15_0.png)\n\n## Source Code\n\n![](img/b52ff7adacf4e0b514b791444be82d81_15_1.png)\n\
    \n![](img/b52ff7adacf4e0b514b791444be82d81_15_2.png)\n\n## Python Interpreter\n\
    \n![](img/b52ff7adacf4e0b514b791444be82d81_15_3.png)\n\n![](img/b52ff7adacf4e0b514b791444be82d81_15_4.png)\n\
    \n## Output\n\nInterpretation process – a line of code is read and then executed,\
    \ and then the next line, and the next...\n\n![](img/b52ff7adacf4e0b514b791444be82d81_16_0.png)\n\
    \n## Source Code\n\n## GCC/G++\n\n## Some Compiler\n\n![](img/b52ff7adacf4e0b514b791444be82d81_16_1.png)\n\
    \n## Executable\n\n## Machine Code\n\n![](img/b52ff7adacf4e0b514b791444be82d81_16_2.png)\n\
    \n## Hardware/CPU\n\n![](img/b52ff7adacf4e0b514b791444be82d81_16_3.png)\n\n##\
    \ Output\n\nCompilation process – entire source code is translated into machine\
    \ code for the hardware we are on and then it gets executed to produce the output\n\
    \n## Some common misconceptions\n\nThere seems to be some confusion between machine\
    \ code and Assembly code, so let’s clear it up here. Assembly code is not machine\
    \ code.\n\nAssembly code needs to go through assembler (similar to compiler for\
    \ high level language) to be assembled into machine code which is the only thing\
    \ the computer understands thus knows how to execute.\n\n## Exercises:\n\n- 1.1\
    \ What is the difference between a compiler and an interpreter?\n- 1.2 What is\
    \ the difference between machine code and assembly code?\n- 1.3 Name some 3GLs\n\
    \n## Chapter 2 Setting Up Python for Coding and Debugging\n\n## Downloading/Installation\n\
    \nSo now we are ready to get in the action. First let’s download Python. Since\
    \ that whatever system you may have, it usually does not come with Python pre-installed.\
    \ Download is free with the open source releases and it is actually very easy\
    \ – just go to [https://www.python.org/downloads](https://www.python.org/downloads)\
    \ where you will find the active Python releases – as of this writing, the latest\
    \ release is 3.9.4 and it’s just a download of less than 30 megabytes.\n\n## Launch\
    \ Python Interpreter (Interactive/Script Modes) – Using IDLE/IDE\n\nOnce you have\
    \ it downloaded, just click on the file, which should have some name similar to\
    \ python-3.9.4.exe, and it should install Python in just a few minutes. And if\
    \ you are on Windows 10 from the start menu you will see something like the following\n\
    \n![](img/b52ff7adacf4e0b514b791444be82d81_18_0.png)\n\nIf you click on the top\
    \ menu item IDLE then you will have IDLE launched as in the following figure\n\
    \n![](img/b52ff7adacf4e0b514b791444be82d81_19_0.png)\n\nwhere I have one print\
    \ command to display the usual “Hello World!” message (in a not so Python fashion\
    \ as you will see why in the next Chapter.)\n\nYou probably will be wondering\
    \ what IDLE is. Well, let’s start with a short introduction of Integrated Development\
    \ Environment (IDE) – which is a packaged system and can be used essentially as\
    \ a tool that helps you code. IDEs usually provide some coding syntax checks as\
    \ well as syntax hints so that it’s easier for coders to do their job. In the\
    \ Python world IDLE (Integrated Development and Learning Environment) is the package\
    \ which is bundled with the language thus the IDE of choice (at least by python.org)\
    \ as you might have already discovered after you downloaded and installed Python\
    \ (as shown in the previous figures.)\n\nYou can also use the Python.exe command\
    \ directly in a window by clicking on\n\n![](img/b52ff7adacf4e0b514b791444be82d81_19_1.png)\n\
    \nYou will then have a command window running Python as the following figure shows:\n\
    \n![](img/b52ff7adacf4e0b514b791444be82d81_20_0.png)\n\nOr if you must, you can\
    \ go to the directory where Python was installed and invoke python.exe directly\
    \ in a Windows command shell (in a sense, shell is like the command/console window)\
    \ such as the following:\n\n```\nC:\\Users\\jesse>cd AppData\\Local\\Programs\\\
    Python\\Python39-32\n\nC:\\Users\\jesse\\AppData\\Local\\Programs\\Python\\Python39-32>python.exe\n\
    \nPython 3.9.4 (tags/v3.9.4:1f2e308, Apr  6 2021, 13:22:44) [MSC v.1928 32 bit\
    \ (Intel)] on win32\nType \"help\", \"copyright\", \"credits\" or \"license\"\
    \ for more information.\n>>> print(\"Hello World!\")\nHello World!\n>>> ^Z\n\n\
    C:\\Users\\jesse\\AppData\\Local\\Programs\\Python\\Python39-32>dir\n Volume in\
    \ drive C is Local Disk\n Volume Serial Number is A41E-60DA\n\n Directory of C:\\\
    Users\\jesse\\AppData\\Local\\Programs\\Python\\Python39-32\n\n04/24/2021  10:01\
    \ AM    <DIR>          .\n04/24/2021  10:01 AM    <DIR>          ..\n04/24/2021\
    \  10:00 AM    <DIR>          DLLs\n04/24/2021  09:59 AM    <DIR>          Doc\n\
    04/24/2021  09:56 AM    <DIR>          include\n04/24/2021  10:00 AM    <DIR>\
    \          Lib\n04/24/2021  10:00 AM    <DIR>          libs\n04/06/2021  02:14\
    \ PM            32,628 LICENSE.txt\n02/21/2021  11:15 AM                23 my.py\n\
    04/06/2021  02:15 PM         1,054,193 NEWS.txt\n04/06/2021  02:14 PM        \
    \    98,992 python.exe\n04/06/2021  02:14 PM            59,568 python3.dll\n04/06/2021\
    \  02:14 PM         4,454,064 python39.dll\n04/06/2021  02:14 PM            97,456\
    \ pythonw.exe\n04/24/2021  10:01 AM    <DIR>          Scripts\n04/24/2021  10:00\
    \ AM    <DIR>          tcl\n04/24/2021  09:59 AM    <DIR>          Tools\n04/06/2021\
    \  02:14 PM            76,176 vcruntime140.dll\n               8 File(s)     \
    \ 5,873,100 bytes\n              10 Dir(s)   5,765,525,504 bytes free\n\nC:\\\
    Users\\jesse\\AppData\\Local\\Programs\\Python\\Python39-32>\n```\n\nIn this Python\
    \ interpreter, once you are done, you can click ctrl-z (simultaneously pressing\
    \ control key and z) followed by the enter key to exit back to the Windows command\
    \ shell.\n\nIf you are on some flavor of Linux, it’s very straightforward after\
    \ the installation – you just type python and you should see something like the\
    \ following:\n\n![](img/b52ff7adacf4e0b514b791444be82d81_22_0.png)\n\nIn this\
    \ Linux shell, since I have multiple Python versions as you can see from the “which\
    \ python” commands, so I used python3.9 to invoke the latest Python interpreter.\
    \ Once I am in Python, I can use the usual ctrl-z to suspend it into background\
    \ and use fg (foreground) command to bring it back. Or if I use ctrl-d then I\
    \ will exit Python interpreter and get back to the Linux shell.\n\nIf you are\
    \ on Mac, since MacOS is in the Unix operating system family so it should not\
    \ be diverging much from the Linux situation above. As for the rest of the book,\
    \ since I happened to use a Windows 10 virtual machine for this book, so all the\
    \ screenshots of examples will be from Windows 10. But once you are in Python\
    \ shell/interpreter, it should not matter which underlying operating system you\
    \ are on as the process will all be the same."
  mdcn: "在Java世界中，每个硬件平台/架构都有一个专门为该目标硬件编写的Java字节码解释器。它解释Java字节码以执行程序。通过这种方式，Java实现了其**一次编写，到处运行**（WORA），或有时称为**一次编写，无处不运行**（WORE）的目标，即一旦编码完成，几乎不需要或只需极少的移植工作即可在不同平台上运行。\n\
    \n但是，由解释器执行的额外Java字节码层，通常会使执行速度慢于将相同代码编译为本地机器代码的情况。这个问题在一定程度上通过[即时（JIT）编译器](https://en.wikipedia.org/wiki/Just-in-time_compilation)得到了缓解——JIT编译器可以在执行程序时将常用的Java字节码部分转换为本地机器代码，从而使代码执行速度大大加快。\n\
    \n具体到Python，由于它是一种解释型语言，其性能存在固有的缓慢问题。就在几年前，人们努力将Python代码转换为字节码，这些字节码是解释器可以执行的低级指令（与前面描述的Java情况非常相似，或许也受到了其启发）。因此，代码不是直接执行，而是在虚拟机中执行字节码，这个虚拟机本质上就是后台运行的特定Python解释器。通过这种性能增强，避免了转换为CPython或类似工具的麻烦，从而消除了其笨重性。然而，只要Python字节码和虚拟机是相同版本/兼容的，源代码就可以在任何地方执行（无论是Windows、MacOS等），从而实现了轻松的可移植性。\n\
    \n## 解释与编译示意图\n\n![](img/b52ff7adacf4e0b514b791444be82d81_15_0.png)\n\n## 源代码\n\
    \n![](img/b52ff7adacf4e0b514b791444be82d81_15_1.png)\n\n![](img/b52ff7adacf4e0b514b791444be82d81_15_2.png)\n\
    \n## Python解释器\n\n![](img/b52ff7adacf4e0b514b791444be82d81_15_3.png)\n\n![](img/b52ff7adacf4e0b514b791444be82d81_15_4.png)\n\
    \n## 输出\n\n解释过程——读取一行代码并执行，然后是下一行，再下一行...\n\n![](img/b52ff7adacf4e0b514b791444be82d81_16_0.png)\n\
    \n## 源代码\n\n## GCC/G++\n\n## 某些编译器\n\n![](img/b52ff7adacf4e0b514b791444be82d81_16_1.png)\n\
    \n## 可执行文件\n\n## 机器代码\n\n![](img/b52ff7adacf4e0b514b791444be82d81_16_2.png)\n\n\
    ## 硬件/CPU\n\n![](img/b52ff7adacf4e0b514b791444be82d81_16_3.png)\n\n## 输出\n\n编译过程——将整个源代码翻译成我们所在硬件的机器代码，然后执行它以产生输出\n\
    \n## 一些常见误解\n\n机器代码和汇编代码之间似乎存在一些混淆，所以让我们在这里澄清一下。汇编代码不是机器代码。\n\n汇编代码需要通过汇编器（类似于高级语言的编译器）汇编成机器代码，这是计算机唯一理解并知道如何执行的东西。\n\
    \n## 练习：\n\n- 1.1 编译器和解释器有什么区别？\n- 1.2 机器代码和汇编代码有什么区别？\n- 1.3 列举一些第三代编程语言（3GLs）\n\
    \n## 第2章 设置Python编码和调试环境\n\n## 下载/安装\n\n现在我们准备好开始行动了。首先让我们下载Python。因为无论你使用什么系统，通常都不会预装Python。开源版本的下载是免费的，而且实际上非常简单——只需访问\
    \ [https://www.python.org/downloads](https://www.python.org/downloads)，你就能找到活跃的Python版本——截至本文撰写时，最新版本是3.9.4，下载大小不到30兆字节。\n\
    \n## 启动Python解释器（交互/脚本模式）——使用IDLE/IDE\n\n下载完成后，只需点击文件（文件名可能类似于python-3.9.4.exe），它应该会在几分钟内安装好Python。如果你使用的是Windows\
    \ 10，从开始菜单你会看到类似以下的内容\n\n![](img/b52ff7adacf4e0b514b791444be82d81_18_0.png)\n\n\
    如果你点击顶部的菜单项IDLE，那么你将启动IDLE，如下图所示\n\n![](img/b52ff7adacf4e0b514b791444be82d81_19_0.png)\n\
    \n其中我有一个print命令来显示通常的“Hello World!”消息（以一种不太Python的方式，你将在下一章看到原因）。\n\n你可能想知道IDLE是什么。好吧，让我们先简要介绍一下集成开发环境（IDE）——它是一个打包的系统，本质上可以作为一个帮助你编码的工具。IDE通常提供一些编码语法检查和语法提示，以便编码人员更容易地完成工作。在Python世界中，IDLE（集成开发与学习环境）是随语言捆绑的包，因此是首选的IDE（至少python.org是这样推荐的），正如你下载并安装Python后可能已经发现的那样（如前图所示）。\n\
    \n你也可以通过点击以下内容直接在窗口中使用Python.exe命令\n\n![](img/b52ff7adacf4e0b514b791444be82d81_19_1.png)\n\
    \n然后你将有一个运行Python的命令窗口，如下图所示：\n\n![](img/b52ff7adacf4e0b514b791444be82d81_20_0.png)\n\
    \n或者，如果你愿意，你可以转到Python安装的目录，并在Windows命令shell中直接调用python.exe（从某种意义上说，shell就像命令/控制台窗口），如下所示：\n\
    \n```\nC:\\Users\\jesse>cd AppData\\Local\\Programs\\Python\\Python39-32\n\nC:\\\
    Users\\jesse\\AppData\\Local\\Programs\\Python\\Python39-32>python.exe\n\nPython\
    \ 3.9.4 (tags/v3.9.4:1f2e308, Apr  6 2021, 13:22:44) [MSC v.1928 32 bit (Intel)]\
    \ on win32\nType \"help\", \"copyright\", \"credits\" or \"license\" for more\
    \ information.\n>>> print(\"Hello World!\")\nHello World!\n>>> ^Z\n\nC:\\Users\\\
    jesse\\AppData\\Local\\Programs\\Python\\Python39-32>dir\n Volume in drive C is\
    \ Local Disk\n Volume Serial Number is A41E-60DA\n\n Directory of C:\\Users\\\
    jesse\\AppData\\Local\\Programs\\Python\\Python39-32\n\n04/24/2021  10:01 AM \
    \   <DIR>          .\n04/24/2021  10:01 AM    <DIR>          ..\n04/24/2021  10:00\
    \ AM    <DIR>          DLLs\n04/24/2021  09:59 AM    <DIR>          Doc\n04/24/2021\
    \  09:56 AM    <DIR>          include\n04/24/2021  10:00 AM    <DIR>         \
    \ Lib\n04/24/2021  10:00 AM    <DIR>          libs\n04/06/2021  02:14 PM     \
    \       32,628 LICENSE.txt\n02/21/2021  11:15 AM                23 my.py\n04/06/2021\
    \  02:15 PM         1,054,193 NEWS.txt\n04/06/2021  02:14 PM            98,992\
    \ python.exe\n04/06/2021  02:14 PM            59,568 python3.dll\n04/06/2021 \
    \ 02:14 PM         4,454,064 python39.dll\n04/06/2021  02:14 PM            97,456\
    \ pythonw.exe\n04/24/2021  10:01 AM    <DIR>          Scripts\n04/24/2021  10:00\
    \ AM    <DIR>          tcl\n04/24/2021  09:59 AM    <DIR>          Tools\n04/06/2021\
