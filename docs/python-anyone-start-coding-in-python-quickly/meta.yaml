    - CSULA Cal State University Los Angeles\n- CCC Contra Costa College\n- UCB University\
    \ of California Berkeley\n\n## 第 6 章 如果这样，那么那样——决策与分支\n\n现在我们已经掌握了 Python 的基础知识，让我们继续学习编码逻辑。别担心——编码中的逻辑与我们日常生活中的逻辑非常相似——我们都在使用，大多数时候甚至没有意识到，也很少关注它们。例如，“如果下雨”，“我会带把伞。”这就是逻辑，其正式等价形式是如果“这样”，那么“那样”。我们在数学中学过一点这种正式形式；通常它被更正式地描述为如果\
    \ A 那么 B，或者如果 A -> B（或者简单地写成 A-> B，其中 if 对 A 是隐含的）。\n\n## 使用 if 的条件语句\n\n在编码逻辑中，逻辑本身没有区别；只是一些语法上的差异。所以一旦你掌握了逻辑，在所有其他编程语言中都是一样的。在\
