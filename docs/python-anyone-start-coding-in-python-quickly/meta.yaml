    of execution. As both operators have left to right associativity, so this expression
    is executed as if we have the parenthesized 100/10 , that is, it’s like this expression
    (100/10)*10 . Since () has the highest precedence, so we know that / is executed
    before *, just like in 100/10*10 due to associativity.


