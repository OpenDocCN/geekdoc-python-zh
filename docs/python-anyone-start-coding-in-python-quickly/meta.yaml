    \ and display a message indicating the new balance – if the withdraw is larger\
    \ than current balance, don’t allow the withdraw but just display an error message\
    \ and the current balance.\n\n## Chapter 11 Files\n\nSo far, we have done quite\
    \ a bit of Python coding using our Python interpreter. It’s pretty much interactive\
    \ and that the input / output are handled via keyboard and display respectively.\
    \ It’s about time to learn how we get input from files as well as store output\
    \ into files.\n\n## Persistent storage\n\nFor persistent storage, vs. the transient\
    \ data that’re only existing in memory and gone when the computer system is shutdown,\
    \ one common way is to use files. Files contain data and since they are stored\
    \ on non-volatile media thus it’s not affected by loss of electricity power. There\
    \ are a few popular file systems on various operating systems but that’s an entirely\
    \ different topic out of scope of this book. Luckily for the operating systems\
    \ which supports Python, we can just use Python calls to interface into the file\
    \ systems without getting into the low-level (system-level) details.\n\n## i/o\
    \ - reading/writing\n\nNow we know that files are actually managed by operating\
    \ systems. There are raw data files (or binary files), as well as text files.\
    \ In general, we usually deal with only text files. Files can be accessed randomly,\
    \ meaning, we can access any portion of the file randomly; or files are accessed\
    \ sequentially, that is, we start from the beginning of the file and move forward\
    \ sequentially. In lots of times, sequential access is what we do in programming\
    \ language. It is also easier to learn about file reading and writing using sequential\
    \ files and that’s what we will be doing here.\n\nSo in Python, there are functions\
    \ which we could use as interface to system calls to the operating system to open\
    \ files. Let’s look into how file i/o (input/out) or file read/write is done in\
    \ Python.\n\n## Open a file\n\nTo work with file, we need to first open the file.\
    \ We call a function open () to do this. So how do we call open ()? There are\
    \ different modes we open a file with. We list the three commonly used modes in\
    \ the following table:\n\n| Mode | Description |\n| :--- | :--- |\n| 'r' | Default\
    \ value. Open a file in reading only mode. The file cannot be modified at all.\
    \ Will get error if the file does not exist. |\n| 'w' | Open a file for writing\
    \ mode. If the file already exists, it will be overwritten. If it does not exist,\
    \ it will be created. |\n| 'a' | Open a file for writing/appending mode. All writes\
    \ to the file will be appended to the end. If the file does not exist, it will\
    \ be created. |\n| 'x' | Create the specified file. Will get error if the file\
    \ already exists. |\n\n## Filename and path\n\nAnd also when we open a file, we\
    \ need to give the filename and the optional path to the function open (). The\
    \ filename could be a string literal, or it could be a variable containing the\
    \ string literal. Whereas the optional path, if not provided, the current directory,\
    \ where the Python interpreter is launched, will be used, as it is the application\
    \ we work in for this demo. Otherwise, it will be what we specified of course.\n\
    \nAbout file name and its path information, when the path starts from the root\
    \ of the file system, it’s called absolute path; but if it’s starting from current\
    \ directory, it’s a relative path. And it will become clearer as we go through\
    \ the following examples:\n\n```\n>>> myFileRef = open(\"myPythonFile.txt\")\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    FileNotFoundError: [Errno 2] No such file or directory: 'myPythonFile.txt'\n>>>\
    \ myFileRef = open(\"myPythonFile.txt\", 'w')\n>>> myFileRef = open(\"myPythonFile.txt\"\
    )\n>>> myFileRef.close()\n>>>\n```\n\nYou see that we first tried to open the\
    \ file “myPythonFile.txt” and we didn’t provide mode so it defaults to ‘r’ for\
    \ reading. Then we got an error message as this file does not exist. Then we try\
    \ to open it for writing with the ‘w’ mode, which we know that the file would\
    \ be created if not already existed. So this second open () call was successful\
    \ and the file is created and opened for writing.\n\nAlso, when the file is opened,\
    \ a file handle, or reference, is returned from the open () call so that we can\
    \ use this reference later in our code to access the file. We have the return\
    \ value assigned to myFileRef . We then use the open () call again without giving\
    \ a mode thus to use the default for reading, and now the call was successful\
    \ since the file was already created thus in existence. Then we use the file handle\
    \ to close the file by executing myFileRef . close ()\n\nNow let’s check and see\
    \ where in the file system was the file we referenced. We see that it was created\
    \ in the same directory where we launched the Python interpreter, as in the following\
    \ picture with the text file highlighted:\n\n![](img/b52ff7adacf4e0b514b791444be82d81_179_0.png)\n\
    \nNow let's try to create a file at a specific location in the file system. We\
    \ know that to do so we need to provide the absolute path of the file when calling\
    \ open (), as shown below:\n\n```\n>>> myFileRef = open(r\"C:\\jc\\tmp\\pythonReadWriteTest.txt\"\
    , 'x')\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    FileExistsError: [Errno 17] File exists: 'C:\\jc\\tmp\\pythonReadWriteTest.txt'\n\
    >>>\n>>> myFilePath = \"C:\\jc\\tmp\\pythonReadWriteTest2.txt\"\n>>> myFileRef2\
    \ = open(myFilePath)\nTraceback (most recent call last):\n  File \"<stdin>\",\
    \ line 1, in <module>\nOSError: [Errno 22] Invalid argument: 'C:\\jc\\tmp\\pythonReadWriteTest2.txt'\n\
    >>>\n>>> myFilePath = r\"C:\\jc\\tmp\\pythonReadWriteTest2.txt\"\n>>> myFileRef2\
    \ = open(myFilePath)\nTraceback (most recent call last):\n  File \"<stdin>\",\
    \ line 1, in <module>\nFileNotFoundError: [Errno 2] No such file or directory:\
    \ 'C:\\jc\\tmp\\pythonReadWriteTest2.txt'\n>>> myFileRef2 = open(myFilePath, 'w')\n\
    >>>\n```\n\nSo you see that we first try to create, using mode 'x', a file with\
    \ an absolute path of \"C:\\jc\\tmp\\pythonReadWriteTest.txt\". But we got an\
    \ error indicating that this file already exists. We check the File Explorer and\
    \ it's indeed the case (we will have a picture in a bit showing that.) Also please\
    \ note that we put a character r in front of the path to indicate that this string\
    \ literal should be taken as raw data – so that Python interpreter would not try\
    \ to treat the backslash '\\' as an escape character, but rather treat the whole\
    \ string as is.\n\nWe then used a different file name pythonReadWriteTest2.txt\
    \ as the file path and assigned it to the variable myFilePath . But we didn't\
    \ prepend the character 'r' to use the raw string. So when we next tried to open\
    \ the file, we got an error. And you can clearly see that the path info is messed\
    \ up to become 'C:\\jc\\tmp\\pythonReadWriteTest2.txt'.\n\nSo we tried again with\
    \ the raw string. And then we called open () using default mode 'r' for reading.\
    \ But we got another error."
  mdcn: "## 练习：\n\n- 10.1 创建一个包含3个数据成员（month、day和year，均为整数）的Date类。实现3个get函数和3个set函数，分别用于获取和设置month、day、year。\n\
    - 10.2 编写一个测试程序，测试上一练习中Date类的功能。\n- 10.3 为Date类添加构造函数。\n- 10.4 使用Date类，输入两个生日，计算它们之间相差的年数、月数和天数。\n\
    - 10.5 创建一个Grades类，包含数据成员studentName（字符串）、score1、score2、score3，以及这些数据成员的get和set函数。仅为所有3个分数实现1个get函数和1个set函数。同时实现构造函数。\n\
    - 10.6 使用Grades类，为5个学生创建5个对象及其分数。将它们放入一个列表中，并遍历该列表计算每个学生的平均分并显示。\n- 10.7 创建一个GradeBook类，包含数据成员courseName、instructorName，以及用于获取或设置数据成员值的get和set函数。还包括一个构造函数来指定这两个数据成员，以及一个welcomeMessage方法来显示包含课程名称和讲师姓名的欢迎消息。\n\
    - 10.8 创建一个Account类，可供银行用于客户账户。包含一个用于保存账户余额值的数据成员，实现一个构造函数来初始化账户名称和初始余额。该构造函数还会验证初始余额不为负数，如果传入负数余额，则简单地将账户余额设置为0，并显示一条错误消息，表明余额不能为负数，因此设置为0余额。还包括用于获取账户名称、账户余额以及设置账户名称和账户余额的成员方法。还包括用于存款和取款的方法，这些方法将向账户余额添加或从中减去金额，并显示一条指示新余额的消息——如果取款金额大于当前余额，则不允许取款，只显示一条错误消息和当前余额。\n\
    \n## 第11章 文件\n\n到目前为止，我们已经使用Python解释器进行了大量的Python编码。它基本上是交互式的，输入/输出分别通过键盘和显示处理。现在是时候学习如何从文件获取输入以及将输出存储到文件中了。\n\
    \n## 持久存储\n\n对于持久存储，与仅存在于内存中并在计算机系统关闭时消失的临时数据不同，一种常见的方法是使用文件。文件包含数据，由于它们存储在非易失性介质上，因此不受断电影响。各种操作系统上有几种流行的文件系统，但这是一个完全不同的主题，超出了本书的范围。幸运的是，对于支持Python的操作系统，我们可以直接使用Python调用来与文件系统交互，而无需深入底层（系统级）细节。\n\
    \n## 输入/输出 - 读/写\n\n现在我们知道文件实际上是由操作系统管理的。有原始数据文件（或二进制文件），以及文本文件。通常，我们只处理文本文件。文件可以随机访问，意味着我们可以随机访问文件的任何部分；或者文件是顺序访问的，即我们从文件开头开始并按顺序向前移动。很多时候，顺序访问是我们在编程语言中所做的。使用顺序文件来学习文件读写也更容易，这就是我们在这里要做的。\n\
    \n所以在Python中，有一些函数可以作为接口来调用操作系统的系统调用以打开文件。让我们看看在Python中如何进行文件输入/输出（i/o）或文件读/写。\n\
    \n## 打开文件\n\n要处理文件，我们首先需要打开文件。我们调用一个函数`open()`来完成这个操作。那么我们如何调用`open()`呢？我们以不同的模式打开文件。我们在下表中列出了三种常用模式：\n\
    \n| 模式 | 描述 |\n| :--- | :--- |\n| 'r' | 默认值。以只读模式打开文件。文件完全不能被修改。如果文件不存在，将会出错。\
    \ |\n| 'w' | 以写入模式打开文件。如果文件已存在，它将被覆盖。如果不存在，它将被创建。 |\n| 'a' | 以写入/追加模式打开文件。所有写入文件的内容都将追加到末尾。如果文件不存在，它将被创建。\
    \ |\n| 'x' | 创建指定的文件。如果文件已存在，将会出错。 |\n\n## 文件名和路径\n\n此外，当我们打开文件时，我们需要向`open()`函数提供文件名和可选的路径。文件名可以是字符串字面量，也可以是包含字符串字面量的变量。而可选的路径，如果未提供，将使用启动Python解释器的当前目录，因为这是我们在此演示中工作的应用程序。否则，它将是我们指定的路径。\n\
    \n关于文件名及其路径信息，当路径从文件系统的根目录开始时，称为绝对路径；但如果从当前目录开始，则是相对路径。随着我们通过以下示例，这一点将变得更加清晰：\n\
    \n```\n>>> myFileRef = open(\"myPythonFile.txt\")\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nFileNotFoundError: [Errno 2]\
    \ No such file or directory: 'myPythonFile.txt'\n>>> myFileRef = open(\"myPythonFile.txt\"\
    , 'w')\n>>> myFileRef = open(\"myPythonFile.txt\")\n>>> myFileRef.close()\n>>>\n\
    ```\n\n你看，我们首先尝试打开文件\"myPythonFile.txt\"，没有提供模式，所以默认为'r'用于读取。然后我们收到一条错误消息，因为该文件不存在。然后我们尝试以'w'模式打开它进行写入，我们知道如果文件不存在，它将被创建。所以第二次`open()`调用成功，文件被创建并打开以供写入。\n\
    \n此外，当文件被打开时，`open()`调用会返回一个文件句柄或引用，以便我们稍后在代码中使用此引用来访问文件。我们将返回值赋给`myFileRef`。然后我们再次使用`open()`调用，不提供模式，因此使用默认的读取模式，现在调用成功，因为文件已经创建，因此存在。然后我们使用文件句柄通过执行`myFileRef.close()`来关闭文件。\n\
    \n现在让我们检查并查看我们引用的文件在文件系统中的位置。我们看到它是在我们启动Python解释器的同一目录中创建的，如下图所示，文本文件被高亮显示：\n\n\
    ![](img/b52ff7adacf4e0b514b791444be82d81_179_0.png)\n\n现在让我们尝试在文件系统的特定位置创建一个文件。我们知道为此，我们需要在调用`open()`时提供文件的绝对路径，如下所示：\n\
    \n```\n>>> myFileRef = open(r\"C:\\jc\\tmp\\pythonReadWriteTest.txt\", 'x')\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    FileExistsError: [Errno 17] File exists: 'C:\\jc\\tmp\\pythonReadWriteTest.txt'\n\
    >>>\n>>> myFilePath = \"C:\\jc\\tmp\\pythonReadWriteTest2.txt\"\n>>> myFileRef2\
    \ = open(myFilePath)\nTraceback (most recent call last):\n  File \"<stdin>\",\
    \ line 1, in <module>\nOSError: [Errno 22] Invalid argument: 'C:\\jc\\tmp\\pythonReadWriteTest2.txt'\n\
    >>>\n>>> myFilePath = r\"C:\\jc\\tmp\\pythonReadWriteTest2.txt\"\n>>> myFileRef2\
    \ = open(myFilePath)\nTraceback (most recent call last):\n  File \"<stdin>\",\
    \ line 1, in <module>\nFileNotFoundError: [Errno 2] No such file or directory:\
    \ 'C:\\jc\\tmp\\pythonReadWriteTest2.txt'\n>>> myFileRef2 = open(myFilePath, 'w')\n\
    >>>\n```\n\n所以你看，我们首先尝试使用模式'x'创建一个绝对路径为\"C:\\jc\\tmp\\pythonReadWriteTest.txt\"\
    的文件。但我们收到一个错误，表明该文件已存在。我们检查文件资源管理器，确实如此（我们稍后会有一张图片显示这一点。）另外请注意，我们在路径前放了一个字符`r`，表示这个字符串字面量应该被视为原始数据——这样Python解释器就不会尝试将反斜杠'\\\
    '视为转义字符，而是将整个字符串原样处理。\n\n然后我们使用了不同的文件名pythonReadWriteTest2.txt作为文件路径，并将其赋给变量`myFilePath`。但我们没有在前面加上字符'r'来使用原始字符串。所以当我们接下来尝试打开文件时，我们得到了一个错误。你可以清楚地看到路径信息被搞乱了，变成了'C:\\\
    jc\\tmp\\pythonReadWriteTest2.txt'。\n\n所以我们再次尝试使用原始字符串。然后我们使用默认模式'r'进行读取调用`open()`。但我们又得到了另一个错误。"
