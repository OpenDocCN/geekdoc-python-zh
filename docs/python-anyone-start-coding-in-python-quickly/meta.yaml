    \ | 返回一个字符串，其中指定值被替换为指定值 |\n| rfind() | 在字符串中搜索指定值并返回找到的最后一个位置 |\n| rindex() |\
    \ 在字符串中搜索指定值并返回找到的最后一个位置 |\n| rjust() | 返回字符串的右对齐版本 |\n| rpartition() | 返回一个元组，其中字符串被分成三部分\
    \ |\n| rsplit() | 在指定分隔符处分割字符串，并返回一个列表 |\n| rstrip() | 返回字符串的右修剪版本 |\n| split()\
