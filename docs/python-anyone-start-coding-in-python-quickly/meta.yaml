    Fib(1) = 1

    Fib(2) = Fib(0) + Fib(1)

    Fib(3) = Fib(1) + Fib(2)

    ...

    Fib(n-1) = Fib(n-3) + Fib(n-2)

    Fib(n) = Fib(n-2) + Fib(n-1)


