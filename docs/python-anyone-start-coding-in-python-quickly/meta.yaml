    | bytearray | 字节序列 | bytearray(b''Some ASCII'')<br>bytearray(b"Some ASCII")<br>bytearray([119,
    105, 107, 105]) |

    | bytes | 字节序列 | b''Some ASCII''<br>b"Some ASCII"<br>bytes([119, 105, 107, 105])
    |

    | complex | 包含实部和虚部的复数 | 3+2.7j |

    | dict | 键值对的关联数组（或字典）；可以包含混合类型（键和值），键必须是可哈希类型 | {''key1'': 1.0, 3: False} {}
    |

    | ellipsis | 省略号占位符，用于NumPy数组中的索引 | ... Ellipsis |

    | float | 双精度浮点数。精度取决于机器，但实践中通常实现为64位IEEE 754数字，具有53位精度。[95] | 1.414 |

    | frozenset | 无序集合，不包含重复项；如果可哈希，可以包含混合类型 | frozenset([4.0, ''string'', True])
    |

    | int | 任意精度的整数[96] | 42 |

    | list | 列表，可以包含混合类型 | [4.0, ''string'', True] [] |

    | NoneType | 表示值缺失的对象，在其他语言中通常称为null | None |

    | NotImplementedType | 一个占位符，可以从重载运算符返回，表示不支持的操作数类型。 | NotImplemented |

    | range | 数字序列，通常用于for循环中循环特定次数[97] | range(1, 10) range(10, -5, -2) |

    | set | 无序集合，不包含重复项；如果可哈希，可以包含混合类型 | {4.0, ''string'', True} set() |

    | str | 字符串：Unicode码点的序列 | ''Wikipedia'' "Wikipedia" """Spanning multiple lines"""
    |

    | tuple | 可以包含混合类型 | (4.0, ''string'', True) (''single element'',) () |


    现在我们可以使用一些变量来保存值。我们怎么做呢？我们通过赋值语句将值赋给变量。以下是一些示例：


    ```

    PageNumber = 8

    Pi = 3.1416

    MyString = "In Python, Spam and Eggs are used for fun in place of Foo and Bar"

    ```


    如你所见，我们尝试使用一些有意义的变量名，这被认为是一种良好的实践，因为它构成了代码内文档的一部分，使读者（包括我们自己，比如说三个月后）能更好地理解我们试图做什么。我们将在本章后面讨论更详细的文档注释。


    从这里开始，让我们过渡到以下部分涉及的更多细节。


    ## 运算符与操作数


    首先，让我们通过以下四个表格了解一些运算符（我们在上一节已经见过一些），这应该足够我们进行大多数编码。


    （Python有这7类运算符：算术运算符、赋值运算符、比较运算符、逻辑运算符、身份运算符、成员运算符、位运算符——我们现在只看前4种。）


    ### 算术运算符：


    | 运算符 | 名称/描述 | 示例 |

    | :--- | :--- | :--- |

    | + | 加法 | x + y |

    | - | 减法 | x - y |

    | * | 乘法 | x * y |

    | / | 除法 | x / y |

    | % | 取模 | x % y |

    | ** | 幂运算 | x ** y |

    | // | 整除 | x // y |


    ### 赋值运算符：


    | 运算符 | 等同于 | 示例 |

    | --- | --- | --- |

    | = | x = 5 | x = 5 |

    | += | x = x + 3 | x += 3 |

    | -= | x = x - 3 | x -= 3 |

    | *= | x = x * 3 | x *= 3 |

    | /= | x = x / 3 | x /= 3 |

    | %= | x = x % 3 | x %= 3 |

    | //= | x = x // 3 | x //= 3 |

    | **= | x = x ** 3 | x **= 3 |


    ### 比较运算符：


    | 运算符 | 名称/描述 | 示例 |

    | --- | --- | --- |

    | == | 等于 | x == y |

    | != | 不等于 | x != y |

    | > | 大于 | x > y |

    | < | 小于 | x < y |

    | >= | 大于或等于 | x >= y |

    | <= | 小于或等于 | x <= y |


    ### 逻辑运算符：


    | 运算符 | 描述 | 示例 |

    | --- | --- | --- |

    | and | 如果两个语句都为真，则返回True | x < 5 and x < 10 |

    | or | 如果其中一个语句为真，则返回True | x < 5 or x < 4 |

    | not | 反转结果，如果结果为真，则返回False | not(x < 5 and x < 10) |


    大多数运算符是二元运算符——意味着它们接受两个操作数。例如，x + y，其中运算符+接受两个操作数x和y。也有一元运算符，如-，这在上述运算符表中没有描述。但一个例子是，运算符“-”可以简单地应用于变量前面，如-x，以获得x的负值，就像-3得到负3一样。


    ## 变量


    关于变量，我们已经知道它有一个名称，比如x，这是它的标识。标识有一个标识符，那就是它的名称。在Python中，名称可以是任何东西，只要它不是保留关键字，并且遵循以下规则：你可以使用任何字母、数字和一些符号（例如标点符号）的组合，只要第一个字符不是数字。


    以下是Python关键字列表：


    - False

    - None

    - True

    - __peg_parser__

    - and

    - as

    - assert

    - async

    - await

    - break

    - class

    - continue

    - def

    - del

    - elif

    - else

    - except

    - finally

    - for

    - from

    - global

    - if

    - import

    - in

    - is

    - lambda

    - nonlocal

    - not

    - or

    - pass

    - raise

    - return

    - try

    - while

    - with

    - yield


    事实上，你可以在Python解释器中输入命令help("keywords")，它会给你一个关键字列表，就像我们刚刚展示的列表一样。在这里，help也像一个函数一样工作——就像我们已经使用过几次的print()函数，我们很快会进一步扩展关于函数print()的内容。


    不同Python版本的关键字略有不同，但这个列表是全面的，无论我使用哪个Python版本，我都会避免使用其中任何一个。


    此外，在基本层面上，变量实际上是对内存位置的引用，变量的值就存储在那里。


