    就这么简单——一行代码。试试看！许多计算机语言都用这个程序作为编程入门，关于它的起源有各种不同的说法。不过，与之相关的可能更有趣的是动画科幻电影《你好，世界》，毕竟计算机发展与科幻题材一直有着不解之缘——半开玩笑地说。


    好了，我们已经完成了第一个程序，它会打印/显示这句介绍性语句。希望它不会让你感到畏惧。


    既然我们已经完成了第一个程序，现在让我们深入Python编程。首先，让我们用Python的方式进入编程世界，介绍另一个替代的入门程序：


