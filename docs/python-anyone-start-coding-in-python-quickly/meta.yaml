    Once I am in Python, I can use the usual ctrl-z to suspend it into background
    and use fg (foreground) command to bring it back. Or if I use ctrl-d then I will
    exit Python interpreter and get back to the Linux shell.


    If you are on Mac, since MacOS is in the Unix operating system family so it should
    not be diverging much from the Linux situation above. As for the rest of the book,
    since I happened to use a Windows 10 virtual machine for this book, so all the
    screenshots of examples will be from Windows 10. But once you are in Python shell/interpreter,
    it should not matter which underlying operating system you are on as the process
