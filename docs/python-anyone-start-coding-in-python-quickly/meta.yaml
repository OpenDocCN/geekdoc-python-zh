    # Function as building block


    Function is in a way a branching technique as it takes the code execution out
    of the normal flow and “jump” to the code segment of the definition of the function.
    But function also has another good function (pun intended), which is to package
    what it does in a single block of code that could be used later – usually in multiple
    occasions. These occasions could be just a simple function invocation in the code,
    or it could be by other functions – as after all, you can treat your entire code
    for the app as the highest level of function and there could be multiple layers
    of functions forming the hierarchy of the abstraction so that at each of the layer
    of the hierarchy, the coder only need to concern about the current function which
    is being dealt with, without worrying about the details of any other underlying
    functions – essentially treating all other functions as some sort of black boxes.


    And this is a very important design philosophy, that is, to break down a complex
    task into smaller chunks, sometimes much smaller, which are simpler and much more
    manageable during the coding effort, as well as for readers reading the code later.


    Also, in many ways, the functions in coding languages are very much like the functions
    we used in the mathematical world as mentioned earlier. Each of these functions,
    when called upon, will be executed and if there is a return value, the return
    value is the result of the evaluation of the function – just like in the math
    world. Following are some more examples to demonstrate the point here:'
- md: "## Void Function (Divergence From Mathematical Function)\n\nHowever, as the\
    \ heading of this section suggested, there is a notion void function in many programming\
    \ languages including Python. These functions are not returning value thus if\
    \ needed to be evaluated, they evaluate to nothing and are called void function,\
    \ as the return value is said to be void and Python has a special object None\
    \ to represent this as shown in the following illustration:\n\n```python\n>>>\
    \ def myPy() :\n...     print('Spam and eggs')\n...\n>>> myPy()\nSpam and eggs\n\
    >>> print(myPy())\nSpam and eggs\nNone\n```\n\nSo you see that we repackaged the\
    \ my.py script into a function myPy() , which just display one line of text without\
    \ any returning value. We then executed the function. And finally we used print(myPy())\
    \ to display what the value of myPy(). The result are the 2 lines following the\
    \ print() call. First it displayed the line 'Spam and eggs' when myPy() was executed,\
    \ then None is displayed as the value of myPy(), which shows that myPy() has no\
    \ value, as it doesn't return any value, or it returns None.\n\nNow that we have\
    \ looked into the usages of function calls, let's dive a bit deeper into how function\
    \ calls are structured and implemented – as a bit advanced knowledge for us to\
    \ get into more of the coding world – although this book is intended for audience\
    \ starting to explore coding but it won't hurt to get a bit more ready for future\
    \ venture into advanced programming and software engineering.\n\n## Call stack\n\
    \nSo in this section, we have the title call stack. What is it? And why do we\
    \ need it and want to talk about it? So in case you have not started wondering,\
    \ when a function call is made and executed, the processing flow is altered to\
    \ run the statements in the called function. But when the function execution is\
    \ finished, we are to return to the caller. Yet how would the computer know where\
    \ to return and how is it implemented? If this does not sound too complicated,\
    \ how about we have a series of function calls? For example, let’s say that in\
    \ main() we are calling spam() , and then spam() is calling egg() and then egg()\
    \ is calling ham() ?\n\nIt turns out that, in the computer science world, we have\
    \ something named call stack to manage this. We have the following diagrams to\
    \ show how it works: (on the left hand side are the codes; and on the right hand\
    \ side are the call stacks)\n\n```python\ndef ham():\n    print('in ham()-beginning')\n\
    \    print('in ham()-ending')\n\ndef egg():\n    print('in egg()-beginning')\n\
    \    print('in egg()-ending')\n\ndef spam():\n    print('in spam()-beginning')\n\
    \    egg()\n    ham()\n    print('in spam()-ending')\n\ndef main(): # not the\
    \ required way to start in Python\n    #although it is required in many other\
    \ languages\n    print('in main()-beginning')\n    spam()\n    print('in main()-ending')\n\
    \nmain()\n```\n\n![](img/b52ff7adacf4e0b514b791444be82d81_136_0.png)\n\nSo at\
    \ the beginning, the execution is to start at main(), and the call stack has only\
    \ one stack frame with main() as just shown above, such that when the execution\
    \ flow is altered by function call to spam() and then return from spam() after\
    \ it's done, we can restore the context for main() – e.g. we know where in main()\
    \ to return to - in this case, right after the spam() line but before the print('in\
    \ main()-ending') statement. (There are other things call stack handles but we\
    \ will leave that to the future more advanced stage in your Python journey.) So\
    \ after the first print() statement in main(), we are to call spam(), thus we\
    \ need a corresponding stack frame for spam() – as shown below: (for this illustration,\
    \ we are ignoring print although it's also a function call)\n\n```python\ndef\
    \ ham():\n    print('in ham()-beginning')\n    print('in ham()-ending')\n\ndef\
    \ egg():\n    print('in egg()-beginning')\n    print('in egg()-ending')\n\ndef\
    \ spam():\n    print('in spam()-beginning')\n    egg()\n    ham()\n    print('in\
    \ spam()-ending')\n\ndef main(): # not the required way to start in Python\n \
    \   # although it is required in many other languages\n    print('in main()-beginning')\n\
    \    spam()\n    print('in main()-ending')\n\nmain()\n```\n\n![](img/b52ff7adacf4e0b514b791444be82d81_137_0.png)\n\
    \nThen in spam(), we are to call egg(), so we need a stack frame for egg(), as\
    \ shown below:\n\n```python\ndef ham():\n    print('in ham()-beginning')\n   \
    \ print('in ham()-ending')\n\ndef egg():\n    print('in egg()-beginning')\n  \
    \  print('in egg()-ending')\n\ndef spam():\n    print('in spam()-beginning')\n\
    \    egg()\n    ham()\n    print('in spam()-ending')\n\ndef main(): # not the\
    \ required way to start in Python\n    # although it is required in many other\
    \ languages\n    print('in main()-beginning')\n    spam()\n    print('in main()-ending')\n\
    \nmain()\n```\n\n![](img/b52ff7adacf4e0b514b791444be82d81_138_0.png)\n\nAfter\
    \ egg() is done and returned to spam(), the egg() stack frame is removed from\
    \ the top of the call stack. We then progress to the call to ham() thus a ham()\
    \ stack frame is pushed onto the top of the call stack, as depicted below:\n\n\
