    \ = 0\n>>> while counter != 5 :\n...     counter = counter + 2\n...\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 2, in <module>\nKeyboardInterrupt\n\
    >>> \n>>> counter = 10\n>>> while counter > 0 :\n...     counter = counter + 1\n\
    ...\nTraceback (most recent call last):\n  File \"<stdin>\", line 2, in <module>\n\
    KeyboardInterrupt\n>>> \n```\n\nIn the first example, we have some bad coding\
    \ practice. We used != in the while condition, and the counter is incremented\
    \ by 2 in each iteration. Thus the counter will never be 5. In fact, the counter\
    \ goes from 0, to 2, 4, then 6, 8 ... So it is an infinite loop which will never\
