    \ with the finally clause as shown. With the modifications, we tried a few calculations\
    \ including divide-by-0 to see the exception handling. We also got another error\
    \ in the end as shown in the following:\n\n![](img/b52ff7adacf4e0b514b791444be82d81_193_0.png)\n\
    \nSo we calculated 20 / 4 and then tried 20 / 0. We were able to handle this exception\
    \ gracefully. But then instead of using CTRL-c to exit, we simply hit the return\
    \ key and got a different exception of ValueError. So what happened is that we\
    \ didn't enter anything and our code was taking it as the input and tried to convert\
