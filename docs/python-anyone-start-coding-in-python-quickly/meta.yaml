    As you can see, the _courseName is supposedly protected and the __studentsList
    is private. First the myGradeBook object is created and the two data members have
    the expected data as instantiated. But when we tried to modify the protected _courseName,
    it was indeed modified. And the messier situation is with the private __studentsList.
    When the modification was tried on the private data member, it didn''t actually
    go through. But when we tried it on the mangled name which Python does on private
    variable (which is of the form objectName._ClassName__variableName), we were able
    to modify it, thus the studentsList was altered.


    So the Python philosophy is that it''s a different programming language (different
    from languages such as C++) and that coders should be responsible adults to respect
    the access specifiers. Also since Python is not a compiled language so there is
    no compiler to check if the usage of protected or private data members are following
    the access rules anyway. Thus it''s all upon us coders to make sure that the rules
    are followed.'
