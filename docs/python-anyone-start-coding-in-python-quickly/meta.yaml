    A formated string for math value pi 3.14.

    ```


    Following are couple more examples to play with. Of course, there are numerous
    ways to do these formatting so feel free to play with them.


    ```

    >>> print(''{:10s} {:10s} {}''.format(''spam'', ''egg'', ''ham''))

    spam       egg        ham

    >>> print(''{1} and {0}''.format(''spam'', ''egg''))

    egg and spam

    ```


    You might have seen some older ways for string formatting so we will just mention
    it here. There is an operator % (modulo) which is usually used for modulo calculation
    (which returns the remainder in a division.) This % could be used for string formatting
    in the form `string` % <values> and the %s in the string are replaced with the
    value(s), such as the following examples show:


    ```

    >>> print(''The math value pi is %5.3f.'' % pi)

    The math value pi is 3.142.

