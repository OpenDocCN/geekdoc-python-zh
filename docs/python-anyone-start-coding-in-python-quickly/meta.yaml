    # Precedence vs. Association


    Now we have seen some operators at work and that we have talked about more complex
    statements, how do we evaluate an expression when there are multiple operators
    involved? The answer turns out is very similar, again, to what we have learned
    in the math world. There is an order of operation which is called precedence.
    We learned as a child already that multiplication/division takes precedence over
    addition/subtraction. This same rule applies in the computer world as well. We
    have a precedence table below to guide us how these evaluations could be done
    in the correct order: (this is a complete list so there are some operators in
    this table which we have not covered although we will cover quite a number of
    them in this book)


    | Operator | Description |

    |---|---|

    | () | Parentheses (grouping) |

    | f(args...) | Function call |

    | x[index:index] | Slicing |

    | x[index] | Subscription |

    | x.attribute | Attribute reference |

    | ** | Exponentiation |

    | ~x | Bitwise not |

    | +x, -x | Positive, negative |

    | *, /, % | Multiplication, division, remainder |

    | +, - | Addition, subtraction |

