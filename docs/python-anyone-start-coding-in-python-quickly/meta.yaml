    # Chapter 5 Input/Output


    In this chapter, we will look into how to take input from user (console in many
    coding environments/IDEs – in fact, to be more accurately, keyboard is where the
    input is coming from – we see our input on the console monitor simply because
    all of our key strokes are “echoed” on the display); and how to send output to
    display (which is the monitor where the console window is hosted) as input and
    output.


    # Input From Keyboard


    So let’s look at this very simple code in the following snippet:


    ```

    >>>

    >>> i = input()

    3

    >>> print(i)

    3

    >>>

    ```


    As you can see, we asked the user to input, from console, an integer. The user
    entered 3 and then hit the return/enter key to signal the entry of the input.
    We then printed the variable which was assigned with the input via the statement
    i = input() .


    So pretty straightforward. Let’s elaborate a bit more. Check out the following
    code:'
