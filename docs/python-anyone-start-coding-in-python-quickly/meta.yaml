  md: '# Chapter 4 Data Types & Structures


    In Python (or most of the programming languages), as mentioned in last chapter,
    a variable is just a name that refers to a piece of data in memory (if not already
    in memory, it will be loaded into memory.) It is a mechanism that makes it easy
    for you, the programmer, to store and retrieve data. Internally, the Python interpreter
    keeps track of the variable names that you create and the pieces of data to which
    those variable names refer. Any time you need to retrieve one of those pieces
    of data, you simply use the variable name that refers to it.


    A variable in Python can refer to items of any type. After a variable has been
    assigned an item of one type, it can be reassigned an item of a different type.
    (This is called dynamic typing and we have more explanation in the coming section
    titled Dynamic Typing.)


    So we’ve seen some basic types in the previous chapter. Please refer back if you
    are not familiar yet with the basic types. Now, let’s see the different data types
    Python has and then later in the chapter we will have some treatments for a specific,
    interesting type – string.


    # Python Data Types


    Python has the following built-in data types:


    | Type | Syntax |

    |---|---|

    | Text | str |

    | Numeric | Int, float, complex |

    | Sequence | List, tuple, range |

    | Mapping | dict |

    | Set | Set, frozenset |'
