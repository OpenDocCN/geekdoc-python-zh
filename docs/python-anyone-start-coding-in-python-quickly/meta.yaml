- md: "## Conditional Statement Using if With Alternative Branch Using else (if-then-else)\n\
    \nNow let’s look at the conditional statement with alternative branch in addition.\
    \ The first part of the syntax is the same where we have the if keyword, and end\
    \ the line with the : character, then we have another keyword else followed by\
    \ the : character.\n\n```\nif condition A is met :\n    Do something\nelse :\n\
    \    Do something else\n```\n\nAgain let’s use the everyday life example we had\
    \ earlier:\n\n```\nif it rains :\n    I will bring an umbrella with me\nelse :\n\
    \    I will not bring an umbrella with me\n```\n\nAgain translated to the Python\
    \ syntax:\n\n```\nif isRaining == True :\n    bringUmbrella = True\nelse :\n \
    \   bringUmbrella = False\n```\n\nAnd in this way, we have an alternative branch\
    \ to be executed when the condition in the if statement is evaluated to be False.\n\
    \nFollowing are some examples to see how it works. They basically follow the “if\
    \ this then that, else some other stuff” or if-then-else pattern.\n\n```\n>>>\
    \ x = 1\n>>> y = 2\n>>> if x > y :\n...     print('x > y')\n... else :\n...  \
    \   print('x < y')\n...\nx < y\n>>> isRaining = True\n>>> bringUmbrella = False\n\
    >>> if isRaining :\n...     bringUmbrella = True\n... else :\n...     bringUmbrella\
    \ = False\n...\n>>> isRaining\nTrue\n>>> bringUmbrella\nTrue\n>>> isRaining =\
    \ False\n>>> bringUmbrella = False\n>>> if isRaining :\n...     bringUmbrella\
    \ = True\n... else :\n...     bringUmbrella = False\n...\n>>> isRaining\nFalse\n\
    >>> bringUmbrella\nFalse\n>>>\n```\n\nSo from these examples, you see how the\
    \ if-then-else statements work. Note that before any of the if-then-else statement,\
    \ we always initialize the two variables isRaining and bringUmbrella; thus we\
    \ can observe the outcome of the if-then-else statement afterwards by showing\
    \ the value of these two variables again. You can certainly come up with many\
    \ different variations as you see fit when you are coding to solve some specific\
    \ problems. The following is the flow chart.\n\nOne thing to note is that when\
    \ coding in Python, since variables do not need to be declared before use, typo\
    \ in the variable name could have some really undesirable and bizarre effect.\
    \ For instance, if in the code above the variable name bringUmbrella in the if-then-else\
    \ statement is typed wrongly, e.g. bringumbrella, with just the uppercase U miss\
    \ typed in lowercase, the code will execute with no problem, but the outcome will\
    \ be that the correct variable bringUmbrella is not properly modified when necessary,\
    \ and the code logic is adversely affected such that the result produced from\
    \ the code will not be correct – so something to keep in mind and be careful about.\n\
    \n## Multiple if-else Chained Together\n\nSometimes there are multiple alternatives\
    \ thus we need more than two branches. In these situations, we can chain multiple\
    \ of the if-else statements together. For example:\n\n```\n>>>\n>>> x = 1\n>>>\
    \ y = 2\n>>>\n>>> if x < y :\n...     print('x < y')\n... else :\n...     if x\
    \ == y :\n...         print('x == y')\n...     else :\n...         if x > y :\n\
    ...             print('x > y')\n...\nx < y\n>>>\n```\n\nIn this example, we see\
    \ that x and y are compared using different logic operators and there are 3 different\
    \ alternatives: either x < y, or x == y, or x > y.\n\nHowever, you see that the\
    \ way they are chained, if there are many more branches, we could easily be indented\
    \ towards the right hand side of the screen, due to the indentations one after\
    \ another, thus typing/coding becomes really inconvenient and awkward as we approach\
    \ the right hand side of the screen with very little space left for each line\
    \ of code. For this situation, we have a way to alleviate the awkwardness by combining\
    \ else and if to become elif, as shown in the following examples:\n\n```\n>>>\n\
    >>> x = 1\n>>> y = 2\n>>>\n>>> if x < y :\n...     print('x < y')\n... elif x\
    \ == y :\n...     print('x == y')\n... elif x > y :\n...     print('x > y')\n\
    ...\nx < y\n>>>\n>>> if x < y :\n...     print('x < y')\n... elif x == y :\n...\
    \     print('x == y')\n... else :\n...     print('x > y')\n...\nx < y\n>>>\n```\n\
    \nSo you see that in the first example, there are two elif branches for the 2nd\
    \ and 3rd situations, and there is not an else branch, which is allowed in Python\
    \ syntax, and these branches are not indented such that we don't have one indentation\
    \ after another to put us towards the end of the line for each new line of code.\
    \ In the second example, the 3rd branch is simply coded in the else branch – there\
    \ is no logical operator used here to check the condition as there is only one\
    \ possibility left. This second example gives the exact outcome as the first example.\
    \ Couple of things to know here is that in these chained if-elif-else statements,\
    \ you can have as many elif branches as needed, and there is no need to have else\
    \ branch; but if you do want to have the else branch, it has to be the last branch\
    \ in the chained statements – as demonstrated in the examples.\n\nThe following\
    \ is the flow chart of the first example.\n\nWe also have the following flow chart\
    \ for the second example.\n\n## Nested if-else\n\nThere are situations, however,\
    \ not only the chained if-else is needed, but we also may need to nest them one\
    \ inside another. Let’s look at how it’s coded in the following example:\n\n```\n\
    >>>\n>>> x = 1\n>>> y = 2\n>>> z = 3\n>>>\n>>> # Let's find the largest among\
    \ x, y, z\n>>> # We are assuming they are distinct\n>>> # so no need to consider\
    \ == situation\n>>>\n>>> if x > y :\n...     if x > z : ### now x is > both y,\
    \ z\n...         print('x is the largest')\n...     else : ### x > y but x < z\
    \ thus z > x > y\n...         print('z is the largest')\n... else : ### x < y\n\
    ...     if y < z : ### now we have x < y and y < z\n...         print('z is the\
    \ largest')\n...     else : ### now we know x < y and z < y\n...         print('y\
    \ is the largest')\n...\nz is the largest\n>>>\n```\n\nWe already saw some of\
    \ the logic thinking in the chained if-else, but now with this example, it becomes\
    \ clear how some versatile nesting could be done in many different ways.\n\nSo\
    \ there you have it, the branching mechanism in coding, although demonstrated\
    \ for this book in Python, this is essentially the same mechanism for almost all\
    \ higher level languages in the coding world, albeit with varying syntax, but\
    \ the high level logic is pretty much the same."
  mdcn: "## 使用 if 的条件语句与使用 else 的替代分支（if-then-else）\n\n现在让我们看看带有替代分支的条件语句。语法的第一部分是相同的，我们有\
    \ `if` 关键字，并以 `:` 字符结束该行，然后我们有另一个关键字 `else`，后跟 `:` 字符。\n\n```\nif condition A\
    \ is met :\n    Do something\nelse :\n    Do something else\n```\n\n再次让我们使用之前日常生活中的例子：\n\
    \n```\nif it rains :\n    I will bring an umbrella with me\nelse :\n    I will\
    \ not bring an umbrella with me\n```\n\n再次转换为 Python 语法：\n\n```\nif isRaining\
    \ == True :\n    bringUmbrella = True\nelse :\n    bringUmbrella = False\n```\n\
    \n这样，当 `if` 语句中的条件被评估为 `False` 时，我们有一个替代分支可以执行。\n\n以下是一些示例，看看它是如何工作的。它们基本上遵循“如果这样，那么那样，否则其他事情”或\
    \ if-then-else 模式。\n\n```\n>>> x = 1\n>>> y = 2\n>>> if x > y :\n...     print('x\
    \ > y')\n... else :\n...     print('x < y')\n...\nx < y\n>>> isRaining = True\n\
    >>> bringUmbrella = False\n>>> if isRaining :\n...     bringUmbrella = True\n\
    ... else :\n...     bringUmbrella = False\n...\n>>> isRaining\nTrue\n>>> bringUmbrella\n\
    True\n>>> isRaining = False\n>>> bringUmbrella = False\n>>> if isRaining :\n...\
    \     bringUmbrella = True\n... else :\n...     bringUmbrella = False\n...\n>>>\
    \ isRaining\nFalse\n>>> bringUmbrella\nFalse\n>>>\n```\n\n所以从这些例子中，你可以看到 if-then-else\
    \ 语句是如何工作的。请注意，在任何 if-then-else 语句之前，我们总是初始化两个变量 `isRaining` 和 `bringUmbrella`；因此我们可以通过再次显示这两个变量的值来观察\
    \ if-then-else 语句的结果。当然，当你在编码解决某些特定问题时，你可以根据需要想出许多不同的变体。以下是流程图。\n\n需要注意的一点是，在\
    \ Python 中编码时，由于变量在使用前不需要声明，变量名中的拼写错误可能会产生一些非常不理想和奇怪的效果。例如，如果在上面的代码中，if-then-else\
    \ 语句中的变量名 `bringUmbrella` 被错误地输入，例如 `bringumbrella`，只是将大写的 `U` 错误地输入为小写，代码将正常执行，但结果将是正确的变量\
    \ `bringUmbrella` 在必要时未被正确修改，并且代码逻辑受到不利影响，导致代码产生的结果不正确——所以这是需要记住并小心的事情。\n\n##\
    \ 多个 if-else 链接在一起\n\n有时有多个替代方案，因此我们需要超过两个分支。在这些情况下，我们可以将多个 if-else 语句链接在一起。例如：\n\
    \n```\n>>>\n>>> x = 1\n>>> y = 2\n>>>\n>>> if x < y :\n...     print('x < y')\n\
    ... else :\n...     if x == y :\n...         print('x == y')\n...     else :\n\
    ...         if x > y :\n...             print('x > y')\n...\nx < y\n>>>\n```\n\
    \n在这个例子中，我们看到 `x` 和 `y` 使用不同的逻辑运算符进行比较，并且有 3 种不同的替代方案：要么 `x < y`，要么 `x == y`，要么\
    \ `x > y`。\n\n然而，你看它们链接的方式，如果有更多的分支，由于一个接一个的缩进，我们很容易会缩进到屏幕的右侧，因此随着我们接近屏幕的右侧，每行代码的空间非常小，输入/编码变得非常不方便和笨拙。对于这种情况，我们有一种方法来缓解这种尴尬，即将\
    \ `else` 和 `if` 结合起来变成 `elif`，如以下示例所示：\n\n```\n>>>\n>>> x = 1\n>>> y = 2\n>>>\n\
    >>> if x < y :\n...     print('x < y')\n... elif x == y :\n...     print('x ==\
    \ y')\n... elif x > y :\n...     print('x > y')\n...\nx < y\n>>>\n>>> if x < y\
    \ :\n...     print('x < y')\n... elif x == y :\n...     print('x == y')\n... else\
    \ :\n...     print('x > y')\n...\nx < y\n>>>\n```\n\n所以你可以看到，在第一个例子中，对于第二种和第三种情况有两个\
    \ `elif` 分支，并且没有 `else` 分支，这在 Python 语法中是允许的，并且这些分支没有缩进，这样我们就不会有一个接一个的缩进将我们带到每行新代码的行尾。在第二个例子中，第三个分支只是在\
    \ `else` 分支中编码——这里没有使用逻辑运算符来检查条件，因为只剩下一种可能性。第二个例子给出了与第一个例子完全相同的结果。这里需要知道几件事：在这些链接的\
    \ if-elif-else 语句中，你可以根据需要有任意多个 `elif` 分支，并且不需要有 `else` 分支；但如果你确实想要有 `else` 分支，它必须是链接语句中的最后一个分支——如示例所示。\n\
    \n以下是第一个例子的流程图。\n\n我们还有第二个例子的流程图。\n\n## 嵌套 if-else\n\n然而，有些情况不仅需要链接的 if-else，我们还可能需要将它们一个嵌套在另一个内部。让我们看看在以下示例中是如何编码的：\n\
    \n```\n>>>\n>>> x = 1\n>>> y = 2\n>>> z = 3\n>>>\n>>> # 让我们找出 x, y, z 中最大的\n>>>\
    \ # 我们假设它们是不同的\n>>> # 所以不需要考虑 == 的情况\n>>>\n>>> if x > y :\n...     if x > z :\
    \ ### 现在 x > y 和 z\n...         print('x is the largest')\n...     else : ###\
    \ x > y 但 x < z 所以 z > x > y\n...         print('z is the largest')\n... else\
    \ : ### x < y\n...     if y < z : ### 现在我们有 x < y 和 y < z\n...         print('z\
    \ is the largest')\n...     else : ### 现在我们知道 x < y 和 z < y\n...         print('y\
    \ is the largest')\n...\nz is the largest\n>>>\n```\n\n我们已经在链接的 if-else 中看到了一些逻辑思考，但现在通过这个例子，可以清楚地看到如何在许多不同的方式中进行一些多功能的嵌套。\n\
    \n所以，这就是编码中的分支机制，虽然在本书中用 Python 演示，但这本质上是编码世界中几乎所有高级语言的相同机制，尽管语法不同，但高级逻辑基本相同。"
