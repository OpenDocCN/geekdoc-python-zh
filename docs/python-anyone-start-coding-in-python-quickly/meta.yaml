- img_proc: true
  md: 'A couple of consequences from this “catch-all” approach. First of all, there
    is no individual exception treatment anymore as we don’t have separate clauses
    for each exception. Secondly, since all exceptions are caught, when we hit CTRL-c
    to get out of the infinite loop, we cannot. As you may observe from the results:
    we first had a divide-by-0 exception, then we simply hit enter as we did before;
    but the 3<sup>rd</sup> input was actually a CTRL-c hence the output is a bit messed
    up – in that, the “Something went wrong …” text didn’t start in a new line. However,
    we were not able to break out of the infinite loop since the CTRL-c “exception”
    was caught. The only way to get out is to close out this command window. So this
    “catch-all” treatment might be tempting, but may not necessarily be the best practice.


