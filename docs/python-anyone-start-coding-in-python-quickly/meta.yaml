    # while Loop


    We learned about string early on. Now let’s use some strings to demonstrate how
    repetition is performed. Let’s say we have'
  - '[PAGE 105]


    some string and we want to process through it one character at a time, starting
    from the beginning. As we encounter each character, we want to do some processing,
    and each character processing is considered one iteration/loop. Once we reach
    the end of the string and finished with the last character, we are done with the
    string thus we exit the looping.


    So for instance, we want to traverse through the string to print each character,
    one character per line, as shown in the following example:


    ```

    >>>

    >>> myString = ''Python Anyone?''

    >>> myStringLength = len(myString)

    >>>

    >>> myStringLength

    14

    >>>

    >>> stringIndex = 0

    >>> while stringIndex < myStringLength :

    ...     print(myString[stringIndex])

    ...     stringIndex = stringIndex + 1

    ...

    P

    y

    t

    h

    o

    n


    A

    n

    y

    o

    n

    e

    ?

    >>>

    ```'
  - '[PAGE 106]


    Following is the flow chart for the while loop:


    ![](img/b52ff7adacf4e0b514b791444be82d81_106_0.png)


    In many other languages, there is also a slight variation to the while loop, which
    is the do ... while loop, where the code block is executed at least once (the
    first iteration), and then the condition is checked (in other words, you do something
    first, and then the while loop condition is checked to see if you continue and
    for how many more loops.) Python however does not have a do...while loop. But
    you can certainly try to mimic the behavior by combining different initialization
    and statements, which is left for your imagination as an exercise for yourself.
    If you, by this point, still find this exercise challenging, maybe you can read
    the following section of the for loop and then come back to finish up this exercise.
    With more experience in the various mechanisms of looping, by then hopefully this
    exercise is just a piece of cake for you.


    # for Loop


    Python does have a for loop which could be used for repetition in code logic just
    as while loop. There are occasions'
  - '[PAGE 107]


    where one is more suitable than the other but personal preference also plays a
    role here. As you gain more coding experience, you will likely develop your own
    habits in preferring using one or the other, under different circumstances.


    So the for loop: First of all, the obvious difference lies in syntax. By examining
    the following flow chart it should become apparent:


    ![](img/b52ff7adacf4e0b514b791444be82d81_107_0.png)


    So you will find that the syntax is different as we will see in examples below.
    But also Python for loop is different from many other languages, such that there
    is no loop counter in our flow chart. As Python for loop is used more like an
    iterator in object-oriented programming languages such that it iterates through
    some sequence, e.g. string and list which we used before. Let’s see some for loop
    examples to make it clearer:'
  - '[PAGE 108]


    ```

    >>> myString = ''spam and egg''

    >>> for c in myString :

    ...     print(c)

    ...

    s

    p

    a

    m


    a

    n

    d


    e

    g

    g

    >>> myList = [''spam'', ''egg'', ''ham'']

    >>> for ob in myList :

    ...     print(ob)

    ...

    spam

    egg

    ham

    >>>

    ```


    As you can see, in the first example, the for loop was iterating through the characters
    of the string; whereas in the second example, it was iterating through a list
    of items/objects. We have yet another example below demonstrating how we can use
    a for loop to count the number of characters in a string, and to get us the same
    result as using the function len() for the string length:'
  - '[PAGE 109]


    ```

    >>> myString = ''spam''

    >>> len(myString)

    4

    >>> count = 0

    >>> for letter in myString :

    ...     count = count + 1

    ...

    >>> count

    4

    >>>

    ```


    So now you know how len() might have been implemented in Python. Let’s carry on
    and look at a couple of specific commands in Python (and many other languages)
    in dealing with the flow of looping.


    # break Statement


    The break statement is used to get out of a loop such as the following example
    shows:'
  - '[PAGE 110]


    ```

    >>> while True :

    ...     inputLine = input()

    ...     if inputLine == ''exit'' :

    ...         break

    ...     print(inputLine)

    ...

    This is to test break statement

    This is to test break statement

    Here comes another line of input

    Here comes another line of input

    Alghough the while True gives us an infinite loop

    Alghough the while True gives us an infinite loop

    We use break to end the loop

    We use break to end the loop

    exit

    >>>

    ```


    So we have an infinite loop in this example with while True , such that the condition
    to stay in the loop is always True . So how do we end this loop? We check if the
    user input is ‘exit’, and if that’s the case we execute break to break out of
    the loop. As seen in the example above, each input line is repeated by the print()
    statement until we entered “exit”.


    # continue Statement


    We now have seen the break statement and how it works. On the other hand, we have
    a continue statement which will also alter the flow of repetition. When a continue
    statement is encountered, the flow of execution will jump to the end of the current
    iteration, which may or may not be the last iteration of the loop. Let’s look
    at the following example and it will become clear how continue statement is used:'
