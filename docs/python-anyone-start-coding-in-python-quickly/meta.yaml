    >>> myGradeBook2.setCourseName("Python Anyone by Jesse Chou")

    >>> myGradeBook2.getCourseName()

    ''Python Anyone by Jesse Chou''

    >>> myGradeBook.getCourseName()

    ''Python Anyone by Jesse Chou''

    >>>


    As you can see, the myGradeBook has a courseName “Python Anyone, 2nd edition”.
    We then execute the statement to assign myGradeBook to myGradeBook2. But instead
    of a new object, it is basically just creating a reference to the same object,
    often called aliasing. Then we checked the data member courseName of myGradeBook2.
    No surprise here that its value is “Python Anyone, 2nd edition”.


    Then we made some modification to the courseName of myGradeBook2 to become “Python
    Anyone by Jesse Chou” and verified that it’s indeed the case using the member
    method getCourseName of myGradeBook2. Yet the surprise is that the courseName
    data member value in myGradeBook was also changed – indicating to us that they
    are actually the same object.


    So then how do we do copy? It turns out that there is a Python module named copy
    for it. As illustrated in the following:


    >>> import copy

    >>> myGradeBookTwo = copy.copy(myGradeBook)

    >>> myGradeBook.getCourseName()

    ''Python Anyone by Jesse Chou''

    >>> myGradeBookTwo.getCourseName()

    ''Python Anyone by Jesse Chou''

    >>>


    So in this example, we import the copy module in order to use the copy function,
    which duplicates any object, including the custom-type or user-defined class object.
    As we can see, we copied myGradeBook to myGradeBookTwo and checked that the courseName
    are the same for both objects.


    But are they really two separate objects? We have the following code to prove
    it:


    >>> myGradeBookTwo.setCourseName("Python Anyone, 2nd edition, by Jesse Chou")

    >>> myGradeBookTwo.getCourseName()

    ''Python Anyone, 2nd edition, by Jesse Chou''

    >>> myGradeBook.getCourseName()

    ''Python Anyone by Jesse Chou''

    >>>


    So we modified the courseName in the copy myGradeBookTwo and verified using the
    getCourseName method. We then use the same method on myGradeBook to observe that
    it stays as before without being modified. Thus it''s obvious that they are two
    separate objects. We''ve indeed made a copy as a new object, as opposed to simply
    aliasing a reference to the same object.


    ## Procedural programming vs. object-oriented programming (vs. functional programming)


    Now, let''s drill into some comparisons: There are different programming paradigms
    and we are mostly focused on the traditional procedural programming vs. the object-oriented
    programming. But since we are at this, so we will cover a bit of functional programming
    as well.


    Traditionally, procedural programming was popular, at least before software becomes
    so huge such that it becomes harder and harder to manage. Nowadays, millions of
    lines of code is very much commonplace and a lot of times even hundreds of millions
    lines of code. It''s pretty clear that no ordinary human can remember and organize
    them well with a monolithic, large piece of code. Therefore many techniques were
    developed to cope with this volume, and to better organize the code for large
    team of coders to collaborate, as it’s obvious that project of this magnitude
    requires a team as no individual effort will be enough to tackle it.


    Let’s go through them in more details. Procedural programming comes from structured
    programming, in which tasks are broken down to smaller procedures (functions,
    routines, subroutines) with sequence of instructions (statements) to be executed.
    So it is very much task-oriented.


    We’ve covered the returning value of function, when it’s been evaluated, as the
    result of its evaluation. In that we see that functional programming is very similar
    to procedural programming but the emphasis is on having the functions as elements
    in building up the computer programs. And that the functions are evaluated very
    similarly to math functions. We mentioned that the deviation from math is that
    we have void functions which do not return anything.


    As we have detailed thus far, object-oriented programming is centered around objects
    which contains data as well as the functions called methods, which carry out the
    actions or tasks.


    So in comparing the three different paradigms, we see that the procedural programming
    has a top-down approach, in that the big task is broken down to smaller pieces
    – sometimes this breaking-down could go through multiple iterations such that
    the subtasks are small enough to be coded, and these individual procedures could
    be used in (many) different places in the solution as building blocks, thus achieving
    the result of reuse, which is a concept and benefit emphasized in object-oriented
    paradigm, in that repetition of same code blocks is minimized.


    Functional programming treats functions almost the same as data. Functions are
    used in statements. The value of the function is the returning value of the function
    when the statement is being evaluated. Again, very similar to math functions.


    As demonstrated thus far, object-oriented programming encapsulates data and behavior
    in objects, via data members and member methods respectively. In this paradigm,
    objects interact with each other and collaboratively achieve the tasks in the
    solution being constructed.


    There is no single best paradigm. It is really up to the problem at hand. As there
    are pros and cons in all these different paradigms. We list some of them here:


    ## Object-Oriented Programming Paradigm:


    **Pros:**


    - Inheritance: a hallmark of OOP and we will cover in details in the future. It
    basically allow a new class (child) to be defined via extending an existing class
    (parent) thus the amount of coding is much more reduced and simplified.

    - Reusability: with the structure of classes and objects, and inheritance, lots
    of code could be reused thus duplication or redundancy is much eliminated.

    - Security: encapsulation hides and protects the information integrity.

    - Maintenance: easy to isolate changes which are localized in certain class(es)
    thus not affecting others.


    **Cons:**


    - Instead of diving into coding rather quickly, object-oriented coding needs more
    upfront design of the classes to represent the entities involved.

    - Needs refocus of thinking logic from action tasks to objects thus sometimes
    feels not natural until coders are accustomed to this paradigm.

    - Codebase could be larger.


    **Some Popular Languages:**


    - C++

    - Java

    - Python

    - JavaScript

    - C#


    ## Procedural Programming Paradigm:


    **Pros:**


    - Natural fit, and straightforward especially for new coders.

    - Compilers and interpreters are easier to write.

    - In general, since it follows the top-down sequence of execution thus a good
    fit for many problem solutions.

    - Easier to keep track of the flow of the code, thus easier to understand and
    debug sometimes.


    **Cons:**


    - Due to the top-down sequential coding practice, it’s harder to scale for larger
    applications.

    - Code reuse is not built into the paradigm thus there are much more redundancy
    / repetition of same blocks of code.

    - Data could be accessed freely thus not as secure.


    **Some Popular Languages:**


    - C

    - Fortran

    - Basic


    ## Functional Programming Paradigm: (since this has relatively lower usage so
    we will just cover it lightly for completeness)


    **Pros:**


    - As function is the base structure so input into the function as parameters and
    output as the return value of the function are easier to trace for debugging.

    - Also due to the immutability of data / variables, it’s more robust.


    **Cons:**


    - There is no looping thus recursion is used for iteration. So some problems associated
    with recursion, as we covered before such as resource usage and performance, get
    amplified.


    **Some Popular Languages:**


    - Scala

    - Mathematica


    Alright, so much for the object-oriented programming and its classes and objects.
    But now that we know more about some of the advantages mentioned earlier, which
    object-oriented programming'
