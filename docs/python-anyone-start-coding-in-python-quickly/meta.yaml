    ## Chapter 10 Classes and Objects


    In this chapter, we will explore a modern day coding paradigm – object-oriented
    programming.


    What is object-oriented programming (OOP)? Or object-oriented analysis (OOA),
    object-oriented design (OOD)? You might have heard of some of these terms. We
    will dive in to learn more about it.


    ## Evolution from procedural programming to object-oriented programming


    The object-oriented programming as opposed to procedural programming was a major
    break-through in coding. Not that there is no place for procedural programming,
    as otherwise we would not be spending so much effort learning it, but the object
    notion is a very useful concept especially for coding many larger applications.


    So let’s first jump into the OOP for a bit.


    ## Objects and classes


    In the procedural programming, everything is centered on action. We have sequences
    of code which are performing certain actions, sometimes over certain data. So
    the action and data are separated.


    But in object-oriented programming, the center is the object. Each object has
    its own data and own methods (sequences of code) to act upon its data when called
    for.


    And you might have guessed, yes, each object has its type which is called class.
    And we can define what the class is all about including the data members which
    are called attributes, as well as the behavior that is defined by the methods
    (functions / procedures) which we code / implement. So a class is like a user-defined
    custom type, but beyond just the data of its member attributes (like variables),
    as it also defines the behavior of the objects of the class.


    ## Classes vs. objects


    So to make it clearer of the distinction and relationship between class and object,
    we used the type analogy, although there is some subtle difference, for the class,
    and the object of a particular class is like a variable of a particular type,
    but again there are some subtle yet substantial differences.


    The important differentiation is that in the OOP world, the center is around the
    objects, of certain classes, and the object encapsulate the details of the member
    data attributes as well as the implementation of the member methods of the particular
    class which belongs to.


    ## Instances as instantiated objects


    When an object is created (defined) to be of certain class, we say that the object
    is instantiated, thus the object is an instance of the specific class. In that
    sense, class is abstract and simply defines the member attributes as well as the
    member methods.


    We use an example to illustrate this. Suppose that we have a gradebook of some
    course:


    | GradeBook |

    |---|

    | - courseName : string<br>- studentsList : list |

    | + setCourseName( name : string )<br>+ getCourseName() : string<br>+ setStudentsList(
    students : list )<br>+ getStudentsList() : list |


    We see that the class name is GradeBook and that in it there are two data members
    (attributes) which are called courseName and studentsList , of type string and
    list respectively. Please note that the member attributes could be of some other
    classes as well so that there is lots of possibilities and variations. Also in
    this class there are four member methods (functions) named setCourseName (), getCourseName
    (), setStudentsList (), and getStudentsList ().


    The member methods implementations are actually defined in the class, which accomplishes
    a few important things. First of all, the methods are shared by all objects of
    the class thus, the misconception of having a big executable size is incorrect
    as there is only one copy of each method for all the objects of the class. The
    other important benefit of having class method is the security of the data. If
    coded correctly, the data of the object should only be accessed through the class
    methods. Thus any modification of the data could be checked and validated by class
    methods. Therefore, data integrity is enforced. Not only that, since the method
    implementation is encapsulated, so that maintenance work is isolated from outside
    of the class – meaning, as long as the access interface of the class methods stay
    the same, it doesn’t matter how the methods are implemented and should be of no
    concern for using the methods – a key benefit of object-oriented programming.


    ## Object-oriented coding for big problems


    So we’ve covered the basics for coding sequences and some data structures to solve
    some specific problems. But as the problems become bigger, the necessary coding
    effort becomes exponentially complex, sometimes well into millions of lines of
    code. How do we tackle such problems?


    First of all, it’s impossible to keep track of millions of lines of code. But
    we still need to have a sound solution. One technique we used already time and
    again is the divide-and-conquer principle. We break the huge problem into smaller
    problems. And this'
  mdcn: '## 递归与循环迭代


    我们已经看过了许多循环和递归的例子。现在让我们对它们进行比较和对比，以获得更深入的理解：


    - 循环和递归都处理迭代，并能实现重复操作

    - 循环使用循环语句；递归使用选择/分支语句

    - 循环在循环条件测试为假时终止；递归在达到基本情况时终止

    - 两者都通过每次迭代稍微减小问题规模来接近解决方案——这是分治技术的应用

    - 两种情况都可能发生无限循环：在循环中，循环条件可能始终为真；在递归中，基本情况可能永远无法达到

    - 有时可能不容易想出循环解决方案；而递归解决方案可能更容易编码，但（递归）函数调用产生的开销可能巨大，有时由于遇到机器限制可能无法执行


    因此，随着我们更深入地进行编码，我们肯定会遇到需要一种技术而非另一种技术的情况。有了这些见解，希望我们能更好地辨别使用哪种技术，并在开发周期中更早地做出正确决策，从而在一定程度上减轻后续的维护工作。


    ## 练习：


    9.1 实现一个函数，该函数接受一个整数参数 n，并递归地打印从 1 到 n 的数字。


    9.2 我们知道乘法可以通过重复加法来实现。例如 6 * 3 = 6 + 6 + 6。编写一个递归函数，该函数接受两个参数 x 和 y，并返回 x 乘以 y
    的值。


    9.3 我们之前已经实现了迭代方式的列表最大值函数。现在实现一个函数，该函数接受一个列表并递归地找到最大项。


    9.4 编写一个递归函数，返回整数列表的总和。


    9.5 递归地实现一个指数函数，计算 x 的 y 次方的值。


    9.6 使用迭代而不是递归重写阶乘函数


    9.7 使用迭代而不是递归重写斐波那契数列计算


    9.8 使用迭代而不是递归重写汉诺塔解决方案


    9.9 修改汉诺塔解决方案，以便查看磁盘如何从一个杆移动到另一个杆，总共 5 个编号为 1 到 5 的磁盘，并显示哪个磁盘在哪个杆上以及顺序如何。


    9.10 给定被除数 x 和除数 y，递归计算最大公约数（GCD）。计算 GCD 的算法：如果 y 为 0，则 gcd(x, y) 为 x；否则 gcd(x,
    y) 为 gcd(y, x % y) - % 是取模运算符。


    ## 第 10 章 类与对象


    在本章中，我们将探讨一种现代编码范式——面向对象编程。


    什么是面向对象编程（OOP）？或者面向对象分析（OOA）、面向对象设计（OOD）？你可能听说过其中一些术语。我们将深入了解更多相关信息。


    ## 从过程式编程到面向对象编程的演进


    面向对象编程相对于过程式编程是编码领域的一个重大突破。这并不是说过程式编程没有用武之地，否则我们就不会花费如此多的精力来学习它，但对象概念是一个非常有用的概念，特别是在编码许多大型应用程序时。


    所以让我们先来了解一下 OOP。


    ## 对象与类


    在过程式编程中，一切都围绕着动作。我们有一系列执行特定动作的代码，有时是针对特定数据。因此，动作和数据是分离的。


    但在面向对象编程中，中心是对象。每个对象都有自己的数据和自己的方法（代码序列），以便在需要时对其数据进行操作。


    你可能已经猜到了，是的，每个对象都有其类型，称为类。我们可以定义类的全部内容，包括称为属性的数据成员，以及由我们编码/实现的方法（函数/过程）定义的行为。因此，类就像一个用户定义的自定义类型，但不仅仅包含其成员属性（如变量）的数据，因为它还定义了该类对象的行为。


    ## 类与对象


    为了更清楚地区分类和对象之间的区别和关系，我们使用了类型类比，尽管存在一些细微差别，类是抽象的，而特定类的对象就像特定类型的变量，但同样存在一些细微但实质性的差异。


    重要的区别在于，在 OOP 世界中，中心是围绕特定类的对象，对象封装了成员数据属性的细节以及属于该特定类的成员方法的实现。


    ## 实例化对象


    当一个对象被创建（定义）为特定类时，我们说该对象被实例化，因此该对象是特定类的实例。从这个意义上说，类是抽象的，只是定义了成员属性以及成员方法。


    我们用一个例子来说明这一点。假设我们有一个某门课程的成绩簿：


    | GradeBook |

    |---|

    | - courseName : string<br>- studentsList : list |

    | + setCourseName( name : string )<br>+ getCourseName() : string<br>+ setStudentsList(
    students : list )<br>+ getStudentsList() : list |


    我们看到类名是 GradeBook，其中有两个数据成员（属性），分别称为 courseName 和 studentsList，类型分别为 string 和
    list。请注意，成员属性也可以是其他类，因此存在许多可能性和变化。此外，这个类中还有四个成员方法（函数），分别命名为 setCourseName()、getCourseName()、setStudentsList()
    和 getStudentsList()。


    成员方法的实现实际上是在类中定义的，这完成了几件重要的事情。首先，这些方法由类的所有对象共享，因此，关于拥有巨大可执行文件大小的误解是不正确的，因为每个方法对于类的所有对象只有一个副本。拥有类方法的另一个重要好处是数据的安全性。如果编码正确，对象的数据应该只能通过类方法访问。因此，任何数据修改都可以由类方法检查和验证。从而确保了数据完整性。不仅如此，由于方法实现被封装，维护工作与类外部隔离——这意味着，只要类方法的访问接口保持不变，方法如何实现并不重要，也不应该成为使用方法的顾虑——这是面向对象编程的一个关键优势。


    ## 面向对象编码解决大问题


    因此，我们已经涵盖了编码序列和一些数据结构来解决特定问题的基础知识。但随着问题变得更大，必要的编码工作呈指数级复杂增长，有时甚至达到数百万行代码。我们如何处理这样的问题？


    首先，跟踪数百万行代码是不可能的。但我们仍然需要一个可靠的解决方案。我们一次又一次使用的一种技术是分治原则。我们将巨大的问题分解成更小的问题。而这'
