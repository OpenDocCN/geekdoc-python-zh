    \n## 前言\n\n我打算写一本 Python 入门书籍，让初次接触编程的人能够轻松上手，不会感到畏惧；同时也让经验丰富的程序员能够快速掌握 Python。因此，本书仅包含八章，只涵盖基础知识。虽然我已在大学任教一段时间，但本书并未包含课后作业。由于我整个职业生涯都在科技行业，深知要快速掌握某项技能（或至少知道如何入门），通常没有太多时间。因此，本书的编写方式不仅涵盖文本内容，也包含编程示例。如果读者理解了本书的文本和示例，我期望这足以让你开始\
    \ Python 编程。我也希望以这样的方式编写本书，让你在后续学习中能明显感受到 Python 的一些优势，鉴于当前该领域的发展趋势。因此，本书对数据结构进行了一些讲解，希望这对你处理数据科学问题时能有所帮助。这些目标有些宏大，甚至可能相互冲突。但我已尽力而为。就像大多数计算机科学书籍一样，我不想等待漫长的修订周期再出版。计算机科学在不断快速演进。因此，我宁愿现在就出版，让这本书能对一些人有所帮助。我希望我能持续打磨这本书，在过程中带来有意义的更新。再次请注意，本书绝非完整无缺，在许多方面反映了我在软件行业和教育领域的经验，旨在让读者快速掌握基础。我衷心希望这本书对你有用。\n\
    \nJesse Chou jesse@HigherChallenge.com\n\n2021年7月11日于加利福尼亚\n\n我偶尔更新的个人资料：\n\n\
    [https://www.LinkedIn.com/in/JesseChou](https://www.LinkedIn.com/in/JesseChou)\n\
    \n随机分享 – 通常是技术内容：\n\n[https://www.higherchallenge.com/#randomshare](https://www.higherchallenge.com/#randomshare)\n\
    \n## 第1章 计算机与编程简介\n\n尽管本书是关于 Python 编程的，但让我们先对计算机有一个基本的理解，作为编程世界的基础。如果你已有相关背景知识，可以跳到下一章开始\
    \ Python 编程。不过，快速复习一下基础知识可能会有所帮助；你或许也会喜欢。\n\n### 硬件/软件\n\n自几十年前第一台计算机发明以来（关于其发明有多种观点\
    \ – 你当然可以在线搜索了解），科技行业从支撑计算设备硬件的半导体，迅速发展到计算机的多种形态（大型机、小型机、工作站、个人电脑、笔记本电脑、平板电脑、手机等），再到使这些设备运行的操作系统（从而进入软件领域），以及其上的众多系统（如\
    \ Web 服务器、应用服务器等），最后到我们如今所称的应用程序（例如人力资源管理、地图等）。\n\n计算范式适应了计算机使用量的不断增长。从集中式的大型机模型开始，大型机器放置在玻璃机房中，为可能位于终端室的多个终端提供服务；随后发展出客户端-服务器模型，客户端设备变得“更智能”，内置了更多计算能力（硬件）和逻辑（软件），以分担服务器的部分工作；接着在服务器和客户端之间插入了中间层；从那里，层级结构"
