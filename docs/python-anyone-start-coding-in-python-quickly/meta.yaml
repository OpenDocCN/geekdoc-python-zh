    如你所见，`myGradeBook` 的课程名称是 “Python Anyone, 2nd edition”。接着我们执行了将 `myGradeBook`
    赋值给 `myGradeBook2` 的语句。但这并没有创建一个新对象，而基本上只是创建了一个指向同一对象的引用，这通常被称为别名。然后我们检查了 `myGradeBook2`
    的数据成员 `courseName`。不出所料，其值是 “Python Anyone, 2nd edition”。


    接着我们修改了 `myGradeBook2` 的 `courseName`，使其变为 “Python Anyone by Jesse Chou”，并使用 `myGradeBook2`
    的成员方法 `getCourseName` 验证了这一点。然而，令人惊讶的是，`myGradeBook` 中的 `courseName` 数据成员的值也被改变了——这向我们表明它们实际上是同一个对象。


    那么，我们该如何进行复制呢？原来有一个名为 `copy` 的 Python 模块可以实现此功能。如下所示：


    >>> import copy

    >>> myGradeBookTwo = copy.copy(myGradeBook)

    >>> myGradeBook.getCourseName()

    ''Python Anyone by Jesse Chou''

    >>> myGradeBookTwo.getCourseName()

    ''Python Anyone by Jesse Chou''

    >>>


    因此，在这个例子中，我们导入了 `copy` 模块以使用 `copy` 函数，该函数可以复制任何对象，包括自定义类型或用户定义的类对象。如我们所见，我们将
    `myGradeBook` 复制到了 `myGradeBookTwo`，并检查了两个对象的 `courseName` 是相同的。


    但它们真的是两个独立的对象吗？我们有以下代码来证明：


    >>> myGradeBookTwo.setCourseName("Python Anyone, 2nd edition, by Jesse Chou")

    >>> myGradeBookTwo.getCourseName()

    ''Python Anyone, 2nd edition, by Jesse Chou''

    >>> myGradeBook.getCourseName()

    ''Python Anyone by Jesse Chou''

    >>>


    因此，我们修改了副本 `myGradeBookTwo` 中的 `courseName`，并使用 `getCourseName` 方法进行了验证。然后我们对
    `myGradeBook` 使用了相同的方法，观察到它保持原样，未被修改。因此很明显，它们是两个独立的对象。我们确实创建了一个新对象的副本，而不是简单地为同一对象创建一个引用别名。


    ## 过程式编程 vs. 面向对象编程（vs. 函数式编程）


    现在，让我们深入探讨一些比较：存在不同的编程范式，我们主要关注传统的过程式编程与面向对象编程。但既然我们已经讲到这里，我们也会稍微涉及一点函数式编程。


    传统上，过程式编程很流行，至少在软件变得如此庞大以至于越来越难以管理之前是这样。如今，数百万行代码已经非常普遍，很多时候甚至达到数亿行。很明显，没有普通人能够记住并很好地组织一个庞大的、单一的代码块。因此，许多技术被开发出来以应对这种规模，并更好地组织代码，以便大型编码团队能够协作，因为如此规模的项目显然需要一个团队，单靠个人努力是无法应对的。


    让我们更详细地了解它们。过程式编程源于结构化编程，其中任务被分解为更小的过程（函数、例程、子程序），这些过程由一系列指令（语句）执行。因此它非常以任务为导向。


    我们已经介绍了函数的返回值，当它被求值时，作为其求值的结果。由此我们看到函数式编程与过程式编程非常相似，但其重点在于将函数作为构建计算机程序的元素。并且函数的求值方式与数学函数非常相似。我们提到与数学的偏差在于我们有不返回任何内容的
    `void` 函数。


    正如我们迄今为止所详述的，面向对象编程以对象为中心，对象包含数据以及称为方法的函数，这些方法执行操作或任务。


    因此，在比较这三种不同的范式时，我们看到过程式编程采用自顶向下的方法，即将大任务分解为更小的部分——有时这种分解可能经过多次迭代，使得子任务足够小以便编码，并且这些单独的过程可以在解决方案的（许多）不同地方用作构建块，从而实现重用的结果，这是面向对象范式中强调的一个概念和优势，即最小化相同代码块的重复。


    函数式编程将函数几乎与数据同等对待。函数在语句中使用。函数的值是语句被求值时函数的返回值。同样，与数学函数非常相似。


    如前所述，面向对象编程通过数据成员和成员方法分别将数据和行为封装在对象中。在这种范式中，对象相互交互，并协作完成正在构建的解决方案中的任务。


    没有单一的最佳范式。这真的取决于手头的问题。因为所有这些不同的范式都有其优缺点。我们在此列出其中一些：


    ## 面向对象编程范式：


    **优点：**


    -   继承：OOP 的标志，我们将来会详细介绍。它基本上允许通过扩展现有类（父类）来定义一个新类（子类），从而大大减少和简化编码量。

    -   可重用性：借助类和对象的结构以及继承，大量代码可以被重用，从而大大消除重复或冗余。

    -   安全性：封装隐藏并保护了信息的完整性。

    -   可维护性：易于隔离局部于某些类的更改，从而不影响其他类。


    **缺点：**


    -   面向对象编码需要更多前期设计来表示涉及的实体，而不是快速投入编码。

    -   需要将思维逻辑从动作任务重新聚焦到对象上，因此在编码人员习惯这种范式之前，有时会感觉不自然。

    -   代码库可能更大。


    **一些流行语言：**


    -   C++

    -   Java

    -   Python

    -   JavaScript

    -   C#


    ## 过程式编程范式：


    **优点：**


    -   自然契合，直接明了，尤其适合新编码人员。

    -   编译器和解释器更容易编写。

    -   通常，由于它遵循自顶向下的执行顺序，因此非常适合许多问题解决方案。

    -   更容易跟踪代码流程，因此有时更容易理解和调试。


    **缺点：**


    -   由于自顶向下的顺序编码实践，它更难扩展到更大的应用程序。

    -   代码重用并非内置于该范式中，因此存在更多相同代码块的冗余/重复。

    -   数据可以自由访问，因此安全性较低。


    **一些流行语言：**


    -   C

    -   Fortran

    -   Basic


    ## 函数式编程范式：（由于其使用相对较少，为完整起见，我们将简要介绍）


    **优点：**


    -   由于函数是基础结构，因此输入到函数的参数和作为函数返回值的输出更容易追踪调试。

    -   同样由于数据/变量的不可变性，它更健壮。


    **缺点：**


    -   没有循环，因此使用递归进行迭代。因此，与递归相关的一些问题，如我们之前介绍的资源使用和性能问题，会被放大。


    **一些流行语言：**


    -   Scala

    -   Mathematica


    好了，关于面向对象编程及其类和对象的内容就到这里。但既然我们更了解了前面提到的一些优点，面向对象编程'
