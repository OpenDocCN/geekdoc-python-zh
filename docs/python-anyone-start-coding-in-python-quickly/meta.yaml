    >>> if x > y :

    ...     if x > z : ### now x is > both y, z

    ...         print(''x is the largest'')

    ...     else : ### x > y but x < z thus z > x > y

    ...         print(''z is the largest'')

    ... else : ### x < y

    ...     if y < z : ### now we have x < y and y < z

    ...         print(''z is the largest'')

    ...     else : ### now we know x < y and z < y

    ...         print(''y is the largest'')

    ...

    z is the largest

    >>>

    ```


    We already saw some of the logic thinking in the chained if-else, but now with
    this example, it becomes clear how some versatile nesting could be done in many
    different ways.


    So there you have it, the branching mechanism in coding, although demonstrated
    for this book in Python, this is essentially the same mechanism for almost all
    higher level languages in the coding world, albeit with varying syntax, but the
    high level logic is pretty much the same.'
- md: "So now we have already learned how to declare variables and use them in statements\
    \ such as assignment to give values to the variables; plus this branching technique\
    \ as one of the handful of the fundamental techniques to know in higher level\
    \ languages, we are now one giant step further in our coding skills, as there\
