    \ |\n| count() | 返回指定值在字符串中出现的次数 |\n| encode() | 返回字符串的编码版本 |\n| endswith() |\
    \ 如果字符串以指定值结尾则返回 true |\n| expandtabs() | 设置字符串的制表符大小 |\n| find() | 在字符串中搜索指定值并返回找到的位置\
    \ |\n| format() | 格式化字符串中的指定值 |\n| format_map() | 格式化字符串中的指定值 |\n| index() | 在字符串中搜索指定值并返回找到的位置\
    \ |\n| isalnum() | 如果字符串中的所有字符都是字母数字则返回 True |\n| isalpha() | 如果字符串中的所有字符都是字母则返回\
    \ True |\n| isdecimal() | 如果字符串中的所有字符都是十进制数则返回 True |\n| isdigit() | 如果字符串中的所有字符都是数字则返回\
    \ True |\n| isidentifier() | 如果字符串是标识符则返回 True |\n| islower() | 如果字符串中的所有字符都是小写则返回\
    \ True |\n| isnumeric() | 如果字符串中的所有字符都是数字则返回 True |\n| isprintable() | 如果字符串中的所有字符都是可打印的则返回\
    \ True |\n| isspace() | 如果字符串中的所有字符都是空白字符则返回 True |\n| istitle() | 如果字符串遵循标题规则则返回\
    \ True |\n| isupper() | 如果字符串中的所有字符都是大写则返回 True |\n| join() | 将可迭代对象的元素连接到字符串末尾\
    \ |\n| ljust() | 返回字符串的左对齐版本 |\n| lower() | 将字符串转换为小写 |\n| lstrip() | 返回字符串的左修剪版本\
