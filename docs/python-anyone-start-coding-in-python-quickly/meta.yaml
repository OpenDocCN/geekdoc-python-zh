  - '[PAGE 8]


    # Chapter 1 Introduction to Computer and Coding


    Although this book is about Python coding, let’s try to have a basic understanding
    of the computer as the foundation for the coding world. If you already have the
    background, feel free to go to next chapter where the Python coding starts. But
    nonetheless, it might be helpful to have a quick review of the basics; and you
    might enjoy it.


    # Hardware/Software


    Since the first computer was invented decades ago (and there are multiple viewpoints
    of the invention – you can certainly research online about it), the tech industry
    quickly evolved from the semiconductor underpinning the hardware of computing
    devices, to the multiple form factors of computers (mainframe, mini computer,
    workstation, personal computer, laptop, tablet, phone, etc.), to the operating
    systems making these devices alive (thus entering the software realm), and the
    multitude of systems on top of it (such as web servers, application servers, and
    many others), to the apps (e.g. human resource management, maps, etc.) as we refer
    to them nowadays.


    The computing paradigm adapted to the ever increasing usage of computers. Beginning
    with the centralized mainframe model whereas big machines sit in glass room servicing
    multiple terminals possibly in a terminal room; the client-server model was then
    developed such that the client devices are getting “smarter” with more computing
    power (hardware) and logic (software) built in to offload some work from the server,
    and then the middle tier inserted between the server and the client; from there
    the hierarchy'
- md: 'of 2 to 3 tiers evolved to n-tier with multiple services in the middle of the
    ultimate server and the client; computing grid is thus forming and the line between
    client and server is blurring; as many servers (sometimes called nodes/sites or
    something like that) can offer services for others to use via published interfaces
    (API – application program interface) and specific service could be mashed together
    using different web services already available to form a new app for some specific
    scenario. Then a new notion is coined as cloud computing in that the grid is the
    cloud and many different services are offered for clients which could be the consumers
    or the consuming apps as we all get used to in the so-called modern days of computing
    web 2.0.


    ## Data Storage and Manipulation


    So with the proliferation of the computing services (over the web hence the name
    web services) and that the processing is moving into the cloud therefore the client
    side computing power bottleneck is alleviated, the processing is getting cheaper
    and more available, and consequentially the data volume exploded.


    So naturally the data storage is taking on further challenge with the explosive
    volume while the increasing rate of the amount of data being generated is still
    accelerating. Data storage is not a new problem; it has been there since day one
    of the computing era. With the computing power evolution on one hand, there is
    always input data which the app consumes and the output data which the app generates
    – it’s just that the rapid increase of data volume, on the other hand, is starting
    to pose even more and different challenges.


    Again, cloud computing comes to the rescue. With the pervasiveness of computing
    power, cloud storage service is available to have huge amount of data stored online
    and be readily available for clients/apps to consume.


    At a high abstraction level, the architecture of the computing organization amazingly
    stayed the same as it was first described in 1945 by [John von Neumann](https://en.wikipedia.org/wiki/John_von_Neumann)
    in his report titled [First Draft of a Report on the EDVAC](https://en.wikipedia.org/wiki/First_Draft_of_a_Report_on_the_EDVAC)
    – as shown in the following diagram from Wikipedia


    ![](img/b52ff7adacf4e0b514b791444be82d81_10_0.png)


    *By Kapooh - Own work, CC BY-SA 3.0, https://commons.wikimedia.org/w/index.php?curid=25789639*


    So in a nutshell, a computing device has a brain which is its central processing
    unit (CPU) – as depicted in the diagram, it has control unit and arithmetic/logic
    unit (ALU); a storage in the memory unit where data are stored; and input/output
    (I/O) mechanisms. The I/O mechanisms are the keyboard, the mouse, the touch screen,
    and a few other interacting devices for input; and the display monitor or screen
    as well as some other devices such as speaker and hard disk for output.


    ## Coding Languages - Machine/Assembly/3GL/4GL


    Now that we have the foundation of the computing at the infrastructure level,
    how do we utilize the computing power? How do we not only interact with the computer
    but also get the computer to do amazing things according to our instructions?
    Many languages were thus developed to do just that so that we can communicate
    with and command the computer to do things we want it to do.


    Since computer only understands 0s and 1s (called bits – short for binary digits,
    which could hold values of 0 or 1 as the underlying electrical values of OFF or
    ON for a single capacitor – capacitor can have 2 levels of charge; charge above
    or below certain level 0F0F[1]) thus it naturally uses combination of 0s and 1s
    to construct its language which is called machine language and is categorized
    as second generation language (2GL). At the early days, we have almost a byte
    (which is 8 bits for most computers) by byte translation from machine languages
    into something that’s more human friendly and that’s the assembly language. Then
    as Computer Science evolves, higher level languages such as C, C++, Java, Python,
    JavaScript were invented to make it easier for human to code. These higher-level
    languages are called 3GL as the third generation.


    But this is not easy enough especially for non-coders, we then have English-like
    languages invented such as Structural Query Language (SQL), these are called fourth
    generation languages or 4GL, and there are more and more add-ons for the 3GL to
    make programming easier. There is of course 5GL which aims at taking programmers
    out of the problem solving but it really hasn’t had concrete break through yet
    (or maybe the mobile phone personal assistants built into our cell phones nowadays
    are getting close, very close hopefully.)


    And for us coders, 3GL is still the most prominent, and amazingly is getting even
    wider usage and gaining more popularity. One of the languages that stands out
    in the midst of data explosion is Python. In this book, we will look at Python
    specifically. Why Python you may ask. First of call, Python is wildly popular.
    It has been through major revisions twice and we are now at Python version 3 –
    3.9.1 specifically as this book is being written at end of 2020. At this time,
    Python is also ranked as the 3rd most popular language behind C and Java. Python
    is also used a lot in artificial intelligence and machine learning projects thus
    as the world is moving in that direction, Python sure hopefully will gain more
    popularity and should be a very useful language for the days to come in coming
    up areas such as data science and beyond.


    ## Compilers/Interpreters


    So how does computer language work? Once a piece of code is written in some higher-level
    language, it’s put through some transformation to make it a language that could
    be executed on a computer. Namely, it is converted to some machine language which
    the targeted machine could understand.


    There are two different approaches here. One way is to have the entire piece of
    program converted to generate an executable file which could then be executed
    with its functionality to (hopefully) produce the desired outcome. This is called
    compilation (which itself is a fairly involved process.) After such code is compiled
    on certain platform (be it Windows, Mac, Linux, or what have you) the suitable
    machine code is generated for the platform. So the implication here is clear that
    machine code is specific to the platform due to the nature of the hardware, thus
    machine codes are not compatible hence not portable among platforms.


    There is another approach or category which is to have each line of code interpreted
    and executed as the line is taken in and processed. This makes the process more
    interactive and gives a more instantaneous feedback to the coder. These languages
    are thus called interpretive languages.


    Although this interpretive approach is more user friendly to the developers/coders,
    ultimately a program is written to be executed as a whole thus the aforementioned
    compilation process is often invoked for most of the apps out there such that
    the compiled executable could be distributed to the users for its intended purposes
    beyond the convenience of the developers.


    So there is a lot to be said about pros and cons of these two camps and on top
    of that there is new inventions which complicate the matter to blur the line –
    as the computer industry is of course not satisfied being constrained thus standing
    still so there are many evolutions to mix up the distinctions between the two.
    For example, Python started out as an interpretive language but there are many
    extensions to make compiled executables for programs written in Python. To dig
    deeper into this is definitely out of this book’s scope but there are just many
    implementations out there in this area such as CPython, Jython, IronPython, and
    PyPy – just to name a few. So if you are interested in further details now you
    have the list of some names to start with your research.


    Now briefly let’s contrast the two camps of compiled languages vs. interpreted
    languages in some very much generalized ways:


    Advantages of compiled languages:


    - Faster performance as the native machine code is executed on the target machine

    - Lots of optimization during compilation - thanks to the advancement of compiler
    technologies


    Advantages of interpreted languages:


    - Interpreter is a lot easier to write than compiler

    - Code could be executed immediately without going through the compilation process


    Some footnote here regarding the modern technologies such as virtual machine and
    bytecode: these are part of the inventions made to blur the line of the two camps
    and made things more interesting. So instead of compilation to target a real machine,
    the target is actually a virtual machine which hides some details of the hardware
    we are running on. E.g. the Java language has JVM JIT (Java Virtual Machine Just
    In Time) compiler if you are interested in this area of technologies.'
  mdcn: '从2到3层的架构演进到n层架构，在最终服务器和客户端之间存在多个服务；计算网格由此形成，客户端与服务器之间的界限变得模糊；许多服务器（有时称为节点/站点或类似名称）可以通过公开的接口（API
    – 应用程序接口）为其他实体提供服务，特定的服务可以利用已有的不同网络服务组合在一起，为特定场景形成新的应用程序。于是，一个新的概念被提出，即云计算，因为网格就是云，并且为客户端提供了许多不同的服务，这些客户端可以是消费者或消费应用程序，正如我们在所谓的现代计算网络2.0时代所习惯的那样。


    ## 数据存储与操作


    随着计算服务（通过网络提供，因此得名网络服务）的激增，以及处理过程迁移到云端，客户端计算能力的瓶颈得以缓解，处理变得更便宜、更可用，随之而来的是数据量的爆炸式增长。


    因此，数据存储在应对爆炸式数据量的同时，面临着进一步的挑战，而数据生成速率的增加仍在加速。数据存储并非新问题；它自计算时代伊始就已存在。一方面，随着计算能力的演进，应用程序总是消耗输入数据并生成输出数据；另一方面，数据量的快速增长开始带来越来越多且不同的挑战。


    云计算再次提供了帮助。随着计算能力的普及，云存储服务可用于在线存储海量数据，并随时可供客户端/应用程序使用。


    在较高的抽象层面上，计算组织的架构惊人地保持了与1945年[约翰·冯·诺依曼](https://en.wikipedia.org/wiki/John_von_Neumann)在其题为[《EDVAC报告第一份草案》](https://en.wikipedia.org/wiki/First_Draft_of_a_Report_on_the_EDVAC)的报告中首次描述的相同结构——如下图所示（来自维基百科）


    ![](img/b52ff7adacf4e0b514b791444be82d81_10_0.png)


    *作者：Kapooh - 自己的作品，CC BY-SA 3.0，https://commons.wikimedia.org/w/index.php?curid=25789639*


    简而言之，计算设备有一个大脑，即其中央处理器（CPU）——如图所示，它包含控制单元和算术/逻辑单元（ALU）；一个用于存储数据的存储器单元；以及输入/输出（I/O）机制。I/O机制包括键盘、鼠标、触摸屏以及其他一些用于输入的交互设备；以及显示器或屏幕，以及扬声器和硬盘等其他用于输出的设备。


    ## 编程语言 - 机器语言/汇编语言/第三代语言/第四代语言


    既然我们已经了解了基础设施层面的计算基础，我们如何利用计算能力？我们如何不仅与计算机交互，还能让计算机根据我们的指令完成惊人的事情？因此，许多语言被开发出来，正是为了实现这一点，以便我们能够与计算机沟通并命令它做我们想做的事情。


    由于计算机只理解0和1（称为比特——二进制数字的缩写，它可以存储0或1的值，对应于单个电容器的底层电气值OFF或ON——电容器可以有2个充电级别；充电量高于或低于某个级别0F0F[1]），因此它自然使用0和1的组合来构建其语言，这种语言称为机器语言，被归类为第二代语言（2GL）。在早期，我们几乎逐字节（在大多数计算机上是8位）地将机器语言翻译成更友好的人类语言，这就是汇编语言。随着计算机科学的发展，出现了更高级的语言，如C、C++、Java、Python、JavaScript，使人类编程变得更容易。这些高级语言被称为第三代语言（3GL）。


    但这对于非程序员来说仍然不够容易，于是我们发明了类似英语的语言，如结构化查询语言（SQL），这些被称为第四代语言或4GL，并且有越来越多的3GL附加组件使编程更容易。当然还有第五代语言（5GL），旨在将程序员从问题解决中解放出来，但它尚未取得实质性突破（或者也许如今内置于我们手机中的移动电话个人助手已经非常接近了，希望如此。）


    对于我们程序员来说，3GL仍然是最突出的，并且令人惊讶的是，它的使用范围越来越广，越来越受欢迎。在数据爆炸中脱颖而出的语言之一是Python。在本书中，我们将专门探讨Python。你可能会问为什么选择Python。首先，Python非常流行。它已经历了两次重大修订，我们现在使用的是Python
    3——具体来说是3.9.1，因为本书是在2020年底撰写的。此时，Python也被评为仅次于C和Java的第三大最受欢迎的语言。Python在人工智能和机器学习项目中也被广泛使用，因此随着世界向这个方向发展，Python肯定有望获得更多的普及，并且应该成为未来在数据科学等新兴领域非常有用的语言。


    ## 编译器/解释器


    那么计算机语言是如何工作的呢？一旦用某种高级语言编写了一段代码，它就会经过一些转换，使其成为可以在计算机上执行的语言。也就是说，它被转换为目标机器能够理解的某种机器语言。


    这里有两种不同的方法。一种方法是将整个程序转换生成一个可执行文件，然后执行该文件以（希望）产生预期的结果。这称为编译（编译本身是一个相当复杂的过程。）在某个平台（无论是Windows、Mac、Linux还是其他平台）上编译此类代码后，会为该平台生成合适的机器代码。因此，这里的含义很清楚，由于硬件的性质，机器代码是特定于平台的，因此机器代码不兼容，不可在不同平台之间移植。


    另一种方法或类别是，每一行代码在被接收和处理时就被解释和执行。这使得过程更具交互性，并为编码者提供更即时的反馈。因此，这些语言被称为解释型语言。


    尽管这种解释方法对开发者/编码者更友好，但程序最终是作为一个整体来执行的，因此上述编译过程通常被大多数应用程序调用，以便编译后的可执行文件可以分发给用户，用于其预期目的，而不仅仅是为了开发者的便利。


    关于这两个阵营的优缺点有很多可以说的，除此之外，还有新的发明使事情复杂化，模糊了界限——因为计算机行业当然不满足于被限制而停滞不前，所以有许多演进混合了两者之间的区别。例如，Python最初是一种解释型语言，但有许多扩展可以为用Python编写的程序生成编译后的可执行文件。深入探讨这一点绝对超出了本书的范围，但在这个领域有许多实现，例如CPython、Jython、IronPython和PyPy——仅举几例。因此，如果你对更多细节感兴趣，现在你有了一些名称列表，可以开始你的研究。


    现在，让我们简要地以非常概括的方式对比一下编译型语言和解释型语言这两个阵营：


    编译型语言的优点：


    - 性能更快，因为本机机器代码在目标机器上执行

    - 在编译过程中进行大量优化——这要归功于编译器技术的进步


    解释型语言的优点：


    - 解释器比编译器容易编写得多

    - 代码可以立即执行，无需经过编译过程


    这里有一些关于现代技术的脚注，例如虚拟机和字节码：这些是模糊两个阵营界限并使事情更有趣的发明的一部分。因此，目标不是编译到真实的机器，而是一个虚拟机，它隐藏了我们运行的硬件的一些细节。例如，Java语言有JVM
    JIT（Java虚拟机即时）编译器，如果你对这个技术领域感兴趣的话。'
