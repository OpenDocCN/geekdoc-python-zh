    # Towers of Hanoi


    Towers of Hanoi (TOH) is a well-known math puzzle that is often used in coding
    to illustrate the recursive technique. The puzzle was introduced by French mathematician
    Edouard Lucas back in 1883. The legend has it that in an Indian temple there is
    a large room with three posts in it. There were also 64 golden disks each with
    different size stacked on one post, from the largest disk at the bottom to the
    smallest disk at the top. The priests were moving the disks with the objective
    of moving the entire stack to another post, according to some strict rules:


    +   - Only one disk can be moved at a time.

    - Each move consists of taking the upper disk from one of the stacks of a post
    and placing it on top of another stack of another post, or on a post with no disk.

    - No disk may be placed on top of a smaller disk.


    According to the legend, when the priests finished moving, the world will end.
    But if the priests were able to move one disk per second, using the smallest number
    of moves it will take 2^64 – 1 seconds or roughly about 585 billion years to achieve
    the objective. And that is about 42 times the current age of the Universe. So
    there is probably nothing to worry about for quite some time.


    So to further look into this TOH puzzle, we use just 5 disks to demonstrate the
    recursive code. Following is a simple diagram of the puzzle:'
