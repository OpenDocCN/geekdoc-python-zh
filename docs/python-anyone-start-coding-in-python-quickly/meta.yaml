    ## Formatted Output With Conversion Specifiers


    So let''s look into more of these conversion specifiers – that is the %x (% followed
    by a character) embedded in these formatting strings.


    These conversion specifiers take the following shape:

    %[<flags>][<width>][.<precision>]<type> % values


    The % and <type> are mandatory. The other in-between specifiers in square brackets
    are optional.


    The following table lists what each of the conversion specifier does:


    | Specifier | What it does |

    |---|---|

    | % | Beginning of the conversion specifier |

    | <flags> | Indicates one or more flags that exert finer control over formatting
    |

    | <width> | Specifies the minimum width of the formatted result |

    | .<precision> | Specifies the length/precision of floating point/string output
    |

    | <type> | Indicates the data type to convert to |


    ## Conversion Type


    The conversion type, <type> at the end of the conversion specifier is mandatory.
    It indicates the data type of the conversion of the value to be substituted into
    the format string.

    Following is a table of conversion types:


    | <type> | Convert to |

    |---|---|

    | d, i, u | Decimal integer |

    | x, X | Hexadecimal integer |

    | o | Octal integer |

    | f, F | Floating point |

    | e, E | Scientific / Exponential |

    | g, G | Floating point or Exponential |

    | c | Single character |

    | s, a, r | String |

    | % | Single character ''%'' |


    ### Integer Conversion Types


    Now let’s look at some integer conversions in the following examples:


    ```

    >>> ''1st integer using %d, 2nd using %i, 3rd using %u'' % (1, 2, 3)

    ''1st integer using 1, 2nd using 2, 3rd using 3''

    >>> ''lowercase %x, uppercase %X'' % (255, 255)

    ''lowercase ff, uppercase FF''

    >>> ''only lowercase %o'' % 15

    ''only lowercase 17''

    >>> ''another lowercase %o'' % 9

    ''another lowercase 11''

    ```


    So all these 3 types of d, i, and u are converting the corresponding argument
    to a string representation of a decimal integer: (note that Python retained both
    %d and %i for compatibility with C; and %u is obsolete and is treated the same
    as %d – it is included here since you may still see this in many places)


    As for x and X, the corresponding argument is converted to a string representation
    of a hexadecimal integer value; and o converts the corresponding argument to a
    string representation of an octal integer value – as the last 2 examples shown
    above (if you are not familiar with octal and/or hexadecimal numbers, here is
    a brief explanation for 255 to be converted to ff/FF- since octal numbers go from
    0 to 7 and when we have 8 we carry to the next digit to the left so 8 in octal
    is expressed as 10, where the digit 1 is the carry; similarly, hexadecimal numbers
    go from 0 to 15 and is expressed as 0 to 9 and then A is 10, B is 11, C is 12,
    D is 13, E is 14, and F is 15; so FF or ff can be converted back to decimal number
    by multiplying 16 to 15 to get 240 for the left F, and then add 15 for the right
    F to 240 to get 255.)


    Type x gives lowercase output, and X is for uppercase. (And it should make sense
    that there is no uppercase O as there is no need for it when we are only dealing
    with 0 to 7.)


    ### Floating Point Conversion Types


    As for floating points, we use conversion types f and F to convert to a string
    representation of a floating point number; and we use conversion types e and E
    to convert to a string representation in scientific exponential format – as the
    following examples show:


    ```

    >>> ''lowercase %f, and uppercase %F give the same conversion'' % (3.14159, 3.14159)

    ''lowercase 3.141590, and uppercase 3.141590 give the same conversion''

    >>> ''lowercase %e gives a lowercase e, and uppercase %E gives an uppercase E
    in the outcome of the conversion'' % (100, 100)

    ''lowercase 1.000000e+02 gives a lowercase e, and uppercase 1.000000E+02 gives
    an uppercase E in the outcome of the conversion''

    ```


    As pointed out and shown in the example above, %e produces a lowercase e, vs.
    %E produces an uppercase E in the converted string.


    As for the type g, or G, it counts the total number of digits, instead of just
    the digits after the decimal point, as shown in the following examples:


    ```

    >>> myFloat = 1.23456

    >>> ''%.2g'' % 1.2345

    ''1.2''

    >>> ''%.2G'' % myFloat

    ''1.2''

    >>> ''%.2g'' % 1.23456

    ''1.2''

    ```


    ### Character Conversion Types


    Now, we are going to check out character conversions. Type c is used for a single
    character, as seen in the following example:


    ```

    >>> ''first use outright character %c, then use the ASCII value of %c'' % (''a'',
    97)

    ''first use outright character a, then use the ASCII value of a''

    ```


    As seen above, the corresponding argument could be an outright single-character
    or an integer of the ASCII value of the character.


    So we know that character is treated in Python as a single character string. Now
    let’s look at the types for string which are s, a, and r in the following example


    ```

    >>> ''Here we have 3 strings %s, %a, and %r'' % (''spam'', ''egg'', ''ham'')

    "Here we have 3 strings spam, ''egg'', and ''ham''"

    ```


    Note that all three (s, a, and r) give the same string outcome but they use different
    built-in functions str(), ascii(), and repr() if you are curious for the different
    types using these 3 particular characters s, a, and r. (The details of these 3
    different functions are for you to experiment and research in advanced Python
    perhaps in the future.)


    ### Inserting a ''%'' Character


    You might wonder, since character % is used to insert format string types, what
    about if we actually want to have the character % in the string? It turns out
    that there is a way to ''escape'' the special meaning for the % character – which
    is to use two consecutive % characters in a row in the format string (a common
    technique in many computer programming languages.) As shown in the following examples:


    ```

    >>> ''how do we get to %d%%?'' % (100)

    ''how do we get to 100%?''

    >>> ''how do we insert the %s%% character?'' % ('''')

    ''how do we insert the % character?''

    >>> ''how do we insert the %% character?'' % ()

    ''how do we insert the % character?''

    ```


    In the first example above, %d%%% means a decimal integer conversion type followed
    by a literal ''%'' character. In the second example, it''s simply a way to get
    the % character in our sentence – but we had to use a ''null'' string before the
    %% for it to work – try it and you will see. Or you can follow the third example
    to get the same result. Either way, the "hacks" we used got us what we want.


    Now let''s deal with the optional portions in the conversion specifiers:

    %[<flags>][<width>][.<precision>]<type> % values


    ## Conversion Flags


    First let''s look a bit of the flags. Optional conversion <flags> are specified
    as the first specifier right after the beginning % of the conversion specifiers.
    They provide further control for some conversion types. The following table shows
    the characters that could be used as flags:


    | Flag | Format Control |

    | :--- | :--- |

    | # | Display the base or decimal point for integer and floating point |

    | 0 | Pad values if they are shorter than the specified width |

    | - | Justification of values that are shorter than the specified field width
    |

    | + | Display the leading + sign for numeric values |


    Now let''s look at some examples to examine the details of the usage:


    ### The # Flag


    In the following snapshot, you will see how the # flag is used for integers with
    the d, o, and x types; and then how it is used for type f for floating point,
    and then exponentials:'
