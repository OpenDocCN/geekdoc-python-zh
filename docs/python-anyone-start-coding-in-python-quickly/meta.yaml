  md: '# Multiple if-else Chained Together


    Sometimes there are multiple alternatives thus we need more than two branches.
    In these situations, we can chain multiple of the if-else statements together.
    For example:


    ```

    >>>

    >>> x = 1

    >>> y = 2

    >>>

    >>> if x < y :

    ...     print(''x < y'')

    ... else :

    ...     if x == y :

    ...         print(''x == y'')

    ...     else :

    ...         if x > y :

    ...             print(''x > y'')

    ...

    x < y

    >>>

    ```


    In this example, we see that x and y are compared using different logic operators
    and there are 3 different alternatives: either x < y , or x == y , or x > y .


    However, you see that the way they are chained, if there are many more branches,
    we could easily be indented towards the right hand side of the screen, due to
    the indentations one after another, thus typing/coding becomes really inconvenient
    and awkward as we approach the right hand side of the screen with very little
    space left for each line of code. For this situation, we have a way to alleviate
    the awkwardness by combining else and if to become elif , as shown in the following
    examples:'
  merge: -1
  pgno: 96
