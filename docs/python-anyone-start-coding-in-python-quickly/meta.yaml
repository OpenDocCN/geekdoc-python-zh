    ## Docstring


    Contrary to many other languages, Python doesn''t have a multi-line comment notation.
    So if you need to document some description of some code in a file at the beginning
    of the file, that is, you want to have a block of comment, the only way is to
    start each line with the # sign for however many lines you need for the block
    of comment.


    Some misconception confuses the multi-line comment with the """ triple quotes
    """. This is wrong but unfortunately you see that taught in many places. Python
    has only one way to do comment which is to use the # notation.


    So if you have seen the triple quotes in action you might wonder what is going
    on, especially it seems that they are used as multi-line comment. Well, the triple
    quotes are used for a special purpose called docstring. They are treated just
    like regular strings (which we''ve seen a little bit in our print command of "Hello
    World"). But triple quotes differs from comments in that they can span multiple
    lines, although for a different purpose - as we can see in the following specification
    from Python.org:


    > "A docstring is a string literal that occurs as the first statement in a module,
    function, class, or method definition. Such a docstring becomes the __doc__ special
    attribute of that object.


    All modules should normally have docstrings, and all functions and classes exported
    by a module should also have docstrings. Public methods (including the __init__
    constructor) should also have docstrings. A package may be documented in the module
    docstring of the __init__.py file in the package directory.


    String literals occurring elsewhere in Python code may also act as documentation.
    They are not recognized by the Python bytecode compiler and are not accessible
    as runtime object attributes (i.e. not assigned to __doc__)..."


    So as the name suggested, docstring mostly is for documentation purpose, i.e.
    for things such as manual, specification, etc. It is really not the comment we
    want in the code and should not be used as such. In fact, there are tools to pull
    these docstrings out of code for the manuals and the likes. And it is precisely
    for this reason, docstring triple quotes should not be used for other in-code
    comments, which is for the benefit of the coders and really should not be included
    in the manuals or the likes. Therefore for coding comments, we should stick with
    the #-started comment lines as our in-code documentation.


