    \    - 编译器/解释器\n    - 一些常见误解\n    - 练习：\n- 第2章 设置 Python 编程与调试环境\n    - 下载/安装\n\
    \    - 启动 Python 解释器（交互模式/脚本模式）– 使用 IDLE/IDE\n    - Python（或任何解释型语言）的交互模式与脚本模式\n\
