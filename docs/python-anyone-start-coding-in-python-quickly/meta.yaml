- md: 'And if we talk about assignment, then we must also deal with statements, and
    expressions in statements, as well as the evaluation of their value.


    So what is a statement? Let’s first look at couple of examples we’ve used:


    ```

    print ("Spam, ham, and eggs.")

    ```


    ```

    MyString = "In Python, Spam and Eggs are used for fun in place of Foo and Bar"

    ```


    They are both statements but apparently have a bit difference. The first is a
    statement that could be executed to display something to the output. The second
    is assigning some value to the variable MyString.


    So here is the key concept: a statement is some code which could be executed by
    the interpreter. But if we are to dissect the 2nd statement, we see that the value
    on the right hand side, which is a string literal with the value of “In Python,
    Spam and Eggs are used for fun in place of Foo and Bar”, gets assigned to the
    left hand side which is the variable MyString. So we say that the evaluation of
    the right hand side, gets us the value of the string literal, and that value is
    then assigned to the variable on the left hand side. In fact, if we look into
    the first print statement, the value in the parenthesis is “Spam, ham, and eggs.”,
    which gets evaluated first, and then the value from the evaluation gets passed
    to the print command thus the value is printed out. And in this print statement
    situation, we have evaluation of the expression which is a string literal of “Spam,
    ham, and eggs.” This same concept was also at work for the MyString statement.


    As you can see, from the examples, we can layer expressions on top of expressions
    to form longer thus more complicated statements. As we progress throughout this
    book, there will be more examples from simple statements/expressions getting combined
    to form longer statements/expressions.


    Now, let’s look at function evaluation. We will jump ahead a bit here by implying
    that we have imported the math library (which is a prepackaged library/module
    for math functions.) So we will use the gcd function for greatest common denominator,
    as in this following statement:


    ```

    print (math.gcd(3, 6))

    ```


    So in this statement, print() as a function needs to take in argument(s) which
    should have some value. And the value we pass to print() is the value of the math.gcd()
    function so we say that the evaluation of the argument for the print() function
    is the value of the math.gcd() function. Very similar to how function is used
    in the math world, in that, a function is evaluated to produce some value.


    ## Boolean expressions


    Now we want to talk a bit about Boolean expressions. What is a Boolean expression?
    It’s basically an expression, when evaluated, giving a True or False value. Some
    basic examples such as “Is 3 equal to 3?” And the answer is True. “Is 3 equal
    to 6?” And the answer is obviously False. So to use the comparison operator we
    listed earlier, we say that 3 == 3 is True yet 3 == 6 is False. True and False
    are reserved keywords for the Boolean values and they are of the type bool as
    listed in the data type table earlier. You can type in type(True) or type(False)
    and the Python interpreter will tell you that they are of type bool. Please notice
    that we capitalize T and F for True and False, as true and false without the capital
    initial is not the keywords we are using here for Boolean.


    ## Logical Operators


    Now that we have dealt with Boolean (bool) type using one of the comparison operators,
    namely ==, it’s time to talk about logical operators and how the expression with
    logical operators get evaluated into True or False. So what is the value of this
    expression


    ```

    (3 == 3) and (3 == 6)

    ```


    We already know that 3 == 3 gives us True and 3 == 6 gives us False, so from the
    logical operator and, with which we will get a result of either True or False,
    this expression gets evaluated to False – just like the math logic we’ve seen
    in our childhood. Same thing with the other logical operators or and not.


    So we have the following snapshot to show a bit of how these logical operators
    work:


    ```

    >>> x = 3

    >>> y = 3

    >>> z = 6

    >>> x == y

    True

    >>> x == z

    False

    >>> not x

    False

    >>> x = 0

    >>> not x

    True

    >>> not (x == x)

    False

    >>> not x == x

    False

    >>>

    ```


    The second of the last line from the above snapshot not (x == x) is actually evaluated
    in this order:


    x == x is True

    And then not (True) gives us False

    In fact, the last line gives us the same result as operator == is applied first
    before operator not gets applied (we will talk about operator precedence in a
    bit.)


    So now you see that we can combine these expressions in many different ways, and
    could actually get a lot more complicated (but of course, unless the app situation
    forces us to code in such complexity, it’s normally advised to make your code
    simpler for readability – not only for other coders to read but also for yourself
    after sometimes down the road – as you likely might not understand what you coded
    a few months ago if the complexity is too much.)


    ## Precedence vs. Association


    Now we have seen some operators at work and that we have talked about more complex
    statements, how do we evaluate an expression when there are multiple operators
    involved? The answer turns out is very similar, again, to what we have learned
    in the math world. There is an order of operation which is called precedence.
    We learned as a child already that multiplication/division takes precedence over
    addition/subtraction. This same rule applies in the computer world as well. We
    have a precedence table below to guide us how these evaluations could be done
    in the correct order: (this is a complete list so there are some operators in
    this table which we have not covered although we will cover quite a number of
    them in this book)


    | Operator | Description |

    |---|---|

    | () | Parentheses (grouping) |

    | f(args...) | Function call |

    | x[index:index] | Slicing |

    | x[index] | Subscription |

    | x.attribute | Attribute reference |

    | ** | Exponentiation |

    | ~x | Bitwise not |

    | +x, -x | Positive, negative |

    | *, /, % | Multiplication, division, remainder |

    | +, - | Addition, subtraction |

    | <<, >> | Bitwise shifts |

    | & | Bitwise AND |

    | ^ | Bitwise XOR |

    | \| | Bitwise OR |

    | in, not in, is, is not, <, <=, >, >=, <>, !=, == | Comparisons, membership,
    identity |

    | not x | Boolean NOT |

    | and | Boolean AND |

    | or | Boolean OR |

    | lambda | Lambda expression |


    In this precedence table, the precedence ranking lowers from top to bottom – so
    the highest precedence is at the top, and vice versa.


    As for associativity, almost all operators have left-to-right associativity. So
    when there are multiple operators at the same precedence level appearing in a(n)
    statement/expression, the evaluation goes from left to right so the leftmost operator
    is evaluated first and then the second and so on as long as they are all at the
    same precedence level.


    Here is a simple example to make the point a bit clearer, as this might sound
    confusing but really is not that complicated:

    How does the expression 100/10*10 get evaluated? Since both operators / and *
    have the same precedence, so we look to the associativity to determine the order
    of execution. As both operators have left to right associativity, so this expression
    is executed as if we have the parenthesized 100/10, that is, it’s like this expression
    (100/10)*10. Since () has the highest precedence, so we know that / is executed
    before *, just like in 100/10*10 due to associativity.


    And as mentioned, most operators have left-to-right associativity; so this is
    really not as complex as it might appear.


    Now with the realization of precedence and associativity of operators in expressions,
    we are moving forward to summarize the sequential execution in the next section.


    ## Sequential Execution


    So the statements in Python is executed sequentially just like many other coding
    languages. Of course, this sequential order gets interrupted when there is a function
    call and we will have a chapter dealing with function calls later. But normally
    statements get executed one after another. For complex statement, we not only
    need to deal with precedence of the operators but also need to pay attention to
    associativity of the operator.


    ## Comments


    Now let’s talk about comments. Comment is actually a very important thing in programming.
    It is the explanation of what the code is doing and sometimes also include the
    design, architecture, consideration, and anything the software engineer/coder
    feels appropriate to make the code more readable by others – or the coder him(her)self
    down the road especially when the software gets more complex – as they often do.
    In my software engineering organizations, often the coder’s name, time of change
    made, as well as a wealth of other information are mandated to be included in
    the comments – often both next to the code change as well as at the beginning
    of the file.


    Python comment starts with a “#” to make the rest of the line ignored by the interpreter.
    So comment is really for human readers of the code. You can of course start a
    comment anywhere in a line and many times coders follow the code with # and then
    the explanation to make the code logic clearer to the reader.


