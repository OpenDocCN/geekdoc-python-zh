- md: '## Recursion vs. looping iteration


    We have now looked at many examples of looping and recursion. Let’s now compare
    and contrast them for a bit more insight:


    - Both looping and recursion are dealing with iterations and can achieve repetitions

    - Looping uses looping statement; recursion uses selection / branching statement

    - Looping terminates when looping condition tests negative; recursion terminates
    when it reaches the base case

    - Both approach the solution by reducing the problem a little bit at each iteration
    – an application of the divide-and-conquer technique

    - Infinite loop can happen in both cases: in looping the looping condition may
    always test positive; in recursion the base case may never be reached

    - Sometimes it might not be easy to come up with a looping solution; whereas recursion
    solution might be easier to code but the overhead incurred with the (recursive)
    function calls could be tremendous and sometimes might not be possible to execute
    as we bump into the machine limitation


    So as we get more into coding, we certainly will run into situation where one
    technique is called for over the other. With the insight, hopefully we will be
    able to discern better as to which one to use and make the right decision earlier
    in the development cycle such that the maintenance effort down the road is lightened
    up a little bit.


