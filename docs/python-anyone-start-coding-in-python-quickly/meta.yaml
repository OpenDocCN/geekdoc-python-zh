  mdcn: "## 函数的求值\n\n既然我们已经对函数有了基本的了解，现在让我们看看当函数在表达式中被使用（调用）时是如何求值的，例如下面这个例子：\n\n\
    ```python\n>>> import math\n>>> def myMax ( inList ) :\n...     maxItem = -math.inf\n\
    ...     for item in inList :\n...         if item > maxItem :\n...           \
    \  maxItem = item\n...     return maxItem\n...\n>>> largest = myMax ( [2, 10,\
