    the specific ways to designate (but simply just a designation and it will become
    clear later) a data member protected or private is by prepending the data member
    identifier with a underscore (_), or two underscores (__), to make it protected
    or private respectively. As the following code illustrates:


    ```python

    >>> class GradeBook :

