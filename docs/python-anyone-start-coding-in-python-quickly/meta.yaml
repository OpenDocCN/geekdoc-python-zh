  md: 'And if we talk about assignment, then we must also deal with statements, and
    expressions in statements, as well as the evaluation of their value.


    So what is a statement? Let’s first look at couple of examples we’ve used:


    ```

    print ("Spam, ham, and eggs.")

    ```


    ```

    MyString = "In Python, Spam and Eggs are used for fun in place of Foo and Bar"

    ```


    They are both statements but apparently have a bit difference. The first is a
    statement that could be executed to display something to the output. The second
    is assigning some value to the variable MyString .


    So here is the key concept: a statement is some code which could be executed by
    the interpreter. But if we are to dissect the 2nd statement, we see that the value
    on the right hand side, which is a string literal with the value of “In Python,
    Spam and Eggs are used for fun in place of Foo and Bar”, gets assigned to the
    left hand side which is the variable MyString . So we say that the evaluation
    of the right hand side, gets us the value of the string literal, and that value
    is then assigned to the variable on the left hand side. In fact, if we look into
    the first print statement, the value in the parenthesis is “Spam, ham, and eggs.”,
    which gets evaluated first, and then the value from the evaluation gets passed
