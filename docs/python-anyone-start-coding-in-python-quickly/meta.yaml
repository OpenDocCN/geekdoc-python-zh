    这就是有时充满趣味的Python文化。


    现在，让我们来了解一些基本运算符。但在开始之前，我们先介绍一些术语。第一个术语是变量。什么是变量？你可以把它想象成一个身份标识（ID）。它基本上是一个命名的对象，在运行时可以占据某个内存位置。因此，变量可以包含值。值可以有多种类型。从简单的类型如数字（可以是整数——类型为int，或者可以有小数点，称为浮点类型float），到字符串（类型为str——字符的组合），再到我们将在本书后面讨论的更复杂的基本类型聚合。现在，让我们先使用一些基本的内置数据类型（如下表所列）来学习Python。


    | 文本类型： | str |

    | 数字类型： | int, float, complex |

    | 序列类型： | list, tuple, range |

    | 映射类型： | dict |

    | 集合类型： | set, frozenset |

    | 布尔类型： | bool |

    | 二进制类型： | bytes, bytearray, memoryview |


    这里提供了一个完整的内置类型参考表（根据维基百科）：


    | 类型 | 描述 | 语法示例 |

    | --- | --- | --- |

