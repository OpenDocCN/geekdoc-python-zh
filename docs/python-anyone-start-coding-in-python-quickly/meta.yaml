    ## 全捕获


    因此，我们不想有这么多 `except` 子句——我们能做什么呢？事实证明，有一种方法可以实现全捕获，只需使用不带任何异常名称的 `except`，但有一个注意事项，如下所示的脚本所示：


    ![](img/b52ff7adacf4e0b514b791444be82d81_199_0.png)


    当我们运行脚本时，得到以下结果：


    ![](img/b52ff7adacf4e0b514b791444be82d81_199_1.png)


    这种“全捕获”方法有几个后果。首先，不再有单独的异常处理，因为我们没有为每个异常设置单独的子句。其次，由于所有异常都被捕获，当我们按 CTRL-c 试图退出无限循环时，我们无法做到。正如你从结果中观察到的：我们首先遇到了除以
    0 的异常，然后像之前一样按了回车键；但第 3 次输入实际上是 CTRL-c，因此输出有点混乱——具体来说，“出了点问题……”文本没有在新行开始。然而，我们无法跳出无限循环，因为
    CTRL-c “异常”被捕获了。唯一的退出方式是关闭这个命令窗口。因此，这种“全捕获”处理可能很诱人，但不一定是最佳实践。


    既然我们学会了如何捕获异常，我们可以将其用于 `FileNotFoundError` 异常，这是我们在尝试打开文件时之前遇到的。如下例所示：


    ![](img/b52ff7adacf4e0b514b791444be82d81_201_0.png)


    运行结果：


    ![](img/b52ff7adacf4e0b514b791444be82d81_201_1.png)


    ## 传递异常错误消息


    因此，我们能够捕获错误异常。现在我们将进一步使用一个循环来提示输入文件名，以便我们实际上可以无异常地打开它。此外，还要忠实地传递异常生成的错误消息，而不是我们自己的消息。这可能很有用，特别是当我们捕获调用我们的函数的某些异常时。因为调用函数可能希望通过错误消息了解异常，以便决定采取什么行动。我们有如下图所示的代码：


    ![](img/b52ff7adacf4e0b514b791444be82d81_202_0.png)


    运行结果：


    ```

    C:\Users\jesse\AppData\Local\Programs\Python\Python310>

    C:\Users\jesse\AppData\Local\Programs\Python\Python310>python c:\jc\tmp\openfile3.py

    Please enter file name: mytestfile.txt

    [Errno 2] No such file or directory: ''mytestfile.txt''

    Please enter file name: LICENSE.txt

    <_io.TextIOWrapper name=''LICENSE.txt'' mode=''r'' encoding=''cp1252''>

    Please enter file name:

    ```


    如你所见，我们尝试打开一个不存在的文件“mytestfile.txt”，并在 `openMyFile()` 函数中遇到了 `FileNotFoundError`
    异常，异常错误消息 `myErr` 被返回到 `main()` 函数的无限循环中并被打印出来。然后我们尝试了一个存在的文件“LICENSE.txt”，因此文件被无异常地打开。文件引用被返回，并通过
    `print(returnValue)` 显示了文件句柄。


    ## 练习：


    12.1 编写一个程序，提示用户输入要打开的文件名，然后打开文件，读取内容，并显示内容。如果用户输入的文件不存在，还要添加异常处理。


    12.2 编写一个程序，提示用户输入数字，直到用户输入“done”。用户完成后，显示数字的计数、总和和平均值。如果用户输入的不是整数也不是“done”，还要添加异常处理。


    ## 后记


    最后，在大约一年左右的写作工作后，我来到了第 8 章的结尾，并认为这将作为 Python 编程的基础，或者任何开始计算机编程的人的基础。从而实现了本书的两个目标：首先是为初次编程者提供介绍；其次是让有经验的程序员快速开始使用
    Python。因此，除了用于解释和/或展示编码如何完成的编码示例，本书实际上不包含额外的问题或练习。这样做是因为随着互联网的出现，有足够的在线编码练习供人们在
    Python 编程之旅中随时投入。


    显然，有许多更高级的主题未包含在本书中。因为我相信，凭借本文涵盖的基础知识，足以让任何编码者解决任何（或至少几乎所有）可以使用 Python 解决方案解决的问题。未来，我希望能发布关于高级
    Python 编程的书籍；但我真诚地（另一种）希望，到那时，本书的读者已经足够高级，以至于不需要一本书来谈论高级 Python——从而实现了让我们的读者在尽可能短的时间内开始使用
    Python 的“隐藏”目标。


    随着大规模开放在线课程（MOOC）的普及，我打算将本书电子化，以利用技术进步为计算机素养做出贡献。作为一名教育者，在我工程职业生涯中对软件有着无法抑制的热情，我理解有不同的学习方式，每个人都需要选择适合自己的方式。然而，自从我成为父亲以来，我尝试越来越少地使用纸张，希望能多拯救一棵树，为子孙后代留下一个更好的世界。这希望不会阻碍《Python
    Anyone》的潜在读者——正如书名所示，本书确实试图为任何想学习 Python 的人提供一些有用的帮助。而且我将来很可能会被说服发布纸质版，以确保我没有对那些使用纸质版学习效果更好的人造成不利影响。


    此外，如前所述，我可能在不久的将来发布一些关于更高级 Python 的后续作品。因此，如果你感兴趣，特别是在你读完本书之后，非常欢迎你注册兴趣列表 @ https://www.higherchllenge.com/form/morepython，以获取其可用性的最早通知以及一些不错的折扣。


    最后，我要向那些在这段旅程中激励、鼓励、帮助和/或为我加油的人表示感谢。永远，我感激你们；并且对我们的读者的利益做出了重大贡献。


