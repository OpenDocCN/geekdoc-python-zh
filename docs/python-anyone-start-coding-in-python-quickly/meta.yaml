    \ exception\n\n## Chapter 5 Input/Output\n\nIn this chapter, we will look into\
    \ how to take input from user (console in many coding environments/IDEs – in fact,\
    \ to be more accurately, keyboard is where the input is coming from – we see our\
    \ input on the console monitor simply because all of our key strokes are “echoed”\
    \ on the display); and how to send output to display (which is the monitor where\
    \ the console window is hosted) as input and output.\n\n## Input From Keyboard\n\
    \nSo let’s look at this very simple code in the following snippet:\n\n```\n>>>\n\
    >>> i = input()\n3\n>>> print(i)\n3\n>>>\n```\n\nAs you can see, we asked the\
    \ user to input, from console, an integer. The user entered 3 and then hit the\
    \ return/enter key to signal the entry of the input. We then printed the variable\
    \ which was assigned with the input via the statement i = input() .\n\nSo pretty\
    \ straightforward. Let’s elaborate a bit more. Check out the following code:\n\
    \n```\n>>>\n>>> type(i)\n<class 'str'>\n>>>\n>>> print(10+i)\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: unsupported\
    \ operand type(s) for +: 'int' and 'str'\n>>>\n```\n\nFirst we checked out the\
    \ type of the variable i (remember Python has dynamic typing thus we didn’t specify\
    \ the variable type.) Using type() we found however a bit surprise, that the type\
    \ of i is string ( str ), not an integer as we were trying to get. Well, Python\
    \ does this for all user input – essentially treating the data entry as a string.\
    \ And that’s why in the code above when we were trying with print(10+i) we got\
    \ an error – as we cannot add a string to a number (the integer literal 10.)\n\
    \nTo expand this even more, so we ask what we can do to correct this error?\n\n\
    ```\n>>>\n>>> print( 10 + int(i) )\n13\n>>> type(i)\n<class 'str'>\n>>> type(\
    \ int(i) )\n<class 'int'>\n>>>\n```\n\nAs you see in the above example, we use\
    \ a function int() to cast the input from type string to type integer. As shown\
    \ in the code, after the int() casting, type() now shows that it’s of type/class\
    \ int . And thus we were able to add the value of integer i to 10 and then if\
    \ we use the print() again we should get the result as 13 to display as shown\
    \ above in the example.\n\nWe can also add a prompt, as an argument to the function\
    \ input() , to let the user know what is expected to be entered:\n\n```\n>>>\n\
    >>> input(\"Give me an integer, please: \")\nGive me an integer, please: 3\n'3'\n\
    >>> myInt = input(\"Give me an integer, please: \")\nGive me an integer, please:\
    \ 3\n>>> type(myInt)\n<class 'str'>\n>>>\n```\n\nNow we have the prompt so our\
    \ user knows what to do. And we assign the input to our variable myInt . The type\
    \ of myInt is of course string, but we know how to handle it now using the casting\
    \ function int() .\n\n## Output To Console Monitor Display\n\nNow we know how\
    \ to obtain input from user, let's look into how to display output to the user.\
    \ We've actually already seen the primary function print() used for this purpose.\n\
    \n## Unformatted Console Output\n\nWhat we have done so far are simply passing\
    \ whatever we want to display to the function print() . In fact, we've only been\
    \ passing one argument. But print() is much more capable than that. We could pass\
    \ multiple arguments/objects to print() with comma separating them such as what\
    \ the following example shows:\n\n```\n>>> foodItem1 = \"spam\"\n>>> foodItem2\
    \ = \"egg\"\n>>> foodItem3 = \"ham\"\n>>> print(foodItem1, foodItem2, foodItem3)\n\
    spam egg ham\n>>>\n```\n\nWe saw that 3 arguments were passed to print() and print()\
    \ then displays them with a space following the first 2 and then a newline at\
    \ the very end.\n\nHere let me point out two things. First, I mentioned arguments/objects\
    \ earlier as in object-oriented coding, many things (almost all but not quite\
    \ as you will appreciate more and more as you go down this coding journey) are\
    \ treated as objects. Second, any object can be passed to print() and print()\
    \ will convert it into some string representation to display. As what the following\
    \ examples depict:\n\n```\n>>> myList = [1, 'a', 2, 'b']\n>>> myArray = ('i',\
    \ [1, 2, 3])\n>>> print( myList, myArray )\n[1, 'a', 2, 'b'] ('i', [1, 2, 3])\n\
    >>> print( myList, myArray, len )\n[1, 'a', 2, 'b'] ('i', [1, 2, 3]) <built-in\
    \ function len>\n>>> print( myList, myArray, len, print )\n[1, 'a', 2, 'b'] ('i',\
    \ [1, 2, 3]) <built-in function len> <built-in function print>\n>>> print( myList,\
    \ myArray, len, print (len ) )\n<built-in function len>\n[1, 'a', 2, 'b'] ('i',\
    \ [1, 2, 3]) <built-in function len> None\n```\n\nSo now you see that print()\
    \ is a method with variable number of arguments in that we can put as many arguments\
    \ as we want and print() will just faithfully display all of them in order – formally\
    \ it is shown as print( <obj>, <obj>, ..., <obj> ).\n\nprint() works with all\
    \ sorts of objects as you have seen: when we try to print the function len() it\
    \ displays that it is a built-in function, so as when we try to print the function\
    \ print().\n\nOne thing interesting that was observed from the last of the above\
    \ examples: when we try to print() the object of print(len) – since print() is\
    \ a function so we are printing the return value object of the function, if any\
    \ – it gives us None. So this tells us that print(len) is not returning a value\
    \ as the evaluation of the function print() results in void which is how this\
    \ function is defined. So in other words, print(len) tells us that len is a built-in\
    \ function and displays as such, but the print function itself is not returning\
    \ anything. If you are observant, you probably spotted that there is a line above\
    \ the final printed line for the last example, which displays <built-in function\
    \ len> . This line is actually the printed outcome of the print( len ) inside\
    \ the print( myList, myArray, len, print( len ) ) command. So we see that the\
    \ inner print( len ) is executed with its display and then the outer print() gets\
    \ executed.\n\nSo how about if we want to display our output a bit more elegantly?\
    \ With a bit more control?\n\nprint() actually takes keywords as arguments, in\
    \ the form of <keyword>=<value> when it's called, as can be seen in the following\
    \ examples:\n\n```\n>>>\n>>> print('spam', 'egg', 'ham')\nspam egg ham\n>>>\n\
    >>> print('spam', 'egg', 'ham', sep='|')\nspam|egg|ham\n>>>\n>>> print('spam',\
    \ 'egg', 'ham', sep='|', end='!!!')\nspam|egg|ham!!!>>>\n>>>\n>>> print('spam',\
    \ 'egg', 'ham', sep='|', end='!!!\\n')\nspam|egg|ham!!!\n>>>\n```\n\nSo as you\
    \ can see, we first just did a print() of three objects 'spam', 'egg', 'ham';\
    \ then we added a separator '|' to separate the objects when they are displayed;\
    \ then we added a ending to the display with '!!!'. But you noticed that the '>>>'\
    \ (the Python shell prompt usually appearing at the beginning of the line) is\
    \ not at the beginning of the next line but right after the line that's displayed.\
    \ How so? Since normally there is a newline automatically added at the end of\
    \ the print() display. But because we specified the ending, the newline character\
    \ was not automatically added. So in the next example in the above screenshot,\
    \ we added the special character '\\n' at the end of the line to achieve the newline\
    \ effect to look a bit more elegant.\n\nSo far we are using only the standard\
    \ output – our console window. The input/output with file is left for the future.\
    \ But now let’s look at how we can control a bit more of the format when we output\
    \ to the display.\n\n## Formatted string literals\n\nTo format a string literal,\
    \ simply use an f (or F) in front of the string before the quote, and then use\
    \ {} to include substitutions for variables or literal values, such as in the\
    \ following example:\n\n```\n>>>\n>>> thisYear = 2021\n>>> bookTitle = 'Python\
    \ Anyone'\n>>> f'The book {bookTitle} is written in year {thisYear}'\n'The book\
    \ Python Anyone is written in year 2021'\n>>>\n>>> f'The book \"{bookTitle}\"\
    \ is written in year {thisYear}'\n'The book \"Python Anyone\" is written in year\
    \ 2021'\n>>>\n```\n\nSo we have displayed a simple sentence and then used the\
    \ single quote/double quote to quote the book title in the displayed message –\
    \ a technique mentioned before.\n\nAn alternative way is to use str.format() .\
    \ So here we use the common practice of object oriented programming. We treat\
    \ the string as an object (although a literal), and then attached to it the method\
    \ format to control the output display, in some way a similar fashion as we just\
