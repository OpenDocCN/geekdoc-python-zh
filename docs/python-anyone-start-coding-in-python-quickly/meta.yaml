  md: '# Objects are mutable


    Objects are mutable, subject to some rules such as what we’ve just seen regarding
    public, protected, and private data members, although messy at times but modifying
    object (or more precisely modifying the value of its data members for the most
    part) are inevitable at times. Also, we must not forget that Python pretty much
    treats everything as object (even functions are treated as objects but that’s
    a topic for another day.) So it’s totally conceivable that objects are mutable.
    Without complicating the matters, we will just use some simple objects in the
    following examples, as we have seen the user-defined class objects already.


    ```

    PageNumber = 8

    MyString = "In Python, Spam and Eggs are used for fun in place of Foo and Bar"

