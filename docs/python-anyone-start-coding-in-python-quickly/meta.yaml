    the previous example above it – in that we have 6 total characters (5 digits and
    1 decimal point.) In the last example we specified only5 characters which is 1
    short of our total actual characters hence was ignored.


    # The - Flag


    This – flag is for justification. So if we have a numerical value that’s shorter
    than the specified width, it’s usually displayed as right-justified. We can use
    the – flag to make it left-justified instead, as shown in the following examples:'
