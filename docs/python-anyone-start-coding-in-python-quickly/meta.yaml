    1 spam, 2 eggs, and 1 ham will cost 4.36

    ```


    ## 使用转换说明符进行格式化输出


    那么，让我们深入了解一下这些转换说明符——即嵌入在这些格式字符串中的 `%x`（`%` 后跟一个字符）。


    这些转换说明符采用以下形式：

    %[<flags>][<width>][.<precision>]<type> % values


    `%` 和 `<type>` 是必需的。方括号中的其他说明符是可选的。


    下表列出了每个转换说明符的作用：


    | 说明符 | 作用 |

    |---|---|

    | % | 转换说明符的开始 |

    | <flags> | 表示一个或多个标志，用于对格式化进行更精细的控制 |

    | <width> | 指定格式化结果的最小宽度 |

    | .<precision> | 指定浮点数/字符串输出的长度/精度 |

    | <type> | 指示要转换成的数据类型 |


    ## 转换类型


    转换类型 `<type>` 位于转换说明符的末尾，是必需的。它指示要替换到格式字符串中的值的数据类型。

    以下是转换类型的表格：


    | <type> | 转换为 |

    |---|---|

    | d, i, u | 十进制整数 |

    | x, X | 十六进制整数 |

    | o | 八进制整数 |

    | f, F | 浮点数 |

    | e, E | 科学计数法 / 指数形式 |

    | g, G | 浮点数或指数形式 |

    | c | 单个字符 |

    | s, a, r | 字符串 |

    | % | 单个字符 ''%'' |


    ### 整数转换类型


    现在让我们看一些整数转换的示例：


    ```

    >>> ''1st integer using %d, 2nd using %i, 3rd using %u'' % (1, 2, 3)

    ''1st integer using 1, 2nd using 2, 3rd using 3''

    >>> ''lowercase %x, uppercase %X'' % (255, 255)

    ''lowercase ff, uppercase FF''

    >>> ''only lowercase %o'' % 15

    ''only lowercase 17''

    >>> ''another lowercase %o'' % 9

    ''another lowercase 11''

    ```


    所以，`d`、`i` 和 `u` 这三种类型都是将相应的参数转换为十进制整数的字符串表示：（注意，Python 保留了 `%d` 和 `%i` 是为了与 C
    兼容；而 `%u` 已过时，其处理方式与 `%d` 相同——这里包含它是因为你可能仍然会在许多地方看到它）


    至于 `x` 和 `X`，相应的参数被转换为十六进制整数值的字符串表示；而 `o` 将相应的参数转换为八进制整数值的字符串表示——如上面最后两个示例所示（如果你不熟悉八进制和/或十六进制数字，这里简要解释一下
    255 如何转换为 ff/FF——因为八进制数字从 0 到 7，当遇到 8 时，我们向左进位，所以八进制中的 8 表示为 10，其中数字 1 是进位；类似地，十六进制数字从
    0 到 15，表示为 0 到 9，然后 A 是 10，B 是 11，C 是 12，D 是 13，E 是 14，F 是 15；所以 FF 或 ff 可以通过将左边的
    F 乘以 16 得到 240，然后加上右边的 F 的 15，得到 255，从而转换回十进制数。）


    类型 `x` 给出小写输出，`X` 用于大写。（并且应该可以理解，没有大写的 O，因为当我们只处理 0 到 7 时，没有必要。）


    ### 浮点数转换类型


    至于浮点数，我们使用转换类型 `f` 和 `F` 转换为浮点数的字符串表示；我们使用转换类型 `e` 和 `E` 转换为科学指数格式的字符串表示——如以下示例所示：


    ```

    >>> ''lowercase %f, and uppercase %F give the same conversion'' % (3.14159, 3.14159)

    ''lowercase 3.141590, and uppercase 3.141590 give the same conversion''

    >>> ''lowercase %e gives a lowercase e, and uppercase %E gives an uppercase E
    in the outcome of the conversion'' % (100, 100)

    ''lowercase 1.000000e+02 gives a lowercase e, and uppercase 1.000000E+02 gives
    an uppercase E in the outcome of the conversion''

    ```


    如上所述和示例所示，`%e` 在转换后的字符串中产生小写 e，而 `%E` 产生大写 E。


    至于类型 `g` 或 `G`，它计算的是总位数，而不仅仅是小数点后的位数，如以下示例所示：


    ```

    >>> myFloat = 1.23456

    >>> ''%.2g'' % 1.2345

    ''1.2''

    >>> ''%.2G'' % myFloat

    ''1.2''

    >>> ''%.2g'' % 1.23456

    ''1.2''

    ```


    ### 字符转换类型


    现在，我们来看看字符转换。类型 `c` 用于单个字符，如以下示例所示：


    ```

    >>> ''first use outright character %c, then use the ASCII value of %c'' % (''a'',
    97)

    ''first use outright character a, then use the ASCII value of a''

    ```


    如上所示，相应的参数可以是直接的单个字符，也可以是该字符的 ASCII 值的整数。


    我们知道，在 Python 中，字符被视为单个字符的字符串。现在让我们看看字符串的类型，即 `s`、`a` 和 `r`，如以下示例所示：


    ```

    >>> ''Here we have 3 strings %s, %a, and %r'' % (''spam'', ''egg'', ''ham'')

    "Here we have 3 strings spam, ''egg'', and ''ham''"

    ```


    请注意，所有三种类型（`s`、`a` 和 `r`）都给出相同的字符串结果，但如果你好奇这三种特定字符 `s`、`a` 和 `r` 的不同之处，它们使用了不同的内置函数
    `str()`、`ascii()` 和 `repr()`。（这 3 个不同函数的详细信息留待你将来在高级 Python 中进行实验和研究。）


    ### 插入 ''%'' 字符


    你可能想知道，既然字符 `%` 用于插入格式字符串类型，那么如果我们实际上想在字符串中包含字符 `%` 怎么办？事实证明，有一种方法可以“转义”`%` 字符的特殊含义——就是在格式字符串中连续使用两个
    `%` 字符（这是许多计算机编程语言中的常用技巧）。如以下示例所示：


    ```

    >>> ''how do we get to %d%%?'' % (100)

    ''how do we get to 100%?''

    >>> ''how do we insert the %s%% character?'' % ('''')

    ''how do we insert the % character?''

    >>> ''how do we insert the %% character?'' % ()

    ''how do we insert the % character?''

    ```


    在上面的第一个示例中，`%d%%` 表示一个十进制整数转换类型后跟一个字面量的 `%` 字符。在第二个示例中，它只是在我们的句子中获得 `%` 字符的一种方式——但我们必须在
    `%%` 之前使用一个“空”字符串才能使其工作——试一试你就会明白。或者你可以按照第三个示例来获得相同的结果。无论哪种方式，我们使用的“技巧”都达到了我们的目的。


    现在让我们处理转换说明符中的可选部分：

    %[<flags>][<width>][.<precision>]<type> % values


    ## 转换标志


    首先让我们看看标志。可选的转换 `<flags>` 被指定为转换说明符中起始 `%` 之后的第一个说明符。它们为某些转换类型提供进一步的控制。下表显示了可用作标志的字符：


    | 标志 | 格式控制 |

    | :--- | :--- |

    | # | 显示整数和浮点数的基数或小数点 |

    | 0 | 如果值短于指定宽度，则用零填充 |

    | - | 对短于指定字段宽度的值进行左对齐 |

    | + | 为数值显示前导 + 号 |


    现在让我们看一些示例来检查使用细节：


    ### # 标志


    在下面的快照中，你将看到 `#` 标志如何用于整数的 `d`、`o` 和 `x` 类型；然后如何用于浮点数的 `f` 类型，以及指数形式：'
