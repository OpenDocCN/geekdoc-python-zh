- md: "## Writing to file\n\nNow that we know how to open a file in different access\
    \ modes and at different locations, let’s try to write something to a file. Since\
    \ we already have the file reference to `pythonReadWriteTest2.txt` and that this\
    \ file is open in write mode, we demonstrate how it’s done in the following:\n\
    \n```\n>>> myFileRef2 = open(myFilePath, 'w')\n>>> myFileRef2.write(\"Python spam\
    \ and eggs\\n\")\n21\n>>> myFileRef2.write(\"The previous line's write has 21\
    \ characters including the new line '\\n' which is counted as one character\\\
    n\")\n105\n>>> myFileRef2.write(\"The write call returns the number of characters\
    \ written\\n\")\n56\n>>>\n```\n\nSo we include the open() call at the beginning\
    \ for continuation here from the previous illustration. We know that this file\
    \ is open and we were ready to write something to it. So we had 3 calls to write()\
    \ with 3 lines of text. Notice that we ended each line with the special character\
    \ '\\n' which is an escape sequence for newline so that the text is separated\
    \ into 3 different lines. Also after each call to write(), Python interpreter\
    \ returns and displays the number of characters written as shown.\n\n## Reading\
    \ from file\n\nNow that we have done some writing, let's move on to reading this\
    \ file which we just wrote to. As shown in the following:\n\n```\n>>> textLines\
    \ = myFileRef2.read()\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nio.UnsupportedOperation: not readable\n>>> myFileRef2 =\
    \ open(myFilePath)\n>>> textLines = myFileRef2.read()\n>>>\n>>> textLines\n\"\
    Python spam and eggs\\nThe previous line's write has 21 characters including the\
    \ new line '\\n' which is counted as one character\\nThe write call returns the\
    \ number of characters written\\n\"\n>>>\n```\n\nWe see that the first read got\
    \ us an error message. As the file was opened to write, not read. So we use a\
    \ different file handle `myFileRef2` for the return reference to the file from\
    \ the open() call with default mode of read. You probably will see in some code\
    \ the file references are names to indicate whether it's for input or output,\
    \ such as `fin` or `fout` respectively. It's really a personal preference yet\
    \ the self-documenting built into the code is definitely good. So in this illustration\
    \ of read, after we opened the file for read, we called read() to read the file\
    \ content and assigned the value to `textLines`. We then showed what `textLines`'\
    \ value is. It is actually a lengthy string with all 3 lines, one after another,\
    \ separated by the '\\n' newline character.\n\nHowever, if we open the file with\
    \ some app such as Notepad, we see that they appear on 3 different lines, as shown:\
    \ (although it appears that there is one more line due to the included '\\n' in\
    \ our write and this stored character gets interpreted by Notepad as a new line)\n\
    \nIn fact, if we use the Python call, we will see also 3 lines as below: (same\
    \ reason as before that it appears with an extra line due to the stored new line\
    \ character gotten interpreted by Python interpreter to form an extra line)\n\n\
    ```\n>>> print(textLines)\nPython spam and eggs\nThe previous line's write has\
    \ 21 characters including the new line '\\n' which is counted as one character\n\
    The write call returns the number of characters written\n>>>\n```\n\nAnd since\
    \ we added the '\\n' at end of each line, we have the effect of an extra \"blank\"\
    \ line after the 3rd line.\n\nNot only we can read the entire file in one call\
    \ as we just saw, but we could read the input one line at a time by using `readline()`\
    \ instead of `read()`. We show some insights of reading input in the following:\n\
    \n```\n>>> print(textLines)\nPython spam and eggs\nThe previous line's write has\
    \ 21 characters including the new line '\\n' which is counted as one character\n\
    The write call returns the number of characters written\n\n>>>\n>>> line1 = myFileRef2.readline()\n\
    >>> line1\n''\n>>>\n>>> myFileRef2.close()\n>>> myFileRef2 = open(myFilePath)\n\
    >>>\n>>> line1 = myFileRef2.readline()\n>>> line1\n'Python spam and eggs\\n'\n\
    >>> line2 = myFileRef2.readline()\n>>> line2\n\"The previous line's write has\
    \ 21 characters including the new line '\\n'\"\n>>> line3 = myFileRef2.readline()\n\
    >>> line3\n\"' which is counted as one character\\n\"\n>>> line4 = myFileRef2.readline()\n\
    >>> line4\n'The write call returns the number of characters written\\n'\n>>>\n\
    ```\n\nIn this illustration, we have the `print()` of the entire file content\
    \ at the top so it’s easier to compare. Then we call `readline()` and assigned\
    \ it to `line1`. Yet when we showed `line1`, it was just showing the single quotes\
    \ with nothing. This is actually due to the read we did before and we were already\
    \ at the end of file (remember our files are sequentially accessed as previously\
    \ mentioned.) So to properly demonstrate `readline()`, we `close()` the file and\
    \ then `open()` again. Then we called `readline()` 3 times and assigned each line\
    \ of text to `line1`, `line2`, and `line3` as shown. What’s a bit messy here is\
    \ since we have a new line character stored in the file and the `readline()` was\
    \ treating it as a separate line thus we end up doing an extra `readline()` to\
    \ get the last line into `line4` so as to get to the end of the file.\n\nThere\
    \ is also a bit of nuance in that each line has a '\\n' trailing character. And\
    \ it will appear to have an extra \"blank\" line if we were to `print()` them:\n\
    \n```\n>>> print(line1)\nPython spam and eggs\n\n>>> print(line2)\nThe previous\
    \ line's write has 21 characters including the new line '\\n'\n\n>>> print(line3)\n\
    ' which is counted as one character\n\n>>> print(line4)\nThe write call returns\
    \ the number of characters written\n\n>>>\n```\n\nSo if you recall the numerous\
    \ methods for strings, we could use `rstrip()` to trim the right-hand-side trailing\
    \ character which is '\\n', as shown below:\n\n```\n>>> print(line1.rstrip())\n\
    Python spam and eggs\n>>> print(line2.rstrip())\nThe previous line's write has\
    \ 21 characters including the new line '\\n'\n\n>>> print(line3.rstrip())\n' which\
    \ is counted as one character\n>>> print(line4.rstrip())\nThe write call returns\
    \ the number of characters written\n>>>\n```\n\nAnd if we were able to look into\
    \ the file, when it was just opened, the immediate read position is at the beginning\
    \ of the file thus pointing to the 'P' of the text line \"Python spam and eggs\\\
    n\". After the first `readline()`, the read position is pointing at the beginning\
    \ of the next text line, that is, the 'T' of the line \"The previous line's write\
    \ has 21 characters including the new line\\n\". And of course, after the 3rd\
    \ `readline()`, the read position is right after the last '\\n' thus is positioned\
    \ at the end of file.\n\n## Appending to file\n\nNow we conclude the open() of\
    \ file with appending by using the mode 'a'. As demonstrated below, we will add\
    \ a 4th line to the file \"pythonReadWriteTest2.txt\" as shown in the following:\n\
    \n```\n>>> myFileRef2.close()\n>>> fileRefAppend = open(r\"C:\\jc\\tmp\\pythonReadWriteTest2.txt\"\
    , 'a')\n>>> fileRefAppend.write(\"We now add the 5th line without trailing newline\"\
    )\n48\n>>> fileRefAppend.close()\n>>> fileRefRead = open(r\"C:\\jc\\tmp\\pythonReadWriteTest2.txt\"\
    , 'r')\n>>> fileRefRead\n<_io.TextIOWrapper name='C:\\jc\\tmp\\pythonReadWriteTest2.txt'\
    \ mode='r' encoding='cp1252'>\n>>> fileContent = fileRefRead.read()\n>>> fileContent\n\
    \"Python spam and eggs\\nThe previous line's write has 21 characters including\
    \ the new line '\\n' which is counted as one character\\nThe write call returns\
    \ the number of characters written\\nWe now add the 5th line without trailing\
    \ newline\"\n>>> print(fileContent)\nPython spam and eggs\nThe previous line's\
    \ write has 21 characters including the new line '\\n' which is counted as one\
    \ character\nThe write call returns the number of characters written\nWe now add\
    \ the 5th line without trailing newline\n>>>\n```\n\nSo we first closed the file\
    \ which was previously opened in read mode. We then open the same file but in\
    \ append mode so that we can append the 4th line to it at the end of the file.\
    \ Only this time"
  mdcn: "## 写入文件\n\n既然我们已经了解了如何以不同的访问模式和在不同的位置打开文件，现在让我们尝试向文件写入一些内容。由于我们已经有了指向 `pythonReadWriteTest2.txt`\
    \ 的文件引用，并且该文件是以写模式打开的，我们将在下面演示如何操作：\n\n```\n>>> myFileRef2 = open(myFilePath,\
    \ 'w')\n>>> myFileRef2.write(\"Python spam and eggs\\n\")\n21\n>>> myFileRef2.write(\"\
    The previous line's write has 21 characters including the new line '\\n' which\
    \ is counted as one character\\n\")\n105\n>>> myFileRef2.write(\"The write call\
    \ returns the number of characters written\\n\")\n56\n>>>\n```\n\n因此，为了与前面的示例衔接，我们在开头包含了\
    \ `open()` 调用。我们知道这个文件已经打开，并且我们准备好向其中写入内容。所以我们进行了 3 次 `write()` 调用，写入了 3 行文本。请注意，我们每行都以特殊字符\
    \ `'\\n'` 结尾，这是一个表示换行的转义序列，因此文本被分隔成 3 个不同的行。此外，在每次 `write()` 调用之后，Python 解释器都会返回并显示写入的字符数，如上所示。\n\
    \n## 从文件读取\n\n既然我们已经完成了一些写入操作，现在让我们来读取刚刚写入的这个文件。如下所示：\n\n```\n>>> textLines =\
    \ myFileRef2.read()\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nio.UnsupportedOperation: not readable\n>>> myFileRef2 = open(myFilePath)\n\
    >>> textLines = myFileRef2.read()\n>>>\n>>> textLines\n\"Python spam and eggs\\\
    nThe previous line's write has 21 characters including the new line '\\n' which\
    \ is counted as one character\\nThe write call returns the number of characters\
    \ written\\n\"\n>>>\n```\n\n我们看到第一次读取返回了一个错误信息。因为文件是以写模式打开的，而不是读模式。所以我们使用一个不同的文件句柄\
    \ `myFileRef2` 来接收以默认读模式调用 `open()` 返回的文件引用。你可能会在一些代码中看到文件引用被命名为表示输入或输出的名称，例如\
    \ `fin` 或 `fout`。这实际上是一种个人偏好，但代码中内置的自解释性无疑是好的。因此，在这个读取示例中，我们以读模式打开文件后，调用 `read()`\
    \ 来读取文件内容，并将值赋给 `textLines`。然后我们展示了 `textLines` 的值。它实际上是一个很长的字符串，包含了所有 3 行，一行接一行，由\
    \ `'\\n'` 换行符分隔。\n\n然而，如果我们用记事本等应用程序打开这个文件，我们会看到它们出现在 3 个不同的行上，如下所示：（尽管由于我们在写入时包含了\
    \ `'\\n'`，并且这个存储的字符被记事本解释为换行，所以看起来好像多了一行）\n\n事实上，如果我们使用 Python 的 `print()` 调用，我们也会看到\
    \ 3 行，如下所示：（原因与之前相同，由于存储的换行符被 Python 解释器解释为形成额外的一行，所以看起来多了一行）\n\n```\n>>> print(textLines)\n\
    Python spam and eggs\nThe previous line's write has 21 characters including the\
    \ new line '\\n' which is counted as one character\nThe write call returns the\
    \ number of characters written\n>>>\n```\n\n并且由于我们在每行末尾添加了 `'\\n'`，所以在第 3 行之后产生了一个额外的“空”行效果。\n\
    \n我们不仅可以像刚才那样一次性读取整个文件，还可以通过使用 `readline()` 而不是 `read()` 来一次读取一行输入。我们在下面展示一些关于读取输入的见解：\n\
    \n```\n>>> print(textLines)\nPython spam and eggs\nThe previous line's write has\
    \ 21 characters including the new line '\\n' which is counted as one character\n\
    The write call returns the number of characters written\n\n>>>\n>>> line1 = myFileRef2.readline()\n\
    >>> line1\n''\n>>>\n>>> myFileRef2.close()\n>>> myFileRef2 = open(myFilePath)\n\
    >>>\n>>> line1 = myFileRef2.readline()\n>>> line1\n'Python spam and eggs\\n'\n\
    >>> line2 = myFileRef2.readline()\n>>> line2\n\"The previous line's write has\
    \ 21 characters including the new line '\\n'\"\n>>> line3 = myFileRef2.readline()\n\
    >>> line3\n\"' which is counted as one character\\n\"\n>>> line4 = myFileRef2.readline()\n\
    >>> line4\n'The write call returns the number of characters written\\n'\n>>>\n\
    ```\n\n在这个示例中，我们在顶部 `print()` 了整个文件内容，以便于比较。然后我们调用 `readline()` 并将其赋值给 `line1`。但当我们显示\
    \ `line1` 时，它只显示了单引号，里面什么都没有。这实际上是由于我们之前进行的读取操作，我们已经到达了文件末尾（记住我们的文件是顺序访问的，如前所述）。因此，为了正确演示\
    \ `readline()`，我们 `close()` 文件，然后再次 `open()`。接着我们调用了 3 次 `readline()`，并将每一行文本分别赋值给\
    \ `line1`、`line2` 和 `line3`，如上所示。这里有点混乱的是，由于文件中存储了一个换行符，而 `readline()` 将其视为单独的一行，因此我们最终需要额外调用一次\
    \ `readline()` 来将最后一行读入 `line4`，以便到达文件末尾。\n\n还有一个细微之处，即每行都有一个尾随的 `'\\n'` 字符。如果我们\
    \ `print()` 它们，看起来会有一个额外的“空”行：\n\n```\n>>> print(line1)\nPython spam and eggs\n\
    \n>>> print(line2)\nThe previous line's write has 21 characters including the\
    \ new line '\\n'\n\n>>> print(line3)\n' which is counted as one character\n\n\
    >>> print(line4)\nThe write call returns the number of characters written\n\n\
    >>>\n```\n\n所以，如果你还记得字符串的众多方法，我们可以使用 `rstrip()` 来修剪右侧的尾随字符，即 `'\\n'`，如下所示：\n\n\
    ```\n>>> print(line1.rstrip())\nPython spam and eggs\n>>> print(line2.rstrip())\n\
    The previous line's write has 21 characters including the new line '\\n'\n\n>>>\
    \ print(line3.rstrip())\n' which is counted as one character\n>>> print(line4.rstrip())\n\
    The write call returns the number of characters written\n>>>\n```\n\n如果我们能够查看文件内部，当文件刚打开时，当前的读取位置位于文件的开头，因此指向文本行\
    \ \"Python spam and eggs\\n\" 的 'P'。在第一次 `readline()` 之后，读取位置指向下一个文本行的开头，即 \"\
    The previous line's write has 21 characters including the new line\\n\" 这一行的 'T'。当然，在第\
    \ 3 次 `readline()` 之后，读取位置正好在最后一个 `'\\n'` 之后，因此位于文件末尾。\n\n## 追加到文件\n\n现在我们通过使用模式\
    \ 'a' 来总结文件的追加打开方式。如下所示，我们将在文件 \"pythonReadWriteTest2.txt\" 中添加第 4 行：\n\n```\n\
    >>> myFileRef2.close()\n>>> fileRefAppend = open(r\"C:\\jc\\tmp\\pythonReadWriteTest2.txt\"\
    , 'a')\n>>> fileRefAppend.write(\"We now add the 5th line without trailing newline\"\
    )\n48\n>>> fileRefAppend.close()\n>>> fileRefRead = open(r\"C:\\jc\\tmp\\pythonReadWriteTest2.txt\"\
    , 'r')\n>>> fileRefRead\n<_io.TextIOWrapper name='C:\\jc\\tmp\\pythonReadWriteTest2.txt'\
    \ mode='r' encoding='cp1252'>\n>>> fileContent = fileRefRead.read()\n>>> fileContent\n\
    \"Python spam and eggs\\nThe previous line's write has 21 characters including\
    \ the new line '\\n' which is counted as one character\\nThe write call returns\
    \ the number of characters written\\nWe now add the 5th line without trailing\
    \ newline\"\n>>> print(fileContent)\nPython spam and eggs\nThe previous line's\
    \ write has 21 characters including the new line '\\n' which is counted as one\
    \ character\nThe write call returns the number of characters written\nWe now add\
    \ the 5th line without trailing newline\n>>>\n```\n\n因此，我们首先关闭了之前以读模式打开的文件。然后我们以追加模式打开同一个文件，以便我们可以在文件末尾追加第\
    \ 4 行。只是这一次"
