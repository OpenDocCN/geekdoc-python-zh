    \ has relatively lower usage so we will just cover it lightly for completeness)\n\
    \    - Exercises:\n- Chapter 11 Files\n    - Persistent storage\n    - i/o - reading/writing\n\
    \        - Open a file\n        - Filename and path\n        - Writing to file\n\
    \        - Reading from file\n        - Appending to file\n    - Exercises:\n\
    - Chapter 12 Exceptions\n    - Things could go wrong (exceptions)\n    - Try block\n\
    \    - Catch-all\n    - Pass the exception error message\n    - Exercises:\n\n\
    ## Preface\n\nIt is my intention to have an introductory book for Python which\
    \ could give the first time coder an easy start without getting intimated; but\
    \ also for seasoned coder to get into Python quickly. So there are only eight\
    \ chapters covering only the basics. Although I have been teaching at colleges\
    \ for a while, there is no homework questions included in this book. As I have\
    \ also been in the tech industry for my entire career and to quickly master certain\
    \ skill (or at least to know the way around), there is usually not that much time.\
    \ Thus this book is written in such a way that the coverage is not only in the\
    \ text but as well as in the coding examples. If the reader of this book understands\
    \ the text and the examples in this book, my expectation is that it should be\
    \ sufficient to get started in Python coding. It is also my intention to write\
    \ this book in such a way that some of the strength of Python will be evident\
    \ later in your journey, given the trend in the field going on nowadays. So that\
    \ there is some treatment of data structures which hopefully will prove beneficial\
    \ if you should be dealing with data science. These are some ambitious goals and\
    \ might even be conflicting. But I’ve tried. And it is like most of the computer\
    \ science books, I didn’t want to wait around, to have a lengthy revision period,\
    \ before publishing this. The computer science is evolving constantly and at a\
    \ fast pace. Thus I’d rather have it out such that this book could be useful to\
    \ some. And my hope is that I will be polishing up this book endlessly to bring\
    \ out meaningful updates along the way. Again please note that this book is by\
    \ no means complete and in many ways is a reflection of my own experience in the\
    \ software industry as well as education to just have the fundamentals to get\
    \ our readers going quickly. And I certainly hope that this book turns out to\
    \ be useful to you.\n\nJesse Chou jesse@HigherChallenge.com\n\nJuly 11, 2021 in\
    \ California\n\nMy infrequently updated profile:\n\n[https://www.LinkedIn.com/in/JesseChou](https://www.LinkedIn.com/in/JesseChou)\n\
    \nRandom sharing – usually tech stuff:\n\n[https://www.higherchallenge.com/#randomshare](https://www.higherchallenge.com/#randomshare)\n\
    \n## Chapter 1 Introduction to Computer and Coding\n\nAlthough this book is about\
    \ Python coding, let’s try to have a basic understanding of the computer as the\
    \ foundation for the coding world. If you already have the background, feel free\
    \ to go to next chapter where the Python coding starts. But nonetheless, it might\
    \ be helpful to have a quick review of the basics; and you might enjoy it.\n\n\
    ### Hardware/Software\n\nSince the first computer was invented decades ago (and\
    \ there are multiple viewpoints of the invention – you can certainly research\
    \ online about it), the tech industry quickly evolved from the semiconductor underpinning\
    \ the hardware of computing devices, to the multiple form factors of computers\
    \ (mainframe, mini computer, workstation, personal computer, laptop, tablet, phone,\
    \ etc.), to the operating systems making these devices alive (thus entering the\
    \ software realm), and the multitude of systems on top of it (such as web servers,\
    \ application servers, and many others), to the apps (e.g. human resource management,\
    \ maps, etc.) as we refer to them nowadays.\n\nThe computing paradigm adapted\
    \ to the ever increasing usage of computers. Beginning with the centralized mainframe\
    \ model whereas big machines sit in glass room servicing multiple terminals possibly\
    \ in a terminal room; the client-server model was then developed such that the\
    \ client devices are getting “smarter” with more computing power (hardware) and\
    \ logic (software) built in to offload some work from the server, and then the\
    \ middle tier inserted between the server and the client; from there the hierarchy"
  mdcn: "# Python 入门\n\n## 快速开始 Python 编程\n\n第二版\n\n© 2022 Jesse Chou\n\n## 目录\n\n\
