    # String Is Different


    If you have some exposure to C/C++ or Java languages, you will find that the string
    treatment quite different in Python. In Python, str is used for string type. Again,
    since Python has dynamic typing as previously mentioned, it doesn’t really worry
    much of the individual characters the string is comprised of – as the individual
    components’ type is usually not determined until later – called late-binding thus
    compiler doesn’t know which type it is – but this is a different topic for a treatment
    in the future. For now, just know that the string in Python is quite different
    from many other languages.


    To access the individual characters of a string, the [] operator is used. So let’s
    say we have a string


    ```

    >>>myString = ''Spam and eggs''

    ```


    We can access the characters, such as the following snapshot shows:


    ```

    >>>

    >>> myString=''Spam and eggs''

    >>> print( myString[0] )

    S

    >>> letter=myString[12]

    >>> print(letter)

    s

    >>>

    ```'
