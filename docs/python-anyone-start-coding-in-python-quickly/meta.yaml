    $32.87, what will be the 15% tip amount? And what will be the final total?


    2.2 Use Python print() to print “Hello World!” interactively. Then write a Python
    script to print “CS102 Intro to Python'
- md: '## Chapter 3 Operators & Statements


    Now that we have Python on our system, let’s just play with a first program –
    the “Hello World!” program which many probably heard of at some point in the past
    as the beginning into the coding world. So here is the Python version of “Hello
    World!”:


    ```

    print("Hello, world!")

    ```


    Just that easy – one line. Try it out! Many computer languages use this to break
    into the coding world and there are different versions of how this came about.
    However, the animated sci-fi movie “Hello World” is probably more interesting
    to be associated with as after all, computer development has been associated with
    sci-fi time and again – half kidding.


    But here we go, we got our first program to print/display this introductory sentence.
    And hopefully it’s not intimidating at all.


    Now that we have our first program under our belt, let’s dive into the programming
    of Python. First of all, let’s use the Python way of breaking into the coding
    world by introducing this alternative first program instead:


    ```

    print ("Spam, ham, and eggs.")

    ```


    So there you have it, the sometimes playful Python culture.


    Now, let’s get into some basic operators. But before we do, first we want to introduce
    some terms. The first term is variable. What is a variable? You can think of it
    as an identity (ID). It is basically a named object which at run time could occupy
    some memory location. The variable thus can contain value. Value could have multiple
    types. From simple types such as number (which could be integer – type int, or
    it could have decimal point and is termed type float as in floating-point), to
    string (type str - which is a combination of characters), to more complex aggregation
    of the basic types which we will talk about later in the book. For now, let’s
    just use some of the basic built-in data types (as listed in the following table)
    to study Python.


    | Text Type: | str |

    | Numeric Types: | int, float, complex |

    | Sequence Types: | list, tuple, range |

    | Mapping Type: | dict |

    | Set Types: | set, frozenset |

    | Boolean Type: | bool |

    | Binary Types: | bytes, bytearray, memoryview |


    A complete table of built-in types is provided here for reference (per Wikipedia):


    | Type | Description | Syntax examples |

    | --- | --- | --- |

    | bool | Boolean value | True<br>False |

    | bytearray | Sequence of bytes | bytearray(b''Some ASCII'')<br>bytearray(b"Some
    ASCII")<br>bytearray([119, 105, 107, 105]) |

    | bytes | Sequence of bytes | b''Some ASCII''<br>b"Some ASCII"<br>bytes([119,
    105, 107, 105]) |

    | complex | Complex number with real and imaginary parts | 3+2.7j |

    | dict | Associative array (or dictionary) of key and value pairs; can contain
    mixed types (keys and values), keys must be a hashable type | {''key1'': 1.0,
    3: False} {} |

    | ellipsis | An ellipsis placeholder to be used as an index in NumPy arrays |
    ... Ellipsis |

    | float | Double-precision floating-point number. The precision is machine-dependent
    but in practice is generally implemented as a 64-bit IEEE 754 number with 53 bits
    of precision.[95] | 1.414 |

    | frozenset | Unordered set, contains no duplicates; can contain mixed types,
    if hashable | frozenset([4.0, ''string'', True]) |

    | int | Integer of unlimited magnitude[96] | 42 |

    | list | List, can contain mixed types | [4.0, ''string'', True] [] |

    | NoneType | An object representing the absence of a value, often called null
    in other languages | None |

    | NotImplementedType | A placeholder that can be returned from overloaded operators
    to indicate unsupported operand types. | NotImplemented |

    | range | A Sequence of numbers commonly used for looping specific number of times
    in for loops[97] | range(1, 10) range(10, -5, -2) |

    | set | Unordered set, contains no duplicates; can contain mixed types, if hashable
    | {4.0, ''string'', True} set() |

    | str | A character string: sequence of Unicode codepoints | ''Wikipedia'' "Wikipedia"
    """Spanning multiple lines""" |

    | tuple | Can contain mixed types | (4.0, ''string'', True) (''single element'',)
    () |


    So now we can use some variables to hold values. How do we do that? We assign
    values to variables and that’s achieved via an assignment statement. The following
    are some examples:


    ```

    PageNumber = 8

    Pi = 3.1416

    MyString = "In Python, Spam and Eggs are used for fun in place of Foo and Bar"

    ```


    As you can see, we tried to use some meaningful variable names and that’s considered
    a good practice so that it forms part of the in-code document such that readers
    (including ourselves, let’s say 3 months down the road) are better informed of
    what we are trying to do. We will talk about more elaborated comments for documentation
    later in the chapter.


    From here, let’s transition into some more details of what’s involved in the following
    sections.


    ## Operators And Operands


    First, let’s go through some of the operators (we’ve just seen some in previous
    section) in the following four tables and that should be enough for us to do most
    of the coding.


    (Python has these 7 categories of operators: Arithmetic operators, Assignment
    operators, Comparison operators, Logical operators, Identity operators, Membership
    operators, Bitwise operators – we will just look at the first 4 for now.)


    ### Arithmetic operators:


    | Operator | Name/Description | Example |

    | :--- | :--- | :--- |

    | + | Addition | x + y |

    | - | Subtraction | x - y |

    | * | Multiplication | x * y |

    | / | Division | x / y |

    | % | Modulus | x % y |

    | ** | Exponentiation | x ** y |

    | // | Floor division | x // y |


    ### Assignment operators:


    | Operator | Same As | Example |

    | --- | --- | --- |

    | = | x = 5 | x = 5 |

    | += | x = x + 3 | x += 3 |

    | -= | x = x - 3 | x -= 3 |

    | *= | x = x * 3 | x *= 3 |

    | /= | x = x / 3 | x /= 3 |

    | %= | x = x % 3 | x %= 3 |

    | //= | x = x // 3 | x //= 3 |

    | **= | x = x ** 3 | x **= 3 |


    ### Comparison operators:


    | Operator | Name/Description | Example |

    | --- | --- | --- |

    | == | Equal | x == y |

    | != | Not equal | x != y |

    | > | Greater than | x > y |

    | < | Less than | x < y |

    | >= | Greater than or equal to | x >= y |

    | <= | Less than or equal to | x <= y |


    ### Logical operators:


    | Operator | Description | Example |

    | --- | --- | --- |

    | and | Returns True if both statements are true | x < 5 and x < 10 |

    | or | Returns True if one of the statements is true | x < 5 or x < 4 |

    | not | Reverse the result, returns False if the result is true | not(x < 5 and
    x < 10) |


    Most operators are binary operators – meaning they take 2 operands. E.g. x + y
    where the operator + takes 2 operands x and y. There are also unary operators
    such as -, which is really not described in the aforementioned tables of operators.
    But one example is that the operator "-" can be simply applied in front of a variable
    such as -x to get the negative value of x, just like -3 gives the negative 3.


    ## Variables


    So for the variables, we have learned that it has a name, such as x, which is
    its identity. Identity has an identifier and that’s its name. In Python, name
    can be anything as long as it’s not a reserved keyword and that it follows the
    rules that you could use the combination of any letters, numbers, and some symbols
    (e.g. punctuation marks), as long as the first character is not a number.


    Following is a list of the Python keywords:


    - False

    - None

    - True

    - __peg_parser__

    - and

    - as

    - assert

    - async

    - await

    - break

    - class

    - continue

    - def

    - del

    - elif

    - else

    - except

    - finally

    - for

    - from

    - global

    - if

    - import

    - in

    - is

    - lambda

    - nonlocal

    - not

    - or

    - pass

    - raise

    - return

    - try

    - while

    - with

    - yield


    In fact, you can just type in the command help(“keywords”) into the Python interpreter
    and it will give you the list of keywords just like the list we’ve just shown.
    In here, help is also working like a function – just as the print() function we’ve
    used a few times already and we will expand a bit more about the function print()
    shortly.


    The keywords vary a bit for different Python versions but this list is all inclusive
    and I’d just avoid using any of them regardless of which Python version I am working
    on.


    Further, at the fundamental level, a variable is really a reference to a memory
    location where the value of the variable is held.


    ## Assignment, Statement, Expression, Evaluation


    Now we know what variable is and that they can hold values, let’s deal with how
    we assign values to variables and then make modification or change their values.


    We’ve seen a bit of assignment of values to variable already, such as when we
    coded x=5. Essentially this is not very different from the math equations we have
    all been through quite a bit since early age.'
  mdcn: '## 第三章 运算符与语句


    既然我们已经在系统中安装了Python，那就来运行第一个程序吧——“Hello World!”程序，很多人可能在过去某个时候都听说过，这是进入编程世界的起点。以下是Python版本的“Hello
    World!”：


