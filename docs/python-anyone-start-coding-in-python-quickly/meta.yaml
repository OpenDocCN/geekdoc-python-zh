    \ ham'\n```\n\n同样，如上面最后一个示例所示，你不能使用宽度说明符来“截断”值的显示，因此尽管指定的宽度只有 5，整个字符串 'spam, egg,\
    \ and ham' 仍然被显示了。\n\n## 精度说明符\n\n你可能已经猜到了，这个精度说明符专门用于浮点值，但它也控制指数表示，而且，令人惊讶的是，它还控制字符串。\n\
