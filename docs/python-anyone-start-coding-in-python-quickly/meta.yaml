  md: '# Chapter 11 Files


    So far, we have done quite a bit of Python coding using our Python interpreter.
    It’s pretty much interactive and that the input / output are handled via keyboard
    and display respectively. It’s about time to learn how we get input from files
    as well as store output into files.


    # Persistent storage


    For persistent storage, vs. the transient data that’re only existing in memory
    and gone when the computer system is shutdown, one common way is to use files.
    Files contain data and since they are stored on non-volatile media thus it’s not
    affected by loss of electricity power. There are a few popular file systems on
    various operating systems but that’s an entirely different topic out of scope
    of this book. Luckily for the operating systems which supports Python, we can
    just use Python calls to interface into the file systems without getting into
    the low-level (system-level) details.


    # i/o - reading/writing


    Now we know that files are actually managed by operating systems. There are raw
    data files (or binary files), as well as text files. In general, we usually deal
    with only text files. Files can be accessed randomly, meaning, we can access any
    portion of the file randomly; or files are accessed sequentially, that is, we
    start from the beginning of the file and move forward sequentially. In lots of
    times, sequential access is what we do in programming language. It is also easier
    to learn about file reading and writing using sequential files and that’s what
    we will be doing here.


    So in Python, there are functions which we could use as interface to system calls
    to the operating system to open files. Let’s look into how file i/o (input/out)
    or file read/write is done in Python.'
  merge: -1
  pgno: 176
- img_proc: true
  md: '# Open a file


    To work with file, we need to first open the file. We call a function open ()
    to do this. So how do we call open ()? There are different modes we open a file
    with. We list the three commonly used modes in the following table:


    | Mode | Description |

    | :--- | :--- |

    | ''r'' | Default value. Open a file in reading only mode. The file cannot be
    modified at all. Will get error if the file does not exist. |

    | ''w'' | Open a file for writing mode. If the file already exists, it will be
    overwritten. If it does not exist, it will be created. |

    | ''a'' | Open a file for writing/appending mode. All writes to the file will
    be appended to the end. If the file does not exist, it will be created. |

    | ''x'' | Create the specified file. Will get error if the file already exists.
    |


    # Filename and path


    And also when we open a file, we need to give the filename and the optional path
    to the function open (). The filename could be a string literal, or it could be
    a variable containing the string literal. Whereas the optional path, if not provided,
    the current directory, where the Python interpreter is launched, will be used,
    as it is the application we work in for this demo. Otherwise, it will be what
    we specified of course.


    About file name and its path information, when the path starts from the root of
    the file system, it’s called absolute path; but if it’s starting from current
    directory, it’s a relative path. And it will become clearer as we go through the
    following examples:'
  merge: -1
