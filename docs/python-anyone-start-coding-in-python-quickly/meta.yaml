  md: '# Chapter 9 Recursion


    In previous chapters, we learned about repetition / looping which is also often
    referred as iteration, and function (calls). Now we want to get into a very interesting
    concept called recursion as an alternative technique for iteration. This is a
    very useful technique for algorithm design in coding certain solutions. Here we
    also introduced the term algorithm. What is algorithm? It is the design to solve
    a specific problem using a specific solution. It specifies a set of instructions
    which are to be executed for the problem solving. When we use iterations in algorithms,
    we can always use looping thus recursion is not a necessity. But there are situations
    where recursion could be used with much ease. And we can somehow see that in the
    examples which we will look into in a little bit.


    # Concept of recursion


    But first let’s check out the concept of recursion. First of all, a recursive
    function calls itself, directly or indirectly. So for example, inside function
    myFunc(), there could be a function call to myFunc(); or there could be another
    function myFuncToo() which is called inside myFunc(), and then in myFuncToo()
    there is a call to myFunc(). So in a way, the function calls form a loop somehow,
    be it by calling itself or via some intermediate function(s). For illustration
    of the recursion, we will only focus on function calling itself. The idea is that
    a problem can be solved using recursion if during the recursive calls, the problem
    can be “reduced” or “broken down” into a smaller problem through each iteration,
    and that eventually the problem is reduced down to just a base case where the
    answer is pretty obvious thus additional recursive call is no longer employed.
    So this description might be a bit confusing but let’s just examine the following
    examples and it should become clearer. The examples also enable us to compare
    the looping solutions vs. the recursive solutions.'
  merge: -1
  pgno: 142
