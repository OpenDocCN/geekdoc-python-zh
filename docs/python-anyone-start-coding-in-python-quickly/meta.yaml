    We all know what coding is: to write the instructions in some specific computer
    languages which can be then translated into some language which the machine could
    understand thus to carry out what you want it to do.


    But why debugging is mentioned here? Well, debugging actually is a very important
    part of coding. In fact, for a coder, more time is probably spent in debugging
    than coding - actually substantially more time.


    Now let''s look at some of the errors we could run into while coding. There are
    syntax errors and runtime errors; whereas in runtime errors there are fatal errors
    and non-fatal errors.


    So there are different occasions we could encounter syntax errors. It could happen
    if we are using some IDE (e.g. IDLE) which detects the syntax error (and it usually
    gives us some hint in fixing it; although the hints are usually very useful, sometimes
    it could be off thus more elaborated human intervention is needed.)


