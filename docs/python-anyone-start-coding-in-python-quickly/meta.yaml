    \ The crash is a divide-by-zero exception. So if we can handle the exception in\
    \ our code, we could then avoid the crash.\n\n## Try block\n\nTo do the exception\
    \ handling, Python has a try block with except, else, and finally clauses which\
    \ we could use. The general syntax is as shown here:\n\n```\ntry:\n    # Try block\
