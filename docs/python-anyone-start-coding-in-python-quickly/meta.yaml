    \    else:\n        if score >= scoreOfC:\n            print('Your grade is C.')\n\
    \        else:\n            if score >= scoreOfD:\n                print('Your\
    \ grade is D.')\n            else:\n                print('Your grade is F.')\n\
    ```\n\n6.2 Write Python code with 3 variables x, y, z. Get input of 3 values and\
    \ assign the smallest to x and the largest to z.\n\n6.3 Write Python code to get\
    \ 2 inputs x and y. Check if both are positive. If yes then display the larger\
    \ of the two.\n\n6.4 Get input of speed and speed limit, then if-else statement\
    \ that displays 'not speeding' if the speed variable is below or at the speed\
    \ limit, otherwise display 'speeding'.\n\n6.5 Write code for test score data entry\
    \ validation to take scores and display “valid score” or “invalid score” if the\
    \ entered score is not within 0 to 100.\n\n6.6 Write code to asks for user input\
    \ of numeric score (0-100). It then displays the letter grade, according to the\
    \ following table:\n\n| Score | Grade |\n|---|---|\n| >= 90 | A |\n| >= 80 to\
    \ < 90 | B |\n| >= 70 to < 80 | C |\n| >= 60 to < 70 | D |\n| < 60 | F |\n\n6.7\
    \ Write a function which takes input a year and determines if it’s a leap year.\
    \ (A year is a leap year if it is divisible by 4; however, if the year can be\
    \ evenly divided by 100, it is NOT a leap year, unless the year is also evenly\
    \ divisible by 400 then it is a leap year.)\n\n6.8 What are the values of these\
    \ expressions when they are evaluated?\n\n```\n7 == 7\n7 != 7\n7 >= 17\nnot (7\
    \ < 17)\n```\n\n6.9 Define a list of numbers. For each number, if it’s even, insert\
    \ ‘even’ in a new list at the same position; otherwise, insert ‘odd’. Display\
    \ both lists. If you could, display the list elements aligned so it’s easy to\
    \ see which number corresponding to which even/odd for its position.\n\n6.10 Write\
    \ a function which takes a text input and determines if it’s a palindrome. (A\
    \ palindrome is a string which 1st character is the same as its last, and the\
    \ 2nd character is the same as its 2nd to last, and so on, thus the text string\
    \ reads the same backward as forward, e.g., madam.)\n\n## Chapter 7 Repetition/Looping\n\
    \nNow that we learned about conditional branching, we are taking on another big\
    \ fundamental technique which helps us construct our coding logic, and that is\
    \ looping. It repeats the same set of statements for multiple times. In each of\
    \ the iteration, usually some counter is checked and modified to make sure that\
    \ we are controlling how many times we are repeating through; sometimes we don’t\
    \ use counters but we check for some exit condition to see if we stay in the loop.\n\
    \nSo first let’s look at some very simple example:\n\n```\n>>>\n>>> counter =\
    \ 5\n>>> while counter > 0 :\n...     print(counter)\n...     counter = counter\
    \ - 1\n...\n5\n4\n3\n2\n1\n>>>\n```\n\nAs you can see, we have a counter with\
    \ a starting initial value of 5, and then we have this while loop which checks\
    \ if the counter is greater than 0; if True, we will print the counter and decrement\
    \ the counter by one (using counter = counter – 1). This code segment produced\
    \ the next 5 lines of printout displaying values from 5 down to 1, decrementing\
    \ 1 at a time.\n\n### while Loop\n\nWe learned about string early on. Now let’s\
    \ use some strings to demonstrate how repetition is performed. Let’s say we have\
    \ some string and we want to process through it one character at a time, starting\
    \ from the beginning. As we encounter each character, we want to do some processing,\
    \ and each character processing is considered one iteration/loop. Once we reach\
    \ the end of the string and finished with the last character, we are done with\
    \ the string thus we exit the looping.\n\nSo for instance, we want to traverse\
    \ through the string to print each character, one character per line, as shown\
    \ in the following example:\n\n```\n>>>\n>>> myString = 'Python Anyone?'\n>>>\
    \ myStringLength = len(myString)\n>>>\n>>> myStringLength\n14\n>>>\n>>> stringIndex\
    \ = 0\n>>> while stringIndex < myStringLength :\n...     print(myString[stringIndex])\n\
    ...     stringIndex = stringIndex + 1\n...\nP\ny\nt\nh\no\nn\n\nA\nn\ny\no\nn\n\
    e\n?\n>>>\n```\n\nFollowing is the flow chart for the while loop:\n\n![](img/b52ff7adacf4e0b514b791444be82d81_106_0.png)\n\
    \nIn many other languages, there is also a slight variation to the while loop,\
    \ which is the do ... while loop, where the code block is executed at least once\
    \ (the first iteration), and then the condition is checked (in other words, you\
    \ do something first, and then the while loop condition is checked to see if you\
    \ continue and for how many more loops.) Python however does not have a do...while\
    \ loop. But you can certainly try to mimic the behavior by combining different\
    \ initialization and statements, which is left for your imagination as an exercise\
    \ for yourself. If you, by this point, still find this exercise challenging, maybe\
    \ you can read the following section of the for loop and then come back to finish\
    \ up this exercise. With more experience in the various mechanisms of looping,\
    \ by then hopefully this exercise is just a piece of cake for you.\n\n### for\
    \ Loop\n\nPython does have a for loop which could be used for repetition in code\
    \ logic just as while loop. There are occasions where one is more suitable than\
    \ the other but personal preference also plays a role here. As you gain more coding\
    \ experience, you will likely develop your own habits in preferring using one\
    \ or the other, under different circumstances.\n\nSo the for loop: First of all,\
    \ the obvious difference lies in syntax. By examining the following flow chart\
    \ it should become apparent:\n\n![](img/b52ff7adacf4e0b514b791444be82d81_107_0.png)\n\
    \nSo you will find that the syntax is different as we will see in examples below.\
    \ But also Python for loop is different from many other languages, such that there\
    \ is no loop counter in our flow chart. As Python for loop is used more like an\
    \ iterator in object-oriented programming languages such that it iterates through\
    \ some sequence, e.g. string and list which we used before. Let’s see some for\
    \ loop examples to make it clearer:\n\n```\n>>> myString = 'spam and egg'\n>>>\
    \ for c in myString :\n...     print(c)\n...\ns\np\na\nm\n\na\nn\nd\n\ne\ng\n\
    g\n>>> myList = ['spam', 'egg', 'ham']\n>>> for ob in myList :\n...     print(ob)\n\
    ...\nspam\negg\nham\n>>>\n```\n\nAs you can see, in the first example, the for\
    \ loop was iterating through the characters of the string; whereas in the second\
    \ example, it was iterating through a list of items/objects. We have yet another\
    \ example below demonstrating how we can use a for loop to count the number of\
    \ characters in a string, and to get us the same result as using the function\
    \ len() for the string length:\n\n```\n>>> myString = 'spam'\n>>> len(myString)\n\
    4\n>>> count = 0\n>>> for letter in myString :\n...     count = count + 1\n...\n\
    >>> count\n4\n>>>\n```\n\nSo now you know how len() might have been implemented\
    \ in Python. Let’s carry on and look at a couple of specific commands in Python\
    \ (and many other languages) in dealing with the flow of looping.\n\n### break\
    \ Statement\n\nThe break statement is used to get out of a loop such as the following\
    \ example shows:\n\n```\n>>> while True :\n...     inputLine = input()\n...  \
    \   if inputLine == 'exit' :\n...         break\n...     print(inputLine)\n...\n\
    This is to test break statement\nThis is to test break statement\nHere comes another\
    \ line of input\nHere comes another line of input\nAlthough the while True gives\
    \ us an infinite loop\nAlthough the while True gives us an infinite loop\nWe use\
    \ break to end the loop\nWe use break to end the loop\nexit\n>>>\n```\n\nSo we\
    \ have an infinite loop in this example with while True, such that the condition\
    \ to stay in the loop is always True. So how do we end this loop? We check if\
    \ the user input is ‘exit’, and if that’s the case we execute break to break out\
    \ of the loop. As seen in the example above, each input line is repeated by the\
    \ print() statement until we entered “exit”.\n\n### continue Statement\n\nWe now\
    \ have seen the break statement and how it works. On the other hand, we have a\
    \ continue statement which will also alter the flow of repetition. When a continue\
    \ statement is encountered, the flow of execution will jump to the end of the\
    \ current iteration, which may or may not be the last iteration of the loop. Let’s\
    \ look at the following example and it will become clear how continue statement\
    \ is used:"
  mdcn: "那么现在我们已经学会了如何声明变量，并在赋值等语句中使用它们来给变量赋值；再加上这种分支技术作为高级语言中需要掌握的少数基本技术之一，我们的编码技能现在又向前迈进了一大步，因为在接下来的两章中，我们只需要再学习两种基本机制，之后我们就能用Python编写代码来解决任何抛给我们的问题了。\n\
    \n## 练习：\n\n6.1 以下代码将分数转换为等级。然而，由于代码块的缩进没有正确维护，它将无法运行。重写（调试）使其能够工作：\n\n```\nif\
    \ score >= scoreOfA:\n    print('Your grade is A.')\nelse:\n    if score >= scoreOfB:\n\
    \        print('Your grade is B.')\n    else:\n        if score >= scoreOfC:\n\
    \            print('Your grade is C.')\n        else:\n            if score >=\
    \ scoreOfD:\n                print('Your grade is D.')\n            else:\n  \
    \              print('Your grade is F.')\n```\n\n6.2 编写包含3个变量x, y, z的Python代码。获取3个值的输入，并将最小的赋值给x，最大的赋值给z。\n\
    \n6.3 编写Python代码获取两个输入x和y。检查两者是否都为正数。如果是，则显示两者中较大的那个。\n\n6.4 获取速度和限速的输入，然后使用if-else语句，如果速度变量低于或等于限速，则显示“未超速”，否则显示“超速”。\n\
    \n6.5 编写用于测试分数数据输入验证的代码，接收分数，并在输入的分数不在0到100范围内时显示“有效分数”或“无效分数”。\n\n6.6 编写代码要求用户输入数字分数（0-100）。然后根据下表显示字母等级：\n\
    \n| 分数 | 等级 |\n|---|---|\n| >= 90 | A |\n| >= 80 到 < 90 | B |\n| >= 70 到 < 80\
    \ | C |\n| >= 60 到 < 70 | D |\n| < 60 | F |\n\n6.7 编写一个函数，接收一个年份作为输入，并判断它是否是闰年。（如果一个年份能被4整除，则是闰年；但是，如果该年份能被100整除，则不是闰年，除非该年份也能被400整除，那么它才是闰年。）\n\
    \n6.8 当这些表达式被求值时，它们的值是什么？\n\n```\n7 == 7\n7 != 7\n7 >= 17\nnot (7 < 17)\n```\n\
    \n6.9 定义一个数字列表。对于每个数字，如果是偶数，则在新列表的相同位置插入“偶数”；否则，插入“奇数”。显示两个列表。如果可以，请对齐显示列表元素，以便轻松看出哪个数字对应其位置的偶数/奇数。\n\
    \n6.10 编写一个函数，接收一个文本输入，并判断它是否是回文。（回文是一个字符串，其第一个字符与最后一个字符相同，第二个字符与倒数第二个字符相同，依此类推，因此文本字符串正向和反向读起来是一样的，例如，madam。）\n\
    \n## 第7章 重复/循环\n\n既然我们已经学习了条件分支，我们现在要学习另一个帮助我们构建编码逻辑的重要基础技术，那就是循环。它重复执行同一组语句多次。在每次迭代中，通常会检查并修改某个计数器，以确保我们控制重复的次数；有时我们不使用计数器，而是检查某个退出条件，以确定是否继续留在循环中。\n\
    \n那么首先让我们看一些非常简单的例子：\n\n```\n>>>\n>>> counter = 5\n>>> while counter > 0 :\n...\
    \     print(counter)\n...     counter = counter - 1\n...\n5\n4\n3\n2\n1\n>>>\n\
    ```\n\n如你所见，我们有一个初始值为5的计数器，然后我们有一个while循环，它检查计数器是否大于0；如果为真，我们将打印计数器并将计数器减一（使用\
    \ counter = counter – 1）。这段代码产生了接下来的5行打印输出，显示从5递减到1的值，每次递减1。\n\n### while 循环\n\
    \n我们很早就学习了字符串。现在让我们使用一些字符串来演示如何执行重复操作。假设我们有一个字符串，我们想从开头开始，一次处理一个字符。当我们遇到每个字符时，我们想进行一些处理，每个字符的处理被视为一次迭代/循环。一旦我们到达字符串的末尾并处理完最后一个字符，我们就完成了字符串的处理，因此退出循环。\n\
    \n例如，我们想遍历字符串以打印每个字符，每行一个字符，如下例所示：\n\n```\n>>>\n>>> myString = 'Python Anyone?'\n\
    >>> myStringLength = len(myString)\n>>>\n>>> myStringLength\n14\n>>>\n>>> stringIndex\
    \ = 0\n>>> while stringIndex < myStringLength :\n...     print(myString[stringIndex])\n\
    ...     stringIndex = stringIndex + 1\n...\nP\ny\nt\nh\no\nn\n\nA\nn\ny\no\nn\n\
    e\n?\n>>>\n```\n\n以下是while循环的流程图：\n\n![](img/b52ff7adacf4e0b514b791444be82d81_106_0.png)\n\
    \n在许多其他语言中，while循环还有一个轻微的变体，即do ... while循环，其中代码块至少执行一次（第一次迭代），然后检查条件（换句话说，你先做一些事情，然后检查while循环条件以确定是否继续以及还要循环多少次。）然而，Python没有do...while循环。但你当然可以通过组合不同的初始化和语句来尝试模拟这种行为，这留给你自己作为练习去想象。如果你到此时仍然觉得这个练习有挑战性，也许你可以阅读下面的for循环部分，然后再回来完成这个练习。随着对各种循环机制的更多经验积累，到那时希望这个练习对你来说只是小菜一碟。\n\
    \n### for 循环\n\nPython确实有一个for循环，可以像while循环一样用于代码逻辑中的重复。有些情况下一个比另一个更合适，但个人偏好也起着作用。随着你获得更多的编码经验，你可能会在不同的情况下形成自己偏好使用其中一个的习惯。\n\
    \n那么for循环：首先，明显的区别在于语法。通过检查下面的流程图应该会变得清晰：\n\n![](img/b52ff7adacf4e0b514b791444be82d81_107_0.png)\n\
    \n所以你会发现语法是不同的，正如我们将在下面的例子中看到的那样。但Python的for循环也不同于许多其他语言，因为我们的流程图中没有循环计数器。因为Python的for循环更像面向对象编程语言中的迭代器，它遍历某个序列，例如我们之前使用的字符串和列表。让我们看一些for循环的例子来更清楚地理解：\n\
    \n```\n>>> myString = 'spam and egg'\n>>> for c in myString :\n...     print(c)\n\
    ...\ns\np\na\nm\n\na\nn\nd\n\ne\ng\ng\n>>> myList = ['spam', 'egg', 'ham']\n>>>\
    \ for ob in myList :\n...     print(ob)\n...\nspam\negg\nham\n>>>\n```\n\n如你所见，在第一个例子中，for循环遍历字符串的字符；而在第二个例子中，它遍历一个项目/对象的列表。我们下面还有一个例子，演示如何使用for循环来计算字符串中的字符数，并得到与使用函数len()获取字符串长度相同的结果：\n\
    \n```\n>>> myString = 'spam'\n>>> len(myString)\n4\n>>> count = 0\n>>> for letter\
    \ in myString :\n...     count = count + 1\n...\n>>> count\n4\n>>>\n```\n\n所以现在你知道len()在Python中可能是如何实现的了。让我们继续看看Python（以及许多其他语言）中处理循环流程的一些特定命令。\n\
    \n### break 语句\n\nbreak语句用于退出循环，如下例所示：\n\n```\n>>> while True :\n...     inputLine\
    \ = input()\n...     if inputLine == 'exit' :\n...         break\n...     print(inputLine)\n\
    ...\nThis is to test break statement\nThis is to test break statement\nHere comes\
    \ another line of input\nHere comes another line of input\nAlthough the while\
    \ True gives us an infinite loop\nAlthough the while True gives us an infinite\
    \ loop\nWe use break to end the loop\nWe use break to end the loop\nexit\n>>>\n\
    ```\n\n所以在这个例子中，我们有一个使用while True的无限循环，留在循环中的条件总是True。那么我们如何结束这个循环呢？我们检查用户输入是否为“exit”，如果是这种情况，我们执行break来跳出循环。如上例所示，每一行输入都被print()语句重复，直到我们输入“exit”。\n\
    \n### continue 语句\n\n我们现在已经看到了break语句及其工作原理。另一方面，我们有一个continue语句，它也会改变重复的流程。当遇到continue语句时，执行流程将跳转到当前迭代的末尾，这可能是也可能不是循环的最后一次迭代。让我们看下面的例子，continue语句的用法就会变得清晰："
