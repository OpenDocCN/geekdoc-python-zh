    | in, not in, is, is not, <, <=, >, >=, <>, !=, == | 比较、成员、身份 |

    | not x | 布尔非 |

    | and | 布尔与 |

    | or | 布尔或 |

    | lambda | Lambda 表达式 |


    在这个优先级表中，优先级从上到下递减——因此最高优先级在顶部，反之亦然。


    至于结合性，几乎所有运算符都具有从左到右的结合性。因此，当语句/表达式中出现多个相同优先级的运算符时，求值从左到右进行，因此最左边的运算符首先被求值，然后是第二个，依此类推，只要它们都处于相同的优先级水平。


    这里有一个简单的例子来让这一点更清楚一些，因为这可能听起来令人困惑，但实际上并没有那么复杂：

    表达式 `100/10*10` 是如何求值的？由于运算符 `/` 和 `*` 具有相同的优先级，因此我们查看结合性来确定执行顺序。由于两个运算符都具有从左到右的结合性，因此这个表达式的执行就像我们有括号化的
    `100/10` 一样，也就是说，它就像这个表达式 `(100/10)*10`。由于 `()` 具有最高优先级，因此我们知道 `/` 在 `*` 之前执行，就像在
    `100/10*10` 中由于结合性一样。


    如前所述，大多数运算符具有从左到右的结合性；所以这实际上并不像它看起来那么复杂。


    现在，认识到表达式中运算符的优先级和结合性后，我们将在下一节中继续总结顺序执行。


    ## 顺序执行


    Python 中的语句是顺序执行的，就像许多其他编程语言一样。当然，当有函数调用时，这种顺序会被打断，我们将在后面有一章专门处理函数调用。但通常语句是一个接一个执行的。对于复杂的语句，我们不仅需要处理运算符的优先级，还需要注意运算符的结合性。


    ## 注释


    现在让我们来谈谈注释。注释实际上是编程中非常重要的东西。它是对代码功能的解释，有时还包括设计、架构、考虑因素，以及软件工程师/编码者认为适合让代码更具可读性的任何内容——无论是给其他人看，还是给编码者自己在一段时间后看，尤其是当软件变得更复杂时——它们通常会变得复杂。在我所在的软件工程组织中，通常要求在注释中包含编码者的姓名、更改时间以及大量其他信息——通常既在代码更改旁边，也在文件开头。


    Python 注释以 “#” 开头，使解释器忽略该行的其余部分。因此注释实际上是给代码的人类读者看的。你当然可以在一行中的任何位置开始注释，很多时候编码者会在代码后面加上
    `#` 然后是解释，以使代码逻辑对读者更清晰。


