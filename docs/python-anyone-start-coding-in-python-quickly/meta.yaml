  md: '# Call stack


    So in this section, we have the title call stack. What is it? And why do we need
    it and want to talk about it? So in case you have not started wondering, when
    a function call is made and executed, the processing flow is altered to run the
    statements in the called function. But when the function execution is finished,
    we are to return to the caller. Yet how would the computer know where to return
    and how is it implemented? If this does not sound too complicated, how about we
    have a series of function calls? For example, let’s say that in main() we are
    calling spam() , and then spam() is calling egg() and then egg() is calling ham()
    ?


    It turns out that, in the computer science world, we have something named call
    stack to manage this. We have the following diagrams to show how it works: (on
    the left hand side are the codes; and on the right hand side are the call stacks)'
