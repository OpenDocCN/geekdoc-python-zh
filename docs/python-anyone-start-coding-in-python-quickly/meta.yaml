    >>> myGradeBook._courseName = "Python Anyone, 2nd edition"

    >>> myGradeBook.__studentsList = ["Joan", "Tom"]

    >>> myGradeBook.getCourseName()

    ''Python Anyone, 2nd edition''

    >>> myGradeBook.getStudentsList()

    [''John'', ''Ting'', ''Rose'']

    >>> myGradeBook._GradeBook__studentsList = ["Joan", "Tom"]

    >>> myGradeBook.getStudentsList()

    [''Joan'', ''Tom'']

    >>>

