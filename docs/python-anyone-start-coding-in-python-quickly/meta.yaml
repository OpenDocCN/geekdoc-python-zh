    are pros and cos in all these different paradigms. We list some of them here:


    # Object-Oriented Programming Paradigm:


    **Pros:**


    +   - Inheritance: a hall mark of OOP and we will cover in details in the future.
    It basically allow a new class (child) to be defined via extending an existing
    class (parent) thus the amount of coding is much more reduced and simplified.

    - Reusability: with the structure of classes and objects, and inheritance, lots
    of code could be reused thus duplication or redundancy is much eliminated.

    - Security: encapsulation hides and protects the information integrity.

    - Maintenance: easy to isolate changes which are localized in certain class(es)
    thus not affecting others.'
