  - '[PAGE 6]


    # Preface


    It is my intention to have an introductory book for Python which could give the
    first time coder an easy start without getting intimated; but also for seasoned
    coder to get into Python quickly. So there are only eight chapters covering only
    the basics. Although I have been teaching at colleges for a while, there is no
    homework questions included in this book. As I have also been in the tech industry
    for my entire career and to quickly master certain skill (or at least to know
    the way around), there is usually not that much time. Thus this book is written
    in such a way that the coverage is not only in the text but as well as in the
    coding examples. If the reader of this book understands the text and the examples
    in this book, my expectation is that it should be sufficient to get started in
    Python coding. It is also my intention to write this book in such a way that some
    of the strength of Python will be evident later in your journey, given the trend
    in the field going on nowadays. So that there is some treatment of data structures
    which hopefully will prove beneficial if you should be dealing with data science.
    These are some ambitious goals and might even be conflicting. But I’ve tried.
    And it is like most of the computer science books, I didn’t want to wait around,
    to have a lengthy revision period, before publishing this. The computer science
    is evolving constantly and at a fast pace. Thus I’d rather have it out such that
    this book could be useful to some. And my hope is that I will be polishing up
    this book endlessly to bring out meaningful updates along the way. Again please
    note that this book is by no means complete and in many ways is a reflection of
    my own experience in the software industry as well as education to just have the
    fundamentals to get our readers going quickly. And I certainly hope that this
    book turns out to be useful to you.


    Jesse Chou jesse@HigherChallenge.com'
