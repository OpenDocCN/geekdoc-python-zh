    \nPython 字符串函数使用非常频繁。从上表可以看出，有很多事情可以做。\n\n我们还想在这里指出，在 Python 中有两种表示字符串的方式。你可以使用单引号或双引号。这为我们提供了一种在字符串中包含引号的方法：因此，如果我们的字符串中有一个单引号，我们可以使用双引号来括起字符串，反之亦然，例如以下示例：\n\
