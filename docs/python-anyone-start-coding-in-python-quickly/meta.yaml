    \ = Fib(n-3) + Fib(n-2)\nFib(n) = Fib(n-2) + Fib(n-1)\n\n如果我们用循环和递归两种方式编码，将得到以下解决方案：\n\
    \n```\n>>> def loopingFib( x ) :\n...     a = 0\n...     b = 1\n...\n...     if\
    \ x < 0 :\n...             print(\"Has to be positive number\")\n...     elif\
    \ x == 0 :\n...             return 0\n...     elif x == 1 :\n...             return\
    \ b\n...     else :\n...             for i in range(1, x) :\n...             \
    \        c = a + b\n...                     a = b\n...                     b =\
    \ c\n...             return b\n...\n>>> print( loopingFib( 12 ) )\n144\n>>>\n\
    ```\n\n```\n>>> def recursiveFib( x ) :\n...     if x < 0 :\n...             print(\"\
    Has to be positive number\")\n...     elif x == 0 :\n...             return 0\n\
    ...     elif x == 1 or x == 2 :\n...             return 1\n...     else :\n...\
    \             return recursiveFib(x-1) + recursiveFib(x-2)\n...\n>>> print( recursiveFib(\
    \ 12 ) )\n144\n>>>\n```\n\n现在我们对为什么递归可能是一种更容易的编码练习来得到解决方案有了一些认识。接下来我们探讨一个经典的计算机科学问题，递归解决方案的易用性将更加明显。\n\
    \n# 汉诺塔\n\n汉诺塔（TOH）是一个著名的数学谜题，常在编码中用于说明递归技术。该谜题由法国数学家爱德华·卢卡斯于1883年提出。传说在印度的一座寺庙里有一个大房间，里面有三根柱子。还有64个大小不同的金盘堆叠在一根柱子上，从底部最大的盘子到顶部最小的盘子。僧侣们移动这些盘子，目标是根据一些严格的规则将整个堆叠移动到另一根柱子上：\n\
