  md: '# Postamble


    Finally, after about a year or so of working on this writing, I have come to the
    end of the 8th Chapter and think that this will serve as the foundation for Python
    programming, or the basis for anyone starting computer programming. Thus fulfilling
    the two goals for this book: first is to give an introduction to first time programmers;
    second is to get experienced programmers to start using Python quickly. So, except
    the coding examples used to explain and/or show how the coding is done, this book
    doesn’t really include additional questions or practice. It is done this way since
    with the advent of Internet, there is enough coding practice online for people
    to jump into as they go through the Python programming journey.


    There are obviously many topics that are more advanced but are not included in
    this book. As it is my belief that with the fundamental knowledge covered in this
    writing, it is enough for any coder to solve any (or at least almost any) problems
    which could be solved using a Python solution. In the future, I am hoping to release
    books for advanced Python programming; but it is my sincere (alternative) hope
    that by then, readers of this book is advanced enough such that there is no need
    for a book to talk about advanced Python - thus fulfilling the “hidden” goal of
    getting our readers to start using Python in the shortest amount of time possible.


    With the popularity of Massive Open Online Courses (MOOC), it is my intention
    to make this book electronically to contribute to the computer literacy leveraging
    the advancement of technology. As an educator, on top of my engineering career
    with an unchecked enthusiasm of software, I understand that there are different
    ways of learning and everyone needs to pick the suitable personal fit. However,
