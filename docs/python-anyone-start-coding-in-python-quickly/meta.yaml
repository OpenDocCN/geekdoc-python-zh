    # Classes vs. objects


    So to make it clearer of the distinction and relationship between class and object,
    we used the type analogy, although there is some subtle difference, for the class,
    and the object of a particular class is like a variable of a particular type,
    but again there are some subtle yet substantial differences.


    The important differentiation is that in the OOP world, the center is around the
    objects, of certain classes, and the object encapsulate the details of the member
    data attributes as well as the implementation of the member methods of the particular
    class which belongs to.


    # Instances as instantiated objects


    When an object is created (defined) to be of certain class, we say that the object
    is instantiated, thus the object is an instance of the specific class. In that
    sense, class is abstract and simply defines the member attributes as well as the
    member methods.


