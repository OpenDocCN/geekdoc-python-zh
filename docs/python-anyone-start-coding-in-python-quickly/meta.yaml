    So the Python philosophy is that it''s a different programming language (different
    from languages such as C++) and that coders should be responsible adults to respect
    the access specifiers. Also since Python is not a compiled language so there is
    no compiler to check if the usage of protected or private data members are following
    the access rules anyway. Thus it''s all upon us coders to make sure that the rules
    are followed.


