    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: an integer is required (got type str)\n>>>\n```\n\n在这里，我们有一个包含整数和字符（甚至在修改前是一个字符串）的混合类型元素的列表。但是当我们尝试将数组的一个整数元素修改为字符时，我们得到了一个错误消息，指示`TypeError`。\n\
    \n这里的一个主要困惑可能是，如果我不使用`myList`作为变量名，而是使用`myFakeArray`作为变量名，然后混合不同的元素类型，从而错误地得出结论认为它是一个包含混合类型元素的数组，正如你在许多地方可能看到的那样。这显然是一个误解，既然你已经读了这本书，你就更清楚了。\n\
    \n以下是来自Python软件基金会@Python.org的数组类型代码表\n\n| 类型代码 | C类型 | Python类型 | 最小字节数 | 备注\
