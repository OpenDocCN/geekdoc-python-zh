    ## Catch-all


    So we don’t want to have so many except clauses – what can we do? Turns out that
    there is a way to do a catch-all by simply using the except without any exception
    name, but with a catch, as shown in the following script:


    ![](img/b52ff7adacf4e0b514b791444be82d81_199_0.png)


    And when we run the script, we got the following results:


    ![](img/b52ff7adacf4e0b514b791444be82d81_199_1.png)


    A couple of consequences from this “catch-all” approach. First of all, there is
    no individual exception treatment anymore as we don’t have separate clauses for
    each exception. Secondly, since all exceptions are caught, when we hit CTRL-c
    to get out of the infinite loop, we cannot. As you may observe from the results:
    we first had a divide-by-0 exception, then we simply hit enter as we did before;
    but the 3<sup>rd</sup> input was actually a CTRL-c hence the output is a bit messed
    up – in that, the “Something went wrong …” text didn’t start in a new line. However,
    we were not able to break out of the infinite loop since the CTRL-c “exception”
    was caught. The only way to get out is to close out this command window. So this
    “catch-all” treatment might be tempting, but may not necessarily be the best practice.


    Now that we learned about how to catch exceptions, we could use it for FileNotFoundError
    exception, which we got previously, as well when trying to open a file. As shown
    in the following example:


    ![](img/b52ff7adacf4e0b514b791444be82d81_201_0.png)


    And the run result:


    ![](img/b52ff7adacf4e0b514b791444be82d81_201_1.png)


    ## Pass the exception error message


    So we were able to catch the error exception. Now we will go further to have a
    loop to prompt for the file name which we could actually open without exception.
    And also, to faithfully pass on the error message generated by the exception instead
    of our own message. This could be useful especially if we are catching some exception
    for the function which called us. As the calling function might wish to learn
    about the exception via the error message so that it could decide on its action
    to take. We have the code for this as in the following illustration:


    ![](img/b52ff7adacf4e0b514b791444be82d81_202_0.png)


    And the run results:


    ```

    C:\Users\jesse\AppData\Local\Programs\Python\Python310>

    C:\Users\jesse\AppData\Local\Programs\Python\Python310>python c:\jc\tmp\openfile3.py

    Please enter file name: mytestfile.txt

    [Errno 2] No such file or directory: ''mytestfile.txt''

    Please enter file name: LICENSE.txt

    <_io.TextIOWrapper name=''LICENSE.txt'' mode=''r'' encoding=''cp1252''>

    Please enter file name:

    ```


    As you can see, we tried open a non-existent file “mytestfile.txt” and got the
    FileNotFoundError exception in the openMyFile() function, and the exception error
    message in myErr was returned to the main() function infinite loop and then got
    printed. We then tried an existing file “LICENSE.txt” thus the file was opened
    without exception. The file reference was returned and via the print(returnValue)
    the file handle was displayed.


    ## Exercises:


    12.1 Write a program which prompts user for the name of file to be opened and
    then open the file, read the content, and then display the content. Also add exception
    handling if the user entered a file which does not exist.


    12.2 Write a program which prompts user to enter numbers until the user enters
    “done”. After the user is done, display the count of the numbers, total sum, and
    average of the numbers. Also add exception handling if the user entered something
    which is not an integer and also not “done”.


    ## Postamble


    Finally, after about a year or so of working on this writing, I have come to the
    end of the 8th Chapter and think that this will serve as the foundation for Python
    programming, or the basis for anyone starting computer programming. Thus fulfilling
    the two goals for this book: first is to give an introduction to first time programmers;
    second is to get experienced programmers to start using Python quickly. So, except
    the coding examples used to explain and/or show how the coding is done, this book
    doesn’t really include additional questions or practice. It is done this way since
    with the advent of Internet, there is enough coding practice online for people
    to jump into as they go through the Python programming journey.


    There are obviously many topics that are more advanced but are not included in
    this book. As it is my belief that with the fundamental knowledge covered in this
    writing, it is enough for any coder to solve any (or at least almost any) problems
    which could be solved using a Python solution. In the future, I am hoping to release
    books for advanced Python programming; but it is my sincere (alternative) hope
    that by then, readers of this book is advanced enough such that there is no need
    for a book to talk about advanced Python - thus fulfilling the “hidden” goal of
    getting our readers to start using Python in the shortest amount of time possible.


    With the popularity of Massive Open Online Courses (MOOC), it is my intention
