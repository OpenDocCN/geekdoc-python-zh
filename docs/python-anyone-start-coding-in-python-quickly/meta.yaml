    \ a couple of examples of the many potential situations where an unintended infinite\
    \ loop could form thus at run time it becomes a hanging process as it's just looping\
    \ forever.\n\n## Searching\n\nOk, enough for the infinite loop, now let’s look\
    \ at what we use loop for. One common application is search. For instance, we\
    \ might want to search a string and figure out the number of occurrences of a\
    \ particular character. We might also want to iterate through a list and find\
    \ a specific item, or items, such as the following examples demonstrate:\n\n```python\n\
    >>>\n>>> myString = 'spam, egg, and ham'\n>>> strLen = len(myString)\n>>> strLen\n\
    18\n>>> i = 0 # index into myString\n>>> charCount = 0 # counter of a specific\
