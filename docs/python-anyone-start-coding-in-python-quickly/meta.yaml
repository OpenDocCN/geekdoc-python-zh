  md: '# Chapter 1 Introduction to Computer and Coding


    Although this book is about Python coding, let’s try to have a basic understanding
    of the computer as the foundation for the coding world. If you already have the
    background, feel free to go to next chapter where the Python coding starts. But
    nonetheless, it might be helpful to have a quick review of the basics; and you
    might enjoy it.


    # Hardware/Software


    Since the first computer was invented decades ago (and there are multiple viewpoints
    of the invention – you can certainly research online about it), the tech industry
    quickly evolved from the semiconductor underpinning the hardware of computing
    devices, to the multiple form factors of computers (mainframe, mini computer,
    workstation, personal computer, laptop, tablet, phone, etc.), to the operating
    systems making these devices alive (thus entering the software realm), and the
    multitude of systems on top of it (such as web servers, application servers, and
    many others), to the apps (e.g. human resource management, maps, etc.) as we refer
    to them nowadays.


    The computing paradigm adapted to the ever increasing usage of computers. Beginning
    with the centralized mainframe model whereas big machines sit in glass room servicing
    multiple terminals possibly in a terminal room; the client-server model was then
    developed such that the client devices are getting “smarter” with more computing
    power (hardware) and logic (software) built in to offload some work from the server,
    and then the middle tier inserted between the server and the client; from there
    the hierarchy'
  merge: -1
