    这种方式与函数在数学世界中的使用方式非常相似，我们对此都非常习惯。不过稍后，我们将展示另一种类型的函数，称为无返回值函数（void functions），它们不返回任何东西。\n\
    \n## 内置函数\n\nPython 有一系列内置函数。其中一些我们已经见过，例如我们使用过几次的 `len()` 函数。还有 `max()` 和 `min()`\
    \ 函数——如下例所示：\n\n```python\n>>> max([2, 10, 31, 5, -4, -18, 9, 25])\n31\n>>> listOfNumbers\
    \ = [2, 10, 31, 5, -4, -18, 9, 25]\n>>> max(listOfNumbers)\n31\n>>> min(listOfNumbers)\n\
    -18\n>>>\n```\n\n在这些例子中，我们使用 `max()` 和 `min()` 实现了与之前使用循环机制遍历数字列表相同的结果。（事实上，这些内置函数很可能比我们的循环代码性能更好，因为\
    \ Python 可以对它们进行更好的优化，毕竟它们是内置的。至少，它们让我们的编码更快、更简单——因此，在适当的时候，没有必要重新发明轮子。）\n\n##\
    \ 导入库/模块/包\n\nPython 中还有许多现成的库/模块/包可供我们使用。我们之前已经看到一些使用 `math` 模块的例子。现在，让我们使用它的一些函数：\n\
    \n```python\n>>> import math\n>>> math\n<module 'math' (built-in)>\n>>> math.pi\n\
    3.141592653589793\n>>> math.pow(4,2)\n16.0\n>>> math.pow(4,4)\n256.0\n>>> math.sqrt(256)\n\
    16.0\n>>> math.sqrt(16)\n4.0\n>>>\n```\n\n所以你看，我们首先导入了 `math` 模块（有时也称为库——基本上是包含相关函数的文件或文件集合），然后为了展示它是什么，我们显示了\
    \ `math` 是什么，以及 `math.pi` 是什么。接着我们调用了两次 `pow()` 函数，将调用中的第一个参数提升到第二个参数的幂，然后调用 `sqrt()`\
    \ 函数来获取平方根。\n\n同时你看到这些数学函数是在浮点数世界中运行的。你可能希望看到它们作为整数；为此，我们可以调用类型转换函数 `int()`，如下例所示：\n\
    \n```python\n>>> math.pow(4,2)\n16.0\n>>> int(math.pow(4,2))\n16\n>>> myInt =\
    \ int(math.pow(4,2))\n>>> myInt\n16\n>>>\n```\n\n所以在上面的例子中，我们展示了 `math.pow()`\
    \ 返回浮点数结果。然后我们使用 `int()` 将结果转换（强制转换）为整数，当我们把结果赋值给变量时，它当然显示的是整数值。\n\n事实上，我们在输入/输出章节中已经使用过强制转换函数\
    \ `int()`。Python 中还有许多其他类型转换函数可用。所以它们已经是内置的（当然，它们大部分是用 Python 编写的），就像我们可以用 Python\
    \ 代码构建的许多函数一样。\n\n## 函数作为构建块\n\n函数在某种程度上是一种分支技术，因为它将代码执行从正常流程中带出，“跳转”到函数定义的代码段。但函数还有另一个好处（双关语），即将其功能封装在一个代码块中，以便以后使用——通常是在多个场合。这些场合可能只是代码中一个简单的函数调用，也可能是由其他函数调用——毕竟，你可以将整个应用程序的代码视为最高级别的函数，并且可能存在多层函数形成抽象层次结构，这样在层次结构的每一层，编码者只需要关心当前正在处理的函数，而无需担心任何其他底层函数的细节——本质上将所有其他函数视为某种黑盒。\n\
    \n这是一个非常重要的设计哲学，即将一个复杂的任务分解成更小的块，有时是小得多的块，这些块在编码过程中以及后来阅读代码的读者看来都更简单、更易于管理。\n\n\
    此外，在许多方面，编程语言中的函数与我们之前提到的数学世界中的函数非常相似。这些函数中的每一个，当被调用时，都会被执行，如果有返回值，返回值就是函数求值的结果——就像在数学世界中一样。以下是一些更多的例子来说明这一点：\n\
    \n```python\n>>> x = 1 #全局变量\n>>> def referToLocal() :\n...     x = 11\n...  \
    \   print('在 referToLocal() 中时局部 x 的值: ', x)\n...     x+=1\n...     print('在本地修改后局部\
    \ x 的值: ', x)\n...\n>>> referToLocal()\n在 referToLocal() 中时局部 x 的值:  11\n在本地修改后局部\
    \ x 的值:  12\n>>> #检查全局 x，看其值是否改变\n>>> x\n1\n>>> def referToGlobal() :\n...   \
    \  global x\n...     print('在 referToGlobal() 中时全局 x 的值: ', x)\n...     x+=1\n\
    ...     print('修改后全局 x 的值: ', x)\n...\n>>> referToGlobal()\n在 referToGlobal()\
    \ 中时全局 x 的值:  1\n修改后全局 x 的值:  2\n>>> #现在看到全局 x 的值改变了\n>>> x\n2\n>>>\n```\n\n所以在例子中，我们看到全局\
    \ `x` 被初始化为 1。然后我们有函数 `referToLocal()`，其中有一个局部变量 `x` 被初始化为 11。然后我们修改了局部变量 `x`\
    \ 的值，并显示该值已更改。在这个对 `referToLocal()` 的函数调用之后，我们显示全局变量 `x` 保持在相同的值 1。然后我们看到在 Python\
    \ 中，我们如何在函数 `referToGlobal()` 的局部作用域内引用全局变量 `x`，通过使用关键字 `global` 并声明当我们引用它时，我们的意图是使用全局变量\
    \ `x`。接着我们对 `x` 进行了修改，并显示该值在函数内部已更改。但当我们退出函数后，我们显示全局变量 `x` 的值确实如我们所料地改变了。所以在 Python\
    \ 中，我们引用全局变量的方式是显式的，具有不产生歧义的优点，因为当我们在局部作用域内时，必须明确声明使用全局变量的意图——这与 C++ 或 Java 等语言非常不同。\n\
    \n还有一些有趣（或令人困惑）的作用域情况，正如你在以下示例中看到的：\n\n```python\n>>> x = 1\n>>> def foo() :\n\
    ...     x = 2\n...     print('在 foo() 内部，使用局部 x: ', x)\n...\n>>> foo()\n在 foo()\
    \ 内部，使用局部 x:  2\n>>> def foo() :\n...     print('在 foo() 内部，但使用全局 x: ', x)\n...\n\
    >>> foo()\n在 foo() 内部，但使用全局 x:  1\n>>> # 到目前为止如预期，尽管我们在上面第二个例子中引用了全局 x\n>>> #\
    \ 但 Python 能够让它工作\n>>> # 现在我们将展示 Python 报错\n>>> # 因为 x 的作用域混淆了\n>>> x = 1 # 只是再次这样做，\n\
    >>>     # 尽管在此会话中不需要\n>>> def foo() :\n...     print('在 foo() 内部，但我们使用的是哪个 x？\
    \ ',x)\n...     x = 2 # 这里 Python 看到声明了一个局部变量 x\n...         # 但 x 已经在前面一行使用了\n\
    ...         # 那是全局 x 吗？\n...         # Python 并不喜欢这样\n...\n>>> foo()\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n  File \"\
    <stdin>\", line 2, in foo\nUnboundLocalError: local variable 'x' referenced before\
    \ assignment\n```\n\n```python\n>>> # 所以如预期，Python 报错了\n>>> # 我们现在回到之前使用的技术\n\
    >>> # - 表明我们想使用全局 x\n>>>\n>>> def foo() :\n...     global x\n...     print('在\
    \ foo() 内部，这次明确使用全局 x: ', x)\n...     x += 1\n...\n>>> foo()\n在 foo() 内部，这次明确使用全局\
    \ x:  1\n>>> x\n2\n>>> # 全局 x 也增加了 1\n>>> # - 通过 foo() 内部的最后一条语句\n>>>\n```\n\n\
    正如示例注释中所指出的，当引用的是全局变量，但又声明了一个同名的局部变量时，Python 不喜欢这样——正如上面调用 `foo()` 时显示的错误。\n\n\
    因此，一个避免这类混淆的好做法——因为这常常会导致编程错误——是使用不同的变量名，这样就没有空间让这些问题潜入。此外，如果可以的话，在结构化的软件工程世界中，全局变量可能不是最好的选择，因此如果你发现需要使用一些全局变量，也许是时候思考你的软件架构，看看是否可以改进结构，使其更好地组件化（意味着可以构建到某个组件/函数中）并在未来重用。可能存在全局变量合理的情况，你可能不得不接受它；但不要过早放弃——花些努力尝试避免它们。"
