    ## 第四章 数据类型与结构


    在Python（或大多数编程语言）中，如上一章所述，变量只是一个名称，它引用内存中的一块数据（如果数据尚未在内存中，它将被加载到内存中）。这是一种机制，使你作为程序员能够轻松地存储和检索数据。在内部，Python解释器会跟踪你创建的变量名以及这些变量名所引用的数据块。任何时候你需要检索其中一块数据，你只需使用引用它的变量名。


    Python中的变量可以引用任何类型的项。在变量被赋值为一个类型的项之后，它可以被重新赋值为另一个不同类型的项。（这称为动态类型，我们将在后面的“动态类型”部分有更多解释。）


    所以我们在上一章已经看到了一些基本类型。如果你还不熟悉基本类型，请回头参考。现在，让我们看看Python有哪些不同的数据类型，然后在本章后面，我们将对一种特定的、有趣的类型——字符串——进行一些探讨。


    ## Python数据类型


    Python有以下内置数据类型：


    | 类型 | 语法 |

    |---|---|

    | 文本 | str |

    | 数值 | int, float, complex |

    | 序列 | list, tuple, range |

    | 映射 | dict |

    | 集合 | set, frozenset |

    | 布尔 | bool |

    | 二进制 | bytes, bytearray, memoryview |


    有些我们已经遇到过，有些我们希望将来会遇到，也许是在更高级的Python编码材料中，如果本书没有涵盖的话。


    现在我们已经大致了解了不同的数据类型，让我们来谈谈Python的动态类型特性。


    ## 动态类型


    有许多计算机编程语言使用静态类型，即变量类型在编译时确定——换句话说，它们的类型在编码时就固定了，并且保持不变。对于静态类型语言，程序员在声明变量时必须指定类型。


    然而，还有其他计算机语言，如Python，其变量类型直到运行时才确定，因此程序员不需要在代码中使用变量之前声明它们。这就是所谓的动态类型。


    因此，在Python中，当变量在代码中第一次被赋值时，它就被创建了。换句话说，变量在使用之前需要被赋值。如果一个变量在没有已赋值的情况下被引用，将会发生错误。


    那么让我们看看这是如何工作的。首先，我们已经提到变量有一个名称/标识，我们使用名称来引用它。在内部，当一个变量被赋予某个值时，会根据该值确定一个类型，创建一个对象来保存该值，从而获得与之关联的类型。注意，类型是与对象关联的，而不是与变量关联。变量仅仅是对象的引用，对象存储在特定的内存位置并保存该值。


    换句话说，变量没有类型，因为类型是与对象关联的。所以你可以将不同类型的对象赋值给同一个变量名，因为变量只是对象的引用。你可以想象一条从变量到它所引用的对象的链接。在某种程度上，这条链接是一个指向对象所在特定内存位置的指针。你可以轻松地将这个指针指向存储不同类型对象的不同内存位置。这就是为什么在Python中我们可以使用并重用同一个变量名来引用不同时期不同类型的不同对象。


    好的，听起来动态类型很灵活，这当然是它的优点。但有优点也有缺点。由于动态类型，一些在静态类型语言（如C或Java）中可以在编译时完成的检查/验证，对于Python来说无法进行。因此，动态类型的灵活性提高了开发者的生产力，但代价是某些错误只能在运行时被发现，这当然不是理想的。


    因此，在Python中使用同一个变量名引用不同类型的对象时，编码员需要极其小心。例如，如果一个被引用的对象是字符串类型，但由于同一个变量名也被用来引用数值类型对象，并且对字符串对象使用了某些数值函数，就可能发生运行时错误。


    ## 字面量


    Python支持多种不同类型的字面量：字符串、布尔值和许多数值字面量——整数、浮点数等。我们更习惯于数值字面量，可能还有布尔值。但在Python中，字符串也是字面量。


    对字面量的求值会给我们一个给定类型（字符串、整数、浮点数、复数等）和给定值的对象。该值可能是近似的，例如浮点数的情况。'
