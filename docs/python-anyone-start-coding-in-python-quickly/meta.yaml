  md: 'To put it the other way, variable does not have type, as type is associated
    with object. So you can assign different type of objects to the same variable
    name, as variable is simply a reference to the object. You can imagine a link
    from a variable to the object it references. In a way, this link is a pointer
    pointing to a specific memory location where the object is. And you can easily
    point this pointer to different memory locations where different types of objects
    are stored. And that’s why in Python we can use and reuse the same variable name
    to reference different objects which are of different types from time to time.


    Alright, sounds like dynamic typing is flexible, which is certainly its advantage.
    But when there is pros, there is also cons. Due to dynamic typing, some checks/validation
    that could be done in static-typed languages (such as C or Java) during compilation
    time are not able to be carried out for Python. So the dynamic-typing flexibility
    gains developers productivity, but the price to pay is that certain errors can
    only be discovered at run time, which is certainly not desirable.


    So it’s on the coders to be extremely careful when coding in Python using the
    same variable name to reference different types of objects. For example, if an
    object referenced is of string type, but since the same variable name is also
    used to reference numeric type object, and some numeric function is used on the
    string object, some run time error could happen.


