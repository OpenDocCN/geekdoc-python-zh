    # So Many String Methods


    Python has many built-in methods that could be used on strings. As indicated above,
    all of these methods do not change the original string but rather create a new
    string that gets returned from the method call.


    So for example, to convert all characters in a string to uppercase, we call the
    upper() method:


    ```

    >>>

    >>> myString

    ''spam and eggs''

    >>> myString2=myString.upper()

    >>> print(myString2)

    SPAM AND EGGS

    >>>

    ```


    The following table lists the string methods available to us in Python. As you
    can see, there is a lot we can do to strings:


    | Method | Description |

    |---|---|

    | capitalize() | Converts the first character to upper case |

    | casefold() | Converts string into lower case |

    | center() | Returns a centered string |

    | count() | Returns the number of times a specified value occurs in a string |

    | encode() | Returns an encoded version of the string |'
