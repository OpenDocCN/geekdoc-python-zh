  mdcn: "## 空函数（与数学函数的差异）\n\n然而，正如本节标题所示，在包括 Python 在内的许多编程语言中，存在一个名为“空函数”的概念。这些函数不返回值，因此如果需要求值，它们求值结果为空，被称为“空函数”，因为其返回值被认为是“空”的，而\
    \ Python 有一个特殊的对象 `None` 来表示这一点，如下图所示：\n\n```python\n>>> def myPy() :\n...   \
    \  print('Spam and eggs')\n...\n>>> myPy()\nSpam and eggs\n>>> print(myPy())\n\
    Spam and eggs\nNone\n```\n\n所以你看，我们将 `my.py` 脚本重新封装成了一个函数 `myPy()`，它只显示一行文本，没有任何返回值。然后我们执行了该函数。最后，我们使用\
    \ `print(myPy())` 来显示 `myPy()` 的值。结果是 `print()` 调用后的两行。首先，当 `myPy()` 执行时显示了 'Spam\
    \ and eggs' 这一行，然后显示了 `None` 作为 `myPy()` 的值，这表明 `myPy()` 没有值，因为它不返回任何值，或者它返回 `None`。\n\
    \n既然我们已经了解了函数调用的用法，让我们更深入地探讨一下函数调用是如何构建和实现的——作为我们进入更多编码世界的进阶知识——尽管本书面向的是刚开始探索编码的读者，但为将来深入编程和软件工程领域多做一点准备也无妨。\n\
    \n## 调用栈\n\n所以在本节中，我们的标题是“调用栈”。它是什么？为什么我们需要它并想讨论它？所以，以防你还没有开始思考，当一个函数调用被发起并执行时，处理流程会被改变以运行被调用函数中的语句。但是当函数执行完成后，我们需要返回到调用者。然而，计算机如何知道返回到哪里以及这是如何实现的呢？如果这听起来不太复杂，那么如果我们有一系列函数调用呢？例如，假设在\
    \ `main()` 中我们调用了 `spam()`，然后 `spam()` 调用了 `egg()`，接着 `egg()` 调用了 `ham()`？\n\n\
    事实证明，在计算机科学领域，我们有某种叫做“调用栈”的东西来管理这个。我们有以下图表来展示它的工作原理：（左侧是代码；右侧是调用栈）\n\n```python\n\
    def ham():\n    print('in ham()-beginning')\n    print('in ham()-ending')\n\n\
    def egg():\n    print('in egg()-beginning')\n    print('in egg()-ending')\n\n\
    def spam():\n    print('in spam()-beginning')\n    egg()\n    ham()\n    print('in\
    \ spam()-ending')\n\ndef main(): # not the required way to start in Python\n \
    \   #although it is required in many other languages\n    print('in main()-beginning')\n\
    \    spam()\n    print('in main()-ending')\n\nmain()\n```\n\n![](img/b52ff7adacf4e0b514b791444be82d81_136_0.png)\n\
    \n所以一开始，执行从 `main()` 开始，调用栈只有一个栈帧，其中包含 `main()`，如上图所示。这样，当执行流程因函数调用 `spam()` 而改变，并在\
    \ `spam()` 完成后返回时，我们可以恢复 `main()` 的上下文——例如，我们知道要返回到 `main()` 中的哪个位置——在这种情况下，是在\
    \ `spam()` 行之后，但在 `print('in main()-ending')` 语句之前。（调用栈还处理其他事情，但我们将留到你 Python\
    \ 学习之旅中更高级的阶段。）所以在 `main()` 中的第一个 `print()` 语句之后，我们要调用 `spam()`，因此我们需要一个对应的 `spam()`\
    \ 栈帧——如下所示：（在此图中，我们忽略了 `print`，尽管它也是一个函数调用）\n\n```python\ndef ham():\n    print('in\
    \ ham()-beginning')\n    print('in ham()-ending')\n\ndef egg():\n    print('in\
    \ egg()-beginning')\n    print('in egg()-ending')\n\ndef spam():\n    print('in\
    \ spam()-beginning')\n    egg()\n    ham()\n    print('in spam()-ending')\n\n\
    def main(): # not the required way to start in Python\n    # although it is required\
    \ in many other languages\n    print('in main()-beginning')\n    spam()\n    print('in\
    \ main()-ending')\n\nmain()\n```\n\n![](img/b52ff7adacf4e0b514b791444be82d81_137_0.png)\n\
    \n然后在 `spam()` 中，我们要调用 `egg()`，所以我们需要一个 `egg()` 的栈帧，如下所示：\n\n```python\ndef ham():\n\
    \    print('in ham()-beginning')\n    print('in ham()-ending')\n\ndef egg():\n\
    \    print('in egg()-beginning')\n    print('in egg()-ending')\n\ndef spam():\n\
    \    print('in spam()-beginning')\n    egg()\n    ham()\n    print('in spam()-ending')\n\
    \ndef main(): # not the required way to start in Python\n    # although it is\
    \ required in many other languages\n    print('in main()-beginning')\n    spam()\n\
    \    print('in main()-ending')\n\nmain()\n```\n\n![](img/b52ff7adacf4e0b514b791444be82d81_138_0.png)\n\
    \n`egg()` 完成并返回到 `spam()` 后，`egg()` 栈帧从调用栈顶部移除。然后我们继续调用 `ham()`，因此一个 `ham()` 栈帧被压入调用栈顶部，如下图所示：\n\
    \n```python\ndef ham():\n    print('in ham()-beginning')\n    print('in ham()-ending')\n\
    \ndef egg():\n    print('in egg()-beginning')\n    print('in egg()-ending')\n\n\
    def spam():\n    print('in spam()-beginning')\n    egg()\n    ham()\n    print('in\
    \ spam()-ending')\n\ndef main() : # not the required way to start in Python\n\
    \    # although it is required in many other languages\n    print('in main()-beginning')\n\
    \    spam()\n    print('in main()-ending')\n\nmain()\n```\n\n![](img/b52ff7adacf4e0b514b791444be82d81_139_0.png)\n\
    \n然后在 `ham()` 完成后，它的栈帧从调用栈中弹出，执行流程返回到 `spam()` 中 `print('in spam()-ending')` 语句之前的位置。\n\
    \n此后，函数 `spam()` 完成，我们返回到 `main()` 中调用 `spam()` 之后的位置，如下所示：\n\n```python\ndef\
    \ ham() :\n    print('in ham()-beginning')\n    print('in ham()-ending')\n\ndef\
    \ egg() :\n    print('in egg()-beginning')\n    print('in egg()-ending')\n\ndef\
    \ spam() :\n    print('in spam()-beginning')\n    egg()\n    ham()\n    print('in\
    \ spam()-ending')\n\ndef main() : # not the required way to start in Python\n\
    \    # although it is required in many other languages\n    print('in main()-beginning')\n\
    \    spam()\n    print('in main()-ending')\n\nmain()\n```\n\n![](img/b52ff7adacf4e0b514b791444be82d81_140_0.png)\n\
    \n从这里开始，它继续完成整个代码。\n\n所以，简而言之，这就是调用栈如何用于管理函数调用执行流程，以及（在本书范围之外没有太多细节）管理调用上下文的。这里超越调用栈实现的重要概念是，在计算机编码中，我们使用分而治之的技术将复杂任务分解成更小的部分（如果需要，还可以分解成更多层的这些小部分）。函数是利用这种分而治之技术构建抽象层的基石，通过分而治之，将复杂任务分解成更小、更易于管理的代码块，从而使编码更容易，有时甚至成为可能，并产生更高质量、更健壮的软件应用程序。\n\
    \n## 练习：\n\n- 8.1 编写一个函数，该函数接受一个字符串作为参数，并返回反转（倒序）后的字符串。\n- 8.2 编写一个函数，该函数接受一个整数，并返回该整数各位数字组成的列表。\n\
    - 8.3 编写 `myLen()` 函数来模拟字符串的 `len()` 函数功能。因此 `myLen()` 将接受一个字符串对象作为参数，遍历字符串以计算其中的字符数，然后返回计数值。\n\
    - 8.4 编写一个函数，该函数接受一个字符串和一个字符作为参数。遍历字符串以找到给定字符并返回该字符出现的次数。\n- 8.5 编写一个小费计算器，该计算器接受账单金额和小费百分比作为输入，例如\
    \ `tipCalc( 35.66, 0.15)` 表示总金额为 35.66，小费为 15%。该函数将返回最终支付金额。"
