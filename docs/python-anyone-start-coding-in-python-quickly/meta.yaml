  md: '# Evaluation Of Function


    Now that we have had some basic ground covered for function, let’s look at how
    function is evaluated when it’s used (called) in an expression, such as in this
    following example:


    ```

    >>> import math

    >>> def myMax ( inList ) :

    ...     maxItem = -math.inf

    ...     for item in inList :

    ...         if item > maxItem :

    ...             maxItem = item

    ...     return maxItem

    ...

    >>> largest = myMax ( [2, 10, 31, 5, -4, -18, 9, 25] )

    >>> largest

    31

    >>> myMax ( [2, 10, 31, 5, -4, -18, 9, 25] )

    31

    >>>

    ```


    We used this example before to show that myMax() in this call will return the
    largest item 31, as shown above in the end. We also used this myMax() call in
    the assignment statement largest = myMax ( [2, 10, 31, 4, -4, -18, 9, 25] ) –
    in it when myMax() is used, it is evaluated by calling the function and the return
    value from the function is used as the evaluation result. The evaluation result
    31 is then assigned to the variable largest as displayed in the example.


    This way is very similar to how function is used in the mathematic world and we
    are all very much used to it. A bit later, we will however, show a different type
    of functions, called void functions, which doesn’t return anything.


    # Built-in functions


    Python has a bunch of built-in functions. Some of them we have already seen, such
    as the len() function which we used a few times.'
