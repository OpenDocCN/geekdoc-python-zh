  mdcn: "我们在这第4行文本的末尾没有换行符。然后我们关闭文件，以便以读取模式重新打开它（在调用`open()`时实际上使用了'r'）。接着我们实际上也展示了文件句柄`fileRefRead`的值，它向我们显示了文件路径，以及打开模式，毫无意外地是'r'。然后我们将文件内容读入`fileContent`并展示了其值。之后我们使用`print()`打印了所有4行。这一次末尾没有“空白”行。\n\
    \n## 练习：\n\n11.1 创建一个包含多个整数的文件。编写一个程序来读取文件内容并显示它。\n\n11.2 使用与上一题相同的文件，将整数相加并显示总和。\n\
    \n11.3 创建一个包含多行文本的文件。编写一个程序来显示文件的内容。\n\n11.4 编写一个程序来显示上一题中的文件内容，但还要在每行前面显示文本的行号（行数），后跟一个冒号。\n\
    \n11.5 创建一个包含学生姓名的文件（每行一个姓名）。编写一个程序来统计文件中的学生人数。\n\n11.6 使用与上一题相同的文件，编写一个程序来读取学生姓名，并将学生姓名写入另一个文件，但每个姓名前要加上学生计数，后跟一个冒号。\n\
    \n11.7 使用以下数据创建一个文件，每个学生一行——以学生姓名开头，后跟不同数量的测试分数：\n\n```\njoe 10 15 20 25 30 35\
    \ 40\njane 11 22 33\njohn 12 24 26 35 44\njim 33 35 38 35 45\njesse 18 22 12 22\n\
    ```\n\n11.8 使用上一题的文件，编写一个程序来显示学生姓名和测试分数。\n\n11.9 使用相同的文件，找出有5个或更多测试分数的学生，显示他们的姓名和祝贺他们取得好成绩的信息。对于其他学生，显示他们的姓名和一些鼓励他们继续努力的信息。\n\
    \n11.10 编写一个程序，提示用户输入要打开的文件名，然后打开文件，读取内容，并显示内容。\n\n## 第12章 异常\n\n在上一章中，我们看到当尝试打开一个不存在的文件时，我们得到了一个错误信息，这被称为异常。但是，如果在某些应用程序中，我们不想因为错误信息而终止，而是想继续运行应用程序，但以某种方式处理这种情况呢？这就叫做异常处理。\n\
    \n那么让我们深入探讨一下。什么是异常？本质上，如果程序运行时出了问题，导致执行中断并崩溃，我们就说发生了异常。而程序员编写一些代码逻辑来解决这种不希望的崩溃，使程序能够继续运行——这就叫做异常处理。所以你可以看到，拥有这些代码逻辑是很重要的。处理异常的代码逻辑依赖于编程语言提供的机制。许多现代编程语言都提供这种能力。Python也不例外（无意双关）。\n\
    \n## 可能出错的情况（异常）\n\n现在让我们看一些异常和不希望的崩溃，如下图所示：\n\n```\n>>>\n>>> open(\"mytestfile.txt\"\
    )\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    FileNotFoundError: [Errno 2] No such file or directory: 'mytestfile.txt'\n>>>\n\
    ```\n\n所以如你所见，我们得到了一个`FileNotFoundError`。在处理文件时，这很可能是一个可能的情况。虽然我们是在交互式IDE会话中显示这个错误，但你可以看到，如果我们将代码放在脚本中，脚本执行就会崩溃。此外，还有许多其他异常可能发生，我们将在下面的场景中展示另一个。但这次使用一个脚本来计算除法。\n\
    \n脚本如下：\n\n![](img/b52ff7adacf4e0b514b791444be82d81_190_0.png)\n\n从下图可以看出，我们能够进行除法运算，直到我们提供0作为除数。此时，程序因除以零错误而崩溃：\n\
    \n![](img/b52ff7adacf4e0b514b791444be82d81_191_0.png)\n\n崩溃当然不是一个理想的结果。我们打算让程序尽可能长时间地运行，只要用户想使用它（如果我们将代码放在一个循环中，为简单起见这里没有显示）。崩溃是一个除以零异常。所以如果我们能在代码中处理这个异常，我们就可以避免崩溃。\n\
    \n## Try块\n\n为了进行异常处理，Python有一个`try`块，带有`except`、`else`和`finally`子句，我们可以使用。一般语法如下所示：\n\
    \n```\ntry:\n    # Try block Code ...\nexcept [exceptionName]:\n    # Optional\
    \ block(s)\n    # Handling of exception (one exception per block) ...\nexcept:\n\
    \    ...\nelse:\n    # Code to execute if no exception ...\nfinally:\n    # Code\
    \ always executed ...\n```\n\n现在让我们看一些例子：\n\n![](img/b52ff7adacf4e0b514b791444be82d81_192_0.png)\n\
    \n我们实际上修改了之前的代码，之前的代码在除以0时崩溃了。之前的代码也有一个`main()`函数，但我们展示了没有`main()`的替代方案也可以工作（正如我们过去提到的）。\n\
    \n在这个修改后的代码中，我们有一个`try`块，其中在`except`子句中处理了`ZeroDivisionError`异常。我们将其他所有内容都留给了`else`子句，并以`finally`子句结束，如图所示。经过修改，我们尝试了一些计算，包括除以0，以查看异常处理。我们最后还得到了另一个错误，如下图所示：\n\
    \n![](img/b52ff7adacf4e0b514b791444be82d81_193_0.png)\n\n所以我们计算了20 / 4，然后尝试了20\
    \ / 0。我们能够优雅地处理这个异常。但是，我们没有使用CTRL-c退出，而是直接按了回车键，得到了一个不同的`ValueError`异常。所以发生的情况是我们没有输入任何内容，而我们的代码将其作为输入并尝试将其转换为整数，从而导致了错误。所以我们还有一个异常需要处理，如下所示的修改后的代码：\n\
    \n```python\n# Divide by 0 demo\n\ndef myDivision():\n    print('Division calculator\
    \ - use CTRL-c to exit')\n    while True: #infinite loop\n        try: #try block\n\
    \            # Prompt user for inputs of dividend and divisor\n            dividend\
    \ = int(input('Please enter a number as the dividend: '))\n            divisor\
    \ = int(input('Please enter a number as the divisor: '))\n            # calculate\
    \ the result of division\n            divisionResult = str(dividend / divisor)\n\
    \        except ZeroDivisionError:\n            print(\"Cannot divide by 0. Please\
    \ try again!\")\n        except ValueError:\n            print(\"Please only enter\
    \ integer for calculation. Please try again!\")\n        else:\n            print(\"\
    The division result is \" + str(divisionResult))\n        finally:\n         \
    \   print('Next calculation? If not, use CTRL-c to exit')\n\nmyDivision()\n```\n\
    \n现在你可以看到我们添加了另一个`except`子句来处理`ValueError`。运行结果如下：\n\n![](img/b52ff7adacf4e0b514b791444be82d81_195_0.png)\n\
    \n在这个演示中，我们首先处理了除以0的情况，然后是几个`ValueError`。所以我们对测试感到满意，并按CTRL-c结束了程序。\n\n但后来我们想到可能还有其他我们尚未处理的异常。事实上，如果你查阅Python文档，你会发现更多，所以我们有以下常见异常表：\n\
    \n| 异常 | 错误原因 |\n|---|---|\n| AssertionError | 当assert语句失败时引发。 |\n| AttributeError\
    \ | 当属性赋值或引用失败时引发。 |\n| EOFError | 当input()函数遇到文件结束条件时引发。 |\n| FloatingPointError\
    \ | 当浮点运算失败时引发。 |\n| GeneratorExit | 当生成器的close()方法被调用时引发。 |\n| ImportError |\
    \ 当找不到导入的模块时引发。 |\n| IndexError | 当序列的索引超出范围时引发。 |\n| KeyError | 当在字典中找不到键时引发。\
    \ |\n| KeyboardInterrupt | 当用户按下中断键（Ctrl+C或Delete）时引发。 |\n| MemoryError | 当操作耗尽内存时引发。\
    \ |\n| NameError | 当在局部或全局作用域中找不到变量时引发。 |\n| NotImplementedError | 由抽象方法引发。 |\n\
    | OSError | 当系统操作导致系统相关错误时引发。 |\n| OverflowError | 当算术运算的结果太大而无法表示时引发。 |\n| ReferenceError\
    \ | 当使用弱引用代理访问已被垃圾回收的引用对象时引发。 |\n| RuntimeError | 当错误不属于任何其他类别时引发。 |"
