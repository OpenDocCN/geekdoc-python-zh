    identity |

    | not x | Boolean NOT |

    | and | Boolean AND |

    | or | Boolean OR |

    | lambda | Lambda expression |


    In this precedence table, the precedence ranking lowers from top to bottom – so
    the highest precedence is at the top, and vice versa.


    As for associativity, almost all operators have left-to-right associativity. So
    when there are multiple operators at the same precedence level appearing in a(n)
    statement/expression, the evaluation goes from left to right so the leftmost operator
    is evaluated first and then the second and so on as long as they are all at the
    same precedence level.


    Here is a simple example to make the point a bit clearer, as this might sound
    confusing but really is not that complicated:

    How does the expression 100/10*10 get evaluated? Since both operators / and *
    have the same precedence, so we look to the associativity to determine the order
    of execution. As both operators have left to right associativity, so this expression
    is executed as if we have the parenthesized 100/10 , that is, it’s like this expression
    (100/10)*10 . Since () has the highest precedence, so we know that / is executed
    before *, just like in 100/10*10 due to associativity.


    And as mentioned, most operators have left-to-right associativity; so this is
    really not as complex as it might appear.


    Now with the realization of precedence and associativity of operators in expressions,
