    \ Jesse Chou\n\n## Contents\n\n- Preface\n- Chapter 1 Introduction to Computer\
    \ and Coding\n    - Hardware/Software\n    - Data Storage and Manipulation\n \
    \   - Coding Languages - Machine/Assembly/3GL/4GL\n    - Compilers/Interpreters\n\
    \    - Some common misconceptions\n    - Exercises:\n- Chapter 2 Setting Up Python\
    \ for Coding and Debugging\n    - Downloading/Installation\n    - Launch Python\
    \ Interpreter (Interactive/Script Modes) – Using IDLE/IDE\n    - Interactive Mode\
    \ vs. Script Mode For Python (Or Any Interpretive Language)\n    - Coding And\
    \ Debugging\n    - Popular IDEs Which Are Very Capable For Python Coding\n   \
    \ - Python Specific Extensions For “Compilation”\n    - Exercises:\n- Chapter\
    \ 3 Operators & Statements\n    - Operators And Operands\n        - Arithmetic\
    \ operators:\n        - Assignment operators:\n        - Comparison operators:\n\
    \        - Logical operators:\n    - Variables\n    - Assignment, Statement, Expression,\
    \ Evaluation\n        - Boolean expressions\n    - Logical Operators\n    - Precedence\
    \ vs. Association\n    - Sequential Execution\n    - Comments #\n    - Docstring\n\
    \    - Exercises:\n- Chapter 4 Data Types & Structures\n    - Python Data Types\n\
    \    - Dynamic Typing\n    - Literals\n    - String Is Different\n    - So Many\
    \ String Methods\n    - Single and Double Quotes\n    - Lists\n    - Arrays (Not\
    \ Built-In)\n    - Exercises:\n- Chapter 5 Input/Output\n    - Input From Keyboard\n\
    \    - Output To Console Monitor Display\n        - Unformatted Console Output\n\
    \        - Formatted string literals\n        - Formatted Output With Conversion\
    \ Specifiers\n    - Exercises:\n- Chapter 6 If This Then That - Decision and Branching\n\
    \    - Conditional Statement Using if\n    - Conditional Statement Using if With\
    \ Alternative Branch Using else (if-then-else)\n    - Multiple if-else Chained\
    \ Together\n    - Nested if-else\n    - Exercises:\n- Chapter 7 Repetition/Looping\n\
    \    - while Loop\n    - for Loop\n    - break Statement\n    - continue Statement\n\
    \    - Infinite Loop\n    - Searching\n    - Counting\n    - Max/Min\n    - Exercises:\n\
