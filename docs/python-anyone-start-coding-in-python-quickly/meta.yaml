    # Chapter 4 Data Types & Structures


    In Python (or most of the programming languages), as mentioned in last chapter,
    a variable is just a name that refers to a piece of data in memory (if not already
    in memory, it will be loaded into memory.) It is a mechanism that makes it easy
    for you, the programmer, to store and retrieve data. Internally, the Python interpreter
    keeps track of the variable names that you create and the pieces of data to which
    those variable names refer. Any time you need to retrieve one of those pieces
    of data, you simply use the variable name that refers to it.


    A variable in Python can refer to items of any type. After a variable has been
    assigned an item of one type, it can be reassigned an item of a different type.
    (This is called dynamic typing and we have more explanation in the coming section
    titled Dynamic Typing.)


    So we’ve seen some basic types in the previous chapter. Please refer back if you
    are not familiar yet with the basic types. Now, let’s see the different data types
    Python has and then later in the chapter we will have some treatments for a specific,
    interesting type – string.


    # Python Data Types


    Python has the following built-in data types:


    | Type | Syntax |

    |---|---|

    | Text | str |

    | Numeric | Int, float, complex |

    | Sequence | List, tuple, range |

    | Mapping | dict |

    | Set | Set, frozenset |'
  - '[PAGE 50]


    | Boolean | bool |

    | --- | --- |

    | Binary | Bytes, bytearray, memoryview |


    Some we have already encountered, some we will hopefully encounter in the future,
    perhaps in more advanced Python coding materials if not covered in this book.


    Now that we have a glance of the different data types, let’s talk about the dynamic
    typing characteristic of Python.


    # Dynamic Typing


    There are many computer programming languages which use static typing, in that
    the variable types are determined at compile-time – in other words, their types
    are fixed at coding time and remain static. For static typing languages, coders
    must specify type for variable when it’s declared.


    However, there are other computer languages, such as Python, where a variable
    type is not determined until run-time thus programmers do not need to declare
    variables before using them in the code. And that’s called dynamic typing.


    So in Python, a variable is created when it is assigned a value for the first
    time in the code. In other words, a variable needs to be assigned a value before
    it can be used. If a variable is referenced without a value already assigned,
    an error will occur.


    So let’s look at how this works. First of all, we already mentioned that a variable
    has a name/identity, and we use the name to reference it. Internally, when a variable
    is assigned some value, a type is determined based on the value, an object is
    created to hold the value and thus gets the type associated with it. Notice that
    the type is associated with the object, not the variable. The variable is merely
    a reference to the object, which is stored in a specific memory location and holds
    the value.'
  - '[PAGE 51]


    To put it the other way, variable does not have type, as type is associated with
    object. So you can assign different type of objects to the same variable name,
    as variable is simply a reference to the object. You can imagine a link from a
    variable to the object it references. In a way, this link is a pointer pointing
    to a specific memory location where the object is. And you can easily point this
    pointer to different memory locations where different types of objects are stored.
    And that’s why in Python we can use and reuse the same variable name to reference
    different objects which are of different types from time to time.


    Alright, sounds like dynamic typing is flexible, which is certainly its advantage.
    But when there is pros, there is also cons. Due to dynamic typing, some checks/validation
    that could be done in static-typed languages (such as C or Java) during compilation
    time are not able to be carried out for Python. So the dynamic-typing flexibility
    gains developers productivity, but the price to pay is that certain errors can
    only be discovered at run time, which is certainly not desirable.


    So it’s on the coders to be extremely careful when coding in Python using the
    same variable name to reference different types of objects. For example, if an
    object referenced is of string type, but since the same variable name is also
    used to reference numeric type object, and some numeric function is used on the
    string object, some run time error could happen.


    # Literals


    Python supports various different types of literals: string, Boolean, and many
    numeric literals – integer, float, among others. We are more used to numeric literals,
    and probably Boolean as well. But in Python, strings are also literals.


    Evaluation of a literal gives us an object of the given type (string, integer,
    floating point number, complex number, etc.) with the given value. The value may
    be approximated such as in the case of floating points.'
