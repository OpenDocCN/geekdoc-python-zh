    syntax checks as well as syntax hints so that it’s easier for coders to do their
    job. In the Python world IDLE (Integrated Development and Learning Environment
    ) is the package which is bundled with the language thus the IDE of choice (at
    least by python.org) as you might have already discovered after you downloaded
    and installed Python (as shown in the previous figures.)


    You can also use the Python.exe command directly in a window by clicking on


    ![](img/b52ff7adacf4e0b514b791444be82d81_19_1.png)'
