  md: 'In the Java world, each hardware platform/architecture has a different Java
    bytecode interpreter specifically written for the targeted hardware. It interprets
    the Java bytecode for execution. This way, Java achieves its goal of **Write once,
    run anywhere** (WORA), or sometimes **Write once, run everywhere** (WORE) such
    that once coding is done, there is none or very minimum porting effort to make
    it run on different platforms.


    But the extra layer of Java bytecode that is executed by an interpreter often
    slows down the execution vs. the same code that is compiled into native machine
    code. This problem is somewhat alleviated by [just-in-time (JIT) compilers](https://en.wikipedia.org/wiki/Just-in-time_compilation)
    - A JIT compiler may translate the frequently used portion of Java bytecode into
    native machine code while executing the program thus making the code execution
    much faster.


    And specifically to Python, since it’s an interpreted language, It has the inherent
    slowness in performance. There is effort made just few years ago to translate
    Python code into bytecode, which are low-level instructions that could be executed
    by the interpreter (very similar to the Java situation described earlier and perhaps
    inspired by it.) So instead of executing the code directly, bytecode is executed
    in a virtual machine, which is simply the specific Python interpreter behind the
    scene. With this performance enhancement, converting to CPython or the likes is
    avoided thus the cumbersomeness is no more. Yet as long as the Python bytecode
    and the virtual machine is the same version/compatible, the source code could
    be executed anywhere (be it Windows, MacOS, etc.) thus achieving effortless portability.


    # Diagram of interpretation vs. compilation'
