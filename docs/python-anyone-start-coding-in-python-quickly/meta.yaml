  md: '# Void Function (Divergence From Mathematical Function)


    However, as the heading of this section suggested, there is a notion void function
    in many programming languages including Python. These functions are not returning
    value thus if needed to be evaluated, they evaluate to nothing and are called
    void function, as the return value is said to be void and Python has a special
    object None to represent this as shown in the following illustration:


    ```

    >>>

    >>> def myPy() :

    ...     print(''Spam and eggs'')

    ...

    >>> myPy()

    Spam and eggs

    >>>

    >>> print(myPy())

    Spam and eggs

    None

    >>>

    ```


    So you see that we repackaged the my.py script into a function myPy() , which
    just display one line of text without any returning value. We then executed the
    function. And finally we used print(myPy()) to display what the value of myPy().
    The result are the 2 lines following the print() call. First it displayed the
    line ''Spam and eggs'' when myPy() was executed, then None is displayed as the
    value of myPy(), which shows that myPy() has no value, as it doesn''t return any
    value, or it returns None.


    Now that we have looked into the usages of function calls, let''s dive a bit deeper
    into how function calls are structured and implemented – as a bit advanced knowledge
    for us to get into more of the coding world – although this book is intended for
    audience starting to explore coding but it won''t hurt to get a bit more ready
    for future venture into advanced programming and software engineering.'
