    \ 5,873,100 bytes\n              10 Dir(s)   5,765,525,504 bytes free\n\nC:\\\
    Users\\jesse\\AppData\\Local\\Programs\\Python\\Python39-32>\n```\n\n在这个Python解释器中，完成后，你可以点击ctrl-z（同时按下control键和z键），然后按回车键退出回到Windows命令shell。\n\
    \n如果你使用的是某种Linux发行版，安装后非常简单——你只需输入python，你应该会看到类似以下的内容：\n\n![](img/b52ff7adacf4e0b514b791444be82d81_22_0.png)\n\
    \n在这个Linux shell中，由于我有多个Python版本（你可以从“which python”命令看到），所以我使用python3.9来调用最新的Python解释器。一旦进入Python，我可以使用通常的ctrl-z将其挂起到后台，并使用fg（前台）命令将其调回。或者，如果我使用ctrl-d，那么我将退出Python解释器并返回到Linux\
    \ shell。\n\n如果你使用的是Mac，由于MacOS属于Unix操作系统家族，因此它与上述Linux情况不会有太大差异。至于本书的其余部分，由于我恰好使用Windows\
    \ 10虚拟机来编写本书，因此所有示例的截图都将来自Windows 10。但一旦你进入Python shell/解释器，无论你使用的是哪个底层操作系统，过程都应该是一样的。"
