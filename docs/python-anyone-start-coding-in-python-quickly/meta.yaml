  md: '# Python Specific Extensions For “Compilation”


    Without getting into much details, although Python is a great language, it’s not
    as fast as C or Java – the other two popular languages. There are many efforts
    to change that. Since this is a topic that’s beyond the scope of this book, however,
    I will just touch it lightly so that we have some knowledge of these efforts.


    Among the many efforts, there are two major areas which are worked on to speed
    up Python execution: one is to have some code optimization such that it will run
    faster; the other is to make the Python executable run faster using a different
    runtime than the one we have been using (the interpreter from Python.org.)


    In optimizing the Python runtime, not like the CPython mentioned in Chapter 1,
    PyPy uses the just-in-time (JIT) technique just like Java to speed up the performance
    – also as explained in Chapter 1.


    There are also other extensions such as Cython (C extensions for Python) which
    you can search about if interested.


    But one popular extension is Numba which takes advantage of optimization in both
    aforementioned areas. It uses JIT compilation and also optimized libraries such
    as NumPy to accelerate the execution.


    After you have gone through this book and feel comfortable, you are certainly
    free to explore these extensions. In fact, in the future should you get into more
    advanced Python coding, you are encouraged to take advantage of these extensions
    to realize more benefit of Python programming.


