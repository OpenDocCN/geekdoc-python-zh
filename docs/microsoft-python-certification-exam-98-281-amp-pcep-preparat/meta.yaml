    # 1 Introduction – Microsoft & PCEP Certification Guide


    - This exam guide prepares a student to get a Microsoft certification Exam-98-281
    Introduction to programming using Python.

    - This exam guide also prepares the student to get a PCEP – Certified entry level
    Python Programmer, awarded by the Python institute.

    - This guide assumes certain level of programming knowledge. It is not a beginner
    text book.


    **Pre-Requisites:**


