    # 2 模块 1：使用数据类型和运算符执行操作


    # 模块 1：使用数据类型和运算符执行操作 (20 – 25%) - 测试 #1


    本模块将测试以下概念：。这是大纲中的第一个模块。


    **为变量分配数据类型。**


    -   *计算表达式以确定 Python 将为每个变量分配的数据类型*

    -   *识别 str、int、float 和 bool 数据类型*


    **执行数据和数据类型操作**


    -   *从一种数据类型转换为另一种类型；构建数据结构；执行索引和切片操作*


    **执行算术、比较和逻辑运算**


    -   *赋值；比较；逻辑；算术；身份 (is)；包含 (in)*


    **根据运算符优先级确定执行顺序**


    -   *赋值；比较；逻辑；算术；身份 (is)；包含 (in)*


    **选择适当的运算符以达到预期结果**


    -   *赋值；比较；逻辑；算术；身份 (is)；包含 (in)*


    # 模块 1 - 练习测试 1 总时间：45 分钟；最低及格分数：70%


    # 答案 – 模块 1，练习测试 1


    | 模块问题 | 答案与解释 |

    | :--- | :--- |

    | M1Q1 | **答案：2。**<br>**a 的输出值为：False，b 的值为：1**<br>前两行使用赋值运算符为变量 a 和 b 赋值。<br>第
    3 行：使用了 2 个运算符，<br>第 4 行：第一个是 Python **比较运算符 ==**。它比较 a 和 b 的值并返回一个布尔结果。在这种情况下，a
    == b 的计算结果为 **False**。<br>因此，False 的值被赋给了 a。<br>所以这个程序的输出是：<br>**a 的值为：False，b
    的值为：1** |

    | M1Q2 | **答案：5。m 将获得值 5。**<br>由于对 m 进行了从浮点数到整数的显式转换，m = int(i/2) = int(5.5) =
    5。<br>对于其他变量，j、k、l 都将被计算为浮点数，并获得值 5.5 |

    | M1Q3 | **答案：1, 3。**<br>**语句 3 和语句 4 将产生错误。使用字符串时不允许使用乘法、除法等算术运算符。**<br>然而，语句
    1 和语句 2 是正确的。它们的输出将是：s1=ab 和 s2 = ac，因为字符串加法是允许的操作。 |

    | M1Q4 | **答案：3. 6**<br>不含空格的字符串长度为 5。<br>len(s1.rstrip() ) 长度 = 8 意味着左侧带空格的字符串长度为
    8。（此处右侧空格被修剪）<br>**因此左侧空格数为 8-5 = 3。**<br>现在 len(s1.lstrip() ) = 8，这意味着所有左侧空格都被修剪，包含右侧空格的字符串长度为
    8。<br>**因此右侧空格数为 8-5 = 3。**<br>**所以总空格数为：左侧空格 + 右侧空格 = 3 + 3 = 6** |

    | M1Q5 | **答案：3,4**<br>v 为真，因为它包含一个数组元素，且该元素的值为假。因此 v 的计数非零，所以 **v 为真**<br>x 同理，x
    有一个元素，因此其计数非零，**x 为真**<br>z 包含一个空格元素。z 的计数也为一，使得 **z 也为真**<br>另一方面，y 是一个空字符串，空字符串的布尔值将为假。所以
    y 为假。 |

    | M1Q6 | **答案：4**<br>前两行使用赋值运算符为变量 a 和 b 赋值。<br>第 3 行：使用了 2 个运算符，<br>第一个是 Python
    **比较运算符 ==**。它比较 a 和 b 的值并返回一个布尔结果。在这种情况下，a == b 的计算结果为 **False**。<br>**因此，False
    的值被赋给了 a。**<br>所以这个程序的输出是：<br>**a 的值为：False，b 的值为：1** |

    | M1Q7 | **答案：1,2,3,4**<br>**print (s1[1:2] )** 在此语句中，选取了从索引 1 开始的字符串，即字符串的**第二个位置**。S1[1]
    = ''e''<br>**print ( s1[1:-3] )** 在此语句中，索引从最右边开始计数，选取了**距离右侧字符 3 个位置的下一个字符**，即
    ''e''<br>print ( s1[1] ) 选取了**位置 1 的字符**，同样是 ''e''<br>print ( s1[-4])。在此，选取了**从右数第
    4 个字符**，也是 ''e'' |

    | M1Q8 | **答案：1, 2**<br>k -= q = 6 + 2j - 6 - 2j = 0.0 + 0.0j。实部和虚部均为零。<br>k =
    k - (-q) = 6 +2j - ( 6 + 2j ) = 0.0 + 0.0j，实部和虚部均为零。<br>对于另外两个方程，k 的值在实部和虚部上均非零。<br>k
    = 12 + 4j ( 对于 k -=q )<br>k = 24 + 8j ( 对于 k = k - q - q ) |

    | M1Q9 | **答案：4**<br>S1[:n] 当 n=5 时，将分配字符串中从第 5 个位置向左的所有字符<br>**所以 a = “Hello”**<br>b
    将是字符串中从第 5 个位置向右的所有字符。<br>**所以 b = “ Welcome Good bye”**<br>当你将 a 和 b 相加时，两者都会得到原始字符串。<br>**因此
    a+b = s1。所以 if 条件将变为真，并将值 200 赋给 amount。**<br>**因此将打印 amount = 200。** |

    | M1Q10 | **答案：4**<br>与常规数据类型一样，复数数据类型也遵循算术运算。在上面的例子中，实部将进行算术计算，虚部将单独进行算术计算。<br>k
    = k - q 将等于 ( 6 + 2j ) - ( -9 + 2j ) = ( 6 + 9 ) + ( 2j - 2j ) = 15 + 0j<br>**实部是
    15.0，虚部是：0.0** |

    | M1Q11 | **答案：1**<br>将打印“夏季”，因为 **a 是非零值**，并且对于 **a = -1**，if 条件将被计算为 **真**。
    |

    | M1Q12 | **答案：2。**<br>**Python 变量区分大小写**。因此，在这个例子中，虽然变量名都是 count，但由于每个变量的大小写不同，它们被视为不同的变量。<br>所以赋值给
    **count = 33**，并且只会打印该值。 |

    | M1Q13 | **答案：3**<br>比较运算符和布尔数据类型都将给出**相同的输出 False, False** |

    | M1Q14 | **答案：2**<br>**count_me_in = 20 是一个正确赋值的变量，因为它遵循变量的命名约定。**<br>然而 2go
    以数字开头，因此会产生错误。<br>"count me" 是一个字符串字面量，不能用作变量。 |'
