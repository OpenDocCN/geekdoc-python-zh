    # 2 Module 1: Perform operations using data types & operators


    # Module 1: Perform Operations Using Data Types and Operators (20 – 25%) - Test
    #1


    In this module the following concepts will be tested: . This is the first module
    in the syllabus.


    **Assign data types to variables.**


    - *Evaluate an expression to identify the data type Python will assign to each
    variable*

    - *Identify str, int, float, and bool data types*


    **Perform data and data type operations**


    - *Convert from one data type to another type; construct data structures; perform
    indexing and slicing operations*


    **Perform Arithmetic, Comparison and Logical Operations**


    - *Assignment; Comparison; Logical; Arithmetic; Identity (is); Containment (in)*


    **Determine the sequence of execution based on operator precedence**


    - *Assignment; Comparison; Logical; Arithmetic; Identity (is); Containment (in)*


    **Select the appropriate operator to achieve the intended result**


    - *Assignment; Comparison; Logical; Arithmetic; Identity (is); Containment (in)*


    # Module 1- Practice Test 1 Total Time: 45 Minutes; Minimum Pass score is: 70%


    # Answers – Module 1, Practice Test 1


    | Module Questions | Answer & Explanation |

    | :--- | :--- |

    | M1Q1 | **Answer: 2.**<br>**Output Value of a is : False Value of b is : 1**<br>First
    2 lines assign values to variables a and b using the assignment operator.<br>Line
    3: There are 2 operators used,<br>Line 4: First one is python comparison operator
    ==. It compares values of a and b and returns a boolean result. In this case a
    == b evaluates to be False.<br>Hence value of False is assigned to a.<br>So the
    output of this program is :<br>**Value of a is : False Value of b is : 1** |

    | M1Q2 | **Answer: 5. m will get the value of 5.**<br>Since there is a conversion
    of the float to int explicitly for m, m = int(i/2) = int(5.5) = 5.<br>For others,
    j,k,l all will be evaluated as float and will get a value of 5.5 |

    | M1Q3 | **Answer: 1, 3.**<br>**Statement 3 & Statement 4 will give errors. Arithmetic
    operators like multiplication, division is not allowed when using strings.**<br>However,
    Statement 1, Statement 2 are correct. the output for those will be : s1=ab and
    s2 = ac Since string addition is an allowed operation. |

    | M1Q4 | **Answer: 3. 6**<br>Length of the string without spaces is 5.<br>len(s1.rstrip()
    ) length = 8 means length of the string with spaces on left is 8. ( Right spaces
    are trimmed here )<br>**Hence number of spaces on the left is 8-5 = 3.**<br>Now
    len(s1.lstrip() ) = 8 which means all the left spaces are trimmed and length of
    the string including the right spaces is 8.<br>**Hence the number of spaces on
    the right is 8-5 = 3.**<br>**So the total number of spaces is : Spaces on left
    + spaces on right = 3+ 3 = 6** |

    | M1Q5 | **Answer: 3,4**<br>v is true since it has one array element in it and
    the value of the element is false. So count of v is non zero hence **v is true**<br>Same
    with x, x has one element and hence of count is non zero and **x is true**<br>z
    has a space element in it. count of z is also one making **z as true** as well<br>y
    on the other hand is an empty string so bool of an empty string will result in
    false. So y is false. |

    | M1Q6 | **Answer: 4**<br>First two lines assign values to variables a and b using
    the assignment operator.<br>Line 3: There are 2 operators used,<br>First one is
    python **comparison operator ==** . It compares values of a and b and returns
    a boolean result. In this case a == b evaluates to be **False** .<br>**Hence value
    of False is assigned to a.**<br>So the output of this program is :<br>**Value
    of a is : False Value of b is : 1** |

    | M1Q7 | **Answer: 1,2,3,4**<br>**print (s1[1:2] )** In this statement the string
    from index 1 is picked which is the **second position** of the string. S1[1] =
    ''e''<br>**print ( s1[1:-3] )** In this statement, the index is counted from the
    right most and **the character next to the character 3 positions** from right
    is picked which is ''e''<br>print ( s1[1] ) **character at position 1** is picked
    which is again ''e''<br>print ( s1[-4]). In this, the **4th character** from the
    right is picked which is also ''e'' |

    | M1Q8 | **Answer: 1, 2**<br>k-= q = 6 + 2j - 6 - 2j = 0.0 + 0.0j. Both real and
    imaginary parts are zero.<br>k = k - (-q) = 6 +2j - ( 6 + 2j ) = 0.0 + 0.0j both
    real and imaginary parts are zero.<br>For the other 2 equations the value of K
    is non zero for both real and imaginary parts.<br>k = 12 + 4j ( for k -=q )<br>k
    = 24 + 8j ( for k = k - q - q ) |

    | M1Q9 | **Answer: 4**<br>S1[:n] when n=5 will assign all characters from the
    5th position to the left of the string<br>**So a = “Hello”**<br>b will be all
    characters from 5th position to the right of the string.<br>**So b = “ Welcome
    Good bye”**<br>When you add a and b both will give the original string.<br>**Hence
    a+b = s1. So the if condition will become true and assign value 200 to amount.**<br>**Hence
    amount = 200 will be printed.** |

    | M1Q10 | **Answer: 4**<br>Like regular data types, complex data types obey arithmetic
    operations. In the above example The real parts will get arithmetically computed
    and the imaginary part will get arithmetically separately.<br>k = k - q will equate
    to ( 6 + 2j ) - ( -9 + 2j ) = ( 6 + 9 ) + ( 2j - 2j ) = 15 + 0j<br>**Real part
    is 15.0 and the imaginary part is : 0.0** |

    | M1Q11 | **Answer: 1**<br>Summer Season will be printed since **a is non zero
    value** and the if condition will be evaluated to be **true** for **a = -1**.
    |

    | M1Q12 | **Answer: 2.**<br>**Python variables are case sensitive** . Hence in
    this example while the name of the variable is the same count , they are treated
    as different as each one has a different case.<br>So the assignment for **count
    = 33** and only that value will be printed. |

    | M1Q13 | **Answer: 3**<br>Both the comparison operator and boolean data type
    will give **the same output of False, False** |

    | M1Q14 | **Answer: 2**<br>**count_me_in = 20 is a correctly assigned variable
    as it follows the naming convention for variables.**<br>However 2go starts with
    a number hence it will error.<br>"count me" is a string literal and cant be used
    as a variable. |'
