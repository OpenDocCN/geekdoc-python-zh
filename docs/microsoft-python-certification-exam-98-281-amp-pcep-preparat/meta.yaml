    -   本指南假定读者具备一定的编程知识。它不是一本初学者教材。


    **先决条件：**


    -   具备使用 Python 的基本编程语言技能，并有实践经验


    **微软认证考试详情：**


    -   总题数：40

    -   总时长：45 分钟

    -   Python 认证：98-381 使用 Python 进行编程入门

    -   最低及格分数：70%


    **有用链接：**


    -   **详情链接**：[https://www.microsoft.com/en-us/learning/exam-98-381.aspx](https://www.microsoft.com/en-us/learning/exam-98-381.aspx)

    -   **大纲链接**：[https://www.microsoft.com/en-us/learning/course.aspx?cid=55264](https://www.microsoft.com/en-us/learning/course.aspx?cid=55264)


    **关于本考试指南**

    本指南包含四个独立模块和练习测试，以及两个完整的最终模拟测试。这 6 个模块如下：


