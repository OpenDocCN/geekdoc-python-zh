  md: "# Looping Statements (for, while)\n\nLoops are one of my favorite tools in\
    \ Python. They let you repeat a block of code multiple times without writing the\
    \ same lines over and over.\n\n# For Loop\n\nThe `for` loop is perfect when you\
    \ know how many times you want to repeat something.\n\n```\npython\nExample: Printing\
    \ numbers from 1 to 5\nfor i in range(1, 6):\n    print(i)\n```\n\nHow I Think\
    \ About It:\n\n+   - `range(1, 6)` generates numbers from 1 to 5 (the second number\
    \ is exclusive).\n- The loop runs once for each number in the range.\n\n# While\
    \ Loop\n\nThe `while` loop is great when you want to keep repeating something\
    \ until a condition is met.\n\n```\npython\nExample: Counting down from 5 to 1\n\
    count = 5\nwhile count > 0:\n    print(count)\n    count -= 1  # Decrease count\
