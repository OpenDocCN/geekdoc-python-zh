    ```


    Now, we are preparing the data for the RNN. We create two lists, X and Y. X will
    store the input sequences, and y will store the target characters that follow
    those sequences. For example, if our text is "hello", X would contain ''h'', ''e'',
    ''l'', ''l'', and y would contain ''e'', ''l'', ''l'', ''o''. We then reshape
    X to be a 3D array, which is the expected input format for an LSTM layer3. We
    also normalize X by dividing it by the number of unique characters. This helps
    the network learn faster. Finally, we convert y to a NumPy array1.


    ```

    python

    # Build model

    model = Sequential()

    model.add(LSTM(50, input_shape=(X.shape[1], X.shape[2])))

    model.add(Dense(len(chars), activation="softmax"))

    model.compile(loss="sparse_categorical_crossentropy", optimizer="adam")

    ```


    Here, we build the RNN model. We start with a Sequential model, meaning we''re
    adding layers one after another. The first layer is an LSTM layer with 50 units
    and an input shape that matches our prepared data3. The second layer is a Dense
    layer with several units equal to the number of unique characters, and a "softmax"
    activation function3. Softmax makes the output a probability distribution, telling
    us how likely each character is to be the next one. We then compile the model,
    specifying the loss function as "sparse_categorical_crossentropy" (suitable for'
