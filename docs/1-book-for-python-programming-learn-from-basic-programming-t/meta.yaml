  md: '# Stacks: Last In, First Out


    A stack is a data structure that follows the Last-In-First-Out (LIFO) principle.
    Imagine a stack of plates at a buffet. The last plate you put on top is the first
    one you take off when you''re ready to eat.


    ```

    python

    # Example: Implementing a stack using a list

    stack = []

    stack.append(10)  # Push

    stack.append(20)

    print(stack.pop())  # Pop (Output: 20)

    ```


    # How I Think About It:


    +   - append() is how I "push" a new element onto the top of the stack.

    - pop() is how I "pop" the top element off the stack. The beauty is that pop()
    also *returns* the element, so I can use it immediately.


    Stacks are super useful for things like function call management (how your computer
    remembers where to return to after a function call) and expression evaluation.


