- md: "## Stacks: Last In, First Out\n\nA stack is a data structure that follows the\
    \ Last-In-First-Out (LIFO) principle. Imagine a stack of plates at a buffet. The\
    \ last plate you put on top is the first one you take off when you're ready to\
    \ eat.\n\n```python\n# Example: Implementing a stack using a list\nstack = []\n\
    stack.append(10)  # Push\nstack.append(20)\nprint(stack.pop())  # Pop (Output:\
    \ 20)\n```\n\n### How I Think About It:\n\n- `append()` is how I \"push\" a new\
    \ element onto the top of the stack.\n- `pop()` is how I \"pop\" the top element\
    \ off the stack. The beauty is that `pop()` also *returns* the element, so I can\
    \ use it immediately.\n\nStacks are super useful for things like function call\
    \ management (how your computer remembers where to return to after a function\
    \ call) and expression evaluation.\n\n## Queues: First In, First Out\n\nA queue\
    \ is the opposite of a stack. It follows the First-In-First-Out (FIFO) principle.\
    \ Think of it like a line at a movie theater - the first person in line is the\
    \ first one to buy a ticket and enter the theater.\n\n```python\n# Example: Implementing\
    \ a queue using a list\nfrom collections import deque\n\nqueue = deque()\nqueue.append(10)\
    \  # Enqueue\nqueue.append(20)\nprint(queue.popleft())  # Dequeue (Output: 10)\n\
    ```\n\n### How I Think About It:\n\n- `append()` still adds elements to the end,\
    \ which in this case is the back of the queue.\n- `popleft()` is the key - it\
    \ removes and returns the element from the front of the queue, maintaining the\
    \ FIFO order.\n\nQueues are essential for managing tasks in order, such as processing\
    \ print jobs, handling network requests, or simulating real-world queuing systems.\n\
    \n## Linked Lists: Chains of Nodes\n\nA linked list is a sequence of elements\
    \ (called nodes) where each element points to the next one in the sequence. It's\
    \ like a treasure hunt where each clue leads you to the next location.\n\n```python\n\
    # Example: Implementing a simple linked list\nclass Node:\n    def __init__(self,\
    \ data):\n        self.data = data\n        self.next = None\n\n# Creating nodes\n\
    node1 = Node(10)\nnode2 = Node(20)\nnode1.next = node2\n\nprint(node1.data)  #\
    \ Output: 10\nprint(node1.next.data)  # Output: 20\n```\n\n### How I Think About\
    \ It:\n\n- Each `Node` object contains two things: `data` (the actual value stored\
    \ in the node) and `next` (a reference to the next node in the list, or `None`\
    \ if it's the last node).\n- The `next` reference is what links the nodes together,\
    \ forming the chain.\n\nLinked lists are good when you need to insert or delete\
    \ elements in the middle of a list frequently, because you don't have to shift\
    \ a bunch of elements around in memory like you do with arrays.\n\n## Searching\
    \ Algorithms\n\nSearching algorithms are how we find specific items within a collection\
    \ of data.\n\n### Linear Search: The Simple Approach\n\nLinear search is the most\
    \ basic search algorithm. It simply checks each element in the list one by one\
    \ until it finds the target value. It's like searching for a book on a shelf by\
    \ looking at each book individually.\n\n```python\n# Example: Linear search\n\
    def linear_search(arr, target):\n    for i in range(len(arr)):\n        if arr[i]\
    \ == target:\n            return i  # Return the index if found\n    return -1\
    \  # Return -1 if not found\n\nnumbers = [10, 20, 30, 40, 50]\nprint(linear_search(numbers,\
    \ 30))  # Output: 2\n```\n\n### How I Think About It:\n\n- It's straightforward\
    \ to implement and understand.\n- However, it's not efficient for large lists\
    \ because it has to check every element in the worst case.\n\n### Binary Search:\
    \ Divide and Conquer\n\nBinary search is a much more efficient algorithm, but\
    \ it only works on *sorted* lists. It repeatedly divides the search interval in\
    \ half. It's like looking up a word in a dictionary – you don't start at the beginning;\
    \ you open the dictionary in the middle and see if the word comes before or after\
    \ that page.\n\n```python\n# Example: Binary search\ndef binary_search(arr, target):\n\
    \    low, high = 0, len(arr) - 1\n    while low <= high:\n        mid = (low +\
    \ high) // 2\n        if arr[mid] == target:\n            return mid  # Return\
    \ the index if found\n        elif arr[mid] < target:\n            low = mid +\
    \ 1  # Search in the right half\n        else:\n            high = mid - 1  #\
    \ Search in the left half\n    return -1  # Return -1 if not found\n\nnumbers\
    \ = [10, 20, 30, 40, 50]\nprint(binary_search(numbers, 40))  # Output: 3\n```\n\
    \n### How I Think About It:\n\n- Binary search is incredibly fast because it eliminates\
    \ half of the search space with each comparison.\n- However, it *requires* the\
    \ list to be sorted beforehand.\n\n## Sorting Algorithms\n\nSorting algorithms\
    \ are used to arrange elements in a list in a specific order (e.g., ascending\
    \ or descending).\n\n### Insertion Sort: Step-by-Step Building\n\nInsertion sort\
    \ builds the final sorted list one item at a time. It's like sorting a deck of\
    \ cards in your hand – you pick up each card and insert it into the correct position\
    \ in the already sorted portion of your hand.\n\n```python\n# Example: Insertion\
    \ sort\ndef insertion_sort(arr):\n    for i in range(1, len(arr)):\n        key\
    \ = arr[i]  # The element to be inserted\n        j = i - 1\n        while j >=\
    \ 0 and key < arr[j]:\n            arr[j + 1] = arr[j]  # Shift elements to the\
    \ right\n            j -= 1\n        arr[j + 1] = key  # Insert the key in the\
    \ correct position\n    return arr\n\nnumbers = [50, 30, 20, 40, 10]\nprint(insertion_sort(numbers))\
    \  # Output: [10, 20, 30, 40, 50]\n```\n\n### How I Think About It:\n\n- Insertion\
    \ sort is simple to implement and efficient for small lists or nearly sorted lists.\n\
    - However, it becomes inefficient for large lists because it has a quadratic time\
    \ complexity (O(n^2)).\n\n### Quick Sort: Divide and Conquer (Again!)\n\nQuick\
    \ sort is a divide-and-conquer algorithm that's generally much faster than insertion\
    \ sort for large datasets. It works by selecting a \"pivot\" element and partitioning\
    \ the list into two sub-lists: elements less than the pivot and elements greater\
    \ than the pivot. Then, it recursively sorts the sub-lists.\n\n```python\n# Example:\
    \ Quick sort\ndef quick_sort(arr):\n    if len(arr) <= 1:\n        return arr\
    \  # Base case: already sorted\n    pivot = arr[len(arr) // 2]  # Choose a pivot\
    \ (middle element)\n    left = [x for x in arr if x < pivot]  # Elements less\
    \ than pivot\n    middle = [x for x in arr if x == pivot]  # Elements equal to\
    \ pivot\n    right = [x for x in arr if x > pivot]  # Elements greater than pivot\n\
    \    return quick_sort(left) + middle + quick_sort(right)  # Recursive calls\n\
    \nnumbers = [50, 30, 20, 40, 10]\nprint(quick_sort(numbers))  # Output: [10, 20,\
    \ 30, 40, 50]\n```\n\n### How I Think About It:\n\n- Quick sort is generally very\
    \ fast due to its divide-and-conquer approach.\n- However, it can be a bit more\
    \ complex to understand and implement compared to simpler sorting algorithms.\n\
