    专业程序员 Minhaj Abdullah 著\n\n# #1 Python编程书籍\n\n![](img/a7b50661074f3e4629e9e5326d5109c6_1_0.png)\n\
    \n专业程序员 Minhaj Abdullah 著\n\n# #1 Python编程书籍\n\n从基础编程到人工智能与自动化\n\nMinhaj Abdullah\
