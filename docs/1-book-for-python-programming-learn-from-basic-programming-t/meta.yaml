    - `\"r\"` 代表读取模式。\n\n#### 写入文件\n\n```python\n# 示例：写入文件\nwith open(\"output.txt\"\
    , \"w\") as file:\n    file.write(\"Hello, Python!\")\n```\n\n我的理解方式：\n\n- `\"\
    w\"` 代表写入模式。小心——如果文件已存在，它会覆盖该文件！\n\n### 任务练习：\n\n1. 编写一个程序，要求用户输入一个数字并打印其倒数。如果用户输入0，则处理\
