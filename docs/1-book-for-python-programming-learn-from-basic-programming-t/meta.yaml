    \ we train the model using the fit method. We pass in our prepared data X and\
    \ y, specify the number of epochs (how many times the model sees the entire dataset)\
    \ as 100, and set verbose=2 to get detailed output during training.\n\n```\npython\n\
    # Generate text\nstart = np.random.randint(0, len(X) - 1)\npattern = X[start]\n\
    output = \"\"\nfor i in range(10):\n    prediction = model.predict(pattern, verbose=0)\n\
    \    index = np.argmax(prediction)\n    output += chars[index]\n    pattern =\
    \ np.append(pattern, index)\n    pattern = pattern[1:]\n    pattern = np.reshape(pattern,\
    \ (1, 1, 1))\n\nprint(output)\n```\n\nFinally, we generate some text. We start\
    \ by randomly picking a character from our input sequences. Then, we loop 10 times.\
    \ In each iteration, we use the model to predict the next character, find the\
    \ character with the highest probability, append it to our output, and update\
    \ the pattern for the next iteration. We then print the generated text."
