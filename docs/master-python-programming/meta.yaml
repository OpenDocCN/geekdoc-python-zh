    \ America', 'Hulk'])\n>>> type(hero_name)\n<class 'set'>\n>>>\n```\n\n我在 set 函数中传递了一个列表。一旦集合创建完成，你可以使用\
    \ type 命令检查数据类型。我也创建了列表以区分两者。\n\n```\n>>>\n>>> hero_name = ('IronMan', 'Captain\
    \ America', 'Hulk')\n>>> type(hero_name)\n<class 'tuple'>\n>>> hero_name = set(('IronMan',\
    \ 'Captain America', 'Hulk'))\n>>> type(hero_name)\n<class 'set'>\n>>>\n```\n\n\
    这次我从元组列表创建了另一个集合。列表和元组都是不可变的。让我们也检查一下字符串。\n\n```\n>>>\n>>> hero_name = 'IronMan,\
    \ Captain America, Hulk'\n>>> type(hero_name)\n<class 'str'>\n>>> hero_name =\
    \ set('IronMan, Captain America, Hulk')\n>>> type(hero_name)\n<class 'set'>\n\
    >>>\n```\n\n好的。创建集合后，让我们检查集合的输出。\n\n```\n>>>\n>>> rich_avenger = 'Tony aka Iron\
    \ Man'\n>>> set(rich_avenger)\n{'I', ' ', 'T', 'a', 'n', 'o', 'y', 'r', 'M', 'k'}\n\
    >>>\n```\n\n集合的输出类似于列表。与列表本身进行比较可以更好。\n\n```\n>>>\n>>> list(rich_avenger)\n['T',\
    \ 'o', 'n', 'y', ' ', 'a', 'k', 'a', ' ', 'I', 'r', 'o', 'n', ' ', 'M', 'a', 'n']\n\
    >>>\n```\n\n现在可以观察到区别。集合没有重复的元素，甚至空格也没有。元素是无序排列的。列表则有有序的重复元素集合。\n现在，让我们使用另一种方法创建集合：使用花括号。\n\
    \n```\n>>>\n>>> hero_name = {'IronMan', 'Captain America', 'Hulk'}\n>>> type(hero_name)\n\
    <class 'set'>\n>>>\n```\n\n简单地使用花括号而不写 set 命令会将给定的实体转换为集合。但是空的花括号呢？\n\n```\n>>>\n\
    >>> thanos_snap = {}\n>>> type(thanos_snap)\n<class 'dict'>\n>>>\n```\n\n现在这是需要记住的事情。空的花括号返回的是字典。描述空集合的唯一方法是使用\
    \ **set ()** 函数。\n\n```\n>>>\n>>> thanos_snap = set()\n>>> type(thanos_snap)\n\
    <class 'set'>\n>>>\n```\n\n## 集合上的操作\n\n集合的长度可以使用 **len ()** 函数计算。\n\n```\n>>>\n\
    >>> hero_name = {'IronMan', 'Captain America', 'Hulk'}\n>>> len(hero_name)\n3\n\
    >>>\n```\n\n成员运算符 **in** 和 **not in** 也适用于集合。\n\n```\n>>>\n>>> 'IronMan' in hero_name\n\
    True\n>>> 'Nebula' in hero_name\nFalse\n>>>\n```\n\n## 集合的并集\n\n两个集合可以使用 **union**\
    \ 函数或使用“|”符号连接在一起。让我们检查一下。\n\n```\n>>>\n>>> hero_name = {'IronMan', 'Captain America',\
    \ 'Hulk'}\n>>> non_hero_name = {'Tony', 'Steve', 'Bruce'}\n>>> hero_name | non_hero_name\n\
    {'Steve', 'Tony', 'IronMan', 'Captain America', 'Bruce', 'Hulk'}\n>>>\n>>> hero_name.union(non_hero_name)\n\
    {'Steve', 'Tony', 'IronMan', 'Captain America', 'Bruce', 'Hulk'}\n>>>\n```\n\n\
    很好。好的。还有一件事可以观察到。元素是无序排列的。这里，你可以执行的一个任务是检查当这两个集合有任何共同名称（比如 Nebula）时的最终集合。可能会想到一个问题：**union**\
    \ 和“ | ”是同一回事吗？（我知道这个问题从未出现在脑海中。但现在，它出现了）。现在这是一个需要讨论的重要话题。这个 **union** 是一个方法，而“\
