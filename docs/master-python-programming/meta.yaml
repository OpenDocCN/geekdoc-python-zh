- md: "## Function Arguments in Python\n\nThere are four types of arguments that Python\
    \ UDFs can take:\n\n- Default arguments\n- Required arguments\n- Keyword arguments\n\
    - Variable number of arguments\n\n## Default Arguments\n\nDefault arguments as\
    \ the name suggests are those that take a default value if no argument value is\
    \ passed during the function call. Default value is assigned by using the assignment\
    \ operator = **sign**.\n\n## Required Arguments\n\nRequired arguments as the name\
    \ suggests are those that have to be in there. These arguments need to be passed\
    \ during the function call and in precisely the right order.\n\n## Keyword Arguments\n\
    \nThese are used to call all the parameters in the right order. Keyword Arguments\
    \ are used to identify the arguments by their parameter name.\nNote that by using\
    \ the keyword arguments, you can also switch around the order of the parameters\
    \ and still get the same result when you execute your function:\n\n## Variable\
    \ Number of Arguments\n\nWhen the exact numbers of arguments that are to be pass\
    \ to a function are not known, then this function is written with *, example,\
    \ **\\*a or \\*b or any variable name**. You'll found the parameter name **\\\
    *args** most widely used. If you remember the tuple packing and unpacking section,\
    \ if we use *, we can assign any number of values to it. The same thing happens\
    \ here. The data type is also tuple type. Let's see how it's written.\n\n```python\n\
    def n_values(*a):\n    return a\nprint(n_values(1,2,3))\nprint(type(n_values()))\n\
    ```\n\n```\n(1, 2, 3)\n<class 'tuple'>\n```\n\nWithout this * **sign**, we could\
    \ have only passed one argument. Any argument written after * **sign**, has to\
    \ be passed with keyword or an error will occur.\n\n```python\ndef c_to_f(*, degree_celsius):\n\
    \    return 32 + degree_celsius * 9/5\n\nc_to_f(98)\n```\n\n```\nTypeError   \
    \                              Traceback (most recent call last)\n<ipython-input-14-2a6f133d09e9>\
    \ in <module>\n      2     return 32 + degree_celsius * 9/5\n      3 \n----> 4\
    \ c_to_f(98)\n\nTypeError: c_to_f() takes 0 positional arguments but 1 was given\n\
    ```\n\nThe error says that the function does not take any argument, but we have\
    \ passed one argument. This error can be removed by passing the argument with\
    \ a keyword.\n\n```python\ndef c_to_f(*, degree_celsius):\n    return 32 + degree_celsius\
    \ * 9/5\n\nc_to_f(degree_celsius = 98)\n```\n\n```\n208.4\n```\n\nAnother important\
    \ concept is using ** sign. This will create a dictionary for the assigned parameter.\
    \ A dictionary has a key: value pair, thus we have to pass our inputs in such\
    \ a manner while printing.\n\n```python\ndef n_values(**b):\n    return b\nprint(n_values(x=1,y=2,z=3))\n\
    print(type(n_values()))\n```\n\n```\n{'x': 1, 'y': 2, 'z': 3}\n<class 'dict'>\n\
    ```"
  mdcn: "## Python 中的函数参数\n\nPython 用户自定义函数可以接受四种类型的参数：\n\n- 默认参数\n- 必需参数\n- 关键字参数\n\
    - 可变数量参数\n\n## 默认参数\n\n顾名思义，**默认参数**是在函数调用时如果没有传递参数值，则采用默认值的参数。默认值通过赋值运算符 `=`\
    \ **符号**来指定。\n\n## 必需参数\n\n顾名思义，**必需参数**是必须存在的参数。这些参数需要在函数调用时传递，并且必须按照正确的顺序。\n\
