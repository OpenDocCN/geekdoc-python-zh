- md: "## Augmented Assignment Operators and Methods\n\nUnion, intersection, difference,\
    \ and symmetric difference operators mentioned above have an augmented assignment\
    \ form and they can be used to modify a set. There is a method for each augmented\
    \ assignment operator as well.\n\n**a.update(b)** or **a |= b** : This will add\
    \ those elements of **b** to **a**, which are not present in set **a**, and then\
    \ update the set **a**.\n\n**a.intersection_update(b)** or **a &= b [ &c... ]**\
    \ : This will retain only those elements of **b** and **a**, which are common\
    \ in both the sets and then update the set **a**.\n\n**a.difference_update(b)**\
    \ or **a -= b [ |c... ]** : This will remove those elements of **b** which are\
    \ common with **a**, and then update the set **a**.\n\n**a.symmetric_difference_update(b)**\
    \ or **a ^= b [ |c... ]** : This will retain those elements which are either present\
    \ in the set **a** or **b**, but not in both the sets, and then update the set\
    \ **a**.\n\n## Frozen Sets\n\nAs the name suggests, sets which are immutable or\
    \ cannot change are called frozen sets. To make a set frozen, the **frozenset**\
    \ command is used.\n\n```python\na = frozenset(['Tony', 'Bruce', 'Peter'])\nprint(a)\n\
    print(type(a))\n```\n\n```\nfrozenset({'Tony', 'Bruce', 'Peter'})\n<class 'frozenset'>\n\
    ```\n\nNon- modifying operations can be performed on frozensets but modifying\
    \ by methods fail. Let's see.\n\n```python\na.pop()\nprint(a)\n```\n\n```\n---------------------------------------------------------------------------\n\
    AttributeError                            Traceback (most recent call last)\n\
    <ipython-input-3-b9eb1135ac2e> in <module>()\n----> 1 a.pop()\n      2 print(a)\n\
    \nAttributeError: 'frozenset' object has no attribute 'pop'\n```\n\n```python\n\
    a.clear()\nprint(a)\n```\n\n```\n---------------------------------------------------------------------------\n\
    AttributeError                            Traceback (most recent call last)\n\
    <ipython-input-4-3ded6dc134e6> in <module>()\n----> 1 a.clear()\n      2 print(a)\n\
    \nAttributeError: 'frozenset' object has no attribute 'clear'\n```\n\n```python\n\
    a.add('Bruce')\nprint(a)\n```\n\n```\n---------------------------------------------------------------------------\n\
    AttributeError                            Traceback (most recent call last)\n\
    <ipython-input-5-0ef04b1d82f2> in <module>()\n----> 1 a.add('Bruce')\n      2\
    \ print(a)\n\nAttributeError: 'frozenset' object has no attribute 'add'\n```\n\
    \nClearly it can be observed that, frozenset has no attributes of pop, clear or\
    \ add.\nPython does not perform augmented operations either on frozen sets.\n\
    Instead of modifying the original set, it reassigns the set variable to a new\
    \ object.\n\n```python\na = frozenset(['Tony','Bruce','Peter'])\nprint(id(a))\n\
    b = {'Strange','Thor','Tony'}\na &= b  # a = a & b\nprint(a)\nprint(id(a))\n```\n\
    \n```\n3028025212\nfrozenset({'Tony'})\n3028099340\n```\n\nYou can see that when\
    \ we check the identity of set **a**, it's different.\nSet **a** is reassigned\
    \ and the original reference of **a** is now vanished.\nIf there are sets whose\
    \ elements are also sets, then they cannot be combined to make a new set, because\
    \ set elements must have to be immutable. If you try to make a set of sets whose\
    \ elements are also sets, an error will occur.\n\n```python\na = set(['Tony'])\n\
    b = set(['Steve'])\nc = set(['Bruce'])\nd = {a,b,c}\nprint(d)\n```\n\n```\n---------------------------------------------------------------------------\n\
    TypeError                                 Traceback (most recent call last)\n\
    <ipython-input-9-9ca52974a3a3> in <module>()\n      2 b = set(['Steve'])\n   \
    \   3 c = set(['Bruce'])\n----> 4 d = {a,b,c}\n      5 print(d)\n\nTypeError:\
    \ unhashable type: 'set'\n```\n\nBut still if you want to create a set of sets,\
    \ this can be achieved by a frozen set. A dictionary key is also immutable like\
    \ sets but sets can't be used as keys.\n\n```python\nreal_name = ({'Robert','Tony'})\n\
    hero_name = ({'Chris','Steve'})\navengers = {real_name:'Iron Man',hero_name:'Cap'}\n\
    print(avengers)\n```\n\n```\n---------------------------------------------------------------------------\n\
    TypeError                                 Traceback (most recent call last)\n\
    <ipython-input-15-6f32fd373b6c> in <module>()\n      1 real_name = ({'Robert','Tony'})\n\
    \      2 hero_name = ({'Chris','Steve'})\n----> 3 avengers = {real_name:'Iron\
    \ Man',hero_name:'Cap'}\n      4 print(avengers)\n\nTypeError: unhashable type:\
    \ 'set'\n```\n\nAgain, the frozen set is the savior.\n\n```python\nreal_name =\
    \ frozenset({'Robert','Tony'})\nhero_name = frozenset({'Chris','Steve'})\navengers\
    \ = {real_name:'Iron Man',hero_name:'Cap'}\nprint(avengers)\n```\n\n```\n{frozenset({'Robert',\
    \ 'Tony'}): 'Iron Man', frozenset({'Steve', 'Chris'}): 'Cap'}\n```\n\nThe final\
    \ topic will be making a Set Comprehension. It's very easy. Let's make a list\
    \ of integers and we will find the square of each digit in this list. Now sets\
    \ remove duplicates. I'll make a list of duplicate elements. Let me check if it\
    \ removes the duplicates as well as generate the square value. The statement is\
    \ exactly equal to the list, except that the brackets are curly brackets. We use\
    \ curly braces in dictionary comprehension also. But there we will have a key:value\
    \ pair as well.\n\n```python\nnum = [4,3,2,1,5,4,3,2,1,5]\nset_com = {n*n for\
    \ n in num}\nprint(set_com)\n```\n\n```\n{1, 4, 9, 16, 25}\n```\n\nThis is all\
    \ about sets.\n\n# Chapter 8\n\n# String\n\nPython string is a sequence of Unicode\
    \ characters. Python does not have a character data type. It has a built-in class\
    \ “str” to handle string operation. Even a single character is a string.\nHow\
    \ to create a string?\nStrings can be created when anything is written within\
    \ single, double or triple quotes. The type () command can be used to verify the\
    \ result. Let’s write some strings.\n\n```python\n>>> avengers = 'I am Iron Man'\n\
    >>> type(avengers)\n<class 'str'>\n>>> avengers = \"I am Iron Man\"\n>>> type(avengers)\n\
    <class 'str'>\n>>> avengers = '''I am Iron Man'''\n>>> type(avengers)\n<class\
    \ 'str'>\n```\n\nSo, we have a variable named as avengers and the string stored\
    \ in it is I am Iron Man. One can observe how single, double and triple quotes\
    \ have been used to write the string. Also, using the type () command we have\
    \ cross verified that the type is string. First thing first, why so many types\
    \ of quotes? Always remember that a pair of a particular type of quotes can be\
    \ enclosed within another pair of particular types of quotes. By pair I mean,\
    \ starting and ending quotes. But what’s the advantage?\n\n```python\n>>> iron_man\
    \ = \"I love you '3000'\"\n>>> print(iron_man)\nI love you '3000'\n```\n\nWhen\
    \ we have to print some specific portion or all of the string within quotes, then,\
    \ we can enclose one set of quoted string within another set of quotes and print\
    \ the result. Like in the above example, we want to print 3000 with quotes. This\
    \ can be done by using single quotes to write 3000, and, the entire string within\
    \ double quotes. If you want to print double quotes and single quotes as well,\
    \ then, everything can be enclosed within triple quotes.\n\n```python\n>>> iron_man\
    \ = '\"I love you '3000'\"'\n>>> print(iron_man)\n\"I love you '3000'\"\n```\n\
    \nCan we have a pair of different quotes? Say, single quote to start with and\
    \ double quote to end with.\n\n```python\n>>> iron_man = 'I love you 3000\"\n\
    SyntaxError: EOL while scanning string literal\n```\n\nSyntax error!!! I was thinking\
    \ that Python can do anything. Syntactically, Python also doesn't support wrong\
    \ English format. Triple quotes have one more important application. It is used\
    \ when multiple lines are needed in a string. It is also used to write multiple\
    \ line comments. (Remember # is used to write single line comments)\n\n```python\n\
    >>> iron_man = '''I\nam\nIron Man'''\n>>> print(iron_man)\nI\nam\nIron Man\n```\n\
    \nIsn't it similar to using a backslash? Try it. So, basically, these quotes save\
    \ us from using some delimiters (not always though, but yes, many times). So,\
    \ let's begin with some important string functions.\n\n## String Functions\n\n\
    **len ():** This function is used to give the length of the string (including\
    \ spaces, if any).\n\n```python\n>>> avengers = 'I am Iron Man'\n>>> len(avengers)\n\
    13\n```\n\n**isdigit ():** This function checks for the presence of any digit\
    \ present in the string. If the string has all digits, then, it returns a True\
    \ value.\n\n```python\n>>> my_str = '786'\n>>> my_str.isdigit()\nTrue\n```\n\n\
    What if the string is alphanumeric?\n\n```python\n>>> iron_man = 'I love you 3000'\n\
    >>> iron_man.isdigit()\nFalse\n```\n\nSo, it will return true only when the entire\
    \ string is a digit sequence.\n\n**isalnum ():** This function checks for the\
    \ presence of alphanumeric characters present in the string.\n\n```python\n>>>\
    \ iron_man = 'I love you 3000'\n>>> iron_man.isalnum()\nFalse\n>>>\n```"
  mdcn: "## 增强赋值运算符与方法\n\n上文提到的并集、交集、差集和对称差集运算符都有增强赋值形式，可用于修改集合。每种增强赋值运算符也对应一个方法。\n\
    \n**a.update(b)** 或 **a |= b**：此操作会将集合 **b** 中那些不在集合 **a** 中的元素添加到 **a** 中，然后更新集合\
    \ **a**。\n\n**a.intersection_update(b)** 或 **a &= b [ &c... ]**：此操作会保留集合 **b**\
    \ 和 **a** 中共有的元素，然后更新集合 **a**。\n\n**a.difference_update(b)** 或 **a -= b [ |c...\
    \ ]**：此操作会移除集合 **b** 中与 **a** 共有的元素，然后更新集合 **a**。\n\n**a.symmetric_difference_update(b)**\
    \ 或 **a ^= b [ |c... ]**：此操作会保留那些仅存在于集合 **a** 或 **b** 中，但不同时存在于两个集合中的元素，然后更新集合\
    \ **a**。\n\n## 冻结集合\n\n顾名思义，不可变或无法更改的集合称为冻结集合。要创建一个冻结集合，需使用 **frozenset** 命令。\n\
    \n```python\na = frozenset(['Tony', 'Bruce', 'Peter'])\nprint(a)\nprint(type(a))\n\
    ```\n\n```\nfrozenset({'Tony', 'Bruce', 'Peter'})\n<class 'frozenset'>\n```\n\n\
    可以对冻结集合执行非修改操作，但通过方法进行修改会失败。让我们看看。\n\n```python\na.pop()\nprint(a)\n```\n\n```\n\
    ---------------------------------------------------------------------------\n\
    AttributeError                            Traceback (most recent call last)\n\
    <ipython-input-3-b9eb1135ac2e> in <module>()\n----> 1 a.pop()\n      2 print(a)\n\
    \nAttributeError: 'frozenset' object has no attribute 'pop'\n```\n\n```python\n\
    a.clear()\nprint(a)\n```\n\n```\n---------------------------------------------------------------------------\n\
    AttributeError                            Traceback (most recent call last)\n\
    <ipython-input-4-3ded6dc134e6> in <module>()\n----> 1 a.clear()\n      2 print(a)\n\
    \nAttributeError: 'frozenset' object has no attribute 'clear'\n```\n\n```python\n\
    a.add('Bruce')\nprint(a)\n```\n\n```\n---------------------------------------------------------------------------\n\
    AttributeError                            Traceback (most recent call last)\n\
    <ipython-input-5-0ef04b1d82f2> in <module>()\n----> 1 a.add('Bruce')\n      2\
    \ print(a)\n\nAttributeError: 'frozenset' object has no attribute 'add'\n```\n\
    \n显然可以观察到，冻结集合没有 pop、clear 或 add 属性。\nPython 也不会对冻结集合执行增强操作。\n它不会修改原始集合，而是将集合变量重新赋值给一个新对象。\n\
    \n```python\na = frozenset(['Tony','Bruce','Peter'])\nprint(id(a))\nb = {'Strange','Thor','Tony'}\n\
    a &= b  # a = a & b\nprint(a)\nprint(id(a))\n```\n\n```\n3028025212\nfrozenset({'Tony'})\n\
    3028099340\n```\n\n你可以看到，当我们检查集合 **a** 的标识时，它已经不同了。\n集合 **a** 被重新赋值，而 **a** 的原始引用现在已消失。\n\
    如果存在元素也是集合的集合，那么它们无法组合成一个新的集合，因为集合的元素必须是不可变的。如果你尝试创建一个元素也是集合的集合，将会发生错误。\n\n```python\n\
    a = set(['Tony'])\nb = set(['Steve'])\nc = set(['Bruce'])\nd = {a,b,c}\nprint(d)\n\
    ```\n\n```\n---------------------------------------------------------------------------\n\
    TypeError                                 Traceback (most recent call last)\n\
    <ipython-input-9-9ca52974a3a3> in <module>()\n      2 b = set(['Steve'])\n   \
    \   3 c = set(['Bruce'])\n----> 4 d = {a,b,c}\n      5 print(d)\n\nTypeError:\
    \ unhashable type: 'set'\n```\n\n但如果你仍然想创建一个集合的集合，这可以通过冻结集合来实现。字典的键也像集合一样是不可变的，但集合不能用作键。\n\
    \n```python\nreal_name = ({'Robert','Tony'})\nhero_name = ({'Chris','Steve'})\n\
    avengers = {real_name:'Iron Man',hero_name:'Cap'}\nprint(avengers)\n```\n\n```\n\
    ---------------------------------------------------------------------------\n\
