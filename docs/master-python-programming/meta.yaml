    # The while loop\n\nThe while loop syntax is:\n\n```\nwhile <expr>:\n    <statement(s)>\n\
    ```\n\n<statement(s)> refers to the body or block to be repeatedly executed. Like\
    \ we read in the **if- else conditional statement**, the indentation rule will\
    \ be followed here as well.\nThe control expression, <expr>, involves one (or\
    \ more) variable that is initialized prior to starting the loop and then modified\
    \ somewhere in the loop body. This <expr> evaluates as either True or False. The\
    \ loop executes again and again for as long as the <expr> is true. When the <expr>\
    \ becomes false, the execution of the first statement beyond the body loop takes\
    \ place. Let's code it down and understand the concept first.\n\n# WAP to print\
    \ all positive numbers below a given number?\nI have a number, say 5. I want to\
    \ print all positive numbers below 5, i.e., 4, 3, 2, 1, 0. What should I do? In\
    \ English, I could say that **while** my number 5 is **greater than zero**, I'll\
    \ decrement my number and print every time. When 5 becomes 4, print 4, 4 becomes\
    \ 3, print 3 and so on. For this, the print statement should be inside the loop.\
    \ Let's code it now.\n\n```\nn = int(input(\"Enter a number:\"))\nwhile n > 0:\n\
    \    n -= 1\n    print(n)\n```\n\n```\nEnter a number:5\n4\n3\n2\n1\n0\n```"
