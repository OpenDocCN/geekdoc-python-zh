    print(avengers)\n```\n\n```\n{frozenset({'Robert', 'Tony'}): 'Iron Man', frozenset({'Steve',\
    \ 'Chris'}): 'Cap'}\n```\n\n最后一个主题是创建集合推导式。这非常简单。让我们创建一个整数列表，然后找出列表中每个数字的平方。现在集合会移除重复项。我将创建一个包含重复元素的列表。让我检查一下它是否在移除重复项的同时生成平方值。该语句与列表推导式完全相同，只是括号是花括号。我们在字典推导式中也使用花括号。但那里我们还会有一个键:值对。\n\
