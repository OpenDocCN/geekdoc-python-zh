    # String Slicing


    Like lists, strings can also be sliced when there is a need of displaying a part
    or substring of the entire string. The syntax is similar to that of list slicing.
    The symbol used is '':''. The syntax is **[a:b]**, where **a** is the index position
    of the starting string and **b** is the ending position. The sliced portion will
    be from **a** to **b** but excluding **b**.


    ```

    infinity_war = ''obambe''

