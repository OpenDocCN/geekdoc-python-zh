    \ 1, 2, 3]\n>>> sorted(avengers.items())\n[(0, 'Nick'), (1, 'Tony'), (2, 'Steve'),\
    \ (3, 'Thor')]\n>>> sorted(avengers.items(), reverse = True)\n[(3, 'Thor'), (2,\
    \ 'Steve'), (1, 'Tony'), (0, 'Nick')]\n```\n\nThe function **sorted (dict.keys\
    \ ())** will sort the dictionary in increasing order of the key.\nThe function\
    \ **sorted dict.items ())** will sort the dictionary in increasing order of the\
    \ key- value pair. This **dict.items ()** can also be used to print a dictionary\
    \ line by line when used to iterate over the dictionary contents."
