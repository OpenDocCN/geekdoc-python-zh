    \ = 1\n    return None\nb = input('Enter the string:')\nprint(first_rep_element(b))\n\
    ```\n\n```\nEnter the string:ABBC\nB\n```\n\n## Chapter 10\n\n### Iterables and\
    \ Iterators\n\nSo we have learned about lists, and we also have seen the concept\
    \ of functions. Let's make a function which will print the squares of all elements\
    \ of the given list. What we have done earlier is take an empty list, check for\
