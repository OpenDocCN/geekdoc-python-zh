    ```


    Enter a string: 2fast2furious

    $fast$furious


    Moving on, we used ''+''. Does it have any name? **Yes**. It is known as **Quantifier**.
    Quantifiers simply specify the quantity of characters to match. This brings to
    our **Table 2**. Again, there is no need to memorize it. We will learn it eventually
    like \d and **sub**.


    # Table 2: Quantifiers


    | Quantifier | Description | Example | Sample match |

    | :--- | :--- | :--- | :--- |

    | + | one or more | \w+ | ABCDEF097 |

    | {2} | exactly 2 times | \d{2} | 01 |

    | {1,} | one or more times | \w{1,} | smiling |

    | {2,4} | 2, 3 or 4 times | \w{2,4} | 1234 |

    | * | 0 or more times | A*B | AAAAB |

    | ? | once or none | \d+? | 1 in 12345 |


    # Table 3: Sets


    A set is a set of characters inside a pair of square brackets [] with a special
    meaning:'
  merge: -1
  pgno: 283
- img_proc: true
  md: '| Sets | Description |

    | :--- | :--- |

    | [am] | Returns a match where one of the specified characters (a, r, or n) are
    present |

    | [a-n] | Returns a match for any lower case character, alphabetically between
    a and n |

    | [^am] | Returns a match for any character EXCEPT a, r, and n |

    | [0123] | Returns a match where any of the specified digits (0, 1, 2, or 3) are
    present |

    | [0-9] | Returns a match for any digit between 0 and 9 |

    | [0-5][0-9] | Returns a match for any two-digit numbers from 00 and 59 |

    | [a-zA-Z] | Returns a match for any character alphabetically between a and z,
    lower case OR upper case |

    | [+] | In sets, +, *, ., |, (), $, {} has no special meaning, so [+] means: return
    a match for any + character in the |


