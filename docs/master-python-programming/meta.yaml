  mdcn: "## Python 字符串函数\n\n**isalnum():** 此函数检查字符串中的所有字符是否都是字母数字（字母或数字）。如果字符串包含空格或特殊字符，则返回\
    \ False 值。\n\n```python\n>>> iron_man = 'I_love_you_3000'\n>>> iron_man.isalnum()\n\
    False\n\n>>> iron_man = 'Iloveyou3000'\n>>> iron_man.isalnum()\nTrue\n```\n\n\
    因此，可以观察到空格和特殊字符不起作用。只有字母和数字才会返回 True 值。\n\n**isalpha():** 此函数检查字符串中是否存在所有非数字字符。如果字符串全部由字符组成，则返回\
    \ True 值。\n\n```python\n>>> avengers = 'IamIronMan'\n>>> avengers.isalpha()\n\
    True\n```\n\n那么字母数字字符串呢？\n\n```python\n>>> iron_man.isalpha()\nFalse\n```\n\n\
    不行。字符串必须是纯字符序列。但是空格呢？我们能否有一个仅由字符组成但用空格分隔的序列？或者用逗号分隔？\n\n```python\n>>> avengers\
    \ = 'I am Iron Man'\n>>> avengers.isalpha()\nFalse\n>>> avengers = 'I,am,Iron,Man'\n\
    >>> avengers.isalpha()\nFalse\n```\n\n用空格或逗号分隔的字符字符串，使用 isalpha() 检查时都会返回 False\
    \ 值。\n\n**upper():** 此函数将字符串转换为大写。\n\n**lower():** 此函数将字符串转换为小写。\n\n```python\n\
    >>> avengers = 'Tony, steve, thor'\n>>> avengers.lower()\n'tony, steve, thor'\n\
    >>> avengers.upper()\n'TONY, STEVE, THOR'\n```\n\n**isspace():** 如果引号内全部是空格，则返回\
    \ True 值。\n\n```python\n>>> thanos_snap = ' '\n>>> thanos_snap.isspace()\nTrue\n\
    ```\n\n如果字符串是空的呢？\n\n```python\n>>> iron_man = ''\n>>> iron_man.isspace()\nFalse\n\
    ```\n\n好的！！字符串必须至少包含一个空格，isspace() 才会返回 True 值。然而，对于空白字符（空格也是一种空白字符），一些 ASCII\
    \ 字符如 \\f 和 \\r（分别是**换页符和回车符**）以及一些 Unicode 字符，此函数会返回 True 值。\n\n```python\n>>>\
    \ ' \\t\\n '.isspace()\nTrue\n>>> '\\t\\n'.isspace()\nTrue\n>>> '\\f'.isspace()\n\
    True\n>>> '\\u2005'.isspace()\nTrue\n```\n\n字符串有一些有趣的函数用于搜索内容。它们是 **startswith()、endswith()\
    \ 和 find() 函数。**\n\n**startswith():** 如果字符串以给定的参数开头，则返回 True 值。\n\n**endswith():**\
    \ 如果字符串以给定的参数结尾，则返回 True 值。\n\n```python\n>>> civil_war = 'Tony and Steve'\n>>>\
    \ civil_war.startswith('Tony')\nTrue\n>>> civil_war.endswith('Steve')\nTrue\n\
    ```\n\n**find():** 它搜索给定的子字符串，并在找到时返回该子字符串的索引位置。\n\n```python\n>>> iron_man =\
    \ 'I love you 3000'\n>>> iron_man.find('3000')\n11\n>>> iron_man.find('l')\n2\n\
    >>> iron_man.find('love')\n2\n```\n\n酷！！所以，它返回的是索引值，并且请记住空格不计入索引。\n\n**replace():**\
    \ 此函数用于将一个子字符串替换为另一个子字符串。因此，replace() 函数有两个参数，第一个是要被替换的子字符串，第二个是用于替换的子字符串。\n\n\
    ```python\n>>> avengers = 'Avengers Are Gone'\n>>> avengers.replace('Are Gone',\
    \ 'Assemble')\n'Avengers Assemble'\n```\n\n函数 **replace()** 将子字符串 Are Gone 替换为另一个子字符串\
    \ Assemble。\n\n**split():** 它从参数中给定的部分拆分字符串。\n\n```python\n>>> avengers.split('\
    \ ')\n['Avengers', 'Are', 'Gone']\n>>> avengers.split('.')\n['Avengers Are Gone']\n\
    ```\n\n我们拆分了上面 replace() 函数中使用的 avengers 变量。由于子字符串是用空格分隔的，用空格拆分它们将返回一个字符串列表作为结果。第二个输出表明，如果我们使用字符串中不存在的值来拆分字符串，那么它将原样返回整个字符串。\n\
    \n如果我们想使用上面显示的第二个命令来拆分字符串，字符串应该是什么样子？\n\n```python\n>>> avengers = 'Avengers.\
    \ Assemble.'\n>>> avengers.split('.')\n['Avengers', ' Assemble', '']\n```\n\n\
    因此，每当在字符串中遇到点时，就会从该部分进行拆分。\n\n**join():** 它将字符串与参数中给定的部分连接起来。\n\n```python\n>>>\
    \ iron_man = 'I Am IronMan'\n>>> '-'.join(iron_man)\n'I- -A-m- -I-r-o-n-M-a-n'\n\
    ```\n\n存储在变量 iron_man 中的字符串用 '-' 符号连接。\n\n**strip():** 如果字符串的开头和结尾有空格，那么 strip()\
    \ 函数将去除这些空格。\n\n```python\n>>> iron_man = ' I am IronMan '\n>>> iron_man.strip()\n\
    'I am IronMan'\n```\n\n如果你看到字符串前后有空格。函数 strip() 去除了整个字符串前后存在的空格。字符串内部的空格不受影响。\n\
    \n**swapcase():** 用于将字符串的大小写互换，大写变小写，小写变大写。\n\n**title():** 用于将字符串中每个单词的首字母大写。\n\
    \n**capitalize():** 仅用于将字符串中第一个单词的首字母大写。\n\n```python\n>>> GOTG = 'I am Groot'\n\
    >>> GOTG.swapcase()\n'i AM gROOT'\n>>> GOTG.title()\n'I Am Groot'\n>>> GOTG.capitalize()\n\
    'I am groot'\n```\n\n**ord():** 用于将字符转换为其 ASCII 或 Unicode 整数等效值。\n\n```python\n\
    >>> ord('Groot')\nTraceback (most recent call last):\n  File \"<pyshell#17>\"\
    , line 1, in <module>\n    ord('Groot')\nTypeError: ord() expected a character,\
    \ but string of length 5 found\n```\n\n一个错误。它说 ord() 期望一个字符，但发现了一个长度为 5 的字符串。这意味着\
    \ **ord() 函数**仅适用于单个字符。\n\n```python\n>>> ord('G')\n71\n```\n\n现在好了。抱歉，Groot。\n\
    \n我们也可以检查一些 Unicode 值。\n\n```python\n>>> ord('£')\n163\n```\n\n**chr():** 用于将整数转换为其\
    \ ASCII 或 Unicode 字符等效值。\n\n```python\n>>> chr(163)\n'£'\n>>> chr(71)\n'G'\n```\n\
    \n可以检查 chr() 是否像 ord() 一样仅支持单个字符。\n\n**isprintable():** 用于检查字符串是否仅由可打印字符组成。如果字符串为空或其包含的所有字符都是可打印的，则返回\
    \ True。转义序列是不可打印的。非字母字符被忽略。\n\n```python\n>>> 'iron_man'.isprintable()\nTrue\n\
    >>> 'I love you 3000'.isprintable()\nTrue\n>>> 'Steve\\tTony'.isprintable()\n\
    False\n>>> 'Hulk vs. Thanos'.isprintable()\nTrue\n>>> 'Steve\\nBucky'.isprintable()\n\
    False\n>>> ''.isprintable()\nTrue\n```\n\n.isprintable() 方法是唯一一个在字符串为空字符串时返回 True\
    \ 值的方法。\n\n## Python 字符串连接\n\n连接字面意思就是将事物连接在一起。第一种连接形式是简单地将字符串写在引号中。两个或多个用空格分隔的独立引号字符串在打印时会自动连接。\n\
    \n```python\navenger = 'Tony' 'Stark'\nprint(avenger)\n\nTony Stark\n```\n\n但请记住，这仅适用于字符串，不适用于任何数据类型的组合。我们不能使用此方法将整数与字符串连接。使用运算符的连接是通过\
    \ '+' 和 '*' 符号实现的。\n\n```python\n>>> iron_man = 'I am'\n>>> iron_man_2 = 'Iron\
    \ Man'\n>>> iron_man + iron_man_2\n'I amIron Man'\n```\n\n很好。两个字符串连接起来了。但你可以看到我们可以让它更具可读性。如果在写\
    \ Iron Man 之前在引号内加一个空格，也许我们可以达到想要的效果。让我们检查一下。\n\n```python\n>>> iron_man_2 = '\
    \ Iron Man'\n>>> iron_man + iron_man_2\n'I am Iron Man'\n```\n\n我们也可以使用 '*' 符号乘以字符串。但乘以字符串会是什么样子？\n\
    \n```python\n>>> my_data = '10'\n>>> my_data * 2\n'1010'\n```\n\n这是一个乘以连接的字符串。由于\
    \ 10 在引号内，它是字符串而不是数字。当它与另一个字符串相乘时，它被连接，结果是 1010 而不是 20。但这在我脑海中引发了一个问题。我们能将字符串与整数连接吗？\n\
    \n```python\n>>> 'IronMan' + 3\nTypeError: can only concatenate str (not \"int\"\
    ) to str\n```\n\n发生了一个错误。看最后一行，我们可以看到它显示了一个类型错误，这进一步表明字符串不能与整数连接。如果我们仍然想连接这两个，我们可以使用\
    \ **str** 命令将整数转换为字符串。\n\n```python\n>>> 'IronMan' + str(3)\n'IronMan3'\n```\n\
    \n稍后我们将看到，通过使用这两种连接符号，我们可以非常轻松地构建真正有意义的句子。\n\n## Python 字符串操作\n\n### 1. 身份运算符"
