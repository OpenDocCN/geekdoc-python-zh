  mdcn: "## 第11章\n\n### 生成器\n\n生成器函数是一种借助 **yield 函数** 返回生成器迭代器的函数。这意味着生成器会生成迭代器。简单来说，生成器在需要时才产生结果，而迭代器则一次性产生全部结果。在上一章中，我们学习了迭代器。要创建一个生成器，需要使用\
    \ **yield ()** 函数。让我们沿用之前对列表元素求平方的例子。但现在我们不需要追加或返回任何东西。我们只需要写一个 **yield**，后面跟上要执行的操作。这样可读性也更高。对于列表中的每个值，返回该值的平方。无需追加，无需返回，也无需将其存储在空列表中。\n\
    \n```python\ndef sq_num(my_list):\n    result = []\n    for i in my_list:\n  \
    \      yield (i*i)\n\na = [4,3,2,1]\nprint(sq_num(a))\n```\n\n```\n<generator\
    \ object sq_num at 0x05245C60>\n```\n\n如果我们观察这个输出，会发现它并不是一个平方数的列表。生成器不会将整个结果保存在内存中。它实际上还没有做任何事情。它在等待我们请求下一个结果。为此，我们使用\
    \ **next** 函数。所以，我会将我的函数和参数写在 **next** 函数内部并打印它。\n\n```python\ndef sq_num(my_list):\n\
    \    result = []\n    for i in my_list:\n        yield (i*i)\n\na = [4,3,2,1]\n\
    print(next(sq_num(a)))\n```\n\n```\n16\n```\n\n所以，它会打印下一个结果。那就是给定列表中第一个元素的平方值。它再次等待我们询问下一步该做什么。让我们打印接下来的值。\n\
    \n```python\ndef sq_num(my_list):\n    for i in my_list:\n        yield (i*i)\n\
    \na = sq_num([4,3,2,1])\nprint(next(a))\nprint(next(a))\nprint(next(a))\nprint(next(a))\n\
    ```\n\n```\n16\n9\n4\n1\n```\n\n好的。所有值都打印出来了。哦，对了，我们也不需要那个空列表了。如果我们仍然要求打印 **next**\
    \ 步骤会发生什么？\n\n```python\ndef sq_num(my_list):\n    for i in my_list:\n       \
