    The **id ()** is an inbuilt function in **Python**. It is used to return the **identity**
    of an object. This **identity** has to be unique and constant for this object
    during the lifetime. Two objects with non-overlapping lifetimes may have the same
    **id ()** value. It is similar to the memory allocation in C programming.


    ## What does this word lifetime mean?


    As earlier mentioned, when an object is assigned to a variable, that object is
    referred to by its name. But the data itself is still contained within the object.
    For example, when we write **a = 100**, this assignment creates an integer object
    with the value 100 and assigns the variable **a** to point to that object.


    ![](img/967252070c1bdd582017a9d325617e34_40_0.png)


    When this variable is assigned to another variable, like **a = b**, another object
    is not created but instead a new variable or reference is created pointing towards
    the same object.


    ![](img/967252070c1bdd582017a9d325617e34_41_0.png)


    When the same object is assigned to another variable but writing like this: **b
    = 100**. Then, another reference pointing to another object is created.


    ![](img/967252070c1bdd582017a9d325617e34_41_1.png)


    But when this variable **a** is assigned with some another object, **a = 101**
    then it looks like this,


    ![](img/967252070c1bdd582017a9d325617e34_41_2.png)


    There is now no reference for object 100 and no way to access it. This is technically
    called an Orphaned object. An object is alive, as long as there is at least one
    reference to it. When the reference is zero, the accessibility becomes zero. This
    time period is called the lifetime of any object. Python notices that it is inaccessible
    and reclaim that allocated memory so it can be used for something else. In computer
    language, this is referred to as garbage collection.


    In Python, every object when created is given a number that uniquely identifies
    it. It has to be ensured that no two objects will have the same identifier during
    any period in which their lifetimes overlap. But when it fails, as you just observed,
    you may end up with undesired results. But it’s not your fault. Thankfully, interpreters
    are intelligent enough. So, if you feel that your code is correct but it’s behaving
    differently, like in the above example, check its identity.


    ## Operator Precedence


    By operator precedence it means which operator should be evaluated first. When
    two operators share an operand, the operator with the higher *precedence* will
    operate first. Python follows the standard precedence rule of **PEMDAS** (Parenthesis-
    Exponents- Multiplication- Division- Addition- Subtraction), with **Parenthesis**
    having the highest and **Subtraction** having the lowest priority. The priority
    table is as follows:


    | Operator | Operation |

    | :--- | :--- |

    | ** | **Exponent** |

    | ~, +, - | Negation, Unary plus and minus |

    | *, /, %, // | Multiply, divide, modulus, floor division |

    | +, - | Binary plus and minus |

    | >>, << | Left shift and Right shift |

    | & | Binary AND |

    | ^, \| | Binary XOR, OR |

    | <=, <, >, >= | Comparison operators |

    | <, >, ==, != | Equality operators |

    | =, %=, /=, //=, -=, +=, *=, **= | Assignment operators and Augmented assignment
    operators |

    | is, is not | Identity operators |

    | in, not in | Membership operators |

    | not, or, and | Logical operators |


    But what if, when two operators share an operand and the operators have the same
    precedence? For example, how **a ** b ** c** should be evaluated? (**a ** b) **
    c** or **a ** (b ** c)**?


    ```

    print(''Without Parenthesis:'', 2**5**2)

    ```


    Without Parenthesis: 33554432


    ```

    print(''With Parenthesis:'', (2**5)**2)

    ```


    With Parenthesis: 1024


    This is called the Operator’s Associativity. The order of the evaluation is usually
    from the left to right in function arguments. Assignment and Comparison operators
    are non- associative.


    Python also uses *short circuiting* when it evaluates expressions involving the
    **and** or **or** operators. When these operators are involved, Python does not
    evaluate the second operand unless it is necessary to resolve the result.


    Sometimes, operator’s precedence doesn’t follow the standard mathematical norms.
    In mathematics, -1^2 will evaluate the result as 1. It is evaluated as (-1) ^2,
    and not as - (1^2). This rule agrees with mathematical conventions for all C operators
    (where unary operators have higher priority than binary operators), but fails
    with the addition of the exponentiation operator. Geek’s term it has “Design Choice”.
    Nothing to worry about!! Practice makes Programmers perfect.


    ## Escape Sequences in Python


    In Python strings, the backslash \ is a special character, also called the escape
    character. It is used in representing certain whitespace characters: \t is a tab,
    \n is a newline, and \r is a carriage return. Conversely, prefixing a special
    character with \ turns it into an ordinary character.

    When an ‘r’ or ‘R’ prefix is present, a character following a backslash is included
    in the string without change, and all backslashes are left in the string. We will
    use these in strings later, but here, we will have some overview of how they work.
    The valid escape characters in Python are,


    | Operator | Operation |

    | :--- | :--- |

    | \'' | **Single quote for character literals** |

    | \" | **Double quote for string literals** |

    | \\ | **Backslash for string literals** |

    | \0 | **Unicode character 0** |

    | \a | **Alert** |

    | \b | **Backspace** |

    | \f | **Form feed** |

    | \n | **Newline** |

    | \r | **Carriage return** |

    | \t | **Horizontal tab** |

    | \v | **Vertical tab** |

