    print(gotg_avengers)

    ```


    ```

    [''rocket'', '''', ''racoon'']

    ```


    Consecutive line boundary characters are returned as empty strings as shown above.
    You can see that output is a list. If the parameter is passed as True or 1, then
    line boundaries are intact in the output list as well.


