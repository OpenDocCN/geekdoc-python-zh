    \n```\n>>> iron_man = iron_man[:2] + ('Robert Downey Jr.',)\n>>> iron_man\n('Tony\
    \ Stark', 2009, 'Robert Downey Jr.')\n```\n\nNow it’s working correctly. So, is\
