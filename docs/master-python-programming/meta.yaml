    # ## Loops


    When there is a need to execute the same block of code over and over again, the
    process is called iteration and this iteration is implemented by a programming
    structure called Loop. Loops are used to alter the flow of any program, whose
    execution flow is sequential by default. In many cases, it is desirable to repeat
    any code a number of times. For this, Python provides different types of loops
    which are capable of repeating any code several numbers of times as desired.


    # ### Advantages of loops


    +   - Code reusability.

    - No need to write the same code again and again.

    - Can traverse over the elements of data structures.


    # ### Types of loops


    Broadly classified, there are two types of iteration, indefinite and definite:


    +   - With **indefinite iteration**, the number of times the loop is executed
    isn''t specified in advance. The designated block is executed repeatedly as long
    as the given condition is met. The **while loop** is used when we don''t know
    the number of iterations in advance. The block of statements is executed until
    the condition specified in the while loop is satisfied. It is also called a pre-tested
    loop.

    - In **definite iteration**, the number of times the loop is executed isn''t specified
    in advance. The **for loop** is used when we need to execute some part of the
    code until the given condition is satisfied. The **for loop** is also called a
    pre-tested loop. It is'
