    \      4 endgame()\n\nRecursionError: maximum recursion depth exceeded in comparison\n\
    ```\n\n递归错误，它表明存在某个最大递归深度。是否有默认值？为此，递归提供了一个名为 **.getrecursionlimit()** 的方法。我们需要导入一个名为\
    \ **sys** 的模块。让我们看看如何使用它，以及如果存在默认值，会生成什么值。\n\n```python\nimport sys\nprint(sys.getrecursionlimit())\n\
    \ndef endgame():\n    print(\"Avengers Assemble\")\n    endgame()\nendgame()\n\
    ```\n\n```\n3000\nAvengers Assemble\nAvengers Assemble\nAvengers Assemble\n```\n\
    \n看输出的第一行。它显示的值是 3000。这可能是我们的默认值。我们也可以使用另一个名为 **setrecursionlimit()** 的方法来设置这个限制。我们可以传递一个值，表示我们希望函数调用自身的次数上限。\n\
    \n```python\nimport sys\n\nsys.setrecursionlimit(2000)\nprint(sys.getrecursionlimit())\n\
    \ni = 0\ndef endgame():\n    global i\n    i += 1\n    print(\"Avengers Assemble\"\
    , i)\n    endgame()\nendgame()\n```\n\n```\n2000\nAvengers Assemble 1\nAvengers\
    \ Assemble 2\nAvengers Assemble 3\n```\n\n现在值是设置的 2000。我还使用了一个全局变量 **i** 来记录生成的输出编号。所以，基本上，递归是一个期望的条件，如果意外进入无限循环条件，已经设置了一个默认值来避免我们的程序崩溃或系统挂起。\n\
    \n现在让我们来看一个已解决的练习题。\n\n### 编写程序查找字符串中第一个重复的元素？\n\n这是一个简单的任务。我需要检查是否存在一个字符串，比如\
    \ ABBA，这意味着 B 是第一个重复出现的元素。如果是 ABCAC，那么应该是 A。我们将使用字典。首先，我们将创建一个字典，然后；我们将检查元素是否在字符串中并且也存在于字典中，然后打印该元素的计数。如果它只存在于字符串中，那么打印\
    \ 1。让我们编写代码：\n\n```python\ndef first_rep_element(a):\n    my_dict = {}\n    for\
    \ char in a:\n        if char in my_dict:\n            return char\n        my_dict[char]\
    \ = 1\n    return None\nb = input('Enter the string:')\nprint(first_rep_element(b))\n\
    ```\n\n```\nEnter the string:ABBC\nB\n```\n\n## 第 10 章\n\n### 可迭代对象与迭代器\n\n我们已经学习了列表，也了解了函数的概念。让我们创建一个函数，它将打印给定列表中所有元素的平方。我们之前做的是取一个空列表，检查给定列表中的每个元素，将每个元素平方，并将平方值附加到空列表中。最后，打印空列表。在函数中，我们必须将上述逻辑放在\
    \ **def** 函数内部，而不是打印空字符串的结果，我们将把这个结果返回给 **def** 函数并打印函数。现在让我们编写代码。\n\n```python\n\
    def sq_num(my_list):\n    result = []\n    for i in my_list:\n        result.append(i*i)\n\
    \    return result\n\na = [4,3,2,1]\nprint(sq_num(a))\n```\n\n```\n[16, 9, 4,\
    \ 1]\n```\n\n所以我们得到了给定列表的平方值列表。让我们深入研究这个已经完成的小程序。这个 **for 循环** 在做什么？它检查第一个值，然后是第二个，然后是第三个值，依此类推，直到获取所有值。用数学语言来说，它在执行迭代，因此它是一个迭代器。所以，迭代器用于一次获取一个值。除了使用这个\
    \ **for** 循环，还有另外两种方法可以一次获取一个值。第一种方法是使用索引位置。我们可以写 a[0]，它会给出第一个值，a[1] 会给出第二个值，依此类推。但是这种索引方法不适用于无序数据结构，比如集合和字典。\n\
    \n另一种方法是使用一个名为 **iter()** 的函数。它写作双下划线 iter 后跟双下划线。这些双下划线方法也被称为魔术方法。这个双下划线 iter\
    \ 方法帮助我们判断某个东西是否可迭代。我们知道列表是可迭代的。任何循环可以运行的东西都是可迭代的。当我们写 **for l in list** 时，意味着\
    \ **for 循环** 正在尝试遍历我们的列表。字符串、字典、集合、元组都是可迭代的，因为我们可以使用循环从它们中获取数据。让我们创建一个列表，并使用 **dir()**\
    \ 检查它是否有 \\_\\_iter\\_\\_ 方法。如果这个方法存在，那么那个东西就是可迭代的。\n\n```python\na = [4,3,2,1]\n\
    print(dir(a))\n```\n\n当我们观察输出时，看起来像下面的截图\n\n![](img/967252070c1bdd582017a9d325617e34_236_0.png)\n\
    \n我们感兴趣的属性可以在红色圆圈中看到：**iter 方法**。让我高亮并放大它。\n\n![](img/967252070c1bdd582017a9d325617e34_236_1.png)\n\
    \n这就是 iter 方法。我们也可以有一个 iter 方法，写法如下\n\n```python\na = [4,3,2,1]\nprint(a.__iter__())\n\
    ```\n\n```\n<list_iterator object at 0x04C0EA10>\n```\n\n这意味着列表是可迭代的，因为它有这个方法。但它是一个迭代器吗？我们可以使用列表来执行\
    \ **for 循环** 的功能吗？迭代器有一个状态，通过它知道在迭代过程中处于什么位置，并且通过使用 **双下划线 next 方法** 获取下一个值。如果我们在这里看输出，没有\
    \ next 方法。因此，列表没有状态来检查下一个值，这就是为什么列表不是迭代器。\n\n```python\na = [4,3,2,1]\nprint(a.__next__())\n\
    ```\n\n```\n---------------------------------------------------------------------------\n\
    AttributeError                            Traceback (most recent call last)\n\
    <ipython-input-3-50e593993c23> in <module>\n      1 a = [4,3,2,1]\n----> 2 print(a.__next__())\n\
    \nAttributeError: 'list' object has no attribute '__next__'\n```\n\n所以列表没有属性 **next**。这也可以从之前的输出中验证。在那里你可以看到\
    \ **iter() 方法** 但没有 **next()** 方法。这就是为什么列表不是迭代器，尽管它们是可迭代的。还有另一种写这些魔术方法的方式。通常它们被写成函数。让我们将我的列表名传递给这个\
    \ **iter** 函数。\n\n```python\na = [4,3,2,1]\nprint(iter(a))\n```\n\n```\n<list_iterator\
    \ object at 0x04C0ED90>\n```\n\n类似地，我们可以使用 **next()** 函数。\n\n```python\na = [4,3,2,1]\n\
