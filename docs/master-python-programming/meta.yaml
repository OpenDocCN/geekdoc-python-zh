  md: "# # Chapter 13\n\n# ## Exception Handling\n\nIn the last chapter we read about\
    \ types of errors. In this chapter, we will see the ways to handle these exceptional\
    \ cases. Let’s start with the first basic type of error, divided by zero error.\
    \ We know that no one will divide a number by zero, but what if someone still\
    \ did the exception?\n\n```\na = 5\nb = 0\n\nprint(a/b)\nprint('Well Done')\n\
    ```\n\n```\n---------------------------------------------------------------------------\n\
    ZeroDivisionError                         Traceback (most recent call last)\n\
    <ipython-input-11-9fcdf2cfc87e> in <module>()\n      2 b = 0\n      3 \n---->\
    \ 4 print(a/b)\n      5 print('Well Done')\n\nZeroDivisionError: division by zero\n\
    ```\n\nOK. An error was expected. But, there is another problem. There was another\
    \ message after that division operation which wasn't executed. This is the major\
    \ problem. To handle this, Python provides the **try- except block**. Whatever\
    \ you want to execute, write it in the **try block**. Python feels like ‘OK I’ll\
    \ try to execute it. But what if I fail’. Then, we will ensure that, ‘don’t worry\
    \ Python, if you fail, I have written in **exception block** what to do next.’\
    \ The syntax goes like this.\n\n```\ntry:\n```"
