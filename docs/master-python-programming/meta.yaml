- img_proc: true
  md: '```

    import re

    pattern = re.compile(r"")

    my_string = input("Enter a string: ")

    pattern = re.compile(r"[0-9]")

    result = pattern.sub("_",my_string)

    print(result)

    ```


    Enter a string: john123

    john___


    So, the input string john123 after execution of code gives an output john___


    Is there any difference with the code that was written earlier? Yes, one difference.
    ([0-9]+) v/s ([0-9]). What does this ‘+’ sign do?


    ```

    import re

    pattern = re.compile(r"")

    my_string = input("Enter a string: ")

    pattern = re.compile(r"[0-9]+")

    result = pattern.sub("_",my_string)

    print(result)

    ```


    Enter a string: john123

    john_


    Observe the change. Without ‘+’ the output has as many underscores as many digits
    in string. But after using ‘+’ it’s a single underscore. The question is: What’s
    the use? ‘+’ is used when a character is repeated one or more times. Using ‘+’
    **123** is treated as a single character. So, a single underscore is used. Without
    ‘+’ **123** is treated as **1**, **2** and **3** so, 3 underscores are used to
    represent 3 digits. Again, as an art of writing, It is very useful when we do
    password validation. Actually, without ‘+’ an intruder comes to know that how
    many digits are there and he/she/they can try for various permutation and combination
    to break the password. ‘+’increase the security.'
