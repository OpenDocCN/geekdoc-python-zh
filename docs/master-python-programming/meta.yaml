- md: "## Chapter 11\n\n### Generators\n\nA generator function is a function which\
    \ returns the generator-iterator with the help of **yield function**. It means\
    \ that a generator generates iterators. In simple words, a generator produces\
    \ the result when needed, while an iterator produces the entire result. In the\
    \ previous chapter we learned about iterators. To make a generator, **yield ()**\
    \ function is used. Let's take the same example of squaring the list elements.\
    \ But now we don't need to append and return anything. We just need to write a\
    \ **yield** followed by the operation to be performed. It's more readable also.\
    \ For each value present in the list, yield the square of the value. No append,\
    \ no return and no need to store it in an empty list.\n\n```python\ndef sq_num(my_list):\n\
    \    result = []\n    for i in my_list:\n        yield (i*i)\n\na = [4,3,2,1]\n\
    print(sq_num(a))\n```\n\n```\n<generator object sq_num at 0x05245C60>\n```\n\n\
    If we see this, the output generated is not a list of squared numbers. Generators\
    \ don't hold the entire result in the memory. It hasn't done anything yet. It's\
    \ waiting for us to ask to give the next result. And for this **next** function\
    \ is used. So, I'll write my function and argument inside the **next** function\
    \ and print it.\n\n```python\ndef sq_num(my_list):\n    result = []\n    for i\
    \ in my_list:\n        yield (i*i)\n\na = [4,3,2,1]\nprint(next(sq_num(a)))\n\
    ```\n\n```\n16\n```\n\nSo, it'll print the next result. That's the squared value\
    \ of the first element of the given list. It's again waiting for us to ask what\
    \ to do next. Let's print the next values.\n\n```python\ndef sq_num(my_list):\n\
    \    for i in my_list:\n        yield (i*i)\n\na = sq_num([4,3,2,1])\nprint(next(a))\n\
    print(next(a))\nprint(next(a))\nprint(next(a))\n```\n\n```\n16\n9\n4\n1\n```\n\
    \nOK. All values are printed. Oh yes, we don't need the empty list as well. What\
    \ will happen if we still ask to print the **next** step?\n\n```python\ndef sq_num(my_list):\n\
    \    for i in my_list:\n        yield (i*i)\n\na = sq_num([4,3,2,1])\nprint(next(a))\n\
    print(next(a))\nprint(next(a))\nprint(next(a))\nprint(next(a))\n```\n\n```\n16\n\
    9\n4\n1\n```\n\n```\nStopIteration\n<ipython-input-19-6b8d2ca016f0>\n     9 print(next(a))\n\
    \    10 print(next(a))\n---> 11 print(next(a))\n\nStopIteration:\n```\n\nStop\
    \ Iteration error occurs. It means that the generator has exhausted as there are\
    \ no further values in the list to generate the next value. There is a much better\
    \ approach to write so many **next** statements by using a **for loop**.\n\n```python\n\
    def sq_num(my_list):\n    for i in my_list:\n        yield (i*i)\n\na = sq_num([4,3,2,1])\n\
    for x in a:\n    print (x, end = ' ')\n```\n\n```\n16 9 4 1\n```\n\nThis will\
    \ check for all values of elements in the given list and print the result. Basically,\
    \ what we were getting with iterators in the last chapter, we are getting with\
    \ generators as well. But here we have more control on executing our output.\n\
    We can also write a generator comprehension just like a list comprehension. Two\
    \ things we have to remember. First, use normal parentheses instead of square\
    \ brackets. Second, we know that a generator will give only one value at a time,\
    \ so to get the next result we'll write the **for loop** again.\n\n```python\n\
    a = [4,3,2,1]\ngen_com = (x*x for x in a)\nfor i in gen_com:\n    print(i, end='\
    \ ')\n```\n\n```\n16 9 4 1\n```\n\nThese outputs are not hold up all at once in\
    \ memory. What if you want to print out all the values from the generator? We\
    \ can convert this into a list. If you want to convert it into a list, use the\
    \ list function and pass the generator into it.\n\n```python\na = [4,3,2,1]\n\
    gen_com = (x*x for x in a)\nprint(list(gen_com))\n```\n\n```\n[16, 9, 4, 1]\n\
    ```\n\nLet me take another example. Now I am making the program of the Fibonacci\
    \ series as a generator function.\n\n```python\ndef fib_series(a):\n    x, y =\
    \ 0, 1\n    while True:\n        z = x + y\n        if z < a:\n            yield\
    \ z\n            x, y = y, z\n        else:\n            break\n\ngen_fib = fib_series(10)\n\
    print(gen_fib)\n```\n\n```\n<generator object fib_series at 0x01BE5510>\n```\n\
    \nEverything is like what we have done before. The only difference is now we are\
    \ using the **yield keyword** with our output. When the program executes the yield\
    \ statement, it stops. When we ask it to fetch the next value, then only it's\
    \ iterating.\n\n```python\ndef fib_series(a):\n    x, y = 0, 1\n    while True:\n\
    \        z = x + y\n        if z < a:\n            yield z\n            x, y =\
    \ y, z\n        else:\n            break\n\ngen_fib = fib_series(10)\nprint(next(gen_fib))\n\
    print(next(gen_fib))\n```\n\n```\n1\n2\n```\n\nSo what is the advantage of this\
    \ generator over the iterators? The main advantage is that you can save huge heaps\
    \ of memory at the cost of having extra execution time for generating the next\
    \ iterable object. But the limitation of a generator function is that they are\
    \ slow because they execute once. You can also convert your generator output to\
    \ become a list using the **list function**. If you need to save memory and don't\
    \ care about execution time use a generator, and if you don't care about high\
    \ memory usage and need a little bit faster execution time use a list.\n\n## Chapter\
