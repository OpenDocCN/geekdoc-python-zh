  md: '# Tokens


    Tokens are the small units of any programming language. Python supports 4 types
    of tokens: Keywords, Identifiers, Literals and Operators.


    # Reserved Words (Keywords)


    Python reserves a set of 33 keywords that designate special language functionality.
    The reserved word cannot be used as variable names, function names or identifiers.


    Keywords in Python


    | False | class | finally | is | return |

    | None | continue | for | lambda | try |

    | True | def | from | nonlocal | while |

    | and | del | global | not | with |

    | as | elif | if | or | yield |

    | assert | else | import | pass | |

    | break | except | in | raise | |


    # Python Identifiers


    Identifiers represent the programmable entities such as user-defined names, variables,
    modules, and other objects. An identifier can be a sequence of lower case, upper
    case, integers or a combination of'
  merge: -1
  pgno: 27
- img_proc: true
  md: 'any. The identifier name should start with the lowercase or uppercase but must
    not start with digits). The identifier name should not be a reserved word, and
    only underscore (_) is allowed to be used as a special character in identifier
    names.


    The length of the identifier name should not be more than 79 characters.


    # Variable & Constant


    As the name suggests, **Variable** means which can vary or which is not fixed.
    Variable is the first identifier which we encounter while starting coding. When
    we write **a = 100**, we perform variable assignment. A constant value 100 is
    assigned to a variable **a**.


    Technically, it means that a black box is created somewhere in the memory- lane,
    and this box is called **Object**. It holds the value 100 (a constant). This object
    is accessed by a reference, called **Variable**.


    A constant is a type of variable that holds values, which are immutable (cannot
    be changed). Constants are declared and assigned to a variable, like 100 above.


    ![](img/967252070c1bdd582017a9d325617e34_28_0.png)


    Once created, **a** can be used in a statement or expression, and its value will
    be substituted and later, if the value of **a** is changed and used again, the
    new value will be substituted instead. That''s why it''s called a Variable.


    # Rules for writing or assigning a variable name


    Variable names in Python can be of any length (**without space**), can consist
    of uppercase and lowercase letters (A-Z, a-z), digits (0-9), and the underscore
    character (_). Most important rule, although a'
  merge: -1
