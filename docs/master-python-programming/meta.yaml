- md: "## 2. Membership Operators\n\nThe membership operators **in** and **not in**\
    \ can be used on string to find substring.\n\n```\n'Man' in avengers\nTrue\n\n\
    'man' in avengers\nFalse\n```\n\nThe output will be Boolean. Also, don't forget\
    \ the case-sensitive factor while checking for substrings.\n\n## 3. Comparison\
    \ Operators\n\nThe strings can be compared using relational operators. When we\
    \ check for **less than or greater than** operation between strings, it gives\
    \ True or False based on their alphabetical order position.\n\n```\n'Iron' < 'Tony'\n\
    True\n```\n\n```\n'I' < 'T'\nTrue\n```\n\nSince I came before **T** in alphabetical\
    \ order, the output value return is True. What if both strings have the first\
    \ index value common?\n\n```\n'Tony' > 'Thanos'\nTrue\n```\n\nOKEH!! So in the\
    \ movie Tony is of course superior to Thanos. But what happened here? Since the\
    \ first letter is **T**, the second letter is compared now. **O** is greater than\
    \ **H**, **To** is greater than **Th**, hence, output is True.\n\n```\n'Hulk'\
    \ == 'hulk'\nFalse\n```\n\nCase-sensitivity has to be taken care of. **Hulk**\
    \ is not equal to **hulk**.\n\n```\n'Hulk' != 'hulk'\nTrue\n```\n\nNow it's good.\n\
    \n## 4. Arithmetic Operators\n\nStrings support some arithmetic operations as\
    \ well. Addition is basically concatenation but we can also perform multiplication\
    \ on strings.\n\n```\n'I' + ' am' + ' Gr' + 'o'*2 + 't'\n'I am Groot'\n```\n\n\
    Now this is quite cute (I mean the character Groot). Meanwhile, if you look at\
    \ this code, few things are there to observe. I have introduced a space before\
    \ **am** and **Gr**. This will introduce the space in the final output as well.\
    \ I have multiplied **O** with 2. This will give **OO**. So, use it wisely to\
    \ make readable strings. What if there was no space.\n\n```\n'I' + 'am' + 'Gr'\
    \ + 'o'*2 + 't'\n'IamGroot'\n```\n\n## 5. Logical Operators\n\nCertain logical\
    \ operators **and, or, not** can be used with strings. One of the most important\
    \ points regarding strings is that an empty string has a False value.\n\n**(i)\
    \ and:** If the value on the left hand side is False, the **and operator** will\
    \ give the left side value is executed. If the value on the left is True, then\
    \ the value on the right hand side will be executed.\n\n```\n'IronMan' and 'Steve'\n\
    'Steve'\n\n'' and 'Tony'\n''\n\n'Steve' and ''\n''\n```\n\nLet's check these three\
    \ outputs. In the first case, both strings are true. So, the value of the right\
    \ side will be executed.\nIn the second case, the left side is an empty string.\
    \ An empty string means false Boolean value. And if the left side value is false,\
    \ then the left hand side value is returned.\nSimilarly, in the third case, the\
    \ left hand side value is True (not an empty string), then, the value of the right\
    \ hand side of the **and** operator will be returned. Here, it is an empty string.\n\
    \n**(ii) or:** If the value on the left hand side is True, the **or operator**\
    \ will give True or left hand side value. If the value on the left is False, then\
    \ the value on the right hand side will be executed.\n\n```\n'IronMan' or 'Steve'\n\
    'IronMan'\n```\n\n```\n\"\" or 'Tony'\n'Tony'\n```\n\n```\n'Steve' or \"\"\n'Steve'\n\
