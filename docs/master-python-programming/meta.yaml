    # Augmented Assignment Operators and Methods


    Union, intersection, difference, and symmetric difference operators mentioned
    above have an augmented assignment form and they can be used to modify a set.
    There is a method for each augmented assignment operator as well.

    **a.update(b)** or **a |= b** : This will add those elements of **b** to **a**,
    which are not present in set **a**, and then update the set **a**.

    **a.intersection_update(b)** or **a &= b [ &c... ]** : This will retain only those
    elements of **b** and **a**, which are common in both the sets and then update
    the set **a**.

    **a.difference_update(b)** or **a -= b [ |c... ]** : This will remove those elements
    of **b** which are common with **a**, and then update the set **a**.

    **a.symmetric_difference_update(b)** or **a ^= b [ |c... ]** : This will retain
    those elements which are either present in the set **a** or **b**, but not in
    both the sets, and then update the set **a**.


