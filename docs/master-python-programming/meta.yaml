- md: "## Anonymous Functions in Python\n\nAnonymous functions are also called lambda\
    \ functions in Python because instead of declaring them with the standard **def**\
    \ keyword, lambda keyword is used.\nAnonymous functions are used when there is\
    \ a requirement of a nameless function for a short period of time. These functions\
    \ are created at runtime. Depending upon the program you need, lambda function\
    \ works in conjunction with filter(), map() and reduce():\nThe **filter()** function\
    \ filters, as the name suggests, the original input on the basis of the conditions\
    \ given. With **map()**, you apply a function to all items of the list. The **reduce()**\
    \ function is part of the **functools** library. You use this function cumulatively\
    \ to the items of the list, from left to right and reduce the sequence to a single\
    \ value. Let's see how to use them.\n\n```python\ndef sq(n):\n    return n*3\n\
    print(sq(2))\n```\n\n6\n\nThe function **sq(n)** is having a parameter **n** which\
    \ will return a value of **n multiplied with 3**. For example, when **n = 3**,\
    \ the output is 6. The same can be written using the **lambda function**.\n\n\
    ```python\nm = lambda n:n*2\nprint(m(3))\n```\n\n6\n\nWe will use the **lambda\
    \ keyword**. The parameter is written first. Then a **colon sign** is placed.\
    \ Then the operation is written. Let's see one more example.\n\n```python\ndef\
    \ mx(m,n):\n    if m>n:\n        return m\n    else:\n        return n\nprint(mx(5,6))\n\
    ```\n\n6\n\nThe program is simple. It’s checking that in between two numbers,\
    \ which number is bigger. There are two parameters, **m and n**. While writing\
    \ with **lambda** we will write **lambda m,n**. Then, we have the body part. It\
    \ will **return** the result **m if m>n, else** it will **return** the value **n**.\
    \ Let’s write it now using the **lambda** function.\n\n```python\nmx = lambda\
    \ m,n:m if m>n else n\nprint(mx(5,6))\n```\n\n6\n\nI have a list of numbers, and\
    \ the task is to generate another list which will contain the squared value of\
    \ the previous list. There will be a list. Then, an empty list will be generated.\
    \ We will check every value of our list. We will square every element and then\
    \ will append every value in the empty list. Then we will return the empty list.\
    \ Let’s code it down first using a function.\n\n```python\ndef sq_l(l):\n    l2\
    \ = []\n    for x in l:\n        l2.append(x**2)\n    return l2\na = [4,3,2,1]\n\
    print(sq_l(a))\n```\n\n[16, 9, 4, 1]\n\nWith **lambda** we can write it like this.\
    \ We have **x** and this variable has to be squared, that is, **x**\\*\\*2. But\
    \ from where it will take these values of **x**. From the list **l**. Now we will\
    \ need to map our squared result with our list **l**. For this, the **map** function\
    \ is used. This function is then passed through the **list function**.\n\n```python\n\
    l = [4,3,2,1]\nprint(list(map(lambda x:x**2, l)))\n\n[16, 9, 4, 1]\n```\n\nLet's\
    \ take the above list and do another operation. We have to make a list of elements\
    \ which are greater than two. We only have to check that if **x**>2, then we will\
    \ append this value of **x**, in an empty list. Then finally, **return** this\
    \ empty list.\n\n```python\ndef values_over_two(a):\n    b = []\n    for x in\
    \ a:\n        if x>2:\n            b.append(x)\n    return b\nl = [4,3,2,1]\n\
    print(values_over_two(l))\n\n[4, 3]\n```\n\nTechnically, we are filtering our\
    \ data. We are filtering those values of **x**, which are greater than 2.\n\n\
    ```python\nl = [4,3,2,1]\nprint(list(filter(lambda x:x>2, l)))\n\n[4, 3]\n```\n\
    \nWe will write a **filter** command instead of **map** command. We can also use\
    \ the **map** command. It will print the result in Boolean.\n\n```python\nl =\
    \ [1,2,3,4]\nprint(list(map(lambda x:x>2, l)))\n[False, False, True, True]\n```\n\
    \n3 and 4 are greater than 2, hence, a True Boolean value is displayed. For 1\
    \ and 2, False Boolean value is printed. Let’s do one more task. I need to multiply\
    \ each value of my list and print the result. In the above case, my list has values\
    \ 1,2,3,4. The result will be 1x2x3x4 = 24.\n\n```python\ndef prod_terms(a):\n\
    \    mul = a[0]\n    for i in range(1, len(a)):\n        mul *= a[i]\n    return\
    \ mul\na = [1,2,3,4]\nprint(prod_terms(a))\n24\n```\n\nIn this case, we will need\
    \ to reduce our list to a single value. Here we can use the **reduce function**.\
    \ As stated earlier, **reduce function** comes in the **functools package**. For\
    \ multiplication, we need two values, **x and y**. Let’s see how to write it.\n\
    \n```python\nfrom functools import reduce\na = [1,2,3,4]\nprint(reduce(lambda\
    \ x,y:x*y, a))\n24\n```\n\n## What's new in Python 3.8?\n\nWe saw earlier **keywords\
    \ arguments**. Python 3.8 has introduced a new feature in functions known as positional\
    \ only arguments. For this, **/ sign** is added after the desired arguments, separated\
    \ by comma.\n\nAll arguments written before / sign can be passed only positional\
    \ and written after this sign can be passed positional or by using the keyword.\
    \ The following example illustrates this example.\n\n```python\ndef raised_to\
    \ (x,y,/,z = None):\n    w = x ** y\n    if z is not None:\n        w %= z\n \
    \   return w\nprint(raised_to(x = 3, y = 5, z = 6))\n```\n\nLet's have a look\
    \ at the error\n\n```\nTypeError Traceback (most recent call last)\n~\\AppData\\\
    Local\\Temp\\ipykernel_15100/144810202.py in <module>\n      4     w %= z\n  \
    \    5     return w\n----> 6 print(raised_to(x = 3, y = 5, z = 6))\n\nTypeError:\
    \ raised_to() got some positional-only arguments passed as keyword arguments:\
    \ 'x, y'\n```\n\nThe error says that we have passed positional only arguments\
    \ as keyword arguments.\n\n```python\ndef raised_to (x,y,/,z = None):\n    w =\
    \ x ** y\n    if z is not None:\n        w %= z\n    return w\nprint(raised_to(3,\
    \ 5, z = 6))\nprint(raised_to(3, 5, 6))\n```\n\n3\n3\n\nHere, one can observe\
    \ that variables x and y can be written as positional only, but z can be passed\
    \ with and without keyword z. Let's also check what will be the output without\
    \ using this argument?\n\n```python\ndef raised_to (x,y,z = None):\n    w = x**y\n\
    \    if z is not None:\n        w %= z\n    return w\n\nprint(raised_to(3,5,6))\n\
    print(raised_to(x = 3,y = 5, z = 6))\n```\n\n3\n3\n\nWe can see that without positional\
    \ only argument, /, arguments can be passed with or without keywords.\n\n## Recursive\
    \ Functions\n\nWhen a function calls itself, this process is called Recursion.\
    \ Let's understand this concept using the most used example of finding the factorial\
    \ of a given number. Mathematically, the factorial of a number is given by multiplying\
    \ the number with its decreasing value, one at a time, till 1. For example, the\
    \ factorial of 5 is written as **5 ! = 5 x 4 x 3 x 2 x 1**. If we observe this,\
    \ we can say that it's **5 x 4 !** Because **4 ! = 4 x 3 x 2 x 1**. Again, it\
    \ can be written as **4 x 3 !**, because **3 ! = 3 x 2 x 1**. Again, it can be\
    \ written as **3 x 2 !**, because **2 ! = 2 x 1**. Again, it can be written as\
    \ **2 x 1 !**, because **1 ! = 1 x 1**. In generalized form we can write it as,\
    \ **n x (n-1) !**. Starting with **n = 5**, it will first call **(n-1) !**, that\
    \ is **4 !**. Now the new value of **n** will be **5 x 4 x (n-1) !**, then it\
    \ will again be **3 !**. Now the new value of **n** will be **5 x 4 x 3 x (n-1)\
    \ !**, **then**, it will again call **2 !**, **and finally**, it will again call\
    \ **1 !**. This is how a function calls itself. Let's code this.\n\n```python\n\
    def rec_fact(n):\n    if n == 0:\n        return 1\n    return n * rec_fact(n-1)\n\
    \nresult = rec_fact(5)\nprint(result)\n```\n\n120\n\nSo, we can define recursion\
    \ as a process in which a function breaks down into smaller problems, and it keeps\
    \ calling itself for each of the smaller problems until a base case is reached.\
    \ Like here, the base case is **1 !**. What does a non- recursive or general iterative\
    \ factorial function look like?\n\n```python\ndef iter_fact(n):\n    if n == 0:\n\
    \        return 1\n    else:\n        fact = 1\n        for i in range(1, n+1):\n\
    \            fact *= i\n        return fact\n\nresult = iter_fact(5)\nprint(result)\n\
    ```\n\n120\n\nIt's a general function. There are some differences between iteration\
    \ and recursion.\n\n- Recursion requires more memory.\n- In many languages Iteration\
    \ is a much faster approach.\n- Recursion sometimes can be a more abstract and\
    \ harder approach to understand."
  mdcn: "## Python 中的匿名函数\n\n匿名函数在 Python 中也被称为 lambda 函数，因为它们不是使用标准的 **def** 关键字来声明，而是使用\
    \ lambda 关键字。\n匿名函数用于需要一个临时无名函数的场合。这些函数在运行时创建。根据你的程序需求，lambda 函数可以与 filter()、map()\
    \ 和 reduce() 结合使用：\n**filter()** 函数，顾名思义，根据给定的条件对原始输入进行过滤。使用 **map()**，你可以将一个函数应用于列表的所有元素。**reduce()**\
    \ 函数是 **functools** 库的一部分。你使用这个函数从左到右累积地应用于列表的元素，并将序列归约为单个值。让我们看看如何使用它们。\n\n```python\n\
    def sq(n):\n    return n*3\nprint(sq(2))\n```\n\n6\n\n函数 **sq(n)** 有一个参数 **n**，它将返回\
    \ **n 乘以 3** 的值。例如，当 **n = 3** 时，输出是 6。同样的功能可以使用 **lambda 函数** 来编写。\n\n```python\n\
    m = lambda n:n*2\nprint(m(3))\n```\n\n6\n\n我们将使用 **lambda 关键字**。首先写出参数。然后放置一个\
    \ **冒号**。接着写出操作。让我们再看一个例子。\n\n```python\ndef mx(m,n):\n    if m>n:\n        return\
    \ m\n    else:\n        return n\nprint(mx(5,6))\n```\n\n6\n\n这个程序很简单。它检查两个数字中哪个更大。有两个参数，**m\
    \ 和 n**。使用 **lambda** 编写时，我们会写 **lambda m,n**。然后，我们有函数体部分。它将 **返回** 结果 **如果 m>n\
    \ 则返回 m，否则** 返回值 **n**。现在让我们使用 **lambda** 函数来编写它。\n\n```python\nmx = lambda m,n:m\
    \ if m>n else n\nprint(mx(5,6))\n```\n\n6\n\n我有一个数字列表，任务是生成另一个列表，其中包含前一个列表的平方值。会有一个列表。然后，生成一个空列表。我们将检查列表中的每个值。我们将每个元素平方，然后将每个值追加到空列表中。然后我们将返回空列表。让我们先使用一个函数来编写代码。\n\
    \n```python\ndef sq_l(l):\n    l2 = []\n    for x in l:\n        l2.append(x**2)\n\
    \    return l2\na = [4,3,2,1]\nprint(sq_l(a))\n```\n\n[16, 9, 4, 1]\n\n使用 **lambda**，我们可以这样写。我们有\
    \ **x**，这个变量需要被平方，即 **x**\\*\\*2。但它从哪里获取这些 **x** 的值呢？从列表 **l** 中。现在我们需要将我们的平方结果与列表\
    \ **l** 进行映射。为此，使用 **map** 函数。然后这个函数通过 **list 函数** 进行处理。\n\n```python\nl = [4,3,2,1]\n\
    print(list(map(lambda x:x**2, l)))\n\n[16, 9, 4, 1]\n```\n\n让我们使用上面的列表进行另一个操作。我们需要创建一个包含大于二的元素的列表。我们只需要检查如果\
    \ **x**>2，那么我们将把这个 **x** 的值追加到一个空列表中。最后，**返回** 这个空列表。\n\n```python\ndef values_over_two(a):\n\
    \    b = []\n    for x in a:\n        if x>2:\n            b.append(x)\n    return\
    \ b\nl = [4,3,2,1]\nprint(values_over_two(l))\n\n[4, 3]\n```\n\n从技术上讲，我们正在过滤我们的数据。我们过滤那些\
    \ **x** 大于 2 的值。\n\n```python\nl = [4,3,2,1]\nprint(list(filter(lambda x:x>2,\
    \ l)))\n\n[4, 3]\n```\n\n我们将编写一个 **filter** 命令来代替 **map** 命令。我们也可以使用 **map** 命令。它将以布尔值打印结果。\n\
    \n```python\nl = [1,2,3,4]\nprint(list(map(lambda x:x>2, l)))\n[False, False,\
    \ True, True]\n```\n\n3 和 4 大于 2，因此显示 True 布尔值。对于 1 和 2，打印 False 布尔值。让我们再做一个任务。我需要将列表中的每个值相乘并打印结果。在上面的例子中，我的列表有值\
    \ 1,2,3,4。结果将是 1x2x3x4 = 24。\n\n```python\ndef prod_terms(a):\n    mul = a[0]\n\
    \    for i in range(1, len(a)):\n        mul *= a[i]\n    return mul\na = [1,2,3,4]\n\
    print(prod_terms(a))\n24\n```\n\n在这种情况下，我们需要将列表归约为单个值。这里我们可以使用 **reduce 函数**。如前所述，**reduce\
    \ 函数** 位于 **functools 包** 中。对于乘法，我们需要两个值，**x 和 y**。让我们看看如何编写它。\n\n```python\n\
    from functools import reduce\na = [1,2,3,4]\nprint(reduce(lambda x,y:x*y, a))\n\
    24\n```\n\n## Python 3.8 的新特性？\n\n我们之前看到了 **关键字参数**。Python 3.8 在函数中引入了一个新特性，称为仅位置参数。为此，在所需参数之后添加\
    \ **/ 符号**，参数之间用逗号分隔。\n\n在 / 符号之前编写的所有参数只能按位置传递，而在此符号之后编写的参数可以按位置传递或使用关键字传递。以下示例说明了这一点。\n\
    \n```python\ndef raised_to (x,y,/,z = None):\n    w = x ** y\n    if z is not\
    \ None:\n        w %= z\n    return w\nprint(raised_to(x = 3, y = 5, z = 6))\n\
    ```\n\n让我们看看错误\n\n```\nTypeError Traceback (most recent call last)\n~\\AppData\\\
    Local\\Temp\\ipykernel_15100/144810202.py in <module>\n      4     w %= z\n  \
    \    5     return w\n----> 6 print(raised_to(x = 3, y = 5, z = 6))\n\nTypeError:\
    \ raised_to() got some positional-only arguments passed as keyword arguments:\
    \ 'x, y'\n```\n\n错误表明我们将仅位置参数作为关键字参数传递了。\n\n```python\ndef raised_to (x,y,/,z\
    \ = None):\n    w = x ** y\n    if z is not None:\n        w %= z\n    return\
    \ w\nprint(raised_to(3, 5, z = 6))\nprint(raised_to(3, 5, 6))\n```\n\n3\n3\n\n\
    在这里，可以观察到变量 x 和 y 只能按位置编写，但 z 可以带关键字 z 传递，也可以不带关键字传递。让我们也检查一下不使用此参数时的输出是什么？\n\n\
    ```python\ndef raised_to (x,y,z = None):\n    w = x**y\n    if z is not None:\n\
    \        w %= z\n    return w\n\nprint(raised_to(3,5,6))\nprint(raised_to(x =\
    \ 3,y = 5, z = 6))\n```\n\n3\n3\n\n我们可以看到，没有仅位置参数 / 时，参数可以带关键字传递，也可以不带关键字传递。\n\
    \n## 递归函数\n\n当一个函数调用自身时，这个过程称为递归。让我们使用最常用的例子——计算给定数字的阶乘——来理解这个概念。从数学上讲，一个数字的阶乘是通过将该数字与其递减值相乘得到的，每次减一，直到\
    \ 1。例如，5 的阶乘写作 **5 ! = 5 x 4 x 3 x 2 x 1**。如果我们观察这个，可以说它是 **5 x 4 !** 因为 **4 !\
    \ = 4 x 3 x 2 x 1**。同样，它可以写成 **4 x 3 !**，因为 **3 ! = 3 x 2 x 1**。同样，它可以写成 **3 x\
    \ 2 !**，因为 **2 ! = 2 x 1**。同样，它可以写成 **2 x 1 !**，因为 **1 ! = 1 x 1**。在一般形式中，我们可以写成\
    \ **n x (n-1) !**。从 **n = 5** 开始，它将首先调用 **(n-1) !**，即 **4 !**。现在 **n** 的新值将是 **5\
    \ x 4 x (n-1) !**，然后它将再次调用 **3 !**。现在 **n** 的新值将是 **5 x 4 x 3 x (n-1) !**，**然后**，它将再次调用\
    \ **2 !**，**最后**，它将再次调用 **1 !**。这就是函数调用自身的方式。让我们编写代码。\n\n```python\ndef rec_fact(n):\n\
    \    if n == 0:\n        return 1\n    return n * rec_fact(n-1)\n\nresult = rec_fact(5)\n\
    print(result)\n```\n\n120\n\n所以，我们可以将递归定义为一个过程，其中一个函数分解成更小的问题，并且它不断调用自身来处理每个更小的问题，直到达到基本情况。就像这里，基本情况是\
    \ **1 !**。非递归或一般的迭代阶乘函数是什么样子的？\n\n```python\ndef iter_fact(n):\n    if n == 0:\n\
    \        return 1\n    else:\n        fact = 1\n        for i in range(1, n+1):\n\
    \            fact *= i\n        return fact\n\nresult = iter_fact(5)\nprint(result)\n\
    ```\n\n120\n\n这是一个通用函数。迭代和递归之间有一些区别。\n\n- 递归需要更多的内存。\n- 在许多语言中，迭代是一种更快的方法。\n-\
    \ 递归有时可能是一种更抽象、更难理解的方法。"
