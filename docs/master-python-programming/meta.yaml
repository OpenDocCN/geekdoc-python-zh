  md: 'now. That is, to replace (or substitute) non- digits with an underscore sign.


    Our task is to **write a program that will replace all the non- digits in a string
    with a ‘_’ sign?**


    Referring **Table 1** again, similar to **\d** which specifies digits, we have
    **\D** which specifies non-digits. It means that if in our 1st program, if we
    replace **\d** with **\D**, our objective must be achieved. Let’s check it out.


    ```

    import re

    pattern = re.compile(r""")

    my_string = input("Enter a string: ")

