    # Chapter 7


    # Sets


    Sets are unordered, lists of elements which are unique and duplicate elements
    are not allowed. A set can be modified, but the elements contained in the set
    must be of an immutable type, such as list, string or tuple.


    How to write a set?

    Sets can be written using two types.


    +   - Using **set ()** function.

    - Using curly braces.


    Let’s check them one by one. First create a set using **set ()** function.


    ```

    >>>

    >>> hero_name = [''IronMan'', ''Captain America'', ''Hulk'']

    >>> type(hero_name)

    <class ''list''>

    >>> hero_name = set([''IronMan'', ''Captain America'', ''Hulk''])

    >>> type(hero_name)

    <class ''set''>

    >>>

    ```


    I have passed a list in the set function. Once set is created you check the datatype
    using the type command. I have also created the list to differentiate among the
    two.


    ```

    >>>

    >>> hero_name = (''IronMan'', ''Captain America'', ''Hulk'')

    >>> type(hero_name)

    <class ''tuple''>

    >>> hero_name = set((''IronMan'', ''Captain America'', ''Hulk''))

    >>> type(hero_name)

    <class ''set''>

    >>>

    ```'
  - '[PAGE 141]


    This time I have created another set from a tuple list. Both list and tuple are
    immutable. Let''s check for strings also.


    ```

    >>>

    >>> hero_name = ''IronMan, Captain America, Hulk''

    >>> type(hero_name)

    <class ''str''>

    >>> hero_name = set(''IronMan, Captain America, Hulk'')

    >>> type(hero_name)

    <class ''set''>

    >>>

    ```


    OK. After creating a set, let''s check the output of the set.


    ```

    >>>

    >>> rich_avenger = ''Tony aka Iron Man''

    >>> set(rich_avenger)

    {''I'', '' '', ''T'', ''a'', ''n'', ''o'', ''y'', ''r'', ''M'', ''k''}

    >>>

    ```


    The output of the set is like a list. A better comparison can be done with the
    list itself.


    ```

    >>>

    >>> list(rich_avenger)

    [''T'', ''o'', ''n'', ''y'', '' '', ''a'', ''k'', ''a'', '' '', ''I'', ''r'',
    ''o'', ''n'', '' '', ''M'', ''a'', ''n'']

    >>>

    ```


    Now one can observe the difference. Set has no elements repeated, not even space.
    And the elements are arranged unordered. A list has an ordered set of repeated
    elements.

    Now, let''s create a set by using another method: Using the curly braces.'
