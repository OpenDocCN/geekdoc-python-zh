    ## splitlines([<keepends>])


    It splits the string into lines and returns them in lists. The following table
    consists of the character sequence which constitutes a line boundary.


    | Escape Sequence | Character |

    | :--- | :--- |

    | \n | Newline |

    | \r | Carriage Return |

    | \r\n | Carriage Return + Line Feed |

    | \v or \x0b | Line Tabulation |

    | \f or \x0c | Form Feed |

    | \x1c | File Separator |

    | \x1d | Group Separator |

    | \x1e | Record Separator |

    | \x85 | Next Line (C1 Control Code) |

    | \u2028 | Unicode Line Separator |

    | \u2029 | Unicode Paragraph Separator |


    ```

