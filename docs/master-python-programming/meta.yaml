    (''Steve@Captain'', ''@'', ''America'')

    ```


    ## rsplit(sep=None, maxsplit=-1)


    It splits the string into substring. The parameters <sep> and <maxsplit> are optional.
    The default value of <maxsplit> is -1. Let''s see how this function works.


    ```

    angry_avenger = ''Dr.Bruce Banner aka The Hulk''.rsplit()

    print(angry_avenger)

    ```


    ```

    [''Dr.Bruce'', ''Banner'', ''aka'', ''The'', ''Hulk'']

    ```


    Now set the <sep> parameter equal to **aka**.


    ```

    angry_avenger = ''Dr.Bruce Banner aka The Hulk''.rsplit(''aka'')

    print(angry_avenger)

    ```


    ```

    [''Dr.Bruce Banner '', '' The Hulk'']

    ```


    It splits the string into two parts, before and after **aka**. Let''s check the
    values of maxsplit with 1 and -1.


    ```

    angry_avenger = ''Dr.Bruce Banner aka The Hulk''.rsplit(maxsplit=1)

    print(angry_avenger)

    ```


    ```

    [''Dr.Bruce Banner aka The'', ''Hulk'']

    ```


    ```

    angry_avenger = ''Dr.Bruce Banner aka The Hulk''.rsplit(maxsplit=-1)

    print(angry_avenger)

    ```


    ```

    [''Dr.Bruce'', ''Banner'', ''aka'', ''The'', ''Hulk'']

    ```


    While maxsplit = -1 splits the string as normal splitting, maxsplit = 1 splits
    the string starting from right side to the left side. Here, the value is 1, hence,
    it splits after first substring.


    ## split(sep=None, maxsplit=-1)


    It splits the string into substring like the **rsplit()**. The only difference
    is that with <maxsplit> it splits from left to right instead of right to left.
    Consecutive delimiters return empty strings and consecutive whitespace characters
    are treated as single delimiters.


    ```

