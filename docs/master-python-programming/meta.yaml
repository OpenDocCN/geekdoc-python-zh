    \ |\n\n再次记住，这里没有提到的错误还有很多。这些是最常发生或遇到的错误。\n\n## 第13章\n\n## 异常处理\n\n在上一章中，我们了解了错误的类型。在本章中，我们将看到处理这些异常情况的方法。让我们从第一种基本类型的错误开始，即除以零错误。我们知道没有人会将一个数除以零，但如果有人仍然这样做了呢？\n\
