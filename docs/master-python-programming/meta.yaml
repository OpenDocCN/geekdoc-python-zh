    # Bytes


    A small integer ranging from 0 to 255, a **byte object** is an immutable sequence
    of single byte values. A string with prefix **b**, is termed as a byte string.
    A byte string works with single, double and triple quotes. Only ASCII characters
    are allowed in byte literals. If the character value is greater than 127, then,
    a proper escape sequence must be specified. Let''s check these things.


    ```

    avengers = b''Tony, Steve, Bruce''

    print(avengers)

    print(type(avengers))

    ```


    ```

    b''Tony, Steve, Bruce''

    <class ''bytes''>

