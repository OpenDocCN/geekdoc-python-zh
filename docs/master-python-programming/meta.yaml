    \nAttributeError: 'list' object has no attribute '__next__'\n```\n\nSo the list\
    \ has no attribute **next**. This can be verified from the previous output as\
    \ well. There you can see the **iter() method** but not the **next()** method.\
    \ That's why lists are not iterators although they are iterables. There is another\
    \ way to write these magic methods. Usually they are written as functions. Let's\
    \ pass my list name into this **iter** function.\n\n```python\na = [4,3,2,1]\n\
    print(iter(a))\n```\n\n```\n<list_iterator object at 0x04C0ED90>\n```\n\nSimilarly,\
    \ we can use the **next()** function.\n\n```python\na = [4,3,2,1]\nprint(next(a))\n\
    ```\n\n```\n---------------------------------------------------------------------------\n\
    TypeError                                 Traceback (most recent call last)\n\
    <ipython-input-5-9e87209431d8> in <module>\n      1 a = [4,3,2,1]\n----> 2 print(next(a))\n\
    \nTypeError: 'list' object is not an iterator\n```\n\nOOPS!! An error occurred.\
    \ If the list has become an iterator then it should have the **next()** attribute\
