    It splits the string into two parts, before and after **aka**. Let''s check the
    values of maxsplit with 1 and -1.


    ```

    angry_avenger = ''Dr.Bruce Banner aka The Hulk''.rsplit(maxsplit = 1)

    print(angry_avenger)


