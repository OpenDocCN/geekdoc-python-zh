    \n在结束列表之前，让我们看看如何将列表转换为字符串。\n\n可以使用“.join()”将列表转换为字符串。根据需要使用带或不带空格的两个引号，一个点运算符，然后是join()函数。此操作将列表中所有存在的字符串粘贴在一起，并将它们作为单个字符串返回。\n\
    \n```\navengers = ['I', 'am', 'IronMan']\navengers\n['I', 'am', 'IronMan']\n```\n\
    \n```\ntype(avengers)\nlist\n```\n\n```\nmy_str = ''.join(avengers)\nmy_str\n\
