  - '[PAGE 294]


    The **split ()** function returns a list where the string has been split at each
    match.


    ```

    import re


    my_str = "We are Venom"

    result = re.split("\s", my_str)

    print(result)


    [''We'', ''are'', ''Venom'']

    ```


    So, **split ()** simply creates a list. **\s** is splitting the string at each
    whitespace occurrence.

    There is a special case with split () function which allows to split **n** words.
    Suppose I want to split 1<sup>st</sup> two words of my string and not the remaining.
    Then, it goes like this:


    ```

    import re


    my_str = "The name is Cable"

    result = re.split("\s", my_str, 2)

    print(result)


    [''The'', ''name'', ''is Cable'']

    ```


    Look at the 3<sup>rd</sup> line of code. There is a number **‘2’**, which indicates
    how many words to split. What if it becomes 1?


    ```

    import re


    my_str = "The name is Cable"

    result = re.split("\s", my_str, 1)

    print(result)


    [''The'', ''name is Cable'']

    ```'
- md: "## Match Object\n\nA Match Object is object containing information about the\
    \ search and the result. There are some attributes related to **search** operation:\n\
    - `.span()` returns a tuple containing the start-, and end positions of the match.\n\
    - `.string` returns the string passed into the function.\n- `.group()` returns\
    \ the part of the string where there was a match (We will learn this function\
    \ in detail on last day of our course).\n\n## Write a program to search for an\
    \ upper case character in the beginning of a word, and print its position.\n\n\
    For example the string is \"**I am Iron Man**\". The task is to find the position\
    \ of, say, letter M of word Man. What should be the approach?\n1. Check for the\
    \ 1st character of the string. For example, the 1st word here is not M. It’s I.\
    \ So, I can’t use `^` or `\\A`.\n2. Referring **Table 1** again. There are two\
    \ special sequence `\\b` and `\\w`.\n3. `\\b` returns a match where the specified\
    \ characters are at the beginning or at the end of a word.\n4. `\\w` returns a\
    \ match where the string contains any word characters.\n5. Finally, using `.span()`\
    \ will do the job.\n\n```python\nimport re\n\nmy_str = \"I am Iron Man\"\nresult\
    \ = re.search(r\"\\bM\\w+\", my_str)\nprint(result.span())\n```\n\n(10, 13)\n\n\
    **3rd line of code:** `\\b` will return a match where the specified characters\
    \ are at the beginning (or at the end) of a word which is **M** (in this example)\
    \ and `\\w` will return the match where the string contains any word character.\
    \ `.span()` returns a tuple containing the start-, and end positions of the match,\
    \ i.e. (10, 13), in our example.\n\n## Write a program to search for an upper\
    \ case character in the beginning of a word, and print that complete word.\n\n\
    For example the string is \"**I am Iron Man**\". The task is to find the complete\
    \ word of Man if my letter is, say, M. Here, I will use `.group()` instead of\
    \ `.span()`.\n\n```python\nimport re\n\nmy_str = \"I am Iron Man\"\nresult = re.search(r\"\
    \\bM\\w+\", my_str)\nprint(result.group())\n```\n\nMan\n\n## Write a program to\
    \ search for the character in the beginning of a word, and print that complete\
    \ word.\n\nAgain, `\\b` is useful for our need.\n\n```python\nimport re\nmy_input\
    \ = \"Avengers\"\ndotsequence = re.search(r'\\b[a-zA-Z]vengers', my_input)\nprint(dotsequence)\n\
    ```\n\n`<_sre.SRE_Match object; span=(0, 8), match='Avengers'>`\n\nThe code is\
    \ simple. `\\b` will check for the beginning part for lowercase or uppercase character\
    \ which is written as `[a-zA-Z]`. When it finds **A** it matches itself with the\
    \ input string and print the result.\n\nOK we have a final task to do, try to\
    \ write a regex in walrus operator. I know that’s homework. But I’ll write one\
    \ function that will guide you. I’ll be using **`findall()`** to find the date\
    \ in a given string and I will write this task using the walrus operator.\n\n\
    ```python\nimport re, datetime\ntext = 'Python 3.8 was released on 14-10-2019'\n\
    if (match_res := re.findall(r'[\\d]{1,2}-[\\d]{1,2}-[\\d]{4}',text)):\n    print('The\
    \ matched result is:',match_res)\n```\n\nThe matched result is: ['14-10-2019']\n\
    \nOK, that’s cool. I think you can know understand what’s happening? That’s all\
    \ for this topic. Now this is a vast topic and I’ll recommend you to go through\
    \ my book if you have some interest in this topic. With this we have come to the\
    \ end of this volume. I wish you have found this book fruitful and interesting.\
    \ In the next volume I’ll start with how to use some popular packages and modules,\
    \ OOPs concept, Sorting and Searching and some applications in which python are\
    \ helpful such as Parsing and Scraping. Thank you for your patience. I would request\
    \ you all to give some feedback regarding the content of this book, and I’ll like\
    \ to hear if you want some specific topics to be covered in the coming volumes.\n\
    \n## About the Author\n\n![](img/967252070c1bdd582017a9d325617e34_298_0.png)\n\
    \nAbhishek Singh did his Bachelor of Engineering in Electronics and Communication\
