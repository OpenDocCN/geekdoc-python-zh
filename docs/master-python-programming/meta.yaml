    \ 这意味着我们正在将元组与字符串连接。但在这里，iron_man是一个元组，而“Robert Downey Jr.”是用普通括号写的。那么，这些中哪一个是字符串？让我们检查一下“Robert\
    \ Downey Jr.”的类型。\n\n```\n>>> new_name = (\"Robert Downey Jr.\")\n>>> type(new_name)\n\
    <class 'str'>\n```\n\n它显示为字符串。怎么会这样？这意味着括号不是列表和元组之间的真正区别。概念是，当在普通括号中使用单个元素（或多个元素（不特定））时，在关闭括号之前也要使用逗号。\n\
    \n```\n>>> new_name = (\"Robert Downey Jr.\",)\n>>> type(new_name)\n<class 'tuple'>\n\
