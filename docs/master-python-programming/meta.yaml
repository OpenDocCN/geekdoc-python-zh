    \ value in the empty list. Finally, print the empty list. In function, we have\
    \ to put the above logic inside **def** function and instead of printing the result\
    \ of an empty string, we will return this result back to the **def** function\
    \ and will print the function. Let's code it now.\n\n```python\ndef sq_num(my_list):\n\
    \    result = []\n    for i in my_list:\n        result.append(i*i)\n    return\
    \ result\n\na = [4,3,2,1]\nprint(sq_num(a))\n```\n\n```\n[16, 9, 4, 1]\n```\n\n\
    So we got a list of squared values of the given list. Let's deep dive into this\
    \ small already done program. What is this **for loop** doing? It's checking for\
    \ the first value, then the second, then the third value and so on till all values\
    \ are fetched. In the language of mathematics, it's performing iterations, and\
    \ thus it's an iterator. So, iterators are used to fetch one value at a time.\
    \ Other than using this **for** loop, there are two more ways to fetch one value\
    \ at one time. The first method is using index position. We can write a[0] and\
    \ it will give the first value, a[1] will give a second value and so on. But this\
    \ indexing method won't work on unordered data structures, such as sets and dictionaries.\n\
    \nAnother method is to use a function called **iter()**. It's written as the double\
    \ underscore iter followed by double underscore. These double underscore methods\
    \ are also called the magic methods. This double underscore iter method helps\
    \ us to find out if something is iterable or not. We know that lists are iterable.\
    \ Anything on which the loop can run are iterables. When we write **for l in list**,\
    \ it means that **for loop** is trying to loop over our list. String, dictionaries,\
    \ sets, tuples all are iterables because we can use loops to fetch data from them.\
    \ Let's make a list and by using **dir()** we will check if it has \\_\\_iter\\\
    _\\_ method or not. If this method exists then that thing becomes iterable.\n\n\
    ```python\na = [4,3,2,1]\nprint(dir(a))\n```\n\nAnd when we observe the output\
