    \ So, tuples do not have a remove and pop attribute. But it does support del command,\
    \ though item deletion is not possible. Obviously, we can delete a record. We\
    \ can summarize the difference between list and tuple as follows.\n\n- List has\
    \ **append** and **extend** attributes, tuple has not.\n- List has remove and\
