    \nTypeError: 'list' object is not an iterator\n```\n\n哎呀！！发生了一个错误。如果列表变成了迭代器，那么它也应该有\
    \ **next()** 属性，以便它可以迭代 **下一个** 值。让我先将这个传递给另一个变量，然后打印它。\n\n```python\na = [4,3,2,1]\n\
    b = iter(a)\nprint(dir(b))\n```\n\n```\n['__doc__', '__eq__', '__format__', '__ge__',\
    \ '__getattribute__', '__gt__', '__iter__', '__le__', '__length_hint__', '__lt__',\
    \ '__ne__', '__new__', '__next__', '__setattr__', '__setstate__', '__sizeof__',\
