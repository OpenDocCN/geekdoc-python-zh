    <ipython-input-19-6b8d2ca016f0>\n     9 print(next(a))\n    10 print(next(a))\n\
    ---> 11 print(next(a))\n\nStopIteration:\n```\n\n会发生停止迭代错误。这意味着生成器已经耗尽，因为列表中没有更多的值来生成下一个值了。有一个更好的方法来编写这么多\
    \ **next** 语句，那就是使用 **for 循环**。\n\n```python\ndef sq_num(my_list):\n    for i\
    \ in my_list:\n        yield (i*i)\n\na = sq_num([4,3,2,1])\nfor x in a:\n   \
    \ print (x, end = ' ')\n```\n\n```\n16 9 4 1\n```\n\n这将检查给定列表中所有元素的值并打印结果。基本上，我们在上一章用迭代器得到的东西，现在用生成器也能得到。但在这里，我们对输出的执行有了更多的控制。\n\
    我们也可以像列表推导式一样编写生成器推导式。有两点需要记住。第一，使用普通圆括号而不是方括号。第二，我们知道生成器一次只会给出一个值，所以为了获取下一个结果，我们需要再次编写\
