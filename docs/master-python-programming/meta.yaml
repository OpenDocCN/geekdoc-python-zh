    3000\"也可以使用`int(\"3000\")`转换为整数。但如果我们赋值`int(\"Steve\")`会怎样呢？类型是正确的，因为`int()`可以接受整数和字符串。但值是错误的，因为`int()`不知道应该将什么值赋给Steve。这将引发值错误。\n\
    \n下表总结了我们最常遇到的一些**常见错误**：\n\n| 异常 | 描述 |\n| --- | --- |\n| **断言错误** | 当断言语句失败时引发。\
