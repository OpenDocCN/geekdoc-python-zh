    \ |\n| **键盘中断** | 当用户按下中断键（Ctrl+c或delete）时引发。 |\n| **内存错误** | 当操作耗尽内存时引发。 |\n\
    | **名称错误** | 当在局部或全局作用域中找不到变量时引发。 |\n| **未实现错误** | 由抽象方法引发。 |\n| **操作系统错误** |\
