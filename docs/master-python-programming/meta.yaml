    ## partition(<sep>)


    It splits the string when <sep> encounters for the first time. The output is a
    collection of tuples, string before <separator>, <separator>, string after <separator>.


    ## rpartition(<sep>)


    It splits the string when <sep> encounters as last occurrence. The output is a
    collection of tuples, string before <separator>, <separator>, string after <separator>.


    ```

    richest_avenger = ''Tony@Iron@Man''.partition(''@'')

    print(richest_avenger)

    oldest_avenger = ''Steve@Captain@America''.rpartition(''@'')

    print(oldest_avenger)

