    is the value we want to get. Since, 4 was not in the avengers dictionary, it returned
    what we specified. But also remember that the original dictionary is not affected.

    We can have a set of keys with the same values assigned using the **fromkeys ()**
    method.


    ```

    >>> avengers.fromkeys((''Tony'',''Steve'',''Thor''),''Avengers'')

    {''Tony'': ''Avengers'', ''Steve'': ''Avengers'', ''Thor'': ''Avengers''}

    ```


    Can we have multiple value assignments possible?


