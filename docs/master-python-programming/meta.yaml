- md: "## How to convert a List into a Dictionary?\n\nA dictionary has two items:\
    \ Key and Value. The first requirement will be a meaningful list which you want\
    \ to convert into a dictionary. Let's make a two element list first.\n\n```\n\
    >>>\n>>> avengers = ['Tony', 'IronMan']\n>>> avengers\n['Tony', 'IronMan']\n>>>\n\
    ```\n\nOK. So, we know that Tony is Iron Man. Let the name be Key and the superhero\
    \ identity is its value. We want them together. To stick them together we use\
    \ **zip ()** function. The function **zip ()** needs two parameters at least.\
    \ What **zip ()** do, it zip the two unzipped parts together. We need slicing\
    \ as well. Let's check for our list, which for zip is like passing a single argument.\
    \ Let's understand this thing deeply.\n\n```\n>>>\n>>> list(zip(avengers))\n[('Tony',),\
    \ ('IronMan',)]\n>>>\n```\n\nWhat happened? This **zip ()** function gives the\
    \ output as tuple value of (x, y). The tuple value x is Tony but there is no y\
    \ in our list. Similarly, another value of x is Ironman with no y value. Actually,\
    \ there should be two lists to have values of x and y. Let's take another example.\n\
    \n```\n>>>\n>>> non_hero_name = ['Tony', 'Steve', 'Bruce']\n>>> hero_name = ['IronMan',\
    \ 'Captain America', 'Hulk']\n>>> avengers = zip(non_hero_name, hero_name)\n>>>\
    \ avengers\n<zip object at 0x026A0DA8>\n>>>\n```\n\nNow, look at this code. Here,\
    \ we have a value x as non_hero_name and a value y as hero_name. But we can’t\
    \ see any output. We need a list () to print the output of the **zip ()** function.\n\
    \n```\n>>>\n>>> list(zip(avengers))\n[('Tony', 'IronMan'), ('Steve', 'Captain\
    \ America'), ('Bruce', 'Hulk')]\n>>>\n```\n\nYou can observe the tuple pair has\
    \ been created by the **zip ()** function, telling you which two pairs are going\
    \ to be key- value pairs, although the actual dictionary is not created yet. Let’s\
    \ create the actual dictionary format now. There are many ways. The first one\
    \ is using the basic method of **dict ()** function with **zip ()** function.\n\
    \n```\n>>>\n>>> non_hero_name = ['Tony', 'Steve', 'Bruce']\n>>> hero_name = ['IronMan',\
    \ 'Captain America', 'Hulk']\n>>> avengers = dict(zip(non_hero_name, hero_name))\n\
    >>> avengers\n{'Tony': 'IronMan', 'Steve': 'Captain America', 'Bruce': 'Hulk'}\n\
    >>>\n```\n\nSimple pass the two arguments with zip function and then convert them\
    \ into a dictionary. We can also use a for loop.\n\n```\n>>>\n>>> for n,h in zip(non_hero_name,\
    \ hero_name):\n        print(f'non_hero_name: {n}')\n        print(f'hero_name:\
    \ {h}')\n```\n\n```\nnon_hero_name: Tony\nhero_name: IronMan\nnon_hero_name: Steve\n\
    hero_name: Captain America\nnon_hero_name: Bruce\nhero_name: Hulk\n```\n\nWe have\
    \ taken two variables **n** and **h** representing **non_hero_name** and **hero_name**\
    \ lists. The **zip ()** function will zip the two parameters. For single value\
    \ parameters, string slicing is also used.\n\n```\n>>>\n>>> avengers = ['Tony',\
    \ 'IronMan']\n>>> dict(zip(avengers[0::2], avengers[1::2]))\n{'Tony': 'IronMan'}\n\
    >>>\n```\n\nIf we perform the simple string slicing then we can understand what\
    \ this function is doing.\n\n```\n>>>\n>>> avengers[0::2]\n['Tony']\n>>>\n>>>\
    \ avengers[1::2]\n['IronMan']\n>>>\n```\n\nI think its self-understandable now.\
    \ And then, we'll zip the two parts using the zip () function. So, after understanding\
    \ the zipping concept, there is one more concept to look out for: Unzipping the\
    \ zipped items. It's very simple. Use the unpacking operator * with zip command\
    \ to unzip. But after unzipping two values will be extracted: key and its value.\
    \ So to accommodate these two values, there should be two variables assigned.\
    \ Let’s check this thing.\n\n```\n>>>\n>>> avengers = [('Tony', 'IronMan'), ('Steve',\
    \ 'Captain America'), ('Bruce', 'Hulk')]\n>>> non_hero, hero = zip(*avengers)\n\
    >>> non_hero\n('Tony', 'Steve', 'Bruce')\n>>> hero\n('IronMan', 'Captain America',\
    \ 'Hulk')\n>>>\n```\n\nLet’s make a dictionary comprehension as well. I have two\
    \ lists. One has names of heros and the other has their superhero identity. Let’s\
    \ make a dictionary where name will be the key and super hero identity will be\
    \ the value. It’s similar to the list comprehension. Only difference will be that\
    \ here we will use curly braces.\n\n```\nnames = ['Tony','Steve','Bruce']\nheros\
    \ = ['Iron Man','Captain America','Hulk']\ndict_com = {reel_name:super_hero_name\
    \ for reel_name, super_hero_name in zip(names,heros)}\nprint(dict_com)\n{'Tony':\
    \ 'Iron Man', 'Steve': 'Captain America', 'Bruce': 'Hulk'}\n```\n\nThis is all\
    \ about the basic dictionary. We can now move to the last of the four features:\
    \ Sets.\n\n## Chapter 7\n\n## Sets\n\nSets are unordered, lists of elements which\
    \ are unique and duplicate elements are not allowed. A set can be modified, but\
    \ the elements contained in the set must be of an immutable type, such as list,\
    \ string or tuple.\n\nHow to write a set?\nSets can be written using two types.\n\
    \n- Using **set ()** function.\n- Using curly braces.\n\nLet’s check them one\
    \ by one. First create a set using **set ()** function.\n\n```\n>>>\n>>> hero_name\
    \ = ['IronMan', 'Captain America', 'Hulk']\n>>> type(hero_name)\n<class 'list'>\n\
    >>> hero_name = set(['IronMan', 'Captain America', 'Hulk'])\n>>> type(hero_name)\n\
    <class 'set'>\n>>>\n```\n\nI have passed a list in the set function. Once set\
    \ is created you check the datatype using the type command. I have also created\
    \ the list to differentiate among the two.\n\n```\n>>>\n>>> hero_name = ('IronMan',\
    \ 'Captain America', 'Hulk')\n>>> type(hero_name)\n<class 'tuple'>\n>>> hero_name\
    \ = set(('IronMan', 'Captain America', 'Hulk'))\n>>> type(hero_name)\n<class 'set'>\n\
    >>>\n```\n\nThis time I have created another set from a tuple list. Both list\
    \ and tuple are immutable. Let's check for strings also.\n\n```\n>>>\n>>> hero_name\
    \ = 'IronMan, Captain America, Hulk'\n>>> type(hero_name)\n<class 'str'>\n>>>\
    \ hero_name = set('IronMan, Captain America, Hulk')\n>>> type(hero_name)\n<class\
    \ 'set'>\n>>>\n```\n\nOK. After creating a set, let's check the output of the\
    \ set.\n\n```\n>>>\n>>> rich_avenger = 'Tony aka Iron Man'\n>>> set(rich_avenger)\n\
    {'I', ' ', 'T', 'a', 'n', 'o', 'y', 'r', 'M', 'k'}\n>>>\n```\n\nThe output of\
    \ the set is like a list. A better comparison can be done with the list itself.\n\
    \n```\n>>>\n>>> list(rich_avenger)\n['T', 'o', 'n', 'y', ' ', 'a', 'k', 'a', '\
    \ ', 'I', 'r', 'o', 'n', ' ', 'M', 'a', 'n']\n>>>\n```\n\nNow one can observe\
    \ the difference. Set has no elements repeated, not even space. And the elements\
    \ are arranged unordered. A list has an ordered set of repeated elements.\nNow,\
    \ let's create a set by using another method: Using the curly braces.\n\n```\n\
    >>>\n>>> hero_name = {'IronMan', 'Captain America', 'Hulk'}\n>>> type(hero_name)\n\
    <class 'set'>\n>>>\n```\n\nSimply using curly braces without writing set commands\
    \ will convert the given entity into a set. But what about an empty curly bracket?\n\
    \n```\n>>>\n>>> thanos_snap = {}\n>>> type(thanos_snap)\n<class 'dict'>\n>>>\n\
    ```\n\nNow this is the thing to remember. An empty curly brace returns the dictionary.\
    \ The only way to describe an empty set is using **set ()** function.\n\n```\n\
    >>>\n>>> thanos_snap = set()\n>>> type(thanos_snap)\n<class 'set'>\n>>>\n```\n\
    \n## Operations on Set\n\nThe length of the set can be calculated using **len\
    \ ()** function.\n\n```\n>>>\n>>> hero_name = {'IronMan', 'Captain America', 'Hulk'}\n\
    >>> len(hero_name)\n3\n>>>\n```\n\nThe membership operators **in** and **not in**\
    \ works with sets as well.\n\n```\n>>>\n>>> 'IronMan' in hero_name\nTrue\n>>>\
    \ 'Nebula' in hero_name\nFalse\n>>>\n```\n\n## Union in Sets\n\nTwo sets can be\
    \ joined together using **union** function, or by using “|” sign. Let’s check.\n\
    \n```\n>>>\n>>> hero_name = {'IronMan', 'Captain America', 'Hulk'}\n>>> non_hero_name\
    \ = {'Tony', 'Steve', 'Bruce'}\n>>> hero_name | non_hero_name\n{'Steve', 'Tony',\
    \ 'IronMan', 'Captain America', 'Bruce', 'Hulk'}\n>>>\n>>> hero_name.union(non_hero_name)\n\
    {'Steve', 'Tony', 'IronMan', 'Captain America', 'Bruce', 'Hulk'}\n>>>\n```\n\n\
    That’s good. OK. One thing again is observable. The elements are arranged unordered.\
    \ Here, one task you can perform is to check the final set when both these sets\
    \ have any name common, say, Nebula. A question can come in mind that are **union**\
    \ and “ | ” the same thing? (I know this question never came to mind. But now,\
    \ it has been). Now this is an important topic to discuss. This **union** is a\
    \ method and “ | “ is an operator. It’s an interview question actually which asks\
    \ are method and operator the same thing? We just checked this thing by code.\
    \ Let’s do some more coding."
