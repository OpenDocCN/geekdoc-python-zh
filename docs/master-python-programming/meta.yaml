  md: "```\npython\ndef rec_fact(n):\n    if n == 0:\n        return 1\n    return\
    \ n * rec_fact(n-1)\n\nresult = rec_fact(5)\nprint(result)\n```\n\n120\n\nSo,\
    \ we can define recursion as a process in which a function breaks down into smaller\
    \ problems, and it keeps calling itself for each of the smaller problems until\
    \ a base case is reached. Like here, the base case is **1 !**. What does a non-\
    \ recursive or general iterative factorial function look like?\n\n```\npython\n\
    def iter_fact(n):\n    if n == 0:\n        return 1\n    else:\n        fact =\
    \ 1\n        for i in range(1, n+1):\n            fact *= i\n        return fact\n\
    \nresult = iter_fact(5)\nprint(result)\n```\n\n120\n\nIt's a general function.\
    \ There are some differences between iteration and recursion.\n\n+   - Recursion\
    \ requires more memory.\n- In many languages Iteration is a much faster approach.\n\
    - Recursion sometimes can be a more abstract and harder approach to understand."
