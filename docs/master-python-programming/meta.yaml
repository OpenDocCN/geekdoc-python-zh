    # Python String Concatenation


    Concatenation literally means, to join things together. The first form of concatenation
    is by simply writing strings in quotes. Two or more individually quoted strings
    separated by space when printed are automatically concatenated.


    ```

    avenger = ''Tony'' ''Stark''

    print(avenger)


    Tony Stark

    ```


    But do remember that this works only with strings and not with any combination
    of data types. We cannot concatenate integers with string using this. The concatenation
    using operators is achieved by ''+'' and ''*'' sign.


    ```

    >>> iron_man = ''I am''

    >>> iron_man_2 = ''Iron Man''

    >>> iron_man + iron_man_2

    ''I amIron Man''

    ```


    Good. The two strings are concatenated. But you can see that we can make it more
    readable. If we give space inside a quote before writing Iron Man, maybe we can
    achieve what we want. Let''s check.


    ```

    >>> iron_man_2 = '' Iron Man''

    >>> iron_man + iron_man_2

    ''I am Iron Man''

    ```


    We can also multiply strings using ''*'' sign. But what will a multiplied string
    look like?'
