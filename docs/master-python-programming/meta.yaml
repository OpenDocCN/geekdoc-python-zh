- md: "## Chapter 6\n\n## Dictionary\n\nDictionary is yet another data type which\
    \ has a key and a value. It is like an associative array. The value is associated\
    \ with its key. Unlike strings, lists and tuples which are sequence types, because\
    \ their items have order of occurrence and where indexes are used to access the\
    \ values, in a Dictionary, key is used to access the values. Keys are mapped to\
    \ the values and hence, sometimes, Dictionaries are also termed as Mapped Type.\
    \ The keys are immutable. It can be int or string but cannot be a list.\n\n###\
    \ How to write a Dictionary?\n\nA dictionary is denoted by curly braces having\
    \ key and value separated by a colon. This is known as Key- Value pair. The syntax\
    \ looks something like this, **{Key: Value}**. Depending on the data type, the\
    \ Key or/and Value can be written inside quotes. Let’s make one dictionary.\n\n\
    ```\n>>> my_dict = {}\n>>> type(my_dict)\n<class 'dict'>\n```\n\nThis creates\
    \ an empty dictionary. It’s always good practice to check the datatype by using\
    \ type () command whenever you are learning something new. Now, let’s add key\
    \ and value in this empty directory.\n\n```\n>>> my_dict['Iron Man'] = 'Tony Stark'\n\
    >>> my_dict['Hulk'] = 'Dr. Bruce Banner'\n>>> my_dict\n{'Iron Man': 'Tony Stark',\
    \ 'Hulk': 'Dr. Bruce Banner'}\n>>> type(my_dict)\n<class 'dict'>\n```\n\nGood!!!\
    \ So, we have created our first dictionary. The string before colon is called\
    \ key and after colon is called the value associated with that key. All enclosed\
    \ in curly braces. We can also directly assign key- value pairs in a single line.\n\
    \n```\n>>> avengers = {1:'Tony', 2:'Steve'}\n>>> avengers\n{1: 'Tony', 2: 'Steve'}\n\
    ```\n\nIn this code, 1 and 2 are keys having values as Tony and Steve respectively.\
    \ Let’s access anything from a dictionary.\n\n```\n>>> avengers[2]\n'Steve'\n\
    >>> avengers[Tony]\nTraceback (most recent call last):\n  File \"<pyshell#23>\"\
    , line 1, in <module>\n    avengers[Tony]\nNameError: name 'Tony' is not defined\n\
    ```\n\nSo, we can only access the values using the key and not the vice versa.\
    \ What about the order of occurrence? As we saw that we assessed the value using\
    \ the key and not with the index position, therefore, in the dictionary, key-\
    \ value pair order does not matter. And therefore, a dictionary can be an unordered\
    \ collection of elements. And that’s why, slicing and indexing is not supported\
    \ in a dictionary. So what else can be done with a dictionary?\n\n### Dictionary\
    \ Functions\n\n```\n>>> avengers = {1:'Tony', 2:'Steve', 3:'Thanos'}\n>>> del\
    \ avengers[3]\n>>> avengers\n{1: 'Tony', 2: 'Steve'}\n```\n\nOK. So, delete works\
    \ for the dictionary. Using the del function followed by a dictionary name with\
    \ key will delete that particular key- value pair. Obviously, Thanos is not an\
    \ avenger!!! What if there are two similar keys?\n\n```\n>>> avengers = {1:'Tony',\
    \ 2:'Steve', 3:'Thanos', 3:'Thor'}\n>>> del avengers[3]\n>>> avengers\n{1: 'Tony',\
    \ 2: 'Steve'}\n```\n\nBoth similar key- value pairs are deleted. But I want Thor\
    \ in the dictionary.\n\n```\n>>> avengers[3] = 'Thor'\n>>> avengers\n{1: 'Tony',\
    \ 2: 'Steve', 3: 'Thor'}\n```\n\nWhat if we have two similar keys in the dictionary?\n\
    \n```\n>>> avengers = {1:'Tony', 2:'Steve', 3:'Thanos', 3:'Thor'}\n>>> avengers\n\
    {1: 'Tony', 2: 'Steve', 3: 'Thor'}\n```\n\nSo if the similar keys are present\
    \ then the last one will be included. We can also count the number of elements\
    \ present in the dictionary. len() function will help.\n\n```\n>>> len(avengers)\n\
    3\n```\n\nIt returns the number of key- value pairs.\n\n### Dictionary Methods\n\
    \nThere are some powerful methods dictionaries use. The first method is called\
    \ keys (). This method returns what is known as a view of the underlying keys.\
    \ A view object is quite similar to the range object. We can also iterate over\
    \ the view object.\n\nThis is packing tuples. You can also observe that, this\
    \ tuple is a collection of homogeneous elements.\nBy tuple unpacking, we mean\
    \ that the values in a tuple on the right are ‘unpacked’ into the variables/names\
    \ on the right:\n\n```\n>>> (Iron_Man, Captain_America, Black_Widow, Hulk) = avengers\n\
    >>> Iron_Man\n'Tony'\n>>> Captain_America\n'Steve'\n>>> Black_Widow\n'Natasha'\n\
    >>> Hulk\n'Bruce'\n```\n\nThis is quite impressive. The left tuple has been assigned\
    \ with the values of the right tuple. Any constraints? Yes, the left and right\
    \ tuple names should be the same. Here, the name is avengers.\n\n```\n>>> (Iron_Man,\
    \ Captain_America, Black_Widow, Hulk) = not_avengers\nTraceback (most recent call\
    \ last):\n  File \"<pyshell#18>\", line 1, in <module>\n    (Iron_Man, Captain_America,\
    \ Black_Widow, Hulk) = not_avengers\nNameError: name 'not_avengers' is not defined\n\
    ```\n\nIf the name is different, Name Error will come as shown above.\nApplication?\
    \ Python provides a powerful feature of multiple assignments in a single line,\
    \ such as swapping of two numbers, or assigning values to multi-variables in a\
    \ single line. This we have seen in earlier chapters. Let’s explore it more.\n\
    \n```\na, b = 4, 5\nprint(a, b)\n```\n\n4 5\n\nThe value of 4 is assigned to **a**,\
    \ and 5 is assigned to **b**. What if, there are more variables and fewer values.\n\
    \n```\na, b, c = 4, 5\nprint(a, b, c)\n```\n\n```\n---------------------------------------------------------------------------\n\
    ValueError                                Traceback (most recent call last)\n\
    <ipython-input-38-4a30644578be> in <module>\n----> 1 a, b, c = 4, 5\n      2 print(a,\
    \ b, c)\n\nValueError: not enough values to unpack (expected 3, got 2)\n```\n\n\
    It will give an error. But look at the statement. It says that there are not enough\
    \ values to **unpack**. There are 3 variables but there are not enough values\
    \ to assign to these variables. Let's check what will be the output if there are\
    \ more values and fewer variables?\n\n```\na, b, c = 4, 5, 6, 7\nprint(a, b, c)\n\
    ```\n\n```\n---------------------------------------------------------------------------\n\
    ValueError                                Traceback (most recent call last)\n\
    <ipython-input-39-2ebc390c35ac> in <module>\n----> 1 a, b, c = 4, 5, 6, 7\n  \
    \    2 print(a, b, c)\n\nValueError: too many values to unpack (expected 3)\n\
    ```\n\nIt says that there are too many values to **unpack** and there are less\
    \ variables. There are two ways to overcome this situation. One is to use the\
    \ sign of underscore.\n\n```\na, b, c, _ = 4, 5, 6, 7\nprint(a, b, c, _)\n```\n\
    \n4 5 6 7\n\nHere, underscore is acting like a variable and you can also print\
    \ it. Another way is to use * as prefix with the variable.\n\n```\na, b, *c =\
    \ 4, 5, 6, 7, 8, 9, 10\nprint(a, b, c)\n```\n\n4 5 [6, 7, 8, 9, 10]\n\nIf there\
    \ are 3 variables and an asterisk sign is written with the 3rd variable, then,\
    \ no matter how many values are there, 1st and 2nd values are assigned to 1st\
    \ two variables, and all remaining values will be assigned to the third variable.\
    \ Let's check for one more example.\n\n```\n*a, b, c = 4, 5, 6, 7, 8, 9, 10\n\
    print(a, b, c)\n```\n\n[4, 5, 6, 7, 8] 9 10\n\nHere, the asterisk is with the\
    \ first variable. Hence, the first 5 values are assigned to the first variable,\
    \ and the next two values are assigned to the first two variables respectively.\
    \ All this is possible because of tuple packing and unpacking. Another important\
    \ application of tuple packing and unpacking is returning multiple values in a\
    \ function.\n\n```\npython\nimport math\ndef circle(rad):\n    cir = 2 * math.pi\
    \ * rad\n    area = math.pi * rad * rad\n    return (cir, area)\n\nrad = int(input(\"\
    Enter the radius value:\"))\nprint(\"The circumference and area are:\",circle(rad))\n\
    \nEnter the radius value:5\nThe circumference and area are: (31.41592653589793,\
    \ 78.53981633974483)\n```\n\nOne can observe that we have passed two values in\
    \ the return statement. This is possible using tuple packing features. Before\
    \ completing this topic of tuple, one last question is how we convert a list into\
    \ a tuple and vice versa. For this, we use tuple () and list () commands respectively.\n\
    \n```\npython\n>>> my_list = ['Tony', 'Thanos', 'Cap']\n>>> type(my_list)\n<class\
    \ 'list'>\n>>> tuple(my_list)\n('Tony', 'Thanos', 'Cap')\n```\n\nTuple () changes\
    \ the list into a tuple. Similarly, we can change a tuple into a list using a\
    \ list command.\n\n```\npython\n>>> my_tuple = ('Tony', 'Thanos', 'Cap')\n>>>\
    \ type(my_tuple)\n<class 'tuple'>\n>>> my_list = list(my_tuple)\n>>> my_list\n\
    ['Tony', 'Thanos', 'Cap']\n>>> type(my_list)\n<class 'list'>\n```\n\nThis is all\
    \ about tuples. We can move forward to another important feature of Dictionaries\
    \ in python."
  mdcn: "## 第六章\n\n## 字典\n\n字典是另一种具有键和值的数据类型。它类似于关联数组。值与其键相关联。与字符串、列表和元组这些序列类型不同，因为它们的元素有出现顺序，并且使用索引来访问值，而在字典中，使用键来访问值。键映射到值，因此，有时字典也被称为映射类型。键是不可变的。它可以是整数或字符串，但不能是列表。\n\
    \n### 如何编写字典？\n\n字典用花括号表示，其中键和值用冒号分隔。这被称为键-值对。语法看起来像这样，**{键: 值}**。根据数据类型，键和/或值可以写在引号内。让我们创建一个字典。\n\
    \n```\n>>> my_dict = {}\n>>> type(my_dict)\n<class 'dict'>\n```\n\n这会创建一个空字典。在学习新东西时，使用\
    \ `type()` 命令检查数据类型总是一个好习惯。现在，让我们在这个空字典中添加键和值。\n\n```\n>>> my_dict['Iron Man']\
    \ = 'Tony Stark'\n>>> my_dict['Hulk'] = 'Dr. Bruce Banner'\n>>> my_dict\n{'Iron\
    \ Man': 'Tony Stark', 'Hulk': 'Dr. Bruce Banner'}\n>>> type(my_dict)\n<class 'dict'>\n\
    ```\n\n很好！！！这样，我们就创建了第一个字典。冒号前的字符串称为键，冒号后的字符串称为与该键关联的值。所有内容都包含在花括号中。我们也可以在一行中直接赋值键-值对。\n\
    \n```\n>>> avengers = {1:'Tony', 2:'Steve'}\n>>> avengers\n{1: 'Tony', 2: 'Steve'}\n\
    ```\n\n在这段代码中，1 和 2 是键，其值分别为 Tony 和 Steve。让我们从字典中访问任何内容。\n\n```\n>>> avengers[2]\n\
    'Steve'\n>>> avengers[Tony]\nTraceback (most recent call last):\n  File \"<pyshell#23>\"\
    , line 1, in <module>\n    avengers[Tony]\nNameError: name 'Tony' is not defined\n\
    ```\n\n所以，我们只能使用键来访问值，而不能反过来。那么出现顺序呢？正如我们所看到的，我们是通过键而不是索引位置来访问值的，因此，在字典中，键-值对的顺序无关紧要。因此，字典可以是元素的无序集合。这就是为什么字典不支持切片和索引。那么字典还能做什么呢？\n\
    \n### 字典函数\n\n```\n>>> avengers = {1:'Tony', 2:'Steve', 3:'Thanos'}\n>>> del avengers[3]\n\
    >>> avengers\n{1: 'Tony', 2: 'Steve'}\n```\n\n好的。所以，`del` 对字典有效。使用 `del` 函数后跟字典名和键将删除该特定的键-值对。显然，灭霸不是复仇者！！！如果有两个相同的键会怎样？\n\
    \n```\n>>> avengers = {1:'Tony', 2:'Steve', 3:'Thanos', 3:'Thor'}\n>>> del avengers[3]\n\
    >>> avengers\n{1: 'Tony', 2: 'Steve'}\n```\n\n两个相同的键-值对都被删除了。但我想让雷神留在字典里。\n\n\
    ```\n>>> avengers[3] = 'Thor'\n>>> avengers\n{1: 'Tony', 2: 'Steve', 3: 'Thor'}\n\
    ```\n\n如果字典中有两个相同的键会怎样？\n\n```\n>>> avengers = {1:'Tony', 2:'Steve', 3:'Thanos',\
