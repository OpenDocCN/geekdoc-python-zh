    >>> avengers.fromkeys((''Tony'',''Steve'',''Thor''),(''Rich Avenger'',''Oldest
    Avenger'',''GOD Avenger''))

    {''Tony'': (''Rich Avenger'', ''Oldest Avenger'', ''GOD Avenger''), ''Steve'':
    (''Rich Avenger'', ''Oldest Avenger'', ''GOD Avenger''), ''Thor'': (''Rich Avenger'',
    ''Oldest Avenger'', ''GOD Avenger'')}

    ```


    OK!! Not what we expected. But it shows that a key can have multiple values. Let''s
    add some elements in our dictionary. For this we have an **update ()** function
    in the dictionary.


    ```

    >>> avengers = {1:''Tony'', 2:''Steve'', 3:''Thor''}

    >>> avengers

    {1: ''Tony'', 2: ''Steve'', 3: ''Thor''}

    >>> avengers.update({4:''Hawkeye''})

    >>> avengers

    {1: ''Tony'', 2: ''Steve'', 3: ''Thor'', 4: ''Hawkeye''}

    ```


    Note that we have to use the curly braces while updating. However, if your key
    is string, you can directly append the value without using curly braces. Let''s
    check this thing now with and without curly braces.


    ```

    >>> avengers.update({''Thanos'':5})

    >>> avengers

    {1: ''Tony'', 2: ''Steve'', 3: ''Thor'', 4: ''Hawkeye'', ''Thanos'': 5}

