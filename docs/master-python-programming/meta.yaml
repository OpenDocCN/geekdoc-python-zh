    # Match Object


    A Match Object is object containing information about the search and the result.
    There are some attributes related to **search** operation:

    .span () returns a tuple containing the start-, and end positions of the match.

    .string returns the string passed into the function

    .group () returns the part of the string where there was a match (We will learn
    this function in detail on last day of our course)


    # Write a program to search for an upper case character in the beginning of a
    word, and print its position.


    For example the string is “**I am Iron Man**”. The task is to find the position
    of, say, letter M of word Man. What should be the approach?

    1. Check for the 1st character of the string. For example, the 1st word here is
    not M. It’s I. So, I can’t use ^ or \A.

    2. Referring **Table 1** again. There are two special sequence \b and \w.

    3. \b returns a match where the specified characters are at the beginning or at
    the end of a word.

    4. \w returns a match where the string contains any word characters

    5. Finally, using .span () will do the job.


    ```

    import re


    my_str = "I am Iron Man"

    result = re.search(r"\bM\w+", my_str)

    print(result.span())

    ```


    (10, 13)'
