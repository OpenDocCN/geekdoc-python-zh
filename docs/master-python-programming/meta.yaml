    \ and by using **double underscore next method** they get their next value. If\
    \ we see here in the output then there is no next method. Hence, a list has no\
    \ state to check the next value and that's why a list is not an iterator.\n\n\
    ```python\na = [4,3,2,1]\nprint(a.__next__())\n```\n\n```\n---------------------------------------------------------------------------\n\
    AttributeError                            Traceback (most recent call last)\n\
