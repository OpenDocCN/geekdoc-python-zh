  md: 'We should try 1 more thing. Do non-digits mean everything except digits or
    it only means alphabets? What about any special character?


    ```

    import re

    pattern = re.compile(r""")

    my_string = input("Enter a string: ")

    pattern = re.compile(r"\D+")

    result = pattern.sub("_",my_string)

    print(result)


    Enter a string: tony@123

    _123

    ```


    If we see, the special character @ is also substituted by underscore. That''s
    great. That''s what non-digit actually means. Like \d is equivalent to [0-9],
    \D is equivalent to [^0-9], where ^ sign can be ''treated'' as **negation**, here.
    So, replacing \D with [^0-9] will give same result.


    ```

    import re

    pattern = re.compile(r""")

    my_string = input("Enter a string: ")

    pattern = re.compile(r"[^0-9]+")

    result = pattern.sub("$",my_string)

    print(result)


    Enter a string: 123tony456

    123$456

    ```


    Now, we are familiar with \d and \D with **sub** function. What if someone says
    to find out all the digits in the input string? We know that for digits we will
    use \d. To find all digits, RegEx gives a function called *findall*.'
