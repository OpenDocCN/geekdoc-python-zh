    # ^ And $


    ^, and, $ are **boundaries**. ^ marks the start and is also known as Hat, while
    $ marks the end of a regular expression. These are very handy syntax to play with.
    **Wait a while…** ^ used earlier denoted negation. Then, here it is being mentioned
    as starting point of a regular expression. When used in square brackets [^…] it
    means **not**. Let’s do some program to justify our statements.'
