    **id ()** 是 **Python** 中的一个内置函数。它用于返回对象的 **身份标识**。这个 **身份标识** 在对象的生命周期内必须是唯一且恒定的。两个生命周期不重叠的对象可能具有相同的
    **id ()** 值。它类似于 C 语言编程中的内存分配。


    ## 这个“生命周期”是什么意思？


    如前所述，当一个对象被赋值给一个变量时，该对象通过其名称被引用。但数据本身仍然包含在对象中。例如，当我们写 **a = 100** 时，这个赋值创建了一个值为
    100 的整数对象，并将变量 **a** 指向该对象。


    ![](img/967252070c1bdd582017a9d325617e34_40_0.png)


    当这个变量被赋值给另一个变量时，比如 **a = b**，并不会创建另一个对象，而是创建了一个指向同一对象的新变量或引用。


    ![](img/967252070c1bdd582017a9d325617e34_41_0.png)


    当同一个对象被赋值给另一个变量，但这样写时：**b = 100**。那么，会创建一个指向另一个对象的新引用。


    ![](img/967252070c1bdd582017a9d325617e34_41_1.png)


    但是当这个变量 **a** 被赋予另一个对象时，**a = 101**，那么它看起来就像这样，


    ![](img/967252070c1bdd582017a9d325617e34_41_2.png)


    现在对象 100 没有引用了，也无法访问它。这在技术上被称为孤立对象。只要至少有一个引用指向一个对象，该对象就是存活的。当引用为零时，可访问性就为零。这段时间被称为任何对象的生命周期。Python
    检测到它不可访问，并回收分配的内存，以便将其用于其他用途。在计算机语言中，这被称为垃圾回收。


    在 Python 中，每个对象在创建时都会被赋予一个唯一标识它的数字。必须确保在任何生命周期重叠的时期内，没有两个对象具有相同的标识符。但正如你刚才观察到的，当它失败时，你可能会得到不理想的结果。但这不是你的错。幸运的是，解释器足够智能。所以，如果你觉得你的代码是正确的，但它的行为不同，比如上面的例子，请检查它的身份标识。


    ## 运算符优先级


    运算符优先级是指哪个运算符应该先被求值。当两个运算符共享一个操作数时，具有更高 *优先级* 的运算符将先执行。Python 遵循 **PEMDAS**（括号-指数-乘法-除法-加法-减法）的标准优先级规则，其中
    **括号** 优先级最高，**减法** 优先级最低。优先级表如下：


    | 运算符 | 操作 |

    | :--- | :--- |

    | ** | **指数** |

    | ~, +, - | 按位取反、一元加和减 |

    | *, /, %, // | 乘、除、取模、整除 |

    | +, - | 二元加和减 |

    | >>, << | 左移和右移 |

    | & | 按位与 |

    | ^, \| | 按位异或、或 |

    | <=, <, >, >= | 比较运算符 |

    | <, >, ==, != | 相等运算符 |

    | =, %=, /=, //=, -=, +=, *=, **= | 赋值运算符和增强赋值运算符 |

    | is, is not | 身份运算符 |

    | in, not in | 成员运算符 |

    | not, or, and | 逻辑运算符 |


    但是，如果两个运算符共享一个操作数，并且运算符具有相同的优先级呢？例如，**a ** b ** c** 应该如何求值？是 **(a ** b) ** c**
    还是 **a ** (b ** c)**？


    ```

    print(''Without Parenthesis:'', 2**5**2)

    ```


    Without Parenthesis: 33554432


    ```

    print(''With Parenthesis:'', (2**5)**2)

    ```


    With Parenthesis: 1024


    这被称为运算符的结合性。求值顺序通常在函数参数中是从左到右。赋值和比较运算符是非结合的。


    Python 在求值涉及 **and** 或 **or** 运算符的表达式时，也会使用 *短路求值*。当涉及这些运算符时，除非有必要确定结果，否则 Python
    不会求值第二个操作数。


    有时，运算符的优先级并不遵循标准的数学规范。在数学中，-1^2 的结果是 1。它被计算为 (-1) ^2，而不是 - (1^2)。这个规则对于所有 C 运算符（其中一元运算符的优先级高于二元运算符）都符合数学惯例，但在添加指数运算符后就不适用了。极客们称之为“设计选择”。不用担心！！熟能生巧。


    ## Python 中的转义序列


    在 Python 字符串中，反斜杠 \ 是一个特殊字符，也称为转义字符。它用于表示某些空白字符：\t 是制表符，\n 是换行符，\r 是回车符。相反，在特殊字符前加上
    \ 会将其转换为普通字符。

    当存在 ''r'' 或 ''R'' 前缀时，反斜杠后面的字符将原样包含在字符串中，所有反斜杠都保留在字符串中。我们稍后将在字符串中使用这些，但这里，我们将对它们的工作原理进行一些概述。Python
    中有效的转义字符是，


    | 运算符 | 操作 |

    | :--- | :--- |

    | \'' | **字符字面量的单引号** |

    | \" | **字符串字面量的双引号** |

    | \\ | **字符串字面量的反斜杠** |

    | \0 | **Unicode 字符 0** |

    | \a | **警报** |

    | \b | **退格** |

    | \f | **换页** |

    | \n | **换行** |

    | \r | **回车** |

    | \t | **水平制表符** |

    | \v | **垂直制表符** |

    | \xhh | **使用十六进制表示匹配一个 ASCII 字符（恰好两位数字）** |

    | \uhhhh | **使用十六进制表示匹配一个 Unicode 字符（恰好四位数字）** |


    让我们看看如何使用这些转义序列。


    ```

    print("Escape \n Sequence")

    ```


    Escape

    Sequence


    \n 表示换行。所以，它会将字符串分成新行。写在 \n 之后的任何内容都将出现在新行中。另一个广泛使用的转义字符是 \t。使用时，它会在单词之间生成一个制表符空格。


    ```

    print("Escape \t Sequence")

    ```


    Escape    Sequence


    你可以通过写一个反斜杠字符 \ 后跟以八进制（基数为 8）或十六进制（基数为 16）表示的 ASCII 码来表示任何字符。在八进制中，数字必须紧跟在反斜杠后面，在十六进制中，必须在数字本身之前写一个
    x 字符。让我们用八进制打印 ABC。


    ```

    "\101\102\103"

    ```


    ''ABC''


    现在用十六进制，


    ```

    "\x41\x42\x43"

    ```


    ''ABC''


    同样，你可以在需要时使用这些转义字符。


    ## Python 3.8 有什么新功能？


    Python 3.8 的第一个更新是引入了一个名为 **海象运算符** 的新运算符。海象运算符也称为 **赋值表达式**。符号是 **冒号后跟一个等号 (:=)**。这个名字源于从侧面看它时，它与海象的眼睛和獠牙相似。'
