    \ /, arguments can be passed with or without keywords.\n\n# Recursive Functions\n\
    \nWhen a function calls itself, this process is called Recursion. Let's understand\
    \ this concept using the most used example of finding the factorial of a given\
    \ number. Mathematically, the factorial of a number is given by multiplying the\
    \ number with its decreasing value, one at a time, till 1. For example, the factorial\
    \ of 5 is written as **5 ! = 5 x 4 x 3 x 2 x 1**. If we observe this, we can say\
    \ that it's **5 x 4 !** Because **4 ! = 4 x 3 x 2 x 1**. Again, it can be written\
    \ as **4 x 3 !**, because **3 ! = 3 x 2 x 1**. Again, it can be written as **3\
    \ x 2 !**, because **2 ! = 2 x 1**. Again, it can be written as **2 x 1 !**, because\
    \ **1 ! = 1 x 1**. In generalized form we can write it as, **n x (n-1) !**. Starting\
    \ with **n = 5**, it will first call **(n-1) !**, that is **4 !**. Now the new\
    \ value of **n** will be **5 x 4 x (n-1) !**, then it will again be **3 !**. Now\
    \ the new value of **n** will be **5 x 4 x 3 x (n-1) !**, **then**, it will again\
    \ call **2 !**, **and finally**, it will again call **1 !**. This is how a function\
    \ calls itself. Let's code this."
  - "[PAGE 231]\n\n```\npython\ndef rec_fact(n):\n    if n == 0:\n        return 1\n\
    \    return n * rec_fact(n-1)\n\nresult = rec_fact(5)\nprint(result)\n```\n\n\
    120\n\nSo, we can define recursion as a process in which a function breaks down\
    \ into smaller problems, and it keeps calling itself for each of the smaller problems\
    \ until a base case is reached. Like here, the base case is **1 !**. What does\
    \ a non- recursive or general iterative factorial function look like?\n\n```\n\
    python\ndef iter_fact(n):\n    if n == 0:\n        return 1\n    else:\n     \
    \   fact = 1\n        for i in range(1, n+1):\n            fact *= i\n       \
    \ return fact\n\nresult = iter_fact(5)\nprint(result)\n```\n\n120\n\nIt's a general\
    \ function. There are some differences between iteration and recursion.\n\n+ \
    \  - Recursion requires more memory.\n- In many languages Iteration is a much\
    \ faster approach.\n- Recursion sometimes can be a more abstract and harder approach\
    \ to understand."
