  md: '# # Chapter 1


    # ## I am... Python


    As per the Google, “*Python is a general purpose, interpreted, high level programming
    language which supports procedural, functional and object oriented programming.*”
    Now this is a standard definition which, your Professor or HR or any interviewer
    would expect you to say. So, we will learn it by heart. But what do the heavy
    terms used in this definition mean? We will discuss them in the later chapters
    when they will be used. Moving on, Python was officially released in the year
    1991, although the implementation was done by 1989. Guido Van Rossum created Python,
    and it''s my personal opinion that why Python became so powerful is because he
    himself was involved in developing his own work till 2018. That''s why Python
    evolved continuously with the time.


    Python is an open source software freely available and is platform independent.
    The official website is **python.org**. You can easily download the latest version
    available from here for any platform you work on, be it Linux, Windows or Mac.
    The latest version available is version 3.11. The most popular version arguably
    was 2.7, and now version 3.8 is taking its place. I’ll be using the version 3.8
    and compare the major differences between 3.7 and 3.8. This is because the versions
    3.7 and 3.8 are the most widely used and most favored versions. 3.8 has got some
    new features which are not available in 3.7 and older versions.


    # ### Why version 3.8?


    Although version 3.11 is the latest version and some major changes have been introduced
    in the versions 3.9 and 3.10 but the version 3.8 supports other libraries such
    as OpenCV, Tensorflow etc. with more stability as compared to other recent versions.
    That’s why the version 3.8 is more popular as compared to the other versions.'
  merge: -1
