- md: '## String Manipulation using RegEx


    Ok!! Our 1st task is to **Write a program that will replace all the digits in
    a string with an underscore ( _ )**


    Let''s talk about this task now. What should be the algorithm for this?


    - 1. Input a string. The string should be having digits also.

    - 2. Find out the digits and replace them with an underscore.

    - 3. Print the new string with underscore.


    Let''s code it:


    ```python

    import re

    pattern = re.compile(r"")

    my_string = input("Enter a string: ")

    pattern = re.compile(r"[0-9]+")

    result = pattern.sub("_", my_string)

    print(result)

    ```


    Wow!! It took 6 lines only. Yup, that''s the magic of using regular expression.

    Let''s do a postmortem of this code now.


    **1st two lines of codes** are mandatory lines that we have discussed earlier.
    Again a reminder, 2nd line is not compulsory to write, but, it''s a good practice
    actually.


    **3rd line of code:** `my_string = input ("Enter a string: ")`

    `my_string` is a variable in which user is being asked to enter any string at
    run time.


    **5th line of code:** `result = pattern.sub ("_", my_string)`

    Again **result** is a variable which is used to store the final result. In this
    final result, our input that is, `my_string` will be checked for a pattern, which
    is defined in **4th line of code** (which we will analyze in a moment). By replacing,
    we can also say that we want to **substitute**. RegEx provides a **sub** function
    that does the **substitution** part. The meaning of this line of code goes like
    this:


    Substitute an underscore in `my_string` by checking the pattern, where pattern
    consist of digits.

    "Pattern consists of digits" is described in 4th line of code and that is the
    heart of the code. It is the 1st proper RegEx function to deal with.


    **4th line of code:** `pattern = re.compile (r"[0-9]+")`

    Here comes the 1st learning part of RegEx. What is this `([0-9]+)`? The 1st table
    to learn is:


    ### Table 1: Special Sequences


    | Element | Description |

    | :--- | :--- |

    | . | Matches any single character except newline character. |

    | \d | This matches any digit [0-9] |

    | \D | This matches non-digit characters [^0-9] |

    | \s | This matches whitespace character [ \t\n\r\f\v] |

    | \S | This matches non-whitespace character [^ \t\n\r\f\v] |

    | \w | This matches alphanumeric character [a-zA-Z0-9_] |

    | \W | This matches any non-alphanumeric character [^a-zA-Z0-9] |

    | \A | Returns a match if the specified characters are at the beginning of the
    string |

    | \b | Returns a match where the specified characters are at the beginning or
