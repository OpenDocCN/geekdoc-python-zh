    \ 10**来硬编码它。另一种方式是要求用户输入一个值。这是通过**input ()**来实现的。所以第一行代码是提示用户输入一个整数。我们需要检查这个数是偶数还是奇数。在下一行，我们检查**如果**这个数能被2整除且余数为零，那么就打印这个数是偶数。如果它不是偶数，那么就跳转到**else条件**并打印这个数是奇数。如果你看输出，输入的数字是3。3%2的余数是1，所以，**else条件**会被执行，因此打印的输出是3是一个奇数。让我们检查另一个数字。\n\
    \n```\na = int(input(\"Enter a number:\"))\nif (a%2)==0:\n    print(a,\"is an\
