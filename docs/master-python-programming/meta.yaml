    \ another variable and then print it.\n\n```python\na = [4,3,2,1]\nb = iter(a)\n\
    print(dir(b))\n```\n\n```\n['__doc__', '__eq__', '__format__', '__ge__', '__getattribute__',\
    \ '__gt__', '__iter__', '__le__', '__length_hint__', '__lt__', '__ne__', '__new__',\
    \ '__next__', '__setattr__', '__setstate__', '__sizeof__', '__str__', '__subclasshook__']\n\
    ```\n\nNow it's working correctly. You can see that both **\\_\\_iter\\_\\_**\
    \ and **\\_\\_next\\_\\_** method are present (marked in red circles). This **next()**\
    \ method preserves the state of the last value. So what this **for loop** doing\
    \ is that it calls **iter** on our object and returns an iterator that we can\
    \ loop over. At the back end it calls for the **next** function again and again\
    \ and generates all the values. The iterators"
  mdcn: "## 递归\n\n递归实际上是一种更快的方法，适用于遍历树和二分查找等应用。\n\n函数调用自身是否存在限制？一个可以无限次调用自身的函数与一个递归函数有什么区别？让我们在没有基础或终止条件的情况下递归调用一个函数，看看它是一个无限函数还是存在某种限制。\n\
    \n```python\ndef endgame():\n    print(\"Avengers Assemble\")\n    endgame()\n\
