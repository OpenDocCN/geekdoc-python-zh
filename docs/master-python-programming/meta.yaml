- img_proc: true
  md: "The code with the exception that you want to catch is written in this block.\
    \ If an exception is raised, control flow leaves this block immediately and goes\
    \ to the *except* block.\n\n**except [(Exception[, Exception])] [as VAR]:**\n\n\
    This code is executed only if an exception was raised in the *try* block. Code\
    \ executed in this block is just like normal code. You can optionally name specific\
    \ types of exceptions in the *except* statements, in which case the block will\
    \ only be executed if one of the named exceptions was the one raised in *try*.\n\
    \n**[else:]**\n\nThis code is executed only if no exceptions were raised in the\
    \ *try* block. If the *else* block is executed, then the *except* block is not,\
    \ and vice versa. This block is optional.\n\n**[finally:]**\n\nThis code **always**\
    \ executes after the other blocks, even if there was an uncaught exception or\
    \ a return statement in one of the other blocks. This block is also optional.\n\
    \nLet's see how to use this **try- except block**.\n\n```\na = 5\nb = 0\n\ntry:\n\
    \    print(a/b)\nexcept Exception:\n    print('Dividing by zero!!Not possible')\n\
    \nprint('Well Done')\n```\n\nDividing by zero!!Not possible\nWell Done\n\nThis\
    \ is much better than an error message. And it has also executed the other print\
    \ statement. What if there is no error?"
