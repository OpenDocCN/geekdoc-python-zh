  md: '# # Chapter 6


    # ## Dictionary


    Dictionary is yet another data type which has a key and a value. It is like an
    associative array. The value is associated with its key. Unlike strings, lists
    and tuples which are sequence types, because their items have order of occurrence
    and where indexes are used to access the values, in a Dictionary, key is used
    to access the values. Keys are mapped to the values and hence, sometimes, Dictionaries
    are also termed as Mapped Type. The keys are immutable. It can be int or string
    but cannot be a list.


    # ### How to write a Dictionary?


    A dictionary is denoted by curly braces having key and value separated by a colon.
    This is known as Key- Value pair. The syntax looks something like this, **{Key:
    Value}**. Depending on the data type, the Key or/and Value can be written inside
    quotes. Let’s make one dictionary.


    ```

    >>> my_dict = {}

    >>> type(my_dict)

    <class ''dict''>

    ```


    This creates an empty dictionary. It’s always good practice to check the datatype
    by using type () command whenever you are learning something new. Now, let’s add
    key and value in this empty directory.


    ```

    >>> my_dict[''Iron Man''] = ''Tony Stark''

    >>> my_dict[''Hulk''] = ''Dr. Bruce Banner''

    >>> my_dict

    {''Iron Man'': ''Tony Stark'', ''Hulk'': ''Dr. Bruce Banner''}

    >>> type(my_dict)

    <class ''dict''>

    ```'
