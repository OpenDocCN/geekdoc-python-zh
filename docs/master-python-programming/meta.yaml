    \ Is there a default value? For this recursion provides a method called **.getrecursionlimit()**.\
    \ We have to import a module called **sys**. Let’s see how to use it and what\
    \ value is generated, if any default value is there.\n\n```python\nimport sys\n\
    print(sys.getrecursionlimit())\n\ndef endgame():\n    print(\"Avengers Assemble\"\
    )\n    endgame()\nendgame()\n```\n\n```\n3000\nAvengers Assemble\nAvengers Assemble\n\
