    Let''s use it now.


    ```

    from collections import defaultdict

    avengers = defaultdict(lambda: ''Not An Avenger'')

    avengers[1] = ''Tony''

    avengers[2] = ''Steve''

    avengers[3] = ''Thor''

    print (avengers[1])

    print (avengers[4])

    ```


    What are we doing? 1st we are defining the default value of a dictionary using
    the lambda function. If the key is not present in the dictionary, it will return
    a value stating **Not An Avenger**, rather than throwing a KeyError. Then, we
    have simply made a dictionary named as avengers in which there are 3 keys with
    values. We are then checking for key 1 and key 4. Expected outcomes are Tony and
    Not an Avenger.


    ```

    Tony

    Not An Avenger

    ```


    So, it''s working. Moving on to the other dictionary methods. To get a value from
    a key, we also use the get () method.


    ```

    >>> avengers.get(2)

    ''Steve''

    ```


    This method can have 2 arguments. The first one is key, and the second argument
    is the value you want to return. By default, it is None.


    ```

    >>> avengers.get(4, ''Hulk'')

    ''Hulk''

    >>> avengers

    {1: ''Tony'', 2: ''Steve'', 3: ''Thor''}

    ```'
