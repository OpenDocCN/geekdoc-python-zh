    # # Chapter 15


    # ## Regular Expression


    Regular Expression is my favorite topic in programming. It is so favorite to me
    that I have written a book titled as **Simplifying Regular Expression Using Python**.
    The book is available on Amazon and on Kindle as well. Another reason is that
    Regular Expression can be written in using the walrus operator completely. That
    I’ll leave as the task to write in walrus operator. And by the end of this you’ll
    learn this topic so well that you can write it for sure. I am taking few chapters
    as it is from my own book to discuss this topic here.


    A RegEx, or Regular Expression, is a sequence of characters that determines a
    search pattern. RegEx can be used to check if a string contains the specified
    search pattern. Along with this, RegEx also provides various operations for string
    manipulations such as validating an email or password, or even extracting some
    data.


    # ### How useful Regular Expression is to learn?


    Every popular language, like C, Java, Perl, Python, etc. supports Regular Expression.
    But unfortunately, Regular Expression does not earn that name and fame with time
    that it should have been, providing the features and advantages it offers. Let’s
    jot down some of them:


    +   1. With writing a few characters, a lot can be achieved which otherwise, would
    have taken dozens of lines of codes.

    2. As I already told, unfortunately RegEx did not became popular as it should
    have been, mostly because, many programmers don’t know RegEx (ironically, but
    that’s true). So, learning RegEx will obviously give you a distinguished recognition.

    3. Usage of few characters means faster execution time.

    4. Perhaps one of the most important features is **Portability**. The majority
    of RegEx syntax works the same way in a variety'
  - '[PAGE 277]


    of programming languages. So, learning one will make it easier to understand any
    other programming language’s RegEx.


    # RegEx Module


    Python has a built-in package called **re**, which can be used to work with Regular
    Expressions. Remember one thing, writing regular expression is an art. Like in
    VLSI, choosing process parameters is an art irrespective of technology being used.
    Similarly, writing RegEx and applying it correctly needs art. The first step is
    to import this module by using following line:


    **1<sup>st</sup> line of code:** `import re`


    Before starting the actual programming it’s always a better approach to compile
    (or you can say pre-compile).


